 overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5548" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5549" instrument_node="">Thanks for the A2A. At first I was going to write, “of course rhetoric is still valuable today!”</span></span></p><span data-dcnode-id="5546" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="5543" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="5544" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="5545" instrument_node="">However, after thinking about it, I actually think rhetoric might be in serious trouble. Rhetoric is the art of persuading someone(s) to believe something they don't already believe through argument. New technology has changed the type of information we receive, with news feed algorithms adjusting themselves to give us information that we already agree with. It's led many to believe that we’re in a “post fact” world, beyond post-modern (which is a skepticism of narratives), we’re now skeptical of an</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="5531" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="5532" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="5533" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSp e="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="4881" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="4939" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="4940" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="4941" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="4942" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="4943" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4960" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4965" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4966" instrument_node="">In my country, at least, because of the long-term, and horribly destructive, assault on classical humanist education. Rhetoric, once the heart of the </span></span><span data-dcnode-id="4963" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4964" instrument_node="">trivium, </span></span><span data-dcnode-id="4961" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4962" instrument_node="">an absolutely central feature of classical culture, central again to curricula from the tenth century (with advocates like Gerbert) through the Renaissance all the way to the nineteenth century, has been banished, and with it, comprehensive systems of thought not only about speaking, argumentation, and persuasion, but the capacity to analyze these critically, and the powerful theories of affect such analyses generated.</span></span></p><span data-dcnode-id="4959" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4956" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4957" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4958" instrument_node="">I have covered this</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4944" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4945" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4946" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4947" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4948" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4953" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4954" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4955" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4949" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4950"><svg data-dcnode-id="4951" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4952" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4882" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4883" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4884"><span class="q-box qu-userSelect--text" data-dcnode-id="4885" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4932" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4937" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4938" instrument_node="">In my country, at least, because of the long-term, and horribly destructive, assault on classical humanist education. Rhetoric, once the heart of the </span></span><span data-dcnode-id="4935" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4936" instrument_node="">trivium, </span></span><span data-dcnode-id="4933" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4934" instrument_node="">an absolutely central feature of classical culture, central again to curricula from the tenth century (with advocates like Gerbert) through the Renaissance all the way to the nineteenth century, has been banished, and with it, comprehensive systems of thought not only about speaking, argumentation, and persuasion, but the capacity to analyze these critically, and the powerful theories of affect such analyses generated.</span></span></p><span data-dcnode-id="4931" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4924" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4929" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4930" instrument_node="">I have covered this topic in a couple of places. First of all, in </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Why-do-so-many-adults-appear-unable-to-evaluate-evidence-and-apply-critical-thinking-skills-Is-this-not-part-of-the-curriculum-in-American-schools/answer/Michael-Masiello-1" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="4928" instrument_node="">Michael Masiello's answer to Why do so many adults appear unable to evaluate evidence and apply critical thinking skills? Is this not part of the curriculum in American schools?</span></a><span data-dcnode-id="4925" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4926" instrument_node=""> I write:</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="4903" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4909" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4922" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4923" instrument_node="">What I can tell you are the following things. The undergraduates who would, and will again in the fall, show up in my classroom almost invariably lack these critical thinking skills. Their absence is the result of a systematic assault on education in this country, and particularly the abandonment of neoclassical civic-humanist pedagogy. People think of rhetoric, once a central focus of education, as something of a dirty word now: “oh, that’s all rhetoric.” But rhetorical training has always involved a capacity to see issues, as Cicero famously said, </span></span><span data-dcnode-id="4920" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4921" instrument_node="">in utramque partem, “</span></span><span data-dcnode-id="4918" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4919" instrument_node="">from either side,” or better, from many sides, and to evaluate the strength of arguments and counterarguments if one hoped to convince anyone of anything. Look at culture now: conviction is derived purely from some deracinated version of </span></span><span data-dcnode-id="4916" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4917" instrument_node="">ethos, </span></span><span data-dcnode-id="4914" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4915" instrument_node="">a kind of blustering, swaggering claim to be telling the truth while manifestly lying; people choose to be deceived rather than to think, and that is because our educational systems have been undermined. Extraordinary teachers — wonderful people like </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/profile/Justin-Franco-1" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="4913" instrument_node="">Justin Franco</span></a><span data-dcnode-id="4910" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4911" instrument_node=""> — exist in contexts that too often discourage the inculcation of these habits of mind. Great teachers have to finesse the strictures of curricula to do this.</span></span></p><span data-dcnode-id="4908" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4905" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4906" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4907" instrument_node="">Then kids get to college, and people like me have to work very hard to make a tiny span of time sufficient to reverse a lifetime’s encouragement of apolitical and uncritical thinking. It’s terrifying to behold, but I always have, and always will, give it everything I have. Committed, qualified teachers remain among the unsung heroes of our culture. I half expect Trump and DeVos to call the best of us “enemies of the people.”</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="4904" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4898" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4901" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4902" instrument_node="">But all this subserves a larger systemic rot in education, on which I offer a somewhat longer take in </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/Why-is-Art-History-often-used-to-exemplify-the-ultimate-useless-degree-or-discipline-in-the-discourse-of-useful-degrees-and-disciplines/answer/Michael-Masiello-1" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="4900" instrument_node="">Michael Masiello's answer to Why is Art History often used to exemplify the ultimate "useless" degree or discipline in the discourse of "useful" degrees and disciplines?</span></a></p><span data-dcnode-id="4897" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4894" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4895" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4896" instrument_node="">That answer is too long to quote, but it’s one of the better ones I’ve written for Quora, and while the question sounds off-topic here, the substance of my answer is applicable to this question as well.</span></span></p><span data-dcnode-id="4893" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4886" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4891" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4892" instrument_node="">I hope these are of some interest or use to you, </span></span><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/profile/Emmanuel-Francis-Nwaolisa-Ogomegbunam" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="4890" instrument_node="">Emmanuel-Francis</span></a><span data-dcnode-id="4887" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4888" instrument_node="">. But the TL;DR here is: anemic pedagogical models, a kind of conspiracy against critical thought (which is conducive to informed civic activity), and yes, a very very bad thing. Trump is what happens when rhetorical standards do not become part of people’s intellectual furniture.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4809" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4810" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition- ="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4650"><span class="q-box qu-userSelect--text" data-dcnode-id="4651" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4664" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4674" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4675" instrument_node="">When we think of rhetoric, we usually associate it with Aristotle, public speaking and writing, or maybe something negative like political manipulation… But rhetoric does not necessarily involve the use of language. You may scan through this article “A Hoot in the Dark” by George A. Kennedy </span></span><span class="q-inline" data-dcnode-id="4667" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="4672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pdfs.semanticscholar.org/f8e8/1599e5d8a55b7764774005e50d618673d265.pdf" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="pdfs.semanticscholar.org"><span data-dcnode-id="4673" instrument_node="">https://pdfs.semanticscholar.org/f8e8/1599e5d8a55b7764774005e50d618673d265.pdf</span></a><span class="q-inlineBlock" data-dcnode-id="4668" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="4669"><svg data-dcnode-id="4670" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="4671" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="4665" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4666" instrument_node=""> to find out more about rhetoric.</span></span></p><span data-dcnode-id="4663" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4660" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4661" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4662" instrument_node="">So, Kennedy believes that rhetoric by nature is energy, “including emotional energy, physical energy, energy used in encoding and decoding”. Animals and insects can also have rhetoric. For example, peacocks dance to attract mates. Using rhetoric is energy saving. How come is that? Cats raise their fur, arching their backs, turn sideways, hissing or spitting to make themselves appear larger and stronger when they feel threatened or angry. If their enemies are scared and go away, they don’t need to spend energy fighting. Humans also do the similar. We show off mussels or breasts to attract mates and “persuade” competitors to back off. Or we say something threatening to scare off someone.</span></span></p><span data-dcnode-id="4659" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4656" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4657" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4658" instrument_node="">Rhetoric also helps us express our feelings. For instance, you smile to show friendliness, cry to show sadness, and shout to show anger. You may not be aware of this but almost everything you do is rhetorical, even when you are talking or thinking to yourself.</span></span></p><span data-dcnode-id="4655" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4652" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4653" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4654" instrument_node="">How can something be unimportant if you use it every day and every minute? Rhetoric is as important as the air you breathe.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4580" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4581" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4582" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4596" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4618" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4619" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4629" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4630" style="box-sizing: bo p: anywhere; direction: ltr;"><span data-dcnode-id="4484" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4485" instrument_node="">There are some generalisations which are true; all squirrels eat nuts, all trees are made of wood.</span></span></p><span data-dcnode-id="4482" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4479" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4480" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4481" instrument_node="">Generalisations though, are more often sweeping and reflect the norms but not the outliers.</span></span></p><span data-dcnode-id="4478" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4475" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4476" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4477" instrument_node="">Everybody in Korea eats dogs. Everybody knows that.</span></span></p><span data-dcnode-id="4474" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4471" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4472" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4473" instrument_node="">Except that they don’t. Dog-meat consumption is nowhere near as widely practiced in Korea as it was, and they’re currently campaigning against it and there’s talk of criminalising it. Several dog-slaughterers have closed.</span></span></p><span data-dcnode-id="4470" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word q w--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4464" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4465" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4466" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4460" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4461"><svg data-dcnode-id="4462" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4463" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4383" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4384" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4385"><span class="q-box qu-userSelect--text" data-dcnode-id="4386" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4447" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4448" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4449" instrument_node="">The first is called a generalisation; the root is “generic” which means of a homogeneous (or semi homogeneous at least) group.</span></span></p><span data-dcnode-id="4446" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4443" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4444" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4445" instrument_node="">There are some generalisations which are true; all squirrels eat nuts, all trees are made of wood.</span></span></p><span data-dcnode-id="4442" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4439" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4440" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4441" instrument_node="">Generalisations though, are more often sweeping and reflect the norms but not the outliers.</span></span></p><span data-dcnode-id="4438" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4435" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4436" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4437" instrument_node="">Everybody in Korea eats dogs. Everybody knows that.</span></span></p><span data-dcnode-id="4434" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4431" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4432" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4433" instrument_node="">Except that they don’t. Dog-meat consumption is nowhere near as widely practiced in Korea as it was, and they’re currently campaigning against it and there’s talk of criminalising it. Several dog-slaughterers have closed.</span></span></p><span data-dcnode-id="4430" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4423" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4428" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4429" instrument_node="">They’re all thick in Barnsley, and always have been. Apart from Joseph Bramagh. And Joseph Locke. And…..er…..well, look, it still holds true. They’re not </span></span><span data-dcnode-id="4426" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4427" instrument_node="">all</span></span><span data-dcnode-id="4424" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4425" instrument_node=""> thick in Barnsley. That’s Rotherham.</span></span></p><span data-dcnode-id="4422" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4419" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4420" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4421" instrument_node="">They’re all a bunch of Nancies down in t’ South. Actually that one is……no it isn’t. As much as some of us here would like it to be.</span></span></p><span data-dcnode-id="4418" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4415" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4416" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4417" instrument_node="">Generally speaking in rhetoric you use a generalisation to illustrate a point about certain groups that may well be a norm in their culture or environment but is not true in all cases, just those inside the norm. It doesn’t even have to be a factual norm sometimes, just a perceived one. It’s a way of simplifying things and can be used for good or bad, or sometimes a mixture of both.</span></span></p><span data-dcnode-id="4414" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4411" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4412" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4413" instrument_node="">The second is called a hyperbole. That’s when you make something appear grander than the rest. Hyperbole is used in marketing and politics extensively.</span></span></p><span data-dcnode-id="4410" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4407" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4408" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4409" instrument_node="">Carlsberg is the best lager in the world. Is it? I don’t know. All lager tastes like piss to me. I’m sure if you roped in a panel of a dozen piss-artists…….er, lager connoisseurs, they’d have different opinions on the matter.</span></span></p><span data-dcnode-id="4406" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4403" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4404" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4405" instrument_node="">The Tories are killing the NHS! No, they aren’t.</span></span></p><span data-dcnode-id="4402" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4399" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4400" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4401" instrument_node="">Labour is killing the NHS! No, they aren’t.</span></span></p><span data-dcnode-id="4398" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4395" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4396" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4397" instrument_node="">The Lib-Dems are killing the NHS! No, they aren’t, since when has a Lib-Dem been near an opportunity to give the NHS a slap round the arse, let alone kill it?</span></span></p><span data-dcnode-id="4394" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4391" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4392" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4393" instrument_node="">At the moment there’s a lot of generalisation and hyperbole flying about. We seem to have gone from the Industrial Age to the Digital Age and are now transitioning into the Thicko Age.</span></span></p><span data-dcnode-id="4390" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4387" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4388" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4389" instrument_node="">It’s all the fault of the EU. (It isn’t though, some of it is the Californians).</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4310" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4311" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4312" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4326" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4353" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4354" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4364" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4365" style="box-sizing: border-box; position: relative;"><button aria-label="33 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="4366" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transition-timing-function: ease-out; border-width: 0px; outline: none; color: inherit; background-color: transparent;" tabindex="0"><div cla id="4212" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4213" instrument_node=""> the faculty of determining in a given case the available means of persuasion.</span></span></p><span data-dcnode-id="4210" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4207" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4208" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4209" instrument_node="">By using Aristotle’s definition of rhetoric, can we in fact say (with some degree of accuracy) there is—in your words—a “difference between the rhetoric of Aristotle and the rhetoric of modern-day essays?” I don’t think there is an appreciable difference.</span></span></p><span data-dcnode-id="4206" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4203" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4204" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4205" instrument_node="">Concerning human nature and the need we all have to communicate verbally and nonverbally in a variety of modes, </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="4191" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="4192" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="4193" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="4194" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="4195" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="4200" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="4201" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="4202" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="4196" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="4197"><svg data-dcnode-id="4198" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="4199" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="4121" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="4122" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="4123"><span class="q-box qu-userSelect--text" data-dcnode-id="4124" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4177" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4184" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4185" instrument_node="">To the best of my knowledge, Aristotle never wrote essays. He wrote books, of course, including his justly famous </span></span><span data-dcnode-id="4182" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4183" instrument_node="">Rhetoric, </span></span><span data-dcnode-id="4180" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4181" instrument_node="">in which he defined rhetoric as</span></span><span data-dcnode-id="4178" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4179" instrument_node=""> the faculty of determining in a given case the available means of persuasion.</span></span></p><span data-dcnode-id="4176" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4173" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4174" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4175" instrument_node="">By using Aristotle’s definition of rhetoric, can we in fact say (with some degree of accuracy) there is—in your words—a “difference between the rhetoric of Aristotle and the rhetoric of modern-day essays?” I don’t think there is an appreciable difference.</span></span></p><span data-dcnode-id="4172" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4165" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4170" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4171" instrument_node="">Concerning human nature and the need we all have to communicate verbally and nonverbally in a variety of modes, nothing much has changed over the past 2500 years. If anything, Aristotle’s definition of rhetoric is just as fresh and accurate today as it was in his day. We humans still have the need to inform, entertain, inspire, debate, and yes, </span></span><span data-dcnode-id="4168" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4169" instrument_node="">persuade</span></span><span data-dcnode-id="4166" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4167" instrument_node=""> one another.</span></span></p><span data-dcnode-id="4164" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4157" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4162" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4163" instrument_node="">What </span></span><span data-dcnode-id="4160" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4161" instrument_node="">has </span></span><span data-dcnode-id="4158" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4159" instrument_node="">changed, however, is the multiplicity of media which are* at our disposal today, particularly media of mass communication, thanks to the relatively recent invention of printing (a mere 500 or so years ago) and the more-recent invention of electricity, particularly the ways of harnessing its power.</span></span></p><span data-dcnode-id="4156" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4153" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4154" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4155" instrument_node="">Today we can communicate worldwide at the speed of light, what with computers, smart phones, tablets, E-Readers, satellites, nanotechnology, and probably other significant media of mass communication of which I am unaware, since as a non-millennial I am struggling to keep up with the burgeoning technology of mass communication.</span></span></p><span data-dcnode-id="4152" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4149" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4150" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4151" instrument_node="">One huge difference between the way persuasion was practiced in Aristotle’s day and our day involves not only the multiplicity of ways in which moral—and immoral—suasion is used but also its sheer ubiquity in modern culture. The very omnipresence of mass media today is something the ancient Greeks could not have imagined.</span></span></p><span data-dcnode-id="4148" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4145" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4146" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4147" instrument_node="">Moreover, the speed with which we communicate with one another is astounding. With the click of a mouse, we have access electronically to one another and to information about each other (and about the world at large) in ways which would stagger Aristotle and his students. In addition, the amount of knowledge and information available to all humankind increases so much faster—and in geometrical progression—than it did prior to the appearance of the tools of mass media.</span></span></p><span data-dcnode-id="4144" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4141" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4142" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4143" instrument_node="">Although the speed with which we can amass knowledge is something we take for granted (“Isn’t there something faster than Google?” we say to ourselves when our computer freezes!), in Aristotle’s day, children acquired knowledge from their teachers one-on-one, and they did not even have textbooks at their disposal, let alone Kindles! Additionally, formal education was available only to the children of well to do families. Today, with free universal schooling available to most of the world’s population, a young person need not be wealthy to obtain a high-quality education.</span></span></p><span data-dcnode-id="4140" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4137" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4138" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4139" instrument_node="">In large part because of the proliferation of knowledge today in every conceivable discipline and aspect of human endeavor, the face of persuasion has changed (whether for better or worse is up to you to decide). Perhaps more than ever before , however, we need to become increasingly aware of and sensitive to the ways in which persuasion functions in our modern society.</span></span></p><span data-dcnode-id="4136" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4133" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4134" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4135" instrument_node="">In conclusion, without that awareness and sensitivity, I believe we are in danger of falling prey to mindless entertainment, intellectual laziness, and vacuous soundbites bereft of context, which may in fact be persuasive but at the same time are misleading, inaccurate, and unethical.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="4132" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4125" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4130" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4131" instrument_node="">*I still insist the word </span></span><span data-dcnode-id="4128" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4129" instrument_node="">media </span></span><span data-dcnode-id="4126" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4127" instrument_node="">is plural and therefore takes a plural verb.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4053" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4054" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4055" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4069" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="4091" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="4092" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="4102" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="4103" style="box-sizing: border-box; position: relative;"><button aria-label="10 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="4104" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; transition-timing-function: ease-out; border-wi " data-dcnode-id="3986" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3987" style="box-sizing: border-box;"><span data-dcnode-id="3988" style="background: none;"><span data-dcnode-id="3989" instrument_node="">Is the rhetoric of Aristotle still used today?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--none qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="3876" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="3877" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3878" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="3975" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="3879" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="3947" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3948" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3949" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="3950" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3951" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3968" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3973" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3974" instrument_node="">Hi, as an English major student at a Sino-Foreign University, I will tell you that yes, </span></span><span data-dcnode-id="3971" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3972" instrument_node="">Aristotle’s rhetoric is not outdated.</span></span><span data-dcnode-id="3969" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3970" instrument_node=""> You may think that you rarely touch or apply to Aristotle’s old and possibly obscure rhetorical theories in your daily life if you are not a rhetorical or literary expert or student. In addition to studying the theoretical knowledge of Aristotle’s rhetoric at school, his theory is often used by all of us in our daily lives.</span></span></p><span data-dcnode-id="3967" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3964" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3965" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3966" instrument_node="">Let’s consider a daily example: when you have different opinions towards an event or action than your friend, you will try to list plenty of evidence</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3952" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3953" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3954" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3955" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3956" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3961" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3962" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3963" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3957" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3958"><svg data-dcnode-id="3959" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3960" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3880" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3881" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3882"><span class="q-box qu-userSelect--text" data-dcnode-id="3883" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3940" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3945" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3946" instrument_node="">Hi, as an English major student at a Sino-Foreign University, I will tell you that yes, </span></span><span data-dcnode-id="3943" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3944" instrument_node="">Aristotle’s rhetoric is not outdated.</span></span><span data-dcnode-id="3941" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3942" instrument_node=""> You may think that you rarely touch or apply to Aristotle’s old and possibly obscure rhetorical theories in your daily life if you are not a rhetorical or literary expert or student. In addition to studying the theoretical knowledge of Aristotle’s rhetoric at school, his theory is often used by all of us in our daily lives.</span></span></p><span data-dcnode-id="3939" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3924" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3937" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3938" instrument_node="">Let’s consider a daily example: when you have different opinions towards an event or action than your friend, you will try to list plenty of evidence to convince him or her. Your efforts to persuade, in fact, is the manifestation of </span></span><span data-dcnode-id="3935" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3936" instrument_node="">logos</span></span><span data-dcnode-id="3933" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3934" instrument_node=""> in Aristotle’s rhetoric. Of course, it can also be called as one type of “</span></span><span data-dcnode-id="3931" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3932" instrument_node="">the</span></span><span data-dcnode-id="3929" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3930" instrument_node=""> </span></span><span data-dcnode-id="3927" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3928" instrument_node="">art of persuasion</span></span><span data-dcnode-id="3925" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3926" instrument_node="">”.</span></span></p><span data-dcnode-id="3923" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3908" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3921" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3922" instrument_node="">By the same token, logos and even ethos are contained when you are trying to convey your ideas, insights, or services and products in a lecture or presentation. It can be said that the </span></span><span data-dcnode-id="3919" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3920" instrument_node="">three means of persuasion</span></span><span data-dcnode-id="3917" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3918" instrument_node=""> – ethos, logos, and pathos – proposed by Aristotle can be seen everywhere in our life. Aristotle also put up some other meaning rhetorical concepts such</span></span><span data-dcnode-id="3915" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3916" instrument_node=""> </span></span><span data-dcnode-id="3913" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3914" instrument_node="">as</span></span><span data-dcnode-id="3911" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3912" instrument_node=""> enthymeme, topoi, metaphor</span></span><span data-dcnode-id="3909" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3910" instrument_node="">, etc. All of them play a significant role in today’s rhetorical field as rhetorical devices/elements.</span></span></p><span data-dcnode-id="3907" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3904" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3905" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3906" instrument_node="">Therefore, Aristotle’s rhetoric has had an essential influence since early times. The reason some people ask questions like you is that we rarely analyze every action in daily activities, but use them unconsciously.</span></span></p><span data-dcnode-id="3903" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3887" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3901" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3902" instrument_node="">If you want to learn more about Aristotle’ rhetoric and how it applies in the modern time, I highly recommend you read the book in the photo below </span></span><span data-dcnode-id="3899" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3900" instrument_node="">Aristotle’s Rhetoric – Summary Study Guide. </span></span><span data-dcnode-id="3897" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3898" instrument_node="">You can also have a look at this website: </span></span><span class="q-inline" data-dcnode-id="3890" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="3895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iep.utm.edu/aris-log/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.iep.utm.edu"><span data-dcnode-id="3896" instrument_node="">https://www.iep.utm.edu/aris-log/</span></a><span class="q-inlineBlock" data-dcnode-id="3891" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="3892"><svg data-dcnode-id="3893" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="3894" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="3888" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3889" instrument_node="">.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3884" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3885" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3886" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-5b3b2d2e788a1d8426ece06890ef26ab&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3812" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3813" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3814" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3828" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3850" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3851" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3861" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3862" style="box-siz his art to debate and speeches should be quite apparent. In debate, whoever is judging your performance will perhaps be swayed more by how you deliver your “points” than by the logic and thoroughness of your arguments.</span></span></p><span data-dcnode-id="3496" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3493" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3494" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3495" instrument_node="">In your standard speech, whether it be to inform, persuade, inspire or entertain (o</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3481" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3482" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3483" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3484" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3485" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3490" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3491" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3492" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3486" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3487"><svg data-dcnode-id="3488" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3489" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3437" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3438" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3439"><span class="q-box qu-userSelect--text" data-dcnode-id="3440" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3473" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3474" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3475" instrument_node="">Rhetoric is the art of determining what a given audience finds persuasive. Finding, organizing, stylizing, and recalling the materials which you think will be persuasive is more than half the battle. The other half is delivering what you think your audience will find persuasive.</span></span></p><span data-dcnode-id="3472" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3469" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3470" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3471" instrument_node="">The application of this art to debate and speeches should be quite apparent. In debate, whoever is judging your performance will perhaps be swayed more by how you deliver your “points” than by the logic and thoroughness of your arguments.</span></span></p><span data-dcnode-id="3468" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3465" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3466" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3467" instrument_node="">In your standard speech, whether it be to inform, persuade, inspire or entertain (or a combination of two or more), you as the speaker want your audience to listen to what you have to say and to be changed in some way for the better!</span></span></p><span data-dcnode-id="3464" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3461" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3462" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3463" instrument_node="">Do not think that just because rhetoric is most closely associated with the art of persuasion that it has nothing to do with communicating basic information to your audience or engendering inspiration in your audience. Quite the contrary.</span></span></p><span data-dcnode-id="3460" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3457" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3458" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3459" instrument_node="">You as a speaker bring to bear the same tasks of invention, organization, style, and recall to the preparation of any speech, regardless of its purpose or purposes.</span></span></p><span data-dcnode-id="3456" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3453" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3454" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3455" instrument_node="">Contrary to popular opinion, rhetoric is more than just hot air and inflated (or inflammatory) speaking. Nor is rhetoric just what your opponent has to say. Rhetoric is a neutral tool used by everyone. The uses to which it is put determine whether it is honorable or dishonorable.</span></span></p><span data-dcnode-id="3452" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3449" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3450" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3451" instrument_node="">Rhetoric is borne by thoughts, concepts, attitudes, paradigms: all these united by deliberately chosen and well-crafted words, whether they emerge from a rhetor’s pen (or word processor) or voice. In other words, not all rhetoric is audible, noR is it necessarily delivered by one person to many people.</span></span></p><span data-dcnode-id="3448" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3445" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3446" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3447" instrument_node="">It could be transmitted in the guise of a love note passed from a suitor to his sweetheart, or it could be contained in a list of 95 theses tacked to the door of a church in Wittenberg (according to university custom) on October 31, 1517 by a religious troublemaker named Martin Luther. The love note could very well lead to a lifelong marriage; the 95 theses mark the beginning of the Great Reformation in Europe.</span></span></p><span data-dcnode-id="3444" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3441" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3442" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3443" instrument_node="">Your debate presentations and student speeches will probably fall somewhere in between those two rhetorical transmissions!</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3364" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b
