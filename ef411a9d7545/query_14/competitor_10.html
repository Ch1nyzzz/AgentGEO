="3265" instrument_node="">Although I am not a scholar of educational history, I have my pet theory. I doubt that it’s original, because I can’t imagine that some PhD in history or education hasn’t attempted to address this.</span></span></p><span data-dcnode-id="3262" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3259" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3260" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3261" instrument_node="">I suppose that rhetoric is not now widely taught as it was until the 19th century, because public education, as it developed during the age of imperialism and the industrial revolution, was geared toward producing people who would be functionaries and employees more than leaders and boisterous citiz</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3247" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3248" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3249" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3250" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3251" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3256" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3257" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3258" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3252" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3253"><svg data-dcnode-id="3254" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3255" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3207" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3208" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3209"><span class="q-box qu-userSelect--text" data-dcnode-id="3210" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3239" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3240" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3241" instrument_node="">Thanks for the A2A.</span></span></p><span data-dcnode-id="3238" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3235" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3236" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3237" instrument_node="">We do teach rhetoric - it’s unavoidable - but unfortunately, not always consciously.</span></span></p><span data-dcnode-id="3234" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3231" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3232" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3233" instrument_node="">Although I am not a scholar of educational history, I have my pet theory. I doubt that it’s original, because I can’t imagine that some PhD in history or education hasn’t attempted to address this.</span></span></p><span data-dcnode-id="3230" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3227" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3228" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3229" instrument_node="">I suppose that rhetoric is not now widely taught as it was until the 19th century, because public education, as it developed during the age of imperialism and the industrial revolution, was geared toward producing people who would be functionaries and employees more than leaders and boisterous citizens.</span></span></p><span data-dcnode-id="3226" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3223" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3224" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3225" instrument_node="">I think it is clear that rhetoric has continued to be taught in an inchoate form, in literature and writing classes, in debate teams, in forensics competitions, and in activities like Model UN (in the USA), and in theatre. It was pointed out to me by my voice teacher from my acting program, that the traditional canons of rhetoric have been broken up into separate concerns. Invention, Style, and Arrangement have been appropriated by literature and writing teachers. Memory and Delivery are taken seriously in theatre and speech activities that require performance.</span></span></p><span data-dcnode-id="3222" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3219" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3220" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3221" instrument_node="">This balkanization of rhetoric means that the first three canons (Invention, Style, Arrangement), which can be addressed with pen and paper have become academic, and have been separated from that which cannot be mastered academically and which are socially oriented, Delivery and Memory. The result: academic communication, both in writing and in presentations, is often constipated with baroque sentence structures dominated by nominalizations, passive constructions, and jargon. This is why I get work in business schools, as an actor: in effect, I get hired to undo the academic habits of communication, which begin with writing that impresses audiences in various academic silos, but which have no vocal or physical dimension, and therefore resonates nowhere else but the academy.</span></span></p><span data-dcnode-id="3218" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3215" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3216" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3217" instrument_node="">Rhetoric is being addressed by business schools, in the form of classes on leadership that have public speaking components. But rhetoric really needs to be taught earlier, and more widely, so that people don’t reach adulthood being expected to be decent managers and communicators with no practical experience.</span></span></p><span data-dcnode-id="3214" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3211" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3212" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3213" instrument_node="">Finally, rhetoric is being practiced by people who wouldn’t even be classified as practicing rhetoric. The most interesting rhetorical idea that I have come across lately is Randy Olson’s Narrative Index. Olson is a former marine biology professor who decided to change his career and life by becoming a film maker. He has spent a lot of time figuring out why scientists, in particular, and highly educated people in general, are such lousy storytellers. In coming up with a simple metric for the elements of exposition, contradiction and solution that constitute all discourse, he is getting at elements of rhetoric that all people should be able to use consciously and effectively.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3134" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3135" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3136" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3150" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3177" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3178" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3188" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3189" style="box-sizing: border-box; position: relative;"><button aria-label="2 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="3190" role="button" style="box-sizing: border-box; -relative" data-dcnode-id="2953" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="3034" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="2954" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="3006" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="3007" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="3008" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="3009" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3010" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3023" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3032" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3033" instrument_node="">The most widely shared academic definition of rhetoric comes from Aristotle, who tells us that rhetoric is the "available means of persuasion in any given situation." The Classical context in which he wrote </span></span><span data-dcnode-id="3030" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3031" instrument_node="">The Rhetoric</span></span><span data-dcnode-id="3028" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3029" instrument_node=""> parallels the pejorative way most understand the word "rhetoric" today, given that rhetoric today (still) connotes deception, sophism, and cunning -- especially when  used in speech. Historian and critical philosopher Michel Foucault notes, for instance, that the tradition of rhetoric runs in strong opposition to that of </span></span><span data-dcnode-id="3026" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3027" instrument_node="">parrhesia</span></span><span data-dcnode-id="3024" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3025" instrument_node="">, or unadorned frank speech that spoke the truth</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3011" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3012" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3013" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3014" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3015" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3020" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3021" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3022" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3016" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3017"><svg data-dcnode-id="3018" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3019" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2955" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2956" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2957"><span class="q-box qu-userSelect--text" data-dcnode-id="2958" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2995" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3004" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3005" instrument_node="">The most widely shared academic definition of rhetoric comes from Aristotle, who tells us that rhetoric is the "available means of persuasion in any given situation." The Classical context in which he wrote </span></span><span data-dcnode-id="3002" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3003" instrument_node="">The Rhetoric</span></span><span data-dcnode-id="3000" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3001" instrument_node=""> parallels the pejorative way most understand the word "rhetoric" today, given that rhetoric today (still) connotes deception, sophism, and cunning -- especially when  used in speech. Historian and critical philosopher Michel Foucault notes, for instance, that the tradition of rhetoric runs in strong opposition to that of </span></span><span data-dcnode-id="2998" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2999" instrument_node="">parrhesia</span></span><span data-dcnode-id="2996" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2997" instrument_node="">, or unadorned frank speech that spoke the truth. Socrates compares rhetoric on several occasions to the construction of mirror-image  illusions, a habit of seduction, and a wild, untamed horse that carries human passions. According to Classical scholars rhetoric appeals to what is most animalistic within us but jeopardizes rational thought. Rhetoric makes a spectacle of democracy, subjecting individuals to their unconscious passions and unreasoned behavior.</span></span></p><span data-dcnode-id="2994" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2975" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2992" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2993" instrument_node="">There is, however, a counter-movement brewing among rhetorical scholars who think that the above account is a bit too slanderous. Rhetorical scholarship has been around for quite a long time in the United States (c.~1914) , starting as the study of public address (as distinct from say, literature or poetry). There, Aristotle's </span></span><span data-dcnode-id="2990" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2991" instrument_node="">Rhetoric </span></span><span data-dcnode-id="2988" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2989" instrument_node="">was a very important analytic for assessing the sucess or failure of important speeches, typically delivered by white, male politicians and public figures. In the 1950s rhetoric saw a theoretical resurgence with the publication of Edwin Black's </span></span><span data-dcnode-id="2986" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2987" instrument_node="">Rhetorical Criticism: A Study in Method</span></span><span data-dcnode-id="2984" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2985" instrument_node=""> and Kenneth Burke's </span></span><span data-dcnode-id="2982" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2983" instrument_node="">A Rhetoric of Motives</span></span><span data-dcnode-id="2980" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2981" instrument_node=""> and </span></span><span data-dcnode-id="2978" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2979" instrument_node="">A Grammar of Motives</span></span><span data-dcnode-id="2976" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2977" instrument_node="">. The latter set out a Nietzschean analytic for rhetorical criticism consisting of four master tropes and a dramatically constructionist understanding of the relationship between discourse and social reality. In the 1960s and 70s, rhetorical scholars erupted into conflict over Robert Scott's "On Viewing Rhetoric as Epistemic," which dramatically shaped rhetorical studies today. At stake in the epistemic rhetoric debate was whether rhetoric abided by rules of an objectively perceptable world, or if rhetoric created the illusion of human objectivity. This circular argument birthed a number of connections between rhetoric and other popular critical terms/turns, including the rhetoric of science and technology, the rhetorical criticism of ideology, psychoanalytic methods for rhetorical criticism, the rhetorical criticism of affect and emotion, deconstruction, and most recently, what has been called "new materialism".  </span></span></p><span data-dcnode-id="2974" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2971" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2972" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2973" instrument_node="">As for myself, I am on the fence. I try to remember the fact that rhetoric was something genuninely dangerous and powerful, powerful because it was used to move opinon through feeling. Under the circumstances, it seems like a powerful alternative to war and to the insecurity of a disorganized society. Moreover, it seems like a fallacy to assume that the tradition of philosophy, because it succeeded rhetoric, must have caused its demise, or was necessarily superior system for describing popular and political motivation.  Part of rhetoric's power is in remembering its danger -- and its centrality within the Classical tradition, which has been so powerful that it has lasted until today. Few disciplines can claim to reach as far back as  Rhetoric, and some will likely argue that it is because what it is becoming bears little resemblance to what it once was. </span></span></p><span data-dcnode-id="2970" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2963" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2968" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2969" instrument_node="">For me, the easiest way to summarize rhetoric is to describe it as what speaks </span></span><span data-dcnode-id="2966" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2967" instrument_node="">through </span></span><span data-dcnode-id="2964" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2965" instrument_node="">language. It's not the meaning or intentions behind the words, but much more active. It's not just the style, arrangement, tenor, or intensity of a speech, but also what compels us to make a habit of recording our style, arrangement, tenor, and intensity as an essential feature of what makes us humans, individuals, and citizens.  It's something that langauge always does in the saying -- consistently or compulsively -- and includes but is not limited to habits of forgetting, remembering, imagining the future, and taking stock of the present. It's hard to define because what rhetoric really 'is' because this 'is' always outside our reach while we're 'in' it.</span></span></p><span data-dcnode-id="2962" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2959" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2960" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2961" instrument_node="">That's my first shot at a definition, and it's typically unsafe to hang your hat on any one definition that's out there. But I like to believe that the plurality of definitions of rhetoric is a symptom of what rhetoric 'is' -- which always has yet to come to light.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2882" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2883" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2884" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2898" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2925" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2926" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2936" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2937" style="box-sizing: border-box; position: relative;"><button aria-label="20 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="2938" role="button" style="box-sizing: border-box; font: inhe v></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--none qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="2747" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="2748" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2749" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="2792" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="2750" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="2772" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="2773" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="2774" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="2775" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="2776" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2789" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2790" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2791" instrument_node="">The answer has to do more with discipline-based politics than with the fundamental content. In the 1920s, particularly in the United States, the classical field of “rhetoric” — as old as Aristotle and Isocrates (4th Century BCE dudes) began to shift its collegiate instructional focus towards one primary medium of persuasion, the one that had evolved along the lines of the written word. Public speeches were still a thing and were still very popular, amply aided by the advent of radio, and many schools continued to teach classical Rhetoric in all its splendor—the Five Canons; Aristotle’s Ethos, </span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2777" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2778" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2779" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2780" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="2781" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="2786" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="2787" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="2788" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="2782" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="2783"><svg data-dcnode-id="2784" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="2785" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="2751" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="2752" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="2753"><span class="q-box qu-userSelect--text" data-dcnode-id="2754" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2769" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2770" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2771" instrument_node="">The answer has to do more with discipline-based politics than with the fundamental content. In the 1920s, particularly in the United States, the classical field of “rhetoric” — as old as Aristotle and Isocrates (4th Century BCE dudes) began to shift its collegiate instructional focus towards one primary medium of persuasion, the one that had evolved along the lines of the written word. Public speeches were still a thing and were still very popular, amply aided by the advent of radio, and many schools continued to teach classical Rhetoric in all its splendor—the Five Canons; Aristotle’s Ethos, Pathos, Logos; styles of delivery; logical arguments and chains of evidence; elocution and its spin-offs—how to project your voice, speaking stances, facial expressions, stage gestures, etc. These had all been part of what is now called a “classical education.” The earliest public speeches recorded on film amply demonstrate that this approach was still very much in vogue up into the 1940s.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="2766" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="2767" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="2768" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-a0029f3ed81ef8d640d001409474ad81-pjlq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2763" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2764" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2765" instrument_node="">In the post WWII United States, with the proliferation of land grant universities and the GI Bill, the “general education core” emerged as universities began to split between undergraduate and graduate studies. The first two years began to focus on fundamental skills, while the “majors” developed as vocational preparation or as introduction to graduate school. “English” emerged as a very popular field of study, but to teach in this discipline as it began to take shape over the 50s and 60s, one had to be willing to pay one’s dues teaching “English composition,” which, for the sake of compression and convenience, began to focus on written persuasion at first, then more and more on basic grammar and essay technique. The latter shift came as secondary schools across the country began to scale back teaching English language skills. Universities had to pick up the slack. So while the second semester course in Composition does get at Rhetorical stuff, a lot of instructional scaffolding that was originally designed to be part of earlier learning is now a regular feature. “Speech” was designed as an entirely different course, taught by people with very different academic preparation. And speech courses were also a seriously reduced version of the old rhetorical training, treating the spoken word very differently from the written word as a result.</span></span></p><span data-dcnode-id="2762" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2759" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2760" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2761" instrument_node="">Rhetoric is still an academic field in its own right, but it has morphed into something very different from Aristotle’s time, and the small numbers of people who study and research it are vastly outnumbered by English Rhet/Comp and people in the Communication social sciences (a spin-off of social psychology), as well as folks in speech pathology.</span></span></p><span data-dcnode-id="2758" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2755" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2756" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2757" instrument_node="">Most “pure rhetoricians” today are humanities scholars (classicists), forensic speech and debate coaches, political discourse analysts (speeches, campaigns and strategic comm) or media critics (media being anything from fine arts to graffiti).</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2683" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2684" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="2685" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="2699" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="2721" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="2722" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="2732" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="2733" style="box-sizing: border-box; position: relative;"><button aria-label="1 upvote" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill a shame, but we’ve lost respect for rhetoric in its original sense as the skill of building up a logical presentation that can influence people’s opinions.</span></span></p><span data-dcnode-id="2567" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2564" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2565" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2566" instrument_node="">“Rhetorical” is an adjective with t</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="2552" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="2553" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="2554" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="2555" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-fl le="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2546" instrument_node="">Traditionally “rhetoric,” the noun, was the study of effective argument. It was an academic discipline; students were taught rhetoric in order to make them persuasive writers and competent participants in civic discourse. Over time, the meaning shifted. Now, to many people, “rhetoric” is empty argument, with little substance. “Senator Foghorn made a 40-minute speech, all rhetoric, no new information.” It’s a shame, but we’ve lost respect for rhetoric in its original sense as the skill of building up a logical presentation that can influence people’s opinions.</span></span></p><span data-dcnode-id="2543" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2540" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2541" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2542" instrument_node="">“Rhetorical” is an adjective with the basic meaning “pertaining to rhetoric,” but it has an additional meaning in the idiom “rhetorical question.” A “rhetorical question” is one that doesn’t really seek information but instead moves a discussion forward. For example, I might say: “How are we going to dress for the party? The hosts will be wearing the latest trendy stuff, and everyone will be looking at everyone…” I’m not really asking for information about how to dress; I’m making the point that how to dress is an issue in deciding whether to attend the party. It’s a rhetorical question. A candidate speaking to a huge audience might say, “Friends, what are the biggest issues for us here in Ohio?” She’s not asking for people to raise their hands and suggest issues; it’s a rhetorical question that she uses to introduce her own discussion.</span></span></p></span></span></div></div></div></div></div></d "q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2355" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2364" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2365" instrument_node="">Rhetoric was a field of study started in ancient Greece by studying speeches and asking why some were more persuasive than others. Out of this emerged an educational system aimed at eloquence and capable democratic participation. One of the first rhetoric schools was founded by Isocrates (student of Socrates and Gorgias) and was credited with fostering some of the most distinguished men in Athens. Aristotle wrote his </span></span><span data-dcnode-id="2362" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2363" instrument_node="">Rhetoric </span></span><span data-dcnode-id="2360" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2361" instrument_node="">trying to make the field more rigorous, but Plato often argued against a group of rhetoric teachers and claimed dialectic was a better system than their educational system, even though he offers his own guidelines on rhetoric in </span></span><span data-dcnode-id="2358" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2359" instrument_node="">Phaedrus</span></span><span data-dcnode-id="2356" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2357" instrument_node="">. Plato's branding of rhetoric as speech aimed at effect rather than truth has been revived in some modern usage, but it is used very inconsistently and incorrectly. Martin Luther King's speeches are a great example of rhetoric and he makes use of rhetoric teachings handed down from Frederick Douglass, who learned how to debate against slavery from a rhetoric manual, to create something both moving and, in my opinion, true. The pejorative meaning to the word rhetoric seems to be that someone is using words purely for their effect without any sincerity behind them.</span></span></p><span data-dcnode-id="2354" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2351" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2352" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2353" instrument_node="">According to usage, I would say there are a few different ways rhetoric is being used:</span></span></p><span data-dcnode-id="2350" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2347" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2348" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2349" instrument_node="">- rhetoric as manipulation, usually employing emotions unethically to appeal to people's prejudices ("Trump's speeches are cheap rhetoric")</span></span></p><span data-dcnode-id="2346" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2343" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2344" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2345" instrument_node="">- rhetoric as verbal fight, possible precursor to war ("Rhetoric heats up between Saudi-Arabia and Iran")</span></span></p><span data-dcnode-id="2342" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2339" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2340" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2341" instrument_node=""> - rhetoric as the world view created by language ("Obama's rhetoric displays assumptions of a Post-American world")</span></span></p><span data-dcnode-id="2338" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2335" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2336" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2337" instrument_node="">- rhetoric as language that has political effects ("Obama's rhetoric is divisive")</span></span></p><span data-dcnode-id="2334" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2331" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2332" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2333" instrument_node="">- rhetoric as somehow opposed to argument ("Calling your opponent liberal is not an argument, it is just rhetoric")</span></span></p><span data-dcnode-id="2330" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2327" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2328" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2329" instrument_node="">Here are some accurate ways of describing rhetoric according to established authorities in language and communications: </span></span></p><span data-dcnode-id="2326" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2319" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2324" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2325" instrument_node="">- "The realm of rhetoric is the entire universe of argumentative discourse" (</span></span><span data-dcnode-id="2322" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2323" instrument_node="">The Realm of Rhetoric, </span></span><span data-dcnode-id="2320" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2321" instrument_node="">Chaim Perelman)</span></span></p><span data-dcnode-id="2318" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2311" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2316" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2317" instrument_node="">- Rhetorical argumentation aims to "induce or increase the mind's adherence to the theses presented for its assent" and "as soon as a communication tries to influence one or more persons, to orient their thinking, to excite or calm their emotions, to guide their actions, it belongs to the realm of rhetoric" (</span></span><span data-dcnode-id="2314" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2315" instrument_node="">The New Rhetoric, </span></span><span data-dcnode-id="2312" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2313" instrument_node="">Chaim Perelman)</span></span></p><span data-dcnode-id="2310" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2303" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2308" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2309" instrument_node="">- Rhetoric is "the use of symbols (language, sounds, images, math, etc) in order to induce cooperation" (Kenneth Burke, </span></span><span data-dcnode-id="2306" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2307" instrument_node="">A Rhetoric of Motives</span></span><span data-dcnode-id="2304" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2305" instrument_node="">).</span></span></p><span data-dcnode-id="2302" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2295" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2300" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2301" instrument_node="">So am I using rhetoric now? Absolutely. The proper way to view rhetoric is not as a specific genre of speech or writing. Rather, rhetoric is a function of language. It is looking at not what language is, as in grammar, but rather "what language </span></span><span data-dcnode-id="2298" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2299" instrument_node="">does</span></span><span data-dcnode-id="2296" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2297" instrument_node="">" and how it affects people socially. </span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="2223" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="2224" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div cl s="q-text qu-dynamicFontSize--regular_title qu-bold qu-color--gray_dark_dim qu-passColorToLinks qu-lineHeight--regular qu-wordBreak--break-word" data-dcnode-id="1988" style="box-sizing: border-box;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1989"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 TitleText___StyledCssInlineComponent-sc-1hpb63h-0 jPnwvF" data-dcnode-id="1990"><a class="q-box qu-display--block qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/How-have-you-used-rhetoric-in-real-life" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="1992" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="1993" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="1994" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="1995" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="1996" style="box-sizing: border-box;"><span data-dcnode-id="1997" style="background: none;"><span data-dcnode-id="1998" instrument_node="">How have you used rhetoric in real life?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--none qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="1933" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="1934" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="1935" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="1984" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="1936" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="1960" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="1961" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="1962" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="1963" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="1964" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1981" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1982" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1983" instrument_node="">I've used rhetoric in real life more ways than I could ever count. So has everyone else.</span></span></p><span data-dcnode-id="1980" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1977" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1978" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1979" instrument_node="">I define rhetoric as "the study and practice of using symbols to change the world." By "symbols," I mean anything that represents other things. A flag is a symbol. A swastika is a symbol. All words are also symbols. And by "change the world," I don't necessarily mean in any dramatic way. If you and your roommates have a discussion about what to eat for dinner, and you persuade them to go for pizza instead of cheeseburgers, that's a change in your world, brought about by the use of symbols (the words you use</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1965" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1966" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1967" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1968" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1969" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1974" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1975" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1976" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1970" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1971"><svg data-dcnode-id="1972" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1973" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1937" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1938" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1939"><span class="q-box qu-userSelect--text" data-dcnode-id="1940" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1957" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1958" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1959" instrument_node="">I've used rhetoric in real life more ways than I could ever count. So has everyone else.</span></span></p><span data-dcnode-id="1956" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1953" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1954" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1955" instrument_node="">I define rhetoric as "the study and practice of using symbols to change the world." By "symbols," I mean anything that represents other things. A flag is a symbol. A swastika is a symbol. All words are also symbols. And by "change the world," I don't necessarily mean in any dramatic way. If you and your roommates have a discussion about what to eat for dinner, and you persuade them to go for pizza instead of cheeseburgers, that's a change in your world, brought about by the use of symbols (the words you used).</span></span></p><span data-dcnode-id="1952" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1949" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1950" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1951" instrument_node="">As a number of rhetoricians have pointed out, we start using rhetoric in infancy, even before we can use words. Crying babies send messages to their parents that lead to changes in the contents of their diapers or their stomachs.</span></span></p><span data-dcnode-id="1948" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1945" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1946" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1947" instrument_node="">But say you don't accept my definition. That's fine. It is, after all, a definition used by only one teacher of rhetoric. A much more common one is "the art of persuasion." But again, this is an activity we perform every day. It's what you're doing when you argue for pizza, and it's what you're doing when you wear a certain outfit to persuade people to think of you a certain way.</span></span></p><span data-dcnode-id="1944" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1941" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1942" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1943" instrument_node="">I've used rhetoric in all of those ways. Using rhetoric isn't something we can avoid.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1874" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1875" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1876" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1890" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1912" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1913" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1923" style="box-sizing: border-box  our life. It can be showed in communication, writing, speech, advertisement, politics, communication and so on. Sometimes, rhetoric can help you achieve your purpose. But if rhetoric is overused, it will bring negative effect. As for the way of using rhetoric, people can utilize three appeals including ethos, pathos, and logos and technic like metaphor and synecdoche etc. More detailed, ethos means authority and people may introduce their backgrounds to show their credibility when they are giving speeches. Pathos means emotions and people may emotional words or stories to gain sympathy. Logos means evidence and people may use examples to demonstrate what they are talking about. Metaphor is easy to understand and it means people will use a word or phase to describe something else. Synecdoche means using the part to represent the whole. Apart from what I mentioned, there are many ways about hoe to use rhetoric and I hope my answers will help you.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="990" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="991" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="992" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1006" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1028" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1029" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1039" style="b >Why do people say "it's just rhetoric"?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--none qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="492" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="493" style="box-sizing: border-box;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="494" style="box-sizing: border-box;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="495" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="496" style="box-sizing: border-box;"><p class="q-text qu-display--inline qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="497" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="498" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="499" instrument_node="">So that people will not get caught up in the language and argue a point that they're not making.  For instance, if I say "Everyone in Ohio is fat" then my meaning is that Ohio has an obesity problem.  But someone might point to a skinny person in Ohio and say "But see you're wrong because he's not fat."  They'd be missing the point, though.  One person would prove the literal statement false, but that was rhetorical.  So, to get the person back on track you could say "It's just rhetoric."</span></span></p></span></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="428" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="429" style="box-sizing: border-box; trans
