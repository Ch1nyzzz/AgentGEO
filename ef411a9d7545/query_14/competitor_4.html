ta-dcnode-id="1067" decoding="async" sizes="(min-width: 64em) 1600px, (min-width: 48em) 950px, (min-width: 26.5625em) 690px, 410px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cms.qz.com/wp-content/uploads/2017/02/bannon-ap-evan-vucci.jpg%3Fquality%3D75%26strip%3Dall%26w%3D410%26h%3D231&amp;raw" srcset="https://cms.qz.com/wp-content/uploads/2017/02/bannon-ap-evan-vucci.jpg?quality=75&amp;strip=all&amp;w=410&amp;h=231 410w, https://cms.qz.com/wp-content/uploads/2017/02/bannon-ap-evan-vucci.jpg?quality=75&amp;strip=all&amp;w=820&amp;h=462 820w, https://cms.qz.com/wp-content/uploads/2017/02/bannon-ap-evan-vucci.jpg?quality=75&amp;strip=all&amp;w=690&amp;h=388 690w, https://cms.qz.com/wp-content/uploads/2017/02/bannon-ap-evan-vucci.jpg?quality=75&amp;strip=all&amp;w=1380&amp;h=776 1380w, https://cms.qz.com/wp-content/uploads/2017/02/bannon-ap-evan-vucci.jpg?quality=75&amp;strip=all&amp;w=950&amp;h=535 950w, https://cms.qz.com/wp-content/uploads/2017/02/bannon-ap-evan-vucci.jpg?quality=75&amp;strip=all&amp;w=1900&amp;h=1070 1900w, https://cms.qz.com/wp-content/uploads/2017/02/bannon-ap-evan-vucci.jpg?quality=75&amp;strip=all&amp;w=1600&amp;h=900 1600w, https://cms.qz.com/wp-content/uploads/2017/02/bannon-ap-evan-vucci.jpg?quality=75&amp;strip=all&amp;w=3200&amp;h=1800 3200w"></div><div class="HywHC" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">AP/Evan Vucci</span></div></div><figcaption class="JtiZO h_D4U" data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Trumpmeister.</span></figcaption></figure></header><div data-dcnode-id="618"><div class="l_Zm4" data-dcnode-id="619"><div class="fDcR9" data-dcnode-id="620"><div class="qzb7o" data-dcnode-id="621"><div class="jL0ST" data-dcnode-id="1047"><a class="TzTD4" data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qz.com/on/america-first/"><div class="P2ZSF" data-dcnode-id="1049"><div class="NJc8G" data-dcnode-id="1052"><div class="LbQYo" data-dcnode-id="1056"><div class="zO7Xh undefined" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">From our Obsession</span></div></div><div class="duToo rGA55" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">“America First”</span></div><span data-dcnode-id="1053" instrument_node=""></span></div><svg class="nrbqS" data-dcnode-id="1050" height="12" viewBox="0 0 8 12" width="8" xmlns="http://www.w3.org/2000/svg"><path d="M1.777 12L8 6.022l-.023-.023L8 5.977 1.779 0 0 1.708l4.466 4.29L0 10.292z" data-dcnode-id="1051"></path></svg></div></a></div><div class="G8VY0" data-dcnode-id="1019"><div class="MiiXW" data-dcnode-id="1020"><div class="QgHV9" data-dcnode-id="1027"><ul class="mdiUA" data-dcnode-id="1038"><li class="yer6v" data-dcnode-id="1043"><a class="bLQJn" data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qz.com/author/gguilfordqz/"><div class="psOsu oWavT" data-dcnode-id="1045"><img alt="Gwynn Guilford" class="JqhSy" data-dcnode-id="1046" decoding="async" height="40" loading="lazy" sizes="40px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cms.qz.com/wp-content/uploads/2017/01/gg-headshot2.jpg%3Fquality%3D75%26strip%3Dall%26w%3D40%26h%3D40&amp;raw" srcset="https://cms.qz.com/wp-content/uploads/2017/01/gg-headshot2.jpg?quality=75&amp;strip=all&amp;w=40&amp;h=40&amp;crop=1 40w,https://cms.qz.com/wp-content/uploads/2017/01/gg-headshot2.jpg?quality=75&amp;strip=all&amp;w=80&amp;h=80&amp;crop=1 80w" width="40"></div></a></li><li class="yer6v" data-dcnode-id="1039"><a class="bLQJn" data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qz.com/author/nsonnadqz/"><div class="psOsu oWavT" data-dcnode-id="1041"><img alt="Nikhil Sonnad" class="JqhSy" data-dcnode-id="1042" decoding="async" height="40" loading="lazy" sizes="40px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cms.qz.com/wp-content/uploads/2014/08/tgm-mug-square.jpg%3Fquality%3D75%26strip%3Dall%26w%3D40%26h%3D40&amp;raw" srcset="https://cms.qz.com/wp-content/uploads/2014/08/tgm-mug-square.jpg?quality=75&amp;strip=all&amp;w=40&amp;h=40&amp;crop=1 40w,https://cms.qz.com/wp-content/uploads/2014/08/tgm-mug-square.jpg?quality=75&amp;strip=all&amp;w=80&amp;h=80&amp;crop=1 80w" width="40"></div></a></li></ul><div class="Q4Z6o" data-dcnode-id="1028"><span data-dcnode-id="1037" instrument_node="">By </span><span class="mvst6" data-dcnode-id="1034"><a class="gRpQg" data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qz.com/author/gguilfordqz/"><span data-dcnode-id="1036" instrument_node="">Gwynn Guilford</span></a></span><span data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node=""> &amp; </span></span><span class="mvst6" data-dcnode-id="1029"><a class="gRpQg" data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qz.com/author/nsonnadqz/"><span data-dcnode-id="1031" instrument_node="">Nikhil Sonnad</span></a></span></div></div><div class="rpyRU" data-dcnode-id="1021"><span data-dcnode-id="1026" instrument_node="">Published </span><time data-dcnode-id="1024" datetime="2017-02-03T12:00:54.000Z"><span data-dcnode-id="1025" instrument_node="">February 3, 2017</span></time><span class="Qh9JI" data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">This article is more than 2 years old.</span></span></div></div></div><div data-dcnode-id="622" id="article-content"><div data-dcnode-id="623"><p class="v2pOr" data-dcnode-id="1008"><span data-dcnode-id="1018" instrument_node="">What does Donald Trump want for America? His supporters </span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vox.com/science-and-health/2016/12/13/13848794/kentucky-obamacare-trump"><span data-dcnode-id="1017" instrument_node="">don’t know</span></a><span data-dcnode-id="1015" instrument_node="">. His </span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vox.com/policy-and-politics/2017/1/23/14356032/trump-executive-order-obamacare-confusing"><span data-dcnode-id="1014" instrument_node="">party&nbsp;doesn’t know</span></a><span data-dcnode-id="1012" instrument_node="">. Even </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Ftime_continue%3D4%26v%3DkSE-XoVKaXg"><span data-dcnode-id="1011" instrument_node="">he doesn’t know</span></a><span data-dcnode-id="1009" instrument_node="">.</span></p><p class="v2pOr" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">If there is a political vision underlying Trumpism, however, the person to ask is not Trump. It’s his éminence grise, Stephen K. Bannon, the chief strategist of the Trump administration.</span></p><p class="v2pOr" data-dcnode-id="1001"><span data-dcnode-id="1005" instrument_node="">Bannon transcended his&nbsp;working-class&nbsp;Virginia roots with&nbsp;a stint in the Navy and a degree from&nbsp;Harvard Business School, followed by a&nbsp;career as a&nbsp;Goldman Sachs financier. He moved to Los Angeles&nbsp;to invest in media and entertainment for Goldman, before starting his own investment bank specializing in media. Through a&nbsp;combination of luck (a fallen-through deal left him with&nbsp;a stake in a hit show called </span><em data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Seinfeld)</span></em><span data-dcnode-id="1002" instrument_node=""> and a knack for voicing outrage, Bannon remade&nbsp;himself&nbsp;as a minor luminary&nbsp;within the far edge of right-wing politics, writing and directing a slew of increasingly conservative documentaries.</span></p><div class="NyOBS inline-slot NvRBY cpBns mtZav" data-dcnode-id="998"><div class="article-content-ad" data-dcnode-id="999"><div data-dcnode-id="1000" id="inline-1"></div></div></div><div data-dcnode-id="994"><div class="NyOBS sponsored-essential-slot PCTCS" data-dcnode-id="995"><div data-dcnode-id="996"><div data-dcnode-id="997" id="gpt-slot-1"></div></div></div></div><p class="v2pOr" data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Bannon’s influence reached a new high in 2012 when he took over Breitbart News, an online news site,&nbsp;following the death of creator Andrew Breitbart.&nbsp;While at Breitbart, Bannon&nbsp;ran a popular talk radio call-in show and&nbsp;launched a flame-throwing assault on&nbsp;mainstream Republicans, embracing instead a fringe cast of ultra-conservative figures. Among them was Trump, a&nbsp;frequent guest of the&nbsp;show. They established&nbsp;a relationship that eventually led Bannon to&nbsp;mastermind Trump’s populist romp to the White House, culminating in his taking the administration’s most senior position (alongside the chief of staff,&nbsp;Reince Priebus).</span></p><p class="v2pOr" data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">It’s impossible to know for sure&nbsp;what Bannon will do with his newfound power; he honors&nbsp;few interview requests lately, ours included. (The White House did not respond to our request to speak with Bannon.) But his time as a conservative filmmaker and head of Breitbart News reveals a grand theory of what America should be. Using the vast amount of Bannon’s own publicly available words—from his lectures, interviews, films and more—we can construct&nbsp;elements of the vision for America he hopes to realize&nbsp;in the era of Trump.</span></p><h2 class="z_k77" data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">The three tenets of Bannonism</span></h2><p class="v2pOr" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Bannon’s political philosophy boils down to three things that a Western country, and America in particular,&nbsp;needs to be successful:&nbsp;Capitalism, nationalism, and “Judeo-Christian values.”&nbsp;These are all deeply related, and essential.</span></p><div class="NyOBS inline-slot NvRBY cpBns mtZav" data-dcnode-id="983"><div class="article-content-ad" data-dcnode-id="984"><div data-dcnode-id="985" id="inline-2"></div></div></div><p class="v2pOr" data-dcnode-id="978"><span data-dcnode-id="982" instrument_node="">America, says Bannon, is suffering a “crisis of capitalism.” (He uses the word “crisis” a lot—more on that later.) Capitalism used to be all about moderation, an&nbsp;entrepreneurial American spirit, and respect for one’s fellow Christian man. In fact, in </span><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buzzfeed.com/lesterfeder/this-is-how-steve-bannon-sees-the-entire-world"><span data-dcnode-id="981" instrument_node="">remarks</span></a><span data-dcnode-id="979" instrument_node=""> delivered to the Vatican in 2014, Bannon says that this “enlightened capitalism” was&nbsp;the “underlying principle” that allowed the US to escape&nbsp;the “barbarism” of the 20th century.</span></p><p class="v2pOr" data-dcnode-id="973"><span data-dcnode-id="977" instrument_node="">Since this enlightened era, things have gradually gotten&nbsp;worse. (Hence the “crisis.”) The downward trend began with&nbsp;the 1960s and ’70s counterculture. “The baby boomers are the most spoiled, most self-centered, most narcissistic generation the country’s ever produced,” says Bannon in a </span><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DIEsYy01HWt4"><span data-dcnode-id="976" instrument_node="">2011 interview</span></a><span data-dcnode-id="974" instrument_node="">.</span></p><p class="v2pOr" data-dcnode-id="968"><span data-dcnode-id="972" instrument_node="">He takes on this issue&nbsp;in more detail&nbsp;in&nbsp;</span><em data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Generation Zero</span></em><span data-dcnode-id="969" instrument_node="">, a 2010 documentary he&nbsp;wrote and directed.&nbsp;The&nbsp;film shows one interviewee&nbsp;after another&nbsp;laying out how the “capitalist system” was slowly undermined and destroyed by a generation of wealthy young kids who had their&nbsp;material needs taken care of by hardworking parents—whose values were shaped by the hardship of the Great Depression&nbsp;and World War II—only to cast off the&nbsp;American values that had created that wealth in the first place. This shift gave rise to socialist policies that encouraged dependency on the government, weakening&nbsp;capitalism.</span></p><div class="NyOBS inline-slot NvRBY cpBns mtZav" data-dcnode-id="965"><div class="article-content-ad" data-dcnode-id="966"><div data-dcnode-id="967" id="inline-3"></div></div></div><p class="v2pOr" data-dcnode-id="957"><span data-dcnode-id="964" instrument_node="">Eventually, this socialist vision succeeded in infiltrating the very highest levels of institutional power in America. “By the late 1990s, the left had taken over many of the institutions of power, meaning government, media, and academe,” says Peter Schweizer, a writer affiliated with Bannon’s Government Accountability Institute, a conservative think tank, in </span><em data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Generation Zero</span></em><span data-dcnode-id="961" instrument_node="">. “And it was from these places and positions of power that they were able to disrupt the system and implement a strategy that was designed to ultimately undermine the capitalist system.” (As he says “undermine the capitalist system,” the film zooms in on the word “Lucifer” in that now-infamous </span><a data-dcnode-id="959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.snopes.com/saul-alinsky-dedicated-rules-for-radicals-to-lucifer/"><span data-dcnode-id="960" instrument_node="">epigraph</span></a><span data-dcnode-id="958" instrument_node=""> from Saul Alinsky.)</span></p><p class="v2pOr" data-dcnode-id="949"><span data-dcnode-id="956" instrument_node="">Underlying all of this is the philosophy of Edmund Burke, an influential 18th-century Irish political thinker whom Bannon occasionally references. In </span><em data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Reflections on the Revolution in France,&nbsp;</span></em><span data-dcnode-id="953" instrument_node="">Burke presents his view&nbsp;that the basis of a successful society should not be abstract notions like human rights, social justice, or equality. Rather, societies work best when traditions that have been shown to work are passed from generation to generation. The baby boomers, Bannon says in </span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D7nTd2ZAX_tc"><span data-dcnode-id="952" instrument_node="">a lecture</span></a><span data-dcnode-id="950" instrument_node=""> given to the Liberty Restoration Foundation (LRF), failed to live up to that Burkean responsibility by abandoning the tried-and-true values of their parents (nationalism, modesty, patriarchy, religion) in favor of new abstractions (pluralism, sexuality, egalitarianism, secularism).</span></p><p class="v2pOr" data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">For both Burke and Bannon, failure to&nbsp;pass the torch results in social chaos.</span></p><figure class="woeAo Oes_5 Y5ceB" data-dcnode-id="938"><div class="wycFL" data-dcnode-id="941"><div class="pf9tX" data-dcnode-id="944" style="padding-bottom:56.22222222222222%"><noscript data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">&lt;img src="https://cms.qz.com/wp-content/uploads/2017/01/bannon-trump-inauguration-e1486011934380.jpg?quality=75&amp;amp;strip=all&amp;amp;w=450&amp;amp;h=253&amp;amp;crop=1" alt="Steve Bannon, appointed chief strategist and senior counselor to President-elect Donald Trump, arrives for the Presidential Inauguration of Trump at the US Capitol in Washington, DC, January 20, 2017."/&gt;</span></noscript></div><div class="zWFkh" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">AFP Photo/Pool/Saul Loeb</span></div></div><figcaption class="FCO4L" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Bannon at Trump’s inauguration.</span></figcaption></figure><h2 class="z_k77" data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">The new liberal order</span></h2><p class="v2pOr" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Once in power, the&nbsp;liberal, secular, global-minded elite overhauled the institutions of democracy and capitalism to tighten its grip on power and the&nbsp;ability to enrich itself. The “party of Davos,”&nbsp;as Bannon long ago dubbed this clique, has warped capitalism’s institutions, depriving middle classes everywhere of the wealth they deserve.</span></p><div class="NyOBS inline-slot NvRBY cpBns mtZav" data-dcnode-id="931"><div class="article-content-ad" data-dcnode-id="932"><div data-dcnode-id="933" id="inline-4"></div></div></div><p class="v2pOr" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">This pattern of exploitation came to a head in the 2008 global financial and economic crisis. Wall Street—enabled by fellow global elites in government—spun profits out of speculation instead of investing their wealth in domestic jobs and businesses. When the resulting bubble finally burst, the immoral government&nbsp;stuck hardworking American taxpayers with the bailout bill.</span></p><p class="v2pOr" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">This is the kind of thing that led Bannon to say in that 2011 LRF lecture&nbsp;that there is “socialism for the very wealthy.” The rest of the country, he says, is “common sense, practical, middle-class people.”</span></p><p class="v2pOr" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">There is also “socialism for the very poor,” he adds. “We’ve built a welfare state that is completely and totally unsupportable, and now this is a crisis.”</span></p><div class="NyOBS inline-slot NvRBY cpBns mtZav" data-dcnode-id="922"><div class="article-content-ad" data-dcnode-id="923"><div data-dcnode-id="924" id="inline-5"></div></div></div><p class="v2pOr" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Bannon wants all of this liberal-sponsored “socialism” to end. He celebrates CNBC host Rick Santelli’s famous 2009 tirade&nbsp;about “those who carry the water and those who drink the water,” which sparked what became the Tea Party, a populist movement focused on tax cuts,&nbsp;fiscal scrimping, and a narrow&nbsp;interpretation of constitutional rights.&nbsp;Channeling the&nbsp;spirit of the&nbsp;Tea Party, Bannon blames Republicans&nbsp;as much as Democrats for taking part in cronyism and corruption at the expense of middle class&nbsp;families.</span></p><p class="v2pOr" data-dcnode-id="915"><span data-dcnode-id="919" instrument_node="">“We don’t really believe there is a functional conservative party in this country and we certainly don’t think the Republican Party is that,”&nbsp;says Bannon in a </span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DRMCsK0wxjzo"><span data-dcnode-id="918" instrument_node="">2013 panel</span></a><span data-dcnode-id="916" instrument_node=""> in which he discusses Breitbart’s vision. “We tend to look at this imperial city of Washington, this boomtown, as they have two groups, or two parties, that represent the insiders’ commercial party, and that is a collection of insider deals, insider transactions and a budding aristocracy that has made this the wealthiest city in the country.”</span></p><p class="v2pOr" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">In short, in Bannonism, the crisis of capitalism has led to socialism and the&nbsp;suffering of the middle class. And it has made it impossible for the current generation to bequeath a better future to its successors, to fulfill its&nbsp;Burkean duty.</span></p><h2 class="z_k77" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Judeo-Christian values</span></h2><p class="v2pOr" data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">So what exactly are these traditions that Americans are meant to pass along to future generations? In addition to “crisis of capitalism,” one of Bannon’s favorite terms is “Judeo-Christian values.” This is the second element of his theory of America.</span></p><div class="NyOBS inline-slot NvRBY cpBns mtZav" data-dcnode-id="906"><div class="article-content-ad" data-dcnode-id="907"><div data-dcnode-id="908" id="inline-6"></div></div></div><p class="v2pOr" data-dcnode-id="902"><i data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Generation Zero,</span></i><span data-dcnode-id="903" instrument_node="">&nbsp;Bannon’s&nbsp;2010 documentary, has a lot to say about “American values,” and a lot of this matches closely the ideals of the Tea Party.&nbsp;But since 2013 or 2014, Bannon’s casual emphasis on American values has swelled to include a strong religious component. The successful functioning of America—and Western civilization in general—depends on capitalism, and capitalism depends on the presence of “Judeo-Christian values.”</span></p><p class="v2pOr" data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">For Bannon,&nbsp;capitalism was&nbsp;not only&nbsp;responsible for bringing the US out of the war successfully; it also brought about the restoration of Europe and the Pax Americana that followed, he&nbsp;explains in his 2014 speech to the Vatican conference. But capitalism alone is not enough. Unmoored from a Judeo-Christian moral framework, capitalism can be a force of harm and injustice—exemplified by the US’s economic decline.</span></p><p class="v2pOr" data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">To restore the health&nbsp;of America’s economy and patch its shredded&nbsp;social fabric, Bannon wants capitalism to be re-anchored by the Judeo-Christian values he believes made the country great&nbsp;throughout its&nbsp;history. This shared morality ensures that businesses invest not just for their own benefit, but also for the good of native workers&nbsp;and future generations.</span></p><div class="NyOBS inline-slot NvRBY cpBns mtZav" data-dcnode-id="895"><div class="article-content-ad" data-dcnode-id="896"><div data-dcnode-id="897" id="inline-7"></div></div></div><p class="v2pOr" data-dcnode-id="890"><span data-dcnode-id="894" instrument_node="">As in Burke’s view, human rights and civil society do not&nbsp;come from anything abstract, but from tradition. For Bannon, this tradition is God; nation-states that establish people as the arbiters of truth and justice will ultimately give way to tyranny. The “ultimate check on the power of the state is God’s teaching,” says&nbsp;Duck Dynasty’s Phil Robertson&nbsp;in </span><em data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Torchbearer</span></em><span data-dcnode-id="891" instrument_node="">, the 2016 documentary that&nbsp;Bannon co-wrote, directed and produced. The film is full of Robertson offering similar aphorisms about how society falls apart without a religious foundation.</span></p><p class="v2pOr" data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">It’s important to note that “Judeo-Christian values” does not necessarily seem to require that all citizens believe&nbsp;in Christianity. Bannon doesn’t appear to want to undo the&nbsp;separation of church and state or freedom of religion enshrined in America’s constitution. After all, both of these are traditions that have&nbsp;led America&nbsp;to success in the past. What he believes is that the founding fathers built the&nbsp;nation&nbsp;based on a set of values that come from the Judeo-Christian tradition.</span></p><p class="v2pOr" data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">In order to make sure the whole country is on board with these values, it must limit or halt the influx of people who do not share them&nbsp;by rallying around&nbsp;nationalism.&nbsp;And it is through&nbsp;this final ingredient—the primacy of the nation-state’s values and traditions—that America can drive a stake through the heart of the&nbsp;global, secular&nbsp;“establishment.”</span></p><h2 class="z_k77" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Nationalism</span></h2><p class="v2pOr" data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">In addition to enriching themselves&nbsp;and encouraging dependency among the poor, global elites&nbsp;also encourage immigrants to flood the US and drag down wages. Immigrant labor&nbsp;boosts the corporate profits of globalists and their cronies, who leave it to&nbsp;middle-class natives to educate, feed, and care for these foreigners. The atheistic, pluralist&nbsp;social order that has been allowed to flourish recoils at nationalism and patriotism, viewing them as intolerant and bigoted. Without the moral compass of our forefathers, the&nbsp;system is so&nbsp;adrift in&nbsp;relativism that it champions the “rights” of police-hating deadbeats, criminal aliens, and potential terrorists over ordinary Americans, turning cities into hotbeds of violence&nbsp;and undermining national security. As one interviewee declares&nbsp;in </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DFE1pu6pDI34"><span data-dcnode-id="882" instrument_node="">Border War: The Battle over Illegal Immigration</span></a><span data-dcnode-id="880" instrument_node="">, another&nbsp;of Bannon’s documentaries, “The right sees [undocumented immigrants] as cheap labor, the left sees this as cheap votes.”</span></p><figure class="woeAo E3L2p T1s0n" data-dcnode-id="870"><div class="wycFL" data-dcnode-id="873"><div class="pf9tX" data-dcnode-id="876" style="padding-bottom:63.333333333333336%"><noscript data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">&lt;img src="https://cms.qz.com/wp-content/uploads/2017/01/bannon-e1485784961402.jpg?quality=75&amp;amp;strip=all&amp;amp;w=450&amp;amp;h=285&amp;amp;crop=1" alt="Bannon, Republican presidential candidate Donald Trump&amp;amp;#039;s campaign chairman, attends Trump&amp;amp;#039;s Hispanic advisory roundtable meeting in New York, Saturday, Aug. 20, 2016."/&gt;</span></noscript></div><div class="zWFkh" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">AP/Gerald Herbert</span></div></div><figcaption class="FCO4L" data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">The ideologist.</span></figcaption></figure><p class="v2pOr" data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Mired in near-zero growth and financial chaos, the European Union epitomizes the catastrophic fate of a globalist system governed by elites who are not accountable to the citizens that elected them.</span></p><p class="v2pOr" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">“[P]eople, particularly in certain countries, want to see the sovereignty for their country, they want to see nationalism for their country,” Bannon says in the Vatican speech.&nbsp;“They don’t believe in this kind of pan-European Union or they don’t believe in the centralized government in the United States.”</span></p><div class="NyOBS inline-slot NvRBY cpBns mtZav" data-dcnode-id="863"><div class="article-content-ad" data-dcnode-id="864"><div data-dcnode-id="865" id="inline-8"></div></div></div><p class="v2pOr" data-dcnode-id="855"><span data-dcnode-id="862" instrument_node="">Nationalism, then, is the mechanism through which&nbsp;Judeo-Christian traditions and values&nbsp;become part of society. That’s because&nbsp;nationalism is fully inclusive, in the sense that it invites people of different backgrounds to unite under a common “American” sense of self. It&nbsp;dissolves minority identities—leading&nbsp;to the emphasis on&nbsp;“colorblindness” of “all lives matter” and opposition to affirmative action.&nbsp;This&nbsp;shared set of Judeo-Christian, nationalist values prevents minorities from claiming special rights.&nbsp;For instance, </span><i data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Generation Zero </span></i><span data-dcnode-id="859" instrument_node="">blames the 2007 housing collapse on “black victimization” that undermined capitalism and encouraged dependency on the government. At the same time, </span><i data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Torchbearer </span></i><span data-dcnode-id="856" instrument_node="">celebrates Dr. Martin Luther King Jr. as a paragon of traditional American morality because his view of human rights was based in Christianity.</span></p><p class="v2pOr" data-dcnode-id="850"><span data-dcnode-id="854" instrument_node="">The liberal elite’s&nbsp;pervasive emphasis on pluralism and minority rights—and its financial and political support of these groups—constrains shared American-ness. This erosion of Judeo-Christian nationalism&nbsp;weakens the country. Again, this applies&nbsp;not just to&nbsp;America, but also to&nbsp;other Western&nbsp;countries.&nbsp;As Bannon </span><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D-36PDP-2Fyw%26t%3D182s"><span data-dcnode-id="853" instrument_node="">declares</span></a><span data-dcnode-id="851" instrument_node=""> at a 2016 South Carolina Tea Party convention,&nbsp;the “swells, the investment bankers, the guys from the EU” are the “same guys who have allowed the complete collapse of the Judeo-Christian West in Europe.”</span></p><p class="v2pOr" data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">People who do not sign off on this set of shared values should not be welcome in the US.&nbsp;This logic forms the basis of Bannon’s&nbsp;opposition to immigrants, whose lack of democratic “DNA,” he believes, will harm society.</span></p><div class="NyOBS inline-slot NvRBY cpBns mtZav" data-dcnode-id="845"><div class="article-content-ad" data-dcnode-id="846"><div data-dcnode-id="847" id="inline-9"></div></div></div><p class="v2pOr" data-dcnode-id="837"><span data-dcnode-id="844" instrument_node="">“These are not Jeffersonian democrats,” Bannon said last year, referring to immigrants heading from Muslim majority countries to Europe, </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usatoday.com/story/news/2017/01/31/bannon-odds-islam-china-decades-us-foreign-policy-doctrine/97292068/"><span data-dcnode-id="843" instrument_node="">USA Today reported</span></a><span data-dcnode-id="841" instrument_node="">. “These are not people with thousands of years of democracy in their DNA coming up here.” That rationale might justify closing the borders to&nbsp;immigrants&nbsp;from Latin America, even though they are </span><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewforum.org/2014/11/13/religion-in-latin-america/"><span data-dcnode-id="840" instrument_node="">usually</span></a><span data-dcnode-id="838" instrument_node=""> devout Catholics.</span></p><h2 class="z_k77" data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">A&nbsp;theory of generations</span></h2><p class="v2pOr" data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">The crisis of capitalism and the undermining of the Judeo-Christian West&nbsp;that Bannon proclaims in his Vatican&nbsp;lecture&nbsp;is not an isolated event. It is, in his&nbsp;view, one of a repeated cycle of crises that occurs periodically, each of which inevitably culminates in war and conflict on a grand scale.</span></p><div class="NyOBS inline-slot NvRBY cpBns mtZav" data-dcnode-id="830"><div class="article-content-ad" data-dcnode-id="831"><div data-dcnode-id="832" id="inline-10"></div></div></div><p class="v2pOr" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">“This is the fourth great crisis in American history,” he says in the&nbsp;speech to the LRF. “We had the revolution, we had the Civil War, we had the Great Depression and World War II. This is the great Fourth Turning in American history.”</span></p><p class="v2pOr" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">What he is getting at here&nbsp;is based on the work of Neil Howe and William Strauss, two amateur historians who in the 1990s presented a “generational theory” of American history. The theory views American history through the lens of repeated cycles lasting roughly 80 years, about the length of a single&nbsp;lifetime. Within each 80-year cycle, say Howe and Strauss, are four “turnings”—periods of around 20 years that are characterized by a particular mood. These four moods are the “high,” “awakening,” “unraveling,” and, finally, “crisis.”</span></p><p class="v2pOr" data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">The theory is too vague to be proven wrong, and has not been taken seriously by most professional historians. But&nbsp;it is&nbsp;superficially compelling, and&nbsp;plots out&nbsp;to some degree how&nbsp;America’s&nbsp;history has unfolded since its&nbsp;founding.</span></p><p class="v2pOr" data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">It’s also clear how the generational theory fits with Bannon’s view that the&nbsp;slow erosion of Judeo-Christian values has been bad for the country. The most recent cycle, according to Howe and Strauss, went from the “high” of the postwar era—a time of which Bannon is particularly fond—to an “awakening” of activism in the ’60s, followed by an “unraveling” of institutions and shared values thanks to the individualism brought on by the preceding “awakening.” That brings us to the current crisis, the great “Fourth Turning,” following the American Revolution, Civil War, and the Great Depression/World War II.</span></p><h2 class="z_k77" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">How to solve the crisis: Large-scale&nbsp;conflict</span></h2><p class="v2pOr" data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">“Turnings”&nbsp;feature very heavily in </span><em data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Generation Zero</span></em><span data-dcnode-id="816" instrument_node="">. “Turnings are like the seasons—every turning is necessary,” says historian David Kaiser&nbsp;in the documentary, over&nbsp;stock footage of clocks ticking, suns rising, and butterflies emerging. “Cities are founded, cities collapse. States rise, states fall,” he continues.</span></p><p class="v2pOr" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">What exactly is the current crisis? Bannon’s view on it&nbsp;has evolved.&nbsp;In&nbsp;2010, he appears to have regarded it as the result of the debt racked up in the 2000s and the 2008 financial crisis.</span></p><p class="v2pOr" data-dcnode-id="808"><span data-dcnode-id="812" instrument_node="">“This accumulated debt at all levels of our society poses an immediate existential threat to America,” he says in a </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DJf_Yj5XxUE0%26t%3D535s"><span data-dcnode-id="811" instrument_node="">2010 speech</span></a><span data-dcnode-id="809" instrument_node=""> in New York City. “Now unlike the manufactured crises of global warming and healthcare, this is a true crisis. This crisis threatens the very sovereignty of our country.”</span></p><p class="v2pOr" data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">And in the 2011&nbsp;LRF&nbsp;lecture, when Bannon declares the US faces the “fourth great crisis in American history,”&nbsp;he&nbsp;still&nbsp;seems to suggest that it consists largely of&nbsp;the global financial crisis that began in 2008.</span></p><p class="v2pOr" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">But there’s more to it than that.&nbsp;Comparing the current crisis to events like the Revolutionary War and World War II,&nbsp;Bannon appears to believe&nbsp;that the US is heading inevitably&nbsp;toward violent conflict. This interpretation is backed up by other statements from and about Bannon.</span></p><p class="v2pOr" data-dcnode-id="794"><span data-dcnode-id="803" instrument_node="">David Kaiser, the&nbsp;historian interviewed in </span><em data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Generation Zero</span></em><span data-dcnode-id="800" instrument_node=""> and also a proponent of the Strauss-Howe theory, recently recounted his conversation with Bannon, including&nbsp;Bannon’s militaristic&nbsp;interpretation of the theory, </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//time.com/4575780/stephen-bannon-fourth-turning/"><span data-dcnode-id="799" instrument_node="">in </span><em data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Time</span></em></a><span data-dcnode-id="795" instrument_node="">:</span></p><blockquote class="UPUEz" data-dcnode-id="790"><div data-dcnode-id="791"><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">A second, more alarming interaction didn’t show up in the film. Bannon had clearly thought a long time both about the domestic potential and the foreign policy implications of Strauss and Howe. More than once during our interview, he pointed out that each of the three preceding crises had involved a great war, and those conflicts had increased in scope from the American Revolution through the Civil War to the Second World War. He expected a new and even bigger war as part of the current crisis, and he did not seem at all fazed by the prospect.</span></p></div></blockquote><p class="v2pOr" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Let’s follow the logic of this generational&nbsp;theory for a second: If a “high” only comes after a “crisis,” and if a “crisis” must necessarily be an increasingly large-scale war, Bannon is left searching for a major, existence-level enemy. Does the “Party of Davos” alone&nbsp;qualify? Who else could&nbsp;this war be fought against?</span></p><p class="v2pOr" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">In the 2014&nbsp;Vatican lecture, Bannon goes further. “I think we are in a crisis of the underpinnings of capitalism, and on top of that we’re now, I believe, at the beginning stages of a global war against Islamic fascism,” he says. Bannon adds:</span></p><blockquote class="UPUEz" data-dcnode-id="782"><div data-dcnode-id="783"><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">“This may be a little more militant than others…I believe you should take a very, very, very aggressive stance against radical Islam…. See what’s happening, and you will see we’re in a war of immense proportions.”</span></p></div></blockquote><h2 class="z_k77" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Bannon’s&nbsp;”global war against Islamic fascism”</span></h2><p class="v2pOr" data-dcnode-id="775"><span data-dcnode-id="779" instrument_node="">The fourth great civilizational showdown—a “</span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//soundcloud.com/breitbart/breitbart-news-daily-frank-gaffney-june-29-2016%23t%3D4%3A19"><span data-dcnode-id="778" instrument_node="">global existential war</span></a><span data-dcnode-id="776" instrument_node="">,” as Bannon describes it in July 2016—pits the “Judeo-Christian West” against “Islamic fascism”—especially&nbsp;ISIL. But the threat isn’t necessarily limited to ISIL.</span></p><p class="v2pOr" data-dcnode-id="764"><span data-dcnode-id="774" instrument_node="">Bannon’s remarks and his affiliations with anti-Muslim activists like Pamela Geller and Robert Spencer leave the impression that the enemy might well be Islam in general. As </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.breitbart.com/national-security/2014/04/21/dr-rodney-stark-75-of-religious-killings-are-muslims-killing-muslims/"><span data-dcnode-id="773" instrument_node="">Breitbart notes</span></a><span data-dcnode-id="771" instrument_node=""> in 2014,&nbsp;the “erudite Bannon”&nbsp;entertains the argument that Islam’s “war” against Christianity “originated almost from [Islam’s]&nbsp;inception.” He endorses the view that, in&nbsp;the lead-up to World War II,&nbsp;Islam was&nbsp;a “</span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//soundcloud.com/breitbart/breitbart-news-daily-dr-thomas-williams-january-6-2016%3Fin%3Dbreitbart/sets/breitbart-news-daily-january-6"><span data-dcnode-id="770" instrument_node="">much darker</span></a><span data-dcnode-id="768" instrument_node="">” force facing Europe than fascism. Other ideas&nbsp;he has&nbsp;supported&nbsp;</span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.motherjones.com/politics/2016/09/stephen-bannon-donald-trump-muslims-fear-loathing"><span data-dcnode-id="767" instrument_node="">include</span></a><span data-dcnode-id="765" instrument_node="">: a&nbsp;US nonprofit focused on promoting a favorable image of&nbsp;Muslims is a terrorist front; the Islamic Society of Boston mosque was behind the 2013 Boston Marathon bombing; and Muslim-Americans are trying to supplant the US constitution with Shariah law.</span></p><p class="v2pOr" data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Because Islam is rooted in anti-Christian violence, goes the logic,&nbsp;the only way to ensure that Muslims in America don’t pose a terrorist threat is to make sure they honor the US constitution as the rule of law and accept Judeo-Christian values.</span></p><h2 class="z_k77" data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">“Darkness, Darth Vader, and Dick Cheney”</span></h2><p class="v2pOr" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">There are a few loose ends in Bannon’s thinking—comments that seem consequential, but are vague or don’t&nbsp;fit clearly into any bigger&nbsp;vision.</span></p><p class="v2pOr" data-dcnode-id="744"><span data-dcnode-id="757" instrument_node="">Consider, for example, his statement that “darkness is good,” which he </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hollywoodreporter.com/news/steve-bannon-trump-tower-interview-trumps-strategist-plots-new-political-movement-948747"><span data-dcnode-id="756" instrument_node="">told</span></a><span data-dcnode-id="754" instrument_node=""> Michael Wolff of </span><em data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Hollywood Reporter</span></em><span data-dcnode-id="751" instrument_node="">. “Dick Cheney. Darth Vader. Satan. That’s power,” he continued. Or the statement, </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thedailybeast.com/articles/2016/08/22/steve-bannon-trump-s-top-guy-told-me-he-was-a-leninist.html"><span data-dcnode-id="750" instrument_node="">reported</span></a><span data-dcnode-id="748" instrument_node=""> by the </span><em data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Daily Beast</span></em><span data-dcnode-id="745" instrument_node="">, that Bannon views himself as a “Leninist” who wants to “bring everything crashing down, and destroy all of today’s establishment.”</span></p><p class="v2pOr" data-dcnode-id="739"><span data-dcnode-id="743" instrument_node="">The constant repetition of the phrase&nbsp;”Judeo-Christian values” should convince us that Bannon does not worship&nbsp;Satan. “Darkness is good” appears to suggest that the&nbsp;</span><em data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">perception</span></em><span data-dcnode-id="740" instrument_node=""> of being dark is good. The quote continues, “It only helps us when [liberals and the media] get it wrong. When they’re blind to who we are and what we’re doing.” Thus if the perception of him as a Darth Vader-like figure makes it easier for him to create his&nbsp;enlightened capitalist utopia, so be it.</span></p><p class="v2pOr" data-dcnode-id="734"><span data-dcnode-id="738" instrument_node="">As for the Leninist remark, it seems </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qz.com/898053"><span data-dcnode-id="737" instrument_node="">pretty consistent</span></a><span data-dcnode-id="735" instrument_node="">&nbsp;with what we know of Bannon thus far: The conservative Burke himself thought that throwing out leaders was justified when&nbsp;”necessary” to restore the old values.</span></p><p class="v2pOr" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Then again, this delight in being a “dark” oppositional force pairs nicely with his ferocious&nbsp;hatred of the “establishment.” In particular, Bannon’s&nbsp;diatribes against the media brim with spite toward journalists’&nbsp;arrogance, superiority, and naivety.</span></p><p class="v2pOr" data-dcnode-id="717"><span data-dcnode-id="731" instrument_node="">On </span><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//soundcloud.com/breitbart/breitbart-news-daily-stephen-k-bannon-november-2-2016"><span data-dcnode-id="730" instrument_node="">Breitbart radio</span></a><span data-dcnode-id="728" instrument_node=""> in early November, he praised the “insight and savvy” of its&nbsp;callers and website commenters, while ranting&nbsp;about a “smug, smirking” </span><em data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">New York&nbsp;</span></em><em data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Times&nbsp;</span></em><span data-dcnode-id="723" instrument_node="">reporter who suggested&nbsp;that Trump rally attendees in Mississippi&nbsp;didn’t know who Nigel Farage, a&nbsp;right-wing populist leader in the UK,&nbsp;was. “120% of the people” at the rally knew of&nbsp;Farage, who is “kind of a cult hero in this global populist movement,” said Bannon. More recently, he&nbsp;</span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2017/01/26/business/media/stephen-bannon-trump-news-media.html"><span data-dcnode-id="722" instrument_node="">told the </span><em data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">New York Times</span></em></a><span data-dcnode-id="718" instrument_node="">&nbsp;(paywall) that the media&nbsp;”should be embarrassed and humiliated and keep its mouth shut and just listen for a while.” He added:&nbsp;“I want you to quote this. The media here is the opposition party. They don’t understand this country. They still do not understand why Donald Trump is the president of the United States.”</span></p><p class="v2pOr" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Some of his hatred of the&nbsp;elite seems rooted in&nbsp;his experiences living and working among the elite. He frequently references his Harvard and Goldman Sachs pedigrees. However, when he describes his time as an elite, it’s as an “outsider”—a term he used in the early days to describe the&nbsp;populist movement he represented—passing among the privileged and deciphering their nefariousness for ordinary middle-class Americans.&nbsp;For example, in his 2014 Vatican speech, he says:</span></p><blockquote class="UPUEz" data-dcnode-id="711"><div data-dcnode-id="712"><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">I could see this when I worked at Goldman Sachs — there are people in New York that feel closer to people in London and in Berlin than they do to people in Kansas and in Colorado, and they have more of this elite mentality that they’re going to dictate to everybody how the world’s going to be run.&nbsp;I will tell you that the working men and women of Europe and Asia and the United States and Latin America don’t believe that. They believe they know what’s best for how they will comport their lives.</span></p></div></blockquote><p class="v2pOr" data-dcnode-id="703"><span data-dcnode-id="710" instrument_node="">But this&nbsp;cosmic avenger role Bannon&nbsp;seems to claim&nbsp;as voice-giver to&nbsp;the “forgotten” middle-classes&nbsp;hints at a deeper relish of&nbsp;conflict. A&nbsp;fascination with warfare and violence emerges in, for instance, his frequent allusion to&nbsp;the glory of the amphibious invasion at Normandy, or his taking the time out of his duties as Breitbart’s CEO to pen an </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.breitbart.com/national-security/2013/10/05/general-giap-obituary/"><span data-dcnode-id="709" instrument_node="">obituary</span></a><span data-dcnode-id="707" instrument_node=""> for Vo Nguyen Giap, a&nbsp;Vietnamese general who led a war for independence that&nbsp;Bannon described as “one of the bloodiest and hardest fought by all combatants.” In particular, the aesthetic&nbsp;of his documentaries can be nauseatingly violent. </span><em data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Torchbearer</span></em><span data-dcnode-id="704" instrument_node="">&nbsp;is a tour de force of&nbsp;gore. (There are at least six separate shots of falling guillotines, as well as&nbsp;lingering footage of nuclear radiation victims, mass burials from Nazi gas chambers, and various ISIL atrocities.)</span></p><h2 class="z_k77" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">What all this means for the Trump presidency</span></h2><p class="v2pOr" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Even before he took charge of Trump’s campaign, in Aug. 2016,&nbsp;Bannon’s philosophies pervaded its rhetoric. If there was&nbsp;any question about the role his views would play in the Trump administration, the last two weeks have made it clear: The president’s leadership hangs from&nbsp;the scaffolding of Bannon’s worldview.</span></p><p class="v2pOr" data-dcnode-id="688"><span data-dcnode-id="698" instrument_node="">Trump’s </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/the-fix/wp/2017/01/20/donald-trumps-full-inauguration-speech-transcript-annotated/"><span data-dcnode-id="697" instrument_node="">inaugural address</span></a><span data-dcnode-id="695" instrument_node=""> was basically a telepromptered Bannon rant. Where inaugural speeches typically crackle with forward-looking optimism, Trump’s was freighted with anti-elite resentment. He described a Bannonistic vision in which the “wealth of our middle class has been ripped from their homes and then redistributed all across the world.” The “forgotten men and women of our country”—a </span><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/artanddesign/2016/nov/17/jon-mcnaughton-painting-trump-white-house-the-forgotten-man"><span data-dcnode-id="694" instrument_node="">meme that Trump claimed</span></a><span data-dcnode-id="692" instrument_node="">, but that appears in </span><em data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Generation Zero</span></em><span data-dcnode-id="689" instrument_node="">—had a cameo too.</span></p><figure class="woeAo alignright Y5ceB" data-dcnode-id="679"><div class="wycFL" data-dcnode-id="682"><div class="pf9tX" data-dcnode-id="685" style="padding-bottom:56.22222222222222%"><noscript data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">&lt;img src="https://cms.qz.com/wp-content/uploads/2017/01/stephen-bannon-trump-e1486012342647.jpg?quality=75&amp;amp;strip=all&amp;amp;w=450&amp;amp;h=253&amp;amp;crop=1" alt="White House Chief Strategist Steve Bannon listens at right as President Donald Trump speaks during a meeting on cyber security in the Roosevelt Room of the White House in Washington, Tuesday, Jan. 31, 2017."/&gt;</span></noscript></div><div class="zWFkh" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">AP Photo/Evan Vucci</span></div></div><figcaption class="FCO4L" data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Commander-in-chief and Chief Strategist.</span></figcaption></figure><p class="v2pOr" data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Trump heaped blame on the “establishment,” which “protected itself” but not American&nbsp;citizens from financial ruin. “And while they celebrated in our nation’s capital, there was little to celebrate for struggling families all across our land,” Trump continued. “We’ve made other countries rich, while the wealth, strength and confidence of our country has dissipated over the horizon.”</span></p><p class="v2pOr" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">“America first” is Bannon’s economic nationalism in slogan form. Trump’s vow to “unite the civilized world against radical Islamic terrorism, which we will eradicate from the face of the Earth” was a mellowed-out version of the West’s battle against “Islamic fascists.”</span></p><p class="v2pOr" data-dcnode-id="670"><span data-dcnode-id="674" instrument_node="">There’s more. Trump’s remarks&nbsp;that the “Bible tells us how good and pleasant it is when God’s people live together in unity,” that “most importantly, we will be protected by God,” and that children from both Detroit and Nebraska are “infused with the breath of life by the same almighty creator” seemed kind of bizarre&nbsp;coming from a not-very-religious man. They don’t, however, in the context of Bannon’s insistence in </span><em data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Torchbearer&nbsp;</span></em><span data-dcnode-id="671" instrument_node="">that a society without God disintegrates.</span></p><p class="v2pOr" data-dcnode-id="662"><span data-dcnode-id="669" instrument_node="">Within days of the inauguration came the dizzying spurt&nbsp;of executive actions—</span><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vanityfair.com/news/2017/01/stephen-bannon-national-security"><span data-dcnode-id="668" instrument_node="">written by Bannon&nbsp;and Stephen Miller</span></a><span data-dcnode-id="666" instrument_node="">, a White House&nbsp;policy advisor—many of which contained “press release-friendly ‘purpose’ sections making extravagant claims not usually found in executive orders,” </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/monkey-cage/wp/2017/01/30/most-of-trumps-executive-orders-arent-actually-executive-orders-heres-why-that-matters/%3Futm_term%3D.8ff167c9eb7d"><span data-dcnode-id="665" instrument_node="">says</span></a><span data-dcnode-id="663" instrument_node=""> Andrew Rudalevige, government professor at Bowdoin College.</span></p><p class="v2pOr" data-dcnode-id="645"><span data-dcnode-id="661" instrument_node="">Bannon’s philosophy toward Islam seems likely to have influenced </span><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/the-press-office/2017/01/27/executive-order-protecting-nation-foreign-terrorist-entry-united-states"><span data-dcnode-id="660" instrument_node="">the order</span></a><span data-dcnode-id="658" instrument_node="">, “Protecting the Nation from Foreign Terrorist Entry into the United States.” Recalling&nbsp;that line about how immigrants are not “Jeffersonian democrats,”&nbsp;the document&nbsp;prescribes ensuring the&nbsp;allegiance to America’s “founding principles” and the US constitution of&nbsp;anyone admitted to the country, including tourists.&nbsp;Trump also implied in a </span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cnn.com/2017/01/27/politics/trump-plans-to-sign-executive-action-on-refugees-extreme-vetting/"><span data-dcnode-id="657" instrument_node="">TV interview</span></a><span data-dcnode-id="655" instrument_node=""> with the Christian Broadcast Network that&nbsp;he wanted to prioritize Christians refugees over Muslims,&nbsp;</span><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cnn.com/2017/01/27/politics/trump-christian-refugees/"><span data-dcnode-id="654" instrument_node="">accusing the US government</span></a><span data-dcnode-id="652" instrument_node="">&nbsp;of favoring&nbsp;Muslim refugees&nbsp;over Christians in the past (a claim for which </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thehill.com/policy/national-security/316670-trump-refugee-ban-bars-green-card-holders-report"><span data-dcnode-id="651" instrument_node="">there’s no evidence</span></a><span data-dcnode-id="649" instrument_node="">). Some argue (fairly convincingly) that Trump’s ban&nbsp;</span><a data-dcnode-id="647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.vox.com/world/2017/1/29/14426892/trump-muslim-immigration-refugee-ban-isis-terrorism"><span data-dcnode-id="648" instrument_node="">risks lending&nbsp;credence to&nbsp;ISIL</span></a><span data-dcnode-id="646" instrument_node=""> recruitment propaganda claiming&nbsp;that the US is leading the West in a war on all of Islam.</span></p><p class="v2pOr" data-dcnode-id="637"><span data-dcnode-id="644" instrument_node="">Another of the new administration’s focuses—the&nbsp;danger posed by Mexicans flooding over the border—is also&nbsp;a&nbsp;central theme of Bannon’s vision of America under seige.&nbsp;Trump’s&nbsp;</span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/the-press-office/2017/01/25/presidential-executive-order-enhancing-public-safety-interior-united"><span data-dcnode-id="643" instrument_node="">executive action</span></a><span data-dcnode-id="641" instrument_node=""> declares that “many” unauthorized immigrants “present a significant threat to national security and public safety,” though criminology and immigration experts say most evidence suggests immigrants in general </span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cbsnews.com/news/illegal-immigrants-and-crime-how-big-a-problem-is-crime-committed-by-immigrants/"><span data-dcnode-id="640" instrument_node="">commit crimes at a lower rate</span></a><span data-dcnode-id="638" instrument_node=""> than native-born citizens. “Sanctuary” cities—those that voluntarily cooperate with immigration enforcement only on deporting unauthorized immigrants convicted of violent or serious crimes—are also critiqued in Bannonist terms: They have “caused immeasurable harm to the American people and to the very fabric of our Republic.” In other words, they do not share America’s values.</span></p><p class="v2pOr" data-dcnode-id="632"><span data-dcnode-id="636" instrument_node="">Finally,&nbsp;Trump’s withdrawal of the US from the Trans-Pacific Partnership, a multilateral trade deal supported by what would count as the “elite,” includes a </span><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/the-press-office/2017/01/23/presidential-memorandum-regarding-withdrawal-united-states-trans-pacific"><span data-dcnode-id="635" instrument_node="">special shout-out</span></a><span data-dcnode-id="633" instrument_node=""> to “the American worker,” the classic Bannon theme.</span></p><h2 class="z_k77" data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Bannonism begins?</span></h2><p class="v2pOr" data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Bannon savors the power of symbolism. That symbolic power infused Trump’s campaign, and now, apparently, his administration’s rhetoric.&nbsp;After all, as Andrew Breitbart made clear when he famously dubbed him&nbsp;the “Leni Riefenstahl of the Tea Party,” Bannon is a master propagandist. He’s also&nbsp;a master opportunist, going by&nbsp;his fitful shifts in career. So it’s possible that the narrative flowing through Trump’s inaugural address and executive actions is simply what Bannon has calibrated over time to rouse maximum populist fervor—and that it doesn’t reflect plans to upend America.</span></p><p class="v2pOr" data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">There’s also, however, the possibility that Bannon&nbsp;is&nbsp;steering Trump toward the “enlightened capitalist,” Judeo-Christian, nationalistic vision that he has come to believe America needs.</span></p><p class="v2pOr" data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Which it is, we can’t know, of course: Only Bannon knows&nbsp;what&nbsp;Bannon&nbsp;really wants. What we do know for sure, though, is that a man who has staked out a deep desire&nbsp;for a violent resurgence of “Western civilization” now has the power to fulfill it.</span></p></div></div></div></div></div></div><div class="CVhRe" data-dcnode-id="591"><div class="TaPy6" data-dcnode-id="592"><div class="zoV_t" data-dcnode-id="605"><a class="d3_Ls facebook" data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fqz.com%252F898134%252Fwhat-steve-bannon-really-wants%252F%26caption%3Dqz.com%2520%257C%2520By%2520Gwynn%2520Guilford" rel="noreferrer" target="_blank" title="Share via facebook"><svg aria-hidden="true" data-dcnode-id="616" fill="var(--color-typography, black)" height="20" version="1.1" viewBox="0 0 25 25" xmlns="http://www.w3.org/2000/svg"><path d="M1.379 0A1.38 1.38 0 0 0 0 1.38v22.241C0 24.384.62 25 1.379 25h11.779v-9.21h-3.29v-3.948h3.29V8.763c.195-3.227 2.166-4.987 5.047-4.987 1.38 0 2.566.103 2.848.15V7.3h-1.936c-1.566 0-1.868.743-1.868 1.838l.021 2.752 3.783-.048-.658 3.947h-3.29L17.25 25h6.371A1.38 1.38 0 0 0 25 23.621V1.381A1.383 1.383 0 0 0 23.62 0H1.379z" data-dcnode-id="617"></path></svg></a><a class="d3_Ls twitter" data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%253A%252F%252Fqz.com%252F898134%252F%26text%3DWhat%2520Steve%2520Bannon%2520really%2520wants%26via%3Dqz" rel="noreferrer" target="_blank" title="Share via twitter"><svg aria-hidden="true" data-dcnode-id="613" fill="var(--color-typography, black)" height="20" version="1.1" viewBox="0 0 25 20" xmlns="http://www.w3.org/2000/svg"><path d="M22.053 3.122A5.006 5.006 0 0 0 24.308.364c-.992.573-2.094.987-3.255 1.211A5.212 5.212 0 0 0 17.305 0c-2.835 0-5.129 2.232-5.129 4.986 0 .388.045.77.13 1.134A14.71 14.71 0 0 1 1.737.913a4.884 4.884 0 0 0-.693 2.507c0 1.727.91 3.252 2.286 4.146a5.207 5.207 0 0 1-2.324-.623l-.001.064c0 2.413 1.767 4.427 4.114 4.888-.43.112-.884.172-1.352.172-.33 0-.653-.033-.965-.092.653 1.983 2.548 3.421 4.792 3.462
