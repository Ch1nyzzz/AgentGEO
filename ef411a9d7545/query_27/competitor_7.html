Diplomacy has traditionally been depicted in literature and movies as
intrinsically secret and full of intrigue, carried out by few actors, with
public opinion playing a passive role, if any. This description was quite
true in the Talleyrand and Metternich era and partly throughout the
twentieth century. Over the last decade, the widespread use of the Internet, and particularly social media, ushered in a new era for diplomats.
World time zones and distances have shrunk dramatically; the worldwideshared flow of information has become massive, makingit difficult to separate local from global thus raising citizensâ&amp;amp;#x20AC;&amp;amp;#x2122; expectations to participate in
foreign policy decision-making and implementation processes.</span></p><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">It came as no surprise to my staff when, on the very first day in office
as Foreign Minister, I opened my Twitter account and started working
to imbue the administration with the idea of the importance of digital
diplomacy. Over the past 14 months I have been constantly encouraging
the use of social media at every level of Italian diplomacy. And today,
from Washington to Bucharest, from Tunis to Beijing, dozens of Italian
embassies and consulates have at least one official profile on a social network, thus strengthening the global reach of our foreign policy and our
interaction with foreign citizens as well as with our nationals everywhere.
I consider Twitter for Diplomats to be an extremely timely publication. The
power of social media in shaping events will keep growing in the years
to come and this e-book could serve as an essential compass to sail, wit7</span></p><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">This transformation poses compelling challenges for diplomats, while
providing them with new opportunities. Today, social media exposes
foreign policymakers to global audiences while at the same time allowing
governments to reach them instantly. With only 140 characters, Twitter
creates and broadcasts news and opinions in real time, in a simple and
concise way, furthering foreign policy goals. One cannot underestimate
the potential risks of this new and much wider exposure. But, by bringing it closer to citizens, Twitter has two big positive effects on foreign
policy: it fosters a beneficial exchange of ideas between policymakers and
civil society and enhances diplomatsâ&amp;amp;#x20AC;&amp;amp;#x2122; ability to gather information and to
anticipate, analyze, manage, and react to events.</span></p></section><hr data-dcnode-id="1471"><section aria-label="Page 10" data-dcnode-id="1460"><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">PREFACE</span></p><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">tingly, through the ever-changing waters of digital diplomacy and global
communication. It offers a wide array of examples of influential foreign
policy players using Twitter to communicate on a global scale and makes
some insightful comments, presenting to the reader an accurate snapshot

The case-oriented approach makes the publication particularly useful to
understand the dynamics of Twitter diplomacy. Indeed, it is a must read
for both those interested in communication strategies and those who,
more simply, want to know first-hand how diplomats and ministers work
and tweet.</span></p><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Giulio Terzi â&amp;amp;#x20AC;&amp;amp;#x201C; @GiulioTerzi

One hundred and forty characters have changed the way we see the world.
They have changed how foreign policy shapes itself and how it responds
to new international challenges. In ancient Rome, this phenomenon was
called Vox Populi; today it goes under many different names: e-diplomacy,
Digital Diplomacy, Twiplomacy, and others. Although not perfect synonyms, they all refer to the use of the Web, information and communications technology (ICT), and social media tools to engage in diplomatic
activities and carry out foreign policy objectives.
While Twitter is today seen as the most common e-diplomacy tool, it is
only one of the many ways foreign ministries around the world are engaging in the most viral and exciting new development in modern diplomacy.</span></p><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">@jack’s ‘twttr’ tweet was the first of several billion and counting. It took
Twitter three years, two months, and one day to reach the first billion
tweets, and it took about 18 months for the first 500 000 users to sign
up. Today, an estimated 500 million people use Twitter’s real-time information and social networking service: many of those are governments,
embassies, and – of course – diplomats.
With the spread of Twitter, the ways in which people and governments
interact with each other have changed, as well as how a nation sets up
its diplomatic strategies and actuates its foreign policy agenda and objectives. The flow of information and the way diplomats share information
have also changed. As has the meaning of real time: today’s ‘real-er’ time

Today’s State Department works on different fronts. It has incubated ideas

The first is ‘a world in which states are reduced to their heads of state,

The growth registered by social networks like Facebook and Twitter in
the past few years has been exponential and has been largely fueled by
a transition from desktop computers to mobile, mostly with the large
success of smart phones all over the world. According to a 2010 global
research project into people’s online activities and behaviors by TNS, the
world’s biggest custom research company, ‘mobile users spend on average
3.1 hours per week on social networking sites compared to just 2.2 hours
on email.’ Covering nearly 90% of the world’s online population through
50 000 interviews with consumers in 46 countries, the study – accessible
at www.tnsdigitallife.com – shows the drive to mobile is mostly driven
by the increased need for instant gratification and the ability of social
networks to offer multiple messaging formats, including the instant message or update function.
Facebook has certainly benefited a great deal from the shift to mobile as
around one-third of its user base accesses it through a mobile platform
(phone or tablet). ‘Mobile usage has been the fastest growing part of the
Facebook experience’, Facebook former Chief Technology Officer Bret Taylor – aka @btaylor – was quoted by the Wall Street Journal as saying at the
Inside Social Apps conference in San Francisco in January 2011.[5] Taylor
noted that Facebook has 200 million people using it on a mobile device,
and that those people are more than twice as active as people who use
Facebook just on a desktop computer.</span></p><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">That said, while Twitter remains undoubtedly one of the faster-growing
social media tools among the diplomatic and government sectors, Facebook is still the world’s foremost dominant social network, for both mobile
and desktop users.

Once considered the social media tool of choice for Hollywood celebrities,

social network.’
The presence of this many world leaders on Twitter and the number of

The study, titled Twiplomacy, analyzed 264 government accounts in 125

the 120 personal accounts, only 30 tweet personally and then only occasionally. In addition, politicians seem to embrace Twitter mostly during
election campaigns but tend to abandon it almost completely once elected.
It is the case of French President François Hollande – aka @fhollande –
who’s been silent after taking office. As of July 26, 2012, his last tweet

rooting it squarely in the exercise of political power in 2012.’</span></p><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">‘The potential results would be more transparency in governance, a government agenda that is better informed by direct citizen input, and a more

in the Wall Street Journal about the challenges facing Israel’s reputation

countries, cabinet ministries, ambassadors, diplomats, and international

ata-dcnode-id="1070" instrument_node="">Ambassador Michael Oren (Israel):</span></p><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">According to this ranking, Ambassador Djalal of Indonesia certainly

While hard to define and measure, especially when it comes to Twitter,

42</span></p></section><hr data-dcnode-id="1065"><section aria-label="Page 45" data-dcnode-id="1052"><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">AMBASSADORS LOVE TO TWEET</span></p><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">It provides a way to better gauge how Twitter users have an impact on
society and politics through their tweets and conversations.
In fact, as over the years Twitter has become a key tool for e-diplomacy,
measuring influence has attracted many different social media players
both within and without the diplomatic community. While most efforts
are marketing-related, influence tools are an interesting tool for digital
diplomacy as well as for more traditional diplomacy. As all main research
papers and articles on e-diplomacy and digital diplomacy are based on or
refer to influence, it is important to understand what it is and to navigate
beyond its elusiveness.
So, back to the original question: What is influence? Unfortunately, no
standard definition is exhaustive and covers the Twitter realm.
Too often people believe that the number of followers determines how
influential a user is on Twitter. Followers are certainly part of the equation, but other factors weigh more: interactions, mentions, activity, retweets. These are all elements that amplify a user’s presence on Twitter
beyond the account’s reach through its followers.
‘Someone with millions of followers may no longer post messages frequently, while someone followed by mere tens of thousands may be a prolific poster whose messages are amplified by others’, the New York Times
quoted Twitter’s co-founder Evan Williams as saying.[44]</span></p><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">No matter what the message is, interacting with and engaging the public
is important to build up trust, to increase your reach, and to influence both
your network and possible new followers. That’s what influence is about:
listening, communicating, and engaging. The more successful you are in
achieving those three goals, the more Twitter-influential you become.</span></p><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">43</span></p><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">What Williams refers to is that Twitter can be a phenomenal digital
diplomacy tool only when it leads to an open conversation, and not to a
monologue. As I have argued time and time again, we’re at a crucial point
where, when it comes to all forms of diplomacy, listening is as important
as acting.</span></p></section><hr data-dcnode-id="1051"><section aria-label="Page 46" data-dcnode-id="1042"><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">AMBASSADORS LOVE TO TWEET</span></p><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">‘Influence is bliss… With every response and action that results from our
engagement, we are slowly introduced to the laws of social physics: for
every action there is a reaction – even if that reaction is silence’, writes
Brian Solis, social media expert and principal at Altimeter, on his blog.[45]
‘The extent of this resulting activity is measured by levels of influence
and other factors such as the size and shape of niche-works as well as
attention aperture and time.’
Influence metrics are vast and mostly derived from proprietary formulas and algorithms developed by marketing firms. Influence, in fact, is a
key element to better rebalance a company’s strategy, product development, and ad campaigns. It is as important for governments and diplomacies around the world to re-calibrate foreign policy priorities and to
understand those numerous non-traditional players that social media has
thrown into the diplomatic arena, players who are now as engaging as
the traditional actors.
‘As the Web grows more massive all the time, it’s becoming increasingly
important to quickly assess what Internet users are influential about and
how they are influenced in order to make more informed decisions’, said
Klout co-founder and CEO Joe Fernandez in an interview with CNN.[46]</span></p><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Klout, a four-year-old online service that measures influence or the user’s
‘ability to drive action’ – as Fernandez puts it – is one of the many companies that have dipped their feet into measuring the elusiveness of influence. Itis even more elusive and difficult to put on paper as the Web is
registering a great shift from desktop to mobile, making calculations and
algorithms more and more difficult.
Because influence is based on very diverse factors – the social factor
being one of the most difficult to measure – results vary, sometimes even
greatly, but they indeed hand interesting data, as the ranking of the 10
most followed ambassadors in Washington DC shows.
While communicating and interacting with the public, both at home and
abroad, is the main goal of most of the ambassadors on Twitter – and a
key element to achieve greater influence in the so-called Twitter-sphere
– some are trying to go even further in their use of the tool to exploit its
immediacy and real-time capabilities.

46</span></p></section><hr data-dcnode-id="1019"><section aria-label="Page 49" data-dcnode-id="1008"><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">TWITTER ON THE WORLD STAGE</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">TWITTER ON THE WORLD STAGE

focal point, in an exclusive interview[49] to DevEx in September 2011. ‘Normally we use social media mainly as an information dissemination tool
largely because the UN has a huge amount of in-demand information to

cases, as the Ushahidi experience shows, it can be the best way to access
information on disaster areas and relief more quickly and effectively than

While this publication is per se a simple manual for helping and inspiring
diplomats and international civil servants to use Twitter, it would incomplete without mentioning how social media has empowered citizens and
the international community to provide help during crisis. And Ushahidi
– aka @Ushahidi – is a great example of the potential of Twitter and new
technologies in general.</span></p><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Initially developed to map reports of violence in Kenya after the postelection fallout at the beginning of 2008, Ushahidi has evolved from an
ad hoc group of volunteers to a focused organization managing an opensource crowdsourcing platform that uses all Web, digital, and mobile tools
to map disaster areas and conflicts… All with a simple tweet, cellphone
text, or e-mail. This is when social media goes beyond diplomacy, making it a useful tool for collecting information and dispatching the right
response at the right time.
In a disaster situation, the timeliness of the response is critical, as scenarios change rapidly. Ushahidi, with the help of a small army of volunteers,
pulls data from different sources. It has specialized in processing Twitter
posts, e-mails, and text messages from disaster sites and visually putting
them onto a map, updated in real time. This helps locate people with the
most critical needs and deliver medical and humanitarian relief.
‘The technology community has set up interactive maps to help us identify needs and target resources’, Secretary Clinton said in the aftermath
of the January 2010 earthquake that devastated Haiti.[52] While she did
50</span></p></section><hr data-dcnode-id="973"><section aria-label="Page 53" data-dcnode-id="962"><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">TWITTER ON THE WORLD STAGE</span></p><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">not specifically mention Ushahidi’s crowdsourcing platform, it is clear

request right away and map it onto a Ushahidi map. ‘The tags make it
easier for computers and people to find the information they’re looking for,

tweeting after a disaster.
51</span></p><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">The following is a Ushahidi map of Port-of-Prince after the earthquake.
Red dots show people and relief workers requesting help via Twitter, text
messages, and e-mails.</span></p></section><hr data-dcnode-id="961"><section aria-label="Page 54" data-dcnode-id="950"><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">TWITTER ON THE WORLD STAGE</span></p><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Without trying to be exhaustive, the Ushahidi experience shows how

embassies and foreign ministries, but also UN, intergovernmental organizations, NGOs, aid agencies, and relief workers in all areas of the world to
communicate and network, and also to save lives.
‘The simple fact is that the frequency and severity of disasters will continue to increase and international governments need to stay one step
ahead, encouraging a Tomorrow’s World culture’, said UK Secretary

announced that Her Majesty’s government will fund projects to explore

According to The Guardian,[54] the UK Department for International Development will support projects with £48.5 million of funding over three
years out of existing aid funds. Technologies to be explored will include:
•	 Twitter and social media channels to reach those affected, including
direct guidance on medical issues.
•	 Mobile phone and satellite technology – already used in the wake of

•	 Gaming technology to train people in disaster response scenarios.
•	 Smart cards to deliver cash payments to those worst affected by disaster.
•	 The use of Google Earth and e-mapping to locate people and disaster
hotspots.</span></p><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">‘The use of social media during disasters has grown exponentially in
recent years’, said Gail McGovern, President and CEO of the American
Red Cross, commenting on the launch, in partnership with Dell, of a new
Digital Operations Center, the first social-media-based operation devoted
to humanitarian relief.[55]
Launched in spring 2012 and located in the Red Cross National Disaster
Operations Center in Washington, DC, the center is modeled after Dell’s
Social Media Listening Command Center and uses Dell’s technology solutions and consulting services.</span></p><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">52</span></p></section><hr data-dcnode-id="949"><section aria-label="Page 55" data-dcnode-id="938"><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">TWITTER ON THE WORLD STAGE</span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">‘This partnership with Dell will enable us to better understand and anticipate disaster needs and help connect people with the resources they need
during emergencies’, said McGovern. ‘Our goal is to become a social liaison for people, families, and communities to support one another before,
during and after disasters.’</span></p><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">As reported by Time Magazine in 2011,[56] it’s true that social media is
often thought of as nothing more than a distraction, or an attempt to
replace a real community with a virtual one. But when faced with a disaster like in Japan in March 2011, these networks become a lot more. ‘I
think that citizens communicating with other citizens, well, that’s kind of
the definition of resilience’, said Kim Stephens, a senior associate at ABT
Associates and an emergency-management expert. ‘The biggest part of
using social media during a disaster is that it’s not about the government
helping the public; it’s about the public helping themselves. It’s peer-topeer aid.’</span></p><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">53</span></p></section><hr data-dcnode-id="937"><section aria-label="Page 56" data-dcnode-id="928"><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">RISKS AND CHALLENGES</span></p><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">RISKS AND CHALLENGES
Diplomacy, whether it’s digital or traditional, has risks.
In the wake of the September 2012 attacks in Benghazi and Cairo, which
led to the murder of American Ambassador to Libya Chris Stevens and
three other men, social media has undergone tough criticism underscoring how digital diplomacy – until now an effective, and less regulated,
way to engage with the world – needs to be seen for what it really is: a
form of diplomatic engagement.
Let’s not forget how diplomacy can really be a dangerous venture.
On August 19, 2003, a terrorist truck bomb wrecked the United Nations
Headquarters in Baghdad, killing the UN Secretary-General’s Special
Representative for Iraq, Sergio Vieira de Mello, and 16 members of his
team. A few years later, on December 11, 2007, another suicide bombing
attack in Algiers, the capital city of Algeria, took the life of 17 UN employees, the second-highest death toll in the history of the United Nations. But
terrorism is not the only factor to take into consideration: on January 12,
2010, a horrifying earthquake shook the capital of Haiti, in the Caribbean,
killing hundreds of diplomats alongside the people of Haiti.</span></p><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">The world can be a tough place for diplomats and sometimes a diplomat
may be ‘more of a soldier than a diplomat’, as former UN Secretary-General Javier Perez de Cuellar describes one of his closest right hands, former
chief UN hostage negotiator Giandomenico Picco.
Picco, an Italian official at the UN, put himself on the spot to ensure the
release of Western hostages in Lebanon in the early 1990s: he disappeared from sight for days and traveled countless times to intimidating
Shiite strongholds in Syria and Lebanon – only his assistant knew his
whereabouts, not even the Secretary-General. He agreed to negotiatedkidnappings of his own persona in order to secretly meet with the captors;
he was moving to a different location every night with a contract on his
life. His mediation was successful and the risks he took were fruitful.
‘History does not kill’, Picco writes in his memoirs.[57] ‘Religion does not
rape women, the purity of blood does not destroy buildings, and institutions do not fail. Only individuals do these things.’
54</span></p></section><hr data-dcnode-id="927"><section aria-label="Page 57" data-dcnode-id="914"><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">RISKS AND CHALLENGES</span></p><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">That’s traditional diplomacy, but digital diplomacy is not too different.
No matter what you call it, it is only the most visible result of the very
same foreign policy agendas that governments put in place in their capitals to be actuated by mean of traditional diplomacy. Social media is just
a new tool to help achieve strategic goals. Because the effect of digital
diplomacy travels through the information channels at a much faster rate,
however, it shortens the traditional chain of command and injects more
visibility – and thus responsibilities – to the end user, whether an ambassador, a foreign officer, or a social media advisor. It is the speed at which
social media travels that makes twiplomacy look riskier than any other
form of diplomacy.
While the speed cannot be controlled, the human character of digital
diplomacy can.
‘Social media is a neutral entity. It is the human use of it that matters’,
said Tara Sonenshine – aka @TSonenshine – Under Secretary for Public
Diplomacy and Public Affairs at the US Department of State, in October 2012.[58] ‘It was humans interacting with – or responding to – social
media, that contributed significantly to the Arab Spring, and also to the
violent protests we saw across the region in the past weeks’, she said.</span></p><p data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Indeed, the social media revolution has been changing the way we see
the world and has been changing the way we talk to the world. Not only
it has made easier for governments and ambassadors to engage with the
public, both foreign and at home, it has made everybody more aware of the
effects – both positive and negative – a single word, tweet, Facebook comment, video, or image can have in a relatively short timeframe. Not only
that, it has emphasized the need to strengthen the way we analyze social
media, in particular in very strategic regions, including the Middle East.</span></p><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">55</span></p><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Sonenshine made clear that social media is here to stay but needs to be
directed and twitched in order to make it the best tool a diplomat can
have. ‘I would go so far as to say, social media has evolved into the most
powerful, galvanizing catalyst of our time – for better and for worse’, she
said. ‘It is arguably as significant an event in our shared human history
as the Industrial Revolution.’</span></p></section><hr data-dcnode-id="913"><section aria-label="Page 58" data-dcnode-id="902"><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">RISKS AND CHALLENGES</span></p><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">The murder of Ambassador Stevens and the assaults on the US embassy
in Cairo, while acts of terrorism, not only cast a shadow on e-diplomacy
efforts, raising new questions on how to control new networking technologies and channels in such a way that they’re still effective. They also
escalated to political confusion to the extent that US Secretary of State
Hillary Clinton had to take full responsibility of what happened.
‘I take responsibility’, Clinton told CNN in an interview while on a visit to
Peru.[59] ‘I’m in charge of the State Department’s 60 000-plus people all
over the world, 275 posts. The president and the vice-president wouldn’t be
knowledgeable about specific decisions that are made by security professionals. They’re the ones who weigh all of the threats and the risks and
the needs and make a considered decision.’
While Secretary Clinton didn’t mention it, social media is already under
review at the State Department in order to reduce mistakes and misjudgments and provide US embassies around the world with better and clearer
guidelines on how to operate on Twitter, Facebook, and such.
The goal, for the United States in the aftermath of September 11, 2012,
and for all governments engaging in digital diplomacy, is to ensure an
open dialogue but still be engaging, offering the true position of a government’s agenda. The risks are always going to be present, but a responsible
way to engage, yet political with strong assertions, must be pursued at all
times, thus not to repeat what happened in Libya and Cairo.</span></p><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">In Egypt, the sarcastic Twitter exchange between the US Embassy in
Cairo and the Muslim Brotherhood gave ‘a passive aggressive tone to
relations that have been strained by the […] assault’, as the Associated
Press reported a few days after the accidents. The snark in the Embassy’s
feed – since then deleted – was quite apparent since the very beginning,
in a series of tweets following the attacks:</span></p><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">56</span></p></section><hr data-dcnode-id="901"><section aria-label="Page 59" data-dcnode-id="892"><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">RISKS AND CHALLENGES</span></p><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">The conversation became more intense in the following days:</span></p><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">57</span></p></section><hr data-dcnode-id="891"><section aria-label="Page 60" data-dcnode-id="882"><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">RISKS AND CHALLENGES</span></p><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Commenting on the unconventional tone of the embassy’s feed, the State
Department told Foreign Policy’s Josh Rogin that specific instructions not
to issue the statement were ignored.[60] ‘The statement was just tone deaf’,
an official was quoted by Rogin as saying. ‘It didn’t provide adequate balance. We thought the references to the 9/11 attacks were inappropriate,
and we strongly advised against the kind of language that talked about
“continuing efforts by misguided individuals to hurt the religious feelings of Muslims”.’
While Twitter is a social medium, and as such it encourages and rewards
informal conversations, ‘it does not reward users who put out only staid
press releases and official statements’, as highlighted by Max Fisher in
The Atlantic.[61]
‘The diplomats who run the account of the U.S. embassy to Egypt seems
to have understood this, attempting to master Twitter’s more conversation style to maximize its public diplomacy potential’, Fisher says. ‘But
one problem with this is that, if succeeding on Twitter outreach means
running the feed like a real person instead of a faceless bureaucrat, does
that make the feed reflect the individual behind it more than the broader
United States and United States government, which is what the feed and
embassy are meant to represent?’</span></p><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Of course, embassies’ feeds are – and have to remain – the clear voice of
a government. This is where traditional diplomacy intersects with digital
diplomacy, as goals, objectives, priorities, and risks are the same. What
changes is the way to achieve them, as well the level of engagement with
less traditional players. However, we still need to put the same rules in
place.
‘If there’s one word to describe the state of digital diplomacy now, it’s
messy’, writes Briang Fung in the Canadian International Council Twitter and Diplomacy series.[62] ‘The most committed foreign ministries of
governments around the world maintain dozens of social media accounts
– some to represent embassies, others to speak for specific programs, still
others to broadcast on behalf of individuals. Even then, a diplomat’s public
Twitter profile is more likely to be run by a public affairs officer than by
the appointee herself.’
58</span></p></section><hr data-dcnode-id="881"><section aria-label="Page 61" data-dcnode-id="870"><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">RISKS AND CHALLENGES</span></p><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">It’s true most world leaders and foreign ministers don’t tweet themselves
– but many do as I’ve tried to show here in previous chapters. The personability of Twitter and Facebook is what attracted many governments
to social media and that’s what needs to remain intact. New rules and
guidelines are in the working in most countries and a better understanding of risks and risk management will help make twiplomacy a better tool.
This is an area where innovation and ideas – rather than technology, per
se – play the central role. Once we step into digital diplomacy, we have to
look beyond Twitter and Facebook. We need to realize how the power of
ideas can create better results and transition traditional diplomacy to a
new phase, where people are new players, and politicians and diplomats
are not elites any longer. Anne-Marie Slaughter, a former director of policy planning at the US Department of State, calls it ‘pivot to the people’.</span></p><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Let’s use e-diplomacy and fully explore its potential to make a true pivot,
thus making diplomacy the most extraordinary tool our governments can
have in fulfilling our foreign policy agendas and engaging with the world.</span></p><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">59</span></p></section><hr data-dcnode-id="869"><section aria-label="Page 62" data-dcnode-id="858"><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">TWITTER FROM A TO Z</span></p><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">TWITTER FROM A TO Z
This book is not meant to be a manual on how to use Twitter. It’s rather
a non-manual, as in all honesty Twitter is best if learned while using
it, exploring all its potential day by day. Following are tips, facts, and
suggestions on how to make Twitter the most incredible communication
experience for ambassadors, diplomats, international civil servants, international relations, and government students, as well as anybody interested in foreign policy. They are not must dos, and they might work for
some, but not for others. Let’s call them food for thought.
1.	 First and foremost, ABBREVIATIONS are back in vogue! On Twitter,
‘for’ can be turned in to ‘4’, ‘to be’ in to ‘2b’, ‘with’ in to ‘w/’, and ‘are’
in to ‘r’. But don’t shy and use even more complex ABBREVIATIONS
as the key is to contain your message in 140 characters!
2.	 Be careful: Twitter is ADDICTIVE! Enough said.
3.	 Your mantra should be: keep the discussion open. How? ASK questions to your followers and ANSWER them. No matter what your fan
base, your followers are people and need to be treated as such. Their
curiosity needs to be nurtured.</span></p><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">4.	 ANONIMITY does not pertain to Twitter, in particular when it comes
to ambassadors and diplomats. That said, unless you’re going to use
your account for personal reasons only, identify yourself: post a profile
picture with your face; state your title, and position on your profile –
or if you want to be creative, post a profile that really describes you;
list your location or let Twitter find you by checking the ‘tweet location’ box under Settings.
5.	 While Twitter is accessed mostly on Twitter platforms (available for
desktop, tablets, and mobile devices), learn what third-party APPLICATIONS are available on the market and experiment with them:
HootSuite and TweetDeck are the most commonly used. As their
potential is almost infinite, however, we would need an entire new
book to list the pros and cons of choosing one or the other.</span></p><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">60</span></p></section><hr data-dcnode-id="857"><section aria-label="Page 63" data-dcnode-id="844"><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">TWITTER FROM A TO Z</span></p><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">6.	 BE real. BE yourself. Ambassadors and diplomats have tight schedules
but they can always find time to write their own tweets and get to
know their followers – as well as attract new ones. Although, it might
be somewhat of a practice for ambassadors and high-level politicians
to have others write their tweets, Twitter is fully enjoyed and becomes
a real tool for diplomacy when you use it yourself.
7.	 The BLUE scalloped round icon/badge next to a @name (with a white
check mark) identifies accounts that have been verified by Twitter.
Verification cannot be requested by regular users. One way to show
that an account is authentic – and it’s always advisable for ambassadors – is to link the account to the official website of an embassy,
MFA, and such.
8.	 Don’t write and think like a BUREAUCRAT, as Twitter is anything
but BUREAUCRATIC.
9.	 Be CATCHY and sexy. Even when it comes to diplomacy, the boring
side of the business can be left to more traditional means of communication.</span></p><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">11.	 If you use any of the Twitter applications, click CONNECT from time
to time for a quick visual overview of what’s going on and what people
are saying about you, what they are RTing, etc.
12.	 While at first 140 characters can be a little scary, eventually they will
force you to use your CREATIVITY and expand your horizons.</span></p><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">61</span></p><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">10.	 How to CHANGE your user name for portability reasons? Well, sometimes – and this is true particularly for ambassadors – people need to
change their user @name as they get posted elsewhere. For example
if an hypothetical @AmbassadorTom becomes the new Under Secretary of State of his country, he might want to keep his Twitter
account but simply change it into @UnderSecTom or @PaulBTom.
The procedure is simple and can be found here: support.twitter.com
(keyword: change username).</span></p></section><hr data-dcnode-id="843"><section aria-label="Page 64" data-dcnode-id="834"><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">TWITTER FROM A TO Z</span></p><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">13.	 Remember it’s possible – but not advisable – to DELETE your tweets.
Do it only in very rare cases. Instead, send a tweet anew explaining
edits, corrections, and errors on previous tweets.
14.	 DIRECT MESSAGES are as important as public ones; don’t ignore
them. As you can only send them to your followers (and they will
have to follow you back to respond), they’re a great way to quickly
communicate using a private channel. Don’t use them to ask people
to RT you or to market your account: that’s rude.
15.	 What’s the DOT you see so often in front of the @name at the beginning of a tweet? If you start a tweet with the Twitter name of a person/entity, or if you reply someone, you can precede the @name with
a DOT (example: .@andreas212nyc) to make sure everybody reads
that particular tweet/reply. Keep in mind that in a reply, only your
followers that also follow the person/entity you are replying to – are
able to see your reply. The same happens when you start a tweet with
the @name of a person/entity without using a DOT in front of it.
16.	 E-DIPLOMACY is more that you tweeting or using other social media.
Call it E-DIPLOMACY, Digital Diplomacy, or even Twiplomacy, there
is no agreed definition. Indeed, it encompasses more than just social
media tools. In his May 2012 report Revolution @State: The Spread
of EDIPLOMACY, Fergus Hanson states: ‘A slightly revised working
definition is the use of the web and new ICT to help carry out diplomatic objectives. This definition is broad, but escapes the tendency to
confuse E-DIPLOMACY with social media tools alone.’[63]</span></p><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">17.	 Twitter does not require a particular EXPERTISE. Keep your mind
open, however, and don’t necessarily follow the flow. As I said before,
be yourself.
18.	 As Friday is for Twitter the last day of the week – Saturday and Sunday register very slow traffic – use it to wrap up your Twitter activity
and suggest others people/entity they might be interested in following. This is known as #FF or #FOLLOWFRIDAY. Start your tweet with
either hashtags and cite a few people/entities (use their @name) as
well as the reason you’re suggesting them.
62</span></p></section><hr data-dcnode-id="833"><section aria-label="Page 65" data-dcnode-id="820"><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">TWITTER FROM A TO Z</span></p><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">19.	 For a complete GLOSSARY, visit Twitter’s Help Center support.twitter.
com (keyword: glossary).
20.	 Only marketers care about HEAVY TRAFFIC and use it to time their
tweets. It is a way to collect more followers. Tweet only when you
have something to say or even when you feel like it. In some cases,
however, it’s convenient to post tweets during HEAVY TRAFFIC,
meaning from 11am to 3pm. If you want to get the most traction on
Twitter, then tweet Monday between 1pm and 3pm (New York time).
Remember, however, that the country where you are posted or your
country of origin have different HEAVY TRAFFIC times.
21.	 INFOGRAPHICS are not specifically related to Twitter, but as they
present complex information and data quickly and clearly they have
become quite widespread on Twitter and easily RTed.
22.	 JOKES are certainly allowed. Use humor to capture the attention of
your readers – isn’t this the same concept used in writing down a
speech?
23.	 KEEP learning and KEEP exploring! As Twitter KEEPS evolving,
thanks mainly to its millions of users and the infinite ways they use
to communicate with each other, so do you.</span></p><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">25.	 LISTEN, LISTEN, LISTEN! LISTEN to your followers and all users
interacting with you. Twitter is not just a simple tool of communication with the public, but also a way to listen to what the public needs,
to gauge its sentiment on various topics, and to often be the first to
get breaking news directly from the source and not from the media.</span></p><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">63</span></p><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">24.	 LINKS are important even if they take up space in the 140 character
real estate of a tweet! They give you extra space to express yourself
and get your point across. To quote Swedish Foreign Minister @carlbildt: ‘Twitter is for LINKS and instant comments; the blog is for
longer, more considered arguments.’ A technical note: a linked URL
of any length will be altered by Twitter to 19 characters. However,
you can use services like bit.ly or HootSuite to shorten your URLs.</span></p></section><hr data-dcnode-id="819"><section aria-label="Page 66" data-dcnode-id="810"><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">TWITTER FROM A TO Z</span></p><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">26.	 LISTS can become your new best friends. It is a smart way to follow
groups of people who may or may not be among your followers or
followings. It’s very easy to set them up and you can include up to
500 members for each one. It’s also very easy to subscribe to LISTS
compiled by others.[64] On Twitter platforms you can easily see all
your lists, including all those you are subscribing to, and those you
are a member of.
27.	 MORE is not necessarily better when it comes to Twitter. Too many
tweets can be perceived as spam!
28.	 MULTIPLE accounts are allowed. Sometimes an embassy and its
ambassador both have a handle. Some other times, only one or the
other is present on Twitter. For example, before opening @ITALYinUS, the official Twitter profile of the Embassy of Italy in Washington DC, in October 2012, only the Ambassador of Italy to the USA
Claudio Bisogniero – aka @CBisogniero – had a Twitter account and
not the embassy, which in his tweets was referred to as #ItalianEmbassy. Similarly, only the US embassy in Italy – aka @AmbasciataUsa
– has an account and not US ambassador to Rome David Thorne, who
is referred to as #AmbThorne in their tweets.
29.	 If you think your account is going to experience a rapid increase in
the number of followers, change your NOTIFICATIONS (under Settings) not to have your e-mail hijacked by hundreds of messages from
Twitter warning you of every new follower, new replies, new RTs.</span></p><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">30.	 Don’t be too ORNATE and formal when tweeting. You don’t need to
refer to people as Mr, Dr, Ambassador, etc. Your message does not
need to be grammatically perfect and stylistically correct. Rather it
needs to be clear and concise.
31.	 PERSONABILITY is key when it comes to your interaction with Twitter users. It shows you’re real and willing to have an open conversation.
32.	 Sometimes Twitter handles show a small lock next to the @name.
Those are PRIVATE or PROTECTED accounts. Twitter accounts are
public by default. Choosing to protect your account means that your
64</span></p></section><hr data-dcnode-id="809"><section aria-label="Page 67" data-dcnode-id="798"><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">TWITTER FROM A TO Z</span></p><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">tweets will only be seen by approved followers – you will have to
approve them manually – and will not appear in the search engine.
Twitter is meant to be used as a public way of communicating with
others, and that’s its beauty and large potential.
33.	 Don’t be shy to QUOTE from articles, reports, and colleagues, especially if it is something related to your country or area of activity.
Remember, however, to credit the original person/entity and link
URL, if available. When you want to QUOTE from others’ tweets –
referred as Retweet (RT) or Quote Tweet (the latter available only on
Twitter mobile platforms) – don’t forget you can also add your (short)
comment.
34.	 It’s not a crime to REPOST your own tweets – although you do have
to alter them a bit otherwise Twitter won’t let you. According to bit.
ly, the half-life of a tweet is about 2.8 hours. So REPOSTING it can
be useful when you want more people to see a link, event invitation,
and such.
35.	 SEARCHEABILITY. To make yourself easily searchable by users,
include in your profile key words, possibly in two languages if you’re
posted abroad. Remember a profile cannot be longer than 140 characters (website link excluded).
36.	 SIMPLICITY is the key. Pompousness and celebrity whining are not
welcomed by your followers. Remember that it’s as easy to follow
somebody as it is to unfollow him/her/you!</span></p><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">38.	 TRENDS give you the pulse of Twitter. This is how Twitter defines
them: ‘TRENDS are determined by an algorithm and are tailored for
you based on who you follow and your location. This algorithm identifies topics that are immediately popular, rather than topics that have
been popular for a while or on a daily basis, to help you discover the
hottest emerging topics of discussion on Twitter that matter most to
you.’[65] You can participate in a trend by posting one or more tweets
on that particular trend (just type the exact trend on your tweet). You
65</span></p><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">37.	 Don’t be afraid to say THANK YOU, especially when somebody starts
to follow you, retweet you, congratulate you, or add you to a list.</span></p></section><hr data-dcnode-id="797"><section aria-label="Page 68" data-dcnode-id="788"><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">TWITTER FROM A TO Z</span></p><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">can also personalize trends by following the prompts on the Twitter
platforms online or on the mobile apps.
39.	 TOWN HALLS, TOWNTERVIEWS (to borrow the expression from @
StateDept), and TWEETUPS are becoming more and more common
in national politics and foreign policy as well. And since July 2011,[66]
when US President Barack Obama launched the very first Twitter
TOWN HALL, they also moved to the Twitter-sphere with great success. Defined as large informal gatherings (often televised or video
recorded) where everybody is invited to participate, ask questions, and
comment, they’re used all over the world by heads of state/government, cabinet ministers, ambassadors, and spokespeople. Twitter is
a great fit for those events and they give you – and your country – a
much better voice, with greater outreach and interconnection.
40.	 As with other social media tools, with Twitter it’s about US, not you.
It’s about being part of a community, and not a hierarchy.
41.	 VOLUNTEER your thoughts and opinions on issues people care –
possibly offering your country’s official stance – to captivate your
audience.
42.	 If possible, link your Twitter handle on the official WEBSITE of your
embassy, ministry, or government agency. An option is also to use
widgets or an embedded code to also include your Twitter feed. In
both cases, ask your IT department whether they can do it or not. In
addition, include it in your e-mail signature and any biographical note
you might need to circulate on the Web.</span></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">43.	 Twitter can be the XFACTOR you were looking for. If not, it’s still
going to be a lot of fun. I promise.
44.	 Don’t make your followers YAWN. There are any ways to convey a
message. And if it bores you, it’s probably going to bore your followers.
45.	 Don’t be overly ZEALOUS. A good start is much better than a rushed
start! And I hope this non-manual manual will contribute to help
diplomats in exploring Twitter more and try it out.

Ministry of Foreign Affairs (MFA) dedicated to
diplomatic training. Its main task is to update
and improve the professional quality of the MFA
staff (both diplomats and non-diplomats) through
courses and seminars. The Faculty consists mainly 
of internal staff and experts from the Ministry.
The two main courses offered for diplomats are aimed at newly admitted
diplomats and middle-rank officials. The main activities for non-diplomat
staff relate to pre-post courses and specific professional training.
The Institute is developing a series of self-paced online learning modules
focused on the MFA’s activities and functions.  Its most recent project is
a blog (ISDI learning corner, available at http://istitutodiplomatico.wordpress.
com/) for sharing useful information concerning diplomatic soft skills.</span></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">71</span></p><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">TWITTER FOR DIPLOMATS</span></p><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">DiploFoundation emerged from a project to introduce ICT tools to the practice of diplomacy, initiated in 1992 at the Mediterranean Academy of
Diplomatic studies in Malta. In November 2001, Diplo was established
as an independent non-profit foundation by the governments of Malta
and Switzerland. Diplo has received wide recognition for its work, including consultative status with the United Nations. Today, Diplo works to
increase the capacity of small and developing states to engage effectively
in international policy, negotiations, and diplomacy. We do this by providing capacity development programmes in areas such as Internet
governance and climate change diplomacy; using and developing tools for
e-participation in global governance, including remote participation
in international meetings and social media for global negotiations; and
