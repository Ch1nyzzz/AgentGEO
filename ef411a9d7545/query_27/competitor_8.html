Beautiful 1950 Dodge Coronet DiplomatThis is the first year of the hardtop coupe. "This youthful model will have a particular appeal to those who want the sleek, distinctive styling of a convertible and the convenience and security of a hardtop" ... from the 1950 Dodge ad.FULLY DOCUMENTED FRAME OFF RESTORATION with photos from start to finish. From every nut and bolt polished, plated or painted. This was a labor of love with no expense spared. Body work was done correctly with lead and not plastic body filler. Gyro-Matic transmission that is a 4 speed on the column ! Running gear and brakes work great. Beautiful chrome throughout. Options include fender skirts, windshield visor, fog lights, spotlight, back up lights, curb feelers, factory tissue dispenser, and more ! Nothing overlooked, right down to the weatherstripping &amp; lace. ! Custom dual exhausts with chrome tips give her a great sound. Original hubcaps. Mileage will differ as shown as I use her on weekends. Less than 500 miles since restoration. Original PA car.The beautiful two tone exterior is fantastic ! The metallic green roof harmonizes with the burgundy interior. The exterior is stock whereas the interior is slightly updated with the most comfortable seats imaginable. She is eye candy and a show winner every time displayed. This year she took First Place at the Relay for Life event May, 2014 at Putnam County , TN. She also came in Third Place at the Heritage Memorial Day, 2014 Car Show in Granville TN, with over 400 cars displayed ! And driven, no trailer Queen.Photos can only show so much, come look for yourself... this Wonderful car is appraised for $22,000, but has a Million Dollars worth of smiles and memories. This vehicle you will enjoy for years to come. I will work with your shipper to make this a pleasurable experience. She is stored indoors if you need time to make arrangements.If you need questions answered, email me or contact me at 931-529-0212... Thank you for your interest. </span></p> INTRODUCTION AND DESCRIPTIONYou are viewing my 1980 Dodge Mirada CMX. Born with a 318-V8 (5.2L) engine, this Mirada now sports a high performance 318-4 barrel engine and a 727 "TorqueFlite" three-speed automatic transmission from a Dodge Diplomat police car. The rear end is the standard (non-limited slip) 2.94:1 ratio. Finished in Patrioit Blue Metallic with blue cloth bucket seats and console, the odometer shows just over 62.000 miles (which i believe to be correct) as of the date of this auction. It has had two known owners including me (I bought this car 12 years ago). Manufactured from 1980 to 1983, the J-body platform was shared by the "Mirada" and "Cordoba" nameplates, and only about 52,000 total Miradas were made over those four years. The 1980 Mirada sold about 28,000 total cars, of which about 5,300 being the 'top-of-the-line" CMX models like this one. Note that the “M” body Gran Fury and Diplomat nameplates were the mainstay Mopar police cars from 1981 to 1989. The “J” and “M" platforms shared many physical attributes, which in turn allowed a lot of part interchangeability.Let me decode a few relevant portions of the RPO codes: E44 = 318-V8, A75 = CMX package, C16 = Console with floor shifter, SC9 = Nightwatch Blue Exterior Paint, H51 = Air conditioning, P31 = Power Windows, B12 = Heavy Duty Front Disc Brakes, S14 = Heavy Duty Suspension Package, and S62 = Tilt Steering Column. The B12 and S14 options basically gave this Mirada many of the heavy-duty elements of the police car suspensions, meaning front and rear anti-sway bars, stiffer springs, bigger shocks, etc,., but kept the 10-inch rear drum brakes of the civilian models. Other standard and optional features on this Mirada are power steering and brakes, dual mirrors, cruise control (works intermittently), tinted glass, and rear window defroster (condition unknown). The vehicle came to me without its original wheels, but given it had the beefy suspension already, I decided to install the "pursuit spec" 318-4V HP (high performance) engine, radiator, fluid coolers, and transmission from a wrecked 1988 Dodge Diplomat police car. The police car was a former detective's car that had been rear-ended, had 44,000 miles on it and that I bought in 1999. This Mirada's factory rear-end gear ratio of 2.94:1 is the same as the pursuit-class M body police cars used.All the work on this Mirada was done in 2001, or approximately 4.500 miles ago. So the engine in this Mirada is the police V8 mated to a heavy-duty 727 TorqueFlite 3-speed transmission. We freshened up the engine with new valve cover intake and oil pan gaskets, rear main seal, freezeplugs, and new filter and gasket for transmission. These powertrain parts bolt right into the “J” bodies and no cutting, welding, or special fabrication is necessary. If you do not know the HD police engine content of this era...the "360" heads, the various moly parts, windage tray, double roller timing chain, etc. ... many internet sources can help you. All that content plus the different shift points (tranny shifts gears at higher RPM under hard acceleration versus civilian powertrains) in order to improve "pursuit" performance. To complete the installation, we added a custom made, "true" dual exhaust (including catalytic converters and tail pipes). The Mirada gas tank position from the factory is biased toward the driver side and does not allow clearance for a tail pipe exit under rear bumper on that side, so we exited the tailpipes just behind the rear wheels at at downward angle.The AC/heat works fine. All gauges work as well but the digital clock and cigarette lighter do not function. I added a Chrysler factory AM/FM/CB radio and a magnetic CB antenna (not shown but will be included) mostly for "show". Note thought that while the radio works just fine using the factory antenna, it is not connected to the CB antenna. The CB mode in radio does function.The wheels 17x8 and 17x9.5 Center Lines in polished alumimum. The tires are Goodyear Eagle F1 DS G3 "Z" rated high performance radials in the 255/45-17 and 285/40-17 size with nearly all the original tread remaing. Billet aluminum adapters were used to give the correct spacing as the wheels have a later model "offset" that I wanted to go with. Yes, there is a considerable investment in wheels and tires here. Yes, if you want a complete set (original centers included) of original road wheels versus the wheels shown, we can evenly swap a set (I will mount road wheels to some old tires for transport. If you plan to drive it somewhere, bring your own tires and we will mount them to the wheels for you free).This Mirada professionally refinished in "Patriot Blue Metallic" (in base coat/clear coat) for an updated twist on the original color. We mono-colored the grille, deleted the pinstripes (they were faded anyway) and removed the wheel well trim and the "CMX" fender and deck badges to "understate" the vehicle a bit. I did not replace the plastic quarter panel extensions so they are original and somewhat brittle, so great care must be taken handling them. During the refinishing, we noted no previous body work and no frame, underbody, floor pan, or trunk pan rust (or repairs of rust) whatsover.The external bright, rubber and painted trim is in good driver quality condition and consistent with the age of the vehicle (so there are assorted scratches, dings, cracks and other age-related patina etc.). All the glass is good. The original plated-aluminum rear bumper (a good weight saving tactic but very bad "cosmetic" idea from Chrysler back in the day) has some peeling on the underside. Trunk is clean, has the scissors jack but no spare tire. The interior is in good original condition but with obvious areas of age and wear-related conditions. The original owner replaced the headliner several years ago in a way that eliminated the fabric. It wasn't done the way I would have done it (I think they just removed the fabric and then painted the backing material) but its in decent shape. The dash panel is fairly straight, but slightly is faded in areas and has a four-inch long, quarter inch wide seam crack on top and to the right of the radio area. There is also the common fading of the "brushed-alumimum plastic" surfaces on dash face and the console.The seats and carpet are original, are in good shape showing normal wear but without defects such as splits, stains, or tears. The door panels are in good shape and the upper door rails have the common breakage. I do not have the owners manual but it can readily be purchased from a variety of sources.This 1980 Dodge Mirada CMX is a nice, old vintage cruiser of which only a few copies were ever made. With the obvious exception of powertrain and wheels/tires, the vehicle is highly original. Also as obviously the powertrain is a measurable performance upgrade for this vehicle, but if for some reason you wanted to another civilian powertrain will drop right back in and all most all the trim parts/CMX badging/pin striping can be reinstalled. I hope it finds a good home with an appreciative new owner to maintain and improve upon it where needed.AUCTION SUCCESS CONSIDERATIONSI have established Buy it Now Price and I am also willing to consider reasonable offers for this 1980 Dodge Mirada CMX. Note that I reserve the right to end this auction at any time at my sole discretion should there be a local sale. Encountering non-paying or unresponsive bidders is a very disruptive event that makes the auction experience unpleasant for both the seller and any legitimate potential buyer(s). Please BE SURE BEFORE YOU BUY IT NOW OR MAKE OFFERS that you have done whatever you need to do to STAND BEHIND THE ACTIONS YOU TOOK ON THIS LISTING. Please note that, EXCEPT FOR THE BUY IT NOW PRICE, no offers will be automatically accepted so you can offer what YOU WANT TO PAY and I will respond with ACCEPTANCE or COUNTEROFFER. If you get a counteroffer from me you can then decide to ACCEPT or REJECT my counteroffer. UNREASONABLE OFFERS will be automatically rejected by the Ebay system based on the parameters I used to set up the listing. INSPECTION AND WARRANTY INFORMATIONPlease ask any questions that you may have that may not have been answered by this detailed listing narrative and visual media attachments. My listings are constructed in complete sentences in order to communicate my knowledge of important facts and to encourage independent thoughts and then any questions from interested parties.But respectfully, I do not know what is important to you that may not have been discussed or depicted herein unless you ask me. Any and all relevant and appropriate questions you submit while the auction is running will be answered promptly and as thoroughly as possible by email only to ensure clarity of any correspondences. Given that this is a used vehicle, please do not have unreasonable expectations as to its current condition or future condition under your ownership. Also given its obvious age, this vehicle represents whatever standards of quality and workmanship that existed when it was built, so comparisons to improved build standards of today's vehicles is not appropriate.If you require it, please make all pre-purchase inspections (at the sole expense of the bidder) before committing to purchase the vehicle. Inspections can be done by appointment only by you or your designated inspection service. Although I believe I have described and depicted (with numerous high-resolution photographs and video) this vehicle accurately, please note that this vehicle is sold "as-is, where-is” with no express or implied warranties or guarantees of any kind. PAYMENT AND STORAGEA $500 deposit is required from the winning bidder, due electronically via PayPal within 24 hours after the auction ends, to hold the vehicle. I will not be accepting trades. Full payment is due within 3 days of auction end via cash, bank-to-bank or wire transfer, or certified bank check (drawn on a major US bank). Clear State of Michigan (my legal State of residence) title in my name is in hand and vehicle can be scheduled for buyer pickup by appointment at anytime after full payment is received and cleared. I can hold the vehicle in indoor storage for 15 days (or longer, if weather or other uncontrollable factors emerge) at no charge to the winning bidder after the auction (the charge is $15.00 per day after 15 days). Thank you for viewing my auction. </span></p><span data-dcnode-id="2697" instrument_node="">

0 on it (odometer read 29,000) when I bought it. I have since added a POLICE SPEEDOMETER (certified, 125 mph) which reads 63,000 or so, I think. Clearly this is not the original speedometer/odometer from this car, so the odometer is inaccurate. Bottom line, the car has 134,000 miles give or take. Not a police package car, but made to look like one. Bad stuff: 1.) Horn not working but just needs to be plugged back in and bolted back on. I took it out while trying to mount police-style grille lights over the summer. 2.) Tilt steering column loose, flops around a bit. It's been this way since I bought it. Still perfectly safe to drive. Google the problem, there's been plenty written about it. You have to dis-assemble the column halfway and tighten a few bolts. 3.) Heater works on defrost and floor mix and that's it. Not really a big deal. You can turn it on and off, just when it's on, it's stuck in that position. 4.) Headliner starting to come loose in a couple spots. Barely noticeable. This isn't a restoration or a show car. It's a 1987 Plymouth that's been driven since 1987. It's in better shape than anything 1987 here where I live. In order to make it perfect, you need a paint job, some interior cleaning and some minor tinkering. But hey, let's face it...that's the fun stuff. I've owned this car since 2010 and I've loved every minute of it. It's been a good car, saving my ass when my main transportation broke down on numerous occasions. I daily drove it for several months over this past summer and in years past. It never, EVER complains and it has never let me down. It's been stored in my heated garage every winter since I've owned it. These are becoming fun Mopars to own and are gaining in popularity. Hopefully it will make someone a good project or boulevard cruiser. It gets A LOT of attention. The car is running (runs GREAT), driving, stopping and steering. It's a driver and it's ready to go. Brakes good, lights work, no leaks, etc. I'd be confident driving it an 1979 Dodge Magnum GT Dodge made 1,674 Magnum GTs in 1979 and to the best of my knowledge only 162 with the “Police Package" driveline (L code on VIN and E58 on fender tag). How many GT’s have survived with this drivetrain and T-tops too? I only know of one other and it was highlighted in the July 1998 edition Chrysler Car Enthusiast Magazine. I will do my best here to provide as accurate and detailed information as possible so you can make an informed decision. I bought this car back in 2002 after it had been restored by a gentleman in North Carolina. Originally, I believe this car to be from Virginia. It has not been driven in winter conditions since I’ve owned it and only in rain if caught in it. From the pictures I received during the restoration it did have some small amount of rust at the bottom of each quarter panel; behind the rear tires. That obviously has been fixed. Overall I’d say the man who did the restoration did a very, very nice job. However, it was not a rotisserie restoration. Below, I will go into detail about the New Old Stock (NOS) parts he installed. I do not know if the powertrain was worked on at all. It runs very strong for a heavier car. The police package was known to be “bullet-proof”, no pun intended, and this one is no exception. Unfortunately, I do not have the build sheet. It may still be in the vehicle somewhere but I haven’t found it. With as many NOS materials as were used on the interior during the restoration, it probably was discarded. But, I don’t know for sure. With the fender tag and VIN decoded, it provides quite a bit of information anyway. This vehicle has won and placed in many local shows over the years. A few years back now it took 2nd at Chryslers at Carlisle to an almost perfect, ’78 Magnum GT w/T’s. VIN: XS22L9R****** Fender Tag: N41-Dual Exhaust w/o Tips G55-Left Outside Painted Racing Mirror G67-Right Outside Painted Racing Mirror H51-Air Conditioning with Front Heater (AC compressor runs when charged but there is a leak. Heater works great) M27-Wheel Lip Flares M55-T-Bar Roof (Yes, the T-tops do leak slightly. I’ve tried to fix that and have improved it but not completely. It’s not bad and since it’s a nice weather driver no big deal) K5C-Vinyl Body Side Molding A75-GT Package (wheel lip flares, G60x15 outline white letter Goodyear tires, heavy duty front and rear sway bars, quick ratio steering, leather wrapped steering wheel, engine turned dash and console appliques) C16-Console C56-Bucket Seats-Non Recliner EW1-Spinnaker White Paint B12-Heavy Duty Front Disk Brakes B28-11x2.5 Rear Brakes E58-360 Cubic Inch, 8 Cylinder, 4 Barrel Carburetor (ThermoQuad), Dual Exhaust D36-A727 Automatic Transmission Vehicle Options: 8-Track AM/FM Stereo with 4 Speakers (8-track works good but hard to find good 8-tracks. AM/FM works most of the time) Rallye Instrument Panel with Tachometer, Water Temp, Oil Pressure, Fuel Level, and Alternator gauge (doesn’t move much) Chronometer Digital Clock (works perfectly – this is not the electro mechanical clock from previous year Chrysler products) 3.21 Sure-Grip Differential Magnum 15x7 Road Wheels Blue Body Side Tape Stripes Electronic Remote Trunk Release Carpeted Trunk Inside Hood Release The difference of an E58 car? This is the highest performance engine Dodge put in their vehicles in 1979. They put these in the Lil Red Express truck which, for 1979, were the fastest tested truck that year. The E58 package had a performance valve train including: cam, valves, valve springs, rockers, double roller timing chain, dual exhaust, non-lockup torque converter, large brakes and radiator. Among dozens of other things, I have replaced the Spark Control Computer with a MoPar Performance Electronic Ignition. The computer (not a Lean Burn - that was 1978) still worked okay and is still on the air cleaner if desired to be hooked back up. This computer is correct for the police package and supposed to be higher performance. I however, wanted the reliability and possible increased performance of the vacuum advance and newer electronics. The car responded nicely to the upgrade. Recently, I put on 4 new Goodyear tires to get the look closest to that of the original tires. These currently have probably less than 500 miles on them. As far as the other things I’ve replaced over the years, this is just a sample: radiator, water pump, thermostat, most engine hoses except AC, front wheel bearings, alternator, ignition switch, voltage regulator, fuel pump, rear brake lines, coil, etc. etc. etc. Car still has the original leather bag (really nice condition) that holds the glass T-top panels. In 2009, this car was featured on month April in the ‘MoPar Style ‘Annual Calendar. NOS equipment – As I mentioned the gentleman who restored it used many new Chrysler parts. Here is the list as I know it. NOS: headlight doors (work fantastic) and park/turn signal lights, factory dark blue vinyl interior fabric, factory dark blue carpet, horn buttons, and tail light assemblies. All of the exterior chrome was redone at restoration and done very well. Stainless has all been polished multiple times. I am not sure if he replaced the dash pad or not but it’s nearly perfect. Overall, the interior is in very nice. Headliner is near perfect as is the package tray, courtesy light lenses, all kick panels, etc. One of the seat belts is missing the blue colored trim piece. The paint overall is extremely good. There is no rust on the body or underneath except for a small bubble on the passenger side rocker. It has not gotten larger over the last 10 years and it has not come through. There is no rust in the trunk at all (not sure if that was replaced at restoration or not but I don’t believe so). Please note the paint is not perfect. There are a few (like two or three) pinhole size chips that I have not touched up. The underside of the car is pretty much factory original; clean and solid. The floor boards are very solid and again, as far as I know, original. The engine bay has had quite a bit of attention to it but was not completely repainted at the restoration. It is very well detailed and I did find and replace many of the factory markings/stickers. I have three boxes of additional parts I will include (came with the car when I bought it). Not sure if it’s complete or not but there are parts to convert the car to electric windows including a NOS window switch. So that’s it in a nutshell. I feel the Buy-it-Now price is reasonable but will consider other reasonable offers. You should be able to drive this car anywhere and it will show well. Plus, you can be almost guaranteed it will be the only Magnum at your local show. Many people do not even know Dodge made this model for 2 years! I will accept a wire transfer, money order, or check (cleared before title transfer), or certified check at transfer and a $2,000 deposit. I am advertising in multiple locations and reserve the right to pull this ad. Buyer is responsible for shipping. This vehicle does not come with a warrantee and is being sold as-is. Please enjoy the pictures and let me know if you should have any additional questions. If you’d like, you can view more pictures at: http://s941.photobucket.com/user/JimsGT/library/1979%20Magnum%20GT Keywords: 1978 1979 Dodge Chrysler Plymouth Magnum Charger Cordoba Mirada Challenger Coronet Dart 300 Imperial Newport New Yorker LeBaron Diplomat Daytona Superbird SuperBee Aspen SuperCoupe Volare </span></p><span data-dcnode-id="2288" instrument_node="">
