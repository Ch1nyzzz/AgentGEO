</span></header><figure class="td-media td-media--story" data-dcnode-id="1168" id="td-story-image" itemprop="associatedMedia image" itemscope="" itemtype="http://schema.org/ImageObject"><meta content="https://thediplomat.com/wp-content/uploads/2016/05/sizes/td-story-s-2/thediplomat_2016-05-17_03-31-12.jpg" data-dcnode-id="1172" itemprop="url"><meta content="true" data-dcnode-id="1171" itemprop="representativeOfPage"><div class="td-img" data-dcnode-id="1169"><img alt="Interview: Peter Frankopan" data-dcnode-id="1170" sizes="(min-width: 915px) 462px, (min-width: 753px) 300px, (min-width: 672px) 624px, calc(100vw - 48px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thediplomat.com/wp-content/uploads/2016/05/sizes/td-story-s-1/thediplomat_2016-05-17_03-31-12.jpg&amp;raw" srcset="https://thediplomat.com/wp-content/uploads/2016/05/sizes/td-story-s-1/thediplomat_2016-05-17_03-31-12.jpg 300w" title="Interview: Peter Frankopan"></div></figure><section class="td-prose td-pwOn ng-scope" data-dcnode-id="1036" id="td-story-body" itemprop="articleBody" ng-if="dplpw.read"><aside class="td-box td-ad td-ad-vertical td-right" data-dcnode-id="1160"><header data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Advertisement</span></header><div class="td-ad-body" data-dcnode-id="1161"><div class="td-ad td-ad--gpt" data-dcnode-id="1162" id="div-gpt-ad-1343666802946-1"></div></div></aside><p data-dcnode-id="1141"><span data-dcnode-id="1159" instrument_node="">Dr. Peter Frankopan is a prominent historian at Oxford University and author of the book </span><em data-dcnode-id="1155"><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bloomsbury.com/uk/the-silk-roads-9781408839973/"><span data-dcnode-id="1158" instrument_node="">The Silk Roads: A New History of the World</span></a><span data-dcnode-id="1156" instrument_node="">.</span></em><span data-dcnode-id="1154" instrument_node=""> In December 2015, </span><em data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">The Silk Roads</span></em><span data-dcnode-id="1151" instrument_node="">&nbsp;was named</span><em data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node=""> The Daily Telegraph</span></em><span data-dcnode-id="1148" instrument_node="">’s History Book of the Year 2015. Dr. Frankopan has also written frequently for&nbsp;</span><em data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">The New York Times, The Washington Post</span></em><span data-dcnode-id="1145" instrument_node="">, and</span><em data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">&nbsp;The Guardian</span></em><span data-dcnode-id="1142" instrument_node="">.</span></p><p data-dcnode-id="1136"><span data-dcnode-id="1140" instrument_node="">He recently spoke with </span><em data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">The Diplomat</span></em><span data-dcnode-id="1137" instrument_node="">’s Muhammad Akbar Notezai about the nature of China’s relations with Pakistan and India, the China-Pakistan Economic Corridor, and the Gwadar port project.</span></p><p data-dcnode-id="1131"><b data-dcnode-id="1132"><em data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">The Diplomat:&nbsp;</span></em><span data-dcnode-id="1133" instrument_node="">What is your opinion on the state of China-Pakistan relations today?</span></b></p><p data-dcnode-id="1127"><em data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Dr. Frankopan:</span></em><span data-dcnode-id="1128" instrument_node=""> This is a period where relations between China and Pakistan are extremely positive. There are many areas of mutual interest to both countries, and clear evidence of ways in which China and Pakistan have proved willing to co-operate and work together – including energy provision, national security, and of course, the China-Pakistan Economic Corridor (CPEC)</span></p><aside class="td-box td-box-m td-left" data-dcnode-id="1106" id="td-box-newsletter"><header data-dcnode-id="1120"><h3 data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Diplomat Brief</span></h3><h4 data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Weekly Newsletter</span></h4><i data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">N</span></i></header><div class="td-main" data-dcnode-id="1107"><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Get briefed on the story of the week, and developing stories to watch across the Asia-Pacific.</span></p><a class="td-btn td-btn--full-width td-btn--no-margin" data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thediplomat.com/newsletter/"><span data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Get the Newsletter</span></span><i data-dcnode-id="1109"><svg data-dcnode-id="1110" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"></svg><span data-dcnode-id="1115" instrument_node="">
</span><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" data-dcnode-id="1114"></path><span data-dcnode-id="1113" instrument_node="">
</span><path d="M0 0h24v24H0z" data-dcnode-id="1112" fill="none"></path><span data-dcnode-id="1111" instrument_node="">
</span></i></a></div></aside><p data-dcnode-id="1103"><b data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Why are the Chinese so interested in heavily investing in Pakistan? </span></b></p><p class="td-ad-inline td-ad-inline-txt" data-dcnode-id="1098" ng-show="dplpw.ad"><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thediplomat.com/subscriptions/"><b data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Enjoying this article?</span></b><span data-dcnode-id="1100" instrument_node=""> Click here to subscribe for full access. Just $5 a month.</span></a></p><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">It is important to underline that China is not only interested in investing heavily in Pakistan: the proposed investments are part of a much wider picture and part of a large plan to upgrade infrastructure across the whole of the Silk Roads – part of what China calls the One Belt, One Road initiative. This promises to see roads, high-speed trainlines, 3G and 4G mobile networks as well as power plants, schools, and airports mushroom up across a large part of Asia.</span></p><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">The investment into Pakistan has three purposes. First, to boost the social and economic development of Pakistan, which will be good for the country and make Pakistan a good, stable neighbor for the long-term; second, to win support within Pakistan for China and its own ambitions for the future – a future where it is important to have deep friendships with other nations and with key decision makers; and third, to help China’s own progression and growth. Although it is this third issue which is the most important, all three are significant motivations.</span></p><p data-dcnode-id="1091"><b data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">What are the challenges of the China-Pakistan Economic Corridor?</span></b></p><aside class="td-box td-ad td-right" data-dcnode-id="1084"><header data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Advertisement</span></header><div class="td-ad-body" data-dcnode-id="1085"><div class="td-ad td-ad--gpt" data-dcnode-id="1086" id="div-gpt-ad-1343666802946-2"></div></div></aside><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">There are lots of answers to that question. One is about who will actually benefit from the Corridor – and how. Like with all ideas and like with all business deals, getting the details right is crucial. Working out what the benefits and what the real costs will be is vital. Most attention is focused on the costs and the process of building the infrastructure that has been proposed – roads, train lines and so on. But one very obvious simple example is to ask about the environmental costs that will inevitably come if Chinese goods start moving across Pakistan in large volume. How does one project what the rise in emissions will be – and what impact will they have on local communities, as well as more broadly? What costs will there be, financial, social, and moral, to the emergence of long-distance trunk roads – where we can see the impact these have had in South America and Africa?</span></p><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">But then there are much bigger and more complex questions too. First, of course, is how does Pakistan handle a powerful neighbor who has invested lots of money, has its own interests to protect, and will inevitably have its own views and preferences about what decisions are made in Islamabad? But to my mind, there are two issues that are even more important. As all cricketers are taught, you must keep your eye on the ball. In the case of CPEC, it is certain that this will have significant implications for Pakistan’s relations with India, and that it will potentially destabilize the situation in Kashmir. Those need to be thought through very carefully at the outset.</span></p><p data-dcnode-id="1077"><b data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Can the China-Pakistan Economic Corridor improve Pakistan’s economy and restore stability?</span></b></p><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Yes. Whatever our religious convictions, whatever our political views, and whatever our favorite issues are, we all recognize that arguments won through elegant argument are better than those won by force: tolerance is the best way to gain respect – to have the grace to recognize the merits of other people’s views without agreeing with them, and the self-confidence not to be threatened by differing opinions. Tolerance of course goes hand in hand with peace, and peace is in turn the key ingredient for prosperity. Those who seek to destabilize do so in the knowledge that their own positions will become untenable and that they thrive when people fear the worst, rather than hope for the best. If people in Pakistan can see that things are getting better, that their children will grow up in a world that is becoming more fair and more open, that those who work hard and do well reach the top, then Pakistan will have much to look forward to.</span></p><p data-dcnode-id="1072"><b data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">What do you think are the Chinese planning for the Gwadar port project?</span></b></p><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">It is clear that China has very ambitious plans indeed for Gwadar. If all goes according to plan, this will be China’s Shanghai in the west – a trade emporium par excellence that connects the country with markets in the Middle East, Africa, and Europe. It will be interesting to see how things develop, because a long-term lease has been granted; at some point China will either need to renew this lease, or will walk away and start degrading its facilities and expenditure and perhaps looking elsewhere for options – to India, for example, or Iran. So Pakistan needs to play its cards right and to anticipate this question, rather than have to react to it.</span></p><p data-dcnode-id="1067"><b data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">In your opinion, how concerned is China about the security situation in Balochistan Province where the Gwadar port is situated? </span></b></p><p class="td-ad-inline td-ad-inline-txt" data-dcnode-id="1062" ng-show="dplpw.ad"><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thediplomat.com/subscriptions/"><b data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Enjoying this article?</span></b><span data-dcnode-id="1064" instrument_node=""> Click here to subscribe for full access. Just $5 a month.</span></a></p><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">No one likes to have their engineers attacked or kidnapped. It reflects poorly on the home country that security is so lax. The Chinese have taken great pride for millennia in ensuring that roads in their country are safe – texts written two thousand years ago attest to steps being taken to ensure travel for all, foreigner and local alike, was easy and reliable. These are difficult times in Pakistan because lawlessness and anarchy spread like cancer – it does not take much for today’s problems in Balochistan (and other regions too) to spill into ‘safe’ provinces and towns. Maintaining order is not just vital for China; it is vital for Pakistan too.</span></p><p data-dcnode-id="1057"><b data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">What are Iran’s and India’s concerns over the development of the Gwadar port project?</span></b></p><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">These are still early days and what happens with Gwadar is still very much up in the air. But there is no surprise, I think, that Iran and India are watching with interest. On the one hand, Gwadar presents a threat to both; on the other, it also presents a model that might also work for each – or both. There is everything to play for.</span></p><aside class="td-box td-ad td-right" data-dcnode-id="1048"><header data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Advertisement</span></header><div class="td-ad-body" data-dcnode-id="1049"><div class="td-ad td-ad--gpt" data-dcnode-id="1050" id="div-gpt-ad-1572275980546-0"></div></div></aside><p data-dcnode-id="1045"><b data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">What are the likely implications of India-China relations on the China-Pakistan relationship? For China, is it possible to maintain a balance between India and Pakistan and not tilt toward the later, given the history of India-China relations?</span></b></p><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">The triangle is complex. It should be in everyone’s interests to work and develop together. Economic growth in China, Pakistan, and India is of course ideal for all concerned. Likewise, the improvement in tolerances across all countries is something not only positive within each country, but for the whole region.</span></p><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Unfortunately, however, things are complicated by rivalries, animosities – and by history. The key problem revolves around Kashmir. Although it might not seem so in either India or Pakistan, there is a stalemate in Kashmir that almost works for everyone: a situation where no one can win, but everyone can complain.</span></p><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">That balance might well now change because of China’s more extensive involvement – both direct and indirect. Although there are many signs that India and China have a much more constructive relationship than they have had in the past, the default position is to eye each other up with some suspicion. Working together does not come naturally to either, but considerable efforts have gone in on both sides to try to make relations work.</span></p><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">But if China invests as heavily in the CPEC as it promises to do, then many balances may change – between Pakistan and India, but also between India and China. As a historian, I am not fond of volatility as I know that such periods can encourage politicians to make bad decisions.</span></p></section><div class="ng-hide dpl-pw-msg" data-dcnode-id="979" data-pwmsg="" ng-show="dplpw.message.view"><span data-dcnode-id="1034" instrument_node="">
