</span><p data-dcnode-id="1971"><img alt="" class="wp-image-42093 td-animation-stack-type0-2" data-dcnode-id="1972" height="466" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Instructor-at-Officer-Cadet-School_SAF-Training-Institute_SAFTI.jpg&amp;raw" srcset="https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Instructor-at-Officer-Cadet-School_SAF-Training-Institute_SAFTI.jpg 800w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Instructor-at-Officer-Cadet-School_SAF-Training-Institute_SAFTI-515x300.jpg 515w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Instructor-at-Officer-Cadet-School_SAF-Training-Institute_SAFTI-768x447.jpg 768w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Instructor-at-Officer-Cadet-School_SAF-Training-Institute_SAFTI-696x405.jpg 696w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Instructor-at-Officer-Cadet-School_SAF-Training-Institute_SAFTI-721x420.jpg 721w" style="width: 800px;" width="800"></p><span data-dcnode-id="1970" instrument_node="">
</span><p data-dcnode-id="1967"><em data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Mejar Singh Gill: Instructor at Officer Cadet School, Singapore Armed Forces Training Institute, 1982 – Photo: Supplied</span></em></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1965"></p><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1961"><strong data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">BACKGROUND</span></strong></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Born in 1949, Mejar Singh Gill alias Major Singh Gill landed in Singapore as a 6 year old in 1955. He comes from a very humble family background.&nbsp; His father, without any formal educational background, came to Singapore in 1950 where he joined the British Naval Police Force as an ordinary Police Constable. Mejar grew up with his large family of 7 siblings in the Naval Base, among the large community of over 400 Sikh families then constituting the Naval Police Force.&nbsp; He was the third eldest in his family, with two sisters older than him. His father, being rather conservative and having plans then of eventually returning to Punjab, chose not to send his elder two daughters to school, being quite content with them mastering Gurmukhi and being proficient in the Guru Granth Sahib (Sikh Scripture) but quite happy to send Mejar to an English School, followed by other siblings later.</span></p><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">This was the period of significant changes in the region, and Singapore in particular, which impacted everyone’s life including Mejar’s. </span></p><span data-dcnode-id="1954" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1953" instrument_node="">“I did my initial primary education at the Admiralty Asian School within the Naval Base where we sang British National Anthem ‘God save the Queen’ daily. With Singapore attaining self-government in 1959, we all got transferred to Naval Base School, a newly built school outside of the Naval Base. Our national anthem, </span><em data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Majulah Singapura</span></em><span data-dcnode-id="1950" instrument_node=""> replaced ‘God save the Queen’. Just 4 years later we were singing another national anthem, </span><em data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">Negara Ku</span></em><span data-dcnode-id="1947" instrument_node=""> when Singapore merged with Malaysia in September 1963.</span></p><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1943"><img alt="" class="wp-image-42095 td-animation-stack-type0-2" data-dcnode-id="1944" height="440" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Weapon-Presentation-Ceremony-for-Recruits.jpg&amp;raw" srcset="https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Weapon-Presentation-Ceremony-for-Recruits.jpg 700w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Weapon-Presentation-Ceremony-for-Recruits-477x300.jpg 477w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Weapon-Presentation-Ceremony-for-Recruits-696x437.jpg 696w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Weapon-Presentation-Ceremony-for-Recruits-668x420.jpg 668w" style="width: 700px;" width="700"></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1939"><em data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Mejar Singh Gill:&nbsp;Weapon presentation ceremony for recruits, 1974&nbsp;– Source: Supplied</span></em></p><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1937"></p><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1935" instrument_node="">“What seemed to be interesting times, soon changed into turbulent times. Singapore’s merger with Malaysia was fraught with difficulties both within and from outside. Not only did Indonesia announce its policy of </span><em data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Konfrontasi</span></em><span data-dcnode-id="1932" instrument_node=""> (Confrontation) against Malaysia, there were also the racial riots of 1964. Not long after, we woke up on the morning of 9 Aug 1965 to see our Prime Minister Lee Kuan Yew emotionally announcing the separation of Singapore from Malaysia to become sovereign nation, and we all reverted to singing </span><em data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Majulah Singapura</span></em><span data-dcnode-id="1929" instrument_node=""> all over again.”</span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Immediately after obtaining his Senior Cambridge Certificate, and given his family’s financial situation with the younger siblings already going to school, Mejar applied for and got selected as a trainee teacher. He taught at West Hill Primary School in the morning session and attended classes at the Teachers’ Training College at Patterson Road for three afternoons a week, as was the arrangement those days.</span></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">But the ongoing developments in the region in the 1960s were to further change Mejar’s life. Instead of pursuing a teaching career, he soon found himself serving in the Armed Forces instead. Other than the Indonesian Confrontation, the Vietnam War was still raging and there were fears of the ‘domino effect’ on the non-communist states, including tiny Singapore. Hence, the emphasis on defence and the reliance on a conscript army rather than a regular army to defend Singapore.</span></p><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1919"><img alt="" class="wp-image-42094 td-animation-stack-type0-2" data-dcnode-id="1920" height="575" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_defence-minister_UNIKOM-Mission.jpg&amp;raw" srcset="https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_defence-minister_UNIKOM-Mission.jpg 700w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_defence-minister_UNIKOM-Mission-365x300.jpg 365w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_defence-minister_UNIKOM-Mission-696x572.jpg 696w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_defence-minister_UNIKOM-Mission-511x420.jpg 511w" style="width: 700px;" width="700"></p><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1915"><em data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Mejar Singh Gill receiving the state flag from Singapore defence minister for UNIKOM Mission, 1995 –&nbsp; Photo: Supplied (Chinese newspaper cutting)</span></em></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1913"></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1909"><strong data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">CALL UP TO SERVE</span></strong></p><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">The first inkling of conscription being introduced in Singapore came in November 1966 when the Government announced that all newly appointed government and statutory board officers, subject to physical fitness, would have to do a stint of full time national service. </span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">“When I became a trainee teacher, I was already anticipating being called for some form of military training but did not know where, when and how I will be involved. Things moved rather fast in 1967 when new legislation was tabled to amend the National Service Ordinance (which had originally been passed by the British in 1952),” he said. </span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1901" instrument_node="">On 21 Feb 1967 (which coincidently was his 18</span><sup data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">th</span></sup><span data-dcnode-id="1898" instrument_node=""> birthday), PM Lee made the announcement of the introduction of national service, and in March 1967 the National Service (Amendment) Bill was&nbsp; formally&nbsp; passed in parliament.&nbsp; Soon after, small select groups of civil servants as well as students of institutions of higher learning under 30 years of age started receiving call up notices. A few days later, Mejar was one of over 9,000 18-year-old Singaporeans who received the enlistment notices, or pink cards, instructing us to register for NS at CMPB in Kallang.</span></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">“I did not just get one call-up notice but four! I happened to fall under all four categories of Singaporeans liable for national service during those early days of national service; namely young 18 years olds,&nbsp;new citizens, students of higher learning and new civil servants.</span></p><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">“In my case, I was 18 years old who had only recently become a naturalised citizen, was a new civil servant and was a student at Teachers Training College, which was then designated as an institution of higher learning. So even if I had tried to get deferment, which I had no desire to do so, there was little possibility for me succeeding as I fell into all four categories of persons liable for national service then,” he said.</span></p><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">On 9 Aug 1967, he proudly joined fellow Singaporeans in the republic’s second National Day Parade. The attention of all was on the marching uniform contingents, especially the one from SAFTI. Mejar was in the Teachers Training College Contingent. In subsequent years, after he enlisted into the Army on 21 Aug 1967, he too had a few opportunities to both participate in the participating contingents as well as be involved in some way or another in the organisational set up of the National Day Parades.</span></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">During his 30 years in the army, Mejar held various command, staff and instructional posts. In addition to commanding a Reserve Battalion, he also served in key staff roles at division level as well as in the Ministry of Defence (MINDEF). At the instructional level, he commanded companies training non-commissioned officers (NCOs) as well as Officer Cadets. His last post was that of Directing Staff at the Singapore Command and Staff College.</span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">During his stint in the Army, he had the opportunity to train in several countries. In particular, he specialised in jungle training, where he underwent training at the renowned British Jungle Warfare School in Ulu Tiram, Malaysia; the Counter Insurgency &amp; Jungle Warfare School (CIJWS) in Vairengte, Assam, India, as well as in the jungles of Brunei, Thailand and Taiwan. He also underwent various other forms of training in other countries such as Hawaii, US as well as Australia and New Zealand as well as participated in joint exercises with foreign armies.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1876"><span data-dcnode-id="1880" instrument_node="">Singapore, despite its small size, has played a very active role as a responsible member of the United Nations (UN). It has contributed in various fields, including humanitarian missions and peacekeeping operations. Mejar headed one such mission during his military career, which left him with ‘great memories being involved in such a noble cause’. He led the 5</span><sup data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">th</span></sup><span data-dcnode-id="1877" instrument_node=""> SAF UNIKOM Team overseeing peacekeeping at the Kuwait/Iraq border. </span></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><img alt="" class="wp-image-42097 td-animation-stack-type0-2" data-dcnode-id="1874" height="545" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Serving-in-Kuwait-Iraqi-Border_UN-Peacekeeping-Mission.jpg&amp;raw" srcset="https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Serving-in-Kuwait-Iraqi-Border_UN-Peacekeeping-Mission.jpg 800w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Serving-in-Kuwait-Iraqi-Border_UN-Peacekeeping-Mission-440x300.jpg 440w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Serving-in-Kuwait-Iraqi-Border_UN-Peacekeeping-Mission-768x523.jpg 768w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Serving-in-Kuwait-Iraqi-Border_UN-Peacekeeping-Mission-218x150.jpg 218w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Serving-in-Kuwait-Iraqi-Border_UN-Peacekeeping-Mission-696x474.jpg 696w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Serving-in-Kuwait-Iraqi-Border_UN-Peacekeeping-Mission-617x420.jpg 617w" style="width: 800px;" width="800"></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1869"><em data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Mejar Singh Gill: Serving at Kuwait/Iraqi Border under the UN Peacekeeping Mission, 1995 – Source: Supplied</span></em></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1867"></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">During his 30 years of service in the SAF, Mejar said that stands out as one of the most meaningful and insightful assignments he had undertaken in his military career. His greatest satisfaction was the opportunity to visit the Baba Nanak Shrine (also referred to as Tomb of Bahlol among the Arabs) in Karkh District of Baghdad which was still intact then.</span></p><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Mejar joined the SAF with “O” levels but was fortunate that it gave him the opportunity to upgrade himself with a tertiary education. While serving the SAF, he did his “A” levels on a part-time basis and was awarded a scholarship to pursue studies at National University of Singapore (NUS) where he obtained a BA (Hons) in 1986.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">After serving 30 years in the SAF and having attained the rank of Lieutenant Colonel, he decided to retire prematurely at the age of 47 at the end of 1996, when he joined the Ministry of Foreign Affairs (MFA).</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1856"></p><span data-dcnode-id="1855" instrument_node="">
</span><p data-dcnode-id="1850"><strong data-dcnode-id="1851"><u data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">&nbsp;</span></u><span data-dcnode-id="1852" instrument_node="">DIPLOMATIC SERVICE</span></strong></p><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">His second career lasted another 22 years. At MFA, his first new job was as Deputy Director, Consular Directorate, which required him to handle consular matters, including contingency planning. Given his military experience, for the first few years, despite having left the SAF, he found himself working hand-in-hand with SAF counterparts in planning and executing various operations that MFA undertook in assisting Singaporeans in distress overseas, namely the evacuation of Singaporeans from Cambodia and the Silkair Crash in 1997 followed by the assisted departure of Singaporeans from Indonesia during the 1998 riots in Indonesia.</span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1842"><strong data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Evacuation of Singaporeans from Cambodia in 1997.</span></strong><span data-dcnode-id="1843" instrument_node=""> Barely 6 months after joining MFA, he was involved in working with MINDEF in executing the evacuation of over 450&nbsp; Singaporeans from Cambodia whose safety was threatened by the Jun 1997 coup d’état and resultant civil war. The contingency plan in place was to pull out the Singaporeans, i.e. an “assisted departure” plan entailing use of commercial flights if civilian airport was operational and an “evacuation” plan through use of military aircraft if airport closed to civilian aircrafts. As the situation worsened, with clashes also taking place near the airport, the military option had to be activated. He represented MFA in coordinating the plan with MINDEF officials, which resulted in a successful operation involving 6 flights of C-130 aircraft with small groups of commandos on board. </span></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1837"><strong data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Silkair Crash</span></strong><span data-dcnode-id="1838" instrument_node="">. Barely six months after the Cambodian Crisis, Mejar was back in action interacting with the SAF during the Silkair crash. Silkair MI 185, a scheduled Boeing 737-300 flight from Jakarta to Singapore plummeted into Musi River near Palembang in Southern Sumatra on 19 Dec 1997. There were 97 passengers of various nationalities and 7 crew members on board. He describes it as “a heart-breaking scene at the airport with friends and relatives trying to get information about the aircraft that had going missing.” With the SIA Crisis Management Group taking the lead, he led the MFA Contingency to assist in liaison on the ground with the Indonesian authorities. Unfortunately, no bodies were recovered from the scene. But it was a trying period spending time with the families in Palembang, desperate for news of their beloved ones.</span></p><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1832"><strong data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">1998 Riots in Indonesia.</span></strong><span data-dcnode-id="1833" instrument_node=""> The fall of President Suharto in May 1998 resulted in serious civil disorder and unrest that warranted the safe evacuation of Singaporeans. Mejar was again involved in assisting in the planning and execution of the “assisted departure” of thousands of Singaporeans from Indonesia to Singapore. He remembers the chaotic scenes at Jakarta Airport with families of all nationalities desperate to get out.</span></p><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1829"><img alt="" class="wp-image-42096 td-animation-stack-type0-2" data-dcnode-id="1830" height="537" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Foreign-Military-Officers-Overseas.jpg&amp;raw" srcset="https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Foreign-Military-Officers-Overseas.jpg 800w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Foreign-Military-Officers-Overseas-447x300.jpg 447w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Foreign-Military-Officers-Overseas-768x516.jpg 768w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Foreign-Military-Officers-Overseas-696x467.jpg 696w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_Foreign-Military-Officers-Overseas-626x420.jpg 626w" style="width: 800px;" width="800"></p><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1825"><em data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Mejar Singh Gill: Interacting with foreign military officers abroad, 2000 – Source: Supplied</span></em></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1823"></p><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1819"><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">OVERSEAS MISSIONS</span></strong></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Having served at the MFA HQ, the rest of his career entailed doing stints at overseas missions, namely in Indonesia, United States and India. To him, these were interesting times, where he had the opportunity to interact with the officials of the various countries in representing Singapore’s interests as well as interacting with foreign diplomats and the larger communities, including Singaporeans living there. The postings also provided him the opportunity of making many more friends as well as exploring the beautiful countries. But there were also occasions where he was again involved in assisting in several contingencies, including the 2004 Tsunami in Indonesia and the Nepal Earthquake in 2015.</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">The massive underwater earthquake of 26 Dec 2004, measuring 9.0 on the Richter scale, that stuck off the western coast of Sumatra, Indonesia, triggering several tsunamis which wrecked destruction in countries bordering the Indian Ocean, is one event etched in his memory. &nbsp;He was then serving at the Singapore High Commission in Jakarta and was at the scene for over two weeks where he saw hundreds of bodies and the mass graves dug as burial grounds. </span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">“When the Tsunami took place, I was actually in Medan, about 400 km down south of Aceh, where I was attending a wedding of an Indonesian friend’s son. The hotel that we stayed in started shaking around 8 am in the morning. Though it did cause some alarm, with water spilling out of the swimming pool, the hotel management’s checks showed that there was no structural damage and we moved back to hotel after the short evacuation carried out,” he said.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Little did they realise the extent of the calamity befalling the people of Aceh around the same time that day. In the evening, he returned to Jakarta but was instructed to return back to Medan the next morning when the extent of the disaster become more apparent. From then onwards, it was a busy period for him and the Defence Attaché’s staff onsite coordinating with its Embassy Staff, MINDEF and other Indonesian agencies in rendering the necessary assistance.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1801"><strong data-dcnode-id="1803"><u data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Nepal Earthquake</span></u></strong><span data-dcnode-id="1802" instrument_node="">. During his posting in India, he was again involved in assisting Singaporeans in distress who found themselves stuck in Nepal during the massive earthquake that took place there in April 2015. This is because Singapore High Commission in India is also accredited to Nepal and Bhutan, and hence Mejar’s involvement. It was another trying experience.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><img alt="" class="wp-image-42098 td-animation-stack-type0-2" data-dcnode-id="1799" height="475" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_National-Day-Award-President-Nathan.jpg&amp;raw" srcset="https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_National-Day-Award-President-Nathan.jpg 800w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_National-Day-Award-President-Nathan-505x300.jpg 505w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_National-Day-Award-President-Nathan-768x456.jpg 768w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_National-Day-Award-President-Nathan-696x413.jpg 696w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_National-Day-Award-President-Nathan-707x420.jpg 707w" style="width: 800px;" width="800"></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1793"><em data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Mejar Singh Gill: Receiving National Day Award from President S R Nathan</span></em><span data-dcnode-id="1794" instrument_node="">, 2005</span></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1791"></p><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1787"><strong data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">SPORTS AND COMMUNITY</span></strong></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Mejar was an active sportsman in his schooling and army days, representing the Combined Schools and Singapore Armed Forces in hockey as well as playing for Singapore Khalsa Association (SKA). He was Singapore Armed Forces Hockey Convenor and also served as SKA’s vice president as well as vice president of Malaysia Singapore Sikh Sports Council (MSSSC). He is a serving trustee of SKA.</span></p><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">He has also been actively involved in community service. He was the founder member of Singapore Anti-Narcotics Association – Sikh Counselling Service in the mid-1970s, where he also served as chairman for several years. He is today actively involved at Gurdwara Sahib Yishun in Singapore.</span></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">In the course of his 52 years of service in the Singapore Armed Forces (SAF) and the MOF, LTC Mejar Singh Gill has won several commendation awards and citations, in addition to the UN (UNIKOM) Medal, SAF Overseas Service Medal and the National Day Long Service Medal and the Public Administration Medal.</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1775"><img alt="" class="wp-image-42100 td-animation-stack-type0-2" data-dcnode-id="1776" height="525" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_High-Commissioner-of-Australia-to-India-Harinder-Sidhu_Sashi-Taroor.jpg&amp;raw" srcset="https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_High-Commissioner-of-Australia-to-India-Harinder-Sidhu_Sashi-Taroor.jpg 700w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_High-Commissioner-of-Australia-to-India-Harinder-Sidhu_Sashi-Taroor-400x300.jpg 400w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_High-Commissioner-of-Australia-to-India-Harinder-Sidhu_Sashi-Taroor-80x60.jpg 80w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_High-Commissioner-of-Australia-to-India-Harinder-Sidhu_Sashi-Taroor-265x198.jpg 265w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_High-Commissioner-of-Australia-to-India-Harinder-Sidhu_Sashi-Taroor-696x522.jpg 696w, https://asiasamachar.com/wp-content/uploads/2021/12/Singapore_Mejar-Singh-Gill_High-Commissioner-of-Australia-to-India-Harinder-Sidhu_Sashi-Taroor-560x420.jpg 560w" style="width: 700px;" width="700"></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1770"><em data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Mejar Singh Gill: With High Commissioner of Australia to India Harinder Sidhu (daughter of&nbsp;Ajaib Singh also previously&nbsp;from Naval Base Singapore) and former international diplomat, politician and writer Sashi Taroor</span></em><span data-dcnode-id="1771" instrument_node="">, 2017</span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1768"></p><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1764"><strong data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">INTERESTING ANECDOTES</span></strong></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1758"><strong data-dcnode-id="1760"><u data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Name Confusion</span></u></strong><span data-dcnode-id="1759" instrument_node="">. For some reason or other, my father gave me a lower ranking order name, i.e. Mejar (spelled as Major in my identity card), while he named one sister of mine as Karnail and another as Jarnail (Punjabi pronunciations for Colonel and General!). This understandably caused much confusion when he served in both the SAF as well as MFA. </span></p><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1756" instrument_node="">“For example, I went through several ranks, such as Corporal, 2</span><sup data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">nd</span></sup><span data-dcnode-id="1753" instrument_node=""> Lieutenant, Lieutenant, Captain, Major and Lieutenant Colonel and most people got confused as to what my rank actually was. In my overseas diplomatic assignments too, when I introduced myself by name, some took me as an Army Officer serving in the Defence Attaché Office instead of as a diplomat,” he said.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">He recollected a visit by a Malaysian Staff College delegation to his division, when one of the visiting Malaysian officers asked why he was wearing a name tag showing his rank while others were not. His name tag showed Mejar, the Malay spelling for major rank! </span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1747" instrument_node="">“There was another occasion when I once was pulled over in Johore by a Malaysian traffic policeman for a minor infringement. When he saw my name as Mejar, he asked if I was “</span><em data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Askar</span></em><span data-dcnode-id="1744" instrument_node="">” and when I responded in the positive, he let me off,” he said.</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1741"></p><span data-dcnode-id="1740" instrument_node="">
</span><p data-dcnode-id="1739"></p><span data-dcnode-id="1738" instrument_node="">
</span><h4 class="has-vivid-red-color has-text-color" data-dcnode-id="1735"><strong data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">RELATED STORY:</span></strong></h4><span data-dcnode-id="1734" instrument_node="">
