he_champ_email" data-dcnode-id="1928" onclick="window.open('mailto:?subject=' + decodeURIComponent('How%20Does%20Satire%20Influence%20Politics%3F').replace('&amp;', '%26') + '&amp;body=' + decodeURIComponent('https%3A%2F%2Fmomentmag.com%2Fhow-does-satire-influence-politics%2F'), '_blank')" rel="nofollow noopener" style="font-size:24px!important;box-shadow:none;display:inline-block;vertical-align:middle" title="Email"><span class="the_champ_svg" data-dcnode-id="1929" style="background-color:#649a3f;width:35px;height:35px;border-radius:999px;display:inline-block;opacity:1;float:left;font-size:24px;box-shadow:none;display:inline-block;font-size:16px;padding:0 4px;vertical-align:middle;background-repeat:repeat;overflow:hidden;padding:0;cursor:pointer;box-sizing:content-box"><svg aria-hidden="true" data-dcnode-id="1930" focusable="false" height="100%" style="display:block;border-radius:999px;" viewBox="-4 -4 43 43" width="100%" xmlns="http://www.w3.org/2000/svg"><path d="M 5.5 11 h 23 v 1 l -11 6 l -11 -6 v -1 m 0 2 l 11 6 l 11 -6 v 11 h -22 v -11" data-dcnode-id="1931" fill="#fff" stroke-width="1"></path></svg></span></a></div></div><div data-dcnode-id="1925" style="clear:both"></div><h1 align="center" data-dcnode-id="1923" style="text-align: left;"><span data-dcnode-id="1924" instrument_node="">The Intersection of Politics and Satire.</span></h1><span data-dcnode-id="1922" instrument_node="">
</span><h3 align="center" data-dcnode-id="1919" style="text-align: left;"><span data-dcnode-id="1920" style="color: #808080;"><span data-dcnode-id="1921" instrument_node="">A Moment Symposium</span></span></h3><span data-dcnode-id="1918" instrument_node="">
</span><p align="center" data-dcnode-id="1915" style="text-align: left;"><strong data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Robert Mankoff</span></strong></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Political satire is ridicule dedicated to exposing the difference between appearance and reality in public life. The justification for this mockery, going back to Aristotle, is that by holding bad behavior up to ridicule we might, as it were, “laugh folly out of existence.” Syllogistically, a la Aristotle, it might be put something like this:</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">1) Politicians behaving badly will be mocked.</span></p><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">2) Politicians don’t like to be mocked.</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">3) Politicians will stop behaving badly.</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1901" instrument_node="">Now, how did that pan out? More than two millennia later, political folly is still as much with us despite the fact that political satire reaches more of the populace than ever before, as part of the entertainment industry. There’s now a veritable satiric-industrial complex. Furthermore, that populace is no longer just a passive recipient of </span><em data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Saturday Night Live,</span></em><span data-dcnode-id="1898" instrument_node=""> </span><em data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">The Daily Show</span></em><span data-dcnode-id="1895" instrument_node="">,</span><em data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node=""> The Colbert Report</span></em><span data-dcnode-id="1892" instrument_node="">, </span><em data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">The Onion</span></em><span data-dcnode-id="1889" instrument_node=""> or an occasional </span><em data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">New Yorker</span></em><span data-dcnode-id="1886" instrument_node=""> cover or cartoon, but is actively participating by blogging, Twittering and Facebooking their own material. Don’t get me wrong, I like political satire and would like to think that it has some effect other than tweaking the mighty and getting laughs. But I think that would be confusing appearance with reality.</span><br data-dcnode-id="1885"><span data-dcnode-id="1884" instrument_node="">
</span><br data-dcnode-id="1882"><span data-dcnode-id="1881" instrument_node="">
</span><span class="hs-cta-wrapper" data-dcnode-id="1859" id="hs-cta-wrapper-ea047e96-f91d-44c1-baf4-8f4087f6df1d"><br data-dcnode-id="1880"><span data-dcnode-id="1879" instrument_node="">
</span><span class="hs-cta-node hs-cta-ea047e96-f91d-44c1-baf4-8f4087f6df1d" data-dcnode-id="1869" id="hs-cta-ea047e96-f91d-44c1-baf4-8f4087f6df1d"><br data-dcnode-id="1878"><span data-dcnode-id="1877" instrument_node="">
</span><br data-dcnode-id="1875"><span data-dcnode-id="1874" instrument_node="">
</span><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cta-redirect.hubspot.com/cta/redirect/272896/ea047e96-f91d-44c1-baf4-8f4087f6df1d"><img alt="I'd like to subscribe to Moment's weekly e-newsletter." class="hs-cta-img" data-dcnode-id="1873" id="hs-cta-img-ea047e96-f91d-44c1-baf4-8f4087f6df1d" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//no-cache.hubspot.com/cta/default/272896/ea047e96-f91d-44c1-baf4-8f4087f6df1d.png&amp;raw" style="border-width: 0px;"></a><br data-dcnode-id="1871"><span data-dcnode-id="1870" instrument_node="">

</span><br data-dcnode-id="1865"><span data-dcnode-id="1864" instrument_node="">
</span><br data-dcnode-id="1861"><span data-dcnode-id="1860" instrument_node="">
</span></span><br data-dcnode-id="1858"><span data-dcnode-id="1857" instrument_node="">
</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1845"><em data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Robert Mankoff is a cartoonist, cartoon editor for </span></em><span data-dcnode-id="1851" instrument_node="">The New Yorker </span><em data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">and founder of </span></em><span data-dcnode-id="1848" instrument_node="">The Cartoon Bank</span><em data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">.</span></em></p><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1841"><em data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">&nbsp;</span></em></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1837" instrument_node="">
</span><p align="center" data-dcnode-id="1834" style="text-align: left;"><strong data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Dave Barry </span></strong></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">I’ve viewed our political system as a form of entertainment for a long time. When I go to the political conventions, I look around at all the real reporters and think, “What the hell are they writing? How can they possibly make this appear to be serious?” To be ponderous about it, most people have a pretty strong sense of skepticism about the people who claim to want to run the country for the benefit of the people. Skepticism is a good thing for the most part, and the tendency to mock the people posturing for us is probably pretty healthy. I’m always amazed that people can look at it any other way. Satire has probably gotten a little more vicious, immediate, constant and more partisan than it used to be. There was a time when political satirists tended to make fun of the whole process of politics, and that’s where I still feel that I am. Political satirists aren’t trying to do good—it’s just better than having a real job.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1824"><em data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Dave Barry is a Pulitzer Prize-winning humor columnist and author of more than 30 books.</span></em><br data-dcnode-id="1827"><span data-dcnode-id="1826" instrument_node="">
</span><a data-dcnode-id="1825" name="david"></a></p><span data-dcnode-id="1823" instrument_node="">
</span><p align="center" data-dcnode-id="1820" style="text-align: left;"><strong data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">David Brooks</span></strong></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1814"><span data-dcnode-id="1818" instrument_node="">There’s a vast literary tradition that says satire is inherently conservative because it holds the manners of today up against the standards of the past. If you look at Jonathan Swift or Horace or traditional satirists, their general theme was to look at how heroic we used to be and how stupid we’ve become. Today, the people who most famously do satire are purportedly liberal, like Jon Stewart and Stephen Colbert, but they are objectively very conservative, because what they do is pick out the stupidest things happening in any given day and make fun of them, and for the people who watch, especially college students, politics is just one long parade of stupidity. As a result, college students begin to unconsciously distrust government and politics. I’d say the two cultural institutions that have contributed to mistrust of government are</span><em data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node=""> 60 Minutes</span></em><span data-dcnode-id="1815" instrument_node="">—for 30 years it has been telling one story after another of institutional failure—and the Comedy Central guys, realizing that is the opposite of what they intend to do. If you want to elect libertarians and Republicans, it is pretty good: You have generations who don’t believe in government or government solutions.</span></p><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1806"><em data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">David Brooks is a</span></em><span data-dcnode-id="1810" instrument_node=""> New York Times</span><em data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node=""> columnist and author of </span></em><span data-dcnode-id="1807" instrument_node="">The Social Animal: The Hidden Sources of Love, Character, and Achievement.</span></p><span data-dcnode-id="1805" instrument_node="">
</span><p align="center" data-dcnode-id="1802"><strong data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1801" instrument_node="">
</span><p align="center" data-dcnode-id="1798" style="text-align: left;"><strong data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1797" instrument_node="">
</span><p align="center" data-dcnode-id="1794" style="text-align: left;"><strong data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Alison Dagnes</span></strong></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1792" instrument_node="">Political comedy is primarily the mark of the underdog, which is why we have such a rich history of Jewish political comedy. It’s the jester speaking truth to the king. For that reason, you often have political comedy coming from the left, because comedy is essentially a complaint against oppression, and in the case of Jewish political comedy, it’s a complaint against the power structure. There’s something very anti-establishment about it. Asking the question “Can we do better?” is the hallmark of political humor. You have some conservative comedians, but they are few and far between and they’re not always successful. Fox’s </span><em data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">The Half Hour News Hour</span></em><span data-dcnode-id="1789" instrument_node="">, which was supposed to be a conservative version of </span><em data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">The Daily Show</span></em><span data-dcnode-id="1786" instrument_node="">, was canceled after 17 episodes. The reason it didn’t work was because it tried to be conservative first and funny later, whereas </span><em data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">The Daily Show</span></em><span data-dcnode-id="1783" instrument_node=""> is funny first and liberal second, and it works. Political comedians aim their guns at everyone—they think that both sides are </span><em data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">facacta</span></em><span data-dcnode-id="1780" instrument_node="">, that both sides suck.</span></p><span data-dcnode-id="1778" instrument_node="">
</span><p data-dcnode-id="1772"><em data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">Alison Dagnes, teaches political science at Shippensburg University, and is the author of </span></em><span data-dcnode-id="1775" instrument_node="">A Conservative Walks Into a Bar: The Politics of Political Humor</span><em data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">.</span></em></p><span data-dcnode-id="1771" instrument_node="">
</span><p align="center" data-dcnode-id="1768"><strong data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1767" instrument_node="">
</span><p align="center" data-dcnode-id="1764"><strong data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1763" instrument_node="">
</span><p align="center" data-dcnode-id="1760" style="text-align: left;"><strong data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Moshe Waldoks</span></strong></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">The first use of satire in the Jewish tradition goes back to the scroll of Esther, which is a satire of the Persian court. It’s a very old technique that comes from the Greek theater tradition. In a simple way, satire done well speaks truth to power and is a process of getting to a deeper truth that may not be visible on the surface. And that’s why satirists are applauded in some societies and seen as a danger in other societies. One of the great contributions of Jews in the United States has been that the Jewish sense of humor has become American humor. It comes out of urban places like New York and Los Angeles. It’s knowledgeable and informed—perhaps overly informed. That’s the reason Jews are upset all the time—they know too much. Jewish humor has a lot of language jokes, the way things are said, and using humor to puncture pomposity, to give someone a jab and let the air out of people who see themselves as all-knowing and all-powerful. Jewish humor likes to show that the emperor has no clothes.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1752"><em data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Moshe Waldoks is the rabbi of Temple Beth Zion in Brookline, Massachusetts, a stand-up comedian and co-author of </span></em><span data-dcnode-id="1753" instrument_node="">The Big Book of Jewish Humor.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p align="center" data-dcnode-id="1748"><strong data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1747" instrument_node="">
</span><p align="center" data-dcnode-id="1744"><strong data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1743" instrument_node="">
</span><p align="center" data-dcnode-id="1740" style="text-align: left;"><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Eddy Portnoy</span></strong></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1738" instrument_node="">From the very beginning of modern Yiddish literature, some of the most important material was satiric—this kind of comic criticism plays a huge role in Yiddish culture. There was a Yiddish satirical weekly magazine called </span><em data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Der Groyser Kundes</span></em><span data-dcnode-id="1735" instrument_node=""> [The Great Prankster] that started coming out in New York in 1909. If you combined </span><em data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Mad</span></em><span data-dcnode-id="1732" instrument_node=""> magazine and </span><em data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">The Onion</span></em><span data-dcnode-id="1729" instrument_node="">, and translated it into Yiddish, you would have something like it. It had lots of political cartoons, stories and poems and all kinds of satirical criticism of the Jewish politics of the day. It was the only place you could find caricatures of Jewish cultural and political figures. It also satirized American local and national politics, but it had this unique aspect of being focused on the Jewish community. One of the funny things they did that’s similar to </span><em data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">The Onion</span></em><span data-dcnode-id="1726" instrument_node=""> or </span><em data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">The Daily Show</span></em><span data-dcnode-id="1723" instrument_node=""> was always a column of weekly news in rhyme, in which they’d satirically distill the news in a kind of extended comic poem. The only thing that’s really like </span><em data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Der Groyser Kundes</span></em><span data-dcnode-id="1720" instrument_node=""> in the Jewish community today is Eli Valley’s cartoons in </span><em data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">The Forward</span></em><span data-dcnode-id="1717" instrument_node="">. It’s almost as if that’s the continuation of this Yiddish satire, this internal cultural and political criticism told from an insider’s perspective.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1709"><em data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Eddy Portnoy, a contributing editor for </span></em><span data-dcnode-id="1712" instrument_node="">Tablet</span><em data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">, teaches Yiddish language and literature at Rutgers University.</span></em></p><span data-dcnode-id="1708" instrument_node="">
</span><p align="center" data-dcnode-id="1705"><strong data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1704" instrument_node="">
</span><p align="center" data-dcnode-id="1701"><strong data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1700" instrument_node="">
</span><p align="center" data-dcnode-id="1697" style="text-align: left;"><strong data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Barney Frank</span></strong></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Satire is a very effective way of exposing the falsity of positions issue by issue and politician by politician. But too many satirists now take the position that they should satirize the whole enterprise of politics rather than particular positions or individuals. I think that’s a mistake. It gives young people the notion that all positions are the same, none of them are any good, and ironically it becomes a very powerful force for the status quo, because the people who are most dissatisfied with the status quo and most attracted to change are told there’s no point in even trying, they’re all bums. What it does is encourage a kind of negativism, and it particularly hurts people on the left. It has a very corrosive effect, which is the opposite of what I hoped it would do, which is to sharpen the critique.</span></p><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1686"><em data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Barney Frank has served as representative for the Fourth Congressional District of Massachusetts since 1981</span></em><span data-dcnode-id="1690" instrument_node="">.</span><br data-dcnode-id="1689"><span data-dcnode-id="1688" instrument_node="">
</span><a data-dcnode-id="1687" name="peter"></a></p><span data-dcnode-id="1685" instrument_node="">
</span><p align="center" data-dcnode-id="1682"><strong data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1681" instrument_node="">
</span><p align="center" data-dcnode-id="1678"><strong data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1677" instrument_node="">
</span><p align="center" data-dcnode-id="1674" style="text-align: left;"><strong data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Peter Sagal</span></strong></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">I’m skeptical about the claim that political satire can actually change things. Besides, the last thing I want the president to do is make a decision based on what someone like me says. The role of satire is to help people deal with the political reality, it’s to keep them from being depressed and anxious. No politician has ever said to me, “What you said made me rethink my actions.” But lots of people have said, “That funny joke you made helped me cope with the fact that a jerk like that is in power.” Also, the neutrality of news is fading in importance—just look at CNN with its attempts at objectivity. In many ways, satire has taken that role. Jon Stewart’s biases are pretty obvious, but his real bias is toward what is funny, and there’s an honesty to that. Our goal is to be funny, and we don’t sit down to attack only one side; that is refreshingly neutral.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1660"><em data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Peter Sagal is a playwright, actor, host of the NPR’s </span></em><span data-dcnode-id="1667" instrument_node="">Wait Wait… Don’t Tell Me! </span><em data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">and author of </span></em><span data-dcnode-id="1664" instrument_node="">The Book of Vice: Very Naughty Things and How to Do Them.</span><br data-dcnode-id="1663"><span data-dcnode-id="1662" instrument_node="">
</span><a data-dcnode-id="1661" name="borowitz"></a></p><span data-dcnode-id="1659" instrument_node="">
</span><p align="center" data-dcnode-id="1656"><strong data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1655" instrument_node="">
</span><p align="center" data-dcnode-id="1652"><strong data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1651" instrument_node="">
</span><p align="center" data-dcnode-id="1648" style="text-align: left;"><strong data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Andy Borowitz</span></strong></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">I like this quote by Will Rogers, which sums up how little satire has changed. He said, “There’s no trick to being a humorist when you have the whole government working for you.” There is never a shortage of material no matter who is in power. People are always going to be hypocritical and craven. I believe that politicians’ behavior is no worse than it ever was before—it’s just now we have camera phones. We have so many ways of getting it out faster. Now unfortunately, people like me have to live tweet debates so we have to be the funniest we can be in a nanosecond. It probably results in a lot more misfires. We remember Mark Twain for having these brilliant one-liners about politics and human behavior in general, but he at least had the benefit of a little time to reflect.</span></p><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1632"><em data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Andy Borowitz is a comedian, author of </span></em><span data-dcnode-id="1641" instrument_node="">The Borowitz Report</span><em data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node=""> and editor of </span></em><span data-dcnode-id="1638" instrument_node="">The 50 Funniest American Writers: An Anthology of Humor from Mark Twain to The Onion</span><em data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">.</span></em><br data-dcnode-id="1635"><span data-dcnode-id="1634" instrument_node="">
</span><a data-dcnode-id="1633" name="allison"></a></p><span data-dcnode-id="1631" instrument_node="">
</span><p align="center" data-dcnode-id="1628"><strong data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1627" instrument_node="">
</span><p align="center" data-dcnode-id="1624"><strong data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1623" instrument_node="">
</span><p align="center" data-dcnode-id="1620" style="text-align: left;"><strong data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Allison Silverman</span></strong></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1618" instrument_node="">Back in 2005, when I helped start </span><em data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">The Colbert Report, </span></em><span data-dcnode-id="1615" instrument_node="">we noticed that underneath a lot of what was being said politically was the idea that we should trust instinct more than reason. Stephen called this idea “truthiness,” and there was a lot of comedy in deconstructing it. The same thing happens in everyday culture. When you see something you suspect is a big put-on, some political statement or performance that feels intended to confuse everyone or make us focus on the wrong things, and you expose it and you are funny at the same time, that is very satisfying. But I think comedy writers really shrink from the idea that their work is important. Generally we’re in it for the laughs, not for an impact on society. There’s a lot of freedom in being funny rather than important—you can be absurd, you can editorialize, you can become a participant in the story—and no comedy writer wants to lose that.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1603"><em data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Allison Silverman, an Emmy Award-winning comedy writer, was the former head-writer of </span></em><span data-dcnode-id="1610" instrument_node="">The Colbert Report,</span><em data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node=""> and has written for </span></em><span data-dcnode-id="1607" instrument_node="">Portlandia</span><em data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node=""> and </span></em><span data-dcnode-id="1604" instrument_node="">The Office.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p align="center" data-dcnode-id="1599"><strong data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1598" instrument_node="">
</span><p align="center" data-dcnode-id="1595"><strong data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1594" instrument_node="">
</span><p align="center" data-dcnode-id="1591" style="text-align: left;"><strong data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Walter J. Podrazik </span></strong></p><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1589" instrument_node="">We forget that political satire has played an important role in other American eras. During the 1920s and early 1930s, Will Rogers was a true multi-media personality—film actor, stage performer, </span><em data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">New York Times</span></em><span data-dcnode-id="1586" instrument_node=""> columnist, radio commentator—with an international following. He said, “All I know is what I read in newspapers,” and then he would go off and riff on absurdities and contradictions and silliness of the financial panic, joblessness, the legality of alcohol and issues of war and peace. When I watch satirists like Stephen Colbert and Jon Stewart today, I see them doing the same thing. Four decades after Rogers, the country was experiencing generational confrontations over issues of race, law and order, and the war in Vietnam, and this formed the core of the political satire on </span><em data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">The Smothers Brothers Comedy Hour </span></em><span data-dcnode-id="1583" instrument_node="">on CBS from 1967 to 1969. The program’s resident mock commentator, Pat Paulsen, delivered topical observations with a knowing deadpan, essentially winking to the audience saying: I know what I said is ridiculous, you know it, but that’s what passes for dialogue today. Predating Colbert, Paulsen took his persona directly into the 1968 presidential campaign with his candidacy as satirical performance art, crisscrossing the country holding rallies and seeking votes. David Frye, a brilliant impressionist, took on President Richard Nixon, beginning with his 1969 comedy album </span><em data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">I Am The President</span></em><span data-dcnode-id="1580" instrument_node="">. Frye’s dead-on impression of Nixon captured a man who, after years of struggle, had finally attained his dream, but still felt besieged and under attack by his perceived enemies. Just as Tina Fey helped to define Sarah Palin, Frye’s take had a lasting impact on Nixon’s legacy.</span></p><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1572"><em data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Walter J. Podrazik is the co-author of </span></em><span data-dcnode-id="1575" instrument_node="">Watching TV: Six Decades of American Television </span><em data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">and curator of Chicago’s Museum of Broadcast Communications.</span></em></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p align="center" data-dcnode-id="1565"><strong data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1564" instrument_node="">
</span><p align="center" data-dcnode-id="1561" style="text-align: left;"><strong data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Stephen Kercher </span></strong></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">The fifties and early sixties were when political satire assumed a more respected place in public discourse, particularly among liberals who saw satire as way of expressing dissent from the Cold War order. And over the years there have been concerned voices about satire not reflecting well on the body politic and others who have argued that it serves as a tonic or safety valve for America. What’s new today is how politicians themselves are engaging in political humor. Previously, presidents were limited to telling jokes at the Al Smith dinner or the Gridiron Club dinner. This election, for example, Obama used the term “Romnesia,” which elicited laughter. What was interesting was Obama’s willingness to engage in such tactics that before may have seemed unbecoming.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1551"><em data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">S</span></em><em data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">tephen Kercher is the author of </span></em><span data-dcnode-id="1552" instrument_node="">Revel Without A Cause: Liberal Satire in Postwar America.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p align="center" data-dcnode-id="1547"><strong data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1546" instrument_node="">
</span><p align="center" data-dcnode-id="1543"><strong data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1542" instrument_node="">
</span><p align="center" data-dcnode-id="1539" style="text-align: left;"><strong data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Trevor Potter</span></strong></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1534"><em data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">The Colbert Report</span></em><span data-dcnode-id="1535" instrument_node=""> has shown me how effective satire can be to convey political ideas and messages. What is new about the Colbert method is that he engages his audience in the participatory method of learning. He takes viewers inside a field of knowledge or experience and gives them the feeling of being a participant. The only other person I know who conveyed information that way was George Plimpton, who wrote about unusual experiences by engaging in them. That is what Colbert does very effectively on camera. I know that in Colbert’s view, there is a difference between describing something as an observer and showing it through the lens of participation. I think his Super-PAC has been highly successful at doing this. I have lots of people come up to me and say, “I didn’t understand Super-PACs before and now I do.” And I continually have people say they’re really interested in what is happening with his Super-PAC—it has created a narrative that people are paying attention to.&nbsp; It seems to me that this is not the kind of reaction we would have if he was just talking about Super-PACs in a monologue on the show.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1530"><em data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Trevor Potter is the former chairman of the Federal Election Commission and attorney for Stephen Colbert and his Super-PAC, Americans for a Better Tomorrow, Tomorrow.</span></em></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p align="center" data-dcnode-id="1523"><strong data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1522" instrument_node="">
</span><p align="center" data-dcnode-id="1519" style="text-align: left;"><strong data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Rebecca Traister </span></strong></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1517" instrument_node="">I don’t think this political season has been hugely ripe for satire. The 2008 election was different, where we saw incredible political satire and the classic Tina Fey caricature of Sarah Palin on </span><em data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Saturday Night Live</span></em><span data-dcnode-id="1514" instrument_node="">. The greatest skit was with Tina Fey and Amy Poehler portraying Sarah Palin and Hillary Clinton, respectively. This very brief, funny, cartoonish skit actually conveyed a huge amount of the complicated truth about how we perceive gender and power. Hillary Clinton had been in the public eye with intense gender scrutiny about her looks and sexuality for nearly two decades, and then Sarah Palin came in and became a big superstar. If you watch that skit, it says more about the history, dynamics and very complicated ways we perceive women in power than I’m able to say in the whole book I wrote about it. That’s the power of satire: to distill certain truths and convey them to us in ways that are not only digestible but simple and enjoyable because it’s comedy.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1502"><em data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Rebecca Traister is a journalist covering politics and gender for </span></em><span data-dcnode-id="1509" instrument_node="">Salon</span><em data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node=""> and </span></em><span data-dcnode-id="1506" instrument_node="">The New York Times Magazine</span><em data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">, and is the author of </span></em><span data-dcnode-id="1503" instrument_node="">Big Girls Don’t Cry.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p align="center" data-dcnode-id="1498"><strong data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1497" instrument_node="">
</span><p align="center" data-dcnode-id="1494"><strong data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1493" instrument_node="">
</span><p align="center" data-dcnode-id="1490" style="text-align: left;"><strong data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Rob Kutner</span></strong></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1488" instrument_node="">There are a lot of different kinds of satire nowadays. There’s the instant gut-check feedback of Twitter and the broader worldview stuff of </span><em data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">The Onion</span></em><span data-dcnode-id="1485" instrument_node="">, </span><em data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">The Daily Show</span></em><span data-dcnode-id="1482" instrument_node=""> and</span><em data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node=""> The Colbert Report</span></em><span data-dcnode-id="1479" instrument_node="">, which take a more analytical approach. Satire continues to play the traditional role it has for centuries, which is to critique not only the establishment but any sort of authority, often including media. But nowadays it’s also become a release valve for people to work off frustration. People today feel that society is very egalitarian, but at the same time politics and the media seem run by shadowy interests, so satire is a way for people to vent about that. One interesting thing is the live tweet phenomenon, where people watching debates, speeches or live events chime in on them together and riff off each other. The drawback is there’s not really space for much interchange. It’s like having a discussion during a Robert Altman movie, or Thanksgiving with my family, where everyone is talking at the same time.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1471"><em data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Rob Kutner is an Emmy Award-winning writer for </span></em><span data-dcnode-id="1474" instrument_node="">Conan</span><em data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">, who tweets at </span></em></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1467"><em data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">@ApocalypseHow.</span></em></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p align="center" data-dcnode-id="1460"><strong data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1459" instrument_node="">
</span><p align="center" data-dcnode-id="1456" style="text-align: left;"><strong data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Paula Poundstone </span></strong></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1454" instrument_node="">Sometimes there are gross oversimplifications, but satire can be a great arrow in the quiver of dissent. Remember </span><em data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Laugh-In</span></em><span data-dcnode-id="1451" instrument_node="">? That show was so brave and so funny and so relevant, and honestly, I think it could pat itself on the back for at least a portion of the wave that ended the Vietnam War. You couldn’t say now, on network television, the stuff that they said. And they fought hard with the censors, who used to drink at a bar across the street from the studio. I think they would come away from </span><em data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Laugh-In</span></em><span data-dcnode-id="1448" instrument_node=""> and just be so exhausted from the struggle of trying to be the censor, that they would just have to go get liquored up. It really was a very courageous show. [But] I always feel really uncomfortable when people say to me, “I get my news from Jon Stewart.” They say it with pride. Not because I don’t think that that’s a funny and great program, but because as a single source, it worries me.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1439"><em data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Paula Poundstone is a stand-up comedian, panelist on NPR’s </span></em><span data-dcnode-id="1443" instrument_node="">Wait Wait… Don’t Tell Me!</span><em data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">, and author of </span></em><span data-dcnode-id="1440" instrument_node="">There’s Nothing in this Book That I Meant to Say.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p align="center" data-dcnode-id="1432"><strong data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1431" instrument_node="">
</span><p align="center" data-dcnode-id="1428" style="text-align: left;"><strong data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Gene Weingarten</span></strong></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Satire can be a way of expressing the truth in the most blunt and accessible way: You are unrestrained and unburdened by the gravitas of supposedly being objective. It’s an enormously powerful tool. I’ve written many times that Vice President Dick Cheney was Satan, that he was a harvester of souls. I’m exaggerating, of course, but on some level, I’m not. The facade of humor lets you state a truth while not being subject to attack for being unfair. Much of it is deeply entertaining, one-sided and highly cynical, but I think it’s wonderful. I’ve said before: “I’m so liberal that I should be tried for treason and executed.”</span></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1418"><em data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Gene Weingarten is a humor columnist and two-time Pulitzer Prize-winning feature article writer for </span></em><span data-dcnode-id="1421" instrument_node="">The Washington Post</span><em data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">.</span></em></p><span data-dcnode-id="1417" instrument_node="">
</span><p align="center" data-dcnode-id="1414"><strong data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1413" instrument_node="">
</span><p align="center" data-dcnode-id="1410"><strong data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1409" instrument_node="">
</span><p align="center" data-dcnode-id="1406" style="text-align: left;"><strong data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Baratunde Thurston</span></strong></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1404" instrument_node="">Politics can be depressing—the level of deception and the lack of new ideas—so the ability to laugh at it makes it more bearable. Whether it’s in memes such as “binders full of women” and “horses and bayonets” or just to call something out in a way that’s funny, satire calls everyone on their bullshit—media, politicians, everyone. It’s not as if satire, or comedic influence in general, is going to radically change someone’s mind. No one says, “Oh, I heard this joke and I’m not a Republican anymore.” At the same time, humor has a new measure of influence in politics. Barack Obama was essentially on a stand-up comedy tour in the final two weeks of the campaign, and jokes were an important part of his stump speech. Because of Twitter, Tumblr, Facebook, etc., you see people who aren’t professional comics, with no “formal training,” contribute satirical commentary to a wide audience. During the debates, Twitter became the bleachers with everyone yammering at the same time. It’s a real-time assessment of how people are reacting. In previous eras we had to wait for “official” comics or shows—</span><em data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Letterman, Jay Leno, The Daily Show</span></em><span data-dcnode-id="1401" instrument_node="">—to tell us what was or wasn’t funny. But now you can say anything without asking for permission.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1390"><em data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Baratunde Thurston was director of digital for </span></em><span data-dcnode-id="1396" instrument_node="">The Onion</span><em data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node=""> before launching the startup, Cultivated Wit. His book is </span></em><span data-dcnode-id="1393" instrument_node="">How To Be Black</span><em data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">.</span></em></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1386" instrument_node="">
</span><p align="center" data-dcnode-id="1383"><strong data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1382" instrument_node="">
</span><p align="center" data-dcnode-id="1379" style="text-align: left;"><strong data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Judy Gold</span></strong></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">One of the most palatable ways of getting a point across is through humor. People always want to be around the funny person. Once you make them laugh, you’ve disarmed them, and then you go in for the kill. It is such a powerful position to be in. You’re like the orchestra conductor and they’re your orchestra—you’re guiding them. Even though I can’t stand the guy, Mitt Romney had some great jokes at the Al Smith dinner, and I thought, “Oh my God, he’s human.” Before, I thought he was like the annoying boss who everyone dreads, the one who comes into your office and makes stupid jokes that you feel obligated to laugh at. But he poked fun at himself—he beat you to it. How can you not like a person like that? Or at least want to hear more? When you take yourself too seriously, you’re done. When you make someone laugh, you’ve got them in the palm of your hand.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1371"><em data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Judy Gold is a stand-up comic and an Emmy Award-winning writer for </span></em><span data-dcnode-id="1372" instrument_node="">The Rosie O’Donnell Show.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1367" instrument_node="">
</span><h3 data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Television Satire Goes Global ——————————————————————————————————————————-</span></h3><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1363" instrument_node="">Television shows that mock government and authority and expose societal foibles have proved to be popular around the world. Israel has </span><em data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Eretz Nehederet </span></em><span data-dcnode-id="1360" instrument_node="">[A Wonderful Country]</span><em data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">, </span></em><span data-dcnode-id="1357" instrument_node="">often described as a cross between </span><em data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Saturday Night Live </span></em><span data-dcnode-id="1354" instrument_node="">and </span><em data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">The Daily Show</span></em><span data-dcnode-id="1351" instrument_node="">, which has outraged some viewers with its willingness to turn its lens inward on Israeli citizens. Despite this—or perhaps because of it—the show is extremely popular, especially among young people. Egypt, too, has its own Jon Stewart in the form of dashing heart-surgeon-turned-comic Bassem Youssef who stars in </span><em data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Al Bernameg </span></em><span data-dcnode-id="1348" instrument_node="">[The Program], a </span><em data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Daily Show</span></em><span data-dcnode-id="1345" instrument_node="">-esque satire. The show, which takes jabs at political leaders and societal conventions, debuted online as </span><em data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">The B+ Show</span></em><span data-dcnode-id="1342" instrument_node=""> in March 2011, in response to the Tahrir Square uprising, and was picked up by the Egyptian television network ONTV later that year. Saudi Arabia has </span><em data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Tash ma Tash</span></em><span data-dcnode-id="1339" instrument_node=""> [No Big Deal], on the air since 1992, which parodies Saudi culture and has addressed sensitive issues such as terrorism and the place of women in Saudi society. Aired on the government-run network MBC, new episodes run only during the month of Ramadan. Russia had a weekly television show, </span><em data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Kukly</span></em><span data-dcnode-id="1336" instrument_node=""> [Puppets]— that was on the air from 1994 to 2002 and used puppets to portray and mock Russian figures, particularly political leaders. Any given episode attracted more than half of the nation’s television viewers. </span><em data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Kukly</span></em><span data-dcnode-id="1333" instrument_node=""> was taken off the air in 2002, after a Vladimir Putin-led state takeover of NTV, the channel that aired </span><em data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Kukly</span></em><span data-dcnode-id="1330" instrument_node="">, and the 2000 imprisonment of Vladimir A. Gusinsky, the network’s owner.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1325" instrument_node="">
</span><h3 data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">What Studies Say About Satire —————————————————————————————————————————————</span></h3><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1321" instrument_node="">•&nbsp;</span><strong data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Satire does educate audiences</span></strong><span data-dcnode-id="1318" instrument_node="">: A 2007 Pew Research Center poll shows that regular viewers of </span><em data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">The Daily Show </span></em><span data-dcnode-id="1315" instrument_node="">and </span><em data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">The Colbert Report</span></em><span data-dcnode-id="1312" instrument_node=""> are among the most highly knowledgeable news consumers in the country. Fifty-four percent of Jon Stewart and Stephen Colbert audiences rank at a high knowledge level about current events, compared with 51 percent for NPR, 41 percent for CNN and 35 percent for Fox News.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1309" instrument_node="">•&nbsp;</span><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Satire is a major source of news for young people</span></strong><span data-dcnode-id="1306" instrument_node="">: A Pew Research Center poll found that in 2004 one in five young adults said they learned about current events from satirical news shows such as </span><em data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">The Daily Show</span></em><span data-dcnode-id="1303" instrument_node=""> and </span><em data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Saturday Night Live.</span></em><span data-dcnode-id="1300" instrument_node=""> This is nearly the same number of young people who regularly read daily newspapers or watch nightly network news.</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1297" instrument_node="">•&nbsp;</span><strong data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Satire does affect how viewers perceive candidates</span></strong><span data-dcnode-id="1294" instrument_node="">: A 2012 study by researchers at the University of Delaware shows that watching </span><em data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">The Daily Show</span></em><span data-dcnode-id="1291" instrument_node=""> influenced viewers’ perceptions of Republican candidate Mitt Romney, who was seen to have a strong chance of winning the Republican nomination, but not the presidency.</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1288" instrument_node="">•&nbsp;</span><strong data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Satire may discourage political participation</span></strong><span data-dcnode-id="1285" instrument_node="">: One 2008 study published in the </span><em data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">International Journal of Public Opinion Research</span></em><span data-dcnode-id="1282" instrument_node=""> finds that watching political comedy shows such as </span><em data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">The Daily Show </span></em><span data-dcnode-id="1279" instrument_node="">or </span><em data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">The Colbert Report</span></em><span data-dcnode-id="1276" instrument_node=""> “may dampen participation by contributing to a sense of alienation from the political process.”</span></p><span data-dcnode-id="1274" instrument_node="">
</span></div><span data-dcnode-id="1271" instrument_node="">
</span></div><span data-dcnode-id="1269" instrument_node="">
</span></div><span data-dcnode-id="1267" instrument_node="">
