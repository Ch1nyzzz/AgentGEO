</span><p data-dcnode-id="828"><span data-dcnode-id="840" instrument_node="">The foreign policy views of the Republican nominee Donald Trump have been called dangerous, treasonous, confused – and that’s just according to leading Republicans and conservatives. For example, the editor of </span><em data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">The Weekly Standard </span></em><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.weeklystandard.com/kristol-explains-never-trump-argument/article/2001654" onclick="javascript:window.open('https://www.weeklystandard.com/kristol-explains-never-trump-argument/article/2001654'); return false;" rel="noopener"><span data-dcnode-id="837" instrument_node="">Bill Kristol says</span></a><span data-dcnode-id="835" instrument_node="">, “It’s not like having someone who’s a little too conservative, or who’s not a great candidate, or he’s rich, or he’s not—people really need to stop and think, do you want Donald Trump to be the national spokesperson through an entire presidential election for the Republican party and the conservative movement? Is that acceptable?” The 2012 GOP nominee </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.boston.com/news/politics/2016/07/28/mitt-romney-dnc-trump" onclick="javascript:window.open('https://www.boston.com/news/politics/2016/07/28/mitt-romney-dnc-trump'); return false;" rel="noopener"><span data-dcnode-id="834" instrument_node="">Mitt Romney</span></a><span data-dcnode-id="832" instrument_node=""> said, “He has neither the temperament nor the judgment to be president, Mr. Trump’s bombast is already alarming our allies and fueling the enmity of our enemies.” </span><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2016/06/10/politics/mitt-romney-donald-trump-racism/" onclick="javascript:window.open('https://www.cnn.com/2016/06/10/politics/mitt-romney-donald-trump-racism/'); return false;" rel="noopener"><span data-dcnode-id="831" instrument_node="">Romney has also said,</span></a><span data-dcnode-id="829" instrument_node=""> “I don’t want to see trickle-down racism, I don’t want to see a president of the United States saying things which change the character of the generations of Americans that are following. Presidents have an impact on the nature of our nation, and trickle-down racism, trickle-down bigotry, trickle-down misogyny, all these things are extraordinarily dangerous to the heart and character of America.”</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Is there a divide between traditional Republican Party positions on foreign policy and those of Trump? What exactly are Trump’s positions? And where do they differ from other Republicans? Some have even noted a partial parallelism between the views of Trump and those of Bernie Sanders on the left. What precisely are those parallels?</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Donald Trump views policy stances with a particular fluidity—as deals to be made with the American public, foreign governments, and people around the world in order to fulfill his underlying ideological goals. It is essential to understand the underlying ideology behind his stances on foreign policy. Trump has consistently wished to remain silent on expressing certain policy positions because, as he says, the American government is too predictable. In Trump’s mind, it is not possible to make a good deal with a country when they know exactly what you are willing to do. What follows is a compilation of many of Donald Trump’s stated foreign policy positions. The point of this essay is not to take a position on Trump, but simply to clarify his views.</span></p><span data-dcnode-id="821" instrument_node="">
</span><h3 data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Border/Immigration</span></h3><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="817" instrument_node="">“</span><em data-dcnode-id="813"><span data-dcnode-id="816" instrument_node="">When Mexico sends its people, they’re not sending their best. They’re not sending you. They’re not sending you. They’re sending people that have lots of problems, and they’re bringing those problems with us. They’re bringing drugs. They’re bringing crime. They’re rapists. And some, I assume, are good people.”</span><br data-dcnode-id="815"><span data-dcnode-id="814" instrument_node="">
</span></em><span data-dcnode-id="812" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;– Donald Trump, </span><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dq_q61B-DyPk" onclick="javascript:window.open('https://www.youtube.com/watch?v=q_q61B-DyPk'); return false;" rel="noopener"><span data-dcnode-id="811" instrument_node="">Presidential Announcement Speech June 16, 2015</span></a></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Much like the rest of Trump’s campaign, his positions on border control and immigration remain controversial. The two most important issues on this subject are the illegal immigration of Mexicans into the United States and the immigration, legal or otherwise, of Muslims. Donald Trump seems to want to limit immigration generally seeing it as largely not worth the amount of resources needed to oversee operations. Trump attacks Hillary Clinton’s wish to increase the naturalization of immigrants, especially illegal immigrants and Syrian refugees.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Donald Trump sees the illegal immigration of Mexicans into the United States as a harbinger of increasing crime rates and drug importation. Trump attacks the Mexican government for sending the worst sorts of people into the country: drug traffickers, criminals, ruffians, rapists, etc. These statements remain quite controversial to the American public, while Trump has always clarified that he is referring to a certain segment of illegal immigrants, and not them in their entirely. To secure the southern border, Trump recommends increasing the support of border guards and the construction of a wall along the entire southern border. He argues that the Mexican government should be forced to pay for this wall because of all the problems their country brings into the United States. Unlike Clinton, Trump spends almost no time at all discussing the problems within Mexico or calling to aid them.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Mr. Trump also sees the legal immigration of Muslims as a problem for the United States. The immigrants coming in from countries like Iraq and Syria have little documentation, and it’s impossible to determine their risk to the nation. Even those immigrants who don’t harbor evil will toward the US government still may harbor more conservative Islamic views, which can lead their children to violent extremism. Trump argues for a “pause” in Muslim immigration from countries plagued by Islamic extremism until the US can guarantee the peaceful intentions of said immigrants.</span></p><span data-dcnode-id="799" instrument_node="">
</span><h3 data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Terrorism</span></h3><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="788"><em data-dcnode-id="792"><span data-dcnode-id="795" instrument_node="">“I have a simple message for [ISIS]. Their days are numbered. I won’t tell them where, and I won’t tell them how.”</span><br data-dcnode-id="794"><span data-dcnode-id="793" instrument_node="">
</span></em><span data-dcnode-id="791" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; – Donald Trump, </span><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2016/04/27/475923569/donald-trump-claims-u-s-intervention-created-chaotic-middle-east" onclick="javascript:window.open('https://www.npr.org/2016/04/27/475923569/donald-trump-claims-u-s-intervention-created-chaotic-middle-east'); return false;" rel="noopener"><span data-dcnode-id="790" instrument_node="">Interview with NPR</span></a></p><span data-dcnode-id="787" instrument_node="">
</span><h4 data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">The Debate over Islamic Extremism</span></h4><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="780"><picture data-dcnode-id="781"><source data-dcnode-id="783" sizes="(max-width: 585px) 100vw, 585px" srcset="https://www.fpri.org/wp-content/uploads/2016/11/trump-1.jpg.webp 585w, https://www.fpri.org/wp-content/uploads/2016/11/trump-1-400x234.jpg.webp 400w, https://www.fpri.org/wp-content/uploads/2016/11/trump-1-160x94.jpg.webp 160w, https://www.fpri.org/wp-content/uploads/2016/11/trump-1-228x133.jpg.webp 228w, https://www.fpri.org/wp-content/uploads/2016/11/trump-1-351x205.jpg.webp 351w, https://www.fpri.org/wp-content/uploads/2016/11/trump-1-200x117.jpg.webp 200w" type="image/webp"><img alt="trump-1" class="aligncenter wp-image-18306 size-full webpexpress-processed" data-dcnode-id="782" height="342" loading="lazy" sizes="(max-width: 585px) 100vw, 585px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fpri.org/wp-content/uploads/2016/11/trump-1.jpg&amp;raw" srcset="https://www.fpri.org/wp-content/uploads/2016/11/trump-1.jpg 585w, https://www.fpri.org/wp-content/uploads/2016/11/trump-1-400x234.jpg 400w, https://www.fpri.org/wp-content/uploads/2016/11/trump-1-160x94.jpg 160w, https://www.fpri.org/wp-content/uploads/2016/11/trump-1-228x133.jpg 228w, https://www.fpri.org/wp-content/uploads/2016/11/trump-1-351x205.jpg 351w, https://www.fpri.org/wp-content/uploads/2016/11/trump-1-200x117.jpg 200w" width="585"></picture></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="778" instrument_node="">Donald Trump’s policy stances toward the prevention of terrorism have been quite controversial. He claims that the Obama administration has obscured the relationship between the religion of Islam and Islamic terrorism. This, in part, has led to Trump’s somewhat regular musings whether Obama has a hidden agenda of support for terrorists: on one such instance, </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politifact.com/truth-o-meter/article/2016/jun/15/context-did-donald-trump-suggest-barack-obama-has-/" onclick="javascript:window.open('https://www.politifact.com/truth-o-meter/article/2016/jun/15/context-did-donald-trump-suggest-barack-obama-has-/'); return false;" rel="noopener"><span data-dcnode-id="777" instrument_node="">Trump said,</span></a></p><span data-dcnode-id="774" instrument_node="">
</span><blockquote data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Look, we’re led by a man that either is not tough, not smart, or he’s got something else in mind. And the something else in mind — you know, people can’t believe it. People cannot, they cannot believe that President Obama is acting the way he acts and can’t even mention the words ‘radical Islamic terrorism.’ There’s something going on. It’s inconceivable.</span></p><span data-dcnode-id="770" instrument_node="">
</span></blockquote><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">The implication is rather frightening, but the expressed issue represents an idea held by many in the electorate: that many people, including Obama, refuse to acknowledge the unique problem the religion of Islamplays in fostering an ideology of terrorism.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">Obama and Hillary Clinton have regularly responded to this claim by Trump and the Republican Party. Recently, </span><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usatoday.com/story/news/politics/2016/06/14/obama-calling-isil-islamic-extremists-would-accomplish-nothing/85861554/" onclick="javascript:window.open('https://www.usatoday.com/story/news/politics/2016/06/14/obama-calling-isil-islamic-extremists-would-accomplish-nothing/85861554/'); return false;" rel="noopener"><span data-dcnode-id="763" instrument_node="">Obama articulated his position as follows</span></a><span data-dcnode-id="761" instrument_node="">:</span></p><span data-dcnode-id="759" instrument_node="">
</span><blockquote data-dcnode-id="754"><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">What exactly would using this label accomplish? What exactly would it change? Would it make ISIL less committed to kill Americans? Would it bring in more allies? Is there a military strategy that is served by this? The answer is none of the above … Calling a threat by a different name does not make it go away. This is a political distraction. …Not once has an adviser of mine said, ‘Man, if we use that phrase, we’re going to turn this whole thing around.’ … Where does this stop?&nbsp;The Orlando killer, one of&nbsp;the San Bernardino killers, the Fort Hood killer —&nbsp;they were all U.S. citizens. Are we going to start treating all Muslim Americans differently? Are we going to start subjecting them to special surveillance? Are we going to start discriminate them, because of their faith? … Do Republican officials actually agree with this?</span></p><span data-dcnode-id="755" instrument_node="">
</span></blockquote><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">Alternative explanations for this heated political issue have been offered by others. Jeffrey Goldberg, a national correspondent for the Atlantic, </span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/international/archive/2016/06/obama-radical-islam/487079/" onclick="javascript:window.open('https://www.theatlantic.com/international/archive/2016/06/obama-radical-islam/487079/'); return false;" rel="noopener"><span data-dcnode-id="751" instrument_node="">argues</span></a><span data-dcnode-id="749" instrument_node="">:</span></p><span data-dcnode-id="747" instrument_node="">
</span><blockquote data-dcnode-id="742"><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Obama’s reluctance to describe the threat as one posed by ‘radical Islam’ is in part due to his pessimism on matters related to the dysfunctions of Muslim states, and to the inability of the umma—the worldwide community of Muslims—to contain and ultimately neutralize the extremist elements in its midst, has, at times, an almost paralyzing effect on him. The president has come to the conclusion … that the underlying problems afflicting Islam are too deep, and too resistant to American intervention, to warrant implementation of the sort of policies that his critics, including his critics in foreign-policy think tanks, demand.</span></p><span data-dcnode-id="743" instrument_node="">
</span></blockquote><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="737"><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//malsi-tung.blogspot.com/2016/05/sam-harris-explains-narrative-narrative.html" onclick="javascript:window.open('https://malsi-tung.blogspot.com/2016/05/sam-harris-explains-narrative-narrative.html'); return false;" rel="noopener"><span data-dcnode-id="740" instrument_node="">Public intellectual Sam Harris</span></a><span data-dcnode-id="738" instrument_node=""> has described this as the narrative of the narrative, or “narrative narrative:”</span></p><span data-dcnode-id="736" instrument_node="">
</span><blockquote data-dcnode-id="731"><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">In fighting ISIS or resisting the spread of Islamic theocracy more generally, we must at all costs avoid ‘confirming the narrative’ of Islamic extremists. So the fear is that any focus on the religion of Islam or its adherents … the fear is that this will drive many more Muslims into the arms of the jihadists; they’ll become jihadists because of this. … Now this is either the most pessimistic and uncharitable thing ever said about a community, in the case of the world’s 1.6 billion Muslims, or it’s true.</span></p><span data-dcnode-id="732" instrument_node="">
</span></blockquote><span data-dcnode-id="730" instrument_node="">
</span><h4 data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Stopping ISIS and Islamic Terror</span></h4><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="723"><picture data-dcnode-id="724"><source data-dcnode-id="726" sizes="(max-width: 578px) 100vw, 578px" srcset="https://www.fpri.org/wp-content/uploads/2016/11/trump-2.png.webp 578w, https://www.fpri.org/wp-content/uploads/2016/11/trump-2-400x234.png.webp 400w, https://www.fpri.org/wp-content/uploads/2016/11/trump-2-160x94.png.webp 160w, https://www.fpri.org/wp-content/uploads/2016/11/trump-2-228x133.png.webp 228w, https://www.fpri.org/wp-content/uploads/2016/11/trump-2-351x205.png.webp 351w, https://www.fpri.org/wp-content/uploads/2016/11/trump-2-200x117.png.webp 200w" type="image/webp"><img alt="trump-2" class="aligncenter wp-image-18307 size-full webpexpress-processed" data-dcnode-id="725" height="338" loading="lazy" sizes="(max-width: 578px) 100vw, 578px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fpri.org/wp-content/uploads/2016/11/trump-2.png&amp;raw" srcset="https://www.fpri.org/wp-content/uploads/2016/11/trump-2.png 578w, https://www.fpri.org/wp-content/uploads/2016/11/trump-2-400x234.png 400w, https://www.fpri.org/wp-content/uploads/2016/11/trump-2-160x94.png 160w, https://www.fpri.org/wp-content/uploads/2016/11/trump-2-228x133.png 228w, https://www.fpri.org/wp-content/uploads/2016/11/trump-2-351x205.png 351w, https://www.fpri.org/wp-content/uploads/2016/11/trump-2-200x117.png 200w" width="578"></picture></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">In dealing with terrorism, Trump suggests using tactics similar to the containment policy that the United States used against the ideology of communism in the Cold War. Trump proposed a ban on Muslim immigration to the United States, or most recently, a ban on immigration from countries that have a history of radical Islam. It is often implied this means countries in the Middle East with this problem, and not countries in Europe.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Trump claims it is currently impossible to tell whether immigrants being admitted are Islamic radicals, or whether their children will become radicals. He sees the possibility of immigrants’ children adopting extremist Islamic views is a reason to ban migration. Trump says this Muslim ban will only be temporary, while the US re-evaluates the benefits of such migration and sets up protection from extremists. Trump does describe immigration in general as a very costly affair, which is rarely worth the effort. He also calls for increased report rates within the Muslim community for their extremist compatriots. During many of the attacks, Trump argues that Muslims could have done more to report those who exhibited radical beliefs and behaviors.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="715" instrument_node="">He has also called for much more drastic action to deal with terrorism. Controversially, </span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2016/07/05/politics/donald-trump-saddam-hussein-iraq-terrorism/" onclick="javascript:window.open('https://www.cnn.com/2016/07/05/politics/donald-trump-saddam-hussein-iraq-terrorism/'); return false;" rel="noopener"><span data-dcnode-id="714" instrument_node="">he praised Saddam Hussein’s</span></a><span data-dcnode-id="712" instrument_node=""> efficient killing of terrorists: “He was a bad guy — really bad guy. But you know what? He did well? He killed terrorists. He did that so good. They didn’t read them the rights. They didn’t talk. They were terrorists. Over. Today, Iraq is Harvard for terrorism.” When asked if Trump believed the police should be able to conduct warrantless searches of Muslims—in a common Trumpion fashion—</span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politifact.com/truth-o-meter/article/2015/nov/24/donald-trumps-comments-database-american-muslims/" onclick="javascript:window.open('https://www.politifact.com/truth-o-meter/article/2015/nov/24/donald-trumps-comments-database-american-muslims/'); return false;" rel="noopener"><span data-dcnode-id="711" instrument_node="">he responded</span></a><span data-dcnode-id="709" instrument_node="">: “We’re going to have to do certain things that were frankly unthinkable a year ago.” When asked, “Would President Donald Trump support a full Muslim database?” </span><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politifact.com/truth-o-meter/article/2015/nov/24/donald-trumps-comments-database-american-muslims/" onclick="javascript:window.open('https://www.politifact.com/truth-o-meter/article/2015/nov/24/donald-trumps-comments-database-american-muslims/'); return false;" rel="noopener"><span data-dcnode-id="708" instrument_node="">Trump responded,</span></a><span data-dcnode-id="706" instrument_node=""> “Basically the suggestion was made and (it’s) certainly something we should start thinking about… But what I want is a watch list. I want surveillance programs. Obviously, there are a lot of problems. … But, certainly, I would want to have a database for the refugees, for the Syrian refugees that are coming in because nobody knows where they’re coming from.” He has also publicly mused on striking ISIS with nuclear weapons and increased bombing efforts and torture to combat terrorism. It seems that Trump is willing to go to rather drastic lengths to stop terrorists, bring back “order,” and “make America safe again.”</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Trump attempts to appease Muslims by saying they are the most at risk from Islamic terrorism. And Donald Trump describes himself as the only candidate who can stop ISIS. To Trump, intervention in Syria and Iraq is worth the costs of intervention: what this intervention would be, he has largely left to the imagination. Trump has repeatedly decried the predictability of US military intervention, especially concerning the United States’ worst enemies. The risk of further attacks and the plights of persecuted Christians in the Middle East are both of primary concern.</span></p><span data-dcnode-id="701" instrument_node="">
</span><h3 data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Foreign Policy of Previous Administrations</span></h3><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="697" instrument_node="">“</span><em data-dcnode-id="693"><span data-dcnode-id="696" instrument_node="">We’ve let our rivals and challengers think they can get away with anything, and they do. They do at will. It always happens. If President Obama’s goal had been to weaken America, he could not have done a better job.”</span><br data-dcnode-id="695"><span data-dcnode-id="694" instrument_node="">
</span></em><span data-dcnode-id="692" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;– Donald Trump, speech to the Center for the National Interest</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">A major part of Donald Trump’s foreign policy ideology is his criticism of recent foreign policy by the Bush and Obama administrations. To Trump, America is falling apart: US military superiority, economic growth, and other countries’ respect of America are in sharp decline. He blames the weakness of US policy toward its allies, rivals, and enemies as the cause of many of these problems.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">According to Trump, the careless administration has even failed to own up to gross incompetence on many occasions, most notably for the Benghazi scandal. On many occasions Trump has noted the US failure to stop, especially Hillary Clinton’s State Department, the 2012 Benghazi attack on the American diplomatic compound. After the attack, the Republican Congress was aggravated at a perceived lack of information about the attack, which led to the House creating the Select Committee on the Events Surrounding the 2012 Terrorist Attack in Benghazi, Libya. This committee ultimately did not implicate Secretary Clinton as responsible for “negligence” for the security provided to the compound.</span></p><span data-dcnode-id="684" instrument_node="">
</span><h3 data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">America First: New Foreign Policy Direction</span></h3><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="667"><em data-dcnode-id="677"><span data-dcnode-id="680" instrument_node="">“What does America First mean to you?”</span><br data-dcnode-id="679"><span data-dcnode-id="678" instrument_node="">
</span></em><em data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">“Meaning we are going to take care of this country first before we worry about </span></em><em data-dcnode-id="671"><span data-dcnode-id="674" instrument_node="">everybody else in the world.”</span><br data-dcnode-id="673"><span data-dcnode-id="672" instrument_node="">
</span></em><span data-dcnode-id="670" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;– Maggie Haberman and Donald Trump, </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html%3F_r%3D0" onclick="javascript:window.open('https://www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html?_r=0'); return false;" rel="noopener"><span data-dcnode-id="669" instrument_node="">interview with the New York Times</span></a></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="665" instrument_node="">Donald Trump describes his foreign policy with the slogan “America First.” This phrase historically is associated with the American First Committee of the 1930s. This group was described as isolationist and primarily was focused on keep America from entering the Second World War. This group believed that the United States had no business in the affairs of Europe and the Old World. But </span><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html%3F_r%3D0" onclick="javascript:window.open('https://www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html?_r=0'); return false;" rel="noopener"><span data-dcnode-id="664" instrument_node="">Trump disavows any intended reference</span></a><span data-dcnode-id="662" instrument_node="">: “To me, America First is a brand-new modern term. I never related it to the past.” While some argue that Donald Trump’s views are isolationist, John Haines prefers the term “</span><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fpri.org/article/2016/01/detached-primacy-musings-trump-doctrine/" target="_blank"><span data-dcnode-id="661" instrument_node="">detached primacy</span></a><span data-dcnode-id="659" instrument_node="">” to describe the difference between Trump’s views and true isolationism. Haines describes two conditions that lead a supporter of detached primacy to dissolve an alliance: one is that they “impose an unnecessary limit on American action… the second … is that they risk entangling the United States in regional conflicts that pose no direct threat to American national interests.”</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">A Trump presidency would be a fairly substantial shift in the course of American foreign policy. Many people criticize this aspect of Trump’s foreign policy as dangerous, especially &nbsp;Hillary Clinton. This is Trump’s answer to the claimed lack of direction he sees in foreign policy. </span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nationalinterest.org/feature/trump-foreign-policy-15960" onclick="javascript:window.open('https://nationalinterest.org/feature/trump-foreign-policy-15960'); return false;" rel="noopener"><span data-dcnode-id="655" instrument_node="">Mr. Trump calls</span></a><span data-dcnode-id="653" instrument_node=""> for a new group of foreign policy makers to rise up because he believes members of the political establishment “frankly don’t know what they are doing.” One of Trump’s major impacts to the Republican platform was the agreement on his America First policy at least when it comes to trade deals, which would seem to signal at least a temporary shift in the Republican Party.</span></p><span data-dcnode-id="651" instrument_node="">
</span><h3 data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Intervention</span></h3><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">&nbsp;</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="641"><picture data-dcnode-id="642"><source data-dcnode-id="644" sizes="(max-width: 428px) 100vw, 428px" srcset="https://www.fpri.org/wp-content/uploads/2016/11/trump-3.jpg.webp 428w, https://www.fpri.org/wp-content/uploads/2016/11/trump-3-400x221.jpg.webp 400w, https://www.fpri.org/wp-content/uploads/2016/11/trump-3-160x88.jpg.webp 160w, https://www.fpri.org/wp-content/uploads/2016/11/trump-3-228x126.jpg.webp 228w, https://www.fpri.org/wp-content/uploads/2016/11/trump-3-372x205.jpg.webp 372w, https://www.fpri.org/wp-content/uploads/2016/11/trump-3-200x110.jpg.webp 200w" type="image/webp"><img alt="trump-3" class="aligncenter wp-image-18310 size-full webpexpress-processed" data-dcnode-id="643" height="236" loading="lazy" sizes="(max-width: 428px) 100vw, 428px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fpri.org/wp-content/uploads/2016/11/trump-3.jpg&amp;raw" srcset="https://www.fpri.org/wp-content/uploads/2016/11/trump-3.jpg 428w, https://www.fpri.org/wp-content/uploads/2016/11/trump-3-400x221.jpg 400w, https://www.fpri.org/wp-content/uploads/2016/11/trump-3-160x88.jpg 160w, https://www.fpri.org/wp-content/uploads/2016/11/trump-3-228x126.jpg 228w, https://www.fpri.org/wp-content/uploads/2016/11/trump-3-372x205.jpg 372w, https://www.fpri.org/wp-content/uploads/2016/11/trump-3-200x110.jpg 200w" width="428"></picture></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="639" instrument_node="">When intervening in the affairs of foreign countries, to Trump, it is all about the risk/reward ratio for the United States. Not all of the foreign investments America makes around the world have value. One can find an important example of this in </span><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nationalinterest.org/feature/trump-foreign-policy-15960" onclick="javascript:window.open('https://nationalinterest.org/feature/trump-foreign-policy-15960'); return false;" rel="noopener"><span data-dcnode-id="638" instrument_node="">his speech to the Center for the National Interest</span></a><span data-dcnode-id="636" instrument_node="">: “Our military is growing weaker because we are weakening the economy. Rebuilding other countries, and letting other countries take our jobs are of primary concern.”</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Throughout Trump’s campaign, he has supported a policy of decreasing other countries’ reliance on the military might of America. This entails reducing foreign commitments with US allies, which will enable the US to build up its own economy. He says that other countries can build up stronger economies than the US because the US has to focus so much of its GDP protecting them. Other countries must pay comparable amounts of their GDP to the United States to ease this unequal burden. Although Trump recommends decreasing foreign intervention, for certain key issues he recommends intervention, like aiding the persecuted Christians threatened by the Islamic State.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="619"><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nationalinterest.org/feature/trump-foreign-policy-15960" onclick="javascript:window.open('https://nationalinterest.org/feature/trump-foreign-policy-15960'); return false;" rel="noopener"><span data-dcnode-id="630" instrument_node="">Mr. Trump often remarks</span></a><span data-dcnode-id="628" instrument_node=""> that the United States cannot make western democracies “out of countries with no experience or interests in becoming … western democracies.” Instead, </span><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nationalinterest.org/feature/trump-foreign-policy-15960" onclick="javascript:window.open('https://nationalinterest.org/feature/trump-foreign-policy-15960'); return false;" rel="noopener"><span data-dcnode-id="627" instrument_node="">Trump recommends</span></a><span data-dcnode-id="625" instrument_node=""> trying to show other countries how marvelous western traditions are by example: “I will work with our allies to reinvigorate Western values and institutions. Instead of trying to spread universal values that not everybody shares or wants, we should understand that strengthening and promoting Western civilization and its accomplishments will do more to inspire positive reforms around the world than military interventions.” Trump stated reluctance to interfere in foreign countries to support civil liberties abroad, to which the </span><a data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/blogs/right-turn/wp/2016/07/21/trump-proves-hes-a-putin-lapdog/%3Futm_term%3D.519c5b76cd12" onclick="javascript:window.open('https://www.washingtonpost.com/blogs/right-turn/wp/2016/07/21/trump-proves-hes-a-putin-lapdog/?utm_term=.519c5b76cd12'); return false;" rel="noopener"><em data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Washington Post</span></em><span data-dcnode-id="622" instrument_node=""> responded</span></a><span data-dcnode-id="620" instrument_node="">, “He said in the interview, ‘I don’t think we have the right to lecture [other countries]. Look at what is happening in our country.’ This is pure left-wing anti-American bile. We are too disreputable, too corrupt to offer leadership to the world, says Trump — and the likes of Noam Chomsky. Had Obama said, ‘Who are we to tell China to respect human rights?,’ the right would have gone bananas.”</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Donald Trump does support aggressive intervention when it comes to terrorism, which he says will be much harsher than what Obama has done. In terms of specific plans to stop ISIS and other Islamic groups, he has less to say. Trump recommends facing radical Islam like the way that United States dealt with communism during the Cold War. Cutting off the millions of dollars ISIS earns from Libyan oil is very important. Trump hasn’t said much about going for jihadi propaganda producers online as the Clinton campaign has.</span></p><span data-dcnode-id="615" instrument_node="">
</span><h3 data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">International Relationships</span></h3><span data-dcnode-id="612" instrument_node="">
</span><h4 data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">International Organizations and Multinational Treaties</span></h4><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="603"><em data-dcnode-id="605"><span data-dcnode-id="608" instrument_node="">“And under my administration, we will never enter America into any agreement that reduces our ability to control our own affairs.”</span><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">
</span></em><span data-dcnode-id="604" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; – Donald Trump, speech to the Center for the National Interest</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="601" instrument_node="">Generally, Trump is not opposed in principle to international organizations and multinational treaties, but he does have critical things to say about US involvement in certain organizations and treaties. In his speech to the </span><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html%3F_r%3D0" onclick="javascript:window.open('https://www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html?_r=0'); return false;" rel="noopener"><span data-dcnode-id="600" instrument_node="">Center for the National Interest (CFTNI),</span></a><span data-dcnode-id="598" instrument_node=""> he says “NAFTA, as an example, has been a total disaster for the United States and has emptied our states — literally emptied our states of our manufacturing and our jobs. And I’ve just gotten to see it. I’ve toured Pennsylvania. I’ve toured New York. I’ve toured so many of the states. They have been cleaned out. Their manufacturing is gone.” When asked if he would pull out of NAFTA, Trump responded: “If I don’t get change, I would pull out of NAFTA in a split second. NAFTA is signed by Bill Clinton, perhaps the worst trade deal ever signed in the history of this country.”</span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="595" instrument_node="">Trump has also been very critical of the Trans-Pacific Partnership for the same reasons. He also has issues with NATO members not pulling their own weight, but sees it as a useful organization for facing common challenges. Trump said that they look at the United States as weak and forgiving and feel no obligation to honor their agreements with us. In NATO, for instance, only 4 of 28 other member countries (exlcuding America) are spending the minimum required 2 percent of GDP on defense. Mr. Trump also has said in an interview with the </span><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html%3F_r%3D0" onclick="javascript:window.open('https://www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html?_r=0'); return false;" rel="noopener"><em data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">New York Times</span></em></a><span data-dcnode-id="591" instrument_node="">, “If we cannot be properly reimbursed for the tremendous cost of our military protecting other countries, and in many cases the countries I’m talking about are extremely rich… some people, the fools and the haters, they said, ‘Oh, Trump doesn’t want to protect you.’ I would prefer that we be able to continue, but if we are not going to be reasonably reimbursed for the tremendous cost of protecting these massive nations with tremendous wealth… [David E. Sanger proposes that it’s in US interests to keep open trading lines] … I think it’s a mutual interest, but we’re being reimbursed like it’s only in our interests…” Later, in this same speech, </span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//foreignpolicy.com/2016/07/21/the-certain-trumpet-donald-trump-new-york-times-interview-baltics-russia-nato/" onclick="javascript:window.open('https://foreignpolicy.com/2016/07/21/the-certain-trumpet-donald-trump-new-york-times-interview-baltics-russia-nato/'); return false;" rel="noopener"><span data-dcnode-id="590" instrument_node="">the host said</span></a><span data-dcnode-id="588" instrument_node="">, “My point here is, can the members of NATO, including the new members in the Baltics, count on the United States to come to their military aid if they were attacked by Russia? And count on us fulfilling our obligations.” Trump responded, “Have they fulfilled their obligations to us? If they fulfill their obligations to us, the answer is yes.” Many have been extremely critical of such statements, calling it insane to threaten the NATO alliance.</span></p><span data-dcnode-id="586" instrument_node="">
</span><h3 data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Problems with US alliances</span></h3><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="582" instrument_node="">“</span><em data-dcnode-id="578"><span data-dcnode-id="581" instrument_node="">I just ordered thousands of television sets and between LG and Samsung and I mean you know — No American company comes to see and comes to bid. It’s South Korea, and whenever they have a problem we send the battleships, we send the destroyers, we send our airplanes, we’re going to protect them. What are we doing; why aren’t they paying us? Why aren’t they paying us; what are we doing?”</span><br data-dcnode-id="580"><span data-dcnode-id="579" instrument_node="">
</span></em><span data-dcnode-id="577" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;– Donald Trump, speech to the Iowa Freedom Summit</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Donald Trump has identified problems with the way the United States deals with its allies. Trump believes that America pays much more for the defense of its allies than America’s allies do proportionally. Trump thinks it’s unfair that America pays so much more of its budget on defense than any other country allied to the United States. If countries aren’t willing to increase their defense budgets, Trump suggests these countries should just pay for their entire defense. America’s allies take advantage of the fact they won’t take such drastic actions; it is crucial that the United States makes such drastic statements. Many people and organizations continually criticize these dramatic statements for threatening to destabilize US alliances, including Never Trump Republicans, Democrats, news programs, and many foreign policy think tanks.</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Yet, Trump also sees incompetence in the Obama administration for failing to effectively aid US allies. Mr. Trump believes Obama antagonizes and snubs our allies and rewards America’s enemies. An important example of this is Trump’s view of the Iran deal: the deal rewards Iran by removing key sanctions, while it can continue to develop nuclear weapons and support terror around the Middle East. American allies, such as Saudi Arabia and Israel, are at the greatest risk from this perceived threat. Other examples of this include the abandonment of defense plans with Poland and the Czech Republic and the ousting of a friendly regime in Egypt, which led to the rise of the hostile Muslim Brotherhood. Trump claims the Obama administration snubs Israel through criticism of Israel’s policies against Palestine. Not only does this delegitimize Israel in Trump’s view, but it also illustrates a clear lack of moral clarity.</span></p><span data-dcnode-id="569" instrument_node="">
</span><h3 data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Nuclear Proliferation</span></h3><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="560"><em data-dcnode-id="562"><span data-dcnode-id="565" instrument_node="">“Now, we have a game changer now, and the game changer is nuclear weapons. We really do have to get strong, and we have to get strong fast. We can’t let Iran get a nuclear weapon. We can’t do it. Can’t do it. We cannot let that happen.”</span><br data-dcnode-id="564"><span data-dcnode-id="563" instrument_node="">
</span></em><span data-dcnode-id="561" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;– Donald Trump, Iowa Freedom Summit</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="558" instrument_node="">Trump’s basic position on nuclear proliferation is that America and its friends should improve their nuclear capacity, while US enemies should not. In Mr. Trump’s address to the Iowa Freedom Summit, he describes the modernization of the US nuclear arsenal as a “game changer.” Trump views such weapons as powerful tools in making deals with other countries. The American nuclear arsenal is described as “[</span><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.c-span.org/video/%3F323834-7/iowa-freedom-summit-donald-trump" onclick="javascript:window.open('https://www.c-span.org/video/?323834-7/iowa-freedom-summit-donald-trump'); return false;" rel="noopener"><span data-dcnode-id="557" instrument_node="">deteriorating] into nothing</span></a><span data-dcnode-id="555" instrument_node="">,” and he seeks to invest in improving the arsenal. Mr. Trump has also expressed interest in allowing Japan, South Korea, Saudi Arabia, and various other countries to develop nuclear weapons. In regards to Saudi Arabia, he has also said that they will get nuclear weapons whether or not we want them to. In that same speech, he said, “</span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.c-span.org/video/%3F323834-7/iowa-freedom-summit-donald-trump" onclick="javascript:window.open('https://www.c-span.org/video/?323834-7/iowa-freedom-summit-donald-trump'); return false;" rel="noopener"><span data-dcnode-id="554" instrument_node="">stopping nuclear weapons in Iran and elsewhere</span></a><span data-dcnode-id="552" instrument_node="">” is one of his goals. His use of the term “elsewhere” as opposed to “everywhere” makes this statement consistent with his previously expressed views.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">One of Trump’s most prominent gaffes involves his brazen ignorance of the Nuclear Triad, where Trump did not understand the three parts of the US nuclear program: strategic bombers, ICBMs, and submarine based. Later, he corrected his ignorance on the issue.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="546" instrument_node="">When asked about considerations of a </span><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html%3F_r%3D0" onclick="javascript:window.open('https://www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html?_r=0'); return false;" rel="noopener"><span data-dcnode-id="545" instrument_node="">no-first-use pledge before using nuclear weapons</span></a><span data-dcnode-id="543" instrument_node="">, Trump responded, “Depends on who we are talking about, it depends on who we are talking about. I would only make that commitment as the agreement is being signed. I wouldn’t want to play my cards. I don’t want to say that. … I will do everything within my power never to be in a position where we have to use nuclear power because that’s a whole different ballgame. That’s very important to me. … I only like that premise if nobody else has them. But that’s never going to happen.” When further questioned, “Do you think we have too many weapons than we actually need to defend the United States?” He said “I think we have a lot of obsolete weapons… We have nuclear that we don’t even know if it works. We have nuclear where the telephones systems are 40 years old and they have wire that’s so corroded that they can’t call from one station to the next.”</span></p><span data-dcnode-id="541" instrument_node="">
</span><h3 data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Israel</span></h3><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="532"><em data-dcnode-id="534"><span data-dcnode-id="537" instrument_node="">“OK. I think it’s probably the toughest agreement of any kind to make. It has been going on for many years, many friends of mine have been involved, they’re very good businessmen, good negotiators. A lot of people say an agreement can’t be made, which is OK, sometimes agreements can’t be made, not good. But you have both sides really, but you have one side in particular growing up and learning that these are the worst people, these are the worst people et cetera et cetera. … But I will give it one hell of a shot. That I can tell you. But of all agreements – I would say if you can do that deal you can do any deal. That’s probably the toughest deal in the world right now to make and it’s possible it’s not makeable because don’t forget, it has to last. …”</span><br data-dcnode-id="536"><span data-dcnode-id="535" instrument_node="">
</span></em><span data-dcnode-id="533" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;– Donald Trump, Interview with MSNBC</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="530" instrument_node="">Of all the foreign policy stances that Donald Trump has made, the one that has generated the greatest amount of confusion is his stances on the Israeli/Palestinian conflict. The confusion was largely generated over his February 17, 2016 MSNBC interview where </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//info.msnbc.com/_news/2016/03/30/35330907-full-transcript-msnbc-town-hall-with-donald-trump-moderated-by-chris-matthews%3Flite" onclick="javascript:window.open('https://info.msnbc.com/_news/2016/03/30/35330907-full-transcript-msnbc-town-hall-with-donald-trump-moderated-by-chris-matthews?lite'); return false;" rel="noopener"><span data-dcnode-id="529" instrument_node="">Trump said</span></a><span data-dcnode-id="527" instrument_node="">, “I don’t want to get into it for a different reason, Joe, because if I do win, there has to be a certain amount of surprise, unpredictability, our country has no unpredictability. If I win, I don’t want to be in a position where I’m saying to you, and the other side now say, ‘We don’t want Trump involved, we don’t want’ – let me be sort of a neutral guy, let’s see what – I’m going to give it a shot. It would be so great.” The confusion arose over his use of the phrase “neutral guy,” which took many by surprise because overwhelmingly the Republican Party is seen as siding with Israel. Many potential candidates for the Republican nomination attacked Trump for this view as well as Democratic contender Hillary Clinton. However, people misunderstood this phrase. Trump makes it clear that he “doesn’t want to get into [the issue] for a different reason” and describes this reason in the following way “there has to be a certain amount of surprise, unpredictability, our country has no unpredictability.” This seems to suggest the idea again that Trump doesn’t want to engage the public in the same way that Hillary Clinton does. He wants to boost American deal making power by (appearing at least) to be neutral on a number of issues: for one could certainly imagine Palestine might be more willing to talk if the US weren’t so emphatic about its support for Israel in the conflict. Many criticize this stance because they insist Israel is only willing to deal with Palestine because the US assures its safety; Israel is perfectly happy with the status quo.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="524" instrument_node="">Possibly, Trump meant to stay silent on this issue because</span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//info.msnbc.com/_news/2016/03/30/35330907-full-transcript-msnbc-town-hall-with-donald-trump-moderated-by-chris-matthews%3Flite" onclick="javascript:window.open('https://info.msnbc.com/_news/2016/03/30/35330907-full-transcript-msnbc-town-hall-with-donald-trump-moderated-by-chris-matthews?lite'); return false;" rel="noopener"><span data-dcnode-id="523" instrument_node=""> he believes it’s</span></a><span data-dcnode-id="521" instrument_node=""> “the toughest agreement of any kind to make. … A lot of people say an agreement can’t be made, which is OK, sometimes agreements can’t be made, not good. But you have both sides really, but you have one side in particular growing up and learning that these are the worst people … But I will give it one hell of a shot. That I can tell you.” Mr. Trump hoped that this diplomatic neutrality would give him stronger deal-making powers in the resolution of the Israeli-Palestinian conflict. Criticism was levied against this foreign policy “naiveté” because many believe Israel wouldn’t even be willing to come to the table without strong US support.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Possibly because of this criticism, Trump’s position of “neutrality” did not last. Every four years, the American Israeli Public Affairs Committee (AIPAC), an influential pro-Israel lobbying group, hosts the major presidential hopefuls to address their annual meeting. Throughout Trump’s speech to AIPAC, he emphasized his commitment to the Jewish people: throwing out credentials like Trump was the marshal for the Israel parade during the Gulf War. He blamed the Palestinians for refusing to make a deal stating that they do not want peace. The Israeli side is painted positively, “We know Israel is willing to deal. Israel has been trying to sit down at the negotiating table, without pre-conditions, for years.” Trump went on to describe that there is “no moral equivalency” between Israel and Palestine: “In Palestinian textbooks and mosques, you’ve got a culture of hatred that has been fermenting there for years, and if we want to achieve peace, they’ve got to end this indoctrination of hatred.” He sees Hamas as an important part of this culture of hatred. He describes half of Palestine being controlled by Hamas and says that the other half won’t stand up to Hamas. We can only wonder what triggered such a vast shift of tone and the abandonment of strategic silence.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="515" instrument_node="">In terms of what the agreement between Israel and Palestine would look like, </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/4267058/donald-trump-aipac-speech-transcript/" onclick="javascript:window.open('https://time.com/4267058/donald-trump-aipac-speech-transcript/'); return false;" rel="noopener"><span data-dcnode-id="514" instrument_node="">he says</span></a><span data-dcnode-id="512" instrument_node=""> quite plainly that it would not be made by the UN, “The United Nations is not a friend of democracy. It’s not a friend to freedom.” He views America as an important facilitator of negotiations, but </span><a data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/4267058/donald-trump-aipac-speech-transcript/" onclick="javascript:window.open('https://time.com/4267058/donald-trump-aipac-speech-transcript/'); return false;" rel="noopener"><span data-dcnode-id="511" instrument_node="">says</span></a><span data-dcnode-id="509" instrument_node=""> “no one should be telling Israel it must abide by some agreement made by others thousands of miles away that don’t even really know what’s happening.” To further guarantee the safety of Israel, Trump has called for the termination of the Iran nuclear treaty and a greater fight against Palestinian and Islamic terrorism which threatens the existence of Israel. Iran is identified as a key supporter of Hezbollah, which has created so many problems to peace in the region.</span></p><span data-dcnode-id="507" instrument_node="">
</span><h4 data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Middle East</span></h4><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="498"><em data-dcnode-id="500"><span data-dcnode-id="503" instrument_node="">“We’re a humanitarian nation, but the legacy of the Obama-Clinton interventions will be weakness, confusion and disarray, a mess. We’ve made the Middle East more unstable and chaotic than ever before.”</span><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node="">
</span></em><span data-dcnode-id="499" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; – Donald Trump, Center for the National Interest</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">In regards to the Middle East, generally, Trump calls for less, but calls for aggressive intervention against ISIS at the same time. In terms of reforming Middle Eastern countries, </span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nationalinterest.org/feature/trump-foreign-policy-15960" onclick="javascript:window.open('https://nationalinterest.org/feature/trump-foreign-policy-15960'); return false;" rel="noopener"><span data-dcnode-id="495" instrument_node="">he often remarks</span></a><span data-dcnode-id="493" instrument_node=""> that the United States cannot make western democracies “out of countries with no experience or interests in becoming … western democracies.” He further criticizes intervening in the Middle East in this way when he discusses how the money the US invested in Iraq and Afghanistan did not actually improve their opinions of the United States. Trump laments in his Iowa Freedom Summit Speech, “Afghanistan has tremendous wealth in minerals, different, not the oil, but minerals. And we’re fighting here, and on the other side of the mountain China is taking out all the minerals. They’re taking it out. Trillion of dollars and millions of dollars of minerals.” He seems to believe if we can’t reform Middle Eastern governments, or get them to like us, at least we could get access to their resources after the United States pours in so much money.</span></p><span data-dcnode-id="491" instrument_node="">
</span><h3 data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Rivals/Enemies</span></h3><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="478"><em data-dcnode-id="484"><span data-dcnode-id="487" instrument_node="">“… Our rivals no longer respect us. In fact, they’re just as confused as our allies, but in an even bigger problem is they don’t take us seriously anymore. The truth is they don’t respect us. When President Obama landed in Cuba on Air Force One, no leader was there, nobody, to greet him.” </span><br data-dcnode-id="486"><span data-dcnode-id="485" instrument_node="">
</span></em><span data-dcnode-id="483" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;– Donald Trump, </span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/fact-checker/wp/2016/04/29/trumps-claim-that-no-foreign-leader-greeting-obama-was-without-precedent/" onclick="javascript:window.open('https://www.washingtonpost.com/news/fact-checker/wp/2016/04/29/trumps-claim-that-no-foreign-leader-greeting-obama-was-without-precedent/'); return false;" rel="noopener"><span data-dcnode-id="482" instrument_node="">Center for the National Interest</span></a><a data-dcnode-id="479" href="#_ftn1" name="_ftnref1"><span data-dcnode-id="480" instrument_node="">[1]</span></a></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Trump consistently asserts that America’s enemies and rivals see it as weak. The weakness is itself the result of incompetent foreign policy with bad implementation. During the campaign, he has been particularly critical against foreign policy decisions made by the Obama administration blaming both President Obama and Secretary Clinton. Mr. Trump claims that their policies have weakened US relations with its friends and forced America to bow to its enemies and rivals. To Trump, it is important to be able to differentiate enemies that will never be amenable to our interests from rivals who the US can work with. Working with China and Russia over certain issues like terrorism could benefit both countries. Dealing strongly with American rivals will insure they don’t take advantage of the US.</span></p><span data-dcnode-id="474" instrument_node="">
</span><h4 data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Russia</span></h4><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="470" instrument_node="">“</span><em data-dcnode-id="466"><span data-dcnode-id="469" instrument_node="">[Donald Trump is] a really brilliant and talented person, without any doubt … It’s not our job to judge his qualities, that’s a job for American voters, but he’s the absolute leader in the presidential race. … He says he wants to move on to a new, more substantial relationship, a deeper relationship with Russia, how can we not welcome that? … Of course we welcome that.”</span><br data-dcnode-id="468"><span data-dcnode-id="467" instrument_node="">
</span></em><span data-dcnode-id="465" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;–&nbsp;</span><a data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thepoliticalinsider.com/vladimir-putin-just-made-a-massive-donald-trump-announcement/" onclick="javascript:window.open('https://www.thepoliticalinsider.com/vladimir-putin-just-made-a-massive-donald-trump-announcement/'); return false;" rel="noopener"><span data-dcnode-id="464" instrument_node="">Vladimir Putin</span></a></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="457"><picture data-dcnode-id="458"><source data-dcnode-id="460" sizes="(max-width: 588px) 100vw, 588px" srcset="https://www.fpri.org/wp-content/uploads/2016/11/trump-4.png.webp 588w, https://www.fpri.org/wp-content/uploads/2016/11/trump-4-400x229.png.webp 400w, https://www.fpri.org/wp-content/uploads/2016/11/trump-4-160x91.png.webp 160w, https://www.fpri.org/wp-content/uploads/2016/11/trump-4-228x130.png.webp 228w, https://www.fpri.org/wp-content/uploads/2016/11/trump-4-359x205.png.webp 359w, https://www.fpri.org/wp-content/uploads/2016/11/trump-4-200x114.png.webp 200w" type="image/webp"><img alt="trump-4" class="aligncenter wp-image-18312 size-full webpexpress-processed" data-dcnode-id="459" height="336" loading="lazy" sizes="(max-width: 588px) 100vw, 588px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fpri.org/wp-content/uploads/2016/11/trump-4.png&amp;raw" srcset="https://www.fpri.org/wp-content/uploads/2016/11/trump-4.png 588w, https://www.fpri.org/wp-content/uploads/2016/11/trump-4-400x229.png 400w, https://www.fpri.org/wp-content/uploads/2016/11/trump-4-160x91.png 160w, https://www.fpri.org/wp-content/uploads/2016/11/trump-4-228x130.png 228w, https://www.fpri.org/wp-content/uploads/2016/11/trump-4-359x205.png 359w, https://www.fpri.org/wp-content/uploads/2016/11/trump-4-200x114.png 200w" width="588"></picture></p><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="455" instrument_node="">Donald Trump has been criticized many times for his alleged compliments of Vladimir Putin; the </span><em data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">New York Times</span></em><span data-dcnode-id="452" instrument_node=""> asked Trump, “Let me ask you about Russia. You’ve been very complimentary of Putin himself.” To which </span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html%3F_r%3D0" onclick="javascript:window.open('https://www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html?_r=0'); return false;" rel="noopener"><span data-dcnode-id="451" instrument_node="">he replied</span></a><span data-dcnode-id="449" instrument_node="">, “No! No, I haven’t.” Trump further alleged he was the sole recipient of compliments, which he warmly accepted: “It is always a great honor to be so nicely complimented by a man so highly respected within his own country and beyond,” </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/story/2015/12/trump-vladimir-putin-praise-216892" onclick="javascript:window.open('https://www.politico.com/story/2015/12/trump-vladimir-putin-praise-216892'); return false;" rel="noopener"><span data-dcnode-id="448" instrument_node="">Trump said in a statement</span></a><span data-dcnode-id="446" instrument_node="">. “I have always felt that Russia and the United States should be able to work well with each other towards defeating terrorism and restoring world peace, not to mention trade and all of the other benefits derived from mutual respect.” Trump welcomes further cooperation with Russia, especially on issues facing both countries like domestic terrorism.</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="443" instrument_node="">A few news outlets and the Clinton campaign claimed that Russia supports Trump’s candidacy. There have been suggestions that many pro-Russian oligarchs helped finance Trump’s business ventures; Trump responded on Facebook by saying, “For the record, I have ZERO investments in Russia.” Trump has also suggested that he would not necessarily intervene if </span><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html%3F_r%3D0" onclick="javascript:window.open('https://www.nytimes.com/2016/07/22/us/politics/donald-trump-foreign-policy-interview.html?_r=0'); return false;" rel="noopener"><span data-dcnode-id="442" instrument_node="">Russians invaded the Baltic</span></a><span data-dcnode-id="440" instrument_node="">: “Have they fulfilled their obligations to us? If they fulfill their obligations to us, the answer is yes.” </span><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/us-news/2016/jul/24/clinton-campaign-blames-russia-wikileaks-sanders-dnc-emails" onclick="javascript:window.open('https://www.theguardian.com/us-news/2016/jul/24/clinton-campaign-blames-russia-wikileaks-sanders-dnc-emails'); return false;" rel="noopener"><span data-dcnode-id="439" instrument_node="">The DNC argues</span></a><span data-dcnode-id="437" instrument_node=""> that Russia did this to destabilize the United States and to support their preferred candidate.</span></p><span data-dcnode-id="435" instrument_node="">
</span><h4 data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Iran</span></h4><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="424"><em data-dcnode-id="428"><span data-dcnode-id="431" instrument_node="">“The wisest plan of crazy [Donald] Trump is tearing up the nuclear deal…”</span><br data-dcnode-id="430"><span data-dcnode-id="429" instrument_node="">
</span></em><span data-dcnode-id="427" instrument_node="">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;– Hossein Shariatmadari, </span><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.al-monitor.com/pulse/originals/2016/04/iran-newspapers-nuclear-deal-trump-shariatmadari.html" onclick="javascript:window.open('https://www.al-monitor.com/pulse/originals/2016/04/iran-newspapers-nuclear-deal-trump-shariatmadari.html'); return false;" rel="noopener"><span data-dcnode-id="426" instrument_node="">Iranian editor of the hardline Kayhan newspaper</span></a></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="422" instrument_node="">Donald Trump has been openly critical of the Iran and the US involvement there. Trump has often called out Iran’s support of terror groups in its effort to gain regional domination at the cost of the stability of the region. Trump also identifies it as a primary threat to the state of Israel. Clinton says the same things about Iran, but what separates them is Trump’s opposition to the Iran nuclear deal and Clinton’s support. </span><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.c-span.org/video/%3F323834-7/iowa-freedom-summit-donald-trump" onclick="javascript:window.open('https://www.c-span.org/video/?323834-7/iowa-freedom-summit-donald-trump'); return false;" rel="noopener"><span data-dcnode-id="421" instrument_node="">Mr. Trump says that dismantling the deal</span></a><span data-dcnode-id="419" instrument_node=""> is his “number one priority” because he claims Iran will continue to sponsor terror in the region and get closer to building a nuclear weapon.</span></p><span data-dcnode-id="417" instrument_node="">
</span><h4 data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">China</span></h4><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="413" instrument_node="">“[Trump]could in fact be the best president for China … That’s because the Republican Party is more practical and Trump is a businessman who puts his commercial interests above everything else, [Clinton, on the other hand] … might be the least friendly president toward China.”</span><br data-dcnode-id="412"><span data-dcnode-id="411" instrument_node="">
 &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; – Wu Jun, </span><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fortune.com/2016/05/30/donald-trump-popular-china/" onclick="javascript:window.open('https://fortune.com/2016/05/30/donald-trump-popular-china/'); return false;" rel="noopener"><span data-dcnode-id="410" instrument_node="">Hong Kong political commentator</span></a></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">The major statements Donald Trump has made about China have been about trade, the economy, and cyber-security. Mr. Trump asserts that bad leadership is responsible for losing the United States money and jobs and that dealing more strongly with the Chinese is essential to control the damage. It is important to reduce the amount of money that America owes to foreign governments like China. Part of the problem, in Trump’s opinion, is that the Chinese benefit from American peace keeping efforts and sweep in and get the economic benefits (i.e. Chinese mineral projects in Afghanistan). It is essential to get this issue under control in order to build up the American economy and infrastructure. Trump also condemns the Chinese use of industrial and state espionage, which Trump believes America could do more to protect itself. In particular, with China, he argues that by showing strength, America can learn to work together with China on shared issues such as Islamic terrorism.</span></p><span data-dcnode-id="404" instrument_node="">
</span><h3 data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Military</span></h3><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="398"><em data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">“We will spend what we need to rebuild our military. It is the cheapest, single investment we can make. We will develop, build and purchase the best equipment known to mankind. Our military dominance must be unquestioned, and I mean unquestioned, by anybody and everybody.”</span></em></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; –&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Donald Trump, Center for the National Interest</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Trump’s position on the military is to continue investment in American defense, but decrease other countries’ reliance on US protection. Rebuilding and defending other countries is decreasing our ability to defend America and improve the economy. Several policy goals are outlined by Trump in order to increase the military power of the United States. Increasing military spending, generally, is something he has argued for time and time again. Modernizing the American nuclear arsenal is a primary concern to Trump as well. The benefit seems to be nuclear weapons’ ability to influence change in the world, but Mr. Trump is willing to use nuclear weapons in conflicts if there is no other option. The need to invest in important new technologies, such as 3D Printing, AI, and cyber warfare, will enable America to keep up its edge.</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">In terms of waging war, Trump believes that the US must be assured of victory before they enter a conflict. The shadow of the failure of the Iraq war is the primary motivation for this belief. Mr. Trump believes that waging war should be done with caution.</span></p><span data-dcnode-id="388" instrument_node="">
</span><h3 data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Conclusion</span></h3><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">If Trump wins the election in November 2016, we can expect to see massive changes in American foreign policy in his administration. The difference between a Bush foreign policy and an Obama foreign policy would pale in comparison to the difference between them and Trump’s foreign policy. If Trump doesn’t win, the Republican Party will likely expunge his isolationist and nationalist tendencies, but those tendencies will survive within a vocal fringe group for years to come. Trump may lose, but Trumpism will survive to see another day.</span></p><span data-dcnode-id="382" instrument_node="">
</span><hr data-dcnode-id="381"><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="376"><a data-dcnode-id="378" href="#_ftnref1" name="_ftn1"><span data-dcnode-id="379" instrument_node="">[1]</span></a><span data-dcnode-id="377" instrument_node=""> The statement above is somewhat misleading because fact checkers at the Washington Post have determined that while the President of Cuba didn’t show up to great President Obama, the foreign minister of Cuba did.</span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">&nbsp;</span></p><span data-dcnode-id="372" instrument_node="">
</span></div><span data-dcnode-id="370" instrument_node="">
