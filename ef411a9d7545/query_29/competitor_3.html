</span><p data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">[I wish for a nation] unencumbered by bureaucratic ineptitude, government regulation, confiscatory tax policies, racism, discrimination against women, or discrimination against people based on sexual orientation
</span></p><span data-dcnode-id="4646" instrument_node="">
</span></blockquote><span data-dcnode-id="4644" instrument_node="">
</span><p data-dcnode-id="4638"><span data-dcnode-id="4643" instrument_node="">And in a CBN interview:</span><sup class="reference" data-dcnode-id="4640" id="cite_ref-114"><a data-dcnode-id="4641" href="#cite_note-114"><span data-dcnode-id="4642" instrument_node="">[114]</span></a></sup><span data-dcnode-id="4639" instrument_node="">
</span></p><span data-dcnode-id="4637" instrument_node="">
</span><blockquote class="letter" data-dcnode-id="4630" style="width:auto; background:#f8f8ff; border:1px solid #C9C9CF;"><span data-dcnode-id="4636" instrument_node="">
</span><p data-dcnode-id="4632"><a data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Friend_argument" title="Friend argument"><span data-dcnode-id="4635" instrument_node="">I know many, many gay people</span></a><span data-dcnode-id="4633" instrument_node="">. Tremendous people. And to be honest with you, as far as civil unions are concerned, I haven't totally formed my opinion. But there can be no discrimination against gays. I'm against gay marriage; I took a lot of heat for that.
</span></p><span data-dcnode-id="4631" instrument_node="">
</span></blockquote><span data-dcnode-id="4629" instrument_node="">
</span><h3 data-dcnode-id="4619"><span class="mw-headline" data-dcnode-id="4627" id="Women.27s_rights"><span data-dcnode-id="4628" instrument_node="">Women's rights</span></span><span class="mw-editsection" data-dcnode-id="4620"><span class="mw-editsection-bracket" data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">[</span></span><a data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D13" title="Edit section: Women's rights"><span data-dcnode-id="4624" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4618" instrument_node="">
</span><div class="hatnote" data-dcnode-id="4614" role="note"><span data-dcnode-id="4617" instrument_node="">See the main article on this topic: </span><a data-dcnode-id="4615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Feminism" title="Feminism"><span data-dcnode-id="4616" instrument_node="">Feminism</span></a></div><span data-dcnode-id="4613" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4604"><div class="thumbinner" data-dcnode-id="4605" style="width:202px;"><a class="image" data-dcnode-id="4611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AWomen%2527s_March_on_Washington_%2832593123745%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="4612" height="133" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Women%2527s_March_on_Washington_%252832593123745%2529.jpg/200px-Women%2527s_March_on_Washington_%252832593123745%2529.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Women%27s_March_on_Washington_%2832593123745%29.jpg/300px-Women%27s_March_on_Washington_%2832593123745%29.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/Women%27s_March_on_Washington_%2832593123745%29.jpg/400px-Women%27s_March_on_Washington_%2832593123745%29.jpg 2x" width="200"></a><span data-dcnode-id="4610" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4606"><div class="magnify" data-dcnode-id="4608"><a class="internal" data-dcnode-id="4609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AWomen%2527s_March_on_Washington_%2832593123745%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="4607" instrument_node="">Women's March in Washington on January 21, 2017, one day after his inauguration.</span></div></div></div><span data-dcnode-id="4603" instrument_node="">
</span><p data-dcnode-id="4587"><span data-dcnode-id="4602" instrument_node="">Trump has cut funding for large numbers of organizations worldwide that protect women from sexual violence, provide contraceptives and the like. Many organizations worldwide are appealing for funding and without alternative funding face closure. Tens of thousands of women are at risk.</span><sup class="reference" data-dcnode-id="4599" id="cite_ref-115"><a data-dcnode-id="4600" href="#cite_note-115"><span data-dcnode-id="4601" instrument_node="">[115]</span></a></sup><span data-dcnode-id="4598" instrument_node=""> Trump's decision to cut said funding may or may not be due to the fact of him being a </span><a data-dcnode-id="4596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Misogyny" title="Misogyny"><span data-dcnode-id="4597" instrument_node="">misogynist</span></a><span data-dcnode-id="4595" instrument_node="">.</span><sup data-dcnode-id="4589"><span data-dcnode-id="4594" instrument_node="">[</span><a data-dcnode-id="4591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Help%3AReferences" title="Help:References"><i data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">citation&nbsp;needed</span></i></a><span data-dcnode-id="4590" instrument_node="">]</span></sup><span data-dcnode-id="4588" instrument_node="">
</span></p><p data-dcnode-id="4581"><span data-dcnode-id="4586" instrument_node="">The abortion gag rule was expanded to unprecedented levels under Trump, broadening it to include global health funding provided by the State Department, the U.S. Agency for International Development and the Defense Department, totaling $8.8 billion; even G. W. Bush only had affected 600 million in total funding. The expanded ban will "cause an increase in unintended pregnancies, unsafe abortions and maternal deaths."</span><sup class="reference" data-dcnode-id="4583" id="cite_ref-116"><a data-dcnode-id="4584" href="#cite_note-116"><span data-dcnode-id="4585" instrument_node="">[116]</span></a></sup><span data-dcnode-id="4582" instrument_node="">
</span></p><p data-dcnode-id="4575"><span data-dcnode-id="4580" instrument_node="">In response to record-low teen pregnancies, Trump's administration set up new guidelines pushing for abstinence only education, which would cause teen pregnancies to skyrocket.</span><sup class="reference" data-dcnode-id="4577" id="cite_ref-117"><a data-dcnode-id="4578" href="#cite_note-117"><span data-dcnode-id="4579" instrument_node="">[117]</span></a></sup><span data-dcnode-id="4576" instrument_node="">
</span></p><p data-dcnode-id="4562"><span data-dcnode-id="4574" instrument_node="">Amid a reported "epidemic" of sexual harassment on campus, which disproportionately affects women, Education Secretary Betsy DeVos rolled back Obama's previous guidelines (which were implemented in violation of the Administrative Procedure Act) by narrowing the definition of sexual harassment. This allows schools to decide which "level of evidence to rely on when investigating misconduct," between the "clear and convincing" standard or "preponderance of the evidence" standard, and only be accountable for complaints which are formally filed.</span><sup class="reference" data-dcnode-id="4571" id="cite_ref-118"><a data-dcnode-id="4572" href="#cite_note-118"><span data-dcnode-id="4573" instrument_node="">[118]</span></a></sup><span data-dcnode-id="4570" instrument_node=""> It also mandates that accused students have the ability to view evidence, have access to legal counsel, and conduct cross examination through a third party. Scholars at the forefront of sexual assault and rape law </span><a data-dcnode-id="4568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Stopped_clock" title="Stopped clock"><span data-dcnode-id="4569" instrument_node="">have actually voiced support, albeit cautious, at this development</span></a><span data-dcnode-id="4567" instrument_node="">.</span><sup class="reference" data-dcnode-id="4564" id="cite_ref-119"><a data-dcnode-id="4565" href="#cite_note-119"><span data-dcnode-id="4566" instrument_node="">[119]</span></a></sup><span data-dcnode-id="4563" instrument_node="">
</span></p><span data-dcnode-id="4561" instrument_node="">
</span><h2 data-dcnode-id="4551"><span class="mw-headline" data-dcnode-id="4559" id="Conflict_of_interest_and_nepotism"><span data-dcnode-id="4560" instrument_node="">Conflict of interest and nepotism</span></span><span class="mw-editsection" data-dcnode-id="4552"><span class="mw-editsection-bracket" data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">[</span></span><a data-dcnode-id="4555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D14" title="Edit section: Conflict of interest and nepotism"><span data-dcnode-id="4556" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4553"><span data-dcnode-id="4554" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4550" instrument_node="">
</span><span data-dcnode-id="4549" instrument_node="">
</span><span data-dcnode-id="4548" instrument_node="">
</span><span data-dcnode-id="4538" instrument_node="">
</span><span data-dcnode-id="4537" instrument_node="">
</span><table class="cquote" data-dcnode-id="4526" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="4527"><tr data-dcnode-id="4539"><td data-dcnode-id="4540"><div data-dcnode-id="4542" style="padding:4px 50px;position:relative;"><span data-dcnode-id="4546" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="4547" instrument_node="">“</span></span><span data-dcnode-id="4544" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="4545" instrument_node="">”</span></span><span data-dcnode-id="4543" instrument_node="">Constitutional lawyers and White House ethics counsellors from Democratic and Republican administrations have warned Donald Trump his presidency might be blocked by the electoral college if he does not give up ownership of at least some of his business empire. … Yet much of what he has said and done since winning the election suggests that Trump comes to the presidency in the spirit of a tycoon making a new acquisition, overseeing the merger of Trump Inc and America Inc – a merger in which it is far from clear which would be the senior partner.</span></div><span data-dcnode-id="4541" instrument_node="">
</span></td></tr><tr data-dcnode-id="4528"><td data-dcnode-id="4529" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="4536" instrument_node=""> </span><cite data-dcnode-id="4531" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="4535" instrument_node="">—Julian Borger</span><sup class="reference" data-dcnode-id="4532" id="cite_ref-120"><a data-dcnode-id="4533" href="#cite_note-120"><span data-dcnode-id="4534" instrument_node="">[120]</span></a></sup></cite><span data-dcnode-id="4530" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="4525" instrument_node="">
</span><p data-dcnode-id="4512"><span data-dcnode-id="4524" instrument_node="">Trump's son-in-law Jared Kushner is a key adviser despite complaints about nepotism.</span><sup class="reference" data-dcnode-id="4521" id="cite_ref-121"><a data-dcnode-id="4522" href="#cite_note-121"><span data-dcnode-id="4523" instrument_node="">[121]</span></a></sup><span data-dcnode-id="4520" instrument_node=""> Kushner also lied extensively about his business connection to Russia on his security clearance form.</span><sup class="reference" data-dcnode-id="4517" id="cite_ref-122"><a data-dcnode-id="4518" href="#cite_note-122"><span data-dcnode-id="4519" instrument_node="">[122]</span></a></sup><sup class="reference" data-dcnode-id="4514" id="cite_ref-123"><a data-dcnode-id="4515" href="#cite_note-123"><span data-dcnode-id="4516" instrument_node="">[123]</span></a></sup><span data-dcnode-id="4513" instrument_node="">
</span></p><p data-dcnode-id="4506"><span data-dcnode-id="4511" instrument_node="">Documents show that Trump is still receiving benefits from his business interests.</span><sup class="reference" data-dcnode-id="4508" id="cite_ref-124"><a data-dcnode-id="4509" href="#cite_note-124"><span data-dcnode-id="4510" instrument_node="">[124]</span></a></sup><span data-dcnode-id="4507" instrument_node="">
</span></p><p data-dcnode-id="4500"><span data-dcnode-id="4505" instrument_node="">Being a family member, a donor to his campaign, or a family member to a donor of his campaign is a guaranteed way to get a spot on in the Trump administration.</span><sup class="reference" data-dcnode-id="4502" id="cite_ref-125"><a data-dcnode-id="4503" href="#cite_note-125"><span data-dcnode-id="4504" instrument_node="">[125]</span></a></sup><span data-dcnode-id="4501" instrument_node="">
</span></p><span data-dcnode-id="4499" instrument_node="">
</span><h2 data-dcnode-id="4489"><span class="mw-headline" data-dcnode-id="4497" id="Deconstruction_of_the_administrative_state"><span data-dcnode-id="4498" instrument_node="">Deconstruction of the administrative state</span></span><span class="mw-editsection" data-dcnode-id="4490"><span class="mw-editsection-bracket" data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">[</span></span><a data-dcnode-id="4493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D15" title="Edit section: Deconstruction of the administrative state"><span data-dcnode-id="4494" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4491"><span data-dcnode-id="4492" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4488" instrument_node="">
</span><p data-dcnode-id="4437"><span data-dcnode-id="4487" instrument_node="">Like something out of a </span><a class="mw-redirect" data-dcnode-id="4485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Randroid" title="Randroid"><span data-dcnode-id="4486" instrument_node="">Randroid</span></a><span data-dcnode-id="4484" instrument_node="">'s dream, Trump issued a series of executive orders weakening the </span><a data-dcnode-id="4482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Government" title="Government"><span data-dcnode-id="4483" instrument_node="">government</span></a><span data-dcnode-id="4481" instrument_node=""> in nearly all aspects, starting with his federal worker hiring freeze (which is especially hurting soldiers' and veterans' families hard).</span><sup class="reference" data-dcnode-id="4478" id="cite_ref-126"><a data-dcnode-id="4479" href="#cite_note-126"><span data-dcnode-id="4480" instrument_node="">[126]</span></a></sup><span data-dcnode-id="4477" instrument_node=""> A second executive order would force the executive branch to "reorganize" governmental functions and eliminate "unnecessary agencies", and he has already started by refusing to fill thousands of vacancies in his government. Given that he has had two </span><a class="mw-redirect" data-dcnode-id="4475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Climate_change" title="Climate change"><span data-dcnode-id="4476" instrument_node="">climate change</span></a><span data-dcnode-id="4474" instrument_node=""> deniers at the head of the </span><a class="mw-redirect" data-dcnode-id="4472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/EPA" title="EPA"><span data-dcnode-id="4473" instrument_node="">EPA</span></a><span data-dcnode-id="4471" instrument_node=""> (Scott Pruitt and acting administrator Andrew R. Wheeler), a </span><a class="mw-redirect" data-dcnode-id="4469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Creationist" title="Creationist"><span data-dcnode-id="4470" instrument_node="">creationist</span></a><span data-dcnode-id="4468" instrument_node=""> as Education Secretary (Betsy DeVos), a proposal to massively slash billions of dollars from </span><a data-dcnode-id="4466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ben_Carson" title="Ben Carson"><span data-dcnode-id="4467" instrument_node="">Ben Carson</span></a><span data-dcnode-id="4465" instrument_node="">'s HUD agencies,</span><sup class="reference" data-dcnode-id="4462" id="cite_ref-127"><a data-dcnode-id="4463" href="#cite_note-127"><span data-dcnode-id="4464" instrument_node="">[127]</span></a></sup><span data-dcnode-id="4461" instrument_node=""> and a propensity to fire people who disagree with him,</span><sup class="reference" data-dcnode-id="4458" id="cite_ref-128"><a data-dcnode-id="4459" href="#cite_note-128"><span data-dcnode-id="4460" instrument_node="">[128]</span></a></sup><sup class="reference" data-dcnode-id="4455" id="cite_ref-129"><a data-dcnode-id="4456" href="#cite_note-129"><span data-dcnode-id="4457" instrument_node="">[129]</span></a></sup><sup class="reference" data-dcnode-id="4452" id="cite_ref-130"><a data-dcnode-id="4453" href="#cite_note-130"><span data-dcnode-id="4454" instrument_node="">[130]</span></a></sup><span data-dcnode-id="4451" instrument_node=""> Trump is already on track to utterly dismantle every single aspect of the government that isn't solely dependent on the President's word (like the military, whose budget he wants to increase by over $50 billion).</span><sup class="reference" data-dcnode-id="4448" id="cite_ref-131"><a data-dcnode-id="4449" href="#cite_note-131"><span data-dcnode-id="4450" instrument_node="">[131]</span></a></sup><sup class="reference" data-dcnode-id="4445" id="cite_ref-132"><a data-dcnode-id="4446" href="#cite_note-132"><span data-dcnode-id="4447" instrument_node="">[132]</span></a></sup><sup class="reference" data-dcnode-id="4442" id="cite_ref-133"><a data-dcnode-id="4443" href="#cite_note-133"><span data-dcnode-id="4444" instrument_node="">[133]</span></a></sup><sup class="reference" data-dcnode-id="4439" id="cite_ref-134"><a data-dcnode-id="4440" href="#cite_note-134"><span data-dcnode-id="4441" instrument_node="">[134]</span></a></sup><span data-dcnode-id="4438" instrument_node="">
</span></p><span data-dcnode-id="4436" instrument_node="">
</span><h3 data-dcnode-id="4426"><span class="mw-headline" data-dcnode-id="4434" id="Budget"><span data-dcnode-id="4435" instrument_node="">Budget</span></span><span class="mw-editsection" data-dcnode-id="4427"><span class="mw-editsection-bracket" data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">[</span></span><a data-dcnode-id="4430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D16" title="Edit section: Budget"><span data-dcnode-id="4431" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4425" instrument_node="">
</span><p data-dcnode-id="4416"><span data-dcnode-id="4424" instrument_node="">A budget provides the best peek into the mindset of a president, based on what he prioritizes and what he does not. Trump's budgets, as well as his healthcare policies, paint the image of a man who hates the </span><a class="mw-redirect" data-dcnode-id="4422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Poor" title="Poor"><span data-dcnode-id="4423" instrument_node="">poor</span></a><span data-dcnode-id="4421" instrument_node=""> and the weak, and demonstrably wants them to die.</span><sup class="reference" data-dcnode-id="4418" id="cite_ref-135"><a data-dcnode-id="4419" href="#cite_note-135"><span data-dcnode-id="4420" instrument_node="">[135]</span></a></sup><span data-dcnode-id="4417" instrument_node="">
</span></p><span data-dcnode-id="4415" instrument_node="">
</span><h3 data-dcnode-id="4405"><span class="mw-headline" data-dcnode-id="4413" id="Weakening_the_civil_service"><span data-dcnode-id="4414" instrument_node="">Weakening the civil service</span></span><span class="mw-editsection" data-dcnode-id="4406"><span class="mw-editsection-bracket" data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">[</span></span><a data-dcnode-id="4409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D17" title="Edit section: Weakening the civil service"><span data-dcnode-id="4410" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4404" instrument_node="">
</span><p data-dcnode-id="4398"><span data-dcnode-id="4403" instrument_node="">He signed executive orders that makes it easier to fire civil servants, public workers, and career government bureaucrats/technocrats.</span><sup class="reference" data-dcnode-id="4400" id="cite_ref-136"><a data-dcnode-id="4401" href="#cite_note-136"><span data-dcnode-id="4402" instrument_node="">[136]</span></a></sup><span data-dcnode-id="4399" instrument_node="">
</span></p><span data-dcnode-id="4397" instrument_node="">
</span><h3 data-dcnode-id="4387"><span class="mw-headline" data-dcnode-id="4395" id="Hollowing_out_the_State_Department"><span data-dcnode-id="4396" instrument_node="">Hollowing out the State Department</span></span><span class="mw-editsection" data-dcnode-id="4388"><span class="mw-editsection-bracket" data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">[</span></span><a data-dcnode-id="4391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D18" title="Edit section: Hollowing out the State Department"><span data-dcnode-id="4392" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4386" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4377"><div class="thumbinner" data-dcnode-id="4378" style="width:167px;"><a class="image" data-dcnode-id="4384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ARex_Tillerson_official_portrait.jpg"><img alt="" class="thumbimage" data-dcnode-id="4385" height="206" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/53/Rex_Tillerson_official_portrait.jpg/165px-Rex_Tillerson_official_portrait.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Rex_Tillerson_official_portrait.jpg/248px-Rex_Tillerson_official_portrait.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Rex_Tillerson_official_portrait.jpg/330px-Rex_Tillerson_official_portrait.jpg 2x" width="165"></a><span data-dcnode-id="4383" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4379"><div class="magnify" data-dcnode-id="4381"><a class="internal" data-dcnode-id="4382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ARex_Tillerson_official_portrait.jpg" title="Enlarge"></a></div><span data-dcnode-id="4380" instrument_node="">Rex Tillerson: the hollowed-out man</span></div></div></div><span data-dcnode-id="4376" instrument_node="">
</span><p data-dcnode-id="4349"><span data-dcnode-id="4375" instrument_node="">Despite nominating </span><a data-dcnode-id="4373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Rex_Tillerson" title="Rex Tillerson"><span data-dcnode-id="4374" instrument_node="">Rex Tillerson</span></a><span data-dcnode-id="4372" instrument_node=""> to be Secretary of State, Trump has actually done more to de-fang the State Department, by firing the old </span><a class="mw-redirect" data-dcnode-id="4370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Obama" title="Obama"><span data-dcnode-id="4371" instrument_node="">Obama</span></a><span data-dcnode-id="4369" instrument_node="">-era appointees, prompting several of the non-partisans to resign, and just not picking any replacements. The State Department is being sidelined from its mission to build alliances with </span><a class="mw-redirect" data-dcnode-id="4367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Diplomacy" title="Diplomacy"><span data-dcnode-id="4368" instrument_node="">diplomacy</span></a><span data-dcnode-id="4366" instrument_node=""> and negotiation. The State Department is shut out of meetings with foreign leaders, key State posts are left unfilled, department officials are afraid to speak out for fear of getting fired, and the White House not soliciting many department staffers for their policy advice. Furthermore, Trump declared that he wants to cut billions of dollars from the State Department's budget, effectively leaving it as a rudderless ghost ship.</span><sup class="reference" data-dcnode-id="4363" id="cite_ref-137"><a data-dcnode-id="4364" href="#cite_note-137"><span data-dcnode-id="4365" instrument_node="">[137]</span></a></sup><sup class="reference" data-dcnode-id="4360" id="cite_ref-138"><a data-dcnode-id="4361" href="#cite_note-138"><span data-dcnode-id="4362" instrument_node="">[138]</span></a></sup><sup class="reference" data-dcnode-id="4357" id="cite_ref-139"><a data-dcnode-id="4358" href="#cite_note-139"><span data-dcnode-id="4359" instrument_node="">[139]</span></a></sup><sup class="reference" data-dcnode-id="4354" id="cite_ref-140"><a data-dcnode-id="4355" href="#cite_note-140"><span data-dcnode-id="4356" instrument_node="">[140]</span></a></sup><span data-dcnode-id="4353" instrument_node=""> Incidentally, this is all in spite of Tillerson being a former ExxonMobil CEO, who had a 500 billion dollar oil deal with Russia that was canceled by Obama's post-</span><a class="mw-redirect" data-dcnode-id="4351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Crimea" title="Crimea"><span data-dcnode-id="4352" instrument_node="">Crimea</span></a><span data-dcnode-id="4350" instrument_node=""> sanctions. By insisting on defunding the State Department, Trump is de-fanging Tillerson's ability to conduct negotiations with other countries and preventing Tillerson from getting that oil deal restarted.
</span></p><p data-dcnode-id="4321"><span data-dcnode-id="4348" instrument_node="">By now, every major expert sees Tillerson as a failure for presiding over the death of diplomacy by gutting the State Department and forcing out longtime employees without any replacements. He "eliminated entire segments of the department," like the tracking of </span><a data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/War_crimes" title="War crimes"><span data-dcnode-id="4347" instrument_node="">war crimes</span></a><span data-dcnode-id="4345" instrument_node="">.</span><sup class="reference" data-dcnode-id="4342" id="cite_ref-141"><a data-dcnode-id="4343" href="#cite_note-141"><span data-dcnode-id="4344" instrument_node="">[141]</span></a></sup><span data-dcnode-id="4341" instrument_node=""> He imposed limits on transfers inside the organization and made it harder to replace people in the State Department.</span><sup class="reference" data-dcnode-id="4338" id="cite_ref-142"><a data-dcnode-id="4339" href="#cite_note-142"><span data-dcnode-id="4340" instrument_node="">[142]</span></a></sup><span data-dcnode-id="4337" instrument_node=""> He cut off the department from vital recruiting sources, like the Presidential Management Fellow program, because he called it inefficient. He publicly defended a Trump administration proposal to cut his department's budget by 30%, and devised a plan to cut the permanent staff by 8%.</span><sup class="reference" data-dcnode-id="4334" id="cite_ref-143"><a data-dcnode-id="4335" href="#cite_note-143"><span data-dcnode-id="4336" instrument_node="">[143]</span></a></sup><span data-dcnode-id="4333" instrument_node=""> Tillerson's goal was to eventually remove sanctions on Russia so his old company, ExxonMobil, could reap a 500 billion dollar oil deal with the oligarchs, but now, he can't even do that, and he is spending his time destroying diplomacy because Trump thinks negotiations are bad and war is better (does anyone remember Trump's ghost-written autobiography, a "nonfiction work of fiction",</span><sup class="reference" data-dcnode-id="4330" id="cite_ref-144"><a data-dcnode-id="4331" href="#cite_note-144"><span data-dcnode-id="4332" instrument_node="">[144]</span></a></sup><span data-dcnode-id="4329" instrument_node=""> </span><i data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node="">The Art of the Deal</span></i><span data-dcnode-id="4326" instrument_node="">?). Skilled and patriotic diplomats are leaving like never before in an exodus that marginalizes America's diplomacy, once again in favor of the military.</span><sup class="reference" data-dcnode-id="4323" id="cite_ref-145"><a data-dcnode-id="4324" href="#cite_note-145"><span data-dcnode-id="4325" instrument_node="">[145]</span></a></sup><span data-dcnode-id="4322" instrument_node="">
</span></p><span data-dcnode-id="4320" instrument_node="">
</span><h2 data-dcnode-id="4310"><span class="mw-headline" data-dcnode-id="4318" id="Deregulation"><span data-dcnode-id="4319" instrument_node="">Deregulation</span></span><span class="mw-editsection" data-dcnode-id="4311"><span class="mw-editsection-bracket" data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">[</span></span><a data-dcnode-id="4314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D19" title="Edit section: Deregulation"><span data-dcnode-id="4315" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4309" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4297"><div class="thumbinner" data-dcnode-id="4298" style="width:277px;"><a class="image" data-dcnode-id="4307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ADonald_Trump_signs_orders_to_green-light_the_Keystone_XL_and_Dakota_Access_pipelines.jpg"><img alt="" class="thumbimage" data-dcnode-id="4308" height="158" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/26/Donald_Trump_signs_orders_to_green-light_the_Keystone_XL_and_Dakota_Access_pipelines.jpg/275px-Donald_Trump_signs_orders_to_green-light_the_Keystone_XL_and_Dakota_Access_pipelines.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Donald_Trump_signs_orders_to_green-light_the_Keystone_XL_and_Dakota_Access_pipelines.jpg/413px-Donald_Trump_signs_orders_to_green-light_the_Keystone_XL_and_Dakota_Access_pipelines.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/Donald_Trump_signs_orders_to_green-light_the_Keystone_XL_and_Dakota_Access_pipelines.jpg/550px-Donald_Trump_signs_orders_to_green-light_the_Keystone_XL_and_Dakota_Access_pipelines.jpg 2x" width="275"></a><span data-dcnode-id="4306" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4299"><div class="magnify" data-dcnode-id="4304"><a class="internal" data-dcnode-id="4305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ADonald_Trump_signs_orders_to_green-light_the_Keystone_XL_and_Dakota_Access_pipelines.jpg" title="Enlarge"></a></div><span data-dcnode-id="4303" instrument_node="">Trump signs an </span><s data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">imperial decree</span></s><span data-dcnode-id="4300" instrument_node=""> executive order to advance construction on the Keystone pipeline</span></div></div></div><span data-dcnode-id="4296" instrument_node="">
</span><p data-dcnode-id="4290"><span data-dcnode-id="4295" instrument_node="">Trump made it his life's work to effectively rule by decree, using executive order after executive order to weaken, overturn, or just not enforce regulations that protect people's water, air, food, and general public health in addition to the piecemeal protections given to them from Wall Street and other corporations in the Obama era.</span><sup class="reference" data-dcnode-id="4292" id="cite_ref-146"><a data-dcnode-id="4293" href="#cite_note-146"><span data-dcnode-id="4294" instrument_node="">[146]</span></a></sup><span data-dcnode-id="4291" instrument_node="">
</span></p><p data-dcnode-id="4268"><span data-dcnode-id="4289" instrument_node="">His deregulation crusade is likely to be the single most successful in modern history, the effects of which will last for years after his reign ends.</span><sup class="reference" data-dcnode-id="4286" id="cite_ref-147"><a data-dcnode-id="4287" href="#cite_note-147"><span data-dcnode-id="4288" instrument_node="">[147]</span></a></sup><span data-dcnode-id="4285" instrument_node=""> It will largely benefit industries like the telecoms, </span><a data-dcnode-id="4283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Fossil_fuel" title="Fossil fuel"><span data-dcnode-id="4284" instrument_node="">fossil fuels</span></a><span data-dcnode-id="4282" instrument_node="">, Wall Street big banks, and media monopolies among others.</span><sup class="reference" data-dcnode-id="4279" id="cite_ref-148"><a data-dcnode-id="4280" href="#cite_note-148"><span data-dcnode-id="4281" instrument_node="">[148]</span></a></sup><sup class="reference" data-dcnode-id="4276" id="cite_ref-149"><a data-dcnode-id="4277" href="#cite_note-149"><span data-dcnode-id="4278" instrument_node="">[149]</span></a></sup><sup class="reference" data-dcnode-id="4273" id="cite_ref-150"><a data-dcnode-id="4274" href="#cite_note-150"><span data-dcnode-id="4275" instrument_node="">[150]</span></a></sup><sup class="reference" data-dcnode-id="4270" id="cite_ref-151"><a data-dcnode-id="4271" href="#cite_note-151"><span data-dcnode-id="4272" instrument_node="">[151]</span></a></sup><span data-dcnode-id="4269" instrument_node="">
</span></p><p data-dcnode-id="4259"><span data-dcnode-id="4267" instrument_node="">Among the 860 regulations he repealed by September 2017, many actively endanger the lives of American citizens. States no longer have limits on drug tests for those receiving unemployment benefits. Financial advisers will not have to act in the best interests of their clients. Employers no longer have to keep records of worker injuries, and the federal government will no longer publicize worker injuries. Government contractors no longer must disclose violations of labor laws. Judges no longer have discretion over handing out lenient criminal sentences. Private prisons will not be phased out. Law enforcement may seize assets of suspects not convicted of a crime.</span><sup data-dcnode-id="4261"><span data-dcnode-id="4266" instrument_node="">[</span><a data-dcnode-id="4263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Help%3AReferences" title="Help:References"><i data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">citation&nbsp;needed</span></i></a><span data-dcnode-id="4262" instrument_node="">]</span></sup><span data-dcnode-id="4260" instrument_node="">
</span></p><p data-dcnode-id="4246"><span data-dcnode-id="4258" instrument_node="">Toxic waste dumps slated for cleanup will be ignored. More waterways will not have to meet federal environmental protection standards. Power plants have fewer restrictions on emissions of </span><a class="mw-redirect" data-dcnode-id="4256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Greenhouse_gas" title="Greenhouse gas"><span data-dcnode-id="4257" instrument_node="">greenhouse gases</span></a><span data-dcnode-id="4255" instrument_node="">. Regulations that require chemical companies to reveal what is in storage tanks (an issue in Hurricane Harvey) are disappearing. While Trump and his administration complain about wind farms killing birds,</span><sup class="reference" data-dcnode-id="4252" id="cite_ref-152"><a data-dcnode-id="4253" href="#cite_note-152"><span data-dcnode-id="4254" instrument_node="">[152]</span></a></sup><span data-dcnode-id="4251" instrument_node=""> the Migratory Bird Treaty Act (MBTA) was quietly reinterpreted to make it so oil and gas, wind, and solar operators that accidentally kill birds will no longer be prosecuted.</span><sup class="reference" data-dcnode-id="4248" id="cite_ref-153"><a data-dcnode-id="4249" href="#cite_note-153"><span data-dcnode-id="4250" instrument_node="">[153]</span></a></sup><span data-dcnode-id="4247" instrument_node=""> Federal standards to make natural-disaster-ravaged infrastructure more resistant to flooding when rebuilt have been revoked. Money to let Americans know how and when to sign up for affordable health care is being slashed. Efforts to stabilize Obamacare to preserve insurance for millions are being ended.
</span></p><p data-dcnode-id="4237"><span data-dcnode-id="4245" instrument_node="">Local police departments once again can have access to excess military equipment such as tanks, bayonets and grenade launchers. Oil and gas companies no longer have to report payments (bribes) to foreign governments. The number of people eligible for overtime pay has been greatly decreased.</span><sup data-dcnode-id="4239"><span data-dcnode-id="4244" instrument_node="">[</span><a data-dcnode-id="4241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Help%3AReferences" title="Help:References"><i data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">citation&nbsp;needed</span></i></a><span data-dcnode-id="4240" instrument_node="">]</span></sup><span data-dcnode-id="4238" instrument_node="">
</span></p><p data-dcnode-id="4231"><span data-dcnode-id="4236" instrument_node="">More people will die in bed because mattresses will no longer have to be as fire-retardant as they are now. Construction site workers will be more likely to be run over by vehicles. Hundreds of endangered species will no longer be on the list for protection. New safety regulations on how meat and poultry are processed, in the works since 2001, will not be pursued. A requirement that federal contracts be issued only to firms that comply with 14 labor and civil rights laws, including equal pay for women, has been dropped. States may no longer create retirement savings plans for private-sector workers. Large companies no longer have to spell out what they pay men and what they pay women or what they pay whites and what they pay blacks, a rule that had been aimed at promoting pay equity.</span><sup class="reference" data-dcnode-id="4233" id="cite_ref-154"><a data-dcnode-id="4234" href="#cite_note-154"><span data-dcnode-id="4235" instrument_node="">[154]</span></a></sup><span data-dcnode-id="4232" instrument_node="">
</span></p><span data-dcnode-id="4230" instrument_node="">
</span><h3 data-dcnode-id="4220"><span class="mw-headline" data-dcnode-id="4228" id="Wolf_of_Wall_Street"><span data-dcnode-id="4229" instrument_node="">Wolf of Wall Street</span></span><span class="mw-editsection" data-dcnode-id="4221"><span class="mw-editsection-bracket" data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">[</span></span><a data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D20" title="Edit section: Wolf of Wall Street"><span data-dcnode-id="4225" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4219" instrument_node="">
</span><p data-dcnode-id="4213"><span data-dcnode-id="4218" instrument_node="">Immediately after taking office, Trump issued an executive order removing the “fiduciary duty” rule, an Obama initiate that required retirement account professionals to manage their funds in their clients’ best interests. This allows retirement advisors to pick and choose investments based on the perks and money that the advisor gets for their corporation. He hiked up prices for mortgages, and appointed a guy to the SEC to revoke the power of the SEC’s enforcement division to issue subpoenas launching investigations.</span><sup class="reference" data-dcnode-id="4215" id="cite_ref-155"><a data-dcnode-id="4216" href="#cite_note-155"><span data-dcnode-id="4217" instrument_node="">[155]</span></a></sup><span data-dcnode-id="4214" instrument_node="">
</span></p><p data-dcnode-id="4207"><span data-dcnode-id="4212" instrument_node="">With Trump's blessing and eventual signing, Congress voted to strip workers of their ability to conduct class-action lawsuits against big banks and credit card companies.</span><sup class="reference" data-dcnode-id="4209" id="cite_ref-156"><a data-dcnode-id="4210" href="#cite_note-156"><span data-dcnode-id="4211" instrument_node="">[156]</span></a></sup><span data-dcnode-id="4208" instrument_node="">
</span></p><span data-dcnode-id="4206" instrument_node="">
</span><h3 data-dcnode-id="4196"><span class="mw-headline" data-dcnode-id="4204" id="Destroying_the_safety_net"><span data-dcnode-id="4205" instrument_node="">Destroying the safety net</span></span><span class="mw-editsection" data-dcnode-id="4197"><span class="mw-editsection-bracket" data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">[</span></span><a data-dcnode-id="4200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D21" title="Edit section: Destroying the safety net"><span data-dcnode-id="4201" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4195" instrument_node="">
</span><p data-dcnode-id="4189"><span data-dcnode-id="4194" instrument_node="">He signed an executive order targeting recipients of Medicaid, food stamps and housing assistance by making those benefits contingent on work requirements, which would wipe out huge swaths of federal welfare.</span><sup class="reference" data-dcnode-id="4191" id="cite_ref-157"><a data-dcnode-id="4192" href="#cite_note-157"><span data-dcnode-id="4193" instrument_node="">[157]</span></a></sup><span data-dcnode-id="4190" instrument_node="">
</span></p><p data-dcnode-id="4179"><span data-dcnode-id="4188" instrument_node="">After giving 1 and a half trillion dollars to the rich in tax cuts, Trump canceled an Obama-era pay raise to federal workers.</span><sup class="reference" data-dcnode-id="4185" id="cite_ref-158"><a data-dcnode-id="4186" href="#cite_note-158"><span data-dcnode-id="4187" instrument_node="">[158]</span></a></sup><span data-dcnode-id="4184" instrument_node=""> Trump had previously said during his campaign that wages are "too high."</span><sup class="reference" data-dcnode-id="4181" id="cite_ref-159"><a data-dcnode-id="4182" href="#cite_note-159"><span data-dcnode-id="4183" instrument_node="">[159]</span></a></sup><span data-dcnode-id="4180" instrument_node="">
</span></p><span data-dcnode-id="4178" instrument_node="">
</span><h2 data-dcnode-id="4168"><span class="mw-headline" data-dcnode-id="4176" id="Education"><span data-dcnode-id="4177" instrument_node="">Education</span></span><span class="mw-editsection" data-dcnode-id="4169"><span class="mw-editsection-bracket" data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node="">[</span></span><a data-dcnode-id="4172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D22" title="Edit section: Education"><span data-dcnode-id="4173" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4167" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4155"><div class="thumbinner" data-dcnode-id="4156" style="width:167px;"><a class="image" data-dcnode-id="4165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ABetsy_DeVos_official_portrait.jpg"><img alt="" class="thumbimage" data-dcnode-id="4166" height="206" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/88/Betsy_DeVos_official_portrait.jpg/165px-Betsy_DeVos_official_portrait.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Betsy_DeVos_official_portrait.jpg/248px-Betsy_DeVos_official_portrait.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/Betsy_DeVos_official_portrait.jpg/330px-Betsy_DeVos_official_portrait.jpg 2x" width="165"></a><span data-dcnode-id="4164" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4157"><div class="magnify" data-dcnode-id="4162"><a class="internal" data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ABetsy_DeVos_official_portrait.jpg" title="Enlarge"></a></div><span data-dcnode-id="4161" instrument_node="">Betsy DeVos, </span><i data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">new from Dulux—Trumpian orangé </span></i><span data-dcnode-id="4158" instrument_node="">!</span></div></div></div><span data-dcnode-id="4154" instrument_node="">
</span><p data-dcnode-id="4136"><span data-dcnode-id="4153" instrument_node="">Trump chose </span><a data-dcnode-id="4151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Betsy_DeVos" title="Betsy DeVos"><span data-dcnode-id="4152" instrument_node="">Betsy DeVos</span></a><span data-dcnode-id="4150" instrument_node="">, heir-by-marriage to the </span><a data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Amway" title="Amway"><span data-dcnode-id="4149" instrument_node="">Amway</span></a><span data-dcnode-id="4147" instrument_node=""> fortune, as Secretary of Education despite her lack of qualifications. Her own education was from private </span><a data-dcnode-id="4145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Christianity" title="Christianity"><span data-dcnode-id="4146" instrument_node="">Christian</span></a><span data-dcnode-id="4144" instrument_node=""> schools. She favors a </span><a data-dcnode-id="4142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/School_vouchers" title="School vouchers"><span data-dcnode-id="4143" instrument_node="">voucher system</span></a><span data-dcnode-id="4141" instrument_node="">, although similar systems have failed; students using the vouchers in private schools attained poorer results than those in public schools.</span><sup class="reference" data-dcnode-id="4138" id="cite_ref-160"><a data-dcnode-id="4139" href="#cite_note-160"><span data-dcnode-id="4140" instrument_node="">[160]</span></a></sup><span data-dcnode-id="4137" instrument_node="">
</span></p><p data-dcnode-id="4114"><span data-dcnode-id="4135" instrument_node="">Currently, the name ‘Betsy DeVos’ is synonymous with illiteracy, a reputation she acquired by (seemingly) failing to understand the difference between ‘yes’ and ‘no’, when asked whether she was a board member of her mother's </span><a data-dcnode-id="4133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Homophobia" title="Homophobia"><span data-dcnode-id="4134" instrument_node="">anti-LGBTQ</span></a><span data-dcnode-id="4132" instrument_node=""> foundation.</span><sup class="reference" data-dcnode-id="4129" id="cite_ref-161"><a data-dcnode-id="4130" href="#cite_note-161"><span data-dcnode-id="4131" instrument_node="">[161]</span></a></sup><sup class="reference" data-dcnode-id="4126" id="cite_ref-162"><a data-dcnode-id="4127" href="#cite_note-162"><span data-dcnode-id="4128" instrument_node="">[162]</span></a></sup><sup class="reference" data-dcnode-id="4123" id="cite_ref-163"><a data-dcnode-id="4124" href="#cite_note-163"><span data-dcnode-id="4125" instrument_node="">[163]</span></a></sup><span data-dcnode-id="4122" instrument_node="">
Some claim that she is, in </span><i data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">fact</span></i><span data-dcnode-id="4119" instrument_node="">, *NOT* illiterate—she was *LYING*, an allegation Ms. DeVos and her supporters deny; some, even bolder still, say she can even tie her own shoelaces—rest assured dear reader, we won’t go that far!</span><sup class="reference" data-dcnode-id="4116" id="cite_ref-164"><a data-dcnode-id="4117" href="#cite_note-164"><span data-dcnode-id="4118" instrument_node="">[164]</span></a></sup><span data-dcnode-id="4115" instrument_node="">
</span></p><p data-dcnode-id="4102"><span data-dcnode-id="4113" instrument_node="">Shortly after passing her Senate confirmation, it was revealed that Ms. Devos appeared to have </span><a data-dcnode-id="4111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Plagiarism" title="Plagiarism"><span data-dcnode-id="4112" instrument_node="">plagiarized</span></a><span data-dcnode-id="4110" instrument_node=""> her answers to a questionnaire as part of her confirmation.</span><sup class="reference" data-dcnode-id="4107" id="cite_ref-165"><a data-dcnode-id="4108" href="#cite_note-165"><span data-dcnode-id="4109" instrument_node="">[165]</span></a></sup><span data-dcnode-id="4106" instrument_node=""> In keeping with the Trump Klan's efforts to be as blatantly immoral and </span><a data-dcnode-id="4104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Hypocrisy" title="Hypocrisy"><span data-dcnode-id="4105" instrument_node="">hypocritical</span></a><span data-dcnode-id="4103" instrument_node=""> as possible, at least one of her answers was lifted from an Obama administration official, Vanita Gupta. That makes her smart.
</span></p><p data-dcnode-id="4094"><a data-dcnode-id="4100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Jerry_Falwell_Jr." title="Jerry Falwell Jr."><span data-dcnode-id="4101" instrument_node="">Jerry Falwell Jr.</span></a><span data-dcnode-id="4099" instrument_node=""> was chosen to head a task force on higher education.</span><sup class="reference" data-dcnode-id="4096" id="cite_ref-166"><a data-dcnode-id="4097" href="#cite_note-166"><span data-dcnode-id="4098" instrument_node="">[166]</span></a></sup><span data-dcnode-id="4095" instrument_node="">
</span></p><p data-dcnode-id="4085"><span data-dcnode-id="4093" instrument_node="">Under Trump, DeVos sought to revoke former President Obama's 2011 and 2014 guidelines for schools investigating campus sexual misconduct; legal scholars </span><a data-dcnode-id="4091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Stopped_clock" title="Stopped clock"><span data-dcnode-id="4092" instrument_node="">actually express support, albeit cautious, at this development</span></a><span data-dcnode-id="4090" instrument_node="">.</span><sup class="reference" data-dcnode-id="4087" id="cite_ref-167"><a data-dcnode-id="4088" href="#cite_note-167"><span data-dcnode-id="4089" instrument_node="">[167]</span></a></sup><span data-dcnode-id="4086" instrument_node="">
</span></p><span data-dcnode-id="4084" instrument_node="">
</span><h2 data-dcnode-id="4074"><span class="mw-headline" data-dcnode-id="4082" id="Foreign_policy"><span data-dcnode-id="4083" instrument_node="">Foreign policy</span></span><span class="mw-editsection" data-dcnode-id="4075"><span class="mw-editsection-bracket" data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">[</span></span><a data-dcnode-id="4078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D23" title="Edit section: Foreign policy"><span data-dcnode-id="4079" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4073" instrument_node="">
</span><div class="hatnote" data-dcnode-id="4069" role="note"><span data-dcnode-id="4072" instrument_node="">See the main article on this topic: </span><a data-dcnode-id="4070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Foreign_policy_of_Donald_Trump" title="Foreign policy of Donald Trump"><span data-dcnode-id="4071" instrument_node="">Foreign policy of Donald Trump</span></a></div><span data-dcnode-id="4068" instrument_node="">
</span><h2 data-dcnode-id="4058"><span class="mw-headline" data-dcnode-id="4066" id="Health"><span data-dcnode-id="4067" instrument_node="">Health</span></span><span class="mw-editsection" data-dcnode-id="4059"><span class="mw-editsection-bracket" data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">[</span></span><a data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D24" title="Edit section: Health"><span data-dcnode-id="4063" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4057" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4048"><div class="thumbinner" data-dcnode-id="4049" style="width:352px;"><a class="image" data-dcnode-id="4055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ATrump_vaccine_tweet.png"><img alt="" class="thumbimage" data-dcnode-id="4056" height="322" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/images/thumb/f/f6/Trump_vaccine_tweet.png/350px-Trump_vaccine_tweet.png&amp;raw" srcset="/w/images/thumb/f/f6/Trump_vaccine_tweet.png/525px-Trump_vaccine_tweet.png 1.5x, /w/images/f/f6/Trump_vaccine_tweet.png 2x" width="350"></a><span data-dcnode-id="4054" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4050"><div class="magnify" data-dcnode-id="4052"><a class="internal" data-dcnode-id="4053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ATrump_vaccine_tweet.png" title="Enlarge"></a></div><span data-dcnode-id="4051" instrument_node="">Trump on vaccines, with a frightening response from one of his supporters.</span></div></div></div><span data-dcnode-id="4047" instrument_node="">
</span><p data-dcnode-id="4023"><span data-dcnode-id="4046" instrument_node="">Tom Price served as Trump's Secretary of Health and Human Services.</span><sup class="reference" data-dcnode-id="4043" id="cite_ref-168"><a data-dcnode-id="4044" href="#cite_note-168"><span data-dcnode-id="4045" instrument_node="">[168]</span></a></sup><span data-dcnode-id="4042" instrument_node=""> Price resigned after multiple scandals involving his use of private planes (paid for by you) and military aircraft for government-related travel.</span><sup class="reference" data-dcnode-id="4039" id="cite_ref-169"><a data-dcnode-id="4040" href="#cite_note-169"><span data-dcnode-id="4041" instrument_node="">[169]</span></a></sup><span data-dcnode-id="4038" instrument_node=""> Trump seems to be bedding down with the </span><a class="mw-redirect" data-dcnode-id="4036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Vaccine_hysteria" title="Vaccine hysteria"><span data-dcnode-id="4037" instrument_node="">opponents of vaccination</span></a><span data-dcnode-id="4035" instrument_node="">,</span><sup class="reference" data-dcnode-id="4032" id="cite_ref-170"><a data-dcnode-id="4033" href="#cite_note-170"><span data-dcnode-id="4034" instrument_node="">[170]</span></a></sup><span data-dcnode-id="4031" instrument_node=""> and has previously tweeted on the subject on multiple occasions.</span><sup class="reference" data-dcnode-id="4028" id="cite_ref-171"><a data-dcnode-id="4029" href="#cite_note-171"><span data-dcnode-id="4030" instrument_node="">[171]</span></a></sup><sup class="reference" data-dcnode-id="4025" id="cite_ref-172"><a data-dcnode-id="4026" href="#cite_note-172"><span data-dcnode-id="4027" instrument_node="">[172]</span></a></sup><span data-dcnode-id="4024" instrument_node="">
</span></p><p data-dcnode-id="4011"><span data-dcnode-id="4022" instrument_node="">Organizations providing health care in the </span><a data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Third_World" title="Third World"><span data-dcnode-id="4021" instrument_node="">Third World</span></a><span data-dcnode-id="4019" instrument_node=""> that receive United States funding are forbidden from giving </span><a data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Abortion" title="Abortion"><span data-dcnode-id="4018" instrument_node="">abortion</span></a><span data-dcnode-id="4016" instrument_node=""> advice regardless of how desperately a woman may need it.</span><sup class="reference" data-dcnode-id="4013" id="cite_ref-173"><a data-dcnode-id="4014" href="#cite_note-173"><span data-dcnode-id="4015" instrument_node="">[173]</span></a></sup><span data-dcnode-id="4012" instrument_node=""> Other Republican presidents also did this.
</span></p><p data-dcnode-id="3992"><a class="mw-redirect" data-dcnode-id="4009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Family_planning" title="Family planning"><span data-dcnode-id="4010" instrument_node="">Family planning</span></a><span data-dcnode-id="4008" instrument_node=""> help will also be made more difficult which will likely increase legal and illegal abortions.</span><sup class="reference" data-dcnode-id="4005" id="cite_ref-174"><a data-dcnode-id="4006" href="#cite_note-174"><span data-dcnode-id="4007" instrument_node="">[174]</span></a></sup><span data-dcnode-id="4004" instrument_node=""> Trump took this further than other Republican presidents, extending the ban to all organizations that get US aid and even </span><a data-dcnode-id="4002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Bill_Gates" title="Bill Gates"><span data-dcnode-id="4003" instrument_node="">Bill Gates</span></a><span data-dcnode-id="4001" instrument_node=""> has expressed concern.</span><sup class="reference" data-dcnode-id="3998" id="cite_ref-175"><a data-dcnode-id="3999" href="#cite_note-175"><span data-dcnode-id="4000" instrument_node="">[175]</span></a></sup><span data-dcnode-id="3997" instrument_node=""> Many European nations are providing funds to plug the gap the United States left.</span><sup class="reference" data-dcnode-id="3994" id="cite_ref-176"><a data-dcnode-id="3995" href="#cite_note-176"><span data-dcnode-id="3996" instrument_node="">[176]</span></a></sup><span data-dcnode-id="3993" instrument_node="">
</span></p><p data-dcnode-id="3980"><span data-dcnode-id="3991" instrument_node="">During his election campaign, Trump said, "We're going to repeal and replace </span><a class="mw-redirect" data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Obamacare" title="Obamacare"><span data-dcnode-id="3990" instrument_node="">Obamacare</span></a><span data-dcnode-id="3988" instrument_node="">, and </span><i data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">it's going to be so easy</span></i><span data-dcnode-id="3985" instrument_node="">." On 27 February 2017, having looked into the matter, he said, "Nobody knew health care could be so complicated."</span><sup class="reference" data-dcnode-id="3982" id="cite_ref-177"><a data-dcnode-id="3983" href="#cite_note-177"><span data-dcnode-id="3984" instrument_node="">[177]</span></a></sup><span data-dcnode-id="3981" instrument_node="">
</span></p><p data-dcnode-id="3967"><span data-dcnode-id="3979" instrument_node="">A new health bill was written which will likely leave an estimated 14 million now covered by Obamacare may to lose insurance, rising to 24 million later, and those would be mostly poor and elderly. The bill was yanked on 24 March 2017 when it became clear that the House would not pass it.</span><sup class="reference" data-dcnode-id="3976" id="cite_ref-178"><a data-dcnode-id="3977" href="#cite_note-178"><span data-dcnode-id="3978" instrument_node="">[178]</span></a></sup><sup class="reference" data-dcnode-id="3973" id="cite_ref-179"><a data-dcnode-id="3974" href="#cite_note-179"><span data-dcnode-id="3975" instrument_node="">[179]</span></a></sup><span data-dcnode-id="3972" instrument_node=""> A similar bill proposed later failed to pass the Senate.</span><sup class="reference" data-dcnode-id="3969" id="cite_ref-180"><a data-dcnode-id="3970" href="#cite_note-180"><span data-dcnode-id="3971" instrument_node="">[180]</span></a></sup><span data-dcnode-id="3968" instrument_node=""> Trump has not been able to replace Obamacare with a viable alternative.
</span></p><p data-dcnode-id="3958"><span data-dcnode-id="3966" instrument_node="">One of his latest moves is to draft a rule aimed at eliminating a federal rule requiring employers to cover contraception in their insurance plans for women at no additional costs. Under Obamacare, contraception is considered an essential preventative health service. Affordable birth control has not only saved women a substantial amount of money but also caused abortions rates to plummet to levels that are the lowest since the procedure became legal in 1973.</span><sup class="reference" data-dcnode-id="3963" id="cite_ref-181"><a data-dcnode-id="3964" href="#cite_note-181"><span data-dcnode-id="3965" instrument_node="">[181]</span></a></sup><sup class="reference" data-dcnode-id="3960" id="cite_ref-182"><a data-dcnode-id="3961" href="#cite_note-182"><span data-dcnode-id="3962" instrument_node="">[182]</span></a></sup><span data-dcnode-id="3959" instrument_node="">
</span></p><p data-dcnode-id="3952"><span data-dcnode-id="3957" instrument_node="">But Trump still has the power of the executive, and used it to slash the advertising and promotional budget for the ACA by 90%. Enrollment programs meant to help people sign up also face a nearly 40% cut. This prevents any new sign-ups for the ACA and deprives millions of potential coverage since they could lose their jobs and thus become eligible for coverage under the ACA, but would never know they could sign up, leaving them to wither on the vine.</span><sup class="reference" data-dcnode-id="3954" id="cite_ref-183"><a data-dcnode-id="3955" href="#cite_note-183"><span data-dcnode-id="3956" instrument_node="">[183]</span></a></sup><span data-dcnode-id="3953" instrument_node="">
</span></p><p data-dcnode-id="3946"><span data-dcnode-id="3951" instrument_node="">Trump and the Republicans allowed CHIP, a Clinton-era insurance program for lower-income children, to expire, meaning within a year, if it is not renewed, 9 million children will lose their insurance and be left to die.</span><sup class="reference" data-dcnode-id="3948" id="cite_ref-184"><a data-dcnode-id="3949" href="#cite_note-184"><span data-dcnode-id="3950" instrument_node="">[184]</span></a></sup><span data-dcnode-id="3947" instrument_node="">
</span></p><p data-dcnode-id="3932"><span data-dcnode-id="3945" instrument_node="">On October 2017, he signed an executive order that removed Obamacare subsidies to the poor and lower class.</span><sup class="reference" data-dcnode-id="3942" id="cite_ref-185"><a data-dcnode-id="3943" href="#cite_note-185"><span data-dcnode-id="3944" instrument_node="">[185]</span></a></sup><span data-dcnode-id="3941" instrument_node=""> This threatens to blow up the entire ACA, and it's flung the healthcare market into a semi-panic.</span><sup class="reference" data-dcnode-id="3938" id="cite_ref-186"><a data-dcnode-id="3939" href="#cite_note-186"><span data-dcnode-id="3940" instrument_node="">[186]</span></a></sup><span data-dcnode-id="3937" instrument_node=""> Healthier people pay less while sicker people pay more, leading to less coverage overall.</span><sup class="reference" data-dcnode-id="3934" id="cite_ref-187"><a data-dcnode-id="3935" href="#cite_note-187"><span data-dcnode-id="3936" instrument_node="">[187]</span></a></sup><span data-dcnode-id="3933" instrument_node="">
</span></p><p data-dcnode-id="3926"><span data-dcnode-id="3931" instrument_node="">Trump used the IRS as a cudgel against the poor, by having them declare they will not accept electronic tax returns, and will suspend paper returns that do not disclose whether the filer had health insurance coverage during the year. The penalty for not having some form of health coverage in 2017 is the higher of 2.5 percent of household income or $695 per adult.</span><sup class="reference" data-dcnode-id="3928" id="cite_ref-188"><a data-dcnode-id="3929" href="#cite_note-188"><span data-dcnode-id="3930" instrument_node="">[188]</span></a></sup><span data-dcnode-id="3927" instrument_node="">
</span></p><p data-dcnode-id="3920"><span data-dcnode-id="3925" instrument_node="">Donald Trump is well aware of the fact that American patients are subsidizing the affordable healthcare enjoy by the citizens of many other countries, calling it "global freeloading". With this in mind, many Congressional representatives dared him to support their legislative proposal to cut prescription drug prices in the United States by (1) encouraging competition between generic drugs and brand-name drugs, (2) allowing Medicare to negotiate prices directly with pharmaceutical companies, and (3) enabling patients to import drugs from Canada, where prices are lower. Prices are deemed "excessive" if they are higher than the median in Canada, the United Kingdom, Germany, France and Japan. There has been no immediate response from the White House.</span><sup class="reference" data-dcnode-id="3922" id="cite_ref-189"><a data-dcnode-id="3923" href="#cite_note-189"><span data-dcnode-id="3924" instrument_node="">[189]</span></a></sup><span data-dcnode-id="3921" instrument_node="">
</span></p><span data-dcnode-id="3919" instrument_node="">
</span><h3 data-dcnode-id="3909"><span class="mw-headline" data-dcnode-id="3917" id="Nutrition"><span data-dcnode-id="3918" instrument_node="">Nutrition</span></span><span class="mw-editsection" data-dcnode-id="3910"><span class="mw-editsection-bracket" data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">[</span></span><a data-dcnode-id="3913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D25" title="Edit section: Nutrition"><span data-dcnode-id="3914" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3908" instrument_node="">
</span><p data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">Regulations requiring schools to provide children with healthier food have been rolled back. Regulations requiring food manufacturers to to tell customers what is in the food they buy have also been rolled back.
</span></p><span data-dcnode-id="3905" instrument_node="">
</span><span data-dcnode-id="3904" instrument_node="">
</span><span data-dcnode-id="3903" instrument_node="">
</span><span data-dcnode-id="3893" instrument_node="">
</span><span data-dcnode-id="3892" instrument_node="">
</span><table class="cquote" data-dcnode-id="3879" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="3880"><tr data-dcnode-id="3894"><td data-dcnode-id="3895"><div data-dcnode-id="3897" style="padding:4px 50px;position:relative;"><span data-dcnode-id="3901" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="3902" instrument_node="">“</span></span><span data-dcnode-id="3899" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="3900" instrument_node="">”</span></span><span data-dcnode-id="3898" instrument_node="">This is where you really have to look at motives, you know. You have to stop and think: why don't you want our kids to have good food at school? What is wrong with you? … We need to look our neighbours in the eye and kind of go: 'What is going on?' Because this just isn’t that complicated, you know. Just tell me what's in my food. Why is that a problem? So you have to ask yourself, what’s going on, because I don’t get it. I don’t understand it.</span></div><span data-dcnode-id="3896" instrument_node="">
</span></td></tr><tr data-dcnode-id="3881"><td data-dcnode-id="3882" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="3891" instrument_node=""> </span><cite data-dcnode-id="3884" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="3890" instrument_node="">—</span><a class="mw-redirect" data-dcnode-id="3888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Michelle_Obama" title="Michelle Obama"><span data-dcnode-id="3889" instrument_node="">Michelle Obama</span></a><sup class="reference" data-dcnode-id="3885" id="cite_ref-190"><a data-dcnode-id="3886" href="#cite_note-190"><span data-dcnode-id="3887" instrument_node="">[190]</span></a></sup></cite><span data-dcnode-id="3883" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="3878" instrument_node="">
</span><h3 data-dcnode-id="3868"><span class="mw-headline" data-dcnode-id="3876" id="Cutting_Medicaid"><span data-dcnode-id="3877" instrument_node="">Cutting Medicaid</span></span><span class="mw-editsection" data-dcnode-id="3869"><span class="mw-editsection-bracket" data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">[</span></span><a data-dcnode-id="3872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D26" title="Edit section: Cutting Medicaid"><span data-dcnode-id="3873" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3867" instrument_node="">
</span><p data-dcnode-id="3861"><span data-dcnode-id="3866" instrument_node="">Trump's administration laid out a guideline that allows states to adopt work requirements for eligibility in Medicaid, which would purge at least several thousand people from coverage as they suffer through extreme poverty. Kentucky will immediately require people to fulfill at least 80 hours per month of work, job-preparation or other community engagement. In Indiana, the required hours will be phased in over 1½ years, eventually reaching 20 per week.</span><sup class="reference" data-dcnode-id="3863" id="cite_ref-191"><a data-dcnode-id="3864" href="#cite_note-191"><span data-dcnode-id="3865" instrument_node="">[191]</span></a></sup><span data-dcnode-id="3862" instrument_node="">
</span></p><span data-dcnode-id="3860" instrument_node="">
</span><h2 data-dcnode-id="3850"><span class="mw-headline" data-dcnode-id="3858" id="Immigrants_and_refugees"><span data-dcnode-id="3859" instrument_node="">Immigrants and refugees</span></span><span class="mw-editsection" data-dcnode-id="3851"><span class="mw-editsection-bracket" data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">[</span></span><a data-dcnode-id="3854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D27" title="Edit section: Immigrants and refugees"><span data-dcnode-id="3855" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3826"><span data-dcnode-id="3848" instrument_node="">President Obama issued the DACA ruling, an executive order preventing young immigrants from facing deportation. Like everything else Obama has done, Trump does hate it instinctually, and in spite of businesses pleading him to do the opposite, he ended DACA.</span><sup class="reference" data-dcnode-id="3845" id="cite_ref-192"><a data-dcnode-id="3846" href="#cite_note-192"><span data-dcnode-id="3847" instrument_node="">[192]</span></a></sup><span data-dcnode-id="3844" instrument_node=""> Dreamers trusted the government with their information so they could qualify for DACA; without it, the government under Trump will use DACA as a database for deportations.</span><sup class="reference" data-dcnode-id="3841" id="cite_ref-193"><a data-dcnode-id="3842" href="#cite_note-193"><span data-dcnode-id="3843" instrument_node="">[193]</span></a></sup><sup class="reference" data-dcnode-id="3838" id="cite_ref-194"><a data-dcnode-id="3839" href="#cite_note-194"><span data-dcnode-id="3840" instrument_node="">[194]</span></a></sup><span data-dcnode-id="3837" instrument_node=""> In June 2020, the </span><a class="mw-redirect" data-dcnode-id="3835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Supreme_Court" title="Supreme Court"><span data-dcnode-id="3836" instrument_node="">Supreme Court</span></a><span data-dcnode-id="3834" instrument_node=""> ruled in a 5-4 opinion under Chief Justice John Roberts that the Trump administration's rationale for rescinding DACA was "</span><a data-dcnode-id="3832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Bullshit" title="Bullshit"><span data-dcnode-id="3833" instrument_node="">arbitrary and capricious</span></a><span data-dcnode-id="3831" instrument_node="">".</span><sup class="reference" data-dcnode-id="3828" id="cite_ref-195"><a data-dcnode-id="3829" href="#cite_note-195"><span data-dcnode-id="3830" instrument_node="">[195]</span></a></sup><span data-dcnode-id="3827" instrument_node=""> Time will only tell if the Trump administration can come up with another reason to rescind it other than "Obamadidit" before election day.
</span></p><p data-dcnode-id="3820"><span data-dcnode-id="3825" instrument_node="">Trump officials rejected a study by the Department of Health and Human Services saying refugees are good for the economy.</span><sup class="reference" data-dcnode-id="3822" id="cite_ref-196"><a data-dcnode-id="3823" href="#cite_note-196"><span data-dcnode-id="3824" instrument_node="">[196]</span></a></sup><span data-dcnode-id="3821" instrument_node="">
</span></p><p data-dcnode-id="3814"><span data-dcnode-id="3819" instrument_node="">Texas-based judges sympathetic to Trump allowed the state to crackdown on immigration by forcing all municipalities to comply with ICE's detainment policies, allowing police officers to check the immigration status of anyone they stop for any reason, and to even arrest local and state officials who refuse to comply.</span><sup class="reference" data-dcnode-id="3816" id="cite_ref-197"><a data-dcnode-id="3817" href="#cite_note-197"><span data-dcnode-id="3818" instrument_node="">[197]</span></a></sup><span data-dcnode-id="3815" instrument_node="">
</span></p><p data-dcnode-id="3802"><span data-dcnode-id="3813" instrument_node="">One particularly dark example of how important rhetoric can affect a country, Trump threatened to remove refugee protections for </span><a data-dcnode-id="3811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Haiti" title="Haiti"><span data-dcnode-id="3812" instrument_node="">Haitian</span></a><span data-dcnode-id="3810" instrument_node=""> refugees. Terrified, the creole-speaking Haitian refugees went to </span><a data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Canada" title="Canada"><span data-dcnode-id="3809" instrument_node="">Canada</span></a><span data-dcnode-id="3807" instrument_node="">, causing a refugee crisis in Quebec just from a throwaway anti-migrant threat from the President. Anti-refugee sentiment has grown in Quebec almost immediately.</span><sup class="reference" data-dcnode-id="3804" id="cite_ref-198"><a data-dcnode-id="3805" href="#cite_note-198"><span data-dcnode-id="3806" instrument_node="">[198]</span></a></sup><span data-dcnode-id="3803" instrument_node="">
