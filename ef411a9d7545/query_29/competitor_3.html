</span></p><p data-dcnode-id="3790"><span data-dcnode-id="3801" instrument_node="">In January 8, 2018, Trump stripped over 200,000 El Salvadorian immigrants of their legal protections and deported them back to a country ravaged by a drug war that's killed thousands. These were all home-owning, taxpaying members of society for nearly twenty years.</span><sup class="reference" data-dcnode-id="3798" id="cite_ref-199"><a data-dcnode-id="3799" href="#cite_note-199"><span data-dcnode-id="3800" instrument_node="">[199]</span></a></sup><sup class="reference" data-dcnode-id="3795" id="cite_ref-200"><a data-dcnode-id="3796" href="#cite_note-200"><span data-dcnode-id="3797" instrument_node="">[200]</span></a></sup><sup class="reference" data-dcnode-id="3792" id="cite_ref-201"><a data-dcnode-id="3793" href="#cite_note-201"><span data-dcnode-id="3794" instrument_node="">[201]</span></a></sup><span data-dcnode-id="3791" instrument_node="">
</span></p><p data-dcnode-id="3781"><span data-dcnode-id="3789" instrument_node="">In February 2018, the </span><a class="mw-redirect" data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Supreme_Court" title="Supreme Court"><span data-dcnode-id="3788" instrument_node="">Supreme Court</span></a><span data-dcnode-id="3786" instrument_node=""> ruled that the White House (read: Trump administration) has the power to detain immigrants, including legal immigrants, indefinitely without a hearing.</span><sup class="reference" data-dcnode-id="3783" id="cite_ref-202"><a data-dcnode-id="3784" href="#cite_note-202"><span data-dcnode-id="3785" instrument_node="">[202]</span></a></sup><span data-dcnode-id="3782" instrument_node="">
</span></p><p data-dcnode-id="3765"><span data-dcnode-id="3780" instrument_node="">Part campaign stunt to influence the November 2018 election</span><sup class="reference" data-dcnode-id="3777" id="cite_ref-203"><a data-dcnode-id="3778" href="#cite_note-203"><span data-dcnode-id="3779" instrument_node="">[203]</span></a></sup><span data-dcnode-id="3776" instrument_node=""> and part lowering the bar of reprehensible behavior, Trump decided to authorize tear gassing refugees at the US border with Mexico, including young children in diapers. This was apparently humane treatment by Trumpian standards because Trump also authorized the use of lethal force by border guards if they in any way felt threatened.</span><sup class="reference" data-dcnode-id="3773" id="cite_ref-204"><a data-dcnode-id="3774" href="#cite_note-204"><span data-dcnode-id="3775" instrument_node="">[204]</span></a></sup><sup class="reference" data-dcnode-id="3770" id="cite_ref-205"><a data-dcnode-id="3771" href="#cite_note-205"><span data-dcnode-id="3772" instrument_node="">[205]</span></a></sup><sup class="reference" data-dcnode-id="3767" id="cite_ref-206"><a data-dcnode-id="3768" href="#cite_note-206"><span data-dcnode-id="3769" instrument_node="">[206]</span></a></sup><span data-dcnode-id="3766" instrument_node="">
</span></p><span data-dcnode-id="3764" instrument_node="">
</span><h3 data-dcnode-id="3754"><span class="mw-headline" data-dcnode-id="3762" id="Stripping_people_of_their_citizenship"><span data-dcnode-id="3763" instrument_node="">Stripping people of their citizenship</span></span><span class="mw-editsection" data-dcnode-id="3755"><span class="mw-editsection-bracket" data-dcnode-id="3760"><span data-dcnode-id="3761" instrument_node="">[</span></span><a data-dcnode-id="3758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D28" title="Edit section: Stripping people of their citizenship"><span data-dcnode-id="3759" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3753" instrument_node="">
</span><p data-dcnode-id="3737"><span data-dcnode-id="3752" instrument_node="">Trump's administration laid out a plan for Americans to identify all people who are suspected of "cheating" the naturalization process and strip them of their citizenship.</span><sup class="reference" data-dcnode-id="3749" id="cite_ref-207"><a data-dcnode-id="3750" href="#cite_note-207"><span data-dcnode-id="3751" instrument_node="">[207]</span></a></sup><span data-dcnode-id="3748" instrument_node=""> Buoyed by Stephen Miller, the Trump administration is now considering barring immigrants living </span><i data-dcnode-id="3746"><span data-dcnode-id="3747" instrument_node="">legally</span></i><span data-dcnode-id="3745" instrument_node=""> in the U.S. from receiving green cards/citizenship if </span><i data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">anyone in their household</span></i><span data-dcnode-id="3742" instrument_node="">, including native-born children with US citizenship, has ever used Obamacare, CHIP, food stamps or any other welfare program.</span><sup class="reference" data-dcnode-id="3739" id="cite_ref-208"><a data-dcnode-id="3740" href="#cite_note-208"><span data-dcnode-id="3741" instrument_node="">[208]</span></a></sup><span data-dcnode-id="3738" instrument_node="">
</span></p><p data-dcnode-id="3731"><span data-dcnode-id="3736" instrument_node="">By late August 2018, the Trump administration began denying passports to American citizens, namely those with Hispanic heritage, at the Mexican border, simply because the Justice Department "does not believe" they are citizens despite evidence pointing otherwise. This is a callback to Trump's own birtherism regarding President Obama, and now he's accusing any Latino American near the border of using fraudulent birth certificates since they were babies. In some cases, "passport applicants with official U.S. birth certificates" are "being jailed in immigration detention centers" and "entered into deportation proceedings." In others, "they are stuck in Mexico, their passports suddenly revoked when they tried to reenter the United States."</span><sup class="reference" data-dcnode-id="3733" id="cite_ref-sieff_209-0"><a data-dcnode-id="3734" href="#cite_note-sieff-209"><span data-dcnode-id="3735" instrument_node="">[209]</span></a></sup><span data-dcnode-id="3732" instrument_node="">
</span></p><p data-dcnode-id="3699"><span data-dcnode-id="3730" instrument_node="">This policy actually began during the </span><a data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="3729" instrument_node="">George W. Bush</span></a><span data-dcnode-id="3727" instrument_node=""> administration and continued through the Obama administration.</span><sup class="reference" data-dcnode-id="3724" id="cite_ref-sieff_209-1"><a data-dcnode-id="3725" href="#cite_note-sieff-209"><span data-dcnode-id="3726" instrument_node="">[209]</span></a></sup><span data-dcnode-id="3723" instrument_node=""> The policy was initiated due to a series of court cases where some Texas midwives admitted to fraudulently selling birth certificates,</span><sup class="reference" data-dcnode-id="3720" id="cite_ref-210"><a data-dcnode-id="3721" href="#cite_note-210"><span data-dcnode-id="3722" instrument_node="">[210]</span></a></sup><span data-dcnode-id="3719" instrument_node=""> but the extent of this practice was never clarified.</span><sup class="reference" data-dcnode-id="3716" id="cite_ref-sieff_209-2"><a data-dcnode-id="3717" href="#cite_note-sieff-209"><span data-dcnode-id="3718" instrument_node="">[209]</span></a></sup><span data-dcnode-id="3715" instrument_node=""> A 2009 lawsuit by the ACLU mostly put a stop to the practice of this type of citizenship denial during the Obama administration.</span><sup class="reference" data-dcnode-id="3712" id="cite_ref-sieff_209-3"><a data-dcnode-id="3713" href="#cite_note-sieff-209"><span data-dcnode-id="3714" instrument_node="">[209]</span></a></sup><sup class="reference" data-dcnode-id="3709" id="cite_ref-211"><a data-dcnode-id="3710" href="#cite_note-211"><span data-dcnode-id="3711" instrument_node="">[211]</span></a></sup><span data-dcnode-id="3708" instrument_node=""> but the Trump administration seems to have greatly increased the denials,</span><sup class="reference" data-dcnode-id="3705" id="cite_ref-sieff_209-4"><a data-dcnode-id="3706" href="#cite_note-sieff-209"><span data-dcnode-id="3707" instrument_node="">[209]</span></a></sup><span data-dcnode-id="3704" instrument_node=""> possibly in violation of the State Department's agreement with the ACLU. Trump, essentially, is ignoring judicial precedent so he could put his old birtherism into policy.</span><sup class="reference" data-dcnode-id="3701" id="cite_ref-212"><a data-dcnode-id="3702" href="#cite_note-212"><span data-dcnode-id="3703" instrument_node="">[212]</span></a></sup><span data-dcnode-id="3700" instrument_node="">
</span></p><p data-dcnode-id="3693"><span data-dcnode-id="3698" instrument_node="">So how far has Trump taken it? People who have birth certificates showing they were born in the United States are being actively targeted. “Hundreds, even thousands” of Latinos born near the US-Mexico border are being told that their birth certificates aren’t sufficient proof of US citizenship to get their passports approved or renewed.</span><sup class="reference" data-dcnode-id="3695" id="cite_ref-213"><a data-dcnode-id="3696" href="#cite_note-213"><span data-dcnode-id="3697" instrument_node="">[213]</span></a></sup><span data-dcnode-id="3694" instrument_node="">
</span></p><p data-dcnode-id="3687"><span data-dcnode-id="3692" instrument_node="">This started influencing even the halls of Wall Street. Bank of America began freezing accounts of customers they suspect are not US citizens.</span><sup class="reference" data-dcnode-id="3689" id="cite_ref-214"><a data-dcnode-id="3690" href="#cite_note-214"><span data-dcnode-id="3691" instrument_node="">[214]</span></a></sup><span data-dcnode-id="3688" instrument_node="">
</span></p><span data-dcnode-id="3686" instrument_node="">
</span><h2 data-dcnode-id="3676"><span class="mw-headline" data-dcnode-id="3684" id="Infrastructure"><span data-dcnode-id="3685" instrument_node="">Infrastructure</span></span><span class="mw-editsection" data-dcnode-id="3677"><span class="mw-editsection-bracket" data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">[</span></span><a data-dcnode-id="3680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D29" title="Edit section: Infrastructure"><span data-dcnode-id="3681" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3675" instrument_node="">
</span><div class="hatnote" data-dcnode-id="3671" role="note"><span data-dcnode-id="3674" instrument_node="">See the main article on this topic: </span><a data-dcnode-id="3672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Infrastructure_policy_of_Donald_Trump" title="Infrastructure policy of Donald Trump"><span data-dcnode-id="3673" instrument_node="">Infrastructure policy of Donald Trump</span></a></div><span data-dcnode-id="3670" instrument_node="">
</span><h2 data-dcnode-id="3660"><span class="mw-headline" data-dcnode-id="3668" id="National_security"><span data-dcnode-id="3669" instrument_node="">National security</span></span><span class="mw-editsection" data-dcnode-id="3661"><span class="mw-editsection-bracket" data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">[</span></span><a data-dcnode-id="3664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D30" title="Edit section: National security"><span data-dcnode-id="3665" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3659" instrument_node="">
</span><p data-dcnode-id="3647"><a data-dcnode-id="3657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Monica_Crowley" title="Monica Crowley"><span data-dcnode-id="3658" instrument_node="">Monica Crowley</span></a><span data-dcnode-id="3656" instrument_node=""> who had a national security communications role under Trump has been accused of serial plagiarism</span><sup class="reference" data-dcnode-id="3653" id="cite_ref-215"><a data-dcnode-id="3654" href="#cite_note-215"><span data-dcnode-id="3655" instrument_node="">[215]</span></a></sup><span data-dcnode-id="3652" instrument_node=""> and resigned.</span><sup class="reference" data-dcnode-id="3649" id="cite_ref-216"><a data-dcnode-id="3650" href="#cite_note-216"><span data-dcnode-id="3651" instrument_node="">[216]</span></a></sup><span data-dcnode-id="3648" instrument_node="">
</span></p><p data-dcnode-id="3639"><a data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Michael_Flynn" title="Michael Flynn"><span data-dcnode-id="3646" instrument_node="">Michael Flynn</span></a><span data-dcnode-id="3644" instrument_node=""> resigned as security adviser and is considered a security risk.</span><sup class="reference" data-dcnode-id="3641" id="cite_ref-217"><a data-dcnode-id="3642" href="#cite_note-217"><span data-dcnode-id="3643" instrument_node="">[217]</span></a></sup><span data-dcnode-id="3640" instrument_node="">
</span></p><p data-dcnode-id="3630"><span data-dcnode-id="3638" instrument_node="">Trump suggested without evidence that </span><a class="mw-redirect" data-dcnode-id="3636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Obama" title="Obama"><span data-dcnode-id="3637" instrument_node="">Obama</span></a><span data-dcnode-id="3635" instrument_node=""> had ordered surveillance of Trump Tower. As the story lost credibility Trump claimed, again without evidence, that British intelligence was behind the imaginary surveillance. Trump has alienated an ally and damaged United States credibility.</span><sup class="reference" data-dcnode-id="3632" id="cite_ref-218"><a data-dcnode-id="3633" href="#cite_note-218"><span data-dcnode-id="3634" instrument_node="">[218]</span></a></sup><span data-dcnode-id="3631" instrument_node="">
</span></p><span data-dcnode-id="3629" instrument_node="">
</span><h2 data-dcnode-id="3619"><span class="mw-headline" data-dcnode-id="3627" id="Net_neutrality"><span data-dcnode-id="3628" instrument_node="">Net neutrality</span></span><span class="mw-editsection" data-dcnode-id="3620"><span class="mw-editsection-bracket" data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">[</span></span><a data-dcnode-id="3623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D31" title="Edit section: Net neutrality"><span data-dcnode-id="3624" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3618" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3609"><div class="thumbinner" data-dcnode-id="3610" style="width:167px;"><a class="image" data-dcnode-id="3616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AAjit_V._Pai_headshot.jpg"><img alt="" class="thumbimage" data-dcnode-id="3617" height="206" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/70/Ajit_V._Pai_headshot.jpg/165px-Ajit_V._Pai_headshot.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Ajit_V._Pai_headshot.jpg/248px-Ajit_V._Pai_headshot.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/7/70/Ajit_V._Pai_headshot.jpg/330px-Ajit_V._Pai_headshot.jpg 2x" width="165"></a><span data-dcnode-id="3615" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3611"><div class="magnify" data-dcnode-id="3613"><a class="internal" data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3AAjit_V._Pai_headshot.jpg" title="Enlarge"></a></div><span data-dcnode-id="3612" instrument_node="">FCC Chairman Ajit Pai, the deciding vote in the 2017 net neutrality repeal</span></div></div></div><span data-dcnode-id="3608" instrument_node="">
</span><div class="hatnote" data-dcnode-id="3604" role="note"><span data-dcnode-id="3607" instrument_node="">See the main article on this topic: </span><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Net_neutrality" title="Net neutrality"><span data-dcnode-id="3606" instrument_node="">Net neutrality</span></a></div><span data-dcnode-id="3603" instrument_node="">
</span><p data-dcnode-id="3587"><span data-dcnode-id="3602" instrument_node="">He appointed </span><a data-dcnode-id="3600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ajit_Pai" title="Ajit Pai"><span data-dcnode-id="3601" instrument_node="">Ajit Pai</span></a><span data-dcnode-id="3599" instrument_node="">, an ardent ideological opponent of net neutrality, to be the chairman of the FCC. As Chairman, Pai has steadily taken steps towards removing all of the gains taken by his predecessor, Tom Wheeler, in anticipation of weakening and finally abolishing net neutrality. This includes halting broadband subsidies to the poor, delaying enactment of </span><a data-dcnode-id="3597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Privacy" title="Privacy"><span data-dcnode-id="3598" instrument_node="">privacy</span></a><span data-dcnode-id="3596" instrument_node=""> laws, ending investigations on regulations violations, and allowing ISPs to bypass current net neutrality rules.</span><sup class="reference" data-dcnode-id="3593" id="cite_ref-219"><a data-dcnode-id="3594" href="#cite_note-219"><span data-dcnode-id="3595" instrument_node="">[219]</span></a></sup><span data-dcnode-id="3592" instrument_node=""> Pai is accomplishing this by utilizing "delegated authority," a pseudo-executive claim of power to "act without public input, hearings, or votes by the full commission" to enact his anti-net neutrality agenda. In one case, they killed the FCC’s guidance to broadcasters on “shared service” agreements, allowing media companies to operate two or more stations in markets where there is supposed to be competition. In a second case, Pai pulled the FCC’s set-top-box proceeding, which would have brought competition to the cable market by enabling independent manufacturers to sell the set-top boxes that otherwise are provided by cable companies. This allowance of "cross-ownership" threatens to pave the way for ISPs to merge into even larger monopolies than ever before, effectively privatizing internet service, let alone the viewing of content within the internet. Pai also withdrew a requirement that helped the FCC monitor the diversity of media ownership, and he rescinded orders that made it easier for the FCC to sanction broadcasters that violate the agency’s political-advertising disclosure rules.</span><sup class="reference" data-dcnode-id="3589" id="cite_ref-220"><a data-dcnode-id="3590" href="#cite_note-220"><span data-dcnode-id="3591" instrument_node="">[220]</span></a></sup><span data-dcnode-id="3588" instrument_node="">
</span></p><p data-dcnode-id="3581"><span data-dcnode-id="3586" instrument_node="">The FCC approved a plan to deregulate the $45 billion market for business-to-business broadband, the Business Data Services (BDS), by "eliminating price caps that make internet access more affordable for thousands of small businesses, schools, libraries and hospitals." The price caps, "which have been in place for years, are designed to protect small businesses and other community institutions from predatory behavior by monopoly broadband providers like AT&amp;T and Verizon."</span><sup class="reference" data-dcnode-id="3583" id="cite_ref-221"><a data-dcnode-id="3584" href="#cite_note-221"><span data-dcnode-id="3585" instrument_node="">[221]</span></a></sup><span data-dcnode-id="3582" instrument_node="">
</span></p><span data-dcnode-id="3580" instrument_node="">
</span><h3 data-dcnode-id="3570"><span class="mw-headline" data-dcnode-id="3578" id="Facilitating_propaganda"><span data-dcnode-id="3579" instrument_node="">Facilitating propaganda</span></span><span class="mw-editsection" data-dcnode-id="3571"><span class="mw-editsection-bracket" data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">[</span></span><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D32" title="Edit section: Facilitating propaganda"><span data-dcnode-id="3575" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3572"><span data-dcnode-id="3573" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3569" instrument_node="">
</span><p data-dcnode-id="3554"><span data-dcnode-id="3568" instrument_node="">If you want an idea of what happens without net neutrality, look at </span><a class="mw-redirect" data-dcnode-id="3566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Sinclair_Broadcast_Group" title="Sinclair Broadcast Group"><span data-dcnode-id="3567" instrument_node="">Sinclair Broadcast Group</span></a><span data-dcnode-id="3565" instrument_node="">. Trump's FCC allowed Sinclair to expand its reach to 72% of all US households, especially in the Rust Belt and </span><a class="mw-redirect" data-dcnode-id="3563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Deep_South" title="Deep South"><span data-dcnode-id="3564" instrument_node="">Deep South</span></a><span data-dcnode-id="3562" instrument_node="">. Critics have called Sinclair a TV version of Breitbart. This is cable, a fate that will befall the internet without net neutrality.</span><sup class="reference" data-dcnode-id="3559" id="cite_ref-222"><a data-dcnode-id="3560" href="#cite_note-222"><span data-dcnode-id="3561" instrument_node="">[222]</span></a></sup><sup class="reference" data-dcnode-id="3556" id="cite_ref-223"><a data-dcnode-id="3557" href="#cite_note-223"><span data-dcnode-id="3558" instrument_node="">[223]</span></a></sup><span data-dcnode-id="3555" instrument_node="">
</span></p><span data-dcnode-id="3553" instrument_node="">
</span><h3 data-dcnode-id="3543"><span class="mw-headline" data-dcnode-id="3551" id="Repeal"><span data-dcnode-id="3552" instrument_node="">Repeal</span></span><span class="mw-editsection" data-dcnode-id="3544"><span class="mw-editsection-bracket" data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">[</span></span><a data-dcnode-id="3547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D33" title="Edit section: Repeal"><span data-dcnode-id="3548" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3542" instrument_node="">
</span><p data-dcnode-id="3536"><span data-dcnode-id="3541" instrument_node="">The FCC voted 3-2 to repeal net neutrality, block states from passing net neutrality, allow ISPs to slow down sites they don't like for a fee, and prevent a future FCC from restoring net neutrality. Elections have consequences.</span><sup class="reference" data-dcnode-id="3538" id="cite_ref-224"><a data-dcnode-id="3539" href="#cite_note-224"><span data-dcnode-id="3540" instrument_node="">[224]</span></a></sup><span data-dcnode-id="3537" instrument_node="">
</span></p><span data-dcnode-id="3535" instrument_node="">
</span><h2 data-dcnode-id="3525"><span class="mw-headline" data-dcnode-id="3533" id="Research"><span data-dcnode-id="3534" instrument_node="">Research</span></span><span class="mw-editsection" data-dcnode-id="3526"><span class="mw-editsection-bracket" data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">[</span></span><a data-dcnode-id="3529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D34" title="Edit section: Research"><span data-dcnode-id="3530" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3527"><span data-dcnode-id="3528" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3524" instrument_node="">
</span><p data-dcnode-id="3512"><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/PZ_Myers" title="PZ Myers"><span data-dcnode-id="3523" instrument_node="">PZ Myers</span></a><span data-dcnode-id="3521" instrument_node=""> fears Trump plans to end the United States' role as a major researching nation. American scientists, along with others across the world, held protest marches against Trump cutting research funding.</span><sup class="reference" data-dcnode-id="3518" id="cite_ref-225"><a data-dcnode-id="3519" href="#cite_note-225"><span data-dcnode-id="3520" instrument_node="">[225]</span></a></sup><span data-dcnode-id="3517" instrument_node=""> Budget cuts are harming universities and harming science.</span><sup class="reference" data-dcnode-id="3514" id="cite_ref-226"><a data-dcnode-id="3515" href="#cite_note-226"><span data-dcnode-id="3516" instrument_node="">[226]</span></a></sup><span data-dcnode-id="3513" instrument_node="">
</span></p><p data-dcnode-id="3506"><span data-dcnode-id="3511" instrument_node="">Under Trump, scientific data must be vetted by politicians before publication. It is feared inconvenient scientific data, notably data showing global warming is real, may be suppressed. This applies as of late January and early February 2017 but the future is unclear.</span><sup class="reference" data-dcnode-id="3508" id="cite_ref-227"><a data-dcnode-id="3509" href="#cite_note-227"><span data-dcnode-id="3510" instrument_node="">[227]</span></a></sup><span data-dcnode-id="3507" instrument_node="">
</span></p><span data-dcnode-id="3505" instrument_node="">
