</span><p data-dcnode-id="5832"><span data-dcnode-id="5894" instrument_node="">The </span><b data-dcnode-id="5892"><span data-dcnode-id="5893" instrument_node="">policies of Donald Trump</span></b><span data-dcnode-id="5891" instrument_node=""> are epitome of the logical extreme of a decades-long lurch to the </span><a class="mw-redirect" data-dcnode-id="5889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Right_wing" title="Right wing"><span data-dcnode-id="5890" instrument_node="">right wing</span></a><span data-dcnode-id="5888" instrument_node="">, starting from the </span><a class="mw-redirect" data-dcnode-id="5886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Southern_Strategy" title="Southern Strategy"><span data-dcnode-id="5887" instrument_node="">Southern Strategy</span></a><span data-dcnode-id="5885" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="5883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Richard_M._Nixon" title="Richard M. Nixon"><span data-dcnode-id="5884" instrument_node="">Nixon</span></a><span data-dcnode-id="5882" instrument_node=""> years, if not even earlier with the </span><a class="mw-redirect" data-dcnode-id="5880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Red_Scare" title="Red Scare"><span data-dcnode-id="5881" instrument_node="">Red Scare</span></a><span data-dcnode-id="5879" instrument_node=""> and </span><a data-dcnode-id="5877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Joseph_McCarthy" title="Joseph McCarthy"><span data-dcnode-id="5878" instrument_node="">McCarthyism</span></a><span data-dcnode-id="5876" instrument_node="">, or perhaps earlier than that with </span><a data-dcnode-id="5874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Andrew_Jackson" title="Andrew Jackson"><span data-dcnode-id="5875" instrument_node="">Andrew Jackson</span></a><span data-dcnode-id="5873" instrument_node="">'s </span><a data-dcnode-id="5871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Xenophobia" title="Xenophobia"><span data-dcnode-id="5872" instrument_node="">xenophobia</span></a><span data-dcnode-id="5870" instrument_node=""> and </span><a data-dcnode-id="5868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Authoritarianism" title="Authoritarianism"><span data-dcnode-id="5869" instrument_node="">authoritarianism</span></a><span data-dcnode-id="5867" instrument_node="">, with several real parallels to </span><a class="mw-redirect" data-dcnode-id="5865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Fascist" title="Fascist"><span data-dcnode-id="5866" instrument_node="">fascist</span></a><span data-dcnode-id="5864" instrument_node=""> strongmen and policies identical to theirs. Either </span><a class="mw-redirect" data-dcnode-id="5862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Ironically" title="Ironically"><span data-dcnode-id="5863" instrument_node="">ironically</span></a><span data-dcnode-id="5861" instrument_node="">, or appropriately, his </span><a class="mw-redirect" data-dcnode-id="5859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Aristocratic" title="Aristocratic"><span data-dcnode-id="5860" instrument_node="">aristocratic</span></a><span data-dcnode-id="5858" instrument_node=""> lifestyle, demeanor, </span><a data-dcnode-id="5856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Social_Darwinism" title="Social Darwinism"><span data-dcnode-id="5857" instrument_node="">Social Darwinism</span></a><span data-dcnode-id="5855" instrument_node="">, and authoritarianism make him resemble an eighteenth-century </span><a class="mw-redirect" data-dcnode-id="5853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/European" title="European"><span data-dcnode-id="5854" instrument_node="">European</span></a><span data-dcnode-id="5852" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="5850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Monarch" title="Monarch"><span data-dcnode-id="5851" instrument_node="">monarch</span></a><span data-dcnode-id="5849" instrument_node="">, someone Americans fought not </span><a data-dcnode-id="5847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/American_Revolution" title="American Revolution"><span data-dcnode-id="5848" instrument_node="">one</span></a><span data-dcnode-id="5846" instrument_node=""> but </span><a class="extiw" data-dcnode-id="5843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_of_1812" rel="nofollow" title="wp:War of 1812"><span data-dcnode-id="5844" style="color:#477979 !important;" title="Wikipedia: War of 1812"><span data-dcnode-id="5845" instrument_node="">two</span></span></a><sup data-dcnode-id="5841"><img alt="Wikipedia" data-dcnode-id="5842" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%2527s_W.svg/12px-Wikipedia%2527s_W.svg.png&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/18px-Wikipedia%27s_W.svg.png 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Wikipedia%27s_W.svg/24px-Wikipedia%27s_W.svg.png 2x" width="12"></sup><span data-dcnode-id="5840" instrument_node=""> wars of independence from.</span><sup data-dcnode-id="5834"><span data-dcnode-id="5839" instrument_node="">[</span><a data-dcnode-id="5836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Help%3AReferences" title="Help:References"><i data-dcnode-id="5837"><span data-dcnode-id="5838" instrument_node="">citation&nbsp;needed</span></i></a><span data-dcnode-id="5835" instrument_node="">]</span></sup><span data-dcnode-id="5833" instrument_node="">
</span></p><p data-dcnode-id="5815"><span data-dcnode-id="5831" instrument_node="">While </span><a data-dcnode-id="5829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="5830" instrument_node="">Trump</span></a><span data-dcnode-id="5828" instrument_node=""> may appear stupid and self-contradictory on the outside, he is a practiced </span><a class="mw-redirect" data-dcnode-id="5826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Con_artist" title="Con artist"><span data-dcnode-id="5827" instrument_node="">con artist</span></a><span data-dcnode-id="5825" instrument_node=""> who has admitted that he revels in unpredictability and </span><a data-dcnode-id="5823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Chaos" title="Chaos"><span data-dcnode-id="5824" instrument_node="">chaos</span></a><span data-dcnode-id="5822" instrument_node="">, which fosters severe infighting from even within his own </span><a data-dcnode-id="5820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Government" title="Government"><span data-dcnode-id="5821" instrument_node="">government</span></a><span data-dcnode-id="5819" instrument_node="">. His claim to notoriety is his transparently abusive, </span><a class="mw-redirect" data-dcnode-id="5817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Narcissistic_personality_disorder" title="Narcissistic personality disorder"><span data-dcnode-id="5818" instrument_node="">narcissistic</span></a><span data-dcnode-id="5816" instrument_node="">, and authoritarian nature.
</span></p><span data-dcnode-id="5814" instrument_node="">

</span><h2 data-dcnode-id="5454"><span class="mw-headline" data-dcnode-id="5462" id="Animal_rights_and_welfare"><span data-dcnode-id="5463" instrument_node="">Animal rights and welfare</span></span><span class="mw-editsection" data-dcnode-id="5455"><span class="mw-editsection-bracket" data-dcnode-id="5460"><span data-dcnode-id="5461" instrument_node="">[</span></span><a data-dcnode-id="5458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D1" title="Edit section: Animal rights and welfare"><span data-dcnode-id="5459" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5456"><span data-dcnode-id="5457" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5453" instrument_node="">
</span><div class="hatnote" data-dcnode-id="5449" role="note"><span data-dcnode-id="5452" instrument_node="">See the main article on this topic: </span><a data-dcnode-id="5450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Animal_rights" title="Animal rights"><span data-dcnode-id="5451" instrument_node="">Animal rights</span></a></div><span data-dcnode-id="5448" instrument_node="">
</span><p data-dcnode-id="5425"><span data-dcnode-id="5447" instrument_node="">He had the USDA remove information about Animal Welfare Act violations from their website.</span><sup class="reference" data-dcnode-id="5444" id="cite_ref-3"><a data-dcnode-id="5445" href="#cite_note-3"><span data-dcnode-id="5446" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="5441" id="cite_ref-4"><a data-dcnode-id="5442" href="#cite_note-4"><span data-dcnode-id="5443" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="5438" id="cite_ref-5"><a data-dcnode-id="5439" href="#cite_note-5"><span data-dcnode-id="5440" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5437" instrument_node=""> Puppy mills and experiment labs are also allowed to continue mistreating animals,</span><sup data-dcnode-id="5431"><span data-dcnode-id="5436" instrument_node="">[</span><a data-dcnode-id="5433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Help%3AReferences" title="Help:References"><i data-dcnode-id="5434"><span data-dcnode-id="5435" instrument_node="">citation&nbsp;needed</span></i></a><span data-dcnode-id="5432" instrument_node="">]</span></sup><span data-dcnode-id="5430" instrument_node=""> and people looking to buy pets or to even eat animals knowing they aren't being abused will no longer have this luxury. During his 2016 campaigning, Trump expressed support for restraining the FDA's ability to regulate food, including dog food.</span><sup class="reference" data-dcnode-id="5427" id="cite_ref-6"><a data-dcnode-id="5428" href="#cite_note-6"><span data-dcnode-id="5429" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5426" instrument_node="">
</span></p><span data-dcnode-id="5424" instrument_node="">
</span><h2 data-dcnode-id="5414"><span class="mw-headline" data-dcnode-id="5422" id="Climate_change_and_environmental_protection"><span data-dcnode-id="5423" instrument_node="">Climate change and environmental protection</span></span><span class="mw-editsection" data-dcnode-id="5415"><span class="mw-editsection-bracket" data-dcnode-id="5420"><span data-dcnode-id="5421" instrument_node="">[</span></span><a data-dcnode-id="5418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D2" title="Edit section: Climate change and environmental protection"><span data-dcnode-id="5419" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5416"><span data-dcnode-id="5417" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5413" instrument_node="">
</span><div class="hatnote" data-dcnode-id="5406" role="note"><span data-dcnode-id="5412" instrument_node="">See the main articles on this topic: </span><a class="mw-redirect" data-dcnode-id="5410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Climate_change" title="Climate change"><span data-dcnode-id="5411" instrument_node="">Climate change</span></a><span data-dcnode-id="5409" instrument_node="">&nbsp;and&nbsp;</span><a data-dcnode-id="5407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Pollution" title="Pollution"><span data-dcnode-id="5408" instrument_node="">Pollution</span></a></div><span data-dcnode-id="5405" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5396"><div class="thumbinner" data-dcnode-id="5397" style="width:182px;"><a class="image" data-dcnode-id="5403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ABald_Eagle_Portrait.jpg"><img alt="" class="thumbimage" data-dcnode-id="5404" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Bald_Eagle_Portrait.jpg/180px-Bald_Eagle_Portrait.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Bald_Eagle_Portrait.jpg/270px-Bald_Eagle_Portrait.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Bald_Eagle_Portrait.jpg/360px-Bald_Eagle_Portrait.jpg 2x" width="180"></a><span data-dcnode-id="5402" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5398"><div class="magnify" data-dcnode-id="5400"><a class="internal" data-dcnode-id="5401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3ABald_Eagle_Portrait.jpg" title="Enlarge"></a></div><span data-dcnode-id="5399" instrument_node="">The iconic bald eagle was one of the species saved by the Endangered Species Act.</span></div></div></div><span data-dcnode-id="5395" instrument_node="">
</span><p data-dcnode-id="5389"><span data-dcnode-id="5394" instrument_node="">The Trump administration has proposed a number of changes to the Endangered Species Act (ESA) that make it easier to eliminate protection for any given species. Signed into law in 1973 by Richard Nixon, the ESA has proven instrumental in saving a multitude of creatures from extinction. Success stories include the bald eagle, America's national icon, and the grizzly bear in the Yellowstone National Park. Automatic protections for species deemed "threatened" or "endangered" by biologists would also be removed. Whether or not a given species deserves protection would be considered on a case-by-case basis. The proposed changes also get rid of the requirement that precludes biologists from considering the economic impact of protecting a threatened or endangered species. The original ESA justified this requirement by arguing that it is next to impossible to estimate the price of a living thing on the brink of extinction.</span><sup class="reference" data-dcnode-id="5391" id="cite_ref-7"><a data-dcnode-id="5392" href="#cite_note-7"><span data-dcnode-id="5393" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5390" instrument_node="">
</span></p><p data-dcnode-id="5383"><span data-dcnode-id="5388" instrument_node="">The Trump Administration reversed an Obama-era rule banning the use of neonicotinoid pesticides, known to be harmful to bees, and genetically modified food crops on natural reserves, where limited farming is allowed.</span><sup class="reference" data-dcnode-id="5385" id="cite_ref-8"><a data-dcnode-id="5386" href="#cite_note-8"><span data-dcnode-id="5387" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5384" instrument_node="">
</span></p><p data-dcnode-id="5362"><span data-dcnode-id="5382" instrument_node="">Trump sought to eliminate funding for </span><a data-dcnode-id="5380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/NASA" title="NASA"><span data-dcnode-id="5381" instrument_node="">NASA</span></a><span data-dcnode-id="5379" instrument_node=""> research on climate.</span><sup class="reference" data-dcnode-id="5376" id="cite_ref-9"><a data-dcnode-id="5377" href="#cite_note-9"><span data-dcnode-id="5378" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5375" instrument_node=""> His EPA Chief, Scott Pruitt, outlined a proposal that limits how often science can be used to make agency-wide decisions.</span><sup class="reference" data-dcnode-id="5372" id="cite_ref-10"><a data-dcnode-id="5373" href="#cite_note-10"><span data-dcnode-id="5374" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5371" instrument_node=""> This rule was ultimately struck down by a federal court, after being implemented in a manner violating federal law.</span><sup class="reference" data-dcnode-id="5368" id="cite_ref-11"><a data-dcnode-id="5369" href="#cite_note-11"><span data-dcnode-id="5370" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5367" instrument_node=""> Trump also removed an Obama policy protecting oceans; now even the Great Lakes can be polluted.</span><sup class="reference" data-dcnode-id="5364" id="cite_ref-12"><a data-dcnode-id="5365" href="#cite_note-12"><span data-dcnode-id="5366" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5363" instrument_node="">
</span></p><p data-dcnode-id="5360"><span data-dcnode-id="5361" instrument_node="">Trump is rescinding a great many orders which Obama made cutting greenhouse gas emissions in the United States. There is strong opposition to this and there will be legal challenges.
</span></p><span data-dcnode-id="5359" instrument_node="">
</span><span data-dcnode-id="5358" instrument_node="">
</span><span data-dcnode-id="5357" instrument_node="">
</span><span data-dcnode-id="5340" instrument_node="">
</span><span data-dcnode-id="5339" instrument_node="">
</span><table class="cquote" data-dcnode-id="5328" style="margin: auto; border-collapse:collapse; border-style:none; background-color:transparent;"><tbody data-dcnode-id="5329"><tr data-dcnode-id="5341"><td data-dcnode-id="5342"><div data-dcnode-id="5344" style="padding:4px 50px;position:relative;"><span data-dcnode-id="5355" style="position:absolute;left:10px;top:-6px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="5356" instrument_node="">“</span></span><span data-dcnode-id="5353" style="position:absolute;right:10px;bottom:-20px;z-index:1;font-family:'Times New Roman',serif;font-weight:bold;color:#B2B7F2;font-size:36px"><span data-dcnode-id="5354" instrument_node="">”</span></span><span data-dcnode-id="5352" instrument_node="">Large majorities of Americans in </span><a data-dcnode-id="5350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Red%2C_blue%2C_and_purple_states" title="Red, blue, and purple states"><span data-dcnode-id="5351" instrument_node="">red and blue states</span></a><span data-dcnode-id="5349" instrument_node=""> alike support strong action to reduce carbon pollution from the nation's power plants,</span><sup class="reference" data-dcnode-id="5346" id="cite_ref-13"><a data-dcnode-id="5347" href="#cite_note-13"><span data-dcnode-id="5348" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5345" instrument_node=""> and the clean power plan is supported by a broad and diverse coalition of states, municipalities, power companies, leading businesses, consumer advocates, faith organizations and many others. These supporters will turn out in force to oppose the administration's outrageous attack on the United States' only nationwide limits on carbon pollution from power plants – safeguards that are essential to protecting our public health, securing a clean energy economy and yielding a safer climate for our children.</span></div><span data-dcnode-id="5343" instrument_node="">
</span></td></tr><tr data-dcnode-id="5330"><td data-dcnode-id="5331" style="padding:4px 10px 8px;font-size:smaller;line-height:1.6em;text-align:right;"><span data-dcnode-id="5338" instrument_node=""> </span><cite data-dcnode-id="5333" style="font-style:normal;position:relative;z-index:2"><span data-dcnode-id="5337" instrument_node="">—Tomás Carbonell, director of regulatory policy and senior attorney at the Environmental Defense Fund</span><sup class="reference" data-dcnode-id="5334" id="cite_ref-14"><a data-dcnode-id="5335" href="#cite_note-14"><span data-dcnode-id="5336" instrument_node="">[14]</span></a></sup></cite><span data-dcnode-id="5332" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="5327" instrument_node="">
</span><p data-dcnode-id="5315"><span data-dcnode-id="5326" instrument_node="">On March 28, 2017, Trump signed an executive order to remove Obama's climate change policies and to bring back the </span><a data-dcnode-id="5324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Coal" title="Coal"><span data-dcnode-id="5325" instrument_node="">coal</span></a><span data-dcnode-id="5323" instrument_node=""> industry.</span><sup class="reference" data-dcnode-id="5320" id="cite_ref-15"><a data-dcnode-id="5321" href="#cite_note-15"><span data-dcnode-id="5322" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="5317" id="cite_ref-16"><a data-dcnode-id="5318" href="#cite_note-16"><span data-dcnode-id="5319" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5316" instrument_node="">
</span></p><p data-dcnode-id="5293"><span data-dcnode-id="5314" instrument_node="">In early June, Trump took the United States out of the Paris Agreement despite intense lobbying from people concerned about climate change.</span><sup class="reference" data-dcnode-id="5311" id="cite_ref-17"><a data-dcnode-id="5312" href="#cite_note-17"><span data-dcnode-id="5313" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5310" instrument_node=""> He followed that up by announcing he was going to repeal the Clean Power Plan as the first step to eliminating it altogether.</span><sup class="reference" data-dcnode-id="5307" id="cite_ref-18"><a data-dcnode-id="5308" href="#cite_note-18"><span data-dcnode-id="5309" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5306" instrument_node=""> The clean power plan was ultimately repealed by the Trump EPA in 2019.</span><sup class="reference" data-dcnode-id="5303" id="cite_ref-19"><a data-dcnode-id="5304" href="#cite_note-19"><span data-dcnode-id="5305" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5302" instrument_node=""> In spite of this, the U.S. in 2017 managed the greatest reduction in carbon emissions of any country.</span><sup class="reference" data-dcnode-id="5299" id="cite_ref-mcmahon_20-0"><a data-dcnode-id="5300" href="#cite_note-mcmahon-20"><span data-dcnode-id="5301" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5298" instrument_node=""> This is thanks in part to the phasing out of coal in favor of natural gas and renewable energy, and to a decline in energy demand. Furthermore, the U.S. remains one of the leading investors in green energy.</span><sup class="reference" data-dcnode-id="5295" id="cite_ref-mcmahon_20-1"><a data-dcnode-id="5296" href="#cite_note-mcmahon-20"><span data-dcnode-id="5297" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5294" instrument_node="">
</span></p><span data-dcnode-id="5292" instrument_node="">
</span><h3 data-dcnode-id="5282"><span class="mw-headline" data-dcnode-id="5290" id="Disaster_relief_in_Puerto_Rico"><span data-dcnode-id="5291" instrument_node="">Disaster relief in Puerto Rico</span></span><span class="mw-editsection" data-dcnode-id="5283"><span class="mw-editsection-bracket" data-dcnode-id="5288"><span data-dcnode-id="5289" instrument_node="">[</span></span><a data-dcnode-id="5286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D3" title="Edit section: Disaster relief in Puerto Rico"><span data-dcnode-id="5287" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5284"><span data-dcnode-id="5285" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5281" instrument_node="">
</span><div data-dcnode-id="5268" style="text-align: center;"><q data-dcnode-id="5278"><i data-dcnode-id="5279"><span data-dcnode-id="5280" instrument_node="">Politically motivated ingrates.</span></i></q><span data-dcnode-id="5277" instrument_node=""> </span><cite data-dcnode-id="5269" style="font-style: normal;"><span data-dcnode-id="5276" instrument_node="">—President Trump on critics of his </span><a class="mw-redirect" data-dcnode-id="5274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Hurricane" title="Hurricane"><span data-dcnode-id="5275" instrument_node="">hurricane</span></a><span data-dcnode-id="5273" instrument_node=""> response.</span><sup class="reference" data-dcnode-id="5270" id="cite_ref-21"><a data-dcnode-id="5271" href="#cite_note-21"><span data-dcnode-id="5272" instrument_node="">[21]</span></a></sup></cite></div><span data-dcnode-id="5267" instrument_node="">
</span><p data-dcnode-id="5248"><span data-dcnode-id="5266" instrument_node="">On the eve of Category 4 Hurricane Harvey barreling towards </span><a class="mw-redirect" data-dcnode-id="5264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Texas" title="Texas"><span data-dcnode-id="5265" instrument_node="">Texas</span></a><span data-dcnode-id="5263" instrument_node="">, Trump appointed deputy chief of staff Kirstjen Nielsen to oversee Harvey. Nielsen is one of the same officials most responsible for the </span><a class="mw-redirect" data-dcnode-id="5261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/W" title="W"><span data-dcnode-id="5262" instrument_node="">Bush</span></a><span data-dcnode-id="5260" instrument_node=""> administration's failure to prepare for </span><a data-dcnode-id="5258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Hurricane_Katrina" title="Hurricane Katrina"><span data-dcnode-id="5259" instrument_node="">Hurricane Katrina</span></a><span data-dcnode-id="5257" instrument_node="">.</span><sup class="reference" data-dcnode-id="5254" id="cite_ref-22"><a data-dcnode-id="5255" href="#cite_note-22"><span data-dcnode-id="5256" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5253" instrument_node=""> True to form, he rescinded Obama's flood-risk rule weeks before Hurricane Harvey hit Houston.</span><sup class="reference" data-dcnode-id="5250" id="cite_ref-23"><a data-dcnode-id="5251" href="#cite_note-23"><span data-dcnode-id="5252" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5249" instrument_node="">
</span></p><span data-dcnode-id="5247" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5238"><div class="thumbinner" data-dcnode-id="5239" style="width:302px;"><a class="image" data-dcnode-id="5245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3APresident_Trump_Visits_Puerto_Rico_171003-Z-KL947-224.jpg"><img alt="" class="thumbimage" data-dcnode-id="5246" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/52/President_Trump_Visits_Puerto_Rico_171003-Z-KL947-224.jpg/300px-President_Trump_Visits_Puerto_Rico_171003-Z-KL947-224.jpg&amp;raw" srcset="https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/President_Trump_Visits_Puerto_Rico_171003-Z-KL947-224.jpg/450px-President_Trump_Visits_Puerto_Rico_171003-Z-KL947-224.jpg 1.5x, https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/President_Trump_Visits_Puerto_Rico_171003-Z-KL947-224.jpg/600px-President_Trump_Visits_Puerto_Rico_171003-Z-KL947-224.jpg 2x" width="300"></a><span data-dcnode-id="5244" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5240"><div class="magnify" data-dcnode-id="5242"><a class="internal" data-dcnode-id="5243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/File%3APresident_Trump_Visits_Puerto_Rico_171003-Z-KL947-224.jpg" title="Enlarge"></a></div><span data-dcnode-id="5241" instrument_node="">Trump in Puerto Rico, managing to actually make things worse by visiting</span></div></div></div><span data-dcnode-id="5237" instrument_node="">
</span><p data-dcnode-id="5215"><span data-dcnode-id="5236" instrument_node="">After Hurricane Maria decimated Puerto Rico, Trump's general silence and lack of action had been so deafening, even Bush's Katrina can't compare. Puerto Ricans, who are American citizens, faced four to six months without power, dangerous levels of flooding, increasingly impossible to pay costs in the middle of an economic depression pre-hurricane,</span><sup class="reference" data-dcnode-id="5233" id="cite_ref-24"><a data-dcnode-id="5234" href="#cite_note-24"><span data-dcnode-id="5235" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5232" instrument_node=""> dwindling food, water, and gas supplies</span><sup class="reference" data-dcnode-id="5229" id="cite_ref-25"><a data-dcnode-id="5230" href="#cite_note-25"><span data-dcnode-id="5231" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5228" instrument_node=""> lack of communication (and shoddy connection at best), a destroyed agricultural industry (which powers its economy), and a weak dam about to collapse near 70,000 people.</span><sup class="reference" data-dcnode-id="5225" id="cite_ref-26"><a data-dcnode-id="5226" href="#cite_note-26"><span data-dcnode-id="5227" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5224" instrument_node=""> People were living on their roofs to avoid flooding. 1,360 out of 1,600 cellphone towers on the island are out. Nursing homes had patients that are dehydrated and the elderly were especially vulnerable to death due to lack of refrigeration for insulin. Puerto Rico is an island of three million people, and all of them had no power, meaning they couldn't keep their food refrigerated and some ultimately died due to the lack of air conditioning. Most of its hospitals lacked electricity or fuel for generators in the middle of this humanitarian crisis.</span><sup class="reference" data-dcnode-id="5221" id="cite_ref-27"><a data-dcnode-id="5222" href="#cite_note-27"><span data-dcnode-id="5223" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5220" instrument_node=""> So what did he do instead? Criticize Puerto Ricans who had dared to point out he'd done nothing to help, including launching personal attacks against the mayor of San Juan.</span><sup class="reference" data-dcnode-id="5217" id="cite_ref-28"><a data-dcnode-id="5218" href="#cite_note-28"><span data-dcnode-id="5219" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5216" instrument_node="">
</span></p><p data-dcnode-id="5200"><span data-dcnode-id="5214" instrument_node="">Even after FEMA </span><i data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">finally</span></i><span data-dcnode-id="5211" instrument_node=""> did its fucking job and sent emergency relief teams down there, there was nothing they can do beyond that without the money, the kind of money Trump himself rescinded just before a previous hurricane (Harvey). He had no plan to rebuild Puerto Rico long-term. He gave it no time, he wasn't not giving any drinking water to supply Puerto Rico's quickly-dwindling resource, and instead, he had focused more on attacking the National Football League for some of its players criticizing him.</span><sup class="reference" data-dcnode-id="5208" id="cite_ref-29"><a data-dcnode-id="5209" href="#cite_note-29"><span data-dcnode-id="5210" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="5205" id="cite_ref-30"><a data-dcnode-id="5206" href="#cite_note-30"><span data-dcnode-id="5207" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="5202" id="cite_ref-31"><a data-dcnode-id="5203" href="#cite_note-31"><span data-dcnode-id="5204" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5201" instrument_node="">
</span></p><p data-dcnode-id="5181"><span data-dcnode-id="5199" instrument_node="">In fact, Trump chose to </span><i data-dcnode-id="5197"><span data-dcnode-id="5198" instrument_node="">mock</span></i><span data-dcnode-id="5196" instrument_node=""> Puerto Rico for its "massive debt" and infrastructure woes, claiming, with no basis in reality, that the island was "doing fine" as it struggled to survive post-hurricane catastrophe.</span><sup class="reference" data-dcnode-id="5193" id="cite_ref-32"><a data-dcnode-id="5194" href="#cite_note-32"><span data-dcnode-id="5195" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5192" instrument_node=""> He followed that up by </span><i data-dcnode-id="5190"><span data-dcnode-id="5191" instrument_node="">denying</span></i><span data-dcnode-id="5189" instrument_node=""> a request for shipping water to Puerto Rico, rationalizing that </span><i data-dcnode-id="5187"><span data-dcnode-id="5188" instrument_node="">oil pipelines</span></i><span data-dcnode-id="5186" instrument_node=""> mattered more.</span><sup class="reference" data-dcnode-id="5183" id="cite_ref-33"><a data-dcnode-id="5184" href="#cite_note-33"><span data-dcnode-id="5185" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5182" instrument_node="">
</span></p><p data-dcnode-id="5147"><span data-dcnode-id="5180" instrument_node="">In his visit to Puerto Rico, he had FEMA delete facts and erase reports on how many people still lack drinking water or electricity in Puerto Rico,</span><sup class="reference" data-dcnode-id="5177" id="cite_ref-34"><a data-dcnode-id="5178" href="#cite_note-34"><span data-dcnode-id="5179" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5176" instrument_node=""> complained about the cost of relief efforts, said Puerto Ricans should feel lucky Maria wasn't a "real catastrophe" like Katrina,</span><sup class="reference" data-dcnode-id="5173" id="cite_ref-35"><a data-dcnode-id="5174" href="#cite_note-35"><span data-dcnode-id="5175" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5172" instrument_node=""> argued Puerto Rico's debt would have to be wiped out as a precondition for full relief, threw a bunch of paper towels at hurricane victims from a stage and told a victim to "have a good time," refused to promise he'd ever rebuild the island's infrastructure,</span><sup class="reference" data-dcnode-id="5169" id="cite_ref-36"><a data-dcnode-id="5170" href="#cite_note-36"><span data-dcnode-id="5171" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5168" instrument_node=""> denied food stamps to hurricane victims,</span><sup class="reference" data-dcnode-id="5165" id="cite_ref-37"><a data-dcnode-id="5166" href="#cite_note-37"><span data-dcnode-id="5167" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5164" instrument_node=""> and he continued to act very slowly in establishing any relief whatsoever.</span><sup class="reference" data-dcnode-id="5161" id="cite_ref-38"><a data-dcnode-id="5162" href="#cite_note-38"><span data-dcnode-id="5163" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="5158" id="cite_ref-39"><a data-dcnode-id="5159" href="#cite_note-39"><span data-dcnode-id="5160" instrument_node="">[39]</span></a></sup><sup class="reference" data-dcnode-id="5155" id="cite_ref-40"><a data-dcnode-id="5156" href="#cite_note-40"><span data-dcnode-id="5157" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="5152" id="cite_ref-41"><a data-dcnode-id="5153" href="#cite_note-41"><span data-dcnode-id="5154" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="5149" id="cite_ref-42"><a data-dcnode-id="5150" href="#cite_note-42"><span data-dcnode-id="5151" instrument_node="">[42]</span></a></sup><span data-dcnode-id="5148" instrument_node="">
</span></p><p data-dcnode-id="5127"><span data-dcnode-id="5146" instrument_node="">The final death toll is 2,975, a mere two away from matching the total deaths from 9/11. Katrina's death toll in New Orleans was 1400.</span><sup class="reference" data-dcnode-id="5143" id="cite_ref-43"><a data-dcnode-id="5144" href="#cite_note-43"><span data-dcnode-id="5145" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="5140" id="cite_ref-44"><a data-dcnode-id="5141" href="#cite_note-44"><span data-dcnode-id="5142" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5139" instrument_node=""> On the 17th anniversary of 9/11, Rachel Maddow and Senator Jeff Merkley revealed Trump cut FEMA's budget by nearly 10 million dollars and used those funds for ICE instead, including deportations and the concentration camps.</span><sup class="reference" data-dcnode-id="5136" id="cite_ref-45"><a data-dcnode-id="5137" href="#cite_note-45"><span data-dcnode-id="5138" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="5133" id="cite_ref-46"><a data-dcnode-id="5134" href="#cite_note-46"><span data-dcnode-id="5135" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5132" instrument_node=""> He later denied that 3000 people died in the hurricane season, claimed he rebuilt Puerto Rico (and they recovered all power and electricity a year later), and blamed the deaths on Democrats.</span><sup class="reference" data-dcnode-id="5129" id="cite_ref-47"><a data-dcnode-id="5130" href="#cite_note-47"><span data-dcnode-id="5131" instrument_node="">[47]</span></a></sup><span data-dcnode-id="5128" instrument_node="">
</span></p><p data-dcnode-id="5118"><span data-dcnode-id="5126" instrument_node="">It turns out that Trump deliberately told FEMA to withhold funds for emergency relief that were earmarked for Puerto Rico because he was enraged upon hearing that the Puerto Rican government was supposedly using disaster funds to solve its debt crisis (it should go without saying this turned out to be complete horseshit). In fact, he reportedly shouted, "I don't want a </span><i data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">single damn cent</span></i><span data-dcnode-id="5123" instrument_node=""> going to that island!"</span><sup class="reference" data-dcnode-id="5120" id="cite_ref-48"><a data-dcnode-id="5121" href="#cite_note-48"><span data-dcnode-id="5122" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5119" instrument_node="">
</span></p><span data-dcnode-id="5117" instrument_node="">
</span><h3 data-dcnode-id="5107"><span class="mw-headline" data-dcnode-id="5115" id="Environmental_Protection_Agency"><span data-dcnode-id="5116" instrument_node="">Environmental Protection Agency</span></span><span class="mw-editsection" data-dcnode-id="5108"><span class="mw-editsection-bracket" data-dcnode-id="5113"><span data-dcnode-id="5114" instrument_node="">[</span></span><a data-dcnode-id="5111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D4" title="Edit section: Environmental Protection Agency"><span data-dcnode-id="5112" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5106" instrument_node="">
</span><p data-dcnode-id="5055"><span data-dcnode-id="5105" instrument_node="">Living up to his climate change denial, Trump is looking to completely destroy the </span><a class="mw-redirect" data-dcnode-id="5103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/EPA" title="EPA"><span data-dcnode-id="5104" instrument_node="">EPA</span></a><span data-dcnode-id="5102" instrument_node="">'s ability to enforce regulations on climate change, effectively hollowing out the EPA and turning it into a virtual skeleton crew.</span><sup class="reference" data-dcnode-id="5099" id="cite_ref-49"><a data-dcnode-id="5100" href="#cite_note-49"><span data-dcnode-id="5101" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="5096" id="cite_ref-50"><a data-dcnode-id="5097" href="#cite_note-50"><span data-dcnode-id="5098" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="5093" id="cite_ref-51"><a data-dcnode-id="5094" href="#cite_note-51"><span data-dcnode-id="5095" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="5090" id="cite_ref-52"><a data-dcnode-id="5091" href="#cite_note-52"><span data-dcnode-id="5092" instrument_node="">[52]</span></a></sup><span data-dcnode-id="5089" instrument_node=""> This even includes gutting enforcement of anti-pollution laws, potentially signing a repeal of the Clean Air and Clean Water Acts, precipitating </span><a data-dcnode-id="5087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Lead" title="Lead"><span data-dcnode-id="5088" instrument_node="">lead</span></a><span data-dcnode-id="5086" instrument_node=""> poisoning on a greater scale, and allowing corporations to pollute your air and your water.</span><sup class="reference" data-dcnode-id="5083" id="cite_ref-53"><a data-dcnode-id="5084" href="#cite_note-53"><span data-dcnode-id="5085" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="5080" id="cite_ref-54"><a data-dcnode-id="5081" href="#cite_note-54"><span data-dcnode-id="5082" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="5077" id="cite_ref-55"><a data-dcnode-id="5078" href="#cite_note-55"><span data-dcnode-id="5079" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="5074" id="cite_ref-56"><a data-dcnode-id="5075" href="#cite_note-56"><span data-dcnode-id="5076" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="5071" id="cite_ref-57"><a data-dcnode-id="5072" href="#cite_note-57"><span data-dcnode-id="5073" instrument_node="">[57]</span></a></sup><span data-dcnode-id="5070" instrument_node=""> He also issued a directive forcing government agencies to stop reporting on climate change. All agencies, in fact, were forced to no longer report to the press, allowing only the White House any chance to air out information only Trump wants to hear.</span><sup class="reference" data-dcnode-id="5067" id="cite_ref-58"><a data-dcnode-id="5068" href="#cite_note-58"><span data-dcnode-id="5069" instrument_node="">[58]</span></a></sup><sup class="reference" data-dcnode-id="5064" id="cite_ref-59"><a data-dcnode-id="5065" href="#cite_note-59"><span data-dcnode-id="5066" instrument_node="">[59]</span></a></sup><sup class="reference" data-dcnode-id="5061" id="cite_ref-60"><a data-dcnode-id="5062" href="#cite_note-60"><span data-dcnode-id="5063" instrument_node="">[60]</span></a></sup><span data-dcnode-id="5060" instrument_node=""> He also intends to repeal the Clean Power Plan, which set guidelines for how states should reduce greenhouse gas emissions.</span><sup class="reference" data-dcnode-id="5057" id="cite_ref-61"><a data-dcnode-id="5058" href="#cite_note-61"><span data-dcnode-id="5059" instrument_node="">[61]</span></a></sup><span data-dcnode-id="5056" instrument_node="">
</span></p><p data-dcnode-id="5036"><span data-dcnode-id="5054" instrument_node="">Trump and Republicans in Congress always wanted to abolish the </span><a data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Environmental_Protection_Agency" title="Environmental Protection Agency"><span data-dcnode-id="5053" instrument_node="">Environmental Protection Agency</span></a><span data-dcnode-id="5051" instrument_node=""> (after </span><a class="mw-redirect" data-dcnode-id="5049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Nixon" title="Nixon"><span data-dcnode-id="5050" instrument_node="">Nixon</span></a><span data-dcnode-id="5048" instrument_node=""> created it).</span><sup class="reference" data-dcnode-id="5045" id="cite_ref-62"><a data-dcnode-id="5046" href="#cite_note-62"><span data-dcnode-id="5047" instrument_node="">[62]</span></a></sup><span data-dcnode-id="5044" instrument_node=""> He appointed Scott Pruitt, a man who filed lawsuits against the EPA, to be the head of the EPA. He later booted all scientists in favor of industry lobbyists, including Robert Phalen, </span><a data-dcnode-id="5042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Insanity" title="Insanity"><span data-dcnode-id="5043" instrument_node="">who argued the air is "too clean" in America</span></a><span data-dcnode-id="5041" instrument_node="">.</span><sup class="reference" data-dcnode-id="5038" id="cite_ref-63"><a data-dcnode-id="5039" href="#cite_note-63"><span data-dcnode-id="5040" instrument_node="">[63]</span></a></sup><span data-dcnode-id="5037" instrument_node="">
</span></p><p data-dcnode-id="4990"><span data-dcnode-id="5035" instrument_node="">From there, things have taken a turn for the worse.</span><sup class="reference" data-dcnode-id="5032" id="cite_ref-64"><a data-dcnode-id="5033" href="#cite_note-64"><span data-dcnode-id="5034" instrument_node="">[64]</span></a></sup><span data-dcnode-id="5031" instrument_node=""> The EPA has been severely curtailed, with much of its regulations and programs becoming rescinded or rolled back, and even removing all Obama era climate change programs in the government.</span><sup class="reference" data-dcnode-id="5028" id="cite_ref-65"><a data-dcnode-id="5029" href="#cite_note-65"><span data-dcnode-id="5030" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="5025" id="cite_ref-66"><a data-dcnode-id="5026" href="#cite_note-66"><span data-dcnode-id="5027" instrument_node="">[66]</span></a></sup><span data-dcnode-id="5024" instrument_node=""> This means he's removing protections from climate change, exacerbating the damage from storms due to his cuts, politicizing environmental issues, allowing pollution and food poisoning to occur more frequently.</span><sup class="reference" data-dcnode-id="5021" id="cite_ref-67"><a data-dcnode-id="5022" href="#cite_note-67"><span data-dcnode-id="5023" instrument_node="">[67]</span></a></sup><sup class="reference" data-dcnode-id="5018" id="cite_ref-68"><a data-dcnode-id="5019" href="#cite_note-68"><span data-dcnode-id="5020" instrument_node="">[68]</span></a></sup><sup class="reference" data-dcnode-id="5015" id="cite_ref-69"><a data-dcnode-id="5016" href="#cite_note-69"><span data-dcnode-id="5017" instrument_node="">[69]</span></a></sup><sup class="reference" data-dcnode-id="5012" id="cite_ref-70"><a data-dcnode-id="5013" href="#cite_note-70"><span data-dcnode-id="5014" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="5009" id="cite_ref-71"><a data-dcnode-id="5010" href="#cite_note-71"><span data-dcnode-id="5011" instrument_node="">[71]</span></a></sup><sup class="reference" data-dcnode-id="5006" id="cite_ref-72"><a data-dcnode-id="5007" href="#cite_note-72"><span data-dcnode-id="5008" instrument_node="">[72]</span></a></sup><span data-dcnode-id="5005" instrument_node=""> He even cut a "life-saving" program that helps children specifically because said program mentioned climate change,</span><sup class="reference" data-dcnode-id="5002" id="cite_ref-73"><a data-dcnode-id="5003" href="#cite_note-73"><span data-dcnode-id="5004" instrument_node="">[73]</span></a></sup><span data-dcnode-id="5001" instrument_node=""> itself a word that he banned from being used in his administration.</span><sup class="reference" data-dcnode-id="4998" id="cite_ref-74"><a data-dcnode-id="4999" href="#cite_note-74"><span data-dcnode-id="5000" instrument_node="">[74]</span></a></sup><sup class="reference" data-dcnode-id="4995" id="cite_ref-75"><a data-dcnode-id="4996" href="#cite_note-75"><span data-dcnode-id="4997" instrument_node="">[75]</span></a></sup><sup class="reference" data-dcnode-id="4992" id="cite_ref-76"><a data-dcnode-id="4993" href="#cite_note-76"><span data-dcnode-id="4994" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4991" instrument_node="">
</span></p><span data-dcnode-id="4989" instrument_node="">
</span><h4 data-dcnode-id="4979"><span class="mw-headline" data-dcnode-id="4987" id="Pollution"><span data-dcnode-id="4988" instrument_node="">Pollution</span></span><span class="mw-editsection" data-dcnode-id="4980"><span class="mw-editsection-bracket" data-dcnode-id="4985"><span data-dcnode-id="4986" instrument_node="">[</span></span><a data-dcnode-id="4983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D5" title="Edit section: Pollution"><span data-dcnode-id="4984" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4978" instrument_node="">
</span><p data-dcnode-id="4969"><span data-dcnode-id="4977" instrument_node="">After canceling Obama's Clean Power Plan, which regulated the amount of carbon generated by fossil fuel companies, the EPA did a study of the effects of the CPP's removal. It concluded an additional 1,400 people will die annually die to pollution-related preventable illnesses.</span><sup class="reference" data-dcnode-id="4974" id="cite_ref-77"><a data-dcnode-id="4975" href="#cite_note-77"><span data-dcnode-id="4976" instrument_node="">[77]</span></a></sup><sup class="reference" data-dcnode-id="4971" id="cite_ref-78"><a data-dcnode-id="4972" href="#cite_note-78"><span data-dcnode-id="4973" instrument_node="">[78]</span></a></sup><span data-dcnode-id="4970" instrument_node="">
</span></p><p data-dcnode-id="4963"><span data-dcnode-id="4968" instrument_node="">The EPA eliminated Obama-era rules on coal power production, giving states the power to regulate their own plants. Critics argue this will massively increase air pollution will pose a serious threat to public health. Acting EPA administrator Andrew Wheeler countered that the EPA exceeded its authority with said rules and removing them would lower electricity prices. In any case, Trump is fulfilling his campaign promises to undo Obama's environmental protection legacy and to boost the coal industry.</span><sup class="reference" data-dcnode-id="4965" id="cite_ref-79"><a data-dcnode-id="4966" href="#cite_note-79"><span data-dcnode-id="4967" instrument_node="">[79]</span></a></sup><span data-dcnode-id="4964" instrument_node="">
</span></p><span data-dcnode-id="4962" instrument_node="">
</span><h3 data-dcnode-id="4952"><span class="mw-headline" data-dcnode-id="4960" id="Renewable_energy"><span data-dcnode-id="4961" instrument_node="">Renewable energy</span></span><span class="mw-editsection" data-dcnode-id="4953"><span class="mw-editsection-bracket" data-dcnode-id="4958"><span data-dcnode-id="4959" instrument_node="">[</span></span><a data-dcnode-id="4956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D6" title="Edit section: Renewable energy"><span data-dcnode-id="4957" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4954"><span data-dcnode-id="4955" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4951" instrument_node="">
</span><p data-dcnode-id="4935"><span data-dcnode-id="4950" instrument_node="">Trump is looking to kneecap the solar industry by hiking prices higher and removing their competitive advantage against oil and gas, something that Putin did.</span><sup class="reference" data-dcnode-id="4947" id="cite_ref-80"><a data-dcnode-id="4948" href="#cite_note-80"><span data-dcnode-id="4949" instrument_node="">[80]</span></a></sup><span data-dcnode-id="4946" instrument_node=""> Even the </span><a data-dcnode-id="4944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Heritage_Foundation" title="Heritage Foundation"><span data-dcnode-id="4945" instrument_node="">Heritage Foundation</span></a><span data-dcnode-id="4943" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/ALEC" title="ALEC"><span data-dcnode-id="4942" instrument_node="">ALEC</span></a><span data-dcnode-id="4940" instrument_node=""> think that's insane.</span><sup class="reference" data-dcnode-id="4937" id="cite_ref-81"><a data-dcnode-id="4938" href="#cite_note-81"><span data-dcnode-id="4939" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4936" instrument_node="">
</span></p><p data-dcnode-id="4929"><span data-dcnode-id="4934" instrument_node="">In 2018, as part of the ongoing trade war between the U.S. and China, Trump imposed tariffs on solar power imports. Since many solar power companies operating in the U.S. are Chinese-owned, this will have a significant effect on the what is currently one of the fastest growing sectors of the U.S. economy, employing more than 250,000 people. Billions of dollars worth of installation projects have been shelved. There is, however, a glimpse of hope in this seemingly darkening picture. Many solar power companies are investing more and more in automation and as a result will become less dependent on imports, especially from China. This in turns will reduce prices without outsourcing American jobs. Thus, Trump's tariffs, as least in this particular instance, are actually beneficial to American industry.</span><sup class="reference" data-dcnode-id="4931" id="cite_ref-82"><a data-dcnode-id="4932" href="#cite_note-82"><span data-dcnode-id="4933" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4930" instrument_node="">
</span></p><p data-dcnode-id="4923"><span data-dcnode-id="4928" instrument_node="">On 31 January 2018, Trump's administration asked for 72% in cuts to renewable energy and energy efficiency programs in the Energy Department.</span><sup class="reference" data-dcnode-id="4925" id="cite_ref-83"><a data-dcnode-id="4926" href="#cite_note-83"><span data-dcnode-id="4927" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4924" instrument_node="">
</span></p><span data-dcnode-id="4922" instrument_node="">
</span><h3 data-dcnode-id="4912"><span class="mw-headline" data-dcnode-id="4920" id="National_parks_and_monuments"><span data-dcnode-id="4921" instrument_node="">National parks and monuments</span></span><span class="mw-editsection" data-dcnode-id="4913"><span class="mw-editsection-bracket" data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">[</span></span><a data-dcnode-id="4916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D7" title="Edit section: National parks and monuments"><span data-dcnode-id="4917" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4914"><span data-dcnode-id="4915" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4911" instrument_node="">
</span><p data-dcnode-id="4901"><span data-dcnode-id="4910" instrument_node="">The natural wonders of the land are under attack from Trump and Zinke, who want to reduce the size of national monuments and prevent future presidents from protecting the environment like Obama did.</span><sup class="reference" data-dcnode-id="4907" id="cite_ref-84"><a data-dcnode-id="4908" href="#cite_note-84"><span data-dcnode-id="4909" instrument_node="">[84]</span></a></sup><span data-dcnode-id="4906" instrument_node=""> Ryan Zinke wants to hike up entry fees to national parks and lease adjacent federal land to fossil fuel companies for mining and drilling, which will endanger the national parks.</span><sup class="reference" data-dcnode-id="4903" id="cite_ref-85"><a data-dcnode-id="4904" href="#cite_note-85"><span data-dcnode-id="4905" instrument_node="">[85]</span></a></sup><span data-dcnode-id="4902" instrument_node="">
</span></p><p data-dcnode-id="4892"><span data-dcnode-id="4900" instrument_node="">In December 2017, he used his frankly unlimited power as president to reduce Utah's national monuments and reduce their public land by 2 million acres, the largest reduction in public land ever.</span><sup class="reference" data-dcnode-id="4897" id="cite_ref-86"><a data-dcnode-id="4898" href="#cite_note-86"><span data-dcnode-id="4899" instrument_node="">[86]</span></a></sup><sup class="reference" data-dcnode-id="4894" id="cite_ref-87"><a data-dcnode-id="4895" href="#cite_note-87"><span data-dcnode-id="4896" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4893" instrument_node="">
</span></p><span data-dcnode-id="4891" instrument_node="">
</span><h2 data-dcnode-id="4881"><span class="mw-headline" data-dcnode-id="4889" id="Civil_rights_and_human_rights"><span data-dcnode-id="4890" instrument_node="">Civil rights and human rights</span></span><span class="mw-editsection" data-dcnode-id="4882"><span class="mw-editsection-bracket" data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">[</span></span><a data-dcnode-id="4885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D8" title="Edit section: Civil rights and human rights"><span data-dcnode-id="4886" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4883"><span data-dcnode-id="4884" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4880" instrument_node="">
</span><h3 data-dcnode-id="4870"><span class="mw-headline" data-dcnode-id="4878" id="Torture"><span data-dcnode-id="4879" instrument_node="">Torture</span></span><span class="mw-editsection" data-dcnode-id="4871"><span class="mw-editsection-bracket" data-dcnode-id="4876"><span data-dcnode-id="4877" instrument_node="">[</span></span><a data-dcnode-id="4874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D9" title="Edit section: Torture"><span data-dcnode-id="4875" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4872"><span data-dcnode-id="4873" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4869" instrument_node="">
</span><div class="hatnote" data-dcnode-id="4865" role="note"><span data-dcnode-id="4868" instrument_node="">See the main article on this topic: </span><a data-dcnode-id="4866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Torture" title="Torture"><span data-dcnode-id="4867" instrument_node="">Torture</span></a></div><span data-dcnode-id="4864" instrument_node="">
</span><p data-dcnode-id="4858"><span data-dcnode-id="4863" instrument_node="">Trump thinks torture works and wants to bring it back.</span><sup class="reference" data-dcnode-id="4860" id="cite_ref-88"><a data-dcnode-id="4861" href="#cite_note-88"><span data-dcnode-id="4862" instrument_node="">[88]</span></a></sup><span data-dcnode-id="4859" instrument_node="">
</span></p><p data-dcnode-id="4838"><span data-dcnode-id="4857" instrument_node="">He's already allowing ICE to abuse detainees to get them to drop their </span><a class="mw-redirect" data-dcnode-id="4855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/ACLU" title="ACLU"><span data-dcnode-id="4856" instrument_node="">ACLU</span></a><span data-dcnode-id="4854" instrument_node=""> claims,</span><sup class="reference" data-dcnode-id="4851" id="cite_ref-89"><a data-dcnode-id="4852" href="#cite_note-89"><span data-dcnode-id="4853" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4850" instrument_node=""> including destroying records of sexual assault, deaths in custody, and physical abuse.</span><sup class="reference" data-dcnode-id="4847" id="cite_ref-90"><a data-dcnode-id="4848" href="#cite_note-90"><span data-dcnode-id="4849" instrument_node="">[90]</span></a></sup><span data-dcnode-id="4846" instrument_node=""> Boca Raton's GEO Group, a powerful private prison, is running a facility on behalf of ICE, and according to the ACLU, tortures whistleblowers at its private immigration detention facility in Aurora, Colorado. ICE agents at GEO's 1,500-bed Colorado detention center are "retaliating against </span><a data-dcnode-id="4844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Iraq" title="Iraq"><span data-dcnode-id="4845" instrument_node="">Iraqi</span></a><span data-dcnode-id="4843" instrument_node=""> nationals who have joined an ACLU class-action lawsuit to stop the U.S. from deporting them." Iraqi inmates have been "denied food, water, and access to the restroom," so they could "voluntarily" signal ICE to deport them.</span><sup class="reference" data-dcnode-id="4840" id="cite_ref-91"><a data-dcnode-id="4841" href="#cite_note-91"><span data-dcnode-id="4842" instrument_node="">[91]</span></a></sup><span data-dcnode-id="4839" instrument_node="">
</span></p><span data-dcnode-id="4837" instrument_node="">
</span><h3 data-dcnode-id="4827"><span class="mw-headline" data-dcnode-id="4835" id="Civil_rights"><span data-dcnode-id="4836" instrument_node="">Civil rights</span></span><span class="mw-editsection" data-dcnode-id="4828"><span class="mw-editsection-bracket" data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">[</span></span><a data-dcnode-id="4831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D10" title="Edit section: Civil rights"><span data-dcnode-id="4832" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4829"><span data-dcnode-id="4830" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4826" instrument_node="">
</span><div class="hatnote" data-dcnode-id="4822" role="note"><span data-dcnode-id="4825" instrument_node="">See the main article on this topic: </span><a data-dcnode-id="4823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Civil_rights" title="Civil rights"><span data-dcnode-id="4824" instrument_node="">Civil rights</span></a></div><span data-dcnode-id="4821" instrument_node="">
</span><p data-dcnode-id="4812"><span data-dcnode-id="4820" instrument_node="">Trump intends to, and in some ways already has, rolled back efforts to hold police officers accountable when they kill unarmed minorities. He is also looking to dismantle all civil rights agencies in the federal government, including the Office of Federal Contract Compliance Programs (Labor Department), the Office of Civil Rights Division (Education Department), and the EPA's environmental justice program, which "offers aid to minority communities exposed to health hazards from pollution."</span><sup class="reference" data-dcnode-id="4817" id="cite_ref-92"><a data-dcnode-id="4818" href="#cite_note-92"><span data-dcnode-id="4819" instrument_node="">[92]</span></a></sup><sup class="reference" data-dcnode-id="4814" id="cite_ref-93"><a data-dcnode-id="4815" href="#cite_note-93"><span data-dcnode-id="4816" instrument_node="">[93]</span></a></sup><span data-dcnode-id="4813" instrument_node="">
</span></p><p data-dcnode-id="4796"><span data-dcnode-id="4811" instrument_node="">After his initial announcement on Twitter, Trump officially gave the order for the military to ban </span><a data-dcnode-id="4809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Transgender" title="Transgender"><span data-dcnode-id="4810" instrument_node="">transgender</span></a><span data-dcnode-id="4808" instrument_node=""> Americans from military service. The order stops the military from funding gender reassignment surgery, bars any new entries from trans Americans, and allows the Defense Secretary to determine whether or not to purge all currently-serving trans soldiers from the armed forces.</span><sup class="reference" data-dcnode-id="4805" id="cite_ref-94"><a data-dcnode-id="4806" href="#cite_note-94"><span data-dcnode-id="4807" instrument_node="">[94]</span></a></sup><sup class="reference" data-dcnode-id="4802" id="cite_ref-95"><a data-dcnode-id="4803" href="#cite_note-95"><span data-dcnode-id="4804" instrument_node="">[95]</span></a></sup><span data-dcnode-id="4801" instrument_node=""> He also rescinded Obama era protections for trans workers, giving way for them to be fired for being trans.</span><sup class="reference" data-dcnode-id="4798" id="cite_ref-96"><a data-dcnode-id="4799" href="#cite_note-96"><span data-dcnode-id="4800" instrument_node="">[96]</span></a></sup><span data-dcnode-id="4797" instrument_node="">
</span></p><p data-dcnode-id="4784"><span data-dcnode-id="4795" instrument_node="">On the same day as his trans ban, Trump pardoned Sheriff </span><a data-dcnode-id="4793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Joe_Arpaio" title="Joe Arpaio"><span data-dcnode-id="4794" instrument_node="">Joe Arpaio</span></a><span data-dcnode-id="4792" instrument_node="">, who was found guilty for illegal racial profiling of Latinos in Maricopa County, Arizona. This was highly unusual because pardons usually happen </span><i data-dcnode-id="4790"><span data-dcnode-id="4791" instrument_node="">after</span></i><span data-dcnode-id="4789" instrument_node=""> a conviction, which did not occur for Arpaio because they were still getting ready for the trial. This pardon, Trump's first, is seen as a signal to law enforcement that they can and will crackdown further on immigrants and minorities since they know the President has their back.</span><sup class="reference" data-dcnode-id="4786" id="cite_ref-97"><a data-dcnode-id="4787" href="#cite_note-97"><span data-dcnode-id="4788" instrument_node="">[97]</span></a></sup><span data-dcnode-id="4785" instrument_node="">
</span></p><p data-dcnode-id="4753"><span data-dcnode-id="4783" instrument_node="">Attorney General </span><a data-dcnode-id="4781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Jeff_Sessions" title="Jeff Sessions"><span data-dcnode-id="4782" instrument_node="">Jeff Sessions</span></a><span data-dcnode-id="4780" instrument_node=""> is rolling back the civil rights division in the Justice Department, under-staffing it and shifting its focus away from civil rights in general.</span><sup class="reference" data-dcnode-id="4777" id="cite_ref-98"><a data-dcnode-id="4778" href="#cite_note-98"><span data-dcnode-id="4779" instrument_node="">[98]</span></a></sup><span data-dcnode-id="4776" instrument_node=""> This includes making reducing consent decrees, which allows court-enforced reforms and oversight; these led to the country successfully desegregating school systems, reforming police departments, ensuring access for the disabled, and defending the religious. But Sessions says no, that's not a good thing, because of course.</span><sup class="reference" data-dcnode-id="4773" id="cite_ref-99"><a data-dcnode-id="4774" href="#cite_note-99"><span data-dcnode-id="4775" instrument_node="">[99]</span></a></sup><span data-dcnode-id="4772" instrument_node=""> He is empowering political appointees to do the dirty work of Donald Trump, because the civil service doesn't want to follow his orders.</span><sup class="reference" data-dcnode-id="4769" id="cite_ref-100"><a data-dcnode-id="4770" href="#cite_note-100"><span data-dcnode-id="4771" instrument_node="">[100]</span></a></sup><span data-dcnode-id="4768" instrument_node=""> </span><a data-dcnode-id="4766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Affirmative_action" title="Affirmative action"><span data-dcnode-id="4767" instrument_node="">Affirmative action</span></a><span data-dcnode-id="4765" instrument_node=""> in college admissions has been targeted for removal.</span><sup class="reference" data-dcnode-id="4762" id="cite_ref-101"><a data-dcnode-id="4763" href="#cite_note-101"><span data-dcnode-id="4764" instrument_node="">[101]</span></a></sup><span data-dcnode-id="4761" instrument_node=""> This even means using the Justice Department to re-</span><a data-dcnode-id="4759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Segregation" title="Segregation"><span data-dcnode-id="4760" instrument_node="">segregate</span></a><span data-dcnode-id="4758" instrument_node=""> schools.</span><sup class="reference" data-dcnode-id="4755" id="cite_ref-102"><a data-dcnode-id="4756" href="#cite_note-102"><span data-dcnode-id="4757" instrument_node="">[102]</span></a></sup><span data-dcnode-id="4754" instrument_node="">
</span></p><span data-dcnode-id="4752" instrument_node="">
</span><h3 data-dcnode-id="4742"><span class="mw-headline" data-dcnode-id="4750" id="Religious_freedom"><span data-dcnode-id="4751" instrument_node="">Religious freedom</span></span><span class="mw-editsection" data-dcnode-id="4743"><span class="mw-editsection-bracket" data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">[</span></span><a data-dcnode-id="4746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D11" title="Edit section: Religious freedom"><span data-dcnode-id="4747" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4744"><span data-dcnode-id="4745" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4741" instrument_node="">
</span><p data-dcnode-id="4729"><span data-dcnode-id="4740" instrument_node="">Trump got Attorney General </span><a data-dcnode-id="4738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Jeff_Sessions" title="Jeff Sessions"><span data-dcnode-id="4739" instrument_node="">Jeff Sessions</span></a><span data-dcnode-id="4737" instrument_node=""> to issue a government-wide "legal guidance" allowing special rights for the religious under the banner of "religious liberty." This means anyone who has a religious or "moral" obligation can deny any service and freely discriminate on the basis of healthcare, </span><a class="mw-redirect" data-dcnode-id="4735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Gay_rights" title="Gay rights"><span data-dcnode-id="4736" instrument_node="">gay rights</span></a><span data-dcnode-id="4734" instrument_node="">, women's rights, and even disaster relief. This was in response to an executive order President Donald Trump signed in May 2017 declaring religious freedom to be a driving policy for his administration.</span><sup class="reference" data-dcnode-id="4731" id="cite_ref-103"><a data-dcnode-id="4732" href="#cite_note-103"><span data-dcnode-id="4733" instrument_node="">[103]</span></a></sup><span data-dcnode-id="4730" instrument_node="">
</span></p><p data-dcnode-id="4723"><span data-dcnode-id="4728" instrument_node="">Trump does not care about the religious freedom on non-Christians. In fact, he banned people from several Muslim majority countries from entering the U.S. on his first week in office.</span><sup class="reference" data-dcnode-id="4725" id="cite_ref-104"><a data-dcnode-id="4726" href="#cite_note-104"><span data-dcnode-id="4727" instrument_node="">[104]</span></a></sup><span data-dcnode-id="4724" instrument_node=""> When Sally Yates, the acting Attorney General, refused to comply, Trump immediately had her fired. In addition, when six different judges, some of whom were Republican-appointed, ruled against the Muslim travel ban, Trump simply ignored them and ordered his government to keep enforcing the ban anyway. Eventually, he had to back down, and is in the process of revising the Muslim ban.
</span></p><p data-dcnode-id="4714"><span data-dcnode-id="4722" instrument_node="">Surprisingly, however, </span><a class="mw-redirect" data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Atheist" title="Atheist"><span data-dcnode-id="4721" instrument_node="">atheist</span></a><span data-dcnode-id="4719" instrument_node=""> refugees may jump a few queues to get into the U.S. if they qualify as members of "religious minorities".</span><sup class="reference" data-dcnode-id="4716" id="cite_ref-105"><a data-dcnode-id="4717" href="#cite_note-105"><span data-dcnode-id="4718" instrument_node="">[105]</span></a></sup><span data-dcnode-id="4715" instrument_node="">
</span></p><span data-dcnode-id="4713" instrument_node="">
</span><h3 data-dcnode-id="4703"><span class="mw-headline" data-dcnode-id="4711" id="Gay_rights"><span data-dcnode-id="4712" instrument_node="">Gay rights</span></span><span class="mw-editsection" data-dcnode-id="4704"><span class="mw-editsection-bracket" data-dcnode-id="4709"><span data-dcnode-id="4710" instrument_node="">[</span></span><a data-dcnode-id="4707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/w/index.php%3Ftitle%3DPolicies_of_Donald_Trump%26action%3Dedit%26section%3D12" title="Edit section: Gay rights"><span data-dcnode-id="4708" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4705"><span data-dcnode-id="4706" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4702" instrument_node="">
</span><p data-dcnode-id="4660"><span data-dcnode-id="4701" instrument_node="">Trump's empowering of </span><a class="mw-redirect" data-dcnode-id="4699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Homophobes" title="Homophobes"><span data-dcnode-id="4700" instrument_node="">homophobes</span></a><span data-dcnode-id="4698" instrument_node=""> had a chilling effect on LGBT rights and public perceptions. In one year, non-gay Americans are far less likely to be accepting or hold favorable views of the LGBT community during the Trump era. He refused to let a Pride flag fly on National Coming Out Day,</span><sup class="reference" data-dcnode-id="4695" id="cite_ref-106"><a data-dcnode-id="4696" href="#cite_note-106"><span data-dcnode-id="4697" instrument_node="">[106]</span></a></sup><span data-dcnode-id="4694" instrument_node=""> fired his entire HIV/AIDS advisory council,</span><sup class="reference" data-dcnode-id="4691" id="cite_ref-107"><a data-dcnode-id="4692" href="#cite_note-107"><span data-dcnode-id="4693" instrument_node="">[107]</span></a></sup><span data-dcnode-id="4690" instrument_node=""> he was the first president to attend an anti-LGBT summit,</span><sup class="reference" data-dcnode-id="4687" id="cite_ref-108"><a data-dcnode-id="4688" href="#cite_note-108"><span data-dcnode-id="4689" instrument_node="">[108]</span></a></sup><span data-dcnode-id="4686" instrument_node=""> and he appointed homophobe </span><a data-dcnode-id="4684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Sam_Brownback" title="Sam Brownback"><span data-dcnode-id="4685" instrument_node="">Sam Brownback</span></a><span data-dcnode-id="4683" instrument_node=""> to be an ambassador-at-large for "religious freedom" in his administration.</span><sup class="reference" data-dcnode-id="4680" id="cite_ref-109"><a data-dcnode-id="4681" href="#cite_note-109"><span data-dcnode-id="4682" instrument_node="">[109]</span></a></sup><span data-dcnode-id="4679" instrument_node=""> Not only has he appointed dozens of anti-gay judges to the courts, he stopped declaring June LGBT Pride Months, refused to mention gay and </span><a class="mw-redirect" data-dcnode-id="4677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Bisexual" title="Bisexual"><span data-dcnode-id="4678" instrument_node="">bisexual</span></a><span data-dcnode-id="4676" instrument_node=""> men or </span><a data-dcnode-id="4674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Transgender" title="Transgender"><span data-dcnode-id="4675" instrument_node="">transgender</span></a><span data-dcnode-id="4673" instrument_node=""> women in his World AIDS Day declaration, removed LGBT as a population category on the 2020 Census,</span><sup class="reference" data-dcnode-id="4670" id="cite_ref-110"><a data-dcnode-id="4671" href="#cite_note-110"><span data-dcnode-id="4672" instrument_node="">[110]</span></a></sup><span data-dcnode-id="4669" instrument_node=""> and rolled back the collection of sexual orientation and gender identity data on surveys.</span><sup class="reference" data-dcnode-id="4666" id="cite_ref-111"><a data-dcnode-id="4667" href="#cite_note-111"><span data-dcnode-id="4668" instrument_node="">[111]</span></a></sup><span data-dcnode-id="4665" instrument_node=""> He rescinded protections for transgender people.</span><sup class="reference" data-dcnode-id="4662" id="cite_ref-112"><a data-dcnode-id="4663" href="#cite_note-112"><span data-dcnode-id="4664" instrument_node="">[112]</span></a></sup><span data-dcnode-id="4661" instrument_node="">
</span></p><p data-dcnode-id="4651"><span data-dcnode-id="4659" instrument_node="">At one point, some media outlets believed Trump was actually pro-LGBTQ because of statements in his book </span><i data-dcnode-id="4657"><span data-dcnode-id="4658" instrument_node="">The America That We Deserve</span></i><span data-dcnode-id="4656" instrument_node="">:</span><sup class="reference" data-dcnode-id="4653" id="cite_ref-113"><a data-dcnode-id="4654" href="#cite_note-113"><span data-dcnode-id="4655" instrument_node="">[113]</span></a></sup><span data-dcnode-id="4652" instrument_node="">
</span></p><span data-dcnode-id="4650" instrument_node="">
</span><blockquote class="letter" data-dcnode-id="4645" style="width:auto; background:#f8f8ff; border:1px solid #C9C9CF;"><span data-dcnode-id="4649" instrument_node="">
