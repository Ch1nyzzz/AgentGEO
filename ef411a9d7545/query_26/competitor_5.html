			CMT 101: Crisis Management Team Roles		</span></h1><span data-dcnode-id="652" instrument_node="">
</span><div class="mk-author-avatar" data-dcnode-id="646"><span data-dcnode-id="651" instrument_node="">

</span><article class="mk-blog-single post-16137 post type-post status-publish format-standard has-post-thumbnail hentry category-crisis-management tag-cmt tag-cmt-roles tag-crisis-management-planning tag-crisis-management-team tag-crisis-management-team-roles" data-dcnode-id="315" id="16137"><span data-dcnode-id="619" instrument_node="">
</span><div class="clearboth" data-dcnode-id="618"></div><span data-dcnode-id="617" instrument_node="">
</span><div class="mk-single-content clearfix" data-dcnode-id="416"><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">In last week’s blog, we shared our “</span><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mha-it.com/2018/05/building-a-good-crisis-management-team/" rel="noopener" target="_blank"><span data-dcnode-id="614" instrument_node="">8 Tips for Building a Good Crisis Management Team</span></a><span data-dcnode-id="612" instrument_node="">.” This week we’re going to take a closer look at Crisis Management Team roles.</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Generally speaking, crisis management teams have a specific function and some roles that are universal (for example, each team must have a designated leader and communications, admin/logistics, and business or functional representation). The role of the Crisis Management Team is to manage events and ensure appropriate actions are carried out based on the current impacts of the event, as well as potential risks and impacts.</span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Multiple crisis teams may exist, with each activating and providing guidance depending on the situation. For example, IT may have a crisis team that activates related to actual or potential IT-related outages, with no other area even being aware.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">The concepts and roles apply to any level of the crisis team, but for this blog, we are focusing on a corporate level crisis management team to oversee and manage events that have a corporate-level impact.</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">How should your organization set up its Crisis Management Team in terms of the roles and departments represented?</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">In today’s post, we’ll break down the main players or roles that should be included on your team—and note what each person will contribute toward managing the crisis.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Before we dive in, however, here are a handful of overall points that apply to all roles:</span></p><span data-dcnode-id="592" instrument_node="">
</span><ul data-dcnode-id="579"><li data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">People on the CMT need to have a global view of the organization as well as a good understanding of the potential impacts and needs of their specific area.</span></li><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Apart from the leader, people on the CMT act as advocates for their area; they gather information on that area and make sure the impacts to it are understood and given due priority.&nbsp;They lead or direct the recovery or actions for the area.</span></li><li data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">In large organizations, each of the areas would likely be filled by one person. In medium and small organizations, the roles might be doubled or tripled up. The important thing is making sure that each area has someone assigned to look after it.</span></li><li data-dcnode-id="582"><span data-dcnode-id="585" instrument_node="">CMT members are not expected to have all the information for their area of responsibility in their head. However, they should know where to get their hands on it quickly should the need arise</span><span data-dcnode-id="583" style="color: #b00000;"><span data-dcnode-id="584" instrument_node="">.</span></span></li><li data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Each CMT member is an advocate – the one who ensures each area’s risk and impacts are addressed and considered. They must also be able to consider the overall impacts and understand when other areas or issues take priority.</span></li></ul><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">The above applies to everybody on the team.</span></p><span data-dcnode-id="575" instrument_node="">
</span><h2 data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">The Crisis Management Team</span></h2><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Below are the individual areas that need to be covered on the team, and notes on what each person in that role typically does. (This list varies from last week’s in a few details, but the core content is the same.)</span></p><span data-dcnode-id="569" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="564"><figure class="aligncenter size-full" data-dcnode-id="565"><img alt="crisis management team" class="wp-image-17919 lazyautosizes lazyloaded" data-dcnode-id="568" data-sizes="auto" data-src="https://ea9naaww7pv.exactdn.com/wp-content/uploads/2021/03/mha-crisis-management-team.jpg" data-srcset="https://ea9naaww7pv.exactdn.com/wp-content/uploads/2021/03/mha-crisis-management-team.jpg 800w, https://ea9naaww7pv.exactdn.com/wp-content/uploads/2021/03/mha-crisis-management-team-768x1028.jpg 768w" decoding="async" height="1071" sizes="700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ea9naaww7pv.exactdn.com/wp-content/uploads/2021/03/mha-crisis-management-team.jpg&amp;raw" srcset="https://ea9naaww7pv.exactdn.com/wp-content/uploads/2021/03/mha-crisis-management-team.jpg 800w, https://ea9naaww7pv.exactdn.com/wp-content/uploads/2021/03/mha-crisis-management-team-768x1028.jpg 768w" width="800"><noscript data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">&lt;img width="800" height="1071" src="https://ea9naaww7pv.exactdn.com/wp-content/uploads/2021/03/mha-crisis-management-team.jpg" alt="crisis management team" class="wp-image-17919" srcset="https://ea9naaww7pv.exactdn.com/wp-content/uploads/2021/03/mha-crisis-management-team.jpg 800w, https://ea9naaww7pv.exactdn.com/wp-content/uploads/2021/03/mha-crisis-management-team-768x1028.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" data-eio="l" /&gt;</span></noscript></figure></div><span data-dcnode-id="563" instrument_node="">
</span><h4 data-dcnode-id="560"><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Leader</span></strong></h4><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">The CMT Leader manages the team, provides for the safety and well-being of employees, and facilitates the timely resumption of business operations to minimize the impact of the emergency on customers and shareholders. The leader is the team facilitator, not dictator, encouraging discussion and debate to ensure that important matters receive due consideration. He or she keeps the group moving forward, then guides the members toward decisions that have broad support. It’s important to remember though that the leader has the final authority and may be required to make a decision quickly and with limited information. There should also be a designated alternate to take over if the primary leader is unavailable.</span></p><span data-dcnode-id="556" instrument_node="">
</span><h4 data-dcnode-id="553"><strong data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Administrative Support</span></strong></h4><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">The Administrative Support person is responsible for supporting the CMT Leader and members. The admin performs a function similar to that of the character Radar O’Reilly on “M*A*S*H”: they know where everything is and how to get things done. They take notes, keep track of action items and open issues, and know-how to obtain food and transportation, line up hotel rooms, keep everything moving, and make sure nothing is missed. Without an efficient and highly competent Admin Support person the Crisis Management Team will not be as successful or effective. Do not underestimate this role.</span></p><span data-dcnode-id="549" instrument_node="">
</span><h4 data-dcnode-id="546"><strong data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Finance &amp; Administration</span></strong></h4><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">The primary function of the person in this role is to manage the organization’s financial stability during an event. He or she understands the impact of the crisis on finance and accounting matters, including business process issues and regulatory compliance and reporting. In order to help the organization weather the crisis, this person might make such decisions as raising credit limits or delaying reporting.</span></p><span data-dcnode-id="542" instrument_node="">
</span><h4 data-dcnode-id="539"><strong data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Human Resources</span></strong></h4><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">HR is responsible for the development and implementation of services designed to support affected employees during and after the event. The person covering the HR area would be responsible for temporary staffing, benefits issues, or bringing in grief counselors. The HR person is also involved (in coordination with other departments such as Communications) in keeping employees informed about relevant aspects of the crisis; for example, they might notify the employees that overtime requests are approved for the next two weeks.</span></p><span data-dcnode-id="535" instrument_node="">
</span><h4 data-dcnode-id="532"><strong data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Information Technology</span></strong></h4><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">The primary function of the IT person is to coordinate and provide context and information related to the IT impacts associated with the event or actions. They direct the IT team as it works to restore information systems and networks affected by the event. If the crisis impacts IT, the IT person communicates these impacts to the larger team. He or she would also inform the team of the likely impacts on IT of any decisions and actions taken to deal with the crisis. For example, if the crisis management team was considering shutting down a building, such as during a fire, the IT person could advise the team as to what the impact would be on the organization’s computer systems and processes.</span></p><span data-dcnode-id="528" instrument_node="">
</span><h4 data-dcnode-id="525"><strong data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Legal</span></strong></h4><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">The member of the crisis team covering the Legal area provides advice and legal support to all CMT members with regards to liability, communications, lawfulness, prudence, and legal ramifications. They can advise on whether certain strategies under consideration are permissible under the relevant laws or regulatory controls. They might advise the team about such legal matters as the need to protect evidence.</span></p><span data-dcnode-id="521" instrument_node="">
</span><h4 data-dcnode-id="518"><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Operations and Business Recovery</span></strong></h4><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">The Operations role serves as the liaison between the CMT and the business recovery teams. The person on the crisis team covering this area is likely to have a lot of input in the actions of the team overall. He or she can provide the team with information on how the crisis is impacting the organization on the ground, at the retail stores, distribution centers, or manufacturing facilities. They can help the team evaluate proposed courses of action from the Operations point of view. As an example, if changing the distribution center schedule is necessary, Ops can address the downstream impacts.</span></p><span data-dcnode-id="514" instrument_node="">
</span><h4 data-dcnode-id="511"><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Project Management Office</span></strong></h4><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">The PMO supports the CMT through understanding the impact of the crisis (and any steps taken to deal with it) on the various projects the organization has underway. He or she can advise the team on which projects can be stopped or delayed with minimal impacts and which would bring higher impacts.</span></p><span data-dcnode-id="507" instrument_node="">
</span><h4 data-dcnode-id="504"><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Risk, Security, and Compliance</span></strong></h4><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">The person on the team covering these areas will be the advocate for the teams dealing with risk, compliance, and security at the organization (including physical and data security). He or she will work closely with local, county, state, and federal law enforcement and investigative agencies. This person can advise the team on whether any contemplated actions might put the organization out of compliance with regulations from OSHA or other agencies. From the security point of view, they would make sure the team attends to the security impacts of proposed actions. For example, if someone wanted to leave the exterior doors in a facility open for some reason, they would point out the need to station people there to protect those entrances.</span></p><span data-dcnode-id="500" instrument_node="">
</span><h4 data-dcnode-id="497"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Facility Support</span></strong></h4><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">The Facilities team is responsible for conducting a Damage Assessment and identifying affected infrastructure and the extent of damage caused by the event. The person on the team covering this area makes sure that issues related to the organization’s buildings are given proper consideration. He or she attends to such issues as whether the buildings are safe and accessible and whether it’s necessary to move employees to other facilities.</span></p><span data-dcnode-id="493" instrument_node="">
</span><h4 data-dcnode-id="490"><strong data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Marketing and Corporate Communications</span></strong></h4><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">The person on the CMT covering this area considers the impact of the crisis and any proposed responses on the marketing and communications functions. He or she works with other departments such as Legal, Operations, and Human Resources to ensure consistency in communications throughout an event. This includes communications to staff, shareholders, the media, and maybe even Wall Street. This person tackles such issues as, for example, what to communicate and to whom if the crisis causes loss of life.</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Whether you have a big Crisis Management Team, with each role being assigned to a different person, or a smaller team, where each member handles multiple roles, these are the basic functions that need to be taken care of to make sure your crisis team is effective.</span></p><span data-dcnode-id="483" instrument_node="">
</span><h2 data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">10 Characteristics of a Successful Crisis Management Team</span></h2><span data-dcnode-id="480" instrument_node="">
</span><h4 data-dcnode-id="477"><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Cultivate these 10 characteristics to ensure that your Crisis Management team will perform well during a real disaster event.</span></strong></h4><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">During a crisis or emergency event, the team(s) leading the various aspects of the event (e.g., overall response, risk, recovery, IT, business areas) are critical to a successful outcome. Your Crisis Management team can exude confidence and support for those under the stress of performing recovery activities or interacting with the public in a difficult situation. They provide needed direction and decision making to allow continued progress.</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Based on activations of Crisis Management teams that we have witnessed, we find that those that provide the most value, perform well during a real event, and demonstrate the highest functional capability have the following characteristics:</span></p><span data-dcnode-id="470" instrument_node="">
</span><ol data-dcnode-id="428"><li data-dcnode-id="466"><strong data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Supported by Senior Management and Empowered to Act</span></strong><span data-dcnode-id="467" instrument_node="">: The senior team does not have to always be a part of the Crisis Management team, but they do need to support those best able to perform the necessary functions, provide visible support of the team, and allow them to act.</span></li><li data-dcnode-id="462"><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Proactive in Activation – Not Afraid to Activate</span></strong><span data-dcnode-id="463" instrument_node="">: An effective Crisis Management team will come together when the possibility of an event exists, not just when a crisis occurs. It is easy to disband the team or set a trigger event to reconvene; it is impossible to turn back the clock.</span></li><li data-dcnode-id="457"><strong data-dcnode-id="459"><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mha-it.com/2013/01/steps-to-choosing-the-best-crisis-management-leader-for-your-organization/" rel="noopener" target="_blank"><span data-dcnode-id="461" instrument_node="">Do Not Manage by Title, but by Ability to Lead</span></a></strong><span data-dcnode-id="458" instrument_node="">: This may be the rarest characteristic, but it is the most impactful. Egos and titles are of little use during a crisis event. Calm, clear, decisive and reasoned actions are necessary. Those with the proper level of knowledge are needed. This may mean including individuals who normally perform different roles. Use a competency-based leadership model to develop team members.</span></li><li data-dcnode-id="453"><strong data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Roles are Well Understood</span></strong><span data-dcnode-id="454" instrument_node="">: Crisis Management team members regularly review their roles and responsibilities, consider how to best perform their tasks/role, and educate themselves on things they do not know.</span></li><li data-dcnode-id="449"><strong data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">The Team is Scalable Depending on Need</span></strong><span data-dcnode-id="450" instrument_node="">: Often both core and expanded teams are defined. When the core team needs assistance, they do not have to figure out who to bring in. They already have most additional needs identified and documented, both internal and external resources (vendors, consultants, etc).</span></li><li data-dcnode-id="445"><strong data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Exercises and Training are Held Regularly</span></strong><span data-dcnode-id="446" instrument_node="">: Minimally, exercise should be held annually, but shorter, more frequent exercises can have a great impact.</span></li><li data-dcnode-id="441"><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Depth Across Primary and Secondary Resources</span></strong><span data-dcnode-id="442" instrument_node="">: The secondary (or backup) team members understand their roles and responsibilities at a similar level as the primary, and are an equal part of the exercises and training.</span></li><li data-dcnode-id="437"><strong data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Follow Established Incident Principles and Priorities</span></strong><span data-dcnode-id="438" instrument_node="">: The team should follow the organization’s documented principles and priorities for the incident management process.</span></li><li data-dcnode-id="433"><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Follow a Comprehensive Crisis Management Plan</span></strong><span data-dcnode-id="434" instrument_node="">: While not every event or action can be listed in a plan, basic actions and decisions should be included to allow for more effective problem solving and decision making. Speed is often critical; many items can be pre-defined and adjusted as needed.</span></li><li data-dcnode-id="429"><strong data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Use a Standardized Decision-Making Process</span></strong><span data-dcnode-id="430" instrument_node="">: Identify a decision-making process, such as APIE, and include the use of it in all training and exercises.</span></li></ol><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">The continued development of these Crisis Management team traits will provide the leadership base and support for the organization, teams, and individuals performing recovery actions, supporting customers, and keeping the business functioning during a crisis event, making the overall response more effective and functional.</span></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="423" instrument_node="">If you have these areas covered by capable people (see </span><a data-dcnode-id="421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mha-it.com/2018/05/building-a-good-crisis-management-team/"><span data-dcnode-id="422" instrument_node="">last week’s blog</span></a><span data-dcnode-id="420" instrument_node=""> for the kind of people best suited for working on a CMT), you will increase the likelihood that any crisis that confronts your organization will be a bump in the road rather than the end of the road.</span></p><span data-dcnode-id="418" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="417"></span></div><span data-dcnode-id="415" instrument_node="">
</span><div class="single-post-tags" data-dcnode-id="398"><span data-dcnode-id="414" instrument_node="">
</span><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mha-it.com/tag/cmt/" rel="tag"><span data-dcnode-id="413" instrument_node="">cmt</span></a><span data-dcnode-id="411" instrument_node=""> </span><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mha-it.com/tag/cmt-roles/" rel="tag"><span data-dcnode-id="410" instrument_node="">CMT roles</span></a><span data-dcnode-id="408" instrument_node=""> </span><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mha-it.com/tag/crisis-management-planning/" rel="tag"><span data-dcnode-id="407" instrument_node="">Crisis Management Planning</span></a><span data-dcnode-id="405" instrument_node=""> </span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mha-it.com/tag/crisis-management-team/" rel="tag"><span data-dcnode-id="404" instrument_node="">Crisis Management Team</span></a><span data-dcnode-id="402" instrument_node=""> </span><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mha-it.com/tag/crisis-management-team-roles/" rel="tag"><span data-dcnode-id="401" instrument_node="">crisis management team roles</span></a><span data-dcnode-id="399" instrument_node=""> </span></div><span data-dcnode-id="397" instrument_node="">

</span><div class="about-author-desc" data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Richard Long is one of MHA’s practice team leaders for Technology and Disaster Recovery related engagements. He has been responsible for the successful execution of MHA business continuity and disaster recovery engagements in industries such as Energy &amp; Utilities, Government Services, Healthcare, Insurance, Risk Management, Travel &amp; Entertainment, Consumer Products, and Education. Prior to joining MHA, Richard held Senior IT Director positions at PetSmart (NASDAQ: PETM) and Avnet, Inc. (NYSE: AVT) and has been a senior leader across all disciplines of IT. He has successfully led international and domestic disaster recovery, technology assessment, crisis management and risk mitigation engagements.</span></div><span data-dcnode-id="333" instrument_node="">
