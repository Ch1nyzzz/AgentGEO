a-dcnode-id="6732" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="6725"><a class="external text" data-dcnode-id="6726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3ABusiness_administration%26action%3Dedit"><abbr data-dcnode-id="6727" title="Edit this template"><span data-dcnode-id="6728" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="6718" instrument_node="">
</span><p data-dcnode-id="6696"><b data-dcnode-id="6716"><span data-dcnode-id="6717" instrument_node="">Crisis management</span></b><span data-dcnode-id="6715" instrument_node=""> is the process by which an organization deals with a disruptive and unexpected event that threatens to harm the organization or its stakeholders.</span><sup class="reference" data-dcnode-id="6712" id="cite_ref-1"><a data-dcnode-id="6713" href="#cite_note-1"><span data-dcnode-id="6714" instrument_node="">[1]</span></a></sup><span data-dcnode-id="6711" instrument_node=""> The study of crisis management originated with large-scale industrial and environmental disasters in the 1980s.</span><sup class="reference" data-dcnode-id="6708" id="cite_ref-2"><a data-dcnode-id="6709" href="#cite_note-2"><span data-dcnode-id="6710" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="6705" id="cite_ref-ASIS_International_2009_3-0"><a data-dcnode-id="6706" href="#cite_note-ASIS_International_2009-3"><span data-dcnode-id="6707" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6704" instrument_node=""> It is considered to be the most important process in </span><a data-dcnode-id="6702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_relations" title="Public relations"><span data-dcnode-id="6703" instrument_node="">public relations</span></a><span data-dcnode-id="6701" instrument_node="">.</span><sup class="reference" data-dcnode-id="6698" id="cite_ref-ASIS_International_2009_3-1"><a data-dcnode-id="6699" href="#cite_note-ASIS_International_2009-3"><span data-dcnode-id="6700" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6697" instrument_node="">
</span></p><p data-dcnode-id="6686"><span data-dcnode-id="6695" instrument_node="">Three elements are common to a crisis: (a) a threat to the organization, (b) the element of surprise, and (c) a short decision time.</span><sup class="reference" data-dcnode-id="6692" id="cite_ref-4"><a data-dcnode-id="6693" href="#cite_note-4"><span data-dcnode-id="6694" instrument_node="">[4]</span></a></sup><span data-dcnode-id="6691" instrument_node=""> Venette</span><sup class="reference" data-dcnode-id="6688" id="cite_ref-5"><a data-dcnode-id="6689" href="#cite_note-5"><span data-dcnode-id="6690" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6687" instrument_node=""> argues that "crisis is a process of transformation where the old system can no longer be maintained". Therefore, the fourth defining quality is the need for change. If change is not needed, the event could more accurately be described as a failure or incident.
</span></p><p data-dcnode-id="6678"><span data-dcnode-id="6685" instrument_node="">In contrast to </span><a data-dcnode-id="6683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Risk_management" title="Risk management"><span data-dcnode-id="6684" instrument_node="">risk management</span></a><span data-dcnode-id="6682" instrument_node="">, which involves assessing potential threats and finding the best ways to avoid those threats, crisis management involves dealing with threats before, during, and after they have occurred. It is a discipline within the broader context of </span><a data-dcnode-id="6680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Management" title="Management"><span data-dcnode-id="6681" instrument_node="">management</span></a><span data-dcnode-id="6679" instrument_node=""> consisting of skills and techniques required to identify, assess, understand, and cope with a serious situation, especially from the moment it first occurs to the point that recovery procedures start.
</span></p><span data-dcnode-id="6677" instrument_node="">

</span><h2 data-dcnode-id="6141"><span class="mw-headline" data-dcnode-id="6149" id="Introduction"><span data-dcnode-id="6150" instrument_node="">Introduction</span></span><span class="mw-editsection" data-dcnode-id="6142"><span class="mw-editsection-bracket" data-dcnode-id="6147"><span data-dcnode-id="6148" instrument_node="">[</span></span><a data-dcnode-id="6145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D1" title="Edit section: Introduction"><span data-dcnode-id="6146" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6143"><span data-dcnode-id="6144" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6140" instrument_node="">
</span><p data-dcnode-id="6138"><span data-dcnode-id="6139" instrument_node="">Crisis management is a situation-based management system that includes clear roles and responsibilities and process related organisational requirements company-wide. The response shall include action in the following areas: Crisis prevention, crisis assessment, crisis handling and crisis termination.  The aim of crisis management is to be well prepared for crisis, ensure a rapid and adequate response to the crisis, maintaining clear lines of reporting and communication in the event of crisis and agreeing rules for crisis termination.
</span></p><p data-dcnode-id="6128"><span data-dcnode-id="6137" instrument_node="">The techniques of crisis management include a number of consequent steps from the understanding of the influence of the crisis on the corporation to preventing, alleviating, and overcoming the different types of crisis.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6130" style="white-space:nowrap;"><span data-dcnode-id="6136" instrument_node="">[</span><i data-dcnode-id="6132"><a data-dcnode-id="6133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6134" title="This claim needs references to reliable sources. (February 2020)"><span data-dcnode-id="6135" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6131" instrument_node="">]</span></sup><span data-dcnode-id="6129" instrument_node=""> Crisis management consists of different aspects including: 
</span></p><span data-dcnode-id="6127" instrument_node="">
</span><ul data-dcnode-id="6118"><li data-dcnode-id="6125"><span data-dcnode-id="6126" instrument_node="">Methods used to respond to both the reality and perception of crisis.</span></li><span data-dcnode-id="6124" instrument_node="">
</span><li data-dcnode-id="6122"><span data-dcnode-id="6123" instrument_node="">Establishing metrics to define what scenarios constitute a crisis and should consequently trigger the necessary response mechanisms.</span></li><span data-dcnode-id="6121" instrument_node="">
</span><li data-dcnode-id="6119"><span data-dcnode-id="6120" instrument_node="">Communication that occurs within the response phase of emergency-management scenarios.</span></li></ul><span data-dcnode-id="6117" instrument_node="">
</span><p data-dcnode-id="6115"><span data-dcnode-id="6116" instrument_node="">Crisis-management methods of a business or an organization are called a crisis-management plan. A British Standard BS11200:2014 provides a useful foundation for understanding terminology and frameworks relating to crisis, in this document the focus is on the corporate exposure to risks in particular to the black swan events that result in significant strategic threats to organisations. Currently there is work on-going to develop an International standard.
</span></p><p data-dcnode-id="6103"><span data-dcnode-id="6114" instrument_node="">Crisis management is occasionally referred to as </span><a data-dcnode-id="6112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Incident_management" title="Incident management"><span data-dcnode-id="6113" instrument_node="">incident management</span></a><span data-dcnode-id="6111" instrument_node="">, although several industry specialists such as </span><a data-dcnode-id="6109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Power_%28crisis_management_specialist%29" title="Peter Power (crisis management specialist)"><span data-dcnode-id="6110" instrument_node="">Peter Power</span></a><span data-dcnode-id="6108" instrument_node=""> argue that the term "crisis management" is more accurate.
</span><sup class="reference" data-dcnode-id="6105" id="cite_ref-6"><a data-dcnode-id="6106" href="#cite_note-6"><span data-dcnode-id="6107" instrument_node="">[6]</span></a></sup><span data-dcnode-id="6104" instrument_node="">
</span></p><p data-dcnode-id="6091"><span data-dcnode-id="6102" instrument_node="">A </span><b data-dcnode-id="6100"><span data-dcnode-id="6101" instrument_node="">crises mindset</span></b><span data-dcnode-id="6099" instrument_node=""> requires the ability to think of the worst-case scenario while simultaneously suggesting numerous solutions. </span><a data-dcnode-id="6097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trial_and_error" title="Trial and error"><span data-dcnode-id="6098" instrument_node="">Trial and error</span></a><span data-dcnode-id="6096" instrument_node=""> is an accepted discipline, as the first line of defense might not work. It is necessary to maintain a list of contingency plans and to be always on alert. Organizations and individuals should always be prepared with a rapid response plan to emergencies which would require analysis, drills and exercises.</span><sup class="reference" data-dcnode-id="6093" id="cite_ref-7"><a data-dcnode-id="6094" href="#cite_note-7"><span data-dcnode-id="6095" instrument_node="">[7]</span></a></sup><span data-dcnode-id="6092" instrument_node="">
</span></p><p data-dcnode-id="6086"><span data-dcnode-id="6090" instrument_node="">The credibility and reputation of organizations is heavily influenced by the perception of their responses during crisis situations.  The organization and communication involved in responding to a crisis in a timely fashion makes for a challenge in businesses.  There must be open and consistent communication throughout the hierarchy to contribute to a successful </span><a class="mw-redirect" data-dcnode-id="6088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crisis-communication" title="Crisis-communication"><span data-dcnode-id="6089" instrument_node="">crisis-communication</span></a><span data-dcnode-id="6087" instrument_node=""> process.
</span></p><p data-dcnode-id="6075"><span data-dcnode-id="6085" instrument_node="">The related terms </span><a data-dcnode-id="6083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emergency_management" title="Emergency management"><span data-dcnode-id="6084" instrument_node="">emergency management</span></a><span data-dcnode-id="6082" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Business_continuity_management" title="Business continuity management"><span data-dcnode-id="6081" instrument_node="">business continuity management</span></a><span data-dcnode-id="6079" instrument_node=""> focus respectively on the prompt but short lived "first aid" type of response (e.g. putting the fire out) and the longer-term recovery and restoration phases (e.g. moving operations to another site). Crisis is also a facet of </span><a data-dcnode-id="6077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Risk_management" title="Risk management"><span data-dcnode-id="6078" instrument_node="">risk management</span></a><span data-dcnode-id="6076" instrument_node="">, although it is probably untrue to say that crisis management represents a failure of risk management, since it will never be possible to totally mitigate the chances of catastrophes' occurring.
</span></p><span data-dcnode-id="6074" instrument_node="">
</span><h2 data-dcnode-id="6064"><span class="mw-headline" data-dcnode-id="6072" id="Types_of_crisis"><span data-dcnode-id="6073" instrument_node="">Types of crisis</span></span><span class="mw-editsection" data-dcnode-id="6065"><span class="mw-editsection-bracket" data-dcnode-id="6070"><span data-dcnode-id="6071" instrument_node="">[</span></span><a data-dcnode-id="6068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D2" title="Edit section: Types of crisis"><span data-dcnode-id="6069" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6066"><span data-dcnode-id="6067" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6063" instrument_node="">
</span><p data-dcnode-id="6053"><span data-dcnode-id="6062" instrument_node="">During the crisis management process, it is important to identify types of crises in that different crises necessitate the use of different crisis management strategies.</span><sup class="reference" data-dcnode-id="6059" id="cite_ref-Coombs_8-0"><a data-dcnode-id="6060" href="#cite_note-Coombs-8"><span data-dcnode-id="6061" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6058" instrument_node=""> Potential crises are enormous, but crises can be clustered.</span><sup class="reference" data-dcnode-id="6055" id="cite_ref-Coombs_8-1"><a data-dcnode-id="6056" href="#cite_note-Coombs-8"><span data-dcnode-id="6057" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6054" instrument_node="">
</span></p><p data-dcnode-id="6047"><span data-dcnode-id="6052" instrument_node="">Lerbinger</span><sup class="reference" data-dcnode-id="6049" id="cite_ref-Lerbinger_9-0"><a data-dcnode-id="6050" href="#cite_note-Lerbinger-9"><span data-dcnode-id="6051" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6048" instrument_node=""> categorized eight types of crises
</span></p><span data-dcnode-id="6046" instrument_node="">
</span><ol data-dcnode-id="6022"><li data-dcnode-id="6044"><span data-dcnode-id="6045" instrument_node="">Natural disaster</span></li><span data-dcnode-id="6043" instrument_node="">
</span><li data-dcnode-id="6041"><span data-dcnode-id="6042" instrument_node="">Technological crisis</span></li><span data-dcnode-id="6040" instrument_node="">
</span><li data-dcnode-id="6038"><span data-dcnode-id="6039" instrument_node="">Confrontation</span></li><span data-dcnode-id="6037" instrument_node="">
</span><li data-dcnode-id="6035"><span data-dcnode-id="6036" instrument_node="">Malevolence</span></li><span data-dcnode-id="6034" instrument_node="">
</span><li data-dcnode-id="6032"><span data-dcnode-id="6033" instrument_node="">Organizational Misdeeds</span></li><span data-dcnode-id="6031" instrument_node="">
</span><li data-dcnode-id="6029"><span data-dcnode-id="6030" instrument_node="">Workplace Violence</span></li><span data-dcnode-id="6028" instrument_node="">
</span><li data-dcnode-id="6026"><span data-dcnode-id="6027" instrument_node="">Rumours</span></li><span data-dcnode-id="6025" instrument_node="">
</span><li data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">Terrorist attacks/man-made disasters</span></li></ol><span data-dcnode-id="6021" instrument_node="">
</span><h3 data-dcnode-id="6011"><span class="mw-headline" data-dcnode-id="6019" id="Natural_disaster"><span data-dcnode-id="6020" instrument_node="">Natural disaster</span></span><span class="mw-editsection" data-dcnode-id="6012"><span class="mw-editsection-bracket" data-dcnode-id="6017"><span data-dcnode-id="6018" instrument_node="">[</span></span><a data-dcnode-id="6015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D3" title="Edit section: Natural disaster"><span data-dcnode-id="6016" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6013"><span data-dcnode-id="6014" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6010" instrument_node="">
</span><p data-dcnode-id="5977"><span data-dcnode-id="6009" instrument_node="">Natural disaster related crises, typically natural disasters, are such environmental phenomena as </span><a class="mw-redirect" data-dcnode-id="6007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earthquakes" title="Earthquakes"><span data-dcnode-id="6008" instrument_node="">earthquakes</span></a><span data-dcnode-id="6006" instrument_node="">, </span><a data-dcnode-id="6004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Volcano" title="Volcano"><span data-dcnode-id="6005" instrument_node="">volcanic eruptions</span></a><span data-dcnode-id="6003" instrument_node="">, </span><a data-dcnode-id="6001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tornado" title="Tornado"><span data-dcnode-id="6002" instrument_node="">tornadoes</span></a><span data-dcnode-id="6000" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="5998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hurricane" title="Hurricane"><span data-dcnode-id="5999" instrument_node="">hurricanes</span></a><span data-dcnode-id="5997" instrument_node="">, </span><a data-dcnode-id="5995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flood" title="Flood"><span data-dcnode-id="5996" instrument_node="">floods</span></a><span data-dcnode-id="5994" instrument_node="">, </span><a data-dcnode-id="5992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Landslide" title="Landslide"><span data-dcnode-id="5993" instrument_node="">landslides</span></a><span data-dcnode-id="5991" instrument_node="">, </span><a data-dcnode-id="5989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tsunami" title="Tsunami"><span data-dcnode-id="5990" instrument_node="">tsunamis</span></a><span data-dcnode-id="5988" instrument_node="">, storms, and </span><a data-dcnode-id="5986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drought" title="Drought"><span data-dcnode-id="5987" instrument_node="">droughts</span></a><span data-dcnode-id="5985" instrument_node=""> that threaten life, property, and the environment itself.</span><sup class="reference" data-dcnode-id="5982" id="cite_ref-Coombs_8-2"><a data-dcnode-id="5983" href="#cite_note-Coombs-8"><span data-dcnode-id="5984" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="5979" id="cite_ref-Lerbinger_9-1"><a data-dcnode-id="5980" href="#cite_note-Lerbinger-9"><span data-dcnode-id="5981" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5978" instrument_node="">
</span></p><span data-dcnode-id="5976" instrument_node="">
</span><dl data-dcnode-id="5967"><dd data-dcnode-id="5968"><span data-dcnode-id="5975" instrument_node="">Example: </span><a class="mw-redirect" data-dcnode-id="5973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2004_Indian_Ocean_earthquake" title="2004 Indian Ocean earthquake"><span data-dcnode-id="5974" instrument_node="">2004 Indian Ocean earthquake</span></a><span data-dcnode-id="5972" instrument_node=""> (</span><a data-dcnode-id="5970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tsunami" title="Tsunami"><span data-dcnode-id="5971" instrument_node="">Tsunami</span></a><span data-dcnode-id="5969" instrument_node="">)</span></dd></dl><span data-dcnode-id="5966" instrument_node="">
</span><h3 data-dcnode-id="5956"><span class="mw-headline" data-dcnode-id="5964" id="Technological_crisis"><span data-dcnode-id="5965" instrument_node="">Technological crisis</span></span><span class="mw-editsection" data-dcnode-id="5957"><span class="mw-editsection-bracket" data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">[</span></span><a data-dcnode-id="5960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D4" title="Edit section: Technological crisis"><span data-dcnode-id="5961" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5958"><span data-dcnode-id="5959" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5955" instrument_node="">
</span><p data-dcnode-id="5935"><span data-dcnode-id="5954" instrument_node="">Technological crises are caused by human application of science and technology. Technological accidents inevitably occur when technology becomes complex and coupled and something goes wrong in the system as a whole (Technological breakdowns). Some technological crises occur when human error causes disruptions (Human breakdowns</span><sup class="reference" data-dcnode-id="5951" id="cite_ref-Coombs_8-3"><a data-dcnode-id="5952" href="#cite_note-Coombs-8"><span data-dcnode-id="5953" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5950" instrument_node="">). People tend to assign blame for a technological disaster because technology is subject to human manipulation whereas they do not hold anyone responsible for natural disaster. When an accident creates significant environmental damage, the crisis is categorized as </span><i data-dcnode-id="5948"><span data-dcnode-id="5949" instrument_node="">megadamage</span></i><span data-dcnode-id="5947" instrument_node="">.</span><sup class="reference" data-dcnode-id="5944" id="cite_ref-Coombs_8-4"><a data-dcnode-id="5945" href="#cite_note-Coombs-8"><span data-dcnode-id="5946" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5943" instrument_node=""> Samples include software failures, industrial accidents, and oil spills.</span><sup class="reference" data-dcnode-id="5940" id="cite_ref-Coombs_8-5"><a data-dcnode-id="5941" href="#cite_note-Coombs-8"><span data-dcnode-id="5942" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="5937" id="cite_ref-Lerbinger_9-2"><a data-dcnode-id="5938" href="#cite_note-Lerbinger-9"><span data-dcnode-id="5939" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5936" instrument_node="">
</span></p><span data-dcnode-id="5934" instrument_node="">
</span><dl data-dcnode-id="5923"><dd data-dcnode-id="5924"><span data-dcnode-id="5933" instrument_node="">Examples: </span><a data-dcnode-id="5931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chernobyl_disaster" title="Chernobyl disaster"><span data-dcnode-id="5932" instrument_node="">Chernobyl disaster</span></a><span data-dcnode-id="5930" instrument_node="">, </span><a data-dcnode-id="5928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exxon_Valdez_oil_spill" title="Exxon Valdez oil spill"><span data-dcnode-id="5929" instrument_node="">Exxon Valdez oil spill</span></a><span data-dcnode-id="5927" instrument_node="">, </span><a data-dcnode-id="5925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heartbleed" title="Heartbleed"><span data-dcnode-id="5926" instrument_node="">Heartbleed security bug</span></a></dd></dl><span data-dcnode-id="5922" instrument_node="">
</span><h3 data-dcnode-id="5912"><span class="mw-headline" data-dcnode-id="5920" id="Confrontation_crisis"><span data-dcnode-id="5921" instrument_node="">Confrontation crisis</span></span><span class="mw-editsection" data-dcnode-id="5913"><span class="mw-editsection-bracket" data-dcnode-id="5918"><span data-dcnode-id="5919" instrument_node="">[</span></span><a data-dcnode-id="5916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D5" title="Edit section: Confrontation crisis"><span data-dcnode-id="5917" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5914"><span data-dcnode-id="5915" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5911" instrument_node="">
</span><p data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">Confrontation crisis occur when discontented individuals and/or groups fight businesses, government, and various interest groups to win acceptance of their demands and expectations. The common type of confrontation crisis is boycotts, and other types are picketing, sit-ins, ultimatums to those in authority, blockade or occupation of buildings, and resisting or disobeying police.
</span></p><span data-dcnode-id="5908" instrument_node="">
</span><dl data-dcnode-id="5899"><dd data-dcnode-id="5900"><span data-dcnode-id="5907" instrument_node="">Example: </span><a data-dcnode-id="5905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rainbow/PUSH" title="Rainbow/PUSH"><span data-dcnode-id="5906" instrument_node="">Rainbow/PUSH</span></a><span data-dcnode-id="5904" instrument_node="">'s (People United to Serve Humanity) </span><a data-dcnode-id="5902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boycott" title="Boycott"><span data-dcnode-id="5903" instrument_node="">boycott</span></a><span data-dcnode-id="5901" instrument_node=""> of Nike</span></dd></dl><span data-dcnode-id="5898" instrument_node="">
</span><h3 data-dcnode-id="5888"><span class="mw-headline" data-dcnode-id="5896" id="Crisis_of_malevolence"><span data-dcnode-id="5897" instrument_node="">Crisis of malevolence</span></span><span class="mw-editsection" data-dcnode-id="5889"><span class="mw-editsection-bracket" data-dcnode-id="5894"><span data-dcnode-id="5895" instrument_node="">[</span></span><a data-dcnode-id="5892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D6" title="Edit section: Crisis of malevolence"><span data-dcnode-id="5893" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5890"><span data-dcnode-id="5891" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5887" instrument_node="">
</span><p data-dcnode-id="5875"><span data-dcnode-id="5886" instrument_node="">An organization faces a crisis of malevolence when opponents or miscreant individuals use criminal means or other extreme tactics for the purpose of expressing hostility or anger toward, or seeking gain from, a company, country, or economic system, perhaps with the aim of destabilizing or destroying it. Sample crises include product tampering, kidnapping, malicious rumors, terrorism, </span><a data-dcnode-id="5884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cybercrime" title="Cybercrime"><span data-dcnode-id="5885" instrument_node="">cybercrime</span></a><span data-dcnode-id="5883" instrument_node=""> and espionage.</span><sup class="reference" data-dcnode-id="5880" id="cite_ref-Coombs_8-6"><a data-dcnode-id="5881" href="#cite_note-Coombs-8"><span data-dcnode-id="5882" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="5877" id="cite_ref-Lerbinger_9-3"><a data-dcnode-id="5878" href="#cite_note-Lerbinger-9"><span data-dcnode-id="5879" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5876" instrument_node="">
</span></p><p data-dcnode-id="5870"><span data-dcnode-id="5874" instrument_node="">Example: </span><a data-dcnode-id="5872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chicago_Tylenol_murders" title="Chicago Tylenol murders"><span data-dcnode-id="5873" instrument_node="">Chicago Tylenol murders</span></a><span data-dcnode-id="5871" instrument_node="">
</span></p><span data-dcnode-id="5869" instrument_node="">
</span><h3 data-dcnode-id="5859"><span class="mw-headline" data-dcnode-id="5867" id="Crisis_of_organizational_misdeeds"><span data-dcnode-id="5868" instrument_node="">Crisis of organizational misdeeds</span></span><span class="mw-editsection" data-dcnode-id="5860"><span class="mw-editsection-bracket" data-dcnode-id="5865"><span data-dcnode-id="5866" instrument_node="">[</span></span><a data-dcnode-id="5863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D7" title="Edit section: Crisis of organizational misdeeds"><span data-dcnode-id="5864" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5861"><span data-dcnode-id="5862" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5858" instrument_node="">
</span><p data-dcnode-id="5848"><span data-dcnode-id="5857" instrument_node="">Crises occur when management takes actions it knows will harm or place stakeholders at risk for harm without adequate precautions.</span><sup class="reference" data-dcnode-id="5854" id="cite_ref-Coombs_8-7"><a data-dcnode-id="5855" href="#cite_note-Coombs-8"><span data-dcnode-id="5856" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5853" instrument_node=""> Lerbinger</span><sup class="reference" data-dcnode-id="5850" id="cite_ref-Lerbinger_9-4"><a data-dcnode-id="5851" href="#cite_note-Lerbinger-9"><span data-dcnode-id="5852" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5849" instrument_node=""> specified three different types of crises of organizational misdeeds: crises of skewed management values, crises of deception, and crises of management misconduct.
</span></p><span data-dcnode-id="5847" instrument_node="">
</span><h4 data-dcnode-id="5837"><span class="mw-headline" data-dcnode-id="5845" id="Crisis_of_skewed_management_values"><span data-dcnode-id="5846" instrument_node="">Crisis of skewed management values</span></span><span class="mw-editsection" data-dcnode-id="5838"><span class="mw-editsection-bracket" data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">[</span></span><a data-dcnode-id="5841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D8" title="Edit section: Crisis of skewed management values"><span data-dcnode-id="5842" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5839"><span data-dcnode-id="5840" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5836" instrument_node="">
</span><p data-dcnode-id="5834"><span data-dcnode-id="5835" instrument_node="">Crises of skewed management values are caused when managers favor short-term economic gain and neglect broader social values and stakeholders other than investors. This state of lopsided values is rooted in the classical business creed that focuses on the interests of stockholders and tends to disregard the interests of its other stakeholders such as customers, employees, and the community
</span></p><span data-dcnode-id="5833" instrument_node="">
</span><dl data-dcnode-id="5822"><dd data-dcnode-id="5823"><span data-dcnode-id="5832" instrument_node="">Example:</span><sup class="noprint Inline-Template" data-dcnode-id="5824" style="white-space:nowrap;"><span data-dcnode-id="5831" instrument_node="">[</span><i data-dcnode-id="5826"><a class="mw-redirect" data-dcnode-id="5827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAUDIENCE" title="Wikipedia:AUDIENCE"><span data-dcnode-id="5828" title="An editor has requested that an example be provided. (February 2019)"><span data-dcnode-id="5829" style="padding-right:0.1em;"><span data-dcnode-id="5830" instrument_node="">example  needed</span></span></span></a></i><span data-dcnode-id="5825" instrument_node="">]</span></sup></dd></dl><span data-dcnode-id="5821" instrument_node="">
</span><p data-dcnode-id="5810"><b data-dcnode-id="5819"><span data-dcnode-id="5820" instrument_node="">It has 3 stages</span></b><sup class="noprint Inline-Template" data-dcnode-id="5812" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="5818" instrument_node="">[</span><i data-dcnode-id="5814"><a data-dcnode-id="5815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="5816" title="The text near this tag may need clarification or removal of jargon. (February 2013)"><span data-dcnode-id="5817" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="5813" instrument_node="">]</span></sup><span data-dcnode-id="5811" instrument_node="">
-precrisis
-acute
-chronic and
-conflict resolution
</span></p><span data-dcnode-id="5809" instrument_node="">
</span><h4 data-dcnode-id="5799"><span class="mw-headline" data-dcnode-id="5807" id="Crisis_of_deception"><span data-dcnode-id="5808" instrument_node="">Crisis of deception</span></span><span class="mw-editsection" data-dcnode-id="5800"><span class="mw-editsection-bracket" data-dcnode-id="5805"><span data-dcnode-id="5806" instrument_node="">[</span></span><a data-dcnode-id="5803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D9" title="Edit section: Crisis of deception"><span data-dcnode-id="5804" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5801"><span data-dcnode-id="5802" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5798" instrument_node="">
</span><p data-dcnode-id="5796"><span data-dcnode-id="5797" instrument_node="">Crisis of deception occur when management conceals or misrepresents information about itself and its products in its dealing with consumers and others.
</span></p><span data-dcnode-id="5795" instrument_node="">
</span><dl data-dcnode-id="5790"><dd data-dcnode-id="5791"><span data-dcnode-id="5794" instrument_node="">Example: </span><a data-dcnode-id="5792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dow_Corning%23Breast_implant_controversy" title="Dow Corning"><span data-dcnode-id="5793" instrument_node="">Dow Corning’s silicone-gel breast implant</span></a></dd></dl><span data-dcnode-id="5789" instrument_node="">
</span><h4 data-dcnode-id="5779"><span class="mw-headline" data-dcnode-id="5787" id="Crisis_of_management_misconduct"><span data-dcnode-id="5788" instrument_node="">Crisis of management misconduct</span></span><span class="mw-editsection" data-dcnode-id="5780"><span class="mw-editsection-bracket" data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">[</span></span><a data-dcnode-id="5783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D10" title="Edit section: Crisis of management misconduct"><span data-dcnode-id="5784" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5781"><span data-dcnode-id="5782" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5778" instrument_node="">
</span><p data-dcnode-id="5776"><span data-dcnode-id="5777" instrument_node="">Some crises are caused not only by skewed values and deception but deliberate amorality and illegality.
</span></p><span data-dcnode-id="5775" instrument_node="">
</span><h3 data-dcnode-id="5765"><span class="mw-headline" data-dcnode-id="5773" id="Workplace_violence"><span data-dcnode-id="5774" instrument_node="">Workplace violence</span></span><span class="mw-editsection" data-dcnode-id="5766"><span class="mw-editsection-bracket" data-dcnode-id="5771"><span data-dcnode-id="5772" instrument_node="">[</span></span><a data-dcnode-id="5769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D11" title="Edit section: Workplace violence"><span data-dcnode-id="5770" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5767"><span data-dcnode-id="5768" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5764" instrument_node="">
</span><p data-dcnode-id="5762"><span data-dcnode-id="5763" instrument_node="">Crises occur when an employee or former employee commits violence against other employees on organizational grounds.
</span></p><span data-dcnode-id="5761" instrument_node="">
</span><dl data-dcnode-id="5750"><dd data-dcnode-id="5751"><span data-dcnode-id="5760" instrument_node="">Example:</span><sup class="noprint Inline-Template" data-dcnode-id="5752" style="white-space:nowrap;"><span data-dcnode-id="5759" instrument_node="">[</span><i data-dcnode-id="5754"><a class="mw-redirect" data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAUDIENCE" title="Wikipedia:AUDIENCE"><span data-dcnode-id="5756" title="An editor has requested that an example be provided. (February 2019)"><span data-dcnode-id="5757" style="padding-right:0.1em;"><span data-dcnode-id="5758" instrument_node="">example  needed</span></span></span></a></i><span data-dcnode-id="5753" instrument_node="">]</span></sup></dd></dl><span data-dcnode-id="5749" instrument_node="">
</span><h3 data-dcnode-id="5739"><span class="mw-headline" data-dcnode-id="5747" id="Rumors"><span data-dcnode-id="5748" instrument_node="">Rumors</span></span><span class="mw-editsection" data-dcnode-id="5740"><span class="mw-editsection-bracket" data-dcnode-id="5745"><span data-dcnode-id="5746" instrument_node="">[</span></span><a data-dcnode-id="5743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D12" title="Edit section: Rumors"><span data-dcnode-id="5744" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5741"><span data-dcnode-id="5742" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5738" instrument_node="">
</span><p data-dcnode-id="5732"><span data-dcnode-id="5737" instrument_node="">False information about an organization or its products creates crisis hurting the organization's reputation. Sample is linking the organization to radical groups or stories that their products are contaminated.</span><sup class="reference" data-dcnode-id="5734" id="cite_ref-Coombs_8-8"><a data-dcnode-id="5735" href="#cite_note-Coombs-8"><span data-dcnode-id="5736" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5733" instrument_node="">
</span></p><span data-dcnode-id="5731" instrument_node="">
</span><dl data-dcnode-id="5726"><dd data-dcnode-id="5727"><span data-dcnode-id="5730" instrument_node="">Example: </span><a data-dcnode-id="5728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Procter_%2526_Gamble%23Logo_myth" title="Procter &amp; Gamble"><span data-dcnode-id="5729" instrument_node="">Procter &amp; Gamble logo myth</span></a></dd></dl><span data-dcnode-id="5725" instrument_node="">
</span><h3 data-dcnode-id="5714"><span data-dcnode-id="5724" id="Terrorist_attacks.2Fman-made_disasters"></span><span class="mw-headline" data-dcnode-id="5722" id="Terrorist_attacks/man-made_disasters"><span data-dcnode-id="5723" instrument_node="">Terrorist attacks/man-made disasters</span></span><span class="mw-editsection" data-dcnode-id="5715"><span class="mw-editsection-bracket" data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">[</span></span><a data-dcnode-id="5718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D13" title="Edit section: Terrorist attacks/man-made disasters"><span data-dcnode-id="5719" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5716"><span data-dcnode-id="5717" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5713" instrument_node="">
</span><p data-dcnode-id="5711"><span data-dcnode-id="5712" instrument_node="">These occur when the crisis was triggered by people, for example global financial crises, transportation accidents, massive destruction.
</span></p><span data-dcnode-id="5710" instrument_node="">
</span><h2 data-dcnode-id="5700"><span class="mw-headline" data-dcnode-id="5708" id="Crisis_leadership"><span data-dcnode-id="5709" instrument_node="">Crisis leadership</span></span><span class="mw-editsection" data-dcnode-id="5701"><span class="mw-editsection-bracket" data-dcnode-id="5706"><span data-dcnode-id="5707" instrument_node="">[</span></span><a data-dcnode-id="5704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D14" title="Edit section: Crisis leadership"><span data-dcnode-id="5705" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5702"><span data-dcnode-id="5703" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5699" instrument_node="">
</span><p data-dcnode-id="5689"><span data-dcnode-id="5698" instrument_node="">Alan Hilburg, a pioneer in crisis management, defines organizational crises as categorized as either acute crises or chronic crises. Hilburg also created the concept of the Crisis Arc. Erika Hayes James, an organizational psychologist at the University of Virginia's Darden Graduate School of Business, identifies two primary types of organizational crisis.</span><sup class="reference" data-dcnode-id="5695" id="cite_ref-Crisis_Leadership_10-0"><a data-dcnode-id="5696" href="#cite_note-Crisis_Leadership-10"><span data-dcnode-id="5697" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5694" instrument_node=""> James defines organizational crisis as "any emotionally charged situation that, once it becomes public, invites negative stakeholder reaction and thereby has the potential to threaten the financial well-being, reputation, or survival of the firm or some portion thereof".</span><sup class="reference" data-dcnode-id="5691" id="cite_ref-James_11-0"><a data-dcnode-id="5692" href="#cite_note-James-11"><span data-dcnode-id="5693" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5690" instrument_node="">
</span></p><span data-dcnode-id="5688" instrument_node="">
</span><ol data-dcnode-id="5682"><li data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">Sudden crisis</span></li><span data-dcnode-id="5685" instrument_node="">
</span><li data-dcnode-id="5683"><span data-dcnode-id="5684" instrument_node="">Smoldering crises</span></li></ol><span data-dcnode-id="5681" instrument_node="">
</span><h3 data-dcnode-id="5671"><span class="mw-headline" data-dcnode-id="5679" id="Sudden_crisis"><span data-dcnode-id="5680" instrument_node="">Sudden crisis</span></span><span class="mw-editsection" data-dcnode-id="5672"><span class="mw-editsection-bracket" data-dcnode-id="5677"><span data-dcnode-id="5678" instrument_node="">[</span></span><a data-dcnode-id="5675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D15" title="Edit section: Sudden crisis"><span data-dcnode-id="5676" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5673"><span data-dcnode-id="5674" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5670" instrument_node="">
</span><p data-dcnode-id="5668"><span data-dcnode-id="5669" instrument_node="">Sudden crises are circumstances that occur without warning and beyond an institution's control.  Consequently, sudden crises are most often situations for which the institution and its leadership are not blamed.
</span></p><span data-dcnode-id="5667" instrument_node="">
</span><h3 data-dcnode-id="5657"><span class="mw-headline" data-dcnode-id="5665" id="Smoldering_crisis"><span data-dcnode-id="5666" instrument_node="">Smoldering crisis</span></span><span class="mw-editsection" data-dcnode-id="5658"><span class="mw-editsection-bracket" data-dcnode-id="5663"><span data-dcnode-id="5664" instrument_node="">[</span></span><a data-dcnode-id="5661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D16" title="Edit section: Smoldering crisis"><span data-dcnode-id="5662" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5659"><span data-dcnode-id="5660" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5656" instrument_node="">
</span><p data-dcnode-id="5650"><span data-dcnode-id="5655" instrument_node="">Smoldering crises differ from sudden crises in that they begin as minor internal issues that, due to manager's negligence, develop to crisis status. These are situations when leaders are blamed for the crisis and its subsequent effect on the institution in question.
</span><sup class="reference" data-dcnode-id="5652" id="cite_ref-James_11-1"><a data-dcnode-id="5653" href="#cite_note-James-11"><span data-dcnode-id="5654" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5651" instrument_node="">
</span></p><p data-dcnode-id="5640"><span data-dcnode-id="5649" instrument_node="">James categorises five phases of crisis that require specific crisis leadership competencies.</span><sup class="reference" data-dcnode-id="5646" id="cite_ref-James_11-2"><a data-dcnode-id="5647" href="#cite_note-James-11"><span data-dcnode-id="5648" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5645" instrument_node=""> Each phase contains an obstacle that a leader must overcome to improve the structure and operations of an organization. James's case study on crisis in the financial services sector, for example, explores why crisis events erode public trust in leadership.  James's research demonstrates how leadership competencies of integrity, positive intent, capability, mutual respect, and transparency impact the trust-building process.</span><sup class="reference" data-dcnode-id="5642" id="cite_ref-12"><a data-dcnode-id="5643" href="#cite_note-12"><span data-dcnode-id="5644" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5641" instrument_node="">
</span></p><span data-dcnode-id="5639" instrument_node="">
</span><ol data-dcnode-id="5624"><li data-dcnode-id="5637"><span data-dcnode-id="5638" instrument_node="">Signal detection</span></li><span data-dcnode-id="5636" instrument_node="">
</span><li data-dcnode-id="5634"><span data-dcnode-id="5635" instrument_node="">Preparation and prevention</span></li><span data-dcnode-id="5633" instrument_node="">
</span><li data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">Containment and damage control</span></li><span data-dcnode-id="5630" instrument_node="">
</span><li data-dcnode-id="5628"><span data-dcnode-id="5629" instrument_node="">Business recovery</span></li><span data-dcnode-id="5627" instrument_node="">
</span><li data-dcnode-id="5625"><span data-dcnode-id="5626" instrument_node="">Learning</span></li></ol><span data-dcnode-id="5623" instrument_node="">
</span><h3 data-dcnode-id="5613"><span class="mw-headline" data-dcnode-id="5621" id="Signal_detection"><span data-dcnode-id="5622" instrument_node="">Signal detection</span></span><span class="mw-editsection" data-dcnode-id="5614"><span class="mw-editsection-bracket" data-dcnode-id="5619"><span data-dcnode-id="5620" instrument_node="">[</span></span><a data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D17" title="Edit section: Signal detection"><span data-dcnode-id="5618" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5615"><span data-dcnode-id="5616" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5612" instrument_node="">
</span><p data-dcnode-id="5610"><span data-dcnode-id="5611" instrument_node="">Signal detection is the stage in a crisis in which leaders should, but do not always, sense early warning signals (red flags) that suggest the possibility of a crisis. The detection stages of a crisis include:
</span></p><span data-dcnode-id="5609" instrument_node="">
</span><ul data-dcnode-id="5603"><li data-dcnode-id="5607"><span data-dcnode-id="5608" instrument_node="">Sense-making: represents an attempt to create order and make sense, retrospectively, of what occurs.</span></li><span data-dcnode-id="5606" instrument_node="">
</span><li data-dcnode-id="5604"><span data-dcnode-id="5605" instrument_node="">Perspective-taking: the ability to consider another person's or group's point of view.</span></li></ul><span data-dcnode-id="5602" instrument_node="">
</span><h3 data-dcnode-id="5592"><span class="mw-headline" data-dcnode-id="5600" id="Preparation_and_prevention"><span data-dcnode-id="5601" instrument_node="">Preparation and prevention</span></span><span class="mw-editsection" data-dcnode-id="5593"><span class="mw-editsection-bracket" data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">[</span></span><a data-dcnode-id="5596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D18" title="Edit section: Preparation and prevention"><span data-dcnode-id="5597" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5594"><span data-dcnode-id="5595" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5591" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="5585" role="note"><span data-dcnode-id="5588" instrument_node="">See also: </span><a data-dcnode-id="5586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pandemic_prevention" title="Pandemic prevention"><span data-dcnode-id="5587" instrument_node="">Pandemic prevention</span></a></div><span data-dcnode-id="5584" instrument_node="">
</span><p data-dcnode-id="5565"><span data-dcnode-id="5583" instrument_node="">It is during this stage that crisis handlers begin preparing for or averting the crisis that had been foreshadowed in the signal detection stage. Hilburg has demonstrated that using an impact/probability model allows organizations to fairly accurately predict crisis scenarios.  He's recognized the greatest organizational challenge is 'speaking truth to power' to predict truly worst-case scenarios.  Organizations such as the </span><a class="mw-redirect" data-dcnode-id="5581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Cross" title="Red Cross"><span data-dcnode-id="5582" instrument_node="">Red Cross</span></a><span data-dcnode-id="5580" instrument_node="">'s primary mission is to prepare for and prevent the escalation of crisis events. Walmart has been described as an emergency-relief standard bearer</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5573" style="white-space:nowrap;"><span data-dcnode-id="5579" instrument_node="">[</span><i data-dcnode-id="5575"><a data-dcnode-id="5576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5577" title="This claim needs references to reliable sources. (January 2012)"><span data-dcnode-id="5578" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5574" instrument_node="">]</span></sup><span data-dcnode-id="5572" instrument_node=""> after having witnessed the incredibly speedy and well-coordinated effort to get supplies to the </span><a data-dcnode-id="5570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulf_Coast_of_the_United_States" title="Gulf Coast of the United States"><span data-dcnode-id="5571" instrument_node="">Gulf Coast of the United States</span></a><span data-dcnode-id="5569" instrument_node=""> in anticipation of </span><a data-dcnode-id="5567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hurricane_Katrina" title="Hurricane Katrina"><span data-dcnode-id="5568" instrument_node="">Hurricane Katrina</span></a><span data-dcnode-id="5566" instrument_node="">.
</span></p><span data-dcnode-id="5564" instrument_node="">
</span><h3 data-dcnode-id="5554"><span class="mw-headline" data-dcnode-id="5562" id="Containment_and_damage_control"><span data-dcnode-id="5563" instrument_node="">Containment and damage control</span></span><span class="mw-editsection" data-dcnode-id="5555"><span class="mw-editsection-bracket" data-dcnode-id="5560"><span data-dcnode-id="5561" instrument_node="">[</span></span><a data-dcnode-id="5558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D19" title="Edit section: Containment and damage control"><span data-dcnode-id="5559" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5556"><span data-dcnode-id="5557" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5553" instrument_node="">
</span><p data-dcnode-id="5551"><span data-dcnode-id="5552" instrument_node="">Usually the most vivid stage, the goal of crisis containment and damage control is to limit the reputational, financial, safety, and other threats to firm survival.  Crisis handlers work diligently during this stage to bring the crisis to an end as quickly as possible to limit the negative publicity to the organization, and move into the business recovery phase.
</span></p><span data-dcnode-id="5550" instrument_node="">
</span><h3 data-dcnode-id="5532"><span data-dcnode-id="5549" id="Business_recovery.5Bcheck_spelling.5D"></span><span class="mw-headline" data-dcnode-id="5540" id="Business_recovery[check_spelling]"><span data-dcnode-id="5548" instrument_node="">Business recovery</span><sup class="noprint Inline-Template" data-dcnode-id="5541" style="white-space:nowrap;"><span data-dcnode-id="5547" instrument_node="">[</span><i data-dcnode-id="5543"><a data-dcnode-id="5544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3ATypo_help_inline" title="Template:Typo help inline"><span data-dcnode-id="5545" title="similar to recovery (February 2020)"><span data-dcnode-id="5546" instrument_node="">check spelling</span></span></a></i><span data-dcnode-id="5542" instrument_node="">]</span></sup></span><span class="mw-editsection" data-dcnode-id="5533"><span class="mw-editsection-bracket" data-dcnode-id="5538"><span data-dcnode-id="5539" instrument_node="">[</span></span><a data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D20" title="Edit section: Business recovery[check spelling]"><span data-dcnode-id="5537" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5534"><span data-dcnode-id="5535" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5531" instrument_node="">
</span><p data-dcnode-id="5529"><span data-dcnode-id="5530" instrument_node="">When a crisis hits, organizations must be able to carry on with their business in the midst of the crisis while simultaneously planning for how they will recover from the damage the crisis caused. Crisis handlers not only engage in continuity planning (determining the people, financial, and technology resources needed to keep the organization running), but will also actively pursue organizational resilience.
</span></p><span data-dcnode-id="5528" instrument_node="">
</span><h3 data-dcnode-id="5518"><span class="mw-headline" data-dcnode-id="5526" id="Learning"><span data-dcnode-id="5527" instrument_node="">Learning</span></span><span class="mw-editsection" data-dcnode-id="5519"><span class="mw-editsection-bracket" data-dcnode-id="5524"><span data-dcnode-id="5525" instrument_node="">[</span></span><a data-dcnode-id="5522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D21" title="Edit section: Learning"><span data-dcnode-id="5523" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5520"><span data-dcnode-id="5521" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5517" instrument_node="">
</span><p data-dcnode-id="5515"><span data-dcnode-id="5516" instrument_node="">In the wake of a crisis, organizational decision makers adopt a learning orientation and use prior experience to develop new routines and behaviors that ultimately change the way the organization operates. The best leaders recognize this and are purposeful and skillful in finding the learning opportunities inherent in every crisis situation.
</span></p><span data-dcnode-id="5514" instrument_node="">
</span><h3 data-dcnode-id="5504"><span class="mw-headline" data-dcnode-id="5512" id="Crisis_communication"><span data-dcnode-id="5513" instrument_node="">Crisis communication</span></span><span class="mw-editsection" data-dcnode-id="5505"><span class="mw-editsection-bracket" data-dcnode-id="5510"><span data-dcnode-id="5511" instrument_node="">[</span></span><a data-dcnode-id="5508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D22" title="Edit section: Crisis communication"><span data-dcnode-id="5509" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5506"><span data-dcnode-id="5507" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5503" instrument_node="">
</span><link data-dcnode-id="5502" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5498" role="note"><span data-dcnode-id="5501" instrument_node="">Main article: </span><a data-dcnode-id="5499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crisis_communication" title="Crisis communication"><span data-dcnode-id="5500" instrument_node="">Crisis communication</span></a></div><span data-dcnode-id="5497" instrument_node="">
</span><p data-dcnode-id="5491"><span data-dcnode-id="5496" instrument_node="">The effort taken by an organization to communicate with the public and stakeholders when an unexpected event occurs that could have a negative impact on the organization's reputation. This can also refer to the efforts to inform employees or the public of a potential hazard which could have a catastrophic impact.  There are 3 essential steps that an organization can take to prepare for and withstand a communications crisis: 1) Define your philosophy; 2) Assess your vulnerabilities; 3) Develop a protocol.</span><sup class="reference" data-dcnode-id="5493" id="cite_ref-13"><a data-dcnode-id="5494" href="#cite_note-13"><span data-dcnode-id="5495" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5492" instrument_node="">
</span></p><span data-dcnode-id="5490" instrument_node="">
</span><h2 data-dcnode-id="5480"><span class="mw-headline" data-dcnode-id="5488" id="Models_and_theories_associated_with_crisis_management"><span data-dcnode-id="5489" instrument_node="">Models and theories associated with crisis management</span></span><span class="mw-editsection" data-dcnode-id="5481"><span class="mw-editsection-bracket" data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">[</span></span><a data-dcnode-id="5484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D23" title="Edit section: Models and theories associated with crisis management"><span data-dcnode-id="5485" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5482"><span data-dcnode-id="5483" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5479" instrument_node="">
</span><h3 data-dcnode-id="5469"><span class="mw-headline" data-dcnode-id="5477" id="Crisis_Management_Strategy"><span data-dcnode-id="5478" instrument_node="">Crisis Management Strategy</span></span><span class="mw-editsection" data-dcnode-id="5470"><span class="mw-editsection-bracket" data-dcnode-id="5475"><span data-dcnode-id="5476" instrument_node="">[</span></span><a data-dcnode-id="5473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D24" title="Edit section: Crisis Management Strategy"><span data-dcnode-id="5474" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5471"><span data-dcnode-id="5472" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5468" instrument_node="">
</span><p data-dcnode-id="5462"><span data-dcnode-id="5467" instrument_node="">Crisis management strategy (CMS)</span><sup class="reference" data-dcnode-id="5464" id="cite_ref-14"><a data-dcnode-id="5465" href="#cite_note-14"><span data-dcnode-id="5466" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5463" instrument_node=""> is corporate development strategy designed primarily to prevent crisis for follow-up company advancement. Thus, CMS is synthesis of strategic management. It includes projection of the future based on ongoing monitoring of business internal and external environment, as well as selection and implementation of crisis prevention strategy and operating management. This is including current status control based on ongoing monitoring of the internal and external environment, as well as crisis-coping strategy selection and implementation.
</span></p><span data-dcnode-id="5461" instrument_node="">
</span><h3 data-dcnode-id="5451"><span class="mw-headline" data-dcnode-id="5459" id="Crisis_Management_Model"><span data-dcnode-id="5460" instrument_node="">Crisis Management Model</span></span><span class="mw-editsection" data-dcnode-id="5452"><span class="mw-editsection-bracket" data-dcnode-id="5457"><span data-dcnode-id="5458" instrument_node="">[</span></span><a data-dcnode-id="5455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D25" title="Edit section: Crisis Management Model"><span data-dcnode-id="5456" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5453"><span data-dcnode-id="5454" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5450" instrument_node="">
</span><p data-dcnode-id="5448"><span data-dcnode-id="5449" instrument_node="">Successfully managing a crisis requires an understanding of how to handle a crisis – beginning with before they occur. Alan Hilburg speaks about a crisis arc.  The arc consists of crisis avoidance, crisis mitigation and crisis recovery. Gonzalez-Herrero and Pratt found the different phases of Crisis Management.
</span></p><p data-dcnode-id="5446"><span data-dcnode-id="5447" instrument_node="">There are 3 phases in any Crisis Management as shown below
</span></p><span data-dcnode-id="5445" instrument_node="">
</span><ol data-dcnode-id="5436"><li data-dcnode-id="5443"><span data-dcnode-id="5444" instrument_node="">The diagnosis of the impending trouble or the danger signals.</span></li><span data-dcnode-id="5442" instrument_node="">
</span><li data-dcnode-id="5440"><span data-dcnode-id="5441" instrument_node="">Choosing appropriate Turnaround Strategy.</span></li><span data-dcnode-id="5439" instrument_node="">
</span><li data-dcnode-id="5437"><span data-dcnode-id="5438" instrument_node="">Implementation of the change process and its monitoring</span></li></ol><span data-dcnode-id="5435" instrument_node="">
</span><h3 data-dcnode-id="5425"><span class="mw-headline" data-dcnode-id="5433" id="Crisis_Management_Planning"><span data-dcnode-id="5434" instrument_node="">Crisis Management Planning</span></span><span class="mw-editsection" data-dcnode-id="5426"><span class="mw-editsection-bracket" data-dcnode-id="5431"><span data-dcnode-id="5432" instrument_node="">[</span></span><a data-dcnode-id="5429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D26" title="Edit section: Crisis Management Planning"><span data-dcnode-id="5430" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5427"><span data-dcnode-id="5428" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5424" instrument_node="">
</span><p data-dcnode-id="5418"><span data-dcnode-id="5423" instrument_node="">No corporation looks forward to facing a situation that causes a significant disruption to their business, especially one that stimulates extensive media coverage. Public scrutiny can result in a negative financial, political, legal and government impact. Crisis management planning deals with providing the best response to a crisis.</span><sup class="reference" data-dcnode-id="5420" id="cite_ref-12Manage_15-0"><a data-dcnode-id="5421" href="#cite_note-12Manage-15"><span data-dcnode-id="5422" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5419" instrument_node="">
</span></p><p data-dcnode-id="5412"><span data-dcnode-id="5417" instrument_node="">With the growing threat of cyber attacks, "traditional information technology incident response plans often fail to consider the cross-organizational activities that need to be performed to remain resilient when a major cyber crisis occurs, resulting in a delayed, chaotic, unstructured, and fragmented response.  A cyber crisis management plan is designed to reduce these risks through careful pre-planning; therefore, developing a cyber crisis management plan requires organizations to take a holistic approach to cyber crisis planning.  By proactively acting to build a cyber crisis management plan, a broader, carefully considered, integrated and validated plan can be developed to meet an organization's unique demands before the crisis strikes."</span><sup class="reference" data-dcnode-id="5414" id="cite_ref-Cyber_Crisis_Management_Planning_16-0"><a data-dcnode-id="5415" href="#cite_note-Cyber_Crisis_Management_Planning-16"><span data-dcnode-id="5416" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5413" instrument_node="">
</span></p><span data-dcnode-id="5411" instrument_node="">
</span><h3 data-dcnode-id="5401"><span class="mw-headline" data-dcnode-id="5409" id="Contingency_Planning"><span data-dcnode-id="5410" instrument_node="">Contingency Planning</span></span><span class="mw-editsection" data-dcnode-id="5402"><span class="mw-editsection-bracket" data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">[</span></span><a data-dcnode-id="5405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D27" title="Edit section: Contingency Planning"><span data-dcnode-id="5406" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5403"><span data-dcnode-id="5404" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5400" instrument_node="">
</span><p data-dcnode-id="5391"><span data-dcnode-id="5399" instrument_node="">Preparing contingency plans in advance, as part of a crisis-management plan, is the first step to ensuring an organization is appropriately prepared for a crisis. Crisis-management teams can rehearse a </span><a data-dcnode-id="5397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crisis_plan" title="Crisis plan"><span data-dcnode-id="5398" instrument_node="">crisis plan</span></a><span data-dcnode-id="5396" instrument_node=""> by developing a simulated scenario to use as a drill. The plan should clearly stipulate that the only people to speak to publicly about the crisis are the designated persons, such as the company spokesperson or crisis team members. Ideally it should be one spokesperson who can be available on call at any time. Cooperation with media is crucial in crisis situation, assure that all questions are answered on time and information on what was done to resolve the situation is provided. The first hours after a crisis breaks are the most crucial, so working with speed and efficiency is important, and the plan should indicate how quickly each function should be performed. When preparing to offer a statement externally as well as internally, information should be accurate and transparent. Providing incorrect or manipulated information has a tendency to backfire and will greatly exacerbate the situation. The contingency plan should contain information and guidance that will help decision makers to consider not only the short-term consequences, but the long-term effects of every decision.</span><sup class="reference" data-dcnode-id="5393" id="cite_ref-12Manage_15-1"><a data-dcnode-id="5394" href="#cite_note-12Manage-15"><span data-dcnode-id="5395" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5392" instrument_node="">
</span></p><span data-dcnode-id="5390" instrument_node="">
</span><h3 data-dcnode-id="5380"><span class="mw-headline" data-dcnode-id="5388" id="Business_Continuity_Planning"><span data-dcnode-id="5389" instrument_node="">Business Continuity Planning</span></span><span class="mw-editsection" data-dcnode-id="5381"><span class="mw-editsection-bracket" data-dcnode-id="5386"><span data-dcnode-id="5387" instrument_node="">[</span></span><a data-dcnode-id="5384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D28" title="Edit section: Business Continuity Planning"><span data-dcnode-id="5385" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5382"><span data-dcnode-id="5383" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5379" instrument_node="">
</span><p data-dcnode-id="5373"><span data-dcnode-id="5378" instrument_node="">When a crisis will undoubtedly cause a significant disruption to an organization, a business continuity plan can help minimize the disruption. First, one must identify the critical functions and processes that are necessary to keep the organization running.</span><sup class="reference" data-dcnode-id="5375" id="cite_ref-17"><a data-dcnode-id="5376" href="#cite_note-17"><span data-dcnode-id="5377" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5374" instrument_node=""> This part of the planning should be conducted in the earliest stages, and is part of a business impact analysis phase that will signpost "How much does the organization stand to lose?” (Osborne, A. (2007).  Practical Business Continuity Management.  Business Management: Top tips for effective, real-world Business Continuity Management).
</span></p><p data-dcnode-id="5367"><span data-dcnode-id="5372" instrument_node="">Each critical function and or/process must have its own contingency plan in the event that one of the functions/processes ceases or fails, then the business/organization is more resilient, which in itself provides a mechanism to lessen the possibility of having to invoke recovery plans (Osborne, 2007). Testing these contingency plans by rehearsing the required actions in a simulation will allow those involved to become more acutely aware of the possibility of a crisis. As a result, and in the event of an actual crisis, the team members will act more quickly and effectively.</span><sup class="reference" data-dcnode-id="5369" id="cite_ref-12Manage_15-2"><a data-dcnode-id="5370" href="#cite_note-12Manage-15"><span data-dcnode-id="5371" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5368" instrument_node="">
</span></p><p data-dcnode-id="5361"><span data-dcnode-id="5366" instrument_node="">A note of caution when planning training scenarios, all too often simulations can lack ingenuity, an appropriate level of realism and as a consequence potentially lose their training value.   This part can be improved by employing external exercise designers who are not part of the organisational culture and are able to test an organizations response to crisis, in order to bring about a crisis of confidence for those who manage vital systems.</span><sup class="reference" data-dcnode-id="5363" id="cite_ref-18"><a data-dcnode-id="5364" href="#cite_note-18"><span data-dcnode-id="5365" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5362" instrument_node="">
</span></p><p data-dcnode-id="5355"><span data-dcnode-id="5360" instrument_node="">Following a simulation exercise, a thorough and systematic debriefing must be conducted as a key component of any crisis simulation.  The purpose of this is to create a link and draw lessons from the reality of the simulated representation and the reality of the real world.</span><sup class="reference" data-dcnode-id="5357" id="cite_ref-19"><a data-dcnode-id="5358" href="#cite_note-19"><span data-dcnode-id="5359" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5356" instrument_node="">
</span></p><p data-dcnode-id="5349"><span data-dcnode-id="5354" instrument_node="">The whole process relating to business continuity planning should be periodically reviewed to identify any number of changes that may invalidate the current plan.</span><sup class="reference" data-dcnode-id="5351" id="cite_ref-20"><a data-dcnode-id="5352" href="#cite_note-20"><span data-dcnode-id="5353" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5350" instrument_node="">
</span></p><span data-dcnode-id="5348" instrument_node="">
</span><h3 data-dcnode-id="5338"><span class="mw-headline" data-dcnode-id="5346" id="Structural-Functional_systems_theory"><span data-dcnode-id="5347" instrument_node="">Structural-Functional systems theory</span></span><span class="mw-editsection" data-dcnode-id="5339"><span class="mw-editsection-bracket" data-dcnode-id="5344"><span data-dcnode-id="5345" instrument_node="">[</span></span><a data-dcnode-id="5342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D29" title="Edit section: Structural-Functional systems theory"><span data-dcnode-id="5343" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5340"><span data-dcnode-id="5341" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5337" instrument_node="">
</span><p data-dcnode-id="5331"><span data-dcnode-id="5336" instrument_node="">Providing information to an organization in a time of crisis is critical to effective crisis management. Structural-functional systems theory addresses the intricacies of information networks and levels of command making up organizational communication. The structural-functional theory identifies information flow in organizations as "networks" made up of members ". Information in organizations flow in patterns called networks.</span><sup class="reference" data-dcnode-id="5333" id="cite_ref-Infante97_21-0"><a data-dcnode-id="5334" href="#cite_note-Infante97-21"><span data-dcnode-id="5335" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5332" instrument_node="">
</span></p><span data-dcnode-id="5330" instrument_node="">
</span><h3 data-dcnode-id="5320"><span class="mw-headline" data-dcnode-id="5328" id="Diffusion_of_innovation_theory"><span data-dcnode-id="5329" instrument_node="">Diffusion of innovation theory</span></span><span class="mw-editsection" data-dcnode-id="5321"><span class="mw-editsection-bracket" data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">[</span></span><a data-dcnode-id="5324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D30" title="Edit section: Diffusion of innovation theory"><span data-dcnode-id="5325" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5319" instrument_node="">
</span><p data-dcnode-id="5314"><span data-dcnode-id="5318" instrument_node="">Another theory that can be applied to the sharing of information is Diffusion of Innovation Theory. Developed by </span><a data-dcnode-id="5316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Everett_Rogers" title="Everett Rogers"><span data-dcnode-id="5317" instrument_node="">Everett Rogers</span></a><span data-dcnode-id="5315" instrument_node="">, the theory describes how innovation is disseminated and communicated through certain channels over a period of time. Diffusion of innovation in communication occurs when an individual communicates a new idea to one or several others. At its most elementary form, the process involves: (1) an innovation, (2) an individual or other unit of adoption that has knowledge of or experience with using the innovation, (3) another individual or other unit that does not yet have knowledge of the innovation, and (4) a communication channel connecting the two units. A communication channel is the means by which messages get from one individual to another.
</span></p><span data-dcnode-id="5313" instrument_node="">
