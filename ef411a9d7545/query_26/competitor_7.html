</span><h3 data-dcnode-id="5303"><span class="mw-headline" data-dcnode-id="5311" id="Role_of_apologies_in_crisis_management"><span data-dcnode-id="5312" instrument_node="">Role of apologies in crisis management</span></span><span class="mw-editsection" data-dcnode-id="5304"><span class="mw-editsection-bracket" data-dcnode-id="5309"><span data-dcnode-id="5310" instrument_node="">[</span></span><a data-dcnode-id="5307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D31" title="Edit section: Role of apologies in crisis management"><span data-dcnode-id="5308" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5305"><span data-dcnode-id="5306" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5302" instrument_node="">
</span><p data-dcnode-id="5296"><span data-dcnode-id="5301" instrument_node="">There has been debate about the role of apologies in crisis management, and some argue that apology opens an organization up for possible legal consequences.  "However some evidence indicates that compensation and sympathy, two less expensive strategies, are as effective as an apology in shaping people’s perceptions of the organization taking responsibility for the crisis because these strategies focus on the victims' needs.  The sympathy response expresses concern for victims while compensation offers victims something to offset the suffering."</span><sup class="reference" data-dcnode-id="5298" id="cite_ref-Coombs2008_22-0"><a data-dcnode-id="5299" href="#cite_note-Coombs2008-22"><span data-dcnode-id="5300" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5297" instrument_node="">
</span></p><span data-dcnode-id="5295" instrument_node="">
</span><h3 data-dcnode-id="5285"><span class="mw-headline" data-dcnode-id="5293" id="Crisis_leadership_2"><span data-dcnode-id="5294" instrument_node="">Crisis leadership</span></span><span class="mw-editsection" data-dcnode-id="5286"><span class="mw-editsection-bracket" data-dcnode-id="5291"><span data-dcnode-id="5292" instrument_node="">[</span></span><a data-dcnode-id="5289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D32" title="Edit section: Crisis leadership"><span data-dcnode-id="5290" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5287"><span data-dcnode-id="5288" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5284" instrument_node="">
</span><p data-dcnode-id="5282"><span data-dcnode-id="5283" instrument_node="">James identifies five leadership competencies which facilitate organizational restructuring during and after a crisis. 
</span></p><span data-dcnode-id="5281" instrument_node="">
</span><ol data-dcnode-id="5266"><li data-dcnode-id="5279"><span data-dcnode-id="5280" instrument_node="">Building an environment of trust</span></li><span data-dcnode-id="5278" instrument_node="">
</span><li data-dcnode-id="5276"><span data-dcnode-id="5277" instrument_node="">Reforming the organization's mindset</span></li><span data-dcnode-id="5275" instrument_node="">
</span><li data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">Identifying obvious and obscure vulnerabilities of the organization</span></li><span data-dcnode-id="5272" instrument_node="">
</span><li data-dcnode-id="5270"><span data-dcnode-id="5271" instrument_node="">Making wise and rapid decisions as well as taking courageous action</span></li><span data-dcnode-id="5269" instrument_node="">
</span><li data-dcnode-id="5267"><span data-dcnode-id="5268" instrument_node="">Learning from crisis to effect change.</span></li></ol><span data-dcnode-id="5265" instrument_node="">
</span><p data-dcnode-id="5255"><span data-dcnode-id="5264" instrument_node="">Crisis leadership research concludes that leadership action in crisis reflects the competency of an organization, because the test of crisis demonstrates how well the institution's leadership structure serves the organization's goals and withstands crisis. 
</span><sup class="reference" data-dcnode-id="5261" id="cite_ref-James_11-3"><a data-dcnode-id="5262" href="#cite_note-James-11"><span data-dcnode-id="5263" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5260" instrument_node="">
Developing effective human resources is vital when building organizational capabilities through crisis management executive leadership.</span><sup class="reference" data-dcnode-id="5257" id="cite_ref-23"><a data-dcnode-id="5258" href="#cite_note-23"><span data-dcnode-id="5259" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5256" instrument_node="">
</span></p><span data-dcnode-id="5254" instrument_node="">
</span><h3 data-dcnode-id="5244"><span class="mw-headline" data-dcnode-id="5252" id="Unequal_human_capital_theory"><span data-dcnode-id="5253" instrument_node="">Unequal human capital theory</span></span><span class="mw-editsection" data-dcnode-id="5245"><span class="mw-editsection-bracket" data-dcnode-id="5250"><span data-dcnode-id="5251" instrument_node="">[</span></span><a data-dcnode-id="5248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D33" title="Edit section: Unequal human capital theory"><span data-dcnode-id="5249" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5246"><span data-dcnode-id="5247" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5243" instrument_node="">
</span><p data-dcnode-id="5227"><span data-dcnode-id="5242" instrument_node="">James postulates that organizational crisis can result from discrimination lawsuits. 
</span><sup class="reference" data-dcnode-id="5239" id="cite_ref-24"><a data-dcnode-id="5240" href="#cite_note-24"><span data-dcnode-id="5241" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5238" instrument_node=""> James's theory of unequal human capital and </span><a data-dcnode-id="5236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_position" title="Social position"><span data-dcnode-id="5237" instrument_node="">social position</span></a><span data-dcnode-id="5235" instrument_node=""> derives from economic theories of human and social capital concluding that minority employees receive fewer organizational rewards than those with access to executive management. In a recent study of managers in a </span><i data-dcnode-id="5233"><span data-dcnode-id="5234" instrument_node="">Fortune</span></i><span data-dcnode-id="5232" instrument_node=""> 500 company, race was found to be a predictor of promotion opportunity or lack thereof.</span><sup class="reference" data-dcnode-id="5229" id="cite_ref-25"><a data-dcnode-id="5230" href="#cite_note-25"><span data-dcnode-id="5231" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5228" instrument_node=""> Thus, discrimination lawsuits can invite negative stakeholder reaction, damage the company's reputation, and threaten corporate survival.
</span></p><span data-dcnode-id="5226" instrument_node="">
</span><h3 data-dcnode-id="5216"><span class="mw-headline" data-dcnode-id="5224" id="Social_media_and_crisis_management"><span data-dcnode-id="5225" instrument_node="">Social media and crisis management</span></span><span class="mw-editsection" data-dcnode-id="5217"><span class="mw-editsection-bracket" data-dcnode-id="5222"><span data-dcnode-id="5223" instrument_node="">[</span></span><a data-dcnode-id="5220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D34" title="Edit section: Social media and crisis management"><span data-dcnode-id="5221" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5215" instrument_node="">
</span><p data-dcnode-id="5205"><span data-dcnode-id="5214" instrument_node="">Social media has accelerated the speed that information about a crisis can spread. The viral effect of social networks such as Twitter means that stakeholders can break news faster than traditional media - making managing a crisis harder.</span><sup class="reference" data-dcnode-id="5211" id="cite_ref-26"><a data-dcnode-id="5212" href="#cite_note-26"><span data-dcnode-id="5213" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5210" instrument_node=""> This can be mitigated by having the right training and policy in place as well as the right social media monitoring tools to detect signs of a crisis breaking.</span><sup class="reference" data-dcnode-id="5207" id="cite_ref-27"><a data-dcnode-id="5208" href="#cite_note-27"><span data-dcnode-id="5209" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5206" instrument_node=""> Social media also gives crisis management teams access to real-time information about how a crisis is impacting stakeholder sentiment and the issues that are of most concern to them.
</span></p><p data-dcnode-id="5196"><span data-dcnode-id="5204" instrument_node="">The advent of social media changed the field of crisis management dramatically, empowering stakeholders and making organisations more accountable for their actions. By creating a platform for </span><a data-dcnode-id="5202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Two-way_communication" title="Two-way communication"><span data-dcnode-id="5203" instrument_node="">two-way symmetrical communication</span></a><span data-dcnode-id="5201" instrument_node=""> between an organisation and its stakeholders, social media facilitated a rise in organisational crises, allowing for stakeholders anywhere in the world - providing they have an internet connection - to communicate publicly with organisations. The publishing unfavourable behaviour on social media, combined with the immense speed that information can be shared online, created a need for social media strategy to be included within the crisis management planning process. Stakeholders expect organisations to respond quickly and effectively to crises that transpire online.</span><sup class="reference" data-dcnode-id="5198" id="cite_ref-28"><a data-dcnode-id="5199" href="#cite_note-28"><span data-dcnode-id="5200" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5197" instrument_node="">
</span></p><p data-dcnode-id="5190"><span data-dcnode-id="5195" instrument_node="">Organisations should have a planned approach to releasing information to the media in the event of a crisis. A media reaction plan should include a company media representative as part of the Crisis Management Team (CMT). Since there is always a degree of unpredictability during a crisis, it is best that all CMT members understand how to deal with the media and be prepared to do so, should they be thrust into such a situation.</span><sup class="reference" data-dcnode-id="5192" id="cite_ref-29"><a data-dcnode-id="5193" href="#cite_note-29"><span data-dcnode-id="5194" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5191" instrument_node="">
</span></p><p data-dcnode-id="5184"><span data-dcnode-id="5189" instrument_node="">In 2010 Procter &amp; Gamble Co called reports that its new Pampers with Dry Max caused rashes and other skin irritations "completely false" as it aimed to contain a public relations threat to its biggest diaper innovation in 25 years. A Facebook group called "Pampers bring back the OLD CRUISERS/SWADDLERS" rose to over 4,500 members. Pampers denied the allegation and stated that only two complaints had been received for every one million diapers sold.</span><sup class="reference" data-dcnode-id="5186" id="cite_ref-30"><a data-dcnode-id="5187" href="#cite_note-30"><span data-dcnode-id="5188" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5185" instrument_node=""> Pampers quickly reached out to people expressing their concerns via social media, Pampers even held a summit with four influential "mommy bloggers", to help dispel the rumour. Pampers acted quickly and decisively to an emerging crisis, before competitors and critics alike could fuel the fire further.
</span></p><p data-dcnode-id="5181"><br data-dcnode-id="5183"><span data-dcnode-id="5182" instrument_node="">
</span></p><span data-dcnode-id="5180" instrument_node="">
</span><h2 data-dcnode-id="5170"><span class="mw-headline" data-dcnode-id="5178" id="Examples_of_crisis_management"><span data-dcnode-id="5179" instrument_node="">Examples of crisis management</span></span><span class="mw-editsection" data-dcnode-id="5171"><span class="mw-editsection-bracket" data-dcnode-id="5176"><span data-dcnode-id="5177" instrument_node="">[</span></span><a data-dcnode-id="5174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D35" title="Edit section: Examples of crisis management"><span data-dcnode-id="5175" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5172"><span data-dcnode-id="5173" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5169" instrument_node="">
</span><h3 data-dcnode-id="5159"><span class="mw-headline" data-dcnode-id="5167" id="Examples_of_successful_crisis_management"><span data-dcnode-id="5168" instrument_node="">Examples of successful crisis management</span></span><span class="mw-editsection" data-dcnode-id="5160"><span class="mw-editsection-bracket" data-dcnode-id="5165"><span data-dcnode-id="5166" instrument_node="">[</span></span><a data-dcnode-id="5163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D36" title="Edit section: Examples of successful crisis management"><span data-dcnode-id="5164" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5161"><span data-dcnode-id="5162" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5158" instrument_node="">
</span><h4 data-dcnode-id="5147"><span data-dcnode-id="5157" id="Tylenol_.28Johnson_and_Johnson.29"></span><span class="mw-headline" data-dcnode-id="5155" id="Tylenol_(Johnson_and_Johnson)"><span data-dcnode-id="5156" instrument_node="">Tylenol (Johnson and Johnson)</span></span><span class="mw-editsection" data-dcnode-id="5148"><span class="mw-editsection-bracket" data-dcnode-id="5153"><span data-dcnode-id="5154" instrument_node="">[</span></span><a data-dcnode-id="5151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D37" title="Edit section: Tylenol (Johnson and Johnson)"><span data-dcnode-id="5152" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5149"><span data-dcnode-id="5150" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5146" instrument_node="">
</span><p data-dcnode-id="5137"><span data-dcnode-id="5145" instrument_node="">In the fall of 1982, a murderer added 65 milligrams of cyanide to some </span><a data-dcnode-id="5143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tylenol_%28brand%29" title="Tylenol (brand)"><span data-dcnode-id="5144" instrument_node="">Tylenol</span></a><span data-dcnode-id="5142" instrument_node=""> capsules on store shelves, killing seven people, including three in one family. Johnson &amp; Johnson recalled and destroyed 31 million capsules at a cost of $100 million. The affable CEO, James Burke, appeared in television ads and at news conferences informing consumers of the company's actions. Tamper-resistant packaging was rapidly introduced, and Tylenol sales swiftly bounced back to near pre-crisis levels.</span><sup class="reference" data-dcnode-id="5139" id="cite_ref-31"><a data-dcnode-id="5140" href="#cite_note-31"><span data-dcnode-id="5141" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5138" instrument_node="">
</span></p><p data-dcnode-id="5131"><span data-dcnode-id="5136" instrument_node="">When another bottle of tainted Tylenol was discovered in a store, it took only a matter of minutes for the manufacturer to issue a nationwide warning that people should not use the medication in its capsule form.</span><sup class="reference" data-dcnode-id="5133" id="cite_ref-Rudolph86_32-0"><a data-dcnode-id="5134" href="#cite_note-Rudolph86-32"><span data-dcnode-id="5135" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5132" instrument_node="">
</span></p><span data-dcnode-id="5130" instrument_node="">
</span><h4 data-dcnode-id="5120"><span class="mw-headline" data-dcnode-id="5128" id="Odwalla_Foods"><span data-dcnode-id="5129" instrument_node="">Odwalla Foods</span></span><span class="mw-editsection" data-dcnode-id="5121"><span class="mw-editsection-bracket" data-dcnode-id="5126"><span data-dcnode-id="5127" instrument_node="">[</span></span><a data-dcnode-id="5124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D38" title="Edit section: Odwalla Foods"><span data-dcnode-id="5125" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5122"><span data-dcnode-id="5123" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5119" instrument_node="">
</span><p data-dcnode-id="5105"><span data-dcnode-id="5118" instrument_node="">When </span><a data-dcnode-id="5116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Odwalla" title="Odwalla"><span data-dcnode-id="5117" instrument_node="">Odwalla</span></a><span data-dcnode-id="5115" instrument_node="">'s apple juice was thought to be the cause of an outbreak of E. coli infection, the company lost a third of its market value. In October 1996, an outbreak of </span><a class="mw-redirect" data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/E._coli" title="E. coli"><span data-dcnode-id="5114" instrument_node="">E. coli</span></a><span data-dcnode-id="5112" instrument_node=""> bacteria in Washington state, California, Colorado and British Columbia was traced to unpasteurized apple juice manufactured by natural juice maker Odwalla Inc. Forty-nine cases were reported, including the death of a small child. Within 24 hours, Odwalla conferred with the </span><a class="mw-redirect" data-dcnode-id="5110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FDA" title="FDA"><span data-dcnode-id="5111" instrument_node="">FDA</span></a><span data-dcnode-id="5109" instrument_node=""> and Washington state health officials; established a schedule of daily press briefings; sent out </span><a data-dcnode-id="5107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Press_release" title="Press release"><span data-dcnode-id="5108" instrument_node="">press releases</span></a><span data-dcnode-id="5106" instrument_node=""> which announced the recall; expressed remorse, concern and apology, and took responsibility for anyone harmed by their products; detailed symptoms of E. coli poisoning; and explained what consumers should do with any affected products. Odwalla then developed - through the help of consultants - effective thermal processes that would not harm the products' flavors when production resumed. All of these steps were communicated through close relations with the media and through full-page newspaper ads.
</span></p><span data-dcnode-id="5104" instrument_node="">
</span><h4 data-dcnode-id="5094"><span class="mw-headline" data-dcnode-id="5102" id="Mattel"><span data-dcnode-id="5103" instrument_node="">Mattel</span></span><span class="mw-editsection" data-dcnode-id="5095"><span class="mw-editsection-bracket" data-dcnode-id="5100"><span data-dcnode-id="5101" instrument_node="">[</span></span><a data-dcnode-id="5098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D39" title="Edit section: Mattel"><span data-dcnode-id="5099" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5093" instrument_node="">
</span><p data-dcnode-id="5085"><a data-dcnode-id="5091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mattel" title="Mattel"><span data-dcnode-id="5092" instrument_node="">Mattel</span></a><span data-dcnode-id="5090" instrument_node=""> Inc., the toy maker, has been plagued with more than 28 product recalls and in the summer of 2007, among problems with exports from China, faced two product recalls in two weeks. The company "did everything it could to get its message out, earning high marks from consumers and retailers. Though upset by the situation, they were appreciative of the company's response. At Mattel, just after the 7 a.m. recall announcement by federal officials, a public relations staff of 16 was set to call reporters at the 40 biggest media outlets. They told each to check their e-mail for a news release outlining the recalls, invited them to a teleconference call with executives and scheduled TV appearances or phone conversations with Mattel's chief executive. The Mattel CEO Robert Eckert did 14 TV interviews on a Tuesday in August and about 20 calls with individual reporters. By the week's end, Mattel had responded to more than 300 media inquiries in the U.S. alone."</span><sup class="reference" data-dcnode-id="5087" id="cite_ref-33"><a data-dcnode-id="5088" href="#cite_note-33"><span data-dcnode-id="5089" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5086" instrument_node="">
</span></p><span data-dcnode-id="5084" instrument_node="">
</span><h4 data-dcnode-id="5074"><span class="mw-headline" data-dcnode-id="5082" id="Pepsi"><span data-dcnode-id="5083" instrument_node="">Pepsi</span></span><span class="mw-editsection" data-dcnode-id="5075"><span class="mw-editsection-bracket" data-dcnode-id="5080"><span data-dcnode-id="5081" instrument_node="">[</span></span><a data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D40" title="Edit section: Pepsi"><span data-dcnode-id="5079" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5076"><span data-dcnode-id="5077" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5073" instrument_node="">
</span><p data-dcnode-id="5057"><span data-dcnode-id="5072" instrument_node="">The </span><a data-dcnode-id="5070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pepsi" title="Pepsi"><span data-dcnode-id="5071" instrument_node="">Pepsi</span></a><span data-dcnode-id="5069" instrument_node=""> Corporation faced a crisis in 1993 which started with claims of syringes being found in cans of diet Pepsi. Pepsi urged stores not to remove the product from shelves while it had the cans and the situation investigated. This led to an arrest, which Pepsi made public and then followed with their first video news release, showing the production process to demonstrate that such tampering was impossible within their factories. A second video news release displayed the man arrested.  A third video showed surveillance from a </span><a data-dcnode-id="5067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convenience_store" title="Convenience store"><span data-dcnode-id="5068" instrument_node="">convenience store</span></a><span data-dcnode-id="5066" instrument_node=""> where a woman was caught inserting a syringe into a can.</span><sup class="reference" data-dcnode-id="5063" id="cite_ref-34"><a data-dcnode-id="5064" href="#cite_note-34"><span data-dcnode-id="5065" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5062" instrument_node=""> The company simultaneously publicly worked with the FDA during the crisis. This made public communications effective throughout the crisis.  After the crisis had been resolved, the corporation ran a series of special campaigns designed to thank the public for standing by the corporation, along with coupons for further compensation. This case served as a design for how to handle other crisis situations.</span><sup class="reference" data-dcnode-id="5059" id="cite_ref-35"><a data-dcnode-id="5060" href="#cite_note-35"><span data-dcnode-id="5061" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5058" instrument_node="">
</span></p><p data-dcnode-id="5054"><br data-dcnode-id="5056"><span data-dcnode-id="5055" instrument_node="">
</span></p><span data-dcnode-id="5053" instrument_node="">
</span><h3 data-dcnode-id="5043"><span class="mw-headline" data-dcnode-id="5051" id="Examples_of_unsuccessful_crisis_management"><span data-dcnode-id="5052" instrument_node="">Examples of unsuccessful crisis management</span></span><span class="mw-editsection" data-dcnode-id="5044"><span class="mw-editsection-bracket" data-dcnode-id="5049"><span data-dcnode-id="5050" instrument_node="">[</span></span><a data-dcnode-id="5047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D41" title="Edit section: Examples of unsuccessful crisis management"><span data-dcnode-id="5048" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5042" instrument_node="">
</span><h4 data-dcnode-id="5032"><span class="mw-headline" data-dcnode-id="5040" id="Bhopal"><span data-dcnode-id="5041" instrument_node="">Bhopal</span></span><span class="mw-editsection" data-dcnode-id="5033"><span class="mw-editsection-bracket" data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">[</span></span><a data-dcnode-id="5036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D42" title="Edit section: Bhopal"><span data-dcnode-id="5037" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5031" instrument_node="">
</span><link data-dcnode-id="5030" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5026" role="note"><span data-dcnode-id="5029" instrument_node="">Main article: </span><a data-dcnode-id="5027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bhopal_disaster" title="Bhopal disaster"><span data-dcnode-id="5028" instrument_node="">Bhopal disaster</span></a></div><span data-dcnode-id="5025" instrument_node="">
</span><p data-dcnode-id="5007"><span data-dcnode-id="5024" instrument_node="">The </span><a data-dcnode-id="5022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bhopal_disaster" title="Bhopal disaster"><span data-dcnode-id="5023" instrument_node="">Bhopal disaster</span></a><span data-dcnode-id="5021" instrument_node=""> in which poor communication before, during, and after the crisis cost thousands of lives, illustrates the importance of incorporating </span><a data-dcnode-id="5019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cross-cultural_communication" title="Cross-cultural communication"><span data-dcnode-id="5020" instrument_node="">cross-cultural communication</span></a><span data-dcnode-id="5018" instrument_node=""> in crisis management plans. According to </span><a data-dcnode-id="5016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_University" title="American University"><span data-dcnode-id="5017" instrument_node="">American University</span></a><span data-dcnode-id="5015" instrument_node="">'s Trade Environmental Database Case Studies (1997), local residents were not sure how to react to warnings of potential threats from the </span><a data-dcnode-id="5013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_Carbide" title="Union Carbide"><span data-dcnode-id="5014" instrument_node="">Union Carbide</span></a><span data-dcnode-id="5012" instrument_node=""> plant. Operating manuals printed only in English is an extreme example of mismanagement but indicative of systemic barriers to information diffusion. According to Union Carbide's own chronology of the incident (2006), a day after the crisis Union Carbide's upper management arrived in India but was unable to assist in the relief efforts because they were placed under house arrest by the Indian government. Symbolic intervention can be counter productive; a crisis management strategy can help upper management make more calculated decisions in how they should respond to disaster scenarios. The Bhopal incident illustrates the difficulty in consistently applying management standards to multi-national operations and the blame shifting that often results from the lack of a clear management plan.</span><sup class="reference" data-dcnode-id="5009" id="cite_ref-Shrivastava87_36-0"><a data-dcnode-id="5010" href="#cite_note-Shrivastava87-36"><span data-dcnode-id="5011" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5008" instrument_node="">
</span></p><span data-dcnode-id="5006" instrument_node="">
</span><h4 data-dcnode-id="4996"><span class="mw-headline" data-dcnode-id="5004" id="Ford_and_Firestone_Tire_and_Rubber_Company"><span data-dcnode-id="5005" instrument_node="">Ford and Firestone Tire and Rubber Company</span></span><span class="mw-editsection" data-dcnode-id="4997"><span class="mw-editsection-bracket" data-dcnode-id="5002"><span data-dcnode-id="5003" instrument_node="">[</span></span><a data-dcnode-id="5000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D43" title="Edit section: Ford and Firestone Tire and Rubber Company"><span data-dcnode-id="5001" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4995" instrument_node="">
</span><link data-dcnode-id="4994" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4990" role="note"><span data-dcnode-id="4993" instrument_node="">Main article: </span><a data-dcnode-id="4991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Firestone_and_Ford_tire_controversy" title="Firestone and Ford tire controversy"><span data-dcnode-id="4992" instrument_node="">Firestone and Ford tire controversy</span></a></div><span data-dcnode-id="4989" instrument_node="">
</span><p data-dcnode-id="4974"><span data-dcnode-id="4988" instrument_node="">The </span><a data-dcnode-id="4986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ford_Motor_Company" title="Ford Motor Company"><span data-dcnode-id="4987" instrument_node="">Ford</span></a><span data-dcnode-id="4985" instrument_node="">-</span><a data-dcnode-id="4983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Firestone_Tire_and_Rubber_Company" title="Firestone Tire and Rubber Company"><span data-dcnode-id="4984" instrument_node="">Firestone Tire and Rubber Company</span></a><span data-dcnode-id="4982" instrument_node=""> dispute transpired in August 2000. In response to claims that their 15-inch Wilderness AT, radial ATX and ATX II tire treads were separating from the tire core—leading to crashes—Bridgestone/Firestone recalled 6.5 million tires. These tires were mostly used on the </span><a data-dcnode-id="4980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ford_Explorer" title="Ford Explorer"><span data-dcnode-id="4981" instrument_node="">Ford Explorer</span></a><span data-dcnode-id="4979" instrument_node="">, the world's top-selling sport utility vehicle (SUV).</span><sup class="reference" data-dcnode-id="4976" id="cite_ref-37"><a data-dcnode-id="4977" href="#cite_note-37"><span data-dcnode-id="4978" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4975" instrument_node="">
</span></p><p data-dcnode-id="4968"><span data-dcnode-id="4973" instrument_node="">The two companies committed three major blunders early on, say crisis experts. First, they blamed consumers for not inflating their tires properly. Then they blamed each other for faulty tires and faulty vehicle design. Then they said very little about what they were doing to solve a problem that had caused more than 100 deaths—until they got called to Washington to testify before Congress.</span><sup class="reference" data-dcnode-id="4970" id="cite_ref-38"><a data-dcnode-id="4971" href="#cite_note-38"><span data-dcnode-id="4972" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4969" instrument_node="">
</span></p><span data-dcnode-id="4967" instrument_node="">
</span><h4 data-dcnode-id="4957"><span class="mw-headline" data-dcnode-id="4965" id="Exxon"><span data-dcnode-id="4966" instrument_node="">Exxon</span></span><span class="mw-editsection" data-dcnode-id="4958"><span class="mw-editsection-bracket" data-dcnode-id="4963"><span data-dcnode-id="4964" instrument_node="">[</span></span><a data-dcnode-id="4961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D44" title="Edit section: Exxon"><span data-dcnode-id="4962" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4956" instrument_node="">
</span><p data-dcnode-id="4941"><span data-dcnode-id="4955" instrument_node="">On 24 March 1989, a tanker belonging to the </span><a data-dcnode-id="4953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exxon" title="Exxon"><span data-dcnode-id="4954" instrument_node="">Exxon</span></a><span data-dcnode-id="4952" instrument_node=""> Corporation ran aground in the Prince William Sound in Alaska. The </span><a data-dcnode-id="4950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Exxon_Valdez" title="Exxon Valdez"><span data-dcnode-id="4951" instrument_node="">Exxon Valdez</span></a><span data-dcnode-id="4949" instrument_node=""> spilled millions of gallons of crude oil into the waters off Valdez, killing thousands of fish, fowl, and sea otters. Hundreds of miles of coastline were polluted and salmon spawning runs disrupted; numerous fishermen, especially Native Americans, lost their livelihoods. Exxon, by contrast, did not react quickly in terms of dealing with the media and the public; the CEO, </span><a class="mw-redirect" data-dcnode-id="4947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lawrence_Rawl" title="Lawrence Rawl"><span data-dcnode-id="4948" instrument_node="">Lawrence Rawl</span></a><span data-dcnode-id="4946" instrument_node="">, did not become an active part of the public relations effort and actually shunned public involvement; the company had neither a communication plan nor a communication team in place to handle the event—in fact, the company did not appoint a public relations manager to its management team until 1993, 4 years after the incident; Exxon established its media center in Valdez, a location too small and too remote to handle the onslaught of media attention; and the company acted defensively in its response to its publics, even laying blame, at times, on other groups such as the Coast Guard. These responses also happened within days of the incident.</span><sup class="reference" data-dcnode-id="4943" id="cite_ref-Pauly_39-0"><a data-dcnode-id="4944" href="#cite_note-Pauly-39"><span data-dcnode-id="4945" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4942" instrument_node="">
</span></p><span data-dcnode-id="4940" instrument_node="">
</span><h2 data-dcnode-id="4930"><span class="mw-headline" data-dcnode-id="4938" id="Lessons_learned_in_crisis_management"><span data-dcnode-id="4939" instrument_node="">Lessons learned in crisis management</span></span><span class="mw-editsection" data-dcnode-id="4931"><span class="mw-editsection-bracket" data-dcnode-id="4936"><span data-dcnode-id="4937" instrument_node="">[</span></span><a data-dcnode-id="4934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D45" title="Edit section: Lessons learned in crisis management"><span data-dcnode-id="4935" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4932"><span data-dcnode-id="4933" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4929" instrument_node="">
</span><h3 data-dcnode-id="4919"><span class="mw-headline" data-dcnode-id="4927" id="Impact_of_catastrophes_on_shareholder_value"><span data-dcnode-id="4928" instrument_node="">Impact of catastrophes on shareholder value</span></span><span class="mw-editsection" data-dcnode-id="4920"><span class="mw-editsection-bracket" data-dcnode-id="4925"><span data-dcnode-id="4926" instrument_node="">[</span></span><a data-dcnode-id="4923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D46" title="Edit section: Impact of catastrophes on shareholder value"><span data-dcnode-id="4924" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4918" instrument_node="">
</span><p data-dcnode-id="4907"><span data-dcnode-id="4917" instrument_node="">One of the foremost recognized studies conducted on the impact of a catastrophe on the stock value of an organization was completed by Dr Rory Knight and Dr Deborah Pretty (1996, Templeton College, University of Oxford - commissioned by the Sedgewick Group). This study undertook a detailed analysis of the stock price (post impact) of organizations that had experienced catastrophes. The study identified organizations that recovered and even exceeded pre-catastrophe stock price, (</span><i data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">Recoverers</span></i><span data-dcnode-id="4914" instrument_node="">), and those that did not recover on stock price, (</span><i data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">Non-recoverers</span></i><span data-dcnode-id="4911" instrument_node="">). The average cumulative impact on </span><a data-dcnode-id="4909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shareholder_value" title="Shareholder value"><span data-dcnode-id="4910" instrument_node="">shareholder value</span></a><span data-dcnode-id="4908" instrument_node=""> for the recoverers was 5% plus on their original stock value. So the net impact on shareholder value by this stage was actually positive. The non-recoverers remained more or less unchanged between days 5 and 50 after the catastrophe, but suffered a net negative cumulative impact of almost 15% on their stock price up to one year afterwards.
</span></p><p data-dcnode-id="4905"><span data-dcnode-id="4906" instrument_node="">One of the key conclusions of this study is that "Effective management of the consequences of
catastrophes would appear to be a more significant factor than whether catastrophe insurance hedges the economic impact of the catastrophe".
</span></p><p data-dcnode-id="4899"><span data-dcnode-id="4904" instrument_node="">While there are technical elements to this report it is highly recommended to those who wish to engage their senior management in the value of crisis management.</span><sup class="reference" data-dcnode-id="4901" id="cite_ref-Knight_40-0"><a data-dcnode-id="4902" href="#cite_note-Knight-40"><span data-dcnode-id="4903" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4900" instrument_node="">
</span></p><span data-dcnode-id="4898" instrument_node="">
</span><h3 data-dcnode-id="4888"><span class="mw-headline" data-dcnode-id="4896" id="Crisis_as_Opportunity"><span data-dcnode-id="4897" instrument_node="">Crisis as Opportunity</span></span><span class="mw-editsection" data-dcnode-id="4889"><span class="mw-editsection-bracket" data-dcnode-id="4894"><span data-dcnode-id="4895" instrument_node="">[</span></span><a data-dcnode-id="4892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D47" title="Edit section: Crisis as Opportunity"><span data-dcnode-id="4893" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4887" instrument_node="">
</span><p data-dcnode-id="4873"><span data-dcnode-id="4886" instrument_node="">Hilburg proffers that every crisis is an opportunity to showcase an institution's character, its commitment to its brand promise and its institutional values.  To address such shareholder impact, management must move from a mindset that manages crisis to one that generates crisis leadership. 
</span><sup class="reference" data-dcnode-id="4883" id="cite_ref-Crisis_Leadership_10-1"><a data-dcnode-id="4884" href="#cite_note-Crisis_Leadership-10"><span data-dcnode-id="4885" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4882" instrument_node=""> Research shows that organizational contributory factors affect the tendency of executives to adopt an effective "crisis as opportunity" mindset.</span><sup class="reference" data-dcnode-id="4879" id="cite_ref-41"><a data-dcnode-id="4880" href="#cite_note-41"><span data-dcnode-id="4881" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4878" instrument_node=""> Since pressure is both a precipitator and consequence of crisis, leaders who perform well under pressure can effectively guide the organization through such crisis.
</span><sup class="reference" data-dcnode-id="4875" id="cite_ref-42"><a data-dcnode-id="4876" href="#cite_note-42"><span data-dcnode-id="4877" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4874" instrument_node="">
</span></p><p data-dcnode-id="4853"><span data-dcnode-id="4872" instrument_node="">James contends that most executives focus on communications and </span><a data-dcnode-id="4870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_relations" title="Public relations"><span data-dcnode-id="4871" instrument_node="">public relations</span></a><span data-dcnode-id="4869" instrument_node=""> as a reactive strategy. While the company's reputation with shareholders, financial well-being, and survival are all at stake, potential damage to reputation can result from the actual management of the crisis issue.</span><sup class="reference" data-dcnode-id="4866" id="cite_ref-Crisis_Leadership_10-2"><a data-dcnode-id="4867" href="#cite_note-Crisis_Leadership-10"><span data-dcnode-id="4868" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4865" instrument_node=""> Additionally, companies may stagnate as their </span><a data-dcnode-id="4863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Risk_management" title="Risk management"><span data-dcnode-id="4864" instrument_node="">risk management</span></a><span data-dcnode-id="4862" instrument_node=""> group identifies whether a crisis is sufficiently "statistically significant".
</span><sup class="reference" data-dcnode-id="4859" id="cite_ref-43"><a data-dcnode-id="4860" href="#cite_note-43"><span data-dcnode-id="4861" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4858" instrument_node=""> 
Crisis leadership, on the other hand, immediately addresses both the damage and implications for the company's present and future conditions, as well as opportunities for improvement.
</span><sup class="reference" data-dcnode-id="4855" id="cite_ref-James_11-4"><a data-dcnode-id="4856" href="#cite_note-James-11"><span data-dcnode-id="4857" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4854" instrument_node="">
</span></p><span data-dcnode-id="4852" instrument_node="">
</span><h2 data-dcnode-id="4842"><span class="mw-headline" data-dcnode-id="4850" id="Public-sector_crisis_management"><span data-dcnode-id="4851" instrument_node="">Public-sector crisis management</span></span><span class="mw-editsection" data-dcnode-id="4843"><span class="mw-editsection-bracket" data-dcnode-id="4848"><span data-dcnode-id="4849" instrument_node="">[</span></span><a data-dcnode-id="4846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D48" title="Edit section: Public-sector crisis management"><span data-dcnode-id="4847" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4844"><span data-dcnode-id="4845" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4841" instrument_node="">
</span><p data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">Corporate America is not the only community that is vulnerable to the perils of a crisis. Whether a school shooting, a public health crisis or a terrorist attack that leaves the public seeking comfort in the calm, steady leadership of an elected official, no sector of society is immune to crisis. In response to that reality, crisis management policies, strategies and practices have been developed and adapted across multiple disciplines.
</span></p><span data-dcnode-id="4838" instrument_node="">
</span><h3 data-dcnode-id="4828"><span class="mw-headline" data-dcnode-id="4836" id="Schools_and_crisis_management"><span data-dcnode-id="4837" instrument_node="">Schools and crisis management</span></span><span class="mw-editsection" data-dcnode-id="4829"><span class="mw-editsection-bracket" data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">[</span></span><a data-dcnode-id="4832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D49" title="Edit section: Schools and crisis management"><span data-dcnode-id="4833" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4827" instrument_node="">
</span><p data-dcnode-id="4812"><span data-dcnode-id="4826" instrument_node="">In the wake of the </span><a class="mw-redirect" data-dcnode-id="4824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Columbine_High_School_Massacre" title="Columbine High School Massacre"><span data-dcnode-id="4825" instrument_node="">Columbine High School Massacre</span></a><span data-dcnode-id="4823" instrument_node="">, the </span><a data-dcnode-id="4821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/September_11_attacks" title="September 11 attacks"><span data-dcnode-id="4822" instrument_node="">September 11 attacks</span></a><span data-dcnode-id="4820" instrument_node=""> in 2001, and shootings on college campuses including the </span><a class="mw-redirect" data-dcnode-id="4818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virginia_Tech_massacre" title="Virginia Tech massacre"><span data-dcnode-id="4819" instrument_node="">Virginia Tech massacre</span></a><span data-dcnode-id="4817" instrument_node="">, educational institutions at all levels are now focused on crisis management.</span><sup class="reference" data-dcnode-id="4814" id="cite_ref-44"><a data-dcnode-id="4815" href="#cite_note-44"><span data-dcnode-id="4816" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4813" instrument_node="">
</span></p><p data-dcnode-id="4792"><span data-dcnode-id="4811" instrument_node="">A national study conducted by the </span><a data-dcnode-id="4809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Arkansas" title="University of Arkansas"><span data-dcnode-id="4810" instrument_node="">University of Arkansas</span></a><span data-dcnode-id="4808" instrument_node=""> for Medical Sciences (UAMS) and Arkansas Children's Hospital Research Institute (ACHRI) has shown that many public school districts have important deficiencies in their emergency and disaster plans (The School Violence Resource Center, 2003). In response the Resource Center has organized a comprehensive set of resources to aid schools is the development of crisis management plans.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4801" style="white-space:nowrap;"><span data-dcnode-id="4807" instrument_node="">[</span><i data-dcnode-id="4803"><a data-dcnode-id="4804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4805" title="This claim needs references to reliable sources. (April 2009)"><span data-dcnode-id="4806" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4802" instrument_node="">]</span></sup><span data-dcnode-id="4800" instrument_node=""> A study conducted by researchers Min Liu, Isaac Blankson and Laurel Servies Brooks in regards to emergency response plans resulted in many findings including affirmative information that emergency and crisis training in institutions of higher education is lacking. They also found that  college and university staff's knowledge and </span><a data-dcnode-id="4798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-efficacy" title="Self-efficacy"><span data-dcnode-id="4799" instrument_node="">self-efficacy</span></a><span data-dcnode-id="4797" instrument_node=""> are positively correlated, meaning that the more knowledgeable they are, the more confident they feel in responding efficiently to various crisis events, further backing the need for crisis management plans and communication in educational institutions.</span><sup class="reference" data-dcnode-id="4794" id="cite_ref-45"><a data-dcnode-id="4795" href="#cite_note-45"><span data-dcnode-id="4796" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4793" instrument_node="">
</span></p><p data-dcnode-id="4782"><span data-dcnode-id="4791" instrument_node="">Crisis-management plans cover a wide variety of incidents including bomb threats, child abuse, natural disasters, suicide, drug abuse and gang activities – just to list a few.</span><sup class="reference" data-dcnode-id="4788" id="cite_ref-KCSchools_46-0"><a data-dcnode-id="4789" href="#cite_note-KCSchools-46"><span data-dcnode-id="4790" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4787" instrument_node=""> In a similar fashion the plans aim to address all audiences in need of information including parents, the media and law enforcement officials.</span><sup class="reference" data-dcnode-id="4784" id="cite_ref-VaDoE_47-0"><a data-dcnode-id="4785" href="#cite_note-VaDoE-47"><span data-dcnode-id="4786" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4783" instrument_node="">
</span></p><span data-dcnode-id="4781" instrument_node="">
</span><h3 data-dcnode-id="4771"><span class="mw-headline" data-dcnode-id="4779" id="Government_and_crisis_management"><span data-dcnode-id="4780" instrument_node="">Government and crisis management</span></span><span class="mw-editsection" data-dcnode-id="4772"><span class="mw-editsection-bracket" data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">[</span></span><a data-dcnode-id="4775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D50" title="Edit section: Government and crisis management"><span data-dcnode-id="4776" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4770" instrument_node="">
</span><p data-dcnode-id="4762"><span data-dcnode-id="4769" instrument_node="">Historically, government at all levels—local, state, and national—has played a large role in crisis management. Indeed, many political philosophers have considered this to be one of the primary roles of government. </span><a class="mw-redirect" data-dcnode-id="4767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emergency_services" title="Emergency services"><span data-dcnode-id="4768" instrument_node="">Emergency services</span></a><span data-dcnode-id="4766" instrument_node="">, such as fire and police departments at the local level, and the </span><a class="mw-redirect" data-dcnode-id="4764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_National_Guard" title="United States National Guard"><span data-dcnode-id="4765" instrument_node="">United States National Guard</span></a><span data-dcnode-id="4763" instrument_node=""> at the federal level, often play integral roles in crisis situations.
</span></p><p data-dcnode-id="4744"><span data-dcnode-id="4761" instrument_node="">To help coordinate communication during the response phase of a crisis, the U.S. </span><a data-dcnode-id="4759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Emergency_Management_Agency" title="Federal Emergency Management Agency"><span data-dcnode-id="4760" instrument_node="">Federal Emergency Management Agency</span></a><span data-dcnode-id="4758" instrument_node=""> (FEMA) within the </span><a class="mw-redirect" data-dcnode-id="4756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Department_of_Homeland_Security" title="Department of Homeland Security"><span data-dcnode-id="4757" instrument_node="">Department of Homeland Security</span></a><span data-dcnode-id="4755" instrument_node=""> administers the </span><a data-dcnode-id="4753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Response_Plan" title="National Response Plan"><span data-dcnode-id="4754" instrument_node="">National Response Plan</span></a><span data-dcnode-id="4752" instrument_node=""> (NRP). This plan is intended to integrate public and private response by providing a common language and outlining a chain-of-command when multiple parties are mobilized. It is based on the premise that incidences should be handled at the lowest organizational level possible. The NRP recognizes the private sector as a key partner in domestic incident management, particularly in the area of </span><a data-dcnode-id="4750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Critical_infrastructure_protection" title="Critical infrastructure protection"><span data-dcnode-id="4751" instrument_node="">critical infrastructure protection</span></a><span data-dcnode-id="4749" instrument_node=""> and restoration.</span><sup class="reference" data-dcnode-id="4746" id="cite_ref-Quick2006_48-0"><a data-dcnode-id="4747" href="#cite_note-Quick2006-48"><span data-dcnode-id="4748" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4745" instrument_node="">
</span></p><p data-dcnode-id="4738"><span data-dcnode-id="4743" instrument_node="">The NRP is a companion to the National Incidence Management System, which acts as a more general template for incident management regardless of cause, size, or complexity.</span><sup class="reference" data-dcnode-id="4740" id="cite_ref-Quick2006_48-1"><a data-dcnode-id="4741" href="#cite_note-Quick2006-48"><span data-dcnode-id="4742" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4739" instrument_node="">
</span></p><p data-dcnode-id="4732"><span data-dcnode-id="4737" instrument_node="">FEMA offers free web-based training on the National Response Plan through the Emergency Management Institute.</span><sup class="reference" data-dcnode-id="4734" id="cite_ref-49"><a data-dcnode-id="4735" href="#cite_note-49"><span data-dcnode-id="4736" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4733" instrument_node="">
</span></p><p data-dcnode-id="4717"><a data-dcnode-id="4730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common_Alerting_Protocol" title="Common Alerting Protocol"><span data-dcnode-id="4731" instrument_node="">Common Alerting Protocol</span></a><span data-dcnode-id="4729" instrument_node=""> (CAP) is a relatively recent mechanism that facilitates </span><a data-dcnode-id="4727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crisis_communication" title="Crisis communication"><span data-dcnode-id="4728" instrument_node="">crisis communication</span></a><span data-dcnode-id="4726" instrument_node=""> across different mediums and systems. CAP helps create a consistent emergency alert format to reach geographically and linguistically diverse audiences through both audio and visual mediums.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4719" style="white-space:nowrap;"><span data-dcnode-id="4725" instrument_node="">[</span><i data-dcnode-id="4721"><a data-dcnode-id="4722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4723" title="This claim needs references to reliable sources. (April 2009)"><span data-dcnode-id="4724" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4720" instrument_node="">]</span></sup><span data-dcnode-id="4718" instrument_node="">
</span></p><span data-dcnode-id="4716" instrument_node="">
</span><h3 data-dcnode-id="4706"><span class="mw-headline" data-dcnode-id="4714" id="People_and_crisis_management"><span data-dcnode-id="4715" instrument_node="">People and crisis management</span></span><span class="mw-editsection" data-dcnode-id="4707"><span class="mw-editsection-bracket" data-dcnode-id="4712"><span data-dcnode-id="4713" instrument_node="">[</span></span><a data-dcnode-id="4710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D51" title="Edit section: People and crisis management"><span data-dcnode-id="4711" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4708"><span data-dcnode-id="4709" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4705" instrument_node="">
</span><p data-dcnode-id="4687"><span data-dcnode-id="4704" instrument_node="">A group of international psychoanalysts started in 1994 with a project to contribute to crisis management in the sense of managing conflicts between national groups. They called themselves </span><i data-dcnode-id="4702"><span data-dcnode-id="4703" instrument_node="">Partners in confronting collective atrocities</span></i><span data-dcnode-id="4701" instrument_node="">.</span><sup class="reference" data-dcnode-id="4698" id="cite_ref-50"><a data-dcnode-id="4699" href="#cite_note-50"><span data-dcnode-id="4700" instrument_node="">[50]</span></a></sup><span data-dcnode-id="4697" instrument_node=""> They began their work with the so-called </span><a data-dcnode-id="4695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazareth-Conferences" title="Nazareth-Conferences"><span data-dcnode-id="4696" instrument_node="">Nazareth-Conferences</span></a><span data-dcnode-id="4694" instrument_node=""> –  based on the model of </span><i data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">Leicesterconferences</span></i><span data-dcnode-id="4691" instrument_node=""> having been developed by the </span><a data-dcnode-id="4689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tavistock_Institute" title="Tavistock Institute"><span data-dcnode-id="4690" instrument_node="">Tavistock Institute</span></a><span data-dcnode-id="4688" instrument_node="">.
</span></p><span data-dcnode-id="4686" instrument_node="">
</span><h3 data-dcnode-id="4676"><span class="mw-headline" data-dcnode-id="4684" id="Elected_officials_and_crisis_management"><span data-dcnode-id="4685" instrument_node="">Elected officials and crisis management</span></span><span class="mw-editsection" data-dcnode-id="4677"><span class="mw-editsection-bracket" data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">[</span></span><a data-dcnode-id="4680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D52" title="Edit section: Elected officials and crisis management"><span data-dcnode-id="4681" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4678"><span data-dcnode-id="4679" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4675" instrument_node="">
</span><p data-dcnode-id="4662"><span data-dcnode-id="4674" instrument_node="">Historically, politics and crisis go hand in hand. In describing crisis, President </span><a data-dcnode-id="4672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abraham_Lincoln" title="Abraham Lincoln"><span data-dcnode-id="4673" instrument_node="">Abraham Lincoln</span></a><span data-dcnode-id="4671" instrument_node=""> said,
"We live in the midst of alarms, anxiety beclouds the future; we expect some new disaster with each newspaper we read".</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4664" style="white-space:nowrap;"><span data-dcnode-id="4670" instrument_node="">[</span><i data-dcnode-id="4666"><a data-dcnode-id="4667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4668" title="This claim needs references to reliable sources. (April 2009)"><span data-dcnode-id="4669" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4665" instrument_node="">]</span></sup><span data-dcnode-id="4663" instrument_node="">
</span></p><p data-dcnode-id="4656"><span data-dcnode-id="4661" instrument_node="">Crisis management has become a defining feature of contemporary governance. In times of crisis, communities and members of organizations expect their public leaders to minimize the impact of the crisis at hand, while critics and bureaucratic competitors try to seize the moment to blame incumbent rulers and their policies. In this extreme environment, policymakers must somehow establish a sense of normality, and foster collective learning from the crisis experience.</span><sup class="reference" data-dcnode-id="4658" id="cite_ref-Boin2005_51-0"><a data-dcnode-id="4659" href="#cite_note-Boin2005-51"><span data-dcnode-id="4660" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4657" instrument_node="">
</span></p><p data-dcnode-id="4644"><span data-dcnode-id="4655" instrument_node="">In the face of crisis, leaders must deal with the strategic challenges they face, the political risks and opportunities they encounter, the errors they make, the pitfalls they need to avoid, and the paths away from crisis they may pursue. The necessity for management is even more significant with the advent of a </span><a data-dcnode-id="4653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/24-hour_news_cycle" title="24-hour news cycle"><span data-dcnode-id="4654" instrument_node="">24-hour news cycle</span></a><span data-dcnode-id="4652" instrument_node=""> and an increasingly </span><a data-dcnode-id="4650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet" title="Internet"><span data-dcnode-id="4651" instrument_node="">internet</span></a><span data-dcnode-id="4649" instrument_node="">-savvy audience with ever-changing technology at its fingertips.</span><sup class="reference" data-dcnode-id="4646" id="cite_ref-Boin2005_51-1"><a data-dcnode-id="4647" href="#cite_note-Boin2005-51"><span data-dcnode-id="4648" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4645" instrument_node="">
</span></p><p data-dcnode-id="4638"><span data-dcnode-id="4643" instrument_node="">Public leaders have a special responsibility to help safeguard society from the adverse consequences of crisis. Experts in crisis management note that leaders who take this responsibility seriously would have to concern themselves with all crisis phases: the incubation stage, the onset, and the aftermath. Crisis leadership then involves five critical tasks: sense making, decision making, meaning making, terminating, and learning.</span><sup class="reference" data-dcnode-id="4640" id="cite_ref-Boin2005_51-2"><a data-dcnode-id="4641" href="#cite_note-Boin2005-51"><span data-dcnode-id="4642" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4639" instrument_node="">
</span></p><p data-dcnode-id="4632"><span data-dcnode-id="4637" instrument_node="">A brief description of the five facets of crisis leadership includes:</span><sup class="reference" data-dcnode-id="4634" id="cite_ref-Hellsloot2007_52-0"><a data-dcnode-id="4635" href="#cite_note-Hellsloot2007-52"><span data-dcnode-id="4636" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4633" instrument_node="">
</span></p><span data-dcnode-id="4631" instrument_node="">
</span><ol data-dcnode-id="4616"><li data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">Sense making may be considered as the classical situation assessment step in decision making.</span></li><span data-dcnode-id="4628" instrument_node="">
</span><li data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">Decision making is both the act of coming to a decision as the implementation of that decision.</span></li><span data-dcnode-id="4625" instrument_node="">
</span><li data-dcnode-id="4623"><span data-dcnode-id="4624" instrument_node="">Meaning making refers to crisis management as political communication.</span></li><span data-dcnode-id="4622" instrument_node="">
</span><li data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">Terminating a crisis is only possible if the public leader correctly handles the accountability question.</span></li><span data-dcnode-id="4619" instrument_node="">
</span><li data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node="">Learning, refers to the actual learning from a crisis is limited. The authors note, a crisis often opens a window of opportunity for reform for better or for worse.</span></li></ol><span data-dcnode-id="4615" instrument_node="">
</span><h3 data-dcnode-id="4605"><span class="mw-headline" data-dcnode-id="4613" id="Public_sector_crisis_management_outside_the_United_States"><span data-dcnode-id="4614" instrument_node="">Public sector crisis management outside the United States</span></span><span class="mw-editsection" data-dcnode-id="4606"><span class="mw-editsection-bracket" data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">[</span></span><a data-dcnode-id="4609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D53" title="Edit section: Public sector crisis management outside the United States"><span data-dcnode-id="4610" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4604" instrument_node="">
</span><p data-dcnode-id="4598"><span data-dcnode-id="4603" instrument_node="">While all countries encounter various crises over the course of their existence, they utilize different strategies that reflect their particular structure and circumstances.</span><sup class="reference" data-dcnode-id="4600" id="cite_ref-:0_53-0"><a data-dcnode-id="4601" href="#cite_note-:0-53"><span data-dcnode-id="4602" instrument_node="">[53]</span></a></sup><span data-dcnode-id="4599" instrument_node=""> Autocratic and more centralized governments may address crises in ways that democratic countries could not. These distinctions present opportunities to compare numerous approaches to similar emergencies. 
</span></p><p data-dcnode-id="4580"><span data-dcnode-id="4597" instrument_node="">The COVID-19 crisis has proved to be a useful lens to view how crisis management differs by country.</span><sup class="reference" data-dcnode-id="4594" id="cite_ref-:13_54-0"><a data-dcnode-id="4595" href="#cite_note-:13-54"><span data-dcnode-id="4596" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4593" instrument_node=""> In democratic countries like Italy and Spain for example, health care is more decentralized and management is shared between the central and regional governments.</span><sup class="reference" data-dcnode-id="4590" id="cite_ref-:2_55-0"><a data-dcnode-id="4591" href="#cite_note-:2-55"><span data-dcnode-id="4592" instrument_node="">[55]</span></a></sup><span data-dcnode-id="4589" instrument_node=""> While this decentralization may allow for greater autonomy and flexibility, during a major worldwide crisis, coordinating a response may become difficult. Several institutional challenges and political conflicts emerged because limited communication between agencies and two opposing parties controlling different regions and different levels of government. This was especially true in areas of Northern Italy where the regionalist Lega party had a significant influence.</span><sup class="reference" data-dcnode-id="4586" id="cite_ref-:22_56-0"><a data-dcnode-id="4587" href="#cite_note-:22-56"><span data-dcnode-id="4588" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4585" instrument_node=""> In Spain, basic coordination between different governments was not established until a second COVID wave struck.</span><sup class="reference" data-dcnode-id="4582" id="cite_ref-:23_57-0"><a data-dcnode-id="4583" href="#cite_note-:23-57"><span data-dcnode-id="4584" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4581" instrument_node="">
</span></p><p data-dcnode-id="4558"><span data-dcnode-id="4579" instrument_node="">Iran, an autocratic country, was able to manage their COVID-19 crisis centrally while allowing for flexibility on the ground. it maintained its system of central control but also utilized behavioral economics to motivate citizen compliance and participation.</span><sup class="reference" data-dcnode-id="4576" id="cite_ref-:1_58-0"><a data-dcnode-id="4577" href="#cite_note-:1-58"><span data-dcnode-id="4578" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4575" instrument_node=""> After years of sanctions, Iran was able to develop a level of self-reliance that proved useful during this public health crisis.</span><sup class="reference" data-dcnode-id="4572" id="cite_ref-:12_59-0"><a data-dcnode-id="4573" href="#cite_note-:12-59"><span data-dcnode-id="4574" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4571" instrument_node=""> The government implemented universal measures that did not vary from region to region and developed a citizen focused approach that encouraged engagement.</span><sup class="reference" data-dcnode-id="4568" id="cite_ref-60"><a data-dcnode-id="4569" href="#cite_note-60"><span data-dcnode-id="4570" instrument_node="">[60]</span></a></sup><span data-dcnode-id="4567" instrument_node=""> The Iranians produced their own medical supplies and developed and distributed domestic vaccines. Iran enjoyed a greater degree of success in managing the crisis than in Italy and Spain.</span><sup class="reference" data-dcnode-id="4564" id="cite_ref-:14_61-0"><a data-dcnode-id="4565" href="#cite_note-:14-61"><span data-dcnode-id="4566" instrument_node="">[61]</span></a></sup><span data-dcnode-id="4563" instrument_node=""> However, Iran was not immune to some of the issues occurring elsewhere. The government still struggled to enforce compliance measures and some citizens did engage in activities that were restricted.</span><sup class="reference" data-dcnode-id="4560" id="cite_ref-:15_62-0"><a data-dcnode-id="4561" href="#cite_note-:15-62"><span data-dcnode-id="4562" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4559" instrument_node="">
</span></p><p data-dcnode-id="4548"><span data-dcnode-id="4557" instrument_node="">One noteworthy challenge in the COVID-19 crisis was the impact of Ideological differences on the decision-making and implementation processes of crisis management. Ideology plays a significant role in how institutions are constructed and in the degree of coordination between rival factions in government.</span><sup class="reference" data-dcnode-id="4554" id="cite_ref-:02_63-0"><a data-dcnode-id="4555" href="#cite_note-:02-63"><span data-dcnode-id="4556" instrument_node="">[63]</span></a></sup><span data-dcnode-id="4553" instrument_node=""> The Western emphasis on decentralization has in some ways hindered the effectiveness of government responses to the spread of COVID-19. By relegating the management of health care to regions, political parties are able to implement conflicting measures that fail to achieve the greater national or international goals.</span><sup class="reference" data-dcnode-id="4550" id="cite_ref-:03_64-0"><a data-dcnode-id="4551" href="#cite_note-:03-64"><span data-dcnode-id="4552" instrument_node="">[64]</span></a></sup><span data-dcnode-id="4549" instrument_node="">
</span></p><span data-dcnode-id="4547" instrument_node="">
</span><h3 data-dcnode-id="4537"><span class="mw-headline" data-dcnode-id="4545" id="International_cooperation_on_crisis_management"><span data-dcnode-id="4546" instrument_node="">International cooperation on crisis management</span></span><span class="mw-editsection" data-dcnode-id="4538"><span class="mw-editsection-bracket" data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">[</span></span><a data-dcnode-id="4541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCrisis_management%26action%3Dedit%26section%3D54" title="Edit section: International cooperation on crisis management"><span data-dcnode-id="4542" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4536" instrument_node="">
</span><p data-dcnode-id="4518"><span data-dcnode-id="4535" instrument_node="">Although most studies focus on one or two country-specific examples, it is also important to consider crisis management at a global level.</span><sup class="reference" data-dcnode-id="4532" id="cite_ref-:32_65-0"><a data-dcnode-id="4533" href="#cite_note-:32-65"><span data-dcnode-id="4534" instrument_node="">[65]</span></a></sup><span data-dcnode-id="4531" instrument_node=""> Because each state pursues its own style of crisis management, developing international coordination has proven to be complicated. International organizations and multinational corporations will struggle to adjust their operations to conflicting practices in different countries.</span><sup class="reference" data-dcnode-id="4528" id="cite_ref-:3_66-0"><a data-dcnode-id="4529" href="#cite_note-:3-66"><span data-dcnode-id="4530" instrument_node="">[66]</span></a></sup><span data-dcnode-id="4527" instrument_node=""> Global health organizations have also received scrutiny from around the world for falling short of expectations during previous crises which has deepened the distrust of these international groups.</span><sup class="reference" data-dcnode-id="4524" id="cite_ref-67"><a data-dcnode-id="4525" href="#cite_note-67"><span data-dcnode-id="4526" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4523" instrument_node=""> These problems are alarming because global markets continue to integrate and supply chains grow between countries. Crises that impact more than one country will occur more often and will have greater consequences.</span><sup class="reference" data-dcnode-id="4520" id="cite_ref-:33_68-0"><a data-dcnode-id="4521" href="#cite_note-:33-68"><span data-dcnode-id="4522" instrument_node="">[68]</span></a></sup><span data-dcnode-id="4519" instrument_node="">
