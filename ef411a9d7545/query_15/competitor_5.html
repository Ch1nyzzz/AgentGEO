</span><p data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">Apple, it should be noted, has always treated the browser as a carve-out from its App Store restrictions (not that it has any choice: Apple, </span><a data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/apple-epic-and-the-app-store/"><span data-dcnode-id="885" instrument_node="">in contrast to the App Store</span></a><span data-dcnode-id="883" instrument_node="">, doesn’t have any points of leverage over the open web), so it is fair to dismiss Wehner’s conspirational musings about the iPhone maker’s motivations.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">At the same time, the broader observation is a smart one: Google, thanks to the combination of being the default search engine on Safari and having a business built on the web, basically has first-party privileges on the iPhone when it comes to data. It can show ads to iPhone users on the default browser and track how those ads perform on third-party websites to a much greater extent than an app like Facebook directing users to the exact same third-party websites can.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">In terms of ATT, it is notable that the only part of Google’s business that fell short of Wall Street expectations was YouTube; I suspect it is not a coincidence that YouTube has a significant app-install business of its own, and ATT’s restrictions on what those installed apps can report back to Google may have hurt business a bit. At the same time, the same dynamics that drove advertising to other parts of Snap’s business and to Amazon advertising likely benefited Google as well, including Android.</span></p><span data-dcnode-id="875" instrument_node="">
</span><h4 data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Facebook Risk</span></h4><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">There is no question that Facebook has been significantly impaired, but the company is by no means doomed, in large part because while search is very effective at finding what you want, there remains the need to make you aware of what you didn’t know existed. This is what Facebook excels at more than any other platform: by knowing who you are and what you have liked or purchased in the past, Facebook can place ads for products or apps you have never heard of in the Feed, in Stories, or, going forward in Reels.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="868" instrument_node="">This, in my opinion, is actually a far more important form of advertising than search ads: yes, there are scenarios where a firm can surface something that fits exactly what you are searching for, but oftentimes search ads feel like </span><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2019/the-google-squeeze/"><span data-dcnode-id="867" instrument_node="">a rake on organic results</span></a><span data-dcnode-id="865" instrument_node=""> that would have given you what you were looking for anyways. Facebook-style display advertising, on the other hand, is the foundation upon which an entirely new host of Internet-only businesses are built. These niche-focused companies are only possible when the entire world is your market, but they would founder without a way to find the customers who are looking for exactly what they have to offer; Facebook ads solve that problem.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="862" instrument_node="">That discovery mechanism, though, doesn’t just depend on data; it also depends on attention. This is where the TikTok challenge looms large: </span><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/metas-earnings-facebooks-three-challenges-financial-versus-existential-risks/"><span data-dcnode-id="861" instrument_node="">Apple and ATT may have had the largest financial impact on Facebook, but TikTok and the loss of attention are the more existential risk</span></a><span data-dcnode-id="859" instrument_node="">.</span></p><span data-dcnode-id="857" instrument_node="">
</span><h4 data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Illustrating the Ad Market</span></h4><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="853" instrument_node="">Still, Facebook’s forecast, disappointing as they were to investors, was for $27-29 billion in revenue this quarter; this is still a major player in an advertising market dominated by the three companies mentioned in this article, with one looming dark horse. To illustrate the market — and with the caveat that this is a </span><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">massive</span></strong><span data-dcnode-id="850" instrument_node=""> oversimplification of what is a large and varied opportunity — consider a two-by-two defined by apps and commerce (both physical and digital) on one axis, and search and display on the other:</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><img alt="A two-by-two graph with search and display on one axis, and apps and commerce on the other" class="aligncenter size-large wp-image-8455" data-dcnode-id="847" data-recalc-dims="1" height="474" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-4.png%3Fresize%3D640%252C474%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-4.png?resize=1024%2C758&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-4.png?resize=300%2C222&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-4.png?resize=768%2C569&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-4.png?resize=851%2C630&amp;ssl=1 851w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-4.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">This is what that market looked like back in 2016:</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><img alt="The 2x2 graph in 2016, when Google and Facebook were dominant" class="aligncenter size-large wp-image-8456" data-dcnode-id="841" data-recalc-dims="1" height="474" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-5.png%3Fresize%3D640%252C474%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-5.png?resize=1024%2C758&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-5.png?resize=300%2C222&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-5.png?resize=768%2C569&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-5.png?resize=851%2C630&amp;ssl=1 851w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-5.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">This is what the market looks like in 2022:</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><img alt="The 2x2 graph in 2022, with challenges from Amazon and Apple" class="aligncenter size-large wp-image-8454" data-dcnode-id="835" data-recalc-dims="1" height="474" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-3.png%3Fresize%3D640%252C474%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-3.png?resize=1024%2C758&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-3.png?resize=300%2C222&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-3.png?resize=768%2C569&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-3.png?resize=851%2C630&amp;ssl=1 851w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-3.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">First off, note that this illustration doesn’t include a huge part of Google’s market, which is basically search for anything other than e-commerce. It also doesn’t include the still substantial market for brand advertising. Direct response advertising, though, is the truly Internet-native advertising form, and while Google and Facebook are important, note the two new entrants who have substantial advantages:</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="827"><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Amazon:</span></strong></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="825" instrument_node="">Amazon has the best fulfillment and logistics operation in e-commerce,</span></p><div class="bigfoot-footnote__container" data-dcnode-id="812"><span data-dcnode-id="824" instrument_node=""> </span><button alt="See Footnote 7" class="bigfoot-footnote__button" data-bigfoot-footnote="<p>ex-China, anyways</p>" data-dcnode-id="813" data-footnote-identifier="7" data-footnote-number="7" id="rf2-8451" rel="footnote"><span data-dcnode-id="823" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="821" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="822" fill="white" r="3"></circle></svg><span data-dcnode-id="820" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="818" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="819" fill="white" r="3"></circle></svg><span data-dcnode-id="817" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="815" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="816" fill="white" r="3"></circle></svg><span data-dcnode-id="814" instrument_node=""> </span></button></div><sup class="footnote-print-only" data-dcnode-id="809" data-footnote-backlink-ref="rf2-8451" data-footnote-ref="#fn2-8451" id="rf2-8451"><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23fn2-8451" rel="footnote" title="ex-China, anyways"><span data-dcnode-id="811" instrument_node="">2</span></a></sup><span data-dcnode-id="808" instrument_node=""> which it uses to not only drive its own first-party retail but also third-party merchant services. Indeed, this is another way to think about how Amazon is insulated from ATT: it’s not that the company doesn’t have a multitude of third-party merchants on its platform, it is that by taking on the role of an Aggregator </span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2019/shopify-and-the-power-of-platforms/"><span data-dcnode-id="807" instrument_node="">instead of a platform</span></a><span data-dcnode-id="805" instrument_node=""> it gets to fold all of those third party merchants into its app and website, beyond the limitations enforceable by Apple. Then it effectively gives those third party merchants no choice but to buy ads if they want to be noticed by customers.</span><p></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="800"><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Apple:</span></strong></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">Apple launched its App Store advertising business in the fall of 2016, starting with the most obvious place: search. Apple hasn’t disclosed how much it makes in advertising, but there are analyst estimates of </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.searchenginejournal.com/apple-search-ads-revenue/423997/"><span data-dcnode-id="797" instrument_node="">$5 billion annually</span></a><span data-dcnode-id="795" instrument_node="">. Not all of this is search —&nbsp;Apple has since added inventory in the App Store’s “Suggested” section as well as owned-and-operated apps like Apple News — but most of it is; Apple is confined to the top right corner…for now.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="792" instrument_node="">One of the biggest questions about the advertising landscape going forward is if Apple is going to move down to the “Apps + Discovery” quadrant that remains Facebook’s purview. If the company did they would have an unbeatable advantage: remember, Apple has made clear through its App Store policies and testimony in the Epic case that it views apps on the App Store as first party </span><em data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">for Apple</span></em><span data-dcnode-id="789" instrument_node=""> (this is how </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/apple-ads-and-the-anti-steering-argument-additional-follow-up/"><span data-dcnode-id="788" instrument_node="">the company justifies its anti-steering provisions</span></a><span data-dcnode-id="786" instrument_node="">, likening links to websites to putting up signs in its own store for another, even though the signs in question are in the app and not the App Store). It follows, then, that Apple would see no inconsistency in denying Facebook the ability to have knowledge about installation and conversions derived from a Facebook ad, even as Apple has perfect knowledge of those installations and conversions from its own ads.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="783" instrument_node="">This isn’t a hypothetical! Apple’s </span><a data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.apple.com/legal/privacy/data/en/apple-advertising/"><span data-dcnode-id="782" instrument_node="">Advertising &amp; Privacy page</span></a><span data-dcnode-id="780" instrument_node=""> states:</span></p><span data-dcnode-id="778" instrument_node="">
</span><blockquote data-dcnode-id="757"><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">
  We may use information such as the following to assign you to segments:</span></p><span data-dcnode-id="775" instrument_node="">
</span><ul data-dcnode-id="761"><span data-dcnode-id="774" instrument_node="">
</span><li data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Account Information: Your name, address, age, gender, and devices registered to your Apple ID account. Information such as your first name in your Apple ID registration page or salutation in your Apple ID account may be used to derive your gender. You can update your account information on the Apple ID website.</span></li><span data-dcnode-id="771" instrument_node="">
</span><li data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Downloads, Purchases &amp; Subscriptions: The music, movies, books, TV shows, and apps you download, as well as any in-app purchases and subscriptions. We don’t allow targeting based on downloads of a specific app or purchases within a specific app (including subscriptions) from the App Store, unless the targeting is done by that app’s developer.</span></li><span data-dcnode-id="768" instrument_node="">
</span><li data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Apple News and Stocks: The topics and categories of the stories you read and the publications you follow, subscribe to, or enable notifications from.</span></li><span data-dcnode-id="765" instrument_node="">
</span><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Advertising: Your interactions with ads delivered by Apple’s advertising platform.</span></li><span data-dcnode-id="762" instrument_node="">
</span></ul><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">  When selecting which ad to display from multiple ads for which you are eligible, we may use some of the above-mentioned information, as well as your App Store searches and browsing activity, to determine which ad is likely to be most relevant to you. App Store browsing activity includes the content and apps you tap and view while browsing the App Store. This information is aggregated across users so that it does not identify you. We may also use local, on-device processing to select which ad to display, using information stored on your device, such as the apps you frequently open.
</span></p></blockquote><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="755" instrument_node="">As you can see, Apple does not currently allow developers to target downloads or purchases from within a specific app the developer does not own,</span></p><div class="bigfoot-footnote__container" data-dcnode-id="742"><span data-dcnode-id="754" instrument_node=""> </span><button alt="See Footnote 8" class="bigfoot-footnote__button" data-bigfoot-footnote="<p>This is why I have been intrigued by <a href=&quot;https://stratechery.com/2021/interoperability-defined-applovin-files-s-1-the-facebook-shopify-value-chain/&quot;>AppLovin’s approach</a>.</p>" data-dcnode-id="743" data-footnote-identifier="8" data-footnote-number="8" id="rf3-8451" rel="footnote"><span data-dcnode-id="753" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="751" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="752" fill="white" r="3"></circle></svg><span data-dcnode-id="750" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="748" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="749" fill="white" r="3"></circle></svg><span data-dcnode-id="747" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="745" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="746" fill="white" r="3"></circle></svg><span data-dcnode-id="744" instrument_node=""> </span></button></div><sup class="footnote-print-only" data-dcnode-id="739" data-footnote-backlink-ref="rf3-8451" data-footnote-ref="#fn3-8451" id="rf3-8451"><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23fn3-8451" rel="footnote" title="This is why I have been intrigued by <a href=&quot;https://stratechery.com/2021/interoperability-defined-applovin-files-s-1-the-facebook-shopify-value-chain/&quot;>AppLovin’s approach</a>."><span data-dcnode-id="741" instrument_node="">3</span></a></sup><span data-dcnode-id="738" instrument_node=""> but that doesn’t mean Apple cannot; again, the company has made clear it sees every app on the iPhone — especially their purchases — as Apple data, and this document makes very clear that Apple only sees data collection as problematic when it involves third parties. To that end, Apple could set up an auction-based advertising network that monetized on a per-install basis and run those ads within an Apple-controlled network that is available to third-party apps. It would basically be a better version of Facebook — well, in theory, Apple has admittedly never been really good at this sort of thing —&nbsp;but since only Apple sees the data (just as only Facebook sees the data from third-party apps), Apple gets to pat itself on the back all of the way to the bank.</span><p></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">This would, needless to say, be a breathtaking example of anti-competitive behavior; kneecapping your competitor via platform control and then taking over their business is what one would think antitrust law would be designed to stop. But then you look up and Apple has gotten away with its App Store policies for years, and Facebook is getting sued for limiting competition even as it faces an existential threat from TikTok, and who knows, maybe it would work.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="732" instrument_node="">I hinted at one of the objections to this happening above: Apple has tried to do advertising before, </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2016/apple-scales-back-iads-the-apple-news-mess/"><span data-dcnode-id="731" instrument_node="">and failed miserably</span></a><span data-dcnode-id="729" instrument_node="">. As any Apple aficionado will tell you, ads aren’t in their nature, products are. But then again, had you told those same aficionados that Apple would be facing developer ire, antitrust lawsuits, and regulatory obstacles all over the world because of its insistence that it is owed 15-30% of all digital content consumed on the iPhone, they probably would have said that was impossible too. What is clear is that the $10 billion in revenue that Facebook won’t see this year will go somewhere, and Apple’s Services Narrative has never felt like a bigger opportunity.</span></p><span data-dcnode-id="727" instrument_node="">
</span><hr data-dcnode-id="726"><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="724" instrument_node="">There is a broader takeaway to this discussion; I wrote in the conclusion of 2020’s </span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/the-end-of-the-beginning/"><span data-dcnode-id="723" instrument_node="">The End of the Beginning</span></a><span data-dcnode-id="721" instrument_node="">:</span></p><span data-dcnode-id="719" instrument_node="">
</span><blockquote data-dcnode-id="716"><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">
  In other words, today’s cloud and mobile companies — Amazon, Microsoft, Apple, and Google — may very well be the GM, Ford, and Chrysler of the 21st century. The beginning era of technology, where new challengers were started every year, has come to an end; however, that does not mean the impact of technology is somehow diminished: it in fact means the impact is only getting started.
</span></p></blockquote><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="714" instrument_node="">There was one company conspicuous in its absence, and that was Facebook. Real power in technology comes from rooting the digital in something physical: for Amazon that is its fulfillment centers and logistics on the e-commerce side, and its data centers on the cloud side. For Microsoft it is its data centers and its global sales organization and multi-year relationships with basically every enterprise on earth. For Apple it is the iPhone, and for Google is is Android and its mutually beneficial relationship with Apple (this is less secure than Android, but that is why Google is paying an estimated </span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.macrumors.com/2022/01/05/google-pays-apple-stay-out-of-search/"><span data-dcnode-id="713" instrument_node="">$15 billion</span></a><span data-dcnode-id="711" instrument_node=""> annually — and growing — to keep its position). Facebook benefited tremendously from being </span><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2013/mobile-makes-facebook-just-an-app-thats-great-news/"><span data-dcnode-id="710" instrument_node="">just an app</span></a><span data-dcnode-id="708" instrument_node="">, but the freedom of movement that entailed meant taking a dependency on iOS and Android, and Apple has exploited that dependency in part, if not yet in full.</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="705" instrument_node="">This, more than anything, is </span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2018/the-problem-with-virtual-reality/"><span data-dcnode-id="704" instrument_node="">the way to understand the Meta bet</span></a><span data-dcnode-id="702" instrument_node="">, and why </span><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/meta/"><span data-dcnode-id="701" instrument_node="">it matters so much to CEO Mark Zuckerberg</span></a><span data-dcnode-id="699" instrument_node="">. Investors may want the company to focus on what it is best at; Zuckerberg wants to build a company that is truly independent of anyone.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="691"><em data-dcnode-id="692"><span data-dcnode-id="696" instrument_node="">I wrote a follow-up to this Article in </span><a data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/digital-advertising-follow-up-spotify-rogan-follow-up/"><span data-dcnode-id="695" instrument_node="">this Daily Update</span></a><span data-dcnode-id="693" instrument_node="">.</span></em></p><span data-dcnode-id="690" instrument_node="">
</span><hr class="footnotes" data-dcnode-id="689"><ol class="footnotes footnote-print-only" data-dcnode-id="670" style="list-style-type:decimal"><li class="footnote-processed footnote-print-only" data-dcnode-id="684" id="fn1-8451"><p data-dcnode-id="685"><span data-dcnode-id="688" instrument_node="">Twitter did have a large run-up a year ago that has since disappeared&nbsp;</span><a class="backlink" data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23rf1-8451" title="Return to footnote 1."><img alt="↩" class="emoji" data-dcnode-id="687" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/21a9.svg&amp;raw"></a></p></li><li class="footnote-processed footnote-print-only" data-dcnode-id="679" id="fn2-8451"><p data-dcnode-id="680"><span data-dcnode-id="683" instrument_node="">ex-China, anyways&nbsp;</span><a class="backlink" data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23rf2-8451" title="Return to footnote 2."><img alt="↩" class="emoji" data-dcnode-id="682" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/21a9.svg&amp;raw"></a></p></li><li class="footnote-processed footnote-print-only" data-dcnode-id="671" id="fn3-8451"><p data-dcnode-id="672"><span data-dcnode-id="678" instrument_node="">This is why I have been intrigued by </span><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/interoperability-defined-applovin-files-s-1-the-facebook-shopify-value-chain/"><span data-dcnode-id="677" instrument_node="">AppLovin’s approach</span></a><span data-dcnode-id="675" instrument_node="">.&nbsp;</span><a class="backlink" data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23rf3-8451" title="Return to footnote 3."><img alt="↩" class="emoji" data-dcnode-id="674" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/21a9.svg&amp;raw"></a></p></li></ol><span data-dcnode-id="669" instrument_node="">
</span></div><span data-dcnode-id="666" instrument_node="">
</span></article><span data-dcnode-id="663" instrument_node="">
</span><article class="post-8394 post type-post status-publish format-standard has-post-thumbnail hentry category-articles topics-app-stores topics-app-tracking-transparency-att topics-events topics-gaming topics-apple-app-store topics-mergers-and-acquisitions topics-mobile-gaming topics-pc-gaming topics-playstation topics-streaming-gaming topics-xbox concepts-advertising concepts-aggregation-theory concepts-business-models concepts-differentiation concepts-hardware concepts-owning-customer-relationship concepts-platforms concepts-product-management concepts-smiling-curve concepts-subscriptions companies-activision companies-apple companies-blizzard companies-bungie companies-king-digital companies-microsoft companies-sony companies-take-two companies-zynga" data-dcnode-id="294" id="post-8394"><span data-dcnode-id="662" instrument_node="">
</span><header class="entry-header" data-dcnode-id="636"><span data-dcnode-id="661" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="658"><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/gaming-the-smiling-curve/" rel="bookmark"><span data-dcnode-id="660" instrument_node="">Gaming the Smiling Curve</span></a></h1><span data-dcnode-id="657" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="639"><span data-dcnode-id="656" instrument_node="">
</span><span class="posted-on" data-dcnode-id="649"><span class="screen-reader-text" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Posted on</span></span><time class="entry-date published" data-dcnode-id="652" datetime="2022-02-01T04:45:53-08:00"><span data-dcnode-id="653" instrument_node="">Tuesday, February 1, 2022</span></time><time class="updated" data-dcnode-id="650" datetime="2022-02-25T06:26:51-08:00"><span data-dcnode-id="651" instrument_node="">Friday, February 25, 2022</span></time></span><span data-dcnode-id="648" instrument_node=""> </span><span class="byline" data-dcnode-id="641"><span class="author vcard" data-dcnode-id="642"><span class="screen-reader-text" data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Author</span></span><span data-dcnode-id="645" instrument_node=""> by </span><a class="url fn n" data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/author/stratechery/"><span data-dcnode-id="644" instrument_node="">Ben Thompson</span></a></span></span><span data-dcnode-id="640" instrument_node=""> </span></div><span data-dcnode-id="637" instrument_node="">
</span></header><span data-dcnode-id="634" instrument_node="">
</span><div class="entry-content" data-dcnode-id="297"><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="632" instrument_node="">Another week, another gaming acquisition. First </span><a data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/take-two-acquires-zynga-the-new-york-times-buys-the-athletic/"><span data-dcnode-id="631" instrument_node="">Take-Two acquired Zynga</span></a><span data-dcnode-id="629" instrument_node="">, then </span><a data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/microsoft-acquires-activision-blizzard-notes-on-the-acquisition-an-interview-with-microsoft-gaming-ceo-phil-spencer/"><span data-dcnode-id="628" instrument_node="">Microsoft acquired Activision-Blizzard</span></a><span data-dcnode-id="626" instrument_node="">, and now </span><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2022-01-31/sony-buys-destiny-developer-bungie-for-3-6-billion"><span data-dcnode-id="625" instrument_node="">Sony just announced the acquisition of Bungie</span></a><span data-dcnode-id="623" instrument_node="">.</span></p><div class="bigfoot-footnote__container" data-dcnode-id="610"><span data-dcnode-id="622" instrument_node=""> </span><button alt="See Footnote 9" class="bigfoot-footnote__button" data-bigfoot-footnote="<p>I will save the Wordle acquisition for another day!</p>" data-dcnode-id="611" data-footnote-identifier="9" data-footnote-number="9" id="rf1-8394" rel="footnote"><span data-dcnode-id="621" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="619" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="620" fill="white" r="3"></circle></svg><span data-dcnode-id="618" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="616" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="617" fill="white" r="3"></circle></svg><span data-dcnode-id="615" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="613" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="614" fill="white" r="3"></circle></svg><span data-dcnode-id="612" instrument_node=""> </span></button></div><sup class="footnote-print-only" data-dcnode-id="607" data-footnote-backlink-ref="rf1-8394" data-footnote-ref="#fn1-8394" id="rf1-8394"><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23fn1-8394" rel="footnote" title="I will save the Wordle acquisition for another day!"><span data-dcnode-id="609" instrument_node="">1</span></a></sup><span data-dcnode-id="606" instrument_node=""> Each of these acquisitions is interesting in its own right, but taken as a set they paint a picture of industry evolution that extends far beyond gaming.</span><p></p><span data-dcnode-id="604" instrument_node="">
</span><h4 data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Take-Two and Mobile Consolidation</span></h4><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="600" instrument_node="">The straightforward explanation for Take-Two’s acquisition of Zynga is the fact that mobile captures more than 50% of gaming industry revenue </span><em data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">and</span></em><span data-dcnode-id="597" instrument_node=""> it is growing much faster (7% last year) than PC and console gaming (the gaming industry grew 1.4% as a whole); that is a problem for Take-Two given that nearly all of the company’s revenue comes from PC and console series like </span><em data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Grand Theft Auto</span></em><span data-dcnode-id="594" instrument_node="">, </span><em data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">NBA 2K</span></em><span data-dcnode-id="591" instrument_node="">, </span><em data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Red Dead</span></em><span data-dcnode-id="588" instrument_node="">, </span><em data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Bordlerlands</span></em><span data-dcnode-id="585" instrument_node="">, and more.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">Zynga, meanwhile, was among the least prepared of the major mobile gaming companies for the changes wrought by Apple’s App Tracking Transparency (ATT) policy, which was introduced with iOS 14 and rolled out over the first half of 2021. In the pre-ATT world everyone from e-commerce sellers to app developers could effectively offload the collection and analysis of conversion data and subsequent targeting of advertising to Facebook, to the benefit of everyone involved: individual developers and retailers did not need to bear the risk or expense of collecting and analyzing data, and could instead collectively outsource that job to the Facebook </span><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2018/data-factories/"><span data-dcnode-id="581" instrument_node="">data factory</span></a><span data-dcnode-id="579" instrument_node="">, which had the benefit of making Facebook advertising that much more effective, not only to the benefit of Facebook’s bottom line but also to that of those that relied on its advertising platform.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">ATT, meanwhile, didn’t ban data collection or analysis or targeting or any of the other aspects of advertising that many of its supporters object to; what it targeted was doing so collectively. That means that the policy has been a huge boon for fully integrated advertisers (i.e. advertisers that collect data, target, and show advertisements) like Google and Amazon. In this world the natural response has been consolidation; compare Zynga’s stock price over the last year to a company </span><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/interoperability-defined-applovin-files-s-1-the-facebook-shopify-value-chain/"><span data-dcnode-id="575" instrument_node="">like AppLovin</span></a><span data-dcnode-id="573" instrument_node=""> which was ahead of the curve in buying up multiple parts of the ad stack and combining them with its own titles to maximize the value of first party data:</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><img alt="Zynga versus AppLovin stock performance over the last year" class="aligncenter size-large wp-image-8395" data-dcnode-id="570" data-recalc-dims="1" height="248" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-1.png%3Fresize%3D640%252C248%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-1.png?resize=1024%2C397&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-1.png?resize=300%2C116&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-1.png?resize=768%2C298&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-1.png?resize=1200%2C465&amp;ssl=1 1200w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-1.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="567" instrument_node="">AppLovin is down a bit with the general market drawdown, but it’s not an accident the company increased in price last fall while Zynga plummeted (the stock is up from its depths because of the not-yet-closed acquisition): one of </span><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mobiledevmemo.com/how-zynga-executed-its-stunning-turnaround/"><span data-dcnode-id="566" instrument_node="">the keys to Zynga’s turnaround</span></a><span data-dcnode-id="564" instrument_node=""> was buying small independent studios and letting them stay independent; that’s no longer a viable approach in a post-ATT world, and Take-Two will have to centralize Zynga and only then leverage Zynga’s expertise to bring its valuable IP to mobile platforms in a much more complete way than it has previously.</span></p><span data-dcnode-id="562" instrument_node="">
</span><h4 data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Microsoft and Xbox Game Pass</span></h4><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Take-Two wasn’t the only company taking advantage of a company with a plummeting stock price; Microsoft did the same with Activision Blizzard:</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><img alt="Activision's stock price over the last year" class="aligncenter size-large wp-image-8396" data-dcnode-id="555" data-recalc-dims="1" height="248" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-2.png%3Fresize%3D640%252C248%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-2.png?resize=1024%2C397&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-2.png?resize=300%2C116&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-2.png?resize=768%2C298&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-2.png?resize=1200%2C465&amp;ssl=1 1200w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-2.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="552" instrument_node="">Activision Blizzard does own King Digital, which still provides over $2 billion in revenue from </span><em data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Candy Crush</span></em><span data-dcnode-id="549" instrument_node=""> and its various spin-offs, but in this case the stock price decline was primarily due to </span><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.bloomberglaw.com/daily-labor-report/activision-blizzard-sued-by-california-over-frat-boy-culture"><span data-dcnode-id="548" instrument_node="">major issues regarding Activision Blizzard’s internal culture, including a lawsuit by the state of California</span></a><span data-dcnode-id="546" instrument_node="">. Microsoft, though, was well positioned to take advantage of Activision Blizzard’s troubles thanks to Xbox Game Pass.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Whenever a major platform acquires a developer on that platform, the first question users ask is if the platform owner will make the developer’s content exclusive. It’s an obvious question — why else would the platform owner buy it, given that they can still collect revenue from the developer, both directly via platform fees and indirectly via licensing fees? — but the answer is not always straightforward, thanks to the nature of software.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Software, including games, entails a massive investment in upfront development costs. You have to build (or license and adapt to) a game engine, write and build out the story, draw and develop the assets, etc. All of this is work that is both expensive and also only needs to be done once; it follows, then, that it is in the software developer’s economic interest to make the game available as widely as possible; after all, every additional copy of a game has zero marginal costs, which means that every additional copy of a game sold provides nothing but leverage on those fixed costs, and, once covered, pure profit (that noted, there are significant costs associated with supporting multiple platforms — I have seen estimates around 25~40% of extra costs, depending on the game — so going exclusive is not an entirely deadweight cost).</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="537" instrument_node="">This makes the math around developer acquisitions a bit tricky for platform acquirers: to buy a gaming studio in order to make its games exclusive to the platform entails destroying a significant part of the game studio’s economic value; after all, you are acquiring a property like </span><em data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Call of Duty</span></em><span data-dcnode-id="534" instrument_node=""> based on the revenue it grosses from PC, Xbox, and PlayStation —&nbsp;cutting off the latter means you overpaid. This is why it is not a surprise that Microsoft has already committed to keeping Activision Blizzard’s and </span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/microsoft-and-zenimax-microsoft-ignite-microsoft-and-covid/"><span data-dcnode-id="533" instrument_node="">ZeniMax’s</span></a><span data-dcnode-id="531" instrument_node=""> most popular cross-platform games on PlayStation.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="528" instrument_node="">What makes Microsoft’s acquisition spree particularly compelling, though, is that Microsoft is trying to create a new business model for gaming: for $15/month you can play all of the games Microsoft owns, and those of any third-party developer who wishes to join up, on any platform that supports them. This includes not only the Xbox console and Windows PCs,</span></p><div class="bigfoot-footnote__container" data-dcnode-id="515"><span data-dcnode-id="527" instrument_node=""> </span><button alt="See Footnote 10" class="bigfoot-footnote__button" data-bigfoot-footnote="<p>Each of which has a standalone $10/month plan</p>" data-dcnode-id="516" data-footnote-identifier="10" data-footnote-number="10" id="rf2-8394" rel="footnote"><span data-dcnode-id="526" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="524" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="525" fill="white" r="3"></circle></svg><span data-dcnode-id="523" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="521" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="522" fill="white" r="3"></circle></svg><span data-dcnode-id="520" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="518" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="519" fill="white" r="3"></circle></svg><span data-dcnode-id="517" instrument_node=""> </span></button></div><sup class="footnote-print-only" data-dcnode-id="512" data-footnote-backlink-ref="rf2-8394" data-footnote-ref="#fn2-8394" id="rf2-8394"><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23fn2-8394" rel="footnote" title="Each of which has a standalone $10/month plan"><span data-dcnode-id="514" instrument_node="">2</span></a></sup><span data-dcnode-id="511" instrument_node=""> but also the nascent Xbox streaming service, which makes console-level games available on mobile and PC and, soon enough, smart TVs or a potential Xbox streaming stick. This is a business model that not only makes sense given the evolution of technology towards cloud-centric services, but is also </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2017/microsofts-monopoly-hangover/"><span data-dcnode-id="510" instrument_node="">in-line with Microsoft’s core competency and fundamental nature</span></a><span data-dcnode-id="508" instrument_node="">.</span><p></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">More importantly, at least in the context of this Article, is the freedom of movement this gives Microsoft when it comes to acquisitions: all of ZeniMax’s titles, and many of Activision Blizzard’s titles in the future, are still available on PlayStation and Steam as individual purchases; if that is how you want to pay then Microsoft will accept your money, and avoid the loss of cutting you off. All of those games, though, are also available on Xbox Game Pass, because Microsoft is betting that many gamers will realize it’s a pretty good deal, even as it aligns with the company’s corporate goal of creating lifelong customers paying via subscription.</span></p><span data-dcnode-id="503" instrument_node="">
</span><h4 data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Sony and Exclusives</span></h4><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="499" instrument_node="">Major deals like Sony’s acquisition of Bungie, the once-makers of Halo (while owned by Microsoft) and current developers of Destiny (for which they negotiated their freedom), obviously don’t come together in two weeks. It’s tempting, though, to view it as defensive: if Microsoft were to withdraw a property like the afore-mentioned </span><em data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Call of Duty</span></em><span data-dcnode-id="496" instrument_node="">, well, Sony can always take away </span><em data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Destiny.</span></em></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="491" instrument_node="">The truth, though, is that this is simply the most visible of a long line of acquisitions, going back two decades to Sony’s 2001 acquisition of Naughty Dog, of studios that make content for consoles that is worth switching over. Naughty Dog has made </span><em data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Crash Bandicoot</span></em><span data-dcnode-id="488" instrument_node="">, </span><em data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Uncharted</span></em><span data-dcnode-id="485" instrument_node="">, and </span><em data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">The Last of Us</span></em><span data-dcnode-id="482" instrument_node="">; Incognito made the </span><em data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Twisted Metal</span></em><span data-dcnode-id="479" instrument_node=""> series; Guerrilla Games made the </span><em data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">Killzone</span></em><span data-dcnode-id="476" instrument_node=""> and </span><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Horizon</span></em><span data-dcnode-id="473" instrument_node=""> series; Sucker Punch made </span><em data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Sly Cooper</span></em><span data-dcnode-id="470" instrument_node="">, </span><em data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Infamous</span></em><span data-dcnode-id="467" instrument_node="">, and the </span><em data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Ghost of Tsushima</span></em><span data-dcnode-id="464" instrument_node="">; Insomniac made </span><em data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Ratchet and Clank</span></em><span data-dcnode-id="461" instrument_node=""> and </span><em data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Spider-Man</span></em><span data-dcnode-id="458" instrument_node="">; Bluepoint Games made </span><em data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Shadow of the Colossus</span></em><span data-dcnode-id="455" instrument_node=""> and </span><em data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Demon’s Souls</span></em><span data-dcnode-id="452" instrument_node="">; all were PlayStation exclusives, credited with Sony’s dominance over the last two console generations.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="449" instrument_node="">Sony, rather than chasing Microsoft, appears set for a more Nintendo-like trajectory: customers will buy their consoles because they have exclusive games that you can’t get anywhere else; unlike Nintendo, Sony consoles are on the cutting edge technologically, which means that the remaining 3rd-party publishers like EA will continue to support them. Sure, Microsoft has a good subscription, but Sony has games you can’t get anywhere else (and, </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2021-12-03/playstation-plans-new-service-to-take-on-xbox-game-pass"><span data-dcnode-id="448" instrument_node="">rumors suggest</span></a><span data-dcnode-id="446" instrument_node="">, a new subscription service of its own, although it may not have the best titles available immediately, which makes sense given Sony’s strategy).</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="443" instrument_node="">That is why I expect Bungie to continue to support </span><em data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Destiny</span></em><span data-dcnode-id="440" instrument_node=""> across multiple platforms (PlayStation, Xbox, and PC), </span><strike data-dcnode-id="435"><span data-dcnode-id="439" instrument_node="">while new content beyond the upcoming </span><em data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Witch Queen</span></em><span data-dcnode-id="436" instrument_node=""> expansion is probably going to come out on PlayStation first; whatever title lies beyond that, meanwhile, has a good chance of being PlayStation only (if you haven’t spent the money on supporting multiple platforms, it is an easier choice to be an exclusive).</span></strike></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="427"><em data-dcnode-id="428"><span data-dcnode-id="432" instrument_node="">Update: Bungie made clear in </span><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bungie.net/en/Explore/Detail/News/50989"><span data-dcnode-id="431" instrument_node="">an FAQ</span></a><span data-dcnode-id="429" instrument_node=""> that future Destiny content would be available on the first day on all platforms, which makes sense given that Destiny supports cross-play. Moreover, the same FAQ states that any IP beyond Destiny would also be cross-platform; this doesn’t detract from the general point about Sony and exclusives, but it certainly suggests that doesn’t apply in this case. This was an error on my part and I apologize.</span></em></p><span data-dcnode-id="426" instrument_node="">
</span><h4 data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Gaming and the Smiling Curve</span></h4><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="422" instrument_node="">The Smiling Curve, as I first explained in </span><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2014/publishers-smiling-curve/"><span data-dcnode-id="421" instrument_node="">this 2014 Article</span></a><span data-dcnode-id="419" instrument_node="">, was a concept created by Acer founder Stan Shih to explain where the profits were in technological manufacturing; from </span><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Smiling_curve"><span data-dcnode-id="418" instrument_node="">Wikipedia</span></a><span data-dcnode-id="416" instrument_node="">:</span></p><span data-dcnode-id="414" instrument_node="">
</span><blockquote data-dcnode-id="405"><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">
  A smiling curve is an illustration of value-adding potentials of different components of the value chain in an IT-related manufacturing industry…According to Shih’s observation, in the personal computer industry, both ends of the value chain command higher values added to the product than the middle part of the value chain. If this phenomenon is presented in a graph with a Y-axis for value-added and an X-axis for value chain (stage of production), the resulting curve appears like a “smile”.</span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="410" instrument_node=""> </span><a data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Smiling_curve"><img alt="" class="aligncenter size-full wp-image-1214" data-dcnode-id="409" data-recalc-dims="1" height="496" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2014/10/Screenshot-2014-10-29-at-2.png%3Fresize%3D640%252C496%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2014/10/Screenshot-2014-10-29-at-2.png?w=963&amp;ssl=1 963w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/10/Screenshot-2014-10-29-at-2.png?resize=300%2C233&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/10/Screenshot-2014-10-29-at-2.png?resize=768%2C596&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/10/Screenshot-2014-10-29-at-2.png?resize=812%2C630&amp;ssl=1 812w" width="640"></a><span data-dcnode-id="407" instrument_node="">
</span></p></blockquote><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">I argued at the time that this framework was applicable to the publishing industry:</span></p><span data-dcnode-id="401" instrument_node="">
</span><blockquote data-dcnode-id="389"><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">
  When people follow a link on Facebook (or Google or Twitter or even in an email), the page view that results is not generated because the viewer has any particular affinity for the publication that is hosting the link, and it is uncertain at best whether or not their affinity will increase once they’ve read the article. If anything, the reader is likely to ascribe any positive feelings to the author, perhaps taking a peek at their archives or Twitter feed.</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">  Over time, as this cycle repeats itself and as people grow increasingly accustomed to getting most of their “news” from Facebook (or Google or Twitter), value moves to the ends, just like it did in the IT manufacturing industry or smartphone industry:</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="394" instrument_node=""> </span><a data-dcnode-id="392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2014/publishers-smiling-curve/"><img alt="The Publishing Smiling Curve" class="aligncenter size-large wp-image-5164" data-dcnode-id="393" data-recalc-dims="1" height="449" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2020/08/smilingcurve-1.png%3Fresize%3D640%252C449%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2020/08/smilingcurve-1.png?resize=1024%2C718&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2020/08/smilingcurve-1.png?resize=300%2C210&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2020/08/smilingcurve-1.png?resize=768%2C538&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2020/08/smilingcurve-1.png?resize=899%2C630&amp;ssl=1 899w, https://i0.wp.com/stratechery.com/wp-content/uploads/2020/08/smilingcurve-1.png?w=1280&amp;ssl=1 1280w" width="640"></a><span data-dcnode-id="391" instrument_node="">
</span></p></blockquote><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="387" instrument_node="">I think this framework is also the best way to think about all of these acquisitions. To generalize the concept, the top right of the curve are companies that have a direct connection with customers, including the </span><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2015/aggregation-theory/"><span data-dcnode-id="386" instrument_node="">Aggregators</span></a><span data-dcnode-id="384" instrument_node="">; the top left are highly differentiated content makers:</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><img alt="The Smiling Curve in gaming" class="aligncenter size-large wp-image-8397" data-dcnode-id="381" data-recalc-dims="1" height="424" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-3.png%3Fresize%3D640%252C424%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-3.png?resize=1024%2C679&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-3.png?resize=300%2C199&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-3.png?resize=768%2C509&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-3.png?resize=950%2C630&amp;ssl=1 950w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/gamingsmilingcurve-3.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="378" instrument_node="">When it comes to mobile gaming, the dominant Aggregators on the top right side of the curve are Apple and Google and their respective App Stores; the most cynical interpretation of ATT is that Facebook was superseding both to become the most important way in which people discovered apps, and Apple, thanks to its </span><a data-dcnode-id="376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/apple-epic-and-the-app-store/"><span data-dcnode-id="377" instrument_node="">OS-level control</span></a><span data-dcnode-id="375" instrument_node="">, cut them off at the knees, pushing Facebook down to the middle. The response from content makers, then, has been to consolidate and increase the leverage that comes from differentiated content.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Xbox Game Pass, meanwhile, is an attempt to build a position as an Aggregator; the initiative will be successful to the extent that gamers play games because they are in Game Pass, and increasingly shun games that have to be purchased individually (incentivizing holdouts to join Microsoft’s subscription). Microsoft is kick-starting this effort by buying its own differentiated content and overlaying their long-term incentives over any individual game studio’s incentives to maximize their short-term revenue by selling a game individually.</span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Sony is pursuing a similar strategy, but with a different business model: whereas Microsoft is increasingly device-agnostic (of course it helps that they sell both Xbox consoles and Windows), Sony is doubling down on the integration of hardware and software. Their best content is designed to not only make money in its own right but to also persuade customers to buy PlayStation consoles; the more PlayStation consoles there are the more attractive the platform is to 3rd-party developers.</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">What is much less viable is anything in the middle. The original PlayStation was almost completely dependent on 3rd-party games, relying on technical superiority to build its user base and attract developers; that approach reached its limit with the relative disappointment that was the PlayStation 3, and Sony has been focused on exclusives ever since. Content developers like Zynga, meanwhile, can’t depend on companies in the middle either: Apple’s rules have ensured that anyone who is not an Aggregator has to figure out how to make money on their own. There is still a market for 3rd-party developers on consoles and PCs — Steam is a major Aggregator on the latter, challenged by not just Microsoft but also Epic, who all are competing for the best developers — but it is increasingly important that content be highly differentiated and costs tightly contained.</span></p><span data-dcnode-id="364" instrument_node="">
</span><h4 data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">The Upside of Acquisitions</span></h4><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">There are a lot of seemingly scary implications in this analysis, including concepts like exclusives, lock-in, and the sense that the big are getting bigger. I think there is a strong argument, though, that the overall impact on consumers is on balance a positive one. Gaming, to a much greater extent than many other industries, is a zero sum game: time spent playing one title is time not spent playing another one. Moreover, the total cost of ownership for any particular gaming platform, relative to the time spent playing games, is a very favorable one. With regards to the latter point, the price of having access to everything is not an overwhelming one; with regards to the former the incentives to make a game that is truly exceptional, and thus truly differentiated, are higher than ever.</span></p><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="357" instrument_node="">Phil Spencer, CEO of Microsoft Gaming, made an argument along these lines when I challenged him in a </span><a data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/microsoft-acquires-activision-blizzard-notes-on-the-acquisition-an-interview-with-microsoft-gaming-ceo-phil-spencer/"><span data-dcnode-id="356" instrument_node="">Stratechery interview</span></a><span data-dcnode-id="354" instrument_node=""> about a potential loss of competition entailed in the company’s Activision Blizzard acquisition:</span></p><span data-dcnode-id="352" instrument_node="">
</span><blockquote data-dcnode-id="315"><p data-dcnode-id="347"><span data-dcnode-id="351" instrument_node="">
</span><strong data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Phil Spencer:</span></strong><span data-dcnode-id="348" instrument_node=""> Ah. I mean, that’s maybe where we’ll differ in opinion. Some of this just comes down to the teams that become part of our team and our cultural journey with them that starts long ago. This will sound a little bit like a kind of gaming person, but I’ll say the thing that I have found that drives the teams internally to our organization is they want to do things they’ve never been able to do before. They want to reach more players of their creations than they’ve ever been able to create before. And I might argue the opposite, that the churn of “I need another holiday release next year” and then the year after and then the year after can be more stifle on creativity than the freedom that we’re able to give that says, “It’s not about one business model that works for us, it’s actually about multiple business models. It’s not about one screen that people will consume your game on. You pick the screen that’s right for you. And the input, if you want keyboard or mouse, you want touch, you want controller, you pick. You pick the subject matter that you want to work on.”</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">  And frankly, when I look at the portfolio of games that we’ve been shipped over the last two or three years and some of the subject matter that our creators have decided to tackle, not always in the thinnest definition of what’s marketable at that time, I think those innovations and that kind of risk taking comes from having amazing teams that are thinking about what’s possible or even what’s not possible and how our tools and distribution can help them in creating things that they’ve never been able to create before. That’s what I feel.</span></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">  Today, what I did after we announced this morning is I got to sit down with our studio leaders. The amount of energy they had for learning from other teams, because creators can get isolated because they’re so focused on the thing they’re doing right now. Now we get to sit there at the broadest level and have discussions about what people are thinking about, whether they’re challenging each other with sharing the learning that they have, what they aspire to go do. The energy in the room was awesome, it was a virtual room in a Teams call, but it was still awesome. I would say that that freedom to innovate, to try new things, because it’s not just down to one business model or one screen or even one device that somebody might buy is the thing that I found is most liberating for the teams here.</span></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="339" instrument_node=""> </span><strong data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Of course that’s the answer I would expect.</span></strong></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="334" instrument_node=""> </span><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">PS:</span></strong><span data-dcnode-id="331" instrument_node=""> (laughing)</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="328" instrument_node=""> </span><strong data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">I think that one of the early questions about this deal is basically — the big company doesn’t think competition is particularly useful or valuable. “We want to give people freedom to explore.”</span></strong></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="323" instrument_node=""> </span><strong data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">PS:</span></strong><span data-dcnode-id="320" instrument_node=""> Well, let me hit on that one. Sorry, I didn’t mean to interrupt, but let me hit on competition really quick, because I see competition as a little bit different. There’s a ton of competition in the games business. If I rewind 30 years ago, the video game business was dictated by who had shelf space at Egghead because there was such a constriction on distribution and funding and marketing of games that the portfolio of games I could choose from was so limited. I love the fact that when I look at the top 10 games that are being played, how many come from traditional places versus how many now are coming from creators that didn’t even exist 10 years ago. I love that there’s that creative turnover or just the diversity in where great games come from.</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">  And then when I think about the platform side, the largest platforms for playing games or mobile devices, distribution on those devices are controlled by two companies. So for us, it’s how do we go invest in content and community so that we can actually have our distribution through our own content engagement that we have because the competition is out there and it’s so strong? I think the competition you talk about between individual teams and the competition to make the next paycheck, I understand maybe that’s motivating to certain teams, I’ve just found with our teams that they do much better work when our motivation is more about how many customers can we reach.
</span></p></blockquote><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Forgive the extended excerpt, but I think this is essential, particularly the second part: so much of our thinking about competition is rooted in the analog world, a world of scarcity where there really was limited shelf space or limited telephone lines or limited railroad access; that just isn’t the case on the Internet, where anyone has access to everyone. This has dramatically increased the power of creators, who can not only go direct, but also plays Aggregators off against each other —&nbsp;that is the realm of competition that matters. If we must accept a world where platforms like the App Store have total power within their domains, then the answer is to build up alternative Aggregators that have compelling content of their own, waging a proper fight for the only scarce resource there is on the Internet: time.</span></p><span data-dcnode-id="311" instrument_node="">
</span><hr class="footnotes" data-dcnode-id="310"><ol class="footnotes footnote-print-only" data-dcnode-id="299" style="list-style-type:decimal"><li class="footnote-processed footnote-print-only" data-dcnode-id="305" id="fn1-8394"><p data-dcnode-id="306"><span data-dcnode-id="309" instrument_node="">I will save the Wordle acquisition for another day!&nbsp;</span><a class="backlink" data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23rf1-8394" title="Return to footnote 1."><img alt="↩" class="emoji" data-dcnode-id="308" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/21a9.svg&amp;raw"></a></p></li><li class="footnote-processed footnote-print-only" data-dcnode-id="300" id="fn2-8394"><p data-dcnode-id="301"><span data-dcnode-id="304" instrument_node="">Each of which has a standalone $10/month plan&nbsp;</span><a class="backlink" data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23rf2-8394" title="Return to footnote 2."><img alt="↩" class="emoji" data-dcnode-id="303" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/21a9.svg&amp;raw"></a></p></li></ol><span data-dcnode-id="298" instrument_node="">
