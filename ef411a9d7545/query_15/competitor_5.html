</span><h1 class="entry-title" data-dcnode-id="4579"><a data-dcnode-id="4580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/musk-makes-twitter-bid-facebook-ar-plans-an-interview-with-adam-mosseri-about-creators-blockchains-and-tiktok/" rel="bookmark"><span data-dcnode-id="4581" instrument_node="">Musk Makes Twitter Bid; Facebook AR Plans; An Interview with Adam Mosseri About Creators, Blockchains, and TikTok</span></a></h1><span data-dcnode-id="4578" instrument_node=""> </span></div><span data-dcnode-id="4576" instrument_node="">

</span><div class="site-content" data-dcnode-id="120" id="content"><span data-dcnode-id="4566" instrument_node="">

</span><div data-dcnode-id="277" id="primary"><span data-dcnode-id="4562" instrument_node="">
</span><main class="site-main" data-dcnode-id="280" id="main" role="main"><span data-dcnode-id="4561" instrument_node="">
</span><article class="post-8865 post type-post status-publish format-standard hentry category-articles topics-aws topics-industries topics-logistics concepts-aggregation-theory concepts-business-models concepts-distribution-and-transaction-costs concepts-e-commerce concepts-owning-customer-relationship companies-amazon companies-shopify" data-dcnode-id="4272" id="post-8865"><span data-dcnode-id="4560" instrument_node="">
</span><header class="entry-header" data-dcnode-id="4534"><span data-dcnode-id="4559" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="4556"><a data-dcnode-id="4557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/beyond-aggregation-amazon-as-a-service/" rel="bookmark"><span data-dcnode-id="4558" instrument_node="">Beyond Aggregation: Amazon as a Service</span></a></h1><span data-dcnode-id="4555" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="4537"><span data-dcnode-id="4554" instrument_node="">
</span><span class="posted-on" data-dcnode-id="4547"><span class="screen-reader-text" data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">Posted on</span></span><time class="entry-date published" data-dcnode-id="4550" datetime="2022-04-25T07:29:00-07:00"><span data-dcnode-id="4551" instrument_node="">Monday, April 25, 2022</span></time><time class="updated" data-dcnode-id="4548" datetime="2022-04-25T09:36:25-07:00"><span data-dcnode-id="4549" instrument_node="">Monday, April 25, 2022</span></time></span><span data-dcnode-id="4546" instrument_node=""> </span><span class="byline" data-dcnode-id="4539"><span class="author vcard" data-dcnode-id="4540"><span class="screen-reader-text" data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">Author</span></span><span data-dcnode-id="4543" instrument_node=""> by </span><a class="url fn n" data-dcnode-id="4541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/author/stratechery/"><span data-dcnode-id="4542" instrument_node="">Ben Thompson</span></a></span></span><span data-dcnode-id="4538" instrument_node=""> </span></div><span data-dcnode-id="4535" instrument_node="">
</span></header><span data-dcnode-id="4532" instrument_node="">
</span><div class="entry-content" data-dcnode-id="4275"><span data-dcnode-id="4531" instrument_node="">
</span><p data-dcnode-id="4526"><span data-dcnode-id="4530" instrument_node="">Five months and $134 billion in market cap ago (before the stock slipped by 68%), Bloomberg Businessweek purported to explain </span><a data-dcnode-id="4528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/features/2021-12-23/shopify-amazon-retail-rivalry-heats-up-with-covid-sparked-online-shopping-booma"><span data-dcnode-id="4529" instrument_node="">How Shopify Outfoxed Amazon to Become the Everywhere Store</span></a><span data-dcnode-id="4527" instrument_node="">. One of the key parts of the story was how Shopify pulled one over on Amazon seven years ago:</span></p><span data-dcnode-id="4525" instrument_node="">
</span><blockquote data-dcnode-id="4516"><p data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">
  An even more critical event came a few months after the IPO. Amazon also operated a service that let independent merchants run their websites, called Webstore. Bang &amp; Olufsen, Fruit of the Loom, and Lacoste were among the 80,000 or so companies that used it to run their online shops. If he wanted to, Bezos surely had the resources and engineering prowess to crush Shopify and steal its momentum.</span></p><span data-dcnode-id="4522" instrument_node="">
</span><p data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">  But Amazon execs from that time admit that the Webstore service wasn’t very good, and its sales were dwarfed by all the rich opportunities the company was seeing in its global marketplace, where customers shop on Amazon.com, not on merchant websites…In late 2015, in one of Bezos’ periodic purges of underachieving businesses, he agreed to close Webstore. Then, in a rare strategic mistake that’s likely to go down in the annals of corporate blunders, Amazon sent its customers to Shopify and proclaimed publicly that the Canadian company was its preferred partner for the Webstore diaspora. In exchange, Shopify agreed to offer Amazon Pay to its merchants and let them easily list their products on Amazon’s marketplace. Shopify also paid Amazon $1 million—a financial arrangement that’s never been previously reported.</span></p><span data-dcnode-id="4519" instrument_node="">
</span><p data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">  Bezos and his colleagues believed that supporting small retailers and their online shops was never going to be a large, profitable business. They were wrong—small online retailers generated about $153 billion in sales in 2020, according to AMI Partners. “Shopify made us look like fools,” says the former Amazon executive.
</span></p></blockquote><span data-dcnode-id="4515" instrument_node="">
</span><p data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">If only we could all make such excellent mistakes; Amazon’s move looks like a strategic masterstroke.</span></p><span data-dcnode-id="4512" instrument_node="">
</span><h4 data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">Shopify’s Revenue Streams</span></h4><span data-dcnode-id="4509" instrument_node="">
</span><p data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">Three major things have changed, will change, or should change about Shopify’s business in the years since the company made that deal with Amazon.</span></p><span data-dcnode-id="4506" instrument_node="">
</span><p data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">What has changed is the composition of Shopify’s business. While the company started out with a SaaS model, the business has transformed into a commission-based one:</span></p><span data-dcnode-id="4503" instrument_node="">
</span><p data-dcnode-id="4501"><img alt="Shopify's two revenue streams" class="aligncenter size-large wp-image-8866" data-dcnode-id="4502" data-recalc-dims="1" height="389" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/04/AaaS-1.png%3Fresize%3D640%252C389%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/AaaS-1.png?resize=1024%2C623&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/AaaS-1.png?resize=300%2C183&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/AaaS-1.png?resize=768%2C467&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/AaaS-1.png?resize=1035%2C630&amp;ssl=1 1035w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/AaaS-1.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="4500" instrument_node="">
</span><p data-dcnode-id="4498"><span data-dcnode-id="4499" instrument_node="">“Subscription Solutions” are Shopify’s platform fees, including the cost to use the platform (or upgrade to the company’s Pro offering), commissions from the sales of themes and apps, and domain name registration. “Merchant Solutions”, meanwhile, are all of the fees that are generated from ongoing sales; the largest part of this are payment processing fees from Shopify Payments, but other fees include advertising revenue, referral fees, Shopify Shipping, etc.</span></p><span data-dcnode-id="4497" instrument_node="">
</span><p data-dcnode-id="4492"><span data-dcnode-id="4496" instrument_node="">It’s the shipping part that is line for big changes: while Shopify first announced the Shopify Fulfillment Network </span><a data-dcnode-id="4494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2019/shopify-and-the-power-of-platforms/"><span data-dcnode-id="4495" instrument_node="">back in 2019</span></a><span data-dcnode-id="4493" instrument_node="">, it is only recently that the company has committed to actually building out important pieces of said network on its own, the better to compete with Amazon’s full-scale offering.</span></p><span data-dcnode-id="4491" instrument_node="">
</span><p data-dcnode-id="4483"><span data-dcnode-id="4490" instrument_node="">As for what </span><em data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">should</span></em><span data-dcnode-id="4487" instrument_node=""> change, I argued </span><a data-dcnode-id="4485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/shopifys-evolution/"><span data-dcnode-id="4486" instrument_node="">back in February</span></a><span data-dcnode-id="4484" instrument_node=""> that Shopify needed to build out an advertising network; this recommendation is more pertinent than ever, in large part because the second item on this list might be in big trouble.</span></p><span data-dcnode-id="4482" instrument_node="">
</span><h4 data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">Buy With Prime</span></h4><span data-dcnode-id="4479" instrument_node="">
</span><p data-dcnode-id="4474"><span data-dcnode-id="4478" instrument_node="">From the </span><a data-dcnode-id="4476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/amazon-prime-coming-to-other-online-sites-11650556838"><span data-dcnode-id="4477" instrument_node="">Wall Street Journal</span></a><span data-dcnode-id="4475" instrument_node="">:</span></p><span data-dcnode-id="4473" instrument_node="">
</span><blockquote data-dcnode-id="4467"><p data-dcnode-id="4471"><span data-dcnode-id="4472" instrument_node="">
  Amazon.com Inc. is extending some of the offerings of its popular Prime membership program to merchants off its platform with a new service that embeds the online retailing giant’s payment and fulfillment options onto third-party sites. Called Buy with Prime, the service will allow merchants to show the Prime logo and offer Amazon’s speedy delivery options on products listed on their own websites…</span></p><span data-dcnode-id="4470" instrument_node="">
</span><p data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">  The company said the Buy with Prime offer will be rolled out by invitation only through 2022 for those who already sell on Amazon and use the company’s fulfillment services. Later, Amazon plans to extend Buy with Prime to other merchants, including those that don’t sell on its platform. Participating merchants will use the Prime logo and display expected delivery dates on eligible products. Checkout will go through Amazon Pay and the company’s fulfillment network. Amazon will also manage free returns for eligible orders.
</span></p></blockquote><span data-dcnode-id="4466" instrument_node="">
</span><p data-dcnode-id="4461"><span data-dcnode-id="4465" instrument_node="">This is a move that you could see coming for a long time; back in 2016 I wrote an article called </span><a data-dcnode-id="4463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2016/the-amazon-tax/"><span data-dcnode-id="4464" instrument_node="">The Amazon Tax</span></a><span data-dcnode-id="4462" instrument_node=""> that explained that the best way to understand Amazon as a whole was to understand Amazon Web Services (AWS):</span></p><span data-dcnode-id="4460" instrument_node="">
</span><blockquote data-dcnode-id="4434"><p data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">
  The “primitives” model modularized Amazon’s infrastructure, effectively transforming raw data center components into storage, computing, databases, etc. which could be used on an ad-hoc basis not only by Amazon’s internal teams but also outside developers:</span></p><span data-dcnode-id="4457" instrument_node="">
</span><p data-dcnode-id="4453"><span data-dcnode-id="4456" instrument_node=""> </span><a data-dcnode-id="4454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2016/the-amazon-tax/"><img alt="A drawing of The AWS Layer" class="aligncenter size-large wp-image-2073" data-dcnode-id="4455" data-recalc-dims="1" height="461" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-274.png%3Fresize%3D640%252C461%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-274.png?resize=1024%2C738&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-274.png?resize=300%2C216&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-274.png?resize=768%2C553&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-274.png?resize=874%2C630&amp;ssl=1 874w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-274.png?w=2000&amp;ssl=1 2000w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-274.png?w=1280&amp;ssl=1 1280w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-274.png?w=1920&amp;ssl=1 1920w" width="640"></a></p><span data-dcnode-id="4452" instrument_node="">
</span><p data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">  This AWS layer in the middle has several key characteristics:</span></p><span data-dcnode-id="4449" instrument_node="">
</span><ul data-dcnode-id="4438"><span data-dcnode-id="4448" instrument_node="">
</span><li data-dcnode-id="4446"><span data-dcnode-id="4447" instrument_node="">AWS has massive fixed costs but benefits tremendously from economies of scale</span></li><span data-dcnode-id="4445" instrument_node="">
</span><li data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node="">The cost to build AWS was justified because the first and best customer is Amazon’s e-commerce business</span></li><span data-dcnode-id="4442" instrument_node="">
</span><li data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">AWS’s focus on “primitives” meant it could be sold as-is to developers beyond Amazon, increasing the returns to scale and, by extension, deepening AWS’ moat</span></li><span data-dcnode-id="4439" instrument_node="">
</span></ul><span data-dcnode-id="4437" instrument_node="">
</span><p data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">  This last point was a win-win: developers would have access to enterprise-level computing resources with zero up-front investment; Amazon, meanwhile, would get that much more scale for a set of products for which they would be the first and best customer.
</span></p></blockquote><span data-dcnode-id="4433" instrument_node="">
</span><p data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">As I noted in that article, the AWS model was being increasingly applied to e-commerce as Amazon shifted from being a retailer to being a services provider:</span></p><span data-dcnode-id="4430" instrument_node="">
</span><blockquote data-dcnode-id="4406"><p data-dcnode-id="4428"><span data-dcnode-id="4429" instrument_node="">
  Prime is a super experience with superior prices and superior selection, and it too feeds into a scale play. The result is a business that looks like this:</span></p><span data-dcnode-id="4427" instrument_node="">
</span><p data-dcnode-id="4423"><span data-dcnode-id="4426" instrument_node=""> </span><a data-dcnode-id="4424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2016/the-amazon-tax/"><img alt="A drawing of The Transformation of Amazon’s E-Commerce Business" class="aligncenter size-large wp-image-2072" data-dcnode-id="4425" data-recalc-dims="1" height="461" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-275.png%3Fresize%3D640%252C461%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-275.png?resize=1024%2C738&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-275.png?resize=300%2C216&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-275.png?resize=768%2C553&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-275.png?resize=874%2C630&amp;ssl=1 874w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-275.png?w=1876&amp;ssl=1 1876w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/03/stratechery-Year-One-275.png?w=1280&amp;ssl=1 1280w" width="640"></a></p><span data-dcnode-id="4422" instrument_node="">
</span><p data-dcnode-id="4420"><span data-dcnode-id="4421" instrument_node="">  That is, of course, the same structure as AWS — and it shares similar characteristics:</span></p><span data-dcnode-id="4419" instrument_node="">
</span><ul data-dcnode-id="4408"><span data-dcnode-id="4418" instrument_node="">
</span><li data-dcnode-id="4416"><span data-dcnode-id="4417" instrument_node="">E-commerce distribution has massive fixed costs but benefits tremendously from economies of scale</span></li><span data-dcnode-id="4415" instrument_node="">
</span><li data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">The cost to build-out Amazon’s fulfillment centers was justified because the first and best customer is Amazon’s e-commerce business</span></li><span data-dcnode-id="4412" instrument_node="">
</span><li data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">That last bullet point may seem odd, but in fact 40% of Amazon’s sales (on a unit basis) are sold by 3rd-party merchants; most of these merchants leverage Fulfilled-by-Amazon, which means their goods are stored in Amazon’s fulfillment centers and covered by Prime. This increases the return to scale for Amazon’s fulfillment centers, increases the value of Prime, and deepens Amazon’s moat</span></li><span data-dcnode-id="4409" instrument_node="">
</span></ul><span data-dcnode-id="4407" instrument_node="">
</span></blockquote><span data-dcnode-id="4405" instrument_node="">
</span><p data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">My prediction in that Article was that Amazon’s burgeoning logistics business would eventually follow the same path:</span></p><span data-dcnode-id="4402" instrument_node="">
</span><blockquote data-dcnode-id="4396"><p data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">
  It seems increasingly clear that Amazon intends to repeat the model when it comes to logistics…how might this play out? Well, start with the fact that Amazon itself would be this logistics network’s first-and-best customer, just as was the case with AWS. This justifies the massive expenditure necessary to build out a logistics network that competes with UPS, Fedex, et al, and most outlets are framing these moves as a way for Amazon to rein in shipping costs and improve reliability, especially around the holidays.</span></p><span data-dcnode-id="4399" instrument_node="">
</span><p data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">  However, I think it is a mistake to think that Amazon will stop there: just as they have with AWS and e-commerce distribution I expect the company to offer its logistics network to third parties, which will increase the returns to scale, and, by extension, deepen Amazon’s eventual moat
</span></p></blockquote><span data-dcnode-id="4395" instrument_node="">
</span><p data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">Today Amazon’s logistics is massive and fully integrated from the fulfillment center to the doorstep, even though it only serves Amazon; the obvious next step is opening it up to non-Amazon retailers, and that is exactly what is happening.</span></p><span data-dcnode-id="4392" instrument_node="">
</span><h4 data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">Beyond Aggregation</span></h4><span data-dcnode-id="4389" instrument_node="">
</span><p data-dcnode-id="4384"><span data-dcnode-id="4388" instrument_node="">At first glance, this might seem like a bit of a surprise; after all, Stratechery is well known for describing </span><a data-dcnode-id="4386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2015/aggregation-theory/"><span data-dcnode-id="4387" instrument_node="">Aggregation Theory</span></a><span data-dcnode-id="4385" instrument_node="">, which is predicated on controlling demand. In the case of Amazon that has meant controlling the website where customers order goods — Amazon.com —&nbsp;even if those goods were sold by 3rd-party merchants. Why would Amazon give that up?</span></p><span data-dcnode-id="4383" instrument_node="">
</span><p data-dcnode-id="4378"><span data-dcnode-id="4382" instrument_node="">The reasoning is straightforward: while Amazon has had Aggregator characteristics, the company’s business model and differentiation has always been rooted in the real world, which, by extension, means it is not an Aggregator at all. I noted in 2017’s </span><a data-dcnode-id="4380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2017/defining-aggregators/"><span data-dcnode-id="4381" instrument_node="">Defining Aggregators</span></a><span data-dcnode-id="4379" instrument_node=""> that Aggregators benefit from zero marginal costs, which only describes a certain set of digital businesses like Google and Facebook:</span></p><span data-dcnode-id="4377" instrument_node="">
</span><blockquote data-dcnode-id="4344"><p data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">
  Companies traditionally have had to incur (up to) three types of marginal costs when it comes to serving users/customers directly.</span></p><span data-dcnode-id="4374" instrument_node="">
</span><ul data-dcnode-id="4363"><span data-dcnode-id="4373" instrument_node="">
</span><li data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">The cost of goods sold (COGS), that is, the cost of producing an item or providing a service</span></li><span data-dcnode-id="4370" instrument_node="">
</span><li data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">Distribution costs, that is the cost of getting an item to the customer (usually via retail) or facilitating the provision of a service (usually via real estate)</span></li><span data-dcnode-id="4367" instrument_node="">
</span><li data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">Transaction costs, that is the cost of executing a transaction for a good or service, providing customer service, etc.</span></li><span data-dcnode-id="4364" instrument_node="">
</span></ul><span data-dcnode-id="4362" instrument_node="">
</span><p data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">  Aggregators incur none of these costs:</span></p><span data-dcnode-id="4359" instrument_node="">
</span><ul data-dcnode-id="4348"><span data-dcnode-id="4358" instrument_node="">
</span><li data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">The goods “sold” by an Aggregator are digital and thus have zero marginal costs (they may, of course, have significant fixed costs)</span></li><span data-dcnode-id="4355" instrument_node="">
</span><li data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">These digital goods are delivered via the Internet, which results in zero distribution costs</span></li><span data-dcnode-id="4352" instrument_node="">
</span><li data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">Transactions are handled automatically through automatic account management, credit card payments, etc.</span></li><span data-dcnode-id="4349" instrument_node="">
</span></ul><span data-dcnode-id="4347" instrument_node="">
</span><p data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">  This characteristic means that businesses like Apple hardware and Amazon’s traditional retail operations are not Aggregators; both bear significant costs in serving the marginal customer (and, in the case of Amazon in particular, have achieved such scale that the service’s relative cost of distribution is actually a moat).
</span></p></blockquote><span data-dcnode-id="4343" instrument_node="">
</span><p data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">Amazon’s control of demand has been — and will continue to be —&nbsp;a tremendous advantage; Amazon not only has power over its suppliers, but it also gets all of the relevant data from consumers, which it can feed into a self-contained ad platform that is untouched by regulation from either governments or Apple.</span></p><span data-dcnode-id="4340" instrument_node="">
</span><p data-dcnode-id="4335"><span data-dcnode-id="4339" instrument_node="">At the same time, limiting a business to customer touchpoints that you control means limiting your overall addressable market. This may not matter in markets where there are network effects (which means you appeal to everyone) and you are an Aggregator dealing with zero marginal costs (and thus can realistically cover every consumer); in the case of e-commerce, though, Amazon will never be the only option, particularly given </span><a data-dcnode-id="4337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/the-anti-amazon-alliance/"><span data-dcnode-id="4338" instrument_node="">The Anti-Amazon Alliance</span></a><span data-dcnode-id="4336" instrument_node=""> working hard to reach consumers.</span></p><span data-dcnode-id="4334" instrument_node="">
</span><p data-dcnode-id="4326"><span data-dcnode-id="4333" instrument_node="">A core part of the Anti-Amazon Alliance are companies that have invested in brands that attract customers on their own; these companies don’t need to be on Amazon fighting to be the answer to generic search terms, but can rather drive customers to their own Shopify-powered websites both organically and via paid advertising (Facebook is </span><a data-dcnode-id="4331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/email-addresses-and-razor-blades/"><span data-dcnode-id="4332" instrument_node="">a huge player</span></a><span data-dcnode-id="4330" instrument_node=""> in the Anti-Amazon Alliance). Still, every customer that visits these websites has an Amazon-driven expectation in terms of shipping; Shippo CEO Laura Behrens Wu told me in </span><a data-dcnode-id="4328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/an-update-on-the-founder-series-shopify-partners-with-shippo-an-interview-with-shippo-founder-laura-behrens-wu/"><span data-dcnode-id="4329" instrument_node="">a Stratechery interview</span></a><span data-dcnode-id="4327" instrument_node="">:</span></p><span data-dcnode-id="4325" instrument_node="">
</span><blockquote data-dcnode-id="4322"><p data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">
  Consumers have those expectations from Amazon that shipping should be free, it should be two days, and whatever those are expectations are, returns should be free. That is still carried over when I’m buying on this branded website. If the expectations are not met, consumers decide to buy somewhere else…Merchants are constantly trying to play catch up, whatever Amazon is doing they need to follow suit.
</span></p></blockquote><span data-dcnode-id="4321" instrument_node="">
</span><p data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">Now Amazon has — or soon will have, in the case of Shopify-only merchants — a solution: the best way to get an Amazon-like shipping experience is to ship via Amazon. And, in contrast to the crappy Webstore product, you can keep using Shopify and its ecosystem for your website. Amazon may have given away business to Shopify in 2015, but that doesn’t much matter if said business ends up being a commoditized complement to Amazon’s true differentiation in logistics. That business, thanks to the sheer expense necessary to build it out, has a nearly impregnable moat that is not only attractive to all of the businesses competing to be consumer touchpoints —&nbsp;thus increasing Amazon’s addressable market — but is also one that sees its moat deepen the larger it becomes.</span></p><span data-dcnode-id="4318" instrument_node="">
</span><h4 data-dcnode-id="4316"><span data-dcnode-id="4317" instrument_node="">Shopify’s Predicament and Amazon’s Opportunity</span></h4><span data-dcnode-id="4315" instrument_node="">
</span><p data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">The reason this announcement is so damaging to Shopify goes back to the transformation in the company’s revenue I charted above: Amazon’s shipping solution requires the customer to pay with Amazon; I love Shop Pay’s checkout process, but it’s not as if I don’t have an Amazon account with all of my relevant details already included, and I absolutely trust Amazon’s shipping more than I do whatever option some Shopify merchant offers me. If I had a choice I’m taking the Amazon option every time.</span></p><span data-dcnode-id="4312" instrument_node="">
</span><p data-dcnode-id="4304"><span data-dcnode-id="4311" instrument_node="">Granted, I may not be representative; I’m a bit of a special case </span><a data-dcnode-id="4309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/the-relentless-jeff-bezos/"><span data-dcnode-id="4310" instrument_node="">given where I live</span></a><span data-dcnode-id="4308" instrument_node="">. What is worth noting, though, is that every transaction that Amazon processes is one </span><em data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">not</span></em><span data-dcnode-id="4305" instrument_node=""> processed by Shopify, which again, is the company’s primary revenue driver. Moreover, the more volume that Amazon processes, the more difficult it will be for Shopify to get their own shipping solution to scale. This endangers the company’s current major initiative.</span></p><span data-dcnode-id="4303" instrument_node="">
</span><p data-dcnode-id="4298"><span data-dcnode-id="4302" instrument_node="">That is why </span><a data-dcnode-id="4300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/shopifys-evolution/"><span data-dcnode-id="4301" instrument_node="">I think the company needs to think more deeply than ever about advertising</span></a><span data-dcnode-id="4299" instrument_node="">: the implication of Amazon being willing to be a services provider and not necessarily an Aggregator is that Amazon is surrendering some number of customer touchpoints to competitors; to put it another way, Amazon is actually making competitive customer touchpoints better —&nbsp;touchpoints that Shopify controls. Shopify ought to leverage that control.</span></p><span data-dcnode-id="4297" instrument_node="">
</span><p data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">That noted, there is a potential wrench in this plan: if Shopify doesn’t own payment processing, will they have sufficient data to build a competitive conversion-data-driven advertising product? Amazon — and Apple — would likely argue that that data is Amazon’s, but the merchant will obviously know what is going on (by the same token, will Amazon be able to tie this off-platform conversion data back to its own advertising product? It’s not clear what would stop them).</span></p><span data-dcnode-id="4294" instrument_node="">
</span><p data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">Shopify has two additional saving graces:</span></p><span data-dcnode-id="4291" instrument_node="">
</span><ul data-dcnode-id="4283"><span data-dcnode-id="4290" instrument_node="">
</span><li data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">First, the fact that Amazon will be able to collect data is a big reason for many merchants not to use Amazon’s new offering. Shopify’s offering will always be differentiated in this regard.</span></li><span data-dcnode-id="4287" instrument_node="">
</span><li data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node="">Second, as the announcement noted, this is going to take Amazon a year or two to fully roll out, and lots of stuff can change in the meantime.</span></li><span data-dcnode-id="4284" instrument_node="">
</span></ul><span data-dcnode-id="4282" instrument_node="">
</span><p data-dcnode-id="4280"><span data-dcnode-id="4281" instrument_node="">Moreover, while AWS has always been excellent at serving external customers —&nbsp;which it did before Amazon.com ever actually moved over — Amazon’s off-Amazon.com merchant offerings have never been particularly successful (including the aforementioned Webstores).</span></p><span data-dcnode-id="4279" instrument_node="">
</span><p data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">With that in mind, I think it’s meaningful that “Buy With Prime” is the first major initiative of new CEO Andy Jassy’s regime; I don’t think it’s an accident that it is so clearly inspired by AWS. AWS’s strength is its focus on infrastructure at scale; successfully moving e-commerce beyond aggregation to the same type of service business model would put his stamp on the company in a meaningful way, and, contra that quote in Bloomberg Businessweek, mark Jassy as nobody’s fool.</span></p><span data-dcnode-id="4276" instrument_node="">
</span></div><span data-dcnode-id="4273" instrument_node="">
</span></article><span data-dcnode-id="4270" instrument_node="">
</span><article class="post-8837 post type-post status-publish format-standard has-post-thumbnail hentry category-articles topics-content-moderation topics-networks topics-social concepts-advertising concepts-business-models concepts-company-structure concepts-incentives concepts-making-money concepts-platforms concepts-product-management concepts-product-market-fit companies-twitter" data-dcnode-id="3986" id="post-8837"><span data-dcnode-id="4269" instrument_node="">
</span><header class="entry-header" data-dcnode-id="4243"><span data-dcnode-id="4268" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="4265"><a data-dcnode-id="4266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/back-to-the-future-of-twitter/" rel="bookmark"><span data-dcnode-id="4267" instrument_node="">Back to the Future of Twitter</span></a></h1><span data-dcnode-id="4264" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="4246"><span data-dcnode-id="4263" instrument_node="">
</span><span class="posted-on" data-dcnode-id="4256"><span class="screen-reader-text" data-dcnode-id="4261"><span data-dcnode-id="4262" instrument_node="">Posted on</span></span><time class="entry-date published" data-dcnode-id="4259" datetime="2022-04-18T08:21:03-07:00"><span data-dcnode-id="4260" instrument_node="">Monday, April 18, 2022</span></time><time class="updated" data-dcnode-id="4257" datetime="2022-04-19T06:43:52-07:00"><span data-dcnode-id="4258" instrument_node="">Tuesday, April 19, 2022</span></time></span><span data-dcnode-id="4255" instrument_node=""> </span><span class="byline" data-dcnode-id="4248"><span class="author vcard" data-dcnode-id="4249"><span class="screen-reader-text" data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">Author</span></span><span data-dcnode-id="4252" instrument_node=""> by </span><a class="url fn n" data-dcnode-id="4250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/author/stratechery/"><span data-dcnode-id="4251" instrument_node="">Ben Thompson</span></a></span></span><span data-dcnode-id="4247" instrument_node=""> </span></div><span data-dcnode-id="4244" instrument_node="">
</span></header><span data-dcnode-id="4241" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3989"><span data-dcnode-id="4240" instrument_node="">
</span><p data-dcnode-id="4235"><span data-dcnode-id="4239" instrument_node="">Elon Musk wrote in </span><a data-dcnode-id="4237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sec.gov/Archives/edgar/data/1418091/000110465922045641/tm2212748d1_sc13da.htm%23ex-b_001"><span data-dcnode-id="4238" instrument_node="">a letter to Twitter’s board</span></a><span data-dcnode-id="4236" instrument_node="">:</span></p><span data-dcnode-id="4234" instrument_node="">
</span><blockquote data-dcnode-id="4222"><p data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">
  I invested in Twitter as I believe in its potential to be the platform for free speech around the globe, and I believe free speech is a societal imperative for a functioning democracy.</span></p><span data-dcnode-id="4231" instrument_node="">
</span><p data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">  However, since making my investment I now realize the company will neither thrive nor serve this societal imperative in its current form. Twitter needs to be transformed as a private company.</span></p><span data-dcnode-id="4228" instrument_node="">
</span><p data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">  As a result, I am offering to buy 100% of Twitter for $54.20 per share in cash, a 54% premium over the day before I began investing in Twitter and a 38% premium over the day before my investment was publicly announced. My offer is my best and final offer and if it is not accepted, I would need to reconsider my position as a shareholder.</span></p><span data-dcnode-id="4225" instrument_node="">
</span><p data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">  Twitter has extraordinary potential. I will unlock it.
</span></p></blockquote><span data-dcnode-id="4221" instrument_node="">
</span><p data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">The vast majority of commentary about the Musk-Twitter saga has focused on the first three paragraphs: what does Musk mean by making Twitter more free speech oriented? Why doesn’t Musk believe he can work with the current board and management? Does Musk have the cash available to buy Twitter, and would the Twitter board accept his offer (no on the latter, but more on this below)?</span></p><span data-dcnode-id="4218" instrument_node="">
</span><p data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node="">The most interesting question of all, though, is the last paragraph: what potential does Musk see, and could he unlock it? For my part, not only do I agree the potential is vast, but I do think Musk could unlock it — and that itself has implications for the preceding paragraphs.</span></p><span data-dcnode-id="4215" instrument_node="">
</span><h4 data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">What is Twitter?</span></h4><span data-dcnode-id="4212" instrument_node="">
</span><p data-dcnode-id="4204"><span data-dcnode-id="4211" instrument_node="">It’s popular on Twitter to point to a funny tweet or exchange and marvel that “</span><a data-dcnode-id="4209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/search%3Fq%3D%2522this%2520website%2520is%2520free%2522%26src%3Dtyped_query"><span data-dcnode-id="4210" instrument_node="">This website is free</span></a><span data-dcnode-id="4208" instrument_node="">“, or alternatively, “</span><a data-dcnode-id="4206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/search%3Fq%3D%2522this%2520app%2520is%2520free%2522%26src%3Dtyped_query%26f%3Dtop"><span data-dcnode-id="4207" instrument_node="">This app is free</span></a><span data-dcnode-id="4205" instrument_node="">“. That raises the question, though, what is Twitter: is it a website or an app, or something different?</span></p><span data-dcnode-id="4203" instrument_node="">
</span><p data-dcnode-id="4198"><span data-dcnode-id="4202" instrument_node="">The answer, of course, is “All of the above”, but it’s worth being clear about the different pieces that make up Twitter; “Jin” made this illustration </span><a data-dcnode-id="4200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/interviewnoodle/twitter-system-architecture-8dafce16aec4"><span data-dcnode-id="4201" instrument_node="">on Medium</span></a><span data-dcnode-id="4199" instrument_node="">:</span></p><span data-dcnode-id="4197" instrument_node="">
</span><p data-dcnode-id="4194"><a data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/interviewnoodle/twitter-system-architecture-8dafce16aec4"><img alt="Twitter's architecture" class="aligncenter size-large wp-image-8838" data-dcnode-id="4196" data-recalc-dims="1" height="378" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/04/twitter-1.png%3Fresize%3D640%252C378%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/twitter-1.png?resize=1024%2C604&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/twitter-1.png?resize=300%2C177&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/twitter-1.png?resize=768%2C453&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/twitter-1.png?resize=1068%2C630&amp;ssl=1 1068w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/twitter-1.png?w=1280&amp;ssl=1 1280w" width="640"></a></p><span data-dcnode-id="4193" instrument_node="">
</span><p data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">Twitter is actually a host of microservices, including a user service (for listing a user’s timeline), a graph service (for tracking your network), a posting service (for posting new tweets), a profile service (for user profiles), a timeline service (for presenting your timeline), etc.; the architecture to tie all of these together and operate at scale all around the world is suitably complex.</span></p><span data-dcnode-id="4190" instrument_node="">
</span><p data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">The key thing to note, though, is that only the green boxes in the diagram above are actually user-facing; a dramatically simplified version of Twitter, that condenses all of those internal services to a big blue “Twitter” box and focuses on the green interfaces might look something like this:</span></p><span data-dcnode-id="4187" instrument_node="">
</span><p data-dcnode-id="4185"><img alt="A dramatic over-simplification of Twitter's architecture" class="aligncenter size-large wp-image-8840" data-dcnode-id="4186" data-recalc-dims="1" height="511" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/04/twitter-2.png%3Fresize%3D640%252C511%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/twitter-2.png?resize=1024%2C817&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/twitter-2.png?resize=300%2C239&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/twitter-2.png?resize=768%2C613&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/twitter-2.png?resize=790%2C630&amp;ssl=1 790w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/twitter-2.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="4184" instrument_node="">
</span><p data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">Again, this is a dramatic oversimplification, but the important takeaway is that the user-facing parts of Twitter are distinct from — and, frankly, not very pertinent to — the core Twitter service.</span></p><span data-dcnode-id="4181" instrument_node="">
</span><h4 data-dcnode-id="4179"><span data-dcnode-id="4180" instrument_node="">Twitter’s API Drama</span></h4><span data-dcnode-id="4178" instrument_node="">
</span><p data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">The general idea behind a services architecture is that various functionalities are exposed via application programming interfaces, more commonly known as APIs; a “client” will leverage these APIs to build an end user experience. There is no requirement that these clients be owned or managed by the centralized service, and for the first several years of Twitter’s existence, that is exactly how the service operated: Twitter the company ran the service and the Twitter.com website, while third-parties built clients that let you access Twitter first on the desktop and then on smartphones.</span></p><span data-dcnode-id="4175" instrument_node="">
</span><p data-dcnode-id="4173"><span data-dcnode-id="4174" instrument_node="">Mobile was an absolute boon for Twitter: the public messaging service, modeled on SMS, was a natural fit for a smartphone screen, and the immediacy of Twitter updates was perfectly suited to a device that was always connected to the Internet. The explosion in mobile usage, though, led to a situation where Twitter didn’t actually control the user experience for a huge portion of its users. This actually led to a ton of innovation: Twitterrific, for example, the earliest third party client, came up with the Twitter bird, the term “tweet” for a Twitter message, and early paradigms around replies and conversations. It also led to problems, the solutions to which fundamentally changed Twitter’s potential as a business.</span></p><span data-dcnode-id="4172" instrument_node="">
</span><p data-dcnode-id="4170"><span data-dcnode-id="4171" instrument_node="">The first problem that came from Twitter the service relying on third party clients is that the company, which descended into politics and backstabbing from the board level on down almost immediately, was drifting along without a business model; the obvious candidate was advertising, but the easiest way to implement advertising was to control the user interface (and thus insert ads —&nbsp;ads, including promoted tweets, are another distinct service from Twitter itself). Thus Twitter bought Tweetie, widely regarded as the best Twitter mobile client (I was a user), in April 2010, and rebranded and relaunched it as the official Twitter for iPhone app a month later.</span></p><span data-dcnode-id="4169" instrument_node="">
</span><p data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">The second problem is that starting in 2010, a Silicon Valley entrepreneur named Bill Gross (who invented search advertising) started trying to build his own Twitter monetization product called TweetUp; when Twitter acquired Tweetie and made clear they were going to monetize it via advertising, Gross started buying up multiple other third party Twitter clients with the idea of creating a competing network of clients that would monetize independently. Twitter responded in the short term by kicking several of Gross’s clients off of the platform for dubious terms-of-service violations, and in the long term by killing the 3rd party API for everyone. Clients could keep the users they had but could only add 100,000 more users — ever.</span></p><span data-dcnode-id="4166" instrument_node="">
</span><p data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">The net result of these two decisions was that Twitter, its architecture notwithstanding, would be a unified entity where Twitter the company controlled every aspect of the experience, and that that experience would be monetized via advertising.</span></p><span data-dcnode-id="4163" instrument_node="">
</span><h4 data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">Twitter’s Reality</span></h4><span data-dcnode-id="4160" instrument_node="">
</span><p data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">Twitter has, over 19 different funding rounds (including pre-IPO, IPO, and post-IPO), raised $4.4 billion in funding; meanwhile the company has lost a cumulative $861 million in its lifetime as a public company (i.e. excluding pre-IPO losses). During that time the company has held 33 earnings calls; the company reported a profit in only 14 of them.</span></p><span data-dcnode-id="4157" instrument_node="">
</span><p data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">Given this financial performance it is kind of amazing that the company was valued at $30 billion the day before Musk’s investment was revealed; such is the value of Twitter’s social graph and its cultural impact: despite there being no evidence that Twitter can even be sustainably profitable, much less return billions of dollars to shareholders, hope springs eternal that the company is on the verge of unlocking its potential. At the same time, these three factors — Twitter’s financials, its social graph, and its cultural impact — get at why Musk’s offer to take Twitter private is so intriguing.</span></p><span data-dcnode-id="4154" instrument_node="">
</span><p data-dcnode-id="4132"><span data-dcnode-id="4153" instrument_node="">Start with the financials: Twitter’s business stinks. Yes, you can make an argument that this is due to mismanagement and poor execution —&nbsp;who enjoys seeing a stale promoted tweet about something that happened weeks ago?</span></p><div class="bigfoot-footnote__container" data-dcnode-id="4140"><span data-dcnode-id="4152" instrument_node=""> </span><button alt="See Footnote 1" class="bigfoot-footnote__button" data-bigfoot-footnote="<p>A friend sent me <a href=&quot;https://twitter.com/Nike/status/1507369880995221507?s=20&amp;t=zgb8z5yVvmOQh03qrqwNAg&quot;>this promoted tweet</a> on April 15, almost a full month since Kentucky had been eliminated from March Madness, and well over a week after the entire tournament had ended</p>" data-dcnode-id="4141" data-footnote-identifier="1" data-footnote-number="1" id="rf1-8837" rel="footnote"><span data-dcnode-id="4151" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="4149" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="4150" fill="white" r="3"></circle></svg><span data-dcnode-id="4148" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="4146" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="4147" fill="white" r="3"></circle></svg><span data-dcnode-id="4145" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="4143" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="4144" fill="white" r="3"></circle></svg><span data-dcnode-id="4142" instrument_node=""> </span></button></div><sup class="footnote-print-only" data-dcnode-id="4137" data-footnote-backlink-ref="rf1-8837" data-footnote-ref="#fn1-8837" id="rf1-8837"><a data-dcnode-id="4138" href="#fn1-8837" rel="footnote" title="A friend sent me <a href=&quot;https://twitter.com/Nike/status/1507369880995221507?s=20&amp;t=zgb8z5yVvmOQh03qrqwNAg&quot;>this promoted tweet</a> on April 15, almost a full month since Kentucky had been eliminated from March Madness, and well over a week after the entire tournament had ended"><span data-dcnode-id="4139" instrument_node="">1</span></a></sup><span data-dcnode-id="4136" instrument_node=""> — but </span><a data-dcnode-id="4134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/twitter-has-a-new-ceo-what-about-a-new-business-model/"><span data-dcnode-id="4135" instrument_node="">I have also made the argument</span></a><span data-dcnode-id="4133" instrument_node=""> that Twitter just isn’t well suited to direct response advertising in particular:</span><p></p><span data-dcnode-id="4131" instrument_node="">
</span><blockquote data-dcnode-id="4114"><p data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">
  Think about the contrast between Twitter and Instagram; both are unique amongst social networks in that they follow a broadcast model: tweets on Twitter and photos on Instagram are public by default, and anyone can follow anyone. The default medium, though, is fundamentally different: Twitter has photos and videos, but the heart of the service is text (and links). Instagram, on the other hand, is nothing but photos and video (and link in bio).</span></p><span data-dcnode-id="4128" instrument_node="">
</span><p data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">  The implications of this are vast. Sure, you may follow your friends on both, but on Twitter you will also follow news breakers, analysts, insightful anons, joke tellers, and shit posters. The goal is to mainline information, and Twitter’s speed and information density are unparalleled by anything in the world. On Instagram, though, you might follow brands and influencers, and your chief interaction with your friends is stories about their Turkey Day exploits. It’s about aspiration, not information, and the former makes a lot more sense for effective advertising.</span></p><span data-dcnode-id="4125" instrument_node="">
</span><p data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">  It’s more than just the medium though; it’s about the user’s mental state as well. Instagram is leisurely and an escape, something you do when you’re procrastinating; Twitter is intense and combative, and far more likely to be tied to something happening in the physical world, whether that be watching sports or politics or doing work:</span></p><span data-dcnode-id="4122" instrument_node="">
</span><p data-dcnode-id="4118"><span data-dcnode-id="4121" instrument_node=""> </span><a data-dcnode-id="4119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/twitter-has-a-new-ceo-what-about-a-new-business-model/"><img alt="Instagram is a lean-back experience; on Twitter you lean forward" class="aligncenter size-full wp-image-8120" data-dcnode-id="4120" data-recalc-dims="1" height="373" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2021/11/twitter-1.png%3Fresize%3D640%252C373%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2021/11/twitter-1.png?w=857&amp;ssl=1 857w, https://i0.wp.com/stratechery.com/wp-content/uploads/2021/11/twitter-1.png?resize=300%2C175&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2021/11/twitter-1.png?resize=768%2C448&amp;ssl=1 768w" width="640"></a></p><span data-dcnode-id="4117" instrument_node="">
</span><p data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">  This matters for advertising, particularly advertising that depends on a direct response: when you are leaning back and relaxed why not click through to that Shopify site to buy that knick-knack you didn’t even know you needed, or try out that mobile game? When you are leaning forward, though, you don’t have either the time or the inclination.
</span></p></blockquote><span data-dcnode-id="4113" instrument_node="">
</span><p data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">That article made the argument for Twitter to move towards more of a subscription offering; that may be the wrong idea, but the bigger takeaway is that what Twitter has been trying to build for years just isn’t working, and the challenges aren’t just bad management. To put it another way, when it comes to Twitter’s business, there really isn’t much to lose, but Twitter could only risk losing what there is if it were a private company, free from the glare of public markets who, for very justifiable reasons, give Twitter’s management a very short leash.</span></p><span data-dcnode-id="4110" instrument_node="">
</span><p data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">What is valuable is that social graph: while Facebook understands who you know, Twitter, more than any other company, understands what its users are interested in. That is, in theory, much more valuable; said value is diminished by the fact that Twitter just doesn’t have that many users, relatively speaking; the users it has, though, are extremely influential, particularly given the important of Twitter in media, tech, and finance. For this group Twitter is completely irreplaceable: there is no other medium with a similar density of information or interest-driven network effects.</span></p><span data-dcnode-id="4107" instrument_node="">
</span><p data-dcnode-id="4102"><span data-dcnode-id="4106" instrument_node="">This, by extension, drives Twitter’s cultural impact: no, most people don’t get their news off of Twitter; the places they get their news, though, are driven by Twitter. Moreover, Twitter not only sets the agenda for media organizations, it also harmonizes coverage, thanks to a dynamic where writers, unmoored from geographic constraints or underlying business realities of their publications, end up writing for other writers on Twitter, oftentimes radicalizing each other in plain sight of their readership. Twitter itself is part of this harmonization, going so far as to censor politically impactful stories in the weeks before an election; it’s no surprise that when Musk says he wants to impose a stronger free speech ethos that the reaction is fierce and littered with </span><a data-dcnode-id="4104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motte-and-bailey_fallacy"><span data-dcnode-id="4105" instrument_node="">motte-and-baileys</span></a><span data-dcnode-id="4103" instrument_node=""> (“actually we just care about limiting abuse and spam!”).</span></p><span data-dcnode-id="4101" instrument_node="">
</span><h4 data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">Back to the Future</span></h4><span data-dcnode-id="4098" instrument_node="">
</span><p data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">This is all build-up to my proposal for what Musk —&nbsp;or any other bidder for Twitter, for that matter — ought to do with a newly private Twitter.</span></p><span data-dcnode-id="4095" instrument_node="">
</span><ul data-dcnode-id="4084"><span data-dcnode-id="4094" instrument_node="">
</span><li data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">First, Twitter’s current fully integrated model is a financial failure.</span></li><span data-dcnode-id="4091" instrument_node="">
</span><li data-dcnode-id="4089"><span data-dcnode-id="4090" instrument_node="">Second, Twitter’s social graph is extremely valuable.</span></li><span data-dcnode-id="4088" instrument_node="">
</span><li data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">Third, Twitter’s cultural impact is very large, and very controversial.</span></li><span data-dcnode-id="4085" instrument_node="">
</span></ul><span data-dcnode-id="4083" instrument_node="">
</span><p data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">Given this, Musk (who I will use as a stand-in for any future CEO of Twitter) should start by splitting Twitter into two companies.</span></p><span data-dcnode-id="4080" instrument_node="">
</span><ul data-dcnode-id="4072"><span data-dcnode-id="4079" instrument_node="">
</span><li data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">One company would be the core Twitter service, including the social graph.</span></li><span data-dcnode-id="4076" instrument_node="">
</span><li data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">The other company would be all of the Twitter apps and the advertising business.</span></li><span data-dcnode-id="4073" instrument_node="">
</span></ul><span data-dcnode-id="4071" instrument_node="">
</span><p data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">TwitterAppCo would contract with TwitterServiceCo to continue to receive access to the Twitter service and social graph; currently Twitter earns around $13/user/year in advertising, so you could imagine a price of say $7.50/user/year, or perhaps $0.75/user/month. TwitterAppCo would be free to pursue the same business model and moderation policies that Twitter is pursuing today (I can imagine Musk sticking with TwitterServiceCo, and the employees upset about said control being a part of TwitterAppCo).</span></p><span data-dcnode-id="4068" instrument_node="">
</span><p data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">However, that relationship would not be exclusive: TwitterServiceCo would open up its API to any other company that might be interested in building their own client experience; each company would:</span></p><span data-dcnode-id="4065" instrument_node="">
</span><ul data-dcnode-id="4054"><span data-dcnode-id="4064" instrument_node="">
</span><li data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">Pay for the right to get access to the Twitter service and social graph.</span></li><span data-dcnode-id="4061" instrument_node="">
</span><li data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">Monetize in whatever way they see fit (i.e. they could pursue a subscription model).</span></li><span data-dcnode-id="4058" instrument_node="">
</span><li data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">Implement their own moderation policy.</span></li><span data-dcnode-id="4055" instrument_node="">
</span></ul><span data-dcnode-id="4053" instrument_node="">
</span><p data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">This last point would cut a whole host of Gordian Knots:</span></p><span data-dcnode-id="4050" instrument_node="">
</span><ul data-dcnode-id="4039"><span data-dcnode-id="4049" instrument_node="">
</span><li data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Market competition would settle the question about whether or not stringent moderation is an important factor in success; some client experiences would be heavily moderated, and some wouldn’t be moderated at all.</span></li><span data-dcnode-id="4046" instrument_node="">
</span><li data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">The fact that everyone gets access to the same Twitter service and social graph solves the cold start problem for alternative networks; the reason why Twitter alternatives always fail is because Twitter’s network effect is so important.</span></li><span data-dcnode-id="4043" instrument_node="">
</span><li data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">TwitterServiceCo could wash its hands of difficult moderation decisions or tricky cultural issues; the U.S. might have a whole host of Twitter client options, while Europe might be more stringent, and India more stringent still. Heck, this model could even accommodate a highly-censored China client (although this is highly unlikely).</span></li><span data-dcnode-id="4040" instrument_node="">
</span></ul><span data-dcnode-id="4038" instrument_node="">
</span><p data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">I strongly suspect that a dramatic increase in competition amongst Twitter client services would benefit TwitterServiceCo, growing its market in a way that hasn’t happened in years. What is most exciting, though, is the potential development of new kinds of services that don’t look like Twitter at all.</span></p><span data-dcnode-id="4035" instrument_node="">
</span><p data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">Step back a moment and think about the fundamental infrastructure of the Internet: we have a media protocol in HTTP/web, and a communications protocol in SMTP/email; what is missing is a notifications protocol. And yet, at the same time, if there is one lesson from mobile, it is just how important notifications are; a secondary consideration is how important identity is. If you can know how to reach someone, and have the means to do so, you are set, whether you be a critical service, an advertiser, or anything in-between. Twitter has the potential to fill that role: the ability to route short messages to a knowable endpoint accessible via a centralized directory has far more utility than political signaling and infighting. And yet, thanks to Twitter’s early decisions and lack of leadership, the latter is all the service is good for; no wonder user growth and financial results have stagnated!</span></p><span data-dcnode-id="4032" instrument_node="">
</span><p data-dcnode-id="4027"><span data-dcnode-id="4031" instrument_node="">A truly open TwitterServiceCo has the potential to be a new protocol for the Internet — the notifications and identity protocol; unlike every other protocol, though, this one would be owned by a private company. That would be insanely valuable, but it is a value that will never be realized as long as Twitter is a public company led by </span><a data-dcnode-id="4029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//om.co/2022/04/15/musk-or-not-twitter-ceo-needs-to-go/"><span data-dcnode-id="4030" instrument_node="">a weak CEO and ineffective board</span></a><span data-dcnode-id="4028" instrument_node=""> driving an integrated business predicated on a business model that doesn’t work.</span></p><span data-dcnode-id="4026" instrument_node="">
</span><h4 data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">Twitter’s Reluctance</span></h4><span data-dcnode-id="4023" instrument_node="">
</span><p data-dcnode-id="4015"><span data-dcnode-id="4022" instrument_node="">The surest evidence of the Twitter board’s lack of imagination and ineffectiveness is that their response to Musk’s proposal is to </span><a data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.axios.com/twitter-elon-musk-poison-pill-7a62f6d6-b77a-4481-a2e3-5a7081557a84.html"><span data-dcnode-id="4021" instrument_node="">further dilute existing shareholders as a means of denying Musk control</span></a><span data-dcnode-id="4019" instrument_node="">. This is, in my estimation, clearly against the interest of Twitter shareholders (which, for what it’s worth, don’t in any meaningful way </span><a data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/ChrisJBakke/status/1515377028295389186"><span data-dcnode-id="4018" instrument_node="">include Twitter’s board members</span></a><span data-dcnode-id="4016" instrument_node="">); given Twitter’s performance over the last decade, though, this isn’t really a surprise.</span></p><span data-dcnode-id="4014" instrument_node="">
</span><p data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">Indeed, when you consider the fact that Twitter’s board members not only don’t own much of Twitter, but famously, barely use Twitter at all, it is easy to wonder if the actual goal is not financial results but rather harnessing that immense cultural impact. This suspicion only intensifies when you consider that the bidder in this case is one of the most successful entrepreneurs of all time: if there was one person in the world who could realize Twitter’s latent value, wouldn’t Musk be at the top of the list? And yet he is anathema, not for his business acumen, but despite it.</span></p><span data-dcnode-id="4011" instrument_node="">
</span><p data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">This, more than anything, makes me even more sure that my proposal for competition amongst Twitter client companies is essential: not only do I think that more competition would lead to dramatically more innovation, but it would also solve the problem of who decides what we see by undoing the centralization of that power and subjecting decisions to market forces. That this is unacceptable to some says more about their ultimate motivations than anything else.</span></p><span data-dcnode-id="4008" instrument_node="">
</span><p data-dcnode-id="4002"><em data-dcnode-id="4003"><span data-dcnode-id="4007" instrument_node="">I wrote a follow-up to this Article in </span><a data-dcnode-id="4005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/what-about-bluesky-moderation-and-control-whats-next-for-twitter/"><span data-dcnode-id="4006" instrument_node="">this Daily Update</span></a><span data-dcnode-id="4004" instrument_node="">.</span></em></p><span data-dcnode-id="4001" instrument_node="">
</span><hr class="footnotes" data-dcnode-id="4000"><ol class="footnotes footnote-print-only" data-dcnode-id="3991" style="list-style-type:decimal"><li class="footnote-processed footnote-print-only" data-dcnode-id="3992" id="fn1-8837"><p data-dcnode-id="3993"><span data-dcnode-id="3999" instrument_node="">A friend sent me </span><a data-dcnode-id="3997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/Nike/status/1507369880995221507%3Fs%3D20%26t%3Dzgb8z5yVvmOQh03qrqwNAg"><span data-dcnode-id="3998" instrument_node="">this promoted tweet</span></a><span data-dcnode-id="3996" instrument_node=""> on April 15, almost a full month since Kentucky had been eliminated from March Madness, and well over a week after the entire tournament had ended&nbsp;</span><a class="backlink" data-dcnode-id="3994" href="#rf1-8837" title="Return to footnote 1."><img alt="↩" class="emoji" data-dcnode-id="3995" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/21a9.svg&amp;raw"></a></p></li></ol><span data-dcnode-id="3990" instrument_node="">
</span></div><span data-dcnode-id="3987" instrument_node="">
</span></article><span data-dcnode-id="3984" instrument_node="">

</span><header class="entry-header" data-dcnode-id="3957"><span data-dcnode-id="3982" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3979"><a data-dcnode-id="3980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/dall-e-the-metaverse-and-zero-marginal-content/" rel="bookmark"><span data-dcnode-id="3981" instrument_node="">DALL-E, the Metaverse, and Zero Marginal Content</span></a></h1><span data-dcnode-id="3978" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="3960"><span data-dcnode-id="3977" instrument_node="">
</span><span class="posted-on" data-dcnode-id="3970"><span class="screen-reader-text" data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">Posted on</span></span><time class="entry-date published" data-dcnode-id="3973" datetime="2022-04-12T07:46:46-07:00"><span data-dcnode-id="3974" instrument_node="">Tuesday, April 12, 2022</span></time><time class="updated" data-dcnode-id="3971" datetime="2022-04-12T09:50:13-07:00"><span data-dcnode-id="3972" instrument_node="">Tuesday, April 12, 2022</span></time></span><span data-dcnode-id="3969" instrument_node=""> </span><span class="byline" data-dcnode-id="3962"><span class="author vcard" data-dcnode-id="3963"><span class="screen-reader-text" data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node="">Author</span></span><span data-dcnode-id="3966" instrument_node=""> by </span><a class="url fn n" data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/author/stratechery/"><span data-dcnode-id="3965" instrument_node="">Ben Thompson</span></a></span></span><span data-dcnode-id="3961" instrument_node=""> </span></div><span data-dcnode-id="3958" instrument_node="">
</span></header><span data-dcnode-id="3955" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3344"><span data-dcnode-id="3954" instrument_node="">
</span><p data-dcnode-id="3943"><span data-dcnode-id="3953" instrument_node="">Last week </span><a data-dcnode-id="3951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theverge.com/2022/4/6/23012123/openai-clip-dalle-2-ai-text-to-image-generator-testing"><span data-dcnode-id="3952" instrument_node="">OpenAI released DALL-E 2</span></a><span data-dcnode-id="3950" instrument_node="">, which produces (or edits) images based on textual prompts; </span><a data-dcnode-id="3948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/BecomingCritter/status/1511808277490896903"><span data-dcnode-id="3949" instrument_node="">this Twitter thread from @BecomingCritter</span></a><span data-dcnode-id="3947" instrument_node=""> has a whole host of example output, including </span><a data-dcnode-id="3945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/BecomingCritter/status/1511810575403302919"><span data-dcnode-id="3946" instrument_node="">Teddy bears working on new AI research on the moon in the 1980s</span></a><span data-dcnode-id="3944" instrument_node="">:</span></p><span data-dcnode-id="3942" instrument_node="">
</span><p data-dcnode-id="3939"><a data-dcnode-id="3940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/BecomingCritter/status/1511810575403302919"><img alt="Teddy bears working on new AI research on the moon in the 1980s" class="aligncenter size-full wp-image-8802" data-dcnode-id="3941" data-recalc-dims="1" height="640" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-3.png%3Fresize%3D640%252C640%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-3.png?w=680&amp;ssl=1 680w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-3.png?resize=300%2C300&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-3.png?resize=150%2C150&amp;ssl=1 150w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-3.png?resize=630%2C630&amp;ssl=1 630w" width="640"></a></p><span data-dcnode-id="3938" instrument_node="">
</span><p data-dcnode-id="3934"><a data-dcnode-id="3936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/BecomingCritter/status/1511808277490896903"><span data-dcnode-id="3937" instrument_node="">A photo of a quaint flower shop storefront with a pastel green and clean white facade and open door and big window</span></a><span data-dcnode-id="3935" instrument_node="">:</span></p><span data-dcnode-id="3933" instrument_node="">
</span><p data-dcnode-id="3930"><a data-dcnode-id="3931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/BecomingCritter/status/1511808277490896903"><img alt="A photo of a quaint flower shop storefront with a pastel green and clean white facade and open door and big window" class="aligncenter size-full wp-image-8803" data-dcnode-id="3932" data-recalc-dims="1" height="640" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-4.png%3Fresize%3D640%252C640%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-4.png?w=680&amp;ssl=1 680w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-4.png?resize=300%2C300&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-4.png?resize=150%2C150&amp;ssl=1 150w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-4.png?resize=630%2C630&amp;ssl=1 630w" width="640"></a></p><span data-dcnode-id="3929" instrument_node="">
</span><p data-dcnode-id="3924"><span data-dcnode-id="3928" instrument_node="">And, in the most on-the-nose example possible, </span><a data-dcnode-id="3926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/BecomingCritter/status/1511808887279734789"><span data-dcnode-id="3927" instrument_node="">A human basking in the sun of AGI utopia</span></a><span data-dcnode-id="3925" instrument_node="">:</span></p><span data-dcnode-id="3923" instrument_node="">
</span><p data-dcnode-id="3920"><a data-dcnode-id="3921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/BecomingCritter/status/1511808887279734789"><img alt="A human basking in the sun of AGI utopia]" class="aligncenter size-full wp-image-8801" data-dcnode-id="3922" data-recalc-dims="1" height="640" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-2.png%3Fresize%3D640%252C640%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-2.png?w=680&amp;ssl=1 680w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-2.png?resize=300%2C300&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-2.png?resize=150%2C150&amp;ssl=1 150w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-2.png?resize=630%2C630&amp;ssl=1 630w" width="640"></a></p><span data-dcnode-id="3919" instrument_node="">
</span><p data-dcnode-id="3914"><span data-dcnode-id="3918" instrument_node="">OpenAI has a video describing DALL-E </span><a data-dcnode-id="3916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openai.com/dall-e-2/"><span data-dcnode-id="3917" instrument_node="">on its website</span></a><span data-dcnode-id="3915" instrument_node="">:</span></p><span data-dcnode-id="3913" instrument_node="">
