</span><p data-dcnode-id="1464"><span data-dcnode-id="1468" instrument_node="">What makes Facebook’s approach so effective is that its advertising is a platform in its own right. Just as every app on a smartphone or every piece of software on a PC shares the same resources and API, every advertiser on Facebook, from app maker to e-commerce seller and everyone in-between, uses the same set of APIs that Facebook provides. What makes this so effective, though, is that the  shared resources are not computing power but data, especially conversion data; I explained how this worked in 2020’s </span><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/privacy-labels-and-lookalike-audiences/"><span data-dcnode-id="1467" instrument_node="">Privacy Labels and Lookalike Audiences</span></a><span data-dcnode-id="1465" instrument_node="">, but briefly:</span></p><span data-dcnode-id="1463" instrument_node="">
</span><ul data-dcnode-id="1446"><span data-dcnode-id="1462" instrument_node="">
</span><li data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Facebook shows a user an ad, and records the unique identifier provided by their phone (IDFA, Identifier for Advertisers, on iOS; GAID, Google Advertising Identifer, on Android).</span></li><span data-dcnode-id="1459" instrument_node="">
</span><li data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">A user downloads an app, or makes an e-commerce purchase; Facebook’s SDK, which is embedded in the app or e-commerce site, again records the IDFA or notes the referral code that led the user to the site, and charges the advertiser for a successful conversion.</span></li><span data-dcnode-id="1456" instrument_node="">
</span><li data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">The details around this conversion, whether it be which creative was used in the ad, what was purchased, how much was spent, etc., is added to the profile of the user who saw the ad.</span></li><span data-dcnode-id="1453" instrument_node="">
</span><li data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Advertisers take out new ads on Facebook asking the company to find users who are similar to users who have purchased from them before (Facebook knows this from past purchases seen by its SDK, or because an advertiser uploads a list of past customers).</span></li><span data-dcnode-id="1450" instrument_node="">
</span><li data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Facebook repeats this process, further refining its understanding of customers, apps, and e-commerce offerings in the process, including the esoteric ways (only discoverable by machine learnings) in which they relate to each other.</span></li><span data-dcnode-id="1447" instrument_node="">
</span></ul><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">The critical thing to understand about this process is that no one app or e-commerce seller stands alone; everyone has collectively deputized Facebook to hold all of the pertinent user data and to figure out how all of the pieces fit together in a way that lets each individual app maker or e-commerce retailer acquire new customers for a price less than what that customer is worth to them in lifetime value.</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1441" instrument_node="">This, by extension, means that Shopify doesn’t stand alone either: the company is even more dependent on Facebook to drive e-commerce than Apple ever was to drive app installs.</span></p><div class="bigfoot-footnote__container" data-dcnode-id="1428"><span data-dcnode-id="1440" instrument_node=""> </span><button alt="See Footnote 3" class="bigfoot-footnote__button" data-bigfoot-footnote="<p>While you can make purchases from brands in the Shop Pay app, it’s an insignificant channel that isn’t at all comparable to Apple’s own direct route to customers via the App Store.</p>" data-dcnode-id="1429" data-footnote-identifier="3" data-footnote-number="3" id="rf1-8541" rel="footnote"><span data-dcnode-id="1439" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="1437" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="1438" fill="white" r="3"></circle></svg><span data-dcnode-id="1436" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="1434" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="1435" fill="white" r="3"></circle></svg><span data-dcnode-id="1433" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="1431" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="1432" fill="white" r="3"></circle></svg><span data-dcnode-id="1430" instrument_node=""> </span></button></div><sup class="footnote-print-only" data-dcnode-id="1425" data-footnote-backlink-ref="rf1-8541" data-footnote-ref="#fn1-8541" id="rf1-8541"><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23fn1-8541" rel="footnote" title="While you can make purchases from brands in the Shop Pay app, it’s an insignificant channel that isn’t at all comparable to Apple’s own direct route to customers via the App Store."><span data-dcnode-id="1427" instrument_node="">1</span></a></sup><span data-dcnode-id="1424" instrument_node=""> That’s why it’s not a surprise that Facebook’s recent plunge in value was preceded (and then followed) by Shopify’s own:</span><p></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><img alt="Shopify and Facebook's faltering stocks" class="aligncenter size-large wp-image-8544" data-dcnode-id="1421" data-recalc-dims="1" height="310" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-1.png%3Fresize%3D640%252C310%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-1.png?resize=1024%2C496&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-1.png?resize=300%2C145&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-1.png?resize=768%2C372&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-1.png?resize=1200%2C581&amp;ssl=1 1200w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-1.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Part of Shopify’s decline is likely related to the fact that it is another pandemic stock: the sort of growth the company saw while customers were stuck at home with nothing to do other than shop online couldn’t go on forever. Moreover, the company announced big increases in spending (more on this in a moment). However, the major headwind the company shares with Facebook is Apple.</span></p><span data-dcnode-id="1416" instrument_node="">
</span><h4 data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">ATT’s Impact</span></h4><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">I have been writing regularly about Apple’s App Tracking Transparency (ATT) initiative since it was announced two years ago, so I won’t belabor the point; the key thing to understand is that ATT broke the Facebook advertising collective. On the app install side this was done by technical means: Apple made the IDFA an opt-in behind a scary warning about tracking, which most users declined.</span></p><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1409" instrument_node="">The e-commerce side is more interesting: while Apple can’t technically limit what Facebook collects via its </span><a data-dcnode-id="1407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/business/learn/facebook-ads-pixel"><span data-dcnode-id="1408" instrument_node="">Pixel</span></a><span data-dcnode-id="1406" instrument_node=""> on a retailer’s website, ATT bans said broad collection all the same. To that end Facebook </span><a data-dcnode-id="1404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/facebooks-ios-14-announcement-understanding-the-idfa-the-real-showdown/"><span data-dcnode-id="1405" instrument_node="">originally announced plans</span></a><span data-dcnode-id="1403" instrument_node=""> to not show the ATT prompt and abandon the IDFA; a few months later </span><a data-dcnode-id="1401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/facebook-and-apple-continued-facebooks-ios-14-changes-georgia-and-tech/"><span data-dcnode-id="1402" instrument_node="">the company did an about-face</span></a><span data-dcnode-id="1400" instrument_node=""> announcing that it would indeed show the ATT prompt, and also limit what it collected in its in-app browser via the Facebook Pixel.</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">It’s unclear what happened to change Facebook’s mind; had they continued on their original path then their app advertising business would have suffered from a loss of data, but the e-commerce advertising would have been relatively unaffected (the loss of IDFA-related app install data would have decreased the amount of data available for that machine learning-driven targeting). What seems likely — and to be clear, this is pure speculation —&nbsp;is that Apple threatened to kick Facebook and its apps out of the App Store if it didn’t abide by ATT’s policies, even the parts that were technically unenforceable.</span></p><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1394" instrument_node="">Regardless, the net impact is that it was suddenly impossible for Facebook to tie together all of the various pieces of that virtuous cycle I described above deterministically. Ads were hard to tie to conversions, conversions were hard to tie to users, which meant that users and advertisers were hard to tie to each other, resulting in less relevant ads for the former that cost more money for the latter.</span></p><div class="bigfoot-footnote__container" data-dcnode-id="1381"><span data-dcnode-id="1393" instrument_node=""> </span><button alt="See Footnote 4" class="bigfoot-footnote__button" data-bigfoot-footnote="<p>Facebook’s advertising is sold on an auction basis, and advertisers often bid against desired outcomes, like conversions; the more difficult it is to target users the more users there are who need to be showed an ad, which increases demand for inventory, increasing prices.</p>" data-dcnode-id="1382" data-footnote-identifier="4" data-footnote-number="4" id="rf2-8541" rel="footnote"><span data-dcnode-id="1392" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="1390" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="1391" fill="white" r="3"></circle></svg><span data-dcnode-id="1389" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="1387" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="1388" fill="white" r="3"></circle></svg><span data-dcnode-id="1386" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="1384" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="1385" fill="white" r="3"></circle></svg><span data-dcnode-id="1383" instrument_node=""> </span></button></div><sup class="footnote-print-only" data-dcnode-id="1378" data-footnote-backlink-ref="rf2-8541" data-footnote-ref="#fn2-8541" id="rf2-8541"><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23fn2-8541" rel="footnote" title="Facebook’s advertising is sold on an auction basis, and advertisers often bid against desired outcomes, like conversions; the more difficult it is to target users the more users there are who need to be showed an ad, which increases demand for inventory, increasing prices."><span data-dcnode-id="1380" instrument_node="">2</span></a></sup><span data-dcnode-id="1377" instrument_node=""> The monetary impact is massive: Facebook forecast a </span><a data-dcnode-id="1375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/metas-earnings-facebooks-three-challenges-financial-versus-existential-risks/"><span data-dcnode-id="1376" instrument_node="">$10 billion hit to 2022 revenue</span></a><span data-dcnode-id="1374" instrument_node="">, and as noted, its market value has been cut by a third.</span><p></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1371" instrument_node="">Note, however, that ATT didn’t hurt all advertisers: companies like Google and Amazon are doing great; I explained why in </span><a data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/digital-advertising-in-2022/"><span data-dcnode-id="1370" instrument_node="">Digital Advertising in 2022</span></a><span data-dcnode-id="1368" instrument_node="">:</span></p><span data-dcnode-id="1366" instrument_node="">
</span><blockquote data-dcnode-id="1339"><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">
  Amazon’s advertising business has three big advantages relative to Facebook’s.</span></p><span data-dcnode-id="1363" instrument_node="">
</span><ol data-dcnode-id="1343"><span data-dcnode-id="1362" instrument_node="">
</span><li data-dcnode-id="1358"><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Search advertising is the best and most profitable form of advertising.</span></strong><span data-dcnode-id="1359" instrument_node=""> This goes back to the point I made above: the more certain you are that you are showing advertising to a receptive customer, the more advertisers are willing to bid for that ad slot, and text in a search box will always be more accurate than the best targeting.</span></li><span data-dcnode-id="1357" instrument_node="">
</span><li data-dcnode-id="1353"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Amazon faces no data restrictions.</span></strong><span data-dcnode-id="1354" instrument_node=""> That noted, Amazon also has data on its users, and it is free to collect as much of it as it likes, and leverage it however it wishes when it comes to selling ads. This is because all of Amazon’s data collection, ad targeting, and conversion happen on the same platform — Amazon.com, or the Amazon app. ATT only restricts third party data sharing, which means it doesn’t affect Amazon at all.</span></li><span data-dcnode-id="1352" instrument_node="">
</span><li data-dcnode-id="1345"><strong data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Amazon benefits from ATT spillover.</span></strong><span data-dcnode-id="1349" instrument_node=""> That is not to say that ATT didn’t have an effect on Amazon: I noted above that Snap’s business did better than expected in part because its business wasn’t dominated by direct advertising to the extent that Facebook’s was, and that more advertising money flowed into other types of advertising. This almost certainly made a difference for Amazon as well: one of the most affected areas of Facebook advertising was e-commerce; if you are an e-commerce seller whose </span><a data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/the-anti-amazon-alliance/"><span data-dcnode-id="1348" instrument_node="">Shopify store powered-by Facebook ads</span></a><span data-dcnode-id="1346" instrument_node=""> was suddenly under-performing thanks to ATT, then the natural response is to shift products and advertising spend to Amazon.</span></li><span data-dcnode-id="1344" instrument_node="">
</span></ol><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">  All of these advantages will persist: search advertising will always be effective, and Amazon can always leverage data, and while some degree of ATT-related pullback was likely due to both uncertainty and the fact that Facebook hasn’t built back its advertising stack for a post-ATT world, the fact that said future stack will never be quite as good as the old one means that there is more e-commerce share to be grabbed than there might have been otherwise.
</span></p></blockquote><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">This last point is not set in stone: Shopify is already making major investments to compete with Amazon; it has the opportunity to do even more.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><h4 data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">The Shopify Fulfillment Network</span></h4><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1331" instrument_node="">In 2019 I wrote about Shopify and its orthogonal competition with Amazon in </span><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2019/shopify-and-the-power-of-platforms/"><span data-dcnode-id="1330" instrument_node="">Shopify and the Power of Platforms</span></a><span data-dcnode-id="1328" instrument_node="">:</span></p><span data-dcnode-id="1326" instrument_node="">
</span><blockquote data-dcnode-id="1312"><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">
  The difference is that Shopify is a platform: instead of interfacing with customers directly, 820,000 3rd-party merchants sit on top of Shopify and are responsible for acquiring all of those customers on their own.</span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1322" instrument_node=""> </span><a data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2019/shopify-and-the-power-of-platforms/"><img alt="A drawing of The Shopify Platform" class="aligncenter size-full wp-image-4281" data-dcnode-id="1321" data-recalc-dims="1" height="442" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2019/07/IMG_272058378EFF-3.jpeg%3Fresize%3D640%252C442%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2019/07/IMG_272058378EFF-3.jpeg?w=990&amp;ssl=1 990w, https://i0.wp.com/stratechery.com/wp-content/uploads/2019/07/IMG_272058378EFF-3.jpeg?resize=300%2C207&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2019/07/IMG_272058378EFF-3.jpeg?resize=768%2C530&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2019/07/IMG_272058378EFF-3.jpeg?resize=913%2C630&amp;ssl=1 913w" width="640"></a></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">  […]</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">  This is how Shopify can both in the long run be the biggest competitor to Amazon even as it is a company that Amazon can’t compete with: Amazon is pursuing customers and bringing suppliers and merchants onto its platform on its own terms; Shopify is giving merchants an opportunity to differentiate themselves while bearing no risk if they fail.
</span></p></blockquote><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">The context of that Article was Shopify’s announcement of yet another platform initiative: the Shopify Fulfillment Network.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><blockquote data-dcnode-id="1278"><p data-dcnode-id="1303"><span data-dcnode-id="1307" instrument_node="">
  From the company’s&nbsp;</span><a data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shopify.com/enterprise/unite-2019%235"><span data-dcnode-id="1306" instrument_node="">blog</span></a><span data-dcnode-id="1304" instrument_node="">:</span></p><span data-dcnode-id="1302" instrument_node="">
</span><blockquote data-dcnode-id="1293"><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">
    Customers want their online purchases fast, with free shipping. It’s now expected, thanks to the recent standard set by the largest companies in the world. Working with third-party logistics companies can be tedious. And finding a partner that won’t obscure your customer data or hide your brand with packaging is a challenge.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">    This is why we’re building Shopify Fulfillment Network—a geographically dispersed network of fulfillment centers with smart inventory-allocation technology. We use machine learning to predict the best places to store and ship your products, so they can get to your customers as fast as possible.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">    We’ve negotiated low rates with a growing network of warehouse and logistic providers, and then passed on those savings to you. We support multiple channels, custom packaging and branding, and returns and exchanges. And it’s all managed in Shopify.
  </span></p></blockquote><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">  The first paragraph explains why the Shopify Fulfillment Network was a necessary step for Shopify: Amazon may commoditize suppliers, hiding their brand from website to box, but if its offering is truly superior, suppliers don’t have much choice. That was increasingly the case with regards to fulfillment, particularly for the small-scale sellers that are important to Shopify not necessarily for short-term revenue generation but for long-run upside. Amazon was simply easier for merchants and more reliable for customers.</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">  Notice, though, that Shopify is not doing everything on their own: there is an entire world of third-party logistics companies (known as “3PLs”) that offer warehousing and shipping services. What Shopify is doing is what platforms do best: act as an interface between two modularized pieces of a value chain.</span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1285" instrument_node=""> </span><a data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2019/shopify-and-the-power-of-platforms/"><img alt="A drawing of Shopify as an Interface" class="aligncenter size-full wp-image-4283" data-dcnode-id="1284" data-recalc-dims="1" height="337" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2019/07/IMG_272058378EFF-1.jpeg%3Fresize%3D640%252C337%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2019/07/IMG_272058378EFF-1.jpeg?w=985&amp;ssl=1 985w, https://i0.wp.com/stratechery.com/wp-content/uploads/2019/07/IMG_272058378EFF-1.jpeg?resize=300%2C158&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2019/07/IMG_272058378EFF-1.jpeg?resize=768%2C405&amp;ssl=1 768w" width="640"></a></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">  On one side are all of Shopify’s hundreds of thousands of merchants: interfacing with all of them on an individual basis is not scalable for those 3PL companies; now, though, they only need to interface with Shopify. The same benefit applies in the opposite direction: merchants don’t have the means to negotiate with multiple 3PLs such that their inventory is optimally placed to offer fast and inexpensive delivery to customers; worse, the small-scale sellers I discussed above often can’t even get an audience with these logistics companies. Now, though, Shopify customers need only interface with Shopify.
</span></p></blockquote><span data-dcnode-id="1277" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1276" instrument_node="">Over the intervening three years, though, Shopify has moved away from this vision: Shopify Fulfillment Network (SFN) is not going to be a platform like the Shopify App Store but rather an integrated part of Shopify’s core offering like Shop Pay. President Harley Finkelstein explained on the company’s </span><a data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seekingalpha.com/article/4487562-shopify-inc-shop-ceo-tobias-lutke-on-q4-2021-results-earnings-call-transcript"><span data-dcnode-id="1275" instrument_node="">recent earnings call</span></a><span data-dcnode-id="1273" instrument_node="">:</span></p><span data-dcnode-id="1271" instrument_node="">
</span><blockquote data-dcnode-id="1268"><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">
  We are consolidating our network to larger facilities. We’ll operate more of them ourselves, and we’ll unify the warehouse management software that we’ve been building and testing over the past 18 months. We expect that these changes will enable us to deliver packages in 2 days or less to more than 90% of the U.S. population, while minimizing the inventory investment for SFN merchants. While Amy will go into more detail as to what our evolved vision looks like from a financial perspective, I can tell you, from a merchant’s perspective, Shopify Fulfillment can be life-changing for their businesses. We hear from merchants that fulfillment is only something you think about when it isn’t working well, and they are thrilled that they now never have to think about it. The stockouts and pre-orders that took the shine off strong demand for the new releases, largely became, I think, in the past, with Shopify Fulfillment. And just recently, I heard from a merchant who tells me that he sleeps even better because Shopify Fulfillment just works. Comments like these fuel our ambition, and we’ll continue to explore opportunities to give merchants more visibility and control over their most important assets.
</span></p></blockquote><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Building and managing warehouses itself is a major commitment: Shopify is going to spend a billion dollars in capital expenditures in 2023 and 2024 building out the Shopify Fulfillment Network, and it seems safe to assume that that spending will only increase over time. I think, though, that this makes sense: Shopify learned from Shop Pay that it can decrease complexity for merchants and deliver a better experience for customers by doing essential functionality itself, and those same needs exist in logistics as well, particularly given Amazon’s massive investment in its own integrated operations.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Keep in mind, though, logistics isn’t the only advantage that Amazon has.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><h4 data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Shopify Advertising Services</span></h4><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1257" instrument_node="">Remember the fundamental challenge that ATT presents to Facebook: the company can no longer pool the conversion and targeting data of all of its advertisers such that the sum of effectiveness vastly exceeds what any one of those advertisers could accomplish on their own. The response of the gaming market has been </span><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/gaming-the-smiling-curve/"><span data-dcnode-id="1256" instrument_node="">a wave of consolidation</span></a><span data-dcnode-id="1254" instrument_node=""> to better pool and leverage data. Amazon, as noted, is well ahead of the curve here: because the company’s third-party merchant ecosystem lives within the Amazon.com website and app, Amazon has full knowledge of conversions and the ability to target consumers without any interference from Apple.</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Shopify is halfway there: a massive number of e-commerce retailers are on Shopify, but today Shopify mostly treats them all as individual entities, having left the pooling of data for advertising to Facebook. Now that Facebook is handicapped by Apple, Shopify should step up to provide substitute functionality and build its own advertising network.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">This advertising network, though, would look a bit different than what you might expect. First, Shopify doesn’t have any major customer-facing properties to display ads; it could potentially build some cross-shop advertising, but that doesn’t seem very ideal for either merchants or customers. The reality is that Shopify merchants still need to find customers on other sites like social networks; the challenge is doing so without knowing who is actually seeing the ads.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">Here Shopify’s ability to act on behalf of the entire Shopify network provides an opening: instead of being an advertising seller at scale, like Facebook, Shopify the company would become an advertising buyer at scale. Armed with its perfect knowledge of conversions it could run probabilistically-targeted campaigns that are much more precise than anyone else, using every possible parameter available to advertisers on Facebook or anywhere else, and over time build sophisticated cohorts that map to certain types of products and purchase patterns. No single Shopify merchant could do this on their own with a similar level of sophistication, which Facebook indirectly admitted on </span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seekingalpha.com/article/4483754-meta-platforms-inc-s-fb-ceo-mark-zuckerberg-on-q4-2021-results-earning-call-transcript"><span data-dcnode-id="1244" instrument_node="">its recent earnings call</span></a><span data-dcnode-id="1242" instrument_node="">; COO Sheryl Sandberg said:</span></p><span data-dcnode-id="1240" instrument_node="">
</span><blockquote data-dcnode-id="1237"><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">
  On measurement, there were 2 key areas within measurement, which were impacted as a result of Apple’s iOS changes. And I talked about this on the call last quarter as you referenced. The first is the underreporting gap. And what’s happening here is that advertisers worry they’re not getting the ROI they’re actually getting. On this part, we’ve made real progress on that underreporting gap since last quarter, and we believe we’ll continue to make more progress in the years ahead. I do want to caution that it’s easier to address this with large campaigns and harder with small campaigns, which means that part will take longer, and it also means that Apple’s changes continue to hurt small businesses more.
</span></p></blockquote><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Sandberg’s comment was primarily about the sheer amount of data produced by larger campaigns, but the same principle applies to the sheer number of campaigns as well: any one advertiser is, thanks to ATT, limited in the data points they can get from Facebook, making it more difficult to run multiple campaigns to better understand what works and what doesn’t. However, Shopify could in theory run campaigns for each of its individual merchants and collate the data on the back-end; this is the inverse of Amazon’s advantage of being one website, because in this case Shopify benefits from having a hand in such a huge number of them.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><hr data-dcnode-id="1232"><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1230" instrument_node="">I suspect the response of many close Shopify watchers is that such an initiative is not in the company’s DNA; that, though, is why the evolution of the Shopify Fulfillment Network is so notable: building and operating warehouses wasn’t really in the company’s DNA either, but it is the right thing to do if the company is going to continue to power </span><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/the-anti-amazon-alliance/"><span data-dcnode-id="1229" instrument_node="">The Anti-Amazon Alliance</span></a><span data-dcnode-id="1227" instrument_node="">. The same principle applies to this theoretical ad network, particularly given that it is Amazon who is a big winner from Apple’s changes.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1224" instrument_node="">What is interesting is that it appears that Shopify is already flirting with this idea:</span></p><div class="bigfoot-footnote__container" data-dcnode-id="1211"><span data-dcnode-id="1223" instrument_node=""> </span><button alt="See Footnote 5" class="bigfoot-footnote__button" data-bigfoot-footnote="<p>Thanks to <a href=&quot;https://twitter.com/eric_seufert&quot;>Eric Seufert</a> for tipping me off to this.</p>" data-dcnode-id="1212" data-footnote-identifier="5" data-footnote-number="5" id="rf3-8541" rel="footnote"><span data-dcnode-id="1222" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="1220" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="1221" fill="white" r="3"></circle></svg><span data-dcnode-id="1219" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="1217" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="1218" fill="white" r="3"></circle></svg><span data-dcnode-id="1216" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="1214" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="1215" fill="white" r="3"></circle></svg><span data-dcnode-id="1213" instrument_node=""> </span></button></div><sup class="footnote-print-only" data-dcnode-id="1208" data-footnote-backlink-ref="rf3-8541" data-footnote-ref="#fn3-8541" id="rf3-8541"><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23fn3-8541" rel="footnote" title="Thanks to <a href=&quot;https://twitter.com/eric_seufert&quot;>Eric Seufert</a> for tipping me off to this."><span data-dcnode-id="1210" instrument_node="">3</span></a></sup><span data-dcnode-id="1207" instrument_node=""> Last summer the company quietly introduced the concept of </span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/dennishegstad/status/1406432771275472897"><span data-dcnode-id="1206" instrument_node="">Shopify Audiences</span></a><span data-dcnode-id="1204" instrument_node=""> during an invite-only presentation; Tanay Jaipuria fleshed out the concept </span><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tanay.substack.com/p/shopify-audiences"><span data-dcnode-id="1203" instrument_node="">on Substack</span></a><span data-dcnode-id="1201" instrument_node="">:</span><p></p><span data-dcnode-id="1199" instrument_node="">
</span><blockquote data-dcnode-id="1193"><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">
  Shopify Audiences is a data exchange network, which uses aggregated conversion data (i.e., data around which people bought a merchant’s product) across all opted-in merchants on Shopify to generate a custom audience for a given merchant’s product. This audience is essentially a set of people Shopify believes are likely to be interested in your product given the data around all transactions that have taken place across all opted-in merchants on Shopify.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">  Merchants can then use these audiences when advertising on FB, Snap, Twitter, and other ad platforms1 either as custom audiences or lookalike audiences which should result in higher-performing ads and lower cost per conversion to acquire customers/sales.
</span></p></blockquote><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1191" instrument_node="">This is a big step, and is very valuable for Facebook advertising in particular; however, it doesn’t address the Apple issue, because </span><a data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mobiledevmemo.com/apple-email-lists-cannot-be-used-for-ad-targeting/"><span data-dcnode-id="1190" instrument_node="">ATT bans custom and lookalike audiences from external data sources</span></a><span data-dcnode-id="1188" instrument_node="">. That means that Data Exchange can’t be used in any campaign targeting iOS users. That is why Shopify Audiences is only the first step: to make this work Shopify Audiences needs to become Shopify Advertising Services, where Shopify doesn’t just collect the targets but buys the ads to target them as well, in a way no one else in the world can.</span></p><span data-dcnode-id="1186" instrument_node="">
</span><h4 data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">The Conservation of Attractive Profits</span></h4><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Shopify Advertising Services, Shopify Fulfillment Network, and Shop Pay would, without question, result in a very different looking company than the one I sketched out at the beginning of this Article:</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><img alt="Shopify with integrated payments, fulfillment, and advertising" class="aligncenter size-large wp-image-8549" data-dcnode-id="1179" data-recalc-dims="1" height="366" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-6.png%3Fresize%3D640%252C366%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-6.png?resize=1024%2C586&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-6.png?resize=300%2C172&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-6.png?resize=768%2C440&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-6.png?resize=1100%2C630&amp;ssl=1 1100w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-6.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1172"><span data-dcnode-id="1176" instrument_node="">This sort of monolith, though, makes sense not only because of the specifics of what is happening in the market, but from a theoretical perspective as well. I wrote another article about Shopify a year ago called </span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/market-making-on-the-internet/"><span data-dcnode-id="1175" instrument_node="">Market-Making on the Internet</span></a><span data-dcnode-id="1173" instrument_node="">, highlighting how major consumer-facing platforms were increasingly incorporating Shopify into their sites and apps:</span></p><span data-dcnode-id="1171" instrument_node="">
</span><blockquote data-dcnode-id="1162"><p data-dcnode-id="1163"><span data-dcnode-id="1170" instrument_node="">
  What makes the Shopify platform so fascinating is that over time more and more of the e-commerce it enables happens somewhere other than a Shopify website. Shopify, for example, can&nbsp;</span><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shopify.com/blog/sell-on-amazon"><span data-dcnode-id="1169" instrument_node="">help you sell on Amazon</span></a><span data-dcnode-id="1167" instrument_node="">, and in what will be&nbsp;</span><a data-dcnode-id="1165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/facebook-earnings-atts-impact-covid-vr-ar-and-optionality/"><span data-dcnode-id="1166" instrument_node="">an increasingly important channel</span></a><span data-dcnode-id="1164" instrument_node="">, Facebook Shops. In the latter case Facebook and Shopify are partnering to create a fully-integrated market: Facebook’s userbase and advertising tools on one side, and Shopify’s e-commerce management and seller base on the other. The broader takeaway, though, is that Shopify’s real value proposition is working across markets, not creating an exclusive one.
</span></p></blockquote><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1160" instrument_node="">Facebook’s motivations are clear: conversions in Facebook Shops can be tracked in a way conversions on websites no longer can be, which will result in in more effective advertising; it is to Shopify’s credit that they are seen as such an important and credible partner that Facebook is going as far as </span><a data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/shop-pay-on-google-and-facebook-shopifys-evolution-the-e-commerce-shift/"><span data-dcnode-id="1159" instrument_node="">incorporating Shop Pay as well</span></a><span data-dcnode-id="1157" instrument_node="">. Even so, this is very much an example of Facebook integrating and Shopify, as it must, modularizing to accommodate them. That is a recipe for long run commoditization.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1154" instrument_node="">That is why it is a good thing that Shopify is integrating elsewhere in its business: </span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2015/netflix-and-the-conservation-of-attractive-profits/"><span data-dcnode-id="1153" instrument_node="">profits in a value chain follow integration</span></a><span data-dcnode-id="1151" instrument_node="">, and the more that Shopify is intertwined with the biggest players the more it needs to find other ways to differentiate. Shop Pay is already a massive win, and fulfillment has the chance to be another one; advertising shouldn’t be far behind.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1143"><em data-dcnode-id="1144"><span data-dcnode-id="1148" instrument_node="">I wrote a follow-up to this Article in </span><a data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/shopifys-evolution-follow-up-spotify-acquires-chartable-and-podsights/"><span data-dcnode-id="1147" instrument_node="">this Daily Update</span></a><span data-dcnode-id="1145" instrument_node="">.</span></em></p><span data-dcnode-id="1142" instrument_node="">
</span><hr class="footnotes" data-dcnode-id="1141"><ol class="footnotes footnote-print-only" data-dcnode-id="1122" style="list-style-type:decimal"><li class="footnote-processed footnote-print-only" data-dcnode-id="1136" id="fn1-8541"><p data-dcnode-id="1137"><span data-dcnode-id="1140" instrument_node="">While you can make purchases from brands in the Shop Pay app, it’s an insignificant channel that isn’t at all comparable to Apple’s own direct route to customers via the App Store.&nbsp;</span><a class="backlink" data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23rf1-8541" title="Return to footnote 1."><img alt="↩" class="emoji" data-dcnode-id="1139" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/21a9.svg&amp;raw"></a></p></li><li class="footnote-processed footnote-print-only" data-dcnode-id="1131" id="fn2-8541"><p data-dcnode-id="1132"><span data-dcnode-id="1135" instrument_node="">Facebook’s advertising is sold on an auction basis, and advertisers often bid against desired outcomes, like conversions; the more difficult it is to target users the more users there are who need to be showed an ad, which increases demand for inventory, increasing prices.&nbsp;</span><a class="backlink" data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23rf2-8541" title="Return to footnote 2."><img alt="↩" class="emoji" data-dcnode-id="1134" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/21a9.svg&amp;raw"></a></p></li><li class="footnote-processed footnote-print-only" data-dcnode-id="1123" id="fn3-8541"><p data-dcnode-id="1124"><span data-dcnode-id="1130" instrument_node="">Thanks to </span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/eric_seufert"><span data-dcnode-id="1129" instrument_node="">Eric Seufert</span></a><span data-dcnode-id="1127" instrument_node=""> for tipping me off to this.&nbsp;</span><a class="backlink" data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23rf3-8541" title="Return to footnote 3."><img alt="↩" class="emoji" data-dcnode-id="1126" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/21a9.svg&amp;raw"></a></p></li></ol><span data-dcnode-id="1121" instrument_node="">
</span></div><span data-dcnode-id="1118" instrument_node="">
</span></article><span data-dcnode-id="1115" instrument_node="">
</span><article class="post-8451 post type-post status-publish format-standard has-post-thumbnail hentry category-articles topics-android topics-app-stores topics-app-tracking-transparency-att topics-competition topics-apple-app-store topics-iphone topics-mobile topics-networks topics-regulation topics-search topics-social concepts-advertising concepts-business-models concepts-platforms companies-amazon companies-apple companies-facebook companies-google companies-meta companies-youtube" data-dcnode-id="665" id="post-8451"><span data-dcnode-id="1114" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1088"><span data-dcnode-id="1113" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1110"><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/digital-advertising-in-2022/" rel="bookmark"><span data-dcnode-id="1112" instrument_node="">Digital Advertising in 2022</span></a></h1><span data-dcnode-id="1109" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1091"><span data-dcnode-id="1108" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1101"><span class="screen-reader-text" data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Posted on</span></span><time class="entry-date published" data-dcnode-id="1104" datetime="2022-02-08T06:11:41-08:00"><span data-dcnode-id="1105" instrument_node="">Tuesday, February 8, 2022</span></time><time class="updated" data-dcnode-id="1102" datetime="2022-02-25T06:27:53-08:00"><span data-dcnode-id="1103" instrument_node="">Friday, February 25, 2022</span></time></span><span data-dcnode-id="1100" instrument_node=""> </span><span class="byline" data-dcnode-id="1093"><span class="author vcard" data-dcnode-id="1094"><span class="screen-reader-text" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Author</span></span><span data-dcnode-id="1097" instrument_node=""> by </span><a class="url fn n" data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/author/stratechery/"><span data-dcnode-id="1096" instrument_node="">Ben Thompson</span></a></span></span><span data-dcnode-id="1092" instrument_node=""> </span></div><span data-dcnode-id="1089" instrument_node="">
</span></header><span data-dcnode-id="1086" instrument_node="">
</span><div class="entry-content" data-dcnode-id="668"><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1084" instrument_node="">Six years ago tomorrow, in </span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2016/the-reality-of-missing-out/"><span data-dcnode-id="1083" instrument_node="">The Reality of Missing Out</span></a><span data-dcnode-id="1081" instrument_node="">, I wrote that the digital advertising market was settled, and Google and Facebook won:</span></p><span data-dcnode-id="1079" instrument_node="">
</span><blockquote data-dcnode-id="1067"><p data-dcnode-id="1074"><span data-dcnode-id="1078" instrument_node="">
  I have been arguing for a while that&nbsp;</span><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2015/unicorns/"><span data-dcnode-id="1077" instrument_node="">in the aggregate</span></a><span data-dcnode-id="1075" instrument_node="">&nbsp;the tech sector is fine, and the state of advertising-based services is a perfect example of what I mean: taken as a basket the six companies in this article (Google, Facebook, Yahoo, Twitter, LinkedIn, and Yelp) are up 19% over the last year, even though the latter four companies are down a collective 53%; the fact that Google and Facebook are up a combined 31% more than makes up for it.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1072" instrument_node="">  This makes sense: while advertising as a whole is a zero-sum game, there is a secular shift from not just print but also radio and TV to digital, which is why this basket of digital advertising companies is up. Digital, though, is subject to the effects of&nbsp;</span><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2015/aggregation-theory/"><span data-dcnode-id="1071" instrument_node="">Aggregation Theory</span></a><span data-dcnode-id="1069" instrument_node="">, a key component of which is winner-take-all dynamics, and Facebook and Google are indeed taking it all.
</span></p></blockquote><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1065" instrument_node="">The Article was prescient for a time; Yahoo has been passed around for peanuts, </span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2016/microsoft-and-apple-double-down/"><span data-dcnode-id="1064" instrument_node="">LinkedIn was bought by Microsoft</span></a><span data-dcnode-id="1062" instrument_node=""> a few months later, and while Yelp and Twitter’s stock have more-or-less doubled since then,</span></p><div class="bigfoot-footnote__container" data-dcnode-id="1049"><span data-dcnode-id="1061" instrument_node=""> </span><button alt="See Footnote 6" class="bigfoot-footnote__button" data-bigfoot-footnote="<p>Twitter did have a large run-up a year ago that has since disappeared</p>" data-dcnode-id="1050" data-footnote-identifier="6" data-footnote-number="6" id="rf1-8451" rel="footnote"><span data-dcnode-id="1060" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="1058" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="1059" fill="white" r="3"></circle></svg><span data-dcnode-id="1057" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="1055" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="1056" fill="white" r="3"></circle></svg><span data-dcnode-id="1054" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="1052" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="1053" fill="white" r="3"></circle></svg><span data-dcnode-id="1051" instrument_node=""> </span></button></div><sup class="footnote-print-only" data-dcnode-id="1046" data-footnote-backlink-ref="rf1-8451" data-footnote-ref="#fn1-8451" id="rf1-8451"><a data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23fn1-8451" rel="footnote" title="Twitter did have a large run-up a year ago that has since disappeared"><span data-dcnode-id="1048" instrument_node="">1</span></a></sup><span data-dcnode-id="1045" instrument_node=""> that gain pales in comparison to that of Google and Facebook:</span><p></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><img alt="Google, Facebook, Twitter, and Yelp's market gains over the last six years" class="aligncenter size-large wp-image-8452" data-dcnode-id="1042" data-recalc-dims="1" height="320" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-1.png%3Fresize%3D640%252C320%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-1.png?resize=1024%2C512&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-1.png?resize=300%2C150&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-1.png?resize=768%2C384&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-1.png?resize=1200%2C600&amp;ssl=1 1200w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-1.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">That chart, though, only runs through last Wednesday; here is the new chart post-Facebook earnings:</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><img alt="Google, Facebook, Twitter, and Yelp's market gains over the last six years, including Facebook's recent earnings" class="aligncenter size-large wp-image-8453" data-dcnode-id="1036" data-recalc-dims="1" height="320" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-2.png%3Fresize%3D640%252C320%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-2.png?resize=1024%2C512&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-2.png?resize=300%2C150&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-2.png?resize=768%2C384&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-2.png?resize=1200%2C600&amp;ssl=1 1200w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/2022advertising-2.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">It turns out that, for now anyways, buying $TWTR on the day I wrote that article would have provided a better return than $FB.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><h4 data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Direct Response and the Collapse of the Funnel</span></h4><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">In that Article I painted an idealized picture of the traditional marketing funnel and how Google and Facebook’s advertising products mapped onto it:</span></p><span data-dcnode-id="1025" instrument_node="">
</span><blockquote data-dcnode-id="1014"><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">
  What Sandberg is detailing here is really quite extraordinary: Facebook helped Shop Direct move customers through every part of the funnel: from awareness through Instagram video ads to consideration through retargeting and finally to conversion with dynamic product ads on Facebook (and, in the not too distant future, a direct customer relationship to build loyalty via Messenger).</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1021" instrument_node=""> </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2016/the-reality-of-missing-out/"><img alt="A drawing of Digital Advertising 2.0" class="aligncenter size-large wp-image-2026" data-dcnode-id="1020" data-recalc-dims="1" height="431" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2016/02/stratechery-Year-One-2711.png%3Fresize%3D640%252C431%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2016/02/stratechery-Year-One-2711.png?resize=1024%2C689&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/02/stratechery-Year-One-2711.png?resize=300%2C202&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/02/stratechery-Year-One-2711.png?resize=768%2C517&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/02/stratechery-Year-One-2711.png?resize=936%2C630&amp;ssl=1 936w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/02/stratechery-Year-One-2711.png?w=1280&amp;ssl=1 1280w, https://i0.wp.com/stratechery.com/wp-content/uploads/2016/02/stratechery-Year-One-2711.png?w=1920&amp;ssl=1 1920w" width="640"></a></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">  Google is promising something similar: awareness via properties like YouTube, consideration via DoubleClick, and conversion via AdSense. Just as importantly, both companies are promising that leveraging their respective platforms will provide benefits on both sides of the ROI equation: the return will be better given the two companies’ superior targeting capabilities and ability to measure conversion, and the investment will be smaller because you can manage your entire funnel from a single ad-buying interface.
</span></p></blockquote><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Herein lies the first thing that I got wrong: the traditional marketing funnel made sense in a world where different parts of the customer journey happened in different places — literally. You might see an advertisement on TV, then a coupon in the newspaper, and finally the product on an end cap in a store. Every one of those exposures was a discrete advertising event that culminated in the customer picking up the product in question in putting it in their (literal) shopping cart.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">On the Internet, though, that journey is increasingly compressed into a single impression: you see an ad on Instagram, you click on it to find out more, you login with Shop Pay, and then you wonder what you were thinking when it shows up at your door a few days later. The loop for apps is even tighter: you see an ad, click an ‘Install’ button, and are playing a level just seconds later. Sure, there are things like re-targeting or list building, but by-and-large Internet advertising, particularly when it comes to Facebook, is almost all direct response.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1006" instrument_node="">This can make for an exceptionally resilient business model: because the return-on-investment (ROI) of direct response advertising is measurable to a fantastically greater degree than traditional advertising measurement, advertisers can spend right up to the level they place on a particular customer or transaction’s value; Facebook, of course, is willing to help them do that as easily as possible, </span><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/email-addresses-and-razor-blades/"><span data-dcnode-id="1005" instrument_node="">squeezing out margin in the process</span></a><span data-dcnode-id="1003" instrument_node="">. Moreover, because these ads are sold at auction, the company is insulated from events like COVID or boycotts; I explained in 2020’s </span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/apple-and-facebook/"><span data-dcnode-id="1002" instrument_node="">Apple and Facebook</span></a><span data-dcnode-id="1000" instrument_node="">:</span></p><span data-dcnode-id="998" instrument_node="">
</span><blockquote data-dcnode-id="992"><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">
  This explains why the news about large CPG companies boycotting Facebook is, from a financial perspective, simply not a big deal. Unilever’s $11.8 million in U.S. ad spend, to take one example, is replaced with the same automated efficiency that Facebook’s timeline ensures you never run out of content. Moreover, while Facebook loses some top-line revenue — in an auction-based system, less demand corresponds to lower prices — the companies that are the most likely to take advantage of those lower prices are those that would not exist without Facebook, like the direct-to-consumer companies trying to steal customers from massive conglomerates like Unilever.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">  In this way Facebook has a degree of anti-fragility that even Google lacks: so much of its business comes from the long tail of Internet-native companies that are built around Facebook from first principles, that any disruption to traditional advertisers — like the coronavirus crisis or the current boycotts — actually serves to strengthen the Facebook ecosystem at the expense of the TV-centric ecosystem of which these CPG companies are a part.
</span></p></blockquote><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">The problem for Meta is in the title of that article: Apple. The latter’s App Tracking Transparency (ATT) initiative severed the connection amongst e-commerce sellers, app developers, and Facebook by which Facebook achieved that ROI, and while the company is better positioned than anyone else to build a replacement, it is important to note that the impairment entailed in probabilistically measuring ad effectiveness instead of deterministically is a permanent one.</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="987" instrument_node="">This isn’t just a Facebook problem: Snap said on </span><a data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//seekingalpha.com/article/4484260-snap-inc-snap-ceo-evan-spiegel-on-q4-2021-results-earnings-call-transcript"><span data-dcnode-id="986" instrument_node="">its earnings call</span></a><span data-dcnode-id="984" instrument_node="">:</span></p><span data-dcnode-id="982" instrument_node="">
</span><blockquote data-dcnode-id="979"><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">
  Our advertising partners who prefer to leverage lower-funnel goals such as in-app purchases, have been most impacted by [ATT]. We are seeing these advertisers migrate to mid-funnel goals where they have greater visibility such as install or click. Advertisers who optimize via web-based goal-based bids or GBBs have been less impacted, given that many of them have adopted the Snap pixel.
</span></p></blockquote><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="977" instrument_node="">Snap’s direct response business is not nearly as good as Facebook’s, and is a much smaller business both overall and in terms of the overall company’s revenue; that left </span><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/benthompson/status/1489415020094324739"><span data-dcnode-id="976" instrument_node="">a lot more cushion to absorb ATT</span></a><span data-dcnode-id="974" instrument_node="">, both because Snap’s performance had less to lose, and also because the company’s brand-business could help pick up the slack. This, paradoxically, led many investors to overfit Facebook’s disappointing forecast to Snap’s outlook; the reality is that advertising dollars will find a way to be spent, and the alternatives to direct response on Snap were more impactful to the bottom line than they are on Facebook, in part because the latter was so dominant in direct response until now.</span></p><span data-dcnode-id="972" instrument_node="">
</span><h4 data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">The Amazon Advertising IPO</span></h4><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="968" instrument_node="">What made the Facebook model tick was the way in which the company could convert conversion tracking to targeting: because Facebook knew a lot about someone who saw an ad and then converted, they could easily find other people who were similar — </span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/privacy-labels-and-lookalike-audiences/"><span data-dcnode-id="967" instrument_node="">lookalike audiences</span></a><span data-dcnode-id="965" instrument_node=""> —&nbsp;and show them similar ads, continually optimizing their targeting and increasing their understanding along the way.</span></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Google Search, though, has a built-in advantage: Google doesn’t have to figure out what you are interested in because you do the company the favor of telling it by searching for it. The odds that you want a hotel in San Francisco are rather high if you search for “San Francisco hotels”; it’s the same thing with life insurance or car mechanics or e-commerce.</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="959" instrument_node="">Google is not the only search engine that monetizes e-commerce effectively. Back in 2015 I described the breakout of Amazon Web Services’ financials as </span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2015/the-aws-ipo/"><span data-dcnode-id="958" instrument_node="">The AWS IPO</span></a><span data-dcnode-id="956" instrument_node="">:</span></p><span data-dcnode-id="954" instrument_node="">
</span><blockquote data-dcnode-id="951"><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">
  This is why Amazon’s latest earnings were such a big deal: for the first time the company broke out AWS into its own line item, revealing not just its revenue (which could be teased out previously) but also its profitability. And, to many people’s surprise, and despite all the price cuts, AWS is very profitable: $265 million in profit on $1.57 billion in sales last quarter alone, for an impressive (for Amazon!) 17% net margin.
</span></p></blockquote><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Those numbers pale in comparison to what I guess we might call the Amazon Advertising IPO, given that the company broke out its advertising for the first time this quarter, revealing $9.7 billion in revenue, a 32% increase year-over-year (Amazon did not break out the unit’s profitability). While that is still a fraction of Google’s $61.2 billion last quarter, or Facebook’s $32.6 billion, it is a larger fraction than you might expect, and several multiples of Snap’s $1.3 billion in revenue. Indeed, given the fact that Amazon is closer in revenue to Facebook than Facebook is to Google it seems fair to characterize the advertising market as dominated not by a big two but a big three.</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Amazon’s advertising business has three big advantages relative to Facebook’s.</span></p><span data-dcnode-id="944" instrument_node="">
</span><ol data-dcnode-id="913"><span data-dcnode-id="943" instrument_node="">
</span><li data-dcnode-id="937"><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Search advertising is the best and most profitable form of advertising.</span></strong><span data-dcnode-id="940" instrument_node=""> This goes back to the point I made above: the more certain you are that you are showing advertising to a receptive customer, the more advertisers are willing to bid for that ad slot, and text in a search box will always be more accurate than the best targeting.</span><p data-dcnode-id="939"></p><span data-dcnode-id="938" instrument_node="">
</span></li><span data-dcnode-id="936" instrument_node="">
</span><li data-dcnode-id="926"><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="928"><strong data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Amazon faces no data restrictions.</span></strong><span data-dcnode-id="932" instrument_node=""> That noted, Amazon </span><em data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">also</span></em><span data-dcnode-id="929" instrument_node=""> has data on its users, and it is free to collect as much of it as it likes, and leverage it however it wishes when it comes to selling ads. This is because all of Amazon’s data collection, ad targeting, and conversion happen on the same platform — Amazon.com, or the Amazon app. ATT only restricts third party data sharing, which means it doesn’t affect Amazon at all.</span></p><span data-dcnode-id="927" instrument_node="">
</span></li><span data-dcnode-id="925" instrument_node="">
</span><li data-dcnode-id="915"><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="917"><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Amazon benefits from ATT spillover.</span></strong><span data-dcnode-id="921" instrument_node=""> That is not to say that ATT didn’t have an effect on Amazon: I noted above that Snap’s business did better than expected in part because its business wasn’t dominated by direct advertising to the extent that Facebook’s was, and that more advertising money flowed into other types of advertising. This almost certainly made a difference for Amazon as well: one of the most affected areas of Facebook advertising was e-commerce; if you are an e-commerce seller whose </span><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/the-anti-amazon-alliance/"><span data-dcnode-id="920" instrument_node="">Shopify store powered-by Facebook ads</span></a><span data-dcnode-id="918" instrument_node=""> was suddenly under-performing thanks to ATT, then the natural response is to shift products and advertising spend to Amazon.</span></p><span data-dcnode-id="916" instrument_node="">
</span></li><span data-dcnode-id="914" instrument_node="">
</span></ol><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">All of these advantages will persist: search advertising will always be effective, and Amazon can always leverage data, and while some degree of ATT-related pullback was likely due to both uncertainty and the fact that Facebook hasn’t built back its advertising stack for a post-ATT world, the fact that said future stack will never be quite as good as the old one means that there is more e-commerce share to be grabbed than there might have been otherwise.</span></p><span data-dcnode-id="909" instrument_node="">
</span><h4 data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Google’s Dominance</span></h4><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Of course you could just as easily make an argument that when it comes to digital advertising there is Google and everyone else. Google clearly faces competition from Amazon for e-commerce search advertising — the European Commission’s Google Shopping case is only surpassed by the FTC’s Facebook lawsuit when it comes to overly narrow market definitions that ignore reality — but is dominant in terms of nearly every other vertical. Moreover, that dominance is shored up by the same factors favoring Amazon, at least in part.</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">The first one is obvious: search advertising works great, and Google is the best at it.</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">The second one, about data collection, is more interesting, particularly in the context of ATT. Facebook CFO Dave Wehner groused on </span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s21.q4cdn.com/399680738/files/doc_financials/2021/q4/Meta-Q4-2021-Earnings-Call-Transcript.pdf"><span data-dcnode-id="898" instrument_node="">the company’s recent earnings call</span></a><span data-dcnode-id="896" instrument_node="">:</span></p><span data-dcnode-id="894" instrument_node="">
</span><blockquote data-dcnode-id="888"><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">
  We believe the impact of iOS overall as a headwind on our business in 2022 is on the order of $10 billion, so it’s a pretty significant headwind for our business. And we’re seeing that impact in a number of verticals. E-commerce was an area where we saw a meaningful slowdown in growth in Q4. And similarly, we’ve seen other areas like gaming be challenged. But on e-commerce, it’s quite notable that Google called out, seeing strength in that very same vertical. And so given that we know that e-commerce is one of the most impacted verticals from iOS restrictions, it makes sense that those restrictions are probably part of the explanation for the difference between what they were seeing and what we were seeing.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">  And if you look at it, we believe those restrictions from Apple are designed in a way that carves out browsers from the tracking prompts Apple requires for apps. And so what that means is that search ads could have access to far more third-party data for measurement and optimization purposes than app-based ad platforms like ours. So when it comes to using data, that it’s not really apples-to-apples for us. And as a result, we believe Google’s search ads business could have benefited relative to services like ours that face a different set of restrictions from Apple. And given that Apple continues to take billions of dollars a year from Google Search ads, the incentive clearly exists for this policy discrepancy to continue.
</span></p></blockquote><span data-dcnode-id="887" instrument_node="">
