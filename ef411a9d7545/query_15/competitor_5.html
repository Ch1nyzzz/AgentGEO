</span><p data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Again, to be very clear, that does not mean the opinion is wrong; as I noted, I think the resonance of this meme is orthogonal to the rightness of the position it is critiquing, and is instead concerned with the sense that there is something unique about the depth of sentiment surrounding issues that don’t necessarily apply in any real-life way to the people feeling said sentiment.</span></p><span data-dcnode-id="2093" instrument_node="">
</span><h4 data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Righteousness and Dissent</span></h4><span data-dcnode-id="2090" instrument_node="">
</span><p data-dcnode-id="2085"><span data-dcnode-id="2089" instrument_node="">Here I think it is useful to go back to economics. The more that an entity becomes dependent on an Aggregator, the more perilous the economic outlook for said entity. If you depend on Google or Facebook for traffic, or Amazon for sales, the more liable you are to </span><a data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/email-addresses-and-razor-blades/"><span data-dcnode-id="2088" instrument_node="">have your margin consumed by said entities</span></a><span data-dcnode-id="2086" instrument_node="">. A truly sustainable business model depends on being able to connect to your customers on your own terms, not an Aggregator’s.</span></p><span data-dcnode-id="2084" instrument_node="">
</span><p data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">A similar critique can be made of ideas; I thought this tweet was very well-stated:</span></p><span data-dcnode-id="2081" instrument_node="">
</span><div align="center" data-dcnode-id="2066"><span data-dcnode-id="2080" instrument_node="">
</span><blockquote class="twitter-tweet" data-dcnode-id="2071" data-dnt="true"><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2077" dir="ltr" lang="en"><span data-dcnode-id="2078" instrument_node="">Putin's array of yes men convincing him his military was far more capable than it actually was and Xi's propaganda campaign against Western mRNA vaccines forcing him to rely on COVID Zero are powerful reminders that, as messy as it can be, an open democratic discourse is superior</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2072"><span data-dcnode-id="2075" instrument_node="">— Armand Domalewski (@ArmandDoma) </span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/ArmandDoma/status/1504220528265027592%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="2074" instrument_node="">March 16, 2022</span></a></p></blockquote><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2069" instrument_node=""> </span></p></div><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">It is very counter-intuitive to see how “bad” ideas are in fact extremely valuable: not only do they highlight why the good ideas are better, but they also sometimes show that the “good” ideas are in fact wrong. Arguing that the earth was not the center of the universe was once a “bad” idea; it was also correct. At the same time, to think that the Catholic church of 500 years ago was the only time where the dominant mode of thinking clearly missed the mark seems exceptionally arrogant; we rightly believe that allowing room for dissidents was, in the past, a good thing. It seems clear to me that doing the same today is likely to prove more valuable than not.</span></p><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2057"><span data-dcnode-id="2061" instrument_node="">Here is the problem: it turns out it was much easier to believe in the value of dissidents in a world of meaningful marginal costs for the propagation of ideas. Most people never encountered contrary opinions when spreading said opinions entailed publishing them on paper and spreading them in the physical world; on the Internet, on the other hand, bad ideas are </span><a data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/zero-trust-information/"><span data-dcnode-id="2060" instrument_node="">only a search away</span></a><span data-dcnode-id="2058" instrument_node="">. Moreover, the means by which to suppress those opinions are far more obvious: instead of having to shut down a printing press, one only needs to pressure those same centralized Aggregators that arose for economic reasons to suppress “wrong” speech.</span></p><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">The end result is a world where the ability for anyone to post any idea has, paradoxically, meant far greater mass adoption of popular ideas and far more effective suppression of “bad” ideas. That is invigorating when one feels the dominant idea is righteous; it seems reasonable to worry about the potential of said sense of righteousness overwhelming the consideration of whether particular courses of action are actually good or bad.</span></p><span data-dcnode-id="2053" instrument_node="">
</span><h4 data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Moderation Frameworks</span></h4><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2045"><span data-dcnode-id="2049" instrument_node="">In 2019 I wrote an Article entitled </span><a data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2019/a-framework-for-moderation/"><span data-dcnode-id="2048" instrument_node="">A Framework for Moderation</span></a><span data-dcnode-id="2046" instrument_node="">, which argued for a finely-tuned examination of the Internet stack as a driver of moderation decisions:</span></p><span data-dcnode-id="2044" instrument_node="">
</span><blockquote data-dcnode-id="2033"><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">
  It makes sense to think about these positions of the stack very differently: the top of the stack is about broadcasting — reaching as many people as possible — and while you may have the right to say anything you want, there is no right to be heard. Internet service providers, though, are about access — having the opportunity to speak or hear in the first place. In other words, the further down the stack, the more legality should be the sole criteria for moderation; the further up the more discretion and even responsibility there should be for content:</span></p><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2040" instrument_node=""> </span><a data-dcnode-id="2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2019/a-framework-for-moderation/"><img alt="A drawing of The Position In the Stack Matters for Moderation" class="aligncenter size-large wp-image-4319" data-dcnode-id="2039" data-recalc-dims="1" height="404" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2019/08/Stratechery-2019-08-07-20.42.32.png%3Fresize%3D640%252C404%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2019/08/Stratechery-2019-08-07-20.42.32.png?resize=1024%2C647&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2019/08/Stratechery-2019-08-07-20.42.32.png?resize=300%2C190&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2019/08/Stratechery-2019-08-07-20.42.32.png?resize=768%2C486&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2019/08/Stratechery-2019-08-07-20.42.32.png?resize=996%2C630&amp;ssl=1 996w, https://i0.wp.com/stratechery.com/wp-content/uploads/2019/08/Stratechery-2019-08-07-20.42.32.png?w=1280&amp;ssl=1 1280w, https://i0.wp.com/stratechery.com/wp-content/uploads/2019/08/Stratechery-2019-08-07-20.42.32.png?w=1920&amp;ssl=1 1920w" width="640"></a></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">  Note the implications for Facebook and YouTube in particular: their moderation decisions should not be viewed in the context of free speech, but rather as discretionary decisions made by managers seeking to attract the broadest customer base; the appropriate regulatory response, if one is appropriate, should be to push for more competition so that those dissatisfied with Facebook or Google’s moderation policies can go elsewhere.
</span></p></blockquote><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2024"><span data-dcnode-id="2031" instrument_node="">In this view the decision of </span><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theverge.com/2022/3/5/22962822/internet-backbone-provider-cogent-shuts-off-service-russia"><span data-dcnode-id="2030" instrument_node="">Cogent</span></a><span data-dcnode-id="2028" instrument_node=""> and </span><a data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pcmag.com/news/another-us-internet-backbone-provider-cuts-service-with-russia"><span data-dcnode-id="2027" instrument_node="">Lumen</span></a><span data-dcnode-id="2025" instrument_node=""> to cut-off backbone capacity to Russia feels like a mistake. Both companies are the very definition of infrastructure, with no user-facing presence; it follows that they should not be making any decisions based on political considerations (with Carl von Clausewitz’s observation that “war is simply the continuation of political intercourse with the addition of other means” in mind).</span></p><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">And yet they have cut off Russia all the same, along with a whole host of Western companies. To be very clear, I get it: what Russia is doing to Ukraine is wrong, above and beyond the significant economic challenges in serving a country hit with the most comprehensive set of sanctions in history.</span></p><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2019" instrument_node="">At the same time, I can’t help but worry about a world where every level of the Internet stack feels empowered to act based on political considerations, and it makes me think that my </span><em data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Framework for Moderation</span></em><span data-dcnode-id="2016" instrument_node=""> was wrong. In a world of idea aggregation the push to go along with the current thing is irresistible, making any sort of sober consideration of one’s position in the stack irrelevant. The only effective counter is a blanket policy of not censoring or cutting off service under any circumstance: it’s easier to appeal to consistency than it is to make a nuanced decision that runs counter to the current thing.</span></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">That’s the thing about aggregation: one can understand how it works, and yet be powerless to resist its incentives. It seems foolhardy to think that this might be true for economics and not true for ideas, even — especially! — if we are sure they are correct.</span></p><span data-dcnode-id="2011" instrument_node="">
</span><hr class="footnotes" data-dcnode-id="2010"><ol class="footnotes footnote-print-only" data-dcnode-id="2001" style="list-style-type:decimal"><li class="footnote-processed footnote-print-only" data-dcnode-id="2002" id="fn1-8688"><p data-dcnode-id="2003"><span data-dcnode-id="2009" instrument_node="">The image in the excerpt is from 2014; </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//149384716.v2.pressablecdn.com/wp-content/uploads/2022/03/CleanShot-2022-03-17-at-03.10.26%402x.png"><span data-dcnode-id="2008" instrument_node="">the updated view of the last thirty days</span></a><span data-dcnode-id="2006" instrument_node=""> is broadly similar, but there has been a big relative increase in Washington DC, Los Angeles, India, and Singapore.&nbsp;</span><a class="backlink" data-dcnode-id="2004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23rf1-8688" title="Return to footnote 1."><img alt="↩" class="emoji" data-dcnode-id="2005" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/21a9.svg&amp;raw"></a></p></li></ol><span data-dcnode-id="2000" instrument_node="">
</span></div><span data-dcnode-id="1997" instrument_node="">
</span></article><span data-dcnode-id="1994" instrument_node="">
</span><article class="post-8620 post type-post status-publish format-standard hentry category-articles topics-china topics-chips topics-countries topics-great-firewall topics-india topics-russia topics-taiwan topics-technologies topics-ukraine concepts-politics concepts-security concepts-technology-and-society concepts-unintended-consequence companies-smic companies-tsmc" data-dcnode-id="1625" id="post-8620"><span data-dcnode-id="1993" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1967"><span data-dcnode-id="1992" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1989"><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/tech-and-war/" rel="bookmark"><span data-dcnode-id="1991" instrument_node="">Tech and War</span></a></h1><span data-dcnode-id="1988" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1970"><span data-dcnode-id="1987" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1980"><span class="screen-reader-text" data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">Posted on</span></span><time class="entry-date published" data-dcnode-id="1983" datetime="2022-03-07T08:06:42-08:00"><span data-dcnode-id="1984" instrument_node="">Monday, March 7, 2022</span></time><time class="updated" data-dcnode-id="1981" datetime="2022-03-07T09:59:36-08:00"><span data-dcnode-id="1982" instrument_node="">Monday, March 7, 2022</span></time></span><span data-dcnode-id="1979" instrument_node=""> </span><span class="byline" data-dcnode-id="1972"><span class="author vcard" data-dcnode-id="1973"><span class="screen-reader-text" data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Author</span></span><span data-dcnode-id="1976" instrument_node=""> by </span><a class="url fn n" data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/author/stratechery/"><span data-dcnode-id="1975" instrument_node="">Ben Thompson</span></a></span></span><span data-dcnode-id="1971" instrument_node=""> </span></div><span data-dcnode-id="1968" instrument_node="">
</span></header><span data-dcnode-id="1965" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1628"><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">While it has been only 11 days since Russia invaded Ukraine, it is already clear that the long-term impact on the tech industry is going to be substantial. The goal of this Article is to explore what those implications might be.</span></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Let me start with some caveats:</span></p><span data-dcnode-id="1958" instrument_node="">
</span><ul data-dcnode-id="1947"><span data-dcnode-id="1957" instrument_node="">
</span><li data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">First, while I presume it goes without saying, I condemn Russia’s invasion of Ukraine in the strongest possible terms.</span></li><span data-dcnode-id="1954" instrument_node="">
</span><li data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Second, the situation is obviously extremely fluid. My goal is to write about impacts that seem likely to endure, but some issues, particularly those involving China, could shift considerably.</span></li><span data-dcnode-id="1951" instrument_node="">
</span><li data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">Third, the long-term is inherently difficult to predict. Nearly every major event that has has happened over the last several years, from Donald Trump’s election, to COVID, to this invasion, was not only not anticipated by most people, but was in fact dismissed even after there were signs in place that they might occur. So take all of this with the appropriate grain of salt.</span></li><span data-dcnode-id="1948" instrument_node="">
</span></ul><span data-dcnode-id="1946" instrument_node="">
</span><p data-dcnode-id="1938"><span data-dcnode-id="1945" instrument_node="">The most important thing to make clear about this Article, though, is that much of it is focused on </span><em data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">capabilities</span></em><span data-dcnode-id="1942" instrument_node="">, not </span><em data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">intentions.</span></em><span data-dcnode-id="1939" instrument_node=""> In much of our daily life we rely on the good intentions of others, even if they have dangerous capabilities. One mundane example is traffic on a two-way street: oncoming cars have the capability of swerving into my lane and hitting me head-on; I trust that they do not intend to do so. There are a whole host of similar examples, for good reason: societies that trust each other’s intentions function much more smoothly and efficiently; no one wants every single street to be built with concrete dividers between traffic.</span></p><span data-dcnode-id="1937" instrument_node="">
</span><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">In an ideal world international relations would work the same way, and there is an argument that much of the prosperity of the last few decades has been driven by the sort of increased trust and interconnectedness that comes from assuming the good intentions of other countries — or at a minimum enlightened self-interest — leading to increased economic efficiency for everyone engaged in global trade. In this arena, though, the question of capabilities is never far from the surface: what can one country do to another, should the intentions of the first country change, and what must the second country do to ameliorate that risk? And here there is very much a tech angle.</span></p><span data-dcnode-id="1934" instrument_node="">
</span><h4 data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Public Versus Private Sanctions</span></h4><span data-dcnode-id="1931" instrument_node="">
</span><p data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">In response to the invasion Western governments unleashed an unprecedented set of sanctions on Russia; these sanctions were primarily financial in nature, and included:</span></p><span data-dcnode-id="1928" instrument_node="">
</span><ul data-dcnode-id="1917"><span data-dcnode-id="1927" instrument_node="">
</span><li data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Disconnecting sanctioned Russian banks from the SWIFT international payment system</span></li><span data-dcnode-id="1924" instrument_node="">
</span><li data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Cutting off the Russian Central Bank from foreign currency reserves held in the West</span></li><span data-dcnode-id="1921" instrument_node="">
</span><li data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">Identifying and freezing the assets of sanctioned Russian individuals</span></li><span data-dcnode-id="1918" instrument_node="">
</span></ul><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1915" instrument_node="">The sanctions, which were announced last weekend, led to the crashing of the ruble and the ongoing closure of the Russian stock market, and are expected to wreak havoc on the Russian economy; now the U.S. and E.U. are </span><a data-dcnode-id="1913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/business/energy/us-europeans-discussing-banning-russian-oil-imports-blinken-says-2022-03-06/"><span data-dcnode-id="1914" instrument_node="">discussing banning imports of Russian oil</span></a><span data-dcnode-id="1912" instrument_node="">.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1909" instrument_node="">This Article is not about those public sanctions, by which I mean sanctions coming from governments (Noah Smith has a useful overview of their impact </span><a data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//noahpinion.substack.com/p/how-are-the-big-sanctions-hurting"><span data-dcnode-id="1908" instrument_node="">here</span></a><span data-dcnode-id="1906" instrument_node="">); what is interesting to me is the extent to which these public sanctions have been accompanied by </span><em data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">private</span></em><span data-dcnode-id="1903" instrument_node=""> sanctions by companies, including:</span></p><span data-dcnode-id="1901" instrument_node="">
</span><ul data-dcnode-id="1846"><span data-dcnode-id="1900" instrument_node="">
</span><li data-dcnode-id="1895"><span data-dcnode-id="1899" instrument_node="">Apple has </span><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/apple-says-it-has-stopped-all-product-sales-in-russia-11646169327"><span data-dcnode-id="1898" instrument_node="">stopped selling its products</span></a><span data-dcnode-id="1896" instrument_node=""> in Russia (although still operates the App Store).</span></li><span data-dcnode-id="1894" instrument_node="">
</span><li data-dcnode-id="1886"><span data-dcnode-id="1893" instrument_node="">Microsoft </span><a data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.microsoft.com/on-the-issues/2022/03/04/microsoft-suspends-russia-sales-ukraine-conflict/"><span data-dcnode-id="1892" instrument_node="">has suspended</span></a><span data-dcnode-id="1890" instrument_node=""> all new sales of Microsoft products and services in Russia, and </span><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theregister.com/2022/03/02/oracle_and_sap_suspend_business/"><span data-dcnode-id="1889" instrument_node="">SAP and Oracle</span></a><span data-dcnode-id="1887" instrument_node=""> have suspended operations.</span></li><span data-dcnode-id="1885" instrument_node="">
</span><li data-dcnode-id="1880"><span data-dcnode-id="1884" instrument_node="">Google and Facebook </span><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2022/03/04/google-suspends-all-advertising-in-russia-.html"><span data-dcnode-id="1883" instrument_node="">suspended all advertising</span></a><span data-dcnode-id="1881" instrument_node=""> in Russia.</span></li><span data-dcnode-id="1879" instrument_node="">
</span><li data-dcnode-id="1874"><span data-dcnode-id="1878" instrument_node="">Activision Blizzard, Epic Games, EA, and CD Projekt </span><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.engadget.com/activision-blizzard-epic-games-pause-game-sales-russia-201856440.html"><span data-dcnode-id="1877" instrument_node="">suspended game sales</span></a><span data-dcnode-id="1875" instrument_node=""> in Russia.</span></li><span data-dcnode-id="1873" instrument_node="">
</span><li data-dcnode-id="1865"><span data-dcnode-id="1872" instrument_node="">Disney, Sony, and Warner Bros. </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/lifestyle/disney-pausing-film-releases-russia-over-ukraine-invasion-2022-03-01/"><span data-dcnode-id="1871" instrument_node="">paused film releases</span></a><span data-dcnode-id="1869" instrument_node=""> in Russia, and Netflix </span><a data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//variety.com/2022/digital/news/netflix-suspends-service-russia-ukraine-invasion-1235197390/"><span data-dcnode-id="1868" instrument_node="">suspended its service</span></a><span data-dcnode-id="1866" instrument_node="">.</span></li><span data-dcnode-id="1864" instrument_node="">
</span><li data-dcnode-id="1856"><span data-dcnode-id="1863" instrument_node="">Visa and Mastercard </span><a data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2022-03-05/visa-suspends-all-russia-operations-l0eegccn"><span data-dcnode-id="1862" instrument_node="">cut off Russia</span></a><span data-dcnode-id="1860" instrument_node=""> from their respective international payment networks, and </span><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/business/paypal-shuts-down-its-services-russia-citing-ukraine-aggression-2022-03-05/"><span data-dcnode-id="1859" instrument_node="">PayPal suspended service</span></a><span data-dcnode-id="1857" instrument_node="">.</span></li><span data-dcnode-id="1855" instrument_node="">
</span><li data-dcnode-id="1848"><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2022-03-04/samsung-suspends-shipments-of-phones-chips-to-russia"><span data-dcnode-id="1854" instrument_node="">Samsung</span></a><span data-dcnode-id="1852" instrument_node=""> stopped selling phones and chips, and </span><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pcworld.com/article/619357/amd-officially-halts-chip-sales-to-russia.html"><span data-dcnode-id="1851" instrument_node="">Nvidia, Intel, and AMD</span></a><span data-dcnode-id="1849" instrument_node=""> also stopped selling chips to Russia.</span></li><span data-dcnode-id="1847" instrument_node="">
</span></ul><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">This is an incomplete list! The key thing to note, though, is few if any of these actions were required by law; they were decisions made by individual companies.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1841" instrument_node="">This, though, is where the </span><em data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">intentions</span></em><span data-dcnode-id="1838" instrument_node=""> versus </span><em data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">capabilities</span></em><span data-dcnode-id="1835" instrument_node=""> distinction arises, in two different respects:</span></p><span data-dcnode-id="1833" instrument_node="">
</span><ul data-dcnode-id="1825"><span data-dcnode-id="1832" instrument_node="">
</span><li data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">First, the public/private distinction that I just noted may not be so apparent to people outside of the U.S. or the West generally; one could certainly understand how other countries might interpret this collection of public and private sanctions as being different parts of a single whole. To that end, this collection of actions demonstrates the capability of effectively wiping an economy off of the map.</span></li><span data-dcnode-id="1829" instrument_node="">
</span><li data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Second, to the extent that the public/private distinction is understood, it highlights the capability of private companies to impose sanctions, and their willingness to do so in pursuit of political goals — even if those political goals are to stop an unjust invasion and save lives.</span></li><span data-dcnode-id="1826" instrument_node="">
</span></ul><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">I suspect that both of these interpretations matter and will have long-reaching effects, in part because they are not a new trend, but a continuation of an ongoing one.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><h4 data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Internet 3.0 and the Rise of Politics</span></h4><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1817" instrument_node="">Last January I wrote an article entitled </span><a data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/internet-3-0-and-the-beginning-of-tech-history/"><span data-dcnode-id="1816" instrument_node="">Internet 3.0 and the Beginning of (Tech) History</span></a><span data-dcnode-id="1814" instrument_node=""> that argued that technology broadly has passed through two eras: 1.0 was the technological era, and 2.0 was the economic era.</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">The technological era was defined by the creation of the technical building blocks and protocols that undergird the Internet; there were few economic incentives beyond building products that people might want to buy, in part because few thought there was any money to be made on the Internet. That changed during the 2000s, as it became increasingly clear that the Internet provided massive returns to scale in a way that benefited both Aggregators and their customers. I wrote:</span></p><span data-dcnode-id="1809" instrument_node="">
</span><blockquote data-dcnode-id="1800"><p data-dcnode-id="1804"><span data-dcnode-id="1808" instrument_node="">
  Google was founded in 1998, in the middle of the dot-com bubble, but it was the company’s IPO in 2004 that, to my mind, marked the beginning of Internet 2.0. This period of the Internet was about the economics of zero friction; specifically, unlike the assumptions that undergird Internet 1.0, it turned out that the Internet does not disperse economic power but in fact centralizes it. This is what undergirds </span><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2015/aggregation-theory/"><span data-dcnode-id="1807" instrument_node="">Aggregation Theory</span></a><span data-dcnode-id="1805" instrument_node="">: when services compete without the constraints of geography or marginal costs, dominance is achieved by controlling demand, not supply, and winners take most.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">  Aggregators like Google and Facebook weren’t the only winners though; the smartphone market was so large that it could sustain a duopoly of two platforms with multi-sided networks of developers, users, and OEMs (in the case of Android; Apple was both OEM and platform provider for iOS). Meanwhile, public cloud providers could provide back-end servers for companies of all types, with scale economics that not only lowered costs and increased flexibility, but which also justified far more investments in R&amp;D that were immediately deployable by said companies.
</span></p></blockquote><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">There is no economic reason to ever leave this era, which leads many to assume we never will; services that are centralized work better for more people more cheaply, leaving no obvious product vector on which non-centralized alternatives are better. The exception is politics, and the point of that Article was to argue that we were entering a new era: the political era.</span></p><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Go back to the two points I raised above:</span></p><span data-dcnode-id="1793" instrument_node="">
</span><ul data-dcnode-id="1785"><span data-dcnode-id="1792" instrument_node="">
</span><li data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">If a country, corporation, or individual assumes that the tech platforms of another country are acting in concert with their enemy, they are highly motivated to pursue alternatives to those tech platforms even if those platforms work better, are more popular, are cheaper, etc.</span></li><span data-dcnode-id="1789" instrument_node="">
</span><li data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">If a country, corporation, or individual assumes that tech platforms are themselves engaged in political action, they are highly motivated to pursue alternatives to those tech platforms even if those platforms work better, are more popular, are cheaper, etc.</span></li><span data-dcnode-id="1786" instrument_node="">
</span></ul><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1783" instrument_node="">Again, just to be crystal clear, these takeaways are true even if the intentions are pure, and the actions are just, because the question at hand is not about </span><em data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">intentions</span></em><span data-dcnode-id="1780" instrument_node=""> but about </span><em data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">capabilities</span></em><span data-dcnode-id="1777" instrument_node="">. And while I get it can be hard to appreciate that distinction in the case of a situation like Ukraine, it’s worth noting that similar takeaways could be drawn from de-platforming controversies after January 6 and the attempts to control misinformation during COVID; if anything the fact that there are multiple object lessons in recent history of the willingness of platforms to both act in concert with governments and also of their own volition emphasizes the fact that from a realist perspective capabilities matter more than intentions, because the willingness to exercise those capabilities (to a widely varying degree, to be sure) has not been constrained to a single case.</span></p><span data-dcnode-id="1775" instrument_node="">
</span><h4 data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">India and Sanctions</span></h4><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">The two countries where these questions are likely to loom largest are China and India.</span></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Start with the latter: India is widely considered the most important long-term growth market for a whole host of tech companies, thanks to its massive population that is only just now coming online, combined with a growing economy that, to the extent it can follow a similar path to China, promises more opportunity than anywhere else in the world. In the economic era it has made perfect sense for India to be a core market for Google, Facebook, Amazon, etc.</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">It was India, though, that raised some of the most strident objections to Twitter and Facebook’s decision to take down President Trump’s accounts after January 6, with several politicians pointing out that tech executives in San Francisco could do the same to them; in the case of the Ukraine invasion India is staying neutral, thanks in part to its significantly longer-term relationship with Russia, particularly from a military perspective. That makes it all-the-more likely that the aforementioned private sanctions are being interpreted in terms of capabilities, not intentions, clouding the long-term prospects of those tech companies counting on India for growth.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">It’s important to note that this isn’t an abstract idea for India: the country’s nuclear program was started in response to India’s defeat in the 1962 Sino-Indian War, but the country’s first nuclear test in 1974 led to sanctions from the United States, as did far more extensive tests in 1998. The United States also sailed a fleet into the Bay of Bengal during a conflict with Pakistan in 1971, shortly after India signed a treaty with the USSR, and the fleet was there to oppose India, not to support it. This matters not because it excuses India’s neutrality in the current conflict, but to explain why these private sanctions from U.S. tech companies may have different interpretations and unintended consequences in a market they were counting on.</span></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">China is in a very different position, thanks to the long-run effects of the Great Firewall: U.S. consumer services companies obviously can’t sanction China, because China has already blocked them and built its own alternatives (one does wonder to what extent Moscow and perhaps even New Delhi look at the Great Firewall with jealousy). China’s problem —&nbsp;and potentially the West’s opportunity — lies with a far more fundamental piece of technology: semiconductors.</span></p><span data-dcnode-id="1757" instrument_node="">
</span><h4 data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Semiconductors and China</span></h4><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">China’s leading semiconductor foundry is the Semiconductor Manufacturing International Corporation —&nbsp;SMIC for short. While the majority of SMIC’s volume is on older 55nm and 65nm process nodes, the company has a sizable and growing business at the extremely popular 28nm node. The company has also recently started mass production of 14nm and has demonstrated the ability to build 7nm chips. Even so, the most cutting edge companies in China have long been used to buying their chips abroad, whether that be Intel chips for servers or contracting with TSMC for everything else.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">The Trump administration took square aim at both vectors: in the case of the latter all American chip companies and companies that relied on American technology — which is to say, all of them, including TSMC — were barred from selling to Huawei, effectively killing the company’s smartphone business and severely damaging its telecom business. SMIC, meanwhile, has been barred from acquiring ASML’s cutting-edge extreme ultroviolet (EUV) lithography machines, which are essential for building 7nm and below chips cost-effectively.</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1747" instrument_node="">What is notable in terms of this conflict is that China has given every appearance of supporting Russia (although the country, like India, abstained from </span><a data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/world/un-general-assembly-set-censure-russia-over-ukraine-invasion-2022-03-02/"><span data-dcnode-id="1746" instrument_node="">the United Nations motion</span></a><span data-dcnode-id="1744" instrument_node=""> to condemn Russia’s invasion). The big question in terms of Russian sanctions is just how far this support will go: on the one hand, working with Russia </span><a data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/why-chinas-banks-wont-come-to-russias-rescue-11646389803"><span data-dcnode-id="1743" instrument_node="">risks sanctions in the West</span></a><span data-dcnode-id="1741" instrument_node="">, which is a much larger market for China; this is a big deterrent for SMIC, which has a big opportunity to undercut TSMC in price on trailing edge nodes. Seizing that opportunity means sanctioning Russia; from </span><a data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2022-03-01/u-s-expects-chinese-tech-firms-to-help-choke-off-russia-supply"><span data-dcnode-id="1740" instrument_node="">Bloomberg</span></a><span data-dcnode-id="1738" instrument_node="">:</span></p><span data-dcnode-id="1736" instrument_node="">
</span><blockquote data-dcnode-id="1730"><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">
  Washington is expected to lean on major Chinese companies from Semiconductor Manufacturing International Corp. to Lenovo Group Ltd. to join U.S.-led sanctions against Russia, aiming to cripple the country’s ability to buy key technologies and components. China is Russia’s biggest supplier of electronics, accounting for a third of its semiconductor imports and more than half of its computers and smartphones. Beijing has opposed the increasingly severe measures that the U.S. has taken to restrict Russia’s trade and economy in response to its invasion of Ukraine, however U.S. officials expect tech suppliers such as SMIC to uphold the new rules and curtail trade of sensitive technology with American origin, especially as it relates to Russia’s defense sector.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">  Any items produced with certain U.S. inputs, including American software and designs, are subject to the ban, even if they are made overseas, a U.S. official told Bloomberg News on Monday. Companies that attempt to evade these new controls would face the prospect of themselves being cut off from U.S.-origin technology and corporate executives risk going to jail for violations…Beijing has made self-sufficiency in the semiconductor sector a national priority, but for now its tech companies still rely heavily on U.S. designs and technology. SMIC continues to use chipmaking equipment from American vendors including Applied Materials Inc. even after it got blacklisted by the U.S. in 2020. If the company fails to comply with U.S. sanctions, it could face tightening of restrictions that may make it more difficult or impossible to secure licenses for repair parts and new equipment.
</span></p></blockquote><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1728" instrument_node="">China, though, may be tempted by the prospect of resource-rich Russia being dependent on Beijing for a functioning economy, as well as the longer-term project of building economic and technical systems that are independent of the West. That could entail pushing SMIC to send chips to Russia in defiance of Western sanctions, with the thought being that short-term pain is worth the long-term gain. The risks of this approach are huge though: even if SMIC can’t get EUV, it can still get pretty far with deep ultraviolet (DUV), but </span><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/u-s-to-bar-investment-in-chinese-ai-giant-considers-banning-key-exports-to-top-chip-maker-11639092799"><span data-dcnode-id="1727" instrument_node="">the Biden administration is already pushing</span></a><span data-dcnode-id="1725" instrument_node=""> to cut China off from any more of those machines as well:</span></p><span data-dcnode-id="1723" instrument_node="">
</span><blockquote data-dcnode-id="1717"><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">
  The chip maker, SMIC, a year ago had been added to the entity list, which restricts companies from exporting U.S.-origin technology without a license. That, however, has proven ineffective in keeping many manufacturing tools used to make semiconductors out of SMIC’s hands, the people familiar said. Under the current designation, SMIC is restricted from buying U.S. tools “uniquely required” to build chips with 10-nanometer circuits and smaller, which is close to the leading edge of semiconductor manufacturing technology. Since many manufacturing tools can be used to produce chips at a variety of sizes, exporters took the view that they were still able to sell tools that could be adjusted to produce the smaller chips and the restriction “became effectively language that means nothing,” one of the people said…</span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">  The Defense Department, with the support of officials at the State and Energy Departments, as well as the National Security Council, wants to change the wording to restrict SMIC’s access to items “capable of” producing semiconductors with 14-nanometer circuits and smaller, the people familiar said, broadening the list of items SMIC won’t be able to get.
</span></p></blockquote><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">This is context for what may be the single biggest strategic question confronting the Biden administration:</span></p><span data-dcnode-id="1713" instrument_node="">
</span><ul data-dcnode-id="1705"><span data-dcnode-id="1712" instrument_node="">
</span><li data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">The U.S. has already damaged Huawei and constrained SMIC’s long-term prospects on the cutting edge, and there is a credible threat that the U.S. could further damage SMIC’s current capabilities.</span></li><span data-dcnode-id="1709" instrument_node="">
</span><li data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">The U.S. doesn’t simply want SMIC to not sell to Russia, it also wants broader support from China for sanctions against Russia, particularly since China almost certainly has more influence over Russian President Vladimir Putin than any other country.</span></li><span data-dcnode-id="1706" instrument_node="">
</span></ul><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">The strategic choice is this:</span></p><span data-dcnode-id="1701" instrument_node="">
</span><ul data-dcnode-id="1693"><span data-dcnode-id="1700" instrument_node="">
</span><li data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">The U.S. could relax sanctions on SMIC and address China’s broader semiconductor needs in exchange for cooperation on Russia, at the medium-term risk of increasing China’s technological capability (albeit with the upside of helping U.S. firms that undergird much of the semiconductor industry).</span></li><span data-dcnode-id="1697" instrument_node="">
</span><li data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Alternatively, the U.S. could simply pressure China to not sell to Russia, or even ratchet up pressure on SMIC, at the short-term risk of China taking a hit to its technological industry in exchange for supporting Russia and building an alternative to the U.S.-dominated world order.</span></li><span data-dcnode-id="1694" instrument_node="">
</span></ul><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">This is not an easy question, particularly in the heat of the current moment. China, not Russia, is the U.S.’s long-term strategic rival; more than that, though, is another long-term issue that very much has a semiconductor component: Taiwan.</span></p><span data-dcnode-id="1689" instrument_node="">
</span><h4 data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">Taiwan and Deterrence</span></h4><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">While China has framed its refusal to condemn Russia mostly in terms of NATO expansion, it’s not hard to draw the obvious parallel to Taiwan: given that Beijing sees Taiwan as a part of China that it has the right to take back, by military means if necessary, it’s understandable why China might view Russian rhetoric about Ukraine’s historical ties to Russia with sympathy; given this, it’s possible that China is going to support Russia no matter what. Moreover, this also raises questions about the wisdom of enhancing China’s technological capabilities with American-derived technology, given the high likelihood that said enhancement will go towards increased military capabilities.</span></p><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1678"><span data-dcnode-id="1682" instrument_node="">At the same time, cutting China off from TSMC has brought its own risks; I wrote in the context of Huawei </span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/taiwan-and-techs-geopolitical-realities-arm-on-mac-tsmcs-choice/"><span data-dcnode-id="1681" instrument_node="">in 2020</span></a><span data-dcnode-id="1679" instrument_node="">:</span></p><span data-dcnode-id="1677" instrument_node="">
</span><blockquote data-dcnode-id="1664"><p data-dcnode-id="1672"><span data-dcnode-id="1676" instrument_node="">
  Should the United States and China ever actually go to war, it would likely be because of Taiwan. In this TSMC specifically, and the Taiwan manufacturing base generally, are a significant deterrent: both China and the U.S. need access to the best chip maker in the world, along with a host of other high-precision pieces of the global electronics supply chain. That means that a hot war, which would almost certainly result in some amount of destruction to these capabilities, would, </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/trump-and-chip-makers-including-intel-seek-semiconductor-self-sufficiency-11589103002"><span data-dcnode-id="1675" instrument_node="">as the Wall Street Journal notes</span></a><span data-dcnode-id="1673" instrument_node="">, be devastating:</span></p><span data-dcnode-id="1671" instrument_node="">
</span><blockquote data-dcnode-id="1668"><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">
    Taiwan, China and South Korea “represent a triad of dependency for the entire U.S. digital economy,” said an influential 2019 Pentagon report on national-security considerations regarding the supply chain for microelectronics. “Taiwan, in particular, represents a single point-of-failure for most of the United States’ largest, most important technology companies,” said the report, written by Rick Switzer, who served as a senior foreign-policy adviser to an Air Force unit. He concluded that the U.S. needs to strengthen its industrial policies to address the situation.
  </span></p></blockquote><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">  It’s the same for China, as I noted in that Daily Update about Huawei; one of the risks of cutting China off from TSMC is that the deterrent value of TSMC’s operations is diminished. At the same time, though, Taiwan — and South Korea, for that matter, where Samsung’s most advanced fabs are located — are a whole lot closer to China than they are to the U.S., and the location of land masses is not changing, at least on a time scale that is significant to this discussion!
</span></p></blockquote><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">This point applies to semiconductors broadly: as long as China needs U.S. technology or TSMC manufacturing, it is heavily incentivized to not take action against Taiwan; when and if China develops its own technology, whether now or many years from now, that deterrence is no longer a factor. In other words, the short-term and longer-term are in opposition to the medium-term:</span></p><span data-dcnode-id="1660" instrument_node="">
</span><ul data-dcnode-id="1649"><span data-dcnode-id="1659" instrument_node="">
</span><li data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">The short-term upside of relaxing sanctions against China in semiconductors in exchange for supporting sanctions against Russia is a potentially earlier end to the conflict in Ukraine.</span></li><span data-dcnode-id="1656" instrument_node="">
</span><li data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">The medium-term risk of giving China access to Western technology is that China develops more advanced products that could be used by its military.</span></li><span data-dcnode-id="1653" instrument_node="">
</span><li data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">The long-term risk of cutting China off is the development of an alternative to the West that is completely unconstrained by sanctions, public or private.</span></li><span data-dcnode-id="1650" instrument_node="">
</span></ul><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">There is no obvious answer, and it’s worth noting that the historical pattern — i.e. the Cold War — is a complete separation of trade and technology. That is one possible path, that we may fall into by default. It’s worth remembering, though, that dividers in the street are no way to live, and while most U.S. tech companies have flexed their capabilities, the most impressive tech of all is attractive enough and irreplaceable enough that it could still create dependencies that lead to squabbles but not another war.</span></p><span data-dcnode-id="1645" instrument_node="">
</span><h4 data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Tech Power</span></h4><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1641" instrument_node="">The most powerful takeaway from the past ten days, though, at least from a tech perspective, is related to the nuclear question. To return to India, from the </span><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nuclearweaponarchive.org/India/IndiaMomentum.html"><span data-dcnode-id="1640" instrument_node="">Nuclear Weapons Archive</span></a><span data-dcnode-id="1638" instrument_node="">:</span></p><span data-dcnode-id="1636" instrument_node="">
</span><blockquote data-dcnode-id="1633"><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">
  A most telling (and often quoted) exchange between [India Prime Minister Inder Kumar] Gujral and Pres. Clinton occurred on 22 September 1997 at the occasion of the U.N. General Assembly session in New York. Gujral later recounted telling Clinton that an old Indian saying holds that Indians have a third eye. “I told President Clinton that when my third eye looks at the door of the Security Council chamber it sees a little sign that says ‘only those with economic power or nuclear weapons allowed.’ I said to him, ‘it is very difficult to achieve economic wealth’.”
</span></p></blockquote><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">The implication is that nuclear capability was a more attainable route to great nation status than was economic dominance; what, then, to make of an industry that can, via private sanction, destroy economic wealth above and beyond government action? The capability wielded by the tech industry is incredible; it is easy to cheer when it is being used in the service of intentions that are so clearly good. It’s equally easy to understand how much fear that capability may generate in the long run.</span></p><span data-dcnode-id="1629" instrument_node="">
</span></div><span data-dcnode-id="1626" instrument_node="">
</span></article><span data-dcnode-id="1623" instrument_node="">
</span><article class="post-8541 post type-post status-publish format-standard has-post-thumbnail hentry category-articles topics-app-stores topics-app-tracking-transparency-att topics-covid19 topics-google-play-store topics-industries topics-apple-app-store topics-logistics topics-payments topics-shop-pay concepts-advertising concepts-business-models concepts-change concepts-platforms concepts-strategy companies-amazon companies-apple companies-facebook companies-meta companies-shopify" data-dcnode-id="1117" id="post-8541"><span data-dcnode-id="1622" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1596"><span data-dcnode-id="1621" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1618"><a data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/shopifys-evolution/" rel="bookmark"><span data-dcnode-id="1620" instrument_node="">Shopify’s Evolution</span></a></h1><span data-dcnode-id="1617" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="1599"><span data-dcnode-id="1616" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1609"><span class="screen-reader-text" data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Posted on</span></span><time class="entry-date published" data-dcnode-id="1612" datetime="2022-02-22T07:58:40-08:00"><span data-dcnode-id="1613" instrument_node="">Tuesday, February 22, 2022</span></time><time class="updated" data-dcnode-id="1610" datetime="2022-02-25T06:02:09-08:00"><span data-dcnode-id="1611" instrument_node="">Friday, February 25, 2022</span></time></span><span data-dcnode-id="1608" instrument_node=""> </span><span class="byline" data-dcnode-id="1601"><span class="author vcard" data-dcnode-id="1602"><span class="screen-reader-text" data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Author</span></span><span data-dcnode-id="1605" instrument_node=""> by </span><a class="url fn n" data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/author/stratechery/"><span data-dcnode-id="1604" instrument_node="">Ben Thompson</span></a></span></span><span data-dcnode-id="1600" instrument_node=""> </span></div><span data-dcnode-id="1597" instrument_node="">
</span></header><span data-dcnode-id="1594" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1120"><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Tobi Lütke, who famously started Shopify when he realized that the software he built to run his snowboard shop was a much bigger opportunity than the shop itself, was reminiscing on Twitter about how cheap it used to be to run digital advertising:</span></p><span data-dcnode-id="1590" instrument_node="">
</span><div align="center" data-dcnode-id="1575"><span data-dcnode-id="1589" instrument_node="">
</span><blockquote class="twitter-tweet" data-dcnode-id="1580" data-dnt="true"><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586" dir="ltr" lang="en"><span data-dcnode-id="1587" instrument_node="">fun story: I had no one bidding against me on major ski resorts names with my snowboard ads in 2004. Turns out minimum bid for google ad is 0.20c. I bet if you would roll your face on a keyboard as keyword there would be 3 others bidding against you today.</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1584" instrument_node="">— tobi lutke (@tobi) </span><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/tobi/status/1494160021252358144%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="1583" instrument_node="">February 17, 2022</span></a></p></blockquote><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1578" instrument_node=""> </span></p></div><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">This isn’t just a fun story: it’s a critical insight into the conditions that enabled Shopify to become the company that it is today; understanding how those conditions have changed give insight into what Shopify needs to become.</span></p><span data-dcnode-id="1571" instrument_node="">
</span><h4 data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Shopify’s Evolution</span></h4><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Back in 2004 a lot of the pieces that were necessary to run an e-commerce site existed, albeit in rudimentary and hard-to-use forms. One could, with a bit of trouble, open a merchant account and accept credit cards; 3PL warehouses could hold inventory; UPS and Fedex could deliver your goods. And, of course, you could run really cheap ads on Google. What was missing was software to tie all of those pieces together, which is exactly what Lütke built for Snowdevil, his snowboard shop, and in 2006 opened up to other merchants; the software’s name was called Shopify:</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><img alt="Shopify started as the center of multiple third party services" class="aligncenter size-large wp-image-8547" data-dcnode-id="1564" data-recalc-dims="1" height="381" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-4.png%3Fresize%3D640%252C381%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-4.png?resize=1024%2C610&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-4.png?resize=300%2C179&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-4.png?resize=768%2C457&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-4.png?resize=1058%2C630&amp;ssl=1 1058w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-4.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1561" instrument_node="">This idea of Shopify as the hub for an e-commerce shop is one that has persisted to this day, but over the ensuing years Shopify has added on platform components as well; a platform looks like this (from </span><a data-dcnode-id="1559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2018/the-bill-gates-line/"><span data-dcnode-id="1560" instrument_node="">The Bill Gates Line</span></a><span data-dcnode-id="1558" instrument_node="">):</span></p><span data-dcnode-id="1556" instrument_node="">
</span><blockquote data-dcnode-id="1550"><p data-dcnode-id="1551"><span data-dcnode-id="1555" instrument_node="">
</span><a data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2018/the-bill-gates-line/"><img alt="A drawing of Platform Businesses Attract Customers by Third Parties" class="aligncenter size-large wp-image-3468" data-dcnode-id="1554" data-recalc-dims="1" height="345" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2018/05/Paper.stratechery-Year-One.349.png%3Fresize%3D640%252C345%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2018/05/Paper.stratechery-Year-One.349.png?resize=1024%2C552&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2018/05/Paper.stratechery-Year-One.349.png?resize=300%2C162&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2018/05/Paper.stratechery-Year-One.349.png?resize=768%2C414&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2018/05/Paper.stratechery-Year-One.349.png?resize=1168%2C630&amp;ssl=1 1168w, https://i0.wp.com/stratechery.com/wp-content/uploads/2018/05/Paper.stratechery-Year-One.349.png?w=1280&amp;ssl=1 1280w, https://i0.wp.com/stratechery.com/wp-content/uploads/2018/05/Paper.stratechery-Year-One.349.png?w=1920&amp;ssl=1 1920w" width="640"></a><span data-dcnode-id="1552" instrument_node="">
</span></p></blockquote><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1548" instrument_node="">The first platform was the Shopify App Store, launched in 2009, where developers could access the Shopify API and create new plugins to deliver specific functionality that merchants might need. For example, if you want to offer a product on a subscription basis you might install </span><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.shopify.com/subscription-payments"><span data-dcnode-id="1547" instrument_node="">Recharge Subscriptions</span></a><span data-dcnode-id="1545" instrument_node="">; if you want help managing your shipments you might install </span><a data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.shopify.com/shipstation"><span data-dcnode-id="1544" instrument_node="">ShipStation</span></a><span data-dcnode-id="1542" instrument_node="">. Shopify itself delivers additional functionality through the Shopify App Store, like its </span><a data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apps.shopify.com/facebook"><span data-dcnode-id="1541" instrument_node="">Facebook Channel</span></a><span data-dcnode-id="1539" instrument_node=""> plugin, which lets you easily sync your products to Facebook to easily manage your advertising.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">A year later Shopify launched the Shopify Theme Store, where merchants could buy a professional theme to make their site their own; now the hub looked like this:</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1532"><img alt="Shopify added two platforms for apps and themes" class="aligncenter size-large wp-image-8546" data-dcnode-id="1533" data-recalc-dims="1" height="341" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-3.png%3Fresize%3D640%252C341%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-3.png?resize=1024%2C545&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-3.png?resize=300%2C160&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-3.png?resize=768%2C409&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-3.png?resize=1184%2C630&amp;ssl=1 1184w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-3.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">At the same time Shopify also vertically integrated to incorporate features it once left to partners; the most important of these integrations was Shopify Payments, which launched in 2013 and was rebranded as Shop Pay in 2020. Yes, you could still use a clunky merchant account, but it was far easier to simply use the built-in Shop Pay functionality. Shop Pay was also critical in that it was the first part of the Shopify stack to build a consumer brand: users presented with a myriad of payment options know that if they click the purple Shop Pay button all of their payment and delivery information will be pre-populated, making it possible to buy with just one additional tap.</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526"><img alt="Shopify integrated into payments with Shop Pay" class="aligncenter size-large wp-image-8548" data-dcnode-id="1527" data-recalc-dims="1" height="336" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-5.png%3Fresize%3D640%252C336%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-5.png?resize=1024%2C538&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-5.png?resize=300%2C158&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-5.png?resize=768%2C404&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-5.png?resize=1198%2C630&amp;ssl=1 1198w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-5.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1524" instrument_node="">Even with this toehold in the consumer space, though, Shopify has remained a company that is focused first-and-foremost on its merchants and </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shopify.com/about"><span data-dcnode-id="1523" instrument_node="">its mission</span></a><span data-dcnode-id="1521" instrument_node=""> to “help people achieve independence by making it easier to start, run, and grow a business.” That independence doesn’t just mean one-person entrepreneurs either: good-size brands like Gymshark, Rebecca Minkoff, KKW Beauty, Kylie Cosmetics, and FIGS leverage Shopify to build brands that are independent of Amazon in particular.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><h4 data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Apple and Facebook</span></h4><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1515" instrument_node="">In 2020’s </span><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/apple-and-facebook/"><span data-dcnode-id="1514" instrument_node="">Apple and Facebook</span></a><span data-dcnode-id="1512" instrument_node=""> I explained the symbiotic relationship between the two companies when it came to the App Store:</span></p><span data-dcnode-id="1510" instrument_node="">
</span><blockquote data-dcnode-id="1488"><p data-dcnode-id="1505"><span data-dcnode-id="1509" instrument_node="">
  Facebook’s early stumbles on mobile are well-documented:&nbsp;</span><a data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//web.archive.org/web/20130414025919/http%3A//money.cnn.com/2013/04/11/technology/facebook-zuckerberg-home.pr.fortune/"><span data-dcnode-id="1508" instrument_node="">the company bet on web-based apps</span></a><span data-dcnode-id="1506" instrument_node="">&nbsp;that just didn’t work very well; the company completely rewrote its iOS app even as it was going public, which meant it had a stagnating app at the exact time mobile was exploding, threatening the desktop advertising product and platform that were the basis of the company’s S-1.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1503" instrument_node="">  The re-write turned out to be not just a company-saving move — the native mobile app had the exact same user-facing features as the web-centric one, with the rather important detail that it actually worked — but in fact an industry-transformational one: one of the first new products enabled by the company’s new app were app install ads.&nbsp;</span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//techcrunch.com/2012/10/17/facebook-mobile-app-install-ads/"><span data-dcnode-id="1502" instrument_node="">From TechCrunch in 2012</span></a><span data-dcnode-id="1500" instrument_node="">:</span></p><span data-dcnode-id="1498" instrument_node="">
</span><blockquote data-dcnode-id="1492"><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">
    Facebook is making a big bet on the app economy, and wants to be the top source of discovery outside of the app stores. The mobile app install ads let developers buy tiles that promote their apps in the Facebook mobile news feed. When tapped, these instantly open the Apple App Store or Google Play market where users can download apps.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">    The ads are working already. One client TinyCo saw a 50% higher click through rate and higher conversion rates compared to other install channels. Facebook’s ads also brought in more engaged users. Ads tech startup Nanigans clients attained 8-10X more reach than traditional mobile ad buys when it purchased Facebook mobile app install ads. AdParlor racked up a consistent 1-2% click through rate.
  </span></p></blockquote><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">  Facebook’s App Install product quickly became the most important channel for acquiring users, particularly for games that monetized with Apple’s in-app purchase API: the combination of Facebook data with developer’s sophisticated understanding of expected value per app install led to an explosion in App Store revenue.&nbsp;
</span></p></blockquote><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">It’s worth underlining this point: the App Store would not be nearly the juggernaut it is today, nor would Apple’s “Services Narrative” be so compelling, were it not for the work that Facebook put in to build out the best customer acquisition engine in the industry (much to the company’s financial benefit, to be clear); Apple and Facebook’s relationship looked like this:</span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><img alt="Apple and Facebook's symbiotic relationship" class="aligncenter size-large wp-image-8550" data-dcnode-id="1483" data-recalc-dims="1" height="378" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-7.png%3Fresize%3D640%252C378%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-7.png?resize=1024%2C605&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-7.png?resize=300%2C177&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-7.png?resize=768%2C454&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-7.png?resize=1067%2C630&amp;ssl=1 1067w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-7.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Facebook was by far the best and most efficient way to acquire new users, while Apple was able to sit back and harvest 30% of the revenue earned from those new users. Yes, some number of users came in via the App Store, but the primary discovery mechanism in the App Store is search, which relies on a user knowing what they want; Facebook showed users apps they never knew existed.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><h4 data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Facebook and Shopify</span></h4><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Facebook plays a similar role for e-commerce, particularly the independent sellers that exist on Shopify:</span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1470"><img alt="Shopify's dependence on Facebook" class="aligncenter size-large wp-image-8545" data-dcnode-id="1471" data-recalc-dims="1" height="345" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-2.png%3Fresize%3D640%252C345%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-2.png?resize=1024%2C552&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-2.png?resize=300%2C162&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-2.png?resize=768%2C414&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-2.png?resize=1169%2C630&amp;ssl=1 1169w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/02/shopify-2.png?w=1280&amp;ssl=1 1280w" width="640"></p><span data-dcnode-id="1469" instrument_node="">
