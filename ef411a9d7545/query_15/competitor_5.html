553"><span data-dcnode-id="3554" instrument_node=""> restore all settings to the default values</span></span></button><button class="vjs-done-button" data-dcnode-id="3550" type="button"><span data-dcnode-id="3551" instrument_node="">Done</span></button></div></div><button aria-disabled="false" class="vjs-close-button vjs-control vjs-button" data-dcnode-id="3544" title="Close Modal Dialog" type="button"><span aria-hidden="true" class="vjs-icon-placeholder" data-dcnode-id="3547"></span><span aria-live="polite" class="vjs-control-text" data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">Close Modal Dialog</span></span></button><p class="vjs-control-text" data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">End of dialog window.</span></p></div><div data-dcnode-id="3532"><div aria-describedby="videopress-player-wFVSV4ya_component_592_description" aria-hidden="true" aria-label="Modal Window" class="vjs-modal-dialog vjs-hidden" data-dcnode-id="3533" role="dialog" tabindex="-1"><button aria-disabled="false" class="vjs-close-button vjs-control vjs-button" data-dcnode-id="3537" title="Close Modal Dialog" type="button"><span aria-hidden="true" class="vjs-icon-placeholder" data-dcnode-id="3540"></span><span aria-live="polite" class="vjs-control-text" data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">Close Modal Dialog</span></span></button><p class="vjs-modal-dialog-description vjs-control-text" data-dcnode-id="3535" id="videopress-player-wFVSV4ya_component_592_description"><span data-dcnode-id="3536" instrument_node="">This is a modal window. This modal can be closed by pressing the Escape key or activating the close button.</span></p><div class="vjs-modal-dialog-content" data-dcnode-id="3534" role="document"></div></div></div><div class="videopress-chapter-title-container" data-dcnode-id="3531"></div><div class="videopress-spinner videopress-spinner__waiting" data-dcnode-id="3530" style="width: 66px; height: 66px;"></div></ </span><p data-dcnode-id="3509"><span data-dcnode-id="3510" instrument_node="">While the video does mention a couple of DALL-E’s shortcomings, it is quite upbeat about the possibilities; some excerpts:</span></p><span data-dcnode-id="3508" instrument_node="">
</span><blockquote data-dcnode-id="3496"><p data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">
  Dall-E 2 is a new AI system from OpenAI that can take simple text descriptions like “A koala dunking a basketball” and turn them into photorealistic images that have never existed before. DALL-E 2 can also realistically edit and re-touch photos…</span></p><span data-dcnode-id="3505" instrument_node="">
</span><p data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">  DALL-E was created by training a neural network on images and their text descriptions. Through deep learning it not only understands individual objects like koala bears and motorcycles, but learns from relationships between objects, and when you ask DALL-E for an image of a “koala bear riding a motorcycle”, it knows how to create that or anything else with a relationship to another object or action.</span></p><span data-dcnode-id="3502" instrument_node="">
</span><p data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">  The DALL-E research has three main outcomes: first, it can help people express themselves visually in ways they may not have been able to before. Second, an AI-generated image can tell us a lot about whether the system understands us, or is just repeating what it’s been taught. Third, DALL-E helps humans understand how AI systems see and understand our world. This is a critical part of developing AI that’s useful and safe…</span></p><span data-dcnode-id="3499" instrument_node="">
</span><p data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">  What’s exciting about the approach used to train DALL-E is that it can take what it learned from a variety of other labeled images and then apply it to a new image. Given a picture of a monkey, DALL-E can infer what it would look like doing something it has never done before, like paying its taxes while wearing a funny hat. DALL-E is an example of how imaginative humans and clever systems can work together to make new things, amplifying our creative potential.
</span></p></blockquote><span data-dcnode-id="3495" instrument_node="">
</span><p data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">That last line may raise some eyebrows: at first glance DALL-E looks poised to compete with artists and illustrators; there is another point of view, though, where DALL-E points towards a major missing piece in a metaverse future.</span></p><span data-dcnode-id="3492" instrument_node="">
</span><h4 data-dcnode-id="3490"><span data-dcnode-id="3491" instrument_node="">Games and Medium Evolution</span></h4><span data-dcnode-id="3489" instrument_node="">
</span><p data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">Games have long been on the forefront of technological development, and that is certainly the case in terms of medium. The first computer games were little more than text:</span></p><span data-dcnode-id="3486" instrument_node="">
</span><p data-dcnode-id="3484"><img alt="A screenshot from Oregon Trail" class="aligncenter size-full wp-image-8804" data-dcnode-id="3485" data-recalc-dims="1" height="360" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-5.png%3Fresize%3D640%252C360%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-5.png?w=900&amp;ssl=1 900w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-5.png?resize=300%2C169&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-5.png?resize=768%2C432&amp;ssl=1 768w" width="640"></p><span data-dcnode-id="3483" instrument_node="">
</span><p data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">Images followed, usually of the bitmap variety; I remember playing a lot of “Where in the world is Carmen San Diego” at the library:</span></p><span data-dcnode-id="3480" instrument_node="">
</span><p data-dcnode-id="3478"><img alt="A screenshot from &quot;Where in the world is Carmen San Diego&quot;" class="aligncenter size-full wp-image-8805" data-dcnode-id="3479" data-recalc-dims="1" height="480" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-1.png%3Fresize%3D640%252C480%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-1.png?w=640&amp;ssl=1 640w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/04/dall-e-1.png?resize=300%2C225&amp;ssl=1 300w" width="640"></p><span data-dcnode-id="3477" instrument_node="">
</span><p data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">Soon games included motion as you navigated a sprite through a 2D world; 3D followed, and most of the last 25 years has been about making 3D games ever more realistic. Nearly all of those games, though, are 3D images on 2D screens; virtual reality offers the illusion of being inside the game itself.</span></p><span data-dcnode-id="3474" instrument_node="">
</span><p data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">Still, this evolution has had challenges: creating ever more realistic 3D games means creating ever more realistic image textures to decorate all of those polygons; this problem is only magnified in virtual reality. This is one of the reasons even open-world games are ultimately limited in scope, and gameplay is largely deterministic: it is through knowing where you are going, and all of your options to get there, that developers can create all of the assets necessary to deliver an immersive experience.</span></p><span data-dcnode-id="3471" instrument_node="">
</span><p data-dcnode-id="3466"><span data-dcnode-id="3470" instrument_node="">That’s not to say that games can’t have random elements, above and beyond </span><a data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roguelike"><span data-dcnode-id="3469" instrument_node="">roguelike</span></a><span data-dcnode-id="3467" instrument_node=""> games that are procedurally generated: the most obvious way to deliver an element of unpredictability is for humans to play each other, albeit in well-defined and controlled environments.</span></p><span data-dcnode-id="3465" instrument_node="">
</span><h4 data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">Social and User-Generated Content</span></h4><span data-dcnode-id="3462" instrument_node="">
</span><p data-dcnode-id="3460"><span data-dcnode-id="3461" instrument_node="">Social networking has undergone a similar medium evolution as games, with a two-decade delay. The earliest forms of social networking on the web were text-based bulletin boards and USENET groups; then came widespread e-mail, AOL chatrooms, and forums. Facebook arrived on the scene in the mid-2000s; one of the things that helped it explode in popularity was the addition of images. Instagram was an image-only social network that soon added video, which is all that TikTok is. And, over the last couple of years in particular, video conferencing through apps like Zoom or Facetime have delivered 3D images on 2D screens.</span></p><span data-dcnode-id="3459" instrument_node="">
</span><p data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">Still, medium has always mattered less for social networking, just because the social part of it was so inherently interesting. Humans like communicating with other humans, even if that requires dialing up a random BBS to download messages, composing a reply, and dialing back in to send it. Games may be mostly deterministic, but humans are full of surprises.</span></p><span data-dcnode-id="3456" instrument_node="">
</span><p data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">Moreover, this means that social networking is much cheaper: instead of the platform having to generate all of the content, users generate all of the content themselves. This makes it harder to get a new platform off of the ground, because you need users to attract users, but it also makes said platform far stickier than any game (or, to put it another way, the stickiest games have a network effect of their own).</span></p><span data-dcnode-id="3453" instrument_node="">
</span><h4 data-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">Feeds and Algorithms</span></h4><span data-dcnode-id="3450" instrument_node="">
</span><p data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">The first iterations of social networking had no particular algorithmic component other than time: newer posts were at the top (or bottom). That changed with Facebook’s introduction of the News Feed in 2006. Now instead of visiting all of your friends’ pages you could simply browse the feed, which from the very beginning made decisions about what content to include, and in what order.</span></p><span data-dcnode-id="3447" instrument_node="">
</span><p data-dcnode-id="3442"><span data-dcnode-id="3446" instrument_node="">Over time the News Feed evolved from a relatively straightforward algorithm to one driven by machine learning, with results so inscrutable that </span><a data-dcnode-id="3444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theverge.com/2022/3/31/23004326/facebook-news-feed-downranking-integrity-bug"><span data-dcnode-id="3445" instrument_node="">it took Facebook six months to fix a recent rankings bug</span></a><span data-dcnode-id="3443" instrument_node="">. The impact has been massive: not just Facebook but also Instagram saw huge increases in engagement and increased growth the better their algorithmically-driven feeds became; it was also great for monetization, as the same sort of signals that decided what content you saw also influenced what ads you were presented.</span></p><span data-dcnode-id="3441" instrument_node="">
</span><p data-dcnode-id="3436"><span data-dcnode-id="3440" instrument_node="">However, the reason why this discussion of algorithmically-driven feeds is in a different section than social networking is because the ultimate example of their power isn’t a social network at all: it’s TikTok. TikTok, of course, is all user-generated content, but the crucial distinction from Facebook is that you aren’t limited to content from your network: TikTok pulls in the videos it thinks you specifically are most interested in from across its entire network. I explained why this was a blindspot for Facebook </span><a data-dcnode-id="3438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/the-tiktok-war/"><span data-dcnode-id="3439" instrument_node="">in 2020</span></a><span data-dcnode-id="3437" instrument_node="">:</span></p><span data-dcnode-id="3435" instrument_node="">
</span><blockquote data-dcnode-id="3429"><p data-dcnode-id="3430"><span data-dcnode-id="3434" instrument_node="">
  What is interesting to point out is why it was inevitable that Facebook missed this: first, Facebook views itself first-and-foremost as a social network, so it is disinclined to see that as a liability. Second, that view was reinforced by the way in which Facebook took on Snapchat. The point of </span><a data-dcnode-id="3432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2016/the-audacity-of-copying-well/"><span data-dcnode-id="3433" instrument_node="">The Audacity of Copying Well</span></a><span data-dcnode-id="3431" instrument_node=""> is that Facebook leveraged Instagram’s social network to halt Snapchat’s growth, which only reinforced that the network was Facebook’s greatest asset, making the TikTok blindspot even larger.
</span></p></blockquote><span data-dcnode-id="3428" instrument_node="">
</span><p data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">TikTok combines the zero cost nature of user-generated content with a purely algorithmic feed that is divorced from your network; there is a network effect, in that TikTok needs lots of content to choose from, but it doesn’t need your specific network.</span></p><span data-dcnode-id="3425" instrument_node="">
</span><h4 data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">The Machine Learning Metaverse</span></h4><span data-dcnode-id="3422" instrument_node="">
</span><p data-dcnode-id="3408"><span data-dcnode-id="3421" instrument_node="">I get that </span><a data-dcnode-id="3419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/metaverses/"><span data-dcnode-id="3420" instrument_node="">metaverses</span></a><span data-dcnode-id="3418" instrument_node=""> were so 2021, but it strikes me that the examples from science fiction, including </span><em data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">Snow Crash</span></em><span data-dcnode-id="3415" instrument_node=""> and </span><em data-dcnode-id="3413"><span data-dcnode-id="3414" instrument_node="">Ready Player One</span></em><span data-dcnode-id="3412" instrument_node="">, were very game-like in their implementation. Their virtual worlds were created by visionary corporations or, in the case of the latter, a visionary developer who also included a deterministic game for ultimate ownership of the virtual world. Yes, third parties could and did build experiences with strong social components, most famously Da5id’s Black Sun club in </span><em data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">Snow Crash</span></em><span data-dcnode-id="3409" instrument_node="">, but the core mechanic — and the core economics — were closer to a multi-player game than anything else.</span></p><span data-dcnode-id="3407" instrument_node="">
</span><p data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">That, though, is exceptionally challenging in the real world: remember, creating games, particularly their art, is expensive, and the expense increases the more immersive the experience is. Social media, on the other hand, is cheap because it uses user-generated content, but that content is generally stuck on more basic mediums — text, pictures, and only recently video. Of course that content doesn’t necessarily need to be limited to your network — an algorithm can deliver anything on the network to any user.</span></p><span data-dcnode-id="3404" instrument_node="">
</span><p data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">What is fascinating about DALL-E is that it points to a future where these three trends can be combined. DALL-E, at the end of the day, is ultimately a product of human-generated content, just like its GPT-3 cousin. The latter, of course, is about text, while DALL-E is about images. Notice, though, that progression from text to images; it follows that machine learning-generated video is next. This will likely take several years, of course; video is a much more difficult problem, and responsive 3D environments more difficult yet, but this is a path the industry has trod before:</span></p><span data-dcnode-id="3401" instrument_node="">
</span><ul data-dcnode-id="3390"><span data-dcnode-id="3400" instrument_node="">
</span><li data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">Game developers pushed the limits on text, then images, then video, then 3D</span></li><span data-dcnode-id="3397" instrument_node="">
</span><li data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">Social media drives content creation costs to zero first on text, then images, then video</span></li><span data-dcnode-id="3394" instrument_node="">
</span><li data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">Machine learning models can now create text and images for zero marginal cost</span></li><span data-dcnode-id="3391" instrument_node="">
</span></ul><span data-dcnode-id="3389" instrument_node="">
</span><p data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">In the very long run this points to a metaverse vision that is much less deterministic than your typical video game, yet much richer than what is generated on social media. Imagine environments that are not drawn by artists but rather created by AI: this not only increases the possibilities, but crucially, decreases the costs.</span></p><span data-dcnode-id="3386" instrument_node="">
</span><h4 data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">Zero Marginal Content</span></h4><span data-dcnode-id="3383" instrument_node="">
</span><p data-dcnode-id="3378"><span data-dcnode-id="3382" instrument_node="">There is another way to think about DALL-E and GPT and similar machine learning models, and it goes back to my longstanding contention that the Internet is a transformational technology matched only by the printing press. What made the latter revolutionary was that it drastically reduced the marginal cost of consumption; from </span><a data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2019/the-internet-and-the-third-estate/"><span data-dcnode-id="3381" instrument_node="">The Internet and the Third Estate</span></a><span data-dcnode-id="3379" instrument_node="">:</span></p><span data-dcnode-id="3377" instrument_node="">
</span><blockquote data-dcnode-id="3371"><p data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">
  Meanwhile, the economics of printing books was fundamentally different from the economics of copying by hand. The latter was purely an operational expense: output was strictly determined by the input of labor. The former, though, was mostly a capital expense: first, to construct the printing press, and second, to set the type for a book. The best way to pay for these significant up-front expenses was to produce as many copies of a particular book that could be sold.</span></p><span data-dcnode-id="3374" instrument_node="">
</span><p data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">  How, then, to maximize the number of copies that could be sold? The answer was to print using the most widely used dialect of a particular language, which in turn incentivized people to adopt that dialect, standardizing languages across Europe. That, by extension, deepened the affinities between city-states with shared languages, particularly over decades as a shared culture developed around books and later newspapers. This consolidation occurred at varying rates — England and France several hundred years before Germany and Italy — but in nearly every case the First Estate became not the clergy of the Catholic Church but a national monarch, even as the monarch gave up power to a new kind of meritocratic nobility epitomized by Burke.
</span></p></blockquote><span data-dcnode-id="3370" instrument_node="">
</span><p data-dcnode-id="3365"><span data-dcnode-id="3369" instrument_node="">The Internet has had two effects: the first is to bring the marginal cost of consumption down to zero. Even with the printing press you still needed to print a physical object and distribute it, and that costs money; meanwhile it costs effectively nothing to send this post to anyone in the world who is interested. This has completely upended the publishing industry and </span><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2017/goodbye-gatekeepers/"><span data-dcnode-id="3368" instrument_node="">destroyed the power of gatekeepers</span></a><span data-dcnode-id="3366" instrument_node="">.</span></p><span data-dcnode-id="3364" instrument_node="">
</span><p data-dcnode-id="3359"><span data-dcnode-id="3363" instrument_node="">The other impact, though, has been on the production side; I wrote about TikTok in </span><a data-dcnode-id="3361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/mistakes-and-memes/"><span data-dcnode-id="3362" instrument_node="">Mistakes and Memes</span></a><span data-dcnode-id="3360" instrument_node="">:</span></p><span data-dcnode-id="3358" instrument_node="">
</span><blockquote data-dcnode-id="3352"><p data-dcnode-id="3353"><span data-dcnode-id="3357" instrument_node="">
  That phrase, “Facebook is compelling for the content it surfaces, regardless of who surfaces it”, is oh-so-close to describing TikTok; the error is that the latter is compelling for the content it surfaces, regardless of who </span><em data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">creates</span></em><span data-dcnode-id="3354" instrument_node=""> it…To put it another way, I was too focused on demand — the key to Aggregation Theory — and didn’t think deeply enough about the evolution of supply. User-generated content didn’t have to be simply pictures of pets and political rants from people in one’s network; it could be the foundation of a new kind of network, where the payoff from Metcalfe’s Law is not the number of connections available to any one node, but rather the number of inputs into a customized feed.
</span></p></blockquote><span data-dcnode-id="3351" instrument_node="">
</span><p data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">Machine learning generated content is just the next step beyond TikTok: instead of pulling content from anywhere on the network, GPT and DALL-E and other similar models generate new content from content, at zero marginal cost. This is how the economics of the metaverse will ultimately make sense: virtual worlds needs virtual content created at virtually zero cost, fully customizable to the individual.</span></p><span data-dcnode-id="3348" instrument_node="">
</span><p data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">Of course there are many other issues raised by DALL-E, many of them philosophical in nature; there has already been a lot of discussion of that over the last week, and there should be a lot more. Still, the economic implications matter as well, and after last week’s announcement the future of the Internet is closer, and weirder, than ever.</span></p><span data-dcnode-id="3345" instrument_node="">
</span></div><span data-dcnode-id="3342" instrument_node="">
</span></article><span data-dcnode-id="3339" instrument_node="">
</span><article class="post-8757 post type-post status-publish format-standard hentry category-articles topics-app-tracking-transparency-att topics-gaming topics-linear topics-mobile-gaming topics-streaming topics-video concepts-advertising concepts-bundling-and-unbundling concepts-business-models concepts-customer-acquisition concepts-differentiation concepts-incentives concepts-making-money concepts-product-management concepts-subscriptions companies-netflix" data-dcnode-id="3145" id="post-8757"><span data-dcnode-id="3338" instrument_node="">
</span><header class="entry-header" data-dcnode-id="3312"><span data-dcnode-id="3337" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="3334"><a data-dcnode-id="3335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/why-netflix-should-sell-ads/" rel="bookmark"><span data-dcnode-id="3336" instrument_node="">Why Netflix Should Sell Ads</span></a></h1><span data-dcnode-id="3333" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="3315"><span data-dcnode-id="3332" instrument_node="">
</span><span class="posted-on" data-dcnode-id="3325"><span class="screen-reader-text" data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">Posted on</span></span><time class="entry-date published" data-dcnode-id="3328" datetime="2022-04-04T07:26:44-07:00"><span data-dcnode-id="3329" instrument_node="">Monday, April 4, 2022</span></time><time class="updated" data-dcnode-id="3326" datetime="2022-04-10T22:07:34-07:00"><span data-dcnode-id="3327" instrument_node="">Sunday, April 10, 2022</span></time></span><span data-dcnode-id="3324" instrument_node=""> </span><span class="byline" data-dcnode-id="3317"><span class="author vcard" data-dcnode-id="3318"><span class="screen-reader-text" data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">Author</span></span><span data-dcnode-id="3321" instrument_node=""> by </span><a class="url fn n" data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/author/stratechery/"><span data-dcnode-id="3320" instrument_node="">Ben Thompson</span></a></span></span><span data-dcnode-id="3316" instrument_node=""> </span></div><span data-dcnode-id="3313" instrument_node="">
</span></header><span data-dcnode-id="3310" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3148"><span data-dcnode-id="3309" instrument_node="">
</span><p data-dcnode-id="3304"><span data-dcnode-id="3308" instrument_node="">The Information </span><a data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theinformation.com/articles/netflix-tells-employees-to-be-more-careful-about-spending-hiring%3Frc%3Dgtxu6q"><span data-dcnode-id="3307" instrument_node="">reported over the weekend</span></a><span data-dcnode-id="3305" instrument_node=""> that Netflix executives have told employees to keep an eye on the bottom line:</span></p><span data-dcnode-id="3303" instrument_node="">
</span><blockquote data-dcnode-id="3297"><p data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">
  In two separate meetings over the past few weeks, Netflix executives cautioned employees to be more mindful about spending and hiring, according to three people familiar with the discussions. The comments, made at an employee town hall on Monday as well as during a management offsite held last month in Anaheim, Calif., come as the streaming giant grapples with sharply slowing subscriber growth…</span></p><span data-dcnode-id="3300" instrument_node="">
</span><p data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">  Netflix has also been pondering steps that could help offset the revenue impact of the subscriber slowdown, including cracking down on people sharing the passwords to their accounts. While Netflix has long allowed such password sharing, it has become more common in the U.S. and other parts of the world than executives anticipated, the people said. This effort has been underway for about a year, however, well before the slowdown became apparent.
</span></p></blockquote><span data-dcnode-id="3296" instrument_node="">
</span><p data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">These are presented as two different issues, but there is a connection between them: Netflix should be hiring more people — a lot of them — and those people should be building a product that increases subscriber numbers and revenue. That product is advertising.</span></p><span data-dcnode-id="3293" instrument_node="">
</span><h4 data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">Netflix’s Business Model: Subscriptions</span></h4><span data-dcnode-id="3290" instrument_node="">
</span><p data-dcnode-id="3288"><span data-dcnode-id="3289" instrument_node="">Netflix is, incredibly enough, 24 years old, and a subscription model has served the company well. Not that Netflix had much choice when it started: the company briefly sold DVDs online, before focusing exclusively on renting them; neither approach offered much surface area for advertising, and besides, the subscription model was revolutionary in its own right.</span></p><span data-dcnode-id="3287" instrument_node="">
</span><p data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">DVDs-by-mail was, from a certain perspective, inconvenient: you couldn’t simply drive to your local Blockbuster and peruse the selection; on the other hand, Netflix’s model gave you access to nearly every movie ever released, not just those in stock at your local store. The real innovation, though, was that business model: instead of paying to rent a DVD and being gouged with late fees, you could pay a set amount each month and keep the DVDs Netflix mailed to you as long as you wanted; send one back to get the next one in your queue.</span></p><span data-dcnode-id="3284" instrument_node="">
</span><p data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">Consumers loved it, and Netflix has stuck with the model even as the shift to streaming flipped their value proposition on its head: streaming is even more convenient than hopping in your car, but only a subset of content (ever-expanding, to be sure) is on Netflix. That has been more than enough to fuel Netflix’s growth; the service had 222 million subscribers at the end of 2021.</span></p><span data-dcnode-id="3281" instrument_node="">
</span><p data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">Still, as The Information noted, that number isn’t increasing as quickly as it used to. Netflix sported over 20% year-over-year subscriber growth for years (usually more than that), but hasn’t broken the 20% mark since Q4 2020; growth for the last three quarters was in the single digits. Some of that is likely due to growth that was pulled forward by the pandemic:</span></p><span data-dcnode-id="3278" instrument_node="">
</span><p data-dcnode-id="3275"><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s22.q4cdn.com/959853165/files/doc_financials/2021/q4/FINAL-Q4-21-Shareholder-Letter.pdf"><img alt="Netflix subscriber additions by year" class="aligncenter size-large wp-image-8365" data-dcnode-id="3277" data-recalc-dims="1" height="352" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2022/01/netflix-1.png%3Fresize%3D640%252C352%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2022/01/netflix-1.png?resize=1024%2C563&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/01/netflix-1.png?resize=300%2C165&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/01/netflix-1.png?resize=768%2C422&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/01/netflix-1.png?resize=1145%2C630&amp;ssl=1 1145w, https://i0.wp.com/stratechery.com/wp-content/uploads/2022/01/netflix-1.png?w=1280&amp;ssl=1 1280w" width="640"></a></p><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3269"><span data-dcnode-id="3273" instrument_node="">The bigger problem, though, is saturation: Netflix has 75 million subscribers in the US and Canada, where there are around 132 million households. That is nearly as many subscribers as linear TV (84 million), and once you consider shared passwords, penetration may be higher. Other markets like India have more room to grow, but much lower household incomes, and </span><a data-dcnode-id="3271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2022-03-30/netflix-movies-shows-struggle-to-attract-india-subscribers"><span data-dcnode-id="3272" instrument_node="">Netflix’s relatively high prices have been an obstacle</span></a><span data-dcnode-id="3270" instrument_node="">.</span></p><span data-dcnode-id="3268" instrument_node="">
</span><p data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">Netflix has ways to grow other than subscribers, most obviously by raising prices. The company has done just that on a mostly annual basis for eight years: in the U.S. the price of a Standard subscription (HD, 2 screens) has increased from $7.99 to $15.49. Netflix executives argue that customers don’t mind because Netflix keeps increasing the amount of content they find compelling; it’s an argument that is easier to accept when subscriber growth is up-and-to-the-right. Now the task is to keep raising prices while ensuring subscriber numbers don’t start going in the opposite direction.</span></p><span data-dcnode-id="3265" instrument_node="">
</span><h4 data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">Netflix’s New Initiative: Gaming</span></h4><span data-dcnode-id="3262" instrument_node="">
</span><p data-dcnode-id="3257"><span data-dcnode-id="3261" instrument_node="">To accomplish this Netflix is not only continuing to invest in original programming, but also branching out into new kinds of content, including games. This may seem an odd idea at first: sure, Netflix is generating some new IP, but it would generally be much easier to license that IP than to become proficient at gaming. Netflix, though, believes it has a unique advantage when it comes to gaming: its business model. Chief Product Officer Greg Peters said in the company’s Q2 2021 </span><a data-dcnode-id="3259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s22.q4cdn.com/959853165/files/doc_financials/2021/q2/Netflix%2C-Inc.%2C-Q2-2021-Pre-Recorded-Earnings-Call%2C-Jul-20%2C-2021.pdf"><span data-dcnode-id="3260" instrument_node="">earnings interview</span></a><span data-dcnode-id="3258" instrument_node="">:</span></p><span data-dcnode-id="3256" instrument_node="">
</span><blockquote data-dcnode-id="3253"><p data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">
  Our subscription model yields some opportunities to focus on a set of game experiences that are currently underserved by the sort of dominant monetization models and games. We don’t have to think about ads. We don’t have to think about in-game purchases or other monetization. We don’t have to think about per-title purchases. Really, we can do what we’ve been doing on the movie and series side, which is just hyper laser-focused on delivering the most entertaining game experiences that we can. So we’re finding that many game developers really like that concept and that focus and this idea of being able to put all of their creative energy into just great gameplay and not having to worry about those other considerations that they have typically had to trade off with just making compelling games.
</span></p></blockquote><span data-dcnode-id="3252" instrument_node="">
</span><p data-dcnode-id="3244"><span data-dcnode-id="3251" instrument_node="">Netflix’s gaming efforts to date have been fairly limited; the company </span><a data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//about.netflix.com/en/news/let-the-games-begin-a-new-way-to-experience-entertainment-on-mobile"><span data-dcnode-id="3250" instrument_node="">launched with five titles in November</span></a><span data-dcnode-id="3248" instrument_node="">, but the fact the company has </span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/03/24/business/netflix-game-studio.html"><span data-dcnode-id="3247" instrument_node="">bought three gaming studios</span></a><span data-dcnode-id="3245" instrument_node=""> suggests a strong appetite for more — at least amongst Netflix executives.</span></p><span data-dcnode-id="3243" instrument_node="">
</span><p data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">But what about consumers?</span></p><span data-dcnode-id="3240" instrument_node="">
</span><h4 data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">Netflix’s Job: TV</span></h4><span data-dcnode-id="3237" instrument_node="">
</span><p data-dcnode-id="3232"><span data-dcnode-id="3236" instrument_node="">Consumers don’t care so much about business models; they have jobs that they want to get done, and the traditional cable bundle used to do a whole bunch of jobs: information gathering, education, sports, story-telling, escapism, background noise, and more. As I noted in </span><a data-dcnode-id="3234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2017/the-great-unbundling/"><span data-dcnode-id="3235" instrument_node="">The Great Unbundling</span></a><span data-dcnode-id="3233" instrument_node="">, these jobs are increasingly done by completely different services: we get news on the Internet, education from YouTube, story-telling from streaming services, etc.</span></p><span data-dcnode-id="3231" instrument_node="">
</span><p data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Netflix is obviously one of those streaming services, but the company is also investing in movies (escapism), and is increasingly the default choice when it comes to the under-appreciated “background noise” category: the service has oceans of low-brow content ready to be streamed while you are barely paying attention. This is a big reason why for many people their choice of streaming services is a matter of which service do they subscribe to in addition to Netflix.</span></p><span data-dcnode-id="3228" instrument_node="">
</span><p data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">Still, all of these jobs are about passively consuming content; from a consumer perspective gaming is something different, in that you are an active participant. To that end, it’s not clear to me why consumers would even think to consider Netflix when it comes to gaming: that’s not what the service’s job is, nor was it the job of the linear TV bundle that Netflix is helping replace.</span></p><span data-dcnode-id="3225" instrument_node="">
</span><h4 data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">Netflix’s Market: Attention</span></h4><span data-dcnode-id="3222" instrument_node="">
</span><p data-dcnode-id="3217"><span data-dcnode-id="3221" instrument_node="">Then again, as founder and co-CEO Reed Hastings likes to say, Netflix’s competition is much broader than TV; Hastings wrote in the company’s </span><a data-dcnode-id="3219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//q4live.s22.clientfiles.s3-website-us-east-1.amazonaws.com/959853165/files/doc_financials/quarterly_reports/2018/q4/01/FINAL-Q4-18-Shareholder-Letter.pdf"><span data-dcnode-id="3220" instrument_node="">Q4 letter to shareholders</span></a><span data-dcnode-id="3218" instrument_node="">:</span></p><span data-dcnode-id="3216" instrument_node="">
</span><blockquote data-dcnode-id="3213"><p data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">
  In the US, we earn around 10% of television screen time and less than that of mobile screen time. In 2 other countries, we earn a lower percentage of screen time due to lower penetration of our service. We earn consumer screen time, both mobile and television, away from a very broad set of competitors. We compete with (and lose to) Fortnite more than HBO. When YouTube went down globally for a few minutes in October, our viewing and signups spiked for that time. Hulu is small compared to YouTube for viewing time, and they are successful in the US, but non-existent in Canada, which creates a comparison point: our penetration in the two countries is pretty similar. There are thousands of competitors in this highly-fragmented market vying to entertain consumers and low barriers to entry for those with great experiences. Our growth is based on how good our experience is, compared to all the other screen time experiences from which consumers choose. Our focus is not on Disney+, Amazon or others, but on how we can improve our experience for our members.
</span></p></blockquote><span data-dcnode-id="3212" instrument_node="">
</span><p data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">Hastings’ point was that analysts should not be overly focused on the threat posed by other streaming services; Netflix has been fighting for attention for years. This is correct, by the way: thanks to the Internet everything from television to social networking to gaming can be delivered at zero marginal cost; the only scarce resource is time, which means attention is the only thing that needs to be competed for.</span></p><span data-dcnode-id="3209" instrument_node="">
</span><p data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">Well, that and money: companies competing for customer money need a way to communicate to customers what they have to sell and why it is compelling; that means advertising, and advertising requires attention. It follows, then, that the most effective business model in the attention economy is advertising: if customers rely on Google or Facebook to navigate the abundance of content that is the result of zero marginal costs, then it is Google and Facebook that are the best-placed to sell effective ads.</span></p><span data-dcnode-id="3206" instrument_node="">
</span><p data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Notice, though, the trouble this Internet reality presents to Netflix: if content is abundant and attention is scarce, it’s easier to sell attention than content; Netflix’s business model, though, is the exact opposite.</span></p><span data-dcnode-id="3203" instrument_node="">
</span><h4 data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">Netflix’s Differentiation: Unique Content</span></h4><span data-dcnode-id="3200" instrument_node="">
</span><p data-dcnode-id="3198"><span data-dcnode-id="3199" instrument_node="">Netflix, of course, sees this as a differentiator, and for a long time it was: linear TV had commercials, while Netflix had none. Linear TV made you wait for your favorite show, while Netflix gave you entire seasons at once. This was particularly compelling when Netflix had similar content to linear TV: why would you put up with commercials and TV schedules when you could just stream what you wanted to?</span></p><span data-dcnode-id="3197" instrument_node="">
</span><p data-dcnode-id="3192"><span data-dcnode-id="3196" instrument_node="">However, as more and more content has moved away from TV and to competing streaming services, differentiation is no longer based on the user experience, but rather uniqueness; on-demand no-commercials is no longer unique, but </span><em data-dcnode-id="3194"><span data-dcnode-id="3195" instrument_node="">Stranger Things</span></em><span data-dcnode-id="3193" instrument_node=""> can only be found on Netflix.</span></p><span data-dcnode-id="3191" instrument_node="">
</span><p data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">Here Netflix’s biggest advantage is the sheer size of its subscriber base: Netflix can, on an absolute basis, pay more than its streaming competitors for the content it wants, even as its per-subscriber cost basis is lower. This advantage is only accentuated the larger Netflix’s subscriber base gets, and the more revenue it makes per subscriber; the user experience of getting to that unique content doesn’t really matter.</span></p><span data-dcnode-id="3188" instrument_node="">
</span><hr data-dcnode-id="3187"><span data-dcnode-id="3186" instrument_node="">
</span><p data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">All of these factors make a compelling case for Netflix to start building an advertising business.</span></p><span data-dcnode-id="3183" instrument_node="">
</span><p data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">First, an advertising-supported or subsidized tier would expand Netflix’s subscriber base, which is not only good for the company’s long-term growth prospects, but also competitive position when it comes to acquiring content. This also applies to the company’s recent attempts to crack down on password sharing, and struggles in the developing world: an advertising-based tier is a much more accessible alternative.</span></p><span data-dcnode-id="3180" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">Second, advertising would make it easier for Netflix to continue to raise prices: on one hand, it would provide an alternative for marginal customers who might otherwise churn, and on the other hand, it would create a new benefit for those willing to pay (i.e. no advertising for the highest tiers).</span></p><span data-dcnode-id="3177" instrument_node="">
</span><p data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">Third, advertising is a natural fit for the jobs Netflix does. Sure, customers enjoy watching shows without ads — and again, they can continue to pay for that — but filler TV, which Netflix also specializes in, is just as easily filled with ads.</span></p><span data-dcnode-id="3174" instrument_node="">
</span><p data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">Above all, though, is the fact that advertising is a great opportunity that aligns with Netflix’s business: while the company once won with a differentiated user experience worth paying for, today Netflix demands scarce attention because of its investment in unique content. That attention can be sold, and should be, particularly as it increases Netflix’s ability to invest in more unique content, and/or charge higher prices to its user base.</span></p><span data-dcnode-id="3171" instrument_node="">
</span><p data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node="">This, I will note, is an about face for me; I’ve long been skeptical that Netflix would ever sell advertising, or that they should. The former may still be warranted, particularly in light of Netflix’s gaming initiative. This feels like solipsism: Netflix’s executives think a lot about their business model, so they are looking for growth opportunities that seem to leverage said business model; I’m not convinced, though, that customers appreciate or care about the differentiation that Netflix claims to be leveraging in gaming, whereas they would appreciate lower prices for streaming, and already have the expectation for ads on TV.</span></p><span data-dcnode-id="3168" instrument_node="">
</span><p data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">Meanwhile, subscriber growth has stalled, even as the advertising market has proven to be much larger than even Google or Facebook can cover. Moreover, the post-ATT world is freeing up more money for the sort of top-of-funnel advertising that would probably be the norm on a Netflix advertising service. In short, the opportunity is there, the product is right, and the business need is pressing in a way it wasn’t previously.</span></p><span data-dcnode-id="3165" instrument_node="">
</span><p data-dcnode-id="3157"><span data-dcnode-id="3164" instrument_node="">Of course this would be a lot of work, and a big shift in Netflix’s well-defined value proposition; Netflix, though, has made big shifts before: the entire reason why advertising is a possibility is because Netflix is a streamer, not a DVD mailer. In that view a new (additional) business model is just </span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2020/netflixs-new-rung-self-production-cash-flow-and-margin-netflixs-new-rung/"><span data-dcnode-id="3163" instrument_node="">another rung</span></a><span data-dcnode-id="3161" instrument_node=""> on </span><a data-dcnode-id="3159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2016/netflix-goes-global-iphone-worry/"><span data-dcnode-id="3160" instrument_node="">Netflix’s ladder</span></a><span data-dcnode-id="3158" instrument_node="">.</span></p><span data-dcnode-id="3156" instrument_node="">
</span><p data-dcnode-id="3150"><em data-dcnode-id="3151"><span data-dcnode-id="3155" instrument_node="">I wrote a follow-up to this Article in </span><a data-dcnode-id="3153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/why-netflix-should-not-sell-ads-elon-musk-and-twitter/"><span data-dcnode-id="3154" instrument_node="">this Daily Update</span></a><span data-dcnode-id="3152" instrument_node="">.</span></em></p><span data-dcnode-id="3149" instrument_node="">
</span></div><span data-dcnode-id="3146" instrument_node="">

</span><span data-dcnode-id="2309" instrument_node="">
</span></body></html></iframe></div></div><span data-dcnode-id="2301" instrument_node="">
</span><blockquote data-dcnode-id="2295"><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">
  None of these capabilities were remotely possible a decade ago. Accelerated computing, at data center scale, and combined with machine learning, has sped up computing by a million-x. Accelerated computing has enabled revolutionary AI models like the transformer, and made self-supervised learning possible. AI has fundamentally changed what software can make, and how you make software. Companies are processing and refining their data, making AI software, becoming intelligence manufacturers. Their data centers are becoming AI factories. The first wave of AI learned perception and inference, like recognizing images, understanding speech, recommending a video, or an item to buy. The next wave of AI is robotics: AI planning actions. Digital robots, avatars, and physical robots will perceive, plan, and act, and just as AI frameworks like TensorFlow and PyTorch have become integral to AI software, Omniverse will be essential to making robotics software. Omniverse will enable the next wave of AI.</span></p><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">  We will talk about the next million-x, and other dynamics shaping our industry, this GTC. Over the past decade, Nvidia-accelerated computing delivered a million-x speed-up in AI, and started the modern AI revolution. Now AI will revolutionize all industries. The CUDA libraries, the Nvidia SDKs, are at the heart of accelerated computing. With each new SDK, new science, new applications, and new industries can tap into the power of Nvidia computing. These SDKs tackle the immense complexity at the intersection of computing, algorithms, and science. The compound effect of Nvidia’s full-stack approach resulted in a million-x speed-up. Today, Nvidia accelerates millions of developers, and tens of thousands of companies and startups. GTC is for all of you.
</span></p></blockquote><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">The core idea behind machine learning is that computers, presented with massive amounts of data, can extract insights and ideas from that data that no human ever could; to put it another way, the development of not just insights but, going forward, software itself, is an emergent process. Nvidia’s role is making massively parallel computing platforms that do the calculations necessary for this emergent process far more quickly than was ever possible with general purpose computing platforms like those undergirding the PC or smartphone.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2286"><span data-dcnode-id="2290" instrument_node="">What is so striking about Nvidia generally and Huang in particular, though, is the extent to which this capability is the result of the precise opposite of an emergent process: Nvidia the company feels like a deliberate design, nearly 29 years in the making. The company started accelerating defined graphical functions, then invented the shader, which made it possible to program the hardware doing that acceleration. This new approach to processing, though, required new tools, so Nvidia invented them, and has </span><a data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2021/nvidias-gtc-keynote-the-nvidia-stack-the-omniverse/"><span data-dcnode-id="2289" instrument_node="">been building on their fully integrated stack ever since</span></a><span data-dcnode-id="2287" instrument_node="">.</span></p><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">The deliberateness of Nvidia’s vision is one of the core themes I explored in this interview with Huang recorded shortly after his GTC keynote. We also touch on Huang’s background, including immigrating to the United States as a child, Nvidia’s failed ARM acquisition, and more. One particularly striking takeaway for me came at the end of the interview, where Huang said:</span></p><span data-dcnode-id="2282" instrument_node="">
</span><blockquote data-dcnode-id="2276"><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">
  Intelligence is the ability to recognize patterns, recognize relationships, reason about it and make a prediction or plan an action. That’s what intelligence is. It has nothing to do with general intelligence, intelligence is just solving problems. We now have the ability to write software, we now have the ability to partner with computers to write software, that can solve many types of intelligence, make many types of predictions at scales and at levels that no humans can.</span></p><span data-dcnode-id="2279" instrument_node="">
</span><p data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">  For example, we know that there are a trillion things on the Internet and the number things on the Internet is large and expanding incredibly fast, and yet we have this little tiny personal computer called a phone, how do we possibly figure out of the trillion things in the internet what we want to see on our little tiny phone? Well, there needs to be a filter in between, what people call the personalized internet, but basically an AI, a recommender system. A recommender that figures out based on the nature of the content, the characteristics of the content, the features of the content, based on your implicit and your explicit and implicit preferences, find a way through all of that to predict what you would like to see. I mean, that’s a miracle! That’s really quite a miracle to be able to do that at scale for everything from movies and books and music and news and videos and you name it, products and things like that. To be able to predict what Ben would want to see, predict what you would want to click on, predict what is useful to you. I’m talking about things that are consumer oriented stuff, but in the future it’ll be predict what is the best financial strategy for you, predict what is the best medical therapy for you, predict what is the best health regimen for you, what’s the best vacation plan for you. All of these things are going to be possible with AI.
</span></p></blockquote><span data-dcnode-id="2275" instrument_node="">
</span><p data-dcnode-id="2270"><span data-dcnode-id="2274" instrument_node="">As I note in the interview, this should ring a bell for Stratechery readers: what Huang is describing is the computing functionality that undergirds </span><a data-dcnode-id="2272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2015/aggregation-theory/"><span data-dcnode-id="2273" instrument_node="">Aggregation Theory</span></a><span data-dcnode-id="2271" instrument_node="">, wherein value in a world of abundance accrues to those entities geared towards discovery and providing means of navigating this world that is fundamentally disconnected from the constraints of physical goods and geography. Nvidia’s role in this world is to provide the hardware capability for Aggregation, to be the Intel to Aggregators’ Windows. That, needless to say, is an attractive position to be; like many such attractive positions, it is one that was built not in months or years, but decades.</span></p><span data-dcnode-id="2269" instrument_node="">
</span><p data-dcnode-id="2264"><span data-dcnode-id="2268" instrument_node="">Read the full interview with Huang </span><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/an-interview-with-nvidia-ceo-jensen-huang-about-manufacturing-intelligence/%23interview"><span data-dcnode-id="2267" instrument_node="">here</span></a><span data-dcnode-id="2265" instrument_node="">.</span></p><span data-dcnode-id="2263" instrument_node="">
</span></div><span data-dcnode-id="2260" instrument_node="">
</span></article><span data-dcnode-id="2257" instrument_node="">
</span><article class="post-8688 post type-post status-publish format-standard hentry category-articles topics-content-moderation topics-digital topics-networks topics-newspapers topics-publishing topics-search topics-social concepts-aggregation-theory concepts-distribution-and-transaction-costs concepts-ethics-and-mores concepts-technology-and-society" data-dcnode-id="1996" id="post-8688"><span data-dcnode-id="2256" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2230"><span data-dcnode-id="2255" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2252"><a data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2022/the-current-thing/" rel="bookmark"><span data-dcnode-id="2254" instrument_node="">The Current Thing</span></a></h1><span data-dcnode-id="2251" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2233"><span data-dcnode-id="2250" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2243"><span class="screen-reader-text" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Posted on</span></span><time class="entry-date published" data-dcnode-id="2246" datetime="2022-03-17T05:40:00-07:00"><span data-dcnode-id="2247" instrument_node="">Thursday, March 17, 2022</span></time><time class="updated" data-dcnode-id="2244" datetime="2022-03-17T23:24:23-07:00"><span data-dcnode-id="2245" instrument_node="">Thursday, March 17, 2022</span></time></span><span data-dcnode-id="2242" instrument_node=""> </span><span class="byline" data-dcnode-id="2235"><span class="author vcard" data-dcnode-id="2236"><span class="screen-reader-text" data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Author</span></span><span data-dcnode-id="2239" instrument_node=""> by </span><a class="url fn n" data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/author/stratechery/"><span data-dcnode-id="2238" instrument_node="">Ben Thompson</span></a></span></span><span data-dcnode-id="2234" instrument_node=""> </span></div><span data-dcnode-id="2231" instrument_node="">
</span></header><span data-dcnode-id="2228" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1999"><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">One of the most amazing things about the Internet is how it provides a level playing field for everyone: this post that you are reading was written by a single person, and it is just as accessible as an article written by the New York Times, or a proclamation issued by the President of the United States.</span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">It used to be that media organizations had a big advantage by virtue of owning printing presses and delivery trucks, or broadcast licenses; celebrities and politicians would have their proclamations carried across those same mediums by virtue of their popularity or power. The same advantages applied to other areas of the economy like retail and consumer packaged goods: building physical stores is a big barrier of entry if you want to be the former, and having a large and popular set of products gave big companies access to those retail channels.</span></p><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">What is common to both examples was the importance of controlling physical space, but that control came with inherent limitations: a paper newspaper could not be delivered everywhere, and TV broadcasts were limited by the signal strength of broadcast towers. Stores had to be built, and packaged goods had to be stocked on shelves.</span></p><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">The Internet changes all of that: now articles and videos are simply digital bits, easily created and easily transmitted anywhere on the globe, effectively for free. Physical goods still need to be made, but they can be sold to anyone by anyone, and shelf space has been replaced by the commoditized cardboard box.</span></p><span data-dcnode-id="2215" instrument_node="">
</span><p data-dcnode-id="2194"><span data-dcnode-id="2214" instrument_node="">This first order reality, though, has had a multitude of second order effects. Newspapers, for example, were amongst the first online sites, and it seemed like a massive boon: now an article that was only accessible by those within a limited geographic area delineated by the reach of delivery trucks could be read by anyone in the world. The problem is that that same reach was available to everyone; back in 2014 I wrote in </span><a data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2014/economic-power-age-abundance/"><span data-dcnode-id="2213" instrument_node="">Economic Power in the Age of Abundance</span></a><span data-dcnode-id="2211" instrument_node="">:</span></p><div class="bigfoot-footnote__container" data-dcnode-id="2198"><span data-dcnode-id="2210" instrument_node=""> </span><button alt="See Footnote 2" class="bigfoot-footnote__button" data-bigfoot-footnote="<p>The image in the excerpt is from 2014; <a href=&quot;https://149384716.v2.pressablecdn.com/wp-content/uploads/2022/03/CleanShot-2022-03-17-at-03.10.26@2x.png&quot;>the updated view of the last thirty days</a> is broadly similar, but there has been a big relative increase in Washington DC, Los Angeles, India, and Singapore.</p>" data-dcnode-id="2199" data-footnote-identifier="2" data-footnote-number="2" id="rf1-8688" rel="footnote"><span data-dcnode-id="2209" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="2207" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="2208" fill="white" r="3"></circle></svg><span data-dcnode-id="2206" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="2204" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="2205" fill="white" r="3"></circle></svg><span data-dcnode-id="2203" instrument_node=""> </span><svg class="bigfoot-footnote__button__circle" data-dcnode-id="2201" preserveAspectRatio="xMinYMin" viewBox="0 0 6 6"><circle cx="3" cy="3" data-dcnode-id="2202" fill="white" r="3"></circle></svg><span data-dcnode-id="2200" instrument_node=""> </span></button></div><sup class="footnote-print-only" data-dcnode-id="2195" data-footnote-backlink-ref="rf1-8688" data-footnote-ref="#fn1-8688" id="rf1-8688"><a data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//videopress.com/embed/KxAM0mD4%3Fhd%3D1%26cover%3D1%26loop%3D0%26autoPlay%3D0%26permalink%3D1%26muted%3D0%26controls%3D1%26playsinline%3D0%23fn1-8688" rel="footnote" title="The image in the excerpt is from 2014; <a href=&quot;https://stratechery.com/wp-content/uploads/2022/03/CleanShot-2022-03-17-at-03.10.26@2x.png&quot;>the updated view of the last thirty days</a> is broadly similar, but there has been a big relative increase in Washington DC, Los Angeles, India, and Singapore."><span data-dcnode-id="2197" instrument_node="">1</span></a></sup><p></p><span data-dcnode-id="2193" instrument_node="">
</span><blockquote data-dcnode-id="2171"><p data-dcnode-id="2188"><span data-dcnode-id="2192" instrument_node="">
  One of the great paradoxes for newspapers today is that their financial prospects are inversely correlated to their addressable market. Even as advertising revenues have fallen off a cliff — adjusted for inflation, ad revenues are at </span><a data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.slate.com/blogs/moneybox/2014/04/28/decline_of_newspapers_hits_a_milestone_print_revenue_is_lowest_since_1950.html"><span data-dcnode-id="2191" instrument_node="">the same level as the 1950s</span></a><span data-dcnode-id="2189" instrument_node=""> — newspapers are able to reach audiences not just in their hometowns but literally all over the world.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2186" instrument_node=""> </span><a data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2014/economic-power-age-abundance/"><img alt="A drawing of The Internet has Created Unlimited Reach" class="aligncenter size-large wp-image-992" data-dcnode-id="2185" data-recalc-dims="1" height="299" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2014/06/abundance.png%3Fresize%3D640%252C299%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2014/06/abundance.png?resize=1024%2C478&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/06/abundance.png?resize=300%2C140&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/06/abundance.png?resize=768%2C358&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/06/abundance.png?resize=1200%2C560&amp;ssl=1 1200w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/06/abundance.png?w=1618&amp;ssl=1 1618w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/06/abundance.png?w=1280&amp;ssl=1 1280w" width="640"></a></p><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">  The problem for publishers, though, is that the free distribution provided by the Internet is not an exclusive. It’s available to every other newspaper as well. Moreover, it’s also available to publishers of any type, even bloggers like myself.</span></p><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2178" instrument_node=""> </span><a data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2014/economic-power-age-abundance/"><img alt="A city view of Stratechery's readers in 2014" class="aligncenter size-large wp-image-991" data-dcnode-id="2177" data-recalc-dims="1" height="374" loading="lazy" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/stratechery.com/wp-content/uploads/2014/06/Screen-Shot-2014-06-24-at-11.57.35-PM.png%3Fresize%3D640%252C374%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/stratechery.com/wp-content/uploads/2014/06/Screen-Shot-2014-06-24-at-11.57.35-PM.png?resize=1024%2C599&amp;ssl=1 1024w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/06/Screen-Shot-2014-06-24-at-11.57.35-PM.png?resize=300%2C176&amp;ssl=1 300w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/06/Screen-Shot-2014-06-24-at-11.57.35-PM.png?resize=768%2C449&amp;ssl=1 768w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/06/Screen-Shot-2014-06-24-at-11.57.35-PM.png?resize=1077%2C630&amp;ssl=1 1077w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/06/Screen-Shot-2014-06-24-at-11.57.35-PM.png?w=1576&amp;ssl=1 1576w, https://i0.wp.com/stratechery.com/wp-content/uploads/2014/06/Screen-Shot-2014-06-24-at-11.57.35-PM.png?w=1280&amp;ssl=1 1280w" width="640"></a></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">  To be clear, this is absolutely a boon, particularly for readers, but also for any writer looking to have a broad impact. For your typical newspaper, though, the competitive environment is diametrically opposed to what they are used to: instead of there being a scarce amount of published material, there is an overwhelming abundance. More importantly, this shift in the competitive environment has fundamentally changed just who has economic power.
</span></p></blockquote><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2169" instrument_node="">That article was one of the first articulations of the concepts undergirding </span><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stratechery.com/2015/aggregation-theory/"><span data-dcnode-id="2168" instrument_node="">Aggregation Theory</span></a><span data-dcnode-id="2166" instrument_node="">, which is downstream from the shift from geographic-driven scarcity to Internet-driven abundance: now the most valuable companies in the world were those that helped users navigate abundance, whether that be via search (Google), contacts (Facebook), or retail (Amazon).</span></p><span data-dcnode-id="2164" instrument_node="">
</span><h4 data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">The Current Thing Meme</span></h4><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Most of my discussion of Aggregation Theory has been about economics and concepts like zero marginal costs; just as it doesn’t cost anything to publish, it doesn’t cost Google anything (on a marginal basis) to help every person in the world find the specific piece of content they are looking for. This, by extension, motivates publishers to work well with Google, motivates users to use Google more, and gives Google the best possible opportunity to show ads, attracting more and more advertising.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">In other words, centralization is a second order effect of decentralization: when all constraints on content are removed, more power than ever accrues to the entity that is the preferred choice for navigating that content; moreover, that power compounds on itself in a virtuous feedback loop.</span></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">This dynamic, though, goes beyond economics; consider the meme that inspired the title of this Article:</span></p><span data-dcnode-id="2152" instrument_node="">
</span><div align="center" data-dcnode-id="2136"><span data-dcnode-id="2151" instrument_node="">
</span><blockquote class="twitter-tweet" data-dcnode-id="2141" data-dnt="true"><span data-dcnode-id="2150" instrument_node="">
</span><p data-dcnode-id="2147" dir="ltr" lang="und"><a data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/CfoJ3qdCRJ"><span data-dcnode-id="2149" instrument_node="">pic.twitter.com/CfoJ3qdCRJ</span></a></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2142"><span data-dcnode-id="2145" instrument_node="">— Elon Musk (@elonmusk) </span><a data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/elonmusk/status/1503276966874595330%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="2144" instrument_node="">March 14, 2022</span></a></p></blockquote><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2137"><span data-dcnode-id="2139" instrument_node=""> </span></p></div><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">This meme has, for rather obvious reasons, made a fair number of people upset, particularly to the extent it suggests that support for a country fighting for its existence in the face of a brutal invasion is somehow inauthentic. I think, though, that interpretation is too literal; after all, the meme can be extended in lots of different ways:</span></p><span data-dcnode-id="2132" instrument_node="">
</span><div align="center" data-dcnode-id="2115"><span data-dcnode-id="2131" instrument_node="">
</span><blockquote class="twitter-tweet" data-dcnode-id="2120" data-dnt="true"><span data-dcnode-id="2130" instrument_node="">
</span><p data-dcnode-id="2126" dir="ltr" lang="en"><span data-dcnode-id="2129" instrument_node="">I support the current thing. </span><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/e3WIeV6FHp"><span data-dcnode-id="2128" instrument_node="">pic.twitter.com/e3WIeV6FHp</span></a></p><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2121"><span data-dcnode-id="2124" instrument_node="">— Marc Andreessen (@pmarca) </span><a data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/pmarca/status/1504238641475821570%3Fref_src%3Dtwsrc%255Etfw"><span data-dcnode-id="2123" instrument_node="">March 16, 2022</span></a></p></blockquote><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2118" instrument_node=""> </span></p></div><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">What I think is captured here is orthogonal to the actual issue at hand (in the case of Musk’s version, Ukraine); the entire point of the generic labeling (“The Current Thing”) is that there is a dynamic that exists independent of the issue being critiqued, and my contention in this Article is that said dynamic is Aggregation Theory for ideas.</span></p><span data-dcnode-id="2111" instrument_node="">
</span><h4 data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">Aggregating Ideas</span></h4><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Go back to the point about the explosion of content on the Internet: the first order implication is that there is an explosion of ideas; after all, anyone can publish anything. Presumably this means that there are far more categories of thought than ever before! And, if you dig deep enough into the Internet, this is true.</span></p><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Most people, though, don’t dig that deep, just as they don’t dig that deep for content or contacts or commerce: it’s just far easier and more convenient to rely on Google or Facebook or Amazon. Why wouldn’t this same dynamic apply to ideas? Being informed about everything happening in the world is hard if not impossible: humans evolved to care intensely about what happened in their local environment; however, first mass media, and then the Internet, brought news from everywhere to our immediate attention.</span></p><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Given that, it seems entirely reasonable — expected even — that we all outsource our intuition for what events matter, and what our position on those events should be, to the most convenient option, especially if that option has obvious moral valence. Police brutality against people of color is obviously bad; people dying from COVID is obviously bad; Russia invading Ukraine is obviously bad; why wouldn’t each of us snap into opposition to obviously bad things?</span></p><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">This dynamic is exactly what the meme highlights: sure, the Internet makes possible a wide range of viewpoints — you can absolutely find critics of Black Lives Matter, COVID policies, or pro-Ukraine policies — but the Internet, thanks to its lack of friction and instant feedback loops, also makes nearly every position but the dominant one untenable. If everyone believes one thing, the costs of believing something else increase dramatically, making the consensus opinion the only viable option; this is the same dynamic in which publishers become dependent on Google or Facebook, or retailers on Amazon, just because that is where money can be made.</span></p><span data-dcnode-id="2096" instrument_node="">
