</span><p class="chapter-para" data-dcnode-id="2777"><span data-dcnode-id="2793" instrument_node="">Within both the formal and informal governance of outbreaks, trust is of paramount importance.</span><sup data-dcnode-id="2789"><span class="xrefLink" data-dcnode-id="2792" id="jumplink-fn74"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2790" data-google-interstitial="false" data-open="fn74" href="javascript:;" reveal-id="fn74"><span data-dcnode-id="2791" instrument_node="">74</span></a></sup><span data-dcnode-id="2788" instrument_node=""> Broader IR scholarship has contributed to understanding the theme of trust,</span><sup data-dcnode-id="2784"><span class="xrefLink" data-dcnode-id="2787" id="jumplink-fn75"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2785" data-google-interstitial="false" data-open="fn75" href="javascript:;" reveal-id="fn75"><span data-dcnode-id="2786" instrument_node="">75</span></a></sup><span data-dcnode-id="2783" instrument_node=""> and these insights have applicability to outbreak response. Communities need to trust in the public health advice they are given, and respond to the authority of domestic and international institutions providing such advice. Recent outbreaks have shown that different sources of information are accorded different degrees of legitimacy in moments of crisis,</span><sup data-dcnode-id="2779"><span class="xrefLink" data-dcnode-id="2782" id="jumplink-fn76"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2780" data-google-interstitial="false" data-open="fn76" href="javascript:;" reveal-id="fn76"><span data-dcnode-id="2781" instrument_node="">76</span></a></sup><span data-dcnode-id="2778" instrument_node=""> as has been apparent in the debate over the use of face masks during the COVID-19 pandemic.</span></p><p class="chapter-para" data-dcnode-id="2755"><span data-dcnode-id="2776" instrument_node="">Lack of trust in actors with supposed authority in health emergencies, differing sources of ‘legitimate’ information and ‘infodemics’ can all have substantial effects on health security. The health-care workers killed in Guinea during the Ebola outbreak in 2014 were perceived to be spreading the disease rather than trying to quell it.</span><sup data-dcnode-id="2772"><span class="xrefLink" data-dcnode-id="2775" id="jumplink-fn77"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2773" data-google-interstitial="false" data-open="fn77" href="javascript:;" reveal-id="fn77"><span data-dcnode-id="2774" instrument_node="">77</span></a></sup><span data-dcnode-id="2771" instrument_node=""> Similarly, there is a high likelihood of tensions and risk of communication failure when government public health campaigns are introduced in locations where governments do not have authority or trust among populations at risk, as was apparent in variable vaccination coverage for polio (another PHEIC) in Syria;</span><sup data-dcnode-id="2767"><span class="xrefLink" data-dcnode-id="2770" id="jumplink-fn78"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2768" data-google-interstitial="false" data-open="fn78" href="javascript:;" reveal-id="fn78"><span data-dcnode-id="2769" instrument_node="">78</span></a></sup><span data-dcnode-id="2766" instrument_node=""> arson attacks on Ebola treatment units and health-care facilities in eastern DRC;</span><sup data-dcnode-id="2762"><span class="xrefLink" data-dcnode-id="2765" id="jumplink-fn79"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2763" data-google-interstitial="false" data-open="fn79" href="javascript:;" reveal-id="fn79"><span data-dcnode-id="2764" instrument_node="">79</span></a></sup><span data-dcnode-id="2761" instrument_node=""> and vector-control strategies targeted at women in gang-controlled favelas in Brazil.</span><sup data-dcnode-id="2757"><span class="xrefLink" data-dcnode-id="2760" id="jumplink-fn80"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2758" data-google-interstitial="false" data-open="fn80" href="javascript:;" reveal-id="fn80"><span data-dcnode-id="2759" instrument_node="">80</span></a></sup><span data-dcnode-id="2756" instrument_node=""> Although the context varies, the importance of understanding informal political control of information and access to communities is vital for reaching the front line of outbreaks and those most marginalized within health crises.</span></p><p class="chapter-para" data-dcnode-id="2739"><span data-dcnode-id="2754" instrument_node="">The WHO has shown little recognition of the relationship between human rights, state capacity and outbreak response since the introduction of the IHR.</span><sup data-dcnode-id="2750"><span class="xrefLink" data-dcnode-id="2753" id="jumplink-fn81"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2751" data-google-interstitial="false" data-open="fn81" href="javascript:;" reveal-id="fn81"><span data-dcnode-id="2752" instrument_node="">81</span></a></sup><span data-dcnode-id="2749" instrument_node=""> In the technical spaces of infectious disease surveillance and response we must be attentive to the civil and political rights space in which health-care workers, scientists, NGOs and the media work. Freedom to report, freedom to share information without fear of reprisals and freedom to seek health care without fear all affect collective capacity to conduct disease outbreak surveillance and reporting. We only have to consider the implications faced by the Chinese doctors who first alerted the world to COVID-19 in 2019,</span><sup data-dcnode-id="2745"><span class="xrefLink" data-dcnode-id="2748" id="jumplink-fn82"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2746" data-google-interstitial="false" data-open="fn82" href="javascript:;" reveal-id="fn82"><span data-dcnode-id="2747" instrument_node="">82</span></a></sup><span data-dcnode-id="2744" instrument_node=""> or similar whistle-blowers during MERS, to see the challenges that this freedom to report poses within political systems.</span><sup data-dcnode-id="2740"><span class="xrefLink" data-dcnode-id="2743" id="jumplink-fn83"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2741" data-google-interstitial="false" data-open="fn83" href="javascript:;" reveal-id="fn83"><span data-dcnode-id="2742" instrument_node="">83</span></a></sup></p><p class="chapter-para" data-dcnode-id="2727"><span data-dcnode-id="2738" instrument_node="">Human rights is the long-neglected core capacity of the IHR that we—academics, states and regional and international organizations—must collectively discuss.</span><sup data-dcnode-id="2734"><span class="xrefLink" data-dcnode-id="2737" id="jumplink-fn84"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2735" data-google-interstitial="false" data-open="fn84" href="javascript:;" reveal-id="fn84"><span data-dcnode-id="2736" instrument_node="">84</span></a></sup><span data-dcnode-id="2733" instrument_node=""> The WHO has neglected to carry out a systematic and sustained review of states’ practices concerning human rights obligations under the IHR. This must change, during and after COVID-19, as we see a range of human rights concerns arise. For example, the possibility of immunity passports offers widespread concerns for human rights abuses if people are treated differently on the basis of their immunological status.</span><sup data-dcnode-id="2729"><span class="xrefLink" data-dcnode-id="2732" id="jumplink-fn85"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2730" data-google-interstitial="false" data-open="fn85" href="javascript:;" reveal-id="fn85"><span data-dcnode-id="2731" instrument_node="">85</span></a></sup><span data-dcnode-id="2728" instrument_node=""> Self-isolation creates human rights challenges when particular communities are locked down for long periods, and immediate danger in highly militarized states when security forces are brought in to manage the system of lockdown. These need to be considered by those with experience in human rights analysis, not just public health officials.</span></p><span data-dcnode-id="2726" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2724" id="207157843" scrollto-destination="207157843"><span data-dcnode-id="2725" instrument_node="">Gender inclusion</span></h3><span data-dcnode-id="2723" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2691"><span data-dcnode-id="2722" instrument_node="">Feminist IR theory asks ‘Where are the women?’</span><sup data-dcnode-id="2718"><span class="xrefLink" data-dcnode-id="2721" id="jumplink-fn86"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2719" data-google-interstitial="false" data-open="fn86" href="javascript:;" reveal-id="fn86"><span data-dcnode-id="2720" instrument_node="">86</span></a></sup><span data-dcnode-id="2717" instrument_node=""> In the analysis of global health emergencies, consideration of women and non-binary gender identities is often missing.</span><sup data-dcnode-id="2713"><span class="xrefLink" data-dcnode-id="2716" id="jumplink-fn87"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2714" data-google-interstitial="false" data-open="fn87" href="javascript:;" reveal-id="fn87"><span data-dcnode-id="2715" instrument_node="">87</span></a></sup><span data-dcnode-id="2712" instrument_node=""> In 2020, the primary sex and gender effects of COVID-19 are hard to examine owing to a lack of real-time sex-disaggregated data available during the course of the outbreak, as was the case with H1N1 in 2009 and Ebola in 2014–15. Decision-makers may not appreciate the sex-related distribution of disease. Moreover, policies created to respond to outbreaks fail to appreciate the differential secondary effects of health emergencies on men and women affected or at risk of the disease.</span><sup data-dcnode-id="2708"><span class="xrefLink" data-dcnode-id="2711" id="jumplink-fn88"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2709" data-google-interstitial="false" data-open="fn88" href="javascript:;" reveal-id="fn88"><span data-dcnode-id="2710" instrument_node="">88</span></a></sup><span data-dcnode-id="2707" instrument_node=""> Women's social reproduction (the informal care they perform in the home, caring duties for children or the sick, and increasing role as volunteer community health workers) is undervalued within global health.</span><sup data-dcnode-id="2703"><span class="xrefLink" data-dcnode-id="2706" id="jumplink-fn89"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2704" data-google-interstitial="false" data-open="fn89" href="javascript:;" reveal-id="fn89"><span data-dcnode-id="2705" instrument_node="">89</span></a></sup><span data-dcnode-id="2702" instrument_node=""> The combined formal and informal care role that women perform in health emergencies has become even more apparent during COVID-19. As Harman writes, moreover, women are ‘conspicuously invisible’ within the policy space; although they were in positions of apparent power in governance mechanisms for the Ebola outbreak in west Africa, these were not where decisions were made.</span><sup data-dcnode-id="2698"><span class="xrefLink" data-dcnode-id="2701" id="jumplink-fn90"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2699" data-google-interstitial="false" data-open="fn90" href="javascript:;" reveal-id="fn90"><span data-dcnode-id="2700" instrument_node="">90</span></a></sup><span data-dcnode-id="2697" instrument_node=""> The failure to include women is replicated across the policy landscape.</span><sup data-dcnode-id="2693"><span class="xrefLink" data-dcnode-id="2696" id="jumplink-fn91"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2694" data-google-interstitial="false" data-open="fn91" href="javascript:;" reveal-id="fn91"><span data-dcnode-id="2695" instrument_node="">91</span></a></sup><span data-dcnode-id="2692" instrument_node=""> Women were notably absent from the processes that led to the International Health Regulations (2005), the Biological Weapons Convention, the Pandemic Emergency Financing Facility, the JEE and the WHO Blueprint on R&amp;D for Health Emergencies.</span></p><p class="chapter-para" data-dcnode-id="2665"><span data-dcnode-id="2690" instrument_node="">Beyond the direct impacts of failure to engage with gender during an outbreak, there are several indirect effects. The Ebola outbreak in west Africa demonstrated the effects on health systems. More women died of obstetric and post-natal complications than of the virus itself during the crisis period as health facilities were diverted to care solely for Ebola patients, and some women, fearing Ebola infection in clinical settings, refrained from visiting.</span><sup data-dcnode-id="2686"><span class="xrefLink" data-dcnode-id="2689" id="jumplink-fn92"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2687" data-google-interstitial="false" data-open="fn92" href="javascript:;" reveal-id="fn92"><span data-dcnode-id="2688" instrument_node="">92</span></a></sup><span data-dcnode-id="2685" instrument_node=""> The same pattern was evident in a reduction of routine immunization schedules,</span><sup data-dcnode-id="2681"><span class="xrefLink" data-dcnode-id="2684" id="jumplink-fn93"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2682" data-google-interstitial="false" data-open="fn93" href="javascript:;" reveal-id="fn93"><span data-dcnode-id="2683" instrument_node="">93</span></a></sup><span data-dcnode-id="2680" instrument_node=""> the consequence of which is likely to be gendered, given norms of (female) social reproduction and the additional care work this might require. The quarantine measures implemented in Liberia during the Ebola outbreak led to a spate of domestic and sexual violence in homes, and was linked to a surge of teenage pregnancies.</span><sup data-dcnode-id="2676"><span class="xrefLink" data-dcnode-id="2679" id="jumplink-fn94"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2677" data-google-interstitial="false" data-open="fn94" href="javascript:;" reveal-id="fn94"><span data-dcnode-id="2678" instrument_node="">94</span></a></sup><span data-dcnode-id="2675" instrument_node=""> Moreover, outbreaks can cause longer-term gender inequalities, with many women losing their small enterprises as a consequence of outbreaks: for example, in the west African Ebola outbreak, the economic security of the predominantly female market traders was jeopardized for considerably longer than that of men.</span><sup data-dcnode-id="2671"><span class="xrefLink" data-dcnode-id="2674" id="jumplink-fn95"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2672" data-google-interstitial="false" data-open="fn95" href="javascript:;" reveal-id="fn95"><span data-dcnode-id="2673" instrument_node="">95</span></a></sup><span data-dcnode-id="2670" instrument_node=""> These trends are all resurfacing during COVID-19, and IR scholarship could anticipate and mitigate such downstream effects of disease intervention strategies. IR questions the impact of emergency response policies that fail to recognize the differential position of men and women within health systems. No humanitarian response or health system is gender neutral or impartial. IR offers important insights to programme and policy design that can help ensure that the effects do not have disproportionate impacts and burdens on women and other marginalized groups.</span><sup data-dcnode-id="2666"><span class="xrefLink" data-dcnode-id="2669" id="jumplink-fn96"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2667" data-google-interstitial="false" data-open="fn96" href="javascript:;" reveal-id="fn96"><span data-dcnode-id="2668" instrument_node="">96</span></a></sup></p><span data-dcnode-id="2664" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2662" id="207157846" scrollto-destination="207157846"><span data-dcnode-id="2663" instrument_node="">The current context: diplomatic entry points for COVID-19</span></h2><span data-dcnode-id="2661" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2624"><span data-dcnode-id="2660" instrument_node="">Even a cursory look at the impact of COVID-19 reveals the core potential role of IR in understanding the international response to this outbreak. Tom Frieden has requoted the familiar saying, ‘diseases don't care about governments, ideologies or borders’.</span><sup data-dcnode-id="2656"><span class="xrefLink" data-dcnode-id="2659" id="jumplink-fn97"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2657" data-google-interstitial="false" data-open="fn97" href="javascript:;" reveal-id="fn97"><span data-dcnode-id="2658" instrument_node="">97</span></a></sup><span data-dcnode-id="2655" instrument_node=""> Viruses might not care about politics, but the political system in which they operate will have a direct impact on the success of a virus in multiplying and spreading through a community. National governments,</span><sup data-dcnode-id="2651"><span class="xrefLink" data-dcnode-id="2654" id="jumplink-fn98"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2652" data-google-interstitial="false" data-open="fn98" href="javascript:;" reveal-id="fn98"><span data-dcnode-id="2653" instrument_node="">98</span></a></sup><span data-dcnode-id="2650" instrument_node=""> interstate relations,</span><sup data-dcnode-id="2646"><span class="xrefLink" data-dcnode-id="2649" id="jumplink-fn99"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2647" data-google-interstitial="false" data-open="fn99" href="javascript:;" reveal-id="fn99"><span data-dcnode-id="2648" instrument_node="">99</span></a></sup><span data-dcnode-id="2645" instrument_node=""> the political economy of states,</span><sup data-dcnode-id="2641"><span class="xrefLink" data-dcnode-id="2644" id="jumplink-fn100"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2642" data-google-interstitial="false" data-open="fn100" href="javascript:;" reveal-id="fn100"><span data-dcnode-id="2643" instrument_node="">100</span></a></sup><span data-dcnode-id="2640" instrument_node=""> the challenge to civil liberties,</span><sup data-dcnode-id="2636"><span class="xrefLink" data-dcnode-id="2639" id="jumplink-fn101"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2637" data-google-interstitial="false" data-open="fn101" href="javascript:;" reveal-id="fn101"><span data-dcnode-id="2638" instrument_node="">101</span></a></sup><span data-dcnode-id="2635" instrument_node=""> different socio-economic conditions,</span><sup data-dcnode-id="2631"><span class="xrefLink" data-dcnode-id="2634" id="jumplink-fn102"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2632" data-google-interstitial="false" data-open="fn102" href="javascript:;" reveal-id="fn102"><span data-dcnode-id="2633" instrument_node="">102</span></a></sup><span data-dcnode-id="2630" instrument_node=""> geopolitical differences in response:</span><sup data-dcnode-id="2626"><span class="xrefLink" data-dcnode-id="2629" id="jumplink-fn103"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2627" data-google-interstitial="false" data-open="fn103" href="javascript:;" reveal-id="fn103"><span data-dcnode-id="2628" instrument_node="">103</span></a></sup><span data-dcnode-id="2625" instrument_node=""> all these factors directly affect disease transmission and the success of any intervention measures. We repeat: politics drives epidemics. Failing to engage with politics and international relations means not using the arsenal of potential knowledge available to public health policy-makers and practitioners.</span></p><p class="chapter-para" data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">So what can we as IR scholars offer those making decisions for the current COVID-19 outbreak? Using the five entry points introduced above, we propose the following initial inputs. First, comparative analysis. There must be an independent review of states’ responses during COVID-19. Confronted with the same pathogen, states’ different responses are evident: some heeded WHO advice, others charted their own courses. We need to understand why states make these decisions before we criticize. Different governance approaches are likely to lead to different outcomes, as we are already witnessing. The IHR is not a medicine to be consumed in the same dosage for each state. Domestic politics will have an impact on how this outbreak is governed, and this needs to be fully understood for effective pandemic management.</span></p><p class="chapter-para" data-dcnode-id="2615"><span data-dcnode-id="2621" instrument_node="">For example, the Indonesian president admitted he delayed public risk communication for fear of the economic cost that would come with public panic and public restrictions.</span><sup data-dcnode-id="2617"><span class="xrefLink" data-dcnode-id="2620" id="jumplink-fn104"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2618" data-google-interstitial="false" data-open="fn104" href="javascript:;" reveal-id="fn104"><span data-dcnode-id="2619" instrument_node="">104</span></a></sup><span data-dcnode-id="2616" instrument_node=""> We need to understand why and how this happened—without bias or causal assumptions—in order to assist the next executive faced with competing demands. Indonesia's case is very different from that of Iran, where secrecy certainly contributed to the mortality rate soaring very quickly. High public distrust in the state's reporting system and its response capacity, fuelled by neighbouring states, has contributed to sustained economic sanctions during the crisis. Assistance to Iran for future implementation of the IHR will look very different from that offered to Indonesia. Understanding the competing interests and political landscape of each country is vital to ensure that policies are developed by the WHO (or other global actors) which can be integrated into the new political reality after COVID-19.</span></p><p class="chapter-para" data-dcnode-id="2608"><span data-dcnode-id="2614" instrument_node="">Second, we need to understand constructively when and why states might not comply with the travel and trade recommendations set out in article 43 of the IHR (2005).</span><sup data-dcnode-id="2610"><span class="xrefLink" data-dcnode-id="2613" id="jumplink-fn105"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2611" data-google-interstitial="false" data-open="fn105" href="javascript:;" reveal-id="fn105"><span data-dcnode-id="2612" instrument_node="">105</span></a></sup><span data-dcnode-id="2609" instrument_node=""> Despite the WHO not suggesting travel or trade limitations, several countries almost immediately halted travel to and/or from China in January 2020, subsequently extending this prohibition to other high-risk locations. Similarly, governments evacuated and quarantined citizens returning from hot-spots almost as a piece of political theatre to ensure that the population felt that the authorities had the situation under control, even though community transmission was already occurring. Many governments are convinced that the right to decide their trade and travel bans belongs with them alone and not the WHO, despite the IHR (2005). The WHO needs to establish the pattern linking global and national responses, decisions around travel restrictions and the epidemic curve. Then it needs to establish the political conditions under which a state would comply with the IHR recommendations or otherwise, to rebuild trust and incorporate this into the IHR process. Just as not all states are the same, so there will be different models and agendas for potential engagement with member states. The WHO needs to audit member states’ interests and their diplomatic red flags. Member states will need different things from the organization at different times; dynamism (which the WHO has previously demonstrated) is pivotal to the organization's future. We argue that each state needs the WHO in some form, so the WHO needs to commit to a systematic framework that analyses and reviews, on an annual basis, what these needs are.</span></p><p class="chapter-para" data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">We call, furthermore, for a review of state and interstate activity in global health emergencies. The WHO must seek guidance and support from actors outside the health arena, breaking down silo divisions to bring much-needed expertise to managing the careful diplomatic activity required for a truly global response. Breaking out of the compartmentalization that limits its power and reach, the WHO could approach the UN High Commissioner for Human Rights for consideration of joint reviews; UN Women for gender expertise; UNICEF for on-the-ground concerns; and so on.</span></p><p class="chapter-para" data-dcnode-id="2589"><span data-dcnode-id="2605" instrument_node="">Third, we need to understand the money required for, and involved in, the COVID-19 response. Who is paying, and why does this matter? States have increasingly stepped back from providing the WHO with the necessary resources it needs to deliver its core activities (25 per cent of its total budget). The WHO Health Emergency Programme is currently only 74 per cent funded;</span><sup data-dcnode-id="2601"><span class="xrefLink" data-dcnode-id="2604" id="jumplink-fn106"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2602" data-google-interstitial="false" data-open="fn106" href="javascript:;" reveal-id="fn106"><span data-dcnode-id="2603" instrument_node="">106</span></a></sup><span data-dcnode-id="2600" instrument_node=""> the WHO has struggled to secure sufficient money for its strategic fund for COVID-19 response and, as of 14 July 2020, had received only $848 million, 49 per cent of what it requested.</span><sup data-dcnode-id="2596"><span class="xrefLink" data-dcnode-id="2599" id="jumplink-fn107"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2597" data-google-interstitial="false" data-open="fn107" href="javascript:;" reveal-id="fn107"><span data-dcnode-id="2598" instrument_node="">107</span></a></sup><span data-dcnode-id="2595" instrument_node=""> The failure of the WHO's fund-raising attempts during this crisis demonstrates that states prefer other mechanisms of resource distribution. The donor landscape has moved on, while the WHO has not. The WHO had to create the coronavirus solidarity fund and to appeal for voluntary contributions from individuals, philanthropists and the private sector globally to support the outbreak response through global music events and champions such as Lady Gaga.</span><sup data-dcnode-id="2591"><span class="xrefLink" data-dcnode-id="2594" id="jumplink-fn108"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2592" data-google-interstitial="false" data-open="fn108" href="javascript:;" reveal-id="fn108"><span data-dcnode-id="2593" instrument_node="">108</span></a></sup><span data-dcnode-id="2590" instrument_node=""> This is unprecedented; but the global reduction in GDP that will follow the pandemic will only mean a greater need for innovative financing in the future.</span></p><p class="chapter-para" data-dcnode-id="2579"><span data-dcnode-id="2588" instrument_node="">Financing shortfalls also raise the question of what the money will be used for. The WHO is a technical organization, and has only modest operational capacity to respond to disease outbreaks through the Health Emergency Programme. Is this out of date? The focus of spending in the coming months is likely to be on vaccine production and distribution, which falls beyond the WHO to GAVI and CEPI. The WHO needs to consider these stark realities in its request for money—what is the ‘added value’ of the institution? We suggest two ways in which the WHO can establish its relevance: through the collection of surveillance data and through reporting under the IHR. The world needs the WHO to be able to detect and share information about new pathogens as early as possible—this part of the IHR seems to be holding up in the COVID-19 outbreak and should be recognized as vital by member states. A suggestion has recently been made that the G20 create a new global viral surveillance organization; this would only replicate existing WHO activity and take further power from the international organization.</span><sup data-dcnode-id="2584"><span class="xrefLink" data-dcnode-id="2587" id="jumplink-fn109"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2585" data-google-interstitial="false" data-open="fn109" href="javascript:;" reveal-id="fn109"><span data-dcnode-id="2586" instrument_node="">109</span></a></sup><span data-dcnode-id="2583" instrument_node=""> This is a large part of the organization's </span><em data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">raison d’être</span></em><span data-dcnode-id="2580" instrument_node=""> and it should not be belittled.</span></p><p class="chapter-para" data-dcnode-id="2547"><span data-dcnode-id="2578" instrument_node="">Fourth, COVID-19 has shown us the capacity for an outbreak to go ‘viral’ in more ways than one,</span><sup data-dcnode-id="2574"><span class="xrefLink" data-dcnode-id="2577" id="jumplink-fn110"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2575" data-google-interstitial="false" data-open="fn110" href="javascript:;" reveal-id="fn110"><span data-dcnode-id="2576" instrument_node="">110</span></a></sup><span data-dcnode-id="2573" instrument_node=""> with the substantial increase in online visits to news provider sites showing that populations are desperate for information. However, this thirst for knowledge can be capitalized on by those wishing to challenge formal debates and scientific evidence, whether Russian bots, populist presidents or Joe Bloggs with an anecdotal story about his aunt's neighbour's daughter being infected and this giving him legitimate scientific expertise. The study of digital politics has already demonstrated the impact that social media can have in other areas of governance.</span><sup data-dcnode-id="2569"><span class="xrefLink" data-dcnode-id="2572" id="jumplink-fn111"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2570" data-google-interstitial="false" data-open="fn111" href="javascript:;" reveal-id="fn111"><span data-dcnode-id="2571" instrument_node="">111</span></a></sup><span data-dcnode-id="2568" instrument_node=""> Expertise on digital politics and methods can advise on ways of navigating the Twittersphere and media storms with the aim of ensuring authority and legitimacy.</span><sup data-dcnode-id="2564"><span class="xrefLink" data-dcnode-id="2567" id="jumplink-fn112"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2565" data-google-interstitial="false" data-open="fn112" href="javascript:;" reveal-id="fn112"><span data-dcnode-id="2566" instrument_node="">112</span></a></sup><span data-dcnode-id="2563" instrument_node=""> During COVID-19, the WHO has teamed up with Google, Instagram and Twitter to promote WHO websites, posts and tweets with the aim of encouraging people to have recourse to these sources rather than potentially misleading or hyperbolic information from elsewhere.</span><sup data-dcnode-id="2559"><span class="xrefLink" data-dcnode-id="2562" id="jumplink-fn113"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2560" data-google-interstitial="false" data-open="fn113" href="javascript:;" reveal-id="fn113"><span data-dcnode-id="2561" instrument_node="">113</span></a></sup><span data-dcnode-id="2558" instrument_node=""> In the UK, the Department of Health and Social Care has entered into a similar arrangement with Twitter.</span><sup data-dcnode-id="2554"><span class="xrefLink" data-dcnode-id="2557" id="jumplink-fn114"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2555" data-google-interstitial="false" data-open="fn114" href="javascript:;" reveal-id="fn114"><span data-dcnode-id="2556" instrument_node="">114</span></a></sup><span data-dcnode-id="2553" instrument_node=""> Such relationships may potentially create tensions for future working relationships and control of information, particularly given the concerns over data mining on health matters.</span><sup data-dcnode-id="2549"><span class="xrefLink" data-dcnode-id="2552" id="jumplink-fn115"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2550" data-google-interstitial="false" data-open="fn115" href="javascript:;" reveal-id="fn115"><span data-dcnode-id="2551" instrument_node="">115</span></a></sup><span data-dcnode-id="2548" instrument_node=""> To ensure impartiality, buttress its leadership and reassert its position as the normative leader in global health, the WHO is best-placed to consider and advise on the impact of these decisions.</span></p><p class="chapter-para" data-dcnode-id="2531"><span data-dcnode-id="2546" instrument_node="">Fifth and finally, we need to ask: where are the women in this outbreak? COVID-19 is already having a disproportionate impact upon women, regardless of context. While considerable attention has been given to the mortality burden, which appears to weigh more heavily on men, we have yet to see comprehensive sex-disaggregated data on incidence, owing to differential testing policies, which in many countries have limited testing to health-care workers. Given that women comprise 70 per cent of the global health workforce, it is important to know whether this role is putting them at greater risk of infection than the general population; and for this we need accurate data. Second, we need to analyse the secondary impacts on women—both on their health and within society. COVID-19 is already leading to disruption to supply chains, and barriers to accessing contraception,</span><sup data-dcnode-id="2542"><span class="xrefLink" data-dcnode-id="2545" id="jumplink-fn116"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2543" data-google-interstitial="false" data-open="fn116" href="javascript:;" reveal-id="fn116"><span data-dcnode-id="2544" instrument_node="">116</span></a></sup><span data-dcnode-id="2541" instrument_node=""> which is likely to lead to rising numbers of unwanted pregnancies, including in contexts where abortion may also be restricted.</span><sup data-dcnode-id="2537"><span class="xrefLink" data-dcnode-id="2540" id="jumplink-fn117"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2538" data-google-interstitial="false" data-open="fn117" href="javascript:;" reveal-id="fn117"><span data-dcnode-id="2539" instrument_node="">117</span></a></sup><span data-dcnode-id="2536" instrument_node=""> Women, too, perform the burden of care work, both formally as health-care workers, cleaners and teachers, and informally in the home. Women face greater risk of contracting the disease if they are caring for those infected, and will experience the impact of additional burdens of care as a consequence of public health interventions to combat disease transmission, the closure of schools and care homes, for example. We need to consider the threats to which women may be subject in their homes if they are required to self-isolate with their families when they may be at risk of domestic violence, and the long-term impact of the outbreak on women's economic empowerment if they are forced out of work to care for children or for other reasons. This problem is particularly acute in low- and middle-income countries where lockdowns could create generational gaps for gender equality in areas including access to schooling, income and civic participation.</span><sup data-dcnode-id="2532"><span class="xrefLink" data-dcnode-id="2535" id="jumplink-fn118"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2533" data-google-interstitial="false" data-open="fn118" href="javascript:;" reveal-id="fn118"><span data-dcnode-id="2534" instrument_node="">118</span></a></sup></p><span data-dcnode-id="2530" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2528" id="207157856" scrollto-destination="207157856"><span data-dcnode-id="2529" instrument_node="">Conclusion: who are we talking to?</span></h2><span data-dcnode-id="2527" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">Why does attention to IR matter for the response to this and other disease outbreaks? The WHO is the international magnet that brings states together to discuss and collaborate on all matters of health science. The WHO has relied on science to persuade its member states to override their instinctual preferences. But scientific argument is not always enough to sway political forces. Political knowledge, political methods and policy implementation expertise are also needed to inform the problem-solving skills required to understand contemporary sovereign behaviour. The WHO's failure to grasp the political priorities of its member states, and realize that ministries of health do not figure highly among them in many cases, has left the organization struggling to manage and delegate its authority in recent years—as is apparent if we look at the intense contestation about its actions in response to H1N1, MERS, Ebola, Zika and now COVID-19. Everyone needs to be in the room, not just the white coats.</span></p><p class="chapter-para" data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Therefore, we suggest, the WHO (and the broader global health governance landscape) needs to pay serious analytical attention to the competing diplomatic priorities of states. IR scholarship is well placed to assist the WHO with orchestrating states’ geopolitical and diplomatic relationships in all their breadth and depth. The knowledge entry points we have identified in this article should therefore, we suggest, become core business for the WHO and other technical agencies that are seeking to advance optimal diplomatic conditions for coordinated responses to the increased technical challenges to come. In this time of COVID-19, where political decisions are having direct impacts on who lives and who dies, meaningful engagement between public health and IR is vital. Let us end the disciplinary quarantine.</span></p><span data-dcnode-id="2522" instrument_node=""> </span><h2 class="backfootnotegroup-title js-splitscreen-backfootnotegroup-title" data-dcnode-id="2520" id="207157859" scrollto-destination="207157859"><span data-dcnode-id="2521" instrument_node="">Footnotes</span></h2><span data-dcnode-id="2519" instrument_node="">
</span><div class="footnote" content-id="fn1" data-dcnode-id="2505"><span class="fn" data-dcnode-id="2506"><span class="label fn-label" data-dcnode-id="2516"><span class="end-note-link" data-dcnode-id="2517" data-fn-id="fn1" rel="nofollow"><span data-dcnode-id="2518" instrument_node="">1</span></span></span><div class="footnote-content" data-dcnode-id="2507"><p class="footnote-compatibility" data-dcnode-id="2508"><span data-dcnode-id="2515" instrument_node="">Swee Kheng Khor, ‘The politics of the coronavirus outbreak’, </span><em data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Think Global Health</span></em><span data-dcnode-id="2512" instrument_node="">, 24 Jan. 2020, </span><a class="link link-uri openInAnotherWindow" data-dcnode-id="2510" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thinkglobalhealth.org/article/politics-coronavirus-outbreak" target="_blank"><span data-dcnode-id="2511" instrument_node="">https://www.thinkglobalhealth.org/article/politics-coronavirus-outbreak</span></a><span data-dcnode-id="2509" instrument_node="">. (Unless otherwise noted at point of citation, all URLs cited in this article were accessible on 24 July 2020.)</span></p></div></span></div><div class="footnote" content-id="fn2" data-dcnode-id="2491"><span class="fn" data-dcnode-id="2492"><span class="label fn-label" data-dcnode-id="2502"><span class="end-note-link" data-dcnode-id="2503" data-fn-id="fn2" rel="nofollow"><span data-dcnode-id="2504" instrument_node="">2</span></span></span><div class="footnote-content" data-dcnode-id="2493"><p class="footnote-compatibility" data-dcnode-id="2494"><span data-dcnode-id="2501" instrument_node="">Hans Kluge, Jose Maria Martín-Moreno, Nedret Emiroglu, Guenael Rodier, Edward Kelley, Melitta Vujnovic and Govin Permanand, ‘Strengthening global health security by embedding the International Health Regulations requirements into national health systems’, </span
