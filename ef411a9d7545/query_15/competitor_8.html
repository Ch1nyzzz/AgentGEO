</span><h2 class="abstract-title js-splitscreen-abstract-title" data-dcnode-id="3305" id="207157788" scrollto-destination="207157788"><span data-dcnode-id="3306" instrument_node="">Abstract</span></h2><span data-dcnode-id="3304" instrument_node="">
</span><section class="abstract" data-dcnode-id="3301"><p class="chapter-para" data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">The COVID-19 pandemic affects all countries, but how governments respond is dictated by politics. Amid this, the World Health Organization (WHO) has tried to coordinate advice to states and offer ongoing management of the outbreak. Given the political drivers of COVID-19, we argue this is an important moment to advance International Relations knowledge as a necessary and distinctive method for inclusion in the WHO repertoire of knowledge inputs for epidemic control. Historical efforts to assert technical expertise over politics is redundant and outdated: the WHO has always been politicized by member states. We suggest WHO needs to embrace the politics and engage foreign policy and diplomatic expertise. We suggest practical examples of the entry points where International Relations methods can inform public health decision-making and technical policy coordination. We write this as a primer for those working in response to COVID-19 in WHO, multilateral organizations, donor financing departments, governments and international non-governmental organizations, to embrace political analysis rather than shy away from it. Coordinated political cooperation is vital to overcome COVID-19.</span></p></section><span data-dcnode-id="3300" instrument_node=""> </span><div class="article-metadata-panel clearfix at-ArticleMetadata" data-dcnode-id="3277"><div class="article-metadata-taxonomies" data-dcnode-id="3286"><span data-dcnode-id="3299" instrument_node="">
</span><div class="article-metadata" data-dcnode-id="3288"><span data-dcnode-id="3298" instrument_node="">
</span><div class="article-metadata-taxonomies-title" data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">Subject</span></div><span data-dcnode-id="3295" instrument_node="">
</span><a data-dcnode-id="3293" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/ia/search-results%3Fpage%3D1%26tax%3Diaffai/13"><span data-dcnode-id="3294" instrument_node="">Global Health and Development</span></a><span data-dcnode-id="3292" instrument_node="">
</span><a data-dcnode-id="3290" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/ia/search-results%3Fpage%3D1%26tax%3Diaffai/3"><span data-dcnode-id="3291" instrument_node="">International Governance, Law, and Ethics</span></a><span data-dcnode-id="3289" instrument_node="">
</span></div><span data-dcnode-id="3287" instrument_node="">
</span></div><div class="article-metadata-tocSections" data-dcnode-id="3278"><span data-dcnode-id="3285" instrument_node="">
</span><div class="article-metadata-tocSections-title" data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">Issue Section:</span></div><span data-dcnode-id="3282" instrument_node="">
</span><a data-dcnode-id="3280" data-google-interstitial="false" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/ia/search-results%3Ff_TocHeadingTitle%3DArticles"><span data-dcnode-id="3281" instrument_node="">Articles</span></a><span data-dcnode-id="3279" instrument_node="">
</span></div></div><span data-dcnode-id="3276" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3259"><span data-dcnode-id="3275" instrument_node="">The pandemic disease caused by the novel coronavirus (COVID-19) is a political problem as much as it is a public health tragedy. Politics has been at the core of how governments have prepared for and responded to this crisis.</span><sup data-dcnode-id="3271"><span class="xrefLink" data-dcnode-id="3274" id="jumplink-fn1"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3272" data-google-interstitial="false" data-open="fn1" href="javascript:;" reveal-id="fn1"><span data-dcnode-id="3273" instrument_node="">1</span></a></sup><span data-dcnode-id="3270" instrument_node=""> Political decisions have beleaguered or improved outbreak management, sometimes irrespective of the strength of a health system, clearly demonstrating the political determinants of public health.</span><sup data-dcnode-id="3266"><span class="xrefLink" data-dcnode-id="3269" id="jumplink-fn2"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3267" data-google-interstitial="false" data-open="fn2" href="javascript:;" reveal-id="fn2"><span data-dcnode-id="3268" instrument_node="">2</span></a></sup><span data-dcnode-id="3265" instrument_node=""> However, more often than not, politics is presented as an ignoble irritant in contrast to the public health domain: ‘The IO [International Organization] professional staff of medical and public health advocates sought to do what was necessary to stem the epidemics of infectious disease, not to follow the political dictates of its principals [states].’</span><sup data-dcnode-id="3261"><span class="xrefLink" data-dcnode-id="3264" id="jumplink-fn3"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3262" data-google-interstitial="false" data-open="fn3" href="javascript:;" reveal-id="fn3"><span data-dcnode-id="3263" instrument_node="">3</span></a></sup><span data-dcnode-id="3260" instrument_node=""> Yet, as is clear from the different government responses to the outbreak itself, technical decisions require political decisions about who should be consulted, who should provide advice, which models should be used, what policies should be implemented, how such policies should be enforced, and who should be trusted in the international arena. Put simply: politics is deciding how COVID-19 is spreading and whether people are living or dying.</span></p><p class="chapter-para" data-dcnode-id="3247"><span data-dcnode-id="3258" instrument_node="">Political tensions are not limited to the domestic arena. International organizations such as the World Health Organization (WHO) are operating in an increasingly combative and divisive political realm, with proxy battles being waged within these institutions between member states, for example China and the United States. The WHO is considered to be either too political—‘in bed with China’</span><sup data-dcnode-id="3254"><span class="xrefLink" data-dcnode-id="3257" id="jumplink-fn4"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3255" data-google-interstitial="false" data-open="fn4" href="javascript:;" reveal-id="fn4"><span data-dcnode-id="3256" instrument_node="">4</span></a></sup><span data-dcnode-id="3253" instrument_node=""> —or not political enough.</span><sup data-dcnode-id="3249"><span class="xrefLink" data-dcnode-id="3252" id="jumplink-fn5"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3250" data-google-interstitial="false" data-open="fn5" href="javascript:;" reveal-id="fn5"><span data-dcnode-id="3251" instrument_node="">5</span></a></sup><span data-dcnode-id="3248" instrument_node=""> The politics of orchestrating the multiple demands and expectations of states within one international organization is vital to effective management of COVID-19.</span></p><p class="chapter-para" data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">From the outset of COVID-19, we (the authors) have been regularly asked to explain to the media the international relations behind the outbreak response: that is, why states are reporting, testing or responding differently; whether they are heeding the WHO advice or charting their own path; what they are thinking regarding the political, travel and trade ramifications; and how they see themselves compared to their neighbours’ capacity within their respective regional environments. It has struck us, however, that we are rarely asked these questions by WHO or domestic public (health) officials seeking to refine their response efforts.</span></p><p class="chapter-para" data-dcnode-id="3233"><span data-dcnode-id="3244" instrument_node="">A publication from 2018 seems to explain why. This was a piece written by a group of leading global health specialists lamenting the lack of research published on the topic of health security and how to strengthen state capacity to meet the International Health Regulations (IHR).</span><sup data-dcnode-id="3240"><span class="xrefLink" data-dcnode-id="3243" id="jumplink-fn6"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3241" data-google-interstitial="false" data-open="fn6" href="javascript:;" reveal-id="fn6"><span data-dcnode-id="3242" instrument_node="">6</span></a></sup><span data-dcnode-id="3239" instrument_node=""> Despite the vast volume of research by International Relations (IR) scholars on preparedness, prevention and communication of outbreak events,</span><sup data-dcnode-id="3235"><span class="xrefLink" data-dcnode-id="3238" id="jumplink-fn7"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3236" data-google-interstitial="false" data-open="fn7" href="javascript:;" reveal-id="fn7"><span data-dcnode-id="3237" instrument_node="">7</span></a></sup><span data-dcnode-id="3234" instrument_node=""> the IHR and health security more broadly, it appears that social science research is not being read by those in health institutions, and that the public health and global health security communities remain in separate silos.</span></p><p class="chapter-para" data-dcnode-id="3226"><span data-dcnode-id="3232" instrument_node="">The WHO director-general has continued to reiterate that global political cooperation, not isolationism, will be required to halt the spread of COVID-19. We agree. The WHO director-general has recently stated that ‘COVID-19 politics should be quarantined … Politics and partisanship has made things worse. What is important is science solutions and solidarity’.</span><sup data-dcnode-id="3228"><span class="xrefLink" data-dcnode-id="3231" id="jumplink-fn8"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3229" data-google-interstitial="false" data-open="fn8" href="javascript:;" reveal-id="fn8"><span data-dcnode-id="3230" instrument_node="">8</span></a></sup><span data-dcnode-id="3227" instrument_node=""> We respectfully disagree. Political solutions will also be required to achieve international cooperation and solidarity. This article seeks to reach out across the divide between the public health and IR communities to establish what contribution IR scholarship can make to real-time decision-making both during such outbreaks and in the post hoc analysis of emergencies. We argue that there has not been enough recognition of the normative value of diplomacy in preparations for health emergencies, either by the WHO or by states. This deficiency is now having real-world effects on the chances of infection, and indeed survival, for individuals living under a range of different administrations around the world. We need to understand the role of diplomacy and competing political priorities, and find a way in which public health officials can learn to work within these global political constructions.</span></p><p class="chapter-para" data-dcnode-id="3214"><span data-dcnode-id="3225" instrument_node="">We argue that there are important diplomatic entry points, from which disease diplomacy and cooperation could be advanced, that are not being captured owing to the exclusion of IR knowledge from technical health responses, and indeed policy, both within the WHO and within national governments.</span><sup data-dcnode-id="3221"><span class="xrefLink" data-dcnode-id="3224" id="jumplink-fn9"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3222" data-google-interstitial="false" data-open="fn9" href="javascript:;" reveal-id="fn9"><span data-dcnode-id="3223" instrument_node="">9</span></a></sup><span data-dcnode-id="3220" instrument_node=""> The article will develop this argument in two stages. First, we examine how the WHO currently ‘orchestrates’ its authority as an international organization.</span><sup data-dcnode-id="3216"><span class="xrefLink" data-dcnode-id="3219" id="jumplink-fn10"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3217" data-google-interstitial="false" data-open="fn10" href="javascript:;" reveal-id="fn10"><span data-dcnode-id="3218" instrument_node="">10</span></a></sup><span data-dcnode-id="3215" instrument_node=""> In a political environment of anarchy, where the WHO has no direct authority over member states, the organization seeks to claim authority on the basis of performative leadership, normative public health expertise and technical guidance. Within the WHO these soft tools are guarded by public health experts and often deployed as a defensive shield to avoid political attention, while the organization itself remains an entirely political structure. The attempt to avoid politics compromises the work of the WHO. We suggest that the WHO needs to embrace the political alongside the technical, and specifically to engage foreign policy and diplomatic expertise. This may assist with implementation at the ‘hard’ end of international cooperation concerning specific health system responses. Perhaps at a time when it has a former foreign affairs minister, Dr Tedros, at the helm, the WHO can build upon this expertise and use it as a pertinent point of departure for systemic WHO reform.</span></p><p class="chapter-para" data-dcnode-id="3202"><span data-dcnode-id="3213" instrument_node="">Second, we present practical examples of points at which IR could inform public health decision-making and technical policy coordination. We do not claim to have more insight into a political context than the affected governments or communities themselves; but this is precisely our point. It is important to ask more about the political context in which an outbreak is occurring, as well as about the local, regional and global landscape in which cooperation and coordination will be sought.</span><sup data-dcnode-id="3209"><span class="xrefLink" data-dcnode-id="3212" id="jumplink-fn11"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3210" data-google-interstitial="false" data-open="fn11" href="javascript:;" reveal-id="fn11"><span data-dcnode-id="3211" instrument_node="">11</span></a></sup><span data-dcnode-id="3208" instrument_node=""> Failure is not always zero-sum and diplomatic engagement is always possible, even in the direst of circumstances.</span><sup data-dcnode-id="3204"><span class="xrefLink" data-dcnode-id="3207" id="jumplink-fn12"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3205" data-google-interstitial="false" data-open="fn12" href="javascript:;" reveal-id="fn12"><span data-dcnode-id="3206" instrument_node="">12</span></a></sup><span data-dcnode-id="3203" instrument_node=""> Amid the COVID-19 pandemic we can identify diverse narratives about what is going to be the silver bullet to get us out of the crisis; how serious a concern it is; and whose authority we should be following to mitigate the risks posed. We argue that through IR it is possible to identify diplomatic entry points: economic, geopolitical and political opportunities for cooperation, coordination and even resistance before, during and after health emergencies. At the end of this section we provide examples of how IR knowledge can directly engage with and support health diplomacy in managing the COVID-19 crisis.</span></p><p class="chapter-para" data-dcnode-id="3195"><span data-dcnode-id="3201" instrument_node="">At this point we wish to enter one caveat: we acknowledge that many may disagree with our characterization of IR and our advocacy of purposive policy engagement.</span><sup data-dcnode-id="3197"><span class="xrefLink" data-dcnode-id="3200" id="jumplink-fn13"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3198" data-google-interstitial="false" data-open="fn13" href="javascript:;" reveal-id="fn13"><span data-dcnode-id="3199" instrument_node="">13</span></a></sup><span data-dcnode-id="3196" instrument_node=""> We consider ourselves as IR academics who produce policy-relevant research, grounded in the discipline's theory, empirical research and practice. While our work is rooted in constructivist and feminist approaches to international relations, we recognize that theoretical work in IR can seem impenetrable to public health practitioners. We do not wish to lose the broader message. This article is one contribution to what should be a broader and deeper conversation about the potential subdisciplinary, theoretical and policy-specific approaches across political science, comparative politics, IR and public and/or global health.</span></p><span data-dcnode-id="3194" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3192" id="207157798" scrollto-destination="207157798"><span data-dcnode-id="3193" instrument_node="">The COVID-19 pandemic in brief</span></h2><span data-dcnode-id="3191" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">From the very beginning, key tenets of international relations have dominated this outbreak, and cooperation between states and the WHO has dominated the narrative. In January 2020, Dr Tedros was at pains to stress that China was cooperating, and that the WHO did not support the restrictive trade and travel measures being adopted against China by other states and their corporations. No doubt this emphasis was fuelled by a desire to ensure that China continued to engage in a transparent reporting relationship with the WHO so that Beijing would supply much-needed data about the scale of the outbreak and successful prevention or treatment options. The politics of this diplomatic relationship remains hotly contested even six months later: how does the WHO walk the tightrope of preserving a working relationship with China while not condoning delayed outbreak reports and lockdown procedures that may amount to human rights abuses? This question may be asked of many member states with which the WHO must maintain a technical and diplomatic relationship.</span></p><p class="chapter-para" data-dcnode-id="3173"><span data-dcnode-id="3188" instrument_node="">On 22 January, the IHR Emergency Committee convened its first meeting to consider the outbreak. The vote was split on whether it had at that point acquired the status of a public health emergency of international concern (PHEIC).</span><sup data-dcnode-id="3184"><span class="xrefLink" data-dcnode-id="3187" id="jumplink-fn14"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3185" data-google-interstitial="false" data-open="fn14" href="javascript:;" reveal-id="fn14"><span data-dcnode-id="3186" instrument_node="">14</span></a></sup><span data-dcnode-id="3183" instrument_node=""> Some Committee members who were nominated by western countries sided with China at this meeting in taking the view that the novel coronavirus did not yet meet the conditions for a PHEIC.</span><sup data-dcnode-id="3179"><span class="xrefLink" data-dcnode-id="3182" id="jumplink-fn15"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3180" data-google-interstitial="false" data-open="fn15" href="javascript:;" reveal-id="fn15"><span data-dcnode-id="3181" instrument_node="">15</span></a></sup><span data-dcnode-id="3178" instrument_node=""> These meetings are strongly political; in the IHR legislation, the decision to declare a PHEIC remains with the director-general, upon the advice of the Emergency Committee. The Committee is comprised of technical experts (nominated by member states) and representatives from the state in which the health emergency is occurring. The affected member state's position is to be taken into account in the decision-making process. A week later, a PHEIC was declared, albeit still in markedly political terms, with Dr Tedros stating that the decision was not linked to the risks posed in China, but in view of the risks posed to low- and middle-income countries with weak health systems unprepared to manage the demands of a major epidemic.</span><sup data-dcnode-id="3174"><span class="xrefLink" data-dcnode-id="3177" id="jumplink-fn16"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3175" data-google-interstitial="false" data-open="fn16" href="javascript:;" reveal-id="fn16"><span data-dcnode-id="3176" instrument_node="">16</span></a></sup></p><p class="chapter-para" data-dcnode-id="3166"><span data-dcnode-id="3172" instrument_node="">By March the WHO was coming under increasingly strong criticism for ‘appeasing’ China's actions, which included Chinese police threatening medical staff with arrest for any online communication about the outbreak; forced quarantine and lockdown in cities (despite this later becoming the norm globally); and the failure to recognize and address the human and civil rights implications of such interventions.</span><sup data-dcnode-id="3168"><span class="xrefLink" data-dcnode-id="3171" id="jumplink-fn17"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3169" data-google-interstitial="false" data-open="fn17" href="javascript:;" reveal-id="fn17"><span data-dcnode-id="3170" instrument_node="">17</span></a></sup><span data-dcnode-id="3167" instrument_node=""> Others challenged the restrictive travel and trade measures adopted by countries such as the United States, Australia and New Zealand. The Canadian prime minister, Justin Trudeau, said:</span></p><blockquote data-dcnode-id="3159"><p class="chapter-para" data-dcnode-id="3160"><span data-dcnode-id="3165" instrument_node="">We recognize there are countries that make different decisions. The decisions we make are based on the best recommendations of the World Health Organization (WHO) and the tremendous health experts who work within Canada and around the world … There is a lot of misinformation out there, there is a lot of knee-jerk reaction that isn't keeping people safe. That is having real, challenging impacts on communities, on community safety.</span><sup data-dcnode-id="3161"><span class="xrefLink" data-dcnode-id="3164" id="jumplink-fn18"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3162" data-google-interstitial="false" data-open="fn18" href="javascript:;" reveal-id="fn18"><span data-dcnode-id="3163" instrument_node="">18</span></a></sup></p></blockquote><p class="chapter-para" data-dcnode-id="3148"><span data-dcnode-id="3158" instrument_node="">Yet to date the WHO director-general had not called out any individual state for failure to heed WHO advice—although it used sterner language in the face of the UK's approach to seeking ‘herd immunity’ and not rolling out community testing to manage the outbreak as recommended by the WHO.</span><sup data-dcnode-id="3154"><span class="xrefLink" data-dcnode-id="3157" id="jumplink-fn19"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3155" data-google-interstitial="false" data-open="fn19" href="javascript:;" reveal-id="fn19"><span data-dcnode-id="3156" instrument_node="">19</span></a></sup><span data-dcnode-id="3153" instrument_node=""> Even when the United States sought to terminate its relationship with the WHO in June 2020, Dr Tedros sought continued collaboration with Washington.</span><sup data-dcnode-id="3149"><span class="xrefLink" data-dcnode-id="3152" id="jumplink-fn20"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3150" data-google-interstitial="false" data-open="fn20" href="javascript:;" reveal-id="fn20"><span data-dcnode-id="3151" instrument_node="">20</span></a></sup></p><p class="chapter-para" data-dcnode-id="3116"><span data-dcnode-id="3147" instrument_node="">The trust of states in the WHO, as the best delegated authority to steer the international community through COVID-19, is again being tested,</span><sup data-dcnode-id="3143"><span class="xrefLink" data-dcnode-id="3146" id="jumplink-fn21"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3144" data-google-interstitial="false" data-open="fn21" href="javascript:;" reveal-id="fn21"><span data-dcnode-id="3145" instrument_node="">21</span></a></sup><span data-dcnode-id="3142" instrument_node=""> as it was during the Ebola outbreak in 2014–15 and the Zika outbreak in 2016.</span><sup data-dcnode-id="3138"><span class="xrefLink" data-dcnode-id="3141" id="jumplink-fn22"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3139" data-google-interstitial="false" data-open="fn22" href="javascript:;" reveal-id="fn22"><span data-dcnode-id="3140" instrument_node="">22</span></a></sup><span data-dcnode-id="3137" instrument_node=""> For example, very few states adhered to the WHO's trade and travel advice, issued under the IHR.</span><sup data-dcnode-id="3133"><span class="xrefLink" data-dcnode-id="3136" id="jumplink-fn23"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3134" data-google-interstitial="false" data-open="fn23" href="javascript:;" reveal-id="fn23"><span data-dcnode-id="3135" instrument_node="">23</span></a></sup><span data-dcnode-id="3132" instrument_node=""> Nor are all states following the procedures recommended by the WHO to ‘test, trace, isolate’ to limit disease transmission.</span><sup data-dcnode-id="3128"><span class="xrefLink" data-dcnode-id="3131" id="jumplink-fn24"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3129" data-google-interstitial="false" data-open="fn24" href="javascript:;" reveal-id="fn24"><span data-dcnode-id="3130" instrument_node="">24</span></a></sup><span data-dcnode-id="3127" instrument_node=""> This lack of recognition of the WHO's authority to manage COVID-19 is most starkly demonstrated by President Trump's decision on 14 April 2020 to halt funding to the organization, on the grounds of its the apparent failure ‘to adequately obtain, vet and share information [on COVID-19] in a timely and transparent fashion’.</span><sup data-dcnode-id="3123"><span class="xrefLink" data-dcnode-id="3126" id="jumplink-fn25"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3124" data-google-interstitial="false" data-open="fn25" href="javascript:;" reveal-id="fn25"><span data-dcnode-id="3125" instrument_node="">25</span></a></sup><span data-dcnode-id="3122" instrument_node=""> While this claim has been widely refuted, the very fact that it was made demonstrates that trust between actors in the global health arena is not easily established or maintained. Therefore, it was auspicious that the World Health Assembly agreed, in May 2020, that the WHO should initiate an independent evaluation of the ‘lessons learned’ from the international health response to COVID-19. In July 2020, the former New Zealand prime minister Helen Clark and former Liberian president Ellen Johnson Sirleaf were announced as the co-chairs of the Independent Panel for Pandemic Preparedness and Response (IPPR). However, as Dr Tedros said on announcing the creation of the IPPR, whatever lessons are identified, the greatest threat remains the ‘lack of leadership and solidarity at the global and national levels’.</span><sup data-dcnode-id="3118"><span class="xrefLink" data-dcnode-id="3121" id="jumplink-fn26"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3119" data-google-interstitial="false" data-open="fn26" href="javascript:;" reveal-id="fn26"><span data-dcnode-id="3120" instrument_node="">26</span></a></sup><span data-dcnode-id="3117" instrument_node=""> Six months on from the beginning of the outbreak, many domestic responses to COVID-19 are severely lacking, case numbers are soaring and governments are failing to protect their citizens, while the global political focus remains—erroneously, in the view of many—on China and the WHO's alleged failures in the early stages.</span></p><p class="chapter-para" data-dcnode-id="3111"><span data-dcnode-id="3115" instrument_node="">Richard Horton, editor of the </span><em data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">Lancet</span></em><span data-dcnode-id="3112" instrument_node="">, described the current situation as a struggle for the soul of global health:</span></p><blockquote data-dcnode-id="3104"><p class="chapter-para" data-dcnode-id="3105"><span data-dcnode-id="3110" instrument_node="">Global health is typically agnostic about the kind of political system a country chooses to adopt. Global health and its institutions see health systems as separate—technically, socially, economically—from the political ideologies of nations. This view is not sustainable. We cannot say that the terms of political engagement within a country are irrelevant to our hopes for health.</span><sup data-dcnode-id="3106"><span class="xrefLink" data-dcnode-id="3109" id="jumplink-fn27"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3107" data-google-interstitial="false" data-open="fn27" href="javascript:;" reveal-id="fn27"><span data-dcnode-id="3108" instrument_node="">27</span></a></sup></p></blockquote><p class="chapter-para" data-dcnode-id="3097"><span data-dcnode-id="3103" instrument_node="">As IR scholars, we know that global health institutions can never rightly be viewed as separate from politics and political ideology. There are volumes of research detailing the intricate and elaborate politicization of institutions such as the WHO, UNAIDS, GAVI (the Vaccine Alliance) and the World Bank, and initiatives such as PEPFAR (the President's Emergency Plan for AIDS Relief), UNMEER (the UN Mission for Ebola Emergency Response) and Health for All.</span><sup data-dcnode-id="3099"><span class="xrefLink" data-dcnode-id="3102" id="jumplink-fn28"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3100" data-google-interstitial="false" data-open="fn28" href="javascript:;" reveal-id="fn28"><span data-dcnode-id="3101" instrument_node="">28</span></a></sup><span data-dcnode-id="3098" instrument_node=""> The conviction that health could ever be apolitical, in spite of the abundant evidence to the contrary, highlights how little health disciplines have engaged with IR research, despite our collective efforts to seriously engage with theirs. Now is the time for us to support the outbreak response effort and demonstrate how political analysis can enhance global disease control efforts.</span></p><p class="chapter-para" data-dcnode-id="3085"><span data-dcnode-id="3096" instrument_node="">Politics cannot be wished away. Even the most democratic country can stumble over political ideologies and nationalism when facing the strength and pace of a virus outbreak.</span><sup data-dcnode-id="3092"><span class="xrefLink" data-dcnode-id="3095" id="jumplink-fn29"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3093" data-google-interstitial="false" data-open="fn29" href="javascript:;" reveal-id="fn29"><span data-dcnode-id="3094" instrument_node="">29</span></a></sup><span data-dcnode-id="3091" instrument_node=""> The contemporary debate about the wearing of face masks demonstrates this in abundance.</span><sup data-dcnode-id="3087"><span class="xrefLink" data-dcnode-id="3090" id="jumplink-fn30"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3088" data-google-interstitial="false" data-open="fn30" href="javascript:;" reveal-id="fn30"><span data-dcnode-id="3089" instrument_node="">30</span></a></sup><span data-dcnode-id="3086" instrument_node=""> Political forces will dramatically affect the fortunes of public health bodies, the efficacy of technical advice, and faith in the normative value of international health diplomacy.</span></p><p class="chapter-para" data-dcnode-id="3078"><span data-dcnode-id="3084" instrument_node="">How to ‘orchestrate’ the multiple competing approaches of states (and indeed non-state actors within the global health governance landscape) is the task now facing public health experts and, especially, the WHO.</span><sup data-dcnode-id="3080"><span class="xrefLink" data-dcnode-id="3083" id="jumplink-fn31"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3081" data-google-interstitial="false" data-open="fn31" href="javascript:;" reveal-id="fn31"><span data-dcnode-id="3082" instrument_node="">31</span></a></sup><span data-dcnode-id="3079" instrument_node=""> As IR scholars, we have some understanding of the structure, agency and preferences most likely to mobilize states and organizations to act cooperatively rather than as random individual agents in the way that has plagued the COVID-19 response.</span></p><span data-dcnode-id="3077" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="3075" id="207157810" scrollto-destination="207157810"><span data-dcnode-id="3076" instrument_node="">The authority of the WHO</span></h2><span data-dcnode-id="3074" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="3067"><span data-dcnode-id="3073" instrument_node="">As feminist IR scholars, we understand that the decision on who has a seat at the table is a powerful, conscious and political one.</span><sup data-dcnode-id="3069"><span class="xrefLink" data-dcnode-id="3072" id="jumplink-fn32"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3070" data-google-interstitial="false" data-open="fn32" href="javascript:;" reveal-id="fn32"><span data-dcnode-id="3071" instrument_node="">32</span></a></sup><span data-dcnode-id="3068" instrument_node=""> During emergencies, invitations to the table often come down to personal, professional and strategic networks: who is known to the key team, who is respected or feared. We argue that the absence of IR knowledge and expertise is problematic for pandemic response as it means that the political effects of representation, power and inclusion may be overlooked as secondary to the value of technical epidemiological advice. This form of knowledge triage has implications across multiple policy areas.</span></p><p class="chapter-para" data-dcnode-id="3041"><span data-dcnode-id="3066" instrument_node="">Leadership and governance have been identified by public health scholars as two areas where work could be done to improve state capacity to respond to outbreaks, along with transparency and accountability.</span><sup data-dcnode-id="3062"><span class="xrefLink" data-dcnode-id="3065" id="jumplink-fn33"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3063" data-google-interstitial="false" data-open="fn33" href="javascript:;" reveal-id="fn33"><span data-dcnode-id="3064" instrument_node="">33</span></a></sup><span data-dcnode-id="3061" instrument_node=""> Performance in these areas is often measured in terms of the presence of national laws or regulatory frameworks, transparent decision-making structures for federal or centralized systems, evidence-based risk communication channels, and some national-level collaboration system that includes a ‘whole of society’ approach.</span><sup data-dcnode-id="3057"><span class="xrefLink" data-dcnode-id="3060" id="jumplink-fn34"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3058" data-google-interstitial="false" data-open="fn34" href="javascript:;" reveal-id="fn34"><span data-dcnode-id="3059" instrument_node="">34</span></a></sup><span data-dcnode-id="3056" instrument_node=""> However, while transparent and coordinated leadership and governance will assist during any emergency response domestically, a leadership or governance checklist will not always tell us how a state will ‘play’ with others in the global system, perhaps especially at time of crisis—as shown by the Global Health Security Index, which placed the United States in the lead for outbreak preparedness.</span><sup data-dcnode-id="3052"><span class="xrefLink" data-dcnode-id="3055" id="jumplink-fn35"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3053" data-google-interstitial="false" data-open="fn35" href="javascript:;" reveal-id="fn35"><span data-dcnode-id="3054" instrument_node="">35</span></a></sup><span data-dcnode-id="3051" instrument_node=""> States do not exist in a timeless governance vacuum. A state may stay the same but its government may change; nor do governments exercise their responsibilities to health governance exclusively through health ministries and membership of the WHO. States belong to regional communities that may provide more security in this instance.</span><sup data-dcnode-id="3047"><span class="xrefLink" data-dcnode-id="3050" id="jumplink-fn36"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3048" data-google-interstitial="false" data-open="fn36" href="javascript:;" reveal-id="fn36"><span data-dcnode-id="3049" instrument_node="">36</span></a></sup><span data-dcnode-id="3046" instrument_node=""> There are competing transnational forces at work, such as economic stability, even (perhaps especially) during a once-in-a-century health crisis that pulls at the loyalties, interests and trust relationships of the international community. It may not be possible to predict how cultural, gender, racial and economic dynamics will affect how states view themselves, their neighbours and their place in the world during a pandemic, but it is important to recognize, document and analyse potential political effects.</span><sup data-dcnode-id="3042"><span class="xrefLink" data-dcnode-id="3045" id="jumplink-fn37"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3043" data-google-interstitial="false" data-open="fn37" href="javascript:;" reveal-id="fn37"><span data-dcnode-id="3044" instrument_node="">37</span></a></sup></p><p class="chapter-para" data-dcnode-id="3030"><span data-dcnode-id="3040" instrument_node="">What is missing in current global health discussions about the coordinated global response to the current outbreak is an assessment of the international relations environment in which collective action is more likely to overcome domestic conditions of resistance: in brief, an assessment of how to play the two-level game of diplomacy and domestic politics.</span><sup data-dcnode-id="3036"><span class="xrefLink" data-dcnode-id="3039" id="jumplink-fn38"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3037" data-google-interstitial="false" data-open="fn38" href="javascript:;" reveal-id="fn38"><span data-dcnode-id="3038" instrument_node="">38</span></a></sup><span data-dcnode-id="3035" instrument_node=""> This is the game currently being played out between China and the United States through the medium of WHO adherence and interactions. Understanding the relationship between these two key states is vital if we are to understand how best to navigate these discussions and ensure that persistent Cold War-like tensions do not determine the potential success of global COVID-19 interventions.</span><sup data-dcnode-id="3031"><span class="xrefLink" data-dcnode-id="3034" id="jumplink-fn39"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3032" data-google-interstitial="false" data-open="fn39" href="javascript:;" reveal-id="fn39"><span data-dcnode-id="3033" instrument_node="">39</span></a></sup></p><p class="chapter-para" data-dcnode-id="3025"><span data-dcnode-id="3029" instrument_node="">There should be, at the core of the public health advice being issued at the international level, an IR-informed understanding of why states </span><em data-dcnode-id="3027"><span data-dcnode-id="3028" instrument_node="">would</span></em><span data-dcnode-id="3026" instrument_node=""> delegate to the WHO their agency to coordinate public health responses and public health action. As the COVID-19 outbreak progresses, domestic governments are proceeding alone, sometimes independent of the advice offered by the WHO. These actions put multilateral cooperation at risk, at a time when global supply chains, global trade routes and broader international diplomacy will be vital to secure populations and health systems until—if it is ever created—there is a vaccine. And even when (if) there is, coordination of the manufacture, distribution and supply of that vaccine will require more coordinated health diplomacy among very different political regimes and health systems.</span></p><p class="chapter-para" data-dcnode-id="3010"><span data-dcnode-id="3024" instrument_node="">There is an abundant literature on the WHO, global governance, and the management of states’ collective and individual expectations within the pathologies of international organizations, non-governmental organizations and issue-specific networks.</span><sup data-dcnode-id="3020"><span class="xrefLink" data-dcnode-id="3023" id="jumplink-fn40"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3021" data-google-interstitial="false" data-open="fn40" href="javascript:;" reveal-id="fn40"><span data-dcnode-id="3022" instrument_node="">40</span></a></sup><span data-dcnode-id="3019" instrument_node=""> The core message across these studies is that while states always seek to maintain their sovereign independence, it is important to study </span><em data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">when</span></em><span data-dcnode-id="3016" instrument_node=""> states choose to delegate authority to separate organizations to build institutional capacity, encourage moral persuasion or develop enforcement mechanisms. In other words, when do states—irrespective of their political complexion and powers—choose to respond to problems with collective action (shared among states) rather than ‘going it alone’? And, indeed, as states diverge from WHO advice during COVID-19, what can the WHO do to encourage a return to health diplomacy despite these differences? When is expertise required by a ‘third’ actor to ‘orchestrate’ cohesion over the differences between states and the limitations of their relationship?</span><sup data-dcnode-id="3012"><span class="xrefLink" data-dcnode-id="3015" id="jumplink-fn41"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3013" data-google-interstitial="false" data-open="fn41" href="javascript:;" reveal-id="fn41"><span data-dcnode-id="3014" instrument_node="">41</span></a></sup><span data-dcnode-id="3011" instrument_node=""> The degree to which states materially, normatively and strategically adhere to international laws, norms, rules and practices is at the core of what we study in IR.</span></p><p class="chapter-para" data-dcnode-id="2993"><span data-dcnode-id="3009" instrument_node="">We need here to consider briefly the WHO's pre-COVID record of coordinating or orchestrating state cooperation in response to health emergencies. Since the adoption in 2005 of the revised IHR, the primary international instrument and governance mechanism that guides collective behaviour in the event of a disease outbreak, many publications have flagged gaps in implementation. Attached to the IHR are eight core capacity criteria that states are expected to meet through legislation, finance, training, laboratory preparedness, etc. Since 2010, the WHO has received State Parties’ Self-Assessment Annual Reports (SPAR), which review progress in building IHR core capacities and measure performance against 13 criteria and 24 indicators.</span><sup data-dcnode-id="3005"><span class="xrefLink" data-dcnode-id="3008" id="jumplink-fn42"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3006" data-google-interstitial="false" data-open="fn42" href="javascript:;" reveal-id="fn42"><span data-dcnode-id="3007" instrument_node="">42</span></a></sup><span data-dcnode-id="3004" instrument_node=""> In addition, since 2016 the WHO has coordinated nearly 100 (96) joint evaluation exercises (JEE) in which, upon state invitation, an external committee is sent in to evaluate how the state is meeting its IHR obligations.</span><sup data-dcnode-id="3000"><span class="xrefLink" data-dcnode-id="3003" id="jumplink-fn43"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="3001" data-google-interstitial="false" data-open="fn43" href="javascript:;" reveal-id="fn43"><span data-dcnode-id="3002" instrument_node="">43</span></a></sup><span data-dcnode-id="2999" instrument_node=""> It is in these focused areas that issue-specific agents such as the WHO are attractive to state principals because ‘they [WHO] offer consistent governance schemes that lower transaction costs involved in establishing collaborative ties’.</span><sup data-dcnode-id="2995"><span class="xrefLink" data-dcnode-id="2998" id="jumplink-fn44"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2996" data-google-interstitial="false" data-open="fn44" href="javascript:;" reveal-id="fn44"><span data-dcnode-id="2997" instrument_node="">44</span></a></sup><span data-dcnode-id="2994" instrument_node=""> The question is whether the WHO has been able to capitalize on the consent previously won from its state principals—advising on health emergencies—for a situation such as current COVID-19 crisis.</span></p><p class="chapter-para" data-dcnode-id="2977"><span data-dcnode-id="2992" instrument_node="">Attempts to manage differing contexts have been considered by the WHO, but the JEE process has primarily focused on structural questions such as size of country, federated systems and overseas territories, rather than considering a more holistic contemporary political picture, with analysis of governance capacity and human rights in relation to operationalizing the IHR.</span><sup data-dcnode-id="2988"><span class="xrefLink" data-dcnode-id="2991" id="jumplink-fn45"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2989" data-google-interstitial="false" data-open="fn45" href="javascript:;" reveal-id="fn45"><span data-dcnode-id="2990" instrument_node="">45</span></a></sup><span data-dcnode-id="2987" instrument_node=""> The vast majority of the knowledge gathered through the IHR eSPAR website, the SPAR guidance documents and the JEE guidance documents concerns states’ legislation, epidemiological training and technical proficiency. It is in these terms that the capacity to meet the IHR is assessed.</span><sup data-dcnode-id="2983"><span class="xrefLink" data-dcnode-id="2986" id="jumplink-fn46"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2984" data-google-interstitial="false" data-open="fn46" href="javascript:;" reveal-id="fn46"><span data-dcnode-id="2985" instrument_node="">46</span></a></sup><span data-dcnode-id="2982" instrument_node=""> Put another way, a state's capacity to meet the IHR has been separated from its political, economic, diplomatic and human rights positionality. As the COVID-19 outbreak clearly shows, the WHO's attempt to ascertain state capacity primarily through public health indicators neglects the range of historic, economic, political and social institutions that support state implementation of the IHR (and indeed any international legal instrument).</span><sup data-dcnode-id="2978"><span class="xrefLink" data-dcnode-id="2981" id="jumplink-fn47"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2979" data-google-interstitial="false" data-open="fn47" href="javascript:;" reveal-id="fn47"><span data-dcnode-id="2980" instrument_node="">47</span></a></sup></p><p class="chapter-para" data-dcnode-id="2966"><span data-dcnode-id="2976" instrument_node="">Obviously, in a highly charged environment such as a health emergency, understanding the political and socio-economic conditions within a country, as well as its economic and diplomatic interests in relation to neighbouring states—what may constrain or enable cooperation and coordination—becomes essential.</span><sup data-dcnode-id="2972"><span class="xrefLink" data-dcnode-id="2975" id="jumplink-fn48"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2973" data-google-interstitial="false" data-open="fn48" href="javascript:;" reveal-id="fn48"><span data-dcnode-id="2974" instrument_node="">48</span></a></sup><span data-dcnode-id="2971" instrument_node=""> In an international crisis such as this, a ‘we feeling’ might create a dynamic process of mutual sympathy, consideration, loyalty, trust and responsiveness in decision-making which could facilitate a global response to COVID-19; equally, individual state-centric concern for pandemic security also has the potential to become a barrier to such cooperation.</span><sup data-dcnode-id="2967"><span class="xrefLink" data-dcnode-id="2970" id="jumplink-fn49"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2968" data-google-interstitial="false" data-open="fn49" href="javascript:;" reveal-id="fn49"><span data-dcnode-id="2969" instrument_node="">49</span></a></sup></p><p class="chapter-para" data-dcnode-id="2950"><span data-dcnode-id="2965" instrument_node="">Historically, the WHO has faced few organizational competitors for its pre-eminent role as lead actor in international health governance orchestration, especially in health emergencies.</span><sup data-dcnode-id="2961"><span class="xrefLink" data-dcnode-id="2964" id="jumplink-fn50"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2962" data-google-interstitial="false" data-open="fn50" href="javascript:;" reveal-id="fn50"><span data-dcnode-id="2963" instrument_node="">50</span></a></sup><span data-dcnode-id="2960" instrument_node=""> The WHO is uniquely positioned—owing to its history as the conductor of international health for over 60 years—to disseminate advice that can serve to enable cooperation.</span><sup data-dcnode-id="2956"><span class="xrefLink" data-dcnode-id="2959" id="jumplink-fn51"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2957" data-google-interstitial="false" data-open="fn51" href="javascript:;" reveal-id="fn51"><span data-dcnode-id="2958" instrument_node="">51</span></a></sup><span data-dcnode-id="2955" instrument_node=""> Ultimately, health issues transcend borders, and the WHO has done a brilliant job in understanding the importance of claiming international technical authority; it has done less well, however, in appreciating and understanding the political or problem-solving skills required to understand contemporary sovereign behaviour. The WHO's failure to grasp the political priorities of its member states, and realize that health is not a first, second or third diplomatic priority for many of its members, has left the organization struggling in recent years with how to manage and delegate its authority, as evidenced by the intense contestation about its actions in response to H1N1, MERS, Ebola, Zika and now COVID-19.</span><sup data-dcnode-id="2951"><span class="xrefLink" data-dcnode-id="2954" id="jumplink-fn52"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2952" data-google-interstitial="false" data-open="fn52" href="javascript:;" reveal-id="fn52"><span data-dcnode-id="2953" instrument_node="">52</span></a></sup></p><p class="chapter-para" data-dcnode-id="2943"><span data-dcnode-id="2949" instrument_node="">We suggest that the WHO (along with other actors in the broader global health governance landscape) needs to pay serious attention to whether it has taken advantage of all knowledge tools in addressing the politics of pandemic response and coordination. It is helpful to conceptualize the WHO's authority as a conductor because it is important to note that despite the fractious political circumstances in which it is embroiled, as an organization and an institution it is in a rarefied position to ‘conduct’ expertise in response to the COVID-19 outbreak. Orchestration by a technical international organization requires imparting technical advice while being aware of the political environment in which the organization exists, and informed by knowledge of the competing diplomatic priorities of states. IR scholarship is well placed to assist the WHO with this understanding, advising on states’ geopolitical and diplomatic relationships beyond a technical health focus.</span><sup data-dcnode-id="2945"><span class="xrefLink" data-dcnode-id="2948" id="jumplink-fn53"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2946" data-google-interstitial="false" data-open="fn53" href="javascript:;" reveal-id="fn53"><span data-dcnode-id="2947" instrument_node="">53</span></a></sup><span data-dcnode-id="2944" instrument_node=""> Such IR knowledge inputs (and methods), we suggest, should become core business for the WHO and other technical agencies that are seeking to establish optimal diplomatic conditions for coordinated responses to public health challenges. We call for such IR assessments to become a component part of JEE reviews and of the IHR Emergency Committee decision-making process, in order to ensure that the political determinants of health are understood, and that subsequent domestic and foreign policies and politics do not have spillover effects on global infectious disease control.</span></p><span data-dcnode-id="2942" instrument_node=""> </span><h2 class="section-title js-splitscreen-section-title" data-dcnode-id="2940" id="207157821" scrollto-destination="207157821"><span data-dcnode-id="2941" instrument_node="">Entry points for IR in health emergency planning and response</span></h2><span data-dcnode-id="2939" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2932"><span data-dcnode-id="2938" instrument_node="">IR deals with the interrelationship between domestic and international politics. In any kind of emergency, including a health emergency, it is important first to have an understanding of the contemporary political environment—not to assume that such knowledge is ‘common sense’ or can easily be aligned with ‘past experiences’.</span><sup data-dcnode-id="2934"><span class="xrefLink" data-dcnode-id="2937" id="jumplink-fn54"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2935" data-google-interstitial="false" data-open="fn54" href="javascript:;" reveal-id="fn54"><span data-dcnode-id="2936" instrument_node="">54</span></a></sup><span data-dcnode-id="2933" instrument_node=""> Politics changes domestically and internationally on a daily basis as governments and non-governmental actors react to new events. Every outbreak deserves recognition as unique. Every state has dynamic priorities, agendas and conditions that may affect its response to a new emergency, and the invitation to international cooperation may be received very differently from one year to the next. Keeping track of the diplomatic conditions that may enable, or constrain, states’ cooperation during an emergency is of paramount importance to a successful health emergency response.</span></p><p class="chapter-para" data-dcnode-id="2920"><span data-dcnode-id="2931" instrument_node="">IR can offer ‘entry points’ for understanding cooperation and coordination between states, and where barriers may arise. One option may be to create a Politics in Health Emergencies provision, similar to the Social Science in Humanitarian Action service, established as a result of the Ebola outbreak in west Africa by anthropologists at the Institute of Development Studies, the London School of Hygiene and Tropical Medicine, and Anthrologica: a great example of how one social science—anthropology—facilitated communication within the WHO and beyond to understand what was missing from interactions between international organizations, states and academics.</span><sup data-dcnode-id="2927"><span class="xrefLink" data-dcnode-id="2930" id="jumplink-fn55"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2928" data-google-interstitial="false" data-open="fn55" href="javascript:;" reveal-id="fn55"><span data-dcnode-id="2929" instrument_node="">55</span></a></sup><span data-dcnode-id="2926" instrument_node=""> Already, during COVID-19, we are seeing the creation of advisory groups, such as the post-crisis recovery specialists’ groups in Germany (including jurists and philosophers) and the Australian University's Group of 8 Roadmap to Recovery Task Force, which includes subgroups on international relations, human rights and vulnerable populations. Within the WHO, it is time to revisit the Secretariat's normative preference for health professionals and seriously engage with the contribution of political science expertise. For example, just as anthropologists are now routinely engaged by IHR committees, why not also permit decisions concerning a PHEIC declaration to be informed by human rights, diplomatic and political implications? An independent analysis of a country's diplomatic capacity to report and verify outbreak events appears to be especially vital when deciding if an outbreak could escalate.</span><sup data-dcnode-id="2922"><span class="xrefLink" data-dcnode-id="2925" id="jumplink-fn56"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2923" data-google-interstitial="false" data-open="fn56" href="javascript:;" reveal-id="fn56"><span data-dcnode-id="2924" instrument_node="">56</span></a></sup><span data-dcnode-id="2921" instrument_node=""> Clearly, the best surveillance system in the world is futile if governments are not willing to share their data internally or globally, and if regions do not trust the reports; and the WHO can be placed in a politically precarious position of defending a ‘Potemkin village’.</span></p><p class="chapter-para" data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">We describe below five tangible ‘entry points’ through which IR can contribute to international organizations and state governments in health emergencies, and the real-world consequences of what has happened in the absence of such inputs.</span></p><span data-dcnode-id="2917" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2915" id="207157825" scrollto-destination="207157825"><span data-dcnode-id="2916" instrument_node="">Comparative analysis—because politics is not the same everywhere</span></h3><span data-dcnode-id="2914" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">IR offers analysis of the formal and informal political and governance landscape, and the impact this will have on disease transmission. Every state is unique, with its own political structures and nuances. In each case, the executive, legislative and judicial branches of government will look different, and decision-making power is diffused differently among actors. Trust between institutions may also affect the timing and engagement strategies of health diplomacy. Area-specific political scientists and comparative analysts, working alongside conflict and humanitarian analysts and global health governance experts, can support the global health community in navigating these institutional differences and the associated tensions. Knowing the ‘sweet spot’ for interacting with a particular state is vital for mitigating the risks posed by health emergencies.</span></p><p class="chapter-para" data-dcnode-id="2905"><span data-dcnode-id="2911" instrument_node="">Different structural and historical developments will further affect which ministries have authority to make decisions, which have effective mandates for implementing outbreak responses, and their respective operational capabilities.</span><sup data-dcnode-id="2907"><span class="xrefLink" data-dcnode-id="2910" id="jumplink-fn57"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2908" data-google-interstitial="false" data-open="fn57" href="javascript:;" reveal-id="fn57"><span data-dcnode-id="2909" instrument_node="">57</span></a></sup><span data-dcnode-id="2906" instrument_node=""> The political history of a country, including its legacies in respect of colonialism or patronage politics, is also vital for understanding the health landscape within a particular location, and who may be influencing decision-makers behind the scenes. Working with political scientists who know the landscape of the health and political sectors in a given location at the start of the outbreak can ensure that conversations are had with the relevant parties, in the relevant order, and facilitate a global outlook towards the response.</span></p><p class="chapter-para" data-dcnode-id="2893"><span data-dcnode-id="2904" instrument_node="">The failure to think about governance concerns can have significant real-world implications. During the Ebola outbreak in west Africa, a lack of governance knowledge on the ground exacerbated the apparent haphazardness of WHO Headquarters’ response through both international actors and domestic political actors, leading to the unprecedented deployment of international militaries and the creation of a new UN institutional response, UNMEER.</span><sup data-dcnode-id="2900"><span class="xrefLink" data-dcnode-id="2903" id="jumplink-fn58"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2901" data-google-interstitial="false" data-open="fn58" href="javascript:;" reveal-id="fn58"><span data-dcnode-id="2902" instrument_node="">58</span></a></sup><span data-dcnode-id="2899" instrument_node=""> Political analysis within the WHO prior to these actions might have recognized the existing role of the UN Mission in Liberia (UNMIL) and the UN Office for Coordination of Humanitarian Affairs (UNOCHA) and the potential of these bodies in informing, supporting and directing the WHO's response to this humanitarian emergency. Efforts could have been made sooner to engage with the strong and growing civil society movements within west African states, bodies that already had an established presence and the trust of local and diplomatic communities.</span><sup data-dcnode-id="2895"><span class="xrefLink" data-dcnode-id="2898" id="jumplink-fn59"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2896" data-google-interstitial="false" data-open="fn59" href="javascript:;" reveal-id="fn59"><span data-dcnode-id="2897" instrument_node="">59</span></a></sup><span data-dcnode-id="2894" instrument_node=""> IR guidance at this early stage could have identified alternative hybrid governance mechanisms that could have assisted WHO Headquarters’ response to the outbreak.</span></p><p class="chapter-para" data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Political expertise, then, can be highly pertinent in disease outbreaks, allowing the WHO quickly to understand the landscape of a particular location, including the different agendas and competing interest groups operating there. At moments of crisis, this type of knowledge can be invaluable to avoid wasting precious time in a race against an epidemic. One important ‘added value’ of IR expertise over that of government officials is that we can also advise on the informal governance structures that are relevant in an outbreak. Local authority may lie with particular social movements, tribal groups, religious denominations or dominant popular voices. Governments aren't going to tell you, public health officials may know but can't say, and scientists may find the political scene an endless irritant or a threat to their independence. In outbreaks reliant on social messaging and risk communication, knowing the formal and informal mechanisms of statecraft can make all the difference.</span></p><span data-dcnode-id="2890" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2888" id="207157830" scrollto-destination="207157830"><span data-dcnode-id="2889" instrument_node="">Governance: the international politics of disease outbreaks</span></h3><span data-dcnode-id="2887" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2875"><span data-dcnode-id="2886" instrument_node="">Disease outbreaks reveal strains on collective governance. IR can provide public health officials with an understanding of the pre-existing transnational networks established before the crisis, and which are most likely to feel its impacts.</span><sup data-dcnode-id="2882"><span class="xrefLink" data-dcnode-id="2885" id="jumplink-fn60"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2883" data-google-interstitial="false" data-open="fn60" href="javascript:;" reveal-id="fn60"><span data-dcnode-id="2884" instrument_node="">60</span></a></sup><span data-dcnode-id="2881" instrument_node=""> For example, global governance analysis explains how the WHO works and how it interacts with sovereign member states and other actors in the global health regime. Previous research has considered the shifting power and agency of the organization both in ‘peace time’ and in times of health emergencies.</span><sup data-dcnode-id="2877"><span class="xrefLink" data-dcnode-id="2880" id="jumplink-fn61"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2878" data-google-interstitial="false" data-open="fn61" href="javascript:;" reveal-id="fn61"><span data-dcnode-id="2879" instrument_node="">61</span></a></sup><span data-dcnode-id="2876" instrument_node=""> The study of global governance conceptualizes the WHO within a larger international ecosystem, considering what has worked, what has been challenged by member states, what has brought states together and divided them, and how to embed any lessons learned to enhance authority when needed. In-depth analysis of the WHO and its position within the broader global health landscape is vital for building a typology of which political manoeuvres work (and which don't) during crises.</span></p><p class="chapter-para" data-dcnode-id="2863"><span data-dcnode-id="2874" instrument_node="">IR scholars have been studying the WHO's role as an international political actor for some time, and providing insight on the ramifications of its failure to grasp its political role. During the 2009 H1N1 and the 2014 west African Ebola outbreaks, a mismatch arose between what the WHO is mandated to do in its constitution, as the ‘directing and coordinating authority in global health’,</span><sup data-dcnode-id="2870"><span class="xrefLink" data-dcnode-id="2873" id="jumplink-fn62"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2871" data-google-interstitial="false" data-open="fn62" href="javascript:;" reveal-id="fn62"><span data-dcnode-id="2872" instrument_node="">62</span></a></sup><span data-dcnode-id="2869" instrument_node=""> and what the world expected it to do. During H1N1 the world expected less from the WHO; and then in 2014, the world wanted an operational team ready to respond to outbreaks with personnel on the ground.</span><sup data-dcnode-id="2865"><span class="xrefLink" data-dcnode-id="2868" id="jumplink-fn63"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2866" data-google-interstitial="false" data-open="fn63" href="javascript:;" reveal-id="fn63"><span data-dcnode-id="2867" instrument_node="">63</span></a></sup><span data-dcnode-id="2864" instrument_node=""> IR provides nuance to the international politics of outbreaks. It is our ‘business’ to understand how states may choose to interact with one another and the WHO during health emergencies.</span></p><p class="chapter-para" data-dcnode-id="2851"><span data-dcnode-id="2862" instrument_node="">Global health security is predicated on norms of reciprocity, solidarity and sovereignty within the international community. These are embedded within competing global regulatory and legal frameworks which govern global disease control; IR can explain departures from these frameworks. For example, prior to 2006, governments were normatively expected to share virus samples of new pathogens with the WHO, so that it could harness the power of the global health community to undertake research into vaccine or treatment options. In 2007, Indonesia challenged this normative understanding and status quo when it refused to share a viral sample of H5N1 with the WHO, citing the Convention on Biological Diversity and ownership of biological samples within a sovereign state, leading to considerable diplomatic tension.</span><sup data-dcnode-id="2858"><span class="xrefLink" data-dcnode-id="2861" id="jumplink-fn64"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2859" data-google-interstitial="false" data-open="fn64" href="javascript:;" reveal-id="fn64"><span data-dcnode-id="2860" instrument_node="">64</span></a></sup><span data-dcnode-id="2857" instrument_node=""> Their fear was of reciprocity of a different kind: they feared that vaccines developed from their virus samples would be unaffordable or unavailable to them, in view of prevalent geopolitical economic structures and power relations. An understanding of politics between states, and of Indonesia's own world-view, would have allowed for nuanced negotiations from the start to mitigate such fears. The issue of equitable vaccine distribution is not resolved and is likely to rear its head again if a vaccine is ever developed for COVID-19, despite the hard work undertaken by a range of actors to secure equitable distribution of associated treatments and vaccines. The WHO, through the Pandemic Influenza Preparedness Framework and the Coalition for Epidemic Preparedness Innovations (CEPI),</span><sup data-dcnode-id="2853"><span class="xrefLink" data-dcnode-id="2856" id="jumplink-fn65"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2854" data-google-interstitial="false" data-open="fn65" href="javascript:;" reveal-id="fn65"><span data-dcnode-id="2855" instrument_node="">65</span></a></sup><span data-dcnode-id="2852" instrument_node=""> attempts to construct scientific and legal solutions, which ignore politics at their peril.</span></p><p class="chapter-para" data-dcnode-id="2826"><span data-dcnode-id="2850" instrument_node="">IR scholarship has also studied state compliance in reporting disease outbreaks to the WHO (and other states), and the conditions under which states willingly share such data.</span><sup data-dcnode-id="2846"><span class="xrefLink" data-dcnode-id="2849" id="jumplink-fn66"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2847" data-google-interstitial="false" data-open="fn66" href="javascript:;" reveal-id="fn66"><span data-dcnode-id="2848" instrument_node="">66</span></a></sup><span data-dcnode-id="2845" instrument_node=""> Understanding how and when states comply with global disease transparency is vital to the management of any outbreak response. This issue was first identified by scholars following Chinese activities during the SARS outbreak, when the Beijing government's delay in reporting, and its concealment of cases, led to a fundamental revision to global disease governance through the revisions to the IHR.</span><sup data-dcnode-id="2841"><span class="xrefLink" data-dcnode-id="2844" id="jumplink-fn67"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2842" data-google-interstitial="false" data-open="fn67" href="javascript:;" reveal-id="fn67"><span data-dcnode-id="2843" instrument_node="">67</span></a></sup><span data-dcnode-id="2840" instrument_node=""> Over the past two decades, IR scholars have sought to understand how and when governments report. During the H5N1 outbreak, it appeared that states did willingly share epidemiological data with neighbouring states and the WHO.</span><sup data-dcnode-id="2836"><span class="xrefLink" data-dcnode-id="2839" id="jumplink-fn68"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2837" data-google-interstitial="false" data-open="fn68" href="javascript:;" reveal-id="fn68"><span data-dcnode-id="2838" instrument_node="">68</span></a></sup><span data-dcnode-id="2835" instrument_node=""> Yet this is not always the case, with significant rumours that Tanzania concealed the spread of Ebola from the neighbouring Democratic Republic of Congo (DRC) in 2019, and Turkmenistan insisting in July 2020 that it has zero cases of COVID-19.</span><sup data-dcnode-id="2831"><span class="xrefLink" data-dcnode-id="2834" id="jumplink-fn69"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2832" data-google-interstitial="false" data-open="fn69" href="javascript:;" reveal-id="fn69"><span data-dcnode-id="2833" instrument_node="">69</span></a></sup><span data-dcnode-id="2830" instrument_node=""> IR scholars seek to understand these differences on the basis of contextual factors relating to the states involved and the particular risks posed to reporting, whether economic, political and/or social. Public health officials know states are not the same; IR studies </span><em data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">why</span></em><span data-dcnode-id="2827" instrument_node=""> states are not the same. In doing so, it moves beyond the legal structures such as the IHR to understand when departure from regulations occurs and when their diffusion is successful. We study what public health officials want to know—the political levers and pulleys that mobilize serious health commitments.</span></p><span data-dcnode-id="2825" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2823" id="207157835" scrollto-destination="207157835"><span data-dcnode-id="2824" instrument_node="">Political economy: money and power</span></h3><span data-dcnode-id="2822" instrument_node="">
</span><p class="chapter-para" data-dcnode-id="2805"><span data-dcnode-id="2821" instrument_node="">IR examines when states work alongside multilateral or regional institutions and when they do not—and, crucially, where the money goes within these commitments. Outside health emergencies, where the WHO's voice remains strong, the organization is being led rather than leading. The increased contribution to the WHO's voluntary budget over its core budget means there are powerful funding actors who increasingly decide on the focus and direction of the organization's programmes,</span><sup data-dcnode-id="2817"><span class="xrefLink" data-dcnode-id="2820" id="jumplink-fn70"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2818" data-google-interstitial="false" data-open="fn70" href="javascript:;" reveal-id="fn70"><span data-dcnode-id="2819" instrument_node="">70</span></a></sup><span data-dcnode-id="2816" instrument_node=""> and its total income is a fraction of the major bilateral assistance programmes run from the United States and China.</span><sup data-dcnode-id="2812"><span class="xrefLink" data-dcnode-id="2815" id="jumplink-fn71"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2813" data-google-interstitial="false" data-open="fn71" href="javascript:;" reveal-id="fn71"><span data-dcnode-id="2814" instrument_node="">71</span></a></sup><span data-dcnode-id="2811" instrument_node=""> The WHO does not necessarily get the first phone call or the first injection of funds. The precarious financing mechanisms within the WHO, with underfunded assessed contributions and voluntary programme funds linked to external actors’ domestic or personal objectives, mean that the organization does not control 80 per cent of its own budget.</span><sup data-dcnode-id="2807"><span class="xrefLink" data-dcnode-id="2810" id="jumplink-fn72"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2808" data-google-interstitial="false" data-open="fn72" href="javascript:;" reveal-id="fn72"><span data-dcnode-id="2809" instrument_node="">72</span></a></sup><span data-dcnode-id="2806" instrument_node=""> The legislative power granted to the WHO (by article 43 of the 2005 IHR) to implement additional health measures is constrained by the lack of a sustained funding mechanism (suggested in article 44) through which countries can cooperatively support each other to build core competencies for disease surveillance and response. The WHO will never have the financial or political support it needs to implement all the activities it might wish to undertake to improve public health. States and the organization must know this. Moreover, with the recent cessation of funds from the Trump administration, this precariousness is ever more apparent. But the argument for change and more money is getting tired. No UN agency is getting more money. What can the WHO do about the inevitable reality?</span></p><p class="chapter-para" data-dcnode-id="2798"><span data-dcnode-id="2804" instrument_node="">In an ever more constrained financial environment, it is vital to identify the instances where states seek the cooperation of the WHO to assist with external health diplomacy. This may take the form of novel health governance arrangements, such as the Asia–Pacific Strategy for Emerging Diseases (APSED), adopted by the WHO's Western Pacific and South-East Asia Regional Offices after SARS and H5N1. Deliberate entreaties to regional institutions such as ASEAN and ASEAN+3 created a politically inclusive network, and the new body was attractive to donors because it had a clear, shared regional purpose tailored to political needs and realities. There is a diplomatic balancing act in such arrangements that requires the WHO to play to both its normative and its technical strengths—in this case, creating an epistemic community of politically diverse experts and bureaucrats from two regions through dense learning and sharing networks.</span><sup data-dcnode-id="2800"><span class="xrefLink" data-dcnode-id="2803" id="jumplink-fn73"></span><a class="link link-ref link-reveal xref-fn js-xref-fn" data-dcnode-id="2801" data-google-interstitial="false" data-open="fn73" href="javascript:;" reveal-id="fn73"><span data-dcnode-id="2802" instrument_node="">73</span></a></sup><span data-dcnode-id="2799" instrument_node=""> In the post-COVID-19 era, the WHO will need to embrace these new forms of collective power and hybrid governance engagements to establish its epistemic authority and attract donor interest. IR can provide the knowledge inputs to identify opportunities for regional and subregional diplomatic engagement, cooperation and planning, being well versed in the creation of security communities.</span></p><span data-dcnode-id="2797" instrument_node=""> </span><h3 class="section-title js-splitscreen-section-title" data-dcnode-id="2795" id="207157838" scrollto-destination="207157838"><span data-dcnode-id="2796" instrument_node="">Human rights: trust and information</span></h3><span data-dcnode-id="2794" instrument_node="">
