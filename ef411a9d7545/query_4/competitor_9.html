><span data-dcnode-id="692" instrument_node="">By Corinne Lane &nbsp; &nbsp;  September 15, 2015 &nbsp; &nbsp; </span><span class="comments-link" data-dcnode-id="689"><a data-dcnode-id="690" href="#comments"><span data-dcnode-id="691" instrument_node="">12 Comments</span></a></span></p><div data-dcnode-id="499" id="readwidth" itemprop="articleBody"><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Here are Donald Trump’s astrological strengths and weaknesses as they relate to the US Presidential Election. These are things in Donald Trump’s astrological birth chart that would help him during the election season, and also factors that may work against him.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Donald Trump is a 2016 US Presidential Candidate who is seeking the Republican Party nomination.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">Donald Trump was born on June 14, 1946.</span><sup data-dcnode-id="678"><a data-dcnode-id="679" href="#footnotes"><span data-dcnode-id="680" instrument_node="">[1]</span></a></sup></p><span data-dcnode-id="676" instrument_node="">
</span><h2 data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Strengths in Donald Trump’s Birth Chart</span></h2><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">The first thing that stands out from Donald Trump’s birth chart is that he has the royal fixed star, Regulus, conjunct to his Ascendant. Regulus is one of the four Royal Stars of Persia, and the only one known as “The Royal Star,” the Star of Kings, and the “Heart of the Lion” (or Lion’s Heart. </span><em data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Cor Leonis</span></em><span data-dcnode-id="669" instrument_node=""> in Italian).</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">With Regulus on the Ascendant, Donald Trump can’t help but to have a “majestic temperament.”</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Donald Trump is extremely lucky to have been born with this honor. Having any of the Royal Fixed Stars on the Ascendant promises power, success, honor, charisma, wealth, and special talents as long as one mandatory condition is met (explained below). </span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="660" instrument_node="">Regulus, in particular, also promises military honors and victory over enemies.</span><sup data-dcnode-id="657"><a data-dcnode-id="658" href="#footnotes"><span data-dcnode-id="659" instrument_node="">[2]</span></a></sup><span data-dcnode-id="656" instrument_node=""> This influence is doubled because Donald Trump has Mars near the Ascendant. Mars near Regulus promises honor, fame, strong character, public prominence, and </span><em data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">high military command.</span></em><sup data-dcnode-id="651"><a data-dcnode-id="652" href="#footnotes"><span data-dcnode-id="653" instrument_node="">[2]</span></a></sup></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Not enough good things can be said about having Regulus conjunct the Ascendant. It makes one courageous, frank, and noble. It allows Donald to see the big picture of things. </span></p><span data-dcnode-id="646" instrument_node="">
</span><blockquote class="font_normal" data-dcnode-id="640"><p data-dcnode-id="641"><span data-dcnode-id="645" instrument_node="">those who have this star prominent are esteemed, commanding, independent, outspoken, great-souled and honor-loving, often wealthy and born leaders of men.”</span><sup data-dcnode-id="642"><a data-dcnode-id="643" href="#footnotes"><span data-dcnode-id="644" instrument_node="">[3]</span></a></sup></p></blockquote><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">However, one big condition must be met for Donald Trump to receive all the benefits of Regulus. Donald must avoid revenge. That’s what Regulus requires. </span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="635" instrument_node="">Regulus promises great success if revenge can be avoided.</span><sup data-dcnode-id="632"><a data-dcnode-id="633" href="#footnotes"><span data-dcnode-id="634" instrument_node="">[4]</span></a></sup><span data-dcnode-id="631" instrument_node=""> If Donald Trump engages in revenge, Regulus promises a falling from grace.</span></p><span data-dcnode-id="629" instrument_node="">
</span><blockquote class="font_normal" data-dcnode-id="623"><p data-dcnode-id="624"><span data-dcnode-id="628" instrument_node="">If, out of anger or hurt, the person takes revenge, then as promised with all Royal Stars, there is a falling from grace.”</span><sup data-dcnode-id="625"><a data-dcnode-id="626" href="#footnotes"><span data-dcnode-id="627" instrument_node="">[4]</span></a></sup></p></blockquote><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="621" instrument_node="">Falling from the grace of Regulus can bring violence, trouble, sickness, and scandal.</span><sup data-dcnode-id="618"><a data-dcnode-id="619" href="#footnotes"><span data-dcnode-id="620" instrument_node="">[2]</span></a></sup><span data-dcnode-id="617" instrument_node=""> Regulus can take away all that has been gained. As long as revenge is avoided, the sky is the limit for Donald Trump.</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Donald Trump’s birth chart has a “bowl” chart pattern with Uranus as the leading planet. He can be very dedicated to “Uranian” ideals, such as being an innovator, free-thinker, revolutionary, rebellious, and champion of the underdogs of society.</span></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Donald Trump has Uranus in conjunction to his Sun and North Node in Gemini in his tenth House. The North Node is our destiny. In Donald’s case, his destiny is related to reform and collective improvements (Uranus), and to the Uranian ideals listed above. With Uranus conjunct North Node, Donald is brilliant and original, but can also be eccentric and rebellious. It’s his destiny to be revolutionary. Because the Sun is involved, he can tend to be self-absorbed, but also warm and generous. This placement also guarantees overwhelming opportunities in life.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Donald Trump has Jupiter making a trine aspect to Uranus, and this is his chart’s tightest major aspect so it will play a prominent part in his life. Jupiter trine Uranus is considered a good luck aspect. (It’s known to denote wealth, but that’s not a big shocker.) This is a humanitarian aspect. People with this aspect want to shake up society to improve the lives of the underdogs. Jupiter here grants ease to carry out the Uranian ideals. With this aspect, Donald Trump is capable of revolutionary change in a positive way rather than in an upsetting way. He’s a team player and can work well in groups. He can be full of fresh ideas. This is a real strength for Donald Trump.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Uranus is also the ruler of Donald’s Part of Fortune. This reiterates the fact that Donald Trump would do best when he focuses on Uranian/humanitarian ideals and goes against tradition. Revolutionary Uranus is a recurring theme in Donald Trump’s birth chart.</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Donald Trump has Venus and Saturn in quintile aspect to Neptune. This is a rare aspect and it makes Donald deeply compassionate, understanding and tolerant of different values and cultures. He has an exceptional talent for capturing the imaginations of his listeners.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Donald’s Saturn quintile to Neptune is the closest aspect in his chart (of all major and minor aspects). This is basically exact with an orb of one minute and 35 seconds, so it’s a massive influence in his life. This gives him a special talent for grounding his ideals and dreams into practical reality. He can take an unrealistic fantasy and “make it happen.”</span></p><span data-dcnode-id="597" instrument_node="">
</span><h2 data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Weaknesses and/or Neutral Things in Donald Trump’s Birth Chart</span></h2><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">The most pronounced weakness in Donald Trump’s birth chart has to do with communication, but it can also serve as a strength. Donald’s Mercury in Cancer squares Neptune. This makes it difficult for Donald to say what he means. People will tend to get the wrong message from his words. He can be very imaginative and poetic, but also overly emotional in his communication. Donald can lack objectivity because of this aspect. He can have an overactive imagination. On the positive side, he is intuitive and can easily tell if someone is lying to him. He’s creative. He’s artistic. He’s a dreamer. He can sell things (Mercury-Neptune aspects are great for marketing) because he intuitively knows what people want or need.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="590" instrument_node="">Donald Trump has Venus in conjunction to his detrimental Saturn in Cancer. Venus is our attraction factor. Saturn in conjunction with Venus presents obstacles every time you want something. Things don’t come easily to Donald Trump. He will have to work hard and overcome obstacles to get what he wants. Saturn here also gives stamina to work hard and a “work before play” attitude. He has a strong sense of duty and is in no way a slacker. People with this aspect are very hard workers; they can be workaholics. Being a hard worker can certainly help during a campaign, so this is a neutral aspect rather than a weakness. (</span><em data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Bill Gates also has this aspect.</span></em><span data-dcnode-id="587" instrument_node="">)</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="584" instrument_node="">Donald Trump has the fixed star Algol </span><em data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">almost</span></em><span data-dcnode-id="581" instrument_node=""> conjunct to his Midheaven (out of orb). Throughout the ancient world, the fixed star Algol was considered “the most unfortunate, violent, and dangerous star in the heavens.”</span><sup data-dcnode-id="578"><a data-dcnode-id="579" href="#footnotes"><span data-dcnode-id="580" instrument_node="">[5]</span></a></sup></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">However, modern astrologers say that the fixed star Algol doesn’t necessarily mean anything negative. It does indicate serious, public confrontations.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Placed prominently upon his Midheaven, Algol indicates that Donald will be publicly forced to confront the worst problems of human suffering in the community and public spheres. Whereas other public figures may get away with ignoring these issues, Donald Trump will certainly not be given any slack. Algol forces confrontations.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="569" instrument_node="">(</span><em data-dcnode-id="565"><a data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//astrolibrary.org/hillary-clinton-astrology/" title="Hillary Clinton’s Astrology Strength and Weaknesses"><span data-dcnode-id="568" instrument_node="">Hillary Clinton</span></a><span data-dcnode-id="566" instrument_node=""> has Algol in conjunction to her North Node which indicates that she’ll be forced to confront issues about her true calling—North Node—in this life.</span></em><span data-dcnode-id="564" instrument_node="">)</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">However, I don’t consider fixed stars important unless they are within an orb of one degrees. Algol is just over one degrees away from Donald’s Midheaven, so this may be a weak influence, if any.</span></p><span data-dcnode-id="559" instrument_node="">
</span><h2 data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Other Factors Influencing Donald Trump’s Outcome in The Presidential Election</span></h2><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Donald Trump has been under the influence of a Neptune transit trine to his Mercury. This has added to his appeal and given his words a hypnotic quality.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Under this influence, Donald can anticipate things before they happen and respond easily to problems. He can be very compassionate and sensitive to his surroundings. Donald Trump already has persuasive abilities in his birth chart, and these abilities are increased during this transit. The only possible downside to this transit is that Donald can become sensitive to criticism and harshness from others. </span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="547"><em data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Donald’s Neptune transit began on March 14, 2015. The influence is currently waning and will be gone by September 22, 2015. It will return for the second time on January 13, 2016. It will be exact on February 11–12, 2016 and be gone by March 10, 2016. This influence will be in effect for the final time during October and November of 2016.</span></em></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">In November of 2016, during the general Presidential Election, Donald Trump will be undergoing a Uranus transit trine to his Moon. This is a sign of a big change, including a change of home. Donald’s Moon rules his 11th House of hopes, wishes, and groups. This transit can indicate that Donald’s hopes will be fulfilled during this time. This also indicates that unexpected friends may assist Donald and help advance his interests. Influential people will come to his aid.</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">During the Presidential Election on November 8, 2016, Donald Trump will have his progressed Moon in conjunction to his natal Saturn. This can indicate a time of low energy, severe mental stress, and generally a lot of problems. </span></p><span data-dcnode-id="540" instrument_node="">
