</span><img alt="" class="attachment-magazinevibe_edge_post_feature_image size-magazinevibe_edge_post_feature_image wp-post-image" data-dcnode-id="914" height="1220" sizes="(max-width: 1220px) 100vw, 1220px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//diplomatmagazine.com/wp-content/uploads/2021/02/DIPLOMATIC-PROTOCOL-ILLUSTRATION.jpg&amp;raw" srcset="https://diplomatmagazine.com/wp-content/uploads/2021/02/DIPLOMATIC-PROTOCOL-ILLUSTRATION.jpg 1220w, https://diplomatmagazine.com/wp-content/uploads/2021/02/DIPLOMATIC-PROTOCOL-ILLUSTRATION-300x300.jpg 300w, https://diplomatmagazine.com/wp-content/uploads/2021/02/DIPLOMATIC-PROTOCOL-ILLUSTRATION-1024x1024.jpg 1024w, https://diplomatmagazine.com/wp-content/uploads/2021/02/DIPLOMATIC-PROTOCOL-ILLUSTRATION-150x150.jpg 150w, https://diplomatmagazine.com/wp-content/uploads/2021/02/DIPLOMATIC-PROTOCOL-ILLUSTRATION-768x768.jpg 768w, https://diplomatmagazine.com/wp-content/uploads/2021/02/DIPLOMATIC-PROTOCOL-ILLUSTRATION-675x675.jpg 675w, https://diplomatmagazine.com/wp-content/uploads/2021/02/DIPLOMATIC-PROTOCOL-ILLUSTRATION-114x114.jpg 114w" width="1220"><span data-dcnode-id="913" instrument_node=""> </span></div><span data-dcnode-id="911" instrument_node="">
</span><div class="edgtf-post-text" data-dcnode-id="774"><span data-dcnode-id="910" instrument_node="">
</span><div class="edgtf-post-text-inner clearfix" data-dcnode-id="776"><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="906"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Former UK Ambassador Charles Crawford highlights the sensitive relationship between the Hosts and Guests</span></strong></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="904" instrument_node="">The bloodthirsty movie </span><em data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">300</span></em><span data-dcnode-id="901" instrument_node=""> has an instructive reinvention of diplomatic events almost exactly 2,500 years ago. King Leonidas of Sparta receives a senior messenger sent from King Xerxes of Persia. The messenger suggests that Sparta need do no more than politely offer a ‘token of submission’ to King Xerxes and his vast army. King Leonidas is unimpressed:</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Messenger:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; No man, Persian or Greek, no man threatens a messenger!</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Leonidas:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; You insult my Queen. You threaten my people with slavery and death. Oh, I’ve chosen my words carefully, Persian. Perhaps you should have done the same!</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Messenger:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; This is blasphemy! This is madness!</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Leonidas:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Madness? … This is SPAR-TA</span></p><div class="code-block code-block-4" data-dcnode-id="882" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="887" instrument_node="">
</span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bmwtaxfree.co.uk/%3Frefid%3DDiploMag" onclick="ga('send', 'event', { eventCategory: 'advert', eventAction: 'click', eventLabel: 'InnerBody1'});"><span data-dcnode-id="886" instrument_node="">
</span><img data-dcnode-id="885" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//diplomatmagazine.com/wp-content/uploads/2022/02/350x250_mpu_v1.png&amp;raw" style="max-width:350px"><span data-dcnode-id="884" instrument_node="">
</span></a></div><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">And into a deep Spartan well go the messenger with his assorted Second Secretaries, plus the cook and the driver.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">This vivid if imagined example takes us to the tension right at the heart of diplomatic protocol: the uneasy relationship between Rules and Principles. In this case, the messenger assumed that the Rules of Diplomacy would enable him to deliver his unwelcome message and return safely to King Xerxes with Sparta’s answer. But he forgot the deeper principle in play. When you’re in someone else’s house, it’s their rules that count.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">What most diplomats these days forget (if they ever in fact pondered it) is why the rules of protocol as primarily laid down in the 1961 Vienna Convention on Diplomatic Relations are what they are. That Convention in effect codified in one handy short text principles and practices variously dating back many centuries to those ancient Greeks. And the thematic idea running through the Convention’s key principles is about as simple as it might be: Hosts and Guests.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">In much earlier times, Kings, Queens, Popes, Emperors and Sultans perforce communicated by trusted messengers who rode long and hard to deliver their messages and report back. In some 300BC Chinese philosopher Zhuangzi opined on how tricky this was:</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="866"><em data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Faithfully conveying such messages is the most difficult task under the heavens, for if the words are such as to evoke a positive response on both sides, there will be the temptation to exaggerate them with flattery and, if they are unpleasant, there will be a tendency to make them even more biting. In either case, the truth will be lost. If truth is lost, mutual trust will also be lost. If mutual trust is lost, the messenger himself may be imperilled. </span></em></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Over the centuries, it became accepted that rulers would host permanent foreign legations to make the conduct of international business easier.</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">In either case (visiting or permanent ‘ambassadors’) courtly rules evolved based on two simple and largely universal norms of human hospitality. Hosts have responsibilities towards guests. Guests have responsibilities towards hosts.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="858" instrument_node="">Imagine that you invite your friend Alex to stay in your spare room for the weekend: </span><em data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">“Make yourself at home!”</span></em></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Think about what that in fact means. It doesn’t mean that Alex can have an afternoon nap on your bed, or peer into every drawer and cupboard, or open your letters, or drink your best wine, or doodle in the margins of your books, or listen in to your phone-calls, or use the spare room as a pop-up shop. And so on.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="850" instrument_node="">Some issues might be borderline cases. Might Alex raid the fridge for a sandwich when you’re out, or use a squeeze of toothpaste from the tube you left in the bathroom? But such details only go to illustrate the core point: there are unambiguous </span><em data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">limits</span></em><span data-dcnode-id="847" instrument_node=""> on what Alex might and might not do as a guest in your house, and woe betide your friendship if Alex ignores those limits. As a guest, Alex has responsibilities towards you not to be nosy or dirty or noisy or obnoxious or disruptive. Alex has to show you, your house and your privacy all due </span><em data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">respect</span></em><span data-dcnode-id="844" instrument_node="">.</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="841" instrument_node="">Usually, these limits are not exhaustively laid down in a document of </span><em data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Dos and Don’ts</span></em><span data-dcnode-id="838" instrument_node=""> that you hand Alex on arrival, although if you have some special or unexpected requirements you might make them clear then: </span><em data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">“Alex, I’d appreciate it if you stay out of the study this time – I have masses of sensitive work documents scattered there!”</span></em></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">But that’s not all. You in turn must respect Alex, Alex’s property and Alex’s privacy. You can’t read Alex’s letters or rummage through his/her suitcase, or listen to his/her phone-calls, or enter the guest room without knocking, or use Alex’s toothpaste without asking. If someone is throwing stones at Alex’s window, Alex can reasonably expect you to take action to stop it.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">And lo! These elementary, homely, time-honoured principles reflecting ancient ideas of honour, respect, reciprocity and privacy are what the Vienna Convention lays down for modern diplomacy. Thus:</span></p><span data-dcnode-id="828" instrument_node="">
</span><ul data-dcnode-id="808"><span data-dcnode-id="827" instrument_node="">
</span><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Guests can’t become guests unless hosts agree to host them (VC Article 2: the establishment of permanent diplomatic missions needs mutual consent)</span></li><span data-dcnode-id="824" instrument_node="">
</span><li data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Hosts don’t need to give reasons for not accepting guests or for asking guests to leave (VC Articles 4 and 9: diplomats are welcome on foreign territory only for as long as the host government is ready to welcome them)</span></li><span data-dcnode-id="821" instrument_node="">
</span><li data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Guests can’t use their guestroom for commercial or illegal activities (VC Article 41: diplomatic premises must not be used in any manner incompatible with the functions of the mission as laid down in the present Convention)</span></li><span data-dcnode-id="818" instrument_node="">
</span><li data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Hosts should respect guests’ privacy and property (VC Articles 22 and 24: Diplomatic premises are inviolable and must not be entered by the receiving state’s agents except by permission of the head of mission. The receiving state must protect the mission from intrusion / damage and may not search or seize its documents or vehicles or other property)</span></li><span data-dcnode-id="815" instrument_node="">
</span><li data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Hosts must respect guests’ right to communicate privately, but guests in turn can’t hide behind this privacy to do illicit things (VC Article 27: the receiving state shall permit and protect free communication on the part of the mission for all official purposes; a diplomatic bag may contain only diplomatic documents or articles intended for official use)</span></li><span data-dcnode-id="812" instrument_node="">
</span><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">A guest must not meddle in a host’s affairs (VC Article 41: diplomats have a duty not to interfere in the internal affairs of the receiving state) or run a private business while on the host’s property (VC Article 42)</span></li><span data-dcnode-id="809" instrument_node="">
</span></ul><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">&nbsp;</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Once these and other such core norms of hospitality are understood, most of the exotic diplomatic disputes we read about in the media make sense. Take the case of Julian Assange. The Ecuador Embassy in London was a guest in the UK’s house. Once Assange scuttled in there to avoid arrest, the UK authorities politely respected the privacy of the Embassy and waited for him to emerge. When after long years Assange himself started to abuse the hospitality of the Embassy, the Ambassador gave the UK permission to enter the premises to remove him. And removed he was.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Or the legendary example from 1984, when a bizarre attempt was made in London to kidnap former Nigerian Minister Umaru Dikko and smuggle him back to Nigeria hidden in a crate marked as Nigerian diplomatic freight. The paperwork for this crate was awry, and the British hosts opened the box to find a drugged Dikko inside. The Nigeria High Commissioner was asked to leave. Guests can get up to mischief now and then. But don’t overdo it.</span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="797" instrument_node="">My course on </span><em data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Diplomatic Protocol</span></em><span data-dcnode-id="794" instrument_node=""> for colleagues at the United Nations drills down into all these ideas and more, to explain the simple logic of the subject. As part of the course, I interviewed two distinguished UK women diplomats.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="791" instrument_node="">One emphasised that behind the pomp, pride and flimflam of diplomatic protocol is </span><em data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">predictability</span></em><span data-dcnode-id="788" instrument_node="">: people from widely different cultural traditions can know where they stand when dealing with each other. Her colleague put the emphasis rather differently: protocol is (she said) all about </span><em data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">people</span></em><span data-dcnode-id="785" instrument_node="">: warm-hearted and good-natured basic respect helps overcome many disagreements.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">They’re both mainly right. But above and beyond that, don’t ask Spartans to show a small token of submission. It usually does not end well.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">&nbsp;</span></p><span data-dcnode-id="777" instrument_node="">
</span></div><span data-dcnode-id="775" instrument_node="">
</span></div><span data-dcnode-id="773" instrument_node="">
</span></div><span data-dcnode-id="771" instrument_node="">
