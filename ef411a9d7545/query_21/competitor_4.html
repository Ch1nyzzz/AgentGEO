</span><h3 class="product_biblio_title" data-dcnode-id="1293" style="text-align: justify;"><span data-dcnode-id="1294" instrument_node="">Satow’s Diplomatic Practice</span></h3><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290" style="text-align: justify;"><span data-dcnode-id="1291" instrument_node="">Seventh Edition</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p class="product_biblio_author" data-dcnode-id="1286" style="text-align: justify;"><strong data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Edited by Ivor Roberts</span></strong></p><span data-dcnode-id="1285" instrument_node="">
</span><ul data-dcnode-id="1265" style="text-align: justify;"><span data-dcnode-id="1284" instrument_node="">
</span><li data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Fully updated seventh (centenary) edition of the globally recognized leading authoritative text on diplomatic law and practice</span></li><span data-dcnode-id="1281" instrument_node="">
</span><li data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Includes increased coverage of important issues in diplomacy, such as the doctrine of humanitarian intervention and responsibility to protect (R2P), human rights, public diplomacy, secret diplomacy, secret intelligence, track two (alternative) diplomacy</span></li><span data-dcnode-id="1278" instrument_node="">
</span><li data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Investigates the role of non-state actors, including NGOs as well as violent non-state actors such as ISIL</span></li><span data-dcnode-id="1275" instrument_node="">
</span><li data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Examines the impact on diplomacy of the Edward Snowdon and Julian Assange cases</span></li><span data-dcnode-id="1272" instrument_node="">
</span><li data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Discusses the work of international criminal courts</span></li><span data-dcnode-id="1269" instrument_node="">
</span><li data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Edited by a former British ambassador to three States and features contributions from internationally recognized experts in diplomatic law, human rights, and diplomatic practice</span></li><span data-dcnode-id="1266" instrument_node="">
</span></ul><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262" style="text-align: justify;"><span data-dcnode-id="1263" instrument_node="">New to this Edition:</span></p><span data-dcnode-id="1261" instrument_node="">
</span><ul data-dcnode-id="1238" style="text-align: justify;"><span data-dcnode-id="1260" instrument_node="">
</span><li data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">The chapters on the history of diplomacy have been expanded to cover modern developments such as the greatly expanded role of multilateral diplomacy.</span></li><span data-dcnode-id="1257" instrument_node="">
</span><li data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">The chapters on international law have been brought up to date, including an examination of latest case studies.</span></li><span data-dcnode-id="1254" instrument_node="">
</span><li data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">The book addresses the greatly expanded number of international organizations, including material on the British EU referendum outcome.</span></li><span data-dcnode-id="1251" instrument_node="">
</span><li data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">The importance of human rights in international relations as well as public diplomacy receive increased attention.</span></li><span data-dcnode-id="1248" instrument_node="">
</span><li data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">The book also includes newly revised and detailed chapters on diplomatic communications, privileges, precedence and immunities, diplomatic missions and consular matters, treaties and conferences, and the workings of international tribunals.</span></li><span data-dcnode-id="1245" instrument_node="">
</span><li data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">The book highlights the impact of international terrorism and other violent non-state actors on the life and work of a diplomat.</span></li><span data-dcnode-id="1242" instrument_node="">
</span><li data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">The volume examines alternative forms of diplomacy, from the work of NGOs to the use of secret envoys, as well as a study of the interaction with intelligence agencies and commercial security firms.</span></li><span data-dcnode-id="1239" instrument_node="">
</span></ul><span data-dcnode-id="1237" instrument_node="">
</span><h3 class="block_heading" data-dcnode-id="1235" style="text-align: justify;"><span data-dcnode-id="1236" instrument_node="">Description</span></h3><span data-dcnode-id="1234" instrument_node="">
</span><div class="expanding_content_container" data-dcnode-id="1036" id="expanding_content_container"><span data-dcnode-id="1233" instrument_node="">
</span><div class="expanding_content_container_outer" data-dcnode-id="1038" id="expanding_content_container_outer"><span data-dcnode-id="1232" instrument_node="">
</span><div class="expanding_content_container_inner_narrow" data-dcnode-id="1040"><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1226" style="text-align: justify;"><span data-dcnode-id="1230" instrument_node="">First published in 1917, </span><em data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Satow’s Diplomatic Practice</span></em><span data-dcnode-id="1227" instrument_node=""> has long been hailed as a classic and authoritative text. An indispensable guide for anyone working in or studying the field of diplomacy, this seventh, centenary edition builds on the extensive revision in the sixth edition. The volume provides an enlarged and updated section on the history of diplomacy, including the exponential growth in multilateral diplomacy, and revises comprehensively the practice of diplomacy and the corpus of diplomatic and international law since the end of the Cold War. It traces the substantial expansion in numbers both of sovereign states and international and regional organisations and features detailed chapters on diplomatic privileges and immunities, diplomatic missions, and consular matters, treaty-making and conferences. The volume also examines alternative forms of diplomacy, from the work of NGOs to the use of secret envoys, as well as a study of the interaction with intelligence agencies and commercial security firms. It also discusses the impact of international terrorism and other violent non-state actors on the life and work of a diplomat. Finally, in recognition of the speed of changes in the field over the last ten years, this seventh edition examines the developments and challenges of modern diplomacy through new chapters on human rights and public/digital diplomacy by experts in their respective fields.</span></p><span data-dcnode-id="1225" instrument_node="">

</span><div data-dcnode-id="1083" style="text-align: justify;"><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1091" instrument_node="">Ivor Roberts, </span><em data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Former British Ambassador to the Federal Republic of Yugoslavia, the Republic of Ireland, and Italy</span></em></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Sir Ivor Roberts entered the Diplomatic Service in 1968. From 1989 to 1993 he was Minister in the British Embassy in Madrid. He was appointed Charge d’Affaires and Consul – General in Belgrade in March 1994, and after recognition of the Federal Republic of Yugoslavia by the United Kingdom, he became Ambassador. During his time in Belgrade he conducted negotiations on behalf of the international mediators (Lord Owen and Carl Bildt) with both the Yugoslav authorities and the Bosnian Serbs. From January 1998 to February 1999 he was on a sabbatical as a Senior Associate Member of St. Antony’s College, Oxford, writing and lecturing on his experiences in Yugoslavia. From February 1999 to March 2003 he served as British Ambassador to the Republic of Ireland and from May 2003 to September 2006 as Ambassador to Italy. He retired from the Diplomatic Service in September 2006 on his election as the President of Trinity College Oxford. He retired from this post in 2017.</span></p><span data-dcnode-id="1084" instrument_node="">
