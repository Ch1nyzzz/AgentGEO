</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node=""> In order that appropriate privileges are accorded to Foreign Diplomatic Missions and their staff members, applications should be made to the Ministry of Foreign Affairs as early as possible.</span></span></p><div data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">
</span></div><p data-dcnode-id="1050"><span data-dcnode-id="1055" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="1051"><span data-dcnode-id="1054" instrument_node=""> Fiscal and other privileges accorded to them are as follows:</span><br data-dcnode-id="1053"><br data-dcnode-id="1052"></span></p><div data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">
</span></div><p data-dcnode-id="1035"><span data-dcnode-id="1047" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node=""> </span></span><span data-dcnode-id="1044" instrument_node="">
</span><a data-dcnode-id="1043" name="Baggage"></a><span data-dcnode-id="1042" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="1036" style="font-size: 12pt;"><span data-dcnode-id="1041" instrument_node="">
</span><strong data-dcnode-id="1037"><span data-dcnode-id="1040" instrument_node="">
</span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mfa.gov.bn/Pages/Diplomatic-Previleges.aspx" id="Accompanying Baggage/Personal Effects" name="Accompanying Baggage/Personal Effects"><span data-dcnode-id="1039" instrument_node="">ACCOMPANYING BAGGAGE / PERSONAL EFFECTS</span></a></strong></span></p><div data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">
</span></div><p data-dcnode-id="1029"><span data-dcnode-id="1032" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node=""> The privileges of exemption from examination of baggage and other effects, and of admission thereof free of duties and taxes is granted to the following persons:</span></span></p><div data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">
</span></div><p data-dcnode-id="1023"><span data-dcnode-id="1026" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node=""> &nbsp;&nbsp; - Heads of diplomatic missions and their immediate families accompanying them</span></span></p><div data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">
</span></div><p data-dcnode-id="1017"><span data-dcnode-id="1020" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node=""> &nbsp;&nbsp; - Officers of diplomatic missions who are eligible for inclusion in the diplomatic list and their families</span></span></p><div data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">
</span></div><p data-dcnode-id="1011"><span data-dcnode-id="1014" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node=""> &nbsp;&nbsp; - Consular officers and their families</span></span></p><div data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">
</span></div><p data-dcnode-id="1005"><span data-dcnode-id="1008" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node=""> In accordance with the Vienna Convention on Diplomatic Relations 1961 (Article 36, Paragraph 2) authorities have the right to inspect personal baggage of a diplomatic agent if there are serious grounds for presuming that it contains:</span></span></p><div data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">
</span></div><p data-dcnode-id="999"><span data-dcnode-id="1002" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node=""> &nbsp;&nbsp; - articles not for the official use of the mission</span></span></p><div data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">
</span></div><p data-dcnode-id="993"><span data-dcnode-id="996" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="994"><span data-dcnode-id="995" instrument_node=""> &nbsp;&nbsp; - articles not for the personal use of the diplomatic agent and/or members of his family forming part of his household</span></span></p><div data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">
</span></div><p data-dcnode-id="987"><span data-dcnode-id="990" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="988"><span data-dcnode-id="989" instrument_node=""> &nbsp;&nbsp; - imported or exported goods prohibited or controlled by law.</span></span></p><div data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">
</span></div><p data-dcnode-id="979"><span data-dcnode-id="984" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="980"><span data-dcnode-id="983" instrument_node=""> The inspection will be conducted in the presence of the consignee/owner or his authorized representative.</span><br data-dcnode-id="982"><br data-dcnode-id="981"></span></p><div data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">
</span></div><p data-dcnode-id="973"><span class="ms-rteForeColor-1" data-dcnode-id="974" style="text-decoration: none solid #8b0000;"><strong data-dcnode-id="975" style="text-decoration: none solid #8b0000;"><span data-dcnode-id="976" instrument_node="">CUSTOMS DUTIES AND IMPORT TAXES</span></strong></span></p><div data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">
</span></div><p data-dcnode-id="967"><span data-dcnode-id="970" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="968"><span data-dcnode-id="969" instrument_node=""> Diplomatic missions/diplomatic agents are granted exemption from customs duties and import taxes on:</span></span></p><div data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">
</span></div><p data-dcnode-id="961"><span data-dcnode-id="964" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node=""> &nbsp;&nbsp; - Articles for the official use of the mission other than motor vehicles</span></span></p><div data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">
</span></div><p data-dcnode-id="955"><span data-dcnode-id="958" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node=""> &nbsp;&nbsp; - Articles for the personal use of a diplomatic agent or members of his/her family forming part of his/her household, provided that the person for whom the goods are intended is not a Citizen, Permanent Resident of Brunei Darussalam or a foreign resident of Brunei Darussalam.</span></span></p><div data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">
</span></div><p data-dcnode-id="946"><span data-dcnode-id="952" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="947"><span data-dcnode-id="951" instrument_node="">
</span><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Non-Diplomatic Home-Based Staff</span></strong><span data-dcnode-id="948" instrument_node=""> (Technical and Administrative Staff)</span></span></p><div data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">
</span></div><p data-dcnode-id="938"><span data-dcnode-id="943" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="939"><span data-dcnode-id="942" instrument_node=""> Duty-free articles for the personal and domestic use of members of the administrative and technical staff (Category A of Non-Diplomatic Home-Based Staff) and their families will only be granted within the first six month of their initial arrival to Brunei Darussalam. Subsequent importations are not exempted from duties and taxes.</span><br data-dcnode-id="941"><br data-dcnode-id="940"></span></p><div data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">
</span></div><p data-dcnode-id="924"><span data-dcnode-id="935" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="925"><span data-dcnode-id="934" instrument_node="">
</span><span data-dcnode-id="926" style="font-size: 12pt;"><span data-dcnode-id="933" instrument_node="">
</span><strong data-dcnode-id="927"><span data-dcnode-id="932" instrument_node="">
</span><a data-dcnode-id="931" name="Vehicles"></a><span data-dcnode-id="930" instrument_node="">
</span><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mfa.gov.bn/Pages/Diplomatic-Previleges.aspx"><span data-dcnode-id="929" instrument_node="">VEHICLES</span></a></strong></span></span></p><div data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">
</span></div><p data-dcnode-id="918"><span data-dcnode-id="921" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node=""> Foreign diplomatic missions and their diplomatic staff including members of the administrative and technical staff (Non-diplomatic home-based staff) are granted exemption from the following fees and duties and other charges under the Road Traffic Enactment on vehicles approved by the Ministry of Foreign Affairs: -</span></span></p><div data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">
</span></div><p data-dcnode-id="912"><span data-dcnode-id="915" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node=""> &nbsp;&nbsp; - Registration fee</span></span></p><div data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">
</span></div><p data-dcnode-id="906"><span data-dcnode-id="909" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node=""> &nbsp;&nbsp; - Licensing fee (road tax)</span></span></p><div data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">
</span></div><p data-dcnode-id="900"><span data-dcnode-id="903" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node=""> &nbsp;&nbsp; - Import duty</span></span></p><div data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">
</span></div><p data-dcnode-id="894"><span data-dcnode-id="897" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="895"><span data-dcnode-id="896" instrument_node=""> &nbsp;&nbsp; - Full driving licence/provisional Driving Licence fees</span></span></p><div data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">
</span></div><p data-dcnode-id="888"><span data-dcnode-id="891" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="889"><span data-dcnode-id="890" instrument_node=""> &nbsp;&nbsp; - Driving test and examination and other fees</span></span></p><div data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">
</span></div><p data-dcnode-id="882"><span data-dcnode-id="885" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node=""> For non-diplomatic home-based staff, the above exemption will be granted the first six month from arrival.</span></span></p><div data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">
</span></div><p data-dcnode-id="874"><span data-dcnode-id="879" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="875"><span data-dcnode-id="878" instrument_node="">
</span><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">The exemption accorded to diplomats is subject to the following guidelines in addition to the requirements imposed by the Land Transport Department:</span></strong></span></p><div data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">
</span></div><p data-dcnode-id="868"><span data-dcnode-id="871" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node=""> i. A permit to import used cars must be approved first;</span></span></p><div data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">
</span></div><p data-dcnode-id="862"><span data-dcnode-id="865" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node=""> ii. The application to import a used motorcar must be made under a personal name and not for business use;</span></span></p><div data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">
</span></div><p data-dcnode-id="856"><span data-dcnode-id="859" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node=""> iii. An applicant can import not more than two units of any type of used motorcars within 4 years;</span></span></p><div data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">
</span></div><p data-dcnode-id="850"><span data-dcnode-id="853" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="851"><span data-dcnode-id="852" instrument_node=""> iv. Transfer of ownership of a used motorcar is not allowed within the first 4 years of importation;</span></span></p><div data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">
</span></div><p data-dcnode-id="844"><span data-dcnode-id="847" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node=""> v. A used motorcar to be imported must not be more than 5 years old from the date of its first registration and must be technically approved by the Land Transport Department;</span></span></p><div data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">
</span></div><p data-dcnode-id="838"><span data-dcnode-id="841" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node=""> vi. The imported used motorcars must not be sold in Brunei Darussalam after the completion of tour of duty of the diplomatic staff concerned and should be re-exported out of Brunei Darussalam;</span></span></p><div data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">
</span></div><p data-dcnode-id="832"><span data-dcnode-id="835" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="833"><span data-dcnode-id="834" instrument_node=""> vii. Motorcars must be right-hand drive.</span></span></p><div data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">
</span></div><p data-dcnode-id="826"><span data-dcnode-id="829" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="827"><span data-dcnode-id="828" instrument_node=""> viii. Imported used motorcars which do not comply to the above conditions and specifications during Technical Inspection by Land Transport Department will not be registered and licensed. Such motorcars must be re-exported back to the country of origin</span></span></p><div data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">
</span></div><p data-dcnode-id="818"><span data-dcnode-id="823" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="819"><span data-dcnode-id="822" instrument_node="">
</span><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Imported used motorcars must comply with the following specifications</span></strong></span></p><div data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">
</span></div><p data-dcnode-id="812"><span data-dcnode-id="815" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="813"><span data-dcnode-id="814" instrument_node=""> a. Space for the front and rear registration's plates must not be less than 216mm x 343mm or 533mm x 152mm</span></span></p><div data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">
</span></div><p data-dcnode-id="806"><span data-dcnode-id="809" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node=""> b. All windscreens and windows must be fitted with clear safety glass.</span></span></p><div data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">
</span></div><p data-dcnode-id="800"><span data-dcnode-id="803" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="801"><span data-dcnode-id="802" instrument_node=""> &nbsp;&nbsp; i.&nbsp;&nbsp; Manufacturer fitted tinted glass light transmission must be 70% and above</span></span></p><div data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">
</span></div><p data-dcnode-id="794"><span data-dcnode-id="797" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="795"><span data-dcnode-id="796" instrument_node=""> &nbsp;&nbsp; ii.&nbsp; Safety Glass Certificate should be enclosed</span></span></p><div data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">
</span></div><p data-dcnode-id="788"><span data-dcnode-id="791" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="789"><span data-dcnode-id="790" instrument_node=""> c. The colour of the motorcars lamp as follows:-</span></span></p><div data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">
</span></div><p data-dcnode-id="782"><span data-dcnode-id="785" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node=""> &nbsp;&nbsp; i.&nbsp;&nbsp; Front lamp - white light</span></span></p><div data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">
</span></div><p data-dcnode-id="776"><span data-dcnode-id="779" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="777"><span data-dcnode-id="778" instrument_node=""> &nbsp;&nbsp; ii.&nbsp; Rear and brake lamp - red light</span></span></p><div data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">
</span></div><p data-dcnode-id="770"><span data-dcnode-id="773" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node=""> &nbsp;&nbsp; iii. Indicator lamp - yellow (amber) light</span></span></p><div data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">
</span></div><p data-dcnode-id="764"><span data-dcnode-id="767" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="765"><span data-dcnode-id="766" instrument_node=""> d. No sport light is allowed on imported used motorcars</span></span></p><div data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">
</span></div><p data-dcnode-id="758"><span data-dcnode-id="761" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="759"><span data-dcnode-id="760" instrument_node=""> e. Imported used motorcars must not be modified or any other additional accessories while for rims and tyres should be met as in the original specification</span></span></p><div data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">
</span></div><p data-dcnode-id="752"><span data-dcnode-id="755" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node=""> f. Imported used motorcars with the engine capacity over 1000cc must be fitted with catalytic converter</span></span></p><div data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">
</span></div><p data-dcnode-id="746"><span data-dcnode-id="749" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node=""> Applications for importing cars, both new and used, should be made through the Protocol and Consular Affairs Department, Ministry of Foreign Affairs by at least two (2) weeks before before the estimated date of arrival of such cars to Brunei Darussalam.</span></span></p><div data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">
</span></div><p data-dcnode-id="738"><span data-dcnode-id="743" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="739"><span data-dcnode-id="742" instrument_node="">
</span><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Entitlement for Vehicles ownership as follows:</span></strong></span></p><div data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">
</span></div><p data-dcnode-id="730"><span data-dcnode-id="735" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="731"><span data-dcnode-id="734" instrument_node="">
</span><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">a. Missions</span></strong></span></p><div data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">
</span></div><p data-dcnode-id="724"><span data-dcnode-id="727" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node=""> Diplomatic missions and consular posts are permitted to import or purchase a reasonable number of vehicles under privilege according to the size and needs of the mission or post. The general guideline is one vehicle for each two privileged officers at the mission or post. However, the requirement of each Diplomatic Mission will be considered on its own merits and approved by the Ministry of Foreign Affairs, depending on the size of the Diplomatic Mission and the number of its diplomatic staff. The Diplomatic Mission must use imported official mission cars and locally purchased cars for a minimum period of four years and two years respectively before disposal is allowed.</span></span></p><div data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">
</span></div><p data-dcnode-id="716"><span data-dcnode-id="721" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="717"><span data-dcnode-id="720" instrument_node="">
</span><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">b. Heads of Missions</span></strong></span></p><div data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">
</span></div><p data-dcnode-id="710"><span data-dcnode-id="713" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node=""> The Head of Missions will be eligible for the purchase of two duty-free cars for their personal use, to be registered in their name and in the name of their spouse respectively during their tour of duty in Brunei Darussalam. Cars must be used for a minimum period of two years before disposal is allowed.</span></span></p><div data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">
</span></div><p data-dcnode-id="702"><span data-dcnode-id="707" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="703"><span data-dcnode-id="706" instrument_node="">
</span><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">c. Diplomatic Staff</span></strong></span></p><div data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">
</span></div><p data-dcnode-id="696"><span data-dcnode-id="699" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node=""> Diplomatic officers will be eligible for the purchase of two duty-free cars for their personal use, one to be registered, in their name and the other in the name of their spouse during their tour of duty in Brunei Darussalam. Cars must be used for a minimum period of two years before disposal is allowed.</span></span></p><div data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">
</span></div><p data-dcnode-id="687"><span data-dcnode-id="693" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">
</span><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">d. Non-Diplomatic Home Based Staff</span></strong><span data-dcnode-id="689" instrument_node=""> (Administrative and Technical Staff)</span></span></p><div data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">
</span></div><p data-dcnode-id="679"><span data-dcnode-id="684" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="680"><span data-dcnode-id="683" instrument_node=""> Non-diplomatic home-based staff will be eligible for the purchase of one duty-free car for his/her personal use during his/her tour of duty and the car must be registered in his/her name. Exemption of import duty will only be granted within the first six (6) months of their intial arrival in Brunei Darussalam. However application for refund of duty for locally purchased vehicle must be made within 12 months from the date of purchase.</span><br data-dcnode-id="682"><br data-dcnode-id="681"></span></p><div data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">
</span></div><p data-dcnode-id="671"><span data-dcnode-id="676" instrument_node="">
</span><span class="ms-rteForeColor-1" data-dcnode-id="672" style="text-decoration: none solid #8b0000;"><span data-dcnode-id="675" instrument_node="">
</span><strong data-dcnode-id="673" style="text-decoration: none solid #8b0000;"><span data-dcnode-id="674" instrument_node="">DISPOSAL OF VEHICLES</span></strong></span></p><div data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">
</span></div><p data-dcnode-id="665"><span data-dcnode-id="668" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node=""> Vehicles must be used for a minimum period of four (4) years before disposal is allowed. (This does not apply to Non-Diplomatic home-based staff). However, applications to sell the original car and purchase another duty-free car within the minimum period of two (2) years usage may be made to the Ministry of Foreign Affairs, if:</span></span></p><div data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">
</span></div><p data-dcnode-id="659"><span data-dcnode-id="662" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="660"><span data-dcnode-id="661" instrument_node=""> &nbsp;&nbsp; i. The car is badly damaged in a road accident and the Insurance Company/Land Transport Department has issued a write-off certificate</span></span></p><div data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">
</span></div><p data-dcnode-id="651"><span data-dcnode-id="656" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="652"><span data-dcnode-id="655" instrument_node=""> The car is beyond economical repair. This claim must be supported by evidence from a motor vehicle repair firm.</span><br data-dcnode-id="654"><br data-dcnode-id="653"></span></p><div data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">
</span></div><p data-dcnode-id="643"><span data-dcnode-id="648" instrument_node="">
</span><span class="ms-rteForeColor-1" data-dcnode-id="644" style="text-decoration: none solid #94641d;"><span data-dcnode-id="647" instrument_node="">
</span><strong data-dcnode-id="645" style="text-decoration: none solid #94641d;"><span data-dcnode-id="646" instrument_node="">LAW AND REGULATIONS</span></strong></span></p><div data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">
</span></div><p data-dcnode-id="635"><span data-dcnode-id="640" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="636"><span data-dcnode-id="639" instrument_node="">
</span><strong data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Each case will be considered on its own merit and these cars will be subject to registration fee, road tax and import duty, calculated on its depreciated values when sold to non-privileged persons.</span></strong></span></p><div data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">
</span></div><p data-dcnode-id="629"><span data-dcnode-id="632" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="630"><span data-dcnode-id="631" instrument_node=""> Foreign missions and their diplomatic staff members must observe the law and regulations governing the use of motor vehicles in Brunei Darussalam</span></span></p><div data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">
</span></div><p data-dcnode-id="623"><span data-dcnode-id="626" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="624"><span data-dcnode-id="625" instrument_node=""> Terms of disposal are as follows:</span></span></p><div data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">
</span></div><p data-dcnode-id="617"><span data-dcnode-id="620" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node=""> &nbsp;&nbsp; - Official mission cars can be replaced only four (4) years after the first initial registration;</span></span></p><div data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">
</span></div><p data-dcnode-id="611"><span data-dcnode-id="614" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="612"><span data-dcnode-id="613" instrument_node=""> &nbsp;&nbsp; - Diplomatic officers can replace cars only two (2) years after registration</span></span></p><div data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">
</span></div><p data-dcnode-id="605"><span data-dcnode-id="608" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="606"><span data-dcnode-id="607" instrument_node=""> &nbsp;&nbsp; - Non-Diplomatic Home Based Staff (Administrative Technical Staff) are not allowed to replace their cars. They may however sell their cars at the end of their tour of duty.</span></span></p><div data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">
</span></div><p data-dcnode-id="597"><span data-dcnode-id="602" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="598"><span data-dcnode-id="601" instrument_node="">
</span><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Necessary documents for disposal of cars</span></strong></span></p><div data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">
</span></div><p data-dcnode-id="591"><span data-dcnode-id="594" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="592"><span data-dcnode-id="593" instrument_node=""> &nbsp;&nbsp; - Deeds of sale executed by the parties, in triplicate</span></span></p><div data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">
</span></div><p data-dcnode-id="585"><span data-dcnode-id="588" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node=""> &nbsp;&nbsp; - Certificate of payment of taxes and duties paid on the vehicle, in triplicate</span></span></p><div data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">
</span></div><p data-dcnode-id="579"><span data-dcnode-id="582" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node=""> &nbsp;&nbsp; - Return of assigned car plates</span></span></p><div data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">
</span></div><p data-dcnode-id="571"><span data-dcnode-id="576" instrument_node="">

Color-1-5" data-dcnode-id="253" style="text-decoration: none solid #191919;"><span data-dcnode-id="254" instrument_node="">Other members of diplomatic mission (Non-Diplomats holding official passports and who are on official Mission)</span></strong></p><p data-dcnode-id="245" style="text-align: justify;"><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="246" style="text-decoration: none solid #191919;"><span data-dcnode-id="250" style="text-decoration: none solid #191919;"><span data-dcnode-id="251" instrument_node="">14 cases of spirits, liquors and other spirituous beverages such as Brandy, Whisky, Rum, Gin, Vodka.</span></span><br data-dcnode-id="249" style="text-decoration: none solid #191919;"><span data-dcnode-id="247" style="text-decoration: none solid #191919;"><span data-dcnode-id="248" instrument_node=""> (168 x 1 litre per bottle)</span></span></span></p><p data-dcnode-id="237" style="text-align: justify;"><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="238" style="text-decoration: none solid #191919;"><span data-dcnode-id="243" style="text-decoration: none solid #191919;"><span data-dcnode-id="244" instrument_node="">8 cases of wine or wine-based including aperitifs such as Vermouth, Sake, Sherry.</span></span><br data-dcnode-id="242" style="text-decoration: none solid #191919;"><span data-dcnode-id="240" style="text-decoration: none solid #191919;"><span data-dcnode-id="241" instrument_node=""> &nbsp;(96 x 1 litre per bottle)</span></span><br data-dcnode-id="239" style="text-decoration: none solid #191919;"></span></p><p data-dcnode-id="230" style="text-align: justify;"><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="235" style="text-decoration: none solid #191919;"><span data-dcnode-id="236" instrument_node="">48 cases of beer, and other fermented beverages such as Shandy, Cider, Perry, Mead.&nbsp;</span></span><br class="ms-rteThemeForeColor-1-5" data-dcnode-id="234" style="text-decoration: none solid #191919;"><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="232" style="text-decoration: none solid #191919;"><span data-dcnode-id="233" instrument_node=""> (1,152 x 0.330ml – per can/bottles)</span></span><br data-dcnode-id="231"></p><p data-dcnode-id="226"><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="227"><strong data-dcnode-id="228"><br data-dcnode-id="229"></strong></span></p><div data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">
</span></div><p data-dcnode-id="218"><span data-dcnode-id="223" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="219"><span data-dcnode-id="222" instrument_node="">
</span><strong data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Imported Films, Tapes, Slides</span></strong></span></p><div data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">
</span></div><p data-dcnode-id="212"><span data-dcnode-id="215" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node=""> Films, tapes and slides related to official correspondence of other official matters may be imported free of customs duties on presentation of an undertaking by the mission that such items shall be shown only within the premises of the mission.</span></span></p><div data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">
</span></div><p data-dcnode-id="204"><span data-dcnode-id="209" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="205"><span data-dcnode-id="208" instrument_node=""> Films, tapes and slides not related to official correspondence or other official matters, which shall be shown to the public, need clearance from the Board of Censorship. The items and a full description of its contents should be sent to the Ministry of Foreign Affairs&nbsp;for subsequent submission to the Board of Censorship for its approval through the Protocol and Consular Affairs Department.</span><br data-dcnode-id="207"><br data-dcnode-id="206"></span></p><div data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">
</span></div><p data-dcnode-id="189"><span data-dcnode-id="201" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="199"><span data-dcnode-id="200" instrument_node=""> </span></span><span data-dcnode-id="198" instrument_node="">
</span><a data-dcnode-id="197" name="Diplomatic"></a><span data-dcnode-id="196" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="190" style="font-size: 12pt;"><span data-dcnode-id="195" instrument_node="">
</span><strong data-dcnode-id="191"><span data-dcnode-id="194" instrument_node="">
</span><a data-dcnode-id="192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mfa.gov.bn/Pages/Diplomatic-Previleges.aspx"><span data-dcnode-id="193" instrument_node="">Diplomatic bags and pouches</span></a></strong></span></p><div data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">
</span></div><p data-dcnode-id="183"><span data-dcnode-id="186" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node=""> The Ministry of Foreign Affairs&nbsp;sets the following guidelines to be observed in the delivery and claiming of diplomatic bags/pouches.</span></span></p><div data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">
</span></div><p data-dcnode-id="177"><span data-dcnode-id="180" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="178"><span data-dcnode-id="179" instrument_node=""> &nbsp;&nbsp; - Outgoing diplomatic pouches shall be delivered by the mission representative to the Cargo building, Brunei International Airport and handed over to the officer-in-charge of the Cargo, Royal Brunei Airlines. The officers will liaise with the Security Section, Royal Brunei Airlines for the diplomatic pouches to be loaded into the aircraft. The Security Officer, Royal Brunei Airlines will keep the diplomatic pouches inside a diplomatic locker in the aircraft.</span></span></p><div data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">
</span></div><p data-dcnode-id="169"><span data-dcnode-id="174" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="170"><span data-dcnode-id="173" instrument_node=""> &nbsp;&nbsp; - The reverse of the procedure for the delivery of outgoing diplomatic bags/pouches will be observed for the claiming of incoming diplomatic bags/pouches.</span><br data-dcnode-id="172"><br data-dcnode-id="171"></span></p><div data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">
</span></div><p data-dcnode-id="158"><span data-dcnode-id="166" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="164"><span data-dcnode-id="165" instrument_node=""> </span></span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="159" style="font-size: 12pt;"><strong data-dcnode-id="160"><span data-dcnode-id="163" instrument_node=""> </span><a data-dcnode-id="161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mfa.gov.bn/Pages/Diplomatic-Previleges.aspx"><span data-dcnode-id="162" instrument_node="">Other facilities</span></a></strong></span></p><div data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">
</span></div><p data-dcnode-id="152"><span data-dcnode-id="155" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="153"><span data-dcnode-id="154" instrument_node=""> &nbsp;&nbsp; - Airport arrangement (based on the principle of reciprocity). The VIP Lounges of the Brunei International Airport are reserved for the welcome and departure of official guests whose travels have been notified to the Protocol and Consular Affairs Department.</span></span></p><div data-dcnode-id="150"><span data-dcnode-id="151" instrument_node="">
</span></div><p data-dcnode-id="146"><span data-dcnode-id="149" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="147"><span data-dcnode-id="148" instrument_node=""> &nbsp;&nbsp; - Heads of Missions may be extended certain facilities with regard to arrival and departure formalities. However, arrangements must be made in advance with the Protocol and Consular Affairs Department.</span></span></p><div data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">
</span></div><p data-dcnode-id="138"><span data-dcnode-id="143" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="139"><span data-dcnode-id="142" instrument_node=""> &nbsp;&nbsp; - Two airport passes will be issued to each Embassy/High Commission by application</span><br data-dcnode-id="141"><br data-dcnode-id="140"></span></p><div data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">
</span></div><p data-dcnode-id="123"><span data-dcnode-id="135" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="133"><span data-dcnode-id="134" instrument_node=""> </span></span><span data-dcnode-id="132" instrument_node="">
</span><a data-dcnode-id="131" name="Departure"></a><span data-dcnode-id="130" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="124" style="font-size: 12pt;"><span data-dcnode-id="129" instrument_node="">
</span><strong data-dcnode-id="125"><span data-dcnode-id="128" instrument_node="">
</span><a data-dcnode-id="126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mfa.gov.bn/Pages/Diplomatic-Previleges.aspx"><span data-dcnode-id="127" instrument_node="">Departure from Brunei Darussalam</span></a></strong></span></p><div data-dcnode-id="121"><span data-dcnode-id="122" instrument_node="">
</span></div><p data-dcnode-id="117"><span data-dcnode-id="120" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="118"><span data-dcnode-id="119" instrument_node=""> Whenever the Heads of Mission or principal officer is leaving Negara Brunei Darussalam for a temporary absence, missions are requested to inform the Protocol and Consular Department by note of the date of his absence and the name of the officer who will be in charge during that period. The appointment of the Charge d'Affaires is governed by Article 19 of the Vienna Convention on Diplomatic Relation of 1961.</span></span></p><div data-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">
</span></div><p data-dcnode-id="111"><span data-dcnode-id="114" instrument_node="">
</span><span class="ms-rteThemeForeColor-1-5" data-dcnode-id="112"><span data-dcnode-id="113" instrument_node=""> Prior to the final departure from Negara Brunei Darussalam of the Head of Mission, it is expected that the Protocol and Consular Affairs Department will be informed so that farewell calls on His Majesty the Sultan and Yang Di-Pertuan of Brunei Darussalam and the Minister of Foreign Affairs&nbsp;can be arranged.</span></span></p><div data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">
</span></div></div><div data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">
</span></div></div><div data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">
