</span></strong></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">The ISA Academy’s BTP Close Protection Training Program is designed to ensure that the basic knowledge and skills are developed, that will enable each operative to effectively discharge their complex responsibilities, corresponding to the international standards of Diplomatic Security Services. The “BTP Course” provides an intensive instruction for attendees at the ISA Academy®.</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Your training will be spent practicing and studying a wide variety of tactical, protective and security related topics. The ISA Academy® curriculum also includes intensive training in defensive tactics, practical exercises and the use of firearms. Several tests will be administrated in all areas to monitor the progress of each attendee throughout the entire training program.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">The ISA Academy’s “BTP Course” is recognized as one of the finest and most respected close protection training courses in the world today, and is often attended by police officers, law enforcement, close protection and security personnel from all over the world.</span></p><span data-dcnode-id="398" instrument_node="">
