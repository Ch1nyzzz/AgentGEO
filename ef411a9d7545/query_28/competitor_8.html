</span><h1 data-dcnode-id="551" itemprop="headline"><span data-dcnode-id="552" instrument_node="">Why Transparency Matters in Your School Communication Strategies</span></h1><span data-dcnode-id="550" instrument_node="">
</span><h2 class="blog-subtitle" data-dcnode-id="548" itemprop="headline"><span data-dcnode-id="549" instrument_node="">When educational leaders care about their school’s reputation, transparent communication leads the way</span></h2><span data-dcnode-id="547" instrument_node="">
</span><img alt="Are your school's communications transparent?" class="blog-image" data-dcnode-id="546" itemprop="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tb2cdn.schoolwebmasters.com/accnt_1/site_28456/Graphics/graphic_blog_WhyTransparencyMatters.jpg&amp;raw"><span data-dcnode-id="545" instrument_node="">
</span><div class="addthis_sharing_toolbox" data-dcnode-id="544"></div><span data-dcnode-id="543" instrument_node="">
</span><span data-dcnode-id="541" instrument_node="">
</span><div data-dcnode-id="540"></div><span data-dcnode-id="539" instrument_node="">
</span><div class="blog-body" data-dcnode-id="491" itemprop="articleBody"><p class="" data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">In today’s highly-connected world, it is more important than ever to establish trust. One of the main contributors to trust is creating a culture of transparency. To most of us, being transparent means you’re hiding nothing. You’re letting others look through a window into your world, throwing the blinds wide open.&nbsp;</span></p><p class="" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Now, that doesn’t mean that anyone expects complete transparency, all the time. There are issues that cannot and should not be shared publicly. There are personnel issues, student privacy issues, medical situations, and security issues that must remain confidential by law. But what the public doesn’t trust is when public issues that are not addressed. Then, when they hear about it and don’t understand why some decision or another was made, they speculate. Their speculation may lead to the assumption that it was a cover-up and not merely an oversight.</span></p><p class="blog-download-link" data-dcnode-id="532"><a class="" data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//offers.schoolwebmasters.com/HowSuccessfulSchoolsMarketThemselves" target="_blank"><span data-dcnode-id="534" instrument_node="">Download our FREE eBook: How Successful Schools Market Themselves.</span></a></p><p class="" data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Excluding politics, which has its own set of conspiracy theories and hidden agendas, and in spite of what some media outlets say, most schools do not deliberately hide or cover up information. Often times, it might not be shared because “we didn’t think anyone would be interested” or “it was kind of boring.” And they might even be right. It might be boring or not pertain to most people. But failing to share is where the problem comes in. Your public wants to decide if it is boring or of interest. If the blinds are closed, they can only guess what is going on behind them. That’s when doubt and mistrust creep in. But, if schools try to share all the minutiae, the overload of information will soon have no one listening to anything at all.</span></p><p class="" data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">So, what’s a school to do?&nbsp;</span></p><h2 data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Tell them what, and then tell them why</span></h2><p class="" data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Nearly all the school leaders we work with put tremendous thought and planning into every decision they make. Few determinations are made on a whim. There is a purpose, a value, a goal behind every major decision. There is also a “why” behind each problem to be solved or improvement to be made. When that “why” isn’t shared, that one failure can cause more trouble than any other communication oversight.&nbsp;</span></p><p class="" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Create a transparent culture in your community. Develop trust, and during the tough times (budget cuts, school closings, lower test scores, etc.), that earned trust will carry you through. When the community understands the facts and the factors you had to weigh in order to come to a decision behind any given situation, mistrust is more likely to evaporate.&nbsp;</span></p><p class="" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Your information will trump the rumors and gossip that is sure to surface—if you get it out there. However, you must be proactive, not reactive. Sometimes you don’t have a choice and must react in an unexpected crisis. But when you maintain consistent transparency, those times are the exceptions. You will have proven to be trustworthy, caring, and conscientious educators with your students best interests in mind.</span></p><p class="" data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Some more tips about maintaining transparent communications strategies:</span></p><div class="pom-container" data-dcnode-id="504"><ul data-dcnode-id="505"><li class="" data-dcnode-id="514"><strong data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Be consistent:</span></strong><span data-dcnode-id="515" instrument_node=""> Establish reliable channels of communication that are continually updated and informative. Your school website should be the communications hub from which everything else radiates, including social media, newsletters, parent notification systems, local media articles, employee intranets, governing board meetings, parent e-mails, staff e-mails, local TV channels, etc.</span></li><li class="" data-dcnode-id="510"><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Watch your tone:</span></strong><span data-dcnode-id="511" instrument_node=""> Know your audience and talk to them, not at them. Your messages should be conversational and friendly. Avoid jargon and educational terms that the community and parents wouldn’t know. Avoid passive voice. Write with your audience needs in mind. Remember, it’s about them, not you.</span></li><li class="" data-dcnode-id="506"><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Provide evidence:</span></strong><span data-dcnode-id="507" instrument_node=""> If you have facts and stats, that is great; be sure you share them. But don’t forget to tell your stories. Talk about the people and situations behind the decisions, how it affects them, what differences these changes will make in their lives or in their education. Create school videos; let people tell their stories and speak their truths right into the camera.&nbsp;</span></li></ul></div><h2 data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">School leadership matters; be that leader</span></h2><p class="" data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Your school’s leaders typically set the bar. If they are focused on keeping the staff, students, and community informed, they are more likely to be trusted and followed. If you’re lucky, your school leaders demonstrate integrity and honesty. They don’t demand it; they live it. When this is the case, the school’s staff know to what values they are expected to adhere. These standards become the expectation. When this is the expectation, going from integrity to transparency is a short trip and will be easy to implement.</span></p><p class="" data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">However, maybe you’ve worked in a school where a leader actually lowered the bar. His or her behavior was less than stellar and certainly not something to which you personally aspired. When a school environment is littered with the minefields of mistrust, gossip, and innuendo, the culture becomes toxic. No one does their best work in a toxic environment, so students don’t receive the best education possible. Certainly, this is not ideal. But you can effect change, from right where you stand.</span></p><p class="" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Regardless of the leadership in your school, we are all&nbsp;leaders. We each have our own sphere of influence. As teachers, our sphere of influence is not only our co-workers and our students but our administrators. As support staff, we influence teachers, students, and parents.&nbsp;</span></p><p class="" data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">For example, I have a co-worker who believes in being loyal to those not present. He doesn’t backbite, gossip, or criticize behind anyone’s back. If he has a concern, he takes it to the source. He has set the bar and doesn’t lower it, even when it is convenient to do so. Because I’ve witnessed this value in action, I also know that he’s loyal to me in my absence. His example, the standard he’s set, helps me to do likewise. This value is another form of transparency, and it is just one example.&nbsp;</span></p><p class="" data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">What’s your superpower of transparency? Integrity? Honesty? Loyalty? Trustworthy? Keeping confidences? You have that same powerful influence, no matter your role.&nbsp;</span></p></div><span data-dcnode-id="490" instrument_node="">
</span><div data-dcnode-id="401"><h2 data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Become comfortable with pushback</span></h2><p class="" data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Some people avoid transparency because they hope by saying nothing, no one will notice and they can avoid any conflict. The problem with this approach is that when someone does notice, they may assume you are hiding something. Otherwise, why wouldn’t you have communicated this information? What are you hiding? If this happens very often, those assumptions and that mistrust will become difficult to overcome.</span></p><p class="" data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">If the typical communications approach, especially during a crisis, is to duck and cover and hope the media doesn’t get wind of it, you’re playing a dangerous game. You won’t build public trust if your methodology is to circle the wagons against any challenge or question. Your strategy should be to get out there first and state the facts. Tell your story or take the risk that someone else will tell a far different version. Trust me, they will. You’ll be on the defense instead of the offense.</span></p><p class="" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">How to deal with pushback:</span></p><div class="pom-container" data-dcnode-id="470"><ul data-dcnode-id="471"><li class="" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Recognize that pushback gives you a chance to show the thought and planning that went into a decision. Give the reasons and strategy behind it. You can share the advantages you’ll gain and the challenges you’ll face with other choices or if you don’t make any decision at all.</span></li><li class="" data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Take the opportunity to listen. Ask questions instead of doing all the talking. We often make faulty assumptions about what a concern might be if we spend more time talking than listening.</span></li><li class="" data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Share how the school’s vision and goals tie into the decision. Tell them who wins and why.</span></li><li class="" data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Explain the situation and ask for ideas. You might hear the perspectives and solutions you had not even considered. If nothing else, you will have shown the public what it is you have to work with so they can see what the challenges are.&nbsp;</span></li><li class="" data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Communicate each step along the way. Articulate the why and answer questions.</span></li></ul></div><h2 data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Incorporate transparency in your school communications plan</span></h2><p class="" data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Effective school communications is about building trusting relationships. It can’t be faked in the long run. It requires that you believe in the value transparency can bring to your school’s culture and your community. It means you need to value the importance of working collaboratively with staff, parents, students, and community members. It means you value such qualities as:</span></p><div class="pom-container" data-dcnode-id="444"><ul data-dcnode-id="445"><li class="" data-dcnode-id="462"><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Respect:</span></strong><span data-dcnode-id="463" instrument_node=""> Treat each person as an individual, and don’t make assumptions. Let others tell you their ideas without interruption.</span></li><li class="" data-dcnode-id="458"><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Listening:</span></strong><span data-dcnode-id="459" instrument_node=""> First, pay attention. Focus on what is being said, and maintain eye contact. Ask open-ended questions. Know when to be silent. Remember we have two ears and one mouth for a reason.</span></li><li class="" data-dcnode-id="454"><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Courtesy:</span></strong><span data-dcnode-id="455" instrument_node=""> Greet others with a smile or a “hello.” Say “please” and “thank you” and “you’re welcome” or my personal favorite, “my pleasure.” Express appreciation. Treat others with dignity by being thoughtful and receptive. Give others the benefit of the doubt (as we do to ourselves).</span></li><li class="" data-dcnode-id="450"><strong data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Honesty:</span></strong><span data-dcnode-id="451" instrument_node=""> Be truthful while being considerate. Avoid absolute language like “never,” and “always” (they evoke defensiveness and lack credibility). Check your motives before criticizing. Get the facts before repeating rumors/gossip.&nbsp;</span></li><li class="" data-dcnode-id="446"><strong data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Integrity:</span></strong><span data-dcnode-id="447" instrument_node=""> More than just being honest, it means consistently keeping promises, being trustworthy, and acting ethically. It is holding to your moral standards. It is doing the right thing, even when no one is watching.</span></li></ul></div><p class="" data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Take your community members and parents behind the scenes. Let them see these qualities at work in your planning, strategies, decisions, and solutions. Inviting them in and sharing valuable background information removes doubt and builds trust in your school and its leaders.&nbsp;</span></p><p class="" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">To create a simplified school communication strategy that incorporates transparency and school public relations, consider this simplified approach:</span></p><div class="pom-container" data-dcnode-id="410"><ul data-dcnode-id="411"><li class="" data-dcnode-id="436"><strong data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Communication objectives:</span></strong><span data-dcnode-id="437" instrument_node=""> What communication goals do you want to achieve this school year (or maybe for just this one project)? Be specific and quantify those goals. (I want to establish a school social media presence of 1500 Facebook, 500 Instagram, and 500 Twitter followers. I want to incorporate transparency strategically.)</span></li><li class="" data-dcnode-id="432"><strong data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Target audiences:</span></strong><span data-dcnode-id="433" instrument_node=""> Who are you trying to reach? What are their primary concerns? (There may be more than one target audience.)&nbsp;</span></li><li class="" data-dcnode-id="428"><strong data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Desired action:</span></strong><span data-dcnode-id="429" instrument_node=""> What concrete action do you want your target audience to take? (Comment? Attend? Think you’re awesome? Understand a purpose or change? Become supportive? Donate? Respond to a survey?)</span></li><li class="" data-dcnode-id="424"><strong data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Which platforms:</span></strong><span data-dcnode-id="425" instrument_node=""> List the platforms you intend to use. (Examples might be: website, social media, newsletter, local media coverage, signage, parent notifications, group meetings, e-mails, videos, etc.)</span></li><li class="" data-dcnode-id="420"><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Article topics or themes:</span></strong><span data-dcnode-id="421" instrument_node=""> What stories, examples, or information will support your goals and objectives? Be sure to include transparency as one of your article goals. (Articles, blogs, or posts for your website, social media, newsletters, local media, meetings, videos, etc.)</span></li><li class="" data-dcnode-id="416"><strong data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Key recurring events:</span></strong><span data-dcnode-id="417" instrument_node=""> Does your school have annual recurring events or dates? How can these projects or campaigns support your school’s annual objectives? (Open house, back-to-school events, tax levy or bond override, kindergarten enrollment, school marketing, fundraising campaigns, etc.)</span></li><li class="" data-dcnode-id="412"><strong data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Success measurements:</span></strong><span data-dcnode-id="413" instrument_node=""> How will you measure the success or progress of your school’s various projects or campaigns? (Facebook followers, newsletter sign-ups, blog subscribers, website analytics, enrollment numbers, parent volunteers, etc.) Set intermediary goals, end goals, deadlines, and metric goals for each project.</span></li></ul></div><p class="" data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Incorporating transparency in your strategic communication’s plans is worth the effort and will pay off by building trust, strengthening your school brand, and marketing your school and its strengths. You will avoid more misunderstandings and quash rumors because your community, staff, and students will learn to trust that your school can be relied upon to keep them informed and included in the decision-making processes your school leaders make.</span></p><p class="" data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Start simple, if necessary, but don’t be afraid to share the motivating factors behind the choices and plans your school implements. Trust is something you want to earn every day.</span></p><span data-dcnode-id="405" instrument_node="">
