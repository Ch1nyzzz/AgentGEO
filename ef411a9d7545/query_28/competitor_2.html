</span><h3 data-dcnode-id="3093"><span class="mw-headline" data-dcnode-id="3101" id="Election_results"><span data-dcnode-id="3102" instrument_node="">Election results</span></span><span class="mw-editsection" data-dcnode-id="3094"><span class="mw-editsection-bracket" data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">[</span></span><a data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D15" title="Edit section: Election results"><span data-dcnode-id="3098" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3092" instrument_node="">
</span><p data-dcnode-id="3083"><span data-dcnode-id="3091" instrument_node="">In October 2020, Twitter announced its new policy that candidates will be forbidden to claim victory until their election win has been credibly projected by news outlets or officially certified.</span><sup class="reference" data-dcnode-id="3088" id="cite_ref-53"><a data-dcnode-id="3089" href="#cite_note-53"><span data-dcnode-id="3090" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="3085" id="cite_ref-54"><a data-dcnode-id="3086" href="#cite_note-54"><span data-dcnode-id="3087" instrument_node="">[54]</span></a></sup><span data-dcnode-id="3084" instrument_node="">
</span></p><span data-dcnode-id="3082" instrument_node="">
</span><h3 data-dcnode-id="3072"><span class="mw-headline" data-dcnode-id="3080" id="Impact_on_elections"><span data-dcnode-id="3081" instrument_node="">Impact on elections</span></span><span class="mw-editsection" data-dcnode-id="3073"><span class="mw-editsection-bracket" data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">[</span></span><a data-dcnode-id="3076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D16" title="Edit section: Impact on elections"><span data-dcnode-id="3077" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3074"><span data-dcnode-id="3075" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3071" instrument_node="">
</span><p data-dcnode-id="3065"><span data-dcnode-id="3070" instrument_node="">Social media has a profound effect on elections. Oftentimes, social media compounds with the mass media networks such as cable television. For many individuals, cable television serves as the basis and first contact for where many get their information and sources. Cable television also has commentary that creates partisanship and builds on to people's predispositions to certain parties. Social media takes mass media's messages and oftentimes amplifies and reinforces such messages and perpetuates partisan divides.</span><sup class="reference" data-dcnode-id="3067" id="cite_ref-55"><a data-dcnode-id="3068" href="#cite_note-55"><span data-dcnode-id="3069" instrument_node="">[55]</span></a></sup><span data-dcnode-id="3066" instrument_node=""> In an article by the Journal of Communication, they concluded that social media does not have a strong effect on people's views or votes, but social media does not also have a minimal effect on their views. Instead, social media creates a bandwagon effect when a candidate in an election commits an error or a great success, then users on social media will amplify the effect of such failure or success greatly.
</span></p><p data-dcnode-id="3049"><span data-dcnode-id="3064" instrument_node="">The Pew Research Center finds that nearly one fourth of Americans learn something about the candidates through an internet source such as </span><a data-dcnode-id="3062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Facebook" title="Facebook"><span data-dcnode-id="3063" instrument_node="">Facebook</span></a><span data-dcnode-id="3061" instrument_node="">. Nearly a fifth of America uses social media with two thirds of those Americans being youth ages of 18–29. The youth's presence on social media often inspires rallies and creates movements. For instance, in the 2008 presidential election, a Facebook group of 62,000 members was created that sponsored the election of President Obama and within days universities across the countries held rallies in the thousands. Rallies and movements such as these are often coined the "</span><a data-dcnode-id="3059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Facebook_Effect" title="The Facebook Effect"><span data-dcnode-id="3060" instrument_node="">Facebook Effect</span></a><span data-dcnode-id="3058" instrument_node="">".</span><sup class="reference" data-dcnode-id="3055" id="cite_ref-56"><a data-dcnode-id="3056" href="#cite_note-56"><span data-dcnode-id="3057" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3054" instrument_node=""> However, social media can often have the opposite effect and take a toll on many users. The Pew Research Center in a poll found that nearly 55 percent of social media users in the US indicate that they are "worn out" by the amount of political posts on social media. With the rise of technology and social media continuing, that number increased by nearly 16 percent since the 2016 presidential election. Nearly 70 percent of individuals say that talking about politics on social media with people on the opposite side is often "stressful and frustrating" compared to 56 percent in 2016. Consequently, the number of people who find these discussions as "interesting and informative" decreased from 35% to 26% since 2016.</span><sup class="reference" data-dcnode-id="3051" id="cite_ref-57"><a data-dcnode-id="3052" href="#cite_note-57"><span data-dcnode-id="3053" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3050" instrument_node="">
</span></p><p data-dcnode-id="3039"><span data-dcnode-id="3048" instrument_node="">In terms of social media's effect on the youth vote, it is quite substantial. In the 2018 elections, nearly 31 percent of the youth voted compared to just 21 percent in 2014. Social media use among the youth continue to grow as around 90 percent of the youth use at least one social media platform. Of the 90 percent, 47 percent received information about the 2018 elections via a social media platform. The messages shared on the social media platform often include messages to register to vote and actually carrying out their vote; this is in contrast to receiving the message from the candidate's campaign itself. Subsequently, of the first time youth voters in the 2018 election, 68 percent relied on social media to get their information about voting. This is in comparison to the traditional methods of being notified to vote of just 23 percent first time voters. Furthermore, just 22 percent of youth who did not hear about an election via social media or traditional means were very likely to vote; however, 54 percent of youth who found out about the election via social media or traditional ways were very likely to vote.</span><sup class="reference" data-dcnode-id="3045" id="cite_ref-58"><a data-dcnode-id="3046" href="#cite_note-58"><span data-dcnode-id="3047" instrument_node="">[58]</span></a></sup><span data-dcnode-id="3044" instrument_node=""> However, the youth are becoming distrustful of the content they read on social media as Forbes notes that there has been a decline in public trust due to many political groups and foreign nations creating fake accounts to spread a great amount of misinformation with the aim of dividing the country.</span><sup class="reference" data-dcnode-id="3041" id="cite_ref-Suciu_59-0"><a data-dcnode-id="3042" href="#cite_note-Suciu-59"><span data-dcnode-id="3043" instrument_node="">[59]</span></a></sup><span data-dcnode-id="3040" instrument_node="">
</span></p><p data-dcnode-id="3015"><span data-dcnode-id="3038" instrument_node="">Social media often filters what information individuals see. Since 2008, the number of individuals who get their news via social media has increased to 62 percent.</span><sup class="reference" data-dcnode-id="3035" id="cite_ref-60"><a data-dcnode-id="3036" href="#cite_note-60"><span data-dcnode-id="3037" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3034" instrument_node=""> On these social media sites, there are many algorithms run that filter what information individual users see. The algorithms understand a users favorites and dislikes, they then begin to cater their feed to their likes. Consequently, this creates an </span><a data-dcnode-id="3032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Echo_chamber_%28media%29" title="Echo chamber (media)"><span data-dcnode-id="3033" instrument_node="">echo chamber</span></a><span data-dcnode-id="3031" instrument_node="">.</span><sup class="reference" data-dcnode-id="3028" id="cite_ref-journalism.uoregon.edu_61-0"><a data-dcnode-id="3029" href="#cite_note-journalism.uoregon.edu-61"><span data-dcnode-id="3030" instrument_node="">[61]</span></a></sup><span data-dcnode-id="3027" instrument_node=""> For instance, black social media users were more likely to see race related news and in 2016 the Trump campaign used Facebook and other platforms to target Hillary Clinton's supporters to drive them out of the election and taking advantage of such algorithms.</span><sup class="reference" data-dcnode-id="3024" id="cite_ref-62"><a data-dcnode-id="3025" href="#cite_note-62"><span data-dcnode-id="3026" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3023" instrument_node=""> Whether or not these algorithms have an effect on people's vote and their views is mixed. Iowa State University finds that for older individuals, even though their access to social media is far lower than the youth, their political views were far more likely to change from the 1996–2012 time periods, which indicates that there are a myriad of other factors that impact political views. They further that based upon other literature, Google has a </span><a data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Media_bias" title="Media bias"><span data-dcnode-id="3022" instrument_node="">liberal bias</span></a><span data-dcnode-id="3020" instrument_node=""> in their search results. Consequently, these biased search results can affect an individual's voting preferences by nearly 20 percent. In addition, 23 percent of an individual's Facebook friends are of an opposing political view and nearly 29 percent of the news they receive on the platform is also in opposition of their political ideology, which indicates that the algorithms on these new platforms do not completely create echo chambers.</span><sup class="reference" data-dcnode-id="3017" id="cite_ref-63"><a data-dcnode-id="3018" href="#cite_note-63"><span data-dcnode-id="3019" instrument_node="">[63]</span></a></sup><span data-dcnode-id="3016" instrument_node="">
</span></p><p data-dcnode-id="2977"><span data-dcnode-id="3014" instrument_node="">Washington State University political science professor Travis Ridout explains that in the United Kingdom the popular social media platforms of </span><a data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twitter" title="Twitter"><span data-dcnode-id="3013" instrument_node="">Twitter</span></a><span data-dcnode-id="3011" instrument_node="">, </span><a data-dcnode-id="3009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Facebook" title="Facebook"><span data-dcnode-id="3010" instrument_node="">Facebook</span></a><span data-dcnode-id="3008" instrument_node="">, </span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Instagram" title="Instagram"><span data-dcnode-id="3007" instrument_node="">Instagram</span></a><span data-dcnode-id="3005" instrument_node="">, and </span><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/YouTube" title="YouTube"><span data-dcnode-id="3004" instrument_node="">YouTube</span></a><span data-dcnode-id="3002" instrument_node=""> are beginning to play a significant role in campaigns and elections. Contrary to the </span><a data-dcnode-id="3000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="3001" instrument_node="">United States</span></a><span data-dcnode-id="2999" instrument_node=""> which allows television ads, in the </span><a data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="2998" instrument_node="">United Kingdom</span></a><span data-dcnode-id="2996" instrument_node=""> television ads are banned and thus campaigns are now launching huge efforts on social media platforms. Ridout furthers that the social media ads have gotten in many cases offensive and in attack formation at many politicians. Social media is able to provide many individuals with a sense of anonymity that enables them to get away with such aggressive acts. For example, ethnic minority women politicians are often the targets of such attacks.</span><sup class="reference" data-dcnode-id="2993" id="cite_ref-64"><a data-dcnode-id="2994" href="#cite_note-64"><span data-dcnode-id="2995" instrument_node="">[64]</span></a></sup><span data-dcnode-id="2992" instrument_node=""> Furthermore, in the United States, many of the youth conservative voices are often reduced. For instance, </span><a data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PragerU" title="PragerU"><span data-dcnode-id="2991" instrument_node="">PragerU</span></a><span data-dcnode-id="2989" instrument_node="">, a conservative organization, often has their videos taken down.</span><sup class="reference" data-dcnode-id="2986" id="cite_ref-Suciu_59-1"><a data-dcnode-id="2987" href="#cite_note-Suciu-59"><span data-dcnode-id="2988" instrument_node="">[59]</span></a></sup><span data-dcnode-id="2985" instrument_node=""> On a different level, social media can also hamper many political candidates. Media and social media often publish stories about news that are controversial and popular and will ultimately drive more traffic. A key example is </span><a data-dcnode-id="2983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="2984" instrument_node="">President Donald Trump</span></a><span data-dcnode-id="2982" instrument_node=""> whose controversial statements in 2016 often brought the attention of many individuals and thereby increased his popularity while shunning out other candidates.</span><sup class="reference" data-dcnode-id="2979" id="cite_ref-journalism.uoregon.edu_61-1"><a data-dcnode-id="2980" href="#cite_note-journalism.uoregon.edu-61"><span data-dcnode-id="2981" instrument_node="">[61]</span></a></sup><span data-dcnode-id="2978" instrument_node="">
</span></p><p data-dcnode-id="2959"><span data-dcnode-id="2976" instrument_node="">In the </span><a data-dcnode-id="2974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_United_States_presidential_election" title="2020 United States presidential election"><span data-dcnode-id="2975" instrument_node="">2020 Presidential Election</span></a><span data-dcnode-id="2973" instrument_node="">, social media was very prevalent and used widely by both campaigns. For Twitter, nearly 87 million users follow President </span><a data-dcnode-id="2971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="2972" instrument_node="">Donald Trump</span></a><span data-dcnode-id="2970" instrument_node=""> while 11 million users follow </span><a data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joe_Biden" title="Joe Biden"><span data-dcnode-id="2969" instrument_node="">Joe Biden</span></a><span data-dcnode-id="2967" instrument_node="">. Despite the significant gap between the two, Biden's top tweets have outperformed Donald Trump's top tweets by nearly double. In terms of mentions of each candidate on Twitter, from October 21 to October 23, there were 6.6 million mentions of Trump and Biden and Biden held 72%  of the mentions. During the </span><a data-dcnode-id="2965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_United_States_presidential_debates" title="2020 United States presidential debates"><span data-dcnode-id="2966" instrument_node="">2020 Presidential Debates</span></a><span data-dcnode-id="2964" instrument_node="">, Biden had nearly two times the mentions as Donald Trump with nearly half of the mentions being negative. For Trump, he also had have of his mentions being negative as well.</span><sup class="reference" data-dcnode-id="2961" id="cite_ref-65"><a data-dcnode-id="2962" href="#cite_note-65"><span data-dcnode-id="2963" instrument_node="">[65]</span></a></sup><span data-dcnode-id="2960" instrument_node="">
</span></p><p data-dcnode-id="2939"><span data-dcnode-id="2958" instrument_node="">In Europe, the influence of social media is less than that of the United States. In 2011, only 34% of MEPs use twitter, while 68% use Facebook. In 2012, the EPP had the highest social media following of 7,418 compared to the other parties. This is in relationship to the 375 million voters in all of Europe. When comparing the impact to US social media following, former President Obama has over 27 million fans while the highest in Europe was former French President </span><a data-dcnode-id="2956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nicolas_Sarkozy" title="Nicolas Sarkozy"><span data-dcnode-id="2957" instrument_node="">Nicolas Sarkozy</span></a><span data-dcnode-id="2955" instrument_node=""> of over 700,000 fines, a stark difference. The </span><a data-dcnode-id="2953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2008_United_States_presidential_election" title="2008 United States presidential election"><span data-dcnode-id="2954" instrument_node="">2008 US presidential election</span></a><span data-dcnode-id="2952" instrument_node=""> skyrocketed the need for technologies to be used in politics and campaigns, especially social media. Europe is now following their lead and has been increasing their use of social media since.</span><sup class="reference" data-dcnode-id="2949" id="cite_ref-66"><a data-dcnode-id="2950" href="#cite_note-66"><span data-dcnode-id="2951" instrument_node="">[66]</span></a></sup><span data-dcnode-id="2948" instrument_node="">
However, just because European Politicians don't use social media as much as American Politicians doesn't mean that social media platforms such as Facebook and Twitter don't play a large role in European Politics- in particular- Elections. In the run-up to the 2017 German Bundestag Elections, a group of extremists used social media platforms such as Twitter and YouTube in hopes of gaining support for the far-right group Alternative für Deutschland. Despite being limited in numbers, the group were able to publish "patriotic videos" that managed to get on to the Trending tab on YouTube as well as being able to trend the hashtag "#AfD" on Twitter.</span><sup class="reference" data-dcnode-id="2945" id="cite_ref-67"><a data-dcnode-id="2946" href="#cite_note-67"><span data-dcnode-id="2947" instrument_node="">[67]</span></a></sup><span data-dcnode-id="2944" instrument_node=""> Though polled to come 5th in the election, Alternative für Deutschland won 13.3% of the vote, making them the third largest party within the Bundestag, making them the first far-right party to enter the building since 1961</span><sup class="reference" data-dcnode-id="2941" id="cite_ref-68"><a data-dcnode-id="2942" href="#cite_note-68"><span data-dcnode-id="2943" instrument_node="">[68]</span></a></sup><span data-dcnode-id="2940" instrument_node="">
</span></p><p data-dcnode-id="2919"><span data-dcnode-id="2938" instrument_node="">In the UK, </span><a data-dcnode-id="2936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cambridge_Analytica" title="Cambridge Analytica"><span data-dcnode-id="2937" instrument_node="">Cambridge Analytica</span></a><span data-dcnode-id="2935" instrument_node=""> was allegedly hired as a consultant company for </span><a data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leave.EU" title="Leave.EU"><span data-dcnode-id="2934" instrument_node="">Leave.EU</span></a><span data-dcnode-id="2932" instrument_node=""> and the </span><a data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UK_Independence_Party" title="UK Independence Party"><span data-dcnode-id="2931" instrument_node="">UK Independence Party</span></a><span data-dcnode-id="2929" instrument_node=""> during 2016, as an effort to convince people to support Brexit. These rumours were the result of the leaked internal emails that were sent between Cambridge Analytica firm and the British parliament. These datasets composed of the data obtained from </span><a data-dcnode-id="2927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Facebook" title="Facebook"><span data-dcnode-id="2928" instrument_node="">Facebook</span></a><span data-dcnode-id="2926" instrument_node=""> were said to be work done as an initial job deliverable for them. Although Arron Banks, co-founder of Leave.EU, denied any involvement with the company, he later declared “When we said we’d hired Cambridge Analytica, maybe a better choice of words could have been deployed." The official investigation by the UK Information Commissioner found that Cambridge Analytica was not involved "beyond some initial enquiries" and the regulator did not identify any "significant breaches" of data protection legislation or privacy or marketing regulations "which met the threshold for formal regulatory action"
In early July 2018, the United Kingdom's Information Commissioner's Office announced it intended to fine Facebook £500,000 ($663,000) over the data breach, this being the maximum fine allowed at the time of the breach, saying Facebook "contravened the law by failing to safeguard people's information". In 2014 and 2015, the Facebook platform allowed an app that ended up harvesting 87 million profiles of users around the world that was then used by Cambridge Analytica in the 2016 presidential campaign and in the Brexit referendum. Although Cambridge Analytica were cleared, questions were still raised with how they came to access these Facebook profiles and target voters that would not have necessarily voted in this matter in the first place. </span><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dominic_Cummings" title="Dominic Cummings"><span data-dcnode-id="2925" instrument_node="">Dominic Cummings</span></a><span data-dcnode-id="2923" instrument_node=""> the prime minister's ex aide had a majority in involving Cambridge Analytica in the Leave.EU campaign, this can be seen in the real accounts of </span><a data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brexit%3A_The_Uncivil_War" title="Brexit: The Uncivil War"><span data-dcnode-id="2922" instrument_node="">Brexit: The Uncivil War</span></a><span data-dcnode-id="2920" instrument_node="">.
</span></p><p data-dcnode-id="2901"><span data-dcnode-id="2918" instrument_node="">In terms of analyzing the role of fake news in social media, there tends to be about three times more fake new articles that were more likely to be pro-Trump over pro-Clinton articles. There were 115 pro-Trump fake news articles while only 41 pro-Clinton fake news articles; pro-Trump articles were shared 30.3 million times while pro-Clinton articles were shared 7.6 million times on Facebook. For each share there is about 20 page visits which means that with around 38 million shares of fake news articles there are 760 million page views to these articles. This means that roughly each US adult visited a fake news site three times.</span><sup class="reference" data-dcnode-id="2915" id="cite_ref-69"><a data-dcnode-id="2916" href="#cite_note-69"><span data-dcnode-id="2917" instrument_node="">[69]</span></a></sup><span data-dcnode-id="2914" instrument_node=""> Whether the spread of fake news has an impact on elections is conflicted as more research is required and is difficult to place a quantification on the effects. However, fake news is more likely to influence individuals who are over 65 and are more conservative. These groups tend to believe fake news more than other groups. College students have difficulty in determining if an article shared on social media is fake news.</span><sup class="reference" data-dcnode-id="2911" id="cite_ref-70"><a data-dcnode-id="2912" href="#cite_note-70"><span data-dcnode-id="2913" instrument_node="">[70]</span></a></sup><span data-dcnode-id="2910" instrument_node=""> The same study also concluded that conspiratorial beliefs could be predicted by a person's political party affiliation or their ideological beliefs.</span><sup class="reference" data-dcnode-id="2907" id="cite_ref-71"><a data-dcnode-id="2908" href="#cite_note-71"><span data-dcnode-id="2909" instrument_node="">[71]</span></a></sup><span data-dcnode-id="2906" instrument_node=""> For example, those that Republican or held a more conservative belief were far more likely to believe in baseless theories such as that of former President Obama being born outside of the United States; and those that voted Democrat or held a more liberal belief would be more likely to believe in conspiracies such as former President Bush having played a role in the 9/11 attacks.</span><sup class="reference" data-dcnode-id="2903" id="cite_ref-72"><a data-dcnode-id="2904" href="#cite_note-72"><span data-dcnode-id="2905" instrument_node="">[72]</span></a></sup><span data-dcnode-id="2902" instrument_node="">
</span></p><span data-dcnode-id="2900" instrument_node="">
</span><h2 data-dcnode-id="2890"><span class="mw-headline" data-dcnode-id="2898" id="Role_in_conflict"><span data-dcnode-id="2899" instrument_node="">Role in conflict</span></span><span class="mw-editsection" data-dcnode-id="2891"><span class="mw-editsection-bracket" data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">[</span></span><a data-dcnode-id="2894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D17" title="Edit section: Role in conflict"><span data-dcnode-id="2895" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2883"><span data-dcnode-id="2888" instrument_node="">There are four ways social media plays a significant role in conflict:.</span><sup class="reference" data-dcnode-id="2885" id="cite_ref-Zeitzoff_2017_73-0"><a data-dcnode-id="2886" href="#cite_note-Zeitzoff_2017-73"><span data-dcnode-id="2887" instrument_node="">[73]</span></a></sup><span data-dcnode-id="2884" instrument_node="">
</span></p><span data-dcnode-id="2882" instrument_node="">
</span><ol data-dcnode-id="2867"><li data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">Social media platforms allow information to be framed in mainstream platforms which limits communication.</span></li><span data-dcnode-id="2879" instrument_node="">
</span><li data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">Social media enables news stories to quickly go viral and later can lead to misinterpretations that can cause conflict.</span></li><span data-dcnode-id="2876" instrument_node="">
</span><li data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">Strategies and the adaption of social media has caused a change in focus amongst leaders from administrative dynamics to new media technology.</span></li><span data-dcnode-id="2873" instrument_node="">
</span><li data-dcnode-id="2868"><span data-dcnode-id="2872" instrument_node="">Technological advancements in communication can increase the power of persuasion leading to corruption, scandals, and violence on social media platforms.</span><sup class="reference" data-dcnode-id="2869" id="cite_ref-74"><a data-dcnode-id="2870" href="#cite_note-74"><span data-dcnode-id="2871" instrument_node="">[74]</span></a></sup></li></ol><span data-dcnode-id="2866" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2855"><div class="thumbinner" data-dcnode-id="2856" style="width:375px;"><a class="image" data-dcnode-id="2864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2010-2011_Arab_Protests_Map_with_Legend.svg"><img alt="" class="thumbimage" data-dcnode-id="2865" data-file-height="557" data-file-width="789" decoding="async" height="263" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ef/2010-2011_Arab_Protests_Map_with_Legend.svg/373px-2010-2011_Arab_Protests_Map_with_Legend.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ef/2010-2011_Arab_Protests_Map_with_Legend.svg/560px-2010-2011_Arab_Protests_Map_with_Legend.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ef/2010-2011_Arab_Protests_Map_with_Legend.svg/746px-2010-2011_Arab_Protests_Map_with_Legend.svg.png 2x" width="373"></a><span data-dcnode-id="2863" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2857"><div class="magnify" data-dcnode-id="2861"><a class="internal" data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2010-2011_Arab_Protests_Map_with_Legend.svg" title="Enlarge"></a></div><span data-dcnode-id="2860" instrument_node="">Map of </span><a data-dcnode-id="2858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_Spring" title="Arab Spring"><span data-dcnode-id="2859" instrument_node="">2011 Arab Spring Protests</span></a></div></div></div><p data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">The role of technological communication and social media in the world can lead to political, economic, and social conflict due to its unmonitored system, cheap interface, and accessibility.
</span></p><h3 data-dcnode-id="2843"><span class="mw-headline" data-dcnode-id="2851" id="Weaponization_by_state_actors"><span data-dcnode-id="2852" instrument_node="">Weaponization by state actors</span></span><span class="mw-editsection" data-dcnode-id="2844"><span class="mw-editsection-bracket" data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">[</span></span><a data-dcnode-id="2847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D18" title="Edit section: Weaponization by state actors"><span data-dcnode-id="2848" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2842" instrument_node="">
</span><p data-dcnode-id="2790"><span data-dcnode-id="2841" instrument_node="">Social media platforms have been </span><a class="new" data-dcnode-id="2839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPlatform_Weaponization%26action%3Dedit%26redlink%3D1" title="Platform Weaponization (page does not exist)"><span data-dcnode-id="2840" instrument_node="">weaponized</span></a><span data-dcnode-id="2838" instrument_node=""> by state-sponsored cyber groups to attack governments in the United States, the European Union, and the Middle East. Although </span><a data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phishing" title="Phishing"><span data-dcnode-id="2837" instrument_node="">phishing attacks</span></a><span data-dcnode-id="2835" instrument_node=""> via email are the most commonly used tactic to breach government networks, phishing attacks on social media rose 500% in 2016.</span><sup class="reference" data-dcnode-id="2832" id="cite_ref-75"><a data-dcnode-id="2833" href="#cite_note-75"><span data-dcnode-id="2834" instrument_node="">[75]</span></a></sup><span data-dcnode-id="2831" instrument_node=""> As with email-based phishing attacks, the majority of phishing attacks on social media are financially motivated cyber crimes that install </span><a data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malware" title="Malware"><span data-dcnode-id="2830" instrument_node="">malware</span></a><span data-dcnode-id="2828" instrument_node="">.</span><sup class="reference" data-dcnode-id="2825" id="cite_ref-76"><a data-dcnode-id="2826" href="#cite_note-76"><span data-dcnode-id="2827" instrument_node="">[76]</span></a></sup><span data-dcnode-id="2824" instrument_node=""> However, cyber groups associated with Russia, Iran, and China have used social media to conduct </span><a data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyberattack" title="Cyberattack"><span data-dcnode-id="2823" instrument_node="">cyberattacks</span></a><span data-dcnode-id="2821" instrument_node=""> and undermine democratic processes in the West. During the 2017 French presidential election, for example, Facebook detected and removed fake accounts linked to the Russian cyber group </span><a data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fancy_Bear" title="Fancy Bear"><span data-dcnode-id="2820" instrument_node="">Fancy Bear</span></a><span data-dcnode-id="2818" instrument_node="">, who were posing as "friends of friends" of </span><a data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emmanuel_Macron" title="Emmanuel Macron"><span data-dcnode-id="2817" instrument_node="">Emmanuel Macron</span></a><span data-dcnode-id="2815" instrument_node=""> associates to steal information from them.</span><sup class="reference" data-dcnode-id="2812" id="cite_ref-77"><a data-dcnode-id="2813" href="#cite_note-77"><span data-dcnode-id="2814" instrument_node="">[77]</span></a></sup><span data-dcnode-id="2811" instrument_node=""> Cyber groups associated with Iran, China, and Russia have used </span><a data-dcnode-id="2809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/LinkedIn" title="LinkedIn"><span data-dcnode-id="2810" instrument_node="">LinkedIn</span></a><span data-dcnode-id="2808" instrument_node=""> to steal trade secrets, gain access to critical infrastructure, or recruit spies.</span><sup class="reference" data-dcnode-id="2805" id="cite_ref-78"><a data-dcnode-id="2806" href="#cite_note-78"><span data-dcnode-id="2807" instrument_node="">[78]</span></a></sup><sup class="reference" data-dcnode-id="2802" id="cite_ref-79"><a data-dcnode-id="2803" href="#cite_note-79"><span data-dcnode-id="2804" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="2799" id="cite_ref-80"><a data-dcnode-id="2800" href="#cite_note-80"><span data-dcnode-id="2801" instrument_node="">[80]</span></a></sup><span data-dcnode-id="2798" instrument_node=""> These </span><a data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_engineering_%28security%29" title="Social engineering (security)"><span data-dcnode-id="2797" instrument_node="">social engineering</span></a><span data-dcnode-id="2795" instrument_node=""> attacks can be multi-platform, with threat actors initiating contact on one platform but continuing communication on more private channel. The Iranian-backed cyber group COBALT GYPSY created a fake persona across multiple social media platforms and initiated contact on LinkedIn before moving to Facebook and email.</span><sup class="reference" data-dcnode-id="2792" id="cite_ref-81"><a data-dcnode-id="2793" href="#cite_note-81"><span data-dcnode-id="2794" instrument_node="">[81]</span></a></sup><span data-dcnode-id="2791" instrument_node="">
</span></p><p data-dcnode-id="2763"><span data-dcnode-id="2789" instrument_node="">In December 2019, a chat and video calling application developed by the </span><a data-dcnode-id="2787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Arab_Emirates" title="United Arab Emirates"><span data-dcnode-id="2788" instrument_node="">United Arab Emirates</span></a><span data-dcnode-id="2786" instrument_node="">, called </span><a data-dcnode-id="2784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ToTok_%28app%29" title="ToTok (app)"><span data-dcnode-id="2785" instrument_node="">ToTok</span></a><span data-dcnode-id="2783" instrument_node=""> was identified as a spying tool by the </span><a class="mw-redirect" data-dcnode-id="2781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/US_intelligence" title="US intelligence"><span data-dcnode-id="2782" instrument_node="">US intelligence</span></a><span data-dcnode-id="2780" instrument_node="">. Suspicion over the Emirati app emerged because it  banned the use of </span><a class="mw-redirect" data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/VoIP" title="VoIP"><span data-dcnode-id="2779" instrument_node="">VoIP</span></a><span data-dcnode-id="2777" instrument_node=""> on applications like </span><a data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WhatsApp" title="WhatsApp"><span data-dcnode-id="2776" instrument_node="">WhatsApp</span></a><span data-dcnode-id="2774" instrument_node="">, </span><a data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FaceTime" title="FaceTime"><span data-dcnode-id="2773" instrument_node="">FaceTime</span></a><span data-dcnode-id="2771" instrument_node=""> and </span><a data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Skype" title="Skype"><span data-dcnode-id="2770" instrument_node="">Skype</span></a><span data-dcnode-id="2768" instrument_node="">.</span><sup class="reference" data-dcnode-id="2765" id="cite_ref-82"><a data-dcnode-id="2766" href="#cite_note-82"><span data-dcnode-id="2767" instrument_node="">[82]</span></a></sup><span data-dcnode-id="2764" instrument_node="">
