</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="457" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="466"><p data-dcnode-id="4070"><b data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">Social media use in politics</span></b><span data-dcnode-id="4086" instrument_node=""> refers to the use of online </span><a data-dcnode-id="4084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_media" title="Social media"><span data-dcnode-id="4085" instrument_node="">social media</span></a><span data-dcnode-id="4083" instrument_node=""> platforms in political processes and activities. Political processes and activities include  all activities that pertain to the governance of a country or area. This includes </span><a data-dcnode-id="4081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_organisation" title="Political organisation"><span data-dcnode-id="4082" instrument_node="">political organization</span></a><span data-dcnode-id="4080" instrument_node="">, </span><a data-dcnode-id="4078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_politics" title="Global politics"><span data-dcnode-id="4079" instrument_node="">global politics</span></a><span data-dcnode-id="4077" instrument_node="">, </span><a data-dcnode-id="4075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_corruption" title="Political corruption"><span data-dcnode-id="4076" instrument_node="">political corruption</span></a><span data-dcnode-id="4074" instrument_node="">, </span><a data-dcnode-id="4072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_party" title="Political party"><span data-dcnode-id="4073" instrument_node="">political parties</span></a><span data-dcnode-id="4071" instrument_node="">, and political values.
</span></p><p data-dcnode-id="4057"><span data-dcnode-id="4069" instrument_node="">The internet has created channels of communication that play a key role in circulating news, and social media has the power to change not just the message, but the dynamics of political corruption, values, and the dynamics of conflict in politics.</span><sup class="reference" data-dcnode-id="4066" id="cite_ref-Warren),_1-0"><a data-dcnode-id="4067" href="#cite_note-Warren),-1"><span data-dcnode-id="4068" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4065" instrument_node=""> Through the use of social media in election processes, global conflict, and extreme politics, diplomacy around the world has become less private and susceptive to the public perception.</span><sup class="reference" data-dcnode-id="4062" id="cite_ref-Warren),_1-1"><a data-dcnode-id="4063" href="#cite_note-Warren),-1"><span data-dcnode-id="4064" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="4059" id="cite_ref-:1_2-0"><a data-dcnode-id="4060" href="#cite_note-:1-2"><span data-dcnode-id="4061" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4058" instrument_node="">
</span></p><span data-dcnode-id="4056" instrument_node="">

</span><h2 data-dcnode-id="3854"><span class="mw-headline" data-dcnode-id="3862" id="Background"><span data-dcnode-id="3863" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="3855"><span class="mw-editsection-bracket" data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node="">[</span></span><a data-dcnode-id="3858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D1" title="Edit section: Background"><span data-dcnode-id="3859" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3853" instrument_node="">
</span><h3 data-dcnode-id="3843"><span class="mw-headline" data-dcnode-id="3851" id="Participatory_role"><span data-dcnode-id="3852" instrument_node="">Participatory role</span></span><span class="mw-editsection" data-dcnode-id="3844"><span class="mw-editsection-bracket" data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">[</span></span><a data-dcnode-id="3847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D2" title="Edit section: Participatory role"><span data-dcnode-id="3848" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3842" instrument_node="">
</span><p data-dcnode-id="3826"><span data-dcnode-id="3841" instrument_node="">Social media have been championed as allowing anyone with an Internet connection to become a </span><a data-dcnode-id="3839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Content_creation" title="Content creation"><span data-dcnode-id="3840" instrument_node="">content creator</span></a><sup class="reference" data-dcnode-id="3836" id="cite_ref-WellmanBarry_3-0"><a data-dcnode-id="3837" href="#cite_note-WellmanBarry-3"><span data-dcnode-id="3838" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3835" instrument_node=""> and empowering their users.</span><sup class="reference" data-dcnode-id="3832" id="cite_ref-PressThink_4-0"><a data-dcnode-id="3833" href="#cite_note-PressThink-4"><span data-dcnode-id="3834" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3831" instrument_node=""> The idea of “new media populism” encompasses how citizens can include disenfranchised citizens, and allow the public to have an engaged and active role in political discourse.  New media, including social media platforms such as Facebook and Twitter, can enhance people's access to political information.</span><sup class="reference" data-dcnode-id="3828" id="cite_ref-:2_5-0"><a data-dcnode-id="3829" href="#cite_note-:2-5"><span data-dcnode-id="3830" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3827" instrument_node="">
</span></p><p data-dcnode-id="3817"><span data-dcnode-id="3825" instrument_node="">
Social media platforms and the internet have facilitated the dissemination of political information that counters mainstream media tactics that are often centralized and top-down, and include high barriers to entry.</span><sup class="reference" data-dcnode-id="3822" id="cite_ref-Andrejevic_2013_6-0"><a data-dcnode-id="3823" href="#cite_note-Andrejevic_2013-6"><span data-dcnode-id="3824" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3821" instrument_node=""> Writer </span><a data-dcnode-id="3819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Howard_Rheingold" title="Howard Rheingold"><span data-dcnode-id="3820" instrument_node="">Howard Rheingold</span></a><span data-dcnode-id="3818" instrument_node=""> characterized the community created on social networking sites:</span></p><blockquote data-dcnode-id="3811"><p data-dcnode-id="3812"><span data-dcnode-id="3816" instrument_node="">"The political significance of computer mediated communication lies in its capacity to challenge the existing political hierarchy’s monopoly on powerful communications media, and perhaps thus revitalize citizen-based democracy."</span><sup class="reference" data-dcnode-id="3813" id="cite_ref-Andrejevic_2013_6-1"><a data-dcnode-id="3814" href="#cite_note-Andrejevic_2013-6"><span data-dcnode-id="3815" instrument_node="">[6]</span></a></sup></p></blockquote><p data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">Scholar Derrick de Kerckhove described the new technology in media: </span></p><blockquote data-dcnode-id="3803"><p data-dcnode-id="3804"><span data-dcnode-id="3808" instrument_node="">"In a networked society, the real powershift is from the producer to the consumer, and there is a redistribution of controls and power. On the Web, Karl Marx’s dream has been realized: the tools and the means of production are in the hands of the workers."</span><sup class="reference" data-dcnode-id="3805" id="cite_ref-Andrejevic_2013_6-2"><a data-dcnode-id="3806" href="#cite_note-Andrejevic_2013-6"><span data-dcnode-id="3807" instrument_node="">[6]</span></a></sup></p></blockquote><p data-dcnode-id="3787"><span data-dcnode-id="3802" instrument_node="">The role of social media in democratizing media participation, which proponents herald as ushering in a new era of </span><a data-dcnode-id="3800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Participatory_democracy" title="Participatory democracy"><span data-dcnode-id="3801" instrument_node="">participatory democracy</span></a><span data-dcnode-id="3799" instrument_node="">, with all users able to contribute news and comments, may fall short of the ideals. International survey data suggest online media audience members are largely passive consumers, while content creation is dominated by a small number of users who post comments and write new content.</span><sup class="reference" data-dcnode-id="3796" id="cite_ref-Reuters2013_7-0"><a data-dcnode-id="3797" href="#cite_note-Reuters2013-7"><span data-dcnode-id="3798" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3793"><span data-dcnode-id="3794" title="Page / location: 78"><span data-dcnode-id="3795" instrument_node="">: 78 </span></span></sup><span data-dcnode-id="3792" instrument_node=""> Others</span><sup class="reference" data-dcnode-id="3789" id="cite_ref-:3_8-0"><a data-dcnode-id="3790" href="#cite_note-:3-8"><span data-dcnode-id="3791" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3788" instrument_node=""> argue that the effect of social media will vary from one country to another, with domestic political structures playing a greater role than social media in determining how citizens express opinions about stories of current affairs involving the state.
</span></p><p data-dcnode-id="3781"><span data-dcnode-id="3786" instrument_node="">Most people see social media platforms as censoring objectionable political views.</span><sup class="reference" data-dcnode-id="3783" id="cite_ref-:4_9-0"><a data-dcnode-id="3784" href="#cite_note-:4-9"><span data-dcnode-id="3785" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3782" instrument_node="">
</span></p><p data-dcnode-id="3775"><span data-dcnode-id="3780" instrument_node="">In June 2020, users of the Social Media platform TikTok organised a movement to prank a Trump Rally in Tulsa, Oklahoma by buying tickets and not attending so that the rally appeared empty.</span><sup class="reference" data-dcnode-id="3777" id="cite_ref-:5_10-0"><a data-dcnode-id="3778" href="#cite_note-:5-10"><span data-dcnode-id="3779" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3776" instrument_node="">
</span></p><span data-dcnode-id="3774" instrument_node="">
</span><h3 data-dcnode-id="3764"><span class="mw-headline" data-dcnode-id="3772" id="As_a_news_source"><span data-dcnode-id="3773" instrument_node="">As a news source</span></span><span class="mw-editsection" data-dcnode-id="3765"><span class="mw-editsection-bracket" data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">[</span></span><a data-dcnode-id="3768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D3" title="Edit section: As a news source"><span data-dcnode-id="3769" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3763" instrument_node="">
</span><p data-dcnode-id="3756"><i data-dcnode-id="3758"><span data-dcnode-id="3762" instrument_node="">See also </span><a data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_media_and_political_communication_in_the_United_States" title="Social media and political communication in the United States"><span data-dcnode-id="3761" instrument_node="">Social media and political communication in the United States</span></a><span data-dcnode-id="3759" instrument_node="">.</span></i><span data-dcnode-id="3757" instrument_node="">
</span></p><p data-dcnode-id="3750"><span data-dcnode-id="3755" instrument_node="">Social media platforms are increasingly used for political news and information by adults in the United States, especially when it comes to election time. A study by Pew Research conducted in November 2019, found that one-in-five US adults get their political news primarily through social media. 18% of adults use social media to get their political and election news.</span><sup class="reference" data-dcnode-id="3752" id="cite_ref-Mitchell_11-0"><a data-dcnode-id="3753" href="#cite_note-Mitchell-11"><span data-dcnode-id="3754" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3751" instrument_node="">
</span></p><p data-dcnode-id="3744"><span data-dcnode-id="3749" instrument_node="">The Pew Research Center further found that out of these United States Adults relying on social media for this information, 48% of them are from ages 18–29.</span><sup class="reference" data-dcnode-id="3746" id="cite_ref-Mitchell_11-1"><a data-dcnode-id="3747" href="#cite_note-Mitchell-11"><span data-dcnode-id="3748" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3745" instrument_node="">
</span></p><span data-dcnode-id="3743" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3735"><div class="thumbinner" data-dcnode-id="3736" style="width:363px;"><a class="image" data-dcnode-id="3741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%2525_of_Adults_Who_Get_News_from_Social_Media.png"><img alt="% of Adults Who Get News from Social Media.png" class="thumbimage" data-dcnode-id="3742" data-file-height="470" data-file-width="620" decoding="async" height="274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/87/%2525_of_Adults_Who_Get_News_from_Social_Media.png/361px-%2525_of_Adults_Who_Get_News_from_Social_Media.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/87/%25_of_Adults_Who_Get_News_from_Social_Media.png/542px-%25_of_Adults_Who_Get_News_from_Social_Media.png 1.5x, //upload.wikimedia.org/wikipedia/commons/8/87/%25_of_Adults_Who_Get_News_from_Social_Media.png 2x" width="361"></a><span data-dcnode-id="3740" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3737"><div class="magnify" data-dcnode-id="3738"><a class="internal" data-dcnode-id="3739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%2525_of_Adults_Who_Get_News_from_Social_Media.png" title="Enlarge"></a></div></div></div></div><span data-dcnode-id="3734" instrument_node="">
</span><p data-dcnode-id="3732"><span data-dcnode-id="3733" instrument_node="">In addition, Reddit, Twitter, Facebook, lead the social media platforms in which the majority of the users use the platforms to acquire news information.  Of all United States adults, 67% use the platform with 44% who use the platform to get news.
</span></p><span data-dcnode-id="3731" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3723"><div class="thumbinner" data-dcnode-id="3724" style="width:367px;"><a class="image" data-dcnode-id="3729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASocial_networking_site_user_graph.png"><img alt="Social networking site user graph.png" class="thumbimage" data-dcnode-id="3730" data-file-height="476" data-file-width="762" decoding="async" height="228" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/29/Social_networking_site_user_graph.png/365px-Social_networking_site_user_graph.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/29/Social_networking_site_user_graph.png/548px-Social_networking_site_user_graph.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/29/Social_networking_site_user_graph.png/730px-Social_networking_site_user_graph.png 2x" width="365"></a><span data-dcnode-id="3728" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3725"><div class="magnify" data-dcnode-id="3726"><a class="internal" data-dcnode-id="3727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASocial_networking_site_user_graph.png" title="Enlarge"></a></div></div></div></div><span data-dcnode-id="3722" instrument_node="">
</span><p data-dcnode-id="3713"><span data-dcnode-id="3721" instrument_node="">According to the Reuters Institute Digital News Report in 2013, the percentage of online news users who blog about news issues ranges from 1–5%. Greater percentages use social media to comment on news, with participation ranging from 8% in Germany to 38% in Brazil. But online news users are most likely to just talk about online news with friends offline or use social media to share stories without creating content.</span><sup class="reference" data-dcnode-id="3718" id="cite_ref-Reuters2013_7-1"><a data-dcnode-id="3719" href="#cite_note-Reuters2013-7"><span data-dcnode-id="3720" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="3715"><span data-dcnode-id="3716" title="Page / location: 78"><span data-dcnode-id="3717" instrument_node="">: 78 </span></span></sup><span data-dcnode-id="3714" instrument_node="">
</span></p><p data-dcnode-id="3700"><span data-dcnode-id="3712" instrument_node="">The rapid propagation of information on social media, spread by word of mouth, can impact the perception of political figures quickly with information that may or may not be true. When political information is propagated in this manner on purpose, the spread of information on social media for political means can benefit campaigns. On the other hand, the word-of-mouth propagation of negative information concerning a political figure can be damaging.</span><sup class="reference" data-dcnode-id="3709" id="cite_ref-12"><a data-dcnode-id="3710" href="#cite_note-12"><span data-dcnode-id="3711" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3708" instrument_node=""> For example, the use of the social media platform Twitter by United States congressman </span><a data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthony_Weiner" title="Anthony Weiner"><span data-dcnode-id="3707" instrument_node="">Anthony Weiner</span></a><span data-dcnode-id="3705" instrument_node=""> to send inappropriate messages played a role in his resignation.</span><sup class="reference" data-dcnode-id="3702" id="cite_ref-13"><a data-dcnode-id="3703" href="#cite_note-13"><span data-dcnode-id="3704" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3701" instrument_node="">
</span></p><span data-dcnode-id="3699" instrument_node="">
</span><h3 data-dcnode-id="3689"><span class="mw-headline" data-dcnode-id="3697" id="Attention_economy"><span data-dcnode-id="3698" instrument_node="">Attention economy</span></span><span class="mw-editsection" data-dcnode-id="3690"><span class="mw-editsection-bracket" data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">[</span></span><a data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D4" title="Edit section: Attention economy"><span data-dcnode-id="3694" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3688" instrument_node="">
</span><p data-dcnode-id="3679"><span data-dcnode-id="3687" instrument_node="">Social media, especially news that is spread through social media sites, plays into the idea of the </span><a data-dcnode-id="3685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attention_economy" title="Attention economy"><span data-dcnode-id="3686" instrument_node="">attention economy</span></a><span data-dcnode-id="3684" instrument_node="">. In which content that attracts more attention will be seen, shared, and disseminated far more than news content that does not gather as much traction from the public.  Tim Wu from Columbia Law School coins the attention economy as “the resale of human attention.” </span><sup class="reference" data-dcnode-id="3681" id="cite_ref-Morgan_2018_14-0"><a data-dcnode-id="3682" href="#cite_note-Morgan_2018-14"><span data-dcnode-id="3683" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3680" instrument_node="">
</span></p><p data-dcnode-id="3669"><span data-dcnode-id="3678" instrument_node="">A communication platform such as social media is persuasive, and often works to change or influence opinions when it comes to political views because of the abundance of ideas, thoughts, and opinions circulating through the social media platform. It is found that news use leads to political persuasion, therefore the more that people use social media platforms for news sources, the more their political opinions will be affected. Despite that, people are expressing less trust in their government and others due to media use- therefore social media directly affects trust in media use. It is proven that while reading newspapers there is an increase in social trust where on the contrary watching the news on television weakened trust in others and news sources.</span><sup class="reference" data-dcnode-id="3675" id="cite_ref-15"><a data-dcnode-id="3676" href="#cite_note-15"><span data-dcnode-id="3677" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3674" instrument_node=""> Social media, or more specifically news media- plays an important role in democratic societies because they allow for participation among citizens.Therefore, when it comes to healthy democratic networks, it is crucial that that news remains true so it doesn't affect citizens’ levels of trust. A certain amount of trust is necessary for a healthy and well functioning democratic system.</span><sup class="reference" data-dcnode-id="3671" id="cite_ref-Diehl_2015_16-0"><a data-dcnode-id="3672" href="#cite_note-Diehl_2015-16"><span data-dcnode-id="3673" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3670" instrument_node="">
</span></p><p data-dcnode-id="3652"><span data-dcnode-id="3668" instrument_node="">Younger generations are becoming more involved in politics due to the increase of political news posted on various types of social media.</span><sup class="reference" data-dcnode-id="3665" id="cite_ref-:1_2-1"><a data-dcnode-id="3666" href="#cite_note-:1-2"><span data-dcnode-id="3667" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3664" instrument_node=""> Due to the heavier use of social media among younger generations, they are exposed to politics more frequently, and in a way that is integrated into their online social lives. While informing younger generations of political news is important, there are many biases within the realms of social media. In May 2016, former Facebook Trending News curator Benjamin Fearnow revealed his job was to "massage the algorithm," but dismissed any "intentional, outright bias" by either human or automated efforts within the company.</span><sup class="reference" data-dcnode-id="3661" id="cite_ref-17"><a data-dcnode-id="3662" href="#cite_note-17"><span data-dcnode-id="3663" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="3658" id="cite_ref-18"><a data-dcnode-id="3659" href="#cite_note-18"><span data-dcnode-id="3660" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3657" instrument_node=""> Fearnow was fired by Facebook after being caught leaking several internal company debates about Black Lives Matter and presidential candidate Donald Trump.</span><sup class="reference" data-dcnode-id="3654" id="cite_ref-19"><a data-dcnode-id="3655" href="#cite_note-19"><span data-dcnode-id="3656" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3653" instrument_node="">
</span></p><span data-dcnode-id="3651" instrument_node="">
</span><h3 data-dcnode-id="3641"><span class="mw-headline" data-dcnode-id="3649" id="As_a_public_utility"><span data-dcnode-id="3650" instrument_node="">As a public utility</span></span><span class="mw-editsection" data-dcnode-id="3642"><span class="mw-editsection-bracket" data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">[</span></span><a data-dcnode-id="3645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D5" title="Edit section: As a public utility"><span data-dcnode-id="3646" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3640" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3634" role="note"><span data-dcnode-id="3637" instrument_node="">See also: </span><a data-dcnode-id="3635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_media_as_a_public_utility" title="Social media as a public utility"><span data-dcnode-id="3636" instrument_node="">Social media as a public utility</span></a></div><span data-dcnode-id="3633" instrument_node="">
</span><p data-dcnode-id="3625"><span data-dcnode-id="3632" instrument_node="">A key debate centers on whether or not social media is a </span><a data-dcnode-id="3630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_good_%28economics%29" title="Public good (economics)"><span data-dcnode-id="3631" instrument_node="">public good</span></a><span data-dcnode-id="3629" instrument_node=""> based on the premises of non-rival and non-excludable consumption. Social media can be considered an impure public good as it can be excludable given the rights of platforms such as Facebook and </span><a data-dcnode-id="3627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twitter" title="Twitter"><span data-dcnode-id="3628" instrument_node="">Twitter</span></a><span data-dcnode-id="3626" instrument_node=""> to remove content, disable accounts, and filter information based on algorithms and community standards.
</span></p><p data-dcnode-id="3621"><span data-dcnode-id="3624" instrument_node="">
Arguments for platforms such as Google in being treated as a public utility and public service provider include statements from Benjamin Barber in </span><i data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">The Nation</span></i></p><blockquote data-dcnode-id="3614"><p data-dcnode-id="3615"><br data-dcnode-id="3620"><span data-dcnode-id="3619" instrument_node="">
"For new media to be potential equalizers, they must be treated as public utilities, recognizing that spectrum abundance (the excuse for privatization) does not prevent monopoly ownership of hardware and software platforms and hence cannot guarantee equal civic, educational, and cultural access to citizens."</span><sup class="reference" data-dcnode-id="3616" id="cite_ref-Andrejevic_2013_6-3"><a data-dcnode-id="3617" href="#cite_note-Andrejevic_2013-6"><span data-dcnode-id="3618" instrument_node="">[6]</span></a></sup></p></blockquote><p data-dcnode-id="3605"><span data-dcnode-id="3613" instrument_node="">Similarly, </span><a data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zeynep_Tufekci" title="Zeynep Tufekci"><span data-dcnode-id="3612" instrument_node="">Zeynep Tufekci</span></a><span data-dcnode-id="3610" instrument_node=""> argues online services are natural monopolies that underwrite the "corporatization of social commons" and the "privatization of our publics."</span><sup class="reference" data-dcnode-id="3607" id="cite_ref-Andrejevic_2013_6-4"><a data-dcnode-id="3608" href="#cite_note-Andrejevic_2013-6"><span data-dcnode-id="3609" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3606" instrument_node="">
</span></p><p data-dcnode-id="3599"><span data-dcnode-id="3604" instrument_node="">One argument that displays the nature of social media as an impure public good is the fact that the control over content remains in the hands of a few large media networks, Google and Facebook, for example. Google and Facebook have the power to shape the environment under personal and commercial goals that promotes profitability, as opposed to promoting citizen voice and public deliberation.</span><sup class="reference" data-dcnode-id="3601" id="cite_ref-Andrejevic_2013_6-5"><a data-dcnode-id="3602" href="#cite_note-Andrejevic_2013-6"><span data-dcnode-id="3603" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3600" instrument_node="">
</span></p><span data-dcnode-id="3598" instrument_node="">
</span><h4 data-dcnode-id="3588"><span class="mw-headline" data-dcnode-id="3596" id="Government_regulation"><span data-dcnode-id="3597" instrument_node="">Government regulation</span></span><span class="mw-editsection" data-dcnode-id="3589"><span class="mw-editsection-bracket" data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">[</span></span><a data-dcnode-id="3592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D6" title="Edit section: Government regulation"><span data-dcnode-id="3593" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3587" instrument_node="">
</span><p data-dcnode-id="3574"><span data-dcnode-id="3586" instrument_node="">Proponents and aims for regulation of social media are growing due to economic concerns of </span><a data-dcnode-id="3584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monopoly" title="Monopoly"><span data-dcnode-id="3585" instrument_node="">monopolies</span></a><span data-dcnode-id="3583" instrument_node=""> of the platforms, to issues of privacy, censorship, network neutrality and information storage. The discussion of regulation is complicated due to the issue how Facebook, and Google are increasingly becoming a service, information pipeline, and content provider, and thus centers on how the government would regulate both the platform as a service and information provider.</span><sup class="reference" data-dcnode-id="3580" id="cite_ref-Andrejevic_2013_6-6"><a data-dcnode-id="3581" href="#cite_note-Andrejevic_2013-6"><span data-dcnode-id="3582" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3579" instrument_node=""> Thus, other proponents advocate for “algorithmic neutrality”, or the aim for search engines on social media platforms to rank data without human intervention.</span><sup class="reference" data-dcnode-id="3576" id="cite_ref-Thierer_2012_20-0"><a data-dcnode-id="3577" href="#cite_note-Thierer_2012-20"><span data-dcnode-id="3578" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3575" instrument_node="">
</span></p><p data-dcnode-id="3561"><span data-dcnode-id="3573" instrument_node="">Opponents of regulation of social media platforms argue that platforms such as Facebook and Twitter do not resemble traditional public utilities, and regulation would harm consumer welfare as public utility regulation can hinder innovation and competition.</span><sup class="reference" data-dcnode-id="3570" id="cite_ref-Thierer_2012_20-1"><a data-dcnode-id="3571" href="#cite_note-Thierer_2012-20"><span data-dcnode-id="3572" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3569" instrument_node="">  Second, as the </span><a data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Amendment_to_the_United_States_Constitution" title="First Amendment to the United States Constitution"><span data-dcnode-id="3568" instrument_node="">First Amendment</span></a><span data-dcnode-id="3566" instrument_node=""> values are criticized on social media platforms, the media providers should retain the power to how the platform is configured.</span><sup class="reference" data-dcnode-id="3563" id="cite_ref-Thierer_2012_20-2"><a data-dcnode-id="3564" href="#cite_note-Thierer_2012-20"><span data-dcnode-id="3565" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3562" instrument_node="">
</span></p><span data-dcnode-id="3560" instrument_node="">
</span><h2 data-dcnode-id="3550"><span class="mw-headline" data-dcnode-id="3558" id="Effect_on_democracy"><span data-dcnode-id="3559" instrument_node="">Effect on democracy</span></span><span class="mw-editsection" data-dcnode-id="3551"><span class="mw-editsection-bracket" data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">[</span></span><a data-dcnode-id="3554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D7" title="Edit section: Effect on democracy"><span data-dcnode-id="3555" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3549" instrument_node="">
</span><p data-dcnode-id="3516"><span data-dcnode-id="3548" instrument_node="">Social media has been criticized as being detrimental to </span><a data-dcnode-id="3546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy" title="Democracy"><span data-dcnode-id="3547" instrument_node="">democracy</span></a><span data-dcnode-id="3545" instrument_node="">.</span><sup class="reference" data-dcnode-id="3542" id="cite_ref-21"><a data-dcnode-id="3543" href="#cite_note-21"><span data-dcnode-id="3544" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3541" instrument_node=""> According to </span><a data-dcnode-id="3539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Deibert" title="Ronald Deibert"><span data-dcnode-id="3540" instrument_node="">Ronald Deibert</span></a><span data-dcnode-id="3538" instrument_node="">, "The world of social media is more conducive to extreme, emotionally charged, and divisive types of content than it is to calm, principled considerations of competing or complex narratives".</span><sup class="reference" data-dcnode-id="3535" id="cite_ref-22"><a data-dcnode-id="3536" href="#cite_note-22"><span data-dcnode-id="3537" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3534" instrument_node=""> On the contrary, </span><a data-dcnode-id="3532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethan_Zuckerman" title="Ethan Zuckerman"><span data-dcnode-id="3533" instrument_node="">Ethan Zuckerman</span></a><span data-dcnode-id="3531" instrument_node=""> says that social media presents the opportunity to inform more people, amplify voices, and allow for an array of diverse voices to speak.</span><sup class="reference" data-dcnode-id="3528" id="cite_ref-23"><a data-dcnode-id="3529" href="#cite_note-23"><span data-dcnode-id="3530" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3527" instrument_node=""> </span><a data-dcnode-id="3525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mari_K._Eder" title="Mari K. Eder"><span data-dcnode-id="3526" instrument_node="">Mari K. Eder</span></a><span data-dcnode-id="3524" instrument_node=""> points to failures of the </span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fourth_Estate" title="Fourth Estate"><span data-dcnode-id="3523" instrument_node="">Fourth Estate</span></a><span data-dcnode-id="3521" instrument_node=""> that have allowed outrage to be disguised as news, contributing to citizen apathy when confronting falsehoods and further distrust in democratic institutions.</span><sup class="reference" data-dcnode-id="3518" id="cite_ref-24"><a data-dcnode-id="3519" href="#cite_note-24"><span data-dcnode-id="3520" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3517" instrument_node="">
</span></p><span data-dcnode-id="3515" instrument_node="">
</span><h3 data-dcnode-id="3505"><span class="mw-headline" data-dcnode-id="3513" id="Politicians_and_social_media"><span data-dcnode-id="3514" instrument_node="">Politicians and social media</span></span><span class="mw-editsection" data-dcnode-id="3506"><span class="mw-editsection-bracket" data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">[</span></span><a data-dcnode-id="3509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D8" title="Edit section: Politicians and social media"><span data-dcnode-id="3510" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3504" instrument_node="">
</span><p data-dcnode-id="3494"><span data-dcnode-id="3503" instrument_node="">Social media has allowed politicians to subvert typical media outlets by engaging with the general public directly, Donald Trump utilised this when he lost the 2020 presidential election by claiming the election to be fraudulent and therefore creating the need for a re-election.</span><sup class="reference" data-dcnode-id="3500" id="cite_ref-:2_5-1"><a data-dcnode-id="3501" href="#cite_note-:2-5"><span data-dcnode-id="3502" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3499" instrument_node=""> The consequences of Trump's online actions were displayed when on January 6 the U.S. Capital was attacked by supporters of the former president.</span><sup class="reference" data-dcnode-id="3496" id="cite_ref-:3_8-1"><a data-dcnode-id="3497" href="#cite_note-:3-8"><span data-dcnode-id="3498" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3495" instrument_node="">
</span></p><p data-dcnode-id="3488"><span data-dcnode-id="3493" instrument_node="">Being a popular presence on social media also boosts a politicians likelihood of coming to power take Boris Johnson in the 2019 bid to replace Theresa May as Prime Minister, Johnson had more than half a million page 'liking' his page (substantially more than the other candidates) which meant that when he released his launch video it gained more than 130,000 views</span><sup class="reference" data-dcnode-id="3490" id="cite_ref-:4_9-1"><a data-dcnode-id="3491" href="#cite_note-:4-9"><span data-dcnode-id="3492" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3489" instrument_node=""> which could have been a prominent factor in him eventually winning power.
</span></p><p data-dcnode-id="3482"><span data-dcnode-id="3487" instrument_node="">A study conducted by Sounman Hong</span><sup class="reference" data-dcnode-id="3484" id="cite_ref-:5_10-1"><a data-dcnode-id="3485" href="#cite_note-:5-10"><span data-dcnode-id="3486" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3483" instrument_node=""> found that in the case of politicians utilising social media and whether its use would increase on their individual weighing up on the consequences and if they would be largely positive or negative found that in the case of backbenchers, 'underdogs' and opposition it was likely to increase in order to gain recognition and support from the public eye where they otherwise might go unnoticed.
</span></p><span data-dcnode-id="3481" instrument_node="">
</span><h3 data-dcnode-id="3471"><span class="mw-headline" data-dcnode-id="3479" id="Democratization"><span data-dcnode-id="3480" instrument_node="">Democratization</span></span><span class="mw-editsection" data-dcnode-id="3472"><span class="mw-editsection-bracket" data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">[</span></span><a data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D9" title="Edit section: Democratization"><span data-dcnode-id="3476" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3470" instrument_node="">
</span><h4 data-dcnode-id="3460"><span class="mw-headline" data-dcnode-id="3468" id="The_Arab_Spring"><span data-dcnode-id="3469" instrument_node="">The Arab Spring</span></span><span class="mw-editsection" data-dcnode-id="3461"><span class="mw-editsection-bracket" data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">[</span></span><a data-dcnode-id="3464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D10" title="Edit section: The Arab Spring"><span data-dcnode-id="3465" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3459" instrument_node="">
</span><link data-dcnode-id="3458" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3454" role="note"><span data-dcnode-id="3457" instrument_node="">See also: </span><a data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_media_and_the_Arab_Spring" title="Social media and the Arab Spring"><span data-dcnode-id="3456" instrument_node="">Social media and the Arab Spring</span></a></div><span data-dcnode-id="3453" instrument_node="">
</span><p data-dcnode-id="3438"><span data-dcnode-id="3452" instrument_node="">During the peak of the </span><a class="mw-redirect" data-dcnode-id="3450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Egyptian_Revolution_of_2011" title="Egyptian Revolution of 2011"><span data-dcnode-id="3451" instrument_node="">Egyptian Revolution of 2011</span></a><span data-dcnode-id="3449" instrument_node="">, the Internet and social media played a huge role in facilitating information. At that time, </span><a data-dcnode-id="3447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hosni_Mubarak" title="Hosni Mubarak"><span data-dcnode-id="3448" instrument_node="">Hosni Mubarak</span></a><span data-dcnode-id="3446" instrument_node=""> was the president of Egypt and head the regime for almost 30 years. Mubarak was so threatened by the immense power that the Internet and social media gave the people that the government successfully shut down the Internet, using the </span><a data-dcnode-id="3444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramses_Exchange" title="Ramses Exchange"><span data-dcnode-id="3445" instrument_node="">Ramses Exchange</span></a><span data-dcnode-id="3443" instrument_node="">, for a period of time in February 2011.</span><sup class="reference" data-dcnode-id="3440" id="cite_ref-Morgan_2018_14-1"><a data-dcnode-id="3441" href="#cite_note-Morgan_2018-14"><span data-dcnode-id="3442" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3439" instrument_node="">
</span></p><p data-dcnode-id="3429"><span data-dcnode-id="3437" instrument_node="">Egyptians used Facebook, Twitter, and YouTube as a means to communicate and organize demonstrations and rallies to overthrow President </span><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hosni_Mubarak" title="Hosni Mubarak"><span data-dcnode-id="3436" instrument_node="">Hosni Mubarak</span></a><span data-dcnode-id="3434" instrument_node="">. Statistics show that during this time the rate of Tweets from Egypt increased from 2,300 to 230,000 per day and the top 23 protest videos had approximately 5.5 million views.</span><sup class="reference" data-dcnode-id="3431" id="cite_ref-25"><a data-dcnode-id="3432" href="#cite_note-25"><span data-dcnode-id="3433" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3430" instrument_node="">
</span></p><span data-dcnode-id="3428" instrument_node="">
</span><h3 data-dcnode-id="3418"><span class="mw-headline" data-dcnode-id="3426" id="Disinformation_in_relation_to_US_election"><span data-dcnode-id="3427" instrument_node="">Disinformation in relation to US election</span></span><span class="mw-editsection" data-dcnode-id="3419"><span class="mw-editsection-bracket" data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">[</span></span><a data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D11" title="Edit section: Disinformation in relation to US election"><span data-dcnode-id="3423" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">]</span></span></span></h3><p data-dcnode-id="3408"><span data-dcnode-id="3417" instrument_node="">
Though fake news can generate some utility for consumers, in terms of confirming far-right beliefs and spreading propaganda in favor of a presidential candidate, it also imposes private and social costs.</span><sup class="reference" data-dcnode-id="3414" id="cite_ref-Allcott_2017_26-0"><a data-dcnode-id="3415" href="#cite_note-Allcott_2017-26"><span data-dcnode-id="3416" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3413" instrument_node=""> For example, one social cost to consumer is the spread of disinformation which can make it harder for consumers to seek out the truth and, in the case of the 2016 Election, for consumers to choose an electoral candidate.</span><sup class="reference" data-dcnode-id="3410" id="cite_ref-Allcott_2017_26-1"><a data-dcnode-id="3411" href="#cite_note-Allcott_2017-26"><span data-dcnode-id="3412" instrument_node="">[26]</span></a></sup><span data-dcnode-id="3409" instrument_node=""> Summarized by a Congressional Research Service Study in 2017,</span></p><blockquote data-dcnode-id="3402"><p data-dcnode-id="3403"><span data-dcnode-id="3407" instrument_node="">“Cyber tools were also used [by Russia] to create psychological effects in the American population. The likely collateral effects of these activities include compromising the fidelity of information, sowing discord and doubt in the American public about the validity of intelligence community reports, and prompting questions about the democratic process itself.” </span><sup class="reference" data-dcnode-id="3404" id="cite_ref-27"><a data-dcnode-id="3405" href="#cite_note-27"><span data-dcnode-id="3406" instrument_node="">[27]</span></a></sup></p></blockquote><p data-dcnode-id="3380"><span data-dcnode-id="3401" instrument_node="">The marginal social cost of fake news is exponential, as the first article is shared it can affect a small number of people, but as the article is circulated more throughout Facebook, the negative </span><a data-dcnode-id="3399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Externality" title="Externality"><span data-dcnode-id="3400" instrument_node="">externality</span></a><span data-dcnode-id="3398" instrument_node=""> multiplies. As a result, the quantity demanded of news can shift up around election season as consumers seek to find correct news, however the quantity demanded can also shift down as people have a lower trust in mainstream media. In the American public, a Gallup poll in 2016 found “Americans’ trust in the mass media ‘to report the news fully, accurately and fairly’ was, at 32%, the lowest in the organization's polling history.”  In addition, trust in mainstream media is lower in Republican and far-right political viewers at 14%.</span><sup class="reference" data-dcnode-id="3395" id="cite_ref-28"><a data-dcnode-id="3396" href="#cite_note-28"><span data-dcnode-id="3397" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3394" instrument_node=""> About 72% of </span><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Americans" title="Americans"><span data-dcnode-id="3393" instrument_node="">American</span></a><span data-dcnode-id="3391" instrument_node=""> adults claim that social media firms excessively control and influence the politics today, as per the June 16–22 survey conducted by </span><a data-dcnode-id="3389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pew_Research_Center" title="Pew Research Center"><span data-dcnode-id="3390" instrument_node="">Pew Research Center</span></a><span data-dcnode-id="3388" instrument_node="">. Only 21% believe that the power held by these social media firms over today’s </span><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Politics" title="Politics"><span data-dcnode-id="3387" instrument_node="">politics</span></a><span data-dcnode-id="3385" instrument_node=""> is of the right amount, while 6% believe it is not enough.</span><sup class="reference" data-dcnode-id="3382" id="cite_ref-29"><a data-dcnode-id="3383" href="#cite_note-29"><span data-dcnode-id="3384" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3381" instrument_node="">
</span></p><p data-dcnode-id="3374"><span data-dcnode-id="3379" instrument_node="">Algorithms can facilitate the rapid spread of disinformation through social media channels. Algorithms use users’ past behavior and engagement activity to provide them with tailored content that aligns with their interests and beliefs. Algorithms commonly create echo chambers and sow radicalism and extremist thinking in these online spaces.</span><sup class="reference" data-dcnode-id="3376" id="cite_ref-Unver_2017_127–146_30-0"><a data-dcnode-id="3377" href="#cite_note-Unver_2017_127%E2%80%93146-30"><span data-dcnode-id="3378" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3375" instrument_node="">
</span></p><p data-dcnode-id="3338"><span data-dcnode-id="3373" instrument_node="">Algorithms promote social media posts with high 'engagement,' meaning posts that received a lot of '</span><a data-dcnode-id="3371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Like_button" title="Like button"><span data-dcnode-id="3372" instrument_node="">likes</span></a><span data-dcnode-id="3370" instrument_node="">' or '</span><a data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comments_section" title="Comments section"><span data-dcnode-id="3369" instrument_node="">comments'/'replies</span></a><span data-dcnode-id="3367" instrument_node="">'. For better or for worse, engagement and controversy go hand-in-hand. Controversy attracts attention as it evokes an emotional response,</span><sup class="reference" data-dcnode-id="3364" id="cite_ref-31"><a data-dcnode-id="3365" href="#cite_note-31"><span data-dcnode-id="3366" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3363" instrument_node=""> however "</span><a data-dcnode-id="3361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Controversy" title="Controversy"><span data-dcnode-id="3362" instrument_node="">Benford's Law</span></a><span data-dcnode-id="3360" instrument_node="">" of controversy states that "passion is inversely proportional to the amount of real information available".</span><sup class="reference" data-dcnode-id="3357" id="cite_ref-32"><a data-dcnode-id="3358" href="#cite_note-32"><span data-dcnode-id="3359" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3356" instrument_node=""> This means that the less grounded in facts a political tweet is, the more engagement it is likely to receive, therefore the likelihood of spreading disinformation is high. </span><a data-dcnode-id="3354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twitter" title="Twitter"><span data-dcnode-id="3355" instrument_node="">Twitter</span></a><span data-dcnode-id="3353" instrument_node=""> has become a battleground for political debate. Psychologist, </span><a data-dcnode-id="3351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan_Peterson" title="Jordan Peterson"><span data-dcnode-id="3352" instrument_node="">Jordan Peterson</span></a><span data-dcnode-id="3350" instrument_node="">, spoke of Twitter's radicalising effect in an interview conducted by </span><a data-dcnode-id="3348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GQ" title="GQ"><span data-dcnode-id="3349" instrument_node="">GQ</span></a><span data-dcnode-id="3347" instrument_node="">.</span><sup class="reference" data-dcnode-id="3344" id="cite_ref-33"><a data-dcnode-id="3345" href="#cite_note-33"><span data-dcnode-id="3346" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3343" instrument_node=""> He explained that for any given tweet that appears on one's 'feed,' the tweet shall have been seen by a far greater number of people than is reflected by its likes and comments. Therefore, who are the people who comment on a tweet? The people who comment shall be those who have the strongest views on the matter, the people who want their opinion to be heard. Peterson claims that this creates an environment in which the opinions that the average user sees on twitter do not reflect the views of a random sample of the population. The opinions most commonly seen on twitter tend to be those of people at each extreme end of the political ideology spectrum, hence the 'radicalising effect'.</span><sup class="reference" data-dcnode-id="3340" id="cite_ref-Unver_2017_127–146_30-1"><a data-dcnode-id="3341" href="#cite_note-Unver_2017_127%E2%80%93146-30"><span data-dcnode-id="3342" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3339" instrument_node="">
</span></p><span data-dcnode-id="3337" instrument_node="">
</span><h3 data-dcnode-id="3327"><span class="mw-headline" data-dcnode-id="3335" id="Advertisement"><span data-dcnode-id="3336" instrument_node="">Advertisement</span></span><span class="mw-editsection" data-dcnode-id="3328"><span class="mw-editsection-bracket" data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">[</span></span><a data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D12" title="Edit section: Advertisement"><span data-dcnode-id="3332" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3326" instrument_node="">
</span><link data-dcnode-id="3325" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3318" role="note"><span data-dcnode-id="3324" instrument_node="">See also: </span><a data-dcnode-id="3322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microtargeting" title="Microtargeting"><span data-dcnode-id="3323" instrument_node="">Microtargeting</span></a><span data-dcnode-id="3321" instrument_node=""> and </span><a data-dcnode-id="3319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geo-fence" title="Geo-fence"><span data-dcnode-id="3320" instrument_node="">Geo-fence</span></a></div><span data-dcnode-id="3317" instrument_node="">
</span><p data-dcnode-id="3302"><a class="mw-redirect" data-dcnode-id="3315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_advertisement" title="Political advertisement"><span data-dcnode-id="3316" instrument_node="">Political advertisements</span></a><span data-dcnode-id="3314" instrument_node="">—for example, encouraging people to vote for or against a particular candidate, or to take a position on a particular issue—have often been placed on social media. On 22 November 2019, Twitter said it would no longer facilitate political advertising anywhere in the world.</span><sup class="reference" data-dcnode-id="3311" id="cite_ref-34"><a data-dcnode-id="3312" href="#cite_note-34"><span data-dcnode-id="3313" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3310" instrument_node=""> Due to the nature of Social media bringing different information to different people based on their interests, advertising methods such as "</span><a data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microtargeting" title="Microtargeting"><span data-dcnode-id="3309" instrument_node="">Microtargeting</span></a><span data-dcnode-id="3307" instrument_node="">" and "Black ads" have become prominent on social media and allow advertising to be much more effective for the same price, relative to traditional adverts such as those on cable TV.</span><sup class="reference" data-dcnode-id="3304" id="cite_ref-35"><a data-dcnode-id="3305" href="#cite_note-35"><span data-dcnode-id="3306" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3303" instrument_node="">
</span></p><span data-dcnode-id="3301" instrument_node="">
</span><h3 data-dcnode-id="3291"><span class="mw-headline" data-dcnode-id="3299" id="Grassroots_campaigns"><span data-dcnode-id="3300" instrument_node="">Grassroots campaigns</span></span><span class="mw-editsection" data-dcnode-id="3292"><span class="mw-editsection-bracket" data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">[</span></span><a data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D13" title="Edit section: Grassroots campaigns"><span data-dcnode-id="3296" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3290" instrument_node="">
</span><p data-dcnode-id="3255"><span data-dcnode-id="3289" instrument_node="">When it comes to political referendums, individuals often gather on social media at the grassroots level to campaign for change.</span><sup class="reference" data-dcnode-id="3286" id="cite_ref-36"><a data-dcnode-id="3287" href="#cite_note-36"><span data-dcnode-id="3288" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3285" instrument_node=""> This is particularly effective where it comes to </span><a data-dcnode-id="3283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feminism_and_media" title="Feminism and media"><span data-dcnode-id="3284" instrument_node="">feminist political issues</span></a><span data-dcnode-id="3282" instrument_node="">, as studies have proven that women are more likely to tweet about policy problems and do so in a way that is more aggressive than their male counter-parts.</span><sup class="reference" data-dcnode-id="3279" id="cite_ref-37"><a data-dcnode-id="3280" href="#cite_note-37"><span data-dcnode-id="3281" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3278" instrument_node=""> Like-minded individuals can collectively work together to influence social change and utilise social media as a tool for social justice.</span><sup class="reference" data-dcnode-id="3275" id="cite_ref-38"><a data-dcnode-id="3276" href="#cite_note-38"><span data-dcnode-id="3277" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3274" instrument_node=""> An example of this is in the referendum to appeal </span><a data-dcnode-id="3272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eighth_Amendment_of_the_Constitution_of_Ireland" title="Eighth Amendment of the Constitution of Ireland"><span data-dcnode-id="3273" instrument_node="">Ireland's eighth amendment</span></a><span data-dcnode-id="3271" instrument_node="">. Civil society organisations, such as </span><a data-dcnode-id="3269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Together_for_Yes" title="Together for Yes"><span data-dcnode-id="3270" instrument_node="">TogetherForYes</span></a><span data-dcnode-id="3268" instrument_node="">, utilised Twitter as a tool to bring abortion law into the public and make the harms of the eighth amendment visible and accessible.</span><sup class="reference" data-dcnode-id="3265" id="cite_ref-39"><a data-dcnode-id="3266" href="#cite_note-39"><span data-dcnode-id="3267" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3264" instrument_node=""> The positive outcome of the referendum (in the amendments repeal) can be equated to the efforts of individuals and advocates coming together at the grassroots level to make the vote visible, as social media goes beyond the local level to create a widespread global political impact, making the issue of strict abortion laws a global one, rather than one just confined to Ireland.</span><sup class="reference" data-dcnode-id="3261" id="cite_ref-40"><a data-dcnode-id="3262" href="#cite_note-40"><span data-dcnode-id="3263" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3260" instrument_node=""> The strength in a political grassroots campaign on social media is the increased mobilisation of participants. Due to the fact that social media platforms are largely accessible, a political platform can be provided to the voices of those traditionally silenced in the political sphere or in traditional media.</span><sup class="reference" data-dcnode-id="3257" id="cite_ref-41"><a data-dcnode-id="3258" href="#cite_note-41"><span data-dcnode-id="3259" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3256" instrument_node="">
</span></p><span data-dcnode-id="3254" instrument_node="">
</span><h3 data-dcnode-id="3244"><span class="mw-headline" data-dcnode-id="3252" id="US_election_interference"><span data-dcnode-id="3253" instrument_node="">US election interference</span></span><span class="mw-editsection" data-dcnode-id="3245"><span class="mw-editsection-bracket" data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">[</span></span><a data-dcnode-id="3248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit%26section%3D14" title="Edit section: US election interference"><span data-dcnode-id="3249" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3243" instrument_node="">
</span><table class="box-More_citations_needed_section plainlinks metadata ambox ambox-content ambox-Refimprove" data-dcnode-id="3206" role="presentation"><tbody data-dcnode-id="3207"><tr data-dcnode-id="3208"><td class="mbox-image" data-dcnode-id="3239"><div data-dcnode-id="3240" style="width:52px"><a class="image" data-dcnode-id="3241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="3242" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="3209"><div class="mbox-text-span" data-dcnode-id="3210"><span data-dcnode-id="3238" instrument_node="">This section </span><b data-dcnode-id="3234"><span data-dcnode-id="3237" instrument_node="">needs additional citations for </span><a data-dcnode-id="3235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="3236" instrument_node="">verification</span></a></b><span data-dcnode-id="3233" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3225"><span data-dcnode-id="3232" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="3230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSocial_media_use_in_politics%26action%3Dedit"><span data-dcnode-id="3231" instrument_node="">improve this article</span></a><span data-dcnode-id="3229" instrument_node=""> by </span><a data-dcnode-id="3227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="3228" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="3226" instrument_node="">. Unsourced material may be challenged and removed.</span></span><span data-dcnode-id="3224" instrument_node=""> </span><span class="date-container" data-dcnode-id="3218"><i data-dcnode-id="3219"><span data-dcnode-id="3223" instrument_node="">(</span><span class="date" data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">April 2021</span></span><span data-dcnode-id="3220" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="3211"><i data-dcnode-id="3212"><span data-dcnode-id="3217" instrument_node=""> (</span><small data-dcnode-id="3214"><a data-dcnode-id="3215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="3216" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3213" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3205" instrument_node="">
</span><p data-dcnode-id="3191"><span data-dcnode-id="3204" instrument_node="">The 2016 United States Presidential Election was an example in which social media was used by the state actor Russia to influence public opinion. Tactics such as propaganda, trolling, and bots were used to leak fake news stories that included an "FBI agent had been killed after leaking Clinton’s emails" and "Pope Francis had endorsed Donald Trump.” </span><sup class="reference" data-dcnode-id="3201" id="cite_ref-Persily_2017_42-0"><a data-dcnode-id="3202" href="#cite_note-Persily_2017-42"><span data-dcnode-id="3203" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3200" instrument_node=""> Studies have found that pro-Trump news was as many as four-time more than pro-Clinton fake news, and a third of the pro-Trump tweets were generated by bots.</span><sup class="reference" data-dcnode-id="3197" id="cite_ref-Persily_2017_42-1"><a data-dcnode-id="3198" href="#cite_note-Persily_2017-42"><span data-dcnode-id="3199" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3196" instrument_node="">
Social media has also provided the means for large amounts of data to be collected on social media users – allowing analysis and predictions to be made on what information and advertising the user is most likely to be susceptible to. This was highlighted in 2018 when the Cambridge Analytica – Facebook scandal emerged. Data and predictions from the company were used to influence voters in the 2016 Brexit/Leave campaign and also the 2016 US election Trump Campaign.</span><sup class="reference" data-dcnode-id="3193" id="cite_ref-:0_43-0"><a data-dcnode-id="3194" href="#cite_note-:0-43"><span data-dcnode-id="3195" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3192" instrument_node="">
</span></p><p data-dcnode-id="3136"><span data-dcnode-id="3190" instrument_node="">This scandal first appeared in the news in 2016 following both the UK's Brexit referendum results and the US' presidential election result but was an on-going operation by Cambridge Analytica with the permission of Facebook using </span><a data-dcnode-id="3188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aleksandr_Kogan_%28scientist%29" title="Aleksandr Kogan (scientist)"><span data-dcnode-id="3189" instrument_node="">Aleksandr Kogan</span></a><span data-dcnode-id="3187" instrument_node="">'s app "</span><a class="mw-redirect" data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/This_Is_Your_Digital_Life" title="This Is Your Digital Life"><span data-dcnode-id="3186" instrument_node="">This is your Digital Life</span></a><span data-dcnode-id="3184" instrument_node="">".</span><sup class="reference" data-dcnode-id="3181" id="cite_ref-44"><a data-dcnode-id="3182" href="#cite_note-44"><span data-dcnode-id="3183" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3180" instrument_node=""> However, the methods were exposed on 27 September 2016 during a presentation by </span><a data-dcnode-id="3178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_Nix" title="Alexander Nix"><span data-dcnode-id="3179" instrument_node="">Alexander Nix</span></a><span data-dcnode-id="3177" instrument_node=""> named "The Power of </span><a data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Big_data" title="Big data"><span data-dcnode-id="3176" instrument_node="">Big Data</span></a><span data-dcnode-id="3174" instrument_node=""> and </span><a data-dcnode-id="3172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychographics" title="Psychographics"><span data-dcnode-id="3173" instrument_node="">Psychographics</span></a><span data-dcnode-id="3171" instrument_node="">".</span><sup class="reference" data-dcnode-id="3168" id="cite_ref-45"><a data-dcnode-id="3169" href="#cite_note-45"><span data-dcnode-id="3170" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3167" instrument_node=""> Nix was the chief executive officer of market-research at Cambridge Analytica. After founding the company in 2013 he was then suspended on 20 March 2018 following the release of a video in which he admitted to working directly with Donald Trump to gather data on the US electorate.</span><sup class="reference" data-dcnode-id="3164" id="cite_ref-46"><a data-dcnode-id="3165" href="#cite_note-46"><span data-dcnode-id="3166" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3163" instrument_node=""> In his 2016 presentation, Nix highlights his contribution the 2016 </span><a data-dcnode-id="3161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ted_Cruz" title="Ted Cruz"><span data-dcnode-id="3162" instrument_node="">Ted Cruz</span></a><span data-dcnode-id="3160" instrument_node=""> </span><a data-dcnode-id="3158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ted_Cruz_2016_presidential_campaign" title="Ted Cruz 2016 presidential campaign"><span data-dcnode-id="3159" instrument_node="">campaign</span></a><span data-dcnode-id="3157" instrument_node=""> and how taking the focus away from </span><a data-dcnode-id="3155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demography" title="Demography"><span data-dcnode-id="3156" instrument_node="">demographics</span></a><span data-dcnode-id="3154" instrument_node=""> and geographics for the targeted ads and instead using psychographics in order to target personality traits and get a better understanding of voter demands is a more effective method of gaining votes. In 2016, one of Nix's business associates, </span><a data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steve_Bannon" title="Steve Bannon"><span data-dcnode-id="3153" instrument_node="">Steve Bannon</span></a><span data-dcnode-id="3151" instrument_node="">, left the company to take over the campaign of Donald Trump and as a result of the video leak which lost Nix his job it is largely believed he had direct influence too. As well as this, Cambridge Analytica staff were also heavily involved in the </span><a data-dcnode-id="3149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vote_Leave" title="Vote Leave"><span data-dcnode-id="3150" instrument_node="">Vote-Leave campaign</span></a><span data-dcnode-id="3148" instrument_node=""> for the 2016 Brexit referendum.</span><sup class="reference" data-dcnode-id="3145" id="cite_ref-47"><a data-dcnode-id="3146" href="#cite_note-47"><span data-dcnode-id="3147" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3144" instrument_node=""> As a result of an organisation specialised in targeted ads being involved in two </span><a data-dcnode-id="3142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Populism" title="Populism"><span data-dcnode-id="3143" instrument_node="">populist</span></a><span data-dcnode-id="3141" instrument_node=""> campaigns that produced shock results, many point out as a potential threat to democracy.</span><sup class="reference" data-dcnode-id="3138" id="cite_ref-48"><a data-dcnode-id="3139" href="#cite_note-48"><span data-dcnode-id="3140" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3137" instrument_node="">
</span></p><p data-dcnode-id="3120"><span data-dcnode-id="3135" instrument_node="">But this is not the only example of potential election interference using social media. November 1, 2015, </span><a data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rodrigo_Duterte" title="Rodrigo Duterte"><span data-dcnode-id="3134" instrument_node="">Rodrigo Duterte</span></a><span data-dcnode-id="3132" instrument_node=""> was announced as president of </span><a data-dcnode-id="3130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philippines" title="Philippines"><span data-dcnode-id="3131" instrument_node="">Philippines</span></a><span data-dcnode-id="3129" instrument_node=""> after being 'the first person to make the full use of the power of social media'.</span><sup class="reference" data-dcnode-id="3126" id="cite_ref-49"><a data-dcnode-id="3127" href="#cite_note-49"><span data-dcnode-id="3128" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3125" instrument_node=""> Facebook had made an astonishing rise since the previous election and Duterte saw this as an opportunity to get social media influencers to promote his party and create viral content, further showing the power social media can have over democracy.</span><sup class="reference" data-dcnode-id="3122" id="cite_ref-50"><a data-dcnode-id="3123" href="#cite_note-50"><span data-dcnode-id="3124" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3121" instrument_node="">
</span></p><p data-dcnode-id="3104"><span data-dcnode-id="3119" instrument_node="">On 18 May 2017, </span><i data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Time</span></i><span data-dcnode-id="3116" instrument_node=""> had reported that the US Congress was investigating CA in connection with Russian interference in the 2016 United States elections. The report alleges that CA may have coordinated the spread of Russian propaganda using its microtargetting capabilities.</span><sup class="reference" data-dcnode-id="3113" id="cite_ref-51"><a data-dcnode-id="3114" href="#cite_note-51"><span data-dcnode-id="3115" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3112" instrument_node=""> In 2018, following disclosures that the company had improperly used the personal information of over 50 million Facebook users while working on Trump's presidential campaign, </span><i data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">The Times of Israel</span></i><span data-dcnode-id="3109" instrument_node=""> reported that the company had used what Nix had called "intelligence gathering" from British and Israeli companies as part of their efforts to influence the election results in Trump's favor.</span><sup class="reference" data-dcnode-id="3106" id="cite_ref-52"><a data-dcnode-id="3107" href="#cite_note-52"><span data-dcnode-id="3108" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3105" instrument_node=""> 
This was the work of one company and regulation may be able to prevent this in the future, but social media is now a medium that makes this kind of interference possible.
</span></p><span data-dcnode-id="3103" instrument_node="">
