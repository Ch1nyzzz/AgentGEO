</span><h1 data-dcnode-id="3278"><mark data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">Non-verbal Communication</span></mark></h1><span data-dcnode-id="3277" instrument_node="">

</span><section class="col-xs-12" data-dcnode-id="3246"><span data-dcnode-id="3262" instrument_node="">
</span><h2 data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">UNDERSTANDING TRUMP'S NON-VERBAL COMMUNICATION</span></h2><span data-dcnode-id="3259" instrument_node="">
</span><p data-dcnode-id="3248"><span data-dcnode-id="3258" instrument_node="">Love it or hate it, presidential hopeful Donald Trump is certainly a unique individual, with his own personal style. He knows how to use body language to effectively convey his message, emotions and influence other people’s emotions. According to Dr. Ronald Riggio from </span><a data-dcnode-id="3256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologytoday.com/blog/cutting-edge-leadership/201509/top-10-lessons-donald-trumps-body-language"><span data-dcnode-id="3257" instrument_node="">Psychology Today, </span></a><span data-dcnode-id="3255" instrument_node=""> Trump commonly presents 10 non-verbal cues and the possible signals they may communicate to his audiences. Additionally, Prof. Geoff Beattie, author of </span><a data-dcnode-id="3253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.routledge.com/posts/10002"><span data-dcnode-id="3254" instrument_node="">Rethinking Body Language,</span></a><span data-dcnode-id="3252" instrument_node=""> told </span><a data-dcnode-id="3250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euronews.com/2016/08/25/what-does-donald-trumps-body-language-say-about-him"><span data-dcnode-id="3251" instrument_node="">Euro News</span></a><span data-dcnode-id="3249" instrument_node=""> that Trump often employs unique body gestures by staying in place, and uses upper-body gestures and expressions to make his point. "This conveys a sense of power and control rather than a more collaborative approach." Trump knows what he’s doing. He knows how to make opponents look silly, how to communicate with the audience (even when he’s not speaking) and how to influence the audience’s emotions with one simple look. That’s the reason why he’s now the Republican presidential candidate and running for our president! Being able to aware of his commonly used body language will help us see what we can't hear in his verbal communication. Whether or not he tries to cover up things he doesn't know or assert power to us, understanding his non-verbal communication strategies will help us spot that!

                      </span></p><span data-dcnode-id="3247" instrument_node="">
</span></section><span data-dcnode-id="3245" instrument_node="">

</span><br data-dcnode-id="2597"><i data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">Alan Stevens:</span></i><span data-dcnode-id="2594" instrument_node=""> “He also makes use of random hand-waving to indicate that things have gone badly wrong before returning to close tight gestures to show that he can be trusted to deliver solution.”</span><br data-dcnode-id="2593"></p><span data-dcnode-id="2591" instrument_node="">

</span><p data-dcnode-id="1964"><br data-dcnode-id="1984"><strong data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Gesture:</span></strong><span data-dcnode-id="1981" instrument_node=""> OK gesture pairs up with an alternating upward pointing L finger</span><br data-dcnode-id="1980"><span data-dcnode-id="1979" instrument_node="">
</span><br data-dcnode-id="1978"><strong data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">Meaning:</span></strong><span data-dcnode-id="1975" instrument_node=""> </span><i data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Prof Beattie:</span></i><span data-dcnode-id="1972" instrument_node=""> “Some people think he uses them interchangeably. I don’t think that’s the case. If you look at some of the structures he’s doing, he will use the precision gesture as a counterpoint to the pointing upwards one to accentuate the third part of the list. And that pointing upwards is a very unusual gesture. I’ve analysed politicians in the past and I can’t think of many who use it.”</span><br data-dcnode-id="1971"><span data-dcnode-id="1970" instrument_node="">
</span><br data-dcnode-id="1969"><i data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Alan Stevens:</span></i><span data-dcnode-id="1966" instrument_node=""> “The closed loop and the L gesture both indicate ‘I’ve got this exactly right’. They suggest precision (the finger pointing upwards in the L) and a job done properly (the OK gesture). Both, and especially the latter, will be commonly used by his core supporters, creating another connection with them.”</span><br data-dcnode-id="1965"></p><span data-dcnode-id="1963" instrument_node="">

</span><p data-dcnode-id="1336"><br data-dcnode-id="1356"><strong data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Gesture:</span></strong><span data-dcnode-id="1353" instrument_node=""> Agressive finger pointing</span><br data-dcnode-id="1352"><span data-dcnode-id="1351" instrument_node="">
</span><br data-dcnode-id="1350"><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Meaning:</span></strong><span data-dcnode-id="1347" instrument_node=""> </span><i data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Prof Beattie:</span></i><span data-dcnode-id="1344" instrument_node=""> “When he talks about Clinton sometimes, this pointing gesture then becomes a claw. It becomes almost like a character view point, iconic gesture for Clinton – he talks about her picking judges and this point is transmogrified into a claw selection thing. It’s almost like a witch’s claw.”</span><br data-dcnode-id="1343"><span data-dcnode-id="1342" instrument_node="">
</span><br data-dcnode-id="1341"><i data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Alan Stevens:</span></i><span data-dcnode-id="1338" instrument_node=""> The point is normally avoided by speakers, since it can be seen as accusatory. However, Donald Trump, as the former host of “The Apprentice” has made the gesture his own, and uses it as a reminder that as president, he will have the control to “fire” people.”</span><br data-dcnode-id="1337"></p><span data-dcnode-id="1335" instrument_node="">

</span><p data-dcnode-id="705"><br data-dcnode-id="728"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Gesture:</span></strong><span data-dcnode-id="725" instrument_node=""> Opening his palms while speaking</span><br data-dcnode-id="724"><span data-dcnode-id="723" instrument_node="">
</span><br data-dcnode-id="722"><strong data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Meaning:</span></strong><span data-dcnode-id="719" instrument_node=""> Show openness gesture.</span><br data-dcnode-id="718"><span data-dcnode-id="717" instrument_node="">
</span><br data-dcnode-id="716"><i data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Prof Beattie:</span></i><span data-dcnode-id="713" instrument_node=""> “The open palm is ‘look I’m an honest Joe’ but there are lots of examples of it when he’s talking about negative things happening. He’s saying ‘look, you the audience and I, we are in exactly the same boat.’ And he doesn’t do that verbally he does that non-verbally… Some critics of Trump rightly point out that he talks about himself quite a lot. And people have talked about his very high level of narcissism… But what is interesting, sometimes when he does that, he doesn’t contradict it – he compensates for it – by using these gestures to build a ‘we’ connection with the audience. He’s showing that his emotions and their emotions are aligned. So even though he’s talking about himself he’s still building that rapport, building those connections with his audience.”</span><br data-dcnode-id="712"><span data-dcnode-id="711" instrument_node="">
</span><br data-dcnode-id="710"><i data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Alan Stevens:</span></i><span data-dcnode-id="707" instrument_node=""> “Open palms are usually an inclusive gesture, especially with the arms spread wide apart.”</span><br data-dcnode-id="706"></p><span data-dcnode-id="704" instrument_node="">
