</span><svg aria-hidden="true" data-dcnode-id="1525" height="30" role="img" tabindex="-1" viewBox="0 0 30 30" width="30" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="1526" fill="none" fill-rule="evenodd"><path d="M15 29.997c8.284 0 15-6.715 15-14.999C30 6.715 23.284 0 15 0 6.716 0 0 6.715 0 14.998c0 8.284 6.716 14.999 15 14.999z" data-dcnode-id="1528" fill="#E3E4E6"></path><path d="M21.233 11.054a3.253 3.253 0 0 0 1.352-1.815 5.931 5.931 0 0 1-1.954.796A2.982 2.982 0 0 0 18.385 9c-1.7 0-3.076 1.47-3.076 3.281 0 .257.025.508.078.747-2.557-.137-4.824-1.442-6.343-3.428a3.44 3.44 0 0 0-.416 1.65c0 1.138.543 2.143 1.369 2.732a2.943 2.943 0 0 1-1.395-.41v.04c0 1.59 1.06 2.917 2.47 3.217-.259.077-.53.116-.812.116-.198 0-.392-.02-.578-.058.39 1.303 1.527 2.253 2.874 2.278A5.935 5.935 0 0 1 8 20.524a8.327 8.327 0 0 0 4.717 1.473c5.662 0 8.755-5 8.755-9.336 0-.142-.001-.284-.007-.424a6.478 6.478 0 0 0 1.535-1.7 5.85 5.85 0 0 1-1.767.517z" data-dcnode-id="1527" fill="#FFF"></path></g></svg><span data-dcnode-id="1524" instrument_node="">

                  January 21, 2021 5:52 AM EST
                </span></div><span data-dcnode-id="1515" instrument_node="">

</span></div><span data-dcnode-id="1511" instrument_node="">

</span><div class="article content body clearfix" data-dcnode-id="1115" data-tracking-zone="body" id="article-body"><span data-dcnode-id="1508" instrument_node="">
</span><div class="padded" data-dcnode-id="1117"><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1503"><span class="dropcap" data-dcnode-id="1505" role="presentation"><span data-dcnode-id="1506" instrument_node="">S</span></span><span data-dcnode-id="1504" instrument_node="">tacey Pavesi Debré’s young daughters had a habit when they saw President Donald Trump on TV in their Paris apartment. They’d hold their noses and boo. That is, until Stacey’s mother Lonnie Pavesi came to visit for a week, to help take care of her grandchildren. After she left, the elder Debré child, who was about 7, had some strong words for her mother. “Mom, you lied to me,” she said. “You told me Trump was bad. Actually he’s not. Ama told me he’s making America better.”</span></p><span data-dcnode-id="1502" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad tgx-processed" data-dcnode-id="1500" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_1" role="complementary"><span data-dcnode-id="1501" instrument_node="">
</span></div><span data-dcnode-id="1499" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2 tgx-processed" data-dcnode-id="1497" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxposition="2" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_1" role="complementary"><span data-dcnode-id="1498" instrument_node="">
</span></div><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1495" instrument_node="">It transpired that Lonnie had mixed in some political discourse with her grandmotherly duties. “She had brainwashed our daughters behind our back,” says the girls’ father, Guillaume Debré, with amusement. He’s a French journalist who has written a </span><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/twitte-donc-suis-Documents-French/dp/2213713219" target="_blank"><span data-dcnode-id="1494" instrument_node="">book</span></a><span data-dcnode-id="1492" instrument_node=""> on Trump, but he maintains that he does not have as intense feelings about him as his American wife. “I was like, This is getting out of hand. The mother and the grandmother are fighting for the soul of their granddaughter. This is crazy. Even the French people don’t do this.”</span></p><span data-dcnode-id="1490" instrument_node=""> </span><p data-dcnode-id="1485"><span data-dcnode-id="1489" instrument_node="">Disagreements about politics have been the specter of every family get-together since dinner was invented. But after one of the most divisive presidential administrations in U.S. history followed by an election the outgoing leader claims was fraudulent (without any evidence that has stood up in court) and an attack on the Capitol, those rifts are as wide as anyone can remember. A postelection </span><a data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/politics/2020/12/17/voters-say-those-on-the-other-side-dont-get-them-heres-what-they-want-them-to-know/" target="_blank"><span data-dcnode-id="1488" instrument_node="">Pew Research Center survey</span></a><span data-dcnode-id="1486" instrument_node=""> found that fewer than 2% of voters felt those who voted for the other party understood them very well, and only 13% of Joe Biden’s voters and 5% of Donald Trump’s voters expressed any desire for future unity.</span></p><span data-dcnode-id="1484" instrument_node=""> </span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">President Biden won the election partly on the promise that he would heal the fissures between those who voted for him and those who voted for Trump. “Now it is time to turn the page,” he said in a speech after the Electoral College affirmed his victory. “To unite. To heal.”</span></p><span data-dcnode-id="1481" instrument_node=""> </span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">For some families, that is going to be a very heavy lift.</span></p><span data-dcnode-id="1478" instrument_node=""> </span><p data-dcnode-id="1473"><span data-dcnode-id="1477" instrument_node="">An October </span><a data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/doi/full/10.1177/0265407520967438" target="_blank"><span data-dcnode-id="1476" instrument_node="">study</span></a><span data-dcnode-id="1474" instrument_node=""> from the University of Missouri found that since 2016, family interactions have been more likely to drive highly partisan relatives apart than bring them together. One of the authors, associate professor of communication Ben Warner, says he had initially thought that having a family member who was on the opposite side of the aisle might lead to less stereotyping or dismissing of that person and their views. The study proved him wrong. “For people who are highly polarized, having a parent or child who is a member of the other party didn’t make things any better,” he says. “And it looked like it probably made things even worse, perhaps because it was such a point of tension in their family dynamic.”</span></p><span data-dcnode-id="1472" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad tgx-processed" data-dcnode-id="1470" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_2" role="complementary"><span data-dcnode-id="1471" instrument_node="">
</span></div><span data-dcnode-id="1469" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2 tgx-processed" data-dcnode-id="1467" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxposition="3" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_2" role="complementary"><span data-dcnode-id="1468" instrument_node="">
</span></div><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">So it is not surprising that most of the dozens of people TIME spoke to for this story didn’t want their names used. One woman said she has found it difficult to maintain communication with her Trump-loving twin sister; another said she has found herself trying to be the bridge between her African-American children and her white father. A mother of five began to feel increasingly isolated from her children and six siblings because of her support for Trump. One Black woman wept as she recalled helping her white mother register to vote for the first time, knowing she would vote to re-elect the then President.</span></p><span data-dcnode-id="1463" instrument_node=""> </span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Every parent spoke of how much they cherish their children, despite their differences. Most of the offspring, in turn, talked about how they believed their parents were good people. But a lot of people have quietly blocked family members on social media, or speak sadly of siblings or grandparents with whom they surreptitiously try to avoid spending time, and they worry that talking about it will further inflame the feud. Nevertheless, several families gamely tried to explain their differing points of view and how they were trying to navigate them.</span></p><span data-dcnode-id="1460" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-center" data-dcnode-id="1436"><span data-dcnode-id="1459" instrument_node="">
</span><div class="image-wrapper" data-dcnode-id="1438"><span data-dcnode-id="1458" instrument_node="">
</span><div class="component lazy-image no-upscale rendered image-loaded" data-alt="" data-crop="" data-dcnode-id="1440" data-height="467" data-shop-image="false" data-src="https://api.time.com/wp-content/uploads/2021/01/trump-divided-families-2.jpg" data-title="" data-width="800"><span data-dcnode-id="1457" instrument_node="">
</span><noscript data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">
                        &lt;div class="inner-container"&gt;
                          &lt;img src="https://api.time.com/wp-content/uploads/2021/01/trump-divided-families-2.jpg" Stacey Pavesi Debré with her parents, Dave and Lonnie Pavesi, and daughters, in Paris in 2017" Stacey Pavesi Debré with her parents, Dave and Lonnie Pavesi, and daughters, in Paris in 2017"&gt;
                        &lt;/div&gt;
                      </span></noscript><span data-dcnode-id="1454" instrument_node="">
</span><div class="inner-container js-inner-container" data-dcnode-id="1442" style="max-width: 800px;"><img alt="" data-dcnode-id="1453" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//api.time.com/wp-content/uploads/2021/01/trump-divided-families-2.jpg%3Fw%3D800%26quality%3D85&amp;raw" style="width: 800px;" title=""><span data-dcnode-id="1452" instrument_node="">
</span><div class="image-wrap-container clearfix" data-dcnode-id="1444"><span data-dcnode-id="1451" instrument_node="">
</span><div class="credit body-caption padding-8-top" data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Stacey Pavesi Debré with her parents, Dave and Lonnie Pavesi, and daughters, in Paris in 2017</span></div><span data-dcnode-id="1448" instrument_node="">
</span><div class="credit body-credit padding-8-top padding-8-bottom" data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Photo-Illustration by Ben Alper for TIME; Photo courtesy Stacey Pavesi Debré</span></div><span data-dcnode-id="1445" instrument_node="">
</span></div><span data-dcnode-id="1443" instrument_node="">
</span></div><span data-dcnode-id="1441" instrument_node="">
</span></div><span data-dcnode-id="1439" instrument_node=""> </span></div><span data-dcnode-id="1437" instrument_node="">
</span></div><span data-dcnode-id="1435" instrument_node=""> </span><p data-dcnode-id="1431"><strong data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">In October, Gary and Mary Bliefnick</span></strong><span data-dcnode-id="1432" instrument_node=""> of Missouri texted their son Soren and his sister Amy that they wanted to visit their children in early November instead of for Thanksgiving. They wondered if everyone could “commit to ignoring politics.” Soren texted back: “If you think Trump should be able to be re-elected, then we will have a problem regardless of the time of year.” His father asked what kind of problem. “I said, ‘A moral problem,’” says Soren. “And it just kind of went from there.”</span></p><span data-dcnode-id="1430" instrument_node=""> </span><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Soren, who lives in Los Angeles, finds it incomprehensible that the same parents who taught him the importance of civility, politeness and decency could have supported President Trump. He is mystified as to why they couldn’t see the same homophobic and racist behavior and instincts that he saw, and why they didn’t recognize that a vote for Trump was a vote against justice. “They voted for him for a second term for vague reasons that are more important to them than undermining my rights,” he says. “It was so incredibly hurtful that they would do something like that and seem to be so either oblivious or indifferent.” And once his father became convinced the election was fraudulent, he wished “they could see what I see, because then they would know why it makes me sick with grief.”</span></p><span data-dcnode-id="1427" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad tgx-processed" data-dcnode-id="1425" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_3" role="complementary"><span data-dcnode-id="1426" instrument_node="">
</span></div><span data-dcnode-id="1424" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2 tgx-processed" data-dcnode-id="1422" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxposition="4" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_3" role="complementary"><span data-dcnode-id="1423" instrument_node="">
</span></div><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">His parents meanwhile are equally mystified as to why their son can’t let them vote for whom they want to vote for. “For me,” says Mary, “it was very hurtful that neither of our kids could appreciate our decision to make our own decision based upon the things that we thought were important,” which for her were largely around law and order. His father sees it simply as identity politics. “He basically thinks Trump is anti-gay,” says Gary Bliefnick, who says he didn’t vote in 2016 but liked what Trump had done with the economy and employment levels and in standing up to the media, and so cast his ballot for him in 2020. He has no problem with the fact his son is gay but feels the President represented no real threat to LGBTQ rights.</span></p><span data-dcnode-id="1418" instrument_node=""> </span><p data-dcnode-id="1413"><span data-dcnode-id="1417" instrument_node="">Experts say family political disagreements can chafe more than disagreements among friends or colleagues, because of how deeply humans identify with their family members, how much they feel they come from the same place. In 2016, Bill Doherty, a University of Minnesota social-science professor and family therapist, co-founded </span><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//braverangels.org/" target="_blank"><span data-dcnode-id="1416" instrument_node="">Braver Angels</span></a><span data-dcnode-id="1414" instrument_node="">, an organization that runs workshops to help people of differing political views talk to one another. “The two biggest reasons people give for coming to the workshops are that they’re worried about polarization in the country,” he says, “and they’re worried about their families.” So many families approached the group for help in 2020 that it began offering online family political sessions, where volunteer moderators take people through a series of exercises to help them engage with family members who have strongly different political opinions. Doherty also added a lecture on political divisions to the postgraduate family-therapy courses he teaches.</span></p><span data-dcnode-id="1412" instrument_node=""> </span><p data-dcnode-id="1404"><span data-dcnode-id="1411" instrument_node="">Gary and Mary Bliefnick attribute their differences at least in part to geography. They feel their son changed when he went to college, and here Gary adjusts his tone slightly, in </span><i data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Boston.</span></i><span data-dcnode-id="1408" instrument_node=""> “I think my son and my daughter were—well, my choice of words would be </span><i data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">warped</span></i><span data-dcnode-id="1405" instrument_node="">—in the wrong direction about how awful America is,” he says. “They’re teaching them a different history than I learned.”</span></p><span data-dcnode-id="1403" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad tgx-processed" data-dcnode-id="1401" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_4" role="complementary"><span data-dcnode-id="1402" instrument_node="">
</span></div><span data-dcnode-id="1400" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2 tgx-processed" data-dcnode-id="1398" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxposition="5" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_4" role="complementary"><span data-dcnode-id="1399" instrument_node="">
</span></div><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1396" instrument_node="">The Bliefnicks’ experience mirrors a </span><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//science.sciencemag.org/content/360/6392/1020%3Fmod%3Darticle_inline" target="_blank"><span data-dcnode-id="1395" instrument_node="">2018 study</span></a><span data-dcnode-id="1393" instrument_node=""> that showed that families in which the hosts and guests lived in different, highly partisan areas spent up to 50 minutes less over the 2016 Thanksgiving dinner than families who didn’t. The researchers estimated that this led to a cumulative loss of almost 34 million hours of family time.</span></p><span data-dcnode-id="1391" instrument_node=""> </span><p data-dcnode-id="1386"><span data-dcnode-id="1390" instrument_node="">Another issue making these schisms harder to deal with is that political preference is a more all-encompassing set of beliefs than it used to be, what academics call a “</span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/5904504/political-ideology-division/"><span data-dcnode-id="1389" instrument_node="">mega-identity.</span></a><span data-dcnode-id="1387" instrument_node="">” If you are Republican, you don’t just believe in low taxes and robust defense spending. You’re more likely to be white, evangelical, and from a rural or small-town environment. And if you’re gay, African American or Latinx, and you live in a city, you’re more likely to vote Democratic. It’s not just about policy.</span></p><span data-dcnode-id="1385" instrument_node=""> </span><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">In many ways, the Pavesi clan embodies these identity differences. The senior Pavesis, who live in a small red outpost in Northern California, are devout Christians, and have been on mission and mercy trips all over the world. Stacey’s father Dave Pavesi was in the military. Stacey has spent most of her career in media and event planning, and the Debrés are more secular. Guillaume’s father is a French politician, and Guillaume was a correspondent for French TV in D.C. But for the elder Pavesis, politics takes a back seat to faith. “At the end of the day when everybody goes home, it doesn’t really change our life any,” says Dave. “I don’t believe either of us are persuaded by our individual arguments. That’s why I tend to avoid it more than not.”</span></p><span data-dcnode-id="1382" instrument_node=""> </span><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Stacey, for whom politics is more important, describes the situation differently. To her, it felt as if Trump’s election altered her parents’ behavior. “There’s sort of a bubbling over, this need to express themselves politically. It’s completely foreign to me,” she says. And she’s distressed by what she hears. Her father maintains that the election was stolen and that the attack on the Capitol was “a slight overreaction,” the result of frustration over “problems with the election which are being ignored rather than lawfully investigated.” When Stacey tried to dissuade her parents of that view, she says her mother announced she didn’t want to talk politics anymore.</span></p><span data-dcnode-id="1379" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad tgx-processed" data-dcnode-id="1377" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_5" role="complementary"><span data-dcnode-id="1378" instrument_node="">
</span></div><span data-dcnode-id="1376" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2 tgx-processed" data-dcnode-id="1374" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_5" role="complementary"><span data-dcnode-id="1375" instrument_node="">
</span></div><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">This time-honored way of handling such issues—just not talking about it—is not a viable option, however, for many families, because people are apt to air their views on social media anyway and also because it puts distance between people who are used to discussing things openly. Dr. Paul Groen and his son, also called Paul, are both very serious about their Christian faith, and talk about it regularly, but find their beliefs lead them to different conclusions. The elder Groen, 84, who for half his 50-year career as a physician was founding hospitals in Africa and now spends his days visiting those in his retirement community who are isolated because of COVID-19 restrictions, declines to say whom he voted for in 2020, but says it’s not hard to guess because he believes in small government. “I don’t condone a lot of his antics,” he says of the 45th President, “but I think a lot of things he’s done have been good.” He lays the blame for the current divisions more at the feet of Congress and its push to impeach the first time, and he doubts Biden will be able to offer much in the way of unity.</span></p><span data-dcnode-id="1370" instrument_node=""> </span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">His son, an opera singer who lives in London, says he finds it hard to overlook Trump’s cuts to the number of refugees, disparagement of women, mishandling of the virus and use of “alternative facts.” For families like the Groens, the new landscape is difficult to navigate—it’s like they’re reading different maps. “I don’t know how to have a conversation with family when you can’t agree on facts,” says the younger Groen. Dr. Groen doesn’t really follow the news, while his son regards a grasp of current affairs as important. “As a Christian,” he continues, “what I find fundamentally disturbing is the abandonment of the idea that there is objective truth.”</span></p><span data-dcnode-id="1367" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-center" data-dcnode-id="1344"><span data-dcnode-id="1366" instrument_node="">

</span><div class="credit body-credit padding-8-top padding-8-bottom" data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Photo-Illustration by Ben Alper for TIME; Photo courtesy Paul Goodwin-Groen</span></div><span data-dcnode-id="1353" instrument_node="">

</span></div><span data-dcnode-id="1347" instrument_node=""> </span></div><span data-dcnode-id="1345" instrument_node="">
</span></div><span data-dcnode-id="1343" instrument_node=""> </span><p data-dcnode-id="1339"><strong data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">The end of the Trump presidency</span></strong><span data-dcnode-id="1340" instrument_node=""> doesn’t mean the end of the Trump era—or that the barriers between those who disagree with each other are dissolving. Despite the disputes, most of these families are still intact and finding ways to hang on to their relationships. There are many voters, however, for whom the bridges seem to be irrevocably burned. This is the group in which Lynette Villano has landed.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad tgx-processed" data-dcnode-id="1336" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_6" role="complementary"><span data-dcnode-id="1337" instrument_node="">
</span></div><span data-dcnode-id="1335" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2 tgx-processed" data-dcnode-id="1333" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_6" role="complementary"><span data-dcnode-id="1334" instrument_node="">
</span></div><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">As recently as April 2016, Villano’s older sister, Susan Paraventi, took her and three relatives on a girls’ trip to the Florida Keys for Villano’s 70th birthday. Several years earlier, Paraventi had rushed to her sister’s side to help when Villano’s son had a medical procedure. Now the sisters never speak. Villano, from eastern Pennsylvania, is also estranged from two of her children. She says she was invited to Thanksgiving in 2018 and then uninvited when other family members protested.</span></p><span data-dcnode-id="1329" instrument_node=""> </span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Villano has always been a political enthusiast and a Republican, both traits she shared with her now deceased mother. When she ran to be the local delegate, she says, the rest of her family cheered her along. But things shifted, some of her family say, as soon as Trump came down the escalator at Trump Tower in 2015 and announced his candidacy. “It’s just all Trump all the time with her,” says Paraventi, who lives in Massachusetts. Villano’s social media fervor—her constant celebration of Trump’s behavior, family, opinions and denigration of his enemies—rankled other relatives, who felt she was hyping him to advance her own political career.</span></p><span data-dcnode-id="1326" instrument_node=""> </span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">At one point, she shared selected texts from family members with a reporter, who put them in a book in a chapter titled “Trump’s Biggest Fan.” These missives, which her relatives say were edited to make them look bad and were used without permission, led to their receiving threatening messages. (They requested that TIME not use their names, citing safety concerns.) But Villano says she has also suffered. “I don’t think people realize how much hatred Trump supporters get,” she says.</span></p><span data-dcnode-id="1323" instrument_node=""> </span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">For a while, Paraventi blocked her sister on social media but kept talking to her. Things reached a low just before Christmas 2019, when Villano, a two-time cancer survivor, was in New York City for medical reasons and Paraventi was there for a Bob Dylan concert (she has been to Dylan concerts in 48 states and several countries). The sisters planned a museum trip together. Their stories differ in some details, but they agree that just before meeting, Paraventi asked Villano to remove the large Trump flag pin she always wore, and in return she would wear no political regalia. Villano, who considers the pin her signature, declined. The excursion was called off. Paraventi’s husband went to his sister-in-law and tried to coax the two together, to no avail. “My mother is rolling in her grave,” says Paraventi. “The one thing she always said was that she just wanted her children to get along. We were a very close family.”</span></p><span data-dcnode-id="1320" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad tgx-processed" data-dcnode-id="1318" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_7" role="complementary"><span data-dcnode-id="1319" instrument_node="">
</span></div><span data-dcnode-id="1317" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2 tgx-processed" data-dcnode-id="1315" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_7" role="complementary"><span data-dcnode-id="1316" instrument_node="">
</span></div><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">As far as Villano is concerned, her relatives are the ones being unreasonable. “If I was a good mother, sister and aunt all these years, and they loved me, what changed?” she asks. “Nothing changed about me. This is who I am. I support a candidate because of where they stand on the issues.” Her sister disagrees. She has other Trump-supporting relatives, but they don’t talk about it so much, or choose to promote the President if it has a negative effect on the rest of the family. “I think it changed her,” says Paraventi. “And the way she supported him changed my feelings toward her. I can’t see how she doesn’t understand some of the harm he’s done to this country.”</span></p><span data-dcnode-id="1311" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-center" data-dcnode-id="1288"><span data-dcnode-id="1310" instrument_node="">
</span><div class="image-wrapper" data-dcnode-id="1290"><span data-dcnode-id="1309" instrument_node="">
</span><div class="component lazy-image no-upscale" data-alt="" data-crop="" data-dcnode-id="1292" data-height="560" data-shop-image="false" data-src="https://api.time.com/wp-content/uploads/2021/01/trump-divided-families-4.jpg" data-title="" data-width="800"><span data-dcnode-id="1308" instrument_node="">
</span><noscript data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">
                        &lt;div class="inner-container"&gt;
                          &lt;img src="https://api.time.com/wp-content/uploads/2021/01/trump-divided-families-4.jpg" Lynette Villano, left, and her sister Susan Paraventi (and Wuzzy the cat) at a family Christmas in the pre-Trump era" Lynette Villano, left, and her sister Susan Paraventi (and Wuzzy the cat) at a family Christmas in the pre-Trump era"&gt;
                        &lt;/div&gt;
                      </span></noscript><span data-dcnode-id="1305" instrument_node="">
</span><div class="inner-container js-inner-container" data-dcnode-id="1294"><span data-dcnode-id="1304" instrument_node="">

</span><div class="credit body-caption padding-8-top" data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Lynette Villano, left, and her sister Susan Paraventi (and Wuzzy the cat) at a family Christmas in the pre-Trump era</span></div><span data-dcnode-id="1300" instrument_node="">
</span><div class="credit body-credit padding-8-top padding-8-bottom" data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Photo-Illustration by Ben Alper for TIME; Photo courtesy Lynette Villano</span></div><span data-dcnode-id="1297" instrument_node="">
</span></div><span data-dcnode-id="1295" instrument_node="">
</span></div><span data-dcnode-id="1293" instrument_node="">
</span></div><span data-dcnode-id="1291" instrument_node=""> </span></div><span data-dcnode-id="1289" instrument_node="">
</span></div><span data-dcnode-id="1287" instrument_node=""> </span><p data-dcnode-id="1283"><strong data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">In some ways,</span></strong><span data-dcnode-id="1284" instrument_node=""> disagreements within families have surfaced for the same reasons they have rumbled across the U.S. and even the planet. Trump is a divisive figure. Different generations have different values. People tend to take on the culture of the region they live and work in. The decline of trust in such institutions as the media, the church and the courts has left the two sides with no agreed-upon set of premises from which to start. Social media encourages people to live in an echo chamber and keeps amplifying views that could once be kept quiet for the sake of harmony. The pandemic has widened the chasm, since people don’t get to do things together. (One woman remarked that if she saw her estranged cousin, she’s pretty sure the muscle memory would lead her to hug her.) And, perhaps with fewer blockbusters, sports games and social events to discuss, and an unfiltered leader tweeting regularly until recently, politics has become the most tempting source of conversational fodder.</span></p><span data-dcnode-id="1282" instrument_node=""> </span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">But even more than that, in the Trump era, many Americans don’t see voting as a decision about a set of policies, they see it as a moral imperative, an act that will make or break the country, in a way a vote for George W. Bush or Bill Clinton wasn’t. Villano, Gary Bliefnick and Dave Pavesi are steadfastly persuaded that the country has been a victim of election fraud. (Dave Pavesi insists that Biden is a puppet, whose controllers will soon be revealed.) Their left-leaning relatives are just as certain that their family members are on the wrong side of history. “My parents professed to love America and the Constitution and all of these things, and it’s like they’re trying to directly undermine that,” says Soren Bliefnick.</span></p><span data-dcnode-id="1279" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad tgx-processed" data-dcnode-id="1277" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_8" role="complementary"><span data-dcnode-id="1278" instrument_node="">
</span></div><span data-dcnode-id="1276" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2 tgx-processed" data-dcnode-id="1274" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_8" role="complementary"><span data-dcnode-id="1275" instrument_node="">
</span></div><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1272" instrument_node="">The Groens as well as the Pavesis and Debrés are in different countries; their interactions are mostly virtual and thus more tightly controlled. The Groens Zoom every week for at least an hour. “I would say we have good rapport, but I don’t know what [my son] would say because we probably will never agree politically,” says Dr. Groen. “For us it’s been hard to have a low-key discussion; they usually kind of get pretty energetic.” Some of the more difficult conversations are hashed out among the Pavesi clan over text. Dave Pavesi says Trump’s departure probably won’t change his family dynamic, which he doesn’t think is that bad. He’d like the election to be investigated but says, “I’m not going to let that hurt my family.” Villano is not sure she can ever reconcile with her sister or other relatives. Paraventi says she has stopped missing her: “I don’t know that things will get better anytime soon because she will never admit that anything she has done was over the top.” Soren Bliefnick says he thought about cutting his parents out of his life but decided against it, partly because his mother pointed out that she’d never do that to him. “As of right now, I feel separated from them more than</span><br data-dcnode-id="1271"><span data-dcnode-id="1270" instrument_node=""> I have because of this,” he says. “It’s hard to want to talk to them with that sort of shadow hanging over me.” His mother Mary, “sick of the entire mess,” is not confident the election was fair, but was disgusted by Trump’s behavior after November when he should have been focused on COVID-19. “I just refuse to let my family be broken by politics,” she says.</span></p><span data-dcnode-id="1268" instrument_node=""> </span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Doherty, the family therapist, hopes that this relational fracturing shall pass. “People underestimate the tremendous pain and hurt involved in a family cutoff,” he says. “We all need time-out sometimes from family intensity, but that’s a whole different thing.” In an era dominated by a highly infectious disease, even a temporary break in communications, he notes, could be final: “Somebody gets COVID—what, you don’t call?”</span></p><span data-dcnode-id="1265" instrument_node=""> </span><p data-dcnode-id="1261"><span data-dcnode-id="1264" instrument_node="">Villano heard over Christmas that one of her relatives was ill. She texted a get-well message. She hasn’t heard back.</span><br data-dcnode-id="1263"><span data-dcnode-id="1262" instrument_node=""> “I don’t think they want anything to do with me,” she says. “The theme of Joe Biden’s Inauguration is supposed to be unity, but I don’t see anything taking place from him or Congress that is going to unify the country. I don’t see anybody working to try and bring us together on either side. How are we ever going to get together to solve all the problems that we have?” </span></p><span data-dcnode-id="1260" instrument_node=""> </span><div class="component inline-article-recirc" data-dcnode-id="1193"><span data-dcnode-id="1259" instrument_node="">
