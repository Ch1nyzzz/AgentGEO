</span><article class="content clearfix" data-dcnode-id="279" role="main" xmlns:fn="http://www.w3.org/2005/xpath-functions"><section class="toc-anchor" data-dcnode-id="708" id="intro"><header data-dcnode-id="724"><h2 data-dcnode-id="725"><span data-dcnode-id="728" instrument_node="">Introduction
                      </span><button class="btn btn-default toc-invoker" data-dcnode-id="726" data-original-title="Table of Contents" data-trigger="hover" rel="tooltip" title=""><i class="fontello-icon-list" data-dcnode-id="727"></i></button></h2></header><span data-dcnode-id="723" instrument_node="">
</span><figure data-dcnode-id="715"><a data-article-id="274218" data-assembly-id="117202" data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/etiquette/274218/media%3FassemblyId%3D117202"><div class="" data-dcnode-id="721"><img alt="A Aff A0n N Pu Claaaaa El F Tk Su Qm Cc" class="lazy" data-dcnode-id="722" data-generated-alt="true" data-original="https://cdn.britannica.com/95/106695-004-96B926CD.jpg" height="308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.britannica.com/95/106695-004-96B926CD.jpg&amp;raw" style="" width="220"></div><span class="visuallyhidden" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Don Smetzer/Stone</span></span></a><figcaption data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Don Smetzer/Stone</span></figcaption></figure><p class="p-first" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">

“You’re so nice to be with!” These words are a fine compliment for anyone to receive. Good manners, those that help people become “nice to be with,” are what etiquette is all about. Etiquette is a French word that meant a “label” or “ticket.” Later a new meaning was added. Etiquettes, printed lists of rules for proper behavior, were given to persons being presented at court to prevent them from making embarrassing blunders before the king. The word etiquette came to mean a code of good manners, and in that sense it was adopted into the English language in the 18th century.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Modern etiquette books serve much the same purpose as the etiquettes of the old French court. They explain the rules of good behavior that have developed through the years to help people feel sure of themselves in every social situation. Some of these books are listed and described in the bibliography.</span></p><span data-dcnode-id="709" instrument_node="">
</span></section><section class="toc-anchor" data-dcnode-id="682" id="200403-toc"><header data-dcnode-id="703"><h2 data-dcnode-id="704"><span data-dcnode-id="707" instrument_node="">Manners and Etiquette in Everyday Life</span><button class="btn btn-default toc-invoker" data-dcnode-id="705" data-original-title="Table of Contents" data-trigger="hover" rel="tooltip" title=""><i class="fontello-icon-list" data-dcnode-id="706"></i></button></h2></header><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Good manners and etiquette are not complicated. Anyone can demonstrate courtesy and consideration for others—the stuff of which good manners are made—without knowing the specific rules of etiquette.</span></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">And no one is born knowing those rules. They are learned gradually—at home, in school, at work, and in everyday contacts with both friends and strangers. To expand their knowledge of good conduct, many people continue to read etiquette books as adults.</span></p><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">There are a number of reasons why people want to learn good manners and the rules of etiquette. Good manners help win friends. Naturally, people who treat other people with kindness and sympathy are most likely to become popular because they are considered good companions.</span></p><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Good manners also help please members of the family, special friends, teachers, employers, and strangers like salespeople and law officers. Good manners help put people at ease, make them cooperative and just plain happy.</span></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">People who practice good manners and understand the rules of etiquette also make themselves happy. Knowing how to behave properly, in familiar as well as in strange situations, builds self-confidence. Meeting new people and visiting new places become pleasurable instead of frightening experiences.</span></p><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Good manners begin at home. Even the youngest children quickly learn to say “please” and “thank you” when their parents, brothers, and sisters are courteous toward each other. Respect for family members can be demonstrated in many ways. Being on time for meals, showing responsibility in handling an allowance, and taking care of belongings are all part of manners at home. So are respecting privacy, sharing household chores, and taking turns using the telephone, television set, or family car.</span></p><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Good manners are equally important at school. Paying attention in class and handing in neatly prepared homework are ways to show respect for teachers. Classmates can show mutual consideration by respecting each other’s property, by not “showing off” superior knowledge or possessions, and by making new students feel welcome.</span></p><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">On the job, good manners mean arriving on time, being reliable, and caring about neatness in both work and personal grooming. Thoughtfulness toward other employees helps improve the working atmosphere. Employers appreciate willingness to work and accept criticism and an ability to keep confidences.</span></p><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Any number of situations in social life call for a knowledge of etiquette. For instance, knowing how to make proper introductions helps avoid confusion and embarrassment at parties. Knowing how to order from a menu and whom and how much to tip, can help make a date go smoothly. Today, when foreign travel is so popular, the person who learns in advance the customs of a country he intends to visit will increase his enjoyment of the trip as well as leave a good impression in the host country.</span></p><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Sometimes the rules of etiquette one has learned may not seem to fit a particular situation. Then it is up to the individual to use his own common sense and good judgment in deciding what sort of behavior is appropriate. Naturalness and sincerity can help him master even the most complicated situations.</span></p></section><section class="toc-anchor" data-dcnode-id="667" id="200404-toc"><header data-dcnode-id="677"><h2 data-dcnode-id="678"><span data-dcnode-id="681" instrument_node="">Courtesy, Caste, and Law</span><button class="btn btn-default toc-invoker" data-dcnode-id="679" data-original-title="Table of Contents" data-trigger="hover" rel="tooltip" title=""><i class="fontello-icon-list" data-dcnode-id="680"></i></button></h2></header><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">In most societies, general forms of courtesy were developed to enable people to get along together pleasantly. Most people will conform to the accepted rules of behavior in their community because violations of the rules might be ridiculed.</span></p><p data-dcnode-id="670"><span data-dcnode-id="674" instrument_node="">In some societies, however, rules of behavior have gone beyond simple courtesy to establish divisions between higher and lower classes of society. In India, for instance, the division of classes known as the </span><a class="reflink" data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/caste/318963"><span data-dcnode-id="673" instrument_node="">caste</span></a><span data-dcnode-id="671" instrument_node=""> system rigidly governs everyday manners. The higher castes are allowed to wear fine clothes and ornaments, which are forbidden to the lower castes. Higher castes may not accept cooked food or water from lower castes. Persons from the highest and the lowest castes may even be required to walk a certain distance away from each other in the streets. In modern cities, however, where people of all castes live and work closely together, many of these rules have been relaxed.</span></p><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Sometimes matters of courtesy can become part of written law. In driving, for example, spattering mud on pedestrians standing at the curb is simply bad manners. Blocking a driveway, however, or tailgating (following too closely behind the car ahead) are not only discourteous but may also be against the law and punishable by a fine.</span></p></section><section class="toc-anchor" data-dcnode-id="649" id="200405-toc"><header data-dcnode-id="662"><h2 data-dcnode-id="663"><span data-dcnode-id="666" instrument_node="">Origin of Modern Courtesies</span><button class="btn btn-default toc-invoker" data-dcnode-id="664" data-original-title="Table of Contents" data-trigger="hover" rel="tooltip" title=""><i class="fontello-icon-list" data-dcnode-id="665"></i></button></h2></header><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Most forms of etiquette used today evolved from ancient beginnings. The courtesies used when people greet each other are one example. The handshake probably originated when early man began to hold out his right hand—the weapon hand—as a sign of friendliness and peace. The handshake has taken different forms. In the United States during the late 1800s, it was fashionable for a time to give a high handshake at about the level of the nose.</span></p><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">The gesture of lifting the hat as a sign of respect is another old custom that was already established by the Middle Ages. It was probably made even more fashionable by the armored knights, who lifted their helmet visors when meeting as a signal of recognition. When a knight joined a gathering of friends, he removed his helmet to show that he felt safe.</span></p><p data-dcnode-id="650"><span data-dcnode-id="657" instrument_node="">The titles of respect used today also have distant origins. Mister (Mr.), a form of master, came from the Latin term </span><em data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">magister</span></em><span data-dcnode-id="654" instrument_node="">, meaning a ruler and lawmaker. During the 18th century in the United States, many women customarily addressed their husbands as “Mr. Jones,” or whatever, instead of using first names. Today Mr. is a common courtesy title given to virtually all men. Sir, another courtesy title in general use, evolved from </span><em data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">seigneur</span></em><span data-dcnode-id="651" instrument_node="">, the medieval French title for the lord of a feudal manor. The woman’s courtesy title Madam comes from an old French term meaning “my lady,” which was used by the lower classes to address noblewomen at court.</span></p></section><section class="toc-anchor" data-dcnode-id="588" id="200406-toc"><header data-dcnode-id="644"><h2 data-dcnode-id="645"><span data-dcnode-id="648" instrument_node="">Etiquette Around the World</span><button class="btn btn-default toc-invoker" data-dcnode-id="646" data-original-title="Table of Contents" data-trigger="hover" rel="tooltip" title=""><i class="fontello-icon-list" data-dcnode-id="647"></i></button></h2></header><figure data-dcnode-id="636"><a data-article-id="274218" data-assembly-id="117203" data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/etiquette/274218/media%3FassemblyId%3D117203"><div class="" data-dcnode-id="642"><img alt="A Aff A0n N Pu Claaaaa El F Tk Su Qm Cc" class="lazy" data-dcnode-id="643" data-generated-alt="true" data-original="https://cdn.britannica.com/97/106697-004-F0FF3D7C.jpg" height="323" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsQAAA7EAZUrDhsAAAANSURBVBhXYzh8+PB/AAffA0nNPuCLAAAAAElFTkSuQmCC" width="220"></div><span class="visuallyhidden" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Robert Frerck/Odyssey Productions</span></span></a><figcaption data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Robert Frerck/Odyssey Productions</span></figcaption></figure><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">

Rules of etiquette have varied all over the world at different times in history. The customs dealing with hospitality furnish good examples of this.</span></p><p data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">The sending of invitations has long played a significant role in the etiquette of hospitality. Among the first people to use invitations were the North American Indians. One of their methods was to burn messages in buckskin, which were then carried by runners to all the intended guests. In </span><a class="reflink" data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/William-Shakespeare/277015"><span data-dcnode-id="632" instrument_node="">Shakespeare</span></a><span data-dcnode-id="630" instrument_node="">’s time invitations in England were written on large sheets of white paper and colorfully decorated. Pages or messengers carried them to the prospective guests, from whom answers were usually required. It was considered insulting to issue invitations any other way. But today, mailing or telephoning invitations are acceptable ways of getting guests together.</span></p><p data-dcnode-id="615"><span data-dcnode-id="628" instrument_node="">To early man, hospitality meant sharing food and shelter with friends or strangers. This has remained one of the chief ways of expressing friendship. Among the </span><a class="reflink" data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/Bedouin/317221"><span data-dcnode-id="627" instrument_node="">Bedouin</span></a><span data-dcnode-id="625" instrument_node=""> Arabs, for example, it is considered ill-mannered and insulting to ride up to a man’s tent without stopping to eat with him. A ceremony of hospitality among the Bedouin is the coffee-brewing ritual. The host always makes a fresh pot, using elaborate utensils which are handed down from father to son. Another such ritual is the </span><em data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">chanoyu</span></em><span data-dcnode-id="622" instrument_node="">, or tea ceremony, of Japan (</span><em data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">see</span></em><span data-dcnode-id="619" instrument_node=""> </span><a class="reflink" data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/tea/275434"><span data-dcnode-id="618" instrument_node="">tea</span></a><span data-dcnode-id="616" instrument_node="">).</span></p><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">A guest in Japan is given small candies and cakes, which are served on pieces of paper. To be polite, he must wrap the food he cannot finish in the paper and carry it away with him. In the United States too, hostesses often give their guests food to take home, such as a piece of cake from a birthday party.</span></p><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Many other rituals have been used to make guests feel welcome. Early Greeks gave salt to a guest as a symbol of hospitality. Arabs poured melted butter on the hands of their guests to refresh them. In Arab lands today, a guest must be careful not to admire his host’s possessions, because if he does the host will offer them to him. Among the North American Indians, smoking a tobacco pipe, the calumet, was the chief ritual of hospitality. Passing around the calumet became a feature of tribal gatherings for making peace or forging alliances.</span></p><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Table manners evolved along with the development of hospitality. The ancient Greeks did not use knives, forks, or spoons for eating. They used their fingers to eat solid foods, which were cut into small pieces before being served. They drank liquids directly from vessels or sopped them up with bread. The Romans did not use individual plates but took food with their fingers directly from the platters. The Egyptians also shared a common dish.</span></p><figure data-dcnode-id="599"><a data-article-id="274218" data-assembly-id="193679" data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/etiquette/274218/media%3FassemblyId%3D193679"><div class="video-thumb-container" data-dcnode-id="605"><img alt="table manners" class="lazy" data-dcnode-id="608" data-generated-alt="true" data-original="https://cdn.britannica.com/66/179466-049-1294F259.jpg" height="123" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsQAAA7EAZUrDhsAAAANSURBVBhXYzh8+PB/AAffA0nNPuCLAAAAAElFTkSuQmCC" title="table manners" width="220"><span class="fontello-icon-play" data-dcnode-id="607"></span><span class="video-duration large" data-dcnode-id="606" id="video-duration-193679"></span></div><span class="visuallyhidden" data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Contunico © ZDF Enterprises GmbH, Mainz</span></span></a><figcaption data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Contunico © ZDF Enterprises GmbH, Mainz</span></figcaption></figure><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">


The Chinese traditionally use chopsticks to eat solid foods, which are prepared in small pieces. In addition to their normal use during a meal, chopsticks may be used to send a signal to the host. Placing them across the top of a bowl is a sign that the guest wishes to leave the table.</span></p><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Table knives and forks were uncommon in Europe as late as the 17th century. People carried their own knives, which they took out and used whenever large portions of food were served. Today the use of the knife and fork varies in different countries. In the United States, the knife is held in the right hand and the fork in the left. After the food is cut, the knife is put down and the fork is transferred to the right hand. In most European countries the fork remains in the left hand.</span></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Just as the rules of etiquette vary around the world, they also vary with time in any given area. Some customs disappear through disuse. Others are added as new situations arise. The development of the automobile, for instance, made it necessary to develop rules of courtesy for both drivers and passengers. Customs can also be changed by political means. In 1925 the president of Turkey, Kemal Atatürk, attempted to abolish the traditional veiling of women. Most women in the cities discarded the veil, but it is still worn by many women in rural areas.</span></p><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Nations as well as individuals follow rules of etiquette. In their dealings with each other, the nations of the world developed a system of international courtesy known as protocol. The establishment of an order of precedence among diplomatic representatives is one of the most important matters of protocol. Today, for instance, diplomats rank one another according to their length of service in a nation’s capital. In the United Nations, however, the delegates of each country are regarded as equals and are seated according to the alphabetical order of the countries they represent.</span></p><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Since diplomats symbolize their countries, any discourtesy shown to them is considered a discourtesy to their countries. Thus, a violation of diplomatic courtesy might endanger international relations and even become a cause for declaring war.</span></p></section><section class="toc-anchor" data-dcnode-id="561" id="200407-toc"><header data-dcnode-id="583"><h2 data-dcnode-id="584"><span data-dcnode-id="587" instrument_node="">Early Etiquette Codes</span><button class="btn btn-default toc-invoker" data-dcnode-id="585" data-original-title="Table of Contents" data-trigger="hover" rel="tooltip" title=""><i class="fontello-icon-list" data-dcnode-id="586"></i></button></h2></header><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Since ancient times, people have developed formal rules of ideal behavior. These rules, written or unwritten, are known as codes of etiquette.</span></p><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">One of the first rules established to help people get along well became known as the Golden Rule: “Do unto others as you would have them do unto you.” It is derived from the Old Testament injunction to “love thy neighbor as thyself” (Lev. xix, 18). Various forms of the Golden Rule appear in the New Testament and in the writings of such early philosophers as Confucius and Plato.</span></p><p data-dcnode-id="574"><span data-dcnode-id="578" instrument_node="">In ancient China, proper conduct for the upper classes was described in documents like the </span><em data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">I-Li</span></em><span data-dcnode-id="575" instrument_node=""> (Book of Etiquette and Ceremonial), which instructed government officials how to behave at various ceremonies. Its rules covered such matters as proper dress and hair style, which direction to face, and how many bows to make. To the Chinese, ceremonious behavior was a way to achieve orderliness and self-control.</span></p><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">The medieval warriors of Japan—the samurai—were governed by an unwritten code of conduct known as Bushido. Dignity, honesty, and courage were stressed along with absolute loyalty to one’s lord or master. A samurai was expected to show affection, but it was considered undignified to express his devotion to his family outside the privacy of his home. To achieve fame and honor, a samurai would undergo great suffering and even willingly lose his life. If dishonored, he could redeem himself by committing the form of ritual suicide known as hara-kiri.</span></p><p data-dcnode-id="567"><span data-dcnode-id="571" instrument_node="">The ideal man of ancient Athens was the </span><em data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">kalos kagathos</span></em><span data-dcnode-id="568" instrument_node=""> (the beautiful and the good). He was supposed to be wise, just, and courageous as well as generous, truthful, and amiable. Modesty was not required, however, and consideration for others was not regarded as important. The kalos kagathos also had to be especially handsome, since a person thought ugly was not considered ideal.</span></p><p data-dcnode-id="562"><span data-dcnode-id="566" instrument_node="">Roman citizens were expected to conduct themselves according to </span><em data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">gravitas</span></em><span data-dcnode-id="563" instrument_node="">, a traditional rule of dignity. Vulgarity and boasting were considered ill-mannered. Romans were to show respect to all men, particularly officials and the aged, and even to the poor and to slaves. Personal appearance was less important to the Romans than to the Athenians.</span></p></section><section class="toc-anchor" data-dcnode-id="499" id="200408-toc"><header data-dcnode-id="556"><h2 data-dcnode-id="557"><span data-dcnode-id="560" instrument_node="">Etiquette Codes in Europe</span><button class="btn btn-default toc-invoker" data-dcnode-id="558" data-original-title="Table of Contents" data-trigger="hover" rel="tooltip" title=""><i class="fontello-icon-list" data-dcnode-id="559"></i></button></h2></header><p data-dcnode-id="542"><span data-dcnode-id="555" instrument_node="">During the 11th century chivalry arose in France. Later it spread to the other countries of Europe. Young boys of noble birth were trained in the manners they would need to know as </span><a class="reflink" data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/knighthood/275302"><span data-dcnode-id="554" instrument_node="">knights</span></a><span data-dcnode-id="552" instrument_node="">. They were taught to honor the Christian church, to respect women, and to devote their lives to the service of a lady. Such service was supposed to increase their abilities as warriors. Often a knight would worship his lady at a distance, never speaking to her and perhaps never even seeing her. This medieval knightly conduct is called courtly love. The etiquette of courtly love was included in manuals of conduct even during the </span><a class="reflink" data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/Renaissance/276692"><span data-dcnode-id="551" instrument_node="">Renaissance</span></a><span data-dcnode-id="549" instrument_node="">. These manuals, now called courtesy books, discussed the training and duties of men and women who lived at court. One of the most influential courtesy books, </span><em data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Il Cortegiano</span></em><span data-dcnode-id="546" instrument_node=""> (The Courtier), was published in Italy in 1528 and was later translated into English. The first English courtesy book, the </span><em data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Book of the Governour</span></em><span data-dcnode-id="543" instrument_node="">, appeared in 1531.</span></p><figure data-dcnode-id="534"><a data-article-id="274218" data-assembly-id="121729" data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/etiquette/274218/media%3FassemblyId%3D121729"><div class="" data-dcnode-id="540"><img alt="A Aff A0n N Pu Claaaaa El F Tk Su Qm Cc" class="lazy" data-dcnode-id="541" data-generated-alt="true" data-original="https://cdn.britannica.com/99/106699-004-5E04A460.jpg" height="383" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsQAAA7EAZUrDhsAAAANSURBVBhXYzh8+PB/AAffA0nNPuCLAAAAAElFTkSuQmCC" width="220"></div><span class="visuallyhidden" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Courtesy of Northwestern University</span></span></a><figcaption data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Courtesy of Northwestern University</span></figcaption></figure><p data-dcnode-id="523"><span data-dcnode-id="533" instrument_node="">

Etiquette books were also available for the ordinary citizen. William Caxton, the first English printer, published the </span><em data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Book of Courtesy</span></em><span data-dcnode-id="530" instrument_node=""> about 1479. The Italian clergyman Giovanni della Casa wrote </span><em data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Galateo</span></em><span data-dcnode-id="527" instrument_node="">, probably around the middle of the 16th century. In it he criticized the rude habits and offensive speech of the period. In 1526, the great scholar Erasmus published ‘</span><em data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">De Civilitate</span></em><span data-dcnode-id="524" instrument_node="">’, a book on polite manners for young people. In this work he advised that good manners should be based on consideration for others, not on the desire to make an impression.</span></p><p data-dcnode-id="518"><span data-dcnode-id="522" instrument_node="">Many 15th- and 16th-century etiquette books were devoted to the training of children and of servants. One of the most popular works was </span><em data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">The Babees Book</span></em><span data-dcnode-id="519" instrument_node="">, which appeared around 1475. Young boys being brought up in a courtier’s home were instructed not to fidget when being spoken to, not to spill food, and not to fall asleep over their meals. They were expected to help their lords bathe and to hold candles for them while they ate. Girls were taught how to behave modestly and how to treat their future husbands. Servants had to learn the proper way to set a table and to seat guests at dinner.</span></p><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">In the 17th century in France, social life centered upon the court of Louis XIV at Versailles. The king himself wrote a book of rules for court ceremonies which all his attendants were expected to obey. Ordinary citizens attempted as well as they could to imitate courtly manners. During this period the ability to converse sensibly and brilliantly was highly praised.</span></p><figure data-dcnode-id="506"><a data-article-id="274218" data-assembly-id="194267" data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/etiquette/274218/media%3FassemblyId%3D194267"><div class="video-thumb-container" data-dcnode-id="512"><img alt="domestic service: etiquette" class="lazy" data-dcnode-id="515" data-generated-alt="true" data-original="https://cdn.britannica.com/59/179759-049-9D5FA651.jpg" height="123" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsQAAA7EAZUrDhsAAAANSURBVBhXYzh8+PB/AAffA0nNPuCLAAAAAElFTkSuQmCC" title="domestic service: etiquette" width="220"><span class="fontello-icon-play" data-dcnode-id="514"></span><span class="video-duration large" data-dcnode-id="513" id="video-duration-194267"></span></div><span class="visuallyhidden" data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Contunico © ZDF Enterprises GmbH, Mainz</span></span></a><figcaption data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Contunico © ZDF Enterprises GmbH, Mainz</span></figcaption></figure><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">


In England during the 17th and 18th centuries, courtly manners fell out of favor somewhat. Besides being merely polite, English gentlemen were expected to be modest, pious, and compassionate and to devote more time to their country homes than to life at court. New in this period was the advice that gentlemen should never be idle and that they should do some kind of work for a living.</span></p><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">One famous English etiquette manual, however, still advocated the more elaborate courtly manners of France over those of the English country gentleman. The letters of Philip Dormer Stanhope, the 4th earl of Chesterfield, to his son Philip Stanhope, were published in 1774. Lord Chesterfield indicated repeatedly that polite behavior could help win favors from influential people. Although many readers were critical of this selfish attitude, the work was popular, and by 1800 it had gone through 11 editions.</span></p><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">The Industrial Revolution in England caused the middle class to expand rapidly in numbers and importance. Soon they, rather than the aristocracy, began to have the greatest influence on manners. During the Victorian Age, the ideal of every person was respectability. Families were expected to say grace at meals and to hold daily prayer meetings with their servants. Modesty in dress and behavior was demanded. Women had to wear simple clothes, shun cosmetics, and avoid loud and excessive talking. They had to be particularly careful not to read any literature that might be considered immoral. The ideal young lady ate very little, fainted easily and often, and blushed whenever she was looked at.</span></p></section><section class="toc-anchor" data-dcnode-id="441" id="200409-toc"><header data-dcnode-id="494"><h2 data-dcnode-id="495"><span data-dcnode-id="498" instrument_node="">Etiquette Codes in the United States</span><button class="btn btn-default toc-invoker" data-dcnode-id="496" data-original-title="Table of Contents" data-trigger="hover" rel="tooltip" title=""><i class="fontello-icon-list" data-dcnode-id="497"></i></button></h2></header><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">When the English first settled in America, they were met by Indian tribes that had a tradition of generous hospitality. Often the Indians would share their last bit of food with the early colonists.</span></p><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">The Puritan settlers of New England had a rigid standard of conduct. They enacted laws against drinking toasts, bowling, and dancing. They frowned upon many forms of simple recreation because these diverted attention from religious matters. They believed that the frivolous persons who indulged in such recreations might be tempted by the Devil.</span></p><p data-dcnode-id="479"><span data-dcnode-id="489" instrument_node="">The first American etiquette book, the </span><em data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">School of Good Manners</span></em><span data-dcnode-id="486" instrument_node="">, appeared in 1715. Its author was probably Eleazar Moody, a Boston writing master. Many 18th-century schoolmasters taught manners and encouraged their students to copy advice on proper behavior from the books they read. In 1747, at the age of 15, </span><a class="reflink" data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/George-Washington/277657"><span data-dcnode-id="485" instrument_node="">George Washington</span></a><span data-dcnode-id="483" instrument_node=""> put together from his school notes a series of maxims which became the book </span><em data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Rules of Civility and Decent Behaviour in Company and Conversation</span></em><span data-dcnode-id="480" instrument_node="">. Included were “Give not Advice without being Ask’d &amp; when desired do it briefly” and “In visiting the Sick, do not Presently play the physican if you be not Knowing therein.”</span></p><p data-dcnode-id="474"><span data-dcnode-id="478" instrument_node="">By the end of the 18th century, Lord Chesterfield’s </span><em data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Letters</span></em><span data-dcnode-id="475" instrument_node=""> had become popular in the United States. As in England, however, many Americans were disturbed that Lord Chesterfield seemed to separate good manners from good morals. After the Revolutionary War, many patriots wished to break away from English manners as they had done with English rule. But English etiquette manuals continued to be influential until the 19th century.</span></p><p data-dcnode-id="466"><span data-dcnode-id="473" instrument_node="">During the first half of the 19th century, the custom of dueling to defend one’s honor was frequently practiced. The usual reason for a duel was some personally offensive remark. In 1804 </span><a class="reflink" data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/Aaron-Burr/273412"><span data-dcnode-id="472" instrument_node="">Aaron Burr</span></a><span data-dcnode-id="470" instrument_node=""> killed </span><a class="reflink" data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/Alexander-Hamilton/274746"><span data-dcnode-id="469" instrument_node="">Alexander Hamilton</span></a><span data-dcnode-id="467" instrument_node=""> in a duel which was ostensibly fought because Hamilton had called Burr “dangerous.” Before the Civil War many duels were fought over disagreements about the extension of slavery. The etiquette of dueling included rules on how to handle an insult and how to shoot a gun with courtesy. After the Civil War era, dueling was no longer considered necessary, but etiquette books suggested that boxing might be a useful replacement.</span></p><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Victorian manners spread from England to the United States. Particularly strict was the emphasis on modesty. It was considered poor taste for men and women to sit together on the grass. Sometimes men and women would be separated before being allowed to view nude sculptures in an art museum.</span></p><p data-dcnode-id="456"><span data-dcnode-id="463" instrument_node="">After the </span><a class="reflink" data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/American-Civil-War/273689"><span data-dcnode-id="462" instrument_node="">American Civil War</span></a><span data-dcnode-id="460" instrument_node=""> a prosperous industrial middle class arose. Many people who had grown up in unsettled areas needed guides to polite conduct to polish their rough manners. Hundreds of etiquette manuals were written in the United States, and many magazines, such as </span><em data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Godey’s Lady’s Book</span></em><span data-dcnode-id="457" instrument_node="">, included articles on proper behavior. The manuals dealt with such varied topics as conduct at funerals, regular bathing, entertaining, and kitchen management.</span></p><p data-dcnode-id="442"><span data-dcnode-id="455" instrument_node="">Nineteenth-century standards were influential up to </span><a class="reflink" data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/World-War-I/277797"><span data-dcnode-id="454" instrument_node="">World War I</span></a><span data-dcnode-id="452" instrument_node="">. In the postwar era, manners and morals relaxed. Women began to smoke in public. Motion pictures made free behavior seem glamorous. Hoping to recapture some of the elegance characteristic of the Victorian Age, </span><a class="reflink" data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kids.britannica.com/students/article/Emily-Post/333606"><span data-dcnode-id="451" instrument_node="">Emily Post</span></a><span data-dcnode-id="449" instrument_node=""> wrote </span><em data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Etiquette in Society, in Business, in Politics, and at Home</span></em><span data-dcnode-id="446" instrument_node="">, which appeared in 1922. The book was directed to the wealthy and included advice on managing servants and joining exclusive clubs. Subsequent revisions gave more attention to the needs of people with modest incomes. In 1931 the title was changed to </span><em data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Etiquette: The Blue Book of Social Usage</span></em><span data-dcnode-id="443" instrument_node="">. It is still considered a standard guide to good manners.</span></p></section><section class="toc-anchor" data-dcnode-id="431" id="200410-toc"><header data-dcnode-id="436"><h2 data-dcnode-id="437"><span data-dcnode-id="440" instrument_node="">Etiquette Today</span><button class="btn btn-default toc-invoker" data-dcnode-id="438" data-original-title="Table of Contents" data-trigger="hover" rel="tooltip" title=""><i class="fontello-icon-list" data-dcnode-id="439"></i></button></h2></header><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">The rules of etiquette are always alive and changing. They are modified somewhat by each new generation. Young people are usually more interested in knowing what behavior their friends will approve than the kind that has been accepted traditionally.</span></p><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">But even today, when young people are questioning whether there is any right way to behave, the basis of good manners remains unchanged. Consideration for others, understanding, loyalty, and a sense of justice are the qualities that have helped make life pleasant and rewarding in every age.</span></p></section><section class="toc-anchor" data-dcnode-id="280" id="200411-toc"><header data-dcnode-id="426"><h2 data-dcnode-id="427"><span data-dcnode-id="430" instrument_node="">Additional Reading
