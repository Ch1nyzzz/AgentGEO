</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Don't even get me started on the number of times I thought up sleuth-y schemes to break into my bosses office and delete said emails…?. Whether it's because I sounded dumb, forgot something, or wrote something full of typos and emoji's, I've probably made every email mistake in the book!</span></p><span data-dcnode-id="1523" instrument_node="">
</span><h1 data-dcnode-id="1520"><strong data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Do's &amp; Don'ts Of Email Etiquette:</span></strong></h1><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1512"><strong data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">1. Do proofread your email. </span></strong><span data-dcnode-id="1516" instrument_node="">Please for the love of whatever is holy on this earth! Make sure you're words are spelled correctly (</span><em data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">at least mostly:</span></em><span data-dcnode-id="1513" instrument_node="">&nbsp;DAMN YOU AUTOCORRECT!), grammar is on point, and that you included whatever you said you would include (always double-check those attachments!).</span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1504"><strong data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">2. Do be clear,&nbsp;concise, and thorough. </span></strong><span data-dcnode-id="1508" instrument_node="">Nothing drives me crazier when I get a really generic email that is super vague and results in us having to go back and forth multiple times to</span><em data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">&nbsp;get to the damn point!&nbsp;</span></em><span data-dcnode-id="1505" instrument_node="">Whether you are emailing a boss, friends, or trying to pitch someone, please think to yourself “Is this the quickest and clearest way I can get my point across and convey all the relevant and necessary information?” If you can't quickly give me a “HELL YES!” then don't hit send!</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1494"><strong data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">3. Do make sure you have a signature.</span></strong><span data-dcnode-id="1500" instrument_node="">&nbsp;I can't even begin to tell you how much it annoys me when &nbsp;I can't easily stalk you on your social media platforms or find your phone number for a quick question. – Side note: on the flip side of including your number in your signature, please don't be one of those people who asks for a phone number if someone has it in their signature! #SMH – Include your </span><em data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">full name,&nbsp;</span></em><span data-dcnode-id="1497" instrument_node="">website, relevant social media platforms, phone number, etc. I don't want to waste my precious time stalking this information out, I will do it… </span><em data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">but I will be cursing you the time.</span></em></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1483"><strong data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">4. Do use BCC if you're emailing a bunch of people. </span></strong><span data-dcnode-id="1490" instrument_node="">Who here loves getting an email with 50 people CC'ed and getting each one of them replying with “cool!”, “got it!”, “thanks!”? Not sure who? </span><em data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">I'll tell you: IT'S NO ONE.</span></em><span data-dcnode-id="1487" instrument_node=""> No one likes their emails clogged with useless or irrelevant emails. So if you are sending a blast out to everyone and they only need to respond to </span><em data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">you</span></em><span data-dcnode-id="1484" instrument_node="">&nbsp;then please us BCC and leave me and my inbox out of everybody's replies.</span></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1472"><strong data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">5.&nbsp;Do reply with a courteous “received” or “got it”. </span></strong><span data-dcnode-id="1479" instrument_node="">Just to double back to #4 where I talk about people responding “cool”, “got it”, or “thanks”…. I actually LOVE receiving these emails </span><em data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">if I am the one sending the email.&nbsp;</span></em><span data-dcnode-id="1476" instrument_node="">In point #4, I hate it when I get those and I'm CC'ed. But people have a lot of issues with email being marked as spam, so </span><em data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">please let me know you received my email</span></em><span data-dcnode-id="1473" instrument_node="">! Even if you aren't responding in full at the time, just say “Great, thanks!” and I won't keep pestering you.</span></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1470" instrument_node="">*Side note: to deal with all those pesky people not confirming receipt, I've started using </span><a data-dcnode-id="1468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mailtrack.io/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1469" instrument_node="">Mailtrack</span></a></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1459"><strong data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">6.Don't send stupid chain emails. </span></strong><span data-dcnode-id="1463" instrument_node="">This isn't AOL in the 90s or early 00's. Read the previous statement in #4: </span><em data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Don't clog people's emails with useless or irrelevant crap.</span></em><span data-dcnode-id="1460" instrument_node=""> I don't care that your first-born will be taken by the cursed angel demon Damian if you don't send this to five friends, because guess what, if you send me that, we aren't really friends so you already F*'ed yourself!</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1451"><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">7. Do check your emotions.</span></strong><span data-dcnode-id="1455" instrument_node=""> This is one of the toughest for me. I get really passionate when I write sometimes, and will actually have entire written arguments… </span><em data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">who's with me?</span></em><span data-dcnode-id="1452" instrument_node="">&nbsp;I need to pause, take a breath, and check my emotions before sending most emails. When I was in the corporate world especially. I would even send them to my fiancée (screen shotted or copy and pasted into a text, never via company email!) to read it before sending. I wanted to make sure I came off as diplomatic, professional, and polished as possible. The practice of proofreading one another's emails has actually been really insightful in understanding perception. It's taught us both about how people read tones and how to even clean up the email to be clearer and more concise (See #2). Maybe enlist an email buddy or two? Just remember…</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1449" instrument_node="">[RELATED] </span><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theconfusedmillennial.com/3-harmful-communication-tactics-to-drop-today/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1448" instrument_node="">Harmful Communication Tactics To Drop Today</span></a></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1438"><strong data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">8. Don't send stuff you don't want seen or read via company email! </span></strong><span data-dcnode-id="1442" instrument_node="">They own that ish! Seriously, your company is probably not reading every email you send, but for safety sake, get into the mindset that they have an elf in the basement reading every email waiting to tattle to master if you mess up (</span><em data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Yeah, I really just used Harry Potter to make a point about email etiquette… #WINNING!</span></em><span data-dcnode-id="1439" instrument_node="">)</span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1433"><strong data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">9. Do use an accurate subject line. </span></strong><span data-dcnode-id="1434" instrument_node="">If you are pitching someone, make it intriguing so they want to open it. If you're working with someone make sure it's specific to the conversation. It should be memorable, as in “what keywords would I search if I was trying to find this email?”</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Examples:</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1427" style="margin-left: 80px;"><span data-dcnode-id="1428" instrument_node="">Good subject line: “NYU Graduate, published author seeking content writer position”</span></p><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1424" style="margin-left: 80px;"><span data-dcnode-id="1425" instrument_node="">Bad subject line: “Content writer position” (Where's the intrigue? Why should I open this compared to all the others? How can I easily search this compared to all the others?)</span></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1421" style="margin-left: 80px;"><span data-dcnode-id="1422" instrument_node="">Good subject line: “Summary notes from 6/15 Summit discussion”</span></p><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1418" style="margin-left: 80px;"><span data-dcnode-id="1419" instrument_node="">Bad subject line: “Notes”</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1413"><strong data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">10. Do set up a vacation auto-responder.</span></strong><span data-dcnode-id="1414" instrument_node=""> If you are going away for more than two days, please use a vacation notification. Let me know that you won't be responding to my emails, rather than me wondering if they are in spam or you're ignoring me.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1408"><strong data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Bonus: 11. Do set up an adult email.</span></strong><span data-dcnode-id="1409" instrument_node=""> Alright, this should be obvious, but kittykatgal679@aol.com is probably not a good representation. It's time to use your name as your email.</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1404" style="text-align: center;"><strong data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">What are your email pet peeves or email tips? Let me know in the comments!</span></strong></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1402" instrument_node="">[RELATED] </span><a data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theconfusedmillennial.com/entering-workforce/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1401" instrument_node="">8 Things I Wish I Knew Before Entering The Workforce After College</span></a></p><span data-dcnode-id="1398" instrument_node="">
</span><hr data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">
</span><h1 data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Do's &amp; Don'ts of Email Etiquette:</span></h1><span data-dcnode-id="1393" instrument_node="">
</span><h3 data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">1. Do proofread your email.</span></h3><span data-dcnode-id="1390" instrument_node="">
</span><h3 data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">2. Do be clear,&nbsp;concise, and thorough.</span></h3><span data-dcnode-id="1387" instrument_node="">
</span><h3 data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">3. Do make sure you have a signature.</span></h3><span data-dcnode-id="1384" instrument_node="">
</span><h3 data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">4. Do use BCC if you're emailing a bunch of people.</span></h3><span data-dcnode-id="1381" instrument_node="">
</span><h3 data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">5.&nbsp;Do reply with a courteous “received” or “got it”.</span></h3><span data-dcnode-id="1378" instrument_node="">
</span><h3 data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">6.Don't send stupid chain emails.</span></h3><span data-dcnode-id="1375" instrument_node="">
</span><h3 data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">7. Do check your emotions.</span></h3><span data-dcnode-id="1372" instrument_node="">
</span><h3 data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">8. Don't send stuff you don't want seen or read via company email!</span></h3><span data-dcnode-id="1369" instrument_node="">
</span><h3 data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">9. Do use an accurate subject line.</span></h3><span data-dcnode-id="1366" instrument_node="">
</span><h3 data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">10. Do set up a vacation auto-responder.</span></h3><span data-dcnode-id="1363" instrument_node="">
</span><h3 data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">11. Do set up an adult email.</span></h3><span data-dcnode-id="1360" instrument_node="">
</span><hr data-dcnode-id="1359"><span data-dcnode-id="1358" instrument_node="">
</span><h3 class="text-align-center" data-dcnode-id="1356" style="text-align: center;"><span data-dcnode-id="1357" instrument_node="">Now that you've nailed email etiquette, grab the guide to crafting your perfect 30-second elevator pitch!</span></h3><span data-dcnode-id="1355" instrument_node="">
