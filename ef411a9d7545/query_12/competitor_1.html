</span><div class="entry-content clear" data-dcnode-id="722" itemprop="text"><span data-dcnode-id="3172" instrument_node="">
</span><p data-dcnode-id="3167"><span data-dcnode-id="3171" instrument_node="">Aggression is a </span><a data-dcnode-id="3169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/communication-styles/"><span data-dcnode-id="3170" instrument_node="">communication style</span></a><span data-dcnode-id="3168" instrument_node=""> characterized by high dominance and little regard for other people’s well-being.</span></p><span data-dcnode-id="3166" instrument_node="">
</span><p data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">It is one of the four communication styles, and this chart summarizes the aggressive style compared with the other 3 styles:</span></p><span data-dcnode-id="3163" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="3154"><img alt="" class="wp-image-44208 entered error" data-dcnode-id="3162" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://thepowermoves.com/wp-content/uploads/aggressive-style-1024x1013.png" data-lazy-srcset="https://thepowermoves.com/wp-content/uploads/aggressive-style-1024x1013.png 1024w, https://thepowermoves.com/wp-content/uploads/aggressive-style-300x297.png 300w, https://thepowermoves.com/wp-content/uploads/aggressive-style-350x346.png 350w, https://thepowermoves.com/wp-content/uploads/aggressive-style-768x760.png 768w, https://thepowermoves.com/wp-content/uploads/aggressive-style-60x60.png 60w, https://thepowermoves.com/wp-content/uploads/aggressive-style.png 1304w" data-ll-status="error" height="1013" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/wp-content/uploads/aggressive-style-1024x1013.png&amp;raw" srcset="https://thepowermoves.com/wp-content/uploads/aggressive-style-1024x1013.png 1024w, https://thepowermoves.com/wp-content/uploads/aggressive-style-300x297.png 300w, https://thepowermoves.com/wp-content/uploads/aggressive-style-350x346.png 350w, https://thepowermoves.com/wp-content/uploads/aggressive-style-768x760.png 768w, https://thepowermoves.com/wp-content/uploads/aggressive-style-60x60.png 60w, https://thepowermoves.com/wp-content/uploads/aggressive-style.png 1304w" width="1024"><noscript data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">&lt;img width="1024" height="1013" src="https://thepowermoves.com/wp-content/uploads/aggressive-style-1024x1013.png" alt="" class="wp-image-44208" srcset="https://thepowermoves.com/wp-content/uploads/aggressive-style-1024x1013.png 1024w, https://thepowermoves.com/wp-content/uploads/aggressive-style-300x297.png 300w, https://thepowermoves.com/wp-content/uploads/aggressive-style-350x346.png 350w, https://thepowermoves.com/wp-content/uploads/aggressive-style-768x760.png 768w, https://thepowermoves.com/wp-content/uploads/aggressive-style-60x60.png 60w, https://thepowermoves.com/wp-content/uploads/aggressive-style.png 1304w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="3155"><span data-dcnode-id="3159" instrument_node="">Based on Randy Paterson work (</span><a data-dcnode-id="3157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/the-assertiveness-workbook/"><span data-dcnode-id="3158" instrument_node="">Paterson, 2000</span></a><span data-dcnode-id="3156" instrument_node="">)</span></figcaption></figure><span data-dcnode-id="3153" instrument_node="">
</span><p data-dcnode-id="3145"><span data-dcnode-id="3152" instrument_node="">Most resources on </span><a data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/best-social-skills-books/"><span data-dcnode-id="3151" instrument_node="">social skills</span></a><span data-dcnode-id="3149" instrument_node="">, </span><a data-dcnode-id="3147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/best-communication-skills-books/"><span data-dcnode-id="3148" instrument_node="">communication</span></a><span data-dcnode-id="3146" instrument_node="">, and communication styles recommend people to avoid aggression.</span></p><span data-dcnode-id="3144" instrument_node="">
</span><p data-dcnode-id="3137"><span data-dcnode-id="3143" instrument_node="">The Power Moves is a bit different though.</span><br data-dcnode-id="3142"><span data-dcnode-id="3141" instrument_node="">And before advising anyone not to do something, we like to stress why some people actually </span><em data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">do</span></em><span data-dcnode-id="3138" instrument_node=""> that something that most people tell you not to do.</span></p><span data-dcnode-id="3136" instrument_node="">
</span><p data-dcnode-id="3127"><span data-dcnode-id="3135" instrument_node="">After all, if a behavior evolved in the first place, there probably is a reason why.</span><br data-dcnode-id="3134"><span data-dcnode-id="3133" instrument_node="">And there is no reason why aggression should be any different.</span><br data-dcnode-id="3132"><span data-dcnode-id="3131" instrument_node="">Such as, a</span><span data-dcnode-id="3129" style="text-decoration: underline;"><span data-dcnode-id="3130" instrument_node="">ggression probably evolved because it served the aggressor’s interest</span></span><span data-dcnode-id="3128" instrument_node="">, at least some of the times.</span></p><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">So let’s review the use cases of aggression.</span></p><span data-dcnode-id="3123" instrument_node="">
</span><div class="no_bullets" data-dcnode-id="3101" id="toc_container"><p class="toc_title" data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Contents</span></p><ul class="toc_list" data-dcnode-id="3102"><li data-dcnode-id="3118"><a data-dcnode-id="3119" href="#The_Use_Cases_of_Aggression"><span data-dcnode-id="3120" instrument_node="">The Use Cases of Aggression</span></a></li><li data-dcnode-id="3115"><a data-dcnode-id="3116" href="#Why_Constant_Aggression_Ultimately_Backfires"><span data-dcnode-id="3117" instrument_node="">Why Constant Aggression Ultimately Backfires</span></a></li><li data-dcnode-id="3112"><a data-dcnode-id="3113" href="#Troubleshooting_the_causes_of_over-aggression"><span data-dcnode-id="3114" instrument_node="">Troubleshooting the causes of over-aggression</span></a></li><li data-dcnode-id="3109"><a data-dcnode-id="3110" href="#Aggression_VS_Power"><span data-dcnode-id="3111" instrument_node="">Aggression VS Power</span></a></li><li data-dcnode-id="3106"><a data-dcnode-id="3107" href="#Moving_Past_Aggression"><span data-dcnode-id="3108" instrument_node="">Moving Past Aggression</span></a></li><li data-dcnode-id="3103"><a data-dcnode-id="3104" href="#SUMMARY"><span data-dcnode-id="3105" instrument_node="">SUMMARY</span></a></li></ul></div><span data-dcnode-id="3100" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="3097"><span data-dcnode-id="3098" id="The_Use_Cases_of_Aggression"><span data-dcnode-id="3099" instrument_node="">The Use Cases of Aggression</span></span></h2><span data-dcnode-id="3096" instrument_node="">
</span><p data-dcnode-id="3094"><span data-dcnode-id="3095" instrument_node="">Aggression can be helpful to:</span></p><span data-dcnode-id="3093" instrument_node="">
</span><h3 data-dcnode-id="3090"><strong data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">1. Deal with other people’s aggression</span></strong></h3><span data-dcnode-id="3089" instrument_node="">
</span><p data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">if you remain assertive in front of an onslaught of aggression, assertiveness is obviously not working.</span></p><span data-dcnode-id="3086" instrument_node="">
</span><p data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">Furthermore, you can seem powerless.</span></p><span data-dcnode-id="3083" instrument_node="">
</span><p data-dcnode-id="3078"><span data-dcnode-id="3082" instrument_node="">In that case, meeting aggression with aggression can help stop the aggression with the “pacing and leading technique”: first you meet at their level (pacing), showing you can play the same game, and then </span><em data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">you</span></em><span data-dcnode-id="3079" instrument_node=""> bring them down (leading).</span></p><span data-dcnode-id="3077" instrument_node="">
</span><h4 data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Example:</span></h4><span data-dcnode-id="3074" instrument_node="">
</span><p data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Imagine your girlfriend yells at you for 10 minutes straight at home in spite of you assertively telling her she’s being rude and out of line.</span></p><span data-dcnode-id="3071" instrument_node="">
</span><p data-dcnode-id="3067"><span data-dcnode-id="3070" instrument_node="">Well… Assertiveness is clearly not working, then. </span><br data-dcnode-id="3069"><span data-dcnode-id="3068" instrument_node="">And if you want to put a stop to it, matching aggression with aggression might prove a far better alternative.</span></p><span data-dcnode-id="3066" instrument_node="">
</span><p data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">The only moment when Robin Williams seems to have a shred of dignity in the Mrs. Doubtfire divorce scene is when he raises his level of aggression to match hers:</span></p><span data-dcnode-id="3063" instrument_node="">

</span></div></figure><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2528"><span data-dcnode-id="2534" instrument_node="">Notice that it’s not about showing aggression </span><em data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">per se</span></em><span data-dcnode-id="2531" instrument_node="">.</span><br data-dcnode-id="2530"><span data-dcnode-id="2529" instrument_node="">It’s that by matching your attacker’s level of aggression, you communicate that you are not a submissive punching bag who’s incapable of defending and drawing boundaries.</span></p><span data-dcnode-id="2527" instrument_node="">
</span><h3 data-dcnode-id="2524"><strong data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">2. Instill fear</span></strong></h3><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">Assertiveness gives you respect, but not so much fear.</span></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Aggression can make people fear you.</span></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Attention though: fear is not necessarily high-power and, much less so, high-quality.</span></p><span data-dcnode-id="2514" instrument_node="">
</span><p data-dcnode-id="2510"><span data-dcnode-id="2513" instrument_node="">Crazy individuals and homeless people often stir up fears in others.</span><br data-dcnode-id="2512"><span data-dcnode-id="2511" instrument_node="">But that fear only serves to keep them isolated and… At the bottom of society.</span></p><span data-dcnode-id="2509" instrument_node="">
</span><p data-dcnode-id="2503"><span data-dcnode-id="2508" instrument_node="">As we will see, this is a technique that some people use in the workplace.</span><br data-dcnode-id="2507"><span data-dcnode-id="2506" instrument_node="">They are always rude and aggressive in order to acquire some scrap of independence and to be left alone.</span><br data-dcnode-id="2505"><span data-dcnode-id="2504" instrument_node="">But they are also often left alone at the bottom of the hierarchy. You don’t want to be one of them.</span></p><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">As Randy Paterson says:</span></p><span data-dcnode-id="2499" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2495"><p data-dcnode-id="2496"><span class="has-inline-color" data-dcnode-id="2497" style="color:#0001a3"><span data-dcnode-id="2498" instrument_node="">(People) may make fewer demands, though they will also make fewer pleasant invitations, and if you were more assertive, you could deal with their unpleasant demands confidently</span></span></p></blockquote><span data-dcnode-id="2494" instrument_node="">
</span><h3 data-dcnode-id="2491"><strong data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">3. Weapon of last resort</span></strong></h3><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">If you tried everything and failed, and still want to give it a last shot, going from assertive to aggressive might help you reach your goal in some cases.</span></p><span data-dcnode-id="2487" instrument_node="">
</span><p data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Even if you still fail, at least you can say “I tried them all”.</span></p><span data-dcnode-id="2484" instrument_node="">
</span><h3 data-dcnode-id="2477"><span data-dcnode-id="2483" instrument_node="">4. </span><strong data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Win arguments by</span></strong><span data-dcnode-id="2480" instrument_node=""> </span><strong data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">steamrolling (“argument ad potentiam”)</span></strong></h3><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Dominance can be used strategically to push people into the submissive end of the spectrum, or in defense mode.</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2468"><span data-dcnode-id="2472" instrument_node="">When people start defending and submitting, they can look guilty </span><em data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">by behavior</span></em><span data-dcnode-id="2469" instrument_node="">, rather than by logic and facts.</span></p><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Example:</span></p><span data-dcnode-id="2464" instrument_node="">
</span><p data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">Trump likely won the presidency thanks to this technique.</span></p><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">The 2017 presidential debates present many examples in which Hillary should have been more aggressive in dealing with Trump:</span></p><span data-dcnode-id="2458" instrument_node="">

ure" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></div><span data-dcnode-id="1935" instrument_node="">

</span><p data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Trump’s aggression allowed him to curtail Hillary’s speaking time. She didn’t even have enough air time to make her points. And from a political point of view, it looked like Trump was the embodiment of the angry citizen grilling an ineffective, crooked politician. Hillary’s justification confirmed that impression.</span></p><span data-dcnode-id="1929" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1928" instrument_node="">But also please note that over-aggression was, in the end, also one of Trump’s main reason for his downfall.</span><br data-dcnode-id="1927"><span data-dcnode-id="1926" instrument_node="">Had he been more socially astute, he would have mellowed once at the top.</span></p><span data-dcnode-id="1924" instrument_node="">
</span><ul data-dcnode-id="1918"><li data-dcnode-id="1919"><strong data-dcnode-id="1921"><a data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/forum/topic/trumps-loss-what-it-says-about-power-strategies/"><span data-dcnode-id="1923" instrument_node="">Read this forum entry for more</span></a></strong><span data-dcnode-id="1920" instrument_node="">.</span></li></ul><span data-dcnode-id="1917" instrument_node="">
</span><h3 data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">5. In bursts, to show dominance, control the frame, without breaking rapport</span></h3><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">I call this dominance technique “aggressive push-pull”.</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1910" instrument_node="">It’s often used by the “self-amusing” </span><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/the-7-archetypes-of-dominance/"><span data-dcnode-id="1909" instrument_node="">dominance style</span></a><span data-dcnode-id="1907" instrument_node="">, and it deploys the (more or less) covert-aggression technique of push-pull.</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1904" instrument_node="">It consists of bursts of aggression followed by more assertive or even kinder behavior.</span><br data-dcnode-id="1903"><span data-dcnode-id="1902" instrument_node="">It serves to assert dominance without totally breaking rapport -or ven by </span><em data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">increasing </span></em><span data-dcnode-id="1899" instrument_node="">rapport, in some cases-.</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1896" instrument_node="">Experienced or </span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/dirty-negotiation-tactics/"><span data-dcnode-id="1895" instrument_node="">manipulative negotiators</span></a><span data-dcnode-id="1893" instrument_node=""> can use bursts of aggression to subtly dominate their opponents. when the opponents feel dominated, they will be less likely to negotiate hard and field their demands.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">More on it later.</span></p><span data-dcnode-id="1888" instrument_node="">
</span><h3 data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">6. To more quickly regain power and respect with an aggressive display of force</span></h3><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">If people long treated you like a low-value individual it might take quite some time of assertive behavior to regain their respect.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">In those cases, a stronger display of power through aggression can rebalance the situation quicker.</span></p><span data-dcnode-id="1879" instrument_node="">

</span><p data-dcnode-id="1345"><strong data-dcnode-id="1347"><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/forum/topic/on-violence-respect-and-civility-an-interesting-movie-scene/"><span data-dcnode-id="1349" instrument_node="">And read the full forum entry</span></a></strong><span data-dcnode-id="1346" instrument_node="">.</span></p><span data-dcnode-id="1344" instrument_node="">
</span><h3 data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">7. As a shortcut for status</span></h3><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Somewhat similar to the above.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Aggression can be helpful in acquiring status, and it can also be used as a shortcut if it’s used successfully against someone with very high status.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1334" instrument_node="">There is some evidence for this in unstructured environments like in high school (</span><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/254965040_Aggression_Exclusivity_and_Status_Attainment_in_Interpersonal_Networks" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1333" instrument_node="">Faris, 2012</span></a><span data-dcnode-id="1331" instrument_node="">).</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1328" instrument_node="">But high school is not a typical environment, and I haven’t seen any experiment confirming these findings outside of it.</span><br data-dcnode-id="1327"><span data-dcnode-id="1326" instrument_node="">I consider aggression as a tool for status more in specific and limited environments, such as:</span></p><span data-dcnode-id="1324" instrument_node="">
</span><ol data-dcnode-id="1319"><li data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Prisons</span></li><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Gangs</span></li></ol><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1317" instrument_node="">Even there though, aggression should be limited and targeted. </span><br data-dcnode-id="1316"><span data-dcnode-id="1315" instrument_node="">Constant aggression makes you a loose cannon with little support, and friends and allies matter a lot in those environments.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><h3 data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">8. In sport, channeled aggression</span></h3><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">In some sports, a lot of aggression can help make up for talent.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">This guy is an example:</span></p><span data-dcnode-id="1304" instrument_node="">
</span><div class="wp-block-image is-style-default" data-dcnode-id="1299"><figure class="aligncenter" data-dcnode-id="1300"><img alt="" class="wp-image-44048" data-dcnode-id="1303" data-lazy-sizes="(max-width: 512px) 100vw, 512px" data-lazy-src="https://thepowermoves.com/wp-content/uploads/ringhio-gattuso.jpg" data-lazy-srcset="https://thepowermoves.com/wp-content/uploads/ringhio-gattuso.jpg 512w, https://thepowermoves.com/wp-content/uploads/ringhio-gattuso-300x221.jpg 300w, https://thepowermoves.com/wp-content/uploads/ringhio-gattuso-350x258.jpg 350w" height="378" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20378'%3E%3C/svg%3E" width="512"><noscript data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">&lt;img width="512" height="378" src="https://thepowermoves.com/wp-content/uploads/ringhio-gattuso.jpg" alt="" class="wp-image-44048" srcset="https://thepowermoves.com/wp-content/uploads/ringhio-gattuso.jpg 512w, https://thepowermoves.com/wp-content/uploads/ringhio-gattuso-300x221.jpg 300w, https://thepowermoves.com/wp-content/uploads/ringhio-gattuso-350x258.jpg 350w" sizes="(max-width: 512px) 100vw, 512px" /&gt;</span></noscript></figure></div><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1297" instrument_node="">His surname is “Gattuso” and his nickname was “ringhio Gattuso”, meaning “roar Gattuso”.</span><br data-dcnode-id="1296"><span data-dcnode-id="1295" instrument_node="">He was not the most skilled to use a euphemism, and he wasn’t even big.</span><br data-dcnode-id="1294"><span data-dcnode-id="1293" instrument_node="">But he was very aggressive on the pitch, driven to win beyond what’s normal.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">He was one of my favorite because he was able to make up for skills, talent, and even for physical size -he was small for the sport-, and still made it to the top (and won a world cup).</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1287" instrument_node="">True legend of an underdog!</span><br data-dcnode-id="1286"><span data-dcnode-id="1285" instrument_node="">He would have never gotten there without the fire within him.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1282" instrument_node="">Even here though, we must add a caveat: the aggression that makes you great at sports is not violent aggression.</span><br data-dcnode-id="1281"><span data-dcnode-id="1280" instrument_node="">That gets you kicked out pretty soon and leaves your team one man down.</span><br data-dcnode-id="1279"><span data-dcnode-id="1278" instrument_node="">It’s more of a constant, controlled anger simmering beneath the surface, channeled into doing anything possible to win,</span></p><span data-dcnode-id="1276" instrument_node="">
</span><h3 data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">9. As provider of personal good feelings</span></h3><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1272" instrument_node="">Aggression can make you feel strong.</span><br data-dcnode-id="1271"><span data-dcnode-id="1270" instrument_node="">And it can make you feel good for exacting revenge on someone who slighted you in the past.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1267" instrument_node="">I personally see some value in revenge, as long as it’s proportionate and as long as it does not poison you.</span><br data-dcnode-id="1266"><span data-dcnode-id="1265" instrument_node="">See here a good </span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/forum/topic/mindset-how-to-deal-with-haters/%23postid-3111" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1264" instrument_node="">real-life example</span></a><span data-dcnode-id="1262" instrument_node="">.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1259" instrument_node="">But if you are being aggressive because it makes you feel strong, then you probably need to change mindsets because that type of aggression is likely making you </span><em data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">feel</span></em><span data-dcnode-id="1256" instrument_node=""> powerful, but truly </span><em data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">disempowering</span></em><span data-dcnode-id="1253" instrument_node=""> you in real life.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">See “Ultimate Power” for better mindsets and values.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><h3 data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Does aggression prevent challenges to absolute power? Not so sure…</span></h3><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1244" instrument_node="">There is one last </span><em data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">possible</span></em><span data-dcnode-id="1241" instrument_node=""> benefit.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Some authors say that keeping people in fear can prevent challenges and murder attempts on a powerful man -say, for example, a dictator-.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">I am not convinced about it.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1232" instrument_node="">I think there are two forces at play: on the one hand, the fear of death or torture can stop some challengers.</span><br data-dcnode-id="1231"><span data-dcnode-id="1230" instrument_node="">But aggression and fear also create a more ripe environment for wanting to </span><em data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">get rid</span></em><span data-dcnode-id="1227" instrument_node=""> of that fear, and wanting to get rid of the SOB.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1224" instrument_node="">The challengers will also want to make sure that their aggression will leave the dictator dead or totally powerless, and they will be very careful in covering their tracks before they’re ready to hit.</span><br data-dcnode-id="1223"><span data-dcnode-id="1222" instrument_node="">So the dictator gets no sign of impending danger until his premature death.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">There is ultimately no proof that fear has ever prolonged -or shortened- anyone’s reign. And I am personally doubtful about whether the advantages outweigh the disadvantages.</span></p><span data-dcnode-id="1217" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="1214"><span data-dcnode-id="1215" id="Why_Constant_Aggression_Ultimately_Backfires"><span data-dcnode-id="1216" instrument_node="">Why Constant Aggression Ultimately Backfires</span></span></h2><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">There can be times and places for aggression.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1209" instrument_node="">But don’t confuse aggression with power.</span><br data-dcnode-id="1208"><span data-dcnode-id="1207" instrument_node="">If there is one thing the vast majority of the authors agree on, is that aggression ultimately reduces power in the long run.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">As a rule of thumb, and this is especially true for most people in our modern world, constant aggression erodes power.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1201" instrument_node="">Why is aggression ultimately counterproductive?</span><br data-dcnode-id="1200"><span data-dcnode-id="1199" instrument_node="">This is why:</span></p><span data-dcnode-id="1197" instrument_node="">
</span><h3 data-dcnode-id="1193"><strong data-dcnode-id="1194"><span class="has-inline-color" data-dcnode-id="1195" style="color:#a30003"><span data-dcnode-id="1196" instrument_node="">1. Aggression Breeds Aggression, Leading to Lots of Wars</span></span></strong></h3><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">There is a tendency for our attitudes to shape and create our own realities.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1188" instrument_node="">Says psychologist </span><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/whos-pulling-your-strings/"><span data-dcnode-id="1187" instrument_node="">Harriet Braiker</span></a><span data-dcnode-id="1185" instrument_node="">:</span></p><span data-dcnode-id="1183" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1176"><p data-dcnode-id="1177"><span class="has-inline-color" data-dcnode-id="1178" style="color:#09008d"><span data-dcnode-id="1182" instrument_node="">People with hostile, aggressive personalities expect others to be hostile. Consequently, they treat other people aggressively. </span><strong data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">When people are treated aggressively, they tend to exhibit hostility in return</span></strong><span data-dcnode-id="1179" instrument_node="">. Thus, since hostility breeds hostility, an aggressive person often evokes hostility from others.</span></span></p></blockquote><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1174" instrument_node="">Living in a world of constant aggression is handicapping in a multitude of ways, including of course from a </span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/the-fundamental-strategies-of-power/"><span data-dcnode-id="1173" instrument_node="">power-strategic</span></a><span data-dcnode-id="1171" instrument_node=""> point of view.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Constant aggression can also lead to poorer health and a general lower pleasure of life.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1165" instrument_node="">That my constantly aggressive former neighbor got a stroke early in life might have been pure coincidence. </span><br data-dcnode-id="1164"><span data-dcnode-id="1163" instrument_node="">But it was not a coincidence that his perennial scowl on short term made his life less pleasurable, including few friends and no good relationships -including with his wife-.</span></p><span data-dcnode-id="1161" instrument_node="">
</span><h3 data-dcnode-id="1157"><strong data-dcnode-id="1158"><span class="has-inline-color" data-dcnode-id="1159" style="color:#a30003"><span data-dcnode-id="1160" instrument_node="">2. Aggression Makes Few (True) Friend &amp; Allies</span></span></strong></h3><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Nobody rules alone.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1152" instrument_node="">Not even dictators (</span><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/the-logic-of-political-survival/"><span data-dcnode-id="1151" instrument_node="">de Mesquita, 2003</span></a><span data-dcnode-id="1149" instrument_node="">).</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">So no matter where you are, you’re better of with a network of friends, allies, and supporters, than without.</span></p><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1143" instrument_node="">One of the major issues with aggressive people is that they don’t make others feel good, so few people want to be around them and support them.</span><br data-dcnode-id="1142"><span data-dcnode-id="1141" instrument_node="">That often leads to a few good relationships, a small support network and, in extreme cases, to isolation.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><h3 data-dcnode-id="1135"><strong data-dcnode-id="1136"><span class="has-inline-color" data-dcnode-id="1137" style="color:#a30003"><span data-dcnode-id="1138" instrument_node="">3. Aggression Makes Lots of Enemies</span></span></strong></h3><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1133" instrument_node="">Hyper-aggressive </span><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/how-to-get-power-quick/"><span data-dcnode-id="1132" instrument_node="">Scarface-types</span></a><span data-dcnode-id="1130" instrument_node=""> </span><em data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">can</span></em><span data-dcnode-id="1127" instrument_node=""> get power quickly.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1124" instrument_node="">But the risk is very high that it will be a localized, limited, “flash in the pan” type of power.</span><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node="">The reality is that lots of enemies mean little power and, in some lines of business, a short life span as well.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><h3 data-dcnode-id="1116"><strong data-dcnode-id="1117"><span class="has-inline-color" data-dcnode-id="1118" style="color:#a30003"><span data-dcnode-id="1119" instrument_node="">4. Overly Aggressive Folks Can’t Establish a Coalition</span></span></strong></h3><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Much power rests in coalitions.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">In politics and workplaces, coalitions help you carry to the top.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">and in your everyday life, your coalition is your support network.</span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">People in your sare those who are there to prop you up in power or to break your fall when you’re crashing down.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1102" instrument_node="">The support network in your everyday life comes from your friends, your neighbors, your family, your colleagues, etc.</span><br data-dcnode-id="1101"><span data-dcnode-id="1100" instrument_node="">But constantly aggressive people have mostly </span><em data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">nominal</span></em><span data-dcnode-id="1097" instrument_node=""> friends. Those are the people who are there exclusively because there is something in it for them.</span><br data-dcnode-id="1096"><span data-dcnode-id="1095" instrument_node="">But they feel no obligation to help when you’re in need.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1092" instrument_node="">More socially skilled people instead tend to develop deeper relationships that also go above and beyond the most calculative side of “</span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/wiift/"><span data-dcnode-id="1091" instrument_node="">WIIFM</span></a><span data-dcnode-id="1089" instrument_node="">“.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1086" instrument_node="">This aspect impacts your life at all levels.</span><br data-dcnode-id="1085"><span data-dcnode-id="1084" instrument_node="">Your support network is the people who listen to you when you’re heart-broken, who lend you some money when you’re broke, who come to the hospital with a bunch a flower, or who make an intro when you need a job.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Aggressive people have little support network, if any.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><h3 data-dcnode-id="1075"><strong data-dcnode-id="1076"><span class="has-inline-color" data-dcnode-id="1077" style="color:#a30003"><span data-dcnode-id="1078" instrument_node="">5. Aggression at the top signals insecurity</span></span></strong></h3><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">There is evidence that insecurity causes aggression.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1070" instrument_node="">In controlled experiments, subjects were more likely to act aggressively when their competence was challenged, and when they felt insecure (</span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/doi/abs/10.1111/j.1467-9280.2009.02452.x"><span data-dcnode-id="1069" instrument_node="">Fast and Chen 2009</span></a><span data-dcnode-id="1067" instrument_node="">).</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1064" instrument_node="">It’s a cliche’ in pop-psychology that aggression stems from insecurity, and it’s not </span><em data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">always</span></em><span data-dcnode-id="1061" instrument_node=""> true.</span><br data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node="">But these experiments show that, at least under certain conditions, it is true: aggression can stem from insecurity when the insecure man is at the top.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">The title of the paper is also very telling: “When the Boss Feels Inadequate: Power, Incompetence, and Aggression”.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">So, whenever you’re in a leadership position, watch out for aggressive behavior it communicates to others -and as importantly to yourself- that you’re either under threat, or incompetent.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="1048"><span data-dcnode-id="1049" id="Troubleshooting_the_causes_of_over-aggression"><span data-dcnode-id="1050" instrument_node="">Troubleshooting the causes of over-aggression</span></span></h2><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">These are the reasons why people tend to behave overly aggressive.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">You can use them to troubleshoot yourself and see if you fit in any of these categories:</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1038"><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">1. Family / Background</span></strong></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1036" instrument_node="">Some grew up in aggressive families and never learned a different approach.</span><br data-dcnode-id="1035"><span data-dcnode-id="1034" instrument_node="">This is especially dangerous for lower-class individuals, since those who are overly aggressive with little qualities to offset that aggression tend to remain stuck in the lower rungs of society.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1029"><strong data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">2. Addiction / Enjoyment of Confrontation</span></strong></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Some people are addicted -or slave to- the dopamine rushes of confrontations, as well as the brain chemical feeling of dominating others.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1022"><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">3. Sense of Control</span></strong></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1020" instrument_node="">Some enjoy -or need- a sense of control, and aggression gives a feeling of control.</span><br data-dcnode-id="1019"><span data-dcnode-id="1018" instrument_node="">Some authors have observed that it’s this sense of control, coupled with immense drive and OCD tendencies, that made Steve Job such a notoriously irascible man.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1013"><strong data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">4. Power Craving</span></strong></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Some people crave power, and they use aggression to always be the one-up in their interactions.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1006"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">5. It Can Work in Some Situations</span></strong></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">And, last but not least, let’s be honest:</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="1001" instrument_node="">I</span><strong data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">n the short run aggression often works.&nbsp;</span></strong></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="996" instrument_node="">Most people are not aggressive and not even assertive.</span><br data-dcnode-id="995"><span data-dcnode-id="994" instrument_node="">Many people end up being too </span><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/passive-style/"><span data-dcnode-id="993" instrument_node="">passive</span></a><span data-dcnode-id="991" instrument_node=""> and too compliant in the face of aggression. That makes the life of the aggressor feel easier when they boss people around.</span></p><span data-dcnode-id="989" instrument_node="">
</span><figure class="wp-block-image size-large is-style-rounded" data-dcnode-id="983"><img alt="" class="wp-image-44209" data-dcnode-id="988" data-lazy-sizes="(max-width: 1024px) 100vw, 1024px" data-lazy-src="https://thepowermoves.com/wp-content/uploads/aggression-benefits-1024x786.jpg" data-lazy-srcset="https://thepowermoves.com/wp-content/uploads/aggression-benefits-1024x786.jpg 1024w, https://thepowermoves.com/wp-content/uploads/aggression-benefits-300x230.jpg 300w, https://thepowermoves.com/wp-content/uploads/aggression-benefits-350x269.jpg 350w, https://thepowermoves.com/wp-content/uploads/aggression-benefits-768x589.jpg 768w, https://thepowermoves.com/wp-content/uploads/aggression-benefits.jpg 1250w" height="786" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201024%20786'%3E%3C/svg%3E" width="1024"><noscript data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">&lt;img width="1024" height="786" src="https://thepowermoves.com/wp-content/uploads/aggression-benefits-1024x786.jpg" alt="" class="wp-image-44209" srcset="https://thepowermoves.com/wp-content/uploads/aggression-benefits-1024x786.jpg 1024w, https://thepowermoves.com/wp-content/uploads/aggression-benefits-300x230.jpg 300w, https://thepowermoves.com/wp-content/uploads/aggression-benefits-350x269.jpg 350w, https://thepowermoves.com/wp-content/uploads/aggression-benefits-768x589.jpg 768w, https://thepowermoves.com/wp-content/uploads/aggression-benefits.jpg 1250w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Aggressive folks (sometimes) win in large part thanks to passive folks</span></figcaption></figure><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="981" instrument_node="">Aggression can also work in the workplace, especially in some types of industries.</span><br data-dcnode-id="980"><span data-dcnode-id="979" instrument_node="">Aggressive individuals who can avoid the ugliest flares up often enjoy quicker ascension of dominance hierarchies.</span></p><span data-dcnode-id="977" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="973"><span data-dcnode-id="974" id="Aggression_VS_Power"><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Aggression VS Power</span></strong></span></h2><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Constant aggression is more closely associated with dominance, than with power.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">We could define power as:</span></p><span data-dcnode-id="966" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="962"><p data-dcnode-id="963"><strong data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Power is the degree to which an individual can get what he wants.</span></strong></p></blockquote><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="960" instrument_node="">It overlaps with dominance, but it’s not the same.</span><br data-dcnode-id="959"><span data-dcnode-id="958" instrument_node="">It’s an important distinction.</span></p><span data-dcnode-id="956" instrument_node="">
</span><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Dominance is measured by strength, and strength or the capability for aggression are only but one element of power.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="952" instrument_node="">You can be powerful without necessarily being aggressive.</span><br data-dcnode-id="951"><span data-dcnode-id="950" instrument_node="">And you can be aggressive, without being powerful (and without getting what you want).</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="947" instrument_node="">Dominance is the degree to which someone can </span><em data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">impose</span></em><span data-dcnode-id="944" instrument_node=""> his will with sheer strength, display of sheer strength, threats, or aggression.</span><br data-dcnode-id="943"><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Dominance becomes coercive when propped by aggression or threats, and can as easily backfire as it can work</span></strong><span data-dcnode-id="940" instrument_node="">. As a rule of thumb, leaders and individuals who rely on dominance and aggression make for poor leaders.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="937" instrument_node="">Power can achieve the same goals without relying (solely) on strength and aggression.</span><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node="">Power can use cunning, charm, charisma, resources, leadership skills, or even </span><em data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">fake</span></em><span data-dcnode-id="932" instrument_node=""> strength.</span></p><span data-dcnode-id="930" instrument_node="">
</span><h3 data-dcnode-id="927"><strong data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">An Example From Our Ape Cousins</span></strong></h3><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Think of it this way:</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="922" instrument_node="">The alpha ape at the top of the hierarchy is strong and socially dominant.</span><br data-dcnode-id="921"><span data-dcnode-id="920" instrument_node="">The beta ape who makes the alpha his friend </span><em data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">and</span></em><span data-dcnode-id="917" instrument_node=""> also builds a web of supporters with which it might overthrow the alpha is putting power on his side.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="914" instrument_node="">This example is actually based on real events in a chimp colony.</span><br data-dcnode-id="913"><span data-dcnode-id="912" instrument_node="">The alpha was more dominant and aggressive than all others. But less strong and aggressive chimps banded together to overthrow the stronger alpha via a web of alliances and one single act of focused aggression (</span><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/the-origins-of-virtue/"><span data-dcnode-id="911" instrument_node="">Ridley, 1997</span></a><span data-dcnode-id="909" instrument_node="">).</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="906" instrument_node="">In ape colonies, strength is most useful when </span><em data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">climbing</span></em><span data-dcnode-id="903" instrument_node=""> the social hierarchies, showing you’re not afraid and “making a name” for yourself. Once on top, leadership skills and social skills become more important.</span><br data-dcnode-id="902"><span data-dcnode-id="901" instrument_node="">Strength helps, but cunning is equally important.</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">That holds even truer in humans, since we are less (openly) violent and developed bigger brainpower for networking and relationships.</span></p><span data-dcnode-id="896" instrument_node="">
</span><h3 data-dcnode-id="890"><strong data-dcnode-id="891"><span data-dcnode-id="895" instrument_node="">Do Develop the </span><em data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Capability</span></em><span data-dcnode-id="892" instrument_node=""> For Aggression…</span></strong></h3><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="888" instrument_node="">Of course, dominance, aggression, and softer versions of power are not pitted against each other.</span><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">As a matter of fact, you’re much better off with </span><em data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">both</span></em><span data-dcnode-id="883" instrument_node=""> soft power and dominance.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">This course will help you increase both dominance, and the social intelligence to wield soft power.</span></p><span data-dcnode-id="878" instrument_node="">
</span><h3 data-dcnode-id="872"><strong data-dcnode-id="873"><span data-dcnode-id="877" instrument_node="">But Be As </span><em data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Un</span></em><span data-dcnode-id="874" instrument_node="">-Aggressive As You Can</span></strong></h3><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Alain Prost, an F-1 racer once said that his goal was to win races going “as slow as possible”.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="867" instrument_node="">You want the same approach for aggression -and, to a lesser degree, dominance in general-.</span><br data-dcnode-id="866"><span data-dcnode-id="865" instrument_node="">Big shows of aggression, either physical, verbal, or intellectual (“smart-alec), are the equivalent of going “as fast as possible”.</span><br data-dcnode-id="864"><span data-dcnode-id="863" instrument_node="">As much going as fast as possible in car racing increases the risks of crashing, being as aggressive as possible also increases the social risks of crashing.</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="860" instrument_node="">And that leads to an important principle: </span><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">for maximum power, use as little aggression as possible, and always prefer buy-in</span></strong><span data-dcnode-id="857" instrument_node="">&nbsp;(see </span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/forum/topic/question-about-as-little-as-possible/"><span data-dcnode-id="856" instrument_node="">forum Q&amp;A for more details</span></a><span data-dcnode-id="854" instrument_node="">).</span><br data-dcnode-id="853"><span data-dcnode-id="852" instrument_node="">That’s how you develop repeated win-win exchanges and how you set up collaborative relationships. And that’s how you make people want to follow you.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="849" instrument_node="">Some exceptions apply, and we will see them along the course.</span><br data-dcnode-id="848"><span data-dcnode-id="847" instrument_node="">But you don’t make the rules with the exceptions. And the general rule is that minimizing coercion and seeking buy-in leads to longer-lasting power, as well as to better relationships.</span></p><span data-dcnode-id="845" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="842"><span data-dcnode-id="843" id="Moving_Past_Aggression"><span data-dcnode-id="844" instrument_node="">Moving Past Aggression</span></span></h2><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Values and beliefs are some of the most important drivers of behavior</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="837" instrument_node="">Once they can change their beliefs though, behavior will follow.</span><br data-dcnode-id="836"><span data-dcnode-id="835" instrument_node="">So now we review common beliefs of aggressive people:</span></p><span data-dcnode-id="833" instrument_node="">
</span><ul data-dcnode-id="825"><li data-dcnode-id="826"><strong data-dcnode-id="830"><span class="has-inline-color" data-dcnode-id="831" style="color:#a30003"><span data-dcnode-id="832" instrument_node="">I’m entitled to be angry</span></span></strong><span data-dcnode-id="829" instrument_node=""> = </span><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">yeah, but anger doesn’t equal aggression, and aggression is not that effective</span></strong></li></ul><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Of course you are entitled to be angry.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">The question is: does that give you the right to treat others rudely? Are you also entitled to treat people like crap?</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Finally, it all comes down to effectiveness.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Most people telling themselves they’re entitled to be angry are actually saying “I’m entitled to get what I want through anger and aggression”.</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="811" instrument_node="">However, as we’ve seen, over the long run expressing anger through aggression will most likely </span><em data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">decrease</span></em><span data-dcnode-id="808" instrument_node=""> your ability of getting what you want.</span></p><span data-dcnode-id="806" instrument_node="">
</span><ul data-dcnode-id="800"><li data-dcnode-id="801"><strong data-dcnode-id="802"><span class="has-inline-color" data-dcnode-id="804" style="color:#a30003"><span data-dcnode-id="805" instrument_node="">If I’m not aggressive nothing will happen</span></span><span data-dcnode-id="803" instrument_node=""> = great excuse for not having control over yourself</span></strong></li></ul><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">Pushing people and intimidating others </span><em data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">can</span></em><span data-dcnode-id="795" instrument_node=""> often help you get things done in the short run.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="792" instrument_node="">Of course, again, it comes at a heavy cost for you in the long run.</span><br data-dcnode-id="791"><span data-dcnode-id="790" instrument_node="">Top performers who build successful organizations and hold onto power rarely are overly aggressive.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="787" instrument_node="">Steve Jobs was probably an exception, and one might even argue if he was successful because of his aggression, or in spite of it.</span><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node="">There is maybe a parallel universe where Job learned to convey his anger with fewer explosions, and he remained at the helm of Apple for 30 years straight, never having been sacked in the first place, and produced 50 more revolutionary hits than he did when he came back later.</span></p><span data-dcnode-id="783" instrument_node="">
</span><ul data-dcnode-id="775"><li data-dcnode-id="776"><strong data-dcnode-id="780"><span class="has-inline-color" data-dcnode-id="781" style="color:#a30003"><span data-dcnode-id="782" instrument_node="">Nice guys finish last</span></span></strong><span data-dcnode-id="779" instrument_node=""> = </span><strong data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">stop comparing yourself to extreme pushovers, it’s a weak cop-out</span></strong></li></ul><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">It’s not about where nice guys finish, because nobody says you must become a “nice guy”, whatever that means.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="770" instrument_node="">The question for aggressive people is where aggressive people finish.</span><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">And it’s rarely at the top, while enjoying an overall good life with successful relationships around them.</span></p><span data-dcnode-id="766" instrument_node="">
</span><ul data-dcnode-id="760"><li data-dcnode-id="761"><strong data-dcnode-id="762"><span class="has-inline-color" data-dcnode-id="764" style="color:#a30003"><span data-dcnode-id="765" instrument_node="">Honesty is the best policy</span></span><span data-dcnode-id="763" instrument_node=""> = yes, but not as an excuse to yell and offend</span></strong></li></ul><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Honesty is great policy indeed.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">But honesty is often used by aggressive people as an excuse to be rude, to offend, to yell, and to demean.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">I remember many years ago the mother of an ex-girlfriend of mine told me that “I was a pussy” because I was removing excessive chili pepper from my dish.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">She often used that style of communication, and her usual defense was that “she was honest”.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="746" instrument_node="">That’s quite weak actually. Honesty is good, aggression and offenses are rude.</span><br data-dcnode-id="745"><span data-dcnode-id="744" instrument_node="">Don’t even try to mix up the two, it’s weak-sauce </span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/manipulation/"><span data-dcnode-id="743" instrument_node="">(self-) manipulation</span></a><span data-dcnode-id="741" instrument_node="">.</span></p><span data-dcnode-id="739" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="736"><span data-dcnode-id="737" id="SUMMARY"><span data-dcnode-id="738" instrument_node="">SUMMARY</span></span></h2><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Aggression is a communication style high in dominance and directness, with little regard for others’ well-being, and little respect for their personal power and freedom.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Albeit it can be useful to get things done and to push people, it also comes with some important limitations.</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="728" instrument_node="">In this article, we learned when aggression is useful, and how to move past aggression to move to a more empowering communication style: </span><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/assertiveness/"><span data-dcnode-id="727" instrument_node="">assertiveness</span></a><span data-dcnode-id="725" instrument_node="">.</span></p><span data-dcnode-id="723" instrument_node="">
</span></div><span data-dcnode-id="720" instrument_node="">
</span></div><span data-dcnode-id="718" instrument_node="">
</span></article><span data-dcnode-id="715" instrument_node="">

</span><div class="ast-related-post-featured-section ast-no-thumb" data-dcnode-id="705"></div><span data-dcnode-id="704" instrument_node=""> </span><header class="entry-header" data-dcnode-id="684"><span data-dcnode-id="703" instrument_node="">
</span><h3 class="ast-related-post-title entry-title" data-dcnode-id="698"><span data-dcnode-id="702" instrument_node="">
</span><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/leveraging-our-insignificance/" rel="bookmark noopener noreferrer" target="_self"><span data-dcnode-id="701" instrument_node="">You’re Insignificant. The Sooner You Accept It, The More Powerful You Get</span></a><span data-dcnode-id="699" instrument_node="">
</span></h3><span data-dcnode-id="697" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="686"><span data-dcnode-id="696" instrument_node="">By </span><span class="posted-by vcard author" data-dcnode-id="688" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="695" instrument_node=""> </span><a class="url fn n" data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepowermoves.com/author/lucio/" itemprop="url" rel="author" title="View all posts by Lucio Buffalmano"><span data-dcnode-id="694" instrument_node="">

Power Moves Types
There are many types of social power moves:

Aggressive in nature, like Donald Trump's handshakes
Covert and behind your back, like in social climb in absentia
Or neutral, like&nbsp;letting you wait.

Whatever the style, you can hardly go through life without someone being rude to you,&nbsp;pushing you down or trying to take advantage of you.

This is the section details and explains, with practical examples, what the most dominant and aggressive people out there do.
