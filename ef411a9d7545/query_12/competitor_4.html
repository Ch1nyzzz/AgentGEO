</span><rubrik data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Comprehensiveness</span></rubrik><span data-dcnode-id="2265" instrument_node="">
</span><rating data-dcnode-id="2260"><span data-dcnode-id="2264" instrument_node="">
rating:

</span><a class="link" data-dcnode-id="2262" onclick="util.doubleToggle(reviewTag1589,readMore1589)"><span data-dcnode-id="2263" instrument_node="">see less</span></a><span data-dcnode-id="2261" instrument_node="">
</span></rating><span data-dcnode-id="2259" instrument_node="">
</span></p><span data-dcnode-id="2257" instrument_node="">
</span><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">This book offers a comprehensive treatment of key areas of communication studies. It is an appropriate introduction to the discipline, and would be suitable for an introduction to communication theory course, a public speaking course, or a hybrid model. It covers foundations of communication theory (perception, language and meaning, etc.) as well as a chapter each on listening, interpersonal, nonverbal, verbal, small group, leadership, media, and new media. As well, it offers several chapters oriented toward public/presentational speaking, covering the preparation and delivery of oral presentations in a variety of contexts. It does not contain an index or glossary, but given that most students will access it in a format that allows for a text search, this is not necessarily a major issue. It would benefit from a chapter on communication apprehension/anxiety -- this is treated very briefly toward the end of Chapter 1.</span></p><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2246"><span data-dcnode-id="2253" instrument_node="">
</span><rubrik data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="2250" instrument_node="">
</span><rating data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2247" instrument_node="">
</span></p><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">The book is accurate when it comes to objective aspects of communication theory and practice -- in other words, I found almost nothing to be blatantly incorrect, and did not perceive any overt political biases. (The one blatantly incorrect sentence is: "The term transgender includes other labels such as transsexual, transvestite, cross-dresser, and intersex, among others" in Chapter 8). I appreciate that there is a chapter dedicated to communication and culture, prompting students to consider the rest of the book's contents (as well as their own work) through the lens of social constructivism and to think critically about their own biases. Yet, it (like most communication textbooks) is reflective of the dominant western worldview when it comes to concepts like persuasion and reasoning.</span></p><span data-dcnode-id="2242" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2241" instrument_node="">
</span><rubrik data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="2238" instrument_node="">
</span><rating data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="2235" instrument_node="">
</span></p><span data-dcnode-id="2233" instrument_node="">
</span><p data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">
The book is relatively up-to-date, though some political references are already somewhat outdated. For example, the first subsection is entitled, "From Aristotle to Obama: A Brief History of Communication." Updating references like these would be very easy to implement. The book's author offers to supplement the chapter on new media on his personal website, but when I followed the included link the site did not load. This chapter in particular already feels a bit outdated -- in the section on new media and interpersonal relationships there is no mention of Snapchat or Instagram (Twitter and Facebook are referenced), and I suspect that students may already find the book to be out of touch in this regard. Table 8.3, displaying "Developments Related to Sexuality, Identity, and Communication" needs to be updated to include the 2015 ruling in Obergefell v. Hodges and other recent events.
</span></p><span data-dcnode-id="2230" instrument_node="">
</span><p data-dcnode-id="2222"><span data-dcnode-id="2229" instrument_node="">
</span><rubrik data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="2226" instrument_node="">
</span><rating data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2223" instrument_node="">
</span></p><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">The writing is clear and accessible for students who are reading at an appropriate college level. Jargon is explained well. My students enjoy the author's use of the first person in many cases, telling anecdotes in plain language that illustrate and animate the concepts being discussed in a more immediate way.</span></p><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2210"><span data-dcnode-id="2217" instrument_node="">
</span><rubrik data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="2214" instrument_node="">
</span><rating data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2211" instrument_node="">
</span></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">The text maintains consistent vocabulary and structural frameworks. I have not found any internal inconsistencies in the book's language use or explanation of theories/concepts. There are a couple of minor inconsistencies that should not impede student understanding (e.g., references to the "Gay Rights Movement" and also to the "gay and lesbian rights movement").</span></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2198"><span data-dcnode-id="2205" instrument_node="">
</span><rubrik data-dcnode-id="2203"><span data-dcnode-id="2204" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="2202" instrument_node="">
</span><rating data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2199" instrument_node="">
</span></p><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">The book is highly modular. I have adapted it for use in a public speaking course in which my students are reading the chapters related to presentational speaking as well as those on listening and culture. They have read the chapters, and in some cases the sections, out of order with no problem. The book is rarely self-referential, and when it is, the reader does not need to have internalized much of the section being referred to in order to understand the present section.</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2193" instrument_node="">
</span><rubrik data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="2190" instrument_node="">
</span><rating data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2187" instrument_node="">
</span></p><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">The structure flows logically. It can be understood as unfolding in six major sections that make sense sequentially or in modules: foundations (Chapters 1-2), basic components of the communication process (Chapters 3-5), communication in context (Chapters 6-8), presentational/public speaking (Chapters 9-12), communicating in groups/organizations (Chapters 13-14), and media (Chapters 15-16). </span></p><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2174"><span data-dcnode-id="2181" instrument_node="">
</span><rubrik data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">Interface</span></rubrik><span data-dcnode-id="2178" instrument_node="">
</span><rating data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2175" instrument_node="">
</span></p><span data-dcnode-id="2173" instrument_node="">
</span><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">I have not encountered any problems with the book's interface. I have read it online and downloaded the PDF with no such issues.</span></p><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2169" instrument_node="">

</span><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">The text contains no grammatical errors that I am aware of.</span></p><span data-dcnode-id="2158" instrument_node="">

</span><rubrik data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Cultural Relevance</span></rubrik><span data-dcnode-id="2154" instrument_node="">

</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">The book strives for cultural relevance and, for the most part, achieves it. In the photographs, people depicted are overwhelmingly white, which is a strike against it in terms of representing communicators from a variety of racial/ethnic backgrounds. I would like to see updates to the section on sexuality, as the standards for inclusive language in this arena change rapidly and the text does currently utilize terms that many consider to be problematic such as "homosexual" (the text explains that this word "can be appropriate in some instances, but it carries with it a clinical and medicalized tone" -- I would argue that the word is not considered appropriate in any context except an historical one). I would also suggest that the large image of the Confederate flag is not a necessary inclusion in section 8.3 -- as a hate symbol, this could be jarring to many readers, to say the least. Finally, the text does occasionally utilize ableist language (e.g., an example speech topic in Chapter 9 is "My Craziest Adventure").</span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2145"></p><span data-dcnode-id="2144" instrument_node="">
</span><rubrik data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Comments</span></rubrik><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">My students have expressed positive reviews of this text. On the whole, they find it to be relevant, accessible, and straightforward. They especially appreciate the author's use of personal observations and stories from the classroom. I have identified in my comments above a few changes that I think would be useful in bringing the text up-to-date and making it more inclusive, and I think instructors who value inclusivity and recency can easily supplement their syllabi and lessons to fill these gaps. In general I do recommend this text, and I find it superior to comparable books from for-profit textbook companies that I have reviewed.</span></p><span data-dcnode-id="2138" instrument_node="">

</span><a class="link" data-dcnode-id="2084" onclick="util.doubleToggle(reviewTag1777,readMore1777)"><span data-dcnode-id="2085" instrument_node="">see less</span></a><span data-dcnode-id="2083" instrument_node="">

</span><p data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">The text contains 16 chapters that cover all of the basic content typically included in most of the well-known hybrid introductory communication textbooks currently on the market.  Each section/topic area within each of the chapters begin with its own set of objectives that provide students with an overview of the topics to be covered - these could also serve as useful study questions for exams.  In addition to the concepts and theories presented in each chapter, the text includes text boxes that encourage students to apply content to contemporary examples - each box concludes with Discussion Questions that could be assigned as homework or utilized in online course formats for virtual discussions.  Each of the 3-4 sections within each chapter concludes with its own summary (Key Takeaways) and 2-3 suggested activities for students to apply the content during in-class assignments or completed out-of-class.  The format of the text provides sufficient content to cover a 16-week class in either face-to-face or online contexts.</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2068"><span data-dcnode-id="2075" instrument_node="">
</span><rubrik data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="2072" instrument_node="">
</span><rating data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2069" instrument_node="">
</span></p><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">All of the content included in the chapters appears to be accurate.  Information from both a historical perspective and contemporary research is included to provide students with a comprehensive overview of the topic.  At the conclusion of each topic area within each chapter, 8-20 references are provided to allow students to conduct additional research on the topic.  These sources range from scholarly journal articles to contemporary news articles published in the popular press to expose students to a variety of sources on each topic area.</span></p><span data-dcnode-id="2064" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2063" instrument_node="">
</span><rubrik data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="2060" instrument_node="">
</span><rating data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2057" instrument_node="">
</span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">
Descriptions of the concepts and theories are relevant and applicable to the majority of students - regardless of their status (traditional/non-traditional), age, or other demographic distinctions that contribute to class diversity.  Areas that may need periodic updates include the text boxes that are dedicating to providing contemporary examples of topics covered within the chapter.  Overall, the text provides a solid foundation of the core concepts that instructors could easily apply contemporary examples as they tailor the course to meet the specific needs of their own student populations. While the discussion questions are written in a way that appeals to a diverse student population, they may occasionally need to be updated to address contemporary issues.
</span></p><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2051" instrument_node="">
</span><rubrik data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="2048" instrument_node="">
</span><rating data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2045" instrument_node="">
</span></p><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">The clarity of the writing style of the text is one of its strongest selling points.  Concepts are defined/described in layman's terms that most students can easily relate to their own experiences.  Examples that are provided are relatable to the the majority of students. While the key concepts are highlighted in blue font, it would be useful if the text also included a Glossary that students could quickly access by clicking on hyperlinks within the chapters.  A unique feature of the book is that topics covered in later chapters (e.g., Media) include a discussion of how the information is related to topics covered in earlier chapters in the text - hyperlinks are provided within the text to direct students back to the earlier chapters for a review/recall of content.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2039" instrument_node="">
</span><rubrik data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="2036" instrument_node="">
</span><rating data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2033" instrument_node="">
</span></p><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Students will be pleased to find that each chapter is organized and presented in a consistent manner.  Each chapter begins with Learning Objectives, followed by content (with key terms highlighted), and concludes with a contemporary example highlighted in a textbox with discussion questions and a chapter summary.  Topics are presented in a way so that they build on one another - there is a logical progression from one chapter topic to the next.  As mentioned before, chapters that appear later in the text include hyperlinks to direct students back to earlier content - this helps showcase the connections between content areas.</span></p><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2027" instrument_node="">
</span><rubrik data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="2024" instrument_node="">
</span><rating data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2021" instrument_node="">
</span></p><span data-dcnode-id="2019" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">A unique feature of this text is that each chapter is organized into distinct subsections that allow instructors to "select/choose" which topics they want to include in their class.  For schools where students may also be taking a separate public speaking class, there is just enough information in the four (4) chapters on the topic to provide them with the necessary foundation to understand the key elements of speeches.  Instructors can pick and choose the sections within these (and other) chapters to include.  If an instructor wishes to alter the order in which the chapters are included in the course schedule, they can be interchanged or assigned in any order without altering the flow of the text.  </span></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2008"><span data-dcnode-id="2015" instrument_node="">
</span><rubrik data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="2012" instrument_node="">
</span><rating data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="2009" instrument_node="">
</span></p><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">While most introductory human communication texts place the public speaking chapters at the end of the book (to allow instructors to skip over them if students are already required to take a separate public speaking class), this text includes the speech chapters in the middle (Chapter 9-12) before covering topics such as small group communication and media in the last four chapters.  While the chapter/topic order may not strictly adhere to the typical format of most communication textbooks on the market, this is not a "deal-breaker" when adopting this text because chapters can be presented in any format desired without impacting the readability and flow of the text.  </span></p><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="1996"><span data-dcnode-id="2003" instrument_node="">
</span><rubrik data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Interface</span></rubrik><span data-dcnode-id="2000" instrument_node="">

rating:
4
</span></rating><span data-dcnode-id="1997" instrument_node="">
</span></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">All of the charts, hyperlinks to articles included in the reference lists, and the photos appeared to be clear and in working order.  Some of the photos appear to be somewhat dated, but this could be viewed as a positive feature for ensuring the longevity of the book.  It does not require frequent revisions to the photos.  It might be beneficial to include more "SmartArt" that graphically represents/lists/summarizes the core concepts to appeal to visual learners using charts or tables.  </span></p><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1984"><span data-dcnode-id="1991" instrument_node="">

5

</span></p><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">The writing style is clear and concise without excessive examples or confusing details.  It is written in a conversational tone that students can easily relate to as they consider how the concepts apply to their own personal examples. No writing or grammatical errors were discovered during my review.</span></p><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1972"><span data-dcnode-id="1979" instrument_node="">
</span><rubrik data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Cultural Relevance</span></rubrik><span data-dcnode-id="1976" instrument_node="">
</span><rating data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="1973" instrument_node="">
</span></p><span data-dcnode-id="1971" instrument_node="">
</span><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Examples and content covered in the book are respectful of diversity.  I would not consider any of the content to be culturally insensitive or offensive.  Topics that are of a sensitive nature are presented in a fair and objective way to encourage students to think critically about the communication implications (e.g., hate speech, culturally sensitive language choices, ethical decisions associated with communicating with diverse others). The core content provides a foundation that instructors can build upon as they address diversity topics that are directly relevant to their own student populations. While there is diversity represented in the photos included in the text, it could provide a more comprehensive reflection of diversity (cultural, racial, age, economic).  </span></p><span data-dcnode-id="1968" instrument_node="">

</span><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">After reviewing this text, I believe that it does provide an effective index and glossary. The table of contents are easily able to be found at the very beginning of the online textbook. What is especially nice is that you can easily click over back to the table of contents when you are in the middle of the textbook, making it easy to flip around and move from section to section. I found it helpful that at the beginning of each chapter, the textbook provides a "Learning Objectives" section, where one can easily read what the expected learning outcomes are for the chapter. This will make it easy for both the Professor and the students as to what they are expected to get out of each chapter. I also believe that this textbook accurately covers all necessary areas of Comm 100, as I currently teach this class with a physical book copy that covers the same chapters.</span></p><span data-dcnode-id="1904" instrument_node="">

</span><p data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">After reviewing the online textbook, I do believe that the information to be accurate. The text accurately covers all of the same type of content that is also covered in my textbook. I wasn't able to notice nearly any errors at all within the text, which was great. What I do especially appreciate about the accuracy of this text is that at the end of each section within each chapter, it has a "Key Takeaways" section, as well as a section for "Exercises." The Key Takeaways section discusses specific terms for students to remember, and the Exercises section is helpful for Professors, as they can use these exercises to create in-class activities.</span></p><span data-dcnode-id="1892" instrument_node="">

</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">This text is designed for an introduction to communication course, but I am reviewing it as a possible text for an introduction to Interpersonal Communication course. For this purpose the text provides a useful foundation in communication theory in research, covering communication models and various skillsets. For an intro to IP comm course the book, when compared to texts designed for that purpose, lacks research on specific fields of interpersonal communication, such as "Family," "Friends," "Workplace," and "Romantic Relationships." Even without these chapters I would use this book for an IP comm course as the benefits of an open textbook outweigh the missing chapters and I feel I could use supplemental materials to cover that information. 

The text book does not have supplemental materials, an index, or glossary, which might make it more difficult to use for an intro to IP comm course if one is new to the material. However, the text is downloadable in several formats and is thus searchable negating the need for an index or glossary.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1553" instrument_node="">
</span><rubrik data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="1550" instrument_node="">
</span><rating data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="1547" instrument_node="">
</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">The book includes the key information on communication research and theory for an introduction to communications course. Much of this information would overlap with the needs of an Introduction to Interpersonal Communication course, though some specific terms, concepts, and theories may need to be supplemented by the instructor to adapt the text for that purpose.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1541" instrument_node="">
</span><rubrik data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="1538" instrument_node="">
</span><rating data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">
rating:

</span></rating><span data-dcnode-id="1535" instrument_node="">
</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">
This book may not be the most "up to date" but in many senses I don't think it should be as an introduction to the field. Most major perspectives in Comm are covered and an experienced instructor could easily build on the foundation laid out in the book to discuss recent research and developments. In this way, I believe the book presents a solid foundation for communication studies students.
</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1529" instrument_node="">
</span><rubrik data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="1526" instrument_node="">

rating:
4

</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">I think the book it quite accessible. In comparison to the more expensive books it lacks the up to date media and cultural examples that make reading more engaging for many students. Overall, I actually see the lack of these examples a strong suit of the book as it is not easily dated.</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1517" instrument_node="">
</span><rubrik data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="1514" instrument_node="">
</span><rating data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">
rating:

</span></rating><span data-dcnode-id="1511" instrument_node="">
</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">The framework of the book is internally consistent, though I think it takes on too much to have true consistency. Compared to similar books on the market for introductory textbooks I think it may cover a bit too much to provide real consistency. For example, Chapters 1-8 provide common topics for an intro to comm course and cover different places/venues for communication, then Chapters 9-12 serve as a public speaking manual before returning to the kind of overview format for Chapters 13-16. However, as the book is totally free for students this would not at all prohibit me from assigning the book as I can easily choose not to assign those chapters.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1505" instrument_node="">

</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Each chapter has 3-4 subheadings, but the chapters span as many as 50 pages. I think more sub-headings would make the book more approachable, especially for students still learning study skills or who are returning to the classroom later in life. I would mitigate this by discussing reading strategies with my students and assigning the chapters in smaller pieces.</span></p><span data-dcnode-id="1494" instrument_node="">

</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">The book is not culturally insensitive or offensive. As an instructor I would add examples  to present the topics with more emphasis on social and racial justice than that text.</span></p><span data-dcnode-id="1446" instrument_node="">

</span><rubrik data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Comments</span></rubrik><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">I think this book could be adapted for many intro-level communication courses. One concern I have is that I would want a hard copy for myself and at 752 pages printing is cost-prohibitive. I've read about instructors working with bookstores to loan out hard-copies of open texts when the copyright allows but with this text the sheer number of pages would make that difficult.</span></p><span data-dcnode-id="1438" instrument_node="">

</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Overall, the comprehensiveness of this text is one of the main characteristics that attracted me to it. When teaching the communication studies basic course (interpersonal + public speaking + small group), textbooks often fall short in one or more of the three topics usually taught in the course, perhaps due to limited space. This text is quite a bit longer than other texts I have used for the basic course, which gives it a greater chance to cover topics in more detail and provides me the opportunity to choose which topics (and how much of which topic) I want to cover in my courses (more so than other texts that only offer a limited discussion of topics). I also appreciate the inclusion of Chapters 15 and 16 about media, which are not always a part of similar texts from publishers.</span></p><span data-dcnode-id="1376" instrument_node="">

Most of the chapters in this text likely have a reasonable level of longevity. The main chapters that I think will likely need revisions sooner than others are the chapters about media. However, it would be difficult to address the topic of media without needing revisions in the near future, so I do not see this as a weakness of the text. In addition, a few examples in the public speaking chapters (such as a sample speech outline about "going green") could use updates later on, as well.
</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1351" instrument_node="">
</span><rubrik data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="1348" instrument_node="">
</span><rating data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="1345" instrument_node="">
</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">The author's choice to use words such as "we" and "you" while explaining concepts helps the prose to be more understandable to the reader. However, more complex vocabulary is also used throughout, which can be a benefit or a deterrent, depending on the student population. Because I teach at a community college, my students have a wide range of reading comprehension. For example, they may look at pages 455-456 of the text and see the headings "systematic desensitization" and "cognitive restructuring" and feel overwhelmed, thinking that if they don't understand the heading, then they won't understand the rest of the text in that section. Contrastingly, students with higher reading level may enjoy this feature of the text.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1339" instrument_node="">
</span><rubrik data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="1336" instrument_node="">
</span><rating data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="1333" instrument_node="">
</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Even though interpersonal/group communication are topics that are often discussed in a different way than public speaking, this author did a nice job of maintaining a consistent writing style throughout. Likewise, reading one chapter gave me an idea of what to expect when reading another.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1327" instrument_node="">
</span><rubrik data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="1324" instrument_node="">
</span><rating data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="1321" instrument_node="">
</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">The modularity of this text was designed in an effective manner. Because this text is longer than many texts produced through publishers (a nice benefit of this text), the length of the text required that the longer chapters be broken into smaller sub-chapters. I find this useful because I may not use the entire chapter and having the chapters broken into sub-chapters helps me to tell students on which parts of the chapter they should focus their attention. It appears as though the author has taken care to determine which sub-topics within chapters make the most sense to be their own sub-chapters.</span></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1315" instrument_node="">
</span><rubrik data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="1312" instrument_node="">
</span><rating data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="1309" instrument_node="">
</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">If I were to use this text to teach my intro to communication basic course, I would likely teach the chapters in a different order than they are presented here. For example, I would teach Chapter 8 after Chapter 2 and Chapters 15/16 after Chapter 8. It's not too much of a problem to just around in the text like that, but I have found that it does tend to confuse students a little. 

Aside from the order of the chapters, the content within the chapters does flow well and has been organized with care.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1303" instrument_node="">
</span><rubrik data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Interface</span></rubrik><span data-dcnode-id="1300" instrument_node="">
</span><rating data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="1297" instrument_node="">
</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">I appreciate that this text can be read on a cell phone (I think that will motivate more students to read it). I printed the text and noticed that students will need a 3" binder for it (something I would want to point out in my syllabus if I were to adopt this text). I did notice that when I printed the text, some of the pictures were too dark and printed in such a way that it was difficult to tell what the picture was showing.</span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1291" instrument_node="">
</span><rubrik data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Grammatical Errors</span></rubrik><span data-dcnode-id="1288" instrument_node="">

</span></p><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">I did not come across any grammatical errors during my review and the writing is done in a very professional manner.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1279" instrument_node="">
</span><rubrik data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Cultural Relevance</span></rubrik><span data-dcnode-id="1276" instrument_node="">

rating:
5

</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">While the content does not appear to be biased or insensitive/offensive, only about 1/3 of the photos of people in the text represented racial diversity (which likely isn't the author's intention; there may have been limited options for open-source images to use in the text). However, this representation of diversity was actually higher than some of the other texts I have been sent by publishers recently. In fact, the explanations and examples throughout the text show that the author has taken care to discuss culture in a fair and accurate manner.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1267"></p><span data-dcnode-id="1266" instrument_node="">
</span><rubrik data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Comments</span></rubrik><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Now that I have reviewed this text and considered each of the items in this review, plus the benefit to my students, I have decided to adopt this text for Fall 2017. I appreciate the hard work and efforts of this author to provide such a high-quality open education resource for students to use.</span></p><span data-dcnode-id="1260" instrument_node="">

</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">This textbook covers virtually all of the main topics I would expect to see in an introductory communication textbook. The only exception I noted is that there is no chapter on organizational communication, although they do discuss communication in organizations throughout other chapters. 

If anything some sections of the book are a little TOO comprehensive. The book itself is quite long, as are the individual chapters. Some chapters go into so much depth they almost feel like they don't belong in a general introductory textbook. For instance, the chapters on media feel like they could come from an introduction to media textbook. Of course, it's a good thing that the book is so comprehensive, but I could see students getting overwhelmed by the length of the chapters.

Likewise, the four chapters on public speaking would be the good basis for a public speaking textbook, but they feel a little out of place here. The rest of the book feels like it's designed for a lecture-based survey course, but the public speaking chapters are very prescriptive, seemingly designed for the kind of class where students are giving their own speeches. I wonder if the book might be too much of a survey for standard basic courses, but with too much emphasis on public speaking for survey courses.

In the PDF version, there is no glossary or index.</span></p><span data-dcnode-id="1198" instrument_node="">

</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">I did not note any outright factual errors or bias. There are, of course, some things that are open to interpretation, such as when the author goes into a historical perspective. Some people would likely disagree with the way the author divides up the eras of human history, but the book does make a good argument for the way it divides them up.</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1185" instrument_node="">

</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">
There are a few minor instances of outdated information. For instance, Table 8.3 provides a history of acceptance of the LGBT community, but stops with the repeal of Don't Ask Don't Tell, suggesting that it was written before the recent Supreme Court cases recognizing same-sex marriages. Of course, that's not the author's fault, just the result of the book being a few years old.

I actually expected that the media chapters would have outdated information, but they turned out to be surprisingly up-to-date. The author must have been up-to-date enough at the time the book was published that it hasn't gotten dated.
</span></p><span data-dcnode-id="1174" instrument_node="">

</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">The book is generally clear and easy to follow. It can be a little dry at times, but no more than any other textbook.The book does a good job of introducing major communication theories, but not nearly enough to overwhelm the students.</span></p><span data-dcnode-id="1162" instrument_node="">

</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">I found the book to be culturally sensitive. The book acknowledges the importance of culture to communication throughout.</span></p><span data-dcnode-id="1090" instrument_node="">

</span><rubrik data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Comments</span></rubrik><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">I think this is about as good as any of the other introductory textbooks on the market. The coverage of media is much better than I've seen in other similar books. If you were using the book in a lecture-based survey class, the public speaking chapters probably wouldn't fit, but since it's an open textbook that's no loss.</span></p><span data-dcnode-id="1082" instrument_node="">

</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Comprehensive Individualized Curriculum and Instructional Design: Curriculum and Instruction for Students with Developmental Disabilities/Autism Spectrum Disorders covers a wide range of topics related to working with students with developmental disabilities and ASD.  There is no index or glossary but the chapter titles are clear and relate to the overall topic of the textbook.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1012"><span data-dcnode-id="1019" instrument_node="">

</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">The content in this textbook is accurate and research based.  There are many reputable sources that are referenced and the information supports current information on the Autism Spectrum Disorder.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1007" instrument_node="">

</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">
The content is up-to-date, but many of the links were not accessible, which made it hard to get the additional information needed.  If those links were updated it would make the text more relevant.
</span></p><span data-dcnode-id="996" instrument_node="">

</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">The text is clear and easy to follow, in particular Chapters 1-4.  There are some technical terminology used but there are always explanations included.  The specific behavioral examples given helped bring clarity and made it easy for teachers to see how to implement the plan with their own students. The templates and charts provided would be useful for educators to use as provided or to adapt to meet their individual needs.</span></p><span data-dcnode-id="984" instrument_node="">

</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">The first part of the textbook was very consistent and had a nice flow.  It seemed to change with the information regarding the use of technology.  Chapter 5 read more like a technical manual with directions of how to use the technology for adaptive purposes.  </span></p><span data-dcnode-id="972" instrument_node="">

</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">The textbook is set up very well so that smaller reading sections could be used in courses.  Each chapter has a complete topic that could be used in isolation.  Together they offer a cohesive picture of working with students with special needs.</span></p><span data-dcnode-id="960" instrument_node="">

</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">The textbook has a nice flow and starts off with the most comprehensive chapter that sets the tone for the rest of the book.  The last two chapters seem the most different, but do offer important information regarding communication and technology.</span></p><span data-dcnode-id="948" instrument_node="">

</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">The text was very culturally sensitive and shared strategies in a positive and productive way for working with students with developmental</span></p><span data-dcnode-id="912" instrument_node="">

</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">This textbook is full of detailed strategies related to Curriculum and Instruction Design for students with developmental delays and students and ASD.  Chapter 4 Developing Function-based Interventions is especially beneficial for teachers seeking management strategies.</span></p><span data-dcnode-id="904" instrument_node="">

</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">This is a comprehensive text that rivals textbooks in the traditional market. It contains the concepts often covered in a hybird/intro communication course. Having taught this course for ten years and reviewed dozens of textbooks, I would have little hesitation in using this textbook in my oral communication course. Often these textbooks feel redundant of each other and being able to choose one that has the information and the best price point is persuasive.</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="841" instrument_node="">

</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">In my estimation, I believe this text is accurate and error free. </span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="829" instrument_node="">

</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">
The theory and concepts related to the course content are up-to-date and will most likely remain that way for a long time. Any shift in this area would occur for all texts in this area and would require updating all literature in the communication field. The examples and videos are currently great, but I can't help but think those will feel outdated very quickly. Same with any reference to social media that is constantly changing and evolving.
</span></p><span data-dcnode-id="818" instrument_node="">

</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">
The text's content is fairly up-to-date and is unlikely to be rendered obsolete within a short period of time. Any advances/changes in new media and/or communication theory and research could be easily inserted into the text. Specifically, the "New Media and Democracy" chapter should be updated to include information about the promotion and presence of "fake news" on social media, and how one can develop skills to assess sources. However, as this issue (fake news on social media) has been of significant interest due, in part, to the 2016 US Presidential election, the omission of this information is understandable, and instructors could easily supplement the text with additional resources. The text's authors could also easily edit the content to include this update.

</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">This text covers the expected topics for an introductory hybrid (communication and public speaking) text, and in the order that those topics are customarily covered (1. introduction, 2. perception, 3. language, 4. nonverbal, etc.). The history of communication going back to ancient times is covered briefly in chapter 1, but not in as much detail as I would prefer. However, few introductory communication texts cover the history of communication in much detail and many ignore history altogether. There are multiple chapters addressing public speaking, which is appropriate for a hybrid text.

The text does not have a glossary or index, but given that the text is available as a searchable .pdf file, a printed index would be redundant. I searched for a few terms and the search function worked well.</span></p><span data-dcnode-id="498" instrument_node="">

</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">The accuracy of the book is excellent. In my reading there was nothing I encountered that caused concern as far as accuracy is concerned. The author(s) are objective, inclusive, and egalitarian in their treatment of topics, so it is fair to say the content is unbiased. The authors also do a nice job of representing communication scholarship from both a social scientific and humanistic perspective.</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="485" instrument_node="">
</span><rubrik data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="482" instrument_node="">
</span><rating data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="479" instrument_node="">
</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">
This version of the text was published in 2013 and the content is currently up-to-date as of early 2017. There are a number of specific instances that will need to be updated in coming years/decades to be accurate as a function of the passing of time, but those cases should be fairly easy to change out with new examples. On page 46 the text refers to the "first presentation" in this class, which supposes that speeches/presentations are a component of the class that uses this text. Other cases of information that may go out of date are references to "google" being a new term, pay stubs, the "recent" Obama/Romney presidential election, and the current ages of individuals who are members of the various generations (p. 678). The text uses a number of URLs. The vast majority of the URLs that I checked worked as intended, but a few of them redirected or were no longer working (e.g., the author's blog in chapter 16).
</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="473" instrument_node="">
</span><rubrik data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="470" instrument_node="">
</span><rating data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="467" instrument_node="">
</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">The clarity of the prose is good. At no point in my reading was there confusion with regard to communication content due to a lack of clarity. One meta-clarity issue concerns the identity of the authors. The authors have withheld their identity, which may present confusion due to the frequent use of the first person by the author(s). In chapter 16 the name of one of the authors is available in a URL that claims to be the author's personal blog. That URL no longer works. Perhaps a standard name could be assigned to the author (e.g., Alan Smithee) and references to the individual authors in the text could be removed.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="461" instrument_node="">
</span><rubrik data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="458" instrument_node="">
</span><rating data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="455" instrument_node="">
</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">The consistency of the text is remarkably high. Despite there being multiple authors of the text, the voice throughout the difference chapters and sub-sections is similar. The framework of the chapters is similar, which each chapter being broken down into multiple sub-sections, followed by the references. The photos used to supplement the text have a common theme - realistic, gritty, compelling.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="449" instrument_node="">
</span><rubrik data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="446" instrument_node="">
</span><rating data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="443" instrument_node="">
</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">The text rates high in terms of modularity. Each chapter is divided into a minimum of three distinct sub-sections. Within the sub-sections, headings are used frequently to divide up the ideas. The text does refer to/mention other chapters frequently. This occurs most frequently in chapter 1, which refers to all the other chapters, but it also occurs in other chapters (e.g., chapter 3 refers to chapter 1, chapter 15 refers to chapter 1, and chapter 16 refers to chapter 15).</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="437" instrument_node="">
</span><rubrik data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="434" instrument_node="">
</span><rating data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="431" instrument_node="">
</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">The organization is typical of introductory texts, starting with an introduction and moving through perception, verbal and nonverbal communication, moving on to interpersonal communication and relationships, and then on to public, small-group, and mass communication. This order is logical as the text flows through the forms of communication in order (intrapersonal to mass).</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="425" instrument_node="">
</span><rubrik data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Interface</span></rubrik><span data-dcnode-id="422" instrument_node="">
</span><rating data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="419" instrument_node="">
</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Reading the text on a computer display took a little bit of time to get used to, but after getting used to it the reading went well. The fact that the text is searchable is a great advantage. All the graphics, photos, models, and figures displayed properly.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="413" instrument_node="">
</span><rubrik data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Grammatical Errors</span></rubrik><span data-dcnode-id="410" instrument_node="">
</span><rating data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="407" instrument_node="">
</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">The grammar is excellent. It is written in a scholarly format but does not confuse readers with undefined jargon or superfluous words. Some texts are too conversational; this text is easy to relate too but does not do so at the expense of credibility.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="401" instrument_node="">
</span><rubrik data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Cultural Relevance</span></rubrik><span data-dcnode-id="398" instrument_node="">
</span><rating data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="395" instrument_node="">
</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Multiple potentially controversial topics, such as race, hate speech, disability status, and sexual orientation are covered by the text and are done so in an even-handed, fair manner. The text even points out how using certain specific terms (e.g., handicapped instead of disabled) can have an undesirable effect. Photos are inclusive in that people from various races and ethnicities are pictured, not to mention that people with tattoos (and without tattoos) are also featured.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="389"></p><span data-dcnode-id="388" instrument_node="">
</span><rubrik data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Comments</span></rubrik><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">All in all this is an excellent introductory communication text that would be ideal for a hybrid (introduction to communication + public speaking) communication class. It is comprehensive, well written, and well sourced. It could be used by either a social scientist or a humanist. The text would also work well in an introductory communication course that does not have a public speaking component; the multiple public speaking chapters could be covered in less detail. The text covers a number of recent events and technologies that will need to be updated in the coming years.</span></p><span data-dcnode-id="382" instrument_node="">
</span></div><span data-dcnode-id="380" instrument_node="">

</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">As compared to similar texts in the traditional textbook market, this book provides just as much comprehension for an introductory communication course/curriculum. All of the general concept areas taught in an introductory hybrid communication course are thoughtfully present, including chapter content geared to modern communication technology concepts and influences on social media. After teaching the hybrid course for almost fifteen years, I would have no issues using this text, relative to including the required concepts of such a course.      </span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="319" instrument_node="">

</span></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">In reviewing this text, I have not found any major errors or issues with presented content. Not to say that I could not have missed a model or diagram that was incorrectly presented. Overall, I found the text error-free in my review. But I have found that errors in texts are usually discovered when actually applied in teaching situations. As for bias, there is no discernible concern in my view of a particular philosophy or worldview that would distract from the learning objectives of the text used in a class. Actually, I found myself really enjoying the style of writing, and to my chagrin, realized the textbook author was a graduate of my same MA program!          </span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="307" instrument_node="">

This text areas focusing on traditional content in the hybrid communication course are up to date, and any changes to field theory would likely occur over a span of years (allowing for effective inclusion in this text, assuming the author will continue to update the text). The chapters that likely will need to be updated sooner of course deal with social media and technology.           
</span></p><span data-dcnode-id="296" instrument_node="">

</span><p data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">The writer presents theory and concepts in a straight forward fashion, without requiring the reader/student to have prior grounding in communication theory. It’s easy to understand, and even enjoyable to follow!             </span></p><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="283" instrument_node="">

</span><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">The text follows a consistent pattern for each chapter, with learning objectives noted at the start of each chapter, followed by chapter content, case studies, concept review questions, and exercises. I did find a few examples of printing errors across a few sections, with extra spaces between sections.                  </span></p><span data-dcnode-id="272" instrument_node="">

</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Yes, this text could be applied or configured using specific chapters for instruction, leaving out several areas and/or focusing on specific chapters by topic area.                   </span></p><span data-dcnode-id="260" instrument_node="">

</span><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">From my review, I could not find major grammatical problems in the text.  </span></p><span data-dcnode-id="224" instrument_node="">

</span><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">There is nothing offensive or culturally insensitive in this text so far in my review of it. The text is sensitive to diversity and provides excellent examples of situations where people from various background could find challenges in communicating within diverse cultural environments.                 </span></p><span data-dcnode-id="212" instrument_node="">
</span><p data-dcnode-id="211"></p><span data-dcnode-id="210" instrument_node="">
</span><rubrik data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Comments</span></rubrik><span data-dcnode-id="207" instrument_node="">
</span><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Again, as compared to using a traditional textbook from the market, this text, as far as relative content, could be just as effective. It could help in saving students on costs for another textbook, especially one used for an introductory course. My two concerns: 
1.	There are no boldfaced or italics key terms identified in text, which could leave the student not seeking out the concepts/theories for class discussion or application in activities or tests. While the learning goals at the start of each chapter (just about) provides this service, I feel the author should include a key term or concept summary for each chapter.
2.	Given the emphasis today (actually, make that requirement) in colleges on taking the traditional hybrid communication course and applying the course in completely online or partly web-based classes, it would be helpful to have some consideration for a delivery platform for speeches or online discussions. And, that is probably where the open textbook concept, at least in this case, has to rely on the school’s default learning management system platform or other learning software platform.               
</span></p><span data-dcnode-id="204" instrument_node="">

</span><h2 class="BD-Hide" data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">About the Book</span></h2><span data-dcnode-id="117" instrument_node="">
</span><span data-dcnode-id="109"><p data-dcnode-id="113"><em data-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">Communication in the Real World: An Introduction to Communication Studies </span></em><span data-dcnode-id="114" instrument_node="">overviews the time-tested conceptual foundations of the field, while incorporating the latest research and cutting-edge applications of these basics. Each chapter will include timely, concrete, and real-life examples of communication concepts in action.</span></p><span data-dcnode-id="112" instrument_node="">
</span><p data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">A key feature of this book is the integration of content regarding diversity and organizational communication in each chapter through examples and/or discrete sub-sections. Discussions of diversity are not relegated to feature boxes. Also integrated into the content are examples that are inclusive in terms of race, gender, sexuality, ability, age, marital status, religion, and other diverse identity characteristics.</span></p></span><span data-dcnode-id="108" instrument_node="">
