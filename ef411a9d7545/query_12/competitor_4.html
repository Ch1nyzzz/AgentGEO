</span><a class="link" data-dcnode-id="4380" onclick="util.doubleToggle(reviewTag2669,readMore2669)"><span data-dcnode-id="4381" instrument_node="">see less</span></a><span data-dcnode-id="4379" instrument_node="">
</span></rating><span data-dcnode-id="4377" instrument_node="">
</span></p><span data-dcnode-id="4375" instrument_node="">
</span><p data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">The range of topics for this book is comparable to other leading textbooks of this area from popular publishers. This would be perfect for a course that seeks to cover communication studies with a public speaking component, but lacks topics that may be relevant for a course that is strictly communication studies without a speaking component. I echo other reviewers in that this book lacks emerging areas of communication studies such as health communication. This may, however, be a critique of the larger "brand" of introduction to communication studies textbooks and not this book specifically.  </span></p><span data-dcnode-id="4372" instrument_node="">
</span><p data-dcnode-id="4364"><span data-dcnode-id="4371" instrument_node="">
</span><rubrik data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="4368" instrument_node="">
</span><rating data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="4365" instrument_node="">
</span></p><span data-dcnode-id="4363" instrument_node="">
</span><p data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">This textbook cites the appropriate literature for the major concepts covered. The strength here is citation and discussion of key literature that is the foundation of each topic (e.g., noise as a barrier to listening). I wish that the book would also consider adding in the most current applications of some of this literature as I will discuss below in the relevance section. Examples are unbiased.</span></p><span data-dcnode-id="4360" instrument_node="">
</span><p data-dcnode-id="4352"><span data-dcnode-id="4359" instrument_node="">
</span><rubrik data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="4356" instrument_node="">
</span><rating data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="4353" instrument_node="">
</span></p><span data-dcnode-id="4351" instrument_node="">
</span><p data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">
The textbook includes the necessary content for the concepts covered.  However, it lacks specific examples or current applications of some of this content. For example, in the discussion of Family Communication Patterns theory it would have been helpful to cite some of the more relevant literature using this theory. This textbook gives a great foundation for the most important concepts related to communication, but as an instructor, I need to fill in the gaps with the most relevant applications of these concepts. This is one of the major pieces that sets this book apart from the current publisher textbooks that I've used previously in my course. 
</span></p><span data-dcnode-id="4348" instrument_node="">
</span><p data-dcnode-id="4340"><span data-dcnode-id="4347" instrument_node="">
</span><rubrik data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="4344" instrument_node="">
</span><rating data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="4341" instrument_node="">
</span></p><span data-dcnode-id="4339" instrument_node="">
</span><p data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">The textbook is written in a clear and appropriate tone. I also like the repetition of major concepts in each unit. For example, the chapter on family communication processes includes a discussion of two major communication processes in family communication literature: conversation and conformity orientations. The text also provides a visual image of these processes. They also come up again in the key takeaways section and are reinforced in the exercises at the end of the unit. This clarity and consistency is wonderful for students and instructors alike.</span></p><span data-dcnode-id="4336" instrument_node="">
</span><p data-dcnode-id="4328"><span data-dcnode-id="4335" instrument_node="">
</span><rubrik data-dcnode-id="4333"><span data-dcnode-id="4334" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="4332" instrument_node="">
</span><rating data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="4329" instrument_node="">
</span></p><span data-dcnode-id="4327" instrument_node="">
</span><p data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">The book has a consistent structure throughout the units. The book is also consistent in highlighting important terminology. Related to  modulation (below), the way that each unit was presented was consistent: learning objectives, content, key takeaways, and exercises. </span></p><span data-dcnode-id="4324" instrument_node="">
</span><p data-dcnode-id="4316"><span data-dcnode-id="4323" instrument_node="">
</span><rubrik data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="4320" instrument_node="">
</span><rating data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="4317" instrument_node="">
</span></p><span data-dcnode-id="4315" instrument_node="">
</span><p data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">Overall the break down of the content makes sense. The topics are also appropriately split within each unit. My only suggestion would be to include a symbol for the subheadings within each unit. For example, in section 6.4 Self-Disclosure and Interpersonal Communication there are three subheadings: Theories, Process, and Effects. It would be nice if each of these sections also had a numerical indicator: 6.4.1, 6.4.2, and 6.4.3 for example. This would make it easier to assign short reading for each of these sections if I were to take more than one class period to discuss self disclosure.</span></p><span data-dcnode-id="4312" instrument_node="">
</span><p data-dcnode-id="4304"><span data-dcnode-id="4311" instrument_node="">
</span><rubrik data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="4308" instrument_node="">
</span><rating data-dcnode-id="4306"><span data-dcnode-id="4307" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="4305" instrument_node="">
</span></p><span data-dcnode-id="4303" instrument_node="">
</span><p data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">The public speaking sections seems to come in the middle of the textbook. I would suggest moving these units to the end. The learning objectives at the beginning of each unit and the discussion questions at the end are very helpful.</span></p><span data-dcnode-id="4300" instrument_node="">
</span><p data-dcnode-id="4292"><span data-dcnode-id="4299" instrument_node="">
</span><rubrik data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">Interface</span></rubrik><span data-dcnode-id="4296" instrument_node="">
</span><rating data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="4293" instrument_node="">
</span></p><span data-dcnode-id="4291" instrument_node="">
</span><p data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">The interface is easy to use and visually stimulating. The mobile interface is very impressive and easy to use.</span></p><span data-dcnode-id="4288" instrument_node="">
</span><p data-dcnode-id="4280"><span data-dcnode-id="4287" instrument_node="">
</span><rubrik data-dcnode-id="4285"><span data-dcnode-id="4286" instrument_node="">Grammatical Errors</span></rubrik><span data-dcnode-id="4284" instrument_node="">
</span><rating data-dcnode-id="4282"><span data-dcnode-id="4283" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="4281" instrument_node="">
</span></p><span data-dcnode-id="4279" instrument_node="">
</span><p data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">The book appears to be free from grammatical errors.</span></p><span data-dcnode-id="4276" instrument_node="">
</span><p data-dcnode-id="4268"><span data-dcnode-id="4275" instrument_node="">
</span><rubrik data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">Cultural Relevance</span></rubrik><span data-dcnode-id="4272" instrument_node="">
</span><rating data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="4269" instrument_node="">
</span></p><span data-dcnode-id="4267" instrument_node="">
</span><p data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">The book is very sensitive to include examples of diversity and culture throughout the textbook and was not restricted to only chapter 8 which discusses culture and communication. </span></p><span data-dcnode-id="4264" instrument_node="">
</span><p data-dcnode-id="4263"></p><span data-dcnode-id="4262" instrument_node="">
</span><rubrik data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">Comments</span></rubrik><span data-dcnode-id="4259" instrument_node="">
</span><p data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">This is a great textbook for a class seeking to cover communication studies with a public speaking component. You could also use this as a foundation for a human communication course, but would need to supplement this book with other reading material.  I really appreciate the ease in accessing this textbook on mobile devices  - this is a huge advantage of the online platforms that publishers offer for their textbooks which I have found to not be very good. </span></p><span data-dcnode-id="4256" instrument_node="">

</span><p data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">I use this textbook in an Introduction to Communication course that covers both Communication and Mass Communication. It does a good job providing an overview of such topics such as history, process, perception, listening, verbal, nonverbal, group and other areas that align with program objectives for our academic unit. This resource ensures all students have immediate access to the content from the first day of class, and allows the instructor to focus on supplementing the material with lectures, discussions and in-class exercises. As mine is a large class I do not use the public speaking chapters. In addition, I use other resources for the Mass Communication topics because of the nature of the discipline. </span></p><span data-dcnode-id="4022" instrument_node="">
</span><p data-dcnode-id="4014"><span data-dcnode-id="4021" instrument_node="">
</span><rubrik data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="4018" instrument_node="">
</span><rating data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="4015" instrument_node="">
</span></p><span data-dcnode-id="4013" instrument_node="">
</span><p data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">The content is accurate. I have not noticed any errors, and the author has an unbiased approach to the content, with research supporting the information presented.</span></p><span data-dcnode-id="4010" instrument_node="">
</span><p data-dcnode-id="4002"><span data-dcnode-id="4009" instrument_node="">
</span><rubrik data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="4006" instrument_node="">
</span><rating data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="4003" instrument_node="">
</span></p><span data-dcnode-id="4001" instrument_node="">
</span><p data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">
The text provides useful and relevant content but will need updates from those who choose to use it. Instructors need to be mindful of current events as they relate to the content. An example would be Including discussion of events such as the 2018 Charlottesville riots, during which marchers carried Nazi symbols and Confederate battle flags, which are an important coda to the "history/past-present/future dialectic” and discussion of controversy over what the Confederate flag symbolizes in the chapter dealing with Intercultural Communication. This can be achieved by updating examples in the text and providing up-to-date content in lectures. Also worth note: I was pleasantly surprised that there were fewer 404 errors than anticipated in the links to external references.
</span></p><span data-dcnode-id="3998" instrument_node="">
</span><p data-dcnode-id="3990"><span data-dcnode-id="3997" instrument_node="">

</span></p><span data-dcnode-id="3989" instrument_node="">
</span><p data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">Key takeaways, definitions, highlighted and hyperlinked text provide a great resource for students navigating an introduction to the study of communication. It makes the text accessible, clear and easy to understand. Example and illustrations help communicate key points, and terms are clearly defined.</span></p><span data-dcnode-id="3986" instrument_node="">
</span><p data-dcnode-id="3978"><span data-dcnode-id="3985" instrument_node="">

</span></p><span data-dcnode-id="3977" instrument_node="">
</span><p data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">The organization helps guide readers through the content, lets students focus and organize their studies, and facilitates instructor updates. The organization of content areas into subchapters, learning objectives, key takeaways, suggested exercises, and well-cited sidebars provides a clear and consistent format for the material presented.</span></p><span data-dcnode-id="3974" instrument_node="">
</span><p data-dcnode-id="3966"><span data-dcnode-id="3973" instrument_node="">

</span><p data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">There is continuity in the way the text is structured, so that a linear progression through the text allows students to build on prior knowledge. At the same time, important topics have sufficient repetition and reinforcement so that instructors can effectively teach select chapters, and teach chapters out of sequence.</span></p><span data-dcnode-id="3962" instrument_node="">

</span><p data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">While students could use any format, I used the .epub file. Charts and images were clear, and digital reading tools made it easy to mark the text, make notes, and reference content as needed. I did not notice any problems with the interface or in navigating through the content. </span></p><span data-dcnode-id="3938" instrument_node="">

</span><p data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">This text may limited by freely available photography; instructors should be aware that images in the text heavily features Caucasian subjects. Instructors using this text may want to specifically seek out presentation/lecture images that are more representative. Textual content and examples selected strive to be inclusive.</span></p><span data-dcnode-id="3914" instrument_node="">
</span><p data-dcnode-id="3913"></p><span data-dcnode-id="3912" instrument_node="">
</span><rubrik data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">Comments</span></rubrik><span data-dcnode-id="3909" instrument_node="">
</span><p data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">The textbook is appropriate for an introductory level course in communication. This is a fantastic contribution to the field and is a great resource to ensure students have affordable access to a resource that provides a solid foundation for the study of communication. </span></p><span data-dcnode-id="3906" instrument_node="">

</span><p data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">I plan to begin using this book for my Human Communication course. All of the topics I address are adequately covered in this text. When I began my initial review of the book, I loved the online glossary with the easy to navigate "dropdown" menu that quickly links users to the desired topics. Additionally, the learning objectives outlined at the beginning of each section are especially helpful. </span></p><span data-dcnode-id="3844" instrument_node="">

</span><p data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">The writer's adherence to inclusive language throughout the text demonstrated best practices in modern communication. No glaring errors distracted me from the content. </span></p><span data-dcnode-id="3832" instrument_node="">
</span><p data-dcnode-id="3824"><span data-dcnode-id="3831" instrument_node="">

</span><p data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">
I appreciated that the book had two separate chapters addressing media and communication. The first of the two, Chapter 15, provided a general, history and overview of the development of media over time (especially as related to technology), theories associated with media, and a section on ethics. The second, Chapter 16, looked specifically at new media. Separating the chapters in this way, I believe, will make the book easier to update and media continues to evolve. 
</span></p><span data-dcnode-id="3820" instrument_node="">
</span><p data-dcnode-id="3812"><span data-dcnode-id="3819" instrument_node="">

</span><p data-dcnode-id="3809"><span data-dcnode-id="3810" instrument_node="">I like that the wording is approachable for most readers. I would prefer the author(s) not use "we" in the discussions because that word inherently discriminates against those who do not share the same experience as the author(s). Additionally, although key words are highlighted in the text, I would also like to see those same key words defined in the margin or at the end of chapters to help students study as they build their lexicon. The "Key Takeaways" listed at the end of each section are nice. </span></p><span data-dcnode-id="3808" instrument_node="">

</span><p data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">The writer(s) did a lovely job scaffolding the information throughout the text. Terminology was consistent. </span></p><span data-dcnode-id="3796" instrument_node="">

</span><p data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">I really appreciate the attention to detail employed when preparing the various sections of the text. As I build my resources for both my online and face to face sections I will be able to embed links easily in my online classroom and handouts for student reading/reference/discussion. </span></p><span data-dcnode-id="3784" instrument_node="">
</span><p data-dcnode-id="3776"><span data-dcnode-id="3783" instrument_node="">

</span><p data-dcnode-id="3773"><span data-dcnode-id="3774" instrument_node="">The organization of the first six chapters align exactly with the way I prefer to teach. I love being able to assign chapters to students in sequential order. The division of the two chapters about media and communication, at the end of the book, is perfect for updating. Listing learning objectives at the beginning of each section and key takeaways at the end of each chapter is extraordinarily useful. </span></p><span data-dcnode-id="3772" instrument_node="">
</span><p data-dcnode-id="3764"><span data-dcnode-id="3771" instrument_node="">

</span><p data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">Navigation is simple, intuitive, and user-friendly for both digital natives and digital immigrants. The option to download and print a pdf of the entire book is also helpful. </span></p><span data-dcnode-id="3760" instrument_node="">

</span><p data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">Apart from an occasional error, the book is well edited for grammar and clarity. </span></p><span data-dcnode-id="3748" instrument_node="">

</span><p data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">The book employs inclusive language throughout with no instances, I perceived, of direct cultural insensitivity. </span></p><span data-dcnode-id="3736" instrument_node="">

</span><p data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">I look forward to using this book for not only my introduction to human communication course, but as a supplementary resource for many of the English courses I teach as students approach group projects. Specifically, I plan to use the information from Chapter 5 (listening) and Chapter 13 (small group communication). </span></p><span data-dcnode-id="3728" instrument_node="">

</span></rating><span data-dcnode-id="3671" instrument_node="">
</span></p><span data-dcnode-id="3669" instrument_node="">
</span><p data-dcnode-id="3667"><span data-dcnode-id="3668" instrument_node="">Each chapter supports both the "typical" topics in similar breadth and depth as the traditional hybrid Intro to Communication text and I was pleasantly surprised to see the integration of topics within and between chapters. For example, rarely to Communication texts engage with the National Communication Association resources in the way that this one does. The chapters reference NCA's work in learning outcomes, skills, ethics, and employment in the field.</span></p><span data-dcnode-id="3666" instrument_node="">
</span><p data-dcnode-id="3658"><span data-dcnode-id="3665" instrument_node="">
</span><rubrik data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="3662" instrument_node="">
</span><rating data-dcnode-id="3660"><span data-dcnode-id="3661" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="3659" instrument_node="">
</span></p><span data-dcnode-id="3657" instrument_node="">
</span><p data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">The content is very accurate, from my perspective and background. For instructors who find something missing, it should be easy to supplement with a journal article or two. Personally, the major content areas are fully covered and there are plenty of references to content that is omitted from other Intro texts due to space constraints. I did not notice many (any?) errors or bias in the content during my initial read. The Chapter 16 acknowledges that new tech changes occur rapidly. The author links to a personal blog (no thanks; not my favorite way to update textbook content), and the blog is not written in English.</span></p><span data-dcnode-id="3654" instrument_node="">
</span><p data-dcnode-id="3646"><span data-dcnode-id="3653" instrument_node="">
</span><rubrik data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="3650" instrument_node="">
</span><rating data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="3647" instrument_node="">
</span></p><span data-dcnode-id="3645" instrument_node="">
</span><p data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">
Plenty of examples are embedded into the text, up to the Obama/2012 election era. It would be fantastic to update the political and social references again to connect with readers and contemporary examples in media. 
</span></p><span data-dcnode-id="3642" instrument_node="">
</span><p data-dcnode-id="3634"><span data-dcnode-id="3641" instrument_node="">
</span><rubrik data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="3638" instrument_node="">
</span><rating data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3635" instrument_node="">
</span></p><span data-dcnode-id="3633" instrument_node="">
</span><p data-dcnode-id="3631"><span data-dcnode-id="3632" instrument_node="">The book is written in a conversational, approachable writing style that should be appealing to lower-level undergraduate students; it makes for an “easy read” even though chapters are broken down into several sections and the text is plenty lengthy. I could easily assign this text in a 100-200 level course without reservation, based on the clarity of writing. I don't love the occasional use of first-person language/writing, but that's a minor, personal annoyance.
</span></p><span data-dcnode-id="3630" instrument_node="">
</span><p data-dcnode-id="3622"><span data-dcnode-id="3629" instrument_node="">
</span><rubrik data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="3626" instrument_node="">
</span><rating data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3623" instrument_node="">
</span></p><span data-dcnode-id="3621" instrument_node="">
</span><p data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">Like a traditional text, each chapter begins with a list of learning outcomes; ends with takeaway summaries and a list of discussion prompts, rhetorical questions, or activities appropriate for the classroom. The learning outcomes and content is consistent with those used in the broader communication field. The text provides a broader scope for the historical framework of our discipline, couching the discipline in rhetoric, as many Intro texts mention the ancient evolution of the field (including technical and mediated communication) rather flippantly. There are not as many journal article source citations as I’d like, and it would be fantastic to link some web content or other content into the citations or as video examples earlier in the text. Some of the chapters have videos embedded; others do not.

</span></p><span data-dcnode-id="3618" instrument_node="">
</span><p data-dcnode-id="3610"><span data-dcnode-id="3617" instrument_node="">
</span><rubrik data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="3614" instrument_node="">
</span><rating data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="3611" instrument_node="">
</span></p><span data-dcnode-id="3609" instrument_node="">
</span><p data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">I appreciate that the lengthy chapters are easy to divide into sections. Each section is easy to navigate on screen and would allow an instructor to divide reading assignments by chapter subsection, based on the pacing of the course reading assignments. Sometimes, reading the entire nonverbal chapter (for example) can be overwhelming; yet dividing the content into an overview, a focus on types, then competence and context makes the chapter easier to approach in subsections. Each subsection contains subheadings for readability. My complaint here is still praise: even the subsections are very detailed and lengthy. I'd much rather have too much content than too little; however, my students may feel overwhelmed if asked to read more than one or two subsection per class period. With that said, if you've ever hesitated to assign a full chapter of reading per day for fatigue reasons, this modular format will allow you to break apart each chapter and cover content as students keep up with reading subsections.</span></p><span data-dcnode-id="3606" instrument_node="">
</span><p data-dcnode-id="3598"><span data-dcnode-id="3605" instrument_node="">
</span><rubrik data-dcnode-id="3603"><span data-dcnode-id="3604" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="3602" instrument_node="">
</span><rating data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3599" instrument_node="">
</span></p><span data-dcnode-id="3597" instrument_node="">
</span><p data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">Excellent organization and flow between topics. Very similar to the previous texts I have used for this level of class. The chapters are presented in a nearly identical order. There are two topics- culture and organizational communication- that are *typically* reserved for separate chapters in other Intro texts. Here, I appreciate that concepts regarding culture and organizational communication are interwoven into several chapters, where relevant- and cultural communication and leadership development have their own chapters, as well. Makes for seamless organization (and plenty of content!).</span></p><span data-dcnode-id="3594" instrument_node="">
</span><p data-dcnode-id="3586"><span data-dcnode-id="3593" instrument_node="">
</span><rubrik data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">Interface</span></rubrik><span data-dcnode-id="3590" instrument_node="">
</span><rating data-dcnode-id="3588"><span data-dcnode-id="3589" instrument_node="">
rating:
3
</span></rating><span data-dcnode-id="3587" instrument_node="">
</span></p><span data-dcnode-id="3585" instrument_node="">
</span><p data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">It is fairly easy to navigate through the pages and subheadings using links at the bottom of the pages. The subheadings would be easier to navigate if a list of chapter subheadings/content appeared on the upper left side of the screen and followed the reader, so that as I read subsection 4.3, I can easily click back to content in 4.2 and 4.4 without scrolling to the bottom of the page. (like the content dropdown menu bar, but one that follows the page and only pertains to the chapter open).This is a minor concern. I do appreciate the links embedded into the chapters; however, as I link backward or forward to content that is already covered (for example, Chapter 15 references Chapter 9; I click on the link and I'm tossed to the beginning of Chapter 9, but it's not simple to navigate back to the area of Chapter 15 where I was at). The cheesy stock photos could be improved. Chapter 16 ends rather abruptly. It would be helpful to have a final page/glossary that links and reviews each chapter's content or learning objectives.</span></p><span data-dcnode-id="3582" instrument_node="">
</span><p data-dcnode-id="3574"><span data-dcnode-id="3581" instrument_node="">

rating:

</span></rating><span data-dcnode-id="3575" instrument_node="">
</span></p><span data-dcnode-id="3573" instrument_node="">

</span><p data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">The content is accurate, unbiased, and contains supporting research findings.   Data and information are current and contextually appropriate.</span></p><span data-dcnode-id="3482" instrument_node="">

</span><p data-dcnode-id="3471"><span data-dcnode-id="3472" instrument_node="">
The content is straightforward with clear definitions.  Examples are not clearly dated so modifications or changes can be easily made to the content.  Dated information can be easily added to increase relevance to your current students.  After teaching communication courses for over twenty years, I have found this text to be all that you would need since you can add any of your own material to supplement the material.
</span></p><span data-dcnode-id="3470" instrument_node="">

</span><p data-dcnode-id="3459"><span data-dcnode-id="3460" instrument_node="">Terms and concepts are clearly defined.  There are appropriate explanations if jargons or technical terminology are used.  It is easy to understand and straightforward.  At the end of each section there are “key takeaways” which summarizes concepts to help the reader identify and remember the main points.  It is the perfect text for students at all reading levels.</span></p><span data-dcnode-id="3458" instrument_node="">
</span><p data-dcnode-id="3450"><span data-dcnode-id="3457" instrument_node="">

</span></p><span data-dcnode-id="3449" instrument_node="">
</span><p data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">The textbook is written in the same format and organization from chapter-to-chapter.  It is clearly organized and easy to follow.   Every chapter is divided into separate sections.  Each section includes the learning objectives at the very beginning; text covering the subject; a "getting real" section that connects the topics to the readers to make it more meaningful and relevant; a summary of the "key takeaways"; and exercises to engage the reader with the information.</span></p><span data-dcnode-id="3446" instrument_node="">

</span><p data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">At the end of each section, there are exercises to possibly use in the classroom.  These exercises help to engage the reader to make the concepts more relevant to their lives to make it more meaningful.  My student population is very diverse and the exercises allows for open discussions and self-reflections.</span></p><span data-dcnode-id="3386" instrument_node="">

</span><p data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">While the content is rich and broad, the overall sense when reading the text is that it's a firehose of content: the reader is often pummeled with term after term.  Often, I find that the best communication texts are those that are more narrative in style, which helps many freshman connect with new terms and ideas, especially when they should be connected to what we see in everyday life.</span></p><span data-dcnode-id="3280" instrument_node="">
</span><p data-dcnode-id="3272"><span data-dcnode-id="3279" instrument_node="">
</span><rubrik data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="3276" instrument_node="">
</span><rating data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3273" instrument_node="">
</span></p><span data-dcnode-id="3271" instrument_node="">
</span><p data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">The structure of the book is solid and consistent across chapters.  Especially helpful are the key takeaway blocks at the end of every sub-chapter.  These unfailingly offer strong summary statements of the important points for each page.</span></p><span data-dcnode-id="3268" instrument_node="">
</span><p data-dcnode-id="3260"><span data-dcnode-id="3267" instrument_node="">
</span><rubrik data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="3264" instrument_node="">
</span><rating data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3261" instrument_node="">
</span></p><span data-dcnode-id="3259" instrument_node="">
</span><p data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">While the text as a whole is too large to be assigned in a semester-long class, the chapters are divided into easily assigned readings that can be arranged as necessary.  </span></p><span data-dcnode-id="3256" instrument_node="">
</span><p data-dcnode-id="3248"><span data-dcnode-id="3255" instrument_node="">
</span><rubrik data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="3252" instrument_node="">
</span><rating data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="3249" instrument_node="">
</span></p><span data-dcnode-id="3247" instrument_node="">
</span><p data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">I think that as a whole the organization works, although the communication theory - public speaking sections don't seem to mesh well together.   One point that I appreciated about this book was that they included the research chapter before the chapter headings on speech organization and outlining.  It's a pet peeve of mine when public speaking textbooks begin with organization and outlining and then treat research as a supplemental procedure to support your ideas after you've decided what you want to say.  </span></p><span data-dcnode-id="3244" instrument_node="">
</span><p data-dcnode-id="3236"><span data-dcnode-id="3243" instrument_node="">

</span><rating data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="3237" instrument_node="">
</span></p><span data-dcnode-id="3235" instrument_node="">
</span><p data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">Overall the text interface is fine and is easy to navigate.  When it comes to images, some of the free images used are less than ideal.  I would also find a further grounding in actual data and graphs to be more useful than some of the generic imagery.</span></p><span data-dcnode-id="3232" instrument_node="">
</span><p data-dcnode-id="3224"><span data-dcnode-id="3231" instrument_node="">
</span><rubrik data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">Grammatical Errors</span></rubrik><span data-dcnode-id="3228" instrument_node="">

4
</span></rating><span data-dcnode-id="3225" instrument_node="">
</span></p><span data-dcnode-id="3223" instrument_node="">
</span><p data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">There are a few typos here and there, but nothing too shocking.</span></p><span data-dcnode-id="3220" instrument_node="">
</span><p data-dcnode-id="3212"><span data-dcnode-id="3219" instrument_node="">
</span><rubrik data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">Cultural Relevance</span></rubrik><span data-dcnode-id="3216" instrument_node="">

rating:
4
</span></rating><span data-dcnode-id="3213" instrument_node="">
</span></p><span data-dcnode-id="3211" instrument_node="">
</span><p data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">I think the text is acceptable, however there is much to be improved with the strength of examples provided.  </span></p><span data-dcnode-id="3208" instrument_node="">
</span><p data-dcnode-id="3207"></p><span data-dcnode-id="3206" instrument_node="">
</span><rubrik data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Comments</span></rubrik><span data-dcnode-id="3203" instrument_node="">
</span><p data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">This is a decent textbook for communication theory/public speaking hybrid courses.  I think it's a solid starting point, but I tend to supplement with my own materials, particularly when it comes to anything on perception or social psychology.  I also tend to supplement with a lot of my own material for the persuasion section.  However, the public speaking sections are fairly strong as well as the work on interpersonal and group communication.  If a bit more work is put into the graphics and images, this book would be much stronger!</span></p><span data-dcnode-id="3200" instrument_node="">

</span><p data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">The text does a nice job of discussing most of the common communication areas covered in other similar textbooks. I wish the text would include discussion of health communication and public and personal persuasion or influence, as I feel that the book is rather light on humanistic (critical/rhetorical) and social scientific perspectives on persuasion. </span></p><span data-dcnode-id="3138" instrument_node="">
</span><p data-dcnode-id="3130"><span data-dcnode-id="3137" instrument_node="">
</span><rubrik data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="3134" instrument_node="">
</span><rating data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3131" instrument_node="">
</span></p><span data-dcnode-id="3129" instrument_node="">
</span><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">Content appears to be accurate and error-free. The examples are benign and do not suggest any bias.</span></p><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3118"><span data-dcnode-id="3125" instrument_node="">
</span><rubrik data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="3122" instrument_node="">
</span><rating data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3119" instrument_node="">
</span></p><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">
I enjoyed the numerous examples given throughout the book. I felt as though they were timely but not obsolete. The content was similarly up-to-date. Not much of the material is at risk of being dated other than the chapter on mass media and technology. However, at this moment, the material seems current, but that could change in a few years.
</span></p><span data-dcnode-id="3114" instrument_node="">
</span><p data-dcnode-id="3106"><span data-dcnode-id="3113" instrument_node="">
</span><rubrik data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="3110" instrument_node="">
</span><rating data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3107" instrument_node="">
</span></p><span data-dcnode-id="3105" instrument_node="">
</span><p data-dcnode-id="3103"><span data-dcnode-id="3104" instrument_node="">Clarity in prose and structure is one of the greatest strengths of this textbook. The prose is straightforward and defines keywords in easily understandable ways. The short sections within each unit aids reading comprehension, as each section covers one main idea rather than several concepts or keywords. </span></p><span data-dcnode-id="3102" instrument_node="">
</span><p data-dcnode-id="3094"><span data-dcnode-id="3101" instrument_node="">
</span><rubrik data-dcnode-id="3099"><span data-dcnode-id="3100" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="3098" instrument_node="">
</span><rating data-dcnode-id="3096"><span data-dcnode-id="3097" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3095" instrument_node="">
</span></p><span data-dcnode-id="3093" instrument_node="">
</span><p data-dcnode-id="3091"><span data-dcnode-id="3092" instrument_node="">The text does not appear inconsistent in its use of terms or framework. </span></p><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3082"><span data-dcnode-id="3089" instrument_node="">
</span><rubrik data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="3086" instrument_node="">
</span><rating data-dcnode-id="3084"><span data-dcnode-id="3085" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3083" instrument_node="">
</span></p><span data-dcnode-id="3081" instrument_node="">
</span><p data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">Another strength of this textbook is how well it is organized into smaller units. Each chapter consists of 3 or more units, which allows an instructor to include or exclude units given the flavor of the course. The internal organization of the units are very nicely broken into separate sections that focus on one central idea at a time without significant self-reference. </span></p><span data-dcnode-id="3078" instrument_node="">
</span><p data-dcnode-id="3070"><span data-dcnode-id="3077" instrument_node="">
</span><rubrik data-dcnode-id="3075"><span data-dcnode-id="3076" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="3074" instrument_node="">
</span><rating data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="3071" instrument_node="">
</span></p><span data-dcnode-id="3069" instrument_node="">
</span><p data-dcnode-id="3067"><span data-dcnode-id="3068" instrument_node="">The individual chapters are well organized. I like how the units within the chapters are organized, in that there is usually a broad opening unit, then a discussion of key concepts, how communication problems occur, then a ‘how to improve your communication’ units. This is very helpful if your aim is to teach a broad course to improve many facets of students’ communication. I do not find this as helpful if you aim is to teach an open survey of communication theory course, but the “improvement” units could be avoided in that case.
I found the placement of the public speaking chapters odd. I know the opening of the book lists 5 “forms” of communication (really, they are levels, not forms) and the organizational choice follow these levels. However, given the specificity of these units and how out of place they are with the nature of the survey of the field, it might make sense for them to be located at the end of the book.
</span></p><span data-dcnode-id="3066" instrument_node="">
</span><p data-dcnode-id="3058"><span data-dcnode-id="3065" instrument_node="">
</span><rubrik data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">Interface</span></rubrik><span data-dcnode-id="3062" instrument_node="">
</span><rating data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3059" instrument_node="">
</span></p><span data-dcnode-id="3057" instrument_node="">
</span><p data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">In terms of its production value, the book has clean imagines and is well constructed. It is easy to navigate given its table of contents. Hyperlinked table of contents to the chapters and units would be a nice feature, but the lack of it does not seem to limit the book.</span></p><span data-dcnode-id="3054" instrument_node="">
</span><p data-dcnode-id="3046"><span data-dcnode-id="3053" instrument_node="">
</span><rubrik data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">Grammatical Errors</span></rubrik><span data-dcnode-id="3050" instrument_node="">
</span><rating data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3047" instrument_node="">
</span></p><span data-dcnode-id="3045" instrument_node="">
</span><p data-dcnode-id="3043"><span data-dcnode-id="3044" instrument_node="">The textbook appears to use proper grammar and is free of writing mistakes.</span></p><span data-dcnode-id="3042" instrument_node="">
</span><p data-dcnode-id="3034"><span data-dcnode-id="3041" instrument_node="">
</span><rubrik data-dcnode-id="3039"><span data-dcnode-id="3040" instrument_node="">Cultural Relevance</span></rubrik><span data-dcnode-id="3038" instrument_node="">
</span><rating data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="3035" instrument_node="">
</span></p><span data-dcnode-id="3033" instrument_node="">
</span><p data-dcnode-id="3031"><span data-dcnode-id="3032" instrument_node="">I did not encounter any material that I deemed insensitive or offensive. Indeed, I appreciated that the textbook, in several of its “improving communication competence” units, went out of its way to suggest how students’ can correct their culturally insensitivity or offensive remarks. The only shortcoming of the text in this regard is that most of the communication discipline, we date the beginning of the study of communication to ancient Greece rather than earlier Egyptian culture. But that’s a much wider cultural bias of our field and not unique to this textbook.</span></p><span data-dcnode-id="3030" instrument_node="">
</span><p data-dcnode-id="3029"></p><span data-dcnode-id="3028" instrument_node="">
</span><rubrik data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">Comments</span></rubrik><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">This is a very good textbook if you are teaching a hybrid public speaking/communication competence course. Each chapter contains at least one unit that stresses how to improve communication in the 5 “forms” of communication outlined in the first chapter of the book. Also, the book would work well as an introductory survey to communication theory text if you chose to avoid the improvement units and much of the public speaking chapters. I wish the text included more about persuasion theory (either from humanistic or social science perspectives). If it did, it would be a stronger introductory survey book.  However, if you are interested in teaching an introduction to the field of communication studies course, the text’s lack of discussion of research perspectives, communication research questions, or the research process at all would require the instructor to include supplemental material in these areas.
I wish Chapter 3 on verbal language included more rhetorical/humanistic notions like framing, metaphors, symbolic action, constitutive effect, etc. I was surprised that it lacked this material.</span></p><span data-dcnode-id="3022" instrument_node="">
</span></div><span data-dcnode-id="3020" instrument_node="">
</span></div><span data-dcnode-id="3018" instrument_node="">
</span><div data-dcnode-id="2991" id="readMore2420" style="display:block;margin-bottom:30px;margin-top:15px"><span data-dcnode-id="3017" instrument_node="">
</span><a data-dcnode-id="3008" id="Review2420"><span data-dcnode-id="3016" instrument_node="">
</span><p data-dcnode-id="3010"><img data-dcnode-id="3015" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.umn.edu/assets/library/stars/star-whole-0012b777231ade4d1e85173aaa974ef4ca1679ce1727f00f84d5fb04c4ce774c.png&amp;raw" title="whole star"><img data-dcnode-id="3014" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.umn.edu/assets/library/stars/star-whole-0012b777231ade4d1e85173aaa974ef4ca1679ce1727f00f84d5fb04c4ce774c.png&amp;raw" title="whole star"><img data-dcnode-id="3013" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.umn.edu/assets/library/stars/star-whole-0012b777231ade4d1e85173aaa974ef4ca1679ce1727f00f84d5fb04c4ce774c.png&amp;raw" title="whole star"><img data-dcnode-id="3012" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.umn.edu/assets/library/stars/star-whole-0012b777231ade4d1e85173aaa974ef4ca1679ce1727f00f84d5fb04c4ce774c.png&amp;raw" title="whole star"><img data-dcnode-id="3011" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.umn.edu/assets/library/stars/star-whole-0012b777231ade4d1e85173aaa974ef4ca1679ce1727f00f84d5fb04c4ce774c.png&amp;raw" title="whole star"></p><span data-dcnode-id="3009" instrument_node="">

</span><reviewer data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">
Reviewed by Yuxiang Du, Assistant Professor, Fort Hays State University on 11/29/18
</span></reviewer><span data-dcnode-id="3003" instrument_node="">
</span></p><span data-dcnode-id="3001" instrument_node="">

</span><p data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">This textbook is more comprehensive than the ones I have used in my basic course classes. It is an ideal textbook for these hybrid courses (interpersonal and public speaking). I am very impressed with its scope and comprehensiveness. Within each topic (chapter), you can find most of important and relevant concepts and theories covered. The challenge for instructors and students might be getting through all the materials in each chapter within a week. However, it is better to have more materials to choose from than having less. </span></p><span data-dcnode-id="2960" instrument_node="">
</span><p data-dcnode-id="2952"><span data-dcnode-id="2959" instrument_node="">
</span><rubrik data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="2956" instrument_node="">
</span><rating data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2953" instrument_node="">
</span></p><span data-dcnode-id="2951" instrument_node="">
</span><p data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">The authors did a great job in achieving accuracy in the text. Theories and concepts covered in the book were accurately cited and discussed. </span></p><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2940"><span data-dcnode-id="2947" instrument_node="">

rating:
5
</span></rating><span data-dcnode-id="2941" instrument_node="">
</span></p><span data-dcnode-id="2939" instrument_node="">
</span><p data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">
It is clear to me that the authors made an effort to make this book relevant for students by including examples and stories that the students could relate to. Many of these examples are real world ones which could help students to apply what they learned in real life. These “getting real”, “getting critical”, and “getting plugged in” sections are quite helpful in this regard. As for longevity, there are some dated references and historical timelines in the book that should be updated in the future.
</span></p><span data-dcnode-id="2936" instrument_node="">

</span><p data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">The book showed great consistency in writing, chapter characteristics (length, details), tones, and flow. </span></p><span data-dcnode-id="2912" instrument_node="">

</span></p><span data-dcnode-id="2903" instrument_node="">
</span><p data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">Other than the first chapter, each chapter covers a different topic with chapters covering related topics located together. It is easy to pick a chapter or a group of chapters for a particular topic. </span></p><span data-dcnode-id="2900" instrument_node="">
</span><p data-dcnode-id="2892"><span data-dcnode-id="2899" instrument_node="">

</span></p><span data-dcnode-id="2891" instrument_node="">
</span><p data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">Placing public communication related chapters in the middle of the book is somewhat different from the ones I have used before. Usually you would find these chapters located at the end of the book. I also find four chapters are not enough for public speaking centered courses. At least, separate informative and persuasive speaking in two chapters. </span></p><span data-dcnode-id="2888" instrument_node="">

</span><p data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">I am satisfied with its interface. The only problem I have experienced is the hyperlinked materials in the book. I used a digital PDF copy and found that after I clicked and viewed a photo or a video, it could only return to the title page, not where I clicked in the text.  </span></p><span data-dcnode-id="2876" instrument_node="">
</span><p data-dcnode-id="2868"><span data-dcnode-id="2875" instrument_node="">

</span><p data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">I have not detected grammatical errors. </span></p><span data-dcnode-id="2864" instrument_node="">

</span></p><span data-dcnode-id="2855" instrument_node="">
</span><p data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">The authors’ effort in promoting cultural relevance in the book should be praised. The chapter on culture and communication was well written and consisted of important concepts and examples that could help students to build their cultural competence. The notion of culture and culture as a context was also frequently mentioned and discussed in other chapters such as verbal communication and communication in relationships.  </span></p><span data-dcnode-id="2852" instrument_node="">
</span><p data-dcnode-id="2851"></p><span data-dcnode-id="2850" instrument_node="">
</span><rubrik data-dcnode-id="2848"><span data-dcnode-id="2849" instrument_node="">Comments</span></rubrik><span data-dcnode-id="2847" instrument_node="">
</span><p data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">This book is a good textbook option for communication basic courses especially hybrid courses. Its comprehensiveness and real world examples can help students to understand basic communication concepts and apply them in real world situations. My only suggestion is to increase the portion on public speaking. </span></p><span data-dcnode-id="2844" instrument_node="">

</span><p data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">This textbook is very comprehensive. I have used it in my Intro to Communication Studies (both seated and online sections) for two semesters. I always omit a few chapters because it is so comprehensive and is too detailed for this particular course in the timeframe of a single semester.  

And that's a great thing! 

Additional details and thought-provoking comments come up in class discussions and papers, based on the depth and context of the textbook. It also prompts thoughtful research into the solid concepts that are covered in our reading, week to week. I really like this textbook for this reason!</span></p><span data-dcnode-id="2782" instrument_node="">
</span><p data-dcnode-id="2774"><span data-dcnode-id="2781" instrument_node="">
</span><rubrik data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="2778" instrument_node="">
</span><rating data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">
rating:
5

</span></p><span data-dcnode-id="2773" instrument_node="">
</span><p data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">This textbook is very accurate. I used a hard-copy resource previously and all the theories, models and concepts – and then some – are covered in this book... and covered quite thoroughly!</span></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2762"><span data-dcnode-id="2769" instrument_node="">
</span><rubrik data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="2766" instrument_node="">

rating:
4
</span></rating><span data-dcnode-id="2763" instrument_node="">
</span></p><span data-dcnode-id="2761" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">
This textbook is fabulously relevant in terms of the tried-and-true concepts and the bulk of it will hold up quite nicely, I predict. But some examples and language are a bit dated when it comes to technology as our language evolves so quickly for our online culture (e.g., "flaming" vs. "trolling"). The technology references often are not embedded in the text, but rather in the discussion questions at the end of each chapter and as standalone chapters toward the end of the textbook. A savvy move, making it easy for those of us who may update/remix the OER itself, but the core chapter readings occasionally seem a bit flat without the inclusion of these up-to-date examples.
</span></p><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2750"><span data-dcnode-id="2757" instrument_node="">
</span><rubrik data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="2754" instrument_node="">
</span><rating data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="2751" instrument_node="">
</span></p><span data-dcnode-id="2749" instrument_node="">
</span><p data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">The writing is clear and very easy to follow. The bulleted lists and charts with tips and guidelines for real-life communication scenarios are definitely the easiest to follow.  

In fact, the information is a bit dense/prose-heavy in the chapters without these visual aids, which may be intimidating for some students (despite the ease of reading overall). The subheads do break up the topics well and the images lighten things up, as well.</span></p><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2738"><span data-dcnode-id="2745" instrument_node="">
</span><rubrik data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="2742" instrument_node="">
</span><rating data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2739" instrument_node="">
</span></p><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">The consistency of this book is great. I knew just what to expect from the beginning in terms of the format of the chapters/sub-chapters. I like the end-of-chapter discussion questions and summaries and use them frequently when refreshing my memory from semester-to-semester or after a break as I head into lectures.</span></p><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2726"><span data-dcnode-id="2733" instrument_node="">
</span><rubrik data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="2730" instrument_node="">
</span><rating data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2727" instrument_node="">
</span></p><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">I teach this textbook in a different from the textbook and that's OK! I only do it because I teach public speaking early in the semester. This book is so modular, though, it's very easy to tailor to the flow of your own course. It does refer readers to different chapters within the text itself from time to time, so beware of that if you remix the chapters in your PDF (or other type of file) to be in the same order as your syllabus.</span></p><span data-dcnode-id="2722" instrument_node="">
</span><p data-dcnode-id="2714"><span data-dcnode-id="2721" instrument_node="">
</span><rubrik data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="2718" instrument_node="">

rating:
4
</span></rating><span data-dcnode-id="2715" instrument_node="">
</span></p><span data-dcnode-id="2713" instrument_node="">
</span><p data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">The book is easy to follow and the sub-chapters make it easy to assign reading to line up with specific  topics/class presentations or to mix and match the content for tailoring your own readings.  

The only thing on my wishlist is that technology topics be more integrated into the core of each chapter, rather than at the end of each. (Though I see the practical reasons, for update purposes, with how quickly technology evolves.)  

For example, Chapter 2 covers online self-presentation in a call-out box at the end of the chapter, but online personas on Instagram/Facebook are often the conversation starter my students need on the topic of impression management. Chapter 6 handles social media and self-disclosure in a similar way – and, again, these online examples are where my students most often and most readily draw comparisons to their real lives when we chat in person.</span></p><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2702"><span data-dcnode-id="2709" instrument_node="">
</span><rubrik data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">Interface</span></rubrik><span data-dcnode-id="2706" instrument_node="">
</span><rating data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="2703" instrument_node="">
</span></p><span data-dcnode-id="2701" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">Online use is very easy. My students typically review the PDF because they can view it on their phones. The links within the Table of Contents easily jumps them from topic to topic. The PDF file itself is a quick download in most cases. I haven't ever had an issue providing it on my learning portal to my students.  

The images are black-and-white-print-out-conscious and don’t lose any of their meaning when my budget-conscious students don't want to pay to print a color copy. I love this … it's the small things, right?</span></p><span data-dcnode-id="2698" instrument_node="">
</span><p data-dcnode-id="2690"><span data-dcnode-id="2697" instrument_node="">
</span><rubrik data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">Grammatical Errors</span></rubrik><span data-dcnode-id="2694" instrument_node="">
</span><rating data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2691" instrument_node="">
</span></p><span data-dcnode-id="2689" instrument_node="">
</span><p data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">I was a copy editor for many years so I am hard-wired to notice grammatical errors. I haven't seen any in this textbook. This makes for an added level of credibility and expertise and clearly indicates that the authors put in the time and care needed.  

I also appreciated the tips in the textbook for editing written communication, as they're the same tips I have always shared with my students.</span></p><span data-dcnode-id="2686" instrument_node="">
</span><p data-dcnode-id="2678"><span data-dcnode-id="2685" instrument_node="">
</span><rubrik data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">Cultural Relevance</span></rubrik><span data-dcnode-id="2682" instrument_node="">
</span><rating data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="2679" instrument_node="">
</span></p><span data-dcnode-id="2677" instrument_node="">
</span><p data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">This book does an excellent job of being culturally aware and relevant – and not just in the Cultural Communication chapter. For example, Chapter 2 covers self-perception in individualistic vs. collectivistic  societies and over racial/gender differences. Chapter 3, on Language, covers neologisms and slang (an important, fast-moving part of my students' lives). Chapter 4 covers language as culture examples from many countries – some that I hadn't heard before! The book also covers accent bias, code-switching and other real-life examples that my students (particularly those who are bilingual) experience daily.  

The LGBTQ+/same-sex marriage sections are a bit outdated, due to the publication date of the version of this book that I've been using.</span></p><span data-dcnode-id="2674" instrument_node="">
</span><p data-dcnode-id="2673"></p><span data-dcnode-id="2672" instrument_node="">
</span><rubrik data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">Comments</span></rubrik><span data-dcnode-id="2669" instrument_node="">
</span><p data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">If you have previously used any of the most popular and often-used Comm Studies books, you won't be disappointed. I love this book, both for how it supports the courses I had previously developed and also for how it adds to them with new concepts and examples. The online availability is a big benefit for my students and they let me know how much they appreciate the free option every semester. Even those who print hard copies find that the cost is comparably low, as well.</span></p><span data-dcnode-id="2666" instrument_node="">
</span></div><span data-dcnode-id="2664" instrument_node="">

</span></p><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">I appreciate the comprehensiveness of this text. In addition to including all of the typical topics taught in an introductory hybrid course, the text includes chapters on mass media and technology, as well as how new media impacts our self and our relationships. These topics are increasingly important for students in Communication courses, and I'm happy to see it included in this text. </span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2596"><span data-dcnode-id="2603" instrument_node="">
</span><rubrik data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="2600" instrument_node="">
</span><rating data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2597" instrument_node="">
</span></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">All content is consistent with well-known and credible research for each topic. </span></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2584"><span data-dcnode-id="2591" instrument_node="">
</span><rubrik data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="2588" instrument_node="">
</span><rating data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="2585" instrument_node="">
</span></p><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">
The content is relevant for today's students. There are some examples that might date the content to the 2000's and 2010's, but I don't anticipate that being a problem in the near future. While I appreciate the addition of the media chapters, those will need to be updated more frequently to reflect our evolving technological and social world. Finally, some links throughout the text do not work which can be frustrating for students and give the perception that the text is not up-to-date.
</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2572"><span data-dcnode-id="2579" instrument_node="">
</span><rubrik data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="2576" instrument_node="">
</span><rating data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2573" instrument_node="">
</span></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">The accessible prose is one of the most attractive features of this text. For students in an introductory course, the text needs to be readable and interesting. The language used to discuss most of the topics is academic yet informal. I think students will appreciate and enjoy the colloquial approach throughout the text. </span></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2560"><span data-dcnode-id="2567" instrument_node="">
</span><rubrik data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="2564" instrument_node="">
</span><rating data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2561" instrument_node="">
</span></p><span data-dcnode-id="2559" instrument_node="">
</span><p data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">There is consistency throughout this text. Each chapter is framed similarly which makes it user-friendly and easy to read. I like the learning objectives to start each chapter, and the key takeaways and exercises at the end of each chapter. Some chapters have more images and links than others. The ones with more included media are likely preferred by students. </span></p><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2548"><span data-dcnode-id="2555" instrument_node="">
</span><rubrik data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="2552" instrument_node="">
</span><rating data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="2549" instrument_node="">
</span></p><span data-dcnode-id="2547" instrument_node="">
</span><p data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">This is a big textbook, with some long chapters. However, the sub-headings make it easy to assign certain topics at different points throughout the course. It would be fairly easy to rearrange chapters, and even some topics within chapters, without disrupting the reading flow for students. </span></p><span data-dcnode-id="2544" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2543" instrument_node="">
</span><rubrik data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="2540" instrument_node="">

rating:
4

</span></p><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">I am used to teaching the Introductory course in a different order than it is presented in this textbook. I think many instructors rearrange the topics in this course to meet their scheduling needs, assignment needs, and individual preferences. So while I would reorder the chapters, I find this textbook to be in line with existing Intro textbooks. </span></p><span data-dcnode-id="2532" instrument_node="">
</span><p data-dcnode-id="2524"><span data-dcnode-id="2531" instrument_node="">

</span></p><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">I appreciate the interface of this text and the different options for reading. Moving from chapter to chapter, or topic to topic is easy with this interface. Some of the links do not work, though. </span></p><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2512"><span data-dcnode-id="2519" instrument_node="">

</span><rating data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="2501" instrument_node="">
</span></p><span data-dcnode-id="2499" instrument_node="">
</span><p data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">A variety of perspectives are included in this text, and the language is inclusive. Like most other texts, it could include more diversity in authors quotes, images used, and videos presented. </span></p><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2495"></p><span data-dcnode-id="2494" instrument_node="">
</span><rubrik data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Comments</span></rubrik><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">This is a very good option for an Introductory course textbook. I would have no hesitation adopting this book and I believe students would benefit from the comprehensive content, user-friendliness, and cost savings. </span></p><span data-dcnode-id="2488" instrument_node="">

</span><p data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">This text appears to cover all general areas and ideas within the communication field appropriate for an introductory level course. Although the goal of an introductory text is to provide just that -- an introduction -- I felt as though some topics were too surface-level and could have benefitted from a bit more detail. There is not an index or glossary, but I cannot speak to how often those are used in online texts, particularly when the text can be downloaded as a PDF and searched. </span></p><span data-dcnode-id="2426" instrument_node="">

I feel as though the textbook content is up-to-date and has high relevance, as well as potential for longevity. Some areas of the text will need to be updated (e.g., current examples used), but that is par for the course. It seems as though the text is arranged in such a way that necessary updates will be relatively easy to implement.

</span><p data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">The text is written in lucid, accessible prose with a college student audience in mind. Jargon is adequately defined. In teaching my students the benefit of using non-technical language in their essays and speeches, I point to the language used in the textbook as a good example. </span></p><span data-dcnode-id="2390" instrument_node="">

</span><a aria-label="Expand review by Jade Olson, Lecturer, University of Maryland" class="link" data-dcnode-id="2289" onclick="util.doubleToggle(reviewTag1589,readMore1589)"><span data-dcnode-id="2290" instrument_node="">read more</span></a><span data-dcnode-id="2288" instrument_node="">

</span><p data-dcnode-id="2276"><img data-dcnode-id="2281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.umn.edu/assets/library/stars/star-whole-0012b777231ade4d1e85173aaa974ef4ca1679ce1727f00f84d5fb04c4ce774c.png&amp;raw" title="whole star"><img data-dcnode-id="2280" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.umn.edu/assets/library/stars/star-whole-0012b777231ade4d1e85173aaa974ef4ca1679ce1727f00f84d5fb04c4ce774c.png&amp;raw" title="whole star"><img data-dcnode-id="2279" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.umn.edu/assets/library/stars/star-whole-0012b777231ade4d1e85173aaa974ef4ca1679ce1727f00f84d5fb04c4ce774c.png&amp;raw" title="whole star"><img data-dcnode-id="2278" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.umn.edu/assets/library/stars/star-whole-0012b777231ade4d1e85173aaa974ef4ca1679ce1727f00f84d5fb04c4ce774c.png&amp;raw" title="whole star"><img data-dcnode-id="2277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//open.umn.edu/assets/library/stars/star-half-e01a2b57451ff720c2e1cfa90d747cd8c6fcd0ac3653d0c26dd66ad8040f4aa2.png&amp;raw" title="half star"></p><span data-dcnode-id="2275" instrument_node="">
