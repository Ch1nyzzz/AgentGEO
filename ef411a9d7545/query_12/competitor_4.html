</span><p data-dcnode-id="7387"><span data-dcnode-id="7388" instrument_node="">Communication in the Real World is a comprehensive textbook for an introductory communication course. The textbook includes the standard topics addressed in typical 100-level speech courses. Something this textbook lacks is an index or glossary; however, I did not find this to be an issue.</span></p><span data-dcnode-id="7386" instrument_node="">
</span><p data-dcnode-id="7378"><span data-dcnode-id="7385" instrument_node="">
</span><rubrik data-dcnode-id="7383"><span data-dcnode-id="7384" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="7382" instrument_node="">
</span><rating data-dcnode-id="7380"><span data-dcnode-id="7381" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="7379" instrument_node="">
</span></p><span data-dcnode-id="7377" instrument_node="">
</span><p data-dcnode-id="7375"><span data-dcnode-id="7376" instrument_node="">The content reflects current communication research. This textbook provides a nice introduction to major communication concepts, theories, and principles and provides a solid foundation for class discussions and activities. I found the content to be error-free and unbiased.</span></p><span data-dcnode-id="7374" instrument_node="">
</span><p data-dcnode-id="7366"><span data-dcnode-id="7373" instrument_node="">
</span><rubrik data-dcnode-id="7371"><span data-dcnode-id="7372" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="7370" instrument_node="">
</span><rating data-dcnode-id="7368"><span data-dcnode-id="7369" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="7367" instrument_node="">
</span></p><span data-dcnode-id="7365" instrument_node="">
</span><p data-dcnode-id="7363"><span data-dcnode-id="7364" instrument_node="">
This textbook was published in 2016, so an update with more contemporary examples would be nice. For instance, I think Chapters 15 and 16 (media, technology, communication) could use an update. A lot has changed in 6 years. However, instructors can easily develop supplementary materials with contemporary examples to increase relevancy for their students.
</span></p><span data-dcnode-id="7362" instrument_node="">
</span><p data-dcnode-id="7354"><span data-dcnode-id="7361" instrument_node="">
</span><rubrik data-dcnode-id="7359"><span data-dcnode-id="7360" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="7358" instrument_node="">
</span><rating data-dcnode-id="7356"><span data-dcnode-id="7357" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="7355" instrument_node="">
</span></p><span data-dcnode-id="7353" instrument_node="">
</span><p data-dcnode-id="7351"><span data-dcnode-id="7352" instrument_node="">The writing of this textbook is clear and concise. All course terminology is properly explained.</span></p><span data-dcnode-id="7350" instrument_node="">
</span><p data-dcnode-id="7342"><span data-dcnode-id="7349" instrument_node="">
</span><rubrik data-dcnode-id="7347"><span data-dcnode-id="7348" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="7346" instrument_node="">
</span><rating data-dcnode-id="7344"><span data-dcnode-id="7345" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="7343" instrument_node="">
</span></p><span data-dcnode-id="7341" instrument_node="">
</span><p data-dcnode-id="7339"><span data-dcnode-id="7340" instrument_node="">The textbook is consistent in terms of terminology and framework. Additionally, I appreciated the consistent layout of each chapter. I liked how each chapter opened with the learning objectives and closed with key takeaways and exercises. I also liked how each chapter included a section that addressed real-world applications.</span></p><span data-dcnode-id="7338" instrument_node="">

</span><rating data-dcnode-id="7332"><span data-dcnode-id="7333" instrument_node="">
rating:

</span></rating><span data-dcnode-id="7331" instrument_node="">
</span></p><span data-dcnode-id="7329" instrument_node="">
</span><p data-dcnode-id="7327"><span data-dcnode-id="7328" instrument_node="">Communication in the Real World is divided into chapters with multiple sections. Instructors can obtain links for the entire textbook, specific chapter, or even specific sections within each chapter. I appreciated this functionality. I liked that the textbook is divisible and customizable. In addition to allowing instructors to choose with sections they address, instructors can easily reorder the sections to their liking.</span></p><span data-dcnode-id="7326" instrument_node="">
</span><p data-dcnode-id="7318"><span data-dcnode-id="7325" instrument_node="">

</span></p><span data-dcnode-id="7317" instrument_node="">
</span><p data-dcnode-id="7315"><span data-dcnode-id="7316" instrument_node="">The textbook uses a clear and consistent organizational pattern for each chapter. However, I think informative speaking and persuasive speaking should have been separate chapters instead of combined into one chapter. Additionally, I think this textbook would have benefited from an index or glossary.</span></p><span data-dcnode-id="7314" instrument_node="">

</span><p data-dcnode-id="7303"><span data-dcnode-id="7304" instrument_node="">I found the interface user-friendly. I thought the textbook was easy to navigate. All links worked and I did not experience problems accessing the material. However, I think the textbook could be more visually appealing.</span></p><span data-dcnode-id="7302" instrument_node="">

</span><p data-dcnode-id="7209"><span data-dcnode-id="7210" instrument_node="">The Communication in the Real World text is an effective textbook for students in two-year programs and introductory communication courses at four-year institutions.  Too often, texts try to accomplish too much in one course.  This textbook allows for a greater understanding and growth in the discipline of communication studies. One advantage of the text is the assessments, cases, discussion questions and exercises can be accomplished in a semester.</span></p><span data-dcnode-id="7208" instrument_node="">
</span><p data-dcnode-id="7200"><span data-dcnode-id="7207" instrument_node="">
</span><rubrik data-dcnode-id="7205"><span data-dcnode-id="7206" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="7204" instrument_node="">
</span><rating data-dcnode-id="7202"><span data-dcnode-id="7203" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="7201" instrument_node="">
</span></p><span data-dcnode-id="7199" instrument_node="">
</span><p data-dcnode-id="7197"><span data-dcnode-id="7198" instrument_node="">The major content areas are fully covered in an introduction communication studies course. The book is accurate, research-based and up-to-date with communication information supported with citations and references. The communication concepts, principles and theories are accurate which includes relevant sources. The text provides a nice foundation for class discussions and lectures. Sources are referenced at the end of every chapter. The author writes with consistent, inclusive language. There was no evidence of bias or errors that I detected, perhaps more diversity in photographs are encouraged.</span></p><span data-dcnode-id="7196" instrument_node="">
</span><p data-dcnode-id="7188"><span data-dcnode-id="7195" instrument_node="">
</span><rubrik data-dcnode-id="7193"><span data-dcnode-id="7194" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="7192" instrument_node="">
</span><rating data-dcnode-id="7190"><span data-dcnode-id="7191" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="7189" instrument_node="">
</span></p><span data-dcnode-id="7187" instrument_node="">
</span><p data-dcnode-id="7185"><span data-dcnode-id="7186" instrument_node="">
The textbook includes the necessary content for an introductory communication course. The framework and organizational structure of the text is arranged in a manner that any updates could easily be implemented. Political and social references can easily be updated through contemporary examples and issues in media.  Instructors can supplement contemporary information to increase relevance for their students.
</span></p><span data-dcnode-id="7184" instrument_node="">
</span><p data-dcnode-id="7176"><span data-dcnode-id="7183" instrument_node="">
</span><rubrik data-dcnode-id="7181"><span data-dcnode-id="7182" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="7180" instrument_node="">
</span><rating data-dcnode-id="7178"><span data-dcnode-id="7179" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="7177" instrument_node="">
</span></p><span data-dcnode-id="7175" instrument_node="">
</span><p data-dcnode-id="7173"><span data-dcnode-id="7174" instrument_node="">Communication in the Real World - An Introduction to Communication Studies is a well-written text.  The textbook’s approach helps students transfer and apply the skills learned from the text to their future academic and professional environments.  In addition, the textbook emphasizes practical application and is written in a manner that is easily understood.  The design of the book is inviting.  The writing style is reader-friendly and the presentation is appropriate for my students. The major strength of the text is the user-friendly, conversational method/style of the text.  I stress the need for my students to become critical consumers of communication, as well as producers, and this text helps with that task.</span></p><span data-dcnode-id="7172" instrument_node="">
</span><p data-dcnode-id="7164"><span data-dcnode-id="7171" instrument_node="">
</span><rubrik data-dcnode-id="7169"><span data-dcnode-id="7170" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="7168" instrument_node="">
</span><rating data-dcnode-id="7166"><span data-dcnode-id="7167" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="7165" instrument_node="">
</span></p><span data-dcnode-id="7163" instrument_node="">
</span><p data-dcnode-id="7161"><span data-dcnode-id="7162" instrument_node="">There is consistency in the layout of this text. The chapters are consistent in flow, language, organization and structure. Each chapter is arranged in a way that is well-organized. Each section is clearly labeled and begins with Learning Objectives and ends with Key Takeaways, Exercises, and a bibliography (references).  I like "Exercise" sections where students are given activities and questions to promote application and understanding.</span></p><span data-dcnode-id="7160" instrument_node="">
</span><p data-dcnode-id="7152"><span data-dcnode-id="7159" instrument_node="">
</span><rubrik data-dcnode-id="7157"><span data-dcnode-id="7158" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="7156" instrument_node="">
</span><rating data-dcnode-id="7154"><span data-dcnode-id="7155" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="7153" instrument_node="">
</span></p><span data-dcnode-id="7151" instrument_node="">
</span><p data-dcnode-id="7149"><span data-dcnode-id="7150" instrument_node="">The outline of the book is impressive. The textbook is broken down into logical and manageable sections that could be divided for instructors and students. The text is readily divisible with reading sections and sub- headings that are precise and uncomplicated.  The headings of each module provide structure to the text. The text has several headers and sub-headers that are logical and consistent across chapters, as well as "key takeaways" at the end of each section. An instructor could easily break down a chapter into smaller assignments for students without causing high levels of confusion. The text is divided into sections that can easily be reordered as desired, and the chapters make sense as arranged in each module. There are no areas with large “sections” of text with an overload of written material that require further subdivision. The learning objectives are implemented with ease and flow.</span></p><span data-dcnode-id="7148" instrument_node="">
</span><p data-dcnode-id="7140"><span data-dcnode-id="7147" instrument_node="">
</span><rubrik data-dcnode-id="7145"><span data-dcnode-id="7146" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="7144" instrument_node="">
</span><rating data-dcnode-id="7142"><span data-dcnode-id="7143" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="7141" instrument_node="">
</span></p><span data-dcnode-id="7139" instrument_node="">
</span><p data-dcnode-id="7137"><span data-dcnode-id="7138" instrument_node="">The book is thoughtfully organized with a clear and simple structure.  The textbook is in line with existing Introduction to Communication textbooks. The book nicely aligns with how I already structure my own class. This is an effective book as it will allow you to provide information that consistently builds upon the information before it.   Finally, the learning objectives at the beginning of each chapter and the discussion questions and key takeaways at the end assist with applying theory into practical application.</span></p><span data-dcnode-id="7136" instrument_node="">
</span><p data-dcnode-id="7128"><span data-dcnode-id="7135" instrument_node="">
</span><rubrik data-dcnode-id="7133"><span data-dcnode-id="7134" instrument_node="">Interface</span></rubrik><span data-dcnode-id="7132" instrument_node="">
</span><rating data-dcnode-id="7130"><span data-dcnode-id="7131" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="7129" instrument_node="">
</span></p><span data-dcnode-id="7127" instrument_node="">
</span><p data-dcnode-id="7125"><span data-dcnode-id="7126" instrument_node="">The interface is user-friendly. The textbook exhibits no interface issues. Images, illustrations and pictures are not distorted. They are appropriate and clear. Links are active and in working order at the time of review. Furthermore, illustrations and images add interest and divides lengthy text sections. The text is visually appealing. Navigation was easy and user-friendly.  In summary, the book is well constructed and the various formats available are easily accessible to the reader.</span></p><span data-dcnode-id="7124" instrument_node="">
</span><p data-dcnode-id="7116"><span data-dcnode-id="7123" instrument_node="">
</span><rubrik data-dcnode-id="7121"><span data-dcnode-id="7122" instrument_node="">Grammatical Errors</span></rubrik><span data-dcnode-id="7120" instrument_node="">
</span><rating data-dcnode-id="7118"><span data-dcnode-id="7119" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="7117" instrument_node="">
</span></p><span data-dcnode-id="7115" instrument_node="">
</span><p data-dcnode-id="7113"><span data-dcnode-id="7114" instrument_node="">The text is thorough and well-written. I did not note any grammatical errors during my review of the text.</span></p><span data-dcnode-id="7112" instrument_node="">
</span><p data-dcnode-id="7104"><span data-dcnode-id="7111" instrument_node="">
</span><rubrik data-dcnode-id="7109"><span data-dcnode-id="7110" instrument_node="">Cultural Relevance</span></rubrik><span data-dcnode-id="7108" instrument_node="">
</span><rating data-dcnode-id="7106"><span data-dcnode-id="7107" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="7105" instrument_node="">
</span></p><span data-dcnode-id="7103" instrument_node="">
</span><p data-dcnode-id="7101"><span data-dcnode-id="7102" instrument_node="">The book is inclusive and is fairly appealing to all races, ethnicity, and backgrounds.  The text is not culturally insensitive or offensive.</span></p><span data-dcnode-id="7100" instrument_node="">
</span><p data-dcnode-id="7099"></p><span data-dcnode-id="7098" instrument_node="">
</span><rubrik data-dcnode-id="7096"><span data-dcnode-id="7097" instrument_node="">Comments</span></rubrik><span data-dcnode-id="7095" instrument_node="">
</span><p data-dcnode-id="7093"><span data-dcnode-id="7094" instrument_node="">Students of, and practitioners in, the field of communication studies will find this text a valuable learning tool.  The work is easy to follow and understand.  Also, valuable information and learning arenas are presented.  The exercises allow enough opportunity for the mind to expand and the student to become creative.  Overall, this is a very good text for students enrolled in an introduction to communication studies course.  I highly recommend the text.</span></p><span data-dcnode-id="7092" instrument_node="">
</span></div><span data-dcnode-id="7090" instrument_node="">

</span><p data-dcnode-id="6859"><span data-dcnode-id="6860" instrument_node="">This book is very thorough and comprehensive as it begins discussing communication since 3500BCE up until today's new media components. It had areas that discussed how students could use this information in specific other courses and in the business world. I thought this was very effective. Each chapter had subsections that delved into the details of the overriding chapter topic. However, I did not see an index nor a glossary. These would have been very helpful if they had been included. I also would have liked an entire chapter written on the informative speeches and demonstration speeches since these are an important parts of my classwork.</span></p><span data-dcnode-id="6858" instrument_node="">
</span><p data-dcnode-id="6850"><span data-dcnode-id="6857" instrument_node="">

rating:
5

</span></p><span data-dcnode-id="6849" instrument_node="">
</span><p data-dcnode-id="6847"><span data-dcnode-id="6848" instrument_node="">I found the book's topics to be accurately discussed and error-free. It was also unbiased and offered chapters that covered ethics and sensitivity to culture and how to understand, communicate and appreciate diversity at all levels.</span></p><span data-dcnode-id="6846" instrument_node="">
</span><p data-dcnode-id="6838"><span data-dcnode-id="6845" instrument_node="">

</span></p><span data-dcnode-id="6837" instrument_node="">
</span><p data-dcnode-id="6835"><span data-dcnode-id="6836" instrument_node="">
For the most part this book was very up-to-date. In the past I have had communication books directly quote current USA presidents or other popular political leaders of the time. I didn't see that here as much which in one way would make it less important for updating to more current political times. There was one mention of a popular TV program, law and Order which ended in 2010 so perhaps a more current reference could have been utilized.
</span></p><span data-dcnode-id="6834" instrument_node="">
</span><p data-dcnode-id="6826"><span data-dcnode-id="6833" instrument_node="">
</span><rubrik data-dcnode-id="6831"><span data-dcnode-id="6832" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="6830" instrument_node="">

</span></p><span data-dcnode-id="6825" instrument_node="">
</span><p data-dcnode-id="6823"><span data-dcnode-id="6824" instrument_node="">I really enjoyed how clear the writing, chapter divisions and other components of this text were presented. The text provided many interesting features that kept my interest and would also keep the interest of students.  There were clear explanations/definitions of terms especially in the chapter on new media. Key new phrases or terms are in bold and followed by definitions and more detailed explanations of the terms. There are also special sections entitled Getting Critical or Getting Competent where personal stories from the author are included to make the information clearer yet. In these sections there are questions for students to think critically about and respond to that would help clarify concepts and their application in various circumstances.</span></p><span data-dcnode-id="6822" instrument_node="">
</span><p data-dcnode-id="6814"><span data-dcnode-id="6821" instrument_node="">
</span><rubrik data-dcnode-id="6819"><span data-dcnode-id="6820" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="6818" instrument_node="">

rating:
5

</span></p><span data-dcnode-id="6813" instrument_node="">
</span><p data-dcnode-id="6811"><span data-dcnode-id="6812" instrument_node="">I like the way that each major chapter is divided into either 3, 4 or one includes 7 sub chapters that delve into more detailed information. Most of the chapters had four sub chapters. This made the book very detailed and comprehensive as mentioned before and the way it was divided into these specific frameworks made it consistent. Each chapter ended with a section called Key Take Aways which I thought was a great review of what the important concepts of the chapter were. Also,  the chapters had "Exercise" sections where students were given activities and questions to help further their understanding.</span></p><span data-dcnode-id="6810" instrument_node="">
</span><p data-dcnode-id="6802"><span data-dcnode-id="6809" instrument_node="">

</span></p><span data-dcnode-id="6801" instrument_node="">
</span><p data-dcnode-id="6799"><span data-dcnode-id="6800" instrument_node="">As mentioned previously, the main chapters had 3, 4, or 7 sub chapters within them. Even these had many section divisions that were clearly indicated by a topic title in bold, larger font letters such as "Interpersonal Communication" or "Intrapersonal Communication" that would be followed with plenty of detailed information about those highlighted headings. This made the text easy to mentally digest as the smaller, clearly indicated sections were not too lengthy with too many new concepts introduced. I believe these could be easily reorganized and realigned within the course itself.</span></p><span data-dcnode-id="6798" instrument_node="">

</span></p><span data-dcnode-id="6789" instrument_node="">
</span><p data-dcnode-id="6787"><span data-dcnode-id="6788" instrument_node="">I found the book very well organized since it started with the historical background of communication and ended with new media, technology and communication in today's world. You could go to any chapter and be sure that it would be appropriately divided into the various sub chapters and headings that would further explain the major topic. There were 16 chapters that covered a multitude of communication circumstances, usages, situations and strategies that were all clearly and logically laid out for easy student comprehension. Each chapter had colorful photos, images or charts/graphs to further assist in students understanding.</span></p><span data-dcnode-id="6786" instrument_node="">

</span><p data-dcnode-id="6751"><span data-dcnode-id="6752" instrument_node="">The book actually had chapters/sub chapters that dealt with handling diversity in audiences, groups and workplaces, so it was culturally sensitive. It had quite a few of the photos and images that included people of color although I think the majority of photos were of white people. The examples that included different ethnicities, races and backgrounds often had to do with actual topics that were covering race, biracial and interracial issues.</span></p><span data-dcnode-id="6750" instrument_node="">
</span><p data-dcnode-id="6749"></p><span data-dcnode-id="6748" instrument_node="">
</span><rubrik data-dcnode-id="6746"><span data-dcnode-id="6747" instrument_node="">Comments</span></rubrik><span data-dcnode-id="6745" instrument_node="">
</span><p data-dcnode-id="6743"><span data-dcnode-id="6744" instrument_node="">I think this would be a great book for a general communication course that dealt with the wide variety of communication types/topics as it provided a very detailed and broad coverage of many areas since 3500 BCE. However, I would not choose this book for my class on Public Speaking since it did not have enough detailed information on the various speeches that I teach, visual aids and components to be used in speech creation and delivery. It did have some of this particularly for the information and persuasive type of speeches, but I do more than those.</span></p><span data-dcnode-id="6742" instrument_node="">

</span><p data-dcnode-id="6681"><span data-dcnode-id="6682" instrument_node="">This textbook is an undergraduate-level textbook that is comprehensive about introductory communication with five primary types: intrapersonal, interpersonal, group, public, and mass communication. The contents were precise in the PDF version. The online version had a sidebar that included a clear list of the contents. An index and glossary would improve the comprehensiveness. The learning objectives at the start of each chapter are fabulous.</span></p><span data-dcnode-id="6680" instrument_node="">

</span><p data-dcnode-id="6669"><span data-dcnode-id="6670" instrument_node="">The textbook includes mostly accurate communication information with supporting evidence citations and references. Including more representation of cultures would improve the accuracy.</span></p><span data-dcnode-id="6668" instrument_node="">

</span><p data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">The format of the chapters throughout the Communication in the Real World: An Introduction to Communication Studies is consistent. Each chapter includes headings with sub-sections to organize the content into easy-to-read chunks of information. Each chapter starts with an introduction, then learning objectives, content, pictures, and ends with key takeaways, exercises, and references.</span></p><span data-dcnode-id="6620" instrument_node="">
</span><p data-dcnode-id="6612"><span data-dcnode-id="6619" instrument_node="">

rating:
5

</span></p><span data-dcnode-id="6611" instrument_node="">
</span><p data-dcnode-id="6609"><span data-dcnode-id="6610" instrument_node="">The topics in the text include a logical presentation. The text consists of a Table of Contents page that is helpful and easy to follow (sidebar on online version and front of text in PDF version). The learning objectives at the start of chapters are fabulous. Vocabulary words in the text are bolded. I like the use of videos per video link. Other strengths are the key takeaways, exercises, and references at the end of each chapter. Tables, images, and figures used are helpful to communicate the information.</span></p><span data-dcnode-id="6608" instrument_node="">
</span><p data-dcnode-id="6600"><span data-dcnode-id="6607" instrument_node="">

</span><p data-dcnode-id="6597"><span data-dcnode-id="6598" instrument_node="">The text is free of significant interface issues, including navigation problems, distortion of images/charts, and any other display features that may distract or confuse the reader. The links were all in working order.</span></p><span data-dcnode-id="6596" instrument_node="">

</span><p data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">The text does include passive voice diction and split infinitives. Some nouns lack a determiner. However, writing styles vary from one discipline to another.</span></p><span data-dcnode-id="6584" instrument_node="">

</span></p><span data-dcnode-id="6575" instrument_node="">
</span><p data-dcnode-id="6573"><span data-dcnode-id="6574" instrument_node="">Cultural responsive pedagogy is an area for improvement. Some of the references to gender and race are less personal in the text than perhaps in reality. The images used of people are biased as most are of White people. Revising the text with the incorporation of a diverse mix of people in photos is a suggestion.</span></p><span data-dcnode-id="6572" instrument_node="">
</span><p data-dcnode-id="6571"></p><span data-dcnode-id="6570" instrument_node="">
</span><rubrik data-dcnode-id="6568"><span data-dcnode-id="6569" instrument_node="">Comments</span></rubrik><span data-dcnode-id="6567" instrument_node="">
</span><p data-dcnode-id="6565"><span data-dcnode-id="6566" instrument_node="">Communication in the Real World: An Introduction to Communication Studies is overall a good introductory textbook. Increasing the images to be diverse would improve the book overall. Many thanks for the work to create this text!</span></p><span data-dcnode-id="6564" instrument_node="">

</span><p data-dcnode-id="6503"><span data-dcnode-id="6504" instrument_node="">For any institution or educator looking for a textbook that covers both communication theory and skill-building, this book is an excellent resource. Beyond the initial discussions of communication as a concept and phenomenon, the text covers various forms and contexts of communication that are necessary content in an introductory communication studies course.</span></p><span data-dcnode-id="6502" instrument_node="">

</span><p data-dcnode-id="6491"><span data-dcnode-id="6492" instrument_node="">On the whole, the material in each chapter is clearly drawn from established communication research and theory. Quite obviously, as communication technologies and cultures change, some aspects of the material may need to be supplemented in class discussions or through supplemental readings. Likewise, chapter 8.2 (in the Culture and Communication section) is a bit problematic in its discussion of race, gender, sexuality, and ability, mainly in terms of its causal logics. In other words, the chapter seems to make an essentialist claim - race is itself a cultural identity, rather than being a product of culture (or discursively shaped by culture).</span></p><span data-dcnode-id="6490" instrument_node="">

</span></p><span data-dcnode-id="6481" instrument_node="">
</span><p data-dcnode-id="6479"><span data-dcnode-id="6480" instrument_node="">
As noted above, the textbook covers a wide breadth of communicative forms and contexts, making it relevant for students, irrespective of the major or career trajectory. Likewise, the sections on mass communication do address the evolution of media, along with a sense of old versus new media technologies, but some minor updates in response to new trends may be helpful for students. In terms of public speaking skills, the textbook does include a section on speaking on radio and television that can be adapted to discussions about speeches and interviews via Zoom and other online platforms.
</span></p><span data-dcnode-id="6478" instrument_node="">
</span><p data-dcnode-id="6470"><span data-dcnode-id="6477" instrument_node="">
</span><rubrik data-dcnode-id="6475"><span data-dcnode-id="6476" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="6474" instrument_node="">
</span><rating data-dcnode-id="6472"><span data-dcnode-id="6473" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="6471" instrument_node="">
</span></p><span data-dcnode-id="6469" instrument_node="">
</span><p data-dcnode-id="6467"><span data-dcnode-id="6468" instrument_node="">The textbook is certainly accessible to a range of learners, using vocabulary that retains complexity without losing conceptual integrity. In various ways, diagrams and images throughout the chapters often help to illustrate basic concepts, and sample outlines/speeches are provided in the later sections on public speaking.</span></p><span data-dcnode-id="6466" instrument_node="">
</span><p data-dcnode-id="6458"><span data-dcnode-id="6465" instrument_node="">
</span><rubrik data-dcnode-id="6463"><span data-dcnode-id="6464" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="6462" instrument_node="">

rating:
5
</span></rating><span data-dcnode-id="6459" instrument_node="">
</span></p><span data-dcnode-id="6457" instrument_node="">
</span><p data-dcnode-id="6455"><span data-dcnode-id="6456" instrument_node="">Each chapter is structured well and organized in a consistent manner, generally begin with broad concepts and then covering more specific topics or theories. Chapters then end with clear summaries and discussion questions for class prompts or for homework.</span></p><span data-dcnode-id="6454" instrument_node="">
</span><p data-dcnode-id="6446"><span data-dcnode-id="6453" instrument_node="">
</span><rubrik data-dcnode-id="6451"><span data-dcnode-id="6452" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="6450" instrument_node="">
</span><rating data-dcnode-id="6448"><span data-dcnode-id="6449" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="6447" instrument_node="">
</span></p><span data-dcnode-id="6445" instrument_node="">
</span><p data-dcnode-id="6443"><span data-dcnode-id="6444" instrument_node="">The textbook is exceptionally divisible into a weekly or even daily units, and the subdivisions within chapters allows instructors to take a deep dive into a topic area (assigning all sections of a chapter) or lets them introduce basic concepts quickly (assigning only the first one or two chapter sections).</span></p><span data-dcnode-id="6442" instrument_node="">
</span><p data-dcnode-id="6434"><span data-dcnode-id="6441" instrument_node="">
</span><rubrik data-dcnode-id="6439"><span data-dcnode-id="6440" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="6438" instrument_node="">
</span><rating data-dcnode-id="6436"><span data-dcnode-id="6437" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="6435" instrument_node="">
</span></p><span data-dcnode-id="6433" instrument_node="">
</span><p data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">The organization of the textbook fit perfectly into the flow of my introductory communication studies course, splitting the semester into one half about theory and topics and the second half about public speaking skill-building. Within those sections, the structure makes sense as broad concepts first and then specific topics (or speaking genres) second.</span></p><span data-dcnode-id="6430" instrument_node="">
</span><p data-dcnode-id="6422"><span data-dcnode-id="6429" instrument_node="">
</span><rubrik data-dcnode-id="6427"><span data-dcnode-id="6428" instrument_node="">Interface</span></rubrik><span data-dcnode-id="6426" instrument_node="">
</span><rating data-dcnode-id="6424"><span data-dcnode-id="6425" instrument_node="">
rating:
5

</span></p><span data-dcnode-id="6421" instrument_node="">
</span><p data-dcnode-id="6419"><span data-dcnode-id="6420" instrument_node="">I have only used the pdf version of the textbook, but the integrity of the document seemed perfect - text is clear, and images are not pixelated. The table of contents is also dynamic, allowing readers to click on page numbers and jump to sections of the textbook (without scrolling through entire document manually). Other versions of the text are available on the U of MN OER page, which would seem to allow for even greater functionality as well.</span></p><span data-dcnode-id="6418" instrument_node="">

</span><rubrik data-dcnode-id="6403"><span data-dcnode-id="6404" instrument_node="">Cultural Relevance</span></rubrik><span data-dcnode-id="6402" instrument_node="">

</span></p><span data-dcnode-id="6397" instrument_node="">
</span><p data-dcnode-id="6395"><span data-dcnode-id="6396" instrument_node="">As noted above, the chapter 8.2 section does have some potentially confusing or problematic discussion of race, gender, sexuality, and ability. However, throughout the textbook, it is clear that the author(s) is trying to include context and culture as a significant factor in human communication. The 8.2 section also seems to be intended to give time to these important identity positions, but it needs some revision or some class discussion to clarify the complexity of these subjects.</span></p><span data-dcnode-id="6394" instrument_node="">

</span><p data-dcnode-id="5975"><span data-dcnode-id="5976" instrument_node="">The book does an excellent job covering all areas of the subject matter except for Interviewing. Interviewing is an important aspect of dyadic communication and taught in our Speech courses as one of several important communication skills. Interviewing is only briefly covered in section 9.1 and in the context of finding sources. I would love for the author to include more robust and comprehensive coverage of this concept. 
The history of communication in the first chapter was a little longer than necessary, albeit very informative.</span></p><span data-dcnode-id="5974" instrument_node="">

</span><p data-dcnode-id="5963"><span data-dcnode-id="5964" instrument_node="">Overall great content! The communication principles, theories, and concepts are very accurate. However, the pictures used throughout do suggest a strong bias toward white people and this is extremely problematic.</span></p><span data-dcnode-id="5962" instrument_node="">

</span><p data-dcnode-id="5951"><span data-dcnode-id="5952" instrument_node="">
While the concepts covered are relevant and timeless, some of the research does need to be updated. Since technology continues to rapidly evolve, more current research needs to be included as far as how current technological trends, especially social media, etc... continues to shape our interactions and ultimately, our relationships. The text is written and arranged in a way that any updates could definitely be easy to implement/insert.
</span></p><span data-dcnode-id="5950" instrument_node="">

</span><p data-dcnode-id="5927"><span data-dcnode-id="5928" instrument_node="">For the most part terminology and framework contain appropriate text consistent with the topic area. I do think the Motivated Sequence Pattern did not belong in the section on organizing your main points. I consider that to be an organizational structure in and of itself.</span></p><span data-dcnode-id="5926" instrument_node="">

</span><p data-dcnode-id="5891"><span data-dcnode-id="5892" instrument_node="">For the most part all text are presented clearly. However, there were some important concepts covered that got a bit "buried." Perhaps those concepts can be highlighted/bolded. For example in section 1.2 under "Communication is a Process," principles such as, communication messages vary in terms of their, "level of conscious thought and intention, communication is irreversible, and unrepeatable," should all be in bold.  This would make it easier to read the larger patches of text that include important terms.
Another area that could be adjusted a bit is in section 9.3 Organizing. All of the headings are the same size thus making it a little confusing and or difficult to distinguish sub points. It would be helpful the chance font sizes of headings to distinguish sub headings more clearly.</span></p><span data-dcnode-id="5890" instrument_node="">

</span><p data-dcnode-id="5867"><span data-dcnode-id="5868" instrument_node="">For the most part the content in the text reflect inclusivity of a variety of cultures. However, most of the pictures throughout the entire book are only of white people and should be updated and/or changed.  One picture in particular in section 1.1 under the Group Communication heading, should be updated/changed. The picture shows a group of all white men and women and can be seen as biased especially given the recent events surrounding the death of George Floyd. I recommend changing this picture to reflect a more diverse group of individuals. This same issue is found in section 1.3 under the heading "Academic" there is a picture of three white men in regalia suggesting only white people pursue higher education. In subsequent chapters whether showing a classroom full of students or two people interacting, most of the pictures are of white people. Pictures of people of other ethnicities were grossly outnumbered. This really should be mitigated/updated.</span></p><span data-dcnode-id="5866" instrument_node="">
</span><p data-dcnode-id="5865"></p><span data-dcnode-id="5864" instrument_node="">
</span><rubrik data-dcnode-id="5862"><span data-dcnode-id="5863" instrument_node="">Comments</span></rubrik><span data-dcnode-id="5861" instrument_node="">
</span><p data-dcnode-id="5859"><span data-dcnode-id="5860" instrument_node="">I really like the "Key Takeaways" sections, it helps draw students back to the important points made in the chapter. The "Exercise" sections are also very helpful to stimulate class discussion or self reflection. 

While it was helpful that the author included links to chapters that covered concepts more in depth, there was a tendency to cover more information than necessary when introducing a concept that was covered more comprehensively in another chapter. For example, in Chapter one, the concept of compliance gaining was introduced. Instead of listing the common tactics used for compliance gaining in this section, a one sentence definition along with the link to Chapter 11 would have been sufficient. 
Overall, a great textbook, well done!</span></p><span data-dcnode-id="5858" instrument_node="">

</span><p data-dcnode-id="5619"><span data-dcnode-id="5620" instrument_node="">Subjects within the text are covered well, though the author is not particularly clear about the scope of their major sections (and reasons for those choices). Put another way, the text is framed as a neutral account of the field, when of course no text can provide a wholly complete account.

The text does not engage the major subfield of organizational communication in any way. Group and team communication are covered well enough. But the area of organizational communication is an obvious and serious omission. There are whole majors, disciplinary interest groups, conferences, and international/trans-disciplinary subjects in organizational communication.

No index, glossary, or cross-tabulation is available.</span></p><span data-dcnode-id="5618" instrument_node="">

</span><p data-dcnode-id="5595"><span data-dcnode-id="5596" instrument_node="">
What is covered in this text is covered accurately and in a conversational, student-friendly style appropriate to the level of course for which this text is intended. Significant, long-standing ideas are addressed.

The trouble here is that the references that form the basis of the text are quite outdated. Certainly, textbooks are not encyclopedias or literature reviews, but the major concepts and theories addressed are “classics” up until about 2000. I write this in 2020. As such, the text is somewhat imprecise when it comes to representing contemporary views on communication dynamics – the perspective is not consistent with some major recent disciplinary shifts. I think here of constitutive views on organizational discourse, representations of gender and transgender dynamics, etc.

That this text’s subsequent editions are in print with a for-profit publisher means it’s unlikely to be made more relevant or current anytime soon, nor very easily.

</span></p><span data-dcnode-id="5594" instrument_node="">

</span></p><span data-dcnode-id="5585" instrument_node="">
</span><p data-dcnode-id="5583"><span data-dcnode-id="5584" instrument_node="">For a text to be clear at the basic level, I use Gerald Nosich’s SEE-I model for critical thinking: State, Explain, Exemplify, and Illustrate. This textbook varies in the degree to which it offers these elements of conceptual presentation and exploration. It is thus moderately good in terms of clarity. Some notes:

State: the book provides clear definitions, useful highlighting of significant concepts. Subsections are of greatly varying lengths, however. This provides some confusion when it comes to which parts of the text deserve students’ greatest attention, because these differences in length seem to be relevant to the author’s interest rather than the import to the reader.

Explain: I’ll note again the unevenness of the depth of attention to certain passages or ideas. Some concepts are bolded in passing, though important, and some receive detailed explanation. Not all things deserve the equal attention, sure, but these discrepancies seem problematic in the case of this book.

Exemplify: examples are often personal, interesting, and vivid. An update would deepen the range of examples regarding persons’ identities and lived experience (e.g., according to race, gender, socio-economic status, etc.).

Illustrate: the text is clear and concrete, but does not go much beyond the standard illustrative writing of the textbook genre: the extended story at the outset or closing of the chapter. Give students metaphors, more lively diagrams, media references… any creative analogy!
</span></p><span data-dcnode-id="5582" instrument_node="">
</span><p data-dcnode-id="5574"><span data-dcnode-id="5581" instrument_node="">

</span></p><span data-dcnode-id="5573" instrument_node="">
</span><p data-dcnode-id="5571"><span data-dcnode-id="5572" instrument_node="">The most obvious example of problematic consistency is at the highest level, chapter organization. The media chapter addresses technology, and yet there’s also a chapter on “new” media and technologies. The team and group chapter covers some ‘workplace’ issues, but no chapter is presented on organizational communication, where there is more depth on this subject. Rhetoric isn’t present in a big way.  And so forth. The content, overall, has little balance. </span></p><span data-dcnode-id="5570" instrument_node="">
</span><p data-dcnode-id="5562"><span data-dcnode-id="5569" instrument_node="">

</span><p data-dcnode-id="5535"><span data-dcnode-id="5536" instrument_node="">The book is easy enough to read, print, etc. The use of learning objectives for minor sections, combined with its formatting can make for odd on-line reading, with movement between sub-sections sometimes feeling like transitions between chapters. On the whole, the format works and the price is right!</span></p><span data-dcnode-id="5534" instrument_node="">

</span><p data-dcnode-id="5523"><span data-dcnode-id="5524" instrument_node="">Editing seems thorough and writing is generally effective. The text assumes both a familiar, colloquial voice and a more authoritative voice in different parts. This can make for a feeling of disjuncture re: being addressed as a reader. But this is a minor issue.</span></p><span data-dcnode-id="5522" instrument_node="">

</span><p data-dcnode-id="5511"><span data-dcnode-id="5512" instrument_node="">The text is culturally appropriate and includes important concepts in this area through 2010 or so. But concrete examples or example fictional narratives rarely engage lived experiences of persons of color, low socio economic status, and similar kinds of common marginalization. Narrative examples are often reserved for a more generic kind of concept, an attempt at normalization and generalization that can in a subtle way reinforce hegemonic depictions of communication. The book is not offensive or condemnation-worthy on this point, but it's limited.</span></p><span data-dcnode-id="5510" instrument_node="">

</span><p data-dcnode-id="5503"><span data-dcnode-id="5504" instrument_node="">This textbook should be used with complementary materials (e.g., borrowed chapters from other textbooks) in any class, especially for covering areas of significant omission relevant to the "intro course" in Communication Studies.</span></p><span data-dcnode-id="5502" instrument_node="">

rating:

</span><a class="link" data-dcnode-id="5270" onclick="util.doubleToggle(reviewTag3110,readMore3110)"><span data-dcnode-id="5271" instrument_node="">see less</span></a><span data-dcnode-id="5269" instrument_node="">

</span></p><span data-dcnode-id="5265" instrument_node="">
</span><p data-dcnode-id="5263"><span data-dcnode-id="5264" instrument_node="">The textbook does cover all areas and ideas that are appropriate for an introductory human communication course (e.g., the communication process, perception, culture, verbal and nonverbal communication, listening, interpersonal and relationship communication, and public speaking). Chapters 14 and 15 focus on mass communication topics, so we would not include them in the version we would make available to our students. The textbook does have a table of contents, but I did not find a back-of-the-book index or a glossary of terms.</span></p><span data-dcnode-id="5262" instrument_node="">
</span><p data-dcnode-id="5254"><span data-dcnode-id="5261" instrument_node="">
</span><rubrik data-dcnode-id="5259"><span data-dcnode-id="5260" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="5258" instrument_node="">
</span><rating data-dcnode-id="5256"><span data-dcnode-id="5257" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="5255" instrument_node="">
</span></p><span data-dcnode-id="5253" instrument_node="">
</span><p data-dcnode-id="5251"><span data-dcnode-id="5252" instrument_node="">For the most part, the textbook is accurate and free of overt bias. However, I found some errors. For example, in 9.4 (Outlining) of Chapter 9, the speech outline examples were not formatted correctly. Roman numerals (which identify the main points), capital letters (which identify sub-points), and lower case letters (which identify supporting details) were missing. The outline examples only used Arabic numerals. This is an important error because my students do not know how to create an outline for their speeches. I can make those formatting changes, but I wish I did not have to.</span></p><span data-dcnode-id="5250" instrument_node="">
</span><p data-dcnode-id="5242"><span data-dcnode-id="5249" instrument_node="">
</span><rubrik data-dcnode-id="5247"><span data-dcnode-id="5248" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="5246" instrument_node="">
</span><rating data-dcnode-id="5244"><span data-dcnode-id="5245" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="5243" instrument_node="">
</span></p><span data-dcnode-id="5241" instrument_node="">
</span><p data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">
Textbook content is generally up-to-date, but some sections are already obsolete. For example, 1.1 (Communication: History and Forms) provides a brief history of communication from Aristotle to President Obama. President Trump’s use of Twitter to communicate directly with the American public is new and needs to be acknowledged and addressed if we are going to use this textbook for years to come.
</span></p><span data-dcnode-id="5238" instrument_node="">
</span><p data-dcnode-id="5230"><span data-dcnode-id="5237" instrument_node="">
</span><rubrik data-dcnode-id="5235"><span data-dcnode-id="5236" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="5234" instrument_node="">
</span><rating data-dcnode-id="5232"><span data-dcnode-id="5233" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="5231" instrument_node="">
</span></p><span data-dcnode-id="5229" instrument_node="">
</span><p data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">The prose throughout the textbook is accessible and the author provides adequate context for any jargon or technical terminology used. Accessibility is important in an introductory human communication textbook because we do not want to turn off the students with ideas and concepts that are not understandable because of jargon or technical terms.</span></p><span data-dcnode-id="5226" instrument_node="">
</span><p data-dcnode-id="5218"><span data-dcnode-id="5225" instrument_node="">
</span><rubrik data-dcnode-id="5223"><span data-dcnode-id="5224" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="5222" instrument_node="">
</span><rating data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="5219" instrument_node="">
</span></p><span data-dcnode-id="5217" instrument_node="">
</span><p data-dcnode-id="5215"><span data-dcnode-id="5216" instrument_node="">Overall, the text framework demonstrates an agreement or harmony of parts/features to one another. For example, every chapter has at least four sub-sections in which the author describes the main idea of the chapter in detail. Not every introductory textbook author does this.</span></p><span data-dcnode-id="5214" instrument_node="">
</span><p data-dcnode-id="5206"><span data-dcnode-id="5213" instrument_node="">
</span><rubrik data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="5210" instrument_node="">
</span><rating data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="5207" instrument_node="">
</span></p><span data-dcnode-id="5205" instrument_node="">
</span><p data-dcnode-id="5203"><span data-dcnode-id="5204" instrument_node="">Each chapter includes at least four smaller reading sections. Each section can be edited for length, easily reorganized, and realigned without too much trouble.</span></p><span data-dcnode-id="5202" instrument_node="">
</span><p data-dcnode-id="5194"><span data-dcnode-id="5201" instrument_node="">
</span><rubrik data-dcnode-id="5199"><span data-dcnode-id="5200" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="5198" instrument_node="">
</span><rating data-dcnode-id="5196"><span data-dcnode-id="5197" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="5195" instrument_node="">
</span></p><span data-dcnode-id="5193" instrument_node="">
</span><p data-dcnode-id="5191"><span data-dcnode-id="5192" instrument_node="">The topics in the textbook are arranged in a logical fashion. The communication fundamentals, interpersonal communication, public speaking, small group communication, and new media chapters are grouped together. I would rearrange the order somewhat by placing the culture chapter with the other fundamentals chapters.</span></p><span data-dcnode-id="5190" instrument_node="">
</span><p data-dcnode-id="5182"><span data-dcnode-id="5189" instrument_node="">
</span><rubrik data-dcnode-id="5187"><span data-dcnode-id="5188" instrument_node="">Interface</span></rubrik><span data-dcnode-id="5186" instrument_node="">
</span><rating data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="5183" instrument_node="">
</span></p><span data-dcnode-id="5181" instrument_node="">
</span><p data-dcnode-id="5179"><span data-dcnode-id="5180" instrument_node="">I did not find any significant interface issues. Navigation was easy and no images or charts were distorted. In short, I did not find any features that may distract or confuse readers.</span></p><span data-dcnode-id="5178" instrument_node="">
</span><p data-dcnode-id="5170"><span data-dcnode-id="5177" instrument_node="">
</span><rubrik data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node="">Grammatical Errors</span></rubrik><span data-dcnode-id="5174" instrument_node="">
</span><rating data-dcnode-id="5172"><span data-dcnode-id="5173" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="5171" instrument_node="">
</span></p><span data-dcnode-id="5169" instrument_node="">
</span><p data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">For the most part, the textbook does not contain any grammatical errors. I did not find subject-verb agreement errors, sentence fragments, misplaced or dangling modifiers, vague pronoun references, or incorrect word usage. Occasionally, I would find a missing comma after an introductory element or a missing comma in a compound sentence.</span></p><span data-dcnode-id="5166" instrument_node="">
</span><p data-dcnode-id="5158"><span data-dcnode-id="5165" instrument_node="">
</span><rubrik data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">Cultural Relevance</span></rubrik><span data-dcnode-id="5162" instrument_node="">
</span><rating data-dcnode-id="5160"><span data-dcnode-id="5161" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="5159" instrument_node="">
</span></p><span data-dcnode-id="5157" instrument_node="">
</span><p data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">I believe this introductory textbook is culturally sensitive and not offensive in any way. The examples used, especially those in the cultural communication chapter, are inclusive of a variety of races, ethnicities, and backgrounds.</span></p><span data-dcnode-id="5154" instrument_node="">
</span><p data-dcnode-id="5153"></p><span data-dcnode-id="5152" instrument_node="">
</span><rubrik data-dcnode-id="5150"><span data-dcnode-id="5151" instrument_node="">Comments</span></rubrik><span data-dcnode-id="5149" instrument_node="">
</span><p data-dcnode-id="5147"><span data-dcnode-id="5148" instrument_node="">I wish that the references and the in-text citations of sources were written according to the American Psychological Association (APA) style guidelines, but they are not. I want students to include references in APA style, but I cannot point to references in the textbook as examples. I can make those changes, but it adds to the workload.</span></p><span data-dcnode-id="5146" instrument_node="">
</span></div><span data-dcnode-id="5144" instrument_node="">

</span><a class="link" data-dcnode-id="5092" onclick="util.doubleToggle(reviewTag3005,readMore3005)"><span data-dcnode-id="5093" instrument_node="">see less</span></a><span data-dcnode-id="5091" instrument_node="">
</span></rating><span data-dcnode-id="5089" instrument_node="">
</span></p><span data-dcnode-id="5087" instrument_node="">
</span><p data-dcnode-id="5085"><span data-dcnode-id="5086" instrument_node="">Communication in the Real World is fairly comprehensive.  In eighteen chapters, interpersonal, intercultural, small group, leadership and media dynamics in our field are introduced discussed in beginning-level depth.  That’s quite a breadth of topics for a single text.
</span></p><span data-dcnode-id="5084" instrument_node="">
</span><p data-dcnode-id="5076"><span data-dcnode-id="5083" instrument_node="">
</span><rubrik data-dcnode-id="5081"><span data-dcnode-id="5082" instrument_node="">Content Accuracy</span></rubrik><span data-dcnode-id="5080" instrument_node="">
</span><rating data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="5077" instrument_node="">
</span></p><span data-dcnode-id="5075" instrument_node="">
</span><p data-dcnode-id="5073"><span data-dcnode-id="5074" instrument_node="">Crucial COMM concepts are included for each sub-discipline and highlighted within the text, and a citation often follows immediately to give readers a sense of the origin of that particular concept.  Discussions of these ideas are often useful and applicable to real life.  Even if readers are less-than-captivated by the text itself, this would still be a resource for exploring these core concepts further through other assigned activities.
</span></p><span data-dcnode-id="5072" instrument_node="">
</span><p data-dcnode-id="5064"><span data-dcnode-id="5071" instrument_node="">
</span><rubrik data-dcnode-id="5069"><span data-dcnode-id="5070" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="5068" instrument_node="">
</span><rating data-dcnode-id="5066"><span data-dcnode-id="5067" instrument_node="">
rating:
3
</span></rating><span data-dcnode-id="5065" instrument_node="">
</span></p><span data-dcnode-id="5063" instrument_node="">
</span><p data-dcnode-id="5061"><span data-dcnode-id="5062" instrument_node="">
The text is general enough to give an overview of ideas that aren't tied exclusively to current events.  However, any text that addresses communication through mediated channels will need frequent updating as research catches up with the impact of social media channels.  As my needs for this text pertain to Interpersonal Communication, I spent less time reviewing Chapter 15.  However, the timelines featured for different mediated channels may be useful in providing historical context for those being introduced to mass media. 
</span></p><span data-dcnode-id="5060" instrument_node="">
</span><p data-dcnode-id="5052"><span data-dcnode-id="5059" instrument_node="">
</span><rubrik data-dcnode-id="5057"><span data-dcnode-id="5058" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="5056" instrument_node="">
</span><rating data-dcnode-id="5054"><span data-dcnode-id="5055" instrument_node="">
rating:
3
</span></rating><span data-dcnode-id="5053" instrument_node="">
</span></p><span data-dcnode-id="5051" instrument_node="">
</span><p data-dcnode-id="5049"><span data-dcnode-id="5050" instrument_node="">Lucid, yes.  The book is competently written.  But accessible?  The writing truly is dry and typically textbookish.  The author has made the curious choice of occasionally speaking in first-person - “For example, I consider myself a puzzle lover” (p. 375) - but not offering a brief introductory biography or foreword.  As a result, the text feels impersonal and a bit detached - and it may be quite hard to get into for those not comfortable with academic readings.
</span></p><span data-dcnode-id="5048" instrument_node="">
</span><p data-dcnode-id="5040"><span data-dcnode-id="5047" instrument_node="">
</span><rubrik data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">Consistency</span></rubrik><span data-dcnode-id="5044" instrument_node="">
</span><rating data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">
rating:
4
</span></rating><span data-dcnode-id="5041" instrument_node="">
</span></p><span data-dcnode-id="5039" instrument_node="">
</span><p data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">The book is consistent, yes, but there is room here for expansion and growth.  Communication in the Real World is consistently academic in structure and tone, though it would have been marvelous to have short essays written by students/alumni who are using these skills and ideas in their "real worlds," so as to bring these ideas to life and to help readers see more clearly how communication skills are a benefit in practice.</span></p><span data-dcnode-id="5036" instrument_node="">
</span><p data-dcnode-id="5028"><span data-dcnode-id="5035" instrument_node="">
</span><rubrik data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="5032" instrument_node="">
</span><rating data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="5029" instrument_node="">
</span></p><span data-dcnode-id="5027" instrument_node="">
</span><p data-dcnode-id="5025"><span data-dcnode-id="5026" instrument_node="">The book's great strength is it's ability to be used in multiple beginning-level courses.  It will be easy for me to separate the Interpersonal Communication content that I want my students to read.
</span></p><span data-dcnode-id="5024" instrument_node="">

rating:

</span></rating><span data-dcnode-id="5017" instrument_node="">
</span></p><span data-dcnode-id="5015" instrument_node="">
</span><p data-dcnode-id="5013"><span data-dcnode-id="5014" instrument_node="">While there are subheadings within chapters, they aren’t quite as helpful as they could be, and instead often seemed a bit random and haphazard.  A tighter outline would have been helpful to direct students to explore, or re-review, key ideas.  I did appreciate the historical framing of the discipline itself at the start, though.  Many faculty may choose to skip the introductory chapter in order to move into the specific course-related content, but I believe it is important for students to be exposed to the roots of the discipline early on, and why Communication Studies is a vital part of the Liberal Arts.
</span></p><span data-dcnode-id="5012" instrument_node="">

</span><p data-dcnode-id="4989"><span data-dcnode-id="4990" instrument_node="">The book appears to have been clearly written and proofread, yes.</span></p><span data-dcnode-id="4988" instrument_node="">

</span></p><span data-dcnode-id="4979" instrument_node="">
</span><p data-dcnode-id="4977"><span data-dcnode-id="4978" instrument_node="">While there are fundamentally important issues related to intercultural interaction and diversity in Communication in the Real World, these issues are undermined a bit by the choice of images.  The book lacks representative images and voices, and often feels more like it’s talking about marginalized cultural groups, rather than talking to them or with them.  This is perhaps the book's greatest weakness.</span></p><span data-dcnode-id="4976" instrument_node="">
</span><p data-dcnode-id="4975"></p><span data-dcnode-id="4974" instrument_node="">
</span><rubrik data-dcnode-id="4972"><span data-dcnode-id="4973" instrument_node="">Comments</span></rubrik><span data-dcnode-id="4971" instrument_node="">
</span><p data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">I’m very thankful that this text exists as a starting point for our discipline, and students will greatly appreciate the no-cost option.  But I expect to do a good deal of work building supplementary material so that the negatives can be addressed and the positives can be strengthened for student learning.  If you’re unsure in your decision to adopt Communication in the Real World, you may want to stick with your trusted, affordable resources until more supplements, or an updated edition, can be created.

</span><p data-dcnode-id="4907"><span data-dcnode-id="4908" instrument_node="">The textbook covers all the basic topics for an introductory communication course.  I've used the textbook for my introduction to communication course, along with selections of the text for small group communication.  The book covers plenty of topic for a professor to customize what to cover in the semester and what to leave out.  The book is easy to read and I've heard no complaints from students.  Only positive comments about how it was free!</span></p><span data-dcnode-id="4906" instrument_node="">

</span></p><span data-dcnode-id="4897" instrument_node="">
</span><p data-dcnode-id="4895"><span data-dcnode-id="4896" instrument_node="">The book covers all the topics in good introductory detail.  I like to supplement the text with diverse perspectives, such as voices from different ethnic or cultural backgrounds.  Claiming an "unbiased" perspective puts a claim on what is "true" and what voice matters the most.  We never can be free of bias, but the textbook does well at providing foundational information that can be agreed upon as the whole.</span></p><span data-dcnode-id="4894" instrument_node="">

</span><p data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">The text is fairly basic in covering introductory communication concepts.  I've seen better work done in terms of including diverse voices and perspectives into the text.  There is some diversity represented in the text, but those concepts are isolated and not integrated throughout.  This is the one downside of this textbook.</span></p><span data-dcnode-id="4798" instrument_node="">

</span><p data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">This textbook includes the major ideas and topics as most other introductory communication studies texts. This text is appropriate for a 100/1000-level course. Four chapter are devoted to public speaking, so consider the structure of the course. In a class that requires a public speaking component, this would be appropriate; these sections may not be useful in large lecture settings. </span></p><span data-dcnode-id="4728" instrument_node="">

</span><rating data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="4721" instrument_node="">
</span></p><span data-dcnode-id="4719" instrument_node="">
</span><p data-dcnode-id="4717"><span data-dcnode-id="4718" instrument_node="">There are no major content errors. </span></p><span data-dcnode-id="4716" instrument_node="">
</span><p data-dcnode-id="4708"><span data-dcnode-id="4715" instrument_node="">
</span><rubrik data-dcnode-id="4713"><span data-dcnode-id="4714" instrument_node="">Relevance/Longevity</span></rubrik><span data-dcnode-id="4712" instrument_node="">

</span><p data-dcnode-id="4705"><span data-dcnode-id="4706" instrument_node="">
Videos and examples are still relevant. I imagine that they will need updated within the next five years or so (i.e. "Shows like The Office and The Apprentice..." may not be as easily recalled in a few years). The text focuses predominantly on larger theoretical ideas and themes. Updating the examples and images would be fairly easy. 
</span></p><span data-dcnode-id="4704" instrument_node="">
</span><p data-dcnode-id="4696"><span data-dcnode-id="4703" instrument_node="">
</span><rubrik data-dcnode-id="4701"><span data-dcnode-id="4702" instrument_node="">Clarity</span></rubrik><span data-dcnode-id="4700" instrument_node="">

rating:

</span></p><span data-dcnode-id="4695" instrument_node="">
</span><p data-dcnode-id="4693"><span data-dcnode-id="4694" instrument_node="">This book presents theoretical ideas in ways that could be understood easily by underclassmen. The definitions are accessible through the reading and does not require prior knowledge of the subject area. One recommendation would be to include a glossary where bolded terms are easily accessible. </span></p><span data-dcnode-id="4692" instrument_node="">
</span><p data-dcnode-id="4684"><span data-dcnode-id="4691" instrument_node="">

rating:
4

</span></p><span data-dcnode-id="4683" instrument_node="">
</span><p data-dcnode-id="4681"><span data-dcnode-id="4682" instrument_node="">There are several instances where the author uses "I" to demonstrate experiences or ideas ("I argue... I suggest..."). Some sections do not have any of these anecdotes, whereas other sections have several. This inconsistent shifts from theory to personal account are distracting. Not detrimental, but it does disrupt the flow of reading.</span></p><span data-dcnode-id="4680" instrument_node="">
</span><p data-dcnode-id="4672"><span data-dcnode-id="4679" instrument_node="">
</span><rubrik data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">Modularity</span></rubrik><span data-dcnode-id="4676" instrument_node="">
</span><rating data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">
rating:
5

</span></p><span data-dcnode-id="4671" instrument_node="">
</span><p data-dcnode-id="4669"><span data-dcnode-id="4670" instrument_node="">This texts is divided well. As previously mentioned, there is a significant public speaking section in this book, but that could easily be removed or altered to align with course goals. </span></p><span data-dcnode-id="4668" instrument_node="">
</span><p data-dcnode-id="4660"><span data-dcnode-id="4667" instrument_node="">
</span><rubrik data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">Organization/Structure/Flow</span></rubrik><span data-dcnode-id="4664" instrument_node="">
</span><rating data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="4661" instrument_node="">
</span></p><span data-dcnode-id="4659" instrument_node="">
</span><p data-dcnode-id="4657"><span data-dcnode-id="4658" instrument_node="">Overall, this book is organized well and similarly to other textbooks I have used in my course. I understand why the public speaking section is positioned where it is (after intercultural communication), but it is a difficult transition from communication theory and practice to public speaking. (I have had the same complaint for every textbook I have used, so this is not a unique situation, as the textbooks I have used are organized in the same way.) Breaking the course into units may help alleviate the tension of this transition. </span></p><span data-dcnode-id="4656" instrument_node="">
</span><p data-dcnode-id="4648"><span data-dcnode-id="4655" instrument_node="">
</span><rubrik data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">Interface</span></rubrik><span data-dcnode-id="4652" instrument_node="">
</span><rating data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node="">
rating:
5
</span></rating><span data-dcnode-id="4649" instrument_node="">
</span></p><span data-dcnode-id="4647" instrument_node="">
</span><p data-dcnode-id="4645"><span data-dcnode-id="4646" instrument_node="">Overall, the interface is user-friendly. An option to continue to the next section at the conclusion of each section would be more convenient than scrolling back to the top and selecting from the Table of Contents. Links to videos and other sites all appear active and in working order.</span></p><span data-dcnode-id="4644" instrument_node="">
</span><p data-dcnode-id="4636"><span data-dcnode-id="4643" instrument_node="">
</span><rubrik data-dcnode-id="4641"><span data-dcnode-id="4642" instrument_node="">Grammatical Errors</span></rubrik><span data-dcnode-id="4640" instrument_node="">

rating:
5

</span></p><span data-dcnode-id="4635" instrument_node="">
</span><p data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">No major grammar issues to note.</span></p><span data-dcnode-id="4632" instrument_node="">
</span><p data-dcnode-id="4624"><span data-dcnode-id="4631" instrument_node="">
</span><rubrik data-dcnode-id="4629"><span data-dcnode-id="4630" instrument_node="">Cultural Relevance</span></rubrik><span data-dcnode-id="4628" instrument_node="">
</span><rating data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">
rating:

</span></p><span data-dcnode-id="4623" instrument_node="">
</span><p data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node="">The intercultural chapter is more engaging than other similar textbooks on the market! Overall, I think it provides a great opportunity to facilitate classroom discussion, especially when helping students apply the information they are learning outside of the classroom. It is important to remember that this textbook is written from an American perspective, and instructors should be prepared to engage in conversations about privilege when using this textbook. </span></p><span data-dcnode-id="4620" instrument_node="">
</span><p data-dcnode-id="4619"></p><span data-dcnode-id="4618" instrument_node="">
</span><rubrik data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">Comments</span></rubrik><span data-dcnode-id="4615" instrument_node="">
</span><p data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">Overall, I would use this text for an introductory communication course. For general education requirements across majors, this text covers theoretical and practical topics which students can easily translate outside of the classroom. For communication studies majors specifically, I would recommend supplementing the material with texts specifically related to the discipline. </span></p><span data-dcnode-id="4612" instrument_node="">
