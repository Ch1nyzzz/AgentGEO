ou Need to Know" title="Berkshire Hathaway History + How Buffett’s Approach Evolved" srcset="https://www.shortform.com/blog/wp-content/uploads/2020/05/money-outsiders-750x350.jpg 750w, https://www.shortform.com/blog/wp-content/uploads/2020/05/money-outsiders-642x300.jpg 642w" sizes="(max-width: 750px) 100vw, 750px" /&gt;</span></noscript><img alt="The Top 4 Habits of Millionaires You Need to Know" class="attachment-featured-blog-large size-featured-blog-large wp-post-image lazyloaded" data-dcnode-id="611" data-sizes="(max-width: 750px) 100vw, 750px" data-src="https://www.shortform.com/blog/wp-content/uploads/2020/05/money-outsiders-750x350.jpg" data-srcset="https://www.shortform.com/blog/wp-content/uploads/2020/05/money-outsiders-750x350.jpg 750w, https://www.shortform.com/blog/wp-content/uploads/2020/05/money-outsiders-642x300.jpg 642w" height="350" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shortform.com/blog/wp-content/uploads/2020/05/money-outsiders-750x350.jpg&amp;raw" srcset="https://www.shortform.com/blog/wp-content/uploads/2020/05/money-outsiders-750x350.jpg 750w, https://www.shortform.com/blog/wp-content/uploads/2020/05/money-outsiders-642x300.jpg 642w" title="Berkshire Hathaway History + How Buffett’s Approach Evolved" width="750"><div class="code-block code-block-17" data-dcnode-id="594" style="margin: 8px 0; clear: both;"><div class="example-yellow" data-dcnode-id="595"><span data-dcnode-id="610" instrument_node=""> </span><a data-dcnode-id="606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shortform.com/app/signup%3Fcta%3Dblog_topimg"><noscript data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">&lt;img border="0" src="https://www.shortform.com/blog/wp-content/uploads/2020/01/outsiders-ceo-cover.jpg" style="margin:auto; display:block;" width="150" height="245"&gt;</span></noscript><img border="0" class="lazyloaded" data-dcnode-id="607" data-src="https://www.shortform.com/blog/wp-content/uploads/2020/01/outsiders-ceo-cover.jpg" height="245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shortform.com/blog/wp-content/uploads/2020/01/outsiders-ceo-cover.jpg&amp;raw" style="margin:auto; display:block;" width="150"></a><p data-dcnode-id="601"><span data-dcnode-id="605" instrument_node="">This article is an excerpt from the </span><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shortform.com/app/signup%3Fcta%3Dblog_toptextlink"><span data-dcnode-id="604" instrument_node="">Shortform summary of "The Outsiders"</span></a><span data-dcnode-id="602" instrument_node=""> by William N. Thorndike, Jr. Shortform has the world's best summaries of books you should be reading.</span></p><p data-dcnode-id="596"><span data-dcnode-id="600" instrument_node="">Like this article? </span><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shortform.com/app/signup%3Fcta%3Dblog_topbtn"><span data-dcnode-id="599" instrument_node="">Sign up for a free trial here</span></a><span data-dcnode-id="597" instrument_node="">.</span></p></div></div><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Investors have been following in the footsteps of business giant Warren Buffett for decades. But what makes Buffett’s company, Berkshire Hathaway history has been marked by constant success and growth. But what makes this happen?</span></p><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Berkshire Hathaway is one of the most successful companies of the modern age, and Buffett is a top investor, adviser, and business leader. Find out Berkshire Hathaway’s history, how it became the company you know today, and how Buffett continues to pursue company growth and excellence.</span></p><span data-dcnode-id="589" instrument_node=""> </span><span data-dcnode-id="588" id="more-8622"></span><h2 data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">What Is Berkshire Hathaway?</span></h2><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Warren Buffett has garnered staggering returns over the 50-plus years of Berkshire Hathaway history. Starting with buying a textile company in 1965, Buffett grew Berkshire Hathaway into one of the world’s largest companies. Over the course of Berkshire Hathaway history, Buffett’s decisions have made the company into the powerhouse it is today,</span></p><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Over the yers of Berkshire Hathaway’s history, Buffett excelled in all manners of investments—in both public and private companies, with ownership of both minority and total stakes. He famously made use of insurance float to fund investments in higher-return companies, held a small basket of companies for very long periods of time, and acted aggressively when everyone else was ducking for fear.  This proved to be an essential part of Berkshire Hathaway’s performance throughout the company’s history.</span></p><h2 data-dcnode-id="577"><span data-dcnode-id="581" instrument_node="">Berkshire Hathaway </span><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">History</span></strong><span data-dcnode-id="578" instrument_node=""> Overview</span></h2><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Born in 1930 in Omaha, Nebraska, Warren Buffett was the son of a stockbroker and the grandson of a grocery store owner. His early entrepreneurial activities included paper routes and reselling soft drinks.</span></p><p data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">When he was 19, he read </span><em data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">The Intelligent Investor</span></em><span data-dcnode-id="571" instrument_node=""> by Benjamin Graham, which converted him into value investing—buying companies that were cheap relative to their intrinsic value (which was based on the company’s balance sheet). He began investing the profits from his ventures, worth about $10,000 in today’s dollars.&nbsp;</span></p><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">When pursuing his MBA, he chose to go to Columbia, where Graham was a professor. After graduating, Buffett asked Graham for a job at his investment firm, but Graham declined. Buffett returned to Omaha to work as a stock broker, where he continued researching investments. Here he happened on GEICO, an insurance company that featured competitive advantages and a great value for the price. He invested most of his money in GEICO.</span></p><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">In 1954, Graham finally offered Buffett a job, and Buffett continued researching underpriced public companies, which were often cheap, low-quality companies (Buffett called them “cigar butts”). When Graham closed his firm in 1956 to focus on other interests, Buffett started his own fund in Omaha, raising $105,000 (a bit under $1 million today). Over the next decade, Buffett continued investing by Graham’s value philosophy, achieving an average 30% annual return even without using debt.</span></p><h3 data-dcnode-id="562"><span data-dcnode-id="565" instrument_node="">Berkshire Hathaway History: </span><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Buffett Refines His Investing Style</span></strong></h3><p data-dcnode-id="557"><span data-dcnode-id="561" instrument_node="">But in the mid-1960s, Buffett changed the course of Berkshire Hathaway history. </span><strong data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Buffett began deviating from the value method, instead investing in high-quality companies that had a strong competitive profile and long-term prospects</span></strong><span data-dcnode-id="558" instrument_node="">. His early investments in this style included Disney and American Express.</span></p><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">In 1965, Buffett purchased the textile company Berkshire Hathaway, a 100-year-old family business, through a hostile takeover. The company was only worth $18 million in enterprise value and was in a commodity business, but Buffett saw it as a platform to build his investments around. After installing a new CEO, who optimized operations, Berkshire Hathaway had $14 million of profit.&nbsp;</span></p><p data-dcnode-id="550"><span data-dcnode-id="554" instrument_node="">Buffett used this profit to buy National Indemnity, an insurance company that generated a large amount of float—the value of premiums received before they are paid out as claims. Insurance companies rely on investment returns from float to generate a profit; sometimes years can pass between when premiums are received and when they need to be paid out. In essence, </span><strong data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Berkshire was able to receive cash at 3% and invest it at 13%</span></strong><span data-dcnode-id="551" instrument_node="">. Buffett used this float to invest in businesses, sometimes buying them outright. His purchases included a newspaper in Omaha and a local bank in Illinois.</span></p><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">His investing style was further honed in the 1970s, as inflation was a common concern among investors. The typical thinking was that hard assets like gold were the best protection against inflation. Buffett saw differently, and developed key components of his investment thesis:</span></p><ul data-dcnode-id="539"><li data-dcnode-id="544"><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">He believed that companies that had the ability to raise prices and that had low capital requirements were best protected against inflation</span></strong><span data-dcnode-id="545" instrument_node="">. These companies included beloved consumer brands that were market leaders.</span></li><li data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">The best way to value a company was based on income statement and cash flows, as well as intangibles like brand power and market share. This was a departure from Graham’s method of using balance sheet and net working capital.&nbsp;</span></li><li data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">To avoid leakage of growth to taxes, Buffett would prefer holding investments for a long time. This allowed for longer periods of compounding growth without paying taxes on exiting positions.</span></li></ul><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">In short, where Benjamin Graham might have considered a company too expensive based on its book value, Buffett saw it could be cheap, because of the company’s long-term potential to consistently generate high returns on capital.</span></p><p data-dcnode-id="532"><span data-dcnode-id="536" instrument_node="">One example is illustrative—in 1972, Buffett purchased See’s Candies for $25 million, when it had $7 million in book value and $4.2 million in pretax profits. </span><strong data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">At 3 times book value, it would have been too expensive for Graham, but at 6 times pretax income and strong brand loyalty, it was a reasonable purchase</span></strong><span data-dcnode-id="533" instrument_node="">. Over the decades, See’s Candies has not grown unit sales tremendously, but its strong brand allowed it to raise prices consistently. See’s earned a 32% annual return over 27 years and has provided $1.65 billion in cash flow for reinvestment.</span></p><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Throughout the 1970s and 1980s, Buffett thus began investing in high-quality, enduring companies, such as the Washington Post, GEICO, and General Foods. He both made minority investments and purchased companies outright, such as with See’s Candies and the Nebraska Furniture Mart.&nbsp;</span></p><h3 data-dcnode-id="526"><span data-dcnode-id="529" instrument_node="">Berkshire Hathaway History: 1980’s </span><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">To Today</span></strong></h3><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Among its many investments in the decades since, Berkshire Hathaway is known for these highlights:</span></p><ul data-dcnode-id="496"><li data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">In 1986, he made the firm’s largest investment yet—$500 million to help Tom Murphy (another outsider CEO) acquire ABC, ending up with 18% of the combined company.</span></li><li data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">In 1989, he purchased a whopping 7% of Coca-Cola, with the stake being a quarter of Berkshire’s book value</span></li><li data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">In the 1980s, Buffett invested in Salomon Brothers, Gillette, and US Airways.</span></li><li data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">In the 1990s, Buffett invested in Wells Fargo, General Dynamics, and American Express.</span></li><li data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">In 1998, he purchased reinsurer General Re for $22 billion, the largest deal yet.</span></li><li data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Around the time of the September 11 attacks, he opportunistically purchased in industries the market had turned away from, such as with Benjamin Moore Paints and Shaw Carpets.</span></li><li data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">In 2003 and 2004, Buffett invested outside equity markets, investing in junk bonds and currency (where he bet against the dollar).&nbsp;</span></li><li data-dcnode-id="497"><span data-dcnode-id="509" instrument_node="">After a relatively quiet few years, he leapt into action during the 2008 financial recession. In the few years following the collapse of Lehman Brothers, he deployed over $80 billion, including:</span><ul data-dcnode-id="498"><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">$8 billion in convertible stock from Goldman Sachs and General Electric</span></li><li data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">$9.5 billion in mezzanine financing to Mars/Wrigley and Dow Chemical</span></li><li data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">$8.9 billion in distressed debt securities</span></li><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">$26.5 billion for the remaining 77.5% of Burlington Northern Santa Fe, the country’s largest railroad network, that he didn’t own</span></li><li data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">$10.9 billion in IBM stock</span></li></ul></li></ul><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Berkshire Hathaway’s performance in the stock market is excellent, and it continues to be one of the most highly valued enterprises in the world. Having avoided stock splits in its history, Berkshire shares are now worth hundreds of thousands of dollars each.</span></p><h2 data-dcnode-id="490"><span data-dcnode-id="493" instrument_node="">Berkshire Hathaway </span><strong data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Performance</span></strong></h2><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">From 1965 to 2011, Berkshire Hathaway showed a 20.7% annual return rate, compared to 9.3% for the S&amp;P 500.</span></p><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">$1 invested at the beginning would have been worth $6,265 by 2011. This outperformed the S&amp;P by a staggering 100 times.</span></p><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Berkshire Hathaway’s history is made up of smart and swift acquisitions and an ability to adapt to changing business practices. Warren Buffett’s business strategies and advice are sought after by investors of all levels. This is no surprise based on the many successes and constant growth in Berkshire Hathaway history.</span></p><div class="extra-hatom" data-dcnode-id="481"><span class="entry-title" data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Berkshire Hathaway History + How Buffett’s Approach Evolved</span></span></div><div class="code-block code-block-18" data-dcnode-id="478" style="margin: 8px 0; clear: both;"><div class="eoc-relative" data-dcnode-id="479"><div class="eoc-fade" data-dcnode-id="480"></div></div></div><div class="code-block code-block-18" data-dcnode-id="446" style="margin: 8px 0; clear: both;"><div class="example-yellow" data-dcnode-id="447"><span data-dcnode-id="477" instrument_node=""> </span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shortform.com/app/signup%3Fcta%3Dblog_btmimg"><noscript data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">&lt;img border="0" src="https://www.shortform.com/blog/wp-content/uploads/2020/01/outsiders-ceo-cover.jpg" style="margin:auto; display:block;" width="150" height="245"&gt;</span></noscript><img border="0" class="lazyloaded" data-dcnode-id="474" data-src="https://www.shortform.com/blog/wp-content/uploads/2020/01/outsiders-ceo-cover.jpg" height="245" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shortform.com/blog/wp-content/uploads/2020/01/outsiders-ceo-cover.jpg&amp;raw" style="margin:auto; display:block;" width="150"></a><h3 data-dcnode-id="471" style="text-align:center"><span data-dcnode-id="472" instrument_node="">———End of Preview———</span></h3><h4 data-dcnode-id="465"><span data-dcnode-id="470" ins
