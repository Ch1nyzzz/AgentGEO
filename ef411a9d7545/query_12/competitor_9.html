</span><h2 class="entry-title" data-dcnode-id="6216"><a data-dcnode-id="6217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anonymousconservative.com/blog/news-briefs-04-26-2022/" rel="bookmark"><span data-dcnode-id="6218" instrument_node="">News Briefs – 04/26/2022</span></a></h2><span data-dcnode-id="6215" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="6199"><span data-dcnode-id="6214" instrument_node="">
</span><span class="meta-prep meta-prep-author" data-dcnode-id="6212"><span data-dcnode-id="6213" instrument_node="">Posted on</span></span><span data-dcnode-id="6211" instrument_node=""> </span><a data-dcnode-id="6208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anonymousconservative.com/blog/news-briefs-04-26-2022/" rel="bookmark" title="5:18 am"><span class="entry-date" data-dcnode-id="6209"><span data-dcnode-id="6210" instrument_node="">April 26, 2022</span></span></a><span data-dcnode-id="6207" instrument_node=""> </span><span class="meta-sep" data-dcnode-id="6205"><span data-dcnode-id="6206" instrument_node="">by</span></span><span data-dcnode-id="6204" instrument_node=""> </span><span class="author vcard" data-dcnode-id="6201"><a class="url fn n" data-dcnode-id="6202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anonymousconservative.com/blog/author/raiko/" title="View all posts by Anonymous Conservative"><span data-dcnode-id="6203" instrument_node="">Anonymous Conservative</span></a></span><span data-dcnode-id="6200" instrument_node=""> </span></div><span data-dcnode-id="6197" instrument_node="">
</span><div class="entry-content" data-dcnode-id="5786"><span data-dcnode-id="6196" instrument_node="">
</span><p data-dcnode-id="6194"><span data-dcnode-id="6195" instrument_node="">Here are some news stories that might be of interest. Most articles will be more or less summarized in the headline. You can skim the headlines and summaries, and click the links if they are of interest. Keep in mind, many of these reports are products of an unreliable news media, so although they will be what people are hearing and talking about, there is no guarantee any one of them is necessarily correct, and we have had cases of outright lies make it onto these pages.</span></p><span data-dcnode-id="6193" instrument_node="">
</span><p data-dcnode-id="6190"><a data-dcnode-id="6191" href="#comments"><span data-dcnode-id="6192" instrument_node="">This is a link to the comments section for our beloved phone-posters who have been having trouble finding where the comments begin.</span></a></p><span data-dcnode-id="6189" instrument_node="">
</span><p data-dcnode-id="6186"><a data-dcnode-id="6187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/DonaldJTrumpJr"><span data-dcnode-id="6188" instrument_node="">Follow Don Jr on twitter here.</span></a></p><span data-dcnode-id="6185" instrument_node="">
</span><p data-dcnode-id="6183"><span data-dcnode-id="6184" instrument_node="">_________________________________________</span></p><span data-dcnode-id="6182" instrument_node="">
</span><p data-dcnode-id="6168"><span data-dcnode-id="6181" instrument_node="">Lowell keeps posting these damn Garand Thumb videos when I don’t have enough time for what is already in front of me. But </span><a data-dcnode-id="6179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/GsXIdL6gJYA"><span data-dcnode-id="6180" instrument_node="">the latest was a freeze test of common handguns,</span></a><span data-dcnode-id="6178" instrument_node=""> where he soaked them all and then let them freeze in the extreme cold, and went to see if they would go bang when he flipped the safety off and pulled the trigger. It might be a good test of resistance of dirt and junk getting in the action. Only two passed, the Sig P320 and the Smith M&amp;P. Lessons learned if you want to skip the video were that external hammers appear to be an extra point of failure, as they take on water and freeze, the 1911 sliding SA trigger gets fucked, and Glock’s trigger safety has a little too much shit in the mechanism that picks up water and freezes up. The hinged trigger safety of the M&amp;P appeared nearly optimal to survive the freeze test and break any ice that formed, whereas the ice took out so many other classics from Glock, to HK’s USP, to the Beretta 92, to the 1911. The other successful entry which passed, the SIG p320 has had persistent rumors that it not only goes bang frozen, but can go bang all by itself in a holster, and that has never been resolved one way or another IMO, so I have viewed it slightly askance. Which leaves only the Smith as the clear favorite of this test. As luck would have it </span><a data-dcnode-id="6176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.budsgunshop.com/product_info.php/products_id/44673/trk_msg/f1ob2od56usk3etrv55os88dd4/trk_contact/t9ua2odr2tmdk3qci8dn24h5p4/trk_sid/rpaeiujnev13vhbdqqknmk4ikg/trk_link/mfjdc2v9i2t4p1jpuna8vu4b20/utm_source/listrak/utm_medium/email/utm_term/https%25253a%25252f%25252fwww.budsgunshop.com%25252fproduct_info.php%25252fproducts_id%25252f44673%25252f/utm_campaign/bgssws042522/smith%2B%2526%2Bwesson%2Bm%2526p9%2B11683%2Bm2.0%2Bcompact%2B9mm%2B4%2B15%2B1"><span data-dcnode-id="6177" instrument_node="">just this morning Buds sent out an email ad for a regular Smith M&amp;P 2.0 compact on sale for $359.95 cash/check with free shipping.</span></a><span data-dcnode-id="6175" instrument_node=""> Buds even has the upgraded version which comes cut for an optic and with suppressor sights for about $400, and usually you can do even better than Buds on Gun Broker with a little patience. Of course you will have a local FFL transfer fee, and tax, so plan accordingly. But it looked a good deal to me given </span><a data-dcnode-id="6173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//palmettostatearmory.com/s-w-m-pr9-m2-0tm-compact-9mm-pistol-black-11683.html"><span data-dcnode-id="6174" instrument_node="">the exact same Smith 11683 is $520 over at Palmetto</span></a><span data-dcnode-id="6172" instrument_node="">, and there is a Supreme Court case coming down which should give everyone full carry, at which point there may be a rush, and handgun stocks may get a little sparse. And one final word if you consider this deal. This is a good deal for a good gun. But if you have specific tastes, or some knowledge of firearms and want to upgrade, but are not familiar with Smith and Wesson, know these guns have a lot of options, and there are a lot of good deals out there. </span><a data-dcnode-id="6170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.smith-wesson.com/products/pistols"><span data-dcnode-id="6171" instrument_node="">Stop by Smith’s website, and see exactly what you might want, caliber, bbl length, thumb safety or no, optics-ready or no, and so on,</span></a><span data-dcnode-id="6169" instrument_node=""> and check gunbroker.com to see if you can get a similarly good deal on exactly what you want now, before the rush is on after the SC decision.</span></p><span data-dcnode-id="6167" instrument_node="">
</span><p data-dcnode-id="6164"><a data-dcnode-id="6165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thegatewaypundit.com/2022/04/breaking-second-exclusive-trailer-released-2000-mules-shows-2020-election-rigged-stolen-video/"><span data-dcnode-id="6166" instrument_node="">Second exclusive trailer released for “2000 Mules” showing how the 2020 election was rigged and stolen.</span></a></p><span data-dcnode-id="6163" instrument_node="">
</span><p data-dcnode-id="6160"><a data-dcnode-id="6161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thegatewaypundit.com/2022/04/leaders-zuckerbergs-nonpartisan-election-fund-idd-obamas-campaign-manager-clintons-chief-strategist/"><span data-dcnode-id="6162" instrument_node="">Leaders of Zuckerberg’s ‘nonpartisan’ election fund ID’d – Obama’s campaign manager and Clinton’s chief strategist.</span></a></p><span data-dcnode-id="6159" instrument_node="">
</span><p data-dcnode-id="6155"><a data-dcnode-id="6157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/crime/key-figure-dies-in-nc-absentee-ballot-fraud-probe/ar-AAWy3zb%3Focid%3Dmsedgntp%26cvid%3Da5f2d396b0e3489a8158317aeba1505a"><span data-dcnode-id="6158" instrument_node="">A Bladen County man who was the key player in a North Carolina absentee-ballot fraud case that led to a new congressional election, has died, his family announced.</span></a><span data-dcnode-id="6156" instrument_node=""> Supposedly he had been diagnosed with Lung Cancer according to one source.</span></p><span data-dcnode-id="6154" instrument_node="">
</span><p data-dcnode-id="6151"><a data-dcnode-id="6152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/world/couple-killed-had-come-back-to-concord-for-retirement/ar-AAWzkd8%3Focid%3Dmsedgntp%26cvid%3D6dd9d7cdda574c399767deb463b743e7"><span data-dcnode-id="6153" instrument_node="">Florida Governor Ron DeSantis has signed a bill creating a new agency to target voter fraud that critics say is unnecessary and could be used for partisan gains. </span></a></p><span data-dcnode-id="6150" instrument_node="">
</span><p data-dcnode-id="6146"><a data-dcnode-id="6148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//justthenews.com/politics-policy/elections/subpoenas-formally-issued-evidence-georgia-ballot-trafficking-case"><span data-dcnode-id="6149" instrument_node="">Subpoenas formally issued for evidence in Georgia ballot trafficking case. </span></a><span data-dcnode-id="6147" instrument_node="">They demanded election integrity group True the Vote turn over identities of ballot harvesters, a John Doe whistleblower, and other evidence concerning an alleged ballot trafficking operation in the 2020 election.</span></p><span data-dcnode-id="6145" instrument_node="">

</span><p data-dcnode-id="5202"><span data-dcnode-id="5206" instrument_node="">Two things are interesting to me. One, she referred to the people who would meet them and shuttle them around as a “minder.” That implies some degree of control over them. Reporters in dictatorships get minders from the authority that controls that area. Billionaires get peons assigned to help them locate where they are going, and they call them assistants. And two, she didn’t just say Ghislaine had not procured her for Elon and given her to him. She had to emphasize she met him by chance, and it was engineered by nobody. The question asked was, if she was a sex slave gifted to Elon by Maxwell, not if her meeting him was engineered by yet another shadowy player. It has a little of the, </span><em data-dcnode-id="5204"><span data-dcnode-id="5205" instrument_node="">“The Lady doth protest too much”</span></em><span data-dcnode-id="5203" instrument_node=""> vibe. If Elon is a legit genius, and he could be, then she was definitely sent in to occupy him reproductively, because the powers that be would have certain genetic matches they would probably not want him to make.</span></p><span data-dcnode-id="5201" instrument_node="">
</span><p data-dcnode-id="5199"><span data-dcnode-id="5200" instrument_node="">I was watching this video of the second time Trump’s motorcade was almost crashed into, and I don’t know if I ever pointed it out, but there was a white SUV driving on the side of the road slow, at a rate which makes it look like it pulled off the side of the highway before the car which crashed into the guardrail had it’s left side brakes lock up and cause it to swerve toward Trump’s motorcade. It is striking because if the guardrail had given way, (or not been present as it may have appeared on the satellite overhead), that white SUV was perfectly positioned to video the resulting crash, and began positioning itself before there was any indication there was going to be any action. I would be surprised if it was not broadcasting the video it was shooting to whoever locked up those brakes. And of course it is odd rando civilians set up a video operation on this specific spot on the highway.</span></p><span data-dcnode-id="5198" instrument_node="">

</span><p data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">_________________________________________</span></p><span data-dcnode-id="3295" instrument_node="">
</span><p data-dcnode-id="3292"><a data-dcnode-id="3293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rsbnetwork.com/news/trump-will-not-endorse-arizona-attorney-general-mark-brnovich-for-u-s-senate/"><span data-dcnode-id="3294" instrument_node="">President Donald Trump announced that he would not be endorsing state Attorney General Mark Brnovich, R-Ariz., for U.S. Senate because he ignored all the evidence of voter fraud.</span></a></p><span data-dcnode-id="3291" instrument_node="">
</span><p data-dcnode-id="3288"><a data-dcnode-id="3289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.yahoo.com/trump-allies-continue-legal-drive-114830133.html"><span data-dcnode-id="3290" instrument_node="">The fight is not entirely over – Trump allies are still pushing court cases and legislative moves to get states with voter fraud decertified.</span></a></p><span data-dcnode-id="3287" instrument_node="">
</span><p data-dcnode-id="3283"><a data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nationalfile.com/exclusive-house-intelligence-committee-members-were-briefed-on-las-vegas-multiple-shooter-and-antifa-and-isis-information/"><span data-dcnode-id="3286" instrument_node="">House Intelligence Committee members were briefed on intelligence on the Las Vegas shooting. with multiple shooters, Antifa and ISIS involvement, and FBI foreknowledge.</span></a><span data-dcnode-id="3284" instrument_node=""> Nothing the establishment tells you is truth is necessarily even close to the truth, and everyone in the conspiracy knows it. I can’t imagine what rubes the rest of society must look like to them.</span></p><span data-dcnode-id="3282" instrument_node="">
</span><p data-dcnode-id="3279"><a data-dcnode-id="3280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/HansMahncke/status/1516482788605808640"><span data-dcnode-id="3281" instrument_node="">Fusion went and told Special Counsel Durham they started work in 2017, but the owners wrote a book and said they started in 2016, which when examined is supported by other evidence, meaning they lied to the Special Counsel.</span></a></p><span data-dcnode-id="3278" instrument_node="">
</span><p data-dcnode-id="3273"><a data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/seanmdav/status/1516490176758956041"><span data-dcnode-id="3277" instrument_node="">Tweet on it all – </span><em data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">It looks like Joffe’s attorneys just threw Sussman completely under the bus to protect Fusion GPS, whose incompetent attorneys just claimed in court filings the opposite of what their corrupt clients claimed in their own book two years ago. The rats are all fleeing the ship.</span></em></a></p><span data-dcnode-id="3272" instrument_node="">
</span><p data-dcnode-id="3266"><a data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/Techno_Fog/status/1516520784855982089"><span data-dcnode-id="3271" instrument_node="">Hillary for America jumps into the Sussman case, now claims all Fusion communications are privileged and must be off limits.</span></a><span data-dcnode-id="3269" instrument_node=""> Technofog says </span><a data-dcnode-id="3267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//technofog.substack.com/p/clinton-campaign-fusion-gps-provided%3Fs%3Dw"><span data-dcnode-id="3268" instrument_node="">it is a fight she will ultimately lose.</span></a></p><span data-dcnode-id="3265" instrument_node="">
</span><p data-dcnode-id="3262"><a data-dcnode-id="3263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thegatewaypundit.com/2022/04/durham-wants-use-hillary-clintons-tweet-accusing-trump-secret-line-communication-russian-alfa-bank-evidence-sussmann-trial/"><span data-dcnode-id="3264" instrument_node="">Durham wants to use Hillary Clinton’s Tweet accusing Trump of having a secret line of communication with Russian Alfa Bank as evidence in the Sussmann trial.</span></a></p><span data-dcnode-id="3261" instrument_node="">

</span><h2 class="entry-title" data-dcnode-id="2732"><a data-dcnode-id="2733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anonymousconservative.com/blog/news-briefs-04-19-2022/" rel="bookmark"><span data-dcnode-id="2734" instrument_node="">News Briefs – 04/19/2022</span></a></h2><span data-dcnode-id="2731" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="2715"><span data-dcnode-id="2730" instrument_node="">
</span><span class="meta-prep meta-prep-author" data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Posted on</span></span><span data-dcnode-id="2727" instrument_node=""> </span><a data-dcnode-id="2724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anonymousconservative.com/blog/news-briefs-04-19-2022/" rel="bookmark" title="5:25 am"><span class="entry-date" data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">April 19, 2022</span></span></a><span data-dcnode-id="2723" instrument_node=""> </span><span class="meta-sep" data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">by</span></span><span data-dcnode-id="2720" instrument_node=""> </span><span class="author vcard" data-dcnode-id="2717"><a class="url fn n" data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.anonymousconservative.com/blog/author/raiko/" title="View all posts by Anonymous Conservative"><span data-dcnode-id="2719" instrument_node="">Anonymous Conservative</span></a></span><span data-dcnode-id="2716" instrument_node=""> </span></div><span data-dcnode-id="2713" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2255"><span data-dcnode-id="2712" instrument_node="">
</span><p data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Here are some news stories that might be of interest. Most articles will be more or less summarized in the headline. You can skim the headlines and summaries, and click the links if they are of interest. Keep in mind, many of these reports are products of an unreliable news media, so although they will be what people are hearing and talking about, there is no guarantee any one of them is necessarily correct, and we have had cases of outright lies make it onto these pages.</span></p><span data-dcnode-id="2709" instrument_node="">
</span><p data-dcnode-id="2706"><a data-dcnode-id="2707" href="#comments"><span data-dcnode-id="2708" instrument_node="">This is a link to the comments section for our beloved phone-posters who have been having trouble finding where the comments begin.</span></a></p><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2702"><a data-dcnode-id="2703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/DonaldJTrumpJr"><span data-dcnode-id="2704" instrument_node="">Follow Don Jr on twitter here.</span></a></p><span data-dcnode-id="2701" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">_________________________________________</span></p><span data-dcnode-id="2698" instrument_node="">
</span><p data-dcnode-id="2693"><span data-dcnode-id="2697" instrument_node="">There are little things which niggle at you when you hear them, little nuances of stories which you feel don’t quite fit, but which you let slide, because the import is not entirely clear. But still, they bubble up again and again in your mind until you resolve them. Vox Day once told the story of his first day at Kindergarten, where they all had to wear little broaches of construction paper cut into the silhouettes of their favorite dinosaurs. The teacher came up to him, and looked at his Allosaurus, and commented, </span><em data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">“What a nice Triceratops!”</span></em><span data-dcnode-id="2694" instrument_node=""> Vox wrote he promptly wrote off any possibility of her being of any use.</span></p><span data-dcnode-id="2692" instrument_node="">
</span><p data-dcnode-id="2684"><span data-dcnode-id="2691" instrument_node="">That story always irritated me. I believe it happened. I had several similar experiences. But I do not think it was as it appeared. How many here know what a Triceratops is? It is in the name. TRI-ceratops. TRI because it is three horns. You cannot learn the name without being presented with an amygdala-stimulating, memory-forming, unique fact, that once even vaguely touched, will cement itself in your brain. Three horns, on a four legged animal that looked like a Rhinoceros. Once you see the horns, you imagine them being used and see the bipedal Allosaurus attacking, and the Triceratops charging like a raging bull, trying to ram it and impale it’s stomach with the three horns. It is in movies. It is in books. It is the first thing you learn, and the image is so striking you cannot see it without the name being burned into your mind for the rest of your life. I would bet almost all of us immediately see a picture in our head when we hear, “Triceratops,” complete with four legs and three horns. This teacher had to have at least a passing knowledge of the subject. The level of stupidity to say </span><em data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">“Triceratops”</span></em><span data-dcnode-id="2688" instrument_node=""> when confronted with something that had the bipedal silhouette of a </span><em data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">“T-Rex”</span></em><span data-dcnode-id="2685" instrument_node=""> seems a lower probability solution, requiring an IQ so low and a memory so poor it would seem inconsistent with her being a teacher of any kind. Could she really have not known what a T-Rex looked like, or what a Triceratops was, when she initiated a dinosaur-themed event for her kids each year?</span></p><span data-dcnode-id="2683" instrument_node="">
</span><p data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">Before there would have been no other possible interpretation. But now, suppose Vox had been marked, even at that age, as a target of interest. Suppose they were curious, as to how he would respond to such an obvious mistake by an authority. Would he care that she was wrong, and vociferously correct her because he cared what she thought? Would he cede to her authority and question himself? Would he not know? Or would he furrow his little eyebrows, look askance at this moron, purse his lips, and turn away with disdain, to look for someone more worthy of his time, without saying a word, or evincing any care at all she was a moron? Each of those responses would be a highly probative piece of data to include in his file, and could be quite predictive of whether or not he was going to grow up into a problem. He did say he got the Googolplex test as well, I presume later on, so they were in his school, and they were looking. And amusingly today, Vox does not chase Wikipedia, or Simon and Schuster, or Marvel, or other “authorities,” and whine and bitch at them, that they are wrong. He turns away in disdain, and builds his own platforms with people worth his time. It is almost an ingrained response you could have seen when he was six or seven, if you knew how to look. It might be the most dangerous type of psychology, which they would want to ID early. And they just may have known how to look.</span></p><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">I am telling you, public schools may have as many spies per capita as the jails – teachers, administrators, security, aides, administration, and even the kids – and they know who the problem children they need to get on top of are and they are working to do it from the earliest point of contact. It is going to blow people’s minds.</span></p><span data-dcnode-id="2677" instrument_node="">
</span><p data-dcnode-id="2674"><a data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jeffdornik.com/post/the-occultic-secret-society-roots-of-the-deep-state"><span data-dcnode-id="2676" instrument_node="">For those who want more on the Bible being a real, no-nonsense blueprint of the world.</span></a></p><span data-dcnode-id="2673" instrument_node="">
</span><p data-dcnode-id="2668"><a data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/RepMTG/status/1515869385684049920"><img alt="" class="lazy lazy-hidden aligncenter wp-image-38857 size-full" data-dcnode-id="2672" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://i0.wp.com/www.anonymousconservative.com/blog/wp-content/uploads/2022/04/tw-mtg.png?resize=640%2C307&amp;ssl=1" data-lazy-srcset="https://i0.wp.com/www.anonymousconservative.com/blog/wp-content/uploads/2022/04/tw-mtg.png?w=736&amp;ssl=1 736w, https://i0.wp.com/www.anonymousconservative.com/blog/wp-content/uploads/2022/04/tw-mtg.png?resize=300%2C144&amp;ssl=1 300w" data-lazy-type="image" data-recalc-dims="1" height="307" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="640"><noscript data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">&lt;img loading="lazy" class="aligncenter wp-image-38857 size-full" src="https://i0.wp.com/www.anonymousconservative.com/blog/wp-content/uploads/2022/04/tw-mtg.png?resize=640%2C307&amp;#038;ssl=1" alt="" width="640" height="307" srcset="https://i0.wp.com/www.anonymousconservative.com/blog/wp-content/uploads/2022/04/tw-mtg.png?w=736&amp;amp;ssl=1 736w, https://i0.wp.com/www.anonymousconservative.com/blog/wp-content/uploads/2022/04/tw-mtg.png?resize=300%2C144&amp;amp;ssl=1 300w" sizes="(max-width: 640px) 100vw, 640px" data-recalc-dims="1" /&gt;</span></noscript></a></p><span data-dcnode-id="2667" instrument_node="">
</span><p data-dcnode-id="2659"><a data-dcnode-id="2663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cleverjourneys.com/2022/04/11/maricopa-az-verified-with-evidence-trump-59-4-biden-41-17/"><span data-dcnode-id="2666" instrument_node="">From here: </span><em data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">“Jovan Hutton Pulitzer’s Arizona Audit team has revealed the exact algorithm that was used to change the 2020 election.</span></em></a><em data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node=""> They tested it 500,000 times without any error so they are 100 percent certain it is correct.”</span></em><span data-dcnode-id="2660" instrument_node=""> Also, in Maricopa, 95% of the mail-in ballots received prior to election day had legible matched signatures, while 95% of the mail-ins received after election day had illegible signatures that didn’t match. And the real results were Trump winning, 59.47% – 41.173%.</span></p><span data-dcnode-id="2658" instrument_node="">
</span><p data-dcnode-id="2653"><a data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jonathanturley.org/2022/04/17/durham-five-witnesses-connected-to-the-clinton-campaigns-false-russian-claims-have-refused-to-cooperate-under-the-fifth-amendment/"><span data-dcnode-id="2657" instrument_node="">From Durham – </span><em data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">“The only witness currently immunized by the government, Researcher-2, was conferred with that status on July 28, 2021 – over a month prior to the defendant’s Indictment in this matter. And the Government immunized Researcher-2 because, among other reasons, at least five other witnesses who conducted work relating to the Russian Bank-1 allegations invoked (or indicated their intent to invoke) their right against self-incrimination. The Government therefore pursued Researcher-2’s immunity in order to uncover otherwise-unavailable facts underlying the opposition research project that Tech Executive-1 and others carried out in advance of the defendant’s meeting with the FBI.”</span></em></a></p><span data-dcnode-id="2652" instrument_node="">
</span><p data-dcnode-id="2641"><a data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/CBS_Herridge/status/1516066907983646727"><span data-dcnode-id="2651" instrument_node="">More from Durham – “Agency-2 concluded in early 2017 that the Russian Bank-1 data and Russian Phone Provider-1 data was not </span><em data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">“technically plausible,”</span></em><span data-dcnode-id="2648" instrument_node=""> did not </span><em data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">“withstand technical scrutiny,” “contained gaps,” “conflicted with [itself],”</span></em><span data-dcnode-id="2645" instrument_node=""> and was </span><em data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">“user created and not machine/tool generated….”</span></em></a></p><span data-dcnode-id="2640" instrument_node="">

</span><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">_________________________________________</span></p><span data-dcnode-id="2192" instrument_node="">
</span><p data-dcnode-id="2188"><a data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frankspeech.com/article/bombshell-proof-election-machine-manipulation"><span data-dcnode-id="2191" instrument_node="">Mike Lindel issues a new report on the Mesa County voting machines where Tina Peters grabbed a forensic image of the voting machine drives before they were wiped by Dominion with a “Trusted Build.”</span></a><span data-dcnode-id="2189" instrument_node=""> Apparently what this is saying is, the voting machine drives showed somebody went in and created entirely new databases for the votes, transferred in votes without the substantiating hashes and digital records of the ballots, and then deleted the old databases with the real votes and substantiating security data. Thus the votes we were told were final counts, could have been whatever the person who created the new databases said they were. The Secretary of State and Dominion then went in and deleted all the data which showed this, when they installed a “Trusted Build” update to the machines which wiped the drives, despite the law requiring the preservation of all the data on the drives. And additionally, there was no functionality to do this on the voting machines, so I assume that means the drives either had this done on other computers and were swapped in after, or a computer was attached to the voting machine, to do it. And we only know all this because of Tina Peters creating that forensic image before thr Trusted Build updates wiped the machines.</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2184"><a data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rsbnetwork.com/news/pennsylvania-senate-votes-to-ban-drop-boxes-and-zuckerbucks/"><span data-dcnode-id="2186" instrument_node="">Pennsylvania Senate votes to ban drop boxes &amp; ‘Zuckerbucks’ in time for the 2022 and 2024 elections.</span></a></p><span data-dcnode-id="2183" instrument_node="">
</span><p data-dcnode-id="2179"><a data-dcnode-id="2181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thegatewaypundit.com/2022/04/steal-remote-scanners-track-orange-county-ballots-drop-boxes-not-just-collect-daily/"><span data-dcnode-id="2182" instrument_node="">Remote barcode scanners track Orange county ballots as they are dropped at drop boxes.</span></a><span data-dcnode-id="2180" instrument_node=""> The only people who need to confirm a ballot was dropped in a drop box are the fraudsters, who used to take pictures of the ballots as they dropped them off, so their handlers would know they had dropped the ballots and pay them. Surely the voter who just dropped the ballot in doesn’t need to know. The election board which is going to actually count it doesn’t need to know it was dropped off. But a third party now can check if a ballot harvester has dropped off his stash at that drop box as promised, before paying him.</span></p><span data-dcnode-id="2178" instrument_node="">
</span><p data-dcnode-id="2173"><a data-dcnode-id="2174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/politics/durham-stripping-bare-incestuous-relationship-in-clinton-campaign-lawyer-case-chaffetz/ar-AAWjmOD"><span data-dcnode-id="2177" instrument_node="">Rep. Andy Biggs said of Durham, </span><em data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">“I’m hearing that there’s some emails that Durham has found that, again, show that they’re — that Sussmann lied to the FBI and that he also lied and misrepresented regarding the connection of all of this with DNC, which is the Democratic National Committee, and the Clinton campaign, and who paid for his bogus information that he was throwing out there.”</span></em></a></p><span data-dcnode-id="2172" instrument_node="">
</span><p data-dcnode-id="2169"><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dailycaller.com/2022/04/17/house-judiciary-committee-democrats-jerry-nadler-matt-gaetz-hunter-biden-laptop/"><span data-dcnode-id="2171" instrument_node="">Democrats are blocking Republican efforts to upload the contents of Hunter Biden’s laptop in a searchable digital format into the congressional record, by citing technological limitations.</span></a></p><span data-dcnode-id="2168" instrument_node="">
</span><p data-dcnode-id="2165"><a data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thepressunited.com/updates/we-have-hunter-bidens-laptop-republican-congressman-says/"><span data-dcnode-id="2167" instrument_node="">California Rep. Darrell Issa (R) told Fox News on Sunday that the GOP is in possession of Hunter Biden’s laptop, and is poring over the “treasure trove” of data within it.</span></a></p><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2160"><a data-dcnode-id="2162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slaynews.com/economy/elon-musk-is-very-vulnerable-to-the-blackmail-of-the-chinese-communist-party-former-trump-trade-adviser-peter-navarro/"><span data-dcnode-id="2163" instrument_node="">Former Trump White House trade adviser Peter Navarro has claimed that Elon Musk is “very vulnerable to the blackmail of the Chinese Communist Party,” because he needs China to continue to allow him to sell Teslas there.</span></a><span data-dcnode-id="2161" instrument_node=""> And he points out Musk is not so principled he opposed the Chinese releasing the virus, or torturing Uighurs, so the champion of free speech act is a little questionable. If Truth Social can get to scale, it is a vastly more certain proposition, to the extent we know Trump has already wrecked the media and exposed Voter Fraud, so he tears things up wherever he goes. Musk creating this drama now, just as Truth Social is spinning up, seems like Kayfabe to keep people on Twitter, and try to shut down what is as close to a sure proposition as possible – Truth Social.</span></p><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2156"><a data-dcnode-id="2157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thegatewaypundit.com/2022/04/swamp-steps-doj-sec-launch-joint-investigation-targeting-elon-musk-attempts-hostile-takeover-twitter-reports/"><span data-dcnode-id="2158" instrument_node="">The DOJ and SEC launch a “joint investigation” targeting Elon Musk as he attempts his ‘hostile takeover’ of Twitter.</span></a></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2149"><a data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//westphaliantimes.com/jack-dorsey-says-the-twitter-board-has-consistently-been-the-dysfunction-of-the-company/"><span data-dcnode-id="2154" instrument_node="">Jack Dorsey says on Twitter, the Twitter board has </span><em data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">“consistently been the dysfunction of the company.”</span></em></a><span data-dcnode-id="2150" instrument_node=""> Somebody asked if he was allowed to say that, and he responded, “No.”</span></p><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2145"><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//threadreaderapp.com/thread/1515066585484242944.html"><span data-dcnode-id="2147" instrument_node="">Good thread on Twitter:</span></a></p><span data-dcnode-id="2144" instrument_node="">
</span><blockquote data-dcnode-id="2094"><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">One aspect of this latest surge of online censorship we don’t talk about enough is the fact that this is the first time Silicon Valley has begun openly using censorship solely to suppress dissent. They’re not saying it’s to save lives, it’s JUST to prevent wrongthink about a war.</span></p><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Think about it. With Alex Jones, QAnon, Covid skeptics etc they could claim they were censoring for the public good, to save lives and protect people from violence or a virus. Now it’s just, “Well we can’t have people saying wrong things about a war.” They’re not even pretending.</span></p><span data-dcnode-id="2138" instrument_node="">
</span><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Does a Ukrainian drop dead every time someone says they don’t believe Russia committed war crimes in Bucha? Does Putin get magic murder powers if enough social media users say they support his war? Do liberal faces melt off their skulls if they accidentally see an RT article? No.</span></p><span data-dcnode-id="2135" instrument_node="">
</span><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">There’s no conceivable argument that this latest escalation in censorship being done to save lives or serve the public interest. It’s solely to help fight a propaganda war against Russia, and to expand the radius of internet censorship protocols for its own sake.</span></p><span data-dcnode-id="2132" instrument_node="">
</span><p data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Of course for a mainstream liberal this is a distinction without a difference, because mainstream liberals already believe it’s legitimate to censor people for wrongthink or disagreeing with their government. But for the rest of us it’s a MAJOR escalation.</span></p><span data-dcnode-id="2129" instrument_node="">
</span><p data-dcnode-id="2125"><span data-dcnode-id="2128" instrument_node="">There’s no legitimate reason for the Silicon Valley proxies of the most powerful government on earth to be censoring people for disagreeing with that government about a war. But that’s exactly what’s happening, and it’s happening more and more.</span><br data-dcnode-id="2127"><span data-dcnode-id="2126" instrument_node="">
Unroll available on Thread Reader</span></p><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">No even the Hunter Biden laptop censorship was done under the banner of protecting an election from foreign interference. The argument was complete bullshit, just like all the others, but at least they were pretending to be protecting the public interest.</span></p><span data-dcnode-id="2121" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">This time is different. With censorship about the Ukraine war they’re not claiming it’s to protect an election, they’re not claiming it’s to save lives; they’re not claiming it’s in the public interest at all. It’s JUST to facilitate a US government infowar against Moscow.</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">It should alarm us all that it’s becoming increasingly acceptable to silence people not because they’re circulating dangerous disinfo, nor even because they’re saying things that are necessarily false, but solely because they are saying things which undermine the US infowar.</span></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">People should absolutely be allowed to say things which disagree with the most powerful empire in history about a war. They should even be allowed to say brazenly false things about that war, because otherwise only the powerful will be allowed to do so.</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Free speech is important not because it’s nice to be able to say what you want, but because the free flow of ideas and information creates a check on the powerful. It gives people the ability to hold the powerful to account. Which is exactly why the powerful work to eliminate it.</span></p><span data-dcnode-id="2109" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">We should see it as a huge, huge problem that so much of the world has been herded onto these giant monopolistic speech platforms that conduct censorship in complete alignment with the mightiest power structure in the world. This is the exact opposite of putting a check on power.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">There is no argument to be made that “pro-Kremlin falsehoods” lead to the harm of a single Ukrainian, or anyone else, in any conceivable way, even if we accept that what’s being said is 100% false and 100% “pro-Kremlin”. There is now no argument that it’s in the public interest.</span></p><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">The closest you’d get to arguing that it’s in the public interest is “Well the US is in a propaganda war with Russia, and it’s in the public interest that the US win that propaganda war.” But that means we no longer as a society care about truth or facts, only serving propaganda.</span></p><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">There should at least be some very serious public discussion before making such an immensely consequential leap, from claiming to be a truth-based society to collectively agreeing that we now only care about mass-scale psychological manipulation to beat Putin. But there wasn’t.</span></p><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">How much are we as a society willing to give up for the US government and its allies to win a propaganda war against Putin? This is a conversation which should already have been going on in mainstream circles for some time now, but it never even started. Let’s start it.</span></p></blockquote><span data-dcnode-id="2093" instrument_node="">
</span><p data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2090" instrument_node="">
</span><p data-dcnode-id="2087"><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehill.com/regulation/court-battles/3270216-focus-on-jan-6-stop-the-steal-rally-raises-stakes-for-justice/"><span data-dcnode-id="2089" instrument_node="">The DOJ is shifting its Jan 6th prosecutorial focus from the Capitol protest and protestors who entered the Capitol to the Stop the Steal Rally before it, trying to claim that rally instigated events at the Capitol.</span></a></p><span data-dcnode-id="2086" instrument_node="">
</span><p data-dcnode-id="2083"><a data-dcnode-id="2084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bnnbloomberg.ca/alex-jones-s-businesses-tap-advisers-weigh-possible-bankruptcy-1.1753193"><span data-dcnode-id="2085" instrument_node="">Companies owned by far-right radio host Alex Jones are getting advice from restructuring advisers and considering options including a potential bankruptcy filing after being hit by lawsuits over Jones’s conspiracy theories, according to a person with knowledge of the matter. </span></a></p><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2079"><a data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yahoo.com/lifestyle/former-arkansas-football-player-brian-220407116.html"><span data-dcnode-id="2081" instrument_node="">Former Arkansas football player Brian Wallace died Friday at 26, after two heart attacks earlier this week.</span></a></p><span data-dcnode-id="2078" instrument_node="">

</span><p data-dcnode-id="1334"><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americaoutloud.com/elon-musk-is-a-former-klaus-schwab-wef-young-global-leader/"><span data-dcnode-id="1343" instrument_node="">Elon Musk is a former Klaus Schwab WEF young global leader.</span></a><span data-dcnode-id="1341" instrument_node=""> From </span><a data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.ph/wRCvZ%23selection-3203.0-3203.103"><span data-dcnode-id="1340" instrument_node="">here:</span></a><span data-dcnode-id="1338" instrument_node=""> </span><em data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">“Elon Musk, the chairman of Tesla Motors, the much-publicized electric sports-car company, is a new YGL.”</span></em><span data-dcnode-id="1335" instrument_node=""> And they have tried to hide it. At this point there is a pretty good chance nobody you see, good or bad, is uncompromised. But it may mean the hidden hand has decided this management team is no longer competent enough to run things, so it is changing the old guard we see.</span></p><span data-dcnode-id="1333" instrument_node="">

</span></div></li><li class="widget_text widget-container widget_custom_html" data-dcnode-id="708" id="custom_html-5"><h3 class="widget-title" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">What Are r and K?</span></h3><div class="textwidget custom-html-widget" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">This site asks for your help in promoting the idea that our political ideologies evolved from r/K Selection Theory in evolutionary ecology.
&nbsp;
In evolutionary ecology, r and K describe two fundamental psychologies seen in nature, designed to adapt an organism to either a glut or a shortage.
&nbsp;
Rabbits are r-strategists, designed to exploit free resources, like fields of grass. The five psychological traits inherent to the r-strategy are docility/conflict-avoidance, promiscuity/non-monogamy, single-mom'ing, early sexualization of young, and no loyalty to a competitive in-group. All help this glut-exploiting psychology to out-reproduce everyone else by avoiding danger, mating widely starting young, booting offspring early to mate again, and never risking for others .
&nbsp;
Wolves are K-strategists, designed for when resources are too limited for everyone to survive. The five traits of a K-strategist are competitiveness/ aggressiveness/protectiveness, competitive mate monopolization/ monogamy, high-investment two-parent rearing, only mating when mature, and high loyalty to one's competitive in-group. All these traits either help you win when you have to fight, or produce and protect fitter offspring, so they will win in a dangerous world that culls the weak.
&nbsp;
Our political battle is one between a glut-exploiting r-reproductive strategy of rabbits designed to produce raw numbers and a shortage-surviving K-reproductive strategy of wolves designed to produce quality. The swings between conservatism and liberalism at the societal level are not the result of logical argument or reasoned debate. They are the result of psychological shifts produced by perceptions of K-stimuli in the environment such as conflict, danger, and shortage, or r-stimuli, such as safety, pleasure, and abundance. These perceptions trigger ancient mechanisms in the brain that adapt psychology to environment. All of politics and much of history are r vs K.
&nbsp;
Please consider helping to spread this theory by telling others about this site. As you can see by the shocked 5 star reviews on the book's Amazon page linked above, this idea, and the science behind it, blows people away when they see it. And best of all, it will utterly demoralize and crush any leftist you describe it to, in unbelievable fashion. This idea's beneficial effects on our governance and our freedom cannot be overestimated, if it can only spread.
