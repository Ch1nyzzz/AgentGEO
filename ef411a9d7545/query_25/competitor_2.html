</span><meta content="What is International Negotiation? Parties engaged in international negotiation face tough problems when there is a lack a solid understanding of a counterpart’s culture. Like any differences between groups, cultural differences are usually small, on average. Nonetheless, when we prepare for an international negotiation, we tend to overuse the stereotypes that arise from these small differences, and these stereotypes block us from noting important individuating information. Cultural barriers to communication in negotiation don’t hinge precisely on where a negotiator happens to have been born. Rather, they depend on what that negotiator does at the bargaining table. The ability to engage in constructive communication – by revealing and interpreting information – matters much more than the negotiator’s passport. When determining your international negotiation strategies, keep in mind that your strategies may need to be different from those you use at home. It’s also worth noting that during an international negotiation, even when negotiators believe they sincerely want to reach an outcome that is fair to all, their perceptions of what constitutes a fair agreement are likely to be self-serving. As a result, they are likely to believe they deserve a greater share of a given resource than an unbiased observer would judge to be fair. So how much emphasis should you place on culture when you’re preparing for an international negotiation? On the one hand, you don’t want to offend your counterpart with insensitive behavior. On the other hand, focusing too much on culture can backfire, especially if the other side is doing the same. These six guidelines should help you strike the right balance: Consider the individual. Broaden your scope and adopt a more inclusive mindset. Work to build trust. Ask questions and share information. Demonstrate principles of good-faith bargaining. Do what you can to reduce stress at the bargaining table, whether by taking breaks or extending deadlines. To learn more about international negotiation strategies, download this free report, International Negotiation: Cross-Cultural Communication Skills for International Business Executives, from Harvard Law School. We will send you a download link to your copy of the report and notify you by email when we post new business negotiation advice and information on how to improve your dealmaking skills to our website. &nbsp;" data-dcnode-id="7699" property="og:description"><span data-dcnode-id="7698" instrument_node="">

</span><p data-dcnode-id="6980"><span data-dcnode-id="6986" instrument_node="">Click here to download your&nbsp;copy of our FREE special report,&nbsp;</span><strong data-dcnode-id="6982"><a data-dcnode-id="6983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pon.harvard.edu/freemium/international-negotiations-cross-cultural-communication-skills-for-international-business-executives/" target="_blank"><em data-dcnode-id="6984"><span data-dcnode-id="6985" instrument_node="">International Negotiations: Cross-Cultural Communication Skills for International Business Executives</span></em></a></strong><span data-dcnode-id="6981" instrument_node="">, from the Program on Negotiation at Harvard Law School.</span></p><span data-dcnode-id="6979" instrument_node="">

</span><h1 class="page-title" data-dcnode-id="6971" itemprop="headline"><span data-dcnode-id="6972" instrument_node="">international negotiation</span></h1><span data-dcnode-id="6970" instrument_node="">
</span><h1 data-dcnode-id="6968"><span data-dcnode-id="6969" instrument_node="">What is International Negotiation?</span></h1><span data-dcnode-id="6967" instrument_node="">
</span><h2 data-dcnode-id="6965"><span data-dcnode-id="6966" instrument_node="">Parties engaged in international negotiation face tough problems when there is a lack a solid understanding of a counterpart’s culture.</span></h2><span data-dcnode-id="6964" instrument_node="">
</span><p data-dcnode-id="6959"><span data-dcnode-id="6963" instrument_node="">Like any differences between groups, cultural differences are usually small, on average. Nonetheless, when we prepare for an international negotiation, we tend to </span><a data-dcnode-id="6961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pon.harvard.edu/daily/international-negotiation-daily/the-power-of-stereotypes/"><span data-dcnode-id="6962" instrument_node="">overuse the stereotypes</span></a><span data-dcnode-id="6960" instrument_node=""> that arise from these small differences, and these stereotypes block us from noting important individuating information.</span></p><span data-dcnode-id="6958" instrument_node="">
</span><p data-dcnode-id="6953"><span data-dcnode-id="6957" instrument_node="">Cultural </span><a data-dcnode-id="6955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pon.harvard.edu/daily/international-negotiation-daily/negotiating-in-translation/"><span data-dcnode-id="6956" instrument_node="">barriers to communication</span></a><span data-dcnode-id="6954" instrument_node=""> in negotiation don’t hinge precisely on where a negotiator happens to have been born. Rather, they depend on what that negotiator does at the bargaining table. The ability to engage in constructive communication – by revealing and interpreting information – matters much more than the negotiator’s passport.</span></p><span data-dcnode-id="6952" instrument_node="">
</span><p data-dcnode-id="6947"><span data-dcnode-id="6951" instrument_node="">When determining your </span><a data-dcnode-id="6949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pon.harvard.edu/daily/international-negotiation-daily/international-negotiations-and-agenda-setting/"><span data-dcnode-id="6950" instrument_node="">international negotiation strategies</span></a><span data-dcnode-id="6948" instrument_node="">, keep in mind that your strategies may need to be different from those you use at home.</span></p><span data-dcnode-id="6946" instrument_node="">
</span><p data-dcnode-id="6944"><span data-dcnode-id="6945" instrument_node="">It’s also worth noting that during an international negotiation, even when negotiators believe they sincerely want to reach an outcome that is fair to all, their perceptions of what constitutes a fair agreement are likely to be self-serving. As a result, they are likely to believe they deserve a greater share of a given resource than an unbiased observer would judge to be fair.</span></p><span data-dcnode-id="6943" instrument_node="">
</span><p data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">So how much emphasis should you place on culture when you’re preparing for an international negotiation? On the one hand, you don’t want to offend your counterpart with insensitive behavior. On the other hand, focusing too much on culture can backfire, especially if the other side is doing the same.</span></p><span data-dcnode-id="6940" instrument_node="">
</span><p data-dcnode-id="6938"><span data-dcnode-id="6939" instrument_node="">These six guidelines should help you strike the right balance:</span></p><span data-dcnode-id="6937" instrument_node="">
</span><ol data-dcnode-id="6917"><span data-dcnode-id="6936" instrument_node="">
</span><li data-dcnode-id="6934"><span data-dcnode-id="6935" instrument_node="">Consider the individual.</span></li><span data-dcnode-id="6933" instrument_node="">
</span><li data-dcnode-id="6931"><span data-dcnode-id="6932" instrument_node="">Broaden your scope and adopt a more inclusive mindset.</span></li><span data-dcnode-id="6930" instrument_node="">
</span><li data-dcnode-id="6928"><span data-dcnode-id="6929" instrument_node="">Work to build trust.</span></li><span data-dcnode-id="6927" instrument_node="">
</span><li data-dcnode-id="6925"><span data-dcnode-id="6926" instrument_node="">Ask questions and share information.</span></li><span data-dcnode-id="6924" instrument_node="">
</span><li data-dcnode-id="6922"><span data-dcnode-id="6923" instrument_node="">Demonstrate principles of good-faith bargaining.</span></li><span data-dcnode-id="6921" instrument_node="">
</span><li data-dcnode-id="6919"><span data-dcnode-id="6920" instrument_node="">Do what you can to reduce stress at the bargaining table, whether by taking breaks or extending deadlines.</span></li><span data-dcnode-id="6918" instrument_node="">
</span></ol><span data-dcnode-id="6916" instrument_node="">
</span><p data-dcnode-id="6910"><span data-dcnode-id="6915" instrument_node="">To learn more about international negotiation strategies, download this free report, </span><a data-dcnode-id="6912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pon.harvard.edu/freemium/international-negotiations-cross-cultural-communication-skills-for-international-business-executives/"><i data-dcnode-id="6913"><span data-dcnode-id="6914" instrument_node="">International Negotiation: Cross-Cultural Communication Skills for International Business Executives</span></i></a><span data-dcnode-id="6911" instrument_node="">, from Harvard Law School.</span></p><span data-dcnode-id="6909" instrument_node="">
</span><p data-dcnode-id="6907"><span data-dcnode-id="6908" instrument_node="">We will send you a download link to your copy of the report and notify you by email when we post new business negotiation advice and information on how to improve your dealmaking skills to our website.</span></p><span data-dcnode-id="6906" instrument_node="">

</span><p data-dcnode-id="6816"><span data-dcnode-id="6820" instrument_node="">We all experience emotionally challenging conflicts and negotiations. Whether you are negotiating with your board or with your family, over internal resources or with external partners, as the buyer or as the seller, emotions can turn an otherwise productive negotiation into an unprofitable disaster.It does not have to be that way. In this interactive workshop,  … </span><a class="read_more" data-dcnode-id="6817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pon.harvard.edu/courses-and-training/executive-training/leveraging-power-emotions-negotiate-2/"><span data-dcnode-id="6819" instrument_node="">Read&nbsp;More&nbsp;</span><img alt="" data-dcnode-id="6818" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pon.harvard.edu/wp-content/themes/pon-haven-foundation-6-child/img/read_more_arrow.png&amp;raw"></a></p><span data-dcnode-id="6815" instrument_node="">
