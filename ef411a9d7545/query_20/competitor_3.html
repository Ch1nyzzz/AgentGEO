Q: Can we just send 5 million people back with no effect on economy?</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">TRUMP: You are going to have to send people out. Look, we either have a country or we don't have a country. We are a country of laws. [Those who entered illegally are] going to have
to go out and hopefully they get back. But we have no choice if we're going to run our country properly &amp; if we're going to be a country.</span></p><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">KASICH: If people think that we are going to ship 11 million people who are law-abiding, who are in this country,
&amp; somehow pick them up at their house &amp; ship them out to Mexico, think about the families. Think about the children. It's a silly argument. It is not an adult argument. It makes no sense.</span></p><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">TRUMP: Dwight Eisenhower, a great president, moved 1.5 million
illegal immigrants out of this country, moved them just beyond the border. They came back. Moved them again beyond the border, they came back. Didn't like it. Moved them way south. They never came back. They moved 1.5 million out. We have no choice.
</span></p><center data-dcnode-id="870"><font data-dcnode-id="871" face="Arial" size="1"><span data-dcnode-id="875" instrument_node="">
Source: </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/2015_FoxBiz_GOP.htm"><span data-dcnode-id="874" instrument_node="">Fox Business/WSJ First Tier debate</span></a><span data-dcnode-id="872" instrument_node="">
, Nov 10, 2015
</span></font></center><p data-dcnode-id="866"><span data-dcnode-id="869" instrument_node="">
</span><a data-dcnode-id="868" name="39"></a><span data-dcnode-id="867" instrument_node="">
</span></p><h3 data-dcnode-id="863"><center data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">
Walls on borders work; just ask Israel
</span></center></h3><span data-dcnode-id="862" instrument_node="">
We are a country of laws. We need borders. We will have a wall [on the Mexican border]. The wall will be built. The wall will be successful. And if you think walls don't work, all you have to do is ask Israel. The wall works, believe me. Properly done.
Believe me. [OnTheIssues note: Trump refers to the "separation barrier" that Israel built surrounding the Palestinian areas of the West Bank. It has reduced terrorist attacks, but is controversial in the peace process].
</span><center data-dcnode-id="859"><font data-dcnode-id="860" face="Arial" size="1"><span data-dcnode-id="861" instrument_node="">
Source: Fox Business/WSJ First Tier debate
, Nov 10, 2015
</span></font></center><p data-dcnode-id="855"><span data-dcnode-id="858" instrument_node="">
</span><a data-dcnode-id="857" name="41"></a><span data-dcnode-id="856" instrument_node="">
</span></p><h3 data-dcnode-id="852"><center data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">
Mexico will pay for wall, but not through tariffs
</span></center></h3><span data-dcnode-id="851" instrument_node="">
Q: You haven't told us how you're going to get Mexico to pay for the wall (on US-Mexico border).</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">TRUMP: I'll tell you right now. We have a trade imbalance of $40 billion, $45 billion with Mexico a year.
We give Mexico billions of dollars a year. The wall is going to cost $6 billion or $7 billion.</span></p><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Q: So tariffs?</span></p><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">TRUMP: No, I'm not saying that. I'll get Mexico to pay for it one way or the other. I guarantee you that.
</span></p><center data-dcnode-id="842"><font data-dcnode-id="843" face="Arial" size="1"><span data-dcnode-id="844" instrument_node="">
Source: Meet the Press 2015 interview moderated by Chuck Todd
, Nov 8, 2015
</span></font></center><p data-dcnode-id="838"><span data-dcnode-id="841" instrument_node="">
</span><a data-dcnode-id="840" name="59"></a><span data-dcnode-id="839" instrument_node="">
</span></p><h3 data-dcnode-id="835"><center data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">
Building 1,000-mile wall is possible, if we make commitment
</span></center></h3><span data-dcnode-id="834" instrument_node="">
Nobody can build a wall like me. I will build a great wall on our southern border. It's probably about 1,000 miles we will need to secure with the new wall. There are people who say it can't be done, that it's not possible to build a wall 1,000
miles long. Except beginning more than 2,000 years ago the Chinese built a wall that eventually stretched almost 13,000 miles that could never be breached.
It was a combination of massive walls, impassible trenches and ditches, and rugged natural terrain, as well as an estimated 25,000 watchtowers. Believe me, our wall- building technology has improved a lot in 2,000 years.
What we don't have that the Chinese had is the commitment to do it. They understood the danger of leaving their border unprotected and they did something about it. We talk about it and do nothing.
</span><center data-dcnode-id="828"><font data-dcnode-id="829" face="Arial" size="1"><span data-dcnode-id="833" instrument_node="">
Source: </span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Crippled_America.htm"><span data-dcnode-id="832" instrument_node="">Crippled America, by Donald Trump, p. 23-4</span></a><span data-dcnode-id="830" instrument_node="">
, Nov 3, 2015
</span></font></center><p data-dcnode-id="824"><span data-dcnode-id="827" instrument_node="">
</span><a data-dcnode-id="826" name="30"></a><span data-dcnode-id="825" instrument_node="">
</span></p><h3 data-dcnode-id="821"><center data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">
I can get Mexico to pay for border wall; politicians can't
</span></center></h3><span data-dcnode-id="820" instrument_node="">
Q: You're promising to build a wall and make another country pay for it?</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">TRUMP: Right. We're going to build the wall; we're going to create a border. We're going to let people in, but they're going to come in legally. They are going to come in legally.
And it's something that can be done. They built The Great Wall of China. That's 13,000 miles. Here, we actually need 1,000, because we have natural barriers. We can do a wall.
We're going to have a big, fat beautiful door right in the middle of the wall. We are going to have people come in, but they are coming in legally. And Mexico is going to pay for the wall, because Mexico--I love the Mexican people,
I respect the Mexican leaders, but the leaders are much sharper, smarter and more cunning than our leaders. And people say, "Oh, how are you going to get Mexico to pay?" A politician cannot get them to pay. I can.
</span></p><center data-dcnode-id="812"><font data-dcnode-id="813" face="Arial" size="1"><span data-dcnode-id="817" instrument_node="">
Source: </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/2015_CNBC_GOP.htm"><span data-dcnode-id="816" instrument_node="">GOP `Your Money/Your Vote` 2015 CNBC 1st-tier debate</span></a><span data-dcnode-id="814" instrument_node="">
, Oct 28, 2015
</span></font></center><p data-dcnode-id="808"><span data-dcnode-id="811" instrument_node="">
</span><a data-dcnode-id="810" name="48"></a><span data-dcnode-id="809" instrument_node="">
</span></p><h3 data-dcnode-id="805"><center data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">
The border wall will be well-managed and built correctly
</span></center></h3><span data-dcnode-id="804" instrument_node="">
Q: How is a Mexican wall even feasible?</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">TRUMP: I'm telling you, it's called management. You can do this and we can expedite the good immigrants to come back in. And everybody wants that. But they have to come in legally. We have
to be a country of laws and borders. We have wonderful Border Patrol people, but they're not allowed to do their job. I will get the best people to build this wall and we will do it properly and we will do it humanely and get the good ones back in.
</span></p><center data-dcnode-id="799"><font data-dcnode-id="800" face="Arial" size="1"><span data-dcnode-id="801" instrument_node="">
Source: ABC This Week 2015 interviews of 2016 presidential hopefuls
, Aug 23, 2015
</span></font></center><p data-dcnode-id="795"><span data-dcnode-id="798" instrument_node="">
</span><a data-dcnode-id="797" name="22"></a><span data-dcnode-id="796" instrument_node="">
</span></p><h3 data-dcnode-id="792"><center data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">
We need wall on Mexican border, but ok to have a door in it
</span></center></h3><span data-dcnode-id="791" instrument_node="">
Q: You say that the Mexican government is sending criminals--rapists, drug dealers--across the border. </span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">TRUMP: If it weren't for me, you wouldn't even be talking about illegal immigration.
This was not a subject that was on anybody's mind until I brought it up at my announcement.
The fact is, since then, many killings, murders, crime, drugs are pouring across the border, our money going out and the drugs coming in. And I said we need to build a wall, and it has to be built quickly.
And I don't mind having a big beautiful door in that wall so that people can come into this country legally. But we need to build a wall, we need to keep illegals out.
</span></p><center data-dcnode-id="783"><font data-dcnode-id="784" face="Arial" size="1"><span data-dcnode-id="788" instrument_node="">
Source: </span><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/2015_Fox_GOP.htm"><span data-dcnode-id="787" instrument_node="">Fox News/Facebook Top Ten First Tier debate transcript</span></a><span data-dcnode-id="785" instrument_node="">
, Aug 6, 2015
</span></font></center><p data-dcnode-id="779"><span data-dcnode-id="782" instrument_node="">
</span><a data-dcnode-id="781" name="17"></a><span data-dcnode-id="780" instrument_node="">
</span></p><h3 data-dcnode-id="776"><center data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">
Mexico &amp; Latin America send us drugs, crime, and rapists
</span></center></h3><span data-dcnode-id="775" instrument_node="">
Mexico is beating us economically. They are not our friend, believe me. But they're killing us economically. The U.S. has become a dumping ground for everybody else's problems.</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">When Mexico sends its people, they're not sending their best.
They're sending people that have lots of problems, and they're bringing those problems. They're bringing drugs. They're bringing crime. They're rapists.</span></p><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">
And some, I assume, are good people. But I speak to border guards and they tell us what we're getting. And it only makes common sense. They're sending us not the right people.</span></p><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">It's coming from more than Mexico. It's coming from all over South and
Latin America, and it's coming probably--probably--from the Middle East. But we don't know. Because we have no protection and we have no competence, we don't know what's happening. And it's got to stop and it's got to stop fast.
</span></p><center data-dcnode-id="763"><font data-dcnode-id="764" face="Arial" size="1"><span data-dcnode-id="768" instrument_node="">
Source: </span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/2015_Hopefuls.htm"><span data-dcnode-id="767" instrument_node="">2015 announcement speeches of 2016 presidential hopefuls</span></a><span data-dcnode-id="765" instrument_node="">
, Jun 16, 2015
</span></font></center><p data-dcnode-id="759"><span data-dcnode-id="762" instrument_node="">
</span><a data-dcnode-id="761" name="19"></a><span data-dcnode-id="760" instrument_node="">
</span></p><h3 data-dcnode-id="756"><center data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">
Build great wall on southern border; have Mexico pay for it
</span></center></h3><span data-dcnode-id="755" instrument_node="">
I would build a great wall, and nobody builds walls better than me, believe me, and I'll build them very inexpensively,
I will build a great, great wall on our southern border. And I will have Mexico pay for that wall.
</span><center data-dcnode-id="752"><font data-dcnode-id="753" face="Arial" size="1"><span data-dcnode-id="754" instrument_node="">
Source: 2015 announcement speeches of 2016 presidential hopefuls
, Jun 16, 2015
</span></font></center><p data-dcnode-id="748"><span data-dcnode-id="751" instrument_node="">
</span><a data-dcnode-id="750" name="10"></a><span data-dcnode-id="749" instrument_node="">
</span></p><h3 data-dcnode-id="745"><center data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">
Triple-layered fence &amp; Predator drones on Mexican border
</span></center></h3><span data-dcnode-id="744" instrument_node="">
I am impressed with the success of the double- and triple-layered fence in places like Yuma, Arizona. The wall there is a serious 20-foot wall. It has three walls separated by 75-yard "no man's lands" for border agents to zoom up and down in vehicles.
It also has cameras, radio systems, radar, and pole-topped lights. After the triple-layered fence was installed, the 120-mile stretch of the US-Mexican border known as the Yuma sector experienced a 72 percent plunge in illegal immigrant apprehensions.</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">
We need to be ready to build other kinds of fences, too. The point is that properly built walls work. We just need the political will to finish the job. And by the way, finishing the job will employ a lot of construction workers. Moreover, I call on
Congress and the president to hire another 25,000 border patrol agents and give them the aerial equipment they need, such as Predator drones, to provide real-time aerial reconnaissance information to agents guarding the border wall.
</span></p><center data-dcnode-id="736"><font data-dcnode-id="737" face="Arial" size="1"><span data-dcnode-id="741" instrument_node="">
Source: </span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Get_Tough.htm"><span data-dcnode-id="740" instrument_node="">Time to Get Tough, by Donald Trump, p.146-147</span></a><span data-dcnode-id="738" instrument_node="">
, Dec 5, 2011
</span></font></center><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">
</span></p><hr data-dcnode-id="733" size="5"><font color="#cc0000" data-dcnode-id="732"></font><center data-dcnode-id="726"><font color="#cc0000" data-dcnode-id="727"><span data-dcnode-id="731" instrument_node="">
</span><a data-dcnode-id="730" name="Visa_Rules"></a><h1 data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">
Donald Trump on Visa Rules</span></h1></font></center><span data-dcnode-id="725" instrument_node="">
</span><a data-dcnode-id="724" name="141"></a><span data-dcnode-id="723" instrument_node="">
</span><h3 data-dcnode-id="720"><center data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">
We want more people to come, via legal merit system
</span></center></h3><span data-dcnode-id="719" instrument_node="">
Q: What will you do for our immigration system to make more people can become citizens and vote?</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">TRUMP: We are doing something with immigration that I think is going to be very strong because we want people to come into our country.
We want people to come into our country. We want them to come in--a lot of people--but we want them to come in through a legal system.
Through a system that they work to come into our country.  A merit system and we're working on something very hard right now.
And in a very short time we're going to be announcing it. And I think it's going to have quite an impact. I think it's going to be something that actually will be popular for all.
</span></p><center data-dcnode-id="711"><font data-dcnode-id="712" face="Arial" size="1"><span data-dcnode-id="716" instrument_node="">
Source: </span><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/2020_ABC.htm"><span data-dcnode-id="715" instrument_node="">ABC This Week: special edition 2020 Town Hall interview</span></a><span data-dcnode-id="713" instrument_node="">
, Sep 15, 2020
</span></font></center><p data-dcnode-id="707"><span data-dcnode-id="710" instrument_node="">
</span><a data-dcnode-id="709" name="152"></a><span data-dcnode-id="708" instrument_node="">
</span></p><h3 data-dcnode-id="704"><center data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">
Mother participated in chain migration in 1930
</span></center></h3><span data-dcnode-id="703" instrument_node="">
When Fred [Donald Trump's father] was 25 years old, he attended a dance where he met Mary Anne Mcleod, recently arrived from Scotland. According to family legend, he returned home, he told his mother that he met the girl he was going to marry. </span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Mary
[Donald Trump's mother] had been the youngest of ten in 1912 in the Outer Hebrides, located 40 miles off the coast of Scotland. Mary, one of six daughters, was encouraged to journey to America, where the opportunities were greater , and the men more
plentiful. </span></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">In 1930, in a classic example of mass migration, Mary boarded the RMS Transylvania in order to join two of her sisters who had already settled in the US. Despite her status as a domestic servant, as a white Anglo-Saxon, Mary would have
been allowed into the country even under her son's new draconian immigration laws introduced nearly 90 years later. She turned 18 the day before her arrival in New York and met Fred not long after. Fred and Mary were married in 1936.
</span></p><center data-dcnode-id="693"><font data-dcnode-id="694" face="Arial" size="1"><span data-dcnode-id="698" instrument_node="">
Source: </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Mary%2520Trump.htm"><span data-dcnode-id="697" instrument_node="">Too Much and Never Enough, by Mary Trump, p. 30</span></a><span data-dcnode-id="695" instrument_node="">
, Jul 14, 2020
</span></font></center><p data-dcnode-id="689"><span data-dcnode-id="692" instrument_node="">
</span><a data-dcnode-id="691" name="157"></a><span data-dcnode-id="690" instrument_node="">
</span></p><h3 data-dcnode-id="686"><center data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">
Why are we having people from sh--hole countries come here?
</span></center></h3><span data-dcnode-id="685" instrument_node="">
Graham began walking through the plan, which included the money Trump asked for on the border security. It was not enough, Trump said, condescendingly. Graham said he was sure they could do more but this is where they started.
And he mentioned 25,000 visas from mostly African countries. He turned to the visas in such places as Haiti and El Salvador because of Earthquakes, famine, and violence.</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">"Haitians,"
Trump said. "We don't need more Haitian's." At that and mentioned of immigrants from African countries. "Why are we having all these people from sh--hole countries come here?"
He had just met with the Prime Minister from Norway. Why not more Norwegians? Or Asians who could help the economy.
</span></p><center data-dcnode-id="677"><font data-dcnode-id="678" face="Arial" size="1"><span data-dcnode-id="682" instrument_node="">
Source: </span><a data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Woodward_Fear.htm"><span data-dcnode-id="681" instrument_node="">Fear: Trump in the White House, by Bob Woodward, p.320</span></a><span data-dcnode-id="679" instrument_node="">
, Sep 10, 2019
</span></font></center><p data-dcnode-id="673"><span data-dcnode-id="676" instrument_node="">
</span><a data-dcnode-id="675" name="132"></a><span data-dcnode-id="674" instrument_node="">
</span></p><h3 data-dcnode-id="670"><center data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">
Refugees can't come in; sorry, we're full
</span></center></h3><span data-dcnode-id="669" instrument_node="">
With his recent speech before the Republican Jewish Coalition, Trump insinuated that American Jews have dual loyalties, specifically when he referred to Israeli Prime Minister Bibi Netanyahu as "your prime minister." Yet even more offensive was
Trump's xenophobic rhetoric on immigration, uttered before an audience of Jews, an ethnic group that was victimized by immigration xenophobia during the Holocaust. </span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">
Specifically, in referring to refugees seeking asylum in America from political persecution in their native lands, Trump stated, "You can't come in. Our country is full. What can we do? We can't handle any more. Our country's full. You can't come in,
I'm sorry."</span></p><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">These were literally the exact words antisemitic public officials used to justify America denying entry to European Jews fleeing Nazi extermination during the Holocaust.
</span></p><center data-dcnode-id="659"><font data-dcnode-id="660" face="Arial" size="1"><span data-dcnode-id="664" instrument_node="">
Source: </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/2020_Hopefuls.htm"><span data-dcnode-id="663" instrument_node="">InsiderNJ.com on 2020 presidential hopefuls</span></a><span data-dcnode-id="661" instrument_node="">
, Apr 9, 2019
</span></font></center><p data-dcnode-id="655"><span data-dcnode-id="658" instrument_node="">
</span><a data-dcnode-id="657" name="95"></a><span data-dcnode-id="656" instrument_node="">
</span></p><h3 data-dcnode-id="652"><center data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">
Replace visa lottery with merit-based system
</span></center></h3><span data-dcnode-id="651" instrument_node="">
TRUMP: [My immigration package] ends the visa lottery--a program that randomly hands out green cards without any regard for skill, merit, or the safety of our people. It is time to begin moving towards a merit-based immigration system--one that admits
people who are skilled, who want to work, who will contribute to our society, and who will love and respect our country.</span><p data-dcnode-id="646"><b data-dcnode-id="648"><i data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Christian Science Monitor explanation:</span></i></b><span data-dcnode-id="647" instrument_node="">The president &amp; his supporters appear to be defining merit as highly skilled,
well-educated immigrants who speak English and can support themselves. But what about strawberry pickers? Those jobs are commonly performed by low-skilled immigrants. The administration points to countries such as Canada and Australia that have supply-
oriented policies. These countries have long used point systems to qualify applicants, assigning them points for education, working age, employment, language, &amp; other skills that determine their likelihood of assimilation and contribution to the economy.
</span></p><center data-dcnode-id="640"><font data-dcnode-id="641" face="Arial" size="1"><span data-dcnode-id="645" instrument_node="">
Source: </span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Media_CSMonitor.htm"><span data-dcnode-id="644" instrument_node="">Christian Science Monitor on 2018 State of the Union address</span></a><span data-dcnode-id="642" instrument_node="">
, Jan 30, 2018
</span></font></center><p data-dcnode-id="636"><span data-dcnode-id="639" instrument_node="">
</span><a data-dcnode-id="638" name="93"></a><span data-dcnode-id="637" instrument_node="">
</span></p><h3 data-dcnode-id="633"><center data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">
Fact-check: End chain migration? It can't actually happen
</span></center></h3><span data-dcnode-id="632" instrument_node="">
[My immigration plan] protects the nuclear family by ending chain migration. Under the current broken system, a single immigrant can bring in virtually unlimited numbers of distant relatives. Under our plan, we focus on the immediate family by limiting
sponsorships to spouses and minor children. </span><p data-dcnode-id="627"><b data-dcnode-id="629"><i data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Politico.com Fact-Check:</span></i></b><span data-dcnode-id="628" instrument_node=""> Family reunification has been the basis for immigration since 1965. Under this law, if you marry that guy you met while working in Shanghai, you can bring him home.
And his 2-year-old. And when you'd like his parents to help with child care, you can bring them in too, after a few years. If we had a family immigration system without limits, this structure could theoretically lead to the dreaded chain migration. That
Chinese spouse can petition for his sister, and her family, and so on. But the immigration system's waiting lists make chain migration a theory that doesn't really happen in practice. This is because each link in the chain takes years to complete. \
</span></p><center data-dcnode-id="621"><font data-dcnode-id="622" face="Arial" size="1"><span data-dcnode-id="626" instrument_node="">
Source: </span><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Media_Politico.htm"><span data-dcnode-id="625" instrument_node="">Politico.com FactCheck on 2018 State of the Union address</span></a><span data-dcnode-id="623" instrument_node="">
, Jan 26, 2018
</span></font></center><p data-dcnode-id="617"><span data-dcnode-id="620" instrument_node="">
</span><a data-dcnode-id="619" name="134"></a><span data-dcnode-id="618" instrument_node="">
</span></p><h3 data-dcnode-id="614"><center data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">
H-1B visas help high-tech industry; we'll figure it out
</span></center></h3><span data-dcnode-id="613" instrument_node="">
On December 14, a high-level delegation from Silicon Valley came to Trump Tower to meet the president-elect, though Trump had repeatedly criticized the tech industry throughout the campaign. Later that afternoon, Trump called Rupert Murdoch,
who asked him how the meeting had gone. </span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">"Oh, great, just great," said Trump. "Really, really good. These guys really need my help. Obama was not very favorable to them, too much regulation. This is really an opportunity for me to help them."
</span></p><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">"Donald," said Murdoch, "for eight years these guys had Obama in their pocket. They practically ran the administration. They don't need your help." </span></p><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">"Take this H-1B visa issue. They really need these H-1B visas."
</span></p><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Murdoch suggested that taking a liberal approach to H-1B visas might be hard to square with his immigration promises. But Trump seemed unconcerned, assuring Murdoch, "We'll figure it out."
</span></p><center data-dcnode-id="599"><font data-dcnode-id="600" face="Arial" size="1"><span data-dcnode-id="604" instrument_node="">
Source: </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Fire_and_Fury.htm"><span data-dcnode-id="603" instrument_node="">Fire and Fury, by Michael Wolff, p. 36</span></a><span data-dcnode-id="601" instrument_node="">
, Jan 5, 2018
</span></font></center><p data-dcnode-id="595"><span data-dcnode-id="598" instrument_node="">
</span><a data-dcnode-id="597" name="87"></a><span data-dcnode-id="596" instrument_node="">
</span></p><h3 data-dcnode-id="592"><center data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">
Revamp guest-worker program, even those used in Trump hotels
</span></center></h3><span data-dcnode-id="591" instrument_node="">
Administration officials said Trump will direct the Departments of Labor, Justice, State, and Homeland Security to crack down on fraud and abuse in guest-worker programs by issuing new immigration rules. </span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">White House officials singled out the
H-1B visa for "high-skilled" foreigners in the science and engineering industries as the priority for reform, but said a comprehensive review could lead to changes in other guest worker programs, including visas Trump's own company uses for foreign
workers at his hotels, golf courses and vineyard.</span></p><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">The officials said reform could first come through administrative changes, such as raising the visa application fees, adjusting the wage scale to more accurately reflect prevailing salaries in the tech
industry, and more vigorously enforcing violations. It could also change the lottery system to give foreigners with U.S. master's degrees a leg up. The current worker visa program has been diluted as rules have gone unenforced, the officials said.
</span></p><center data-dcnode-id="581"><font data-dcnode-id="582" face="Arial" size="1"><span data-dcnode-id="586" instrument_node="">
Source: </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/Trump_Promises.htm"><span data-dcnode-id="585" instrument_node="">Washington Post on Trump Administration promises</span></a><span data-dcnode-id="583" instrument_node="">
, Apr 17, 2017
</span></font></center><p data-dcnode-id="577"><span data-dcnode-id="580" instrument_node="">
</span><a data-dcnode-id="579" name="73"></a><span data-dcnode-id="578" instrument_node="">
</span></p><h3 data-dcnode-id="574"><center data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">
Merit-based immigration system instead of lower skills
</span></center></h3><span data-dcnode-id="573" instrument_node="">
Protecting our workers means reforming our system of legal immigration. The current, outdated system depresses wages for our poorest workers, &amp; puts great pressure on taxpayers.</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Nations around the world, like Canada, Australia and many others--have a
merit-based immigration system. It is a basic principle that those seeking to enter a country ought to be able to support themselves financially. Yet, in America, we do not enforce this rule, straining the very public resources that our poorest citizens
rely upon.</span></p><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Switching away from this current system of lower-skilled immigration, and instead adopting a merit-based system, will have many benefits: it will save countless dollars, raise workers' wages, &amp; help struggling families--including immigrant
families--enter the middle class.</span></p><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">I believe that real &amp; positive immigration reform is possible, as long as we focus on the following goals: to improve jobs &amp; wages for Americans, to strengthen our nation's security, &amp; to restore respect for our laws.
</span></p><center data-dcnode-id="561"><font data-dcnode-id="562" face="Arial" size="1"><span data-dcnode-id="566" instrument_node="">
Source: </span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/SOTU_2017.htm"><span data-dcnode-id="565" instrument_node="">2017 State of the Union address to Congress</span></a><span data-dcnode-id="563" instrument_node="">
, Feb 28, 2017
</span></font></center><p data-dcnode-id="557"><span data-dcnode-id="560" instrument_node="">
</span><a data-dcnode-id="559" name="67"></a><span data-dcnode-id="558" instrument_node="">
</span></p><h3 data-dcnode-id="554"><center data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">
Let college grads stay but H-1B only if jobs can't be filled
</span></center></h3><span data-dcnode-id="553" instrument_node="">
Q: Would you support any changes in immigration policy regarding scientists and engineers who receive their graduate degree at an American university? </span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">TRUMP: The issues brought up in your question are exactly what we should be addressing in
immigration reform. If we allow individuals in this country legally to get their educations, we should let them stay if they want to contribute to our economy. It makes no sense to kick them out of the country right after they achieve such extraordinary
goals.</span></p><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Q: What is your opinion of recent controversy over employment and the H1-B Visa program?</span></p><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">TRUMP: We cannot allow companies to abuse this system. When we have American citizens and those living in the
United States legally being pushed out of high paying jobs so that they can be replaced with "cheaper" labor, something is wrong. The H1-B system should be employed only when jobs cannot be filled with qualified Americans and legal residents.</span></p><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">
</span></p><center data-dcnode-id="539"><font data-dcnode-id="540" face="Arial" size="1"><span data-dcnode-id="544" instrument_node="">
Source: </span><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/2016_ScienceDebate.htm"><span data-dcnode-id="543" instrument_node="">ScienceDebate.org: 20 questions for 2016 presidential race</span></a><span data-dcnode-id="541" instrument_node="">
, Oct 9, 2016
</span></font></center><p data-dcnode-id="535"><span data-dcnode-id="538" instrument_node="">
</span><a data-dcnode-id="537" name="55"></a><span data-dcnode-id="536" instrument_node="">
</span></p><h3 data-dcnode-id="532"><center data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">
I take advantage of H-1B visas; but stop them
</span></center></h3><span data-dcnode-id="531" instrument_node="">
Q: Your critics say your campaign platform is inconsistent with how you run your businesses, noting that you've brought in foreign workers instead of hiring Americans. Why should voters trust that you will run the country differently from how you run
your businesses?</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">TRUMP: Because nobody knows the system better than me. I know the H-1B. I know the H-2B. Nobody knows it better than me. I'm a businessman. These are laws. These are rules. We're allowed to do it. So I will take advantage of it;
they're the laws. But I'm the one that knows how to change it.</span></p><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Q: So what would you do with H-1B visas?</span></p><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">TRUMP: It's something that I frankly use and I shouldn't be allowed to use it. We shouldn't have it. Very, very bad for workers. And second of
all, I think it's very important to say, well, I'm a businessman and I have to do what I have to do. When it's sitting there waiting for you, but it's very bad. It's very bad for our workers and it's unfair for our workers. And we should end it.
</span></p><center data-dcnode-id="519"><font data-dcnode-id="520" face="Arial" size="1"><span data-dcnode-id="524" instrument_node="">
Source: </span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontheissues.org/2016_CBS_GOP_FL.htm"><span data-dcnode-id="523" instrument_node="">2016 GOP primary debate in Miami</span></a><span data-dcnode-id="521" instrument_node="">
, Mar 10, 2016
</span></font></center><p data-dcnode-id="515"><span data-dcnode-id="518" instrument_node="">
</span><a data-dcnode-id="517" name="53"></a><span data-dcnode-id="516" instrument_node="">
</span></p><h3 data-dcnode-id="512"><center data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">
Let the good ones come back in; that's not amnesty
</span></center></h3><span data-dcnode-id="511" instrument_node="">
CRUZ: The people that get forgotten in this debate over immigration are the hardworking men and women of this country, millions of Americans who are losing their jobs. We have always welcomed legal immigrants, but
I think it is a mistake to forgive those who break the law to allow them to become U.S. citizens, and that's why I've led the fight against granting citizenship to those here illegally.</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">

</span></p><h3 data-dcnode-id="496"><center data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">

</span></p><h3 data-dcnode-id="449"><center data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">

</span></center></h3><span data-dcnode-id="448" instrument_node="">
