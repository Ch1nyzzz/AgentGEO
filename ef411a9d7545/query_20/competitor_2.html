</span><span data-dcnode-id="4873" id="freeTextContainer2624688460854787116"><span data-dcnode-id="4885" instrument_node="">Trump reveals the business secrets that have made him America’s foremost deal maker!</span><br data-dcnode-id="4884"><b data-dcnode-id="4882"><span data-dcnode-id="4883" instrument_node="">&nbsp;</span></b><br data-dcnode-id="4881"><i data-dcnode-id="4879"><span data-dcnode-id="4880" instrument_node="">“I like thinking big. I always have. To me it’s very simple: If you’re going to be thinking anyway, you might as well think big.”—Donald J. Trump</span></i><br data-dcnode-id="4878"><b data-dcnode-id="4876"><span data-dcnode-id="4877" instrument_node="">&nbsp;</span></b><br data-dcnode-id="4875"><span data-dcnode-id="4874" instrument_node=""> Here is Trump in action—how he runs his business and how he runs his life—as he meets the people he needs to meet, chats with family and friend</span></span><span data-dcnode-id="4872" instrument_node="">
</span><span data-dcnode-id="4854" id="freeText2624688460854787116" style="display:none"><span data-dcnode-id="4871" instrument_node="">Trump reveals the business secrets that have made him America’s foremost deal maker!</span><br data-dcnode-id="4870"><b data-dcnode-id="4868"><span data-dcnode-id="4869" instrument_node="">&nbsp;</span></b><br data-dcnode-id="4867"><i data-dcnode-id="4865"><span data-dcnode-id="4866" instrument_node="">“I like thinking big. I always have. To me it’s very simple: If you’re going to be thinking anyway, you might as well think big.”—Donald J. Trump</span></i><br data-dcnode-id="4864"><b data-dcnode-id="4862"><span data-dcnode-id="4863" instrument_node="">&nbsp;</span></b><br data-dcnode-id="4861"><span data-dcnode-id="4860" instrument_node=""> Here is Trump in action—how he runs his business and how he runs his life—as he meets the people he needs to meet, chats with family and friends, clashes with enemies, and changes the face of the New York City skyline. But even a maverick plays by rules, and Trump has formulated eleven guidelines for success. He isolates the common elements in his greatest deals; he shatters myths; he names names, spells out the zeros, and fully reveals the deal-maker’s art. And throughout, Trump talks—really talks—about how he does it. </span><i data-dcnode-id="4858"><span data-dcnode-id="4859" instrument_node="">Trump: The Art of the Deal</span></i><span data-dcnode-id="4857" instrument_node=""> is an unguarded look at the mind of a brilliant entrepreneur and an unprecedented education in the practice of deal-making. It’s the most streetwise business book there is—and the ultimate read for anyone interested in achieving money and success, and knowing the man behind the spotlight.</span><br data-dcnode-id="4856"><span data-dcnode-id="4855" instrument_node=""> &nbsp;</span></span><span data-dcnode-id="4853" instrument_node="">

</span><span data-dcnode-id="4126" id="freeTextContainer14689886910004388072"><span data-dcnode-id="4133" instrument_node="">America's favorite, number-one con man expounds on how great he is. And, how easy it is to fool people.</span><br data-dcnode-id="4132"><br data-dcnode-id="4131"><span data-dcnode-id="4130" instrument_node="">It is no overstatement to call this book America's premier political tract of the 21st century; It embodies the heart of darkness that is the "fuck everybody but me" mentality carefully groomed into the populace by the Right-Wing machine and which drives today's rejection-of-the-commonweal politics. Trump one-ups Machiavelli.</span><br data-dcnode-id="4129"><br data-dcnode-id="4128"><span data-dcnode-id="4127" instrument_node="">It is truly the Bible of Fox News/Ayn Randian culture. And just becaus</span></span><span data-dcnode-id="4125" instrument_node="">
</span><span data-dcnode-id="4031" id="freeText14689886910004388072" style="display:none"><span data-dcnode-id="4124" instrument_node="">America's favorite, number-one con man expounds on how great he is. And, how easy it is to fool people.</span><br data-dcnode-id="4123"><br data-dcnode-id="4122"><span data-dcnode-id="4121" instrument_node="">It is no overstatement to call this book America's premier political tract of the 21st century; It embodies the heart of darkness that is the "fuck everybody but me" mentality carefully groomed into the populace by the Right-Wing machine and which drives today's rejection-of-the-commonweal politics. Trump one-ups Machiavelli.</span><br data-dcnode-id="4120"><br data-dcnode-id="4119"><span data-dcnode-id="4118" instrument_node="">It is truly the Bible of Fox News/Ayn Randian culture. And just because Trump is callow doesn't mean he's not honest. He tells you outright that he's out to screw you. But in America there is something ingrained in the citizenry that equates this kind of openly ballsy mercenary behavior with goodness, quality and substance. Moxie as an inherent good. The simple appeal of the loud strong man. Action over the cerebral. Thoughtfulness? Constitutional muster? Historical lessons? Screw all of that. Leave that shit to liberal philosophy professors. Trump voters love a con man. They would, of course, hate him if they'd found he'd hacked into their bank accounts directly and taken all their money. But they'll love him when he takes their money by perpetuating the present corporate mercenary system. Because they will be too stupid to know they've been robbed when it happens through the back door. Putting two and two together equals some number they can't quite calculate.</span><br data-dcnode-id="4117"><br data-dcnode-id="4116"><span data-dcnode-id="4115" instrument_node="">Let's give Trump credit for being the first politician to openly reveal the long-unstated view that the Republican Party has of its fact-challenged base: "I love the poorly educated." </span><br data-dcnode-id="4114"><br data-dcnode-id="4113"><span data-dcnode-id="4112" instrument_node="">There are some alternate titles for this book that would be just a valid:</span><br data-dcnode-id="4111"><span data-dcnode-id="4110" instrument_node="">* </span><i data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">The Art of the Con</span></i><span data-dcnode-id="4107" instrument_node="">, or</span><br data-dcnode-id="4106"><span data-dcnode-id="4105" instrument_node="">* </span><i data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">The Art of Being an Asshole</span></i><span data-dcnode-id="4102" instrument_node="">, or</span><br data-dcnode-id="4101"><span data-dcnode-id="4100" instrument_node="">* </span><i data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">The Art of the Deal for People Who Have Millions of Dollars to Play Around With From the Get-Go</span></i><span data-dcnode-id="4097" instrument_node="">, or</span><br data-dcnode-id="4096"><span data-dcnode-id="4095" instrument_node="">* </span><i data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">The Art of How to Bully People, Exploit a Corrupt System, and Make a Bundle While Producing Nothing of Value in the Process</span></i><span data-dcnode-id="4092" instrument_node="">.</span><br data-dcnode-id="4091"><br data-dcnode-id="4090"><span data-dcnode-id="4089" instrument_node="">Opening of the book, with my modest amendments:</span><br data-dcnode-id="4088"><span data-dcnode-id="4087" instrument_node="">"To my parents, Fred and Mary Trump..." who gave me millions of dollars the rest of you don't have, to pull myself up by my bootstraps with...</span><br data-dcnode-id="4086"><br data-dcnode-id="4085"><span data-dcnode-id="4084" instrument_node="">"I owe special thanks to several people...Ivana Trump, my wonderful wife..." who I will soon divorce when her trophy value has declined...</span><br data-dcnode-id="4083"><br data-dcnode-id="4082"><span data-dcnode-id="4081" instrument_node="">"And, [to] my three children..." whom I would bed in a heartbeat if they weren't my daughters, because, hey, they're hot; let's get real, people. But not the son, because, c'mon I ain't no homo.</span><br data-dcnode-id="4080"><br data-dcnode-id="4079"><span data-dcnode-id="4078" instrument_node="">Luckily, the Donald deigned to make time to share these kernels of wisdom with us, because, as he makes it known repeatedly, he is a very busy man, and thus hardly able to spend time on a book. We are to infer our privilege from this, and should be grateful that Trump dictated this to his ghostwriter, Tony Schwartz. And that's what this feels like: a piece of dictation. Trump could have talked into a tape recorder and had a transcriber write the book. Maybe that's close to how this actually happened. The book feels very much like a Donald Trump political speech: Full of braggadocio, flippant false sincerity, shallow statements lacking detail or justification, pandering provocative fear-mongering insults that trigger lizard-brain endorphins, and rambling jumps from one unrelated thing to another. </span><br data-dcnode-id="4077"><br data-dcnode-id="4076"><span data-dcnode-id="4075" instrument_node="">This is more or less the narrative of this book: "I got a call from *insert name of famous or powerful person* about *insert pending business deal* and I told *famous or powerful person* to: *(A: get back to my lawyer on it, or B.) I look forward to doing business on this, or C.) I'm gonna sue your ass*."</span><br data-dcnode-id="4074"><br data-dcnode-id="4073"><span data-dcnode-id="4072" instrument_node="">Valuable things I learned:</span><br data-dcnode-id="4071"><span data-dcnode-id="4070" instrument_node="">* I'm a winner.</span><br data-dcnode-id="4069"><span data-dcnode-id="4068" instrument_node="">* "I make deals, that's how I get my kicks." (at least he starts off honestly)</span><br data-dcnode-id="4067"><span data-dcnode-id="4066" instrument_node="">*If I weasel my way into an organization, people will pay to get rid of me.</span><br data-dcnode-id="4065"><span data-dcnode-id="4064" instrument_node="">*I will threaten you with lawsuits, even criminal ones that don't really apply, if you try to take actions I don't like. That always makes 'em nervous.</span><br data-dcnode-id="4063"><span data-dcnode-id="4062" instrument_node="">*I file a lot of lawsuits, and win them (except the ones I lose or withdraw, which I don't mention in this book).</span><br data-dcnode-id="4061"><span data-dcnode-id="4060" instrument_node="">*If your name is Donald Trump, everyone wants to sue you.</span><br data-dcnode-id="4059"><span data-dcnode-id="4058" instrument_node="">*It pays to sometimes be a little wild, and a bully.</span><br data-dcnode-id="4057"><span data-dcnode-id="4056" instrument_node="">*I'm a populist hero who helps little old ladies keep their farms against big bad cold-hearted foreclosing bankers (except when I do the same thing, which I have, but don't mention in this book).</span><br data-dcnode-id="4055"><span data-dcnode-id="4054" instrument_node="">*I use the word "ridiculous" a lot, as shorthand and in lieu of actually explaining my justifications.</span><br data-dcnode-id="4053"><span data-dcnode-id="4052" instrument_node="">*I know a lot of celebrities and business leaders who do me favors and give me free stuff. They're all very nice guys.</span><br data-dcnode-id="4051"><span data-dcnode-id="4050" instrument_node="">*Other people who are pompous... I don't like them so much.</span><br data-dcnode-id="4049"><span data-dcnode-id="4048" instrument_node="">*I'm such a micromanager that I even get involved in the Christmas decorations that are hung in Trump Tower. I hate all of the decorating options except for one really huge gold wreath because, as I say, "Less is more." [seriously]</span><br data-dcnode-id="4047"><span data-dcnode-id="4046" instrument_node="">*My son has my genes, because he won't take no for an answer. (But hey, neither do rapists. OK, I just threw that in for fun.)</span><br data-dcnode-id="4045"><span data-dcnode-id="4044" instrument_node="">*I love people who tell me things in 20 seconds because they don't waste my time.</span><br data-dcnode-id="4043"><span data-dcnode-id="4042" instrument_node="">*When I don't have a real answer, have no substance or no progress to report on a project I'll just call a press conference and (and I quote): "What the hell...I'll wing it and things will work out." [in other words, this will be the template for my future political speeches...and the dummies won't know the difference].</span><br data-dcnode-id="4041"><br data-dcnode-id="4040"><span data-dcnode-id="4039" instrument_node="">This gets three stars for unintentional laughs. If I were the Donald I would use some of my cash to get better hair, and then I would review my book thusly:</span><br data-dcnode-id="4038"><br data-dcnode-id="4037"><span data-dcnode-id="4036" instrument_node="">"Let me tell ya, folks, it's a mess."</span><br data-dcnode-id="4035"><br data-dcnode-id="4034"><span data-dcnode-id="4033" instrument_node="">(KevinR@Ky 2016)</span><br data-dcnode-id="4032"></span><span data-dcnode-id="4030" instrument_node="">

        rated it
        </span><span class="staticStars notranslate" data-dcnode-id="3953" title="it was amazing"><span class="staticStar p10" data-dcnode-id="3958" size="15x15"><span data-dcnode-id="3959" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="3957" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3956" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3955" size="15x15"></span><span class="staticStar p10" data-dcnode-id="3954" size="15x15"></span></span><span data-dcnode-id="3952" instrument_node="">

</span><span data-dcnode-id="3940" id="freeTextContainer1733031486601051041"><span data-dcnode-id="3947" instrument_node="">Most autobiographies of real people suck.</span><br data-dcnode-id="3946"><br data-dcnode-id="3945"><span data-dcnode-id="3944" instrument_node="">Biographies usually suck just as bad - and I'd know, I've read bios of every president and wealthy family in the U.S., the founding fathers, and on and on. They hire people to tell a gilded view of a selective history.</span><br data-dcnode-id="3943"><br data-dcnode-id="3942"><span data-dcnode-id="3941" instrument_node="">Trump's book is part autobiography, part bragging (come on, it's Donald Trump), but 100% interesting. Who wouldn't want to be young, rich, and good looking? But he's also smart and a shrewd businessman. Reading this book taught me business l</span></span><span data-dcnode-id="3939" instrument_node="">
</span><span data-dcnode-id="3919" id="freeText1733031486601051041" style="display:none"><span data-dcnode-id="3938" instrument_node="">Most autobiographies of real people suck.</span><br data-dcnode-id="3937"><br data-dcnode-id="3936"><span data-dcnode-id="3935" instrument_node="">Biographies usually suck just as bad - and I'd know, I've read bios of every president and wealthy family in the U.S., the founding fathers, and on and on. They hire people to tell a gilded view of a selective history.</span><br data-dcnode-id="3934"><br data-dcnode-id="3933"><span data-dcnode-id="3932" instrument_node="">Trump's book is part autobiography, part bragging (come on, it's Donald Trump), but 100% interesting. Who wouldn't want to be young, rich, and good looking? But he's also smart and a shrewd businessman. Reading this book taught me business lessons that are so simple but so essential. He learned how to negotiate at his father's knee in the toughest business - construction - in the toughest city - New York. He went to military school and was an athlete, including being a boxer, which is not an easy sport. </span><br data-dcnode-id="3931"><br data-dcnode-id="3930"><span data-dcnode-id="3929" instrument_node="">I have an MBA taught to me by eggheads who'd never spent much time in the real world, and this was one of the best business books I ever read. I was just as incredulous as Trump over a million dollar deal done initially with a handshake that, when it came time to do the paperwork and the economy had changed so the deal was now a bad one for the other party, they honored it because they gave their word. Yeah, there are still people like that. I learned about having several irons in the fire because not every deal comes through, a tactic I still use today when negotiating a business deal or an editor or a vacation or a water softener for my house.</span><br data-dcnode-id="3928"><br data-dcnode-id="3927"><span data-dcnode-id="3926" instrument_node="">I'd check the politics of anybody who bashes a guy who started with a lot (estimates are $12 million to $100 million) but turned it into a fortune worth several billion dollars. Most children from wealthy families are wealthy bums. Most big lottery winners are broke 3 years later. Most NFL players have ZERO cash to leave to their grandkids. Trump has build his father's company into an international brand and turned his father's name into one of the wealthiest in U.S history, and say what you want, but his kids obviously love him or they wouldn't work for him.</span><br data-dcnode-id="3925"><br data-dcnode-id="3924"><span data-dcnode-id="3923" instrument_node="">He's probably gonna be president because he outworks everybody else. He's a lot of talk but he's also a lot of action. So was Muhammad Ali back in the day. America could do a lot worse.</span><br data-dcnode-id="3922"><br data-dcnode-id="3921"><span data-dcnode-id="3920" instrument_node="">You'll learn a lot about the man and business and people, and if you're reading it with an open mind, you'll be glad you picked it up. I proudly display it in my bookshelf with all those other bios I mentioned.</span></span><span data-dcnode-id="3918" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="3841" title="did not like it"><span class="staticStar p10" data-dcnode-id="3846" size="15x15"><span data-dcnode-id="3847" instrument_node="">did not like it</span></span><span class="staticStar p0" data-dcnode-id="3845" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3844" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3843" size="15x15"></span><span class="staticStar p0" data-dcnode-id="3842" size="15x15"></span></span><span data-dcnode-id="3840" instrument_node="">

            Shelves:
              </span><a class="actionLinkLite" data-dcnode-id="3837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/175635-trevor%3Fshelf%3Dhistory"><span data-dcnode-id="3838" instrument_node="">history</span></a><span data-dcnode-id="3836" instrument_node="">, 
              </span><a class="actionLinkLite" data-dcnode-id="3834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/175635-trevor%3Fshelf%3Dtrue-crime"><span data-dcnode-id="3835" instrument_node="">true-crime</span></a><span data-dcnode-id="3833" instrument_node="">

</span><span class="readable" data-dcnode-id="3790" id="reviewTextContainer2463672272"><span data-dcnode-id="3827" instrument_node="">
</span><span data-dcnode-id="3825" id="freeTextContainer11354103809689821691"><span data-dcnode-id="3826" instrument_node="">This is the strangest book. I would have been more than happy to have gone throughout my life without ever knowing who Trump was. I don’t watch TV and had never seen his show, which I believe truly was one of the greatest shows of all time, but I still don’t watch television, so I guess I’ll just have to take his word for that. And I’ve never been all that interested in business, and although he is the hotel and real estate visionary of the century (at least, according to the blurb at the back o</span></span><span data-dcnode-id="3824" instrument_node="">
</span><span data-dcnode-id="3795" id="freeText11354103809689821691" style="display:none"><span data-dcnode-id="3823" instrument_node="">This is the strangest book. I would have been more than happy to have gone throughout my life without ever knowing who Trump was. I don’t watch TV and had never seen his show, which I believe truly was one of the greatest shows of all time, but I still don’t watch television, so I guess I’ll just have to take his word for that. And I’ve never been all that interested in business, and although he is the hotel and real estate visionary of the century (at least, according to the blurb at the back of this book) I would have remained unlikely to have read a book with this title. And even though he is clearly a fabulous deal maker, deal making has never really struck me as something I would particularly like to spend time reading about. So, if it wasn’t for his political career – one, I can only assume this book helped along, I would never have read this book at all. </span><br data-dcnode-id="3822"><br data-dcnode-id="3821"><span data-dcnode-id="3820" instrument_node="">This book is a hagiography, rather than an autobiography – the fact Trump himself didn’t write this book (the journalist and publisher say he played no part at all in writing it), he merely paid for it to be written, shifts it from one category into the other. Even with this being a hagiography, he doesn’t come out of it terribly well. He is singularly unlikeable, which is clearly his tragic flaw, since he is obviously dying to be loved. The problem is that he seems unable to quite understand that other people have feelings too. </span><br data-dcnode-id="3819"><br data-dcnode-id="3818"><span data-dcnode-id="3817" instrument_node="">This book is a series of triumphs that are almost invariably due to Trump’s very own ‘instinct’ for a ‘deal’. He doesn’t seem to notice that withholding information from people you are dealing with is effectively lying. That getting people to come see a building site where worker are being paid to ‘look busy’ is also lying. He presents himself as a constant winner, and this image is, unfortunately, undermined by our being told very early in this book that he believes he must think big and bullshit big to present an image – because exaggeration and excess play well in people’s dreams and that the only real promotion is self-promotion – again, even when based on lies. And so, given all that, it isn’t unreasonable to assume that just about everything we are going to be told in this book is, well, a lie. Even if it is called ‘marketing’ or ‘advertising’ or whatever else.</span><br data-dcnode-id="3816"><br data-dcnode-id="3815"><span data-dcnode-id="3814" instrument_node="">And so, there are things that are said repeatedly throughout this book, but I’ve no way to know if they are true. For instance, he invariably says that he finishes his projects on time and on budget, or ahead of time and under budget and so on, while everyone else finishes them over time and over budget. And perhaps this was always true, but I don’t know and I don’t feel I can trust this book to have not been anything other than a series of cherrypicked best examples. </span><br data-dcnode-id="3813"><br data-dcnode-id="3812"><span data-dcnode-id="3811" instrument_node="">He also comes across as a remarkable hater. I mean, this guy knows how to hold a grudge and it is clear that one of the reasons he had this book written was to put some of his enemies in their place. The Mayor of New York, Ed Koch, gets an extended hatchet job done on him, for instance. The thing is that even people he says nice things about are presented mostly by their flaws. For example, lawyers are often described as brilliant, but that they put off the jury by their excessively showy clothes. Or someone rich doesn’t have showy enough clothes. Or someone he doesn’t like is criticised for being overweight. He is a man who sees the fault in others and this could well be his defining characteristic – it is a repeated theme throughout this book, and like I said, true for friend and enemy alike.</span><br data-dcnode-id="3810"><br data-dcnode-id="3809"><span data-dcnode-id="3808" instrument_node="">I want to focus on his instincts. This is another repeated theme. Often, when he is about to make a deal, everyone on his side is telling him not to do it, but he just has a feeling about the deal that means he has to ignore everyone else’s ‘head’ and go with his ‘gut’. Naturally, this inevitably and invariably pays off. This works both ways, of course, so when he pulls out of deals too, it is because of his gut. As he says at one point when he missed a bullet, “That experience taught me a few things. One is to listen to your gut, no matter how good something sounds on paper. The second is that you’re generally better off sticking with what you know. And the third is that sometimes your best investments are the ones you don’t make”. Now, what is particularly odd about him saying stuff like this is that other than the gut lesson, he doesn’t particularly seem to follow any of the other bits of this advice. I mean, he is a real estate agent and building developer who gets into hotels, television shows, casinos, and American rules football. </span><br data-dcnode-id="3807"><br data-dcnode-id="3806"><span data-dcnode-id="3805" instrument_node="">So much of this book is based on his ‘instincts’ or ‘gut’, and that makes this book almost entirely useless for what I’d just assumed it was intended for. I sort of thought this was a kind of ‘I got rich – you can get rich too – let me show you how’ book. But repeatedly we are shown how other people stuff up because their instincts are just not up to the task of divining the right path in the same way Trump’s gut proves to be. </span><br data-dcnode-id="3804"><br data-dcnode-id="3803"><span data-dcnode-id="3802" instrument_node="">Trump has a clear and ongoing problem with democracy throughout this book too, something the US is learning nearly daily now. For instance, ‘committees are what insecure people create in order to put off making hard decisions’. Or later, ‘I like consultants even less that I like committees. When it comes to making a smart decision, the most distinguished planning committee working with the highest-priced consultants doesn’t hold a candle to a group of guys with a reasonable amount of common sense and their own money on the line.’ Repeatedly throughout this book Trump makes clear his disgust at the regulations that stop him from doing whatever it is he wants to do. Invariably, these regulations are presented as counter-productive, in that he is able to ‘prove’ they achieve the exact opposite of what they sought to achieve – but given he is clearly the one who was going to benefit from these regulations not existing, he can hardly be considered the most objective judge of that. This book is an exercise in explaining why he is a great man of history – and to do that everyone else is presented either as fools, flawed, obstacles or there to be manipulated so as to achieve the great man’s vision.</span><br data-dcnode-id="3801"><br data-dcnode-id="3800"><span data-dcnode-id="3799" instrument_node="">There is a long discussion here on the building of an ice-skating park. The short version is that the city had been trying to build this, and they constantly stuffed up. It was years behind schedule and massively over budget, and so Trump offered to build it on time and on budget basically as a gift to the city. Anyway, after a lot of toing and froing eventually he did build it. Not that the city was particularly grateful, still, he did. He then explains that this story is basically proof that a single capitalist working alone and with his own money on the line is much better at getting stuff done that horrible public servants who don’t understand the value of money because it isn’t theirs’ in the first place. You know the song well enough to hum along, I’m sure. But almost immediately after telling this story he then talks about some other businessman who stuffs up a project and causes, it seems, just as much trouble. Trump comes to the rescue, but, naturally enough, this time the other businessman’s mistakes aren’t presented as proof that individual capitalists can be just as stupid as evil bureaucracies. The question of why everyone should just have to live with the preferences of rich guys – even when they occasionally destroy art works (as he admits to doing himself on one of his buildings – it was ugly anyway) or build ugly buildings (as just about every developer other than Trump is accused of doing in this book) is something everyone else in the city has to put up with, because, well, capitalism…</span><br data-dcnode-id="3798"><br data-dcnode-id="3797"><span data-dcnode-id="3796" instrument_node="">This book is a bit like the Bible. It is clearly written for you to come away liking God (or Trump in this case) but somehow you never quite can. There is just something fundamentally unlikeable about them both. All the same, this was a best-selling book and was presented, in part at least, as a business advice book. As I’ve already said, this has virtually no advice anyone could actually use in running their own business – other than somehow acquiring Trump’s gut. You might think that would have been a problem in an advice book, but it seems not.</span></span><span data-dcnode-id="3794" instrument_node="">

</span><span data-dcnode-id="3458" id="freeTextContainer10767787428990084939"><span data-dcnode-id="3459" instrument_node="">I have read this book twice. I read it for the second time because I had decided that I would read all books by Donald Trump again. I would say that it was not a waste time. This is definitely one of the best books written on business, negotiating &amp; deal making. I think that Donald Trump has been very candid &amp; sometimes even blunt in expressing his views. But this is the thing most popular about him. He is the kind of guy who does not beat around the bush. He stands for his ideas &amp; beliefs, even</span></span><span data-dcnode-id="3457" instrument_node="">
</span><span data-dcnode-id="3447" id="freeText10767787428990084939" style="display:none"><span data-dcnode-id="3456" instrument_node="">I have read this book twice. I read it for the second time because I had decided that I would read all books by Donald Trump again. I would say that it was not a waste time. This is definitely one of the best books written on business, negotiating &amp; deal making. I think that Donald Trump has been very candid &amp; sometimes even blunt in expressing his views. But this is the thing most popular about him. He is the kind of guy who does not beat around the bush. He stands for his ideas &amp; beliefs, even fights for them.</span><br data-dcnode-id="3455"><span data-dcnode-id="3454" instrument_node="">Trump initially was only in the real estate business. Like all great businessmen &amp; entrepreneurs he initially only focused on one business &amp; built it into something of great value &amp; prestige. The Trump name is synonymous with high standards &amp; perfection. </span><br data-dcnode-id="3453"><span data-dcnode-id="3452" instrument_node="">In the start Trump sheds light on his parents especially his father who was one of his greatest influences in life. He then writes about his family life &amp; how he was brought up. The Trump children were always taught to follow the conventional &amp; everlasting principles of ethics &amp; morality. He was always taught to be a man of solid character &amp; this thing even transcends into his business. That is why he is so candid &amp; sometimes even very blunt because he has so much confidence.</span><br data-dcnode-id="3451"><span data-dcnode-id="3450" instrument_node="">Trump also writes in details about the huge deals that he undertook in the start of his career. These were very big deals &amp; could bury him if he failed. But Trump persisted &amp; came out successful. He also writes about his day to day life &amp; how he deals with people. There are many useful insights regarding dealing with people especially in the business of real estate development. He gives tips &amp; suggestions which can be implemented for a successful deal.</span><br data-dcnode-id="3449"><span data-dcnode-id="3448" instrument_node="">Overall this is a very informative &amp; even a very interesting book for all those working in the real estate or any other business. </span></span><span data-dcnode-id="3446" instrument_node="">

</span><span data-dcnode-id="3353" id="freeTextContainer15042505072825966920"><span data-dcnode-id="3357" instrument_node="">Our culture and our nation currently find themselves in a remarkably politically charged, volatile, angry, and sometimes utterly ignorant environment. So much so that one could potentially be labeled and stereotyped simply for reading this book and publicly posting same. With that said, I offer this brief review anyway.</span><br data-dcnode-id="3356"><br data-dcnode-id="3355"><span data-dcnode-id="3354" instrument_node="">Having been in the business world all my adult life, I don't know how I overlooked reading this book back when it was published. It's not really a biography; more like a dairy of </span></span><span data-dcnode-id="3352" instrument_node="">
</span><span data-dcnode-id="3332" id="freeText15042505072825966920" style="display:none"><span data-dcnode-id="3351" instrument_node="">Our culture and our nation currently find themselves in a remarkably politically charged, volatile, angry, and sometimes utterly ignorant environment. So much so that one could potentially be labeled and stereotyped simply for reading this book and publicly posting same. With that said, I offer this brief review anyway.</span><br data-dcnode-id="3350"><br data-dcnode-id="3349"><span data-dcnode-id="3348" instrument_node="">Having been in the business world all my adult life, I don't know how I overlooked reading this book back when it was published. It's not really a biography; more like a dairy of some of Trump's bigger or more memorable business deals. Yes, he had the advantage of a father who was in the real estate business. Yes, Donald Trump has an ego. Yes, he can be arrogant, demanding, blunt, outspoken and much more. No one, absolutely no one, is lukewarm about him. Folks either voted for him, or they hate him beyond their ability to describe. </span><br data-dcnode-id="3347"><br data-dcnode-id="3346"><span data-dcnode-id="3345" instrument_node="">So just a quick word about the merits of this book. The man has clearly been a success in an incredibly tough city and industry. From the stories he recounts here, one can learn a lot about the challenges and rewards of commercial real estate and construction, the degree to which deals can be complicated and require patience, how to learn from the mistakes and overreaches of competitors, and much more. If a reader is able to put any personal prejudice aside, a lot can be learned about business in general from this book.</span><br data-dcnode-id="3344"><br data-dcnode-id="3343"><span data-dcnode-id="3342" instrument_node="">Interestingly, you'll also notice aspects of Trump's strategy and approaches to promotion that later served him well in the Presidential campaign. One example will suffice. When he set out to build Trump tower, there was an old existing building on the site, the Bonwit building, which had to be demolished. At the last minute, the Metropolitan Museum of Art expressed interest in saving two large Art-Deco sculptures on the exterior of the building. Trump was willing to donate them to the museum, but because the sculptures were so large and heavy, special scaffolding was required, and preserving them would've meant several weeks of costly delay. So naturally, Trump made a business decision and had them torn down.</span><br data-dcnode-id="3341"><br data-dcnode-id="3340"><span data-dcnode-id="3339" instrument_node="">What ensued was much public outrage and lots of bad press. But even the bad press still drew attention to the Trump Tower project, and caused an upsurge in demand for apartments when the Tower was completed. Notice Trump's take on the whole affair, which foreshadows his capturing of almost every news cycle in his Presidential campaign:</span><br data-dcnode-id="3338"><br data-dcnode-id="3337"><span data-dcnode-id="3336" instrument_node="">"I'm a businessman, and I learned a lesson from that experience; good publicity is preferable to bad, but from a bottom-line perspective, bad publicity is sometimes better than no publicity at all. Controversy, in short, sells."</span><br data-dcnode-id="3335"><br data-dcnode-id="3334"><span data-dcnode-id="3333" instrument_node="">In spite of the constant controversy that swirls around Donald Trump, I found this book to be a worthwhile and interesting read, with much insight into both the business world and the man himself.</span></span><span data-dcnode-id="3331" instrument_node="">

</span><span data-dcnode-id="3156" id="freeTextContainer10978819598113175971"><span data-dcnode-id="3157" instrument_node="">Good God ! The 1987 tell-all book overflows with complex business deals in Trump’s sledge-hammer style. Salted with hyperbole, Trump spills the beans on entering a privileged, difficult world he himself was new to in the 70’s. Skating rinks, railroads, luxe buildings, television, football… Trump’s calculated risks are so vast, learning from his hits/misses is as rewarding as it is emotionally rattling. Make no mistake: this is one sharp, gutsy guy. Also, circa 30% of the book concerns financial </span></span><span data-dcnode-id="3155" instrument_node="">
</span><span data-dcnode-id="3031" id="freeText10978819598113175971" style="display:none"><span data-dcnode-id="3154" instrument_node="">Good God ! The 1987 tell-all book overflows with complex business deals in Trump’s sledge-hammer style. Salted with hyperbole, Trump spills the beans on entering a privileged, difficult world he himself was new to in the 70’s. Skating rinks, railroads, luxe buildings, television, football… Trump’s calculated risks are so vast, learning from his hits/misses is as rewarding as it is emotionally rattling. Make no mistake: this is one sharp, gutsy guy. Also, circa 30% of the book concerns financial contracts and legalities, so prepare to parse thru some more nuanced fiscal landscapes.</span><br data-dcnode-id="3153"><span data-dcnode-id="3152" instrument_node=""> </span><br data-dcnode-id="3151"><br data-dcnode-id="3150"><span data-dcnode-id="3149" instrument_node="">TIDBITS :</span><br data-dcnode-id="3148"><span data-dcnode-id="3147" instrument_node="">—————-</span><br data-dcnode-id="3146"><br data-dcnode-id="3145"><span data-dcnode-id="3144" instrument_node="">“I tend not to give up on something I started.”</span><br data-dcnode-id="3143"><br data-dcnode-id="3142"><span data-dcnode-id="3141" instrument_node="">“I also earn more than $10 million in commissions as a sales agent from apartments in Trump Tower."</span><br data-dcnode-id="3140"><br data-dcnode-id="3139"><span data-dcnode-id="3138" instrument_node="">“When you set the highest possible standards, they’re expected to maintain.”</span><br data-dcnode-id="3137"><br data-dcnode-id="3136"><span data-dcnode-id="3135" instrument_node="">“A friend of mine is a highly successful and well known painter … A few months back he invited me to come to his studio. We were standing around talking when all of a sudden he said to me, 'You wanna see me earn $25,000 before lunch?' Sure, I said, having no idea what he meant. He picked up a large open bucket of paint, and splashed some on a piece of canvas… When he was done, he turned to me and said 'Well, that’s it. I’ve just earned $25,000. Let’s go to lunch.' He was smiling, but he was also absolutely serious. His point was that plenty of collectors wouldn’t know the difference between his two-minute art and the paintings he really cares about. They were just interested in buying his name. I've always felt that a lot of modern art is a con, and that the most successful painters are often better salesmen and promoters than they are artists.”</span><br data-dcnode-id="3134"><br data-dcnode-id="3133"><span data-dcnode-id="3132" instrument_node="">“My style of deal-making is quite simple and straightforward. I aim very high, and then I just keep pushing, and pushing, and pushing to get what I’m after.”</span><br data-dcnode-id="3131"><br data-dcnode-id="3130"><span data-dcnode-id="3129" instrument_node="">“Protect the downside and the upside will take care of itself. If you can plan for the worst, if you can live for the worst, the good will always take care of itself.”</span><br data-dcnode-id="3128"><br data-dcnode-id="3127"><span data-dcnode-id="3126" instrument_node="">“Maximize your options.”</span><br data-dcnode-id="3125"><br data-dcnode-id="3124"><span data-dcnode-id="3123" instrument_node="">“Use your leverage. The worst thing you could possibly do in a deal is seem desperate to make it. That makes the other guy smell blood and then your dead. The best thing you can do is deal from strength, and leverage is the biggest strength you can have. Leverage is having what the other guy wants, or better yet needs, or best of all simply can't do without.” </span><br data-dcnode-id="3122"><br data-dcnode-id="3121"><span data-dcnode-id="3120" instrument_node="">“Perhaps the most misunderstood concept in all of real estate is that the key to success is ‘Location, location, location’. Usually that’s said by people who don't know what they're talking about.” </span><br data-dcnode-id="3119"><br data-dcnode-id="3118"><span data-dcnode-id="3117" instrument_node="">“What you should never do is pay too much, even if that means walking away…” </span><br data-dcnode-id="3116"><br data-dcnode-id="3115"><span data-dcnode-id="3114" instrument_node="">“I play to people’s vanity.”</span><br data-dcnode-id="3113"><br data-dcnode-id="3112"><span data-dcnode-id="3111" instrument_node="">“After he lost the election to Ronald Reagan, Carter came to see me in my office. He told me he was seeking contributions to the Jimmy Carter Library. I asked how much he had in mind, and he said “Donald, I would be very appreciative if you contributed $50 million."…. Until then I had never understood how Jimmy Carter became president… Jimmy Carter had the nerve, the guts, the balls to ask for something extraordinary. That ability above all helped him get elected...”</span><br data-dcnode-id="3110"><br data-dcnode-id="3109"><span data-dcnode-id="3108" instrument_node="">“I don't kid myself. Life is very fragile, and success makes it more fragile. Anything can change without warning.” </span><br data-dcnode-id="3107"><br data-dcnode-id="3106"><span data-dcnode-id="3105" instrument_node="">“Money was never a big motivation for me, except as a way to keep score. The real excitement is playing the game. I don’t spend a lot of time worrying about what I should have done differently, or what’s going to happen next. If you ask me what the deal is going to add up to, I don't think I have a very good answer, except that I had a very good time.” </span><br data-dcnode-id="3104"><br data-dcnode-id="3103"><span data-dcnode-id="3102" instrument_node="">“I learned from my father that every penny counts because before too long, pennies turn into dollars.”</span><br data-dcnode-id="3101"><br data-dcnode-id="3100"><span data-dcnode-id="3099" instrument_node="">“You can’t be scared. You do your thing, you hold your ground, you stand up tall, and whatever happens, happens.”</span><br data-dcnode-id="3098"><br data-dcnode-id="3097"><span data-dcnode-id="3096" instrument_node="">“My father had done very well for himself, but he didn’t believe in giving his children huge trust funds. When I graduated from college, I had a net worth of perhaps $200K, and most of it was tied up in buildings in Brooklyn and Queens.”</span><br data-dcnode-id="3095"><br data-dcnode-id="3094"><span data-dcnode-id="3093" instrument_node="">“I don’t drink, and I’m not very big on sitting around… I remember wondering if every successful person in Manhattan was a big drinker. I figured if that was the case, I was going to have a big advantage.”</span><br data-dcnode-id="3092"><br data-dcnode-id="3091"><span data-dcnode-id="3090" instrument_node="">“If you’re going to make a deal of any significance, you have to go to the top… Everyone underneath the top guy is just an employee. An employee isn’t going to fight for your deal… he’s fighting for his salary increase… the last thing he wants to do is upset his boss. So he’ll present your case with no real opinion.”</span><br data-dcnode-id="3089"><br data-dcnode-id="3088"><span data-dcnode-id="3087" instrument_node="">“I was relentless.”</span><br data-dcnode-id="3086"><br data-dcnode-id="3085"><span data-dcnode-id="3084" instrument_node="">“Skyscrapers are machines for making money.” - Arthur Drexler</span><br data-dcnode-id="3083"><br data-dcnode-id="3082"><span data-dcnode-id="3081" instrument_node="">“…Which he said translated into a 20-story building with 10,000 square feet of usable space per floor. Immediately I told him to transform it to a 40-story building with 5,000 square feet per floor."</span><br data-dcnode-id="3080"><br data-dcnode-id="3079"><span data-dcnode-id="3078" instrument_node="">“I leased 50,000 square feet … for an annual rent of $3 million, plus a percentage of their profits… My carrying costs were approximately $2.5 million a year. In other words I was paying out $2.5 million to own the site, and getting $3 million back… a profit of $500,000 a year, and owned the land for nothing, all guaranteed, before I even began construction.”</span><br data-dcnode-id="3077"><br data-dcnode-id="3076"><span data-dcnode-id="3075" instrument_node="">“I’ve hired a lot of women for top jobs, and they’ve been among my best people. Often, in fact, they are far more effective than the men around them.”</span><br data-dcnode-id="3074"><br data-dcnode-id="3073"><span data-dcnode-id="3072" instrument_node="">“When we went to the quarry, we discovered that much of the marble contained large white spots… That was jarring to me… So we ended up going to the quarry with black tape, and marking off the slabs that were the best. The rest we just scrapped, maybe 50% of the total. By the time we were finished, we had taken the whole top of the mountain…”</span><br data-dcnode-id="3071"><br data-dcnode-id="3070"><span data-dcnode-id="3069" instrument_node="">“If there’s one thing I’ve learned about the rich, it’s that they have a very low threshold for even the most mildest discomfort.”</span><br data-dcnode-id="3068"><br data-dcnode-id="3067"><span data-dcnode-id="3066" instrument_node="">“The cycles of buyers at Trump Tower became something of a barometer of what was going on in the international economy. At first the big buyers were the Arabs, when oil prices were going through the roof… After the Europeans, we got the South Americans and the Mexicans…”</span><br data-dcnode-id="3065"><br data-dcnode-id="3064"><span data-dcnode-id="3063" instrument_node="">“I have a very simple rule when it comes to management. Hire the best people from your competitors. Pay them more than what they were earning…That’s how you build a first class operation.”</span><br data-dcnode-id="3062"><br data-dcnode-id="3061"><br data-dcnode-id="3060"><span data-dcnode-id="3059" instrument_node="">BONUS : NO-HOLDS-BARRED BEAN-SPILL :</span><br data-dcnode-id="3058"><span data-dcnode-id="3057" instrument_node="">-------------------------------------</span><br data-dcnode-id="3056"><br data-dcnode-id="3055"><span data-dcnode-id="3054" instrument_node="">“Unfortunately, rent control is a disaster for all but the privileged minority who are protected by it."</span><br data-dcnode-id="3053"><br data-dcnode-id="3052"><span data-dcnode-id="3051" instrument_node="">"Mia Farrow, for example, has ten rooms overlooking the park. She pays about $2,000 a month for an apartment that might rent for upward of $10,000 a month on the open market."</span><br data-dcnode-id="3050"><br data-dcnode-id="3049"><span data-dcnode-id="3048" instrument_node="">"William vanden Heuvel, a very prominent attorney who served as ambassador to the United Nations under Jimmy Carter, pays less than $650 a month for his six-room apartment in a terrific building on E. 72nd Street."</span><br data-dcnode-id="3047"><br data-dcnode-id="3046"><span data-dcnode-id="3045" instrument_node="">"Suzanne Farrell of the New York City Ballet has a fourteen-room duplex near Lincoln Center, for which she pays under $1,000 a month."</span><br data-dcnode-id="3044"><br data-dcnode-id="3043"><span data-dcnode-id="3042" instrument_node=""> "Alistair Cooke, the TV personality, pays about $1,100 for an eight-room apartment on Fifth Avenue."</span><br data-dcnode-id="3041"><br data-dcnode-id="3040"><span data-dcnode-id="3039" instrument_node="">"Fashion designer Arnold Scaasi, for example, has a six-room duplex facing the park, for which he is paying $985 a month."</span><br data-dcnode-id="3038"><br data-dcnode-id="3037"><span data-dcnode-id="3036" instrument_node=""> "The most notorious example of all may be Ed Koch… He pays $350 a month… The worst thing, though, is that Koch doesn’t even live in his rent-controlled apartment. He lives in Gracie Mansion, the official residence of the mayor."</span><br data-dcnode-id="3035"><br data-dcnode-id="3034"><br data-dcnode-id="3033"><span data-dcnode-id="3032" instrument_node="">.</span></span><span data-dcnode-id="3030" instrument_node="">

</span><span data-dcnode-id="2858" id="freeTextContainer6722393802704123559"><span data-dcnode-id="2862" instrument_node="">This book was not what I was expecting at all, but now I can see why it is considered a classic. It is surprisingly accessible for a book about how to make successful business deals. It contains a lot of wisdom that can be applied to life in general, about how to treat others and also about marketing yourself and your skills.</span><br data-dcnode-id="2861"><br data-dcnode-id="2860"><span data-dcnode-id="2859" instrument_node="">The book documents various deals Trump is interested in during one week in his life. He discusses each project in depth and concludes with a summary of which deals were succ</span></span><span data-dcnode-id="2857" instrument_node="">
</span><span data-dcnode-id="2846" id="freeText6722393802704123559" style="display:none"><span data-dcnode-id="2856" instrument_node="">This book was not what I was expecting at all, but now I can see why it is considered a classic. It is surprisingly accessible for a book about how to make successful business deals. It contains a lot of wisdom that can be applied to life in general, about how to treat others and also about marketing yourself and your skills.</span><br data-dcnode-id="2855"><br data-dcnode-id="2854"><span data-dcnode-id="2853" instrument_node="">The book documents various deals Trump is interested in during one week in his life. He discusses each project in depth and concludes with a summary of which deals were successful, which ones were not, which ones he had to rework and so on.</span><br data-dcnode-id="2852"><br data-dcnode-id="2851"><span data-dcnode-id="2850" instrument_node="">His dealings with the New York city planning council and the mayor were particularly amusing. Anyone who has any knowledge of Trump already knows that he is a straight talker and isn't afraid to tell the truth about people or situations as he sees it. The same applies here, but it is written with a great sense of humour. This is Trump in his 40's, debonair and confident.</span><br data-dcnode-id="2849"><br data-dcnode-id="2848"><span data-dcnode-id="2847" instrument_node="">Very enjoyable and well worth the read!</span></span><span data-dcnode-id="2845" instrument_node="">

</span><span data-dcnode-id="2667" id="freeTextContainer722314170568157635"><span data-dcnode-id="2671" instrument_node="">After watching him fire a bunch of people on a stupid TV show, I thought I'd seen the last of this bloke with a badger on his head, but NOOOOOOOOO...we now get US election updates here in Australia.</span><br data-dcnode-id="2670"><br data-dcnode-id="2669"><span data-dcnode-id="2668" instrument_node="">I was watching him make some sheila tug at his hair to prove that it WASN'T a dead badger after all and thought, "Hey! I remember reading a book written by this dude." It all came flooding back. If you're looking for a book on how to do deals - this is probably worth reading - but I just didn't get it</span></span><span data-dcnode-id="2666" instrument_node="">
</span><span data-dcnode-id="2655" id="freeText722314170568157635" style="display:none"><span data-dcnode-id="2665" instrument_node="">After watching him fire a bunch of people on a stupid TV show, I thought I'd seen the last of this bloke with a badger on his head, but NOOOOOOOOO...we now get US election updates here in Australia.</span><br data-dcnode-id="2664"><br data-dcnode-id="2663"><span data-dcnode-id="2662" instrument_node="">I was watching him make some sheila tug at his hair to prove that it WASN'T a dead badger after all and thought, "Hey! I remember reading a book written by this dude." It all came flooding back. If you're looking for a book on how to do deals - this is probably worth reading - but I just didn't get it. Perhaps it doesn't apply to us peeps outside of the USA. You've got to hand it to him, he has accumulated the dollars, and not from being a dummy. It seems his method is to beat his enemies into submission. Gotta hand it to him though, he managed to fix up Wollman Rink. I made a special trip to see it when I visited the Big Apple a few years ago. Not a bad job Donny.</span><br data-dcnode-id="2661"><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">Maybe my lowish score is because I have some sort of inferiority complex, or maybe I remember thinking, by buying his book, I was ripped off. Actually, I remember thinking it was just plain boring.</span><br data-dcnode-id="2658"><br data-dcnode-id="2657"><span data-dcnode-id="2656" instrument_node="">EDIT: I would add half a star in light of the author's obvious negotiating skills - getting him elected president and attempting to broker peace with North Korea. Maybe Donny read his own book again.</span></span><span data-dcnode-id="2654" instrument_node="">

</span><span data-dcnode-id="2546" id="freeTextContainer16132080748275391850"><span data-dcnode-id="2556" instrument_node="">I read all but the last 40 pages or so of this book. After a while the story becomes the same. </span><br data-dcnode-id="2555"><br data-dcnode-id="2554"><span data-dcnode-id="2553" instrument_node="">What is that story? Pretty much, take a hands-on approach to your business, make your intentions known, and then wait until things fall into place for you to move.</span><br data-dcnode-id="2552"><br data-dcnode-id="2551"><span data-dcnode-id="2550" instrument_node="">A lot of the time Trump was dealing with licensing and zoning boards. He always went to those meetings himself, took an active interest. He mentions many who took the opposite approach, and things didn’t go well for them.</span><br data-dcnode-id="2549"><br data-dcnode-id="2548"><span data-dcnode-id="2547" instrument_node="">There’s a lot on him </span></span><span data-dcnode-id="2545" instrument_node="">
</span><span data-dcnode-id="2523" id="freeText16132080748275391850" style="display:none"><span data-dcnode-id="2544" instrument_node="">I read all but the last 40 pages or so of this book. After a while the story becomes the same. </span><br data-dcnode-id="2543"><br data-dcnode-id="2542"><span data-dcnode-id="2541" instrument_node="">What is that story? Pretty much, take a hands-on approach to your business, make your intentions known, and then wait until things fall into place for you to move.</span><br data-dcnode-id="2540"><br data-dcnode-id="2539"><span data-dcnode-id="2538" instrument_node="">A lot of the time Trump was dealing with licensing and zoning boards. He always went to those meetings himself, took an active interest. He mentions many who took the opposite approach, and things didn’t go well for them.</span><br data-dcnode-id="2537"><br data-dcnode-id="2536"><span data-dcnode-id="2535" instrument_node="">There’s a lot on him calling people up personally, and how these people were often happy to have that done. There’s a lot on Trump choosing the marble for the floors or brass for railings, even taking an interest in air conditioning and piping. </span><br data-dcnode-id="2534"><br data-dcnode-id="2533"><span data-dcnode-id="2532" instrument_node="">He’s clear what this mean - millions of dollars in savings and projects that come in on time and on budget. </span><br data-dcnode-id="2531"><br data-dcnode-id="2530"><span data-dcnode-id="2529" instrument_node="">Overall, this is a good book even 30 years after it was written. I got it at the library and read it because Trump is about a month away from the presidential nomination. I wanted to understand his early business background and influences better, and this book does a good job.</span><br data-dcnode-id="2528"><br data-dcnode-id="2527"><span data-dcnode-id="2526" instrument_node="">Is it biased? You bet. But it’s a fun read and it’s pretty honest and I like how he presented himself in it. I’m glad I picked it up and gave it a read. </span><br data-dcnode-id="2525"><br data-dcnode-id="2524"></span><span data-dcnode-id="2522" instrument_node="">

</span><span data-dcnode-id="2233" id="freeTextContainer5155827929214543461"><span data-dcnode-id="2240" instrument_node="">Very little wisdom, a whole lot of self-serving platitudes; I had very low expectations of this book but they weren't low enough. Trump once said at a GOP Debate about the Obama administration, "they clearly didn't read 'The Art of the Deal.'" Not sure how superficial first-hand and self-flattering accounts of a few deals in New York and Atlantic City would have any baring on the Iran Nuclear deal, but in Trump's universe it's all the same.</span><br data-dcnode-id="2239"><br data-dcnode-id="2238"><span data-dcnode-id="2237" instrument_node="">Two useful insights about Trump from this book:</span><br data-dcnode-id="2236"><br data-dcnode-id="2235"><span data-dcnode-id="2234" instrument_node="">1 - Trump</span></span><span data-dcnode-id="2232" instrument_node="">
</span><span data-dcnode-id="2218" id="freeText5155827929214543461" style="display:none"><span data-dcnode-id="2231" instrument_node="">Very little wisdom, a whole lot of self-serving platitudes; I had very low expectations of this book but they weren't low enough. Trump once said at a GOP Debate about the Obama administration, "they clearly didn't read 'The Art of the Deal.'" Not sure how superficial first-hand and self-flattering accounts of a few deals in New York and Atlantic City would have any baring on the Iran Nuclear deal, but in Trump's universe it's all the same.</span><br data-dcnode-id="2230"><br data-dcnode-id="2229"><span data-dcnode-id="2228" instrument_node="">Two useful insights about Trump from this book:</span><br data-dcnode-id="2227"><br data-dcnode-id="2226"><span data-dcnode-id="2225" instrument_node="">1 - Trump worships himself and believes he is incapable of poor decision making in any capacity. He never talks about mistakes or instances of bad judgment, only of collateral damage or the incompetency or bad intentions of people around him. This total lack of humility would make him unbelievably dangerous person to give political power.</span><br data-dcnode-id="2224"><br data-dcnode-id="2223"><span data-dcnode-id="2222" instrument_node="">2 - iI's clear that Trump has no real beliefs, just bargaining positions. He says what will accomplish whatever goal he has and therefore pretty much all means are justified by ends. I couldn't be more confident that he has no intention to deport 11 million people if elected President, and he does not care what damage his message does, so long as it can be used as leverage for his own goals, which may be totally disconnected from his stated goals.</span><br data-dcnode-id="2221"><br data-dcnode-id="2220"><span data-dcnode-id="2219" instrument_node="">In short, this book unintentionally offers some valuable insights into the Donald, however it is still was a general waste of time; one of the worst non-fictions I have ever chosen to pick up.</span></span><span data-dcnode-id="2217" instrument_node="">

</span><span data-dcnode-id="1461" id="freeTextContainer10802125262055132516"><span data-dcnode-id="1468" instrument_node="">2,5 stars because Reading this was half interesting, half a real pain. </span><br data-dcnode-id="1467"><br data-dcnode-id="1466"><span data-dcnode-id="1465" instrument_node="">The good: The book concentrates on business decisions taken by Trump and why he has taken them. You can also follow the way his mind works when taking decisions. That was the point of the book.</span><br data-dcnode-id="1464"><br data-dcnode-id="1463"><span data-dcnode-id="1462" instrument_node="">The "a little bit annoying" part: Finally, you come to understand that the goals of his Deals are not important; what is important to him is the thrill of making deals. One example, he wants to buy a Holiday Inn, he doesnt know if this </span></span><span data-dcnode-id="1460" instrument_node="">
</span><span data-dcnode-id="1447" id="freeText10802125262055132516" style="display:none"><span data-dcnode-id="1459" instrument_node="">2,5 stars because Reading this was half interesting, half a real pain. </span><br data-dcnode-id="1458"><br data-dcnode-id="1457"><span data-dcnode-id="1456" instrument_node="">The good: The book concentrates on business decisions taken by Trump and why he has taken them. You can also follow the way his mind works when taking decisions. That was the point of the book.</span><br data-dcnode-id="1455"><br data-dcnode-id="1454"><span data-dcnode-id="1453" instrument_node="">The "a little bit annoying" part: Finally, you come to understand that the goals of his Deals are not important; what is important to him is the thrill of making deals. One example, he wants to buy a Holiday Inn, he doesnt know if this is an investment, or if he will resell it or demolish it. No goal or objective at all! Important was to make the deal... Maybe that is why some of his businesses went down. I didnt get the point of that. In general, I didn't agree with his way of making business but, that is his way and although a bit dumb, still interesting to read.</span><br data-dcnode-id="1452"><br data-dcnode-id="1451"><span data-dcnode-id="1450" instrument_node="">The bad: the book was cockyness 100% - I am the best for thinking this way... I am so great for doing this.... Nobody beats me... My worst fear is having bad partners... Ugh! Come on! At least, Mr Trump, your fears should be based on your own weaknesses but not on the weaknesses of others! </span><br data-dcnode-id="1449"><span data-dcnode-id="1448" instrument_node="">He was so conceited throughout the book that I couldn't really enjoy the parts that I found worth reading!</span></span><span data-dcnode-id="1446" instrument_node="">

</span><span data-dcnode-id="1185" id="freeTextContainer280535838845850643"><span data-dcnode-id="1189" instrument_node="">The art of the deal is about management, leadership mentality. It’s a kind of biography presenting the life of Donald Trump until the ’90s – way before he thought about the American presidency. If you’ve ever tried to figure out how were people making money in the United States, you will find out that the real estate market was a great place to do that. Then, sooner or later, Donald Trump’s name comes up inevitably because he did many great deals and he, eventually, made a lot of money. </span><br data-dcnode-id="1188"><br data-dcnode-id="1187"><span data-dcnode-id="1186" instrument_node="">Now, thi</span></span><span data-dcnode-id="1184" instrument_node="">
</span><span data-dcnode-id="1159" id="freeText280535838845850643" style="display:none"><span data-dcnode-id="1183" instrument_node="">The art of the deal is about management, leadership mentality. It’s a kind of biography presenting the life of Donald Trump until the ’90s – way before he thought about the American presidency. If you’ve ever tried to figure out how were people making money in the United States, you will find out that the real estate market was a great place to do that. Then, sooner or later, Donald Trump’s name comes up inevitably because he did many great deals and he, eventually, made a lot of money. </span><br data-dcnode-id="1182"><br data-dcnode-id="1181"><span data-dcnode-id="1180" instrument_node="">Now, this is not a political message, don’t interpret it like that and be rational. You can like the man or be totally opposite, that’s not the point here. Nevertheless, I have to say that this is a brilliant book. If you’ve ever wondered how does someone at that level of working with hundreds of millions of dollars operate and make deals or what kind of deals they make? How were those deals structured and what was his thinking behind this decision-process, this is the book for you as Donald Trump reveals all of this. Simply saying, he walks you through a few of his transactions and presents the people and his strategy behind these deals. Most importantly he keeps the story really interesting. </span><br data-dcnode-id="1179"><br data-dcnode-id="1178"><span data-dcnode-id="1177" instrument_node="">Anyway, Donald Trump comes from a real estate family. His father, Fred Trump, was a renowned real estate developer on the outskirts of New York. He became a wealthy business person for building row properties in South Brooklyn. This way Donald Trump was already introduced into the real estate market as a child and when he came of age he decided to pursue a career in the real estate business. On the other hand, he didn’t want to stay in some niche and had his eyes set on Manhattan, the property capital of the world. However, the book doesn’t concentrate only on New York. You will find other deals in Atlanta and other cities where he was developing his other projects.</span><br data-dcnode-id="1176"><br data-dcnode-id="1175"><span data-dcnode-id="1174" instrument_node="">There are a few key points from the book which I’d like to mention below. Treat them as principles followed by Trump in his business and political (my assumption) career: </span><br data-dcnode-id="1173"><br data-dcnode-id="1172"><span data-dcnode-id="1171" instrument_node="">1. Think big, be obsessive and driven</span><br data-dcnode-id="1170"><span data-dcnode-id="1169" instrument_node="">2. Protect the downside and the upside will take care of itself which means to be very conservative in business. It’s better to pay a higher price for a sure thing rather than putting your business at risk</span><br data-dcnode-id="1168"><span data-dcnode-id="1167" instrument_node="">3. Maximise your options – be flexible and never be attached to one option, deal or approach. Keep as many options open as possible. Furthermore, if you took one way still hold other options at hand in order to deliver your goal</span><br data-dcnode-id="1166"><span data-dcnode-id="1165" instrument_node="">4. Know your market – don’t waste too much money on market research and surveys. Get there on your own and talk to real people until you know the market by instinct. Next, trust your gut feeling. Honestly, I’m not so sure about this point. Maybe in the ’80s market surveys weren’t so reliable, nowadays when we have AI, big data etc. I would rather go for it</span><br data-dcnode-id="1164"><span data-dcnode-id="1163" instrument_node="">5. Enhance your location – this rule is specific to the property business. Keep your property spotless and tidy and keep an eye on their surrounding as it’s one of the major price factors... (if you like to read my full review please visit my blog </span><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//leadersarereaders.blog/the-art-of-the-deal/" rel="noopener nofollow" target="_blank"><span data-dcnode-id="1162" instrument_node="">https://leadersarereaders.blog/the-ar...</span></a><span data-dcnode-id="1160" instrument_node="">)</span></span><span data-dcnode-id="1158" instrument_node="">

</span><span data-dcnode-id="1018" id="freeTextContainer4385254974581531421"><span data-dcnode-id="1019" instrument_node="">	This is partially a biography but also shows an insight of what Trump is thinking about in the heat of a deal. It starts out giving a week of his life explaining his daily habits. But, where it really gets to be about the serious business life as we know is when he explains the “Elements of The Deal”. He gives characteristics of a quality deal-making situation and how he uses it in his profession. Then he has flashbacks of the good times of his juvenile days in New York growing up with his fami</span></span><span data-dcnode-id="1017" instrument_node="">
</span><span data-dcnode-id="1009" id="freeText4385254974581531421" style="display:none"><span data-dcnode-id="1016" instrument_node="">	This is partially a biography but also shows an insight of what Trump is thinking about in the heat of a deal. It starts out giving a week of his life explaining his daily habits. But, where it really gets to be about the serious business life as we know is when he explains the “Elements of The Deal”. He gives characteristics of a quality deal-making situation and how he uses it in his profession. Then he has flashbacks of the good times of his juvenile days in New York growing up with his family and looking up to his father, Fred Trump, a hard-working and hard man. Through those times he became the high stakes man he is today and begins to further explain how one can become a man like he. But, he does this in an implicit way through how he goes about the deals that were taking place at the time. Insightful look into perhaps the nation's most talked about man. </span><br data-dcnode-id="1015"><br data-dcnode-id="1014"><span data-dcnode-id="1013" instrument_node="">	***** 5 out of 5 stars, Honestly, I really don’t believe too many people these days would like this book unless you are interested in the heavy deal-making strategies necessary to learn to be successful. Millennials feel as if they are entitled to being successful, but never do the work to support their case. Not many people my age (just after Y2K) will be able to fully read this with 100% of their attention. And that’s sad, because this is a book not one person should pass up. It’s like having a front row seat to a deal-making speech. There is always evolution happening. From the first contact of the client, to the final signing of the contract. </span><br data-dcnode-id="1012"><br data-dcnode-id="1011"><span data-dcnode-id="1010" instrument_node="">	If you’re into making money and hardcore business grinding, this novel is a godsend to you. I mean it literally gives you the eleven essentials to being successful and becoming an A-list businessman (The Elements of the Deal 45). This is a classic, timeless, and important how-to for real estate or business. This is recommended to ages 14 and up, unless you have some sort of business outlet in your life like I had, my father. It may become boring to read for the ones who need action just to be able to read a book. It’s always better to have a little prior knowledge, but to really be able to comprehend this book, that is essential. Best book I have ever read.</span></span><span data-dcnode-id="1008" instrument_node="">

</span><span data-dcnode-id="387" id="freeTextContainer13356801210568967078"><span data-dcnode-id="388" instrument_node="">Donald John Trump was born in Queens, New York, on June 14, 1946. His father, Fred Trump, was a highly successful real estate developer. The elder Trump was of German heritage, and his wife, Mary McLeod, of Scottish background. Their son Donald was the second youngest of five children. He was educated at the New York Military Academy and the Wharton School of Finance and Commerce at the University</span></span><span data-dcnode-id="386" instrument_node="">
</span><span data-dcnode-id="372" id="freeText13356801210568967078" style="display:none"><span data-dcnode-id="385" instrument_node="">Donald John Trump was born in Queens, New York, on June 14, 1946. His father, Fred Trump, was a highly successful real estate developer. The elder Trump was of German heritage, and his wife, Mary McLeod, of Scottish background. Their son Donald was the second youngest of five children. He was educated at the New York Military Academy and the Wharton School of Finance and Commerce at the University of Pennsylvania. Even before he graduated he was drawn to real estate and construction, and as a young man he took over his father’s firm, renaming it the Trump Organization.</span><br data-dcnode-id="384"><br data-dcnode-id="383"><span data-dcnode-id="382" instrument_node="">The Trump Organization soon became involved in a myriad of projects, including hotels, resorts, residential and commercial buildings, casinos, and golf courses, both in the United States and abroad. His first of many books was The Art of the Deal, published in 1987. In 2004 he launched the Apprentice (later The Celebrity Apprentice), a popular television series that aired until 2015. During the 2016 primary season Trump defeated more than a dozen seasoned rivals to win the Republican nomination and went on to win the election over former Secretary of State Hillary Clinton. His campaign slogan was “Make America Great Again,” and he moved swiftly to reinvigorate “Buy American and Hire American” policies. He signed a major tax reform bill into law and directed the reduction of federal regulations intended to secure a long-running economic expansion and a historically low unemployment rate. His trade policies encouraged tariffs on foreign aluminum and steel and a series of renegotiations of trade agreements with Mexico, Canada, China, Japan, and South Korea.</span><br data-dcnode-id="381"><br data-dcnode-id="380"><span data-dcnode-id="379" instrument_node="">Other priorities included Supreme Court and federal judiciary appointments, tackling the opioid crisis, seeking to reduce the cost of prescription drugs, and improving health care for veterans. Trump’s commitment to “America first” abroad shaped not only his trade and tariff policies but his approach to immigration and overseas commitments. At his urging, North Atlantic Treaty Organization (NATO) member states increased their contributions to the alliance. Trump recognized Israeli sovereignty over the Golan Heights, and moved the American Embassy from Tel Aviv to Jerusalem, recognizing the ancient city as Israel’s capital.</span><br data-dcnode-id="378"><br data-dcnode-id="377"><span data-dcnode-id="376" instrument_node="">His approach to the problem of nuclear proliferation included applying maximum economic pressure on both North Korea and Iran. Trump increased the budget for the U.S. military, and during his administration the self-proclaimed Islamic State (ISIS), which had taken territory in Iraq and Syria and was responsible for inciting terrorist attacks, was defeated. </span><br data-dcnode-id="375"><br data-dcnode-id="374"><span data-dcnode-id="373" instrument_node="">President Trump and his wife, Melania Trump, have one son, Barron. President Trump also has four adult children from previous marriages: Donald Jr., Ivanka, Eric, and Tiffany, as well as nine grandchildren.</span></span><span data-dcnode-id="371" instrument_node="">
