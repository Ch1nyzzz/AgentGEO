</span><span data-dcnode-id="4678" id="freeTextContainer84794383400746104"><b data-dcnode-id="4680"><span data-dcnode-id="4693" instrument_node="">First he made five billion dollars.</span><br data-dcnode-id="4692"><span data-dcnode-id="4691" instrument_node="">Then he made </span><i data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">The Apprentice</span></i><span data-dcnode-id="4688" instrument_node="">.</span><br data-dcnode-id="4687"><span data-dcnode-id="4686" instrument_node="">Now The Donald shows you how to make a fortune, Trump style.</span><br data-dcnode-id="4685"><br data-dcnode-id="4684"><span data-dcnode-id="4683" instrument_node="">HOW TO GET RICH</span><br data-dcnode-id="4682"><br data-dcnode-id="4681"></b><span data-dcnode-id="4679" instrument_node="">Real estate titan, bestselling author, and TV impresario Donald J. Trump reveals the secrets of his success in this candid and unprecedented book of business wisdom and advice. Over the years, everyone has urged Trump to write on this su</span></span><span data-dcnode-id="4677" instrument_node="">
</span><span data-dcnode-id="4617" id="freeText84794383400746104" style="display:none"><b data-dcnode-id="4663"><span data-dcnode-id="4676" instrument_node="">First he made five billion dollars.</span><br data-dcnode-id="4675"><span data-dcnode-id="4674" instrument_node="">Then he made </span><i data-dcnode-id="4672"><span data-dcnode-id="4673" instrument_node="">The Apprentice</span></i><span data-dcnode-id="4671" instrument_node="">.</span><br data-dcnode-id="4670"><span data-dcnode-id="4669" instrument_node="">Now The Donald shows you how to make a fortune, Trump style.</span><br data-dcnode-id="4668"><br data-dcnode-id="4667"><span data-dcnode-id="4666" instrument_node="">HOW TO GET RICH</span><br data-dcnode-id="4665"><br data-dcnode-id="4664"></b><span data-dcnode-id="4662" instrument_node="">Real estate titan, bestselling author, and TV impresario Donald J. Trump reveals the secrets of his success in this candid and unprecedented book of business wisdom and advice. Over the years, everyone has urged Trump to write on this subject, but it wasn’t until NBC and executive producer Mark Burnett asked him to star in </span><i data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">The Apprentice</span></i><span data-dcnode-id="4659" instrument_node=""> that he realized just how hungry people are to learn how great personal wealth is created and first-class businesses are run. Thousands applied to be Trump’s apprentice, and millions have been watching the program, making it the highest rated debut of the season.</span><br data-dcnode-id="4658"><br data-dcnode-id="4657"><span data-dcnode-id="4656" instrument_node="">In </span><i data-dcnode-id="4654"><span data-dcnode-id="4655" instrument_node="">Trump:</span></i><span data-dcnode-id="4653" instrument_node=""> </span><i data-dcnode-id="4651"><span data-dcnode-id="4652" instrument_node="">How To Get Rich</span></i><span data-dcnode-id="4650" instrument_node="">, Trump tells all–about the lessons learned from </span><i data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">The Apprentice</span></i><span data-dcnode-id="4647" instrument_node="">, his real estate empire, his position as head of the 20,000-member Trump Organization, and his most important role, as a father who has successfully taught his children the value of money and hard work.</span><br data-dcnode-id="4646"><br data-dcnode-id="4645"><br data-dcnode-id="4644"><span data-dcnode-id="4643" instrument_node="">With his characteristic brass and smarts, Trump offers insights on how to</span><br data-dcnode-id="4642"><span data-dcnode-id="4641" instrument_node="">• invest wisely</span><br data-dcnode-id="4640"><span data-dcnode-id="4639" instrument_node="">• impress the boss and get a raise</span><br data-dcnode-id="4638"><span data-dcnode-id="4637" instrument_node="">• manage a business efficiently</span><br data-dcnode-id="4636"><span data-dcnode-id="4635" instrument_node="">• hire, motivate, and fire employees</span><br data-dcnode-id="4634"><span data-dcnode-id="4633" instrument_node="">• negotiate anything</span><br data-dcnode-id="4632"><span data-dcnode-id="4631" instrument_node="">• maintain the quality of your brand</span><br data-dcnode-id="4630"><span data-dcnode-id="4629" instrument_node="">• think big and live large</span><br data-dcnode-id="4628"><b data-dcnode-id="4624"><span data-dcnode-id="4627" instrument_node="">Plus, The Donald tells all on the art of the hair!</span><br data-dcnode-id="4626"><br data-dcnode-id="4625"></b><span data-dcnode-id="4623" instrument_node="">With his luxury buildings, award-winning golf courses, high-stakes casinos, and glamorous beauty pageants, Donald J. Trump is one of a kind in American business. Every day, he lives the American dream. Now he shows you how it’s done, in this rollicking, inspirational, and illuminating behind-the-scenes story of invaluable lessons and rich rewards.</span><br data-dcnode-id="4622"><br data-dcnode-id="4621"><br data-dcnode-id="4620"><i data-dcnode-id="4618"><span data-dcnode-id="4619" instrument_node="">From the Hardcover edition.</span></i></span><span data-dcnode-id="4616" instrument_node="">

</span><span data-dcnode-id="3781" id="freeText10976586161667735387" style="display:none"><span data-dcnode-id="3879" instrument_node="">INTRODUCTION</span><br data-dcnode-id="3878"><span data-dcnode-id="3877" instrument_node="">- Don't do it for the money</span><br data-dcnode-id="3876"><span data-dcnode-id="3875" instrument_node="">- Keep it short, fast, and direct</span><br data-dcnode-id="3874"><br data-dcnode-id="3873"><span data-dcnode-id="3872" instrument_node="">PART 01</span><br data-dcnode-id="3871"><span data-dcnode-id="3870" instrument_node="">- Be a leader and give your employees the ability to shine</span><br data-dcnode-id="3869"><span data-dcnode-id="3868" instrument_node="">- Stay focused</span><br data-dcnode-id="3867"><span data-dcnode-id="3866" instrument_node="">- Build your momentum and remain vigilant on your field. You need to work at maintaining this.</span><br data-dcnode-id="3865"><span data-dcnode-id="3864" instrument_node="">- Get a great assistant.</span><br data-dcnode-id="3863"><span data-dcnode-id="3862" instrument_node="">- Know your competition and understand what your competitive offering is relative to their product</span><br data-dcnode-id="3861"><span data-dcnode-id="3860" instrument_node="">- Have employees that feel accountable for the success of the business</span><br data-dcnode-id="3859"><span data-dcnode-id="3858" instrument_node="">- Get to know your employees to understand how to manage them appropriately</span><br data-dcnode-id="3857"><span data-dcnode-id="3856" instrument_node="">- Learn something new about your business every day. Become a master learner.</span><br data-dcnode-id="3855"><span data-dcnode-id="3854" instrument_node="">- Think BIG and live large. Really go for it!</span><br data-dcnode-id="3853"><br data-dcnode-id="3852"><span data-dcnode-id="3851" instrument_node="">PART 02</span><br data-dcnode-id="3850"><span data-dcnode-id="3849" instrument_node="">- Be tenacious, you don't create a classic overnight</span><br data-dcnode-id="3848"><span data-dcnode-id="3847" instrument_node="">- Involve your passion with your business</span><br data-dcnode-id="3846"><span data-dcnode-id="3845" instrument_node="">- Brand yourself and toot your own horn. Be confident about what you can deliver. Create a dominant brand name.</span><br data-dcnode-id="3844"><span data-dcnode-id="3843" instrument_node="">- Be optimistic but always prepare for the worst</span><br data-dcnode-id="3842"><span data-dcnode-id="3841" instrument_node="">- Trust your instincts, as described in the book Blink by Malcolm Gladwell</span><br data-dcnode-id="3840"><span data-dcnode-id="3839" instrument_node="">- Have an ego but keep it in check</span><br data-dcnode-id="3838"><span data-dcnode-id="3837" instrument_node="">- Everyone has an opinion, don't take it personal</span><br data-dcnode-id="3836"><span data-dcnode-id="3835" instrument_node="">- Do your homework, know everything surrounding your business. Take time to practice everyday. Understand the process by knowing what you are getting yourself into</span><br data-dcnode-id="3834"><span data-dcnode-id="3833" instrument_node="">- People only see the finished product, do all the necessary requirements to understand what needs to go into doing the job right</span><br data-dcnode-id="3832"><span data-dcnode-id="3831" instrument_node="">- Learn from the greats and keep up to date for what's going on in the local industry</span><br data-dcnode-id="3830"><span data-dcnode-id="3829" instrument_node="">- Don't compare yourself with anyone. </span><br data-dcnode-id="3828"><span data-dcnode-id="3827" instrument_node="">- Reflect for 3 hours a day. Spend the time to stay balanced. Read and reflect. </span><br data-dcnode-id="3826"><span data-dcnode-id="3825" instrument_node="">- Read biographies and philosophy</span><br data-dcnode-id="3824"><span data-dcnode-id="3823" instrument_node="">- Dress for your culture</span><br data-dcnode-id="3822"><br data-dcnode-id="3821"><span data-dcnode-id="3820" instrument_node="">PART 03</span><br data-dcnode-id="3819"><span data-dcnode-id="3818" instrument_node="">- Be your best financial advisor</span><br data-dcnode-id="3817"><span data-dcnode-id="3816" instrument_node="">- Invest in what you know</span><br data-dcnode-id="3815"><span data-dcnode-id="3814" instrument_node="">- Get a prenuptial agreement. Life and business can be complicated. </span><br data-dcnode-id="3813"><span data-dcnode-id="3812" instrument_node="">- Teach your kids the power of money</span><br data-dcnode-id="3811"><br data-dcnode-id="3810"><span data-dcnode-id="3809" instrument_node="">PART 04</span><br data-dcnode-id="3808"><span data-dcnode-id="3807" instrument_node="">- It's all about persuasion, not power</span><br data-dcnode-id="3806"><span data-dcnode-id="3805" instrument_node="">- Once you know what you want, keep it to yourself</span><br data-dcnode-id="3804"><span data-dcnode-id="3803" instrument_node="">- Understand the other side. Observe the other side, let them talk, see where they are coming from. Be a chameleon. </span><br data-dcnode-id="3802"><span data-dcnode-id="3801" instrument_node="">- Study the art of persuasion, use readily available metaphors and humor</span><br data-dcnode-id="3800"><span data-dcnode-id="3799" instrument_node="">- Write down your business objectives, know what you want, know the other party, and find a win-win solution</span><br data-dcnode-id="3798"><span data-dcnode-id="3797" instrument_node="">- Let your guard down to bluff and see what they do</span><br data-dcnode-id="3796"><span data-dcnode-id="3795" instrument_node="">- Be patient. Speed depends on the circumstances. Trump showed a lack of interest in a deal to set the team of on a tangent, then have them draw their own conclusions.</span><br data-dcnode-id="3794"><br data-dcnode-id="3793"><span data-dcnode-id="3792" instrument_node="">TOP SKILLS FOR CONTINUED SUCCESS:</span><br data-dcnode-id="3791"><span data-dcnode-id="3790" instrument_node="">- Be strategically dramatic.</span><br data-dcnode-id="3789"><span data-dcnode-id="3788" instrument_node="">- Be creative</span><br data-dcnode-id="3787"><span data-dcnode-id="3786" instrument_node="">- Have street smarts</span><br data-dcnode-id="3785"><span data-dcnode-id="3784" instrument_node="">- Be personable</span><br data-dcnode-id="3783"><span data-dcnode-id="3782" instrument_node="">- Be loyal and trust your team</span></span><span data-dcnode-id="3780" instrument_node="">

</span><span data-dcnode-id="3296" id="freeText7222971255658077412" style="display:none"><span data-dcnode-id="3498" instrument_node="">The title suits only Chapters 1-2, defining his iron will and work ethic. The rest is a fun read inside Trump’s world: loyal staff, lucrative deals, celeb convos, and - most revealing - an hourly run through his personal schedule for a week. Wow.</span><br data-dcnode-id="3497"><br data-dcnode-id="3496"><span data-dcnode-id="3495" instrument_node="">Bonus : A frank peek into the meeting between he and bankers post his $9 billion loss, and his screaming at a disloyal Mario Cuomo. (Good for you, Donald !)</span><br data-dcnode-id="3494"><br data-dcnode-id="3493"><span data-dcnode-id="3492" instrument_node="">Quotes: </span><br data-dcnode-id="3491"><span data-dcnode-id="3490" instrument_node="">----------</span><br data-dcnode-id="3489"><br data-dcnode-id="3488"><span data-dcnode-id="3487" instrument_node="">"I don't do it for the money... I do it to do it. Deals are my art form... preferably big deals. That's how I get my kicks"</span><br data-dcnode-id="3486"><br data-dcnode-id="3485"><span data-dcnode-id="3484" instrument_node="">"I don't think you should do it for the money either. Money is not an end in itself, but its the most effective way to help us realize our dreams."</span><br data-dcnode-id="3483"><br data-dcnode-id="3482"><span data-dcnode-id="3481" instrument_node="">"I only work with the best. Save yourself some time by getting the best people you can."</span><br data-dcnode-id="3480"><br data-dcnode-id="3479"><span data-dcnode-id="3478" instrument_node="">"Creative people rarely need to be motivated. They have their own inner drive which refuses to be bored. They live on the edge, which is what precisely is needed to be successful and remain successful." </span><br data-dcnode-id="3477"><br data-dcnode-id="3476"><span data-dcnode-id="3475" instrument_node="">"We all need a boost every now and then. Learn how to tailor your method to the personalities you're managing."</span><br data-dcnode-id="3474"><br data-dcnode-id="3473"><span data-dcnode-id="3472" instrument_node="">"Stay focused. Don't make the mistake I did... stay focused! I learned my lesson: I work as hard today as I did when I was a young developer in the 1970's."</span><br data-dcnode-id="3471"><br data-dcnode-id="3470"><span data-dcnode-id="3469" instrument_node="">"Never personally guarantee anything."</span><br data-dcnode-id="3468"><br data-dcnode-id="3467"><span data-dcnode-id="3466" instrument_node="">"Momentum is something you have to work at to maintain... so maintain your momentum."</span><br data-dcnode-id="3465"><br data-dcnode-id="3464"><span data-dcnode-id="3463" instrument_node="">"You have to remain vigilant about the details of your field."</span><br data-dcnode-id="3462"><br data-dcnode-id="3461"><span data-dcnode-id="3460" instrument_node="">"I’m not a complacent person, and I can’t have a complacent staff. I move forward quickly, and so must they."</span><br data-dcnode-id="3459"><br data-dcnode-id="3458"><span data-dcnode-id="3457" instrument_node="">"Don’t expect your employees to work harder than you do. I don’t have to worry about that, because I work 7 days a week and love almost every minute of it."</span><br data-dcnode-id="3456"><br data-dcnode-id="3455"><span data-dcnode-id="3454" instrument_node="">"Winners see problems as just another way to prove themselves. Problems are never truly hardships to them, and if you haven’t got any problems then you must not have a business to run."</span><br data-dcnode-id="3453"><br data-dcnode-id="3452"><span data-dcnode-id="3451" instrument_node="">"Regard your company as a living, breathing organism… because that’s what it is. Those figures you see on your spreadsheets will reflect the health. Watch out for bad cells while allowing good cells to flourish."</span><br data-dcnode-id="3450"><br data-dcnode-id="3449"><span data-dcnode-id="3448" instrument_node="">"Don’t intimidate people. If you do, you’ll never get a straight answer from anyone. I keep my door open, and my people know I’m available as well as approachable."</span><br data-dcnode-id="3447"><br data-dcnode-id="3446"><span data-dcnode-id="3445" instrument_node="">"Remember, your organization is your organization. Bottom line: it’s your ballgame. The strategy is up to you, and so are the results. </span><br data-dcnode-id="3444"><br data-dcnode-id="3443"><span data-dcnode-id="3442" instrument_node="">"Is there anyone else who can do this better than I can? Know yourself and know your competition. If your competition is better than you are, then offer some quality that they lack."</span><br data-dcnode-id="3441"><br data-dcnode-id="3440"><span data-dcnode-id="3439" instrument_node="">"If people have time to be petty, it’s an indication they are not busy enough with their work."</span><br data-dcnode-id="3438"><br data-dcnode-id="3437"><span data-dcnode-id="3436" instrument_node="">"If your going to be bold enough to present your idea, make it as clear as possible, and don’t take it casually."</span><br data-dcnode-id="3435"><br data-dcnode-id="3434"><span data-dcnode-id="3433" instrument_node="">"People are multi-faceted, and it’s important to let them function in a way that will allow them to shine. Sometimes the leader has to be the catalyst for putting the word 'success' into their personal vocabulary."</span><br data-dcnode-id="3432"><br data-dcnode-id="3431"><span data-dcnode-id="3430" instrument_node="">"You can find talent in unlikely places. I enjoy figuring out how each of my key employees sells."</span><br data-dcnode-id="3429"><br data-dcnode-id="3428"><span data-dcnode-id="3427" instrument_node="">"Each success is the beginning of the next one."</span><br data-dcnode-id="3426"><br data-dcnode-id="3425"><span data-dcnode-id="3424" instrument_node="">"People ask me what keeps me going, and this is probably the closest answer to the truth: If I end the day without knowing more than I did when I woke up, it makes me wonder: 'What did I miss out on today? Am I getting lazy?' ”</span><br data-dcnode-id="3423"><br data-dcnode-id="3422"><span data-dcnode-id="3421" instrument_node="">"While I got very good grades at school, I did not have time to be a scholar. Still, it’s something I aspire to in my quiet time. Possibilities unfold. The world opens up."</span><br data-dcnode-id="3420"><br data-dcnode-id="3419"><span data-dcnode-id="3418" instrument_node="">"[Aldous Huxley] was such a learner that when he was faced with near total blindness as a young man, he learned Braille and continued his studies anyway.... not a trace of self-pity... it had offered him some benefits: he could now read in bed at night."</span><br data-dcnode-id="3417"><br data-dcnode-id="3416"><span data-dcnode-id="3415" instrument_node="">"Think big and live large... if you hit, at least you hit big. And if it don't hit, what's the difference between losing $100,000 or hundreds of millions of dollars ? Either way you've lost, so you might as well have really gone for it."</span><br data-dcnode-id="3414"><br data-dcnode-id="3413"><span data-dcnode-id="3412" instrument_node="">"I deliver the goods. If you're devoting your life to creating a body of work, and you believe in what you do, and what you do is excellent, you'd better damn well tell people you think so."</span><br data-dcnode-id="3411"><br data-dcnode-id="3410"><span data-dcnode-id="3409" instrument_node="">"Be tenacious."</span><br data-dcnode-id="3408"><br data-dcnode-id="3407"><span data-dcnode-id="3406" instrument_node="">"When you are on the podium, you are the entertainer. Be prepared for the performance, because that's what's expected of you."</span><br data-dcnode-id="3405"><br data-dcnode-id="3404"><span data-dcnode-id="3403" instrument_node="">"I get knocked a lot. Quickly see knocks for what they are. You don't have to open the door."</span><br data-dcnode-id="3402"><br data-dcnode-id="3401"><span data-dcnode-id="3400" instrument_node="">"What's the altitude of your attitude? Gain some altitude. You'll love it up here."</span><br data-dcnode-id="3399"><br data-dcnode-id="3398"><span data-dcnode-id="3397" instrument_node="">"Avoid being the trigger, and the revolver will not be a threat."</span><br data-dcnode-id="3396"><br data-dcnode-id="3395"><span data-dcnode-id="3394" instrument_node="">"Homework is required, and there will be a test."</span><br data-dcnode-id="3393"><br data-dcnode-id="3392"><span data-dcnode-id="3391" instrument_node="">"Construction isn't glamorous. It's a serious and often dangerous endeavor."</span><br data-dcnode-id="3390"><br data-dcnode-id="3389"><span data-dcnode-id="3388" instrument_node="">"Be aware of the marketplace. I devote several hours a day to reading."</span><br data-dcnode-id="3387"><br data-dcnode-id="3386"><span data-dcnode-id="3385" instrument_node="">"Get to work." </span><br data-dcnode-id="3384"><br data-dcnode-id="3383"><span data-dcnode-id="3382" instrument_node="">"Reflect for 3 hours a day. I'm an early riser - usually by 5 a.m."</span><br data-dcnode-id="3381"><br data-dcnode-id="3380"><span data-dcnode-id="3379" instrument_node="">"To me, dressing successfully means understanding the environment. Make it easy for people to take you seriously." </span><br data-dcnode-id="3378"><br data-dcnode-id="3377"><span data-dcnode-id="3376" instrument_node="">"Invest simply. These are your hard-earned savings at stake. Sometimes the best investments are the ones you don’t take." </span><br data-dcnode-id="3375"><br data-dcnode-id="3374"><span data-dcnode-id="3373" instrument_node="">"Get a prenuptial agreement."</span><br data-dcnode-id="3372"><br data-dcnode-id="3371"><span data-dcnode-id="3370" instrument_node="">"I made a point of becoming best friends with everybody at every bank. Become friendly with the bankers, and make a deal. Go right to the top and do it yourself."</span><br data-dcnode-id="3369"><br data-dcnode-id="3368"><span data-dcnode-id="3367" instrument_node="">"I turn off the lights whenever I leave the office. I’m always happy to get a good deal whether I’m buying a building or supplies at Duane Reade." </span><br data-dcnode-id="3366"><br data-dcnode-id="3365"><span data-dcnode-id="3364" instrument_node="">"About my deals : it’s all about persuasion, not power. I have to coax and make my case just like any negotiator.... Know what you’re doing. That’s where the real power comes from. Study the art of persuasion. Practice it… its profound value. Let everyone come out a winner." </span><br data-dcnode-id="3363"><br data-dcnode-id="3362"><span data-dcnode-id="3361" instrument_node="">"View any conflict as an opportunity."</span><br data-dcnode-id="3360"><br data-dcnode-id="3359"><span data-dcnode-id="3358" instrument_node="">"Know exactly what you want, and keep it to yourself. If you’re careful about what you reveal, you’ll have more flexibility as you gather more information about the contours of the deal."</span><br data-dcnode-id="3357"><br data-dcnode-id="3356"><span data-dcnode-id="3355" instrument_node="">"I’m too busy to be devious. I just assimilate new information quickly, and move forward in unexpected ways."</span><br data-dcnode-id="3354"><br data-dcnode-id="3353"><span data-dcnode-id="3352" instrument_node="">"Balance reason with passion." </span><br data-dcnode-id="3351"><br data-dcnode-id="3350"><span data-dcnode-id="3349" instrument_node="">"The fact that I was stubborn, and had achieved a result others had deemed impossible, jump-started my career." </span><br data-dcnode-id="3348"><br data-dcnode-id="3347"><span data-dcnode-id="3346" instrument_node="">"We try to cater to the people living and working in my buildings in every way possible. Past, present and future tenants and owners have one very important quality in common: they all want the best for their money, which allows me to give you a simple formula for success : Deliver the goods." </span><br data-dcnode-id="3345"><br data-dcnode-id="3344"><span data-dcnode-id="3343" instrument_node="">"I take a call from a writer… One of the questions asked is how I handle a person who consistently makes the same mistakes. I tell him the truth: I don’t. They’re working for someone else now."</span><br data-dcnode-id="3342"><br data-dcnode-id="3341"><span data-dcnode-id="3340" instrument_node="">"You never interrupt the boss in a meeting. You never interrupt a client in a meeting either."</span><br data-dcnode-id="3339"><br data-dcnode-id="3338"><br data-dcnode-id="3337"><span data-dcnode-id="3336" instrument_node="">Working for Trump</span><br data-dcnode-id="3335"><span data-dcnode-id="3334" instrument_node="">———————————</span><br data-dcnode-id="3333"><span data-dcnode-id="3332" instrument_node="">"Here are the 4 essential qualities I’m looking for.</span><br data-dcnode-id="3331"><span data-dcnode-id="3330" instrument_node="">1. Someone who makes everyone feel comfortable… the most essential trait. </span><br data-dcnode-id="3329"><span data-dcnode-id="3328" instrument_node="">2. Book brains and street smarts</span><br data-dcnode-id="3327"><span data-dcnode-id="3326" instrument_node="">3. Creativity - to make connections others might not envision… the hardest quality to develop.</span><br data-dcnode-id="3325"><span data-dcnode-id="3324" instrument_node="">4. Loyalty and trust"</span><br data-dcnode-id="3323"><br data-dcnode-id="3322"><br data-dcnode-id="3321"><span data-dcnode-id="3320" instrument_node="">Donald's Favorite Quotes</span><br data-dcnode-id="3319"><span data-dcnode-id="3318" instrument_node="">----------------</span><br data-dcnode-id="3317"><br data-dcnode-id="3316"><span data-dcnode-id="3315" instrument_node="">"A leader has a right to be beaten, but never the right to be surprised." - Napoleon</span><br data-dcnode-id="3314"><br data-dcnode-id="3313"><span data-dcnode-id="3312" instrument_node="">"He who lives outside his own heart, dreams. He who lives inside his own heart, awakens." - Carl Jung </span><br data-dcnode-id="3311"><br data-dcnode-id="3310"><span data-dcnode-id="3309" instrument_node="">"Exciting is a dull word for the business we're in." - Fred Trump</span><br data-dcnode-id="3308"><br data-dcnode-id="3307"><span data-dcnode-id="3306" instrument_node="">"There are no short-cuts to anywhere worth going." - Beverly Sills</span><br data-dcnode-id="3305"><br data-dcnode-id="3304"><span data-dcnode-id="3303" instrument_node="">“Beware little expenses. A small leak will sink a great ship.” - Benjamin Franklin </span><br data-dcnode-id="3302"><br data-dcnode-id="3301"><span data-dcnode-id="3300" instrument_node="">"I remember when I was 'The Donald'." - Donald Duck</span><br data-dcnode-id="3299"><br data-dcnode-id="3298"><span data-dcnode-id="3297" instrument_node="">.</span></span><span data-dcnode-id="3295" instrument_node="">

</span><span data-dcnode-id="2054" id="freeTextContainer6458158977794491731"><span data-dcnode-id="2058" instrument_node="">This gripping book is packed with insights. Not about getting rich of course, but human psychology. Behind the distorted gloat-stories where Trump pours sugar on himself you get a glimpse of the values and beliefs of this truly extraordinary person.</span><br data-dcnode-id="2057"><br data-dcnode-id="2056"><span data-dcnode-id="2055" instrument_node="">This book was written in 2004, right after The Apprentice had become a hit and rocketed Trump to new heights of popularity. The incoherent, often contradictory and plain ignorant thoughts leave no doubt that this book was genuinely written (or rather </span></span><span data-dcnode-id="2053" instrument_node="">
</span><span data-dcnode-id="2036" id="freeText6458158977794491731" style="display:none"><span data-dcnode-id="2052" instrument_node="">This gripping book is packed with insights. Not about getting rich of course, but human psychology. Behind the distorted gloat-stories where Trump pours sugar on himself you get a glimpse of the values and beliefs of this truly extraordinary person.</span><br data-dcnode-id="2051"><br data-dcnode-id="2050"><span data-dcnode-id="2049" instrument_node="">This book was written in 2004, right after The Apprentice had become a hit and rocketed Trump to new heights of popularity. The incoherent, often contradictory and plain ignorant thoughts leave no doubt that this book was genuinely written (or rather dictated) by the same man who is now trolling the entire world from The White House. Because of the timing and the supermanish indestructible feeling Trump must have experienced, I believe it’s also a pretty honest book. Here’s what I learned:</span><br data-dcnode-id="2048"><br data-dcnode-id="2047"><span data-dcnode-id="2046" instrument_node="">Trump has a binary world view that dictates his whole life and behaviour. You are either a potential means to an end, a useful person, or you are nothing. If you belong to the former (a business partner, journalist, investor etc), Trump will publicly shower you with praise, if you below to the not-useful-group (contractor, “unprofessional” journalist etc), he will make sure everyone knows he thinks you are scum. Interestingly, as we’ve seen, some people move from one group to the other and the effects of this are immediately visible (Omarosa, Cohen etc).</span><br data-dcnode-id="2045"><br data-dcnode-id="2044"><span data-dcnode-id="2043" instrument_node="">What does useful mean in Trump's context? Citing his own words, his purpose in life is “success with influence”, meaning power, which he considers to be far above money. Trump considers fame a key strategy to achieving this goal, hence the TRUMP brand, hence The Apprentice and now… the presidency. Your value in his eyes therefore EXCLUSIVELY depends on your ability to help him gain either more fame or more money, leading to more power.</span><br data-dcnode-id="2042"><br data-dcnode-id="2041"><span data-dcnode-id="2040" instrument_node="">Trump has an ultra-rationalization ability which shifts everything negative on external factors (mostly other people) and leaves his self-esteem untouched. </span><br data-dcnode-id="2039"><br data-dcnode-id="2038"><span data-dcnode-id="2037" instrument_node="">All in all, this book helps to see a primal strategy behind Trump’s seemingly dumb actions and surprisingly, convinces the reader that he indeed has pretty impressive influence skills. This, sadly, makes things even worse as the man has absolutely no regard for anyone else but himself.</span></span><span data-dcnode-id="2035" instrument_node="">

</span><span data-dcnode-id="1866" id="freeTextContainer9595674197060999981"><span data-dcnode-id="1867" instrument_node="">So the shock had worn off. Donald Trump is set to be the next president of the US. I figured I should learn a little about him. Art of the Deal was written ages ago, and his newer book was too close to the recent election - so I went for this 2004 title, released as part of the major success that was the first season of the Apprentice. I suspected the book would confirm what I would already know: the man was very ambitious, not particularly deep, and a relentless showman. These qualities are not</span></span><span data-dcnode-id="1865" instrument_node="">
</span><span data-dcnode-id="1818" id="freeText9595674197060999981" style="display:none"><span data-dcnode-id="1864" instrument_node="">So the shock had worn off. Donald Trump is set to be the next president of the US. I figured I should learn a little about him. Art of the Deal was written ages ago, and his newer book was too close to the recent election - so I went for this 2004 title, released as part of the major success that was the first season of the Apprentice. I suspected the book would confirm what I would already know: the man was very ambitious, not particularly deep, and a relentless showman. These qualities are not necessarily damnable in the real world, but I suspect that they might be problematic in a president. As it is, let me start with the good parts first:</span><br data-dcnode-id="1863"><br data-dcnode-id="1862"><span data-dcnode-id="1861" instrument_node="">Negotiations</span><br data-dcnode-id="1860"><br data-dcnode-id="1859"><span data-dcnode-id="1858" instrument_node="">Mr Trump would like to believe that everything he touches turns to gold. That's why he tried Trump Steaks, Trump University, etc. But only those of us who have been in business know that success in one field doesn't necessarily mean success in others, and even the attempts at these failed businesses did some economic good. What isn't in dispute is that after learning from his disastrous overleverage in the 1980s, he has come back to become simply the most powerful and successful real estate developer in the world. The man makes millions simply from putting his name on a building, and that's not something anyone else in the world can do. He gives us some insights into a couple deals he did and it's interesting to see his single-mindedness, flexibility, and tenacity when going after deals he wants. He's not in it for the money. He's in it for the act of creating a body of work. If he can take this attitude - this real estate attitude - into presidential matters, America could be heading for some good years. He notes, "Contrary to what people may think, I listen to and take advice from a lot of people before I make a final decision on anything. I like to be as well informed as possible." (p. 193). </span><br data-dcnode-id="1857"><br data-dcnode-id="1856"><span data-dcnode-id="1855" instrument_node="">These quotes regarding a deal that involved Trump Tower are particularly insightful:</span><br data-dcnode-id="1854"><br data-dcnode-id="1853"><span data-dcnode-id="1852" instrument_node="">"Don't be confined by your expectations. Sometimes, what we want and what we actually want are two different things." (p. 126)</span><br data-dcnode-id="1851"><br data-dcnode-id="1850"><span data-dcnode-id="1849" instrument_node="">"You have to balance reason with passion. Reason keeps you open. Passion keeps your adrenaline going." (p. 126)</span><br data-dcnode-id="1848"><br data-dcnode-id="1847"><span data-dcnode-id="1846" instrument_node="">There's also this tactic, a form of which was employed by J. Paul Getty, a *true* titan of business and culture:</span><br data-dcnode-id="1845"><br data-dcnode-id="1844"><span data-dcnode-id="1843" instrument_node="">"I might make an outrageous comment in a meeting just to see whether the other people play along or take a stand and disagree." (p. 129)</span><br data-dcnode-id="1842"><br data-dcnode-id="1841"><span data-dcnode-id="1840" instrument_node="">So, that's it for the good parts. Now for the observations about the man himself, from a book that bears his own name as author...</span><br data-dcnode-id="1839"><br data-dcnode-id="1838"><span data-dcnode-id="1837" instrument_node="">"I've read stories in which I'm described as a cartoon, a comic book version of the big-city business mogul with the gorgeous girlfriend and the private plane and the personal golf course and the penthouse apartment with marble floors and gold bathroom fixtures. But my cartoon is real. I am the creator of my own comic book, and I love living in it. If you're going to think, think big. If you're going to live, live large." (p. 35)</span><br data-dcnode-id="1836"><br data-dcnode-id="1835"><span data-dcnode-id="1834" instrument_node="">"...don't believe the critics unless they love your work." (p. 54)</span><br data-dcnode-id="1833"><br data-dcnode-id="1832"><span data-dcnode-id="1831" instrument_node="">"...I'd rather have the junk food, anyway." (p. 91)</span><br data-dcnode-id="1830"><br data-dcnode-id="1829"><span data-dcnode-id="1828" instrument_node="">"I have come to hate doctors. I think that, generally, they are a bunch of money-grubbing dogs." (p. 106)</span><br data-dcnode-id="1827"><br data-dcnode-id="1826"><span data-dcnode-id="1825" instrument_node="">"I realized early on that I was an aesthete by nature, being attracted to beauty in both people and buildings." (p. 189)</span><br data-dcnode-id="1824"><br data-dcnode-id="1823"><span data-dcnode-id="1822" instrument_node="">What I can't quote, because it's melded deep within the DNA of this book, is Donald's love of name-dropping. Who he knows, who calls him, etc. 90% of the time he's giving love and recommendations - from his tailor to his lawyers to George Steinbrenner. The other 10% of the time he is settling scores and calling people out, though often he has anonymized stories, no doubt on legal advice.</span><br data-dcnode-id="1821"><br data-dcnode-id="1820"><span data-dcnode-id="1819" instrument_node="">The man has lived a charmed life, but 3 wives and 5 children later, he has to steer the United States of America. And now it's not just people who like reality TV watching. It's all of us. I share the sentiments of Dave Chapelle, who in November right after the election on SNL said, "I wish him luck." Let's see if he can take it to the next level. Because what he has done so far may be okay for a private citizen. But presidents have to shine.</span></span><span data-dcnode-id="1817" instrument_node="">

</span><span data-dcnode-id="1633" id="freeTextContainer5141548162862764707"><span data-dcnode-id="1634" instrument_node="">In How to Get Rich by billionaire businessman Donald Trump, he reveals the secrets of getting rich and gives business advice on how to make it big. For many years, people have asked Donald Trump on his secret to getting rich and this urged him to write a book detailing his American success story. Trump writes his book in a humorous way and a light hearted tone. For example, “I’ve been accused of admiring beautiful women. I plead guilty”(11). Trump doesn't hold anything back, he tells it as it is</span></span><span data-dcnode-id="1632" instrument_node="">
</span><span data-dcnode-id="1629" id="freeText5141548162862764707" style="display:none"><span data-dcnode-id="1631" instrument_node="">In How to Get Rich by billionaire businessman Donald Trump, he reveals the secrets of getting rich and gives business advice on how to make it big. For many years, people have asked Donald Trump on his secret to getting rich and this urged him to write a book detailing his American success story. Trump writes his book in a humorous way and a light hearted tone. For example, “I’ve been accused of admiring beautiful women. I plead guilty”(11). Trump doesn't hold anything back, he tells it as it is, not afraid to stir controversy. I enjoy that Trump never holds anything back and tells it straight. That’s a quality a lot of people do not have this day in age. I like in the book that Trump gives a timeline of his average week. “Thursday 9:45. Don Jr. comes in to update me on his work. He’s sharp and has good insights on a few of our development”(199). Trump gives details on his average week and receives visits from multiple people throughout just one hour. In addition, I respect and like that Trump does not talk in a bragging way throughout this book, but he talks very humbly and grateful. “No matter how accomplished you are, no matter how well you think you know your business, you have to remain vigilant about the details of your field. You can’t get by on experience or smarts”(9). Trump is very humble and acknowledges no business is too big to fail. I like that Trump knows he has to stay fresh and competitive and he can’t rely on his past success or his long experience. I would recommend this book to anyone looking for business advice or anyone interested in learning more about Donald Trump. </span><br data-dcnode-id="1630"></span><span data-dcnode-id="1628" instrument_node="">

</span><span data-dcnode-id="1550" id="freeTextContainer4973907872954529639"><span data-dcnode-id="1554" instrument_node="">Donald Trump is one of those fascinating people I can't understand why I think he's fascinating. I'm sure I don't like him. I'm sure that he is a mean-spirited man who yells at people and micromanages them and destroys because he can. I don't think I would want to count him as a friend.</span><br data-dcnode-id="1553"><br data-dcnode-id="1552"><span data-dcnode-id="1551" instrument_node="">When I read his book, though, I could not help but think to myself, "if I were more like him, I would hate myself, but I would be rich." I also found myself saying things like, "if my father had been a millionaire</span></span><span data-dcnode-id="1549" instrument_node="">
</span><span data-dcnode-id="1535" id="freeText4973907872954529639" style="display:none"><span data-dcnode-id="1548" instrument_node="">Donald Trump is one of those fascinating people I can't understand why I think he's fascinating. I'm sure I don't like him. I'm sure that he is a mean-spirited man who yells at people and micromanages them and destroys because he can. I don't think I would want to count him as a friend.</span><br data-dcnode-id="1547"><br data-dcnode-id="1546"><span data-dcnode-id="1545" instrument_node="">When I read his book, though, I could not help but think to myself, "if I were more like him, I would hate myself, but I would be rich." I also found myself saying things like, "if my father had been a millionaire, I might be a billionaire right now if I were the right kind of jerk."</span><br data-dcnode-id="1544"><br data-dcnode-id="1543"><span data-dcnode-id="1542" instrument_node="">Trump is like John Gotti. He's a celebrity criminal who's flamboyant enough to make books like this interesting enough to get through. His arrogance makes up for his lack of writing talent, and his short chapters are like a James Elroy homage or something.</span><br data-dcnode-id="1541"><br data-dcnode-id="1540"><span data-dcnode-id="1539" instrument_node="">This tasteless beast who builds golf courses and rides limos through the McDonald's Drive-Thru and stars in their commercials is hard not to psycho-analyze. . . and surely he's counting on that. So, all you amateur psycho-babblers, have at him. And while you're shaking your head at how horrible his mother and father must have been, you'll find yourself raising your eyebrows at the very few pearls of business wisdom sprinkled like scatter shot in this book.</span><br data-dcnode-id="1538"><br data-dcnode-id="1537"><span data-dcnode-id="1536" instrument_node="">Also, the title is bull shit. . . a joke or a marketing curve ball. And that's funny. </span></span><span data-dcnode-id="1534" instrument_node="">

</span><span data-dcnode-id="1441" id="freeTextContainer5688287690413286987"><span data-dcnode-id="1451" instrument_node="">This won't teach you how to start a business, but it will tell you how to deal with people. In this book Trump tells you how to use social skills to achieve success. His tips do not only apply to business, but everyday life as well.</span><br data-dcnode-id="1450"><br data-dcnode-id="1449"><span data-dcnode-id="1448" instrument_node="">Here are some key points that stuck with me:</span><br data-dcnode-id="1447"><span data-dcnode-id="1446" instrument_node="">- Be tough. You need to be tough with some people and command respect.</span><br data-dcnode-id="1445"><span data-dcnode-id="1444" instrument_node="">- Talk with the leaders. Some problems can be solved only by talking.</span><br data-dcnode-id="1443"><span data-dcnode-id="1442" instrument_node="">- Follow your gut. Take advice from others, but ultimately everything is your own dec</span></span><span data-dcnode-id="1440" instrument_node="">
</span><span data-dcnode-id="1421" id="freeText5688287690413286987" style="display:none"><span data-dcnode-id="1439" instrument_node="">This won't teach you how to start a business, but it will tell you how to deal with people. In this book Trump tells you how to use social skills to achieve success. His tips do not only apply to business, but everyday life as well.</span><br data-dcnode-id="1438"><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node="">Here are some key points that stuck with me:</span><br data-dcnode-id="1435"><span data-dcnode-id="1434" instrument_node="">- Be tough. You need to be tough with some people and command respect.</span><br data-dcnode-id="1433"><span data-dcnode-id="1432" instrument_node="">- Talk with the leaders. Some problems can be solved only by talking.</span><br data-dcnode-id="1431"><span data-dcnode-id="1430" instrument_node="">- Follow your gut. Take advice from others, but ultimately everything is your own decision.</span><br data-dcnode-id="1429"><span data-dcnode-id="1428" instrument_node="">- Have fun. Trump claims that he enjoys making big deals, and doesn't do it for the money.</span><br data-dcnode-id="1427"><span data-dcnode-id="1426" instrument_node="">- Do your homework. Be prepared for any negotiation.</span><br data-dcnode-id="1425"><span data-dcnode-id="1424" instrument_node="">- Work with the best. Find the best people who can work for you and with you.</span><br data-dcnode-id="1423"><span data-dcnode-id="1422" instrument_node="">- It's about people. Most of the advice Trump gives are how to work with others and how to get them to work with you. Spend time with people and build relationships.</span></span><span data-dcnode-id="1420" instrument_node="">

</span><span data-dcnode-id="381" id="freeText1295209489963419465" style="display:none"><span data-dcnode-id="394" instrument_node="">Donald John Trump was born in Queens, New York, on June 14, 1946. His father, Fred Trump, was a highly successful real estate developer. The elder Trump was of German heritage, and his wife, Mary McLeod, of Scottish background. Their son Donald was the second youngest of five children. He was educated at the New York Military Academy and the Wharton School of Finance and Commerce at the University of Pennsylvania. Even before he graduated he was drawn to real estate and construction, and as a young man he took over his father’s firm, renaming it the Trump Organization.</span><br data-dcnode-id="393"><br data-dcnode-id="392"><span data-dcnode-id="391" instrument_node="">The Trump Organization soon became involved in a myriad of projects, including hotels, resorts, residential and commercial buildings, casinos, and golf courses, both in the United States and abroad. His first of many books was The Art of the Deal, published in 1987. In 2004 he launched the Apprentice (later The Celebrity Apprentice), a popular television series that aired until 2015. During the 2016 primary season Trump defeated more than a dozen seasoned rivals to win the Republican nomination and went on to win the election over former Secretary of State Hillary Clinton. His campaign slogan was “Make America Great Again,” and he moved swiftly to reinvigorate “Buy American and Hire American” policies. He signed a major tax reform bill into law and directed the reduction of federal regulations intended to secure a long-running economic expansion and a historically low unemployment rate. His trade policies encouraged tariffs on foreign aluminum and steel and a series of renegotiations of trade agreements with Mexico, Canada, China, Japan, and South Korea.</span><br data-dcnode-id="390"><br data-dcnode-id="389"><span data-dcnode-id="388" instrument_node="">Other priorities included Supreme Court and federal judiciary appointments, tackling the opioid crisis, seeking to reduce the cost of prescription drugs, and improving health care for veterans. Trump’s commitment to “America first” abroad shaped not only his trade and tariff policies but his approach to immigration and overseas commitments. At his urging, North Atlantic Treaty Organization (NATO) member states increased their contributions to the alliance. Trump recognized Israeli sovereignty over the Golan Heights, and moved the American Embassy from Tel Aviv to Jerusalem, recognizing the ancient city as Israel’s capital.</span><br data-dcnode-id="387"><br data-dcnode-id="386"><span data-dcnode-id="385" instrument_node="">His approach to the problem of nuclear proliferation included applying maximum economic pressure on both North Korea and Iran. Trump increased the budget for the U.S. military, and during his administration the self-proclaimed Islamic State (ISIS), which had taken territory in Iraq and Syria and was responsible for inciting terrorist attacks, was defeated. </span><br data-dcnode-id="384"><br data-dcnode-id="383"><span data-dcnode-id="382" instrument_node="">President Trump and his wife, Melania Trump, have one son, Barron. President Trump also has four adult children from previous marriages: Donald Jr., Ivanka, Eric, and Tiffany, as well as nine grandchildren.</span></span><span data-dcnode-id="380" instrument_node="">
