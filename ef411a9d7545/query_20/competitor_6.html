It didn't take long for </span><a data-component="link" data-dcnode-id="2217" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/donald-trump-profile-4024748"><span data-dcnode-id="2218" instrument_node="">Donald Trump</span></a><span data-dcnode-id="2216" instrument_node="">'s presidency to become mired&nbsp;in scandal and controversy. The list of Donald Trump scandals grew long&nbsp;soon after </span><a data-component="link" data-dcnode-id="2214" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/us-president-inauguration-day-3368132"><span data-dcnode-id="2215" instrument_node="">he took office in January 2017</span></a><span data-dcnode-id="2213" instrument_node="">. Some&nbsp;had their roots in his </span><a data-component="link" data-dcnode-id="2211" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/most-outrageous-trump-quotes-3367569"><span data-dcnode-id="2212" instrument_node="">use of social media to insult or attack political enemies and foreign leaders</span></a><span data-dcnode-id="2210" instrument_node="">. Others involved a revolving door of staffers and senior officials who either quick or were fired. The most serious Trump scandal, though, emerged from Russia's alleged&nbsp;meddling in the </span><a data-component="link" data-dcnode-id="2208" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/how-donald-trump-won-the-presidential-election-4113292"><span data-dcnode-id="2209" instrument_node="">2016 presidential election</span></a><span data-dcnode-id="2207" instrument_node=""> and the president's efforts to undermine the investigation into the matter. </span><a data-component="link" data-dcnode-id="2205" data-ordinal="5" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/presidents-and-psych-evals-4076979"><span data-dcnode-id="2206" instrument_node="">Some members of Trump's own administration grew concerned about his behavior</span></a><span data-dcnode-id="2204" instrument_node="">. Here's a look at the biggest Trump scandals so far, what they're about and how Trump responded to the controversies surrounding him.&nbsp;
</span></p><span data-dcnode-id="2202" instrument_node="">
</span></div><span data-dcnode-id="2200" instrument_node="">
</span><div class="comp list-sc__content mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1060" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="54em" data-sc-content-positions="[1, 1050, 1250, 1550, 1950, 2350, 2750, 3150]" data-sc-load-immediate="3" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="85" id="list-sc__content_1-0"><span data-dcnode-id="2199" instrument_node="">

</span><figure class="comp mntl-sc-block reference-sc-block-image mntl-sc-block-image figure-landscape figure-high-res" data-dcnode-id="2152" id="mntl-sc-block_2-0-1"><span data-dcnode-id="2187" instrument_node="">

</span><span class="figure-article-caption-owner" data-dcnode-id="2156"><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">The White House / Flickr / Public Domain</span></p></span><span data-dcnode-id="2155" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2149" id="mntl-sc-block_2-0-2"><span data-dcnode-id="2150" instrument_node="">
President Trump became the first American president ever to be impeached twice. First, in December 2019, he was impeached on two articles related to his alleged attempt to pressure Ukraine to interfere in the 2020 presidential election. He was impeached by the House, but acquitted by the Senate. In January 2021, only weeks before his term expired, he was impeached a second time, this time on a charge of incitement of insurrection for his role in attempting to overturn the results of the 2020 election, leading to the January 6 Capitol riots.
</span></p><span data-dcnode-id="2148" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2143" id="mntl-sc-block_2-0-3"><span data-dcnode-id="2147" instrument_node="">
</span><strong data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">What the Scandal Is About</span></strong><span data-dcnode-id="2144" instrument_node="">
</span></p><span data-dcnode-id="2142" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2140" id="mntl-sc-block_2-0-4"><span data-dcnode-id="2141" instrument_node="">
Trump's dual impeachments both are about fundamental conflicts between what are perceived as his personal interests and the interests of the country as a whole. The Ukraine scandal centered, like his earlier scandal linked to Russia, on Trump's attempts to convince a foreign entity to aid him in a presidential election. In this case, he reportedly tried to withhold military aid to Ukraine and pressured the Ukrainian president, Volodymyr Zelensky, to investigate conspiracy theories involving Democratic National Committee servers, Trump's political opponent Joe Biden, and Biden's son Hunter.
</span></p><span data-dcnode-id="2139" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2131" id="mntl-sc-block_2-0-5"><span data-dcnode-id="2138" instrument_node="">
Trump's second impeachment came as the pinnacle of a two-month effort by the president and his allies to discredit and even overturn the results of the 2020 election, in which Trump lost re-election to Democratic challenger Joe Biden. He repeatedly pushed claims of election fraud (including conspiracy theories about mail-in voting and a particular brand of voting machines), filed over sixty lawsuits contesting elections in key swing states (nearly all of which he lost immediately), and was caught on a recording calling the Georgia Secretary of State to pressure him to "find 11,780 votes" to flip the state to Trump.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2136" data-id="#citation-24"><span data-dcnode-id="2137" instrument_node="">1</span></span><span data-dcnode-id="2135" instrument_node="">﻿ Prior to the Capitol riot of January 6, 2021, in which a pro-Trump mob stormed the Capitol building during the formal certification of electoral votes and left five people dead, Trump spoke at a rally and urged his followers to march to the Capitol and "stop the steal."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2133" data-id="#citation-25"><span data-dcnode-id="2134" instrument_node="">2</span></span><span data-dcnode-id="2132" instrument_node="">﻿
</span></p><span data-dcnode-id="2130" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2125" id="mntl-sc-block_2-0-6"><span data-dcnode-id="2129" instrument_node="">
</span><strong data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">What Critics Say</span></strong><span data-dcnode-id="2126" instrument_node="">
</span></p><span data-dcnode-id="2124" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2119" id="mntl-sc-block_2-0-7"><span data-dcnode-id="2123" instrument_node="">
Regarding the Trump-Ukraine scandal that led to the first impeachment, critics say that it was part of a pattern of Trump illegally soliciting foreign interference for his own political gain, misusing his powers of office to do so. The accusations fully reached public view after a whistleblower from the U.S. intelligence community reported the contents of Trump's call with Zelensky and the simultaneous change in U.S. policy towards aid to Ukraine.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2121" data-id="#citation-22"><span data-dcnode-id="2122" instrument_node="">3</span></span><span data-dcnode-id="2120" instrument_node="">﻿ The whistleblower complaint also alleged that the White House attempted to cover up records of the call.
</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2113" id="mntl-sc-block_2-0-8"><span data-dcnode-id="2117" instrument_node="">
The House Intelligence Committee ultimately published a report as part of the impeachment investigations.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2115" data-id="#citation-23"><span data-dcnode-id="2116" instrument_node="">4</span></span><span data-dcnode-id="2114" instrument_node="">﻿ In part, the report concluded that "President Trump, personally and acting through agents within and outside of the U.S. government, solicited the interference of a foreign government, Ukraine, to benefit his reelection. In furtherance of this scheme, President Trump conditioned official acts on a public announcement by the new Ukrainian president, Volodymyr Zelensky, of politically-motivated investigations, including one into Joe Biden, one of Trump's domestic political opponents. In pressuring President Zelensky to carry out his demand, President Trump withheld a White House meeting desperately sought by the Ukrainian President, and critical U.S. military assistance."
</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2107" id="mntl-sc-block_2-0-9"><span data-dcnode-id="2111" instrument_node="">
Trump's second impeachment came about after his months-long quest to overturn the results of the 2020 presidential election were linked to the deadly riot at the Capitol. "This was not a close election... I won them both and the second one I won much bigger than the first, okay?" he told followers at a rally just prior to the riot, promising to walk with them to the Capitol to "peacefully and patriotically make your voices heard." "You'll never take back our country with weakness. You have to show strength and you have to be strong...something is wrong here, something is really wrong, can't have happened and we fight, we fight like hell, and if you don't fight like hell you're not going to have a country anymore.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2109" data-id="#citation-25"><span data-dcnode-id="2110" instrument_node="">2</span></span><span data-dcnode-id="2108" instrument_node="">﻿"
</span></p><span data-dcnode-id="2106" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2095" id="mntl-sc-block_2-0-10"><span data-dcnode-id="2105" instrument_node="">
While Trump's critics, both within his own party and among Democrats, laid blame at his feet for the day's events, the rioters themselves declared themselves to be following Trump. A </span><em data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">New York Times</span></em><span data-dcnode-id="2102" instrument_node=""> report quoted several rioters who said they were "[following] the president's instructions" and "answer[ing] the call of my president;" one rioter was caught on camera telling Capitol security that the rioters were "listening to Trump, your boss.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2100" data-id="#citation-26"><span data-dcnode-id="2101" instrument_node="">5</span></span><span data-dcnode-id="2099" instrument_node="">﻿" It follows a long line of accusations that Trump has nurtured and fanned the flames of far-right, white nationalist, and anti-democratic violence. "It is deliberate and by design, and it is honestly frightening,” Lynda Garcia, the policing campaign director for the Leadership Conference on Civil and Human Rights, said to NBC News.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2097" data-id="#citation-28"><span data-dcnode-id="2098" instrument_node="">6</span></span><span data-dcnode-id="2096" instrument_node="">﻿
</span></p><span data-dcnode-id="2094" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2089" id="mntl-sc-block_2-0-11"><span data-dcnode-id="2093" instrument_node="">
</span><strong data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">What Trump Says</span></strong><span data-dcnode-id="2090" instrument_node="">
</span></p><span data-dcnode-id="2088" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2083" id="mntl-sc-block_2-0-12"><span data-dcnode-id="2087" instrument_node="">
Following the whistleblower complaint over Trump's phone call with Zelensky, Trump was caught on tape commenting about how to deal with it. "I want to know who’s the person, who’s the person who gave the whistleblower the information? Because that’s close to a spy. You know what we used to do in the old days when we were smart? Right? The spies and treason, we used to handle it a little differently than we do now.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2085" data-id="#citation-21"><span data-dcnode-id="2086" instrument_node="">7</span></span><span data-dcnode-id="2084" instrument_node="">﻿”
</span></p><span data-dcnode-id="2082" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2077" id="mntl-sc-block_2-0-13"><span data-dcnode-id="2081" instrument_node="">
Trump also refused to take responsibility for his actions leading up to the Capitol riot. He called his remarks at the rally "totally appropriate" and seemed to threaten the impeachment leaders and those suggesting he should be removed via the 25th Amendment. "As the expression goes, be careful what you wish for.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2079" data-id="#citation-27"><span data-dcnode-id="2080" instrument_node="">8</span></span><span data-dcnode-id="2078" instrument_node="">﻿"
</span></p><span data-dcnode-id="2076" instrument_node="">
</span></div><span data-dcnode-id="2074" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="2063" id="adslot_1-0"><div class="comp mntl-block" data-dcnode-id="2064" id="mntl-block_4-0"><span data-dcnode-id="2073" instrument_node="">

</span><span class="figure-article-caption-owner" data-dcnode-id="2016"><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Tasos Katopodis/Getty Images</span></p></span><span data-dcnode-id="2015" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2009" id="mntl-sc-block_2-0-16"><span data-dcnode-id="2010" instrument_node="">
The 2020 presidential election pitted incumbent Trump against Democrat Joe Biden, a former U.S. Senator from Delaware and the former vice president to Trump's predecessor, Barack Obama. Following Trump's loss in the election, rather than conceding and working on the usual peaceful transition of power to the next administration, Trump and his allies filed dozens of lawsuits and made numerous speeches claiming election fraud and attempting to overturn the results of the election, particularly in swing states that broke for Biden.
</span></p><span data-dcnode-id="2008" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2003" id="mntl-sc-block_2-0-17"><span data-dcnode-id="2007" instrument_node="">
</span><strong data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">What the Scandal Is About</span></strong><span data-dcnode-id="2004" instrument_node="">
</span></p><span data-dcnode-id="2002" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2000" id="mntl-sc-block_2-0-18"><span data-dcnode-id="2001" instrument_node="">
In a nutshell, the scandal is about the losing candidate of a presidential election refusing to accept the results. Due to the COVID-19 pandemic, several states changed or updated their rules regarding mail-in and early voting in an attempt to make voting safer during a deadly pandemic. Because of this, it took a little more time to count votes (many states require mail-in votes to be counted last), and Trump's team falsely claimed that this was actually evidence of voter fraud.
</span></p><span data-dcnode-id="1999" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1994" id="mntl-sc-block_2-0-19"><span data-dcnode-id="1998" instrument_node="">
Trump's team filed over sixty lawsuits alleging irregularities and attempting to overturn results in states including Arizona, Georgia, Michigan, Nevada, Pennsylvania, and Wisconsin - all swing states that Biden won. In court, in contrast to the fiery language targeted at the public, Trump's lawyers alleged procedural irregularities.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1996" data-id="#citation-29"><span data-dcnode-id="1997" instrument_node="">9</span></span><span data-dcnode-id="1995" instrument_node="">﻿ All but one of their cases was thrown out, and the one temporary win was later overturned.
</span></p><span data-dcnode-id="1993" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1988" id="mntl-sc-block_2-0-20"><span data-dcnode-id="1992" instrument_node="">
</span><strong data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">What Critics Say</span></strong><span data-dcnode-id="1989" instrument_node="">
</span></p><span data-dcnode-id="1987" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1982" id="mntl-sc-block_2-0-21"><span data-dcnode-id="1986" instrument_node="">
Even the legal and judicial professionals who oversaw the Trump campaign's lawsuits had strong words for the president. One Michigan judge, for instance, denied an injunction to halt certification of the state's votes with a blunt ruling that stated, in part, "Plaintiffs’ allegation is mere speculation... [they] offered no evidence to support their assertions.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1984" data-id="#citation-30"><span data-dcnode-id="1985" instrument_node="">10</span></span><span data-dcnode-id="1983" instrument_node="">﻿"
</span></p><span data-dcnode-id="1981" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1976" id="mntl-sc-block_2-0-22"><span data-dcnode-id="1980" instrument_node="">
Another ruling, this one out of Pennsylvania, offered a sharp rebuke to Republicans seeking to overturn the state's votes. "This lawsuit seems to be less about achieving the relief plaintiffs seek ... and more about the impact of their allegations on people’s faith in the democratic process and their trust in our government... Plaintiffs ask this court to ignore the orderly statutory scheme established to challenge elections and to ignore the will of millions of voters. This, the court cannot, and will not, do.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1978" data-id="#citation-32"><span data-dcnode-id="1979" instrument_node="">11</span></span><span data-dcnode-id="1977" instrument_node="">﻿"
</span></p><span data-dcnode-id="1975" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1970" id="mntl-sc-block_2-0-23"><span data-dcnode-id="1974" instrument_node="">
</span><strong data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">What Trump Says</span></strong><span data-dcnode-id="1971" instrument_node="">
</span></p><span data-dcnode-id="1969" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1964" id="mntl-sc-block_2-0-24"><span data-dcnode-id="1968" instrument_node="">
Trump and his closest allies, such as lawyers Rudy Giuliani and Sidney Powell, pushed a variety of conspiracy theories about the election. Trump refused to concede the election, continuing to insist that he actually won, even after every legal avenue was exhausted. The closest Trump came to admitting his loss came in a video on the heels of the January 2021 Capitol riot, when he said "a new administration will be inaugurated on January 20th.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1966" data-id="#citation-33"><span data-dcnode-id="1967" instrument_node="">12</span></span><span data-dcnode-id="1965" instrument_node="">﻿"
</span></p><span data-dcnode-id="1963" instrument_node="">

an class="jw-captions-text jw-reset" data-dcnode-id="1943"></span></div></div><div class="jw-title jw-reset-text" data-dcnode-id="1937" dir="auto"><div class="jw-title-primary jw-reset-text" data-dcnode-id="1940"></div><div class="jw-title-secondary jw-reset-text" data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Donald Trump has become one of the most polarizing characters in recent American political history. We all know he's a business man, TV producer and politician, but here are facts you may not have known. Donald's parents sent him away to New York Military School at 13 years old. They thought he needed more discipline. Trump passed up the chance to buy the New England Patriots back in the 80s because he thought they were a bad investment. Trump doesn't drink alcohol. His brother was an alcoholic and died because of his addiction in 1982. In 2013, Trump was inducted into the WWE Hall of Fame. I only have one regret in the women department – that I never had the opportunity to court Lady Diana Spencer…I met her on a number of occasions…She was a genuine princess – a dream lady.</span></div></div><div class="jw-overlays jw-reset" data-dcnode-id="1917"><div class="jw-plugin jw-reset" data-dcnode-id="1936" id="mntl-rail-jwplayer_1-0_inference"></div><div class="jw-plugin jw-reset jw-plugin-googima jw-ad-linear" data-dcnode-id="1934" id="mntl-rail-jwplayer_1-0_googima"><div class="jw-ads-view" data-dcnode-id="1935" id="mntl-rail-jwplayer_1-0_ad"></div></div><div class="jw-plugin jw-reset" data-dcnode-id="1933" id="mntl-rail-jwplayer_1-0_jwpsrv"></div><div class="jw-plugin jw-reset jw-plugin-related" data-dcnode-id="1918" id="mntl-rail-jwplayer_1-0_related"><div class="jw-reset jw-related jw-overlay" data-dcnode-id="1919"><div aria-label="Close" class="jw-reset jw-icon jw-icon-inline jw-related-close jw-button-color" data-dcnode-id="1930" role="button" tabindex="0"><svg class="jw-svg-icon jw-svg-icon-close" data-dcnode-id="1931" focusable="false" </span><span class="figure-article-caption-text" data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Russian President Vladimir Putin denied his country sought to interfere with the 2016 presidential election.</span></span><span data-dcnode-id="1639" instrument_node="">
</span><span class="figure-article-caption-owner" data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">: Mikhail Svetlov/Getty Images Contributor</span></span><span data-dcnode-id="1636" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1624" id="mntl-sc-block_2-0-27"><span data-dcnode-id="1631" instrument_node="">
The Russia scandal was the most serious of the controversies surrounding </span><a data-component="link" data-dcnode-id="1629" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/was-donald-trump-a-democrat-3367571" rel="noopener noreferrer"><span data-dcnode-id="1630" instrument_node="">the Trump presidency</span></a><span data-dcnode-id="1628" instrument_node=""> in its early days. It involved a number of key players besides the president himself, including the national security adviser and the FBI director. The Russia scandal had its origins in the general election campaign between Trump, a Republican, and former U.S. Sen. and onetime Secretary of State Hillary Clinton, a Democrat. Both the FBI and CIA said hackers&nbsp;who&nbsp;targeted the Democratic National Committee and the private emails of Clinton’s campaign chairman were working for Moscow, hoping to sway the election to Trump.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1626" data-id="#citation-1"><span data-dcnode-id="1627" instrument_node="">13</span></span><span data-dcnode-id="1625" instrument_node="">﻿ U.S. intelligence agencies also said that Russia was working to sow dissent and confusion among American voters in an attempt to undermine its democratic institutions.
</span></p><span data-dcnode-id="1623" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1618" id="mntl-sc-block_2-0-28"><span data-dcnode-id="1622" instrument_node="">
</span><strong data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">What the Scandal&nbsp;Is About</span></strong><span data-dcnode-id="1619" instrument_node="">
</span></p><span data-dcnode-id="1617" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1609" id="mntl-sc-block_2-0-29"><span data-dcnode-id="1616" instrument_node="">
At its core, this scandal is about national security and the integrity of the American voting system. That a foreign government was able to interfere in a presidential election to help one candidate win is an unprecedented breach. The Office of the Director of National Intelligence said it had "high confidence" the Russian government sought to help win the election for Trump. "We assess </span><a data-component="link" data-dcnode-id="1614" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/vladimir-putin-biography-4175448" rel="noopener noreferrer"><span data-dcnode-id="1615" instrument_node="">Russian President Vladimir Putin</span></a><span data-dcnode-id="1613" instrument_node=""> ordered an influence campaign in 2016 aimed at the US presidential election. Russia’s goals were to undermine public faith in the US democratic process, denigrate Secretary (Hillary) Clinton, and harm her electability and potential presidency. We further assess Putin and the Russian Government developed a clear preference for President-elect Trump," the report stated.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1611" data-id="#citation-2"><span data-dcnode-id="1612" instrument_node="">14</span></span><span data-dcnode-id="1610" instrument_node="">﻿
</span></p><span data-dcnode-id="1608" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1603" id="mntl-sc-block_2-0-30"><span data-dcnode-id="1607" instrument_node="">
</span><strong data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">What&nbsp;Critics Say</span></strong><span data-dcnode-id="1604" instrument_node="">
</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1597" id="mntl-sc-block_2-0-31"><span data-dcnode-id="1601" instrument_node="">
Critics of Trump were troubled by the connections between the Trump campaign and Russians.&nbsp;They successfully called for an independent special prosecutor&nbsp;to get to the bottom of the hacking. </span><a data-component="link" data-dcnode-id="1599" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/robert-mueller-4175811" rel="noopener noreferrer"><span data-dcnode-id="1600" instrument_node="">Former&nbsp;FBI&nbsp;Director Robert Mueller</span></a><span data-dcnode-id="1598" instrument_node="">&nbsp;was later appointed as a special counsel to handle the&nbsp;investigation into campaign ties between Trump and Russia.
</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1582" id="mntl-sc-block_2-0-32"><span data-dcnode-id="1595" instrument_node="">
Some Democrats began talking openly about the prospect of </span><a data-component="link" data-dcnode-id="1593" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/impeachment-the-unthinkable-process-3322171" rel="noopener noreferrer"><span data-dcnode-id="1594" instrument_node="">impeaching</span></a><span data-dcnode-id="1592" instrument_node=""> Trump. “I know that there are those who are talking about, ‘Well, we’re going to get ready for the next election.' No, we can’t wait that long. We don’t need to wait that long. He will have destroyed this country by then," Democratic U.S. Rep. Maxine Waters of California said.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1590" data-id="#citation-3"><span data-dcnode-id="1591" instrument_node="">15</span></span><span data-dcnode-id="1589" instrument_node="">﻿ In 2018, Deputy U.S. Attorney General Rod Rosenstein reportedly&nbsp;suggested he secretly record Trump in the White House to "expose the chaos consuming the administration" and was said to have discussed recruiting cabinet members to invoke the&nbsp;</span><a data-component="link" data-dcnode-id="1587" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/us-constitution-25th-amendment-text-105394" rel="noopener noreferrer"><span data-dcnode-id="1588" instrument_node="">25th Amendment</span></a><span data-dcnode-id="1586" instrument_node="">, which allows for the forceful removal of a president.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1584" data-id="#citation-4"><span data-dcnode-id="1585" instrument_node="">16</span></span><span data-dcnode-id="1583" instrument_node="">﻿&nbsp;Rosenstein denied the reports.
</span></p><span data-dcnode-id="1581" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1573" id="mntl-sc-block_2-0-33"><span data-dcnode-id="1580" instrument_node="">
On March 22, 2019, Special Counsel Robert Mueller concluded his investigation. Two days later, Attorney General William Barr released a four-page "summary" claiming that the report "did not find that the Trump campaign or anyone associated with it conspired or coordinated with Russia to influence the 2016 U.S. presidential election.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1578" data-id="#citation-6"><span data-dcnode-id="1579" instrument_node="">17</span></span><span data-dcnode-id="1577" instrument_node="">﻿" However, Mueller privately wrote to Barr,</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1575" data-id="#citation-7"><span data-dcnode-id="1576" instrument_node="">18</span></span><span data-dcnode-id="1574" instrument_node="">﻿ noting that Barr's summary did not adequately explain the report and had led to "public confusion about critical aspects of the results of [the] investigation." He asked Barr to release other non-redacted sections of the report (an introduction and an executive summary) to clarify to the public; Barr refused.
</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1567" id="mntl-sc-block_2-0-34"><span data-dcnode-id="1571" instrument_node="">
In August 2020, the bipartisan, Republican-majority United States Senate Select Committee on Intelligence released its final report on the links between Trump, Russia, and the 2016 election.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1569" data-id="#citation-8"><span data-dcnode-id="1570" instrument_node="">19</span></span><span data-dcnode-id="1568" instrument_node="">﻿ The lengthy report concluded that there had been significant links between the Trump campaign and Russia; of particular note was how former campaign chair Paul Manafort hired a former Russian intelligence operative who may have been involved in the DNC hack and leaks.
</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1561" id="mntl-sc-block_2-0-35"><span data-dcnode-id="1565" instrument_node="">
</span><strong data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">What Trump Says</span></strong><span data-dcnode-id="1562" instrument_node="">
</span></p><span data-dcnode-id="1560" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1555" id="mntl-sc-block_2-0-36"><span data-dcnode-id="1559" instrument_node="">
The president has said the allegations of Russian interference are an excuse used by Democrats still smarting over an election they believed they should have been able to win easily. "This Russia thing - with Trump and Russia - is a made-up story. It's an excuse by the Democrats for having lost an election that they should have won," Trump said.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1557" data-id="#citation-5"><span data-dcnode-id="1558" instrument_node="">20</span></span><span data-dcnode-id="1556" instrument_node="">﻿
</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1552" id="mntl-sc-block_2-0-37"><span data-dcnode-id="1553" instrument_node="">
Towards the end of his presidency, Trump pardoned key players in the Russia scandal, including Manafort and Michael Flynn, a former lieutenant general who had pled guilty to misleading testimony about his communications with the Russian ambassador.
</span></p><span data-dcnode-id="1551" instrument_node="">
</span></div><span data-dcnode-id="1549" instrument_node="">

</span><figure class="comp mntl-sc-block reference-sc-block-image mntl-sc-block-image figure-landscape figure-high-res" data-dcnode-id="1488" id="mntl-sc-block_2-0-39"><span data-dcnode-id="1525" instrument_node="">

</span><span class="figure-article-caption-owner" data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Drew Angerer/Getty Images News</span></span><span data-dcnode-id="1491" instrument_node="">

</span></figure><span data-dcnode-id="1487" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1482" id="mntl-sc-block_2-0-40"><span data-dcnode-id="1486" instrument_node="">
Trump fired FBI Director James Comey in May 2017 and blamed senior Justice Department officials for the move. Democrats had viewed Comey with suspicion because, 11 days before the 2016 presidential election, he announced he was reviewing emails found on a laptop computer belonging to a </span><a data-component="link" data-dcnode-id="1484" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/hillary-clinton-profile-3984058" rel="noopener noreferrer"><span data-dcnode-id="1485" instrument_node="">Hillary Clinton</span></a><span data-dcnode-id="1483" instrument_node=""> confidant to determine whether they were relevant to the&nbsp;then-closed investigation of&nbsp;her use of the personal email server.
</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1476" id="mntl-sc-block_2-0-41"><span data-dcnode-id="1480" instrument_node="">
</span><strong data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">What the Scandal&nbsp;Is About</span></strong><span data-dcnode-id="1477" instrument_node="">
</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1470" id="mntl-sc-block_2-0-42"><span data-dcnode-id="1474" instrument_node="">
At the time of his firing, Comey was directing the investigation into Russians' interference in the 2016 presidential election and whether any of Trump's advisers or campaign staff had colluded with them. Trump's firing of the FBI director was seen as a way to halt the investigation, and Comey later testified under oath that Trump asked him to drop his investigation of the former national security adviser, Michael Flynn.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1472" data-id="#citation-9"><span data-dcnode-id="1473" instrument_node="">21</span></span><span data-dcnode-id="1471" instrument_node="">﻿ Flynn had misled the White House about&nbsp;his conversations with the Russian ambassador to the United States.&nbsp;
</span></p><span data-dcnode-id="1469" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1464" id="mntl-sc-block_2-0-43"><span data-dcnode-id="1468" instrument_node="">
</span><strong data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">What Critics Say</span></strong><span data-dcnode-id="1465" instrument_node="">
</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1452" id="mntl-sc-block_2-0-44"><span data-dcnode-id="1462" instrument_node="">
Critics of Trump clearly believe Trump's firing of Comey, which was abrupt and unexpected, was a clear attempt to interfere with the FBI's investigation of Russian interference with the 2016 election. Some said it was worse than the cover-up in the </span><a data-component="link" data-dcnode-id="1460" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/us-presidents-in-american-history-4133351" rel="noopener noreferrer"><span data-dcnode-id="1461" instrument_node="">Watergate scandal</span></a><span data-dcnode-id="1459" instrument_node="">, which </span><a data-component="link" data-dcnode-id="1457" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/presidents-who-were-impeached-3368130" rel="noopener noreferrer"><span data-dcnode-id="1458" instrument_node="">led to President RIchard Nixon's resignation</span></a><span data-dcnode-id="1456" instrument_node="">. “Russia attacked our democracy and the American people deserve answers. President Trump’s decision to make this move ... is an attack on the rule of law and raises more questions that demand answers. Firing the FBI Director does not place the White House, the President, or his campaign above the law," said Democratic U.S. Sen. Tammy Baldwin of Wisconsin.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1454" data-id="#citation-10"><span data-dcnode-id="1455" instrument_node="">22</span></span><span data-dcnode-id="1453" instrument_node="">﻿
</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1446" id="mntl-sc-block_2-0-45"><span data-dcnode-id="1450" instrument_node="">
Even Republicans were troubled by the firing. Republican U.S. Sen. Richard Burr of North Carolina said he was&nbsp;“troubled by the timing and reasoning of Director Comey’s termination. I have found Director Comey to be a public servant of the highest order, and his dismissal further confuses an already difficult investigation by the Committee."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1448" data-id="#citation-11"><span data-dcnode-id="1449" instrument_node="">23</span></span><span data-dcnode-id="1447" instrument_node="">﻿
</span></p><span data-dcnode-id="1445" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1440" id="mntl-sc-block_2-0-46"><span data-dcnode-id="1444" instrument_node="">
</span><strong data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">What Trump Says</span></strong><span data-dcnode-id="1441" instrument_node="">
</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1434" id="mntl-sc-block_2-0-47"><span data-dcnode-id="1438" instrument_node="">
Trump has called coverage of the Russia investigation "fake news" and said there is no evidence Russia changed the outcome of the presidential election. The president tweeted: "This is the single greatest witch hunt of a politician in American history!" Trump has said he looked forward to "this matter concluding quickly. As I have stated many times, a thorough investigation will confirm what we already know — there was no collusion between my campaign and any foreign entity.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1436" data-id="#citation-12"><span data-dcnode-id="1437" instrument_node="">24</span></span><span data-dcnode-id="1435" instrument_node="">﻿"
</span></p><span data-dcnode-id="1433" instrument_node="">
</span></div><span data-dcnode-id="1431" instrument_node="">

Lt. Gen. Michael Flynn was tapped by Trump to be his national security adviser in November 2016, just days after the presidential election. He resigned the position after just 24 days on the job, in February of 2017 after </span><em data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">The Washington Post</span></em><span data-dcnode-id="1365" instrument_node=""> reported that he lied to </span><a data-component="link" data-dcnode-id="1363" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/a-profile-of-indiana-congressman-mike-pence-3303403" rel="noopener noreferrer"><span data-dcnode-id="1364" instrument_node="">Vice President Mike Pence</span></a><span data-dcnode-id="1362" instrument_node=""> and other White House officials about his meetings with a Russian ambassador to the United States.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1360" data-id="#citation-15"><span data-dcnode-id="1361" instrument_node="">25</span></span><span data-dcnode-id="1359" instrument_node="">﻿
</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1352" id="mntl-sc-block_2-0-51"><span data-dcnode-id="1356" instrument_node="">
</span><strong data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">What the Scandal Is About</span></strong><span data-dcnode-id="1353" instrument_node="">
</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1346" id="mntl-sc-block_2-0-52"><span data-dcnode-id="1350" instrument_node="">
The meetings Flynn had with the&nbsp;Russian ambassador were portrayed as being potentially illegal, and his alleged cover-up of them concerned the Justice Department, which believed his mischaracterization made him vulnerable to blackmail by the Russians. Flynn was said to have discussed U.S. sanctions on Russia with the ambassador.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1348" data-id="#citation-13"><span data-dcnode-id="1349" instrument_node="">26</span></span><span data-dcnode-id="1347" instrument_node="">﻿&nbsp;
</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1340" id="mntl-sc-block_2-0-53"><span data-dcnode-id="1344" instrument_node="">
</span><strong data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">What Critics Say</span></strong><span data-dcnode-id="1341" instrument_node="">
</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1337" id="mntl-sc-block_2-0-54"><span data-dcnode-id="1338" instrument_node="">
Critics of Trump saw the Flynn controversy as further evidence of the presidential campaign's ties to Russia and its possible collusion with Russia to damage Clinton.
</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1331" id="mntl-sc-block_2-0-55"><span data-dcnode-id="1335" instrument_node="">
</span><strong data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">What Trump Says</span></strong><span data-dcnode-id="1332" instrument_node="">
</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1322" id="mntl-sc-block_2-0-56"><span data-dcnode-id="1329" instrument_node="">
The Trump White House was more concerned about leaks to the news media that about the actual nature of Flynn's conversations with the Russian ambassador. Trump himself reportedly asked Comey to drop his investigation of Flynn, saying, “I hope you can see your way clear to letting this go, to letting Flynn go,” according to </span><em data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">The&nbsp;New York&nbsp;Times</span></em><span data-dcnode-id="1326" instrument_node="">.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1324" data-id="#citation-14"><span data-dcnode-id="1325" instrument_node="">27</span></span><span data-dcnode-id="1323" instrument_node="">﻿
</span></p><span data-dcnode-id="1321" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1249" id="mntl-sc-block_2-0-60"><span data-dcnode-id="1253" instrument_node="">
Trump, a </span><a data-component="link" data-dcnode-id="1251" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/donald-trump-profile-4024748" rel="noopener noreferrer"><span data-dcnode-id="1252" instrument_node="">wealthy businessman who operates country clubs and resorts</span></a><span data-dcnode-id="1250" instrument_node="">, reportedly profited from at least 10 foreign governments during his time as president. The include the Kuwaiti Embassy, which booked the Trump hotel for an event; a&nbsp;public-relations firm hired by Saudi Arabia that spent&nbsp;$270,000 on rooms, meals and parking at Trump's hotel in Washington; and Turkey, which used the same facility for a government-sponsored event.
</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1243" id="mntl-sc-block_2-0-61"><span data-dcnode-id="1247" instrument_node="">
Throughout his presidency, Trump also spent a large amount of time at resorts and golf courses owned by his own company - meaning that the U.S. government and taxpayers have been paying for presidential trips and security to properties that directly profit Trump himself. One estimate had the cost at over $142 million as of November 2020.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1245" data-id="#citation-16"><span data-dcnode-id="1246" instrument_node="">28</span></span><span data-dcnode-id="1244" instrument_node="">﻿
</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1237" id="mntl-sc-block_2-0-62"><span data-dcnode-id="1241" instrument_node="">
</span><strong data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">What the Scandal Is About</span></strong><span data-dcnode-id="1238" instrument_node="">
</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1234" id="mntl-sc-block_2-0-63"><span data-dcnode-id="1235" instrument_node="">
Critics argue Trump's acceptance of payments from foreign governments violates the Foreign Emoluments Clause, which bans elected officials in the United States from accepting gifts or other valuables from foreign leaders. The Constitution states: "No Person holding any Office of Profit or Trust under them, shall,&nbsp;without the Consent of the Congress, accept of any present, Emolument, Office, or Title, of any kind whatever, from any King, Prince, or foreign State."
</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1228" id="mntl-sc-block_2-0-64"><span data-dcnode-id="1232" instrument_node="">
</span><strong data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">What Critics Say</span></strong><span data-dcnode-id="1229" instrument_node="">
</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1219" id="mntl-sc-block_2-0-65"><span data-dcnode-id="1226" instrument_node="">
Dozens of lawmakers and several entities have filed suit against Trump alleging violations of the clause, including the&nbsp;Citizens for Responsibility and Ethics in Washington.&nbsp;“Trump is the framers’ worst-case scenario — a president who would seize office and attempt to exploit his position for personal financial gain with every governmental entity imaginable, across the United States or around the world,” Norman Eisen, the chief White House ethics lawyer for Obama, told </span><em data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">The Washington Post</span></em><span data-dcnode-id="1223" instrument_node="">.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1221" data-id="#citation-17"><span data-dcnode-id="1222" instrument_node="">29</span></span><span data-dcnode-id="1220" instrument_node="">﻿
</span></p><span data-dcnode-id="1218" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1213" id="mntl-sc-block_2-0-66"><span data-dcnode-id="1217" instrument_node="">
</span><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">What Trump Says</span></strong><span data-dcnode-id="1214" instrument_node="">
</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1210" id="mntl-sc-block_2-0-67"><span data-dcnode-id="1211" instrument_node="">
Trump has dismissed such claims as being "without merit" and has remained defiant about maintaining ownership of his vast network of real estate and business holdings.
</span></p><span data-dcnode-id="1209" instrument_node="">
</span></div><span data-dcnode-id="1207" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1179" id="mntl-sc-block_2-0-69"><span data-dcnode-id="1183" instrument_node="">
Trump has no regrets about any of his tweets or even using Twitter to communicate with his supporters.&nbsp;“I don’t regret anything, because there is nothing you can do about it. You know if you issue hundreds of tweets, and every once in a while you have a clinker, that’s not so bad,” Trump told a </span><em data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Financial Times</span></em><span data-dcnode-id="1180" instrument_node=""> interviewer.&nbsp;“Without the tweets, I wouldn’t be here . . . I have over 100 million followers between Facebook, Twitter, Instagram. Over 100 million. I don’t have to go to the fake media.”
</span></p><span data-dcnode-id="1178" instrument_node="">
</span><figure class="comp mntl-sc-block reference-sc-block-image mntl-sc-block-image figure-landscape figure-high-res" data-dcnode-id="1140" id="mntl-sc-block_2-0-70"><span data-dcnode-id="1177" instrument_node="">

</span><span class="figure-article-caption-text" data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">One of President Donald Trump's tweets is on display in a museum.</span></span><span data-dcnode-id="1146" instrument_node="">
</span><span class="figure-article-caption-owner" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Drew Angerer/Getty Images News</span></span><span data-dcnode-id="1143" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1131" id="mntl-sc-block_2-0-71"><span data-dcnode-id="1138" instrument_node="">
The most powerful elected official in the universe&nbsp;has an army of </span><a data-component="link" data-dcnode-id="1136" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/donald-trumps-press-secretaries-4125913" rel="noopener noreferrer"><span data-dcnode-id="1137" instrument_node="">paid spokesmen, communications staffers and public-relations pros</span></a><span data-dcnode-id="1135" instrument_node=""> working to craft the messages coming from the White House. So how did Donald Trump choose to talk to the American people? Via the </span><a data-component="link" data-dcnode-id="1133" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thoughtco.com/how-social-media-has-changed-politics-3367534" rel="noopener noreferrer"><span data-dcnode-id="1134" instrument_node="">social-media network Twitter</span></a><span data-dcnode-id="1132" instrument_node="">, without a filter and often in the wee hours of the night. He's referred to himself as&nbsp;"the Ernest Hemingway of 140 characters." Trump was not the first president to use Twitter; the microblogging service came online when Barack Obama was president. Obama used Twitter, but his tweets were carefully vetted before being broadcast to millions of people.
</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1125" id="mntl-sc-block_2-0-72"><span data-dcnode-id="1129" instrument_node="">
</span><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">What the Scandal Is About</span></strong><span data-dcnode-id="1126" instrument_node="">
</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1122" id="mntl-sc-block_2-0-73"><span data-dcnode-id="1123" instrument_node="">
There is no filter between the thoughts, ideas and emotions held by Trump and the expression of them on Twitter. Trump has used tweets to mock foreign leaders in times of crisis,&nbsp;hammer his political foes in Congress and even accuse Obama of bugging his office in Trump Tower. "Terrible! Just found out that Obama had my 'wires tapped' in Trump Tower just before the victory. Nothing found. This is McCarthyism!" Trump tweeted. The claim was unsubstantiated and quickly debunked. Trump also used Twitter to attack London Mayor Sadiq Khan shortly after a terrorist attack in 2017. "At least 7 dead and 48 wounded in terror attack and Mayor of London says there is 'no reason to be alarmed!'" Trump tweeted.
</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1116" id="mntl-sc-block_2-0-74"><span data-dcnode-id="1120" instrument_node="">
Trump's use of Twitter also was central to the controversy over the January 6 Capitol riot, where he used the platform to urge his supporters on prior to the insurrection. Hours after the initial violence, he used Twitter to post a video message in which he repeated his lies about election fraud, told his followers "we love you, you’re very special," and, shortly after, tweeted, "These are the things and events that happen when a sacred landslide election victory is so unceremoniously &amp; viciously stripped away from great patriots who have been badly &amp; unfairly treated for so long.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1118" data-id="#citation-18"><span data-dcnode-id="1119" instrument_node="">30</span></span><span data-dcnode-id="1117" instrument_node="">﻿" As a result, Twitter first suspended his account, then banned it permanently.
</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1110" id="mntl-sc-block_2-0-75"><span data-dcnode-id="1114" instrument_node="">
</span><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">What Critics Say</span></strong><span data-dcnode-id="1111" instrument_node="">
</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1101" id="mntl-sc-block_2-0-76"><span data-dcnode-id="1108" instrument_node="">
The idea that Trump, whose bombastic and brash manner of speaking is off-putting in diplomatic settings, is posting what amount to be official statements without being advised by White House staff or policy experts worries many observers. “The idea he would tweet without anyone reviewing it or thinking about what he’s saying is frankly pretty frightening,” Larry Noble, general counsel of the Campaign Legal Center in Washington, D.C., told </span><em data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Wired</span></em><span data-dcnode-id="1105" instrument_node="">.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1103" data-id="#citation-19"><span data-dcnode-id="1104" instrument_node="">31</span></span><span data-dcnode-id="1102" instrument_node="">﻿
</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1095" id="mntl-sc-block_2-0-77"><span data-dcnode-id="1099" instrument_node="">
</span><strong data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">What Trump Says</span></strong><span data-dcnode-id="1096" instrument_node="">
</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1086" id="mntl-sc-block_2-0-78"><span data-dcnode-id="1093" instrument_node="">
Trump has no regrets about any of his tweets or even using Twitter to communicate with his supporters.&nbsp;“I don’t regret anything, because there is nothing you can do about it. You know if you issue hundreds of tweets, and every once in a while you have a clinker, that’s not so bad,” Trump told a </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Financial Times</span></em><span data-dcnode-id="1090" instrument_node=""> interviewer.&nbsp;“Without the tweets, I wouldn’t be here . . . I have over 100 million followers between Facebook, Twitter, Instagram. Over 100 million. I don’t have to go to the fake media.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1088" data-id="#citation-20"><span data-dcnode-id="1089" instrument_node="">32</span></span><span data-dcnode-id="1087" instrument_node="">﻿”
</span></p><span data-dcnode-id="1085" instrument_node="">
</span></div><span data-dcnode-id="1083" instrument_node="">
