25. Marc-André Argentino, </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theconversation.com/the-church-of-qanon-will-conspiracy-theories-form-the-basis-of-a-new-religious-movement-137859" target="_blank"><span data-dcnode-id="874" instrument_node="">“The Church of QAnon: Will Conspiracy Theories Form the Basis of a New Religious Movement?,” TheConversation.com</span></a><span data-dcnode-id="872" instrument_node="">, May 18, 2020 (accessed September 17, 2020).
</span></p><span data-dcnode-id="870" instrument_node="">
</span></div></div></div></div><div class="wrap mcb-wrap mcb-wrap-njc8d4hvc one valign-top clearfix" data-dcnode-id="849" style=""><div class="mcb-wrap-inner" data-dcnode-id="850"><div class="column mcb-column mcb-item-od2k835vf one-sixth column_placeholder" data-dcnode-id="863"><div class="placeholder" data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-xdmctnxvh two-third column_image" data-dcnode-id="851"><div class="image_frame image_item no_link scale-with-grid aligncenter no_border" data-dcnode-id="853"><div class="image_wrapper" data-dcnode-id="861"><img alt="THUS SPAKE ZARATHUSTRA (PLATE #19) - Of the Preachers of Death (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" class="scale-with-grid" data-dcnode-id="862" height="2037" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evergreenreview.com/wp-content/uploads/2020/10/THUS-SPAKE-ZARATHUSTRA-PLATE-19-Of-the-Preachers-of-Death-Drawing-15.7-W-x-22.4-H-in-2100-X-2970-pixels-%25C2%25A9-2015-C.-Panzner-all-rights-reservedsm.jpg&amp;raw" title="THUS SPAKE ZARATHUSTRA (PLATE #19) - Of the Preachers of Death (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" width="1440"></div><p class="wp-caption-text" data-dcnode-id="854"><span data-dcnode-id="860" instrument_node="">Christopher Panzner - Plate #19 </span><em data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Of the Preachers of Death</span></em><span data-dcnode-id="857" instrument_node=""> (2015)</span><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node="">Drawing, 15.7 x 22.4in</span></p></div><span data-dcnode-id="852" instrument_node="">
</span></div></div></div><div class="wrap mcb-wrap mcb-wrap-7jrw17hlm one valign-top clearfix" data-dcnode-id="774" style=""><div class="mcb-wrap-inner" data-dcnode-id="775"><div class="column mcb-column mcb-item-j7odvcdo2 one-sixth column_placeholder" data-dcnode-id="846"><div class="placeholder" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-9x1wwt098 two-third column_column" data-dcnode-id="776"><div class="column_attr clearfix" data-dcnode-id="777" style=""><p data-dcnode-id="832"><span data-dcnode-id="845" instrument_node="">QAnon is the most fascinating sociological experiment to be conducted on the American population in many years. Perhaps it’s not the </span><em data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">only</span></em><span data-dcnode-id="842" instrument_node=""> such experiment, but it might be the most impactful. Since the early 1990s, a large segment of libertarians—the same kind who hung on the paranoid ravings of such militia leaders as the aforementioned Mark Koernke before he was imprisoned for assaulting police officers—have feared an imminent fascist coup in the United States. For years, these people had been raising the alarm bells about “concentration camps” being secretly built all over America. Within only a few weeks, these same libertarians spun around and embraced the possibility of martial law merely because Q (</span><em data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">an anonymous poster on the internet</span></em><span data-dcnode-id="839" instrument_node="">) declared that Trump would use martial law as a tool to destroy the dangerous cult of liberal Democrats, Satanists, and child molesters who are secretly in control of this country. Within a short period of time, their entire worldview had been altered. These people couldn’t </span><em data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">wait</span></em><span data-dcnode-id="836" instrument_node=""> for the concentration camps to be established because, after all, those dirty stinking </span><em data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Democrats</span></em><span data-dcnode-id="833" instrument_node=""> were going to be filling up them ovens now, boy, not God-loving Christian patriots. 
</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="830" instrument_node="">So what’s the purpose of this social experiment? The purpose is to distract the citizenry from the </span><em data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">real</span></em><span data-dcnode-id="827" instrument_node=""> problems, from the people who are actually controlling this country. 
</span></p><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="824" instrument_node="">Now hold on a second . . . that sounds an awful lot like the “Deep State” model touted by Trump. Is that what you’re talking about? Are you some sort of secret Trump supporter, you son of a bitch? Are you saying the Deep State is </span><em data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">real</span></em><span data-dcnode-id="821" instrument_node="">?
</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="818" instrument_node="">The origins of the term “Deep State” can be traced back to the academic left. Similar to how a private think tank composed of wordsmiths, persuasion engineers, and culture vultures was no doubt hired to construct the QAnon narrative for the purposes of upping Trump’s popularity, the President’s most infamous quips and catchphrases were clearly plundered from previous sources, several of them associated with the radical counterculture or the leftwing. As already noted, the term “fake news” first appeared in William Burroughs’s </span><em data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">The Revised Boy Scout Manual</span></em><span data-dcnode-id="815" instrument_node=""> in the early 1970s (though I highly doubt Trump himself is aware of that fact).
</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="812" instrument_node="">Investigative journalist Jon Rappoport—author of such books as </span><em data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">AIDS, INC.</span></em><span data-dcnode-id="809" instrument_node=""> (1988) and </span><em data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">The Secret Behind Secret Societies</span></em><span data-dcnode-id="806" instrument_node=""> (1998)—named his website “Nomorefakenews” at least </span><em data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">two decades</span></em><span data-dcnode-id="803" instrument_node=""> before Trump’s advisors appropriated the term for their own purposes. In the popular mind, Rappoport’s definition of the phrase has now been grossly distorted from its original intent, which was to critique the hidden agendas of mainstream journalists on both the right </span><em data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">and</span></em><span data-dcnode-id="800" instrument_node=""> the left—and every political persuasion in between. 
</span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="797" instrument_node="">Trump’s advisors appropriated the term “Deep State” from a 1993 book entitled </span><em data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Deep Politics and the Death of JFK</span></em><span data-dcnode-id="794" instrument_node=""> by Peter Dale Scott, an English professor at UC Berkeley. In this highly detailed, well-researched tome, Scott offers a sober analysis of how Kennedy’s assassination undermined American democracy in order to alter US policies in Vietnam (among numerous other imperialistic goals). It seems clear that Scott had to figure out a way to write about complex political machinations for a respectable academic press without ever using the word “conspiracy” in order to avoid advertising the fact that this was, indeed, a book analyzing a vast conspiracy. Instead of “conspiracy theories,” Scott compromised and used “Deep Politics.” Trump’s appropriation of the term renders Scott’s historically important book an anathema for those who would no doubt glance at the cover and assume this Scott fellow must have been a far-rightwing lunatic suffering from the delusion that Ted Cruz’s father had something to do with the assassination of JFK.
</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Does the term “Deep State” accurately reflect how the US government operates? The phrase implies that what we see in everyday Washington, DC politics is little more than a false front, like those fake towns used in old Hollywood westerns in which grocery stores, hotels, and bullet-ridden saloons were really nothing more than a flimsy façade. The true action occurred behind the scenes. Who directed the film? Who wrote it? Who framed the shot? These key players, of course, are never shown on-screen.
</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="788" instrument_node="">This outlook borders on a Gnostic view of reality: that everything our eyes see is a cheap illusion, a Black Iron Prison forged by half-mad angels who sincerely believe they’re gods but—in reality, the real reality—are nothing more than sadistic overlords with a weird addiction to manipulating human lives for fun. Perhaps there’s some value in this model as a metaphor. But is it </span><em data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">literally</span></em><span data-dcnode-id="785" instrument_node=""> true?
</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="782" instrument_node="">In reality—the </span><em data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">real</span></em><span data-dcnode-id="779" instrument_node=""> reality—the “Deep State” so feared by Trump’s followers would be more accurately described as the “Satellite Government.” After all, the word “deep” implies something that’s buried, hidden far out of sight. The Satellite Government is not buried, nor is it hidden out of sight. It’s on display for all to see. But hardly anyone is looking in the right places. 
</span></p></div></div></div></div><div class="wrap mcb-wrap mcb-wrap-p49ldqva4 one valign-top clearfix" data-dcnode-id="757" style=""><div class="mcb-wrap-inner" data-dcnode-id="758"><div class="column mcb-column mcb-item-8w1donl0c one-sixth column_placeholder" data-dcnode-id="771"><div class="placeholder" data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-cj27w8xk4 two-third column_image" data-dcnode-id="759"><div class="image_frame image_item no_link scale-with-grid aligncenter no_border" data-dcnode-id="761"><div class="image_wrapper" data-dcnode-id="769"><img alt="THUS SPAKE ZARATHUSTRA (PLATE #23) - Of Chastity (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" class="scale-with-grid" data-dcnode-id="770" height="2037" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evergreenreview.com/wp-content/uploads/2020/10/THUS-SPAKE-ZARATHUSTRA-PLATE-23-Of-Chastity-Drawing-15.7-W-x-22.4-H-in-2100-X-2970-pixels-%25C2%25A9-2015-C.-Panzner-all-rights-reservedsm.jpg&amp;raw" title="THUS SPAKE ZARATHUSTRA (PLATE #23) - Of Chastity (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" width="1440"></div><p class="wp-caption-text" data-dcnode-id="762"><span data-dcnode-id="768" instrument_node="">Christopher Panzner - Plate #23 </span><em data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Of Chastity</span></em><span data-dcnode-id="765" instrument_node=""> (2015)</span><br data-dcnode-id="764"><span data-dcnode-id="763" instrument_node="">Drawing, 15.7 x 22.4in</span></p></div><span data-dcnode-id="760" instrument_node="">
</span></div></div></div><div class="wrap mcb-wrap mcb-wrap-1kntyjcd3 one valign-top clearfix" data-dcnode-id="716" style=""><div class="mcb-wrap-inner" data-dcnode-id="717"><div class="column mcb-column mcb-item-rp73ekgh7 one-sixth column_placeholder" data-dcnode-id="754"><div class="placeholder" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-cpfccl7u5 two-third column_column" data-dcnode-id="718"><div class="column_attr clearfix" data-dcnode-id="719" style=""><h4 data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">3. The Purloined Letter
</span></h4><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Consider Edgar Allan Poe. In 1841 Poe created the very first literary detective, Monsieur C. Auguste Dupin, in his celebrated short story “The Murders in the Rue Morgue.” Fifty years later this story would inspire Arthur Conan Doyle to create the most famous literary detective of all time, Sherlock Holmes. In 1844 Poe wrote a sequel to “The Murders in the Rue Morgue” entitled “The Purloined Letter” in which Dupin outsmarts the Prefect of the Parisian Police by doing what the Prefect cannot: retrieve a most incriminating letter that has been stolen from a member of the royal family. The entire police department has searched the room of the thief and come up empty-handed. It takes Dupin to point out the obvious to the Prefect: this entire time the envelope they’re searching for has been sitting safely in the letter holder perched on the mantelpiece. Hidden in plain view. Camouflaged by expectations. 
</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">If you’re busy scrounging around for something you’re certain is so “deep” that it’s been completely obscured from view, your eyes will never alight upon the true target of your quest.
</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="744" instrument_node="">When I see throngs of people taking to the streets to protest “fascism,” I often wonder if they know what “fascism” really is. It’s difficult to fight something if you have only a vague understanding of it. According to Benito Mussolini, “Fascism is Corporatism.”</span><sup data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">26</span></sup><span data-dcnode-id="741" instrument_node="">
</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="738" instrument_node="">The Satellite Government is composed of </span><em data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">corporations</span></em><span data-dcnode-id="735" instrument_node=""> that continually orbit the centers of power in Washington, DC as reliably as the Earth revolves around the sun. Taking full advantage of the all-encompassing powers granted to them by the National Security Act of 1947 and the Patriot Act of 2001, these corporations have gradually rolled back all constitutional guarantees, exploited millions of American citizens by using </span><em data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">identities</span></em><span data-dcnode-id="732" instrument_node=""> as sources of income, and have succeeded in building an empire out of the most anti-human, money-making schemes of the past two centuries. In the name of fighting domestic and foreign terrorists, while magnifying paranoia through the branding of innocent citizens and human rights groups as dire threats against national security, these corporations have managed to normalize surveillance and harassment as the Order of the Day. And it’s only going to get worse from here.
</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">How many hours have Trumpist conservatives wasted being consumed by anger at the fictional occultists that have evolved into the main antagonists of the strategically devised QAnon storyline, in truth a massive psychological warfare operation deployed against the American people by a Trump-backed political think tank? These conservatives—many of whom no doubt have a sincere desire to learn the facts about the people in power who have manipulated them for so long—spend their days and nights composing inflammatory Twitter posts about liberal politicians they wish to believe are Satanist pedophiles who must extract precious bodily fluids from kidnapped waifs in order to remain in power. Imagine if these same conservatives redirected their frustration into researching the real people who are exploiting their hearts and minds and souls and imaginations?
</span></p><span data-dcnode-id="727" instrument_node="">
</span><hr data-dcnode-id="726"><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="720" style="font-size:9px;"><span data-dcnode-id="724" instrument_node="">
26. William Haupt III, </span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecentersquare.com/national/op-ed-is-capitalistic-socialism-next/article_b989d884-3e77-11e9-8076-0f21174b7e22.html" target="_blank"><span data-dcnode-id="723" instrument_node="">“Is Capitalistic Socialism Next?,” TheCenterSquare.com</span></a><span data-dcnode-id="721" instrument_node="">, March 4, 2019 (accessed September 15, 2020).</span></p></div></div></div></div><div class="wrap mcb-wrap mcb-wrap-0h08ql3lj one valign-top clearfix" data-dcnode-id="699" style=""><div class="mcb-wrap-inner" data-dcnode-id="700"><div class="column mcb-column mcb-item-nnm3f0zt6 one-sixth column_placeholder" data-dcnode-id="713"><div class="placeholder" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-tc0daoywz two-third column_image" data-dcnode-id="701"><div class="image_frame image_item no_link scale-with-grid aligncenter no_border" data-dcnode-id="703"><div class="image_wrapper" data-dcnode-id="711"><img alt="THUS SPAKE ZARATHUSTRA (PLATE #6) - Zarathustra's Prologue 6 (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" class="scale-with-grid" data-dcnode-id="712" height="2037" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evergreenreview.com/wp-content/uploads/2020/10/THUS-SPAKE-ZARATHUSTRA-PLATE-6-Zarathustras-Prologue-6-Drawing-15.7-W-x-22.4-H-in-2100-X-2970-pixels-%25C2%25A9-2015-C.-Panzner-all-rights-reservedsm.jpg&amp;raw" title="THUS SPAKE ZARATHUSTRA (PLATE #6) - Zarathustra's Prologue 6 (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" width="1440"></div><p class="wp-caption-text" data-dcnode-id="704"><span data-dcnode-id="710" instrument_node="">Christopher Panzner - Plate #6 </span><em data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Zarathustra's Prologue 6</span></em><span data-dcnode-id="707" instrument_node=""> (2015)</span><br data-dcnode-id="706"><span data-dcnode-id="705" instrument_node="">Drawing, 15.7 x 22.4in</span></p></div><span data-dcnode-id="702" instrument_node="">
</span></div></div></div><div class="wrap mcb-wrap mcb-wrap-kwnszsh0w one valign-top clearfix" data-dcnode-id="653" style=""><div class="mcb-wrap-inner" data-dcnode-id="654"><div class="column mcb-column mcb-item-6epfeobep one-sixth column_placeholder" data-dcnode-id="696"><div class="placeholder" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-o0rua21l9 two-third column_column" data-dcnode-id="655"><div class="column_attr clearfix" data-dcnode-id="656" style=""><h4 data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">4. Fascism Is Corporatism
</span></h4><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">Due to the feedback I received after the publication of my book </span><em data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Chameleo</span></em><span data-dcnode-id="689" instrument_node=""> in 2015, I’ve learned a great deal about an extralegal tactic exploited by American intelligence agencies more and more frequently since the passing of the Patriot Act in 2001. These agencies farm out to an array of private corporations the sometimes delicate, sometimes brutal task of surveilling and harassing private citizens deemed to be “suspected terrorists.” Who has the power to label someone a “suspected terrorist”? Why, the people whose jobs depend on a steady stream of potential terrorists, of course. 
</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="686" instrument_node="">During the past six years, I’ve communicated with a diverse range of innocent people who have been victimized by such corporations for years, even decades. According to these victims (survivors, in truth), certain key multinational corporations are at the forefront of these unconstitutional operations, among them DSAC (Domestic Security Alliance Council), EKS Group, InfraGard, ITA International, the MASY Group, Prescient Edge, SAIC (Scientific Applications International Corporation), and Whitney, Bradley &amp; Brown. These companies are global providers of “high impact National Security, intelligence, and private sector capital management solutions”</span><sup data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">27</span></sup><span data-dcnode-id="683" instrument_node="">  and claim to provide their loyal clients with “years of experience in areas surrounding intelligence operations, law enforcement, counterintelligence, human intelligence, information operations, counter-terrorism, force protection, security matters, international diplomacy and foreign area knowledge.”</span><sup data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">28</span></sup><span data-dcnode-id="680" instrument_node="">
</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Who are the top-level managers of these little-known corporations? This is publicly available information. It’s not buried out back somewhere, miles and miles behind a false-front bullet-ridden saloon, along with all that other “Deep State” data. It’s posted on the internet. Sitting right there on the mantelpiece. In the letter holder.
</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">A simple Google search will get you closer to seeing the true faces of those who are manipulating you rather than attempting to scry such “Top Secret” information from the virtual crystal balls and cryptic codes made available to you by QAnon on qalerts.app.
</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Imagine if all those QAnon followers just stopped hanging on Q’s every post and instead banded together and demanded the repeal of the National Security Act and the Patriot Act. Perhaps, then, a real revolution of total disclosure would occur in this country. 
</span></p><span data-dcnode-id="669" instrument_node="">
</span><hr data-dcnode-id="668"><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="657" style="font-size:9px;"><span data-dcnode-id="666" instrument_node="">
27. </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.masygroup.com/about/" target="_blank"><span data-dcnode-id="665" instrument_node="">“Company Profile,” Masygroup.com</span></a><span data-dcnode-id="663" instrument_node=""> (accessed September 18, 2020).</span><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node="">
28. </span><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.corporategray.com/employers/31641/public_profile" target="_blank"><span data-dcnode-id="660" instrument_node="">“About EKS Group, LLC,” CorporateGray.com</span></a><span data-dcnode-id="658" instrument_node=""> (accessed September 18, 2020).
</span></p></div></div></div></div><div class="wrap mcb-wrap mcb-wrap-dhr29n4q8 one valign-top clearfix" data-dcnode-id="636" style=""><div class="mcb-wrap-inner" data-dcnode-id="637"><div class="column mcb-column mcb-item-ztmxzl0yv one-sixth column_placeholder" data-dcnode-id="650"><div class="placeholder" data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-cbmrgnue3 two-third column_image" data-dcnode-id="638"><div class="image_frame image_item no_link scale-with-grid aligncenter no_border" data-dcnode-id="640"><div class="image_wrapper" data-dcnode-id="648"><img alt="THUS SPAKE ZARATHUSTRA (PLATE #88) - The Ass Festival (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" class="scale-with-grid" data-dcnode-id="649" height="2037" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evergreenreview.com/wp-content/uploads/2020/10/THUS-SPAKE-ZARATHUSTRA-PLATE-88-The-Ass-Festival-Drawing-15.7-W-x-22.4-H-in-2100-X-2970-pixels-%25C2%25A9-2015-C.-Panzner-all-rights-reservedsm.jpg&amp;raw" title="THUS SPAKE ZARATHUSTRA (PLATE #88) - The Ass Festival (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" width="1440"></div><p class="wp-caption-text" data-dcnode-id="641"><span data-dcnode-id="647" instrument_node="">Christopher Panzner - Plate #88 </span><em data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">The Ass Festival</span></em><span data-dcnode-id="644" instrument_node=""> (2015)</span><br data-dcnode-id="643"><span data-dcnode-id="642" instrument_node="">Drawing, 15.7 x 22.4in</span></p></div><span data-dcnode-id="639" instrument_node="">
</span></div></div></div><div class="wrap mcb-wrap mcb-wrap-sxmcwvy7e one valign-top clearfix" data-dcnode-id="533" style=""><div class="mcb-wrap-inner" data-dcnode-id="534"><div class="column mcb-column mcb-item-notqwzljj one-sixth column_placeholder" data-dcnode-id="633"><div class="placeholder" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-05hwwxduq two-third column_column" data-dcnode-id="535"><div class="column_attr clearfix" data-dcnode-id="536" style=""><h4 data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">5. President Kek
</span></h4><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="629" instrument_node="">When one speaks to some of Trump’s supporters face to face, it becomes far easier to see the universe through their eyes (at least for a moment). They genuinely feel oppressed by an entrenched Establishment that claims it’s one thing while demonstrating over and over again that it’s something else entirely. If Trump wears his reptilian face on the outside, these people believe the leftwing Establishment wears its reptilian face on the inside. I can’t say they’re wrong. Perhaps some of these people would simply </span><em data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">prefer</span></em><span data-dcnode-id="626" instrument_node=""> to see the true face of the reptile as the beast sinks into fangs into their collective neck. This is an existential choice, one I’m not willing to judge.
</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="623" instrument_node="">Consider this recent example of audacious hypocrisy: As I write this, during the past few weeks, Trump has received criticism from the mainstream media because he allegedly referred to those who died while serving in the military as “losers” and “suckers.”</span><sup data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">29</span></sup><span data-dcnode-id="620" instrument_node="">
</span></p><span data-dcnode-id="618" instrument_node="">
</span><h4 data-dcnode-id="616" style="text-align:center;"><span data-dcnode-id="617" instrument_node="">* * *</span></h4><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="605" style="text-align:center;"><span data-dcnode-id="614" instrument_node="">“I’m shocked, </span><em data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">shocked</span></em><span data-dcnode-id="611" instrument_node="">…!”</span><br data-dcnode-id="610"><span data-dcnode-id="609" instrument_node="">
--Captain Renault (Claude Rains) in Michael Curtiz’s </span><em data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Casablanca</span></em><span data-dcnode-id="606" instrument_node=""> (1942)</span></p><br data-dcnode-id="604"><span data-dcnode-id="603" instrument_node="">
</span><h4 data-dcnode-id="601" style="text-align:center;"><span data-dcnode-id="602" instrument_node="">* * *</span></h4><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Let’s pause a moment and examine reality as it exists, and not as we wish it to exist. 
</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Is there anyone on the planet who thinks there’s a politician in existence who hasn’t thought the same exact thing? Given the unusual amount of politicians’ sons (including George W. Bush) who avoided fighting for their country during wartime, I don’t think it’s outrageous to conclude that almost every politician alive today harbors those same opinions about the “common man.” You’re telling me that a five-star military leader points at a distant hilltop surrounded by explosive mines, shouts, “Charge!,” watches a bunch of clueless teenage boys frog-march into a painful death and/or a long life of limbless paralysis, and doesn’t chuckle about it among the other merchants of doom back at the Lodge meeting on Monday night? 
</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Is it better to have a politician in the White House who buries these sadistic thoughts deep in his psyche, squeezing out crocodile tears for fallen soldier boys every Veterans Day, rather than the one who blurts out his most selfish impulses at random moments during public press conferences? Do the American people want a leader morally superior to President Kek, or do they just want one who will utter the proper platitudes, in the proper tone, at the proper time? 
</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Perhaps the internet didn’t give us peace on Earth, but it did give us telepathy, the ability (via Twitter) to peer into the mind of a living President. This is unprecedented. Never before have the American people had almost unlimited access to the cobwebbed, haunted interior of a powerful politician’s brain. The experience is not pleasant by any means, but I have to admit that I get a little sad when I reflect on all those potential, unborn, pre-aborted Tweets we missed out on during the technological Dark Ages in which such miscreants as Richard Nixon and Ronald Reagan had no access to Twitter whatsoever. Imagine Nixon compulsively spilling the beans, via social media, about CREEP and his professional pistoleros, G. Gordon Liddy and E. Howard Hunt, who were running around the country breaking into the offices of Daniel Ellsberg’s psychiatrist and trying to bump off troublesome investigative journalists like Jack Anderson. Who knows? Perhaps Liddy and Hunt would have gone to prison far sooner than they did (probably not). 
</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="587" instrument_node="">If Trump has perfected the role of a corrupt President, he certainly didn’t invent it. Ronald Reagan, you may recall, went out of his way to kneel at the graves of Nazis in Bitburg, Germany in May of 1985 and proudly stated that the SS troops “were victims, just as surely as the victims in the concentration camps.”</span><sup data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">30</span></sup><span data-dcnode-id="584" instrument_node="">  This proclamation isn’t too far removed from Trump’s infamous statement “There are very fine people on both sides.”</span><sup data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">31</span></sup><span data-dcnode-id="581" instrument_node="">  Trump’s opinion isn’t all that surprising, particularly in light of the fact that his campaign has accepted thousands of dollars in donations from neo-Nazis, as reported by </span><em data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Popular Information</span></em><span data-dcnode-id="578" instrument_node="">.</span><sup data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">32</span></sup><span data-dcnode-id="575" instrument_node="">  Perhaps what should disturb people the most about the Trump administration is that the ugliness we see on constant public display is merely an extension of “Business As Usual.” A sitting President going out of his way to arrange a photo-op to document for posterity the day he prayed at the graves of Nazis is about as blatantly twisted as you can get. Imagine the delicious secrets that would have erupted out of Reagan’s Alzheimer’s-riddled brain during the 1980s if social media had existed. It would have been a quasi-surreal, absurdist miracle to behold. Who knows how much information we would have been able to access? Perhaps we would have learned far more about the Iran-Contra affair than official history is willing to tell us, and Reagan would have been impeached twelve times over.
</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="572" instrument_node="">My liberal friends are constantly astounded by how many misogynist, racist comments can tumble out of Trump’s mouth with no seeming effect on the loyalty of his base. But several of the Trump supporters I’ve spoken to claim that they’re not voting for him because they think he’s a misogynist racist. They insist they’re voting for him simply because Democrats </span><em data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">hate</span></em><span data-dcnode-id="569" instrument_node=""> him so much. They may not even like Trump. They may even hate him . . . but they hate him a lot less than those politicians they perceive to be in power, politicians they believe have betrayed them. If pressed, they embrace the label of being “anti-Establishment.” These followers of Kek have identified, either consciously or subconsciously, what Douglas Rushkoff figured out only recently: in the digital environment, the “Establishment” is not represented by the people who control the US Congress or the person who’s sitting behind the Resolute Desk in the White House.
</span></p><span data-dcnode-id="567" instrument_node="">
</span><hr data-dcnode-id="566"><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="538" style="font-size:9px;"><span data-dcnode-id="564" instrument_node="">

</span></div></div></div><div class="wrap mcb-wrap mcb-wrap-vf3qcbgfg one valign-top clearfix" data-dcnode-id="346" style=""><div class="mcb-wrap-inner" data-dcnode-id="347"><div class="column mcb-column mcb-item-i4nqhuo30 one-sixth column_placeholder" data-dcnode-id="513"><div class="placeholder" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-8x7v7k59z two-third column_column" data-dcnode-id="348"><div class="column_attr clearfix" data-dcnode-id="349" style=""><h4 data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">6. Reclaiming Operation Mindfuck
</span></h4><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="509" instrument_node="">A frequent correspondent recently sent me a link to a YouTube clip that purports to be an interview with a man who, under duress, is forced to perform surveillance and harassment operations for a private corporation. What my readers will find most fascinating about this exchange is that certain statements made by the interviewee seem to confirm various speculations laid out in the pages of my book </span><em data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Chameleo</span></em><span data-dcnode-id="506" instrument_node="">. 
</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="503" instrument_node="">A choice quote from said gentleman: “When they abolished slavery, they formed a new approach to slavery. They pick on the poor in order for certain businesses to thrive financially, and as the economy gets worse, then the need [grows] for more and more people to be manipulated into breaking the law and doing things that will help bring money into the prisons.”</span><sup data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">33</span></sup><span data-dcnode-id="500" instrument_node="">  In this regard, it might be relevant to point out that private prison stocks shot through the stratosphere only days after Trump’s election to the presidency. On November 9, 2016, Tracy Alloway and Lily Katz published an article in </span><em data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Bloomberg</span></em><span data-dcnode-id="497" instrument_node=""> entitled “Private Prison Stocks Are Surging After Trump's Win”:
</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493" style="padding:0 40px;"><span data-dcnode-id="494" instrument_node="">Two companies that operate detention facilities in the US are breaking out.
</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490" style="padding:0 40px;"><span data-dcnode-id="491" instrument_node="">Donald Trump's victory in the presidential elections helped shares of Corrections 
</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487" style="padding:0 40px;"><span data-dcnode-id="488" instrument_node="">Corp. rise as much as 60 percent before paring their surge to 34 percent by 10:14 AM in New York, while GEO Group Inc. was trading 18 percent higher by the same time. 
</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484" style="padding:0 40px;"><span data-dcnode-id="485" instrument_node="">Those moves mean the stocks have recouped some of the losses they've registered since August, when the Department of Justice said it would start phasing out privately run jails. Analysts say President Trump would be likely to reverse that policy, and see an added windfall to the companies stemming from the difficulty of implementing his deportation agenda.
</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="478" style="padding:0 40px;"><span data-dcnode-id="482" instrument_node="">“Private prisons would likely be a clear winner under Trump, as his administration will likely rescind the DOJ's contract phase-out and ICE capacity to house detainees will come under further stress,” analysts at Height Securities LLC wrote in a note published this morning, referring to the Immigration and Customs Enforcement body by its acronym. Mass deportation of illegal immigrants would be likely to run into legal obstacles, “further necessitating a sizable contract detention population,” the analysts said.</span><sup data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">34</span></sup><span data-dcnode-id="479" instrument_node="">
</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="476" instrument_node="">In Rita Nazareth, Anna-Louise Jackson, and Eliza Ronalds-Hannon's November 9, 2016 </span><em data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Bloomberg</span></em><span data-dcnode-id="473" instrument_node=""> article entitled “US Stocks Rise, Treasuries Fall as Trump Win Spurs Growth Bets,” the authors identify a list of “WINNERS” (economically speaking) in the wake of Trump’s election:	
</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469" style="padding:0 40px;"><span data-dcnode-id="470" instrument_node="">BANKS: rallied as Trump has vowed to reduce regulation.
</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466" style="padding:0 40px;"><span data-dcnode-id="467" instrument_node="">DRUGMAKERS: surged as Democratic threats of price controls are no longer a concern with Republicans retaining both houses of Congress.
</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463" style="padding:0 40px;"><span data-dcnode-id="464" instrument_node="">DEFENSE &amp; INFRASTRUCTURE: Lockheed Martin Corp. and Caterpillar Inc. climbed on Trump’s pledge to boost spending in both industries.
</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="460" style="padding:0 40px;"><span data-dcnode-id="461" instrument_node="">PRISON OPERATORS: Corrections Corp. soared on speculation the new administration will rescind a government contract phase-out. 
</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="458" instrument_node="">	Ironically, Trump was able to tap into an extreme “anti-government” sentiment burning beneath the surface of American psychology partly because of the very </span><em data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">real</span></em><span data-dcnode-id="455" instrument_node=""> conspiracies I’ve written about in such books as </span><em data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Chameleo</span></em><span data-dcnode-id="452" instrument_node=""> and </span><em data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Cryptoscatology</span></em><span data-dcnode-id="449" instrument_node="">. He continues to appeal to this anti-government mentality, but as always his words amount to nothing more than hollow platitudes. It should be obvious to anyone that his policies are not “anti-government.” As recently as December of 2018, Trump hinted that the Pentagon’s budget needed to be severely limited,  but when it came time to announce that budget he ended up giving the Pentagon five percent </span><em data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">more</span></em><span data-dcnode-id="446" instrument_node=""> money than they had requested in the first place.  
</span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="443" instrument_node="">Trump’s presence in the White House serves as the perfect distraction from the forces that are actually killing us. He’s a giant, blustering voodoo doll of a puppet that barfs out hatred and fear on command, a hypnotic green goo so vulgar—and so captivating as a result—that it occupies the fickle and unsophisticated attention of the masses while their fellow Americans remain trapped in prisons made of unseen bars . . . all right in front of the blank-eyed faces, the rage-fueled minds of the citizenry, conned like marks on a street corner staring in wonder and anger as the Idiot-Savant-Magician in front of them pulls off the greatest and most simplistic illusions in history with little more than misspelled tweets and sensationalistic bon-mots specifically constructed to bypass one’s capacity to </span><em data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">think</span></em><span data-dcnode-id="440" instrument_node="">.
</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="437" instrument_node="">As the opposition wastes their time attempting to combat every single stupid one-liner that emerges from the White House, the most horrendous criminals of all continue to slip right on by. In sight of cameras. In sight of reporters. In sight of everyone. Invisible . . . but only to those who refuse to </span><em data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">see</span></em><span data-dcnode-id="434" instrument_node="">.
</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Up till now, Operation Mindfuck appears to have been a tremendous success. But the situation doesn’t have to remain that way.
</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="428" instrument_node="">Far more useful than dreaming about removing the President from office through impeachment would have been a genuine effort to reverse the laws that have made this “new approach to slavery” possible in the first place. Back in 1994, in the last chapter of his revised edition of </span><em data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Operation Mind Control</span></em><span data-dcnode-id="425" instrument_node="">, my friend and colleague Walter Bowart wrote:
</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="415" style="padding:0 40px;"><span data-dcnode-id="422" instrument_node="">Whatever the motive for the creation of the National Security State, it was the beginning of the end of our free society . . . The Bill of Rights says freedom of speech is one of our inalienable rights. But as an ordinary citizen living in the National Security State you don’t </span><em data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">know</span></em><span data-dcnode-id="419" instrument_node=""> anything truly relevant to talk about. If you’re being kept in the informational dark, you can’t talk about the future. Keeping you secretly in the dark about vital information impairs your thinking. And if your thinking is impaired, your speaking is impaired. That means your freedom of speech </span><em data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">is</span></em><span data-dcnode-id="416" instrument_node=""> impaired.
</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412" style="padding:0 40px;"><span data-dcnode-id="413" instrument_node="">Remember Thomas Jefferson’s remark at the beginning of this book: “ . . . there is no safe depository of the ultimate powers of society but the people themselves, and if we think them not enlightened enough to exercise their control with a wholesome discretion, the remedy is not to take it from them, but to inform their discretion by education.” The practices of a national security state preclude that. The control has been taken from us. The democratic processes of government today must be just for show—a feeble attempt to keep the public order.
</span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="409" style="padding:0 40px;"><span data-dcnode-id="410" instrument_node="">That’s when a simple thought began to form in my mind. My parents’ generation wanted to drink without sneaking around so they repealed the Volstead Act which prohibited the consumption of alcohol. It ought to be easy. This generation ought to be wise enough to repeal the National Security Act which prohibits freedom of information, therefore freedom of thought—and therefore freedom of speech. Since the founding fathers never anticipated the invention of technologies that would intrude themselves into a person’s private thoughts, even take over and drive his dreams, should we consider adding another amendment to the Constitution which guarantees freedom of thought? One would like to believe that, once the legal debate concluded and all the testimony about the role of language (speech) in thought processes had been established, the Supreme Court would agree that the right of free speech was based upon the presumption of free thought. But there needs to be debate about it now, so that the invisible and uninvited deliberate influences upon the human mind will be mandated illegal by the courts  . . .
</span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="406" style="padding:0 40px;"><span data-dcnode-id="407" instrument_node="">It’s up to us to read the books on the National Security Act. Learn the lingo, then, armed with the facts, start calling for the repeal of it. At this time it would appear to be unthinkable. The National Security State would appear to be a given, something taken for granted like the air we breathe. But try telling people you’re working to repeal it and watch them want to join you . . .
</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403" style="padding:0 40px;"><span data-dcnode-id="404" instrument_node="">We can all at once repeal the National Security Act, and all the secret agencies under it which violate our Constitutional rights. Why tell the truth one declassified document at a time, or thirty-three million declassified documents at a time? Why not do it all at once by abolishing the National Security Act?
</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="397" style="padding:0 40px;"><span data-dcnode-id="401" instrument_node="">The National Security Act has taken the truth away. We are, in fact, living in a state of Martial Law, a state of National Emergency. They call it national security. Where’s the security in it? Without freedom, without civil rights, what kind of security can a people have?</span><sup data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">38</span></sup><span data-dcnode-id="398" instrument_node="">
</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">	When Bowart wrote those words, he couldn’t have known that we were only seven years away from the devastating effects of 9/11 and the passing of the Patriot Act. He couldn’t have known that he was only thirteen years away from his own death (Bowart passed away from colon cancer on December 18, 2007). Nonetheless, even knowing the Phantom Carriage would be coming for him, I don’t think he would have altered his challenging, provocative words in any way. If he were alive today, Bowart would no doubt be adamant about the repeal of the Patriot Act, something that should have occurred during the eight years of Barack Obama’s presidency (but, of course, never did). Because the true power lies not in the White House, but in the will of the people to influence those who inhabit the White House.
</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="392" instrument_node="">	The repeal of the National Security Act and the Patriot Act can and will happen . . . </span><em data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">if</span></em><span data-dcnode-id="389" instrument_node=""> the people wake up from their collective dream and realize what’s really important, where the real fight lies. Abolishing the National Security Act and the Patriot Act should be the first goals on the agenda of any progressive who wishes to make a real difference in how the United States operates on a day-to-day basis. Once you unlock the door to the National Security State, you also unlock the door to the future. As Bowart says, it’s impossible to engage in genuine freedom of thought if all the most cutting-edge discoveries and advancements have been systemically withheld from the common person. Outside the hermetically sealed, solipsistic universe of the military-industrial-entertainment-complex, the common person is always a generation or more behind the times.  
</span></p><span data-dcnode-id="387" instrument_node="">
</span><hr data-dcnode-id="386"><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="351" style="font-size:9px;"><span data-dcnode-id="384" instrument_node="">

</span></p><span data-dcnode-id="350" instrument_node="">
</span></div></div></div></div><div class="wrap mcb-wrap mcb-wrap-2qoye4riw one valign-top clearfix" data-dcnode-id="329" style=""><div class="mcb-wrap-inner" data-dcnode-id="330"><div class="column mcb-column mcb-item-435kgmfbm one-sixth column_placeholder" data-dcnode-id="343"><div class="placeholder" data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-h9mije3c7 two-third column_image" data-dcnode-id="331"><div class="image_frame image_item no_link scale-with-grid aligncenter no_border" data-dcnode-id="333"><div class="image_wrapper" data-dcnode-id="341"><img alt="THUS SPAKE ZARATHUSTRA (PLATE #90) - The Sign (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" class="scale-with-grid" data-dcnode-id="342" height="2037" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evergreenreview.com/wp-content/uploads/2020/10/THUS-SPAKE-ZARATHUSTRA-PLATE-90-The-Sign-Drawing-15.7-W-x-22.4-H-in-2100-X-2970-pixels-%25C2%25A9-2015-C.-Panzner-all-rights-reservedsm.jpg&amp;raw" title="THUS SPAKE ZARATHUSTRA (PLATE #90) - The Sign (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" width="1440"></div><p class="wp-caption-text" data-dcnode-id="334"><span data-dcnode-id="340" instrument_node="">Christopher Panzner - Plate #90 </span><em data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">The Sign</span></em><span data-dcnode-id="337" instrument_node=""> (2015)</span><br data-dcnode-id="336"><span data-dcnode-id="335" instrument_node="">Drawing, 15.7 x 22.4in</span></p></div><span data-dcnode-id="332" instrument_node="">
</span></div></div></div><div class="wrap mcb-wrap mcb-wrap-7rbpq7ofv one valign-top clearfix" data-dcnode-id="279" style=""><div class="mcb-wrap-inner" data-dcnode-id="280"><div class="column mcb-column mcb-item-3buhs00fg one-sixth column_placeholder" data-dcnode-id="326"><div class="placeholder" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-j6mk8nwkw two-third column_column" data-dcnode-id="281"><div class="column_attr clearfix" data-dcnode-id="282" style=""><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">There’s still time to reclaim Operation Mindfuck. We reclaim it by shunting it aside. Who needs tricks and pranks anymore? We need to take advantage of laws that already exist to rip the tattered and yellowed National Security Blanket from the cold, arthritic, militaristic fists of those in power. Then we boot the poor bastards out into the cold, with all the other obsolete spies and politicians and persuasion engineers, and let them fend for themselves in this “shithole country.”
</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Don’t allow yourself to be hypnotized by the green goo.
</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Simply keep your eyes focused on the dirty secret sitting out in the open on a mantelpiece constructed by Edgar Allan Poe 176 years ago.
</span></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315" style="padding:0 40px;"><span data-dcnode-id="316" instrument_node="">The autumn months are never a calm time in America. Back to Work, Back to Football Practice, etc. . . . Autumn is a very Traditional period, a time of strong Rituals and the celebrating of strange annual holidays like Halloween and Satanism and the fateful Harvest Moon, which can have ominous implications for some people. 
</span></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="312" style="padding:0 40px;"><span data-dcnode-id="313" instrument_node="">Autumn is always a time of Fear and Greed and Hoarding for the winter coming on. Debt collectors are active on old people and fleece the weak and helpless. They want to lay in enough cash to weather the known horrors of January and February. There is always a rash of kidnapping and abductions of schoolchildren in the football months. Preteens of both sexes are traditionally seized and grabbed off the streets by gangs of organized perverts who traditionally give them as Christmas gifts to each other to be personal sex slaves and playthings. 
</span></p><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="309" style="padding:0 40px;"><span data-dcnode-id="310" instrument_node="">Most of these things are obviously Wrong and Evil and Ugly—but at least they are Traditional. They will happen. Your driveway will ice over, your furnace will blow up, and you will be rammed in traffic by an uninsured driver in a stolen car. 
</span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306" style="padding:0 40px;"><span data-dcnode-id="307" instrument_node="">But what the hell? That's why we have Insurance, eh? And the Inevitability of these nightmares is what makes them so reassuring. Life will go on, for good or ill. But some things are forever, right? The structure may be a little Crooked, but the foundations are still strong and unshakable. 
</span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303" style="padding:0 40px;"><span data-dcnode-id="304" instrument_node="">Ho ho. Think again, buster. Look around you. There is an eerie sense of Panic in the air, a silent Fear and uncertainty that comes with once-reliable faiths and truths and solid Institutions that are no longer safe to believe in . . . There is a Presidential Election, right on schedule, but somehow there is no President. A new Congress is elected, like always, but somehow there is no real Congress at all—not as we knew it, anyway, and whatever passes for Congress will be as helpless and weak as whoever has to pass for the “New President.” 
</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="297" style="padding:0 40px; text-align:center;"><span data-dcnode-id="301" instrument_node="">—Hunter S. Thompson, </span><em data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Hey Rube: Blood Sport, the Bush Doctrine, and the Downward Spiral of Dumbness</span></em><span data-dcnode-id="298" instrument_node="">, 2004
</span></p><span data-dcnode-id="296" instrument_node="">
</span><h4 data-dcnode-id="294" style="text-align:center;"><span data-dcnode-id="295" instrument_node="">END
</span></h4><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="290" style="text-align:center;"><em data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Special thanks to Eric Blair and Randy Koppang for their valuable research assistance.
</span></em></p><span data-dcnode-id="289" instrument_node="">
</span><hr data-dcnode-id="288"><span data-dcnode-id="287" instrument_node="">
</span><p data-dcnode-id="284"><em data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Christopher Panzner's illustrations for Friedrich Nietzsche’s masterpiece, “Thus Spake Zarathustra,” are a mash-up of French illustrator Gustave Doré’s collected works. The idea was to imagine how Doré would have illustrated “Zarathustra” had he lived long enough (the work was published shortly after Doré died). The illustrations were done in ink to resemble engravings. There are 103 illustrations in all, corresponding to the approximately 90 chapters of the work (as well as title page, frontispiece, chapters, etc.).</span></em></p><span data-dcnode-id="283" instrument_node="">
