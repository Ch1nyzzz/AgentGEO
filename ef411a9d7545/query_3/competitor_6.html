</span><div class="intro-inner" data-dcnode-id="1755" style=""><span data-dcnode-id="1761" instrument_node="">
</span><h1 class="intro-title" data-dcnode-id="1757"><span data-dcnode-id="1760" instrument_node="">Donald Trump’s </span><br data-dcnode-id="1759"><span data-dcnode-id="1758" instrument_node="">Operation Mindfuck</span></h1><span data-dcnode-id="1756" instrument_node="">
</span></div><span data-dcnode-id="1754" instrument_node="">

</span><div class="content_wrapper clearfix" data-dcnode-id="239"><span data-dcnode-id="1744" instrument_node="">
</span><div class="sections_group" data-dcnode-id="241"><span data-dcnode-id="1743" instrument_node="">
</span><div class="no-title no-share post-7353 portfolio type-portfolio status-publish has-post-thumbnail hentry portfolio-types-robert-guffey" data-dcnode-id="243" id="portfolio-item-7353"><span data-dcnode-id="1742" instrument_node="">
</span><div class="entry-content" data-dcnode-id="260" itemprop="mainContentOfPage"><span data-dcnode-id="1741" instrument_node="">
</span><div class="section mcb-section mcb-section-e9e0cdf87" data-dcnode-id="1494" style="padding-top:70px;padding-bottom:20px"><div class="section_wrapper mcb-section-inner" data-dcnode-id="1495"><div class="wrap mcb-wrap mcb-wrap-fdfbcf30b one valign-top clearfix" data-dcnode-id="1726" style=""><div class="mcb-wrap-inner" data-dcnode-id="1727"><div class="column mcb-column mcb-item-4a9e21ccd one-sixth column_placeholder" data-dcnode-id="1738"><div class="placeholder" data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-af13f03c8 two-third column_column" data-dcnode-id="1728"><div class="column_attr clearfix" data-dcnode-id="1729" style=""><h3 data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Robert Guffey</span></h3><span data-dcnode-id="1735" instrument_node="">
</span><p class="big" data-dcnode-id="1731"><span data-dcnode-id="1734" instrument_node="">Art by Christopher Panzner</span><br data-dcnode-id="1733"><span data-dcnode-id="1732" instrument_node="">
Images from "Thus Spake Zarathustra" series.</span></p><span data-dcnode-id="1730" instrument_node="">
</span></div></div></div></div><div class="wrap mcb-wrap mcb-wrap-bj4v7th6k one valign-top clearfix" data-dcnode-id="1656" style=""><div class="mcb-wrap-inner" data-dcnode-id="1657"><div class="column mcb-column mcb-item-fv7via7e6 one-sixth column_placeholder" data-dcnode-id="1723"><div class="placeholder" data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-k0tzsp8r5 two-third column_column" data-dcnode-id="1658"><div class="column_attr clearfix" data-dcnode-id="1659" style=""><h4 data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">1.	Hijacking the Counterculture</span></h4><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">	In 1970, Hunter S. Thompson ran for sheriff of Pitkin County, Colorado on what he called “the Freak Power” ticket. The idea was to succeed based almost solely on the votes of citizens so disenfranchised that they had never bothered participating in any past election. In the end, Thompson lost by only thirty-one votes. 
</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1716" instrument_node="">	In the October 1, 1970 issue of </span><em data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Rolling Stone</span></em><span data-dcnode-id="1713" instrument_node="">, Thompson published an article about his campaign entitled “Freak Power in the Rockies” in which he wrote:
</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1703" style="padding:0 40px;"><span data-dcnode-id="1710" instrument_node="">At the time it seemed necessary to come up with a candidate whose Strange Tastes and Para-Legal Behavior were absolutely beyond question . . . a man whose candidacy would torture the outer limits of political gall, whose name would strike fear and shock in the heart of every burgher, and whose massive unsuitability for the job would cause even the most apolitical drug-child in the town’s most degenerate commune to shout, “Yes! I must </span><em data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">vote</span></em><span data-dcnode-id="1707" instrument_node=""> for that man!”</span><sup data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">1</span></sup><span data-dcnode-id="1704" instrument_node="">
</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1701" instrument_node="">	At one point in the article, Thompson discusses the almost irresistible urge for a Freak Power candidate to apply “the Magic Christian concept” to politics. </span><em data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">The Magic Christian</span></em><span data-dcnode-id="1698" instrument_node=""> is the title of Terry Southern’s 1959 novel about an eccentric New York billionaire named Guy Grand who spends most of his life playing elaborate practical jokes on unsuspecting citizens. As long as he can cause chaos, Grand doesn’t care about losing thousands of dollars. Grand’s in it only to fuck with people’s minds, for the pleasure of the game. 
</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Here’s Thompson:
</span></p><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1688" style="padding:0 40px;"><span data-dcnode-id="1692" instrument_node="">The possibility of victory can be a heavy millstone around the neck of any political candidate who might prefer, in his heart, to spend his main energies on a series of terrifying, whiplash assaults on everything the voters hold dear. There are harsh echoes of the Magic Christian in this technique: The candidate first creates an impossible psychic maze, then he drags the voters into it and flails them constantly with gibberish and rude shocks. This was Mailer’s technique, and it got him 55,000 votes in a city of 10 million people—but in truth it is more a form of vengeance than electoral politics.</span><sup data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">2</span></sup><span data-dcnode-id="1689" instrument_node="">
</span></p><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1686" instrument_node="">Earlier in the piece, Thompson explicitly states that his strategy was to appeal to “a jangled mix of Left/Crazies and Birchers . . . with no politics at all beyond self-preservation.”</span><sup data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">3</span></sup><span data-dcnode-id="1683" instrument_node="">  He described his base as those outsiders who wanted to “create a town where people could live like human beings, instead of slaves to some bogus sense of Progress that is driving us all mad.”</span><sup data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">4</span></sup><span data-dcnode-id="1680" instrument_node="">  He described the essence of his strategy as “neither opting out of the system, nor working within it . . . but calling its bluff, by using its strength to turn it back on itself . . . and by always assuming that the people in power are not smart.” </span><sup data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">5</span></sup><span data-dcnode-id="1677" instrument_node="">
</span></p><span data-dcnode-id="1675" instrument_node="">
</span><hr data-dcnode-id="1674"><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1660" style="font-size:9px;"><span data-dcnode-id="1672" instrument_node="">
1. Hunter S. Thompson, </span><em data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">The Great Shark Hunt</span></em><span data-dcnode-id="1669" instrument_node=""> (New York: Simon &amp; Schuster, 2003 [1979]), p. 166.</span><br data-dcnode-id="1668"><span data-dcnode-id="1667" instrument_node="">
2. Ibid. p. 162.</span><br data-dcnode-id="1666"><span data-dcnode-id="1665" instrument_node="">
3. Ibid. p. 157</span><br data-dcnode-id="1664"><span data-dcnode-id="1663" instrument_node="">
4. Ibid. p. 160.</span><br data-dcnode-id="1662"><span data-dcnode-id="1661" instrument_node="">
5. Ibid. p. 163.

</span></p></div></div></div></div><div class="wrap mcb-wrap mcb-wrap-hpw5lh7pn one valign-top clearfix" data-dcnode-id="1639" style=""><div class="mcb-wrap-inner" data-dcnode-id="1640"><div class="column mcb-column mcb-item-vash7u677 one-sixth column_placeholder" data-dcnode-id="1653"><div class="placeholder" data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-2jssbq5ky two-third column_image" data-dcnode-id="1641"><div class="image_frame image_item no_link scale-with-grid aligncenter no_border" data-dcnode-id="1643"><div class="image_wrapper" data-dcnode-id="1651"><img alt="THUS SPAKE ZARATHUSTRA (PLATE #56) - Of the Vision and the Riddle (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" class="scale-with-grid" data-dcnode-id="1652" height="2037" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evergreenreview.com/wp-content/uploads/2020/10/THUS-SPAKE-ZARATHUSTRA-PLATE-56-Of-the-Vision-and-the-Riddle-Drawing-15.7-W-x-22.4-H-in-2100-X-2970-pixels-%25C2%25A9-2015-C.-Panzner-all-rights-reservedsm.jpg&amp;raw" title="THUS SPAKE ZARATHUSTRA (PLATE #56) - Of the Vision and the Riddle (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" width="1440"></div><p class="wp-caption-text" data-dcnode-id="1644"><span data-dcnode-id="1650" instrument_node="">Christopher Panzner - Plate #65 </span><em data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">Of the Vision and the Riddle</span></em><span data-dcnode-id="1647" instrument_node=""> (2015)</span><br data-dcnode-id="1646"><span data-dcnode-id="1645" instrument_node="">Drawing, 15.7 x 22.4in</span></p></div><span data-dcnode-id="1642" instrument_node="">
</span></div></div></div><div class="wrap mcb-wrap mcb-wrap-ob380sfkf one valign-top clearfix" data-dcnode-id="1496" style=""><div class="mcb-wrap-inner" data-dcnode-id="1497"><div class="column mcb-column mcb-item-jr41nyl1d one-sixth column_placeholder" data-dcnode-id="1636"><div class="placeholder" data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-3ds3cgta3 two-third column_column" data-dcnode-id="1498"><div class="column_attr clearfix" data-dcnode-id="1499" style=""><p data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">In 1970, to imagine a situation in which a rightwing candidate would adopt such puckish strategies for his own campaign would have been almost impossible. The entrenched members of the Establishment would never waste their time with such juvenile tactics. What would be the point? Wouldn’t this approach cause such candidates to lose their credibility among their base? What kind of a deranged reprobate would vote for a candidate who appeared to be going out of his or her way to bombard the citizenry “with gibberish and rude shocks”?
</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1632" instrument_node="">Five years later, in their 1975 novel </span><em data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Illuminatus!</span></em><span data-dcnode-id="1629" instrument_node="">, Robert Shea and Robert Anton Wilson introduced the concept of Discordianism to the world of popular culture. Discordianism, according to Wilson, is a religion (or a parody of religion) “based on worship of the Greek goddess of chaos and confusion, Eris, also called Discordia in Latin.”</span><sup data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">6</span></sup><span data-dcnode-id="1626" instrument_node="">  The core concepts of Discordianism had been laid out by Greg Hill and Kerry Thornley in their 1963 book </span><em data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Principia Discordia</span></em><span data-dcnode-id="1623" instrument_node="">. The key concept is that chaos is the underlying principle of the universe. 
</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1620" instrument_node="">Out of this belief grew a uniquely Discordian practice now known as “Operation Mindfuck,” a name given to it by Shea and Wilson in </span><em data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Illuminatus!</span></em><span data-dcnode-id="1617" instrument_node=""> According to Wilson:
</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1607" style="padding:0 40px;"><span data-dcnode-id="1614" instrument_node="">Discordian atheology got more and more complicated as it was worked over and developed by Thornley, Greg Hill, and various others who were drawn into it . . . None of this was </span><em data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">merely</span></em><span data-dcnode-id="1611" instrument_node=""> a parody of religion </span><em data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">per se</span></em><span data-dcnode-id="1608" instrument_node="">. It was an exercise in guerilla ontology . . .  A Marx Brothers version of Zen. Operation Mindfuck, we called it.
</span></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1601" style="padding:0 40px;"><span data-dcnode-id="1605" instrument_node="">(We were all having a lot of fun with Discordianism. None of us were aware, yet, that Operation Mindfuck could get out of hand….)</span><sup data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">7</span></sup><span data-dcnode-id="1602" instrument_node="">
</span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1599" instrument_node="">Operation Mindfuck was essentially a series of nonviolent pranks and hoaxes that might, over time, upend the conservative Establishment. In a November 2013 </span><em data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">New York</span></em><span data-dcnode-id="1596" instrument_node=""> magazine article, reporter Jesse Walker described Operation Mindfuck as:
</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1580" style="padding: 0 40px;"><span data-dcnode-id="1593" instrument_node="">. . . a free-form art project-cum-prank-cum-political protest of the sixties and seventies, designed to sow the culture with paranoia. Through every means available, Wilson explained in a memo laying out the plan, the Mindfuckers intended to “attribute all national calamities, assassinations, or conspiracies” to the Illuminati and other hidden hands. So they planted stories about the Illuminati in the underground press. They slipped mysterious classified ads into the libertarian journal </span><em data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Innovator</span></em><span data-dcnode-id="1590" instrument_node=""> and the New Left newspaper </span><em data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">rogerSPARK</span></em><span data-dcnode-id="1587" instrument_node="">. They cooked up a letter about the Illuminati that Wilson then ran in “The </span><em data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Playboy</span></em><span data-dcnode-id="1584" instrument_node=""> Advisor.”</span><sup data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">8</span></sup><span data-dcnode-id="1581" instrument_node="">
</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1578" instrument_node="">In his 1977 nonfiction book, </span><em data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Cosmic Trigger: Final Secret of the Illuminati</span></em><span data-dcnode-id="1575" instrument_node="">, Wilson elaborates:
</span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1568" style="padding: 0 40px;"><span data-dcnode-id="1572" instrument_node="">[The underground press was] intensely gullible and eager to believe all manner of . . . conspiracy theories, the weirder the better. Most Discordians, at this time, were contributors to underground newspapers all over the country. We began surfacing the Discordian Society, issuing position papers offering nonviolent anarchist techniques to mutate our robot-society [. . .] Along with this we planted numerous stories about the Discordian Society’s aeon-old war against the sinister Illuminati. We accused everybody of being in the Illuminati—Nixon, Johnson, William Buckley, Jr., ourselves, Martian invaders, all the conspiracy buffs, </span><em data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">everybody</span></em><span data-dcnode-id="1569" instrument_node="">.
</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1565" style="padding:0 40px;"><span data-dcnode-id="1566" instrument_node="">We did not regard this as a hoax or prank in the ordinary sense. We still considered it guerilla ontology. 
</span></p><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1559" style="padding:0 40px;"><span data-dcnode-id="1563" instrument_node="">My personal attitude was that if the New Left wanted to live in the particular tunnel-reality of the hard-core paranoid, they had an absolute right to that neurological choice. I saw Discordianism as the Cosmic Giggle Factor, introducing so many alternative paranoias that everybody could pick a favorite, if they were inclined that way. I also hoped that some less gullible souls, overwhelmed by this embarrassment of riches, might see through the whole paranoia game and decide to mutate to a wider, funnier, more hopeful reality-map.</span><sup data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">9</span></sup><span data-dcnode-id="1560" instrument_node="">
</span></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1557" instrument_node="">A similar style of “guerilla ontology” can be found in William S. Burroughs’s </span><em data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">The Revised Boy Scout Manual</span></em><span data-dcnode-id="1554" instrument_node="">, a manifesto for “electronic revolution” written in the early 1970s and distributed throughout the decades in fragments—and in radically different forms. Burroughs’s advice for overthrowing corrupt governments is the original source of Trump’s pet term, “fake news”:
</span></p><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1550" style="padding:0 40px;"><span data-dcnode-id="1551" instrument_node="">You construct fake news broadcasts on video camera . . . And you scramble your fabricated news in with actual news broadcasts.
</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1544" style="padding:0 40px;"><span data-dcnode-id="1548" instrument_node="">You have an advantage which your opposing player does not have. He must conceal his manipulations. You are under no such necessity . . . [Y]ou can advertise the fact that you are writing news in advance and trying to make it happen by techniques which anybody can use. And that makes you NEWS. And a TV personality as well, if you play it right. </span><sup data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">10</span></sup><span data-dcnode-id="1545" instrument_node="">
</span></p><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1542" instrument_node="">The main point of </span><em data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">The Revised Boy Scout Manual</span></em><span data-dcnode-id="1539" instrument_node=""> is not to topple the Establishment through armed revolt but through subtler, more insidious techniques that are almost invisible (particularly to those who are not looking for them). Burroughs encourages his readers to utilize media such as video cameras and ham radio to construct incendiary disinformation in the form of convincing documentaries, i.e., “cutup video tapes” that “scramble the news” with fabricated reports produced with the aid of “a few props and actors.”</span><sup data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">11</span></sup><span data-dcnode-id="1536" instrument_node="">  If deployed skillfully, Burroughs insists these “prerecorded, cutup tapes” can “spread rumors,” “discredit opponents,” and “produce and escalate riots.”</span><sup data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">12</span></sup><span data-dcnode-id="1533" instrument_node="">
</span></p><span data-dcnode-id="1531" instrument_node="">
</span><hr data-dcnode-id="1530"><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1501" style="font-size:9px;"><span data-dcnode-id="1528" instrument_node="">6. Robert Anton Wilson, </span><em data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Cosmic Trigger Volume I: Final Secret of the Illuminati</span></em><span data-dcnode-id="1525" instrument_node=""> (Tempe, AZ: New Falcon, 1997 [1977]), p. 57.</span><br data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node="">
7. Ibid. p. 59.</span><br data-dcnode-id="1522"><span data-dcnode-id="1521" instrument_node="">
8. Jesse Walker, </span><a data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nymag.com/news/features/conspiracy-theories/operation-mindfuck/" target="_blank"><span data-dcnode-id="1520" instrument_node="">“Conspiracy Theory Is a Hoax Gone Right?,” </span><em data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">New York Magazine</span></em></a><span data-dcnode-id="1516" instrument_node="">, November 15, 2013 (accessed September 15, 2020). </span><br data-dcnode-id="1515"><span data-dcnode-id="1514" instrument_node="">
9. Wilson, Cosmic Trigger </span><em data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Volume I: Final Secret of the Illuminati</span></em><span data-dcnode-id="1511" instrument_node="">, p. 63.</span><br data-dcnode-id="1510"><span data-dcnode-id="1509" instrument_node="">
10. William S. Burroughs,</span><em data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node=""> “The Revised Boy Scout Manual”: An Electronic Revolution</span></em><span data-dcnode-id="1506" instrument_node=""> (Columbus, OH: The Ohio State University Press, 2018), pp. 48-49.</span><br data-dcnode-id="1505"><span data-dcnode-id="1504" instrument_node="">
11. Ibid. p. 48.</span><br data-dcnode-id="1503"><span data-dcnode-id="1502" instrument_node="">
12. Ibid. p. 43.
</span></p><span data-dcnode-id="1500" instrument_node="">
</span></div></div></div></div></div></div><div class="section mcb-section mcb-section-lwx95ci4u full-width" data-dcnode-id="1472" data-parallax="3d" style="padding-top:100px;padding-bottom:100px;background-color:#0a0a0a"><img alt="parallax background" class="mfn-parallax" data-dcnode-id="1493" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evergreenreview.com/wp-content/uploads/2020/10/pu11.jpg&amp;raw" style="width: 1920px; height: 1080px;"><div class="section_wrapper mcb-section-inner" data-dcnode-id="1473"><div class="wrap mcb-wrap mcb-wrap-vecvwbvsp one valign-top clearfix" data-dcnode-id="1474" style=""><div class="mcb-wrap-inner" data-dcnode-id="1475"><div class="column mcb-column mcb-item-4ij5gf74m one-sixth column_placeholder" data-dcnode-id="1490"><div class="placeholder" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-lu7kaxr5h two-third column_column column-margin-0px" data-dcnode-id="1476"><div class="column_attr clearfix align_justify" data-dcnode-id="1477" style=""><h4 data-dcnode-id="1479" style="color:#fff;"><span data-dcnode-id="1489" instrument_node="">“Biafra’s platform included such unusual proposals as ‘banning cars from city limits,’ ‘making police run for re-election in the neighborhoods they patrolled,’ hiring back laid-off city employees ‘as panhandlers on a 50% commission and sending them to rich neighborhoods . . . and the entrances to private schools,’ requiring white collar workers ‘at the other end of Market Street (the Bank of America, Bechtel headquarters area)’ to ‘wear clown suits during business hours from 9 to 5,’ ‘legalizing squatting in any buildings left vacant for tax write-offs,’ auctioning off all ’high city positions </span><em data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">in public</span></em><span data-dcnode-id="1486" instrument_node=""> at the Civic Center,” and creating ‘a </span><em data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Board of Bribery</span></em><span data-dcnode-id="1483" instrument_node=""> to set standard public rates for liquor licenses, building code exemptions, police protection and protection </span><em data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">from</span></em><span data-dcnode-id="1480" instrument_node=""> the police.’”</span></h4><span data-dcnode-id="1478" instrument_node="">
</span></div></div></div></div></div></div><div class="section mcb-section mcb-section-8v2ymrh0j" data-dcnode-id="277" style="padding-top:70px;padding-bottom:20px"><div class="section_wrapper mcb-section-inner" data-dcnode-id="278"><div class="wrap mcb-wrap mcb-wrap-lb7p2dwxp one valign-top clearfix" data-dcnode-id="1359" style=""><div class="mcb-wrap-inner" data-dcnode-id="1360"><div class="column mcb-column mcb-item-ljtihd6ja one-sixth column_placeholder" data-dcnode-id="1469"><div class="placeholder" data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-u6yutk4rl two-third column_column" data-dcnode-id="1361"><div class="column_attr clearfix" data-dcnode-id="1362" style=""><p data-dcnode-id="1455"><span data-dcnode-id="1468" instrument_node="">Inspired by the guerilla tactics used by Colorado eccentrics such as Hunter S. Thompson and an “independently wealthy hippie” named John Davenport who repeatedly ran for the City Council in Boulder advocating a panoply of unconventional ideas, punk rock musician Jello Biafra (the former lead singer of Dead Kennedys) decided to run for mayor of San Francisco in 1979 when he learned that anyone could throw their hat into the ring as long as 1,500 residents signed a petition or if the potential candidate forked over $1,500. Biafra ended up paying $900, then managed to get the remaining six hundred signatures over time. Biafra’s platform included such unusual proposals as “banning cars from city limits,” “making police run for re-election in the neighborhoods they patrolled,” hiring back laid-off city employees “as panhandlers on a 50% commission and sending them to rich neighborhoods . . . and the entrances to private schools,” requiring white collar workers “at the other end of Market Street (the Bank of America, Bechtel headquarters area)” to “wear clown suits during business hours from 9 to 5,” “legalizing squatting in any buildings left vacant for tax write-offs,” auctioning off all “high city positions </span><em data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">in public</span></em><span data-dcnode-id="1465" instrument_node=""> at the Civic Center,” and creating “a </span><em data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Board of Bribery</span></em><span data-dcnode-id="1462" instrument_node=""> to set standard public rates for liquor licenses, building code exemptions, police protection and protection </span><em data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">from</span></em><span data-dcnode-id="1459" instrument_node=""> the police.”</span><sup data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">13</span></sup><span data-dcnode-id="1456" instrument_node="">
</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">In a 1987 interview with San Francisco publisher V. Vale, Biafra summarized the outcome of his campaign as follows:
</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1437" style="padding:0 40px;"><span data-dcnode-id="1450" instrument_node="">It was a lot of work but it was worth it, especially after election night. I came in 4</span><sup data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">th</span></sup><span data-dcnode-id="1447" instrument_node=""> out of the 10 legal candidates! Two of the people who came in below me had spent something like $50,000 apiece on their campaigns. I got 6,591 votes, 3.5% of the total. Dianne Feinstein’s campaign manager said something to the effect that: “If someone like </span><em data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">that</span></em><span data-dcnode-id="1444" instrument_node=""> can get so many votes, this city is in </span><em data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">real trouble.</span></em><span data-dcnode-id="1441" instrument_node="">”</span><sup data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">14</span></sup><span data-dcnode-id="1438" instrument_node="">
</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">In that same interview, Biafra described his political campaign as a “prank,” but a positive one:
</span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1428" style="padding:0 40px;"><span data-dcnode-id="1432" instrument_node="">Pranks planted in the right way can be very disruptive. If window-breaking is what turns people on, it’s good to select people who really deserve it, rather than just going and knocking out someone’s Volkswagen window in the slums. When we’re treated like mice, why not bite the elephants? A small wrench is often enough to shut down an enormous machine . . . I think that what separates a frat-boy prank from a good prank is if the target is someone who has a habit of screwing over people at large and therefore deserves it. Religious, political, and corporate targets figure into this. When private property is used against the public to exploit them, then the property and their owners become fair game.</span><sup data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">15</span></sup><span data-dcnode-id="1429" instrument_node="">
</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">About a decade ago, I had a friend who very much enjoyed driving into rich neighborhoods in Southern California in the dead of night and attaching bumper stickers of his own design to the backs of bright red foreign convertibles, Beemers, Jaguars, Lamborghinis, etc. Here are just a few of the bumper sticks my friend dreamed up:</span></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1378" style="padding:0 40px;"><strong data-dcnode-id="1379"><span data-dcnode-id="1423" instrument_node="">I never touched her</span><br data-dcnode-id="1422"><span data-dcnode-id="1421" instrument_node="">
Help Stop Youth Violence—Kill Your Kids!</span><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node="">
Holocaust This, Holocaust That, Yadda Yadda Yadda</span><br data-dcnode-id="1418"><span data-dcnode-id="1417" instrument_node="">
I’d Rather Be Spying In Your Daughter’s Bedroom Window</span><br data-dcnode-id="1416"><span data-dcnode-id="1415" instrument_node="">
Honk If I Feel Guilty</span><br data-dcnode-id="1414"><span data-dcnode-id="1413" instrument_node="">
Abolish the Police</span><br data-dcnode-id="1412"><span data-dcnode-id="1411" instrument_node="">
Abolish the National Security Act</span><br data-dcnode-id="1410"><span data-dcnode-id="1409" instrument_node="">
Abolish the C.I.A.</span><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">
Abolish the F.B.I.</span><br data-dcnode-id="1406"><span data-dcnode-id="1405" instrument_node="">
Abolish Homeland Security</span><br data-dcnode-id="1404"><span data-dcnode-id="1403" instrument_node="">
Abolish the P.T.A.</span><br data-dcnode-id="1402"><span data-dcnode-id="1401" instrument_node="">
PRO-WAR (Just Not </span><u data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">This</span></u><span data-dcnode-id="1398" instrument_node=""> WAR)</span><br data-dcnode-id="1397"><span data-dcnode-id="1396" instrument_node="">
“The Police State is Now a Work of Art.”—Marshall McLuhan</span><br data-dcnode-id="1395"><span data-dcnode-id="1394" instrument_node="">
Weapons of Mass Destruction Don’t Kill People, People Kill People</span><br data-dcnode-id="1393"><span data-dcnode-id="1392" instrument_node="">
Cybernetic Anthropomorphic Machines Don’t Kill People, People Kill People</span><br data-dcnode-id="1391"><span data-dcnode-id="1390" instrument_node="">
Organic Robotoids With In-built Photon Lasers Don’t Kill People, People Kill People</span><br data-dcnode-id="1389"><span data-dcnode-id="1388" instrument_node="">
Multiple Independently-targetable Re-entry Vehicles Don’t Kill People, People Kill People</span><br data-dcnode-id="1387"><span data-dcnode-id="1386" instrument_node="">
OBAMA IN 2020</span><br data-dcnode-id="1385"><span data-dcnode-id="1384" instrument_node="">
If JFK Were Alive Today, He’d Be Dead</span><br data-dcnode-id="1383"><span data-dcnode-id="1382" instrument_node="">
I’m a Proud Gay Parent Against Nuclear Proliferation</span><br data-dcnode-id="1381"><span data-dcnode-id="1380" instrument_node="">
NO U.S. PRESIDENT SHOULD EVER HAVE AIDS!</span></strong></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Needless to say, these bumper sticks were meant to attract negative attention to the owners of the vehicle in question as they blithely cruised around in such well-to-do neighborhoods as the Naples-Marina area of Long Beach, Beverly Hills Gateway, Palos Verdes Estates, and Malibu Colony Beach. I doubt the effect of said bumper stickers amounted to more than a temporary annoyance to the owners, but who knows? How many “road rage incidents” were caused by my friend’s shenanigans? Did any of them end up getting a fist in the face or a bullet in the belly? A small wrench is often enough to shut down an enormous machine . . . even a human machine.
</span></p><span data-dcnode-id="1374" instrument_node="">
</span><hr data-dcnode-id="1373"><span data-dcnode-id="1372" instrument_node="">

14. Ibid.</span><br data-dcnode-id="1365"><span data-dcnode-id="1364" instrument_node="">

</span></div></div></div><div class="wrap mcb-wrap mcb-wrap-uf3wqcws7 one valign-top clearfix" data-dcnode-id="1191" style=""><div class="mcb-wrap-inner" data-dcnode-id="1192"><div class="column mcb-column mcb-item-ail992xco one-sixth column_placeholder" data-dcnode-id="1339"><div class="placeholder" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-b2s7hh2ty two-third column_column" data-dcnode-id="1193"><div class="column_attr clearfix" data-dcnode-id="1194" style=""><p data-dcnode-id="1331"><span data-dcnode-id="1338" instrument_node="">In the past, such disruptive pranks were the exclusive purview of leftists and anarchists. Recently, however, right-wingers have discovered how far such pranks can be taken. But today’s right-wingers aren’t using wrenches and bumper stickers. They’re using tweets and memes and posts on 4chan, 8chan, 8kun, and Reddit. In his 1972 book, </span><em data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Take Today</span></em><span data-dcnode-id="1335" instrument_node="">, Marshall McLuhan proposed that any technology pushed to its extreme will inevitably flip into its opposite function.</span><sup data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">16</span></sup><span data-dcnode-id="1332" instrument_node="">  In the nascent days of the internet, digital-culture cheerleaders like Douglas Rushkoff predicted that the World Wide Web would bring about peace on Earth and good will toward men, nothing but endless blue skies and freedom for all. The internet was the best and only way to make an end-run around Those Nasty Rightwing Meanies Intent On Controlling The Human Spirit. 
</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Since the election of Trump, Rushkoff has had to modify this belief. 
</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node="">On January 28, 2019, Rushkoff appeared on Geoff Brady’s </span><em data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">In Other News</span></em><span data-dcnode-id="1323" instrument_node=""> radio show and made the following statement: 
</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1316" style="padding:0 40px;"><span data-dcnode-id="1320" instrument_node="">Most of the technologies and media we develop are for fostering human connection. But then they inevitably end up being turned against that purpose. The big example for me is the internet. As I'm sure you remember, when it first appeared all of us thought, "Oh, this is going to connect us all to the great global Gaian mind!" But instead, the internet is used to alienate and isolate and atomize us from one another because that's the way the internet can serve the growth mandate of the stock exchange, which is an artificial system, rather than the collaborative mandate of humanity which is a living system.</span><sup data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">17</span></sup><span data-dcnode-id="1317" instrument_node="">
</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1314" instrument_node="">A few months later, while promoting his latest book (</span><em data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Team Human</span></em><span data-dcnode-id="1311" instrument_node="">), Rushkoff elaborated on the previous point, explaining how the internet was seen by his left-leaning friends in the early 1990s as an anti-Establishment tool, a pacifist sword that could maim the capitalist state without the need for bloodshed:
</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1298" style="padding:0 40px;"><span data-dcnode-id="1308" instrument_node="">The original digital ethos was of a deep reclamation of what it means to be human in a collective way. We had been isolated by television and we thought the internet might provide the baby steps for us to reconnect as a global . . . nervous system, and it seemed like this beautiful possibility. But the problem was at the time . . . it was weird . . . psychedelic people who were using this stuff . . . It was Timothy Leary and John Barlow and Grateful Dead-heads doing fractals on the wall and that looked scary and pointless. In 1994 we found out that the average internet-connected home was watching nine hours less commercial television a week. So the internet seemed to be the enemy of the market. Then along came </span><em data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Wired</span></em><span data-dcnode-id="1305" instrument_node=""> magazine [who] said, “Don’t worry, the internet's going to be the salvation of the Nasdaq stock exchange. It's going to be the launch of a new attention economy.” </span><em data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Wired</span></em><span data-dcnode-id="1302" instrument_node=""> told us . . . that we were going to have a long boom, that thanks to digital technology, the economy would grow exponentially, unstopped forever.</span><sup data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">18</span></sup><span data-dcnode-id="1299" instrument_node="">
</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1296" instrument_node="">What Rushkoff and his friends didn’t realize was that a tool created by the Establishment can do nothing other than prop up the Establishment. What Rushkoff and his friends didn’t realize, most importantly, was that </span><em data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">they</span></em><span data-dcnode-id="1293" instrument_node=""> were the Establishment, and had been for a very long time. Unlike many of his colleagues, Rushkoff has since come to understand this. 
</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">In April of 2019, he posted the following late-coming epiphany on Medium.com:
</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286" style="padding:0 40px;"><span data-dcnode-id="1287" instrument_node="">Before Watergate anyway, it felt as if the press and the government were on the same side, telling the same story to us all. There was no way for the underfunded counterculture to compete with mainstream reality programming—except by undermining its premises. The flower children couldn’t overwhelm Richard Nixon’s National Guard troops, but they could put daisies in the barrels of their rifles.
</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1280" style="padding:0 40px;"><span data-dcnode-id="1284" instrument_node="">Taken to the extreme, this sort of activist satire became Operation Mindfuck, first announced in 1975 by Robert Anton Wilson and Robert Shea in their </span><em data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Illuminatus Trilogy</span></em><span data-dcnode-id="1281" instrument_node="">. The idea was to undermine people’s faith in government, authority, and the sanctity of consensus reality itself by pranking everything, all the time.
</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277" style="padding:0 40px;"><span data-dcnode-id="1278" instrument_node="">The idea of Operation Mindfuck was to break the trance that kept America at war, blindly consuming, and oblivious to its impact on the rest of the world. Destabilize the dominant cultural narrative through pranks and confusion. Say things that may or may not be true . . .
</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1259" style="padding:0 40px;"><span data-dcnode-id="1275" instrument_node="">But over the ensuing decades, it was the progressive left whose ideas ended up becoming mainstreamed. Really, from All in the Family onward, it was progressive values in fictional TV—</span><em data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Maude</span></em><span data-dcnode-id="1272" instrument_node=""> to </span><em data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">M*A*S*H</span></em><span data-dcnode-id="1269" instrument_node="">, </span><em data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Murphy Brown</span></em><span data-dcnode-id="1266" instrument_node=""> to </span><em data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">The West Wing</span></em><span data-dcnode-id="1263" instrument_node="">. And as that became the dominant cultural narrative, Operation Mindfuck became the tool of the alt-right. Is the Cult of Kek—that Egyptian frog cartoon—real? Can they cast spells on social media that change the way people think and vote?</span><sup data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">19</span></sup><span data-dcnode-id="1260" instrument_node="">
</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Yes they can, and they do. They’re doing it now. 
</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">In case you don’t know, Kek is a frog-headed god worshipped (in an ironic sense) by certain members of the far right. The movement flourished online, in the very same digital space that was supposed to “connect us all to the great global Gaian mind.” The Southern Poverty Law Center describes the Cult of Kek as follows: 
</span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250" style="padding:0 40px;"><span data-dcnode-id="1251" instrument_node="">You may have seen the name bandied about on social media, especially in political circles where alt-right activists and avid Donald Trump supporters lurk. Usually it is brandished as a kind of epithet, seemingly to ward off the effects of liberal arguments, and it often is conveyed in memes that use the image of the alt-right mascot, Pepe the Frog: “Kek!”
</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247" style="padding:0 40px;"><span data-dcnode-id="1248" instrument_node="">Kek, in the alt-right’s telling, is the “deity” of the semi-ironic “religion” the white nationalist movement has created for itself online—partly for amusement, as a way to troll liberals and self-righteous conservatives both, and to make a kind of political point. He is a god of chaos and darkness, with the head of a frog, the source of their memetic “magic,” to whom the alt-right and Donald Trump owe their success, according to their own explanations.
</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1241" style="padding:0 40px;"><span data-dcnode-id="1245" instrument_node="">In many ways, Kek is the apotheosis of the bizarre alternative reality of the alt-right: at once absurdly juvenile, transgressive, and racist, as well as reflecting a deeper, pseudo-intellectual purpose that lends it an appeal to young ideologues who fancy themselves deep thinkers. It dwells in that murky area they often occupy, between satire, irony, mockery, and serious ideology; Kek can be both a big joke to pull on liberals and a reflection of the alt-right’s own self-image as serious agents of chaos in modern society.</span><sup data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">20</span></sup><span data-dcnode-id="1242" instrument_node="">
</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1239" instrument_node="">The parallels between the Discordian goddess Eris and the Egyptian frog-headed god Kek should be obvious. Both were created to represent the spirit of chaos, disruption, and anti-authoritarianism. In many alt-right memes, Kek resembles Donald Trump with a frog-like face. Oddly enough, depicting Trump as a half-human/half-reptilian hybrid is meant to be a </span><em data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">compliment</span></em><span data-dcnode-id="1236" instrument_node=""> to the President. In the 1990s, conspiracy theorist David Icke grew to fame by travelling around the world accusing various world leaders of being shape-shifting reptilians in disguise. Today, Trump’s supporters (particularly millennials) clothe him in reptilian form as a tribute. They perceive him to be a cold-blooded agent of pure chaos. 
</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1233" instrument_node="">The mythological role of the Trickster, formerly represented by the likes of countercultural icons like Hunter S. Thompson, Robert Anton Wilson, and Jello Biafra, has been hijacked by an atheistic, amoral reality TV star </span><em data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">pretending</span></em><span data-dcnode-id="1230" instrument_node=""> to be a Christian conservative. 
</span></p><span data-dcnode-id="1228" instrument_node="">
</span><hr data-dcnode-id="1227"><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1195" style="font-size:9px;"><span data-dcnode-id="1225" instrument_node="">

</span></div></div></div><div class="wrap mcb-wrap mcb-wrap-4kc5jmcmw one valign-top clearfix" data-dcnode-id="1050" style=""><div class="mcb-wrap-inner" data-dcnode-id="1051"><div class="column mcb-column mcb-item-4sbcd5nvu one-sixth column_placeholder" data-dcnode-id="1171"><div class="placeholder" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-6smg7ne56 two-third column_column" data-dcnode-id="1052"><div class="column_attr clearfix" data-dcnode-id="1053" style=""><h4 data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">2. “Who the fk gives a poop about your opinion”
</span></h4><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Not long ago, I was talking to a man in his late thirties who voted for Trump in 2016 and plans to vote for him again in 2020. He said he knew Trump was his candidate on September 16, 2015, during the Republican debates that occurred at the Ronald Reagan Library in Simi Valley, California. At one point during the debate Jeb Bush demanded that Trump apologize for dragging his wife, Columba, into the campaign. Not long before, Trump had described Bush’s stance on immigration reform as weak due to the fact that Bush’s wife is Mexican. “If my wife were from Mexico, I think I would have a soft spot for people from Mexico,” Trump had said.
</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1164" instrument_node="">I’m sure Jeb’s advisors considered this public challenge a slam-dunk move. How could it go wrong? Surely, Trump wouldn’t refuse to apologize. And the second Trump </span><em data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">did</span></em><span data-dcnode-id="1161" instrument_node=""> apologize, he would look as soft and inefficient as any other scarecrow up on that stage. If Bush’s opponent had been any other politician, his advisors would have been right. But Trump—or Trump’s advisors—had already begun plundering from a far different playbook. Trump had chosen a more eccentric path. Perhaps the mystical powers of the frog-god, Kek, were at work on that stage on September 16 when Trump brushed off Bush’s demand, saying, “I won't do that because I said nothing wrong,” and then added (with obvious insincerity), “but I hear she's a lovely woman.” To hear a politician refuse to apologize—for </span><em data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">anything</span></em><span data-dcnode-id="1158" instrument_node="">, no matter how insignificant or slight—in the second decade of the twenty-first century was, for some people, the equivalent of a Waterloo moment for Jeb Bush (who for years had been the shoo-in Republican candidate for 2016) and a watershed moment for Trump. Kek had begun to rear his reptilian head among the alt-right community.
</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Acts of chaos, no matter how small, can grow out of hand very quickly, as Robert Anton Wilson learned back in the 1970s. When you release the frog-genie from the bottle, you don’t always know how he’s going to behave.
</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">And yet, despite this initial success, within a year after his election, Trump had lost a great deal of his support. His approval ratings were at their lowest ebb in November of 2017 when the very first QAnon post appeared on 4chan.
</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1149" instrument_node="">Just a few weeks ago, on </span><em data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Salon</span></em><span data-dcnode-id="1146" instrument_node="">, I published a five-part series about the origins of QAnon. Over the course of the series, I chronicled the attempts made by an old friend to convince me of an outlandish conspiracy theory being promoted by a teeming mass of rabid online Trump supporters that have grown at an unbelievable rate over the past four years. “Q” is the name of the anonymous poster on 4chan who initiated the phenomenon. According to my friend (based on the information Q and his followers had been posting on the dark byways of the internet), initiates of the Illuminati had teamed up with subterranean demons to torture, rape, and eat kidnapped children in underground military bases ruled by the mortal enemies of Donald Trump. In these bases, the Elites extract adrenochrome from the children and ingest it like a recreational drug. He insisted that when Trump is re-elected in November we could all look forward to the abolition of the income tax, the development of “free energy” for all, and the public unveiling of thousands of grateful kidnapped children rescued by Trump’s private army of “white hats” from cages squirrelled away in these Satanist-controlled underground dungeons. 
</span></p><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">As a result of this series, in which I concluded that QAnon is the catfish scheme of all catfish schemes, I received some interesting correspondence via email….

</span><p data-dcnode-id="1071"><span data-dcnode-id="1087" instrument_node="">Mr. _____ clearly did not read my </span><em data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Salon</span></em><span data-dcnode-id="1084" instrument_node=""> articles, or if he did read them he lacked the capability to understand the words across which his eyes very quickly scanned. I laid out the numerous obscure sources upon which the multilayered QAnon narrative has been manufactured. These sources include such colorful conspiratologists as Léo Taxil, Richard Shaver, Ray Palmer, Richard Sauder, William Cooper, Louis Tackwood, Alex Constantine, Walter Bowart, Maury Terry, John W. DeCamp, Gordon Thomas, Christopher Simpson, Jordan Maxwell, Mae Brussell, Lyndon LaRouche, Dr. Peter Beter, and Jack McLamb. Most people outside the limited, solipsistic world of conspiracy research have never heard of these people, and yet trace elements of their theories are sprinkled all throughout the convoluted story that has become the QAnon storyline. Is it probable that a fifteen-year-old on Reddit had the wherewithal to combine fragments of Léo Taxil’s late nineteenth-century hoaxed anti-Masonic text, </span><em data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Les Mystères de la Franc-Maçonnerie</span></em><span data-dcnode-id="1081" instrument_node="">, with Richard Shaver and Ray Palmer’s phantasmagoric “Shaver Mystery” from long-defunct 1940s science fiction pulp magazines, genuine information derived from Dr. Richard Sauder’s 1995 nonfiction book </span><em data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Underground Bases and Tunnels: What Is the Government Trying to Hide</span></em><span data-dcnode-id="1078" instrument_node="">?, and militiacentric paranoid fantasies plucked from Jack McLamb’s 1992 booklet, </span><em data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Operation Vampire Killer 2000</span></em><span data-dcnode-id="1075" instrument_node="">, to create the notion (now being promulgated by internet platforms like The Blessed To Teach YouTube channel, which has over 92.6 thousand subscribers) that innocent children are being whisked away by initiates of ancient secret societies, dragged down into underground military bases, and fed to ancient “Elder Things” from other dimensions? And is it likely that a random fifteen-year-old kid would have access to the White House to such an extent that he would be able to synchronize his posts with public statements made by Trump that certainly appear to signal to the QAnon crowd that the President is not only aware of Q’s posts, but that he endorses them as well? Would a fifteen-year-old kid on Reddit be able to convince a well-respected military figure like Major General Paul E. Vallely to appear on a Canadian talk show in the fall of 2019 and claim that Q gets his information from “a group of military intelligence specialists of over eight hundred people that advise the President,”</span><sup data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">21</span></sup><span data-dcnode-id="1072" instrument_node="">  thus reinforcing the illusion that Q’s conspiratorial musing are 100% accurate? 
</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1069" instrument_node="">No, the entire QAnon phenomenon displays all the telltale signs of being a highly coordinated psychological warfare operation that eclipses the draconian efforts of Nixon’s Committee to Re-elect the President in the early 1970s. This operation is targeted not just at hardcore Christian evangelicals but also at wide swaths of the American population previously untapped by the Republican Party. The beauty of Operation QAnon, from a strategic standpoint, is that it’s specifically designed to be a </span><em data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">secular religion</span></em><span data-dcnode-id="1066" instrument_node="">. Though QAnon has a Christian base, you don’t have to be Christian to buy into the essential components of the QAnon mythology. There are plenty of non-Christians in this country who believe in the existence of demons and other paranormal beasties. You can be a committed atheist and still buy the idea that a secret group of Satanists are kidnapping children and sacrificing them to deities these elitist devil worshippers </span><em data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">believe</span></em><span data-dcnode-id="1063" instrument_node=""> to be real. Devotees can pick and choose from the QAnon platter which elements of the story they wish to indulge in. 
</span></p><span data-dcnode-id="1061" instrument_node="">
</span><hr data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1054" style="font-size:9px;"><span data-dcnode-id="1058" instrument_node="">
21. </span><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spreaker.com/user/icrn/americanuck-radio-20191014" target="_blank"><span data-dcnode-id="1057" instrument_node="">“Americanuck Radio – 20191014,” Spreaker.com</span></a><span data-dcnode-id="1055" instrument_node="">, October 14, 2019 (accessed July 5, 2020).</span></p></div></div></div></div><div class="wrap mcb-wrap mcb-wrap-ccbolywv3 one valign-top clearfix" data-dcnode-id="1033" style=""><div class="mcb-wrap-inner" data-dcnode-id="1034"><div class="column mcb-column mcb-item-o0sva045g one-sixth column_placeholder" data-dcnode-id="1047"><div class="placeholder" data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-wgav5tjcn two-third column_image" data-dcnode-id="1035"><div class="image_frame image_item no_link scale-with-grid aligncenter no_border" data-dcnode-id="1037"><div class="image_wrapper" data-dcnode-id="1045"><img alt="THUS SPAKE ZARATHUSTRA (PLATE #95) - Zarathustra's Discourses (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" class="scale-with-grid" data-dcnode-id="1046" height="2037" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evergreenreview.com/wp-content/uploads/2020/10/THUS-SPAKE-ZARATHUSTRA-PLATE-95-Zarathustras-Discourses-Drawing-15.7-W-x-22.4-H-in-2100-X-2970-pixels-%25C2%25A9-2015-C.-Panzner-all-rights-reservedsm.jpg&amp;raw" title="THUS SPAKE ZARATHUSTRA (PLATE #95) - Zarathustra's Discourses (Drawing, 15.7 W x 22.4 H in, 2100 X 2970 pixels, © 2015 C. Panzner, all rights reserved)sm" width="1440"></div><p class="wp-caption-text" data-dcnode-id="1038"><span data-dcnode-id="1044" instrument_node="">Christopher Panzner - Plate #95 </span><em data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Zarathustra's Discourses</span></em><span data-dcnode-id="1041" instrument_node=""> (2015)</span><br data-dcnode-id="1040"><span data-dcnode-id="1039" instrument_node="">Drawing, 15.7 x 22.4in</span></p></div><span data-dcnode-id="1036" instrument_node="">
</span></div></div></div><div class="wrap mcb-wrap mcb-wrap-i9dho4ich one valign-top clearfix" data-dcnode-id="866" style=""><div class="mcb-wrap-inner" data-dcnode-id="867"><div class="column mcb-column mcb-item-xg5fnijnk one-sixth column_placeholder" data-dcnode-id="1030"><div class="placeholder" data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">&nbsp;</span></div></div><div class="column mcb-column mcb-item-njod15kbs two-third column_column" data-dcnode-id="868"><div class="column_attr clearfix" data-dcnode-id="869" style=""><p data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">Recently, Q has been posting a torrent of messages accusing members of Black Lives Matter of setting fires all along the west coast for the purpose of fomenting hatred against the Trump administration. Why members of Black Lives Matter would want to burn down states like California, Oregon, and Washington to direct hatred toward a Republican politician these states already voted against back in 2016, I have no idea. More than likely, the intent of these latest Q posts is to distract attention from something far more important. Here’s an excerpt from a recent </span><em data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">New York Daily News</span></em><span data-dcnode-id="1026" instrument_node=""> article entitled “Playing with Fire: Trump’s Let-it-burn Cruelty for California”:
</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022" style="padding:0 40px;"><span data-dcnode-id="1023" instrument_node="">The last two years, aid [to California] did eventually materialize, but likely despite, not because of the president. Former Department of Homeland Security chief of staff Miles Taylor disclosed this week as he endorsed Joe Biden that two years ago Trump directed FEMA to withhold assistance for purely vindictive personal reasons: “He told us to stop giving money to people whose houses had burned down from a wildfire because he was so rageful that people in the state of California didn’t support him and that politically it wasn’t a base for him.”
</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1016" style="padding:0 40px;"><span data-dcnode-id="1020" instrument_node="">A man who demeans his perceived enemies more than any president then toys with punishing disaster victims for failing to support him politically. Talk about the arsonist playing firefighter.</span><sup data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">22</span></sup><span data-dcnode-id="1017" instrument_node="">
</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1014" instrument_node="">In the unfolding QAnon mythology, Black Lives Matter continues to be an ongoing nemesis. In the middle of the George Floyd protests that swept across the United States in May and June of this year, several Confederate statues were toppled by members of Black Lives Matter. Almost immediately, the QAnon crowd began sharing a meme featuring a photo that depicted a bronze statue of Baphomet erected by the Satanic Temple in Salem, Massachusetts. The meme questioned why the BLM protestors had not bothered to attack </span><em data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">this</span></em><span data-dcnode-id="1011" instrument_node=""> particular statue. The implication: all BLM protestors are secretly Satanists. Why else wouldn’t the BLM protestors attack Baphomet? No other reasonable explanation could exist, could it? </span><sup data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">23</span></sup><span data-dcnode-id="1008" instrument_node="">
</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="1005" instrument_node="">For this QAnon crowd, the reality of the situation appears not to be obvious: the BLM protestors are not particularly afraid of bat-winged goat-gods erupting from the bowels of the earth to ravage their families; however, they are concerned about </span><em data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">racist white men in uniforms</span></em><span data-dcnode-id="1002" instrument_node=""> arbitrarily wiping out their lives with no consequences whatsoever. This is a scenario that we, as a country, have seen repeated over and over again. It’s a </span><em data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">tangible</span></em><span data-dcnode-id="999" instrument_node=""> problem. If you have eyes and ears, you can’t claim </span><em data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">not</span></em><span data-dcnode-id="996" instrument_node=""> to be aware of this. And yet the QAnon crowd choose, instead, to be concerned about wholly invented scenarios involving adrenochrome-addicted Illuminati initiates kidnapping children off city streets and shoving them into the fanged maw of Baphomet. Unlike the scores of videos we’ve seen over and over again of black people being harassed or outright killed by police officers throughout the decades, there is not a single shred of evidence that children of any race are being slaughtered by members of the Illuminati. Instead of being concerned about the problem that’s happening in their streets </span><em data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">right at this very moment</span></em><span data-dcnode-id="993" instrument_node="">, the QAnon cultists prefer to worry over children they’ve never seen being victimized by perpetrators who don’t exist. Turning a blind eye to the truth, they pick up arms to fight off boogeymen. What kind of people lead such tedious lives that they actually feel compelled to </span><em data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">make up</span></em><span data-dcnode-id="990" instrument_node=""> things to be afraid of?
</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="987" instrument_node="">Ever since the George Floyd protests began, Q has been steadily posting messages that define the BLM protestors in one of two ways: 1) Either they’re domestic terrorists (i.e., socialists and anarchists) or 2) they’re well-meaning but simple-minded dupes who have been </span><em data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">manipulated</span></em><span data-dcnode-id="984" instrument_node=""> by domestic terrorists. Here’s Q’s June 1, 2020 message (posted one week after George Floyd’s murder): 
</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="971" style="padding:0 40px;"><strong data-dcnode-id="974"><span data-dcnode-id="981" instrument_node="">Black community used as pawns? </span><br data-dcnode-id="980"><span data-dcnode-id="979" instrument_node="">
Welcome to the [Democratic] party. </span><br data-dcnode-id="978"><span data-dcnode-id="977" instrument_node="">
UNITY CREATES PEACE. </span><br data-dcnode-id="976"><span data-dcnode-id="975" instrument_node="">
UNITY IS HUMANITY.</span></strong><sup data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">24</span></sup></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="969" instrument_node="">According to Q’s scenario, black people aren’t smart enough to make their own decisions; the puppeteers in charge of the Democratic Party make decisions </span><em data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">for</span></em><span data-dcnode-id="966" instrument_node=""> them. The definition of “unity” is sitting at home, not protesting when police officers are killing you, and voting for Trump. The people who hang on every new Q post accept this distorted portrayal of the BLM movement without skepticism. The idea that most of the protestors are simply pissed off about hundreds of years of injustices dealt to them by law enforcement doesn’t seem to occur to them. (Or if it does occur to them, they consciously choose to believe in a lie instead.)
</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Some commentators blame the shallowness of typical Middle American Christian values for QAnon’s current popularity. Here’s an illuminating excerpt from a May 18, 2020 Conversation.com article by Marc-André Argentino:
</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959" style="padding:0 40px;"><span data-dcnode-id="960" instrument_node="">I have been studying the growth of the QAnon movement as part of my research into how extremist religious and political organizations create propaganda and recruit new members to ideological causes.
</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956" style="padding:0 40px;"><span data-dcnode-id="957" instrument_node="">On Feb. 23, I logged onto Zoom to observe the first public service of what is essentially a QAnon church operating out of the Omega Kingdom Ministry (OKM). I’ve spent 12 weeks attending this two-hour Sunday morning service.
</span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953" style="padding:0 40px;"><span data-dcnode-id="954" instrument_node="">What I’ve witnessed is an existing model of neo-charismatic home churches—the neo-charismatic movement is an offshoot of evangelical Protestant Christianity and is made up of thousands of independent organizations—where QAnon conspiracy theories are reinterpreted through the Bible. In turn, QAnon conspiracy theories serve as a lens to interpret the Bible itself . . .
</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950" style="padding:0 40px;"><span data-dcnode-id="951" instrument_node="">The Sunday service is led by Russ Wagner, leader of the Indiana-based OKM, and Kevin Bushey, a retired colonel running for election to the Maine House of Representatives.
</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="944" style="padding:0 40px;"><span data-dcnode-id="948" instrument_node="">The service begins with an opening prayer from Wagner that he says will protect the Zoom room from Satan. This is followed by an hour-long Bible study where Wagner might explain the </span><em data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Fall Cabal</span></em><span data-dcnode-id="945" instrument_node=""> video that attendees had just watched or offer his observations on socio-political events from the previous week.
</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="938" style="padding:0 40px;"><span data-dcnode-id="942" instrument_node="">Everything is explained though the lens of the Bible and QAnon narratives. Bushey then does 45 minutes of decoding items that have appeared recently on the app called QMap that is used to share conspiracy theories. The last 15 minutes are dedicated to communion and prayer.</span><sup data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">25</span></sup><span data-dcnode-id="939" instrument_node="">
</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Despite the growing popularity of the QAnon mythology among hardcore Christians, evangelicals are by no means the only ones being taken in by Q. The QAnon crowd includes libertarians, former liberals, disillusioned Democrats, conspiracy theorists, fans of the paranormal and High Strangeness, anarchists, accelerationists, and (most disturbingly) thousands upon thousands of otherwise typical voters who have become disenfranchised from an ineffectual Democratic Party that insists on drifting further and further away from the needs of the average person. In a very real way, QAnon is the inevitable result of what the Democrats have always been so good at: mouthing concern for the “common person” while their actions reveal a far different imperative.
</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="933" instrument_node="">I’m reminded of that wonderful scene in Michael Moore’s documentary, </span><em data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Bowling for Columbine</span></em><span data-dcnode-id="930" instrument_node="">, in which we discover that Mark Koernke, the head of the Michigan militia movement in the 1990s, had been working fulltime as a janitor at the local university for years. Moore paints the ironic picture of a group of academics sitting in a classroom afterhours, discussing their desperate desire for social change, sipping their Starbucks Frappuccinos, while only ten feet away from their little intellectual coffee klatch Koernke swept their garbage from the floor, completely ignored by these sensitive liberals. 
</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="927" instrument_node="">Just as the militia movement of the 1990s served the needs of average working people alienated from the elitist corridors of academia and effete liberalism, QAnon came along during a moment of crisis and provided what all cults offer their beaten-down followers: an explanation of why they’re living in such extreme poverty while everyone else around them—half-real phantoms seen haunting Facebook, Instagram, television—seem to prosper and flourish. Is it because someone’s </span><em data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">keeping</span></em><span data-dcnode-id="924" instrument_node=""> them down? If so, who is it? </span><em data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Who?</span></em><span data-dcnode-id="921" instrument_node="">
</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="918" instrument_node="">“Why the hell are they doing this to me, Martha? </span><em data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Why?</span></em><span data-dcnode-id="915" instrument_node=""> Heck, if only child-eating Satanists are allowed to climb the ladder to success, then I don’t have to feel bad about being trapped down here on the lowest rung, do I? Now that I think about it, I don’t even </span><em data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">want</span></em><span data-dcnode-id="912" instrument_node=""> to be successful—not if I have to gnaw on piles of pre-pubescent flesh to succeed! Why the hell even </span><em data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">try</span></em><span data-dcnode-id="909" instrument_node="">, right, Martha? The cards are stacked against me and </span><em data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">all</span></em><span data-dcnode-id="906" instrument_node=""> right-thinking people. And besides . . . before I can even think about getting my life in order, I need to do something about all them poor kids trapped in those underground cages. Not those immigrant kids from Mexico, though! I don’t mean them . . . not at all. I don’t care about them ragamuffins being stuffed in cages. No, I’m talking about all them </span><em data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">white kids</span></em><span data-dcnode-id="903" instrument_node=""> trapped inside those underground military bases controlled by them nasty Illuminati fuckers. Oh, wait . . . I just realized something! I have no way of finding those cages because that’s Above Top Secret information. An average guy like me would never have access to intel like that. So what can I do about it then? Nothing, I guess. So I’ll just sit here in my man-cave and wait for Q to tell me what to do. And when Trump declares martial law, I’ll </span><em data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">know</span></em><span data-dcnode-id="900" instrument_node=""> it’s a good thing. It’ll mean he’s finally cleaning out all them Satanists from the public schools and the hospitals and the churches and the Hollywood studios and the underground bases and whatnot. Trust in Q and Donald! Only they know what’s right for us! Isn’t that right, Martha? </span><em data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Martha?</span></em><span data-dcnode-id="897" instrument_node=""> Where the hell’re you going with that suitcase?”
</span></p><span data-dcnode-id="895" instrument_node="">
