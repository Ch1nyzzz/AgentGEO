</span><h2 class="article-division" data-dcnode-id="1858" id="conclusion"><span data-dcnode-id="1859" instrument_node="">Conclusion</span></h2><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1856" instrument_node="">While Trump is no longer president, his ability to connect with and move millions of Americans to action continues through establishment of his own web site and media coverage of the past president who continues to influence his followers, politicians and policies. We see Trump’s legacy in the treatment of Wyoming Congresswoman Liz Cheney in response to her May 3 statement that the election was not stolen (See Figure </span><span class="xref" data-dcnode-id="1853"><a data-dcnode-id="1854" href="#F23"><span data-dcnode-id="1855" instrument_node="">23</span></a></span><span data-dcnode-id="1852" instrument_node="">). Fellow Republicans launched an attack and removed Cheney from her leadership position in the Republican party as the Number 3 House Republican.</span></p><span data-dcnode-id="1850" instrument_node="">
</span><div data-dcnode-id="1847" id="F23"><a data-dcnode-id="1848" data-featherlight="jhs-17-1-196-g23.png" href="#"><img alt="" data-dcnode-id="1849" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g23.png&amp;raw"></a></div><span data-dcnode-id="1846" instrument_node="">
</span><div class="caption" data-dcnode-id="1830"><p class="fig-download" data-dcnode-id="1838"><i class="fa fa-download" data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">&nbsp;</span></i><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g23.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="1843" instrument_node="">Original</span></a><span data-dcnode-id="1841" instrument_node=""> | </span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g23.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="1840" instrument_node="">PPT</span></a></p><span data-dcnode-id="1837" instrument_node="">
</span><span class="label" data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Figure 23&nbsp; </span></span><span class="capture-id" data-dcnode-id="1832"><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Liz Cheney Disagreeing with Trump’s Claim the Election was Stolen.</span></p></span><span data-dcnode-id="1831" instrument_node="">
</span></div><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1828" instrument_node="">Matt Gaetz and Marjorie Taylor Greene, members of Congress, embarked on a rally tour on May 7, 2021 (</span><span class="xref" data-dcnode-id="1824"><strong data-dcnode-id="1825"><a class="scroll-link" data-dcnode-id="1826" data-scroll="#B91" href="#B91" id="main-text-B91" rel="footnote"><span data-dcnode-id="1827" instrument_node="">Wang, 2021</span></a></strong></span><span data-dcnode-id="1823" instrument_node="">) to continue where Trump left off. The “America First” rallies highlighted tributes to Trump along with lies and insults a la Trump style. It appears that the removal of Trump from the Oval Office and social media strengthened his followers resolve instead of weakening it.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1820" instrument_node="">The recent voter suppression laws that have been introduced and/or passed provide a glimpse into what the United States can expect from Trump’s continued influence. According to the Brennan Center (</span><span class="xref" data-dcnode-id="1816"><strong data-dcnode-id="1817"><a class="scroll-link" data-dcnode-id="1818" data-scroll="#B8" href="#B8" id="main-text-B8" rel="footnote"><span data-dcnode-id="1819" instrument_node="">2021</span></a></strong></span><span data-dcnode-id="1815" instrument_node="">), “As of March 24, legislators have introduced </span><strong data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">361 bills</span></strong><span data-dcnode-id="1812" instrument_node=""> with </span><strong data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">restrictive provisions</span></strong><span data-dcnode-id="1809" instrument_node=""> in </span><strong data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">47 states</span></strong><span data-dcnode-id="1806" instrument_node="">” (para 1, emphasis in original). These bills confront what Republicans deem as necessary reforms against the frequently claimed, but never proven, voter fraud that ousted Trump from office. If the reaction to an unfavorable result such as a lost election is punitive laws, Trump wins.</span></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1797"><span data-dcnode-id="1803" instrument_node="">Trump’s use of enthymemes to spread hate, whether it be through misogynistic, racist, classist, or other hateful elements, depends essentially on his supporters understanding and co-creating the meaning of his tweets. Without his supporters, Trump’s tweets would be a monologue, a one-sided conversation, but through them, a division between citizens is sown and deepened. In examining Trump’s tweets, Ott (</span><span class="xref" data-dcnode-id="1799"><strong data-dcnode-id="1800"><a class="scroll-link" data-dcnode-id="1801" data-scroll="#B63" href="#B63" id="main-text-B63" rel="footnote"><span data-dcnode-id="1802" instrument_node="">2017</span></a></strong></span><span data-dcnode-id="1798" instrument_node="">) concludes that “Trump’s simple, impulsive, and uncivil Tweets do more than merely reflect sexism, racism, homophobia, and xenophobia; they spread those ideologies like a social cancer” (p. 64). Thus, Trump’s followers understand, co-construct, and heed the messages he tweets.</span></p><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">The tweets within this paper were selected as exemplars of Trump’s enthymematic tweeting, promoting hate with a goal of creating a divide amongst Americans. While a particular tweet may be directed towards a specific demographic group, the range of his hate encompasses multiple demographics in his goal of an Us versus Them America. Trump’s hate is the one area where he does not discriminate and even with a diminished public presence, Trump’s hateful rhetoric still presents a clear and present danger to a democratic United States.</span></p><span data-dcnode-id="1793" instrument_node="">
</span></div><span data-dcnode-id="1791" instrument_node="">
</span></div><span data-dcnode-id="1789" instrument_node="">
