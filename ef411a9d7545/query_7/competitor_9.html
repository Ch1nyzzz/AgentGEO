</span><meta content="<p>Donald Trump’s divisive rhetoric is a common topic among scholars and citizens of America and the World. Trump’s ability to connect with his followers through Twitter created a different environment than what past politicians encountered due to the unique affordances of social media and the negative attributes of Twitter. Trump’s communication style combined with the rhetorical device of the enthymeme in his tweets conveyed a range of bigoted ideologies, from misogyny to racism to classicism. This paper examines how Donald Trump’s tweets actively promote a hateful divide between Americans by investigating how enthymemes in his tweets are used, the ideographs contained within these enthymemes, the role Twitter’s attributes play, and how rhetor and audience create these understandings together. This analysis explicates the power of Trump’s hateful digital rhetoric and how his continued influence presents a clear and present danger to American democracy.</p>" data-dcnode-id="3988" name="DC.Description" xml:lang="en"><span data-dcnode-id="3987" instrument_node="">

</span><h2 data-dcnode-id="3494" id="abstract"><span data-dcnode-id="3495" instrument_node="">Abstract</span></h2><span data-dcnode-id="3493" instrument_node="">
</span><p data-dcnode-id="3491"><span data-dcnode-id="3492" instrument_node="">Donald Trump’s divisive rhetoric is a common topic among scholars and citizens of America and the World. Trump’s ability to connect with his followers through Twitter created a different environment than what past politicians encountered due to the unique affordances of social media and the negative attributes of Twitter. Trump’s communication style combined with the rhetorical device of the enthymeme in his tweets conveyed a range of bigoted ideologies, from misogyny to racism to classicism. This paper examines how Donald Trump’s tweets actively promote a hateful divide between Americans by investigating how enthymemes in his tweets are used, the ideographs contained within these enthymemes, the role Twitter’s attributes play, and how rhetor and audience create these understandings together. This analysis explicates the power of Trump’s hateful digital rhetoric and how his continued influence presents a clear and present danger to American democracy.</span></p><span data-dcnode-id="3490" instrument_node="">
</span></div><span data-dcnode-id="3488" instrument_node="">

</span><div class="article-body" data-dcnode-id="1790" id="middle"><span data-dcnode-id="3418" instrument_node="">
</span><div data-dcnode-id="3006"><span data-dcnode-id="3417" instrument_node="">
</span><h2 class="article-division" data-dcnode-id="3415" id="introduction"><span data-dcnode-id="3416" instrument_node="">Introduction</span></h2><span data-dcnode-id="3414" instrument_node="">
</span><p data-dcnode-id="3404"><span data-dcnode-id="3413" instrument_node="">The presidential election of 2016 swept in Donald Trump and his unrestrained use of Twitter, earning him the title of “Tweeter in Chief.” Trump earned this title due to the sheer number of tweets and retweets emanating from his personal account (@realDonaldTrump). According to the </span><span class="xref" data-dcnode-id="3409"><strong data-dcnode-id="3410"><a class="scroll-link" data-dcnode-id="3411" data-scroll="#B87" href="#B87" id="main-text-B87" rel="footnote"><span data-dcnode-id="3412" instrument_node="">Trump Twitter Archive V2</span></a></strong></span><span data-dcnode-id="3408" instrument_node="">, from Inauguration Day on January 20, 2017, to December 5, 2020, 7:50 p.m. Mountain Standard Time (MST), Trump tweeted 16,164 times and retweeted 9,427, creating a total of 25,591 interactions (tweets + retweets). This amount equals over 11 interactions per day (</span><a data-dcnode-id="3406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thetrumparchive.com/" target="_blank"><span data-dcnode-id="3407" instrument_node="">thetrumparchive.com</span></a><span data-dcnode-id="3405" instrument_node="">). However, it is not the volume of tweets Donald Trump sent that is important, but the meanings and messages embedded within his tweets.</span></p><span data-dcnode-id="3403" instrument_node="">
</span><p data-dcnode-id="3397"><span data-dcnode-id="3402" instrument_node="">Trump’s election loss escalated his continued denial of the results and increased calls for violence (See Figure </span><span class="xref" data-dcnode-id="3399"><a data-dcnode-id="3400" href="#F1"><span data-dcnode-id="3401" instrument_node="">1</span></a></span><span data-dcnode-id="3398" instrument_node="">) with well over 458,000 likes, showing the reach and agreement of his message. The tweet stating, “JANUARY SIXTH, SEE YOU IN DC!” was short (simplistic), impulsive (ordering followers to DC in a week’s time) and uncivil (all caps/shouting) in its enthymemic call for violence. While Trump’s speech in person on January 6, 2021 initiated the actual march to, and subsequent storming of the capitol, this tweet set the stage by urging people to travel to Washington, D.C. and be ready to act on Trump’s instructions.</span></p><span data-dcnode-id="3396" instrument_node="">
</span><div data-dcnode-id="3393" id="F1"><a data-dcnode-id="3394" data-featherlight="jhs-17-1-196-g1.png" href="#"><img alt="" data-dcnode-id="3395" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g1.png&amp;raw"></a></div><span data-dcnode-id="3392" instrument_node="">
</span><div class="caption" data-dcnode-id="3376"><p class="fig-download" data-dcnode-id="3384"><i class="fa fa-download" data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">&nbsp;</span></i><a data-dcnode-id="3388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g1.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="3389" instrument_node="">Original</span></a><span data-dcnode-id="3387" instrument_node=""> | </span><a data-dcnode-id="3385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g1.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="3386" instrument_node="">PPT</span></a></p><span data-dcnode-id="3383" instrument_node="">
</span><span class="label" data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">Figure 1&nbsp; </span></span><span class="capture-id" data-dcnode-id="3378"><p data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">Trump’s Tweet “JANUARY SIXTH, SEE YOU IN DC!”.</span></p></span><span data-dcnode-id="3377" instrument_node="">
</span></div><span data-dcnode-id="3375" instrument_node="">
</span><p data-dcnode-id="3365"><span data-dcnode-id="3374" instrument_node="">Responding tweets (See Figures </span><span class="xref" data-dcnode-id="3371"><a data-dcnode-id="3372" href="#F2"><span data-dcnode-id="3373" instrument_node="">2</span></a></span><span data-dcnode-id="3370" instrument_node=""> and </span><span class="xref" data-dcnode-id="3367"><a data-dcnode-id="3368" href="#F3"><span data-dcnode-id="3369" instrument_node="">3</span></a></span><span data-dcnode-id="3366" instrument_node="">) provide additional support to the claim that Trump called for violence with references to fighting and wildness as well as projecting images of armed foot soldiers and military airplanes.</span></p><span data-dcnode-id="3364" instrument_node="">
</span><div data-dcnode-id="3361" id="F2"><a data-dcnode-id="3362" data-featherlight="jhs-17-1-196-g2.png" href="#"><img alt="" data-dcnode-id="3363" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g2.png&amp;raw"></a></div><span data-dcnode-id="3360" instrument_node="">
</span><div class="caption" data-dcnode-id="3344"><p class="fig-download" data-dcnode-id="3352"><i class="fa fa-download" data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">&nbsp;</span></i><a data-dcnode-id="3356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g2.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="3357" instrument_node="">Original</span></a><span data-dcnode-id="3355" instrument_node=""> | </span><a data-dcnode-id="3353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g2.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="3354" instrument_node="">PPT</span></a></p><span data-dcnode-id="3351" instrument_node="">
</span><span class="label" data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">Figure 2&nbsp; </span></span><span class="capture-id" data-dcnode-id="3346"><p data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">Response to Trump’s Tweet Agreeing to Be There and Fight.</span></p></span><span data-dcnode-id="3345" instrument_node="">
</span></div><span data-dcnode-id="3343" instrument_node="">
</span><div data-dcnode-id="3340" id="F3"><a data-dcnode-id="3341" data-featherlight="jhs-17-1-196-g3.png" href="#"><img alt="" data-dcnode-id="3342" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g3.png&amp;raw"></a></div><span data-dcnode-id="3339" instrument_node="">
</span><div class="caption" data-dcnode-id="3323"><p class="fig-download" data-dcnode-id="3331"><i class="fa fa-download" data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">&nbsp;</span></i><a data-dcnode-id="3335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g3.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="3336" instrument_node="">Original</span></a><span data-dcnode-id="3334" instrument_node=""> | </span><a data-dcnode-id="3332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g3.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="3333" instrument_node="">PPT</span></a></p><span data-dcnode-id="3330" instrument_node="">
</span><span class="label" data-dcnode-id="3328"><span data-dcnode-id="3329" instrument_node="">Figure 3&nbsp; </span></span><span class="capture-id" data-dcnode-id="3325"><p data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">Another Response to Trump’s Tweet Agreeing to Be There and Fight.</span></p></span><span data-dcnode-id="3324" instrument_node="">
</span></div><span data-dcnode-id="3322" instrument_node="">
</span><p data-dcnode-id="3307"><span data-dcnode-id="3321" instrument_node="">The era of the “Tweeter in Chief” ended on January 8, 2021 after Twitter decided to ban Trump following a series of his incendiary tweets. Twitter based the ban on violations of its Glorification of Violence policy, citing the following two Trump tweets with the second one sent approximately an hour after the first (See Figures </span><span class="xref" data-dcnode-id="3318"><a data-dcnode-id="3319" href="#F4"><span data-dcnode-id="3320" instrument_node="">4</span></a></span><span data-dcnode-id="3317" instrument_node=""> and </span><span class="xref" data-dcnode-id="3314"><a data-dcnode-id="3315" href="#F5"><span data-dcnode-id="3316" instrument_node="">5</span></a></span><span data-dcnode-id="3313" instrument_node="">). Twitter understood these tweets as Trump advocating for future violence in the days leading up to the inauguration and, thus in their words, permanently suspended the president (</span><span class="xref" data-dcnode-id="3309"><strong data-dcnode-id="3310"><a class="scroll-link" data-dcnode-id="3311" data-scroll="#B89" href="#B89" id="main-text-B89" rel="footnote"><span data-dcnode-id="3312" instrument_node="">Twitter, 2021</span></a></strong></span><span data-dcnode-id="3308" instrument_node="">).</span></p><span data-dcnode-id="3306" instrument_node="">
</span><div data-dcnode-id="3303" id="F4"><a data-dcnode-id="3304" data-featherlight="jhs-17-1-196-g4.png" href="#"><img alt="" data-dcnode-id="3305" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g4.png&amp;raw"></a></div><span data-dcnode-id="3302" instrument_node="">
</span><div class="caption" data-dcnode-id="3286"><p class="fig-download" data-dcnode-id="3294"><i class="fa fa-download" data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">&nbsp;</span></i><a data-dcnode-id="3298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g4.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="3299" instrument_node="">Original</span></a><span data-dcnode-id="3297" instrument_node=""> | </span><a data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g4.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="3296" instrument_node="">PPT</span></a></p><span data-dcnode-id="3293" instrument_node="">
</span><span class="label" data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">Figure 4&nbsp; </span></span><span class="capture-id" data-dcnode-id="3288"><p data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">First of Trump’s Two Tweets That Led to Twitter Ban.</span></p></span><span data-dcnode-id="3287" instrument_node="">
</span></div><span data-dcnode-id="3285" instrument_node="">
</span><div data-dcnode-id="3282" id="F5"><a data-dcnode-id="3283" data-featherlight="jhs-17-1-196-g5.png" href="#"><img alt="" data-dcnode-id="3284" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g5.png&amp;raw"></a></div><span data-dcnode-id="3281" instrument_node="">
</span><div class="caption" data-dcnode-id="3265"><p class="fig-download" data-dcnode-id="3273"><i class="fa fa-download" data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">&nbsp;</span></i><a data-dcnode-id="3277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g5.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="3278" instrument_node="">Original</span></a><span data-dcnode-id="3276" instrument_node=""> | </span><a data-dcnode-id="3274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g5.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="3275" instrument_node="">PPT</span></a></p><span data-dcnode-id="3272" instrument_node="">
</span><span class="label" data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">Figure 5&nbsp; </span></span><span class="capture-id" data-dcnode-id="3267"><p data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Second of Trump’s Two Tweets That Led to Twitter Ban.</span></p></span><span data-dcnode-id="3266" instrument_node="">
</span></div><span data-dcnode-id="3264" instrument_node="">
</span><p data-dcnode-id="3162"><span data-dcnode-id="3263" instrument_node="">While these two tweets are specific examples of Trump’s calls to violence, his rhetoric of hate, both verbal and written, ran the gamut of misogynistic (</span><span class="xref" data-dcnode-id="3259"><strong data-dcnode-id="3260"><a class="scroll-link" data-dcnode-id="3261" data-scroll="#B53" href="#B53" id="main-text-B53" rel="footnote"><span data-dcnode-id="3262" instrument_node="">McAlister, 2018</span></a></strong></span><span data-dcnode-id="3258" instrument_node="">; </span><span class="xref" data-dcnode-id="3254"><strong data-dcnode-id="3255"><a class="scroll-link" data-dcnode-id="3256" data-scroll="#B73" href="#B73" id="main-text-B73" rel="footnote"><span data-dcnode-id="3257" instrument_node="">Shear &amp; Sullivan, 2018</span></a></strong></span><span data-dcnode-id="3253" instrument_node="">; </span><span class="xref" data-dcnode-id="3249"><strong data-dcnode-id="3250"><a class="scroll-link" data-dcnode-id="3251" data-scroll="#B90" href="#B90" id="main-text-B90" rel="footnote"><span data-dcnode-id="3252" instrument_node="">Walsh, 2018</span></a></strong></span><span data-dcnode-id="3248" instrument_node="">), racist (</span><span class="xref" data-dcnode-id="3244"><strong data-dcnode-id="3245"><a class="scroll-link" data-dcnode-id="3246" data-scroll="#B27" href="#B27" id="main-text-B27" rel="footnote"><span data-dcnode-id="3247" instrument_node="">Graham et al., 2019</span></a></strong></span><span data-dcnode-id="3243" instrument_node="">; </span><span class="xref" data-dcnode-id="3239"><strong data-dcnode-id="3240"><a class="scroll-link" data-dcnode-id="3241" data-scroll="#B55" href="#B55" id="main-text-B55" rel="footnote"><span data-dcnode-id="3242" instrument_node="">McElwee &amp; McDaniel, 2017</span></a></strong></span><span data-dcnode-id="3238" instrument_node="">; Shafer, 2017), classist (</span><span class="xref" data-dcnode-id="3234"><strong data-dcnode-id="3235"><a class="scroll-link" data-dcnode-id="3236" data-scroll="#B27" href="#B27" id="main-text-B27" rel="footnote"><span data-dcnode-id="3237" instrument_node="">Graham et al., 2019</span></a></strong></span><span data-dcnode-id="3233" instrument_node="">; </span><span class="xref" data-dcnode-id="3229"><strong data-dcnode-id="3230"><a class="scroll-link" data-dcnode-id="3231" data-scroll="#B58" href="#B58" id="main-text-B58" rel="footnote"><span data-dcnode-id="3232" instrument_node="">Miller, 2016</span></a></strong></span><span data-dcnode-id="3228" instrument_node="">; </span><span class="xref" data-dcnode-id="3224"><strong data-dcnode-id="3225"><a class="scroll-link" data-dcnode-id="3226" data-scroll="#B68" href="#B68" id="main-text-B68" rel="footnote"><span data-dcnode-id="3227" instrument_node="">Pramuk, 2017</span></a></strong></span><span data-dcnode-id="3223" instrument_node="">), Islamophobic (</span><span class="xref" data-dcnode-id="3219"><strong data-dcnode-id="3220"><a class="scroll-link" data-dcnode-id="3221" data-scroll="#B37" href="#B37" id="main-text-B37" rel="footnote"><span data-dcnode-id="3222" instrument_node="">Hossain, 2020</span></a></strong></span><span data-dcnode-id="3218" instrument_node="">; </span><span class="xref" data-dcnode-id="3214"><strong data-dcnode-id="3215"><a class="scroll-link" data-dcnode-id="3216" data-scroll="#B44" href="#B44" id="main-text-B44" rel="footnote"><span data-dcnode-id="3217" instrument_node="">Khan et al., 2020</span></a></strong></span><span data-dcnode-id="3213" instrument_node="">; </span><span class="xref" data-dcnode-id="3209"><strong data-dcnode-id="3210"><a class="scroll-link" data-dcnode-id="3211" data-scroll="#B45" href="#B45" id="main-text-B45" rel="footnote"><span data-dcnode-id="3212" instrument_node="">Klaas, 2019</span></a></strong></span><span data-dcnode-id="3208" instrument_node="">), anti-immigrant (</span><span class="xref" data-dcnode-id="3204"><strong data-dcnode-id="3205"><a class="scroll-link" data-dcnode-id="3206" data-scroll="#B36" href="#B36" id="main-text-B36" rel="footnote"><span data-dcnode-id="3207" instrument_node="">Hooghe &amp; Dassonneville, 2018</span></a></strong></span><span data-dcnode-id="3203" instrument_node="">; </span><span class="xref" data-dcnode-id="3199"><strong data-dcnode-id="3200"><a class="scroll-link" data-dcnode-id="3201" data-scroll="#B55" href="#B55" id="main-text-B55" rel="footnote"><span data-dcnode-id="3202" instrument_node="">McElwee &amp; McDaniel, 2017</span></a></strong></span><span data-dcnode-id="3198" instrument_node="">; </span><span class="xref" data-dcnode-id="3194"><strong data-dcnode-id="3195"><a class="scroll-link" data-dcnode-id="3196" data-scroll="#B74" href="#B74" id="main-text-B74" rel="footnote"><span data-dcnode-id="3197" instrument_node="">Silva, 2018</span></a></strong></span><span data-dcnode-id="3193" instrument_node="">), homophobic (</span><span class="xref" data-dcnode-id="3189"><strong data-dcnode-id="3190"><a class="scroll-link" data-dcnode-id="3191" data-scroll="#B1" href="#B1" id="main-text-B1" rel="footnote"><span data-dcnode-id="3192" instrument_node="">Acosta, 2020</span></a></strong></span><span data-dcnode-id="3188" instrument_node="">), and everything in between. He has also mocked disabled people (</span><span class="xref" data-dcnode-id="3184"><strong data-dcnode-id="3185"><a class="scroll-link" data-dcnode-id="3186" data-scroll="#B10" href="#B10" id="main-text-B10" rel="footnote"><span data-dcnode-id="3187" instrument_node="">Carmon, 2016</span></a></strong></span><span data-dcnode-id="3183" instrument_node="">), criticized the military service and sacrifice of veterans (</span><span class="xref" data-dcnode-id="3179"><strong data-dcnode-id="3180"><a class="scroll-link" data-dcnode-id="3181" data-scroll="#B26" href="#B26" id="main-text-B26" rel="footnote"><span data-dcnode-id="3182" instrument_node="">Goldberg, 2020</span></a></strong></span><span data-dcnode-id="3178" instrument_node="">; </span><span class="xref" data-dcnode-id="3174"><strong data-dcnode-id="3175"><a class="scroll-link" data-dcnode-id="3176" data-scroll="#B41" href="#B41" id="main-text-B41" rel="footnote"><span data-dcnode-id="3177" instrument_node="">Kellman, 2019</span></a></strong></span><span data-dcnode-id="3173" instrument_node="">), and encouraged violence from his supporters (</span><span class="xref" data-dcnode-id="3169"><strong data-dcnode-id="3170"><a class="scroll-link" data-dcnode-id="3171" data-scroll="#B13" href="#B13" id="main-text-B13" rel="footnote"><span data-dcnode-id="3172" instrument_node="">Cathey &amp; Keneally, 2020</span></a></strong></span><span data-dcnode-id="3168" instrument_node="">; </span><span class="xref" data-dcnode-id="3164"><strong data-dcnode-id="3165"><a class="scroll-link" data-dcnode-id="3166" data-scroll="#B75" href="#B75" id="main-text-B75" rel="footnote"><span data-dcnode-id="3167" instrument_node="">Solender, 2020</span></a></strong></span><span data-dcnode-id="3163" instrument_node="">).</span></p><span data-dcnode-id="3161" instrument_node="">
</span><p data-dcnode-id="3154"><span data-dcnode-id="3160" instrument_node="">Trump’s propensity for using Twitter and his large number of followers, which as of December 8, 2020 at 3:25 p.m. MST, was 88.6 million, (</span><span class="xref" data-dcnode-id="3156"><strong data-dcnode-id="3157"><a class="scroll-link" data-dcnode-id="3158" data-scroll="#B88" href="#B88" id="main-text-B88" rel="footnote"><span data-dcnode-id="3159" instrument_node="">Twitter, 2020</span></a></strong></span><span data-dcnode-id="3155" instrument_node="">) allowed him to directly reach millions of people quickly and easily. Twitter prizes speed (tweets are sent out instantly) and openness (tweets are public unless the privacy setting is set to protected tweets, which can only be viewed by approved followers), thus enabling Trump to connect, communicate, influence, command, and govern through the vastly popular platform.</span></p><span data-dcnode-id="3153" instrument_node="">
</span><p data-dcnode-id="3146"><span data-dcnode-id="3152" instrument_node="">Trump’s tweets employ several rhetorical devices to ensure his audience understands the message and/or desired action. The rhetorical device under consideration in this essay is the enthymeme. In enthymemes, using Gerard Hauser’s (</span><span class="xref" data-dcnode-id="3148"><strong data-dcnode-id="3149"><a class="scroll-link" data-dcnode-id="3150" data-scroll="#B32" href="#B32" id="main-text-B32" rel="footnote"><span data-dcnode-id="3151" instrument_node="">2002</span></a></strong></span><span data-dcnode-id="3147" instrument_node="">) definition, the rhetor and audience share common beliefs and actively participate in building and creating the argument together. Enthymemes give Trump the ability to deny alleged statements or argue he was misunderstood since enthymemes are generally implicit and can be interpreted differently by diverse audiences. An analysis of Trump’s tweets exemplifies how he builds and connects with those sharing and willing to contribute to the end result of creating a divide between Americans by casting them against each other, establishing an Us versus Them philosophy.</span></p><span data-dcnode-id="3145" instrument_node="">
</span><p data-dcnode-id="3129"><span data-dcnode-id="3144" instrument_node="">By examining Twitter as a vehicle for Trump’s communication, Ott and Dickinson (</span><span class="xref" data-dcnode-id="3140"><strong data-dcnode-id="3141"><a class="scroll-link" data-dcnode-id="3142" data-scroll="#B64" href="#B64" id="main-text-B64" rel="footnote"><span data-dcnode-id="3143" instrument_node="">2020</span></a></strong></span><span data-dcnode-id="3139" instrument_node="">) attribute Trump’s Twitter success to its attributes. Trump embraces, the simplicity, impulsivity, and incivility inherent in Twitter’s structure as a medium for communication. In understanding how Trump employs the enthymeme, I use Gerard Hauser’s (</span><span class="xref" data-dcnode-id="3135"><strong data-dcnode-id="3136"><a class="scroll-link" data-dcnode-id="3137" data-scroll="#B32" href="#B32" id="main-text-B32" rel="footnote"><span data-dcnode-id="3138" instrument_node="">2002</span></a></strong></span><span data-dcnode-id="3134" instrument_node="">) interpretation of the enthymeme where the rhetor and audience share common beliefs and actively participate in building and creating the argument. In combining these two frameworks, I argue Trump uses what I describe as the bombastic enthymeme in a multitude of tweets. The bombastic enthymeme contains elements of simplicity, impulsivity, and incivility creating arguments understood, built upon, and agreed on by Trump’s followers. While many of Trump’s tweets are enthymemic in nature, they still allow for plausible deniability. Due to their bombastic nature and use of hyperbole, these characteristics allow deniability despite what may be quite obviously a hateful or fear raising statement. Trump shows (See Figure </span><span class="xref" data-dcnode-id="3131"><a data-dcnode-id="3132" href="#F6"><span data-dcnode-id="3133" instrument_node="">6</span></a></span><span data-dcnode-id="3130" instrument_node="">) what he deems are the results from the two choices for President of the United States. A vote for Biden brings doom and disaster while a vote for Trump brings recovery, prosperity, and freedom/liberty. This tweet means to create fear and panic amongst the voters due to the hyperbole predicting implausible results from a Biden victory, the killing of the American Dream.</span></p><span data-dcnode-id="3128" instrument_node="">
</span><div data-dcnode-id="3125" id="F6"><a data-dcnode-id="3126" data-featherlight="jhs-17-1-196-g6.png" href="#"><img alt="" data-dcnode-id="3127" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g6.png&amp;raw"></a></div><span data-dcnode-id="3124" instrument_node="">
</span><div class="caption" data-dcnode-id="3108"><p class="fig-download" data-dcnode-id="3116"><i class="fa fa-download" data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">&nbsp;</span></i><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g6.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="3121" instrument_node="">Original</span></a><span data-dcnode-id="3119" instrument_node=""> | </span><a data-dcnode-id="3117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g6.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="3118" instrument_node="">PPT</span></a></p><span data-dcnode-id="3115" instrument_node="">
</span><span class="label" data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">Figure 6&nbsp; </span></span><span class="capture-id" data-dcnode-id="3110"><p data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">Trump’s Tweet Predicting Doom and Disaster.</span></p></span><span data-dcnode-id="3109" instrument_node="">
</span></div><span data-dcnode-id="3107" instrument_node="">
</span><p data-dcnode-id="3087"><span data-dcnode-id="3106" instrument_node="">Followers fight back by attributing the characteristics of Trump’s tweet to those attacking Trump (See Figure </span><span class="xref" data-dcnode-id="3103"><a data-dcnode-id="3104" href="#F7"><span data-dcnode-id="3105" instrument_node="">7</span></a></span><span data-dcnode-id="3102" instrument_node=""> – a response to Figure </span><span class="xref" data-dcnode-id="3099"><a data-dcnode-id="3100" href="#F8"><span data-dcnode-id="3101" instrument_node="">8</span></a></span><span data-dcnode-id="3098" instrument_node=""> Trump tweet about suburban housewives). Plausible deniability is vital to Trump’s survival as he may be called by either criminal or civil court cases for a multitude of crimes including the most serious of inciting an insurrection (</span><span class="xref" data-dcnode-id="3094"><strong data-dcnode-id="3095"><a class="scroll-link" data-dcnode-id="3096" data-scroll="#B4" href="#B4" id="main-text-B4" rel="footnote"><span data-dcnode-id="3097" instrument_node="">Ayer &amp; Eisen, 2021</span></a></strong></span><span data-dcnode-id="3093" instrument_node="">) and being complicit in COVID-19 deaths (</span><span class="xref" data-dcnode-id="3089"><strong data-dcnode-id="3090"><a class="scroll-link" data-dcnode-id="3091" data-scroll="#B43" href="#B43" id="main-text-B43" rel="footnote"><span data-dcnode-id="3092" instrument_node="">Kelly, 2021</span></a></strong></span><span data-dcnode-id="3088" instrument_node="">). This deniability offers Trump protection and a defense against these charges.</span></p><span data-dcnode-id="3086" instrument_node="">
</span><div data-dcnode-id="3083" id="F7"><a data-dcnode-id="3084" data-featherlight="jhs-17-1-196-g7.png" href="#"><img alt="" data-dcnode-id="3085" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g7.png&amp;raw"></a></div><span data-dcnode-id="3082" instrument_node="">
</span><div class="caption" data-dcnode-id="3066"><p class="fig-download" data-dcnode-id="3074"><i class="fa fa-download" data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">&nbsp;</span></i><a data-dcnode-id="3078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g7.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="3079" instrument_node="">Original</span></a><span data-dcnode-id="3077" instrument_node=""> | </span><a data-dcnode-id="3075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g7.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="3076" instrument_node="">PPT</span></a></p><span data-dcnode-id="3073" instrument_node="">
</span><span class="label" data-dcnode-id="3071"><span data-dcnode-id="3072" instrument_node="">Figure 7&nbsp; </span></span><span class="capture-id" data-dcnode-id="3068"><p data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">Response to Trump’s Tweet Countering Trump’s Racist Statements.</span></p></span><span data-dcnode-id="3067" instrument_node="">
</span></div><span data-dcnode-id="3065" instrument_node="">
</span><div data-dcnode-id="3062" id="F8"><a data-dcnode-id="3063" data-featherlight="jhs-17-1-196-g8.png" href="#"><img alt="" data-dcnode-id="3064" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g8.png&amp;raw"></a></div><span data-dcnode-id="3061" instrument_node="">
</span><div class="caption" data-dcnode-id="3045"><p class="fig-download" data-dcnode-id="3053"><i class="fa fa-download" data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">&nbsp;</span></i><a data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g8.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="3058" instrument_node="">Original</span></a><span data-dcnode-id="3056" instrument_node=""> | </span><a data-dcnode-id="3054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g8.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="3055" instrument_node="">PPT</span></a></p><span data-dcnode-id="3052" instrument_node="">
</span><span class="label" data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">Figure 8&nbsp; </span></span><span class="capture-id" data-dcnode-id="3047"><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Trump’s Tweet Urging Suburban Housewives to Vote for Him.</span></p></span><span data-dcnode-id="3046" instrument_node="">
</span></div><span data-dcnode-id="3044" instrument_node="">
</span><p data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">While Trump also retweets posts containing messages of hate, this article focuses on Trump’s rhetoric as it pertains to his own words in the digital arena of Twitter. In this article, I will examine three topics consisting of multiple tweets or threads addressed by Donald Trump’s tweets – exploring how the enthymemes are created, the ideographs contained within these enthymemes, the role Twitter’s attributes play, and how rhetor and audience create these understandings together. In considering these topics, I argue that together, they expose how rhetoric within a digital space can be polarizing and hateful, thus contributing to a division among Americans.</span></p><span data-dcnode-id="3041" instrument_node="">
</span><div data-dcnode-id="3008"><span data-dcnode-id="3040" instrument_node="">
</span><h3 data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Enthymemes</span></h3><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3010"><span data-dcnode-id="3036" instrument_node="">Aristotle coined the term, enthymeme, but did not fully define it, leaving many scholars to debate the definition (</span><span class="xref" data-dcnode-id="3032"><strong data-dcnode-id="3033"><a class="scroll-link" data-dcnode-id="3034" data-scroll="#B6" href="#B6" id="main-text-B6" rel="footnote"><span data-dcnode-id="3035" instrument_node="">Bitzer, 1959</span></a></strong></span><span data-dcnode-id="3031" instrument_node="">; </span><span class="xref" data-dcnode-id="3027"><strong data-dcnode-id="3028"><a class="scroll-link" data-dcnode-id="3029" data-scroll="#B67" href="#B67" id="main-text-B67" rel="footnote"><span data-dcnode-id="3030" instrument_node="">Poster, 1992</span></a></strong></span><span data-dcnode-id="3026" instrument_node="">). Additionally, Poster (</span><span class="xref" data-dcnode-id="3022"><strong data-dcnode-id="3023"><a class="scroll-link" data-dcnode-id="3024" data-scroll="#B67" href="#B67" id="main-text-B67" rel="footnote"><span data-dcnode-id="3025" instrument_node="">1992</span></a></strong></span><span data-dcnode-id="3021" instrument_node="">) posits that definitions for, “…rhetorical terms are not so much immutable entities with fixed and unchangeable meanings, but rather methods by which a culture analyzes its own discursive practices…” (p. 1), which supports the enthymeme as a dynamic entity adapting to its environment and/or community. In moving away from the enthymeme as a logical syllogism, Hauser (</span><span class="xref" data-dcnode-id="3017"><strong data-dcnode-id="3018"><a class="scroll-link" data-dcnode-id="3019" data-scroll="#B32" href="#B32" id="main-text-B32" rel="footnote"><span data-dcnode-id="3020" instrument_node="">2002</span></a></strong></span><span data-dcnode-id="3016" instrument_node="">) claims there are three fundamental elements to the enthymeme, (1) “…some point of common ground among rhetor and audience,” (2) “…a linking premise that joins the common ground of the rhetor and audience to a conclusion,” and (3) “…enthymematic arguments are co-constructed by audience and rhetor” (p. 125). As such, the enthymeme is more than missing information within an argument, it is missing information the rhetor and audience believe in and actively participate in building and creating. It cannot be determined exactly what the audience thinks and believes is the common ground and how it links to the argument. Yet I would argue the tweets I analyze exemplify Hauser’s fundamental elements as evidenced by the audience’s response to Trump’s tweets (either through retweeting, liking, or responding). Trump’s enthymemes often engage the concept of ideographs as well to communicate his meaning. Ideographs play a social function in communities by offering an established meaning understood by those within the community (</span><span class="xref" data-dcnode-id="3012"><strong data-dcnode-id="3013"><a class="scroll-link" data-dcnode-id="3014" data-scroll="#B56" href="#B56" id="main-text-B56" rel="footnote"><span data-dcnode-id="3015" instrument_node="">McGee, 1980</span></a></strong></span><span data-dcnode-id="3011" instrument_node="">). While outsiders might understand the dictionary version of the ideograph, they miss its culturally understood meaning because they do not belong to the group. Many times, enthymemes rely on ideographs to function, as understanding the ideograph allows people to comprehend the enthymeme. In my study I examine how Trump employs ideographs within his enthymemes (e.g., the American Dream, suburbs) by using hegemonic ideas of these ideographs to co-create the meaning called for, within his tweets.</span></p><span data-dcnode-id="3009" instrument_node="">
</span></div><span data-dcnode-id="3007" instrument_node="">
</span></div><span data-dcnode-id="3005" instrument_node="">
</span><div data-dcnode-id="2956"><span data-dcnode-id="3004" instrument_node="">
</span><h2 class="article-division" data-dcnode-id="3002" id="twitters-affordances"><span data-dcnode-id="3003" instrument_node="">Twitter’s Affordances</span></h2><span data-dcnode-id="3001" instrument_node="">
</span><p data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">Circulation is what new media in general, tweets particularly so, are well-suited to do. The characteristics of speed and openness provide tweets the affordance to disseminate, allowing for circulation to occur within a natural flow. There is no waiting as in asynchronous communication, or gatekeepers as with many other social networking sites. Aided by these features, Twitter provides a channel via retweeting for tweets to travel widely and exponentially. Successful tweets are measured by their circulatory track records. That is, tweets enter the public and either circulate within the public sphere or fade away. The limited number of characters (280) permitted in a tweet allow the audience to read the message without delving into extraneous text. Readers can determine almost immediately if the tweet has value and if a response action (retweeting, responding, or an external action) should be taken. A value of circulation is being able to determine and create a response in a minimal amount of time and the openness of Twitter encourages dissemination as well.</span></p><span data-dcnode-id="2998" instrument_node="">
</span><p data-dcnode-id="2991"><span data-dcnode-id="2997" instrument_node="">The speed at which tweets can be posted and then retweeted provides the opportunity for hateful or false information to spread exponentially. As found in a recent study, “It took the truth about six times as long as falsehood to reach 1500…. [and] falsehoods were 70% more likely to be retweeted than the truth” (</span><span class="xref" data-dcnode-id="2993"><strong data-dcnode-id="2994"><a class="scroll-link" data-dcnode-id="2995" data-scroll="#B64" href="#B64" id="main-text-B64" rel="footnote"><span data-dcnode-id="2996" instrument_node="">Ott &amp; Dickinson, 2020</span></a></strong></span><span data-dcnode-id="2992" instrument_node=""> as cited in Vosoughi et al. 2018, p. 1148). Before social media the ability to spread information at this rate of speed was not possible. Social media enables instant communication.</span></p><span data-dcnode-id="2990" instrument_node="">
</span><p data-dcnode-id="2958"><span data-dcnode-id="2989" instrument_node="">Along with circulation, the affordances social media provides such as speed, openness, and accessibility allow people to connect, be heard, and organize and unite in a fight for social justice and fairness against the state (</span><span class="xref" data-dcnode-id="2985"><strong data-dcnode-id="2986"><a class="scroll-link" data-dcnode-id="2987" data-scroll="#B34" href="#B34" id="main-text-B34" rel="footnote"><span data-dcnode-id="2988" instrument_node="">Hayes, 2016</span></a></strong></span><span data-dcnode-id="2984" instrument_node="">). Donald Trump on the other hand, as the state and in using Twitter for official business (</span><span class="xref" data-dcnode-id="2980"><strong data-dcnode-id="2981"><a class="scroll-link" data-dcnode-id="2982" data-scroll="#B46" href="#B46" id="main-text-B46" rel="footnote"><span data-dcnode-id="2983" instrument_node="">Knight First Amendment Institute, et al. v. Donald J. Trump, et al., 2018</span></a></strong></span><span data-dcnode-id="2979" instrument_node="">), engages in the opposite. He spreads hate through sowing discord and enmity by pitting American citizen against American citizen. Although, this manipulation by the state against its people is not a new phenomenon. Governments in the past have embraced the affordances of digital spaces and the Internet to move against their citizens. Evidence of this is seen in cases of surveillance (</span><span class="xref" data-dcnode-id="2975"><strong data-dcnode-id="2976"><a class="scroll-link" data-dcnode-id="2977" data-scroll="#B2" href="#B2" id="main-text-B2" rel="footnote"><span data-dcnode-id="2978" instrument_node="">ACLU, n.d</span></a></strong></span><span data-dcnode-id="2974" instrument_node="">.) or the Arab Spring (</span><span class="xref" data-dcnode-id="2970"><strong data-dcnode-id="2971"><a class="scroll-link" data-dcnode-id="2972" data-scroll="#B30" href="#B30" id="main-text-B30" rel="footnote"><span data-dcnode-id="2973" instrument_node="">Hands, 2011</span></a></strong></span><span data-dcnode-id="2969" instrument_node="">; </span><span class="xref" data-dcnode-id="2965"><strong data-dcnode-id="2966"><a class="scroll-link" data-dcnode-id="2967" data-scroll="#B61" href="#B61" id="main-text-B61" rel="footnote"><span data-dcnode-id="2968" instrument_node="">Morozov, 2009</span></a></strong></span><span data-dcnode-id="2964" instrument_node="">), in an effort by the government to control citizens. Of course, state or other government entities in the United States do also engage in similar activities, as the police actively monitored the Facebook usage of the Dakota pipeline activists and their protests (</span><span class="xref" data-dcnode-id="2960"><strong data-dcnode-id="2961"><a class="scroll-link" data-dcnode-id="2962" data-scroll="#B14" href="#B14" id="main-text-B14" rel="footnote"><span data-dcnode-id="2963" instrument_node="">CBC News, 2016</span></a></strong></span><span data-dcnode-id="2959" instrument_node="">). The unique aspect here is that the head of state, the president of the United States, has engaged in direct communication efforts to divide the country.</span></p><span data-dcnode-id="2957" instrument_node="">
</span></div><span data-dcnode-id="2955" instrument_node="">
</span><div data-dcnode-id="2662"><span data-dcnode-id="2954" instrument_node="">
</span><h2 class="article-division" data-dcnode-id="2952" id="analytical-framework"><span data-dcnode-id="2953" instrument_node="">Analytical Framework</span></h2><span data-dcnode-id="2951" instrument_node="">
</span><p data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">As previously mentioned, there is no shortage of offensive remarks shared by Donald Trump. There are arguments about the intent, meaning, and context of Trump’s words from the man himself and his supporters (whether official government members, the media, or American citizens). The primary reason these arguments exist is due to Trump’s use of enthymemes within his rhetoric. Without use of the enthymeme, Trump would need to be explicit in his statements for his supporters to understand the meaning, so deniability is less plausible.</span></p><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2947" instrument_node="">In order to demonstrate Trump’s use of enthymemes in tweets, I examined a series of his tweets, starting with the most well-known (tweets receiving attention and media coverage), and searched the </span><span class="xref" data-dcnode-id="2943"><strong data-dcnode-id="2944"><a class="scroll-link" data-dcnode-id="2945" data-scroll="#B87" href="#B87" id="main-text-B87" rel="footnote"><span data-dcnode-id="2946" instrument_node="">Trump Twitter Archive V2</span></a></strong></span><span data-dcnode-id="2942" instrument_node=""> for additional tweets. I define media coverage as a story covered by a variety of souces including national (The Washington Post, USA Today, Associated Press, NPR), local (LA Times, The Detroit News), and international (BBC, The Independent). Both national and local Fox News outlets covered these stories, thus providing coverage from both major parties’ viewpoints.</span></p><span data-dcnode-id="2940" instrument_node="">
</span><p data-dcnode-id="2934"><span data-dcnode-id="2939" instrument_node="">The chart below (See Table </span><span class="xref" data-dcnode-id="2936"><a data-dcnode-id="2937" href="#T1"><span data-dcnode-id="2938" instrument_node="">1</span></a></span><span data-dcnode-id="2935" instrument_node="">) shows the number of Comments, Retweets, and Likes for the tweets. Some tweets do not have comment data as the screenshots did not include that data and tweets are not accessible due to Trump’s Twitter suspension. These numbers indicate the popularity of the tweets due to the number of interactions.</span></p><span data-dcnode-id="2933" instrument_node="">
