</span></div></div><span data-dcnode-id="2666" instrument_node="">
</span><p data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">While the array of tweets was numerous, the goal was to discover content displaying multiple aspects of Trump’s rhetoric of hate, thereby showing the broad spectrum of Trump’s ire rather than focusing on a particular demographic. Once I obtained the specific tweets for this study, I analyzed them for enthymemes. After determining that all selected tweets functioned as enthymemes, I looked for evidence showing that the audience believed, supplied, and understood the meaning of each enthymeme in order to buy-in to the argument Trump presented. I also assessed the tweets usage of ideographs within Trump’s tweets.</span></p><span data-dcnode-id="2663" instrument_node="">
</span></div><span data-dcnode-id="2661" instrument_node="">
</span><div data-dcnode-id="2619"><span data-dcnode-id="2660" instrument_node="">
</span><h2 class="article-division" data-dcnode-id="2658" id="presidential-use-of-digital-rhetoric"><span data-dcnode-id="2659" instrument_node="">Presidential Use of Digital Rhetoric</span></h2><span data-dcnode-id="2657" instrument_node="">
</span><p data-dcnode-id="2650"><span data-dcnode-id="2656" instrument_node="">While presidential speeches and oratory have long been a focal point of scholarship, the advent of social media has enabled a new method for candidates to connect with and motivate followers. The use of digital tools and the Internet started with Howard Dean in the 2004 election and his campaign’s use of targeted emails, blogs, and Meetup groups to organize supporters. Barack Obama’s campaign continued building on and using the tools and strategies developed by Dean’s campaign to actively engage with supporters (</span><span class="xref" data-dcnode-id="2652"><strong data-dcnode-id="2653"><a class="scroll-link" data-dcnode-id="2654" data-scroll="#B47" href="#B47" id="main-text-B47" rel="footnote"><span data-dcnode-id="2655" instrument_node="">Kreiss, 2012</span></a></strong></span><span data-dcnode-id="2651" instrument_node="">).</span></p><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2642"><span data-dcnode-id="2648" instrument_node="">With the arrival of Twitter in 2006, both Barack Obama and Mitt Romney used Twitter in their 2008 presidential campaigns. Additionally, in this election year, Barack Obama, John McCain, and Mitt Romney developed and utilized websites. Dadas (</span><span class="xref" data-dcnode-id="2644"><strong data-dcnode-id="2645"><a class="scroll-link" data-dcnode-id="2646" data-scroll="#B19" href="#B19" id="main-text-B19" rel="footnote"><span data-dcnode-id="2647" instrument_node="">2008</span></a></strong></span><span data-dcnode-id="2643" instrument_node="">) investigated how effectively these three presidential candidates used their websites to connect with constituents, volunteers, and the American people in order to engage more directly and encourage participation.</span></p><span data-dcnode-id="2641" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2640" instrument_node="">Bernie Sanders was next to harness the power of the Internet through official promotional uses and unofficial grassroots efforts (</span><span class="xref" data-dcnode-id="2636"><strong data-dcnode-id="2637"><a class="scroll-link" data-dcnode-id="2638" data-scroll="#B65" href="#B65" id="main-text-B65" rel="footnote"><span data-dcnode-id="2639" instrument_node="">Penney, 2017</span></a></strong></span><span data-dcnode-id="2635" instrument_node="">). His campaign used common applications like email, but in new ways, the focus being on quantity through smaller donations along with new social media applications such as Reddit (</span><span class="xref" data-dcnode-id="2631"><strong data-dcnode-id="2632"><a class="scroll-link" data-dcnode-id="2633" data-scroll="#B15" href="#B15" id="main-text-B15" rel="footnote"><span data-dcnode-id="2634" instrument_node="">Chadwick &amp; Stromer-Galley, 2016</span></a></strong></span><span data-dcnode-id="2630" instrument_node="">).</span></p><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2621"><span data-dcnode-id="2627" instrument_node="">While presidential candidates used social media in the past, and several used Twitter (Romney, Obama, Clinton), Twitter was the game changer in Trump’s campaign more so than any other candidate, enabling him to “generate free media” (</span><span class="xref" data-dcnode-id="2623"><strong data-dcnode-id="2624"><a class="scroll-link" data-dcnode-id="2625" data-scroll="#B64" href="#B64" id="main-text-B64" rel="footnote"><span data-dcnode-id="2626" instrument_node="">Ott &amp; Dickinson, 2020, p. 12</span></a></strong></span><span data-dcnode-id="2622" instrument_node="">). This free media included coverage of his tweets as well as the tweets themselves. This leads us to today, where most scholarship on presidential digital rhetoric focuses on Trump’s use of Twitter.</span></p><span data-dcnode-id="2620" instrument_node="">
</span></div><span data-dcnode-id="2618" instrument_node="">
</span><div data-dcnode-id="2542"><span data-dcnode-id="2617" instrument_node="">
</span><h2 class="article-division" data-dcnode-id="2615" id="trump-and-online-hate"><span data-dcnode-id="2616" instrument_node="">Trump and Online Hate</span></h2><span data-dcnode-id="2614" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2613" instrument_node="">Trump’s insulting language and lack of civility contained in his tweets is not a new phenomenon. Lee and Lim conducted an analysis of two periods during the 2016 presidential campaign, covering a total of two weeks and found that 10.5% of Trump’s tweets in this timeframe were uncivil, while Hillary Clinton did not have a single uncivil tweet (</span><span class="xref" data-dcnode-id="2609"><strong data-dcnode-id="2610"><a class="scroll-link" data-dcnode-id="2611" data-scroll="#B51" href="#B51" id="main-text-B51" rel="footnote"><span data-dcnode-id="2612" instrument_node="">2016</span></a></strong></span><span data-dcnode-id="2608" instrument_node="">). Trump is well-known for his misogynistic and racist statements through in-person remarks and digital spaces, primarily using Twitter to spread these statements (</span><span class="xref" data-dcnode-id="2604"><strong data-dcnode-id="2605"><a class="scroll-link" data-dcnode-id="2606" data-scroll="#B22" href="#B22" id="main-text-B22" rel="footnote"><span data-dcnode-id="2607" instrument_node="">Eddington, 2018</span></a></strong></span><span data-dcnode-id="2603" instrument_node="">).</span></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2594"><span data-dcnode-id="2600" instrument_node="">However, Trump’s language is not merely offensive, but his rhetoric of hate within digital spaces exerts a great amount of influence on his supporters. During Trump’s 2016 presidential campaign, his rhetoric fueled the action of multiple white nationalist groups. These groups used digital platforms to support Trump’s election campaign including top Neo-Nazi websites: The Daily Stormer and Stormfront (</span><span class="xref" data-dcnode-id="2596"><strong data-dcnode-id="2597"><a class="scroll-link" data-dcnode-id="2598" data-scroll="#B5" href="#B5" id="main-text-B5" rel="footnote"><span data-dcnode-id="2599" instrument_node="">Barnett, 2019</span></a></strong></span><span data-dcnode-id="2595" instrument_node="">). This acceptance and adherence to the beliefs espoused by Trump’s words and the strong promotion and campaigning by these groups on his behalf, makes it difficult for Trump to deny the meaning of the enthymemes within his tweets. The tweets are directed to an audience who respond as expected to the messages.</span></p><span data-dcnode-id="2593" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2592" instrument_node="">Eddington argues that the use of the hashtag, #MakeAmericaGreatAgain (#MAGA) allows online hate groups to unite in a discursive space (</span><span class="xref" data-dcnode-id="2588"><strong data-dcnode-id="2589"><a class="scroll-link" data-dcnode-id="2590" data-scroll="#B22" href="#B22" id="main-text-B22" rel="footnote"><span data-dcnode-id="2591" instrument_node="">2018</span></a></strong></span><span data-dcnode-id="2587" instrument_node="">). While individuals and groups can always connect directly with Trump’s Twitter account, hashtags allow them to find and link with others who are like-minded. Hashtags within Twitter are also considered an affordance, because a hashtag “serves to coordinate large-scale discussion spaces that many can engage in at once” (</span><span class="xref" data-dcnode-id="2583"><strong data-dcnode-id="2584"><a class="scroll-link" data-dcnode-id="2585" data-scroll="#B22" href="#B22" id="main-text-B22" rel="footnote"><span data-dcnode-id="2586" instrument_node="">Eddington, 2018, p. 3</span></a></strong></span><span data-dcnode-id="2582" instrument_node="">). The ability to engage with others, including those not tied to a particular geographical area, is an affordance that encourages activism.</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2579" instrument_node="">The use of social media and digital tools to rally supporters is a common practice used in activism. The affordances (circulation, connection, speed) of social media provide agency and the ability to organize and also allow those wishing to spread hate to do so with ease. What has motivated and worked for activism has also worked in Trump’s favor. Trump stokes fear and converts it to outrage by gathering people together in a united front against what they have envisioned as a wrong or an abuse. The same tactics used by activists from the Arab Spring to Occupy Wall Street are now being used by Trump to remain in power. Castells (</span><span class="xref" data-dcnode-id="2575"><strong data-dcnode-id="2576"><a class="scroll-link" data-dcnode-id="2577" data-scroll="#B12" href="#B12" id="main-text-B12" rel="footnote"><span data-dcnode-id="2578" instrument_node="">2012</span></a></strong></span><span data-dcnode-id="2574" instrument_node="">) states, “But the big bang of a social movement starts with the transformation of emotion into action” (p. 13), and Trump does this well. Trump’s supporters see their American Dream, their legacy as white people, being threatened and taken away, which angers and mobilizes them.</span></p><span data-dcnode-id="2572" instrument_node="">
</span><p data-dcnode-id="2565"><span data-dcnode-id="2571" instrument_node="">The foundation to understanding Trump’s effective use of Twitter starts with what Ott &amp; Dickinson (</span><span class="xref" data-dcnode-id="2567"><strong data-dcnode-id="2568"><a class="scroll-link" data-dcnode-id="2569" data-scroll="#B64" href="#B64" id="main-text-B64" rel="footnote"><span data-dcnode-id="2570" instrument_node="">2020</span></a></strong></span><span data-dcnode-id="2566" instrument_node="">) articulate as style. “For us, style combines Trump’s general manner of speaking with his preferred modality of speaking” (p. 2). They analyze his style of speaking as “an affective appeal of white rage” (p. 2) using Twitter as the means to distribute vitriol against the other. The other being anyone who is not white, heterosexual, able bodied or male who takes away what has been the purview of white masculinity.</span></p><span data-dcnode-id="2564" instrument_node="">
</span><p data-dcnode-id="2552"><span data-dcnode-id="2563" instrument_node="">As previously mentioned, Twitter embodies simplicity, impulsivity, and incivility, characteristics that complement Trump’s style. Simplicity is based on the limited characters Twitter allows. The maximum number of characters was 140, but in November of 2017 Twitter doubled the number to 280. While the tweets analyzed in this paper occurred after 2017, the number of characters still restricts the “capacity to convey complex ideas and concepts” (</span><span class="xref" data-dcnode-id="2559"><strong data-dcnode-id="2560"><a class="scroll-link" data-dcnode-id="2561" data-scroll="#B64" href="#B64" id="main-text-B64" rel="footnote"><span data-dcnode-id="2562" instrument_node="">Ott &amp; Dickinson, 2020, p. 62</span></a></strong></span><span data-dcnode-id="2558" instrument_node="">). Impulsivity stems from the ease and lack of effort needed to tweet. This lack of effort corelates to the inability to discuss difficult or controversial topics effectively. Ott and Dickison elaborate, “Since tweeting requires little effort, it requires little forethought, reflection, or consideration of consequences” (p. 62). Since effort is not required, complex topics are not addressed. Lastly, “Uncivil communication refers to speech that is impolite, insulting, or otherwise offensive” (</span><span class="xref" data-dcnode-id="2554"><strong data-dcnode-id="2555"><a class="scroll-link" data-dcnode-id="2556" data-scroll="#B64" href="#B64" id="main-text-B64" rel="footnote"><span data-dcnode-id="2557" instrument_node="">Ott &amp; Dickinson, 2020, p. 63</span></a></strong></span><span data-dcnode-id="2553" instrument_node="">). Twitter’s informality and lack of personal interaction are two attributes that contribute to incivility as formal communication is more civil and people often will not say offensive things in person (Ott &amp; Dickinson, 2021). These aspects contribute to Trump’s appeal and use of white rage to engage his followers through his use of bombastic enthymemes. The tweets examined in this paper exemplify this practice by Trump.</span></p><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2544"><span data-dcnode-id="2550" instrument_node="">Joshua Gunn (</span><span class="xref" data-dcnode-id="2546"><strong data-dcnode-id="2547"><a class="scroll-link" data-dcnode-id="2548" data-scroll="#B29" href="#B29" id="main-text-B29" rel="footnote"><span data-dcnode-id="2549" instrument_node="">2018</span></a></strong></span><span data-dcnode-id="2545" instrument_node="">) labels Trump’s rhetoric and style as perverse. While many may be repulsed by this perverse style, Trump’s followers are entranced by it. In contemplating this attraction Gunn suggests we start, “with a consideration of perversity as a genre that invites affective or emotional investment” (p. 173). Thus, Trump’s perverse rhetoric connects through emotionally charged hyperboles wrapped in white rage.</span></p><span data-dcnode-id="2543" instrument_node="">
</span></div><span data-dcnode-id="2541" instrument_node="">
</span><div data-dcnode-id="2495"><span data-dcnode-id="2540" instrument_node="">
</span><h2 class="article-division" data-dcnode-id="2538" id="trumps-use-of-twitter-and-the-enthymeme"><span data-dcnode-id="2539" instrument_node="">Trump’s use of Twitter and the Enthymeme</span></h2><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2536" instrument_node="">What differentiates Trump from past presidents is his prolific use of Twitter to divide the American people, not unite them. When the nation needed a leader to bring them together in 2020, during both a global pandemic and the fight against racial injustice fueled by George Floyd’s murder, Trump turned to Twitter to stoke the fires of intolerance. Trump encourages white rage as “Trump locates in his audience their virtue as passive marginalized subjects. He emphasizes how they are forgotten, demoralized, attacked, and dispossessed of their birth rights. It is for these reasons that they are entitled to their revenge” (</span><span class="xref" data-dcnode-id="2532"><strong data-dcnode-id="2533"><a class="scroll-link" data-dcnode-id="2534" data-scroll="#B42" href="#B42" id="main-text-B42" rel="footnote"><span data-dcnode-id="2535" instrument_node="">Kelly, 2019, p. 19</span></a></strong></span><span data-dcnode-id="2531" instrument_node="">). His rhetoric fuels hate and creates an Us (Trump supporters) versus Them (other Americans), thus pitting Americans versus Americans.</span></p><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2513"><span data-dcnode-id="2528" instrument_node="">The use of Trump’s enthymemes as a tool in connecting with his supporters and sending messages of hate also gives him the ability to deny the hate implicit in the message. As McCaughey (</span><span class="xref" data-dcnode-id="2524"><strong data-dcnode-id="2525"><a class="scroll-link" data-dcnode-id="2526" data-scroll="#B54" href="#B54" id="main-text-B54" rel="footnote"><span data-dcnode-id="2527" instrument_node="">2020</span></a></strong></span><span data-dcnode-id="2523" instrument_node="">), a former lieutenant governor of New York, states, “CNN accused the president of fearmongering ‘white suburban voters.’ But it’s CNN that is being racist — by assuming that only whites own homes in the suburbs” (para. 13). Trump directly links to McCaughey’s opinion piece in the tweet in Figure </span><span class="xref" data-dcnode-id="2520"><a data-dcnode-id="2521" href="#F8"><span data-dcnode-id="2522" instrument_node="">8</span></a></span><span data-dcnode-id="2519" instrument_node=""> in an attempt to deflect from his racist actions. McAlister (</span><span class="xref" data-dcnode-id="2515"><strong data-dcnode-id="2516"><a class="scroll-link" data-dcnode-id="2517" data-scroll="#B53" href="#B53" id="main-text-B53" rel="footnote"><span data-dcnode-id="2518" instrument_node="">2018</span></a></strong></span><span data-dcnode-id="2514" instrument_node="">) discusses the advantage of Twitter in constructing enthymemes for Trump, “The enthymeme’s ability to bury premises that may be both unutterable and unchallenged for a popular audience is crucial when considering how Trump’s campaign made use of Twitter’s condensed format to advance assertations in place of arguments” (p. 7). The character limitation of Twitter inherently creates missing parts by limiting the length of the message, thus allowing the audience to fill in the parts and construct the meaning.</span></p><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2505"><span data-dcnode-id="2511" instrument_node="">Trump’s supporters also take advantage of the cover enthymemes provide. Hawdon et al. (</span><span class="xref" data-dcnode-id="2507"><strong data-dcnode-id="2508"><a class="scroll-link" data-dcnode-id="2509" data-scroll="#B33" href="#B33" id="main-text-B33" rel="footnote"><span data-dcnode-id="2510" instrument_node="">2020</span></a></strong></span><span data-dcnode-id="2506" instrument_node="">), declare “…enthymemes allow right-wing extremists to wear their support for Trump like a reversible jacket, changing the direction to suit the setting and audience while maintaining a public-facing persona by feigning plausible deniability of their ideological leanings” (p. 11). If right-wing extremists are with co-workers at the employee cafeteria, they encounter a different audience and location than attending a Trump rally with like-minded individuals.</span></p><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2497"><span data-dcnode-id="2503" instrument_node="">Words are not the only possible component of enthymemes. Hashtags can play the role of enthymemes as well. It can be argued that Trump’s hashtags, #MAGA and #MakeAmericaGreatAgain, work as enthymemes in tweets because “Make America Great Again” returns us to a time when white men were in charge. “His campaign message resonated with white supremacists across the U.S., who hoped that an election victory would ‘make America great again’ by reinstalling white power” (</span><span class="xref" data-dcnode-id="2499"><strong data-dcnode-id="2500"><a class="scroll-link" data-dcnode-id="2501" data-scroll="#B66" href="#B66" id="main-text-B66" rel="footnote"><span data-dcnode-id="2502" instrument_node="">Perry et al., 2019, p. 54</span></a></strong></span><span data-dcnode-id="2498" instrument_node="">).</span></p><span data-dcnode-id="2496" instrument_node="">
</span></div><span data-dcnode-id="2494" instrument_node="">
</span><div data-dcnode-id="2295"><span data-dcnode-id="2493" instrument_node="">
</span><h2 class="article-division" data-dcnode-id="2491" id="tweets-misogyny-racism-and-classism"><span data-dcnode-id="2492" instrument_node="">Tweets: Misogyny, Racism, and Classism</span></h2><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2484"><span data-dcnode-id="2489" instrument_node="">Trump’s tweet, by referring to the Obama era Affirmatively Furthering Fair Housing rule to frighten suburban dwellers into voting for him (See Figure </span><span class="xref" data-dcnode-id="2486"><a data-dcnode-id="2487" href="#F8"><span data-dcnode-id="2488" instrument_node="">8</span></a></span><span data-dcnode-id="2485" instrument_node="">), uses enthymemes to not only invoke racism, but misogyny. His tweet also embeds an ideograph within an enthymeme to establish an understanding of what is at stake. The audience co-creates the meaning through supplying the missing arguments of the tweet, as well as forming a mutual understanding of what the ideograph, The American Dream, contextually means.</span></p><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2452"><span data-dcnode-id="2482" instrument_node="">Trump (</span><span class="xref" data-dcnode-id="2478"><strong data-dcnode-id="2479"><a class="scroll-link" data-dcnode-id="2480" data-scroll="#B80" href="#B80" id="main-text-B80" rel="footnote"><span data-dcnode-id="2481" instrument_node="">2020d</span></a></strong></span><span data-dcnode-id="2477" instrument_node="">) starts his tweet (See Figure </span><span class="xref" data-dcnode-id="2474"><a data-dcnode-id="2475" href="#F8"><span data-dcnode-id="2476" instrument_node="">8</span></a></span><span data-dcnode-id="2473" instrument_node="">) by addressing his stated audience, “The Suburban Housewives of America,” which beckons to a bygone era where women stayed home and cared for the children and home. This is ironic considering, as of December 2019, American women represented the majority of the workforce at 50.04% (</span><span class="xref" data-dcnode-id="2469"><strong data-dcnode-id="2470"><a class="scroll-link" data-dcnode-id="2471" data-scroll="#B50" href="#B50" id="main-text-B50" rel="footnote"><span data-dcnode-id="2472" instrument_node="">Law, 2020, para. 1</span></a></strong></span><span data-dcnode-id="2468" instrument_node="">) (although this statistic eliminates self-employed and farm workers). Therefore, perhaps Trump should be more concerned with the suburban househusband voting for him. This retro vision of women as stay-at-home housewives is not in touch with the reality of 2020, although the pandemic has played a role (</span><span class="xref" data-dcnode-id="2464"><strong data-dcnode-id="2465"><a class="scroll-link" data-dcnode-id="2466" data-scroll="#B25" href="#B25" id="main-text-B25" rel="footnote"><span data-dcnode-id="2467" instrument_node="">Gershon, 2020</span></a></strong></span><span data-dcnode-id="2463" instrument_node="">; </span><span class="xref" data-dcnode-id="2459"><strong data-dcnode-id="2460"><a class="scroll-link" data-dcnode-id="2461" data-scroll="#B28" href="#B28" id="main-text-B28" rel="footnote"><span data-dcnode-id="2462" instrument_node="">Guilford &amp; Cambon, 2020</span></a></strong></span><span data-dcnode-id="2458" instrument_node="">) in women’s participation in the labor force in a myriad of ways. Trump needs his supporters to agree that the suburban housewife still exists. He combines misogyny with racism as the suburbs are where white people supposedly live. Most past uses of race have been directed towards white men and their “losses” that occur when women or minorities gain (</span><span class="xref" data-dcnode-id="2454"><strong data-dcnode-id="2455"><a class="scroll-link" data-dcnode-id="2456" data-scroll="#B53" href="#B53" id="main-text-B53" rel="footnote"><span data-dcnode-id="2457" instrument_node="">McAlister, 2018</span></a></strong></span><span data-dcnode-id="2453" instrument_node="">). This tweet uses race, but is directed more specifically to white women in the suburbs who are housewives.</span></p><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2445"><span data-dcnode-id="2450" instrument_node="">However, there still exist suburban housewives who agree with Trump as seen in Figure </span><span class="xref" data-dcnode-id="2447"><a data-dcnode-id="2448" href="#F10"><span data-dcnode-id="2449" instrument_node="">10</span></a></span><span data-dcnode-id="2446" instrument_node="">. Judy Reppart does not specify the type of housewife she is, but states she is one and will be voting for Trump. Her reply exemplifies the simplicity of Twitter as her response is short and concise in meaning.</span></p><span data-dcnode-id="2444" instrument_node="">
</span><div data-dcnode-id="2441" id="F9"><a data-dcnode-id="2442" data-featherlight="jhs-17-1-196-g9.png" href="#"><img alt="" data-dcnode-id="2443" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g9.png&amp;raw"></a></div><span data-dcnode-id="2440" instrument_node="">
</span><div class="caption" data-dcnode-id="2424"><p class="fig-download" data-dcnode-id="2432"><i class="fa fa-download" data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">&nbsp;</span></i><a data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g9.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="2437" instrument_node="">Original</span></a><span data-dcnode-id="2435" instrument_node=""> | </span><a data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g9.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="2434" instrument_node="">PPT</span></a></p><span data-dcnode-id="2431" instrument_node="">
</span><span class="label" data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Figure 9&nbsp; </span></span><span class="capture-id" data-dcnode-id="2426"><p data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Trump’s Tweet About Suburban Housewives Voting for Him.</span></p></span><span data-dcnode-id="2425" instrument_node="">
</span></div><span data-dcnode-id="2423" instrument_node="">
</span><div data-dcnode-id="2420" id="F10"><a data-dcnode-id="2421" data-featherlight="jhs-17-1-196-g10.png" href="#"><img alt="" data-dcnode-id="2422" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g10.png&amp;raw"></a></div><span data-dcnode-id="2419" instrument_node="">
</span><div class="caption" data-dcnode-id="2403"><p class="fig-download" data-dcnode-id="2411"><i class="fa fa-download" data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">&nbsp;</span></i><a data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g10.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="2416" instrument_node="">Original</span></a><span data-dcnode-id="2414" instrument_node=""> | </span><a data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g10.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="2413" instrument_node="">PPT</span></a></p><span data-dcnode-id="2410" instrument_node="">
</span><span class="label" data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Figure 10&nbsp; </span></span><span class="capture-id" data-dcnode-id="2405"><p data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Housewife Tweet Agreeing with Trump.</span></p></span><span data-dcnode-id="2404" instrument_node="">
</span></div><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2401" instrument_node="">The Obama era Affirmatively Furthering Fair Housing (AFFH) rule required cities receiving federal housing funds to address bias and racial inequities in housing (</span><span class="xref" data-dcnode-id="2397"><strong data-dcnode-id="2398"><a class="scroll-link" data-dcnode-id="2399" data-scroll="#B48" href="#B48" id="main-text-B48" rel="footnote"><span data-dcnode-id="2400" instrument_node="">Kurtzleben, 2020</span></a></strong></span><span data-dcnode-id="2396" instrument_node="">). Trump invokes his rescinding of the AFFH as the action resulting in the return of the suburbs to the idyllic peaceful way of living without low-income housing or people of color in the neighborhood. Trump’s tweet (</span><span class="xref" data-dcnode-id="2392"><strong data-dcnode-id="2393"><a class="scroll-link" data-dcnode-id="2394" data-scroll="#B81" href="#B81" id="main-text-B81" rel="footnote"><span data-dcnode-id="2395" instrument_node="">2020e</span></a></strong></span><span data-dcnode-id="2391" instrument_node="">) states, “They want safety &amp; are thrilled that I ended the long running program where low-income people would invade their neighborhood” (See Figure </span><span class="xref" data-dcnode-id="2388"><a data-dcnode-id="2389" href="#F9"><span data-dcnode-id="2390" instrument_node="">9</span></a></span><span data-dcnode-id="2387" instrument_node="">). Trump’s use of the word invade also signals that low-income people moving to the suburbs are committing an act of aggression against the current residents. His message is clear and a classic Us (white suburban Americans) versus Them (low-income people of color).</span></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2379"><span data-dcnode-id="2384" instrument_node="">Clearly Trump’s followers agree the suburbs would be destroyed through a loss in property values (See Figure </span><span class="xref" data-dcnode-id="2381"><a data-dcnode-id="2382" href="#F11"><span data-dcnode-id="2383" instrument_node="">11</span></a></span><span data-dcnode-id="2380" instrument_node="">). Roy Williams reverts to incivility as well through name calling, “Dementia Joe.” The impulsivity in writing this tweet is evident via the typo “of” instead of “if.”</span></p><span data-dcnode-id="2378" instrument_node="">
</span><div data-dcnode-id="2375" id="F11"><a data-dcnode-id="2376" data-featherlight="jhs-17-1-196-g11.png" href="#"><img alt="" data-dcnode-id="2377" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g11.png&amp;raw"></a></div><span data-dcnode-id="2374" instrument_node="">
</span><div class="caption" data-dcnode-id="2358"><p class="fig-download" data-dcnode-id="2366"><i class="fa fa-download" data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">&nbsp;</span></i><a data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g11.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="2371" instrument_node="">Original</span></a><span data-dcnode-id="2369" instrument_node=""> | </span><a data-dcnode-id="2367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g11.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="2368" instrument_node="">PPT</span></a></p><span data-dcnode-id="2365" instrument_node="">
</span><span class="label" data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Figure 11&nbsp; </span></span><span class="capture-id" data-dcnode-id="2360"><p data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Tweet Agreeing with Trump about Housing Prices.</span></p></span><span data-dcnode-id="2359" instrument_node="">
</span></div><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2336"><span data-dcnode-id="2356" instrument_node="">To set up the theme of Us versus Them, Trump uses an ideograph to situate the enthymeme in this tweet (See Figure </span><span class="xref" data-dcnode-id="2353"><a data-dcnode-id="2354" href="#F8"><span data-dcnode-id="2355" instrument_node="">8</span></a></span><span data-dcnode-id="2352" instrument_node="">) for his supporters. The phrase, The American Dream, as an ideograph, correlates to a time in the past where white men were in charge, women were housewives, and the American Dream consisted of a house in the suburbs. What comprises the American Dream has ranged from “religious freedom to a house in the suburbs” (</span><span class="xref" data-dcnode-id="2348"><strong data-dcnode-id="2349"><a class="scroll-link" data-dcnode-id="2350" data-scroll="#B35" href="#B35" id="main-text-B35" rel="footnote"><span data-dcnode-id="2351" instrument_node="">Hochschild, 1996, p. 15</span></a></strong></span><span data-dcnode-id="2347" instrument_node="">), to the opportunities available for all willing to work hard to earn success (</span><span class="xref" data-dcnode-id="2343"><strong data-dcnode-id="2344"><a class="scroll-link" data-dcnode-id="2345" data-scroll="#B7" href="#B7" id="main-text-B7" rel="footnote"><span data-dcnode-id="2346" instrument_node="">Bormann, 1985</span></a></strong></span><span data-dcnode-id="2342" instrument_node="">). “Biden will destroy your neighborhood and your American Dream. I will preserve it and make it even better!” This is Trump (</span><span class="xref" data-dcnode-id="2338"><strong data-dcnode-id="2339"><a class="scroll-link" data-dcnode-id="2340" data-scroll="#B80" href="#B80" id="main-text-B80" rel="footnote"><span data-dcnode-id="2341" instrument_node="">2020d</span></a></strong></span><span data-dcnode-id="2337" instrument_node="">) implying that a vote for him will keep the American Dream and suburbs intact.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2328"><span data-dcnode-id="2334" instrument_node="">Furthermore, the reference to low-income people as invaders expresses an additional element of Trump’s rhetoric to his supporters – classism. Trump plays on people’s fears and prejudices, that low-income housing brings undesirables. As people of poverty move into the neighborhood, they bring crime, thus destroying the neighborhood and the American Dream. Along with financial success being viewed as an indicator of achieving the American Dream (</span><span class="xref" data-dcnode-id="2330"><strong data-dcnode-id="2331"><a class="scroll-link" data-dcnode-id="2332" data-scroll="#B40" href="#B40" id="main-text-B40" rel="footnote"><span data-dcnode-id="2333" instrument_node="">Kasser &amp; Ryan, 1993</span></a></strong></span><span data-dcnode-id="2329" instrument_node="">), this viewpoint buttresses the myth that low-income people have not worked hard. Therefore, they do not deserve the reward of achieving the American Dream and living in the suburbs. Trump’s message is that if low-income people would like to live in the suburbs, they too can partake in the hard work necessary to achieve these goals.</span></p><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2321"><span data-dcnode-id="2326" instrument_node="">Trump’s message echoes loud and clear (See Figure </span><span class="xref" data-dcnode-id="2323"><a data-dcnode-id="2324" href="#F12"><span data-dcnode-id="2325" instrument_node="">12</span></a></span><span data-dcnode-id="2322" instrument_node="">) as shown by this response and the incivility conveyed through its informality, word choice, and offensive stereotypes.</span></p><span data-dcnode-id="2320" instrument_node="">
</span><div data-dcnode-id="2317" id="F12"><a data-dcnode-id="2318" data-featherlight="jhs-17-1-196-g12.png" href="#"><img alt="" data-dcnode-id="2319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g12.png&amp;raw"></a></div><span data-dcnode-id="2316" instrument_node="">
</span><div class="caption" data-dcnode-id="2300"><p class="fig-download" data-dcnode-id="2308"><i class="fa fa-download" data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">&nbsp;</span></i><a data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g12.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="2313" instrument_node="">Original</span></a><span data-dcnode-id="2311" instrument_node=""> | </span><a data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g12.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="2310" instrument_node="">PPT</span></a></p><span data-dcnode-id="2307" instrument_node="">
</span><span class="label" data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">Figure 12&nbsp; </span></span><span class="capture-id" data-dcnode-id="2302"><p data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Tweet Agreeing with Trump about Suburban Low-Income Housing.</span></p></span><span data-dcnode-id="2301" instrument_node="">
</span></div><span data-dcnode-id="2299" instrument_node="">
</span><p data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">In these two tweets, Trump claims he will protect and keep the suburbs safe for the suburban housewife and that the American Dream will remain intact. This protection and safety are dependent on Trump being reelected as Biden would bring an end to the American Dream by allowing low-income people to move in, ruining the neighborhood with disruption and crime.</span></p><span data-dcnode-id="2296" instrument_node="">
</span></div><span data-dcnode-id="2294" instrument_node="">
</span><div data-dcnode-id="2142"><span data-dcnode-id="2293" instrument_node="">
</span><h2 class="article-division" data-dcnode-id="2291" id="tweets-racism-and-misogyny"><span data-dcnode-id="2292" instrument_node="">Tweets: Racism and Misogyny</span></h2><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2289" instrument_node="">Trump’s tweet thread (See Figure </span><span class="xref" data-dcnode-id="2286"><a data-dcnode-id="2287" href="#F13"><span data-dcnode-id="2288" instrument_node="">13</span></a></span><span data-dcnode-id="2285" instrument_node="">) is directed at Representatives Ilhan Omar of Minnesota, Alexandria Ocasio-Cortez of New York, Ayanna Pressley of Massachusetts, and Rashida Tlaib of Michigan. Ocasio-Cortez, Pressley, and Tlaib were all born in the United States and Omar was born in Somalia but became a United States citizen in 2000. Trump tells these four women of color, all of whom are United States citizens and elected members of Congress, to go back to where they came from. This command upholds a long-standing American racist trope (</span><span class="xref" data-dcnode-id="2281"><strong data-dcnode-id="2282"><a class="scroll-link" data-dcnode-id="2283" data-scroll="#B21" href="#B21" id="main-text-B21" rel="footnote"><span data-dcnode-id="2284" instrument_node="">Dwyer, 2019</span></a></strong></span><span data-dcnode-id="2280" instrument_node="">) and can be considered harassment and discrimination by the Equal Employment Opportunity Commission (</span><span class="xref" data-dcnode-id="2276"><strong data-dcnode-id="2277"><a class="scroll-link" data-dcnode-id="2278" data-scroll="#B23" href="#B23" id="main-text-B23" rel="footnote"><span data-dcnode-id="2279" instrument_node="">EEOC, n.d</span></a></strong></span><span data-dcnode-id="2275" instrument_node="">.). Additionally, Ocasio-Cortez is Puerto Rican (her mother was born in Puerto Rico and her father was born in the United States to Puerto Rican parents) and Puerto Ricans are United States citizens. Readers can conclude from Trump’s tweet that Puerto Ricans are second-class citizens. It has also been reported that Trump denigrated Puerto Rico, calling it dirty and poor after the destruction of Hurricane Maria (</span><span class="xref" data-dcnode-id="2271"><strong data-dcnode-id="2272"><a class="scroll-link" data-dcnode-id="2273" data-scroll="#B62" href="#B62" id="main-text-B62" rel="footnote"><span data-dcnode-id="2274" instrument_node="">Ocasio, 2020</span></a></strong></span><span data-dcnode-id="2270" instrument_node="">).</span></p><span data-dcnode-id="2268" instrument_node="">
</span><div data-dcnode-id="2265" id="F13"><a data-dcnode-id="2266" data-featherlight="jhs-17-1-196-g13.png" href="#"><img alt="" data-dcnode-id="2267" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g13.png&amp;raw"></a></div><span data-dcnode-id="2264" instrument_node="">
</span><div class="caption" data-dcnode-id="2248"><p class="fig-download" data-dcnode-id="2256"><i class="fa fa-download" data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">&nbsp;</span></i><a data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g13.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="2261" instrument_node="">Original</span></a><span data-dcnode-id="2259" instrument_node=""> | </span><a data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g13.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="2258" instrument_node="">PPT</span></a></p><span data-dcnode-id="2255" instrument_node="">
</span><span class="label" data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">Figure 13&nbsp; </span></span><span class="capture-id" data-dcnode-id="2250"><p data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Thread Telling Four Members of Congress to Go Back Where They Came From.</span></p></span><span data-dcnode-id="2249" instrument_node="">
</span></div><span data-dcnode-id="2247" instrument_node="">
</span><p data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Trump indicates these four women are not considered real United States citizens and, therefore, not eligible to criticize the government through their freedom of speech. These tweets are ironic as they ignore the basic tenets of our democracy and the three branches of government established by Article 1 of the Constitution, whereby the Legislative Branch is granted the sole authority to enact legislation. As legislators, these women help create the laws our government and citizens follow. Yet in his tweet, Trump attacks the women for telling the people of the United States how our government is to be run.</span></p><span data-dcnode-id="2244" instrument_node="">
</span><p data-dcnode-id="2238"><span data-dcnode-id="2243" instrument_node="">This response to Trump’s thread (See Figure </span><span class="xref" data-dcnode-id="2240"><a data-dcnode-id="2241" href="#F14"><span data-dcnode-id="2242" instrument_node="">14</span></a></span><span data-dcnode-id="2239" instrument_node="">) shows how his followers believe these women are not citizens of the United States and are considered immigrants. The tweet’s insulting comments showcase racist sentiments by claiming “white christian patriots” are the “backbone of our highly advanced western civilisation.”</span></p><span data-dcnode-id="2237" instrument_node="">
</span><div data-dcnode-id="2234" id="F14"><a data-dcnode-id="2235" data-featherlight="jhs-17-1-196-g14.png" href="#"><img alt="" data-dcnode-id="2236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g14.png&amp;raw"></a></div><span data-dcnode-id="2233" instrument_node="">
</span><div class="caption" data-dcnode-id="2217"><p class="fig-download" data-dcnode-id="2225"><i class="fa fa-download" data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">&nbsp;</span></i><a data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g14.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="2230" instrument_node="">Original</span></a><span data-dcnode-id="2228" instrument_node=""> | </span><a data-dcnode-id="2226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g14.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="2227" instrument_node="">PPT</span></a></p><span data-dcnode-id="2224" instrument_node="">
</span><span class="label" data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Figure 14&nbsp; </span></span><span class="capture-id" data-dcnode-id="2219"><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Response Agreeing with Trump About the Congresswomen.</span></p></span><span data-dcnode-id="2218" instrument_node="">
</span></div><span data-dcnode-id="2216" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Trump’s (2019) start to the second part of the tweet, “…and viciously telling the people of the United States” also builds on the theme of second-class citizenship by implying that the four representatives are not part of the United States, that they are not real citizens, and these four Congressional members are not welcome. The four representatives are portrayed as the “Them,” and are against the “people of the United States,” the “Us.”</span></p><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2212" instrument_node="">Misogyny is found in this same portion of the tweet, “now loudly……….and viciously telling the people of the United States,” as Trump (2019) attributes the Representatives’ conduct and speech with these negative descriptions. This allows the audience to fill in the blanks of what the words “loudly” and “viciously” mean, with another racist/misogynistic trope, that of the angry black women (</span><span class="xref" data-dcnode-id="2208"><strong data-dcnode-id="2209"><a class="scroll-link" data-dcnode-id="2210" data-scroll="#B3" href="#B3" id="main-text-B3" rel="footnote"><span data-dcnode-id="2211" instrument_node="">Adams &amp; Lott, 2019</span></a></strong></span><span data-dcnode-id="2207" instrument_node="">, </span><span class="xref" data-dcnode-id="2203"><strong data-dcnode-id="2204"><a class="scroll-link" data-dcnode-id="2205" data-scroll="#B72" href="#B72" id="main-text-B72" rel="footnote"><span data-dcnode-id="2206" instrument_node="">Scott, 2013</span></a></strong></span><span data-dcnode-id="2202" instrument_node="">).</span></p><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2199" instrument_node="">While Trump insults a wide variety of people from different demographics, including both men and women, Republicans and Democrats, blacks and whites, his vitriol is excessively directed to these four women when compared to other members of Congress. National Public Radio (NPR) conducted a study of every Trump tweet that referenced a member of Congress from Inauguration Day until October 4, 2019, for a total of 700 tweets. NPR discovered that “While Trump has always spread his insults far and wide, the volume of personal insults and extreme language that he directed at the so-called ‘squad’ of four Democratic Congresswomen and African American Rep. Elijah Cummings over the summer stood out” (</span><span class="xref" data-dcnode-id="2195"><strong data-dcnode-id="2196"><a class="scroll-link" data-dcnode-id="2197" data-scroll="#B70" href="#B70" id="main-text-B70" rel="footnote"><span data-dcnode-id="2198" instrument_node="">Rascoe, 2019, para. 4</span></a></strong></span><span data-dcnode-id="2194" instrument_node="">). While it is unclear whether these tweets contain more of a racist or misogynist motivation or a combination of the two, it is obvious these four women of color are special targets of Trump because of their gender and race as Paul Elliot Johnson (</span><span class="xref" data-dcnode-id="2190"><strong data-dcnode-id="2191"><a class="scroll-link" data-dcnode-id="2192" data-scroll="#B39" href="#B39" id="main-text-B39" rel="footnote"><span data-dcnode-id="2193" instrument_node="">2017</span></a></strong></span><span data-dcnode-id="2189" instrument_node="">) states, “Trump’s rhetoric works by circulating gendered and raced accounts of American national identity” (p. 246).</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2176"><span data-dcnode-id="2186" instrument_node="">When Trump tweets or speaks racist statements or sentiments, he is generally questioned or asked to deny the racist intent. At times he does, or his spokespeople do, but other times Trump does not deny the racist meaning and intent of his words. When questioned about the racism behind his tweets against the four representatives, Trump responded, “It doesn’t concern me because many people agree with me,’ Trump said at the White House, ‘A lot of people love it, by the way’” (</span><span class="xref" data-dcnode-id="2182"><strong data-dcnode-id="2183"><a class="scroll-link" data-dcnode-id="2184" data-scroll="#B59" href="#B59" id="main-text-B59" rel="footnote"><span data-dcnode-id="2185" instrument_node="">Miller et al., 2019, para. 3</span></a></strong></span><span data-dcnode-id="2181" instrument_node="">). He is right that many people do agree with him (See Figure </span><span class="xref" data-dcnode-id="2178"><a data-dcnode-id="2179" href="#F15"><span data-dcnode-id="2180" instrument_node="">15</span></a></span><span data-dcnode-id="2177" instrument_node="">).</span></p><span data-dcnode-id="2175" instrument_node="">
</span><div data-dcnode-id="2172" id="F15"><a data-dcnode-id="2173" data-featherlight="jhs-17-1-196-g15.png" href="#"><img alt="" data-dcnode-id="2174" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g15.png&amp;raw"></a></div><span data-dcnode-id="2171" instrument_node="">
</span><div class="caption" data-dcnode-id="2155"><p class="fig-download" data-dcnode-id="2163"><i class="fa fa-download" data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">&nbsp;</span></i><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g15.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="2168" instrument_node="">Original</span></a><span data-dcnode-id="2166" instrument_node=""> | </span><a data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g15.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="2165" instrument_node="">PPT</span></a></p><span data-dcnode-id="2162" instrument_node="">
</span><span class="label" data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Figure 15&nbsp; </span></span><span class="capture-id" data-dcnode-id="2157"><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Another Response Agreeing with Trump About the Congresswomen.</span></p></span><span data-dcnode-id="2156" instrument_node="">
</span></div><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">It is difficult for Trump to claim he is not racist when he directly states that the racism in his tweet does not concern him because people agree with his statements, and not just agree, but passionately engage and accept this racism against their fellow Americans. If Trump did not want the label of a racist, he would address the issue, clarify his meaning, and disavow the people agreeing and loving the sentiment. It is important to note as well that Trump states, “many people agree with me,” and not “many people agree with the tweet/statement.” This acknowledges ownership of his meaning behind the tweets, and as rhetor, he sends this message to his followers who understand the meaning and agree with Trump.</span></p><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2150" instrument_node="">The Us versus Them theme Trump promotes through his use of enthymemes in these tweets fits nicely into the ideograph of the American Dream envisioned by Trump and his supporters. The four representatives labeled as having come from other countries and are trying to tell the American government and citizens how “…our government is to be run” (</span><span class="xref" data-dcnode-id="2146"><strong data-dcnode-id="2147"><a class="scroll-link" data-dcnode-id="2148" data-scroll="#B76" href="#B76" id="main-text-B76" rel="footnote"><span data-dcnode-id="2149" instrument_node="">Trump, 2019</span></a></strong></span><span data-dcnode-id="2145" instrument_node="">), signals an implicit understanding that the four are not eligible for, or part of the American Dream. Trump (2019) reinforces this by suggesting they leave, “Why don’t they go back and help fix the totally broken and crime infested places from which they came.” The missing information supplied by Trump’s audience is that the four representatives are not true Americans and therefore do not deserve to be here. By being here, they steal the American Dream from true Americans who have worked hard to achieve its ideals and live in the suburbs.</span></p><span data-dcnode-id="2143" instrument_node="">
</span></div><span data-dcnode-id="2141" instrument_node="">
</span><div data-dcnode-id="1862"><span data-dcnode-id="2140" instrument_node="">
</span><h2 class="article-division" data-dcnode-id="2138" id="tweets-advocating-physical-violence"><span data-dcnode-id="2139" instrument_node="">Tweets: Advocating Physical Violence</span></h2><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2136" instrument_node="">Trump’s message of hate can also be viewed in his calls to violence. Trump uses the enthymeme to encourage violence conducted by Americans against fellow Americans. The ideograph plays a role connecting “liberty” or the act of “liberating” to violence. The founding of The United States resulted from rebellion, fighting, and violence against the British. The United States has also sent the military to many places around the world to protect liberty and freedom (e.g., Korea, Vietnam, Iraq) so there is a connection between liberating and fighting. Trump’s followers often equate the governmental health restrictions as an infringement upon their liberty and people should fight back against these restrictions. Wearing a mask is viewed as an infringement (See Figure </span><span class="xref" data-dcnode-id="2133"><a data-dcnode-id="2134" href="#F19"><span data-dcnode-id="2135" instrument_node="">19</span></a></span><span data-dcnode-id="2132" instrument_node="">) as masks are “stinkin’ masks” and Minnesotans should protest and not wear masks while protesting.</span></p><span data-dcnode-id="2130" instrument_node="">
</span><p data-dcnode-id="2098"><span data-dcnode-id="2129" instrument_node="">The group of three tweets above (See Figures </span><span class="xref" data-dcnode-id="2126"><a data-dcnode-id="2127" href="#F16"><span data-dcnode-id="2128" instrument_node="">16</span></a></span><span data-dcnode-id="2125" instrument_node="">, </span><span class="xref" data-dcnode-id="2122"><a data-dcnode-id="2123" href="#F17"><span data-dcnode-id="2124" instrument_node="">17</span></a></span><span data-dcnode-id="2121" instrument_node="">, </span><span class="xref" data-dcnode-id="2118"><a data-dcnode-id="2119" href="#F18"><span data-dcnode-id="2120" instrument_node="">18</span></a></span><span data-dcnode-id="2117" instrument_node="">) relies heavily on enthymemes to create their co-constructed meaning. The first two tweets contain only two words, “Liberate Minnesota” (</span><span class="xref" data-dcnode-id="2113"><strong data-dcnode-id="2114"><a class="scroll-link" data-dcnode-id="2115" data-scroll="#B77" href="#B77" id="main-text-B77" rel="footnote"><span data-dcnode-id="2116" instrument_node="">Trump, 2020a</span></a></strong></span><span data-dcnode-id="2112" instrument_node="">), and “Liberate Michigan” (</span><span class="xref" data-dcnode-id="2108"><strong data-dcnode-id="2109"><a class="scroll-link" data-dcnode-id="2110" data-scroll="#B78" href="#B78" id="main-text-B78" rel="footnote"><span data-dcnode-id="2111" instrument_node="">Trump, 2020b</span></a></strong></span><span data-dcnode-id="2107" instrument_node="">). The third tweet contains twelve words, providing additional meaning – “Liberate Virginia, and save your great 2</span><sup data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">nd</span></sup><span data-dcnode-id="2104" instrument_node=""> amendment. It is under siege!” (</span><span class="xref" data-dcnode-id="2100"><strong data-dcnode-id="2101"><a class="scroll-link" data-dcnode-id="2102" data-scroll="#B79" href="#B79" id="main-text-B79" rel="footnote"><span data-dcnode-id="2103" instrument_node="">Trump, 2020c</span></a></strong></span><span data-dcnode-id="2099" instrument_node="">).</span></p><span data-dcnode-id="2097" instrument_node="">
</span><div data-dcnode-id="2094" id="F16"><a data-dcnode-id="2095" data-featherlight="jhs-17-1-196-g16.png" href="#"><img alt="" data-dcnode-id="2096" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g16.png&amp;raw"></a></div><span data-dcnode-id="2093" instrument_node="">
</span><div class="caption" data-dcnode-id="2077"><p class="fig-download" data-dcnode-id="2085"><i class="fa fa-download" data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">&nbsp;</span></i><a data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g16.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="2090" instrument_node="">Original</span></a><span data-dcnode-id="2088" instrument_node=""> | </span><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g16.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="2087" instrument_node="">PPT</span></a></p><span data-dcnode-id="2084" instrument_node="">

</span><div class="caption" data-dcnode-id="2035"><p class="fig-download" data-dcnode-id="2043"><i class="fa fa-download" data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">&nbsp;</span></i><a data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g18.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="2048" instrument_node="">Original</span></a><span data-dcnode-id="2046" instrument_node=""> | </span><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g18.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="2045" instrument_node="">PPT</span></a></p><span data-dcnode-id="2042" instrument_node="">
</span><span class="label" data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">Figure 18&nbsp; </span></span><span class="capture-id" data-dcnode-id="2037"><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Trump’s Tweet Stating Liberate Virginia, and save your great 2nd Amendment It is under siege!.</span></p></span><span data-dcnode-id="2036" instrument_node="">
</span></div><span data-dcnode-id="2034" instrument_node="">
</span><div data-dcnode-id="2031" id="F19"><a data-dcnode-id="2032" data-featherlight="jhs-17-1-196-g19.png" href="#"><img alt="" data-dcnode-id="2033" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g19.png&amp;raw"></a></div><span data-dcnode-id="2030" instrument_node="">
</span><div class="caption" data-dcnode-id="2014"><p class="fig-download" data-dcnode-id="2022"><i class="fa fa-download" data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">&nbsp;</span></i><a data-dcnode-id="2026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g19.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="2027" instrument_node="">Original</span></a><span data-dcnode-id="2025" instrument_node=""> | </span><a data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g19.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="2024" instrument_node="">PPT</span></a></p><span data-dcnode-id="2021" instrument_node="">
</span><span class="label" data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Figure 19&nbsp; </span></span><span class="capture-id" data-dcnode-id="2016"><p data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Tweet Agreeing with Trump’s Call for Liberty.</span></p></span><span data-dcnode-id="2015" instrument_node="">
</span></div><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2012" instrument_node="">These tweets are a message to protesters in those three states who opposed the lockdown restrictions/stay-at-home orders issued by the corresponding state governors. Medical experts, including Dr. Mohammed Arsiwala, president of the Michigan State Medical Society, supported Governor Widmer’s actions to slow the virus (</span><span class="xref" data-dcnode-id="2008"><strong data-dcnode-id="2009"><a class="scroll-link" data-dcnode-id="2010" data-scroll="#B52" href="#B52" id="main-text-B52" rel="footnote"><span data-dcnode-id="2011" instrument_node="">Mauger &amp; LeBlanc, 2020</span></a></strong></span><span data-dcnode-id="2007" instrument_node="">). These three governors are Democrats, although there were lockdown protests in states with Republican governors, such as Utah and Ohio, that did not receive “Liberate” tweets from Trump.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="1998"><span data-dcnode-id="2004" instrument_node="">The tweets are a call-to-action to liberate these states from an oppressive regime imposing tyranny on American patriots protesting measures imposed on the citizens of these states. Trump’s use of capital letters (For the ‘liberate’ parts of the tweets) indicates shouting. Shouting signals an urgency to the situation; this is also not a request; it is a command. Trump’s followers understood this as a call to arms and activity of online hate groups discussing this need for action, increased (</span><span class="xref" data-dcnode-id="2000"><strong data-dcnode-id="2001"><a class="scroll-link" data-dcnode-id="2002" data-scroll="#B17" href="#B17" id="main-text-B17" rel="footnote"><span data-dcnode-id="2003" instrument_node="">Collins &amp; Zadrozny, 2020</span></a></strong></span><span data-dcnode-id="1999" instrument_node="">). This message constituted a call for physical violence directed to Americans and committed by Americans against Americans – the Us versus Them theme.</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1986"><span data-dcnode-id="1996" instrument_node="">Trump’s call to action appeared to resonate with his supporters (See Figure </span><span class="xref" data-dcnode-id="1993"><a data-dcnode-id="1994" href="#F20"><span data-dcnode-id="1995" instrument_node="">20</span></a></span><span data-dcnode-id="1992" instrument_node="">). This response also includes all capital letters to indicate the importance/shouting of the message. The response is simplistic and repetitive. Ott &amp; Dickinson (</span><span class="xref" data-dcnode-id="1988"><strong data-dcnode-id="1989"><a class="scroll-link" data-dcnode-id="1990" data-scroll="#B64" href="#B64" id="main-text-B64" rel="footnote"><span data-dcnode-id="1991" instrument_node="">2020</span></a></strong></span><span data-dcnode-id="1987" instrument_node="">) state, “In addition to tweeting simple, impulsive, and uncivil messages, Trump repeats them endlessly” (p. 87). This follower’s message mimics those same characteristics while showing agreement with Trump’s tweet.</span></p><span data-dcnode-id="1985" instrument_node="">
</span><div data-dcnode-id="1982" id="F20"><a data-dcnode-id="1983" data-featherlight="jhs-17-1-196-g20.png" href="#"><img alt="" data-dcnode-id="1984" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g20.png&amp;raw"></a></div><span data-dcnode-id="1981" instrument_node="">
</span><div class="caption" data-dcnode-id="1965"><p class="fig-download" data-dcnode-id="1973"><i class="fa fa-download" data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">&nbsp;</span></i><a data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g20.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="1978" instrument_node="">Original</span></a><span data-dcnode-id="1976" instrument_node=""> | </span><a data-dcnode-id="1974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g20.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="1975" instrument_node="">PPT</span></a></p><span data-dcnode-id="1972" instrument_node="">
</span><span class="label" data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Figure 20&nbsp; </span></span><span class="capture-id" data-dcnode-id="1967"><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Tweet Agreeing with Trump’s Tweets to Liberate States.</span></p></span><span data-dcnode-id="1966" instrument_node="">
</span></div><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1948"><span data-dcnode-id="1963" instrument_node="">The third tweet in the thread (See Figure </span><span class="xref" data-dcnode-id="1960"><a data-dcnode-id="1961" href="#F18"><span data-dcnode-id="1962" instrument_node="">18</span></a></span><span data-dcnode-id="1959" instrument_node="">) starts in the same manner with “LIBERATE VIRGINIA” (</span><span class="xref" data-dcnode-id="1955"><strong data-dcnode-id="1956"><a class="scroll-link" data-dcnode-id="1957" data-scroll="#B79" href="#B79" id="main-text-B79" rel="footnote"><span data-dcnode-id="1958" instrument_node="">Trump, 2020c</span></a></strong></span><span data-dcnode-id="1954" instrument_node="">), but continues with a more explicit command by referencing the Second Amendment. “A well-regulated Militia, being necessary to the security of a free State, the right of the people to keep and bear Arms shall not be infringed” (</span><span class="xref" data-dcnode-id="1950"><strong data-dcnode-id="1951"><a class="scroll-link" data-dcnode-id="1952" data-scroll="#B18" href="#B18" id="main-text-B18" rel="footnote"><span data-dcnode-id="1953" instrument_node="">Constitution of the United States, n.d</span></a></strong></span><span data-dcnode-id="1949" instrument_node="">.). The message understood and co-constructed between Trump and his followers is that, since the state imposes restrictions on the movement of its citizens, it is just the beginning as other “rights and freedoms” will soon be taken away, including the Second Amendment.</span></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1946" instrument_node="">While the response to this tweet (See Figure </span><span class="xref" data-dcnode-id="1943"><a data-dcnode-id="1944" href="#F21"><span data-dcnode-id="1945" instrument_node="">21</span></a></span><span data-dcnode-id="1942" instrument_node="">) does not specifically state which “rights and freedoms” will cease to exist, it agrees with Trump and the fight he calls for in Virginia.</span></p><span data-dcnode-id="1940" instrument_node="">
</span><div data-dcnode-id="1937" id="F21"><a data-dcnode-id="1938" data-featherlight="jhs-17-1-196-g21.png" href="#"><img alt="" data-dcnode-id="1939" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g21.png&amp;raw"></a></div><span data-dcnode-id="1936" instrument_node="">
</span><div class="caption" data-dcnode-id="1920"><p class="fig-download" data-dcnode-id="1928"><i class="fa fa-download" data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">&nbsp;</span></i><a data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g21.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="1933" instrument_node="">Original</span></a><span data-dcnode-id="1931" instrument_node=""> | </span><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g21.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="1930" instrument_node="">PPT</span></a></p><span data-dcnode-id="1927" instrument_node="">
</span><span class="label" data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Figure 21&nbsp; </span></span><span class="capture-id" data-dcnode-id="1922"><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Tweet Agreeing with Trump’s Tweets to Stand Up for Rights and Freedom.</span></p></span><span data-dcnode-id="1921" instrument_node="">
</span></div><span data-dcnode-id="1919" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1918" instrument_node="">Once again, the enthymematic nature of these tweets poses a vagueness that allows for denial of the explicit meaning. When Twitter was pressed about the terms of service violations in reference to Trump promoting violence, Twitter’s response stated, “The use of ‘liberate’ in the tweets is too vague to be actionable.” (</span><span class="xref" data-dcnode-id="1914"><strong data-dcnode-id="1915"><a class="scroll-link" data-dcnode-id="1916" data-scroll="#B17" href="#B17" id="main-text-B17" rel="footnote"><span data-dcnode-id="1917" instrument_node="">Collins &amp; Zadrozny, 2020, para. 12</span></a></strong></span><span data-dcnode-id="1913" instrument_node="">). However, the message is still clear to supporters. Hawdon et al. (</span><span class="xref" data-dcnode-id="1909"><strong data-dcnode-id="1910"><a class="scroll-link" data-dcnode-id="1911" data-scroll="#B33" href="#B33" id="main-text-B33" rel="footnote"><span data-dcnode-id="1912" instrument_node="">2020</span></a></strong></span><span data-dcnode-id="1908" instrument_node="">), conclude from their research that enthymemes lose their ambiguity when used in online spaces where chances increase that “…vulnerable individuals move from agreeing with hate to acting on it” (p. 12).</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1905" instrument_node="">Several months after Trump tweeted these three calls to violence, a plot was discovered aiming to kidnap Governor Whitmer of Michigan (</span><span class="xref" data-dcnode-id="1901"><strong data-dcnode-id="1902"><a class="scroll-link" data-dcnode-id="1903" data-scroll="#B11" href="#B11" id="main-text-B11" rel="footnote"><span data-dcnode-id="1904" instrument_node="">Carrega et al., 2020</span></a></strong></span><span data-dcnode-id="1900" instrument_node="">). Instead of denouncing the plot and disavowing the supporters acting in his name, Trump deflected the blame to the victim, Governor Whitmer. Although Trump (</span><span class="xref" data-dcnode-id="1896"><strong data-dcnode-id="1897"><a class="scroll-link" data-dcnode-id="1898" data-scroll="#B82" href="#B82" id="main-text-B82" rel="footnote"><span data-dcnode-id="1899" instrument_node="">2020f</span></a></strong></span><span data-dcnode-id="1895" instrument_node="">) in the third part of the thread (See Figure </span><span class="xref" data-dcnode-id="1892"><a data-dcnode-id="1893" href="#F22"><span data-dcnode-id="1894" instrument_node="">22</span></a></span><span data-dcnode-id="1891" instrument_node="">) starts with, “I do not tolerate ANY extreme violence. Defending ALL Americans, even those who oppose and attack me, is what I will always do as your President!” he quickly rescinds that statement. Trump (</span><span class="xref" data-dcnode-id="1887"><strong data-dcnode-id="1888"><a class="scroll-link" data-dcnode-id="1889" data-scroll="#B82" href="#B82" id="main-text-B82" rel="footnote"><span data-dcnode-id="1890" instrument_node="">2020f</span></a></strong></span><span data-dcnode-id="1886" instrument_node="">) continues in the tweet, “Governor Whitmer—open up your state, open up your schools, and open up your churches!” as he pursues the theme of liberation and tacit approval of the current and future attacks against Governor Whitmer.</span></p><span data-dcnode-id="1884" instrument_node="">
</span><div data-dcnode-id="1881" id="F22"><a data-dcnode-id="1882" data-featherlight="jhs-17-1-196-g22.png" href="#"><img alt="" data-dcnode-id="1883" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g22.png&amp;raw"></a></div><span data-dcnode-id="1880" instrument_node="">
</span><div class="caption" data-dcnode-id="1864"><p class="fig-download" data-dcnode-id="1872"><i class="fa fa-download" data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">&nbsp;</span></i><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g22.png%3Faction%3Ddownload" target="_blank"><span data-dcnode-id="1877" instrument_node="">Original</span></a><span data-dcnode-id="1875" instrument_node=""> | </span><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jhs.press.gonzaga.edu/articles/10.33972/jhs.196/jhs-17-1-196-g22.png%3Faction%3Dppt" target="_blank"><span data-dcnode-id="1874" instrument_node="">PPT</span></a></p><span data-dcnode-id="1871" instrument_node="">
</span><span class="label" data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Figure 22&nbsp; </span></span><span class="capture-id" data-dcnode-id="1866"><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Thread of Three Tweets Criticizing Governor Whitmer.</span></p></span><span data-dcnode-id="1865" instrument_node="">
</span></div><span data-dcnode-id="1863" instrument_node="">
