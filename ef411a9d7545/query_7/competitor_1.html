</span><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1770" data-test="figure" data-title="Fig. 9.2" id="figure-2"><figure data-dcnode-id="1771"><figcaption data-dcnode-id="1791"><b class="c-article-section__figure-caption" data-dcnode-id="1792" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="1793" instrument_node="">Fig. 9.2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1782"><div class="c-article-section__figure-item" data-dcnode-id="1786"><a class="c-article-section__figure-link" data-dcnode-id="1787" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-18729-3_9/figures/2" rel="nofollow"><picture data-dcnode-id="1788"><source data-dcnode-id="1790" srcset="//media.springernature.com/lw685/springer-static/image/chp%3A10.1007%2F978-3-030-18729-3_9/MediaObjects/471874_1_En_9_Fig2_HTML.jpg?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="1789" height="456" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/chp%253A10.1007/978-3-030-18729-3_9/MediaObjects/471874_1_En_9_Fig2_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1783" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">@realDonaldTrump Twitter posts exemplifying “signing a document,” “foreign leader,” “people clapping,” and “linear perspective framing” visual communication tactics. Image A: March 13, 2017; Image B: February 13, 2017; Image C: April 19, 2017; Image D: April 13, 2017</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1772"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="1773" data-test="chapter-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-18729-3_9/figures/2" rel="nofollow"><span data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1774" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1775" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1776" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1779" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1778" fill-rule="evenodd"></path><span data-dcnode-id="1777" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1768" instrument_node="">Relatedly, 52 of the 322 visuals used linear perspective to feature photographs of large groups of people surrounding Trump seated as a central figure. In these photos, Trump is prominent and a strong focal point with all visual lines converging to the centered Trump. Just as a depiction of Jesus Christ was centralized in Leonardo da Vinci’s </span><i data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Last Supper</span></i><span data-dcnode-id="1765" instrument_node=""> fresco, President Trump is an important part of these pictures as the single vanishing point while seated in the middle. A notable instance of this can be seen in Fig. </span><a data-dcnode-id="1763" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1764" instrument_node="">9.2</span></a><span data-dcnode-id="1762" instrument_node="">, Image D where President Trump is centered in a staged gathering of firefighters accompanying U.S. Department of Transportation Cabinet Secretary Elaine Chao. As discussed later in this chapter, this tactic was found to serve a critical role at centralizing and legitimizing President Trump as a figure of authority and importance in these posts.</span></p><p data-dcnode-id="1750"><span data-dcnode-id="1760" instrument_node="">Overlaid text on images was the most commonly used nonphotographic element. Specifically, 37.88% of the total posts (122 of 322 images) contained a textual element of some kind over the main visual. This overlaid text served specific uses on Facebook, where it was used to display Twitter text reposts, identified as “Direct Twitter Reposts” and images of President Trump as a lone figure with a quote, labeled as “Trump Alone With Quote” (Images C and D in Fig. </span><a data-dcnode-id="1758" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1759" instrument_node="">9.3</span></a><span data-dcnode-id="1757" instrument_node=""> are examples of both tactics). Four exemplars of text overlaid onto images and reposting tweets on Facebook can be seen in Fig. </span><a data-dcnode-id="1755" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1756" instrument_node="">9.3</span></a><span data-dcnode-id="1754" instrument_node="">. These posts served as a unifying tactic to increase branding consistency by linking different social media accounts. Many of the quotes came from outside sources, such as Fox News and Fox Business, allowing Trump to use third-party validators and to share favorable business indicators. Image B in Fig. </span><a data-dcnode-id="1752" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1753" instrument_node="">9.3</span></a><span data-dcnode-id="1751" instrument_node=""> represents an instance in which economic data were supported with bold text, a background picture of an American flag and a poised President Trump looking into the distance. In such cases, text and image reinforced each other, amplifying and emphasizing the message.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1726" data-test="figure" data-title="Fig. 9.3" id="figure-3"><figure data-dcnode-id="1727"><figcaption data-dcnode-id="1747"><b class="c-article-section__figure-caption" data-dcnode-id="1748" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="1749" instrument_node="">Fig. 9.3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1738"><div class="c-article-section__figure-item" data-dcnode-id="1742"><a class="c-article-section__figure-link" data-dcnode-id="1743" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-18729-3_9/figures/3" rel="nofollow"><picture data-dcnode-id="1744"><source data-dcnode-id="1746" srcset="//media.springernature.com/lw685/springer-static/image/chp%3A10.1007%2F978-3-030-18729-3_9/MediaObjects/471874_1_En_9_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="1745" height="344" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/chp%253A10.1007/978-3-030-18729-3_9/MediaObjects/471874_1_En_9_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1739" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Donald Trump Facebook posts exemplifying “text overlaid” and “direct Twitter reposts” visual communication tactics. Image A: March 28, 2017; Image B: March 10, 2017; Image C: April 21, 2017; Image D: March 10, 2017</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1728"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="1729" data-test="chapter-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-18729-3_9/figures/3" rel="nofollow"><span data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1730" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1731" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1732" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1735" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1734" fill-rule="evenodd"></path><span data-dcnode-id="1733" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="1715"><span data-dcnode-id="1725" instrument_node="">Images featuring specific instances of people and actions surrounding the president were an additional theme. This included the presence of military/veterans (5.6% of images) and foreign leaders (8.7% of images). Image B in Fig. </span><a data-dcnode-id="1723" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1724" instrument_node="">9.2</span></a><span data-dcnode-id="1722" instrument_node=""> demonstrates both a military-coded and a foreign-leader-coded image, in which Trump was depicted embracing Canadian Prime Minister Justin Trudeau next to a flag-holding service member during a White House visit. In terms of actions, the people were frequently depicted clapping. Out of the 322 images on both Facebook and Twitter, roughly 6% of all visuals were devoted to photos of people (and sometimes Trump himself) clapping at pictured actions (e.g., Fig. </span><a data-dcnode-id="1720" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1721" instrument_node="">9.2</span></a><span data-dcnode-id="1719" instrument_node="">, Image C). The last major theme that emerged was “Make America Great Again”. This visual tactic included instances of the Trump/Pence MAGA logo, MAGA apparel, and signs at rallies (such as Fig. </span><a data-dcnode-id="1717" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1718" instrument_node="">9.3</span></a><span data-dcnode-id="1716" instrument_node="">, Image A). MAGA imagery was included in just over 4% of pictures on Twitter in the first 100&nbsp;days, but more notably in more than 22% of Facebook posts.</span></p><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Clearly, political messaging has evolved over the past several presidential elections and these changes are evident in official communication from the White House. While President Donald Trump has long been a prolific and well-documented Twitter user, messaging from the White House through its social media feeds primarily employs the use of targeted visuals in its Facebook and Twitter feeds. Both platforms have provided an ample audience for the president to reach tens of millions of followers with direct, targeted messaging and then, in turn, have this communication receive national coverage through traditional media sources.</span></p></div></div></section><section data-dcnode-id="1585" data-title="Discussion: Visual Image Building and Legitimacy"><div class="c-article-section" data-dcnode-id="1586" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1708" id="Sec4"><span data-dcnode-id="1709" instrument_node="">Discussion: Visual Image Building and Legitimacy</span></h2><div class="c-article-section__content" data-dcnode-id="1587" id="Sec4-content"><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">From frequent scrum photos of the president holding up signed executive orders in the Oval Office to images of the president energetically sitting behind the wheel of a Mack truck parked outside his back door to a ceremony honoring Navajo Code Talkers under the gaze of an Andrew Jackson portrait, like previous administrations, visuals have been central to Donald Trump’s presidency. Based on a careful examination of Trump’s visual communication on social media during his first 100&nbsp;days in office, two notable points of discussion emerge: Trump deployed images on social media to (1) build an image based on success, power, and leadership and (2) legitimize his new administration.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1704" id="Sec5"><span data-dcnode-id="1705" instrument_node="">Trump’s Visual Image</span></h3><p data-dcnode-id="1696"><span data-dcnode-id="1703" instrument_node="">If you only viewed Trump’s first 100&nbsp;days in office through the lens of his social media accounts, a clear perception is created of a strong, successful, and likable president in control of his administration. Presidential messaging has been found to work to “visually simplify complex political issues, narratively interpret presidential agendas, synoptically reify presidential personae, and construct or mystify political realities” (Erickson, </span><a aria-label="Reference 1998" data-dcnode-id="1701" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d27988911e1411" title="Erickson, K. V. (1998). Presidential spectacles: Political illusionism and the rhetoric of travel. Communications Monographs, 65, 141–153. 
                  https://doi.org/10.1080/03637759809376442
                  
                "><span data-dcnode-id="1702" instrument_node="">1998</span></a><span data-dcnode-id="1700" instrument_node="">, p. 141), and the Trump administration’s use of visuals in 2017 was indicative of these patterns. In short, Trump’s visuals simplified issues (if issues were present at all), narratively conveyed his agenda, and constructed a political identity and, indeed, a new political reality. Through clearly strategic—but occasionally faltering—image building, Trump and his White House team crafted visuals of a successful new President making good use of his time in office. From a review of the images, clear rules were evident: branding was constant, success was documented, Trump was center, prideful supporters were featured, and visual messages were reinforced through text. Trump follows in a long line of contemporary presidents—notably Richard Nixon, Ronald Reagan, and George W. Bush—who employed visuals to drive a narrative, garner news media coverage, and construct political images. As Schill (</span><a aria-label="Reference 2009" data-dcnode-id="1698" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d27988911e1431" title="Schill, D. (2009). Stagecraft and statecraft: Advance and media events in political communication. Lanham, MD: Lexington Books."><span data-dcnode-id="1699" instrument_node="">2009</span></a><span data-dcnode-id="1697" instrument_node="">) asserted, visuals are “universal and ubiquitous in political communication” (p. 28). The case study in this chapter, therefore, confirms and renews previous understandings of visual image-making.</span></p><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Much of Trump’s presidency has been concerned with optics—about communicating both popularity and success. Visits from a wide-ranging group of foreign dignitaries complemented an entire cast of all-American figures (from firefighters to small business owners to a Florida high school marching band). To a viewer of Trump’s Facebook and Twitter accounts, seemingly all of America supported the president and had stopped by the White House for a visit. Images were constructed to document things getting done: signing documents, working late into the night, and constantly meeting with his cabinet and interest groups. These photos and moments likely felt authentic to the average social media consumer and for Trump’s most ardent supporters, thrilling examples of work being done and promises being kept. These visuals functioned to prominently feature a president and administration with power, prowess, and control—all things that the legacy media reported were lacking in the White House.</span></p><p data-dcnode-id="1671"><span data-dcnode-id="1693" instrument_node="">Trump himself was the principal subject in nearly every photo analyzed. Additionally, photos often employed a linear perspective to depict President Trump surrounded by onlookers in a </span><i data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Last Supper</span></i><span data-dcnode-id="1690" instrument_node="">–like pose (See Fig. </span><a data-dcnode-id="1688" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1689" instrument_node="">9.2</span></a><span data-dcnode-id="1687" instrument_node="">, Image D). As presidential historian Douglas Brinkley observed: “In the way he does the photos, he’s a star in every one” (quoted in Dawsey, </span><a aria-label="Reference 2017" data-dcnode-id="1685" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d27988911e1458" title="Dawsey, J. (2017, August 28). Trump’s prized perk: Oval Office photo ops. Politico. Retrieved from 
                  http://politi.co/2DvJO5k
                  
                "><span data-dcnode-id="1686" instrument_node="">2017</span></a><span data-dcnode-id="1684" instrument_node="">, para. 20). Trump perfected this stagecraft on reality television and these images evoke the boardroom set of </span><i data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">The Apprentice</span></i><span data-dcnode-id="1681" instrument_node="">. Implementing compositional techniques of the High Renaissance, these images give Trump authority—his chair is noticeably taller than all others—and let him be in charge. “They let him bask in praise. They show him sitting up straight, crossing his arms, attempting to convey with his stern face a no-nonsense strength,” noted Kruse (</span><a aria-label="Reference 2018" data-dcnode-id="1679" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d27988911e1469" title="Kruse, M. (2018, January 19). Trump with the sound off. Politico Magazine. Retrieved from 
                  http://politi.co/2DnLL4w
                  
                "><span data-dcnode-id="1680" instrument_node="">2018</span></a><span data-dcnode-id="1678" instrument_node="">, para. 13). Further, Thrush and Haberman (</span><a aria-label="Reference 2017" data-dcnode-id="1676" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d27988911e1472" title="Thrush, G., &amp; Haberman, M. (2017, March 21). Why letting go, for Trump, is no small or simple task. New York Times. Retrieved from 
                  https://nyti.ms/2mNP8Vz
                  
                "><span data-dcnode-id="1677" instrument_node="">2017</span></a><span data-dcnode-id="1675" instrument_node="">) argue that toughness is the most important attribute Trump has sought to project: “he wanted to look dour, and vetoed any campaign imagery that so much as hinted at weakness, aides said. Which is why every self-selected snapshot—down to the squinty-eyed scowl attached to his Twitter account—features a tough-guy sourpuss” (para. 14). Trump conceptualizes leadership as strength and communicates this authority nonverbally and visually. This supports Chun’s (</span><a aria-label="Reference 2018" data-dcnode-id="1673" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d27988911e1479" title="Chun, R. S. (2018). Visual rhetoric of the presidency: An analysis of the Trump and Obama White House messaging in their first 100 days in Flickr images. Journal of Visual Literacy, 37(1), 18–39. 
                  https://doi.org/10.1080/1051144X.2018.1450129
                  
                "><span data-dcnode-id="1674" instrument_node="">2018</span></a><span data-dcnode-id="1672" instrument_node="">) finding that “the Trump White House evokes the image of power and authority through the selection and presentation of staged photo ops that allow him to be in command of his surroundings” (pp. 28–29).</span></p><p data-dcnode-id="1666"><span data-dcnode-id="1670" instrument_node="">Trump’s visual-centric approach was honed over decades in the public eye and years in reality television. His iconic brand was an equal part of business suits, deal-making, power scowls, and gold-plated opulence. Katy Tur (</span><a aria-label="Reference 2018" data-dcnode-id="1668" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d27988911e1489" title="Tur, K. [KatyTurNBC]. (2018, January 23). Remember, Donald Trump’s whole life has been about creating an image of success. Image matters more than anything else. [Tweet]. Retrieved from 
                  https://twitter.com/KatyTurNBC/status/1009480430364577802
                  
                "><span data-dcnode-id="1669" instrument_node="">2018</span></a><span data-dcnode-id="1667" instrument_node="">) described Trump’s history with visual branding:</span></p><blockquote class="c-blockquote" data-dcnode-id="1660"><div class="c-blockquote__body" data-dcnode-id="1661"><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Donald Trump’s whole life has been about creating an image of success. Image matters more than anything else. Trump hasn’t built buildings in a long time. He puts his name on them. He brands them. It’s the image he sells. Its why so many of those buildings have brass polished to look like gold. Image is everything. He wants to appear strong. (para 1)</span></p><span data-dcnode-id="1662" instrument_node="">
</span></div></blockquote><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">As this chapter shows, Trump transposed this success-power-strong persona from the world of business and reality television to the White House. The essential parts remained the same and were transferred to the not dissimilar context of politics.</span></p><p data-dcnode-id="1650"><span data-dcnode-id="1657" instrument_node="">Also notable is what is </span><i data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">not</span></i><span data-dcnode-id="1654" instrument_node=""> in the visual record. Trump was rarely depicted with family or in personal settings. The Trump administration limited access to Trump’s golf outings and, of course, no images were provided of Trump watching television during “executive time” in the White House residence. Of course, no leader would distribute unflattering images, but Trump has shown no interest in “humanizing” visuals in his first 100&nbsp;days. For example, nearly all past presidents used animals, especially dogs, to show their softer side, but Trump has shown no interest in a White House pet. Similarly, most presidents attempted to connect with citizens via visual plain folks appeals: Reagan and George W. Bush invited cameras to film them cut wood and clear brush, Bill Clinton was fond of McDonald’s stops and sweaty jogging outings, and Barack Obama periodically left the White House for fast food outings at Starbucks, Chipotle, and Ray’s Hell Burger (see Schill, </span><a aria-label="Reference 2009" data-dcnode-id="1652" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d27988911e1530" title="Schill, D. (2009). Stagecraft and statecraft: Advance and media events in political communication. Lanham, MD: Lexington Books."><span data-dcnode-id="1653" instrument_node="">2009</span></a><span data-dcnode-id="1651" instrument_node="">). Trump, on the other hand, has only his “strong businessman” and “authentic outsider” image.</span></p><p data-dcnode-id="1645"><span data-dcnode-id="1649" instrument_node="">His frequent signing ceremonies became a well-choreographed genre all their own. Trump would be seated at a small desk surrounded by his cabinet or interest group members impacted by the order. He would then sign the executive order in his bold and visually striking signature and display the document for the camera, swiveling side to side and smiling to the reporters in the room. Then, in a moment of unison, the supporters would clap and then quickly disperse away from the president’s desk quietly. Trump managed to “give a requisite, mostly static scene from any modern presidency a more kinetic, compelling ‘look all his own’” (Kruse, </span><a aria-label="Reference 2018" data-dcnode-id="1647" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d27988911e1536" title="Kruse, M. (2018, January 19). Trump with the sound off. Politico Magazine. Retrieved from 
                  http://politi.co/2DnLL4w
                  
                "><span data-dcnode-id="1648" instrument_node="">2018</span></a><span data-dcnode-id="1646" instrument_node="">, para. 12). While clearly staged, the moment effectively used photography to frame the event in a distinctly favorable manner and share it to millions of followers on social media.</span></p><p data-dcnode-id="1634"><span data-dcnode-id="1644" instrument_node="">Authority and emphasis were also generated through the strategic use of text and the cross-posting of images on both Twitter and Facebook. Photos of Trump alone with a quote superimposed over the image represented nearly a quarter of all images posted to Facebook. At the 2016 Republican National Convention, Trump declared that “I alone can fix it” and Trump’s visual messaging underlined the singularity of the president through this type of post. Many of these Facebook photos were reposts of tweets from the @realDonaldTrump Twitter account. For Trump, Twitter was the main online information channel (Enli, </span><a aria-label="Reference 2017" data-dcnode-id="1642" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d27988911e1575" title="Enli, G. (2017). Twitter as arena for the authentic outsider: Exploring the social media campaigns of Trump and Clinton in the 2016 US presidential election. European Journal of Communication, 32(1), 50–61. 
                  https://doi.org/10.1177/0267323116682802
                  
                "><span data-dcnode-id="1643" instrument_node="">2017</span></a><span data-dcnode-id="1641" instrument_node="">) and Twitter’s intermedia agenda-setting effect is observed with Trump’s Twitter account setting the agenda for his Facebook page. Duplicating messages on Facebook allowed Trump to expand his audience reach and scale across communication channels with minimal cost and effort. Further, when one tweak of a service’s algorithm can devastate your outreach, it is strategic to spread your communication across multiple platforms (Thompson, </span><a aria-label="Reference 2018" data-dcnode-id="1639" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d27988911e1595" title="Thompson, A. (2018, October 24). This is how Donald Trump stays president for four more years. Politico. Retrieved from 
                  https://politi.co/2qa2mQw
                  
                "><span data-dcnode-id="1640" instrument_node="">2018</span></a><span data-dcnode-id="1638" instrument_node="">). Twitter and Facebook are only two parts of an increasingly complex media ecology characterized by interdependency and interplaying influences (Jungherr, </span><a aria-label="Reference 2016" data-dcnode-id="1636" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d27988911e1606" title="Jungherr, A. (2016). Twitter use in election campaigns: A systematic literature review. Journal of Information Technology &amp; Politics, 13(1), 72–91. 
                  https://doi.org/10.1080/19331681.2015.1132401
                  
                "><span data-dcnode-id="1637" instrument_node="">2016</span></a><span data-dcnode-id="1635" instrument_node="">).</span></p><p data-dcnode-id="1617"><span data-dcnode-id="1633" instrument_node="">In contrast to the highly polished and artful images in the previous administration, numerous photos analyzed within the first 100&nbsp;days were out of focus, overexposed, or displayed strange framing and composition (see also Shaw, </span><a aria-label="Reference 2017" data-dcnode-id="1631" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d27988911e1616" title="Shaw, M. (2017, April 25). 11 images that show how the Trump administration is failing at photography. Columbia Journalism Review. Retrieved from 
                  https://www.cjr.org/covering_trump/trump-photography.php
                  
                "><span data-dcnode-id="1632" instrument_node="">2017</span></a><span data-dcnode-id="1630" instrument_node="">). Just as Trump’s staff-written Twitter posts feature purposefully bad grammar and syntax errors, the visuals on social media are occasionally crafted with a distinct element of clumsiness (Linskey, </span><a aria-label="Reference 2018" data-dcnode-id="1628" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d27988911e1627" title="Linskey, A. (2018, May 22). Inside the Trump tweet machine: Staff-written posts, bad grammar (on purpose), and delight in the chaos. Boston Globe. Retrieved from 
                  https://www.bostonglobe.com/news/nation/2018/05/21/trump-tweets-include-grammatical-errors-and-some-them-are-purpose/JeL7AtKLPevJDIIOMG7TrN/story.html
                  
                "><span data-dcnode-id="1629" instrument_node="">2018</span></a><span data-dcnode-id="1627" instrument_node="">). For example, text at times would dominate an image and overshadow President Trump (see Fig. </span><a data-dcnode-id="1625" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1626" instrument_node="">9.2</span></a><span data-dcnode-id="1624" instrument_node="">, Image A). This seemingly amateur communication in White House digital posts was also identified by Chun (</span><a aria-label="Reference 2018" data-dcnode-id="1622" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d27988911e1634" title="Chun, R. S. (2018). Visual rhetoric of the presidency: An analysis of the Trump and Obama White House messaging in their first 100 days in Flickr images. Journal of Visual Literacy, 37(1), 18–39. 
                  https://doi.org/10.1080/1051144X.2018.1450129
                  
                "><span data-dcnode-id="1623" instrument_node="">2018</span></a><span data-dcnode-id="1621" instrument_node="">), “the anti-design approach in the White House Flickr album is a framing strategy to avoid any ‘artsy’ affectation” and “is a reversal of the systematic, thoughtful, and rigorous design efforts of the Obama Presidency and campaign” (p. 34). Trump’s “amateurish yet authentic style in social media points towards de-professionalization and even amateurism as a counter-trend in political communication” (Enli, </span><a aria-label="Reference 2017" data-dcnode-id="1619" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d27988911e1645" title="Enli, G. (2017). Twitter as arena for the authentic outsider: Exploring the social media campaigns of Trump and Clinton in the 2016 US presidential election. European Journal of Communication, 32(1), 50–61. 
                  https://doi.org/10.1177/0267323116682802
                  
                "><span data-dcnode-id="1620" instrument_node="">2017</span></a><span data-dcnode-id="1618" instrument_node="">, p. 50). For Trump, kludgy photography communicates authenticity.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1615" id="Sec6"><span data-dcnode-id="1616" instrument_node="">Trump’s Visual Legitimization</span></h3><p data-dcnode-id="1604"><span data-dcnode-id="1614" instrument_node="">In all forms of government, leaders must create legitimacy, the perception that they have the right and justification to exercise power (Buchanan, </span><a aria-label="Reference 2002" data-dcnode-id="1612" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d27988911e1665" title="Buchanan, A. (2002). Political legitimacy and democracy. Ethics, 112(4), 689–719. 
                  https://doi.org/10.1086/340313
                  
                "><span data-dcnode-id="1613" instrument_node="">2002</span></a><span data-dcnode-id="1611" instrument_node="">). John Locke famously asserted that political legitimacy derives from the consent of the governed. This analysis finds that one aspect of establishing legitimacy in contemporary democracies is via </span><i data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">visual legitimization</span></i><span data-dcnode-id="1608" instrument_node=""> (see also Max Weber’s [</span><a aria-label="Reference 1968" data-dcnode-id="1606" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d27988911e1671" title="Weber, M. (1968). On charisma and institution building. Chicago, IL: University of Chicago Press."><span data-dcnode-id="1607" instrument_node="">1968</span></a><span data-dcnode-id="1605" instrument_node="">] concept of charismatic authority).</span></p><p data-dcnode-id="1599"><span data-dcnode-id="1603" instrument_node="">Like former president George W. Bush sought to legitimize his image as commander-in-chief in military efforts in Iraq (Shepherd, </span><a aria-label="Reference 2008" data-dcnode-id="1601" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d27988911e1685" title="Shepherd, L. (2008). Visualizing violence: Legitimacy and authority in the ‘War on Terror’. Critical Studies on Terrorism, 1(2), 213–226. 
                  https://doi.org/10.1080/17539150802184611
                  
                "><span data-dcnode-id="1602" instrument_node="">2008</span></a><span data-dcnode-id="1600" instrument_node="">), Trump looked to visuals to testify to his firm control over political matters. Few presidents have had more to prove in a short amount of time and have faced attacks from so many political pundits, political groups, and even politicians from his own party. Trump did not win the popular vote and many Americans questioned the role of foreign interference in Trump’s electoral success. For an administration under unceasing attack, the visuals released on White House social media feeds and Trump’s personal accounts served as a safe harbor for positive coverage frequently lacking in mainstream media.</span></p><p data-dcnode-id="1588"><span data-dcnode-id="1598" instrument_node="">Moreover, Trump was not a traditional politician and was not expected to win. He needed to quickly build authority. This is why Trump was so concerned with pictures of his inaugural crowd. The shadow of the election loomed over his first 100&nbsp;days. Prior to any policy decisions, Trump began by looking the part of a president. And the images on Facebook and Twitter allowed Trump to quickly embody the symbolic and practical duties of America’s top executive. For the government to function, it is important that the citizenry have confidence in the competence of the new occupant of the Oval Office, and visuals can partially invite national acceptance of a new president. The issue is not the truth, but legitimacy, and legitimacy is a core function of visual communication in political contexts. In his book on understanding Trump, Newt Gingrich (</span><a aria-label="Reference 2017" data-dcnode-id="1596" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d27988911e1703" title="Gingrich, N. (2017). Understanding Trump. New York: Hachette Book Group."><span data-dcnode-id="1597" instrument_node="">2017</span></a><span data-dcnode-id="1595" instrument_node="">) argued that “Visuals matter more than words. Style matters more than convention. The overall impression matters more than the details” (p. 2). While many Americans might never accept the legitimacy of a Trump presidency (see Azari, </span><a aria-label="Reference 2018" data-dcnode-id="1593" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d27988911e1706" title="Azari, J. (2018, August 27). Is Trump’s legitimacy at risk? FiveThirtyEight. Retrieved from 
                  https://53eig.ht/2PHGWG3
                  
                "><span data-dcnode-id="1594" instrument_node="">2018</span></a><span data-dcnode-id="1592" instrument_node="">; Frum, </span><a aria-label="Reference 2018" data-dcnode-id="1590" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d27988911e1709" title="Frum, D. (2018, July 17). Trump’s crisis of legitimacy. Atlantic. Retrieved from 
                  https://www.theatlantic.com/ideas/archive/2018/07/is-trumps-presidency-legitimate/565451/
                  
                "><span data-dcnode-id="1591" instrument_node="">2018</span></a><span data-dcnode-id="1589" instrument_node="">), the overall impression created by visuals on Trump’s social media accounts was of a leader in command.</span></p></div></div></section><section data-dcnode-id="1558" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="1559" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1583" id="Sec7"><span data-dcnode-id="1584" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="1560" id="Sec7-content"><p data-dcnode-id="1578"><span data-dcnode-id="1582" instrument_node="">Social media and digital interaction with citizens and the public have become a centerpiece and primary means of communication for the Trump presidency. A nearly complete circumvention of legacy media control has led Trump officials and the president himself to operate in a “dynamic news environment that is no longer defined by the traditional gatekeepers of journalism and politicians” (Oates &amp; Moe, </span><a aria-label="Reference 2018" data-dcnode-id="1580" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d27988911e1737" title="Oates, S., &amp; Moe, W. (2018). Donald Trump and the “oxygen of publicity”: Branding, social media, and traditional media. In D. Schill &amp; J. A. Hendricks (Eds.), The presidency and social media: Discourse, disruption, and digital democracy in the 2016 presidential election (pp. 209–235). New York: Routledge."><span data-dcnode-id="1581" instrument_node="">2018</span></a><span data-dcnode-id="1579" instrument_node="">, p. 212). Direct communication with the public through social media has cemented political communication into a new era of visual political communication and has largely created moments of unprecedented openness and disregard for previous “rules” of integration.</span></p><p data-dcnode-id="1561"><span data-dcnode-id="1577" instrument_node="">As noted by Schill (</span><a aria-label="Reference 2012" data-dcnode-id="1575" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d27988911e1747" title="Schill, D. (2012). The visual image and the political image: A review of visual communication research in the field of political communication. Review of Communication, 12(2), 118–142. 
                  https://doi.org/10.1080/15358593.2011.653504
                  
                "><span data-dcnode-id="1576" instrument_node="">2012</span></a><span data-dcnode-id="1574" instrument_node="">), “Images clearly play a foundational role in the political communication process. Newsmakers not only consider their words, they also consider the messages they are communicating visually–they are constructing image bites” (p. 127). The expanding reach of social media across an ever-widening network of platforms has provided opportunities for snippets of visuals to be communicated in a realm separate from legacy media. Social media creates a new dimension to the traditional process of political communication by means of televised broadcast: “candidates now have a </span><i data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">direct</span></i><span data-dcnode-id="1571" instrument_node=""> means by which to communicate with the voting public” (Dahmen, </span><a aria-label="Reference 2016" data-dcnode-id="1569" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d27988911e1761" title="Dahmen, N. S. (2016). Picturing the Senate candidates: Image building in the Twitterverse. In J. A. Hendricks &amp; D. Schill (Eds.), Communication and midterm elections (pp. 169–190). New York: Palgrave Macmillan."><span data-dcnode-id="1570" instrument_node="">2016</span></a><span data-dcnode-id="1568" instrument_node="">, p. 175). This evolution in the transmission of messages has revolutionized the long-held tradition of politicians’ dependence on media outlets both during and after their campaigns. This has given strategists the ability to “put an image in a voter’s mind directly through social media channels </span><i data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">without</span></i><span data-dcnode-id="1565" instrument_node=""> the traditional news media as a filter or gatekeeper” (Dahmen, </span><a aria-label="Reference 2016" data-dcnode-id="1563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d27988911e1776" title="Dahmen, N. S. (2016). Picturing the Senate candidates: Image building in the Twitterverse. In J. A. Hendricks &amp; D. Schill (Eds.), Communication and midterm elections (pp. 169–190). New York: Palgrave Macmillan."><span data-dcnode-id="1564" instrument_node="">2016</span></a><span data-dcnode-id="1562" instrument_node="">, p. 176). The Trump administration’s use of social media and visual communication evolved after its first 100&nbsp;days—both in terms of messages delivered and tactics deployed—but one thing is certain: visuals remained central and critical.</span></p></div></div></section><span data-dcnode-id="1557" instrument_node="">
