</span><section aria-labelledby="Abs1" data-dcnode-id="2073" data-gtm-vis-first-on-screen-50443292_562="1002" data-gtm-vis-first-on-screen-50443292_563="1003" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1002" data-gtm-vis-recent-on-screen-50443292_563="1003" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2074" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2096" id="Abs1"><span data-dcnode-id="2097" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2075" id="Abs1-content"><p data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">From frequent scrum photos of the president holding up signed executive orders in the Oval Office to images of the president energetically sitting behind the wheel of a Mack truck parked outside his back door, like previous administrations, visuals have been central to Donald Trump’s presidency. This chapter analyzes the visuals on White House social media accounts (i.e., Twitter and Facebook) in Trump’s first 100&nbsp;days in office and explores how his administration used visuals as an essential vehicle for storytelling, image building, and persuading. Building on previous research on the communicative functions of visual symbols in politics, the chapter finds that the Trump administration used socially mediated images to build an image based on success, power, and leadership and to legitimize his new administration.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Keywords</span></h3><ul class="c-article-subject-list" data-dcnode-id="2076"><li class="c-article-subject-list__subject" data-dcnode-id="2089"><span data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Donald Trump</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2086"><span data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">Visual communication</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2083"><span data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Optics</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2080"><span data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Image building</span></span></li><li class="c-article-subject-list__subject" data-dcnode-id="2077"><span data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Legitimization</span></span></li></ul></div></div></section><span data-dcnode-id="2072" instrument_node="">
</span><div data-dcnode-id="2058" data-test="chapter-cobranding-and-download"><span data-dcnode-id="2071" instrument_node="">
</span><div class="note test-pdf-link" data-dcnode-id="2060" id="cobranding-and-download-availability-text"><span data-dcnode-id="2070" instrument_node="">
</span><div class="c-article-access-provider" data-component="provided-by-box" data-dcnode-id="2062"><span data-dcnode-id="2069" instrument_node="">
</span><p class="c-article-access-provider__text" data-dcnode-id="2064"><span data-dcnode-id="2068" instrument_node="">
</span><a data-dcnode-id="2066" data-track="click" data-track-action="Pdf download" data-track-label="inline link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/content/pdf/10.1007/978-3-030-18729-3_9.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2067" instrument_node="">Download</span></a><span data-dcnode-id="2065" instrument_node=""> chapter PDF
                </span></p><span data-dcnode-id="2063" instrument_node="">
</span></div><span data-dcnode-id="2061" instrument_node="">
</span></div><span data-dcnode-id="2059" instrument_node="">
</span></div><span data-dcnode-id="2057" instrument_node="">
</span><div class="c-article-section__content c-article-section__content--separator" data-dcnode-id="2034"><p data-dcnode-id="2046"><span data-dcnode-id="2056" instrument_node="">When Donald Trump announced his campaign for the presidency in the summer of 2015, his effort became rooted in visual imagery. Trump—a wealthy businessman and celebrity host of </span><i data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">The Apprentice</span></i><span data-dcnode-id="2053" instrument_node=""> for 14&nbsp;years—recognized the importance and utmost necessity of looking presidential on the campaign trail. Trump’s highly choreographed announcement took place in the opulent Trump Tower lobby and began with the future president and first lady grandly descending an escalator to cheering and adoring supporters (some of them apparently paid; see Bradley, </span><a aria-label="Reference 2017" data-dcnode-id="2051" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d27988911e396" title="Bradley, L. (2017, January 20). Remember that time Trump was allegedly cheered by paid actors? Vanity Fair. Retrieved from 
                  https://www.vanityfair.com/hollywood/2017/01/donald-trump-campaign-announcement-actors-fec
                  
                "><span data-dcnode-id="2052" instrument_node="">2017</span></a><span data-dcnode-id="2050" instrument_node="">). The visuals communicated popularity, wealth, presence, celebrity, and strength, and the images were widely disseminated via live cable television hits and social media postings. Former Speaker of the House and Trump’s advisor Newt Gingrich (</span><a aria-label="Reference 2017" data-dcnode-id="2048" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d27988911e408" title="Gingrich, N. (2017). Understanding Trump. New York: Hachette Book Group."><span data-dcnode-id="2049" instrument_node="">2017</span></a><span data-dcnode-id="2047" instrument_node="">) noted the centrality of visual imagery in Trump’s announcement:</span></p><blockquote class="c-blockquote" data-dcnode-id="2040"><div class="c-blockquote__body" data-dcnode-id="2041"><span data-dcnode-id="2045" instrument_node="">
</span><p data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">Trump understood that he was being covered live and the cameras weren’t going to turn away. So he forced the networks to cover him standing next to his supermodel wife, slowly descending the escalator into the ornate lobby of a building that had his name on it. Think about the image of success this visual conveyed to most Americans. (p. 2)</span></p><span data-dcnode-id="2042" instrument_node="">
</span></div></blockquote><p data-dcnode-id="2035"><span data-dcnode-id="2039" instrument_node="">Trump’s biographer Gwenda Blair summarized Trump’s approach: “The words don’t matter anymore. The pictures matter” (quoted in Kruse, </span><a aria-label="Reference 2018" data-dcnode-id="2037" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d27988911e417" title="Kruse, M. (2018, January 19). Trump with the sound off. Politico Magazine. Retrieved from 
                  http://politi.co/2DnLL4w
                  
                "><span data-dcnode-id="2038" instrument_node="">2018</span></a><span data-dcnode-id="2036" instrument_node="">, para. 8). From the Trump campaign’s start, visuals were primary, and words were secondary.</span></p></div><div class="c-article-section__content" data-dcnode-id="1995"><p data-dcnode-id="2020"><span data-dcnode-id="2033" instrument_node="">Paralleling the first day of his campaign, the first day of Trump’s presidency was similarly concentrated on visuals when side-by-side images contrasting the scale of President Obama’s first inauguration crowd with the comparatively smaller size of Trump’s crowd lit up social media (including on the National Park Service Twitter account—see Fig. </span><a data-dcnode-id="2031" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2032" instrument_node="">9.1</span></a><span data-dcnode-id="2030" instrument_node="">), where people added commentary about the relative size of the crowd. This visual juxtaposition challenged Trump’s authority and made his inauguration appear subordinate to his predecessor’s swearing-in. The next day, the president admonished the “dishonest media” for showing pictures of empty spaces on the mall and sent White House press secretary Sean Spicer into the briefing room to spar with reporters and falsely claim that “This was the largest audience ever to witness an inauguration, period, both in person and around the globe” (see Kessler, </span><a aria-label="Reference 2017" data-dcnode-id="2028" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d27988911e443" title="Kessler, G. (2017, January 22). Spicer earns Four Pinocchios for false claims on inauguration crowd size. Washington Post. Retrieved from 
                  http://wapo.st/2kgOva9
                  
                "><span data-dcnode-id="2029" instrument_node="">2017</span></a><span data-dcnode-id="2027" instrument_node="">; Trotta, </span><a aria-label="Reference 2017" data-dcnode-id="2025" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d27988911e446" title="Trotta, D. (2017, January 23). Crowd controversy: The making of an Inauguration Day photo. Reuters. Retrieved from 
                  http://reut.rs/2klcTaI
                  
                "><span data-dcnode-id="2026" instrument_node="">2017</span></a><span data-dcnode-id="2024" instrument_node="">). Notably, Spicer and the president himself reached out to the National Park Service and asked for pictures that appeared to depict more spectators in the crowd, resulting in the agency editing the images (Wallace, </span><a aria-label="Reference 2018" data-dcnode-id="2022" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d27988911e453" title="Wallace, G. (2018, September 9). National Park Service edited inauguration photos after Trump, Spicer calls. 
                  
                    CNN.com
                  
                  
                . Retrieved from 
                  https://cnn.it/2wRjf5d
                  
                "><span data-dcnode-id="2023" instrument_node="">2018</span></a><span data-dcnode-id="2021" instrument_node="">). Just like with his campaign, visuals marked the Trump presidency from day one.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1996" data-test="figure" data-title="Fig. 9.1" id="figure-1"><figure data-dcnode-id="1997"><figcaption data-dcnode-id="2017"><b class="c-article-section__figure-caption" data-dcnode-id="2018" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="2019" instrument_node="">Fig. 9.1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2008"><div class="c-article-section__figure-item" data-dcnode-id="2012"><a class="c-article-section__figure-link" data-dcnode-id="2013" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-18729-3_9/figures/1" rel="nofollow"><picture data-dcnode-id="2014"><source data-dcnode-id="2016" srcset="//media.springernature.com/lw685/springer-static/image/chp%3A10.1007%2F978-3-030-18729-3_9/MediaObjects/471874_1_En_9_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="2015" height="490" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/chp%253A10.1007/978-3-030-18729-3_9/MediaObjects/471874_1_En_9_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2009" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">“Compare the crowds: 2009 inauguration at left, 2017 inauguration at right.” @NatlParkService Retweet, January 20, 2017</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1998"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="1999" data-test="chapter-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-18729-3_9/figures/1" rel="nofollow"><span data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2000" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2001" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2002" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2005" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2004" fill-rule="evenodd"></path><span data-dcnode-id="2003" instrument_node="">
</span></a></div></figure></div></div><div class="c-article-section__content" data-dcnode-id="1980"><p data-dcnode-id="1981"><span data-dcnode-id="1994" instrument_node="">While all contemporary U.S. presidents consider visual communication, Trump’s is the first </span><i data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">visual-first presidency</span></i><span data-dcnode-id="1991" instrument_node=""> where images are foundational and indispensable. </span><i data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Politico</span></i><span data-dcnode-id="1988" instrument_node=""> senior staff writer Michael Kruse (</span><a aria-label="Reference 2018" data-dcnode-id="1986" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d27988911e482" title="Kruse, M. (2018, January 19). Trump with the sound off. Politico Magazine. Retrieved from 
                  http://politi.co/2DnLL4w
                  
                "><span data-dcnode-id="1987" instrument_node="">2018</span></a><span data-dcnode-id="1985" instrument_node="">) observed, “Trump is a habitual television watcher who thinks … in terms of building indelible imagery” (para. 3). Echoing this point, media reporter Jason Schwartz (</span><a aria-label="Reference 2018" data-dcnode-id="1983" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d27988911e489" title="Schwartz, J. (2018, May/June). The puzzle of Sarah Huckabee Sanders. Politico Magazine. Retrieved from 
                  https://politi.co/2r2UWPK
                  
                "><span data-dcnode-id="1984" instrument_node="">2018</span></a><span data-dcnode-id="1982" instrument_node="">) noted, “Trump is, of course, obsessed with television, and he manages no part of the government as obsessively as he manages his own image on the screen” (para. 15). Most presidents consider policy first and then develop targeted messages (including visuals) that inform, persuade, and motivate citizens. Trump begins with the visuals and picks policies that bolster the imagery or ignores policy altogether. Longtime Trump political advisor Roger Stone (2018) confirmed this approach: “How you look is more important than how you sound. How you come across is more important than the words you use” (cited in Kruse, para. 6).</span></p></div><div class="c-article-section__content" data-dcnode-id="1959"><p data-dcnode-id="1960"><span data-dcnode-id="1979" instrument_node="">Trump does not leave the visual image-making to communication staff; he personally focuses on pictures and stagecraft. According to reporter Glenn Thrush (</span><a aria-label="Reference 2016" data-dcnode-id="1977" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d27988911e500" title="Thrush, G. (2016, December 26). Politico’s off message [Audio podcast]. Retrieved from 
                  https://itunes.apple.com/us/podcast/chuck-todd-what-makes-donald-trump-laugh/id987591126?i=1000379454085
                  
                "><span data-dcnode-id="1978" instrument_node="">2016</span></a><span data-dcnode-id="1976" instrument_node="">): “Trump never has walked off a set and said, ‘how did I sound?’ All he wants to know is how he looks. The visuals for Trump are key” (27:33). Journalist Chuck Todd reported that Trump wants to see what he looks like in TV interviews. “He will watch the whole thing on mute,” Todd said (cited in Thrush, </span><a aria-label="Reference 2016" data-dcnode-id="1974" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d27988911e507" title="Thrush, G. (2016, December 26). Politico’s off message [Audio podcast]. Retrieved from 
                  https://itunes.apple.com/us/podcast/chuck-todd-what-makes-donald-trump-laugh/id987591126?i=1000379454085
                  
                "><span data-dcnode-id="1975" instrument_node="">2016</span></a><span data-dcnode-id="1973" instrument_node="">, 27:50). In campaign-trail rallies, Trump would rhetorically ask the crowd questions such as “Do I look like a president? How handsome am I, right?” and “I think I look real good. I mean, I think I look like a president” (quoted in Diamond, </span><a aria-label="Reference 2016" data-dcnode-id="1971" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d27988911e510" title="Diamond, J. (2016, April 25). Trump on looking president: “How handsome am I?” 
                  
                    CNN.com
                  
                  
                . Retrieved from 
                  http://cnn.it/1TtqeWR
                  
                "><span data-dcnode-id="1972" instrument_node="">2016</span></a><span data-dcnode-id="1970" instrument_node="">, paras. 2, 12). Additionally, while past presidents have viewed grip-and-grin sessions as a necessary evil, Trump delights in the Oval Office photo op, spending several minutes per sitting, taking variations of a photo with a single group, and inspecting the photos for details like the correct lighting (Dawsey, </span><a aria-label="Reference 2017" data-dcnode-id="1968" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d27988911e513" title="Dawsey, J. (2017, August 28). Trump’s prized perk: Oval Office photo ops. Politico. Retrieved from 
                  http://politi.co/2DvJO5k
                  
                "><span data-dcnode-id="1969" instrument_node="">2017</span></a><span data-dcnode-id="1967" instrument_node="">). Similarly, Republican media consultant Larry Weitzner, who crafted Trump’s 2016 TV message, said that Trump wanted high-energy, high-impact ads that were not boring and that communicated the idea that the Trump campaign was a movement: “Mr. Trump is also a pro when it comes to production and lighting. We had to make sure lighting and set-ups were perfect on production shoots” (quoted in Cillizza, </span><a aria-label="Reference 2016" data-dcnode-id="1965" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d27988911e521" title="Cillizza, C. (2016, December 7). Nothing about the way Team Trump made TV ads was normal. Washington Post. Retrieved from 
                  http://wapo.st/2h0LXIr
                  
                "><span data-dcnode-id="1966" instrument_node="">2016</span></a><span data-dcnode-id="1964" instrument_node="">, para. 5). President Trump extends his need for strong visuals to his staff as well, hiring people who “look and play the part” and complimenting his staff for looking like they came “straight out of Central Casting” (quoted in Allen, </span><a aria-label="Reference 2018" data-dcnode-id="1962" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d27988911e524" title="Allen, M. (2018, March 29). Axios AM. Retrieved from 
                  https://www.axios.com/newsletters/axios-am-60062598-45e0-4025-94f1-1c2cebb264b7.html
                  
                "><span data-dcnode-id="1963" instrument_node="">2018</span></a><span data-dcnode-id="1961" instrument_node="">).</span></p></div><div class="c-article-section__content" data-dcnode-id="1944"><p data-dcnode-id="1945"><span data-dcnode-id="1958" instrument_node="">Red “Make America Great Again” (MAGA) hats, firm thumbs-up gestures from the showman himself, and packed rallies across the country marked a shift in political discourse that would decimate the other Republicans vying for the nomination who largely adhered to traditional forms of communication. There is little debate that Trump dominated media coverage throughout the election (Oates &amp; Moe, </span><a aria-label="Reference 2018" data-dcnode-id="1956" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d27988911e534" title="Oates, S., &amp; Moe, W. (2018). Donald Trump and the “oxygen of publicity”: Branding, social media, and traditional media. In D. Schill &amp; J. A. Hendricks (Eds.), The presidency and social media: Discourse, disruption, and digital democracy in the 2016 presidential election (pp. 209–235). New York: Routledge."><span data-dcnode-id="1957" instrument_node="">2018</span></a><span data-dcnode-id="1955" instrument_node="">). Much of this attention was brought on by an unending cascade of tweets from the @realDonaldTrump account, which relentlessly attacked a variety of political and social figures and promoted the Donald Trump brand. Trump most readily used Twitter to “hurl insults at his opponents and take on the mainstream media when they disagreed with him” (Schill &amp; Hendricks, </span><a aria-label="Reference 2018" data-dcnode-id="1953" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d27988911e541" title="Schill, D., &amp; Hendricks, J. A. (2018). Discourse, disruption, and digital democracy: Political communication in the 2016 presidential campaign. In D. Schill &amp; J. A. Hendricks (Eds.), The presidency and social media: Discourse, disruption, and digital democracy in the 2016 presidential election (pp. 3–36). New York: Routledge."><span data-dcnode-id="1954" instrument_node="">2018</span></a><span data-dcnode-id="1952" instrument_node="">, p. 13). Social media proved to be an invaluable tool of the Trump campaign and is evidence that its proliferation in mainstream politics is designating a new communicative norm of engagement (Katz, Barris, &amp; Jain, </span><a aria-label="Reference 2013" data-dcnode-id="1950" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d27988911e549" title="Katz, J. E., Barris, M., &amp; Jain, A. (2013). The social media president: Barack Obama and the politics of digital engagement. New York: Palgrave Macmillan."><span data-dcnode-id="1951" instrument_node="">2013</span></a><span data-dcnode-id="1949" instrument_node="">; Stieglitz &amp; Dang-Xuan, </span><a aria-label="Reference 2013" data-dcnode-id="1947" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d27988911e552" title="Stieglitz, S., &amp; Dang-Xuan, L. (2013). Social media and political communication: A social media analytics framework. Social Network Analysis and Mining, 3(4), 1277–1291. 
                  https://doi.org/10.1007/s13278-012-0079-3
                  
                "><span data-dcnode-id="1948" instrument_node="">2013</span></a><span data-dcnode-id="1946" instrument_node="">).</span></p></div><div class="c-article-section__content" data-dcnode-id="1938"><p data-dcnode-id="1939"><span data-dcnode-id="1943" instrument_node="">The purpose of this chapter is to examine how Trump used visual communication and political image-making on social media in the first 100&nbsp;days of his presidency. The first 100&nbsp;days in a presidency are important because they set the tone for a new commander-in-chief’s administration. Images drawn from social and digital media are relevant because they represent the administration’s primary means of communication. Political image-making strategies and crafted social media posts are a principal element of this structure and are vital to understanding President Trump’s first years in office. Trump himself is a prolific Twitter user with tens of millions of followers across his social media accounts, and additionally, visual content is distributed on administration and staff accounts. As Trump himself told journalist Maria Bartiromo, “I doubt I would be here if it weren’t for social media, to be honest with you” (quoted in McCaskill, </span><a aria-label="Reference 2017" data-dcnode-id="1941" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d27988911e580" title="McCaskill, N. D. (2017, October 20). Trump credits social media for his election. Politico. Retrieved from 
                  https://www.politico.com/story/2017/10/20/trump-social-media-election-244009
                  
                "><span data-dcnode-id="1942" instrument_node="">2017</span></a><span data-dcnode-id="1940" instrument_node="">, para. 2). The chapter begins with a review of the communicative functions of visual symbols in politics, moves to an analysis of imagery in the early Trump presidency, and concludes with a discussion of how Trump is expanding our understanding of visual politics.</span></p></div><section data-dcnode-id="1845" data-gtm-vis-first-on-screen-50443292_562="1002" data-gtm-vis-first-on-screen-50443292_563="1003" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1002" data-gtm-vis-recent-on-screen-50443292_563="1003" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Visual Political Communication"><div class="c-article-section" data-dcnode-id="1846" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1936" id="Sec1"><span data-dcnode-id="1937" instrument_node="">Visual Political Communication</span></h2><div class="c-article-section__content" data-dcnode-id="1847" id="Sec1-content"><p data-dcnode-id="1928"><span data-dcnode-id="1935" instrument_node="">Previous research on visuals in political contexts has shown that imagery created by politicians and agencies serves as a central component of political communication (Schill, </span><a aria-label="Reference 2012" data-dcnode-id="1933" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d27988911e590" title="Schill, D. (2012). The visual image and the political image: A review of visual communication research in the field of political communication. Review of Communication, 12(2), 118–142. 
                  https://doi.org/10.1080/15358593.2011.653504
                  
                "><span data-dcnode-id="1934" instrument_node="">2012</span></a><span data-dcnode-id="1932" instrument_node="">) but also remains one of the least understood areas. Grabe and Bucy (</span><a aria-label="Reference 2009" data-dcnode-id="1930" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d27988911e593" title="Grabe, M. E., &amp; Bucy, E. P. (2009). Image bite politics: News and the visual framing of elections. New York: Oxford University Press."><span data-dcnode-id="1931" instrument_node="">2009</span></a><span data-dcnode-id="1929" instrument_node="">) alongside other scholars have noticed “a dearth of visual analysis in an era of increasing media reliance” prompting “a small chorus of scholars to call for more research on the visual component” of modern politics (p. 6). These calls have been recognized by communication scholars and there is increasing research into this critical sector of political communication, such as this book.</span></p><p data-dcnode-id="1917"><span data-dcnode-id="1927" instrument_node="">In his overview of research in this area, Schill (</span><a aria-label="Reference 2012" data-dcnode-id="1925" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d27988911e599" title="Schill, D. (2012). The visual image and the political image: A review of visual communication research in the field of political communication. Review of Communication, 12(2), 118–142. 
                  https://doi.org/10.1080/15358593.2011.653504
                  
                "><span data-dcnode-id="1926" instrument_node="">2012</span></a><span data-dcnode-id="1924" instrument_node="">) grouped findings into ten recognized functions of visuals in politics: visuals serving an argumentative function, an agenda-setting function, dramatizing policy, aiding in emotional appeals, serving an image-building function, creating identification, connecting to societal symbols, transporting the audience, and providing ambiguity. Further research has similarly found that the incorporation of visuals into political communication draws forth increased audience attention and that the “framing of visual news coverage can influence audience interpretation of the news, especially in the political context” (Dahmen &amp; Coyle, </span><a aria-label="Reference 2017" data-dcnode-id="1922" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d27988911e614" title="Dahmen, N. S., &amp; Coyle, E. K. (2017). Obama White House photos limited by access policies. Newspaper Research Journal, 38(4), 439–448. 
                  https://doi.org/10.1177/0739532917739872
                  
                "><span data-dcnode-id="1923" instrument_node="">2017</span></a><span data-dcnode-id="1921" instrument_node="">, p. 441). Scholars are still making sense of considerable changes to political communication in the past decade with the incorporation of new mediums in an increasingly connected and pictorial digital world. Research by Joo, Li, Steen, and Zhu (</span><a aria-label="Reference 2014" data-dcnode-id="1919" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d27988911e618" title="Joo, J., Li, W., Steen, F. F., &amp; Zhu, S. (2014). Visual persuasion: Inferring communicative intents of images. Proceedings of the IEEE Conference on Computer Vision and Pattern Recognition (pp. 216–223). 
                  https://doi.org/10.1109/CVPR.2014.35
                  
                "><span data-dcnode-id="1920" instrument_node="">2014</span></a><span data-dcnode-id="1918" instrument_node="">), for example, used computer vision to identify nine dimensions of persuasive intent latent in images of politicians, such as social dominance, trustworthiness, and competence.</span></p><p data-dcnode-id="1894"><span data-dcnode-id="1916" instrument_node="">Broadly speaking, political communication itself has witnessed a substantial change in normative expectations and engagement with the introduction of recent technology (Chadwick, </span><a aria-label="Reference 2013" data-dcnode-id="1914" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d27988911e624" title="Chadwick, A. (2013). The hybrid media system: Politics and power. New York: Oxford University Press."><span data-dcnode-id="1915" instrument_node="">2013</span></a><span data-dcnode-id="1913" instrument_node="">; Katz et al., </span><a aria-label="Reference 2013" data-dcnode-id="1911" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d27988911e627" title="Katz, J. E., Barris, M., &amp; Jain, A. (2013). The social media president: Barack Obama and the politics of digital engagement. New York: Palgrave Macmillan."><span data-dcnode-id="1912" instrument_node="">2013</span></a><span data-dcnode-id="1910" instrument_node="">). Such disruption has been met by fundamental shifts in the way that American citizens access and process their political news. The </span><i data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Pew Research Center</span></i><span data-dcnode-id="1907" instrument_node=""> focused on media and the 2016 presidential election, finding that “91% of adults in America acquire political news in a given week, but that information sources were scattered across 11 distinct types of media” (Gottfried, Barthel, Shearer, &amp; Mitchell, </span><a aria-label="Reference 2016" data-dcnode-id="1905" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d27988911e642" title="Gottfried, J., Barthel, M., Shearer, E., &amp; Mitchell, A. (2016, February 4). The 2016 presidential campaign: A news event that’s hard to miss. Pew Research Center. Retrieved from 
                  http://pewrsr.ch/20IFkeh
                  
                "><span data-dcnode-id="1906" instrument_node="">2016</span></a><span data-dcnode-id="1904" instrument_node="">, para. 1). This variance in information sources was marked by 35% of 18–29-year-olds and 15% of 30–49-year-olds receiving a majority of election information from social media. More recently, </span><i data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Pew</span></i><span data-dcnode-id="1901" instrument_node=""> found that in </span><a aria-label="Reference 2018" data-dcnode-id="1899" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d27988911e652" title="Pew Research Center. (2018, February 5). Social media factsheet. Retrieved from 
                  http://pewrsr.ch/2jbcwOh
                  
                "><span data-dcnode-id="1900" instrument_node="">2018</span></a><span data-dcnode-id="1898" instrument_node="">, 69% of U.S. adults use at least one social media site, a statistic which has risen with each passing presidential election (para. 2). In short, the old influence of hierarchy has been shattered, replaced by a “new mosaic of influence in which social media play a growing role” (Powers, </span><a aria-label="Reference 2016" data-dcnode-id="1896" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d27988911e664" title="Powers, M. (2016, February 23). Who’s influencing election 2016? Medium. Retrieved from 
                  https://medium.com/@socialmachines/who-s-influencing-election-2016-8bed68ddecc3
                  
                "><span data-dcnode-id="1897" instrument_node="">2016</span></a><span data-dcnode-id="1895" instrument_node="">, para. 7).</span></p><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Paralleling how voters have turned to social media as a source for political information, visual communication scholars have turned their attention to visual persuasion online. Social and digital media dominate in the digital age of political communication. Recent research—such as the other chapters in this book—highlights how new mediums are digitally connecting politicians to their constituents, largely bypassing traditional media sources for image building and documentation.</span></p><p data-dcnode-id="1875"><span data-dcnode-id="1891" instrument_node="">These changes in the media-politics ecosystem are not only relevant for coverage of political campaigns; the trends also apply for governmental communication by the resulting administrations (Katz et al., </span><a aria-label="Reference 2013" data-dcnode-id="1889" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d27988911e678" title="Katz, J. E., Barris, M., &amp; Jain, A. (2013). The social media president: Barack Obama and the politics of digital engagement. New York: Palgrave Macmillan."><span data-dcnode-id="1890" instrument_node="">2013</span></a><span data-dcnode-id="1888" instrument_node="">; Losh, </span><a aria-label="Reference 2012" data-dcnode-id="1886" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d27988911e681" title="Losh, E. (2012). Channelling Obama: YouTube, Flickr, and the social media president. Comparative American Studies An International Journal, 10(2–3), 255–268. 
                  https://doi.org/10.1179/1477570012Z.00000000019
                  
                "><span data-dcnode-id="1887" instrument_node="">2012</span></a><span data-dcnode-id="1885" instrument_node="">). The vast majority of research on visuals in politics, however, has been centered on understanding communication during political elections and analyzing the visual rhetoric of campaigns (e.g., Bucy &amp; Dumitrescu, </span><a aria-label="Reference 2016" data-dcnode-id="1883" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d27988911e688" title="Bucy, E. P., &amp; Dumitrescu, D. (2016). Nonverbal influence and the expanding boundaries of political communication research. American Behavioral Scientist, 60(14), 1651–1655. 
                  https://doi.org/10.1177/0002764216678281
                  
                "><span data-dcnode-id="1884" instrument_node="">2016</span></a><span data-dcnode-id="1882" instrument_node="">; Enli &amp; Skogerbø, </span><a aria-label="Reference 2013" data-dcnode-id="1880" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d27988911e691" title="Enli, G., &amp; Skogerbø, E. (2013). Personalized campaigns in party-centered politics. Information, Communication &amp; Society, 16(5), 757–774. 
                  https://doi.org/10.1080/1369118X.2013.782330
                  
                "><span data-dcnode-id="1881" instrument_node="">2013</span></a><span data-dcnode-id="1879" instrument_node="">; Muñoz &amp; Towner, </span><a aria-label="Reference 2017" data-dcnode-id="1877" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d27988911e695" title="Muñoz, C. L., &amp; Towner, T. L. (2017). The image is the message: Instagram marketing and the 2016 presidential primary season. Journal of Political Marketing, 16(3–4), 290–318. 
                  https://doi.org/10.1080/15377857.2017.1334254
                  
                "><span data-dcnode-id="1878" instrument_node="">2017</span></a><span data-dcnode-id="1876" instrument_node="">) and there remains a paucity of research into nonverbal and visual communication of the executive branch outside of campaigns. Understanding the purpose and use of digital media by politicians is critical as it has become an entrenched form of communication that will remain relevant for the study of messaging in both presidential campaigns and administrations.</span></p><p data-dcnode-id="1864"><span data-dcnode-id="1874" instrument_node="">Research in this area has documented the watchdog function of visual journalists and found that the presence of reporters acting as the eyes of the public has readily been replaced by official releases from the White House and a distinctly incomplete narrative which undoubtedly portrays the commander-in-chief in a desirable light (Dahmen &amp; Coyle, </span><a aria-label="Reference 2017" data-dcnode-id="1872" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d27988911e705" title="Dahmen, N. S., &amp; Coyle, E. K. (2017). Obama White House photos limited by access policies. Newspaper Research Journal, 38(4), 439–448. 
                  https://doi.org/10.1177/0739532917739872
                  
                "><span data-dcnode-id="1873" instrument_node="">2017</span></a><span data-dcnode-id="1871" instrument_node="">). Photos on social media sites such as Instagram function as visual press releases where newsmakers disseminate flattering selfies, seemingly impromptu images designed to reveal the candid selves of politicians just as families share holiday greetings (Schwarz, </span><a aria-label="Reference 2018" data-dcnode-id="1869" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d27988911e720" title="Schwarz, H. (2018, August 6). The Obamas, Beyoncé and how official photos have become visual press releases. 
                  
                    CNN.com
                  
                  
                . Retrieved from 
                  https://cnn.it/2AMJv64
                  
                "><span data-dcnode-id="1870" instrument_node="">2018</span></a><span data-dcnode-id="1868" instrument_node="">). While many thought the use of social media by politicians and presidential administrations would increase openness and public access, its growth has led to less transparency. Under the Obama administration, for example, despite statements by the president striving for “an unprecedented level of openness in government,” visual access to the president was stringently limited and replaced by steady streams of official photo releases (Dahmen &amp; Coyle, </span><a aria-label="Reference 2017" data-dcnode-id="1866" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d27988911e732" title="Dahmen, N. S., &amp; Coyle, E. K. (2017). Obama White House photos limited by access policies. Newspaper Research Journal, 38(4), 439–448. 
                  https://doi.org/10.1177/0739532917739872
                  
                "><span data-dcnode-id="1867" instrument_node="">2017</span></a><span data-dcnode-id="1865" instrument_node="">, p. 440).</span></p><p data-dcnode-id="1853"><span data-dcnode-id="1863" instrument_node="">The Trump administration continued this trend of visual branding through social media. Specifically, the multitude of visuals offered through the official White House social media accounts serves a function of promoting identification, authority, and legitimacy of Donald Trump as president. As a candidate with a victory “generally unexpected by most analysts” (Oates &amp; Moe, </span><a aria-label="Reference 2018" data-dcnode-id="1861" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d27988911e746" title="Oates, S., &amp; Moe, W. (2018). Donald Trump and the “oxygen of publicity”: Branding, social media, and traditional media. In D. Schill &amp; J. A. Hendricks (Eds.), The presidency and social media: Discourse, disruption, and digital democracy in the 2016 presidential election (pp. 209–235). New York: Routledge."><span data-dcnode-id="1862" instrument_node="">2018</span></a><span data-dcnode-id="1860" instrument_node="">, p. 209), Trump and his team used official presidential social media as an image-making tool to represent legitimacy by highlighting the administration as successful and well-liked by government elites in Washington (Shaw, </span><a aria-label="Reference 2017" data-dcnode-id="1858" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d27988911e753" title="Shaw, M. (2017, April 25). 11 images that show how the Trump administration is failing at photography. Columbia Journalism Review. Retrieved from 
                  https://www.cjr.org/covering_trump/trump-photography.php
                  
                "><span data-dcnode-id="1859" instrument_node="">2017</span></a><span data-dcnode-id="1857" instrument_node="">). By using digital media as a forum for carefully regulated visual press releases, the administration has been able to utilize image-making by carefully presenting “a controlled viewpoint that will only present the president in the best of lights” (Dahmen &amp; Coyle, </span><a aria-label="Reference 2017" data-dcnode-id="1855" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d27988911e757" title="Dahmen, N. S., &amp; Coyle, E. K. (2017). Obama White House photos limited by access policies. Newspaper Research Journal, 38(4), 439–448. 
                  https://doi.org/10.1177/0739532917739872
                  
                "><span data-dcnode-id="1856" instrument_node="">2017</span></a><span data-dcnode-id="1854" instrument_node="">, p. 445).</span></p><p data-dcnode-id="1848"><span data-dcnode-id="1852" instrument_node="">Scholars have already begun studying Trump’s visual communication and the multitude of posts featured on his social media platforms. Russell Scott Chun (</span><a aria-label="Reference 2018" data-dcnode-id="1850" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d27988911e767" title="Chun, R. S. (2018). Visual rhetoric of the presidency: An analysis of the Trump and Obama White House messaging in their first 100 days in Flickr images. Journal of Visual Literacy, 37(1), 18–39. 
                  https://doi.org/10.1080/1051144X.2018.1450129
                  
                "><span data-dcnode-id="1851" instrument_node="">2018</span></a><span data-dcnode-id="1849" instrument_node="">), for instance, examined the first 100&nbsp;days images released by the White House on Flickr, the photo-sharing site. Based on Kenneth Burke’s dramatistic pentad, Chun found that the Trump administration’s visual narrative echoed campaign rhetoric with allusions to authoritarian tropes, the singularity of President Trump, and visual claims of widespread popularity. This chapter extends Chun’s findings through a similar qualitative analysis of images on Twitter and Facebook, which is detailed in the next section.</span></p></div></div></section><section data-dcnode-id="1823" data-title="Method"><div class="c-article-section" data-dcnode-id="1824" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1843" id="Sec2"><span data-dcnode-id="1844" instrument_node="">Method</span></h2><div class="c-article-section__content" data-dcnode-id="1825" id="Sec2-content"><p data-dcnode-id="1826"><span data-dcnode-id="1842" instrument_node="">The present study is a grounded, qualitative study of visuals on President Donald Trump’s most-followed social media services. All images collected and analyzed were found natively on Facebook and Twitter on the “Donald Trump” and @realDonaldTrump pages, respectively. These two digital media sources were selected for their large following and a high degree of user engagement, with Trump amassing 50.4&nbsp;million Twitter followers and 24.5&nbsp;million Facebook followers as of April 2018. All directly posted pictorial elements shared between January 20, 2017, (Inauguration Day) and April 29, 2017, (100th day) on both platforms were individually screenshotted and collected in their original sequence. The images (</span><i data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">N</span></i><span data-dcnode-id="1839" instrument_node="">&nbsp;=&nbsp;254 from Facebook and </span><i data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">N</span></i><span data-dcnode-id="1836" instrument_node="">&nbsp;=&nbsp;68 from Twitter) were inductively analyzed using qualitative thematic analysis to identify common themes among the images (see Chun, </span><a aria-label="Reference 2018" data-dcnode-id="1834" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d27988911e830" title="Chun, R. S. (2018). Visual rhetoric of the presidency: An analysis of the Trump and Obama White House messaging in their first 100 days in Flickr images. Journal of Visual Literacy, 37(1), 18–39. 
                  https://doi.org/10.1080/1051144X.2018.1450129
                  
                "><span data-dcnode-id="1835" instrument_node="">2018</span></a><span data-dcnode-id="1833" instrument_node="">). Grounded by Schill’s (</span><a aria-label="Reference 2012" data-dcnode-id="1831" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d27988911e833" title="Schill, D. (2012). The visual image and the political image: A review of visual communication research in the field of political communication. Review of Communication, 12(2), 118–142. 
                  https://doi.org/10.1080/15358593.2011.653504
                  
                "><span data-dcnode-id="1832" instrument_node="">2012</span></a><span data-dcnode-id="1830" instrument_node="">) functions, both authors independently analyzed the images using the constant comparative method and identified common thematic and visual elements that were compiled across the sample of photos (see Lindlof &amp; Taylor, </span><a aria-label="Reference 2019" data-dcnode-id="1828" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d27988911e837" title="Lindlof, T. R., &amp; Taylor, B. C. (2019). Qualitative communication research methods (4th ed.). Thousand Oaks, CA: Sage."><span data-dcnode-id="1829" instrument_node="">2019</span></a><span data-dcnode-id="1827" instrument_node="">). The authors then compared their analyses, looking for areas of agreement and divergence. Thematic saturation was achieved in the second round of coding as no new themes or categories were observed in the data and all variation was accounted for and understood. The themes are described and discussed in the next section.</span></p></div></div></section><section data-dcnode-id="1710" data-title="Results"><div class="c-article-section" data-dcnode-id="1711" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1821" id="Sec3"><span data-dcnode-id="1822" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="1712" id="Sec3-content"><p data-dcnode-id="1810"><span data-dcnode-id="1820" instrument_node="">Ten visual tactics were used most commonly in Trump’s visual presentation on social media: President Trump seated at desk/table, text overlaid across an image, signing a document, foreign leader, people clapping, linear perspective framing, “Make America Great Again,” Trump alone with a quote, direct Twitter repost, and military/veterans (see Table </span><a data-dcnode-id="1818" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1819" instrument_node="">9.1</span></a><span data-dcnode-id="1817" instrument_node="">). Making up a significant portion of the coded images (96 of the 322 artifacts analyzed) were visuals of President Trump seated at a desk or table in a variety of perspectives, sizes, and locations. While many photos featured the famous Resolute desk, other visuals included miniature desks with an oversized presidential seal (see Fig. </span><a data-dcnode-id="1815" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1816" instrument_node="">9.2</span></a><span data-dcnode-id="1814" instrument_node="">, Image C), tables set up at the Eisenhower Executive Office Building, and other desks in the White House. Included in many of these images are instances of the president signing documents, including numerous examples highlighting executive orders being signed (see Fig. </span><a data-dcnode-id="1812" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="1813" instrument_node="">9.2</span></a><span data-dcnode-id="1811" instrument_node="">, Image A). From the 322 visuals captured, 33 pictures documented these signing ceremonies, often depicting a considerable crowd of White House officials or cabinet members located behind the president.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1795" data-test="inline-table" id="table-1"><figure data-dcnode-id="1796"><figcaption class="c-article-table__figcaption" data-dcnode-id="1807"><b data-dcnode-id="1808" data-test="table-caption" id="Tab1"><span data-dcnode-id="1809" instrument_node="">Table 9.1 Frequency of visual communication tactics from Donald Trump’s Facebook and Twitter accounts over the first 100&nbsp;days of the Trump presidency</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1797"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1798" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-3-030-18729-3_9/tables/1" rel="nofollow"><span data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1799" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1800" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1801" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1804" instrument_node="">
