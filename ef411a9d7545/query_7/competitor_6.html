%20thought%20of%20sharing%20it%20with%20you.%20Check%20it%20out:%20https://ownersmag.com/25-biggest-failures-of-the-trump-presidency/"><li class="mvp-soc-mob-email" data-dcnode-id="1510"><span data-dcnode-id="1512" instrument_node=""> </span><i aria-hidden="true" class="fa fa-envelope-o" data-dcnode-id="1511"></i></li><span data-dcnode-id="1509" instrument_node=""> </span></a><span data-dcnode-id="1507" instrument_node=""> </span><a data-dcnode-id="1502" href="#comments"><li class="mvp-soc-mob-com mvp-com-click" data-dcnode-id="1504"><span data-dcnode-id="1506" instrument_node=""> </span><i aria-hidden="true" class="fa fa-comment-o" data-dcnode-id="1505"></i></li><span data-dcnode-id="1503" instrument_node=""> </span></a></div></ul></div></div><div class="mvp-soc-mob-right left relative" data-dcnode-id="1495"><span data-dcnode-id="1497" instrument_node=""> </span><i aria-hidden="true" class="fa fa-ellipsis-h" data-dcnode-id="1496"></i></div></div></div><div class="mvp-post-soc-in" data-dcnode-id="1093"><div class="left relative" data-dcnode-id="1094" id="mvp-content-body"><div class="left relative" data-dcnode-id="1266" id="mvp-content-body-top"><div class="left relative" data-dcnode-id="1327" id="mvp-content-main"><div class="theiaPostSlider_slides" data-dcnode-id="1331" id="tps_slideContainer_10481"><div class="theiaPostSlider_preloadedSlide" data-dcnode-id="1332"><aside class="mashsb-container mashsb-main mashsb-stretched" data-dcnode-id="1474"><div class="mashsb-box" data-dcnode-id="1477"><div class="mashsb-count mash-medium" data-dcnode-id="1488" style="float:left;"><div class="counts mashsbcount" data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">631</span></div><span class="mashsb-sharetext" data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">SHARES</span></span></div><div class="mashsb-buttons" data-dcnode-id="1478"><a class="mashicon-facebook mash-medium mash-center mashsb-noshadow" data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fownersmag.com%252F25-biggest-failures-of-the-trump-presidency%252F" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="1487"></span><span class="text" data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Share</span></span></a><a class="mashicon-twitter mash-medium mash-center mashsb-noshadow" data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D25%2520Biggest%2520Failures%2520of%2520the%2520Trump%2520Presidency%26url%3Dhttps%3A//ownersmag.com/25-biggest-failures-of-the-trump-presidency/%26via%3Dhttps%3A//twitter.com/ownersmagazine" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="1483"></span><span class="text" data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Tweet</span></span></a><div class="onoffswitch2 mash-medium mashsb-noshadow" data-dcnode-id="1479" style="display:none;"></div></div></div><div data-dcnode-id="1476" style="clear:both;"></div><div class="mashsb-toggle-container" data-dcnode-id="1475"></div></aside><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Donald Trump was one of Barack Obama’s most vocal critics. He was quite proud of forcing the then president to release his birth certificate after claiming he was not fit to lead the country. But when it came time to prove his worth as the country’s leader, he had more failures to show than achievements. Here are the top 25 biggest trump presidency failures.</span></p><h2 data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">1. Withdrawing from the Paris agreement</span></h2><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">The United States of America joined the likes of Syria and Nicaragua when President Trump withdrew from the Paris Agreement on climate change. Over 200 countries signed the agreement in an attempt to curtail greenhouse gas emissions to contain global warming to two degrees Celsius. It was met with worldwide and nationwide criticism and led many to view the US and Trump as protecting the interest of fossil fuel shareholders.</span></p><h2 data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">2. Muslim travel ban</span></h2><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Within the first week of Trump being in office, he implemented a travel ban of travelers coming from six Muslim-majority countries: Libya, Syria, Sudan, Somalia, Iraq, Iran, and Yemen. It wreaks havoc within the country as well as abroad. Federal courts in California and Hawaii cited the travel ban to be unconstitutional and put a hold on it. Appeals to take the matter up to the Supreme Court have already begun.</span></p><h2 data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">3. Getting Mexico to pay for the border wall</span></h2><figure class="wp-block-image size-large" data-dcnode-id="1458"><img alt="" class="lazy wp-image-10487" data-dcnode-id="1461" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://ownersmag.com/wp-content/uploads/2020/09/gray-brick-wall.jpg" data-lazy-srcset="https://ownersmag.com/wp-content/uploads/2020/09/gray-brick-wall.jpg 800w, https://ownersmag.com/wp-content/uploads/2020/09/gray-brick-wall-300x225.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/gray-brick-wall-768x576.jpg 768w" data-lazy-type="image" height="600" loading="lazy" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ownersmag.com/wp-content/uploads/2020/09/gray-brick-wall.jpg&amp;raw" srcset="https://ownersmag.com/wp-content/uploads/2020/09/gray-brick-wall.jpg 800w, https://ownersmag.com/wp-content/uploads/2020/09/gray-brick-wall-300x225.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/gray-brick-wall-768x576.jpg 768w" width="800"><noscript data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">&lt;img loading="lazy" width="800" height="600" src="https://ownersmag.com/wp-content/uploads/2020/09/gray-brick-wall.jpg" alt="" class="wp-image-10487" srcset="https://ownersmag.com/wp-content/uploads/2020/09/gray-brick-wall.jpg 800w, https://ownersmag.com/wp-content/uploads/2020/09/gray-brick-wall-300x225.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/gray-brick-wall-768x576.jpg 768w" sizes="(max-width: 800px) 100vw, 800px"/&gt;</span></noscript></figure><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">The great wall was Trump’s rallying cry during his campaign. He vehemently promised voters that he will build a wall and Mexico will be the one to pay for it. Estimates put the total cost of the border wall close to $25 billion dollars to account for materials, labor, land acquisition, repairs, and new construction. Mexico was adamant that they would never pay for the border wall.</span></p><h2 data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">4. Repealing Obamacare</span></h2><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Getting rid of the Affordable Care Act, otherwise known as Obamacare, was a central goal to all Republicans who ran for office that year, including Trump. But drafting a new bill to replace Obamacare brought more challenges. It received numerous objections from senators and reported tension between Mr. Trump, Senate Majority Leader Mitch McConnell, and House Speaker Paul Ryan, efforts to replace Obamacare hit a roadblock.</span></p><h2 data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">5. Championing LGBT rights</span></h2><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Donal Trump tweeted in July 2016 claiming he would “fight for you” and arguing that Hilary Clinton would only be a disaster for LGBT rights. However, the administration failed to deliver on its promises. Medicaid Services and Centres for Medicare rolled back a rule recognizing same-sex marriage for visitation rights in care facilities. Trump also signed an executive order that bans transgender people from serving in the military.</span></p><h2 data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">6. Federal debt</span></h2><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">During this presidential campaign back in 2016, Trump promised to eliminate the federal debt within eight years. Instead, it has skyrocketed because of Trump’s $1.9 trillion tax cuts for corporations and the wealthy. He has since used the growing debt to threaten Social Security, Medicare, and Medicaid with budgetary cuts.</span></p><h2 data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">7. Trade deficit</span></h2><figure class="wp-block-image size-large" data-dcnode-id="1438"><img alt="" class="lazy wp-image-10486" data-dcnode-id="1441" data-lazy-sizes="(max-width: 1000px) 100vw, 1000px" data-lazy-src="https://ownersmag.com/wp-content/uploads/2020/09/documents-and-calculator-on-an-open-folder.jpg" data-lazy-srcset="https://ownersmag.com/wp-content/uploads/2020/09/documents-and-calculator-on-an-open-folder.jpg 1000w, https://ownersmag.com/wp-content/uploads/2020/09/documents-and-calculator-on-an-open-folder-300x207.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/documents-and-calculator-on-an-open-folder-768x530.jpg 768w" data-lazy-type="image" height="690" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ownersmag.com/wp-content/uploads/2020/09/documents-and-calculator-on-an-open-folder.jpg&amp;raw" srcset="https://ownersmag.com/wp-content/uploads/2020/09/documents-and-calculator-on-an-open-folder.jpg 1000w, https://ownersmag.com/wp-content/uploads/2020/09/documents-and-calculator-on-an-open-folder-300x207.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/documents-and-calculator-on-an-open-folder-768x530.jpg 768w" width="1000"><noscript data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">&lt;img loading="lazy" width="1000" height="690" src="https://ownersmag.com/wp-content/uploads/2020/09/documents-and-calculator-on-an-open-folder.jpg" alt="" class="wp-image-10486" srcset="https://ownersmag.com/wp-content/uploads/2020/09/documents-and-calculator-on-an-open-folder.jpg 1000w, https://ownersmag.com/wp-content/uploads/2020/09/documents-and-calculator-on-an-open-folder-300x207.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/documents-and-calculator-on-an-open-folder-768x530.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px"/&gt;</span></noscript></figure><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">It is during Trump’s presidency that Americans saw the highest trade deficit in its history. The country is now buying more goods and services from other countries than what it sells to the rest of the world. Bringing down the country’s trade deficit was one of the things Trump promised during his campaign but failed to achieve during his time in office.</span></p><h2 data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">8. Tax law</span></h2><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">Most Americans remain divided when the new tax law was passed in 2017. Public opinion leans a little more towards the negative, especially when it came to light that more tax breaks were going to be granted to wealthier Americans and the risk that was created for Social Security and Medicare.</span></p><h2 data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">9. Changes to SNAP</span></h2><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">The Supplemental Nutrition Assistance Program, or SNAP, is a federal program aimed to help no- and low-income people have better access to quality food. The changes proposed by the Trump administration to the program worried a lot of people on how it would impact poor families, particularly children from low-income households.</span></p><h2 data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">10. False or misleading claims</span></h2><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">The world is witness to Trump’s troubled relationship with truth and facts. He has a well-documented record of embellishing many of his accomplishments. Since being elected as president, Trump has made at least 15,400 misleading or false claims, according to an analysis done by The Washington Post. He has falsely yet repeatedly claimed that he is responsible for the “greatest economy” in United States history. He has also taken credit for the steady economic growth that already began during the previous administration.</span></p><h2 data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">11. Charlottesville fiasco</span></h2><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">One of the most controversial moments of Trump’s presidency was his response to the deadly neo-Nazi rally which took place in Charlottesville, Virginia. His response sheds light on his controversial record when it comes to white supremacy and race relations. And it highlighted his struggle to bring the entire country together after tragedies. He blamed both sides for the violence that ensued which resulted in the death of a counterprotester, Heather Heyer. He was criticized by both sides for his failure to swiftly condemn white supremacist violence.</span></p><h2 data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">12. America’s global image</span></h2><figure class="wp-block-image size-large" data-dcnode-id="1414"><img alt="" class="lazy wp-image-10485" data-dcnode-id="1417" data-lazy-sizes="(max-width: 1000px) 100vw, 1000px" data-lazy-src="https://ownersmag.com/wp-content/uploads/2020/09/american-flag-on-a-pole.jpg" data-lazy-srcset="https://ownersmag.com/wp-content/uploads/2020/09/american-flag-on-a-pole.jpg 1000w, https://ownersmag.com/wp-content/uploads/2020/09/american-flag-on-a-pole-300x200.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/american-flag-on-a-pole-768x512.jpg 768w" data-lazy-type="image" height="667" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ownersmag.com/wp-content/uploads/2020/09/american-flag-on-a-pole.jpg&amp;raw" srcset="https://ownersmag.com/wp-content/uploads/2020/09/american-flag-on-a-pole.jpg 1000w, https://ownersmag.com/wp-content/uploads/2020/09/american-flag-on-a-pole-300x200.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/american-flag-on-a-pole-768x512.jpg 768w" width="1000"><noscript data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">&lt;img loading="lazy" width="1000" height="667" src="https://ownersmag.com/wp-content/uploads/2020/09/american-flag-on-a-pole.jpg" alt="" class="wp-image-10485" srcset="https://ownersmag.com/wp-content/uploads/2020/09/american-flag-on-a-pole.jpg 1000w, https://ownersmag.com/wp-content/uploads/2020/09/american-flag-on-a-pole-300x200.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/american-flag-on-a-pole-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px"/&gt;</span></noscript></figure><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Under the leadership of Trump, America’s global image has steadily declined due to his tendency to insult US allies and siding with dictators. A report from the Institute for Economics and Peace stated that confidence in American leadership has significantly declined since Trump was elected into office. Trump’s antics which include pulling out of important landmark international agreements such as the Paris Agreement have pushed many important allies away and left the US isolated.</span></p><h2 data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">13. Separating families</span></h2><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">During his campaign, Trump promised a hardline approach when it comes to reducing undocumented immigration into the US. His efforts to uphold that promise was met with international criticism and accusations of violating international law set by the UN and human rights abuses. His zero-tolerance approach on illegal border crossing caused at least 5,000 families to be separated, with children being placed in cages. Despite an executive order to stop family separation in June 2018, the fallout from the incident is still ongoing.</span></p><h2 data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">14. Death of children in US custody</span></h2><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">One such fallout was the widespread condemnation of the conditions inside the detention facilities which led to the death of six migrant children. Children were forced to sleep on the floor in very crowded facilities, no adequate access to food or adequate health care, and extremely poor sanitation conditions.</span></p><h2 data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">15. Corporate investments</span></h2><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Trump said that corporations are going to invest their tax-cut savings. Instead, they spent a lot more money trying to buy back their shares of their own stock than they invested in facilities and new equipment. The stock buybacks didn’t do much to boost the economy but it did increase bonuses to executives and payouts to rich investors.</span></p><h2 data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">16. Tax cut for middle America</span></h2><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">The tax cut that Trump promised to middle-class American families never materialized. In fact, a preliminary analysis of the effects of the Tax Cuts and Jobs Act predicted that by 2027 most Americans will end up paying more.</span></p><h2 data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">17. Outsourcing jobs</span></h2><figure class="wp-block-image size-large" data-dcnode-id="1390"><img alt="" class="lazy lazy-hidden wp-image-10483" data-dcnode-id="1393" data-lazy-sizes="(max-width: 1000px) 100vw, 1000px" data-lazy-src="https://ownersmag.com/wp-content/uploads/2020/09/people-holding-signs.jpg" data-lazy-srcset="https://ownersmag.com/wp-content/uploads/2020/09/people-holding-signs.jpg 1000w, https://ownersmag.com/wp-content/uploads/2020/09/people-holding-signs-300x200.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/people-holding-signs-768x512.jpg 768w" data-lazy-type="image" height="667" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1000"><noscript data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">&lt;img loading="lazy" width="1000" height="667" src="https://ownersmag.com/wp-content/uploads/2020/09/people-holding-signs.jpg" alt="" class="wp-image-10483" srcset="https://ownersmag.com/wp-content/uploads/2020/09/people-holding-signs.jpg 1000w, https://ownersmag.com/wp-content/uploads/2020/09/people-holding-signs-300x200.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/people-holding-signs-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px"/&gt;</span></noscript></figure><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Trump promised to crack down on companies who were outsourcing jobs abroad and to keep jobs in the country. But because of his new tax law, it gave companies the incentives to expand their operations overseas. The resulting trade wars also helped to encourage companies to move their productions abroad.</span></p><h2 data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">18. Increasing wages</span></h2><p data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">A lot of Trump supporters were promised an increase in wages up to $4,000 for the average American family. What happened instead was wages remained flat, adjusted for inflation. Meanwhile, corporate profits continue to soar high and the wealthy become even richer.</span></p><h2 data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">19. Approach to foreign policy</span></h2><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">When it comes to dealings with other nations, Trump has a decidedly peculiar, almost reckless, approach. Most of his foreign policy strategies do more harm than good to American alliances. This is clearly evident in how he tackled state relations with Iran and his decision to pull out US troops in Syria.</span></p><h2 data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">20. Nuclear deal and Iran</span></h2><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">The administration’s decision to withdraw the country from the 2015 nuclear deal resulted in chaos throughout the Middle East. US allies heavily who signed the deal condemned the decision. Trump has failed to curtail Iran’s aggression within the region. A series of incidents in the Persian Gulf resulted in escalating tensions between Tehran and Washington and helped sparked fears of an all-out war.</span></p><h2 data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">21. Pulling out US troops in Syria</span></h2><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Trump also made the decision to pull the troops out of Northern Syria, effectively abandoning US-allied Kurdish forces who took most of the brunt during the US-led campaign to fight ISIS. It resulted in a humanitarian crisis and left a security vacuum that Iran, Russian, and Syrian president and accused war criminal Bashar al-Assad benefited from.</span></p><h2 data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">22. Impeachment</span></h2><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">On December 18, President Trump was impeached in the House of Representatives. The House approved two articles of impeachment against Trump. One was for abuse of power, the other was for obstruction of Congress. He urged Ukraine to conduct investigations on his political rivals by withholding $400 million of congressionally-approved military aid from the country, which was in the midst of fighting an ongoing war against pro-Russian separatists.</span></p><h2 data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">23. Response to the coronavirus pandemic</span></h2><figure class="wp-block-image size-large" data-dcnode-id="1362"><img alt="" class="lazy lazy-hidden wp-image-10484" data-dcnode-id="1365" data-lazy-sizes="(max-width: 1000px) 100vw, 1000px" data-lazy-src="https://ownersmag.com/wp-content/uploads/2020/09/two-people-holding-a-poster.jpg" data-lazy-srcset="https://ownersmag.com/wp-content/uploads/2020/09/two-people-holding-a-poster.jpg 1000w, https://ownersmag.com/wp-content/uploads/2020/09/two-people-holding-a-poster-300x200.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/two-people-holding-a-poster-768x512.jpg 768w" data-lazy-type="image" height="667" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1000"><noscript data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">&lt;img loading="lazy" width="1000" height="667" src="https://ownersmag.com/wp-content/uploads/2020/09/two-people-holding-a-poster.jpg" alt="" class="wp-image-10484" srcset="https://ownersmag.com/wp-content/uploads/2020/09/two-people-holding-a-poster.jpg 1000w, https://ownersmag.com/wp-content/uploads/2020/09/two-people-holding-a-poster-300x200.jpg 300w, https://ownersmag.com/wp-content/uploads/2020/09/two-people-holding-a-poster-768x512.jpg 768w" sizes="(max-width: 1000px) 100vw, 1000px"/&gt;</span></noscript></figure><p data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">During the COVID-19 pandemic, every time Trump speaks, he only adds to the fear and chaos happening all around. He initially told Americans the virus was not serious. Then, he asserted his hunches about the available data. After which, he gave an assurance that a vaccine would be available within 12 to 18 months. Plus, he even forbade Europeans from entering the country. And he wrongly announced that Google was working on a website to help with testing. After every statement made by Trump, there was a need to clarify everything he said.</span></p><h2 data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">24. Mass testing</span></h2><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">The administration’s incompetence was highlighted once again during Trump’s actions (or inactions) during the pandemic. The biggest glaring failure of the administration was in failing to have enough tests available to determine the infected and to screen others for possible exposure. In contrast, South Korea was conducting thousands of more tests per day than the US. The lack of tests led to authorities failing to understand the scope of the pandemic and to take necessary steps to curb its spread.</span></p><h2 data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">25. Numerous embarrassing gaffes</span></h2><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Trump once confused 9/11 with 7 Eleven during a campaign rally back in 2016. He mistook the Virgin Islands as a separate nation and not part of US territory. During a press briefing, he inaccurately stated that the 1918 Spanish Flu helped end World War II. And to celebrate his wife’s return to the White House after a stint in the hospital for a kidney condition, Trump misspelled Melania, referring to her as Melanie. These and many more helped erode the credibility of Trump’s position.</span></p><aside class="mashsb-container mashsb-main mashsb-stretched" data-dcnode-id="1333"><div class="mashsb-box" data-dcnode-id="1336"><div class="mashsb-count mash-medium" data-dcnode-id="1347" style="float:left;"><div class="counts mashsbcount" data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">631</span></div><span class="mashsb-sharetext" data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">SHARES</span></span></div><div class="mashsb-buttons" data-dcnode-id="1337"><a class="mashicon-facebook mash-medium mash-center mashsb-noshadow" data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fownersmag.com%252F25-biggest-failures-of-the-trump-presidency%252F" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="1346"></span><span class="text" data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Share</span></span></a><a class="mashicon-twitter mash-medium mash-center mashsb-noshadow" data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D25%2520Biggest%2520Failures%2520of%2520the%2520Trump%2520Presidency%26url%3Dhttps%3A//ownersmag.com/25-biggest-failures-of-the-trump-presidency/%26via%3Dhttps%3A//twitter.com/ownersmagazine" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="1342"></span><span class="text" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Tweet</span></span></a><div class="onoffswitch2 mash-medium mashsb-noshadow" data-dcnode-id="1338" style="display:none;"></div></div></div><div data-dcnode-id="1335" style="clear:both;"></div><div class="mashsb-toggle-container" data-dcnode-id="1334"></div></aside></div></ p-post-date" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">2 days ago</span></span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">on</span></p><span data-dcnode-id="1072" instrument_node=""> </span><span class="mvp-post-date" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">April 22, 2022</span></span></div><div class="mvp-author-info-name left relative" data-dcnode-id="1062"><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">By</span></p><span data-dcnode-id="1066" instrument_node=""> </span><span class="author-name vcard fn author" data-dcnode-id="1063" itemprop="name"><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ownersmag.com/author/jeffrey-davidson/" rel="author" title="Posts by Jeffrey Davidson"><span data-dcnode-id="1065" instrument_node="">Jeffrey Davidson</span></a></span></div></div></div></div><div class="mvp-post-add-body left relative" data-dcnode-id="961"><div class="mvp-post-add-img left relative" data-dcnode-id="1054"><span data-dcnode-id="1058" instrument_node=""> </span><img alt="row of white and red shoes" class="lazy lazy-hidden attachment- size- wp-post-image" data-dcnode-id="1057" data-lazy-sizes="(max-width: 1200px) 100vw, 1200px" data-lazy-src="https://ownersmag.com/wp-content/uploads/2022/04/shoes.jpg" data-lazy-srcset="https://ownersmag.com/wp-content/uploads/2022/04/shoes.jpg 1200w, https://ownersmag.com/wp-content/uploads/2022/04/shoes-300x158.jpg 300w, https://ownersmag.com/wp-content/uploads/2022/04/shoes-1024x538.jpg 1024w, https://ownersmag.com/wp-content/uploads/2022/04/shoes-768x403.jpg 768w" data-lazy-type="image" height="630" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1200"><noscript data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">&lt;img width="1200" height="630" src="https://ownersmag.com/wp-content/uploads/2022/04/shoes.jpg" class="attachment- size- wp-post-image" alt="row of white and red shoes" loading="lazy" srcset="https://ownersmag.com/wp-content/uploads/2022/04/shoes.jpg 1200w, https://ownersmag.com/wp-content/uploads/2022/04/shoes-300x158.jpg 300w, https://ownersmag.com/wp-content/uploads/2022/04/shoes-1024x538.jpg 1024w, https://ownersmag.com/wp-content/uploads/2022/04/shoes-768x403.jpg 768w" sizes="(max-width: 1200px) 100vw, 1200px"/&gt;</span></noscript></div><div class="mvp-post-add-cont left relative" data-dcnode-id="962"><div class="mvp-post-add-main right relative" data-dcnode-id="968"><div class="theiaPostSlider_slides" data-dcnode-id="972" id="tps_slideContainer_16367"><div class="theiaPostSlider_preloadedSlide" data-dcnode-id="973"><aside class="mashsb-container mashsb-main mashsb-stretched" data-dcnode-id="1035"><div class="mashsb-box" data-dcnode-id="1038"><div class="mashsb-count mash-medium" data-dcnode-id="1049" style="float:left;"><div class="counts mashsbcount" data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">68</span></div><span class="mashsb-sharetext" data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">SHARES</span></span></div><div class="mashsb-buttons" data-dcnode-id="1039"><a class="mashicon-facebook mash-medium mash-center mashsb-noshadow" data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fownersmag.com%252Frise-and-fall-of-zappos%252F" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="1048"></span><span class="text" data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Share</span></span></a><a class="mashicon-twitter mash-medium mash-center mashsb-noshadow" data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D25%2520Biggest%2520Failures%2520of%2520the%2520Trump%2520Presidency%26url%3Dhttps%3A//ownersmag.com/rise-and-fall-of-zappos/%26via%3Dhttps%3A//twitter.com/ownersmagazine" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="1044"></span><span class="text" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Tweet</span></span></a><div class="onoffswitch2 mash-medium mashsb-noshadow" data-dcnode-id="1040" style="display:none;"></div></div></div><div data-dcnode-id="1037" style="clear:both;"></div><div class="mashsb-toggle-container" data-dcnode-id="1036"></div></aside><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Zappos has been known to be that exciting company with a fun yet efficient office. Its novel way of “anything goes” strategy was wildly unheard of during its onset. Because of this, it even caught the eye of business executives and other industry leaders for its style of management. In fact, a few years after the company was founded, it was acquired by Amazon for $1.2 billion. But the company has seen quite the journey since its start. And the rise and fall of Zappos CEO Tony Hsieh have been an interesting topic for many.</span></p><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">While on the outside, the man wanted to spread happiness into the world, he often struggled with alcohol and had personal demons he had to face.&nbsp;</span></p><h2 data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">How Tony Hsieh built Zappos</span></h2><p data-dcnode-id="1024"><span data-dcnode-id="1028" instrument_node="">Before leading </span><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.zappos.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1027" instrument_node="">Zappos</span></a><span data-dcnode-id="1025" instrument_node="">, Hsieh, who is of Taiwanese descent, founded the startup LinkExchange. During his time in Zappos, Hsieh made it his mission to liven up the company with quirks.&nbsp;</span></p><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">The company’s motto, “Create fun and a little weirdness,” represents his approach to leading his company. The company’s office in Nevada was filled with posters, streamers, stuffed animals, and other personal items of the team.</span></p><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Hsieh often toured visitors to his zany office. Keeping it chill wearing casual jeans while twirling an umbrella in his hand.</span></p><p data-dcnode-id="1015"><span data-dcnode-id="1019" instrument_node="">His book, “Delivering Happiness: A Path to Profits, Passion, and Purpose” made him a familiar name for up-and-coming industry leaders. Because of this, from the CEO, Hsieh quickly became a happiness guru preaching </span><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ownersmag.com/maintain-work-life-balance/"><span data-dcnode-id="1018" instrument_node="">work-life balance</span></a><span data-dcnode-id="1016" instrument_node="">. Aside from his fun persona, though, Hsieh also had the technical skills that helped Zappos become a success story.</span></p><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">He went on to make innovations in Zappos. He started the holacracy method, which gave office members more freedom for self-regulation.</span></p><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">It took away standard senior management roles and tried to create a more initiative-based workspace. Meanwhile, in 2015, Hsieh sent his employees an email saying that the company would switch entirely to self-management.&nbsp;</span></p><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">This new system meant that roles and seniorities would be more flexible. However, staff said that it meant more meetings and other commitments to make the roles work. This would signal a turning point in the rise and fall of Zappos CEO Tony Hsieh.</span></p><h2 data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Hsieh’s health problems</span></h2><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Despite the complaints, Zappos remained a trailblazer for making the workplace happy. Hsieh even invited the singer Jewel to bring his workers’ entertainment.&nbsp;</span></p><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Beneath all this, though, close friends and other coworkers said that Hsieh was suffering from social anxiety and face blindness. His inability to recognize faces often meant that he had to use post-it notes and other reminders to keep people around him in check.</span></p><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Hsieh’s conditions worsened during the pandemic. Closed off from people, Hsieh would go on to retire from his position. He was also losing a lot of weight while drinking a lot. During this time, he began to develop an odd fascination with fire, among other things.</span></p><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">He eventually succumbed to death while at a party in November 2020. The cause of death was ruled to be related to alcohol. Days after his death, an outpouring of support from the industry washed over the news.&nbsp;</span></p><h2 data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">The aftermath of Hsieh’s death</span></h2><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Today, Zappos’ CEO is Kedar Deshpande. While the company has continued its legacy as a fun-loving enterprise, the death of Hsieh has hit hard for many.</span></p><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Friends of Hsieh note that while his quest to spread happiness was noble, he rarely took care of himself. The rise and fall of Zappos CEO Tony Hsieh prove that business success is not the end-all, be-all. In the end, all the fame and material wealth will not amount to much if you don’t pay enough attention to health.</span></p><aside class="mashsb-container mashsb-main mashsb-stretched" data-dcnode-id="974"><div class="mashsb-box" data-dcnode-id="977"><div class="mashsb-count mash-medium" data-dcnode-id="988" style="float:left;"><div class="counts mashsbcount" data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">68</span></div><span class="mashsb-sharetext" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">SHARES</span></span></div><div class="mashsb-buttons" data-dcnode-id="978"><a class="mashicon-facebook mash-medium mash-center mashsb-noshadow" data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fownersmag.com%252Frise-and-fall-of-zappos%252F" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="987"></span><span class="text" data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Share</span></span></a><a class="mashicon-twitter mash-medium mash-center mashsb-noshadow" data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D25%2520Biggest%2520Failures%2520of%2520the%2520Trump%2520Presidency%26url%3Dhttps%3A//ownersmag.com/rise-and-fall-of-zappos/%26via%3Dhttps%3A//twitter.com/ownersmagazine" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="983"></span><span class="text" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Tweet</span></span></a><div class="onoffswitch2 mash-medium mashsb-noshadow" data-dcnode-id="979" style="display:none;"></div></div></div><div data-dcnode-id="976" style="clear:both;"></div><div class="mashsb-toggle-container" data-dcnode-id="975"></div></aside></div></div><div class="theiaPostSlider_footer _footer" data-dcnode-id="971"></div><p data-dc ass="mvp-post-add-body left relative" data-dcnode-id="845"><div class="mvp-post-add-img left relative" data-dcnode-id="923"><span data-dcnode-id="927" instrument_node=""> </span><img alt="people wearing red" class="lazy lazy-hidden attachment- size- wp-post-image" data-dcnode-id="926" data-lazy-sizes="(max-width: 1200px) 100vw, 1200px" data-lazy-src="https://ownersmag.com/wp-content/uploads/2022/04/first-amazon-union-assembly.jpg" data-lazy-srcset="https://ownersmag.com/wp-content/uploads/2022/04/first-amazon-union-assembly.jpg 1200w, https://ownersmag.com/wp-content/uploads/2022/04/first-amazon-union-assembly-300x169.jpg 300w, https://ownersmag.com/wp-content/uploads/2022/04/first-amazon-union-assembly-1024x576.jpg 1024w, https://ownersmag.com/wp-content/uploads/2022/04/first-amazon-union-assembly-768x432.jpg 768w" data-lazy-type="image" height="675" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1200"><noscript data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">&lt;img width="1200" height="675" src="https://ownersmag.com/wp-content/uploads/2022/04/first-amazon-union-assembly.jpg" class="attachment- size- wp-post-image" alt="people wearing red" loading="lazy" srcset="https://ownersmag.com/wp-content/uploads/2022/04/first-amazon-union-assembly.jpg 1200w, https://ownersmag.com/wp-content/uploads/2022/04/first-amazon-union-assembly-300x169.jpg 300w, https://ownersmag.com/wp-content/uploads/2022/04/first-amazon-union-assembly-1024x576.jpg 1024w, https://ownersmag.com/wp-content/uploads/2022/04/first-amazon-union-assembly-768x432.jpg 768w" sizes="(max-width: 1200px) 100vw, 1200px"/&gt;</span></noscript></div><div class="mvp-post-add-cont left relative" data-dcnode-id="846"><div class="mvp-post-add-main right relative" data-dcnode-id="852"><div class="theiaPostSlider_slides" data-dcnode-id="856" id="tps_slideContainer_16428"><div class="theiaPostSlider_preloadedSlide" data-dcnode-id="857"><aside class="mashsb-container mashsb-main mashsb-stretched" data-dcnode-id="904"><div class="mashsb-box" data-dcnode-id="907"><div class="mashsb-count mash-medium" data-dcnode-id="918" style="float:left;"><div class="counts mashsbcount" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">90</span></div><span class="mashsb-sharetext" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">SHARES</span></span></div><div class="mashsb-buttons" data-dcnode-id="908"><a class="mashicon-facebook mash-medium mash-center mashsb-noshadow" data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fownersmag.com%252Ffirst-amazon-union%252F" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="917"></span><span class="text" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Share</span></span></a><a class="mashicon-twitter mash-medium mash-center mashsb-noshadow" data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D25%2520Biggest%2520Failures%2520of%2520the%2520Trump%2520Presidency%26url%3Dhttps%3A//ownersmag.com/first-amazon-union/%26via%3Dhttps%3A//twitter.com/ownersmagazine" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="913"></span><span class="text" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Tweet</span></span></a><div class="onoffswitch2 mash-medium mashsb-noshadow" data-dcnode-id="909" style="display:none;"></div></div></div><div data-dcnode-id="906" style="clear:both;"></div><div class="mashsb-toggle-container" data-dcnode-id="905"></div></aside><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Amazon has always been aggressive in trying to prevent employees from organizing unions. This is because the management thinks that workers are powerless. That’s why the first Amazon union will be a big deal. But it isn’t easy to imagine how it could have been better than this one was.</span></p><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">More than 8,000 employees in an Amazon warehouse in Staten Island had voted to unionize with the independent Amazon Labor Union. America’s most powerful non-union company has been defeated, not by an influential individual or group. In contrast, it was initiated by a former employee. This employee has no real experience or budget and started organizing because he noticed something that needed to be done.</span></p><h2 data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">First Amazon Union Has the Last Laugh</span></h2><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Before we move to the analytical significance of this historic success of the American working class, here’s what they want to say to Amazon founder Jeff Bezos: Ha. Hahahaha. Oh, by the way, the mega-billionaire recently returned to Earth from a short trip to space in his luxury rocket.&nbsp;</span></p><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">The previous generation of low-wage American jobs was created by Walmart, a place where unions never had the opportunity to organize. That failure by the labor movement resulted in millions of workers trapped for decades in retail jobs that do not pay enough to survive. While the Walton family, owners of Walmart, became some of the wealthiest people in the world.&nbsp;</span></p><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Amazon is now transforming the American workplace just like Walmart did in the past. And it would result in a more dramatic erosion of the idea that hard work should provide a decent wage.&nbsp;</span></p><h2 data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Chris Smalls’ Role in First Amazon Union</span></h2><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Fortunately, we can now say that Amazon is no longer a union-free company. Much of the credit for the first Amazon union goes to Chris Smalls. Smalls was a former Amazon worker who the company fired after leading a walkout over safety concerns. Today, Smalls, the dozens of volunteers, and thousands of employees at the warehouse have accomplished what highly paid consultants assured Amazon was impossible.</span></p><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">The Amazon Labor Union was a grassroots, worker-led effort not affiliated with any existing union. Meanwhile, in Bessemer, Alabama, the Retail Workers union has spent two years and millions of dollars working to organize an Amazon warehouse there. They also asked for the assistance of countless professional union organizers. The vote at that warehouse was counted simultaneously as Staten Island’s, and the result is not yet available due to hundreds of challenged ballots.</span></p><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Different approaches have varied results indeed. But the lesson from these campaigns is: Try everything. Should big, existing unions help organize Amazon workers? Yes. Should small, persistent bands of Amazon workers launch organizing events themselves? Yes. All of those people are part of the American labor movement that has only begun what will be a decades-long struggle to shape Amazon into a place where a warehouse job can sustain a decent middle-class lifestyle.</span></p><h3 data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Hamilton Nolan</span></h3><p data-dcnode-id="877"><span data-dcnode-id="881" instrument_node="">In 2015, Hamilton Nolan of </span><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="880" instrument_node="">The Guardian</span></a><span data-dcnode-id="878" instrument_node=""> shared that he was part of a small successful union drive at a digital media company. He said that a union listened to them and helped them as they tried to organize. When people understood what a union could do, they said yes and supported the campaigns. Nolan noted that unionizing the warehouses, the Uber drivers, the fast-food restaurants, and other workplaces should not stop. Never. There’s a need to organize everyone. He emphasized that if the Amazon workers can do it, other workers can do it.&nbsp;</span></p><aside class="mashsb-container mashsb-main mashsb-stretched" data-dcnode-id="858"><div class="mashsb-box" data-dcnode-id="861"><div class="mashsb-count mash-medium" data-dcnode-id="872" style="float:left;"><div class="counts mashsbcount" data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">90</span></div><span class="mashsb-sharetext" data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">SHARES</span></span></div><div class="mashsb-buttons" data-dcnode-id="862"><a class="mashicon-facebook mash-medium mash-center mashsb-noshadow" data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fownersmag.com%252Ffirst-amazon-union%252F" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="871"></span><span class="text" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Share</span></span></a><a class="mashicon-twitter mash-medium mash-center mashsb-noshadow" data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D25%2520Biggest%2520Failures%2520of%2520the%2520Trump%2520Presidency%26url%3Dhttps%3A//ownersmag.com/first-amazon-union/%26via%3Dhttps%3A//twitter.com/ownersmagazine" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="867"></span><span class="text" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Tweet</span>< <a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ownersmag.com/author/kaytie-cayton/" rel="author" title="Posts by Kaytie Cayton"><span data-dcnode-id="818" instrument_node="">Kaytie Cayton</span></a></span></div></div></div></div><div class="mvp-post-add-body left relative" data-dcnode-id="703"><div class="mvp-post-add-img left relative" data-dcnode-id="807"><span data-dcnode-id="811" instrument_node=""> </span><img alt="amanda morris" class="lazy lazy-hidden attachment- size- wp-post-image" data-dcnode-id="810" data-lazy-sizes="(max-width: 1200px) 100vw, 1200px" data-lazy-src="https://ownersmag.com/wp-content/uploads/2022/03/amanda-morris-nytimes.jpeg.jpg" data-lazy-srcset="https://ownersmag.com/wp-content/uploads/2022/03/amanda-morris-nytimes.jpeg.jpg 1200w, https://ownersmag.com/wp-content/uploads/2022/03/amanda-morris-nytimes.jpeg-300x158.jpg 300w, https://ownersmag.com/wp-content/uploads/2022/03/amanda-morris-nytimes.jpeg-1024x538.jpg 1024w, https://ownersmag.com/wp-content/uploads/2022/03/amanda-morris-nytimes.jpeg-768x403.jpg 768w" data-lazy-type="image" height="630" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="1200"><noscript data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">&lt;img width="1200" height="630" src="https://ownersmag.com/wp-content/uploads/2022/03/amanda-morris-nytimes.jpeg.jpg" class="attachment- size- wp-post-image" alt="amanda morris" loading="lazy" srcset="https://ownersmag.com/wp-content/uploads/2022/03/amanda-morris-nytimes.jpeg.jpg 1200w, https://ownersmag.com/wp-content/uploads/2022/03/amanda-morris-nytimes.jpeg-300x158.jpg 300w, https://ownersmag.com/wp-content/uploads/2022/03/amanda-morris-nytimes.jpeg-1024x538.jpg 1024w, https://ownersmag.com/wp-content/uploads/2022/03/amanda-morris-nytimes.jpeg-768x403.jpg 768w" sizes="(max-width: 1200px) 100vw, 1200px"/&gt;</span></noscript></div><div class="mvp-post-add-cont left relative" data-dcnode-id="704"><div class="mvp-post-add-main right relative" data-dcnode-id="710"><div class="theiaPostSlider_slides" data-dcnode-id="714" id="tps_slideContainer_16229"><div class="theiaPostSlider_preloadedSlide" data-dcnode-id="715"><aside class="mashsb-container mashsb-main mashsb-stretched" data-dcnode-id="788"><div class="mashsb-box" data-dcnode-id="791"><div class="mashsb-count mash-medium" data-dcnode-id="802" style="float:left;"><div class="counts mashsbcount" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">60</span></div><span class="mashsb-sharetext" data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">SHARES</span></span></div><div class="mashsb-buttons" data-dcnode-id="792"><a class="mashicon-facebook mash-medium mash-center mashsb-noshadow" data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fownersmag.com%252Fdisability-reporting-standards-as-told-by-amanda-morris%252F" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="801"></span><span class="text" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Share</span></span></a><a class="mashicon-twitter mash-medium mash-center mashsb-noshadow" data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D25%2520Biggest%2520Failures%2520of%2520the%2520Trump%2520Presidency%26url%3Dhttps%3A//ownersmag.com/disability-reporting-standards-as-told-by-amanda-morris/%26via%3Dhttps%3A//twitter.com/ownersmagazine" rel="nofollow" target="_top"><span class="icon" data-dcnode-id="797"></span><span class="text" data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Tweet</span></span></a><div class="onoffswitch2 mash-medium mashsb-noshadow" data-dcnode-id="793" style="display:none;"></div></div></div><div data-dcnode-id="790" style="clear:both;"></div><div class="mashsb-toggle-container" data-dcnode-id="789"></div></aside><p data-dcnode-id="783"><span data-dcnode-id="787" instrument_node="">The media play a significant role in influencing public opinion and attitudes. The choice of words, messages, and images can determine perceptions, attitudes, and behaviors. </span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/amandamo/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="786" instrument_node="">Amanda Morris</span></a><span data-dcnode-id="784" instrument_node=""> wants to emphasize this to all journalists, broadcasters, producers, and content creators. The Times’s inaugural disability reporting fellow shares one of the most effective ways to enhance disability reporting is to reach out to more disabled people.&nbsp;</span></p><h2 data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">When It All Started</span></h2><p data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">Morris said that when</span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stories.starbucks.com/stories/2018/eight-things-to-know-about-the-new-starbucks-signing-store/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="779" instrument_node=""> Starbucks opened a “Signing Store” in Washington, D.C.</span></a><span data-dcnode-id="777" instrument_node="">, in October 2018, some of her friends sent her articles on the subjects, remarking how “cool” it was. But as a hard-of-hearing individual, Morris viewed it differently. Although she was happy to learn about Starbucks’ efforts to be more inclusive, hiring people with disabilities is not a big news story. And neither is a company making one store accessible to deaf and hard-of-hearing customers. Morris felt that the real story was how some of those employees had master’s degrees. Yet, they struggled to find jobs elsewhere because of their disability.&nbsp;</span></p><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Many articles about differently-abled persons make it look as if it is special when they do things that non-disabled ones do. In reality, it’s not. These articles “otherize” disabled people and create their stories as “inspiration” for non-disabled people. Morris explained that reducing their lives into simple narratives often missed that society started those barriers.</span></p><p data-dcnode-id="771"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">“As a disability reporting fellow for the Times, my goal is to shift the way what the news media writes about persons with disabilities.” – Amanda Morris.&nbsp;</span></strong></p><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Some of the works of Amanda Morris break the stigmas and negative perceptions that several people have. It includes the flawed idea that having a disability is naturally bad or is limiting. Morris shares that she never felt that her disability had made her “less.” Instead, it is an integral part of her identity and has presented a different perspective.</span></p><h2 data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Tips On Accurate Disability Reporting</span></h2><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Below is the summary of tips shared by Morris on how to report disability with care:</span></p><ul data-dcnode-id="762"><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Pick newsworthy stories, not stories that turn people with disabilities into spectacles for non-disabled audiences. When selecting a story idea, ask yourself: Why is this newsworthy? What are the disabled persons saying about this story? Or Am I outlining this story in a nuanced way that looks at the broader context?</span></li></ul><ul data-dcnode-id="759"><li data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Before writing an article that may affect a group of people with certain conditions, reach out to several people living with the condition and include their voices in your story. This ensures that there’s a possibility of differences of experience or opinion. Also, disability should encompass many aspects such as races, ethnicities, age, gender, sexual orientation, religion, and economic backgrounds.</span></li></ul><ul data-dcnode-id="756"><li data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">In interviews, Morris said that she doesn’t approach a person with a disability differently than a non-disabled individual. The only thing that may vary might be the communication style because it depends on what disability the source has.</span></li></ul><ul data-dcnode-id="753"><li data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">During interviews, journalists and writers should avoid asking for on-the-spot interviews. For some sources, chronic illness flare-ups can make it impossible to discuss on the same day of the request.</span></li></ul><ul data-dcnode-id="750"><li data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Language is important. So, when doing an interview, one of the first things you might do is ask them how they want to be described. Some people, like Amanda Morris herself, prefer identity-first language, like “disabled person”. Others prefer person-first language such as “person with a disability.” Another tip is not to use terms that make it seem like a “victim” disability. For example, don’t say someone is “afflicted with a disability”. Instead, say they “have” a disability.&nbsp;</span></li></ul><h3 data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Challenge in disability reporting</span></h3><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Morris said that one of the most complex parts of disability reporting is that several types of disabilities and their experiences usually vary. She may not be an expert on every disability, but the key to disability reporting is to acknowledge those differences.</span></p><h3 data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Who is Amanda Morris?</span></h3><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Amanda Morris is appointed as 2021-2022 N.Y. Times disability reporting fellow for the National Desk. The fellowship collaborates with the National Center on Disability and Journalism and the Walter Cronkite School of Journalism, Arizona State University.</span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">As someone with a hearing loss, Morris grew up using American Sign Language with her two deaf parents. A graduate of New York University, she most recently worked at The Arizona Republic as a multimedia bioscience reporter.</span></p><p data-dcnode-id="735"><span data-dcnode-id="739" instrument_node="">For other stories, read more here at </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ownersmag.com/"><span data-dcnode-id="738" instrument_node="">Owner’s Mag</span></a><span data-dcnode-id="736" instrument_node="">!</span></p><aside class="mashsb-container mashsb-main mashsb-stretched" data-dcnode-id="716"><div class="mashsb-box" data-dcnode-id="719"><div class="mashsb-count mash-medium" data-dcnode-id="730" style="float:left;"><div class="counts mashsbcount" data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">60</span></div><span class="mashsb-sharetext" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">SHARES</span></span></div><div class="mashsb-buttons" data-dcnode-id="720"><a class="mashicon-facebook mash-medium mash-center mashsb-noshadow" data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fownersmag.com%252F
