</span><section class="entry gallery -list" data-dcnode-id="3119"><span data-dcnode-id="4176" instrument_node="">
</span><div class="gallery-wrap photos" data-dcnode-id="3121"><span data-dcnode-id="4175" instrument_node="">
</span><div class="item-wrap" data-dcnode-id="4162"><span data-dcnode-id="4174" instrument_node="">
</span><div class="image-wrap" data-dcnode-id="4168"><span data-dcnode-id="4173" instrument_node="">
</span><img alt="Jim Carrey Trump gallery cover" class="image" data-dcnode-id="4172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2020/05/Jim-Carrey-Trump-gallery-cover.jpg&amp;raw" title="Jim Carrey Trump gallery cover"><span data-dcnode-id="4171" instrument_node="">
</span><div class="credit" data-dcnode-id="4170"></div><span data-dcnode-id="4169" instrument_node="">
</span></div><span data-dcnode-id="4167" instrument_node="">
</span><div class="caption" data-dcnode-id="4164"><p data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">Jim Carrey has made his disdain for the current state of politics an artform... literally. The Oscar-nominated actor-turned-artist's series of drawings depict all that he believes to be wrong in D.C., with his biggest gripe going right to the top with President Trump himself. Here are just a few of his many objets d'art that lay out his discontent for all to see.</span></p></div><span data-dcnode-id="4163" instrument_node="">
</span></div><span data-dcnode-id="4161" instrument_node="">
</span><div class="item-wrap" data-dcnode-id="4144"><span data-dcnode-id="4160" instrument_node="">
</span><div class="image-wrap" data-dcnode-id="4154"><span data-dcnode-id="4159" instrument_node="">
</span><img alt="Jim Carrey Donald Trump" class="image" data-dcnode-id="4158" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2020/09/SEPT-29.jpg&amp;raw" title="Jim Carrey Donald Trump"><span data-dcnode-id="4157" instrument_node="">
</span><div class="credit" data-dcnode-id="4156"></div><span data-dcnode-id="4155" instrument_node="">
</span></div><span data-dcnode-id="4153" instrument_node="">
</span><div class="caption" data-dcnode-id="4146"><p data-dcnode-id="4150"><strong data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">Sept. 29, 2020&nbsp; •&nbsp; </span></strong></p><span data-dcnode-id="4149" instrument_node="">
</span><p data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">"Trump’s allegiances couldn’t have been any clearer in that debate if his hair were on fire - and it was. #BidenHarris #TeamHuman #GoliathWillFall"</span></p></div><span data-dcnode-id="4145" instrument_node="">
</span></div><span data-dcnode-id="4143" instrument_node="">
</span><div class="item-wrap" data-dcnode-id="4126"><span data-dcnode-id="4142" instrument_node="">
</span><div class="image-wrap" data-dcnode-id="4136"><span data-dcnode-id="4141" instrument_node="">
</span><img alt="Jim Carrey Donald Trump Sept 19, 2020" class="image" data-dcnode-id="4140" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2020/09/SEPT-19.jpg&amp;raw" title="Jim Carrey Donald Trump Sept 19, 2020"><span data-dcnode-id="4139" instrument_node="">
</span><div class="credit" data-dcnode-id="4138"></div><span data-dcnode-id="4137" instrument_node="">

</span><div class="caption" data-dcnode-id="4128"><p data-dcnode-id="4132"><strong data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">Sept. 19, 2020 •&nbsp;</span></strong></p><span data-dcnode-id="4131" instrument_node="">
</span><p data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">"#BidenHarris." In Carrey's artwork, the “Fat Man” and “Little Boy” tags refer to the codenames of the two nuclear bombs detonated over Japan in 1945, when 192,020 people were killed by the U.S.</span></p></div><span data-dcnode-id="4127" instrument_node="">
</span></div><span data-dcnode-id="4125" instrument_node="">

</span><div class="credit" data-dcnode-id="4120"></div><span data-dcnode-id="4119" instrument_node="">
</span></div><span data-dcnode-id="4117" instrument_node="">

</span><p data-dcnode-id="4108"><span data-dcnode-id="4112" instrument_node="">Originally posted on Aug. 23 with the death toll from COVID-19 listed at 180,000 "and counting," Carrey updated it on Sept. 9 with the caption, "191,000 deaths - conservatively. Neutered CDC now suppressing numbers for Trump. Woodward recording proves he knew it was deadly back in February!" For effect, </span><a data-dcnode-id="4110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/JimCarrey/status/1303945053203656704" rel="noopener" target="_blank"><span data-dcnode-id="4111" instrument_node="">he</span></a><span data-dcnode-id="4109" instrument_node=""> added a recording of Trump obtained by journalist Bob Woodward in which the president admitted knowing how deadly the coronavirus was.</span></p></div><span data-dcnode-id="4106" instrument_node="">

</span><p data-dcnode-id="4041"><span data-dcnode-id="4045" instrument_node="">"Can't stop tweeting," Carrey says breathless, imitating the POTUS as the </span><a data-dcnode-id="4043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/JimCarrey/status/1303945053203656704" rel="noopener" target="_blank"><span data-dcnode-id="4044" instrument_node="">caricature's head spins</span></a><span data-dcnode-id="4042" instrument_node=""> violently. "Need to sleep. Tweets a cry for help. Please, someone test my pee!"</span></p></div><span data-dcnode-id="4039" instrument_node="">

</span><img alt="Fiddlers Journey to the Big Screen" class="image wp-post-image" data-dcnode-id="2842" data-has-syndication-rights="1" data-portal-copyright="TheWrap" height="527" loading="lazy" sizes="(max-width: 936px) 100vw, 936px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/04/FIDDLERSJOURNEY_06-1-936x527.jpg&amp;raw" srcset="https://www.thewrap.com/wp-content/uploads/2022/04/FIDDLERSJOURNEY_06-1-936x527.jpg 936w, https://www.thewrap.com/wp-content/uploads/2022/04/FIDDLERSJOURNEY_06-1-300x169.jpg 300w, https://www.thewrap.com/wp-content/uploads/2022/04/FIDDLERSJOURNEY_06-1-1024x576.jpg 1024w, https://www.thewrap.com/wp-content/uploads/2022/04/FIDDLERSJOURNEY_06-1-768x432.jpg 768w, https://www.thewrap.com/wp-content/uploads/2022/04/FIDDLERSJOURNEY_06-1-298x168.jpg 298w, https://www.thewrap.com/wp-content/uploads/2022/04/FIDDLERSJOURNEY_06-1.jpg 1200w" width="936"><span data-dcnode-id="2841" instrument_node=""> </span></div><span data-dcnode-id="2839" instrument_node="">
</span><p class="caption" data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Kino Lorber/Zeitgeist</span></p><span data-dcnode-id="2836" instrument_node="">
</span></div><span data-dcnode-id="2834" instrument_node="">
</span></header><span data-dcnode-id="2832" instrument_node="">
</span><div class="article-content" data-dcnode-id="2191"><span data-dcnode-id="2831" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2212"><span data-dcnode-id="2830" instrument_node="">
</span><p data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">One of the more unlikely stage-and-screen box office smashes in musical history, “Fiddler on the Roof” — based on stories of shtetl life in Tsarist Russia by Yiddish author Sholem Aleichem, and turned by writer Joseph Stein, lyricist Sheldon Harnick, and composer Jerry Bock into a song-filled saga about a poor milkman with five unmarried daughters and an aversion to change — defied conventional wisdom about whose stories could be universal. </span></p><span data-dcnode-id="2827" instrument_node="">
</span><p data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">It helps, of course, when your score is a treasure trove: “Tradition,” “If I Were a Rich Man,” “Matchmaker, Matchmaker,” “To Life,” and “Sunrise, Sunset” are all-timers.</span></p><span data-dcnode-id="2824" instrument_node="">
</span><p data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">We’ve already gotten one adoring film about the original Broadway show’s legacy, 2019’s “Fiddler: A Miracle of Miracles,” and now we have a second: Daniel Raim’s warm, engaging “Fiddler’s Journey to the Big Screen” which, as its title makes clear, is about the beloved movie version directed by Norman Jewison, which became the highest-grossing American film of 1971, was nominated for eight Oscars (winning three), and has maintained its reputation as a classic as few other movie versions of cherished musicals have.</span></p><span data-dcnode-id="2821" instrument_node="">
</span><div class="tpd-read-more-container" data-dcnode-id="2804" style="border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0; padding-top:15px;padding-bottom:15px; display:flex;margin-bottom:1.5em;margin-top:1.5em;"><span data-dcnode-id="2820" instrument_node="">
</span><a aria-label="‘Fiddler: A Miracle of Miracles’ Film Review: Joyous Doc Celebrates Long, Triumphant Journey of ‘Fiddler on the Roof’" class="tpd-read-more-image" data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/fiddler-a-miracle-of-miracles-film-review-on-the-roof-documentary/" style="display: block;position: relative;padding-bottom: 78.75px;height: 0;min-width:140px;overflow: hidden;"><span data-dcnode-id="2819" instrument_node=""> </span><img alt="‘Fiddler: A Miracle of Miracles’ Film Review: Joyous Doc Celebrates Long, Triumphant Journey of ‘Fiddler on the Roof’" data-dcnode-id="2818" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2019/08/Maria-Karnilova-Tanya-Everett-Zero-Mostel-Julia-Migenes-and-Joanna-Merlin-backstage-opening-night-Sept.-22-1964-Phot-Credit-AP-P-150x150.jpg&amp;raw" style="position: absolute;top: 0;left: 0;width: 100%;height: 100%;-o-object-fit: cover;object-fit: cover;"><span data-dcnode-id="2817" instrument_node="">
</span></a><span data-dcnode-id="2815" instrument_node=""> </span><div class="tpd-read-more-headline" data-dcnode-id="2806" style="padding-left:20px;padding-right:20px;font-size:0.9em;"><span data-dcnode-id="2814" instrument_node="">
</span><strong data-dcnode-id="2812" style="color:#fe0000;font-size:1.2em;"><span data-dcnode-id="2813" instrument_node="">Also Read:</span></strong><br data-dcnode-id="2811"><span data-dcnode-id="2810" instrument_node="">
</span><a &#8216;fiddler="" a="" aria-label="‘Fiddler:" celebrates="" data-dcnode-id="2808" doc="" film="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/fiddler-a-miracle-of-miracles-film-review-on-the-roof-documentary/" journey="" joyous="" long,="" miracle="" miracles&#8217;="" of="" on="" review:="" roof&#8217;="" the="" triumphant=""><span data-dcnode-id="2809" instrument_node="">‘Fiddler: A Miracle of Miracles’ Film Review: Joyous Doc Celebrates Long, Triumphant Journey of ‘Fiddler on the Roof’</span></a><span data-dcnode-id="2807" instrument_node=""> </span></div><span data-dcnode-id="2805" instrument_node="">
</span></div><span data-dcnode-id="2803" instrument_node="">
</span><p data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Raim already has experience turning movie history into behind-the-scenes catnip with his warm portrait of unsung creativity, “Harold and Lillian: A Hollywood Love Story.” This time, although nobody would argue that many unsung talents were involved in “Fiddler,” he zeroes in for his throughline portrait on Jewison, a famously conscientious filmmaker whose dedication, craft, activism, and compassion ensured that a hit show (for a time the longest-running Broadway musical) got the cinematic treatment it deserved.</span></p><span data-dcnode-id="2800" instrument_node="">
</span><p data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">That the Canadian-born Jewison wasn’t Jewish — although he’d gotten beaten up as a kid as if he had been, and says he always wanted to be Jewish — didn’t matter to United Artists chairman Arthur Krim. What mattered were the director’s fast-growing résumé of well-received hits (“The Russians are Coming, The Russians are Coming,” “In the Heat of the Night”) and a belief this Hollywood-savvy director would know how to broaden the show’s appeal for movie audiences.</span></p><span data-dcnode-id="2797" instrument_node="">
</span><div class="tpd-read-more-container" data-dcnode-id="2780" style="border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0; padding-top:15px;padding-bottom:15px; display:flex;margin-bottom:1.5em;margin-top:1.5em;"><span data-dcnode-id="2796" instrument_node="">
</span><a aria-label="New ‘Fiddler on the Roof’ Movie in the Works at MGM From ‘Hamilton’ Director Thomas Kail" class="tpd-read-more-image" data-dcnode-id="2792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/fiddler-on-the-roof-movie-adaptation-in-the-works-at-mgm-from-hamilton-director-thomas-kail/" style="display: block;position: relative;padding-bottom: 78.75px;height: 0;min-width:140px;overflow: hidden;"><span data-dcnode-id="2795" instrument_node=""> </span><img alt="New ‘Fiddler on the Roof’ Movie in the Works at MGM From ‘Hamilton’ Director Thomas Kail" data-dcnode-id="2794" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2015/12/Fidder-on-the-Roof-150x150.jpg&amp;raw" style="position: absolute;top: 0;left: 0;width: 100%;height: 100%;-o-object-fit: cover;object-fit: cover;"><span data-dcnode-id="2793" instrument_node="">
</span></a><span data-dcnode-id="2791" instrument_node=""> </span><div class="tpd-read-more-headline" data-dcnode-id="2782" style="padding-left:20px;padding-right:20px;font-size:0.9em;"><span data-dcnode-id="2790" instrument_node="">
</span><strong data-dcnode-id="2788" style="color:#fe0000;font-size:1.2em;"><span data-dcnode-id="2789" instrument_node="">Also Read:</span></strong><br data-dcnode-id="2787"><span data-dcnode-id="2786" instrument_node="">
</span><a &#8216;fiddler="" &#8216;hamilton&#8217;="" aria-label="New" at="" data-dcnode-id="2784" director="" from="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/fiddler-on-the-roof-movie-adaptation-in-the-works-at-mgm-from-hamilton-director-thomas-kail/" in="" kail="" mgm="" movie="" on="" roof&#8217;="" the="" thomas="" works=""><span data-dcnode-id="2785" instrument_node="">New ‘Fiddler on the Roof’ Movie in the Works at MGM From ‘Hamilton’ Director Thomas Kail</span></a><span data-dcnode-id="2783" instrument_node=""> </span></div><span data-dcnode-id="2781" instrument_node="">
</span></div><span data-dcnode-id="2779" instrument_node="">
</span><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">The irony is that Jewison, a lively interviewee throughout, would do all he could to entrench the story, performances, and look of the film in a location-centric, religious, and cultural authenticity far removed from Broadway theatricality. Everything flowed from that approach: young Israeli actor Chaim Topol was cast as Tevye to suggest more Old World heft over the New York stylings of the part’s originator, Zero Mostel; violin superstar Isaac Stern was recruited to record the fiddler’s aching solos (written by score adapter John Williams); Jewison chose rural Zagreb, Yugoslavia to shoot in, and production designer Robert Boyle drew on Roman Vishniac’s photographs of Jewish culture to create sets thick with the atmosphere of a tight-knit, poor community lost to history, specifically to the violence of the pogroms, which Jewison wanted to show (as much as he could for a general-audiences entertainment).</span></p><span data-dcnode-id="2776" instrument_node="">
</span><p data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Of course, it’s all the creative details and anecdotes — offered up by Raim’s interviewees (which include Topol, Boyle, Harnick, and Williams) and, occasionally, through the eccentric narration of Jeff Goldblum — that will appeal most to both the show’s fans and movie buffs, along with snippets of on-set footage from the production. </span></p><span data-dcnode-id="2773" instrument_node="">
</span><div class="tpd-read-more-container" data-dcnode-id="2756" style="border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0; padding-top:15px;padding-bottom:15px; display:flex;margin-bottom:1.5em;margin-top:1.5em;"><span data-dcnode-id="2772" instrument_node="">
</span><a aria-label="‘Wicked’ Movie to Be Split Into 2 Parts for Christmas 2024 and 2025 Releases" class="tpd-read-more-image" data-dcnode-id="2768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wicked-movie-two-parts-cynthia-erivo-ariana-grande-2024/" style="display: block;position: relative;padding-bottom: 78.75px;height: 0;min-width:140px;overflow: hidden;"><span data-dcnode-id="2771" instrument_node=""> </span><img alt="‘Wicked’ Movie to Be Split Into 2 Parts for Christmas 2024 and 2025 Releases" data-dcnode-id="2770" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2021/11/Wicked-Movie-Cynthia-Erivo-Ariana-Grande-150x150.jpg&amp;raw" style="position: absolute;top: 0;left: 0;width: 100%;height: 100%;-o-object-fit: cover;object-fit: cover;"><span data-dcnode-id="2769" instrument_node="">
</span></a><span data-dcnode-id="2767" instrument_node=""> </span><div class="tpd-read-more-headline" data-dcnode-id="2758" style="padding-left:20px;padding-right:20px;font-size:0.9em;"><span data-dcnode-id="2766" instrument_node="">
</span><strong data-dcnode-id="2764" style="color:#fe0000;font-size:1.2em;"><span data-dcnode-id="2765" instrument_node="">Also Read:</span></strong><br data-dcnode-id="2763"><span data-dcnode-id="2762" instrument_node="">
</span><a 2="" 2024="" 2025="" and="" aria-label="‘Wicked’" be="" christmas="" data-dcnode-id="2760" for="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wicked-movie-two-parts-cynthia-erivo-ariana-grande-2024/" into="" movie="" parts="" releases="" split="" to=""><span data-dcnode-id="2761" instrument_node="">‘Wicked’ Movie to Be Split Into 2 Parts for Christmas 2024 and 2025 Releases</span></a><span data-dcnode-id="2759" instrument_node=""> </span></div><span data-dcnode-id="2757" instrument_node="">
</span></div><span data-dcnode-id="2755" instrument_node="">
</span><p data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Though Raim filmed all three actresses who played Tevye’s eldest daughters, Rosalind Harris (who played Tzeitel) proves the most entertaining, offering up a hilarious story about one attempt at period authenticity that didn’t fly. How cinematographer Oswald Morris achieved his evocatively earth-toned Oscar-winning images is another choice filmmaking nugget. And Jewison’s post-completion, what-will-they-think encounters with Golda Meir and David Ben-Gurion are priceless.</span></p><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">For a tale that reminds us, as film critic Kenneth Turan says on camera, “Nothing is permanent,” the endurance of “Fiddler on the Roof” is a heartening exception, even as it shows its age and represents a more innocent time regarding the mining of cultures. It’s been so resonant a work of popular art about heritage, values, and love (it’s been performed in dozens of countries, including Japan) that one can forget it grew out of a desire to tell a human story as honestly, tunefully, and entertainingly as possible. </span></p><span data-dcnode-id="2749" instrument_node="">
</span><p data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">And while it may have started as a spellbinding evening of theater, what Raim’s unfussy, handsomely mounted documentary reinforces is that film is its own spiritually transporting medium, with its own risks and rewards, and its own ability to turn the enjoyment of art into — what else? — tradition!</span></p><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2743"><em data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">“Fiddler’s Journey to the Big Screen” opens in NYC April 29 and LA May 6.</span></em></p><span data-dcnode-id="2742" instrument_node="">

</span><img alt="(MGM/Amazon Prime Video)" class="image wp-post-image" data-dcnode-id="2081" data-has-syndication-rights="1" data-portal-copyright="TheWrap" height="527" loading="lazy" sizes="(max-width: 936px) 100vw, 936px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/03/MGM-Prime-Video-936x527.jpg&amp;raw" srcset="https://www.thewrap.com/wp-content/uploads/2022/03/MGM-Prime-Video-936x527.jpg 936w, https://www.thewrap.com/wp-content/uploads/2022/03/MGM-Prime-Video-300x169.jpg 300w, https://www.thewrap.com/wp-content/uploads/2022/03/MGM-Prime-Video-1024x576.jpg 1024w, https://www.thewrap.com/wp-content/uploads/2022/03/MGM-Prime-Video-768x432.jpg 768w, https://www.thewrap.com/wp-content/uploads/2022/03/MGM-Prime-Video-298x168.jpg 298w, https://www.thewrap.com/wp-content/uploads/2022/03/MGM-Prime-Video.jpg 1200w" width="936"><span data-dcnode-id="2080" instrument_node=""> </span></div><span data-dcnode-id="2078" instrument_node="">
</span><p class="caption" data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">(MGM/Amazon Prime Video)</span></p><span data-dcnode-id="2075" instrument_node="">
</span></div><span data-dcnode-id="2073" instrument_node="">
</span></header><span data-dcnode-id="2071" instrument_node="">
</span><div class="article-content" data-dcnode-id="1998"><span data-dcnode-id="2070" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2019"><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Amazon has pegged MGM’s video content library of movies and TV, which includes classics from the James Bond and Rocky franchises, as well as titles like “The Silence of the Lambs” and “The Handmaid’s Tale,” at $3.4 billion in value.</span></p><span data-dcnode-id="2066" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2065" instrument_node="">That $3.4 billion, which was disclosed in a </span><a data-dcnode-id="2063" data-id="https://www.sec.gov/ix?doc=/Archives/edgar/data/0001018724/000101872422000013/amzn-20220331.htm" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sec.gov/ix%3Fdoc%3D/Archives/edgar/data/0001018724/000101872422000013/amzn-20220331.htm" rel="noopener" target="_blank"><span data-dcnode-id="2064" instrument_node="">10-Q SEC filing</span></a><span data-dcnode-id="2062" instrument_node=""> on Friday following the company’s earnings report, in estimated value encompasses roughly 4,000 film titles and 17,000 episodes of TV. It’s the first filing to discuss any information about MGM’s perceived value to Amazon. </span></p><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Amazon acquired MGM for $8.5 billion in a deal that closed in March, and it further justified its acquisition price by noting that it includes roughly “4.9 billion of goodwill,” which is a term that generally encompasses other intangible assets, in this case the 100-year-old brand name of MGM, its existing talent relationships and other untapped IP that the studio holds, the Bond franchise partially among them. </span></p><span data-dcnode-id="2057" instrument_node="">
</span><div class="tpd-read-more-container" data-dcnode-id="2040" style="border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0; padding-top:15px;padding-bottom:15px; display:flex;margin-bottom:1.5em;margin-top:1.5em;"><span data-dcnode-id="2056" instrument_node="">
</span><a aria-label="What’s Next for Amazon Studios After Top MGM Movie Execs’ Surprise Exit | Analysis" class="tpd-read-more-image" data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/amazon-studios-next-mgm-movie-execs-surprise-exit/" style="display: block;position: relative;padding-bottom: 78.75px;height: 0;min-width:140px;overflow: hidden;"><span data-dcnode-id="2055" instrument_node=""> </span><img alt="What’s Next for Amazon Studios After Top MGM Movie Execs’ Surprise Exit | Analysis" data-dcnode-id="2054" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/04/GettyImages-1387720954-michael-de-luca-pam-abdy-150x150.jpg&amp;raw" style="position: absolute;top: 0;left: 0;width: 100%;height: 100%;-o-object-fit: cover;object-fit: cover;"><span data-dcnode-id="2053" instrument_node="">
</span></a><span data-dcnode-id="2051" instrument_node=""> </span><div class="tpd-read-more-headline" data-dcnode-id="2042" style="padding-left:20px;padding-right:20px;font-size:0.9em;"><span data-dcnode-id="2050" instrument_node="">
</span><strong data-dcnode-id="2048" style="color:#fe0000;font-size:1.2em;"><span data-dcnode-id="2049" instrument_node="">Also Read:</span></strong><br data-dcnode-id="2047"><span data-dcnode-id="2046" instrument_node="">
</span><a ;s="" after="" amazon="" analysis="" data-dcnode-id="2044" exit="" for="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/amazon-studios-next-mgm-movie-execs-surprise-exit/" mgm="" movie="" next="" studios="" surprise="" top=""><span data-dcnode-id="2045" instrument_node="">What’s Next for Amazon Studios After Top MGM Movie Execs’ Surprise Exit | Analysis</span></a><span data-dcnode-id="2043" instrument_node=""> </span></div><span data-dcnode-id="2041" instrument_node="">
</span></div><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">The filing also breaks down some of the details of the MGM acquisition, saying that it paid $6.1 billion in cash and also immediately paid off $2.5 billion in debt after the acquisition closed. It also said however that because of the limited time since the acquisition, its overall valuation of the assets is “preliminary and subject to change.” </span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2035" instrument_node="">Earlier this week, MGM Motion Picture Group chairman Michael De Luca and Motion Picture Group president Pam Abdy announced they would each be </span><a data-dcnode-id="2033" data-id="5781962" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/mgms-michael-de-luca-and-pam-abdy-to-exit-studio-as-amazon-takes-charge/"><span data-dcnode-id="2034" instrument_node="">leaving MGM this summer</span></a><span data-dcnode-id="2032" instrument_node=""> as part of the new leadership structure under Amazon Studios.</span></p><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Amazon briefly noted the MGM acquisition during its earnings call on Thursday, saying that the library will “create even more opportunities to deliver quality storytelling to customers.”</span></p><span data-dcnode-id="2027" instrument_node="">

</span><img alt="Adam Aron AMC Entertainment" class="image wp-post-image" data-dcnode-id="1888" data-has-syndication-rights="1" data-portal-copyright="TheWrap" height="527" loading="lazy" sizes="(max-width: 936px) 100vw, 936px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/03/amc-adam-aron-GettyImages-1336138223-936x527.jpeg&amp;raw" srcset="https://www.thewrap.com/wp-content/uploads/2022/03/amc-adam-aron-GettyImages-1336138223-936x527.jpeg 936w, https://www.thewrap.com/wp-content/uploads/2022/03/amc-adam-aron-GettyImages-1336138223-300x169.jpeg 300w, https://www.thewrap.com/wp-content/uploads/2022/03/amc-adam-aron-GettyImages-1336138223-1024x576.jpeg 1024w, https://www.thewrap.com/wp-content/uploads/2022/03/amc-adam-aron-GettyImages-1336138223-768x432.jpeg 768w, https://www.thewrap.com/wp-content/uploads/2022/03/amc-adam-aron-GettyImages-1336138223-298x168.jpeg 298w, https://www.thewrap.com/wp-content/uploads/2022/03/amc-adam-aron-GettyImages-1336138223.jpeg 1200w" width="936"><span data-dcnode-id="1887" instrument_node=""> </span></div><span data-dcnode-id="1885" instrument_node="">
</span><p class="caption" data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Chairman of the Board and CEO of AMC Theatres Adam Aron speaks onstage during CinemaCon 2021 The State of the Industry and MGM/UAR Presentation at The Colosseum at Caesars Palace during CinemaCon on Aug. 24, 2021 in Las Vegas. (David Becker/Getty Images)</span></p><span data-dcnode-id="1882" instrument_node="">

</span><div class="article-content" data-dcnode-id="1805"><span data-dcnode-id="1877" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1826"><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1871"><span data-dcnode-id="1875" instrument_node="">AMC Entertainment CEO Adam Aron saw his overall pay dip in 2021 to $18.9 million, down from the $20.9 million he earned in 2020 despite the worldwide shutdown of movie theaters, according to a disclosure of executive compensation in an </span><a data-dcnode-id="1873" data-id="https://www.sec.gov/Archives/edgar/data/0001411579/000110465922052849/tm223267-1_def14a.htm#tEXCO" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sec.gov/Archives/edgar/data/0001411579/000110465922052849/tm223267-1_def14a.htm%23tEXCO" rel="noopener" target="_blank"><span data-dcnode-id="1874" instrument_node="">SEC filing</span></a><span data-dcnode-id="1872" instrument_node=""> Friday. </span></p><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Aron received a base pay salary that was 20% higher than last year’s, earning $1.45 million, but he also took home $11.4 million in stock awards and $6 million from non-equity incentive plan compensation. </span></p><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">Though his base salary was lower in 2020, Aron had received a $5 million bonus for helping the company navigate the pandemic, as well as increased stock awards as a result of some of the AMC surging after becoming a meme stock last year thanks to traders on Reddit. Overall his 2020 salary more than doubled compared to 2019, when Aron made only $9.6 million. </span></p><span data-dcnode-id="1864" instrument_node="">
</span><div class="tpd-read-more-container" data-dcnode-id="1847" style="border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0; padding-top:15px;padding-bottom:15px; display:flex;margin-bottom:1.5em;margin-top:1.5em;"><span data-dcnode-id="1863" instrument_node="">
</span><a aria-label="AMC to Upgrade to Laser Projectors Across Its Theaters by 2026" class="tpd-read-more-image" data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/amc-theatres-upgrade-laser-projectors-2026/" style="display: block;position: relative;padding-bottom: 78.75px;height: 0;min-width:140px;overflow: hidden;"><span data-dcnode-id="1862" instrument_node=""> </span><img alt="AMC to Upgrade to Laser Projectors Across Its Theaters by 2026" data-dcnode-id="1861" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/02/GettyImages-1207531287-150x150.jpg&amp;raw" style="position: absolute;top: 0;left: 0;width: 100%;height: 100%;-o-object-fit: cover;object-fit: cover;"><span data-dcnode-id="1860" instrument_node="">
</span></a><span data-dcnode-id="1858" instrument_node=""> </span><div class="tpd-read-more-headline" data-dcnode-id="1849" style="padding-left:20px;padding-right:20px;font-size:0.9em;"><span data-dcnode-id="1857" instrument_node="">
</span><strong data-dcnode-id="1855" style="color:#fe0000;font-size:1.2em;"><span data-dcnode-id="1856" instrument_node="">Also Read:</span></strong><br data-dcnode-id="1854"><span data-dcnode-id="1853" instrument_node="">
</span><a 2026="" =amc="" across="" by="" data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/amc-theatres-upgrade-laser-projectors-2026/" its="" laser="" projectors="" theaters="" to="" upgrade=""><span data-dcnode-id="1852" instrument_node="">AMC to Upgrade to Laser Projectors Across Its Theaters by 2026</span></a><span data-dcnode-id="1850" instrument_node=""> </span></div><span data-dcnode-id="1848" instrument_node="">
</span></div><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">Company CFO Sean Goodman saw a slight boost in his pay in 2021, making $4.7 million compared to $4.2 million in 2020, driven by his own higher base salary. Executive vice president John McDonald made $3.0 million, a dip from 2020’s $3.4 million, though he too saw his base salary increase. And Chief Content Officer Elizabeth Frank made $2.9 million in 2021, just under the $3.0 million she made the year prior. </span></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Aron and others are fresh off attending this year’s CinemaCon convention in Las Vegas, where Dwayne “The Rock” Johnson even teased Aron as to why he’s nicknamed “The Silverback.” </span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1839" instrument_node="">Aron and AMC took a </span><a data-dcnode-id="1837" data-id="https://www.thewrap.com/studios-respond-amc-ticket-surge-pricing-batman/" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/studios-respond-amc-ticket-surge-pricing-batman/"><span data-dcnode-id="1838" instrument_node="">little heat</span></a><span data-dcnode-id="1836" instrument_node=""> when it revealed that the theater chain had quietly been ticket price surging for major blockbuster releases, most notably on Warner Bros.’ “The Batman” earlier this year. But the company has made other notable investments in the form of acquiring some smaller chains and recently announcing a plan to install higher quality and more energy efficient laser projectors in its theaters by 2024.  </span></p><span data-dcnode-id="1834" instrument_node="">

</span><img alt="zara phythian" class="image wp-post-image" data-dcnode-id="1695" data-has-syndication-rights="1" data-portal-copyright="TheWrap" height="527" loading="lazy" sizes="(max-width: 936px) 100vw, 936px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/04/zara-phythian-936x527.jpg&amp;raw" srcset="https://www.thewrap.com/wp-content/uploads/2022/04/zara-phythian-936x527.jpg 936w, https://www.thewrap.com/wp-content/uploads/2022/04/zara-phythian-300x168.jpg 300w, https://www.thewrap.com/wp-content/uploads/2022/04/zara-phythian-1024x575.jpg 1024w, https://www.thewrap.com/wp-content/uploads/2022/04/zara-phythian-768x431.jpg 768w, https://www.thewrap.com/wp-content/uploads/2022/04/zara-phythian-298x168.jpg 298w" width="936"><span data-dcnode-id="1694" instrument_node=""> </span></div><span data-dcnode-id="1692" instrument_node="">
</span><p class="caption" data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Marvel Studios</span></p><span data-dcnode-id="1689" instrument_node="">

</span><div class="article-content" data-dcnode-id="1615"><span data-dcnode-id="1684" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1636"><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1680"><em data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Note: This article contains mentions of sexual abuse toward a minor.</span></em></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1678" instrument_node="">Zara Phythian, an actress who appeared in a minor role in 2016’s “Doctor Strange,” and her husband Victore Marke have been accused of grooming and having sex with a 13-year-old girl for a period of three years beginning in 2005, per the </span><a data-dcnode-id="1676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/uk-england-nottinghamshire-61248055" rel="noopener" target="_blank"><span data-dcnode-id="1677" instrument_node="">BBC</span></a><span data-dcnode-id="1675" instrument_node="">.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Now an adult, the unidentified woman told police in an interview played for jurors at Nottingham Crown Court that the couple, who were not married at the time, filmed most of the abuse. Phythian and Marke, who were around 21 and 43 at the time, have jointly been accused of 14 charges of sexual activity with a child. They have denied the allegations.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">A representative for Phythian did not immediately respond to requests for comment.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><div class="tpd-read-more-container" data-dcnode-id="1650" style="border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0; padding-top:15px;padding-bottom:15px; display:flex;margin-bottom:1.5em;margin-top:1.5em;"><span data-dcnode-id="1666" instrument_node="">
</span><a aria-label="Lionsgate Caps Off CinemaCon With ‘John Wick 4’ and First Looks at Original Titles" class="tpd-read-more-image" data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/lionsgate-cinemacon-john-wick-hunger-games/" style="display: block;position: relative;padding-bottom: 78.75px;height: 0;min-width:140px;overflow: hidden;"><span data-dcnode-id="1665" instrument_node=""> </span><img alt="Lionsgate Caps Off CinemaCon With ‘John Wick 4’ and First Looks at Original Titles" data-dcnode-id="1664" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/04/john_wick_3-150x150.jpg&amp;raw" style="position: absolute;top: 0;left: 0;width: 100%;height: 100%;-o-object-fit: cover;object-fit: cover;"><span data-dcnode-id="1663" instrument_node="">
</span></a><span data-dcnode-id="1661" instrument_node=""> </span><div class="tpd-read-more-headline" data-dcnode-id="1652" style="padding-left:20px;padding-right:20px;font-size:0.9em;"><span data-dcnode-id="1660" instrument_node="">
</span><strong data-dcnode-id="1658" style="color:#fe0000;font-size:1.2em;"><span data-dcnode-id="1659" instrument_node="">Also Read:</span></strong><br data-dcnode-id="1657"><span data-dcnode-id="1656" instrument_node="">
</span><a ;john="" =lionsgate="" and="" at="" caps="" cinemacon="" data-dcnode-id="1654" first="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/lionsgate-cinemacon-john-wick-hunger-games/" looks="" off="" original="" titles="" wick="" with=""><span data-dcnode-id="1655" instrument_node="">Lionsgate Caps Off CinemaCon With ‘John Wick 4’ and First Looks at Original Titles</span></a><span data-dcnode-id="1653" instrument_node=""> </span></div><span data-dcnode-id="1651" instrument_node="">
</span></div><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Phythian and Marke were martial arts instructors at the time, and the woman said she thought of the former as a role model because of her success in the field. The first offense reportedly occurred when the couple gave her alcohol and Phythian dared her to perform oral sex on Marke, who then had sex with both of them, she said.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">“I knew it was wrong but I just didn’t know how to get out of the situation or say anything,” she told police. “I remember trying to copy Zara’s reaction at the time because I looked up to her and tried to be like her in every way.”</span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">The woman detailed the intimidation she faced from Marke, who she alleged threatened to smash her kneecaps if she reported the abuse. “He just said nobody would believe me if I told them anyway,” she said. “They always had a power over me.”</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Marke is separately facing four charges of indecently assaulting a child from another woman, who was 15 when she was allegedly abused by him. According to her, the abuse took place during Marke’s previous marriage, which fell apart when he began an affair with Phythian, who was also a minor at the time.</span></p><span data-dcnode-id="1637" instrument_node="">

</span><div class="article-content" data-dcnode-id="1293"><span data-dcnode-id="1472" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1314"><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Amber Heard’s 2018 op-ed on gender-based violence ignited her current legal battle with ex-husband Johnny Depp, and now it’s been revealed the piece was timed to coincide with the release of her film “Aquaman.”</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Terence Dougherty, general counsel and COO for the ACLU said, in a pre-recorded deposition played Thursday in Depp’s defamation trial against Heard, that the actress worked directly with the individual rights organization on what the op-ed would say, where it would be published and when it would be released.</span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">“Placing op-eds about matters such as this is the kind of thing that is the bread and butter for the ACLU,” Dougherty explained in the video played Thursday in a Fairfax, Virginia courtroom.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><div class="tpd-read-more-container" data-dcnode-id="1445" style="border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0; padding-top:15px;padding-bottom:15px; display:flex;margin-bottom:1.5em;margin-top:1.5em;"><span data-dcnode-id="1461" instrument_node="">
</span><a aria-label="Johnny Depp Doorman Delivers Bizarre Testimony From Inside a Car: ‘I Just Don’t Want to Deal With This Anymore’" class="tpd-read-more-image" data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/johnny-depp-doorman-testifies-from-car/" style="display: block;position: relative;padding-bottom: 78.75px;height: 0;min-width:140px;overflow: hidden;"><span data-dcnode-id="1460" instrument_node=""> </span><img alt="Johnny Depp Doorman Delivers Bizarre Testimony From Inside a Car: ‘I Just Don’t Want to Deal With This Anymore’" data-dcnode-id="1459" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/04/Johnny-Depp-Trial-Wednesday-150x150.jpg&amp;raw" style="position: absolute;top: 0;left: 0;width: 100%;height: 100%;-o-object-fit: cover;object-fit: cover;"><span data-dcnode-id="1458" instrument_node="">
</span></a><span data-dcnode-id="1456" instrument_node=""> </span><div class="tpd-read-more-headline" data-dcnode-id="1447" style="padding-left:20px;padding-right:20px;font-size:0.9em;"><span data-dcnode-id="1455" instrument_node="">
</span><strong data-dcnode-id="1453" style="color:#fe0000;font-size:1.2em;"><span data-dcnode-id="1454" instrument_node="">Also Read:</span></strong><br data-dcnode-id="1452"><span data-dcnode-id="1451" instrument_node="">
</span><a ;i="" ;t="" =johnny="" bizarre="" car:="" data-dcnode-id="1449" deal="" delivers="" depp="" doorman="" from="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/johnny-depp-doorman-testifies-from-car/" inside="" just="" testimony="" this="" to="" want="" with=""><span data-dcnode-id="1450" instrument_node="">Johnny Depp Doorman Delivers Bizarre Testimony From Inside a Car: ‘I Just Don’t Want to Deal With This Anymore’</span></a><span data-dcnode-id="1448" instrument_node=""> </span></div><span data-dcnode-id="1446" instrument_node="">
</span></div><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">He noted that Heard was asked to share her story because she was an ACLU ambassador working on women’s rights issues, particularly those surrounding gender-based violence, and the group wanted someone with “authentic stories” to speak publicly on the matter.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">“There were a number of things Amber expressed from her personal story about her having been a survivor of gender-based violence,” said Dougherty in the video recorded on Dec. 2, 2021. He added that ACLU communications staffers wrote the first draft of the op-ed, capturing Heard’s “fire and rage.” </span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">The organization informed Heard’s advisors that they skirted around her marriage to Depp, to avoid violating her non-disclosure agreement with the “Pirates of the Caribbean” actor. The first draft of the op-ed was reviewed by several ACLU lawyers. Heard’s attorneys also reviewed the piece and removed references to Heard and Depp’s marriage and divorce.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Dougherty said the decision to publish the op-ed in the Washington Post was made by the ACLU. The organization sent an email to the Post’s op-ed editor, Michael Larabee, trying to get it published. The email, which was read in court, said, “Hey Michael, wondering if we might interest you in a piece by Amber Heard who as you might recall was beaten up during her brief marriage to Johnny Depp on what the incoming Congress can do to help protect women in similar situations.”</span></p><span data-dcnode-id="1432" instrument_node="">
</span><div class="tpd-read-more-container" data-dcnode-id="1415" style="border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0; padding-top:15px;padding-bottom:15px; display:flex;margin-bottom:1.5em;margin-top:1.5em;"><span data-dcnode-id="1431" instrument_node="">
</span><a aria-label="Johnny Depp Lost ‘Pirates’ 6 Role Due to ‘Distraction’ of His Legal Disputes, CAA Agent Tells Court" class="tpd-read-more-image" data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/caa-agent-testifies-johnny-depp-trial/" style="display: block;position: relative;padding-bottom: 78.75px;height: 0;min-width:140px;overflow: hidden;"><span data-dcnode-id="1430" instrument_node=""> </span><img alt="Johnny Depp Lost ‘Pirates’ 6 Role Due to ‘Distraction’ of His Legal Disputes, CAA Agent Tells Court" data-dcnode-id="1429" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/04/pirates-150x150.jpg&amp;raw" style="position: absolute;top: 0;left: 0;width: 100%;height: 100%;-o-object-fit: cover;object-fit: cover;"><span data-dcnode-id="1428" instrument_node="">
</span></a><span data-dcnode-id="1426" instrument_node=""> </span><div class="tpd-read-more-headline" data-dcnode-id="1417" style="padding-left:20px;padding-right:20px;font-size:0.9em;"><span data-dcnode-id="1425" instrument_node="">
</span><strong data-dcnode-id="1423" style="color:#fe0000;font-size:1.2em;"><span data-dcnode-id="1424" instrument_node="">Also Read:</span></strong><br data-dcnode-id="1422"><span data-dcnode-id="1421" instrument_node="">
</span><a 6="" =johnny="" agent="" caa="" court="" data-dcnode-id="1419" depp="" due="" his="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/caa-agent-testifies-johnny-depp-trial/" legal="" lost="" of="" role="" tells="" to=""><span data-dcnode-id="1420" instrument_node="">Johnny Depp Lost ‘Pirates’ 6 Role Due to ‘Distraction’ of His Legal Disputes, CAA Agent Tells Court</span></a><span data-dcnode-id="1418" instrument_node=""> </span></div><span data-dcnode-id="1416" instrument_node="">
</span></div><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Depp’s attorney read an email from the ACLU to Heard about the op-ed that said: “The goal is to get this out this week to capitalize on the tremendous campaign for ‘Aquaman.’” </span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Dougherty responded to the attorney, “I do recall that there was a conversation about the optimal timing for the op-ed piece.”</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">He said Heard agreed that the column should be released around the movie’s release. The piece was titled “Amber Heard: I spoke up against sexual violence – and faced our culture’s wrath. That has to change.” Dougherty said the ACLU was not responsible for the headline in the Post. </span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">The paper published the piece on Dec. 18, 2018, three days before “Aquaman” arrived in domestic theaters on Dec. 21, 2018.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Dougherty said so far Heard has failed to deliver on roughly half of her $3.5 million pledge to the ACLU, an amount that represented half of her $7 million divorce settlement with Depp, according to Dougherty.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">He said Heard has donated $1.3 million – though not all of it has come directly from her. He noted Heard has directly paid $350,000, ex-husband Depp paid $100,000, and another $500,000 was sent from Elon Musk, Heard’s one-time boyfriend. Dougherty said another $350 came from an anonymous donor, who the ACLU believes was Heard.</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">“We understood that the other half [of the $7 million settlement] was going to a children’s hospital in Los Angeles,” Dougherty testified.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><div class="tpd-read-more-container" data-dcnode-id="1376" style="border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0; padding-top:15px;padding-bottom:15px; display:flex;margin-bottom:1.5em;margin-top:1.5em;"><span data-dcnode-id="1392" instrument_node="">
</span><a aria-label="Johnny Depp Just Killed the Hollywood Celebrity (With a Little Help From Will Smith)" class="tpd-read-more-image" data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/johnny-depp-killed-hollywood-celebrity-will-smith/" style="display: block;position: relative;padding-bottom: 78.75px;height: 0;min-width:140px;overflow: hidden;"><span data-dcnode-id="1391" instrument_node=""> </span><img alt="Johnny Depp Just Killed the Hollywood Celebrity (With a Little Help From Will Smith)" data-dcnode-id="1390" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/04/Johnny-Depp-Arrives-for-Court-150x150.jpg&amp;raw" style="position: absolute;top: 0;left: 0;width: 100%;height: 100%;-o-object-fit: cover;object-fit: cover;"><span data-dcnode-id="1389" instrument_node="">
</span></a><span data-dcnode-id="1387" instrument_node=""> </span><div class="tpd-read-more-headline" data-dcnode-id="1378" style="padding-left:20px;padding-right:20px;font-size:0.9em;"><span data-dcnode-id="1386" instrument_node="">

</span></div><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">The ACLU donation was to be made in installments over a 10-year period. However, Dougherty told the court, “We didn’t receive any amounts in 2019 and on.”</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Later in the day, Depp’s longtime bodyguard, Malcolm Connolly told the court something wasn’t quite right with Heard, that “Amber could get a bit frosty at the drop of a hat.”</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Testifying via video from the U.K., Connolly said the relationship between Depp and Heard started fine but quickly changed. “Amber started to change… a bit more feisty, demanding. I could see that Amber wanted to wear the pants in this relationship,” Connolly said, adding that Depp was becoming “quieter” and Heard became “grumpy.”</span></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Connolly said he never saw the couple fighting but witnessed Heard throw a lighter and a can at Depp on separate occasions. Connolly told the court he never saw any physical injuries on Heard but said he did see injuries to Depp.</span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">He said Depp’s injuries started with scratches and swelling but became more frequent, “It would be scratches on his neck, maybe a fat lip on the corner, maybe a bruising on the eye-socket.” Depp’s attorney showed a picture Connolly took of the couple while they were honeymooning. The photo showed Depp with bruises near his eyes.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><div class="tpd-read-more-container" data-dcnode-id="1343" style="border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0; padding-top:15px;padding-bottom:15px; display:flex;margin-bottom:1.5em;margin-top:1.5em;"><span data-dcnode-id="1359" instrument_node="">

</span><a =johnny="" amber="" audio="" becomes="" by="" data-dcnode-id="1347" depp="" fights="" gets="" heard="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/johnny-depp-amber-heard-trial-audio-fights-testimony/" of="" pained="" visibly="" with=""><span data-dcnode-id="1348" instrument_node="">Johnny Depp Gets Testy, Becomes Visibly Pained by Audio of Fights With Amber Heard</span></a><span data-dcnode-id="1346" instrument_node=""> </span></div><span data-dcnode-id="1344" instrument_node="">
</span></div><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Connolly was also with the couple in Australia while Depp filmed “Pirates of The Carribbean” 5. Connolly said when he arrived at the couple’s home, Heard was “berating” Depp and screaming, “F— off you f—ing coward.”</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Another one of Depp’s bodyguard’s also testified Thursday. Starling Jenkins, who’s worked on Depp’s security team since 1993, said that in April 2016, Heard told him she and Depp fought the night before. “She threw his personal property over the balcony into the streets.”</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">Jenkins said that among the items Heard tossed were Depp’s wallet, phone and passport. Jenkins testified that he later found the phone with a homeless man on skid row. The man returned Depp’s phone and Jenkins gave him $420, food, and water as a reward for his honesty.</span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Depp’s business manager Edward White also testified in the Virginia courtroom. He said Heard initially requested $4 million in the couple’s divorce settlement, “but her demand continually increased.”</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">White, who described himself as a CPA, was hired by Depp in 2016 to handle his finances and to help him overcome financial troubles. White’s company made sure Depp’s bills and debts were paid including the amount of his divorce settlement. White said Heard increased the amount she wanted Depp to pay her four times.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">In addition to the millions being sought, White said, “She demanded that payment be made free of taxation. That Mr. Depp would have to satisfy all the tax liabilities.”</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Ultimately White said, “The total consideration paid to her was $14,250,000.” In 2017, Depp paid $4.5 million directly to Heard. On February 1, 2018 Depp sent Heard a final payment of $2.3 million for a total of $6.8 million. The rest of the settlement was made up of community liabilities, payments to Heard’s attorneys, and donations to charitable organizations.</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Depp is suing Heard for $50 million claiming she libeled him in that 2018 op-ed; Heard filed a $100 million counterclaim.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Depp spent four days giving testimony last week. Heard is expected to take the witness stand next week.</span></p><span data-dcnode-id="1315" instrument_node="">
</span></div><span data-dcnode-id="1313" instrument_node="">

</span><p class="caption" data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Lionsgate</span></p><span data-dcnode-id="1177" instrument_node="">
</span></div><span data-dcnode-id="1175" instrument_node="">
</span></header><span data-dcnode-id="1173" instrument_node="">
</span><div class="article-content" data-dcnode-id="1082"><span data-dcnode-id="1172" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1103"><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1170" instrument_node="">Lionsgate brought CinemaCon 2022 to a close Thursday with a presentation that featured adaptations of a Judy Blume classic, a spinoff of one of its surprise hit films, and the return of John Wick and “The Hunger Games.” </span><br data-dcnode-id="1169"><br data-dcnode-id="1168"><span data-dcnode-id="1167" instrument_node="">Comedian Sebastian Maniscalco hosted the presentation, combining the sneak previews with a standup routine in which he joked that the upcoming “Expendables 4” with Sylvester Stallone, Jason Statham and 50 Cent would be “more violent than </span><a data-dcnode-id="1165" data-id="5778314" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/billy-crystal-slap-will-smith-oscars-crime/"><span data-dcnode-id="1166" instrument_node="">Will Smith in a comedy club</span></a><span data-dcnode-id="1164" instrument_node="">.” Maniscalco also showed his own upcoming comedy “About My Father,” which he co-wrote and based on his own relationship with his Italian immigrant father. He was joined onstage by Robert De Niro, who plays Maniscalco’s father, as well as co-stars Leslie Bibb and Kim Cattrall. </span></p><span data-dcnode-id="1162" instrument_node="">
</span><div class="tpd-read-more-container" data-dcnode-id="1145" style="border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0; padding-top:15px;padding-bottom:15px; display:flex;margin-bottom:1.5em;margin-top:1.5em;"><span data-dcnode-id="1161" instrument_node="">
</span><a aria-label="What’s Next for Amazon Studios After Top MGM Movie Execs’ Surprise Exit | Analysis" class="tpd-read-more-image" data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/amazon-studios-next-mgm-movie-execs-surprise-exit/" style="display: block;position: relative;padding-bottom: 78.75px;height: 0;min-width:140px;overflow: hidden;"><span data-dcnode-id="1160" instrument_node=""> </span><img alt="What’s Next for Amazon Studios After Top MGM Movie Execs’ Surprise Exit | Analysis" data-dcnode-id="1159" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/04/GettyImages-1387720954-michael-de-luca-pam-abdy-150x150.jpg&amp;raw" style="position: absolute;top: 0;left: 0;width: 100%;height: 100%;-o-object-fit: cover;object-fit: cover;"><span data-dcnode-id="1158" instrument_node="">
</span></a><span data-dcnode-id="1156" instrument_node=""> </span><div class="tpd-read-more-headline" data-dcnode-id="1147" style="padding-left:20px;padding-right:20px;font-size:0.9em;"><span data-dcnode-id="1155" instrument_node="">
</span><strong data-dcnode-id="1153" style="color:#fe0000;font-size:1.2em;"><span data-dcnode-id="1154" instrument_node="">Also Read:</span></strong><br data-dcnode-id="1152"><span data-dcnode-id="1151" instrument_node="">
</span><a ;s="" after="" amazon="" analysis="" data-dcnode-id="1149" exit="" for="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/amazon-studios-next-mgm-movie-execs-surprise-exit/" mgm="" movie="" next="" studios="" surprise="" top=""><span data-dcnode-id="1150" instrument_node="">What’s Next for Amazon Studios After Top MGM Movie Execs’ Surprise Exit | Analysis</span></a><span data-dcnode-id="1148" instrument_node=""> </span></div><span data-dcnode-id="1146" instrument_node="">
</span></div><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1143" instrument_node="">Rachel McAdams and Abby Ryder Fortson appeared to introduce a trailer for the film adaptation of Judy Blume’s “Are You There God? It’s Me Margaret.” The famed book has been a coming-of-age tale embraced by generations of women, telling the story of a young Christian girl entering adolescence, having her first crush and having a crisis of faith. </span><br data-dcnode-id="1142"><br data-dcnode-id="1141"><span data-dcnode-id="1140" instrument_node="">Also featured in the presentation was “White Bird,” a spinoff of Lionsgate’s surprise 2017 hit film “Wonder,” which grossed $305 million worldwide. The film follows Julian, the boy who bullied his deformed classmate Auggie in “Wonder” and who has been sent to live with his grandmother, played by Helen Mirren. While there, Julian hears her grandmother’s story of how she survived the Holocaust with the help of her classmate. </span></p><span data-dcnode-id="1138" instrument_node="">

</span><img alt="john wick 4" class="image wp-post-image" data-dcnode-id="972" data-has-syndication-rights="1" data-portal-copyright="TheWrap" height="527" loading="lazy" sizes="(max-width: 936px) 100vw, 936px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2021/12/john-wick-4-936x527.jpg&amp;raw" srcset="https://www.thewrap.com/wp-content/uploads/2021/12/john-wick-4-936x527.jpg 936w, https://www.thewrap.com/wp-content/uploads/2021/12/john-wick-4-300x169.jpg 300w, https://www.thewrap.com/wp-content/uploads/2021/12/john-wick-4-1024x576.jpg 1024w, https://www.thewrap.com/wp-content/uploads/2021/12/john-wick-4-768x432.jpg 768w, https://www.thewrap.com/wp-content/uploads/2021/12/john-wick-4-298x168.jpg 298w, https://www.thewrap.com/wp-content/uploads/2021/12/john-wick-4.jpg 1200w" width="936"><span data-dcnode-id="971" instrument_node=""> </span></div><span data-dcnode-id="969" instrument_node="">
</span><p class="caption" data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Lionsgate</span></p><span data-dcnode-id="966" instrument_node="">
</span></div><span data-dcnode-id="964" instrument_node="">
</span></header><span data-dcnode-id="962" instrument_node="">
</span><div class="article-content" data-dcnode-id="886"><span data-dcnode-id="961" instrument_node="">
</span><div class="entry-content" data-dcnode-id="907"><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Keanu Reeves’ John Wick is back for the fourth time, and he hasn’t slowed down a bit. Lionsgate teased “John Wick: Chapter 4” in an exclusive look at CinemaCon with the action film’s first full trailer, and it’s even more of the slick, stylish and hyper-violent action that fans of the franchise can never get enough of. </span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Lionsgate chair Joe Drake at CinemaCon compared the “John Wick” franchise to some of the subversive and unexpected ’70s movies of his childhood. He called the film a “modern myth,” “a singular experience” and “a cultural phenomenon” that is special because it started as an original story. And oh yeah, Keanu Reeves was on stage at Vegas to hype the movie too. </span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Reeves talked about first meeting director Chad Stahelski on “The Matrix” back in 1998, and Stahelski said that the latest chapter is an homage to all those classic action legends throughout the ages. </span></p><span data-dcnode-id="951" instrument_node="">
</span><div class="tpd-read-more-container" data-dcnode-id="934" style="border-top:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0; padding-top:15px;padding-bottom:15px; display:flex;margin-bottom:1.5em;margin-top:1.5em;"><span data-dcnode-id="950" instrument_node="">
</span><a aria-label="First ‘Top Gun: Maverick’ Reactions Hail Tom Cruise Sequel as an Emotional Crowdpleaser" class="tpd-read-more-image" data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/top-gun-2-maverick-reviews-reactions/" style="display: block;position: relative;padding-bottom: 78.75px;height: 0;min-width:140px;overflow: hidden;"><span data-dcnode-id="949" instrument_node=""> </span><img alt="First ‘Top Gun: Maverick’ Reactions Hail Tom Cruise Sequel as an Emotional Crowdpleaser" data-dcnode-id="948" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/04/top-gun-maverick-tom-cruise-150x150.jpg&amp;raw" style="position: absolute;top: 0;left: 0;width: 100%;height: 100%;-o-object-fit: cover;object-fit: cover;"><span data-dcnode-id="947" instrument_node="">
</span></a><span data-dcnode-id="945" instrument_node=""> </span><div class="tpd-read-more-headline" data-dcnode-id="936" style="padding-left:20px;padding-right:20px;font-size:0.9em;"><span data-dcnode-id="944" instrument_node="">
</span><strong data-dcnode-id="942" style="color:#fe0000;font-size:1.2em;"><span data-dcnode-id="943" instrument_node="">Also Read:</span></strong><br data-dcnode-id="941"><span data-dcnode-id="940" instrument_node="">
</span><a ;top="" =first="" an="" as="" crowdpleaser="" cruise="" data-dcnode-id="938" emotional="" gun:="" hail="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/top-gun-2-maverick-reviews-reactions/" reactions="" sequel="" tom=""><span data-dcnode-id="939" instrument_node="">First ‘Top Gun: Maverick’ Reactions Hail Tom Cruise Sequel as an Emotional Crowdpleaser</span></a><span data-dcnode-id="937" instrument_node=""> </span></div><span data-dcnode-id="935" instrument_node="">
</span></div><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">What’s new this time around though? Well, him wielding nunchucks to beat some thugs to death is a good start. The rest is more stylized goodness and rainy, neon colored set pieces. </span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">“I’m going to kill them all,” he says in the trailer. </span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">“John Wick: Chapter 4” stars Keanu Reeves, Donnie Yen, Laurence Fishburne, Bill Skarsgård, and Ian McShane. Chad Stahelski, who directed the previous three films, is back on board for the fourth ride.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Shay Hatten and Michael Finch wrote the script for “John Wick Chapter 4,” and it’s produced by Stahelski, Basil Iwanyk and Erica Lee. Reeves and Louise Rosner are executive producing.</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">With the first three movies, the “John Wick” franchise has earned more than $584.7 million worldwide at the box office.</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">“John Wick Chapter 4” opens in theaters next year on March 24, 2023 from Lionsgate. Lionsgate also has in the works a “John Wick” spinoff called “Ballerina” starring Ana de Armas coming to theaters. </span></p><span data-dcnode-id="915" instrument_node="">

</span><img alt="Hunger Games: The Ballad of Songbirds and Snakes" class="image wp-post-image" data-dcnode-id="776" data-has-syndication-rights="1" data-portal-copyright="TheWrap" height="527" loading="lazy" sizes="(max-width: 936px) 100vw, 936px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/wp-content/uploads/2022/04/donald-sutherland-president-snow-hunger-games-936x527.jpg&amp;raw" srcset="https://www.thewrap.com/wp-content/uploads/2022/04/donald-sutherland-president-snow-hunger-games-936x527.jpg 936w, https://www.thewrap.com/wp-content/uploads/2022/04/donald-sutherland-president-snow-hunger-games-300x169.jpg 300w, https://www.thewrap.com/wp-content/uploads/2022/04/donald-sutherland-president-snow-hunger-games-1024x576.jpg 1024w, https://www.thewrap.com/wp-content/uploads/2022/04/donald-sutherland-president-snow-hunger-games-768x432.jpg 768w, https://www.thewrap.com/wp-content/uploads/2022/04/donald-sutherland-president-snow-hunger-games-298x168.jpg 298w, https://www.thewrap.com/wp-content/uploads/2022/04/donald-sutherland-president-snow-hunger-games.jpg 1200w" width="936"><span data-dcnode-id="775" instrument_node=""> </span></div><span data-dcnode-id="773" instrument_node="">
</span><p class="caption" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Lionsgate</span></p><span data-dcnode-id="770" instrument_node="">
</span></div><span data-dcnode-id="768" instrument_node="">

</span><div class="article-content" data-dcnode-id="711"><span data-dcnode-id="765" instrument_node="">
</span><div class="entry-content" data-dcnode-id="732"><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="763" instrument_node="">At the end of its CinemaCon presentation, Lionsgate featured a teaser for the return of its most successful film franchise, “The Hunger Games,” which will get a prequel installment on November 17, 2023. </span><br data-dcnode-id="762"><br data-dcnode-id="761"><span data-dcnode-id="760" instrument_node="">The prequel, titled </span><a data-dcnode-id="758" data-id="5315934" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thewrap.com/hunger-games-prequel-francis-lawrence-ballad-songbirds-snakes/"><span data-dcnode-id="759" instrument_node="">“The Hunger Games: The Ballad of Songbirds and Snakes,”</span></a><span data-dcnode-id="757" instrument_node=""> is based on the novel of the same name written by series creator Suzanne Collins will follow Coriolanus Snow, the future tyrannical leader of the nation of Panem, when he was just 18 years old. </span><br data-dcnode-id="756"><br data-dcnode-id="755"><span data-dcnode-id="754" instrument_node="">As one of the top students of Panem’s Academy, a school for the country’s elite, Snow is selected as a mentor for Lucy Gray Baird, a tribute selected to compete in the Hunger Games for District 12, the home of Snow’s future adversary Katniss Everdeen. As he trains Lucy, the two grow close together, leading Snow on an unexpected rise to power as he fights to make sure Lucy wins the Hunger Games at any cost. </span><br data-dcnode-id="753"><br data-dcnode-id="752"><span data-dcnode-id="751" instrument_node="">Francis Lawrence will return to direct and produce his fourth “Hunger Games” film, having previously directed the sequels “Catching Fire” and both installments of the series’ conclusion “Mockingjay.” Michael Arndt, who co-wrote the film adaptation of “Catching Fire,” returns to adapt “Songbirds and Snakes” with Collins and Michael Lesslie.</span><br data-dcnode-id="750"><br data-dcnode-id="749"><span data-dcnode-id="748" instrument_node="">Collins will also serve as executive producer with Tim Palen, with series producer Nina Jacobson returning to produce with partner Brad Simpson.</span><br data-dcnode-id="747"><br data-dcnode-id="746"><span data-dcnode-id="745" instrument_node="">“The Hunger Games” series comprises four of the top 5 highest grossing films in Lionsgate history, grossing </span><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.the-numbers.com/movies/franchise/Hunger-Games%23tab%3Dsummary" rel="noopener" target="_blank"><span data-dcnode-id="744" instrument_node="">$2.95 billion</span></a><span data-dcnode-id="742" instrument_node=""> at the global box office from 2012 to 2015, with “Catching Fire” holding the studio record with $864 million grossed globally in 2013. </span></p><span data-dcnode-id="740" instrument_node="">
