</span><li class="breadcrumb" data-dcnode-id="803"><span data-dcnode-id="808" instrument_node="">
</span><a class="breadcrumb-label" data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sarahraven.com/articles/"><span data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Advice &amp; Inspiration For Your Garden</span></span></a><span data-dcnode-id="804" instrument_node="">
</span></li><span data-dcnode-id="802" instrument_node="">

</span><span class="breadcrumb-label" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">pruning roses – the sissinghurst method</span></span><span data-dcnode-id="798" instrument_node="">
</span></li><span data-dcnode-id="796" instrument_node="">
</span></ul><span data-dcnode-id="794" instrument_node="">
</span><h1 class="article__title" data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">pruning roses – the sissinghurst method</span></h1><span data-dcnode-id="791" instrument_node="">
</span><dl class="article__meta" data-dcnode-id="774"><span data-dcnode-id="790" instrument_node="">
</span><dt class="article__metaName" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Written by:</span></dt><span data-dcnode-id="787" instrument_node="">
</span><dd class="article__metaValue" data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Sarah Raven</span></dd><span data-dcnode-id="784" instrument_node="">
</span><dt class="article__metaName" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Last updated:</span></dt><span data-dcnode-id="781" instrument_node="">
</span><dd class="article__metaValue" data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">
</span><time data-dcnode-id="778" datetime="14th Dec 2020"><span data-dcnode-id="779" instrument_node="">14th Dec 2020</span></time><span data-dcnode-id="777" instrument_node="">
</span></dd><span data-dcnode-id="775" instrument_node="">
</span></dl><span data-dcnode-id="773" instrument_node="">
</span><div class="blog-post article__content article__content--basic" data-dcnode-id="705"><span data-dcnode-id="772" instrument_node="">
</span><h3 data-dcnode-id="769"><span data-dcnode-id="771" instrument_node="">
</span><img alt="Pruning roses - the Sissinghurst method" data-dcnode-id="770" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sarahraven.com/product_images/uploaded_images/520018-3-37659.1626181162.jpg&amp;raw" style="float: right; padding: 10px; width: 612px; margin: 0px 0px 10px 10px;" title=""></h3><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">
Pruning roses the Sissinghurst way helps create those wonderful fountains of roses you see in summer gardens – delicious-smelling, out-of-control geysers of flowers that effuse all over the garden. Pruning roses like this means you don't get those boring little twiggy bushes, all leg and no body, surrounded by bare ground.</span></p><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">
	The great Sissinghurst trick to pruning roses is meticulous work behind the scenes earlier in the year, when precision horticulture guarantees that wonderful romantic effect.</span></p><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">
	The Sissinghurst rose pruning technique originated at Cliveden with the Astors' head gardener Jack Vass, who moved to Sissinghurst in 1939.</span></p><p data-dcnode-id="758"><span data-dcnode-id="762" instrument_node="">
	Vita Sackville-West loved her roses, particularly the dark, rich Gallicas such as 'Charles de Mills', '</span><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sarahraven.com/products/rose-tuscany-superb"><span data-dcnode-id="761" instrument_node="">Tuscany Superb</span></a><span data-dcnode-id="759" instrument_node="">' and 'Cardinal de Richelieu', but it was Jack Vass who started to grow them in this exceptional way, and roses have been pruned and trained like this at Sissinghurst ever since. Other National Trust properties send their gardeners here to learn this ingenious technique.</span></p><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">
	The rose pruning philosophy can be summed up as "treat them mean, keep them keen". If you put every stem of a rose plant under pressure, bending and stressing it, the rose will flower more prolifically. The plant's biochemistry tells the bush it's on the way out and so needs to make as many flowers as possible.</span></p><h2 data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">the Sissinghurst rose pruning technique</span></h2><h3 data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">climbers and ramblers</span></h3><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">
	The rose pruning season at Sissinghurst starts in November with the climbers and ramblers that cover almost every one of the terracotta brick walls.</span></p><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">
	First, the gardeners cut off most of that year's growth. This keeps the framework of the rose clear and prevents the plant from becoming too woody.</span></p><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">
	Next, large woody stems are taken out – almost to the base – to encourage new shoots. These will flower the following year.</span></p><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">
	The remaining branches are re-attached to the wall, stem by stem, starting from the middle of the plant, working outwards, with the pruned tip of each branch bent down and attached to the one below.</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">
	Climbers such as 'Paul's Lemon Pillar' are a bit more reluctant than ramblers like 'Albertine' and the famous Rosa mulliganii on the frame in the centre of the White Garden, which are very bendy and easy to train.</span></p><h3 data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">shrub roses</span></h3><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">
	Once the wall roses are done, it's the turn of the border shrubs. They should be pruned before they come into leaf to prevent leaf buds and shoots from being damaged as their stems are manipulated. Depending on their habit, shrub roses are trained in one of three ways.</span></p><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">
	The tall, rangy bushes with stiffer branches (such as 'Charles de Mills', 'Ispahan', 'Gloire de France', 'Cardinal de Richelieu' and 'Camayeux') are twirled up a frame of four chestnut or hazel poles. Every pruned tip is bent and attached to a length below.</span></p><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">
	The big leggy shrubs, which put out great, pliable, triffid arms that are easy to tie down and train, are bent on to hazel hoops arranged around the skirts of the plant. Roses with this lax habit include 'Constance Spry', 'Fantin-Latour', 'Zéphirine Drouhin', 'Madame Isaac Pereire', 'Coupe d'Hébé', 'Henri Martin' and 'Souvenir du Dr Jamain'.</span></p><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">
	All the old and diseased wood is removed and then, stem by stem, last year's wood is bent over and tied onto the hazel hoop. You start at the outside of the plant and tie that in first and then move towards the middle, using the plant's own branches to build up the web and – in the case of 'Constance Spry' and 'Henri Martin' – create a fantastic height, one layer domed and attached to the one below. Without any sign of a flower, this looks magnificent as soon as it's complete, and in a couple of months, each stem, curved almost to ground level, will flower abundantly.</span></p><p data-dcnode-id="727"><span data-dcnode-id="731" instrument_node="">
	That leaves just the contained, well behaved, less prolific varieties ('Petite de Hollande', 'Madame Knorr', 'Chapeau de Napoléon', ( syn. Rosa x centifolia 'Cristata') and those that produce branches too stiff to bend ('</span><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sarahraven.com/products/rose-felicia"><span data-dcnode-id="730" instrument_node="">Felicia</span></a><span data-dcnode-id="728" instrument_node="">' and the newish David Austin rose, 'William Shakespeare 2000'). These are pruned hard, then each bush is attached to a single stake, cut to about the height of the pruned bush and attached by twine. Without the stake, even these will topple under the weight of their summer growth.</span></p><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">
	For those who live in the North, where some roses are yet to leaf, you could get bending now. If your roses are already too advanced for this year, come and see how it's all done at Sissinghurst.</span></p><h3 data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">related articles</span></h3><ul data-dcnode-id="712"><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="719"><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sarahraven.com/articles/how-to-plant-and-grow-roses"><span data-dcnode-id="721" instrument_node="">How to plant &amp; grow roses (growing guide)</span></a></li><li data-dcnode-id="716"><a data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sarahraven.com/articles/gardening-at-home-with-sarah-the-rose-garden-in-june"><span data-dcnode-id="718" instrument_node="">The rose garden at Perch Hill in June</span></a></li><li data-dcnode-id="713"><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sarahraven.com/articles/sarahs-favourite-rose-colour-palettes"><span data-dcnode-id="715" instrument_node="">Sarah's favourite rose colour palettes</span></a></li></ul><p data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">Browse our full range of roses, available to buy as&nbsp;</span><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sarahraven.com/plants/roses"><span data-dcnode-id="710" instrument_node="">bare root roses</span></a><span data-dcnode-id="708" instrument_node=""> to help your plants establish over the winter.</span></p><span data-dcnode-id="706" instrument_node="">
