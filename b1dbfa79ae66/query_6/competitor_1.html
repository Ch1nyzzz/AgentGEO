g%2Bflowering%2Bplants%2Bcan%2Bmake%2Beven%2Bthe%2Bmost%2Bexperienced%2Bhome%2Bgardener%2Bpause.%2BBut%2Bpruning%2Bis%2Bimportant%2Bto%2Byour%2Bplants%2526%25238217%253B%2Bgrowth%252C%2Band%2Bone%2Bof%2Bthe%2Bbest%2Bways%2Bto%2Bbring%2Bmore%2Bblooms%2Bthe%2Bfollowing%2Bseason.%2BBut%2Bnot%2Ball%2Bplants%2Bshould%2Bbe%2Bpruned%2Bthe%2Bsame%2Bway%2Bor%2Bat%2Bthe%2Bsame%2Btime%2Bof%2Byear.%2BWhat%2Bgets%2Bpruned%2Band%2Bwhen%253F%2BWe%2Bare%2Bso%2Bglad%2Byou%2Basked%2521%2BWhen%2Bto%2BPrune%252C%2BTiming%2BIs%2BEverything%2BWhen%2B%255B%2526hellip%253B%255D%26source%3DSpring-Green%2BLawn%2BCare%2BGroup" target="_share"><span data-dcnode-id="502" instrument_node="">Share on linkedin</span></a><a class="share social-pinterest bs-contain" data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%3A//www.spring-green.com/blog-pruning-flowering-plants/%26media%3Dhttps%253A%252F%252Fwww.spring-green.com%252Fwp-content%252Fuploads%252F2017%252F10%252Ffall-pruning-200-150x150.jpg%26description%3DPruning%253A%2BHow%2Band%2BWhen%2Bto%2BPrune%2BFlowering%2BPlants" target="_share"><span data-dcnode-id="500" instrument_node="">Share on pinterest</span></a></span></div><div class="entry-slideshow" data-dcnode-id="496"></div></div></header><div class="entry-content lawn-care-guide-inner-content" data-dcnode-id="451"><p data-dcnode-id="490"><img alt="fall pruning" class="aligncenter wp-image-14083 lazyloaded" data-dcnode-id="493" data-lazy-sizes="(max-width: 818px) 100vw, 818px" data-lazy-src="https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning.jpg" data-lazy-srcset="https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning.jpg 1280w, https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning-300x135.jpg 300w, https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning-768x346.jpg 768w, https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning-1024x461.jpg 1024w" data-was-processed="true" height="368" sizes="(max-width: 818px) 100vw, 818px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spring-green.com/wp-content/uploads/2017/10/fall-pruning.jpg&amp;raw" srcset="https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning.jpg 1280w, https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning-300x135.jpg 300w, https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning-768x346.jpg 768w, https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning-1024x461.jpg 1024w" width="818"><noscript data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">&lt;img class="aligncenter  wp-image-14083" src="https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning.jpg" alt="fall pruning" width="818" height="368" srcset="https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning.jpg 1280w, https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning-300x135.jpg 300w, https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning-768x346.jpg 768w, https://www.spring-green.com/wp-content/uploads/2017/10/fall-pruning-1024x461.jpg 1024w" sizes="(max-width: 818px) 100vw, 818px" /&gt;</span></noscript></p><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">If you hesitate at the thought of bringing the pruning shears to your beautiful flowering plants, you’re not alone. The thought of pruning flowering plants can make even the most experienced home gardener pause. But pruning is important to your plants’ growth, and one of the best ways to bring more blooms the following season. But not all plants should be pruned the same way or at the same time of year. What gets pruned and when? We are so glad you asked!</span></p><h2 data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">When to Prune, Timing Is Everything</span></h2><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">When and where to prune a flowering plant largely depends on when and where it blooms. Properly timing the pruning of your flowering plants can make the difference between magnificent blooms next season, or—every gardener’s fear—no flowers at all. The key is to determine when and where the plant sets its buds for the next season. In general terms, we want to prune after flowering is finished but before budding begins. You want to prune before buds are set to keep from disturbing the following year’s blooms.</span></p><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">As a rule, flowering plants that bloom in early spring on old wood (or growth from the previous season), like azaleas, should be pruned a week or two after flowering. The new growth that follows is where buds will form. Those buds will then bloom the following spring on what by then will be the previous season’s growth.</span></p><p data-dcnode-id="478"><span data-dcnode-id="481" instrument_node="">Plants that bloom in late summer or fall, on stem growth from the current growing season, should be pruned in winter or early spring, while the plant is dormant. During the growing season that follows, buds will form and bloom on the current year’s growth.</span><br data-dcnode-id="480"><span data-dcnode-id="479" instrument_node=""> Some plant types will make this easy and others not so much. Azaleas, for example, form buds all along the stem, so you can cut anywhere and still encourage buds to bloom. Hydrangeas are another story. Some hydrangea bloom on the old wood while others bloom on the new growth. The key is to figure out which type(s) you have.</span></p><h2 data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Pruning Tips and Techniques</span></h2><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">The reasons to prune flowering plants are fairly few: to control the size and shape the plants, to optimize the blooms, and to remove dead or diseased portions. Deadheading, for example, is the practice of pruning flowers after they have faded out of bloom. In some cases, dead wood is pruned away for safety reasons. The removal of dead wood can be done at any time and diseased wood should be removed as soon as possible. Fall pruning is usually restricted to these instances. In any case, most flowering plants require relatively few pruning sessions.</span></p><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">The act of pruning plants is somewhat ironic in that when we prune, we are in effect causing injury. When done properly, however, pruning techniques utilize the plant’s natural healing process to stimulate new growth and achieve optimal health, beauty, and vitality. For the best results, make sure you fertilize as well as prune. Some plants, like azaleas and rhododendrons, love to be fertilized right at the end of the blooming season as well as during the summer. Finally, use proper tools and keep them sharp in order to minimize trauma to the plant.</span></p><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">The key is to know your particular type of plant and what it needs most. Pruning may not be easy, but the results are well worth the work. Two excellent sources of additional information come from Stihl’s Pruning Guide, a manufacturer of pruning tools, and Proven Winners Rules of Thumb for Pruning Flowering Shrubs.</span></p><p data-dcnode-id="465"><span data-dcnode-id="469" instrument_node="">As always, never hesitate to </span><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spring-green.com/about-us/contact-spring-green/" rel="noopener" target="_blank"><span data-dcnode-id="468" instrument_node="">call on your neighborhood lawn care professional at Spring-Green</span></a><span data-dcnode-id="466" instrument_node=""> whenever you have questions or concerns about caring for your lawn and landscape. We are here to help.</span></p><nav class="post-navigation" data-dcnode-id="452" id="nav-below" role="navigation"><h1 class="screen-reader-text" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Post navigation</span></h1><div class="nav-previous" data-dcnode-id="458"><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spring-green.com/blog-dark-tip-fungus-dog-stinkhorn/" rel="prev"><span class="meta-nav" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">←</span></span><span data-dcnode-id="460" instrument_node=""> Found A Smelly Dark Tip Fungus? It’s Dog Stinkhorn!</span></a></div><div class="nav-next" data-dcnode-id="453"><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spring-green.com/blog-leaves-change-color-fall/" rel="next"><span data-dcnode-id="457" instrument_node="">Why Do Leaves Change Color In The Fall? </span><span class="meta-nav" data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">→</span></span></a></div></nav></div><footer class="entry-comments" data-dcnode-id="450"></footer></article></div><div <="" data-dcnode-id="160" div=""><div class="large-4 columns ask-harold" data-dcnode-id="161"><aside class="site left" data-dcnode-id="162"><div class="ouw-contact-form box" data-dcnode-id="259" id="contact_form_widget-2"><header data-dcnode-id="445"><h2 class="widget-title" data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Ask Harold</span></h2></header><div class="form widget" data-dcnode-id="260" id="ouwformshell_ask-harold"><form action="/blog-pruning-flowering-plants/" class="ouw-contact-form form-loading" data-dcnode-id="265" enctype="multipart/form-data" id="ouwform_ask-harold" method="post"><div class="inv-recaptcha-holder" data-dcnode-id="444"></div><div class="hidden" data-dcnode-id="435"><span data-dcnode-id="443" instrument_node=""> </span><input data-dcnode-id="442" name="ouw_formid" type="
