</span><article class="article-post article post-2428 post type-post status-publish format-standard has-post-thumbnail hentry category-gardening category-gardening-tips mv-content-wrapper" data-dcnode-id="624" id="post-2428"><span data-dcnode-id="844" instrument_node="">
</span><header class="entry-header header-singular wrapper" data-dcnode-id="839"><span data-dcnode-id="843" instrument_node="">
</span><h1 class="entry-title article-heading" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">When to Prune Pyracantha Plant</span></h1><span data-dcnode-id="840" instrument_node="">
</span></header><span data-dcnode-id="838" instrument_node="">
</span><div class="entry-content mvt-content" data-dcnode-id="629"><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" data-preserver-spaces="true"><span data-dcnode-id="834" instrument_node="">Pyracantha is a tough </span><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningbank.com/evergreen-ground-cover-plants/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="833" instrument_node="">evergreen plant</span></a><span data-dcnode-id="831" instrument_node=""> that also serves as a shrub and can grow as tall as 13 ft or 4 meters in height, as well as in width when it is not pruned. As a result of its exceptional growth and response to pruning, its keepers usually wonder when to prune pyracantha.</span></span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" data-preserver-spaces="true"><span data-dcnode-id="827" instrument_node="">Today, we shall be looking at the best time to prune pyracantha plant. Aside from that, we will also discuss some other pyracantha care tips that should be diligently applied to it </span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningbank.com/how-does-pruning-promote-growth/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="826" instrument_node="">for optimal growth</span></a><span data-dcnode-id="824" instrument_node=""> and for it to serve its ornamental purposes.</span></span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Let’s get started!</span></p><span data-dcnode-id="818" instrument_node="">
</span><div class="ez-toc-v2_0_19 counter-flat counter-decimal ez-toc-light-blue" data-dcnode-id="787" id="ez-toc-container"><span data-dcnode-id="817" instrument_node="">

</span><h2 data-dcnode-id="781"><span class="ez-toc-section" data-dcnode-id="785" id="Pyracantha_Plant_An_Overview"></span><span data-dcnode-id="783" data-preserver-spaces="true"><span data-dcnode-id="784" instrument_node="">Pyracantha Plant | An Overview</span></span><span class="ez-toc-section-end" data-dcnode-id="782"></span></h2><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" data-preserver-spaces="true"><span data-dcnode-id="779" instrument_node="">In case you’re not familiar with the name Pyracantha, we would be briefly discussing Pyracantha and its features. This would not only enlighten you on what Pyracantha is; it would also enable you to know when to prune Pyrancatha plant, depending on the part of the world you are in.</span></span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" data-preserver-spaces="true"><span data-dcnode-id="775" instrument_node="">Pyracantha is also known as ‘firethorn’ and is a shrub that is grown for its evergreen characteristics. It also serves ornamental purposes as a result of its characteristic orange and red berries it produces in autumn and winter and the cream-colored blooms that it </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruceeats.com/fresh-spring-fruits-and-vegetables-2217705" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="774" instrument_node="">produces in the spring</span></a><span data-dcnode-id="772" instrument_node="">. </span></span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" data-preserver-spaces="true"><span data-dcnode-id="768" instrument_node="">Its alias ‘firethorn’ was derived from the sharp thorns it possesses.</span></span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" data-preserver-spaces="true"><span data-dcnode-id="764" instrument_node="">Pyracantha is native to Taiwan, Europe, South East Asia, and China. It is grown and has been used hedging plants since the 1500s. It is also used as a form of security in homes and places where it is grown as a result of its size, density, and sharp thorns.</span></span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" data-preserver-spaces="true"><span data-dcnode-id="760" instrument_node="">Pyracantha thrives in all soil types, even in clay soil, as long as the soil has good drainage. It is hardy to drought but does not enjoy being waterlogged. Therefore it prefers soils that are too dry rather than too wet.</span></span></p><span data-dcnode-id="757" instrument_node="">
</span><ul data-dcnode-id="750"><span data-dcnode-id="756" instrument_node="">
</span><li data-dcnode-id="752"><span data-dcnode-id="755" instrument_node="">Read Also: </span><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningbank.com/when-to-prune-forsythia-plant/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="754" instrument_node="">When to Prune Forsythia Plant</span></a></li><span data-dcnode-id="751" instrument_node="">
</span></ul><span data-dcnode-id="749" instrument_node="">
</span><h2 data-dcnode-id="744"><span class="ez-toc-section" data-dcnode-id="748" id="When_to_Prune_Pyracantha_Plant"></span><span data-dcnode-id="746" data-preserver-spaces="true"><span data-dcnode-id="747" instrument_node="">When to Prune Pyracantha Plant</span></span><span class="ez-toc-section-end" data-dcnode-id="745"></span></h2><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="739"><noscript data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">&lt;img class="aligncenter size-full wp-image-2571" src="https://gardeningbank.com/wp-content/uploads/2020/08/When-to-Prune-Pyracantha-Plant.jpg" alt="When to Prune Pyracantha Plant" width="750" height="500" srcset="https://gardeningbank.com/wp-content/uploads/2020/08/When-to-Prune-Pyracantha-Plant.jpg 750w, https://gardeningbank.com/wp-content/uploads/2020/08/When-to-Prune-Pyracantha-Plant-300x200.jpg 300w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="When to Prune Pyracantha Plant" class="aligncenter size-full wp-image-2571 lazyload" data-dcnode-id="740" data-pin-media="https://gardeningbank.com/wp-content/uploads/2020/08/When-to-Prune-Pyracantha-Plant.jpg" data-src="https://gardeningbank.com/wp-content/uploads/2020/08/When-to-Prune-Pyracantha-Plant.jpg.webp" data-srcset="https://gardeningbank.com/wp-content/uploads/2020/08/When-to-Prune-Pyracantha-Plant.jpg.webp 750w, https://gardeningbank.com/wp-content/uploads/2020/08/When-to-Prune-Pyracantha-Plant-300x200.jpg.webp 300w" data-trellis-processed="1" data-webp="true" height="500" id="mv-trellis-img-2" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningbank.com/wp-content/uploads/2020/08/When-to-Prune-Pyracantha-Plant.jpg.webp&amp;raw" srcset="https://gardeningbank.com/wp-content/uploads/2020/08/When-to-Prune-Pyracantha-Plant.jpg.webp 750w, https://gardeningbank.com/wp-content/uploads/2020/08/When-to-Prune-Pyracantha-Plant-300x200.jpg.webp 300w" width="750"></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" data-preserver-spaces="true"><span data-dcnode-id="737" instrument_node="">Pyracantha requires </span><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningbank.com/do-branches-grow-back-after-pruning/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="736" instrument_node="">routine pruning</span></a><span data-dcnode-id="734" instrument_node=""> to keep it in shape; this is because it grows at a very rapid rate and can become unruly with arching, long branches, and firethorns. Pyracantha can be pruned and trained to grow into a hedge plant or as an espalier.</span></span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" data-preserver-spaces="true"><span data-dcnode-id="730" instrument_node="">On a general note, Pyracantha is best pruned during spring after it has blossomed, in order to reduce the impact on berrying wood and flowering wood. </span></span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" data-preserver-spaces="true"><span data-dcnode-id="726" instrument_node="">This would also enable you to clearly see and differentiate old shoots from the young shoots, also, to clearly see non-flowering growths.</span></span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" data-preserver-spaces="true"><span data-dcnode-id="722" instrument_node="">Pruning is done on the non-flowering growth and the flowering shoots. You do this by cutting back a third of the non-flowering growth and flowering shoots to three leaves above each bloom. More pruning can also be done in summer when the berries have appeared.</span></span></p><span data-dcnode-id="719" instrument_node="">
</span><h2 data-dcnode-id="714"><span class="ez-toc-section" data-dcnode-id="718" id="Pruning_Pyracantha_for_Different_Purposes"></span><span data-dcnode-id="716" data-preserver-spaces="true"><span data-dcnode-id="717" instrument_node="">Pruning Pyracantha for Different Purposes</span></span><span class="ez-toc-section-end" data-dcnode-id="715"></span></h2><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" data-preserver-spaces="true"><span data-dcnode-id="712" instrument_node="">As earlier stated, Pyrancntha can be pruned and trained to grow into an espalier or hedge plant. Now, we would be looking at the different best times to prune Pyracantha for either espalier or hedge plant.</span></span></p><span data-dcnode-id="709" instrument_node="">
</span><h3 data-dcnode-id="704"><span class="ez-toc-section" data-dcnode-id="708" id="When_to_Prune_Pyracantha_for_Espalier_Shrub"></span><span data-dcnode-id="706" data-preserver-spaces="true"><span data-dcnode-id="707" instrument_node="">When to Prune Pyracantha for Espalier Shrub:</span></span><span class="ez-toc-section-end" data-dcnode-id="705"></span></h3><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" data-preserver-spaces="true"><span data-dcnode-id="702" instrument_node="">Pyracantha is an ideal plant for an espalier shrub as a result of its rapid growth rate and arching growth habit. Pruning and training Pyracantha into an espalier usually requires </span><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeningknowhow.com/ornamental/shrubs/shgen/pruning-a-shrub-into-a-tree.htm" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="701" instrument_node="">training the shrub</span></a><span data-dcnode-id="699" instrument_node=""> to grow into two dimensions, that is, height and width, against a support framework.</span></span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" data-preserver-spaces="true"><span data-dcnode-id="695" instrument_node="">As soon as you start the pyracantha espalier, it would require that you continually bend the limbs and tie the limbs at every few months as the Pyracantha grows. </span></span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" data-preserver-spaces="true"><span data-dcnode-id="691" instrument_node="">Other care tips necessary for maintaining the Pyracantha espalier include routine removal of unwanted growths, </span><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningbank.com/can-a-broken-tree-branch-grow-roots/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="690" instrument_node="">removal of new growths</span></a><span data-dcnode-id="688" instrument_node=""> that occur in late summers so that the berries become more visible. Also, remove any shoots that sprout on the side that do not align with the Pyracantha espalier pattern.</span></span></p><span data-dcnode-id="685" instrument_node="">
</span><h3 data-dcnode-id="680"><span class="ez-toc-section" data-dcnode-id="684" id="When_to_Prune_Pyracantha_as_a_Hedge_Plant"></span><span data-dcnode-id="682" data-preserver-spaces="true"><span data-dcnode-id="683" instrument_node="">When to Prune Pyracantha as a Hedge Plant</span></span><span class="ez-toc-section-end" data-dcnode-id="681"></span></h3><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="677" data-preserver-spaces="true"><span data-dcnode-id="678" instrument_node="">To prune and train your Pyracantha into a hedge plant, it is recommended that you prune it late in the first season or before its buds break in the following season. When you prune, you prune off at least half of the new growth.</span></span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" data-preserver-spaces="true"><span data-dcnode-id="674" instrument_node="">In the following second year, </span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningbank.com/is-it-ok-to-trim-bushes-in-the-fall/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="673" instrument_node="">trim off another half</span></a><span data-dcnode-id="671" instrument_node="">, then by the third year, you start shaping the hedge into your preferred shape. </span></span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" data-preserver-spaces="true"><span data-dcnode-id="667" instrument_node="">Once the desired hedge shape has been established, you can now commence pruning the hedges at least two or three times in between the spring and end of summer, in order to maintain the general hedge shape.</span></span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" data-preserver-spaces="true"><span data-dcnode-id="663" instrument_node="">For the sake of having an ample amount of berries produced, you should not prune off a lot of growth from the previous year. This would enable the plant to produce a good amount of berries during winter and autumn. </span></span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" data-preserver-spaces="true"><span data-dcnode-id="659" instrument_node="">Autumn and early spring pruning reduce the rate of Pyracantha flowering and berry production; however, it does not harm the plant. So you can carry that out depending on your priorities and demands of the hedge plant.</span></span></p><span data-dcnode-id="656" instrument_node="">
</span><ul data-dcnode-id="649"><span data-dcnode-id="655" instrument_node="">
</span><li data-dcnode-id="651"><span data-dcnode-id="654" instrument_node="">Read Also: </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningbank.com/when-to-prune-hydrangeas/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="653" instrument_node="">Best Time to Prune Hydrangeas</span></a></li><span data-dcnode-id="650" instrument_node="">
</span></ul><span data-dcnode-id="648" instrument_node="">
</span><h2 data-dcnode-id="643"><span class="ez-toc-section" data-dcnode-id="647" id="Conclusion"></span><span data-dcnode-id="645" data-preserver-spaces="true"><span data-dcnode-id="646" instrument_node="">Conclusion</span></span><span class="ez-toc-section-end" data-dcnode-id="644"></span></h2><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" data-preserver-spaces="true"><span data-dcnode-id="641" instrument_node="">Pyracantha has features that make it desirable and functional for home gardeners and landscapers as well. It is quite easy to maintain and be cared for, although the thorns call for necessary precautions while pruning.</span></span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" data-preserver-spaces="true"><span data-dcnode-id="637" instrument_node="">If you have Pyracantha in your home or intend on growing one, ensure that it is positioned in a location far from where children and pets play to avoid hurting them.</span></span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" data-preserver-spaces="true"><span data-dcnode-id="633" instrument_node="">A general rule of thumb for Pyracantha is to grow it in a sunny location. It thrives in sunny areas, although it is tolerant of a little shade. For optimal result, plant Pyracantha in spring, so that it establishes well by winter.</span></span></p><span data-dcnode-id="630" instrument_node="">
</span></div><span data-dcnode-id="628" instrument_node="">
