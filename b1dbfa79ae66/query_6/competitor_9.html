 class="shared-counts-icon-label" data-dcnode-id="3953"><span class="shared-counts-icon" data-dcnode-id="3956"><svg data-dcnode-id="3957" height="32" version="1.1" viewBox="0 0 731 1024" width="22.84375" xmlns="http://www.w3.org/2000/svg"><path d="M0 341.143q0-61.714 21.429-116.286t59.143-95.143 86.857-70.286 105.714-44.571 115.429-14.857q90.286 0 168 38t126.286 110.571 48.571 164q0 54.857-10.857 107.429t-34.286 101.143-57.143 85.429-82.857 58.857-108 22q-38.857 0-77.143-18.286t-54.857-50.286q-5.714 22.286-16 64.286t-13.429 54.286-11.714 40.571-14.857 40.571-18.286 35.714-26.286 44.286-35.429 49.429l-8 2.857-5.143-5.714q-8.571-89.714-8.571-107.429 0-52.571 12.286-118t38-164.286 29.714-116q-18.286-37.143-18.286-96.571 0-47.429 29.714-89.143t75.429-41.714q34.857 0 54.286 23.143t19.429 58.571q0 37.714-25.143 109.143t-25.143 106.857q0 36 25.714 59.714t62.286 23.714q31.429 0 58.286-14.286t44.857-38.857 32-54.286 21.714-63.143 11.429-63.429 3.714-56.857q0-98.857-62.571-154t-163.143-55.143q-114.286 0-190.857 74t-76.571 187.714q0 25.143 7.143 48.571t15.429 37.143 15.429 26 7.143 17.429q0 16-8.571 41.714t-21.143 25.714q-1.143 0-9.714-1.714-29.143-8.571-51.714-32t-34.857-54-18.571-61.714-6.286-60.857z" data-dcnode-id="3958"></path></svg></span><span class="shared-counts-label" data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">Pin</span></span></span><span class="shared-counts-count" data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">0</span></span></a></div><span data-dcnode-id="3948" instrument_node="">
</span><p data-dcnode-id="3945"><img alt="Grow kiwifruit" class="aligncenter size-full wp-image-67172" data-dcnode-id="3947" height="3744" sizes="(max-width: 5616px) 100vw, 5616px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2019/10/23182040/bigstock-Juicy-fruits-of-kiwi-fruit-Ki-233114923.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2019/10/23182040/bigstock-Juicy-fruits-of-kiwi-fruit-Ki-233114923.jpg 5616w, https://cdn.harvesttotable.com/htt/2019/10/23182040/bigstock-Juicy-fruits-of-kiwi-fruit-Ki-233114923-300x200.jpg 300w, https://cdn.harvesttotable.com/htt/2019/10/23182040/bigstock-Juicy-fruits-of-kiwi-fruit-Ki-233114923-768x512.jpg 768w, https://cdn.harvesttotable.com/htt/2019/10/23182040/bigstock-Juicy-fruits-of-kiwi-fruit-Ki-233114923-1024x683.jpg 1024w" width="5616"><span data-dcnode-id="3946" instrument_node="">Kiwifruits are easy to grow.</span></p><span data-dcnode-id="3944" instrument_node="">
</span><p data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">They grow in clusters like grapes. Each is about the size of an egg or smaller. They have firm flesh like a melon and flavor that is a blend of melon, banana, lime, and strawberry.</span></p><span data-dcnode-id="3941" instrument_node="">
</span><p data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">There are several kiwifruit varieties, some for growing in warm winter regions, some for growing in cool and cold winter regions. Some must be peeled before they are eaten others can be eaten whole peel and flesh in a bite or two.</span></p><span data-dcnode-id="3938" instrument_node="">
</span><p data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">Kiwifruits are vigorous growers. The sum of their training and maintenance is to keep the vines from tangling and knotting.</span></p><span data-dcnode-id="3935" instrument_node="">
</span><p data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">Kiwifruit are also called Chinese gooseberry.</span></p><span data-dcnode-id="3932" instrument_node="">
</span><h2 data-dcnode-id="3929"><strong data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">Choosing the Right Kiwifruit Plant for Your Climate Zone</span></strong></h2><span data-dcnode-id="3928" instrument_node="">
</span><p data-dcnode-id="3917"><span data-dcnode-id="3927" instrument_node="">There are three types of kiwifruit with differing degrees of cold tolerance: fuzzy-skinned kiwi (</span><em data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">Actinidia deliciosa</span></em><span data-dcnode-id="3924" instrument_node="">) will grow in Zones 7 to 9 and is the least cold-tolerant (it is hardy to about 25°F) and two smooth-skinned kiwifruits, the first, called hardy kiwi (</span><em data-dcnode-id="3922"><span data-dcnode-id="3923" instrument_node="">A. arguta</span></em><span data-dcnode-id="3921" instrument_node="">) which is hardy to Zone 4, and the second called super-hardy kiwi (</span><em data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">A. kolomikta</span></em><span data-dcnode-id="3918" instrument_node="">) which is hardy to Zone 3. Choose the kiwifruit that can survive the winter cold where you live. If you are unsure, contact the Cooperative Extension Service nearest you or ask at a nearby garden center for the variety of kiwifruit that they stock.</span></p><span data-dcnode-id="3916" instrument_node="">
</span><h2 data-dcnode-id="3913"><strong data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">Best Site for Growing Kiwifruit</span></strong></h2><span data-dcnode-id="3912" instrument_node="">
</span><ul data-dcnode-id="3901"><span data-dcnode-id="3911" instrument_node="">
</span><li data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">Grow kiwifruit in compost-rich loamy soil that is well-drained. Roots can grow to more than 4 feet deep; soil should be easily worked. A soil pH of 6.5 to 7.0 is optimal.</span></li><span data-dcnode-id="3908" instrument_node="">
</span><li data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">Avoid planting kiwifruit in windy spots; wind can stress and even break vines.</span></li><span data-dcnode-id="3905" instrument_node="">
</span><li data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">Avoid planting kiwifruit in low spots where cold air or frost can settle.</span></li><span data-dcnode-id="3902" instrument_node="">
</span></ul><span data-dcnode-id="3900" instrument_node="">
</span><h2 data-dcnode-id="3897"><strong data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">Kiwifruit Yield</span></strong></h2><span data-dcnode-id="3896" instrument_node="">
</span><ul data-dcnode-id="3891"><span data-dcnode-id="3895" instrument_node="">
</span><li data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">A single kiwifruit vine will produce 22 to 33 pounds of fruit each year. Kiwifruits may take up to 7 years to reach full fruiting potential.</span></li><span data-dcnode-id="3892" instrument_node="">
</span></ul><span data-dcnode-id="3890" instrument_node="">
</span><h2 data-dcnode-id="3887"><strong data-dcnode-id="3888"><span data-dcnode-id="3889" instrument_node="">Kiwifruit Pollination</span></strong></h2><span data-dcnode-id="3886" instrument_node="">
</span><ul data-dcnode-id="3869"><span data-dcnode-id="3885" instrument_node="">
</span><li data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">Most kiwifruits are either male or female. A few are self-fertile.</span></li><span data-dcnode-id="3882" instrument_node="">
</span><li data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">A female kiwifruit must be planted with a male or a self-fertile partner in order to produce fruit.</span></li><span data-dcnode-id="3879" instrument_node="">
</span><li data-dcnode-id="3877"><span data-dcnode-id="3878" instrument_node="">One male kiwifruit will pollinate up to eight female vines. Plant several different male cultivars with female plants; this will ensure that at least one male plant is in bloom when the female plants are flowering.</span></li><span data-dcnode-id="3876" instrument_node="">
</span><li data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">Wind and honeybees are common kiwifruit pollinators.</span></li><span data-dcnode-id="3873" instrument_node="">
</span><li data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">‘Jenny’ is the best-known self-fertile variety.</span></li><span data-dcnode-id="3870" instrument_node="">
</span></ul><span data-dcnode-id="3868" instrument_node="">
</span><h2 data-dcnode-id="3865"><strong data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">Spacing Kiwifruit</span></strong></h2><span data-dcnode-id="3864" instrument_node="">
</span><ul data-dcnode-id="3856"><span data-dcnode-id="3863" instrument_node="">
</span><li data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">Space kiwifruits 15 feet apart; space rows 15 feet apart.</span></li><span data-dcnode-id="3860" instrument_node="">
</span><li data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">A kiwifruit vine can grow 10 to 15 tall and wide.</span></li><span data-dcnode-id="3857" instrument_node="">
</span></ul><span data-dcnode-id="3855" instrument_node="">
</span><h2 data-dcnode-id="3852"><strong data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">Planting Kiwifruit</span></strong></h2><span data-dcnode-id="3851" instrument_node="">
</span><ul data-dcnode-id="3819"><span data-dcnode-id="3850" instrument_node="">
</span><li data-dcnode-id="3848"><span data-dcnode-id="3849" instrument_node="">Plant kiwifruits in early spring or in late fall during dormancy. Avoid planting kiwifruits in hot, dry summer conditions.</span></li><span data-dcnode-id="3847" instrument_node="">
</span><li data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">Kiwifruit will grow best in a warm, sheltered spot that is south facing; avoid planting kiwifruit where frost can settle.</span></li><span data-dcnode-id="3844" instrument_node="">
</span><li data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">Put a trellis in place before planting kiwifruit. See the section on Training.</span></li><span data-dcnode-id="3841" instrument_node="">
</span><li data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">If you are planting non-self-fertile varieties, plant a male and female together in the same planting hole.</span></li><span data-dcnode-id="3838" instrument_node="">
</span><li data-dcnode-id="3836"><span data-dcnode-id="3837" instrument_node="">Dig a hole 12 inches deep and wide or larger; wide enough to spread out the roots of the plant or plants you are placing in the hole.</span></li><span data-dcnode-id="3835" instrument_node="">
</span><li data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">Set the plant in the hole at the same level it was growing in the nursery container; if you are planting a bare-root plant set it in the hole so that the soil level mark on the bare-root plant is level with the surrounding soil.</span></li><span data-dcnode-id="3832" instrument_node="">
</span><li data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">Refill the hole with half native soil and half aged compost or commercial organic planting mix.</span></li><span data-dcnode-id="3829" instrument_node="">
</span><li data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">Firm the soil in around the roots so that no air pockets are near the roots; gently water the soil so that it settles in tight around the roots.</span></li><span data-dcnode-id="3826" instrument_node="">
</span><li data-dcnode-id="3824"><span data-dcnode-id="3825" instrument_node="">Feed the newly planted vine with a liquid phosphorus-rich starter fertilizer.</span></li><span data-dcnode-id="3823" instrument_node="">
</span><li data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">Tie the stem of the plant into the trellis or training wires. See the section on Training.</span></li><span data-dcnode-id="3820" instrument_node="">
</span></ul><span data-dcnode-id="3818" instrument_node="">
</span><h2 data-dcnode-id="3815"><strong data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">Training Kiwifruit</span></strong></h2><span data-dcnode-id="3814" instrument_node="">
</span><ul data-dcnode-id="3806"><span data-dcnode-id="3813" instrument_node="">
</span><li data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">Kiwifruit is best trained upward on a trellis; this will help keep vines from tangling and shading one another. Tangled and shaded vines yield less fruit.</span></li><span data-dcnode-id="3810" instrument_node="">
</span><li data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">Kiwifruit can be trained to multi-wire espalier (similar to the Kniffen system of training grapes) or T-post horizontal wires support.</span></li><span data-dcnode-id="3807" instrument_node="">
</span></ul><span data-dcnode-id="3805" instrument_node="">
</span><h2 data-dcnode-id="3801"><strong data-dcnode-id="3802"><img alt="Kiwifruit on trellis" class="aligncenter size-large wp-image-67631" data-dcnode-id="3804" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2019/10/23181631/Kiwifruit-bigstock-Fresh-kiwi-fruit-38464174-1024x683.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2019/10/23181631/Kiwifruit-bigstock-Fresh-kiwi-fruit-38464174-1024x683.jpg 1024w, https://cdn.harvesttotable.com/htt/2019/10/23181631/Kiwifruit-bigstock-Fresh-kiwi-fruit-38464174-300x200.jpg 300w, https://cdn.harvesttotable.com/htt/2019/10/23181631/Kiwifruit-bigstock-Fresh-kiwi-fruit-38464174-768x512.jpg 768w, https://cdn.harvesttotable.com/htt/2019/10/23181631/Kiwifruit-bigstock-Fresh-kiwi-fruit-38464174-1536x1024.jpg 1536w, https://cdn.harvesttotable.com/htt/2019/10/23181631/Kiwifruit-bigstock-Fresh-kiwi-fruit-38464174-2048x1365.jpg 2048w" width="1024"><span data-dcnode-id="3803" instrument_node="">Training Kiwifruit to a Wire Trellis Using the Kniffen System</span></strong></h2><span data-dcnode-id="3800" instrument_node="">
</span><ul data-dcnode-id="3780"><span data-dcnode-id="3799" instrument_node="">
</span><li data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">The simplest support method for backyard kiwifruit is called the two-arm or four-arm Kniffen system which is essentially a vertical wire trellis. Set two sturdy posts 15 feet apart then string two parallel wires between the posts at 18 inches and 36 inches above the ground (this is the four-arm Kniffen), or you can use a six arms or eight arms by placing additional wires at 52 and 70 inches above the ground (do not train vines higher than it is convenient to harvest fruit). Plant young kiwifruit under the wire at 10 to 15-foot intervals.</span></li><span data-dcnode-id="3796" instrument_node="">
</span><li data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">Tie the main stem or strongest shoot to the first wire and to the second wire if it is long enough. This will form the trunk of the plant.</span></li><span data-dcnode-id="3793" instrument_node="">
</span><li data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">Next, choose side shoots or laterals to creep in each direction on the wire. Tie the side shoots to the wire with elastic horticultural tape; as the canes grow spiral them around the wire. These trained lateral canes are called “arms”.</span></li><span data-dcnode-id="3790" instrument_node="">
</span><li data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">When the trunk reaches the second wire choose two more side shoots and tie them to the wire.</span></li><span data-dcnode-id="3787" instrument_node="">
</span><li data-dcnode-id="3785"><span data-dcnode-id="3786" instrument_node="">Remove the growing tip of the trunk when it about 6 inches below the top wire and choose two more shoots to tie into the top wire.</span></li><span data-dcnode-id="3784" instrument_node="">
</span><li data-dcnode-id="3782"><span data-dcnode-id="3783" instrument_node="">This training will create a tall main trunk with sets of selective side shoots or laterals which is important for growing the best quality kiwifruits. See Pruning below for more on this.</span></li><span data-dcnode-id="3781" instrument_node="">
</span></ul><span data-dcnode-id="3779" instrument_node="">
</span><h2 data-dcnode-id="3776"><strong data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Training Kiwifruit to a Horizontal Trellis</span></strong></h2><span data-dcnode-id="3775" instrument_node="">
</span><ul data-dcnode-id="3761"><span data-dcnode-id="3774" instrument_node="">
</span><li data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">Kiwifruit vines can be trained to wires supported by T-posts; the wires run horizontal to the ground.</span></li><span data-dcnode-id="3771" instrument_node="">
</span><li data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">Make T-posts to set every 15 feet. Bolt 2 x 4 cross-arms to 4 x 4 or 6 x 6 posts; the post should be 8 to 9 feet long (or less) allowing 2½ to 3 feet of the post to be buried in the ground. Stretch 3 to 5 horizontal wires between the posts; stretch wires to 300 pounds of tension—kiwifruit vines will become heavy with fruit.</span></li><span data-dcnode-id="3768" instrument_node="">
</span><li data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">Plant a kiwifruit midway between two T-posts; put a stake in place to support the main stem of the vine. Attach the main stem and its laterals to the horizontal wire. Train the vines along the wires.</span></li><span data-dcnode-id="3765" instrument_node="">
</span><li data-dcnode-id="3763"><span data-dcnode-id="3764" instrument_node="">Kiwifruit vines are heavier than grape vines; the supports must be well anchored.</span></li><span data-dcnode-id="3762" instrument_node="">
</span></ul><span data-dcnode-id="3760" instrument_node="">
</span><h2 data-dcnode-id="3757"><strong data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">Maintenance Pruning Kiwifruit</span></strong></h2><span data-dcnode-id="3756" instrument_node="">
</span><ul data-dcnode-id="3742"><span data-dcnode-id="3755" instrument_node="">
</span><li data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">Prune only when vines are dormant; pruning after buds begin to swell in spring can cause excessive sap flow which can weaken the vine.</span></li><span data-dcnode-id="3752" instrument_node="">
</span><li data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">Cut the vines that form the lateral arms back to about 7 feet each winter.</span></li><span data-dcnode-id="3749" instrument_node="">
</span><li data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">Remove 3-year-old fruiting canes at the end of harvest to make way for new canes that will grow next season. Lateral canes produce fruit for just three years; three-year-old canes must be removed to make way for younger fruiting canes.</span></li><span data-dcnode-id="3746" instrument_node="">
</span><li data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">Several times during the growing season pinch away any shoots that grow from the main trunk</span></li><span data-dcnode-id="3743" instrument_node="">
</span></ul><span data-dcnode-id="3741" instrument_node="">
</span><h2 data-dcnode-id="3738"><strong data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">Container Growing Kiwifruit</span></strong></h2><span data-dcnode-id="3737" instrument_node="">
</span><ul data-dcnode-id="3729"><span data-dcnode-id="3736" instrument_node="">
</span><li data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">Kiwifruit can be grown in a container. Choose a container at least 18 inches wide and deep; larger is better.</span></li><span data-dcnode-id="3733" instrument_node="">
</span><li data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">A trellis will be needed to support the vines. Make sure the trellis is well supported so that it does not tip over when vines are loaded with fruit.</span></li><span data-dcnode-id="3730" instrument_node="">
</span></ul><span data-dcnode-id="3728" instrument_node="">
</span><h2 data-dcnode-id="3725"><strong data-dcnode-id="3726"><span data-dcnode-id="3727" instrument_node="">Kiwifruit Care, Nutrients, and Water</span></strong></h2><span data-dcnode-id="3724" instrument_node="">
</span><ul data-dcnode-id="3704"><span data-dcnode-id="3723" instrument_node="">
</span><li data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">Keep the soil evenly moist throughout the growing season; if the soil goes dry during the growing season fruit may drop.</span></li><span data-dcnode-id="3720" instrument_node="">
</span><li data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">Water sparingly in autumn as winter approaches; this will help vines adapt to cooler temperatures.</span></li><span data-dcnode-id="3717" instrument_node="">
</span><li data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">Mulch to conserve soil moisture and reduce weeds. Mulch with aged compost or commercial organic planting mix to feed vines.</span></li><span data-dcnode-id="3714" instrument_node="">
</span><li data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">Apply a balanced fertilizer in early spring as growth starts. Feed vines with compost tea or a dilute solution of fish emulsion or kelp meal during the growing season.</span></li><span data-dcnode-id="3711" instrument_node="">
</span><li data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">Protect kiwifruits from frost by covering plants with plant blankets or burlap.</span></li><span data-dcnode-id="3708" instrument_node="">
</span><li data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">Kiwi trunks are prone to winter injury; wrap them in burlap in fall.</span></li><span data-dcnode-id="3705" instrument_node="">
</span></ul><span data-dcnode-id="3703" instrument_node="">
</span><h2 data-dcnode-id="3699"><strong data-dcnode-id="3700"><img alt="Kiwifruit harvest" class="aligncenter size-full wp-image-67173" data-dcnode-id="3702" height="675" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2019/10/23182039/Kiwi-fruit.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2019/10/23182039/Kiwi-fruit.jpg 900w, https://cdn.harvesttotable.com/htt/2019/10/23182039/Kiwi-fruit-300x225.jpg 300w, https://cdn.harvesttotable.com/htt/2019/10/23182039/Kiwi-fruit-768x576.jpg 768w" width="900"><span data-dcnode-id="3701" instrument_node="">Harvest and Storing Kiwifruit</span></strong></h2><span data-dcnode-id="3698" instrument_node="">
</span><ul data-dcnode-id="3660"><span data-dcnode-id="3697" instrument_node="">
</span><li data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">The kiwifruit is full-sized midsummer but it is not ready for harvest; it must stay on the vine to gain flavor and texture. Harvest usually comes in fall.</span></li><span data-dcnode-id="3694" instrument_node="">
</span><li data-dcnode-id="3692"><span data-dcnode-id="3693" instrument_node="">Kiwifruit is ripe when the skin turns from greenish to fully brown and seeds are black; the fruit may still be firm.</span></li><span data-dcnode-id="3691" instrument_node="">
</span><li data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">To test for flavor, pick a fruit, let it soften for a few days then taste it; if it’s sweet pick all the fruit and refrigerate it.</span></li><span data-dcnode-id="3688" instrument_node="">
</span><li data-dcnode-id="3686"><span data-dcnode-id="3687" instrument_node="">Fruit can be harvested hard and allowed to further ripen and soften at room temperature. To speed ripening put firm fruits in a paper bag with an apple</span></li><span data-dcnode-id="3685" instrument_node="">
</span><li data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Kiwifruit picked too early will be tart; picked too late it will not store well.</span></li><span data-dcnode-id="3682" instrument_node="">
</span><li data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">Cut the fruit off the vine with a small piece of stem attached; fruits with some stem attached will keep longer.</span></li><span data-dcnode-id="3679" instrument_node="">
</span><li data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">Kiwifruits will keep in cold storage for up to 6 months.</span></li><span data-dcnode-id="3676" instrument_node="">
</span><li data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">Fuzzy kiwifruits should be peeled before eating.</span></li><span data-dcnode-id="3673" instrument_node="">
</span><li data-dcnode-id="3671"><span data-dcnode-id="3672" instrument_node="">Eat kiwifruits fresh or preserve by canning or drying.</span></li><span data-dcnode-id="3670" instrument_node="">
</span><li data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">Fully ripe fruit can be frozen in slices for up to six months; thawed slices retain their texture and color but lose some sweetness.</span></li><span data-dcnode-id="3667" instrument_node="">
</span><li data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">Kiwifruit can be blended with bland juices or drink by itself. Add fresh kiwi to salads, ice cream, cakes, mix with yogurt, even add to sandwiches; it is too delicate to cook.</span></li><span data-dcnode-id="3664" instrument_node="">
</span><li data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">Pick all fruit before frost; if frost is not a danger, fruit can remain on the vine throughout the dormant season.</span></li><span data-dcnode-id="3661" instrument_node="">
</span></ul><span data-dcnode-id="3659" instrument_node="">
</span><h2 data-dcnode-id="3656"><strong data-dcnode-id="3657"><span data-dcnode-id="3658" instrument_node="">Kiwifruit Problems and Control</span></strong></h2><span data-dcnode-id="3655" instrument_node="">
</span><ul data-dcnode-id="3644"><span data-dcnode-id="3654" instrument_node="">
</span><li data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">Kiwifruits planted in well-drained soil have few pest and disease problems.</span></li><span data-dcnode-id="3651" instrument_node="">
</span><li data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">Cats may like to roll in kiwifruit leaves or chew the vines; exclude cats with wire fencing.</span></li><span data-dcnode-id="3648" instrument_node="">
</span><li data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">Drought and irregular watering or too little sunshine may cause leaves to fall and result in underdeveloped fruit.</span></li><span data-dcnode-id="3645" instrument_node="">
</span></ul><span data-dcnode-id="3643" instrument_node="">
</span><h2 data-dcnode-id="3640"><strong data-dcnode-id="3641"><span data-dcnode-id="3642" instrument_node="">Fall and Winter Kiwifruit Care</span></strong></h2><span data-dcnode-id="3639" instrument_node="">
</span><ul data-dcnode-id="3631"><span data-dcnode-id="3638" instrument_node="">
</span><li data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">Prune the vines every winter when they are dormant; remove about a third of the limbs growing from the permanent arms; remove limbs that have already fruited three years; remove damaged vines or twisted and tangled vines.</span></li><span data-dcnode-id="3635" instrument_node="">
</span><li data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">Protect trunks from winter cold by wrapping them in burlap.</span></li><span data-dcnode-id="3632" instrument_node="">
</span></ul><span data-dcnode-id="3630" instrument_node="">
</span><h2 data-dcnode-id="3627"><strong data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">Propagating Kiwifruit</span></strong></h2><span data-dcnode-id="3626" instrument_node="">
</span><ul data-dcnode-id="3615"><span data-dcnode-id="3625" instrument_node="">
</span><li data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">The easiest way to propagate kiwifruit is by softwood cutting; take a 4 to 6 inch cutting of a new shoot; dip it in rooting hormone and set it in organic potting mix; cutting commonly root in 2 to 4 weeks.</span></li><span data-dcnode-id="3622" instrument_node="">
</span><li data-dcnode-id="3620"><span data-dcnode-id="3621" instrument_node="">Kiwifruit seeds germinate readily after stratification—place seeds in the refrigerator for 3 weeks before sowing. The resulting plants will be either male or female.</span></li><span data-dcnode-id="3619" instrument_node="">
</span><li data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">Kiwifruit can be propagated by grafting; use a dormant scion and join it to the rootstock in midwinter; use whip-and-tongue or cleft graft.</span></li><span data-dcnode-id="3616" instrument_node="">
</span></ul><span data-dcnode-id="3614" instrument_node="">
</span><h2 data-dcnode-id="3611"><strong data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">Kiwifruit Varieties to Grow</span></strong></h2><span data-dcnode-id="3610" instrument_node="">
</span><ul data-dcnode-id="3590"><span data-dcnode-id="3609" instrument_node="">
</span><li data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">Self-fertile cultivars: ‘Issai’, ‘Blake’.</span></li><span data-dcnode-id="3606" instrument_node="">
</span><li data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">Cultivars with low chilling requirements: ‘Monty’, ‘Vincent’, ‘Abbot’, ‘Allison’.</span></li><span data-dcnode-id="3603" instrument_node="">
</span><li data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">Female non-self-fertile cultivars: ‘Hayward’, ‘Bruno’.</span></li><span data-dcnode-id="3600" instrument_node="">
</span><li data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">Male cultivar: ‘’Tomuri’</span></li><span data-dcnode-id="3597" instrument_node="">
</span><li data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">Heavy crop producers: ‘Bruno’, ‘Abbot’.</span></li><span data-dcnode-id="3594" instrument_node="">
</span><li data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">Produce fruit that can be eaten whole, including skin, like grapes: ‘Issai’, ‘Ananasnaya’.</span></li><span data-dcnode-id="3591" instrument_node="">
</span></ul><span data-dcnode-id="3589" instrument_node="">
</span><p data-dcnode-id="3586"><strong data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Also of interest:</span></strong></p><span data-dcnode-id="3585" instrument_node="">

</span><p data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">Thankyou for your interesting page.  It seems I’ve done everything wrong, lol, but this is year number three and I have a bumper crop of fruit.  I have two females to one male, no idea on the names,  planted over a 15 foot area, and that was just a lucky shot.  I did know they are strong climbers so I planted with pine poles on each of two sides, then added steel rio to form a cross ladder for the vines to grow over. They are protected from the wind by two water tanks.  I did a quick count yesterday…….over 200 fruit.  I had no clue when to pick hence my google search to your page.  I have two  other  places I am thinking of doing it again and Thankyou for the advice on cuttings.  I’ll give it a go.</span></p><span data-dcnode-id="3233" instrument_node="">
