amp; Prune Mandevilla Flowers</span></span></span></span></span></span></span></span></div><div data-dcnode-id="338" id="top_image"><img alt="Beautiful colorful flower, Mandevilla laxa, Chilean jasmine, close-up." class="attachment-full size-full wp-post-image error" data-dcnode-id="341" data-lazy-src="https://cdn.shortpixel.ai/client/to_webp,q_glossy,ret_img,w_940,h_531/https://trulyexperiences.com/blog/wp-content/uploads/2021/01/multi-colored-mandevilla-scaled-e1611948029699.jpeg" data-ll-status="error" decoding="async" height="531" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/client/to_webp%2Cq_glossy%2Cret_img%2Cw_940%2Ch_531/https%3A//trulyexperiences.com/blog/wp-content/uploads/2021/01/multi-colored-mandevilla-scaled-e1611948029699.jpeg&amp;raw" width="940"><noscript data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">&lt;img width="940" height="531" src="https://trulyexperiences.com/blog/wp-content/uploads/2021/01/multi-colored-mandevilla-scaled-e1611948029699.jpeg" class="attachment-full size-full wp-post-image" alt="Beautiful colorful flower, Mandevilla laxa, Chilean jasmine, close-up." /&gt;</span></noscript></div><article aria-label="Mandevilla Plant Care: How to Grow &amp; Prune Mandevilla Flowers" class="post-1006392 post type-post status-publish format-standard has-post-thumbnail category-flowers mv-content-wrapper entry" data-dcnode-id="93"><header class="entry-header" data-dcnode-id="328"><h1 class="entry-title" data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Mandevilla Plant Care: How to Grow &amp; Prune Mandevilla Flowers</span></h1><p class="entry-meta" data-dcnode-id="329"><span class="entry-author" data-dcnode-id="333"><span class="entry-author-name" data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Rae Oliver</span></span></span><span data-dcnode-id="332" instrument_node=""> </span><time class="entry-modified-time" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">January 18, 2022</span></time></p></header><div class="entry-content" data-dcnode-id="95"><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">If you’re keen to add a unique element to your garden or are simply looking for an easy plant to grow, the mandevilla plant should be on your list.</span></p><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">With a ton of colour options and climbing and non-climbing varieties available, mandevilla are diverse and divine!</span></p><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">The Mandevilla is a perennial plant that is easy to care for and with proper care, can flower through the season. Here’s everything you need to know!</span></p><div class="no_bullets" data-dcnode-id="257" id="toc_container"><p class="toc_title" data-dcnode-id="314"><span data-dcnode-id="321" instrument_node="">Jump To a Section Below</span><span data-dcnode-id="320" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="315"><span data-dcnode-id="319" instrument_node="">[</span><a data-dcnode-id="317" href="#"><span data-dcnode-id="318" instrument_node="">hide</span></a><span data-dcnode-id="316" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="258"><li data-dcnode-id="311"><a data-dcnode-id="312" href="#What-is-Mandevilla"><span data-dcnode-id="313" instrument_node="">What is Mandevilla</span></a></li><li data-dcnode-id="301"><a data-dcnode-id="309" href="#How-to-Grow-Mandevilla"><span data-dcnode-id="310" instrument_node="">How to Grow Mandevilla</span></a><ul data-dcnode-id="302"><li data-dcnode-id="306"><a data-dcnode-id="307" href="#When-to-Plant-Mandevilla"><span data-dcnode-id="308" instrument_node="">When to Plant Mandevilla</span></a></li><li data-dcnode-id="303"><a data-dcnode-id="304" href="#How-to-Plant-Mandevilla"><span data-dcnode-id="305" instrument_node="">How to Plant Mandevilla</span></a></li></ul></li>< grow-Mandevilla-plants-from-cuttings"><span data-dcnode-id="267" instrument_node="">Can you grow Mandevilla plants from cuttings?</span></a></li><li data-dcnode-id="262"><a data-dcnode-id="263" href="#Is-Epsom-salt-good-for-Mandevilla-plants"><span data-dcnode-id="264" instrument_node="">Is Epsom salt good for Mandevilla plants?</span></a></li><li data-dcnode-id="259"><a data-dcnode-id="260" href="#Do-hummingbirds-like-Mandevilla"><span data-dcnode-id="261" instrument_node="">Do hummingbirds like Mandevilla?</span></a></li></ul></div><h2 data-dcnode-id="254"><span data-dcnode-id="255" id="What-is-Mandevilla"><span data-dcnode-id="256" instrument_node="">What is Mandevilla</span></span></h2><p data-dcnode-id="250"><img alt="Red mandevilla in pot at blurred background" class="aligncenter wp-image-1006418 size-medium_large lazyloaded" data-dcnode-id="253" data-ll-status="loaded" decoding="async" height="512" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/client/to_webp%2Cq_glossy%2Cret_img%2Cw_768%2Ch_512/https%3A//trulyexperiences.com/blog/wp-content/uploads/2021/01/red-mandevilla-768x512.jpeg&amp;raw" srcset="https://cdn.shortpixel.ai/client/to_webp,q_glossy,ret_img,w_768/https://trulyexperiences.com/blog/wp-content/uploads/2021/01/red-mandevilla-768x512.jpeg 768w, https://cdn.shortpixel.ai/client/to_webp,q_glossy,ret_img,w_420/https://trulyexperiences.com/blog/wp-content/uploads/2021/01/red-mandevilla-420x280.jpeg 420w, https://cdn.shortpixel.ai/client/to_webp,q_glossy,ret_img,w_842/https://trulyexperiences.com/blog/wp-content/uploads/2021/01/red-mandevilla-842x561.jpeg 842w, https://cdn.shortpixel.ai/client/to_webp,q_glossy,ret_img,w_1536/https://trulyexperiences.com/blog/wp-content/uploads/2021/01/red-mandevilla-1536x1024.jpeg 1536w, https://cdn.shortpixel.ai/client/to_webp,q_glossy,ret_img,w_2048/https://trulyexperiences.com/blog/wp-content/uploads/2021/01/red-mandevilla-2048x1365.jpeg 2048w" width="768"><noscript data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">&lt;img class="aligncenter wp-image-1006418 size-medium_large" src="https://trulyexperiences.com/blog/wp-content/uploads/2021/01/red-mandevilla-768x512.jpeg" alt="Red mandevilla in pot at blurred background" width="768" height="512" srcset="https://trulyexperiences.com/blog/wp-content/uploads/2021/01/red-mandevilla-768x512.jpeg 768w, https://trulyexperiences.com/blog/wp-content/uploads/2021/01/red-mandevilla-420x280.jpeg 420w, https://trulyexperiences.com/blog/wp-content/uploads/2021/01/red-mandevilla-842x561.jpeg 842w, https://trulyexperiences.com/blog/wp-content/uploads/2021/01/red-mandevilla-1536x1024.jpeg 1536w, https://trulyexperiences.com/blog/wp-content/uploads/2021/01/red-mandevilla-2048x1365.jpeg 2048w" sizes="(max-width: 768px) 100vw, 768px" /&gt;</span></noscript></p><p data-dcnode-id="239"><span data-dcnode-id="249" instrument_node="">The mandevilla, also known as </span><em data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">rocktrumpet</span></em><span data-dcnode-id="246" instrument_node="">, is a tropical plant belonging to the Apocynaceae family. While they are fairly new to the gardening scene, mandevilla flowers are popular and come in a range of colours including </span><a data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trulyexperiences.com/blog/pink-flowers/"><span data-dcnode-id="245" instrument_node="">pink</span></a><span data-dcnode-id="243" instrument_node="">, </span><a data-dcnode-id="241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trulyexperiences.com/blog/white-flowers/"><span data-dcnode-id="242" instrument_node="">white</span></a><span data-dcnode-id="240" instrument_node=""> and red.</span></p><h2 data-dcnode-id="236"><span data-dcnode-id="237" id="How-to-Grow-Mandevilla"><span data-dcnode-id="238" instrument_node="">How to Grow Mandevilla</span></span></h2><h3 data-dcnode-id="233"><span data-dcnode-id="234" id="When-to-Plant-Mandevilla"><span data-dcnode-id="235" instrument_node="">When to Plant Mandevilla</span></span></h3><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">You’ll find mandevilla vines in pots at local nurseries and garden centres. Wait for warmer weather before planting the flower outdoors, as it doesn’t like to grow in cold conditions. Look for a sunny location that offers protection from the wind and grow the plant there.</span></p><p data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">The plant prefers warmer climates where they can grow up to 6 metres tall. In colder climates, mandevilla plants will only grow to around 1.5 metres in length.</span></p><div data-dcnode-id="221" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="u5c592927592049b17b36e9b7be484405" data-dcnode-id="222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trulyexperiences.com/blog/growing-phlox/" rel="dofollow" target="_self"><div data-dcnode-id="223" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Also see</span></span><span data-dcnode-id="226" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Growing Phlox: When, Where And How To Plant Phlox Flowers</span></span></div></a></div><h3 data-dcnode-id="218"><span data-dcnode-id="219" id="How-to-Plant-Mandevilla"><span data-dcnode-id="220" instrument_node="">How to Plant Mandevilla</span></span></h3><p data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">If the mandevilla plant is grown in a container or hanging basket, limit crowding by ensuring there’s only one plant per 35-centimetres. This allows for optimal growth.</span></p><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">The soil needs to be rich in nutrients and well-watered to ensure proper mandevilla vine growth and blooming. They’ll grow pretty fast in warm conditions, so keep an eye on the soil to ensure it doesn’t dry out. Additionally, add organic plant food and fertiliser to the soil every two weeks.</span></p><h2 data-dcnode-id="211"><span data-dcnode-id="212" id="How-to-Care-for-Mandevilla"><span data-dcnode-id="213" instrument_node="">How to Care for Mandevilla</span></span></h2><p data-dcnode-id="207"><img alt="Sydney Australia, pink flowering mandevilla vine growing on metal fence" class="aligncenter size-medium_large wp-image-1006419 lazyloaded" data-dcnode-id="210" data-ll-status="loaded" decoding="async" height="512" sizes="(max-width: 768px) 100vw, 768px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/client/to_webp%2Cq_glossy%2Cret_img%2Cw_768%2Ch_512/https%3A//trulyexperiences.com/blog/wp-content/uploads/2021/01/pink-mandevilla-768x512.jpeg&amp;raw" srcset="https://cdn.shortpixel.ai/client/to_webp,q_glossy,ret_img,w_768/https://trulyexperiences.com/blog/wp-content/uploads/2021/01/pink-mandevilla-768x512.jpeg 768w, https://cdn.shortpixel.ai/client/to_webp,q_glossy,ret_img,w_420/https://trulyexperiences.com/blog/wp-content/uploads/2021/01/pink-mandevilla-420x280.jpeg 420w, https://cdn.shortpixel.ai/client/to_webp,q_glossy,ret_img,w_842/https://trulyexperiences.com/blog/wp-content/uploads/2021/01/pink-mandevilla-842x561.jpeg 842w, https://cdn.shortpixel.ai/client/to_webp,q_glossy,ret_img,w_1536/https://trulyexperiences.com/blog/wp-content/uploads/2021/01/pink-mandevilla-1536x1024.jpeg 1536w, https://cdn.shortpixel.ai/client/to_webp,q_glossy,ret_img,w_2048/https://trulyexperiences.com/blog/wp-content/uploads/2021/01/pink-mandevilla-2048x1365.jpeg 2048w" width="768"><noscript data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">&lt;img class="aligncenter size-medium_large wp-image-1006419" src="https://trulyexperiences.com/blog/wp-content/uploads/2021/01/pink-mandevilla-768x512.jpeg" alt="Sydney Australia, pink flowering mandevilla vine growing on metal fence" width="768" height="512" srcset="https://trulyexperiences.com/blog/wp-content/uploads/2021/01/pink-mandevilla-768x512.jpeg 768w, https://trulyexperiences.com/blog/wp-content/uploads/2021/01/pink-mandevilla-420x280.jpeg 420w, https://trulyexperiences.com/blog/wp-content/uploads/2021/01/pink-mandevilla-842x561.jpeg 842w, https://trulyexperiences.com/blog/wp-content/uploads/2021/01/pink-mandevilla-1536x1024.jpeg 1536w, https://trulyexperiences.com/blog/wp-content/uploads/2021/01/pink-mandevilla-2048x1365.jpeg 2048w" sizes="(max-width: 768px) 100vw, 768px" /&gt;</span></noscript></p><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Mandevilla thrives in the heat. But careful attention needs to be paid to the soil to prevent it from drying out and inevitably killing the plant.</span></p><p data-dcnode-id="197"><span data-dcnode-id="204" instrument_node="">To protect mandevilla from the frost in </span><a data-dcnode-id="202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trulyexperiences.com/blog/things-to-do/whats-on/autumn/"><span data-dcnode-id="203" instrument_node="">autumn</span></a><span data-dcnode-id="201" instrument_node=""> and </span><a data-dcnode-id="199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trulyexperiences.com/blog/things-to-do/whats-on/winter/"><span data-dcnode-id="200" instrument_node="">winter</span></a><span data-dcnode-id="198" instrument_node="">, you can cover them with a sheet. This will help to keep the plant and soil warm.</span></p><p data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">You can “train” your plants to grow upwards using string or wire that leads to your fence, trellises, or pillars. To ensure that the plant survives the winter, cut it down before the first frost and bring it indoors.</span></p><p data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">While indoors, mandevilla care is important. The plant needs to remain slightly moist and protected from pests such as flies, aphids, scale, and other insects. Once the cold period is over, you can move them back outside.</span></p><h2 data-dcnode-id="190"><span data-dcnode-id="191" id="How-to-Propagate-Mandevilla"><span data-dcnode-id="192" instrument_node="">How to Propagate Mandevilla</span></span></h2><p data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">The mandevilla plant can be propagated using two main techniques, namely cuttings and planting seeds.</span></p><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Cultivating mandevilla from seed is simple. Growth is most often achieved using fresh seeds extracted from dried out pods. It’s recommended that you soak the dandelion-like seeds in water for 12 hours before planting.</span></p><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Plant the seeds in a shallow hole in well-draining soil. The soil needs to remain moist and warm during this time. They should germinate within a month.</span></p><div data-dcnode-id="176" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="ue7896337de5cd0b329f287e86020cdba" data-dcnode-id="177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trulyexperiences.com/blog/varieties-of-allium/" rel="dofollow" target="_self"><div data-dcnode-id="178" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Also see</span></span><span data-dcnode-id="181" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">20 Varieties of Allium Flowers to Grow in Your Garden</span></span></div></a></div><p data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">Propagating mandevilla from cuttings is a fairly easy process too. Take cuttings during the spring for best results. When selecting a piece to cut, ensure it’s either a side shoot or tip around 7.5 centimetres long. Keep the top two leaves and remove the rest. Place the cuttings in a mix of sand and peat, placing it in a warm, humid, shady, and moist area. Once the roots have developed you can place the plant in its official spot.</span></p><h2 data-dcnode-id="171"><span data-dcnode-id="172" id="How-to-Overwinter-Mandevilla"><span data-dcnode-id="173" instrument_node="">How to Overwinter Mandevilla</span></span></h2><p data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Mandevilla care in winter is essential. Bring your mandevilla plant inside once the temperature has dropped to 15 °C. During this time, you’ll need to grow it like a house plant. The plant needs to be trimmed regularly and kept in the sunlight. Ensure the soil is moist and avoid overwatering the plant. It will not bloom during this time.</span></p><p data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">If you don’t have the space or a sunny spot to keep your mandevilla, you can bring it inside and store it in its dormant state. To encourage dormancy, drench the soil with water to rinse out any pests and then cut it down to 25 centimetres.</span></p><p data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">Keep the plant in a room where the temperature averages 15 °C and receives sunlight during the day. Water the soil enough to keep it from going dry and once the springtime comes and the plant breaks dormancy, you can move it back to its original spot and follow your regular care routine.</span></p><h2 data-dcnode-id="162"><span data-dcnode-id="163" id="Mounding-Mandevilla"><span data-dcnode-id="164" instrument_node="">Mounding Mandevilla</span></span></h2><p data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">As pretty as these plants may be, not everyone has space to grow a mandevilla vine along their wall or in their garden. This is where mounding mandevilla comes in. This type of mandevilla plant grows in such a way as to grow both vertically and horizontally, creating a rounded mound-like appearance so as to take up little space. They don’t need support as they don’t grow upwards and only reach a height of 45 centimetres.</span></p><div data-dcnode-id="152" style="clear:both; margin-top:0em; margin-bottom:1em;"><a class="ucd234854c256cc28c29694b4fc40a46f" data-dcnode-id="153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trulyexperiences.com/blog/growing-asters/" rel="dofollow" target="_self"><div data-dcnode-id="154" style="padding-left:1em; padding-right:1em;"><span class="ctaText" data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">Also see</span></span><span data-dcnode-id="157" instrument_node="">&nbsp; </span><span class="postTitle" data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">Growing Aster: Where, When &amp; How to Plant Pretty Aster Flowers</span></span></div></a></div><h2 data-dcnode-id="149"><span data-dcnode-id="150" id="Do-Mandevilla-come-back-every-year"><span data-dcnode-id="151" instrument_node="">Do Mandevilla come back every year?</span></span></h2><p data-dcnode-id="144"><span data-dcnode-id="148" instrument_node="">Yes. Although many people consider this plant to be an annual, it’s a perennial and typically blooms in the late </span><a data-dcnode-id="146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//trulyexperiences.com/blog/things-to-do/whats-on/summer/"><span data-dcnode-id="147" instrument_node="">summer</span></a><span data-dcnode-id="145" instrument_node="">.</span></p><h2 data-dcnode-id="141"><span data-dcnode-id="142" id="Can-Mandevilla-survive-winter"><span data-dcnode-id="143" instrument_node="">Can Mandevilla survive winter?</span></span></h2><p data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">Mandevilla can survive the winter but only if it’s brought inside. It cannot withstand cold temperatures.</span></p><h2 data-dcnode-id="136"><span data-dcnode-id="137" id="Can-Mandevilla-take-full-sun"><span data-dcnode-id="138" instrument_node="">Can Mandevilla take full sun?</span></span></h2><p data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">Yes, this is the ideal growing condition for mandevilla plants and will result in impressive blooming.</span></p><h2 data-dcnode-id="131"><span data-dcnode-id="132" id="Do-all-Mandevilla-plants-climb"><span data-dcnode-id="133" instrument_node="">Do all Mandevilla plants climb?</span></span></h2><p data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">Most mandevilla plants do climb. However, the mounded variety does not and was created to be more of a bush than a vine.</span></p><h2 data-dcnode-id="126"><span data-dcnode-id="127" id="Can-Mandevilla-grow-in-pots"><span data-dcnode-id="128" instrument_node="">Can Mandevilla grow in pots?</span></span></h2><p data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">Yes, the mandevilla is best grown in containers and hanging baskets.</span></p><h2 data-dcnode-id="121"><span data-dcnode-id="122" id="Do-you-deadhead-Mandevilla"><span data-dcnode-id="123" instrument_node="">Do you deadhead Mandevilla?</span></span></h2><p data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">No, deadheading is not necessary for mandevilla care as the plant will continue to bloom and grow regardless.</span></p><h2 data-dcnode-id="116"><span data-dcnode-id="117" id="Is-Mandevilla-poisonous-to-dogs"><span data-dcnode-id="118" instrument_node="">Is Mandevilla poisonous to dogs?</span></span></h2><p data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">Yes, the plant is poisonous if ingested.</span></p><h2 data-dcnode-id="111"><span data-dcnode-id="112" id="Can-you-grow-Mandevilla-plants-from-cuttings"><span data-dcnode-id="113" instrument_node="">Can you grow Mandevilla plants from cuttings?</span></span></h2><p data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">Yes, the mandevilla plant can be propagated using cuttings.</span></p><h2 data-dcnode-id="106"><span data-dcnode-id="107" id="Is-Epsom-salt-good-for-Mandevilla-plants"><span data-dcnode-id="108" instrument_node="">Is Epsom salt good for Mandevilla plants?</span></span></h2><p data-dcnode-id="101"><span data-dcnode-id="105" instrument_node="">Yes, Epsom salts can </span><a data-dcnode-id="103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeningknowhow.com/garden-how-to/soil-fertilizers/epsom-salt-gardening.htm" rel="noopener" target="_blank"><span data-dcnode-id="104" instrument_node="">increase the magnesium content in the soil</span></a><span data-dcnode-id="102" instrument_node=""> to promote flowering. If your plant is battling to bloom, dissolve 5mg of Epsom salts in water. Then, water your plant every second week.</span></p><h2 data-dcnode-id="98"><span data-dcnode-id="99" id="Do-hummingbirds-like-Mandevilla"><span data-dcnode-id="100" instrument_node="">Do hummingbirds like Mandevilla?</span></span></h2><p data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">Yes, the beautiful blossoms attract hummingbirds as well as butterflies.</span></p></div><footer class="entry-footer" data-dcnode-id="94"></footer></article></main></div></div><div class="footer-widgets" data-dcnode-id="59" id="genesis-footer-widgets"><h2 class="genesis-sidebar-title screen-reader-text" data-dcnode-id="88"><span data-dcnode-id="89" instrument_node="">Footer</span></h2><div class="wrap" data-dcnode-id="60"><div class="widget-area footer-widgets-1 footer-widget-area" data-dcnode-id="61"><section class="widget widget_nav_menu" data-dcnode-id="62" id="nav_menu-4"><div class="widget-wrap" data-dcnode-id="63"><div class="menu-footer-container" data-dcnode-id="71"><ul class="menu"
