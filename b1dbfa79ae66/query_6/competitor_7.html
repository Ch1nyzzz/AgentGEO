><span data-dcnode-id="2653" instrument_node="">
</span><div class="plant-vor-dem-inhalt_2" data-dcnode-id="2648" id="plant-563839389"><ins class="adsbygoogle plantop_com_mobile_start" data-ad-client="ca-pub-4694423553648653" data-ad-slot="2512237020" data-dcnode-id="2652" style="display:inline-block;width:300px;height:250px"></ins><span data-dcnode-id="2651" instrument_node="">
</span></div><p data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Mandevilla was originally a lianaceous plant and is cultivated today as a hanging climbing plant or semi-creeper. This exotic-looking nonstop bloomer is frost-sensitive and therefore is predominantly kept as indoor plant. These plants are amazing blossoms. Their bright flowers shine in different colors and shades and form a conspicuous contrast to the green foliage. Plant lovers also appreciate the uncomplicated care of this extraordinary plant.</span></p><span data-dcnode-id="2645" instrument_node="">

</span><li data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">Flowering period from May to October</span></li><span data-dcnode-id="2578" instrument_node="">
</span><li data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">Flowers: funnel-shaped, 5 – 10 cm</span></li><span data-dcnode-id="2575" instrument_node="">
</span><li data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Flower colors: white, pink, red, rare yellow, partly with yellow throat</span></li><span data-dcnode-id="2572" instrument_node="">
</span><li data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">Leaves: oval, rich green, shiny</span></li><span data-dcnode-id="2569" instrument_node="">
</span><li data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Use: leaf and flower decoration plant</span></li><span data-dcnode-id="2566" instrument_node="">
</span></ul><span data-dcnode-id="2564" instrument_node="">
</span><p data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">Typical for the more than one hundred species of Mandevilla is its hanging growth, some varieties are also growing upright or lying down. Their vines can reach a length or height of up to 5 m. In addition to the green foliage, the highest ornamental value is the large funnel-shaped flowers.</span></p><span data-dcnode-id="2561" instrument_node="">
</span><p data-dcnode-id="2556"><a data-dcnode-id="2557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21.jpg"><img alt="Dipladenia in the garden patch" class="alignnone size-full wp-image-1614 lazyloaded" data-dcnode-id="2560" data-ll-status="loaded" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21.jpg&amp;raw" srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21-630x420.jpg 630w" width="1200"><noscript data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">&lt;img class="alignnone size-full wp-image-1614" src="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21.jpg" alt="Dipladenia in the garden patch" width="1200" height="800" srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n21-630x420.jpg 630w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></a></p><span data-dcnode-id="2555" instrument_node="">
</span><p data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">During the flowering period they show enormous persistence. From May to October the white, pink or red flowers reveal their whole splendor. The potted plant is ideal for decorating living rooms, but also balconies and terraces.</span></p><span data-dcnode-id="2552" instrument_node="">
</span><h2 data-dcnode-id="2549"><span data-dcnode-id="2550" id="care"><span data-dcnode-id="2551" instrument_node="">Care</span></span></h2><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Even if this nonstop bloomer is not quite easy to care for, its blooming splendor compensates for so much trouble. Although it does not impose any great demands, the right location and the optimal care prerequisite for a prosperous flowering. But you should consider some basic things.</span></p><span data-dcnode-id="2545" instrument_node="">
</span><h3 data-dcnode-id="2542"><span data-dcnode-id="2543" id="location"><span data-dcnode-id="2544" instrument_node="">Location</span></span></h3><span data-dcnode-id="2541" instrument_node="">
</span><p data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">The site should be as warm as possible, sunny and protected from rain and wind. A good ventilation is also important, so that the air around the plant does not accumulate. This applies to a cultivation on the balcony as well as in the apartment. Avoid direct sunlight in the summer and, if necessary, shade the site.</span></p><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2533"><a data-dcnode-id="2534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8.jpg"><img alt="Dipladenia with pink flower" class="alignnone size-full wp-image-1615 lazyloaded" data-dcnode-id="2537" data-ll-status="loaded" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8.jpg&amp;raw" srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8-630x420.jpg 630w" width="1200"><noscript data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">&lt;img class="alignnone size-full wp-image-1615" src="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8.jpg" alt="Dipladenia with pink flower" width="1200" height="800" srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n8-630x420.jpg 630w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></a></p><span data-dcnode-id="2532" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Sun in the morning, in the afternoon and in the evening encourages the flowering. In the apartment a place protected from draft and in front of a window facing east or west is recommended. Normal residential temperatures are sufficient during the main growth phase.</span></p><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2526"><strong data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Ground</span></strong></p><span data-dcnode-id="2525" instrument_node="">
</span><p data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Mandevilla needs fresh, permeable and nutritious substrate. It should be loose and humus. This can be conventional soil for balcony plants or a commercially available compost-based potting soil, which is mixed with sand or fine gravel. Particularly good is a mixture of peat gull, clay, some coarse sand and leaf mould. The substrate may be neutral, slightly acidic or slightly calcareous, with a pH of between 6.0 and 6.5.</span></p><div class="plant-mitte-mobile" data-dcnode-id="2518" id="plant-1976957956"><ins class="adsbygoogle plantop_com_mobile_mitte" data-ad-client="ca-pub-4694423553648653" data-ad-slot="8919041230" data-dcnode-id="2522" style="display:inline-block;width:300px;height:250px"></ins><span data-dcnode-id="2521" instrument_node="">
</span></div><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2514"><strong data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">Planting</span></strong></p><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">A planting in the garden bed is not recommended, because Mandevilla is not resistant to wintry cold. A planting in bucket or balcony boxes is more sensible and usually customary. In the summer, however, it can be kept outdoors, where it can remain during autumn as long as it is free of frost. When selecting the planter, it should be noted that this plant grows relatively fast and forms long tendrils.</span></p><span data-dcnode-id="2510" instrument_node="">
</span><ul data-dcnode-id="2484"><span data-dcnode-id="2509" instrument_node="">
</span><li data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">the planter should not be too small and have draw-off holes</span></li><span data-dcnode-id="2506" instrument_node="">
</span><li data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">a&nbsp;corresponding drainage can drain excess water or rainwater</span></li><span data-dcnode-id="2503" instrument_node="">
</span><li data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">coarse gravel and clay shards are suitable as drainage material</span></li><span data-dcnode-id="2500" instrument_node="">
</span><li data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">the drainage forms the lowest layer</span></li><span data-dcnode-id="2497" instrument_node="">
</span><li data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">a&nbsp;little fleece to separate the gravel and the substrate from each other</span></li><span data-dcnode-id="2494" instrument_node="">
</span><li data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">the substrate is applied on the fleece</span></li><span data-dcnode-id="2491" instrument_node="">
</span><li data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">then plant the Mandevilla, fill the pot with soil and water it</span></li><span data-dcnode-id="2488" instrument_node="">
</span><li data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">do not forget a climbing aid in case of climbing variants</span></li><span data-dcnode-id="2485" instrument_node="">
</span></ul><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2478"><a data-dcnode-id="2479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3.jpg"><img alt="Dipladenia - all plant parts are toxic" class="alignnone size-full wp-image-1617 lazyloaded" data-dcnode-id="2482" data-ll-status="loaded" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3.jpg&amp;raw" srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3-630x420.jpg 630w" width="1200"><noscript data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">&lt;img class="alignnone size-full wp-image-1617" src="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3.jpg" alt="Dipladenia - all plant parts are toxic" width="1200" height="800" srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n3-630x420.jpg 630w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></a></p><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2474"><strong data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Repotting</span></strong></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">If the pot or bucket is strongly rooted, Mandevilla should be replanted – typically every two years and ideally in spring. For repotting choose a pot that is just slightly larger than the old one. A bucket which is too large causes the plant to concentrate mainly on the formation of new roots, which has a detrimental effect on flowering. Before the plant is replanted, remove dried, rotten and diseased root or plant parts.</span></p><span data-dcnode-id="2470" instrument_node="">
</span><h3 data-dcnode-id="2467"><span data-dcnode-id="2468" id="watering"><span data-dcnode-id="2469" instrument_node="">Watering</span></span></h3><span data-dcnode-id="2466" instrument_node="">
</span><p data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">In the growth and flowering phase this climbing plant needs sufficient water. Usually it is watered moderately and not too much. A water supply every 8-10 days is quite sufficient, in summer it should be more frequently. Mandevilla does not like waterlogged soil. As a result, water should be removed regularly.</span></p><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">However, the substrate must not dry out. Ideally one should give the substrate layer time to dry before each watering. Not less important is a sufficient humidity, which is achieved by frequent spraying.</span></p><span data-dcnode-id="2460" instrument_node="">
</span><p data-dcnode-id="2455"><a data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14.jpg"><img alt="Dipladenia with white blossoms" class="alignnone size-full wp-image-1618 lazyloaded" data-dcnode-id="2459" data-ll-status="loaded" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14.jpg&amp;raw" srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14-630x420.jpg 630w" width="1200"><noscript data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">&lt;img class="alignnone size-full wp-image-1618" src="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14.jpg" alt="Dipladenia with white blossoms" width="1200" height="800" srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n14-630x420.jpg 630w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></a></p><span data-dcnode-id="2454" instrument_node="">
</span><h3 data-dcnode-id="2451"><span data-dcnode-id="2452" id="fertilizing"><span data-dcnode-id="2453" instrument_node="">Fertilizing</span></span></h3><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">The nutrient requirement of this perennial flower is relatively high, especially during flowering. In order to meet this demand, from April a moderately concentrated, organic liquid fertilizer for flowering plants can be administered every 1-2 weeks via watering. The dosage should be adhered to the manufacturer’s instructions. Fertilization should be discontinued from August, because Mandevilla enters a kind of resting phase.</span></p><span data-dcnode-id="2447" instrument_node="">
</span><h3 data-dcnode-id="2444"><span data-dcnode-id="2445" id="cutting"><span data-dcnode-id="2446" instrument_node="">Cutting</span></span></h3><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2442" instrument_node="">A yearly cut is useful for a strong growth and lush blossom. Like most summer blooms</span><span data-dcnode-id="2440" style="text-decoration: line-through"><span data-dcnode-id="2441" instrument_node="">,</span></span><span data-dcnode-id="2439" instrument_node=""> the Mandevilla also blooms at the young shoots, which requires a regular cut. This plant is very cut tolerable, so it is easily viable. If one renounces this, Mandevilla quickly develops a delay in flowering. For the retreat, you should choose a dry day and, what is particularly important, wear gloves. In addition, the garden shears should be as sharp as possible.</span></p><div class="plant-adsense_planto_mobile_p2" data-dcnode-id="2433" id="plant-968170476"><ins class="adsbygoogle plantop_com_mobile_start" data-ad-client="ca-pub-4694423553648653" data-ad-slot="1052953996" data-dcnode-id="2437" style="display:inline-block;width:300px;height:300px"></ins><span data-dcnode-id="2436" instrument_node="">
</span></div><span data-dcnode-id="2432" instrument_node="">
</span><ul data-dcnode-id="2406"><span data-dcnode-id="2431" instrument_node="">
</span><li data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">the best time is early spring, from the beginning of February to March</span></li><span data-dcnode-id="2428" instrument_node="">
</span><li data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">the later the cut, the later the flower</span></li><span data-dcnode-id="2425" instrument_node="">
</span><li data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">to maintain the size, cut back all the flower shoots from the main drive</span></li><span data-dcnode-id="2422" instrument_node="">
</span><li data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">cut near the base</span></li><span data-dcnode-id="2419" instrument_node="">
</span><li data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">to rejuvenate, a radical cutback is also possible</span></li><span data-dcnode-id="2416" instrument_node="">
</span><li data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">cut back the half-shrubs to a third of their size</span></li><span data-dcnode-id="2413" instrument_node="">
</span><li data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">even a cut short above the ground is tolerated</span></li><span data-dcnode-id="2410" instrument_node="">
</span><li data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">it is also possible to cut back in autumn</span></li><span data-dcnode-id="2407" instrument_node="">
</span></ul><span data-dcnode-id="2405" instrument_node="">
</span><p data-dcnode-id="2402"><strong data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">Wintering</span></strong></p><span data-dcnode-id="2401" instrument_node="">
</span><p data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">If Mandevilla remains outside during summer, you should bring it into the house till September. Because of its frost sensitivity it should be moved to the winter quarters before the first freezes. Now, Mandevilla enters a resting phase, which is important.</span></p><span data-dcnode-id="2398" instrument_node="">
</span><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">Since the plant belongs to the evergreen plants, the wintering location must be light, free of air draft and at temperatures between 10 and 15 degrees C. It should not be warmer, because otherwise Mandevilla develops a delay of blooming.</span></p><span data-dcnode-id="2395" instrument_node="">
</span><p data-dcnode-id="2390"><a data-dcnode-id="2391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19.jpg"><img alt="Dipladenia is an extraordinary plant" class="alignnone size-full wp-image-1619" data-dcnode-id="2394" data-lazy-sizes="(max-width: 1200px) 100vw, 1200px" data-lazy-src="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19.jpg" data-lazy-srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19-630x420.jpg 630w" height="800" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201200%20800'%3E%3C/svg%3E" width="1200"><noscript data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">&lt;img class="alignnone size-full wp-image-1619" src="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19.jpg" alt="Dipladenia is an extraordinary plant" width="1200" height="800" srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n19-630x420.jpg 630w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></a></p><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">It should not be too dark, too. Otherwise it will form long, thin gems. The plants become more susceptible to pest infestation. During the hibernation only a little is poured and not fertilized. From February onwards it can return to a sunny and warmer place. It can be kept outside as soon as night frosts are not to be expected. Before this, a short hardening phase on a shaded area is recommended.</span></p><span data-dcnode-id="2386" instrument_node="">
</span><h2 data-dcnode-id="2383"><span data-dcnode-id="2384" id="propagating"><span data-dcnode-id="2385" instrument_node="">Propagating</span></span></h2><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Propagation is possible via cuttings, layers or sowing. It should be noted that the mother plant is mature and healthy. As a rule, in the case of the annual cutback, there are sufficient shoots which can be used as cuttings.</span></p><span data-dcnode-id="2379" instrument_node="">
</span><ul data-dcnode-id="2359"><span data-dcnode-id="2378" instrument_node="">
</span><li data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">in spring cut 10-15 cm long shoots below a leaf node</span></li><span data-dcnode-id="2375" instrument_node="">
</span><li data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">remove the leaves and buds from the lower part of the cuttings</span></li><span data-dcnode-id="2372" instrument_node="">
</span><li data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">put the shoot in rooting powder and then in cultivation soil</span></li><span data-dcnode-id="2369" instrument_node="">
</span><li data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">moisten the substrate and cover it with light-permeable film or use a greenhouse</span></li><span data-dcnode-id="2366" instrument_node="">
</span><li data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">then place the whole pot in a bright place at temperatures of about 25 degrees C.</span></li><span data-dcnode-id="2363" instrument_node="">
</span><li data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">ventilate every few days to avoid mold formation</span></li><span data-dcnode-id="2360" instrument_node="">
</span></ul><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2353"><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18.jpg"><img alt="Dipladenia comes from South and Central America" class="alignnone size-full wp-image-1620" data-dcnode-id="2357" data-lazy-sizes="(max-width: 1200px) 100vw, 1200px" data-lazy-src="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18.jpg" data-lazy-srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18-630x420.jpg 630w" height="800" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201200%20800'%3E%3C/svg%3E" width="1200"><noscript data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">&lt;img class="alignnone size-full wp-image-1620" src="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18.jpg" alt="Dipladenia comes from South and Central America" width="1200" height="800" srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n18-630x420.jpg 630w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></a></p><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2349"><strong data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">Layers</span></strong></p><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">For layering, a second planter with substrate is required. They are placed side by side. Carefully bend a ground-oriented drive down into the other pot. On a length of approx. 10 cm, the shoot is slightly scribed in the middle and covered with substrate.</span></p><span data-dcnode-id="2345" instrument_node="">
</span><p data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">The tip of the shoot has to protrude out of the ground. With a piece of wire or a not too big stone you can fix it in the ground. Now the earth must be kept evenly moist. If the shoot has formed roots after a few days, it can be separated from the mother plant.</span></p><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2339"><strong data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Seeds</span></strong></p><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">In the case of seed propagation, it should be borne in mind that the seeds, that are offered commercially, are mostly derived from hybrids. Consequently, the offspring usually has different properties. The best time for sowing is early spring. The seeds are sown in cultivation soil and easily covered with soil.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Then moisten the substrate, cover the surface with translucent material and place it on a bright place with temperatures of about 25 degrees C. If the seedlings are large enough, they can be isolated and further cultivated on a bright niche but should not be exposed to full sun. From June, the young plants can be placed outside.</span></p><span data-dcnode-id="2332" instrument_node="">
</span><h2 data-dcnode-id="2329"><span data-dcnode-id="2330" id="diseases"><span data-dcnode-id="2331" instrument_node="">Diseases</span></span></h2><span data-dcnode-id="2328" instrument_node="">
</span><p data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node="">If the ventilation is not optimal, a fungus attack may occur. The most dangerous treatment for the Mandevilla is waterlogging, which can lead to the death of the plant over a longer period of time. Occasionally, leaves may turn yellow. In winter, cold temperatures can be responsible for this. In summer, the yellowing of some leaves is normal and not a disease. Other diseases are not known.</span></p><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2320"><a data-dcnode-id="2321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20.jpg"><img alt="Dipladenia with funnel-shaped flowers" class="alignnone size-full wp-image-1621" data-dcnode-id="2324" data-lazy-sizes="(max-width: 1200px) 100vw, 1200px" data-lazy-src="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20.jpg" data-lazy-srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20-630x420.jpg 630w" height="800" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201200%20800'%3E%3C/svg%3E" width="1200"><noscript data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">&lt;img class="alignnone size-full wp-image-1621" src="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20.jpg" alt="Dipladenia with funnel-shaped flowers" width="1200" height="800" srcset="https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20.jpg 1200w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20-600x400.jpg 600w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20-768x512.jpg 768w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20-696x464.jpg 696w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20-1068x712.jpg 1068w, https://www.plantopedia.com/wp-content/uploads/2017/03/dipladenia-n20-630x420.jpg 630w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript></a></p><span data-dcnode-id="2319" instrument_node="">
</span><h2 data-dcnode-id="2316"><span data-dcnode-id="2317" id="pests"><span data-dcnode-id="2318" instrument_node="">Pests</span></span></h2><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2312"><strong data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">Aphids</span></strong></p><span data-dcnode-id="2311" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Pest infestation or plant diseases usually occur only at unfavorable locations or with faulty maintenance. This may lead to an attack with aphids, especially from early summer. If an infestation is ascertained, it can be removed by spraying with a powerful water jet or by brushing with a soap-alcohol solution.</span></p><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2305"><strong data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Scale insects and mealybugs</span></strong></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">In summer, scale insects and mealybugs appear, if it is not watered over a long period of time. If there is an infestation during winter, it is usually due to a too low humidity. They can be combated by the daily application of a solution of lubricating soap and alcohol or of olive oil. Ichneumon flies also can effectively combat these pests. If this is not enough, the specialist dealer offers suitable sprays or plant rods, which are simply put into the soil.</span></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2298"><strong data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">Spider mites</span></strong></p><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2296" instrument_node="">Spider mites can be recognized by their fine cocoons, and they like to infect the plants when it is too warm for the latter. Particularly effective in combating are so-called PP predatory mites (Phytoseiulus persimilis), which one can purchase in an outlet for beneficial insects. In addition to predatory mites, a soap-alcohol solution can also be used here</span><span data-dcnode-id="2294" style="text-decoration: line-through"><span data-dcnode-id="2295" instrument_node="">, </span></span><span data-dcnode-id="2293" instrument_node="">as well as appropriate spraying agents from the specialist trade.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><h2 data-dcnode-id="2288"><span data-dcnode-id="2289" id="varieties"><span data-dcnode-id="2290" instrument_node="">Varieties</span></span></h2><span data-dcnode-id="2287" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">The plant genus Mandevilla includes countless species and hybrids, but only a few of them are cultivated. About 120 species are known worldwide. When buying a Mandevilla, you can choose between upright or hanging varieties and different heights.</span></p><span data-dcnode-id="2284" instrument_node="">

</span></div><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">They range between 30 and 500 cm. The only feature that all varieties have in common is the shape of the flowers. Mandevilla sanderi, Mandevilla boliviensis, Mandevilla x amabilis and Mandevilla laxa are the four species that are most common.</span></p><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2111"><strong data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Mandevilla sanderi</span></strong></p><span data-dcnode-id="2110" instrument_node="">
</span><ul data-dcnode-id="2093"><span data-dcnode-id="2109" instrument_node="">
</span><li data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Mandevilla sanderi is the most famous and popular species</span></li><span data-dcnode-id="2106" instrument_node="">
</span><li data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">it has white, pink or red funnel-shaped flowers, with diameters of 4-7 cm</span></li><span data-dcnode-id="2103" instrument_node="">
</span><li data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">multiple flowers sit on one panicle</span></li><span data-dcnode-id="2100" instrument_node="">
</span><li data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">their densely arranged leaves are thick, smooth and rich green</span></li><span data-dcnode-id="2097" instrument_node="">
</span><li data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">this species can reach heights of 50 – 200 cm</span></li><span data-dcnode-id="2094" instrument_node="">
</span></ul><span data-dcnode-id="2092" instrument_node="">
</span><p data-dcnode-id="2089"><strong data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Mandevilla boliviensis</span></strong></p><span data-dcnode-id="2088" instrument_node="">
</span><ul data-dcnode-id="2074"><span data-dcnode-id="2087" instrument_node="">
</span><li data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">the semi-evergreen Mandevilla boliviensis is considered to be particularly rich flowering</span></li><span data-dcnode-id="2084" instrument_node="">
</span><li data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">the large white flowers have a bright yellow throat</span></li><span data-dcnode-id="2081" instrument_node="">
</span><li data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">their leaves are solid, shiny, all-round and smooth</span></li><span data-dcnode-id="2078" instrument_node="">
</span><li data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">this species forms between 50 and 200 cm long tendrils</span></li><span data-dcnode-id="2075" instrument_node="">
</span></ul><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2070"><strong data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Mandevilla x amabilis</span></strong></p><span data-dcnode-id="2069" instrument_node="">
</span><ul data-dcnode-id="2058"><span data-dcnode-id="2068" instrument_node="">
</span><li data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">the slightly fragrant pink flowers of these strong climbers belong to the largest among the Mandevilla species with a size of up to 10 cm – as well as their leaves</span></li><span data-dcnode-id="2065" instrument_node="">
</span><li data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">in addition, the leaves are dark green and strongly textured</span></li><span data-dcnode-id="2062" instrument_node="">
</span><li data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">the Mandevilla x amabilis can grow up to 500 cm</span></li><span data-dcnode-id="2059" instrument_node="">
</span></ul><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2054"><strong data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Mandevilla laxa</span></strong></p><span data-dcnode-id="2053" instrument_node="">
</span><ul data-dcnode-id="2039"><span data-dcnode-id="2052" instrument_node="">
</span><li data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">the last of these four species is Mandevilla laxa with its snow-white flowers</span></li><span data-dcnode-id="2049" instrument_node="">
</span><li data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">this fast-growing climber can grow about 500 cm in height</span></li><span data-dcnode-id="2046" instrument_node="">
</span><li data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">its highly fragrant, white or creamy flowers adorn the plant from July to September in dense grapes</span></li><span data-dcnode-id="2043" instrument_node="">
</span><li data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">the dark green leaves are long, elliptical and heart-shaped at the base</span></li><span data-dcnode-id="2040" instrument_node="">
</span></ul><span data-dcnode-id="2038" instrument_node="">
</span><span data-dcnode-id="2035" instrument_node="">
