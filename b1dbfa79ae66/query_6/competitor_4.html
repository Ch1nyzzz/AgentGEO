</span><p data-dcnode-id="4657"><span data-dcnode-id="4658" instrument_node="">Pears are excellent backyard trees. They produce a fruit sweeter and juicier than most apples; a fruit that easily ripens off the tree.</span></p><span data-dcnode-id="4656" instrument_node="">
</span><p data-dcnode-id="4654"><span data-dcnode-id="4655" instrument_node="">After careful selection and early training, pear trees will require generally less upkeep than other fruiting trees. They live longer than most apple trees and they require less pruning and thinning.</span></p><span data-dcnode-id="4653" instrument_node="">
</span><p data-dcnode-id="4651"><span data-dcnode-id="4652" instrument_node="">European pears have a classic pear shape and are soft, sweet, and juicy when ripe. Asian pears tend to be round and firm but still sweet.</span></p><span data-dcnode-id="4650" instrument_node="">
</span><p data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">There are pears for fresh eating out of hand and pears for cooking, usually poached.</span></p><span data-dcnode-id="4647" instrument_node="">
</span><div class="ez-toc-v2_0_19 counter-hierarchy counter-decimal ez-toc-light-blue" data-dcnode-id="4558" id="ez-toc-container"><span data-dcnode-id="4646" instrument_node="">

e" title="How to Train a Pear Tree"><span data-dcnode-id="4597" instrument_node="">How to Train a Pear Tree</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="4586"><li class="ez-toc-heading-level-3" data-dcnode-id="4593"><a class="ez-toc-link ez-toc-heading-15" data-dcnode-id="4594" href="#Central_leader_method" title="Central leader method"><span data-dcnode-id="4595" instrument_node="">Central leader method</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="4590"><a class="ez-toc-link ez-toc-heading-16" data-dcnode-id="4591" href="#Modified_central_leader_method" title="Modified central leader method"><span data-dcnode-id="4592" instrument_node="">Modified central leader method</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="4587"><a class="ez-toc-link ez-toc-heading-17" data-dcnode-id="4588" href="#Training_branches" title="Training branches"><span data-dcnode-id="4589" instrument_node="">Training branches</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4582"><a class="ez-toc-link ez-toc-heading-18" data-dcnode-id="4583" href="#Pear_Tree_Pruning_Step-by-Step" title="Pear Tree Pruning Step-by-Step"><span data-dcnode-id="4584" instrument_node="">Pear Tree Pruning Step-by-Step</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4579"><a class="ez-toc-link ez-toc-heading-19" data-dcnode-id="4580" href="#How_to_Thin_a_Pear_Tree" title="How to Thin a Pear Tree"><span data-dcnode-id="4581" instrument_node="">How to Thin a Pear Tree</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4576"><a class="ez-toc-link ez-toc-heading-20" data-dcnode-id="4577" href="#How_to_Harvest_Pears" title="How to Harvest Pears"><span data-dcnode-id="4578" instrument_node="">How to Harvest Pears</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4573"><a class="ez-toc-link ez-toc-heading-21" data-dcnode-id="4574" href="#How_to_Store_Pears" title="How to Store Pears"><span data-dcnode-id="4575" instrument_node="">How to Store Pears</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4570"><a class="ez-toc-link ez-toc-heading-22" data-dcnode-id="4571" href="#Pear_Tree_Propagation" title="Pear Tree Propagation"><span data-dcnode-id="4572" instrument_node="">Pear Tree Propagation</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4567"><a class="ez-toc-link ez-toc-heading-23" data-dcnode-id="4568" href="#Pear_Tree_Problems_and_Controls" title="Pear Tree Problems and Controls"><span data-dcnode-id="4569" instrument_node="">Pear Tree Problems and Controls</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4564"><a class="ez-toc-link ez-toc-heading-24" data-dcnode-id="4565" href="#European_Pear_Varieties_to_Grow" title="European Pear Varieties to Grow"><span data-dcnode-id="4566" instrument_node="">European Pear Varieties to Grow</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4561"><a class="ez-toc-link ez-toc-heading-25" data-dcnode-id="4562" href="#Asian_Pear_Varieties_to_Grow" title="Asian Pear Varieties to Grow"><span data-dcnode-id="4563" instrument_node="">Asian Pear Varieties to Grow</span></a></li></ul></nav></div><span data-dcnode-id="4557" instrument_node="">
</span><h2 data-dcnode-id="4551"><span class="ez-toc-section" data-dcnode-id="4556" id="Best_Climate_to_Grow_a_Pear_Tree"></span><strong data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">Best Climate to Grow a Pear</span></strong><span data-dcnode-id="4553" instrument_node=""> Tree</span><span class="ez-toc-section-end" data-dcnode-id="4552"></span></h2><span data-dcnode-id="4550" instrument_node="">
</span><ul data-dcnode-id="4543"><li data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">Most pears require slightly warmer winters than apples; most not much colder than 20°F. A few pear varieties can survive winter temperatures as low as -20°F.</span></li><li data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">Pears need at least 600 hours of winter chill, that is 45°F or lower each year to produce a crop; 900 hours of chill is even better.</span></li><li data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">Pears are early spring bloomers; frost during bloom time will cause blossoms to drop and the crop to fail. In cold winter regions, protect pears from frost at bloom time; situate trees south-facing or on a slope where they get early morning sun and warmth and are protected from lingering frost.</span></li></ul><span data-dcnode-id="4542" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="4538"><img alt="Pear tree grow plant prune" class="wp-image-74368" data-dcnode-id="4541" height="900" sizes="(max-width: 668px) 100vw, 668px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2022/04/25185437/Pear-tree.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2022/04/25185437/Pear-tree.jpg 668w, https://cdn.harvesttotable.com/htt/2022/04/25185437/Pear-tree-223x300.jpg 223w, https://cdn.harvesttotable.com/htt/2022/04/25185437/Pear-tree-561x756.jpg 561w, https://cdn.harvesttotable.com/htt/2022/04/25185437/Pear-tree-265x357.jpg 265w, https://cdn.harvesttotable.com/htt/2022/04/25185437/Pear-tree-531x715.jpg 531w, https://cdn.harvesttotable.com/htt/2022/04/25185437/Pear-tree-364x490.jpg 364w, https://cdn.harvesttotable.com/htt/2022/04/25185437/Pear-tree-608x819.jpg 608w, https://cdn.harvesttotable.com/htt/2022/04/25185437/Pear-tree-36x48.jpg 36w, https://cdn.harvesttotable.com/htt/2022/04/25185437/Pear-tree-71x96.jpg 71w" width="668"><figcaption data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">Pear tree</span></figcaption></figure><span data-dcnode-id="4537" instrument_node="">
</span><h2 data-dcnode-id="4533"><span class="ez-toc-section" data-dcnode-id="4536" id="Where_to_Plant_a_Pear_Tree"></span><span data-dcnode-id="4535" instrument_node="">Where to Plant a Pear Tree</span><span class="ez-toc-section-end" data-dcnode-id="4534"></span></h2><span data-dcnode-id="4532" instrument_node="">
</span><ul data-dcnode-id="4525"><li data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">Plant pears where they are protected from wind and frost—especially during their bloom time. Plant pears in a sheltered, sunny spot, out of the wind.</span></li><li data-dcnode-id="4528"><span data-dcnode-id="4529" instrument_node="">Plant pears in well-drained loam or compost-rich soil. Pears can tolerate damp, heavy clay soil though it’s not optimal.</span></li><li data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">Pears grow best where the soil pH is about 6.5.</span></li></ul><span data-dcnode-id="4524" instrument_node="">
</span><h2 data-dcnode-id="4520"><span class="ez-toc-section" data-dcnode-id="4523" id="How_to_Plant_a_Pear_Tree"></span><span data-dcnode-id="4522" instrument_node="">How to Plant a Pear Tree</span><span class="ez-toc-section-end" data-dcnode-id="4521"></span></h2><span data-dcnode-id="4519" instrument_node="">
</span><ul data-dcnode-id="4488"><li data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">Plant pear trees in spring or fall when trees are dormant.</span></li><li data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">If you live in a cold winter region, it’s best to plant bare-root pears in spring.</span></li><li data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">Container-grown and ball-and-burlapped pears can be planted at any time of the year when the soil is workable.</span></li><li data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">Avoid planting pear trees when the weather is hot and dry.</span></li><li data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">Bare-root pears are usually one or two years old; container-grown trees may be older. Choose a tree at least one-year-old tree and ½ inch to 1 inch in diameter that is 4 to 5 feet tall with one to three branches.</span></li><li data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">Prepare a planting site in full sun that is sheltered from a prevailing breeze or wind.</span></li><li data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">Dig a hole half again as deep and twice as wide as the tree’s roots.</span></li><li data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">Work well-rotted compost or manure into the soil and add a cupful of all-purpose fertilizer to the bottom of the hole.</span></li><li data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">Put a tree stake in place before planting. Drive the stake into the ground to the side of the hole to at least 2 feet deep.</span></li><li data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">Set the tree in the hole so that the soil mark on the stem is at the surface level of the surrounding soil; the graft union should be 2 to 3 inches above the soil surface.</span></li><li data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">Remove all twine and burlap from ball-and-burlap trees.</span></li><li data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">Spread the roots out in all directions.</span></li><li data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">Re-fill the hole with half native soil and half aged compost or commercial organic planting mix; firm in the soil so that there are no air pockets among the roots. Water in the soil and create a modest soil basin around the trunk to hold water at watering time.</span></li><li data-dcnode-id="4491"><span data-dcnode-id="4492" instrument_node="">Secure the tree to the stake with tree ties.</span></li><li data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">After planting, water each tree thoroughly and fertilize with a high-phosphorus liquid starter fertilizer.</span></li></ul><span data-dcnode-id="4487" instrument_node="">
</span><h2 data-dcnode-id="4482" id="h-pear-tree-size-and-spacing"><span class="ez-toc-section" data-dcnode-id="4486" id="Pear_Tree_Size_and_Spacing"></span><strong data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">Pear Tree Size and Spacing</span></strong><span class="ez-toc-section-end" data-dcnode-id="4483"></span></h2><span data-dcnode-id="4481" instrument_node="">
</span><p data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">Choose the size or form of a pear tree that will fit your growing space; remember you need two or three different cultivars to ensure pollination and fruiting. Tree forms include:</span></p><span data-dcnode-id="4478" instrument_node="">
</span><ul data-dcnode-id="4467"><li data-dcnode-id="4476"><span data-dcnode-id="4477" instrument_node="">Standard pear trees grow to 20 feet tall and 25 feet wide. Plant standard pears at least 20 feet apart.</span></li><li data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">Semi-dwarf pear trees that grow to 15 feet tall and wide. Plant semi-dwarf peats 15 feet apart.</span></li><li data-dcnode-id="4472"><span data-dcnode-id="4473" instrument_node="">Dwarf pear trees that grow 8 to 12 feet tall and wide. Plant dwarf pear trees at least 8 feet apart.</span></li><li data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">Trained fan-shape and espalier pears which grow 11 to 13 feet tall and wide or smaller.</span></li><li data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">Cordon-trained pears are trained to grow “arms” along single or double wires similar to an espalier; these trees are usually grown to about 3 or 4 feet tall and wide.</span></li></ul><span data-dcnode-id="4466" instrument_node="">
</span><h2 data-dcnode-id="4460" id="h-types-of-pear-trees"><span class="ez-toc-section" data-dcnode-id="4465" id="Types_of_Pear_Trees"></span><strong data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">Types of Pear</span></strong><span data-dcnode-id="4462" instrument_node=""> Trees</span><span class="ez-toc-section-end" data-dcnode-id="4461"></span></h2><span data-dcnode-id="4459" instrument_node="">
</span><p data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">There are three basic types of pears:</span></p><span data-dcnode-id="4456" instrument_node="">
</span><ul data-dcnode-id="4449"><li data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">European pears have the traditional teardrop pear-shaped with a neck either short or long; these pears ripen to be either soft or semi-soft and are usually sweet and juicy to the bite.</span></li><li data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">Asian pears are sometimes called apple pears because they are round and crisp, firm, and hard to the bite; they, too, are sweet, but not usually juicy.</span></li><li data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">The third type of pear is the European-Asian hybrid.</span></li></ul><span data-dcnode-id="4448" instrument_node="">
</span><div class="wp-block-image size-medium wp-image-67303" data-dcnode-id="4443"><figure class="alignright" data-dcnode-id="4444"><img alt="Bosc pear poached" class="wp-image-67303" data-dcnode-id="4447" height="300" loading="lazy" sizes="(max-width: 201px) 100vw, 201px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2017/11/23181946/Pear-Bosc-poached-201x300.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2017/11/23181946/Pear-Bosc-poached-201x300.jpg 201w, https://cdn.harvesttotable.com/htt/2017/11/23181946/Pear-Bosc-poached.jpg 602w" width="201"><figcaption data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">Bosc pear poached</span></figcaption></figure></div><span data-dcnode-id="4442" instrument_node="">
</span><h2 data-dcnode-id="4437" id="h-pears-for-fresh-eating-pears-for-cooking"><span class="ez-toc-section" data-dcnode-id="4441" id="Pears_for_Fresh_Eating_Pears_for_Cooking"></span><strong data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">Pears for Fresh Eating; Pears for Cooking</span></strong><span class="ez-toc-section-end" data-dcnode-id="4438"></span></h2><span data-dcnode-id="4436" instrument_node="">
</span><p data-dcnode-id="4434"><span data-dcnode-id="4435" instrument_node="">When you select a pear tree, consider how you intend to use the fruit. Here’s how pears are classed for use:</span></p><span data-dcnode-id="4433" instrument_node="">
</span><ul data-dcnode-id="4426"><li data-dcnode-id="4431"><span data-dcnode-id="4432" instrument_node="">Dessert pears are for fresh eating; they are picked firm, ripened off the tree, and eaten out of hand.</span></li><li data-dcnode-id="4429"><span data-dcnode-id="4430" instrument_node="">Culinary pears are for cooking; these pears do not ripen soft enough for eating out of hand; they remain firm and can be baked or cooked.</span></li><li data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">Dual pears can be eaten fresh or cooked.</span></li></ul><span data-dcnode-id="4425" instrument_node="">
</span><h2 data-dcnode-id="4420"><span class="ez-toc-section" data-dcnode-id="4424" id="Pear_Tree_Pollination"></span><strong data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">Pear Tree Pollination</span></strong><span class="ez-toc-section-end" data-dcnode-id="4421"></span></h2><span data-dcnode-id="4419" instrument_node="">
</span><ul data-dcnode-id="4410"><li data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">Few pear trees are self-fruiting. Pears yield best when they are matched with a cross-pollinator. Plant at least two cultivars.</span></li><li data-dcnode-id="4415"><span data-dcnode-id="4416" instrument_node="">Pear varieties are commonly divided into pollination groups; the members of each group flower at the same time so they are good pollinators for other members of the group. It is important to plant at least two varieties from the same group (the same flowering time) to ensure pollination. (Pollination occurs when bees or other insects carry pollen from the flowers of one variety to the flowers of a second.)</span></li><li data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">When you select a pear tree, the plant tag or label will tell you if the tree is self-fertile or list other pear varieties that are pollinators.</span></li><li data-dcnode-id="4411"><span data-dcnode-id="4412" instrument_node="">Even self-pollinating cultivars will benefit from having a second variety that flowers at the same time nearby—a sort of pollination insurance policy.</span></li></ul><span data-dcnode-id="4409" instrument_node="">
</span><h2 data-dcnode-id="4404" id="h-pear-tree-pollination-groups"><span class="ez-toc-section" data-dcnode-id="4408" id="Pear_Tree_Pollination_Groups"></span><strong data-dcnode-id="4406"><span data-dcnode-id="4407" instrument_node="">Pear Tree Pollination Groups</span></strong><span class="ez-toc-section-end" data-dcnode-id="4405"></span></h2><span data-dcnode-id="4403" instrument_node="">
</span><p data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">When you decide on the pear variety you want to grow, look at a pollination chart to make sure you select a second variety that is a pollinizer. Here are two examples of pollination charts:</span></p><span data-dcnode-id="4400" instrument_node="">
</span><p data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">Example One: Choose two varieties from the same flowering time group:</span></p><span data-dcnode-id="4397" instrument_node="">
</span><ul data-dcnode-id="4390"><li data-dcnode-id="4395"><span data-dcnode-id="4396" instrument_node="">Group A: ‘Chojuro’, ‘Korean Giant’, ‘Packham’s Triumph’, ‘Seckel’, ‘Tsu Li’.</span></li><li data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">Group B: ‘Bartlett’, ‘Anjou’, ‘Conference’, ‘Harrow Delight’, ‘Hosui’, ‘Magness’, ‘Warren’, ‘Winter Nelis’, ‘Hessle’.</span></li><li data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">Group C: ‘Beurré Bosc’, ‘Clapp’s Favorite’, ‘Concorde’, ‘Comice’, ‘Gorham’, ‘Moonglow’, ‘Max-Red Bartlett’, ‘Winter Nelis’.</span></li></ul><span data-dcnode-id="4389" instrument_node="">
</span><div class="wp-block-image size-medium wp-image-67302" data-dcnode-id="4384"><figure class="alignright" data-dcnode-id="4385"><img alt="Bartlett pears" class="wp-image-67302" data-dcnode-id="4388" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2017/11/23181947/Pear-bigstock-Pears-On-Rustic-Wood-Backgroun-298134382-300x200.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2017/11/23181947/Pear-bigstock-Pears-On-Rustic-Wood-Backgroun-298134382-300x200.jpg 300w, https://cdn.harvesttotable.com/htt/2017/11/23181947/Pear-bigstock-Pears-On-Rustic-Wood-Backgroun-298134382-768x512.jpg 768w, https://cdn.harvesttotable.com/htt/2017/11/23181947/Pear-bigstock-Pears-On-Rustic-Wood-Backgroun-298134382-1024x683.jpg 1024w, https://cdn.harvesttotable.com/htt/2017/11/23181947/Pear-bigstock-Pears-On-Rustic-Wood-Backgroun-298134382-340x225.jpg 340w" width="300"><figcaption data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">Bartlett pears</span></figcaption></figure></div><span data-dcnode-id="4383" instrument_node="">
</span><p data-dcnode-id="4381"><span data-dcnode-id="4382" instrument_node="">Example Two: Selected the variety you want to grow and match it with a compatible pollinizer. Here are popular varieties followed by pollinizers.</span></p><span data-dcnode-id="4380" instrument_node="">
</span><ul data-dcnode-id="4363"><li data-dcnode-id="4378"><span data-dcnode-id="4379" instrument_node="">‘Bartlett’ pollinators include ‘Anjou’, ‘Bosc’, ‘Comice’.</span></li><li data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">‘Bosc’ pollinators include ‘Bartlett’, Comice’, ‘Anjou’, ‘Seckel’.</span></li><li data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">‘Anjou’ pollinators include ‘Bartlett’, ‘Bosc’, ‘Comice’, ‘Anjou’, ‘Seckel’.</span></li><li data-dcnode-id="4372"><span data-dcnode-id="4373" instrument_node="">‘Seckel’ pollinators include ‘Bosc’, ‘Comice’ (‘Bartlett’ is not compatible).</span></li><li data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">‘Chojuro’ pollinators include ‘Shinseike’, ‘Bartlett’.</span></li><li data-dcnode-id="4368"><span data-dcnode-id="4369" instrument_node="">‘Nijisseiki’ (also called ‘Twentieth Century’ pollinators include ‘Chojuro’, ‘Shinseike’, ‘Bartlett’.</span></li><li data-dcnode-id="4366"><span data-dcnode-id="4367" instrument_node="">‘Hosui’: self-fruitful or any other pear in the same bloom time.</span></li><li data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">‘Shinsike’ pollinators include ‘Chojuro’.</span></li></ul><span data-dcnode-id="4362" instrument_node="">
</span><p data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">Some specific pear varieties will not pollinate other specific varieties:</span></p><span data-dcnode-id="4359" instrument_node="">
</span><ul data-dcnode-id="4350"><li data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">‘Comice’ and ‘Bosc’ will not pollinate ‘Conference’ and vice versa.</span></li><li data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">‘Bartlett’ will not pollinate ‘Seckel’.</span></li><li data-dcnode-id="4353"><span data-dcnode-id="4354" instrument_node="">Some Asian pears bloom earlier than European pears so they are not good choices for cross-pollination of European varieties.</span></li><li data-dcnode-id="4351"><span data-dcnode-id="4352" instrument_node="">Later blooming Asian varieties will pollinate European varieties.</span></li></ul><span data-dcnode-id="4349" instrument_node="">
</span><h2 data-dcnode-id="4344" id="h-pear-tree-rootstock"><span class="ez-toc-section" data-dcnode-id="4348" id="Pear_Tree_Rootstock"></span><strong data-dcnode-id="4346"><span data-dcnode-id="4347" instrument_node="">Pear Tree Rootstock</span></strong><span class="ez-toc-section-end" data-dcnode-id="4345"></span></h2><span data-dcnode-id="4343" instrument_node="">
</span><ul data-dcnode-id="4334"><li data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">Like many fruit trees, pears are grafted onto rootstocks that are adaptable to many soils or are disease resistant.</span></li><li data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">There are two main types of pear rootstock: quince rootstock called ‘Quince A’ and a fireblight resistant pear rootstock called ‘Old Home x Farmingdale’–‘OHxF’.</span></li><li data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">Most dwarf pears are grafted onto ‘Quince A’ rootstock; these trees grow to about 8 feet tall. Quince roots are shallow and pears on quince rootstock cannot tolerate drought or very cold soil (hardy only to 0°F or greater).</span></li><li data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">‘OHxF’ rootstock grows taller trees—from 10 to 15 feet tall—and is hardier than quince, withstanding colder winters. Choose a rootstock recommended for your region; check at a local tree nursery for advice or call the nearby Cooperative Extension Service.</span></li></ul><span data-dcnode-id="4333" instrument_node="">
</span><h2 data-dcnode-id="4328" id="h-pear-tree-yields"><span class="ez-toc-section" data-dcnode-id="4332" id="Pear_Tree_Yields"></span><strong data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">Pear Tree Yields</span></strong><span class="ez-toc-section-end" data-dcnode-id="4329"></span></h2><span data-dcnode-id="4327" instrument_node="">
</span><ul data-dcnode-id="4322"><li data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">Standard and semi-dwarf pears yield 150 to 200 pounds of fruit each year.</span></li><li data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">Dwarf pears yield about 30 to 45 pounds of fruit each year.</span></li></ul><span data-dcnode-id="4321" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4317"><img alt="Asian pears ripening on the tree" class="wp-image-74370" data-dcnode-id="4320" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-1024x683.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-1024x683.jpg 1024w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-300x200.jpg 300w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-768x512.jpg 768w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-1536x1024.jpg 1536w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-561x374.jpg 561w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-1122x748.jpg 1122w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-265x177.jpg 265w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-531x354.jpg 531w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-364x243.jpg 364w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-728x485.jpg 728w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-608x405.jpg 608w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-758x505.jpg 758w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-1152x768.jpg 1152w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-72x48.jpg 72w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228-144x96.jpg 144w, https://cdn.harvesttotable.com/htt/2022/04/25185212/bigstock-Closeup-Of-Ripe-Organic-Nashi-413753228.jpg 1600w" width="1024"><figcaption data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">Asian pears ripening on the tree</span></figcaption></figure><span data-dcnode-id="4316" instrument_node="">
</span><h2 data-dcnode-id="4310" id="h-container-growing-pear-trees"><span class="ez-toc-section" data-dcnode-id="4315" id="Container_Growing_Pear_Trees"></span><strong data-dcnode-id="4313"><span data-dcnode-id="4314" instrument_node="">Container Growing Pear</span></strong><span data-dcnode-id="4312" instrument_node=""> Trees</span><span class="ez-toc-section-end" data-dcnode-id="4311"></span></h2><span data-dcnode-id="4309" instrument_node="">
</span><ul data-dcnode-id="4294"><li data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">Dwarf pear trees can be grown in containers. Choose pears grafted on dwarf rootstocks.</span></li><li data-dcnode-id="4305"><span data-dcnode-id="4306" instrument_node="">Choose a large pot or tub at least 18 inches wide and deep that is well-drained.</span></li><li data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">Plant trees in a commercial organic potting mix.</span></li><li data-dcnode-id="4301"><span data-dcnode-id="4302" instrument_node="">Keep the soil evenly moist but not wet.</span></li><li data-dcnode-id="4299"><span data-dcnode-id="4300" instrument_node="">Feed pears growing in containers with an all-purpose fertilizer that is slightly higher in potassium.</span></li><li data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">Repot the tree after two years into a container that is 24 inches wide and deep. Once the tree is full size, repot it every year when it is dormant; prune back the roots and tops before repotting.</span></li><li data-dcnode-id="4295"><span data-dcnode-id="4296" instrument_node="">In cold regions, protect trees growing in containers by moving them to a protected place–a garage or covered porch–in frigid weather.</span></li></ul><span data-dcnode-id="4293" instrument_node="">
</span><h2 data-dcnode-id="4289" id="h-watering-pear-trees"><span class="ez-toc-section" data-dcnode-id="4292" id="Watering_Pear_Trees"></span><span data-dcnode-id="4291" instrument_node="">Watering Pear Trees</span><span class="ez-toc-section-end" data-dcnode-id="4290"></span></h2><span data-dcnode-id="4288" instrument_node="">
</span><ul data-dcnode-id="4283"><li data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">Newly planted pear trees require moderate watering weekly. Set the water on low and allow it to seep into the soil; roots will follow deep watering and become well established.</span></li><li data-dcnode-id="4284"><span data-dcnode-id="4285" instrument_node="">An established pear tree requires only infrequent watering but be sure to water trees during prolonged dry periods.</span></li></ul><span data-dcnode-id="4282" instrument_node="">
</span><h2 data-dcnode-id="4278"><span class="ez-toc-section" data-dcnode-id="4281" id="Feeding_Pear_Trees"></span><span data-dcnode-id="4280" instrument_node="">Feeding Pear Trees</span><span class="ez-toc-section-end" data-dcnode-id="4279"></span></h2><span data-dcnode-id="4277" instrument_node="">
</span><ul data-dcnode-id="4266"><li data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">Feed pears with a mulch of aged compost applied liberally around the base of the tree once or twice a year, in spring or in late fall after leaves have dropped.</span></li><li data-dcnode-id="4273"><span data-dcnode-id="4274" instrument_node="">Feed pears after new growth starts in spring; use a complete fertilizer that is lower in nitrogen than phosphorus and potassium. Too much nitrogen can spur leafy branch growth and leave pears vulnerable to fireblight disease.</span></li><li data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">Low levels of potassium, calcium, or boron can reduce growth and fruit quality. Test the soil for its nutrient content. Spread gypsum on the soil to raise the calcium level.</span></li><li data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">Yields can be improved with a foliar feeding of seaweed extract when buds begin to show color, again after petals fall, and once again when fruits are less than 1 inch in diameter.</span></li><li data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">Protect young trees from frost by covering them with a floating row cover when frost threatens.</span></li></ul><span data-dcnode-id="4265" instrument_node="">
</span><h2 data-dcnode-id="4259" id="h-how-to-train-a-pear-tree"><span class="ez-toc-section" data-dcnode-id="4264" id="How_to_Train_a_Pear_Tree"></span><strong data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">How to Train a Pear</span></strong><span data-dcnode-id="4261" instrument_node=""> Tree</span><span class="ez-toc-section-end" data-dcnode-id="4260"></span></h2><span data-dcnode-id="4258" instrument_node="">
</span><ul data-dcnode-id="4251"><li data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">Pear trees are naturally upright growing with mostly vertical branches. Vertically growing branches tend to have narrow crotches which can easily crack or break when loaded with fruit.</span></li><li data-dcnode-id="4254"><span data-dcnode-id="4255" instrument_node="">The strongest and most fruitful angle for a branch is 45 to 60 degrees; a branch with a narrower angle will be weak and could break off.</span></li><li data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">A young pear tree can be trained to a single leader (main trunk) or to three or four leaders (multi-leader) form. Training to two or more leaders is insurance against leader damage due to limb breakage, wind damage, or disease.</span></li></ul><span data-dcnode-id="4250" instrument_node="">
</span><h3 data-dcnode-id="4246"><span class="ez-toc-section" data-dcnode-id="4249" id="Central_leader_method"></span><span data-dcnode-id="4248" instrument_node="">Central leader method</span><span class="ez-toc-section-end" data-dcnode-id="4247"></span></h3><span data-dcnode-id="4245" instrument_node="">
</span><ul data-dcnode-id="4240"><li data-dcnode-id="4241"><strong data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">Central leader:</span></strong><span data-dcnode-id="4242" instrument_node=""> A mature central-leader tree has a somewhat conical shape. The main stem is the central leader; from the central leader even spaced lateral branches are selected to grow as the tree’s scaffold branches. At planting a one- or two-year-old whip is cut off at about 30 inches above the ground; four even spaced lateral branches are selected to become the scaffold branches; all others are removed. In the second year, even spaced sub-lateral branches are selected to grow on; other sub-laterals are removed. Each year the central leader is shortened by one-third of the previous summer’s growth until the conical shape of the tree is established.</span></li></ul><span data-dcnode-id="4239" instrument_node="">
</span><h3 data-dcnode-id="4235"><span class="ez-toc-section" data-dcnode-id="4238" id="Modified_central_leader_method"></span><span data-dcnode-id="4237" instrument_node="">Modified central leader method</span><span class="ez-toc-section-end" data-dcnode-id="4236"></span></h3><span data-dcnode-id="4234" instrument_node="">
</span><ul data-dcnode-id="4229"><li data-dcnode-id="4230"><strong data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">Modified central leader:</span></strong><span data-dcnode-id="4231" instrument_node=""> A modified central leader tree does not have a central main stem or trunk; the main stem is shortened in the second or third year and lateral-scaffold branches are encouraged to grow. Follow the training directions for a central leader form tree; once 4 or 5 strong scaffold branches have formed, cut back the central leader to just above the topmost scaffold branch. Sub-laterals will grow from the scaffold branches; prune these to keep the form of the tree and remove any vertical sub-laterals.</span></li></ul><span data-dcnode-id="4228" instrument_node="">
</span><h3 data-dcnode-id="4224"><span class="ez-toc-section" data-dcnode-id="4227" id="Training_branches"></span><span data-dcnode-id="4226" instrument_node="">Training branches</span><span class="ez-toc-section-end" data-dcnode-id="4225"></span></h3><span data-dcnode-id="4223" instrument_node="">
</span><ul data-dcnode-id="4218"><li data-dcnode-id="4219"><strong data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">Training branches:</span></strong><span data-dcnode-id="4220" instrument_node=""> In the first couple of years after planting, spread the branches each spring so that they do not shoot straight up; spread branches so that they grow 60 degrees from vertical; use a stick notched at each end to spread apart the two branches or hang a weight near the ends of one branch to hold it down and train it to a wider angle; begin this training each spring after blossoms fall.</span></li></ul><span data-dcnode-id="4217" instrument_node="">
</span><p data-dcnode-id="4209"><strong data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">See also:</span></strong><span data-dcnode-id="4214" instrument_node=""> </span><a data-dcnode-id="4210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvesttotable.com/pear_pruning/"><span data-dcnode-id="4211" style="color: #ff0000;"><strong data-dcnode-id="4212"><span data-dcnode-id="4213" instrument_node="">Pear Pruning</span></strong></span></a></p><span data-dcnode-id="4208" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4204"><img alt="Pear tree not yet pruned in winter" class="wp-image-74372" data-dcnode-id="4207" height="684" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-1024x684.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-1024x684.jpg 1024w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-300x200.jpg 300w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-768x513.jpg 768w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-1536x1025.jpg 1536w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-561x374.jpg 561w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-1122x749.jpg 1122w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-265x177.jpg 265w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-531x354.jpg 531w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-364x243.jpg 364w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-728x486.jpg 728w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-608x406.jpg 608w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-758x506.jpg 758w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-1152x769.jpg 1152w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-72x48.jpg 72w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150-144x96.jpg 144w, https://cdn.harvesttotable.com/htt/2022/04/25185303/bigstock-167543150.jpg 1600w" width="1024"><figcaption data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">Pear tree not yet pruned in winter</span></figcaption></figure><span data-dcnode-id="4203" instrument_node="">
</span><h2 data-dcnode-id="4198" id="h-pear-tree-pruning-step-by-step"><span class="ez-toc-section" data-dcnode-id="4202" id="Pear_Tree_Pruning_Step-by-Step"></span><strong data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">Pear Tree Pruning Step-by-Step</span></strong><span class="ez-toc-section-end" data-dcnode-id="4199"></span></h2><span data-dcnode-id="4197" instrument_node="">
</span><ul data-dcnode-id="4180"><li data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">Prune pear trees in late fall after the tree has dropped its leaves and gone dormant or in early spring before new buds appear. Very light pruning can be done at any time of the year.</span></li><li data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">Remove all diseased, dead, or broken branches. Prune off branches infected with fireblight, a bacterial disease.</span></li><li data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">Remove crossing or rubbing branches. If two branches cross and rub against each other they can cause a wound that may allow insects or fungal diseases to attack the tree. Remove the least desirable branch.</span></li><li data-dcnode-id="4189"><span data-dcnode-id="4190" instrument_node="">Remove all water sprouts. Water sprouts are fast-growing vertical branches that usually have no side branches.</span></li><li data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">Remove all suckers. Suckers are fast-growing shoots that grow out of the soil from the roots below the soil surface.</span></li><li data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">Pears send up many tall whip-like branches from the center of the tree; prune each year to keep the tree from growing too tall; head whip-like branches down.</span></li><li data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">Head back side branches that grow taller than the central leader. Head back new whip growth by two-thirds of their length. Keeping a pear tree headed back will direct growth to the fruit-bearing spurs which develop on older wood.</span></li><li data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">Do not prune in winter where bacterial canker is a problem; wait until spring when new growth has begun.</span></li></ul><span data-dcnode-id="4179" instrument_node="">
</span><h2 data-dcnode-id="4172" id="h-how-to-thin-a-pear-tree"><span class="ez-toc-section" data-dcnode-id="4178" id="How_to_Thin_a_Pear_Tree"></span><span data-dcnode-id="4177" instrument_node="">How to </span><strong data-dcnode-id="4175"><span data-dcnode-id="4176" instrument_node="">Thin a Pear</span></strong><span data-dcnode-id="4174" instrument_node=""> Tree</span><span class="ez-toc-section-end" data-dcnode-id="4173"></span></h2><span data-dcnode-id="4171" instrument_node="">
</span><ul data-dcnode-id="4154"><li data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">Pears set fruit on short stubby spurs that develop on older branches. Spurs can vary in shape and length but they commonly have a knob-like end that is covered with new buds. When thinning shoots, be sure to leave ample fruiting wood; prune back shoots only if they grow longer than 18 inches; head back to a flower bud just before bloom this will stimulate fruit set.</span></li><li data-dcnode-id="4167"><span data-dcnode-id="4168" instrument_node="">Spurs bear fruit year after year and should not be pruned off.</span></li><li data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">After limbs set fruit, thin ends of all secondary branches to an upright shoot or bud; the fruit will then be borne on heavier wood rather than fragile branch ends.</span></li><li data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">Pinching shoot tips in early summer before June drop will increase the final crop of slow to bear young trees.</span></li><li data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">Four to eight weeks after bloom, thin fruits leaving one or two fruits per cluster. Spot pick mature fruits during the harvest to allow the fruits that remain to mature and grow larger.</span></li><li data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">Thin crowded fruit clusters a second time to just one fruit about mid-season; if the crop is thin leave two pears per cluster.</span></li><li data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">Remove small and blemished fruit a few weeks before picking the main crop.</span></li><li data-dcnode-id="4155"><span data-dcnode-id="4156" instrument_node="">To prevent branches from splitting or breaking due to heavy crop, tie up the main scaffold branches with a strap or rope.</span></li></ul><span data-dcnode-id="4153" instrument_node="">
</span><h2 data-dcnode-id="4147" id="h-how-to-harvest-pears"><span class="ez-toc-section" data-dcnode-id="4152" id="How_to_Harvest_Pears"></span><span data-dcnode-id="4151" instrument_node="">How to </span><strong data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">Harvest Pears</span></strong><span class="ez-toc-section-end" data-dcnode-id="4148"></span></h2><span data-dcnode-id="4146" instrument_node="">
</span><ul data-dcnode-id="4135"><li data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">Standard and semi-dwarf pear trees bear a full harvest five to seven years after a whip is planted.</span></li><li data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">Dwarf varieties begin to bear fruit three to five years after a one-year-old whip is planted.</span></li><li data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">Pears come to harvest from midsummer to mid-autumn, depending on the variety.</span></li><li data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">A pear is ready for harvest when it reaches mature size and the green color lightens but the fruit is still hard. The stem of the fruit will part readily from the spur when you lift up on the fruit with a slight twist. If the stem does not snap on its own, wait a couple of days and try again.</span></li><li data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">The fruit will ripen off the tree in a cool place. Pears that fully ripen on the tree can have a grainy texture.</span></li></ul><span data-dcnode-id="4134" instrument_node="">
</span><h2 data-dcnode-id="4130"><span class="ez-toc-section" data-dcnode-id="4133" id="How_to_Store_Pears"></span><span data-dcnode-id="4132" instrument_node="">How to Store Pears</span><span class="ez-toc-section-end" data-dcnode-id="4131"></span></h2><span data-dcnode-id="4129" instrument_node="">
</span><ul data-dcnode-id="4124"><li data-dcnode-id="4127"><span data-dcnode-id="4128" instrument_node="">Store pears at high humidity and temperatures near freezing. The length of storage varies with the cultivar, but some pears will store for up to three months. Remove the fruit from storage and ripen it before you eat it.</span></li><li data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">Winter pears which are hard when they fall from the tree will soften in storage.</span></li></ul><span data-dcnode-id="4123" instrument_node="">
</span><h2 data-dcnode-id="4117" id="h-pear-tree-propagation"><span class="ez-toc-section" data-dcnode-id="4122" id="Pear_Tree_Propagation"></span><strong data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">Pear</span></strong><span data-dcnode-id="4119" instrument_node=""> Tree Propagation</span><span class="ez-toc-section-end" data-dcnode-id="4118"></span></h2><span data-dcnode-id="4116" instrument_node="">
</span><ul data-dcnode-id="4111"><li data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">Pear trees can be grown from seed.</span></li><li data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">Pears grafted onto quince or ‘Farmingdale-Old Home’ rootstock grow best.</span></li></ul><span data-dcnode-id="4110" instrument_node="">
</span><h2 data-dcnode-id="4105" id="h-pear-tree-problems-and-controls"><span class="ez-toc-section" data-dcnode-id="4109" id="Pear_Tree_Problems_and_Controls"></span><strong data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">Pear Tree Problems and Controls</span></strong><span class="ez-toc-section-end" data-dcnode-id="4106"></span></h2><span data-dcnode-id="4104" instrument_node="">
</span><ul data-dcnode-id="4091"><li data-dcnode-id="4100"><strong data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">Fireblight</span></strong><span data-dcnode-id="4101" instrument_node=""> is a bacterial disease that causes branches to blacken and die. Cut back infected branches to green, healthy growth. Disinfect pruning tools with bleach between pruning cuts. Plant fireblight resistant varieties if you live where summers are warm and humid. There is no cure for fireblight.</span></li><li data-dcnode-id="4096"><strong data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">Pear psylla</span></strong><span data-dcnode-id="4097" instrument_node=""> is a small sucking insect that attacks leaves and branches. Spray pears with a dormant spray or all-season horticultural oil to control overwintering pests such as psylla. Kaolin clay in the form of an organic spray can be used as a protective barrier against psylla; spray the whole tree.</span></li><li data-dcnode-id="4092"><strong data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">Codling moth</span></strong><span data-dcnode-id="4093" instrument_node=""> larvae burrow into fruit leaving black frass where they enter. Pick off and dispose of damaged fruit regularly; when you do this, you will be disposing of the coddling moth larvae and will interrupt the pest’s life cycle. Pheromone traps can control coddling moths.</span></li></ul><span data-dcnode-id="4090" instrument_node="">
</span><div class="wp-block-image size-medium wp-image-67286" data-dcnode-id="4085"><figure class="alignright" data-dcnode-id="4086"><img alt="Harvest pears" class="wp-image-67286" data-dcnode-id="4089" height="300" loading="lazy" sizes="(max-width: 200px) 100vw, 200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2017/11/23181956/Pear-bigstock-Seckel-Pear-3944026-200x300.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2017/11/23181956/Pear-bigstock-Seckel-Pear-3944026-200x300.jpg 200w, https://cdn.harvesttotable.com/htt/2017/11/23181956/Pear-bigstock-Seckel-Pear-3944026-768x1152.jpg 768w, https://cdn.harvesttotable.com/htt/2017/11/23181956/Pear-bigstock-Seckel-Pear-3944026-683x1024.jpg 683w" width="200"><figcaption data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">Seckel Pear</span></figcaption></figure></div><span data-dcnode-id="4084" instrument_node="">
</span><h2 data-dcnode-id="4079" id="h-european-pear-varieties-to-grow"><span class="ez-toc-section" data-dcnode-id="4083" id="European_Pear_Varieties_to_Grow"></span><strong data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">European Pear Varieties to Grow</span></strong><span class="ez-toc-section-end" data-dcnode-id="4080"></span></h2><span data-dcnode-id="4078" instrument_node="">
</span><ul data-dcnode-id="4065"><li data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">‘Anjou’: large, greenish with a pink blush; good flavor and texture; midseason harvest.</span></li><li data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">‘Bartlett’: standard summer pear; medium to large; thin-skinned; yellow; very sweet, very tender; midseason harvest.</span></li><li data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">‘Bosc’: medium to large; russeting on green or yellow skin; good flavor, firm, juicy flesh; holds shape when cooked; late harvest.</span></li><li data-dcnode-id="4070"><span data-dcnode-id="4071" instrument_node="">‘Comice’: large to very large; thick greenish-yellow skin; great flavor and texture; late harvest.</span></li><li data-dcnode-id="4068"><span data-dcnode-id="4069" instrument_node="">‘Seckel’: self-fruitful; bears heavily with pollinizer; small; yellow-brown skin; very sweet; a good choice for home gardens; good for canning; early mid-season harvest.</span></li><li data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">‘Ure’: cold-hardy hybrid developed in Canada; small, round fruit; greenish-yellow skin; sweet and juicy; use fresh or canned.</span></li></ul><span data-dcnode-id="4064" instrument_node="">
</span><p data-dcnode-id="4059"><strong data-dcnode-id="4060"><span data-dcnode-id="4063" instrument_node="">See also: </span><a data-dcnode-id="4061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harvesttotable.com/pear-varieties-for-backyard-gardens/"><span data-dcnode-id="4062" instrument_node="">Pear Varieties for Backyard Gardens</span></a></strong></p><span data-dcnode-id="4058" instrument_node="">
</span><div class="wp-block-image size-medium wp-image-67285" data-dcnode-id="4053"><figure class="alignright" data-dcnode-id="4054"><img alt="Asian pear" class="wp-image-67285" data-dcnode-id="4057" height="199" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2017/11/23181958/Pear-bigstock-Asian-Pear-On-White-767409-300x199.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2017/11/23181958/Pear-bigstock-Asian-Pear-On-White-767409-300x199.jpg 300w, https://cdn.harvesttotable.com/htt/2017/11/23181958/Pear-bigstock-Asian-Pear-On-White-767409-768x511.jpg 768w, https://cdn.harvesttotable.com/htt/2017/11/23181958/Pear-bigstock-Asian-Pear-On-White-767409-1024x681.jpg 1024w, https://cdn.harvesttotable.com/htt/2017/11/23181958/Pear-bigstock-Asian-Pear-On-White-767409-340x225.jpg 340w" width="300"><figcaption data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">Asian pear</span></figcaption></figure></div><span data-dcnode-id="4052" instrument_node="">
</span><h2 data-dcnode-id="4047" id="h-asian-pear-varieties-to-grow"><span class="ez-toc-section" data-dcnode-id="4051" id="Asian_Pear_Varieties_to_Grow"></span><strong data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">Asian Pear Varieties to Grow</span></strong><span class="ez-toc-section-end" data-dcnode-id="4048"></span></h2><span data-dcnode-id="4046" instrument_node="">
</span><ul data-dcnode-id="4033"><li data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">‘Chojuro’: oblong; greenish-brown; white flesh; mildly sweet; harvest midseason.</span></li><li data-dcnode-id="4042"><span data-dcnode-id="4043" instrument_node="">‘Housi’: medium to large; brownish skin with rose and yellow undertones; excellent flavor; late harvest.</span></li><li data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">‘Seuri’: large, orange fruit; delicious flavor, late harvest.</span></li><li data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">‘Shinko’: medium; bronze, russeted; juicy, sweet flavor; late harvest.</span></li><li data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">‘Shinseiki’ (‘New Century’): large; yellow skin; white flesh; sweet, juicy; early harvest.</span></li><li data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">‘20th Century’ (‘Nijisseiki’): medium size; clear yellow skin; white flesh; sweet to slightly tart; harvest mid-season.</span></li></ul><span data-dcnode-id="4032" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2961"><span data-dcnode-id="2965" instrument_node="">
</span><p data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node="">The fruits have a fungal disease; it could be pear scab or leaf blight–both attack toward the end of the season. Spray with a fungicide all leaves and fruit that remain–or remove the dispose of the fruits. The fungi can overwinter, so if you don’t treat the tree, you will see the disease again next season. Pears are commonly harvested before they are ripe; they ripen off the tree at room temperature from the inside out. Be patient. To know when a pear is ripe, apply gentle pressure to the neck, or stem end, of the pear with your thumb. If it yields to pressure, then it’s ripe and ready to eat.</span></p><span data-dcnode-id="2962" instrument_node="">
