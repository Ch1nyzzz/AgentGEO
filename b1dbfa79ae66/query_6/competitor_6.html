</span><p data-dcnode-id="4253"><span data-dcnode-id="4254" instrument_node="">Currants are small, round berry-like fruits that can be eaten fresh or cooked with sugar and made into pie fillings, puddings, dessert sauces, jams, and jellies. </span></p><span data-dcnode-id="4252" instrument_node="">
</span><p data-dcnode-id="4250"><span data-dcnode-id="4251" instrument_node="">There are red, white–actually yellowish-white, and black-fruited currants. Currants grow as bushes to about 6 feet tall. They grow best in cool-summer regions and seldom thrive in warm-summer regions unless planted in a cool shady spot. Currants are deciduous; they lose their leaves in winter.</span></p><span data-dcnode-id="4249" instrument_node="">
</span><p data-dcnode-id="4247"><span data-dcnode-id="4248" instrument_node="">Red and white currants grow on a small stem or trunk often referred to as a “leg’’; black currants grow from multiple stems that sprout from the soil. Black currants have different pruning requirements than red and white currants. Apart from pruning, red, white, and black currants have the same growing and care requirements.</span></p><span data-dcnode-id="4246" instrument_node="">

iner_Growing_Currants" title="Container Growing Currants"><span data-dcnode-id="4217" instrument_node="">Container Growing Currants</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4212"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="4213" href="#Watering_and_Feeding_Currants" title="Watering and Feeding Currants"><span data-dcnode-id="4214" instrument_node="">Watering and Feeding Currants</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4209"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="4210" href="#Currant_Care" title="Currant Care"><span data-dcnode-id="4211" instrument_node="">Currant Care</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4206"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="4207" href="#How_to_Prune_Red_and_White_Currants" title="How to Prune Red and White Currants"><span data-dcnode-id="4208" instrument_node="">How to Prune Red and White Currants</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4203"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="4204" href="#How_to_Prune_Black_Currants" title="How to Prune Black Currants"><span data-dcnode-id="4205" instrument_node="">How to Prune Black Currants</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4200"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="4201" href="#How_to_Train_Currants" title="How to Train Currants"><span data-dcnode-id="4202" instrument_node="">How to Train Currants</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4197"><a class="ez-toc-link ez-toc-heading-13" data-dcnode-id="4198" href="#Currant_Pests" title="Currant Pests"><span data-dcnode-id="4199" instrument_node="">Currant Pests</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4194"><a class="ez-toc-link ez-toc-heading-14" data-dcnode-id="4195" href="#Currant_Diseases" title="Currant Diseases"><span data-dcnode-id="4196" instrument_node="">Currant Diseases</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4191"><a class="ez-toc-link ez-toc-heading-15" data-dcnode-id="4192" href="#Currant_Environmental_Problems" title="Currant Environmental Problems"><span data-dcnode-id="4193" instrument_node="">Currant Environmental Problems</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4188"><a class="ez-toc-link ez-toc-heading-16" data-dcnode-id="4189" href="#Propagating_Currants" title="Propagating Currants"><span data-dcnode-id="4190" instrument_node="">Propagating Currants</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4185"><a class="ez-toc-link ez-toc-heading-17" data-dcnode-id="4186" href="#Harvesting_Currants" title="Harvesting Currants"><span data-dcnode-id="4187" instrument_node="">Harvesting Currants</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4182"><a class="ez-toc-link ez-toc-heading-18" data-dcnode-id="4183" href="#How_to_Store_Currants" title="How to Store Currants"><span data-dcnode-id="4184" instrument_node="">How to Store Currants</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4179"><a class="ez-toc-link ez-toc-heading-19" data-dcnode-id="4180" href="#Fall_and_Winter_Currant_Care" title="Fall and Winter Currant Care"><span data-dcnode-id="4181" instrument_node="">Fall and Winter Currant Care</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="4176"><a class="ez-toc-link ez-toc-heading-20" data-dcnode-id="4177" href="#Currant_Varieties_to_Plant" title="Currant Varieties to Plant"><span data-dcnode-id="4178" instrument_node="">Currant Varieties to Plant</span></a></li></ul></nav></div><span data-dcnode-id="4172" instrument_node="">
</span><h2 data-dcnode-id="4167"><span class="ez-toc-section" data-dcnode-id="4171" id="Best_Climate_and_Site_for_Growing_Currants"></span><strong data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">Best Climate and Site for Growing Currants</span></strong><span class="ez-toc-section-end" data-dcnode-id="4168"></span></h2><span data-dcnode-id="4166" instrument_node="">
</span><ul data-dcnode-id="4153"><li data-dcnode-id="4164"><span data-dcnode-id="4165" instrument_node="">Currants grow best in cool summer climates.</span></li><li data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node="">Plant currants in full sun. In hot regions, grow currants in partial shade. Grown in partial shade currants will take longer to ripen and may not be as sweet as those grown in full sun. Where summers are hot plant currants against a north-facing wall, north-facing slope, or in partial shade.</span></li><li data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">Plant currants in a sheltered spot away from a prevailing breeze or wind. Do not plant currants in low spots where frost can settle.</span></li><li data-dcnode-id="4158"><span data-dcnode-id="4159" instrument_node="">Plant currants in slightly acidic soil to neutral soil; a soil pH of 6.5 to 7.0 is optimal. Currants will grow in average garden soil.</span></li><li data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">Do not plant currants in waterlogged soil.</span></li><li data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">Add aged compost or commercial organic planting mix to planting beds; currants grow best in well-drained soil.</span></li></ul><span data-dcnode-id="4152" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4148"><img alt="Branches of red currants" class="wp-image-74338" data-dcnode-id="4151" height="683" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-1024x683.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-1024x683.jpg 1024w, https://cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-300x200.jpg 300w, https://cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-768x512.jpg 768w, https://cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-1536x1024.jpg 1536w, https://cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-2048x1365.jpg 2048w, https://cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-561x374.jpg 561w, https://cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-1122x748.jpg 1122w, https://cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-265x177.jpg 265w, https://cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-531x354.jpg 531w, https://cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-364x243.jpg 364w, https://cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-728x485.jpg 728w, https://cdn.harvesttotable.com/htt/2022/04/25172743/Currants-red-bigstock-Branch-Of-Red-Currant-Currant-311240101-608x40 </span><h2 data-dcnode-id="4142" id="h-choosing-the-right-currant-plant"><span class="ez-toc-section" data-dcnode-id="4146" id="Choosing_the_Right_Currant_Plant"></span><strong data-dcnode-id="4144"><span data-dcnode-id="4145" instrument_node="">Choosing the Right Currant Plant</span></strong><span class="ez-toc-section-end" data-dcnode-id="4143"></span></h2><span data-dcnode-id="4141" instrument_node="">
</span><ul data-dcnode-id="4120"><li data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">Red, white, pink, and black currants can be eaten fresh or cooked.</span></li><li data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">Red and white currants have a tart, acidic flavor. Of the two, the white currant is sweeter. (White currants are actually a creamy yellow or faint pink color.) The red currant is tart and acidic flavored. Red and white currants can be eaten raw or cooked.</span></li><li data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">Black currants are sweet and can be eaten straight from the bush or cooked and made into jams, jellies, and juices.</span></li><li data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">Currants can be purchased bare-root or container-grown. Choose certified disease-free plants.</span></li><li data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">Plant bare-root currants in spring. Container-grown plants can be planted spring through autumn; autumn is the ideal planting time for container-grown currants.</span></li><li data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">Currants have a bush form and can grow to 6 feet tall.</span></li><li data-dcnode-id="4121"><span data-dcnode-id="4128" instrument_node="">Black currants have the botanical name </span><em data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">Ribes nigrum</span></em><span data-dcnode-id="4125" instrument_node="">. Red currants and white currants have the botanical name </span><em data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">Ribes uva-crispa</span></em><span data-dcnode-id="4122" instrument_node="">.</span></li></ul><span data-dcnode-id="4119" instrument_node="">
</span><h2 data-dcnode-id="4114" id="h-how-to-plant-currants"><span class="ez-toc-section" data-dcnode-id="4118" id="How_to_Plant_Currants"></span><strong data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">How to Plant Currants</span></strong><span class="ez-toc-section-end" data-dcnode-id="4115"></span></h2><span data-dcnode-id="4113" instrument_node="">
</span><ul data-dcnode-id="4090"><li data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">Plant bare-root currants in spring as soon as the soil can be worked or in fall. Currants leaf out in spring; it’s best to plant currants before they leaf out.</span></li><li data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">Plant container-grown currants in spring or summer; avoid planting them in hot dry weather.</span></li><li data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">Red and white currants grow on a short stem or “leg” from which lateral branches or stems spread out. The stem or leg should be free of side shoots to 4 to 6 inches high. A standard bush can have a leg 2 to 3 feet tall.</span></li><li data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">Black currants do not grow on a leg. Multiple black currant stems emerge directly from the ground instead of branching out from a single trunk.</span></li><li data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">Dig a hole half again as deep at the root ball and twice as wide; moisten the hole before planting. Make a small mound at the bottom of the hole and spread out the roots of the plant so that they run off the mound.</span></li><li data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">Plant red and white currants so that the soil mark of the nursery pot is level with the soil of the new planting hole.</span></li><li data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">Plant black currants so that the soil marks on the stems will sit 2 inches below the surface of the soil. The stems of black currants emerge directly from the soil instead of branching out from a single trunk-like red and white currants.</span></li><li data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">Backfill the hole with half native soil and half aged compost or commercial organic planting mix. Firm in the soil to be sure no air pockets remain around the roots.</span></li><li data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">Cut back the stems of bare-root black currants to about 1 inch above the soil level; only two buds should remain on each stem. Do this to encourage strong root growth. Container-grown black currants with a substantial root system do not need to be cut back.</span></li><li data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">Water the new plant in with a high phosphorus liquid starter fertilizer.</span></li><li data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">Keep the soil evenly moist as the plant begins to grow.</span></li></ul><span data-dcnode-id="4089" instrument_node="">
</span><h2 data-dcnode-id="4084" id="h-spacing-currants"><span class="ez-toc-section" data-dcnode-id="4088" id="Spacing_Currants"></span><strong data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">Spacing Currants</span></strong><span class="ez-toc-section-end" data-dcnode-id="4085"></span></h2><span data-dcnode-id="4083" instrument_node="">
</span><ul data-dcnode-id="4076"><li data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">Space red and white currant bushes 5 feet apart. Space black currants 6 feet apart.</span></li><li data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">Space rows of red and white currants 5 feet apart. Space rows of black currants 6 feet apart.</span></li><li data-dcnode-id="4077"><span data-dcnode-id="4078" instrument_node="">Red and white currants trained to a single leader or stem grown on stakes can be spaced 18 inches apart.</span></li></ul><span data-dcnode-id="4075" instrument_node="">
</span><h2 data-dcnode-id="4070" id="h-yield-and-how-much-to-plant"><span class="ez-toc-section" data-dcnode-id="4074" id="Yield_and_How_Much_to_Plant"></span><strong data-dcnode-id="4072"><span data-dcnode-id="4073" instrument_node="">Yield and How Much to Plant</span></strong><span class="ez-toc-section-end" data-dcnode-id="4071"></span></h2><span data-dcnode-id="4069" instrument_node="">
</span><ul data-dcnode-id="4064"><li data-dcnode-id="4067"><span data-dcnode-id="4068" instrument_node="">One currant bush—red, white, or black–will yield about 10 pounds of currants each year.</span></li><li data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node="">A red or white currant plant grown on a stake or cordon will yield about 2 pounds each year.</span></li></ul><span data-dcnode-id="4063" instrument_node="">
</span><h2 data-dcnode-id="4058" id="h-currant-pollination"><span class="ez-toc-section" data-dcnode-id="4062" id="Currant_Pollination"></span><strong data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">Currant Pollination</span></strong><span class="ez-toc-section-end" data-dcnode-id="4059"></span></h2><span data-dcnode-id="4057" instrument_node="">
</span><ul data-dcnode-id="4054"><li data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">Currants are self-pollinating. New buds and flowers form at the base of last year’s stems.</span></li></ul><span data-dcnode-id="4053" instrument_node="">
</span><h2 data-dcnode-id="4048" id="h-container-growing-currants"><span class="ez-toc-section" data-dcnode-id="4052" id="Container_Growing_Currants"></span><strong data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">Container Growing Currants</span></strong><span class="ez-toc-section-end" data-dcnode-id="4049"></span></h2><span data-dcnode-id="4047" instrument_node="">
</span><ul data-dcnode-id="4040"><li data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">Plant currants in pots 12 to 18 inches wide and deep or wider; currant roots do not grow deep. Currant roots do not mind growing in a tight space. Plant currants in an organic potting mix.</span></li><li data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">Keep the soil evenly moist; feed plants an all-purpose fertilizer.</span></li><li data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">Re-pot currants every three years after harvest; trim roots as necessary to avoid becoming root-bound. Renew the soil when repotting.</span></li></ul><span data-dcnode-id="4039" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="4035"><img alt="Ripe blackcurrants hanging from a branch  grow plant" class="wp-image-74339" data-dcnode-id="4038" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-1024x683.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-1024x683.jpg 1024w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-300x200.jpg 300w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-768x512.jpg 768w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-1536x1024.jpg 1536w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-2048x1365.jpg 2048w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-561x374.jpg 561w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-1122x748.jpg 1122w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-265x177.jpg 265w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-531x354.jpg 531w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-364x243.jpg 364w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-728x485.jpg 728w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-608x405.jpg 608w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-758x505.jpg 758w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-1152x768.jpg 1152w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-72x48.jpg 72w, https://cdn.harvesttotable.com/htt/2022/04/25172656/Currants-black-bigstock-Ripe-Juicy-Blackcurrant-Hangin-334948609-144x96.jpg 144w" width="1024"><figcaption data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">Ripe blackcurrants hanging from a branch. </span></figcaption></figure><span data-dcnode-id="4034" instrument_node="">
</span><h2 data-dcnode-id="4030" id="h-watering-and-feeding-currants"><span class="ez-toc-section" data-dcnode-id="4033" id="Watering_and_Feeding_Currants"></span><span data-dcnode-id="4032" instrument_node="">Watering and Feeding Currants</span><span class="ez-toc-section-end" data-dcnode-id="4031"></span></h2><span data-dcnode-id="4029" instrument_node="">
</span><ul data-dcnode-id="4022"><li data-dcnode-id="4027"><span data-dcnode-id="4028" instrument_node="">Keep currants well-watered; do not let the soil dry out; irregular watering can cause currant skins to crack as they develop or near harvest. Do not splash water on foliage; wet foliage is susceptible to fungal diseases.</span></li><li data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">Feed currants an all-purpose fertilizer in spring; a fertilizer slightly higher in potassium is recommended. During the growing season side-dress currants with a dilute solution of fish emulsion.</span></li><li data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">Avoid high nitrogen fertilizers; nitrogen will increase green growth at the expense of fruit growth.</span></li></ul><span data-dcnode-id="4021" instrument_node="">
</span><h2 data-dcnode-id="4017"><span class="ez-toc-section" data-dcnode-id="4020" id="Currant_Care"></span><span data-dcnode-id="4019" instrument_node="">Currant Care</span><span class="ez-toc-section-end" data-dcnode-id="4018"></span></h2><span data-dcnode-id="4016" instrument_node="">
</span><ul data-dcnode-id="4007"><li data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">Currants are hardy but it’s still a good idea to protect new spring foliage, buds, and flowers from frost by placing row covers over the plants.</span></li><li data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">Keep currant planting beds free of weeds; mulch planting beds with aged compost or commercial organic planting mix to keep down weeds.</span></li><li data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">Protect currants from birds that will eat the buds in late winter and spring and the fruit in summer; place bird netting over plants to exclude birds.</span></li><li data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">Protect new flower buds and flowers from frost in spring; if frost threatens cover budding or flowering plants with a floating row cover.</span></li></ul><span data-dcnode-id="4006" instrument_node="">
</span><h2 data-dcnode-id="3998" id="h-how-to-prune-red-and-white-currants"><span class="ez-toc-section" data-dcnode-id="4005" id="How_to_Prune_Red_and_White_Currants"></span><strong data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">H</span></strong><span data-dcnode-id="4002" instrument_node="">ow to </span><strong data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">Prune Red and White Currants</span></strong><span class="ez-toc-section-end" data-dcnode-id="3999"></span></h2><span data-dcnode-id="3997" instrument_node="">
</span><ul data-dcnode-id="3984"><li data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">During the first two years, prune red and white currants to create an open, vase-like structure. An open structure will allow sunlight and air to reach the interior of the plant and ripen fruit.</span></li><li data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">In the first year, select 3 or 4 main stems that grow away from the leader (main stem) in opposite directions. Cut each back by half. Remove other smaller branches and stems as well as those that are broken or crossing. Create an open vase-like form, an open center. When pruning stems, cut just above an outward-facing bud; new branches will grow outward, not inward.</span></li><li data-dcnode-id="3991"><span data-dcnode-id="3992" instrument_node="">The second-year select 3 or 4 more stems growing away from the leader and allow these to grow on while again pruning away stems that are growing inward. By the third summer, you will have 9 to 12 sturdy stems growing out from the leader or main stem; these will be your main flowering and fruiting stems.</span></li><li data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">The third-year going forward, prune back about half of the previous year’s growth on each outward growing stem and continue to prune away new stems growing inwards; also prune away suckers growing from the base of the plant. During the summer prune, all new side shoots so that there are is just one bud on each stem.</span></li><li data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">At the end of each season of the first three seasons keep 3 or 4 of the best shoots. In the fourth year, remove the stems from the first year, the oldest stems, and keep 3 to 4 of the best new young stems; each following year trim away the oldest wood and renew the plant by selecting the best of the new stems.</span></li><li data-dcnode-id="3985"><span data-dcnode-id="3986" instrument_node="">Currants fruit on older wood; to keep currants productive, cut back young stems and side shoots.</span></li></ul><span data-dcnode-id="3983" instrument_node="">
</span><h2 data-dcnode-id="3978" id="h-how-to-prune-black-currants"><span class="ez-toc-section" data-dcnode-id="3982" id="How_to_Prune_Black_Currants"></span><strong data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">How to Prune Black Currants</span></strong><span class="ez-toc-section-end" data-dcnode-id="3979"></span></h2><span data-dcnode-id="3977" instrument_node="">
</span><ul data-dcnode-id="3968"><li data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">The stems of bare-root black currants (with multiple stems emerging from the soil) should be cut back to about 1 inch above the ground after planting. This will encourage strong root growth.</span></li><li data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">The stems of container-grown black currants that have established roots do not need to be cut back after planting.</span></li><li data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">The second winter after planting, prune new stems that are weak or growing parallel to the ground.</span></li><li data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">Established black currants can be pruned much like gooseberries. Keep the interior of the bush free of weak, broken, diseased, or crossing stems. Also, trim away stems drooping close to the ground. Each year after the third year, cut away 3-year old wood to make way for younger fruiting wood. (Older stems will be dark-colored; newer one- and two-year-old stems will be paler and fruit-bearing; these should not be removed unless they are damaged.)</span></li></ul><span data-dcnode-id="3967" instrument_node="">
</span><h2 data-dcnode-id="3961" id="h-how-to-train-currants"><span class="ez-toc-section" data-dcnode-id="3966" id="How_to_Train_Currants"></span><span data-dcnode-id="3965" instrument_node="">How to </span><strong data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">Train Currants</span></strong><span class="ez-toc-section-end" data-dcnode-id="3962"></span></h2><span data-dcnode-id="3960" instrument_node="">
</span><ul data-dcnode-id="3953"><li data-dcnode-id="3956"><span data-dcnode-id="3959" instrument_node="">Red and white currants can be trained to as a standard, cordon, or fan</span><strong data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">.</span></strong></li><li data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">Train the leader upward and tie it in at one-foot intervals. Prune side shoots in summer so that they have just 5 leaves; in winter prune side shoots so that there is one bud facing outwards. This will generate new fruiting spurs.</span></li></ul><span data-dcnode-id="3952" instrument_node="">
</span><h2 data-dcnode-id="3948"><span class="ez-toc-section" data-dcnode-id="3951" id="Currant_Pests"></span><span data-dcnode-id="3950" instrument_node="">Currant Pests</span><span class="ez-toc-section-end" data-dcnode-id="3949"></span></h2><span data-dcnode-id="3947" instrument_node="">
</span><ul data-dcnode-id="3942"><li data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">Leaves that are eaten may be a sign of caterpillars. Control imported currant worm (sawfly larvae) with a rotenone/pyrethrin mix; control currant borer by cutting off the stem just below the borer entry hole.</span></li><li data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">Curled or twisted leaves may be a sign of aphids; check the undersides of leaves and knock aphids off plants with a steady stream of water.</span></li></ul><span data-dcnode-id="3941" instrument_node="">
</span><h2 data-dcnode-id="3935" id="h-currant-diseases"><span class="ez-toc-section" data-dcnode-id="3940" id="Currant_Diseases"></span><strong data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">Currant </span></strong><span data-dcnode-id="3937" instrument_node="">Diseases</span><span class="ez-toc-section-end" data-dcnode-id="3936"></span></h2><span data-dcnode-id="3934" instrument_node="">
</span><ul data-dcnode-id="3923"><li data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">Currants—particularly black currants–can be a host to blister rust, a disease that can seriously affect white pine trees. If white pines grow in your regions, check with the nearby Cooperative Extension Service to see if planting currants is controlled.</span></li><li data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">Powdery mildew and leaf spot can attack currants; spray the foliage with a fungicide or a solution of 1-part baking soda and 9-parts water.</span></li><li data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Leaves that brown or dieback may be attacked by the fungus botrytis; trim dieback off immediately.</span></li><li data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">Orange or red blisters on leaves can be a sign of the fungal disease rust. Trim away these leaves and spray the plant with a fungicide or compost tea.</span></li><li data-dcnode-id="3924"><span data-dcnode-id="3925" instrument_node="">Gray or brown mold on fruit is a sign of botrytis or another fungal disease; this can also cause leaf dieback. Remove affected fruit and prune to encourage greater air circulation.</span></li></ul><span data-dcnode-id="3922" instrument_node="">
</span><h2 data-dcnode-id="3918"><span class="ez-toc-section" data-dcnode-id="3921" id="Currant_Environmental_Problems"></span><span data-dcnode-id="3920" instrument_node="">Currant Environmental Problems</span><span class="ez-toc-section-end" data-dcnode-id="3919"></span></h2><span data-dcnode-id="3917" instrument_node="">
</span><ul data-dcnode-id="3910"><li data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">Leaves with brown curled edges that look scorched yellow can be a sign of potassium deficiency in the soil.</span></li><li data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">Leaves that turn yellow between the veins (called chlorosis) can be a sign of a manganese or iron deficiency.</span></li><li data-dcnode-id="3911"><span data-dcnode-id="3912" instrument_node="">Cracked skin on currants can be a sign of irregular watering or birds attacking. Keep the soil evenly moist and exclude birds with netting.</span></li></ul><span data-dcnode-id="3909" instrument_node="">
</span><h2 data-dcnode-id="3904" id="h-propagating-currants"><span class="ez-toc-section" data-dcnode-id="3908" id="Propagating_Currants"></span><strong data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">Propagating Currants</span></strong><span class="ez-toc-section-end" data-dcnode-id="3905"></span></h2><span data-dcnode-id="3903" instrument_node="">
</span><ul data-dcnode-id="3894"><li data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">Red and white currants can be propagated by hardwood cuttings and tip layering. Black currants can be propagated by hardwood cuttings, tip layering, and mound layering.</span></li><li data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">Hardwood cutting propagation: take a hardwood cutting in fall; strip the cutting of all but the newest leaves and root in organic potting mix; rooting can take up to a year.</span></li><li data-dcnode-id="3897"><span data-dcnode-id="3898" instrument_node="">Tip layering propagation: bend a low-hanging shoot with at least 3 buds to the ground in mid-summer and hold it in place with garden staple or rock. Cover the stem with soil; the shoot will root in a year’s time and the new plant can be cut away from the parent.</span></li><li data-dcnode-id="3895"><span data-dcnode-id="3896" instrument_node="">Mound layering propagation: cut back all branches to 3 inches after growth starts in spring and then cover the stubs with soil; new shoots will appear and take root; they can be cut away from the mother plant and replanted as new plants.</span></li></ul><span data-dcnode-id="3893" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="3889"><img alt="Black currants grow plant" class="wp-image-74341" data-dcnode-id="3892" height="600" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black.jpg&amp;raw" srcset="https://cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black.jpg 900w, https://cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black-300x200.jpg 300w, https://cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black-768x512.jpg 768w, https://cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black-561x374.jpg 561w, https://cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black-265x177.jpg 265w, https://cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black-531x354.jpg 531w, https://cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black-364x243.jpg 364w, https://cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black-728x485.jpg 728w, https://cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black-608x405.jpg 608w, https://cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black-758x505.jpg 758w, https://cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black-72x48.jpg 72w, https://cdn.harvesttotable.com/htt/2022/04/25131450/Currant-black-144x96.jpg 144w" width="900"><figcaption data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">Black currants</span></figcaption></figure><span data-dcnode-id="3888" instrument_node="">
</span><h2 data-dcnode-id="3883" id="h-harvesting-currants"><span class="ez-toc-section" data-dcnode-id="3887" id="Harvesting_Currants"></span><strong data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">Harvesting Currants</span></strong><span class="ez-toc-section-end" data-dcnode-id="3884"></span></h2><span data-dcnode-id="3882" instrument_node="">
</span><ul data-dcnode-id="3865"><li data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">Harvest currants when they taste sweet. Red currants will turn bright scarlet when ripe; taste white currants to determine when they are ripe. Ripe black currants will be shiny blue-black.</span></li><li data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">Fruit on an individual plant commonly does not ripen all at once; you will likely have to revisit plants to harvest again. Generally, the fruit at the top of the truss (called “strig”) ripens first. Some recent cultivars have been bred to ripen fruit simultaneously. Taste to determine ripeness if in doubt.</span></li><li data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">Ripe currants can be eaten raw. Less ripe or firm fruits can be used for cooking or preserving.</span></li><li data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">The first crop will come the second season after planting.</span></li><li data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">Currants for cooking and making jelly should be harvested slightly underripe (they contain more pectin at that stage); unripe currants retain some acidity.</span></li><li data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">Currants for fresh eating or desserts should be allowed to ripen fully on the bush.</span></li><li data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">Currants develop full flavor only when they are left to ripen on the bush. Ripe currants will be full-colored.</span></li><li data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">The harvest of one plant will last five to six weeks.</span></li></ul><span data-dcnode-id="3864" instrument_node="">
</span><h2 data-dcnode-id="3860"><span class="ez-toc-section" data-dcnode-id="3863" id="How_to_Store_Currants"></span><span data-dcnode-id="3862" instrument_node="">How to Store Currants</span><span class="ez-toc-section-end" data-dcnode-id="3861"></span></h2><span data-dcnode-id="3859" instrument_node="">
</span><ul data-dcnode-id="3854"><li data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">Keep harvested berries out of direct sunlight.</span></li><li data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">Currants will keep in the refrigerator for only a few days. Currants can be frozen for later use.</span></li></ul><span data-dcnode-id="3853" instrument_node="">
</span><h2 data-dcnode-id="3848" id="h-fall-and-winter-currant-care"><span class="ez-toc-section" data-dcnode-id="3852" id="Fall_and_Winter_Currant_Care"></span><strong data-dcnode-id="3850"><span data-dcnode-id="3851" instrument_node="">Fall and Winter Currant Care</span></strong><span class="ez-toc-section-end" data-dcnode-id="3849"></span></h2><span data-dcnode-id="3847" instrument_node="">
</span><ul data-dcnode-id="3842"><li data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">Feed currants a moderate amount of nitrogen and a high amount of potassium and magnesium in late winter.</span></li><li data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">Thin currant stems and branches in winter if not done sooner. See pruning instructions above.</span></li></ul><span data-dcnode-id="3841" instrument_node="">
</span><h2 data-dcnode-id="3836" id="h-currant-varieties-to-plant"><span class="ez-toc-section" data-dcnode-id="3840" id="Currant_Varieties_to_Plant"></span><strong data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">Currant Varieties to Plant</span></strong><span class="ez-toc-section-end" data-dcnode-id="3837"></span></h2><span data-dcnode-id="3835" instrument_node="">
</span><ul data-dcnode-id="3828"><li data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">Red currants are perhaps the most popular; varieties include ‘Red Lake’, ‘Minnesota 71’, ‘Perfection’, ‘Wilder’, ‘Red Cross’, ‘Fay’, ‘Red Lake’, ‘Stanza’, ‘Rovada’, ‘Jonkheer van Tets’, ‘Junifer’. Highly productive varieties include ‘Red Lake’, ‘Perfection’, ‘Wilder’.</span></li><li data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">White currants varieties include ‘White Grace’, ‘White Imperial’, ‘White Versailles’, ‘Blanka’.</span></li><li data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">Black currant varieties include ‘Ebony’, ‘Ben Lomond’, ‘Ben Sarek’, ‘Big Ben’, ‘Ben Connan’, ‘Baldwin’, ‘Titania’. Black currant plants and fruit can sometimes have an unpleasant odor.</span></li></ul><span data-dcnode-id="3827" instrument_node="">
