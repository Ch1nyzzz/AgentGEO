</span><h1 data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Successful Fruit Tree Pruning</span></h1><span data-dcnode-id="1200" instrument_node="">
</span><div class="margin-bottom-lg featured-image" data-dcnode-id="1185"><span data-dcnode-id="1199" instrument_node="">
</span><picture class="img-responsive" data-dcnode-id="1187"><span data-dcnode-id="1198" instrument_node="">
</span><span data-dcnode-id="1196" instrument_node="">
</span><source data-dcnode-id="1195" media="(min-width:560px)" srcset="//www.starkbros.com/blog/wp-content/uploads/2011/01/New-Apple-Tree-Pruning-at-Planting-Time_LG.jpg"><source data-dcnode-id="1194" media="(min-width:360px)" srcset="//www.starkbros.com/blog/wp-content/uploads/2011/01/New-Apple-Tree-Pruning-at-Planting-Time_MD.jpg"><source data-dcnode-id="1193" media="(min-width:0px)" srcset="//www.starkbros.com/blog/wp-content/uploads/2011/01/New-Apple-Tree-Pruning-at-Planting-Time_SM.jpg"><span data-dcnode-id="1192" instrument_node="">
</span><span data-dcnode-id="1190" instrument_node="">
</span><img alt="pruning fruit trees" class="img-responsive" data-dcnode-id="1189" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starkbros.com/blog/wp-content/uploads/2011/01/New-Apple-Tree-Pruning-at-Planting-Time_SM.jpg&amp;raw" srcset=""><span data-dcnode-id="1188" instrument_node="">
</span></picture><span data-dcnode-id="1186" instrument_node="">
</span></div><span data-dcnode-id="1184" instrument_node="">
</span><div class="article-content" data-dcnode-id="1013"><span data-dcnode-id="1183" instrument_node="">
</span><p class="meta-description" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">To get a new fruit tree off to the right start, virtually nothing is as important as proper pruning. Follow our pruning guide to avoid mistakes and shape your trees for years of enjoyment ahead.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">If left unpruned, fruit trees may struggle in growth, and, if you encounter an unfortunate drought, they may not grow at all. More importantly, unpruned trees take longer to bear fruit! All bare-root&nbsp;Stark Bro's trees are pruned in the nursery row for proper shaping, and our trees are also pruned right before packing and shipping.</span></p><span data-dcnode-id="1175" instrument_node="">
</span><h3 data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Why we take pruning seriously:</span></h3><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1169"><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">•&nbsp;Survival</span></strong></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node="">First, a tree needs pruning to help it </span><span data-dcnode-id="1165" style="text-decoration: underline;"><span data-dcnode-id="1166" instrument_node="">survive</span></span><span data-dcnode-id="1164" instrument_node=""> after planting. In digging, a bare-root trees' roots have been disturbed. The trees have lost many of their tiny feeder roots, which are needed to absorb moisture and nutrients, but the top is still its full size! This imbalance can cause tree growth to be weak and slow.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1159"><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">•&nbsp;Stimulation</span></strong></p><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1157" instrument_node="">In addition, cutting the tree back </span><span data-dcnode-id="1155" style="text-decoration: underline;"><span data-dcnode-id="1156" instrument_node="">stimulates</span></span><span data-dcnode-id="1154" instrument_node=""> stronger, more vigorous, growth from the remaining buds. After a single growing season, a pruned tree will be bigger than a matching unpruned tree.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1149"><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">•&nbsp;Shaping</span></strong></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1147" instrument_node="">The natural shape of a fruit tree is not always the best for maximum fruit production. It's best to start the </span><span data-dcnode-id="1145" style="text-decoration: underline;"><span data-dcnode-id="1146" instrument_node="">shaping</span></span><span data-dcnode-id="1144" instrument_node=""> process as early as possible, particularly to balance the top portion with the root system.</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">These are just a few reasons all eligible&nbsp;Stark Bro's trees are professionally pruned before they arrive at your door: we want to get you off to the best start possible.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1132"><em data-dcnode-id="1134"><span data-dcnode-id="1138" instrument_node="">Please note:&nbsp;When your Stark Bro's bare-root trees arrive pre-pruned by our professionals, do not prune them again when you plant. Plan to prune your fruit trees during every dormant season. In Zone 6 and further north, you should wait until late winter. A good reference, such as our </span><a data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starkbros.com/products/tools-and-supplies/books/pruning-made-easy"><span data-dcnode-id="1137" instrument_node="">Pruning Made Easy</span></a><span data-dcnode-id="1135" instrument_node=""> book, is handy for addressing questions and guiding you through the pruning process.</span></em><span data-dcnode-id="1133" instrument_node="">
</span></p><span data-dcnode-id="1131" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1128"><figure class="aligncenter" data-dcnode-id="1129"><img alt="&quot;Tips from the Pros&quot;" class="wp-image-1854" data-dcnode-id="1130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starkbros.com/blog/wp-content/uploads/2011/01/Screen-shot-2011-01-04-at-10.38.55-AM.png&amp;raw"></figure></div><span data-dcnode-id="1127" instrument_node="">
</span><h3 data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Continue Pruning for Success</span></h3><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1117"><em data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">“The best time to prune is when the knife is sharp,”</span></em><span data-dcnode-id="1121" instrument_node=""> old-time gardeners say. Well, that’s not </span><em data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">exactly</span></em><span data-dcnode-id="1118" instrument_node=""> true... fruit trees develop better if they’re pruned at the right times, in the right ways. Here's how:
</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1113"><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">• Prune trees when they are dormant</span></strong></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1111" instrument_node="">Wait until a tree is </span><span data-dcnode-id="1109" style="text-decoration: underline;"><span data-dcnode-id="1110" instrument_node="">dormant</span></span><span data-dcnode-id="1108" instrument_node=""> before pulling out the sheers! This is best for the tree and easiest for you. It's easier to see where to make your cuts when the leaves have fallen. As mentioned above, pruning should be done in late fall, winter, or early spring. Exact timing will vary by zone, as winter months differ by zone.</span></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1103"><strong data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">• Prune fruit trees to certain shapes</span></strong></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">Prune into strong, bearing trees following the chart below. &nbsp;If you keep up&nbsp;with your pruning and shaping each year, you’ll make mostly small, easy-to-heal cuts.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1096"><strong data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">• Help the tree form a strong framework</span></strong></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Remove weak, diseased, injured or narrow-angle branches (the weaker of any crossing or interfering branches), and one branch of forked limbs. Also remove upright branches and any that grow toward the center of tree. You want to keep your tree from becoming too thick and crowded and to keep its height reasonable. All these objectives promote improved bearing, which is your overall aim. Try to achieve the general shape of the trees in the drawings provided, but be sure to allow your tree to express its own individuality.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1089"><figure class="aligncenter" data-dcnode-id="1090"><img alt="pruning diagram showcasing pruning on non-fruiting branches to open up for better airflow" class="wp-image-1856" data-dcnode-id="1091" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starkbros.com/blog/wp-content/uploads/2011/01/Screen-shot-2011-01-04-at-10.38.29-AM.png&amp;raw"></figure></div><span data-dcnode-id="1088" instrument_node="">
</span><h3 data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Tips for Pruning</span></h3><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1082"><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">•&nbsp;Apple, Pear, European Blue Plums &amp; Cherry Trees</span></strong></p><span data-dcnode-id="1081" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1078"><figure class="aligncenter" data-dcnode-id="1079"><img alt="Central Leader Example by season" class="wp-image-1844" data-dcnode-id="1080" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starkbros.com/blog/wp-content/uploads/2011/01/Screen-shot-2011-01-04-at-10.38.09-AM.png&amp;raw"></figure></div><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">These trees do&nbsp;best when pruned and trained to a central leader tree. This type of tree has a pyramidal shape with a single upright leader limb as its highest point. This leader is the newest extension of a long, upright growing trunk from which&nbsp;all lateral branches arise. As with all strong growing branches, the leader should be headed back each year. The uppermost bud on the leader produces a vigorous new leader, and no other shoot should be allowed to grow taller. Lateral limbs should be selected from shoots growing out from the central leader. These should be spaced vertically 4-6” apart, have growth that is more horizontal than vertical and point in different compass directions from the trunk.
</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1071"><strong data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">•&nbsp;Peach, Nectarine, Japanese Plums &amp; Apricot Trees</span></strong></p><span data-dcnode-id="1070" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1067"><figure class="aligncenter" data-dcnode-id="1068"><img alt="3rd or 4th season" class="wp-image-1857" data-dcnode-id="1069" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starkbros.com/blog/wp-content/uploads/2011/01/Screen-shot-2011-01-04-at-10.38.40-AM.png&amp;raw"></figure></div><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">These trees do best when pruned and trained to a vase-shape. This type of tree should have no central leader. The shape of the tree is controlled by selecting and maintaining three to five main scaffold limbs arising from the trunk. These limbs should point in different directions and originate no less than 18" and no more than 36” from the ground.&nbsp;Prune as shown, balancing growth evenly between the scaffold limbs.
</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1060"><strong data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">•&nbsp;Miniature Peach, Nectarine &amp; Apricot Trees</span></strong></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">These do not require shaping cuts. However, because they grow so densely, they require regular dormant thinning cuts to remove competing and crossing limbs.
</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1053"><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">•&nbsp;Whips (Unbranched Trees)</span></strong></p><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Prune back to 28-36” above the ground at planting time. After the new branches have grown 3-5”, select a shoot to become the leader and scaffold limbs.
</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1046"><strong data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">• Off-Season Pruning</span></strong></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Sometimes pruning should be done even when the season isn’t the best. Such would be the case if a branch is broken by the wind or by a heavy load of fruit. Emergency treatment is necessary! Prune back the ragged edges, making a smooth cut that leaves no stubby stump. Fast-growing “water sprouts” can be removed as soon as you see them, rather than waiting until winter.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">
