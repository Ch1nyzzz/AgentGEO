				Tree Pruning Dos and Don’ts			</span></h1><span data-dcnode-id="10961" instrument_node="">
</span></header><span data-dcnode-id="10959" instrument_node="">
</span><div class="below-entry-meta" data-dcnode-id="10926"><span data-dcnode-id="10958" instrument_node="">
</span><span class="posted-on" data-dcnode-id="10950"><a data-dcnode-id="10951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//treecaretips.org/pruning-dos-and-donts/pruning/" rel="bookmark" title="5:35 pm"><i class="fa fa-calendar-o" data-dcnode-id="10957"></i><span data-dcnode-id="10956" instrument_node=""> </span><time class="entry-date published" data-dcnode-id="10954" datetime="2016-09-16T17:35:01+00:00"><span data-dcnode-id="10955" instrument_node="">September 16, 2016</span></time><time class="updated" data-dcnode-id="10952" datetime="2022-01-10T16:58:43+00:00"><span data-dcnode-id="10953" instrument_node="">January 10, 2022</span></time></a></span><span data-dcnode-id="10949" instrument_node="">

</span><div class="entry-content clearfix" data-dcnode-id="10858"><span data-dcnode-id="10924" instrument_node="">
</span><h2 data-dcnode-id="10921"><strong data-dcnode-id="10922"><span data-dcnode-id="10923" instrument_node="">DO:</span></strong></h2><span data-dcnode-id="10920" instrument_node="">
</span><ul data-dcnode-id="10907"><span data-dcnode-id="10919" instrument_node="">
</span><li data-dcnode-id="10915"><span data-dcnode-id="10918" instrument_node="">Ask your arborist or tree care company if they prune according to the American National Standards Institute standard for tree pruning, which is called ANSI A300.</span><br data-dcnode-id="10917"><span data-dcnode-id="10916" instrument_node="">
This standard recommends, and in some cases requires, that the use of certain tools, cutting techniques, and pruning methods be followed, and sets the standard definitions for terms the arborist will use in your estimate. Properly written work estimates for tree pruning should be written in accordance with ANSI A300 standards.</span></li><span data-dcnode-id="10914" instrument_node="">
</span><li data-dcnode-id="10912"><span data-dcnode-id="10913" instrument_node="">Remember that poor pruning can cause damage that lasts for the life of the tree.</span></li><span data-dcnode-id="10911" instrument_node="">
</span><li data-dcnode-id="10909"><span data-dcnode-id="10910" instrument_node="">Assess your trees after a storm to see if there is pruning needed.</span></li><span data-dcnode-id="10908" instrument_node="">
</span></ul><span data-dcnode-id="10906" instrument_node="">
</span><h2 data-dcnode-id="10904"><span data-dcnode-id="10905" instrument_node="">DON’T:</span></h2><span data-dcnode-id="10903" instrument_node="">
</span><ul data-dcnode-id="10874"><span data-dcnode-id="10902" instrument_node="">
</span><li data-dcnode-id="10900"><span data-dcnode-id="10901" instrument_node="">Prune without a good reason</span></li><span data-dcnode-id="10899" instrument_node="">
</span><li data-dcnode-id="10897"><span data-dcnode-id="10898" instrument_node="">Remove any more than 25 percent of foliage during a growing season.</span></li><span data-dcnode-id="10896" instrument_node="">
</span><li data-dcnode-id="10894"><span data-dcnode-id="10895" instrument_node="">Prune a newly planted tree for the first year, unless you are removing dead or broken branches.</span></li><span data-dcnode-id="10893" instrument_node="">
</span><li data-dcnode-id="10891"><span data-dcnode-id="10892" instrument_node="">Prune within 10 feet of a utility conductor – leave it to the pros.</span></li><span data-dcnode-id="10890" instrument_node="">
</span><li data-dcnode-id="10888"><span data-dcnode-id="10889" instrument_node="">Try to tackle a pruning job that requires a chain saw and ladder work – leave it to the pros.</span></li><span data-dcnode-id="10887" instrument_node="">
</span><li data-dcnode-id="10885"><span data-dcnode-id="10886" instrument_node="">Leave branch stubs, or cut off the branch collar (not make a flush cut).</span></li><span data-dcnode-id="10884" instrument_node="">
</span><li data-dcnode-id="10882"><span data-dcnode-id="10883" instrument_node="">Climb the tree with climbing spikes</span></li><span data-dcnode-id="10881" instrument_node="">
</span><li data-dcnode-id="10879"><span data-dcnode-id="10880" instrument_node="">Use wound paint</span></li><span data-dcnode-id="10878" instrument_node="">
</span><li data-dcnode-id="10876"><span data-dcnode-id="10877" instrument_node="">Strip out inner foliage and branches (also called lion-tailing)</span></li><span data-dcnode-id="10875" instrument_node="">
</span></ul><span data-dcnode-id="10873" instrument_node="">
</span><p data-dcnode-id="10869"><span data-dcnode-id="10872" instrument_node="">Use TCIA’s search tool to </span><a data-dcnode-id="10870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tcia.org/TCIA/MEMBERSHIP/Find_Quality_Tree_Care/TCIA/Directories/FindQualifiedTreeCare.aspx"><span data-dcnode-id="10871" instrument_node="">hire a professional arborist or tree care company.</span></a></p><span data-dcnode-id="10868" instrument_node="">
</span><h3 data-dcnode-id="10866"><span data-dcnode-id="10867" instrument_node="">Pruning Infographic</span></h3><span data-dcnode-id="10865" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="9934"><span data-dcnode-id="9941" instrument_node="">
</span><p data-dcnode-id="9939"><span data-dcnode-id="9940" instrument_node="">I have this huge fruit tree in my backyard, and I think it is about time to begin pruning. I really appreciate you giving me some information on the things that I should do, and not do when pruning a tree. But, do these tips still apply to a fruit tree?</span></p><span data-dcnode-id="9938" instrument_node="">
</span><a aria-label="Reply to Brandon Roberts" class="comment-reply-link" data-belowelement="comment-419" data-commentid="419" data-dcnode-id="9936" data-postid="75" data-replyto="Reply to Brandon Roberts" data-respondelement="respond" href="#comment-419" rel="nofollow"><span data-dcnode-id="9937" instrument_node="">Reply</span></a><span data-dcnode-id="9935" instrument_node=""> </span></section><span data-dcnode-id="9932" instrument_node="">

</span><article class="comment" data-dcnode-id="9889" id="comment-423"><span data-dcnode-id="9926" instrument_node="">
</span><header class="comment-meta comment-author vcard" data-dcnode-id="9912"><span data-dcnode-id="9925" instrument_node="">
</span><img alt="" class="avatar avatar-74 photo" data-dcnode-id="9924" height="74" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/200d38be34bfb7c97f616afd71ec4f36%3Fs%3D74%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/200d38be34bfb7c97f616afd71ec4f36?s=148&amp;d=mm&amp;r=g 2x" width="74"><div class="comment-author-link" data-dcnode-id="9920"><i class="fa fa-user" data-dcnode-id="9923"></i><a class="url" data-dcnode-id="9921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.treecaretips.org/" rel="external nofollow ugc"><span data-dcnode-id="9922" instrument_node="">Linnie Leavines</span></a></div><div class="comment-date-time" data-dcnode-id="9917"><i class="fa fa-calendar-o" data-dcnode-id="9919"></i><span data-dcnode-id="9918" instrument_node="">July 8, 2015 at 10:07 am</span></div><a class="comment-permalink" data-dcnode-id="9914" href="#comment-423"><i class="fa fa-link" data-dcnode-id="9916"></i><span data-dcnode-id="9915" instrument_node="">Permalink</span></a><span data-dcnode-id="9913" instrument_node=""> </span></header><span data-dcnode-id="9910" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="9892"><span data-dcnode-id="9909" instrument_node="">
</span><p data-dcnode-id="9907"><span data-dcnode-id="9908" instrument_node="">Before beginning any pruning operations, you need to have a reason why you are pruning. If this is an older fruit tree that has never been pruned, you will first want to prune the tree for safety and good structure. If you can do this from the ground without standing on a ladder, use a hand saw or polesaw/pruner to remove any dead, broken or crossing branches. For more information on good pruning cuts, check out the articles in our “Pruning” section.</span></p><span data-dcnode-id="9906" instrument_node="">
</span><p data-dcnode-id="9900"><span data-dcnode-id="9905" instrument_node="">Then, you might want to have good fruit production. This second pruning method will need to be applied over several years to get good fruit. The key is to not prune all branches to the final stage all in one season. You will alter the growth pattern of the tree and it will not be the “pretty tree with beautiful fruit” that you are hoping for. Here are some guidelines:</span><br data-dcnode-id="9904"><span data-dcnode-id="9903" instrument_node="">
</span><a data-dcnode-id="9901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dld4HI1d0coU%26index%3D5%26list%3DPL-jmA24YfXeFFdpoQuWzwnUrdVmzdoMDe" rel="nofollow ugc"><span data-dcnode-id="9902" instrument_node="">https://www.youtube.com/watch?v=ld4HI1d0coU&amp;index=5&amp;list=PL-jmA24YfXeFFdpoQuWzwnUrdVmzdoMDe</span></a></p><span data-dcnode-id="9899" instrument_node="">
</span><p data-dcnode-id="9897"><span data-dcnode-id="9898" instrument_node="">You might want to get a qualified tree care provider onsite to give you some pointers.</span></p><span data-dcnode-id="9896" instrument_node="">
</span><a aria-label="Reply to Linnie Leavines" class="comment-reply-link" data-belowelement="comment-423" data-commentid="423" data-dcnode-id="9894" data-postid="75" data-replyto="Reply to Linnie Leavines" data-respondelement="respond" href="#comment-423" rel="nofollow"><span data-dcnode-id="9895" instrument_node="">Reply</span></a><span data-dcnode-id="9893" instrument_node=""> </span></section><span data-dcnode-id="9890" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="9853"><span data-dcnode-id="9860" instrument_node="">
</span><p data-dcnode-id="9858"><span data-dcnode-id="9859" instrument_node="">Thanks for the great tips on pruning the trees, it will really help my clean up my yard. When you say don’t “cut off the branch collar,” does that mean I am supposed the branch off directly at the base? I don’t want to do lasting damage to my trees, so I need to be sure.</span></p><span data-dcnode-id="9857" instrument_node="">

</span><article class="comment" data-dcnode-id="9818" id="comment-424"><span data-dcnode-id="9845" instrument_node="">
</span><header class="comment-meta comment-author vcard" data-dcnode-id="9831"><span data-dcnode-id="9844" instrument_node="">
</span><img alt="" class="avatar avatar-74 photo" data-dcnode-id="9843" height="74" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/200d38be34bfb7c97f616afd71ec4f36%3Fs%3D74%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/200d38be34bfb7c97f616afd71ec4f36?s=148&amp;d=mm&amp;r=g 2x" width="74"><div class="comment-author-link" data-dcnode-id="9839"><i class="fa fa-user" data-dcnode-id="9842"></i><a class="url" data-dcnode-id="9840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.treecaretips.org/" rel="external nofollow ugc"><span data-dcnode-id="9841" instrument_node="">Linnie Leavines</span></a></div><div class="comment-date-time" data-dcnode-id="9836"><i class="fa fa-calendar-o" data-dcnode-id="9838"></i><span data-dcnode-id="9837" instrument_node="">July 8, 2015 at 10:07 am</span></div><a class="comment-permalink" data-dcnode-id="9833" href="#comment-424"><i class="fa fa-link" data-dcnode-id="9835"></i><span data-dcnode-id="9834" instrument_node="">Permalink</span></a><span data-dcnode-id="9832" instrument_node=""> </span></header><span data-dcnode-id="9829" instrument_node="">
</span><section class="comment-content comment" data-dcnode-id="9821"><span data-dcnode-id="9828" instrument_node="">
</span><p data-dcnode-id="9826"><span data-dcnode-id="9827" instrument_node="">Pruning cuts should be made just outside the branch collar, or the swollen place of attachment at the base of the branch. So your finished pruning cut will look like a small bump on the tree trunk. Even though it might look odd, this is how the tree wants to be treated so it can close the wound on its own in the fastest manner.</span></p><span data-dcnode-id="9825" instrument_node="">

</span><p data-dcnode-id="6785"><span data-dcnode-id="6786" instrument_node="">It’s definitely best to ask the professionals. We recently had a neighbour of a friend who started cutting down a mulberry tree in their yard that was located next to their house. They were told by a relative that mulberry trees can cause issues with the root system getting into pipes and into concrete foundations. This is true…. but there is only one type of non-fruiting Californian Mulberry tree that is capable of this. They had cut down a perfectly harmless, beautiful fruiting mulberry tree for nothing. </span></p><span data-dcnode-id="6784" instrument_node="">
</span><p data-dcnode-id="6782"><span data-dcnode-id="6783" instrument_node="">Needless to say they were heart broken when I came to remove the stump and told them.</span></p><span data-dcnode-id="6781" instrument_node="">

</span><section class="comment-content comment" data-dcnode-id="2845"><span data-dcnode-id="2856" instrument_node="">
</span><p data-dcnode-id="2850"><span data-dcnode-id="2855" instrument_node="">I hardly ever use a bagger. Leaving clips on the lawn leads to healthier lawn soil and doesn’t cause thatch, as some people believe. The key is cutting often enough that you never get long clips that mat.</span><br data-dcnode-id="2854"><span data-dcnode-id="2853" instrument_node="">
When I can’t cut my grass often enough, I blow the clips into the center and then rake and compost the “channel” that’s left.</span><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">
If you really want to bag anyway (which removes the nutrients and organic matter in the clips), the only time to bag would be when the mowing is producing more visible clips than you tolerate cosmetically. If you can’t even see the clips as you mow, there’s no good reason to use the bag at all.</span></p><span data-dcnode-id="2849" instrument_node="">
</span><a aria-label="Reply to Shah Mohammad Polash" class="comment-reply-link" data-belowelement="comment-6453" data-commentid="6453" data-dcnode-id="2847" data-postid="75" data-replyto="Reply to Shah Mohammad Polash" data-respondelement="respond" href="#comment-6453" rel="nofollow"><span data-dcnode-id="2848" instrument_node="">Reply</span></a><span data-dcnode-id="2846" instrument_node=""> </span></section><span data-dcnode-id="2843" instrument_node="">
