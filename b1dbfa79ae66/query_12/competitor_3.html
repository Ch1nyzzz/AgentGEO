</span></div><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="895"><b data-dcnode-id="897"><span data-dcnode-id="899" instrument_node=""> Q: When is the best time to prune the new growth on apple trees?</span><br data-dcnode-id="898"></b><span data-dcnode-id="896" instrument_node="">
</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">According to apple expert Derry Walsh (see our feature on her apple farm in our Fall 2009 issue of GardenWise Magazine):
</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">
"Trees should not be pruned before they have “filled their space".
</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">
When they reach this level of maturity they can be pruned either in winter when they are dormant, or in summer (late July, August). Dormant-pruning invigorates a tree, summer-pruning devigorates it. In either case, branches should be reduced by approximately one-third.
</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">
Prune apple trees in late July, rather than the old method of winter pruning. This practice, although developed over a century ago in France by Louis Lorette, was not given much credence for many years. However, proponents hold that summer-pruning increases light on the fruit, which leads to better size and colour, increases the likelihood of new fruit buds on pruned branches and reduces the number of unproductive shoots (“water shoots”). And it is also a more pleasant time to be out in the garden. 
</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="881" instrument_node="">
Select branches (risers) in the middle of the tree (because the upper part of the tree gets good light as it is), choosing ones that are of pencil-thickness, more than 30 cm (12 in.) long, and woody for one-third of their length. Cut all of these risers back to 5 cm (2 in.) from the main branch." </span><br data-dcnode-id="880"></p><span data-dcnode-id="878" instrument_node="">
