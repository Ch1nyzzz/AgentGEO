</span><div class="two-third-column one" data-dcnode-id="119"><span data-dcnode-id="491" instrument_node="">
</span><h2 data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Trimmomatic: A flexible read trimming tool for Illumina NGS data</span></h2><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">&nbsp;</span></p><span data-dcnode-id="485" instrument_node="">
</span><h3 data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Citations</span></h3><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="481" instrument_node="">Bolger, A. M., Lohse, M., &amp; Usadel, B. (2014). Trimmomatic: A flexible trimmer for Illumina Sequence Data. </span><em data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Bioinformatics</span></em><span data-dcnode-id="478" instrument_node="">, btu170.</span></p><span data-dcnode-id="476" instrument_node="">
</span><h3 data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="473" instrument_node="">
</span><h3 data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Downloading Trimmomatic</span></h3><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="469" instrument_node="">starting on version 0.40 we also offer a </span><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/usadellab/Trimmomatic"><span data-dcnode-id="468" instrument_node="">github page</span></a><span data-dcnode-id="466" instrument_node=""> (as well as older versions)</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="463" instrument_node="">Version 0.39: </span><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usadellab.org/cms/uploads/supplementary/Trimmomatic/Trimmomatic-0.39.zip"><span data-dcnode-id="462" instrument_node="">binary</span></a><span data-dcnode-id="460" instrument_node="">, </span><a data-dcnode-id="458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usadellab.org/cms/uploads/supplementary/Trimmomatic/Trimmomatic-Src-0.39.zip"><span data-dcnode-id="459" instrument_node="">source</span></a><span data-dcnode-id="457" instrument_node=""> and </span><a data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usadellab.org/cms/uploads/supplementary/Trimmomatic/TrimmomaticManual_V0.32.pdf"><span data-dcnode-id="456" instrument_node="">manual</span></a></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="452" instrument_node="">Version 0.36: </span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usadellab.org/cms/uploads/supplementary/Trimmomatic/Trimmomatic-0.36.zip"><span data-dcnode-id="451" instrument_node="">binary</span></a><span data-dcnode-id="449" instrument_node=""> and </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usadellab.org/cms/uploads/supplementary/Trimmomatic/Trimmomatic-Src-0.36.zip"><span data-dcnode-id="448" instrument_node="">source</span></a></p><span data-dcnode-id="445" instrument_node="">
</span><h3 data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="442" instrument_node="">
</span><h3 data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Quick start</span></h3><span data-dcnode-id="439" instrument_node="">
</span><h4 data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Paired End:</span></h4><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">With most new data sets you can use gentle quality trimming and adapter clipping.</span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="432" instrument_node="">You often don't need leading and traling clipping. Also in general setting&nbsp;</span><em data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">keepBothReads</span></em><span data-dcnode-id="429" instrument_node="">&nbsp;to True can be useful when working with paired end data, you will keep even redunfant information but this likely makes your pipelines more manageable. Note the additional :2 in front of True (for keepBothReads) this is the minimum adapter length in palindrome mode, you can even set this to 1. (Default is a very conservative 8)</span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">If you have questions please don't hesitate to contact us, this is not necessarily one size fits all. (e.g. RNAseq expression analysis vs DNA assembly).</span></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="418"><code data-dcnode-id="419"><span data-dcnode-id="423" instrument_node="">java -jar trimmomatic-0.39.jar PE input_forward.fq.gz input_reverse.fq.gz output_forward_paired.fq.gz output_forward_unpaired.fq.gz output_reverse_paired.fq.gz output_reverse_unpaired.fq.gz ILLUMINACLIP:TruSeq3-PE.fa:2:30:10:2:True&nbsp;</span><code data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">LEADING:3 TRAILING:3</span></code><span data-dcnode-id="420" instrument_node=""> MINLEN:36</span></code></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">&nbsp;</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">for reference only (less sensitive for adapters)</span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="408"><code data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">java -jar trimmomatic-0.35.jar PE -phred33 input_forward.fq.gz input_reverse.fq.gz output_forward_paired.fq.gz output_forward_unpaired.fq.gz output_reverse_paired.fq.gz output_reverse_unpaired.fq.gz ILLUMINACLIP:TruSeq3-PE.fa:2:30:10 LEADING:3 TRAILING:3 SLIDINGWINDOW:4:15 MINLEN:36</span></code></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">This will perform the following:</span></p><span data-dcnode-id="404" instrument_node="">
</span><ul data-dcnode-id="387"><span data-dcnode-id="403" instrument_node="">
</span><li data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Remove adapters (ILLUMINACLIP:TruSeq3-PE.fa:2:30:10)</span></li><span data-dcnode-id="400" instrument_node="">
</span><li data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Remove leading low quality or N bases (below quality 3) (LEADING:3)</span></li><span data-dcnode-id="397" instrument_node="">
</span><li data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Remove trailing low quality or N bases (below quality 3) (TRAILING:3)</span></li><span data-dcnode-id="394" instrument_node="">
</span><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Scan the read with a 4-base wide sliding window, cutting when the average quality per base drops below 15 (SLIDINGWINDOW:4:15)</span></li><span data-dcnode-id="391" instrument_node="">
</span><li data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Drop reads below the 36 bases long (MINLEN:36)</span></li><span data-dcnode-id="388" instrument_node="">
</span></ul><span data-dcnode-id="386" instrument_node="">
</span><h4 data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Single End:</span></h4><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="380"><code data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">java -jar trimmomatic-0.35.jar SE -phred33 input.fq.gz output.fq.gz ILLUMINACLIP:TruSeq3-SE:2:30:10 LEADING:3 TRAILING:3 SLIDINGWINDOW:4:15 MINLEN:36</span></code></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">This will perform the same steps, using the single-ended adapter file</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">&nbsp;</span></p><span data-dcnode-id="373" instrument_node="">
</span><h3 data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Description</span></h3><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Trimmomatic performs a variety of useful trimming tasks for illumina paired-end and single ended data.The selection of trimming steps and their associated parameters are supplied on the command line.</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">The current trimming steps are:</span></p><span data-dcnode-id="364" instrument_node="">
</span><ul data-dcnode-id="335"><span data-dcnode-id="363" instrument_node="">
</span><li data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">ILLUMINACLIP: Cut adapter and other illumina-specific sequences from the read.</span></li><span data-dcnode-id="360" instrument_node="">
</span><li data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">SLIDINGWINDOW: Perform a sliding window trimming, cutting once the average quality within the window falls below a threshold.</span></li><span data-dcnode-id="357" instrument_node="">
</span><li data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">LEADING: Cut bases off the start of a read, if below a threshold quality</span></li><span data-dcnode-id="354" instrument_node="">
</span><li data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">TRAILING: Cut bases off the end of a read, if below a threshold quality</span></li><span data-dcnode-id="351" instrument_node="">
</span><li data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">CROP: Cut the read to a specified length</span></li><span data-dcnode-id="348" instrument_node="">
</span><li data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">HEADCROP: Cut the specified number of bases from the start of the read</span></li><span data-dcnode-id="345" instrument_node="">
</span><li data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">MINLEN: Drop the read if it is below a specified length</span></li><span data-dcnode-id="342" instrument_node="">
</span><li data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">TOPHRED33: Convert quality scores to Phred-33</span></li><span data-dcnode-id="339" instrument_node="">
</span><li data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">TOPHRED64: Convert quality scores to Phred-64</span></li><span data-dcnode-id="336" instrument_node="">
</span></ul><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">It works with FASTQ (using phred + 33 or phred + 64 quality scores, depending on the Illumina pipeline used), either uncompressed or gzipp'ed FASTQ. Use of gzip format is determined based on the .gz extension.</span></p><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">For single-ended data, one input and one output file are specified, plus the processing steps. For paired-end data, two input files are specified, and 4 output files, 2 for the 'paired' output where both reads survived the processing, and 2 for corresponding 'unpaired' output where a read survived, but the partner read did not.</span></p><span data-dcnode-id="328" instrument_node="">
</span><h3 data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="325" instrument_node="">
</span><h3 data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Running Trimmomatic</span></h3><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Since version 0.27, trimmomatic can be executed using -jar. The 'old' method, using the explicit class, continues to work.</span></p><span data-dcnode-id="319" instrument_node="">
</span><h4 data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Paired End Mode:</span></h4><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="313"><code data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">java -jar &lt;path to trimmomatic.jar&gt; PE [-threads &lt;threads] [-phred33 | -phred64] [-trimlog &lt;logFile&gt;] &lt;input 1&gt; &lt;input 2&gt; &lt;paired output 1&gt; &lt;unpaired output 1&gt; &lt;paired output 2&gt; &lt;unpaired output 2&gt; &lt;step 1&gt; ...</span></code></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">or</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="306"><code data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">java -classpath &lt;path to trimmomatic jar&gt; org.usadellab.trimmomatic.TrimmomaticPE [-threads &lt;threads&gt;] [-phred33 | -phred64] [-trimlog &lt;logFile&gt;] &lt;input 1&gt; &lt;input 2&gt; &lt;paired output 1&gt; &lt;unpaired output 1&gt; &lt;paired output 2&gt; &lt;unpaired output 2&gt; &lt;step 1&gt; ...</span></code></p><span data-dcnode-id="305" instrument_node="">
</span><h4 data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Single End Mode:</span></h4><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="299"><code data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">java -jar &lt;path to trimmomatic jar&gt; SE [-threads &lt;threads&gt;] [-phred33 | -phred64] [-trimlog &lt;logFile&gt;] &lt;input&gt; &lt;output&gt; &lt;step 1&gt; ...</span></code></p><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">or</span></p><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="292"><code data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">java -classpath &lt;path to trimmomatic jar&gt; org.usadellab.trimmomatic.TrimmomaticSE [-threads &lt;threads&gt;] [-phred33 | -phred64] [-trimlog &lt;logFile&gt;] &lt;input&gt; &lt;output&gt; &lt;step 1&gt; ...</span></code></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">If no quality score is specified, phred-64 is the default. This will be changed to an 'autodetected' quality score in a future version.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Specifying a trimlog file creates a log of all read trimmings, indicating the following details:</span></p><span data-dcnode-id="285" instrument_node="">
</span><ul data-dcnode-id="268"><span data-dcnode-id="284" instrument_node="">
</span><li data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">the read name</span></li><span data-dcnode-id="281" instrument_node="">
</span><li data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">the surviving sequence length</span></li><span data-dcnode-id="278" instrument_node="">
</span><li data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">the location of the first surviving base, aka. the amount trimmed from the start</span></li><span data-dcnode-id="275" instrument_node="">
</span><li data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">the location of the last surviving base in the original read</span></li><span data-dcnode-id="272" instrument_node="">
</span><li data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">the amount trimmed from the end</span></li><span data-dcnode-id="269" instrument_node="">
</span></ul><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Multiple steps can be specified as required, by using additional arguments at the end.</span></p><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Most steps take one or more settings, delimited by ':' (a colon)</span></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Step options:</span></p><span data-dcnode-id="258" instrument_node="">
</span><ul data-dcnode-id="238"><span data-dcnode-id="257" instrument_node="">
</span><li data-dcnode-id="240"><span data-dcnode-id="256" instrument_node="">ILLUMINACLIP:&lt;fastaWithAdaptersEtc&gt;:&lt;seed mismatches&gt;:&lt;palindrome clip threshold&gt;:&lt;simple clip threshold&gt;
</span><ul data-dcnode-id="242"><span data-dcnode-id="255" instrument_node="">
</span><li data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">fastaWithAdaptersEtc: specifies the path to a fasta file containing all the adapters, PCR sequences etc. The naming of the various sequences within this file determines how they are used. See below.</span></li><span data-dcnode-id="252" instrument_node="">
</span><li data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">seedMismatches: specifies the maximum mismatch count which will still allow a full match to be performed</span></li><span data-dcnode-id="249" instrument_node="">
</span><li data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">palindromeClipThreshold: specifies how accurate the match between the two 'adapter ligated' reads must be for PE palindrome read alignment.</span></li><span data-dcnode-id="246" instrument_node="">
</span><li data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">simpleClipThreshold: specifies how accurate the match between any adapter etc. sequence must be against a read.</span></li><span data-dcnode-id="243" instrument_node="">
</span></ul><span data-dcnode-id="241" instrument_node="">
</span></li><span data-dcnode-id="239" instrument_node="">
</span></ul><span data-dcnode-id="237" instrument_node="">
</span><ul data-dcnode-id="223"><span data-dcnode-id="236" instrument_node="">
</span><li data-dcnode-id="225"><span data-dcnode-id="235" instrument_node="">SLIDINGWINDOW:&lt;windowSize&gt;:&lt;requiredQuality&gt;
</span><ul data-dcnode-id="227"><span data-dcnode-id="234" instrument_node="">
</span><li data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">windowSize: specifies the number of bases to average across</span></li><span data-dcnode-id="231" instrument_node="">
</span><li data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">requiredQuality: specifies the average quality required.</span></li><span data-dcnode-id="228" instrument_node="">
</span></ul><span data-dcnode-id="226" instrument_node="">
</span></li><span data-dcnode-id="224" instrument_node="">
</span></ul><span data-dcnode-id="222" instrument_node="">
</span><ul data-dcnode-id="211"><span data-dcnode-id="221" instrument_node="">
</span><li data-dcnode-id="213"><span data-dcnode-id="220" instrument_node="">LEADING:&lt;quality&gt;
</span><ul data-dcnode-id="215"><span data-dcnode-id="219" instrument_node="">
</span><li data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">quality: Specifies the minimum quality required to keep a base.</span></li><span data-dcnode-id="216" instrument_node="">
</span></ul><span data-dcnode-id="214" instrument_node="">
</span></li><span data-dcnode-id="212" instrument_node="">
</span></ul><span data-dcnode-id="210" instrument_node="">
</span><ul data-dcnode-id="199"><span data-dcnode-id="209" instrument_node="">
</span><li data-dcnode-id="201"><span data-dcnode-id="208" instrument_node="">TRAILING:&lt;quality&gt;
</span><ul data-dcnode-id="203"><span data-dcnode-id="207" instrument_node="">
</span><li data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">quality: Specifies the minimum quality required to keep a base.</span></li><span data-dcnode-id="204" instrument_node="">
</span></ul><span data-dcnode-id="202" instrument_node="">
</span></li><span data-dcnode-id="200" instrument_node="">
</span></ul><span data-dcnode-id="198" instrument_node="">
</span><ul data-dcnode-id="187"><span data-dcnode-id="197" instrument_node="">
</span><li data-dcnode-id="189"><span data-dcnode-id="196" instrument_node="">CROP:&lt;length&gt;
</span><ul data-dcnode-id="191"><span data-dcnode-id="195" instrument_node="">
</span><li data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">length: The number of bases to keep, from the start of the read.</span></li><span data-dcnode-id="192" instrument_node="">
</span></ul><span data-dcnode-id="190" instrument_node="">
</span></li><span data-dcnode-id="188" instrument_node="">
</span></ul><span data-dcnode-id="186" instrument_node="">
</span><ul data-dcnode-id="175"><span data-dcnode-id="185" instrument_node="">
</span><li data-dcnode-id="177"><span data-dcnode-id="184" instrument_node="">HEADCROP:&lt;length&gt;
</span><ul data-dcnode-id="179"><span data-dcnode-id="183" instrument_node="">
</span><li data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">length: The number of bases to remove from the start of the read.</span></li><span data-dcnode-id="180" instrument_node="">
</span></ul><span data-dcnode-id="178" instrument_node="">
</span></li><span data-dcnode-id="176" instrument_node="">
</span></ul><span data-dcnode-id="174" instrument_node="">
</span><ul data-dcnode-id="163"><span data-dcnode-id="173" instrument_node="">
</span><li data-dcnode-id="165"><span data-dcnode-id="172" instrument_node="">MINLEN:&lt;length&gt;
</span><ul data-dcnode-id="167"><span data-dcnode-id="171" instrument_node="">
</span><li data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">length: Specifies the minimum length of reads to be kept.</span></li><span data-dcnode-id="168" instrument_node="">
</span></ul><span data-dcnode-id="166" instrument_node="">
</span></li><span data-dcnode-id="164" instrument_node="">
</span></ul><span data-dcnode-id="162" instrument_node="">
</span><h3 data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">Trimming Order</span></h3><span data-dcnode-id="159" instrument_node="">
</span><p data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">Trimming occurs in the order which the steps are specified on the command line. It is recommended in most cases that adapter clipping, if required, is done as early as possible.</span></p><span data-dcnode-id="156" instrument_node="">
</span><h3 data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="153" instrument_node="">
</span><h3 data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">The Adapter Fasta</span></h3><span data-dcnode-id="150" instrument_node="">
</span><p data-dcnode-id="148"><span data-dcnode-id="149" instrument_node="">Illumina adapter and other technical sequences are copyrighted by Illumina,but we have been granted permission to distribute them with Trimmomatic. Suggested adapter sequences are provided for TruSeq2 (as used in GAII machines) and TruSeq3 (as used by HiSeq and MiSeq machines), for both single-end and paired-end mode. These sequences have not been extensively tested, and depending on specific issues which may occur in library preparation, other sequences may work better for a given dataset.</span></p><span data-dcnode-id="147" instrument_node="">
</span><p data-dcnode-id="145"><span data-dcnode-id="146" instrument_node="">To make a custom version of fasta, you must first understand how it will be used. Trimmomatic uses two strategies for adapter trimming: Palindrome and Simple</span></p><span data-dcnode-id="144" instrument_node="">
</span><p data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">With 'simple' trimming, each adapter sequence is tested against the reads, and if a sufficiently accurate match is detected, the read is clipped appropriately.</span></p><span data-dcnode-id="141" instrument_node="">
</span><p data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">'Palindrome' trimming is specifically designed for the case of 'reading through' a short fragment into the adapter sequence on the other end. In this approach, the appropriate adapter sequences are 'in silico ligated' onto the start of the reads, and the combined adapter+read sequences, forward and reverse are aligned. If they align in a manner which indicates 'read-through', the forward read is clipped and the reverse read dropped (since it contains no new data).</span></p><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">Naming of the sequences indicates how they should be used. For 'Palindrome' clipping, the sequence names should both start with 'Prefix', and end in '/1' for the forward adapter and '/2' for the reverse adapter. All other sequences are checked using 'simple' mode. Sequences with names ending in '/1' or '/2' will be checked only against the forward or reverse read. Sequences not ending in '/1' or '/2' will be checked against both the forward and reverse read. If you want to check for the reverse-complement of a specific sequence, you need to specifically include the reverse-complemented form of the sequence as well, with another name.</span></p><span data-dcnode-id="135" instrument_node="">
</span><p data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">The thresholds used are a simplified log-likelihood approach. Each matching base adds just over 0.6, while each mismatch reduces the alignment score by Q/10. Therefore, a perfect match of a 12 base sequence will score just over 7, while 25 bases are needed to score 15. As such we recommend values between 7 - 15 for this parameter. For palindromic matches, a longer alignment is possible - therefore this threshold can be higher, in the range of 30. The 'seed mismatch' parameter is used to make alignments more efficient, specifying the maximum base mismatch count in the 'seed' (16 bases). Typical values here are 1 or 2.</span></p><span data-dcnode-id="132" instrument_node="">
