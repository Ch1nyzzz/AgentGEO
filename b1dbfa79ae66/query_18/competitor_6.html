oir.eu/?index=cw22&amp;url=https%3A//homeguides.sfgate.com/make-coral-honeysuckle-blossom-54405.html"><span data-dcnode-id="817" instrument_node=""> How to Make Coral Honeysuckle Blossom </span></a><span data-dcnode-id="815" instrument_node=""> </span></li><span data-dcnode-id="813" instrument_node=""> </span></ul><span data-dcnode-id="811" instrument_node=""> </span></div><span data-dcnode-id="809" instrument_node=""> </span></div><span data-dcnode-id="807" instrument_node=""> </span></div><span data-dcnode-id="805" instrument_node=""> </span><ul data-dcnode-id="800" data-hearst-affiliate-data="" data-rendered="true" style="display: none"><span data-dcnode-id="804" instrument_node=""> </span><li data-dcnode-id="802" data-hearst-affiliate-index="1" data-hearst-affiliate-keyword="knife" data-hearst-affiliate-link="https://amzn.to/3APQzc8"><span data-dcnode-id="803" instrument_node=""> </span></li><span data-dcnode-id="801" instrument_node=""> </span></ul><span data-dcnode-id="799" instrument_node=""> </span><div class="article-content" data-dcnode-id="710"><span data-dcnode-id="798" instrument_node=""> </span><div class="section" data-dcnode-id="791"><span data-dcnode-id="797" instrument_node=""> </span><p data-dcnode-id="796"></p><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">A sweet fragrance drifts from the large white blossoms of the moonflower, through the garden and into your open windows on a warm summer night. The moonflower (Ipomoea alba), a night-blooming relative of the morning glory, is native to the tropical regions of the Americas. The huge, 5- to 6-inch blossoms open at night, only to shrivel and die when the morning light arrives. Pollinated by hummingbirds and moths, its hard seeds are easily saved for planting in the spring.</span></p><p data-dcnode-id="793"></p><span data-dcnode-id="792" instrument_node=""> </span></div><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="inline-mobile" data-dcnode-id="790"></div><span data-dcnode-id="789" instrument_node=""> </span><div class="desktop-only-min-height-280 ad-unit centered" data-ad-id="Leaf2" data-ad-unit-name="inline-desktop" data-dcnode-id="787" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="788" data-has-intersected="true" id="Leaf2"></div></div><span data-dcnode-id="786" instrument_node=""> </span><div class="section" data-dcnode-id="770"><h2 data-dcnode-id="783"><span data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Perennial vs. Annual</span></span></h2><span data-dcnode-id="782" instrument_node=""> </span><ol class="legacy-steps" data-dcnode-id="772"><span data-dcnode-id="781" instrument_node=""> </span><li data-dcnode-id="774"><span data-dcnode-id="780" instrument_node=""> </span><div data-dcnode-id="775"><span data-dcnode-id="779" instrument_node=""> </span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">While moonflower vines are winter-hardy perennials in U.S. Department of Agriculture plant hardiness zones 10 and 11 and in winter-sheltered gardens in zone 9, in most of the United States they're grown as annual flowers. The rapidly growing vines can completely cover a trellis or arbor over the summer, providing a nightly show of white flowers glowing in the moonlight.</span></p><span data-dcnode-id="776" instrument_node=""> </span></div></li><span data-dcnode-id="773" instrument_node=""> </span></ol><span data-dcnode-id="771" instrument_node=""> </span></div><span data-dcnode-id="769" instrument_node=""> </span><div class="mobile-only-min-height-250 ad-unit inline-ad" data-ad-unit-name="partner-A300-mobile" data-dcnode-id="768"></div><span data-dcnode-id="767" instrument_node=""> </span><div class="desktop-only-min-height-90 ad-unit inline-ad" data-ad-id="Leaf3" data-ad-unit-name="lowline-desktop" data-dcnode-id="765" data-is-refreshable="true" data-page-index="0"><div data-dcnode-id="766" data-has-intersected="true" id="Leaf3"></div></div><span data-dcnode-id="764" instrument_node=""> </span><div class="section" data-dcnode-id="745"><h2 data-dcnode-id="761"><span data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Late Winter</span></span></h2><span data-dcnode-id="760" instrument_node=""> </span><ol class="legacy-steps" data-dcnode-id="747"><span data-dcnode-id="759" instrument_node=""> </span><li data-dcnode-id="749"><span data-dcnode-id="758" instrument_node=""> </span><div data-dcnode-id="750"><span data-dcnode-id="757" instrument_node=""> </span><p data-dcnode-id="752"><span data-dcnode-id="756" instrument_node="">In colder climates, many gardeners start their moonflower seeds indoors, in a brightly lit, warm location. By nicking the hard-shelled seeds with a sharp </span><a class="hearst-affiliate-link" data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3APQzc8" rel="nofollow,noopener" target="_blank"><span data-dcnode-id="755" instrument_node="">knife</span></a><span data-dcnode-id="753" instrument_node=""> and then soaking them overnight in warm water before planting in peat pots, the seeds usually germinate in four to seven days. The seedlings are ready to plant outside in a sunny garden when all chance of frost has passed and the temperatures warm to above 65 degrees Fahrenheit.</span></p><span data-dcnode-id="751" instrument_node=""> </span></div></li><span data-dcnode-id="748" instrument_node=""> </span></ol><span data-dcnode-id="746" instrument_node=""> </span></div><span data-dcnode-id="744" instrument_node=""> </span><div class="section" data-dcnode-id="728"><h2 data-dcnode-id="741"><span data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Spring</span></span></h2><span data-dcnode-id="740" instrument_node=""> </span><ol class="legacy-steps" data-dcnode-id="730"><span data-dcnode-id="739" instrument_node=""> </span><li data-dcnode-id="732"><span data-dcnode-id="738" instrument_node=""> </span><div data-dcnode-id="733"><span data-dcnode-id="737" instrument_node=""> </span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">In warm climates with a long growing season, you can plant your moonflower seeds directly in the ground in a fertile, well-drained soil. Moonflowers prefer full sun and regular watering to thrive. Provide a large trellis, arbor or fence for the rapidly growing vines, otherwise they'll spread over the ground and twine their way up other plants, shrubs and trees. The moonflower usually begins blossoming mid-summer and continues with a nightly show of blossoms until the cooler weather of fall and winter arrives.</span></p><span data-dcnode-id="734" instrument_node=""> </span></div></li><span data-dcnode-id="731" instrument_node=""> </span></ol><span data-dcnode-id="729" instrument_node=""> </span></div><span data-dcnode-id="727" instrument_node=""> </span><div class="section" data-dcnode-id="711"><h2 data-dcnode-id="724"><span data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Overwintering</span></span></h2><span data-dcnode-id="723" instrument_node=""> </span><ol class="legacy-steps" data-dcnode-id="713"><span data-dcnode-id="722" instrument_node=""> </span><li data-dcnode-id="715"><span data-dcnode-id="721" instrument_node=""> </span><div data-dcnode-id="716"><span data-dcnode-id="720" instrument_node=""> </span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Planting a moonflower vine in a large flowerpot or tub allows you to take your vine indoors when winter arrives. Prune the vines back if necessary, and place the plant in a warm, sunny location in the sunroom or greenhouse. You can also start a new plant indoors with seeds or vine cuttings, and then move it outdoors when warm weather arrives in the spring.</span></p><span data-dcnode-id="717" instrument_node=""> </span></div></li><span data-dcnode-id="714" instrument_node=""> </span></ol><span data-dcnode-id="712" instrument_node=""> </spa
