-image__placeholder" data-dcnode-id="4592" style="flex: 1;" viewBox="0 0 100 67"><g data-dcnode-id="4593" transform="translate(0, -16.5)"><image data-dcnode-id="4594" height="149.2537313432836%" preserveAspectRatio="xMidYMid slice" width="100%" xlink:href="/img/icons/generic-image.svg"></image></g></svg><div class="lazy-image__loadingPlaceholder" data-dcnode-id="4590"><img alt="" class="loadingPlaceholder" data-dcnode-id="4591" height="1280" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%2067'%3E%3C/svg%3E" width="1813"></div></div><span data-dcnode-id="4588" instrument_node=""> </span><div class="credit body-credit padding-8-top padding-8-bottom elementFont__fine--credit" data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">Credit: Matthew Benson</span></div><span data-dcnode-id="4585" instrument_node=""> </span></div><span data-dcnode-id="4583" instrument_node=""> </span><div class="glide-slide-content" data-dcnode-id="4560"><span data-dcnode-id="4582" instrument_node=""> </span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="4564"><p data-dcnode-id="4574"><span data-dcnode-id="4581" instrument_node="">Many </span><a data-dcnode-id="4579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/shrubs/best-hydrangeas/"><span data-dcnode-id="4580" instrument_node="">hydrangea types</span></a><span data-dcnode-id="4578" instrument_node=""> bloom on old wood, including bigleaf and oakleaf forms. Prune these types of </span><a data-dcnode-id="4576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/hydrangea/"><span data-dcnode-id="4577" instrument_node="">hydrangeas</span></a><span data-dcnode-id="4575" instrument_node=""> before midsummer. If you prune them in winter or early spring, you'll be removing flower buds.</span></p><span data-dcnode-id="4573" instrument_node=""> </span><p data-dcnode-id="4571"><span data-dcnode-id="4572" instrument_node="">With newer reblooming types, like the Endless Summer Series or Let's Dance Series, when you prune is less critical because these hydrangeas bloom on new growth as well as old wood. Even if you cut off some of the flower buds by pruning the old stems, the plant will still bloom on the new growth.</span></p><span data-dcnode-id="4570" instrument_node=""> </span><p data-dcnode-id="4566"><a data-dcnode-id="4568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/shrubs/white-hydrangeas/"><span data-dcnode-id="4569" instrument_node="">White-flowered paniculata</span></a><span data-dcnode-id="4567" instrument_node=""> (like varieties 'PeeGee' and 'Limelight') and arborescens (including 'Annabelle') types flower on new wood, so they can be pruned any time other than just before they bloom.</span></p><span data-dcnode-id="4565" instrument_node=""> </span></div><span data-dcnode-id="4563" instrument_node=""> </span><div class="monetate300_125" data-dcnode-id="4562"></div><span data-dcnode-id="4561" instrument_node=""> </span></div><span data-dcnode-id="4559" instrument_node=""> </span><div class="glide-slide-meta-bottom hide-on-mobile hide-on-tablet" data-dcnode-id="4534" style="display: none;"><span data-dcnode-id="4558" instrument_node=""> </span><h2 aria-hidden="true" class="glide-slide-number elementFont__details" data-dcnode-id="4550"><span data-dcnode-id="4557" instrument_node=""> </span><span class="count" data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">2</span></span><span data-dcnode-id="4554" instrument_node=""> of </span><span class="total" data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">17</span></span><span data-dcnode-id="4551" instrument_node=""> </span></h2><span data-dcnode-id="4549" instrument_node=""> </span><button a a-tracking-do-not-track="1"><svg data-dcnode-id="4423" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M2.667 21.333h8v2.667h-10.667v-10.667h2.667v8zM21.333 0h2.667v10.667h-2.667v-8h-8v-2.667h8z" data-dcnode-id="4424"></path></svg><span data-dcnode-id="4422" instrument_node=""> </span></button><span data-dcnode-id="4420" instrument_node=""> </span></div><svg class="lazy-image__placeholder" data-dcnode-id="4416" style="flex: 1;" viewBox="0 0 100 100"><g data-dcnode-id="4417" transform="translate(0, 0)"><image data-dcnode-id="4418" height="100%" preserveAspectRatio="xMidYMid slice" width="100%" xlink:href="/img/icons/generic-image.svg"></image></g></svg><div class="lazy-image__loadingPlaceholder" data-dcnode-id="4414"><img alt="" class="loadingPlaceholder" data-dcnode-id="4415" height="1323" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3C/svg%3E" width="1300"></div></div><span data-dcnode-id="4412" instrument_node=""> </span><div class="credit body-credit padding-8-top padding-8-bottom elementFont__fine--credit" data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">Credit: Peter Krumhardt</span></div><span data-dcnode-id="4409" instrument_node=""> </span></div><span data-dcnode-id="4407" instrument_node=""> </span><div class="glide-slide-content" data-dcnode-id="4384"><span data-dcnode-id="4406" instrument_node=""> </span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="4386"><p data-dcnode-id="4393"><a data-dcnode-id="4404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/flowers/perennials/early-blooming-flowers/"><span data-dcnode-id="4405" instrument_node="">Early-spring bloomers</span></a><span data-dcnode-id="4403" instrument_node="">, like </span><a data-dcnode-id="4401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/lilac/"><span data-dcnode-id="4402" instrument_node="">lilac</span></a><span data-dcnode-id="4400" instrument_node="">, </span><a data-dcnode-id="4398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/forsythia-/"><span data-dcnode-id="4399" instrument_node="">forsythia</span></a><span data-dcnode-id="4397" instrument_node="">, and </span><a data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/rhododendron/"><span data-dcnode-id="4396" instrument_node="">rhododendron</span></a><span data-dcnode-id="4394" instrument_node="">, produce flowers on wood formed the previous year. The best time to prune them is late spring, immediately after they finish blooming. If you prune them later in the growing season or during winter, you'll remove flower buds and decrease the amount of spring bloom.</span></p><span data-dcnode-id="4392" instrument_node=""> </span><p data-dcnode-id="4388"><strong data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">Test Garden Tip:</span></strong><span data-dcnode-id="4389" instrument_node=""> To keep spring bloomers flowering vigorously, remove some of the oldest shoots all the way to the ground. This allows younger stems to grow and bloom.</span></p><span data-dcnode-id="4387" instrument_node=""> </span></div><span data-dcnode-id="4385" instrument_node=""> </span></div><span data-dcnode-id="4383" instrument_node=""> </span><div class="glide-slide-meta-bottom hide-on-mobile hide-on-tablet" data-dcnode-id="4358" style="display: none;"><span data-dcnode-id="4382" instrument_node=""> </span><h2 aria-hidden="true" class="glide-slide-number elementFont__details" data-dcnode-id="4374"><span data-dcnode-id="4381" instrument_node=""> </span><span class="count" data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">3</spa d="4230"><img alt="" class="loadingPlaceholder" data-dcnode-id="4231" height="1405" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3C/svg%3E" width="1280"></div></div><span data-dcnode-id="4228" instrument_node=""> </span><div class="credit body-credit padding-8-top padding-8-bottom elementFont__fine--credit" data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">Credit: Dean Schoeppner</span></div><span data-dcnode-id="4225" instrument_node=""> </span></div><span data-dcnode-id="4223" instrument_node=""> </span><div class="glide-slide-content" data-dcnode-id="4200"><span data-dcnode-id="4222" instrument_node=""> </span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="4204"><p data-dcnode-id="4211"><span data-dcnode-id="4221" instrument_node="">Plants that </span><a data-dcnode-id="4219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/shrubs/summer-blooming-shrubs/"><span data-dcnode-id="4220" instrument_node="">bloom in summer</span></a><span data-dcnode-id="4218" instrument_node="">, such as </span><a data-dcnode-id="4216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/potentilla/"><span data-dcnode-id="4217" instrument_node="">potentilla</span></a><span data-dcnode-id="4215" instrument_node=""> and </span><a data-dcnode-id="4213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/crape-myrtle/"><span data-dcnode-id="4214" instrument_node="">crape myrtle</span></a><span data-dcnode-id="4212" instrument_node="">, produce their flowers on new growth from the current season. Prune them in winter while they're dormant, or in early spring just before they push out their new growth. You can even cut them all the way to the ground in late winter, and they'll still bloom that same summer.</span></p><span data-dcnode-id="4210" instrument_node=""> </span><p data-dcnode-id="4206"><strong data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">Test Garden Tip:</span></strong><span data-dcnode-id="4207" instrument_node=""> Save time by using a pole pruner with a rotating head to remove stems all the way to the base of the plant. That way, you don't have to bend over for each cut, saving not only time, but also wear and tear on your back!</span></p><span data-dcnode-id="4205" instrument_node=""> </span></div><span data-dcnode-id="4203" instrument_node=""> </span><div class="slidecopy" data-dcnode-id="4202"></div><span data-dcnode-id="4201" instrument_node=""> </span></div><span data-dcnode-id="4199" instrument_node=""> </span><div class="glide-slide-meta-bottom hide-on-mobile hide-on-tablet" data-dcnode-id="4174" style="display: none;"><span data-dcnode-id="4198" instrument_node=""> </span><h2 aria-hidden="true" class="glide-slide-number elementFont__details" data-dcnode-id="4190"><span data-dcnode-id="4197" instrument_node=""> </span><span class="count" data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">4</span></span><span data-dcnode-id="4194" instrument_node=""> of </span><span class="total" data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">17</span></span><span data-dcnode-id="4191" instrument_node=""> </span></h2><span data-dcnode-id="4189" instrument_node=""> </span><button aria-label="Show all slides" class="glide-view-all view-all-btn" data-dcnode-id="4176" data-glide-dir="" data-tracking-zone="view-all"><span data-dcnode-id="4188" instrument_node=""> </span><span class="view-all-inner-wrapper lower-nav" data-dcnode-id="4178"><span data-dcnode-id="4187" instrument_node=""> </span><span class="view-all-button-icon" data-dcnode-id="4183"><svg aria-hidden="true" data-dcnode-id="4185" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.o 8-bottom elementFont__fine--credit" data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">Credit: Dean Schoeppner</span></div><span data-dcnode-id="3882" instrument_node=""> </span></div><span data-dcnode-id="3880" instrument_node=""> </span><div class="glide-slide-content" data-dcnode-id="3862"><span data-dcnode-id="3879" instrument_node=""> </span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="3864"><p data-dcnode-id="3874"><span data-dcnode-id="3878" instrument_node="">For shrubs like </span><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/boxwood/"><span data-dcnode-id="3877" instrument_node="">boxwood</span></a><span data-dcnode-id="3875" instrument_node=""> in a shaped hedge, shear the new growth frequently during the early part of the growing season to help maintain their size and form. Keep the top a little narrower than the base so that the upper branches don't shade the lower ones. Stop shearing the hedge about six weeks before your area's average first frost. Late winter to early spring or mid- to late summer are some of the best times to prune hedges more drastically.</span></p><span data-dcnode-id="3873" instrument_node=""> </span><p data-dcnode-id="3866"><strong data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">Test Garden Tip:</span></strong><span data-dcnode-id="3870" instrument_node=""> If you're </span><a data-dcnode-id="3868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/shrubs/best-plants-for-hedges/"><span data-dcnode-id="3869" instrument_node="">growing a privacy hedge</span></a><span data-dcnode-id="3867" instrument_node="">, reduce the amount of pruning maintenance needed by selecting shrubs that grow only as tall and wide as necessary to provide screening. Allow them to grow into their natural form, and you won't have to prune very often, if at all.</span></p><span data-dcnode-id="3865" instrument_node=""> </span></div><span data-dcnode-id="3863" instrument_node=""> </span></div><span data-dcnode-id="3861" instrument_node=""> </span><div class="glide-slide-meta-bottom hide-on-mobile hide-on-tablet" data-dcnode-id="3836" style="display: none;"><span data-dcnode-id="3860" instrument_node=""> </span><h2 aria-hidden="true" class="glide-slide-number elementFont__details" data-dcnode-id="3852"><span data-dcnode-id="3859" instrument_node=""> </span><span class="count" data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">6</span></span><span data-dcnode-id="3856" instrument_node=""> of </span><span class="total" data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">17</span></span><span data-dcnode-id="3853" instrument_node=""> </span></h2><span data-dcnode-id="3851" instrument_node=""> </span><button aria-label="Show all slides" class="glide-view-all view-all-btn" data-dcnode-id="3838" data-glide-dir="" data-tracking-zone="view-all"><span data-dcnode-id="3850" instrument_node=""> </span><span class="view-all-inner-wrapper lower-nav" data-dcnode-id="3840"><span data-dcnode-id="3849" instrument_node=""> </span><span class="view-all-button-icon" data-dcnode-id="3845"><svg aria-hidden="true" data-dcnode-id="3847" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M15.984 20.016v-4.031h4.031v4.031h-4.031zM15.984 14.016v-4.031h4.031v4.031h-4.031zM9.984 8.016v-4.031h4.031v4.031h-4.031zM15.984 3.984h4.031v4.031h-4.031v-4.031zM9.984 14.016v-4.031h4.031v4.031h-4.031zM3.984 14.016v-4.031h4.031v4.031h-4.031zM3.984 20.016v-4.031h4.031v4.031h-4.031zM9.984 20.016v-4.031h4.031v4.031h-4.031zM3.984 8.016v-4.031h4.031v4.031h-4.031z" data-dcnode-id="3848"></path></svg><span data-dcnode-id="3846" instrument_node=""> </span></span><span data-dcnode-id="3844" instrument_node=""> </span><span class="view-a ode-id="3682" instrument_node="">Treat </span><a data-dcnode-id="3680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/rose/climbing-rose/"><span data-dcnode-id="3681" instrument_node="">climbing roses</span></a><span data-dcnode-id="3679" instrument_node=""> and old garden roses that bloom only once per year the same as other spring-blooming shrubs: </span><a data-dcnode-id="3677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/how-to-garden/how-to-deadhead-roses/"><span data-dcnode-id="3678" instrument_node="">Pruning after they finish blooming</span></a><span data-dcnode-id="3676" instrument_node="">. Repeat bloomers, including </span><a data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/rose/hybrid-tea-rose/"><span data-dcnode-id="3675" instrument_node="">hybrid teas</span></a><span data-dcnode-id="3673" instrument_node="">, </span><a data-dcnode-id="3671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/rose/floribunda-rose/"><span data-dcnode-id="3672" instrument_node="">floribundas</span></a><span data-dcnode-id="3670" instrument_node="">, </span><a data-dcnode-id="3668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/rose/grandiflora-rose/"><span data-dcnode-id="3669" instrument_node="">grandifloras</span></a><span data-dcnode-id="3667" instrument_node="">, </span><a data-dcnode-id="3665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/rose/miniature-rose/"><span data-dcnode-id="3666" instrument_node="">miniatures</span></a><span data-dcnode-id="3664" instrument_node="">, and modern </span><a data-dcnode-id="3662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/rose/shrub-rose/"><span data-dcnode-id="3663" instrument_node="">shrub roses</span></a><span data-dcnode-id="3661" instrument_node=""> are pruned mostly to shape the plant or to remove winter-damaged stems (as shown here). If they become overgrown, cut them back in early spring.</span></p><span data-dcnode-id="3659" instrument_node=""> </span></div><span data-dcnode-id="3657" instrument_node=""> </span></div><span data-dcnode-id="3655" instrument_node=""> </span><div class="glide-slide-meta-bottom hide-on-mobile hide-on-tablet" data-dcnode-id="3630" style="display: none;"><span data-dcnode-id="3654" instrument_node=""> </span><h2 aria-hidden="true" class="glide-slide-number elementFont__details" data-dcnode-id="3646"><span data-dcnode-id="3653" instrument_node=""> </span><span class="count" data-dcnode-id="3651"><span data-dcnode-id="3652" instrument_node="">7</span></span><span data-dcnode-id="3650" instrument_node=""> of </span><span class="total" data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">17</span></span><span data-dcnode-id="3647" instrument_node=""> </span></h2><span data-dcnode-id="3645" instrument_node=""> </span><button aria-label="Show all slides" class="glide-view-all view-all-btn" data-dcnode-id="3632" data-glide-dir="" data-tracking-zone="view-all"><span data-dcnode-id="3644" instrument_node=""> </span><span class="view-all-inner-wrapper lower-nav" data-dcnode-id="3634"><span data-dcnode-id="3643" instrument_node=""> </span><span class="view-all-button-icon" data-dcnode-id="3639"><svg aria-hidden="true" data-dcnode-id="3641" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M15.984 20.016v-4.031h4.031v4.031h-4.031zM15.984 14.016v-4.031h4.031v4.031h-4.031zM9.984 8.016v-4.031h4.031v4.031h-4.031zM15.984 3.984h4.031v4.031h-4.031v-4.031zM9.984 14.016v-4.031h4.031v4.031h-4.031zM3.984 14.016v-4.031h4.031v4.031h-4.031zM3.984 20.016v-4. strument_node=""> </span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="3473"><p data-dcnode-id="3492"><span data-dcnode-id="3505" instrument_node="">Prune </span><a data-dcnode-id="3503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/trees/shade-trees/"><span data-dcnode-id="3504" instrument_node="">shade trees</span></a><span data-dcnode-id="3502" instrument_node=""> like </span><a data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/oak/"><span data-dcnode-id="3501" instrument_node="">oak</span></a><span data-dcnode-id="3499" instrument_node="">, </span><a data-dcnode-id="3497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/littleleaf-linden/"><span data-dcnode-id="3498" instrument_node="">linden</span></a><span data-dcnode-id="3496" instrument_node="">, and </span><a data-dcnode-id="3494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/ash/"><span data-dcnode-id="3495" instrument_node="">ash</span></a><span data-dcnode-id="3493" instrument_node=""> when they are dormant in winter. It's easiest to see the branching structure at this time of year, and you're less likely to spread diseases through the pruning wounds. As with non-blooming shrubs, avoid pruning them late in summer.</span></p><span data-dcnode-id="3491" instrument_node=""> </span><p data-dcnode-id="3475"><strong data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">Test Garden Tip:</span></strong><span data-dcnode-id="3488" instrument_node=""> Trees that produce a heavy sap flow when pruned in winter—</span><a data-dcnode-id="3486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/maple/"><span data-dcnode-id="3487" instrument_node="">maples</span></a><span data-dcnode-id="3485" instrument_node="">, </span><a data-dcnode-id="3483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/birch/"><span data-dcnode-id="3484" instrument_node="">birches</span></a><span data-dcnode-id="3482" instrument_node="">, </span><a data-dcnode-id="3480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/elm/"><span data-dcnode-id="3481" instrument_node="">elms</span></a><span data-dcnode-id="3479" instrument_node="">, and </span><a data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/dogwood/"><span data-dcnode-id="3478" instrument_node="">dogwoods</span></a><span data-dcnode-id="3476" instrument_node="">—are known as "bleeders." The sap flow may be unsightly, but it doesn't harm the tree. To avoid the bleeding, you can wait until the leaves have fully expanded in summer to prune these species.</span></p><span data-dcnode-id="3474" instrument_node=""> </span></div><span data-dcnode-id="3472" instrument_node=""> </span><div class="slidecopy" data-dcnode-id="3471"></div><span data-dcnode-id="3470" instrument_node=""> </span></div><span data-dcnode-id="3468" instrument_node=""> </span><div class="glide-slide-meta-bottom hide-on-mobile hide-on-tablet" data-dcnode-id="3443" style="display: none;"><span data-dcnode-id="3467" instrument_node=""> </span><h2 aria-hidden="true" class="glide-slide-number elementFont__details" data-dcnode-id="3459"><span data-dcnode-id="3466" instrument_node=""> </span><span class="count" data-dcnode-id="3464"><span data-dcnode-id="3465" instrument_node="">8</span></span><span data-dcnode-id="3463" instrument_node=""> of </span><span class="total" data-dcnode-id="3461"><span data-dcnode-id="3462 s="loadingPlaceholder" data-dcnode-id="3328" height="1659" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20133'%3E%3C/svg%3E" width="1244"></div></div><span data-dcnode-id="3325" instrument_node=""> </span><div class="credit body-credit padding-8-top padding-8-bottom elementFont__fine--credit" data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">Credit: Bob Stefko</span></div><span data-dcnode-id="3322" instrument_node=""> </span></div><span data-dcnode-id="3320" instrument_node=""> </span><div class="glide-slide-content" data-dcnode-id="3288"><span data-dcnode-id="3319" instrument_node=""> </span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="3290"><p data-dcnode-id="3297"><a data-dcnode-id="3317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/apple/"><span data-dcnode-id="3318" instrument_node="">Apples</span></a><span data-dcnode-id="3316" instrument_node=""> (including </span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/crabapple/"><span data-dcnode-id="3315" instrument_node="">crabapples</span></a><span data-dcnode-id="3313" instrument_node="">), </span><a data-dcnode-id="3311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/peach/"><span data-dcnode-id="3312" instrument_node="">peaches</span></a><span data-dcnode-id="3310" instrument_node="">, </span><a data-dcnode-id="3308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/pear/"><span data-dcnode-id="3309" instrument_node="">pears</span></a><span data-dcnode-id="3307" instrument_node="">, </span><a data-dcnode-id="3305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/plum/"><span data-dcnode-id="3306" instrument_node="">plums</span></a><span data-dcnode-id="3304" instrument_node="">, and </span><a data-dcnode-id="3302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/sweet-cherry--tart-cherry--pie-cherry--bing-cherry/"><span data-dcnode-id="3303" instrument_node="">cherries</span></a><span data-dcnode-id="3301" instrument_node=""> should be pruned in midwinter. Although winter pruning removes some of their flower buds, the goal in pruning fruit trees is to open up the tree to allow in more light for a better crop of fruit, rather than to get maximum bloom. Dormant pruning is especially important for apples, pears, and crabapples because pruning wounds during the growing season expose the trees to a </span><a data-dcnode-id="3299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/pests/insects-diseases-weeds/tree-disease-photos/"><span data-dcnode-id="3300" instrument_node="">bacterial disease called fireblight</span></a><span data-dcnode-id="3298" instrument_node="">.</span></p><span data-dcnode-id="3296" instrument_node=""> </span><p data-dcnode-id="3292"><strong data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">Test Garden Tip:</span></strong><span data-dcnode-id="3293" instrument_node=""> To control the spread of diseases while pruning, dip your pruning shears in rubbing alcohol or a solution of one part bleach to nine parts water.</span></p><span data-dcnode-id="3291" instrument_node=""> </span></div><span data-dcnode-id="3289" instrument_node=""> </span></div><span data-dcnode-id="3287" instrument_node=""> </span><div class="glide-slide-meta-bottom hide-on-mobile hide-on-tablet" data-dcnode-id="3262" style="display: none;"><span data-dcnode-id="3286" instrument_node=""> </span><h2 aria-hidden="true" class="glide-slide-num -id="2925" instrument_node="">, </span><a data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/fir/"><span data-dcnode-id="2924" instrument_node="">fir,</span></a><span data-dcnode-id="2922" instrument_node=""> </span><a data-dcnode-id="2920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/yew/"><span data-dcnode-id="2921" instrument_node="">yew</span></a><span data-dcnode-id="2919" instrument_node="">, </span><a data-dcnode-id="2917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/douglas-fir/"><span data-dcnode-id="2918" instrument_node="">Douglas fir</span></a><span data-dcnode-id="2916" instrument_node="">, and </span><a data-dcnode-id="2914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/false-cypress/"><span data-dcnode-id="2915" instrument_node="">false cypress</span></a><span data-dcnode-id="2913" instrument_node="">) are best pruned early in the growing season. Avoid cutting back into wood that doesn't have any green needles; it may not sprout new growth. Like broadleaf evergreens, you can trim a few branch tips in midwinter to </span><a data-dcnode-id="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/christmas/garlands/holiday-garland-ideas/"><span data-dcnode-id="2912" instrument_node="">take some greenery indoors</span></a><span data-dcnode-id="2910" instrument_node="">.</span></p><span data-dcnode-id="2908" instrument_node=""> </span></div><span data-dcnode-id="2906" instrument_node=""> </span></div><span data-dcnode-id="2904" instrument_node=""> </span><div class="glide-slide-meta-bottom hide-on-mobile hide-on-tablet" data-dcnode-id="2879" style="display: none;"><span data-dcnode-id="2903" instrument_node=" age: Before the new shoots turn woody and before the needles have fully expanded. </span><a data-dcnode-id="2749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/care/how-to-prune-evergreens/"><span data-dcnode-id="2750" instrument_node="">Prune just a portion of the new growth</span></a><span data-dcnode-id="2748" instrument_node="">, removing up to half of the expanding candle.</span></p><span data-dcnode-id="2746" instrument_node=""> </span></div><span data-dcnode-id="2744" instrument_node=""> </span><div class="slidecopy" data-dcnode-id="2743"></div><span data-dcnode-id="2742" instrument_node=""> </span></div><span data-dcnode-id="2740" instrument_node=""> </span><div class="glide-slide-meta-bottom hide-on-mobile hide-on-tablet" data-dcnode-id="2715" style="display: none;"><span data-dcnode-id="2739" instrument_node=""> </span><h2 aria-hidden="true" class="glide-slide-number elementFont__details" data-dcnode-id="2731"><span data-dcnode-id="2738" instrument_node=""> </span><span class="count" data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">12</span></span><span data-dcnode-id="2735" instrument_node=""> of </span><span class="total" data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">17</span></span><span data-dcnode-id="2732" instrument_node=""> </span></h2><span data-dcnode-id="2730" instrument_node=""> </span><button aria-label="Show all slides" class="glide-view-all view-all-btn" data-dcnode-id="2717" data-glide-dir="" data-tracking-zone="view-all"><span data-dcnode-id="2729" instrument_node=""> </span><span class="view-all-inner-wrapper lower-nav" data-dcnode-id="2719"><span data-dcnode-id="2728" instrument_node=""> </span><span class="view-all-button-icon" data-dcnode-id="2724"><svg aria-hidden="true" data-dcnode-id="2726" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M15.984 20.016v-4.031h4.031v4.031h-4.031zM15. elementFont__fine--credit" data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">Credit: Dean Schoeppner</span></div><span data-dcnode-id="2567" instrument_node=""> </span></div><span data-dcnode-id="2565" instrument_node=""> </span><div class="glide-slide-content" data-dcnode-id="2549"><span data-dcnode-id="2564" instrument_node=""> </span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="2551"><p data-dcnode-id="2553"><span data-dcnode-id="2563" instrument_node="">Most </span><a data-dcnode-id="2561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/flowers/perennials/reblooming-beauties-for-the-garden/"><span data-dcnode-id="2562" instrument_node="">perennial flowers</span></a><span data-dcnode-id="2560" instrument_node=""> look best if you remove faded flowers, </span><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/yard/garden-care/deadheading-flowers-for-extended-bloom/"><span data-dcnode-id="2559" instrument_node="">called deadheading</span></a><span data-dcnode-id="2557" instrument_node="">. As a bonus, many perennials will push out another cycle of blooms after deadheading. If your </span><a data-dcnode-id="2555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/flowers/perennials/top-perennials-for-your-garden/"><span data-dcnode-id="2556" instrument_node="">perennial flowers</span></a><span data-dcnode-id="2554" instrument_node=""> become too tall and leggy, or flop open in the middle, try shearing them back to 6-12 inches above the ground. This type of haircut causes them to branch and become stockier.</span></p><span data-dcnode-id="2552" instrument_node=""> </span></div><span data-dcnode-id="2550" instrument_node=""> </span></div><span data-dcnode-id="2548" instrument_node=""> </span><div class="glide-slide-met  data-dcnode-id="2394" instrument_node="">Removing the old flowers</span></a><span data-dcnode-id="2392" instrument_node=""> prevents them from setting seed and allows plants to put more energy into blooming. Some annuals like </span><a data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/annual/petunia/"><span data-dcnode-id="2391" instrument_node="">petunias</span></a><span data-dcnode-id="2389" instrument_node=""> sprawl and develop bare stems at their bases. As with perennials, you can shear these rangy plants to force more compact growth and renewed bloom.</span></p><span data-dcnode-id="2387" instrument_node=""> </span></div><span data-dcnode-id="2385" instrument_node=""> </span></div><span data-dcnode-id="2383" instrument_node=""> </span><div class="glide-slide-meta-bottom hide-on-mobile hide-on-tablet" data-dcnode-id="2358" style="display: none;"><span data-dcnode-id="2382" instrument_node=""> </span><h2 aria-hidden="true" class="glide-slide-number elementFont__details" data-dcnode-id="2374"><span data-dcnode-id="2381" instrument_node=""> </span><span class="count" data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">14</span></span><span data-dcnode-id="2378" instrument_node=""> of </span><span class="total" data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">17</span></span><span data-dcnode-id="2375" instrument_node=""> </span></h2><span data-dcnode-id="2373" instrument_node=""> </span><button aria-label="Show all slides" class="glide-view-all view-all-btn" data-dcnode-id="2360" data-glide-dir="" data-tracking-zone="view-all"><span data-dcnode-id="2372" instrument_node=""> </span><span class="view-all-inner-wrapper lower-nav" data-dcnode-id="2362"><span data-dcnode-id="2371" instrument_node=""> </span><span class="view-all-button-icon" data-dcnode-id="2367"><svg aria-hidden="true" data-dcnode-id="2369" height="24" viewBox="0 0 24 24" width= "24" xmlns="http://www.w3.org/2000/svg"><path d="M2.667 21.333h8v2.667h-10.667v-10.667h2.667v8zM21.333 0h2.667v10.667h-2.667v-8h-8v-2.667h8z" data-dcnode-id="2060"></path></svg><span data-dcnode-id="2058" instrument_node=""> </span></button><span data-dcnode-id="2056" instrument_node=""> </span></div><div class="lazy-image__loadingPlaceholder" data-dcnode-id="2053"><img alt="" class="loadingPlaceholder" data-dcnode-id="2054" height="1768" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20133'%3E%3C/svg%3E" width="1280"></div></div><span data-dcnode-id="2051" instrument_node=""> </span><div class="credit body-credit padding-8-top padding-8-bottom elementFont__fine--credit" data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Credit: Granen Photography</span></div><span data-dcnode-id="2048" instrument_node=""> </span></div><span data-dcnode-id="2046" instrument_node=""> </span><div class="glide-slide-content" data-dcnode-id="2027"><span data-dcnode-id="2045" instrument_node=""> </span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="2031"><p data-dcnode-id="2038"><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/raspberry/"><span data-dcnode-id="2044" instrument_node="">Raspberries</span></a><span data-dcnode-id="2042" instrument_node=""> and </span><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/blackberry/"><span data-dcnode-id="2041" instrument_node="">blackberries</span></a><span data-dcnode-id="2039" instrument_node=""> grow on long stems called canes. On most types, the cane doesn't fruit until its second year of growth. After bearing fruit, that cane dies. But new first-year canes develop at the same time, and will bear fruit the following year. Remove two-year-old canes soon after they finish bearing. They won't fruit again, and they can spread disease if left to grow. Pinch back the tips of first-year canes when they reach about 3-4 feet to cause the cane to branch.</span></p><span data-dcnode-id="2037" instrument_node=""> </span><p data-dcnode-id="2033"><a data-dcnode-id="2035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/vegetable/fruit/how-to-grow-raspberries/"><span data-dcnode-id="2036" instrument_node="">Everbearing types of raspberries</span></a><span data-dcnode-id="2034" instrument_node=""> are an exception. They form a late-summer crop on the tips of first-year canes, so don't pinch them back in midsummer. Instead, allow the canes to flower and fruit for a fall crop. Remove the stem tips that have produced fruit in winter. The following summer the lower portion of the stem will fruit. After it finishes bearing, completely remove the fruited cane.</span></p><span data-dcnode-id="2032" instrument_node=""> </span></div><span data-dcnode-id="2030" instrument_node=""> </span><div class="slidecopy" data-dcnode-id="2029"></div><span data-dcnode-id="2028" instrument_node=""> </span></div><span data-dcnode-id="2026" instrument_node=""> </span><div class="glide-slide-meta-bottom hide-on-mobile hide-on-tablet" data-dcnode-id="2001" style="display: none;"><span data-dcnode-id="2025" instrument_node=""> </span><h2 aria-hidden="true" class="glide-slide-number elementFont__details" data-dcnode-id="2017"><span data-dcnode-id="2024" instrument_node=""> </span><span class="count" data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">16</span></span><span data-dcnode-id="2021" instrument_node=""> of </span><span class="total" data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">17</span></span><span data-dcnode-id="2018" instrument_node=""> </span></h2><span data-dcnode-id="2016" instrument_node=""> </span><button aria-label="Show all s rc="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20133'%3E%3C/svg%3E" width="1280"></div></div><span data-dcnode-id="1883" instrument_node=""> </span><div class="credit body-credit padding-8-top padding-8-bottom elementFont__fine--credit" data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Credit: Matthew Benson</span></div><span data-dcnode-id="1880" instrument_node=""> </span></div><span data-dcnode-id="1878" instrument_node=""> </span><div class="glide-slide-content" data-dcnode-id="1866"><span data-dcnode-id="1877" instrument_node=""> </span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1868"><p data-dcnode-id="1870"><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/grape/"><span data-dcnode-id="1876" instrument_node="">Grapes</span></a><span data-dcnode-id="1874" instrument_node=""> grow vigorously and need extensive pruning each year to keep them productive. Most training systems for grapes involve developing a main stem or trunk with several lateral stems or arms. Grapes fruit on lateral shoots from the current season's woody growth. </span><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/vegetable/fruit/how-to-grow-grapes/"><span data-dcnode-id="1873" instrument_node="">Prune all grapes</span></a><span data-dcnode-id="1871" instrument_node=""> close to the lateral arms each year during the dormant season to produce the best fruit. The degree of pruning depends on the vigor of the variety: Prune vigorous varieties more heavily than weak growers.</span></p><span data-dcnode-id="1869" instrument_node=""> </span></div><span data-dcnode-id="1867" instrument_node=""> </span></div><span data-dcnode-id="1865" instrument_node=""> </span><div class="glide-slide-meta-bottom hide-on </span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1506"><p data-dcnode-id="1508"><span data-dcnode-id="1512" instrument_node="">A good starting point for pruning any plant is to remove dead, diseased, or damaged stems as soon as you see them. Dead stems attract insects and </span><a data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/pests/insects-diseases-weeds/common-plant-diseases/"><span data-dcnode-id="1511" instrument_node="">invite diseases to develop</span></a><span data-dcnode-id="1509" instrument_node="">. Also remove crossing branches, water sprouts (vigorous upright growing shoots that form on trunks or side branches), and suckers (vigorous shoots that develop near or from below ground).</span></p><span data-dcnode-id="1507" instrument_node=""> </span></div><span data-dcnode-id="1505" instrument_node="">
</span></div><span data-dcnode-id="1503" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1460"><p data-dcnode-id="1470"><span data-dcnode-id="1477" instrument_node="">Many </span><a data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/shrubs/best-hydrangeas/"><span data-dcnode-id="1476" instrument_node="">hydrangea types</span></a><span data-dcnode-id="1474" instrument_node=""> bloom on old wood, including bigleaf and oakleaf forms. Prune these types of </span><a data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/hydrangea/"><span data-dcnode-id="1473" instrument_node="">hydrangeas</span></a><span data-dcnode-id="1471" instrument_node=""> before midsummer. If you prune them in winter or early spring, you'll be removing flower buds.</span></p><span data-dcnode-id="1469" instrument_node=""> </span><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">With newer reblooming types, like the Endless Summer Series or Let's Dance Series, when you prune is less critical because these hydrangeas bloom on new growth as well as old wood. Even if you cut off some of the flower buds by pruning the old stems, the plant will still bloom on the new growth.</span></p><span data-dcnode-id="1466" instrument_node=""> </span><p data-dcnode-id="1462"><a data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/shrubs/white-hydrangeas/"><span data-dcnode-id="1465" instrument_node="">White-flowered paniculata</span></a><span data-dcnode-id="1463" instrument_node=""> (like varieties 'PeeGee' and 'Limelight') and arborescens (including 'Annabelle') types flower on new wood, so they can be pruned any time other than just before they bloom.</span></p><span data-dcnode-id="1461" instrument_node=""> </span></div><span data-dcnode-id="1459" instrument_node=""> </span><div class="monetate300_125" data-dcnode-id="1458"></div><span data-dcnode-id="1457" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1410"><p data-dcnode-id="1417"><a data-dcnode-id="1428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/flowers/perennials/early-blooming-flowers/"><span data-dcnode-id="1429" instrument_node="">Early-spring bloomers</span></a><span data-dcnode-id="1427" instrument_node="">, like </span><a data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/lilac/"><span data-dcnode-id="1426" instrument_node="">lilac</span></a><span data-dcnode-id="1424" instrument_node="">, </span><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/forsythia-/"><span data-dcnode-id="1423" instrument_node="">forsythia</span></a><span data-dcnode-id="1421" instrument_node="">, and </span><a data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/rhododendron/"><span data-dcnode-id="1420" instrument_node="">rhododendron</span></a><span data-dcnode-id="1418" instrument_node="">, produce flowers on wood formed the previous year. The best time to prune them is late spring, immediately after they finish blooming. If you prune them later in the growing season or during winter, you'll remove flower buds and decrease the amount of spring bloom.</span></p><span data-dcnode-id="1416" instrument_node=""> </span><p data-dcnode-id="1412"><strong data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Test Garden Tip:</span></strong><span data-dcnode-id="1413" instrument_node=""> To keep spring bloomers flowering vigorously, remove some of the oldest shoots all the way to the ground. This allows younger stems to grow and bloom.</span></p><span data-dcnode-id="1411" instrument_node=""> </span></div><span data-dcnode-id="1409" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1364"><p data-dcnode-id="1371"><span data-dcnode-id="1381" instrument_node="">Plants that </span><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/shrubs/summer-blooming-shrubs/"><span data-dcnode-id="1380" instrument_node="">bloom in summer</span></a><span data-dcnode-id="1378" instrument_node="">, such as </span><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/potentilla/"><span data-dcnode-id="1377" instrument_node="">potentilla</span></a><span data-dcnode-id="1375" instrument_node=""> and </span><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/crape-myrtle/"><span data-dcnode-id="1374" instrument_node="">crape myrtle</span></a><span data-dcnode-id="1372" instrument_node="">, produce their flowers on new growth from the current season. Prune them in winter while they're dormant, or in early spring just before they push out their new growth. You can even cut them all the way to the ground in late winter, and they'll still bloom that same summer.</span></p><span data-dcnode-id="1370" instrument_node=""> </span><p data-dcnode-id="1366"><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Test Garden Tip:</span></strong><span data-dcnode-id="1367" instrument_node=""> Save time by using a pole pruner with a rotating head to remove stems all the way to the base of the plant. That way, you don't have to bend over for each cut, saving not only time, but also wear and tear on your back!</span></p><span data-dcnode-id="1365" instrument_node=""> </span></div><span data-dcnode-id="1363" instrument_node=""> </span><div class="slidecopy" data-dcnode-id="1362 </span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1324"><p data-dcnode-id="1326"><span data-dcnode-id="1333" instrument_node="">Cut back deciduous </span><a data-dcnode-id="1331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/shrubs/colorful-shrubs-for-your-garden/"><span data-dcnode-id="1332" instrument_node="">shrubs grown primarily for their foliage</span></a><span data-dcnode-id="1330" instrument_node="">, such as the golden </span><a data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/smoke-tree/"><span data-dcnode-id="1329" instrument_node="">smoke tree</span></a><span data-dcnode-id="1327" instrument_node=""> shown here, almost anytime except in late autumn. New growth that starts after late-season pruning will be too tender to survive winter. If you want to do major pruning, it's best to cut the shrub back when it's dormant in winter.</span></p><span data-dcnode-id="1325" instrument_node=""> </span></div><span data-dcnode-id="1323" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1281"><p data-dcnode-id="1291"><span data-dcnode-id="1295" instrument_node="">For shrubs like </span><a data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/boxwood/"><span data-dcnode-id="1294" instrument_node="">boxwood</span></a><span data-dcnode-id="1292" instrument_node=""> in a shaped hedge, shear the new growth frequently during the early part of the growing season to help maintain their size and form. Keep the top a little narrower than the base so that the upper branches don't shade the lower ones. Stop shearing the hedge about six weeks before your area's average first frost. Late winter to early spring or mid- to late summer are some of the best times to prune hedges more drastically.</span></p><span data-dcnode-id="1290" instrument_node=""> </span><p data-dcnode-id="1283"><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">Test Garden Tip:</span></strong><span data-dcnode-id="1287" instrument_node=""> If you're </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/shrubs/best-plants-for-hedges/"><span data-dcnode-id="1286" instrument_node="">growing a privacy hedge</span></a><span data-dcnode-id="1284" instrument_node="">, reduce the amount of pruning maintenance needed by selecting shrubs that grow only as tall and wide as necessary to provide screening. Allow them to grow into their natural form, and you won't have to prune very often, if at all.</span></p><span data-dcnode-id="1282" instrument_node=""> </span></div><span data-dcnode-id="1280" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1228"><p data-dcnode-id="1230"><span data-dcnode-id="1252" instrument_node="">Treat </span><a data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/rose/climbing-rose/"><span data-dcnode-id="1251" instrument_node="">climbing roses</span></a><span data-dcnode-id="1249" instrument_node=""> and old garden roses that bloom only once per year the same as other spring-blooming shrubs: </span><a data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/how-to-garden/how-to-deadhead-roses/"><span data-dcnode-id="1248" instrument_node="">Pruning after they finish blooming</span></a><span data-dcnode-id="1246" instrument_node="">. Repeat bloomers, including </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/rose/hybrid-tea-rose/"><span data-dcnode-id="1245" instrument_node="">hybrid teas</span></a><span data-dcnode-id="1243" instrument_node="">, </span><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/rose/floribunda-rose/"><span data-dcnode-id="1242" instrument_node="">floribundas</span></a><span data-dcnode-id="1240" instrument_node="">, </span><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/rose/grandiflora-rose/"><span data-dcnode-id="1239" instrument_node="">grandifloras</span></a><span data-dcnode-id="1237" instrument_node="">, </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/rose/miniature-rose/"><span data-dcnode-id="1236" instrument_node="">miniatures</span></a><span data-dcnode-id="1234" instrument_node="">, and modern </span><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/rose/shrub-rose/"><span data-dcnode-id="1233" instrument_node="">shrub roses</span></a><span data-dcnode-id="1231" instrument_node=""> are pruned mostly to shape the plant or to remove winter-damaged stems (as shown here). If they become overgrown, cut them back in early spring.</span></p><span data-dcnode-id="1229" instrument_node=""> </span></div><span data-dcnode-id="1227" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1167"><p data-dcnode-id="1186"><span data-dcnode-id="1199" instrument_node="">Prune </span><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/trees/shade-trees/"><span data-dcnode-id="1198" instrument_node="">shade trees</span></a><span data-dcnode-id="1196" instrument_node=""> like </span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/oak/"><span data-dcnode-id="1195" instrument_node="">oak</span></a><span data-dcnode-id="1193" instrument_node="">, </span><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/littleleaf-linden/"><span data-dcnode-id="1192" instrument_node="">linden</span></a><span data-dcnode-id="1190" instrument_node="">, and </span><a data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/ash/"><span data-dcnode-id="1189" instrument_node="">ash</span></a><span data-dcnode-id="1187" instrument_node=""> when they are dormant in winter. It's easiest to see the branching structure at this time of year, and you're less likely to spread diseases through the pruning wounds. As with non-blooming shrubs, avoid pruning them late in summer.</span></p><span data-dcnode-id="1185" instrument_node=""> </span><p data-dcnode-id="1169"><strong data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Test Garden Tip:</span></strong><span data-dcnode-id="1182" instrument_node=""> Trees that produce a heavy sap flow when pruned in winter—</span><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/maple/"><span data-dcnode-id="1181" instrument_node="">maples</span></a><span data-dcnode-id="1179" instrument_node="">, </span><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/birch/"><span data-dcnode-id="1178" instrument_node="">birches</span></a><span data-dcnode-id="1176" instrument_node="">, </span><a data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/elm/"><span data-dcnode-id="1175" instrument_node="">elms</span></a><span data-dcnode-id="1173" instrument_node="">, and </span><a data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/dogwood/"><span data-dcnode-id="1172" instrument_node="">dogwoods</span></a><span data-dcnode-id="1170" instrument_node="">—are known as "bleeders." The sap flow may be unsightly, but it doesn't harm the tree. To avoid the bleeding, you can wait until the leaves have fully expanded in summer to prune these species.</span></p><span data-dcnode-id="1168" instrument_node=""> </span></div><span data-dcnode-id="1166" instrument_node=""> </span><div class="slidecopy" data-dcnode-id="1165"></div><span data-dcnode-id="1164" instrument_node="">

</span><h3 class="glide-slide-title elementFont__subhead glide-slide-title--everything-in elementFont__subheadLinkOnly" data-dcnode-id="1138" tabindex="0"><span data-dcnode-id="1139" instrument_node="">When to Prune Deciduous Fruit Trees</span></h3><span data-dcnode-id="1137" instrument_node="">
</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1108"><p data-dcnode-id="1115"><a data-dcnode-id="1135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/apple/"><span data-dcnode-id="1136" instrument_node="">Apples</span></a><span data-dcnode-id="1134" instrument_node=""> (including </span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/crabapple/"><span data-dcnode-id="1133" instrument_node="">crabapples</span></a><span data-dcnode-id="1131" instrument_node="">), </span><a data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/peach/"><span data-dcnode-id="1130" instrument_node="">peaches</span></a><span data-dcnode-id="1128" instrument_node="">, </span><a data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/pear/"><span data-dcnode-id="1127" instrument_node="">pears</span></a><span data-dcnode-id="1125" instrument_node="">, </span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/plum/"><span data-dcnode-id="1124" instrument_node="">plums</span></a><span data-dcnode-id="1122" instrument_node="">, and </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/sweet-cherry--tart-cherry--pie-cherry--bing-cherry/"><span data-dcnode-id="1121" instrument_node="">cherries</span></a><span data-dcnode-id="1119" instrument_node=""> should be pruned in midwinter. Although winter pruning removes some of their flower buds, the goal in pruning fruit trees is to open up the tree to allow in more light for a better crop of fruit, rather than to get maximum bloom. Dormant pruning is especially important for apples, pears, and crabapples because pruning wounds during the growing season expose the trees to a </span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/pests/insects-diseases-weeds/tree-disease-photos/"><span data-dcnode-id="1118" instrument_node="">bacterial disease called fireblight</span></a><span data-dcnode-id="1116" instrument_node="">.</span></p><span data-dcnode-id="1114" instrument_node=""> </span><p data-dcnode-id="1110"><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Test Garden Tip:</span></strong><span data-dcnode-id="1111" instrument_node=""> To control the spread of diseases while pruning, dip your pruning shears in rubbing alcohol or a solution of one part bleach to nine parts water.</span></p><span data-dcnode-id="1109" instrument_node=""> </span></div><span data-dcnode-id="1107" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1059"><p data-dcnode-id="1069"><span data-dcnode-id="1079" instrument_node="">Most broadleaf evergreens, including </span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/holly/"><span data-dcnode-id="1078" instrument_node="">holly</span></a><span data-dcnode-id="1076" instrument_node="">, </span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/grape-holly/"><span data-dcnode-id="1075" instrument_node="">mahonia</span></a><span data-dcnode-id="1073" instrument_node="">, and some types of </span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/magnolia/"><span data-dcnode-id="1072" instrument_node="">magnolias</span></a><span data-dcnode-id="1070" instrument_node="">, don't need much pruning. The best time to prune them is in early spring, just before they put on their growth spurt. You can do minor shaping and pruning at other times of year, too.</span></p><span data-dcnode-id="1068" instrument_node=""> </span><p data-dcnode-id="1061"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Test Garden Tip:</span></strong><span data-dcnode-id="1065" instrument_node=""> </span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/christmas/indoor-decorating/homemade-christmas-decor/"><span data-dcnode-id="1064" instrument_node="">Save on holiday decorations</span></a><span data-dcnode-id="1062" instrument_node=""> by snipping a few branches for winter holiday greenery.</span></p><span data-dcnode-id="1060" instrument_node=""> </span></div><span data-dcnode-id="1058" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="1000"><p data-dcnode-id="1002"><span data-dcnode-id="1030" instrument_node="">Most trees and shrubs with needlelike or scalelike foliage (</span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/spruce/"><span data-dcnode-id="1029" instrument_node="">spruce</span></a><span data-dcnode-id="1027" instrument_node="">, </span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/juniper/"><span data-dcnode-id="1026" instrument_node="">juniper</span></a><span data-dcnode-id="1024" instrument_node="">, </span><a data-dcnode-id="1022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/bald-cypress/"><span data-dcnode-id="1023" instrument_node="">cypress</span></a><span data-dcnode-id="1021" instrument_node="">, </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/arborvitae/"><span data-dcnode-id="1020" instrument_node="">arborvitae</span></a><span data-dcnode-id="1018" instrument_node="">, </span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/fir/"><span data-dcnode-id="1017" instrument_node="">fir,</span></a><span data-dcnode-id="1015" instrument_node=""> </span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/yew/"><span data-dcnode-id="1014" instrument_node="">yew</span></a><span data-dcnode-id="1012" instrument_node="">, </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/douglas-fir/"><span data-dcnode-id="1011" instrument_node="">Douglas fir</span></a><span data-dcnode-id="1009" instrument_node="">, and </span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/false-cypress/"><span data-dcnode-id="1008" instrument_node="">false cypress</span></a><span data-dcnode-id="1006" instrument_node="">) are best pruned early in the growing season. Avoid cutting back into wood that doesn't have any green needles; it may not sprout new growth. Like broadleaf evergreens, you can trim a few branch tips in midwinter to </span><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/christmas/garlands/holiday-garland-ideas/"><span data-dcnode-id="1005" instrument_node="">take some greenery indoors</span></a><span data-dcnode-id="1003" instrument_node="">.</span></p><span data-dcnode-id="1001" instrument_node=""> </span></div><span data-dcnode-id="999" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="962"><p data-dcnode-id="964"><span data-dcnode-id="971" instrument_node="">True </span><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/tree/pine/"><span data-dcnode-id="970" instrument_node="">pines</span></a><span data-dcnode-id="968" instrument_node=""> are pickier about their pruning needs than other needle-leaf evergreens. Pines only form buds at branch tips before the stem becomes woody. For the best results, only prune pines in the candle stage: Before the new shoots turn woody and before the needles have fully expanded. </span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/trees-shrubs-vines/care/how-to-prune-evergreens/"><span data-dcnode-id="967" instrument_node="">Prune just a portion of the new growth</span></a><span data-dcnode-id="965" instrument_node="">, removing up to half of the expanding candle.</span></p><span data-dcnode-id="963" instrument_node=""> </span></div><span data-dcnode-id="961" instrument_node=""> </span><div class="slidecopy" data-dcnode-id="960"></div><span data-dcnode-id="959" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="919"><p data-dcnode-id="921"><span data-dcnode-id="931" instrument_node="">Most </span><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/flowers/perennials/reblooming-beauties-for-the-garden/"><span data-dcnode-id="930" instrument_node="">perennial flowers</span></a><span data-dcnode-id="928" instrument_node=""> look best if you remove faded flowers, </span><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/yard/garden-care/deadheading-flowers-for-extended-bloom/"><span data-dcnode-id="927" instrument_node="">called deadheading</span></a><span data-dcnode-id="925" instrument_node="">. As a bonus, many perennials will push out another cycle of blooms after deadheading. If your </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/flowers/perennials/top-perennials-for-your-garden/"><span data-dcnode-id="924" instrument_node="">perennial flowers</span></a><span data-dcnode-id="922" instrument_node=""> become too tall and leggy, or flop open in the middle, try shearing them back to 6-12 inches above the ground. This type of haircut causes them to branch and become stockier.</span></p><span data-dcnode-id="920" instrument_node=""> </span></div><span data-dcnode-id="918" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="878"><p data-dcnode-id="880"><span data-dcnode-id="890" instrument_node="">Deadhead </span><a data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/flowers/annuals/annuals-with-fragrant-flowers/"><span data-dcnode-id="889" instrument_node="">annual flowers</span></a><span data-dcnode-id="887" instrument_node=""> regularly to keep them blooming well. </span><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/yard/garden-care/thinning-and-deadheading/"><span data-dcnode-id="886" instrument_node="">Removing the old flowers</span></a><span data-dcnode-id="884" instrument_node=""> prevents them from setting seed and allows plants to put more energy into blooming. Some annuals like </span><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/annual/petunia/"><span data-dcnode-id="883" instrument_node="">petunias</span></a><span data-dcnode-id="881" instrument_node=""> sprawl and develop bare stems at their bases. As with perennials, you can shear these rangy plants to force more compact growth and renewed bloom.</span></p><span data-dcnode-id="879" instrument_node=""> </span></div><span data-dcnode-id="877" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="840"><p data-dcnode-id="842"><span data-dcnode-id="849" instrument_node="">The most productive portions of </span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/blueberry/"><span data-dcnode-id="848" instrument_node="">blueberry</span></a><span data-dcnode-id="846" instrument_node="">, </span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/shrub/fuchsia-flowering-gooseberry/"><span data-dcnode-id="845" instrument_node="">gooseberry</span></a><span data-dcnode-id="843" instrument_node="">, and currant bushes are stems that are three years old or less. To maintain a constant supply of productive wood, prune out about a third of the oldest stems on these shrubs each winter. Cut the old stems off at ground level.</span></p><span data-dcnode-id="841" instrument_node=""> </span></div><span data-dcnode-id="839" instrument_node="">

</span><h3 class="glide-slide-title elementFont__subhead glide-slide-title--everything-in elementFont__subheadLinkOnly" data-dcnode-id="813" tabindex="0"><span data-dcnode-id="814" instrument_node="">When to Prune Cane Berries</span></h3><span data-dcnode-id="812" instrument_node="">
</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="798"><p data-dcnode-id="805"><a data-dcnode-id="810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/raspberry/"><span data-dcnode-id="811" instrument_node="">Raspberries</span></a><span data-dcnode-id="809" instrument_node=""> and </span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/blackberry/"><span data-dcnode-id="808" instrument_node="">blackberries</span></a><span data-dcnode-id="806" instrument_node=""> grow on long stems called canes. On most types, the cane doesn't fruit until its second year of growth. After bearing fruit, that cane dies. But new first-year canes develop at the same time, and will bear fruit the following year. Remove two-year-old canes soon after they finish bearing. They won't fruit again, and they can spread disease if left to grow. Pinch back the tips of first-year canes when they reach about 3-4 feet to cause the cane to branch.</span></p><span data-dcnode-id="804" instrument_node=""> </span><p data-dcnode-id="800"><a data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/vegetable/fruit/how-to-grow-raspberries/"><span data-dcnode-id="803" instrument_node="">Everbearing types of raspberries</span></a><span data-dcnode-id="801" instrument_node=""> are an exception. They form a late-summer crop on the tips of first-year canes, so don't pinch them back in midsummer. Instead, allow the canes to flower and fruit for a fall crop. Remove the stem tips that have produced fruit in winter. The following summer the lower portion of the stem will fruit. After it finishes bearing, completely remove the fruited cane.</span></p><span data-dcnode-id="799" instrument_node=""> </span></div><span data-dcnode-id="797" instrument_node=""> </span><div class="slidecopy" data-dcnode-id="796"></div><span data-dcnode-id="795" instrument_node="">

</span><div class="glide-slide-desc elementFont__body--paragraphWithin elementFont__body--linkWithin" data-dcnode-id="759"><p data-dcnode-id="761"><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/plant-dictionary/fruit/grape/"><span data-dcnode-id="767" instrument_node="">Grapes</span></a><span data-dcnode-id="765" instrument_node=""> grow vigorously and need extensive pruning each year to keep them productive. Most training systems for grapes involve developing a main stem or trunk with several lateral stems or arms. Grapes fruit on lateral shoots from the current season's woody growth. </span><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bhg.com/gardening/vegetable/fruit/how-to-grow-grapes/"><span data-dcnode-id="764" instrument_node="">Prune all grapes</span></a><span data-dcnode-id="762" instrument_node=""> close to the lateral arms each year during the dormant season to produce the best fruit. The degree of pruning depends on the vigor of the variety: Prune vigorous varieties more heavily than weak growers.</span></p><span data-dcnode-id="760" instrument_node=""> </span></div><span data-dcnode-id="758" instrument_node="">
