</span><div class="bordeaux-slot" data-dcnode-id="2203" data-feat-ref="bordeaux-feat-id-106" id="bordeaux-static-slot-1" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">If you're a newcomer to tomato growing, chances are you'll be wondering how to prune tomato plants – also known as pinching tomato suckers or side shoots – or even if you need to do it at all?</span></p><div class="ad-unit" data-dcnode-id="2200" id="ad-unit-1"></div><div class="bordeaux-slot" data-dcnode-id="2199" data-feat-ref="bordeaux-feat-id-107" id="bordeaux-static-slot-2" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">The answer is that it depends on the type of tomatoes you are growing. If you prune, or pinch out, the wrong sort of tomatoes, you can actually hinder rather than help the harvest of these versatile and delicious fruits.</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2196" data-render-type="fte" data-skip="dealsy" data-widget-type="seasonal"></aside><div class="bordeaux-slot" data-dcnode-id="2195" data-feat-ref="bordeaux-feat-id-108" id="bordeaux-static-slot-3" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="2191"><a class="hawk-link-parsed" data-component="Inline Links" data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homesandgardens.com/advice/growing-tomatoes"><span data-dcnode-id="2194" instrument_node="">Growing tomatoes</span></a><span data-dcnode-id="2192" instrument_node=""> is easy and well worth it as the sweet flavor of a homegrown tomato is far better and unlike any you will have tasted from a supermarket.&nbsp;</span></p><div class="in-article ad-unit" data-dcnode-id="2143" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumb _node=""> varieties, which need to be staked or have some other support as they grow tall, as high as 6ft</span></li></ul><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1634"><div class="image-full-width-wrapper" data-dcnode-id="1637"><div class="image-widthsetter" data-dcnode-id="1638" style="max-width:1666px;"><p class="vanilla-image-block" data-dcnode-id="1639" style="padding-top:150.06%;"><picture data-dcnode-id="1640"><source alt="cordon tomatoes in pots" class="lazy-image-van optional-image" data-dcnode-id="1643" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-320-80.jpg.webp 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-320-80.jpg.webp 320w" type="image/webp"><source alt="cordon tomatoes in pots" class="lazy-image-van optional-image" data-dcnode-id="1642" data-normal="https://vanilla.futurecdn.net/home " loading="lazy" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/homesandgardens/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/KXLjsyeLM5kf5N6kEFHwA6-320-80.jpg 320w"></picture></p></div></div><div class="credit" data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">(Image credit: Getty Images)</span></div></figure><div class="bordeaux-slot" data-dcnode-id="1633" data-feat-ref="bordeaux-feat-id-112" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1622"><span data-dcnode-id="1632" instrument_node="">'Pruning tomatoes is optional, but you should </span><em data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">only</span></em><span data-dcnode-id="1629" instrument_node=""> prune</span><strong data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node=""> indeterminate</span></strong><span data-dcnode-id="1626" instrument_node=""> varieties, as these produce new leaves and flowers through the growing season,' advises Amy Enfield of </span><a class="hawk-link-parsed" data-component="Inline Links" data-dcnode-id="1624" data-url="https://bonnieplants.com/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bonnieplants.com/" rel="nofollow" target="_blank"><span data-dcnode-id="1625" instrument_node="">Bonnies Plants</span></a><span data-dcnode-id="1623" instrument_node="">.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="1621" data-feat-ref="bordeaux-feat-id-113" id="bordeaux-static-slot-8" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1616"><span data-dcnode-id="1620" instrument_node="">Determinate, or bush varieties, </span><strong data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">do not</span></strong><span data-dcnode-id="1617" instrument_node=""> require pruning as they develop all of their fruit at one time, and if you do prune them you could even reduce the harvest.</span></p><div class="bordeaux-slot" data-dcnode-id="1615" data-feat-ref="bordeaux-feat-id-114" id="bordeaux-static-slot-9" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Pruning cordon or vine tomatoes, or pinching the tomato suckers, is done by finding and pinching out the small leafy side shoots that grow in the gap between the main stem and leaf branches on the tomato plants.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="1612" data-feat-ref="bordeaux-feat-id-115" id="bordeaux-static-slot-10" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">You should do this about once a week during the growing season, and where possible, remove the suckers when they are small.</span></p><ul data-dcnode-id="1601"><li data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Find the suckers on the tomato plant.</span></li><li data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">If they are less than two inches long, pinch the suckers off between your thumb and forefinger.</span></li><li data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">If the suckers are larger, use a pair of clean pruners to cut them off, snipping as low as possible, close to the shoot base.</span></li><li data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Regularly look for suckers as you are watering or harvesting the plants through the growing season.</span></li></ul><div class="bordeaux-slot" data-dcnode-id="1600" data-feat-ref="bordeaux-feat-id-116" id="bordeaux-static-slot-11" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1595"><span data-dcnode-id="1599" instrument_node="">It might appear a bit arduous, but in fact pruning tomatoes is just one of the easy tasks you need keep on top of and add to the list of jobs when </span><a class="hawk-link-parsed" data-component="Inline Links" data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homesandgardens.com/advice/planning-a-kitchen-garden"><span data-dcnode-id="1598" instrument_node="">planning a kitchen garden</span></a><span data-dcnode-id="1596" instrument_node="">.</span></p><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1585"><div class="image-full-width-wrapper" data-dcnode-id="1588"><div class="image-widthsetter" data-dcnode-id="1589" style="max-width:4243px;"><p class="vanilla-image-block" data-dcnode-id="1590" style="padding-top:120.01%;"><picture data-dcnode-id="1591"><source alt="Tomato plant in a greenhouse" class="lazy-image-van optional-image" data-dcnode-id="1594" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-320-80.jpg.webp 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-320-80.jpg.webp 320w" type="image/webp"><source alt="Tomato plant in a greenhouse" class="lazy-image-van optional-image" data-dcnode-id="1593" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-320-80.jpg 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-320-80.jpg 320w" type="image/jpeg"><img alt="Tomato plant in a greenhouse" class="lazy-image-van optional-image loaded" data-dcnode-id="1592" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-320-80.jpg 320w" loading="lazy" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/homesandgardens/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/tqEw9yiDjwdc5zhCx6KN96-320-80.jpg 320w"></picture></p></div></div><div class="credit" data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">(Image credit: Photo by Annie Spratt on Unsplash)</span></div></figure><h2 data-dcnode-id="1583" id="do-tomato-plants-need-to-be-pruned-2"><span data-dcnode-id="1584" instrument_node="">Do tomato plants need to be pruned?</span></h2><div class="bordeaux-slot" data-dcnode-id="1582" data-feat-ref="bordeaux-feat-id-117" id="bordeaux-static-slot-12" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">Indeterminate tomato plants do benefit from being pruned for a number of reasons.</span></p><div class="bordeaux-slot" data-dcnode-id="1579" data-feat-ref="bordeaux-feat-id-118" id="bordeaux-static-slot-13" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1574"><span data-dcnode-id="1578" instrument_node="">'When I first started growing tomatoes, I largely left them to their own devices, occasionally tying them to their supporting canes, not realizing that the cordon varieties need pinching out in order to thrive,' says keen grower and </span><em data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Period Living</span></em><span data-dcnode-id="1575" instrument_node=""> editor Melanie Griffiths.</span></p><div class="bordeaux-slot" data-dcnode-id="1573" data-feat-ref="bordeaux-feat-id-119" id="bordeaux-static-slot-14" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">Pruning tomato plants helps them to put their energy into producing fruits rather than producing more foliage. Pruning – or pinching out side shoots – should result in the tomato plants producing larger fruit and earlier in the season.</span></p><div class="bordeaux-slot" data-dcnode-id="1570" data-feat-ref="bordeaux-feat-id-120" id="bordeaux-static-slot-15" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">'You may have fewer fruit on a pruned plant, but they will be bigger,' explains Amy Enfield.</span></p><div class="bordeaux-slot" data-dcnode-id="1567" data-feat-ref="bordeaux-feat-id-121" id="bordeaux-static-slot-16" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">In addition, removing leaves allows better air flow around the plant, so reducing the chance of diseases developing when leaves remain wet, and also allows more sunlight to reach the ripening tomatoes.</span></p><div class="bordeaux-slot" data-dcnode-id="1564" data-feat-ref="bordeaux-feat-id-122" id="bordeaux-static-slot-17" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1559"><span data-dcnode-id="1563" instrument_node="">If you are short on space in your vegetable garden, pruning tomato plants will help to keep them under control, creating more space for other plants. This is an important consideration when looking into </span><a class="hawk-link-parsed" data-component="Inline Links" data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homesandgardens.com/advice/tomato-companion-planting"><span data-dcnode-id="1562" instrument_node="">tomato companion planting</span></a><span data-dcnode-id="1560" instrument_node="">.</span></p><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1549"><div class="image-full-width-wrapper" data-dcnode-id="1552"><div class="image-widthsetter" data-dcnode-id="1553" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="1554" style="padding-top:56.25%;"><picture data-dcnode-id="1555"><source alt="tomatoes with flowers and veg" class="lazy-image-van optional-image" data-dcnode-id="1558" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/rWjz3rX g"><img alt="tomatoes with flowers and veg" class="lazy-image-van optional-image loaded" data-dcnode-id="1556" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-320-80.jpg 320w" loading="lazy" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/homesandgardens/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/rWjz3rXsp96EsgZDxAe3Ro-320-80.jpg 320w"></picture></p></div></div><div class="credit" data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">(Image credit: Getty Images)</span></div></figure><h2 data-dcnode-id="1547" id="how-far-up-should-you-prune-tomato-plants-2"><span data-dcnode-id="1548" instrument_node="">How far up should you prune tomato plants?</span></h2><div class="bordeaux-slot" data-dcnode-id="1546" data-feat-ref="bordeaux-feat-id-123" id="bordeaux-static-slot-18" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">'You can start pruning tomato plants, or pinching them out, when the plants reach four to six inches in height,' advises Melanie Griffiths.</span></p><div class="bordeaux-slot" data-dcnode-id="1543" data-feat-ref="bordeaux-feat-id-124" id="bordeaux-static-slot-19" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Remove all leafy suckers/ side shoots beneath the first fruit cluster so the plant puts more energy into developing the fruit.</span></p><div class="bordeaux-slot" data-dcnode-id="1540" data-feat-ref="bordeaux-feat-id-125" id="bordeaux-static-slot-20" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">When the cordon tomato plant has produced six or seven fruit trusses (indoors), or four trusses (outdoors) – remove the tip of the main stem – known as 'stopping' or 'topping'. This will direct sugars and energy into the ripening tomatoes.</span></p><div class="bordeaux-slot" data-dcnode-id="1537" data-feat-ref="bordeaux-feat-id-126" id="bordeaux-static-slot-21" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">You can also remove some leaves above each truss so that it receives more sunlight and this will encourage earlier ripening.</span></p><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1525"><div class="image-full-width-wrapper" data-dcnode-id="1528"><div class="image-widthsetter" data-dcnode-id="1529"><p class="vanilla-image-block" data-dcnode-id="1530" style="padding-top:56.25%;"><picture data-dcnode-id="1531"><source alt="tomatoes inside on a windowsill" class="lazy-image-van optional-image" data-dcnode-id="1534" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-320-80.jpg.webp 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-320-80.jpg.webp 320w" type="image/webp"><source alt="tomatoes inside on a windowsill" class="lazy-image-van optional-image" data-dcnode-id="1533" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-320-80.jpg 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-320-80.jpg 320w" type="image/jpeg"><img alt="tomatoes inside on a windowsill" class="lazy-image-van optional-image loaded" data-dcnode-id="1532" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-320-80.jpg 320w" loading="lazy" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/homesandgardens/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/8kmcdrf86gftWowwnFQ3wQ-320-80.jpg 320w"></picture></p></div></div><div class="credit" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">(Image credit: TI Media)</span></div></figure><h2 data-dcnode-id="1523" id="should-tomato-plants-be-pruned-at-the-bottom-2"><span data-dcnode-id="1524" instrument_node="">Should tomato plants be pruned at the bottom?</span></h2><div class="bordeaux-slot" data-dcnode-id="1522" data-feat-ref="bordeaux-feat-id-127" id="bordeaux-static-slot-22" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Both determinate and indeterminate tomato plants can be pruned at the bottom once the lowest truss of fruit has formed.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="1519" data-feat-ref="bordeaux-feat-id-128" id="bordeaux-static-slot-23" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Do this by removing the lower leaves to reduce the spread of soil-borne diseases, such as tomato blight or tomato leaf mold.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="1516" data-feat-ref="bordeaux-feat-id-129" id="bordeaux-static-slot-24" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Clip away any leaves that are touching the soil and continue pruning up to a foot from the ground, below the ripening truss, to help stop disease spreading.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="1513" data-feat-ref="bordeaux-feat-id-130" id="bordeaux-static-slot-25" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Regularly remove any dead or yellowing leaves, although do not remove too many leaves at once.</span></p><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1501"><div class="image-full-width-wrapper" data-dcnode-id="1504"><div class="image-widthsetter" data-dcnode-id="1505" style="max-width:2000px;"><p class="vanilla-image-block" data-dcnode-id="1506" style="padding-top:120.00%;"><picture data-dcnode-id="1507"><source alt="tomato plant" class="lazy-image-van optional-image" data-dcnode-id="1510" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-320-80.jpg.webp 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-320-80.jpg.webp 320w" type="image/webp"><source alt="tomato plant" class="lazy-image-van optional-image" data-dcnode-id="1509" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/X s/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/XrgwUKXgTf8cB2wm46T3yf-320-80.jpg 320w"></picture></p></div></div><div class="credit" data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">(Image credit: Future / Annaick Guitteny)</span></div></figure><h2 data-dcnode-id="1499" id="what-happens-if-you-don-apos-t-prune-tomatoes-2"><span data-dcnode-id="1500" instrument_node="">What happens if you don't prune tomatoes?</span></h2><div class="bordeaux-slot" data-dcnode-id="1498" data-feat-ref="bordeaux-feat-id-131" id="bordeaux-static-slot-26" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Pruning tomato plants is optional and if you did not wish to do so you would still get fruits from your plant, they just may not be as large, or the plant as healthy and vigorous.</span></p><div class="bordeaux-slot" data-dcnode-id="1495" data-feat-ref="bordeaux-feat-id-132" id="bordeaux-static-slot-27" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Left to grow untrained, cordon or vine tomatoes will produce lots of leaves and possibly not as much useable fruit.</span></p><p data-dcnode-id="1487"><span data-dcnode-id="1492" instrument_node="">'The reason you take out the side shoots is because you want one strong stem growing up on a cordon tomato, and with the side shoots it is trying to become a bush. The side shoots are very vigorous and can quickly risk breaking the main stem,' explains gardening expert Monty Don in a video for </span><a class="hawk-link-parsed" data-component="Inline Links" data-dcnode-id="1489" data-url="https://www.gardenersworld.com/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenersworld.com/" rel="nofollow" target="_blank"><em data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Gardeners' World</span></em></a><span data-dcnode-id="1488" instrument_node="">.</span></p><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1477"><div class="image-full-width-wrapper" data-dcnode-id="1480"><div class="image-widthsetter" data-dcnode-id="1481" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="1482" style="padding-top:56.25%;"><picture data-dcnode-id="1483"><source alt="picking tomatoes" class="lazy-image-van optional-image" data-dcnode-id="1486" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-320-80.jpg.webp 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-415-80.jpg.web 80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-320-80.jpg 320w" loading="lazy" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/homesandgardens/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/7P76HvCzMXbgPh2QfobzCM-320-80.jpg 320w"></picture></p></div></div><div class="credit" data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">(Image credit: Getty Images)</span></div></figure><h2 data-dcnode-id="1475" id="tomato-pruning-mistakes-2"><span data-dcnode-id="1476" instrument_node="">Tomato pruning mistakes</span></h2><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">There are a number of tomato pruning mistakes to avoid:</span></p><ul data-dcnode-id="1460"><li data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Do not prune determinate tomato varieties - check which type of tomato you are growing before you start removing side shoots.</span></li><li data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Take care not to damage the stem tissue when removing tomato suckers.</span></li><li data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">Avoid transferring any diseases from plant to plant when pruning larger suckers or side shoots, by making sure you clean pruners between plants.</span></li><li data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Do not use tools that are not sharp and clean for pruning.</span></li><li data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Do not over prune by removing too many leaves as this may result in the tomato plant having insufficient shade from a hot sun; plus, leaves are needed to photosynthesize and produce sugars and energy for plant growth.</span></li><li data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Do not prune tomato plants when wet as this can encourage the spread of diseases.</span></li></ul><span data-dcnode-id="1459" instrument_node="">

</span><div class="author__bio" data-dcnode-id="1428"><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Rachel is senior content editor, and writes and commissions gardening content for homesandgardens.com, Homes &amp; Gardens magazine, and its sister titles Period Living Magazine and Country Homes &amp; Interiors.&nbsp;She has written for lifestyle magazines for many years, with a particular focus on gardening, historic houses and arts and crafts, but started out her journalism career in BBC radio, where she enjoyed reporting on and writing programme scripts for all manner of stories. Rachel then moved into regional lifestyle magazines, where the topics she wrote about, and people she interviewed, were as varied and eclectic as they were on radio. Always harboring a passion for homes and gardens, she jumped at the opportunity to work on The English Home and The English Garden magazines for a number of years, before joining the Period Living team, then the wider Homes &amp; Gardens team, specializing in gardens.</span></p></div><span data-dcnode-id="1427" instrument_node="">
