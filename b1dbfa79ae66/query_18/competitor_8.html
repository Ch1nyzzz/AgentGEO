</span><div class="bordeaux-slot" data-dcnode-id="2184" data-feat-ref="bordeaux-feat-id-110" id="bordeaux-static-slot-1" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Knowing how to prune lavender is important if you want these heavenly scented plants to stay in good shape for years to come.</span></p><div class="ad-unit" data-dcnode-id="2181" id="ad-unit-1"></div><div class="bordeaux-slot" data-dcnode-id="2180" data-feat-ref="bordeaux-feat-id-111" id="bordeaux-static-slot-2" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">Lavender is an essential plant for adding fragrance to the garden, and has long been prized for its therapeutic properties. It’s also a magnet for bees, butterflies and other precious pollinators, creating a haven for wildlife.&nbsp;</span></p><aside class="hawk-nest hawk-processed" data-dcnode-id="2177" data-feat-ref="hawk-id-1" data-render-type="fte" data-result="missing" data-skip="dealsy" data-widget-id="6157196627488462000" data-widget-type="seasonal"></aside><div class="bordeaux-slot" data-dcnode-id="2176" data-feat-ref="bordeaux-feat-id-112" id="bordeaux-static-slot-3" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">However, left to its own devices, lavender can become woody and ragged. If neglected for too long the plants will struggle to recover and you’ll need to replace them with new ones.&nbsp;</span></p><div class="in-article ad-unit" data-dcnode-id="2126" id="desktop-in-article"><div class="trc_related_container trc_spotlight_widget trc_elastic trc_elastic_thumbnails-a-mid" data-dcnode-id="2127" data-placement-name="Mid Article" id="desktop-taboola-mid-article" observeid="tbl-observe-0 tbl-observe-2"><div class="trc_rbox_container" data-dcnode-id="2128"><div data- lass="jw-shortcuts-key jw-reset" data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">f</span></span></div><div class="jw-shortcuts-row jw-reset" data-dcnode-id="2015"><span class="jw-shortcuts-description jw-reset" data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">Mute/Unmute</span></span><span class="jw-shortcuts-key jw-reset" data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">m</span></span></div><div class="jw-shortcuts-row jw-reset" data-dcnode-id="2010"><span class="jw-shortcuts-description jw-reset" data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Seek %</span></span><span class="jw-shortcuts-key jw-reset" data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">0-9</span></span></div></div></div></div></div></div><div class="afs_ads ad-placement" data-dcnode-id="2003" style="width: 1px; height: 1px; position: absolute; background: transparent;"><span data-dcnode-id="2004" instrument_node="">&nbsp;</span></div></div></div></div></div></div></div></div><div class="bordeaux-slot" data-dcnode-id="1995" data-feat-ref="bordeaux-feat-id-114" id="bordeaux-static-slot-5" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1990"><span data-dcnode-id="1994" instrument_node="">The good news is that it’s easy to learn </span><a class="hawk-link-parsed" data-component="Inline Links" data-dcnode-id="1992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.homesandgardens.com/advice/how-to-grow-lavender"><span data-dcnode-id="1993" instrument_node="">how to grow lavender</span></a><span data-dcnode-id="1991" instrument_node=""> from cuttings and seed, so if you struggle to keep existing plants looking good, then you can cultivate a constant supply of new ones.</span></p><div class="ad-unit" data-dcnode-id="1989" id="ad-unit-2"></div><div class="bordeaux-slot" data-dcnode-id="1988" data-feat-ref="bordeaux-feat-id-115" id="bordeaux-static-slot-6" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">There is more than one kind of lavender – with English lavenders, such as Hidcote and Munstead, being the most popular, and the hardiest. Other European lavender varieties are less hardy, and so you will need to take extra care when pruning. However, if you stick to a few golden rules, you can apply them to all of your lavender plants.</span></p><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1976"><div class="image-full-width-wrapper" data-dcnode-id="1979"><div class="image-widthsetter" data-dcnode-id="1980" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="1981" style="padding-top:81.15%;"><picture data-dcnode-id="1982"><source alt="formal garden with lavender borders" class="lazy-image-van optional-image" data-dcnode-id="1985" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-320-80.jpg.webp 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-768-80.jpg.webp 768w, https:/ .net/jiBDCtChSjLxssa9TGtX4M-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-320-80.jpg 320w" loading="lazy" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/homesandgardens/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/jiBDCtChSjLxssa9TGtX4M-320-80.jpg 320w"></picture></p></div></div><div class="credit" data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">(Image credit: Leigh Clapp)</span></div></figure><h2 data-dcnode-id="1974" id="how-to-prune-lavender-in-its-first-year-2"><span data-dcnode-id="1975" instrument_node="">How to prune lavender in its first year</span></h2><div class="bordeaux-slot" data-dcnode-id="1973" data-feat-ref="bordeaux-feat-id-116" id="bordeaux-static-slot-7" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Lavender only requires a light trim in its first year, but to avoid the plants from becoming leggy in future, it’s important to get them off to a good start.</span></p><div class="bordeaux-slot" data-dcnode-id="1970" data-feat-ref="bordeaux-feat-id-117" id="bordeaux-static-slot-8" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">At this early stage, pruning is about encouraging new growth, and developing a nice mounded shape. If you have grown the lavender from seed or cuttings, then it is beneficial to pinch out new growth tips to help the plant become bushy.</span></p><div class="bordeaux-slot" data-dcnode-id="1967" data-feat-ref="bordeaux-feat-id-118" id="bordeaux-static-slot-9" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Tackle pruning new lavender during the summer, after the plant has flowered.</span></p><ol data-dcnode-id="1956"><li data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Using a clean, sharp pair of secateurs cut each stem back by up to a third, to remove the flowers and some of the green stem growth.</span></li><li data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Do not cut the plant back ‘hard’ by going near the woody base of the stem – it is essential to leave plenty of green on the stems when the plants are young.</span></li><li data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Try to make an even dome shape by leaving the stems longer in the middle, and gradually going shorter as you move to the outer edges of the plant.</span></li><li data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">After trimming your lavender, you may get a second flush of flowers. Prune these the same way once finished – but do it well before the cold fall weather sets in.</span></li></ol><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1946"><div class="image-full-width-wrapper" data-dcnode-id="1949"><div class="image-widthsetter" data-dcnode-id="1950" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="1951" style="padding-top:74.17%;"><picture data-dcnode-id="1952"><sourc cms.futurecdn.net/m8eHtzZap9BUUH4PCvsjXC-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/m8eHtzZap9BUUH4PCvsjXC-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/m8eHtzZap9BUUH4PCvsjXC-320-80.jpg 320w"></picture></p></div></div><div class="credit" data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">(Image credit: Raquel Lonas / Getty Images)</span></div></figure><h2 data-dcnode-id="1944" id="how-to-prune-mature-lavender-plants-2"><span data-dcnode-id="1945" instrument_node="">How to prune mature lavender plants</span></h2><div class="bordeaux-slot" data-dcnode-id="1943" data-feat-ref="bordeaux-feat-id-119" id="bordeaux-static-slot-10" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Lavender plants will establish quickly, so from their second year you will need to follow a simple – but thorough – pruning regime to keep them in shape.</span></p><div class="bordeaux-slot" data-dcnode-id="1940" data-feat-ref="bordeaux-feat-id-120" id="bordeaux-static-slot-11" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">When deciding how to prune lavender, there are are different schools of thought about when and how often to do it. But it's best to tackle the plants in two stages: ‘Trim after flowering, then prune in the spring,’ says Clapp.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="1937" data-feat-ref="bordeaux-feat-id-121" id="bordeaux-static-slot-12" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Don’t prune lavender too hard after summer ends, or it may struggle to survive the onset of colder weather.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="1934" data-feat-ref="bordeaux-feat-id-122" id="bordeaux-static-slot-13" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1928"><span data-dcnode-id="1933" instrument_node="">‘If you crop the entire plant back to old wood it can mean big trouble,’ says celebrity gardener Monty Don in his book </span><a class="hawk-link-parsed" data-component="Inline Links" data-custom-tracking-id="8928824316347258000" data-dcnode-id="1930" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="The Complete Gardener" data-merchant-id="1471" data-merchant-name="Amazon US" data-merchant-network="Amazon" data-merchant-url="amazon.com" data-placeholder-url="https://target.georiot.com/Proxy.ashx?tsid=107655&amp;GR_URL=https%3A%2F%2Famazon.com%2FComplete-Gardener-practical-imaginative-gardening%2Fdp%2F0241424305%2Fref%3Dsr_1_2%3Fcrid%3D3PN6UA3J9VY4R%26dchild%3D1%26keywords%3Dmonty%2Bdon%2Bcomplete%2Bgardener%26qid%3D1630073285%26sprefix%3Dmonty%2Bdon%2Bcompl%252Caps%252C231%26sr%3D8-2%26tag%3Dhawk-future-20%26ascsubtag%3Dhawk-custom-tracking-20" data-url="https://www.amazon.com/Complete-Gardener-practical-imaginative-gardening/dp/0241424305/ref=sr_1_2?crid=3PN6UA3J9VY4R&amp;dchild=1&amp;keywords=monty+don+complete+gardener&amp;qid=1630073285&amp;sprefix=monty+don+compl%2Caps%2C231&amp;sr=8-2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//target.georiot.com/Proxy.ashx%3Ftsid%3D107655%26GR_URL%3Dhttps%253A%252F%252Famazon.com%252FComplete-Gardener-practical-imaginative-gardening%252Fdp%252F0241424305%252Fref%253Dsr_1_2%253Fcrid%253D3PN6UA3J9VY4R%2526dchild%253D1%2526keywords%253Dmonty%252Bdon%252Bcomplete%252Bgardener%2526qid%253D1630073285%2526sprefix%253Dmonty%252Bdon%252Bcompl%25252Caps%25252C231%2526sr%253D8-2%2526tag%253Dhawk-future-20%2526ascsubtag%253Dhomesandgardens-us-8928824316347258000-20" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><em data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">The Complete Gardener</span></em></a><span data-dcnode-id="1929" instrument_node="">. ‘Lavender is evergreen, which means that it keeps – and needs – its leaves all winter. If you cut into the old wood, which does not have any leaves, and new leaves do not grow, then it will not survive.’</span></p><div class="bordeaux-slot" data-dcnode-id="1927" data-feat-ref="bordeaux-feat-id-123" id="bordeaux-static-slot-14" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">If you forget to prune your lavender during the summer, then it’s best wait until the following spring, especially for less hardy French, Spanish and Italian lavenders.</span></p><div class="bordeaux-slot" data-dcnode-id="1924" data-feat-ref="bordeaux-feat-id-124" id="bordeaux-static-slot-15" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">When pruning your lavender in the summer, you may want to harvest the flowers for their therapeutic and culinary uses. If so, do this when around half of the buds are in bloom. Otherwise, wait until the flowers have faded before pruning.</span></p><ol data-dcnode-id="1915"><li data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">To prune your lavender in the summer, grab handfuls of the stems and, using clean, sharp secateurs, snip them off, removing up to a third of the plant’s growth.</span></li><li data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Try to maintain a good rounded shape to the plant, but do not cut too close to the woody base of the stems, or the plant might struggle to overwinter.</span></li><li data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">To dry out the flowers, gather the stems into bunches, tie together and hang upside down.</span></li></ol><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1905"><div class="image-full-width-wrapper" data-dcnode-id="1908"><div class="image-widthsetter" data-dcnode-id="1909" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="1910" style="padding-top:101.09%;"><picture data-dcnode-id="1911"><source alt="Lavender lining pathway in garden" class="lazy-image-van optional-image" data-dcnode-id="1914" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-320-80.jpg.webp 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-320-80.jpg.webp 320w" type="image/webp"><source alt="Lavender lining pathway in garden" class="lazy-image-van optional-image" data-dcnode-id="1913" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-320-80.jpg 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-320-80.jpg 320w" type="image/jpeg"><img alt="Lavender lining pathway in garden" class="lazy-image-van optional-image loaded" data-dcnode-id="1912" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-320-80.jpg 320w" loading="lazy" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/homesandgardens/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/bWu4otRHDt8SsPcuyCSrhZ-320-80.jpg 320w"></picture></p></div></div><div class="credit" data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">(Image credit: Leigh Clapp)</span></div></figure><h2 data-dcnode-id="1903" id="pruning-lavender-in-spring-2"><span data-dcnode-id="1904" instrument_node="">Pruning lavender in spring</span></h2><div class="bordeaux-slot" data-dcnode-id="1902" data-feat-ref="bordeaux-feat-id-125" id="bordeaux-static-slot-16" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Spring is the time for pruning your lavender harder to minimize the development of woody stems and encourage fresh new growth. You should do this early in the season, to give the plant plenty of time to reestablish itself.</span></p><ul data-dcnode-id="1889"><li data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Take a stem and examine it – you’ll notice it has a woody base set below the leafy section. How much wood there is depends on the plant’s age, and how well it has been pruned.</span></li><li data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">Using a clean, sharp pair of secateurs, cut the stem around 2-3 inches above the woody base, into the leafy section of the stem. Do not cut into wood below.</span></li><li data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">You can do handfuls of stems at a time, and for hedges you might find it easier to use shears.</span></li><li data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Try to create a nice rounded shape to your lavender plant by pruning the outer stems a little shorter than the inner stems.</span></li><li data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Where there are dead, frost-damaged or diseased branches, these should be completely removed.</span></li></ul><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1879"><div class="image-full-width-wrapper" data-dcnode-id="1882"><div class="image-widthsetter" data-dcnode-id="1883" style="max-width:1920px;"><p class="vanilla-image-block" data-dcnode-id="1884" style="padding-top:66.67%;"><picture data-dcnode-id="1885"><source alt="Lavender planted with other evergreen shrubs" class="lazy-image-van optional-image" data-dcnode-id="1888" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-320-80.jpg.webp 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-320-80.jpg.webp 320w" type="image/webp"><source alt="Lavender planted with other evergreen shrubs" class="lazy-image-van optional-image" data-dcnode-id="1887" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-320-80.jpg 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-320-80.jpg 320w" type="image/jpeg"><img alt="Lavender planted with other evergreen shrubs" class="lazy-image-van optional-image loaded" data-dcnode-id="1886" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-320-80.jpg 320w" loading="lazy" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/homesandgardens/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/krym6KJtcyXaQD8qoCdN2L-320-80.jpg 320w"></picture></p></div></div><div class="credit" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">(Image credit: Leigh Clapp)</span></div></figure><h2 data-dcnode-id="1877" id="how-to-prune-lavender-that-is-woody-2"><span data-dcnode-id="1878" instrument_node="">How to prune lavender that is woody</span></h2><div class="bordeaux-slot" data-dcnode-id="1876" data-feat-ref="bordeaux-feat-id-126" id="bordeaux-static-slot-17" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">When lavender is a few years old, it can develop long, ‘woody’ stems that look unsightly. However, it may be possible to rejuvenate them.</span></p><div class="bordeaux-slot" data-dcnode-id="1873" data-feat-ref="bordeaux-feat-id-127" id="bordeaux-static-slot-18" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1867"><span data-dcnode-id="1872" instrument_node="">‘‘The normal advice is to replace plants when they become leggy, usually after three to five years. But I avoid having to do this by cutting right back into the wood,’ says Judith Hann, author of </span><a class="hawk-link-parsed" data-component="Inline Links" data-custom-tracking-id="3777516448669656000" data-dcnode-id="1869" data-google-interstitial="false" data-hawk-tracked="hawklinks" data-hl-processed="hawklinks" data-label="Herbs" data-merchant-id="1471" data-merchant-name="Amazon US" data-merchant-network="Amazon" data-merchant-url="amazon.com" data-placeholder-url="https://target.georiot.com/Proxy.ashx?tsid=107655&amp;GR_URL=https%3A%2F%2Famazon.com%2FHerbs-Delicious-Recipes-Growing-Transform-ebook%2Fdp%2FB0744J519K%2Fref%3Dsr_1_1%3Fdchild%3D1%26keywords%3Djudith%2Bhann%2Bherbs%26qid%3D1630074304%26sr%3D8-1%26tag%3Dhawk-future-20%26ascsubtag%3Dhawk-custom-tracking-20" data-url="https://www.amazon.com/Herbs-Delicious-Recipes-Growing-Transform-ebook/dp/B0744J519K/ref=sr_1_1?dchild=1&amp;keywords=judith+hann+herbs&amp;qid=1630074304&amp;sr=8-1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//target.georiot.com/Proxy.ashx%3Ftsid%3D107655%26GR_URL%3Dhttps%253A%252F%252Famazon.com%252FHerbs-Delicious-Recipes-Growing-Transform-ebook%252Fdp%252FB0744J519K%252Fref%253Dsr_1_1%253Fdchild%253D1%2526keywords%253Djudith%252Bhann%252Bherbs%2526qid%253D1630074304%2526sr%253D8-1%2526tag%253Dhawk-future-20%2526ascsubtag%253Dhomesandgardens-us-3777516448669656000-20" referrerpolicy="no-referrer-when-downgrade" rel="sponsored noopener" target="_blank"><em data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Herbs</span></em></a><span data-dcnode-id="1868" instrument_node="">. ‘I have not lost a lavender plant yet in the 20 years they have been growing in my garden.’</span></p><div class="bordeaux-slot" data-dcnode-id="1866" data-feat-ref="bordeaux-feat-id-128" id="bordeaux-static-slot-19" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Though usually avoided, cutting lavender into the old wood can be a good way to renovate them. The trick is to make sure you can still see signs of life in the form of growth nodes below the cutting point. If you cut beyond this, the stems are unlikely to recover, so examine the stems closely.</span></p><div class="bordeaux-slot" data-dcnode-id="1863" data-feat-ref="bordeaux-feat-id-129" id="bordeaux-static-slot-20" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">Bear in mind you are taking a risk, so before you attempt to hard prune woody lavender, take some semi-ripe cuttings, so if your plant dies, you can grow a new one.</span></p><figure class="van-image-figure inline-layout" data-bordeaux-image-check="" data-dcnode-id="1851"><div class="image-full-width-wrapper" data-dcnode-id="1854"><div class="image-widthsetter" data-dcnode-id="1855" style="max-width:2016px;"><p class="vanilla-image-block" data-dcnode-id="1856" style="padding-top:66.77%;"><picture data-dcnode-id="1857"><source alt="Lavender plant in border" class="lazy-image-van optional-image" data-dcnode-id="1860" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-320-80.jpg.webp 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-1280-80.jpg.webp 1280w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-1024-80.jpg.webp 1024w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-768-80.jpg.webp 768w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-415-80.jpg.webp 415w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-360-80.jpg.webp 360w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-320-80.jpg.webp 320w" type="image/webp"><source alt="Lavender plant in border" class="lazy-image-van optional-image" data-dcnode-id="1859" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-320-80.jpg 320w" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" srcset="https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-320-80.jpg 320w" type="image/jpeg"><img alt="Lavender plant in border" class="lazy-image-van optional-image loaded" data-dcnode-id="1858" data-ll-status="loaded" data-normal="https://vanilla.futurecdn.net/homesandgardens/missing-image.svg" data-original-mos="https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5.jpg" data-pin-media="https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5.jpg" data-srcset="https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-320-80.jpg 320w" loading="lazy" sizes="(min-width: 710px) 670px, calc(100vw - 30px)" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vanilla.futurecdn.net/homesandgardens/missing-image.svg&amp;raw" srcset="https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-1280-80.jpg 1280w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-1024-80.jpg 1024w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-768-80.jpg 768w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-415-80.jpg 415w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-360-80.jpg 360w, https://cdn.mos.cms.futurecdn.net/Uvu7LSmMch3YKTGm4y7en5-320-80.jpg 320w"></picture></p></div></div><div class="credit" data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">(Image credit: Thompson &amp; Morgan)</span></div></figure><h2 data-dcnode-id="1849" id="when-to-prune-lavender-2"><span data-dcnode-id="1850" instrument_node="">When to prune lavender</span></h2><div class="bordeaux-slot" data-dcnode-id="1848" data-feat-ref="bordeaux-feat-id-130" id="bordeaux-static-slot-21" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">The best time to prune lavender is in the spring or late summer, but most experts advise two pruning sessions a year – a trim post flowering in the summer and a second, harder pruning in the spring.&nbsp;</span></p><div class="bordeaux-slot" data-dcnode-id="1845" data-feat-ref="bordeaux-feat-id-131" id="bordeaux-static-slot-22" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Monty Don even suggests a third trim in the fall, to help it ‘hold a tight pebble shape’.</span></p><h2 data-dcnode-id="1841" id="how-do-you-cut-back-lavender-for-winter-2"><span data-dcnode-id="1842" instrument_node="">How do you cut back lavender for winter?</span></h2><div class="bordeaux-slot" data-dcnode-id="1840" data-feat-ref="bordeaux-feat-id-132" id="bordeaux-static-slot-23" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Cut back lavender before winter to create a tidy mound that will give structure to the garden over the coldest months. Lavender is an evergreen shrub, so it retains foliage year round.</span></p><div class="bordeaux-slot" data-dcnode-id="1837" data-feat-ref="bordeaux-feat-id-133" id="bordeaux-static-slot-24" style="display: flex; flex-direction: column; margin: auto;"></div><p data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">It’s best to do your first prune before the fall, but hardier varieties can respond well to a fall pruning before the winter.</span></p><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Leaving faded blooms on the plant can also provide food for seed-eating birds, so it’s not always necessary to remove the flowers straight after blooming.</span></p><h2 data-dcnode-id="1831" id="how-do-you-cut-lavender-so-it-grows-back-2"><span data-dcnode-id="1832" instrument_node="">How do you cut lavender so it grows back?</span></h2><p data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">To cut lavender so it grows back, it's important to avoid cutting into the ‘dead’, woody growth. If you harvest lavender just as it is flowering, you might get a second flush of flowers.</span></p><span data-dcnode-id="1828" instrument_node="">

</span><div class="author__bio" data-dcnode-id="1797"><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">As editor of Period Living, Britain's best-selling period homes magazine, Melanie loves the charm of older properties. I live in a rural village just outside the Cotswolds in England, so am lucky to be surrounded by beautiful homes and countryside, where I enjoy exploring. Having worked in the industry for almost two decades, Melanie is interested in all aspects of homes and gardens. Her previous roles include working on Real Homes and Homebuilding &amp; Renovating, and she has also contributed to Gardening Etc. She has an English degree and has also studied interior design. Melanie frequently writes for Homes &amp; Gardens about property restoration and gardening.</span></p></div><span data-dcnode-id="1796" instrument_node="">
