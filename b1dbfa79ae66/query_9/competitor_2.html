</span><div class="single-page post-4363 post type-post status-publish format-standard hentry category-plant-care category-soil tag-nutrient-deficiencies tag-nutrients" data-dcnode-id="1812" id="post-4363"><span data-dcnode-id="2110" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">Can Leaves be Used to Identify Nutrient Deficiencies?</span></h1><span data-dcnode-id="2107" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="2103"><span data-dcnode-id="2106" instrument_node="">By </span><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenmyths.com/author/teachgm/" rel="author" title="Posts by "></a><span data-dcnode-id="2104" instrument_node=""> on </span></p><span data-dcnode-id="2102" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1831"><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">There are lots of examples of people trying to use plant leaf characteristics to identify nutrient deficiencies in the soil. This seems to make a lot of sense. If the soil is lacking a specific nutrient, it should show up in the plant and it seems to follow that by examining the physical characteristics of the leaf you should be able to identify the nutrient deficiency.</span></p><span data-dcnode-id="2098" instrument_node="">
</span><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">How reliable is this method of diagnosis? Can you really identify a nutrient deficiency in the soil by looking at plant leaves?</span></p><span data-dcnode-id="2095" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="2089" id="attachment_4366" style="width: 510px"><img alt="Plant Nutrient Deficiency Symptoms by Permablitz" aria-describedby="caption-attachment-4366" class="wp-image-4366 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="2094" data-lazy-loaded="1" height="500" loading="eager" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenmyths.com/wp-content/uploads/2017/08/Plant-Nutrient-Deficiency-Symptoms.jpg&amp;raw" srcset="https://www.gardenmyths.com/wp-content/uploads/2017/08/Plant-Nutrient-Deficiency-Symptoms.jpg 500w, https://www.gardenmyths.com/wp-content/uploads/2017/08/Plant-Nutrient-Deficiency-Symptoms-150x150.jpg 150w, https://www.gardenmyths.com/wp-content/uploads/2017/08/Plant-Nutrient-Deficiency-Symptoms-300x300.jpg 300w, https://www.gardenmyths.com/wp-content/uploads/2017/08/Plant-Nutrient-Deficiency-Symptoms-144x144.jpg 144w" title="Plant Nutrient Deficiency Symptoms by Permablitz" width="500"><noscript data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">&lt;img aria-describedby="caption-attachment-4366" class="wp-image-4366 size-full" title="Plant Nutrient Deficiency Symptoms by Permablitz" src="https://www.gardenmyths.com/wp-content/uploads/2017/08/Plant-Nutrient-Deficiency-Symptoms.jpg" alt="Plant Nutrient Deficiency Symptoms by Permablitz" width="500" height="500" srcset="https://www.gardenmyths.com/wp-content/uploads/2017/08/Plant-Nutrient-Deficiency-Symptoms.jpg 500w, https://www.gardenmyths.com/wp-content/uploads/2017/08/Plant-Nutrient-Deficiency-Symptoms-150x150.jpg 150w, https://www.gardenmyths.com/wp-content/uploads/2017/08/Plant-Nutrient-Deficiency-Symptoms-300x300.jpg 300w, https://www.gardenmyths.com/wp-content/uploads/2017/08/Plant-Nutrient-Deficiency-Symptoms-144x144.jpg 144w" sizes="(max-width: 500px) 100vw, 500px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="2090" id="caption-attachment-4366"><span data-dcnode-id="2091" instrument_node="">Plant Nutrient Deficiency Symptoms by Permablitz</span></p></div><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" id="more-4363"></span></p><span data-dcnode-id="2085" instrument_node="">
</span><h2 data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">Identify Plant Nutrient Deficiencies</span></h2><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">The image above is just one of the memes used to show people how to use leaf characteristics to identify nutrient deficiencies in the soil. This seems simple enough. Examine the leaf for abnormalities, and then match these to the nutrient that is responsible for the symptom.</span></p><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Unfortunately this does not work. Plant symptoms are a tool for predicting possible nutrient deficiencies, but in most cases it is not a reliable one.</span></p><span data-dcnode-id="2076" instrument_node="">
</span><h2 data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">What Causes the Symptoms</span></h2><span data-dcnode-id="2073" instrument_node="">
</span><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">As plants grow, leaves need certain nutrients to grow properly. If even one is missing the leaf will not grow properly and the symptoms you see will be specific for the missing nutrient, but the reverse is not true. You can’t know which nutrient is missing by seeing the symptom.</span></p><span data-dcnode-id="2070" instrument_node="">
</span><p data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">In addition to nutrients, the leaf characteristics are also affected by environmental conditions, diseases, insect damage, and exposure to pesticides. Any of these can be the cause of the abnormality you see without any nutrient deficiency being present.</span></p><div class="code-block code-block-1" data-dcnode-id="2061" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2067" instrument_node="">
</span><a data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gardenmyths.com/garden-myths-book-1/" rel="noopener" target="_blank"><img alt="Garden Myths book by Robert Pavlis" class="aligncenter wp-image-5381 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="2066" data-lazy-loaded="1" height="160" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenmyths.com/wp-content/uploads/2019/12/garden-myths-1-and-2-ver-2-500.jpg&amp;raw" title="Garden Myths book by Robert Pavlis" width="500"><noscript data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">&lt;img class="aligncenter wp-image-5381 size-full" title="Garden Myths book by Robert Pavlis" src="https://www.gardenmyths.com/wp-content/uploads/2019/12/garden-myths-1-and-2-ver-2-500.jpg" alt="Garden Myths book by Robert Pavlis" width="500" height="160" /&gt;</span></noscript></a><span data-dcnode-id="2062" instrument_node="">
</span></div><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">The pH of the soil can also affect the plants ability to absorb certain nutrients. At higher and lower pH some nutrients become stuck to soil, preventing the plant from accessing them. You can have plenty of iron in the soil, but at higher pH some plants can’t extract it from the soil. In this case, the leaf will show an iron deficiency but the soil has lots of iron.</span></p><span data-dcnode-id="2057" instrument_node="">
</span><h2 data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Misuse of Nutrient Deficiency Memes</span></h2><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">The image above is found quite frequently on social media sites like Pinterest and Facebook. The text provided with the image almost always suggests that it is easy to identify a deficiency by looking at the chart.</span></p><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">If you visit the original site of this mage (ref 1), and read the text in full you get a very different story. It clearly says “Sometimes an unhealthy plant is suffering from a nutrient deficiency or even too much of any one nutrient. Plant nutrient deficiencies often manifest as foliage discoloration or distortion. The following chart outlines some possible problems. Unfortunately many problems have similar symptoms and sometimes it is a combination of problems.”</span></p><div class="code-block code-block-7" data-dcnode-id="2043" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2048" instrument_node="">
</span><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenfundamentals.com/plant-science-for-gardeners/" rel="noopener" target="_blank"><img alt="Plant Science for Gardeners by Robert Pavlis" class="aligncenter wp-image-9109 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="2047" data-lazy-loaded="1" height="141" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenmyths.com/wp-content/uploads/2022/04/Plant-Scieince-ad.jpg&amp;raw" title="Plant Science for Gardeners by Robert Pavlis" width="500"><noscript data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">&lt;img class="aligncenter wp-image-9109 size-full" title="Plant Science for Gardeners by Robert Pavlis" src="https://www.gardenmyths.com/wp-content/uploads/2022/04/Plant-Scieince-ad.jpg" alt="Plant Science for Gardeners by Robert Pavlis" width="500" height="141" /&gt;</span></noscript></a></div><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">“Be sure you eliminate the obvious before you kill your plants with kindness.</span></p><span data-dcnode-id="2039" instrument_node="">
</span><ul data-dcnode-id="2025"><span data-dcnode-id="2038" instrument_node="">
</span><li data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Check first for signs of insects or disease.</span></li><span data-dcnode-id="2035" instrument_node="">
</span><li data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Foliage discoloration and stunted plants can easily be caused by soil that is too wet and drains poorly or soil that is too compacted for good root growth.</span></li><span data-dcnode-id="2032" instrument_node="">
</span><li data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Extreme cold or heat will slow plant growth and affect flowering and fruit set.</span></li><span data-dcnode-id="2029" instrument_node="">
</span><li data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">Too much fertilizer can result in salt injury. Your plants may look scorched or they may wilt, even when the soil is wet.”</span></li><span data-dcnode-id="2026" instrument_node="">
</span></ul><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">The information provided is quite accurate. Unfortunately people take the image, post it on social media and use it to misinform the general public. This original site is not the cause of this myth, but the misuse of the information continues to support this myth.</span></p><span data-dcnode-id="2021" instrument_node="">
</span><h2 data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">Example: Phosphorus or Nitrogen Deficiency</span></h2><span data-dcnode-id="2018" instrument_node="">
</span><p data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Assume the plant is showing a classic phosphorus deficiency. This could be a phosphorus deficiency, or it might be a nitrogen deficiency.</span></p><div class="code-block code-block-5" data-dcnode-id="2009" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="2015" instrument_node="">
</span><a data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gardenfundamentals.com/soil-science/" rel="noopener" target="_blank"><img alt="Soil Science for Gardeners book by Robert Pavlis" class="aligncenter wp-image-5381 size-full jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="2014" data-lazy-loaded="1" height="169" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenmyths.com/wp-content/uploads/2019/12/soil-ad-1-500.jpg&amp;raw" title="Soil Science for Gardeners book by Robert Pavlis" width="500"><noscript data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">&lt;img class="aligncenter wp-image-5381 size-full" title="Soil Science for Gardeners book by Robert Pavlis" src="https://www.gardenmyths.com/wp-content/uploads/2019/12/soil-ad-1-500.jpg" alt="Soil Science for Gardeners book by Robert Pavlis" width="500" height="169" /&gt;</span></noscript></a><span data-dcnode-id="2010" instrument_node="">
</span></div><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">A lack of nitrogen reduces the plants ability to absorb phosphorus which then shows up as a phosphorus deficiency. Adding more phosphorus to the soil will not solve the problem since this is a nitrogen deficiency. Adding nitrogen will make the symptom go away.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><h2 data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Example: Chlorosis Indicates iron Deficiency</span></h2><span data-dcnode-id="2002" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1996" id="attachment_2620" style="width: 310px"><img alt="Chlorosis - Is it iron nutrient deficiency?" aria-describedby="caption-attachment-2620" class="wp-image-2620 size-medium jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="2001" data-lazy-loaded="1" height="220" loading="eager" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenmyths.com/wp-content/uploads/2014/03/Chlorosis-Is-it-Iron-Deficiency-300x220.jpg&amp;raw" srcset="https://www.gardenmyths.com/wp-content/uploads/2014/03/Chlorosis-Is-it-Iron-Deficiency-300x220.jpg 300w, https://www.gardenmyths.com/wp-content/uploads/2014/03/Chlorosis-Is-it-Iron-Deficiency.jpg 500w" title="Chlorosis - Is it iron nutrient deficiency?" width="300"><noscript data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">&lt;img aria-describedby="caption-attachment-2620" loading="lazy" class="wp-image-2620 size-medium" title="Chlorosis - Is it iron nutrient deficiency?" src="https://www.gardenmyths.com/wp-content/uploads/2014/03/Chlorosis-Is-it-Iron-Deficiency-300x220.jpg" alt="Chlorosis - Is it iron nutrient deficiency?" width="300" height="220" srcset="https://www.gardenmyths.com/wp-content/uploads/2014/03/Chlorosis-Is-it-Iron-Deficiency-300x220.jpg 300w, https://www.gardenmyths.com/wp-content/uploads/2014/03/Chlorosis-Is-it-Iron-Deficiency.jpg 500w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="1997" id="caption-attachment-2620"><span data-dcnode-id="1998" instrument_node="">Chlorosis – Is it iron nutrient deficiency?</span></p></div><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">This is a common example found in a lot of gardening advice. A plant is reported to have chlorosis, a yellowing of the leaf, and the diagnosis is usually iron deficiency.</span></p><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">In this example, two major mistakes are made.</span></p><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Firstly, Iron does not cause chlorosis of the leaf. It actually causes interveinal chlorosis which is the yellowing of the spaces between the veins of the leaf. as shown in the image. The veins remain green.</span></p><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1979"><span data-dcnode-id="1985" instrument_node="">The second mistake is assuming that there is only one cause for this symptom. As explained in the post, </span><a data-dcnode-id="1981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenmyths.com/chlorosis-plants-iron-deficiency/" rel="noopener" target="_blank"><em data-dcnode-id="1982"><strong data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Chloriosis In Plants – Is it Iron Deficiency</span></strong></em></a><span data-dcnode-id="1980" instrument_node="">, numerous conditions can cause interveinal chlorosis.</span></p><span data-dcnode-id="1978" instrument_node="">
</span><ul data-dcnode-id="1940"><span data-dcnode-id="1977" instrument_node="">
</span><li data-dcnode-id="1975" style="text-align: left;"><span data-dcnode-id="1976" instrument_node="">manganese deficiency</span></li><span data-dcnode-id="1974" instrument_node="">
</span><li data-dcnode-id="1972" style="text-align: left;"><span data-dcnode-id="1973" instrument_node="">a high soil pH</span></li><span data-dcnode-id="1971" instrument_node="">
</span><li data-dcnode-id="1969" style="text-align: left;"><span data-dcnode-id="1970" instrument_node="">zinc deficiency</span></li><span data-dcnode-id="1968" instrument_node="">
</span><li data-dcnode-id="1966" style="text-align: left;"><span data-dcnode-id="1967" instrument_node="">herbicide damage</span></li><span data-dcnode-id="1965" instrument_node="">
</span><li data-dcnode-id="1963" style="text-align: left;"><span data-dcnode-id="1964" instrument_node="">wet soil conditions</span></li><span data-dcnode-id="1962" instrument_node="">
</span><li data-dcnode-id="1960" style="text-align: left;"><span data-dcnode-id="1961" instrument_node="">compacted soil</span></li><span data-dcnode-id="1959" instrument_node="">
</span><li data-dcnode-id="1957" style="text-align: left;"><span data-dcnode-id="1958" instrument_node="">trunk-girdling roots</span></li><span data-dcnode-id="1956" instrument_node="">
</span><li data-dcnode-id="1954" style="text-align: left;"><span data-dcnode-id="1955" instrument_node="">plant competition</span></li><span data-dcnode-id="1953" instrument_node="">
</span><li data-dcnode-id="1951" style="text-align: left;"><span data-dcnode-id="1952" instrument_node="">high organic content in soil</span></li><span data-dcnode-id="1950" instrument_node="">
</span><li data-dcnode-id="1948" style="text-align: left;"><span data-dcnode-id="1949" instrument_node="">high salts</span></li><span data-dcnode-id="1947" instrument_node="">
</span><li data-dcnode-id="1945" style="text-align: left;"><span data-dcnode-id="1946" instrument_node="">high levels of phosphorus, copper, zinc or manganese</span></li><span data-dcnode-id="1944" instrument_node="">
</span><li data-dcnode-id="1942" style="text-align: left;"><span data-dcnode-id="1943" instrument_node="">iron deficiency</span></li><span data-dcnode-id="1941" instrument_node="">
</span></ul><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">The bottom line is that interveinal chlorosis tells you there is a problem but it does not indicate the reason for the problem.</span></p><span data-dcnode-id="1936" instrument_node="">
</span><h2 data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">Nutrient Deficiency</span></h2><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">The University of Arizona makes some important points about nutrient deficiencies (ref 2).</span></p><span data-dcnode-id="1930" instrument_node="">
</span><ul data-dcnode-id="1916"><span data-dcnode-id="1929" instrument_node="">
</span><li data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Many nutrient deficiencies may look similar.</span></li><span data-dcnode-id="1926" instrument_node="">
</span><li data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">It is important to know what a plant species looks like when it is healthy in order to recognize symptoms of distress, for example some plants were bred to have variegated patterns in the leaves when they are healthy.</span></li><span data-dcnode-id="1923" instrument_node="">
</span><li data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Many micronutrients are used by plants to process other nutrients or work together with other nutrients, so a deficiency of one may look like another (for instance, molybdenum is required by legumes to complete the nitrogen fixation process).</span></li><span data-dcnode-id="1920" instrument_node="">
</span><li data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">If another problem like water stress, disease, or insect pressure, occurs simultaneously with a nutrient deficiency, or if two nutrients are deficient simultaneously, the typical symptoms may not occur.</span></li><span data-dcnode-id="1917" instrument_node="">
</span></ul><span data-dcnode-id="1915" instrument_node="">
</span><h2 data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">How Do You Detect a Deficiency?</span></h2><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">The only reliable way to detect a soil deficiency is to do a soil test.</span></p><span data-dcnode-id="1909" instrument_node="">

</span><p data-dcnode-id="1748"><span data-dcnode-id="1751" instrument_node="">Good advise Robert.</span><br data-dcnode-id="1750"><span data-dcnode-id="1749" instrument_node="">

</span><p data-dcnode-id="1708"><span data-dcnode-id="1715" instrument_node="">You are of course absolutely right how difficult it is to use leaf indications as accurate diagnostics of deficiency – even for a specialist who knows a particular plant intimately. I think however it sometimes helps with ‘classic’ combinations such as magnesium deficiency being inter vienal chlorosis on old leaves and iron deficiency being intervienal chlorosis on young leaves — but I would not bet on my diagnosis!</span><br data-dcnode-id="1714"><span data-dcnode-id="1713" instrument_node="">
