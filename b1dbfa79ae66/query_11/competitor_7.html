</span><table cellspacing="0" data-dcnode-id="67"><tbody data-dcnode-id="69"><tr data-dcnode-id="71"><td data-dcnode-id="73" id="ContentColumn"><span data-dcnode-id="277" instrument_node="">
</span><div class="Liner" data-dcnode-id="75" style="min-height: 2388px;"><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">
</span></p><h2 data-dcnode-id="273" style="text-align: center"><span data-dcnode-id="274" instrument_node="">Types of Bonsai Tree Pests and How to Protect Your Trees from Them</span></h2><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="265"><br data-dcnode-id="268"><br data-dcnode-id="267"><span data-dcnode-id="266" instrument_node="">
</span></p><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Bonsai tree pests can cause severe damage to your plant that, if not dealt with properly, can lead to loss of leaves and branches, and possibly even death. Certain trees are more susceptible to particular pests than others, and the type of insects you will encounter will also depend on your location and climate. 

</span></p><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">The best way that you can protect your plant from pest infestation is to learn what “enemies” are common to your area and are known to be attracted to your specific type of tree. This way, you will recognize the signs and be able to catch the problem early, before these pests cause any permanent damage.

</span></p><p data-dcnode-id="260"></p><table align="left" data-dcnode-id="256" width="340"><tbody data-dcnode-id="257"><tr data-dcnode-id="258"><td data-dcnode-id="259"></td></tr></tbody></table><span data-dcnode-id="255" instrument_node="">Also, insects are more likely to attack weaker, unhealthy trees. So, you can protect your bonsai by following the proper steps when pruning, re-potting, fertilizing, and watering. 

</span><p data-dcnode-id="254"></p><p data-dcnode-id="250"><strong data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Treatment:</span></strong><span data-dcnode-id="251" instrument_node=""> Most pests can be eliminated by either picking them off by hand or treating the plant  with an insecticide. Your choice will often depend on the type of pests you are dealing with.  

</span></p><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">A systemic insecticide is usually poured onto the soil where it is absorbed by the roots and then distributed to other areas of the tree.  Some products can also be sprayed onto the foliage, where they are absorbed and carried throughout plant. Any insect that chews on the leaves or bark will also be eating these poisonous substances.

</span></p><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">A contact insecticide is sprayed directly onto the plant and will kill pests on “contact”. Any insect that is not sprayed will not be affected.

</span></p><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">You can either treat your bonsai with a chemical solution purchased at a nursery or bonsai store, or you can use an organic or environmentally friendly option such as pesticide soaps or other “natural enemy” insects that are safe for your bonsai.

</span></p><p data-dcnode-id="241"><br data-dcnode-id="243"><span data-dcnode-id="242" instrument_node="">
</span></p><h3 data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Types of Common Bonsai Tree Pests</span></h3><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="237"></p><p data-dcnode-id="236"></p><h4 data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Aphids: </span></h4><span data-dcnode-id="233" instrument_node="">
These are one of the most common bonsai tree pests and are sometimes referred to as “plant lice”. Aphids suck important juices or sap from the plant and also carry many viruses or diseases that can be transmitted to your tree. While they are usually green, they can also be grey or black and are most often found on the stems or underside of the leaves. Since aphids can cause significant damage, it is important that you check your bonsai regularly for these pests.

</span><p data-dcnode-id="232"></p><p data-dcnode-id="231"></p><ul data-dcnode-id="222"><strong data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Symptoms:</span></strong><span data-dcnode-id="228" instrument_node=""> You will notice weak leaves and branches, and possibly some curling or deformed shoots. Aphids also leave behind a sticky, sugary substance called “honeydew”, which attracts ants and causes the growth of a fungus known as “black sooty mold”.  

</span><p data-dcnode-id="227"></p><p data-dcnode-id="223"><strong data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Treatment:</span></strong><span data-dcnode-id="224" instrument_node="">  Aphids can often be removed without the use of insecticides. Usually showering the plant or spraying the undersides of the leaves and stems with a hose will remove these pests. However, you can also apply a soft soap spray or use a systemic pesticide such as plant pins. Some people also prefer to use lacewing larvae, since one larva can eat more than 300 aphids. </span></p></ul><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="220"></p><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Remember to check your plant for root aphids when re-potting, and spray with a systemic insecticide if necessary.

</span></p><p data-dcnode-id="217"></p><h4 data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Red Spider Mite: </span></h4><span data-dcnode-id="214" instrument_node="">
</span><p data-dcnode-id="213"></p><p data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">These are one of the most dangerous bonsai tree pests and can kill your plant quite quickly if not treated.  Red spider mites are almost microscopic and are often very difficult to spot. The best way to identify an infestation is to shake a branch over a piece of white paper, and the mites will fall like a fine red dust. Since they prefer a warm, dry climate, red spider mites are more common on indoor bonsai.

</span></p><p data-dcnode-id="210"></p><ul data-dcnode-id="201"><strong data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Symptoms: </span></strong><span data-dcnode-id="207" instrument_node="">As the mites feed off the plant, they will cause the foliage to turn from green to yellow, then eventually brown. They will also weave very fine webs between branches and leaves. Conifers are more often attacked, although other types of trees are not exempt.

</span><p data-dcnode-id="206"></p><p data-dcnode-id="202"><strong data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Treatment: </span></strong><span data-dcnode-id="203" instrument_node="">Applying a systemic insecticide or organic soap spray to the undersides of leaves usually works quite effectively.</span></p></ul><span data-dcnode-id="200" instrument_node="">
</span><p data-dcnode-id="199"></p><p data-dcnode-id="198"></p><h4 data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Scale Insects:</span></h4><span data-dcnode-id="195" instrument_node="">
</span><p data-dcnode-id="194"></p><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">These insects will most often appear as small  white, yellow, or brown bumps on the trunk, branches, or leaves. As they suck sap from the tree, they produce a sticky secretion and will sometimes have protective shells around them. They are most commonly found in clusters.

</span></p><p data-dcnode-id="191"></p><ul data-dcnode-id="182"><strong data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Symptoms:</span></strong><span data-dcnode-id="188" instrument_node=""> Branches will droop and foliage will often wilt and turn yellow. 

</span><p data-dcnode-id="187"></p><p data-dcnode-id="183"><strong data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Treatment:</span></strong><span data-dcnode-id="184" instrument_node=""> The best solution is to remove scale insects by hand. You can try using an insecticide, but this is not always effective due to the protective shell. For small outbreaks, painting the shells with alcohol sometimes works well.</span></p></ul><span data-dcnode-id="181" instrument_node="">
</span><p data-dcnode-id="180"></p><p data-dcnode-id="179"></p><h4 data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Caterpillars:</span></h4><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="175"></p><p data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Caterpillars can be very destructive and can quickly strip your bonsai of its leaves and shoots. It is very important to watch carefully for these bonsai tree pests and to eliminate them on first sight.

</span></p><p data-dcnode-id="172"></p><ul data-dcnode-id="163"><strong data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Symptoms:</span></strong><span data-dcnode-id="169" instrument_node=""> Since caterpillars feed on foliage, you will usually notice leaves that appear eaten or have holes. There may even be branches that have been stripped completely. 

</span><p data-dcnode-id="168"></p><p data-dcnode-id="164"><strong data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">Treatment: </span></strong><span data-dcnode-id="165" instrument_node="">Since caterpillars are usually very visible, it is often most effective to remove them by hand. You can also use either a contact or systemic insecticide, or an organic spray such as Di-Pel.  These bonsai tree pests have a tendency to “re-appear” so even when you think that the problem has been taken care of, keep checking for a few more day to make sure that you have removed them all.</span></p></ul><span data-dcnode-id="162" instrument_node="">
</span><p data-dcnode-id="161"></p><p data-dcnode-id="160"></p><h4 data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">Vine Weevils:</span></h4><span data-dcnode-id="157" instrument_node=""> Vine weevils are very destructive and, unfortunately, can do the most damage before you even notice that they are there. The larvae will eat the root systems and can often cause irreparable damage before visible symptoms appear.

</span><p data-dcnode-id="156"></p><p data-dcnode-id="155"></p><ul data-dcnode-id="146"><strong data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">Symptoms:</span></strong><span data-dcnode-id="152" instrument_node=""> Leaves will start to wilt as if the plant is lacking water, and you may notice U-shaped notches around the edges of the foliage. Adult weevils are quite large and very noticeable, although it is the larvae that cause the most damage because they feed off the bonsai root systems. By the time your tree begins to wilt, the problem is  usually already quite extensive.

</span><p data-dcnode-id="151"></p><p data-dcnode-id="147"><strong data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Treatment:</span></strong><span data-dcnode-id="148" instrument_node=""> As with any bonsai tree pests, prevention is the best treatment against the vine weevil. If you notice an adult insect on your plant, remove it immediately to prevent it from laying eggs on your bonsai. You can also add soil insecticides to your mixture when re-potting or water your tree with a pesticide that is recommended for the prevention of vine weevils. Rubbing your bonsai bench legs with a barrier glue is also an effective way to stop climbing weevils from getting to your plant. </span></p></ul><span data-dcnode-id="145" instrument_node="">
</span><p data-dcnode-id="144"></p><p data-dcnode-id="143"></p><h4 data-dcnode-id="141"><span data-dcnode-id="142" instrument_node="">Mealy Bugs:</span></h4><span data-dcnode-id="140" instrument_node="">
</span><p data-dcnode-id="139"></p><p data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">Mealy bugs will appear as little cotton balls sitting on the leaves and branches of your bonsai. The insects hide within the little “balls” and are protected by wax-like coverings.  They can commonly be seen in patches or clumps. During re-potting, and any other time when you notice symptoms, you should also examine your plant for root mealy bugs. 

</span></p><p data-dcnode-id="136"></p><ul data-dcnode-id="127"><strong data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">Symptoms:</span></strong><span data-dcnode-id="133" instrument_node=""> Your tree's growth will be slowed or stunted and leaves will droop and turn yellow. Mealy bugs can also cause the development of black sooty mold.

</span><p data-dcnode-id="132"></p><p data-dcnode-id="128"><strong data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">Treatment: </span></strong><span data-dcnode-id="129" instrument_node="">You can treat your bonsai with either a contact or systemic insecticide. If you have a recurring issue with mealy bugs, an initial contact solution will be effective, but you may wish to use a systemic treatment to prevent re-infestation.</span></p></ul><span data-dcnode-id="126" instrument_node="">
</span><p data-dcnode-id="125"></p><p data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">Bonsai tree pests can cause damage, disease, and even the death of your plant. But, being able to recognize the symptoms and knowing the proper treatment can help you protect the health and beauty of your bonsai.
