</span><article class="post-116 page type-page status-publish has-post-thumbnail ast-article-single" data-dcnode-id="440" id="post-116" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="947" instrument_node="">
</span><header class="entry-header ast-no-thumbnail ast-no-meta" data-dcnode-id="942"><span data-dcnode-id="946" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="944" itemprop="headline"><span data-dcnode-id="945" instrument_node="">Oak Wilt</span></h1><span data-dcnode-id="943" instrument_node=""> </span></header><span data-dcnode-id="940" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="443" itemprop="text"><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="932"><strong data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Summary: Oak Wilt</span></strong><span data-dcnode-id="936" instrument_node=""> is a very destructive tree disease that mostly affects </span><strong data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Red and Live Oaks</span></strong><span data-dcnode-id="933" instrument_node="">.</span></p><span data-dcnode-id="931" instrument_node="">
</span><h2 class="eael-heading-content" data-dcnode-id="929" id="0-eael-table-of-content"><span data-dcnode-id="930" instrument_node="">What is Oak Wilt?</span></h2><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="924"><strong data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Oak Wilt</span></strong><span data-dcnode-id="925" instrument_node=""> stops the tree’s vascular system from dispersing nutrients and water throughout the tree’s branches and leaves; therefore, it is of utmost importance to contact an experienced arbor care company with an ISA Certified Arborist and plant pathologist immediately when your tree begins to exhibit a weak, unhealthy appearance. Visible signs that you should watch for include premature defoliation and a thinning of the tree’s canopy.</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="922" instrument_node="">Red oak trees will develop an overall reddish appearance to their leaves. The common discoloration of the infected foliage can range from yellow to brownish tones. Due to the rapid destruction of your tree by oak wilt, contact the best arborist and tree company and request a diagnostic evaluation. Laboratory testing is necessary to confirm oak wilt invasion. Call us today at </span><a data-dcnode-id="920" href="tel:817-799-7808"><span data-dcnode-id="921" instrument_node="">(817) 799-7808</span></a><span data-dcnode-id="919" instrument_node=""> if you suspect your prized oak is infected by oak wilt!</span></p><span data-dcnode-id="917" instrument_node="">
</span><h2 class="eael-heading-content" data-dcnode-id="915" id="1-eael-table-of-content"><span data-dcnode-id="916" instrument_node="">Common Oak Wilt Symptoms</span></h2><span data-dcnode-id="914" instrument_node="">
</span><ul data-dcnode-id="903"><li data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Discoloration of Foliage (leaves)</span></li><li data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Curled or wilted leaves</span></li><li data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Complete leaf drop often occurs by mid-summer</span></li><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Dead crowns</span></li><li data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Looks almost dead</span></li></ul><span data-dcnode-id="902" instrument_node="">
</span><h2 class="eael-heading-content" data-dcnode-id="900" id="2-eael-table-of-content"><span data-dcnode-id="901" instrument_node="">How To Identify Oak Wilt</span></h2><span data-dcnode-id="899" instrument_node="">
</span><figure class="wp-block-gallery columns-2 is-cropped" data-dcnode-id="883"><ul class="blocks-gallery-grid" data-dcnode-id="884"><li class="blocks-gallery-item" data-dcnode-id="892"><figure data-dcnode-id="893"><img alt="oak-wilt-identification" class="wp-image-179 lazyloaded" data-dcnode-id="898" data-full-url="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-scaled.jpg" data-id="179" data-link="https://oakwilt.org/tree-diseases/oak-wilt/oak-wilt-2-2/" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-1024x768.jpg" data-srcset="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-1024x768.jpg 1024w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-300x225.jpg 300w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-768x576.jpg 768w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-1536x1152.jpg 1536w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-2048x1536.jpg 2048w" height="768" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-1024x768.jpg&amp;raw" srcset="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-1024x768.jpg 1024w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-300x225.jpg 300w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-768x576.jpg 768w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-1536x1152.jpg 1536w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-2048x1536.jpg 2048w" width="1024"><noscript data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">&lt;img width="1024" height="768" src="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-1024x768.jpg" alt="oak-wilt-identification" data-id="179" data-full-url="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-scaled.jpg" data-link="https://oakwilt.org/tree-diseases/oak-wilt/oak-wilt-2-2/" class="wp-image-179" srcset="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-1024x768.jpg 1024w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-300x225.jpg 300w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-768x576.jpg 768w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-1536x1152.jpg 1536w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2-2048x1536.jpg 2048w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption class="blocks-gallery-item__caption" data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Oak Wilt causes discoloration on the foliage.</span></figcaption></figure></li><li class="blocks-gallery-item" data-dcnode-id="885"><figure data-dcnode-id="886"><img alt="oak-wilt-identification" class="wp-image-177 lazyloaded" data-dcnode-id="891" data-full-url="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-scaled.jpg" data-id="177" data-link="https://oakwilt.org/tree-diseases/oak-wilt/oak-wilt-2/" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-1024x768.jpg" data-srcset="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-1024x768.jpg 1024w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-300x225.jpg 300w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-768x576.jpg 768w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-1536x1152.jpg 1536w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2048x1536.jpg 2048w" height="768" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//oakwilt.org/wp-content/uploads/2021/08/oak-wilt-1024x768.jpg&amp;raw" srcset="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-1024x768.jpg 1024w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-300x225.jpg 300w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-768x576.jpg 768w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-1536x1152.jpg 1536w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2048x1536.jpg 2048w" width="1024"><noscript data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">&lt;img width="1024" height="768" src="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-1024x768.jpg" alt="oak-wilt-identification" data-id="177" data-full-url="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-scaled.jpg" data-link="https://oakwilt.org/tree-diseases/oak-wilt/oak-wilt-2/" class="wp-image-177" srcset="https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-1024x768.jpg 1024w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-300x225.jpg 300w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-768x576.jpg 768w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-1536x1152.jpg 1536w, https://oakwilt.org/wp-content/uploads/2021/08/oak-wilt-2048x1536.jpg 2048w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption class="blocks-gallery-item__caption" data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Oak Wilt causes discoloration on the foliage.</span></figcaption></figure></li></ul></figure><span data-dcnode-id="882" instrument_node="">
</span><h2 class="eael-heading-content" data-dcnode-id="880" id="3-eael-table-of-content"><span data-dcnode-id="881" instrument_node="">How Does Oak Wilt Spread?</span></h2><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Oak wilt is a highly infectious fungal tree destroyer and spreads rapidly throughout your residential grounds utilizing insect activity or from the root systems of infected trees being in close vicinity of each other and entangling. Oak wilt spreads quickly and infected trees can die within several months or less. This deadly tree disease is responsible for destroying over one million stately oak trees throughout Fort Worth, Texas, and the DFW metroplex, as well as North and Central Texas.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">We cannot stress enough how critical it is that you contact us at (817) 799-7808 and request that our ISA Certified Arborist and plant pathologist evaluate the health of your oak tree and test the tree to see if it is infected with oak wilt! If your tree is infected, there is no time to lose!</span></p><span data-dcnode-id="873" instrument_node="">
</span><h2 class="eael-heading-content" data-dcnode-id="871" id="4-eael-table-of-content"><span data-dcnode-id="872" instrument_node="">Is Oak Wilt Treatable?</span></h2><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="864"><strong data-dcnode-id="866"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Yes</span></strong><span data-dcnode-id="867" instrument_node="">, </span></strong><span data-dcnode-id="865" instrument_node="">Oak Wilt can be combated by using tree injections to boost the tree’s immune system also known as “CODIT” or “compartmentalization of decay in trees”.</span></p><span data-dcnode-id="863" instrument_node="">
</span><h2 class="eael-heading-content" data-dcnode-id="861" id="5-eael-table-of-content"><span data-dcnode-id="862" instrument_node="">What is the Mortality Rate for Oak Wilt?</span></h2><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="856"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">About 85%</span></strong><span data-dcnode-id="857" instrument_node=""> of Red and Live Oaks die from Oak Wilt if not treated in time.</span></p><span data-dcnode-id="855" instrument_node="">
