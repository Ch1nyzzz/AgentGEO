</span><meta content="Guest post by Ryan Bridges of Cascade Tree Works. Plant diseases can cause a loss in yield of the crop or damage to the aesthetics of the plant itself. To make matters worse, these issues can also weaken the integrity of a tree. In this instance, hazardous situations may occur in which property damage or even serious bodily injury could result from falling branches or even the toppling of the tree itself. In order to avoid such hazards, it is important that you are able to recognize the telltale signs of common tree diseases so that you may take the necessary actions to remedy the issues. Disease outbreaks are often seasonal, regional, and species specific. The following list are some tree ailments that you may encounter, but infestations and disease will vary from location to location. Anthracnose Anthracnose is one of the leading plant diseases in trees and shrubs. This condition stems from a fungus that attacks the leaves, twigs, flowers, and fruits of several different species. It is commonly found throughout North America, with sycamore and flowering dogwood being the most heavily impacted species. The symptoms of this condition vary by the pathogen as well as the host species. […]" data-dcnode-id="1512" property="og:description"><span data-dcnode-id="1511" instrument_node="">

</span><article class="post-7538 post type-post status-publish format-standard has-post-thumbnail hentry category-treecare tag-tree-ailments tag-tree-disease tag-tree-pests" data-dcnode-id="470" id="post-7538"><span data-dcnode-id="876" instrument_node="">
</span><div class="post-header" data-dcnode-id="864"><span data-dcnode-id="875" instrument_node="">
</span><span class="cat" data-dcnode-id="872"><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arbordayblog.org/category/treecare/" title="View all posts in Tree Planting and Care"><span data-dcnode-id="874" instrument_node="">Tree Planting and Care</span></a></span><span data-dcnode-id="871" instrument_node="">
</span><h1 data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">How to Identify Tree Ailments</span></h1><span data-dcnode-id="868" instrument_node="">
</span><span class="date" data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">By Arbor Day Foundation | July 27, 2017</span></span><span data-dcnode-id="865" instrument_node="">
</span></div><span data-dcnode-id="863" instrument_node="">
</span><div class="post-img" data-dcnode-id="858"><span data-dcnode-id="862" instrument_node="">
</span><a data-dcnode-id="860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arbordayblog.org/treecare/identify-tree-ailments/"><img alt="" class="attachment-full-thumb size-full-thumb wp-post-image" data-dcnode-id="861" height="608" sizes="(max-width: 1080px) 100vw, 1080px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arbordayblog.org/wp-content/uploads/2017/07/leaf-stock-iStock-822245238-1080x608.jpg&amp;raw" srcset="https://arbordayblog.org/wp-content/uploads/2017/07/leaf-stock-iStock-822245238-1080x608.jpg 1080w, https://arbordayblog.org/wp-content/uploads/2017/07/leaf-stock-iStock-822245238-300x169.jpg 300w, https://arbordayblog.org/wp-content/uploads/2017/07/leaf-stock-iStock-822245238-768x432.jpg 768w, https://arbordayblog.org/wp-content/uploads/2017/07/leaf-stock-iStock-822245238-1024x576.jpg 1024w, https://arbordayblog.org/wp-content/uploads/2017/07/leaf-stock-iStock-822245238.jpg 1920w" width="1080"></a><span data-dcnode-id="859" instrument_node="">
</span></div><span data-dcnode-id="857" instrument_node="">
</span><div class="post-entry" data-dcnode-id="699"><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="850"><em data-dcnode-id="851"><span data-dcnode-id="855" instrument_node="">Guest post by Ryan Bridges of </span><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cascadetreeworkswa.com/"><span data-dcnode-id="854" instrument_node="">Cascade Tree Works</span></a><span data-dcnode-id="852" instrument_node="">.</span></em></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Plant diseases can cause a loss in yield of the crop or damage to the aesthetics of the plant itself. To make matters worse, these issues can also weaken the integrity of a tree. In this instance, hazardous situations may occur in which property damage or even serious bodily injury could result from falling branches or even the toppling of the tree itself. In order to avoid such hazards, it is important that you are able to recognize the telltale signs of common tree diseases so that you may take the necessary actions to remedy the issues.</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Disease outbreaks are often seasonal, regional, and species specific. The following list are some tree ailments that you may encounter, but infestations and disease will vary from location to location.</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="840"><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Anthracnose</span></strong></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Anthracnose is one of the leading plant diseases in trees and shrubs. This condition stems from a fungus that attacks the leaves, twigs, flowers, and fruits of several different species. It is commonly found throughout North America, with sycamore and flowering dogwood being the most heavily impacted species.</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">The symptoms of this condition vary by the pathogen as well as the host species. Nonetheless, some of the common indicators include premature leaf defoliation and twig blight that presents as witch’s broom – a deformity that causes shoots to densely grow in one spot.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Fungicide applied at bud opening or injected systemically should remedy the condition in sycamores. For dogwood, on the other hand, application should begin at bud break and continue throughout the growing season.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="827"><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Apple Scab</span></strong></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Apple scab is a leaf disease that occurs in the early season and affects crabapples. Some cultivars are more resistant to the disease than others. With this condition, you’ll notice scab-like lesions forming on the leaves of the plant. Eventually, the lesions will cause premature defoliation.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">While this disease is mainly aesthetic, homeowners in particular will likely find apple scab objectionable. The issue can be effectively managed by applying fungicidal agents containing ingredients like fenarimol at bud break.</span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="817"><strong data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Cedar Rusts</span></strong></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Cedar rusts are foliar diseases that attack rosaceous plants, including hawthorn and crabapple. As with apple scab, some species are more susceptible to the condition than others. This disease causes orange or rust-colored spots of the leaves of hawthorn and crabapple trees in the spring. Twig cankers may also form and cause dieback.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">In deciduous hosts, the disease can be managed with the application of fungicide at bud break. Also, select a fungicide that contains triadimefon as an active ingredient.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="807"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Diplodia Tip Blight</span></strong></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Diplodia is a common disease that attacks various types of pines, such as the Austrian pine. It generally develops at the base of the tree and moves upward and causes dead shoots with half elongated needles. Black fruiting structures are also typically apparent between needles and on the cones.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Sanitation and pruning along with the application of fungicide at bud swell is an effective treatment. Fungicides used for treatment should contain thiophanate-methyl.</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="797"><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Dothistroma Needle Blight</span></strong></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Needle blight is a fungal disease in pines that causes premature defoliation in mature trees and stunts the growth of young trees. In North America, the disease affects as many as 35 pine species. Symptoms of the condition include yellow or tan bands on needles, followed by needle dieback.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">To manage the condition, you should apply fungicide containing copper hydroxide and mancozeb at bud break.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="784"><i data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Read </span></i><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//arbordayblog.org/treecare/5-signs-tree-alb/"><i data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">5 Signs Your Tree has ALB</span></i></a></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="780"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Lethal Yellow</span></strong></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Lethal yellowing is a disease that impacts the palms of Florida and Texas – particularly the Canary Island date palm and coconut palm. It is cause by a bacteria-like organism known as phytoplasma, which is transported by a plant hopper insect. The condition typically involves flower death, premature fruit dropping, and yellowing of the foliage.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">The condition can typically be treated effectively with an antibiotic injected into the trunk. The active ingredient in this injection is oxytetracycline hydrochloride.</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="770"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Oak Wilt</span></strong></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">A systemic fungal disease, oak wilt results in tree death. The disease affects more than twenty species throughout Minnesota, Pennsylvania, South Carolina, Texas, and New York. Symptoms include leaf wilt, rapid discoloration, and premature defoliation, as well as vascular discoloration.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Trees in the white oak family can be treated; however, red oaks cannot. To prevent the condition, inject trees with systemic fungicide during the growing season.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="760"><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Powdery Mildew</span></strong></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Powdery mildew is a condition caused by fungal pathogens that grow superficially on the surface of the plant and produce white fungal threads and spores. Leaf, flower, and short distortion occur when the fungus attacks young tissue. As the infection increases, tissue becomes dried and brown.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">To prevent the condition, select tree varieties resistant to the pathogen. As with many other conditions, fungicide can also be applied when symptoms first become apparent.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><img alt="" class="size-full wp-image-7541" data-dcnode-id="752" height="640" loading="lazy" sizes="(max-width: 960px) 100vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//arbordayblog.org/wp-content/uploads/2017/07/Wood-Tree-Green-Forest-Nature-Texture-Tree-Fungus-1051464.jpg&amp;raw" srcset="https://arbordayblog.org/wp-content/uploads/2017/07/Wood-Tree-Green-Forest-Nature-Texture-Tree-Fungus-1051464.jpg 960w, https://arbordayblog.org/wp-content/uploads/2017/07/Wood-Tree-Green-Forest-Nature-Texture-Tree-Fungus-1051464-300x200.jpg 300w, https://arbordayblog.org/wp-content/uploads/2017/07/Wood-Tree-Green-Forest-Nature-Texture-Tree-Fungus-1051464-768x512.jpg 768w" width="960"></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="747"><strong data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Photinia Leaf Spot</span></strong></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Photinia leaf spot mainly affects tree species in the South. It is common in species such as red tip photinia, Indian hawthorn, loquat, and some pear cultivars. The infection begins as small, circular, dark red spots on the leaves, stems, and fruit. The spots expand and become large blotches with gray centers as the condition progresses.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">It is important to purchase disease-free plants and sanitize effectively. Likewise, fungicide may be applied at bud break.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="737"><strong data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Thousand Canker Disease</span></strong></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Thousand canker disease is a condition that affects walnuts and is found mainly in the Western United States, but recently, black walnuts in Tennessee have also become infected. The condition is spread by infected twig beetles and forms small cankers around the galleries. A tree may be infested for several years before showing signs of disease; however, the foliage in the upper branches of declining trees typically wilt and become yellow.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">There are currently no chemical management options for thousand canker disease. Once a tree begins to show decline, it typically dies within several years.</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="727"><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Dutch Elm Disease</span></strong></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Dutch elm disease is a fungal disease that affects elm trees. It has killed tens of millions of elms across the U.S. Bark beetles carry the fungus from infected trees to healthy trees as they feed on twigs and upper branches. It can also spread from tree-to-tree through root grafts. Dutch elm disease is most easily detected in the early summer when leaves on the upper branch start yellowing and curl, followed by wilting and browning. The symptoms spread to nearby branches and then to the whole part of the tree.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Symptoms of the disease can be confused with other canker and wilt pathogens of elm. To positively identify Dutch elm disease, a lab test must be completed. There is currently no cure for the disease, but there are fungicide injection treatments that can prolong tree life. Untreated trees die within a few years of being infected.</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Understanding and recognizing the most common tree diseases will help you apply treatment as quickly and effectively as possible. In many cases, this means a matter of maintaining not just the aesthetics of the tree, but also preventing damage to the surrounding structures and injuries to anyone living in proximity to diseased trees in danger of falling.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="711"><em data-dcnode-id="712"><span data-dcnode-id="716" instrument_node="">Ryan Bridges is a contributing writer and media specialist for </span><a data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cascadetreeworkswa.com/"><span data-dcnode-id="715" instrument_node="">Cascade Tree Works</span></a><span data-dcnode-id="713" instrument_node="">. He regularly produces content for a variety of home improvement and outdoor blogs, based around the transitional challenges that come with managing home and outdoor services.</span></em></p><span data-dcnode-id="710" instrument_node="">
