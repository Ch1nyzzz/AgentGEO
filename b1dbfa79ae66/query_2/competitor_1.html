span data-dcnode-id="1050" instrument_node="">Health &amp; Wellness</span></a></li><span data-dcnode-id="1047" instrument_node=""> </span><li class="menu-item menu-item-type-taxonomy menu-item-object-category menu-item-24860" data-dcnode-id="1044" id="menu-item-24860"><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigbudsmag.com/category/lifestyle/strains/"><span data-dcnode-id="1046" instrument_node="">Strains</span></a></li></ul><div class="side-nav" data-dcnode-id="1042"></div></section><a class="nav-close" data-dcnode-id="1038" href="#top"><span data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Return to Content</span></span></a></nav><div class="col-full" data-dcnode-id="299" id="content"><div data-dcnode-id="300" id="main-sidebar-container"><section data-dcnode-id="635" id="main"><img alt="root pruning" class="attachment-post-thumbnail size-post-thumbnail wp-post-image lazyloaded" data-dcnode-id="1036" data-ll-status="loaded" height="900" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigbudsmag.com/wp-content/uploads/2018/04/marijuana-root-pruning-mother-plants-smart-pots.jpg&amp;raw" srcset="https://bigbudsmag.com/wp-content/uploads/2018/04/marijuana-root-pruning-mother-plants-smart-pots.jpg 1200w, https://bigbudsmag.com/wp-content/uploads/2018/04/marijuana-root-pruning-mother-plants-smart-pots-158x120.jpg 158w, https://bigbudsmag.com/wp-content/uploads/2018/04/marijuana-root-pruning-mother-plants-smart-pots-300x225.jpg 300w, https://bigbudsmag.com/wp-content/uploads/2018/04/marijuana-root-pruning-mother-plants-smart-pots-768x576.jpg 768w, https://bigbudsmag.com/wp-content/uploads/2018/04/marijuana-root-pruning-mother-plants-smart-pots-1024x768.jpg 1024w" width="1200"><noscript data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">&lt;img width=1200 height=900 src=https://bigbudsmag.com/wp-content/uploads/2018/04/marijuana-root-pruning-mother-plants-smart-pots.jpg class="attachment-post-thumbnail size-post-thumbnail wp-post-image" alt="root pruning" loading=lazy srcset="https://bigbudsmag.com/wp-content/uploads/2018/04/marijuana-root-pruning-mother-plants-smart-pots.jpg 1200w, https://bigbudsmag.com/wp-content/uploads/2018/04/marijuana-root-pruning-mother-plants-smart-pots-158x120.jpg 158w, https://bigbudsmag.com/wp-content/uploads/2018/04/marijuana-root-pruning-mother-plants-smart-pots-300x225.jpg 300w, https://bigbudsmag.com/wp-content/uploads/2018/04/marijuana-root-pruning-mother-plants-smart-pots-768x576.jpg 768w, https://bigbudsmag.com/wp-content/uploads/2018/04/marijuana-root-pruning-mother-plants-smart-pots-1024x768.jpg 1024w" sizes="(max-width: 1200px) 100vw, 1200px"&gt;</span></noscript><article class="post-23650 post type-post status-publish format-standard has-post-thumbnail hentry category-editors-choice category-gear category-how-to-grow tag-aeroponics tag-air-pruning tag-autoflowering tag-b-52 tag-beneficial-bacteria tag-beneficial-fungi tag-bloom-phase tag-bonsai tag-cannabis tag-cloth-pots tag-deep-water-culture tag-featured tag-grow-phase tag-marijuana-plants tag-microbial-munch tag-mother-plants tag-nutrients-film-technique tag-piranha tag-root-bound tag-root-pruning tag-sea-of-green tag-smart-pots tag-tarantula tag-voodoo-juice" data-dcnode-id="646"><header data-dcnode-id="1031"><h1 class="title entry-title" data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Snip And Clip The Roots Of Your Cannabis Plants For A Healthy, Heavy Harvest</span></h1></header><div class="post-meta" data-dcnode-id="1020"><span class="small" data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">By</span></span><span data-dcnode-id="1028" instrument_node=""> </span><span class="author vcard" data-dcnode-id="1024"><span class="fn" data-dcnode-id="1025"><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigbudsmag.com/author/alan-ruggles/" rel="author" title="Posts by Alan Ruggles"><span data-dcnode-id="1027" instrument_node="">Alan Ruggles</span></a></span></span><span data-dcnode-id="1023" instrument_node=""> | Published: </span><abbr class="date time published updated" data-dcnode-id="1021" title="2018-04-13T09:00:00-0400"><span data-dcnode-id="1022" instrument_node="">April 13, 2018</span></abbr></div><section class="entry" data-dcnode-id="723"><div class="essb_links essb_counter_modern_top essb_displayed_top essb_share essb_template_tiny-retina essb_1255507558 print-no" data-dcnode-id="998" data-essb-button-style="button" data-essb-counter-pos="left" data-essb-instance="1255507558" data-essb-position="top" data-essb-postid="23650" data-essb-template="tiny-retina" data-essb-twitter-url="https://bigbudsmag.com/marijuana-root-pruning-mother-plants-smart-pots/" data-essb-url="https://bigbudsmag.com/marijuana-root-pruning-mother-plants-smart-pots/" id="essb_displayed_top_1255507558"><ul class="essb_links_list" data-dcnode-id="1001"><li class="essb_item essb_link_facebook nolightbox" data-dcnode-id="1014"><span data-dcnode-id="1019" instrument_node=""> </span><a data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//bigbudsmag.com/marijuana-root-pruning-mother-plants-smart-pots/%26t%3DSnip%2BAnd%2BClip%2BThe%2BRoots%2BOf%2BYour%2BCannabis%2BPlants%2BFor%2BA%2BHealthy%252C%2BHeavy%2BHarvest" onclick="essb_window('http://www.facebook.com/sharer/sharer.php?u=https://bigbudsmag.com/marijuana-root-pruning-mother-plants-smart-pots/&amp;t=Snip+And+Clip+The+Roots+Of+Your+Cannabis+Plants+For+A+Healthy%2C+Heavy+Harvest','facebook','1255507558'); return false;" rel="nofollow" target="_blank" title=""><span class="essb_icon" data-dcnode-id="1018"></span><span class="essb_network_name" data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Facebook</span></span></a></li><li class="essb_item essb_link_twitter nolightbox" data-dcnode-id="1008"><span data-dcnode-id="1013" instrument_node=""> </span><a data-dcnode-id="1009" href="#" onclick="essb_window('https://twitter.com/intent/tweet?text=Snip+And+Clip+The+Roots+Of+Your+Cannabis+Plants+For+A+Healthy%2C+Heavy+Harvest&amp;url=https://bigbudsmag.com/marijuana-root-pruning-mother-plants-smart-pots/&amp;counturl=https://bigbudsmag.com/marijuana-root-pruning-mother-plants-smart-pots/&amp;related=bigbudsmag&amp;via=bigbudsmag&amp;hashtags=#bigbudsmag','twitter','1255507558'); return false;" rel="nofollow" target="_blank" title=""><span class="essb_icon" data-dcnode-id="1012"></span><span class="essb_network_name" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Twitter</span></span></a></li><li class="essb_item essb_link_pinterest nolightbox" data-dcnode-id="1002"><span data-dcnode-id="1007" instrument_node=""> </span><a data-dcnode-id="1003" href="#" onclick="essb_pinterest_picker('1255507558'); return false;" rel="nofollow" target="_blank" title=""><span class="essb_icon" data-dcnode-id="1006"></span><span class="essb_network_name" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Pinterest</span></span></a></li></ul><div class="essb_native_buttons essb_native_after_share" data-dcnode-id="999"><ul class="essb_links" data-dcnode-id="1000"></ul></div></div><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Cannabis roots need ample room to grow and expand, or they become root bound, also commonly referred to as pot bound. When plants become root bound, roots push against the walls of the container and begin circling the root zone, eventually constricting and choking off the interior root mass.</span></p><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">A root-bound cannabis plant eventually has difficulty absorbing oxygen, water and nutrients, oftentimes severely inhibiting aboveground prosperity. Root-bound plants may exhibit stunted growth, nutrient-related problems, weak stems and stalks, and reduced production of bud weight, cannabinoids and terpenoids.</span></p><p data-dcnode-id="990"><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigbudsmag.com/care-feeding-healthy-marijuana-motherplants/" rel="noopener" target="_blank"><span data-dcnode-id="993" instrument_node="">Marijuana mother plants</span></a><span data-dcnode-id="991" instrument_node=""> are often in danger of becoming root bound, but even plants grown for as little as one season can become root bound, especially if the pot size is too small.</span></p><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Now, let’s explore methods of preventing your cannabis from becoming root bound, and what to do if this does occur.</span></p><h2 data-dcnode-id="986" style="text-align: center;"><span data-dcnode-id="987" instrument_node="">Using Smart Containers To Prevent Cannabis From Becoming Root Bound</span></h2><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Until about 10 years ago, almost all cannabis growers used plastic containers made from rigid, non-porous, synthetic material. The only openings were at the top of the pot, with a few holes on the bottom.</span></p><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">When the roots hit the rigid internal walls of a solid pot, they circle the pot’s perimeter and begin to choke the rest of the root mass, also attempting to grow through the holes at the bottom of the pot. When growers see the roots emerging from the base of their containers, their usual tactic is to repot to a larger bucket.</span></p><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">This is a good tactic for most single-season marijuana plants, although repotting and transplanting can be messy and cause stress to the plants.</span></p><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">However, sometimes you can’t afford the floor space to keep on upsizing your containers, or the larger pot is taller than previous pots, taking away valuable vertical space, which impacts distance between grow lights and canopy.</span></p><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">When it comes to mother plants, constantly increasing pot size can quickly get out of control. I’ve seen growers who don’t root prune their mother plants, which end up needing 50-gallon containers, sometimes even larger. It’s unwieldy and unnecessary.</span></p><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Once you master the art of root pruning, you can avoid that outcome.</span></p><h2 data-dcnode-id="972" style="text-align: center;"><span data-dcnode-id="973" instrument_node="">Cloth Pots For Air Pruning</span></h2><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Cloth pots are designed for automatic air pruning. These containers are made of durable and porous cloth, or they have openings around the sides. When roots come into contact with open air and light penetration, they prune themselves. So, instead of circling and girdling, they stop growing outward.</span></p><p data-dcnode-id="965"><span data-dcnode-id="969" instrument_node="">The most popular air-pruning pots are made by Smart Pots and </span><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardengearsupply.com/product/radicle-bags-7-gallon-high-yield-grow-bag/" rel="noopener" target="_blank"><span data-dcnode-id="968" instrument_node="">Radicle Bags</span></a><span data-dcnode-id="966" instrument_node="">. These cloth and canvas containers range from one gallon to several hundred gallons in size, often have handles, and are used by indoor and outdoor marijuana growers alike.</span></p><p data-dcnode-id="960"><span data-dcnode-id="964" instrument_node="">Some cloth pots, like this </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B01LW1SLCE/ref%3Dsspa_dk_detail_5%3Fpsc%3D1%26pd_rd_i%3DB01LW1SLCE%26pd_rd_wg%3DpOp6v%26pd_rd_r%3D6DFMSBMT69TF4AXT2GK3%26pd_rd_w%3DCOdI2" rel="noopener" target="_blank"><span data-dcnode-id="963" instrument_node="">light-colored one from iPower</span></a><span data-dcnode-id="961" instrument_node="">, are great for outdoor growing, because black pots attract and hold heat that can fry roots, especially if marijuana plants are growing under full sun.</span></p><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Not only do cloth pots create self-pruning roots, they also facilitate better water drainage, and allow the root zone to breathe in and out from all sides. This brings more oxygen and air exchange into the root zone; the added oxygen is absorbed by roots and utilized by your plants.</span></p><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">The fact that drainage can take place from the sides of the container, not just the bottom, is also a benefit. Fertilizer salts can easily accumulate in root zones and are tricky to flush without making the root zone too soggy for optimal root health. When you water a cloth pot or other type of air-pruning pot, the water can pour out the sides, purging excess nutrient salts more efficiently.</span></p><p data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">The air flow that comes in through the pot’s walls oxygenates the root zone so it isn’t soggy and stagnant. This allows roots to breathe easier, and removes wet conditions that are an ideal environment for pathogenic root rot organisms that destroy cannabis roots.</span></p><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Check out the below YouTube video of how to root prune a potted plant, courtesy of Erich Maelzer:</span></p><p data-dcnode-id="948"><iframe allow="autoplay; encrypted-media" allowfullscreen="" data-dcnode-id="951" data-lazy-src="https://www.youtube.com/embed/x3BlQZF7xVA?feature=oembed" data-rocket-lazyload="fitvidscompatible" frameborder="0" height="450" loading="lazy" src="about:blank" width="600"></iframe><noscript data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">&lt;iframe width=600 height=450 src="https://www.youtube.com/embed/x3BlQZF7xVA?feature=oembed" frameborder=0 allow="autoplay; encrypted-media" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></p><h2 data-dcnode-id="946" style="text-align: center;"><span data-dcnode-id="947" instrument_node="">Manual Root Pruning Of Cannabis</span></h2><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Even if you use root-pruning pots, there may come a time when your cannabis roots are too dense and large for the container. This is almost always true for mother plants. The solution to this problem is manual root pruning.</span></p><p data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">The best tools for manual root trimming of cannabis are </span><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Bonsai-Set-Pcs-Include-Scissors/dp/B01NBVZD0T/ref%3Dlp_16336943011_1_1%3Fsrs%3D16336943011%26ie%3DUTF8%26qid%3D1522677980%26sr%3D8-1" rel="noopener" target="_blank"><span data-dcnode-id="942" instrument_node="">bonsai plant-trimming tools</span></a><span data-dcnode-id="940" instrument_node="">, such as root shears.</span></p><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">These specialty gardening tools might not be utilized by many cannabis-specific cultivators, but they are indeed a great investment for growers. They can be used for removing root balls from pots, for trimming roots, and some can even be used for trimming and training marijuana plants aboveground.</span></p><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">This has to be done carefully, though. Improper root trimming can create so much stress that it severely harms, even kills your plant.</span></p><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">And timing is important. Do not root prune a cannabis mother plant right before or after you take cuttings from her. You want at least a 3–4-week buffer after cuttings are taken, to ensure the mother plant has had time to recover from the stress of having cuttings taken.</span></p><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">After you root prune your mother plant, wait a minimum of 3–4 weeks before you take more cuttings, in order to give her sufficient time to recover.</span></p><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Similarly, don’t root prune a one-season cannabis plant less than 15 days before bloom phase, or during bloom phase. The stress of root pruning interferes with plant hormones and physiologic processes, which can delay onset of bloom phase and subsequently decrease floral production.</span></p><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">If I see root-bound single-season cannabis plants in grow phase, it’s usually around weeks three or four. I do my root pruning, and/or increase container size, and then wait 15 days or more to start bloom phase.</span></p><h2 data-dcnode-id="925" style="text-align: center;"><span data-dcnode-id="926" instrument_node="">Best Tools And Tactics For Cannabis Root Pruning</span></h2><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">For easy explanation of manual root pruning, check out the below YouTube video courtesy of CenCal Weed Cultivator, who discusses the Current Culture Undercurrent System:</span></p><p data-dcnode-id="919"><iframe allow="autoplay; encrypted-media" allowfullscreen="" data-dcnode-id="922" data-lazy-src="https://www.youtube.com/embed/lt7byYVgVFg?feature=oembed" data-rocket-lazyload="fitvidscompatible" frameborder="0" height="338" loading="lazy" src="about:blank" width="600"></iframe><noscript data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">&lt;iframe loading=lazy width=600 height=338 src="https://www.youtube.com/embed/lt7byYVgVFg?feature=oembed" frameborder=0 allow="autoplay; encrypted-media" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript></p><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">The general rules to follow for cannabis root pruning are:</span></p><ol data-dcnode-id="886"><span data-dcnode-id="916" instrument_node=""> </span><li data-dcnode-id="912"><strong data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Don’t root prune if the plants are already under stress.</span></strong><span data-dcnode-id="913" instrument_node=""> If your plants have recently suffered from nutrient problems, a pest infestation, disease or extreme heat, don’t root prune until plants are healthy and in ideal conditions.</span></li><span data-dcnode-id="911" instrument_node=""> </span><li data-dcnode-id="907"><strong data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Don’t root prune less than 15 days before bloom phase starts,</span></strong><span data-dcnode-id="908" instrument_node=""> within four weeks of taking cuttings from a mother plant, or when a plant is already in bloom phase.</span></li><span data-dcnode-id="906" instrument_node=""> </span><li data-dcnode-id="902"><strong data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Don’t prune more than 35 percent of total root mass.</span></strong><span data-dcnode-id="903" instrument_node=""> While you may see a higher percentage of root mass being pruned in some instructional online videos, those percentages are targeted toward plants other than cannabis.</span></li><span data-dcnode-id="901" instrument_node=""> </span><li data-dcnode-id="897"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Root prune the outside perimeters of the root mass,</span></strong><span data-dcnode-id="898" instrument_node=""> and do it evenly to create a symmetrical root profile.</span></li><span data-dcnode-id="896" instrument_node=""> </span><li data-dcnode-id="892"><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Always use clean,</span></strong><span data-dcnode-id="893" instrument_node=""> sterilized root-pruning tools.</span></li><span data-dcnode-id="891" instrument_node=""> </span><li data-dcnode-id="887"><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Root pruning should be done no more than three times per year</span></strong><span data-dcnode-id="888" instrument_node=""> for mother plants and only once for rejuvenated plants or young plants no older than one grow season.</span></li></ol><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Growers using pure hydroponics systems such as deep water culture, aeroponics or the nutrient film technique often find that the root-boosting benefits of those systems creates huge, pure-white root masses that can quickly exceed the size of the container or tube that the roots are in. This is especially true in aeroponics systems.</span></p><p data-dcnode-id="867"><span data-dcnode-id="883" instrument_node="">After you’ve root pruned, always feed your plants with </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Advanced-Nutrients-B-52-Fertilizer-Booster/dp/B00DCY257C/ref%3Dsr_1_4%3Fs%3Dlawn-garden%26ie%3DUTF8%26qid%3D1523556560%26sr%3D1-4%26keywords%3Dadvanced%2Bnutrients%2Bb-52%26dpID%3D51g7pnKSjtL%26preST%3D_SY300_QL70_%26dpSrc%3Dsrch" rel="noopener" target="_blank"><span data-dcnode-id="882" instrument_node="">B-52</span></a><span data-dcnode-id="880" instrument_node=""> B-vitamin anti-stress tonic, and with </span><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigbudsmag.com/marijuana-growers-use-potassium-silicate-br-to-get-more-thc-trichomes/" rel="noopener" target="_blank"><span data-dcnode-id="879" instrument_node="">potassium silicate</span></a><span data-dcnode-id="877" instrument_node="">, a cellular strengthener that boosts healing and structural integrity. Also, feed them beneficial bacteria and fungi hydroponics supplements found in </span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Advanced-Nutrients-Voodoo-Piranha-Fertilizer/dp/B074TV9267/ref%3Dsr_1_1_sspa%3Fie%3DUTF8%26qid%3D1523557071%26sr%3D8-1-spons%26keywords%3Dadvanced%2Bnutrients%2Bpiranha%26psc%3D1" rel="noopener" target="_blank"><span data-dcnode-id="876" instrument_node="">Piranha, Voodoo Juice</span></a><span data-dcnode-id="874" instrument_node="">, </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Advanced-Nutrients-Tarantula-Liquid-Fertilizer/dp/B004NF22DQ/ref%3Dsr_1_fkmr0_1%3Fs%3Dlawn-garden%26ie%3DUTF8%26qid%3D1523557120%26sr%3D1-1-fkmr0%26keywords%3Dadvanced%2Bnutrients%2Btarantula%2Bmicrobial%2Bmunch" rel="noopener" target="_blank"><span data-dcnode-id="873" instrument_node="">Tarantula</span></a><span data-dcnode-id="871" instrument_node=""> and </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Advanced-Nutrients-Microbial-Munch-Fertilizer/dp/B00ZPHFBK2/ref%3Dsr_1_1%3Fs%3Dlawn-garden%26ie%3DUTF8%26qid%3D1523557157%26sr%3D1-1%26keywords%3Dadvanced%2Bnutrients%2BMicrobial%2BMunch%26dpID%3D51NWN8HUDBL%26preST%3D_SY300_QL70_%26dpSrc%3Dsrch" rel="noopener" target="_blank"><span data-dcnode-id="870" instrument_node="">Microbial Munch</span></a><span data-dcnode-id="868" instrument_node="">.</span></p><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Used together, these supplements form a beneficial symbiosis with your cannabis roots, which will help them heal from the pruning, while also increasing their ability to intake water, oxygen and nutrients.</span></p><p data-dcnode-id="857"><span data-dcnode-id="864" instrument_node="">If you’re growing </span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigbudsmag.com/autoflowering-marijuana-cultivation-secrets-for-bigger-yields/" rel="noopener" target="_blank"><span data-dcnode-id="863" instrument_node="">autoflowering marijuana</span></a><span data-dcnode-id="861" instrument_node=""> or running a </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigbudsmag.com/sea-of-green-marijuana-grow-clones-spacing-air/" rel="noopener" target="_blank"><span data-dcnode-id="860" instrument_node="">sea of green grow op</span></a><span data-dcnode-id="858" instrument_node="">, your cannabis won’t be alive long enough to become root bound, unless you have their roots in a ridiculously small container.</span></p><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">However, if you have particularly robust plants whose genetics predispose them to rapid root growth, or you use long grow-phase durations or mother plants, root pruning is a valuable skill that will keep your plants healthy and strong.</span></p><div class="essb_links essb_counter_modern_top essb_displayed_bottom essb_share essb_template_tiny-retina essb_1588740692 print-no" data-dcnode-id="833" data-essb-button-style="button" data-essb-counter-pos="left" data-essb-instance="1588740692" data-essb-position="bottom" data-essb-postid="23650" data-essb-template="tiny-retina" data-essb-twitter-url="https://bigbudsmag.com/marijuana-root-pruning-mother-plants-smart-pots/" data-essb-url="https://bigbudsmag.com/marijuana-root-pruning-mother-plants-smart-pots/" id="essb_displayed_bottom_1588740692"><ul class="essb_lin
