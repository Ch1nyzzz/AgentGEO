</span><div data-dcnode-id="209" id="content"><span data-dcnode-id="403" instrument_node=""> </span><div class="content-headline" data-dcnode-id="398"><span data-dcnode-id="402" instrument_node="">
</span><h1 class="entry-headline" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Step-by-Step Guide: How to Plant Shrubs</span></h1><span data-dcnode-id="399" instrument_node="">
</span></div><span data-dcnode-id="397" instrument_node="">
</span><div class="entry-content" data-dcnode-id="211"><span data-dcnode-id="396" instrument_node="">
</span><div class="at-above-post addthis_tool" data-dcnode-id="395" data-url="https://nativeplantherald.prairienursery.com/2016/08/how-to-plant-shrubs/"></div><p class="p1" data-dcnode-id="390"><span data-dcnode-id="391" style="color: #000000;"><strong data-dcnode-id="392"><span class="s1" data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Choosing Native Shrubs&nbsp;</span></span></strong></span></p><span data-dcnode-id="389" instrument_node="">
</span><p class="p1" data-dcnode-id="383"><span class="s1" data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Shrubs can occupy large areas within a landscape and provide the mass needed to anchor a landscape design. The large size and shape also work to smooth the transition between taller trees and lower growing perennials. Beyond the usual landscape application, native shrubs are an enriching force and resource in the landscape, contributing countless&nbsp;benefits in food and habitat for birds, pollinators and caterpillars. In the fall, you’ll enjoy the show of&nbsp;bright colors and berries that are a highlight of the season.&nbsp;</span></span><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prairienursery.com/store/shrubs-and-vines"><span data-dcnode-id="386" instrument_node="">Native shrubs are easy to grow</span></a><span data-dcnode-id="384" instrument_node=""> and often tolerate a wide range of conditions. Our website lists the preferred growing conditions for each species, including soil type, soil moisture, and light requirements, to help you choose&nbsp;the shrubs that are best suited to your location.</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="379"><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.prairienursery.com/store/shrubs-and-vines/common-ninebark-physocarpus-opulifolius"><img alt="shrub-site-conditions" class="alignnone wp-image-2689 size-full" data-dcnode-id="381" height="421" sizes="(max-width: 606px) 100vw, 606px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nativeplantherald.prairienursery.com/wp-content/uploads/2016/08/shrub-site-conditions-2.jpg&amp;raw" srcset="https://nativeplantherald.prairienursery.com/wp-content/uploads/2016/08/shrub-site-conditions-2.jpg 606w, https://nativeplantherald.prairienursery.com/wp-content/uploads/2016/08/shrub-site-conditions-2-400x278.jpg 400w" width="606"></a></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" style="color: #000000;"><strong data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Steps to Planting Shrubs</span></strong></span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="369" style="color: #000000;"><strong data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">1.</span></strong><span data-dcnode-id="370" instrument_node=""> </span></span><span data-dcnode-id="368" instrument_node="">If the potted shrub has&nbsp;dried out, saturate the potted plant with water.&nbsp;Water it thoroughly a couple of times&nbsp;and then let it sit for an hour or so&nbsp;before planting. Pre-watering helps expand and wake up the roots, making them ready to receive moisture from the soil.</span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="362" style="color: #000000;"><strong data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">2.</span></strong><span data-dcnode-id="363" instrument_node=""> </span></span><span data-dcnode-id="361" instrument_node="">Shrubs need to be planted (spaced) to allow for their mature width. The spacing for&nbsp;each&nbsp;shrub species is listed on our website. Place the potted shrubs on the ground where you intend to plant them. Use a tape measure&nbsp;to&nbsp;measure from the center of one plant to the center of the next to get&nbsp;the desired spacing. Initially, when you are siting them, and when you first plant them, they&nbsp;can look a little bit&nbsp;“lost in space.” You’ll need to use your imagination&nbsp;a&nbsp;little, and&nbsp;trust that they will grow up and fit beautifully in&nbsp;the&nbsp;landscape! It will happen. If you are planting a hedgerow and desire a solid mass of shrubs, space them closer, or at the lower end of the spacing range.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="355" style="color: #000000;"><strong data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">3.</span></strong><span data-dcnode-id="356" instrument_node=""> </span></span><span data-dcnode-id="354" instrument_node="">Dig a hole 2 – 3 times the width of the pot and at least as deep as the pot, or a couple of inches deeper.</span></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="348" style="color: #000000;"><strong data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">4.</span></strong><span data-dcnode-id="349" instrument_node=""> </span></span><span data-dcnode-id="347" instrument_node="">Remove the shrub from its pot. Before planting it, loosen the roots of the shrub. Tease the outer roots from the soil. If the roots are tightly matted, use a knife to score the root mass in several places and gently loosen the root ball. This won’t harm the plant. It will stop the roots from wrapping around, and helps them move out into the surrounding soil.</span></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="341" style="color: #000000;"><strong data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">5.</span></strong><span data-dcnode-id="342" instrument_node=""> </span></span><span data-dcnode-id="340" instrument_node="">Set the readied plant into the hole to test its depth. The top of the potted shrub’s soil should be AT ground level – NOT above ground level. Make any necessary adjustments at this point, either removing some soil or adding a little back in, to achieve the right planting depth.</span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="334" style="color: #000000;"><strong data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">6.</span></strong><span data-dcnode-id="335" instrument_node=""> </span></span><span data-dcnode-id="333" instrument_node="">Check the shrub orientation for aesthetics&nbsp;and positioning. Once you have the shrub positioned the way you want it, pull some of the dirt back into the hole and around the shrub for stability, filling the hole about halfway. Pack the soil down by hand. Check the shrub position again, making sure the plant is vertical. Adjust if needed.</span></p><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="327" style="color: #000000;"><strong data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">7.</span></strong><span data-dcnode-id="328" instrument_node=""> </span></span><span data-dcnode-id="326" instrument_node="">Add water at this point, soaking the shrub and filling the hole with water. After the water has soaked back into the soil, fill the rest of the hole with dirt up to level with the surrounding ground. Pack the dirt around the plant again, just enough to remove any air holes. Water thoroughly, again, once you are finished planting.</span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">&nbsp;</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="315"><strong data-dcnode-id="316"><span data-dcnode-id="319" style="color: #000000;"><span data-dcnode-id="320" instrument_node="">Plant Care</span></span><br data-dcnode-id="318"><span data-dcnode-id="317" instrument_node="">
</span></strong></p><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="311" style="color: #000000;"><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Mulch.</span></strong></span><span data-dcnode-id="310" instrument_node=""> Newly planted shrubs will benefit from a layer of mulch to help conserve water in the disturbed, bared&nbsp;ground. Add 2 – 3&nbsp;inches of the mulch of your choice after planting. Make sure to taper the amount of mulch inward, toward the plant&nbsp;stem – avoid mulching right up to the base/stem of the shrub. After your native shrubs are well established (a full year), there is no need to continue mulching them with anything other than leaves or grass clippings. They will fare just as well, and contribute to more biodiversity if the ground around them contains local spent plant material or a ground cover of&nbsp;other plants, rather than a mulch covering.</span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="305" style="color: #000000;"><strong data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Water.</span></strong></span><span data-dcnode-id="304" instrument_node=""> Newly planted shrubs need to be watered regularly. If you are planting in fall, check the soil around the shrub regularly and make sure&nbsp;that it&nbsp;is not drying out while the plant still has leaves. Water as needed. If you plant shrubs in the spring or summer make sure to set and follow a regular watering pattern for the entire season, and keep them adequately watered. Properly sited, your native shrubs should not need additional watering once they are established (a full year), except during extremely dry or drought conditions.</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="296"><span data-dcnode-id="298" style="color: #000000;"><strong data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Pruning.</span></strong><span data-dcnode-id="299" instrument_node=""> </span></span><span data-dcnode-id="297" instrument_node="">Avoid pruning your newly planted shrubs – just let them grow and become established, for period. The shrubs that we sell are usually in one and two gallon pots, so it’s best to allow at least three years of growth before pruning anything, if deemed necessary. If you’ve planted a hedgerow, avoid pruning heavily in the spring when birds are likely to be nesting in the shrubs.</span></p><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">&nbsp;</span></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="289"><img alt="die-lon8" class="alignleft size-full wp-image-2683" data-dcnode-id="291" height="602" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nativeplantherald.prairienursery.com/wp-content/uploads/2016/08/die-lon8.jpg&amp;raw" srcset="https://nativeplantherald.prairienursery.com/wp-content/uploads/2016/08/die-lon8.jpg 400w, https://nativeplantherald.prairienursery.com/wp-content/uploads/2016/08/die-lon8-266x400.jpg 266w" width="400"><img alt="die-lon4" class="alignleft size-full wp-image-2684" data-dcnode-id="290" height="400" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nativeplantherald.prairienursery.com/wp-content/uploads/2016/08/die-lon4.jpg&amp;raw" srcset="https://nativeplantherald.prairienursery.com/wp-content/uploads/2016/08/die-lon4.jpg 600w, https://nativeplantherald.prairienursery.com/wp-content/uploads/2016/08/die-lon4-400x267.jpg 400w" width="600"></p><span data-dcnode-id="288" instrument_node="">
