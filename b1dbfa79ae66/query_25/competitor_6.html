</span><h1 data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">Pruning Shrubs Guide - A - Z Listing</span></h1><p data-dcnode-id="2627"></p><span data-dcnode-id="2626" instrument_node=""> </span><section class="" data-dcnode-id="2610" data-spy="Pruning Guide" data-target="Pruning Guide" id="Pruning Guide"><div class="card" data-dcnode-id="2611"><div class="card-header" data-dcnode-id="2623"><h2 data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">Pruning shrubs - Follow our Pruning Guide for simple how to Pruning shrubs</span></h2></div><div class="articleBody" data-dcnode-id="2612"><p data-dcnode-id="2622"></p><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">The importance of pruning shrubs at the right time of year cannot be overstressed. If you prune some shrubs in the autumn, then you could be cutting off all of the next year's flower buds. </span></p><p data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node=""> If you prune other shrubs in the spring, then the same goes. You could be cutting off the summer's flower buds. In either case, it means no flowers on your shrub!</span></p><p data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node=""> Timing of pruning is the most important aspect for success. That is why we have put up a When to Prune Shrubs page. You can also follow our A-Z listings below for best advice on how and when to prune shrubs.</span></p><span data-dcnode-id="2615" instrument_node="">
</span><p class="lead" data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">Many different shrubs require different pruning regimes, but fortunately there are a few basic rules you can follow to get it right - even if you do not know the name of your shrub. Yes, it is that easy.</span></p></div></div></section><span data-dcnode-id="2609" instrument_node="">
</span><section class="" data-dcnode-id="2580" data-spy="A quick Guide on how to prune shrubs" data-target="A quick Guide on how to prune shrubs" id="A quick Guide on how to prune shrubs"><div class="card" data-dcnode-id="2582"><div class="card-header" data-dcnode-id="2606"><h2 data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">A quick Guide on how to prune shrubs</span></h2></div><div class="articleBody" data-dcnode-id="2583" style="min-height: 420px"><div data-dcnode-id="2602" style="float:left"><img alt="Pruning Shrubs" class="img-fluid" data-dcnode-id="2605" data-src="https://gardenseeker.co.uk/images-top/Pruning-4065.webp" height="232" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images-top/Pruning-4065.webp&amp;raw" style="padding:10px; padding-top:10px" width="350"><p align="center" data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">Pruning Shrubs</span></p></div><p data-dcnode-id="2601"></p><div data-dcnode-id="2597" style="float:right"><img alt="Pruning Shrubs" class="img-fluid" data-dcnode-id="2600" data-src="https://gardenseeker.co.uk/pruning/images/pruning_ribes301115.webp" height="399" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/pruning_ribes301115.webp&amp;raw" style="padding:10px;" width="163"><p align="center" data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Pruning Shrubs</span></p></div><p data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">Pruning garden shrubs can be a daunting task if you do not know how. How to prune your shrubs, with listings of all popular shrubs with information and advice on how to do in a methodical and practical manner. This guide takes you through step by step.</span></p><span data-dcnode-id="2594" instrument_node=""> </span><p data-dcnode-id="2592"><span data-dcnode-id="2593" instrument_node="">Most shrubs do not actually 'need' pruning! (Now that's a pretty good way to start a feature on how to prune shrubs and pruning: I will now bid you farewell and let you get on with it!)</span></p><span data-dcnode-id="2591" instrument_node="">
</span><div align="center" data-dcnode-id="2584"><a class="button button1" data-dcnode-id="2589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_shrubs.htm"><span data-dcnode-id="2590" instrument_node="">View A quick Guide on how to prune shrubs</span></a><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">Most bedding plants are used for either summer or spring flowering. Some, such as Pansies, will give a bit of colour through the winter as well.</span></p><p data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">Botanical and Common names included for ease of use in our A - Z shrub pruning guide. If you are not sure that you have identified your shrub correctly, then our a - z of shrubs listing (with pictures) should help you, If all else fails, we are always at your service. Just an email away. Send us an image of your shrub, and we will do our best to identify it for you.</span></p></div></div></div><span data-dcnode-id="2581" instrument_node="">
</span></section><hr data-dcnode-id="2579"><section class="" data-dcnode-id="2559" data-spy="A Pruning Calendar for Shrubs" data-target="A Pruning Calendar for Shrubs" id="A Pruning Calendar for Shrubs"><div class="card" data-dcnode-id="2561"><div class="card-header" data-dcnode-id="2576"><h2 data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">A Pruning Calendar for Shrubs</span></h2></div><div class="articleBody" data-dcnode-id="2562" style="min-height: 390px"><p data-dcnode-id="2575"></p><div data-dcnode-id="2571" style="float:right"><img alt="Pruning Shrubs" class="img-fluid" data-dcnode-id="2574" data-src="https://gardenseeker.co.uk/images/blackberry-hard-pruned-sm.webp" height="336" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/blackberry-hard-pruned-sm.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Pruning Shrubs</span></p></div><strong data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">When to Prune Shrubs - Pruning Calendar for shrubs</span></strong><p data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Without doubt, the factor that affects shrubs more 
		than any other is the actual timing of pruning operation. There is 
		certainly a best time when you should prune shrubs and trees - in 
		particular if flowering excellence is high on your list. Prune at the 
		right time, and you will get flowers when due; pruning at the wrong time 
		often means no flowers!</span></p><span data-dcnode-id="2566" instrument_node="">
</span><div align="center" data-dcnode-id="2563"><a class="button button1" data-dcnode-id="2564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_calendar_for_shrubs.html"><span data-dcnode-id="2565" instrument_node="">View When to Prune Shrubs - Pruning Calendar for shrubs</span></a></div></div></div><span data-dcnode-id="2560" instrument_node="">

</span><h1 class="text-center" data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">A - Z Shrub Pruning Guide</span></h1><p align="center" data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">This is a large section, Probably needs its own website.</span></p><span data-dcnode-id="2537" instrument_node="">
</span><div align="center" class="container-fluid" data-dcnode-id="172"><span data-dcnode-id="2536" instrument_node="">
</span><div class="row" data-dcnode-id="173"><div class="col-lg-6 col-xl-6 col-md-6 col-sm-12 col-12" data-dcnode-id="1233"><div class="jumbotron" data-dcnode-id="2532"><span data-dcnode-id="2535" instrument_node="">
</span><h2 data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">A</span></h2></div><div class="card" data-dcnode-id="2509"><span data-dcnode-id="2531" instrument_node="">
</span><div class="card-body" data-dcnode-id="2511"><span data-dcnode-id="2530" instrument_node="">
</span><div class="card-header" data-dcnode-id="2527"><h2 data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">Pruning Abelia Shrubs</span></h2></div><span data-dcnode-id="2526" instrument_node="">
</span><div data-dcnode-id="2522" style="float:right"><img alt="Abelia" class="img-fluid" data-dcnode-id="2525" data-src="https://gardenseeker.co.uk/pruning/images/abelia-209018.webp" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/abelia-209018.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="250"><p align="center" data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Abelia</span></p></div><p class="card-text" data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">There are two basic methods for pruning evergreen Abelia shrubs - depending upon whether or not regular maintenance has been carried out. The basic routine pruning is little other than a light trip after flowering. The other method is usually adopted for overgrown or untidy Abelias which have not been tended for most of their life span!</span></p><span data-dcnode-id="2519" instrument_node=""> </span><p data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">The techniques are the same for Abelia grandiflora types, Abelia floribunda; and other evergreen Abelias.</span></p><span data-dcnode-id="2516" instrument_node="">
</span><div align="center" data-dcnode-id="2513"><a class="button button1" data-dcnode-id="2514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-abelia-how.html"><span data-dcnode-id="2515" instrument_node="">How to Prune  Abelia Shrubs</span></a></div><span data-dcnode-id="2512" instrument_node="">
</span></div><span data-dcnode-id="2510" instrument_node="">
</span></div><hr data-dcnode-id="2508"><div class="card" data-dcnode-id="2485"><span data-dcnode-id="2507" instrument_node="">
</span><div class="card-body" data-dcnode-id="2487"><span data-dcnode-id="2506" instrument_node="">
</span><div class="card-header" data-dcnode-id="2503"><h2 data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">Pruning Abutilon - Flowering Maples</span></h2></div><span data-dcnode-id="2502" instrument_node="">
</span><div data-dcnode-id="2498" style="float:right"><img alt="Abutilons" class="img-fluid" data-dcnode-id="2501" data-src="https://gardenseeker.co.uk/pruning/images/dreamstime_xl_30528508-Ab-megapotanicum.webp" height="226" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/dreamstime_xl_30528508-Ab-megapotanicum.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="340"><p align="center" data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Abutilons</span></p></div><p class="card-text" data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">Abutilons are one of the few shrubs that can be pruned at any time during their active growing season. They quickly start re-growth and subsequent flowering.
</span></p><span data-dcnode-id="2495" instrument_node=""> </span><p data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Simply prune as and when required. In particular, after the winter damage, when most types can be cut back quite hard. This will encourage strong growth - which will soon regain its original height.</span></p><span data-dcnode-id="2492" instrument_node="">
</span><div align="center" data-dcnode-id="2489"><a class="button button1" data-dcnode-id="2490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-abutilons-.html"><span data-dcnode-id="2491" instrument_node="">How to Prune Abutilon - Flowering Maples</span></a></div><span data-dcnode-id="2488" instrument_node="">
</span></div><span data-dcnode-id="2486" instrument_node="">
</span></div><hr data-dcnode-id="2484"><div class="card" data-dcnode-id="2461"><span data-dcnode-id="2483" instrument_node="">
</span><div class="card-body" data-dcnode-id="2463"><span data-dcnode-id="2482" instrument_node="">
</span><div class="card-header" data-dcnode-id="2479"><h2 data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Pruning Acers - Japanese Maples</span></h2></div><span data-dcnode-id="2478" instrument_node="">
</span><div data-dcnode-id="2474" style="float:right"><img alt="Japanese Maples" class="img-fluid" data-dcnode-id="2477" data-src="https://gardenseeker.co.uk/pruning/images/Japanese%20Maple%20-%20acer%20-%20310080.webp" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Japanese%2520Maple%2520-%2520acer%2520-%2520310080.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="250"><p align="center" data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Japanese Maples</span></p></div><p class="card-text" data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">In an ideal world, there would be no need to prune your Acer. Generally speaking they are fine without being subject to the secateurs.  But as with many shrubs that do not actually need pruning, we sometimes have a need to prune.
</span></p><span data-dcnode-id="2471" instrument_node=""> </span><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Other than formative pruning for those Acers which go on to make large shrubs or trees, the Acers and Japanese Maples in particular are best left alone. The main exception to this non pruning is the removal of dead and dying branches which have succumbed to the cold in the previous winter.</span></p><span data-dcnode-id="2468" instrument_node="">
</span><div align="center" data-dcnode-id="2465"><a class="button button1" data-dcnode-id="2466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_acers_maples.htm"><span data-dcnode-id="2467" instrument_node="">How to Prune Acers - Japanese Maples</span></a></div><span data-dcnode-id="2464" instrument_node="">
</span></div><span data-dcnode-id="2462" instrument_node="">
</span></div><hr data-dcnode-id="2460"><div class="card" data-dcnode-id="2438"><div class="card-body" data-dcnode-id="2440"><span data-dcnode-id="2459" instrument_node="">
</span><div class="card-header" data-dcnode-id="2456"><h2 data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Pruning Amelanchier</span></h2></div><span data-dcnode-id="2455" instrument_node="">
</span><div data-dcnode-id="2451" style="float:right"><img alt="Amelanchiers" class="img-fluid" data-dcnode-id="2454" data-src="https://gardenseeker.co.uk/pruning/images/Amelanchier-laevis-211214.webp" height="184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Amelanchier-laevis-211214.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="274"><p align="center" data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">Amelanchiers</span></p></div><p class="card-text" data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">The Amelanchier group of shrubs or small trees do not require pruning normally - other than for shaping or controlling of size. Amelanchier normally grow into a regularly shaped upright but rounded shrub.
</span></p><span data-dcnode-id="2448" instrument_node=""> </span><p data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">They are deciduous shrubs with some of the finest of autumn foliage colours. Depending upon soil type, this can be bright crimson or dazzling mix of gold and orange.</span></p><span data-dcnode-id="2445" instrument_node="">
</span><div align="center" data-dcnode-id="2442"><a class="button button1" data-dcnode-id="2443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_amelanchier.html"><span data-dcnode-id="2444" instrument_node="">How to Prune Amelanchier</span></a></div><span data-dcnode-id="2441" instrument_node="">
</span></div><span data-dcnode-id="2439" instrument_node="">
</span></div><hr data-dcnode-id="2437"><div class="card" data-dcnode-id="2414"><span data-dcnode-id="2436" instrument_node="">
</span><div class="card-body" data-dcnode-id="2416"><span data-dcnode-id="2435" instrument_node="">
</span><div class="card-header" data-dcnode-id="2432"><h2 data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Pruning Apple Trees</span></h2></div><span data-dcnode-id="2431" instrument_node="">
</span><div data-dcnode-id="2427" style="float:right"><img alt="Pruning Apple Trees" class="img-fluid" data-dcnode-id="2430" data-src="https://gardenseeker.co.uk/pruning/images/iStock_000001223285XSmall.webp" height="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/iStock_000001223285XSmall.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="250"><p align="center" data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Pruning Apple Trees</span></p></div><p class="card-text" data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Regular pruning of apple trees is necessary to promote more fruit bearing growths, and therefore more fruit. There are 2 pruning seasons for apples, being summer and winter.
</span></p><span data-dcnode-id="2424" instrument_node=""> </span><p data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Summer and winter pruning of apple trees both have different results on the nature of the apple tree's future growth - especially in the first season after pruning.</span></p><span data-dcnode-id="2421" instrument_node="">
</span><div align="center" data-dcnode-id="2418"><a class="button button1" data-dcnode-id="2419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_apple_trees.htm"><span data-dcnode-id="2420" instrument_node="">How to Prune Apple Trees</span></a></div><span data-dcnode-id="2417" instrument_node="">
</span></div><span data-dcnode-id="2415" instrument_node="">
</span></div><hr data-dcnode-id="2413"><ul data-dcnode-id="2404"><li data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">Arbutus - The strawberry tree does not grow strawberries - just fruit that look like strawberries!</span></li><span data-dcnode-id="2410" instrument_node=""> </span><li data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">Aucuba - A misunderstood evergreen shrub that can actually look quite good - even spectacular - with the right pruning.</span></li><span data-dcnode-id="2407" instrument_node=""> </span><li data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node=""> Azalea Mollis types (deciduous) - simply dead head the faded flowers before they set seed. Otherwise see</span></li></ul><div class="card" data-dcnode-id="2381"><span data-dcnode-id="2403" instrument_node="">
</span><div class="card-body" data-dcnode-id="2383"><span data-dcnode-id="2402" instrument_node="">
</span><div class="card-header" data-dcnode-id="2399"><h2 data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Pruning Azaleas, Rhododendrons </span></h2></div><span data-dcnode-id="2398" instrument_node="">
</span><div data-dcnode-id="2394" style="float:right"><img alt="Pruning Azaleas" class="img-fluid" data-dcnode-id="2397" data-src="https://gardenseeker.co.uk/pruning/images/AzaleaPrune1IN.webp" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/AzaleaPrune1IN.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="250"><p align="center" data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">Pruning Azaleas</span></p></div><p class="card-text" data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Azalea and Rhododendron Pruning and for or all other evergreen shrubs that flower in late winter, spring, or early summer.
</span></p><span data-dcnode-id="2391" instrument_node=""> </span><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">The most basic form of pruning - often sufficient, is simply to dead-head the old flowers - before they are allowed to make seed - by cutting back to first set of buds. If any shoots spoil the overall shape of the shrub, they can be cut back to a suitable position. </span></p><span data-dcnode-id="2388" instrument_node="">
</span><div align="center" data-dcnode-id="2385"><a class="button button1" data-dcnode-id="2386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_azaleas_rhododendrons.htm"><span data-dcnode-id="2387" instrument_node="">How to Prune Azaleas, Rhododendrons</span></a></div><span data-dcnode-id="2384" instrument_node="">

</span><div class="card-header" data-dcnode-id="2367"><h2 data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">How - When - to Prune Bay Trees </span></h2></div><span data-dcnode-id="2366" instrument_node="">
</span><div data-dcnode-id="2362" style="float:right"><img alt="Prune Bay Trees" class="img-fluid" data-dcnode-id="2365" data-src="https://gardenseeker.co.uk/pruning/images/iStock_000001951456XSmall.webp" height="325" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/iStock_000001951456XSmall.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="249"><p align="center" data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Prune Bay Trees</span></p></div><p class="card-text" data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">Bay trees are grown in all manner of situations. As a large shrub - given enough room - they will not need basic pruning. As an ornamental - topiary - Bay Leaf Tree, they will need regular pruning to keep them in a tidy shape.</span></p><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Winter damage is often a problem of bay trees, with browning of much of the foliage - also wind scorch damage. Both problems can be addressed by pruning as required to remove the unsightly branches. they soon grow back.</span></p><span data-dcnode-id="2357" instrument_node="">
</span><div align="center" data-dcnode-id="2354"><a class="button button1" data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_bay_leaf_trees.htm"><span data-dcnode-id="2356" instrument_node="">View How - When - to Prune Bay Trees </span></a></div><span data-dcnode-id="2353" instrument_node="">
</span></div><span data-dcnode-id="2351" instrument_node="">
</span></div><hr data-dcnode-id="2349"><span data-dcnode-id="2348" instrument_node="">

</span><div class="card-body" data-dcnode-id="2324"><span data-dcnode-id="2346" instrument_node="">
</span><div class="card-header" data-dcnode-id="2343"><h2 data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Pruning Berberis Evergreen</span></h2></div><span data-dcnode-id="2342" instrument_node="">
</span><div data-dcnode-id="2338" style="float:left"><img alt="Berberis-thunbergii" class="img-fluid" data-dcnode-id="2341" data-src="https://gardenseeker.co.uk/images/Berberis-darwinii.webp" height="287" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Berberis-darwinii.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Berberis Darwin</span></p></div><p class="card-text" data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">(Evergreen types) Not too much pruning required, but if needs be do it this way.</span></p><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">The most basic form of pruning - often sufficient, is simply to dead-head the old flowers - before they are allowed to make seed - by cutting back to first set of buds. If any shoots spoil the overall shape of the shrub, they can be cut back to a suitable position.</span></p><p data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">Most Evergreen Flowering Shrubs can simply be dead-headed.</span></p><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node=""> The main exception to that statement, is where the evergreen flowering shrub is also being grown for its berries of fruits - ie Cotoneaster and Pyracantha. Deadheading or pruning these would inevitably mean a loss of fruiting trusses that come after the flowers.</span></p><span data-dcnode-id="2329" instrument_node="">
</span><div align="center" data-dcnode-id="2326"><a class="button button1" data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenseeker.co.uk/pruning/pruning_flowering_evergreen_shrubs.htm"><span data-dcnode-id="2328" instrument_node="">How to Prune Berberis Evergreen</span></a></div><span data-dcnode-id="2325" instrument_node="">
</span></div><span data-dcnode-id="2323" instrument_node="">
</span></div><hr data-dcnode-id="2321"><div class="card" data-dcnode-id="2299"><span data-dcnode-id="2320" instrument_node="">
</span><div class="card-body" data-dcnode-id="2301"><span data-dcnode-id="2319" instrument_node="">
</span><div class="card-header" data-dcnode-id="2316"><h2 data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Pruning Berberis - Deciduous Types</span></h2></div><span data-dcnode-id="2315" instrument_node="">
</span><div data-dcnode-id="2311" style="float:right"><img alt="Berberis-thunbergii" class="img-fluid" data-dcnode-id="2314" data-src="https://gardenseeker.co.uk/images/Berberis-thunbergii.webp" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Berberis-thunbergii.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Berberis Thunbergii</span></p></div><p class="card-text" data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Before you prune your Berberis, get a tough pair of gloves! The thorns are very invasive, and it is difficult to to prune this plant without suffering.</span></p><p data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Deciduous Berberis need pruning at different times to the evergreen varieties. We take you through the process of pruning at the right time, done in the right way.</span></p><span data-dcnode-id="2306" instrument_node="">
</span><div align="center" data-dcnode-id="2303"><a class="button button1" data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_berberis_deciduous.htm"><span data-dcnode-id="2305" instrument_node="">How to Prune Berberis - Deciduous Types</span></a></div><span data-dcnode-id="2302" instrument_node="">
</span></div><span data-dcnode-id="2300" instrument_node="">

</span><div class="card-header" data-dcnode-id="2293"><h2 data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">Pruning Buddleias - Butterfly Bushes </span></h2></div><span data-dcnode-id="2292" instrument_node="">
</span><div data-dcnode-id="2288" style="float:left"><img alt="Buddleia Highland Blue" class="img-fluid" data-dcnode-id="2291" data-src="https://gardenseeker.co.uk/pruning/images/Buddleia_Highland_Blue_.webp" height="185" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Buddleia_Highland_Blue_.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="250"><p align="center" data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">Buddleia Highland Blue</span></p></div><p class="card-text" data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Buddleia davidii are the popular garden Butterfly Bushes. They need to be pruned at the right time. We take you through the steps of pruning your Buddleia and explain why spring is the best time to prune.</span></p><p data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">This section is for the Buddleia davidii types only. The Buddleia davidii are the proper 'Butterfly Bushes' though the others also attract butterflies - and bees etc. See the link at the bottom of the page for for Buddleia alternifolia.</span></p><span data-dcnode-id="2283" instrument_node="">
</span><div align="center" data-dcnode-id="2280"><a class="button button1" data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_buddlega_buddleia.htm"><span data-dcnode-id="2282" instrument_node="">How to Prune Buddleias - Butterfly Bushes</span></a></div><span data-dcnode-id="2279" instrument_node="">
</span></div><span data-dcnode-id="2277" instrument_node="">
</span></div><hr data-dcnode-id="2275"><div class="card" data-dcnode-id="2249"><span data-dcnode-id="2274" instrument_node="">
</span><div class="card-body" data-dcnode-id="2251"><span data-dcnode-id="2273" instrument_node="">
</span><div class="card-header" data-dcnode-id="2270"><h2 data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Pruning Buddleia Alternifolia</span></h2></div><span data-dcnode-id="2269" instrument_node="">
</span><div data-dcnode-id="2265" style="float:left"><img alt="Buddleja-alternifolia" class="img-fluid" data-dcnode-id="2268" data-src="https://gardenseeker.co.uk/images/Buddleja-alternifolia.webp" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Buddleja-alternifolia.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Buddleia Alternifolia</span></p></div><p class="card-text" data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">Advice and information about how to prune Buddleia alternifolia - and how to grow it as a hedge</span></p><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Buddleia alternifolia is not one of the more common Buddleia davidii - The Butterfly Bushes. It has an arching weeping habit, and needs different pruning to the common types of butterfly bush.</span></p><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">It flowers on wood (growth) made the previous year so its pruning needs are different.</span></p><p data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">Because of its weeping habit, it will make a spectacular flowering tree or even large hedge.</span></p><span data-dcnode-id="2256" instrument_node="">
</span><div align="center" data-dcnode-id="2253"><a class="button button1" data-dcnode-id="2254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_buddleia_alternifolia.htm"><span data-dcnode-id="2255" instrument_node="">How to Prune Buddleia Alternifolia</span></a></div><span data-dcnode-id="2252" instrument_node="">
</span></div><span data-dcnode-id="2250" instrument_node="">
</span></div><hr data-dcnode-id="2248"><div class="card" data-dcnode-id="2224"><span data-dcnode-id="2247" instrument_node="">
</span><div class="card-body" data-dcnode-id="2226"><span data-dcnode-id="2246" instrument_node="">
</span><div class="card-header" data-dcnode-id="2243"><h2 data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Pruning Buddleja Globosa</span></h2></div><span data-dcnode-id="2242" instrument_node="">
</span><div data-dcnode-id="2238" style="float:right"><img alt="Buddleja Globosa" class="img-fluid" data-dcnode-id="2241" data-src="https://gardenseeker.co.uk/pruning/images/Buddleja_globosa%20.webp" height="286" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Buddleja_globosa%2520.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="231"><p align="center" data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">Buddleja Globosa</span></p></div><p class="card-text" data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">Buddleja or Buddleia globosa is unlike its 'butterfly bush' cousins, in that it does not need to be hard pruned every spring.
</span></p><p data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">
It rarely need pruning - other than to constrain its size or to rectify a bit of damage.</span></p><p data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Leave the pruning too late and you will not get flowers the following year. If it is grown as a screening shrub - and it is superb for this - then this particular Buddleia will not normally need pruning.</span></p><span data-dcnode-id="2231" instrument_node="">
</span><div align="center" data-dcnode-id="2228"><a class="button button1" data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_buddleja_globosa_buddleia.htm"><span data-dcnode-id="2230" instrument_node="">How to Prune Buddleja Globosa</span></a></div><span data-dcnode-id="2227" instrument_node="">
</span></div><span data-dcnode-id="2225" instrument_node="">
</span></div><hr data-dcnode-id="2223"><div class="card" data-dcnode-id="2197"><span data-dcnode-id="2222" instrument_node="">
</span><div class="card-body" data-dcnode-id="2199"><span data-dcnode-id="2221" instrument_node="">
</span><div class="card-header" data-dcnode-id="2218"><h2 data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Pruning Brachyglottis (Senecio)</span></h2></div><span data-dcnode-id="2217" instrument_node="">
</span><div data-dcnode-id="2213" style="float:left"><img alt="Brachyglottis-Senecio" class="img-fluid" data-dcnode-id="2216" data-src="https://gardenseeker.co.uk/images/Brachyglottis-Senecio.webp" height="196" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Brachyglottis-Senecio.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Brachyglottis Senecio</span></p></div><p class="card-text" data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Normal Pruning - The most basic form of pruning - often sufficient, is simply to dead-head the old flowers - before they are allowed to make seed - by cutting back to first set of buds. If any shoots spoil the overall shape of the shrub, they can be cut back to a suitable position. </span></p><p data-dcnode-id="2209"><span data-dcnode-id="2210" instrument_node="">Hard Pruning - Hard pruning in Spring for Shrubs that flower late mid-late summer on current season's growth</span></p><span data-dcnode-id="2208" instrument_node="">
</span><div align="center" data-dcnode-id="2205"><a class="button button1" data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_azaleas_rhododendrons.htm"><span data-dcnode-id="2207" instrument_node="">How to Prune Brachyglottis (Senecio) - Normal Pruning</span></a></div><hr data-dcnode-id="2204"><div align="center" data-dcnode-id="2201"><a class="button button1" data-dcnode-id="2202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hard.htm"><span data-dcnode-id="2203" instrument_node="">How to Prune Brachyglottis (Senecio) - Hard Pruning</span></a></div><span data-dcnode-id="2200" instrument_node="">
</span></div><span data-dcnode-id="2198" instrument_node="">
</span></div><hr data-dcnode-id="2196"><div class="card" data-dcnode-id="2172"><span data-dcnode-id="2195" instrument_node="">
</span><div class="card-body" data-dcnode-id="2174"><span data-dcnode-id="2194" instrument_node="">
</span><div class="card-header" data-dcnode-id="2191"><h2 data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Pruning The Bride - Exochorda x Macrantha</span></h2></div><span data-dcnode-id="2190" instrument_node="">
</span><div data-dcnode-id="2186" style="float:left"><img alt="The Bride - Exochorda x Macrantha" class="img-fluid" data-dcnode-id="2189" data-src="https://gardenseeker.co.uk/pruning/images/Exochorda_the_bride_A.webp" height="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Exochorda_the_bride_A.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="350"><p align="center" data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">Exochorda x Macrantha</span></p></div><p class="card-text" data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">The pure white flowers of this shrub give rise to the name - The Bride - or the Pearl Bush. (The opening flower buds resemble groups of pearls.</span></p><p data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Exochorda x macrantha The Bride, is an early summer flowering shrub that needs pruning at the correct time. How and when to prune it is detailed below.</span></p><p data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Take note of our information and advice on how to prune the Exochorda and avoid the disappointment sometimes experienced with this plant.</span></p><span data-dcnode-id="2179" instrument_node="">
</span><div align="center" data-dcnode-id="2176"><a class="button button1" data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_exochorda.htm"><span data-dcnode-id="2178" instrument_node="">View The Bride</span></a></div><span data-dcnode-id="2175" instrument_node="">

</span><hr data-dcnode-id="2165"><h2 data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">C</span></h2><div class="card" data-dcnode-id="2141"><span data-dcnode-id="2162" instrument_node="">
</span><div class="card-body" data-dcnode-id="2143"><span data-dcnode-id="2161" instrument_node="">
</span><div class="card-header" data-dcnode-id="2158"><h2 data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Pruning Callicarpa - as per Buddleias </span></h2></div><span data-dcnode-id="2157" instrument_node="">
</span><div data-dcnode-id="2153" style="float:left"><img alt="callicarpa" class="img-fluid" data-dcnode-id="2156" data-src="https://gardenseeker.co.uk/images/callicarpa.webp" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/callicarpa.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Callicarpa</span></p></div><p class="card-text" data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Buddleia are the popular garden Butterfly Bushes. They need to be pruned at the right time. We take you through the steps of pruning your Buddleia and explain why spring is the best time to prune.</span></p><p data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">This section is for the Buddleia types only. The Buddleia are the proper 'Butterfly Bushes' though the others also attract butterflies - and bees etc. .</span></p><span data-dcnode-id="2148" instrument_node="">
</span><div align="center" data-dcnode-id="2145"><a class="button button1" data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_buddlega_buddleia.htm"><span data-dcnode-id="2147" instrument_node="">How to Prune Callicarpa - as per Buddleias</span></a></div><span data-dcnode-id="2144" instrument_node="">
</span></div><span data-dcnode-id="2142" instrument_node="">
</span></div><hr data-dcnode-id="2140"><div class="card" data-dcnode-id="2118"><span data-dcnode-id="2139" instrument_node="">
</span><div class="card-body" data-dcnode-id="2120"><span data-dcnode-id="2138" instrument_node="">
</span><div class="card-header" data-dcnode-id="2135"><h2 data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Pruning Camellia Shrubs </span></h2></div><span data-dcnode-id="2134" instrument_node="">
</span><div data-dcnode-id="2130" style="float:right"><img alt="Camellia" class="img-fluid" data-dcnode-id="2133" data-src="https://gardenseeker.co.uk/pruning/images/Camellia_flower_buds.webp" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Camellia_flower_buds.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="350"><p align="center" data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Camellia</span></p></div><p class="card-text" data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Camellias are one of the few winter flowering shrubs that will respond to pruning if necessary. It is important to realise that the flower buds for the Camellia are formed in early summer, ready to flower in late autumn or winter a few  months hence. Any pruning carried out should be done right after flowering, in order to allow the shrub enough time to produce new shoots and flower buds.</span></p><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Late pruning will inevitably result in a winter season with few or even no flowers. Late pruning of Camellias and other winter flowering shubs is one of the main causes poor or no flowers.</span></p><span data-dcnode-id="2125" instrument_node="">
</span><div align="center" data-dcnode-id="2122"><a class="button button1" data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_camellias.html"><span data-dcnode-id="2124" instrument_node="">How to Prune Camellia Shrubs </span></a></div><span data-dcnode-id="2121" instrument_node="">
</span></div><span data-dcnode-id="2119" instrument_node="">
</span></div><hr data-dcnode-id="2117"><span data-dcnode-id="2116" instrument_node="">
</span><div class="card" data-dcnode-id="2094"><span data-dcnode-id="2115" instrument_node="">
</span><div class="card-body" data-dcnode-id="2096"><span data-dcnode-id="2114" instrument_node="">
</span><div class="card-header" data-dcnode-id="2111"><h2 data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Pruning Caryopteris</span></h2></div><span data-dcnode-id="2110" instrument_node="">
</span><div data-dcnode-id="2106" style="float:left"><img alt="Pruning Caryopteris" class="img-fluid" data-dcnode-id="2109" data-src="https://gardenseeker.co.uk/pruning/images/Caryopteris_cland_Kew_Blue.webp" height="197" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Caryopteris_cland_Kew_Blue.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="290"><p align="center" data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Pruning Caryopteris</span></p></div><p class="card-text" data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">There are several varieties of Caryopteris with the Caryopteris x clandonensis cultivars being the main group.</span></p><p data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">All have grey-green aromatic foliage with the exception of the golden leaved and variegated forms. However they are grown in the main for their varied blue flowers which start to appear late summer and normally carry on right through to mid-winter. The blue flowers contrast well with other autumnal shades in the late garden.</span></p><span data-dcnode-id="2101" instrument_node="">
</span><div align="center" data-dcnode-id="2098"><a class="button button1" data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_caryopteris.html"><span data-dcnode-id="2100" instrument_node="">How to Prune Caryopteris</span></a></div><span data-dcnode-id="2097" instrument_node="">
</span></div><span data-dcnode-id="2095" instrument_node="">
</span></div><hr data-dcnode-id="2093"><div class="card" data-dcnode-id="2069"><span data-dcnode-id="2092" instrument_node="">
</span><div class="card-body" data-dcnode-id="2071"><span data-dcnode-id="2091" instrument_node="">
</span><div class="card-header" data-dcnode-id="2088"><h2 data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Pruning Catalpa Bignonioides Aurea</span></h2></div><span data-dcnode-id="2087" instrument_node="">
</span><div data-dcnode-id="2083" style="float:right"><img alt="Geraniums-Haleakala" class="img-fluid" data-dcnode-id="2086" data-src="https://gardenseeker.co.uk/images/Catalpa-Bignonioides-Aurea.webp" height="183" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Catalpa-Bignonioides-Aurea.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="275"><p align="center" data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Geraniums Haleakala</span></p></div><p class="card-text" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Hard pruning in Spring for stem and foliage effect.</span></p><p data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Eucalyptus gunni, Catalpa Aurea, Cotinus, Dogwoods, Sambucus, Robinia frisia,  etc.</span></p><p data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">To rejuvenate old shrubs or bring back into line shrubs such as Brachyglottis and Hypericum. Most shrubs can be given a new lease of life by cutting back hard. However, realise that the shrub will not stay small simply because you have given it a short back and sides. It will spring back into growth with a new enthusiasm.</span></p><span data-dcnode-id="2076" instrument_node="">
</span><div align="center" data-dcnode-id="2073"><a class="button button1" data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hard.htm"><span data-dcnode-id="2075" instrument_node="">View Catalpa bignonioides Aurea</span></a></div><span data-dcnode-id="2072" instrument_node="">
</span></div><span data-dcnode-id="2070" instrument_node="">
</span></div><hr data-dcnode-id="2068"><div class="card" data-dcnode-id="2046"><span data-dcnode-id="2067" instrument_node="">
</span><div class="card-body" data-dcnode-id="2048"><span data-dcnode-id="2066" instrument_node="">
</span><div class="card-header" data-dcnode-id="2063"><h2 data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Pruning Ceanothus (deciduous types)</span></h2></div><span data-dcnode-id="2062" instrument_node="">
</span><div data-dcnode-id="2058" style="float:left"><img alt="Ceanothus Papillosus" class="img-fluid" data-dcnode-id="2061" data-src="https://gardenseeker.co.uk/images/Ceanothus-papillosus.webp" height="268" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Ceanothus-papillosus.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Ceanothus Papillosus</span></p></div><p class="card-text" data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">Pruning Ceanothus (deciduous types) is the same instructions as Pruning Buddleias -  Butterfly Bushes.</span></p><p data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">This group of shrubs flower on new growth made in the current year, so it is to your advantage to prune the shrub well to produce many flowering shoots. These shoots that emerge as a result of properly pruning the Buddleja will have an upright, then arching habit of growth - totally unlike the 'wild' Buddleias that are seen on vacant building site - or growing out of walls!</span></p><span data-dcnode-id="2053" instrument_node="">
</span><div align="center" data-dcnode-id="2050"><a class="button button1" data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_buddlega_buddleia.htm"><span data-dcnode-id="2052" instrument_node="">How to Prune Ceanothus (deciduous types)</span></a></div><span data-dcnode-id="2049" instrument_node="">
</span></div><span data-dcnode-id="2047" instrument_node="">
</span></div><hr data-dcnode-id="2045"><div class="card" data-dcnode-id="2023"><span data-dcnode-id="2044" instrument_node="">
</span><div class="card-body" data-dcnode-id="2025"><span data-dcnode-id="2043" instrument_node="">
</span><div class="card-header" data-dcnode-id="2040"><h2 data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Pruning Ceanothus (evergreen types)</span></h2></div><span data-dcnode-id="2039" instrument_node="">
</span><div data-dcnode-id="2035" style="float:left"><img alt="Ceanothus Americanus" class="img-fluid" data-dcnode-id="2038" data-src="https://gardenseeker.co.uk/images/Ceanothus-Americanus.webp" height="261" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Ceanothus-Americanus.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Ceanothus Americanus</span></p></div><p class="card-text" data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Pruning Ceanothus (evergreen types) is the same instructions as Pruning Azaleas, Rhododendrons .</span></p><p data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">The most basic form of pruning - often sufficient, is simply to dead-head the old flowers - before they are allowed to make seed - by cutting back to first set of buds. If any shoots spoil the overall shape of the shrub, they can be cut back to a suitable position. </span></p><span data-dcnode-id="2030" instrument_node="">
</span><div align="center" data-dcnode-id="2027"><a class="button button1" data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_azaleas_rhododendrons.htm"><span data-dcnode-id="2029" instrument_node="">How to Prune Ceanothus (evergreen types)</span></a></div><span data-dcnode-id="2026" instrument_node="">
</span></div><span data-dcnode-id="2024" instrument_node="">
</span></div><hr data-dcnode-id="2022"><ul data-dcnode-id="2013"><li data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Ceratostigma</span></li><span data-dcnode-id="2019" instrument_node=""> </span><li data-dcnode-id="2017"><span data-dcnode-id="2018" instrument_node="">Chaenomeles</span></li><span data-dcnode-id="2016" instrument_node=""> </span><li data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node=""> Cistus</span></li></ul><div class="card" data-dcnode-id="1991"><span data-dcnode-id="2012" instrument_node="">

</span><div class="card-header" data-dcnode-id="2008"><h2 data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Pruning Choisya</span></h2></div><span data-dcnode-id="2007" instrument_node="">
</span><div data-dcnode-id="2003" style="float:right"><img alt="Choisya Ternata Mexican" class="img-fluid" data-dcnode-id="2006" data-src="https://gardenseeker.co.uk/images/Choisya-ternata-Mexican.webp" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Choisya-ternata-Mexican.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Choisya Ternata Mexican</span></p></div><p class="card-text" data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Pruning Choisya is the same instructions as Pruning Azaleas and Rhododendrons. </span></p><p data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">The most basic form of pruning - often sufficient, is simply to dead-head the old flowers - before they are allowed to make seed - by cutting back to first set of buds. If any shoots spoil the overall shape of the shrub, they can be cut back to a suitable position. </span></p><span data-dcnode-id="1998" instrument_node="">
</span><div align="center" data-dcnode-id="1995"><a class="button button1" data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_azaleas_rhododendrons.htm"><span data-dcnode-id="1997" instrument_node="">How to Prune Choisya</span></a></div><span data-dcnode-id="1994" instrument_node="">

</span><div class="card-header" data-dcnode-id="1985"><h2 data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Pruning Clematis</span></h2></div><span data-dcnode-id="1984" instrument_node="">
</span><div data-dcnode-id="1980" style="float:left"><img alt="Clematis Alpina" class="img-fluid" data-dcnode-id="1983" data-src="https://gardenseeker.co.uk/pruning/images/DSC_6419.webp" height="231" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/DSC_6419.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="287"><p align="center" data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Clematis Alpina</span></p></div><p class="card-text" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Clematis are normally grouped into three distinct sections for pruning, each group has its own pruning method. If your varienty is not listed within the groups, you can know which group they belong to by the time of the year they flower. If you are going to prune clematis, then it needs to be carried out correctly.</span></p><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">However, as with many other shrubs, many clematis do not 'have' to be pruned. But in normal garden conditions, pruning of Clematis is a 'must'.</span></p><span data-dcnode-id="1975" instrument_node="">
</span><div align="center" data-dcnode-id="1972"><a class="button button1" data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_clematis.htm"><span data-dcnode-id="1974" instrument_node="">How to Prune Clematis</span></a></div><span data-dcnode-id="1971" instrument_node="">
</span></div><span data-dcnode-id="1969" instrument_node="">
</span></div><hr data-dcnode-id="1967"><div class="card" data-dcnode-id="1941"><span data-dcnode-id="1966" instrument_node="">
</span><div class="card-body" data-dcnode-id="1943"><span data-dcnode-id="1965" instrument_node="">
</span><div class="card-header" data-dcnode-id="1962"><h2 data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Pruning Cornus (alba, stolonifera and sanguinea types)</span></h2></div><span data-dcnode-id="1961" instrument_node="">
</span><div data-dcnode-id="1957" style="float:left"><img alt="Cornus Midwinter Fire" class="img-fluid" data-dcnode-id="1960" data-src="https://gardenseeker.co.uk/pruning/images/Cornus_sang_Midwinter_Fire1.webp" height="238" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Cornus_sang_Midwinter_Fire1.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="163"><p align="center" data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Cornus Midwinter Fire</span></p></div><p class="card-text" data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Many Cornus - Dogwoods - are grown for their colourful stems throughout the winter months. For this to be successful, it needs a particular kind of pruning - easy!</span></p><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">We take you through the pruning exercise and tell you when and how to prune your Dogwoods.
</span></p><p data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">
You need to prune at the right time, which is late Winter or early Spring.
</span></p><p data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">
We are NOT talking about the flowering Dogwoods - Cornus - which are NOT grown for their stem colour.</span></p><span data-dcnode-id="1948" instrument_node="">
</span><div align="center" data-dcnode-id="1945"><a class="button button1" data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_cornus_dogwoods.htm"><span data-dcnode-id="1947" instrument_node="">How to Prune Cornus - Dogwoods</span></a></div><span data-dcnode-id="1944" instrument_node="">
</span></div><span data-dcnode-id="1942" instrument_node="">
</span></div><hr data-dcnode-id="1940"><div class="card" data-dcnode-id="1918"><span data-dcnode-id="1939" instrument_node="">
</span><div class="card-body" data-dcnode-id="1920"><span data-dcnode-id="1938" instrument_node="">
</span><div class="card-header" data-dcnode-id="1935"><h2 data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Pruning Cotinus Royal Purple</span></h2></div><span data-dcnode-id="1934" instrument_node="">
</span><div data-dcnode-id="1930" style="float:right"><img alt="Cotinus-coggygria-Royal-Purple" class="img-fluid" data-dcnode-id="1933" data-src="https://gardenseeker.co.uk/images/Cotinus-coggygria-Royal-Purple.webp" height="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Cotinus-coggygria-Royal-Purple.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Cotinus Coggygria Royal Purple</span></p></div><p class="card-text" data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Cotinus Royal Purple is the same instructions as Hard Pruning</span></p><p data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">To rejuvenate old shrubs or bring back into line shrubs such as Brachyglottis and Hypericum. Most shrubs can be given a new lease of life by cutting back hard. However, realise that the shrub will not stay small simply because you have given it a short back and sides. It will spring back into growth with a new enthusiasm.</span></p><span data-dcnode-id="1925" instrument_node="">
</span><div align="center" data-dcnode-id="1922"><a class="button button1" data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hard.htm"><span data-dcnode-id="1924" instrument_node="">How to Prune Cotinus Royal Purple</span></a></div><span data-dcnode-id="1921" instrument_node="">
</span></div><span data-dcnode-id="1919" instrument_node="">
</span></div><hr data-dcnode-id="1917"><div class="card" data-dcnode-id="1895"><span data-dcnode-id="1916" instrument_node="">
</span><div class="card-body" data-dcnode-id="1897"><span data-dcnode-id="1915" instrument_node="">
</span><div class="card-header" data-dcnode-id="1912"><h2 data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Pruning Cytisus scoparius (Broom)</span></h2></div><span data-dcnode-id="1911" instrument_node="">
</span><div data-dcnode-id="1907" style="float:left"><img alt="Pruning Kerria Cytisus" class="img-fluid" data-dcnode-id="1910" data-src="https://gardenseeker.co.uk/pruning/images/PruningKerria1IN.webp" height="226" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/PruningKerria1IN.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="272"><p align="center" data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Pruning Kerria Cytisus</span></p></div><p class="card-text" data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">It is important to prune Kerrias just after flowering in late Spring. The flowered shoots are simply cut back, allowing the new growth to ripen for next year's flower crop. It must be done right after flowering - certainly by mid-June for best effect.</span></p><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Kerria japonica Flore plene, and Pleniflora, together with the variegated  kerria Picta pr Variegatum are deciduous shrubs that flower early in the year on growth made in the previous year. </span></p><span data-dcnode-id="1902" instrument_node="">
</span><div align="center" data-dcnode-id="1899"><a class="button button1" data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_kerria_cytisus.htm"><span data-dcnode-id="1901" instrument_node="">How to Prune Cytisus scoparius (Broom)</span></a></div><span data-dcnode-id="1898" instrument_node="">
</span></div><span data-dcnode-id="1896" instrument_node="">
</span></div><hr data-dcnode-id="1894"><span data-dcnode-id="1893" instrument_node="">
</span><span data-dcnode-id="1891" instrument_node="">
