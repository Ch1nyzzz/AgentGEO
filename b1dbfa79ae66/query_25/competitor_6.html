</span><div class="card-header" data-dcnode-id="1079"><h2 data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Pruning Lilac Trees</span></h2></div><span data-dcnode-id="1078" instrument_node="">
</span><div data-dcnode-id="1074" style="float:left"><img alt="Lilac Trees" class="img-fluid" data-dcnode-id="1077" data-src="https://gardenseeker.co.uk/pruning/images/PruneLilac2GoodIN.webp" height="292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/PruneLilac2GoodIN.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="219"><p align="center" data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Lilac Trees</span></p></div><p class="card-text" data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Lilacs do not require too much Pruning - Here's how.</span></p><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">

All that is normally required of a Syringa (Lilac), is the removal of faded flower. No more - unless you want to re-shape the bush. In the latter case, do it as you wish, right after flowering.</span></p><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">You may miss out on some flower the following year.

It is important to take off the old flower growth before it starts to set seed. This will then allow new shoots to form, which will be the flowering growths for the next year. The sooner you 'de-head' - the faded flowers, the better the following year's flowers will be.</span></p><span data-dcnode-id="1067" instrument_node="">
</span><div align="center" data-dcnode-id="1064"><a class="button button1" data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_lilac-syringa.html"><span data-dcnode-id="1066" instrument_node="">How to Prune Lilac Trees</span></a></div><span data-dcnode-id="1063" instrument_node="">
</span></div><span data-dcnode-id="1061" instrument_node="">
</span></div><hr data-dcnode-id="1059"><div class="card" data-dcnode-id="1037"><span data-dcnode-id="1058" instrument_node="">
</span><div class="card-body" data-dcnode-id="1039"><span data-dcnode-id="1057" instrument_node="">
</span><div class="card-header" data-dcnode-id="1054"><h2 data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Pruning Honeysuckle - Lonicera</span></h2></div><span data-dcnode-id="1053" instrument_node="">
</span><div data-dcnode-id="1049" style="float:right"><img alt="Lonicera periclymenum Serotina" class="img-fluid" data-dcnode-id="1052" data-src="https://gardenseeker.co.uk/pruning/images/Lonicera-periclymenum-Serotina-310172.webp" height="277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Lonicera-periclymenum-Serotina-310172.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="313"><p align="center" data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Lonicera Periclymenum Serotina</span></p></div><p class="card-text" data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Honeysuckle Pruning. If honeysuckles are pruned wrongly, then it could mean the loss of flowers for the following - or present - year. Pruning of honeysuckles is relatively easy, though can be a bit messy if pruning a neglected climber  that has wrapped itself around an old trellis or frame for the last ten years!</span></p><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Most will know Lonicera as climbing shrubs - better known as Honeysuckle. However, there are also a group of Loniceras - or Honeysuckles that are actually grown as shrubs.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><div align="center" data-dcnode-id="1041"><a class="button button1" data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_honeysuckle-lonicera.htm"><span data-dcnode-id="1043" instrument_node="">How to Prune Honeysuckle - Lonicera</span></a></div><span data-dcnode-id="1040" instrument_node="">
</span></div><span data-dcnode-id="1038" instrument_node="">
</span></div><h2 data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">M</span></h2><section class="" data-dcnode-id="1011" data-spy="Magnolias" data-target="Magnolias" id="Magnolias"><div class="card" data-dcnode-id="1012"><span data-dcnode-id="1034" instrument_node="">
</span><div class="card-body" data-dcnode-id="1014"><span data-dcnode-id="1033" instrument_node="">
</span><div class="card-header" data-dcnode-id="1030"><h2 data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Pruning Magnolias</span></h2></div><span data-dcnode-id="1029" instrument_node="">
</span><div data-dcnode-id="1025" style="float:right"><img alt="Magnolia Heaven Scent" class="img-fluid" data-dcnode-id="1028" data-src="https://gardenseeker.co.uk/pruning/images/magn211256.webp" height="202" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/magn211256.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="250"><p align="center" data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Magnolia Heaven Scent</span></p></div><p class="card-text" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Most Magnolia varieties grow to a regular shape with an open centre. They rarely need to be pruned for ‘shade’ purposes. If planted in the right place, then Magnolias rarely if ever need any pruning.</span></p><span data-dcnode-id="1022" instrument_node=""> </span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Understanding the growth habit of your proposed Magnolia, will ensure that you plant it in a sittuation where it does not need any pruning whatever, and will reward you with years of blooms – almost regardless of the weather. Almost – for Magnolias sometimes fall foul of late or hard frosts.  Such damage can rob you of flowers for a whole year, and no pruning of any kind will help – other than to remove unsightly the dead blooms!</span></p><span data-dcnode-id="1019" instrument_node="">
</span><div align="center" data-dcnode-id="1016"><a class="button button1" data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_magnolias.html"><span data-dcnode-id="1018" instrument_node="">How to Prune Magnolias</span></a></div><span data-dcnode-id="1015" instrument_node="">
</span></div><span data-dcnode-id="1013" instrument_node="">
</span></div></section><hr data-dcnode-id="1010"><section class="" data-dcnode-id="986" data-spy="Mahonia" data-target="Mahonia" id="Mahonia"><div class="card" data-dcnode-id="987"><span data-dcnode-id="1009" instrument_node="">
</span><div class="card-body" data-dcnode-id="989"><span data-dcnode-id="1008" instrument_node="">
</span><div class="card-header" data-dcnode-id="1005"><h2 data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Pruning Mahonia Shrubs</span></h2></div><span data-dcnode-id="1004" instrument_node="">
</span><div data-dcnode-id="1000" style="float:right"><img alt="Mahonia aquifolium Apollo" class="img-fluid" data-dcnode-id="1003" data-src="https://gardenseeker.co.uk/images/mahonia-aquifolium-apollo-1.webp" height="232" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/mahonia-aquifolium-apollo-1.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="350"><p align="center" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Mahonia aquifolium Apollo</span></p></div><p class="card-text" data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">In keeping with the general ease of maintaining and growing good Mahonia shrubs, the pruning aspect is well laid back and not always necessary. That’s in ideal circumstances of course and experience has taught me that ‘ideal situations’ do not always exist in gardening.
</span></p><span data-dcnode-id="997" instrument_node=""> </span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">There are basically two different classes of Mahonias. The Mahonia aquifolium types are the lower growing spring flowering evergreens that find their way into public planting schemes because of their ultra hardy nature.</span></p><span data-dcnode-id="994" instrument_node="">
</span><div align="center" data-dcnode-id="991"><a class="button button1" data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-mahonia.html"><span data-dcnode-id="993" instrument_node="">How to Prune Mahonia Shrubs</span></a></div><span data-dcnode-id="990" instrument_node="">
</span></div><span data-dcnode-id="988" instrument_node="">
</span></div></section><hr data-dcnode-id="985"><section class="" data-dcnode-id="961" data-spy="Japanese Maples" data-target="Japanese Maples" id="Japanese Maples"><div class="card" data-dcnode-id="962"><span data-dcnode-id="984" instrument_node="">
</span><div class="card-body" data-dcnode-id="964"><span data-dcnode-id="983" instrument_node="">
</span><div class="card-header" data-dcnode-id="980"><h2 data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Pruning Acers - Japanese Maples</span></h2></div><span data-dcnode-id="979" instrument_node="">
</span><div data-dcnode-id="975" style="float:right"><img alt="Japanese Maples" class="img-fluid" data-dcnode-id="978" data-src="https://gardenseeker.co.uk/pruning/images/Japanese%20Maple%20-%20acer%20-%20310080.webp" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Japanese%2520Maple%2520-%2520acer%2520-%2520310080.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="250"><p align="center" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Japanese Maples</span></p></div><p class="card-text" data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">In an ideal world, there would be no need to prune your Acer. Generally speaking they are fine without being subject to the secateurs.  But as with many shrubs that do not actually need pruning, we sometimes have a need to prune.
</span></p><span data-dcnode-id="972" instrument_node=""> </span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Other than formative pruning for those Acers which go on to make large shrubs or trees, the Acers and Japanese Maples in particular are best left alone. The main exception to this non pruning is the removal of dead and dying branches which have succumbed to the cold in the previous winter.</span></p><span data-dcnode-id="969" instrument_node="">
</span><div align="center" data-dcnode-id="966"><a class="button button1" data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_acers_maples.htm"><span data-dcnode-id="968" instrument_node="">How to Prune Acers - Japanese Maples</span></a></div><span data-dcnode-id="965" instrument_node="">
</span></div><span data-dcnode-id="963" instrument_node="">
</span></div></section><hr data-dcnode-id="960"><section class="" data-dcnode-id="937" data-spy="Mock Orange" data-target="Mock Orange" id="Mock Orange"><div class="card" data-dcnode-id="938"><div class="card-body" data-dcnode-id="940"><span data-dcnode-id="959" instrument_node="">
</span><div class="card-header" data-dcnode-id="956"><h2 data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Pruning Mock Orange - Philadelphus</span></h2></div><span data-dcnode-id="955" instrument_node="">
</span><div data-dcnode-id="951" style="float:right"><img alt="Philadelphus Belle Etoile" class="img-fluid" data-dcnode-id="954" data-src="https://gardenseeker.co.uk/pruning/images/Philadelphus-Belle-Etoile_7246.webp" height="192" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Philadelphus-Belle-Etoile_7246.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="226"><p align="center" data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Philadelphus Belle Etoile</span></p></div><p class="card-text" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">The Mock Orange - Philadelphus varieties - are well known for their heady scent - especially on an early summer morning or evening! Correct pruning is essential for this group of early summer flowering shrubs.
</span></p><span data-dcnode-id="948" instrument_node=""> </span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Prune too early and you will lose the flower buds for the current year. Prune too late and the shrub will not have enough time in the growing season to provide flowering stems for the following year. Don't panic - we are here with information and advice upon when and how to prune your Philadelphus.</span></p><span data-dcnode-id="945" instrument_node="">
</span><div align="center" data-dcnode-id="942"><a class="button button1" data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_philadelphus.htm"><span data-dcnode-id="944" instrument_node="">How to Prune Mock Orange - Philadelphus</span></a></div><span data-dcnode-id="941" instrument_node="">
</span></div><span data-dcnode-id="939" instrument_node="">
</span></div></section><hr data-dcnode-id="936"><span data-dcnode-id="935" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="fluid" data-ad-layout-key="-gu-19-1v-by+x2" data-ad-slot="3855732809" data-dcnode-id="934" style="display:block"></ins><span data-dcnode-id="933" instrument_node="">
</span><hr data-dcnode-id="930"><h2 data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">N</span></h2><ul data-dcnode-id="925"><li data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Nandina</span></li></ul><hr data-dcnode-id="924"><span data-dcnode-id="923" instrument_node="">

</span><hr data-dcnode-id="918"><h2 data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">O</span></h2><ul data-dcnode-id="913"><li data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Olearia (Will shoot out from old wood, so can be cut back severely)</span></li></ul><section class="" data-dcnode-id="889" data-spy="Osmanthus" data-target="Osmanthus" id="Osmanthus"><div class="card" data-dcnode-id="890"><span data-dcnode-id="912" instrument_node="">
</span><div class="card-body" data-dcnode-id="892"><span data-dcnode-id="911" instrument_node="">
</span><div class="card-header" data-dcnode-id="908"><h2 data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Pruning Osmanthus</span></h2></div><span data-dcnode-id="907" instrument_node="">
</span><div data-dcnode-id="903" style="float:right"><img alt="Osmanthus Fragrans" class="img-fluid" data-dcnode-id="906" data-src="https://gardenseeker.co.uk/images/Osmanthus-fragrans.webp" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Osmanthus-fragrans.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Osmanthus Fragrans</span></p></div><p class="card-text" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Pruning Osmanthus is the same instructions as Azalea and Rhododendron Pruning and for or all other evergreen shrubs that flower in late winter, spring, or early summer.
</span></p><span data-dcnode-id="900" instrument_node=""> </span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">The most basic form of pruning - often sufficient, is simply to dead-head the old flowers - before they are allowed to make seed - by cutting back to first set of buds. If any shoots spoil the overall shape of the shrub, they can be cut back to a suitable position.</span></p><span data-dcnode-id="897" instrument_node="">
</span><div align="center" data-dcnode-id="894"><a class="button button1" data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_azaleas_rhododendrons.htm"><span data-dcnode-id="896" instrument_node="">How to Prune Osmanthus</span></a></div><span data-dcnode-id="893" instrument_node="">
</span></div><span data-dcnode-id="891" instrument_node="">
</span></div></section><hr data-dcnode-id="888"><span data-dcnode-id="887" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="fluid" data-ad-layout-key="-gu-19-1v-by+x2" data-ad-slot="3855732809" data-dcnode-id="886" style="display:block"></ins><span data-dcnode-id="885" instrument_node="">
</span><hr data-dcnode-id="882"><h2 data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">P</span></h2><ul data-dcnode-id="869"><li data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Pachysandra - as and when required for shape and spread</span></li><span data-dcnode-id="877" instrument_node=""> </span><li data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Paeonia</span></li><span data-dcnode-id="874" instrument_node=""> </span><li data-dcnode-id="872"><span data-dcnode-id="873" instrument_node=""> Pear Trees</span></li><li data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Pernettya - No pruning required. Cut back if necessary in April</span></li></ul><section class="" data-dcnode-id="845" data-spy="Perovskia" data-target="Perovskia" id="Perovskia"><div class="card" data-dcnode-id="846"><span data-dcnode-id="868" instrument_node="">

</span><div class="card-header" data-dcnode-id="864"><h2 data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Pruning Perovskia </span></h2></div><span data-dcnode-id="863" instrument_node="">
</span><div data-dcnode-id="859" style="float:right"><img alt="Perovskia atriplicifolia Little Spire" class="img-fluid" data-dcnode-id="862" data-src="https://gardenseeker.co.uk/images/Perovskia-atriplicifolia-Little-Spire.webp" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Perovskia-atriplicifolia-Little-Spire.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Perovskia atriplicifolia Little Spire</span></p></div><p class="card-text" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Pruning Osmanthus is the same instructions as Pruning Buddleias.
</span></p><span data-dcnode-id="856" instrument_node=""> </span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">This group of shrubs flower on new growth made in the current year, so it is to your advantage to prune the shrub well to produce many flowering shoots. These shoots that emerge as a result of properly pruning the Buddleja will have an upright, then arching habit of growth - totally unlike the 'wild' Buddleias that are seen on vacant building site - or growing out of walls!</span></p><span data-dcnode-id="853" instrument_node="">
</span><div align="center" data-dcnode-id="850"><a class="button button1" data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_buddlega_buddleia.htm"><span data-dcnode-id="852" instrument_node="">How to Prune Perovskia</span></a></div><span data-dcnode-id="849" instrument_node="">
</span></div><span data-dcnode-id="847" instrument_node="">
</span></div></section><hr data-dcnode-id="844"><section class="" data-dcnode-id="821" data-spy="Philadelphus" data-target="Philadelphus" id="Philadelphus"><div class="card" data-dcnode-id="822"><div class="card-body" data-dcnode-id="824"><span data-dcnode-id="843" instrument_node="">
</span><div class="card-header" data-dcnode-id="840"><h2 data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Pruning Mock Orange - Philadelphus</span></h2></div><span data-dcnode-id="839" instrument_node="">
</span><div data-dcnode-id="835" style="float:right"><img alt="Philadelphus Belle Etoile" class="img-fluid" data-dcnode-id="838" data-src="https://gardenseeker.co.uk/pruning/images/Philadelphus-Belle-Etoile_7246.webp" height="192" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Philadelphus-Belle-Etoile_7246.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="226"><p align="center" data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Philadelphus Belle Etoile</span></p></div><p class="card-text" data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">The Mock Orange - Philadelphus varieties - are well known for their heady scent - especially on an early summer morning or evening! Correct pruning is essential for this group of early summer flowering shrubs.
</span></p><span data-dcnode-id="832" instrument_node=""> </span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Prune too early and you will lose the flower buds for the current year. Prune too late and the shrub will not have enough time in the growing season to provide flowering stems for the following year. Don't panic - we are here with information and advice upon when and how to prune your Philadelphus.</span></p><span data-dcnode-id="829" instrument_node="">
</span><div align="center" data-dcnode-id="826"><a class="button button1" data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_philadelphus.htm"><span data-dcnode-id="828" instrument_node="">How to Prune Mock Orange - Philadelphus</span></a></div><span data-dcnode-id="825" instrument_node="">
</span></div><span data-dcnode-id="823" instrument_node="">
</span></div></section><hr data-dcnode-id="820"><ul data-dcnode-id="807"><li data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Phlomis - Trim as required for foliage effect - otherwise nil.</span></li><span data-dcnode-id="817" instrument_node=""> </span><li data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Phormium - Nil - simply remove dead or damaged foliage.</span></li><span data-dcnode-id="814" instrument_node=""> </span><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Phygelius - as a herbaceous perennial, simply cut back hard in the spring</span></li><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Pittosporum</span></li><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Potentilla</span></li></ul><hr data-dcnode-id="806"><section class="" data-dcnode-id="783" data-spy="Photinia Red Robin" data-target="Photinia Red Robin" id="Photinia Red Robin"><div class="card" data-dcnode-id="784"><span data-dcnode-id="805" instrument_node="">
</span><div class="card-body" data-dcnode-id="786"><span data-dcnode-id="804" instrument_node="">
</span><div class="card-header" data-dcnode-id="801"><h2 data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Pruning Photinia Red Robin Plant</span></h2></div><span data-dcnode-id="800" instrument_node="">
</span><div data-dcnode-id="796" style="float:right"><img alt="Photinia Red Robin" class="img-fluid" data-dcnode-id="799" data-src="https://gardenseeker.co.uk/images/Photinia-Red-Robin.webp" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Photinia-Red-Robin.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Photinia Red Robin</span></p></div><p class="card-text" data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Tree Red Robin Tree, hedge or shrub, is one of the most spectacular evergreens for foliage effect. Good, regular pruning will enhance its beauty.</span></p><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Photinia Red Robin is grown for the spectacular new red foliage. Pruning throughout the year helps to encourage this spectacular foliage. Prune back quite hard after the foliage has faded to a dull bronze. This will ensure a further 'crop' of new growth. As with other evergreens, it is best to prune Photinia Red Robin in the growing, and not dormant, seasons.</span></p><span data-dcnode-id="791" instrument_node="">
</span><div align="center" data-dcnode-id="788"><a class="button button1" data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_photinia.htm"><span data-dcnode-id="790" instrument_node="">How to Prune Photinia Red Robin Plant</span></a></div><span data-dcnode-id="787" instrument_node="">
</span></div><span data-dcnode-id="785" instrument_node="">
</span></div></section><hr data-dcnode-id="782"><section class="" data-dcnode-id="759" data-spy="Pieris" data-target="Pieris" id="Pieris"><div class="card" data-dcnode-id="760"><span data-dcnode-id="781" instrument_node="">
</span><div class="card-body" data-dcnode-id="762"><span data-dcnode-id="780" instrument_node="">
</span><div class="card-header" data-dcnode-id="777"><h2 data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">How to Prune Pieris – Lily of the Valley Bush</span></h2></div><span data-dcnode-id="776" instrument_node="">
</span><div data-dcnode-id="772" style="float:left"><img alt="Pieris japonica" class="img-fluid" data-dcnode-id="775" data-src="https://gardenseeker.co.uk/pruning/images/pier503106.webp" height="161" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/pier503106.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="320"><p align="center" data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Pieris Japonica</span></p></div><p class="card-text" data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">The group of Pieris shrubs fall into the very easy to prune category, because basically they do not need to be pruned – unless we gardeners have done something wrong, or there has been some form of damage.  The Pieris are closely related to the Rhododendrons – sharing the same likes and dislikes as most others in the Ericaceous family.</span></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Pruning Pieris can generally be confined to dead heading the flowers before they set seed and generally start to look a little untidy.  Pieris tend to flower in March, through until early April, but in some seasons a little earlier.</span></p><span data-dcnode-id="767" instrument_node="">
</span><div align="center" data-dcnode-id="764"><a class="button button1" data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_pieris.html"><span data-dcnode-id="766" instrument_node="">View How to Prune Pieris – Lily of the Valley Bush</span></a></div><span data-dcnode-id="763" instrument_node="">
</span></div><span data-dcnode-id="761" instrument_node="">
</span></div></section><hr data-dcnode-id="758"><section class="" data-dcnode-id="733" data-spy="Prunus Triloba" data-target="Prunus Triloba" id="Prunus Triloba"><div class="card" data-dcnode-id="734"><span data-dcnode-id="757" instrument_node="">
</span><div class="card-body" data-dcnode-id="736"><span data-dcnode-id="756" instrument_node="">
</span><div class="card-header" data-dcnode-id="753"><h2 data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Pruning Prunus Triloba</span></h2></div><span data-dcnode-id="752" instrument_node="">
</span><div data-dcnode-id="748" style="float:right"><img alt="Prunus Triloba" class="img-fluid" data-dcnode-id="751" data-src="https://gardenseeker.co.uk/images/Prunus-triloba.webp" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Prunus-triloba.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="200"><p align="center" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Prunus Triloba</span></p></div><p class="card-text" data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Prunus Triloba is to be hard pruned for the best results.</span></p><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">To rejuvenate old shrubs or bring back into line shrubs such as Brachyglottis and Hypericum. Most shrubs can be given a new lease of life by cutting back hard. However, realise that the shrub will not stay small simply because you have given it a short back and sides. It will spring back into growth with a new enthusiasm.</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Don't forget that it now has a root system that was used to supporting and feeding the old large shrub. It will 'pump' soil moisture and nutrients to ensure that the shrub gets back to 'normal size' as soon as possible. </span></p><span data-dcnode-id="741" instrument_node="">
</span><div align="center" data-dcnode-id="738"><a class="button button1" data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hard.htm"><span data-dcnode-id="740" instrument_node="">How to Prune Prunus Triloba</span></a></div><span data-dcnode-id="737" instrument_node="">
</span></div><span data-dcnode-id="735" instrument_node="">
</span></div></section><hr data-dcnode-id="732"><section class="" data-dcnode-id="709" data-spy="Laurels" data-target="Laurels" id="Laurels"><div class="card" data-dcnode-id="710"><span data-dcnode-id="731" instrument_node="">
</span><div class="card-body" data-dcnode-id="712"><span data-dcnode-id="730" instrument_node="">
</span><div class="card-header" data-dcnode-id="727"><h2 data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">When and how to Prune Laurels </span></h2></div><span data-dcnode-id="726" instrument_node="">
</span><div data-dcnode-id="722" style="float:left"><img alt="prunus laurocerasus" class="img-fluid" data-dcnode-id="725" data-src="https://gardenseeker.co.uk/pruning/images/prunus-laurocerasus-foliage.webp" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/prunus-laurocerasus-foliage.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="290"><p align="center" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Prunus Laurocerasus</span></p></div><p class="card-text" data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Cherry laurels are grown for a number of different reasons and purposes,  but basically the pruning regime insofar as timing is concerned is the same for all. The main difference of how to prune laurels depends upon the variety and the habit of growth.</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Some Laurels are grown as ground cover plants.  Others are grown as , large shrubs, hedges or screens. As with all evergreen shrubs , they are best pruned in the growing season. If you want the added feature of flowers, then timing is quite important.</span></p><span data-dcnode-id="717" instrument_node="">
</span><div align="center" data-dcnode-id="714"><a class="button button1" data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-laurels-prunus-laurocerasus.html"><span data-dcnode-id="716" instrument_node="">View When and how to Prune Laurels </span></a></div><span data-dcnode-id="713" instrument_node="">
</span></div><span data-dcnode-id="711" instrument_node="">
</span></div></section><hr data-dcnode-id="708"><section class="" data-dcnode-id="685" data-spy="Pyracantha" data-target="Pyracantha" id="Pyracantha"><div class="card" data-dcnode-id="686"><span data-dcnode-id="707" instrument_node="">
</span><div class="card-body" data-dcnode-id="688"><span data-dcnode-id="706" instrument_node="">
</span><div class="card-header" data-dcnode-id="703"><h2 data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Pruning Pyracantha</span></h2></div><span data-dcnode-id="702" instrument_node="">
</span><div data-dcnode-id="698" style="float:left"><img alt="Pyracantha branch" class="img-fluid" data-dcnode-id="701" data-src="https://gardenseeker.co.uk/pruning/images/Pyracantha-stem.webp" height="184" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Pyracantha-stem.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="250"><p align="center" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Pyracantha Branch</span></p></div><p class="card-text" data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Pyracantha are grown in a number of different ways, stand alone shrubs; hedges; wall plants; screening and small trees, so it is as well to know a little about how they flower and subsequently berry, before the act of pruning or trimming.</span></p><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">They have the advantage of being fully evergreen shrubs that have masses of creamy white flowers in early summer, with masses of orange to red berries from late summer. One wrong pruning session can wipe out flowers and berries for at least a year!</span></p><span data-dcnode-id="693" instrument_node="">
</span><div align="center" data-dcnode-id="690"><a class="button button1" data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-pyracanth-firethorn.html"><span data-dcnode-id="692" instrument_node="">How to Prune Pyracantha</span></a></div><span data-dcnode-id="689" instrument_node="">
</span></div><span data-dcnode-id="687" instrument_node="">
</span></div></section><hr data-dcnode-id="684"><span data-dcnode-id="683" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="fluid" data-ad-layout-key="-gu-19-1v-by+x2" data-ad-slot="3855732809" data-dcnode-id="682" style="display:block"></ins><span data-dcnode-id="681" instrument_node="">
</span><hr data-dcnode-id="678"><h2 data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">R</span></h2><span data-dcnode-id="675" instrument_node="">
</span><section class="" data-dcnode-id="652" data-spy="Redcurrants" data-target="Redcurrants" id="Redcurrants"><div class="card" data-dcnode-id="653"><span data-dcnode-id="674" instrument_node="">
</span><div class="card-body" data-dcnode-id="655"><span data-dcnode-id="673" instrument_node="">
</span><div class="card-header" data-dcnode-id="670"><h2 data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Pruning Redcurrants</span></h2></div><span data-dcnode-id="669" instrument_node="">
</span><div data-dcnode-id="665" style="float:left"><img alt="Redcurrants" class="img-fluid" data-dcnode-id="668" data-src="https://gardenseeker.co.uk/pruning/images/redcurrant-dt.webp" height="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/redcurrant-dt.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="349"><p align="center" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Redcurrants</span></p></div><p class="card-text" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Red Currants are pruned differently to Black Currants.</span></p><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Most of the problems associated with lack of fruit on red currant bushes is owing to the wrong method of pruning. Get the pruning right – at the right time – and red currants are hardly ever a problem. There is one very important thing to realize about red currants fruiting, and once you fully realise that, then the pruning is a simple matter and everything falls into place!</span></p><span data-dcnode-id="660" instrument_node="">
</span><div align="center" data-dcnode-id="657"><a class="button button1" data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-redcurrants.html"><span data-dcnode-id="659" instrument_node="">How to Prune Redcurrants</span></a></div><span data-dcnode-id="656" instrument_node="">
</span></div><span data-dcnode-id="654" instrument_node="">
</span></div></section><hr data-dcnode-id="651"><section class="" data-dcnode-id="628" data-spy="Rhododendrons" data-target="Rhododendrons" id="Rhododendrons"><div class="card" data-dcnode-id="629"><span data-dcnode-id="650" instrument_node="">
</span><div class="card-body" data-dcnode-id="631"><span data-dcnode-id="649" instrument_node="">
</span><div class="card-header" data-dcnode-id="646"><h2 data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Pruning Rhododendrons </span></h2></div><span data-dcnode-id="645" instrument_node="">
</span><div data-dcnode-id="641" style="float:right"><img alt="Rhododendrons" class="img-fluid" data-dcnode-id="644" data-src="https://gardenseeker.co.uk/pruning/images/AzaleaPrune1IN.webp" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/AzaleaPrune1IN.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="250"><p align="center" data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Rhododendrons</span></p></div><p class="card-text" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Azalea and Rhododendron Pruning and for or all other evergreen shrubs that flower in late winter, spring, or early summer.</span></p><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">The most basic form of pruning - often sufficient, is simply to dead-head the old flowers - before they are allowed to make seed - by cutting back to first set of buds. If any shoots spoil the overall shape of the shrub, they can be cut back to a suitable position. </span></p><span data-dcnode-id="636" instrument_node="">
</span><div align="center" data-dcnode-id="633"><a class="button button1" data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_azaleas_rhododendrons.htm"><span data-dcnode-id="635" instrument_node="">How to Prune Rhododendrons</span></a></div><span data-dcnode-id="632" instrument_node="">
</span></div><span data-dcnode-id="630" instrument_node="">
</span></div></section><hr data-dcnode-id="627"><section class="" data-dcnode-id="604" data-spy="Flowering Currant" data-target="Flowering Currant" id="Flowering Currant"><div class="card" data-dcnode-id="605"><span data-dcnode-id="626" instrument_node="">
</span><div class="card-body" data-dcnode-id="607"><span data-dcnode-id="625" instrument_node="">
</span><div class="card-header" data-dcnode-id="622"><h2 data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Pruning Ribes - Flowering Currant</span></h2></div><span data-dcnode-id="621" instrument_node="">
</span><div data-dcnode-id="617" style="float:left"><img alt="Ribes Pulborough Scarlet" class="img-fluid" data-dcnode-id="620" data-src="https://gardenseeker.co.uk/pruning/images/ribe310009.webp" height="203" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/ribe310009.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="276"><p align="center" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Ribes Pulborough Scarlet</span></p></div><p class="card-text" data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">The Ribes flower early in the Spring - just after Forsythia.</span></p><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Whilst the Ribes do not actually need pruning to flower well, if the shrub has been planted in the wrong place and outgrown its position, then you will need to prune the Ribes to a/ get it back into proportion, and b/ regular pruning to ensure that it does not again outgrow its position.</span></p><span data-dcnode-id="612" instrument_node="">
</span><div align="center" data-dcnode-id="609"><a class="button button1" data-dcnode-id="610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_ribes.htm"><span data-dcnode-id="611" instrument_node="">How to Prune Ribes - Flowering Currant</span></a></div><span data-dcnode-id="608" instrument_node="">
</span></div><span data-dcnode-id="606" instrument_node="">
</span></div></section><hr data-dcnode-id="603"><section class="" data-dcnode-id="576" data-spy="Robinia Frisia" data-target="Robinia Frisia" id="Robinia Frisia"><div class="card" data-dcnode-id="577"><span data-dcnode-id="602" instrument_node="">
</span><div class="card-body" data-dcnode-id="579"><span data-dcnode-id="601" instrument_node="">
</span><div class="card-header" data-dcnode-id="598"><h2 data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">How to Prune Robinia Frisia</span></h2></div><span data-dcnode-id="597" instrument_node="">
</span><div data-dcnode-id="593" style="float:left"><img alt="Robinia frisia" class="img-fluid" data-dcnode-id="596" data-src="https://gardenseeker.co.uk/pruning/images/robi210017.webp" height="283" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/robi210017.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="252"><p align="center" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Robinia frisia</span></p></div><p class="card-text" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Pruning large trees is not a job for the amateur gardener - it needs a professional tree surgeon with proper insurance.</span></p><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">However, before the tree gets to this height it can be pruned carefully with a pole saw or long arm lopper.</span></p><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">It is important to bear in mind when pruning, that Robinia Frisia has very brittle stems. They are liable to snap off well before the cut is halfway through the branch.</span></p><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Robinia pseudoacacia Frisia is often planted a small tree in small gardens, but soon outgrows its position - both in speed and also size.</span></p><span data-dcnode-id="584" instrument_node="">
</span><div align="center" data-dcnode-id="581"><a class="button button1" data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_robinia_frisia.htm"><span data-dcnode-id="583" instrument_node="">View How to Prune Robinia Frisia</span></a></div><span data-dcnode-id="580" instrument_node="">
</span></div><span data-dcnode-id="578" instrument_node="">
</span></div></section><hr data-dcnode-id="575"><section class="" data-dcnode-id="554" data-spy="Rose Bushes" data-target="Rose Bushes" id="Rose Bushes"><div class="card" data-dcnode-id="555"><span data-dcnode-id="574" instrument_node="">
</span><div class="card-body" data-dcnode-id="557"><span data-dcnode-id="573" instrument_node="">
</span><div class="card-header" data-dcnode-id="570"><h2 data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Pruning Rose Bushes</span></h2></div><span data-dcnode-id="569" instrument_node="">
</span><div data-dcnode-id="565" style="float:right"><img alt="Rose Peace" class="img-fluid" data-dcnode-id="568" data-src="https://gardenseeker.co.uk/pruning/images/Rosa_Peace.webp" height="214" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Rosa_Peace.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="290"><p align="center" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Rose Peace</span></p></div><p class="card-text" data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">All rose bushes (Hybrid Tea and Floribundas) benefit from hard pruning in the spring.  Rose flowers are borne on the tips of new growth and pruning back hard encourages the rose bush to send out plenty of new shoots. Pruning also encourages a better shape, with the flowers not too far from the ground! Un-pruned or 'snipped-at' roses can get to a metre or so height in 2 years, with flowers at the top of straggly growth, and lots of prickly stems totally devoid of foliage at the lower half of the rose bush.</span></p><span data-dcnode-id="562" instrument_node="">
</span><div align="center" data-dcnode-id="559"><a class="button button1" data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_roses_for_beautiful_flowers.htm"><span data-dcnode-id="561" instrument_node="">How to Prune Rose Bushes</span></a></div><span data-dcnode-id="558" instrument_node="">
</span></div><span data-dcnode-id="556" instrument_node="">
</span></div></section><hr data-dcnode-id="553"><section class="" data-dcnode-id="530" data-spy="Rosemary" data-target="Rosemary" id="Rosemary"><div class="card" data-dcnode-id="531"><span data-dcnode-id="552" instrument_node="">
</span><div class="card-body" data-dcnode-id="533"><span data-dcnode-id="551" instrument_node="">
</span><div class="card-header" data-dcnode-id="548"><h2 data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Pruning Rosemary</span></h2></div><span data-dcnode-id="547" instrument_node="">
</span><div data-dcnode-id="543" style="float:left"><img alt="Rosmarinus Prostratus" class="img-fluid" data-dcnode-id="546" data-src="https://gardenseeker.co.uk/pruning/images/Rosemarinus%20prostratus.webp" height="198" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Rosemarinus%2520prostratus.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Rosmarinus Prostratus</span></p></div><p class="card-text" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Rosemary shrubs are relatively trouble-free. However, they do require a bit of pruning from time to time. In recent years we have seen the re-introduction of Rosemary Topiary specimens.</span></p><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Left to their own devices, Rosemary generally look after themselves, but pruning after flowering is sometimes beneficial. Be aware that like the Lavenders - with which they are often confused - Rosemary are not particularly fond of being hacked back. That having been said, hard pruning at the right time - late spring - is an option for well overgrown and neglected plants.</span></p><span data-dcnode-id="538" instrument_node="">
</span><div align="center" data-dcnode-id="535"><a class="button button1" data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_rosemary.htm"><span data-dcnode-id="537" instrument_node="">How to Prune Rosemary</span></a></div><span data-dcnode-id="534" instrument_node="">
</span></div><span data-dcnode-id="532" instrument_node="">
</span></div></section><hr data-dcnode-id="529"><section class="" data-dcnode-id="506" data-spy="Rose" data-target="Rose" id="Rose"><div class="card" data-dcnode-id="507"><span data-dcnode-id="528" instrument_node="">
</span><div class="card-body" data-dcnode-id="509"><span data-dcnode-id="527" instrument_node="">
</span><div class="card-header" data-dcnode-id="524"><h2 data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Pruning The Rose of Sharon</span></h2></div><span data-dcnode-id="523" instrument_node="">
</span><div data-dcnode-id="519" style="float:left"><img alt="The Rose of Sharon" class="img-fluid" data-dcnode-id="522" data-src="https://gardenseeker.co.uk/images/Rose-of-Sharon.webp" height="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Rose-of-Sharon.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Rose of Sharon</span></p></div><p class="card-text" data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Hypericums are a wide range of garden shrubs, but generally fall into two groups as far as pruning is concerned. St Johns Wort and Rose of Sharon types.</span></p><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">The shrubby varieties of HHypericum such as Hypericum 'Hidcote' should be pruned in spring - March or April depending upon area and weather conditions. The low growing Hypericum calycinum - better known as St John Wort -  should be pruned hard in late winter or very early spring. </span></p><span data-dcnode-id="514" instrument_node="">
</span><div align="center" data-dcnode-id="511"><a class="button button1" data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hypericum.htm"><span data-dcnode-id="513" instrument_node="">View The Rose of Sharon</span></a></div><span data-dcnode-id="510" instrument_node="">
</span></div><span data-dcnode-id="508" instrument_node="">
</span></div></section><hr data-dcnode-id="505"><section class="" data-dcnode-id="482" data-spy="Rejuvenation" data-target="Rejuvenation" id="Rejuvenation"><div class="card" data-dcnode-id="483"><span data-dcnode-id="504" instrument_node="">
</span><div class="card-body" data-dcnode-id="485"><span data-dcnode-id="503" instrument_node="">
</span><div class="card-header" data-dcnode-id="500"><h2 data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Rejuvenation Pruning of Shrubs </span></h2></div><span data-dcnode-id="499" instrument_node="">
</span><div data-dcnode-id="495" style="float:left"><img alt="Pruning of Shrubs" class="img-fluid" data-dcnode-id="498" data-src="https://gardenseeker.co.uk/pruning/images/rejuvenation-pruning.webp" height="329" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/rejuvenation-pruning.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="302"><p align="center" data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Pruning of Shrubs</span></p></div><p class="card-text" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Many old shrubs can be rejuvenated by cutting back some - or all - of the mature growth. It can either be carried out in one hit, or more sensibly in stages.</span></p><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Most will know that 3 in 1 oil works wonders for getting things moving again. For getting shrubs moving again, let’s reverse the numbers and think 1 in 3. One in three is a basic shrub pruning technique that really does wonders for a wide range of shrubs - mainly deciduous but also with a few evergreens that can benefit from selective shoot pruning. Basically, you select one stem or branch in every three and cut it back near to ground level at the base of the shrub.</span></p><span data-dcnode-id="490" instrument_node="">
</span><div align="center" data-dcnode-id="487"><a class="button button1" data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-shrubs-for-rejuvination.html"><span data-dcnode-id="489" instrument_node="">View Rejuvenation Pruning of Shrubs </span></a></div><span data-dcnode-id="486" instrument_node="">
</span></div><span data-dcnode-id="484" instrument_node="">
</span></div></section><hr data-dcnode-id="481"><span data-dcnode-id="480" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="fluid" data-ad-layout-key="-gu-19-1v-by+x2" data-ad-slot="3855732809" data-dcnode-id="479" style="display:block"></ins><span data-dcnode-id="478" instrument_node="">
</span><hr data-dcnode-id="475"><h2 data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">S</span></h2><section class="" data-dcnode-id="448" data-spy="Salix" data-target="Salix" id="Salix"><div class="card" data-dcnode-id="449"><span data-dcnode-id="472" instrument_node="">
</span><div class="card-body" data-dcnode-id="451"><span data-dcnode-id="471" instrument_node="">
</span><div class="card-header" data-dcnode-id="468"><h2 data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Pruning Salix</span></h2></div><span data-dcnode-id="467" instrument_node="">
</span><div data-dcnode-id="463" style="float:left"><img alt="Salix Alba" class="img-fluid" data-dcnode-id="466" data-src="https://gardenseeker.co.uk/images/Salix-alba.webp" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Salix-alba.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Salix Alba</span></p></div><p class="card-text" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">To Prune Salix for the instructions for Dogwoods, Many Dogwoods - are grown for their colourful stems throughout the winter months. For this to be successful, it needs a particular kind of pruning - easy!</span></p><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">

We take you through the pruning exercise and tell you when and how to prune your Dogwoods.</span></p><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">

You need to prune at the right time, which is late Winter or early Spring.</span></p><span data-dcnode-id="456" instrument_node="">
</span><div align="center" data-dcnode-id="453"><a class="button button1" data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_cornus_dogwoods.htm"><span data-dcnode-id="455" instrument_node="">How to Prune Salix</span></a></div><span data-dcnode-id="452" instrument_node="">
</span></div><span data-dcnode-id="450" instrument_node="">
</span></div></section><hr data-dcnode-id="447"><section class="" data-dcnode-id="424" data-spy="Sambucus" data-target="Sambucus" id="Sambucus"><div class="card" data-dcnode-id="425"><span data-dcnode-id="446" instrument_node="">
</span><div class="card-body" data-dcnode-id="427"><span data-dcnode-id="445" instrument_node="">
</span><div class="card-header" data-dcnode-id="442"><h2 data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">Pruning Sambucus</span></h2></div><span data-dcnode-id="441" instrument_node="">
</span><div data-dcnode-id="437" style="float:right"><img alt="Sambucus" class="img-fluid" data-dcnode-id="440" data-src="https://gardenseeker.co.uk/images/Sambucus.webp" height="205" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Sambucus.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Sambucus</span></p></div><p class="card-text" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">To Prune Sambucus follow the instructions for Hard Pruning.</span></p><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">To rejuvenate old shrubs or bring back into line shrubs such as Brachyglottis and Hypericum. Most shrubs can be given a new lease of life by cutting back hard. However, realise that the shrub will not stay small simply because you have given it a short back and sides. It will spring back into growth with a new enthusiasm.</span></p><span data-dcnode-id="432" instrument_node="">
</span><div align="center" data-dcnode-id="429"><a class="button button1" data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hard.htm"><span data-dcnode-id="431" instrument_node="">How to Prune Sambucus</span></a></div><span data-dcnode-id="428" instrument_node="">
</span></div><span data-dcnode-id="426" instrument_node="">
</span></div></section><hr data-dcnode-id="423"><span data-dcnode-id="422" instrument_node="">
</span><section class="" data-dcnode-id="399" data-spy="Skimmia" data-target="Skimmia" id="Skimmia"><div class="card" data-dcnode-id="400"><span data-dcnode-id="421" instrument_node="">
</span><div class="card-body" data-dcnode-id="402"><span data-dcnode-id="420" instrument_node="">
</span><div class="card-header" data-dcnode-id="417"><h2 data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Pruning Skimmia</span></h2></div><span data-dcnode-id="416" instrument_node="">
</span><div data-dcnode-id="412" style="float:left"><img alt="skimia-japonica-rubella" class="img-fluid" data-dcnode-id="415" data-src="https://gardenseeker.co.uk/images/skimia-japonica-rubella.webp" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/skimia-japonica-rubella.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Skimia Japonica Rubella</span></p></div><p class="card-text" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">To Prune Skimmia follow the instructions for Hard Pruning.</span></p><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">The most basic form of pruning - often sufficient, is simply to dead-head the old flowers - before they are allowed to make seed - by cutting back to first set of buds. If any shoots spoil the overall shape of the shrub, they can be cut back to a suitable position.</span></p><span data-dcnode-id="407" instrument_node="">
</span><div align="center" data-dcnode-id="404"><a class="button button1" data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_azaleas_rhododendrons.htm"><span data-dcnode-id="406" instrument_node="">How to Prune Skimmia</span></a></div><span data-dcnode-id="403" instrument_node="">
</span></div><span data-dcnode-id="401" instrument_node="">
</span></div></section><hr data-dcnode-id="398"><section class="" data-dcnode-id="375" data-spy="Spiraea" data-target="Spiraea" id="Spiraea"><div class="card" data-dcnode-id="376"><span data-dcnode-id="397" instrument_node="">
</span><div class="card-body" data-dcnode-id="378"><span data-dcnode-id="396" instrument_node="">
</span><div class="card-header" data-dcnode-id="393"><h2 data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Pruning Spiraea</span></h2></div><span data-dcnode-id="392" instrument_node="">
</span><div data-dcnode-id="388" style="float:right"><img alt="Spiraea Japonica" class="img-fluid" data-dcnode-id="391" data-src="https://gardenseeker.co.uk/pruning/images/SpiraeaPrune1IN.webp" height="191" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/SpiraeaPrune1IN.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="254"><p align="center" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Spiraea Japonica</span></p></div><p class="card-text" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Most Spiraea shrubs should be pruned right after flowering. However, there are also some varieties that should be pruned at the beginning of the growing season (Spring).</span></p><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Spring and early summer flowering varieties include Spiraea 'Arguta', Spiraea Snowmound, S. Goldflame, S. Little Princes, S. japonica 'Anthony Waterer', Spiraea japonica Shirobana (There are others). All of these should be pruned as soon as flowering is finished - See below. All of these varieties are normally finished flowering by end of June (UK)</span></p><span data-dcnode-id="383" instrument_node="">
</span><div align="center" data-dcnode-id="380"><a class="button button1" data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_spiraea.htm"><span data-dcnode-id="382" instrument_node="">How to Prune Spiraea</span></a></div><span data-dcnode-id="379" instrument_node="">
</span></div><span data-dcnode-id="377" instrument_node="">
</span></div></section><hr data-dcnode-id="374"><section class="" data-dcnode-id="351" data-spy="Syringa" data-target="Syringa" id="Syringa"><div class="card" data-dcnode-id="352"><span data-dcnode-id="373" instrument_node="">
</span><div class="card-body" data-dcnode-id="354"><span data-dcnode-id="372" instrument_node="">
</span><div class="card-header" data-dcnode-id="369"><h2 data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Pruning Syringa</span></h2></div><span data-dcnode-id="368" instrument_node="">
</span><div data-dcnode-id="364" style="float:left"><img alt="Pruning Syringa" class="img-fluid" data-dcnode-id="367" data-src="https://gardenseeker.co.uk/pruning/images/PruneLilac2GoodIN.webp" height="292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/PruneLilac2GoodIN.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="219"><p align="center" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Pruning Syringa</span></p></div><p class="card-text" data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Lilacs do not require too much Pruning - Here's how. All that is normally required of a Syringa (Lilac), is the removal of faded flower. No more - unless you want to re-shape the bush. In the latter case, do it as you wish, right after flowering.</span></p><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">It is important to take off the old flower growth before it starts to set seed. This will then allow new shoots to form, which will be the flowering growths for the next year. The sooner you 'de-head' - the faded flowers, the better the following year's flowers will be.</span></p><span data-dcnode-id="359" instrument_node="">
</span><div align="center" data-dcnode-id="356"><a class="button button1" data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_lilac-syringa.html"><span data-dcnode-id="358" instrument_node="">How to Prune Syringa</span></a></div><span data-dcnode-id="355" instrument_node="">
</span></div><span data-dcnode-id="353" instrument_node="">
</span></div></section><hr data-dcnode-id="350"><section class="" data-dcnode-id="327" data-spy="St Johns Wort" data-target="St Johns Wort" id="St Johns Wort"><div class="card" data-dcnode-id="328"><span data-dcnode-id="349" instrument_node="">
</span><div class="card-body" data-dcnode-id="330"><span data-dcnode-id="348" instrument_node="">
</span><div class="card-header" data-dcnode-id="345"><h2 data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Pruning St Johns Wort</span></h2></div><span data-dcnode-id="344" instrument_node="">
</span><div data-dcnode-id="340" style="float:left"><img alt="St Johns Wort" class="img-fluid" data-dcnode-id="343" data-src="https://gardenseeker.co.uk/images/St-Johns-Wort.webp" height="168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/St-Johns-Wort.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="299"><p align="center" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">St Johns Wort</span></p></div><p class="card-text" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Hypericums are a wide range of garden shrubs, but generally fall into two groups as far as pruning is concerned. St Johns Wort and Rose of Sharon types.</span></p><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">The shrubby varieties of HHypericum such as Hypericum 'Hidcote' should be pruned in spring - March or April depending upon area and weather conditions. The low growing Hypericum calycinum - better known as St John Wort -  should be pruned hard in late winter or very early spring. </span></p><span data-dcnode-id="335" instrument_node="">
</span><div align="center" data-dcnode-id="332"><a class="button button1" data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hypericum.htm"><span data-dcnode-id="334" instrument_node="">How to Prune St Johns Wort</span></a></div><span data-dcnode-id="331" instrument_node="">
</span></div><span data-dcnode-id="329" instrument_node="">
</span></div></section><hr data-dcnode-id="326"><span data-dcnode-id="325" instrument_node="">
</span><span data-dcnode-id="323" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="auto" data-ad-slot="4945576908" data-dcnode-id="322" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="321" instrument_node="">
</span><hr data-dcnode-id="318"><h2 data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">T</span></h2><section class="" data-dcnode-id="291" data-spy="Tamarix Tentandra" data-target="Tamarix Tentandra" id="Tamarix Tentandra"><div class="card" data-dcnode-id="292"><span data-dcnode-id="315" instrument_node="">
</span><div class="card-body" data-dcnode-id="294"><span data-dcnode-id="314" instrument_node="">
</span><div class="card-header" data-dcnode-id="311"><h2 data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Pruning Tamarix Tentandra</span></h2></div><span data-dcnode-id="310" instrument_node="">
</span><div data-dcnode-id="306" style="float:right"><img alt="Tamarix Tentandra" class="img-fluid" data-dcnode-id="309" data-src="https://gardenseeker.co.uk/pruning/images/Tamarix_tetrandra.webp" height="207" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Tamarix_tetrandra.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="297"><p align="center" data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Tamarix Tentandra</span></p></div><p class="card-text" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">There are two basic types of Tamarix - Spring flowering and late summer/autumn flowering.</span></p><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">

We deal with the spring flowering Tamarix tentandra here, which requires different pruning for the other types.</span></p><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Tamarix Tentandra Grown as a small tree - The flowers and flowering stems are made in the growing season before actual flowering, so stems allowed to grow in late spring/summer 2008, will produce flowers in Spring 2009. If the stems are pruned late in the year, then they will not have enough time to grow into flowering branches for the next year. You will lose a year of flower!</span></p><span data-dcnode-id="299" instrument_node="">
</span><div align="center" data-dcnode-id="296"><a class="button button1" data-dcnode-id="297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_tamarix_tentandra.htm"><span data-dcnode-id="298" instrument_node="">How to Prune Tamarix Tentandra</span></a></div><span data-dcnode-id="295" instrument_node="">
</span></div><span data-dcnode-id="293" instrument_node="">
</span></div></section><hr data-dcnode-id="290"><section class="" data-dcnode-id="267" data-spy="Tamarix Pentandra" data-target="Tamarix Pentandra" id="Tamarix Pentandra"><div class="card" data-dcnode-id="268"><span data-dcnode-id="289" instrument_node="">
</span><div class="card-body" data-dcnode-id="270"><span data-dcnode-id="288" instrument_node="">
</span><div class="card-header" data-dcnode-id="285"><h2 data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Pruning Tamarix Pentandra</span></h2></div><span data-dcnode-id="284" instrument_node="">
</span><div data-dcnode-id="280" style="float:left"><img alt="Tamarix-pentandra-flowers" class="img-fluid" data-dcnode-id="283" data-src="https://gardenseeker.co.uk/images/Tamarix-pentandra-flowers.webp" height="218" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Tamarix-pentandra-flowers.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Tamarix Pentandra Flowers</span></p></div><p class="card-text" data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Hard pruning in Spring for Shrubs that flower late mid-late summer on current season's growth Tamarix pentandra.</span></p><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">To rejuvenate old shrubs or bring back into line shrubs such as Brachyglottis and Hypericum. Most shrubs can be given a new lease of life by cutting back hard. However, realise that the shrub will not stay small simply because you have given it a short back and sides. It will spring back into growth with a new enthusiasm.</span></p><span data-dcnode-id="275" instrument_node="">
</span><div align="center" data-dcnode-id="272"><a class="button button1" data-dcnode-id="273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hard.htm"><span data-dcnode-id="274" instrument_node="">View Tamarix Pentandra</span></a></div><span data-dcnode-id="271" instrument_node="">
</span></div><span data-dcnode-id="269" instrument_node="">
</span></div></section><hr data-dcnode-id="266"><span data-dcnode-id="265" instrument_node="">

</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="auto" data-ad-slot="4945576908" data-dcnode-id="262" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="261" instrument_node="">
</span><hr data-dcnode-id="258"><h2 data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">V</span></h2><section class="" data-dcnode-id="233" data-spy="Viburnum" data-target="Viburnum" id="Viburnum"><div class="card" data-dcnode-id="234"><span data-dcnode-id="255" instrument_node="">
</span><div class="card-body" data-dcnode-id="236"><span data-dcnode-id="254" instrument_node="">
</span><div class="card-header" data-dcnode-id="251"><h2 data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">Pruning Viburnum</span></h2></div><span data-dcnode-id="250" instrument_node="">
</span><div data-dcnode-id="246" style="float:left"><img alt="Viburnum Tinus - French White" class="img-fluid" data-dcnode-id="249" data-src="https://gardenseeker.co.uk/pruning/images/vibu302147.webp" height="217" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/vibu302147.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="290"><p align="center" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Viburnum Tinus - French White</span></p></div><p class="card-text" data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">The easy thing to remember about pruning Viburnums - deciduous or evergreen - is that they should ideally be pruned soon after flowering. Within a month of finishing flowering is good, but a little later is also suitable. As some of them flower in winter, then the weather conditions outside may be the determining factor!</span></p><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Viburnum are one of the most popular groups of shrubs with a wide range of growth habits and flowering times. Most flower either in winter or late spring. They all flower on stems or growths that we made in the year previous - starting from early spring and carrying on through summer. That is to say that they produce either flower buds or flowering wood/twigs in the year before actually flowering.</span></p><span data-dcnode-id="241" instrument_node="">
</span><div align="center" data-dcnode-id="238"><a class="button button1" data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-viburnum-deciduous-evergreen.html"><span data-dcnode-id="240" instrument_node="">How to Prune Viburnum</span></a></div><span data-dcnode-id="237" instrument_node="">
</span></div><span data-dcnode-id="235" instrument_node="">
</span></div></section><hr data-dcnode-id="232"><span data-dcnode-id="231" instrument_node="">
</span><span data-dcnode-id="229" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="auto" data-ad-slot="4945576908" data-dcnode-id="228" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="227" instrument_node="">
</span><hr data-dcnode-id="224"><h2 data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">W</span></h2><section class="" data-dcnode-id="199" data-spy="Weigela" data-target="Weigela" id="Weigela"><div class="card" data-dcnode-id="200"><span data-dcnode-id="221" instrument_node="">
</span><div class="card-body" data-dcnode-id="202"><span data-dcnode-id="220" instrument_node="">
</span><div class="card-header" data-dcnode-id="217"><h2 data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Pruning Weigela</span></h2></div><span data-dcnode-id="216" instrument_node="">
</span><div data-dcnode-id="212" style="float:right"><img alt="Pink Weigela" class="img-fluid" data-dcnode-id="215" data-src="https://gardenseeker.co.uk/pruning/images/iStock_000006277573XSmall.webp" height="206" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/iStock_000006277573XSmall.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="271"><p align="center" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Pink Weigela</span></p></div><p class="card-text" data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Pruning Weigela is necessary if you want to keep the shrub in good condition with plenty of good sized flowers and healthy fresh foliage.</span></p><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Weigela should be pruned immediately after flowering in early summer. As with many shrubs that flower at this time of year, they produce flowers on wood made in the previous season (year). If you prune your Weigela late in the year, then it will not have time in to grow mature wood for flowering next summer. If you prune your Weigela early in the year (before it flowers) then you will be cutting off the flower buds that developed last year, and there will be no flowers on it until the following year.</span></p><span data-dcnode-id="207" instrument_node="">
</span><div align="center" data-dcnode-id="204"><a class="button button1" data-dcnode-id="205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_weigela.htm"><span data-dcnode-id="206" instrument_node="">How to Prune Weigela</span></a></div><span data-dcnode-id="203" instrument_node="">
</span></div><span data-dcnode-id="201" instrument_node="">
</span></div></section><hr data-dcnode-id="198"><section class="" data-dcnode-id="175" data-spy="Wisteria Sinensis" data-target="Wisteria Sinensis" id="Wisteria Sinensis"><div class="card" data-dcnode-id="176"><span data-dcnode-id="197" instrument_node="">
</span><div class="card-body" data-dcnode-id="178"><span data-dcnode-id="196" instrument_node="">
</span><div class="card-header" data-dcnode-id="193"><h2 data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Pruning Wisteria Sinensis</span></h2></div><span data-dcnode-id="192" instrument_node="">
</span><div data-dcnode-id="188" style="float:left"><img alt="How to Prune Wisteria Sinensis" class="img-fluid" data-dcnode-id="191" data-src="https://gardenseeker.co.uk/pruning/images/Wisteria_on_stone_arch_Eltham.webp" height="233" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Wisteria_on_stone_arch_Eltham.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="250"><p align="center" data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Wisteria Sinensis</span></p></div><p class="card-text" data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Pruning Wisteria is not essential where they have room to roam and colonise a wall frame or sturdy trellis. Wisteria will wander and flower in this situation without any pruning. However, if the Wisteria is growing in a confined space, or at least needs to be constrained, then pruning will be necessary as set out below. </span></p><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">If you want the best flowers on your Wisteria, then it is important to prune your Wisteria, and prune your wisteria at the right time. We show you when to prune wisterias, and also how to prune wisterias.</span></p><span data-dcnode-id="183" instrument_node="">
</span><div align="center" data-dcnode-id="180"><a class="button button1" data-dcnode-id="181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_wisteria.htm"><span data-dcnode-id="182" instrument_node="">How to Prune Wisteria sinensis</span></a></div><span data-dcnode-id="179" instrument_node="">
</span></div><span data-dcnode-id="177" instrument_node="">
</span></div></section></div></div></div></div></div></div><hr data-dcnode-id="168"><span data-dcnode-id="167" instrument_node=""> </span><nav aria-label="breadcrumb" data-dcnode-id="155"><span data-dcnode-id="166" instrument_node="">
