</span><hr data-dcnode-id="1886"><h2 data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">D</span></h2><div class="card" data-dcnode-id="1861"><span data-dcnode-id="1883" instrument_node="">
</span><div class="card-body" data-dcnode-id="1863"><span data-dcnode-id="1882" instrument_node="">
</span><div class="card-header" data-dcnode-id="1879"><h2 data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Pruning Daphne</span></h2></div><span data-dcnode-id="1878" instrument_node="">
</span><div data-dcnode-id="1874" style="float:right"><img alt="Daphne Mezereum" class="img-fluid" data-dcnode-id="1877" data-src="https://gardenseeker.co.uk/images/Daphne-Mezereum.webp" height="194" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Daphne-Mezereum.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="259"><p align="center" data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Daphne Mezereum</span></p></div><p class="card-text" data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Pruning Daphne does not really need pruning, but if you do want to prune it, then follow the instructions for Pruning Azaleas and Rhododendrons  </span></p><span data-dcnode-id="1871" instrument_node=""> </span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">The most basic form of pruning - often sufficient, is simply to dead-head the old flowers - before they are allowed to make seed - by cutting back to first set of buds. If any shoots spoil the overall shape of the shrub, they can be cut back to a suitable position. </span></p><span data-dcnode-id="1868" instrument_node="">
</span><div align="center" data-dcnode-id="1865"><a class="button button1" data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-abelia-how.html"><span data-dcnode-id="1867" instrument_node="">How to Prune Daphne Shrubs</span></a></div><span data-dcnode-id="1864" instrument_node="">
</span></div><span data-dcnode-id="1862" instrument_node="">
</span></div><hr data-dcnode-id="1860"><div class="card" data-dcnode-id="1836"><span data-dcnode-id="1859" instrument_node="">
</span><div class="card-body" data-dcnode-id="1838"><span data-dcnode-id="1858" instrument_node="">
</span><div class="card-header" data-dcnode-id="1855"><h2 data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Pruning Deutzia</span></h2></div><span data-dcnode-id="1854" instrument_node="">
</span><div data-dcnode-id="1850" style="float:right"><img alt="Deutzia Gracilis 'Nikko'" class="img-fluid" data-dcnode-id="1853" data-src="https://gardenseeker.co.uk/pruning/images/Deutzia_Deutzia_gracilis_'Nikko'.webp" height="335" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Deutzia_Deutzia_gracilis_%27Nikko%27.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="258"><p align="center" data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Deutzia Gracilis 'Nikko'</span></p></div><p class="card-text" data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">There are several fine species and varieties (cultivars) of Deutzia. They all have the same pruning requirement as they flower on wood growths made in the previous growing season (Last year). This is important to realise, for the current year's growth - such as in late spring or early summer does NOT bear flowers. When to prune Deutzia is essential knowledge for succession of flowers.</span></p><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Deutzias can get a bit unkempt in habit if not pruned regularly. Prune at the right time!</span></p><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">All deutzia should be pruned immediately after the flowers have finished</span></p><span data-dcnode-id="1843" instrument_node="">
</span><div align="center" data-dcnode-id="1840"><a class="button button1" data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_deutzia.htm"><span data-dcnode-id="1842" instrument_node="">How to Prune Deutzia </span></a></div><span data-dcnode-id="1839" instrument_node="">
</span></div><span data-dcnode-id="1837" instrument_node="">
</span></div><hr data-dcnode-id="1835"><div class="card" data-dcnode-id="1809"><span data-dcnode-id="1834" instrument_node="">
</span><div class="card-body" data-dcnode-id="1811"><span data-dcnode-id="1833" instrument_node="">
</span><div class="card-header" data-dcnode-id="1830"><h2 data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Pruning Dogwoods - Cornus</span></h2></div><span data-dcnode-id="1829" instrument_node="">
</span><div data-dcnode-id="1825" style="float:right"><img alt="Midwinter Fire" class="img-fluid" data-dcnode-id="1828" data-src="https://gardenseeker.co.uk/pruning/images/Cornus_sang_Midwinter_Fire1.webp" height="238" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Cornus_sang_Midwinter_Fire1.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="163"><p align="center" data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Midwinter Fire</span></p></div><p class="card-text" data-dcnode-id="1823"><span data-dcnode-id="1824" instrument_node="">Many Cornus - Dogwoods - are grown for their colourful stems throughout the winter months. For this to be successful, it needs a particular kind of pruning - easy!
</span></p><span data-dcnode-id="1822" instrument_node=""> </span><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">We take you through the pruning exercise and tell you when and how to prune your Dogwoods.</span></p><span data-dcnode-id="1819" instrument_node=""> </span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">You need to prune at the right time, which is late Winter or early Spring.</span></p><span data-dcnode-id="1816" instrument_node="">
</span><div align="center" data-dcnode-id="1813"><a class="button button1" data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_cornus_dogwoods.htm"><span data-dcnode-id="1815" instrument_node="">How to Prune Dogwoods - Cornus</span></a></div><span data-dcnode-id="1812" instrument_node="">
</span></div><span data-dcnode-id="1810" instrument_node="">
</span></div><hr data-dcnode-id="1808"><span data-dcnode-id="1807" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="fluid" data-ad-layout-key="-gu-19-1v-by+x2" data-ad-slot="3855732809" data-dcnode-id="1806" style="display:block"></ins><span data-dcnode-id="1805" instrument_node="">
</span><hr data-dcnode-id="1802"><h2 data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">E</span></h2><hr data-dcnode-id="1799"><ul data-dcnode-id="1788"><li data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Elaeagnus  - Evergreen Types can be cut back quite hard during April/May - or later</span></li><span data-dcnode-id="1796" instrument_node=""> </span><li data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Erica</span></li><span data-dcnode-id="1793" instrument_node=""> </span><li data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Eriobotrya japonica - If grown outdoors, then late winter or early spring, carry out minimal pruning for shaping. Best pruned when dormant. If grown indoors as large houseplant, will need restrictive pruning as and when required.</span></li><li data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">Escallonia</span></li></ul><div class="card" data-dcnode-id="1766"><div class="card-body" data-dcnode-id="1768"><span data-dcnode-id="1787" instrument_node="">
</span><div class="card-header" data-dcnode-id="1784"><h2 data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Pruning Eucalyptus </span></h2></div><span data-dcnode-id="1783" instrument_node="">
</span><div data-dcnode-id="1779" style="float:right"><img alt="Eucalyptus Fasciculosa" class="img-fluid" data-dcnode-id="1782" data-src="https://gardenseeker.co.uk/images/Eucalyptus-fasciculosa.webp" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Eucalyptus-fasciculosa.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Eucalyptus Fasciculosa</span></p></div><p class="card-text" data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">You can prune Eucalyptus - for foliage effect, to rejuvenate the foliage, follow the instructions for Hard Pruning.
</span></p><span data-dcnode-id="1776" instrument_node=""> </span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">To rejuvenate old shrubs or bring back into line shrubs such as Brachyglottis and Hypericum. Most shrubs can be given a new lease of life by cutting back hard. However, realise that the shrub will not stay small simply because you have given it a short back and sides. It will spring back into growth with a new enthusiasm.</span></p><span data-dcnode-id="1773" instrument_node="">
</span><div align="center" data-dcnode-id="1770"><a class="button button1" data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hard.htm"><span data-dcnode-id="1772" instrument_node="">How to Prune Eucalyptus</span></a></div><span data-dcnode-id="1769" instrument_node="">
</span></div><span data-dcnode-id="1767" instrument_node="">
</span></div><hr data-dcnode-id="1765"><ul data-dcnode-id="1756"><li data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Eucryphia</span></li><span data-dcnode-id="1762" instrument_node=""> </span><li data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Euonymus (evergreen) - trim to shape in spring - or cut back hard if required.</span></li><span data-dcnode-id="1759" instrument_node=""> </span><li data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Euonymus (deciduous)</span></li></ul><div class="card" data-dcnode-id="1732"><span data-dcnode-id="1755" instrument_node="">
</span><div class="card-body" data-dcnode-id="1734"><span data-dcnode-id="1754" instrument_node="">
</span><div class="card-header" data-dcnode-id="1751"><h2 data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">Pruning The Bride - Exochorda x Macrantha</span></h2></div><span data-dcnode-id="1750" instrument_node="">
</span><div data-dcnode-id="1746" style="float:left"><img alt="The Bride - Exochorda x Macrantha" class="img-fluid" data-dcnode-id="1749" data-src="https://gardenseeker.co.uk/pruning/images/Exochorda_the_bride_A.webp" height="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Exochorda_the_bride_A.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="350"><p align="center" data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Exochorda x Macrantha</span></p></div><p class="card-text" data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">The pure white flowers of this shrub give rise to the name - The Bride - or the Pearl Bush. (The opening flower buds resemble groups of pearls.</span></p><p data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Exochorda x macrantha The Bride, is an early summer flowering shrub that needs pruning at the correct time. How and when to prune it is detailed below.</span></p><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Take note of our information and advice on how to prune the Exochorda and avoid the disappointment sometimes experienced with this plant.</span></p><span data-dcnode-id="1739" instrument_node="">
</span><div align="center" data-dcnode-id="1736"><a class="button button1" data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_exochorda.htm"><span data-dcnode-id="1738" instrument_node="">View The Bride</span></a></div><span data-dcnode-id="1735" instrument_node="">
</span></div><span data-dcnode-id="1733" instrument_node="">
</span></div><hr data-dcnode-id="1731"><div class="card" data-dcnode-id="1708"><span data-dcnode-id="1730" instrument_node="">
</span><div class="card-body" data-dcnode-id="1710"><span data-dcnode-id="1729" instrument_node="">
</span><div class="card-header" data-dcnode-id="1726"><h2 data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Pruning Flowering Evergreen shrubs</span></h2></div><span data-dcnode-id="1725" instrument_node="">
</span><div data-dcnode-id="1721" style="float:right"><img alt="Abelia schumanii - Evergreen flowering shrub" class="img-fluid" data-dcnode-id="1724" data-src="https://gardenseeker.co.uk/pruning/images/Abelia%20Schumanii.webp" height="196" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Abelia%2520Schumanii.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="294"><p align="center" data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Abelia Schumanii</span></p></div><p class="card-text" data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Most Evergreen Flowering Shrubs can simply be dead-headed.
</span></p><span data-dcnode-id="1718" instrument_node=""> </span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">The main exception to that statement, is where the evergreen flowering shrub is also being grown for its berries of fruits - ie Cotoneaster and Pyracantha. Deadheading or pruning these would inevitably mean a loss of fruiting trusses that come after the flowers.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><div align="center" data-dcnode-id="1712"><a class="button button1" data-dcnode-id="1713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_flowering_evergreen_shrubs.htm"><span data-dcnode-id="1714" instrument_node="">How to Prune Flowering Evergreen shrubs</span></a></div><span data-dcnode-id="1711" instrument_node="">
</span></div><span data-dcnode-id="1709" instrument_node="">
</span></div><hr data-dcnode-id="1707"><span data-dcnode-id="1706" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="fluid" data-ad-layout-key="-gu-19-1v-by+x2" data-ad-slot="3855732809" data-dcnode-id="1705" style="display:block"></ins><span data-dcnode-id="1704" instrument_node="">
</span><hr data-dcnode-id="1701"><h2 data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">F</span></h2><ul data-dcnode-id="1693"><li data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Fatsia</span></li><span data-dcnode-id="1696" instrument_node=""> </span><li data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Fothergilla</span></li></ul><div class="card" data-dcnode-id="1664"><span data-dcnode-id="1692" instrument_node="">
</span><div class="card-body" data-dcnode-id="1666"><span data-dcnode-id="1691" instrument_node="">
</span><div class="card-header" data-dcnode-id="1688"><h2 data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Pruning Ribes - Flowering Currant</span></h2></div><span data-dcnode-id="1687" instrument_node="">
</span><div data-dcnode-id="1683" style="float:right"><img alt="Flowering Currant" class="img-fluid" data-dcnode-id="1686" data-src="https://gardenseeker.co.uk/pruning/images/ribe310009.webp" height="203" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/ribe310009.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="276"><p align="center" data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Flowering Currant</span></p></div><p class="card-text" data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">The Ribes flower early in the Spring - just after Forsythia.</span></p><span data-dcnode-id="1680" instrument_node=""> </span><p data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Whilst the Ribes do not actually need pruning to flower well, if the shrub has been planted in the wrong place and outgrown its position, then you will need to prune the Ribes to a/ get it back into proportion, and b/ regular pruning to ensure that it does not again outgrow its position.</span></p><span data-dcnode-id="1677" instrument_node=""> </span><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">How and When to Prune Flowering Currants - Ribes.</span></p><span data-dcnode-id="1674" instrument_node=""> </span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">With a large overgrown Ribes shrub, the best course of action may well be to prune it hard - down to ground level or near! That course of action can be carried out at virtually any time of year, but if you prune it too late, then it will not flower the following spring, so, the earlier the better - March or April at latest.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><div align="center" data-dcnode-id="1668"><a class="button button1" data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_ribes.htm"><span data-dcnode-id="1670" instrument_node="">How to Prune Ribes - Flowering Currant</span></a></div><span data-dcnode-id="1667" instrument_node="">
</span></div><span data-dcnode-id="1665" instrument_node="">
</span></div><hr data-dcnode-id="1663"><div class="card" data-dcnode-id="1637"><span data-dcnode-id="1662" instrument_node="">
</span><div class="card-body" data-dcnode-id="1639"><span data-dcnode-id="1661" instrument_node="">
</span><div class="card-header" data-dcnode-id="1658"><h2 data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Pruning Forsythia</span></h2></div><span data-dcnode-id="1657" instrument_node="">
</span><div data-dcnode-id="1653" style="float:right"><img alt="Forsythia" class="img-fluid" data-dcnode-id="1656" data-src="https://gardenseeker.co.uk/pruning/images/iStock_000005546485XSmall.webp" height="319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/iStock_000005546485XSmall.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="250"><p align="center" data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Forsythia</span></p></div><p class="card-text" data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Forsythias are so easy to grow, that they often get overlooked when it comes to care and attention.
</span></p><p data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">
This is its downfall in many gardens. It simply need a bit of correct pruning at the right time of the year. Therein lies another problem - the time and way in which it should be pruned.
</span></p><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">
This is probably one of the most wrongly pruned shrubs of all!</span></p><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">f you prune it correctly then it will favour you with masses of good sized flowers. If you do it wrong, then nothing on your Forsythia but foliage!</span></p><span data-dcnode-id="1644" instrument_node="">
</span><div align="center" data-dcnode-id="1641"><a class="button button1" data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/Pruning_Forsythia.htm"><span data-dcnode-id="1643" instrument_node="">How to Prune Forsythia</span></a></div><span data-dcnode-id="1640" instrument_node="">
</span></div><span data-dcnode-id="1638" instrument_node="">
</span></div><hr data-dcnode-id="1636"><div class="card" data-dcnode-id="1614"><span data-dcnode-id="1635" instrument_node="">
</span><div class="card-body" data-dcnode-id="1616"><span data-dcnode-id="1634" instrument_node="">
</span><div class="card-header" data-dcnode-id="1631"><h2 data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Pruning Fuchsias</span></h2></div><span data-dcnode-id="1630" instrument_node="">
</span><div data-dcnode-id="1626" style="float:right"><img alt="Fuchsias" class="img-fluid" data-dcnode-id="1629" data-src="https://gardenseeker.co.uk/images/fuchsia-mini-rose.webp" height="186" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/fuchsia-mini-rose.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="280"><p align="center" data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Fuchsias</span></p></div><p class="card-text" data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Fuchsia plants can often look after themselves quite well without any form of pruning. They are naturally floriferous and are rarely without flowers in the summer months. However, to get the best shape – and even more flowers than normal – a regular pruning (snipping) regime is beneficial in younger plants. Basically, the more shoots or branches your Fuchsia has, the more flowers it will be able to produce.
</span></p><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Firstly, determine what type of Fuchsia you have. This is not always easy with very young plants bought from the garden centre or nursery because a bush and trailing Fuchsia will look very similar with just a few shoots and leaves. Standard Fuchsias of course are very recognisable! Hopefully you can trust the plant label, which should tell you if it is a trailing, bush or hardy fuchsia.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><div align="center" data-dcnode-id="1618"><a class="button button1" data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-fuchsias.html"><span data-dcnode-id="1620" instrument_node="">How to Prune Fuchsias</span></a></div><span data-dcnode-id="1617" instrument_node="">
</span></div><span data-dcnode-id="1615" instrument_node="">
</span></div><hr data-dcnode-id="1613"><div class="card" data-dcnode-id="1591"><span data-dcnode-id="1612" instrument_node="">
</span><div class="card-body" data-dcnode-id="1593"><span data-dcnode-id="1611" instrument_node="">
</span><div class="card-header" data-dcnode-id="1608"><h2 data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Hard pruning of Fuchsias</span></h2></div><span data-dcnode-id="1607" instrument_node="">
</span><div data-dcnode-id="1603" style="float:right"><img alt="Hard Pruning" class="img-fluid" data-dcnode-id="1606" data-src="https://gardenseeker.co.uk/pruning/images/Pruning_Hard_Catalpa.webp" height="319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Pruning_Hard_Catalpa.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="250"><p align="center" data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Hard Pruning</span></p></div><p class="card-text" data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Fuchsia plants can often look after themselves but if you require to hard prune it, follow the hard pruning of shrubs.
</span></p><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">
To rejuvenate old shrubs or bring back into line shrubs such as Brachyglottis and Hypericum. Most shrubs can be given a new lease of life by cutting back hard. However, realise that the shrub will not stay small simply because you have given it a short back and sides. It will spring back into growth with a new enthusiasm.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><div align="center" data-dcnode-id="1595"><a class="button button1" data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hard.htm"><span data-dcnode-id="1597" instrument_node="">View Hard pruning of Fuchsias</span></a></div><span data-dcnode-id="1594" instrument_node="">
</span></div><span data-dcnode-id="1592" instrument_node="">

</span><hr data-dcnode-id="1584"><h2 data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">G</span></h2><span data-dcnode-id="1581" instrument_node="">

</span><div class="card-header" data-dcnode-id="1576"><h2 data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">Pruning Garrya Eliptica</span></h2></div><span data-dcnode-id="1575" instrument_node="">
</span><div data-dcnode-id="1571" style="float:left"><img alt="Garrya Eliptica" class="img-fluid" data-dcnode-id="1574" data-src="https://gardenseeker.co.uk/pruning/images/gary503081.webp" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/gary503081.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Garrya Eliptica</span></p></div><p class="card-text" data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Garrya eliptica is one of those shrubs that rarely - if ever - needs pruning. However, if the need arises, there is a time and method that should be noted to ensure continuing crops of drooping tassels that this shrub is grown for.</span></p><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Garrya eliptica is best grown against a wall or sturdy fence, so can over time be a bit overbearing - Something that should be borne in mind at planting or design time, for it rarely responds in the normal manner when the secateurs are used.</span></p><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">As well as being suitable as a wall shrub, it is quite spectacular as a large stand alone specimen shrub. I this case there are several ways in  which it can be trained and pruned.</span></p><span data-dcnode-id="1564" instrument_node="">
</span><div align="center" data-dcnode-id="1561"><a class="button button1" data-dcnode-id="1562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-garrya-elliptica.html"><span data-dcnode-id="1563" instrument_node="">How to Prune Garrya Eliptica</span></a></div><span data-dcnode-id="1560" instrument_node="">
</span></div><span data-dcnode-id="1558" instrument_node="">
</span></div><hr data-dcnode-id="1556"><div class="card" data-dcnode-id="1532"><span data-dcnode-id="1555" instrument_node="">
</span><div class="card-body" data-dcnode-id="1534"><span data-dcnode-id="1554" instrument_node="">
</span><div class="card-header" data-dcnode-id="1551"><h2 data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Pruning Gaultheria</span></h2></div><span data-dcnode-id="1550" instrument_node="">
</span><div data-dcnode-id="1546" style="float:right"><img alt="Gaultheria Myrsinoides" class="img-fluid" data-dcnode-id="1549" data-src="https://gardenseeker.co.uk/images/Gaultheria-myrsinoides.webp" height="204" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Gaultheria-myrsinoides.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Gaultheria Myrsinoides</span></p></div><p class="card-text" data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Pruning Gaultheria is the same method and instruction as pruning Azaleas. </span></p><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Azalea and Rhododendron Pruning and for or all other evergreen shrubs that flower in late winter, spring, or early summer.</span></p><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">The most basic form of pruning - often sufficient, is simply to dead-head the old flowers - before they are allowed to make seed - by cutting back to first set of buds. If any shoots spoil the overall shape of the shrub, they can be cut back to a suitable position. </span></p><span data-dcnode-id="1539" instrument_node="">
</span><div align="center" data-dcnode-id="1536"><a class="button button1" data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_berberis_deciduous.htm"><span data-dcnode-id="1538" instrument_node="">How to Prune Gaultheria</span></a></div><span data-dcnode-id="1535" instrument_node="">
</span></div><span data-dcnode-id="1533" instrument_node="">
</span></div><hr data-dcnode-id="1531"><ul data-dcnode-id="1525"><li data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Genista</span></li><span data-dcnode-id="1528" instrument_node=""> </span><li data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Griselinia - Can be cut back quite hard at start of Spring growing season.</span></li></ul><hr data-dcnode-id="1524"><span data-dcnode-id="1523" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="fluid" data-ad-layout-key="-gu-19-1v-by+x2" data-ad-slot="3855732809" data-dcnode-id="1522" style="display:block"></ins><span data-dcnode-id="1521" instrument_node="">
</span><hr data-dcnode-id="1518"><h2 data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">H</span></h2><span data-dcnode-id="1515" instrument_node=""> </span><div class="card" data-dcnode-id="1493"><span data-dcnode-id="1514" instrument_node="">
</span><div class="card-body" data-dcnode-id="1495"><span data-dcnode-id="1513" instrument_node="">
</span><div class="card-header" data-dcnode-id="1510"><h2 data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Pruning Hamamelis Mollis</span></h2></div><span data-dcnode-id="1509" instrument_node="">
</span><div data-dcnode-id="1505" style="float:left"><img alt="hamamelis pallida" class="img-fluid" data-dcnode-id="1508" data-src="https://gardenseeker.co.uk/pruning/images/hamamelis-pallida-501036.webp" height="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/hamamelis-pallida-501036.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="249"><p align="center" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Hamamelis Pallida</span></p></div><p class="card-text" data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">This should be the shortest page on the website, for the Witch Hazels - Hamamelis - rarely if ever, need any pruning.</span></p><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">But of course, all of us gardeners need to do things that don't really need doing, or have to rectify something we did or planted many years previous, as we find out that the said shrub or plants, does indeed grow to the height stated on the label. This is as it is with Hamamelis.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><div align="center" data-dcnode-id="1497"><a class="button button1" data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hamamelis_witch_hazel.htm"><span data-dcnode-id="1499" instrument_node="">How to Prune Hamamelis Mollis</span></a></div><span data-dcnode-id="1496" instrument_node="">
</span></div><span data-dcnode-id="1494" instrument_node="">
</span></div><hr data-dcnode-id="1492"><div class="card" data-dcnode-id="1470"><span data-dcnode-id="1491" instrument_node="">
</span><div class="card-body" data-dcnode-id="1472"><span data-dcnode-id="1490" instrument_node="">
</span><div class="card-header" data-dcnode-id="1487"><h2 data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Pruning Guide for Hebe shrubs</span></h2></div><span data-dcnode-id="1486" instrument_node="">
</span><div data-dcnode-id="1482" style="float:left"><img alt="Hebe Eliptica" class="img-fluid" data-dcnode-id="1485" data-src="https://gardenseeker.co.uk/pruning/images/Hebe_eliptica_fs.webp" height="190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Hebe_eliptica_fs.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="242"><p align="center" data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Hebe Eliptica</span></p></div><p class="card-text" data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Most Hebes need little or no pruning. However the larger-leaved types are prone to damaged stems, and these can be safely cut back at any time during the growing season.</span></p><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Dead-heading of old flowers on Hebe plants is well worth the effort. It can extend the flowering period, or encourage a further show of flowers later in the year. If your particular plant becomes straggly, then cutting back hard - to within 30cm of the ground - will rejuvenate it. However, this last option should be done with care! See below.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><div align="center" data-dcnode-id="1474"><a class="button button1" data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hebess.htm"><span data-dcnode-id="1476" instrument_node="">How to Prune Guide for Hebe shrubs</span></a></div><span data-dcnode-id="1473" instrument_node="">
</span></div><span data-dcnode-id="1471" instrument_node="">
</span></div><hr data-dcnode-id="1469"><div class="card" data-dcnode-id="1447"><span data-dcnode-id="1468" instrument_node="">
</span><div class="card-body" data-dcnode-id="1449"><span data-dcnode-id="1467" instrument_node="">
</span><div class="card-header" data-dcnode-id="1464"><h2 data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Pruning Honeysuckle</span></h2></div><span data-dcnode-id="1463" instrument_node="">
</span><div data-dcnode-id="1459" style="float:right"><img alt="Lonicera periclymenum Serotina" class="img-fluid" data-dcnode-id="1462" data-src="https://gardenseeker.co.uk/pruning/images/Lonicera-periclymenum-Serotina-310172.webp" height="277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Lonicera-periclymenum-Serotina-310172.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="313"><p align="center" data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Lonicera Periclymenum Serotina</span></p></div><p class="card-text" data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Honeysuckle Pruning. If honeysuckles are pruned wrongly, then it could mean the loss of flowers for the following - or present - year. Pruning of honeysuckles is relatively easy, though can be a bit messy if pruning a neglected climber  that has wrapped itself around an old trellis or frame for the last ten years!</span></p><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Most will know Lonicera as climbing shrubs - better known as Honeysuckle. However, there are also a group of Loniceras - or Honeysuckles that are actually grown as shrubs.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><div align="center" data-dcnode-id="1451"><a class="button button1" data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_honeysuckle-lonicera.htm"><span data-dcnode-id="1453" instrument_node="">How to Prune Honeysuckle</span></a></div><span data-dcnode-id="1450" instrument_node="">
</span></div><span data-dcnode-id="1448" instrument_node="">
</span></div><hr data-dcnode-id="1446"><div class="card" data-dcnode-id="1424"><span data-dcnode-id="1445" instrument_node="">
</span><div class="card-body" data-dcnode-id="1426"><span data-dcnode-id="1444" instrument_node="">
</span><div class="card-header" data-dcnode-id="1441"><h2 data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Pruning Hydrangeas Macrophylla</span></h2></div><span data-dcnode-id="1440" instrument_node="">
</span><div data-dcnode-id="1436" style="float:left"><img alt="Hydrangea serrata Bluebird" class="img-fluid" data-dcnode-id="1439" data-src="https://gardenseeker.co.uk/pruning/images/Hydrangea_serrata_bluebird_lacecap-410200.webp" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Hydrangea_serrata_bluebird_lacecap-410200.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="320"><p align="center" data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Hydrangea serrata Bluebird</span></p></div><p class="card-text" data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Hydrangea macrophylla types are the main garden Hydrangeas grown in the UK. The group is split into two distinct flower types – The Mopheads and the Lacecaps. For the purpose of this page, they can be treated in the same manner as far as pruning is concerned. Both Mophead and Lacecap Hydrangeas benefit from pruning to keep shape and size under control, but neither actually ‘Need’ pruning.</span></p><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">If they are to be pruned, then the information and illustrations below will guide you through the very simple pruning operation. Do it in the right manner, and at the right time of year, and you should have a good succession of blooms and new shoots. Un-pruned Hydrangeas in this group tend to lose flower size as the years go by.</span></p><span data-dcnode-id="1431" instrument_node="">
</span><div align="center" data-dcnode-id="1428"><a class="button button1" data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hydrangeas.htm"><span data-dcnode-id="1430" instrument_node="">How to Prune Hydrangeas Macrophylla</span></a></div><span data-dcnode-id="1427" instrument_node="">
</span></div><span data-dcnode-id="1425" instrument_node="">
</span></div><hr data-dcnode-id="1423"><div class="card" data-dcnode-id="1401"><span data-dcnode-id="1422" instrument_node="">
</span><div class="card-body" data-dcnode-id="1403"><span data-dcnode-id="1421" instrument_node="">
</span><div class="card-header" data-dcnode-id="1418"><h2 data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Pruning Hydrangea Paniculata Grandiflora</span></h2></div><span data-dcnode-id="1417" instrument_node="">
</span><div data-dcnode-id="1413" style="float:left"><img alt="Hydrangea paniculata Pink Diamond" class="img-fluid" data-dcnode-id="1416" data-src="https://gardenseeker.co.uk/pruning/images/hydr209055.webp" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/hydr209055.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="276"><p align="center" data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Hydrangea Paniculata Pink Diamond</span></p></div><p class="card-text" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">This group of Hydrangeas – the H. paniculata and H. arborescens types - differ from the normal mop head varieties, which flower on growth made in the previous growing season. Both Hydrangea paniculata and H. arborescens flower on shoots made in the current season of growth, so need to be pruned differently in early spring to ensure a good crop of new stems which will then bear the large flowers on the end of the arching stems.</span></p><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Pruning should be carried out in February or March. Prune the old stems back either to near ground level, or to a main trunk which has been allowed to grow to give the shrub extra height.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><div align="center" data-dcnode-id="1405"><a class="button button1" data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hydrangea_panuculata.htm"><span data-dcnode-id="1407" instrument_node="">How to Prune Hydrangea Paniculata Grandiflora</span></a></div><span data-dcnode-id="1404" instrument_node="">
</span></div><span data-dcnode-id="1402" instrument_node="">
</span></div><hr data-dcnode-id="1400"><div class="card" data-dcnode-id="1378"><span data-dcnode-id="1399" instrument_node="">
</span><div class="card-body" data-dcnode-id="1380"><span data-dcnode-id="1398" instrument_node="">
</span><div class="card-header" data-dcnode-id="1395"><h2 data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Pruning Hypericum Calycinum</span></h2></div><span data-dcnode-id="1394" instrument_node="">
</span><div data-dcnode-id="1390" style="float:left"><img alt="St John's Wort" class="img-fluid" data-dcnode-id="1393" data-src="https://gardenseeker.co.uk/pruning/images/hype211140.webp" height="179" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/hype211140.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="251"><p align="center" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">St John's Wort</span></p></div><p class="card-text" data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Hypericums are a wide range of garden shrubs, but generally fall into two groups as far as pruning is concerned. St Johns Wort and Rose of Sharon types.</span></p><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">The shrubby varieties of HHypericum such as Hypericum 'Hidcote' should be pruned in spring - March or April depending upon area and weather conditions. The low growing Hypericum calycinum - better known as St John Wort -  should be pruned hard in late winter or very early spring. </span></p><span data-dcnode-id="1385" instrument_node="">
</span><div align="center" data-dcnode-id="1382"><a class="button button1" data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hypericum.htm"><span data-dcnode-id="1384" instrument_node="">How to Prune Hypericum Calycinum</span></a></div><span data-dcnode-id="1381" instrument_node="">
</span></div><span data-dcnode-id="1379" instrument_node="">
</span></div><hr data-dcnode-id="1377"><span data-dcnode-id="1376" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="fluid" data-ad-layout-key="-gu-19-1v-by+x2" data-ad-slot="3855732809" data-dcnode-id="1375" style="display:block"></ins><span data-dcnode-id="1374" instrument_node="">
</span><hr data-dcnode-id="1371"><h2 data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">J</span></h2><span data-dcnode-id="1368" instrument_node=""> </span><div class="card" data-dcnode-id="1346"><span data-dcnode-id="1367" instrument_node="">
</span><div class="card-body" data-dcnode-id="1348"><span data-dcnode-id="1366" instrument_node="">
</span><div class="card-header" data-dcnode-id="1363"><h2 data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Pruning Winter Jasmine</span></h2></div><span data-dcnode-id="1362" instrument_node="">
</span><div data-dcnode-id="1358" style="float:left"><img alt="Jasminum Nudiflorum" class="img-fluid" data-dcnode-id="1361" data-src="https://gardenseeker.co.uk/pruning/images/jasm503075.webp" height="306" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/jasm503075.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="298"><p align="center" data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Jasminum Nudiflorum</span></p></div><p class="card-text" data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Winter Flowering Jasmine - Jasminum nudiflorum -  are often seen as a straggly mass of untidy stems. Not too bad a description for the shrub generally. But, this can be changed by correct pruning of Winter Jasmine; at the correct time.</span></p><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Simply cut back the flowered shoots, to below where the flowering started - as soon as possible after flowers have finished. Or, if grown as a close-cropped wall shrub, clip back the flowered growth with a pair of shears - once finished flowering.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><div align="center" data-dcnode-id="1350"><a class="button button1" data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-winter-jasmine.html"><span data-dcnode-id="1352" instrument_node="">How to Prune Winter Jasmine</span></a></div><span data-dcnode-id="1349" instrument_node="">
</span></div><span data-dcnode-id="1347" instrument_node="">
</span></div><hr data-dcnode-id="1345"><div class="card" data-dcnode-id="1323"><span data-dcnode-id="1344" instrument_node="">
</span><div class="card-body" data-dcnode-id="1325"><span data-dcnode-id="1343" instrument_node="">
</span><div class="card-header" data-dcnode-id="1340"><h2 data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Pruning Summer Jasmine</span></h2></div><span data-dcnode-id="1339" instrument_node="">
</span><div data-dcnode-id="1335" style="float:left"><img alt="The golden form of Summer Jasmine" class="img-fluid" data-dcnode-id="1338" data-src="https://gardenseeker.co.uk/pruning/images/golden-jasmine.webp" height="314" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/golden-jasmine.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="348"><p align="center" data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Golden Summer Jasmine</span></p></div><p class="card-text" data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">How to keep this vigorous climbing summer jasmine plant tidy, under control and producing masses of highly-scented white flowers.</span></p><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">The main reasons to prune summer jasmine - Jasminum officinale is to keep it under control and more importantly, to generate new vines. Providing all other conditions of care are in place, this should ensure masses of the pure white, highly fragrant flowers which are the main attraction.</span></p><span data-dcnode-id="1330" instrument_node="">
</span><div align="center" data-dcnode-id="1327"><a class="button button1" data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-summer-jasmine.html"><span data-dcnode-id="1329" instrument_node="">How to Prune Summer Jasmine</span></a></div><span data-dcnode-id="1326" instrument_node="">

</span><div data-dcnode-id="1304" style="float:right"><img alt="Kalmia Latifolia" class="img-fluid" data-dcnode-id="1307" data-src="https://gardenseeker.co.uk/images/Kalmia-latifolia.webp" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Kalmia-latifolia.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Kalmia Latifolia</span></p></div><p class="card-text" data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Pruning Kalmia is the same instructions as pruning Rhododendrons.</span></p><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">The most basic form of pruning - often sufficient, is simply to dead-head the old flowers - before they are allowed to make seed - by cutting back to first set of buds. If any shoots spoil the overall shape of the shrub, they can be cut back to a suitable position.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><div align="center" data-dcnode-id="1296"><a class="button button1" data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_azaleas_rhododendrons.htm"><span data-dcnode-id="1298" instrument_node="">How to Prune Kalmia</span></a></div><span data-dcnode-id="1295" instrument_node="">

</span><div class="card-header" data-dcnode-id="1285"><h2 data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Pruning Guide for Kerria Japonica</span></h2></div><span data-dcnode-id="1284" instrument_node="">
</span><div data-dcnode-id="1280" style="float:left"><img alt="Pruning Kerria" class="img-fluid" data-dcnode-id="1283" data-src="https://gardenseeker.co.uk/pruning/images/PruningKerria1IN.webp" height="226" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/PruningKerria1IN.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="272"><p align="center" data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Pruning Kerria</span></p></div><p class="card-text" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">It is important to prune Kerrias just after flowering in late Spring. The flowered shoots are simply cut back, allowing the new growth to ripen for next year's flower crop. It must be done right after flowering - certainly by mid-June for best effect.</span></p><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Kerria japonica Flore plene, and Pleniflora, together with the variegated  kerria Picta pr Variegatum are deciduous shrubs that flower early in the year on growth made in the previous year.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><div align="center" data-dcnode-id="1272"><a class="button button1" data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_kerria_cytisus.htm"><span data-dcnode-id="1274" instrument_node="">How to Prune Guide for Kerria Japonica</span></a></div><span data-dcnode-id="1271" instrument_node="">
</span></div><span data-dcnode-id="1269" instrument_node="">
</span></div><hr data-dcnode-id="1267"><div class="card" data-dcnode-id="1243"><span data-dcnode-id="1266" instrument_node="">
</span><div class="card-body" data-dcnode-id="1245"><span data-dcnode-id="1265" instrument_node="">
</span><div class="card-header" data-dcnode-id="1262"><h2 data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Pruning Kolkwitzia Amabilis</span></h2></div><span data-dcnode-id="1261" instrument_node="">
</span><div data-dcnode-id="1257" style="float:right"><img alt="Kolkwitzia Amabilis - The Beauty Bush" class="img-fluid" data-dcnode-id="1260" data-src="https://gardenseeker.co.uk/pruning/images/Kolkwitzia_amabilis1.webp" height="219" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/Kolkwitzia_amabilis1.webp&amp;raw" style="padding-right:10px; padding-left:10px; padding-top:10px" width="309"><p align="center" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Kolkwitzia Amabilis - The Beauty Bush</span></p></div><p class="card-text" data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Kolkwitzia amabilis and other Kolkwitzias are not commonly known as Beauty Bush for nothing.</span></p><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">With proper pruning, this shrub has masses of arching stems of bell-like pink flowers in late spring or early summer.</span></p><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">You will need to be decisive when you prune this shrub, in order to get the best out of it. We show you how to prune Kolkwitzias.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><div align="center" data-dcnode-id="1247"><a class="button button1" data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_kolkwitzia.htm"><span data-dcnode-id="1249" instrument_node="">How to Prune Kolkwitzia Amabilis</span></a></div><span data-dcnode-id="1246" instrument_node="">
</span></div><span data-dcnode-id="1244" instrument_node="">
</span></div><hr data-dcnode-id="1242"><span data-dcnode-id="1241" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1210860864729907" data-ad-format="fluid" data-ad-layout-key="-gu-19-1v-by+x2" data-ad-slot="3855732809" data-dcnode-id="1240" style="display:block"></ins><span data-dcnode-id="1239" instrument_node="">
</span><hr data-dcnode-id="1236"><hr data-dcnode-id="1235"><span data-dcnode-id="1234" instrument_node="">

</span><div class="col-lg-6 col-xl-6 col-md-6 col-sm-12 col-12" data-dcnode-id="174"><div class="jumbotron" data-dcnode-id="1229"><h2 data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">L</span></h2></div><div class="card" data-dcnode-id="1207"><span data-dcnode-id="1228" instrument_node="">
</span><div class="card-body" data-dcnode-id="1209"><span data-dcnode-id="1227" instrument_node="">
</span><div class="card-header" data-dcnode-id="1224"><h2 data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Pruning Laurus Nobilis</span></h2></div><span data-dcnode-id="1223" instrument_node="">
</span><div data-dcnode-id="1219" style="float:left"><img alt="Laurus nobilis" class="img-fluid" data-dcnode-id="1222" data-src="https://gardenseeker.co.uk/pruning/images/iStock_000001951456XSmall.webp" height="325" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/iStock_000001951456XSmall.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="249"><p align="center" data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Laurus Nobilis</span></p></div><p class="card-text" data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Bay trees are grown in all manner of situations. As a large shrub - given enough room - they will not need basic pruning. As an ornamental - topiary - Bay Leaf Tree, they will need regular pruning to keep them in a tidy shape.</span></p><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Winter damage is often a problem of bay trees, with browning of much of the foliage - also wind scorch damage. Both problems can be addressed by pruning as required to remove the unsightly branches. they soon grow back.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><div align="center" data-dcnode-id="1211"><a class="button button1" data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_bay_leaf_trees.htm"><span data-dcnode-id="1213" instrument_node="">How to Prune Laurus Nobilis</span></a></div><span data-dcnode-id="1210" instrument_node="">
</span></div><span data-dcnode-id="1208" instrument_node="">
</span></div><hr data-dcnode-id="1206"><div class="card" data-dcnode-id="1184"><span data-dcnode-id="1205" instrument_node="">
</span><div class="card-body" data-dcnode-id="1186"><span data-dcnode-id="1204" instrument_node="">
</span><div class="card-header" data-dcnode-id="1201"><h2 data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Pruning Laurus Tinus - Viburnum</span></h2></div><span data-dcnode-id="1200" instrument_node="">
</span><div data-dcnode-id="1196" style="float:left"><img alt="Laurus Tinus - French White" class="img-fluid" data-dcnode-id="1199" data-src="https://gardenseeker.co.uk/pruning/images/vibu302147.webp" height="217" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/vibu302147.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="290"><p align="center" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Laurus Tinus - French White</span></p></div><p class="card-text" data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">The easy thing to remember about pruning Viburnums - deciduous or evergreen - is that they should ideally be pruned soon after flowering. Within a month of finishing flowering is good, but a little later is also suitable. As some of them flower in winter, then the weather conditions outside may be the determining factor!</span></p><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Viburnum are one of the most popular groups of shrubs with a wide range of growth habits and flowering times. Most flower either in winter or late spring. They all flower on stems or growths that we made in the year previous - starting from early spring and carrying on through summer. That is to say that they produce either flower buds or flowering wood/twigs in the year before actually flowering.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><div align="center" data-dcnode-id="1188"><a class="button button1" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-viburnum-deciduous-evergreen.html"><span data-dcnode-id="1190" instrument_node="">View Laurus Tinus - Viburnum</span></a></div><span data-dcnode-id="1187" instrument_node="">
</span></div><span data-dcnode-id="1185" instrument_node="">
</span></div><hr data-dcnode-id="1183"><ul data-dcnode-id="1176"><li data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Lavandula - Lavender</span></li><span data-dcnode-id="1180" instrument_node=""> </span><li data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Leucothoe - rarely, and if so, just to shape - in early spring</span></li><span data-dcnode-id="1177" instrument_node=""> </span></ul><div class="card" data-dcnode-id="1154"><span data-dcnode-id="1175" instrument_node="">
</span><div class="card-body" data-dcnode-id="1156"><span data-dcnode-id="1174" instrument_node="">
</span><div class="card-header" data-dcnode-id="1171"><h2 data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Pruning Lavatera</span></h2></div><span data-dcnode-id="1170" instrument_node="">
</span><div data-dcnode-id="1166" style="float:right"><img alt="Lavatera-maritima" class="img-fluid" data-dcnode-id="1169" data-src="https://gardenseeker.co.uk/images/Lavatera-maritima.webp" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Lavatera-maritima.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Lavatera Maritima</span></p></div><p class="card-text" data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Pruning Lavatera is the same instructions as Hard Pruning.</span></p><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">To rejuvenate old shrubs or bring back into line shrubs such as Brachyglottis and Hypericum. Most shrubs can be given a new lease of life by cutting back hard. However, realise that the shrub will not stay small simply because you have given it a short back and sides. It will spring back into growth with a new enthusiasm.</span></p><span data-dcnode-id="1161" instrument_node="">
</span><div align="center" data-dcnode-id="1158"><a class="button button1" data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hard.htm"><span data-dcnode-id="1160" instrument_node="">How to Prune Lavatera</span></a></div><span data-dcnode-id="1157" instrument_node="">
</span></div><span data-dcnode-id="1155" instrument_node="">
</span></div><hr data-dcnode-id="1153"><div class="card" data-dcnode-id="1131"><span data-dcnode-id="1152" instrument_node="">
</span><div class="card-body" data-dcnode-id="1133"><span data-dcnode-id="1151" instrument_node="">
</span><div class="card-header" data-dcnode-id="1148"><h2 data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">When and how to Prune Laurels </span></h2></div><span data-dcnode-id="1147" instrument_node="">
</span><div data-dcnode-id="1143" style="float:left"><img alt="prunus laurocerasus" class="img-fluid" data-dcnode-id="1146" data-src="https://gardenseeker.co.uk/pruning/images/prunus-laurocerasus-foliage.webp" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/images/prunus-laurocerasus-foliage.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="290"><p align="center" data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Prunus Laurocerasus</span></p></div><p class="card-text" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Cherry laurels are grown for a number of different reasons and purposes,  but basically the pruning regime insofar as timing is concerned is the same for all. The main difference of how to prune laurels depends upon the variety and the habit of growth.</span></p><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">Some Laurels are grown as ground cover plants.  Others are grown as , large shrubs, hedges or screens. As with all evergreen shrubs , they are best pruned in the growing season. If you want the added feature of flowers, then timing is quite important.</span></p><span data-dcnode-id="1138" instrument_node="">
</span><div align="center" data-dcnode-id="1135"><a class="button button1" data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning-laurels-prunus-laurocerasus.html"><span data-dcnode-id="1137" instrument_node="">View When and how to Prune Laurels </span></a></div><span data-dcnode-id="1134" instrument_node="">
</span></div><span data-dcnode-id="1132" instrument_node="">
</span></div><hr data-dcnode-id="1130"><div class="card" data-dcnode-id="1108"><span data-dcnode-id="1129" instrument_node="">
</span><div class="card-body" data-dcnode-id="1110"><span data-dcnode-id="1128" instrument_node="">
</span><div class="card-header" data-dcnode-id="1125"><h2 data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Pruning Leptospermum</span></h2></div><span data-dcnode-id="1124" instrument_node="">
</span><div data-dcnode-id="1120" style="float:left"><img alt="Leptospermum Scoparium" class="img-fluid" data-dcnode-id="1123" data-src="https://gardenseeker.co.uk/images/Leptospermum-scoparium.webp" height="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Leptospermum-scoparium.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Leptospermum Scoparium</span></p></div><p class="card-text" data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Pruning Leptospermum is the same instructions as Rhododendrons. </span></p><p data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">The most basic form of pruning - often sufficient, is simply to dead-head the old flowers - before they are allowed to make seed - by cutting back to first set of buds. If any shoots spoil the overall shape of the shrub, they can be cut back to a suitable position. </span></p><span data-dcnode-id="1115" instrument_node="">
</span><div align="center" data-dcnode-id="1112"><a class="button button1" data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_azaleas_rhododendrons.htm"><span data-dcnode-id="1114" instrument_node="">How to Prune Leptospermum</span></a></div><span data-dcnode-id="1111" instrument_node="">

</span><div class="card-body" data-dcnode-id="1087"><span data-dcnode-id="1105" instrument_node="">
</span><div class="card-header" data-dcnode-id="1102"><h2 data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Pruning Leycesteria</span></h2></div><span data-dcnode-id="1101" instrument_node="">
</span><div data-dcnode-id="1097" style="float:right"><img alt="Leycesteria Formosa" class="img-fluid" data-dcnode-id="1100" data-src="https://gardenseeker.co.uk/images/Leycesteria-formosa.webp" height="225" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/images/Leycesteria-formosa.webp&amp;raw" style="padding-right:10px; padding-top:10px" width="300"><p align="center" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Leycesteria Formosa</span></p></div><p class="card-text" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Pruning Leycesteria is the same instructions as Hard Pruning</span></p><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">To rejuvenate old shrubs or bring back into line shrubs such as Brachyglottis and Hypericum. Most shrubs can be given a new lease of life by cutting back hard. However, realise that the shrub will not stay small simply because you have given it a short back and sides. It will spring back into growth with a new enthusiasm.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><div align="center" data-dcnode-id="1089"><a class="button button1" data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenseeker.co.uk/pruning/pruning_hard.htm"><span data-dcnode-id="1091" instrument_node="">How to Prune Leycesteria</span></a></div><span data-dcnode-id="1088" instrument_node="">
