</span><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Before we get started, I want to mention that there are a few different kinds of lavender plants.</span></p><span data-dcnode-id="1665" instrument_node="">
</span><p data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">English lavender is the most common (and the hardiest), and it’s the variety that I grow. But don’t worry, the basics of pruning are the same for all types of lavender, both in the garden or in pots.</span></p><span data-dcnode-id="1662" instrument_node="">
</span><p data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">So, you can follow these steps whether you’re pruning English lavender like mine, or if you have Spanish or French lavender.</span></p><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">The only difference is that English lavender can handle a harder pruning in the summer than French or Spanish lavender can.</span></p><span data-dcnode-id="1656" instrument_node="">

-page-1 ez-toc-heading-level-2" data-dcnode-id="1622"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="1623" href="#Tips_For_Pruning_Lavender_In_Summer" title="Tips For Pruning Lavender In Summer"><span data-dcnode-id="1624" instrument_node="">Tips For Pruning Lavender In Summer</span></a></li></ul></nav></div><span data-dcnode-id="1618" instrument_node="">
</span><h2 data-dcnode-id="1614" id="h-why-should-lavender-be-cut-back"><span class="ez-toc-section" data-dcnode-id="1617" id="Why_Should_Lavender_Be_Cut_Back"></span><span data-dcnode-id="1616" instrument_node="">Why Should Lavender Be Cut Back?</span><span class="ez-toc-section-end" data-dcnode-id="1615"></span></h2><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1612" instrument_node="">If you’re new to growing lavender plants, you might not know that </span><a data-dcnode-id="1610" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/pruning-plants/"><span data-dcnode-id="1611" instrument_node="">pruning</span></a><span data-dcnode-id="1609" instrument_node=""> is a very important part of lavender maintenance.</span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Pruning lavender regularly keeps them looking nice, encourages flowering, and prevents them from getting too woody or growing scraggly and sparse.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">But before you grab your pruners, it’s important to understand exactly how to prune lavender plants, because over pruning can end up killing your plant.</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">Don’t worry, cutting back lavender plants is not as scary as it sounds, and you’ll get the hang of it in no time!</span></p><span data-dcnode-id="1598" instrument_node="">
</span><div class="wp-block-image wp-image-17771 size-full" data-dcnode-id="1588"><figure class="aligncenter" data-dcnode-id="1589"><picture class="wp-image-17771 sp-no-webp" data-dcnode-id="1592" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.jpg"><source data-dcnode-id="1597" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1596" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring-300x198.jpg 300w" type="image/jpeg"><img alt="My lavender plant before pruning in spring" class="wp-image-17771 sp-no-webp entered lazyloaded" data-dcnode-id="1595" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring-300x198.jpg 300w" width="640"><noscript data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.jpg" class="wp-image-17771 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.jpg" alt="My lavender plant before pruning in spring" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-before-pruning-in-spring-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">My lavender plant before pruning in spring</span></figcaption></figure></div><span data-dcnode-id="1587" instrument_node="">
</span><h2 data-dcnode-id="1583" id="h-what-happens-if-you-don-t-prune-lavender"><span class="ez-toc-section" data-dcnode-id="1586" id="What_Happens_If_You_Dont_Prune_Lavender"></span><span data-dcnode-id="1585" instrument_node="">What Happens If You Don’t Prune Lavender?</span><span class="ez-toc-section-end" data-dcnode-id="1584"></span></h2><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1581" instrument_node="">If you do not prune lavender, the plant can become overgrown, scraggly, and it might not bloom as profusely.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">So, if you want to make sure that this doesn’t happen to your plant, you should get into the habit of trimming it regularly.</span></p><span data-dcnode-id="1576" instrument_node="">
</span><h2 data-dcnode-id="1572" id="h-when-to-prune-lavender-plants"><span class="ez-toc-section" data-dcnode-id="1575" id="When_To_Prune_Lavender_Plants"></span><span data-dcnode-id="1574" instrument_node="">When To Prune Lavender Plants</span><span class="ez-toc-section-end" data-dcnode-id="1573"></span></h2><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Ideally, you should prune lavender twice a year – once in the spring just as the fresh growth starts coming in, and once in the summer right after it’s done blooming.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Summer pruning, which helps to keep the plant looking nice and encourages more flowers, is optional.</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">But spring pruning is very important to get rid of the ugly winter damage and encourage fresh lavender growth.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">So, if you only have time to prune lavender once per year, do it in the spring.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">It’s best to wait until you see leaves growing before cutting back lavender plants in the spring. That way, you will know exactly where to make your cuts.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">This usually means waiting until late spring or early summer to prune lavender.</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">I know it can be hard to wait so long before pruning lavender after winter, especially when the plant looks so ugly. But try to resist the urge to prune too early.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1543"><em data-dcnode-id="1547"><strong data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Related Post: </span></strong></em><a data-dcnode-id="1544" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/harvesting-lavender/"><em data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">How To Harvest Lavender Fresh From The Garden</span></em></a></p><span data-dcnode-id="1542" instrument_node="">
</span><div class="wp-block-image wp-image-17773 size-full" data-dcnode-id="1532"><figure class="aligncenter" data-dcnode-id="1533"><picture class="wp-image-17773 sp-no-webp" data-dcnode-id="1536" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.jpg"><source data-dcnode-id="1541" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1540" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring-300x198.jpg 300w" type="image/jpeg"><img alt="Wait for new growth before cutting back lavender in spring" class="wp-image-17773 sp-no-webp entered lazyloaded" data-dcnode-id="1539" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring-300x198.jpg 300w" width="640"><noscript data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.jpg" class="wp-image-17773 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.jpg" alt="Wait for new growth before cutting back lavender in spring" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/wait-for-new-growth-before-cutting-back-lavender-in-spring-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">Wait for new growth before cutting back lavender plants in spring</span></figcaption></figure></div><span data-dcnode-id="1531" instrument_node="">
</span><h2 data-dcnode-id="1527" id="h-tools-for-pruning-lavender-plants"><span class="ez-toc-section" data-dcnode-id="1530" id="Tools_For_Pruning_Lavender_Plants"></span><span data-dcnode-id="1529" instrument_node="">Tools For Pruning Lavender Plants</span><span class="ez-toc-section-end" data-dcnode-id="1528"></span></h2><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1525" instrument_node="">For pruning lavender in spring, you’ll want to use </span><a data-dcnode-id="1523" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Fiskars-Multi-Snip-with-Sheath-99206935J/dp/B001F0K14Y/ref%3Das_li_ss_tl%3Fie%3DUTF8%26qid%3D1464820978%26sr%3D8-27%26keywords%3Dfiskars%2Bpruners%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D40fc05caa5a1279f988137bbfe2d220d" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1524" instrument_node="">precision pruning snips</span></a><span data-dcnode-id="1522" instrument_node=""> or </span><a data-dcnode-id="1520" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B007GYMOKM/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB007GYMOKM%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3DJVI4VURARVJVC2VM" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1521" instrument_node="">small pruning shears</span></a><span data-dcnode-id="1519" instrument_node=""> so that you have full control and know exactly where you’re making the cuts.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1516" instrument_node="">You don’t have to be as precise with your cuts for summer pruning, so you can go ahead and use </span><a data-dcnode-id="1514" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00004R9YA/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB00004R9YA%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3DAIYJRL5CI3ZXFDNW" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1515" instrument_node="">hedge pruning shears</span></a><span data-dcnode-id="1513" instrument_node=""> or even a </span><a data-dcnode-id="1511" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Troy-Bilt-TB4400-22-Inch-Cordless-Trimmer/dp/B01ITE5GA2/ref%3Das_li_ss_tl%3Fie%3DUTF8%26qid%3D1526053675%26sr%3D8-1%26keywords%3Dtroy-bilt%2Bhedge%2Btrimmer%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D774c2c8345471aa62fb5cedd932f0b4e" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1512" instrument_node="">electric hedge trimmer</span></a><span data-dcnode-id="1510" instrument_node=""> to make quick work of trimming lavender bushes in the summer.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1507" instrument_node="">It’s also important to use clean, sharp pruning tools whenever you trim plants, so be sure to </span><a data-dcnode-id="1505" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/sharpen-pruning-shears/"><span data-dcnode-id="1506" instrument_node="">clean and sharpen your pruners</span></a><span data-dcnode-id="1504" instrument_node=""> before starting.</span></p><span data-dcnode-id="1502" instrument_node="">
</span><h2 data-dcnode-id="1498" id="h-lavender-pruning-techniques"><span class="ez-toc-section" data-dcnode-id="1501" id="Lavender_Pruning_Techniques"></span><span data-dcnode-id="1500" instrument_node="">Lavender Pruning Techniques</span><span class="ez-toc-section-end" data-dcnode-id="1499"></span></h2><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">The reason you want to wait until you see new leaves on the plant before trimming lavender in spring is because that way you will know exactly where to make your cuts.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">If you prune lavender too early, you could be cutting off the new growth before it starts, or worse – you might end up over pruning the plant.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Spring pruning is much more precise of a job than pruning lavender in summer. When trimming back lavender in the summer, you can focus on shaping the plant, rather than worrying about exactly where to make each cut.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">One important thing to keep in mind whenever you’re pruning lavender is to never cut the woody stems below the leaves.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Always be sure to leave some fresh green leaves on all of the stems. Stems that are pruned down too far will never grow back.</span></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1476"><em data-dcnode-id="1477"><strong data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Related Post: </span></strong><a data-dcnode-id="1478" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/drying-lavender/"><span data-dcnode-id="1479" instrument_node="">How To Dry Lavender From Your Garden</span></a></em></p><span data-dcnode-id="1475" instrument_node="">
</span><h2 data-dcnode-id="1471" id="h-how-to-prune-lavender-in-spring"><span class="ez-toc-section" data-dcnode-id="1474" id="How_To_Prune_Lavender_In_Spring"></span><span data-dcnode-id="1473" instrument_node="">How To Prune Lavender In Spring</span><span class="ez-toc-section-end" data-dcnode-id="1472"></span></h2><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Before you start cutting back lavender plants, take a close look at your plant to make sure there is plenty of new growth. If not, then give it a little more time to grow.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">If you see lots of fresh growth on the plant, then it’s safe to start pruning.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1461"><strong data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Here are the steps for trimming lavender plants in spring…</span></strong></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1456"><strong data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">Step 1: Find the fresh new leaves on the stem</span></strong><span data-dcnode-id="1457" instrument_node=""> – To figure out where to make the cut on each branch, find the spot where the new leaves are growing.</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Many times this will be towards the bottom of the stem, so carefully move any debris or other branches out of the way until you find it. The new leaf buds are very fragile and can easily break off when mishandled.</span></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">If there’s a bunch of scraggly new leaves at the top of the stem, find the spot where the thick fresh growth starts to get rid of all the scraggly bits on top. This will give you a fuller plant, and keep your lavender from getting too woody.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><div class="wp-block-image wp-image-17769 size-full" data-dcnode-id="1439"><figure class="aligncenter" data-dcnode-id="1440"><picture class="wp-image-17769 sp-no-webp" data-dcnode-id="1443" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.jpg"><source data-dcnode-id="1448" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1447" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants-300x198.jpg 300w" type="image/jpeg"><img alt="Find new growth before cutting back lavender plants" class="wp-image-17769 sp-no-webp entered lazyloaded" data-dcnode-id="1446" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants-300x198.jpg 300w" width="640"><noscript data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.jpg" class="wp-image-17769 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.jpg" alt="Find new growth before cutting back lavender plants" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/find-new-growth-before-cutting-back-lavender-plants-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Find new leaves before cutting back lavender plants</span></figcaption></figure></div><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1434"><strong data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Step 2: Prune lavender right above the new growth</span></strong><span data-dcnode-id="1435" instrument_node=""> – Cut the old stem back to just above the top of the new growth. Be careful when you’re cutting so that you don’t accidentally cut or break off any of the new leaves.</span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Try to make the cut as close to the new leaf buds as you can. If you leave the dead stems too long, you might see them sticking out all summer, which doesn’t look very nice.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">Just remember to always prune lavender above the leaves. Never cut lavender back to wood below all of the growth, because lavender will not grow back from old wood.</span></p><span data-dcnode-id="1427" instrument_node="">
</span><div class="wp-block-image wp-image-17768 size-full" data-dcnode-id="1417"><figure class="aligncenter" data-dcnode-id="1418"><picture class="wp-image-17768 sp-no-webp" data-dcnode-id="1421" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.jpg"><source data-dcnode-id="1426" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1425" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth-300x198.jpg 300w" type="image/jpeg"><img alt="Cut back lavender just above the new growth" class="wp-image-17768 sp-no-webp entered lazyloaded" data-dcnode-id="1424" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth-300x198.jpg 300w" width="640"><noscript data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.jpg" class="wp-image-17768 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.jpg" alt="Cut back lavender just above the new growth" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cut-back-lavender-just-above-the-new-growth-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Cut back lavender just above the new leaves</span></figcaption></figure></div><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1412"><strong data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Step 3: Cut off any dead branches</span></strong><span data-dcnode-id="1413" instrument_node=""> – You can cut any dead branches all the way down to get rid of them.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">However, I would strongly urge you to wait before you cut off any branches that look dead, especially if you’re new to pruning lavender.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Lavender can be very slow to get started in the spring. So you might find that those branches that look dead in early spring may end up growing in the summer.</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">So, to avoid over pruning lavender, I recommend leaving the branches that you’re not sure about on the plant until it’s time for summer pruning.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">If there’s still no growth on them by then, it’s safe to say they are dead, and you can remove them. Dead growth can safely be pruned from the plant at any time during the year.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1393"><em data-dcnode-id="1394"><strong data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Related Post: </span></strong><a data-dcnode-id="1395" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/growing-lavender-from-seed/"><span data-dcnode-id="1396" instrument_node="">How To Grow Lavender From Seed &amp; When To Plant</span></a></em></p><span data-dcnode-id="1392" instrument_node="">
</span><div class="wp-block-image wp-image-17772 size-full" data-dcnode-id="1382"><figure class="aligncenter" data-dcnode-id="1383"><picture class="wp-image-17772 sp-no-webp" data-dcnode-id="1386" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender.jpg"><source data-dcnode-id="1391" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/webp"><source data-dcnode-id="1390" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/jpeg"><img alt="New growth after pruning lavender" class="wp-image-17772 sp-no-webp" data-dcnode-id="1389" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender-300x198.jpg 300w" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender.jpg" data-pin-nopin="true" height="422" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20422'%3E%3C/svg%3E" width="640"><noscript data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender.jpg" class="wp-image-17772 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender.jpg" alt="New growth after pruning lavender" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/new-growth-after-pruning-lavender-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">New growth after pruning lavender</span></figcaption></figure></div><span data-dcnode-id="1381" instrument_node="">
</span><h2 data-dcnode-id="1377" id="h-tips-for-pruning-lavender-in-summer"><span class="ez-toc-section" data-dcnode-id="1380" id="Tips_For_Pruning_Lavender_In_Summer"></span><span data-dcnode-id="1379" instrument_node="">Tips For Pruning Lavender In Summer</span><span class="ez-toc-section-end" data-dcnode-id="1378"></span></h2><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">As I mentioned above, trimming back lavender in summer is totally optional. Summer pruning is good for shaping lavender plants, keeping them full and compact, and it helps to delay woody growth.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Plus, cutting back lavender plants in the summer after they’re done blooming will likely give you more flowers.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">After the plant is done blooming in the summer, cut back 1/3 to 1/2 of the new growth, being careful not to cut any branches down to the leafless wood.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">If you’re too nervous to cut it back that far, then you can try deadheading lavender instead. To deadhead lavender, simply remove all of the dead flower spikes, cutting them down to the tops of the main branches.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">If you want to grow more plants, be sure to keep some of your lavender cuttings from your summer pruning. Growing lavender from cuttings is fun and easy!</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1360" instrument_node="">If you’re interested in trying that, here’s my tutorial for </span><a data-dcnode-id="1358" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/propagate-lavender-plants/"><span data-dcnode-id="1359" instrument_node="">how to grow lavender from cuttings</span></a><span data-dcnode-id="1357" instrument_node="">.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><div class="wp-block-image wp-image-17770 size-full" data-dcnode-id="1345"><figure class="aligncenter" data-dcnode-id="1346"><picture class="wp-image-17770 sp-no-webp" data-dcnode-id="1349" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning.jpg"><source data-dcnode-id="1354" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/webp"><source data-dcnode-id="1353" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/jpeg"><img alt="My lavender plant after spring pruning" class="wp-image-17770 sp-no-webp" data-dcnode-id="1352" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning-300x198.jpg 300w" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning.jpg" data-pin-nopin="true" height="422" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20422'%3E%3C/svg%3E" width="640"><noscript data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning.jpg" class="wp-image-17770 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning.jpg" alt="My lavender plant after spring pruning" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-lavender-plant-after-spring-pruning-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">My lavender plant after spring pruning</span></figcaption></figure></div><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">It’s important to get into the habit of cutting back lavender plants on a regular basis. If you never prune lavender, the plant will grow to be woody and scraggly looking, which is not very pretty.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Pruning lavender not only gets rid of the ugly dead growth, but it also helps to trigger bushy growth, and gives you tons of flowers too.</span></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Now that you know exactly how and when to prune lavender, your plants will live a long and healthy life. And you will get to enjoy all those yummy smelling lavender flowers year after year.</span></p><span data-dcnode-id="1335" instrument_node="">

</span><p data-dcnode-id="1116"><span data-dcnode-id="1120" instrument_node="">I don’t recommend pruning your lavender so soon after planting it. I find that it’s best to wait at least a year so you can get familiar with their growth pattern, and once they are well established. It sounds to me like yours are suffering from transplant shock, and may also be either over or under watered. So you should definitely figure out the problem before you worry about pruning them. Here’s a detailed guide so you can troubleshoot what is wrong, and work to get your plant healthy again… </span><a data-dcnode-id="1118" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/lavender-plant-care/" rel="nofollow"><span data-dcnode-id="1119" instrument_node="">How To Care For Lavender Plants</span></a><span data-dcnode-id="1117" instrument_node="">.</span></p><span data-dcnode-id="1115" instrument_node="">
</span></div><span data-dcnode-id="1113" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="1082"><time class="comment-time" data-dcnode-id="1083"><a class="comment-time-link" data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/pruning-lavender/comment-page-2/%23comment-290623"><span data-dcnode-id="1085" instrument_node="">April 4, 2021 at 9:14 pm</span></a></time></p><span data-dcnode-id="1081" instrument_node=""> </span></header><span data-dcnode-id="1079" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1072"><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1077" instrument_node="">Hello,</span><br data-dcnode-id="1076"><span data-dcnode-id="1075" instrument_node="">
I planted some Spanish lavender last summer.  I dead headed them, and I thought I had read that I should do a fall pruning.  I’m thinking that may have been wrong.  I cut the plant back quite a bit but tried to still make it mounded.  I believe I cut about the woods stems.  We live in Kentucky. I think I did the pruning in November. Should I be worried they won’t grow back?  They’re not looking very lively so far.</span></p><span data-dcnode-id="1073" instrument_node="">
</span></div><span data-dcnode-id="1071" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="1068"><a aria-label="Reply to Andrea" class="comment-reply-link" data-belowelement="article-comment-290623" data-commentid="290623" data-dcnode-id="1069" data-postid="17709" data-replyto="Reply to Andrea" data-respondelement="respond" href="#comment-290623" rel="nofollow"><span data-dcnode-id="1070" instrument_node="">Reply</span></a></div><span data-dcnode-id="1067" instrument_node="">

</span><span class="comment-author-name" data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Amy Andrychowicz</span></span><span data-dcnode-id="1057" instrument_node=""> </span><span class="says" data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">says</span></span><span data-dcnode-id="1054" instrument_node=""> </span></p><span data-dcnode-id="1052" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="1048"><time class="comment-time" data-dcnode-id="1049"><a class="comment-time-link" data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/pruning-lavender/comment-page-2/%23comment-290712"><span data-dcnode-id="1051" instrument_node="">April 6, 2021 at 3:57 pm</span></a></time></p><span data-dcnode-id="1047" instrument_node=""> </span></header><span data-dcnode-id="1045" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1040"><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">It’s usually fine to prune Spanish lavender in the fall in warmer climates. However, if you cut the woody part of the stems down below the last set of leaves, then I’m afraid those branches won’t grow back. Also, since you mentioned you live in Kentucky, I’m not sure that Spanish lavender would survive the winter in your zone anyway – they usually prefer warmer climates of zones 9+, but some hybrids are hardier. Lavender is slow to grow in the spring, so give it time. The best you can do is wait until early summer to see if there’s any new growth. If yours didn’t survive, I recommend getting the hardier English lavender (better for cold climates) next time. Good luck!</span></p><span data-dcnode-id="1041" instrument_node="">
</span></div><span data-dcnode-id="1039" instrument_node="">

</span><span class="comment-author-name" data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Caroline</span></span><span data-dcnode-id="801" instrument_node=""> </span><span class="says" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">says</span></span><span data-dcnode-id="798" instrument_node=""> </span></p><span data-dcnode-id="796" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="792"><time class="comment-time" data-dcnode-id="793"><a class="comment-time-link" data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/pruning-lavender/comment-page-2/%23comment-281823"><span data-dcnode-id="795" instrument_node="">August 17, 2020 at 11:09 am</span></a></time></p><span data-dcnode-id="791" instrument_node=""> </span></header><span data-dcnode-id="789" instrument_node="">
</span><div class="comment-content" data-dcnode-id="781"><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Hi. I am new to gardening. We have English Lavender in our new home in Denver, CO. I’m a bit confused about difference between harvesting and pruning. Is it okay/preferable to cut them down before the winter? I know pruning happens in spring, but should it also be done late August if there are still blooms? Could it cause problems to do it this late if there is an early snow?</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Thanks!</span></p><span data-dcnode-id="782" instrument_node="">
</span></div><span data-dcnode-id="780" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="777"><a aria-label="Reply to Caroline" class="comment-reply-link" data-belowelement="article-comment-281823" data-commentid="281823" data-dcnode-id="778" data-postid="17709" data-replyto="Reply to Caroline" data-respondelement="respond" href="#comment-281823" rel="nofollow"><span data-dcnode-id="779" instrument_node="">Reply</span></a></div><span data-dcnode-id="776" instrument_node="">
</span></article><span data-dcnode-id="774" instrument_node="">
</span><ul class="children" data-dcnode-id="732"><span data-dcnode-id="773" instrument_node="">
</span><li class="comment byuser comment-author-amya bypostauthor odd alt depth-2" data-dcnode-id="735" id="comment-281886"><span data-dcnode-id="772" instrument_node="">
</span><article data-dcnode-id="737" id="article-comment-281886"><span data-dcnode-id="771" instrument_node="">
</span><header class="comment-header" data-dcnode-id="755"><span data-dcnode-id="770" instrument_node="">
</span><p class="comment-author" data-dcnode-id="762"><span data-dcnode-id="769" instrument_node="">
</span><span class="comment-author-name" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Amy Andrychowicz</span></span><span data-dcnode-id="766" instrument_node=""> </span><span class="says" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">says</span></span><span data-dcnode-id="763" instrument_node=""> </span></p><span data-dcnode-id="761" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="757"><time class="comment-time" data-dcnode-id="758"><a class="comment-time-link" data-dcnode-id="759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/pruning-lavender/comment-page-2/%23comment-281886"><span data-dcnode-id="760" instrument_node="">August 19, 2020 at 9:12 am</span></a></time></p><span data-dcnode-id="756" instrument_node=""> </span></header><span data-dcnode-id="754" instrument_node="">
</span><div class="comment-content" data-dcnode-id="743"><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="752" instrument_node="">Well, the main difference is that the purpose of pruning is to keep lavender plants healthy and shapely, and encourage tons of flowers. Harvesting is just cutting of the pieces or flower buds as you need them to use for recipes or other purposes. </span><a data-dcnode-id="750" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/harvesting-lavender/" rel="nofollow"><span data-dcnode-id="751" instrument_node="">Here’s a post that is all about harvesting lavender</span></a><span data-dcnode-id="749" instrument_node=""> for more details that might help to clear up the confusion for you. I don’t recommend pruning in the fall, because it will trigger new growth – which can be killed off by an early freeze. Since they are starting to go dormant, you don’t want to encourage new growth in the fall. English lavender is hardy, so there’s nothing special you need to do to prepare it for winter. </span><a data-dcnode-id="747" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/lavender-plant-care/" rel="nofollow"><span data-dcnode-id="748" instrument_node="">Here’s an article about how to care for lavender</span></a><span data-dcnode-id="746" instrument_node=""> that you may also find useful.</span></p><span data-dcnode-id="744" instrument_node="">
</span></div><span data-dcnode-id="742" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="739"><a aria-label="Reply to Amy Andrychowicz" class="comment-reply-link" data-belowelement="article-comment-281886" data-commentid="281886" data-dcnode-id="740" data-postid="17709" data-replyto="Reply to Amy Andrychowicz" data-respondelement="respond" href="#comment-281886" rel="nofollow"><span data-dcnode-id="741" instrument_node="">Reply</span></a></div><span data-dcnode-id="738" instrument_node="">
