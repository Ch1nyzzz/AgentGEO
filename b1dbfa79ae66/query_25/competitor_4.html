/?index=cw22&amp;url=https%3A//azdomino.monrovia.com/plantinf.nsf/0/DC5E8E4E743AEA078825684D0071B9F6" target="_blank" title="(opens new window)"><span data-dcnode-id="2109" instrument_node="">'Watermelon Red'</span></a><span data-dcnode-id="2107" instrument_node="">) grow at least 25-30 feet tall. So plant them out in the yard—not in front of your bay windows. Or go for compact, lower-growing kinds, like </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mobot.org/GARDENINGHELP/PLANTFINDER/plant.asp%3Fcode%3DI330" target="_blank" title="(opens new window)"><span data-dcnode-id="2106" instrument_node="">'Acoma</span></a><span data-dcnode-id="2104" instrument_node="">,' </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//azdomino.monrovia.com/plantinf.nsf/0/8756F7061039476C8825684D0071B731" target="_blank" title="(opens new window)"><span data-dcnode-id="2103" instrument_node="">'Centennial</span></a><span data-dcnode-id="2101" instrument_node="">,' '</span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//springhillnursery.com/product.asp%3Fpn%3D10371%26bhcd2%3D1235488513" target="_blank" title="(opens new window)"><span data-dcnode-id="2100" instrument_node="">Hopi</span></a><span data-dcnode-id="2098" instrument_node="">,' </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sunnygardens.com/garden_plants/lagerstroemia/lagerstroemia_0843.php" target="_blank" title="(opens new window)"><span data-dcnode-id="2097" instrument_node="">'Prairie Lace</span></a><span data-dcnode-id="2095" instrument_node="">,' </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="2093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.carrollgardens.com/eNewsletter/2005/07/050707-lib.asp" target="_blank" title="(opens new window)"><span data-dcnode-id="2094" instrument_node="">'Victor</span></a><span data-dcnode-id="2092" instrument_node="">,' '</span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//azdomino.monrovia.com/PlantInf.nsf/3e858bc84af1756c88256f0a00787e69/671a7384e3d44a548825684d0071b66f%21OpenDocument" target="_blank" title="(opens new window)"><span data-dcnode-id="2091" instrument_node="">Zuni</span></a><span data-dcnode-id="2089" instrument_node="">,' of the </span><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.monrovia.com/learn/plant_catalog/detail.php%3Fid%3D2009" target="_blank" title="(opens new window)"><span data-dcnode-id="2088" instrument_node="">Petite Series</span></a><span data-dcnode-id="2086" instrument_node=""> from Monrovia.</span></p></div><span data-dcnode-id="2083" instrument_node=""> </span><div class="div-sm-inContent" data-dcnode-id="2079"><div class="mobile-ad ads-in-content" data-dcnode-id="2082" data-tier="1" id="div-gpt-mob-native"></div><span data-dcnode-id="2081" instrument_node=""> </span><div class="tablet-ad desktop-ad ads-in-content" data-dcnode-id="2080" data-tier="1" id="div-gpt-native"></div></div><span data-dcnode-id="2078" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-default" data-dcnode-id="2059"><span data-dcnode-id="2077" instrument_node=""> </span><div class="component lazy-image lazy-image-udf image-wrapper aspect_3x4 align-default" data-alt="cm_before_21.jpg" data-crop-percentage="133" data-dcnode-id="2060" data-high-density="true" data-orientation="vertical" data-original-height="400" data-original-width="300" data-shop-image="false" data-special-crop="" data-src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F24%2F2009%2F02%2Fcm_before_21.jpg" data-title="cm_before_21.jpg" data-tracking-zone="image"><span data-dcnode-id="2076" instrument_node=""> </span><noscript data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">&lt;img src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F24%2F2009%2F02%2Fcm_before_21.jpg" alt="cm_before_21.jpg"&gt;</span></noscript><span data-dcnode-id="2073" instrument_node=""> </span><div class="inner-container js-inner-container image-overlay" data-dcnode-id="2063"><span data-dcnode-id="2072" instrument_node=""> </span><span class="placeholderText visually-hidden" data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">cm_before_21.jpg</span></span><span data-dcnode-id="2069" instrument_node=""> </span><button aria-label="Make image larger cm_before_21.jpg" class="icon icon-image-zoom elementButton__defaultFocus" data-alt="cm_before_21.jpg" data-caption="" data-dcnode-id="2065" data-image="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F24%2F2009%2F02%2Fcm_before_21.jpg" data-title="cm_before_21.jpg" data-tracking-do-not-track="1"><svg data-dcnode-id="2067" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M2.667 21.333h8v2.667h-10.667v-10.667h2.667v8zM21.333 0h2.667v10.667h-2.667v-8h-8v-2.667h8z" data-dcnode-id="2068"></path></svg><span data-dcnode-id="2066" instrument_node=""> </span></button><span data-dcnode-id="2064" instrument_node=""> </span></div><div class="lazy-image__loadingPlaceholder" data-dcnode-id="2061"><img alt="" class="loadingPlaceholder" data-dcnode-id="2062" height="400" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20133'%3E%3C/svg%3E" width="300"></div></div></div><span data-dcnode-id="2058" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2055"><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">The crepe myrtle you see above is deep-pink 'Miami.' I planted it in my front yard from a 3-gallon pot 15 years ago. I never pruned it much, because I strung it with tiny Xmas lights that I never took down. Leaving them on the tree reduced my Xmas decorating each year to 10 seconds. All I had to do was plug in the lights before Xmas and unplug them after.</span></p></div><span data-dcnode-id="2054" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="2053" data-tier="3" id="div-gpt-mob-square-fixed-2" role="complementary" tabindex="-1"></div><span data-dcnode-id="2052" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2049"><p data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">However, not being able to prune without cutting the light cords meant my crepe myrtle grew too dense and spread too wide. So last week, I took off the lights. Then, aided by my lovely unseen wife who agreed to take pictures, I finally pruned it to show you how it's done and how a mature crepe myrtle is supposed to look. </span></p></div><span data-dcnode-id="2048" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="2047" data-tier="4" id="div-gpt-mob-square-fixed-3" role="complementary" tabindex="-1"></div><span data-dcnode-id="2046" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2043"><p data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Here is the crepe myrtle before I started. It doesn't look too bad, but needs thinning. The tool leaning up against it is my trusty pole pruner. I like it because you can extend the pole to cut branches more than 15 feet from the ground.</span></p></div><span data-dcnode-id="2042" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2038"><p data-dcnode-id="2039"><a aria-describedby="external-disclaimer" class="external-link" data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thedailysouth.southernliving.com/2009/07/10/crepe-myrtle/" target="_blank" title="(opens new window)"><span data-dcnode-id="2041" instrument_node="">Crepe Myrtle — Your Questions Answered</span></a></p></div><span data-dcnode-id="2037" instrument_node=""> </span><h2 data-dcnode-id="2035" id="ce64c8d922776ab7998cf7b665f539ef"><span data-dcnode-id="2036" instrument_node="">The Goal </span></h2><span data-dcnode-id="2034" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2031"><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">Before you prune anything, it's a good idea to know what you're trying to accomplish. After all, you can always go back and cut more. You can't go back and cut less. My objective was to maintain well-spaced, main trunks with handsome bark and to thin out out the center to permit easy penetration of sunlight and air. I always say if a bird can easily fly through the center of your crepe myrtle, the branches are spaced about right. If a bird can easily fly through the center of your house, you're probably missing some windows.</span></p></div><span data-dcnode-id="2030" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="2029" data-scroll-load="true" data-tier="1" id="div-gpt-mob-square-fixed-4" role="complementary" tabindex="-1"></div><span data-dcnode-id="2028" instrument_node=""> </span><h2 data-dcnode-id="2026" id="5613efd7b8e0bc7800bacfdab44b87db"><span data-dcnode-id="2027" instrument_node="">Pruning Tools </span></h2><span data-dcnode-id="2025" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2022"><p data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">To properly prune a mature crepe myrtle, you need three&nbsp;tools:</span></p></div><span data-dcnode-id="2021" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2018"><p data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">1. Hand pruners to clip twigs and branches less than 1/2-inch thick.</span></p></div><span data-dcnode-id="2017" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2014"><p data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">2. Loppers to cut branches 1/2-inch to 1-1/2 inches thick</span></p></div><span data-dcnode-id="2013" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2010"><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">3. Pole pruners or a pruning saw to cut branches more than 1-1/2 inches thick.</span></p></div><span data-dcnode-id="2009" instrument_node=""> </span><h2 data-dcnode-id="2007" id="354145a7ff3ef43fdfcaa1d16b7579e7"><span data-dcnode-id="2008" instrument_node="">When to Cut </span></h2><span data-dcnode-id="2006" instrument_node=""> </span><div class="paragraph" data-dcnode-id="2003"><p data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">Late winter is the best time to prune a crepe myrtle, because it's leafless and you can easily see all of the branches. It also blooms on new growth, so pruning now won't reduce blooming. In fact, it may increase it.</span></p></div><span data-dcnode-id="2002" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="2001" data-scroll-load="true" data-tier="2" id="div-gpt-mob-square-fixed-5" role="complementary" tabindex="-1"></div><span data-dcnode-id="2000" instrument_node=""> </span><h2 data-dcnode-id="1998" id="cc6b37bed390672ca063eade761b4e61"><span data-dcnode-id="1999" instrument_node="">What to Cut </span></h2><span data-dcnode-id="1997" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1994"><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Remove branches in the following order:</span></p></div><span data-dcnode-id="1993" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1990"><p data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">1. Branches coming up from the base.</span></p></div><span data-dcnode-id="1989" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1986"><p data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">2. All side branches growing from the main trunks up to a height of at least 4 feet.</span></p></div><span data-dcnode-id="1985" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1982"><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">3. All higher branches growing inward towards the center of the tree.</span></p></div><span data-dcnode-id="1981" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1978"><p data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">4. All crossing, rubbing, and dead branches.</span></p></div><span data-dcnode-id="1977" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1974"><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">5. Branches growing at awkward angles that detract from the tree's appearance.</span></p></div><span data-dcnode-id="1973" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1972" data-scroll-load="true" data-tier="3" id="div-gpt-mob-square-fixed-6" role="complementary" tabindex="-1"></div><span data-dcnode-id="1971" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1968"><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Always cut back to a larger branch of the trunk. Don't leave stubs. Removing seedheads on the end of branches is optional. Leaving them doesn't reduce blooming. I leave mine.</span></p></div><span data-dcnode-id="1967" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-default" data-dcnode-id="1948"><span data-dcnode-id="1966" instrument_node=""> </span><div class="component lazy-image lazy-image-udf image-wrapper aspect_3x2 align-default" data-alt="pole_pruners_2.jpg" data-crop-percentage="67" data-dcnode-id="1949" data-high-density="true" data-orientation="horizontal" data-original-height="262" data-original-width="350" data-shop-image="false" data-special-crop="" data-src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F24%2F2009%2F02%2Fpole_pruners_2.jpg" data-title="pole_pruners_2.jpg" data-tracking-zone="image"><span data-dcnode-id="1965" instrument_node=""> </span><noscript data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">&lt;img src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F24%2F2009%2F02%2Fpole_pruners_2.jpg" alt="pole_pruners_2.jpg"&gt;</span></noscript><span data-dcnode-id="1962" instrument_node=""> </span><div class="inner-container js-inner-container image-overlay" data-dcnode-id="1952"><span data-dcnode-id="1961" instrument_node=""> </span><span class="placeholderText visually-hidden" data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">pole_pruners_2.jpg</span></span><span data-dcnode-id="1958" instrument_node=""> </span><button aria-label="Make image larger pole_pruners_2.jpg" class="icon icon-image-zoom elementButton__defaultFocus" data-alt="pole_pruners_2.jpg" data-caption="" data-dcnode-id="1954" data-image="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F24%2F2009%2F02%2Fpole_pruners_2.jpg" data-title="pole_pruners_2.jpg" data-tracking-do-not-track="1"><svg data-dcnode-id="1956" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M2.667 21.333h8v2.667h-10.667v-10.667h2.667v8zM21.333 0h2.667v10.667h-2.667v-8h-8v-2.667h8z" data-dcnode-id="1957"></path></svg><span data-dcnode-id="1955" instrument_node=""> </span></button><span data-dcnode-id="1953" instrument_node=""> </span></div><div class="lazy-image__loadingPlaceholder" data-dcnode-id="1950"><img alt="" class="loadingPlaceholder" data-dcnode-id="1951" height="262" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%2067'%3E%3C/svg%3E" width="350"></div></div></div><span data-dcnode-id="1947" instrument_node=""> </span><h2 data-dcnode-id="1945" id="20fc354f3f781738fb40c626581c0128"><span data-dcnode-id="1946" instrument_node="">The Finished Product </span></h2><span data-dcnode-id="1944" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1938"><p data-dcnode-id="1939"><span data-dcnode-id="1943" instrument_node="">Below is the result of this year's pruning. Isn't it </span><em data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">purty</span></em><span data-dcnode-id="1940" instrument_node="">? The crepe myrtle is still a little denser than I would like, but I can prune it again next winter. Every year, the job gets easier.</span></p></div><span data-dcnode-id="1937" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1936" data-scroll-load="true" data-tier="4" id="div-gpt-mob-square-fixed-7" role="complementary" tabindex="-1"></div><span data-dcnode-id="1935" instrument_node=""> </span><div class="component inline image margin-32-tb align-img align-default" data-dcnode-id="1916"><span data-dcnode-id="1934" instrument_node=""> </span><div class="component lazy-image lazy-image-udf image-wrapper aspect_3x4 align-default" data-alt="cm_after_21.jpg" data-crop-percentage="133" data-dcnode-id="1917" data-high-density="true" data-orientation="vertical" data-original-height="533" data-original-width="400" data-shop-image="false" data-special-crop="" data-src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F24%2F2009%2F02%2Fcm_after_21.jpg" data-title="cm_after_21.jpg" data-tracking-zone="image"><span data-dcnode-id="1933" instrument_node=""> </span><noscript data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">&lt;img src="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F24%2F2009%2F02%2Fcm_after_21.jpg" alt="cm_after_21.jpg"&gt;</span></noscript><span data-dcnode-id="1930" instrument_node=""> </span><div class="inner-container js-inner-container image-overlay" data-dcnode-id="1920"><span data-dcnode-id="1929" instrument_node=""> </span><span class="placeholderText visually-hidden" data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">cm_after_21.jpg</span></span><span data-dcnode-id="1926" instrument_node=""> </span><button aria-label="Make image larger cm_after_21.jpg" class="icon icon-image-zoom elementButton__defaultFocus" data-alt="cm_after_21.jpg" data-caption="" data-dcnode-id="1922" data-image="https://imagesvc.meredithcorp.io/v3/mm/image?url=https%3A%2F%2Fstatic.onecms.io%2Fwp-content%2Fuploads%2Fsites%2F24%2F2009%2F02%2Fcm_after_21.jpg" data-title="cm_after_21.jpg" data-tracking-do-not-track="1"><svg data-dcnode-id="1924" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M2.667 21.333h8v2.667h-10.667v-10.667h2.667v8zM21.333 0h2.667v10.667h-2.667v-8h-8v-2.667h8z" data-dcnode-id="1925"></path></svg><span data-dcnode-id="1923" instrument_node=""> </span></button><span data-dcnode-id="1921" instrument_node=""> </span></div><div class="lazy-image__loadingPlaceholder" data-dcnode-id="1918"><img alt="" class="loadingPlaceholder" data-dcnode-id="1919" height="533" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20133'%3E%3C/svg%3E" width="400"></div></div></div><span data-dcnode-id="1915" instrument_node=""> </span><h2 data-dcnode-id="1913" id="78efb2e6eadc75763eb36e718529811f"><span data-dcnode-id="1914" instrument_node="">More on Crepe Murder&nbsp;</span></h2><span data-dcnode-id="1912" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1909"><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">It's the high crime of horticulture–the senseless, annual chopping back of beautiful crepe myrtles. Drive through any Southern neighborhood in early spring and, before long, you'll encounter a spiritually fulfilled suburbanite, pruning saw in hand and a pile of crepe myrtle branches on the ground.</span></p></div><span data-dcnode-id="1908" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1907" data-scroll-load="true" data-tier="1" id="div-gpt-mob-square-fixed-8" role="complementary" tabindex="-1"></div><span data-dcnode-id="1906" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1903"><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Why do well-intentioned gardeners keep repeating this crime? Some people think they need to prune off old seed heads to have blooms the following year. This is absolutely false. Others hack back these plants to keep them from getting too big. These folks need to remember that crepe myrtles are small trees, not foundation shrubs. If the plants seem to need pruning every other week to keep them from covering the windows or walk, they're planted in the wrong place. Finally, crepe murder is a copycat crime. A lot of people engage in it because they see their neighbors doing it.</span></p></div><span data-dcnode-id="1902" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1901" data-scroll-load="true" data-tier="2" id="div-gpt-mob-square-fixed-9" role="complementary" tabindex="-1"></div><span data-dcnode-id="1900" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1897"><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">People shorten crepe myrtles by six feet or more, turning beautiful trunks into thick, ugly stubs. Repeated pruning to the same point creates gnarled, knobby "knuckles" on the ends of the trunks. A thicket of long, weak, whiplike branches then sprouts from each knuckle. These whips are too weak to support the flowers and hang straight down like cooked spaghetti.</span></p></div><span data-dcnode-id="1896" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1893"><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">Find out the mature height of a selection before planting it. If your crepe myrtle grows too big for its spot, move it to where it has more room. Or replace it with a dwarf or semidwarf selection. Prune only to maintain natural form. Select four or five well-spaced main trunks; remove any others at ground level. Train these trunks to grow upward and outward from the base of the plant. As they grow taller, gradually remove all side branches up to a height of four to five feet. This exposes the smooth, handsome bark. Early each spring, remove weak, spindly growth and all the branches that are growing in toward the center of the plant. Prune large branches back to a crotch. Never leave thick stubs.</span></p></div><span data-dcnode-id="1892" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1891" data-scroll-load="true" data-tier="3" id="div-gpt-mob-square-fixed-10" role="complementary" tabindex="-1"></div><span data-dcnode-id="1890" instrument_node=""> </span><h2 data-dcnode-id="1888" id="3f005e1c71cb1bd1ad6c725ac6ea1bc2"><span data-dcnode-id="1889" instrument_node="">Pruning Tips for Crepe Myrtles </span></h2><span data-dcnode-id="1887" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1884"><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Remove branches that are too close together or that cross or rub each other. It is important not to prune the tops of crepe myrtle trees to make them bloom. Topping may yield larger flowers but does not increase the overall volume of blooms. Extreme topping often results in weak growth that tends to bend of break in summer rains.</span></p></div><span data-dcnode-id="1883" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1880"><p data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Houseflies are the dumbest living things on Earth, literally incapable of learning anything, which makes me wonder sometimes if houseflies equipped with pruners have been savaging our neighborhood's crepe myrtles. No matter how many times I tell folks not to chop their crepe myrtles into big, ugly stumps each spring, they do it anyway, maiming the beautiful trunks and ruining the natural treelike form. But perhaps "crepe murder" is a matter of taste, not intelligence. If so, here is a pruning task everyone can agree on. You know how a crepe myrtle typically sprouts a thicket of suckers at the base each spring? Reach down now, and pull them off at ground level. That will keep your crepe myrtle from turning into a thick, unkempt shrub. It will also prove to the world that you're not a housefly. For most of us, that's a good thing. — Steve Bender</span></p></div><span data-dcnode-id="1879" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1878" data-scroll-load="true" data-tier="4" id="div-gpt-mob-square-fixed-11" role="complementary" tabindex="-1"></div><span data-dcnode-id="1877" instrument_node=""> </span><h2 data-dcnode-id="1875" id="d7f5af4d2f1e84bff0be0cec223e21b7"><span data-dcnode-id="1876" instrument_node="">When to Buy Crepe Myrtles </span></h2><span data-dcnode-id="1874" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1871"><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Select these trees while they are in bloom. Remember, they can vary greatly in size and bloom colors. Choose the right size for your landscape to help avoid the ultimate Southern gardening sin, "crepe murder" (severely pruning your tree to just a few sticks and ruining its natural form). Large selections (more than 20 feet tall) include 'Natchez' (white) and 'Miami' (pink). Medium selections (less than 20 feet tall) include 'Near East' (pink) and 'Regal Red' (deep red). Dwarf forms (less than 3 feet tall) include 'Centennial' (purple) and 'Chickasaw' (pink). Select a sunny location, and remember to mulch and water well to ease your tree into the landscape. Container-grown trees are easy to transport and transition into the garden well.</span></p></div><span data-dcnode-id="1870" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1869" data-scroll-load="true" data-tier="1" id="div-gpt-mob-square-fixed-12" role="complementary" tabindex="-1"></div><span data-dcnode-id="1868" instrument_node=""> </span><h2 data-dcnode-id="1866" id="db898683c14815ebfffd1cd886400138"><span data-dcnode-id="1867" instrument_node="">Crepe Myrtles in the Fall </span></h2><span data-dcnode-id="1865" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1862"><p data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Blaze into autumn with summer's favorite tree.</span></p></div><span data-dcnode-id="1861" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1858"><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">When people think of crepe myrtles, they envision warm summer days and pink, red, lavender, and white flower clusters sagging in the sun. But look at these classic trees in fall, and you might be surprised. Brilliant blooms will be replaced by orange, red, and yellow foliage for an outstanding autumn show.</span></p></div><span data-dcnode-id="1857" instrument_node=""> </span><h2 data-dcnode-id="1855" id="bcfdb17934389187e22233561b8d9025"><span data-dcnode-id="1856" instrument_node="">Color Through the Seasons </span></h2><span data-dcnode-id="1854" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1851"><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Crepe myrtles have rounded, light green leaves that emerge in the spring. As the weather warms, the foliage hardens off and turns dark green. Then, when the temperatures drop in the fall, leaves gradually transform from green to sparkling fall hues. Many gardeners select crepe myrtles by bloom colors, but you can also choose a plant by its fall foliage (see chart below).</span></p></div><span data-dcnode-id="1850" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1849" data-scroll-load="true" data-tier="2" id="div-gpt-mob-square-fixed-13" role="complementary" tabindex="-1"></div><span data-dcnode-id="1848" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1845"><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Now is the perfect time to plant these beautiful trees, which come in many colors and sizes to fit your needs and space. 'Chickasaw' and 'Victor' are dwarf trees that grow 3-5 feet tall, making them perfect for small gardens. 'Acoma,' 'Hopi,' and 'Zuni' are small trees and will grow 7 to 10 feet high. These can be planted in tight areas where you want a tree but have little space. Medium ones, such as 'Centennial Spirit,' 'Tuskegee,' and 'Yuma,' grow 15 to 20 feet tall and work well around sidewalks and terraces but can still be planted close to the house. Big crepe myrtles, such as 'Dynamite,' 'Natchez,' and 'Tuscarora,' will grow 20 feet or more. They make excellent street trees and can be used in large yards. If you live in the Upper South, choose cold-hardy selections, such as 'Acoma,' 'Centennial Spirit,' or 'Hopi.'</span></p></div><span data-dcnode-id="1844" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1843" data-scroll-load="true" data-tier="3" id="div-gpt-mob-square-fixed-14" role="complementary" tabindex="-1"></div><span data-dcnode-id="1842" instrument_node=""> </span><h2 data-dcnode-id="1840" id="0b3fa5c4e69061b1ecbeecee087c6323"><span data-dcnode-id="1841" instrument_node="">Growing Conditions </span></h2><span data-dcnode-id="1839" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1836"><p data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Crepe myrtles need full sun to perform well. They will grow in shade, but blooms will be sparse, and plants will get leggy. These hardy trees have few pest or disease problems, and they require little water and fertilizer.</span></p></div><span data-dcnode-id="1835" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1832"><p data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Also, crepe myrtles need minimal pruning. Some gardeners top them annually, but this ruins their natural shape and beauty. Remove the sucker growth that sometimes appears around the base. Only prune to shape trees or to take out any cross branching. In the winter, you can remove old seedpods by clipping the tips of branches.</span></p></div><span data-dcnode-id="1831" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1830" data-scroll-load="true" data-tier="4" id="div-gpt-mob-square-fixed-15" role="complementary" tabindex="-1"></div><span data-dcnode-id="1829" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1826"><p data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">Summer blooms and fall colors make crepe myrtles a garden favorite. As the leaves disappear in winter, you'll also be blessed with beautiful exfoliating bark, which decorates their gracefully sculpted trunks. For year-round interest, remember this Southern classic. Plant one now, and watch your tree change with the seasons. — Charlie Thigpen</span></p></div><span data-dcnode-id="1825" instrument_node=""> </span><div class="component table" data-dcnode-id="1397"><span data-dcnode-id="1824" instrument_node=""> </span><span data-dcnode-id="1823" instrument_node=""> </span><span data-dcnode-id="1822" instrument_node=""> </span><span data-dcnode-id="1821" instrument_node=""> </span><span data-dcnode-id="1813" instrument_node=""> </span><span data-dcnode-id="1805" instrument_node=""> </span><span data-dcnode-id="1797" instrument_node=""> </span><span data-dcnode-id="1789" instrument_node=""> </span><span data-dcnode-id="1787" instrument_node=""> </span><span data-dcnode-id="1786" instrument_node=""> </span><span data-dcnode-id="1778" instrument_node=""> </span><span data-dcnode-id="1770" instrument_node=""> </span><span data-dcnode-id="1762" instrument_node=""> </span><span data-dcnode-id="1754" instrument_node=""> </span><span data-dcnode-id="1752" instrument_node=""> </span><span data-dcnode-id="1751" instrument_node=""> </span><span data-dcnode-id="1743" instrument_node=""> </span><span data-dcnode-id="1735" instrument_node=""> </span><span data-dcnode-id="172 "> </span><span data-dcnode-id="1509" instrument_node=""> </span><span data-dcnode-id="1507" instrument_node=""> </span><span data-dcnode-id="1506" instrument_node=""> </span><span data-dcnode-id="1498" instrument_node=""> </span><span data-dcnode-id="1490" instrument_node=""> </span><span data-dcnode-id="1482" instrument_node=""> </span><span data-dcnode-id="1474" instrument_node=""> </span><span data-dcnode-id="1472" instrument_node=""> </span><span data-dcnode-id="1471" instrument_node=""> </span><span data-dcnode-id="1463" instrument_node=""> </span><span data-dcnode-id="1455" instrument_node=""> </span><span data-dcnode-id="1447" instrument_node=""> </span><span data-dcnode-id="1439" instrument_node=""> </span><span data-dcnode-id="1437" instrument_node=""> </span><span data-dcnode-id="1436" instrument_node=""> </span><span data-dcnode-id="1428" instrument_node=""> </span><span data-dcnode-id="1420" instrument_node=""> </span><span data-dcnode-id="1412" instrument_node=""> </span><span data-dcnode-id="1404" instrument_node=""> </span><span data-dcnode-id="1402" instrument_node=""> </span><span data-dcnode-id="1400" instrument_node=""> </span><table class="table" data-dcnode-id="1399"><tbody class="tableBody" data-dcnode-id="1401"><tr class="tableRow" data-dcnode-id="1788"><td class="tableCell tableCell--align elementFont__details" data-dcnode-id="1814"><span data-dcnode-id="1820" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1816"><p data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">Selection</span></p><span data-dcnode-id="1817" instrument_node=""> </span></div><span data-dcnode-id="1815" instrument_node=""> </span></td><td class="tableCell tableCell--align elementFont__details" data-dcnode-id="1806"><span data-dcnode-id="1812" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1808"><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Size</span></p><span data-dcnode-id="1809" instrument 2" instrument_node=""> </span></td><td class="tableCell tableCell--align elementFont__details" data-dcnode-id="1413"><span data-dcnode-id="1419" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1415"><p data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">Orange-red to dark red</span></p><span data-dcnode-id="1416" instrument_node=""> </span></div><span data-dcnode-id="1414" instrument_node=""> </span></td><td class="tableCell tableCell--align elementFont__details" data-dcnode-id="1405"><span data-dcnode-id="1411" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1407"><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Medium lavender</span></p><span data-dcnode-id="1408" instrument_node=""> </span></div><span data-dcnode-id="1406" instrument_node=""> </span></td></tr></tbody></table><span data-dcnode-id="1398" instrument_node=""> </span></div><span data-dcnode-id="1396" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1395" data-scroll-load="true" data-tier="1" id="div-gpt-mob-square-fixed-16" role="complementary" tabindex="-1"></div><span data-dcnode-id="1394" instrument_node=""> </span><h2 data-dcnode-id="1392" id="88ce310ea931b880994679723d038ed6"><span data-dcnode-id="1393" instrument_node="">Alkaline Soil and Crepe Myrtles </span></h2><span data-dcnode-id="1391" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1388"><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Not all soils in the South pass the acid test. Some turn oak trees yellow and cause the leaves of azaleas and gardenias to become yellow between the veins. These soils do this because they're alkaline.</span></p></div><span data-dcnode-id="1387" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1384"><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">What's alkaline soil? It's soil with a pH above the neutral point of 7 (a pH below 7 is considered acid). It typically occurs in regions with sparse rainfall, such as West and North Texas and western Oklahoma. But it also occurs where beds of ancient limestone lie just beneath the surface. This is why people often refer to alkaline soil as "limy" or "chalky." Limestone deposits occur in every Southern state except Louisiana; the soil in many parts of Missouri, Texas, Kentucky, Tennessee, and Florida is alkaline.</span></p></div><span data-dcnode-id="1383" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1382" data-scroll-load="true" data-tier="2" id="div-gpt-mob-square-fixed-17" role="complementary" tabindex="-1"></div><span data-dcnode-id="1381" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1378"><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Alkaline soil affects plants by increasing the availability of some soil nutrients while holding back on others. For example, alkaline soil supplies plants with plenty of calcium and magnesium. But it's stingy with zinc, manganese, and sulfur. These shortfalls can stunt certain plants. The major nutrient most commonly deficient in high pH soil is iron. Lack of iron causes chlorosis (yellow leaves with green veins). Severe chlorosis eventually kills plants.</span></p></div><span data-dcnode-id="1377" instrument_node=""> </span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250 mobile-ad instream-ad karma-ad" data-dcnode-id="1376" data-scroll-load="true" data-tier="3" id="div-gpt-mob-square-fixed-18" role="complementary" tabindex="-1"></div><span data-dcnode-id="1375" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1372"><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">To determine for sure whether your soil is alkaline, have it tested. You'll find simple soil-test kits at garden centers, nurseries, and home supply stores. If you discover your soil is indeed alkaline, you have two options. The first is to completely replace the existing soil with acid soil, so you can grow acid-loving plants. But this is laborious and expensive and seldom succeeds over time. A far better solution is simply to select plants that like alkaline soil. There are lots to choose from and many are carefree, drought-tolerant native plants.</span></p></div><span data-dcnode-id="1371" instrument_node=""> </span><div class="paragraph" data-dcnode-id="1368"><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">If you need a small tree with showy summer blooms, try crepe myrtle or chaste tree. Both tolerate drought and are easy to grow.</span></p></div><span data-dcnode-id="1367" instrument_node=""> </span></div><div class="articleContainer__content" data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node=""> </span></div></div><span data-dcnode-id="1362" instrument_node=""> </span><div class="content two-col-main-content last" data-dcnode-id="284"><span data-dcnode-id="1361" instrument_node=""> </span><div class="karma-lazy-seriesDetails" data-dcnode-id="1360"></div><span data-dcnode-id="1359" instrument_node=""> </span><div class="recirculation-wrapper" data-dcnode-id="286"><span data-dcnode-id="1358" instrument_node=""> </span><div class="component recirculation recirculation__cards elementLoader--centerIt initialized enabled" data-content-graph-id="cms/onecms_posts_southernliving_312927" data-dcnode-id="288" data-endpoint="/element-api/content-proxy/recommendations" data-recirc="closed" data-recommendations-request-data="%7B%22provider%22%3A%22cms%22%2C%22brand%22%3A%22southernliving%22%2C%22id%22%3A%22312927%22%2C%22matchFactor%22%3A%22recent%22%2C%22contentType%22%3A%22article%22%2C%22parent%22%3A%22cms%2Fonecms_terms_southernliving_325%22%2C%22entity%22%3A%22cms%2Fonecms_terms_southernliving_419%
