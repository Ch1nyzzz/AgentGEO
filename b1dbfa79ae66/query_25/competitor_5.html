</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">If you’re growing Russian sage plant (Perovskia atriplicifolia) in your garden, then you know how bad they can look after the winter.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">All those dead branches leave your plant looking ugly and half dead. So it’s important to learn how to cut back Russian sage to keep it looking its best all summer long.</span></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1626" instrument_node="">But don’t worry! When it comes to </span><a data-dcnode-id="1624" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/pruning-plants/"><span data-dcnode-id="1625" instrument_node="">pruning plants</span></a><span data-dcnode-id="1623" instrument_node="">, Russian sage is one of the easiest to do.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Before we start, I want to mention that there are different types of Russian sage plants. But don’t worry, these pruning tips work for all of them! So, no matter which variety you have, you can follow these steps.</span></p><span data-dcnode-id="1618" instrument_node="">

e="">
</span><h2 data-dcnode-id="1581"><span class="ez-toc-section" data-dcnode-id="1584" id="Why_Should_You_Prune_Russian_Sage"></span><span data-dcnode-id="1583" instrument_node="">Why Should You Prune Russian Sage</span><span class="ez-toc-section-end" data-dcnode-id="1582"></span></h2><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Pruning is an important part of Russian sage maintenance. If you don’t prune Russian sage, the plant will become very overgrown and woody, which doesn’t look very nice.</span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">It’s also important to know that Russian sage won’t grow back at the tips of the plant after the winter, and the branches die back towards the bottom of the plant. So the dead twigs that are sticking out above the leaves in the spring will be there all summer if you don’t prune it.</span></p><span data-dcnode-id="1574" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1565" id="attachment_18011" style="width: 650px"><picture aria-describedby="caption-attachment-18011" class="wp-image-18011 size-full sp-no-webp" data-dcnode-id="1568" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.jpg" title="My Russian sage before pruning"><source data-dcnode-id="1573" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1572" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning-300x198.jpg 300w" type="image/jpeg"><img alt="My Russian sage before pruning" aria-describedby="caption-attachment-18011" class="wp-image-18011 size-full sp-no-webp entered lazyloaded" data-dcnode-id="1571" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning-300x198.jpg 300w" title="My Russian sage before pruning" width="640"><noscript data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.jpg" aria-describedby="caption-attachment-18011" class="wp-image-18011 size-full sp-no-webp" title="My Russian sage before pruning" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.jpg" alt="My Russian sage before pruning" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/my-russian-sage-before-pruning-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><p class="wp-caption-text" data-dcnode-id="1566" id="caption-attachment-18011"><span data-dcnode-id="1567" instrument_node="">My Russian sage before pruning</span></p></div><span data-dcnode-id="1564" instrument_node="">
</span><h2 data-dcnode-id="1560"><span class="ez-toc-section" data-dcnode-id="1563" id="When_To_Prune_Russian_Sage"></span><span data-dcnode-id="1562" instrument_node="">When To Prune Russian Sage</span><span class="ez-toc-section-end" data-dcnode-id="1561"></span></h2><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">You can prune out the dead growth any time, you won’t harm the plant. But, the best time for pruning Russian sage is in the spring. I find it easier to wait until the leaves have started growing before I prune mine so I know exactly where to cut.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">If you prefer, you can prune your plant while it’s still dormant. Since you can’t over-prune a Russian sage bush, you don’t have to worry about exactly where to make your cuts. Early spring pruning is a good time to shape it if you want a nicely formed, rounded plant.</span></p><span data-dcnode-id="1553" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1543" id="attachment_18014" style="width: 650px"><a data-dcnode-id="1546" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Corona-BP-3224-ComfortGEL-Veggie/dp/B0092KF3WO/ref%3Das_li_ss_tl%3Fs%3Dlawn-garden%26ie%3DUTF8%26qid%3D1475680321%26sr%3D1-40%26keywords%3Dcorona%2Bpruning%2Bshears%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D48ae1dcd442f47f341712f377b4c288c" rel="nofollow noopener noreferrer" target="_blank"><picture aria-describedby="caption-attachment-18014" class="wp-image-18014 size-full sp-no-webp" data-dcnode-id="1547" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.jpg" title="Trimming Russian sage in spring"><source data-dcnode-id="1552" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1551" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring-300x198.jpg 300w" type="image/jpeg"><img alt="Trimming Russian sage in spring" aria-describedby="caption-attachment-18014" class="wp-image-18014 size-full sp-no-webp entered lazyloaded" data-dcnode-id="1550" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring-300x198.jpg 300w" title="Trimming Russian sage in spring" width="640"><noscript data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.jpg" aria-describedby="caption-attachment-18014" class="wp-image-18014 size-full sp-no-webp" title="Trimming Russian sage in spring" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.jpg" alt="Trimming Russian sage in spring" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/trimming-russian-sage-in-spring-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture></a><p class="wp-caption-text" data-dcnode-id="1544" id="caption-attachment-18014"><span data-dcnode-id="1545" instrument_node="">Trimming Russian sage in spring</span></p></div><span data-dcnode-id="1542" instrument_node="">
</span><h2 data-dcnode-id="1538"><span class="ez-toc-section" data-dcnode-id="1541" id="Tools_For_Pruning_Russian_Sage"></span><span data-dcnode-id="1540" instrument_node="">Tools For Pruning Russian Sage</span><span class="ez-toc-section-end" data-dcnode-id="1539"></span></h2><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1536" instrument_node="">Russian sage stems are woody, and can be pretty thick in spots, so I recommend using </span><a data-dcnode-id="1534" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Corona-BP-3224-ComfortGEL-Veggie/dp/B0092KF3WO/ref%3Das_li_ss_tl%3Fs%3Dlawn-garden%26ie%3DUTF8%26qid%3D1475680321%26sr%3D1-40%26keywords%3Dcorona%2Bpruning%2Bshears%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D48ae1dcd442f47f341712f377b4c288c" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1535" instrument_node="">pruning shears</span></a><span data-dcnode-id="1533" instrument_node="">&nbsp;for the job. If you have a large shrub, you can use </span><a data-dcnode-id="1531" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00004R9YA/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB00004R9YA%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3DAIYJRL5CI3ZXFDNW" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1532" instrument_node="">hedge shears</span></a><span data-dcnode-id="1530" instrument_node="">&nbsp;or an </span><a data-dcnode-id="1528" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Troy-Bilt-TB4400-22-Inch-Cordless-Trimmer/dp/B01ITE5GA2/ref%3Das_li_ss_tl%3Fie%3DUTF8%26qid%3D1526053675%26sr%3D8-1%26keywords%3Dtroy-bilt%2Bhedge%2Btrimmer%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D774c2c8345471aa62fb5cedd932f0b4e" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1529" instrument_node="">electric hedge trimmer</span></a><span data-dcnode-id="1527" instrument_node=""> to make pruning easier.</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1524" instrument_node="">I also like to use </span><a data-dcnode-id="1522" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Fiskars-Multi-Snip-with-Sheath-99206935J/dp/B001F0K14Y/ref%3Das_li_ss_tl%3Fie%3DUTF8%26qid%3D1464820978%26sr%3D8-27%26keywords%3Dfiskars%2Bpruners%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D40fc05caa5a1279f988137bbfe2d220d" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1523" instrument_node="">precision pruning snips</span></a><span data-dcnode-id="1521" instrument_node=""> for smaller branches and tips if I’m working around tender new leaves. Whatever garden pruning tools you use, just be sure they are always </span><a data-dcnode-id="1519" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/sharpen-pruning-shears/"><span data-dcnode-id="1520" instrument_node="">cleaned and sharpened</span></a><span data-dcnode-id="1518" instrument_node=""> before you start cutting.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><h2 data-dcnode-id="1512"><span class="ez-toc-section" data-dcnode-id="1515" id="Russian_Sage_Pruning_Techniques"></span><span data-dcnode-id="1514" instrument_node="">Russian Sage Pruning Techniques</span><span class="ez-toc-section-end" data-dcnode-id="1513"></span></h2><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">There are three techniques you can use for pruning Russian sage. You can cut it back all the way down to the ground, prune it for shape, or&nbsp;wait for new growth before pruning it (which is the method I like to use, see the step-by-step instructions below).</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1504"><strong data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Method 1: Cut it down to the ground –</span></strong><span data-dcnode-id="1505" instrument_node=""> If your Russian sage is really woody and hasn’t been pruned before, then you might want to try cutting it all the way down to the ground. This will rejuvenate the plant so it will grow fuller and bushier.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">You can use this technique every year to make pruning easier if you want, it won’t hurt the plant. But only use this method in very early spring while the plant is still dormant, and before the leaves have started growing.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">If your Russian sage leaves have already started growing, then use methods 2 or 3 instead, and wait until next spring to cut it all the way back.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1487" id="attachment_18009" style="width: 650px"><a data-dcnode-id="1490" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Corona-BP-3224-ComfortGEL-Veggie/dp/B0092KF3WO/ref%3Das_li_ss_tl%3Fs%3Dlawn-garden%26ie%3DUTF8%26qid%3D1475680321%26sr%3D1-40%26keywords%3Dcorona%2Bpruning%2Bshears%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D48ae1dcd442f47f341712f377b4c288c" rel="nofollow noopener noreferrer" target="_blank"><picture aria-describedby="caption-attachment-18009" class="wp-image-18009 size-full sp-no-webp" data-dcnode-id="1491" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.jpg" title="Cutting back Russian sage down to ground"><source data-dcnode-id="1496" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1495" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground-300x198.jpg 300w" type="image/jpeg"><img alt="Cutting back Russian sage down to ground" aria-describedby="caption-attachment-18009" class="wp-image-18009 size-full sp-no-webp entered lazyloaded" data-dcnode-id="1494" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground-300x198.jpg 300w" title="Cutting back Russian sage down to ground" width="640"><noscript data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.jpg" aria-describedby="caption-attachment-18009" class="wp-image-18009 size-full sp-no-webp" title="Cutting back Russian sage down to ground" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.jpg" alt="Cutting back Russian sage down to ground" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/cutting-back-russian-sage-down-to-ground-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture></a><p class="wp-caption-text" data-dcnode-id="1488" id="caption-attachment-18009"><span data-dcnode-id="1489" instrument_node="">Cutting back Russian sage down to ground</span></p></div><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1476"><strong data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Method 2: Prune it for shape</span></strong><span data-dcnode-id="1483" instrument_node="">&nbsp;– With this method, you can use </span><a data-dcnode-id="1481" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00004R9YA/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB00004R9YA%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3DAIYJRL5CI3ZXFDNW" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1482" instrument_node="">hedge shears</span></a><span data-dcnode-id="1480" instrument_node="">&nbsp;or an </span><a data-dcnode-id="1478" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Troy-Bilt-TB4400-22-Inch-Cordless-Trimmer/dp/B01ITE5GA2/ref%3Das_li_ss_tl%3Fie%3DUTF8%26qid%3D1526053675%26sr%3D8-1%26keywords%3Dtroy-bilt%2Bhedge%2Btrimmer%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D774c2c8345471aa62fb5cedd932f0b4e" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1479" instrument_node="">electric hedge trimmer</span></a><span data-dcnode-id="1477" instrument_node=""> to shape your Russian sage bush to a nice rounded form. Like I mentioned above, you can’t kill Russian sage by over pruning it, so you really don’t have to be careful.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">In fact, you want to be aggressive with large shrubs. When using this method, cut large plants back to about a foot high.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1468"><strong data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Method 3: Wait for new growth before pruning it</span></strong><span data-dcnode-id="1469" instrument_node=""> – This is my preferred method, but it’s also the most tedious. So, I’ve included step-by-step instructions for how to cut back Russian sage using this method below…</span></p><span data-dcnode-id="1467" instrument_node="">
</span><h2 data-dcnode-id="1463"><span class="ez-toc-section" data-dcnode-id="1466" id="How_To_Trim_Russian_Sage"></span><span data-dcnode-id="1465" instrument_node="">How To Trim Russian Sage</span><span class="ez-toc-section-end" data-dcnode-id="1464"></span></h2><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">If your Russians sage plant is small like mine or it’s immature, then it’s best to hand prune it like I do. You don’t have to be very careful here, if you cut too low on the plant, it’s not going to hurt it.</span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1455"><strong data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Step 1: Look for the new growth –</span></strong><span data-dcnode-id="1456" instrument_node=""> Find the spot on the branch where the new leaves have started growing. That is usually towards the bottom of the stem, but it can be much farther up on some stems.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">If any of the branches are sticking out a lot higher than others, then you can cut them back to the same length so the plant is shapely. Or you can leave them longer if you don’t care about the shape of the plant.</span></p><span data-dcnode-id="1451" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1442" id="attachment_18012" style="width: 650px"><picture aria-describedby="caption-attachment-18012" class="wp-image-18012 size-full sp-no-webp" data-dcnode-id="1445" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.jpg" title="Prune dead stems just above the foliage"><source data-dcnode-id="1450" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1449" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage-300x198.jpg 300w" type="image/jpeg"><img alt="Prune dead stems just above the foliage" aria-describedby="caption-attachment-18012" class="wp-image-18012 size-full sp-no-webp entered lazyloaded" data-dcnode-id="1448" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage-300x198.jpg 300w" title="Prune dead stems just above the foliage" width="640"><noscript data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.jpg" aria-describedby="caption-attachment-18012" class="wp-image-18012 size-full sp-no-webp" title="Prune dead stems just above the foliage" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.jpg" alt="Prune dead stems just above the foliage" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/prune-dead-stems-just-above-the-foliage-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><p class="wp-caption-text" data-dcnode-id="1443" id="caption-attachment-18012"><span data-dcnode-id="1444" instrument_node="">Prune dead stems just above the foliage</span></p></div><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1431"><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Step 2: Cut right above the new leaves –</span></strong><span data-dcnode-id="1438" instrument_node=""> Using </span><a data-amzn-asin="B0092KF3WO" data-dcnode-id="1436" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Corona-BP-3224-ComfortGEL-Veggie/dp/B0092KF3WO/ref%3Das_at/%3FcreativeASIN%3DB0092KF3WO%26imprToken%3DpxKQxWQrTAxlXGD4YjZthA%26slotNum%3D1%26s%3Dlawn-garden%26ie%3DUTF8%26qid%3D1475680321%26sr%3D1-40%26keywords%3Dcorona%2Bpruning%2Bshears%26linkCode%3Dw61%26tag%3Dgetbusgar07-20%26linkId%3D48ae1dcd442f47f341712f377b4c288c" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1437" instrument_node="">pruning shears</span></a><span data-dcnode-id="1435" instrument_node=""> or </span><a data-amzn-asin="B001F0K14Y" data-dcnode-id="1433" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Fiskars-Multi-Snip-with-Sheath-99206935J/dp/B001F0K14Y/ref%3Das_at/%3FcreativeASIN%3DB001F0K14Y%26imprToken%3DpxKQxWQrTAxlXGD4YjZthA%26slotNum%3D4%26ie%3DUTF8%26qid%3D1464820978%26sr%3D8-27%26keywords%3Dfiskars%2Bpruners%26linkCode%3Dw61%26tag%3Dgetbusgar07-20%26linkId%3D40fc05caa5a1279f988137bbfe2d220d" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1434" instrument_node="">precision pruning snips</span></a><span data-dcnode-id="1432" instrument_node="">, cut back the old stem right above the spot where the new foliage is growing. Try to make the cut as close to the leaves as you can, any part of the dead branch that is sticking out will be there all summer.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">When they’re small, the new leaves are very delicate and can break off easily, so be careful. But don’t worry, if you accidentally knock off a few, it’s really not a big deal. They will grow back.</span></p><span data-dcnode-id="1427" instrument_node="">

m-after-cutting-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/russian-sage-stem-after-cutting.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/russian-sage-stem-after-cutting.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/russian-sage-stem-after-cutting.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/russian-sage-stem-after-cutting-300x198.jpg 300w" title="Russian sage stem after cutting" width="640"><noscript data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/russian-sage-stem-after-cutting.jpg" aria-describedby="caption-attachment-18013" class="wp-image-18013 size-full sp-no-webp" title="Russian sage stem after cutting" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/russian-sage-stem-after-cutting.jpg" alt="Russian sage stem after cutting" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/russian-sage-stem-after-cutting.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2018/05/russian-sage-stem-after-cutting-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><p class="wp-caption-text" data-dcnode-id="1419" id="caption-attachment-18013"><span data-dcnode-id="1420" instrument_node="">Russian sage stem after cutting</span></p></div><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1413"><strong data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Step 3: Remove any dead branches –</span></strong><span data-dcnode-id="1414" instrument_node=""> If you find dead branches that don’t have any new leaves on them, you can cut those down to the ground. Many times the dead branches will break off easily, so you can just snap them off at the base if that’s easier.</span></p><span data-dcnode-id="1412" instrument_node="">

</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">You can use any of the three methods every year for all the different Russian sage varieties. Or you can alternate these methods from year to year as you need to in order to keep your plant growing nice, and keep it shapely.</span></p><span data-dcnode-id="1396" instrument_node="">
