</span><div class="" data-dcnode-id="2009"><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Pruning is essential if you really want your rose to thrive. English Roses are naturally vigorous and, if left without pruning, may become large and leggy shrubs.</span></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">The main purpose of pruning is to create a shapely, attractive shrub, with good structure, you can do this by simply removing parts of the plant during the non flowering season. Pruning encourages fresh new growth and plentiful blooms for the following season.</span></p><span data-dcnode-id="2010" instrument_node="">

</span><h3 class="image-details-block__heading h2 heading-color" data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">how to prune a shrub rose</span></h3><span data-dcnode-id="1866" instrument_node="">
</span><div class="" data-dcnode-id="1852"><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1861"><em data-dcnode-id="1862"><strong data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">Pruning requirements vary depending on the age of your rose.&nbsp;</span></strong></em></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">If pruned properly, your rose bush will look signficantly smaller and bare. Do not be alarmed, the growth will strengthen and re-establish quickly in the spring.</span></p><span data-dcnode-id="1857" instrument_node="">
</span><p data-dcnode-id="1854"><em data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">The diagram&nbsp;shows a 2+ year old shrub before and after pruning, once all stems have been cut back by half.</span></em></p><span data-dcnode-id="1853" instrument_node="">
</span></div><span data-dcnode-id="1851" instrument_node="">
</span></div><span data-dcnode-id="1849" instrument_node="">
</span></div><span data-dcnode-id="1847" instrument_node="">

</span><div class="shg-c" data-dcnode-id="1762" id="s-af7498ac-5050-4d3c-a65d-4f9d4d1b007a"><span data-dcnode-id="1838" instrument_node="">
</span><section class="copy-col-two" data-dcnode-id="1764"><span data-dcnode-id="1837" instrument_node="">
</span><div class="copy-col-two__container" data-dcnode-id="1799"><span data-dcnode-id="1836" instrument_node="">
</span><h2 class="h4 copy-col-two__title heading-color" data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Year One</span></h2><span data-dcnode-id="1833" instrument_node="">
</span><div class="copy-col-two__copy" data-dcnode-id="1801"><span data-dcnode-id="1832" instrument_node="">
</span><p data-dcnode-id="1829"><em data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">We define Year One as any rose that has completed its first season of flowering.</span></em></p><span data-dcnode-id="1828" instrument_node="">
</span><p class="copy-col-two__spacer" data-dcnode-id="1827"></p><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">At this stage your rose will still be establishing its roots to support growth in the future, thus only very light pruning is required.</span></p><span data-dcnode-id="1823" instrument_node="">
</span><ul data-dcnode-id="1803"><span data-dcnode-id="1822" instrument_node="">
</span><li data-dcnode-id="1817"><span data-dcnode-id="1821" instrument_node="">
</span><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Step 1</span></strong><span data-dcnode-id="1818" instrument_node=""> – cut back the flowering shoots by 3-5 inches and any very strong shoots that are disproportionate to the rest of the plant.</span></li><span data-dcnode-id="1816" instrument_node="">
</span><li data-dcnode-id="1811"><span data-dcnode-id="1815" instrument_node="">
</span><strong data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Step 2</span></strong><span data-dcnode-id="1812" instrument_node=""> – the ‘four D’s’ – remove any dead, dying, damaged and diseased stems.</span></li><span data-dcnode-id="1810" instrument_node="">
</span><li data-dcnode-id="1805"><span data-dcnode-id="1809" instrument_node="">
</span><strong data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Step 3</span></strong><span data-dcnode-id="1806" instrument_node=""> – remove any foliage that remains. This is where disease spores can lay dormant ready to challenge your plant next year.</span></li><span data-dcnode-id="1804" instrument_node="">
</span></ul><span data-dcnode-id="1802" instrument_node="">
</span></div><span data-dcnode-id="1800" instrument_node="">
</span></div><span data-dcnode-id="1798" instrument_node="">
</span><div class="copy-col-two__container" data-dcnode-id="1766"><span data-dcnode-id="1797" instrument_node="">
</span><h2 class="h4 copy-col-two__title heading-color" data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Year Two</span></h2><span data-dcnode-id="1794" instrument_node="">
</span><div class="copy-col-two__copy" data-dcnode-id="1768"><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Your plant will still be developing its root system and will not be at its mature size or shape.</span></p><span data-dcnode-id="1790" instrument_node="">
</span><ul data-dcnode-id="1770"><span data-dcnode-id="1789" instrument_node="">
</span><li data-dcnode-id="1784"><span data-dcnode-id="1788" instrument_node="">
</span><strong data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Step 1</span></strong><span data-dcnode-id="1785" instrument_node=""> – cut back all stems by one third. Cut back any particularly long stems to the same length as the rest of your shrub.</span></li><span data-dcnode-id="1783" instrument_node="">
</span><li data-dcnode-id="1778"><span data-dcnode-id="1782" instrument_node="">
</span><strong data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Step 2</span></strong><span data-dcnode-id="1779" instrument_node=""> – the ‘four D’s’ – remove any dead, dying, damaged and diseased stems.</span></li><span data-dcnode-id="1777" instrument_node="">
</span><li data-dcnode-id="1772"><span data-dcnode-id="1776" instrument_node="">
</span><strong data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Step 3</span></strong><span data-dcnode-id="1773" instrument_node=""> – remove any foliage that remains.</span></li><span data-dcnode-id="1771" instrument_node="">
</span></ul><span data-dcnode-id="1769" instrument_node="">
</span></div><span data-dcnode-id="1767" instrument_node="">
</span></div><span data-dcnode-id="1765" instrument_node="">
</span></section><span data-dcnode-id="1763" instrument_node="">
</span></div><span data-dcnode-id="1761" instrument_node="">
</span><div class="shg-c" data-dcnode-id="1679" id="s-c5e4a76c-d875-4c26-a56b-91f32857d2be"><span data-dcnode-id="1760" instrument_node="">
</span><section class="copy-col-two" data-dcnode-id="1681"><span data-dcnode-id="1759" instrument_node="">
</span><div class="copy-col-two__container" data-dcnode-id="1693"><span data-dcnode-id="1758" instrument_node="">
</span><h2 class="h4 copy-col-two__title heading-color" data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Year Three</span></h2><span data-dcnode-id="1755" instrument_node="">
</span><div class="copy-col-two__copy" data-dcnode-id="1695"><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">By the third year your rose will be a fully formed plant. Your choice of how much you cut back is a little more flexible. You now have the opportunity to influence the size and shape of your shrub.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p class="copy-col-two__spacer" data-dcnode-id="1750"></p><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1746"><em data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Before pruning, choose from one of the following:</span></em></p><span data-dcnode-id="1745" instrument_node="">
</span><ol data-dcnode-id="1722"><span data-dcnode-id="1744" instrument_node="">
</span><li data-dcnode-id="1738"><span data-dcnode-id="1743" instrument_node="">
</span><em data-dcnode-id="1740"><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">For a taller shrub</span></strong></em><span data-dcnode-id="1739" instrument_node=""> – cut back by less than one third.</span></li><span data-dcnode-id="1737" instrument_node="">
</span><li data-dcnode-id="1731"><span data-dcnode-id="1736" instrument_node="">
</span><em data-dcnode-id="1733"><strong data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">To maintain its current size</span></strong></em><span data-dcnode-id="1732" instrument_node=""> – cut your rose back by one third.</span></li><span data-dcnode-id="1730" instrument_node="">
</span><li data-dcnode-id="1724"><span data-dcnode-id="1729" instrument_node="">
</span><em data-dcnode-id="1726"><strong data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">To reduce its size</span></strong></em><span data-dcnode-id="1725" instrument_node=""> – cut back by a half or even more. This will reduce the size of the shrub without impacting the amount of flowering.</span></li><span data-dcnode-id="1723" instrument_node="">
</span></ol><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1718"><em data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Then follow these steps:</span></em></p><span data-dcnode-id="1717" instrument_node="">
</span><ul data-dcnode-id="1697"><span data-dcnode-id="1716" instrument_node="">
</span><li data-dcnode-id="1711"><span data-dcnode-id="1715" instrument_node="">
</span><strong data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Step 1</span></strong><span data-dcnode-id="1712" instrument_node=""> – cut back all stems depending on your choice from above. Cut back any particularly long stems to the same length as the rest of your shrub.</span></li><span data-dcnode-id="1710" instrument_node="">
</span><li data-dcnode-id="1705"><span data-dcnode-id="1709" instrument_node="">
</span><strong data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Step 2</span></strong><span data-dcnode-id="1706" instrument_node=""> – the ‘four D’s’ – remove any dead, dying, damaged and diseased stems.</span></li><span data-dcnode-id="1704" instrument_node="">
</span><li data-dcnode-id="1699"><span data-dcnode-id="1703" instrument_node="">
</span><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Step 3</span></strong><span data-dcnode-id="1700" instrument_node=""> – remove any foliage that remains.</span></li><span data-dcnode-id="1698" instrument_node="">
</span></ul><span data-dcnode-id="1696" instrument_node="">
</span></div><span data-dcnode-id="1694" instrument_node="">
</span></div><span data-dcnode-id="1692" instrument_node="">
</span><div class="copy-col-two__container" data-dcnode-id="1683"><span data-dcnode-id="1691" instrument_node="">
</span><h2 class="h4 copy-col-two__title heading-color" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Year Four and Beyond</span></h2><span data-dcnode-id="1688" instrument_node="">
</span><div class="copy-col-two__copy" data-dcnode-id="1685"><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">To ensure your rose performs to its optimum, we recommend following the steps in Year Three every year.</span></p></div><span data-dcnode-id="1684" instrument_node="">
</span></div><span data-dcnode-id="1682" instrument_node="">
</span></section><span data-dcnode-id="1680" instrument_node="">
</span></div><span data-dcnode-id="1678" instrument_node="">
</span><div class="shg-c" data-dcnode-id="1668" id="s-7eb1c3f7-55df-4587-9ace-f7b03d845ac7"><span data-dcnode-id="1677" instrument_node="">
</span><section class="separator top-spacing bottom-spacing" data-dcnode-id="1670"><span data-dcnode-id="1676" instrument_node="">
</span><div class="container" data-dcnode-id="1672"><span data-dcnode-id="1675" instrument_node="">
</span><hr data-dcnode-id="1674"><span data-dcnode-id="1673" instrument_node="">
</span></div><span data-dcnode-id="1671" instrument_node="">
</span></section><span data-dcnode-id="1669" instrument_node="">
</span></div><span data-dcnode-id="1667" instrument_node="">
</span><div class="shg-c" data-dcnode-id="1650" id="s-d2d03267-cc61-479f-bf43-5880bd2f9246"><span data-dcnode-id="1666" instrument_node="">
</span><div class="container" data-dcnode-id="1652"><span data-dcnode-id="1665" instrument_node="">
</span><div class="row" data-dcnode-id="1654"><span data-dcnode-id="1664" instrument_node="">
</span><div class="col xs12 m10 offset-m1" data-dcnode-id="1656"><span data-dcnode-id="1663" instrument_node="">
</span><h2 data-dcnode-id="1661" style="text-align: center;"><span data-dcnode-id="1662" instrument_node="">KEY POINTS</span></h2><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1658" style="text-align: center;"><span data-dcnode-id="1659" instrument_node="">Remember these key points to ensure effective pruning:</span></p><span data-dcnode-id="1657" instrument_node="">
</span></div><span data-dcnode-id="1655" instrument_node="">
</span></div><span data-dcnode-id="1653" instrument_node="">
</span></div><span data-dcnode-id="1651" instrument_node="">
</span></div><span data-dcnode-id="1649" instrument_node="">
</span><div class="shg-c" data-dcnode-id="1611" id="s-664ae271-303e-4982-b660-a6918403589c"><span data-dcnode-id="1648" instrument_node="">
</span><section class="copy-col-two" data-dcnode-id="1613"><span data-dcnode-id="1647" instrument_node="">
</span><div class="copy-col-two__container" data-dcnode-id="1630"><span data-dcnode-id="1646" instrument_node="">
</span><h2 class="h4 copy-col-two__title heading-color" data-dcnode-id="1645"></h2><span data-dcnode-id="1644" instrument_node="">
</span><div class="copy-col-two__copy" data-dcnode-id="1632"><ul data-dcnode-id="1633"><span data-dcnode-id="1643" instrument_node="">
</span><li data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Shaping is essential. Try to create a rounded shrub.</span></li><span data-dcnode-id="1640" instrument_node="">
</span><li data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">Don’t worry about where you cut a stem. Accepted wisdom suggests cutting just above a leaf joint with a sloping cut away from the bud. However, there is no evidence to prove this is necessary.</span></li><span data-dcnode-id="1637" instrument_node="">
</span><li data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Don’t worry about cutting back too much. Roses are extremely strong and will grow back even if you cut all of the stems right back to the base.</span></li><span data-dcnode-id="1634" instrument_node="">
</span></ul></div><span data-dcnode-id="1631" instrument_node="">
</span></div><span data-dcnode-id="1629" instrument_node="">
</span><div class="copy-col-two__container" data-dcnode-id="1615"><span data-dcnode-id="1628" instrument_node="">
</span><h2 class="h4 copy-col-two__title heading-color" data-dcnode-id="1627"></h2><span data-dcnode-id="1626" instrument_node="">
</span><div class="copy-col-two__copy" data-dcnode-id="1617"><ul data-dcnode-id="1618"><span data-dcnode-id="1625" instrument_node="">
</span><li data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Carefully dispose of foliage. Foliage should never be composted and should be removed from your garden. This ensures spores that can initiate disease are removed from your garden.</span></li><span data-dcnode-id="1622" instrument_node="">
</span><li data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Look out for loose roses. Look out for any roses that are loose in the ground due to the wind rocking them to the point where they are no longer standing upright. Firm around the base of each loose rose and cut them back a little more to reduce wind resistance.</span></li><span data-dcnode-id="1619" instrument_node="">
</span></ul></div><span data-dcnode-id="1616" instrument_node="">
