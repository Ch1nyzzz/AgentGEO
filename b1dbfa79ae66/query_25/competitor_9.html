</span><div class="singmig" data-dcnode-id="821"><span data-dcnode-id="830" instrument_node="">
</span><img alt="" class="attachment-medium size-medium wp-post-image jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="829" data-lazy-loaded="1" height="300" itemprop="image" loading="eager" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeningknowhow.com/wp-content/uploads/2021/01/winter-pruning-400x300.jpg&amp;raw" srcset="https://www.gardeningknowhow.com/wp-content/uploads/2021/01/winter-pruning-400x300.jpg 400w, https://www.gardeningknowhow.com/wp-content/uploads/2021/01/winter-pruning-1024x768.jpg 1024w, https://www.gardeningknowhow.com/wp-content/uploads/2021/01/winter-pruning-690x518.jpg 690w, https://www.gardeningknowhow.com/wp-content/uploads/2021/01/winter-pruning-1536x1152.jpg 1536w, https://www.gardeningknowhow.com/wp-content/uploads/2021/01/winter-pruning.jpg 1600w" style="width:400px;height:300px;" width="400"><span data-dcnode-id="828" instrument_node=""> </span><div class="imageby" data-dcnode-id="823"><span data-dcnode-id="827" instrument_node="">
			Image by </span><a data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.istockphoto.com/photo/tree-pruning-during-sunny-winter-day-gm912985828-251326621" rel="nofollow"><span data-dcnode-id="826" instrument_node="">triocean</span></a><span data-dcnode-id="824" instrument_node="">

</span></div><span data-dcnode-id="820" instrument_node="">
</span><div data-dcnode-id="765" id="main-art" itemprop="articleBody"><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="818" instrument_node="">Most </span><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeningknowhow.com/ornamental/trees/tgen/what-are-deciduous-plants.htm"><span data-dcnode-id="817" instrument_node="">deciduous trees and shrubs</span></a><span data-dcnode-id="815" instrument_node=""> are dormant in winter, dropping their leaves, ceasing their growth, and settling down to rest. That makes pruning in winter a very good idea, although there are some trees and shrubs that require summer pruning. If you are wondering how to tell those apart that require summer pruning or how to prune in winter, read on for winter pruning tips.</span></p><span data-dcnode-id="813" instrument_node="">
</span><h2 data-dcnode-id="811" id="h-pruning-in-winter"><span data-dcnode-id="812" instrument_node="">Pruning in Winter</span></h2><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">If you have deciduous trees and shrubs in your backyard, you know how different they look in winter than in summer. As these plants lose their foliage in fall to prepare for dormancy, you see their “bones” clearly, their trunk (or trunks) and all of their branches.&nbsp;</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="803"><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeningknowhow.com/ornamental/trees/tgen/winter-damaged-trees-shrubs.htm"><span data-dcnode-id="806" instrument_node="">Winter pruning</span></a><span data-dcnode-id="804" instrument_node=""> trees and shrubs makes a lot of sense. Since the plants are essentially “sleeping” during dormancy rather than actively growing, they will lose less sap from trimming than they would in summer. In addition, it’s far easier to notice broken, dead, diseased, or weak limbs that should be removed.</span></p><span data-dcnode-id="802" instrument_node="">
</span><h2 data-dcnode-id="800" id="h-winter-pruning-trees-and-shrubs"><span data-dcnode-id="801" instrument_node="">Winter Pruning Trees and Shrubs</span></h2><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">So which shrubs and trees should be pruned in winter? Basically, winter pruning shrubs and trees works for those that bloom on new growth. However, winter pruning would eliminate next year’s flowers for those that bloom on old growth.&nbsp;</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="795" instrument_node="">For example, some </span><a data-dcnode-id="793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeningknowhow.com/ornamental/shrubs/hydrangea/prune-hydrangea-bushes-hydrangea-pruning-instructions.htm"><span data-dcnode-id="794" instrument_node="">hydrangeas</span></a><span data-dcnode-id="792" instrument_node=""> start to set buds soon after their flowers fade and those should be pruned in summer. May is the cut off; if the tree or shrub blooms before May, prune it right after it blooms. If it blooms in May or after, prune it the following winter.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">What about evergreens? </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeningknowhow.com/ornamental/trees/tgen/evergreen-tree-varieties.htm"><span data-dcnode-id="788" instrument_node="">Evergreens</span></a><span data-dcnode-id="786" instrument_node=""> enter dormancy in winter too. Although they don’t drop their foliage, they do cease active growth. Winter pruning shrubs and trees is also best for evergreens.&nbsp;</span></p><span data-dcnode-id="784" instrument_node="">
</span><h2 data-dcnode-id="782" id="h-winter-pruning-tips"><span data-dcnode-id="783" instrument_node="">Winter Pruning Tips</span></h2><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">If you are wondering how to prune in winter, here are a few important tips. Wait until late winter to prune. Early winter pruning can dry out the tree in freezing weather. Any pruning in winter should also wait for a dry, mild day. Rain or runoff can help to spread waterborne plant diseases and truly cold temperatures during pruning can damage the tree.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">The first step for any winter pruning or tree is to take out dead, diseased, or broken branches. This applies to evergreens and deciduous trees as well. The way to do this is by cutting a branch at the point where it joins another. Dormancy is also the best time to take off the unwanted lower branches on all evergreen shrubs and trees.&nbsp;</span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Winter pruning trees is the best time to remove branches that rub against each other. During the cold season, you should also eliminate double leaders and take out narrow V-shaped forks.&nbsp;</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">After that, think about </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeningknowhow.com/ornamental/trees/tgen/thinning-canopies-in-trees.htm"><span data-dcnode-id="770" instrument_node="">thinning</span></a><span data-dcnode-id="768" instrument_node=""> the trees or shrubs. Prune out overgrown branches to allow sunlight and air to enter the tree canopy. Don’t trim out branches that provide part of the structure of the tree.&nbsp;&nbsp;</span></p><span data-dcnode-id="766" instrument_node="">
</span></div><span data-dcnode-id="764" instrument_node="">
