</span><div class="body-ad-wrapper block block-layout-builder block-field-blocknodeblogfield-body" data-dcnode-id="1066"><span data-dcnode-id="1423" instrument_node="">
</span><div class="block__content" data-dcnode-id="1068"><span data-dcnode-id="1422" instrument_node="">
</span><div class="text-content field field--name-field-body field--type-text-long field--label-hidden field__item" data-dcnode-id="1070"><div data-dcnode-id="1418" id="first-para-wrapper"><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Many of our favorite tender or semi-hardy garden plants won’t survive winter outdoors. To enjoy them next&nbsp;year, take cuttings of your plants to make new plants—for free! Plant propagation is really rewarding.&nbsp;Here’s how to take herbaceous, softwood, semi-hardwood, and hardwood cuttings from your garden plants—and when to do&nbsp;it!</span></p><span data-dcnode-id="1419" instrument_node="">
</span></div><div class="ad-wrapper" data-dcnode-id="1408"><span data-dcnode-id="1416" instrument_node="">
</span><div align="center" data-dcnode-id="1413" data-freestar-ad="__300x250 __300x250" id="almanac_sidebar_right_2"></div><span data-dcnode-id="1412" instrument_node="">
</span><span class="advertisement-label" data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Advertisement</span></span><span data-dcnode-id="1409" instrument_node="">
</span></div><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">One of my favorite aspects of gardening is plant propagation. Whether it’s from seed or from a cutting, I love seeing a new plant emerge and grow. Taking stem cuttings is an easy way to propagate your favorite garden plants in order to grow them again&nbsp;next year, fill in empty garden space, or share them with&nbsp;friends.</span></p><span data-dcnode-id="1404" instrument_node="">
</span><h3 data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Types of Stem&nbsp;Cuttings</span></h3><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">The first thing to know is that not all cuttings are not created equal.&nbsp;Depending on the type of plant and time of year, there are different types of cuttings that should be taken!&nbsp;Here are the main types of stem cuttings to know and the timing&nbsp;for&nbsp;each:</span></p><span data-dcnode-id="1398" instrument_node="">
</span><ul data-dcnode-id="1385"><span data-dcnode-id="1397" instrument_node="">
</span><li data-dcnode-id="1387"><strong data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Herbaceous stem cuttings</span></strong><span data-dcnode-id="1394" instrument_node=""> can be taken at any time during the growing season (spring to late fall)&nbsp;from soft, non-woody growth on annuals and perennials. This includes most garden flowers and foliage plants that produce non-woody stems (e.g., </span><a data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/coleus"><span data-dcnode-id="1393" instrument_node="">coleus</span></a><span data-dcnode-id="1391" instrument_node="">,&nbsp;chrysanthemums, </span><a data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/mint"><span data-dcnode-id="1390" instrument_node="">mint</span></a><span data-dcnode-id="1388" instrument_node="">, etc.), as well&nbsp;as&nbsp;houseplants.</span></li><span data-dcnode-id="1386" instrument_node="">
</span></ul><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">The growth of woody plants such as trees and shrubs changes as the growing season progresses, maturing from softwood to&nbsp;hardwood.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><ul data-dcnode-id="1313"><span data-dcnode-id="1380" instrument_node="">
</span><li data-dcnode-id="1355"><strong data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">Softwood stem cuttings</span></strong><span data-dcnode-id="1377" instrument_node=""> are taken in the spring and early summer—between April and July—from&nbsp;the tender new growth on woody shrubs, trees, and vines. These cuttings tend to grow new roots the fastest.

	</span><ul data-dcnode-id="1357"><span data-dcnode-id="1376" instrument_node="">
</span><li data-dcnode-id="1359"><span data-dcnode-id="1375" instrument_node="">Softwood cuttings can be taken from plants such as </span><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/clematis"><span data-dcnode-id="1374" instrument_node="">clematis</span></a><span data-dcnode-id="1372" instrument_node="">, </span><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/lilacs"><span data-dcnode-id="1371" instrument_node="">lilac</span></a><span data-dcnode-id="1369" instrument_node="">, </span><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/forsythia"><span data-dcnode-id="1368" instrument_node="">forsythia</span></a><span data-dcnode-id="1366" instrument_node="">, weigela, </span><a data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/hydrangeas"><span data-dcnode-id="1365" instrument_node="">hydrangea</span></a><span data-dcnode-id="1363" instrument_node="">,&nbsp;</span><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/hibiscus"><span data-dcnode-id="1362" instrument_node="">Rose of Sharon</span></a><span data-dcnode-id="1360" instrument_node="">, and spirea, to name a&nbsp;few.&nbsp;</span></li><span data-dcnode-id="1358" instrument_node="">
</span></ul><span data-dcnode-id="1356" instrument_node="">
</span></li><span data-dcnode-id="1354" instrument_node="">
</span><li data-dcnode-id="1326"><strong data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Semi-hardwood (or “semi-ripe”) stem cuttings</span></strong><span data-dcnode-id="1351" instrument_node=""> are taken from late-summer to early fall from this year’s growth. While the base of these cuttings is woody and firm, the growth at the top should still be soft.&nbsp;In autumn, hormone levels are high, so plants should root and grow well.
	</span><ul data-dcnode-id="1328"><span data-dcnode-id="1350" instrument_node="">
</span><li data-dcnode-id="1330"><span data-dcnode-id="1349" instrument_node="">Semi-hardwood cuttings can be taken from woody evergeens&nbsp;such as </span><a data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/arborvitae"><span data-dcnode-id="1348" instrument_node="">arborvitae</span></a><span data-dcnode-id="1346" instrument_node="">, boxwood, holly, </span><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/rhododendrons"><span data-dcnode-id="1345" instrument_node="">rhododendron</span></a><span data-dcnode-id="1343" instrument_node="">, and yew, as well as other woody shrubs, like rose,&nbsp;lilac, hydrangea, and forsythia. Herbs such as </span><a data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/lavender"><span data-dcnode-id="1342" instrument_node="">lavender</span></a><span data-dcnode-id="1340" instrument_node="">, bay, </span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/rosemary"><span data-dcnode-id="1339" instrument_node="">rosemary</span></a><span data-dcnode-id="1337" instrument_node="">, </span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/sage"><span data-dcnode-id="1336" instrument_node="">sage</span></a><span data-dcnode-id="1334" instrument_node="">, and </span><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/plant/thyme"><span data-dcnode-id="1333" instrument_node="">thyme</span></a><span data-dcnode-id="1331" instrument_node=""> also grow well from semi-hardwood&nbsp;cuttings.</span></li><span data-dcnode-id="1329" instrument_node="">
</span></ul><span data-dcnode-id="1327" instrument_node="">
</span></li><span data-dcnode-id="1325" instrument_node="">
</span><li data-dcnode-id="1315"><strong data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Hardwood stem cuttings </span></strong><span data-dcnode-id="1322" instrument_node="">are taken in late fall, winter, or early spring while the plants are fully dormant. Hardwood cuttings are taken from mature growth produced in the&nbsp;last&nbsp;season or the season before. These cuttings are slower to grow roots,&nbsp;but can still be grown successfully with a bit of patience!
	</span><ul data-dcnode-id="1317"><span data-dcnode-id="1321" instrument_node="">
</span><li data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Hardwood cuttings can be taken from most deciduous shrubs&nbsp; such as forsythia, rose, viburnum, deutzia, Rose of Sharon, and&nbsp;weigela.&nbsp;</span></li><span data-dcnode-id="1318" instrument_node="">
</span></ul><span data-dcnode-id="1316" instrument_node="">
</span></li><span data-dcnode-id="1314" instrument_node="">
</span></ul><span data-dcnode-id="1312" instrument_node="">
</span><ul data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">
</span></ul><span data-dcnode-id="1309" instrument_node="">
</span><figure class="image" data-dcnode-id="1303"><img alt="The new growth on this lilac shows the ripening wood at the base and soft wood at the top." data-dcnode-id="1308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/sites/default/files/users/Robin%2520Sweetser/cuttings_026_full_width.jpg&amp;raw" style="width:720px;height:540px;"><span data-dcnode-id="1307" instrument_node="">
</span><figcaption data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">The new growth on this lilac shows the ripening wood at the base and soft wood at the top. Perfect for taking a semi-hardwood cutting from!</span></figcaption><span data-dcnode-id="1304" instrument_node="">
</span></figure><span data-dcnode-id="1302" instrument_node="">
</span><h3 data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Plants to Propagate&nbsp;from&nbsp;Cuttings</span></h3><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Even with a greenhouse, we don’t have enough room for all the plants&nbsp;we want to save and it’s even more difficult if you are trying to fit them all on a sunny windowsill. Instead of lugging in large containers and digging up entire plants, you can easily take herbaceous, softwood, or semi-hardwood cuttings of your favorites and start&nbsp;new&nbsp;plants.&nbsp;</span></p><span data-dcnode-id="1296" instrument_node="">
</span><p data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">Tender container plants such as coleus and iresine are at their peak in mid-summer, but when the weather turns colder, they will be lost unless you bring them inside. One way to ensure that they last through winter is to take a few cuttings and keep them indoors until&nbsp;spring.</span></p><span data-dcnode-id="1293" instrument_node="">
</span><figure class="image" data-dcnode-id="1287"><img alt="Lilac, rose, and wiegela cuttings ready for root powder." data-dcnode-id="1292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/sites/default/files/users/Robin%2520Sweetser/cuttings_033_full_width.jpg&amp;raw" style="width:720px;height:540px;"><span data-dcnode-id="1291" instrument_node="">
</span><figcaption data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Semi-hardwood cuttings of lilac, rose, and weigela ready for rooting powder.</span></figcaption><span data-dcnode-id="1288" instrument_node="">
</span></figure><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Almost any garden plant that produces stems&nbsp;can be be propagated via stem cuttings. Perennial flowers, vines, shrubs, and even trees are all great&nbsp;candidates!</span></p><span data-dcnode-id="1283" instrument_node="">
</span><figure class="image" data-dcnode-id="1277"><img alt="Iresine is a good candidate for propagation." data-dcnode-id="1282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/sites/default/files/users/Robin%2520Sweetser/propagation_002.jpg&amp;raw"><span data-dcnode-id="1281" instrument_node="">
</span><figcaption data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Iresine is a great candidate for propagation.</span></figcaption><span data-dcnode-id="1278" instrument_node="">
</span></figure><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Many herbaceous cuttings root so easily that&nbsp;they will even root&nbsp;in a glass of water.&nbsp;This includes&nbsp;coleus, African violet, some ivies, iresine, mints, and impatiens. (If you try this, keep the water clean and put the glass out of direct sunlight.&nbsp;Once roots form, transfer to&nbsp;soil.)</span></p><span data-dcnode-id="1273" instrument_node="">
</span><figure class="image" data-dcnode-id="1267"><img alt="Coleus are extremely easy to propagate, rooting readily from their stems." data-dcnode-id="1272" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/sites/default/files/users/Robin%2520Sweetser/propagation_005.jpg&amp;raw" style="font-size:17.6px; line-height:1.4"><span data-dcnode-id="1271" instrument_node="">
</span><figcaption data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">Coleus are extremely easy to propagate, rooting readily from their stems.</span></figcaption><span data-dcnode-id="1268" instrument_node="">
</span></figure><span data-dcnode-id="1266" instrument_node="">
</span><h3 data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Supplies Needed for Taking&nbsp;Cuttings</span></h3><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">Before you start taking cuttings, take time to gather all the materials you’ll need. If you are organized, you’ll be able to prepare a lot of cuttings in a short time. You’ll&nbsp;need:</span></p><span data-dcnode-id="1260" instrument_node="">
</span><ul data-dcnode-id="1243"><span data-dcnode-id="1259" instrument_node="">
</span><li data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">clean plastic pots or&nbsp;boxes</span></li><span data-dcnode-id="1256" instrument_node="">
</span><li data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">a bag of sterile potting soil and perlite or&nbsp;vermiculite</span></li><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">powdered rooting hormone (optional, but&nbsp;recommended)</span></li><span data-dcnode-id="1250" instrument_node="">
</span><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">a sharp knife, clippers, or razor&nbsp;blade</span></li><span data-dcnode-id="1247" instrument_node="">
</span><li data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">rubbing alcohol to sterilize your cutting&nbsp;tool</span></li><span data-dcnode-id="1244" instrument_node="">
</span></ul><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">As a rooting medium, you can use a mix of potting soil (soilless mixes are best) and perlite or vermiculite to make it drain faster. I have had success using straight vermiculite as&nbsp;well.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><figure class="image" data-dcnode-id="1233"><img alt="rosemary-1347087_1920_full_width.jpg" data-dcnode-id="1238" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/sites/default/files/users/AlmanacStaffArchive/rosemary-1347087_1920_full_width.jpg&amp;raw"><span data-dcnode-id="1237" instrument_node="">
</span><figcaption data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Rosemary can be propagated via softwood cuttings (new growth), hardwood cuttings (old growth), or semi-hardwood cuttings (a mix of old and new growth).</span></figcaption><span data-dcnode-id="1234" instrument_node="">
</span></figure><span data-dcnode-id="1232" instrument_node="">
</span><h2 data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Taking Stem&nbsp;Cuttings</span></h2><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Taking cuttings is easy, but the&nbsp;methods used for propagating softwood, semi-hardwood, and hardwood cuttings&nbsp;differ slightly. The techniques&nbsp;are listed below, but first, here are a few general tips to keep in&nbsp;mind:</span></p><span data-dcnode-id="1226" instrument_node="">
</span><ul data-dcnode-id="1215"><span data-dcnode-id="1225" instrument_node="">
</span><li data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Cuttings taken from the base of a plant will typically root faster than those taken from the&nbsp;top.&nbsp;</span></li><span data-dcnode-id="1222" instrument_node="">
</span><li data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Thin cuttings root better than thick&nbsp;ones.</span></li><span data-dcnode-id="1219" instrument_node="">
</span><li data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Plants grown in shade root more quickly than those grown in full&nbsp;sun.</span></li><span data-dcnode-id="1216" instrument_node="">
</span></ul><span data-dcnode-id="1214" instrument_node="">
</span><h3 data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">How to&nbsp;Take Herbaceous and Softwood Cuttings (Spring to&nbsp;Early&nbsp;Summer)</span></h3><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Herbaceous cuttings can be taken throughout the growing season (spring to late fall), while softwood cuttings should be taken in&nbsp;spring or&nbsp;early summer. Cuttings can be taken as long as the parent plant is healthy and in active growth. This method can be used on&nbsp;tender and hardy perennials such as verbena, mint, and petunias, as well as shrubs such as hydrangeas and&nbsp;fuchsia.&nbsp;</span></p><span data-dcnode-id="1208" instrument_node="">
</span><ol data-dcnode-id="1188"><span data-dcnode-id="1207" instrument_node="">
</span><li data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Fill your containers with a potting mix and water so that the mix is&nbsp;moistened.</span></li><span data-dcnode-id="1204" instrument_node="">
</span><li data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Look for new, vigorous side shoots or tip growth and prune&nbsp;off a 3- to 4-inch&nbsp;piece just below a leaf&nbsp;node.</span></li><span data-dcnode-id="1201" instrument_node="">
</span><li data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Remove the lower leaves and any flowers or buds, moisten the stem in water and dip it into a little pile of rooting hormone (not directly into the jar because you could contaminate the whole&nbsp;container).</span></li><span data-dcnode-id="1198" instrument_node="">
</span><li data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Make a hole in the soil with a pencil, stick your cutting into the hole, firm the soil around it, and gently water&nbsp;it.</span></li><span data-dcnode-id="1195" instrument_node="">
</span><li data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Take more cuttings.&nbsp;Twelve&nbsp;plants fit nicely in a rectangular box. Always take more cuttings than you need because some are likely to&nbsp;fail.</span></li><span data-dcnode-id="1192" instrument_node="">
</span><li data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Be sure to include a label&nbsp;with any pertinent info on&nbsp;it!</span></li><span data-dcnode-id="1189" instrument_node="">
</span></ol><span data-dcnode-id="1187" instrument_node="">
</span><h3 data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">How to Take Semi-Hardwood Cuttings (Mid-Summer to Early&nbsp;Fall)</span></h3><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Take semi-hardwood cuttings from mid-summer to early fall. A healthy semi-hardwood cutting includes a bit of both old and new growth.&nbsp;This technique works well on broadleaf evergreens such as holly, boxwood, and rhododendrons; deciduous shrubs such as lilac; woody herbs such as lavender, rosemary, and thyme; and even some&nbsp;conifers.</span></p><span data-dcnode-id="1181" instrument_node="">
</span><ol data-dcnode-id="1161"><span data-dcnode-id="1180" instrument_node="">
</span><li data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Fill your containers with a potting mix and water so that the mix is&nbsp;moistened.</span></li><span data-dcnode-id="1177" instrument_node="">
</span><li data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Take a cutting that is 4 to 6 inches in&nbsp;length.</span></li><span data-dcnode-id="1174" instrument_node="">
</span><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Remove the bottom-most leaves and the growing tip.&nbsp;If the remaining leaves are large, cut them in half horizontally to reduce the amount of moisture&nbsp;loss.</span></li><span data-dcnode-id="1171" instrument_node="">
</span><li data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Dip the base of the cutting&nbsp;into a rooting hormone and stick it&nbsp;into a container of potting&nbsp;mix.</span></li><span data-dcnode-id="1168" instrument_node="">
</span><li data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Place the container&nbsp;in a plastic bag and blow in some air to puff it up before tying it shut. Put the pot in a bright spot out of direct sunlight so you don’t cook the cuttings. Open the bag weekly to add fresh air and to check the plants for mold or new&nbsp;growth.</span></li><span data-dcnode-id="1165" instrument_node="">
</span><li data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">It can take 4-5 weeks or up to 6 months for roots to form, so don’t get discouraged. The firmer the wood, the longer it takes to&nbsp;root.</span></li><span data-dcnode-id="1162" instrument_node="">
</span></ol><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Another type of semi-hardwood cutting is called a “heel cutting.” Heel cuttings&nbsp;are pulled off the plant rather than&nbsp;cut (see photo, below). They will have a piece of old bark from the original stem still attached, which often aids in&nbsp;rooting.</span></p><span data-dcnode-id="1157" instrument_node="">
</span><figure class="image" data-dcnode-id="1151"><img alt="Heel cutting is made by pulling the stem away from the branch rather than cutting it off." data-dcnode-id="1156" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/sites/default/files/users/Robin%2520Sweetser/cuttings_027_full_width.jpg&amp;raw" style="width:720px;height:540px;"><span data-dcnode-id="1155" instrument_node="">
</span><figcaption data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">A heel cutting is made by pulling the stem away from the branch rather than cutting it off.</span></figcaption><span data-dcnode-id="1152" instrument_node="">
</span></figure><span data-dcnode-id="1150" instrument_node="">
</span><h3 data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">How to Take Hardwood Cuttings (Late Fall to&nbsp;Winter)</span></h3><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Take hardwood cuttings in late&nbsp;fall or&nbsp;winter, when plants are dormant. These cuttings can also be taken in early spring before new growth appears. Generally, this method works great for deciduous shrubs such as forsythia, dogwood, viburnum, willow, mock orange, yew, and&nbsp;privet.</span></p><span data-dcnode-id="1144" instrument_node="">
</span><ol data-dcnode-id="1112"><span data-dcnode-id="1143" instrument_node="">
</span><li data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Fill your containers with a potting mix and water so that the mix is&nbsp;moistened.</span></li><span data-dcnode-id="1140" instrument_node="">
</span><li data-dcnode-id="1129"><span data-dcnode-id="1139" instrument_node="">Find a healthy-looking&nbsp;hardwood stem or branch that you can take a 6- to 8-inch cutting from.
	</span><ul data-dcnode-id="1131"><span data-dcnode-id="1138" instrument_node="">
</span><li data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Make the&nbsp;cut just below a bud (aka, a leaf&nbsp;node).</span></li><span data-dcnode-id="1135" instrument_node="">
</span><li data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Trim&nbsp;off any softwood growth from the top of the cutting, making an angled cut right above a bud. Having an angled cut at the top of a cutting helps to prevent rot and also allows you to identify which end should be facing&nbsp;up!</span></li><span data-dcnode-id="1132" instrument_node="">
</span></ul><span data-dcnode-id="1130" instrument_node="">
</span></li><span data-dcnode-id="1128" instrument_node="">
</span><li data-dcnode-id="1117"><span data-dcnode-id="1127" instrument_node="">Dip the base in rooting hormone. Stick the cutting&nbsp;in a container of&nbsp;potting soil, leaving only the top 2 to 4 inches exposed.
	</span><ul data-dcnode-id="1119"><span data-dcnode-id="1126" instrument_node="">
</span><li data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">If you are making a lot of cuttings, stick them 4 to 6 inches apart in a nursery bed outside and cover with floating row&nbsp;cover.</span></li><span data-dcnode-id="1123" instrument_node="">
</span><li data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">If using pots, put them in a protected but unheated place (like a cold frame or shed) where they get some&nbsp;light.</span></li><span data-dcnode-id="1120" instrument_node="">
</span></ul><span data-dcnode-id="1118" instrument_node="">
</span></li><span data-dcnode-id="1116" instrument_node="">
</span><li data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Keep the soil on the dry side during&nbsp;the winter and start to water more as the temperatures warm up. Move the pot outside to a shady spot after the last frost of spring. You should see some new growth by&nbsp;mid-spring.</span></li><span data-dcnode-id="1113" instrument_node="">
</span></ol><span data-dcnode-id="1111" instrument_node="">
</span><figure class="image" data-dcnode-id="1105"><img alt="Cuttings in their new home. Hopefully they will root!" data-dcnode-id="1110" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/sites/default/files/users/Robin%2520Sweetser/cuttings_038_full_width.jpg&amp;raw" style="width:720px;height:540px;"><span data-dcnode-id="1109" instrument_node="">
</span><figcaption data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Cuttings in their new home. Hopefully they will root!</span></figcaption><span data-dcnode-id="1106" instrument_node="">
</span></figure><span data-dcnode-id="1104" instrument_node="">
</span><h3 data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Where to Keep&nbsp;Cuttings</span></h3><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Many people use a sunny windowsill as their temporary nursery, but if you wish to create lots of pots with cuttings, here’s any easy way to&nbsp;create a mini-greenhouse&nbsp;…&nbsp;</span></p><span data-dcnode-id="1098" instrument_node="">
</span><ol data-dcnode-id="1081"><span data-dcnode-id="1097" instrument_node="">
</span><li data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Place the box or pot of cuttings in a large plastic bag, blow in it to inflate it, and seal the end. Big zip-lock bags work&nbsp;great.</span></li><span data-dcnode-id="1094" instrument_node="">
</span><li data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Place this in a warm spot out of direct sun:&nbsp;65 to&nbsp;75°F&nbsp;is optimum. Bottom heat helps cuttings root faster, but is not&nbsp;necessary.</span></li><span data-dcnode-id="1091" instrument_node="">
</span><li data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Open the bag every few days to check for mold or wilted cuttings and to add fresh air. This helps to prevent mildew from forming in this humid&nbsp;atmosphere.</span></li><span data-dcnode-id="1088" instrument_node="">
</span><li data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">After a week or two, if the plants look lively, you can peel back the bag and move them into indirect light. Check for rooting by giving them a gentle tug. If they resist being pulled out, roots have begun to&nbsp;form.</span></li><span data-dcnode-id="1085" instrument_node="">
</span><li data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Soon&nbsp;you’ll be able to move your new plants into their own pots filled with fresh potting soil.&nbsp;After a few weeks you can fertilize them and move them to their new indoor&nbsp;locations!</span></li><span data-dcnode-id="1082" instrument_node="">
</span></ol><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">When spring comes around and the threat of frost has passed, plant your rooted cuttings outdoors as you would a young plant. Keep an eye on them for a few weeks, watching that they get enough water and don’t get burnt up by the sun or bitten by&nbsp;frost.&nbsp;</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1076" instrument_node="">Looking for information on a specific plant? Check out our </span><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/gardening/growing-guides"><span data-dcnode-id="1075" instrument_node="">Growing Guide library</span></a><span data-dcnode-id="1073" instrument_node=""> to see care info for flowers, shrubs, vegetables, and&nbsp;more!</span></p><span data-dcnode-id="1071" instrument_node="">
</span></div><span data-dcnode-id="1069" instrument_node="">
</span></div><span data-dcnode-id="1067" instrument_node="">
</span></div><span data-dcnode-id="1065" instrument_node="">

</span><div class="views-view-grid__item-inner" data-dcnode-id="962"><div class="views-field views-field-field-imageprimary" data-dcnode-id="969"><span class="field-content" data-dcnode-id="970"><a data-dcnode-id="971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.almanac.com/how-bring-outdoor-plants-indoors"><span data-dcnode-id="986" instrument_node="">
</span><article about="/image/geraniums-pots" class="node node--type-image node--view-mode-content-grid-image" data-dcnode-id="973" data-history-node-id="122514" role="article"><span data-dcnode-id="985" instrument_node="">
