instrument_node="">Propagating Lavender In Soil</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1942"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="1943" href="#Propagating_Lavender_In_Water" title="Propagating Lavender In Water"><span data-dcnode-id="1944" instrument_node="">Propagating Lavender In Water</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1937"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="1938" href="#Tips_For_Transplanting_Rooted_Lavender_Cuttings" title="Tips For Transplanting Rooted Lavender Cuttings"><span data-dcnode-id="1939" instrument_node="">Tips For Transplanting Rooted Lavender Cuttings</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1924"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="1935" href="#Lavender_Propagation_FAQs" title="Lavender Propagation FAQs"><span data-dcnode-id="1936" instrument_node="">Lavender Propagation FAQs</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="1925"><li class="ez-toc-heading-level-3" data-dcnode-id="1932"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="1933" href="#Can_you_root_lavender_in_water" title="Can you root lavender in water?"><span data-dcnode-id="1934" instrument_node="">Can you root lavender in water?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1929"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="1930" href="#How_long_do_lavender_cuttings_take_to_root" title="How long do lavender cuttings take to root?"><span data-dcnode-id="1931" instrument_node="">How long do lavender cuttings take to root?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="1926"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="1927" href="#Can_I_propagate_lavender_without_rooting_powder" title="Can I propagate lavender without rooting powder?"><span data-dcnode-id="1928" instrument_node="">Can I propagate lavender without rooting powder?</span></a></li></ul></li></ul></nav></div><span data-dcnode-id="1920" instrument_node="">
</span><h2 data-dcnode-id="1916" id="h-lavender-propagation-methods"><span class="ez-toc-section" data-dcnode-id="1919" id="Lavender_Propagation_Methods"></span><span data-dcnode-id="1918" instrument_node="">Lavender Propagation Methods</span><span class="ez-toc-section-end" data-dcnode-id="1917"></span></h2><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">There are a few different ways you can propagate lavender plants: by rooting the stems in soil, by rooting the cuttings in water, or from seed.</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">In this post, I’m only going to talk about how to propagate lavender from cuttings taken from mature plants, and then rooting them either in water or soil. I’ll save the seed starting post for another day.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1902"><em data-dcnode-id="1903"><strong data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Related Post:</span></strong><span data-dcnode-id="1906" instrument_node="">&nbsp;</span><a data-dcnode-id="1904" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/growing-lavender-from-seed/"><span data-dcnode-id="1905" instrument_node="">How To Grow Lavender From Seed &amp; When To Plant</span></a></em></p><span data-dcnode-id="1901" instrument_node="">
</span><h2 data-dcnode-id="1897" id="h-when-to-propagate-lavender"><span class="ez-toc-section" data-dcnode-id="1900" id="When_To_Propagate_Lavender"></span><span data-dcnode-id="1899" instrument_node="">When To Propagate Lavender</span><span class="ez-toc-section-end" data-dcnode-id="1898"></span></h2><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">The best time to propagate lavender is during mid-late summer during their active growing season, and when it’s hot and humid outside.</span></p><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">If you take cuttings too late in the summer, or in the fall when the plant is starting to go dormant for the winter, they may not root.</span></p><span data-dcnode-id="1890" instrument_node="">
</span><h2 data-dcnode-id="1886" id="h-how-to-take-lavender-cuttings"><span class="ez-toc-section" data-dcnode-id="1889" id="How_To_Take_Lavender_Cuttings"></span><span data-dcnode-id="1888" instrument_node="">How To Take Lavender Cuttings</span><span class="ez-toc-section-end" data-dcnode-id="1887"></span></h2><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Before taking cuttings, make sure that you prepare the soil or vase of water first (see steps below for details). Don’t let them dry out or shrivel before you try propagating them.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">There are a few things you need to look for before you take cuttings from your lavender plants…</span></p><span data-dcnode-id="1879" instrument_node="">
</span><ul data-dcnode-id="1876"><li data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Ideally you should take cuttings of branches that haven’t flowered yet. Flowering takes a lot of energy from the plant, and a branch that hasn’t flowered will be able to put all of that energy into growing new roots instead.</span></li></ul><span data-dcnode-id="1875" instrument_node="">
</span><div class="wp-block-image wp-image-8833 size-full" data-dcnode-id="1865"><figure class="aligncenter" data-dcnode-id="1866"><picture class="wp-image-8833 sp-no-webp" data-dcnode-id="1869" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-branch-without-flowers.jpg"><source data-dcnode-id="1874" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-branch-without-flowers.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-branch-without-flowers-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-branch-without-flowers.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-branch-without-flowers-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1873" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-branch-without-flowers.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-branch-without-flowers-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-branch-without-flowers.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-branch-without-flowers-300x198.jpg 300w" type="image/jpeg"><img alt="Lavender branch without flowers" class="wp-image-8833 sp-no-webp entered lazyloaded" data-dcnode-id="1872" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-branch-without-flowers.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-branch-without-flowers.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-branch-without-flowers-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/ </span><ul data-dcnode-id="1861"><li data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">It’s also best to take cuttings from a mature lavender plant rather than one that’s brand new or immature. That way, you’ll feel confident that there’s plenty of energy for the cuttings to form strong roots.</span></li></ul><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">Once you find the perfect branch, cut it from the plant at the base of the stem.</span></p><span data-dcnode-id="1857" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1846"><figure class="aligncenter" data-dcnode-id="1847"><a data-dcnode-id="1850" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00004SD76/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB00004SD76%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3DH2UB3W7GZW7YA3EO" rel="nofollow noopener noreferrer" target="_blank"><picture class="wp-image-8843 sp-no-webp" data-dcnode-id="1851" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/taking-cuttings-for-lavender-propagation.jpg"><source data-dcnode-id="1856" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/taking-cuttings-for-lavender-propagation.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/taking-cuttings-for-lavender-propagation-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/taking-cuttings-for-lavender-propagation.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/taking-cuttings-for-lavender-propagation-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1855" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/taking-cuttings-for-lavender-propagation.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/taking-cuttings-for-lavender-propagation-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/taking-cuttings-for-lavender-propagation.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/taking-cuttings-for-lavender-propagation-300x198.jpg 300w" type="image/jpeg"><img alt="Taking cuttings for lavender propagation" class="wp-image-8843 sp-no-webp entered lazyloaded" data-dcnode-id="1854" data-lazy-sizes="(max-width: 640px) 100vw, 640px" </span><p data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Take cuttings that are several inches long. Each stem you remove should have 3-5 leaf nodes, but still have several inches of growth at the top.</span></p><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1834"><em data-dcnode-id="1835"><strong data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Related Post:</span></strong><span data-dcnode-id="1839" instrument_node=""> </span><a data-dcnode-id="1837" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/pruning-lavender/"><span data-dcnode-id="1838" instrument_node="">How To Prune Lavender Plants</span></a><span data-dcnode-id="1836" instrument_node="">.</span></em></p><span data-dcnode-id="1833" instrument_node="">
</span><div class="wp-block-image wp-image-8835 size-full" data-dcnode-id="1823"><figure class="aligncenter" data-dcnode-id="1824"><picture class="wp-image-8835 sp-no-webp" data-dcnode-id="1827" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.jpg"><source data-dcnode-id="1832" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1831" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation-300x198.jpg 300w" type="image/jpeg"><img alt="Lavender cuttings ready for propagation" class="wp-image-8835 sp-no-webp entered lazyloaded" data-dcnode-id="1830" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation-300x198.jpg 300w" width="640"><noscript data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.jpg" class="wp-image-8835 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.jpg" alt="Lavender cuttings ready for propagation" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cuttings-ready-for-propagation-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Lavender cuttings ready for propagation</span></figcaption></figure></div><span data-dcnode-id="1822" instrument_node="">
</span><h3 data-dcnode-id="1818" id="h-preparing-lavender-cuttings-for-propagation"><span class="ez-toc-section" data-dcnode-id="1821" id="Preparing_Lavender_Cuttings_For_Propagation"></span><span data-dcnode-id="1820" instrument_node="">Preparing Lavender Cuttings For Propagation</span><span class="ez-toc-section-end" data-dcnode-id="1819"></span></h3><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1812"><span data-dcnode-id="1816" instrument_node="">After taking cuttings from your lavender plant, remove the bottom 3-5 sets of leaves from the stem. You can pinch them off with your fingernail, or snip them off with a sharp </span><a data-dcnode-id="1814" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00004SD76/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB00004SD76%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3DH2UB3W7GZW7YA3EO" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1815" instrument_node="">pair of clippers</span></a><span data-dcnode-id="1813" instrument_node="">.</span></p><span data-dcnode-id="1811" instrument_node="">
</span><div class="wp-block-image wp-image-8834 size-full" data-dcnode-id="1801"><figure class="aligncenter" data-dcnode-id="1802"><picture class="wp-image-8834 sp-no-webp" data-dcnode-id="1805" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.jpg"><source data-dcnode-id="1810" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1809" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes-300x198.jpg 300w" type="image/jpeg"><img alt="Lavender cutting with several leaf nodes" class="wp-image-8834 sp-no-webp entered lazyloaded" data-dcnode-id="1808" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes-300x198.jpg 300w" width="640"><noscript data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.jpg" class="wp-image-8834 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.jpg" alt="Lavender cutting with several leaf nodes" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/lavender-cutting-with-several-leaf-nodes-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">Lavender cutting with several leaf nodes</span></figcaption></figure></div><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Removing the bottom leaves will create small wounds on the stems, and that’s where the roots will grow out of.</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Longer stems make it easier to propagate lavender plants because there will be more area to stick into the dirt/water, and that gives you a better chance of rooting.</span></p><span data-dcnode-id="1794" instrument_node="">
</span><div class="wp-block-image wp-image-8841 size-full" data-dcnode-id="1784"><figure class="aligncenter" data-dcnode-id="1785"><picture class="wp-image-8841 sp-no-webp" data-dcnode-id="1788" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.jpg"><source data-dcnode-id="1793" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1792" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender-300x198.jpg 300w" type="image/jpeg"><img alt="Remove lower leaves before propagating lavender" class="wp-image-8841 sp-no-webp entered lazyloaded" data-dcnode-id="1791" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender-300x198.jpg 300w" width="640"><noscript data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.jpg" class="wp-image-8841 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.jpg" alt="Remove lower leaves before propagating lavender" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/remove-lower-leaves-before-propagating-lavender-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Remove lower leaves before propagating lavender</span></figcaption></figure></div><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">If any of the stems have already started to flower, simply snip or pinch off the flower spike to encourage the cutting to put that energy into growing new roots.</span></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">A cutting with a flower on it is probably not going to root, because it will waste all its energy on bud formation.</span></p><span data-dcnode-id="1777" instrument_node="">
</span><div class="wp-block-image wp-image-8837 size-full" data-dcnode-id="1767"><figure class="aligncenter" data-dcnode-id="1768"><picture class="wp-image-8837 sp-no-webp" data-dcnode-id="1771" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.jpg"><source data-dcnode-id="1776" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating-300x198.webp 300w" type="image/webp"><source data-dcnode-id="1775" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating-300x198.jpg 300w" type="image/jpeg"><img alt="Pinch off lavender flower spike before propagating" class="wp-image-8837 sp-no-webp entered lazyloaded" data-dcnode-id="1774" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating-300x198.jpg 300w" data-ll-status="loaded" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.jpg" data-pin-nopin="true" height="422" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.jpg&amp;raw" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating-300x198.jpg 300w" width="640"><noscript data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.jpg" class="wp-image-8837 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.jpg" alt="Pinch off lavender flower spike before propagating" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/pinch-off-lavender-flower-spike-before-propagating-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Pinch off lavender flower spike before propagating</span></figcaption></figure></div><span data-dcnode-id="1766" instrument_node="">
</span><h2 data-dcnode-id="1762" id="h-how-to-propagate-lavender-step-by-step"><span class="ez-toc-section" data-dcnode-id="1765" id="How_To_Propagate_Lavender_Step-By-Step"></span><span data-dcnode-id="1764" instrument_node="">How To Propagate Lavender Step-By-Step</span><span class="ez-toc-section-end" data-dcnode-id="1763"></span></h2><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Below I will walk you through the steps for propagating lavender in soil, and also in water. The steps are different for each, but not complicated.</span></p><span data-dcnode-id="1758" instrument_node="">
</span><h3 data-dcnode-id="1754" id="h-propagating-lavender-in-soil"><span class="ez-toc-section" data-dcnode-id="1757" id="Propagating_Lavender_In_Soil"></span><span data-dcnode-id="1756" instrument_node="">Propagating Lavender In Soil</span><span class="ez-toc-section-end" data-dcnode-id="1755"></span></h3><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Before you can propagate lavender in soil, you’ll need to collect a few supplies. Don’t worry, you won’t need a bunch of expensive equipment – and you probably already have some of this stuff on hand.</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1747"><strong data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Supplies Needed:</span></strong></p><span data-dcnode-id="1746" instrument_node="">
</span><ul data-dcnode-id="1722"><li data-dcnode-id="1732"><span data-dcnode-id="1745" instrument_node="">Propagation soil (I make my own using a mix of </span><a data-dcnode-id="1743" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B002Y0AK6S/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB002Y0AK6S%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3DV4TC5GXJMA4EAFY3" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1744" instrument_node="">perlite</span></a><span data-dcnode-id="1742" instrument_node="">, </span><a data-dcnode-id="1740" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B002Y06KTE/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB002Y06KTE%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3DK5JGAJTO3V5G2PR3" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1741" instrument_node="">vermiculite</span></a><span data-dcnode-id="1739" instrument_node="">, and </span><a data-dcnode-id="1737" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Espoma-AP8-8-Quart-Organic-Potting/dp/B002Y04TK6/ref%3Das_li_ss_tl%3F_encoding%3DUTF8%26psc%3D1%26refRID%3DVZ42RMW97ZXEG2942NTY%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D4f8cc8af6e055143182be43c5e5b6253" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1738" instrument_node="">potting soil</span></a><span data-dcnode-id="1736" instrument_node=""> – but a nice </span><a data-dcnode-id="1734" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0046VHU1G/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB0046VHU1G%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3D3RDX3WU3KADNJLYN" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1735" instrument_node="">seed starting mix</span></a><span data-dcnode-id="1733" instrument_node=""> will work too)</span></li><li data-dcnode-id="1728"><span data-dcnode-id="1731" instrument_node="">A pot or </span><a data-dcnode-id="1729" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/EarlyGrow-70738-Medium-Domed-Propagator/dp/B01BOY6Y2I/ref%3Das_li_ss_tl%3Fie%3DUTF8%26qid%3D1537201697%26sr%3D8-9%26keywords%3Dpropagation%2Bbox%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D3eda24c0329a15d29fcdb75da61d4b57%26language%3Den_US" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1730" instrument_node="">propagation chamber</span></a></li><li data-dcnode-id="1725"><a data-dcnode-id="1726" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00AA8WPGY/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB00AA8WPGY%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3DTQGQ2TLYNTGSRBR4" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1727" instrument_node="">Rooting hormone</span></a></li><li data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Plastic bag (optional)</span></li></ul><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1715"><em data-dcnode-id="1716"><span data-dcnode-id="1720" instrument_node="">See my detailed list of the best </span><a data-dcnode-id="1718" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/propagation-supplies/"><span data-dcnode-id="1719" instrument_node="">plant propagation tools &amp; supplies here</span></a><span data-dcnode-id="1717" instrument_node="">.</span></em></p><span data-dcnode-id="1714" instrument_node="">
</span><div class="wp-block-image wp-image-8842 size-full" data-dcnode-id="1704"><figure class="aligncenter" data-dcnode-id="1705"><picture class="wp-image-8842 sp-no-webp" data-dcnode-id="1708" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/supplies-needed-for-lavender-plant-propagation.jpg"><source data-dcnode-id="1713" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/supplies-needed-for-lavender-plant-propagation.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/supplies-needed-for-lavender-plant-propagation-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/webp"><source data-dcnode-id="1712" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/supplies-needed-for-lavender-plant-propagation.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/supplies-needed-for-lavender-plant-propagation-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/jpeg"><img alt="Supplies needed for lavender plant propagation" class="wp-image-8842 sp-no-webp" data-dcnode-id="1711" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/supplies-needed-for-lavender-plant-propagation.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/supplies-needed-for-lavender-plant-propagation.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/supplies-needed-for-lavender-plant-propagation-300x198.jpg 300w" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/supplies-needed-for-lavender-plant-propagation.jpg" data-pin-nopin="true" height="422" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20422'%3E%3C/svg%3E" width="640"><noscript data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-conte </span><p data-dcnode-id="1699"><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Step 1: Plan for humidity</span></strong><span data-dcnode-id="1700" instrument_node=""> – If you’re going to be propagating lavender inside the house or outside in a dry climate, you’ll need to add humidity.</span></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1697" instrument_node="">It will be easiest to use a </span><a data-dcnode-id="1695" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/EarlyGrow-70738-Medium-Domed-Propagator/dp/B01BOY6Y2I/ref%3Das_li_ss_tl%3Fie%3DUTF8%26qid%3D1537201697%26sr%3D8-9%26keywords%3Dpropagation%2Bbox%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D3eda24c0329a15d29fcdb75da61d4b57%26language%3Den_US" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1696" instrument_node="">propagator</span></a><span data-dcnode-id="1694" instrument_node="">, or cover your cuttings with a plastic bag if you put them in a pot. Simply tent the bag over the top, making sure it doesn’t touch any part of the cuttings.</span></p><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">But if you live in a humid climate like I do, lavender cuttings will root pretty quickly outside in a shady spot.</span></p><span data-dcnode-id="1689" instrument_node="">
</span><div class="wp-block-image wp-image-8832 size-full" data-dcnode-id="1679"><figure class="aligncenter" data-dcnode-id="1680"><picture class="wp-image-8832 sp-no-webp" data-dcnode-id="1683" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings.jpg"><source data-dcnode-id="1688" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/webp"><source data-dcnode-id="1687" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/jpeg"><img alt="Propagation soil in a pot and ready to go" class="wp-image-8832 sp-no-webp" data-dcnode-id="1686" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings-300x198.jpg 300w" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings.jpg" data-pin-nopin="true" height="422" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20422'%3E%3C/svg%3E" width="640"><noscript data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings.jpg" class="wp-image-8832 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings.jpg" alt="Propagation soil in a pot and ready to go" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/have-soil-ready-before-taking-lavender-cuttings-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Propagation soil in a pot and ready to go</span></figcaption></figure></div><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1671"><strong data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Step 2: Dust stems with rooting hormone –</span></strong><span data-dcnode-id="1675" instrument_node=""> Right after you finish preparing your cuttings, dip the stems in </span><a data-dcnode-id="1673" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00AA8WPGY/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB00AA8WPGY%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3DTQGQ2TLYNTGSRBR4" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1674" instrument_node="">rooting hormone</span></a><span data-dcnode-id="1672" instrument_node="">.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Rooting hormone helps them root faster, and gives you a better chance of success!</span></p><span data-dcnode-id="1667" instrument_node="">

</span><p data-dcnode-id="1643"><strong data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Step 3: Make holes in the dirt –</span></strong><span data-dcnode-id="1644" instrument_node=""> Before sticking the cutting into the soil, make a hole with your finger first.</span></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">That way the rooting hormone won’t rub off when you stick the cutting into the soil.</span></p><span data-dcnode-id="1639" instrument_node="">

ole-in-propagation-soil.jpg" alt="Make hole in propagation soil" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/make-hole-in-propagation-soil.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/make-hole-in-propagation-soil-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Make hole in propagation soil</span></figcaption></figure></div><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1624"><strong data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Step 4: Place the cutting into the hole –</span></strong><span data-dcnode-id="1625" instrument_node=""> Stick the cutting into the hole that you made, then press soil around the stem.</span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Gently packing the soil like this will ensure that the cutting stays firm in the pot, and also that the soil comes in good contact with the stem.</span></p><span data-dcnode-id="1620" instrument_node="">
</span><div class="wp-block-image wp-image-8838 size-full" data-dcnode-id="1610"><figure class="aligncenter" data-dcnode-id="1611"><picture class="wp-image-8838 sp-no-webp" data-dcnode-id="1614" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil.jpg"><source data-dcnode-id="1619" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/webp"><source data-dcnode-id="1618" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/jpeg"><img alt="Place lavender cutting in soil" class="wp-image-8838 sp-no-webp" data-dcnode-id="1617" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil-300x198.jpg 300w" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil.jpg" data-pin-nopin="true" height="422" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20422'%3E%3C/svg%3E" width="640"><noscript data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil.jpg" class="wp-image-8838 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil.jpg" alt="Place lavender cutting in soil" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/place-lavender-cutting-in-soil-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Place lavender cutting in soil</span></figcaption></figure></div><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1602"><strong data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Step 5: Add the rest of the cuttings –</span></strong><span data-dcnode-id="1606" instrument_node=""> Repeat the same step to put the rest of the stems into the soil. You can put several cuttings into one large pot or your </span><a data-dcnode-id="1604" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/EarlyGrow-70738-Medium-Domed-Propagator/dp/B01BOY6Y2I/ref%3Das_li_ss_tl%3Fie%3DUTF8%26qid%3D1537201697%26sr%3D8-9%26keywords%3Dpropagation%2Bbox%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D3eda24c0329a15d29fcdb75da61d4b57%26language%3Den_US" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1605" instrument_node="">propagation chamber</span></a><span data-dcnode-id="1603" instrument_node="">.</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">But try to space them apart far enough so they don’t touch each other. This will ensure adequate airflow, and will help to avoid molding or rotting of the cuttings.</span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1592"><em data-dcnode-id="1593"><strong data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Related Post: </span></strong><a data-dcnode-id="1594" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/collect-lavender-seeds-garden/"><span data-dcnode-id="1595" instrument_node="">How To Collect Lavender Seeds From Your Garden</span></a></em></p><span data-dcnode-id="1591" instrument_node="">
</span><div class="wp-block-image wp-image-8831 size-full" data-dcnode-id="1581"><figure class="aligncenter" data-dcnode-id="1582"><picture class="wp-image-8831 sp-no-webp" data-dcnode-id="1585" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting.jpg"><source data-dcnode-id="1590" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/webp"><source data-dcnode-id="1589" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/jpeg"><img alt="Gently press soil around lavender cutting" class="wp-image-8831 sp-no-webp" data-dcnode-id="1588" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting-300x198.jpg 300w" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting.jpg" data-pin-nopin="true" height="422" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20422'%3E%3C/svg%3E" width="640"><noscript data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting.jpg" class="wp-image-8831 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting.jpg" alt="Gently press soil around lavender cutting" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/gently-press-soil-around-lavender-cutting-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Gently press soil around lavender cutting</span></figcaption></figure></div><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1576"><strong data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Step 6: Cover the cuttings with plastic (optional) – </span></strong><span data-dcnode-id="1577" instrument_node="">If you’re using a propagation box, then simply put the lid on it. Otherwise, tent a plastic bag over the entire pot to help provide extra humidity around the cuttings.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">If it’s humid outside, then you can skip this step. But remember, lavender cuttings need high humidity in order to form roots.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1568"><strong data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Step 7: Put the cuttings into a safe spot – </span></strong><span data-dcnode-id="1569" instrument_node="">Place the pot or propagation box in a spot where they will be protected from sun, wind, and heavy rain during propagation.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Keep the soil evenly moist, but not wet. Check on them daily to make sure the soil never dries out completely. You can also mist the cuttings if you’re not using plastic.</span></p><span data-dcnode-id="1564" instrument_node="">
</span><div class="wp-block-image wp-image-8840 size-full" data-dcnode-id="1554"><figure class="aligncenter" data-dcnode-id="1555"><picture class="wp-image-8840 sp-no-webp" data-dcnode-id="1558" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil.jpg"><source data-dcnode-id="1563" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/webp"><source data-dcnode-id="1562" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/jpeg"><img alt="Propagating lavender in soil" class="wp-image-8840 sp-no-webp" data-dcnode-id="1561" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil-300x198.jpg 300w" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil.jpg" data-pin-nopin="true" height="422" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20422'%3E%3C/svg%3E" width="640"><noscript data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil.jpg" class="wp-image-8840 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil.jpg" alt="Propagating lavender in soil" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-in-soil-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture><figcaption data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Propagating lavender in soil</span></figcaption></figure></div><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Once you start to see new growth at the top of the cuttings, that’s a good indication that they have started to grow roots.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1549" instrument_node="">It takes 3-6 weeks for them to develop roots, depending on the temperature and humidity level. If you’re starting them indoors, </span><a data-dcnode-id="1547" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0057A53I2/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB0057A53I2%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3DQBHHWLWOYJDEMG57" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1548" instrument_node="">adding bottom heat</span></a><span data-dcnode-id="1546" instrument_node=""> will speed things up, and helps the cuttings root faster.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1538"><em data-dcnode-id="1539"><strong data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Related Post: </span></strong><a data-dcnode-id="1540" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/drying-lavender/"><span data-dcnode-id="1541" instrument_node="">How To Dry Lavender From Your Garden</span></a></em></p><span data-dcnode-id="1537" instrument_node="">
</span><h3 data-dcnode-id="1533" id="h-propagating-lavender-in-water"><span class="ez-toc-section" data-dcnode-id="1536" id="Propagating_Lavender_In_Water"></span><span data-dcnode-id="1535" instrument_node="">Propagating Lavender In Water</span><span class="ez-toc-section-end" data-dcnode-id="1534"></span></h3><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Propagating lavender in water is even easier than using soil. BUT there is a downside!</span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Cuttings rooted in water have a harder time being transplanted than those that are propagated in soil. So keep in mind that you may have a lower survival rate when you root them in water.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">It’s fun to experiment though, so I encourage you to try both methods to see which one works the best for you! Here’s how to propagate lavender in water…</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1520"><strong data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Supplies Needed:</span></strong></p><span data-dcnode-id="1519" instrument_node="">
</span><ul data-dcnode-id="1508"><li data-dcnode-id="1515"><a data-dcnode-id="1517" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Syndicate-Sales-Cylinder-Vase-Clear/dp/B00EE905L2/ref%3Das_li_ss_tl%3Fie%3DUTF8%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D97d086d3b183a2dd891b8a462c13edb5%26language%3Den_US" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1518" instrument_node="">Vase</span></a><span data-dcnode-id="1516" instrument_node=""> (I like to use a clear vase so I can easily see when the roots start to form)</span></li><li data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Tepid water</span></li><li data-dcnode-id="1509"><a data-dcnode-id="1511" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B001OTSPDA/ref%3Das_li_ss_tl%3Fie%3DUTF8%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D8e1526c5b3d76693e83b4b596ea625ab" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1512" instrument_node="">Decorative rock</span></a><span data-dcnode-id="1510" instrument_node=""> (optional)</span></li></ul><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1500"><strong data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Step 1: Put decorative rock in bottom of vase (optional) –</span></strong><span data-dcnode-id="1504" instrument_node=""> I like to put an inch or so of </span><a data-dcnode-id="1502" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B001OTSPDA/ref%3Das_li_ss_tl%3Fie%3DUTF8%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D8e1526c5b3d76693e83b4b596ea625ab" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1503" instrument_node="">decorative rock</span></a><span data-dcnode-id="1501" instrument_node=""> into the bottom of my vase.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">That will make it more sturdy, and looks nice too. It’s totally optional though, and won’t help the cuttings root any faster.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1489"><strong data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Step 2: Fill the vase with water – </span></strong><span data-dcnode-id="1493" instrument_node="">Pour room temperature (tepid) water into the </span><a data-dcnode-id="1491" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Syndicate-Sales-Cylinder-Vase-Clear/dp/B00EE905L2/ref%3Das_li_ss_tl%3Fie%3DUTF8%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D97d086d3b183a2dd891b8a462c13edb5%26language%3Den_US" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1492" instrument_node="">vase</span></a><span data-dcnode-id="1490" instrument_node=""> until it’s about 1/2 – 3/4 full. I prefer to use filtered, distilled, or rainwater, but you can use tap water if that’s your only option.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1484"><strong data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Step 3: Add the cuttings –</span></strong><span data-dcnode-id="1485" instrument_node=""> Put your lavender stems into the vase of water just like you would with fresh cut flowers.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1479"><strong data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Step 4: Check for leaves touching the water – </span></strong><span data-dcnode-id="1480" instrument_node="">Don’t allow any of the leaves to touch the water, or they will only rot.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">If any leaves are in the water, you can dump some of the water out of the vase. Or pull out the cuttings, remove the offending leaves, then place the stems back into the vase.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Roots may start forming in water a little faster than in soil, depending on the humidity and heat levels. But wait until there are several thick roots before you attempt to pot them up.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1461"><figure class="aligncenter" data-dcnode-id="1462"><a data-dcnode-id="1465" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Syndicate-Sales-Cylinder-Vase-Clear/dp/B00EE905L2/ref%3Das_li_ss_tl%3Fie%3DUTF8%26linkCode%3Dll1%26tag%3Dgetbusgar07-20%26linkId%3D97d086d3b183a2dd891b8a462c13edb5%26language%3Den_US" rel="nofollow noopener noreferrer" target="_blank"><picture class="wp-image-8839 sp-no-webp" data-dcnode-id="1466" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water.jpg"><source data-dcnode-id="1471" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water.webp 640w,https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water-300x198.webp 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/webp"><source data-dcnode-id="1470" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px" type="image/jpeg"><img alt="Propagating lavender cuttings in water" class="wp-image-8839 sp-no-webp" data-dcnode-id="1469" data-lazy-sizes="(max-width: 640px) 100vw, 640px" data-lazy-src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water.jpg" data-lazy-srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water-300x198.jpg 300w" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water.jpg" data-pin-nopin="true" height="422" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20640%20422'%3E%3C/svg%3E" width="640"><noscript data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">&lt;img src="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water.jpg" class="wp-image-8839 sp-no-webp" data-pin-media="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water.jpg" alt="Propagating lavender cuttings in water" height="422" width="640" srcset="https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water.jpg 640w, https://k2j4u5m5.stackpathcdn.com/wp-content/uploads/2016/08/propagating-lavender-cuttings-in-water-300x198.jpg 300w" sizes="(max-width: 640px) 100vw, 640px"&gt;</span></noscript></picture></a><figcaption data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Propagating lavender cuttings in water</span></figcaption></figure></div><span data-dcnode-id="1460" instrument_node="">
</span><h2 data-dcnode-id="1456" id="h-tips-for-transplanting-rooted-lavender-cuttings"><span class="ez-toc-section" data-dcnode-id="1459" id="Tips_For_Transplanting_Rooted_Lavender_Cuttings"></span><span data-dcnode-id="1458" instrument_node="">Tips For Transplanting Rooted Lavender Cuttings</span><span class="ez-toc-section-end" data-dcnode-id="1457"></span></h2><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Once the roots are established, it’s time to transplant your lavender starts into their own pots. At this point, you can move them into the sun, and allow the soil to dry out a bit between waterings.</span></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">After your baby lavender plants become established in their new pot, you can plant them into the garden. I recommend planting them on a shady day, or in the early evening after the intense heat of the sun has passed.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Be sure to keep them well watered until they become established in the garden, otherwise they may not survive the transplant shock.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1440"><strong data-dcnode-id="1441"><span data-dcnode-id="1445" instrument_node="">Learn more in my comprehensive </span><a data-dcnode-id="1443" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//getbusygardening.com/lavender-plant-care/"><span data-dcnode-id="1444" instrument_node="">lavender plant care guide</span></a><span data-dcnode-id="1442" instrument_node="">!</span></strong></p><span data-dcnode-id="1439" instrument_node="">
</span><h2 data-dcnode-id="1435" id="h-lavender-propagation-faqs"><span class="ez-toc-section" data-dcnode-id="1438" id="Lavender_Propagation_FAQs"></span><span data-dcnode-id="1437" instrument_node="">Lavender Propagation FAQs</span><span class="ez-toc-section-end" data-dcnode-id="1436"></span></h2><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">In this section, I’ll answer some of the most frequently asked questions about propagating lavender. If you can’t find your answer anywhere, then ask it in the comments below.</span></p><span data-dcnode-id="1431" instrument_node="">
</span><h3 data-dcnode-id="1427" id="h-can-you-root-lavender-in-water"><span class="ez-toc-section" data-dcnode-id="1430" id="Can_you_root_lavender_in_water"></span><span data-dcnode-id="1429" instrument_node="">Can you root lavender in water?</span><span class="ez-toc-section-end" data-dcnode-id="1428"></span></h3><span data-dcnode-id="1426" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Yes! Follow the steps in the section above called “Rooting Lavender Cuttings In Water” to learn exactly how to do it.</span></p><span data-dcnode-id="1423" instrument_node="">
</span><h3 data-dcnode-id="1419" id="h-how-long-do-lavender-cuttings-take-to-root"><span class="ez-toc-section" data-dcnode-id="1422" id="How_long_do_lavender_cuttings_take_to_root"></span><span data-dcnode-id="1421" instrument_node="">How long do lavender cuttings take to root?</span><span class="ez-toc-section-end" data-dcnode-id="1420"></span></h3><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">It can take anywhere from 3-6 weeks for roots to develop on lavender cuttings. The warmer and more humid it is, the faster they will root.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><h3 data-dcnode-id="1411" id="h-can-i-propagate-lavender-without-rooting-powder"><span class="ez-toc-section" data-dcnode-id="1414" id="Can_I_propagate_lavender_without_rooting_powder"></span><span data-dcnode-id="1413" instrument_node="">Can I propagate lavender without rooting powder?</span><span class="ez-toc-section-end" data-dcnode-id="1412"></span></h3><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1409" instrument_node="">Yes. You don’t need </span><a data-dcnode-id="1407" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B00AA8WPGY/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D390957%26creativeASIN%3DB00AA8WPGY%26linkCode%3Das2%26tag%3Dgetbusgar07-20%26linkId%3DTQGQ2TLYNTGSRBR4" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="1408" instrument_node="">rooting hormone</span></a><span data-dcnode-id="1406" instrument_node=""> when you propagate lavender. But you’ll have much better success rooting cuttings in soil when you use it. It’s not very expensive to buy, and easy to find at any garden center.</span></p><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Propagating lavender is pretty darn easy, and rewarding too. Once you get the hang of it, you’ll have tons of baby lavender starts to share with friends and family, or to fill your garden beds.</span></p><span data-dcnode-id="1401" instrument_node="">

</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Yes, as long as your lavender cuttings have a good root system before you plant them into the ground, they should survive just fine. English lavender are cold hardy, so the first few light frosts in the fall won’t hurt them. But I would plant them at least a month or more before the ground freezes. Also, I recommend you root them in soil rather than water for the best success.</span></p><span data-dcnode-id="1034" instrument_node="">
