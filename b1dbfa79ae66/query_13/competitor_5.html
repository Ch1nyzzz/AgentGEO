</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Tomatoes are one of the most popular vegetables to grow, if not THE most popular. And yes, I know they’re technically a fruit, but I’m a vehement ‘tomatoes are vegetables’ person. </span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">They’re simple plants to grow and care for, with only a few special care considerations for a bountiful harvest.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="520" instrument_node="">Growing tomatoes from seeds is a simple task. You can even </span><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tomatobible.com/plant-a-sliced-tomato/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="519" instrument_node="">grow full tomato plants from whole tomato slices</span></a><span data-dcnode-id="517" instrument_node="">. </span></p><span data-dcnode-id="515" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="506"><noscript data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">&lt;img loading="lazy" width="1024" height="768" src="https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-1024x768.jpg" alt="" class="wp-image-281" srcset="https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-1024x768.jpg 1024w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-720x540.jpg 720w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-480x360.jpg 480w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-320x240.jpg 320w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-735x551.jpg 735w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-335x251.jpg 335w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-347x260.jpg 347w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-520x390.jpg 520w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-640x480.jpg 640w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-768x576.jpg 768w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-960x720.jpg 960w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-1080x810.jpg 1080w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1-300x225.jpg 300w, https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1.jpg 1200w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><div class="dpsp-pin-it-wrapper wp-image-281" data-dcnode-id="507"><img alt="" class="lazyload" data-dcnode-id="512" data-pin-description="How To Propagate Tomato Plants From Cuttings" data-pin-media="https://www.tomatobible.com/wp-content/uploads/2021/04/tomato-slice-1.jpg" data-pin-title="How To Propagate Tomato Plants From Cuttings" data-src="https://www.tomatobible.com/ </span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">But if you don’t have the patience to wait for seeds to sprout, or you have a friend with a tomato variety you’d like to try, the quickest and most reliable way to propagate is from cuttings.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Tomato cuttings can be transplanted in just over a week and grow rapidly into strong, fruit-producing plants. The stems have adventitious roots (small roots along all parts of the stem) that allow them to establish quickly. You’ll be on your way to having delicious tomatoes in no time.</span></p><span data-dcnode-id="499" instrument_node="">
</span><h2 data-dcnode-id="496"><a data-dcnode-id="498"></a><span data-dcnode-id="497" instrument_node="">How To Remove Cuttings From The Plants</span></h2><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Tomatoes produce suckers – the side shoots that sprout just where a branch meets the main stem (the axil). These suckers eventually grow, becoming branches with their own leaves and fruit.</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="486"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Related Reading:</span></strong><span data-dcnode-id="489" instrument_node=""> </span><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tomatobible.com/tomato-suckers/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="488" instrument_node="">Tomato Suckers: What Should You Really Do With Them?</span></a></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">They’re the reason why tomato plants are bushy and sprawling. They’re also the reason why propagating tomatoes is so easy.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="481" instrument_node="">If you’re a fan of pruning tomatoes, you will be removing these suckers as part of your maintenance routine anyway. Instead of throwing </span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tomatobible.com/compost-tomato-plants/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="480" instrument_node="">these cuttings on the compost pile</span></a><span data-dcnode-id="478" instrument_node="">, you can use them to make more plants. This is best done as early in the season as possible, to give your new plant the chance to grow and produce fruit before the first frost comes.</span></p><span data-dcnode-id="476" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="467"><noscript data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">&lt;img loading="lazy" width="1000" height="667" src="https://www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato.jpg" alt="" class="wp-image-682" srcset="https://www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato.jpg 1000w, https://www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato-300x200.jpg 300w, https://www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato-768x512.jpg 768w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><div class="dpsp-pin-it-wrapper wp-image-682" data-dcnode-id="468"><img alt="" class="lazyload" data-dcnode-id="473" data-pin-description="How To Propagate Tomato Plants From Cuttings" data-pin-media="https://www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato.jpg" data-pin-title="How To Propagate Tomato Plants From Cuttings" data-src="https://www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato.jpg.webp" data-srcset="https://www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato.jpg.webp 1000w, https://www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato-300x200.jpg.webp 300w, https://www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato-768x512.jpg.webp 768w" data-trellis-processed="1" data-webp="true" height="667" id="mv-trellis-img-3" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato.jpg.webp&amp;raw" srcset="https://www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato.jpg.webp 1000w, https://www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato-300x200.jpg.webp 300w, https://www.tomatobible.com/wp-content/uploads/2021/06/pruning-tomato-768x512.jpg.webp 768w" style="" width="1000"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.tomatobible.com%252Fwp-content%252Fuploads%252F2021%252F06%252Fpruning-tomato.jpg%26url%3Dhttps%253A%252F%252Fwww.tomatobible.com%252Fpropagate-tomato-plants-from-cuttings%252F%26is_video%3Dfalse%26description%3DHow%2520To%2520Propagate%2520Tomato%2520Plants%2520From%2520Cuttings" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="470"><svg data-dcnode-id="471" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="472"></path></svg></span></a></div></figure><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">For fast growth, remove suckers from a rapidly maturing variety. Indeterminate tomatoes have a slightly higher chance of success than determinate ones, but your cutting is likely to develop quick roots either way.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Your chosen sucker needs to be no more than 6-inches long and have a minimum of two leaves. The plant needs leaves for photosynthesis, and while the cutting will eventually develop more leaves, they need to start out with some for a boost of energy.</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Gently snip them off with clean, sharp garden shears. It’s best to remove your tomato cuttings, or any cuttings, at a 45⁰ angle to maximize surface area. Alternatively, you can cut the stems off at the base and then remove a small section to get the right angle.</span></p><span data-dcnode-id="457" instrument_node="">
</span><h2 data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">How to Root a Tomato Cutting&nbsp;</span></h2><span data-dcnode-id="454" instrument_node="">
</span><h3 data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Water</span></h3><span data-dcnode-id="451" instrument_node="">

-it-button-has-label" data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.tomatobible.com%252Fwp-content%252Fuploads%252F2021%252F08%252Fshutterstock_1873418443.jpg%26url%3Dhttps%253A%252F%252Fwww.tomatobible.com%252Fpropagate-tomato-plants-from-cuttings%252F%26is_video%3Dfalse%26description%3DHow%2520To%2520Propagate%2520Tomato%2520Plants%2520From%2520Cuttings" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="445"><svg data-dcnode-id="446" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="447"></path></svg></span></a></div></figure><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">The easiest rooting option, and the one you see often all over social media, is rooting in water. </span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">This popular propagation method for indoor plants works just as well for tomatoes. </span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Simply place your sucker in a glass or container of room temperature water. Make sure no leaves are submerged and that only the bottom part of your cutting is in the water.</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Place your cutting in a warm spot in indirect sunlight. </span></p><span data-dcnode-id="429" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="420"><noscript data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">&lt;img loading="lazy" width="1000" height="668" src="https://www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting.jpg" alt="" class="wp-image-912" srcset="https://www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting.jpg 1000w, https://www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting-300x200.jpg 300w, https://www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting-768x513.jpg 768w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><div class="dpsp-pin-it-wrapper wp-image-912" data-dcnode-id="421"><img alt="" class="lazyload" data-dcnode-id="426" data-pin-description="How To Propagate Tomato Plants From Cuttings" data-pin-media="https://www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting.jpg" data-pin-title="How To Propagate Tomato Plants From Cuttings" data-src="https://www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting.jpg.webp" data-srcset="https://www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting.jpg.webp 1000w, https://www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting-300x200.jpg.webp 300w, https://www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting-768x513.jpg.webp 768w" data-trellis-processed="1" data-webp="true" height="668" id="mv-trellis-img-5" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting.jpg.webp&amp;raw" srcset="https://www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting.jpg.webp 1000w, https://www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting-300x200.jpg.webp 300w, https://www.tomatobible.com/wp-content/uploads/2021/10/rooting-tomato-cutting-768x513.jpg.webp 768w" style="" width="1000"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.tomatobible.com%252Fwp-content%252Fuploads%252F2021%252F10%252Frooting-tomato-cutting.jpg%26url%3Dhttps%253A%252F%252Fwww.tomatobible.com%252Fpropagate-tomato-plants-from-cuttings%252F%26is_video%3Dfalse%26description%3DHow%2520To%2520Propagate%2520Tomato%2520Plants%2520From%2520Cuttings" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="423"><svg data-dcnode-id="424" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="425"></path></svg></span></a></div></figure><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Keep a watchful eye on the water levels, topping up when necessary. Change the water every few days to keep it fresh, or change more often if it looks dirty.</span></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">It usually takes between 10 and 14 days for your tomato sucker’s roots to start developing. Leave the cutting in the glass for a little longer to let the roots lengthen for a strong start. Once they are about an inch long, they are ready to be transplanted out into the garden.</span></p><span data-dcnode-id="413" instrument_node="">
</span><h3 data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Soil</span></h3><span data-dcnode-id="410" instrument_node="">

</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">While it looks like a fun experiment, you don’t have to root your tomatoes in water. You can go straight ahead and root them in soil.</span></p><span data-dcnode-id="397" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="388"><noscript data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">&lt;img loading="lazy" width="1000" height="708" src="https://www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil.jpg" alt="" class="wp-image-913" srcset="https://www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil.jpg 1000w, https://www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil-300x212.jpg 300w, https://www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil-768x544.jpg 768w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><div class="dpsp-pin-it-wrapper wp-image-913" data-dcnode-id="389"><img alt="" class="lazyload" data-dcnode-id="394" data-pin-description="How To Propagate Tomato Plants From Cuttings" data-pin-media="https://www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil.jpg" data-pin-title="How To Propagate Tomato Plants From Cuttings" data-src="https://www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil.jpg.webp" data-srcset="https://www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil.jpg.webp 1000w, https://www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil-300x212.jpg.webp 300w, https://www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil-768x544.jpg.webp 768w" data-trellis-processed="1" data-webp="true" height="708" id="mv-trellis-img-7" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil.jpg.webp&amp;raw" srcset="https://www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil.jpg.webp 1000w, https://www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil-300x212.jpg.webp 300w, https://www.tomatobible.com/wp-content/uploads/2021/10/planting-tomato-cuttings-soil-768x544.jpg.webp 768w" style="" width="1000"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.tomatobible.com%252Fwp-content%252Fuploads%252F2021%252F10%252Fplanting-tomato-cuttings-soil.jpg%26url%3Dhttps%253A%252F%252Fwww.tomatobible.com%252Fpropagate-tomato-plants-from-cuttings%252F%26is_video%3Dfalse%26description%3DHow%2520To%2520Propagate%2520Tomato%2520Plants%2520From%2520Cuttings" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="391"><svg data-dcnode-id="392" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="393"></path></svg></span></a></div></figure><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Tomatoes rooted in water take some time to adjust to the conditions of soil, so rooting this way provides the least risk and likely the strongest plants. </span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">You may not be able to check the growth under the soil line as you can in a glass, but a small tug on the cutting will tell you whether the roots have developed or not.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">For the best results, plant your suckers in small containers in an airy medium like coco peat or compost and water well. </span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Once your tomato cuttings have developed a healthy root ball, you can transplant them in your garden, or even bigger containers. This usually takes about a week or two.</span></p><span data-dcnode-id="375" instrument_node="">
</span><h2 data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Transplanting The Cuttings</span></h2><span data-dcnode-id="372" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="363"><noscript data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">&lt;img loading="lazy" width="1000" height="664" src="https://www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200.jpg" alt="" class="wp-image-859" srcset="https://www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200.jpg 1000w, https://www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200-300x199.jpg 300w, https://www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200-768x510.jpg 768w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><div class="dpsp-pin-it-wrapper wp-image-859" data-dcnode-id="364"><img alt="" class="lazyload" data-dcnode-id="369" data-pin-description="How To Propagate Tomato Plants From Cuttings" data-pin-media="https://www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200.jpg" data-pin-title="How To Propagate Tomato Plants From Cuttings" data-src="https://www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200.jpg.webp" data-srcset="https://www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200.jpg.webp 1000w, https://www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200-300x199.jpg.webp 300w, https://www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200-768x510.jpg.webp 768w" data-trellis-processed="1" data-webp="true" height="664" id="mv-trellis-img-8" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200.jpg.webp&amp;raw" srcset="https://www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200.jpg.webp 1000w, https://www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200-300x199.jpg.webp 300w, https://www.tomatobible.com/wp-content/uploads/2021/08/shutterstock_115637200-768x510.jpg.webp 768w" style="" width="1000"><a aria-label="Save" class="dpsp-pin-it-button dpsp-pin-it-button-center dpsp-pin-it-button-shape-rectangular dpsp-pin-it-button-has-label" data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/bookmarklet/%3Fmedia%3Dhttps%253A%252F%252Fwww.tomatobible.com%252Fwp-content%252Fuploads%252F2021%252F08%252Fshutterstock_115637200.jpg%26url%3Dhttps%253A%252F%252Fwww.tomatobible.com%252Fpropagate-tomato-plants-from-cuttings%252F%26is_video%3Dfalse%26description%3DHow%2520To%2520Propagate%2520Tomato%2520Plants%2520From%2520Cuttings" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="366"><svg data-dcnode-id="367" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="368"></path></svg></span></a></div></figure><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">To transplant your cuttings, gently remove them from their container of water or soil and plant them in your garden as you would any other plant.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Remember, your tomato plants need the right spot in the garden, with the right spacing to thrive. </span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="355" instrument_node="">Whether they’re </span><a data-dcnode-id="353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tomatobible.com/grow-tomatoes-in-raised-beds/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="354" instrument_node="">planted in raised beds</span></a><span data-dcnode-id="352" instrument_node="">, </span><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tomatobible.com/growing-tomatoes-in-pots/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="351" instrument_node="">containers</span></a><span data-dcnode-id="349" instrument_node="">, or traditional rows, your tomatoes need space and a nice sunny spot. </span></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Tomatoes should be planted deeply, with soil covering 2/3rds of the plant. As a rule of thumb, tomato plants should be no less than 2 feet apart.</span></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Your tomato cuttings will soon grow to full-sized plants, producing their own juicy tomatoes.</span></p><span data-dcnode-id="341" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="340"><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Propagating tomatoes from cuttings is easy and simple. It’s a great way to clone your favorite tomato variety. </span></p><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="335" instrument_node="">You can even propagate smaller varieties and </span><a data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tomatobible.com/grow-tomatoes-indoors/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="334" instrument_node="">grow your tomatoes indoors</span></a><span data-dcnode-id="332" instrument_node=""> throughout winter. As long as they’re getting plenty of sunlight and water, you could be enjoying homegrown tomatoes all year round.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">The major benefit of propagating from cuttings is that you could be enjoying your new tomato plant in just over a month. As long as you’ve watered and fed your correctly planted tomatoes, they’ll reward you with an impressive harvest.</span></p><span data-dcnode-id="327" instrument_node="">
