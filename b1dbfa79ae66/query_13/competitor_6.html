</span><h4 data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Growing tomato plants from cuttings is easier than growing from seed. This guide shows how to propagate tomato plants from stem cuttings.</span></h4><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">Growing tomato plants can take a long time. From seed to small plant it can take well up to eight weeks and that’s not counting the work you’ll do thinning, pricking them out, and re-potting.&nbsp; I’ve found an easier way to grow them though — propagating tomato plants from stem cuttings.</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">If you’re growing tomatoes this year, you can use cuttings from your plants to create new ones in late summer. If you’re not growing them but a friend is, they’ll probably be more than happy to give you some side shoots. After all, these need to be removed anyway.</span></p><span data-dcnode-id="1896" instrument_node="">
</span><figure aria-describedby="caption-attachment-16377" class="wp-caption aligncenter" data-dcnode-id="1884" id="attachment_16377" style="width: 649px"><picture class="wp-image-16377 size-full" data-dcnode-id="1890" title="How to Propagate Tomato Plants from Cuttings. This is the best way to re-grow F1 hybrid tomatoes but you can use the technique for all tomatoes #lovelygreens #growtomatoes #gardening #propagating #plantsforfree #gardeningtip"><span data-dcnode-id="1895" instrument_node="">
</span><source data-dcnode-id="1894" data-lazy-srcset="https://lovelygreens.com/wp-content/uploads/side-shoots.jpg.webp" srcset="https://lovelygreens.com/wp-content/uploads/side-shoots.jpg.webp" type="image/webp"><span data-dcnode-id="1893" instrument_node="">
</span><img alt="How to Propagate Tomato Plants from Cuttings. This is the best way to re-grow F1 hybrid tomatoes but you can use the technique for all tomatoes #lovelygreens #growtomatoes #gardening #propagating #plantsforfree #gardeningtip" class="entered lazyloaded" data-dcnode-id="1892" data-lazy-src="https://lovelygreens.com/wp-content/uploads/side-shoots.jpg" data-ll-status="loaded" height="450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lovelygreens.com/wp-content/uploads/side-shoots.jpg&amp;raw" width="649"><span data-dcnode-id="1891" instrument_node="">
</span></picture><span data-dcnode-id="1889" instrument_node="">

</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="1885" id="caption-attachment-16377"><span data-dcnode-id="1886" instrument_node="">Use the side shoots from indeterminate variety tomatoes to create new plants</span></figcaption></figure><span data-dcnode-id="1883" instrument_node="">
</span><h3 data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">The benefits of growing from cuttings</span></h3><span data-dcnode-id="1880" instrument_node="">
</span><p data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">If you’re growing a tomato plant that you love then there’s a high chance that you’ll want to grow it again next year. Instead of buying new seeds and raising them the hard way, take cuttings. The growing tips of tomatoes take root easily and that includes the side shoots. These are the side stems that sprout out of your plant that need to be removed as it grows. Instead of consigning them to the compost heap, you can pot them on and let them grow their own roots. It’s easy!</span></p><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Propagated plants have a head start on those grown from seed so you can also expect to see them produce fruit earlier.</span></p><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1864"><picture class="aligncenter wp-image-16352 size-medium" data-dcnode-id="1868" title="How to Propagate Tomato Plants from Cuttings. This is the best way to re-grow F1 hybrid tomatoes but you can use the technique for all tomatoes #lovelygreens #growtomatoes #gardening #propagating #plantsforfree #gardeningtip"><span data-dcnode-id="1873" instrument_node="">

</span></noscript></p><div class="code-block code-block-2" data-dcnode-id="1855" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="1863" instrument_node="">
</span><center data-dcnode-id="1856"><span data-dcnode-id="1862" instrument_node="">
</span><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theherbalacademy.com/courses-classes/%3Fap_id%3Dlovelygreens" noopener”="" rel="”nofollow" target="_blank"><img alt="Herbal Courses To Choose From" border="0" class="entered lazyloaded" data-dcnode-id="1861" data-lazy-src="https://theherbalacademy.com/wp-content/uploads/2016/01/Rotating-Programs-Feature-2-300-x-600.gif" data-ll-status="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theherbalacademy.com/wp-content/uploads/2016/01/Rotating-Programs-Feature-2-300-x-600.gif&amp;raw"><noscript data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">&lt;img src="https://theherbalacademy.com/wp-content/uploads/2016/01/Rotating-Programs-Feature-2-300-x-600.gif" alt="Herbal Courses To Choose From" border="0" /&gt;</span></noscript></a><span data-dcnode-id="1857" instrument_node="">
</span></center></div><span data-dcnode-id="1854" instrument_node="">
</span><h3 data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Step 1: Take the Cuttings</span></h3><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">With a sharp knife, cut several strong side shoots from your tomato plants. They should be healthy and its length should be 4-6″ from the point you cut to the top of the smallest leaves.</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">On a clean cutting board or potting bench cut off any flowers and trim down the number of leaves. You want each cutting to be only 4-6″ long and with just a few leaves at the top. The more leaves it has, the more the cutting has to work to supply them with water and food. If you leave these extra leaves on, the cutting might have difficulty surviving. Move straight along to step number two without giving the cuttings a chance to dry out.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><figure aria-describedby="caption-attachment-16353" class="wp-caption aligncenter" data-dcnode-id="1833" id="attachment_16353" style="width: 450px"><picture class="wp-image-16353 size-medium" data-dcnode-id="1839" title="How to Propagate Tomato Plants from Cuttings. This is the best way to re-grow F1 hybrid tomatoes but you can use the technique for all tomatoes #lovelygreens #growtomatoes #gardening #propagating #plantsforfree #gardeningtip"><span data-dcnode-id="1844" instrument_node="">
</span><source data-dcnode-id="1843" data-lazy-srcset="https://lovelygreens.com/wp-content/uploads/rooting-hormone-450x650.jpg.webp" srcset="https://lovelygreens.com/wp-content/uploads/rooting-hormone-450x650.jpg.webp" type="image/webp"><span data-dcnode-id="1842" instrument_node="">

</span><noscript data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">&lt;picture class="wp-image-16353 size-medium" title="How to Propagate Tomato Plants from Cuttings. This is the best way to re-grow F1 hybrid tomatoes but you can use the technique for all tomatoes #lovelygreens #growtomatoes #gardening #propagating #plantsforfree #gardeningtip"&gt;

&lt;/picture&gt;
</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="1834" id="caption-attachment-16353"><span data-dcnode-id="1835" instrument_node="">Rooting hormone is optional but it does help insure that roots form</span></figcaption></figure><span data-dcnode-id="1832" instrument_node="">
</span><h3 data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Step 2: Rooting Hormone Powder</span></h3><span data-dcnode-id="1829" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1828" instrument_node="">Many gardeners propagate cuttings without using </span><a data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/s/ref%3Das_li_ss_tl%3Furl%3Dsearch-alias%3Daps%26field-keywords%3Drooting%2Bhormone%2Bpowder%26sprefix%3Drooting%2Bhor%2Caps%2C212%26crid%3D2E5T6LH51M5PZ%26linkCode%3Dll2%26tag%3Dgarden-store03-20%26linkId%3D14365fc458b13f5672ff2b945d70f1d3" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1825"><u data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Rooting Hormone Powder</span></u></strong></a><span data-dcnode-id="1823" instrument_node=""> but I almost always use it. This substance stimulates the end of a plant’s stem to form roots and it can boost your chances that a cutting takes.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Dip the bottom 1″ of each cutting into rooting hormone powder and then insert the cutting along the inside of a (preferably) clay pot filled with compost. Use a pencil to create a space to insert the cutting into.</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Water the compost well and place the pots in a warm greenhouse that isn’t scorching hot. Hot greenhouses will fry those little cuttings before they have a chance to grow — especially if the leaves are wet.</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1814" instrument_node="">If you don’t have a greenhouse, place a clear plastic bag over the top of the pot to simulate one. You can also propagate cuttings inside of a </span><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/EarlyGrow-70738-Medium-Domed-Propagator/dp/B01BOY6Y2I/ref%3Das_li_ss_tl%3Fie%3DUTF8%26qid%3D1506522270%26sr%3D8-2%26keywords%3Dpropagator%26linkCode%3Dll1%26tag%3Dgarden-store03-20%26linkId%3D2d6aa1fe6b5c001966ca99fba132fc14" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1811"><u data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Propagator</span></u></strong></a><span data-dcnode-id="1809" instrument_node="">.</span></p><span data-dcnode-id="1807" instrument_node="">
</span><figure aria-describedby="caption-attachment-16357" class="wp-caption aligncenter" data-dcnode-id="1795" id="attachment_16357" style="width: 649px"><picture class="wp-image-16357 size-full" data-dcnode-id="1801" title="How to Propagate Tomato Plants from Cuttings. This is the best way to re-grow F1 hybrid tomatoes but you can use the technique for all tomatoes #lovelygreens #growtomatoes #gardening #propagating #plantsforfree #gardeningtip"><span data-dcnode-id="1806" instrument_node="">

</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="1796" id="caption-attachment-16357"><span data-dcnode-id="1797" instrument_node="">Terracotta pots help keep the soil free-draining</span></figcaption></figure><span data-dcnode-id="1794" instrument_node="">
</span><h3 data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">On the Compost</span></h3><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1790" instrument_node="">It’s recommended to blend one part </span><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Espoma-PR8-8-Quart-Organic-Perlite/dp/B002Y0AK6S/ref%3Das_li_ss_tl%3Fs%3Dlawn-garden%26ie%3DUTF8%26qid%3D1506522827%26sr%3D1-4%26keywords%3Dperlite%26linkCode%3Dll1%26tag%3Dgarden-store03-20%26linkId%3D8256e3fe44928f65847e4a1b73fa8020" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1787"><u data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Perlite</span></u></strong></a><span data-dcnode-id="1785" instrument_node=""> with two parts peat-free compost to create a good draining mix for cuttings. This time I didn’t add the Perlite and the cuttings grew just fine, though I did ensure that the compost was never waterlogged.</span></p><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">The reason that clay pots are recommended for propagating is that clay, as a pot material, breathes. This helps keep the compost inside from waterlogging since moisture can wick through and evaporate from the surface of the pot.</span></p><span data-dcnode-id="1780" instrument_node="">
</span><figure aria-describedby="caption-attachment-16361" class="wp-caption aligncenter" data-dcnode-id="1768" id="attachment_16361" style="width: 649px"><picture class="wp-image-16361 size-full" data-dcnode-id="1774" title="How to Propagate Tomato Plants from Cuttings. This is the best way to re-grow F1 hybrid tomatoes but you can use the technique for all tomatoes #lovelygreens #growtomatoes #gardening #propagating #plantsforfree #gardeningtip"><span data-dcnode-id="1779" instrument_node="">

</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="1769" id="caption-attachment-16361"><span data-dcnode-id="1770" instrument_node="">Four weeks on and the plant has formed roots</span></figcaption></figure><span data-dcnode-id="1767" instrument_node="">
</span><h3 data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Aftercare</span></h3><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Initially the cuttings might wilt in their pots but within a day they should perk up and begin forming roots. Keep the compost moist but not soaking and the leaves dry and they’ll happily form roots for you. It takes 4-6 weeks for them to get to a state where you will see roots coming out of the drainage hole of the pot. The image above is of my smallest cutting inside my smallest terracotta pot after just four weeks.</span></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">To ensure that the plants survive until next year, pot them on into larger pots when you spot the roots. Keep them in a light, warm, and frost-free place such as inside the house until you can plant them up next year.</span></p><span data-dcnode-id="1758" instrument_node="">
</span><p data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Apparently tomatoes are perennials but don’t produce as much after their first season. Keeping a plant going by taking cuttings makes sure your plants will stay true to the original and will keep giving you bumper crops of sweet juicy tomatoes.</span></p><span data-dcnode-id="1755" instrument_node="">
</span><figure aria-describedby="caption-attachment-16358" class="wp-caption aligncenter" data-dcnode-id="1743" id="attachment_16358" style="width: 649px"><picture class="wp-image-16358 size-full" data-dcnode-id="1749" title="How to Propagate Tomato Plants from Cuttings. This is the best way to re-grow F1 hybrid tomatoes but you can use the technique for all tomatoes #lovelygreens #growtomatoes #gardening #propagating #plantsforfree #gardeningtip"><span data-dcnode-id="1754" instrument_node="">

</span><p data-dcnode-id="1732"><span data-dcnode-id="1738" instrument_node="">If you’re interested in saving seeds from heirloom and organic tomatoes, I have a great tip for you. Save the seeds on paper towels! It’s very easy and all you do is plant the seeds, paper and all, the next spring. </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lovelygreens.com/save-tomato-seeds-paper-towel/"><strong data-dcnode-id="1735"><u data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Here’s how to do it</span></u></strong></a><span data-dcnode-id="1733" instrument_node="">.</span></p><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1730" instrument_node="">You might also be interested in&nbsp;</span><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lovelygreens.com/2014/07/guide-to-growing-tomatoes.html"><strong data-dcnode-id="1727"><u data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">the Ultimate Guide to Growing Tomatoes</span></u></strong></a><span data-dcnode-id="1725" instrument_node="">. It’s a guest post on Lovely Greens by Our Soulful Home and includes tips on knowing what determinate and indeterminate varieties are. It also includes ideas on planting tomatoes and ways of preparing the fresh fruits.</span></p><span data-dcnode-id="1723" instrument_node="">
