oli" title="Learn more about Burkholderia gladioli from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11311" instrument_node="">Burkholderia gladioli</span></a></em></span><span data-dcnode-id="11307" instrument_node="">, </span><em data-dcnode-id="11305"><span data-dcnode-id="11306" instrument_node="">X. oryzae</span></em><span data-dcnode-id="11304" instrument_node="">, and </span><em data-dcnode-id="11302"><span data-dcnode-id="11303" instrument_node="">Pseudomonas fuscovaginae</span></em><span data-dcnode-id="11301" instrument_node="">. It throws light on management of bacterial panicle blight disease caused by </span><em data-dcnode-id="11299"><span data-dcnode-id="11300" instrument_node="">B. glumae</span></em><span data-dcnode-id="11298" instrument_node=""> in paddy. </span><a class="workspace-trigger" data-dcnode-id="11296" href="#bib59" name="bbib59"><span data-dcnode-id="11297" instrument_node="">Kim et al. (2017)</span></a><span data-dcnode-id="11295" instrument_node=""> also developed multiplex PCR for diagnosing </span><em data-dcnode-id="11293"><span data-dcnode-id="11294" instrument_node="">P</span></em><span data-dcnode-id="11292" instrument_node="">. </span><em data-dcnode-id="11290"><span data-dcnode-id="11291" instrument_node="">syringae</span></em><span data-dcnode-id="11289" instrument_node=""> strain Psa3 responsible for causing bacterial canker of kiwi fruit in Korea. Bacterial DNA was extracted and multiplex PCR was conducted with specific primers TacF/TacR and Psa-universal primers for the detection and differentiation of PSa and Psa3 strains, respectively. Multifaceted strategies have been utilized for differentiating bacteria on the basis of its rRNA gene sequence. Genus-specific primers for 16S rRNA gene were developed to track </span><em data-dcnode-id="11287"><span data-dcnode-id="11288" instrument_node="">Pseudomonas</span></em><span data-dcnode-id="11286" instrument_node=""> population in environmental sample (</span><a class="workspace-trigger" data-dcnode-id="11284" href="#bib137" name="bbib137"><span data-dcnode-id="11285" instrument_node="">Widmer et al., 1998</span></a><span data-dcnode-id="11283" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="11281" href="#bib76" name="bbib76"><span data-dcnode-id="11282" instrument_node="">Maes et al. (1996)</span></a><span data-dcnode-id="11280" instrument_node=""> developed genus-specific primers of </span><em data-dcnode-id="11278"><span data-dcnode-id="11279" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11277" instrument_node=""> capable of amplifying 480</span><span data-dcnode-id="11276" instrument_node="">&nbsp;</span><span data-dcnode-id="11275" instrument_node="">bp fragment. In a similar way, primers were designed for amplifying 287–288</span><span data-dcnode-id="11274" instrument_node="">&nbsp;</span><span data-dcnode-id="11273" instrument_node="">bp in </span><em data-dcnode-id="11271"><span data-dcnode-id="11272" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="11270" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="11268" href="#bib119" name="bbib119"><span data-dcnode-id="11269" instrument_node="">Seal et al., 1999</span></a><span data-dcnode-id="11263"><span data-dcnode-id="11267" instrument_node="">). These primers could successfully amplify other </span><a class="topic-link" data-dcnode-id="11265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/biotype" title="Learn more about biovars from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11266" instrument_node="">biovars</span></a><span data-dcnode-id="11264" instrument_node=""> of </span></span><em data-dcnode-id="11261"><span data-dcnode-id="11262" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="11260" instrument_node=""> but cross reacted with other potato associated bacteria.</span></p><p data-dcnode-id="11191" id="p0095"><span data-dcnode-id="11258" instrument_node="">Enriching bacterial pathogen in growth medium can increase the population of bacterial cells before performing PCR; this method is called BIO-PCR (</span><a class="workspace-trigger" data-dcnode-id="11256" href="#bib114" name="bbib114"><span data-dcnode-id="11257" instrument_node="">Schaad et al., 1995</span></a><span data-dcnode-id="11255" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11253" href="#bib71" name="bbib71"><span data-dcnode-id="11254" instrument_node="">López et al., 2003</span></a><span data-dcnode-id="11252" instrument_node="">). These enrichment methods enable the detection of target bacteria from plants and environmental samples (</span><a class="workspace-trigger" data-dcnode-id="11250" href="#bib52" name="bbib52"><span data-dcnode-id="11251" instrument_node="">Ito et al., 1998</span></a><span data-dcnode-id="11249" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11247" href="#bib133" name="bbib133"><span data-dcnode-id="11248" instrument_node="">Wang et al., 1999</span></a><span data-dcnode-id="11246" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11244" href="#bib13" name="bbib13"><span data-dcnode-id="11245" instrument_node="">Bertolini et al., 2003</span></a><span data-dcnode-id="11243" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11241" href="#bib116" name="bbib116"><span data-dcnode-id="11242" instrument_node="">Schaad et al., 2007</span></a><span data-dcnode-id="11236"><span data-dcnode-id="11240" instrument_node="">). BIO-PCR enhances the efficiency of the reaction as it permits the incubation of desired pathogen population in a pre-enrichment phase, just before </span><a class="topic-link" data-dcnode-id="11238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/dna-extraction" title="Learn more about DNA extraction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11239" instrument_node="">DNA extraction</span></a><span data-dcnode-id="11237" instrument_node="">. This method is suitable for cultivating viable but non-culturable cells (VBNC) present in environmental samples and could act as potent plant pathogens (</span></span><a class="workspace-trigger" data-dcnode-id="11234" href="#bib108" name="bbib108"><span data-dcnode-id="11235" instrument_node="">Roszak and Colwell, 1987</span></a><span data-dcnode-id="11233" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11231" href="#bib41" name="bbib41"><span data-dcnode-id="11232" instrument_node="">Ghezzi and Steck, 1999</span></a><span data-dcnode-id="11230" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11228" href="#bib91" name="bbib91"><span data-dcnode-id="11229" instrument_node="">Ordax et al., 2006</span></a><span data-dcnode-id="11227" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="11225" href="#bib91" name="bbib91"><span data-dcnode-id="11226" instrument_node="">Ordax et al. (2006)</span></a><span data-dcnode-id="11224" instrument_node=""> detected VBNC of </span><em data-dcnode-id="11222"><span data-dcnode-id="11223" instrument_node="">E. amylovora</span></em><span data-dcnode-id="11221" instrument_node=""> by BIO-PCR displaying pathogenicity against plant pathogen. Several workers reported that PCR inhibitors reduce the chance of pathogen detection in samples (</span><a class="workspace-trigger" data-dcnode-id="11219" href="#bib76" name="bbib76"><span data-dcnode-id="11220" instrument_node="">Maes et al., 1996</span></a><span data-dcnode-id="11218" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11216" href="#bib107" name="bbib107"><span data-dcnode-id="11217" instrument_node="">Robène-Soustrade et al., 2006</span></a><span data-dcnode-id="11215" instrument_node="">). According to </span><a class="workspace-trigger" data-dcnode-id="11213" href="#bib136" name="bbib136"><span data-dcnode-id="11214" instrument_node="">Weller et al. (2000)</span></a><span data-dcnode-id="11212" instrument_node="">, substantial decrease in the level of </span><em data-dcnode-id="11210"><span data-dcnode-id="11211" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="11209" instrument_node=""> in potato tuber extracts was observed. </span><a class="workspace-trigger" data-dcnode-id="11207" href="#bib114" name="bbib114"><span data-dcnode-id="11208" instrument_node="">Schaad et al. (1995)</span></a><span data-dcnode-id="11206" instrument_node=""> easily detected high number of </span><span data-dcnode-id="11202"><em data-dcnode-id="11203"><a class="topic-link" data-dcnode-id="11204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/clavibacter-michiganensis" title="Learn more about Clavibacter michiganensis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11205" instrument_node="">Clavibacter michiganensis</span></a></em></span><span data-dcnode-id="11201" instrument_node=""> subsp. </span><em data-dcnode-id="11199"><span data-dcnode-id="11200" instrument_node="">sepedonicus</span></em><span data-dcnode-id="11198" instrument_node=""> in infected asymptomatic tubers by using BIO-PCR, whereas high inhibition was observed in spotting same </span><em data-dcnode-id="11196"><span data-dcnode-id="11197" instrument_node="">C. sepedonicus</span></em><span data-dcnode-id="11195" instrument_node=""> from potato tubers using real-time PCR by </span><a class="workspace-trigger" data-dcnode-id="11193" href="#bib115" name="bbib115"><span data-dcnode-id="11194" instrument_node="">Schaad et al. (1999)</span></a><span data-dcnode-id="11192" instrument_node="">.</span></p><p data-dcnode-id="11169" id="p0100"><span data-dcnode-id="11190" instrument_node="">A new method of PCR that has been used for detecting phytobacteria with high specificity is cooperational PCR (Co-PCR) (</span><a class="workspace-trigger" data-dcnode-id="11188" href="#bib90" name="bbib90"><span data-dcnode-id="11189" instrument_node="">Olmos et al., 2002</span></a><span data-dcnode-id="11187" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11185" href="#bib81" name="bbib81"><span data-dcnode-id="11186" instrument_node="">Marco-Noales et al., 2008</span></a><span data-dcnode-id="11176"><span data-dcnode-id="11180"><span data-dcnode-id="11184" instrument_node="">). The technique has been patented as Co-PCR (Spanish patent P20002613, 2000) and the level of its sensitivity is almost comparable to real-time PCR and </span><a class="topic-link" data-dcnode-id="11182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/nested-polymerase-chain-reaction" title="Learn more about nested PCR from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11183" instrument_node="">nested PCR</span></a><span data-dcnode-id="11181" instrument_node="">. Co-PCR can be done simply on the basis of simultaneous action of more than two primers for producing multiple </span></span><a class="topic-link" data-dcnode-id="11178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/amplicon" title="Learn more about amplicons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11179" instrument_node="">amplicons</span></a><span data-dcnode-id="11177" instrument_node=""> by cooperative action of amplicons to produce largest fragment amplified by the external primers. Incidence of phytobacteria </span></span><em data-dcnode-id="11174"><span data-dcnode-id="11175" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="11173" instrument_node=""> in water can be checked by Co-PCR (</span><a class="workspace-trigger" data-dcnode-id="11171" href="#bib17" name="bbib17"><span data-dcnode-id="11172" instrument_node="">Caruso et al., 2003</span></a><span data-dcnode-id="11170" instrument_node="">).</span></p><p data-dcnode-id="11146" id="p0105"><a class="workspace-trigger" data-dcnode-id="11167" href="#bib122" name="bbib122"><span data-dcnode-id="11168" instrument_node="">Srinivasa et al. (2012)</span></a><span data-dcnode-id="11166" instrument_node=""> cracked the process for directly identifying phytobacteria, including </span><em data-dcnode-id="11164"><span data-dcnode-id="11165" instrument_node="">X. axonopodis</span></em><span data-dcnode-id="11163" instrument_node="">, </span><em data-dcnode-id="11161"><span data-dcnode-id="11162" instrument_node="">X. oryzae</span></em><span data-dcnode-id="11160" instrument_node="">, and </span><em data-dcnode-id="11158"><span data-dcnode-id="11159" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="11149"><span data-dcnode-id="11157" instrument_node="">, by the technique of single-strand conformation polymorphism (SSCP). Target sequences were amplified using PCR and the product was denatured into </span><a class="topic-link" data-dcnode-id="11155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/single-stranded-dna" title="Learn more about single stranded DNAs from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11156" instrument_node="">single stranded DNAs</span></a><span data-dcnode-id="11150"><span data-dcnode-id="11154" instrument_node=""> (ssDNA). ssDNA was further subjected to nondenaturing polyacrylamide </span><a class="topic-link" data-dcnode-id="11152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/gel-electrophoresis" title="Learn more about gel electrophoresis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11153" instrument_node="">gel electrophoresis</span></a><span data-dcnode-id="11151" instrument_node="">. Diverse location of the ssDNA band on the gel designates different sequences. This technique of PCR–SSCP can detect nearly 90% of the single-base substitutions in 200</span></span></span><span data-dcnode-id="11148" instrument_node="">&nbsp;</span><span data-dcnode-id="11147" instrument_node="">bp fragments. Hence, Srinivasa et al. used this technique for rapidly identifying phytopathogenic bacteria by generating SSCP fingerprints of the particular genus.</span></p><p data-dcnode-id="11083" id="p0110"><span data-dcnode-id="11137"><span data-dcnode-id="11141"><span data-dcnode-id="11145" instrument_node="">Real-time PCR and </span><a class="topic-link" data-dcnode-id="11143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/melting-curve-analysis" title="Learn more about melting curve analysis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11144" instrument_node="">melting curve analysis</span></a><span data-dcnode-id="11142" instrument_node=""> is also used for quantifying </span></span><a class="topic-link" data-dcnode-id="11139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/nucleic-acids" title="Learn more about nucleic acids from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11140" instrument_node="">nucleic acids</span></a><span data-dcnode-id="11138" instrument_node="">, analysis of genotypes, detection of mutation, and moreover for detection and diagnosis purposes (</span></span><a class="workspace-trigger" data-dcnode-id="11135" href="#bib61" name="bbib61"><span data-dcnode-id="11136" instrument_node="">Kralik and Ricchi, 2017</span></a><span data-dcnode-id="11130"><span data-dcnode-id="11134" instrument_node="">). Nowadays, this technique is becoming very popular for detecting bacterial </span><a class="topic-link" data-dcnode-id="11132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/phytopathogen" title="Learn more about phytopathogens from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11133" instrument_node="">phytopathogens</span></a><span data-dcnode-id="11131" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="11128" href="#bib136" name="bbib136"><span data-dcnode-id="11129" instrument_node="">Weller et al., 2000</span></a><span data-dcnode-id="11127" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11125" href="#bib135" name="bbib135"><span data-dcnode-id="11126" instrument_node="">Weller and Stead, 2002</span></a><span data-dcnode-id="11124" instrument_node="">). It allows quick and precise detection as well as quantification of phytopathogens in an automated manner. Difference between real-time versus conventional PCR is that the former offers online monitoring of the products after consecutive cycle, without involving any further processing steps like gel electrophoresis. Hence, real-time PCR is normally speedy in comparison to conventional PCR, permitting high-throughput examinations. Additionally, amplification of DNA could be monitored in each cycle depending on the fluorescence emitted. This technology differs from conventional </span><span data-dcnode-id="11123" id="p488"></span><span data-dcnode-id="11118"><span data-dcnode-id="11122" instrument_node="">PCR, as the facility of online product monitoring is available. It is highly sensitive technique as it can even detect very small amount of DNA from the phytobacteria by using </span><a class="topic-link" data-dcnode-id="11120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/taqman" title="Learn more about TaqMan from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11121" instrument_node="">TaqMan</span></a><span data-dcnode-id="11119" instrument_node=""> probes (</span></span><a class="workspace-trigger" data-dcnode-id="11116" href="#bib32" name="bbib32"><span data-dcnode-id="11117" instrument_node="">Fanelli et al., 2007</span></a><span data-dcnode-id="11115" instrument_node="">). It also helps in identifying difference between closely related species and provides exact amount of target gene in processed samples. Because of all these reasons, real-time PCR has been extensively used to detect invasive phytopathogens. There are several reports which prove that real-time-PCR assays are efficient in detecting phytobacteria such as </span><em data-dcnode-id="11113"><span data-dcnode-id="11114" instrument_node="">C. sepedonicus</span></em><span data-dcnode-id="11112" instrument_node=""> and </span><em data-dcnode-id="11110"><span data-dcnode-id="11111" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="11109" instrument_node=""> in potato tubers (</span><a class="workspace-trigger" data-dcnode-id="11107" href="#bib115" name="bbib115"><span data-dcnode-id="11108" instrument_node="">Schaad et al., 1999</span></a><span data-dcnode-id="11106" instrument_node="">), </span><em data-dcnode-id="11104"><span data-dcnode-id="11105" instrument_node="">X. fastidiosa</span></em><span data-dcnode-id="11103" instrument_node=""> is detected in asymptomatic grape vine plant (</span><a class="workspace-trigger" data-dcnode-id="11101" href="#bib113" name="bbib113"><span data-dcnode-id="11102" instrument_node="">Schaad and Frederick, 2002</span></a><span data-dcnode-id="11100" instrument_node="">), </span><em data-dcnode-id="11098"><span data-dcnode-id="11099" instrument_node="">Agrobacterium</span></em><span data-dcnode-id="11097" instrument_node=""> strains from diseased plant parts (</span><a class="workspace-trigger" data-dcnode-id="11095" href="#bib135" name="bbib135"><span data-dcnode-id="11096" instrument_node="">Weller and Stead, 2002</span></a><span data-dcnode-id="11094" instrument_node="">), etc. </span><a class="workspace-trigger" data-dcnode-id="11092" href="#bib136" name="bbib136"><span data-dcnode-id="11093" instrument_node="">Weller et al. (2000)</span></a><span data-dcnode-id="11091" instrument_node=""> detected 10</span><sup data-dcnode-id="11089"><span data-dcnode-id="11090" instrument_node="">2</span></sup><span data-dcnode-id="11088" instrument_node="">&nbsp;</span><span data-dcnode-id="11087" instrument_node="">CFU/mL of </span><em data-dcnode-id="11085"><span data-dcnode-id="11086" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="11084" instrument_node=""> using TaqMan PCR employing either a genus-specific 16S rRNA probe or a biovar 2 specific probe. Real-time PCR is becoming a gold standard for diagnosing phytobacteria, as well as other microorganisms.</span></p><p data-dcnode-id="11061" id="p0115"><span data-dcnode-id="11082" instrument_node="">Nowadays, low cost alternatives of real-time PCR are employed for on-site diagnosis of bacterial phytopathogens. Generally, portable rapid cycling real-time PCR machines including Smart Cycler (Cepheid, Charleston, USA) and RAPID (Idaho Technologies, USA) are used for such a detection. Phytobacteria </span><em data-dcnode-id="11080"><span data-dcnode-id="11081" instrument_node="">Acidovorax avenae</span></em><span data-dcnode-id="11079" instrument_node=""> subsp. </span><span data-dcnode-id="11075"><em data-dcnode-id="11076"><a class="topic-link" data-dcnode-id="11077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/citrullus" title="Learn more about citrulli from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11078" instrument_node="">citrulli</span></a></em></span><span data-dcnode-id="11074" instrument_node=""> causing fruit blotch disease in watermelon was spotted from infected stems by real-time PCR with ITS primers using the Smart Cycler TD System (Cepheid, Inc., Sunnyvale, California) (</span><a class="workspace-trigger" data-dcnode-id="11072" href="#bib113" name="bbib113"><span data-dcnode-id="11073" instrument_node="">Schaad and Frederick, 2002</span></a><span data-dcnode-id="11071" instrument_node="">). High expertise is needed for performing this PCR; briefly, infected stem is sectioned by 2</span><span data-dcnode-id="11070" instrument_node="">&nbsp;</span><span data-dcnode-id="11069" instrument_node="">mm and placed in 100</span><span data-dcnode-id="11068" instrument_node="">&nbsp;</span><span data-dcnode-id="11067" instrument_node="">µL water. Then, 1</span><span data-dcnode-id="11066" instrument_node="">&nbsp;</span><span data-dcnode-id="11065" instrument_node="">µL of the sample is added to the reaction tube enclosing master mix, and direct PCR begins without any prior DNA extraction. However, limited data is accessible to relate the sensitivity level of the protocol with other molecular protocols being employed (</span><a class="workspace-trigger" data-dcnode-id="11063" href="#bib92" name="bbib92"><span data-dcnode-id="11064" instrument_node="">Palacio-Bielsa et al., 2009</span></a><span data-dcnode-id="11062" instrument_node="">).</span></p><p data-dcnode-id="11033" id="p0120"><span data-dcnode-id="11056"><span data-dcnode-id="11060" instrument_node="">DNA microarray-based methods are maximally used for diagnosing viruses; very little research is done on the subject of </span><a class="topic-link" data-dcnode-id="11058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microarrays" title="Learn more about microarray from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11059" instrument_node="">microarray</span></a><span data-dcnode-id="11057" instrument_node=""> in relation to phytobacteria. Despite holding high potential in comparison to other methods described above, it still remains underexploited in the area of phytopathology (</span></span><a class="workspace-trigger" data-dcnode-id="11054" href="#bib46" name="bbib46"><span data-dcnode-id="11055" instrument_node="">Hadidi et al., 2004</span></a><span data-dcnode-id="11053" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="11051" href="#bib62" name="bbib62"><span data-dcnode-id="11052" instrument_node="">Krawczyk et al. (2017)</span></a><span data-dcnode-id="11050" instrument_node=""> worked upon maize pathogens including </span><em data-dcnode-id="11048"><span data-dcnode-id="11049" instrument_node="">Pantoea ananatis</span></em><span data-dcnode-id="11047" instrument_node="">, </span><span data-dcnode-id="11043"><em data-dcnode-id="11044"><a class="topic-link" data-dcnode-id="11045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/pantoea-agglomerans" title="Learn more about Pantoea agglomerans from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11046" instrument_node="">Pantoea agglomerans</span></a></em></span><span data-dcnode-id="11042" instrument_node="">, </span><span data-dcnode-id="11038"><em data-dcnode-id="11039"><a class="topic-link" data-dcnode-id="11040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/enterobacter-cloacae" title="Learn more about Enterobacter cloacae from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11041" instrument_node="">Enterobacter cloacae</span></a></em></span><span data-dcnode-id="11037" instrument_node=""> subsp. </span><em data-dcnode-id="11035"><span data-dcnode-id="11036" instrument_node="">dissolvens</span></em><span data-dcnode-id="11034" instrument_node=""> using microarray-based method. Developed microarray comprised of probes targeting whole genomes of the tested pathogens. Control probes correspond to the genomes of relatively related nonpathogenic strains for avoiding false-positive results. Results showed high difference in the fluorescent signals emitted from pathogen and control probes.</span></p><p data-dcnode-id="11028" id="p0125"><span data-dcnode-id="11032" instrument_node="">Apart from these PCR technologies, different serological and </span><a class="topic-link" data-dcnode-id="11030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/immunodiagnostics" title="Learn more about immunodiagnostic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11031" instrument_node="">immunodiagnostic</span></a><span data-dcnode-id="11029" instrument_node=""> tools are also used for detecting phytobacteria that are elucidated in next section.</span></p></section><section data-dcnode-id="10575" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11023" id="st0045"><span data-dcnode-id="11026" instrument_node="">27.2.3</span><span data-dcnode-id="11025" instrument_node="">. </span><span data-dcnode-id="11024" instrument_node="">Immunodiagnostic Approaches</span></h3><p data-dcnode-id="10933" id="p0130"><span data-dcnode-id="11002"><span data-dcnode-id="11022" instrument_node="">Expansion of </span><a class="topic-link" data-dcnode-id="11020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/hybridoma-technology" title="Learn more about hybridoma technology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11021" instrument_node="">hybridoma technology</span></a><span data-dcnode-id="11003"><span data-dcnode-id="11007"><span data-dcnode-id="11019" instrument_node=""> brought significant development in the area of immunodiagnosis. </span><a class="topic-link" data-dcnode-id="11017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/monoclonal-antibodies" title="Learn more about Monoclonal antibodies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11018" instrument_node="">Monoclonal antibodies</span></a><span data-dcnode-id="11008"><span data-dcnode-id="11012"><span data-dcnode-id="11016" instrument_node=""> (MAbs) produced by hybridoma technology have high specificity toward single epitope. Production of </span><a class="topic-link" data-dcnode-id="11014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/hybridoma" title="Learn more about hybridomas from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11015" instrument_node="">hybridomas</span></a><span data-dcnode-id="11013" instrument_node=""> offered constant results in diverse laboratories as they target extracellular </span></span><a class="topic-link" data-dcnode-id="11010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/polysaccharide" title="Learn more about polysaccharides from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11011" instrument_node="">polysaccharides</span></a><span data-dcnode-id="11009" instrument_node="">, capsular polysaccharides, and </span></span></span><a class="topic-link" data-dcnode-id="11005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/lipopolysaccharide" title="Learn more about lipopolysaccharides from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11006" instrument_node="">lipopolysaccharides</span></a><span data-dcnode-id="11004" instrument_node=""> of phytobacteria including </span></span></span><em data-dcnode-id="11000"><span data-dcnode-id="11001" instrument_node="">C. michiganensis</span></em><span data-dcnode-id="10999" instrument_node=""> and </span><em data-dcnode-id="10997"><span data-dcnode-id="10998" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="10996" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="10994" href="#bib9" name="bbib9"><span data-dcnode-id="10995" instrument_node="">Awasthi, 2015</span></a><span data-dcnode-id="10993" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10991" href="#bib124" name="bbib124"><span data-dcnode-id="10992" instrument_node="">Thind, 2015</span></a><span data-dcnode-id="10986"><span data-dcnode-id="10990" instrument_node="">). MAbs produced by specific bacterial pathogens deliver response against </span><a class="topic-link" data-dcnode-id="10988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/antigen-specificity" title="Learn more about specific antigen from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10989" instrument_node="">specific antigen</span></a><span data-dcnode-id="10987" instrument_node=""> that permitted growth of robust kits for rapid lab and field diagnosis. Different MAbs produced by phytobacteria are used for epidemiological studies. These MAbs are characterized by testing specificity against target pathogens. Some bacterial taxa including </span></span><em data-dcnode-id="10984"><span data-dcnode-id="10985" instrument_node="">C. michiganensis</span></em><span data-dcnode-id="10983" instrument_node=""> and </span><em data-dcnode-id="10981"><span data-dcnode-id="10982" instrument_node="">X. axonopodis</span></em><span data-dcnode-id="10976"><span data-dcnode-id="10980" instrument_node=""> are relatively similar as they have typical antigenic determinants, and </span><a class="topic-link" data-dcnode-id="10978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/cross-reactivity" title="Learn more about cross reaction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10979" instrument_node="">cross reaction</span></a><span data-dcnode-id="10977" instrument_node=""> of antibody with nearly all strains of the taxon occurs. On the other side, phytobacteria like </span></span><em data-dcnode-id="10974"><span data-dcnode-id="10975" instrument_node="">P. atrosepticum</span></em><span data-dcnode-id="10973" instrument_node=""> and </span><em data-dcnode-id="10971"><span data-dcnode-id="10972" instrument_node="">P. carotovorum</span></em><span data-dcnode-id="10970" instrument_node=""> subsp. </span><em data-dcnode-id="10968"><span data-dcnode-id="10969" instrument_node="">carotovorum</span></em><span data-dcnode-id="10963"><span data-dcnode-id="10967" instrument_node=""> have atypical antigen determinants as they are serologically different thus deterring members of this group from reacting with a </span><a class="topic-link" data-dcnode-id="10965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/polyclonal-antiserum" title="Learn more about polyclonal antiserum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10966" instrument_node="">polyclonal antiserum</span></a><span data-dcnode-id="10964" instrument_node=""> or a taxon-specific MAb (</span></span><a class="workspace-trigger" data-dcnode-id="10961" href="#bib6" name="bbib6"><span data-dcnode-id="10962" instrument_node="">Alvarez, 2004</span></a><span data-dcnode-id="10960" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="10958" href="#bib124" name="bbib124"><span data-dcnode-id="10959" instrument_node="">Thind (2015)</span></a><span data-dcnode-id="10957" instrument_node=""> summarized and tabulated the taxon-specific MAb produced by different phytobacteria. These MAbs could be identified using enzyme-linked immunosorbent assay (ELISA). ELISA can detect 10</span><sup data-dcnode-id="10955"><span data-dcnode-id="10956" instrument_node="">5</span></sup><span data-dcnode-id="10954" instrument_node="">–10</span><sup data-dcnode-id="10952"><span data-dcnode-id="10953" instrument_node="">6</span></sup><span data-dcnode-id="10951" instrument_node="">&nbsp;</span><span data-dcnode-id="10946"><span data-dcnode-id="10950" instrument_node="">CFU/mL of bacterial pathogens from symptomatic plants tissues. Its sensitivity can be further enhanced by approximately ten times by using an extraction buffer amended with </span><a class="topic-link" data-dcnode-id="10948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/lysozyme" title="Learn more about lysozyme from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10949" instrument_node="">lysozyme</span></a><span data-dcnode-id="10947" instrument_node=""> and EDTA that discharges lipopolysaccharides into the solution, thereby strengthening antigen–antibody interaction without increasing background readings (</span></span><a class="workspace-trigger" data-dcnode-id="10944" href="#bib71" name="bbib71"><span data-dcnode-id="10945" instrument_node="">López et al., 2003</span></a><span data-dcnode-id="10943" instrument_node="">). Several phytobacterial taxa are identified by using ELISA techniques containing polyclonal and MAbs. Apart from this, fast detection kits are also accessible for these functions. Nowadays, more than one bacterial species could be detected utilizing different enzyme labels in same plate by employing multitarget ELISA. This method was introduced by Agdia, Inc., which is currently used for detecting phytobacteria </span><em data-dcnode-id="10941"><span data-dcnode-id="10942" instrument_node="">C. michiganensi</span></em><span data-dcnode-id="10940" instrument_node="">s and </span><em data-dcnode-id="10938"><span data-dcnode-id="10939" instrument_node="">X. axonopodis</span></em><span data-dcnode-id="10937" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="10935" href="#bib6" name="bbib6"><span data-dcnode-id="10936" instrument_node="">Alvarez, 2004</span></a><span data-dcnode-id="10934" instrument_node="">).</span></p><p data-dcnode-id="10908" id="p0135"><span data-dcnode-id="10932" instrument_node="">Apart from ELISA, enrichment ELISA could also be used for detecting diverse plant pathogens as it is more speedy and sensitive. Enrichment-ELISA require pathogen-specific MAbs for detecting </span><em data-dcnode-id="10930"><span data-dcnode-id="10931" instrument_node="">X. axonopodis</span></em><span data-dcnode-id="10929" instrument_node=""> pv. </span><em data-dcnode-id="10927"><span data-dcnode-id="10928" instrument_node="">dieffenbachiae</span></em><span data-dcnode-id="10926" instrument_node=""> from </span><span data-dcnode-id="10925" id="p489"></span><span data-dcnode-id="10924" instrument_node="">leaf samples, and </span><em data-dcnode-id="10922"><span data-dcnode-id="10923" instrument_node="">P. atrosepticum</span></em><span data-dcnode-id="10921" instrument_node=""> along with </span><em data-dcnode-id="10919"><span data-dcnode-id="10920" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="10918" instrument_node=""> in potato seed pieces (</span><a class="workspace-trigger" data-dcnode-id="10916" href="#bib124" name="bbib124"><span data-dcnode-id="10917" instrument_node="">Thind, 2015</span></a><span data-dcnode-id="10915" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="10913" href="#bib7" name="bbib7"><span data-dcnode-id="10914" instrument_node="">Alvarez et al. (1997)</span></a><span data-dcnode-id="10912" instrument_node=""> documented that enrichment ELISA enhances the sensitivity of ELISA by 10</span><sup data-dcnode-id="10910"><span data-dcnode-id="10911" instrument_node="">4</span></sup><span data-dcnode-id="10909" instrument_node=""> fold, it has an added advantage of multiplying only live cells to deliver positive signals.</span></p><p data-dcnode-id="10874" id="p0140"><span data-dcnode-id="10899"><span data-dcnode-id="10903"><span data-dcnode-id="10907" instrument_node="">The recent expansion in the area of flow cytometry (FC) has heightened the use of immunodiagnostic tools for identification of phytobacteria. In the process of FC, bacterial cells along with other particles are allowed to pass through a sensor in a fluid stream, followed by their swift identification and quantification. Identification of phytobacteria is done on the basis of conjugation with fluorescent dyes and antibodies. Simultaneously, different </span><a class="topic-link" data-dcnode-id="10905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/cellular-parameters" title="Learn more about cellular parameters from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10906" instrument_node="">cellular parameters</span></a><span data-dcnode-id="10904" instrument_node=""> are analyzed on the basis of cells’ fluorescence and light scattering ability. The arrangement of cell is on the basis of electronics that allows </span></span><a class="topic-link" data-dcnode-id="10901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/copurification" title="Learn more about purification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10902" instrument_node="">purification</span></a><span data-dcnode-id="10900" instrument_node=""> and further screening of subpopulation for further confirmation (</span></span><a class="workspace-trigger" data-dcnode-id="10897" href="#bib5" name="bbib5"><span data-dcnode-id="10898" instrument_node="">Alvarez, 2001</span></a><span data-dcnode-id="10896" instrument_node="">). This technique has been used for the detection of </span><em data-dcnode-id="10894"><span data-dcnode-id="10895" instrument_node="">C. michiganensis</span></em><span data-dcnode-id="10893" instrument_node=""> and </span><em data-dcnode-id="10891"><span data-dcnode-id="10892" instrument_node="">X. axonopodis</span></em><span data-dcnode-id="10890" instrument_node=""> in tomato seed extracts and </span><em data-dcnode-id="10888"><span data-dcnode-id="10889" instrument_node="">Anthurium andreanum</span></em><span data-dcnode-id="10887" instrument_node="">, respectively (</span><a class="workspace-trigger" data-dcnode-id="10885" href="#bib5" name="bbib5"><span data-dcnode-id="10886" instrument_node="">Alvarez, 2001</span></a><span data-dcnode-id="10884" instrument_node="">). </span><em data-dcnode-id="10882"><span data-dcnode-id="10883" instrument_node="">Anthurium</span></em><span data-dcnode-id="10881" instrument_node=""> is susceptible to anthurium bacterial blight, which is triggered by </span><em data-dcnode-id="10879"><span data-dcnode-id="10880" instrument_node="">X. axonopodis</span></em><span data-dcnode-id="10878" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="10876" href="#bib107" name="bbib107"><span data-dcnode-id="10877" instrument_node="">Robène-Soustrade et al., 2006</span></a><span data-dcnode-id="10875" instrument_node="">).</span></p><p data-dcnode-id="10846" id="p0145"><span data-dcnode-id="10873" instrument_node="">Other immunological methods like immunomagnetic (IM) separation, immunofluorescence (IF), and lateral flow devices (LFD) are also utilized for detecting phytobacterial population. The technique of IF is broadly used for detecting phytobacteria in seeds and other propagating materials in Europe. However, similar technique was used in Netherlands, for screening the presence of </span><em data-dcnode-id="10871"><span data-dcnode-id="10872" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="10870" instrument_node=""> in 60,000 potato seed pieces yearly (</span><a class="workspace-trigger" data-dcnode-id="10868" href="#bib127" name="bbib127"><span data-dcnode-id="10869" instrument_node="">Van der Wolf and Schoen, 2004</span></a><span data-dcnode-id="10867" instrument_node="">). In France, IF was used to check the presence of </span><em data-dcnode-id="10865"><span data-dcnode-id="10866" instrument_node="">C. michiganensis</span></em><span data-dcnode-id="10864" instrument_node=""> subsp. </span><em data-dcnode-id="10862"><span data-dcnode-id="10863" instrument_node="">sepedonicus</span></em><span data-dcnode-id="10861" instrument_node=""> in potato seed pieces and tomato seed lots (</span><a class="workspace-trigger" data-dcnode-id="10859" href="#bib124" name="bbib124"><span data-dcnode-id="10860" instrument_node="">Thind, 2015</span></a><span data-dcnode-id="10858" instrument_node="">). Incorporation of enrichment step in IF is known as IF colony-staining (IFCS) technique. This includes an enhancement of pour plate step for colony detection with fluorochrome-labeled antibodies (</span><a class="workspace-trigger" data-dcnode-id="10856" href="#bib129" name="bbib129"><span data-dcnode-id="10857" instrument_node="">Veena and Van Vuurde, 2002</span></a><span data-dcnode-id="10847"><span data-dcnode-id="10855" instrument_node="">). The formation of microcolonies due to proliferation of viable cells could be seen with the help of epifluorescence </span><a class="topic-link" data-dcnode-id="10853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/stereomicroscope" title="Learn more about stereomicroscope from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10854" instrument_node="">stereomicroscope</span></a><span data-dcnode-id="10848"><span data-dcnode-id="10852" instrument_node=""> at around 40–60×, whereas nonviable cells are not observed at this low magnification. IFCS is basically used for distinguishing between live and dead cells. The efficacy of the results could be enhanced by optimizing the concentration and amount of buffers and conjugates used in the study. Antibodies belonging to the subclass IgG are the choice for IFCS because of smaller size than those of dimers IgAs and pentamers IgMs and their diffusion is very readily through the </span><a class="topic-link" data-dcnode-id="10850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/agarose" title="Learn more about agarose from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10851" instrument_node="">agarose</span></a><span data-dcnode-id="10849" instrument_node=""> gel. This technique is somewhat similar to BIO-PCR as both involve a prior enrichment step.</span></span></span></p><p data-dcnode-id="10823" id="p0150"><span data-dcnode-id="10845" instrument_node="">The working of LFD is based on the principles of ELISA, but numerous kinds of filters provide solid support for preliminary binding reaction (</span><a class="workspace-trigger" data-dcnode-id="10843" href="#bib23" name="bbib23"><span data-dcnode-id="10844" instrument_node="">Danks and Barker, 2000</span></a><span data-dcnode-id="10842" instrument_node="">). Central Science Laboratory, UK, developed LFD test kits for detecting </span><em data-dcnode-id="10840"><span data-dcnode-id="10841" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="10839" instrument_node=""> in a single-step process. Rapid Immunostrip kits are also developed for identifying </span><em data-dcnode-id="10837"><span data-dcnode-id="10838" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="10836" instrument_node="">, </span><em data-dcnode-id="10834"><span data-dcnode-id="10835" instrument_node="">C. michiganensis</span></em><span data-dcnode-id="10833" instrument_node=""> subsp. </span><em data-dcnode-id="10831"><span data-dcnode-id="10832" instrument_node="">Michiganensis</span></em><span data-dcnode-id="10830" instrument_node="">, and </span><em data-dcnode-id="10828"><span data-dcnode-id="10829" instrument_node="">Xanthomonas hortorum</span></em><span data-dcnode-id="10827" instrument_node=""> pv. </span><em data-dcnode-id="10825"><span data-dcnode-id="10826" instrument_node="">pelargonii</span></em><span data-dcnode-id="10824" instrument_node=""> in diverse samples.</span></p><p data-dcnode-id="10809" id="p0155"><span data-dcnode-id="10822" instrument_node="">In IM separations, phytobacteria are identified in a diversified solution by using paramagnetic polystyrene beads smeared with specific antibodies (</span><a class="workspace-trigger" data-dcnode-id="10820" href="#bib71" name="bbib71"><span data-dcnode-id="10821" instrument_node="">López et al., 2003</span></a><span data-dcnode-id="10819" instrument_node="">). After thorough rinsing, unbounded cells are dislodged, whereas bound cells could be used for performing PCR-based reaction. </span><a class="workspace-trigger" data-dcnode-id="10817" href="#bib131" name="bbib131"><span data-dcnode-id="10818" instrument_node="">Walcott and Gitaitis (2000)</span></a><span data-dcnode-id="10816" instrument_node=""> stated that combination of IM separation along with PCR resulted in 100-fold increase in detection of </span><em data-dcnode-id="10814"><span data-dcnode-id="10815" instrument_node="">A. avenae</span></em><span data-dcnode-id="10813" instrument_node=""> subsp. </span><em data-dcnode-id="10811"><span data-dcnode-id="10812" instrument_node="">citrulli</span></em><span data-dcnode-id="10810" instrument_node=""> over direct PCR.</span></p><p data-dcnode-id="10792" id="p0160"><span data-dcnode-id="10804"><span data-dcnode-id="10808" instrument_node="">There are certain compounds that act as inhibitors for </span><a class="topic-link" data-dcnode-id="10806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/gene-amplification" title="Learn more about DNA amplification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10807" instrument_node="">DNA amplification</span></a><span data-dcnode-id="10805" instrument_node=""> and limit the usage of direct PCR for diagnosing target bacteria from environmental samples. In such a situation, immunocapture usually works to solve the problem. </span></span><em data-dcnode-id="10802"><span data-dcnode-id="10803" instrument_node="">P. syringae</span></em><span data-dcnode-id="10801" instrument_node=""> pv. </span><em data-dcnode-id="10799"><span data-dcnode-id="10800" instrument_node="">syringae</span></em><span data-dcnode-id="10798" instrument_node=""> requires an optimum time of around 1</span><span data-dcnode-id="10797" instrument_node="">&nbsp;</span><span data-dcnode-id="10796" instrument_node="">hour for IC with advanced magnetic beads covered with a polyclonal antiserum. There was an improved detection observed when IC was pursued by a specific PCR test (</span><a class="workspace-trigger" data-dcnode-id="10794" href="#bib132" name="bbib132"><span data-dcnode-id="10795" instrument_node="">Waller and Ogata, 2000</span></a><span data-dcnode-id="10793" instrument_node="">).</span></p><div data-dcnode-id="10576"><p data-dcnode-id="10784" id="p0165"><span data-dcnode-id="10791" instrument_node="">Though molecular methods and immunodiagnostic techniques are highly sensitive and deliver good results in lab conditions, they fail to perform well in field conditions. Limitations and advantages of various diagnostic techniques have been elucidated in </span><a class="workspace-trigger" data-dcnode-id="10789" href="#t0015" name="bt0015"><span data-dcnode-id="10790" instrument_node="">Table 27.2</span></a><span data-dcnode-id="10788" instrument_node="">. On-site monitoring of disease and pathogen is difficult with these techniques, especially in developing countries where farmers have lesser earnings. Besides this, the reagents, buffers, master mix, enzymes, and other molecular biology chemicals used for performing studies are very expensive and have shorter shelf-life that corners its application in many developing countries (</span><a class="workspace-trigger" data-dcnode-id="10786" href="#bib58" name="bbib58"><span data-dcnode-id="10787" instrument_node="">Khiyami et al., 2014</span></a><span data-dcnode-id="10785" instrument_node="">); hence, nanotechnology could be one of the answer for this problem.</span></p><div class="tables frame-topbot rowsep-1 colsep-1" data-dcnode-id="10577" id="t0015"><span class="captions" data-dcnode-id="10775"><span data-dcnode-id="10776" id="cap0015"><p data-dcnode-id="10777" id="sp0020"><span class="label" data-dcnode-id="10782"><span data-dcnode-id="10783" instrument_node="">Table 27.2</span></span><span data-dcnode-id="10781" instrument_node="">. </span><span data-dcnode-id="10780" instrument_node="">Limitations and advantages of various diagnostic techniques used for plant </span><a class="topic-link" data-dcnode-id="10778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microorganism-detection" title="Learn more about pathogen detection from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10779" instrument_node="">pathogen detection</span></a></p></span></span><div class="groups" data-dcnode-id="10593"><table data-dcnode-id="10594"><thead data-dcnode-id="10767"><tr class="rowsep-1" data-dcnode-id="10768"><th data-dcnode-id="10773" scope="col"><span data-dcnode-id="10774" instrument_node="">Techniques</span></th><th data-dcnode-id="10771" scope="col"><span data-dcnode-id="10772" instrument_node="">Advantages</span></th><th data-dcnode-id="10769" scope="col"><span data-dcnode-id="10770" instrument_node="">Limitations</span></th></tr></thead><tbody data-dcnode-id="10595"><tr data-dcnode-id="10764"><td class="rowsep-0" colspan="3" data-dcnode-id="10765"><span data-dcnode-id="10766" instrument_node="">Microbiological Techniques</span></td></tr><tr data-dcnode-id="10761"><td class="rowsep-0" colspan="3" data-dcnode-id="10762"><span data-dcnode-id="10763" instrument_node="">Advantages: Pure culture is in hand</span></td></tr><tr data-dcnode-id="10758"><td colspan="3" data-dcnode-id="10759"><span data-dcnode-id="10760" instrument_node="">Limitations: Time taking and labor intensive</span></td></tr><tr data-dcnode-id="10751"><td data-dcnode-id="10756" rowspan="2"><span data-dcnode-id="10757" instrument_node="">Conventional microbiological techniques</span></td><td data-dcnode-id="10754" rowspan="2"><span data-dcnode-id="10755" instrument_node="">Information obtained from microbiological methods are used as complementary data for further molecular and immunological analysis</span></td><td class="rowsep-0" data-dcnode-id="10752"><span data-dcnode-id="10753" instrument_node="">Can be unrealistic when speedy results are needed</span></td></tr><tr data-dcnode-id="10748"><td data-dcnode-id="10749"><span data-dcnode-id="10750" instrument_node="">Difficult when optimal growth conditions for the organism is unknown</span></td></tr><tr data-dcnode-id="10745"><td colspan="3" data-dcnode-id="10746"><span data-dcnode-id="10747" instrument_node="">Molecular Techniques</span></td></tr><tr data-dcnode-id="10742"><td class="rowsep-0" colspan="3" data-dcnode-id="10743"><span data-dcnode-id="10744" instrument_node="">PCR techniques</span></td></tr><tr data-dcnode-id="10739"><td class="rowsep-0" colspan="3" data-dcnode-id="10740"><span data-dcnode-id="10741" instrument_node="">Advantages: High sensitivity, rapid, automated, and can detect uncultured microbes</span></td></tr><tr data-dcnode-id="10736"><td colspan="3" data-dcnode-id="10737"><span data-dcnode-id="10738" instrument_node="">Limitations: Affected by PCR inhibitors, abundance of false-positive and false-negative results</span></td></tr><tr data-dcnode-id="10729"><td data-dcnode-id="10734"><span data-dcnode-id="10735" instrument_node="">Rep-PCR</span></td><td data-dcnode-id="10732"><span data-dcnode-id="10733" instrument_node="">Low-cost, easy to use, give quick, reproducible results</span></td><td data-dcnode-id="10730"><span data-dcnode-id="10731" instrument_node="">Needs high expertise to conduct analysis</span></td></tr><tr data-dcnode-id="10722"><td data-dcnode-id="10727"><span data-dcnode-id="10728" instrument_node="">BIO-PCR</span></td><td data-dcnode-id="10725"><span data-dcnode-id="10726" instrument_node="">Can detect live cells only, eliminates PCR inhibitors</span></td><td data-dcnode-id="10723"><span data-dcnode-id="10724" instrument_node="">Enrichment of samples and then its incubation allows saprophytes to grow that increases the chance of cross contamination</span></td></tr><tr data-dcnode-id="10715"><td data-dcnode-id="10720"><span data-dcnode-id="10721" instrument_node="">Multiplex PCR</span></td><td data-dcnode-id="10718"><span data-dcnode-id="10719" instrument_node="">Detect multiple targets simultaneously, high throughput and gives reliable results</span></td><td data-dcnode-id="10716"><span data-dcnode-id="10717" instrument_node="">Difficult to distinguish between viable and nonviable cells, designing of primer is crucial</span></td></tr><tr data-dcnode-id="10708"><td data-dcnode-id="10713"><span data-dcnode-id="10714" instrument_node="">Co-PCR</span></td><td data-dcnode-id="10711"><span data-dcnode-id="10712" instrument_node="">Large fragments can be amplified simultaneously by cooperative action of more than three primers</span></td><td data-dcnode-id="10709"><span data-dcnode-id="10710" instrument_node="">Needs high expertise</span></td></tr><tr data-dcnode-id="10701"><td data-dcnode-id="10706"><span data-dcnode-id="10707" instrument_node="">Real-time PCR</span></td><td data-dcnode-id="10704"><span data-dcnode-id="10705" instrument_node="">High specificity, rapid cycling, reproducible results, does not require postamplification products processing, provides real-time monitoring of PCR amplification products</span></td><td data-dcnode-id="10702"><span data-dcnode-id="10703" instrument_node="">Expensive, difficult for multiplex real-time PCR assay, cannot easily distinguish between viable and nonviable cells, requires trained personnel</span></td></tr><tr data-dcnode-id="10694"><td data-dcnode-id="10699"><span data-dcnode-id="10700" instrument_node="">Portable rapid cycler PCR</span></td><td data-dcnode-id="10697"><span data-dcnode-id="10698" instrument_node="">On-site rapid diagnosis of plant diseases could be done</span></td><td data-dcnode-id="10695"><span data-dcnode-id="10696" instrument_node="">Expensive and lack of operational robustness</span></td></tr><tr data-dcnode-id="10691"><td class="rowsep-0" colspan="3" data-dcnode-id="10692"><span data-dcnode-id="10693" instrument_node="">Microarray Techniques</span></td></tr><tr data-dcnode-id="10688"><td class="rowsep-0" colspan="3" data-dcnode-id="10689"><span data-dcnode-id="10690" instrument_node="">Advantages: Sensitive, specific, automated, and rapid</span></td></tr><tr data-dcnode-id="10685"><td colspan="3" data-dcnode-id="10686"><span data-dcnode-id="10687" instrument_node="">Limitations: Very expensive</span></td></tr><tr data-dcnode-id="10678"><td data-dcnode-id="10683"><span data-dcnode-id="10684" instrument_node="">DNA microarray</span></td><td data-dcnode-id="10681"><span data-dcnode-id="10682" instrument_node="">High-throughput technology, enables detection of multiple pathogens, allows detection of specific serotype</span></td><td data-dcnode-id="10679"><span data-dcnode-id="10680" instrument_node="">Difficult to distinguish between viable and nonviable cells, requires trained personnel, needs oligonucleotide probes, and labeling of target genes, low-signal intensity due to improper content of targeted DNA and probe can lead to inaccurate analysis</span></td></tr><tr data-dcnode-id="10675"><td class="rowsep-0" colspan="3" data-dcnode-id="10676"><span data-dcnode-id="10677" instrument_node="">Immunodiagnostic Techniques</span></td></tr><tr data-dcnode-id="10672"><td class="rowsep-0" colspan="3" data-dcnode-id="10673"><span data-dcnode-id="10674" instrument_node="">Advantages: Sensitive, specific, rapid, and culture independent analysis could be done</span></td></tr><tr data-dcnode-id="10669"><td colspan="3" data-dcnode-id="10670"><span data-dcnode-id="10671" instrument_node="">Limitations: Costly</span></td></tr><tr data-dcnode-id="10662"><td data-dcnode-id="10667"><span data-dcnode-id="10668" instrument_node="">Enrichment ELISA</span></td><td data-dcnode-id="10665"><span data-dcnode-id="10666" instrument_node="">Can handle large number of samples and give precise results, time saving</span></td><td data-dcnode-id="10663"><span data-dcnode-id="10664" instrument_node="">Pre-enrichment is needed in order to produce the cell surface antigens, highly trained personnel required, proper labeling of antibodies or antigens is needed</span></td></tr><tr data-dcnode-id="10655"><td data-dcnode-id="10660"><span data-dcnode-id="10661" instrument_node="">Flow cytometry</span></td><td data-dcnode-id="10658"><span data-dcnode-id="10659" instrument_node="">Simultaneous detection and quantification of multiple pathogens in a reliable way</span></td><td data-dcnode-id="10656"><span data-dcnode-id="10657" instrument_node="">High cost, limited knowledge regarding the potential of this technique</span></td></tr><tr data-dcnode-id="10648"><td data-dcnode-id="10653"><span data-dcnode-id="10654" instrument_node="">Immunofluorescence</span></td><td data-dcnode-id="10651"><span data-dcnode-id="10652" instrument_node="">Target distribution can be visualized</span></td><td data-dcnode-id="10649"><span data-dcnode-id="10650" instrument_node="">Photobleaching (fading)</span></td></tr><tr data-dcnode-id="10645"><td class="rowsep-0" colspan="3" data-dcnode-id="10646"><span data-dcnode-id="10647" instrument_node="">Combinational Techniques</span></td></tr><tr data-dcnode-id="10642"><td class="rowsep-0" colspan="3" data-dcnode-id="10643"><span data-dcnode-id="10644" instrument_node="">Advantages: Sensitive and rapid</span></td></tr><tr data-dcnode-id="10639"><td colspan="3" data-dcnode-id="10640"><span data-dcnode-id="10641" instrument_node="">Limitations: Expensive</span></td></tr><tr data-dcnode-id="10629"><td data-dcnode-id="10637" rowspan="2"><span data-dcnode-id="10638" instrument_node="">PCR–ELISA</span></td><td class="rowsep-0" data-dcnode-id="10632"><span data-dcnode-id="10636" instrument_node="">Sensitivity enhanced by 10</span><sup data-dcnode-id="10634"><span data-dcnode-id="10635" instrument_node="">4</span></sup><span data-dcnode-id="10633" instrument_node=""> folds over direct ELISA</span></td><td data-dcnode-id="10630" rowspan="2"><span data-dcnode-id="10631" instrument_node="">Expensive</span></td></tr><tr data-dcnode-id="10626"><td data-dcnode-id="10627"><span data-dcnode-id="10628" instrument_node="">Targets only live cells</span></td></tr><tr data-dcnode-id="10619"><td data-dcnode-id="10624"><span data-dcnode-id="10625" instrument_node="">Immunomagnetic PCR</span></td><td data-dcnode-id="10622"><span data-dcnode-id="10623" instrument_node="">Detection limit enhanced by 100 fold over direct PCR</span></td><td data-dcnode-id="10620"><span data-dcnode-id="10621" instrument_node="">Expensive</span></td></tr><tr data-dcnode-id="10616"><td class="rowsep-0" colspan="3" data-dcnode-id="10617"><span data-dcnode-id="10618" instrument_node="">Nanodiagnostic Techniques</span></td></tr><tr data-dcnode-id="10613"><td class="rowsep-0" colspan="3" data-dcnode-id="10614"><span data-dcnode-id="10615" instrument_node="">Advantages: Cheap and ecofriendly</span></td></tr><tr data-dcnode-id="10610"><td colspan="3" data-dcnode-id="10611"><span data-dcnode-id="10612" instrument_node="">Limitations: Needs skilled professional for conducting experiments</span></td></tr><tr data-dcnode-id="10603"><td data-dcnode-id="10608"><span data-dcnode-id="10609" instrument_node="">Bacteriophage-based biosensors</span></td><td data-dcnode-id="10606"><span data-dcnode-id="10607" instrument_node="">High selectivity, low cost of phages, can distinguish between live and dead bacterial cells</span></td><td data-dcnode-id="10604"><span data-dcnode-id="10605" instrument_node="">Sample preparation is highly complicated, application is limited to viral and fungal pathogen detection</span></td></tr><tr data-dcnode-id="10596"><td data-dcnode-id="10601"><span data-dcnode-id="10602" instrument_node="">Affinity-based biosensors</span></td><td data-dcnode-id="10599"><span data-dcnode-id="10600" instrument_node="">Rapid</span></td><td data-dcnode-id="10597"><span data-dcnode-id="10598" instrument_node="">Detection limit is very low</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="10578"></p><p data-dcnode-id="10579" id="sp0025"><span data-dcnode-id="10589"><em data-dcnode-id="10590"><a class="topic-link" data-dcnode-id="10591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/polymerase-chain-reaction" title="Learn more about PCR from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10592" instrument_node="">PCR</span></a></em></span><span data-dcnode-id="10588" instrument_node="">, polymerase chain reaction; </span><em data-dcnode-id="10586"><span data-dcnode-id="10587" instrument_node="">Co-PCR</span></em><span data-dcnode-id="10585" instrument_node="">, cooperational PCR; </span><span data-dcnode-id="10581"><em data-dcnode-id="10582"><a class="topic-link" data-dcnode-id="10583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/enzyme-linked-immunosorbent-assay" title="Learn more about ELISA from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10584" instrument_node="">ELISA</span></a></em></span><span data-dcnode-id="10580" instrument_node="">, enzyme-linked immunosorbent assay.</span></p><p></p></div></div></section><section data-dcnode-id="10394" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10571" id="st0050"><span data-dcnode-id="10574" instrument_node="">27.2.4</span><span data-dcnode-id="10573" instrument_node="">. </span><span data-dcnode-id="10572" instrument_node="">Nanodiagnostic Approaches</span></h3><p data-dcnode-id="10551" id="p0170"><span data-dcnode-id="10570" instrument_node="">The advent and rapid development in the area of nanotechnology has opened up venues in incorporating molecular diagnostics tools with nanoscience for identification and diagnosis of pathogens. This combination has given rise to a new promising technology, i.e., nanomolecular diagnostic technology (NMDT) for diagnosing bacterial plant pathogens (</span><a class="workspace-trigger" data-dcnode-id="10568" href="#bib53" name="bbib53"><span data-dcnode-id="10569" instrument_node="">Jain, 2003</span></a><span data-dcnode-id="10567" instrument_node="">). In this technology, different nanosystems and nanodevices are assembled for sequencing DNA molecule. The usage of nanosize devices for analyzing DNA sequences and diagnosing plant disease is emerging as a faster and </span><span data-dcnode-id="10566" id="p490"></span><span data-dcnode-id="10565" id="p491"></span><span data-dcnode-id="10564" instrument_node="">more reliable technique in comparison to routine conventional techniques. NMDT involves nanosize biosensors for observing plant microbe interfaces and transfer of gene between the host and pathogen (</span><a class="workspace-trigger" data-dcnode-id="10562" href="#bib139" name="bbib139"><span data-dcnode-id="10563" instrument_node="">Yalcin and Otles, 2010</span></a><span data-dcnode-id="10561" instrument_node="">). Furthermore, nanomaterials can also be taken up for detection of mycotoxins, enhancing resistance of plants, predicting plant diseases, and nanomolecular diagnosis of plant pathogens (</span><a class="workspace-trigger" data-dcnode-id="10559" href="#bib100" name="bbib100"><span data-dcnode-id="10560" instrument_node="">Prieto-Simon et al., 2007</span></a><span data-dcnode-id="10558" instrument_node="">). NMD research is managing to propagate simple assays that are portable, accurate, and without any tedious methodology, so that agriculturalists, agronomists, and even poor farmers can use this portable laboratory for detecting particular diseases (</span><a class="workspace-trigger" data-dcnode-id="10556" href="#bib39" name="bbib39"><span data-dcnode-id="10557" instrument_node="">Gardeniers and van den Berg, 2004</span></a><span data-dcnode-id="10555" instrument_node="">). Development of novel nanomaterials embellished with nanotized particles is a remarkable discovery in detection and diagnosis of bacterial contaminants (</span><a class="workspace-trigger" data-dcnode-id="10553" href="#bib86" name="bbib86"><span data-dcnode-id="10554" instrument_node="">Mocan et al., 2017</span></a><span data-dcnode-id="10552" instrument_node="">).</span></p><section data-dcnode-id="10395" id="s0040"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10547" id="st0055"><span data-dcnode-id="10550" instrument_node="">27.2.4.1</span><span data-dcnode-id="10549" instrument_node="">. </span><span data-dcnode-id="10548" instrument_node="">Biosensors</span></h4><p data-dcnode-id="10518" id="p0175"><span data-dcnode-id="10538"><span data-dcnode-id="10542"><span data-dcnode-id="10546" instrument_node="">The work of biosensors is to sense the pathogen on the basis of biological recognition using different receptors such as </span><a class="topic-link" data-dcnode-id="10544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/dna-probe" title="Learn more about DNA probe from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10545" instrument_node="">DNA probe</span></a><span data-dcnode-id="10543" instrument_node="">, antibodies, </span></span><a class="topic-link" data-dcnode-id="10540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/bacteriophages" title="Learn more about phages from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10541" instrument_node="">phages</span></a><span data-dcnode-id="10539" instrument_node="">, etc. (</span></span><a class="workspace-trigger" data-dcnode-id="10536" href="#bib57" name="bbib57"><span data-dcnode-id="10537" instrument_node="">Khater et al., 2016</span></a><span data-dcnode-id="10535" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="10533" href="#bib49" name="bbib49"><span data-dcnode-id="10534" instrument_node="">Hashimoto et al. (2008)</span></a><span data-dcnode-id="10528"><span data-dcnode-id="10532" instrument_node=""> established a novel biosensor for quick diagnosis of soilborne pathogens, encompassing two biosensors. This system was designed using two different microbes, each of them were immobilized on an electrode individually. Research is also ongoing in the area of linking biosensors with </span><a class="topic-link" data-dcnode-id="10530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/global-positioning-system" title="Learn more about global positioning system from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10531" instrument_node="">global positioning system</span></a><span data-dcnode-id="10529" instrument_node=""> for online monitoring of plant disease. This monitoring will provide us information on distribution and location of pathogen throughout the field (</span></span><a class="workspace-trigger" data-dcnode-id="10526" href="#bib21" name="bbib21"><span data-dcnode-id="10527" instrument_node="">Clarke et al., 2009</span></a><span data-dcnode-id="10525" instrument_node="">). This amalgamation of biotechnology and nanotechnology with biosensors could be exploited to create equipment’s of high sensitivity that could assist in the diagnosis of pathogen and disease prevalence (</span><a class="workspace-trigger" data-dcnode-id="10523" href="#bib105" name="bbib105"><span data-dcnode-id="10524" instrument_node="">Rai and Ingle, 2012</span></a><span data-dcnode-id="10522" instrument_node="">). In fact, these nanosensors can spot plant diseases earlier than its detectable symptoms appear and thus enable their control. Accuracy in farming will permit better crop production by giving exact data that will help growers to take better decisions (</span><a class="workspace-trigger" data-dcnode-id="10520" href="#bib105" name="bbib105"><span data-dcnode-id="10521" instrument_node="">Rai and Ingle, 2012</span></a><span data-dcnode-id="10519" instrument_node="">).</span></p><p data-dcnode-id="10488" id="p0180"><span data-dcnode-id="10513"><span data-dcnode-id="10517" instrument_node="">Recently, biosensor known as affinity biosensors have been developed that use fragments of </span><a class="topic-link" data-dcnode-id="10515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/nucleic-acid" title="Learn more about nucleic acid from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10516" instrument_node="">nucleic acid</span></a><span data-dcnode-id="10514" instrument_node=""> as the basis for pathogen detection. DNA-based biosensors facilitate early detection of disease incidence before the appearance of any observable signs or symptoms. Working of DNA-based biosensors depends on the nucleic acid hybridization of DNA probe that are immobilized on biosensors and analyte DNA sequence (</span></span><a class="workspace-trigger" data-dcnode-id="10511" href="#bib31" name="bbib31"><span data-dcnode-id="10512" instrument_node="">Eun and Wong, 2000</span></a><span data-dcnode-id="10506"><span data-dcnode-id="10510" instrument_node="">). Specific DNA sequences are extensively used for detecting bacteria, fungi, and </span><a class="topic-link" data-dcnode-id="10508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/transgenic-organism" title="Learn more about genetically modified organisms from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10509" instrument_node="">genetically modified organisms</span></a><span data-dcnode-id="10507" instrument_node="">. Depending on the mode of transduction, there are four main types of DNA-based biosensors: strip, electrochemical, piezoelectric, and optical DNA biosensors (</span></span><a class="workspace-trigger" data-dcnode-id="10504" href="#bib33" name="bbib33"><span data-dcnode-id="10505" instrument_node="">Fang and Ramasamy, 2015</span></a><span data-dcnode-id="10491"><span data-dcnode-id="10495"><span data-dcnode-id="10499"><span data-dcnode-id="10503" instrument_node="">). The optical biosensors are further categorized into three subtypes: </span><a class="topic-link" data-dcnode-id="10501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/surface-plasmon-resonance" title="Learn more about surface plasmon resonance from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10502" instrument_node="">surface plasmon resonance</span></a><span data-dcnode-id="10500" instrument_node="">, </span></span><a class="topic-link" data-dcnode-id="10497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/molecular-beacon" title="Learn more about molecular beacons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10498" instrument_node="">molecular beacons</span></a><span data-dcnode-id="10496" instrument_node="">, and quantum-dots. Diagnosis of bacterial pathogens is generally done using DNA-based biosensors because of their unique </span></span><a class="topic-link" data-dcnode-id="10493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/nucleotide-sequence" title="Learn more about nucleic acid sequence from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10494" instrument_node="">nucleic acid sequence</span></a><span data-dcnode-id="10492" instrument_node="">. Identification of the sequences could </span></span><span data-dcnode-id="10490" id="p492"></span><span data-dcnode-id="10489" instrument_node="">be done by hybridizing with the corresponding DNA probe, whereas identification of analyte DNA depends on hydrogen bonding in between analyte DNA sequence and probe.</span></p><p data-dcnode-id="10426" id="p0185"><span data-dcnode-id="10483"><span data-dcnode-id="10487" instrument_node="">A new type of biosensor-based on bacteriophages is also available in market nowadays. Bacteriophages are emerging as promising substitute for detecting bacterial pathogens due to its high selectivity, sensitivity, </span><a class="topic-link" data-dcnode-id="10485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/thermostability" title="Learn more about thermostability from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10486" instrument_node="">thermostability</span></a><span data-dcnode-id="10484" instrument_node="">, and economics (</span></span><a class="workspace-trigger" data-dcnode-id="10481" href="#bib15" name="bbib15"><span data-dcnode-id="10482" instrument_node="">Brigati and Petrenko, 2005</span></a><span data-dcnode-id="10480" instrument_node="">). Viruses that infect bacteria and multiply inside bacterial host resulting to their death or lysis are known as bacteriophages. As they possess ability to lyse bacterial cells, bacteriophages are used widely in phage therapy to treat bacterial infections (</span><a class="workspace-trigger" data-dcnode-id="10478" href="#bib82" name="bbib82"><span data-dcnode-id="10479" instrument_node="">McGrath and van Sinderen, 2007</span></a><span data-dcnode-id="10477" instrument_node="">). Phage therapy is not only used for treating human diseases, but they also control plant diseases. Bacteriophage-based biosensors can also distinguish between dead and live bacterial pathogens, hence reducing false-positive signals during measurement. However, the sample preparation of this system is highly complicated. Apart from this, they can only detect bacteria pathogens and strictly limits its application for majority of fungal and viral pathogens. Recently, bacteriophage-based biosensors have been used successfully for controlling </span><em data-dcnode-id="10475"><span data-dcnode-id="10476" instrument_node="">Dickeya solani</span></em><span data-dcnode-id="10474" instrument_node=""> (bacteria infecting tomato and potato crop) (</span><a class="workspace-trigger" data-dcnode-id="10472" href="#bib2" name="bbib2"><span data-dcnode-id="10473" instrument_node="">Adriaenssens et al., 2012</span></a><span data-dcnode-id="10471" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="10469" href="#bib117" name="bbib117"><span data-dcnode-id="10470" instrument_node="">Schofield et al. (2013)</span></a><span data-dcnode-id="10468" instrument_node=""> reported detection and diagnosis of </span><em data-dcnode-id="10466"><span data-dcnode-id="10467" instrument_node="">Pseudomonas cannabina</span></em><span data-dcnode-id="10465" instrument_node=""> pv. </span><em data-dcnode-id="10463"><span data-dcnode-id="10464" instrument_node="">alisalensis</span></em><span data-dcnode-id="10458"><span data-dcnode-id="10462" instrument_node=""> from infected plant part by using phage-based diagnostic assay. LuxAB reporter genes encode for enzyme </span><a class="topic-link" data-dcnode-id="10460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/luciferase" title="Learn more about luciferase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10461" instrument_node="">luciferase</span></a><span data-dcnode-id="10459" instrument_node=""> and this gene is incorporated into </span></span><em data-dcnode-id="10456"><span data-dcnode-id="10457" instrument_node="">P. cannabina</span></em><span data-dcnode-id="10455" instrument_node=""> pv </span><em data-dcnode-id="10453"><span data-dcnode-id="10454" instrument_node="">alisalensis</span></em><span data-dcnode-id="10452" instrument_node=""> phage PBSPCA1. When target pathogen is available, lux AB is expressed in host cell due to phage infection. Expression of enzyme luciferase emits light in presence of oxygen, </span><em data-dcnode-id="10450"><span data-dcnode-id="10451" instrument_node="">n</span></em><span data-dcnode-id="10445"><spa
