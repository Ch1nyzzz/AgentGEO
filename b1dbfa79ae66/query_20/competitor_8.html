n data-dcnode-id="10449" instrument_node="">-decanal, and </span><a class="topic-link" data-dcnode-id="10447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/flavin-mononucleotide" title="Learn more about flavin mononucleotide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10448" instrument_node="">flavin mononucleotide</span></a><span data-dcnode-id="10446" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="10443" href="#bib117" name="bbib117"><span data-dcnode-id="10444" instrument_node="">Schofield et al., 2013</span></a><span data-dcnode-id="10442" instrument_node="">). Apart from </span><em data-dcnode-id="10440"><span data-dcnode-id="10441" instrument_node="">P. cannabina pv. alisalensi</span></em><span data-dcnode-id="10439" instrument_node="">, bacteriophages can also detect plant pathogens such as </span><em data-dcnode-id="10437"><span data-dcnode-id="10438" instrument_node="">P. syringae</span></em><span data-dcnode-id="10436" instrument_node=""> pv. </span><em data-dcnode-id="10434"><span data-dcnode-id="10435" instrument_node="">actinidiae</span></em><span data-dcnode-id="10433" instrument_node=""> and </span><em data-dcnode-id="10431"><span data-dcnode-id="10432" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="10430" instrument_node=""> causing bacterial canker of kiwifruits and bacterial wilt in diverse crop plants, respectively (</span><a class="workspace-trigger" data-dcnode-id="10428" href="#bib37" name="bbib37"><span data-dcnode-id="10429" instrument_node="">Frampton et al., 2014</span></a><span data-dcnode-id="10427" instrument_node="">). The expansive area of bacteriophages will provide more opportunity to design better bacteriophage-based biosensors so that further progress can be made in diagnosing disease-causing plant bacteria.</span></p><p data-dcnode-id="10396" id="p0190"><span data-dcnode-id="10421"><span data-dcnode-id="10425" instrument_node="">Presently, nanosensors made from polymers such as polyaniline, </span><a class="topic-link" data-dcnode-id="10423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/polythiophene" title="Learn more about polythiophene from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10424" instrument_node="">polythiophene</span></a><span data-dcnode-id="10422" instrument_node="">, and polypyrrole are used for detecting plant pathogens (</span></span><a class="workspace-trigger" data-dcnode-id="10419" href="#bib120" name="bbib120"><span data-dcnode-id="10420" instrument_node="">Small et al., 2001</span></a><span data-dcnode-id="10418" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10416" href="#bib58" name="bbib58"><span data-dcnode-id="10417" instrument_node="">Khiyami et al., 2014</span></a><span data-dcnode-id="10415" instrument_node="">). These nanosensors have high sensitivity so they can significantly decrease response-time to detect disease occurrence in crops (</span><a class="workspace-trigger" data-dcnode-id="10413" href="#bib120" name="bbib120"><span data-dcnode-id="10414" instrument_node="">Small et al., 2001</span></a><span data-dcnode-id="10412" instrument_node="">). Detection of bacterial pathogens and toxins produced by them could be done using fiber optic nanosensors. </span><a class="workspace-trigger" data-dcnode-id="10410" href="#bib28" name="bbib28"><span data-dcnode-id="10411" instrument_node="">Dubas and Pimpan (2008)</span></a><span data-dcnode-id="10409" instrument_node=""> showed relations between silver nanoparticles (NP) and sulfurazon-ethyl herbicide. Dubas et al. observed that silver NP are made from optic fibers and sensitive toward increased herbicide concentrations in a given solution and bring change in color of NP. This method is also advantageous in detecting microbial pathogens from environmental samples including soil and water (</span><a class="workspace-trigger" data-dcnode-id="10407" href="#bib29" name="bbib29"><span data-dcnode-id="10408" instrument_node="">Dubertret et al., 2001</span></a><span data-dcnode-id="10406" instrument_node="">). Recently, fluorescent silica NP pooled with antibody molecules have been designed, which can fruitfully detect spot disease in peppers and tomatoes caused by bacterial plant pathogen </span><em data-dcnode-id="10404"><span data-dcnode-id="10405" instrument_node="">X. axonopodis</span></em><span data-dcnode-id="10403" instrument_node=""> pv. </span><em data-dcnode-id="10401"><span data-dcnode-id="10402" instrument_node="">vesicatoria</span></em><span data-dcnode-id="10400" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="10398" href="#bib140" name="bbib140"><span data-dcnode-id="10399" instrument_node="">Yao et al., 2009</span></a><span data-dcnode-id="10397" instrument_node="">).</span></p></section></section></section><section data-dcnode-id="10385" id="s0045"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10389" id="st0060"><span data-dcnode-id="10392" instrument_node="">27.3</span><span data-dcnode-id="10391" instrument_node="">. </span><span data-dcnode-id="10390" instrument_node="">Conclusion and Future Prospects</span></h2><p data-dcnode-id="10386" id="p0195"><span data-dcnode-id="10388" instrument_node="">The futuristic approaches suggest exploration of novel tools and techniques for detecting and diagnosing phytobacteria. This exploration could be done on the basis of new sequences, new primer pairs, and new protocols. Concerted efforts are needed to develop cost-effective ecofriendly diagnostic techniques as well as to improve the already existing ones. Simultaneous detection of phytobacteria in natural field conditions without culturing and enrichment both qualitatively and quantitatively will offer a more comprehensive knowledge of the life cycle of each phytobacteria. Additional emphasis should be given to develop suitable sampling methods and schemes for detecting effective latent infections and pathogen reservoirs. Protocols developed with balanced specificity and sensitivity for pathogens diagnosis will have optimistic effect on the sanitary status of the agricultural crops. Henceforth, it will reduce spread of emergent pathogens in the globalized world. Reduction in the extent of pathogen spread will ultimately minimize the need for pesticide treatments, which will in turn protect our ecosystems and augment the quality of food in the developed countries. Molecular tools combined with nanoscale strategies can be exploited in the near future for developing smart agricultural devices, which may trigger alarms or notify in special or unusual conditions for appropriate action for disease management.</span><span data-dcnode-id="10387" id="p493"></span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="10379"><button class="button button-anchor" data-dcnode-id="10380" type="button"><span class="button-text" data-dcnode-id="10381"><span data-dcnode-id="10382" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="306"><section class="bibliography u-font-serif text-s" data-dcnode-id="307" id="bibliog0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10377"><span data-dcnode-id="10378" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="308" id="bb0010"><dl class="references" data-dcnode-id="309" id="reference-links-bb0010"><dt class="label" data-dcnode-id="10374"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="10375" href="#bbib1" id="ref-id-bib1"><span data-dcnode-id="10376" instrument_node="">Adachi and Oku, 2000</span></a></dt><dd instrument_node="">Vandenheuvel</span><span data-dcnode-id="10287" instrument_node="">, </span><span data-dcnode-id="10285" instrument_node="">V.</span><span data-dcnode-id="10283" instrument_node=""> </span><span data-dcnode-id="10281" instrument_node="">Dunon</span><span data-dcnode-id="10279" instrument_node="">, </span><span data-dcnode-id="10277" instrument_node="">P.J.</span><span data-dcnode-id="10275" instrument_node=""> </span><span data-dcnode-id="10273" instrument_node="">Ceyssens</span><span data-dcnode-id="10271" instrument_node="">, </span><span data-dcnode-id="10269" instrument_node="">M.</span><span data-dcnode-id="10267" instrument_node=""> </span><span data-dcnode-id="10265" instrument_node="">De Proft</span><span data-dcnode-id="10263" instrument_node="">, </span><em data-dcnode-id="10261"><span data-dcnode-id="10262" instrument_node=""> et al.</span></em><div data-dcnode-id="10255" id="ref-id-sbref2"><strong class="title" data-dcnode-id="10256"><span data-dcnode-id="10260" instrument_node="">T4-related bacteriophage limestone isolates for the control of soft rot on potato caused by ‘</span><em data-dcnode-id="10258"><span data-dcnode-id="10259" instrument_node="">Dickeya solani</span></em><span data-dcnode-id="10257" instrument_node="">’</span></strong></div></div><div class="host" data-dcnode-id="10232"><span data-dcnode-id="10253" instrument_node="">PLoS ONE</span><span data-dcnode-id="10251" instrument_node="">, </span><span data-dcnode-id="10249" instrument_node="">7</span><span data-dcnode-id="10247" instrument_node=""> (</span><span data-dcnode-id="10245" instrument_node="">3</span><span data-dcnode-id="10243" instrument_node="">)</span><span data-dcnode-id="10241" instrument_node=""> (</span><span data-dcnode-id="10239" instrument_node="">2012</span><span data-dcnode-id="10237" instrument_node="">)</span><span data-dcnode-id="10235" instrument_node="">, p. </span><span data-dcnode-id="10233" instrument_node="">e33227</span></div><div class
