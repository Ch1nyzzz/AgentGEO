</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abs0010&quot;><p id=&quot;sp0030&quot;>Plant pathogens cause severe loss in terms of economics and production in agriculture sector. So, the crucial step toward disease management under natural field conditions is to appropriately detect the pathogen. Proper nursing of agricultural crops and early detection of disease incidence is crucial for maintaining sustainability. Though there are several reports that center around the detection and diagnosis of fungal and viral pathogens, little information is accessible on the subject of bacterial plant pathogen diagnosis. Hence, this book chapter especially focuses on the evolution from traditional microbiological tools to modern molecular methods for identifying bacterial plant pathogens. Apart from this, the chapter also highlights the futuristic nanodiagnostic approaches for on-site detection of bacterial pathogen. The implementation of these new high-throughput diagnostic technologies, based on the amalgamation of novel molecular techniques along with nanosciences, could be used to overcome age old issues related to pathogen diagnosis.</p></div></div></div>" data-dcnode-id="13156" lang="en" name="citation_abstract"><span data-dcnode-id="13155" instrument_node="">

d="12824"></section><section class="ReferencedArticles" data-dcnode-id="12823"></section><div class="PageDivider" data-dcnode-id="12822"></div><div class="Abstracts u-font-serif" data-dcnode-id="12815" id="abstracts"><div class="abstract author" data-dcnode-id="12816" id="ab0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="12820"><span data-dcnode-id="12821" instrument_node="">Abstract</span></h2><div data-dcnode-id="12817" id="abs0010"><p data-dcnode-id="12818" id="sp0030"><span data-dcnode-id="12819" instrument_node="">Plant pathogens cause severe loss in terms of economics and production in agriculture sector. So, the crucial step toward disease management under natural field conditions is to appropriately detect the pathogen. Proper nursing of agricultural crops and early detection of disease incidence is crucial for maintaining sustainability. Though there are several reports that center around the detection and diagnosis of fungal and viral pathogens, little information is accessible on the subject of bacterial plant pathogen diagnosis. Hence, this book chapter especially focuses on the evolution from traditional microbiological tools to modern molecular methods for identifying bacterial plant pathogens. Apart from this, the chapter also highlights the futuristic nanodiagnostic approaches for on-site detection of bacterial pathogen. The implementation of these new high-throughput diagnostic technologies, based on the amalgamation of novel molecular techniques along with nanosciences, could be used to overcome age old issues related to pathogen diagnosis.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="12792" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="12804"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="12805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//w ogens like viruses, bacteria, fungi, </span><a class="topic-link" data-dcnode-id="12756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/mollicutes" title="Learn more about mollicutes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12757" instrument_node="">mollicutes</span></a><span data-dcnode-id="12755" instrument_node="">, nematodes, insects, etc. are responsible for disrupting crop yield as they causes severe plant diseases. According to an estimate, insect pests account for 14% of the loss in crop yield, weeds causes 13% loss, whereas plant pathogens like fungi, viruses, and bacteria cause reduction in crop yield by up to 65%, 20%, and 10%, respectively (</span></span><a class="workspace-trigger" data-dcnode-id="12752" href="#bib47" name="bbib47"><span data-dcnode-id="12753" instrument_node="">Hansen and Lane, 1985</span></a><span data-dcnode-id="12751" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12749" href="#bib58" name="bbib58"><span data-dcnode-id="12750" instrument_node="">Khiyami et al., 2014</span></a><span data-dcnode-id="12748" instrument_node="">). The rate of crop losses due to pathogen infestation has been assessed to be around 2000 billion US$ per annum (</span><a class="workspace-trigger" data-dcnode-id="12746" href="#bib68" name="bbib68"><span data-dcnode-id="12747" instrument_node="">Lenteren and van Martin, 1999</span></a><span data-dcnode-id="12745" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12743" href="#bib58" name="bbib58"><span data-dcnode-id="12744" instrument_node="">Khiyami et al., 2014</span></a><span data-dcnode-id="12742" instrument_node="">). The loss due to plant pathogens is not only in terms of decrease in germination, plant length, yield, and productivity but also in terms of long lasting, adverse effects on the health of soil too. Altered soil health creates chronic stress situation for the plant, which further helps pathogen to cause severe plant diseases.</span></p><p data-dcnode-id="12733" id="p0020"><span data-dcnode-id="12740" instrument_node="">The range of plant diseases has augmented globally, while identification of plant pathogen, their control strategies, and cost involved in reducing their disease-causing ability is still limited. It has been speculated that only 3% of the diseases caused by plant pathogens could be managed while the other 97% still being uncontrolled and untraceable (</span><a class="workspace-trigger" data-dcnode-id="12738" href="#bib144" name="bbib144"><span data-dcnode-id="12739" instrument_node="">van Lenteren, 1993</span></a><span data-dcnode-id="12737" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="12735" href="#bib3" name="bbib3"><span data-dcnode-id="12736" instrument_node="">Agrios, 2005</span></a><span data-dcnode-id="12734" instrument_node="">).</span></p><p data-dcnode-id="12731" id="p0025"><span data-dcnode-id="12732" instrument_node="">Detection and diagnosis of plant diseases is an expensive process requiring much effort to obtain safer yield. Hence, under this situation, precise methods and inexpensive techniques for diagnosing these plant pathogens are needed. Numerous efforts have been made to obtain safer crop production under diverse environmental conditions using protective strategies and best management practices; however, no confident results are obtained yet.</span></p><p data-dcnode-id="12632" id="p0030"><span data-dcnode-id="12730" instrument_node="">Detection and diagnosis of bacterial pathogen is of significance in area of agricultural biology as it assists in improving plant health. This includes its diagnosis in greenhouse studies, field study, country borders, natural landscapes, etc. According to a survey, the top 10 bacterial pathogens that disrupt crop yield maximally are </span><span data-dcnode-id="12724"><em data-dcnode-id="12727"><a class="topic-link" data-dcnode-id="12728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/pseudomonas" title="Learn more about Pseudomonas from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12729" instrument_node="">Pseudomonas</span></a></em><em data-dcnode-id="12725"><span data-dcnode-id="12726" instrument_node=""> syringae</span></em></span><span data-dcnode-id="12723" instrument_node="">, </span><span data-dcnode-id="12719"><em data-dcnode-id="12720"><a class="topic-link" data-dcnode-id="12721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/ralstonia-solanacearum" title="Learn more about Ralstonia solanacearum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12722" instrument_node="">Ralstonia solanacearum</span></a></em></span><span data-dcnode-id="12718" instrument_node="">, </span><span data-dcnode-id="12714"><em data-dcnode-id="12715"><a class="topic-link" data-dcnode-id="12716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/agrobacterium-tumefaciens" title="Learn more about Agrobacterium tumefaciens from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12717" instrument_node="">Agrobacterium tumefaciens</span></a></em></span><span data-dcnode-id="12713" instrument_node="">, </span><span data-dcnode-id="12708"><span data-dcnode-id="12709"><a class="topic-link" data-dcnode-id="12711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/xanthomonas" title="Learn more about Xanthomonas from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12712" instrument_node="">Xanthomonas</span></a><span data-dcnode-id="12710" instrument_node=""> oryzae</span></span></span><span data-dcnode-id="12707" instrument_node="">, </span><span data-dcnode-id="12703"><em data-dcnode-id="12704"><a class="topic-link" data-dcnode-id="12705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/xanthomonas-campestris" title="Learn more about Xanthomonas campestris from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12706" instrument_node="">Xanthomonas campestris</span></a></em></span><span data-dcnode-id="12702" instrument_node="">, </span><span data-dcnode-id="12698"><em data-dcnode-id="12699"><a class="topic-link" data-dcnode-id="12700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/xanthomonas-axonopodis" title="Learn more about Xanthomonas axonopodis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12701" instrument_node="">Xanthomonas axonopodis</span></a></em></span><span data-dcnode-id="12697" instrument_node="">, </span><span data-dcnode-id="12692"><span data-dcnode-id="12693"><a class="topic-link" data-dcnode-id="12695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/erwinia" title="Learn more about Erwinia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12696" instrument_node="">Erwinia</span></a><span data-dcnode-id="12694" instrument_node=""> amylovora</span></span></span><span data-dcnode-id="12691" instrument_node="">, </span><span data-dcnode-id="12687"><em data-dcnode-id="12688"><a class="topic-link" data-dcnode-id="12689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/xylella-fastidiosa" title="Learn more about Xylella fastidiosa from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12690" instrument_node="">Xylella fastidiosa</span></a></em></span><span data-dcnode-id="12686" instrument_node="">, </span><em data-dcnode-id="12684"><span data-dcnode-id="12685" instrument_node="">Dickeya</span></em><span data-dcnode-id="12683" instrument_node="">, </span><span data-dcnode-id="12679"><em data-dcnode-id="12680"><a class="topic-link" data-dcnode-id="12681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/pectobacterium-carotovorum" title="Learn more about Pectobacterium carotovorum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12682" instrument_node="">Pectobacterium carotovorum</span></a></em></span><span data-dcnode-id="12678" instrument_node="">, and </span><span data-dcnode-id="12674"><em data-dcnode-id="12675"><a class="topic-link" data-dcnode-id="12676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/pectobacterium-atrosepticum" title="Learn more about Pectobacterium atrosepticum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12677" instrument_node="">Pectobacterium atrosepticum</span></a></em></span><span data-dcnode-id="12673" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="12671" href="#bib79" name="bbib79"><span data-dcnode-id="12672" instrument_node="">Mansfield et al., 2012</span></a><span data-dcnode-id="12670" instrument_node="">). In terms of severity, </span><em data-dcnode-id="12668"><span data-dcnode-id="12669" instrument_node="">P. syringae</span></em><span data-dcnode-id="12667" instrument_node=""> and </span><em data-dcnode-id="12665"><span data-dcnode-id="12666" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="12664" instrument_node=""> rank first and second, respectively, as they cause severe destruction in crop plants including potatoes and bananas. These are followed by </span><em data-dcnode-id="12662"><span data-dcnode-id="12663" instrument_node="">Pseudomonas</span></em><span data-dcnode-id="12661" instrument_node=""> and </span><em data-dcnode-id="12659"><span data-dcnode-id="12660" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="12658" instrument_node=""> that are responsible for causing bacterial leaf spots, bacterial blights, and canker disease in stone and pome fruits. Causal agent for bacterial galls is </span><em data-dcnode-id="12656"><span data-dcnode-id="12657" instrument_node="">A. tumefaciens</span></em><span data-dcnode-id="12655" instrument_node="">, which in turn inhibits plant growth. </span><em data-dcnode-id="12653"><span data-dcnode-id="12654" instrument_node="">Erwinia</span></em><span data-dcnode-id="12652" instrument_node=""> is responsible for causing bacterial soft rot disease, whereas </span><span data-dcnode-id="12648"><em data-dcnode-id="12649"><a class="topic-link" data-dcnode-id="12650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/streptomyces-scabiei" title="Learn more about Streptomyces scabies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12651" instrument_node="">Streptomyces scabies</span></a></em></span><span data-dcnode-id="12647" instrument_node=""> causes localized scabby lesion in potatoes (</span><a class="workspace-trigger" data-dcnode-id="12645" href="#bib3" name="bbib3"><span data-dcnode-id="12646" instrument_node="">Agrios, 2005</span></a><span data-dcnode-id="12644" instrument_node="">). Apart from them, </span><span data-dcnode-id="12640"><em data-dcnode-id="12641"><a class="topic-link" data-dcnode-id="12642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/monilinia-fructicola" title="Learn more about Monilinia fructicola from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12643" instrument_node="">Monilinia fructicola</span></a></em></span><span data-dcnode-id="12639" instrument_node="">, </span><em data-dcnode-id="12637"><span data-dcnode-id="12638" instrument_node="">Xanthomonas arboricola</span></em><span data-dcnode-id="12636" instrument_node="">, and </span><em data-dcnode-id="12634"><span data-dcnode-id="12635" instrument_node="">E. amylovora</span></em><span data-dcnode-id="12633" instrument_node=""> cause serious threats in plant in the form of brown rot, bacterial spot, and fire blight diseases, respectively. Though, bacterial pathogens cause innumerable disease, the active procedures needed for their complete diagnosis is still in its naïve state. Hence, there is an urgent need to develop and explore certain novel and innovative techniques for early diagnosis of these bacterial pathogens to restrict the losses incurred.</span></p><p data-dcnode-id="12619" id="p0035"><span data-dcnode-id="12631" instrument_node="">There are several recent reviews that have focused on diagnosis of fungal and viral plant pathogens (</span><a class="workspace-trigger" data-dcnode-id="12629" href="#bib20" name="bbib20"><span data-dcnode-id="12630" instrument_node="">Chatterjee and Ghosh, 2015</span></a><span data-dcnode-id="12628" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12626" href="#bib9" name="bbib9"><span data-dcnode-id="12627" instrument_node="">Awasthi, 2015</span></a><span data-dcnode-id="12625" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12623" href="#bib125" name="bbib125"><span data-dcnode-id="12624" instrument_node="">Thokala et al., 2015</span></a><span data-dcnode-id="12622" instrument_node="">) but diagnosis of bacterial plant pathogens still remains at its juvenile stage. Hence, the chapter attempts to focus on detection and diagnosis of certain bacterial plant pathogens, starting from </span><span data-dcnode-id="12621" id="p482"></span><span data-dcnode-id="12620" instrument_node="">traditional microbiological techniques to the present molecular microbiology tools. Apart from this, focus will also be directed toward the application of futuristic nanodiagnostic tools and user-friendly handy devices for on-spot diagnosis of bacterial pathogens so that new strategies for disease management could be designed and implemented.</span></p></section><section data-dcnode-id="10393" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="12614" id="st0030"><span data-dcnode-id="12617" instrument_node="">27.2</span><span data-dcnode-id="12616" instrument_node="">. </span><span data-dcnode-id="12615" instrument_node="">Detection and Diagnosis of Bacterial Pathogens</span></h2><p data-dcnode-id="12602" id="p0040"><span data-dcnode-id="12613" instrument_node="">Understanding these two “Ds,” “detection” and “diagnosis,” is both an art and a long lasting story. Generally, “detection” means establishing the presence of desired microorganism in the environmental sample, i.e., soil, water, plant surface, etc. On the other hand, “diagnosis” means identifying the nature of problem and cause of problem responsible for disease occurrence (</span><a class="workspace-trigger" data-dcnode-id="12611" href="#bib74" name="bbib74"><span data-dcnode-id="12612" instrument_node="">Louws et al., 1999</span></a><span data-dcnode-id="12606"><span data-dcnode-id="12610" instrument_node="">). So, detection and diagnosis of an unknown, disease-causing organism is commonly done by designating it to a known taxonomic cluster on the basis of its characters. Irrespective of the trait chosen, pathogen diagnosis requires considerable amount of specificity, sensitivity, and rapidness. While specificity here refers to accurate detection of target microorganism without false positives, sensitivity signifies detecting even very low number of bacterial pathogen in the sample. To attain both the Ds, molecular techniques seem to be the ideal choice. Though culture independent analysis is expansively growing nowadays for </span><a class="topic-link" data-dcnode-id="12608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microorganism-detection" title="Learn more about pathogen detection from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12609" instrument_node="">pathogen detection</span></a><span data-dcnode-id="12607" instrument_node="">, till date they have not entirely replaced the usual culture-dependent methodologies for diagnosis. Information obtained from culture-dependent methods is used as complementary data for further molecular analysis. Hence, European Union and European and Mediterranean Plant Protection Organization suggest the use of complete integrated approaches like microbiological, immunological, molecular, and nanodiagnostic techniques for phytobacterial pathogen identification (</span></span><a class="workspace-trigger" data-dcnode-id="12604" href="#bib71" name="bbib71"><span data-dcnode-id="12605" instrument_node="">López et al., 2003</span></a><span data-dcnode-id="12603" instrument_node="">).</span></p><section data-dcnode-id="12494" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="12598" id="st0035"><span data-dcnode-id="12601" instrument_node="">27.2.1</span><span data-dcnode-id="12600" instrument_node="">. </span><span data-dcnode-id="12599" instrument_node="">Conventional Microbiological Approaches</span></h3><p data-dcnode-id="12520" id="p0045"><span data-dcnode-id="12597" instrument_node="">Conventional microbiological approaches generally used for recognizing phytobacteria are descriptive, as they commonly rely on the illumination of visual signs and symptoms. After keenly analyzing the symptoms, the infected region of plant is scraped and the scrapping is spotted or swabbed on selective medium for growth and cultivation of desired bacterial pathogen (</span><a class="workspace-trigger" data-dcnode-id="12595" href="#bib54" name="bbib54"><span data-dcnode-id="12596" instrument_node="">Jain et al., 2015</span></a><span data-dcnode-id="12594" instrument_node="">). Different microbiological techniques have been extensively used for culturing, isolating, and recognizing bacterial pathogens; however, precision and consistency of these techniques largely depend on the ability, knowledge, and expertise of the worker. Investigation of diseased plant portion with the help of microscopy is very useful in establishing nature and extent of bacterial diseases. The infected portion is cut with the help of sterile blade or knife, mounted with water drop. Clouds of bacteria flowing on the mounted cells can be seen very easily under the microscope. </span><a class="workspace-trigger" data-dcnode-id="12592" href="#bib124" name="bbib124"><span data-dcnode-id="12593" instrument_node="">Thind (2015)</span></a><span data-dcnode-id="12583"><span data-dcnode-id="12587"><span data-dcnode-id="12591" instrument_node=""> reported the presence of bacterial streaming in nearly all the bacterial diseases except in the case of crown gall. Vascular diseases like wilt of solanaceous plants and bacterial blight of rice show high discharge of bacteria. Phase contrast microscopy is found more appropriate for analyzing this bacterial ooze, as it can easily distinguish between starch and latex particles with that of </span><a class="topic-link" data-dcnode-id="12589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/bacterial-cell" title="Learn more about bacterial cells from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12590" instrument_node="">bacterial cells</span></a><span data-dcnode-id="12588" instrument_node="">. Such an assay can also be done by cutting the infected portion of paddy and </span></span><a class="topic-link" data-dcnode-id="12585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/solanum" title="Learn more about solanum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12586" instrument_node="">solanum</span></a><span data-dcnode-id="12584" instrument_node=""> plant (responsible for causing bacterial blight of rice and bacterial wilt of solanaceous plants, respectively) and placing it in a tumbler of clean water. Filaments of bacteria oozing out from cut ends can easily be observed. Disease caused by </span></span><em data-dcnode-id="12581"><span data-dcnode-id="12582" instrument_node="">X. fastidiosa</span></em><span data-dcnode-id="12580" instrument_node="">, </span><span data-dcnode-id="12576"><em data-dcnode-id="12577"><a class="topic-link" data-dcnode-id="12578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/spiroplasma" title="Learn more about Spiroplasmas from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12579" instrument_node="">Spiroplasmas</span></a></em></span><span data-dcnode-id="12575" instrument_node=""> and </span><span data-dcnode-id="12571"><em data-dcnode-id="12572"><a class="topic-link" data-dcnode-id="12573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/phytoplasma" title="Learn more about Phytoplasmas from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12574" instrument_node="">Phytoplasmas</span></a></em></span><span data-dcnode-id="12566"><span data-dcnode-id="12570" instrument_node=""> in vascular bundles, could be studied by observing thin sections of the infected tissues under </span><a class="topic-link" data-dcnode-id="12568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/electron-microscopy" title="Learn more about electron microscopy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12569" instrument_node="">electron microscopy</span></a><span data-dcnode-id="12567" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="12564" href="#bib124" name="bbib124"><span data-dcnode-id="12565" instrument_node="">Thind, 2015</span></a><span data-dcnode-id="12559"><span data-dcnode-id="12563" instrument_node="">). Once the phytobacterial pathogens are diagnosed directly from the infected tissues, it is necessary to validate the diagnosis of a disease according to the Koch’s postulates. To fulfill the norms of Koch’s postulates, the causative bacterium is isolated on suitable medium. After isolation, the bacterium is purified and inoculated in the health host, so that it can produce typical symptoms, similar to the one established in nature. Same bacterium should be reisolated from the inoculated plants, and the reisolated one should be a perfect match with the inoculated one. Final validation of bacterial pathogen is done by proving its </span><a class="topic-link" data-dcnode-id="12561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/pathogenicity" title="Learn more about pathogenicity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12562" instrument_node="">pathogenicity</span></a><span data-dcnode-id="12560" instrument_node="">, although this is time-consuming, besides requiring host, and optimum conditions for pathogen growth and disease development. In some cases, time required by bacterial pathogens to show the symptoms is very long, e.g., </span></span><em data-dcnode-id="12557"><span data-dcnode-id="12558" instrument_node="">Clavibacterium michiganense</span></em><span data-dcnode-id="12556" instrument_node=""> requires about 21–28 days to show apparent symptoms, while leaf spotting pathogens just need 3–4 days for producing perceptible symptoms under optimum conditions (</span><a class="workspace-trigger" data-dcnode-id="12554" href="#bib9" name="bbib9"><span data-dcnode-id="12555" instrument_node="">Awasthi, 2015</span></a><span data-dcnode-id="12549"><span data-dcnode-id="12553" instrument_node="">). Generally, nonselective, general media are used for isolating bacterial pathogens. Differential medium supplemented with 0.001% tetrazolium chloride is also useful for differentiating </span><a class="topic-link" data-dcnode-id="12551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/saprotroph" title="Learn more about saprophytes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12552" instrument_node="">saprophytes</span></a><span data-dcnode-id="12550" instrument_node=""> from potent bacterial pathogens during the initial isolation. There are reports which prove that semiselective medium is better than universal medium for isolating and enumerating phytobacteria. Researchers have improved the plating efficiency of </span></span><em data-dcnode-id="12547"><span data-dcnode-id="12548" instrument_node="">C. michiganense</span></em><span data-dcnode-id="12546" instrument_node=""> (obtained from tomato root) by designing a semiselective medium (</span><a class="workspace-trigger" data-dcnode-id="12544" href="#bib34" name="bbib34"><span data-dcnode-id="12545" instrument_node="">Fatmi et al., 1991</span></a><span data-dcnode-id="12539"><span data-dcnode-id="12543" instrument_node="">). The medium apart from nutrients contained antibiotics like </span><a class="topic-link" data-dcnode-id="12541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/cycloheximide" title="Learn more about cycloheximide from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12542" instrument_node="">cycloheximide</span></a><span data-dcnode-id="12540" instrument_node="">, nalidixic acid, potassium tellurite, which inhibited growth </span></span><span data-dcnode-id="12538" id="p483"></span><span data-dcnode-id="12537" instrument_node="">of other bacteria and fungi. Similarly, </span><a class="workspace-trigger" data-dcnode-id="12535" href="#bib43" name="bbib43"><span data-dcnode-id="12536" instrument_node="">Gitaitis et al. (1997)</span></a><span data-dcnode-id="12534" instrument_node=""> accounted a semiselective medium for enumerating colonies of </span><span data-dcnode-id="12528"><em data-dcnode-id="12531"><a class="topic-link" data-dcnode-id="12532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/pseudomonas" title="Learn more about Pseudomonas from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12533" instrument_node="">Pseudomonas</span></a></em><em data-dcnode-id="12529"><span data-dcnode-id="12530" instrument_node=""> viridiflava</span></em></span><span data-dcnode-id="12527" instrument_node=""> that was responsible for causing bacterial rot disease and bacterial streak disease in onion. Such semiselective medium is more useful for isolations from soil than from plant parts, because plant tissues are surface sterilized before isolation. </span><em data-dcnode-id="12525"><span data-dcnode-id="12526" instrument_node="">Phytoplasmas</span></em><span data-dcnode-id="12524" instrument_node=""> is responsible for causing papaya bunchy top disease and this pathogen is difficult to grow on synthetic medium; so its presence in the host plants has been confirmed by electron microscopy (</span><a class="workspace-trigger" data-dcnode-id="12522" href="#bib24" name="bbib24"><span data-dcnode-id="12523" instrument_node="">Davis et al., 1996</span></a><span data-dcnode-id="12521" instrument_node="">).</span></p><p data-dcnode-id="12507" id="p0050"><span data-dcnode-id="12515"><span data-dcnode-id="12519" instrument_node="">The diagnosis of known pathogens is somehow easy, but detection and diagnosis of an unknown or novel disease-causing agent is undeniably more difficult, as it requires more proficiency and skillfulness. Hence, in such cases, more focus must be laid on the pattern of disease shown by the pathogen in association with host plant. In spite of devoting huge amount of time on various genotypic or phenotypic tests, some elementary facts about the pathogen should be gained so that it could be decided which tests are to be performed for further pathogen identification. Elementary test includes Gram-staining reaction, presence or absence of </span><a class="topic-link" data-dcnode-id="12517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/bacterial-spore" title="Learn more about spores from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12518" instrument_node="">spores</span></a><span data-dcnode-id="12516" instrument_node="">, flagella, capsule, and fermentative versus </span></span><a class="topic-link" data-dcnode-id="12513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/aerobic-metabolism" title="Learn more about oxidative metabolism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12514" instrument_node="">oxidative metabolism</span></a><span data-dcnode-id="12508"><span data-dcnode-id="12512" instrument_node="">. For further characterization relatively inexpensive test like metabolic test with analytical profile index strips, metabolic substrate analysis test with Microlog, Biolog and analysis of </span><a class="topic-link" data-dcnode-id="12510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/fatty-acid-methyl-ester" title="Learn more about fatty acid methyl ester from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12511" instrument_node="">fatty acid methyl ester</span></a><span data-dcnode-id="12509" instrument_node=""> can be done in laboratories. These tests are conducted with extreme precision, and care must be taken in understanding and analyzing the results, especially when identification is done for an unknown disease-causing bacterial pathogens.</span></span></p><p data-dcnode-id="12495" id="p0055"><span data-dcnode-id="12502"><span data-dcnode-id="12506" instrument_node="">Identification of novel phytobacteria can be done by adopting polyphasic approaches. It means applying morphological, physiological, hypersensitive, biochemical, and pathogenicity tests to determine the genus of the bacteria. Further validation of these results can be done on the basis of genotypic methods like 16S </span><a class="topic-link" data-dcnode-id="12504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/rna-gene" title="Learn more about rRNA gene from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12505" instrument_node="">rRNA gene</span></a><span data-dcnode-id="12503" instrument_node=""> sequence data analysis (</span></span><a class="workspace-trigger" data-dcnode-id="12500" href="#bib51" name="bbib51"><span data-dcnode-id="12501" instrument_node="">Hu et al., 2001</span></a><span data-dcnode-id="12499" instrument_node="">). Diagnosis of plant pathogen with the bacteriological tools and techniques is usually time-taking and can be unrealistic when speedy results are needed (</span><a class="workspace-trigger" data-dcnode-id="12497" href="#bib95" name="bbib95"><span data-dcnode-id="12498" instrument_node="">Pandey et al., 2015</span></a><span data-dcnode-id="12496" instrument_node="">). Apart from this, working with bacterial pathogen is more difficult when optimized growth conditions for the organism are unknown. All these factors may sometimes create complications and result in slow bacterial growth, in turn delaying the identification procedure. In fact, these microbiological techniques are apparently unsuitable if the researcher is working with large number of samples on a tight schedule. In order to funnel down all these problems, an array of molecular biology approaches are being pursued, so that more accurate and quick detection of the phytobacterial pathogens is possible within a couple of days.</span></p></section><section data-dcnode-id="11027" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="12490" id="st0040"><span data-dcnode-id="12493" instrument_node="">27.2.2</span><span data-dcnode-id="12492" instrument_node="">. </span><span data-dcnode-id="12491" instrument_node="">Molecular Approaches</span></h3><div data-dcnode-id="11672"><p data-dcnode-id="12371" id="p0060"><span data-dcnode-id="12482"><a class="topic-link" data-dcnode-id="12488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/polymerase-chain-reaction" title="Learn more about Polymerase chain reaction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12489" instrument_node="">Polymerase chain reaction</span></a><span data-dcnode-id="12483"><span data-dcnode-id="12487" instrument_node=""> (PCR) and real-time PCR have revolutionized the popularity of molecular diagnostics techniques. Modern PCR-based methods are more advantageous for detecting bacterial pathogens without the need for prior information on growth requirements of the pathogen as traditional diagnostic techniques do. Hence, there is a shift toward DNA-based approaches for pathogen diagnosis as they are more reliable, sensitive, and rapid. 16S rRNA gene sequence is particularly conserved and is present in all </span><a class="topic-link" data-dcnode-id="12485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/prokaryote" title="Learn more about prokaryotes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12486" instrument_node="">prokaryotes</span></a><span data-dcnode-id="12484" instrument_node="">. The 16S rRNA gene even has some variable regions that have been successfully used for distinguishing genera and species, making it the marker of choice. Precise identification of genus and species is very important in understanding the epidemiology of diseases (</span></span></span><a class="workspace-trigger" data-dcnode-id="12480" href="#bib122" name="bbib122"><span data-dcnode-id="12481" instrument_node="">Srinivasa et al., 2012</span></a><span data-dcnode-id="12479" instrument_node="">), for example, </span><em data-dcnode-id="12477"><span data-dcnode-id="12478" instrument_node="">X. oryzae</span></em><span data-dcnode-id="12476" instrument_node=""> pv. </span><em data-dcnode-id="12474"><span data-dcnode-id="12475" instrument_node="">oryzae</span></em><span data-dcnode-id="12473" instrument_node=""> causes bacterial blight in rice, whereas </span><em data-dcnode-id="12471"><span data-dcnode-id="12472" instrument_node="">X. axonopodis</span></em><span data-dcnode-id="12470" instrument_node=""> pv. </span><em data-dcnode-id="12468"><span data-dcnode-id="12469" instrument_node="">vesicatoria</span></em><span data-dcnode-id="12467" instrument_node=""> causes bacterial spot of tomato. </span><a class="workspace-trigger" data-dcnode-id="12465" href="#bib92" name="bbib92"><span data-dcnode-id="12466" instrument_node="">Palacio-Bielsa et al. (2009)</span></a><span data-dcnode-id="12456"><span data-dcnode-id="12460"><span data-dcnode-id="12464" instrument_node=""> published an updated compilation of PCR protocols that are very well used for diagnosing phytobacteria in laboratories. This compilation addresses detection of 23 bacterial genus including 50 species, 10 </span><a class="topic-link" data-dcnode-id="12462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/subspecies" title="Learn more about subspecies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12463" instrument_node="">subspecies</span></a><span data-dcnode-id="12461" instrument_node=""> supplementing 40 </span></span><a class="topic-link" data-dcnode-id="12458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/pathotype" title="Learn more about pathovars from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12459" instrument_node="">pathovars</span></a><span data-dcnode-id="12457" instrument_node="">. Nowadays, PCR is considered as a regular procedure for detection at various levels, viz., particular gene, genus, species, strain, etc. Quantitative estimation of pathovars is done with the help of quantitative PCR or real-time PCR (</span></span><a class="workspace-trigger" data-dcnode-id="12454" href="#bib87" name="bbib87"><span data-dcnode-id="12455" instrument_node="">Mullis and Faloona, 1987</span></a><span data-dcnode-id="12453" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12451" href="#bib50" name="bbib50"><span data-dcnode-id="12452" instrument_node="">Holland et al., 1991</span></a><span data-dcnode-id="12450" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="12448" href="#bib92" name="bbib92"><span data-dcnode-id="12449" instrument_node="">Palacio-Bielsa et al. (2009)</span></a><span data-dcnode-id="12447" instrument_node=""> described several primer pairs for diagnosing </span><span data-dcnode-id="12443"><em data-dcnode-id="12444"><a class="topic-link" data-dcnode-id="12445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/xanthomonas" title="Learn more about Xanthomonas from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12446" instrument_node="">Xanthomonas</span></a></em></span><span data-dcnode-id="12442" instrument_node="">, </span><em data-dcnode-id="12440"><span data-dcnode-id="12441" instrument_node="">Pseudomonas</span></em><span data-dcnode-id="12439" instrument_node="">, </span><span data-dcnode-id="12435"><em data-dcnode-id="12436"><a class="topic-link" data-dcnode-id="12437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/ralstonia" title="Learn more about Ralstonia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12438" instrument_node="">Ralstonia</span></a></em></span><span data-dcnode-id="12434" instrument_node="">, </span><span data-dcnode-id="12430"><em data-dcnode-id="12431"><a class="topic-link" data-dcnode-id="12432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/clavibacter" title="Learn more about Clavibacter from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12433" instrument_node="">Clavibacter</span></a></em></span><span data-dcnode-id="12429" instrument_node="">, </span><span data-dcnode-id="12425"><em data-dcnode-id="12426"><a class="topic-link" data-dcnode-id="12427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scien 47" instrument_node="">X. hortorum</span></em><span data-dcnode-id="11745" instrument_node=""> pv. </span><em data-dcnode-id="11743"><span data-dcnode-id="11744" instrument_node="">pelargonii</span></em></td><td data-dcnode-id="11740"><span data-dcnode-id="11741" instrument_node="">Bacterial blight of geranium</span></td><td data-dcnode-id="11738"><span data-dcnode-id="11739" instrument_node="">RAPD fragment</span></td><td data-dcnode-id="11736"><span data-dcnode-id="11737" instrument_node="">Conventional PCR</span></td><td data-dcnode-id="11733"><a class="workspace-trigger" data-dcnode-id="11734" href="#bib80" name="bbib80"><span data-dcnode-id="11735" instrument_node="">Manulis et al. (1994)</span></a></td></tr><tr data-dcnode-id="11719"><td data-dcnode-id="11729"><em data-dcnode-id="11730"><span data-dcnode-id="11731" instrument_node="">X. oryzae pathovars oryzae</span></em></td><td data-dcnode-id="11727"><span data-dcnode-id="11728" instrument_node="">Bacterial blight of rice</span></td><td data-dcnode-id="11725"><span data-dcnode-id="11726" instrument_node="">16S–23S rRNA spacer region</span></td><td data-dcnode-id="11723"><span data-dcnode-id="11724" instrument_node="">Conventional PCR</span></td><td data-dcnode-id="11720"><a class="workspace-trigger" data-dcnode-id="11721" href="#bib1" name="bbib1"><span data-dcnode-id="11722" instrument_node="">Adachi and Oku (2000)</span></a></td></tr><tr data-dcnode-id="11706"><td data-dcnode-id="11716"><em data-dcnode-id="11717"><span data-dcnode-id="11718" instrument_node="">Xylella fastidiosa</span></em></td><td data-dcnode-id="11714"><span data-dcnode-id="11715" instrument_node="">Citrus variegated chlorosis</span></td><td data-dcnode-id="11712"><span data-dcnode-id="11713" instrument_node="">RAPD fragment</span></td><td data-dcnode-id="11710"><span data-dcnode-id="11711" instrument_node="">Conventional PCR</span></td><td data-dcnode-id="11707"><a class="workspace-trigger" data-dcnode-id="11708" href="#bib98" name="bbib98"><span data-dcnode-id="11709" instrument_node="">Pooler and Hartung (1995)</span></a></td></tr><tr data-dcnode-id="11693"><td data-dcnode-id="11703" rowspan="2"><em data-dcnode-id="11704"><span data-dcnode-id="11705" instrument_node="">Xylophilus ampelinus</span></em></td><td data-dcnode-id="11701" rowspan="2"><span data-dcnode-id="11702" instrument_node="">Bacterial necrosis of grapevine</span></td><td data-dcnode-id="11699" rowspan="2"><span data-dcnode-id="11700" instrument_node="">ITS region</span></td><td data-dcnode-id="11697"><span data-dcnode-id="11698" instrument_node="">Conventional PCR</span></td><td data-dcnode-id="11694"><a class="workspace-trigger" data-dcnode-id="11695" href="#bib78" name="bbib78"><span data-dcnode-id="11696" instrument_node="">Manceau et al. (2000)</span></a></td></tr><tr data-dcnode-id="11687"><td data-dcnode-id="11691"><span data-dcnode-id="11692" instrument_node="">PCR–ELISA</span></td><td data-dcnode-id="11688"><a class="workspace-trigger" data-dcnode-id="11689" href="#bib45" name="bbib45"><span data-dcnode-id="11690" instrument_node="">Grall et al. (2005)</span></a></td></tr></tbody></table></div><p class="legend" data-dcnode-id="11674"></p><p data-dcnode-id="11675" id="sp0015"><em data-dcnode-id="11682"><span data-dcnode-id="11683" instrument_node="">PCR</span></em><span data-dcnode-id="11681" instrument_node="">, polymerase chain reaction; </span><span data-dcnode-id="11677"><em data-dcnode-id="11678"><a class="topic-link" data-dcnode-id="11679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/rapd" title="Learn more about RAPD from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11680" instrument_node="">RAPD</span></a></em></span><span data-dcnode-id="11676" instrument_node="">, random amplification of polymorphic DNA.</span></p><p></p></div></div><p data-dcnode-id="11656" id="p0065"><span data-dcnode-id="11671" instrument_node="">For identifying desired phytobacteria using PCR-based approaches, first step is the selection of specific primers. There are three main origins from which primers are constructed: (1) virulent/pathogenicity genes, (2) plasmid genes, and (3) ribosomal genes (</span><a class="workspace-trigger" data-dcnode-id="11669" href="#bib71" name="bbib71"><span data-dcnode-id="11670" instrument_node="">López et al., 2003</span></a><span data-dcnode-id="11660"><span data-dcnode-id="11664"><span data-dcnode-id="11668" instrument_node="">). In PCR-based methods for pathogen detection, DNA from diseased bacteria is extracted and amplified using specific primers. The presence of desirable fragment in </span><a class="topic-link" data-dcnode-id="11666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/agarose-gel-electrophoresis" title="Learn more about agarose gel electrophoresis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11667" instrument_node="">agarose gel electrophoresis</span></a><span data-dcnode-id="11665" instrument_node=""> assures the existence of targeted bacteria. On the basis of selected primers, detection of phytobacteria could be done from narrow to broad spectrum, i.e., detection of specific strain, species, or genera responsible for causing disease. Designing of primers require thorough knowledge of </span></span><a class="topic-link" data-dcnode-id="11662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/dna-sequence" title="Learn more about DNA sequence from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11663" instrument_node="">DNA sequence</span></a><span data-dcnode-id="11661" instrument_node="">, i.e., known virulence or pathogenic genes so that primer pair can easily identify desired phytobacteria or desired marker.</span></span><span data-dcnode-id="11659" id="p484"></span><span data-dcnode-id="11658" id="p485"></span><span data-dcnode-id="11657" id="p486"></span></p><p data-dcnode-id="11568" id="p0070"><span data-dcnode-id="11655" instrument_node="">Certain phytobacteria have specific virulent genes, e.g., pectolytic species of the genus </span><em data-dcnode-id="11653"><span data-dcnode-id="11654" instrument_node="">Pectobacterium</span></em><span data-dcnode-id="11652" instrument_node=""> have pathogenicity related genes, viz., </span><em data-dcnode-id="11650"><span data-dcnode-id="11651" instrument_node="">pel</span></em><span data-dcnode-id="11649" instrument_node=""> genes that cause soft rot disease (Darrase et al., 1994; </span><a class="workspace-trigger" data-dcnode-id="11647" href="#bib74" name="bbib74"><span data-dcnode-id="11648" instrument_node="">Louws et al., 1999</span></a><span data-dcnode-id="11646" instrument_node="">). Likewise, there are certain groups of genes including like </span><em data-dcnode-id="11644"><span data-dcnode-id="11645" instrument_node="">hrp</span></em><span data-dcnode-id="11643" instrument_node=""> genes, </span><em data-dcnode-id="11641"><span data-dcnode-id="11642" instrument_node="">pth</span></em><span data-dcnode-id="11640" instrument_node=""> genes, and </span><em data-dcnode-id="11638"><span data-dcnode-id="11639" instrument_node="">vir</span></em><span data-dcnode-id="11637" instrument_node=""> genes involved in the pathogenicity of other bacterial families. Phaseolotoxin </span><em data-dcnode-id="11635"><span data-dcnode-id="11636" instrument_node="">tox</span></em><span data-dcnode-id="11634" instrument_node=""> genes are excellent for targeting </span><span data-dcnode-id="11630"><em data-dcnode-id="11631"><a class="topic-link" data-dcnode-id="11632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/pseudomonas-syringae-pv-savastanoi" title="Learn more about Pseudomonas savastanoi from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11633" instrument_node="">Pseudomonas savastanoi</span></a></em></span><span data-dcnode-id="11629" instrument_node=""> pv. </span><em data-dcnode-id="11627"><span data-dcnode-id="11628" instrument_node="">phaseolicola</span></em><span data-dcnode-id="11626" instrument_node=""> that causes halo blight of beans (</span><a class="workspace-trigger" data-dcnode-id="11624" href="#bib8" name="bbib8"><span data-dcnode-id="11625" instrument_node="">Audy et al., 1996</span></a><span data-dcnode-id="11623" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11621" href="#bib111" name="bbib111"><span data-dcnode-id="11622" instrument_node="">Sawada et al., 1997</span></a><span data-dcnode-id="11620" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11618" href="#bib116" name="bbib116"><span data-dcnode-id="11619" instrument_node="">Schaad et al., 2007</span></a><span data-dcnode-id="11617" instrument_node="">). Similarly, virulent gene </span><em data-dcnode-id="11615"><span data-dcnode-id="11616" instrument_node="">nec1</span></em><span data-dcnode-id="11614" instrument_node=""> has been used for targeting pathogenic </span><em data-dcnode-id="11612"><span data-dcnode-id="11613" instrument_node="">Streptomyces</span></em><span data-dcnode-id="11611" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="11609" href="#bib16" name="bbib16"><span data-dcnode-id="11610" instrument_node="">Burkhalid et al., 1998</span></a><span data-dcnode-id="11608" instrument_node="">). Reports suggest that these genes (</span><em data-dcnode-id="11606"><span data-dcnode-id="11607" instrument_node="">tox</span></em><span data-dcnode-id="11605" instrument_node=""> and </span><em data-dcnode-id="11603"><span data-dcnode-id="11604" instrument_node="">nec1</span></em><span data-dcnode-id="11602" instrument_node="">) seem to play a supplementary role in virulence. However, they are lacking from some pathogenic strains of </span><em data-dcnode-id="11600"><span data-dcnode-id="11601" instrument_node="">Pseudomonas</span></em><span data-dcnode-id="11599" instrument_node=""> and </span><em data-dcnode-id="11597"><span data-dcnode-id="11598" instrument_node="">Streptomyces</span></em><span data-dcnode-id="11596" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="11594" href="#bib106" name="bbib106"><span data-dcnode-id="11595" instrument_node="">Rico et al., 2003</span></a><span data-dcnode-id="11593" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11591" href="#bib134" name="bbib134"><span data-dcnode-id="11592" instrument_node="">Wanner, 2006</span></a><span data-dcnode-id="11590" instrument_node="">). Primers have also been constructed for synthesis of exopolysaccharide </span><span class="small-caps" data-dcnode-id="11588"><span data-dcnode-id="11589" instrument_node="">d</span></span><span data-dcnode-id="11587" instrument_node="">-galacturonoside (</span><em data-dcnode-id="11585"><span data-dcnode-id="11586" instrument_node="">pehB</span></em><span data-dcnode-id="11584" instrument_node="">) gene and endocellulase (</span><em data-dcnode-id="11582"><span data-dcnode-id="11583" instrument_node="">celA</span></em><span data-dcnode-id="11581" instrument_node="">) gene of </span><em data-dcnode-id="11579"><span data-dcnode-id="11580" instrument_node="">R. solanacearum</span></em><span data-dcnode-id="11578" instrument_node=""> and </span><em data-dcnode-id="11576"><span data-dcnode-id="11577" instrument_node="">C. michiganensis</span></em><span data-dcnode-id="11575" instrument_node="">, respectively, that are accountable for pathogenicity (</span><a class="workspace-trigger" data-dcnode-id="11573" href="#bib27" name="bbib27"><span data-dcnode-id="11574" instrument_node="">Dreier et al., 1995</span></a><span data-dcnode-id="11572" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11570" href="#bib44" name="bbib44"><span data-dcnode-id="11571" instrument_node="">Glick et al., 2002</span></a><span data-dcnode-id="11569" instrument_node="">).</span></p><p data-dcnode-id="11535" id="p0075"><span data-dcnode-id="11563"><span data-dcnode-id="11567" instrument_node="">Designing of primers could also be done on the basis of plasmid sequences. </span><a class="topic-link" data-dcnode-id="11565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/ti-plasmid-plant" title="Learn more about Ti plasmid from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11566" instrument_node="">Ti plasmid</span></a><span data-dcnode-id="11564" instrument_node=""> of </span></span><em data-dcnode-id="11561"><span data-dcnode-id="11562" instrument_node="">Agrobacterium</span></em><span data-dcnode-id="11560" instrument_node=""> is a good example (</span><a class="workspace-trigger" data-dcnode-id="11558" href="#bib26" name="bbib26"><span data-dcnode-id="11559" instrument_node="">Dong et al., 1992</span></a><span data-dcnode-id="11557" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11555" href="#bib48" name="bbib48"><span data-dcnode-id="11556" instrument_node="">Hartung et al., 1996</span></a><span data-dcnode-id="11554" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11552" href="#bib36" name="bbib36"><span data-dcnode-id="11553" instrument_node="">Firrao and Locci, 1994</span></a><span data-dcnode-id="11551" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11549" href="#bib110" name="bbib110"><span data-dcnode-id="11550" instrument_node="">Sawada et al., 1995</span></a><span data-dcnode-id="11548" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11546" href="#bib130" name="bbib130"><span data-dcnode-id="11547" instrument_node="">Verdier et al., 1998</span></a><span data-dcnode-id="11545" instrument_node="">). The stability of plasmid should be systematically assessed to avoid deceitful results. </span><a class="workspace-trigger" data-dcnode-id="11543" href="#bib30" name="bbib30"><span data-dcnode-id="11544" instrument_node="">Eastwell et al. (1995)</span></a><span data-dcnode-id="11542" instrument_node=""> suggested that stability of plasmid genes depends on the pathogenicity traits. However, sometimes it has been observed that primers targeting universal plasmids fail to detect virulent strains like pEA29 plasmid of </span><em data-dcnode-id="11540"><span data-dcnode-id="11541" instrument_node="">E. amylovora</span></em><span data-dcnode-id="11539" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="11537" href="#bib70" name="bbib70"><span data-dcnode-id="11538" instrument_node="">Llop et al., 2006</span></a><span data-dcnode-id="11536" instrument_node="">).</span></p><p data-dcnode-id="11442" id="p0080"><span data-dcnode-id="11534" instrument_node="">Phytobacteria, including </span><em data-dcnode-id="11532"><span data-dcnode-id="11533" instrument_node="">Pseudomonas</span></em><span data-dcnode-id="11531" instrument_node="">, </span><em data-dcnode-id="11529"><span data-dcnode-id="11530" instrument_node="">Erwinia</span></em><span data-dcnode-id="11528" instrument_node="">, and </span><em data-dcnode-id="11526"><span data-dcnode-id="11527" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11525" instrument_node="">, associated with rice seed have been identified on the basis of internal transcribed sequences-PCR (ITS-PCR) products obtained from universal primers for 16S and 23S rRNA genes. The main approach of such experiments is to initially target the ITS region of bacterial pathogen using universal bacterial primers and then choosing similar strains, followed by designing specific primers (</span><a class="workspace-trigger" data-dcnode-id="11523" href="#bib69" name="bbib69"><span data-dcnode-id="11524" instrument_node="">Li and De Boer, 1995</span></a><span data-dcnode-id="11522" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11520" href="#bib94" name="bbib94"><span data-dcnode-id="11521" instrument_node="">Pan et al., 1998</span></a><span data-dcnode-id="11519" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="11517" href="#bib69" name="bbib69"><span data-dcnode-id="11518" instrument_node="">Li and De Boer (1995)</span></a><span data-dcnode-id="11516" instrument_node=""> observed that ITS region of </span><em data-dcnode-id="11514"><span data-dcnode-id="11515" instrument_node="">Clavibacter</span></em><span data-dcnode-id="11513" instrument_node=""> species is more variable than either of the two. So, primer pair was designed and PCR protocol was developed such as to amplify 215</span><span data-dcnode-id="11512" instrument_node="">&nbsp;</span><span data-dcnode-id="11511" instrument_node="">bp ITS fragment for identifying </span><em data-dcnode-id="11509"><span data-dcnode-id="11510" instrument_node="">Clavibacter</span></em><span data-dcnode-id="11508" instrument_node=""> species (</span><a class="workspace-trigger" data-dcnode-id="11506" href="#bib69" name="bbib69"><span data-dcnode-id="11507" instrument_node="">Li and De Boer, 1995</span></a><span data-dcnode-id="11505" instrument_node="">). Leaf streak pathogen in seed could be spotted by designing primers on the basis of 16S–23S spacer region of </span><em data-dcnode-id="11503"><span data-dcnode-id="11504" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11502" instrument_node="">. Primer pair targeted the ITS sequence amplifying a 139-bp fragment in </span><em data-dcnode-id="11500"><span data-dcnode-id="11501" instrument_node="">Xanthomonas translucens</span></em><span data-dcnode-id="11499" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="11497" href="#bib76" name="bbib76"><span data-dcnode-id="11498" instrument_node="">Maes et al., 1996</span></a><span data-dcnode-id="11496" instrument_node="">). Similar experiment was conducted to detect </span><em data-dcnode-id="11494"><span data-dcnode-id="11495" instrument_node="">Clavibacter xyli</span></em><span data-dcnode-id="11493" instrument_node=""> in tissues of sugarcane, and to differentiate </span><em data-dcnode-id="11491"><span data-dcnode-id="11492" instrument_node="">C. xyli</span></em><span data-dcnode-id="11490" instrument_node=""> subsp. </span><em data-dcnode-id="11488"><span data-dcnode-id="11489" instrument_node="">cynodontis</span></em><span data-dcnode-id="11487" instrument_node=""> from </span><em data-dcnode-id="11485"><span data-dcnode-id="11486" instrument_node="">C. xyli</span></em><span data-dcnode-id="11480"><span data-dcnode-id="11484" instrument_node=""> using </span><a class="topic-link" data-dcnode-id="11482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/multiplex-polymerase-chain-reaction" title="Learn more about multiplex PCR from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11483" instrument_node="">multiplex PCR</span></a><span data-dcnode-id="11481" instrument_node=""> approach. </span></span><em data-dcnode-id="11478"><span data-dcnode-id="11479" instrument_node="">Burkholderia plantarii</span></em><span data-dcnode-id="11477" instrument_node=""> and </span><em data-dcnode-id="11475"><span data-dcnode-id="11476" instrument_node="">Burkholderia glumae</span></em><span data-dcnode-id="11474" instrument_node=""> present in seedling disease of rice could be detected by designing specific primers within ITS region (</span><a class="workspace-trigger" data-dcnode-id="11472" href="#bib123" name="bbib123"><span data-dcnode-id="11473" instrument_node="">Takeuchi et al., 1997</span></a><span data-dcnode-id="11471" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="11469" href="#bib138" name="bbib138"><span data-dcnode-id="11470" instrument_node="">Wilson et al. (1994)</span></a><span data-dcnode-id="11464"><span data-dcnode-id="11468" instrument_node=""> accounted PCR coupled </span><a class="topic-link" data-dcnode-id="11466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/ligase-chain-reaction" title="Learn more about ligase chain reaction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11467" instrument_node="">ligase chain reaction</span></a><span data-dcnode-id="11465" instrument_node=""> (LCR) for determining variation in single base within 16S rRNA gene to target </span></span><em data-dcnode-id="11462"><span data-dcnode-id="11463" instrument_node="">Pantoea stewartii</span></em><span data-dcnode-id="11461" instrument_node="">, bacteria responsible for causing Stewart’s bacterial wilt. This PCR coupled LCR is also used for diagnosing pathogens like </span><span data-dcnode-id="11457"><em data-dcnode-id="11458"><a class="topic-link" data-dcnode-id="11459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/cochliobolus-heterostrophus" title="Learn more about Bipolaris maydis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11460" instrument_node="">Bipolaris maydis</span></a></em></span><span data-dcnode-id="11456" instrument_node=""> and </span><em data-dcnode-id="11454"><span data-dcnode-id="11455" instrument_node="">Erwinia stewartii</span></em><span data-dcnode-id="11449"><span data-dcnode-id="11453" instrument_node=""> causing corn blight diseases and Stewart’s bacterial wilt disease in corn, respectively. The rRNA gene sequences from anonymous phytobacteria could be PCR amplified followed by sequence analysis and evaluated with known phytobacteria in Ribosomal Database Project providing </span><a class="topic-link" data-dcnode-id="11451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/phylogeny" title="Learn more about phylogenetic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11452" instrument_node="">phylogenetic</span></a><span data-dcnode-id="11450" instrument_node=""> framework (</span></span><a data-dcnode-id="11447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//rdp.cme.msu.edu/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="11448" instrument_node="">http://rdp.cme.msu.edu</span></a><span data-dcnode-id="11446" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="11444" href="#bib77" name="bbib77"><span data-dcnode-id="11445" instrument_node="">Maidak et al., 1999</span></a><span data-dcnode-id="11443" instrument_node="">).</span></p><p data-dcnode-id="11342" id="p0085"><span data-dcnode-id="11441" instrument_node="">Despite being useful for classification of known organisms, the techniques of DNA homology and sequencing are generally avoided by researchers working with unspecified and unknown phytobacteria at advanced taxonomic level. Thus, in this scenario, </span><a class="workspace-trigger" data-dcnode-id="11439" href="#bib93" name="bbib93"><span data-dcnode-id="11440" instrument_node="">Palleroni and Bradbury (1993)</span></a><span data-dcnode-id="11430"><span data-dcnode-id="11438" instrument_node=""> underscored the importance of genotyping approach for connecting gaps between solid systematic of type strain with that of novel and old reference strains. Constructing diversity map using PCR-based genomic fingerprinting escorted with computer-assisted pattern may fix such a gap. Rep-PCR is generally used to distinguish </span><a class="topic-link" data-dcnode-id="11436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/bacterial-strain" title="Learn more about bacterial strains from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11437" instrument_node="">bacterial strains</span></a><span data-dcnode-id="11431"><span data-dcnode-id="11435" instrument_node=""> and analyze </span><a class="topic-link" data-dcnode-id="11433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/genetic-divergence" title="Learn more about genetic diversity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11434" instrument_node="">genetic diversity</span></a><span data-dcnode-id="11432" instrument_node=""> of bacterial strains. Several workers have reviewed the application of using rep-PCR in pathogen diagnosis (</span></span></span><a class="workspace-trigger" data-dcnode-id="11428" href="#bib73" name="bbib73"><span data-dcnode-id="11429" instrument_node="">Louws et al., 1995</span></a><span data-dcnode-id="11427" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11425" href="#bib104" name="bbib104"><span data-dcnode-id="11426" instrument_node="">Rademaker et al., 2000</span></a><span data-dcnode-id="11416"><span data-dcnode-id="11420"><span data-dcnode-id="11424" instrument_node="">). repetitive element palindromic (REP), BOX, and enterobacterial repetitive intergenic consensus (ERIC) primers corresponds to REP, BOX, and ERIC sequences that are generally used for fingerprinting of </span><a class="topic-link" data-dcnode-id="11422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/actinobacteria" title="Learn more about actinomycetes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11423" instrument_node="">actinomycetes</span></a><span data-dcnode-id="11421" instrument_node="">, Gram-positive and Gram-negative </span></span><a class="topic-link" data-dcnode-id="11418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/immunology-and-microbiology/bacterial-population" title="Learn more about bacterial population from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11419" instrument_node="">bacterial population</span></a><span data-dcnode-id="11417" instrument_node="">. </span></span><em data-dcnode-id="11414"><span data-dcnode-id="11415" instrument_node="">X. oryzae</span></em><span data-dcnode-id="11413" instrument_node=""> is a very good example that contains repetitive element IS1112. Primers have been designed to perform rep-PCR that can generate 13–35 bands ranging from 100</span><span data-dcnode-id="11412" instrument_node="">&nbsp;</span><span data-dcnode-id="11411" instrument_node="">bp to 7</span><span data-dcnode-id="11410" instrument_node="">&nbsp;</span><span data-dcnode-id="11409" instrument_node="">kb in </span><em data-dcnode-id="11407"><span data-dcnode-id="11408" instrument_node="">X. oryzae</span></em><span data-dcnode-id="11406" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="11404" href="#bib40" name="bbib40"><span data-dcnode-id="11405" instrument_node="">George et al., 1997</span></a><span data-dcnode-id="11399"><span data-dcnode-id="11403" instrument_node="">). The potential of generating multiple fingerprinting profiles using </span><a class="topic-link" data-dcnode-id="11401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/repetitive-dna-sequences" title="Learn more about repetitive DNA sequences from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11402" instrument_node="">repetitive DNA sequences</span></a><span data-dcnode-id="11400" instrument_node=""> has been used in case of bacteria, viruses, and fungi. </span></span><a class="workspace-trigger" data-dcnode-id="11397" href="#bib25" name="bbib25"><span data-dcnode-id="11398" instrument_node="">De Ley and Friedman (1965)</span></a><span data-dcnode-id="11396" instrument_node=""> reported that it is difficult to perform identification of </span><em data-dcnode-id="11394"><span data-dcnode-id="11395" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11393" instrument_node=""> by DNA–DNA hybridization because 60%–80% of </span><em data-dcnode-id="11391"><span data-dcnode-id="11392" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11390" instrument_node=""> DNA hybridizes with DNA of several </span><em data-dcnode-id="11388"><span data-dcnode-id="11389" instrument_node="">Pseudomonas</span></em><span data-dcnode-id="11387" instrument_node=""> strains. Moreover, </span><a class="workspace-trigger" data-dcnode-id="11385" href="#bib65" name="bbib65"><span data-dcnode-id="11386" instrument_node="">Lee et al. (1997)</span></a><span data-dcnode-id="11384" instrument_node=""> also observed that DNA molecule of several </span><em data-dcnode-id="11382"><span data-dcnode-id="11383" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11377"><span data-dcnode-id="11381" instrument_node=""> strains overlapped with each other. In the same way, 295 </span><a class="topic-link" data-dcnode-id="11379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/morphological-trait" title="Learn more about phenotypic characters from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11380" instrument_node="">phenotypic characters</span></a><span data-dcnode-id="11378" instrument_node=""> of </span></span><em data-dcnode-id="11375"><span data-dcnode-id="11376" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11374" instrument_node=""> could not distinguish 1 pathovar from 100 different </span><em data-dcnode-id="11372"><span data-dcnode-id="11373" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11371" instrument_node=""> pathovars (</span><a class="workspace-trigger" data-dcnode-id="11369" href="#bib72" name="bbib72"><span data-dcnode-id="11370" instrument_node="">Louws et al., 1994</span></a><span data-dcnode-id="11368" instrument_node="">). On the other side, each host-dependent pathovar comprised of more characteristic rep-PCR fingerprints, and pathovar diversity which could differentiate up to strain level thus being helpful in specific identification of </span><em data-dcnode-id="11366"><span data-dcnode-id="11367" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11365" instrument_node=""> strains (</span><a class="workspace-trigger" data-dcnode-id="11363" href="#bib104" name="bbib104"><span data-dcnode-id="11364" instrument_node="">Rademaker et al., 2000</span></a><span data-dcnode-id="11362" instrument_node="">). Identification of phytobacteria and its diagnosis with genomic finger printing-based techniques could be done with the help of library databases. These library databases contain efficient fingerprint profiles of more than 600 </span><span data-dcnode-id="11361" id="p487"></span><em data-dcnode-id="11359"><span data-dcnode-id="11360" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11358" instrument_node=""> strains. </span><a class="workspace-trigger" data-dcnode-id="11356" href="#bib14" name="bbib14"><span data-dcnode-id="11357" instrument_node="">Bouzar et al. (1999)</span></a><span data-dcnode-id="11355" instrument_node=""> conducted a survey to check the genetic diversity of typical </span><em data-dcnode-id="11353"><span data-dcnode-id="11354" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11352" instrument_node=""> strains obtained from bell pepper plant (in Central America), and tomato (in Caribbean). However, atypical strains of </span><em data-dcnode-id="11350"><span data-dcnode-id="11351" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11349" instrument_node=""> were obtained from the tomato plant in Costa Rica. When these strains were carefully examined by rep-PCR, and subjected to library database evaluation, it was observed that atypical </span><em data-dcnode-id="11347"><span data-dcnode-id="11348" instrument_node="">Xanthomonas</span></em><span data-dcnode-id="11346" instrument_node=""> strains were easily mapped and displayed fingerprinting pattern similar to the </span><em data-dcnode-id="11344"><span data-dcnode-id="11345" instrument_node="">Xanthomonas gardneri</span></em><span data-dcnode-id="11343" instrument_node="">, the type strain that was first found in Yugoslavia in 1957.</span></p><p data-dcnode-id="11259" id="p0090"><a class="workspace-trigger" data-dcnode-id="11340" href="#bib142" name="bbib142"><span data-dcnode-id="11341" instrument_node="">Zhou-qi et al. (2016)</span></a><span data-dcnode-id="11339" instrument_node=""> developed a sensitive multiplex PCR for distinguishing and diagnosing seed-borne rice pathogen </span><em data-dcnode-id="11337"><span data-dcnode-id="11338" instrument_node="">B. glumae</span></em><span data-dcnode-id="11336" instrument_node=""> from other </span><em data-dcnode-id="11334"><span data-dcnode-id="11335" instrument_node="">Burkholderia</span></em><span data-dcnode-id="11321"><span data-dcnode-id="11333" instrument_node=""> species. Multiple virulent factors and phytotoxins like PehA and PehB </span><a class="topic-link" data-dcnode-id="11331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/polygalacturonase" title="Learn more about polygalacturonases from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11332" instrument_node="">polygalacturonases</span></a><span data-dcnode-id="11322"><span data-dcnode-id="11330" instrument_node="">, KatG </span><a class="topic-link" data-dcnode-id="11328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/catalase" title="Learn more about catalase from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11329" instrument_node="">catalase</span></a><span data-dcnode-id="11323"><span data-dcnode-id="11327" instrument_node="">, Hrp </span><a class="topic-link" data-dcnode-id="11325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/type-iii-secretion-system" title="Learn more about type III secretion system from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11326" instrument_node="">type III secretion system</span></a><span data-dcnode-id="11324" instrument_node="">, endopolygalacturonase, and tox genes (coding for toxoflavin biosynthesis) contributed to pathogenesis in </span></span></span></span><em data-dcnode-id="11319"><span data-dcnode-id="11320" instrument_node="">B. glumae</span></em><span data-dcnode-id="11318" instrument_node="">. This improved method of multiplex PCR can instantaneously detect rice pathogens like </span><em data-dcnode-id="11316"><span data-dcnode-id="11317" instrument_node="">Acidovorax avenae</span></em><span data-dcnode-id="11315" instrument_node="">, </span><em data-dcnode-id="11313"><span data-dcnode-id="11314" instrument_node="">B. glumae</span></em><span data-dcnode-id="11312" instrument_node="">, </span><span data-dcnode-id="11308"><em data-dcnode-id="11309"><a class="topic-link" data-dcnode-id="11310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/burkholderia-gladi
