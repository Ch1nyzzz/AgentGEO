</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id6&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id7&quot;><p>Diseases in plants cause major production and economic losses in agricultural industry worldwide. Monitoring of health and detection of diseases in plants and trees is critical for sustainable agriculture. To the best of our knowledge, there is no sensor commercially available for real-time assessment of health conditions in trees. Currently, scouting is most widely used mechanism for monitoring stress in trees, which is an expensive, labor-intensive, and time-consuming process. Molecular techniques such as polymerase chain reaction are used for the identification of plant diseases that require detailed sampling and processing procedure. Early information on crop health and disease detection can facilitate the control of diseases through proper management strategies such as vector control through pesticide applications, fungicide applications, and disease-specific chemical applications; and can improve productivity.</p><p>The present review recognizes the need for developing a rapid, cost-effective, and reliable health-monitoring sensor that would facilitate advancements in agriculture. It describes the currently used technologies that can be used for developing a ground-based sensor system to assist in monitoring health and diseases in plants under field conditions. These technologies include spectroscopic and imaging-based, and volatile profiling-based plant disease detection methods. The paper compares the benefits and limitations of these potential methods.</p></div></div></div>" data-dcnode-id="845" lang="en" name="citation_abstract"><span data-dcnode-id="844" instrument_node="">

="Persistent link using digital object identifier" class="doi" data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.compag.2010.02.007" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="443" instrument_node="">https://doi.org/10.1016/j.compag.2010.02.007</span></a><a class="rights-and-content" data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0168169910000438%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="441" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="438"></section><section class="ReferencedArticles" data-dcnode-id="437"></section><div class="PageDivider" data-dcnode-id="436"></div><div class="Abstracts u-font-serif" data-dcnode-id="427" id="abstracts"><div class="abstract author" data-dcnode-id="428" id="aep-abstract-id6"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Abstract</span></h2><div data-dcnode-id="429" id="aep-abstract-sec-id7"><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Diseases in plants cause major production and economic losses in agricultural industry worldwide. Monitoring of health and detection of diseases in plants and trees is critical for sustainable agriculture. To the best of our knowledge, there is no sensor commercially available for real-time assessment of health conditions in trees. Currently, scouting is most widely used mechanism for monitoring stress in trees, which is an expensive, labor-intensive, and time-consuming process. Molecular techniques such as polymerase chain reaction are used for the identification of plant diseases that require detailed sampling and processing procedure. Early information on crop health and disease detection can facilitate the control of diseases through proper management strategies such as vector control through pesticide applications, fungicide applications, and disease-specific chemical applications; and can improve productivity.</span></p><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">The present review recognizes the need for developing a rapid, cost-effective, and reliable health-monitoring sensor that would facilitate advancements in agriculture. It describes the currently used technologies that can be used for developing a ground-based sensor system to assist in monitoring health and diseases in plants under field conditions. These technologies include spectroscopic and imaging-based, and volatile profiling-based plant disease detection methods. The paper compares the benefits and limitations of these potential methods.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="404" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="416"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S016816991000061X"><svg class="icon icon-navigate-left" data-dcnode-id="425" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="426"></path></svg><span class="button-alternative-text" data-dcnode-id="418"><strong data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="419"><span data-dcnode-id="420" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="405"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168169910000426"><span class="button-alternative-text" data-dcnode-id="409"><strong data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="407" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="408"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="385"><div class="keywords-section" data-dcnode-id="386" id="aep-keywords-id8"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="399"><span data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Plant diseases</span></span></div><div class="keyword" data-dcnode-id="396"><span data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Imaging techniques</span></span></div><div class="keyword" data-dcnode-id="393"><span data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Spectroscopy</span></span></div><div class="keyword" data-dcnode-id="390"><span data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Volatile profiling</span></span></div><div class="keyword" data-dcnode-id="387"><span data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">GC–MS</span></span></div></div></div><span data-dcnode-id="384" instrument_node=""></span><div class="related-content-links u-hide-from-md" data-dcnode-id="380"><button class="button button-anchor" data-dcnode-id="381" type="button"><span class="button-text" data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="379"></div><div data-dcnode-id="242" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="243"><div class="PageDivider" data-dcnode-id="378"></div><header data-dcnode-id="375" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Cited by (710)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="244"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="245"><ul data-dcnode-id="251"><li class="ListArticleItem" data-dcnode-id="354"><div class="sub-heading" data-dcnode-id="369"><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2666053922000145" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="373" id="citing-articles-article0-title"><span data-dcnode-id="374" instrument_node="">An outlook on electrochemical approaches for molecular diagnostics assays and discussions on the limitations of miniaturized technologies for point-of-care devices</span></h3></a><div class="article-source ellipsis" data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">2022, Sensors and Actuators Reports</span></div></div><div class="buttons" data-dcnode-id="363"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="364" type="button"><span class="button-link-text" data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="365" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="366"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="355"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="356" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="357"><p data-dcnode-id="358" id="spara012"><span data-dcnode-id="362" instrument_node="">The detection of specific biomarkers for health monitoring, i.e., molecular diagnostics, can be classified as early or emergency diagnostics. Emergency diagnostics is related to those diseases which is necessary a rapid patient intervention, such as stroke and cardiac attack, in addition to the detection of infectious diseases to monitor and control outbreaks and epidemics, and early diagnosis requires the highly sensitive quantification of the biomarkers related to, specially, degenerative and cancer diseases for a successful treatment. Herein, the challenges of designing improved point-of-care (PoC) molecular diagnostic devices were reviewed, and the limitations of standard technologies were discussed. Despite their high sensitivities, precisions, and reliabilities, standard technologies are still limited by their requirements for expensive reagents and equipment, as well as laborious and time-consuming sample pretreatments, elaborate protocols, and qualified personnel, which highly impact their applications </span><em data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">in loco</span></em><span data-dcnode-id="359" instrument_node=""> and affordability. PoC assays exhibiting high selectivity and portability have been demonstrated feasibility in biosensing technologies. To explore the biosensor application regarding the limitations of achieving the commercialization of these technologies, the strategies for developing label-based and label-free biosensors will be discussed as they relate to the types of bioreceptor and the signal transduction methods. Electrochemical biosensors will especially be focused on because of their advantages, such as scalability, miniaturization, and sensitivity (with some electrochemical biosensing setups not requiring complex steps, such as sample pretreatment, to complete the diagnostics, thus availing reliable PoC analysis). Further, the challenges of developing reliable commercial PoC devices will be discussed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="336"><div class="sub-heading" data-dcnode-id="348"><a data-dcnode-id="351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0045653522002661" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="352" id="citing-articles-article1-title"><span data-dcnode-id="353" instrument_node="">Advances, limitations, and prospects of biosensing technology for detecting phytopathogenic bacteria</span></h3></a><div class="article-source ellipsis" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">2022, Chemosphere</span></div></div><div class="buttons" data-dcnode-id="342"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="343" type="button"><span class="button-link-text" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="344" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="345"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="337"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="338" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="339"><p data-dcnode-id="340" id="abspara0010"><span data-dcnode-id="341" instrument_node="">Phytopathogenic bacteria cause severe economic losses in agricultural production worldwide. The spread rates, severity, and emerging plant bacterial diseases have become serious threat to the sustainability of food sources and the fruit industry. Detection and diagnosis of plant diseases are imperative in order to manage plant diseases in field conditions, greenhouses, and food storage conditions as well as to maximize agricultural productivity and sustainability. To date, various techniques including, serological, observation-based, and molecular methods have been employed for plant disease detection. These methods are sensitive and specific for genetic identification of bacteria. However, these methods are specific for genetic identification of bacteria. Currently, the innovative biosensor-based disease detection technique is an attractive and promising alternative. A biosensor system involves biological recognition and transducer active receptors based on sensors used in plant-bacteria diagnosis. This system has been broadly used for the rapid diagnosis of plant bacterial pathogens. In the present review, we have discussed the conventional methods of bacterial-disease detection, however, the present review mainly focuses on the applications of different biosensor-based techniques along with point-of-care (POC), robotics, and cell phone-based systems. In addition, we have also discussed the challenges and limitations of these techniques.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="318"><div class="sub-heading" data-dcnode-id="330"><a data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168169922001806" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="334" id="citing-articles-article2-title"><span data-dcnode-id="335" instrument_node="">Exploring the potential of hyperspectral imaging to detect Esca disease complex in asymptomatic grapevine leaves</span></h3></a><div class="article-source ellipsis" data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">2022, Computers and Electronics in Agriculture</span></div></div><div class="buttons" data-dcnode-id="324"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="325" type="button"><span class="button-link-text" data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="326" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="327"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="319"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="320" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="321"><p data-dcnode-id="322" id="sp00309"><span data-dcnode-id="323" instrument_node="">Precise and reliable identification of specific plant diseases is a challenge within precision agriculture nowadays. This is the case of esca, a complex grapevine trunk disease, that represents a major threat to modern viticulture as it is responsible for large economic losses annually. The lack of effective control strategies and the complexity of esca disease expression make essential the identification of affected plants, before symptoms become evident, for a better management of the vineyard. This study evaluated the suitability of a near-infrared hyperspectral imaging (HSI) system to detect esca disease in asymptomatic grapevine leaves of Tempranillo red-berried cultivar. For this, 72 leaves from an experimental vineyard, naturally infected with esca, were collected and scanned with a lab-scale HSI system in the 900-1700 nm spectral range. Then, effective image processing and multivariate analysis techniques were merged to develop pixel-based classification models for the distinction of healthy, asymptomatic and symptomatic leaves. Automatic and interval partial least squares variable selection methods were tested to identify the most relevant wavelengths for the detection of esca-affected vines using partial least squares discriminant analysis and different pre-processing techniques. Three-class and two-class classifiers were carried out to differentiate healthy, asymptomatic and symptomatic leaf pixels, and healthy from asymptomatic pixels, respectively. Both variable selection methods performed similarly, achieving good classification rates in the range of 82.77-97.17% in validation datasets for either three-class or two-class classifiers. The latter results demonstrated the capability of hyperspectral imaging to distinguish two groups of seemingly identical leaves (healthy and asymptomatic). These findings would ease the annual monitoring of disease incidence in the vineyard and, therefore, better crop management and decision making.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="300"><div class="sub-heading" data-dcnode-id="312"><a data-dcnode-id="315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0924424722001066" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="316" id="citing-articles-article3-title"><span data-dcnode-id="317" instrument_node="">A review of visible and near-infrared (Vis-NIR) spectroscopy application in plant stress detection</span></h3></a><div class="article-source ellipsis" data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">2022, Sensors and Actuators A: Physical</span></div></div><div class="buttons" data-dcnode-id="306"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="307" type="button"><span class="button-link-text" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="308" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="309"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="301"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="302" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="303"><p data-dcnode-id="304" id="sp0045"><span data-dcnode-id="305" instrument_node="">Health monitoring in plants is vital for agricultural sustainability. Currently, the number of techniques able to detect plant stress and disease at an early stage is limited. Prevention of diseases and stress, while the plants are still in an asymptomatic stage could lead to better crop management in agricultural industries. This review focuses on the applications of visible and near-infrared (Vis-NIR) spectroscopy in disease detection and the implications of stress in various species of plants. It is a rapid and non-destructive technique that doesn’t require or requires only minimal sample processing before measurements and data analysis. The visible and near-infrared region can detect almost all functional groups and compounds making it a promising tool for data analysis. A brief overview of the methods used and the absorption bands in the Vis-NIR range related to plant disease and stress will be discussed. The comprehensive review of the application of the visible and near-infrared range regions according to different types of disease and stress including the methods used for the data analysis is being addressed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="282"><div class="sub-heading" data-dcnode-id="294"><a data-dcnode-id="297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0956566321009908" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="298" id="citing-articles-article4-title"><span data-dcnode-id="299" instrument_node="">Recent advances in E-monitoring of plant diseases</span></h3></a><div class="article-source ellipsis" data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">2022, Biosensors and Bioelectronics</span></div></div><div class="buttons" data-dcnode-id="288"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="289" type="button"><span class="button-link-text" data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="290" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="291"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="283"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="284" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="285"><p data-dcnode-id="286" id="abspara0010"><span data-dcnode-id="287" instrument_node="">Infectious plant diseases are caused by pathogenic microorganisms, such as fungi, oomycetes, bacteria, viruses, phytoplasma, and nematodes. Plant diseases have a significant effect on the plant quality and yield and they can destroy the entire plant if they are not controlled in time. To minimize disease-related losses, it is essential to identify and control pathogens in the early stages. Plant disease control is thus a fundamental challenge both for global food security and sustainable agriculture. Conventional methods for plant diseases control have given place to electronic control (E-monitoring) due to their lack of portability, being time consuming, need for a specialized user, etc. E-monitoring using electronic nose (e-nose), biosensors, wearable sensors, and ‘electronic eyes' has attracted increasing attention in recent years. Detection, identification, and quantification of pathogens based on electronic sensors (E-sensors) are both convenient and practical and may be used in combination with conventional methods. This paper discusses recent advances made in E-sensors as component parts in combination with wearable sensors, in electronic sensing systems to control and detect viruses, bacteria, pathogens and fungi. In addition, future challenges using sensors to manage plant diseases are investigated.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="252"><div class="sub-heading" data-dcnode-id="276"><a data-dcnode-id="279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S030442382100889X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="280" id="citing-articles-article5-title"><span data-dcnode-id="281" instrument_node="">Thermal-RGB imagery and in-field weather sensing derived sweet cherry wetness prediction model</span></h3></a><div class="article-source ellipsis" data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">2022, Scientia Horticulturae</span></div></div><div class="buttons" data-dcnode-id="270"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="271" type="button"><span class="button-link-text" data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="272" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="273"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="253"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="254" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="255"><p data-dcnode-id="256" id="spara016"><span data-dcnode-id="269" instrument_node="">Rain-induced cracking of sweet cherry (</span><em data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Prunus avium</span></em><span data-dcnode-id="266" instrument_node=""> L.) fruit causes substantial economic loss to tree fruit growers annually. Increased fruit surface wetness triggers absorption of water in maturing fruits and leads to fruit cracking. This study was undertaken to develop and evaluate thermal-RGB imagery and in-field weather sensing derived wetness prediction models as tools to help mitigate cracking. We developed two cultivar-specific cherry wetness prediction models, one with only the weather data and other combined with the imagery data derived fruit surface temperature (FST). The suitability and accuracy of such models was validated for two cherry cultivars (</span><em data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">cv.</span></em><span data-dcnode-id="263" instrument_node=""> ‘Selah’ and ‘Skeena’). The FST and weather data derived model indicated an improved wetness prediction for both the cultivars. Strong relations (R</span><sup data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">2</span></sup><span data-dcnode-id="260" instrument_node="">&nbsp;=&nbsp;0.80 and 0.86) and marginal prediction errors (Root Mean Squared Error&nbsp;=&nbsp;8.7% and 3.5%) were observed between measured and predicted wetness for ‘Selah’ and ‘Skeena’ cultivars, respectively. However, weaker relations (R</span><sup data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">2</span></sup><span data-dcnode-id="257" instrument_node="">= 0.66 and 0.53) were observed, when a model for a particular cultivar was validated against other cultivar, indicating the need of cultivar specific models. Such models can be integrated with a decision support system and crop protection (e.g. rainwater removal, chemical spraying) techniques, for improved crop loss management.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-77950515899%26md5%3D84b619bc128974580bd74b620eb5895" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="249" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="250"></path></svg><span class="button-alternative-text" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a aria-disabled="false" class="anc
