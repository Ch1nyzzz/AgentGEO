</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab0005&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as0005&quot;><p id=&quot;sp0045&quot;>Agriculture is the basis of every economy worldwide. Crop production is one of the major factors affecting domestic market condition in any country. Agricultural production is also a major prerequisite of economic development, be it any part of any country. It plays a crucial role as it even provides raw material, employment and food to different citizens. A lot of issues are responsible for estimated crop production varying in different parts of the world. Some of these include overutilization of chemical fertilizers, presence of chemicals in water supply, uneven distribution of rainfall, different soil fertility and others. Other than these issues one of the commonly faced challenges across the globe equally includes destruction of the major part of production due to diseases. After providing effective resources to the fields, major section of the production is diminished by the presence of diseases in the plants grown. This leads to focus on effective ways of detection of disease in plants. Presence of various diseases in plant is a major concern among farmers. Plant diseases acts as a major threat to small scale farmers as they lead to major destruction in overall food supply. To provide effective measures for detection and avoidance of the destruction requires an early identification of type of plant disease present. In recent time major work is being done for the identification of plant disease presents in varied parts of the world affection varied crops. Major work is being done in the domain of identification of causing factors of these diseases. Some of the diseases are marked by the presence of viruses while some are resultant of fungal infection. This becomes a major issue when the causing factor is not traceable before it has already spread to major production section. This paper brings a review on effective use of different imaging techniques and computer vision approaches for the identification and classification of plant diseases. Detection of Plant disease is initiated with image acquisition followed by pre-processing while using the process of segmentation. It is further accompanied by different techniques used for feature extraction along with classification. In this Paper we present the Current Trends and Challenges for detection of plant disease using computer vision and advance imaging technique.</p></div></div></div>" data-dcnode-id="9603" lang="en" name="citation_abstract"><span data-dcnode-id="9602" instrument_node="">

/div><span class="ellipses" data-dcnode-id="9000"><a class="referenced-article-link" data-dcnode-id="9001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2589721720300544" id="title_S2589721720300544" title="Erratum regarding missing Declaration of Competing Interest statements in previously published articles"><span class="title-text" data-dcnode-id="9002"><span data-dcnode-id="9003" instrument_node="">Erratum regarding missing Declaration of Competing Interest statements in previously published articles</span></span></a></span><div class="referenced-article-source" data-dcnode-id="8998"><span data-dcnode-id="8999" instrument_node="">Artificial Intelligence in Agriculture, Volume 5, 2021, Pages 301-302</span></div><a class="anchor icon-link pdf" data-dcnode-id="8990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2589721720300544/pdfft%3Fmd5%3D85402242a9f510a8d5f420e99e75d2ba%26pid%3D1-s2.0-S2589721720300544-main.pdf" rel="nofollow" target="_blank"><svg class="icon icon-pdf-multicolor" data-dcnode-id="8993" focusable="false" height="24" viewBox="0 0 32 32" width="24"><path d="M7 .362h17.875l6.763 6.1V31.64H6.948V16z" data-dcnode-id="8997" fill="#fff" stroke="#000" stroke-width=".703"></path><path d="M.167 2.592H22.39V9.72H.166z" data-dcnode-id="8996" fill="#da0000" stroke="#aaa" stroke-width=".315"></path><path d="M5.97 3.638h1.62c1.053 0 1.483.677 1.488 1.564.008.96-.6 1.564-1.492 1.564h-.644v1.66h-.977V3.64m.977.897v1.34h.542c.27 0 .596-.068.596-.673-.002-.6-.32-.667-.596-.667h-.542m3.8.036v2.92h.35c.933 0 1.223-.448 1.228-1.462.008-1.06-.316-1.45-1.23-1.45h-.347m-.977-.94h1.03c1.68 0 2.523.586 2.534 2.39.01 1.688-.607 2.4-2.534 2.4h-1.03V3.64m4.305 0h2.63v.934h-1.657v.894H16.6V6.4h-1.56v2.026h-.97V3.638" data-dcnode-id="8995" fill="#fff9f9"></path><path d="M19.462 13.46c.348 4.274-6.59 16.72-8.508 15.792-1.82-.85 1.53-3.317 2.92-4.366-2.864.894-5.394 3.252-3.837 3.93 2.113.895 7.048-9.25 9.41-15.394zM14.32 24.874c4.767-1.526 14.735-2.974 15.152-1.407.824-3.157-13.72-.37-15.153 1.407zm5.28-5.043c2.31 3.237 9.816 7.498 9.788 3.82-.306 2.046-6.66-1.097-8.925-4.164-4.087-5.534-2.39-8.772-1.682-8.732.917.047 1.074 1.307.67 2.442-.173-1.406-.58-2.44-1.224-2.415-1.835.067-1.905 4.46 1.37 9.065z" data-dcnode-id="8994" fill="#f91d0a"></path></svg><span class="anchor-text" data-dcnode-id="8991"><span data-dcnode-id="8992" instrument_node="">Download PDF</span></span></a></section></div></div><div class="PageDivider" data-dcnode-id="8986"></div><div class="Abstracts u-font-serif" data-dcnode-id="8953" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="8960" id="ab0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8984"><span data-dcnode-id="8985" instrument_node="">Highlights</span></h2><div data-dcnode-id="8961" id="as0010"><p data-dcnode-id="8962" id="sp0050"></p><dl class="list" data-dcnode-id="8963"><dt class="list-label" data-dcnode-id="8982"><span data-dcnode-id="8983" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8979"><p data-dcnode-id="8980" id="p0005"><span data-dcnode-id="8981" instrument_node="">Presents a review on effective use of different imaging techniques for the detection and classification of plant diseases.</span></p></dd><dt class="list-label" data-dcnode-id="8977"><span data-dcnode-id="8978" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8974"><p data-dcnode-id="8975" id="p0010"><span data-dcnode-id="8976" instrument_node="">Presents computer vision approaches for classification of plant diseases.</span></p></dd><dt class="list-label" data-dcnode-id="8972"><span data-dcnode-id="8973" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8969"><p data-dcnode-id="8970" id="p0015"><span data-dcnode-id="8971" instrument_node="">Research gaps were summarized.</span></p></dd><dt class="list-label" data-dcnode-id="8967"><span data-dcnode-id="8968" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8964"><p data-dcnode-id="8965" id="p0020"><span data-dcnode-id="8966" instrument_node="">Current Trends and Challenges for detection of plant disease were discussed.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="8954" id="ab0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8958"><span data-dcnode-id="8959" instrument_node="">Abstract</span></h2><div data-dcnode-id="8955" id="as0005"><p data-dcnode-id="8956" id="sp0045"><span data-dcnode-id="8957" instrument_node="">Agriculture is the basis of every economy worldwide. Crop production is one of the major factors affecting domestic market condition in any country. Agricultural production is also a major prerequisite of economic development, be it any part of any country. It plays a crucial role as it even provides raw material, employment and food to different citizens. A lot of issues are responsible for estimated crop production varying in different parts of the world. Some of these include overutilization of chemical fertilizers, presence of chemicals in water supply, uneven distribution of rainfall, different soil fertility and others. Other than these issues one of the commonly faced challenges across the globe equally includes destruction of the major part of production due to diseases. After providing effective resources to the fields, major section of the production is diminished by the presence of diseases in the plants grown. This leads to focus on effective ways of detection of disease in plants. Presence of various diseases in plant is a major concern among farmers. Plant diseases acts as a major threat to small scale farmers as they lead to major destruction in overall food supply. To provide effective measures for detection and avoidance of the destruction requires an early identification of type of plant disease present. In recent time major work is being done for the identification of plant disease presents in varied parts of the world affection varied crops. Major work is being done in the domain of identification of causing factors of these diseases. Some of the diseases are marked by the presence of viruses while some are resultant of fungal infection. This becomes a major issue when the causing factor is not traceable before it has already spread to major production section. This paper brings a review on effective use of different imaging techniques and computer vision approaches for the identification and classification of plant diseases. Detection of Plant disease is initiated with image acquisition followed by pre-processing while using the process of segmentation. It is further accompanied by different techniques used for feature extraction along with classification. In this Paper we present the Current Trends and Challenges for detection of plant disease using computer vision and advance imaging technique.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="8930" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="8942"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2589721720300271"><svg class="icon icon-navigate-left" data-dcnode-id="8951" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="8952"></path></svg><span class="button-alternative-text" data-dcnode-id="8944"><strong data-dcnode-id="8949"><span data-dcnode-id="8950" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="8947"><span data-dcnode-id="8948" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8945"><span data-dcnode-id="8946" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="8931"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2589721720300301"><span class="button-alternative-text" data-dcnode-id="8935"><strong data-dcnode-id="8940"><span data-dcnode-id="8941" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="8938"><span data-dcnode-id="8939" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8936"><span data-dcnode-id="8937" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="8933" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="8934"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="8911"><div class="keywords-section" data-dcnode-id="8912" id="ks0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8928"><span data-dcnode-id="8929" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="8925" id="kw0005"><span data-dcnode-id="8926" id="tx0010"><span data-dcnode-id="8927" instrument_node="">Plant disease detection</span></span></div><div class="keyword" data-dcnode-id="8922" id="kw0010"><span data-dcnode-id="8923" id="tx0015"><span data-dcnode-id="8924" instrument_node="">Machine learning</span></span></div><div class="keyword" data-dcnode-id="8919" id="kw0015"><span data-dcnode-id="8920" id="tx0020"><span data-dcnode-id="8921" instrument_node="">Imaging sensors and systems</span></span></div><div class="keyword" data-dcnode-id="8916" id="kw0020"><span data-dcnode-id="8917" id="tx0025"><span data-dcnode-id="8918" instrument_node="">Plant disease classification</span></span></div><div class="keyword" data-dcnode-id="8913" id="kw0025"><span data-dcnode-id="8914" id="tx0030"><span data-dcnode-id="8915" instrument_node="">Image processing</span></span></div></div></div><span data-dcnode-id="8910" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="7025" id="body"><div data-dcnode-id="7026"><section data-dcnode-id="8837" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8904" id="st0020"><span data-dcnode-id="8909" instrument_node="">1</span><span data-dcnode-id="8907" instrument_node="">. </span><span data-dcnode-id="8905" instrument_node="">Introduction</span></h2><p data-dcnode-id="8902" id="p0025"><span data-dcnode-id="8903" instrument_node="">Agricultural products are used to cater the dietary needs of animals as well as human beings. Agriculture has been a part of everyone's life directly or indirectly. It is the way of crop production which results in providing food, the building block of every human being. Whether a human resides in a metro city or lives in a village everyone survives on this crop production one or the other way. With the advent of civilization humans have started cultivating crops like wheat, cotton and others. With the development in every area of life there has been some vast development in the domain of agriculture also. Along with the variation in the types of crops being grown other activities were also started such as farming, raising cattle etc.</span></p><p data-dcnode-id="8900" id="p0030"><span data-dcnode-id="8901" instrument_node="">But today also crop production largely contributes to the agricultural output. There have been major changes in crop production also. With the raising knowledge technology has brought some modernization in the area of crop production also. Modern agronomy makes the use of best technological devices and techniques for the increase in the yield. There has been an increased use of modern tools for easy identification of the suitable conditions for larger crop production. Various types of fertilizers and pesticides are being used to bring an increase. Even genetically modified seeds are being tested on a larger scale to pump up the overall production in any area.</span></p><p data-dcnode-id="8898" id="p0035"><span data-dcnode-id="8899" instrument_node="">Crop production involves taking care of all the activities for the better yield across all the seasons. It involves complete analysis of the soil being used, the type of seeds used, the major nutrient requirement of the particular crop and many others. Yields obtained from the crops, and other sources are being used to meet the daily needs of not only the farmers, but for others also. But as every field suffers from some form of issues agriculture or crop production also faces major challenge in the form of crop diseases. With the huge demand of food around the world, it becomes necessary to focus on the crop production. It is aimed to protect the overall yield from any type of loss before reaching to the market. Besides calamities caused by nature such as draught, earthquakes, diseases also accounts to major crop yield losses.</span></p><p data-dcnode-id="8896" id="p0040"><span data-dcnode-id="8897" instrument_node="">In context of quality or in the context of quality, yields are reduced due to various types of plant diseases. Plant disease can be described as some form of modification that hampers the normal processes in it. Crop production can be majorly affected by these diseases which may reduce the quality and quantity of the overall produced yield. Management of large amount of crop yield involves various timely activities such as keeping a watch for diseases, which reduces it to undesirable stuff. It also involves finding immediate cure for various challenges faced. Disease can affect the overall functional capacity of the plant. It may result in reduced growth, less fruit production, more leaf falls and many other ailments also. Sometimes the disease may spread from crop to crop or may be spread by some pathogen or other means. Sometimes they may be caused by some fungi or some bacteria. Sometimes even viruses get transferred with seeds from one place to another.</span></p><p data-dcnode-id="8878" id="p0045"><span data-dcnode-id="8895" instrument_node="">Main reasons of crop diseases are the infections such as insect pests, bacteria, fungi and viruses. These diseases are found and can spread in all parts of the plants like in stem, vegetables, fruits and others can be detected by one of the listed below:</span></p><dl class="list" data-dcnode-id="8879"><dt class="list-label" data-dcnode-id="8893"><span data-dcnode-id="8894" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8890"><p data-dcnode-id="8891" id="p0050"><span data-dcnode-id="8892" instrument_node="">Discerning the affected area</span></p></dd><dt class="list-label" data-dcnode-id="8888"><span data-dcnode-id="8889" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8885"><p data-dcnode-id="8886" id="p0055"><span data-dcnode-id="8887" instrument_node="">Retrieving the features set of the affected area</span></p></dd><dt class="list-label" data-dcnode-id="8883"><span data-dcnode-id="8884" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="8880"><p data-dcnode-id="8881" id="p0060"><span data-dcnode-id="8882" instrument_node="">Identifying and categorizing the diseases</span></p></dd></dl><p></p><p data-dcnode-id="8870"><span data-dcnode-id="8877" instrument_node="">From a long time, identifying the crop disease is done by the experts through their naked eyes based on their knowledge and experience. Find an expert and contact them is not only a tedious and time consuming task but also a very long and expensive method. Therefore, the complete process sometimes takes so much time which become time taking for the disease to be eradicated and also very tedious in case of large areas (</span><a class="workspace-trigger" data-dcnode-id="8875" href="#bb0230" name="bbb0230"><span data-dcnode-id="8876" instrument_node="">Liu et al., 2020</span></a><span data-dcnode-id="8874" instrument_node="">), (</span><a class="workspace-trigger" data-dcnode-id="8872" href="#bb0290" name="bbb0290"><span data-dcnode-id="8873" instrument_node="">Mishra et al. (2020)</span></a><span data-dcnode-id="8871" instrument_node="">).</span></p><p data-dcnode-id="8850" id="p0065"><span data-dcnode-id="8869" instrument_node="">Modern techniques available, for plant disease detection, like processing, similarity identification and deep learning based classification techniques better in respect of time saving than the old methods used (</span><a class="workspace-trigger" data-dcnode-id="8867" href="#bb0230" name="bbb0230"><span data-dcnode-id="8868" instrument_node="">Nagaraju and Chawla, 2020</span></a><span data-dcnode-id="8866" instrument_node="">), (</span><a class="workspace-trigger" data-dcnode-id="8864" href="#bb0290" name="bbb0290"><span data-dcnode-id="8865" instrument_node="">Nagasubramanian et al., 2019</span></a><span data-dcnode-id="8863" instrument_node="">), (</span><a class="workspace-trigger" data-dcnode-id="8861" href="#bb0200" name="bbb0200"><span data-dcnode-id="8862" instrument_node="">Kulkarni and Ashwin Patil, 2012</span></a><span data-dcnode-id="8860" instrument_node="">), (</span><a class="workspace-trigger" data-dcnode-id="8858" href="#bb0175" name="bbb0175"><span data-dcnode-id="8859" instrument_node="">Jasim and Tuwaijari, 2020</span></a><span data-dcnode-id="8857" instrument_node="">), (</span><a class="workspace-trigger" data-dcnode-id="8855" href="#bb0445" name="bbb0445"><span data-dcnode-id="8856" instrument_node="">Sun et al., 2020</span></a><span data-dcnode-id="8854" instrument_node="">). They help farmers to improve the quality of crops, also bringing a reduction of disease occurrence by early detection and timely curing them (</span><a class="workspace-trigger" data-dcnode-id="8852" href="#bb0435" name="bbb0435"><span data-dcnode-id="8853" instrument_node="">Sinha and Shekhawat, 2020</span></a><span data-dcnode-id="8851" instrument_node="">).</span></p><p data-dcnode-id="8848" id="p0070"><span data-dcnode-id="8849" instrument_node="">In the process of detection of disease, number of imaging techniques is being used. One of the imaging techniques being used id photo acoustic imaging, which makes the use of light absorption in case of tissues. It makes the use of property of light's absorption by tissues and its conversion into heat further resulting in the generation of photo acoustic signals. Here the pressure distribution radiated by tissues further being mapped and used for imaging purposes. Considering various imaging techniques one of the important techniques is magnetic resonance imaging. It can be described as imaging technique that gives detailed images that are mostly used for knowing different types of diseases. In this method strong magnets are being deployed generating strong magnetic field resulting in proper alignment of the protons. Later application of electric field makes the movement in these protons. Finally turning off of the rf filed sensors help in the detection of energy being released from movement.</span></p><p data-dcnode-id="8843" id="p0075"><span data-dcnode-id="8847" instrument_node="">Among the various spectroscopies one of the recent methods is of fluorescence spectroscopy. It makes the use of fluorescence measurement, being released after the excitation of light with area of interest. Mostly for vegetative studies or plant disease detection laser induced fluorescence are often used on a large scale. These are mostly needed for identification of various physiological states of different plants. Majorly the green leaves are being tested for chlorophyll fluorescence or blue green fluorescence. These help in early identification of any type of impairment resulting from major nutrients deficiencies. (</span><a class="workspace-trigger" data-dcnode-id="8845" href="#bb0415" name="bbb0415"><span data-dcnode-id="8846" instrument_node="">Sankaran et al., 2010</span></a><span data-dcnode-id="8844" instrument_node="">).</span></p><p data-dcnode-id="8838" id="p0080"><span data-dcnode-id="8842" instrument_node="">Among the recent techniques being used one of the effective imaging methodology is using hyper spectral imaging. In this technique electromagnetic spectrum of an image's pixel is being used for the detection of plant disease present. In this technique wide spectrum of light is being used for the analysis of each image's pixel. It helps in the detection of various diseases in more reasonable manner among the variety of plants being considered. Hyper spectral imaging is further extended when used with microscopy for higher resolution clear images. It helps in microscopic studies at the genotypic level of varied plant leaves. (</span><a class="workspace-trigger" data-dcnode-id="8840" href="#bb0415" name="bbb0415"><span data-dcnode-id="8841" instrument_node="">Rumf et al., 2010</span></a><span data-dcnode-id="8839" instrument_node="">).</span></p></section><section data-dcnode-id="8826" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8831" id="st0025"><span data-dcnode-id="8836" instrument_node="">2</span><span data-dcnode-id="8834" instrument_node="">. </span><span data-dcnode-id="8832" instrument_node="">Imaging sensors and systems for plant disease detection</span></h2><p data-dcnode-id="8829" id="p0090"><span data-dcnode-id="8830" instrument_node="">Digital Image Analysis has evolved over many years. It firstly began with the era of 2D image analysis came. Secondly, knowledge based approaches using MRI and CT changed the developmental procedures. Lastly, analysis of fully 3D images was brought to the light. Digital model driven approaches were introduced in the beginning and then after 1999 till today advanced imaging and computing technologies are used for better and more realistic visualization as per requirements. Machine Learning methods have also evolved eventually.</span></p><p data-dcnode-id="8827" id="p0095"><span data-dcnode-id="8828" instrument_node="">For identification of different plant disease, sensors for imaging system are deployed to accumulate the data for study of leaves from different aspect. Various useful imaging techniques include thermal imaging, multispectral imaging, fluorescence imaging, hyper spectral imaging, visible imaging, MRT. Also 3D imaging methods are also tested along various other methods. In next sections we present a state of survey on these techniques along with their applications in different ways.</span></p></section><section data-dcnode-id="7296" id="s0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8820" id="st0030"><span data-dcnode-id="8825" instrument_node="">3</span><span data-dcnode-id="8823" instrument_node="">. </span><span data-dcnode-id="8821" instrument_node="">Literature survey</span></h2><section data-dcnode-id="8811" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8814" id="st0035"><span data-dcnode-id="8819" instrument_node="">3.1</span><span data-dcnode-id="8817" instrument_node="">. </span><span data-dcnode-id="8815" instrument_node="">Magnetic resonance imaging</span></h3><p data-dcnode-id="8812" id="p0100"><span data-dcnode-id="8813" instrument_node="">Also termed as NMR, meaning nuclear magnetic resonance scanner, it is mostly known as magnetic resonance imaging device, is usually identified for its powerful magnets. These magnets are good as they efficiently polarize and further excites the focused proton singly included in water molecules present in the tissue, helping in a detectable signal spatially encoded giving various images of the body. Radio Frequency (RF) pulses are emitted by MRI machines that bind only to oxygen. This system works by initially generating the pulse and transferring it to the examined area of the body. Later they are made to spin in a different orientation by absorption of the send energy. This is called the resonance process involved in the MRI.</span></p></section><section data-dcnode-id="8802" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8805" id="st0040"><span data-dcnode-id="8810" instrument_node="">3.2</span><span data-dcnode-id="8808" instrument_node="">. </span><span data-dcnode-id="8806" instrument_node="">Photo acoustic imaging</span></h3><p data-dcnode-id="8803" id="p0105"><span data-dcnode-id="8804" instrument_node="">Photo acoustic imaging is a technique that has been derived using hybrid biomedical imaging that is originated around the photo acoustic effect. It involves the amalgamation of different benefits such as optical absorption contrast along ultrasonic spatial resolution involved in deep imaging of diffusive and other regime. The studies bring the fact that photo acoustic imaging can be used for various purposes such as tumor analyzing, mapping of the level of blood oxygen, imaging of the brain activity, and other disease detection, etc.</span></p></section><section data-dcnode-id="8793" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8796" id="st0045"><span data-dcnode-id="8801" instrument_node="">3.3</span><span data-dcnode-id="8799" instrument_node="">. </span><span data-dcnode-id="8797" instrument_node="">Tomography</span></h3><p data-dcnode-id="8794" id="p0110"><span data-dcnode-id="8795" instrument_node="">Tomography is one of the techniques that involve imaging of a single plane, or an object giving a tomogram. There are different types of tomography such as linear, poly tomography, zonagraphy, computed type or computed axial and Positron Emission type of tomography.</span></p></section><section data-dcnode-id="8774" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8787" id="st0050"><span data-dcnode-id="8792" instrument_node="">3.4</span><span data-dcnode-id="8790" instrument_node="">. </span><span data-dcnode-id="8788" instrument_node="">Thermography</span></h3><p data-dcnode-id="8785" id="p0115"><span data-dcnode-id="8786" instrument_node="">One of the most common applications of it is breast imaging. Usually one of the three approaches are being used commonly, the tele- thermography, the dynamic angio-thermography and the contact thermography type. The imaging thermographic digital methods involve the advantage of the principle derived from metabolic activity. Also vascular circulation with the area surrounding a developing breast cancer is studied to detect the higher value.</span></p><p data-dcnode-id="8780" id="p0120"><span data-dcnode-id="8784" instrument_node="">The paper (Anne -Katrin </span><a class="workspace-trigger" data-dcnode-id="8782" href="#bb0265" name="bbb0265"><span data-dcnode-id="8783" instrument_node="">Mahlein et al., 2012</span></a><span data-dcnode-id="8781" instrument_node="">) brings the use of noninvasive sensors for detection of plant diseases. Sensors types like thermography, chlorophyll fluorescence and hyper spectral sensors are being studied and compared. It is observed that hyper spectral systems record very large amount of data and hence require different approaches to obtain result. In thermography, temperature is the crucial parameter. The challenge is that the potential of these technologies have not yet been fully explored. Another challenge is the interpretation of sensor data.</span></p><p data-dcnode-id="8775" id="p0125"><span data-dcnode-id="8779" instrument_node="">This paper (</span><a class="workspace-trigger" data-dcnode-id="8777" href="#bb0115" name="bbb0115"><span data-dcnode-id="8778" instrument_node="">Fang and Ramasamy, 2015</span></a><span data-dcnode-id="8776" instrument_node="">) gives the various methods of disease classifications in plants. Direct method includes PCR (polymerase chain reaction), IF (Immuno Fluorescence), (Fluorescence in situ hybridization), FCM (Flow cytometry) and ELISA (Enzyme linked immunosorbent assay) etc. Types of indirect method includes Fluorescence imaging, also discusses the hyper spectral imaging. The direct method is widely available but is difficult to operate, time consuming for data analysis and require expert technicians. Also they are not much apt for different type of testing. Indirect method can be used in on field disease detection but lack specification of different disease types with the advent of nanotechnology, there is vast advancement of sensitive biosensor whose specify can be further improved using enzymes, DNA, antibiotics as the detection element.</span></p></section><section data-dcnode-id="8752" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8768" id="st0055"><span data-dcnode-id="8773" instrument_node="">3.5</span><span data-dcnode-id="8771" instrument_node="">. </span><span data-dcnode-id="8769" instrument_node="">Spectroscopic and imaging technologies</span></h3><p data-dcnode-id="8763" id="p0130"><span data-dcnode-id="8767" instrument_node="">The paper compares the technologies like imaging technologies using spectroscopy along profiling based techniques used to asset in looking the usual health and disease in leaves. The advantage of using these technologies is that they are accurate in detecting pant disease. The challenges which are faced in these techniques is to find the optimize solution for a definite disease of plant and also automating the techniques for continuous checking of the plant disease. (</span><a class="workspace-trigger" data-dcnode-id="8765" href="#bb0415" name="bbb0415"><span data-dcnode-id="8766" instrument_node="">Sankaran et al., 2010</span></a><span data-dcnode-id="8764" instrument_node="">).</span></p><p data-dcnode-id="8758" id="p0135"><span data-dcnode-id="8762" instrument_node="">Major oil content makes peanut an important agricultural product. This paper (</span><a class="workspace-trigger" data-dcnode-id="8760" href="#bb0110" name="bbb0110"><span data-dcnode-id="8761" instrument_node="">EwisOmran, 2016</span></a><span data-dcnode-id="8759" instrument_node="">) presents a method for early identification of plant disease. It basically focuses on the study of effect of fungal disease as leaf spots in peanut plant leaves. Early and late leaf indices were identified with the help of in situ spectroscopy. It further involved thermal and spectral calculations for differentiating healthy and infected plant leaves. Later plant chlorophyll decrease is also being identified as a stress detection factor among the infected leaves.</span></p><p data-dcnode-id="8753" id="p0140"><span data-dcnode-id="8757" instrument_node="">This paper (Federico </span><a class="workspace-trigger" data-dcnode-id="8755" href="#bb0270" name="bbb0270"><span data-dcnode-id="8756" instrument_node="">Martinelli et al., 2015</span></a><span data-dcnode-id="8754" instrument_node="">) describes modern method of identification of disease in plants based on nucleic acid and protein analysis. This paper describes different mobility spectrometer and lateral flow devices which will detect early infections directly on fluid. It also summarizes that remote sensing technologies coupled with spectroscopy based methods results in high spatialization and hence help in early identification of any infections in plants. The paper discusses all these tools and how they are helpful in looking for different plant disease and also nucleic acid based methods and serological methods.</span></p></section><section data-dcnode-id="8743" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8746" id="st0060"><span data-dcnode-id="8751" instrument_node="">3.6</span><span data-dcnode-id="8749" instrument_node="">. </span><span data-dcnode-id="8747" instrument_node="">Multispectral imaging</span></h3><p data-dcnode-id="8744" id="p0145"><span data-dcnode-id="8745" instrument_node="">Multispectral imaging techniques use different types of wavebands such as of green, as of red, or near infrared wavebands to capture all types of images rather it be invisible or being it visible images of fruits or crops or it being vegetation. For plant diseases detection the multispectral images integrate with machine learning and classification algorithms which give the information into meaningful data.</span></p></section><section data-dcnode-id="7529" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8737" id="st0065"><span data-dcnode-id="8742" instrument_node="">3.7</span><span data-dcnode-id="8740" instrument_node="">. </span><span data-dcnode-id="8738" instrument_node="">Hyperspectral imaging</span></h3><p data-dcnode-id="8729" id="p0150"><span data-dcnode-id="8736" instrument_node="">Hyper-spectral imaging makes the use of much traditional imaging technique along with the spectroscopy to aggregate different spectral information simultaneously. The objective of this technique is to find the spectrum for involved pixel contributing to the image being considered. In Hyper spectral imaging device is deployed for a wavelength dispersion and also a transportation stage are present in addition different from the traditional computer vision system. (</span><a class="workspace-trigger" data-dcnode-id="8734" href="#bb0225" name="bbb0225"><span data-dcnode-id="8735" instrument_node="">Li et al., 2017</span></a><span data-dcnode-id="8733" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="8731" href="#bb0410" name="bbb0410"><span data-dcnode-id="8732" instrument_node="">Rumf et al., 2010</span></a><span data-dcnode-id="8730" instrument_node="">).</span></p><div data-dcnode-id="7602"><p data-dcnode-id="8712" id="p0155"><span data-dcnode-id="8728" instrument_node="">The human eye has a capacity of vision for a definite range from the electromagnetic spectrum that belongs 400 to 700&nbsp;nm (</span><a class="workspace-trigger" data-dcnode-id="8726" href="#f0005" name="bf0005"><span data-dcnode-id="8727" instrument_node="">Fig. 1</span></a><span data-dcnode-id="8725" instrument_node="">) (Amy </span><a class="workspace-trigger" data-dcnode-id="8723" href="#bb0245" name="bbb0245"><span data-dcnode-id="8724" instrument_node="">Lowe et al., 2017</span></a><span data-dcnode-id="8722" instrument_node="">). Hyperspectral imaging typically contains number of restricted wavelength bands across a spectral range. This brings a color dataset with useful information, also containing huge spatial resolution which contains thousands of data pixels per leaf (Amy </span><a class="workspace-trigger" data-dcnode-id="8720" href="#bb0245" name="bbb0245"><span data-dcnode-id="8721" instrument_node="">Lowe et al., 2017</span></a><span data-dcnode-id="8719" instrument_node="">). (See </span><a class="workspace-trigger" data-dcnode-id="8717" href="#t0005" name="bt0005"><span data-dcnode-id="8718" instrument_node="">Table 1</span></a><span data-dcnode-id="8716" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8714" href="#t0010" name="bt0010"><span data-dcnode-id="8715" instrument_node="">Table 2</span></a><span data-dcnode-id="8713" instrument_node="">.)</span></p><figure class="figure text-xs" data-dcnode-id="8690" id="f0005"><span data-dcnode-id="8702"><img alt="Fig. 1" aria-describedby="ca0005" data-dcnode-id="8711" height="397" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2589721720300295-gr1.jpg&amp;raw"><span data-dcnode-id="8710" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8703"><li data-dcnode-id="8704"><a class="anchor download-link u-font-sans" data-dcnode-id="8705" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2589721720300295-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8706"><span data-dcnode-id="8709" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8707"><span data-dcnode-id="8708" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8691"><span data-dcnode-id="8692" id="ca0005"><p data-dcnode-id="8693" id="sp0005"><span class="label" data-dcnode-id="8700"><span data-dcnode-id="8701" instrument_node="">Fig. 1</span></span><span data-dcnode-id="8699" instrument_node="">. </span><span data-dcnode-id="8697" instrument_node="">Hyperspectralrange in Electromagnetic spectrum (Amy </span><a class="workspace-trigger" data-dcnode-id="8695" href="#bb0245" name="bbb0245"><span data-dcnode-id="8696" instrument_node="">Lowe et al., 2017</span></a><span data-dcnode-id="8694" instrument_node="">).</span></p></span></span></figure><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="8075" id="t0005"><span class="captions" data-dcnode-id="8682"><span data-dcnode-id="8683" id="ca0035"><p data-dcnode-id="8684" id="sp0035"><span class="label" data-dcnode-id="8688"><span data-dcnode-id="8689" instrument_node="">Table 1</span></span><span data-dcnode-id="8687" instrument_node="">. </span><span data-dcnode-id="8685" instrument_node="">Analysis of various algorithms.</span></p></span></span><div class="groups" data-dcnode-id="8076"><table data-dcnode-id="8077"><thead data-dcnode-id="8668"><tr class="rowsep-1 valign-top" data-dcnode-id="8669"><th data-dcnode-id="8680" scope="col"><span data-dcnode-id="8681" instrument_node="">Species</span></th><th data-dcnode-id="8678" scope="col"><span data-dcnode-id="8679" instrument_node="">Optical technique</span></th><th data-dcnode-id="8676" scope="col"><span data-dcnode-id="8677" instrument_node="">Application<
