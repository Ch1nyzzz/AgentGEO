" instrument_node="">(</span><a class="workspace-trigger" data-dcnode-id="7610" href="#bb0405" name="bbb0405"><span data-dcnode-id="7611" instrument_node="">Römer et al., 2011</span></a><span data-dcnode-id="7609" instrument_node="">)</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="7597" id="p0160"><span data-dcnode-id="7601" instrument_node="">In plants stresses can be classified as biotic and non-biotic where biotic are being induced by beings as viruses, fungi and others. In paper (</span><a class="workspace-trigger" data-dcnode-id="7599" href="#bb0030" name="bbb0030"><span data-dcnode-id="7600" instrument_node="">Baranowski et al., 2015</span></a><span data-dcnode-id="7598" instrument_node="">) hyper spectral imaging and the thermal imaging identifies plant stress due to fungi in oilseed rape. Initially the thermal images of oilseed rape were being analyzed for temperature distributions. Also hyper spectral images were also recorded. Further distributions temperatures were compared using kernel density curves. Spectral analysis of the leaves with different reflectance was again analyzed.</span></p><p data-dcnode-id="7592" id="p0165"><span data-dcnode-id="7596" instrument_node="">Paper (</span><a class="workspace-trigger" data-dcnode-id="7594" href="#bb0075" name="bbb0075"><span data-dcnode-id="7595" instrument_node="">Calderón et al., 2015</span></a><span data-dcnode-id="7593" instrument_node="">) gives a description about a method for automatic classification of Verticillium Wilt in olive plants considering techniques useful for large scale. Initially thermal and hyper spectral.</span></p><p data-dcnode-id="7590" id="p0170"><span data-dcnode-id="7591" instrument_node="">Images were acquired over large scale olive orchid. Various vegetation indices as optimized soil adjusted vegetation indices were taken into account while modeling for this study. Correlation coefficient for completer canopy was also used for determining the level of disease spread. Later SVM classification was done for the bifurcating levels of disease. Almond production depends on major environmental factors as climate, sites, resistance to diseases and others.</span></p><p data-dcnode-id="7585" id="p0175"><span data-dcnode-id="7589" instrument_node="">Paper (</span><a class="workspace-trigger" data-dcnode-id="7587" href="#bb0235" name="bbb0235"><span data-dcnode-id="7588" instrument_node="">López-López et al., 2016</span></a><span data-dcnode-id="7586" instrument_node="">) detects early onset of red leaf blotch using thermal and hyper spectral imagery while studying the infection spread subjected to different factors. Here Spectral reflectance across visible regions was used for measurement along with near infrared region also. Later indices as pigment concentration of chlorophyll, chlorophyll fluorescence were considered for comparison. Finally amalgamated information from the different parameters was used for analyzing while developing model to quantify disease seriousness. Further the information gained from the analysis was again passed to multiple classification methods as linear discriminate analysis, support vector machine for proper analysis. Also it is found that linear SVM method is more efficient in early detection of red leaf blotch.</span></p><p data-dcnode-id="7577" id="p0180"><span data-dcnode-id="7584" instrument_node="">The paper (</span><a class="workspace-trigger" data-dcnode-id="7582" href="#bb0080" name="bbb0080"><span data-dcnode-id="7583" instrument_node="">Cao et al., 2015a</span></a><span data-dcnode-id="7581" instrument_node="">) demonstrated that for wheat powdery mildew detection, canopy hyperspectral reflectance can be used while analyzing the unhealthy symptoms. It being observed that wheat cultivators responded more sensitively to canopy reflectance in which wheat cultivars were more susceptible to powdery mildew. The challenge faced here included discriminating the wheat powdery mildew from other ailments. This paper (Kamlesh </span><a class="workspace-trigger" data-dcnode-id="7579" href="#bb0135" name="bbb0135"><span data-dcnode-id="7580" instrument_node="">Golhani et al., 2018</span></a><span data-dcnode-id="7578" instrument_node="">) discusses various techniques for the processing and detailing of the data used for hyper spectral analysis, giving special emphasis on detection of plant disease. This paper introduces NN techniques for the development of spectral disease index (SDI). Data being different from camera images, results in difficulty of linearity detection of hyperspectral image. The various challenged faced in NN are like detection of the diseases of three categories such as pre symptomatic and asymptomatic for a single plant.</span></p><p data-dcnode-id="7572" id="p0185"><span data-dcnode-id="7576" instrument_node="">The paper (</span><a class="workspace-trigger" data-dcnode-id="7574" href="#bb0245" name="bbb0245"><span data-dcnode-id="7575" instrument_node="">Lowe et al., 2017</span></a><span data-dcnode-id="7573" instrument_node="">) summarizes the techniques to detect different stress in plants and it focuses on hyperspectral imaging method to detect the early beginning of disease and to predict about the health of the plant. Various indices are increasing day by day and they are important to detect specific criteria for vegetation. For example, vegetation index can be used identify the normal health of the plant but the challenge is we cannot use the index set for one plant and use it for the data of another plant.</span></p><p data-dcnode-id="7567" id="p0190"><span data-dcnode-id="7571" instrument_node="">The paper (</span><a class="workspace-trigger" data-dcnode-id="7569" href="#bb0260" name="bbb0260"><span data-dcnode-id="7570" instrument_node="">Mahlein et al., 2013</span></a><span data-dcnode-id="7568" instrument_node="">) discusses development of different disease index (SDIs) for the identification of diseases in crop plants of sugar beet and the leaf diseases as leaf spot, sugar beet and others. At different stages of development, hyper spectral signatures were assessed for both healthy and diseased leaves. For differentiating between diseased and healthy leaves, several optimized indices of disease were tested. The advantage of SDI is that SDI disease can be easily distinguished which is difficult using vegetative indices. The challenge is to send the generated SDI and to specify its usability for disease monitoring on canopy with different sensors.</span></p><p data-dcnode-id="7559" id="p0195"><span data-dcnode-id="7566" instrument_node="">This paper (</span><a class="workspace-trigger" data-dcnode-id="7564" href="#bb0255" name="bbb0255"><span data-dcnode-id="7565" instrument_node="">Mahlein et al., 2017</span></a><span data-dcnode-id="7563" instrument_node="">) discusses hyperspectral imaging and data analysis routines to identify and quantify relevant plant diseases. Hyperspectral imaging can be helpful in giving new insight into data of different plant at different level. This paper (</span><a class="workspace-trigger" data-dcnode-id="7561" href="#bb0295" name="bbb0295"><span data-dcnode-id="7562" instrument_node="">Moghadam et al., 2017</span></a><span data-dcnode-id="7560" instrument_node="">) discuses imaging methods (VNIR and SWIR) along ml technologies for the identification of TSWW, i.e. Tomato Spotted Wilt Virusin capsicum in plants.</span></p><p data-dcnode-id="7551" id="p0200"><span data-dcnode-id="7558" instrument_node="">The paper (</span><a class="workspace-trigger" data-dcnode-id="7556" href="#bb0335" name="bbb0335"><span data-dcnode-id="7557" instrument_node="">Ochoa et al., 2016</span></a><span data-dcnode-id="7555" instrument_node="">) discusses about building a hyperspectral imaging system for identification of Black Sigatoke (BS) disease found in plant and its pre-symptomatic responses in banana leaves. To capture images, a highly sensitive VIS-NIR camera is used the HS cube images with reduce motion blur. After the step of capturing of images another step is performed for enhancement of the quality of HS images. The paper (</span><a class="workspace-trigger" data-dcnode-id="7553" href="#bb0345" name="bbb0345"><span data-dcnode-id="7554" instrument_node="">Okamoto et al., 2007</span></a><span data-dcnode-id="7552" instrument_node="">) proposes to develop a weed detection method using hyperspectral imaging to control weed detection. According to the species, plants can be categorized as crops and weeds. Using hyper spectral imaging, first of all the plants is segmented from the soil surface. Then image pixel of crop and weed are classified with the help of species other characteristics. Various classes of variables are generated which are then used for data compression, followed by the process of extraction of features and then on it linear discrimination is applied. Among other advantages one of the major advantages is that this classification method can be practically applied.</span></p><p data-dcnode-id="7546" id="p0205"><span data-dcnode-id="7550" instrument_node="">The paper (</span><a class="workspace-trigger" data-dcnode-id="7548" href="#bb0380" name="bbb0380"><span data-dcnode-id="7549" instrument_node="">Ray et al., 2011</span></a><span data-dcnode-id="7547" instrument_node="">) discusses late blight disease detection in potato using hyper spectral reflectance data using spectro radiometer over specific spectral range. It was observed that in 770–860, also 920–1050&nbsp;nm range there can be noticeable difference found between healthy and diseased plants of potatoes. This paper discusses the advantage of spectral data for identification of disease.</span></p><p data-dcnode-id="7538" id="p0210"><span data-dcnode-id="7545" instrument_node="">The paper (</span><a class="workspace-trigger" data-dcnode-id="7543" href="#bb0500" name="bbb0500"><span data-dcnode-id="7544" instrument_node="">Zhang et al., 2012</span></a><span data-dcnode-id="7542" instrument_node="">) discusses the use of hyperspectral reflectance of normal in comparison to infected leaves. This is checked with a spectro radiometer is a lab 32 spectral features were extracted, and then they are examined with </span><em data-dcnode-id="7540"><span data-dcnode-id="7541" instrument_node="">t</span></em><span data-dcnode-id="7539" instrument_node="">-test, correlation analysis, fisher linear discriminant analysis. It was observed that PLSR performed well as compared to MLR model. Also FLDA gave accuracy of 90% for heavily damaged leaves. The challenge is to use these methods on fields i.e. at canopy level.</span></p><p data-dcnode-id="7530" id="p0215"><span data-dcnode-id="7537" instrument_node="">The paper (</span><a class="workspace-trigger" data-dcnode-id="7535" href="#bb0510" name="bbb0510"><span data-dcnode-id="7536" instrument_node="">Zhao et al., 2016</span></a><span data-dcnode-id="7534" instrument_node="">) discusses the technique of hyperspectral imaging to identify chlorophyll and carotenoid contents in cucumber plant leaves with major infection cases of angular leaf spot (ALS). It was observed that PLSR models results with coefficient correlation predicting 0.871 and 0.876 for Chlorophyll and Carotenoids. The outcomes showed that hyperspectral imaging with chemometrics is a feasible approach to find the presence of disease leaf spot in cucumber leaves. The paper (</span><a class="workspace-trigger" data-dcnode-id="7532" href="#bb0240" name="bbb0240"><span data-dcnode-id="7533" instrument_node="">Lopez-Lopez et al., 2016</span></a><span data-dcnode-id="7531" instrument_node="">) discusses the application of hyperspectral imagery and high resolution imagery to detect the presence of leaf blotch in almond studied. The paper discusses the use of canopy temperature and vegetation indices to early identify presence of disease. It was observed that all three including chlorophyll fluorescence are prominent in early identification of detection in almond plants.</span></p></section><section data-dcnode-id="7458" id="s0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7523" id="st0070"><span data-dcnode-id="7528" instrument_node="">3.8</span><span data-dcnode-id="7526" instrument_node="">. </span><span data-dcnode-id="7524" instrument_node="">Fluorescence techniques</span></h3><div data-dcnode-id="7498"><p data-dcnode-id="7518" id="p0220"><span data-dcnode-id="7522" instrument_node="">Fluorescence techniques (</span><a class="workspace-trigger" data-dcnode-id="7520" href="#f0010" name="bf0010"><span data-dcnode-id="7521" instrument_node="">Fig. 2</span></a><span data-dcnode-id="7519" instrument_node="">.) have been widely used for investigation of the photosynthetic performance in plants. This technique is very useful for crop monitoring which allow us to alleviate stress at an early stage and thus substantially reducing yield losses.</span></p><figure class="figure text-xs" data-dcnode-id="7499" id="f0010"><span data-dcnode-id="7508"><img alt="Fig. 2" aria-describedby="ca0010" data-dcnode-id="7517" height="304" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2589721720300295-gr2.jpg&amp;raw"><span data-dcnode-id="7516" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7509"><li data-dcnode-id="7510"><a class="anchor download-link u-font-sans" data-dcnode-id="7511" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2589721720300295-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7512"><span data-dcnode-id="7515" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7513"><span data-dcnode-id="7514" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7500"><span data-dcnode-id="7501" id="ca0010"><p data-dcnode-id="7502" id="sp0010"><span class="label" data-dcnode-id="7506"><span data-dcnode-id="7507" instrument_node="">Fig. 2</span></span><span data-dcnode-id="7505" instrument_node="">. </span><span data-dcnode-id="7503" instrument_node="">Fluorescence Imaging Techniques.</span></p></span></span></figure></div><p data-dcnode-id="7484" id="p0225"><span data-dcnode-id="7497" instrument_node="">In this (</span><a class="workspace-trigger" data-dcnode-id="7495" href="#bb0365" name="bbb0365"><span data-dcnode-id="7496" instrument_node="">Pérez-Bueno et al., 2016</span></a><span data-dcnode-id="7494" instrument_node="">) paper the proposed work highlights the useful benefits of imaging systems based on multicolor fluorescence, making use of thermograph for zucchini plants affected by disorder, caused by </span><em data-dcnode-id="7492"><span data-dcnode-id="7493" instrument_node="">Dickeyadadantii</span></em><span data-dcnode-id="7491" instrument_node="">. Different machine learning technique has been applied which classify the input samples as healthy or infected samples. (</span><a class="workspace-trigger" data-dcnode-id="7489" href="#bb0365" name="bbb0365"><span data-dcnode-id="7490" instrument_node="">Pérez-Bueno et al., 2016</span></a><span data-dcnode-id="7488" instrument_node="">). In paper (</span><a class="workspace-trigger" data-dcnode-id="7486" href="#bb0315" name="bbb0315"><span data-dcnode-id="7487" instrument_node="">Moshoua et al., 2005</span></a><span data-dcnode-id="7485" instrument_node="">) the detection of Wheat plant disease is being identified with the data fusion techniques. It also shows the use of self-organizing map neural network on reflectance data. It reflects the method of identification of yellow rust using wheat plant spread over farm area. Later multi-spectral fluorescence imaging systems was done on sampled canopy. Further leaf disease detection is done using indices as normalized vegetation and others. This paper shows the use of fluorescence induction and spectral reflection for the disease presence detection.</span></p><p data-dcnode-id="7479" id="p0230"><span data-dcnode-id="7483" instrument_node="">Paper (</span><a class="workspace-trigger" data-dcnode-id="7481" href="#bb0215" name="bbb0215"><span data-dcnode-id="7482" instrument_node="">LauryChaerle et al., 2004</span></a><span data-dcnode-id="7480" instrument_node="">) makes use of chlorophyll fluorescence imaging and thermograph for knowing and comparison of infection by fungus and viral infection in plant leaves. Here both the imaging techniques are used comparatively under different growth scenarios for pathogen plant interaction study. Firstly, the imaging of tobacco leaf is analyzed for the lesion presence resulting from TVM. Also the usage of salicylic acid application on tobacco leaves is further checked by color reflectance. Secondly beet root is again sprayed with Cercosporabeticola spore solution. Here the different response of different temperatures resulting in varied fluorescence effects is being characterized. This paper briefs about the combined usage of multiple types of imaging for plant and various pathogen combination for early symptoms detection.</span></p><p data-dcnode-id="7474" id="p0235"><span data-dcnode-id="7478" instrument_node="">Crop quality is also a great factor taken into consideration while estimation of agricultural overall production. Paper (</span><a class="workspace-trigger" data-dcnode-id="7476" href="#bb0035" name="bbb0035"><span data-dcnode-id="7477" instrument_node="">Bauriegel and Herppich, 2014a</span></a><span data-dcnode-id="7475" instrument_node="">) presents the detection of head blight disease in wheat plants using chlorophyll fluorescence and also with hyper spectral imaging. It signifies the ways in which hyper spectral imaging is being useful for higher information density extraction. In this paper the different imaging techniques are being further highlighted as better methods of early bight disease detection.</span></p><p data-dcnode-id="7469" id="p0240"><span data-dcnode-id="7473" instrument_node="">Timely identification of disease among the plants may result in better procurement and agricultural productions. Paper (</span><a class="workspace-trigger" data-dcnode-id="7471" href="#bb0405" name="bbb0405"><span data-dcnode-id="7472" instrument_node="">Römer et al., 2011</span></a><span data-dcnode-id="7470" instrument_node="">) presents a method for differentiating leaf rust wheat leaf from healthy leaf at early level. This paper presents pre symptomatic detection and further classification using support vector machine method. It also presents use of Fluorescence detection using fluorescence spectrometer for collection of various parameters. Further support vector machine was being used classification for healthy and inoculated leaves. Finally, fluorescence signatures used during polynomial fitting presents a technique for detection of disease.</span></p><p data-dcnode-id="7464" id="p0245"><span data-dcnode-id="7468" instrument_node="">The paper (</span><a class="workspace-trigger" data-dcnode-id="7466" href="#bb0040" name="bbb0040"><span data-dcnode-id="7467" instrument_node="">Bauriegel and Herppich, 2014b</span></a><span data-dcnode-id="7465" instrument_node="">) discuss about how chlorophyll fluorescence and hyper spectral imaging, can help in identifying fusarium head blight in wheat both in laboratory and field. Also two methods hyperspectral imaging and CFI analysis are compared seeking their usage in detecting fusarium. The CFI methodology is helpful during the initial phase of inspection whereas hyperspectral imaging involves various wavelengths in image analysis and thus helps in meaningful monitoring of the disease. Hyperspectral imaging is effective while dealing with the visibility of infection symptoms. The challenges are that for any image based methodology on field recording of head blight will require two passages over crop whether the imaging system are used single or being combined.</span></p><p data-dcnode-id="7459" id="p0250"><span data-dcnode-id="7463" instrument_node="">The paper (</span><a class="workspace-trigger" data-dcnode-id="7461" href="#bb0310" name="bbb0310"><span data-dcnode-id="7462" instrument_node="">Moshou et al., 2005</span></a><span data-dcnode-id="7460" instrument_node="">) discusses about combination of imaging techniques using hyper spectral reflection with fluorescence for distinguishing yellow rust disease with wheat of the increasing disease, hence the paper discusses about the formation of a real time remote sensing system for disease detection. The images from hyper and multi spectral fluorescence reflection, are used to find the of disease present. It is found that fusing the measurements from the two methods gave discrimination of 94.5% by using QDA. The methodology used for date fusion is SOM (self-organizing map) NN. The advantage of using fusion of measurements from different optical sensors is that they identify disease is field with more accuracy. This methodology shows potential for implementing in field also.</span></p></section><section data-dcnode-id="7380" id="s0060"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7452" id="st0075"><span data-dcnode-id="7457" instrument_node="">3.9</span><span data-dcnode-id="7455" instrument_node="">. </span><span data-dcnode-id="7453" instrument_node="">Thermal imaging</span></h3><div data-dcnode-id="7427"><p data-dcnode-id="7447" id="p0255"><span data-dcnode-id="7451" instrument_node="">This (</span><a class="workspace-trigger" data-dcnode-id="7449" href="#f0015" name="bf0015"><span data-dcnode-id="7450" instrument_node="">Fig. 3</span></a><span data-dcnode-id="7448" instrument_node="">) is a process that convert the various radiation identified from an object to different types of images for extraction of varied features, analysis along with classifying them. It was firstly used for defense needs but later gained a major use in different fields such as engineering techniques used in agriculture.</span></p><figure class="figure text-xs" data-dcnode-id="7428" id="f0015"><span data-dcnode-id="7437"><img alt="Fig. 3" aria-describedby="ca0015" data-dcnode-id="7446" height="394" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2589721720300295-gr3.jpg&amp;raw"><span data-dcnode-id="7445" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7438"><li data-dcnode-id="7439"><a class="anchor download-link u-font-sans" data-dcnode-id="7440" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2589721720300295-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7441"><span data-dcnode-id="7444" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7442"><span data-dcnode-id="7443" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7429"><span data-dcnode-id="7430" id="ca0015"><p data-dcnode-id="7431" id="sp0015"><span class="label" data-dcnode-id="7435"><span data-dcnode-id="7436" instrument_node="">Fig. 3</span></span><span data-dcnode-id="7434" instrument_node="">. </span><span data-dcnode-id="7432" instrument_node="">Thermal imaging.</span></p></span></span></figure></div><p data-dcnode-id="7422" id="p0260"><span data-dcnode-id="7426" instrument_node="">Several instruments and methods have been developed for thermal imaging of plant. The thermal imaging method is very useful for many different operations of agriculture before and after harvesting. For this site specific Crop management and precision farming, Thermal imaging is an important phenomenon where Plant, soil, and water relationship has been studied in detail by several researchers. (</span><a class="workspace-trigger" data-dcnode-id="7424" href="#bb0465" name="bbb0465"><span data-dcnode-id="7425" instrument_node="">Vadivambal and Digvir, 2011</span></a><span data-dcnode-id="7423" instrument_node="">).</span></p><p data-dcnode-id="7414" id="p0265"><span data-dcnode-id="7421" instrument_node="">In paper (</span><a class="workspace-trigger" data-dcnode-id="7419" href="#bb0495" name="bbb0495"><span data-dcnode-id="7420" instrument_node="">Yang et al., 2019</span></a><span data-dcnode-id="7418" instrument_node="">) a method has been described for fast determination of disease in tea leaves using a method making use of application of infrared thermal imaging technology. In paper (</span><a class="workspace-trigger" data-dcnode-id="7416" href="#bb0490" name="bbb0490"><span data-dcnode-id="7417" instrument_node="">Xu et al., 2006</span></a><span data-dcnode-id="7415" instrument_node="">) the comparison of different temperature distribution under the effect of virus strain-TMV on three species of tomato plant leaves are shown. Here thermal images are being used for the determination of changes in pathogen related proteins and salicylic acid in infected leaves and normal leaves. It is also highlighted how the transpiration is affected by pathogen infection.</span></p><p data-dcnode-id="7409" id="p0270"><span data-dcnode-id="7413" instrument_node="">This Paper (</span><a class="workspace-trigger" data-dcnode-id="7411" href="#bb0390" name="bbb0390"><span data-dcnode-id="7412" instrument_node="">Raza et al., 2015a</span></a><span data-dcnode-id="7410" instrument_node="">) focus on the involvement of thermal depth data with visible light image for automatic identification of disease in tomato plant leaves. It shows the way of initial setup done for the acquisition of visual and thermal images. Here a technique for disparity detection has also been proposed.</span></p><p data-dcnode-id="7404" id="p0275"><span data-dcnode-id="7408" instrument_node="">This paper (</span><a class="workspace-trigger" data-dcnode-id="7406" href="#bb0480" name="bbb0480"><span data-dcnode-id="7407" instrument_node="">Wang et al., 2013</span></a><span data-dcnode-id="7405" instrument_node="">) gives a way of using digital infrared thermography for detection of the changes as water loss further affecting the temperature also. It also shows the importance of identification and prevention of fungal toxin for agricultural needs. In this paper the leaf temperature is observed under variant conditions. It also estimated stomata apertures by nail varnish method. Later on leaves with membrane injury were identified along with FA content being measured in different temperatures.</span></p><p data-dcnode-id="7399" id="p0280"><span data-dcnode-id="7403" instrument_node="">Here paper (</span><a class="workspace-trigger" data-dcnode-id="7401" href="#bb0420" name="bbb0420"><span data-dcnode-id="7402" instrument_node="">Sankaran et al., 2013</span></a><span data-dcnode-id="7400" instrument_node="">) shows the requirement of a sensor efficient of determining HLB for overall complete cover. Here infrared along with thermal images are used for detected HLB-infected citrus trees. This paper briefs about the evaluation of the use of multispectral images for HLB detection, by the medium of a mobile ground-based sensor. It initially used two multispectral cameras and one thermal camera for capturing images from the head of the citrus canopies. It further shows the method of using various indices as the average spectral reflectance, structure insensitive pigment and many others. It also uses thermal imaging for identification of stress due to pathogens in plants. Later on different classifiers were used including LDA, BDT, SVM and QDA for classification study for many features.</span></p><p data-dcnode-id="7394" id="p0285"><span data-dcnode-id="7398" instrument_node="">Thermal imaging of plant leaves result in early identification of disease thus reducing large agricultural losses. In paper (</span><a class="workspace-trigger" data-dcnode-id="7396" href="#bb0385" name="bbb0385"><span data-dcnode-id="7397" instrument_node="">Raza et al., 2015b</span></a><span data-dcnode-id="7395" instrument_node="">) an algorithm is proposed for the identification of disease in plants using silhouette registration through visible images. Initially the algorithm detects silhouette through visible light images. It also employs stationary wavelet transform for thermal images for the same. It makes use of gradient-based method in this multi scale approach. This paper also shows that another method that can be further used for different sample using silhouette presence while registering the images.</span></p><p data-dcnode-id="7386" id="p0290"><span data-dcnode-id="7393" instrument_node="">Detection of Plant Disease is possible by digital infrared thermograph as temperature measurement is directly related to water quantity decrease by stomata aperture openings. This paper (</span><a class="workspace-trigger" data-dcnode-id="7391" href="#bb0340" name="bbb0340"><span data-dcnode-id="7392" instrument_node="">Oerke et al., 2006</span></a><span data-dcnode-id="7390" instrument_node="">) shows the study of irregularities presence in plant affected by </span><em data-dcnode-id="7388"><span data-dcnode-id="7389" instrument_node="">P. cubensis</span></em><span data-dcnode-id="7387" instrument_node="">. It also describes detection of downy mildew through temperature difference. Initially the leaves were analyzed for the presence of disease by visual inspection various lesions were recorded for sensitizing disease presence. Later spectral images were used to study the presence of disease on basis of various factors including transpiration rate, stomata apertures and others. Finally, the relation established between electrolyte leakage and transpiration rate for the disease presence d is analyzed.</span></p><p data-dcnode-id="7381" id="p0295"><span data-dcnode-id="7385" instrument_node="">Paper (</span><a class="workspace-trigger" data-dcnode-id="7383" href="#bb0025" name="bbb0025"><span data-dcnode-id="7384" instrument_node="">Awad et al., 2014</span></a><span data-dcnode-id="7382" instrument_node="">) gives a study for early identification of disease such as powdery mildew in plants using thermal images of wheat samples. Firstly, wheat leaves were artificially infected with Erysiphe graminis fungus for experimental purpose. It also made use of greenhouse conditions for complete experimental study. Further the difference in the temperature was measured in normal and was compared with the infected leaves under various conditions. It also shows the various monitoring process after artificial infection. Further changes in temperatures were analyzed. This paper describes the need for recommended expert system for the detection of different disease.</span></p></section><section data-dcnode-id="7297" id="s0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7374" id="st0080"><span data-dcnode-id="7379" instrument_node="">3.10</span><span data-dcnode-id="7377" instrument_node="">. </span><span data-dcnode-id="7375" instrument_node="">3D imaging</span></h3><div data-dcnode-id="7334"><p data-dcnode-id="7354" id="p0300"><span data-dcnode-id="7373" instrument_node="">In 2D Imaging data is taken from two different dimensions which differentiate given some denominations of plants such as development, overall height, and yield estimation. Thus, the need of 3D imaging appears as an essential for automatic plant diseases detection. There are various techniques for 3-D image acquisition (</span><a class="workspace-trigger" data-dcnode-id="7371" href="#bb0050" name="bbb0050"><span data-dcnode-id="7372" instrument_node="">Bellmann et al., 2007</span></a><span data-dcnode-id="7370" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="7368" href="#bb0170" name="bbb0170"><span data-dcnode-id="7369" instrument_node="">Jarvis, 1983</span></a><span data-dcnode-id="7367" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="7365" href="#bb0065" name="bbb0065"><span data-dcnode-id="7366" instrument_node="">Blais, 2004</span></a><span data-dcnode-id="7364" instrument_node="">) and 2-D together with 3-D machinery in applications pertaining to agriculture (</span><a class="workspace-trigger" data-dcnode-id="7362" href="#bb0140" name="bbb0140"><span data-dcnode-id="7363" instrument_node="">Grift, 2008</span></a><span data-dcnode-id="7361" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="7359" href="#bb0275" name="bbb0275"><span data-dcnode-id="7360" instrument_node="">McCarthy et al., 2010</span></a><span data-dcnode-id="7358" instrument_node="">). Block diagram of 3-D imaging system is given below in </span><a class="workspace-trigger" data-dcnode-id="7356" href="#f0020" name="bf0020"><span data-dcnode-id="7357" instrument_node="">Fig. 4</span></a><span data-dcnode-id="7355" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="7335" id="f0020"><span data-dcnode-id="7344"><img alt="Fig. 4" aria-describedby="ca0020" data-dcnode-id="7353" height="121" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2589721720300295-gr4.jpg&amp;raw"><span data-dcnode-id="7352" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7345"><li data-dcnode-id="7346"><a class="anchor download-link u-font-sans" data-dcnode-id="7347" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2589721720300295-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7348"><span data-dcnode-id="7351" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7349"><span data-dcnode-id="7350" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7336"><span data-dcnode-id="7337" id="ca0020"><p data-dcnode-id="7338" id="sp0020"><span class="label" data-dcnode-id="7342"><span data-dcnode-id="7343" instrument_node="">Fig. 4</span></span><span data-dcnode-id="7341" instrument_node="">. </span><span data-dcnode-id="7339" instrument_node="">Block diagram of 3-D imaging.</span></p></span></span></figure></div><p data-dcnode-id="7329" id="p0305"><span data-dcnode-id="7333" instrument_node="">There are two main 3D representations i.e. one concerned with the surface and other with the volume presentations. The first one involves the depth details, the surface element and the different points given by their dimension coordinates. The volume is also given defining the volumetric component and a frequency component of the model's coordinates. In now a day different types of affordable sensors are available. They also exhibhits technologically advanced to a great extent for various domains like nutrient content, growth level, crop presence, biomass estimation, and height and health status. Plant leaf diseases being further analyzed using these sensors because the gathered data can be used for quantifying the previously identified various production characters. (</span><a class="workspace-trigger" data-dcnode-id="7331" href="#bb0475" name="bbb0475"><span data-dcnode-id="7332" instrument_node="">Vázquez-Arellano et al., 2016</span></a><span data-dcnode-id="7330" instrument_node="">).</span></p><div data-dcnode-id="7298"><p data-dcnode-id="7318" id="p0310"><span data-dcnode-id="7328" instrument_node="">Sensors including various types of LIDARs and TOF cameras with their sensors, determine the depth using the light velocity (</span><a class="workspace-trigger" data-dcnode-id="7326" href="#f0025" name="bf0025"><span data-dcnode-id="7327" instrument_node="">Fig. 5</span></a><span data-dcnode-id="7325" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="7323" href="#bb0460" name="bbb0460"><span data-dcnode-id="7324" instrument_node="">Underwood et al., 2013</span></a><span data-dcnode-id="7322" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="7320" href="#bb0210" name="bbb0210"><span data-dcnode-id="7321" instrument_node="">Lachat et al., 2015</span></a><span data-dcnode-id="7319" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="7299" id="f0025"><span data-dcnode-id="7308"><img alt="Fig. 5" aria-describedby="ca0025" data-dcnode-id="7317" height="236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2589721720300295-gr5.jpg&amp;raw"><span data-dcnode-id="7316" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7309"><li data-dcnode-id="7310"><a class="anchor download-link u-font-sans" data-dcnode-id="7311" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2589721720300295-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7312"><span data-dcnode-id="7315" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7313"><span data-dcnode-id="7314" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7300"><span data-dcnode-id="7301" id="ca0025"><p data-dcnode-id="7302" id="sp0025"><span class="label" data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">Fig. 5</span></span><span data-dcnode-id="7305" instrument_node="">. </span><span data-dcnode-id="7303" instrument_node="">Imaging through TOF Sensors.</span></p></span></span></figure></div></section></section><section data-dcnode-id="7134" id="s0070"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7290" id="st0085"><span data-dcnode-id="7295" instrument_node="">4</span><span data-dcnode-id="7293" instrument_node="">. </span><span data-dcnode-id="7291" instrument_node="">Image classification methods for plant disease detection</span></h2><div data-dcnode-id="7265"><p data-dcnode-id="7285" id="p0315"><span data-dcnode-id="7289" instrument_node="">Most important step of Leaf image analysis is segmentation. Image Segmentation is the process which takes an image as a single input and further partition that particular image into different sub segments. In the area of imaging for classification (</span><a class="workspace-trigger" data-dcnode-id="7287" href="#f0030" name="bf0030"><span data-dcnode-id="7288" instrument_node="">Fig. 6</span></a><span data-dcnode-id="7286" instrument_node="">.) purpose, these segments often constitute various classes of tissues, organs or biologically important structures. Here image segmentation becomes challenging due to various factors including low contrast and other imaging ambiguities along with noise.</span></p><figure class="figure text-xs" data-dcnode-id="7266" id="f0030"><span data-dcnode-id="7275"><img alt="Fig. 6" aria-describedby="ca0030" data-dcnode-id="7284" height="296" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2589721720300295-gr6.jpg&amp;raw"><span data-dcnode-id="7283" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7276"><li data-dcnode-id="7277"><a class="anchor download-link u-font-sans" data-dcnode-id="7278" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2589721720300295-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7279"><span data-dcnode-id="7282" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7280"><span data-dcnode-id="7281" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7267"><span data-dcnode-id="7268" id="ca0030"><p data-dcnode-id="7269" id="sp0030"><span class="label" data-dcnode-id="7273"><span data-dcnode-id="7274" instrument_node="">Fig. 6</span></span><span data-dcnode-id="7272" instrument_node="">. </span><span data-dcnode-id="7270" instrument_node="">Plant disease detection and classification.</span></p></span></span></figure></div><section data-dcnode-id="7135" id="s0075"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7259" id="st0090"><span data-dcnode-id="7264" instrument_node="">4.1</span><span data-dcnode-id="7262" instrument_node="">. </span><span data-dcnode-id="7260" instrument_node="">Interactive segmentation</span></h3><p data-dcnode-id="7257" id="p0320"><span data-dcnode-id="7258" instrument_node="">It can be described as one of the techniques that are beneficial where expert can give certain useful information about the seed region or a brief description about the region used to perform segmentation. Further an algorithm works fine for the refinement including the segmentation. There can be other methods also some including manual intervention for providing the different classes of the tissue using pixel information. Along with all lastly, feedback control principle is also being involved with segmentation, which adds to other benefits for the users such as flexibility, the automatic removal of issues.</span></p><p data-dcnode-id="7255" id="p0325"><span data-dcnode-id="7256" instrument_node="">There can be numerous methods that have been brought to application by researchers in last many years; some of them are reviewed as following.</span></p><p data-dcnode-id="7248" id="p0330"><a class="workspace-trigger" data-dcnode-id="7253" href="#bb0505" name="bbb0505"><span data-dcnode-id="7254" instrument_node="">Yan Cheng Zhang et al. (2007)</span></a><span data-dcnode-id="7252" instrument_node=""> brought one of the Selection methods to light, that makes use of fuzzy curves for the identification of presence of disease in cotton plant leaves. The given technique has been found to be better in terms of the speed of the execution. It yields a better classification result without being affected by the local minima issues that are otherwise usually prominent in the nonlinear methods. Savita N Ghaiwat also gave a survey of the different types of the classification methods feasible for detection of various diseases in plant leaves (</span><a class="workspace-trigger" data-dcnode-id="7250" href="#bb0130" name="bbb0130"><span data-dcnode-id="7251" instrument_node="">Ghaiwat and Arora, 2014</span></a><span data-dcnode-id="7249" instrument_node="">).</span></p><p data-dcnode-id="7238" id="p0335"><a class="workspace-trigger" data-dcnode-id="7246" href="#bb0010" name="bbb0010"><span data-dcnode-id="7247" instrument_node="">Al Bashish et al. (2010)</span></a><span data-dcnode-id="7245" instrument_node=""> discussed one of the segmentation method based on K-mean. Here different disease such as cottony meld, tiny whiteness is being detected using this. It also shows the use of ANN for further identification of disease as early scorch and ashen meld present in various plants. In this paper the results giving accuracy rate of 93% has been discussed. A. </span><a class="workspace-trigger" data-dcnode-id="7243" href="#bb0280" name="bbb0280"><span data-dcnode-id="7244" instrument_node="">Meunkaewjinda et al. (2008)</span></a><span data-dcnode-id="7242" instrument_node="">, also has given a technique for the early identification of disease present in specifically grape leaves. It also exhibits classification using support vector machine. </span><a class="workspace-trigger" data-dcnode-id="7240" href="#bb0180" name="bbb0180"><span data-dcnode-id="7241" instrument_node="">Jaware et al. (2012)</span></a><span data-dcnode-id="7239" instrument_node=""> has proposed a faster classification algorithm. Here different types of diseases such as Early Scorch, Cottony meld and tiny whiteness have been identified easily using this technique. This method has been shown as an optimum method for detection of the varied diseases in shorter span of time.</span></p><p data-dcnode-id="7234" id="p0340"><a class="workspace-trigger" data-dcnode-id="7236" href="#bb0150" name="bbb0150"><span data-dcnode-id="7237" instrument_node="">Gurjar and Gulhane (2012)</span></a><span data-dcnode-id="7235" instrument_node=""> briefed about the regularization method. Here a technique has been discussed that involves the use of Eigen features. It has been highlighted how it is being better than some of the other techniques with respect to accuracy. For the identification of some of the disease caused by fungus such as red spot, it is able to work with an accuracy of 90%.</span></p><p data-dcnode-id="7224" id="p0345"><a class="workspace-trigger" data-dcnode-id="7232" href="#bb0400" name="bbb0400"><span data-dcnode-id="7233" instrument_node="">Revathi and Hemalatha (2012)</span></a><span data-dcnode-id="7231" instrument_node=""> have given disease identification method that makes use of detection of edges based on uniform Segmentation. One of the disease commonly found in cotton leaves such as Fusarium wilt gets easily identified using this technique. Other types of diseases as Root rot, Gray mildew, Leaf blight, Bacterial blight, Boll rot, and Leaf curl have also been detected through neural networks. Here application of this method beneficial in smart farming has also been discussed. </span><a class="workspace-trigger" data-dcnode-id="7229" href="#bb0250" name="bbb0250"><span data-dcnode-id="7230" instrument_node="">Madhogaria et al. (2011)</span></a><span data-dcnode-id="7228" instrument_node=""> have given technique of classification using individual information of each pixel for classifying diseases of plants. It has also shown use of svm. </span><a class="workspace-trigger" data-dcnode-id="7226" href="#bb0450" name="bbb0450"><span data-dcnode-id="7227" instrument_node="">Tian et al. (2010)</span></a><span data-dcnode-id="7225" instrument_node=""> discussed a technique using different classifier such as support vector for the early detection of disease present in wheat plant. The disease detected here includes leaf blight and powdery mildew.</span></p><p data-dcnode-id="7220" id="p0350"><a class="workspace-trigger" data-dcnode-id="7222" href="#bb0425" name="bbb0425"><span data-dcnode-id="7223" instrument_node="">Sannakki et al. (2011)</span></a><span data-dcnode-id="7221" instrument_node=""> has given the detection of disease profoundly present in pomegranate leaves. The technique shown also helps in the identification of the specific detoriation stage of the disease discussed. Here the use of decision tree learning, fuzzy logic along with Bayesian network has been discussed.</span></p><p data-dcnode-id="7216" id="p0355"><a class="workspace-trigger" data-dcnode-id="7218" href="#bb0020" name="bbb0020"><span data-dcnode-id="7219" instrument_node="">Arivazhagan et al. (2013)</span></a><span data-dcnode-id="7217" instrument_node=""> discussed a technique involving four stages of early disease detection. It also shows the use of software for the automatic identification. The various stages discussed here include formation of a color transformation for the given image that is followed by masking of the green pixels. These are further followed by removal of definite threshold values along with segmenting them. Feature extraction and computation of texture information has also been discussed. It is being shown on a data of 500 plant samples including lemon, tomato, beans, banana and others resulting in an accurate rate of 94%.</span></p><p data-dcnode-id="7206" id="p0360"><a class="workspace-trigger" data-dcnode-id="7214" href="#bb0015" name="bbb0015"><span data-dcnode-id="7215" instrument_node="">Anand et al. (2016)</span></a><span data-dcnode-id="7213" instrument_node=""> have given a technique for the presence of plant diseases. This work brings about the use of different techniques of image processing for disease detection. It also makes use of artificial neural network while identifying these. One of the filters as Gabor filter has been deployed for filtering purpose before complete segmentation. Various features are later trained that helps in differentiating between healthy and unhealthy leaves. </span><a class="workspace-trigger" data-dcnode-id="7211" href="#bb0330" name="bbb0330"><span data-dcnode-id="7212" instrument_node="">Naikwadi and Amoda (2013)</span></a><span data-dcnode-id="7210" instrument_node=""> also gave a software solution for early disease detection in different plants. Only after the stage of segmentation, green pixels are detected. These are further being masked for definite threshold found using Otsu's method. The technique used provides a precision ranges from 83% to 94%. </span><a class="workspace-trigger" data-dcnode-id="7208" href="#bb0355" name="bbb0355"><span data-dcnode-id="7209" instrument_node="">Patil and Bodhe (2011)</span></a><span data-dcnode-id="7207" instrument_node=""> makes use of threshold method for segmentation of the leaf region. Later in categorization it shows an accuracy of 98.60%.</span></p><p data-dcnode-id="7199" id="p0365"><a class="workspace-trigger" data-dcnode-id="7204" href="#bb0055" name="bbb0055"><span data-dcnode-id="7205" instrument_node="">Beyyala and Beyyala (2012)</span></a><span data-dcnode-id="7203" instrument_node=""> discussed different methods of early identification of plant diseases making use of image Processing. Piyush </span><a class="workspace-trigger" data-dcnode-id="7201" href="#bb0095" name="bbb0095"><span data-dcnode-id="7202" instrument_node="">Chaudhary et al. (2012b)</span></a><span data-dcnode-id="7200" instrument_node=""> have given an algorithm for disease detection. It involves the segmentation of spot using varied processing methods in plants. Also a systematic comparison among HIS, cielab and ycbcr color has been derived while spot identification.</span></p><p data-dcnode-id="7194" id="p0370"><span data-dcnode-id="7198" instrument_node="">The paper (</span><a class="workspace-trigger" data-dcnode-id="7196" href="#bb0300" name="bbb0300"><span data-dcnode-id="7197" instrument_node="">Mohanty et al., 2016</span></a><span data-dcnode-id="7195" instrument_node="">) proposes to train a deep neural network by using 54,306 images having healthy unhealthy leaves both to identify 26 diseases and 14 crop species. It proposes the use of Smartphone for diagnosing crop diseases. The model proposes both classifying the crop species and identifying the disease on images of the plant thus making use of Smartphone for detection of crop disease feasible. The shortcoming of this paper is that this model gives higher accuracy for the dataset for which model is trained. However, if the data set is collected from different condition, the accuracy of model would be reduced. Also the image collected is more focused on only upper side of leaves which needs to be elaborated.</span></p><p data-dcnode-id="7186" id="p0375"><span data-dcnode-id="7193" instrument_node="">The paper (Konstantinos P. </span><a class="workspace-trigger" data-dcnode-id="7191" href="#bb0120" name="bbb0120"><span data-dcnode-id="7192" instrument_node="">Ferentinos, 2018</span></a><span data-dcnode-id="7190" instrument_node="">) proposes the development of convolution neural network models for detecting and diagnosing diseases in different leaves making use of deep learning methodologies. In paper </span><a class="workspace-trigger" data-dcnode-id="7188" href="#bb0440" name="bbb0440"><span data-dcnode-id="7189" instrument_node="">Sladojevic et al., 2016</span></a><span data-dcnode-id="7187" instrument_node="">, proposes the method of deep neural networks for leaf image classification to recognize plant diseases. The model which is developed helps in identification of plant diseases. Further a method for differentiating them has also been shown. Caffe is used to give the training in deep CNN. The final accuracy of the trained model was 96.3%. The challenge highlighted here includes the collection of images for better accuracy of the model, having apt augmented done.</span></p><p data-dcnode-id="7181" id="p0380"><span data-dcnode-id="7185" instrument_node="">This paper (</span><a class="workspace-trigger" data-dcnode-id="7183" href="#bb0410" name="bbb0410"><span data-dcnode-id="7184" instrument_node="">Rumf et al., 2010</span></a><span data-dcnode-id="7182" instrument_node="">) proposes a procedure for detecting and differentiating between healthy and diseases plant leaves using support vector machines with vegetative indice. This paper also differentiates between the different diseases like lercospora, powdery mildew and leaf rust also identifying the diseases at an initial stage. The leaves are inoculated with the different pathogens like lercosporapeticola, uromycesbetac or E rysiphebetac causing lercospora leaf spot, and powdery mildew and hyperspectral data are recorded from these diseases leaves and healthy leaves. In this paper diseased leaves and healthy leaves. This paper shows use of 9 vegetation indices for automatic classification. The classification accuracy has been drastically improved to 97%. The advantage of using SVMs method based on Vis is that this procedure can also applied to other plant pathogen systems.</span></p><p data-dcnode-id="7176" id="p0385"><span data-dcnode-id="7180" instrument_node="">This paper (</span><a class="workspace-trigger" data-dcnode-id="7178" href="#bb0095" name="bbb0095"><span data-dcnode-id="7179" instrument_node="">Chaudhary et al., 2012b</span></a><span data-dcnode-id="7177" instrument_node="">) proposes a technique for disease spot detection in affected area since the disease spots in plants are different in color; this paper proposes color transformation of RGB image to get better segmentation of disease spots. Various color models like YCbCr and CIELAB are differentiated from ‘A' component of CIELAB model. Then the image which is color transformed is passed through median filter and the spots includes segmentation by OTSU threshold. The advantage of this method is that the noise introduced by background, vein and camera flash are wiped out using CIELAB model. The only challenge left is differentiating the same colored veins from spots.</span></p><p data-dcnode-id="7171" id="p0390"><span data-dcnode-id="7175" instrument_node="">The paper (</span><a class="workspace-trigger" data-dcnode-id="7173" href="#bb0045" name="bbb0045"><span data-dcnode-id="7174" instrument_node="">Behmann and JorgSteinrucken, 2014</span></a><span data-dcnode-id="7172" instrument_node="">) proposes an approach combining supervised and unsupervised methods to identify drought stress on barely. The methodology is applied on both polled plants found in drought stress condition or properly watered. Ordinal classification with support vector machine has been brought to use for visualizing the division of different sections. It also differentiates between both easily. Paper shows that drought stress is detected 10&nbsp;days earlier than NDVI. The advantages of this method are that it is an optimum technique for early identification of drought.</span></p><p data-dcnode-id="7136" id="p0395"><span data-dcnode-id="7170" instrument_node="">In now a day's Deep Learning (DL) have an edge over accuracy. A huge amount of work has been done for improving the varied DL architecture that is useful in early classification of different types of diseases found in plants. They provide an effective way of many different benefits related to agricultural processes. In paper (</span><a class="workspace-trigger" data-dcnode-id="7168" href="#bb0155" name="bbb0155"><span data-dcnode-id="7169" instrument_node="">Hall et al., 2015</span></a><span data-dcnode-id="7167" instrument_node="">), classification has been carried out by hybrid CNN. It also makes the use of Random Forest (RF) classifier for experimentation giving accurate results. Paper (</span><a class="workspace-trigger" data-dcnode-id="7165" href="#bb0190" name="bbb0190"><span data-dcnode-id="7166" instrument_node="">Kamilaris and Prenafeta-Boldú, 2018</span></a><span data-dcnode-id="7164" instrument_node="">) shows its drawback for identification of occluded objects. Counting of fruits and leaf were also done using CNN in (</span><a class="workspace-trigger" data-dcnode-id="7162" href="#bb0165" name="bbb0165"><span data-dcnode-id="7163" instrument_node="">Itzhaky et al., 2018</span></a><span data-dcnode-id="7161" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="7159" href="#bb0455" name="bbb0455"><span data-dcnode-id="7160" instrument_node="">Ubbens et al., 2018</span></a><span data-dcnode-id="7158" instrument_node="">). For classification among different plants, (</span><a class="workspace-trigger" data-dcnode-id="7156" href="#bb0385" name="bbb0385"><span data-dcnode-id="7157" instrument_node="">Raza et al., 2015b</span></a><span data-dcnode-id="7155" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="7153" href="#bb0205" name="bbb0205"><span data-dcnode-id="7154" instrument_node="">Kussul et al., 2017</span></a><span data-dcnode-id="7152" instrument_node="">) used modified CNN. Plant recognition has been done by the different Deep Learning algorithm in (</span><a class="workspace-trigger" data-dcnode-id="7150" href="#bb0205" name="bbb0205"><span data-dcnode-id="7151" instrument_node="">Kussul et al., 2017</span></a><span data-dcnode-id="7149" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="7147" href="#bb0145" name="bbb0145"><span data-dcnode-id="7148" instrument_node="">Grinblat et al., 2016</span></a><span data-dcnode-id="7146" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="7144" href="#bb0430" name="bbb0430"><span data-dcnode-id="7145" instrument_node="">Singh et al., 2015</span></a><span data-dcnode-id="7143" instrument_node="">). For detection and classification of Crop different experiments was performed in (</span><a class="workspace-trigger" data-dcnode-id="7141" href="#bb0370" name="bbb0370"><span data-dcnode-id="7142" instrument_node="">Pound et al., 2017</span></a><span data-dcnode-id="7140" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="7138" href="#bb0285" name="bbb0285"><span data-dcnode-id="7139" instrument_node="">Milioto et al., 2017</span></a><span data-dcnode-id="7137" instrument_node="">).</span></p></section></section><section data-dcnode-id="7038" id="s0080"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7128" id="st0095"><span data-dcnode-id="7133" instrument_node="">5</span><span data-dcnode-id="7131" instrument_node="">. </span><span data-dcnode-id="7129" instrument_node="">Challenges and future trends</span></h2><p data-dcnode-id="7126" id="p0400"><span data-dcnode-id="7127" instrument_node="">Major research done in the last few years discussing various types of techniques have been shown earlier in this paper. The state of art survey with current challenges on Plant diseases detection has been done and given below-</span></p><p data-dcnode-id="7118" id="p0405"><span data-dcnode-id="7125" instrument_node="">This paper (</span><a class="workspace-trigger" data-dcnode-id="7123" href="#bb0195" name="bbb0195"><span data-dcnode-id="7124" instrument_node="">Khitthuk et al., 2018</span></a><span data-dcnode-id="7122" instrument_node="">) mainly involves analyzing the different plant features based on varied statistics. It also includes the process of classification. Here firstly the image is processed using Gaussian low pass filter. This paper (</span><a class="workspace-trigger" data-dcnode-id="7120" href="#bb0470" name="bbb0470"><span data-dcnode-id="7121" instrument_node="">Vaishnnave et al., 2019</span></a><span data-dcnode-id="7119" instrument_node="">) discusses the technique for the early determination of disease such as in groundnut plant leaves.</span></p><p data-dcnode-id="7110" id="p0410"><span data-dcnode-id="7117" instrument_node="">In paper (</span><a class="workspace-trigger" data-dcnode-id="7115" href="#bb0185" name="bbb0185"><span data-dcnode-id="7116" instrument_node="">Jhuria et al., 2013</span></a><span data-dcnode-id="7114" instrument_node="">) images of leaf is first captured and preprocessed for noise filtering. It also involved image enhancement and application of morphological operation. Later on Kmean clustering has been shown for cluster formation. Finally, random forest classifier enabled the classification of different fungal disease as Bacterial blight, Cercospora Leaf spot and as </span><em data-dcnode-id="7112"><span data-dcnode-id="7113" instrument_node="">Alternaria alternata</span></em><span data-dcnode-id="7111" instrument_node="">.</span></p><p data-dcnode-id="7105" id="p0415"><span data-dcnode-id="7109" instrument_node="">In paper (</span><a class="workspace-trigger" data-dcnode-id="7107" href="#bb0105" name="bbb0105"><span data-dcnode-id="7108" instrument_node="">Dhakate and Ingole, 2015</span></a><span data-dcnode-id="7106" instrument_node="">) a system is being shown for the determination of presence of disease in pomegranate plant. Here different way has been highlighted for training purpose using back propagation method. Bacterial blight, fruit rot were among the major identified. It also described the use of k mean clustering for cluster formation of the images used.</span></p><p data-dcnode-id="7100" id="p0420"><span data-dcnode-id="7104" instrument_node="">This paper (</span><a class="workspace-trigger" data-dcnode-id="7102" href="#bb0015" name="bbb0015"><span data-dcnode-id="7103" instrument_node="">Anand et al., 2016</span></a><span data-dcnode-id="7101" instrument_node="">) focus on the identification of brinjal plant leaves disease. It showcases the process of pre-processing of the plant leave images. Further K mean clustering has been used, followed by the feature extraction step that is accomplished by using the color Co-occurrence Method. This highlights the various parameters used for the identification as Area, perimeter, centroid, and diameter for showing presence of disease.</span></p><p data-dcnode-id="7095" id="p0425"><span data-dcnode-id="7099" instrument_node="">This paper (</span><a class="workspace-trigger" data-dcnode-id="7097" href="#bb0160" name="bbb0160"><span data-dcnode-id="7098" instrument_node="">Islam et al., 2017</span></a><span data-dcnode-id="7096" instrument_node="">) gives a method that involves machine learning technique along with image processing for detection of presence of disease in potato plant leaves. It shows the importance of early detection of disease. Firstly, the region of interest has been extracted by masking the background. Further a multicast support vector classifier is being for differentiating between the absence and presence of disease using color and texture characteristics. Later Gray Level Co-occurrence method is also being placed for extracting specific features including homogeneity, correlation contrast, and energy.</span></p><p data-dcnode-id="7090" id="p0430"><span data-dcnode-id="7094" instrument_node="">Detection of disease in plant is the most important step for reduction of agricultural yield losses. Here paper (</span><a class="workspace-trigger" data-dcnode-id="7092" href="#bb0125" name="bbb0125"><span data-dcnode-id="7093" instrument_node="">Gaikwad and Musande, 2017</span></a><span data-dcnode-id="7091" instrument_node="">) involves development of early detection methods for different plant disease. Initially the wheat plant leaves image taken were undergone the process of preprocessing. This is further followed by K mean clustering partitioning method. Here the basic features extracted include texture, shape and color. It highlights the neural network classification method for the detection of fungal disease presence wheat plant leaves.</span></p><p data-dcnode-id="7085" id="p0435"><span data-dcnode-id="7089" instrument_node="">The challenge in this approach is that it is required to use sensors also for practical use in future. In paper (</span><a class="workspace-trigger" data-dcnode-id="7087" href="#bb0350" name="bbb0350"><span data-dcnode-id="7088" instrument_node="">Padol and Yadav, 2016</span></a><span data-dcnode-id="7086" instrument_node="">) the detection and further classification of grape leaf disease is processed using SVM classification technique. The fungal diseases occurring in grape leaves being discussed here includes Downy Mildew and Powdery Mildew. It also includes the classification done through training and testing phases.</span></p><p data-dcnode-id="7077" id="p0440"><span data-dcnode-id="7084" instrument_node="">Increasing huge losses in cotton yield due to various diseases is a crucial reason for developing an early disease detection system for cotton plant. In paper (</span><a class="workspace-trigger" data-dcnode-id="7082" href="#bb0060" name="bbb0060"><span data-dcnode-id="7083" instrument_node="">Bhimte and Thool, 2018</span></a><span data-dcnode-id="7081" instrument_node="">) a method is proposed for early detection of disease among cotton leaves through Support vector machine. This paper (</span><a class="workspace-trigger" data-dcnode-id="7079" href="#bb0360" name="bbb0360"><span data-dcnode-id="7080" instrument_node="">Pawar and Jadhav, 2017</span></a><span data-dcnode-id="7078" instrument_node="">) proposes a novel method for identifying disease and classification. It highlights this process involving acquisition. Here k mean clustering algorithm is being used for pomegranate plant leaves analysis. Various features as. Color, morphology, edges, texture have been extracted and classified using ANN method.</span></p><p data-dcnode-id="7039" id="p0445"><span data-dcnode-id="7076" instrument_node="">Following are the research gaps which are observed and they still exist in research on Plant diseases detection and classification:</span></p><dl class="list" data-dcnode-id="7040"><dt class="list-label" data-dcnode-id="7074"><span data-dcnode-id="7075" instrument_node="">a.</span></dt><dd class="list-description" data-dcnode-id="7071"><p data-dcnode-id="7072" id="p0450"><span data-dcnode-id="7073" instrument_node="">Automatic cluster centre initialization is lacking.</span></p></dd><dt class="list-label" data-dcnode-id="7069"><span data-dcnode-id="7070" instrument_node="">b.</span></dt><dd class="list-description" data-dcnode-id="7066"><p data-dcnode-id="7067" id="p0455"><span data-dcnode-id="7068" instrument_node="">improves the proposed algorithm for reduction of error due to classification</span></p></dd><dt class="list-label" data-dcnode-id="7064"><span data-dcnode-id="7065" instrument_node="">c.</span></dt><dd class="list-description" data-dcnode-id="7061"><p data-dcnode-id="7062" id="p0460"><span data-dcnode-id="7063" instrument_node="">Can be done for other groundnut plant disease</span></p></dd><dt class="list-label" data-dcnode-id="7059"><span data-dcnode-id="7060" instrument_node="">d.</span></dt><dd class="list-description" data-dcnode-id="7056"><p data-dcnode-id="7057" id="p0465"><span data-dcnode-id="7058" instrument_node="">To integrates advance imaging technique and Computer vision algorithms</span></p></dd><dt class="list-label" data-dcnode-id="7054"><span data-dcnode-id="7055" instrument_node="">e.</span></dt><dd class="list-description" data-dcnode-id="7051"><p data-dcnode-id="7052" id="p0470"><span data-dcnode-id="7053" instrument_node="">For automatically detection of plant leaf disease algorithms are still required.</span></p></dd><dt class="list-label" data-dcnode-id="7049"><span data-dcnode-id="7050" instrument_node="">f.</span></dt><dd class="list-description" data-dcnode-id="7046"><p data-dcnode-id="7047" id="p0475"><span data-dcnode-id="7048" instrument_node="">Work further requires analysis using different variation in surrounding conditions.</span></p></dd><dt class="list-label" data-dcnode-id="7044"><span data-dcnode-id="7045" instrument_node="">g.</span></dt><dd class="list-description" data-dcnode-id="7041"><p data-dcnode-id="7042" id="p0480"><span data-dcnode-id="7043" instrument_node="">Need an expert System for plant diseases detection.</span></p></dd></dl><p></p></section><section data-dcnode-id="7027" id="s0085"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7032" id="st0100"><span data-dcnode-id="7037" instrument_node="">6</span><span data-dcnode-id="7035" instrument_node="">. </span><span data-dcnode-id="7033" instrument_node="">Conclusions</span></h2><p data-dcnode-id="7030" id="p0485"><span data-dcnode-id="7031" instrument_node="">This paper gives an overall review for the various techniques of disease identification. It also presents brief summary of different imaging methods useful for early detection of plant diseases. We present the Current Trends and Challenges for detection of plant disease using computer vision and advance imaging technique. These techniques include thermal, hyperspectral, fluorescence, Multispectral, and 3D imaging.</span></p><p data-dcnode-id="7028" id="p0490"><span data-dcnode-id="7029" instrument_node="">We have also presented different techniques for early determination of plant diseases and classification. The major techniques are SVM, K-means clustering, Deep learning, and K-NN. This review concludes that there is a need for efficient method with comparison to the cost incurred. Also a reliable and efficient sensor deployed for looking fulfillment of proper criteria of plant health would facilitate advancements in agriculture. In future, work can be done to develop a more efficient, and robust system for early automatic tracing and can be extended to identify all possible diseases.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="7021"><button class="button button-anchor" data-dcnode-id="7022" type="button"><span class="button-text" data-dcnode-id="7023"><span data-dcnode-id="7024" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="7020"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="247" id="bi0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7018"><span data-dcnode-id="7019" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="248" id="bs0005"><dl class="references" data-dcnode-id="249" id="reference-links-bs0005"><dt class="label" data-dcnode-id="7015"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="7016" href="#bbb0005" id="ref-id-bb0005"><span data-dcnode-id="7017" instrument_node="">Abdulridha et al., 2016</span></a></dt><dd class="reference" data-dcnode-id="6955" id="rf0005"><div class="contribution" data-dcnode-id="6990"><span data-dcnode-id="7014" instrument_node="">J.</span><span data-dcnode-id="7012" instrument_node=""> </span><span data-dcnode-id="7010" instrument_node="">Abdulridha</span><span data-dcnode-id="7008" instrument_node="">, </span><span data-dcnode-id="7006" instrument_node="">R.</span><span data-dcnode-id="7004" instrument_node=""> </span><span data-dcnode-id="7002" instrument_node="">Ehsani</span><span data-dcnode-id="7000" instrument_node="">, </span><span data-dcnode-id="6998" instrument_node="">A.</span><span data-dcnode-id="6996" instrument_node=""> </span><span data-dcnode-id="6994" instrument_node="">Castro</span><div data-dcnode-id="6991" id="ref-id-rf0005"><strong class="title" data-dcnode-id="6992"><span data-dcnode-id="6993" instrument_node="">Detection and differentiation between laurel wilt disease, phytophthora disease, and salinity damage using a hyperspectral sensing technique</span></strong></div></div><div class="host" data-dcnode-id="6968"><span data-dcnode-id="6989" instrument_node="">Agriculture</span><span data-dcnode-id="6987" instrument_node="">, </span><span data-dcnode-id="6985" instrument_node="">6</span><span data-dcnode-id="6983" instrument_node=""> (</span><span data-dcnode-id="6981" instrument_node="">4</span><span data-dcnode-id="6979" instrument_node="">)</span><span data-dcnode-id="6977" instrument_node=""> (</span><span data-dcnode-id="6975" instrument_node="">2016</span><span data-dcnode-id="6973" instrument_node="">)</span><span data-dcnode-id="6971" instrument_node="">, p. </span><span data-dcnode-id="6969" instrument_node="">56</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="6956"><div class="u-margin-m-right u-display-inline" data-dcnode-id="6963"><els-view-pdf-element class="pending" data-dcnode-id="6964" disabled="" doc-id="10.3390/agriculture6040056" doc-type="doi" onclick="({
