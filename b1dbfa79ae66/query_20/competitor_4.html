</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Researchers have discovered that creative people are among the happiest in our society and gardeners are amongst the most optimistic. Enjoy the best of both worlds by learning how to create new plants for your garden area. Unearth the mysteries of propagating plants by sowing, cuttings, division, layering, budding and various methods of grafting to produce new and exciting plant forms.</span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Comprehensive notes provided. New and experienced green thumbs welcome.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="514"></p><h2 data-dcnode-id="512" id="Outcomes"><span data-dcnode-id="513" instrument_node="">Outcomes</span></h2><p data-dcnode-id="511"></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">By the end of this course, you should be able to:</span></p><span data-dcnode-id="507" instrument_node="">
</span><ul data-dcnode-id="487"><span data-dcnode-id="506" instrument_node="">
</span><li data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">distinguish between various types of seeds and determine their preferred means of germination</span></li><span data-dcnode-id="503" instrument_node="">
</span><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">select and reproduce plants by soft-tip, semi-hardwood and hardwood cuttings</span></li><span data-dcnode-id="500" instrument_node="">
</span><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">recognise and propagate plants by stem, root and leaf cuttings</span></li><span data-dcnode-id="497" instrument_node="">
</span><li data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">identify and create new plants by tip and air layering</span></li><span data-dcnode-id="494" instrument_node="">
</span><li data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">cultivate and reproduce bulbs, corms and tubers</span></li><span data-dcnode-id="491" instrument_node="">
</span><li data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">implement the principles of budding and grafting.</span></li><span data-dcnode-id="488" instrument_node="">
</span></ul><span data-dcnode-id="486" instrument_node="">

</span><p data-dcnode-id="358"></p><div class="course-testimonials" data-dcnode-id="338"><h2 data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">What others say.</span></h2><div class="testimonial-scroller" data-dcnode-id="339"><ul class="slides" data-dcnode-id="340"><li data-dcnode-id="353"><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">The presenter shared knowledge without restriction and the notes were easy to understand and contain practical information on the subject matter. Theory was reinforced with the practical – and the fact you could take away plants to start your own propagation just added to the whole day.</span></p></li><li data-dcnode-id="350"><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">A very professional and friendly presentation.</span></p></li><li data-dcnode-id="347"><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Excellent, I loved every minute of it. It was very informative and interactive. This course is great for novice gardeners and experienced gardeners alike.</span></p></li><li data-dcnode-id="344"><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">The presenter was outstanding – explicit, prepared, excited with sharing of knowledge, helpful, and encompassed the many understanding levels in the class. An exciting teacher and one who has inspired me to do great things. I endorse the enthusiasm for the subject and dedication to encouraging students. A great course and well worth my effort and money to attend.</span></p></li><li data-dcnode-id="341"><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Excellent tutor, course is informative and fun. Will definitely recommend.</span></p></li></ul></div></div><p data-dcnode-id="337"></p><span data-dcnode-id="336" instrument_node="">
