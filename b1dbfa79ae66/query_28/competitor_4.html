</span><meta content="The visible landscape is believed to affect human beings in many ways, including aesthetic appreciation and health and well-being. The aim of this pap…" data-dcnode-id="6284" property="og:description"><span data-dcnode-id="6283" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id8&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id9&quot;><p>The visible landscape is believed to affect human beings in many ways, including aesthetic appreciation and health and well-being. The aim of this paper is to analyse the range of landscapes used in environmental psychology studies, and the evidence of health effects related to viewing these landscapes. A literature review of publications linking landscapes and health effects was conducted. This reported evidence of health and well-being effects related to exposure to visual landscapes. The results of the review include an overview of the types of landscape used in the studies, the evidence on health effects, the methods and measures applied and the different groups of respondents. The analysis reveals a predominance of studies using only coarse categories of landscapes. Most landscape representations have been classed as “natural” or “urban”. Few studies were found to use subcategories within these groups. Generally, the natural landscapes gave a stronger positive health effect compared to urban landscapes. Urban landscapes were found to have a less positive and in some cases negative effect on health. Three main kinds of health effects have been identified in the study; short-term recovery from stress or mental fatigue, faster physical recovery from illness and long-term overall improvement on people&amp;#x27;s health and well-being.</p><p>The study provides an overview of the relationships between health and landscapes arranged in an accessible format, identifying gaps in our knowledge requiring further research. The identification of quantifiable landscape attributes that affect health is seen as an important factor in enabling future landscape design to be of benefit to human health.</p></div></div></div>" data-dcnode-id="6282" lang="en" name="citation_abstract"><span data-dcnode-id="6281" instrument_node="">

data-dcnode-id="5764" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="5761"></section><section class="ReferencedArticles" data-dcnode-id="5760"></section><div class="PageDivider" data-dcnode-id="5759"></div><div class="Abstracts u-font-serif" data-dcnode-id="5747" id="abstracts"><div class="abstract author" data-dcnode-id="5748" id="aep-abstract-id8"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node="">Abstract</span></h2><div data-dcnode-id="5749" id="aep-abstract-sec-id9"><p data-dcnode-id="5752"><span data-dcnode-id="5756" instrument_node="">The visible landscape is believed to affect human beings in many ways, including aesthetic appreciation and health and well-being. The aim of this paper is to analyse the range of landscapes used in </span><a class="topic-link" data-dcnode-id="5754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/environmental-psychology" title="Learn more about environmental psychology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5755" instrument_node="">environmental psychology</span></a><span data-dcnode-id="5753" instrument_node=""> studies, and the evidence of health effects related to viewing these landscapes. A literature review of publications linking landscapes and health effects was conducted. This reported evidence of health and well-being effects related to exposure to visual landscapes. The results of the review include an overview of the types of landscape used in the studies, the evidence on health effects, the methods and measures applied and the different groups of respondents. The analysis reveals a predominance of studies using only coarse categories of landscapes. Most landscape representations have been classed as “natural” or “urban”. Few studies were found to use subcategories within these groups. Generally, the natural landscapes gave a stronger positive health effect compared to urban landscapes. Urban landscapes were found to have a less positive and in some cases negative effect on health. Three main kinds of health effects have been identified in the study; short-term recovery from stress or mental fatigue, faster physical recovery from illness and long-term overall improvement on people's health and well-being.</span></p><p data-dcnode-id="5750"><span data-dcnode-id="5751" instrument_node="">The study provides an overview of the relationships between health and landscapes arranged in an accessible format, identifying gaps in our knowledge requiring further research. The identification of quantifiable landscape attributes that affect health is seen as an important factor in enabling future landscape design to be of benefit to human health.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5724" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5736"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1618866707000659"><svg class="icon icon-navigate-left" data-dcnode-id="5745" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5746"></path></svg><span class="button-alternative-text" data-dcnode-id="5738"><strong data-dcnode-id="5743"><span data-dcnode-id="5744" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5741"><span data-dcnode-id="5742" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5739"><span data-dcnode-id="5740" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5725"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1618866707000623"><span class="button-alternative-text" data-dcnode-id="5729"><strong data-dcnode-id="5734"><span data-dcnode-id="5735" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5732"><span data-dcnode-id="5733" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5730"><span data-dcnode-id="5731" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5727" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5728"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="5705"><div class="keywords-section" data-dcnode-id="5706" id="aep-keywords-id10"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5722"><span data-dcnode-id="5723" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5719"><span data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">Evidence-based</span></span></div><div class="keyword" data-dcnode-id="5716"><span data-dcnode-id="5717"><span data-dcnode-id="5718" instrument_node="">Healing</span></span></div><div class="keyword" data-dcnode-id="5713"><span data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">Nature</span></span></div><div class="keyword" data-dcnode-id="5710"><span data-dcnode-id="5711"><span data-dcnode-id="5712" instrument_node="">Restoration</span></span></div><div class="keyword" data-dcnode-id="5707"><span data-dcnode-id="5708"><span data-dcnode-id="5709" instrument_node="">Therapeutic</span></span></div></div></div><span data-dcnode-id="5704" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4122" id="body"><div data-dcnode-id="4128"><section data-dcnode-id="5538" id="aep-section-id11"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5702"><span data-dcnode-id="5703" instrument_node="">Introduction</span></h2><p data-dcnode-id="5694"><span data-dcnode-id="5701" instrument_node="">The links between landscape and health are increasingly recognized as important in research and at the policy level. The European Landscape Convention (</span><a class="workspace-trigger" data-dcnode-id="5699" href="#bib4" name="bbib4"><span data-dcnode-id="5700" instrument_node="">Council of Europe, 2000, p. 2</span></a><span data-dcnode-id="5698" instrument_node="">) aims to promote landscape protection, management and planning, considering landscape as “a key element of individual and social well-being”. The </span><a class="workspace-trigger" data-dcnode-id="5696" href="#bib73" name="bbib73"><span data-dcnode-id="5697" instrument_node="">World Health Organization (1946, p. 1)</span></a><span data-dcnode-id="5695" instrument_node=""> defines health as “a state of complete physical, mental and social well-being and not merely the absence of disease or infirmity”. This understanding of landscape and health provides the background for our approach to investigating the evidence for the role of exposure to the visual landscapes for individual and social health and well-being. Our definition of health effects reflects the broad health definition of the WHO, encompassing effects on physical, mental and social well-being. Society is facing increasing challenges with stress-related diseases, and knowledge about the way the visual landscape affects health and well-being can help mitigate stress and increase restoration. Knowledge about how different landscapes and landscape elements contribute to health improvement is needed to provide new design solutions beneficial to human health.</span></p><p data-dcnode-id="5686"><span data-dcnode-id="5693" instrument_node="">Links between landscape and health have been observed for a long time and in many different cultures and societies. The belief that viewing vegetation, water and other natural elements can ameliorate stress and is beneficial for patients in healthcare environments dates as far back as the earliest large cities in Persia, China and Greece. In the Middle Ages, the first hospitals in Europe were infirmaries in monastic communities where a cloistered garden was an essential part of the environment used to bring relief to the ill (</span><a class="workspace-trigger" data-dcnode-id="5691" href="#bib3" name="bbib3"><span data-dcnode-id="5692" instrument_node="">Cooper-Marcus and Barnes, 1999</span></a><span data-dcnode-id="5690" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5688" href="#bib66" name="bbib66"><span data-dcnode-id="5689" instrument_node="">Ulrich, 2002</span></a><span data-dcnode-id="5687" instrument_node="">).</span></p><p data-dcnode-id="5678"><span data-dcnode-id="5685" instrument_node="">Through history, the connection between nature and healing was gradually superseded by increasingly technical approaches and the idea that access to nature could assist in healing lost much of its significance (</span><a class="workspace-trigger" data-dcnode-id="5683" href="#bib3" name="bbib3"><span data-dcnode-id="5684" instrument_node="">Cooper-Marcus and Barnes, 1999</span></a><span data-dcnode-id="5682" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5680" href="#bib66" name="bbib66"><span data-dcnode-id="5681" instrument_node="">Ulrich, 2002</span></a><span data-dcnode-id="5679" instrument_node="">). However, in the last 25 years these traditional ways of linking nature and health effects have re-emerged as a topic of interest in the field of human health. Research has generated a relatively rich literature to explain the ways in which natural and other environments have an effect on human health.</span></p><p data-dcnode-id="5661"><span data-dcnode-id="5677" instrument_node="">A range of theories and approaches have been forwarded in order to explain and assess the influence of landscapes on human health. Contemporary theories, such as Ulrich's “Stress Recovery Theory” (</span><a class="workspace-trigger" data-dcnode-id="5675" href="#bib64" name="bbib64"><span data-dcnode-id="5676" instrument_node="">Ulrich, 1984</span></a><span data-dcnode-id="5674" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5672" href="#bib65" name="bbib65"><span data-dcnode-id="5673" instrument_node="">Ulrich, 1999</span></a><span data-dcnode-id="5671" instrument_node="">), predict that natural scenes tend to reduce stress, whereas settings in the built environment tend to hinder recovery from stress. Researchers have provided possible explanations for this relationship. Evolutionary theories of landscape preferences explain the benefits of natural scenes as reflecting landscape qualities that satisfy human biological needs. Researchers within environmental psychology have evaluated whether the restorative effect of natural landscapes is one of the reasons why people prefer natural landscapes over urban ones (e.g., </span><a class="workspace-trigger" data-dcnode-id="5669" href="#bib20" name="bbib20"><span data-dcnode-id="5670" instrument_node="">Hartig and Staats, 2006</span></a><span data-dcnode-id="5668" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5666" href="#bib69" name="bbib69"><span data-dcnode-id="5667" instrument_node="">Van den Berg et al., 2007</span></a><span data-dcnode-id="5665" instrument_node="">). Other authors suggest that people have a more general innate bond with nature, implying that certain kinds of contact with the natural world may be directly beneficial to health (</span><a class="workspace-trigger" data-dcnode-id="5663" href="#bib35" name="bbib35"><span data-dcnode-id="5664" instrument_node="">Kellert and Wilson, 1993</span></a><span data-dcnode-id="5662" instrument_node="">).</span></p><p data-dcnode-id="5641"><span data-dcnode-id="5660" instrument_node="">One of the research approaches relating to health effects of landscapes is known as “Healing Gardens”. If the view from a hospital window is important in terms of improving recovery (</span><a class="workspace-trigger" data-dcnode-id="5658" href="#bib64" name="bbib64"><span data-dcnode-id="5659" instrument_node="">Ulrich, 1984</span></a><span data-dcnode-id="5657" instrument_node="">) then the design of hospital gardens becomes a new and significant topic. This topic has been investigated in recent studies of gardens and parks, particularly those around hospitals and residential areas. Such studies assess whether healing gardens aid restoration from stress and improve comfort and well-being (</span><a class="workspace-trigger" data-dcnode-id="5655" href="#bib57" name="bbib57"><span data-dcnode-id="5656" instrument_node="">Stigsdotter and Grahn, 2002</span></a><span data-dcnode-id="5654" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5652" href="#bib66" name="bbib66"><span data-dcnode-id="5653" instrument_node="">Ulrich, 2002</span></a><span data-dcnode-id="5651" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5649" href="#bib56" name="bbib56"><span data-dcnode-id="5650" instrument_node="">Stigsdotter, 2004</span></a><span data-dcnode-id="5648" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5646" href="#bib50" name="bbib50"><span data-dcnode-id="5647" instrument_node="">Ottosson and Grahn, 2005</span></a><span data-dcnode-id="5645" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5643" href="#bib53" name="bbib53"><span data-dcnode-id="5644" instrument_node="">Sherman et al., 2005</span></a><span data-dcnode-id="5642" instrument_node="">).</span></p><p data-dcnode-id="5627"><span data-dcnode-id="5640" instrument_node="">As a result of more than 20 years of research, Rachel and Stephen Kaplan developed the Attention Restoration Theory that describes the restorative effect of natural environments on human mental fatigue (</span><a class="workspace-trigger" data-dcnode-id="5638" href="#bib32" name="bbib32"><span data-dcnode-id="5639" instrument_node="">Kaplan and Kaplan, 1989</span></a><span data-dcnode-id="5637" instrument_node="">). “Restoration” has been defined as “the process of renewing physical, psychological and social capabilities diminished in ongoing efforts to meet adaptive demands”, i.e. not only attentional (</span><a class="workspace-trigger" data-dcnode-id="5635" href="#bib19" name="bbib19"><span data-dcnode-id="5636" instrument_node="">Hartig, 2004, p. 2</span></a><span data-dcnode-id="5634" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="5632" href="#bib32" name="bbib32"><span data-dcnode-id="5633" instrument_node="">Kaplan and Kaplan (1989)</span></a><span data-dcnode-id="5631" instrument_node=""> examined the factors that make a restorative experience more likely. Natural environments are thought to be especially effective as restorative settings, as they usually possess the key factors in achieving restoration. </span><a class="workspace-trigger" data-dcnode-id="5629" href="#bib33" name="bbib33"><span data-dcnode-id="5630" instrument_node="">Kaplan (2002)</span></a><span data-dcnode-id="5628" instrument_node=""> describes the “Attention Restoration Theory” in terms of the central role of attention and attention fatigue in determining quality of life.</span></p><p data-dcnode-id="5616"><span data-dcnode-id="5626" instrument_node="">Another approach to studying health effects of landscapes relates to the concept “Therapeutic Landscapes”. This is linked to the idea of place identity, and to the use of particular places for the maintenance of health and well-being. The concept was introduced at the beginning of the 1990s by the health/medical geographer </span><a class="workspace-trigger" data-dcnode-id="5624" href="#bib11" name="bbib11"><span data-dcnode-id="5625" instrument_node="">Gesler (1992)</span></a><span data-dcnode-id="5623" instrument_node="">, who employed an expanded definition of the concept of landscape taken from cultural geography with the aim of exploring the positive, healing or therapeutic characteristics of place (</span><a class="workspace-trigger" data-dcnode-id="5621" href="#bib72" name="bbib72"><span data-dcnode-id="5622" instrument_node="">Williams, 1999</span></a><span data-dcnode-id="5620" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5618" href="#bib15" name="bbib15"><span data-dcnode-id="5619" instrument_node="">Gesler, 2005</span></a><span data-dcnode-id="5617" instrument_node="">).</span></p><p data-dcnode-id="5611"><span data-dcnode-id="5615" instrument_node="">The terms “healing” or “therapeutic” generally refer to a beneficial process that promotes overall well-being. According to </span><a class="workspace-trigger" data-dcnode-id="5613" href="#bib2" name="bbib2"><span data-dcnode-id="5614" instrument_node="">Cooper-Marcus and Barnes (1995)</span></a><span data-dcnode-id="5612" instrument_node=""> they are used to describe either one or a mixture of the three following processes: relief from physical symptoms, illness or trauma (e.g., a recovering postoperative patient); stress reduction and increased levels of comfort for individuals dealing with emotionally and/or physically tiring experiences; and an improvement in the overall sense of well-being.</span></p><p data-dcnode-id="5591"><span data-dcnode-id="5610" instrument_node="">The term “therapeutic landscape” has traditionally been used to describe landscapes with “enduring reputation for achieving physical, mental and spiritual healing” (</span><a class="workspace-trigger" data-dcnode-id="5608" href="#bib12" name="bbib12"><span data-dcnode-id="5609" instrument_node="">Gesler, 1993</span></a><span data-dcnode-id="5607" instrument_node="">). Research focused on places that had achieved this reputation for healing such as Lourdes, Bath or the Navajo territory (</span><a class="workspace-trigger" data-dcnode-id="5605" href="#bib13" name="bbib13"><span data-dcnode-id="5606" instrument_node="">Gesler, 1996</span></a><span data-dcnode-id="5604" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5602" href="#bib14" name="bbib14"><span data-dcnode-id="5603" instrument_node="">Gesler, 1998</span></a><span data-dcnode-id="5601" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5599" href="#bib7" name="bbib7"><span data-dcnode-id="5600" instrument_node="">Dobbs, 1997</span></a><span data-dcnode-id="5598" instrument_node="">) but the concept is being adapted and expanded to cover not only healing places, but places that promote well-being and maintain health with the goal of analysing what it is that influences visitor experience (</span><a class="workspace-trigger" data-dcnode-id="5596" href="#bib51" name="bbib51"><span data-dcnode-id="5597" instrument_node="">Palka, 1999</span></a><span data-dcnode-id="5595" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5593" href="#bib72" name="bbib72"><span data-dcnode-id="5594" instrument_node="">Williams, 1999</span></a><span data-dcnode-id="5592" instrument_node="">).</span></p><p data-dcnode-id="5583"><span data-dcnode-id="5590" instrument_node="">Environmental perception is clearly multi-sensory, and not restricted to vision. However, vision is by far our most important sense in terms of yielding information about outdoor environments (</span><a class="workspace-trigger" data-dcnode-id="5588" href="#bib62" name="bbib62"><span data-dcnode-id="5589" instrument_node="">Ulrich, 1979</span></a><span data-dcnode-id="5587" instrument_node="">). A significant part of the satisfaction derived from nature does not require being in the natural setting, but rather having a view of it. Several studies that have shown health benefits related to experiencing nature have been based on opportunities for noticing and observing it, rather than on performing activities in nature (</span><a class="workspace-trigger" data-dcnode-id="5585" href="#bib30" name="bbib30"><span data-dcnode-id="5586" instrument_node="">Kaplan, 1992</span></a><span data-dcnode-id="5584" instrument_node="">).</span></p><p data-dcnode-id="5572"><span data-dcnode-id="5582" instrument_node="">Health effects related to exposure to natural environments have received much focus in the literature, and not only for positive aspects. The field of environmental health has focused broadly on overcoming negative health effects of nature, (e.g., exposure to poisonous plants and animals, natural disturbances such as storms, floods and avalanches and dangerous landscapes such as cliff edges or deserts), and investigating the interaction between health hazards in the physical environment and individual risk factors for a range of diseases, physical disorders, allergies, or accidental injuries (</span><a class="workspace-trigger" data-dcnode-id="5580" href="#bib9" name="bbib9"><span data-dcnode-id="5581" instrument_node="">Frumkin, 2003</span></a><span data-dcnode-id="5579" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5577" href="#bib10" name="bbib10"><span data-dcnode-id="5578" instrument_node="">Frumkin, 2005</span></a><span data-dcnode-id="5576" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5574" href="#bib48" name="bbib48"><span data-dcnode-id="5575" instrument_node="">Morris, 2003</span></a><span data-dcnode-id="5573" instrument_node="">).</span></p><p data-dcnode-id="5570"><span data-dcnode-id="5571" instrument_node="">Such collateral effects related to being in the landscape will not be assessed in this paper. Our study focuses on the effects of visual exposure to landscapes. Some of the reported studies use methods and designs including accessing nature, but with emphasis on the visual aspects of the experience. However, this paper includes only studies where the differences in treatment lie in exposure to different landscapes and not in different tasks or actions performed by the survey participants (e.g., a walk in nature versus a walk in an urban setting is included, but a walk in nature versus staying inside is outside the scope of this study). In studies dealing with greenery in residential areas, air quality might influence well-being as well as visual aspects, but in those studies considered here, the visual is considered the main focus in the analysis. Studies of health effects of plants in an indoor-setting are not included in the review.</span></p><section data-dcnode-id="5539" id="aep-section-id12"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5568"><span data-dcnode-id="5569" instrument_node="">Aims and objectives</span></h3><p data-dcnode-id="5563"><span data-dcnode-id="5567" instrument_node="">Our study aims to identify the landscape and scene types used in environmental psychology studies of their effects on human health and well-being. The need for studies relating visual characteristics of environments to psychological and physiological well-being, work satisfaction and so forth was stated by </span><a class="workspace-trigger" data-dcnode-id="5565" href="#bib62" name="bbib62"><span data-dcnode-id="5566" instrument_node="">Ulrich (1979)</span></a><span data-dcnode-id="5564" instrument_node="">. We aim to investigate what we know and do not know regarding the physical attributes of landscapes important for human health. The approach contributes to the theoretical basis for landscape design beneficial to human health, and is a starting point for further research on the relationship between different elements and patterns in the visual landscape and human health and well-being.</span></p><p data-dcnode-id="5540"><span data-dcnode-id="5562" instrument_node="">A literature review was conducted to provide the following information:</span></p><dl class="list" data-dcnode-id="5541"><dt class="list-label" data-dcnode-id="5560"><span data-dcnode-id="5561" instrument_node="">–</span></dt><dd class="list-description" data-dcnode-id="5557"><p data-dcnode-id="5558"><span data-dcnode-id="5559" instrument_node="">the landscape types used in studies;</span></p></dd><dt class="list-label" data-dcnode-id="5555"><span data-dcnode-id="5556" instrument_node="">–</span></dt><dd class="list-description" data-dcnode-id="5552"><p data-dcnode-id="5553"><span data-dcnode-id="5554" instrument_node="">the reported health effects of viewing landscapes;</span></p></dd><dt class="list-label" data-dcnode-id="5550"><span data-dcnode-id="5551" instrument_node="">–</span></dt><dd class="list-description" data-dcnode-id="5547"><p data-dcnode-id="5548"><span data-dcnode-id="5549" instrument_node="">the methods used and measures applied to assess health effects;</span></p></dd><dt class="list-label" data-dcnode-id="5545"><span data-dcnode-id="5546" instrument_node="">–</span></dt><dd class="list-description" data-dcnode-id="5542"><p data-dcnode-id="5543"><span data-dcnode-id="5544" instrument_node="">the characteristics of respondents that have been studied.</span></p></dd></dl><p></p></section></section><section data-dcnode-id="4499" id="aep-section-id18"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5536"><span data-dcnode-id="5537" instrument_node="">Method</span></h2><p data-dcnode-id="5534"><span data-dcnode-id="5535" instrument_node="">We reviewed the major ecology, health and psychology journals, using the full text electronic access at the Norwegian University of Life Sciences library, which subscribes to more than 3800 journals, including those from BioOne, Blackwell, Oxford, Science Direct, Springer, Elsevier and Academic Press. Hard copies were requested through the Library when not available electronically. The majority of the sources are peer-reviewed journal papers, although supplemented by books and conference proceedings presenting original research.</span></p><div data-dcnode-id="4552"><p data-dcnode-id="5511"><span data-dcnode-id="5533" instrument_node="">Only articles presenting evidence of health effects related to viewing landscapes are reported in this paper. The literature reviewed covered a much broader scope, including review and analytical papers, but our main focus was to identify the different landscape types assessed in the studies and the reported health effects linked to visual exposure to these. The differences in landscape types were not necessarily the research focus in the original studies. The visual exposure includes active viewing in the majority of the studies, however some relate to availability of visual landscape stimuli rather than active viewing (e.g., </span><a class="workspace-trigger" data-dcnode-id="5531" href="#bib45" name="bbib45"><span data-dcnode-id="5532" instrument_node="">Maas et al., 2006</span></a><span data-dcnode-id="5530" instrument_node="">). More than 100 articles have been reviewed in detail, of which 31 where found to present evidence of health effects of landscape views. Summary tables and figures organised according to the research objectives provide an overview of the findings (see </span><a class="workspace-trigger" data-dcnode-id="5528" href="#tbl1" name="btbl1"><span data-dcnode-id="5529" instrument_node="">Table 1</span></a><span data-dcnode-id="5527" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5525" href="#tbl2" name="btbl2"><span data-dcnode-id="5526" instrument_node="">Table 2</span></a><span data-dcnode-id="5524" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="5522" href="#fig1" name="bfig1"><span data-dcnode-id="5523" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5521" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5519" href="#fig2" name="bfig2"><span data-dcnode-id="5520" instrument_node="">Fig. 2</span></a><span data-dcnode-id="5518" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5516" href="#fig3" name="bfig3"><span data-dcnode-id="5517" instrument_node="">Fig. 3</span></a><span data-dcnode-id="5515" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5513" href="#fig4" name="bfig4"><span data-dcnode-id="5514" instrument_node="">Fig. 4</span></a><span data-dcnode-id="5512" instrument_node="">).</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4849" id="tbl1"><span class="captions" data-dcnode-id="5501"><span data-dcnode-id="5502"><p data-dcnode-id="5503"><span class="label" data-dcnode-id="5509"><span data-dcnode-id="5510" instrument_node="">Table 1</span></span><span data-dcnode-id="5508" instrument_node="">. </span><span data-dcnode-id="5507" instrument_node="">Findings from the literature review: categories of landscapes and reported health effects</span><a class="workspace-trigger" data-dcnode-id="5504" href="#tblfn1a" name="btblfn1a"><sup data-dcnode-id="5505"><span data-dcnode-id="5506" instrument_node="">a</span></sup></a></p></span></span><div class="groups" data-dcnode-id="4856"><table data-dcnode-id="4857"><thead data-dcnode-id="5491"><tr class="rowsep-1 valign-top" data-dcnode-id="5492"><th data-dcnode-id="5499" scope="col"><span data-dcnode-id="5500" instrument_node="">No.</span></th><th data-dcnode-id="5497" scope="col"><span data-dcnode-id="5498" instrument_node="">Authors</span></th><th data-dcnode-id="5495" scope="col"><span data-dcnode-id="5496" instrument_node="">Categories of landscapes compared</span></th><th data-dcnode-id="5493" scope="col"><span data-dcnode-id="5494" instrument_node="">Reported health effects</span></th></tr></thead><tbody data-dcnode-id="4858"><tr class="valign-top" data-dcnode-id="5485"><td data-dcnode-id="5490"></td><td data-dcnode-id="5489"></td><td colspan="2" data-dcnode-id="5486"><strong data-dcnode-id="5487"><span data-dcnode-id="5488" instrument_node="">Nature (in roman) versus urban (in italics)</span></strong></td></tr><tr class="valign-top" data-dcnode-id="5475"><td data-dcnode-id="5483"><span data-dcnode-id="5484" instrument_node="">1</span></td><td data-dcnode-id="5480"><a class="workspace-trigger" data-dcnode-id="5481" href="#bib62" name="bbib62"><span data-dcnode-id="5482" instrument_node="">Ulrich (1979)</span></a></td><td data-dcnode-id="5478"><span data-dcnode-id="5479" instrument_node="">Nature scenes; dominated by green vegetation including cultivated fields</span></td><td data-dcnode-id="5476"><span data-dcnode-id="5477" instrument_node="">Improved well-being and reduced anxiety: increased positive affect factors and reduced fear arousal factor.</span></td></tr><tr class="valign-top" data-dcnode-id="5465"><td data-dcnode-id="5474"></td><td data-dcnode-id="5473"></td><td data-dcnode-id="5470"><em data-dcnode-id="5471"><span data-dcnode-id="5472" instrument_node="">Urban scenes; commercial landscapes and industrial areas</span></em></td><td data-dcnode-id="5466"><em data-dcnode-id="5468"><span data-dcnode-id="5469" instrument_node="">Increase in sadness, decline in attentiveness.</span></em><br data-dcnode-id="5467"></td></tr><tr class="valign-top" data-dcnode-id="5455"><td data-dcnode-id="5463"><span data-dcnode-id="5464" instrument_node="">2</span></td><td data-dcnode-id="5460"><a class="workspace-trigger" data-dcnode-id="5461" href="#bib47" name="bbib47"><span data-dcnode-id="5462" instrument_node="">Moore (1981)</span></a></td><td data-dcnode-id="5458"><span data-dcnode-id="5459" instrument_node="">Rolling farmland and trees</span></td><td data-dcnode-id="5456"><span data-dcnode-id="5457" instrument_node="">Stress reduction compared to prisoners viewing prison courtyard.</span></td></tr><tr class="valign-top" data-dcnode-id="5445"><td data-dcnode-id="5454"></td><td data-dcnode-id="5453"></td><td data-dcnode-id="5450"><em data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">Prison courtyard</span></em></td><td data-dcnode-id="5446"><em data-dcnode-id="5447"><span data-dcnode-id="5449" instrument_node="">Prisoners viewing prison courtyard had a 24% higher frequency of sick-call visits, compared to those viewing farmland.</span><br data-dcnode-id="5448"></em></td></tr><tr class="valign-top" data-dcnode-id="5435"><td data-dcnode-id="5443"><span data-dcnode-id="5444" instrument_node="">3</span></td><td data-dcnode-id="5440"><a class="workspace-trigger" data-dcnode-id="5441" href="#bib64" name="bbib64"><span data-dcnode-id="5442" instrument_node="">Ulrich (1984)</span></a></td><td data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">Natural scene; trees</span></td><td data-dcnode-id="5436"><span data-dcnode-id="5437" instrument_node="">Shorter post-operative hospital stays, lower scores for minor post-surgical complications, received fewer negative comments in evaluative nurses’ notes and took fewer strong analgesics than the patients looking at brick wall.</span></td></tr><tr class="valign-top" data-dcnode-id="5425"><td data-dcnode-id="5434"></td><td data-dcnode-id="5433"></td><td data-dcnode-id="5430"><em data-dcnode-id="5431"><span data-dcnode-id="5432" instrument_node="">Brick building wall</span></em></td><td data-dcnode-id="5426"><em data-dcnode-id="5427"><span data-dcnode-id="5429" instrument_node="">Longer post-operative hospital stays, higher scores for minor post-surgical complications, higher frequency of negative evaluative comments from nurses’ notes, higher number of doses of strong analgesics than patients looking at natural scene.</span><br data-dcnode-id="5428"></em></td></tr><tr class="valign-top" data-dcnode-id="5415"><td data-dcnode-id="5423"><span data-dcnode-id="5424" instrument_node="">4</span></td><td data-dcnode-id="5420"><a class="workspace-trigger" data-dcnode-id="5421" href="#bib41" name="bbib41"><span data-dcnode-id="5422" instrument_node="">Laumann et al. (2001)</span></a></td><td data-dcnode-id="5418"><span data-dcnode-id="5419" instrument_node="">Nature scenes: forest with lakes and creeks; park with various plant species and artificial creek; sea area with coastline, grass, cows and birds; mountain with snow and ice</span></td><td data-dcnode-id="5416"><span data-dcnode-id="5417" instrument_node="">Restorative effect: environments with nature elements generally scored higher rating scale measures of restoration than city environments.</span></td></tr><tr class="valign-top" data-dcnode-id="5405"><td data-dcnode-id="5414"></td><td data-dcnode-id="5413"></td><td data-dcnode-id="5410"><em data-dcnode-id="5411"><span data-dcnode-id="5412" instrument_node="">Urban scene: major pedestrian street, bus/train station, rush hour</span></em></td><td data-dcnode-id="5406"><em data-dcnode-id="5407"><span data-dcnode-id="5409" instrument_node="">Restorative effect: city environment scored lower rating scale measures than natural environments.</span><br data-dcnode-id="5408"></em></td></tr><tr class="valign-top" data-dcnode-id="5393"><td data-dcnode-id="5403"><span data-dcnode-id="5404" instrument_node="">5</span></td><td data-dcnode-id="5400"><a class="workspace-trigger" data-dcnode-id="5401" href="#bib22" name="bbib22"><span data-dcnode-id="5402" instrument_node="">Hartig et al. (2003)</span></a></td><td data-dcnode-id="5396"><span data-dcnode-id="5399" instrument_node="">Natural environment: tree views/nature reserve (1600</span><span data-dcnode-id="5398" instrument_node="">&nbsp;</span><span data-dcnode-id="5397" instrument_node="">ha of vegetation and wildlife)</span></td><td data-dcnode-id="5394"><span data-dcnode-id="5395" instrument_node="">Reduced stress and improved mood: reduced stress levels/lower blood pressure. Increase in positive affect and decrease in anger/aggression.</span></td></tr><tr class="valign-top" data-dcnode-id="5383"><td data-dcnode-id="5392"></td><td data-dcnode-id="5391"></td><td data-dcnode-id="5388"><em data-dcnode-id="5389"><span data-dcnode-id="5390" instrument_node="">No view/urban environment with medium density professional office and retail development</span></em></td><td data-dcnode-id="5384"><em data-dcnode-id="5385"><span data-dcnode-id="5387" instrument_node="">Increase in blood pressure, reduced positive affect and increased anger/aggression.</span><br data-dcnode-id="5386"></em></td></tr><tr class="valign-top" data-dcnode-id="5373"><td data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">6</span></td><td data-dcnode-id="5378"><a class="workspace-trigger" data-dcnode-id="5379" href="#bib42" name="bbib42"><span data-dcnode-id="5380" instrument_node="">Laumann et al. (2003)</span></a></td><td data-dcnode-id="5376"><span data-dcnode-id="5377" instrument_node="">Natural environment: waterside/coast environment with grazing cows</span></td><td data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">Restorative effect: lower heart rate than subjects who watched the urban environment.</span></td></tr><tr class="valign-top" data-dcnode-id="5363"><td data-dcnode-id="5372"></td><td data-dcnode-id="5371"></td><td data-dcnode-id="5368"><em data-dcnode-id="5369"><span data-dcnode-id="5370" instrument_node="">Urban environment: pedestrian street, bus station, streets with traffic</span></em></td><td data-dcnode-id="5364"><em data-dcnode-id="5365"><span data-dcnode-id="5367" instrument_node="">Higher heart rate than the group watching the natural environment.</span><br data-dcnode-id="5366"></em></td></tr><tr class="valign-top" data-dcnode-id="5353"><td data-dcnode-id="5361"><span data-dcnode-id="5362" instrument_node="">7</span></td><td data-dcnode-id="5358"><a class="workspace-trigger" data-dcnode-id="5359" href="#bib55" name="bbib55"><span data-dcnode-id="5360" instrument_node="">Staats et al. (2003)</span></a></td><td data-dcnode-id="5356"><span data-dcnode-id="5357" instrument_node="">Natural environment; dense and open forest, path, no people</span></td><td data-dcnode-id="5354"><span data-dcnode-id="5355" instrument_node="">Attentional fatigue gave higher preference for the natural environment over the urban environment.</span></td></tr><tr class="valign-top" data-dcnode-id="5343"><td data-dcnode-id="5352"></td><td data-dcnode-id="5351"></td><td data-dcnode-id="5348"><em data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">Urban environment; inner city, shopping streets, traffic, residential areas, urban park, people</span></em></td><td data-dcnode-id="5344"><em data-dcnode-id="5345"><span data-dcnode-id="5347" instrument_node="">Attentional fatigue gave lower preference for urban environment.</span><br data-dcnode-id="5346"></em></td></tr><tr class="valign-top" data-dcnode-id="5333"><td data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">8</span></td><td data-dcnode-id="5338"><a class="workspace-trigger" data-dcnode-id="5339" href="#bib60" name="bbib60"><span data-dcnode-id="5340" instrument_node="">Tennessen and Cimprich (1995)</span></a></td><td data-dcnode-id="5336"><span data-dcnode-id="5337" instrument_node="">Natural or mostly natural view (trees, grass, bushes and/or lakes, no evidence of human influence)</span></td><td data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">Natural views gave higher scores on directed attention than built views. Natural views had no effect on mood state.</span></td></tr><tr class="valign-top" data-dcnode-id="5323"><td data-dcnode-id="5332"></td><td data-dcnode-id="5331"></td><td data-dcnode-id="5328"><em data-dcnode-id="5329"><span data-dcnode-id="5330" instrument_node="">Built or mostly built view (city street, other buildings, brick wall)</span></em></td><td data-dcnode-id="5324"><em data-dcnode-id="5325"><span data-dcnode-id="5327" instrument_node="">Built views gave lower scores on directed attention than natural views.</span><br data-dcnode-id="5326"></em></td></tr><tr class="valign-top" data-dcnode-id="5312"><td data-dcnode-id="5321"><span data-dcnode-id="5322" instrument_node="">9</span></td><td data-dcnode-id="5317"><span data-dcnode-id="5320" instrument_node="">Kaplan et al. </span><a class="workspace-trigger" data-dcnode-id="5318" href="#bib31" name="bbib31"><span data-dcnode-id="5319" instrument_node="">(1988, reported in Kaplan, 1993)</span></a></td><td data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">View including natural elements</span></td><td data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">Fewer ailments and higher job satisfaction with nature in view.</span></td></tr><tr class="valign-top" data-dcnode-id="5302"><td data-dcnode-id="5311"></td><td data-dcnode-id="5310"></td><td data-dcnode-id="5307"><em data-dcnode-id="5308"><span data-dcnode-id="5309" instrument_node="">No view or view without natural elements</span></em></td><td data-dcnode-id="5303"><em data-dcnode-id="5304"><span data-dcnode-id="5306" instrument_node="">Higher number of ailments and lower job satisfaction among workers with no view or view without nature than among workers with nature in view.</span><br data-dcnode-id="5305"></em></td></tr><tr class="valign-top" data-dcnode-id="5292"><td data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">10</span></td><td data-dcnode-id="5297"><a class="workspace-trigger" data-dcnode-id="5298" href="#bib31" name="bbib31"><span data-dcnode-id="5299" instrument_node="">Kaplan (1993)</span></a></td><td data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">View including natural elements</span></td><td data-dcnode-id="5293"><span data-dcnode-id="5294" instrument_node="">Availability of nature in the view strongly affected satisfaction and restorative ratings; less frustration and more patience, higher enthusiasm and life satisfaction as well as overall health.</span></td></tr><tr class="valign-top" data-dcnode-id="5282"><td data-dcnode-id="5291"></td><td data-dcnode-id="5290"></td><td data-dcnode-id="5287"><em data-dcnode-id="5288"><span data-dcnode-id="5289" instrument_node="">View without natural elements</span></em></td><td data-dcnode-id="5283"><em data-dcnode-id="5284"><span data-dcnode-id="5286" instrument_node="">No view or no access gave lower values of satisfaction and restorative ratings.</span><br data-dcnode-id="5285"></em></td></tr><tr class="valign-top" data-dcnode-id="5272"><td data-dcnode-id="5280"><span data-dcnode-id="5281" instrument_node="">11</span></td><td data-dcnode-id="5277"><a class="workspace-trigger" data-dcnode-id="5278" href="#bib17" name="bbib17"><span data-dcnode-id="5279" instrument_node="">Grahn et al. (1997)</span></a></td><td data-dcnode-id="5275"><span data-dcnode-id="5276" instrument_node="">School playground with high degree of naturalness</span></td><td data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">Fewer sick-days, fewer attentional problems, fewer concentration problems, improved motor function.</span></td></tr><tr class="valign-top" data-dcnode-id="5262"><td data-dcnode-id="5271"></td><td data-dcnode-id="5270"></td><td data-dcnode-id="5267"><em data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">School playground with low degree of naturalness</span></em></td><td data-dcnode-id="5263"><em data-dcnode-id="5264"><span data-dcnode-id="5266" instrument_node="">Higher number of sick days, attentional problems, higher degree of concentration problems and lower motor function than children playing in “natural” playground.</span><br data-dcnode-id="5265"></em></td></tr><tr class="valign-top" data-dcnode-id="5256"><td data-dcnode-id="5261"></td><td data-dcnode-id="5260"></td><td colspan="2" data-dcnode-id="5257"><strong data-dcnode-id="5258"><span data-dcnode-id="5259" instrument_node="">Subcategories of nature (in roman) and urban (in italics)</span></strong></td></tr><tr class="valign-top" data-dcnode-id="5246"><td data-dcnode-id="5254"><span data-dcnode-id="5255" instrument_node="">12</span></td><td data-dcnode-id="5251"><a class="workspace-trigger" data-dcnode-id="5252" href="#bib52" name="bbib52"><span data-dcnode-id="5253" instrument_node="">Parsons et al. (1998)</span></a></td><td data-dcnode-id="5249"><span data-dcnode-id="5250" instrument_node="">Natural scenes; forest (1) and golf (2)</span></td><td data-dcnode-id="5247"><span data-dcnode-id="5248" instrument_node="">Inter-beat interval: golf more complete recovery than urban (passive stressor). Blood pressure: forest and mixed more complete than urban (passive stressor). Golf quicker recovery than urban (passive stressor), urban quicker recovery than golf (active stressor). Skin conductance level: golf more complete recovery than others. Immunization: forest/golf less responsive than mixed/urban. Facial electromyography (EMG) activity; forest greater than others.</span></td></tr><tr class="valign-top" data-dcnode-id="5236"><td data-dcnode-id="5245"></td><td data-dcnode-id="5244"></td><td data-dcnode-id="5241"><em data-dcnode-id="5242"><span data-dcnode-id="5243" instrument_node="">Urban scenes; mixed residential and light development (1) and urban (2)</span></em></td><td data-dcnode-id="5237"><em data-dcnode-id="5238"><span data-dcnode-id="5240" instrument_node="">Skin conductance level: urban greater than others. Urban slower recovery than mixed.</span><br data-dcnode-id="5239"></em></td></tr><tr class="valign-top" data-dcnode-id="5226"><td data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">13</span></td><td data-dcnode-id="5231"><a class="workspace-trigger" data-dcnode-id="5232" href="#bib67" name="bbib67"><span data-dcnode-id="5233" instrument_node="">Ulrich et al. (1991)</span></a></td><td data-dcnode-id="5229"><span data-dcnode-id="5230" instrument_node="">Natural scene: vegetation and vegetation with water</span></td><td data-dcnode-id="5227"><span data-dcnode-id="5228" instrument_node="">Lower fear and anger, higher levels of positive affects and intake/attention, faster and more complete recovery, greater stress reduction heart period deceleration (non-significant differences between scenes with and without water).</span></td></tr><tr class="valign-top" data-dcnode-id="5216"><td data-dcnode-id="5225"></td><td data-dcnode-id="5224"></td><td data-dcnode-id="5221"><em data-dcnode-id="5222"><span data-dcnode-id="5223" instrument_node="">Urban scenes; with light or heavy traffic, few or many pedestrians (mall)</span></em></td><td data-dcnode-id="5217"><em data-dcnode-id="5218"><span data-dcnode-id="5220" instrument_node="">Slower and less complete recovery, lack in recovery in pulse transit time (PTT) for traffic environments, heart period acceleration. The traffic settings produced more recuperation than did the pedestrian mall exposures. </span><br data-dcnode-id="5219"></em></td></tr><tr class="valign-top" data-dcnode-id="5206"><td data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">14</span></td><td data-dcnode-id="5211"><a class="workspace-trigger" data-dcnode-id="5212" href="#bib63" name="bbib63"><span data-dcnode-id="5213" instrument_node="">Ulrich (1981)</span></a></td><td data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">Nature scenes; dominated by vegetation including cultivated fields</span></td><td data-dcnode-id="5207"><span data-dcnode-id="5208" instrument_node="">Positive influence on psycho-physiological state; significantly higher alpha; positive influence on emotional state.</span></td></tr><tr class="valign-top" data-dcnode-id="5199"><td data-dcnode-id="5205"></td><td data-dcnode-id="5204"></td><td data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">Nature scenes with water</span></td><td data-dcnode-id="5200"><span data-dcnode-id="5201" instrument_node="">Positive influence on psycho-physiological state; significantly higher alpha; particularly positive influence on emotional state.</span></td></tr><tr class="valign-top" data-dcnode-id="5189"><td data-dcnode-id="5198"></td><td data-dcnode-id="5197"></td><td data-dcnode-id="5194"><em data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">Urban scenes; commercial landscapes and industrial areas</span></em></td><td data-dcnode-id="5190"><em data-dcnode-id="5191"><span data-dcnode-id="5193" instrument_node="">Less positive influence on psychophysical state; lower alpha, less positive influence on emotional state.</span><br data-dcnode-id="5192"></em></td></tr><tr class="valign-top" data-dcnode-id="5179"><td data-dcnode-id="5187"><span data-dcnode-id="5188" instrument_node="">15</span></td><td data-dcnode-id="5184"><a class="workspace-trigger" data-dcnode-id="5185" href="#bib26" name="bbib26"><span data-dcnode-id="5186" instrument_node="">Herzog and Chernick (2000)</span></a></td><td data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">Natural scene: field/forest with high and low degree of openness</span></td><td data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">Higher tranquillity, lower feeling of danger.</span></td></tr><tr class="valign-top" data-dcnode-id="5169"><td data-dcnode-id="5178"></td><td data-dcnode-id="5177"></td><td data-dcnode-id="5174"><em data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node="">Urban scenes with high and low degrees of openness</span></em></td><td data-dcnode-id="5170"><em data-dcnode-id="5171"><span data-dcnode-id="5173" instrument_node="">Lower tranquillity, higher feeling of danger.</span><br data-dcnode-id="5172"></em></td></tr><tr class="valign-top" data-dcnode-id="5159"><td data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">16</span></td><td data-dcnode-id="5164"><a class="workspace-trigger" data-dcnode-id="5165" href="#bib44" name="bbib44"><span data-dcnode-id="5166" instrument_node="">Lohr and Pearson-Mims (2006)</span></a></td><td data-dcnode-id="5162"><span data-dcnode-id="5163" instrument_node="">Urban background with trees with varying canopy form (spreading, rounded and conical)</span></td><td data-dcnode-id="5160"><span data-dcnode-id="5161" instrument_node="">Positive emotional responses to urban with trees versus urban with inanimate object. Lower blood pressure and positive emotional response to trees with spreading shape compared to trees with rounded or conical forms. Positive response and lower blood pressure when viewing dense canopies. No significant differences in skin temperature or blood pressure when seeing trees than when viewing scenes with inanimate objects.</span></td></tr><tr class="valign-top" data-dcnode-id="5149"><td data-dcnode-id="5158"></td><td data-dcnode-id="5157"></td><td data-dcnode-id="5154"><em data-dcnode-id="5155"><span data-dcnode-id="5156" instrument_node="">Urban background with inanimate object</span></em></td><td data-dcnode-id="5150"><em data-dcnode-id="5151"><span data-dcnode-id="5153" instrument_node="">Urban with inanimate object less positive response versus urban with trees. </span><br data-dcnode-id="5152"></em></td></tr><tr class="valign-top" data-dcnode-id="5138"><td data-dcnode-id="5147"><span data-dcnode-id="5148" instrument_node="">17</span></td><td data-dcnode-id="5144"><a class="workspace-trigger" data-dcnode-id="5145" href="#bib54" name="bbib54"><span data-dcnode-id="5146" instrument_node="">Staats et al. (1997)</span></a></td><td data-dcnode-id="5142"><span data-dcnode-id="5143" instrument_node="">Forest landscapes of different density (dense versus half open) and accessibility (path versus interrupted path)</span></td><td data-dcnode-id="5139"><span data-dcnode-id="5141" instrument_node="">Higher pleasure for higher accessibility, no significant difference related to density, indication that low density gave rise to more pleasure.</span><br data-dcnode-id="5140"></td></tr><tr class="valign-top" data-dcnode-id="5128"><td data-dcnode-id="5136"><span data-dcnode-id="5137" instrument_node="">18</span></td><td data-dcnode-id="5133"><a class="workspace-trigger" data-dcnode-id="5134" href="#bib68" name="bbib68"><span data-dcnode-id="5135" instrument_node="">Van den Berg et al. (2003)</span></a></td><td data-dcnode-id="5131"><span data-dcnode-id="5132" instrument_node="">Park-like forest area with and without creek</span></td><td data-dcnode-id="5129"><span data-dcnode-id="5130" instrument_node="">Restoration; higher happiness, lower stress, anger, depression and tension. Improved mood and concentration. No difference was detected between environments with and without water.</span></td></tr><tr class="valign-top" data-dcnode-id="5118"><td data-dcnode-id="5127"></td><td data-dcnode-id="5126"></td><td data-dcnode-id="5123"><em data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">Urban environment: street along a canal with shops on the other side of the street and street with shops on both sides</span></em></td><td data-dcnode-id="5119"><em data-dcnode-id="5120"><span data-dcnode-id="5122" instrument_node="">No affective restoration with respect to overall happiness and stress. Less restoration with respect to depression, anger and tension.</span><br data-dcnode-id="5121"></em></td></tr><tr class="valign-top" data-dcnode-id="5112"><td data-dcnode-id="5117"></td><td data-dcnode-id="5116"></td><td colspan="2" data-dcnode-id="5113"><strong data-dcnode-id="5114"><span data-dcnode-id="5115" instrument_node="">Landscape (in roman) versus no view (in italic)</span></strong></td></tr><tr class="valign-top" data-dcnode-id="5102"><td data-dcnode-id="5110"><span data-dcnode-id="5111" instrument_node="">19</span></td><td data-dcnode-id="5107"><a class="workspace-trigger" data-dcnode-id="5108" href="#bib25" name="bbib25"><span data-dcnode-id="5109" instrument_node="">Heerwagen (1990)</span></a></td><td data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">Painting of natural scene; distant mountains, sunset, clustered trees and open grassy areas, path (mystery)</span></td><td data-dcnode-id="5103"><span data-dcnode-id="5104" instrument_node="">Stress reduction: patients felt calmer and less tense in the mural condition than in the plain waiting room. The restorative benefits of the nature scene were evident both in heart rate data and self-reports of emotional states.</span></td></tr><tr class="valign-top" data-dcnode-id="5092"><td data-dcnode-id="5101"></td><td data-dcnode-id="5100"></td><td data-dcnode-id="5097"><em data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">White wall</span></em></td><td data-dcnode-id="5093"><em data-dcnode-id="5094"><span data-dcnode-id="5096" instrument_node="">Patients watching white wall had higher heart rate increase during waiting period, were feeling less calm and more tense than patients watching landscape painting.</span><br data-dcnode-id="5095"></em></td></tr><tr class="valign-top" data-dcnode-id="5082"><td data-dcnode-id="5090"><span data-dcnode-id="5091" instrument_node="">20</span></td><td data-dcnode-id="5087"><a class="workspace-trigger" data-dcnode-id="5088" href="#bib49" name="bbib49"><span data-dcnode-id="5089" instrument_node="">Nakamura and Fujii (1992)</span></a></td><td data-dcnode-id="5085"><span data-dcnode-id="5086" instrument_node="">Hedge</span></td><td data-dcnode-id="5083"><span data-dcnode-id="5084" instrument_node="">Relaxing effect: the EEG data supported the conclusion that the greenery elicited relaxation.</span></td></tr><tr class="valign-top" data-dcnode-id="5072"><td data-dcnode-id="5081"></td><td data-dcnode-id="5080"></td><td data-dcnode-id="5077"><em data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">Concrete block fence</span></em></td><td data-dcnode-id="5073"><em data-dcnode-id="5074"><span data-dcnode-id="5076" instrument_node="">Watching the concrete block fence brings sensory stress.</span><br data-dcnode-id="5075"></em></td></tr><tr class="valign-top" data-dcnode-id="5062"><td data-dcnode-id="5070"><span data-dcnode-id="5071" instrument_node="">21</span></td><td data-dcnode-id="5067"><a class="workspace-trigger" data-dcnode-id="5068" href="#bib50" name="bbib50"><span data-dcnode-id="5069" instrument_node="">Ottosson and Grahn (2005)</span></a></td><td data-dcnode-id="5065"><span data-dcnode-id="5066" instrument_node="">Garden, with old fruit trees and a variety of flower species</span></td><td data-dcnode-id="5063"><span data-dcnode-id="5064" instrument_node="">Increased powers of concentration after resting in a garden outside the geriatric home, compared to that after resting indoors in their favourite room. The results did not show any effects on blood pressure or heart rate.</span></td></tr><tr class="valign-top" data-dcnode-id="5052"><td data-dcnode-id="5061"></td><td data-dcnode-id="5060"></td><td data-dcnode-id="5057"><em data-dcnode-id="5058"><span data-dcnode-id="5059" instrument_node="">Indoor environment (favourite room)</span></em></td><td data-dcnode-id="5053"><em data-dcnode-id="5054"><span data-dcnode-id="5056" instrument_node="">Lower power of concentration after resting inside (in favourite room) compared to resting in garden.</span><br data-dcnode-id="5055"></em></td></tr><tr class="valign-top" data-dcnode-id="5042"><td data-dcnode-id="5050"><span data-dcnode-id="5051" instrument_node="">22</span></td><td data-dcnode-id="5047"><a class="workspace-trigger" data-dcnode-id="5048" href="#bib5" name="bbib5"><span data-dcnode-id="5049" instrument_node="">Diette et al. (2003)</span></a></td><td data-dcnode-id="5045"><span data-dcnode-id="5046" instrument_node="">Nature scene; mountain stream in spring meadow, plus nature sound</span></td><td data-dcnode-id="5043"><span data-dcnode-id="5044" instrument_node="">Significantly reduced pain for the participants exposed to nature scene and sound. No difference in mean level of anxiety.</span></td></tr><tr class="valign-top" data-dcnode-id="5032"><td data-dcnode-id="5041"></td><td data-dcnode-id="5040"></td><td data-dcnode-id="5037"><em data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">Without any scene or sound</span></em></td><td data-dcnode-id="5033"><em data-dcnode-id="5034"><span data-dcnode-id="5036" instrument_node="">Control group reported higher levels of pain. No difference in mean level of anxiety.</span><br data-dcnode-id="5035"></em></td></tr><tr class="valign-top" data-dcnode-id="5026"><td data-dcnode-id="5031"></td><td data-dcnode-id="5030"></td><td colspan="2" data-dcnode-id="5027"><strong data-dcnode-id="5028"><span data-dcnode-id="5029" instrument_node="">Range of greenery</span></strong></td></tr><tr class="valign-top" data-dcnode-id="5016"><td data-dcnode-id="5024"><span data-dcnode-id="5025" instrument_node="">23</span></td><td data-dcnode-id="5021"><a class="workspace-trigger" data-dcnode-id="5022" href="#bib40" name="bbib40"><span data-dcnode-id="5023" instrument_node="">Kuo et al. (1998)</span></a></td><td data-dcnode-id="5019"><span data-dcnode-id="5020" instrument_node="">Amount of green vegetation in neighbourhood common spaces (greenness rating 0–4)</span></td><td data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">Stronger social ties, higher sense of safety and adjustment.</span></td></tr><tr class="valign-top" data-dcnode-id="5008"><td data-dcnode-id="5015"></td><td data-dcnode-id="5014"></td><td data-dcnode-id="5013"></td><td data-dcnode-id="5009"><em data-dcnode-id="5011"><span data-dcnode-id="5012" instrument_node="">Weaker social ties, lower sense of safety and adjustment than residents with higher degree of greenery.</span></em><br data-dcnode-id="5010"></td></tr><tr class="valign-top" data-dcnode-id="4997"><td data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">24</span></td><td data-dcnode-id="5003"><a class="workspace-trigger" data-dcnode-id="5004" href="#bib38" name="bbib38"><span data-dcnode-id="5005" instrument_node="">Kuo and Sullivan (2001a)</span></a></td><td data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">Amount of green vegetation in neighbourhood common spaces (greenness rating 0–4)</span></td><td data-dcnode-id="4998"><span data-dcnode-id="5000" instrument_node="">Less aggressive behaviour, fewer crimes reported to the police (both property crimes and violent crimes) than in areas without greenery.</span><br data-dcnode-id="4999"></td></tr><tr class="valign-top" data-dcnode-id="4989"><td data-dcnode-id="4996"></td><td data-dcnode-id="4995"></td><td data-dcnode-id="4994"></td><td data-dcnode-id="4990"><em data-dcnode-id="4992"><span data-dcnode-id="4993" instrument_node="">More aggressive behaviour, more crimes reported to the police (both property crimes and violent crimes) than in areas with greenery.</span></em><br data-dcnode-id="4991"></td></tr><tr class="valign-top" data-dcnode-id="4979"><td data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">25</span></td><td data-dcnode-id="4984"><a class="workspace-trigger" data-dcnode-id="4985" href="#bib37" name="bbib37"><span data-dcnode-id="4986" instrument_node="">Kuo (2001)</span></a></td><td data-dcnode-id="4982"><span data-dcnode-id="4983" instrument_node="">Amount of green vegetation in neighbourhood common spaces (greenness rating 0–4)</span></td><td data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">Lower mental fatigue: residents with nearby nature were more likely to be able to deal with the major issues of their lives. Such residents felt more hopeful and less helpless about the issues facing them.</span></td></tr><tr class="valign-top" data-dcnode-id="4970"><td data-dcnode-id="4978"></td><td data-dcnode-id="4977"></td><td data-dcnode-id="4976"></td><td data-dcnode-id="4971"><em data-dcnode-id="4974"><span data-dcnode-id="4975" instrument_node="">Higher mental fatigue: residents without nearby nature were less likely to be able to deal with the major issues of their lives. Such residents felt less hopeful and more helpless about the issues facing them.</span></em><span data-dcnode-id="4973" instrument_node=""> </span><br data-dcnode-id="4972"></td></tr><tr class="valign-top" data-dcnode-id="4960"><td data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">26</span></td><td data-dcnode-id="4965"><a class="workspace-trigger" data-dcnode-id="4966" href="#bib59" name="bbib59"><span data-dcnode-id="4967" instrument_node="">Taylor et al. (2002)</span></a></td><td data-dcnode-id="4963"><span data-dcnode-id="4964" instrument_node="">Amount of window view of nature (0–4 scale)</span></td><td data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">Improved self-discipline in inner city girls: For girls, view accounted for 20% of the variance in scores on the combined self-discipline index. For boys, view from home showed no relationship to performance on any measure.</span></td></tr><tr class="valign-top" data-dcnode-id="4952"><td data-dcnode-id="4959"></td><td data-dcnode-id="4958"></td><td data-dcnode-id="4957"></td><td data-dcnode-id="4953"><em data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">Lower self-discipline ratings for girls with less greenery in the window view.</span></em><br data-dcnode-id="4954"></td></tr><tr class="valign-top" data-dcnode-id="4942"><td data-dcnode-id="4950"><span data-dcnode-id="4951" instrument_node="">27</span></td><td data-dcnode-id="4947"><a class="workspace-trigger" data-dcnode-id="4948" href="#bib56" name="bbib56"><span data-dcnode-id="4949" instrument_node="">Stigsdotter (2004)</span></a></td><td data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">Workplace greenery; four levels from no view of and no access to garden to view of and access to garden at workplace</span></td><td data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node="">View or access to garden gave improved comfort, pleasure and well-being (“trivsel” in Swedish) and lower stress levels.</span></ rigger" data-dcnode-id="4652" href="#bib41" name="bbib41"><span data-dcnode-id="4653" instrument_node="">Laumann et al. (2001)</span></a><span data-dcnode-id="4651" instrument_node="">,</span><a class="workspace-trigger" data-dcnode-id="4649" href="#bib55" name="bbib55"><span data-dcnode-id="4650" instrument_node="">Staats et al. (2003)</span></a><span data-dcnode-id="4648" instrument_node="">, and </span><a class="workspace-trigger" data-dcnode-id="4646" href="#bib56" name="bbib56"><span data-dcnode-id="4647" instrument_node="">Stigsdotter (2004)</span></a></td></tr><tr class="valign-top" data-dcnode-id="4635"><td data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">Self-rating of perceived health</span></td><td data-dcnode-id="4636"><a class="workspace-trigger" data-dcnode-id="4640" href="#bib45" name="bbib45"><span data-dcnode-id="4641" instrument_node="">Maas et al. (2006)</span></a><span data-dcnode-id="4639" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="4637" href="#bib5" name="bbib5"><span data-dcnode-id="4638" instrument_node="">Diette et al. (2003)</span></a></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="4626"><dt data-dcnode-id="4630" id="tblfn2a"><span data-dcnode-id="4631" instrument_node="">a</span></dt><dd data-dcnode-id="4627"><p data-dcnode-id="4628"><span data-dcnode-id="4629" instrument_node="">Note that some of the studies have combined different measures.</span></p></dd></dl></div><figure class="figure text-xs" data-dcnode-id="4607" id="fig1"><span data-dcnode-id="4615"><img alt="" data-dcnode-id="4624" height="302" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866707000416-gr1.jpg&amp;raw"><span data-dcnode-id="4623" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4616"><li data-dcnode-id="4617"><a class="anchor download-link u-font-sans" data-dcnode-id="4618" download="" href="https:/
