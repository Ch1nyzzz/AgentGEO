d="4596" instrument_node="">Fig. 2</span></span><span data-dcnode-id="4594" instrument_node="">. </span><span data-dcnode-id="4593" instrument_node="">Subcategories of landscapes compared in studies of health effects of viewing landscapes. (Boxes indicate identified subcategories within the natural and urban landscape categories. Arrows indicate the subcategories compared in each study.)</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="4571" id="fig3"><span data-dcnode-id="4579"><img alt="" data-dcnode-id="4588" height="263" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866707000416-gr3.jpg&amp;raw"><span data-dcnode-id="4587" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4580"><li data-dcnode-id="4581"><a class="anchor download-link u-font-sans" data-dcnode-id="4582" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866707000416-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4583"><span data-dcnode-id="4586" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4572"><span data-dcnode-id="4573"><p data-dcnode-id="4574"><span class="label" data-dcnode-id="4577"><span data-dcnode-id="4578" instrument_node="">Fig. 3</span></span><span data-dcnode-id="4576" instrument_node="">. </span><span data-dcnode-id="4575" instrument_node="">Groups of respondents in landscape-health investigations.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="4553" id="fig4"><span data-dcnode-id="4561"><img alt="" data-dcnode-id="4570" height="235" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866707000416-gr4.jpg&amp;raw"><span data-dcnode-id="4569" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4562"><li data-dcnode-id="4563"><a class="anchor download-link u-font-sans" data-dcnode-id="4564" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1618866707000416-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4565"><span data-dcnode-id="4568" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4554"><span data-dcnode-id="4555"><p data-dcnode-id="4556"><span class="label" data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node="">Fig. 4</span></span><span data-dcnode-id="4558" instrument_node="">. </span><span data-dcnode-id="4557" instrument_node="">Schematic diagram showing health effects of viewing landscapes; natural scenes generally gave a more positive effect compared to urban scenes.</span></p></span></span></figure></div><p data-dcnode-id="4507"><span data-dcnode-id="4551" instrument_node="">In the review, each article was logged in a database using the following headings: </span></p><dl class="list" data-dcnode-id="4508"><dt class="list-label" data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4544"><p data-dcnode-id="4545"><em data-dcnode-id="4547"><span data-dcnode-id="4548" instrument_node="">Categories of landscapes</span></em><span data-dcnode-id="4546" instrument_node="">: this described the content of the landscapes in the categories of natural/urban and landscape/no-landscape in the reviewed papers.</span></p></dd><dt class="list-label" data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4537"><p data-dcnode-id="4538"><em data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">Reported health effects</span></em><span data-dcnode-id="4539" instrument_node="">: the effects recorded for the different landscape categories in each study.</span></p></dd><dt class="list-label" data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4530"><p data-dcnode-id="4531"><em data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">Kind of stimulus</span></em><span data-dcnode-id="4532" instrument_node="">: the landscape stimulus used in the studies (window view, video, photographs, and presence of nature in residential area, etc.).</span></p></dd><dt class="list-label" data-dcnode-id="4528"><span data-dcnode-id="4529" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4523"><p data-dcnode-id="4524"><em data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">Method</span></em><span data-dcnode-id="4525" instrument_node="">: how the study was conducted.</span></p></dd><dt class="list-label" data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4516"><p data-dcnode-id="4517"><em data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">Measures</span></em><span data-dcnode-id="4518" instrument_node="">: how health effects were measured.</span></p></dd><dt class="list-label" data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4509"><p data-dcnode-id="4510"><em data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">Groups of respondents</span></em><span data-dcnode-id="4511" instrument_node="">: who the participants were (general public, students, and hospital patients, etc.).</span></p></dd></dl><p></p><p data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">All papers used included data on authors and the country where the study took place. This provided a quick overview of the existing evidence for health effects of viewing landscapes, as well as helping identify areas of knowledge requiring further empirical evidence.</span></p><p data-dcnode-id="4500"><span data-dcnode-id="4504" instrument_node="">We use the word “landscape” as defined by the European Landscape Convention: “an area, as perceived by people, whose character is the result of the action and interaction of natural and/or human factors” (</span><a class="workspace-trigger" data-dcnode-id="4502" href="#bib4" name="bbib4"><span data-dcnode-id="4503" instrument_node="">Council of Europe, 2000, p. 3</span></a><span data-dcnode-id="4501" instrument_node="">).</span></p></section><section data-dcnode-id="4449" id="aep-section-id26"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">Results</span></h2><p data-dcnode-id="4492"><span data-dcnode-id="4496" instrument_node="">The findings from the literature review are summarised in </span><a class="workspace-trigger" data-dcnode-id="4494" href="#tbl1" name="btbl1"><span data-dcnode-id="4495" instrument_node="">Table 1</span></a><span data-dcnode-id="4493" instrument_node="">.</span></p><section data-dcnode-id="4477" id="aep-section-id27"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4490"><span data-dcnode-id="4491" instrument_node="">Landscape categories assessed in nature and health research</span></h3><p data-dcnode-id="4482"><span data-dcnode-id="4489" instrument_node="">Through the literature review, we have identified the landscape categories assessed in studies of health effects of viewing landscapes; 48% assessed two contrasting categories of landscapes, natural versus urban or landscape versus no view (e.g., white wall); 29% of the studies applied different levels of greenery, assessed as a percentage of the view from a window or estimated on a five-point scale; 23% of the studies reviewed applied subcategories within the urban or natural landscape categories (see </span><a class="workspace-trigger" data-dcnode-id="4487" href="#fig1" name="bfig1"><span data-dcnode-id="4488" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4486" instrument_node="">). The subcategories identified are shown in </span><a class="workspace-trigger" data-dcnode-id="4484" href="#fig2" name="bfig2"><span data-dcnode-id="4485" instrument_node="">Fig. 2</span></a><span data-dcnode-id="4483" instrument_node="">.</span></p><p data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">The landscape stimuli used in the studies were views from the window, views of a video clip or still images on a screen, or walks through different types of landscape with varying amounts of greenery in residential neighbourhoods or at a working place.</span></p><p data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">Approximately half of the studies reported in the review were conducted using images of landscapes (from a window, a video, and a photograph, etc.) but no exposure to real landscapes. The remaining studies were based on activities in real landscapes where the differences in treatment were the landscape type where activities were performed.</span></p></section><section data-dcnode-id="4468" id="aep-section-id28"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">Reported health effects of exposure to the landscape view</span></h3><p data-dcnode-id="4471"><a class="workspace-trigger" data-dcnode-id="4473" href="#tbl1" name="btbl1"><span data-dcnode-id="4474" instrument_node="">Table 1</span></a><span data-dcnode-id="4472" instrument_node=""> shows the landscape categories identified and the reported health effects related to each of them. Most of the health findings related to the urban/nature and landscape/no-landscape comparisons, where views of nature were found to provide greater positive health effects compared to urban views. Comparisons between subcategories of landscapes within the natural and urban landscape categories showed less clear results.</span></p><p data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">The identified health effects fall into three main types: Firstly, short-term recovery from stress or mental fatigue (psychological); secondly, the physical recovery from an illness or reduced incidence of physical illness; and, thirdly, a long-term behavioural change and an overall improvement in well-being (increased social interaction and reduction of aggressive behaviour).</span></p></section><section data-dcnode-id="4458" id="aep-section-id29"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4466"><span data-dcnode-id="4467" instrument_node="">Research methods and measures used to assess health effects</span></h3><p data-dcnode-id="4461"><span data-dcnode-id="4465" instrument_node="">A wide range of research designs were used in the reviewed studies, reflecting the range of health effects that have been investigated. Both quantitative and qualitative methods have been used. The quantitative methods include observations such as frequency of sick-call visits, number of days in hospital, doses of analgesics needed, motor function tests, attention-tests or quantitative emotional tests as well as physical measures including blood pressure, skin conductance, brain activity, heart rate and muscle tension. Among the qualitative methods are observations of behaviour as well as surveys, including self-reports (</span><a class="workspace-trigger" data-dcnode-id="4463" href="#tbl2" name="btbl2"><span data-dcnode-id="4464" instrument_node="">Table 2</span></a><span data-dcnode-id="4462" instrument_node="">).</span></p><p data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">Behavioural changes were mainly assessed through observations, self-reports, questionnaires, structured interviews or by parent ratings and direct observation in the case of children.</span></p></section><section data-dcnode-id="4450" id="aep-section-id30"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">Groups of respondents</span></h3><p data-dcnode-id="4451"><span data-dcnode-id="4455" instrument_node="">The target individuals varied widely among the studies. Most studies addressed the general public (37%) or students (28%). In 13% of the studies “stressed individuals”, were respondents exposed to a stressor before exposure to landscapes. In 9% of the studies the respondents were hospital patients, their families or hospital staff (</span><a class="workspace-trigger" data-dcnode-id="4453" href="#fig3" name="bfig3"><span data-dcnode-id="4454" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4452" instrument_node="">).</span></p></section></section><section data-dcnode-id="4138" id="aep-section-id31"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4447"><span data-dcnode-id="4448" instrument_node="">Discussion</span></h2><section data-dcnode-id="4356" id="aep-section-id32"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4445"><span data-dcnode-id="4446" instrument_node="">Landscapes used in environmental psychology investigations of nature and health</span></h3><p data-dcnode-id="4443"><span data-dcnode-id="4444" instrument_node="">The review has revealed that in studies comparing the health outcomes of visual exposure to different categories of landscapes, the categories compared were generally very coarse. The majority of studies used only two categories (e.g., exposure to natural landscape versus urban or comparing landscape view versus no view. Less than 25% of the studies applied subcategories of natural and urban. These coarse categories clearly fail to reflect the vast variety of landscapes and landscape elements that are important in defining the character of “natural” or “urban” landscapes. Even though there was a wide range of landscape elements used in the reviewed studies, they still provide us with little information about which landscape elements have contributed most to the reported health effects. In the two studies subcategories are related to the presence or absence of water in natural and urban scenes. A further two studies assessed the effect of openness in natural and urban settings. Other detailed studies were not related directly to specific elements (e.g., comparing golf landscapes to forests) and only one study analysed responses to specific landscape elements by comparing the effects of different tree canopy shapes.</span></p><p data-dcnode-id="4438"><span data-dcnode-id="4442" instrument_node="">Natural landscapes were found to have a more positive effect on health than urban landscapes (see </span><a class="workspace-trigger" data-dcnode-id="4440" href="#fig4" name="bfig4"><span data-dcnode-id="4441" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4439" instrument_node="">). However, because of the coarseness of the categories compared we cannot distinguish which of the urban landscapes were worse or better or which of the natural ones gave the strongest positive health effect. The results indicate that the presence of water gives a positive health effect, but the results are rather weak. No clear relationship was identified between openness and health effects.</span></p><p data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">Twenty-nine per cent of the studies assessed the effects of varying amounts of greenery in residential or working environments. All of these environments are urban with varying amounts of natural elements present. These studies investigating the health effects of greenery around work or living places indicated that the greener the environment the better. However, they do not provide any information about what kind of greenery produces the greatest benefit, or whether all kinds of natural elements give similar effects.</span></p><p data-dcnode-id="4404"><span data-dcnode-id="4435" instrument_node="">Most of the reviewed studies report short-term health effects of either psychological or physical nature, e.g., short-term recovery from stress or mental fatigue (psychological). Health and psychological well-being are, nevertheless, not only about not being ill. It is important to consider resources that regularly become diminished, “as when we tire mentally over the course of a work week” (</span><a class="workspace-trigger" data-dcnode-id="4433" href="#bib19" name="bbib19"><span data-dcnode-id="4434" instrument_node="">Hartig, 2004, p. 2</span></a><span data-dcnode-id="4432" instrument_node="">). Even though some of the measured behavioural changes are apparently short-term effects, the accumulation of such short-term outcomes may have implications for longer-term health outcomes (</span><a class="workspace-trigger" data-dcnode-id="4430" href="#bib19" name="bbib19"><span data-dcnode-id="4431" instrument_node="">Hartig, 2004</span></a><span data-dcnode-id="4429" instrument_node="">). Such cases thus support the likelihood of long-term health benefits related to behavioural changes associated with social ties (</span><a class="workspace-trigger" data-dcnode-id="4427" href="#bib40" name="bbib40"><span data-dcnode-id="4428" instrument_node="">Kuo et al., 1998</span></a><span data-dcnode-id="4426" instrument_node="">), improving self-discipline (</span><a class="workspace-trigger" data-dcnode-id="4424" href="#bib59" name="bbib59"><span data-dcnode-id="4425" instrument_node="">Taylor et al., 2002</span></a><span data-dcnode-id="4423" instrument_node="">), decreasing aggressive behaviour (</span><a class="workspace-trigger" data-dcnode-id="4421" href="#bib38" name="bbib38"><span data-dcnode-id="4422" instrument_node="">Kuo and Sullivan, 2001a</span></a><span data-dcnode-id="4420" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4418" href="#bib39" name="bbib39"><span data-dcnode-id="4419" instrument_node="">Kuo and Sullivan, 2001b</span></a><span data-dcnode-id="4417" instrument_node="">) and generally improved comfort and well-being (</span><a class="workspace-trigger" data-dcnode-id="4415" href="#bib17" name="bbib17"><span data-dcnode-id="4416" instrument_node="">Grahn et al., 1997</span></a><span data-dcnode-id="4414" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4412" href="#bib37" name="bbib37"><span data-dcnode-id="4413" instrument_node="">Kuo, 2001</span></a><span data-dcnode-id="4411" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4409" href="#bib46" name="bbib46"><span data-dcnode-id="4410" instrument_node="">Milligan et al., 2004</span></a><span data-dcnode-id="4408" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4406" href="#bib56" name="bbib56"><span data-dcnode-id="4407" instrument_node="">Stigsdotter, 2004</span></a><span data-dcnode-id="4405" instrument_node="">).</span></p><p data-dcnode-id="4357"><span data-dcnode-id="4403" instrument_node="">Our findings that natural landscapes generally create a stronger positive health effect than urban landscapes supports Ulrich's “Stress recovery theory” (</span><a class="workspace-trigger" data-dcnode-id="4401" href="#bib64" name="bbib64"><span data-dcnode-id="4402" instrument_node="">Ulrich, 1984</span></a><span data-dcnode-id="4400" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4398" href="#bib65" name="bbib65"><span data-dcnode-id="4399" instrument_node="">Ulrich, 1999</span></a><span data-dcnode-id="4397" instrument_node="">) and the “Attention Restoration Theory” of </span><a class="workspace-trigger" data-dcnode-id="4395" href="#bib32" name="bbib32"><span data-dcnode-id="4396" instrument_node="">Kaplan and Kaplan (1989)</span></a><span data-dcnode-id="4394" instrument_node="">. The latter claim that natural landscapes more often provide the key factors necessary for restoration. Correlations between these key factors of the theory (fascination, being away, extent and compatibility) and measures of perceived restorativeness have been found by several researchers (</span><a class="workspace-trigger" data-dcnode-id="4392" href="#bib36" name="bbib36"><span data-dcnode-id="4393" instrument_node="">Korpela and Hartig, 1996</span></a><span data-dcnode-id="4391" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4389" href="#bib27" name="bbib27"><span data-dcnode-id="4390" instrument_node="">Herzog et al., 1997</span></a><span data-dcnode-id="4388" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4386" href="#bib28" name="bbib28"><span data-dcnode-id="4387" instrument_node="">Herzog et al., 2003</span></a><span data-dcnode-id="4385" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4383" href="#bib34" name="bbib34"><span data-dcnode-id="4384" instrument_node="">Ke-Tsung, 2003</span></a><span data-dcnode-id="4382" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4380" href="#bib1" name="bbib1"><span data-dcnode-id="4381" instrument_node="">Bagot, 2004</span></a><span data-dcnode-id="4379" instrument_node="">). Other attempts to test the “Attention Restoration Theory” have also provided empirical support for the approach (</span><a class="workspace-trigger" data-dcnode-id="4377" href="#bib17" name="bbib17"><span data-dcnode-id="4378" instrument_node="">Grahn et al., 1997</span></a><span data-dcnode-id="4376" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4374" href="#bib40" name="bbib40"><span data-dcnode-id="4375" instrument_node="">Kuo et al., 1998</span></a><span data-dcnode-id="4373" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4371" href="#bib37" name="bbib37"><span data-dcnode-id="4372" instrument_node="">Kuo, 2001</span></a><span data-dcnode-id="4370" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4368" href="#bib38" name="bbib38"><span data-dcnode-id="4369" instrument_node="">Kuo and Sullivan, 2001a</span></a><span data-dcnode-id="4367" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4365" href="#bib59" name="bbib59"><span data-dcnode-id="4366" instrument_node="">Taylor et al., 2002</span></a><span data-dcnode-id="4364" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4362" href="#bib50" name="bbib50"><span data-dcnode-id="4363" instrument_node="">Ottosson and Grahn, 2005</span></a><span data-dcnode-id="4361" instrument_node="">). These theories remain open to modification and development in the light of the accumulating evidence (</span><a class="workspace-trigger" data-dcnode-id="4359" href="#bib19" name="bbib19"><span data-dcnode-id="4360" instrument_node="">Hartig, 2004</span></a><span data-dcnode-id="4358" instrument_node="">).</span></p></section><section data-dcnode-id="4200" id="aep-section-id33"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4354"><span data-dcnode-id="4355" instrument_node="">Methodological considerations</span></h3><div data-dcnode-id="4226"><p data-dcnode-id="4346"><span data-dcnode-id="4353" instrument_node="">All the studies reviewed report health effects linked to visual exposure to different landscape types (active viewing or availability of visual landscape stimuli, e.g., in residential area). Most studies (74%) do not report measurements on respondents from before the exposure to the landscape stimuli and therefore they produce only relative values (</span><a class="workspace-trigger" data-dcnode-id="4351" href="#tbl3" name="btbl3"><span data-dcnode-id="4352" instrument_node="">Table 3</span></a><span data-dcnode-id="4350" instrument_node="">). These studies tell us that viewing a natural scene produces a positive health effect </span><em data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">compared</span></em><span data-dcnode-id="4347" instrument_node=""> with viewing an urban scene, but fail to indicate the magnitude of the change or whether the effect of viewing the urban scene is negative or merely less positive.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4227" id="tbl3"><span class="captions" data-dcnode-id="4339"><span data-dcnode-id="4340"><p data-dcnode-id="4341"><span class="label" data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">Table 3</span></span><span data-dcnode-id="4343" instrument_node="">. </span><span data-dcnode-id="4342" instrument_node="">Nature of measurements used in the studies</span></p></span></span><div class="groups" data-dcnode-id="4231"><table data-dcnode-id="4232"><thead data-dcnode-id="4333"><tr class="rowsep-1 valign-top" data-dcnode-id="4334"><th data-dcnode-id="4337" scope="col"><span data-dcnode-id="4338" instrument_node="">Nature of measurement</span></th><th data-dcnode-id="4335" scope="col"><span data-dcnode-id="4336" instrument_node="">Authors</span></th></tr></thead><tbody data-dcnode-id="4233"><tr class="valign-top" data-dcnode-id="4261"><td data-dcnode-id="4331"><span data-dcnode-id="4332" instrument_node="">Relative values</span></td><td data-dcnode-id="4262"><a class="workspace-trigger" data-dcnode-id="4329" href="#bib63" name="bbib63"><span data-dcnode-id="4330" instrument_node="">Ulrich (1981)</span></a><span data-dcnode-id="4328" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4326" href="#bib47" name="bbib47"><span data-dcnode-id="4327" instrument_node="">Moore (1981)</span></a><span data-dcnode-id="4325" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4323" href="#bib64" name="bbib64"><span data-dcnode-id="4324" instrument_node="">Ulrich (1984)</span></a><span data-dcnode-id="4322" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4320" href="#bib25" name="bbib25"><span data-dcnode-id="4321" instrument_node="">Heerwagen (1990)</span></a><span data-dcnode-id="4319" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4317" href="#bib49" name="bbib49"><span data-dcnode-id="4318" instrument_node="">Nakamura and Fujii (1992)</span></a><span data-dcnode-id="4316" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4314" href="#bib31" name="bbib31"><span data-dcnode-id="4315" instrument_node="">Kaplan (1993)</span></a><span data-dcnode-id="4313" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4311" href="#bib60" name="bbib60"><span data-dcnode-id="4312" instrument_node="">Tennessen and Cimprich (1995)</span></a><span data-dcnode-id="4310" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4308" href="#bib17" name="bbib17"><span data-dcnode-id="4309" instrument_node="">Grahn et al. (1997)</span></a><span data-dcnode-id="4307" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4305" href="#bib54" name="bbib54"><span data-dcnode-id="4306" instrument_node="">Staats et al. (1997)</span></a><span data-dcnode-id="4304" instrument_node="">, Kaplan et al. </span><a class="workspace-trigger" data-dcnode-id="4302" href="#bib31" name="bbib31"><span data-dcnode-id="4303" instrument_node="">(1988 reported in Kaplan 1993)</span></a><span data-dcnode-id="4301" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4299" href="#bib40" name="bbib40"><span data-dcnode-id="4300" instrument_node="">Kuo et al. (1998)</span></a><span data-dcnode-id="4298" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4296" href="#bib43" name="bbib43"><span data-dcnode-id="4297" instrument_node="">Leather et al. (1998)</span></a><span data-dcnode-id="4295" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4293" href="#bib26" name="bbib26"><span data-dcnode-id="4294" instrument_node="">Herzog and Chernick (2000)</span></a><span data-dcnode-id="4292" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4290" href="#bib70" name="bbib70"><span data-dcnode-id="4291" instrument_node="">Wells (2000)</span></a><span data-dcnode-id="4289" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4287" href="#bib38" name="bbib38"><span data-dcnode-id="4288" instrument_node="">Kuo and Sullivan (2001a)</span></a><span data-dcnode-id="4286" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4284" href="#bib39" name="bbib39"><span data-dcnode-id="4285" instrument_node="">Kuo and Sullivan (2001b)</span></a><span data-dcnode-id="4283" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4281" href="#bib37" name="bbib37"><span data-dcnode-id="4282" instrument_node="">Kuo (2001)</span></a><span data-dcnode-id="4280" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4278" href="#bib41" name="bbib41"><span data-dcnode-id="4279" instrument_node="">Laumann et al. (2001)</span></a><span data-dcnode-id="4277" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4275" href="#bib59" name="bbib59"><span data-dcnode-id="4276" instrument_node="">Taylor et al. (2002)</span></a><span data-dcnode-id="4274" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4272" href="#bib5" name="bbib5"><span data-dcnode-id="4273" instrument_node="">Diette et al. (2003)</span></a><span data-dcnode-id="4271" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4269" href="#bib55" name="bbib55"><span data-dcnode-id="4270" instrument_node="">Staats et al. (2003)</span></a><span data-dcnode-id="4268" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4266" href="#bib56" name="bbib56"><span data-dcnode-id="4267" instrument_node="">Stigsdotter (2004)</span></a><span data-dcnode-id="4265" instrument_node="">, and </span><a class="workspace-trigger" data-dcnode-id="4263" href="#bib45" name="bbib45"><span data-dcnode-id="4264" instrument_node="">Maas et al. (2006)</span></a></td></tr><tr class="valign-top" data-dcnode-id="4234"><td data-dcnode-id="4259"><span data-dcnode-id="4260" instrument_node="">Absolute values</span></td><td data-dcnode-id="4235"><a class="workspace-trigger" data-dcnode-id="4257" href="#bib62" name="bbib62"><span data-dcnode-id="4258" instrument_node="">Ulrich (1979)</span></a><span data-dcnode-id="4256" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4254" href="#bib67" name="bbib67"><span data-dcnode-id="4255" instrument_node="">Ulrich et al. (1991)</span></a><span data-dcnode-id="4253" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4251" href="#bib52" name="bbib52"><span data-dcnode-id="4252" instrument_node="">Parsons et al. (1998)</span></a><span data-dcnode-id="4250" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4248" href="#bib22" name="bbib22"><span data-dcnode-id="4249" instrument_node="">Hartig et al. (2003)</span></a><span data-dcnode-id="4247" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4245" href="#bib42" name="bbib42"><span data-dcnode-id="4246" instrument_node="">Laumann et al. (2003)</span></a><span data-dcnode-id="4244" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4242" href="#bib68" name="bbib68"><span data-dcnode-id="4243" instrument_node="">Van den Berg et al. (2003)</span></a><span data-dcnode-id="4241" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4239" href="#bib50" name="bbib50"><span data-dcnode-id="4240" instrument_node="">Ottosson amd Grahn 2005)</span></a><span data-dcnode-id="4238" instrument_node="">, and </span><a class="workspace-trigger" data-dcnode-id="4236" href="#bib44" name="bbib44"><span data-dcnode-id="4237" instrument_node="">Lohr and Pearson-Mims (2006)</span></a></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4228"></p><p data-dcnode-id="4229"><span data-dcnode-id="4230" instrument_node="">Relative versus absolute values.</span></p><p></p></div></div><p data-dcnode-id="4218"><span data-dcnode-id="4225" instrument_node="">Some of the studies are, however, experiments or interventions where health measures have been collected before, during and after the exposure to landscape visual stimuli. Some of these studies (e.g., </span><a class="workspace-trigger" data-dcnode-id="4223" href="#bib62" name="bbib62"><span data-dcnode-id="4224" instrument_node="">Ulrich, 1979</span></a><span data-dcnode-id="4222" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4220" href="#bib22" name="bbib22"><span data-dcnode-id="4221" instrument_node="">Hartig et al., 2003</span></a><span data-dcnode-id="4219" instrument_node="">) report negative health effects of visual exposure to urban landscapes, e.g., increased blood pressure, reduced positive affects and increased anger and aggression compared to pre-exposure measurements. Reports of such directly negative effects are, however, scarce.</span></p><p data-dcnode-id="4213"><span data-dcnode-id="4217" instrument_node="">Both quantitative methods (either physical measures or quantitative observations) and qualitative methods (qualitative observations or surveys) have been used in the literature. Some of the studies combine both objective and subjective measures. We accept both as valid approaches, although the strength of the conclusions may vary between studies as a result of the particular design applied. As a general rule, if a subject perceives that he/she feels better, this is an indicator of a positive health effect (</span><a class="workspace-trigger" data-dcnode-id="4215" href="#bib24" name="bbib24"><span data-dcnode-id="4216" instrument_node="">Health Council of the Netherlands and Dutch Advisory Council for Research on Spatial Planning Nature and the Environment, 2004</span></a><span data-dcnode-id="4214" instrument_node="">).</span></p><p data-dcnode-id="4203"><span data-dcnode-id="4212" instrument_node="">Researchers have addressed questions related to the validity of the different landscape stimuli. </span><a class="workspace-trigger" data-dcnode-id="4210" href="#bib21" name="bbib21"><span data-dcnode-id="4211" instrument_node="">Hartig et al. (1996)</span></a><span data-dcnode-id="4209" instrument_node="">, for example, compared the evaluations of restorative quality obtained by on-site visits and simulations (video and photographic slides). He found no statistically significant differences in evaluations between the two treatments. This suggests that simulated landscapes are likely to be a valid means of providing evaluations of their restorative potential. </span><a class="workspace-trigger" data-dcnode-id="4207" href="#bib66" name="bbib66"><span data-dcnode-id="4208" instrument_node="">Ulrich (2002)</span></a><span data-dcnode-id="4206" instrument_node=""> points out that viewing natural settings can produce significant restoration within less than 5</span><span data-dcnode-id="4205" instrument_node="">&nbsp;</span><span data-dcnode-id="4204" instrument_node="">min as indicated by positive changes in blood pressure, heart rate, muscle tension, and brain activity.</span></p><p data-dcnode-id="4201"><span data-dcnode-id="4202" instrument_node="">Students have been used extensively in studies due to their easy accessibility. Whether students provide results that are reliable representations of the general public requires further validation.</span></p></section><section data-dcnode-id="4139" id="aep-section-id34"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">Knowledge gaps requiring further research</span></h3><p data-dcnode-id="4142"><span data-dcnode-id="4197" instrument_node="">Theories explaining the relationships between landscape and health, especially those exploring the potential restorative qualities of landscapes, have increasingly focused on how to use research results in planning (</span><a class="workspace-trigger" data-dcnode-id="4195" href="#bib23" name="bbib23"><span data-dcnode-id="4196" instrument_node="">Hartig et al., 2007</span></a><span data-dcnode-id="4194" instrument_node="">). There is much interest in employing environmental psychology to inform the design of urban open spaces to improve attention restoration and other health goals. Most of these design approaches have focused on hospitals and health facilities, and to a lesser extent to urban design and the design of gardens (</span><a class="workspace-trigger" data-dcnode-id="4192" href="#bib6" name="bbib6"><span data-dcnode-id="4193" instrument_node="">Dilani, 2001</span></a><span data-dcnode-id="4191" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4189" href="#bib66" name="bbib66"><span data-dcnode-id="4190" instrument_node="">Ulrich, 2002</span></a><span data-dcnode-id="4188" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4186" href="#bib16" name="bbib16"><span data-dcnode-id="4187" instrument_node="">Gesler et al., 2004</span></a><span data-dcnode-id="4185" instrument_node="">). Recent research has focused on the relationship between residential design and human well-being, employing urban design as a tool to improve human health (</span><a class="workspace-trigger" data-dcnode-id="4183" href="#bib40" name="bbib40"><span data-dcnode-id="4184" instrument_node="">Kuo et al., 1998</span></a><span data-dcnode-id="4182" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4180" href="#bib58" name="bbib58"><span data-dcnode-id="4181" instrument_node="">Sullivan et al., 1998</span></a><span data-dcnode-id="4179" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4177" href="#bib6" name="bbib6"><span data-dcnode-id="4178" instrument_node="">Dilani, 2001</span></a><span data-dcnode-id="4176" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4174" href="#bib38" name="bbib38"><span data-dcnode-id="4175" instrument_node="">Kuo and Sullivan, 2001a</span></a><span data-dcnode-id="4173" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4171" href="#bib59" name="bbib59"><span data-dcnode-id="4172" instrument_node="">Taylor et al., 2002</span></a><span data-dcnode-id="4170" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4168" href="#bib29" name="bbib29"><span data-dcnode-id="4169" instrument_node="">Jackson, 2003</span></a><span data-dcnode-id="4167" instrument_node="">). As gardens and urban parks have been noted for their restorative effects on both mental and physical health, several authors have analysed design options that can contribute to improved health outcomes (</span><a class="workspace-trigger" data-dcnode-id="4165" href="#bib2" name="bbib2"><span data-dcnode-id="4166" instrument_node="">Cooper-Marcus and Barnes, 1995</span></a><span data-dcnode-id="4164" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4162" href="#bib61" name="bbib61"><span data-dcnode-id="4163" instrument_node="">Tyson, 1998</span></a><span data-dcnode-id="4161" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4159" href="#bib3" name="bbib3"><span data-dcnode-id="4160" instrument_node="">Cooper-Marcus and Barnes, 1999</span></a><span data-dcnode-id="4158" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4156" href="#bib65" name="bbib65"><span data-dcnode-id="4157" instrument_node="">Ulrich, 1999</span></a><span data-dcnode-id="4155" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4153" href="#bib8" name="bbib8"><span data-dcnode-id="4154" instrument_node="">Frumkin, 2001</span></a><span data-dcnode-id="4152" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4150" href="#bib71" name="bbib71"><span data-dcnode-id="4151" instrument_node="">Whitehouse et al., 2001</span></a><span data-dcnode-id="4149" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4147" href="#bib57" name="bbib57"><span data-dcnode-id="4148" instrument_node="">Stigsdotter and Grahn, 2002</span></a><span data-dcnode-id="4146" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="4144" href="#bib53" name="bbib53"><span data-dcnode-id="4145" instrument_node="">Sherman et al., 2005</span></a><span data-dcnode-id="4143" instrument_node="">).</span></p><p data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">We found few articles providing information about the specific landscape elements that can make a difference in terms of health effects. Little, if any, research has been carried out at a scale fine enough to assess which components or characteristics of specific landscapes constitute the most important drivers of human health benefits. Further research is needed to identify these key elements of healthy landscapes. This will help us understand which natural scenes have the strongest positive effects, and what can be done to improve urban settings from a health and well-being perspective. Such understanding would contribute to the search for functional landscape designs beneficial to human health and sustainability.</span></p></section></section><section data-dcnode-id="4129" id="aep-section-id35"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">Conclusions</span></h2><p data-dcnode-id="4134"><span data-dcnode-id="4135" instrument_node="">The study identified the landscape types used in environmental psychology studies that examine the effects of visual exposure to such landscapes on human health. We found that the landscapes used in such studies were described loosely and in coarse categories, mainly reflecting a broad “nature” versus “urban” dichotomy. Much less information was supplied by the literature regarding specific landscape elements, structures and patterns within the urban and natural categories.</span></p><p data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">The literature review identified that the main health aspects of exposure to landscapes related to reduced stress, improved attention capacity, facilitating recovery from illness, ameliorating physical well-being in elderly people, and behavioural changes that improve mood and general well-being. These effects have been addressed by means of viewing natural landscapes during a walk, viewing from a window, looking at a picture or a video, or experiencing vegetation around residential or work environments.</span></p><p data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">There have been major advances in our understanding of the relationship between landscapes and human health. Nevertheless, one of the key questions remains: what are the particular qualities of a restorative landscape? Identifying these qualities in order to apply them to landscape design is one of the major research challenges of the future.</span></p></section></div><section data-dcnode-id="4123" id="aep-acknowledgment-id36"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">The authors would like to thank colleagues at the Norwegian University of Life Sciences (UMB) for valuable comments to the manuscript. UMBs Nature, Health and Well-being research group provided funding.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="4118"><button class="button button-anchor" data-dcnode-id="4119" type="button"><span class="button-text" data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="4117"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="394" id="aep-bibliography-id37"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="395" id="aep-bibliography-sec-id38"><dl class="references" data-dcnode-id="396" id="reference-links-aep-bibliography-sec-id38"><dt class="label" data-dcnode-id="4112"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="4113" href="#bbib1" id="ref-id-bib1"><span data-dcnode-id="4114" instrument_node="">Bagot, 2004</span></a></dt><dd class="reference" data-dcnode-id="4082"><div class="contribution" data-dcnode-id="4103"><span data-dcnode-id="4111" instrument_node="">K.L.</span><span data-dcnode-id="4109" instrument_node=""> </span><span data-dcnode-id="4107" instrument_node="">Bagot</span><div data-dcnode-id="4104"><strong class="title" data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">Perceived restorative components: a scale for children</span></strong></div></div><div class="host" data-dcnode-id="4087"><span data-dcnode-id="4102" instrument_node="">Children, Youth and Environments</span><span data-dcnode-id="4100" instrument_node="">, </span><span data-dcnode-id="4098" instrument_node="">14</span><span data-dcnode-id="4096" instrument_node=""> (</span><span data-dcnode-id="4094" instrument_node="">2004</span><span data-dcnode-id="4092" instrument_node="">)</span><span data-dcnode-id="4090" instrument_node="">, p. </span><span data-dcnode-id="4088" instrument_node="">1</span></div><div cl ><span data-dcnode-id="425" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="419"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="420" href="#bbib73" id="ref-id-bib73"><span data-dcnode-id="421" instrument_node="">World Health Organization, 1946</span></a></dt><dd class="reference" data-dcnode-id="397"><div class="contribution" data-dcnode-id="414"><span data-dcnode-id="418" instrument_node="">World Health Organization</span><div data-dcnode-id="415"><strong class="title" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Constitution of the World Health Organization</span></strong></div></div><div class="host" data-dcnode-id="402"><span data-dcnode-id="413" instrument_node="">WHO</span><span data-dcnode-id="411" instrument_node="">, </span><span data-dcnode-id="409" instrument_node="">Geneva</span><span data-dcnode-id="407" instrument_node=""> (</span><span data-dcnode-id="405" instrument_node="">1946</span><span data-dcnode-id="403" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="398"><span data-dcnode-id="401" instrument_node=""></span><a class="link" data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DConstitution%2520of%2520the%2520World%2520Health%2520Organization%26publication_year%3D1946%26author%3DWorld%2520Health%2520Organization" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="400" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="242" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="243"><div class="PageDivider" data-dcnode-id="393"></div><header data-dcnode-id="390" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Cited by (409)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="244"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="245"><ul data-dcnode-id="251"><li class="ListArticleItem" data-dcnode-id="366"><div class="sub-heading" data-dcnode-id="384"><a data-dcnode-id="387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0272494422000019" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="388" id="citing-articles-article0-title"><span data-dcnode-id="389" instrument_node="">Looking at buildings or trees? Association of human nature relatedness with eye movements in outdoor space</span></h3></a><div class="article-source ellipsis" data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">2022, Journal of Environmental Psychology</span></div></div><div class="buttons" data-dcnode-id="378"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="379" type="button"><span class="button-link-text" data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="380" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="381"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="367"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="368" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="369"><p data-dcnode-id="370" id="abspara0010"><span data-dcnode-id="377" instrument_node="">This study explored how nature relatedness (NR) was linked with human eye movements in outdoor space. We created a 360-degree virtual reality scene that contained half urban setting of buildings and half nature area of trees, and recorded 112 participants' eye movements (total visit duration and total fixation duration ratio) during 1&nbsp;min of free viewing. It was found that individuals’ NR score correlated with their eye movements on the area of interests (AOIs), i.e., total fixation duration ratio on Trees (</span><em data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">r</span></em><span data-dcnode-id="374" instrument_node=""> (110)&nbsp;=&nbsp;0.341, </span><em data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">p</span></em><span data-dcnode-id="371" instrument_node="">&nbsp;&lt;&nbsp;.001). Further analyses of the correlations between three subscales of NR scale and eye-tracking data revealed that NR-Self was related to eye movements significantly, but not for NR-Perception and NR-Experience. The paired t-tests result showed that people with Low NR score spent more time looking at buildings than trees, while the High NR group did the opposite. For the medium NR group, no distinct eye movements difference between trees and buildings was detected. The outcomes shed light on the divergence of individual visual attention in a mix of natural and built environment. Our finding also determined the efficacy of NR scale with physical measurements of behavior.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="348"><div class="sub-heading" data-dcnode-id="360"><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2577444122000077" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="364" id="citing-articles-article1-title"><span data-dcnode-id="365" instrument_node="">Therapeutic plant landscape design of urban forest parks based on the Five Senses Theory: A case study of Stanley Park in Canada</span></h3></a><div class="article-source ellipsis" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">2022, International Journal of Geoheritage and Parks</span></div></div><div class="buttons" data-dcnode-id="354"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="355" type="button"><span class="button-link-text" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="356" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="357"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="349"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="350" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="351"><p data-dcnode-id="352" id="sp0100"><span data-dcnode-id="353" instrument_node="">As an important part of urban development, urban forest parks (UFPs) are critical community resources for supporting physical activity of people of all ages, and are also crucial for connecting people to nature, specifically for mental health benefits. During the COVID-19 pandemic, urban parks have experienced exponential increases in the volume of users as people have sought ways to enjoy green spaces and their benefits safely. As the park environment provides a pleasant, healthy and comfortable atmosphere for people of all ages, UFPs have a vital impact on human health, which has been recognized by more and more people all over the world. The five senses, seeing, hearing, touching, smelling, and tasting, are the most direct ways that humans perceive external information and assess experiences. Notably, Canada has a strong presence in and a long history of designing and conserving UFPs. Therefore, we used Stanley Park in Canada as a case study to analyze the therapeutic functions of and design methods for plant landscape in UFPs. We conducted an on-site survey of tourists to investigate their perception, level of satisfaction, possible inadequacies, and suggestions regarding potential therapeutic plants in Stanley Park. The results show that the high plant diversity in the park has created a functional therapeutic landscape that can be perceived by the five senses. The overall satisfaction level of visitors and their dependency on these therapeutic landscape components are high. The inadequacies are relatively simple vegetation structure and lack of wetland plants. The plant species in Stanley Park were categorized according to their sensory influences. Based on the survey results and the literature, we have provided feasible recommendations for the design and management of therapeutic landscapes in UFPs.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="330"><div class="sub-heading" data-dcnode-id="342"><a data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0169204621002784" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="346" id="citing-articles-article2-title"><span data-dcnode-id="347" instrument_node="">Promises and pitfalls of using computer vision to make inferences about landscape preferences: Evidence from an urban-proximate park system</span></h3></a><div class="article-source ellipsis" data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">2022, Landscape and Urban Planning</span></div></div><div class="buttons" data-dcnode-id="336"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="337" type="button"><span class="button-link-text" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="338" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="339"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="331"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="332" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="333"><p data-dcnode-id="334" id="sp0010"><span data-dcnode-id="335" instrument_node="">The ubiquitous use of the internet and social media has provided social and spatial scientists with a wealth of data from which inferences about landscape preferences can be gained. These data are increasingly being used as an alternative to data collected from surveys of recreationists. While the rapidly growing body of research using social media is impressive, little work has been done to compare the image content of social media to preferences elucidated via more traditional methods. We compare the landscape features derived through a computer vision algorithm used to analyze social media photographs with preferences derived through a traditional on-site intercept survey. We found that landscape features identified through the computer vision algorithm were, by and large, significantly different compared to landscape features that park users said improved their recreational experiences. Additionally, we did not find substantial differences in landscape preferences between visitors who share photographs of their park visit on social media and those who do not. We suggest a diversity of data sources and analytical methods should be used in a complementary and comparative way. Our analysis here suggests both surveys and social media images can provide important insights about landscape preferences, but neither in isolation is perfect.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="312"><div class="sub-heading" data-dcnode-id="324"><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1618866721004842" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="328" id="citing-articles-article3-title"><span data-dcnode-id="329" instrument_node="">Spatial statistical analysis of the relationship between self-reported mental health during the COVID-19 lockdown and closeness to green infrastructure</span></h3></a><div class="article-source ellipsis" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">2022, Urban Forestry and Urban Greening</span></div></div><div class="buttons" data-dcnode-id="318"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="319" type="button"><span class="button-link-text" data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="320" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="321"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="313"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="314" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="315"><p data-dcnode-id="316" id="spar0055"><span data-dcnode-id="317" instrument_node="">The COVID-19 pandemic has produced alterations in the behaviour and psychological health of people, who have had to learn living under uncertain circumstances escaping their control. This situation has been aggravated in those countries applying strict home confinement rules to try bending their epidemic curve. This is the case of Spain, where the stringent lockdown period was extended over three months. This study aimed at proving a research hypothesis whereby living close to Green Infrastructure (GI) during the confinement period was beneficial for mental health. To this end, La Palma (Canary Islands) and Zaragoza (Peninsular Spain) were taken as case studies, since both locations distributed a questionnaire to address citizenry’s self-reported mental health under strict lockdown conditions. A spatial statistical analysis of the responses collected by these questionnaires revealed that variables such as stress, anger, medication use, alcohol consumption or visits to the doctor significantly decreased if citizens were close to GI, whereas people having very high expectations of enjoying the city after the confinement were positively correlated to proximity of green areas. Although these outcomes are limited by the inferential capacity of correlation analysis, they point out to a sense of relief derived from having visual contact with vegetated landscapes and feeling stimulated about using them for recreation, aesthetical or sporting purposes. The joint consideration of these psychological gains with the social and environmental benefits provided by GI emphasizes the importance of approaching urban regeneration through the design and implementation of interconnected green spaces.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="294"><div class="sub-heading" data-dcnode-id="306"><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0264837721005536" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="310" id="citing-articles-article4-title"><span data-dcnode-id="311" instrument_node="">Eco-districts and data-driven smart eco-cities: Emerging approaches to strategic planning by design and spatial scaling and evaluation by technology</span></h3></a><div class="article-source ellipsis" data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">2022, Land Use Policy</span></div></div><div class="buttons" data-dcnode-id="300"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="301" type="button"><span class="button-link-text" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="302" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="303"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="295"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="296" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="297"><p data-dcnode-id="298" id="sp0030"><span data-dcnode-id="299" instrument_node="">In recent years, the world has witnessed significant progress in implementing&nbsp;numerous eco-district and eco-city projects, which are under the banner of experimentation or seen as sites of innovation. Indeed, the rise of such initiatives serves as a sign of renewed attempts to experiment or innovate in designing urban futures in an increasingly urbanized and datafied society. In light of this, a number of alternative models of eco-urbanism have been proposed by scholars and promoted by policy makers. The prominent among these models are sustainable urban districts and data-driven smart eco-cities. At the core of these models is a range of compact and ecological design strategies and static and dynamic conceptions of spatial scaling. These are intended to produce and boost the benefits of sustainability on the basis of a set of integrated approaches—increasingly supported by big data technologies—as a way to overcome new challenges and introduce new solutions. Based on two case studies conducted on three of the ecologically and technologically leading cities in Europe—Stockholm, Malmö, and Barcelona, this paper analyses and discusses the role and relevance of integrating density, mixed land use, greening, and low-energy buildings to the sustainability of emerging eco-districts; the new conceptions of cities and their spatial scales in the context of data-driven smart eco-cities; and the opportunities and challenges of smart urban metabolism with respect to the evaluation of eco-districts. This study shows that combining compact and ecological design strategies improves the performance of eco-districts with respect to the three dimensions of sustainability, as well as paves the way for their balanced integration for producing synergistic effects. Also, this study highlights the innovative potential and enabling role of urban computing and intelligence in transforming the spatial scaling of data-driven smart eco-cities through generating the kind of designs that increase the effects of sustainability as outcomes of processes. Moreover, this study reveals the advantages of the data-driven approach to the analysis of the flows of resources in urban environments in relation to the evaluation of sustainable urban district development. This paper concludes that data-driven smart planning and evaluation holds great potential for facilitating progress towards achieving the goals of sustainability thanks to the proven role and untapped potential of big data technologies in monitoring, understanding, and analyzing urban processes and systems in real-time.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="252"><div class="sub-heading" data-dcnode-id="288"><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0272494421001869" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="292" id="citing-articles-article5-title"><span data-dcnode-id="293" instrument_node="">The use of virtual reality in environment experiences and the importance of realism</span></h3></a><div class="article-source ellipsis" data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">2022, Journal of Environmental Psychology</span></div></div><div class="buttons" data-dcnode-id="282"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="283" type="button"><span class="button-link-text" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="284" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="285"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="253"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="254" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="255"><p data-dcnode-id="280" id="abspara0010"><span data-dcnode-id="281" instrument_node="">Virtual reality (VR) can be extremely useful in simulating nature when physical presence is not possible. Additionally, it allows for environments to be customised (e.g., weather, or topography) and facilitates the design of controlled experimental settings. However, VR can involve the use of expensive equipment and complex software to create highly realistic immersive experiences. But is it necessary for experiences to rival the latest Hollywood blockbuster? This paper explores whether such investment can be valuable in research on nature experiences.</span></p><p data-dcnode-id="260" id="abspara0015"><span data-dcnode-id="279" instrument_node="">Two studies were conducted to examine how realism of environmental presentations impact affective responses and participant perceptions. Study One (</span><em data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">n</span></em><span data-dcnode-id="276" instrument_node="">&nbsp;=&nbsp;16) explored perceptions of the same lake presented to participants in the real world, in VR and as a video. Study Two (</span><em data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">n</span></em><span data-dcnode-id="273" instrument_node="">&nbsp;=&nbsp;120) compared participant's affective responses to one of four possible virtual environments differing in level of realism (</span><em data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">high</span></em><span data-dcnode-id="270" instrument_node=""> or </span><em data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">low</span></em><span data-dcnode-id="267" instrument_node="">) and type (</span><em data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">natural</span></em><span data-dcnode-id="264" instrument_node=""> or </span><em data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">built</span></em><span data-dcnode-id="261" instrument_node="">).</span></p><p data-dcnode-id="258" id="abspara0020"><span data-dcnode-id="259" instrument_node="">Study One showed that experiences of VR presentations fell between real and video presentations. Study Two found that more realistic VR environments evoked more positive affective and serenity responses, as well as a greater sense of presence. In both studies, participants stressed the importance of naturalistic interaction, sensory immersion, and graphical realism in the experiences, which may help explain these effects.</span></p><p data-dcnode-id="256" id="abspara0025"><span data-dcnode-id="257" instrument_node="">The level of realism that can be attained with VR does impact affective responses and perceptions. Investment in VR for future research can be highly beneficial.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-35348869938%26md5%3D5dc3c042f397cade1f5c64a2f0c6af0" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="249" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="250"></path></svg><span class="button-alternative-text" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S1618866707000416"><span class="anchor-text" data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="236"><span class="copyright-line" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Copyright © 2007 Elsevier GmbH. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="126"><as
