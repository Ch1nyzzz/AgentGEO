</span><p data-dcnode-id="2322" style="text-align: center;"><span data-dcnode-id="2323" style="font-weight: 400;"><span data-dcnode-id="2324" instrument_node="">Over the last 30 years, Drost Landscape has established itself as the most reliable and comprehensive choice for all of your landscape needs. Servicing all of Northern Michigan, our team is dedicated to excellence in all aspects of what we do. From landscape design and construction to maintenance, tree service, and snow removal, we have the skill and expertise to help you perfect and protect your property for years to come.</span></span></p><span data-dcnode-id="2321" instrument_node="">
</span><p data-dcnode-id="2315" style="text-align: center;"><span data-dcnode-id="2319" style="font-weight: 400;"><span data-dcnode-id="2320" instrument_node="">Contact us today to find out how </span></span><b data-dcnode-id="2316"><i data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Drost Does More.</span></i></b></p><span data-dcnode-id="2314" instrument_node="">

</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Mitch Emaus joined Team Drost in 2015, working with our Irrigation team before trying out a position with the Tree Service team that winter. He fell in love with the work–and the adrenaline rush that comes with it–and joined our Tree Service full time in 2016. After working as a climber and team leader, he transitioned into an Arborist Representative, working more closely with clients and coordinating with crews to complete projects in a safe and timely manner.</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Outside of work, Mitch enjoys spending time with his family and exploring the great outdoors through hiking and, in the fall, hunting. He loves that Northern Michigan provides so many wonderful places to see, and he’s looking forward to discovering more beautiful places.</span></p><span data-dcnode-id="1582" instrument_node="">

</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">If he’s not at the office or in someone else’s pool, you might find Josh in the woods or a river, hunting or steelhead fishing. He also enjoys spending time with his girlfriend and their jackabee around a campfire, on the side-by-side, or watching the Spartans play.</span></p><span data-dcnode-id="1324" instrument_node="">

</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Kateri handles a wide variety of scheduling tasks for our Construction and Irrigation teams, making sure the people, equipment, and machines arrive at the right place at the right time. It’s a lot of moving pieces, but she’s used to balancing a lot of different things. From studying meteorology, French, and international relations in college, to living in France and Poland, to becoming a Certified Green Industry Professional, Kateri’s experiences are wide and varied!</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">In her free time, Kateri also enjoys a wide range of hobbies, including hiking, camping, paddling, growing veggie gardens and herbs, traveling, and curling up with a good book. She also volunteers with the Coast Guard Auxiliary, where she promotes boating and paddling safety, as well as protection of the marine environment. She and her husband relocated to Northern Michigan in 2016 and never looked back. They’re excited to raise their daughter in an area so immersed in nature.</span></p><span data-dcnode-id="1185" instrument_node="">

</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Crystal began working with Drost in 2019, bringing with her an impressive background in management and public relations. She spent a few years as an executive at the Indian River Chamber of Commerce before founding her own company, followed by a non-profit designed to help educators apply for grants and funding. She was asked to help grow Drost’s retail greenhouse and loves educating our customers about all the plants we have to offer.</span></p><span data-dcnode-id="1128" instrument_node="">

</span><p data-dcnode-id="1095"><b data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Aaron Senchuk</span></b></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1091"><b data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Landscape Designer</span></b></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Aaron joined the Drost design team with degrees in Landscape Architecture and Environmental Design, and a background in designing unique and memorable spaces. He got hooked on landscape architecture during college, when he participated in an experimental ski/snowboard design in the Lansing area, working as a designer for snow park terrain features. After college, he worked with Edgewater Resources, a full-service Marina and Waterfront Design firm, where he participated on a wide variety of projects from resort master planning to small park design and planting plans.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Aaron grew up in the Alpena area in a family that fostered his love for the outdoors. He enjoys camping, fishing, and hunting, and his competitive spirit has led him to a number of sports, including hockey, snowboarding, soccer, and disc golf. He lives with his girlfriend and their small menagerie, including a German Shorthair, a Pomeranian, a black cat, and two parakeets.</span></p><span data-dcnode-id="1084" instrument_node="">

</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Darlene joined Drost Landscape in August of 2019, bringing experience from owning and operating five small businesses, as well as working in the healthcare industry. She is passionate about customer service and helping people navigate through unknown processes, and her strong organizational and interpersonal skills make her a perfect fit as office manager. She is proud to be the first face people see when they walk through our doors.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Darlene lives in Petoskey with her husband, Matthew, and their three children. In her free time, Darlene works as an advocate for a rare medical condition, providing education and encouragement for patients and the public. She administers a number of on-line patient support groups and, because of this work, was selected by Facebook to serve on their Health Groups Advisory panel. In the winter months, Darlene enjoys knitting, quilting, and brewing the perfect cup of coffee. In the summer, she can be found relaxing in her favorite hammock–with a fresh glass of iced coffee.</span></p><span data-dcnode-id="1030" instrument_node="">

</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">As Drost’s Snow Services and Enhancement Manager, Marty coordinates our snow removal crews and the new enhancement team. He joined Drost in 2004 as part of the planting crew, and over the years he’s tried his hand in the greenhouses and in the tree service department. He’s been part of our snow services team since 2017 and is excited to take this next step in his career.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Having spent his childhood in northern Michigan, attending NCMC and then U of M, Marty is well-acquainted with the area and has a deep appreciation for nature. In his free time, he enjoys riding motorcycles, kayaking, camping, and working in the vineyard. He’s recently begun building his own home and hopes to do most of the work himself, with help from his family. He has a girlfriend he loves dearly and, at the moment, all of his children have four legs.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="986"><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Degrees and Certifications</span></strong></p><span data-dcnode-id="985" instrument_node="">

</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Janae joined the Drost team in 2011 as the office receptionist. Throughout her years at Drost, she has assisted in all departments, starting with irrigation and maintenance. In 2014, she became the Tree Service Administrative Assistant. After helping build and maintain the new department, she took on the role of Accounts Receivable, utilizing her Associate’s degree in Accounting.</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Janae enjoys outdoor activities in the spring and summer season including kayaking, riding bikes, and going for walks. In the cooler months, Janae takes pleasure in expanding her knowledge as a student at the local college and LSSU. Her goal is to obtain a Master’s degree in Business Management. But first, her main priority is raising her three children.</span></p><span data-dcnode-id="929" instrument_node="">

</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Jenna Lindenberg comes to Drost with nine years of experience in Human Resources and Corporate Wellness. She previously worked at Glastender, Inc. in Saginaw, Michigan, where her primary focus was benefit administration, recruiting, and managing the company’s wellness program. She has dual Bachelor’s degrees from Saginaw Valley State University and was drawn to work with Drost by the company culture and our emphasis on teamwork and creativity.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">In her free time, Jenna and her husband, Spencer, can be found hanging out with family and friends, traveling, trying new restaurants, and enjoying a number of outdoor activities, including downhill skiing, snowshoeing, hiking, kayaking, camping and backpacking, and the occasional mountain bike loop.</span></p><span data-dcnode-id="771" instrument_node="">

</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Brandon began working at Drost Landscape in the spring of 2014. There he found his passion and natural talents with the tree service department. Brandon has always enjoyed outdoor activities such as fishing, and hunting, so finding a career in arboriculture was a natural fit. Brandon likes working in the field and training the crews in new techniques and skills. After being a foreman for a number of years, he transitioned into the Assistant Manager of the tree division. Brandon enjoys meeting and helping clients as they determine their needs.</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Brandon is married to his loving wife Erica. Together they are enjoying raising their daughter Finley. They spend their weekends in the summer hiking , camping, and spending time with their family.</span></p><span data-dcnode-id="717" instrument_node="">

</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Jason is passionate about managing the execution of arboriculture to ensure the highest level of company productivity, safety, and client satisfaction.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Jason prides himself on being extremely hardworking, dedicated and passionate about all things trees. Starting at a very young age, through observation and hands on experience within a family operated logging business in the Upper Peninsula, Jason built a strong connection in the tree industry. While timber harvesting, Jason also attended Northern Michigan University. Shortly after graduation he moved to Charlevoix and was hired at Drost Landscape as a foreman. While working in the field, Jason gained valuable knowledge and insight of the inner workings of the company, which allowed for a smooth transition into the management position with the Tree Service Division.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">In his free time, Jason enjoys playing hockey and taking advantage of Northern Michigan’s outdoor playground.</span></p><span data-dcnode-id="677" instrument_node="">

</span><h4 data-dcnode-id="641" style=";font-size:128%"><span data-dcnode-id="642" instrument_node="">Hilary Harrington, PLA</span></h4><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="637"><strong data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Landscape Architect</span></strong></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">With 6 years of educational training and 7 years of professional experience in the industry, Hilary has developed a profound understanding of expertise in both residential and commercial landscape design.</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">As a Petoskey native, she has developed many relationships in the community and spent a lifetime understanding local ecosystems. She is passionate about integrating textures and fine detail into her designs and is fluent in cutting edge technology and software in the design world. Hilary is an avid photographer and enjoys home life in Petoskey with her husband and two daughters.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">She obtained her Bachelor’s Degree in 2011 from Michigan State University and has since been furthering her Landscape career. Hilary received her Landscape Architect License in 2018, a prestigious certification that requires rigorous training and coursework, while adhering to a set code of ethics set forth by CLARB and representing the landscape industry with dignity.</span></p><span data-dcnode-id="627" instrument_node="">

</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">David brings over 20 years of design and construction expertise to Drost as the senior landscape architect. Motivated by the belief that designers have a responsibility to influence the dynamics between nature, space and people, he is committed to achieving a balance on each project big or small.</span></p><span data-dcnode-id="589" instrument_node="">

</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">David lives in Charlevoix with his wife Jennifer and share in the wonders of parenting three great kids (Olive, Grant and Vincent). His family enjoys spending time with their horses and exploring northern Michigan.</span></p><span data-dcnode-id="583" instrument_node="">

</span><p data-dcnode-id="280"><strong data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Project Coordinator</span></strong></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">“Let my passion, take your landscape dreams to reality!” Dustin loves to express his ideas and vision to create a landscape to make your outdoor dreams a reality that will last your family a lifetime. Dustin loves sharing his passion of hardscapes and water features with clients and other fellow employees. At the completion of every project, experiencing the “wow factor” with the clients is the very reason he loves his job.</span></p><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Dustin has been in the fields mastering the art of hardscapes and water features for nearly 20 years.</span></p><span data-dcnode-id="273" instrument_node="">
</span><p data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">A native of Petoskey, Michigan. Dustin graduated with honors of cum laude of Petoskey High School. He also studied at MSU, and Dustin continues to be driven by studying natures finest, mastering the art of hardscapes. Dustin enjoys boating, hunting, and exploring the outdoors.</span></p><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Dustin currently lives in Boyne City with his wife Hailey and their dog, Ruger.</span></p><span data-dcnode-id="267" instrument_node="">

</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Jason has over 20 years of field experience in the landscape business. His incredibly strong work ethic and attention to detail has continually won him recognition and high reviews from clients and co-workers. Jason takes a hands-on approach in everything he does. His high energy and goal oriented attitude is dependable and constant. Jason excels in everything he does; lucky for us he does what he loves!</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Jason is a thrill-seeking outdoor enthusiast. Most of his free time is best enjoyed outdoors. Jason shares the love of the outdoors with his wife Jessica and two children, Karlie and Sawyer.</span></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="239"><strong data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Degrees and Certifications:</span></strong></p><span data-dcnode-id="238" instrument_node="">

</span><h4 data-dcnode-id="218" style=";font-size:128%"><span data-dcnode-id="219" instrument_node="">Bob Drost</span></h4><span data-dcnode-id="217" instrument_node="">
</span><p data-dcnode-id="214"><strong data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Founder</span></strong></p><span data-dcnode-id="213" instrument_node="">
</span><p data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">As the founder of Drost Landscape, Bob is passionate about the next challenge. Whether it is site development involving water features and stone or the plantings (which are always a favorite and the icing on the cake) Bob’s vision and creative energy is the driving force behind the team.</span></p><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="207"><strong data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Certifications</span></strong></p><span data-dcnode-id="206" instrument_node="">
</span><ul data-dcnode-id="195"><span data-dcnode-id="205" instrument_node="">
</span><li data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">MI Certified Nurseryman</span></li><span data-dcnode-id="202" instrument_node="">
</span><li data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">MI Certified Landscape Specialist</span></li><span data-dcnode-id="199" instrument_node="">
</span><li data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">MI Certified Retail Specialist</span></li><span data-dcnode-id="196" instrument_node="">
</span></ul><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Bob’s pioneering spirit and thirst for challenge were major contributors to the initial success of Drost Landscape, but his integrity, innovativeness and commitment to quality have ensured continued success with each passing year. Since 1991, Bob poured his time and energy into building a dream, and as a result, is recognized as an industry leader. After more than 20 years, Bob still enjoys talking about the landscape trade with new and old friends. He feels truly blessed to have turned a passion into a career.</span></p><span data-dcnode-id="191" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Originally from Charlevoix, MI, Bob has been married to his High School sweetheart, Diane, for over 30 years. They raised two sons (Travis and Dustin) who have become integral parts in the family business. Travis, the oldest, helps with project management and sales. Bob’s younger son, Dustin, builds custom hot tubs, water features and spectacular stone work including walls and naturalizing stone placement. Bob is proud that his sons are ready to carry forth his legacy. Bob also enjoys snowmobiling, water sports, sports cars and regularly attending Walloon Community Church.</span></p><span data-dcnode-id="188" instrument_node="">

</span><p data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Paul’s passion is keeping client’s landscaping looking outstanding year after year through the dedicated efforts of the Drost team.</span></p><span data-dcnode-id="166" instrument_node="">
</span><p data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Paul has a long and impressive career in the landscape industry spanning 35 years. He has managed numerous projects in both Michigan and Tennessee. Paul is certified in pesticide application. With a great love for the outdoors, Paul enjoys golfing, hunting and mountain biking. He raising his two great kids, Gunnar and Grace, with his wife Tanya.</span></p><span data-dcnode-id="163" instrument_node="">
