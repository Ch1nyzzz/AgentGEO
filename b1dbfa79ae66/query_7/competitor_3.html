</span><p class="entry-meta" data-dcnode-id="372"><time class="entry-time" data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">January 27, 2020</span></time><span data-dcnode-id="382" instrument_node=""> by </span><span class="entry-author" data-dcnode-id="378"><a class="entry-author-link" data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//osera.org/author/hitjg/" rel="author"><span class="entry-author-name" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Hayley</span></span></a></span><span data-dcnode-id="377" instrument_node=""> </span><span class="entry-comments-link" data-dcnode-id="374"><a data-dcnode-id="375" href="#respond"><span data-dcnode-id="376" instrument_node="">Leave a Comment</span></a></span><span data-dcnode-id="373" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="275"><p data-dcnode-id="369"><img alt="asparagus fern" class="aligncenter wp-image-77 size-full" data-dcnode-id="370" height="609" sizes="(max-width: 864px) 100vw, 864px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//osera.org/wp-content/uploads/2020/01/asparagus-fern.png&amp;raw" srcset="https://osera.org/wp-content/uploads/2020/01/asparagus-fern.png 864w, https://osera.org/wp-content/uploads/2020/01/asparagus-fern-300x211.png 300w, https://osera.org/wp-content/uploads/2020/01/asparagus-fern-768x541.png 768w" width="864"></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="367" instrument_node="">Whether or not you should trim your </span><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//osera.org/houseplants/asparagus-fern-indoor-care/"><span data-dcnode-id="366" instrument_node="">Asparagus Fern</span></a><span data-dcnode-id="364" instrument_node=""> will depend on what you want to get from your plant, how well it’s been growing, the size of your plant and other factors. </span><strong data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">You can trim an Asparagus Fern</span></strong><span data-dcnode-id="361" instrument_node="">, it can help with appearance and it can be beneficial to the plant so let’s jump in and take a look at trimming your fern.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">As Asparagus ferns can be plants that grow relatively quickly you might find that parts of your plant grow more quickly than other and that they can get out of control in a short amount of time. You may have started with a neat little fern but all of a sudden you have bits of ferns sticking all over the place.</span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">If this is the case then don’t hesitate to cut the fern back. If it’s overgrown you can trim your plan for a neater overall appearance. You can also trim the fern if the foliage has received sun damage or has turned brown or discoloured. Just simply cut back the area of the plan that is damaged to leave healthy green growth.</span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">You don’t want your plant wasting resources on a dying area when it could be stimulating new and healthy growth.</span></p><span data-dcnode-id="350" instrument_node="">
</span><h2 data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">What To Use To Trim Your Asparagus Fern</span></h2><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="346" instrument_node="">When trimming your fern some garden sheers or a pair of sharp scissors should do the job just fine. We like the </span><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2Zn2PRv"><span data-dcnode-id="345" instrument_node="">Growneer trimming scissors</span></a><span data-dcnode-id="343" instrument_node=""> as they’re sharp stainless steel and non stick.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">You want to make sure that the implements are clean before pruning and that the blades are sharp to ensure a nice clean cut. If you notice rotting around where a cut has been made then use your sharp, clean scissors and cut further down the stem to get rid of the damaged part of the plant.</span></p><span data-dcnode-id="338" instrument_node="">
</span><h2 data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">How Often Should I Trim?</span></h2><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">How often your trim your fern is entirely up to you and depends on what aesthetic you’re looking for.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">If your plant doesn’t suffer any damage and you don’t mind how it looks then you might just leave it to grow and see what happens.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">However, if your plant has brown foliage or the appearance isn’t bushy enough then you may want to consider trimming it back much more often.</span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Some people will trim their fern once a year, others will leave it every three years. Just find the balance that works for you and listen to what your plant needs from you.</span></p><span data-dcnode-id="323" instrument_node="">
</span><h2 data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Top Tips For Trimming</span></h2><span data-dcnode-id="320" instrument_node="">
</span><ul data-dcnode-id="309"><span data-dcnode-id="319" instrument_node="">
</span><li data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Make sure you are wearing shearing gloves when trimming your fern to avoid injury.</span></li><span data-dcnode-id="316" instrument_node="">
</span><li data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Don’t just let your fern brown and trim it away. Try and think why is my fern turning brown? Is it getting too much sun? Too little water? Try to optimise your plant’s living conditions rather than using pruning as a solution or you might find that your plant dies.</span></li><span data-dcnode-id="313" instrument_node="">
</span><li data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Light can also change how your fern grows as it will grow to try and reach light. So rather than trimming you can also change the position of your plant in terms of how much light it gets and where that light source is coming from.</span></li><span data-dcnode-id="310" instrument_node="">
</span></ul><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="307" instrument_node="">So don’t hold back, if you want a neater bush then get trimming. And while you’re learning how to care for your fern check out our article on </span><a data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//osera.org/houseplants/asparagus-fern-annual-perennial/"><span data-dcnode-id="306" instrument_node="">is an asparagus fern annual or perennial?&nbsp;</span></a></p><span data-dcnode-id="303" instrument_node="">
