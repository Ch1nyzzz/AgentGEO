</span><article class="article-post article post-4019 post type-post status-publish format-standard has-post-thumbnail hentry category-plant-clinic tag-aloe-vera" data-dcnode-id="142" id="post-4019"><span data-dcnode-id="562" instrument_node="">
</span><header class="entry-header header-singular wrapper" data-dcnode-id="557"><span data-dcnode-id="561" instrument_node="">
</span><h1 class="entry-title article-heading" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Should I Cut the Brown Tips Off My Aloe Plant? (Solved!)</span></h1><span data-dcnode-id="558" instrument_node="">
</span></header><span data-dcnode-id="556" instrument_node="">
</span><div class="entry-content mvt-content" data-dcnode-id="185"><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">If your Aloe Vera plant is turning brown at the tips of its leaves, you might be wondering if you should cut them off. </span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Brown tips on an Aloe Vera plant are a sign of a bigger problem, so it’s a good idea to find out the cause as soon as you can.&nbsp;</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="546"><strong data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">If the tips of your Aloe Vera plant are turning brown, you can cut them off without harming your plant. If dehydration is the cause, it’ll do no harm to leave the brown tips on your plant. If a fungal infection is a problem, you should remove them.</span></strong></p><div class="adthrive" data-dcnode-id="544" id="cls-video-container-lqpbUrd9" style="min-height: 445.5px;"><div data-dcnode-id="545"></div></div><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">In this article, I’ll explore what causes the tips of your Aloe Vera plant to turn brown. I’ll also explain what you can do about it and whether it’s safe to cut off the brown tips.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="540" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="539" instrument_node="">
</span><h2 data-dcnode-id="536"><strong data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Why Aloe Plant Tips Turn Brown</span></strong></h2><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">There are several reasons why the tips of your Aloe Vera plant might be turning brown. Let’s investigate these issues in detail.</span></p><span data-dcnode-id="532" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="528"><noscript data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">&lt;img width="900" height="926" src="https://gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1.jpg" alt="Aloe Plant Tips Turning Brown" class="wp-image-939" srcset="https://gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1.jpg 900w, https://gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1-292x300.jpg 292w, https://gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1-768x790.jpg 768w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Aloe Plant Tips Turning Brown" class="wp-image-939 lazyload" data-dcnode-id="529" data-pin-media="https://gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1.jpg" data-src="https://gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1.jpg.webp" data-srcset="https://gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1.jpg.webp 900w, https://gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1-292x300.jpg.webp 292w, https://gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1-768x790.jpg.webp 768w" data-trellis-processed="1" data-webp="true" height="926" id="mv-trellis-img-1" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1.jpg.webp&amp;raw" srcset="https://gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1.jpg.webp 900w, https://gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1-292x300.jpg.webp 292w, https://gardenforindoor.com/wp-content/uploads/2020/05/Potted-aloe-vera-tips-dry-1-768x790.jpg.webp 768w" width="900"></figure><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="527" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="526" instrument_node="">
</span><h3 data-dcnode-id="523"><strong data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Overwatering or Under-Watering&nbsp;</span></strong></h3><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Aloe Vera plants are succulents. This means that they have evolved to survive in hot, arid climates. </span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">They store water in special thin-walled cells called parenchyma cells. These are what give Aloe Vera leaves their distinctive gel-like center.</span></p><span data-dcnode-id="516" instrument_node="">
</span><h3 data-dcnode-id="513"><strong data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Overwatering</span></strong></h3><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="511" instrument_node="">Because they don’t need much water to survive, it’s easy to </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenforindoor.com/how-to-save-overwatered-aloe-plant/"><span data-dcnode-id="510" instrument_node="">overwater an Aloe Vera plant</span></a><span data-dcnode-id="508" instrument_node="">. Overwatering causes several severe problems – it’s the easiest way to kill tough Aloe Vera plants!</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="506" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">When you overwater your Aloe Vera plant, the potting mix becomes waterlogged. This stops the plant from absorbing oxygen through its roots – essentially causing it to drown.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Waterlogged soil also encourages root rot. Several fungal organisms cause root rot, and they thrive in wet environments. Root rot eats away at the plant’s roots and can kill even tough Aloe Vera plants.&nbsp;</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">When a plant’s roots can’t take in water and nutrients, it becomes dehydrated. Dry, brown tips are a symptom of dehydration. Adding more water at this stage will make the problem worse.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="496" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><span data-dcnode-id="495" instrument_node="">
</span><h3 data-dcnode-id="492"><strong data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Under-watering</span></strong></h3><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">On the flip side, Aloe Vera plants do need some water to survive! If you don’t give an Aloe Vera plant enough water, you’ll notice that the tips of its leaves start to become dry and brown. </span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">This dryness begins at the tip and will gradually spread throughout the leaf. Eventually, the leaf will curl up and drop off.&nbsp;</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">This process takes a long time. Aloe Vera plants are very drought-tolerant, and the plant will perk up when you give it some water. </span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="482" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">The damaged part of the leaf won’t restore itself, but your plant will produce new foliage to replace the damaged parts.</span></p><span data-dcnode-id="478" instrument_node="">
</span><h4 data-dcnode-id="475"><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Solution</span></strong></h4><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="473" instrument_node="">To make sure</span><strong data-dcnode-id="471"><span data-dcnode-id="472" instrument_node=""> </span></strong><span data-dcnode-id="470" instrument_node="">that you don’t over or underwater an Aloe Vera plant, follow these tips:</span></p><span data-dcnode-id="468" instrument_node="">
</span><ul data-dcnode-id="453"><li data-dcnode-id="463"><span data-dcnode-id="467" instrument_node="">Only </span><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenforindoor.com/how-often-to-water-aloe-vera/"><span data-dcnode-id="466" instrument_node="">water your Aloe Vera</span></a><span data-dcnode-id="464" instrument_node=""> plant when its potting mix is completely dry.&nbsp; Once a month or so in spring and summer, every couple of months or less in winter should be fine</span></li><li data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Use your finger or a moisture probe to check the moisture content of your plant’s potting mix&nbsp;</span></li><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="460" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><li data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Never water your Aloe Vera plant to a schedule</span></li><li data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Water your plant from below, not above</span></li><li data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">If in doubt, don’t water!&nbsp;</span></li></ul><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">If you’re sure that the brown tips on your Aloe Vera plant are down to lack of water, give it a deep drink. Your plant will be fine! The brown parts won’t recover, but the affected leaves won’t get any worse.&nbsp;</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Leaves with a large proportion of brown areas might continue to die off. Don’t worry, though; your plant will quickly produce new, healthy growth.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="446" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">If you’ve overwatered and now have a waterlogged plant on your hands, you should re-pot it. Here’s how to re-pot a waterlogged plant:</span></p><span data-dcnode-id="442" instrument_node="">
</span><ul data-dcnode-id="424"><li data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Gently remove your Aloe Vera plant from its pot.&nbsp; Be careful not to break the delicate stem!</span></li><li data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Throw away the old potting mix. Don’t re-use it!</span></li><li data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Use sharp, clean scissors to cut away any damaged roots.&nbsp; They’ll be black or brown and mushy</span></li><li data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Re-pot your plant in a shallow pot. Aloe Vera roots spread out near the surface of the soil rather than growing deep</span></li><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="433" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><li data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Use a slightly moist, very well-draining potting mix to re-pot your plant.&nbsp;</span></li><li data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Use succulent/cactus potting medium or general-purpose compost&nbsp;</span></li><li data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Mix general-purpose with two-thirds perlite or vermiculite for drainage</span></li><li data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Do not water your Aloe Vera plant for at least two weeks</span></li></ul><span data-dcnode-id="423" instrument_node="">
</span><h3 data-dcnode-id="420"><strong data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Chlorine and Fluoride in Tap Water</span></strong></h3><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Tap water contains many different substances such as chlorine, fluoride, and calcium, which can build up in potting mix over time. </span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="416" id="AdThrive_Content_9_desktop" style="min-height: 250px;"></div><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">These substances collect around plant roots and stop them from absorbing water and nutrients.&nbsp;</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Because the plant can’t absorb water, it becomes dehydrated. The plant’s leaves gradually turn brown, then dry up and drop off.&nbsp;</span></p><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">You might see a white, crusty substance forming on the top of your plant’s potting mix. If you notice this, it’s a sign that chemicals have built up in your Aloe Vera’s container, and you should take action.</span></p><span data-dcnode-id="406" instrument_node="">
</span><h4 data-dcnode-id="403"><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Solution</span></strong></h4><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="402" id="AdThrive_Content_10_desktop" style="min-height: 250px;"></div><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">If you think that tap water is causing your Aloe Vera plant problems, try watering it with rainwater. You could also filter your tap water before using it to water your plant. You could also use bottled water.</span></p><span data-dcnode-id="398" instrument_node="">
</span><h3 data-dcnode-id="395"><strong data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Too Much Sun Exposure</span></strong></h3><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Although Aloe Vera plants are well-adapted to hot, dry environments, they are happiest when they get some shade during the hottest part of the day. </span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="387"><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenforindoor.com/aloe-vera-sunburn/"><span data-dcnode-id="390" instrument_node="">Too much direct sunlight on the plant’s leaves will burn them</span></a><span data-dcnode-id="388" instrument_node="">, causing their bright green color to fade and eventually turn brown.&nbsp;</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="386" id="AdThrive_Content_11_desktop" style="min-height: 250px;"></div><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">This probably won’t kill your plant, but it will make it look less attractive and slow its growth.</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Windows can intensify the sun’s rays. Although many people think that a sunny windowsill is a great place to keep their Aloe Vera plant, this is not the case!</span></p><span data-dcnode-id="379" instrument_node="">
</span><h4 data-dcnode-id="376"><strong data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Solution</span></strong></h4><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Keep your Aloe Vera plant in a position where it gets protection from direct sunlight during the hottest part of the day.&nbsp;</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Your plant will appreciate some direct sunlight but keep it well away from the window so that the intensified rays do not burn its leaves. A position where your plant gets plenty of bright, indirect light is best.&nbsp;</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="369" id="AdThrive_Content_12_desktop" style="min-height: 250px;"></div><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="367" instrument_node="">Aloe Vera plants are very forgiving, so you’ll have plenty of time to move your plant if you notice its leaves starting to </span><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenforindoor.com/color-change-in-succulents/"><span data-dcnode-id="366" instrument_node="">change color</span></a><span data-dcnode-id="364" instrument_node="">.</span></p><span data-dcnode-id="362" instrument_node="">
</span><h3 data-dcnode-id="359"><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Low Humidity Levels</span></strong></h3><span data-dcnode-id="358" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Aloe Vera plants are very tolerant of low-humidity environments. They can thrive in situations that would kill other houseplants! </span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">They do need some humidity to survive, though, at least 30%. When the humidity level is too low, the plant loses more water from its leaves than it can replace. This causes rapid dehydration, and in very severe cases, death.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="352" id="AdThrive_Content_13_desktop" style="min-height: 250px;"></div><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Suppose the leaves of your Aloe Vera plant are starting to dry up and turn brown, and you’ve eliminated the other possible causes in this article. In that case, low humidity could be the problem.</span></p><span data-dcnode-id="348" instrument_node="">
</span><h4 data-dcnode-id="345"><strong data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Solution</span></strong></h4><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">The simplest way to check the humidity level in your home is with a hygrometer. These are cheap and easy to find in drugstores or garden centers. You can also use a ‘DIY’ technique using two thermometers.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">If you find that the humidity level in your home is below 30-40%, you should try to increase it for the sake of your plants and your own health.&nbsp;</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="338" id="AdThrive_Content_14_desktop" style="min-height: 250px;"></div><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">It’s quite simple to raise the humidity level in your home. You could buy a humidifier, or you could try placing ‘humidity trays’ around your home and underneath your Aloe Vera plant’s pot.</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">To make a humidity tray, place several large pebbles in a tray of water, and place your plant’s pot on top. As the water evaporates into the air, the humidity level will rise.</span></p><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Plants release water from pores in their leaves which evaporates into the air, raising the humidity. </span></p><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">This means that the more plants you have in your home, the more humid it will be. If you ever needed an excuse to buy more plants, this is it!</span></p><span data-dcnode-id="325" instrument_node="">
</span><h3 data-dcnode-id="322"><strong data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Salts Build Up Due to Overfertilizing</span></strong></h3><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Chemical fertilizers contain nitrogen, potassium, phosphorous, and other nutrients, which are necessary for all plants to thrive. </span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">If you add too much fertilizer to your plant’s soil, though, these substances build up and cause problems for your plant.&nbsp;</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">As chemicals build up around your plant’s roots, it won’t be able to take in water and nutrients from the soil. This causes dehydration in a similar way to root rot and causes the plant’s leaves to dry out.</span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">These chemicals can also burn your plant roots, wrecking them completely.</span></p><span data-dcnode-id="309" instrument_node="">
</span><h4 data-dcnode-id="306"><strong data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Solution</span></strong></h4><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="304" instrument_node="">Aloe</span><strong data-dcnode-id="302"><span data-dcnode-id="303" instrument_node=""> </span></strong><span data-dcnode-id="301" instrument_node="">Vera plants are incredibly tough and are used to living in low-nutrient environments. Even when kept in containers, they don’t need fertilizer. </span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">However, a single application of general-purpose houseplant fertilizer in the spring will give your plant a boost and keep it happy all year.</span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">If you think you’ve overfertilized your plant, re-pot it in a fresh potting mix. Brush away as much of the old potting mix as you can from the plant’s roots, or rinse them with water.</span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">If the roots are dead (they’ll be dark brown or black), cut them off with sharp, clean scissors.</span></p><span data-dcnode-id="290" instrument_node="">
</span><h3 data-dcnode-id="287"><strong data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Fungal Diseases</span></strong></h3><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Aloe Vera plants are not prone to pests or diseases, but as with all houseplants, fungal infection is possible.&nbsp;</span></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">If the brown tips on your Aloe Vera plant are wet and mushy rather than dry, a fungal infection could be the cause. </span></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">The spots could also look red. The cause of fungal infections is nearly always the same – too much moisture.</span></p><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Some types of fungal infections look like sooty dirt. This type of infection results from insects such as aphids, which leave a sticky substance on the plant called honeydew. Mold spores stick to this and then begin to grow on the plant.</span></p><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">If you think that your Aloe Vera plant is suffering from a fungal disease, it is vital to deal with the problem that is encouraging fungal growth.</span></p><span data-dcnode-id="271" instrument_node="">
</span><h4 data-dcnode-id="268"><strong data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Solution</span></strong></h4><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Fungal diseases in Aloe Vera plants are almost always due to too much moisture. Please follow the tips described in the section on overwatering to prevent your plant from becoming waterlogged.</span></p><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">If your plant has a fungal infection, cut off the infected parts with clean scissors, then re-pot it straight away in a fresh potting mix. </span></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Throw the old potting mix away as it will contain fungal spores. Treat the new potting mix with a houseplant fungicide to prevent a new infection.</span></p><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">Never water an Aloe Vera plant from above, as this can cause stem rot. Fungi settle in the water sitting on the stem or leaves of the plant and destroy the plant’s cells – causing the mushy brown or black spots.</span></p><span data-dcnode-id="255" instrument_node="">
</span><h2 data-dcnode-id="252"><strong data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Why You Should Cut Off Dying Leaves</span></strong></h2><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="250" instrument_node="">Pruning the dying leaves off an </span><a data-dcnode-id="248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenforindoor.com/plants-that-look-like-aloe-vera/"><span data-dcnode-id="249" instrument_node="">Aloe Vera plant</span></a><span data-dcnode-id="247" instrument_node=""> will encourage it to develop new, healthy growth.&nbsp;</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Leaves that have started to die off are unlikely to improve. Damaged leaves are less able to hold water or to harness light to photosynthesize – so they stop being of much use to the plant. </span></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">It’s often better to remove these leaves and let your Aloe Vera plant replace them.&nbsp;</span></p><span data-dcnode-id="239" instrument_node="">
</span><h3 data-dcnode-id="236"><strong data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">When to Trim Dying Leaves</span></strong></h3><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Once you’ve worked out what is causing the leaves of your Aloe Vera plant to turn brown, you can decide whether to cut them off. If your plant has only a few areas of damage, you might choose to leave them be.&nbsp;</span></p><span data-dcnode-id="232" instrument_node="">
</span><p data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">You can prune your Aloe Vera plant at any time of year. It will grow much faster in spring and summer, though, so these are the best times to prune if you want to encourage new growth.</span></p><span data-dcnode-id="229" instrument_node="">
</span><h3 data-dcnode-id="226"><strong data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">How to Trim Brown Leaf Tips</span></strong></h3><span data-dcnode-id="225" instrument_node="">
</span><p data-dcnode-id="220"><span data-dcnode-id="224" instrument_node="">Cutting off the damaged leaves will improve the look of an Aloe Vera plant and </span><a data-dcnode-id="222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenforindoor.com/do-aloe-vera-leaves-grow-back/"><span data-dcnode-id="223" instrument_node="">encourage new growth</span></a><span data-dcnode-id="221" instrument_node="">. Use sharp, clean scissors to remove the leaves at the base, near the stem.</span></p><span data-dcnode-id="219" instrument_node="">
</span><p data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">You can remove just the brown tip, but be aware the cut will go brown as it heals. This method is also less likely to encourage new growth as most of the leaf stays on the plant. It is usually better to remove the whole leaf.</span></p><span data-dcnode-id="216" instrument_node="">
</span><h2 data-dcnode-id="213"><strong data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Tips to Prevent Your Aloe Vera Plant’s Leaves from Turning Brown</span></strong></h2><span data-dcnode-id="212" instrument_node="">
</span><p data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Aloe Vera plants are one of the easiest houseplants to look after. Once you know the basics, They pretty much look after themselves! </span></p><span data-dcnode-id="209" instrument_node="">
</span><p data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">If you want to keep your Aloe Vera plant in tip-top shape, with healthy, bright green foliage and no brown tips, just follow these simple steps:</span></p><span data-dcnode-id="206" instrument_node="">
</span><ul data-dcnode-id="193"><li data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Keep your plant in a bright location, not too close to the window but where it receives some direct light</span></li><li data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Your plant’s pot should be relatively small and shallow to discourage root rot&nbsp;</span></li><li data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">Water your plant only when the potting mix is completely dry</span></li><li data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Use filtered or rainwater to water your plant if possible</span></li><li data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Feed your plant once a year at most</span></li><li data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Remove dying leaves at the base to encourage new growth</span></li></ul><span data-dcnode-id="192" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="191" instrument_node="">(Source: &nbsp;</span><a data-dcnode-id="189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardeningsolutions.ifas.ufl.edu/plants/ornamentals/aloe-vera.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="190" instrument_node="">University of Florida</span></a><span data-dcnode-id="188" instrument_node="">)</span></p><span data-dcnode-id="186" instrument_node="">
</span></div><span data-dcnode-id="184" instrument_node="">
