</span><div class="container" data-dcnode-id="106"><span data-dcnode-id="479" instrument_node="">
</span><main data-dcnode-id="341" role="main"><span data-dcnode-id="478" instrument_node="">
</span><h1 data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Mistakes in contract law</span></h1><span data-dcnode-id="475" instrument_node="">
</span><span data-dcnode-id="473" instrument_node="">
</span><article class="post-3647 page type-page status-publish hentry" data-dcnode-id="345" id="post-3647"><span data-dcnode-id="472" instrument_node="">
</span><h2 data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">What happens if I made a mistake entering into a contract?</span></h2><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="468" instrument_node="">In certain cases, a contract can be ended if one of the parties has made a mistake in some respect when entering into the contract. If you believe you should not have entered into a </span><a data-dcnode-id="466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inbrief.co.uk/contract-law/contracts/"><span data-dcnode-id="467" instrument_node="">contract</span></a><span data-dcnode-id="465" instrument_node=""> because of a mistake, even though the terms of the contract are correct, you will need to consider any terms and conditions concerning cancellation and termination of the contract.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">If the contract contains a mistake, it may affect the validity of the contract. This will depend on the nature and the kind of mistake made, and in many cases will result in the contract being void.</span></p><span data-dcnode-id="460" instrument_node="">
</span><h3 data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Mistake</span></h3><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">There are four types of mistake in contract law: </span></p><span data-dcnode-id="454" instrument_node="">
</span><ol data-dcnode-id="440"><span data-dcnode-id="453" instrument_node="">
</span><li data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Common mistake.</span></li><span data-dcnode-id="450" instrument_node="">
</span><li data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Unilateral mistake.</span></li><span data-dcnode-id="447" instrument_node="">
</span><li data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Mutual mistake.</span></li><span data-dcnode-id="444" instrument_node="">
</span><li data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Mistake relating to identity.</span></li><span data-dcnode-id="441" instrument_node="">
</span></ol><span data-dcnode-id="439" instrument_node="">
</span><h4 data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Common mistake</span></h4><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Where there is common mistake, both/all the parties have entered into the contract upon the same misapprehension, ie. they have each relied on that mistake when entering into the contract. In the case of a common mistake going to the root of the contract, this will result in the contract being void as the mistake was fundamental to the contract.</span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">The following common mistakes will render the contract void and it will be as though the contract never existed:</span></p><span data-dcnode-id="430" instrument_node="">
</span><ul data-dcnode-id="419"><span data-dcnode-id="429" instrument_node="">
</span><li data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Mistake in relation to the existence of the subject matter: where the subject matter of the contract does not exist, or ceases to exist.</span></li><span data-dcnode-id="426" instrument_node="">
</span><li data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Mistake in relation to title: where the contract is to transfer property from one person to another, but the other already owns the property and neither party was aware of this.</span></li><span data-dcnode-id="423" instrument_node="">
</span><li data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Mistake in relation to performing the contract: if the obligations specified within a contract are impossible to perform.</span></li><span data-dcnode-id="420" instrument_node="">
</span></ul><span data-dcnode-id="418" instrument_node="">
</span><h4 data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Mistake as to quality</span></h4><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">If the mistake is in relation to the quality of the subject matter of the contract, the contract will still be valid at common law. An example of this is a contract between two people for the sale of a painting where both parties believed the painting to be by a particular artist. The fact that there was a mistake in relation to the artist would not make the contract void at common law.</span></p><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">However, the contract may be void if there is a mistake in relation to quality if the quality of the goods was fundamental to the contract.</span></p><span data-dcnode-id="409" instrument_node="">
</span><h4 data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Unilateral mistake</span></h4><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">A unilateral mistake occurs where only one party is mistaken as to the terms or subject matter. Often, this can lead to an unfair advantage for one of the parties. For a unilateral mistake to render the contract void, the mistake must relate to the fundamental terms and conditions of the contract. A unilateral mistake in relation to the quality of the subject matter of a contract will not result in the contract being void – unless the term as to quality is fundamental to the contract.</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">It is not enough for one party simply to be mistaken in relation to the terms and conditions of a contract. For the contract to be void due to the unilateral mistake the other party must have been aware of this mistake and then used it to their advantage in forming the contract.</span></p><span data-dcnode-id="400" instrument_node="">
</span><h4 data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Mutual mistake</span></h4><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">A mutual mistake is a common misunderstanding between the parties entering into a contract as to the intentions of the other party or a material fact in relation to the contract. A mutual mistake will render the contract voidable: if the mistake goes to the heart of the heart of the contract, the contract is void. If the mutual mistake relates to the quality of the subject matter the contract is unlikely to be held to be void. If, in light of the parties’ words and conduct, there is only one possible interpretation of what was agreed – the contract will still be valid.</span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Where there is a dispute as to what the agreement relates, an objective test will be applied: ie. what would a reasonable person believe the contract means.</span></p><span data-dcnode-id="391" instrument_node="">
</span><h4 data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Mistakes as to identity</span></h4><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">If there is a mutual mistake relating to the identity of the subject matter, the contract will be void.</span></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="384" instrument_node="">A contract will become void at common law where a mistake was made as to the identity of the </span><i data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">other party</span></i><span data-dcnode-id="381" instrument_node=""> with whom the contract is made; and the identity of that person is central to the formation of the contract.</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">This is often difficult to prove because when a contract is negotiated and entered into, the parties will usually meet in person. There is, therefore, a presumption that the parties intended to do business with the person in their presence – making it very difficult for the contract to be deemed void.</span></p><span data-dcnode-id="376" instrument_node="">
</span><div class="author-box" data-dcnode-id="347"><span data-dcnode-id="375" instrument_node="">
</span><div class="author-box-header" data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Article written by...</span></div><span data-dcnode-id="372" instrument_node="">

</span><h4 data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Capacity</span></h4><span data-dcnode-id="281" instrument_node="">
