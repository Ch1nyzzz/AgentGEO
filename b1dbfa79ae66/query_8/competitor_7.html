</span><a class="ez-video-link" data-dcnode-id="411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigorganicgarden.com/video/ezoic/view%3FvideoID%3D6319136595dbc3df66ae078c734d75b584fc2f62%26_ez_video_link_src%3D1" id="ez-video-link-6319136595dbc3df66ae078c734d75b584fc2f62"><span data-dcnode-id="412" instrument_node="">Why a Ponytail Palm Might be dying</span></a><span data-dcnode-id="410" instrument_node="">

</span><div data-dcnode-id="404" data-inserter-version="2" id="ezoic-pub-ad-placeholder-111"></div><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" style="font-weight: 400;"><span data-dcnode-id="401" instrument_node="">Too much sunlight can burn the healthy tissues and cause them to turn yellow. So, direct sunlight is a big no-no for them. And that’s why the majority of the time, they are grown indoors.</span></span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" style="font-weight: 400;"><span data-dcnode-id="397" instrument_node="">Another area where you have to pay extra attention is water. You see, if the water has too much phosphate and fluoride in it, it can burn the tips of the leaves as well.</span></span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" style="font-weight: 400;"><span data-dcnode-id="393" instrument_node="">That’s because the prayer plant can’t handle excess chemicals.</span></span></p><span data-dcnode-id="390" instrument_node="">
</span><h4 data-dcnode-id="387"><span data-dcnode-id="388" style="font-weight: 400;"><span data-dcnode-id="389" instrument_node="">Solution- Place Them at the Right Spot and Use Purified Water</span></span></h4><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="384" style="font-weight: 400;"><span data-dcnode-id="385" instrument_node="">So, for the solution, you have to pay a little focus on the plants. And if you see that it has access to direct sunlight, then place it in a place where the sun has minimum access.</span></span></p><div data-dcnode-id="381" data-inserter-version="2" id="ezoic-pub-ad-placeholder-112"></div><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="377" style="font-weight: 400;"><span data-dcnode-id="378" instrument_node="">Or you can make a shade for the plant. As for the water, be sure to use purified water. At the same time, you can use liquid fertilizer.</span></span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="372"><span data-dcnode-id="373" style="font-weight: 400;"><span data-dcnode-id="374" instrument_node="">This keeps your soil at the right pH level so that your plant can grow at a steady rate.</span></span></p><span data-dcnode-id="371" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="354"><table data-dcnode-id="355"><tbody data-dcnode-id="356"><tr data-dcnode-id="367"><td data-dcnode-id="368"><span data-dcnode-id="369" style="font-weight: 400;"><span data-dcnode-id="370" instrument_node="">OUR RECOMMENDED LIQUID FERTILIZER</span></span></td></tr><tr data-dcnode-id="357"><td data-dcnode-id="358"><a data-dcnode-id="365" data-id="https://www.amazon.com/FoxFarm-Liquid-Nutrient-Trio-Formula/dp/B07TH2FMP3?&amp;linkCode=ll1&amp;tag=bigorganicgarden-20&amp;linkId=c168235f2cbceefc6e15acf93eb1c906&amp;language=en_US&amp;ref_=as_li_ss_tl" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/FoxFarm-Liquid-Nutrient-Trio-Formula/dp/B07TH2FMP3%3F%26linkCode%3Dll1%26tag%3Dbigorganicgarden-20%26linkId%3Dc168235f2cbceefc6e15acf93eb1c906%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="366" instrument_node="">FoxFarm Liquid Nutrient Trio Soil Formula</span></a><span data-dcnode-id="364" instrument_node=""> </span><p data-dcnode-id="359"><a data-dcnode-id="362" data-id="https://www.amazon.com/Food-All-purpose-Fertilizers-Plants-Pets/dp/B07QNMBLGQ?&amp;linkCode=ll1&amp;tag=bigorganicgarden-20&amp;linkId=3d28fc5fa30ac43a50b7e27a1d69af6a&amp;language=en_US&amp;ref_=as_li_ss_tl" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Food-All-purpose-Fertilizers-Plants-Pets/dp/B07QNMBLGQ%3F%26linkCode%3Dll1%26tag%3Dbigorganicgarden-20%26linkId%3D3d28fc5fa30ac43a50b7e27a1d69af6a%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="363" instrument_node="">Aquatic Arts All-purpose House Plant Fertilizer</span></a><span data-dcnode-id="360" style="font-family: inherit; font-size: inherit; font-weight: inherit; color: initial;"><span data-dcnode-id="361" instrument_node=""> </span></span></p></td></tr></tbody></table></figure><span data-dcnode-id="353" instrument_node="">
</span><h3 data-dcnode-id="350"><span data-dcnode-id="351" style="font-weight: 400;"><span data-dcnode-id="352" instrument_node="">Reason 2- An Attack by the Fungus</span></span></h3><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="347" style="font-weight: 400;"><span data-dcnode-id="348" instrument_node="">Another thing to worry about is the fungus. Now, there is a lot of fungi that can pose a threat. But most of the time, it’s the Helminthosporium leaf spot.</span></span></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" style="font-weight: 400;"><span data-dcnode-id="344" instrument_node="">And when these </span><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigorganicgarden.com/rhododendron-leaves-turning-yellow/"><span data-dcnode-id="343" instrument_node="">fungi attack</span></a><span data-dcnode-id="341" instrument_node="">, you’ll see that the spots look like you soaked them in water. But over time, those spots will turn yellow, and the poor plant will start to wilt.</span></span></p><div data-dcnode-id="337" data-inserter-version="2" id="ezoic-pub-ad-placeholder-113"></div><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="333" style="font-weight: 400;"><span data-dcnode-id="334" instrument_node="">However, if it is the fungus, then there is no need to worry. That’s because you can solve quite easily.</span></span></p><span data-dcnode-id="331" instrument_node="">
</span><h4 data-dcnode-id="328"><span data-dcnode-id="329" style="font-weight: 400;"><span data-dcnode-id="330" instrument_node="">Solution- Apply Fungicide on the Plant</span></span></h4><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" style="font-weight: 400;"><span data-dcnode-id="326" instrument_node="">If the prayer plant is under a fungus attack, your primary task is to apply a fungicide. This kills the existing fungus and lets your plant recover.</span></span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="321" style="font-weight: 400;"><span data-dcnode-id="322" instrument_node="">However, you also have to eradicate any future threat. And for this, you need to make sure that there is no irrigation problem. That’s because the fungus tends to grow in excess water.</span></span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" style="font-weight: 400;"><span data-dcnode-id="318" instrument_node="">So, take care of the drainage problem, and your plants will be safe in your house.</span></span></p><div data-dcnode-id="314" data-inserter-version="2" id="ezoic-pub-ad-placeholder-114"></div><span data-dcnode-id="312" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="291"><table data-dcnode-id="292"><tbody data-dcnode-id="293"><tr data-dcnode-id="308"><td data-dcnode-id="309"><span data-dcnode-id="310" style="font-weight: 400;"><span data-dcnode-id="311" instrument_node="">OUR RECOMMENDED FUNGICIDE</span></span></td></tr><tr data-dcnode-id="294"><td data-dcnode-id="295"><a data-dcnode-id="306" data-id="https://www.amazon.com/Garden-Safe-BrandFungicide3-Concentrate-28-Ounce/dp/B00FQGS7LC?th=1&amp;linkCode=ll1&amp;tag=bigorganicgarden-20&amp;linkId=01cc7cc0efeb9456e4c8bf4ace6e0398&amp;language=en_US&amp;ref_=as_li_ss_tl" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Garden-Safe-BrandFungicide3-Concentrate-28-Ounce/dp/B00FQGS7LC%3Fth%3D1%26linkCode%3Dll1%26tag%3Dbigorganicgarden-20%26linkId%3D01cc7cc0efeb9456e4c8bf4ace6e0398%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="307" instrument_node="">Garden Safe BrandFungicide3 Concentrate</span></a><span data-dcnode-id="305" instrument_node=""> </span><br data-dcnode-id="304"><p data-dcnode-id="299"><a data-dcnode-id="302" data-id="https://www.amazon.com/Spectracide-Multi-Purpose-Fungicide-16-Ounce-Concentrate/dp/B0035H0RA8?&amp;linkCode=ll1&amp;tag=bigorganicgarden-20&amp;linkId=4fca1410a14304536113a8030eacde3e&amp;language=en_US&amp;ref_=as_li_ss_tl" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Spectracide-Multi-Purpose-Fungicide-16-Ounce-Concentrate/dp/B0035H0RA8%3F%26linkCode%3Dll1%26tag%3Dbigorganicgarden-20%26linkId%3D4fca1410a14304536113a8030eacde3e%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="303" instrument_node="">Spectracide 100507462 Immunox Multi Purpose Fungicide Spray Concentrate</span></a><span data-dcnode-id="300" style="font-family: inherit; font-size: inherit; font-weight: inherit; color: initial;"><span data-dcnode-id="301" instrument_node=""> </span></span></p><p data-dcnode-id="296"><a data-dcnode-id="297" data-id="https://www.amazon.com/Bonide-BND861-Fungal-Disease-Control/dp/B000BWZ9JO?th=1&amp;linkCode=ll1&amp;tag=bigorganicgarden-20&amp;linkId=e33b4c4c7ca244d0190c520d6a7ac3ad&amp;language=en_US&amp;ref_=as_li_ss_tl" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Bonide-BND861-Fungal-Disease-Control/dp/B000BWZ9JO%3Fth%3D1%26linkCode%3Dll1%26tag%3Dbigorganicgarden-20%26linkId%3De33b4c4c7ca244d0190c520d6a7ac3ad%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="298" instrument_node="">Bonide (BND862) – Fungal Disease Control, Mancozeb Flowable with Zinc Fungicide Concentrate</span></a></p></td></tr></tbody></table></figure><span data-dcnode-id="290" instrument_node="">
</span><h3 data-dcnode-id="287"><span data-dcnode-id="288" style="font-weight: 400;"><span data-dcnode-id="289" instrument_node="">Reason 3- A Deadly Virus</span></span></h3><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" style="font-weight: 400;"><span data-dcnode-id="285" instrument_node="">On the other hand, if your plant gets infected by the cucumber mosaic virus, it’s a severe problem. That’s because if the virus spreads too far, there is no cure for it.</span></span></p><span data-dcnode-id="282" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="280" style="font-weight: 400;"><span data-dcnode-id="281" instrument_node="">Yes, you might have to throw it away before it causes further damage to other plants in the area. And one way to notice this virus is by looking at the leaves.</span></span></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="276" style="font-weight: 400;"><span data-dcnode-id="277" instrument_node="">You see, the older leaves usually turn yellow first. Then the disease slowly spread to the younger leaves.</span></span></p><span data-dcnode-id="274" instrument_node="">
</span><h4 data-dcnode-id="271"><span data-dcnode-id="272" style="font-weight: 400;"><span data-dcnode-id="273" instrument_node="">Solution- Cut the Infected Part of the Plant</span></span></h4><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" style="font-weight: 400;"><span data-dcnode-id="269" instrument_node="">Now, you can save this plant, but only if you spot it at the beginning. You can start by snipping off the plant with </span><a data-dcnode-id="267" data-id="https://www.amazon.com/Fiskars-91466935J-Inch-Bypass-Lopper/dp/B000BX1IB6?&amp;linkCode=ll1&amp;tag=bigorganicgarden-20&amp;linkId=31b30167fcd51c9d60024f14344f0f07&amp;language=en_US&amp;ref_=as_li_ss_tl" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Fiskars-91466935J-Inch-Bypass-Lopper/dp/B000BX1IB6%3F%26linkCode%3Dll1%26tag%3Dbigorganicgarden-20%26linkId%3D31b30167fcd51c9d60024f14344f0f07%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="268" instrument_node="">pruning shears</span></a><span data-dcnode-id="266" instrument_node="">.</span></span></p><div data-dcnode-id="262" data-inserter-version="2" id="ezoic-pub-ad-placeholder-115"></div><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="258" style="font-weight: 400;"><span data-dcnode-id="259" instrument_node="">And then make sure you throw away the cut off part so that the virus can’t crawl its way back into the plant. However, a fair warning, the chances of saving the plant is extremely low.</span></span></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="253"><span data-dcnode-id="254" style="font-weight: 400;"><span data-dcnode-id="255" instrument_node="">So, if this virus infects it, you might have to throw away the entire plant.</span></span></p><span data-dcnode-id="252" instrument_node="">
</span><h3 data-dcnode-id="249"><span data-dcnode-id="250" style="font-weight: 400;"><span data-dcnode-id="251" instrument_node="">Reason 4- Too Much Water</span></span></h3><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="242"><span data-dcnode-id="243" style="font-weight: 400;"><span data-dcnode-id="247" instrument_node="">Did you know that </span><a data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigorganicgarden.com/how-do-you-revive-a-dying-ponytail-palm/"><span data-dcnode-id="246" instrument_node="">excessively watering</span></a><span data-dcnode-id="244" instrument_node=""> the prayer plants can be harmful for them? Well, this is because they tend to soak up a lot of water. Sometimes more than what it can handle.</span></span></p><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="239" style="font-weight: 400;"><span data-dcnode-id="240" instrument_node="">That’s when you find yellow marks on this plant. So, you need to keep an eye on the amount of water you apply to the plants.</span></span></p><div data-dcnode-id="236" data-inserter-version="2" id="ezoic-pub-ad-placeholder-116"></div><span data-dcnode-id="234" instrument_node="">
</span><h4 data-dcnode-id="231"><span data-dcnode-id="232" style="font-weight: 400;"><span data-dcnode-id="233" instrument_node="">Solution- Water the Plant after the Soil has Dried Up</span></span></h4><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="227"><span data-dcnode-id="228" style="font-weight: 400;"><span data-dcnode-id="229" instrument_node="">As for the remedy, you should water them after the soil has dried up. You see, the ground should not be left soggy, or else it causes yellow leaves on prayer-plants.</span></span></p><span data-dcnode-id="226" instrument_node="">
</span><p data-dcnode-id="217"><span data-dcnode-id="218" style="font-weight: 400;"><span data-dcnode-id="225" instrument_node="">With that said, you still have to water the plant regularly. Otherwise, they will wither away. But water them in low amounts, and you’ll be good to go. You can also get </span><a data-dcnode-id="223" data-id="https://www.amazon.com/Plastic-HOMENOTE-Decorative-Drainage-Succulents/dp/B089ZTZ94V?th=1&amp;linkCode=ll1&amp;tag=bigorganicgarden-20&amp;linkId=ae3cecc6f11423810e65d34e00a90991&amp;language=en_US&amp;ref_=as_li_ss_tl" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Plastic-HOMENOTE-Decorative-Drainage-Succulents/dp/B089ZTZ94V%3Fth%3D1%26linkCode%3Dll1%26tag%3Dbigorganicgarden-20%26linkId%3Dae3cecc6f11423810e65d34e00a90991%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="224" instrument_node="">a drainage pot</span></a><span data-dcnode-id="222" instrument_node=""> or </span><a data-dcnode-id="220" data-id="https://www.amazon.com/Watering-Aerating-Reservoir-Succulents-Windowsill/dp/B0799G3Y73?&amp;linkCode=ll1&amp;tag=bigorganicgarden-20&amp;linkId=bd6661db8afca94989b6d9f75f94a046&amp;language=en_US&amp;ref_=as_li_ss_tl" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Watering-Aerating-Reservoir-Succulents-Windowsill/dp/B0799G3Y73%3F%26linkCode%3Dll1%26tag%3Dbigorganicgarden-20%26linkId%3Dbd6661db8afca94989b6d9f75f94a046%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="221" instrument_node="">a self-watering pot</span></a><span data-dcnode-id="219" instrument_node=""> to be on the safe side.&nbsp;</span></span></p><span data-dcnode-id="216" instrument_node="">
</span><h2 data-dcnode-id="213"><span data-dcnode-id="214" style="font-weight: 400;"><span data-dcnode-id="215" instrument_node="">Final Words</span></span></h2><span data-dcnode-id="212" instrument_node="">
</span><p data-dcnode-id="205"><span data-dcnode-id="210" style="font-weight: 400;"><span data-dcnode-id="211" instrument_node="">Well, that’s all the reasons for seeing </span></span><b data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">prayer plant leaves turning yellow</span></b><span data-dcnode-id="206" style="font-weight: 400;"><span data-dcnode-id="207" instrument_node="">. In short, take good care of them, and you’ll see that they’re glowing under the sun.</span></span></p><span data-dcnode-id="204" instrument_node="">
</span><p data-dcnode-id="201"><span data-dcnode-id="202" style="font-weight: 400;"><span data-dcnode-id="203" instrument_node="">Nevertheless, if you have any queries or questions about prayer-plants, do leave a comment below. We’ll be glad to help you out in any way possible.</span></span></p><div data-dcnode-id="199" data-inserter-version="2" id="ezoic-pub-ad-placeholder-117"></div><span data-dcnode-id="197" instrument_node="">
</span><p data-dcnode-id="194"><span data-dcnode-id="195" style="font-weight: 400;"><span data-dcnode-id="196" instrument_node="">And with that said, we’ll take our leave now. Have a nice day. Bye-bye!</span></span></p><span data-dcnode-id="193" instrument_node="">
