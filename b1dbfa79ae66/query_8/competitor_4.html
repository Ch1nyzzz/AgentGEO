</span><div class="maintext" data-dcnode-id="35"><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">&nbsp;</span></p><span data-dcnode-id="746" instrument_node="">
</span><h2 align="center" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Hibiscus Plant Care</span></h2><span data-dcnode-id="743" instrument_node="">
</span><h1 align="center" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Common Mistakes</span></h1><span data-dcnode-id="740" instrument_node="">
</span><h3 align="center" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Watch out for these Mistakes ~ They can be Fatal for your Hibiscus!</span></h3><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">
We frequently get requests to provide care information for brand new novices in the hibiscus world, and we look at each other and scratch our heads. We already have so much information on our care pages! Do we really need to add more to them? We've racked our brains trying to figure out what the newbies mean. But when this request was repeated by Cindy's own sister just this last week, we questioned her about what she meant. She started describing all the things she did to try to take care of her hibiscus plant, and we started to see the light. A quick run through the daily email illuminated us even more. Duh!!!!!! People are struggling everywhere with some very basic things that seem completely obvious to us deep into decades of growing, but they don't seem obvious at all to newbies in the hibiscus world. And it's our fault! We need to help more! So for Cindy's sweet and patient sister, and for everyone else who is frustrated with our lack of help, here are some of the most common mistakes we all make as newbies.
</span></p><span data-dcnode-id="734" instrument_node="">
</span><h3 align="left" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Transplanting into Pots</span></h3><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="730" instrument_node="">
</span><table align="right" class="pic" data-dcnode-id="718" style="margin-left: 15px; margin-bottom: 15px"><tbody data-dcnode-id="719"><tr data-dcnode-id="720"><td align="center" data-dcnode-id="721"><span data-dcnode-id="729" instrument_node="">
</span><img class="frame" data-dcnode-id="728" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hiddenvalleyhibiscus.com/images/smplantbigpot.jpg&amp;raw"><br data-dcnode-id="727"><span data-dcnode-id="726" instrument_node="">
This baby plant drowned in this very large</span><br data-dcnode-id="725"><span data-dcnode-id="724" instrument_node=""> 
pot because the soil stayed too soggy.</span><br data-dcnode-id="723"><span data-dcnode-id="722" instrument_node="">
Photo Credit: Trixie Johnson
</span></td></tr></tbody></table><span data-dcnode-id="717" instrument_node="">
You order your hibiscus. You've planned and planned where you want to put them on your patio. While you're waiting for the plants to arrive, you rush to your nearby garden center to pick out the perfect pot for your new beautiful babies. You find beautiful matching pots that fit your decor and you make sure they are big enough to accommodate your hibiscus when they are full grown. The minute the UPS truck drops off your hibiscus, you transplant them into their brand new, lovely pots so they will quickly acclimate. Isn't all of this right? Sadly, it isn't.
</span></p><span data-dcnode-id="715" instrument_node="">
</span><blockquote data-dcnode-id="693"><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="705"><font data-dcnode-id="712" style="color:#af0033; font-size:18px; font-weight:600; "><span data-dcnode-id="713" instrument_node="">Pot is too Big.</span></font><br data-dcnode-id="711"><span data-dcnode-id="710" instrument_node="">
If you buy a pot that will be big enough for the full-grown hibiscus plant, it's too big for the baby. It's like letting a human baby swim in a large, deep swimming pool instead of sitting safely in a tiny baby wading pool - literally! Hibiscus literally drown in pots that are too big. Their tiny little roots are not nearly big enough to spread through all the soil in a big pot. So after you water the pot, the water just sits there, soggy, with no roots to suck up the water in all the giant space around the little plant. The baby roots sit in this soil that stays soggy, and they slowly drown. In the end, you have a brown stick, a large dead twig, the classic sign of a baby that drowned in too large a pot. </span><span data-dcnode-id="707" style="background-color: #FFFF00"><b data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Buy a pot that is only one size larger than the original pot.</span></b></span><span data-dcnode-id="706" instrument_node=""> If you buy plants in 4" pots, then you should pot up to a 6" pot (1 gallon) - no bigger! This means the plant has no more than 1 inch of new soil all around all sides. That is an amount that its roots can quickly grow into, and it's not enough for the plant to drown in.
</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="695"><font data-dcnode-id="702" style="color:#af0033; font-size:18px; font-weight:600; "><span data-dcnode-id="703" instrument_node="">Never Transplant a Stressed Plant.</span></font><br data-dcnode-id="701"><span data-dcnode-id="700" instrument_node="">
No matter how healthy, crisp and green your new hibiscus looks, just the act of traveling across the country in a shipping truck, then emerging in a totally strange, new place - all of this means one thing: STRESS! The plant may not show the stress, but you have to realize that it has indeed experienced stress. So don't transplant yet! Many other things also stress hibiscus, such as high heat, cold weather, drought, heavy rain and saturated soil, and pest attacks. Hibiscus should NEVER be transplanted under any of these circumstances. </span><span data-dcnode-id="697" style="background-color: #FFFF00"><b data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">After any kind of stressful situation, give hibiscus the safety of their nice, comfortable, familiar pots until the stressful situation is completely gone and the plants have had a few weeks to recover before you consider transplanting.</span></b></span><span data-dcnode-id="696" instrument_node=""> Remember, transplanting is stressful for a plant, so you never wanted to add a new stressor to an already-stressed plant.
</span></p><span data-dcnode-id="694" instrument_node="">
</span></blockquote><br clear="all" data-dcnode-id="692"><span data-dcnode-id="691" instrument_node="">
</span><h3 align="left" data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Transplanting into the Ground</span></h3><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="687" instrument_node="">
</span><table align="right" class="pic" data-dcnode-id="669" style="margin-left: 15px; margin-bottom: 15px"><tbody data-dcnode-id="670"><tr data-dcnode-id="671"><td align="center" data-dcnode-id="672"><span data-dcnode-id="686" instrument_node="">
</span><img class="frame" data-dcnode-id="685" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hiddenvalleyhibiscus.com/images/babyplantinground.jpg&amp;raw"><br data-dcnode-id="684"><span data-dcnode-id="683" instrument_node="">
This green, healthy baby plant was planted</span><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node=""> 
in the ground 2 days after shipping. The</span><br data-dcnode-id="680"><span data-dcnode-id="679" instrument_node="">
multiple stresses of shipping, immediate</span><br data-dcnode-id="678"><span data-dcnode-id="677" instrument_node="">
transplanting, full sun, and being in the</span><br data-dcnode-id="676"><span data-dcnode-id="675" instrument_node="">
ground as a baby did this to it.</span><br data-dcnode-id="674"><span data-dcnode-id="673" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="668" instrument_node="">
If you live in a warm, tropical climate, you plan where you will put your hibiscus into the ground to star in your garden. You dig the holes and prep the ground, eagerly waiting the arrival of the plants. You know you have to wait a bit to transplant them into the ground, so you wait a couple of days, then put them out in your garden in their special spot, water them well, make sure a sprinkler reaches them, and let them grow. Right? Sadly, these are mistakes that even we have made.
</span></p><span data-dcnode-id="666" instrument_node="">
</span><blockquote data-dcnode-id="634"><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="656"><font data-dcnode-id="663" style="color:#af0033; font-size:18px; font-weight:600; "><span data-dcnode-id="664" instrument_node="">Greenhouse Plants will Sunburn Badly if Put Directly into Sun.</span></font><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node="">
Greenhouses are intensely hot places in the summer, so hibiscus have to be protected from the kind of 120°F (49°C) temps that build up in them on summer days. This means, almost all greenhouses grow plants under shade to protect them from getting cooked in the high heat. So although hibiscus end up loving to be in the sun in typical summer temps in the more moderate or cooler parts of the world, they do have to gradually get used to the sun or they will burn. Sunburn is both ugly and stressful for the plant. The sun burns big white spots all over the leaves, making it hard for them to photosythesize and produce food for the plant. </span><span data-dcnode-id="658" style="background-color: #FFFF00"><b data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">In order to prevent sunburn, hibiscus need to start in bright shade, then be inched slowly out into the sun, a little further each day, over the course of a couple of weeks.</span></b></span><span data-dcnode-id="657" instrument_node="">
</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="646"><font data-dcnode-id="653" style="color:#af0033; font-size:18px; font-weight:600; "><span data-dcnode-id="654" instrument_node="">Baby Plants can Struggle or Die in the Ground.</span></font><br data-dcnode-id="652"><span data-dcnode-id="651" instrument_node="">
Although some very experienced hibiscus gardeners can be successful with putting baby plants straight into the ground, we strongly caution novice growers that a high percentage of baby plants can die if put straight into the ground. Hazards that barely affect a tough, older plant with a large root system can kill a tender baby plant with a tiny root system. Sudden frosts, extreme heat, pouring rain, insect pests, gophers, and even cute little animals like deer and bunnies can destroy a young plant in minutes. </span><span data-dcnode-id="648" style="background-color: #FFFF00"><b data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">It is much safer to pot baby plants up to a pot that is one size larger and grow them outside in their pots for at least their first few months, and in many cases, for as long as their first year.</span></b></span><span data-dcnode-id="647" instrument_node=""> Then if anything goes wrong, you can scoop up the pots and move them to a safe location very quickly.
</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="636"><font data-dcnode-id="643" style="color:#af0033; font-size:18px; font-weight:600; "><span data-dcnode-id="644" instrument_node="">Water Systems need to be Monitored &amp; Adjusted</span></font><br data-dcnode-id="642"><span data-dcnode-id="641" instrument_node="">
Sprinklers are notoriously variable in the amount of water they provide to any one spot in a yard or garden. Even drip systems, with their targeted streams of water, can vary from one emitter to another and deliver variable amounts of water to each of your hibiscus. Plus, the hibiscus themselves need variable amounts of water. A younger plant will need less water, and an older plant will need more. Hibiscus in full sun will need more water, hibiscus in shade will need less. </span><span data-dcnode-id="638" style="background-color: #FFFF00"><b data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">So always monitor and adjust your sprinker or emitter daily at first, then weekly for at least a month after transplanting into the ground, to make sure the hibiscus is getting the right amount of water. The soil should always be moist, but never squishy or soggy. </span></b></span><span data-dcnode-id="637" instrument_node="">
</span></p><span data-dcnode-id="635" instrument_node="">
</span></blockquote><br clear="all" data-dcnode-id="633"><span data-dcnode-id="632" instrument_node="">
</span><h3 align="left" data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Removing Soil &amp; Giving Fresh Soil to Roots</span></h3><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">
When something goes wrong with your hibiscus plant, and you're very worried about it, you decide that it needs fresh soil to help it recover. So you very carefully remove all the old soil from the roots of your plant, gently wash the roots, then repot the clean, naked roots into fresh, clean potting soil. Surely this supply of fresh potting soil for the roots will be a helpful tonic for your plant, right? This is one of the most tragic hibiscus mistakes you can make! First, you're breaking the cardinal rule of never transplanting a stressed plant. But what is even more lethal . . .
</span></p><span data-dcnode-id="626" instrument_node="">
</span><blockquote data-dcnode-id="614"><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="616"><font data-dcnode-id="623" style="color:#af0033; font-size:18px; font-weight:600; "><span data-dcnode-id="624" instrument_node="">Removing Soil from Roots is a Sure Way to Kill Hibiscus.</span></font><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">
Some plants have very hard, tough roots and survive bare-rooting, although even for the toughest of plants, it is still at least somewhat stressful. But hibiscus have soft, tender roots. No matter how gently you try to remove the soil, the tiny, root hairs at the ends of the roots will be scraped off by the soil - and these are the living, functioning parts of the roots! Even soaking and swishing the roots in water very slowly and gently to remove the soil damages these tiny root hairs. Any disturbance breaks them off or makes little cuts and wounds in them. Once these root hairs are damaged in any way, the entire root system will slowly start to die. It may not happen fast. We've seen it take as long as 6 months or more to fully kill the plant, so people usually don't realize that removing and replacing the soil was what actually did kill the plant. Each tiny spot where a root hair was scraped off, broken, or damaged is a microscopic sore on the roots of the plant in the same way that small cuts on a human could kill him with infection in the days before antibiotics. Imagine if there were small cuts all over every part of the skin of a human! This is what we do to hibiscus when we remove the soil! It is an extreme assault on the plant. Each of these many tiny wounds leaves the plant open to germs that enter the roots, and these germs very slowly grow inside the roots, spreading slowly through the entire root system, until they eventually kill the plant. We cannot say this strongly enough: </span><span data-dcnode-id="618" style="background-color: #FFFF00"><b data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">NEVER remove soil from the roots of hibiscus! Disturb the roots as little as possible when you transplant. Transplant only when necessary and handle the root ball as gently and quickly as possible.</span></b></span><span data-dcnode-id="617" instrument_node="">
</span></p><span data-dcnode-id="615" instrument_node="">
</span></blockquote><br clear="all" data-dcnode-id="613"><span data-dcnode-id="612" instrument_node="">
</span><h3 align="left" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Pest Treatments</span></h3><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">
</span></p><p data-dcnode-id="586"><table align="right" class="pic" data-dcnode-id="591" style="margin-left: 15px; margin-bottom: 15px"><tbody data-dcnode-id="592"><tr data-dcnode-id="593"><td align="center" data-dcnode-id="594"><span data-dcnode-id="606" instrument_node="">
</span><img class="frame" data-dcnode-id="605" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hiddenvalleyhibiscus.com/images/pestovertreatment.jpg&amp;raw"><br data-dcnode-id="604"><span data-dcnode-id="603" instrument_node="">
This poor hibiscus has multiple pests on it</span><br data-dcnode-id="602"><span data-dcnode-id="601" instrument_node=""> 
despite repeated, multiple treatments by its</span><br data-dcnode-id="600"><span data-dcnode-id="599" instrument_node="">
distraught owner. Multiple treatments cause</span><br data-dcnode-id="598"><span data-dcnode-id="597" instrument_node="">
damage that invites MORE pests to the plant!</span><br data-dcnode-id="596"><span data-dcnode-id="595" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="590" instrument_node="">
You see some bugs on your hibiscus and you immediately start treating with as many things as you can think of to kill the bugs. You look for everything you have in your garage, and go to work: soap, neem oil, limonene, any pesticides you have around. You wait a day or two, and the bugs are still there. So you repeat all these treatments. In a few days, the bugs are still there but you start to see yellow leaves that fall off the plant, or your hibiscus starts to look a little stressed and wilty. After a couple of weeks, you might even see </span><i data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">new</span></i><span data-dcnode-id="587" instrument_node=""> bugs that weren't there before! What could have gone wrong?
</span></p><span data-dcnode-id="585" instrument_node="">
</span><blockquote data-dcnode-id="560"><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="575"><font data-dcnode-id="582" style="color:#af0033; font-size:18px; font-weight:600; "><span data-dcnode-id="583" instrument_node="">Modern Pesticides Target Very Specific Pests Only.</span></font><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">
Pesticides are becoming increasingly selective and targeted to very specific bugs. You can spray three different pesticides on your plant, but if the bug you have is not a targeted bug for any of those pesticides, the bug will continue to thrive. So stop, take a breath, and don't panic. You have time to get this right. Bugs don't kill hibiscus quickly. They look ugly, but their damage to the plant happens very slowly and gradually. </span><span data-dcnode-id="577" style="background-color: #FFFF00"><b data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Take your time to accurately identify the pest, then identify the exact pesticide you need to get rid of it.</span></b></span><span data-dcnode-id="576" instrument_node=""> We have a lot of information on our website to help you do this. Use it to get an accurate diagnosis or you will waste a lot of time and money, as well as stressing your plant, and the bugs will just laugh at you and continue crunching away on your hibiscus.
</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="562"><font data-dcnode-id="572" style="color:#af0033; font-size:18px; font-weight:600; "><span data-dcnode-id="573" instrument_node="">Multiple Pest Treatments Damage Hibiscus Plants.</span></font><br data-dcnode-id="571"><span data-dcnode-id="570" instrument_node="">
Hibiscus leaves and petals, like those of most tropical plants, are soft and full of sap. Leaves and stems are covered in a thin waxy layer, called the </span><i data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">cuticle</span></i><span data-dcnode-id="567" instrument_node=""> that is a protective covering for all the green parts of the plant. The cuticle keeps moisture and sap enclosed in the leaf, and is an extra layer that pests have to drill or chew through to get into the tasty part of the leaf. Flower petals have their own kind of waxy protective covering that is even more fragile. If you panic and use multiple pest treatments, you will damage all these waxy coverings! Then if you repeat these treatments a time or two, you can completely strip the wax off the plant and fully expose it to its environment. This opens the plant completely to pests. It is like uncovering all the food at a huge banquet and inviting the pests to come have a feast! If you use the wrong treatments on your hibiscus, you will often get new pests and more pests, plus your plants will ooze out moisture and sap with the covering, stressing them even further, and inviting more pests to drink their tasty sap. To prevent this, </span><span data-dcnode-id="564" style="background-color: #FFFF00"><b data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">take your time to accurately identify the pest, then identify the exact pest control product you need to get rid of it. Use only that one pest control product, following the exact directions for how often and how many times to use it.</span></b></span><span data-dcnode-id="563" instrument_node=""> When it comes to pest control products, more is not better!
</span></p><span data-dcnode-id="561" instrument_node="">
</span></blockquote><br clear="all" data-dcnode-id="559"><span data-dcnode-id="558" instrument_node="">
</span><h3 align="left" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Watering</span></h3><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="541"><table align="right" class="pic" data-dcnode-id="543" style="margin-left: 15px; margin-bottom: 15px"><tbody data-dcnode-id="544"><tr data-dcnode-id="545"><td align="center" data-dcnode-id="546"><span data-dcnode-id="554" instrument_node="">
</span><img class="frame" data-dcnode-id="553" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hiddenvalleyhibiscus.com/images/wateringwilt.jpg&amp;raw"><br data-dcnode-id="552"><span data-dcnode-id="551" instrument_node="">
Overwatering or drought &amp; flood watering</span><br data-dcnode-id="550"><span data-dcnode-id="549" instrument_node=""> 
causes sudden wilt disease that kills plants.</span><br data-dcnode-id="548"><span data-dcnode-id="547" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="542" instrument_node="">
You water your potted hibiscus every few days when the soil on the top feels dry to the touch, then you water it deeply and make sure you have a saucer or outer pot without holes in it to catch the water and continue to water your plant from underneath. Then you wait until the soil at the top feels dry to the touch to water again, and repeat this cycle. Or you water your potted hibiscus a little bit every day. The plastic pots are inside deep ceramic saucers or pots without holes in the bottom, so they catch and retain their water. In either scenario, suddenly one day you start to see wilted leaves. It might be a single branch that is wilted, so you cut that damaged branch off. Then a week or two later, there's a second damaged branch. Slowly, one branch at a time, your hibiscus goes downhill and dies. In the worst-case scenario, your whole plant might be crisp and healthy-looking one day, then the entire plant suddenly wilts the next day, and is dead in a week. How did this happen?
</span></p><span data-dcnode-id="540" instrument_node="">
</span><blockquote data-dcnode-id="518"><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="530"><font data-dcnode-id="537" style="color:#af0033; font-size:18px; font-weight:600; "><span data-dcnode-id="538" instrument_node="">Standing Water is Very Dangerous for Hibiscus.</span></font><br data-dcnode-id="536"><span data-dcnode-id="535" instrument_node="">
Standing water in saucers or outer pots is very dangerous for hibiscus. The water sits there and stagnates, which means microbes are starting to grow in it. The soil stays very soggy, and the sogginess starts to stress the roots. The microbes in the water are able to invade the stressed roots, and they slowly start to grow inside them. You won't see this or notice it. It is all happening down in the soil, inside the roots, where nothing is visible. When the microbes inside the roots grow to the point where they completely block up all or part of the roots, water is blocked from moving up into the plant, and despite the soggy soil, the above-ground part of the plant can't get any water. All or parts of the plant wilt, and you think the plant is thirsty, so you give it more water. This is catastrophic. The microbes completely overcome the whole root system, and the plant quickly dies. It is easy to prevent this though. </span><span data-dcnode-id="532" style="background-color: #FFFF00"><b data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Never allow your hibiscus to be in any standing water for more than an hour or two. Check your saucers or outer pots a few minutes after watering to make sure there is no standing water. If there is any, pour it out.</span></b></span><span data-dcnode-id="531" instrument_node="">
</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="520"><font data-dcnode-id="527" style="color:#af0033; font-size:18px; font-weight:600; "><span data-dcnode-id="528" instrument_node="">Drought &amp; Flood Watering Increasingly Stresses Hibiscus.</span></font><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node="">
Hibiscus do best with a small, even amount of water every day. Drying out, even briefly, stresses the plant. Frequent cycles of drying out can actually damage the roots. Then when you flood the plant with water, the soil is suddenly very soggy, and the drought-damaged roots now experience a bit of drowning damage too. When you repeat this cycle over and over, the root damage increases to the point where microbes in the environment can easily enter the roots and slowly spread through them, eventually killing the plant. </span><span data-dcnode-id="522" style="background-color: #FFFF00"><b data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Water a little bit every day or two so the soil always stays moist. For potted hibiscus, make sure any excess water trickles out the bottom of the pot and does not stand in saucers. For hibiscus in the ground, make sure the soil is moist, but not squishy or soggy. If a pool of water builds up in a well at the base of the plant, make sure it drains away in less than an hour.</span></b></span><span data-dcnode-id="521" instrument_node="">
</span></p><span data-dcnode-id="519" instrument_node="">
</span></blockquote><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">&nbsp;</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">&nbsp;</span></p><span data-dcnode-id="511" instrument_node="">
</span><br clear="all" data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">
</span><span data-dcnode-id="507" instrument_node="">

nstrument_node="">Blue &amp; Purple</span></a><br data-dcnode-id="441"><br data-dcnode-id="440"><span data-dcnode-id="439" instrument_node="">&nbsp;&nbsp; </span><a class="nav" data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hiddenvalleynaturearts.com/acatalog/white.htm"><span data-dcnode-id="438" instrument_node="">White</span></a><br data-dcnode-id="436"><br data-dcnode-id="435"><span data-dcnode-id="434" instrument_node="">&nbsp;&nbsp; </span><a class="nav" data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hiddenvalleynaturearts.com/acatalog/brown.htm"><span data-dcnode-id="433" instrument_node="">Brown</span></a><br data-dcnode-id="431"><br data-dcnode-id="430"><span data-dcnode-id="429" instrument_node="">&nbsp;&nbsp; </span><a class="nav" data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hiddenvalleynaturearts.com/acatalog/doubles.htm"><span data-dcnode-id="428" instrument_node="">Doubles</span></a><br data-dcnode-id="426"><br data-dcnode-id="425"><span data-dcnode-id="424" instrument_node="">&nbsp;&nbsp; </span><a class="nav" data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hiddenvalleynaturearts.com/acatalog/giants.htm"><span data-dcnode-id="423" instrument_node="">Giants</span></a><br data-dcnode-id="421"><br data-dcnode-id="420"><span data-dcnode-id="419" instrument_node="">&nbsp;&nbsp; </span><a class="nav" data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hiddenvalleynaturearts.com/acatalog/triedtrue.htm"><span data-dcnode-id="418" instrument_node="">Tried &amp; True</span></a><br data-dcnode-id="416"><br data-dcnode-id="415"><span data-dcnode-id="414" instrument_node="">&nbsp;&nbsp; </span><a class="nav" data-dcnode-id="411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hi
