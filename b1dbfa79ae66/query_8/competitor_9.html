de=""> </span><div class="post-top cf" data-dcnode-id="1753"><span data-dcnode-id="1775" instrument_node=""> </span><span class="cat-label cf color" data-dcnode-id="1770"><span data-dcnode-id="1774" instrument_node=""> </span><a class="category" data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pyracantha.co.uk/category/gardening-articles/"><span data-dcnode-id="1773" instrument_node="">Gardening tips, advice and ideas</span></a><span data-dcnode-id="1771" instrument_node=""> </span></span><span data-dcnode-id="1769" instrument_node=""> </span><h1 class="post-title" data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Rhododendron pruning – how and when to prune</span></h1><span data-dcnode-id="1766" instrument_node=""> </span><div class="post-meta post-meta-c the-post-meta" data-dcnode-id="1755"><span data-dcnode-id="1765" instrument_node=""> </span><span class="post-author" data-dcnode-id="1759"><span class="by" data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">By</span></span><span data-dcnode-id="1762" instrument_node=""> </span><a data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pyracantha.co.uk/author/johnmoore84/" rel="author" title="Posts by John Moore"><span data-dcnode-id="1761" instrument_node="">John Moore</span></a></span><span data-dcnode-id="1758" instrument_node=""> </span><span class="meta-sep" data-dcnode-id="1757"></span><span data-dcnode-id="1756" instrument_node=""> </span></div><span data-dcnode-id="1754" instrument_node=""> </span></div><span data-dcnode-id="1752" instrument_node=""> </span><div class="ts-row cf" data-dcnode-id="289"><span data-dcnode-id="1751" instrument_node=""> </span><div class="col-8 main-content cf" data-dcnode-id="1390"><span data-dcnode-id="1750" instrument_node=""> </span><article class="the-post" data-dcnode-id="1392"><span data-dcnode-id="1749" instrument_node=""> </span><header class="post-header cf" data-dcnode-id="1742"><span data-dcnode-id="1748" instrument_node=""> </span><div class="featured" data-dcnode-id="1744"><span data-dcnode-id="1747" instrument_node=""> </span><img alt="Rhododendrons don't need pruning but they can benefit from pruning, whether it be to control the size or encourage new growth, it does need doing correctly and at the right time of year" class="attachment-contentberg-main size-contentberg-main wp-post-image lazyloaded" data-dcnode-id="1746" height="394" id="ODgzOjc3OQ==-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons.jpg" nitro-lazy-srcset="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons.jpg 800w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons-300x153.jpg 300w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons-768x393.jpg 768w" sizes="(max-width: 770px) 100vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons.jpg&amp;raw" srcset="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons.jpg 800w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons-300x153.jpg 300w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons-768x393.jpg 768w" title="Rhododendron pruning – how and when to prune" width="770"><span data-dcnode-id="1745" instrument_node=""> </span></div><span data-dcnode-id="1743" instrument_node=""> </span></header><span data-dcnode-id="1741" instrument_node=""> </span><div class="post-content description cf entry-content content-spacious" data-dcnode-id="1558"><span data-dcnode-id="1740" instrument_node=""> </span><p class="last-updated" data-dcnode-id="1738"><span data-dcnode-id="1739" instrument_node="">Last updated on March 8th, 2022 </span></p><div class="affiliatedisclaimer" data-dcnode-id="1735"><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Our site is reader supported, this means we may earn a small commission from Amazon and other affiliates when you buy through links on our site.</span></p></div><span data-dcnode-id="1734" instrument_node=""> </span><p data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">If you have a flourishing Rhododendron you may need to consider pruning for a variety of reasons, be it maintenance, rejuvenation or shaping your plant. With a Rhododendron, pruning is very simple, no matter the reason for it, and you can create a shrub with abundant flowers, foliage, and dense branches, all of which contribute to a wonderful garden. The first thing we would point out is that Rhododendrons don’t require regular pruning and they can go years without needing to be pruned with the exception of removing any damaged or diseased branches.</span></p><span data-dcnode-id="1731" instrument_node=""> </span><h2 class="has-text-align-center" data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Deadheading Rhododendrons to remove spent flowers and diseased wood</span></h2><span data-dcnode-id="1728" instrument_node=""> </span><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">When you are ready to conduct maintenance pruning to get rid of dead wood and old flowers, a process called deadheading, you want to start by snipping at the base of any old flower. This forces the limited energy within the plant onto new growth rather than on the older flower trusses.</span></p><span data-dcnode-id="1725" instrument_node=""> </span><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">At any time that you notice dead or diseased parts to your plant, it’s time to prune them back. Start with the dead part and follow the branch to the point where you reach healthy wood. At that point, you want to make a cut.</span></p><span data-dcnode-id="1722" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="1717"><figure class="aligncenter" data-dcnode-id="1718"><img alt="If you have a flourishing rhododendron you may need to consider pruning for a variety of reasons be it maintenance, rejuvenation or shaping your plant. With a rhododendron, pruning is very simple no matter the reason for it and you can create a shrub with abundant flowers, foliage, and dense branches all of which contribute to a wonderful garden. The first thing we would point out is that Rhododendrons don't require regular pruning and can go years without needing to be pruned with the exception of removing any damaged or diseased branches." class="wp-image-28714 lazyloaded" data-dcnode-id="1721" height="334" id="OTExOjEwMTE=-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Deadheading-Rhododendrons.jpg" nitro-lazy-srcset="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Deadheading-Rhododendrons.jpg 500w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Deadheading-Rhododendrons-300x200.jpg 300w" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Deadheading-Rhododendrons.jpg&amp;raw" srcset="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Deadheading-Rhododendrons.jpg 500w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Deadheading-Rhododendrons-300x200.jpg 300w" width="500"><figcaption data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Deadheading rhododendrons to remove spent flowers and diseased wood</span></figcaption></figure></div><span data-dcnode-id="1716" instrument_node=""> </span><p data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">This type of pruning is designed to remove the spent flower clusters (which are referred to as trusses) and to get rid of any diseased or dead wood. The reason behind this is that the trusses will eventually take on the form of seeds, this seems like a great idea if you want the plant to throw bountiful seeds into the wind, however, realistically your plant only has so much energy in a given season and that precious energy can be much better spent on new plant growth and new flowers rather than converting dead flowers into seeds.</span></p><span data-dcnode-id="1713" instrument_node=""> </span><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">This type of pruning for your Rhododendron is the simplest form of pruning and literally requires you to walk up, take a cut, and be done with it. It’s also something that should really only be done once a year.</span></p><span data-dcnode-id="1710" instrument_node=""> </span><p data-dcnode-id="1707"><span data-dcnode-id="1709" instrument_node="">When you are ready to remove the old trusses from your Rhododendrons, take the sharpest set of pruning secateurs you have and make sure to you sterilise them first to prevent the spread of diseases. After that, snip at the base of the truss, approximately 1-2cm from the emerging new flower growth. Some people simply grab the stem and snap off the trust from the plant using their thumb and their forefinger, but doing so might break off the stem and accidentally take some of the newer growth with it.</span><br data-dcnode-id="1708"></p><span data-dcnode-id="1706" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="1703"><figure class="aligncenter" data-dcnode-id="1704"><img alt="If you have a flourishing rhododendron you may need to consider pruning for a variety of reasons be it maintenance, rejuvenation or shaping your plant. With a rhododendron, pruning is very simple no matter the reason for it and you can create a shrub with abundant flowers, foliage, and dense branches all of which contribute to a wonderful garden. The first thing we would point out is that Rhododendrons don't require regular pruning and can go years without needing to be pruned with the exception of removing any damaged or diseased branches." class="wp-image-28715 lazyloaded" data-dcnode-id="1705" height="334" id="OTI3Ojk5MA==-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Large-Rhododendron.jpg" nitro-lazy-srcset="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Large-Rhododendron.jpg 500w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Large-Rhododendron-300x200.jpg 300w" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Large-Rhododendron.jpg&amp;raw" srcset="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Large-Rhododendron.jpg 500w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Large-Rhododendron-300x200.jpg 300w" width="500"></figure></div><span data-dcnode-id="1702" instrument_node=""> </span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">If you have any wood on your Rhododendron that has been damaged by harsh winters, you should cut it away from the plant. Any stems that are wilting or diseased should also be cut away. When doing this you want to cut below the damaged portion, cutting ever-so-slightly into the healthier wood, right above any dormant buds.</span></p><span data-dcnode-id="1699" instrument_node=""> </span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">This type of pruning isn’t required for the health and longevity of your plant, eventually, the flower stalks will shrivel up and convert to seed unless you have a variety that doesn’t set seed. Either way, it helps with the aesthetics of the plant and most Rhododendrons can benefit from it.</span></p><span data-dcnode-id="1696" instrument_node=""> </span><hr class="wp-block-separator" data-dcnode-id="1695"><span data-dcnode-id="1694" instrument_node=""> </span><h2 class="has-text-align-center" data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Pruning for Shape</span></h2><span data-dcnode-id="1691" instrument_node=""> </span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">When you prune your Rhododendron for the shape you are literally altering the shape to control how wide or how tall your plant gets, or to encourage dense branching. Unlike a topiary, the technique used to shape a Rhododendron can be done to improve the appearance by encouraging increased branching at very specific points. </span></p><span data-dcnode-id="1688" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="1683"><figure class="aligncenter" data-dcnode-id="1684"><img alt="Rhododendrons don't need pruning but they can benefit from pruning, whether it be to control the size or encourage new growth, it does need doing correctly and at the right time of year" class="wp-image-28713 lazyloaded" data-dcnode-id="1687" height="409" id="OTUxOjczNA==-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons.jpg" nitro-lazy-srcset="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons.jpg 800w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons-300x153.jpg 300w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons-768x393.jpg 768w" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons.jpg&amp;raw" srcset="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons.jpg 800w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons-300x153.jpg 300w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Pruning-Rhododendrons-768x393.jpg 768w" width="800"><figcaption data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Rhododendron pruned to shape</span></figcaption></figure></div><span data-dcnode-id="1682" instrument_node=""> </span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Most Rhododendrons maintain their leaves for roughly three years so a single branch might have a series of whorls, and shaping should be done by following a branch from one end to the last whorl of leaves that you want, and then cut them from there. You can repeat this as necessary to rejuvenate your plant. This is a type of pruning that should be done at the end of winter when your Rhododendron is still dormant or early to mid-spring with the risk of frost has passed and just before new growth begins. If your plant is already flowering or about to flower, you can prune after flowering.</span></p><span data-dcnode-id="1679" instrument_node=""> </span><hr class="wp-block-separator" data-dcnode-id="1678"><span data-dcnode-id="1677" instrument_node=""> </span><h2 class="has-text-align-center" data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Rejuvenation pruning of Rhododendrons</span></h2><span data-dcnode-id="1674" instrument_node=""> </span><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">In more extreme cases, if your Rhododendron has become overgrown and leggy, or you have taken over a new garden that hasn’t been maintained for a while, you will need to utilise a more drastic pruning technique called rejuvenation. The good news is that Rhododendrons usually respond well to hard pruning. </span></p><span data-dcnode-id="1671" instrument_node=""> </span><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">This type of pruning removes most of the branches and forces the Rhododendron to produce newer growth on otherwise leafless stems. This newer growth starts to mature into a better framework of branches that you can shape over the years in order to cultivate a stunning specimen. This is another form of pruning that you want to do in early spring to mid-spring just before new growth starts but after the risk of hard frost has passed. Knowing how to prune Rhododendrons in this fashion will help you when you have a more mature plant.</span></p><span data-dcnode-id="1668" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="1663"><figure class="aligncenter" data-dcnode-id="1664"><img alt="Rejuvenation pruning of Rhododendrons. Prune one third of stems by one third and remove the remaining stems by one third the first year and then by another third the following year" class="wp-image-28716 lazyloaded" data-dcnode-id="1667" height="282" id="OTc1OjY1MQ==-1" nitro-lazy-empty="" nitro-lazy-src="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Rhododendron-ready-to-prune.jpg" nitro-lazy-srcset="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Rhododendron-ready-to-prune.jpg 500w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Rhododendron-ready-to-prune-300x169.jpg 300w" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Rhododendron-ready-to-prune.jpg&amp;raw" srcset="https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Rhododendron-ready-to-prune.jpg 500w, https://cdn-aliob.nitrocdn.com/IFQZGWILjZFOLiNvBNLzjyFtrUVPBEYH/assets/static/optimized/rev-1cb32ef/wp-content/uploads/2019/07/Rhododendron-ready-to-prune-300x169.jpg 300w" width="500"><figcaption data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Rhododendron in need of hard pruning</span></figcaption></figure></div><span data-dcnode-id="1662" instrument_node=""> </span><h3 class="has-text-align-left" data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Pruning Rhododendrons Back Hard</span></h3><span data-dcnode-id="1659" instrument_node=""> </span><p data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">To do this you need to be considerate of the fact that Rhododendrons typically have three or more main branches, all of which shoot out from the crown of the plant. These are referred to as primary branches and they comprise the scaffold of your shrub. Rejuvenation is the only type of pruning that cuts back each of those primary branches at different heights to create a staggered arrangement when the newer shoots reach maturity.</span></p><span data-dcnode-id="1656" instrument_node=""> </span><p data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">Of course, an alternative to this is to cut the entire Rhododendron to approximately 2-3ft off the ground. This is something that most plants survive, however, those that have been weakened by disease or have suffered from poor nutrition might not bounce back. </span></p><span data-dcnode-id="1653" instrument_node=""> </span><p data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">If you are worried about your plant surviving such hard pruning we would recommend pruning around one-third of the old stems to ground level and then reduce the remaining branches by around a third in the first year and then prune by another third the following year.</span></p><span data-dcnode-id="1650" instrument_node=""> </span><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">With rejuvenation pruning, you want to look at the main branches and keep your eyes peeled for small pink dots that pepper the surface of the wood. These dots are referred to as latent buds and they will eventually produce new branches.</span></p><span data-dcnode-id="1647" instrument_node=""> </span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">When you are ready to prune a Rhododendron, rest assured that all three of these methods are very simple. You can utilise all three when appropriate and help to encourage a healthier and more attractive Rhododendron. Don’t worry if you make a mistake because your plant will bounce back very easily.</span></p><span data-dcnode-id="1644" instrument_node=""> </span><hr class="wp-block-separator" data-dcnode-id="1643"><span data-dcnode-id="1642" instrument_node=""> </span><h2 class="has-text-align-center" data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">After Pruning Care</span></h2><span data-dcnode-id="1639" instrument_node=""> </span><p data-dcnode-id="1636"><span data-dcnode-id="1638" instrument_node="">After pruning we recommend you water well, add a good layer of mulch and feed with a multipurpose feed to reduce the risk of stress over the growing season.</span><br data-dcnode-id="1637"></p><span data-dcnode-id="1635" instrument_node=""> </span><div class="jp-relatedposts" data-dcnode-id="1560" id="jp-relatedposts" style="display: block;"><span data-dcnode-id="1634" instrument_node=""> </span><div class="jp-relatedposts-items jp-relatedposts-items-visual jp-relatedposts-grid" data-dcnode-id="1561"><div class="jp-relatedposts-post jp-relatedposts-post0 jp-relatedposts-post-thumbs" data-dcnode-id="1626" data-post-format="false" data-post-id="28752"><a class="jp-relatedposts-post-a" data-dcnode-id="1632" data-origin="28710" data-position="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pyracantha.co.uk/growing-rhododendrons-care-guide-and-growing-tips/" title="Growing Rhododendrons &amp;#8211; Care guide and growing tips"><img alt="In this easy guide, we discuss growing rhododendrons and look at everything from choosing the right position and soil to common pests and diseases as well as other problems. We also look at propagation, growing them in ecessary every now and again. These are wonderful shrub roses that are very easy to grow and very strong. You can use them as hedges very effectively, particularly if you want to encourage a lot of wildlife such…</span></p></div><div class="jp-relatedposts-post jp-relatedposts-post5 jp-relatedposts-post-thumbs" data-dcnode-id="1586" data-post-format="false" data-post-id="29652"><a class="jp-relatedposts-post-a" data-dcnode-id="1592" data-origin="28710" data-position="5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pyracantha.co.uk/how-to-prune-pieris/" title="How to Prune Pieris &amp;#8211; General and hard pruning overgrown plants"><img alt="How to prune pieris" class="jp-relatedposts-post-img" data-dcnode-id="1593" height="200" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.pyracantha.co.uk/wp-content/uploads/2019/08/How-to-prune-pieris.jpg%3Fresize%3D350%252C200%26ssl%3D1&amp;raw" width="350"></a><h4 class="jp-relatedposts-post-title" data-dcnode-id="1589"><a class="jp-relatedposts-post-a" data-dcnode-id="1590" data-origin="28710" data-position="5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pyracantha.co.uk/how-to-prune-pieris/" title="How to Prune Pieris &amp;#8211; General and hard pruning overgrown plants"><span data-dcnode-id="1591" instrument_node="">How to Prune Pieris – General and hard pruning overgrown plants</span></a></h4><p class="jp-relatedposts-post-excerpt" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Pieris shrubs prove quite simple to prune because the majority of the time, they don’t need pruning at all. A close relative of the Rhododendron family, they only need small trims here and there when something has become damaged or overgrown. If your Pieris is a bit overgrown, you can…</span></p></div><div class="jp-relatedposts-post jp-relatedposts-post6 jp-relatedposts-post-thumbs" data-dcnode-id="1
