</span><div class="custom-singular-template entry wpex-clr" data-dcnode-id="166"><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="697"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="698"><div class="vc_column-inner" data-dcnode-id="699"><div class="wpb_wrapper" data-dcnode-id="700"><h1 class="vcex-heading vcex-module wpex-text-2xl wpex-font-normal wpex-m-auto wpex-max-w-100 vcex-heading-plain wpex-block" data-dcnode-id="701" style="font-size:30px;"><span class="vcex-heading-inner wpex-inline-block wpex-clr" data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Prayer Plant Care Indoor Guide</span></span></h1></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="678"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="679"><div class="vc_column-inner" data-dcnode-id="680"><div class="wpb_wrapper" data-dcnode-id="681"><ul class="vcex-post-meta meta" data-dcnode-id="682"><li class="meta-date" data-dcnode-id="693"><span aria-hidden="true" class="meta-icon ticon ticon-clock-o" data-dcnode-id="696"></span><time data-dcnode-id="694" datetime="2020-01-15" itemprop="datePublished" pubdate=""><span data-dcnode-id="695" instrument_node="">January 15, 2020</span></time></li><li class="meta-author" data-dcnode-id="687"><span aria-hidden="true" class="meta-icon ticon ticon-user-o" data-dcnode-id="692"></span><span class="vcard author" data-dcnode-id="688" itemprop="name"><span class="fn" data-dcnode-id="689"><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indoorplantcenter.com/author/ajbell58/"><span data-dcnode-id="691" instrument_node="">Christine Mattner</span></a></span></span></li><li class="meta-post-terms wpex-clr" data-dcnode-id="683"><span aria-hidden="true" class="meta-icon ticon ticon-folder-o" data-dcnode-id="686"></span><a class="term-2" data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indoorplantcenter.com/category/indoor-plants/"><span data-dcnode-id="685" instrument_node="">Indoor Plants</span></a></li></ul></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="657"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="658"><div class="vc_column-inner" data-dcnode-id="659"><div class="wpb_wrapper" data-dcnode-id="660"><div class="vcex-post-media wpex-clr" data-dcnode-id="676"><img alt="Prayer Plant Care Indoor" data-dcnode-id="677" height="500" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indoorplantcenter.com/wp-content/uploads/2020/01/Prayer-Plant.jpg&amp;raw" width="400"></div><span data-dcnode-id="675" instrument_node="">
</span><div class="wpb_text_column wpb_content_element" data-dcnode-id="662"><span data-dcnode-id="674" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="664"><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" style="font-size: 14px"><em data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">*We may earn a commission for purchases made using our links. Please see </span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indoorplantcenter.com/disclaimer/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="671" instrument_node="">disclosure</span></a><span data-dcnode-id="669" instrument_node=""> to learn more.&nbsp;</span></em></span></p><span data-dcnode-id="665" instrument_node="">
</span></div><span data-dcnode-id="663" instrument_node="">
</span></div><span data-dcnode-id="661" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_row-fluid" data-dcnode-id="167"><div class="wpb_column vc_column_container vc_col-sm-12" data-dcnode-id="171"><div class="vc_column-inner" data-dcnode-id="172"><div class="wpb_wrapper" data-dcnode-id="173"><span data-dcnode-id="656" instrument_node="">
</span><div class="vcex-post-content vcex-clr" data-dcnode-id="174"><span data-dcnode-id="655" instrument_node="">
</span><div class="vcex-post-content-c wpex-clr jpibfi_container" data-dcnode-id="292"><input class="jpibfi" data-dcnode-id="654" type="hidden"><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">This prayer plant care indoor guide will introduce you to this intriguing&nbsp; indoor plant, and will provide some tips on how to select, grow and care for your prayer plant.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">The prayer plant gets its name from its uncanny ability to fold its leaves in response to darkness. When folded, it’s said that the leaves look like a person’s hands when praying.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Then when dawn breaks and spreads its early light, the folded leaves of the prayer plant open back up to resume their horizontal position.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Apart from the prayer – like activities of this plant, its uniquely patterned leaves which vary across the many types of prayer plants, add to the attractiveness of this easy to care for indoor plant.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">If their strikingly attractive leaves are pruned back occasionally, the plant will stay in good shape and enjoy new growth.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="638" instrument_node="">Enjoying only moderate light, a prayer plant can even grow in a north facing window. Like the Fiddle Leaf Fig Tree, it will reward you if humidity is increased thanks to the use of a </span><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3179TTa" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="637" instrument_node="">water filled pebble tray</span></a><span data-dcnode-id="635" instrument_node="">, but even drier conditions will not particularly upset this agreeable green performer.</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Prayer plants often rest in winter, and then produce a flush of new leaves in spring.&nbsp; To keep the leaves showy and in top condition, treat them to the occasional wipe with a damp cloth.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">On a warm summer’s day, give your prayer plant a special treat by taking it outside for a nice, relaxing bath. By doing so you will clean the plant and help remove any unwanted salts that have collected in the soil.</span></p><span data-dcnode-id="627" instrument_node="">
</span><h1 data-dcnode-id="624"><span data-dcnode-id="625" style="font-size: 24px;"><span data-dcnode-id="626" instrument_node="">Prayer Plant Care Indoor Tips</span></span></h1><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="620"><strong data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">LIGHT</span></strong></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">A prayer plant prefers a moderate level of indirect light or filtered light. It’s possible to have it in a north – facing or near-east facing window, preferably with a sheer curtain to help filter the sunlight. Avoid direct sunlight.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="613"><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">TEMPERATURE</span></strong></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">This plant is best suited to room temperatures of (60 -80F/ 16-27C)</span></p><div class="indoo-content" data-dcnode-id="603" id="indoo-1925137904" style="margin-left: auto; margin-right: auto; text-align: center; margin-bottom: 20px; "><ins class="adsbygoogle" data-ad-client="ca-pub-5217289608789960" data-ad-format="auto" data-ad-slot="8665350783" data-dcnode-id="608" style="display:block;"></ins><span data-dcnode-id="607" instrument_node="">
</span><span data-dcnode-id="604" instrument_node="">
</span></div><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="599"><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">WATER &amp; HUMIDITY</span></strong></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Keep soil lightly moist at all times, avoiding wet or soggy soil. It’s good practice to restrain from watering until the top half inch of the soil (1 cm) has become dry. Try raising humidity by misting plant every few days or keeping it on a pebble tray filled with water. Your plant can do well in your bathroom if it has enough light.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Being a tropical plant it likes warmth and doesn’t enjoy sudden drops in temperatures or draughts.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="589"><strong data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">SOIL</span></strong></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="587" instrument_node="">Use an </span><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3kWN3Wz" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="586" instrument_node="">all-purpose potting mix</span></a><span data-dcnode-id="584" instrument_node="">.</span></p><span data-dcnode-id="582" instrument_node="">
</span><h2 data-dcnode-id="578"><span data-dcnode-id="579" style="font-size: 16px;"><strong data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">FERTILIZING YOUR INDOOR PRAYER PLANT</span></strong></span></h2><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">In spring and summer, feed every 2 weeks with </span><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2Q4BIpa" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="575" instrument_node="">a balanced houseplant fertilizer</span></a><span data-dcnode-id="573" instrument_node="">, mixed at half the recommended dosage.</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">In fall and winter, feed monthly with the same diluted solution.</span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="565"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">SIZE</span></strong></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">A new plant will grow to 12 in/ 30cm tall and 16in / 40cm wide over the first few years.</span></p><span data-dcnode-id="561" instrument_node="">
</span><h2 data-dcnode-id="557"><span data-dcnode-id="558" style="font-size: 16px;"><strong data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">REPOTTING INDOOR PRAYER PLANTS</span></strong></span></h2><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Prayer plants like well aerated soil, which is the main reason why you should repot your plant annually in spring.</span></p><div class="indoo-content_2" data-dcnode-id="547" id="indoo-1609329837" style="margin-left: auto; margin-right: auto; text-align: center; margin-bottom: 20px; "><ins class="adsbygoogle" data-ad-client="ca-pub-5217289608789960" data-ad-format="auto" data-ad-slot="8665350783" data-dcnode-id="552" style="display:block;"></ins><span data-dcnode-id="551" instrument_node="">
</span><span data-dcnode-id="548" instrument_node="">
</span></div><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Be careful not to pack the soil tightly around the roots.</span></p><span data-dcnode-id="543" instrument_node="">
</span><h2 data-dcnode-id="539"><span data-dcnode-id="540" style="font-size: 16px;"><strong data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">PROPAGATING INDOOR PRAYER PLANTS</span></strong></span></h2><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">When the plant becomes too large, divide it in spring by cutting the roots into two large chunks. The plant may need several weeks to recover from this operation.</span></p><span data-dcnode-id="535" instrument_node="">
</span><h2 data-dcnode-id="531"><span data-dcnode-id="532" style="font-size: 16px;"><strong data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">SELECTING YOUR INDOOR PRAYER PLANT</span></strong></span></h2><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">The most popular prayer plants for indoors are often referred to by their distinguishing colors or markings.</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">‘Erythroneura’ and ‘Fascinator’ are called red prayer plants because of their bright red leaf veins.</span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">‘Kerchoveana’, or green prayer plant is sometimes called “rabbit tracks” because of the square, brownish marks between its leaf veins.</span></p><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">‘Massangeana’, also called silver prayer plant, has blackish green leaves with silvery gray midribs.</span></p><span data-dcnode-id="518" instrument_node="">
</span><h2 data-dcnode-id="515"><span data-dcnode-id="516" style="font-size: 16px;"><span data-dcnode-id="517" instrument_node="">OTHER PRAYER PLANT CARE INDOOR TIPS</span></span></h2><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Grow your prayer plant in a shallow container or combine it with other foliage plants in a tabletop garden.</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Prayer plants benefit from having close neighbors, which usually help to increase humidity.</span></p><span data-dcnode-id="508" instrument_node="">
</span><h3 data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">The three bugs that are most likely to disturb your prayer plants are the mealy bug, the spider mite and scale; (see trouble shooting tips for dealing with these pests).</span></h3><span data-dcnode-id="505" instrument_node="">
</span><h3 data-dcnode-id="502"><span data-dcnode-id="503" style="font-size: 16px;"><span data-dcnode-id="504" instrument_node="">TROUBLE SHOOTING – PRAYER PLANT CARE</span></span></h3><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Prayer plants are relatively low maintenance indoor plants, and if you follow our indoor plant care tips, you shouldn’t have too many problems. However, just in case you do have some concerns for your plant, I have prepared this trouble shooting list for you.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="492"><strong data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">PROBLEM:</span></strong><span data-dcnode-id="495" instrument_node=""> </span><em data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Faded leaves and scorched edges.</span></em></p><div class="indoo-content_3" data-dcnode-id="485" id="indoo-1320791250" style="margin-left: auto; margin-right: auto; text-align: center; margin-bottom: 20px; "><ins class="adsbygoogle" data-ad-client="ca-pub-5217289608789960" data-ad-format="auto" data-ad-slot="8665350783" data-dcnode-id="490" style="display:block;"></ins><span data-dcnode-id="489" instrument_node="">
</span><span data-dcnode-id="486" instrument_node="">
</span></div><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="480"><strong data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">CAUSE:</span></strong><span data-dcnode-id="481" instrument_node=""> Too much direct sun light.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="475"><strong data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">SOLUTION:</span></strong><span data-dcnode-id="476" instrument_node=""> Prayer plants don’t appreciate direct sunlight and grow best with filtered or indirect light.</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">&nbsp;</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="464"><strong data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">PROBLEM:</span></strong><span data-dcnode-id="468" instrument_node="">&nbsp;</span><em data-dcnode-id="465"><i data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Browning on leaf tips or edges</span></i></em></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="459"><strong data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">CAUSE:</span></strong><span data-dcnode-id="460" instrument_node=""> Air too dry, over feeding or water may be too hard.</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="454"><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">SOLUTION:</span></strong><span data-dcnode-id="455" instrument_node=""> Place on water filled pebble tray and mist occasionally and /or group with other foliage plant. Feed using a diluted fertilizer solution and try using filtered, rain or distilled water if your mains water is hard. Prayer plants react badly to chemicals in hard water.</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">&nbsp;</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="443"><strong data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">PROBLEM:</span></strong><span data-dcnode-id="447" instrument_node="">&nbsp;</span><em data-dcnode-id="444"><i data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">No new growth</span></i></em></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="438"><strong data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">CAUSE:</span></strong><span data-dcnode-id="439" instrument_node=""> Insufficient fertilizer or stunting from fertilizer burn or accumulated salts.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="433"><strong data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">SOLUTION:</span></strong><span data-dcnode-id="434" instrument_node=""> Repot the plant in a clean container with fresh soil. A month later, begin feeding it with diluted, balanced plant food.</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Expect most of the plant’s new growth to appear in late spring and summer.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">&nbsp;</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="419"><strong data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">PROBLEM:</span></strong><span data-dcnode-id="423" instrument_node="">&nbsp;</span><em data-dcnode-id="420"><i data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Prayer plant appears weak and floppy despite careful watering</span></i></em></p><div class="indoo-content_4" data-dcnode-id="412" id="indoo-839833584" style="margin-left: auto; margin-right: auto; text-align: center; margin-bottom: 20px; "><ins class="adsbygoogle" data-ad-client="ca-pub-5217289608789960" data-ad-format="auto" data-ad-slot="8665350783" data-dcnode-id="417" style="display:block;"></ins><span data-dcnode-id="416" instrument_node="">
</span><span data-dcnode-id="413" instrument_node="">
</span></div><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="407"><strong data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">CAUSE:</span></strong><span data-dcnode-id="408" instrument_node=""> Root mealy bugs (Note: plants can also start to flop if over watered)</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="402"><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">SOLUTION:</span></strong><span data-dcnode-id="403" instrument_node=""> Remove the plant from the opt and inspect the roots. If mealy bugs are present, swish the root ball in a bucket of cold water and remove any hangers –on by hand.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Repot in a clean container with fresh soil, and isolate the plant until you are sure that it has recovered.</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">&nbsp;</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="388"><strong data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">PROBLEM:</span></strong><span data-dcnode-id="392" instrument_node="">&nbsp;</span><em data-dcnode-id="389"><i data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Leaves dry and pale; faint webbing on leaf undersides</span></i></em></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="383"><strong data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">CAUSE:</span></strong><span data-dcnode-id="384" instrument_node=""> Spider mites</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="375"><strong data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">SOLUTION:</span></strong><span data-dcnode-id="379" instrument_node=""> Use </span><a data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/32080Hn" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="378" instrument_node="">pruning shears</span></a><span data-dcnode-id="376" instrument_node=""> to cut off badly affected leaves and isolate the plant. Clean thoroughly with warm water and begin misting daily.</span></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Spray with insecticidal soap if problem persists.</span></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">&nbsp;</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="361"><strong data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">PROBLEM:</span></strong><span data-dcnode-id="365" instrument_node="">&nbsp;</span><em data-dcnode-id="362"><i data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Small brown discs on leaves and stems</span></i></em></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="356"><strong data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">CAUSE:</span></strong><span data-dcnode-id="357" instrument_node=""> Scale</span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="351"><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">SOLUTION:</span></strong><span data-dcnode-id="352" instrument_node=""> Isolate the plant and treat for scale.</span></p><span data-dcnode-id="350" instrument_node="">
</span><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">&nbsp;</span></p><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">I hope this prayer plant care indoor guide has encouraged you to consider this amazing plant and provide you with some useful tips on how to care for a prayer plant.</span></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">&nbsp;</span></p><span data-dcnode-id="341" instrument_node="">
