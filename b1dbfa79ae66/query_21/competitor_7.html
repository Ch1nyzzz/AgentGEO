</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Naturally, you want your soft fruit vines and bushes to be as productive as possible. Proper pruning is an important aspect of supporting and encouraging optimum fruit production. In this article, we present the best practices in pruning your soft fruit producers for the greatest yield. Read on to learn more.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><div class="no_bullets contracted" data-dcnode-id="1554" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1578"><span data-dcnode-id="1585" instrument_node="">What You'll Learn Today</span><span data-dcnode-id="1584" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1579"><span data-dcnode-id="1583" instrument_node="">[</span><a data-dcnode-id="1581" href="#"><span data-dcnode-id="1582" instrument_node="">show</span></a><span data-dcnode-id="1580" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1555" style="display: none;"><li data-dcnode-id="1556"><a data-dcnode-id="1576" href="#How_To_Prune_Soft_Fruit"><span data-dcnode-id="1577" instrument_node="">How To Prune Soft Fruit</span></a><ul data-dcnode-id="1557"><li data-dcnode-id="1573"><a data-dcnode-id="1574" href="#1_How_to_prune_Blackberries_Loganberries_and_Tayberries"><span data-dcnode-id="1575" instrument_node="">1. How to prune Blackberries, Loganberries and Tayberries</span></a></li><li data-dcnode-id="1570"><a data-dcnode-id="1571" href="#2_How_to_prune_Raspberries"><span data-dcnode-id="1572" instrument_node="">2. How to prune Raspberries</span></a></li><li data-dcnode-id="1567"><a data-dcnode-id="1568" href="#3_How_to_prune_Black_Currants"><span data-dcnode-id="1569" instrument_node="">3. How to prune Black Currants</span></a></li><li data-dcnode-id="1564"><a data-dcnode-id="1565" href="#4_How_to_prune_Gooseberries"><span data-dcnode-id="1566" instrument_node="">4. How to prune Gooseberries</span></a></li><li data-dcnode-id="1561"><a data-dcnode-id="1562" href="#5_How_to_prune_Grape_Vines"><span data-dcnode-id="1563" instrument_node="">5. How to prune Grape Vines</span></a></li><li data-dcnode-id="1558"><a data-dcnode-id="1559" href="#6_How_to_prune_Strawberries"><span data-dcnode-id="1560" instrument_node="">6. How to prune Strawberries</span></a></li></ul></li></ul></div><span data-dcnode-id="1553" instrument_node="">
</span><h2 data-dcnode-id="1550"><span data-dcnode-id="1551" id="How_To_Prune_Soft_Fruit"><span data-dcnode-id="1552" instrument_node="">How To Prune Soft Fruit</span></span></h2><span data-dcnode-id="1549" instrument_node="">
</span><h3 data-dcnode-id="1546"><span data-dcnode-id="1547" id="1_How_to_prune_Blackberries_Loganberries_and_Tayberries"><span data-dcnode-id="1548" instrument_node="">1. How to prune Blackberries, Loganberries and Tayberries</span></span></h3><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">For all three of these types of soft fruit bushes, new canes are produced in one season and then fruit is produced on this old growth the following season. Pruning consists mainly of removing exhausted canes after fruiting is complete. This can be a confusing prospect because on a single bush you will see old growth with fruit and new growth without fruit.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">For good pruning, trim back the canes with fruit at ground level. Move the new growth to the support wires you have emptied. If the new canes are lacking in number, take care to keep some of the better examples amongst the older canes. Check them for side-shoots and clip these back leaving only a single leaf.</span></p><span data-dcnode-id="1539" instrument_node="">
</span><h3 data-dcnode-id="1536"><span data-dcnode-id="1537" id="2_How_to_prune_Raspberries"><span data-dcnode-id="1538" instrument_node="">2. How to prune Raspberries</span></span></h3><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Raspberries that fruit in the summertime are very similar to blackberries. They fruit on old canes which should be removed after harvest. This leaves room for young, new canes to thrive.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">If you have autumn-fruiting raspberries, you should simply cut them back all the way to the ground late in the winter. This will clear the way for new canes to emerge in the spring. These will fruit during the first year.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><h3 data-dcnode-id="1526"><span data-dcnode-id="1527" id="3_How_to_prune_Black_Currants"><span data-dcnode-id="1528" instrument_node="">3. How to prune Black Currants</span></span></h3><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">If you want your black currant bushes to do well, you must be very diligent about pruning. Even though older branches left in place will fruit, the quality and the quantity of the fruit diminishes with the passage of time.</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">New bushes must be deeply planted to encourage the root ball to produce lots of vigorous new branches underground. The new branches will emerge to replace older, spent branches, which should be removed after you harvest the currants.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Every year you should prune back approximately a third of the older stems. Look for bark that is very dark brown or even black. These should be removed because this coloration means that they are quite weak. Cut them all the way back to the ground, being careful not to accidentally remove vibrant, new shoots.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">It is fine to prune these old stems back when you harvest the currants, or you can wait until the growing season is completely over and do your pruning in the winter months. This practice eliminates the worry of accidentally damaging new shoots in the process.</span></p><span data-dcnode-id="1513" instrument_node="">
</span><h3 data-dcnode-id="1510"><span data-dcnode-id="1511" id="4_How_to_prune_Gooseberries"><span data-dcnode-id="1512" instrument_node="">4. How to prune Gooseberries</span></span></h3><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">If you don’t prune your gooseberry bushes, they will become a tangled mess. For proper management, you must keep the center of each bush open to the sunlight and air. Just leave a handful of main branches, spaced at regular intervals around the perimeter of the bush.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">In wintertime, perform a thorough pruning to remove diseased or dead stems. Any stems growing across the center of the bush should also be trimmed back leaving only a young shoot. Prune off any drooping stems and thin out any overcrowded areas of your bushes. Leave only selected, upright side-shoots. New growth should be trimmed back by half to control size.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><h3 data-dcnode-id="1500"><span data-dcnode-id="1501" id="5_How_to_prune_Grape_Vines"><span data-dcnode-id="1502" instrument_node="">5. How to prune Grape Vines</span></span></h3><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Grapevines love to climb, and if you allow them to run rampant, they will put all their energy into climbing. Pruning and training are very important in redirecting your grapevines to focus on fruiting. To do this, you should select a few hardy, permanent stems and allow fruiting side-shoots to arise from these during the growing season each year.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">In the middle of the winter, cut back some of the side-shoots to leave only one or two buds. Trim back established main stems to just one, individual new bud. If there are newer stems you wish to develop, allow them a couple of buds.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">In summertime shorten lateral stems that are not in flower. Leave no more than five side-shoots growing from each of these back to only a single leaf. Lateral stems that are in bloom should be trimmed back to a pair of leaves just past the initial truss. Remove all superlative trusses.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><h3 data-dcnode-id="1487"><span data-dcnode-id="1488" id="6_How_to_prune_Strawberries"><span data-dcnode-id="1489" instrument_node="">6. How to prune Strawberries</span></span></h3><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">You don’t absolutely have to prune strawberries annually; however, they do produce lots of runners. If these are allowed to run amok, they will drain the plant’s energy without increasing its yield.</span></p><span data-dcnode-id="1483" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Of course, if you want to propagate strawberry plants, runners should be encouraged, but if you want to improve the productivity of your existing plants, you should prune them away.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1479" instrument_node="">Proper management of your soft fruiting vines and bushes is the best way to keep a close eye on the condition of your plants. </span><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardendad.co.uk/tools-for-pruning/"><span data-dcnode-id="1478" instrument_node="">Good pruning tools</span></a><span data-dcnode-id="1476" instrument_node=""> help prevent disease and encourage abundant fruit. Follow the tips presented here to improve fruiting and maintain healthy plants.</span></p><span data-dcnode-id="1474" instrument_node="">
