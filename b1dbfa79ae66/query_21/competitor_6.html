</span><article aria-label="article" class="module single-post-module publication post-143 factsheet type-factsheet status-publish has-post-thumbnail hentry category-landscape category-trees tag-pruning tag-tree-maintenance" data-dcnode-id="881" id="post-143"><span data-dcnode-id="1284" instrument_node="">
</span><div class="post-header" data-dcnode-id="1254"><span data-dcnode-id="1283" instrument_node="">
</span><div class="show-for-print" data-dcnode-id="1279" id="factsheet-logo"><span data-dcnode-id="1282" instrument_node="">
</span><img alt="Clemson Cooperative Extension Home &amp; Garden Information Center" data-dcnode-id="1281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/2018/04/horizontal-full-color-1300.png&amp;raw"><span data-dcnode-id="1280" instrument_node="">
</span></div><span data-dcnode-id="1278" instrument_node="">
</span><p class="show-for-print hgic-url" data-dcnode-id="1275"><a data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hgic.clemson.edu/"><span data-dcnode-id="1277" instrument_node="">https://hgic.clemson.edu/</span></a></p><span data-dcnode-id="1274" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Principles &amp; Practices for Pruning Trees</span></h1><span data-dcnode-id="1271" instrument_node="">
</span><div class="post-meta vcard" data-dcnode-id="1256"><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1269" instrument_node="">Factsheet | HGIC 1003 | </span><span class="update-type" data-dcnode-id="1266"><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Revised:</span></strong></span><span data-dcnode-id="1265" instrument_node=""> </span><span class="updated" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Oct 3, 2019</span></span><span class="print-button" data-dcnode-id="1259"><span data-dcnode-id="1262" instrument_node=""> | </span><a class="print-icon" data-dcnode-id="1260" href="javascript:window.print()"><span data-dcnode-id="1261" instrument_node="">  Print</span></a></span></p><span data-dcnode-id="1257" instrument_node="">
</span></div><span data-dcnode-id="1255" instrument_node="">
</span></div><span data-dcnode-id="1253" instrument_node="">
</span><div class="post-wrap" data-dcnode-id="989"><span data-dcnode-id="1252" instrument_node="">
</span><div class="post-content entry-content" data-dcnode-id="997"><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Proper pruning can offer trees several benefits. It can increase flowering, fruit production, promote healthy new growth, increase sun light and air circulation, and maintain a desired shape and/or size. Understanding that each plant in the landscape has its own growth habit and pruning requirements is important. It is necessary to prune trees that are over-grown, crowd other plants, or limits the view from windows. Plants damaged by insects, diseases, or freezing injury generally benefit from corrective pruning. On the other hand, improper and/or pruning at the wrong time of year may result in poor plant development and reduction in flowering, and may increase susceptibility to insects, diseases, or winter damage. It is important to learn and understand the three T’s of proper pruning: tools, timing, and technique.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><h2 data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Pruning Tools</span></h2><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1244" instrument_node="">Pruning tools are available in a wide range of brand names, styles</span><strong data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">,</span></strong><span data-dcnode-id="1241" instrument_node=""> and prices. When purchasing tools, shop for quality and durability over price. Look for tool manufacturers that provide replacement parts and offer warranties against faulty materials and workmanship.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Hand-held pruning tools can accomplish most pruning tasks. These include hand pruners, lopping shears, pruning saws, pole pruners or hedge shears. Hand pruners are recommended for cutting small twigs and branches up to one-half inch in diameter. There are two basic types of hand pruners: Scissor-action also called bypass pruners have a sharpened blade that cuts by gliding against a thicker sharp blade. Anvil-action pruners have a sharp blade that cuts against a broad, flattened, grooved blade. Scissor-action pruners usually cost more than anvil-action type, but they make closer, smoother cuts. Anvil-action pruners can make larger cuts easier than scissor-action pruners.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1229" id="attachment_11469" style="width: 341px"><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/by-pass-pruners-on-the-left-and-anvil-pruners-o.jpeg"><img alt="By-pass pruners, on the left, and anvil pruners, on the right, are recommended for cutting small twigs and branches up to one-half inch in diameter. " aria-describedby="caption-attachment-11469" class="wp-image-11469 size-medium" data-dcnode-id="1235" height="220" loading="lazy" sizes="(max-width: 331px) 100vw, 331px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/by-pass-pruners-on-the-left-and-anvil-pruners-o-331x220.jpeg&amp;raw" srcset="https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/by-pass-pruners-on-the-left-and-anvil-pruners-o-331x220.jpeg 331w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/by-pass-pruners-on-the-left-and-anvil-pruners-o-768x510.jpeg 768w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/by-pass-pruners-on-the-left-and-anvil-pruners-o-828x550.jpeg 828w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/by-pass-pruners-on-the-left-and-anvil-pruners-o-610x405.jpeg 610w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/by-pass-pruners-on-the-left-and-anvil-pruners-o-1080x717.jpeg 1080w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/by-pass-pruners-on-the-left-and-anvil-pruners-o.jpeg 1273w" width="331"></a><p class="wp-caption-text" data-dcnode-id="1230" id="caption-attachment-11469"><span data-dcnode-id="1233" instrument_node="">By-pass pruners, on the left, and anvil pruners, on the right, are recommended for cutting small twigs and branches up to one-half inch in diameter.</span><br data-dcnode-id="1232"><span data-dcnode-id="1231" instrument_node="">Mark Arena, ©2019, Clemson Extension</span></p></div><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">For larger branches, one-half to 1½ inches in diameter, lopping shears are best. Lopping shears sometimes called loppers, are like scissor-action hand pruners except they have larger blades and long handles for increasing leverage to cut through larger branches. When using loppers, cut in one smooth stroke to avoid injuring the branch.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="1218" id="attachment_11470" style="width: 341px"><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-lopping-shear-used-on-branches-one-half-to.jpeg"><img alt="Typical lopping shear used on branches one-half to 1½ inches in diameter. " aria-describedby="caption-attachment-11470" class="wp-image-11470 size-medium" data-dcnode-id="1224" height="219" loading="lazy" sizes="(max-width: 331px) 100vw, 331px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-lopping-shear-used-on-branches-one-half-to-331x219.jpeg&amp;raw" srcset="https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-lopping-shear-used-on-branches-one-half-to-331x219.jpeg 331w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-lopping-shear-used-on-branches-one-half-to-768x509.jpeg 768w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-lopping-shear-used-on-branches-one-half-to-610x404.jpeg 610w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-lopping-shear-used-on-branches-one-half-to.jpeg 821w" width="331"></a><p class="wp-caption-text" data-dcnode-id="1219" id="caption-attachment-11470"><span data-dcnode-id="1222" instrument_node="">Typical lopping shear used on branches one-half to 1½ inches in diameter.</span><br data-dcnode-id="1221"><span data-dcnode-id="1220" instrument_node="">Mark Arena, ©2019, Clemson Extension</span></p></div><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">For branches larger than 1½ inches in diameter use a pruning saw. Pruning saws have a narrow blade for easy maneuvering and coarser points or teeth than a common carpentry saw. Most pruning saws also have a curved blade that cuts on the draw stroke, pulling the blade toward you.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">For branches that are out of reach, consider using a pole saw. A pole saw typically has both a cutting blade and a saw blade. The cutting blade operates in similar fashion to the by-pass pruners using an extension mechanism. The operator is standing on the ground and pulls on a long rope or lanyard in a downward motion. This causes the blade to go across the branch and cut it off. The pole is typically constructed from either fiberglass or plastic. Some poles fit together in three 6-foot sections, while newer models have a telescoping type of extension. Because of the risk of electrocution, avoid using aluminum-handled pole pruners near power lines.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Use hedge shears for a neatly trimmed appearance. Hedge shears can be operated manually but are also available as battery, gasoline or electrically powered. Do not attempt to cut large branches with hedge shears.</span></p><span data-dcnode-id="1208" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1201" id="attachment_11471" style="width: 341px"><a data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-manually-operated-hedge-shears-for-pruning.jpeg"><img alt="Typical manually operated hedge shears for pruning shrubs. " aria-describedby="caption-attachment-11471" class="wp-image-11471 size-medium" data-dcnode-id="1207" height="220" loading="lazy" sizes="(max-width: 331px) 100vw, 331px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-manually-operated-hedge-shears-for-pruning-331x220.jpeg&amp;raw" srcset="https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-manually-operated-hedge-shears-for-pruning-331x220.jpeg 331w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-manually-operated-hedge-shears-for-pruning-768x510.jpeg 768w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-manually-operated-hedge-shears-for-pruning-828x550.jpeg 828w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-manually-operated-hedge-shears-for-pruning-610x405.jpeg 610w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-manually-operated-hedge-shears-for-pruning.jpeg 945w" width="331"></a><p class="wp-caption-text" data-dcnode-id="1202" id="caption-attachment-11471"><span data-dcnode-id="1205" instrument_node="">Typical manually operated hedge shears for pruning shrubs.</span><br data-dcnode-id="1204"><span data-dcnode-id="1203" instrument_node="">Mark Arena, ©2019, Clemson Extension</span></p></div><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">To keep all pruning tools in good shape, sharpen and oil their blades at the end of each season. When sharpening loppers, hedge shears and scissor-action hand shears, sharpen only the outside surfaces of the blades so the inside surfaces remain flat and slide smoothly against one another. It is best to have pruning saws sharpened by a professional. Apply oil to the blades by wiping them with a cloth saturated in household oil, and treat wooden handles with linseed oil.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><h2 data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Pruning Time</span></h2><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Flowering ornamentals form their flower buds at different times of year, therefore, pruning times must be adjusted accordingly. Many spring-flowering trees such as dogwood and redbud set flower buds in the fall, so pruning during the fall and winter months eliminates or decreases their spring flower capabilities. Plants, such as crape myrtle, that typically flower during the summer form flower buds on new growth and can be pruned during the winter with no effect on their flowering.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1190" instrument_node="">As a rule, plants that flower before June 1 should be pruned after they bloom while those that flower after June 1 are considered summer-flowering and can be pruned just prior to spring growth. For additional information on suggested pruning times for selected flowering trees and shrubs, refer to the fact sheet, </span><a data-dcnode-id="1186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hgic.clemson.edu/factsheet/pruning-shrubs/"><span data-dcnode-id="1189" instrument_node="">HGIC 1053, </span><em data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Pruning Shrubs</span></em></a><span data-dcnode-id="1185" instrument_node="">.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Ornamental plants that are not grown for their showy flowers should be pruned during the late winter or early spring. Pruning may occur during the summer, however, avoid pruning 10 weeks or sooner to your areas first hard frost date. Pruning late in the season produces tender new growth that may not be sufficiently hardened and venerable to frost damage</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1179" instrument_node="">Certain shade and flowering trees tend to bleed or excrete large amounts of sap from pruning wounds. Among these trees are maple, birch, dogwood, beech, elm, willow, flowering plum</span><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">,</span></strong><span data-dcnode-id="1176" instrument_node=""> and flowering cherry. Sap excretion from the tree is not harmful, but it is unsightly and may attract stinging insects. To minimize bleeding, prune these trees after the leaves have matured. Leaves use plant sap when they expand, and the tree excretes less sap from the wound.</span></p><span data-dcnode-id="1174" instrument_node="">
</span><h2 data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Pruning Technique</span></h2><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">It is important to understand why one pruning technique is preferred over another and why cuts are made the way they are for a particular plant species. The terminal bud (the bud at the end of a branch or twig) produces a hormone called auxin that directs the growth of lateral buds (buds oriented along the side of the branch or twig). As long as the terminal bud is intact, auxin suppresses the growth of lateral buds and shoots below the terminal. However, when the terminal bud is removed, by pruning, lateral buds and shoots below the pruning cut receive the auxin, which result in vigorous growth. Most of the new growth always occurs within 6 to 8 inches of the pruning cut.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><h2 data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Prune Plants Either by Heading Back or by Thinning</span></h2><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Heading back also referred to as “stubbing trees” is rarely warranted in the landscape and often results in undesirable multiple leaders or trunks. When pruning beneath power lines or clearing a tree from interfering with a structure, always prune back to a fork where there is a live branch at least half the diameter of the limb being removed. This technique is called “drop-crotching.” After several months, prune out all sprouts growing in response to the cut. Never “hat-rack” a landscape tree by cutting all of its branches back to an arbitrary length. This type of pruning has no place in horticulture and often kills the tree.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1157" id="attachment_11472" style="width: 299px"><a data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-cuts-for-heading-back-and-thinning-out.gif"><img alt="Typical cuts for heading back and thinning out" aria-describedby="caption-attachment-11472" class="wp-image-11472 size-full" data-dcnode-id="1161" height="324" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/typical-cuts-for-heading-back-and-thinning-out.gif&amp;raw" width="289"></a><p class="wp-caption-text" data-dcnode-id="1158" id="caption-attachment-11472"><span data-dcnode-id="1159" instrument_node="">Figure 1: Typical cuts for heading back and thinning out.</span></p></div><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Thinning by cutting selected branches back to a lateral branch or the main trunk is usually preferred over heading. First, remove branches that are rubbing, crossing over each other, dead, diseased, or dying. Removing upright branches creates a more spreading crown while removing horizontal branches results in an upright form. If further thinning is desired, remove branches back to major limbs to create an open crown. This is a specialized technique that is best performed by a professional arborist. Space remaining branches along the major limbs so that each one has room to develop. Trees with properly thinned crowns resist wind damage better than unpruned trees.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><h2 data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">Making the Cut</span></h2><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">When a branch is cut back to the main trunk, to a lateral branch or to a lateral bud, a higher concentration of hormones in these areas causes the wound to heal rapidly. When a stub is left, the distance from the hormonal source increases and the wound heals slower, if it heals at all. Insects and diseases may enter the cut portion of a stub and cause it to die back. Therefore, whether pruning a small twig or a large branch, avoid leaving a stub by always cutting back to a bud, a lateral branch or the main trunk. When pruning back to a bud, make the cut at a slight angle just above the bud. This allows moisture to flow readily off the wound. However, avoid making the cut at a sharp angle as this produces a larger wound.</span></p><span data-dcnode-id="1147" instrument_node="">
</span><h2 data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Selective Pruning of Branches</span></h2><span data-dcnode-id="1144" instrument_node="">
</span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Become familiar with the shape and form of the tree before removing any live branches. In many landscapes, it would be inappropriate to change the tree’s growth habits. Instead, prune to enhance and encourage the natural shape of the tree. This consists of removing dead, diseased, or broken twigs and branches. The next step is to study the tree’s form and select the best spaced and positioned permanent branches and remove or shorten the less desirable ones. To shorten, use thinning cuts. Permanent branches should be spaced 6 to 24 inches apart on the trunk, depending on the final mature size of the tree. On smaller trees, such as dogwoods, a 6-inch spacing is adequate, whereas spaces of 18 to 24 inches are best for large maturing trees like oaks. Remove fast-growing suckers that sprout at the base of and along tree trunks or on large interior limbs.</span></p><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">To prune a young tree to a single leader, the stem that will become the main trunk, locate the straightest and strongest leader to retain. In shaping the tree crown, remove lateral branches that are growing upright. If left these lateral branches will compete with the leader and form a weak, multi-leader tree. Most trees can grow with a single leader when they are young, however, the growth habit of some species will change to a multiple leader spreading form at maturity. Branches that are less than two-thirds the diameter of the trunk are less likely to split than larger branches.</span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">When training a young tree, prune back branches below the lowest permanent branch 8 to 12 inches from the trunk as these are temporary branches. Remove any lower branches that are larger than a quarter-inch in diameter. By keeping the smaller diameter branches on the trunk until they reach 2 inches in diameter (measured 6 inches up from the ground) the tree will grow faster and develop a thicker trunk. This will protect the tree from sunburn, vandalism, and/or accidental damage. Removing the lower branches too soon will result in a poorer quality plant.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Once the trunk and main branches of the tree are established, some annual maintenance pruning will be required. Each tree is different in its growth habit, vigor, and pruning requirements. Some general considerations that may help direct proper pruning decisions are:</span></p><span data-dcnode-id="1132" instrument_node="">
</span><ul data-dcnode-id="1109"><span data-dcnode-id="1131" instrument_node="">
</span><li data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Remove branches that have narrow crotch angles. A major limb growing at a narrow angle to the main trunk (less than a 45 degree angle) is likely to develop a weak crotch and may split during heavy winds and ice loads.</span></li><span data-dcnode-id="1128" instrument_node="">
</span><li data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Remove branches that grow inward or threaten to rub against nearby branches.</span></li><span data-dcnode-id="1125" instrument_node="">
</span><li data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Remove branches that grow downward from the main limbs, which may interfere with mowing and other maintenance practices.</span></li><span data-dcnode-id="1122" instrument_node="">
</span><li data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Remove branches with insect, disease, ice, or wind damage. Damaged branches will require pruning at the appropriate location. Prune branches of pear or loquat damaged by fire blight disease several inches below the infection. To prevent spreading the disease, sterilize pruning tools between cuts by dipping the blades in isopropyl rubbing alcohol or a solution prepared from one part household bleach to nine parts water. Once all the pruning is completed be sure to lightly oil the pruners to prevent them rusting from the alcohol or bleach solution.</span></li><span data-dcnode-id="1119" instrument_node="">
</span><li data-dcnode-id="1114"><span data-dcnode-id="1118" instrument_node="">Remove vigorous shoots, suckers, upright succulent shoots along the main branches from ornamental pear, cherry, crabapple, plum</span><strong data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">,</span></strong><span data-dcnode-id="1115" instrument_node=""> and other trees. These shoots starve the tree of valuable nutrients and detract from the tree’s overall appearance. Remove them while they are young.</span></li><span data-dcnode-id="1113" instrument_node="">
</span><li data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Remove upright shoots, which compete with the main trunk for dominance. Remove these shoots if maintaining a conical or pyramidal growth habit is desired.</span></li><span data-dcnode-id="1110" instrument_node="">
</span></ul><span data-dcnode-id="1108" instrument_node="">
</span><h2 data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Removing Large Tree Branches</span></h2><span data-dcnode-id="1105" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="1100" id="attachment_11473" style="width: 333px"><a data-dcnode-id="1103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/cuts-used-to-remove-large-branches.gif"><img alt="Cuts used to remove large branches" aria-describedby="caption-attachment-11473" class="wp-image-11473 size-full" data-dcnode-id="1104" height="215" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/cuts-used-to-remove-large-branches.gif&amp;raw" width="323"></a><p class="wp-caption-text" data-dcnode-id="1101" id="caption-attachment-11473"><span data-dcnode-id="1102" instrument_node="">Figure 2: A textbook illustration demonstrating the three-cut method for removing large branches.</span></p></div><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Branches larger than 1½ inches in diameter require three separate cuts to prevent trunk bark stripping (Figure 2). Make the first cut on the underside of the branch approximately 15 inches away from the trunk. Cut until the branch starts to move in a downward direction and before the saw is bound in the branch. Make the second cut in a downward direction from the top of the branch approximately 17 inches from the main trunk. This will cause the limb to split cleanly between the two cuts without tearing the bark.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1095"></p><div class="gdc_row" data-dcnode-id="1070"><div class="gdc_column gdc_chalf" data-dcnode-id="1082"><div class="gdc_inner" data-dcnode-id="1083"><p data-dcnode-id="1094"></p><span data-dcnode-id="1093" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1086" id="attachment_11474" style="width: 341px"><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/making-the-final-cut-using-the-three-cut-method-wi.jpeg"><img alt="Making the final cut using the three-cut method with a handsaw." aria-describedby="caption-attachment-11474" class="size-medium wp-image-11474" data-dcnode-id="1092" height="248" loading="lazy" sizes="(max-width: 331px) 100vw, 331px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/making-the-final-cut-using-the-three-cut-method-wi-331x248.jpeg&amp;raw" srcset="https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/making-the-final-cut-using-the-three-cut-method-wi-331x248.jpeg 331w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/making-the-final-cut-using-the-three-cut-method-wi-610x458.jpeg 610w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/making-the-final-cut-using-the-three-cut-method-wi.jpeg 685w" width="331"></a><p class="wp-caption-text" data-dcnode-id="1087" id="caption-attachment-11474"><span data-dcnode-id="1090" instrument_node="">Making the final cut using the three-cut method with a handsaw.</span><br data-dcnode-id="1089"><span data-dcnode-id="1088" instrument_node="">S. Cory Tanner,©2019, Clemson Extension</span></p></div><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1084"></p></div></div><div class="gdc_column gdc_chalf" data-dcnode-id="1071"><div class="gdc_inner" data-dcnode-id="1072"><p data-dcnode-id="1081"></p><span data-dcnode-id="1080" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1075" id="attachment_11475" style="width: 322px"><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/referencing-figure-2-the-first-cut-on-the-undersi.jpeg"><img alt="Referencing figure 2, the first cut on the underside of the branch was not made. When the top cut of the limb neared going all the way through, the limb began to fall and pulled off the still attached bark going down the trunk." aria-describedby="caption-attachment-11475" class="size-medium wp-image-11475" data-dcnode-id="1079" height="331" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/referencing-figure-2-the-first-cut-on-the-undersi-312x331.jpeg&amp;raw" width="312"></a><p class="wp-caption-text" data-dcnode-id="1076" id="caption-attachment-11475"><span data-dcnode-id="1077" instrument_node="">Referencing figure 2, the first cut on the underside of the branch was not made. When the top cut of the limb neared going all the way through, the limb began to fall and pulled off the still attached bark going down the trunk. Joey Williamson ©2016, Clemson Extension</span></p></div><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1073"></p></div></div></div><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">
In the above photo the three-cut method was not followed, which resulted in damaging the tree. In this example, the branch was cut all the way through from the top. As the branch gave way under its own weight, the bark on the lower side of the branch tore away from the trunk wounding the tree.</span><p data-dcnode-id="1067"></p><span data-dcnode-id="1066" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="1059" id="attachment_11476" style="width: 341px"><a data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/word-image.jpeg"><img alt="" aria-describedby="caption-attachment-11476" class="wp-image-11476 size-medium" data-dcnode-id="1065" height="248" loading="lazy" sizes="(max-width: 331px) 100vw, 331px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/word-image-331x248.jpeg&amp;raw" srcset="https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/word-image-331x248.jpeg 331w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/word-image-768x576.jpeg 768w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/word-image-610x458.jpeg 610w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/word-image.jpeg 822w" width="331"></a><p class="wp-caption-text" data-dcnode-id="1060" id="caption-attachment-11476"><span data-dcnode-id="1063" instrument_node="">This is the final result of a properly cut branch using the three-cut method.</span><br data-dcnode-id="1062"><span data-dcnode-id="1061" instrument_node="">S. Cory Tanner, ©2019, Clemson Extension</span></p></div><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">In order to properly cut the limb, support the remaining stub with one hand while cutting it away from the tree. This final cut should begin on the outside of the branch bark ridge and end just outside of the branch collar swelling on the lower side of the branch. The branch bark ridge is usually rough, always darker than the surrounding bark, and obvious on most tree species. The collar is a swollen area at the base of a branch. This region between the branch and the trunk acts as a natural barrier to decay-causing organisms. The cut should be on a slight angle and in a down and outward direction from the tree as demonstrated in Figure 2.</span></p><span data-dcnode-id="1055" instrument_node="">
</span><p data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">A cut made straight down and close to the trunk is known as a “flush cut” and should be avoided. Flush cuts create a larger open wound that can develop decay of the branch attachment and over time lead to internal decay of the trunk.</span></p><span data-dcnode-id="1052" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="1045" id="attachment_11477" style="width: 258px"><a data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/flush-cuts-create-a-large-open-wound-that-can-lead.jpeg"><img alt="Flush cuts create a large open wound that can lead to decay and should be avoided. " aria-describedby="caption-attachment-11477" class="wp-image-11477 size-medium" data-dcnode-id="1051" height="331" loading="lazy" sizes="(max-width: 248px) 100vw, 248px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/flush-cuts-create-a-large-open-wound-that-can-lead-248x331.jpeg&amp;raw" srcset="https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/flush-cuts-create-a-large-open-wound-that-can-lead-248x331.jpeg 248w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/flush-cuts-create-a-large-open-wound-that-can-lead-768x1024.jpeg 768w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/flush-cuts-create-a-large-open-wound-that-can-lead-621x828.jpeg 621w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/flush-cuts-create-a-large-open-wound-that-can-lead-610x813.jpeg 610w, https://171dxwjpaqv2danpq11ixf2j-wpengine.netdna-ssl.com/wp-content/uploads/1999/01/flush-cuts-create-a-large-open-wound-that-can-lead.jpeg 784w" width="248"></a><p class="wp-caption-text" data-dcnode-id="1046" id="caption-attachment-11477"><span data-dcnode-id="1049" instrument_node="">Flush cuts create a large open wound that can lead to decay and should be avoided.</span><br data-dcnode-id="1048"><span data-dcnode-id="1047" instrument_node="">Mark Arena, ©2019, Clemson Extension</span></p></div><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Research has shown that wound dressings and other pruning agents do not prevent decay. When exposed to the sun, the protective coating often cracks, allowing moisture to enter and accumulate in pockets between the wood and the wound covering. This situation may be more inviting to wood rotting organisms than one with no wound cover. The use of wound paints and tars are not recommended as the tree has its own healing properties.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><h2 data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Broadleaf Evergreen Trees</span></h2><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Broadleaf evergreens, such as magnolias and hollies, usually require little to no pruning. In fact, most broadleaf evergreens develop a naturally symmetric growth habit when left alone. Pruning during the early life of the tree in order to balance the growth or to eliminate multiple trunks and/or multiple leader branches may be a consideration. Otherwise, routine annual pruning is not recommended.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><h2 data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Pruning Conifers (Needle-Type Evergreens)</span></h2><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Most upright-growing plants in this group, such as spruce, pine, cedar, and fir, have branches spaced evenly around the main trunk. They develop a symmetrical growth habit and become quite large at maturity. If planted in open areas and given plenty of room to grow, they require minimal pruning.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Removing approximately one-half of the new shoots while new growth is in the “candle stage” (small immature needles packed around the stem resembling a candle), will thicken the growth of pines and spruce. Avoid cutting back into the hardened older wood because new shoots will not grow, and the form of the plant will be compromised.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">If upright and broad-spreading junipers outgrow their site, consider a form of reduction pruning. Reduction pruning using either thinning or heading back cuts to reduce plant size without destroying the natural shape. Only shear prune to keep a desire formal shapes like they do with Christmas trees.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Similar to pines and spruces, junipers do not generate new growth from old wood, so never severely prune more than one-half of the plant. The length of individual branches may be reduced by cutting them back to a lateral branch. This technique maintains a natural appearance while it decreases the size of the shrub.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><h2 data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Pruning Palms</span></h2><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Proper palm management only recommends the removal of fronds that have turned completely brown and have no green color remaining in the frond or petiole. Removal of fronds that have green coloring reduces their photosynthetic rate, which may have a negative impact on growth and development of the palm. Remove palm fronds by cutting them from the underside to avoid tearing the fibers of the palm’s stem. The terminal bud of the palm is where new fronds develop. If one damages the terminal bud, it may result in the death of the palm.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1013" instrument_node="">Para obtener la versión en español de esta hoja informativa, consulte&nbsp;</span><a data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hgic.clemson.edu/factsheet/la-poda-de-arboles/"><span data-dcnode-id="1012" instrument_node="">HGIC 1003S, </span><em data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">La Poda de Árboles</span></em></a><em data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">.</span></em></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1002"><em data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Originally published 01/99</span></em></p><span data-dcnode-id="1001" instrument_node="">
