</span><h1 class="vc_custom_heading textCenter" data-dcnode-id="1148" style="font-size: 42px;color: #283c46;line-height: 54px;text-align: left;font-family:Open Sans;font-weight:700;font-style:normal"><span data-dcnode-id="1149" instrument_node="">Tree Protection Zone TPZ</span></h1><div class="vc_empty_space" data-dcnode-id="1146" style="height: 2em"><span class="vc_empty_space_inner" data-dcnode-id="1147"></span></div><span data-dcnode-id="1145" instrument_node="">
</span><div class="wpb_text_column wpb_content_element smaller-text" data-dcnode-id="1135"><span data-dcnode-id="1144" instrument_node="">
</span><div class="wpb_wrapper" data-dcnode-id="1137"><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1139" style="font-size: 15px;"><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Updated:</span></strong><span data-dcnode-id="1140" instrument_node=""> 21 September 2021</span></p><span data-dcnode-id="1138" instrument_node="">
</span></div><span data-dcnode-id="1136" instrument_node="">
</span></div><span data-dcnode-id="1134" instrument_node="">
</span><div class="vc_empty_space" data-dcnode-id="1132" style="height: 1em"><span class="vc_empty_space_inner" data-dcnode-id="1133"></span></div><span data-dcnode-id="1131" instrument_node="">
</span><div class="mpc-textblock mpc-inited" data-dcnode-id="1110" id="mpc_textblock-29626a88551505e" style="opacity: 1;"><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Tree Protection Zones or TPZ are set up around trees during construction on nearby or adjacent areas.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1125"><strong data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">It is sectioning off space around the tree to protect the ground from being compacted or any potential mechanical damage to the tree by heavy machinery.</span></strong></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">We look at the minimum distances needed, best practices, and local construction laws.</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1118" instrument_node="">
</span><h3 data-dcnode-id="1115"><strong data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">How to calculate a TPZ</span></strong></h3><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">The radius of the TPZ is calculated for each tree by multiplying the diameter of the tree at breast height DBH x 12.</span></p><span data-dcnode-id="1111" instrument_node="">
</span></div><div class="vc_empty_space" data-dcnode-id="1108" style="height: 4em"><span class="vc_empty_space_inner" data-dcnode-id="1109"></span></div><span data-dcnode-id="1107" instrument_node="">
</span><div class="vc_row wpb_row vc_inner vc_row-fluid mpc-row" data-dcnode-id="1037"><div class="wpb_column vc_column_container vc_col-sm-12 mpc-column" data-dcnode-id="1038"><div class="vc_column-inner" data-dcnode-id="1039"><div class="wpb_wrapper" data-dcnode-id="1040"><h2 class="vc_custom_heading vc_custom_1632225700952" data-dcnode-id="1105" style="font-size: 26px;color: #283c46;text-align: left;font-family:Open Sans;font-weight:700;font-style:normal"><span data-dcnode-id="1106" instrument_node="">When to consider tree protection?</span></h2><div class="vc_empty_space" data-dcnode-id="1103" style="height: 1em"><span class="vc_empty_space_inner" data-dcnode-id="1104"></span></div><span data-dcnode-id="1102" instrument_node="">
</span><div class="mpc-textblock mpc-inited" data-dcnode-id="1092" id="mpc_textblock-89626a8855157d4" style="opacity: 1;"><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">The best time to consider tree protection is during the initial planning stages before construction begins. A lot of the time this will need to be signed off on by the local council before construction can begin..</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">In most cases, even minor details in the placement of your construction project may be crucial in ensuring your trees survive.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">In most cases, the distance of TPZ’s will be indicated in the Development Plan.</span></p><span data-dcnode-id="1093" instrument_node="">
</span></div><div class="vc_empty_space" data-dcnode-id="1090" style="height: 2em"><span class="vc_empty_space_inner" data-dcnode-id="1091"></span></div><span data-dcnode-id="1089" instrument_node="">
</span><div class="wpb_single_image wpb_content_element vc_align_left" data-dcnode-id="1081"><span data-dcnode-id="1088" instrument_node="">
</span><figure class="wpb_wrapper vc_figure" data-dcnode-id="1083"><span data-dcnode-id="1087" instrument_node="">
</span><div class="vc_single_image-wrapper vc_box_border_grey" data-dcnode-id="1085"><img alt="Tree-Protection-Zone-TPZ" class="vc_single_image-img attachment-full" data-dcnode-id="1086" height="467" loading="lazy" sizes="(max-width: 750px) 100vw, 750px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotreequotes.com.au/wp-content/uploads/2021/09/Tree-Protection-Zone-TPZ.jpg&amp;raw" srcset="https://www.gotreequotes.com.au/wp-content/uploads/2021/09/Tree-Protection-Zone-TPZ.jpg 750w, https://www.gotreequotes.com.au/wp-content/uploads/2021/09/Tree-Protection-Zone-TPZ-300x187.jpg 300w" width="750"></div><span data-dcnode-id="1084" instrument_node="">
</span></figure><span data-dcnode-id="1082" instrument_node="">
</span></div><span data-dcnode-id="1080" instrument_node="">
</span><div class="vc_empty_space" data-dcnode-id="1078" style="height: 1em"><span class="vc_empty_space_inner" data-dcnode-id="1079"></span></div><span data-dcnode-id="1077" instrument_node="">
</span><h2 class="vc_custom_heading vc_custom_1632225824345" data-dcnode-id="1075" style="font-size: 20px;color: #283c46;text-align: left;font-family:Open Sans;font-weight:700;font-style:normal"><span data-dcnode-id="1076" instrument_node="">Tree protection requirements</span></h2><div class="vc_empty_space" data-dcnode-id="1073" style="height: 1em"><span class="vc_empty_space_inner" data-dcnode-id="1074"></span></div><span data-dcnode-id="1072" instrument_node="">
</span><div class="mpc-textblock mpc-inited" data-dcnode-id="1062" id="mpc_textblock-100626a885515f23" style="opacity: 1;"><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">The size of the TPZ and requirements will entirely depend on local council laws. Every council has different rules when it comes to tree removal, trimming and protection zones for development.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1068" instrument_node="">You need to visit your local council website and look for the Tree Preservation Order to get more information. You can get a link directly to your local council TPO’s </span><a data-dcnode-id="1066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotreequotes.com.au/council-tree-regulations/" style="color: #008000;"><span data-dcnode-id="1067" instrument_node="">here</span></a><span data-dcnode-id="1065" instrument_node="">.</span></p><span data-dcnode-id="1063" instrument_node="">
</span></div><div class="vc_empty_space" data-dcnode-id="1060" style="height: 2em"><span class="vc_empty_space_inner" data-dcnode-id="1061"></span></div><span data-dcnode-id="1059" instrument_node="">
</span><h3 class="vc_custom_heading vc_custom_1632225892892" data-dcnode-id="1057" style="font-size: 20px;color: #283c46;text-align: left;font-family:Open Sans;font-weight:700;font-style:normal"><span data-dcnode-id="1058" instrument_node="">The Australian standard, Protection of the tree on development sites (AS4970 2009) defines a TPZ as:</span></h3><div class="vc_empty_space" data-dcnode-id="1055" style="height: 1em"><span class="vc_empty_space_inner" data-dcnode-id="1056"></span></div><span data-dcnode-id="1054" instrument_node="">
</span><div class="mpc-textblock mpc-inited" data-dcnode-id="1044" id="mpc_textblock-15626a8855162b2" style="opacity: 1;"><p data-dcnode-id="1049"><span data-dcnode-id="1053" instrument_node="">The Australian standard for TPZ (</span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tcaa.com.au/wp-content/uploads/2018/11/AS-4970-2009-Protection-of-trees-on-development-sites.pdf" style="color: #008000;"><span data-dcnode-id="1052" instrument_node="">AS4970 2009</span></a><span data-dcnode-id="1050" instrument_node="">) is a combination of the root area and crown area requiring protection. It is an area isolated from construction disturbance so that the tree remains viable.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">The TPZ incorporates the structural root zone (SRZ). The radius of the TPZ is calculated for each tree by multiplying the diameter of the tree at breast height DBH x 12.</span></p><span data-dcnode-id="1045" instrument_node="">
</span></div><div class="vc_empty_space" data-dcnode-id="1042" style="height: 4em"><span class="vc_empty_space_inner" data-dcnode-id="1043"></span></div><span data-dcnode-id="1041" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_inner vc_row-fluid mpc-row" data-dcnode-id="982"><div class="wpb_column vc_column_container vc_col-sm-12 mpc-column" data-dcnode-id="983"><div class="vc_column-inner" data-dcnode-id="984"><div class="wpb_wrapper" data-dcnode-id="985"><h2 class="vc_custom_heading vc_custom_1632225962899" data-dcnode-id="1035" style="font-size: 20px;color: #283c46;text-align: left;font-family:Open Sans;font-weight:700;font-style:normal"><span data-dcnode-id="1036" instrument_node="">Components of a tree needing protection</span></h2><div class="vc_empty_space" data-dcnode-id="1033" style="height: 1em"><span class="vc_empty_space_inner" data-dcnode-id="1034"></span></div><span data-dcnode-id="1032" instrument_node="">
</span><div class="mpc-textblock mpc-inited" data-dcnode-id="1001" id="mpc_textblock-44626a885516d82" style="opacity: 1;"><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Among the most relevant components of a tree when it comes to measuring the required size of the protection zone includes:</span></p><span data-dcnode-id="1029" instrument_node="">
</span><ul data-dcnode-id="1015"><span data-dcnode-id="1028" instrument_node="">
</span><li data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Canopy</span></li><span data-dcnode-id="1025" instrument_node="">
</span><li data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Roots</span></li><span data-dcnode-id="1022" instrument_node="">
</span><li data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Trunk</span></li><span data-dcnode-id="1019" instrument_node="">
</span><li data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Dripline</span></li><span data-dcnode-id="1016" instrument_node="">
</span></ul><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1013" instrument_node="">The dripline refers to the circular area that lies directly under the outer branches of a tree. It’s within this zone that the </span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nature.berkeley.edu/garbelottowp/%3Fqa_faqs%3Dwhat-is-the-critical-root-zone" style="color: #008000;"><span data-dcnode-id="1012" instrument_node="">Critical Root Zone (CRZ)</span></a><span data-dcnode-id="1010" instrument_node=""> or Root Protection Zone (RPZ) is located.</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">However, the root systems of trees may extend past this dripline or canopy and only occur about 600mm within the topsoil.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">This exposes the tree to more damage-causing factors such as construction developments and vehicles which may cause its compaction.</span></p><span data-dcnode-id="1002" instrument_node="">
</span></div><div class="vc_empty_space" data-dcnode-id="999" style="height: 2em"><span class="vc_empty_space_inner" data-dcnode-id="1000"></span></div><span data-dcnode-id="998" instrument_node="">
</span><div class="wpb_single_image wpb_content_element vc_align_left" data-dcnode-id="990"><span data-dcnode-id="997" instrument_node="">
</span><figure class="wpb_wrapper vc_figure" data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">
</span><div class="vc_single_image-wrapper vc_box_border_grey" data-dcnode-id="994"><img alt="Components of a tree needing protection" class="vc_single_image-img attachment-full" data-dcnode-id="995" height="447" loading="lazy" sizes="(max-width: 633px) 100vw, 633px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gotreequotes.com.au/wp-content/uploads/2021/09/Components-of-a-tree-needing-protection.png&amp;raw" srcset="https://www.gotreequotes.com.au/wp-content/uploads/2021/09/Components-of-a-tree-needing-protection.png 633w, https://www.gotreequotes.com.au/wp-content/uploads/2021/09/Components-of-a-tree-needing-protection-300x212.png 300w" width="633"></div><span data-dcnode-id="993" instrument_node="">
</span></figure><span data-dcnode-id="991" instrument_node="">
</span></div><span data-dcnode-id="989" instrument_node="">
</span><div class="vc_empty_space" data-dcnode-id="987" style="height: 4em"><span class="vc_empty_space_inner" data-dcnode-id="988"></span></div><span data-dcnode-id="986" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_inner vc_row-fluid mpc-row" data-dcnode-id="960"><div class="wpb_column vc_column_container vc_col-sm-12 mpc-column" data-dcnode-id="961"><div class="vc_column-inner" data-dcnode-id="962"><div class="wpb_wrapper" data-dcnode-id="963"><h2 class="vc_custom_heading vc_custom_1632226065355" data-dcnode-id="980" style="font-size: 20px;color: #283c46;text-align: left;font-family:Open Sans;font-weight:700;font-style:normal"><span data-dcnode-id="981" instrument_node="">Preliminary tree assessment report</span></h2><div class="vc_empty_space" data-dcnode-id="978" style="height: 1em"><span class="vc_empty_space_inner" data-dcnode-id="979"></span></div><span data-dcnode-id="977" instrument_node="">
</span><div class="mpc-textblock mpc-inited" data-dcnode-id="967" id="mpc_textblock-81626a885518211" style="opacity: 1;"><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">This report deals with survey data and information about trees in a given area. It covers important information such as tree species, health, structure, dimensions, and origin.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">For every individual tree, this report provides key details such as its tree protection zone, structural root zone, canopy spread, trunk diameter, height, age class, and retention values.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">All this information is required by the project’s architect or planner to help them customize an effective design and landscape layout. The data including the retention values and TPZs, assist in determining which trees will be retained and how they’ll be protected.</span></p><span data-dcnode-id="968" instrument_node="">
</span></div><div class="vc_empty_space" data-dcnode-id="965" style="height: 4em"><span class="vc_empty_space_inner" data-dcnode-id="966"></span></div><span data-dcnode-id="964" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_inner vc_row-fluid mpc-row" data-dcnode-id="941"><div class="wpb_column vc_column_container vc_col-sm-12 mpc-column" data-dcnode-id="942"><div class="vc_column-inner" data-dcnode-id="943"><div class="wpb_wrapper" data-dcnode-id="944"><h2 class="vc_custom_heading vc_custom_1632226117794" data-dcnode-id="958" style="font-size: 20px;color: #283c46;text-align: left;font-family:Open Sans;font-weight:700;font-style:normal"><span data-dcnode-id="959" instrument_node="">Tree management protection plan</span></h2><div class="vc_empty_space" data-dcnode-id="956" style="height: 1em"><span class="vc_empty_space_inner" data-dcnode-id="957"></span></div><span data-dcnode-id="955" instrument_node="">
</span><div class="mpc-textblock mpc-inited" data-dcnode-id="948" id="mpc_textblock-30626a885518aaa" style="opacity: 1;"><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">The Tree Protection Management plan (TPMP) is a document that outlines the protection measures and techniques to be followed step by step from demolition to the construction to the final landscape stage.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">It’s usually a requirement when obtaining a planning permit, and may include critical project details such as the arborist’s inspection timeframe, construction staging, and the compliance checklist.</span></p><span data-dcnode-id="949" instrument_node="">
</span></div><div class="vc_empty_space" data-dcnode-id="946" style="height: 4em"><span class="vc_empty_space_inner" data-dcnode-id="947"></span></div><span data-dcnode-id="945" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_inner vc_row-fluid mpc-row" data-dcnode-id="916"><div class="wpb_column vc_column_container vc_col-sm-12 mpc-column" data-dcnode-id="917"><div class="vc_column-inner" data-dcnode-id="918"><div class="wpb_wrapper" data-dcnode-id="919"><h2 class="vc_custom_heading vc_custom_1632226139643" data-dcnode-id="939" style="font-size: 26px;color: #283c46;text-align: left;font-family:Open Sans;font-weight:700;font-style:normal"><span data-dcnode-id="940" instrument_node="">Protective fencing</span></h2><div class="vc_empty_space" data-dcnode-id="937" style="height: 1em"><span class="vc_empty_space_inner" data-dcnode-id="938"></span></div><span data-dcnode-id="936" instrument_node="">
</span><div class="mpc-textblock mpc-inited" data-dcnode-id="923" id="mpc_textblock-63626a8855192f1" style="opacity: 1;"><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">As part of your pre-construction plans, you’ll need to restrict access to the TPZ on your property through fencing.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">This should happen before any other materials and machinery are brought onsite. Once the fence is built up, that fence shouldn’t be removed or altered without the consent of the project’s arborist.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">If tree protection fencing is to be constructed for a home project that does not require a planning permit, a suitable area to fence around a tree can be determined using the Tree Protection Zone calculation in this fact sheet. That is:</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">A radius of 12 times the diameter of the tree trunk at a height of 1.4 meters to a maximum of 15 meters but no less than 2 meters from the base of the trunk of the tree.</span></p><span data-dcnode-id="924" instrument_node="">
</span></div><div class="vc_empty_space" data-dcnode-id="921" style="height: 4em"><span class="vc_empty_space_inner" data-dcnode-id="922"></span></div><span data-dcnode-id="920" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_inner vc_row-fluid mpc-row" data-dcnode-id="879"><div class="wpb_column vc_column_container vc_col-sm-12 mpc-column" data-dcnode-id="880"><div class="vc_column-inner" data-dcnode-id="881"><div class="wpb_wrapper" data-dcnode-id="882"><h3 class="vc_custom_heading vc_custom_1632226174059" data-dcnode-id="914" style="font-size: 26px;color: #283c46;text-align: left;font-family:Open Sans;font-weight:700;font-style:normal"><span data-dcnode-id="915" instrument_node="">Tree protection fencing should comply with the following requirements:</span></h3><div class="vc_empty_space" data-dcnode-id="912" style="height: 1em"><span class="vc_empty_space_inner" data-dcnode-id="913"></span></div><span data-dcnode-id="911" instrument_node="">
</span><div class="mpc-textblock mpc-inited" data-dcnode-id="886" id="mpc_textblock-22626a885519bbf" style="opacity: 1;"><ul data-dcnode-id="888"><span data-dcnode-id="910" instrument_node="">
</span><li data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Fence post supports (e.g. star pickets) should have a diameter greater than 20 mm and should not impact surface tree roots;</span></li><span data-dcnode-id="907" instrument_node="">
</span><li data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Fencing height minimum of 1.8 m;</span></li><span data-dcnode-id="904" instrument_node="">
</span><li data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Shade cloth, para web, wire mesh panels, or similar should be attached to the fencing posts;</span></li><span data-dcnode-id="901" instrument_node="">
</span><li data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Signage should be installed stating “Vegetation Protection Zone – No Entry;</span></li><span data-dcnode-id="898" instrument_node="">
</span><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">The tree protection fencing must remain in place until construction is completed;</span></li><span data-dcnode-id="895" instrument_node="">
</span><li data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">No vehicular or pedestrian access, trenching or soil excavation is to occur within the Tree Protection Zone;</span></li><span data-dcnode-id="892" instrument_node="">
</span><li data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">No storage or dumping of tools, equipment, or waste is to occur within the Tree Protection Zone.</span></li><span data-dcnode-id="889" instrument_node="">
</span></ul><span data-dcnode-id="887" instrument_node="">
</span></div><div class="vc_empty_space" data-dcnode-id="884" style="height: 4em"><span class="vc_empty_space_inner" data-dcnode-id="885"></span></div><span data-dcnode-id="883" instrument_node="">
</span></div></div></div></div><div class="vc_row wpb_row vc_inner vc_row-fluid mpc-row" data-dcnode-id="860"><div class="wpb_column vc_column_container vc_col-sm-12 mpc-column" data-dcnode-id="861"><div class="vc_column-inner" data-dcnode-id="862"><div class="wpb_wrapper" data-dcnode-id="863"><h2 class="vc_custom_heading vc_custom_1632226293552" data-dcnode-id="877" style="font-size: 26px;color: #283c46;text-align: left;font-family:Open Sans;font-weight:700;font-style:normal"><span data-dcnode-id="878" instrument_node="">Approved tree protection techniques</span></h2><div class="vc_empty_space" data-dcnode-id="875" style="height: 1em"><span class="vc_empty_space_inner" data-dcnode-id="876"></span></div><span data-dcnode-id="874" instrument_node="">
