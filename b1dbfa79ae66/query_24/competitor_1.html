ta-dcnode-id="4630" instrument_node="">14</span></span></a></div></div><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4625" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><p data-dcnode-id="4623"><span data-dcnode-id="4624" instrument_node="">The end of June is such a busy time around here, it's sometimes hard to know which projects to prioritize. Planting, weeding, mulching, staking, pruning...so many things seem to suddenly need doing, all at once.</span></p><span data-dcnode-id="4622" instrument_node="">
</span><p data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">Today, it was the peach tree that was calling to me most loudly, so I spent every moment of the kids' naptime thinning out hundreds of tiny peaches from its branches. I'd pulled off 247 when I lost track and stopped counting.</span></p><span data-dcnode-id="4619" instrument_node="">
</span><p data-dcnode-id="4617"><span data-dcnode-id="4618" instrument_node="">"But WHY?", you might ask. "Don't you WANT all those peaches? Are you a crazy lady?"</span></p><span data-dcnode-id="4616" instrument_node="">
</span><p data-dcnode-id="4611"><span data-dcnode-id="4615" instrument_node="">And I hear you! It's been a miserably long winter, peaches are make-me-blush expensive in the grocery store, the very sight of fruit appearing on the trees is enough to make me giddy...and yet here I am </span><em data-dcnode-id="4612"><span data-dcnode-id="4614" instrument_node="">throwing away baby peaches!</span><br data-dcnode-id="4613"></em></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4610" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="4609" instrument_node="">
</span><p data-dcnode-id="4604"><a data-dcnode-id="4605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saltinmycoffee.com/wp-content/uploads/2017/06/peach-tree-in-need-of-thinning.jpg"><img alt="how to thin a peach tree" class="aligncenter size-full wp-image-5514 entered lazyloaded" data-dcnode-id="4608" data-lazy-src="https://saltinmycoffee.com/wp-content/uploads/2017/06/peach-tree-in-need-of-thinning.jpg" data-ll-status="loaded" height="474" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saltinmycoffee.com/wp-content/uploads/2017/06/peach-tree-in-need-of-thinning.jpg&amp;raw" width="700"><noscript data-dcnode-id="4606"><span data-dcnode-id="4607" instrument_node="">&lt;img class="aligncenter size-full wp-image-5514" src="https://saltinmycoffee.com/wp-content/uploads/2017/06/peach-tree-in-need-of-thinning.jpg" alt="how to thin a peach tree" width="700" height="474"&gt;</span></noscript></a></p><div class="adthrive" data-dcnode-id="4602" id="cls-video-container-QXE02JPs" style="min-height: 441px;"><div data-dcnode-id="4603"></div></div><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4601" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="4600" instrument_node="">
</span><p data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">It really is about enough to make a body cry. But I do it because I know what a difference thinning makes, both in the quality of harvest and health of the tree. When a heavily-set tree gets properly thinned, at the correct time, it sets us up for the best possible harvest. So thinning is a high-priority task on my crowded June to-do list.</span></p><span data-dcnode-id="4597" instrument_node="">
</span><h2 data-dcnode-id="4595"><span data-dcnode-id="4596" instrument_node="">Here's why peach trees should (usually!) be thinned:</span></h2><span data-dcnode-id="4594" instrument_node="">
</span><p data-dcnode-id="4592"><span data-dcnode-id="4593" instrument_node="">Growing up, I don't remember us ever thinning our peaches. And it always seemed a bit of a mystery why we'd have laundry baskets filled with peaches one year - only to be carefully sharing a precious handful of fruits the next.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4591" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><span data-dcnode-id="4590" instrument_node="">
</span><p data-dcnode-id="4588"><span data-dcnode-id="4589" instrument_node="">Now I understand a bit more what was happening. Like most stone fruits, peach trees are notorious for setting fruit too heavily. An over-heavy harvest takes an enormous toll on a tree's health, and it takes a year or more for the tree to regain sufficient vitality to produce another decent crop. Many trees never fully recover.</span></p><span data-dcnode-id="4587" instrument_node="">
</span><p data-dcnode-id="4585"><span data-dcnode-id="4586" instrument_node="">When a fruit tree bears heavily every other year, then sparsely (or not at all) in alternating years, it's called biennialism. By thinning fruits to prevent overwhelming the tree, it helps to balance out the tree's fertility for yearly harvests.</span></p><span data-dcnode-id="4584" instrument_node="">
</span><p data-dcnode-id="4582"><span data-dcnode-id="4583" instrument_node="">Thinning also helps to prevent breakage of branches. Peaches get heavy as they ripen, and it's very common for limbs on a heavily-laden tree to break under the weight. Over-heavy harvests also make a tree more susceptible to pests, disease, and even sun damage.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4581" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><span data-dcnode-id="4580" instrument_node="">
</span><p data-dcnode-id="4578"><span data-dcnode-id="4579" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4577" instrument_node="">
</span><p data-dcnode-id="4572"><a data-dcnode-id="4573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saltinmycoffee.com/wp-content/uploads/2017/06/how-to-thin-a-peach-tree.jpg"><img alt="how far apart to thin peaches" class="aligncenter wp-image-5511 size-full entered lazyloaded" data-dcnode-id="4576" data-lazy-src="https://saltinmycoffee.com/wp-content/uploads/2017/06/how-to-thin-a-peach-tree.jpg" data-ll-status="loaded" height="489" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saltinmycoffee.com/wp-content/uploads/2017/06/how-to-thin-a-peach-tree.jpg&amp;raw" width="700"><noscript data-dcnode-id="4574"><span data-dcnode-id="4575" instrument_node="">&lt;img class="aligncenter wp-image-5511 size-full" src="https://saltinmycoffee.com/wp-content/uploads/2017/06/how-to-thin-a-peach-tree.jpg" alt="how far apart to thin peaches" width="700" height="489"&gt;</span></noscript></a></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4571" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><span data-dcnode-id="4570" instrument_node="">
</span><p data-dcnode-id="4568"><span data-dcnode-id="4569" instrument_node="">Along with helping to safeguard the health of the tree, thinning also leads to better harvests. The fruits on a tree that is allowed to set too heavily stay smaller, harder, and less-flavorful than those on a properly thinned tree.</span></p><span data-dcnode-id="4567" instrument_node="">
</span><p data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">No matter how rich the soil, a tree has only so many resources to go around. Uncrowded fruits are able to take full advantage of their share of nutrients from the tree. Crowded fruits have to compete for a finite supply of nutrients and most don't end up with enough to reach their full potential.</span></p><span data-dcnode-id="4564" instrument_node="">
</span><p data-dcnode-id="4562"><span data-dcnode-id="4563" instrument_node="">Thinning also makes for more beautiful, less-blemished fruit. Skin color is better on uncrowded fruits that receive more sunlight. And uncrowded fruits dry more quickly after dew or rain, which makes brown rot less likely to start and spread as it quickly can among crowded fruits that are touching each other.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4561" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><span data-dcnode-id="4560" instrument_node="">
</span><p data-dcnode-id="4555"><a data-dcnode-id="4556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saltinmycoffee.com/wp-content/uploads/2017/06/when-to-thin-peaches.jpg"><img alt="how to thin peaches for better harvest" class="aligncenter size-full wp-image-5512 entered lazyloaded" data-dcnode-id="4559" data-lazy-src="https://saltinmycoffee.com/wp-content/uploads/2017/06/when-to-thin-peaches.jpg" data-ll-status="loaded" height="530" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saltinmycoffee.com/wp-content/uploads/2017/06/when-to-thin-peaches.jpg&amp;raw" width="700"><noscript data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">&lt;img class="aligncenter size-full wp-image-5512" src="https://saltinmycoffee.com/wp-content/uploads/2017/06/when-to-thin-peaches.jpg" alt="how to thin peaches for better harvest" width="700" height="530"&gt;</span></noscript></a></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4554" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><span data-dcnode-id="4553" instrument_node="">
</span><h2 data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">Here's how to thin peaches on a tree</span></h2><span data-dcnode-id="4550" instrument_node="">
</span><p data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">Most fruit trees do thin themselves naturally to some extent, soon after small fruits begin to form. This is commonly known as the "June drop". Sometimes, this June drop might be enough to adequately thin your fruit crop - but, as with almost all stone fruits (like nectartines and plums) this usually is not the case with peaches.</span></p><span data-dcnode-id="4547" instrument_node="">
</span><p data-dcnode-id="4545"><span data-dcnode-id="4546" instrument_node="">Once your peach tree finishes its June drop, that means it's time for you to go to work and finish the job!</span></p><span data-dcnode-id="4544" instrument_node="">
</span><p data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">You can generally plan on doing your thinning just about one month from when your trees are in full bloom. For those in warmer climates, that might be as early as April. Here in Maine, it's in late June. You'll want to tackle this project when young fruits are between 3/4" and 1" in diameter.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4541" id="AdThrive_Content_9_desktop" style="min-height: 250px;"></div><span data-dcnode-id="4540" instrument_node="">
</span><p data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">You don't want to thin too early, when the fruits are tiny, because this can result in split pits in the mature fruit. However, if you wait until the fruits are larger than about 1", the tree's resources have already been quite drained by the extra-heavy load. Fruits will not reap the full benefit of thinning, and will be less likely to get as large as they would have if thinned at the perfect time.</span></p><span data-dcnode-id="4537" instrument_node="">
</span><p data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">Most expert sources suggest thinning to a minimum spacing of anywhere from 3" to even 8". I use a minimum of 4" spacing as my rule of thumb, and I generally err on the side of greater spacing if I'm wavering on whether to thin a particular fruit - especially in a year like this one, when fruit has set very evenly and heavily over the whole tree.</span></p><span data-dcnode-id="4534" instrument_node="">
</span><div data-canvas-width="537.9219999999999" data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">&nbsp;If just one or two branches were heavily laden, and the rest of the tree was sparsely set, I might allow slightly closer spacing, since the overall nutrient draw on the tree would be less. This year, with the whole tree absolutely covered in tiny peaches, I know I have to be ruthless and go with a generous 4" minimum.</span></div><span data-dcnode-id="4531" instrument_node="">
</span><div data-canvas-width="537.9219999999999" data-dcnode-id="4530"></div><span data-dcnode-id="4529" instrument_node="">
</span><div data-canvas-width="537.9219999999999" data-dcnode-id="4524"><span data-dcnode-id="4528" instrument_node="">I thin our tree by hand, with the help of a ladder. Another method that's faster, but less accurate, is "pole thinning", which involves simply striking the branches to remove excess fruit. (For a little more on that method, I found </span><a data-dcnode-id="4526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//msue.anr.msu.edu/news/thinking_through_strategies_for_peach_crop_thinning" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4527" instrument_node="">this publication </span></a><span data-dcnode-id="4525" instrument_node="">helpful.)</span></div><span data-dcnode-id="4523" instrument_node="">
</span><div data-canvas-width="537.9219999999999" data-dcnode-id="4522"></div><span data-dcnode-id="4521" instrument_node="">
</span><p data-dcnode-id="4516"><a data-dcnode-id="4517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saltinmycoffee.com/wp-content/uploads/2017/06/how-to-thin-peaches.jpg"><img alt="how to thin peach trees" class="aligncenter wp-image-5513 size-full" data-dcnode-id="4520" data-lazy-src="https://saltinmycoffee.com/wp-content/uploads/2017/06/how-to-thin-peaches.jpg" height="769" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20700%20769'%3E%3C/svg%3E" width="700"><noscript data-dcnode-id="4518"><span data-dcnode-id="4519" instrument_node="">&lt;img class="aligncenter wp-image-5513 size-full" src="https://saltinmycoffee.com/wp-content/uploads/2017/06/how-to-thin-peaches.jpg" alt="how to thin peach trees" width="700" height="769"&gt;</span></noscript></a></p><span data-dcnode-id="4515" instrument_node="">
</span><p data-canvas-width="537.9219999999999" data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">I find that a twisting motion - much like the motion you'd make for snapping your fingers - works best for removing fruits without damaging the branches, or the young peaches that you want to leave.</span></p><span data-dcnode-id="4512" instrument_node="">
</span><p data-canvas-width="537.9219999999999" data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">When I'm choosing which fruits to remove and which to leave, I start by thinning out any with obvious damage. In the picture above, you can see that the peach on the left has obvious bug damage. So I removed that fruit, and left the perfect one right next to it.</span></p><span data-dcnode-id="4509" instrument_node="">
</span><p data-canvas-width="537.9219999999999" data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">&nbsp;Next, I try to remove the smallest fruits, while leaving the largest, as I aim for a final goal of 4-6" spacing between fruits. The one last criteria I use, if I'm deliberating which peach to remove, is to favor the peaches closer to the trunk end of each branch where the limb is stronger, rather than those out at the tip, where it's more likely to break.</span></p><span data-dcnode-id="4506" instrument_node="">
</span><div data-dcnode-id="4505" id="outerContainer"></div><span data-dcnode-id="4504" instrument_node="">
</span><div data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">That's it! My best advice is, don't take time thinking too hard about each little peach - just follow your instincts, go for it, and get it done! Naptime only lasts so long! ; )</span></div><span data-dcnode-id="4501" instrument_node="">
</span><div data-dcnode-id="4498"><strong data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">&nbsp;</span></strong></div><span data-dcnode-id="4497" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="2799"><time class="comment-time" data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">April 17, 2020 at 10:38 pm</span></time></p><span data-dcnode-id="2798" instrument_node=""> </span></header><span data-dcnode-id="2796" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2791"><span data-dcnode-id="2795" instrument_node="">
</span><p data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">My peach tree was loaded with peaches this year. It looked great and strong until today! The branches were obviously over burdened and my tree looks more like a weeping willow now.  I found your article here and did as you said...thinned the fruit. My tree perked up a little. Am hoping it will perk up some more. I didn't prune the branches this past winter. Should I do that now, wait until fruit is harvested or wait until winter? I live in Arizona. Thanks.</span></p><span data-dcnode-id="2792" instrument_node="">
</span></div><span data-dcnode-id="2790" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="2787"><a aria-label="Reply to Lori Thornton" class="comment-reply-link" data-belowelement="article-comment-5238" data-commentid="5238" data-dcnode-id="2788" data-postid="5495" data-replyto="Reply to Lori Thornton" data-respondelement="respond" href="#comment-5238" rel="nofollow"><span data-dcnode-id="2789" instrument_node="">Reply</span></a></div><span data-dcnode-id="2786" instrument_node="">

</span><span class="comment-author-name" data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Anna</span></span><span data-dcnode-id="2776" instrument_node=""> </span><span class="says" data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">says</span></span><span data-dcnode-id="2773" instrument_node=""> </span></p><span data-dcnode-id="2771" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="2768"><time class="comment-time" data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">April 18, 2020 at 10:02 pm</span></time></p><span data-dcnode-id="2767" instrument_node=""> </span></header><span data-dcnode-id="2765" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2757"><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2759"><span data-dcnode-id="2763" instrument_node="">Hi Lori! If it were me, I would wait at this point and prune the tree when it's dormant next winter. That will be easiest on the dear thing, and I truly bet that it will perk up for you! If you haven't fertilized it this year, I might give it a dose of a good organic fertilizer (</span><a data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2zfH6Rf" rel="noopener noreferrer nofollow ugc" target="_blank"><span data-dcnode-id="2762" instrument_node="">something like this one</span></a><span data-dcnode-id="2760" instrument_node="">), and make sure that it stays adequately watered throughout the season. Other than that, it sounds like you're doing everything right, and I bet that it will perk right up for you. Wishing you a WONDERFUL harvest this year!! Best wishes, Anna</span></p><span data-dcnode-id="2758" instrument_node="">

</span><p data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">Hello, over winter we moved into a new to us house and were delighted to discover a peach tree this spring. Fruit tree care is new to me, and I thinned very heavily about 6 or so weeks ago. I am now concerned that I didn’t thin enough... we staked and netted the tree a few weeks ago and the peaches are turning a lovely shade of looking ripe but they are still very small.  I suspect I did not thin enough. Is it too late to thin more?  We are in midcoast Maine, and I’m not even sure when to expect them to be ready to harvest. There are a few peach trees in our village which have peaches also still on the small side, however none of those trees have the color ours do. Any advice is much appreciated!!</span></p><span data-dcnode-id="2686" instrument_node="">

</span><p data-dcnode-id="2345"><span data-dcnode-id="2349" instrument_node="">Oh, Elaine! That would be enough to make me sit down right there in the yard and cry. EVERY single peach? That's awful! You know, I have heard stories that a family of raccoons can be capable of pulling off such a heist. Most critters leave at least some sign, but from what I hear raccoons are capable of being pretty sneaky, and working as a team. Two years out of the last 4, they have definitely make a HUGE dent in my corn crop, all in one night. This is what I'm thinking of setting up this year, to try to deter them: </span><a data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2G9uY1J" rel="nofollow ugc"><span data-dcnode-id="2348" instrument_node="">https://amzn.to/2G9uY1J</span></a><span data-dcnode-id="2346" instrument_node=""> . At any rate, I really hope you have better luck this year! And thank you so very much for your kind words! Good luck with your crop!!</span></p><span data-dcnode-id="2344" instrument_node="">

</span><p data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Elaine,  your problem is SQUIRRELS,  I had the same problem when I started my home orchard.  They ate my plums ,  munched on my green pomegranates and went after my few peaches the first time my tree had fruit.  Since my trees are semi-dwarf I can control their height and shape.  I built cages out of PVC pipe and chicken wire.  I made panels 4 ft by 5 ft and keep my trees with in that size.  I zip tie the panels together. It also makes them easy to store. Last year I made a cage for a 2nd peach tree that was 3 or  4 years old and sent 6 peaches,  as I was putting the roof panel on top,  a squirrel start running around me, leap on the side panel,  ran up the side panel and tried to get in.  I never saw anything like that.  He was mad and unafraid. I made 5 cages for around $90.00.  I consider them an investment,  since they will probably last for every.  Hope this helps.</span></p><span data-dcnode-id="2311" instrument_node="">
