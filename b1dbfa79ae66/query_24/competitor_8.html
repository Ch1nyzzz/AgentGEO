</span><h3 data-dcnode-id="10745" style="text-align: center;"><span data-dcnode-id="10748" instrument_node="">Most standard trees are only delivered bareroot, during the winter planting season (Nov-March). </span><br data-dcnode-id="10747"><span data-dcnode-id="10746" style="text-decoration: underline;"></span></h3><span data-dcnode-id="10744" instrument_node="">
</span><p data-dcnode-id="10742" style="text-align: left;"><span data-dcnode-id="10743" instrument_node="">These trees are delivered in the same size ranges as all our other trees, and (given enough time) will grow into the biggest trees around. Quite a few of these trees can not be delivered in standard sizes, only as smaller saplings, so for convenience we have listed them all below.</span></p><p data-dcnode-id="10739" style="text-align: center;"><button class="sub-category-buy" data-dcnode-id="10740" onclick="setLocation('#LargeTrees')" type="button"><span data-dcnode-id="10741" instrument_node="">Scroll Down to Browse </span></button></p><span data-dcnode-id="10738" instrument_node="">
</span><p data-dcnode-id="10731" id="LargeTrees"><strong data-dcnode-id="10736"><span data-dcnode-id="10737" instrument_node="">Standard trees are measured by their girth</span></strong><span data-dcnode-id="10735" instrument_node="">&nbsp;1 metre above the ground, and young&nbsp;</span><strong data-dcnode-id="10733"><span data-dcnode-id="10734" instrument_node="">saplings are measured by height</span></strong><span data-dcnode-id="10732" instrument_node="">. Therefore, a 6/8cm tree is much bigger than an 60/80cm sapling tree. If a tree is available in both sizes, it will be noted in the product descriptions.</span></p><span data-dcnode-id="10730" instrument_node="">
</span><p data-dcnode-id="10727"><span data-dcnode-id="10728"><span data-dcnode-id="10729" instrument_node="">All our large trees are covered by our no-quibble Guarantee, which means you can order with complete confidence. Best advice &amp; friendly support throughout.</span></span></p><span data-dcnode-id="10726" instrument_node="">

</span><div class="message" data-dcnode-id="1303"><span data-dcnode-id="1306" instrument_node="">Dear Mary, Mae and Sarah
In response to your email below I would like to tell you that we very happy with our 4 trees (3 x Himalayan Birch and 1 Common Alder) that we ordered from you.
The trees are all happily tucked up in the soil of our paddock.

The other important point I'd like to praise with your service concerns the way the trees had been packaged, not a single bud was damaged. You'd also sent us great specimens. The latter is a very important point as when ordering on-line, its not as though we can pick and choose the actual tree ourselves.

</span><h5 data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Bare Root vs Pot Grown</span></h5><span data-dcnode-id="471" instrument_node="">
</span><div data-dcnode-id="449"><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Bareroot Plants are only delivered in the winter season, from November to May. Pot Grown plants can be delivered all year round</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="464"><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Advantages of Bareroot plants:</span></strong></p><span data-dcnode-id="463" instrument_node="">
</span><ul data-dcnode-id="450"><span data-dcnode-id="462" instrument_node="">
</span><li data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">You pay less for the same size plants.</span></li><span data-dcnode-id="459" instrument_node="">
</span><li data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">You can carry and plant them easily.</span></li><span data-dcnode-id="456" instrument_node="">
</span><li data-dcnode-id="451"><span data-dcnode-id="455" instrument_node="">You o ...&nbsp;</span><a data-dcnode-id="453" href="javascript:void(0)" onclick="show_bareroot_potgrown_data();"><span data-dcnode-id="454" instrument_node="">More</span></a><span data-dcnode-id="452" instrument_node="">
</span></li></ul></div><span data-dcnode-id="448" instrument_node="">

</span><h2 class="green2" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Ashridge Trees: Bareroot plants vs Pot-Grown Explained</span></h2><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Bareroot Plants are only delivered in the winter season, from November to May. Pot Grown plants can be delivered all year round</span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="430"><strong data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Advantages of Bareroot plants:</span></strong></p><span data-dcnode-id="429" instrument_node="">
</span><ul data-dcnode-id="381"><span data-dcnode-id="428" instrument_node="">
</span><li data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">You pay less for the same size plants.</span></li><span data-dcnode-id="425" instrument_node="">
</span><li data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">You can carry and plant them easily.</span></li><span data-dcnode-id="422" instrument_node="">
</span><li data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">You only plant them in winter, so they need less maintenance after planting. The ground is naturally wet for their first few months.</span></li><span data-dcnode-id="419" instrument_node="">
</span><li data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">You get the biggest selection: Many trees are not sold pot-grown.</span></li><span data-dcnode-id="416" instrument_node="">
</span><li data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">They are "asleep" in winter, so this is the best time to transplant any tree or shrub.</span></li><span data-dcnode-id="413" instrument_node="">
</span><li data-dcnode-id="405"><span data-dcnode-id="412" instrument_node="">They use fewer fertilisers &amp; fungicides, less water, less packaging, and less fuel in their production &amp; delivery. </span><br data-dcnode-id="411"><span data-dcnode-id="410" instrument_node=""> </span><br data-dcnode-id="409"><span data-dcnode-id="408" instrument_node=""> </span><strong data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Advantages of Pot Grown plants: </span></strong></li><span data-dcnode-id="404" instrument_node="">
</span><li data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Pot grown plants can be delivered &amp; planted all year round.</span></li><span data-dcnode-id="401" instrument_node="">
</span><li data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Plants with tender roots &amp; larger specimens must be delivered in pots.</span></li><span data-dcnode-id="398" instrument_node="">
</span><li data-dcnode-id="383"><span data-dcnode-id="397" instrument_node="">Plants in pots can be kept for months longer if there is a delay in planting. </span><br data-dcnode-id="396"><span data-dcnode-id="395" instrument_node=""> </span><br data-dcnode-id="394"><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="385"><strong data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Our Advice to You: </span></strong><span data-dcnode-id="390" instrument_node=""> </span><br data-dcnode-id="389"><span data-dcnode-id="388" instrument_node=""> Winter is approaching and you can&nbsp;order bare-root plants now for delivery from November. </span><br data-dcnode-id="387"><br data-dcnode-id="386"></p><span data-dcnode-id="384" instrument_node="">
</span></li><span data-dcnode-id="382" instrument_node="">
</span></ul><span data-dcnode-id="380" instrument_node=""> </span><p align="right" data-dcnode-id="376"><span data-dcnode-id="379" instrument_node=""> </span><a data-dcnode-id="377" href="javascript:void(0);" onclick="hide_bareroot_potgrown_data();"><span data-dcnode-id="378" instrument_node="">Close</span></a></p><span data-dcnode-id="375" instrument_node="">
