 the year, the perfect excuse to curl up in front of the fire making plans for the new gardening year. On dry, sunny days, escape into the garden to make a head start on jobs in preparation for the lengthening days of early spring.&nbsp;</span></p></div><span data-dcnode-id="875" instrument_node="">
</span></div></div></div></div><div class="col-12" data-dcnode-id="856"><div class="ms-content-block two-column-layout portrait" data-dcnode-id="857" data-m-layout="portrait-two-column" data-m-t="content-block" id=""><div class="ms-content-block__image" data-dcnode-id="865"><picture data-dcnode-id="866"><source data-dcnode-id="870" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1Qt6?ver=c9c5&amp;w=385&amp;h=385&amp;q=76&amp;m=6&amp;f=jpg" media="(max-width:768px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1Qt6?ver=c9c5&amp;w=385&amp;h=385&amp;q=76&amp;m=6&amp;f=jpg"><source data-dcnode-id="869" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1Qt6?ver=c9c5&amp;w=510&amp;h=510&amp;q=76&amp;m=6&amp;f=jpg" media="(min-width:769px) and (max-width:1199px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1Qt6?ver=c9c5&amp;w=510&amp;h=510&amp;q=76&amp;m=6&amp;f=jpg"><source data-dcnode-id="868" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1Qt6?ver=c9c5&amp;w=710&amp;h=710&amp;q=76&amp;m=6&amp;f=jpg" media="(min-width:1200px) and (max-width:1599px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1Qt6?ver=c9c5&amp;w=710&amp;h=710&amp;q=76&amp;m=6&amp;f=jpg"><img _id="MD1Qt5" alt="January Gardening Tips" class="msc-main_image msc_image ls-is-cached lazyloaded" copyright="" data-dcnode-id="867" data-src="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1Qt6?ver=c9c5&amp;m=6&amp;q=76" requestcontext="[object Object]" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1Qt6%3Fver%3Dc9c5%26m%3D6%26q%3D76&amp;raw" title=""></picture></div><div class="ms-content-block__details" data-dcnode-id="858"><h2 class="ms-content-block__title" contenteditable="false" data-dcnode-id="863" disabled=""><span data-dcnode-id="864" instrument_node="">Garden Room</span></h2><div class="ms-content-block__text" contenteditable="false" data-dcnode-id="859" disabled=""><ul data-dcnode-id="860"><li data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Once all the decorations come down, the house can look a little bare. Inject vibrant fresh colour with new-season houseplants that will revitalise your home. Choose from our range of fragrant flowering plants, handsome foliage, hanging and trailing plants, ferns and succulents. Look out for air-purifying plants to support a healthier environment in your home or office space.&nbsp;</span></li></ul></div></div></div></div><div class="col-12" data-dcnode-id="837"><div class="ms-content-block two-column-layout portrait imageplacement__right" data-dcnode-id="838" data-m-layout="portrait-two-column" data-m-t="content-block" id=""><div class="ms-content-block__image" data-dcnode-id="850"><picture data-dcnode-id="851"><source data-dcnode-id="855" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1VFM?ver=f547&amp;w=385&amp;h=385&amp;q=76&amp;m=6&amp;f=jpg" media="(max-width:768px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1VFM?ver=f547&amp;w=385&amp;h=385&amp;q=76&amp;m=6&amp;f=jpg"><source data-dcnode-id="854" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1VFM?ver=f547&amp;w=510&amp;h=510&amp;q=76&amp;m=6&amp;f=jpg" media="(min-width:769px) and (max-width:1199px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1VFM?ver=f547&amp;w=510&amp;h=510&amp;q=76&amp;m=6&amp;f=jpg"><source data-dcnode-id="853" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1VFM?ver=f547&amp;w=710&amp;h=710&amp;q=76&amp;m=6&amp;f=jpg" media="(min-width:1200px) and (max-width:1599px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1VFM?ver=f547&amp;w=710&amp;h=710&amp;q=76&amp;m=6&amp;f=jpg"><img _id="MD1VFK" alt="January Gardening Tips" class="msc-main_image msc_image ls-is-cached lazyloaded" copyright="" data-dcnode-id="852" data-src="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1VFM?ver=f547&amp;m=6&amp;q=76" requestcontext="[object Object]" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1VFM%3Fver%3Df547%26m%3D6%26q%3D76&amp;raw" title=""></picture></div><div class="ms-content-block__details" data-dcnode-id="839"><h2 class="ms-content-block__title" contenteditable="false" data-dcnode-id="848" disabled=""><span data-dcnode-id="849" instrument_node="">Terrace Garden</span></h2><div class="ms-content-block__text" contenteditable="false" data-dcnode-id="840" disabled=""><ul data-dcnode-id="841"><li data-dcnode-id="845"><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Start thinking about your bedding displays for the coming summer. The most economical way to fill your tubs and baskets with your summer favourites is to grow your own from seeds or our young plant range. Pot up into growing trays or fibre pots, using seed and cutting compost, and grow on in a warm frost-free greenhouse, well-lit windowsill or conservatory until all risk of frost has passed.&nbsp;</span></p></li><li data-dcnode-id="842"><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Summer Flowering Bulbs are available from mid-January. Perfect for garden borders and patio containers alike, chose from Begonias, Dahlias, Gladioli and more for fabulous summer colour with very little effort. On mild days plant patio pots with Oriental Lily bulbs to fill your garden with their magnificent flowers and heady fragrance.&nbsp;</span></p></li></ul></div></div></div></div><div class="col-12" data-dcnode-id="817"><div class="ms-content-block two-column-layout portrait imageplacement__left" data-dcnode-id="818" data-m-layout="portrait-two-column" data-m-t="content-block" id=""><div class="ms-content-block__image" data-dcnode-id="831"><picture data-dcnode-id="832"><source data-dcnode-id="836" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4K?ver=87f5&amp;w=385&amp;h=385&amp;q=76&amp;m=6&amp;f=jpg" media="(max-width:768px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4K?ver=87f5&amp;w=385&amp;h=385&amp;q=76&amp;m=6&amp;f=jpg"><source data-dcnode-id="835" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4K?ver=87f5&amp;w=510&amp;h=510&amp;q=76&amp;m=6&amp;f=jpg" media="(min-width:769px) and (max-width:1199px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4K?ver=87f5&amp;w=510&amp;h=510&amp;q=76&amp;m=6&amp;f=jpg"><source data-dcnode-id="834" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4K?ver=87f5&amp;w=710&amp;h=710&amp;q=76&amp;m=6&amp;f=jpg" media="(min-width:1200px) and (max-width:1599px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4K?ver=87f5&amp;w=710&amp;h=710&amp;q=76&amp;m=6&amp;f=jpg"><img _id="MD1T4G" alt="January Gardening Tips" class="msc-main_image msc_image ls-is-cached lazyloaded" copyright="" data-dcnode-id="833" data-src="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4K?ver=87f5&amp;m=6&amp;q=76" requestcontext="[object Object]" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4K%3Fver%3D87f5%26m%3D6%26q%3D76&amp;raw" title=""></picture></div><div class="ms-content-block__details" data-dcnode-id="819"><h2 class="ms-content-block__title" contenteditable="false" data-dcnode-id="829" disabled=""><span data-dcnode-id="830" instrument_node=""> Beds and Borders</span></h2><div class="ms-content-block__text" contenteditable="false" data-dcnode-id="820" disabled=""><ul data-dcnode-id="822"><li data-dcnode-id="826"><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">As weather allows, now is the perfect time to plant new trees and hedges, creating wildlife friendly structure and boundaries to your garden. If you are planning on moving any plants in your garden, choose a frost-free day while they're still dormant to allow them time to establish ready for the coming spring.</span></p></li><li data-dcnode-id="823"><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">On frost free days take the opportunity to prune deciduous trees and shrubs to maintain their shape. In the event of heavy snowfall, use a broom to gently brush off prized conifers, topiary and evergreen shrubs, helping to prevent damage under the extra weight.&nbsp; Protect any of your more tender plants from cold and wind with frost protection fleece or jackets.&nbsp;</span></p></li></ul><span data-dcnode-id="821" instrument_node=""></span></div></div></div></div><div class="col-12" data-dcnode-id="798"><div class="ms-content-block two-column-layout portrait imageplacement__right" data-dcnode-id="799" data-m-layout="portrait-two-column" data-m-t="content-block" id=""><div class="ms-content-block__image" data-dcnode-id="811"><picture data-dcnode-id="812"><source data-dcnode-id="816" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4L?ver=6f15&amp;w=385&amp;h=385&amp;q=76&amp;m=6&amp;f=jpg" media="(max-width:768px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4L?ver=6f15&amp;w=385&amp;h=385&amp;q=76&amp;m=6&amp;f=jpg"><source data-dcnode-id="815" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4L?ver=6f15&amp;w=510&amp;h=510&amp;q=76&amp;m=6&amp;f=jpg" media="(min-width:769px) and (max-width:1199px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4L?ver=6f15&amp;w=510&amp;h=510&amp;q=76&amp;m=6&amp;f=jpg"><source data-dcnode-id="814" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4L?ver=6f15&amp;w=710&amp;h=710&amp;q=76&amp;m=6&amp;f=jpg" media="(min-width:1200px) and (max-width:1599px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4L?ver=6f15&amp;w=710&amp;h=710&amp;q=76&amp;m=6&amp;f=jpg"><img _id="MD1T4J" alt="January Gardening Tips" class="msc-main_image msc_image ls-is-cached lazyloaded" copyright="" data-dcnode-id="813" data-src="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4L?ver=6f15&amp;m=6&amp;q=76" requestcontext="[object Object]" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD1T4L%3Fver%3D6f15%26m%3D6%26q%3D76&amp;raw" title=""></picture></div><div class="ms-content-block__details" data-dcnode-id="800"><h2 class="ms-content-block__title" contenteditable="false" data-dcnode-id="809" disabled=""><span data-dcnode-id="810" instrument_node="">Cottage Garden</span></h2><div class="ms-content-block__text" contenteditable="false" data-dcnode-id="801" disabled=""><ul data-dcnode-id="802"><li data-dcnode-id="806"><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Sow Sweet Peas under cover now to make strong plants for the earliest blooms. Sow two seeds into each re-usable deep root trainer or growing pot, keeping an eye out for mice, which have a taste for germinating pea seed.&nbsp;</span></p></li><li data-dcnode-id="803"><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Hellebores are full of bud now ready to reveal their welcome blooms. Carefully cut off the foliage at the base to show the flowers in all their glory. Continue to cut back and tidy faded cottage garden perennials but leave grasses and seed heads for their architectural interest, particularly beautiful on frosty mornings, but also to feed winter birds and shelter overwintering insects.&nbsp;</span></p></li></ul></div></div></div></div><div class="col-12" data-dcnode-id="777"><div class="ms-content-block two-column-layout portrait imageplacement__left" data-dcnode-id="778" data-m-layout="portrait-two-column" data-m-t="content-block" id=""><div class="ms-content-block__image" data-dcnode-id="792"><picture data-dcnode-id="793"><source data-dcnode-id="797" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD132O?ver=969a&amp;w=385&amp;h=385&amp;q=76&amp;m=6&amp;f=jpg" media="(max-width:768px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD132O?ver=969a&amp;w=385&amp;h=385&amp;q=76&amp;m=6&amp;f=jpg"><source data-dcnode-id="796" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD132O?ver=969a&amp;w=510&amp;h=510&amp;q=76&amp;m=6&amp;f=jpg" media="(min-width:769px) and (max-width:1199px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD132O?ver=969a&amp;w=510&amp;h=510&amp;q=76&amp;m=6&amp;f=jpg"><source data-dcnode-id="795" data-srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD132O?ver=969a&amp;w=710&amp;h=710&amp;q=76&amp;m=6&amp;f=jpg" media="(min-width:1200px) and (max-width:1599px)" srcset="https://images-eu-prod.cms.commerce.dynamics.com/cms/api/rsbnfrmlpw/imageFileData/MD132O?ver=969a&amp;w=710&amp;h=710&am
