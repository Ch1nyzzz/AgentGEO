</span><div data-dcnode-id="882" id="pico"><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Whether you want to save money or be more environmentally friendly (or just love being crafty), you can avoid harsh chemicals in the garden by using&nbsp;homemade remedies to fertilize, kill weeds, cure&nbsp;plant ailments, and improve&nbsp;soil.</span></p><div data-dcnode-id="1151" data-inserter-version="2" id="ezoic-pub-ad-placeholder-808"></div><span data-dcnode-id="1150" instrument_node=""> </span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Honestly, you can treat all sorts of garden maladies by using less: less chemicals, less ingredients, and less worry. &nbsp;With common ingredients (many of which you already have in your kitchen), you can make a batch, store it easily, and have it on hand for the next garden crisis. Natural solutions are safe, economical, and best of all, successful.</span></p><span data-dcnode-id="1147" instrument_node=""> </span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Read on for step-by-step instructions to make six of my favorite homemade garden remedies:</span></p><div data-dcnode-id="1144" data-inserter-version="2" id="ezoic-pub-ad-placeholder-816"></div><span data-dcnode-id="1143" instrument_node=""> </span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Photography by Mimi Giboin for Gardenista.</span></p><span data-dcnode-id="1140" instrument_node=""> </span><figure data-dcnode-id="1136"><img alt="To measure, mix, and store our homemade garden remedies we use science beakers (we have a thing for them), recycled jars, and clear glass bottles." class="size-post-content wp-image-951812" data-dcnode-id="1139" height="515" loading="lazy" sizes="(max-width: 733px) 100vw, 733px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-cropped-mimi-giboin-733x515.jpg&amp;raw" srcset="https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-cropped-mimi-giboin-733x515.jpg 733w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-cropped-mimi-giboin-300x211.jpg 300w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-cropped-mimi-giboin-768x539.jpg 768w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-cropped-mimi-giboin-492x345.jpg 492w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-cropped-mimi-giboin.jpg 863w" width="733"><figcaption data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node=""> Above: To measure, mix, and store our homemade garden remedies we use science beakers (we have a thing for them), recycled jars, and clear glass bottles.</span></figcaption></figure><span data-dcnode-id="1135" instrument_node=""> </span><h2 data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">1. Flower Fertilizer</span></h2><span data-dcnode-id="1132" instrument_node=""> </span><figure data-dcnode-id="1125"><img alt="We dissolved Epsom salts in&nbsp;warm water to make&nbsp;a fertilizer that encourages plants to bloom. A glass Vardegan Measuring Cup is \$\2.49 at Ikea." class="size-post-content wp-image-945381" data-dcnode-id="1131" height="1099" loading="lazy" sizes="(max-width: 733px) 100vw, 733px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-epsom-salts-1-mimi-giboin-733x1099.jpg&amp;raw" srcset="https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-epsom-salts-1-mimi-giboin-733x1099.jpg 733w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-epsom-salts-1-mimi-giboin-200x300.jpg 200w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-epsom-salts-1-mimi-giboin-768x1152.jpg 768w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-epsom-salts-1-mimi-giboin-683x1024.jpg 683w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-epsom-salts-1-mimi-giboin-1466x2199.jpg 1466w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-epsom-salts-1-mimi-giboin-492x738.jpg 492w" width="733"><figcaption data-dcnode-id="1126"><span data-dcnode-id="1130" instrument_node=""> Above: We dissolved Epsom salts in&nbsp;warm water to make&nbsp;a fertilizer that encourages plants to bloom. A glass </span><a class="tracked-click" data-dcnode-id="1128" data-tracker="{&quot;label&quot;:&quot;http:\/\/www.ikea.com\/us\/en\/catalog\/products\/90330398\/&quot;,&quot;category&quot;:&quot;Outbound&quot;,&quot;action&quot;:&quot;click&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ikea.com/us/en/catalog/products/90330398/" target="_blank"><span data-dcnode-id="1129" instrument_node="">Vardegan Measuring Cup</span></a><span data-dcnode-id="1127" instrument_node=""> is $2.49 at Ikea.</span></figcaption></figure><span data-dcnode-id="1124" instrument_node=""> </span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Epsom salts have&nbsp;been used in gardens for decades as a secret weapon because they help increase nutrient uptake, are&nbsp;water soluble, and leave no chemical residue. The magnesium in Epsom salts&nbsp;helps a&nbsp;plant use the phosphorus and nitrogen in the soil which is an important component in fertilizers. This is a great mixture and alternative to processed chemical-infused fertilizers.</span></p><span data-dcnode-id="1121" instrument_node=""> </span><p data-dcnode-id="1118"><strong data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Ingredients:</span></strong></p><div data-dcnode-id="1117" data-inserter-version="2" id="ezoic-pub-ad-placeholder-817"></div><span data-dcnode-id="1116" instrument_node=""> </span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">1 gallon of warm water, 2 tablespoons Epsom salts, and 1 cup unsweetened apple juice.</span></p><span data-dcnode-id="1113" instrument_node=""> </span><p data-dcnode-id="1110"><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">How to Make&nbsp;It:</span></strong></p><span data-dcnode-id="1109" instrument_node=""> </span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Dissolve the Epsom salts in the warm water, then add the apple juice. Combine the ingredients in a clean container of your choice and use right away.</span></p><span data-dcnode-id="1106" instrument_node=""> </span><p data-dcnode-id="1103"><strong data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">How to Use It:</span></strong></p><div data-dcnode-id="1102" data-inserter-version="2" id="ezoic-pub-ad-placeholder-818"></div><span data-dcnode-id="1101" instrument_node=""> </span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Poke holes into pre-moistened soil around the farthest edge of your plants and pour in the mixture. Use this combination once a month for best results.</span></p><span data-dcnode-id="1098" instrument_node=""> </span><figure data-dcnode-id="1091"><img alt="For more tips on using Epsom salts in the garden, see Gardening \10\1: How to Add Epsom Salts to Soil." class="size-post-content wp-image-945571" data-dcnode-id="1097" height="1099" loading="lazy" sizes="(max-width: 733px) 100vw, 733px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-dish-soap-mimi-giboin-733x1099.jpg&amp;raw" srcset="https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-dish-soap-mimi-giboin-733x1099.jpg 733w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-dish-soap-mimi-giboin-200x300.jpg 200w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-dish-soap-mimi-giboin-768x1152.jpg 768w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-dish-soap-mimi-giboin-683x1024.jpg 683w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-dish-soap-mimi-giboin-1466x2199.jpg 1466w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-dish-soap-mimi-giboin-492x738.jpg 492w" width="733"><figcaption data-dcnode-id="1092"><span data-dcnode-id="1096" instrument_node=""> Above: For more tips on using Epsom salts in the garden, see </span><a data-dcnode-id="1094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenista.com/posts/gardening-101-how-to-add-epsom-salts-to-soil/"><span data-dcnode-id="1095" instrument_node="">Gardening 101: How to Add Epsom Salts to Soil</span></a><span data-dcnode-id="1093" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="1090" instrument_node=""> </span><h2 data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">2. Bug Repellent and Soil&nbsp;Boost</span></h2><span data-dcnode-id="1087" instrument_node=""> </span><figure data-dcnode-id="1083"><img alt="Used coffee grounds are re-purposed into a natural fertilizer and/or a repellent." class="size-post-content wp-image-945387" data-dcnode-id="1086" height="1100" loading="lazy" sizes="(max-width: 733px) 100vw, 733px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-coffee-grounds-mimi-giboin-733x1100.jpg&amp;raw" srcset="https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-coffee-grounds-mimi-giboin-733x1100.jpg 733w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-coffee-grounds-mimi-giboin-200x300.jpg 200w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-coffee-grounds-mimi-giboin-768x1152.jpg 768w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-coffee-grounds-mimi-giboin-683x1024.jpg 683w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-coffee-grounds-mimi-giboin-1466x2199.jpg 1466w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-coffee-grounds-mimi-giboin-492x738.jpg 492w" width="733"><figcaption data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node=""> Above: Used coffee grounds are re-purposed into a natural fertilizer and/or a repellent.</span></figcaption></figure><span data-dcnode-id="1082" instrument_node=""> </span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">After your morning cup of coffee, save the grounds instead of throwing them out. Coffee grounds can act as a natural creature repellent and also&nbsp;work wonders as a fertilizer. And did you know that San Francisco’s famed AT &amp;T Park uses coffee grounds donated from Peet’s Coffee &amp; Tea to fertilize its&nbsp;planter beds? A total home-run idea (sorry).</span></p><span data-dcnode-id="1079" instrument_node=""> </span><p data-dcnode-id="1075"><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Ingredients</span></strong><span data-dcnode-id="1076" instrument_node="">:</span></p><span data-dcnode-id="1074" instrument_node=""> </span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Used coffee grounds.</span></p><div data-dcnode-id="1071" data-inserter-version="2" id="ezoic-pub-ad-placeholder-819"></div><span data-dcnode-id="1070" instrument_node=""> </span><p data-dcnode-id="1066"><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">How to Make&nbsp;It</span></strong><span data-dcnode-id="1067" instrument_node="">:</span></p><span data-dcnode-id="1065" instrument_node=""> </span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Brew your coffee as usual but save the cooled grounds in a clean, air-tight container.</span></p><span data-dcnode-id="1062" instrument_node=""> </span><p data-dcnode-id="1058"><strong data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">How to Use It</span></strong><span data-dcnode-id="1059" instrument_node="">:</span></p><span data-dcnode-id="1057" instrument_node=""> </span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">For a natural gopher repellent, simply spread the grounds over all active holes. Chances are the gopher will not return to the holes until the grounds disintegrate. Deer are also said to dislike coffee grounds so you could experiment with spreading it around your tender, tasty plants.</span></p><div data-dcnode-id="1054" data-inserter-version="2" id="ezoic-pub-ad-placeholder-820"></div><span data-dcnode-id="1053" instrument_node=""> </span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">For a natural soil amendment, sprinkle and spread the coffee grounds over your soil for added nutrients. The grounds will also help with soil drainage and oxidation. Tip: acid-loving plants like blueberries, azaleas, and tomatoes love used coffee grounds.</span></p><span data-dcnode-id="1050" instrument_node=""> </span><h2 data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">3. Mildew Treatment</span></h2><span data-dcnode-id="1047" instrument_node=""> </span><figure data-dcnode-id="1043"><img alt="We mixed plain yogurt and water to make a spray to treat rose mildew." class="size-post-content wp-image-945529" data-dcnode-id="1046" height="1099" loading="lazy" sizes="(max-width: 733px) 100vw, 733px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-mimi-giboin-733x1099.jpg&amp;raw" srcset="https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-mimi-giboin-733x1099.jpg 733w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-mimi-giboin-200x300.jpg 200w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-mimi-giboin-768x1152.jpg 768w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-mimi-giboin-683x1024.jpg 683w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-mimi-giboin-1466x2199.jpg 1466w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-mimi-giboin-492x738.jpg 492w" width="733"><figcaption data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node=""> Above: We mixed plain yogurt and water to make a spray to treat rose mildew.</span></figcaption></figure><span data-dcnode-id="1042" instrument_node=""> </span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">I love roses like the next gardener, but I detest the powdery mildew that forms on their&nbsp;leaves. This unsightly condition also afflicts other plants, but luckily&nbsp;there is a natural treatment.</span></p><span data-dcnode-id="1039" instrument_node=""> </span><p data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">I learned this remedy from a client of mine who tested this mixture on her roses, had success, and then retested with similar successful results. Now she uses the yogurt mix as a preventive measure and reports it is very effective.</span></p><span data-dcnode-id="1036" instrument_node=""> </span><p data-dcnode-id="1032"><strong data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Ingredients</span></strong><span data-dcnode-id="1033" instrument_node="">:</span></p><div data-dcnode-id="1031" data-inserter-version="2" id="ezoic-pub-ad-placeholder-821"></div><span data-dcnode-id="1030" instrument_node=""> </span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Full-fat plain yogurt and water.</span></p><span data-dcnode-id="1027" instrument_node=""> </span><p data-dcnode-id="1023"><strong data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">How to Make&nbsp;It</span></strong><span data-dcnode-id="1024" instrument_node="">:</span></p><span data-dcnode-id="1022" instrument_node=""> </span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Mix 1 tablespoon of plain, unsweetened yogurt in a cup of water, then pour into a spray bottle.</span></p><span data-dcnode-id="1019" instrument_node=""> </span><p data-dcnode-id="1015"><strong data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Tip:</span></strong><span data-dcnode-id="1016" instrument_node=""> You can also use the thin, watery liquid that collects at the top of your yogurt (it’s called whey) because it is also full of healthy microbes.</span></p><div data-dcnode-id="1014" data-inserter-version="2" id="ezoic-pub-ad-placeholder-822"></div><span data-dcnode-id="1013" instrument_node=""> </span><p data-dcnode-id="1009"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">How to Use It</span></strong><span data-dcnode-id="1010" instrument_node="">:</span></p><span data-dcnode-id="1008" instrument_node=""> </span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">After dusk when temperatures have cooled, spray any rose leaves that are affected by powdery mildew and black spot. This solution can be sprayed daily as a preventive measure or to treat a current problem. My thought is that the good microbes in the yogurt dominate and win over the harmful pathological organisms. The milk forms a thin layer over the leaf, discouraging disease from developing.</span></p><span data-dcnode-id="1005" instrument_node=""> </span><figure data-dcnode-id="998"><img alt="We poured our mildew treatment into a laboratory flask, but we also keep on hand a supply of \16-ounce Refillable Glass Spray Bottles (\$\10.98 each at Amazon)." class="size-post-content wp-image-945534" data-dcnode-id="1004" height="1099" loading="lazy" sizes="(max-width: 733px) 100vw, 733px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-2-mimi-giboin-733x1099.jpg&amp;raw" srcset="https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-2-mimi-giboin-733x1099.jpg 733w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-2-mimi-giboin-200x300.jpg 200w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-2-mimi-giboin-768x1152.jpg 768w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-2-mimi-giboin-683x1024.jpg 683w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-2-mimi-giboin-1466x2199.jpg 1466w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-yogurt-spray-2-mimi-giboin-492x738.jpg 492w" width="733"><figcaption data-dcnode-id="999"><span data-dcnode-id="1003" instrument_node=""> Above: We poured our mildew treatment into a laboratory flask, but we also keep on hand a supply of 16-ounce </span><a class="tracked-click" data-dcnode-id="1001" data-tracker="{&quot;label&quot;:&quot;https:\/\/www.amazon.com\/Glass-Spray-Bottle-Refillable-Aromatherapy\/dp\/B00MBWBF7M\/ref=sr_1_1_s_it?s=hpc&amp;ie=UTF8&amp;qid=1496355595&amp;sr=1-1&amp;keywords=clear+glass+spray+bottle&quot;,&quot;category&quot;:&quot;Outbound&quot;,&quot;action&quot;:&quot;click&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Glass-Spray-Bottle-Refillable-Aromatherapy/dp/B00MBWBF7M/ref%3Dsr_1_1_s_it%3Fs%3Dhpc%26ie%3DUTF8%26qid%3D1496355595%26sr%3D1-1%26keywords%3Dclear%2Bglass%2Bspray%2Bbottle" target="_blank"><span data-dcnode-id="1002" instrument_node="">Refillable Glass Spray Bottles</span></a><span data-dcnode-id="1000" instrument_node=""> ($10.98 each at Amazon).</span></figcaption></figure><span data-dcnode-id="997" instrument_node=""> </span><h2 data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">4. Weed Killer</span></h2><span data-dcnode-id="994" instrument_node=""> </span><figure data-dcnode-id="990"><img alt="White vinegar is a handy homemade weed killer. Keep a bottle in a pocket of your garden tote." class="size-post-content wp-image-945613" data-dcnode-id="993" height="1100" loading="lazy" sizes="(max-width: 733px) 100vw, 733px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-vinegar-2-mimi-giboin-733x1100.jpg&amp;raw" srcset="https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-vinegar-2-mimi-giboin-733x1100.jpg 733w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-vinegar-2-mimi-giboin-200x300.jpg 200w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-vinegar-2-mimi-giboin-768x1152.jpg 768w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-vinegar-2-mimi-giboin-683x1024.jpg 683w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-vinegar-2-mimi-giboin-1466x2199.jpg 1466w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-vinegar-2-mimi-giboin-492x738.jpg 492w" width="733"><figcaption data-dcnode-id="991"><span data-dcnode-id="992" instrument_node=""> Above: White vinegar is a handy homemade weed killer. Keep a bottle in a pocket of your garden tote.</span></figcaption></figure><span data-dcnode-id="989" instrument_node=""> </span><p data-dcnode-id="985"><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Ingredients</span></strong><span data-dcnode-id="986" instrument_node="">:</span></p><span data-dcnode-id="984" instrument_node=""> </span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Undiluted household white vinegar.</span></p><div data-dcnode-id="981" data-inserter-version="2" id="ezoic-pub-ad-placeholder-823"></div><span data-dcnode-id="980" instrument_node=""> </span><p data-dcnode-id="976"><strong data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">How to Make&nbsp;It</span></strong><span data-dcnode-id="977" instrument_node="">:</span></p><span data-dcnode-id="975" instrument_node=""> </span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Either use the vinegar straight, or you can add one teaspoon of liquid Castile soap to help the mixture stick to the leaves.</span></p><span data-dcnode-id="972" instrument_node=""> </span><p data-dcnode-id="968"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">How to Use It</span></strong><span data-dcnode-id="969" instrument_node="">:</span></p><span data-dcnode-id="967" instrument_node=""> </span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Spray the vinegar directly, and liberally, on the weed intruders. Because the vinegar will kill the leaves and not always the roots, you may need to reapply. The best time of day to use this natural week killer is on a hot and sunny day. The theory is that the acid in the vinegar burns the weeds and will kill them in a matter of minutes to days. This natural remedy is far superior to the store-bought weed killers that are extremely toxic to people, creatures, and our water supply.</span></p><span data-dcnode-id="964" instrument_node=""> </span><h2 data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">5. Soil Amendment</span></h2><span data-dcnode-id="961" instrument_node=""> </span><figure data-dcnode-id="954"><img alt="We wash eggshells and allow them to dry overnight before storing them in a jar. For more tips, see Gardening \10\1: How to Use Eggshells in the Garden." class="size-post-content wp-image-945541" data-dcnode-id="960" height="1100" loading="lazy" sizes="(max-width: 733px) 100vw, 733px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-egg-shells-mimi-giboin-733x1100.jpg&amp;raw" srcset="https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-egg-shells-mimi-giboin-733x1100.jpg 733w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-egg-shells-mimi-giboin-200x300.jpg 200w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-egg-shells-mimi-giboin-768x1152.jpg 768w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-egg-shells-mimi-giboin-683x1024.jpg 683w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-egg-shells-mimi-giboin-1466x2199.jpg 1466w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-egg-shells-mimi-giboin-492x738.jpg 492w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-egg-shells-mimi-giboin.jpg 2000w" width="733"><figcaption data-dcnode-id="955"><span data-dcnode-id="959" instrument_node=""> Above: We wash eggshells and allow them to dry overnight before storing them in a jar. For more tips, see </span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenista.com/posts/diy-5-ideas-to-use-eggshells-in-the-garden-pest-control-mulch-fertilizer/"><span data-dcnode-id="958" instrument_node="">Gardening 101: How to Use Eggshells in the Garden</span></a><span data-dcnode-id="956" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="953" instrument_node=""> </span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Did you know that eggshells are high in calcium and other important minerals that nourish your garden? It is this calcium that helps develop strong cell walls, or “plant bones.”</span></p><div data-dcnode-id="950" data-inserter-version="2" id="ezoic-pub-ad-placeholder-824"></div><span data-dcnode-id="949" instrument_node=""> </span><p data-dcnode-id="945"><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Ingredients</span></strong><span data-dcnode-id="946" instrument_node="">:</span></p><span data-dcnode-id="944" instrument_node=""> </span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Washed eggshells</span></p><span data-dcnode-id="941" instrument_node=""> </span><p data-dcnode-id="937"><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">How to Make&nbsp;It</span></strong><span data-dcnode-id="938" instrument_node="">:</span></p><span data-dcnode-id="936" instrument_node=""> </span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Allow eggshells to dry and them put them in a mortar and pestle and grind until they are crunched up like bread crumbs.</span></p><span data-dcnode-id="933" instrument_node=""> </span><p data-dcnode-id="929"><strong data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">How to Use It</span></strong><span data-dcnode-id="930" instrument_node="">:</span></p><div data-dcnode-id="928" data-inserter-version="2" id="ezoic-pub-ad-placeholder-825"></div><span data-dcnode-id="927" instrument_node=""> </span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Add the crushed eggshells to your soil and till in. This is best done in the fall and spring.</span></p><span data-dcnode-id="924" instrument_node=""> </span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">You can also do a more direct approach by scratching the egg shells into the top 1&nbsp;inch of the soil around plants, like roses, and then water thoroughly.</span></p><span data-dcnode-id="921" instrument_node=""> </span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Tomato plants especially love these calcium-rich shell crumbs if added at planting time.</span></p><span data-dcnode-id="918" instrument_node=""> </span><figure data-dcnode-id="914"><img alt="As with all homemade creations, results may vary, and what works in one garden may not be as effective in another. But with that said, it never hurts to try. Your garden, and the environment, will thank you." class="size-post-content wp-image-945583" data-dcnode-id="917" height="489" loading="lazy" sizes="(max-width: 733px) 100vw, 733px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-ingredients-mimi-giboin-733x489.jpg&amp;raw" srcset="https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-ingredients-mimi-giboin-733x489.jpg 733w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-ingredients-mimi-giboin-300x200.jpg 300w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-ingredients-mimi-giboin-768x512.jpg 768w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-ingredients-mimi-giboin-1024x683.jpg 1024w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-ingredients-mimi-giboin-1466x977.jpg 1466w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-ingredients-mimi-giboin-688x459.jpg 688w, https://media.gardenista.com/wp-content/uploads/2017/06/homemade-garden-remedies-ingredients-mimi-giboin-492x328.jpg 492w" width="733"><figcaption data-dcnode-id="915"><span data-dcnode-id="916" instrument_node=""> Above: As with all homemade creations, results may vary, and what works in one garden may not be as effective in another. But with that said, it never hurts to try. Your garden, and the environment, will thank you.</span></figcaption></figure><span data-dcnode-id="913" instrument_node=""> </span><p data-dcnode-id="905"><span data-dcnode-id="912" instrument_node="">N.B.: We’ve done a deep dive into the </span><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenista.com/posts/landscaping-101-pros-and-cons-of-homemade-weed-killer-garden-herbicide-roundup/"><span data-dcnode-id="911" instrument_node="">Pros and Cons of Homemade Weed Killer</span></a><span data-dcnode-id="909" instrument_node="">s; see what Justine has to say on the subject </span><a data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenista.com/posts/landscaping-101-pros-and-cons-of-homemade-weed-killer-garden-herbicide-roundup/"><span data-dcnode-id="908" instrument_node="">here</span></a><span data-dcnode-id="906" instrument_node="">.</span></p><span data-dcnode-id="904" instrument_node=""> </span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">For more ways to keep plants healthy, see:</span></p><div data-dcnode-id="901" data-inserter-version="2" id="ezoic-pub-ad-placeholder-826"></div><span data-dcnode-id="900" instrument_node=""> </span><ul data-dcnode-id="884"><span data-dcnode-id="899" instrument_node=""> </span><li data-dcnode-id="895"><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenista.com/posts/goodbye-fungus-gnats-pest-free-potting-soil/"><span data-dcnode-id="898" instrument_node="">Goodbye, Fungus Gnats: Pest-Free Potting Soil</span></a><span data-dcnode-id="896" instrument_node="">.</span></li><span data-dcnode-id="894" instrument_node=""> </span><li data-dcnode-id="891"><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenista.com/posts/ </span><img alt="Most of our much loved vegetables for the home garden are semi-tropical or tropical and need a minimum temperature in order to thrive. If you put these warm-weather plants out too early and your area has a cold snap or a hard freeze, the cold could permanently stunt or even kill those plants. The plants that fall into this category are tomatoes, peppers, eggplants, basil, zucchini, watermelons, cucumbers, sweet potatoes, okra, and corn.
