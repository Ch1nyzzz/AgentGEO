</span><h2 data-dcnode-id="9159" style="text-align: center;"><span data-dcnode-id="9160" instrument_node="">Trees for Smaller Gardens in Standard Sizes</span></h2><span data-dcnode-id="9158" instrument_node="">
</span><h3 data-dcnode-id="9154" style="text-align: center;"><span data-dcnode-id="9157" instrument_node="">Most standard trees are only delivered bareroot, during the winter planting season (Nov-March). </span><br data-dcnode-id="9156"><span data-dcnode-id="9155" style="text-decoration: underline;"></span></h3><span data-dcnode-id="9153" instrument_node="">
</span><p data-dcnode-id="9149"><strong data-dcnode-id="9151"><span data-dcnode-id="9152" instrument_node="">Small garden trees</span></strong><span data-dcnode-id="9150" instrument_node=""> are essential in most planting schemes, as they give your garden height and structure without taking too much space and light. Many in our range put on some of the best displays of flower and foliage in spring and will light up the smallest space with wonderful autumn colouring. These trees are either small overall, or tall and narrow.</span></p><p data-dcnode-id="9146" style="text-align: center;"><button class="sub-category-buy" data-dcnode-id="9147" onclick="setLocation('#SmallGarden')" type="button"><span data-dcnode-id="9148" instrument_node="">Scroll Down to Browse </span></button></p><span data-dcnode-id="9145" instrument_node="">
</span><p data-dcnode-id="9140"><span data-dcnode-id="9144" instrument_node="">Browse the other </span><a data-dcnode-id="9142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ashridgetrees.co.uk/trees" target="_blank"><span data-dcnode-id="9143" instrument_node="">garden trees</span></a><span data-dcnode-id="9141" instrument_node=""> in our range.</span></p><span data-dcnode-id="9139" instrument_node="">
</span><p data-dcnode-id="9137" id="SmallGarden"><span data-dcnode-id="9138" instrument_node="">The planting and delivery season for bareroot trees is November - March.&nbsp;</span></p><span data-dcnode-id="9136" instrument_node="">
</span><p data-dcnode-id="9129"><strong data-dcnode-id="9134"><span data-dcnode-id="9135" instrument_node="">Standard trees are measured by their girth</span></strong><span data-dcnode-id="9133" instrument_node="">&nbsp;1 metre above the ground, and young&nbsp;</span><strong data-dcnode-id="9131"><span data-dcnode-id="9132" instrument_node="">saplings are measured by height</span></strong><span data-dcnode-id="9130" instrument_node="">. Therefore, a 6/8cm Standard tree is much bigger than an 60/80cm sapling tree. If a tree is available in both sizes, it will be noted in the product descriptions.</span></p><span data-dcnode-id="9128" instrument_node="">
</span><p data-dcnode-id="9125"><span data-dcnode-id="9126"><span data-dcnode-id="9127" instrument_node="">All our trees are covered by our no-quibble 1 Year Replacement Guarantee, which means you can order with complete confidence. Best advice &amp; friendly support throughout. Please note that there is always a delivery charge for standard sized trees.&nbsp;</span></span></p><span data-dcnode-id="9124" instrument_node=""> </span></div><span data-dcnode-id="9122" instrument_node="">

</span><div class="message" data-dcnode-id="3853"><span data-dcnode-id="3856" instrument_node="">Thank you Ashridge for the splendid dahlia tubers. I am delighted and pleasantly surprised to have received whole clumps.
The lavender plants I bought from you have lots of new growth. Having been in the same garden for 30 years I don’t often need to buy anything but, even as an experienced gardened, I find your newsletter and monthly tips extremely interesting and my daughter and son-in-law who are new to gardening are finding it to be a wonderful learning resource.

</span><div class="message" data-dcnode-id="3831"><span data-dcnode-id="3834" instrument_node="">just a quick note to say thank you for keeping me in touch with the delivery of my blackthorn trees. They have arrived, well packed, very healthy and we are both very impressed with your service. thank you again.</span><span data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">Pamela Kyte</span></span></div><span data-dcnode-id="3830" instrument_node="">
</span></div><span data-dcnode-id="3828" instrument_node="">

</span><div class="message" data-dcnode-id="3820"><span data-dcnode-id="3823" instrument_node="">Thought I’d drop you a line to thank you for the wonderful quince bushes that arrived yesterday. They are really top-notch trees and are already planted in a nice sunny spot. Purely, on the back of this I’ve now ordered these two apples from you, so hope sincerely that they will be similarly really great quality bushes.</span><span data-dcnode-id="3821"><span data-dcnode-id="3822" instrument_node="">Mark Edwards</span></span></div><span data-dcnode-id="3819" instrument_node="">
</span></div><span data-dcnode-id="3817" instrument_node="">
</span></div><span data-dcnode-id="3815" instrument_node="">
</span><div class="content" data-dcnode-id="3805" id="testimonial_7" style="display: none;"><span data-dcnode-id="3814" instrument_node="">
</span><div class="content-wrapper ratings-table" data-dcnode-id="3807"><span data-dcnode-id="3813" instrument_node="">
</span><div class="message" data-dcnode-id="3809"><span data-dcnode-id="3812" instrument_node="">I just wanted to let you know my plants have arrived today as promised. I have unpacked them and they are wonderful, I am so pleased with them. They are much bigger than I expected and in tip-top condition. Thank you so much.
I also think they are really excellent value for money – I buy most of my plants on-line (living in Cornwall the choices are a bit limited) and I had looked for Hydrangea seemannii at my usual on-line supplier but they were so expensive I was a bit put off. Ten pounds per plant more (!) Then I searched around and found you – your plants were considerably cheaper and larger so I was a bit worried they might fall short of the mark. But… absolutely no worries on that front. In fact I bought two seemannii from the other supplier earlier this year (I think they are a very ‘useful’ plant, particularly for someone who lives in a walled garden) so can do a direct comparison. Interestingly, they are smaller than yours now even though they have been in the ground and well cared for, for more than six summer months.
Many thanks, excellent service and terrific plants – I will be back..!</span><span data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">Debbie Frost</span></span></div><span data-dcnode-id="3808" instrument_node="">
</span></div><span data-dcnode-id="3806" instrument_node="">

I cannot thank you enough as these five trees will last a lifetime. Ashridge trees come highly recommended by me.

</span><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Bareroot Plants are only delivered in the winter season, from November to May. Pot Grown plants can be delivered all year round</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="462"><strong data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Advantages of Bareroot plants:</span></strong></p><span data-dcnode-id="461" instrument_node="">
</span><ul data-dcnode-id="448"><span data-dcnode-id="460" instrument_node="">
</span><li data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">You pay less for the same size plants.</span></li><span data-dcnode-id="457" instrument_node="">
</span><li data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">You can carry and plant them easily.</span></li><span data-dcnode-id="454" instrument_node="">

</span><h2 class="green2" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Ashridge Trees: Bareroot plants vs Pot-Grown Explained</span></h2><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Bareroot Plants are only delivered in the winter season, from November to May. Pot Grown plants can be delivered all year round</span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="428"><strong data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Advantages of Bareroot plants:</span></strong></p><span data-dcnode-id="427" instrument_node="">
</span><ul data-dcnode-id="379"><span data-dcnode-id="426" instrument_node="">
</span><li data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">You pay less for the same size plants.</span></li><span data-dcnode-id="423" instrument_node="">
</span><li data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">You can carry and plant them easily.</span></li><span data-dcnode-id="420" instrument_node="">
</span><li data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">You only plant them in winter, so they need less maintenance after planting. The ground is naturally wet for their first few months.</span></li><span data-dcnode-id="417" instrument_node="">
</span><li data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">You get the biggest selection: Many trees are not sold pot-grown.</span></li><span data-dcnode-id="414" instrument_node="">
</span><li data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">They are "asleep" in winter, so this is the best time to transplant any tree or shrub.</span></li><span data-dcnode-id="411" instrument_node="">
</span><li data-dcnode-id="403"><span data-dcnode-id="410" instrument_node="">They use fewer fertilisers &amp; fungicides, less water, less packaging, and less fuel in their production &amp; delivery. </span><br data-dcnode-id="409"><span data-dcnode-id="408" instrument_node=""> </span><br data-dcnode-id="407"><span data-dcnode-id="406" instrument_node=""> </span><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Advantages of Pot Grown plants: </span></strong></li><span data-dcnode-id="402" instrument_node="">
</span><li data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Pot grown plants can be delivered &amp; planted all year round.</span></li><span data-dcnode-id="399" instrument_node="">
</span><li data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Plants with tender roots &amp; larger specimens must be delivered in pots.</span></li><span data-dcnode-id="396" instrument_node="">
</span><li data-dcnode-id="381"><span data-dcnode-id="395" instrument_node="">Plants in pots can be kept for months longer if there is a delay in planting. </span><br data-dcnode-id="394"><span data-dcnode-id="393" instrument_node=""> </span><br data-dcnode-id="392"><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="383"><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Our Advice to You: </span></strong><span data-dcnode-id="388" instrument_node=""> </span><br data-dcnode-id="387"><span data-dcnode-id="386" instrument_node=""> Winter is approaching and you can&nbsp;order bare-root plants now for delivery from November. </span><br data-dcnode-id="385"><br data-dcnode-id="384"></p><span data-dcnode-id="382" instrument_node="">
</span></li><span data-dcnode-id="380" instrument_node="">
</span></ul><span data-dcnode-id="378" instrument_node=""> </span><p align="right" data-dcnode-id="374"><span data-dcnode-id="377" instrument_node=""> </span><a data-dcnode-id="375" href="javascript:void(0);" onclick="hide_bareroot_potgrown_data();"><span data-dcnode-id="376" instrument_node="">Close</span></a></p><span data-dcnode-id="373" instrument_node="">
