</span><div class="tasty-pins-hidden-image-container" data-dcnode-id="753" style="display:none;"><img class="tasty-pins-hidden-image skip-lazy a3-notlazy no-lazyload" data-dcnode-id="754" data-no-lazy="1" data-pin-media="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically.jpg" data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-100x150.jpg&amp;raw" width="100"></div><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="748"><strong data-dcnode-id="749"><em data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive.&nbsp; But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity.</span></em></strong></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">When we first planted our zone 3 orchard things didn’t turn out the way we expected. We planted whips that were grafted on hardy Russian dwarf stock and expected to see fruit in about 5 years.&nbsp; But 8 years later we were still waiting.&nbsp; The trees hadn’t grown the way we expected.&nbsp; There were losses but not from hard winters.&nbsp; The losses came in wet springs. Often just as the blossoms were opening the tree would die back.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="744" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="739"><img alt="Apple fruit on the tree" class="aligncenter wp-image-33714 size-large perfmatters-lazy entered loaded" data-dcnode-id="742" data-ll-status="loaded" data-pin-description="Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive. But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity." data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness" data-sizes="(max-width: 683px) 100vw, 683px" data-src="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-683x1024.jpg" data-srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-683x1024.jpg 683w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-100x150.jpg 100w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-200x300.jpg 200w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-768x1152.jpg 768w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin.jpg 2000w" height="1024" sizes="(max-width: 683px) 100vw, 683px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-683x1024.jpg&amp;raw" srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-683x1024.jpg 683w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-100x150.jpg 100w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-200x300.jpg 200w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-768x1152.jpg 768w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin.jpg 2000w" width="683"><noscript data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">&lt;img data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness" class="aligncenter wp-image-33714 size-large" src="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-683x1024.jpg" alt="Apple fruit on the tree" width="683" height="1024" data-pin-description="Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive. But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity." srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-683x1024.jpg 683w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-100x150.jpg 100w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-200x300.jpg 200w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin-768x1152.jpg 768w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-pin.jpg 2000w" sizes="(max-width: 683px) 100vw, 683px" /&gt;</span></noscript></p><div class="adthrive" data-dcnode-id="737" id="cls-video-container-1rEfy7i4" style="min-height: 367.875px;"><div data-dcnode-id="738"></div></div><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="736" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">We consulted a friend with heritage apple trees and she advised us to use </span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2nPsbDY" rel="nofollow noopener" target="_blank"><span data-dcnode-id="733" instrument_node="">fruit tree spikes</span></a><span data-dcnode-id="731" instrument_node=""> to fertilize our apple trees.&nbsp; But obtaining fruit tree spikes required a trip to a garden centre a 3 hour drive from home.&nbsp; A few years ago we started over with fresh apple trees and a lot more understanding of the unique needs of fruit trees growing in the hard northern climate.&nbsp; Unfortunately, we lost 8 years in orchard production, although we gained several lessons.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="729" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><span data-dcnode-id="728" instrument_node="">
</span><h2 data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Know what kind of growth to expect from your fruit trees</span></h2><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">A healthy young fruit tree will grow 18 to 24 inches in a growing season.&nbsp; That’s about 4 to 6 inches between April 15 and June 1st.&nbsp; If you are seeing that kind of growth, you don’t need to fertilize.&nbsp; Your young fruit trees are getting what they need from the soil they’re in.&nbsp; If your fruit tree is 3 years old you will expect it to grow about 20 inches a year (50 cm.), or 5 inches between April 15 and June 1st.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="722" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">But if you are seeing little growth on the tips of the branches this year, or if last year’s growth fell short of the expected 18 to 24 inches (45 to 60 cm), your fruit trees need nitrogen.</span></p><span data-dcnode-id="718" instrument_node="">
</span><h2 data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Too much nitrogen isn’t better</span></h2><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">If a little nitrogen promotes better growth and healthier apple trees, you may think that applying a lot of nitrogen is better.&nbsp; But that’s not necessarily the case.&nbsp; Too much nitrogen can damage your fruit trees just as much as too little nitrogen.&nbsp; Fruit trees, just like vegetables, need a balanced diet of nitrogen, phosphorus, and potassium, plus several trace minerals to thrive.&nbsp; If they already have the right amount of fertility where they are planted, adding extra nitrogen can promote excessive soft growth that is easily damaged in winter, possibly killing the tree.&nbsp; Adding excess nitrogen can also cause nutrient deficiencies which can harm the tree.&nbsp; Getting the balance right is important.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="712" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Too much nitrogen can prevent fruiting and flowering and might even damage the roots of your trees.</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="698"><picture class="aligncenter wp-image-33710 size-full perfmatters-lazy entered" data-dcnode-id="702" data-ll-status="entered" data-pin-description="Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive. But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity." data-pin-nopin="nopin" data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness"><span data-dcnode-id="707" instrument_node="">
</span><source data-dcnode-id="706" data-sizes="(max-width: 700px) 100vw, 700px" data-srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms.jpg.webp 700w" sizes="(max-width: 700px) 100vw, 700px" srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms.jpg.webp 700w" type="image/webp"><span data-dcnode-id="705" instrument_node="">
</span><img alt="Appple blossoms" class="entered loaded" data-dcnode-id="704" data-ll-status="loaded" data-pin-description="Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive. But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity." data-pin-nopin="nopin" data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness" data-sizes="(max-width: 700px) 100vw, 700px" data-src="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms.jpg" data-srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms.jpg 700w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms-150x100.jpg 150w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms-300x199.jpg 300w" height="465" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms.jpg&amp;raw" srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms.jpg 700w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms-150x100.jpg 150w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms-300x199.jpg 300w" width="700"><span data-dcnode-id="703" instrument_node="">

&lt;img data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness" data-pin-nopin="nopin" src="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms.jpg" alt="Appple blossoms" width="700" height="465" data-pin-description="Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive. But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity." srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms.jpg 700w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms-150x100.jpg 150w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-blossoms-300x199.jpg 300w" sizes="(max-width: 700px) 100vw, 700px"/&gt;
&lt;/picture&gt;
</span></noscript></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="697" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><span data-dcnode-id="696" instrument_node="">
</span><h2 data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Get the amount of nitrogen right</span></h2><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">If your young tree had 24 inches of growth in the preceding year, there is no need to add additional fertilizer.</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">If your young tree had 12 to 15 inches of growth in the preceding year or 2 to 3 inches of growth between April 15 and June 1, adding a moderate amount of nitrogen will be helpful.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="687" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">If your young tree has only 2 inches of growth in the preceding year, it needs a full dose of nitrogen at the beginning of the growing season. Use fertilizer package guidelines as your rule in this case.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="673"><picture class="aligncenter wp-image-33711 size-full perfmatters-lazy" data-dcnode-id="677" data-pin-description="Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive. But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity." data-pin-nopin="nopin" data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness"><span data-dcnode-id="682" instrument_node="">
</span><source data-dcnode-id="681" data-sizes="(max-width: 500px) 100vw, 500px" data-srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apples-in-bud.jpg.webp 500w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='500'%20height='752'%20viewBox='0%200%20500%20752'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="680" instrument_node="">

&lt;source type="image/webp" srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apples-in-bud.jpg.webp 500w" sizes="(max-width: 500px) 100vw, 500px"/&gt;
&lt;img data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness" data-pin-nopin="nopin" src="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apples-in-bud.jpg" alt="Apple fruit in bud" width="500" height="752" data-pin-description="Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive. But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity." srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apples-in-bud.jpg 500w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apples-in-bud-100x150.jpg 100w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apples-in-bud-199x300.jpg 199w" sizes="(max-width: 500px) 100vw, 500px"/&gt;
&lt;/picture&gt;
</span></noscript></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="672" id="AdThrive_Content_9_desktop" style="min-height: 250px;"></div><span data-dcnode-id="671" instrument_node="">
</span><h2 data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Organic products for fertilizing apple trees</span></h2><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">When you shop for fertilizer you don’t want a product that is 100% nitrogen.&nbsp; Instead, you’ll choose a natural, organic fertilizer that is nitrogen rich but also contains other nutrients.&nbsp; Products sold as fertilizers have an N-P-K rating expressed in numbers.&nbsp; (N=Nitrogen, P=Phosphorus, and K=Potassium).&nbsp; If a product has a rating of 9-3-0, as fish meal does, it means it has 9% nitrogen, 3% phosphorus, and no potassium.&nbsp; Nitrogen promotes green, leafy growth.&nbsp; Phosphorus promotes root development and flowering.&nbsp; Potassium helps with fruiting and seed development.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="665" id="AdThrive_Content_10_desktop" style="min-height: 250px;"></div><span data-dcnode-id="664" instrument_node="">
</span><h3 data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Fish Fertilizer</span></h3><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="660" instrument_node="">As I already mentioned, </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2E3Bw5Q" rel="nofollow noopener" target="_blank"><span data-dcnode-id="659" instrument_node="">fish fertilizer</span></a><span data-dcnode-id="657" instrument_node=""> has a rating of 9-3-0.&nbsp; It is useful in young orchards where the trees are slow to grow, early in the season. I learned from my First Nation family to bury fish heads and entrails in the garden where I planted corn.&nbsp; Fish fertilizer is neater than raw fish heads but just as smelly.&nbsp; It’s good to apply it just before the rain so that the smell is washed deeply into the soil and doesn’t bother the neighbours or attract stray cats or raccoons.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="655" id="AdThrive_Content_11_desktop" style="min-height: 250px;"></div><span data-dcnode-id="654" instrument_node="">
</span><h3 data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Alfalfa Meal</span></h3><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="647"><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2E1eSLk" rel="nofollow noopener" target="_blank"><span data-dcnode-id="650" instrument_node="">Alfalfa meal</span></a><span data-dcnode-id="648" instrument_node=""> can be found at the garden center and also at the feed store.&nbsp; It has a rating of (2-1-2).&nbsp; We mulch our garden and fruit trees with alfalfa hay, which breaks down over the growing season, feeding the trees and the vegetables with both nitrogen and potassium.&nbsp; Alfalfa meal releases nitrogen more quickly than the hay.&nbsp; Apply it in May, if your fruit trees are slow growing.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="646" id="AdThrive_Content_12_desktop" style="min-height: 250px;"></div><span data-dcnode-id="645" instrument_node="">
</span><h3 data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Blood Meal</span></h3><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="638"><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2BFHKr9" rel="nofollow noopener" target="_blank"><span data-dcnode-id="641" instrument_node="">Blood Meal</span></a><span data-dcnode-id="639" instrument_node=""> can be found at the garden center.&nbsp; It has a rating of 12-0-0 and is a by product of the meat industry. Use it to give trees a nitrogen boost early in the season.&nbsp; Apply it just before the rain to wash it into the soil. Follow the directions on the package so that you don’t over apply it.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="627"><picture class="aligncenter wp-image-33712 size-full perfmatters-lazy" data-dcnode-id="631" data-pin-description="Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive. But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity." data-pin-nopin="nopin" data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness"><span data-dcnode-id="636" instrument_node="">
</span><source data-dcnode-id="635" data-sizes="(max-width: 500px) 100vw, 500px" data-srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-red.jpg.webp 500w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='500'%20height='752'%20viewBox='0%200%20500%20752'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="634" instrument_node="">
</span><img alt="Red apples waiting for the harvest" data-dcnode-id="633" data-pin-description="Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive. But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity." data-pin-nopin="nopin" data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness" data-sizes="(max-width: 500px) 100vw, 500px" data-src="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-red.jpg" data-srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-red.jpg 500w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-red-100x150.jpg 100w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-red-199x300.jpg 199w" height="752" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='500'%20height='752'%20viewBox='0%200%20500%20752'%3E%3C/svg%3E" width="500"><span data-dcnode-id="632" instrument_node="">
</span></picture><span data-dcnode-id="630" instrument_node="">

&lt;img data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness" data-pin-nopin="nopin" src="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-red.jpg" alt="Red apples waiting for the harvest" width="500" height="752" data-pin-description="Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive. But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity." srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-red.jpg 500w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-red-100x150.jpg 100w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/apple-red-199x300.jpg 199w" sizes="(max-width: 500px) 100vw, 500px"/&gt;
&lt;/picture&gt;
</span></noscript></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="626" id="AdThrive_Content_13_desktop" style="min-height: 250px;"></div><span data-dcnode-id="625" instrument_node="">
</span><h2 data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">When to apply an organic fertilizer to apple trees</span></h2><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Adding fertilizer to apple trees should be done 3 times during the growing season.</span></p><span data-dcnode-id="619" instrument_node="">
</span><ul data-dcnode-id="608"><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Make the first application in early spring,&nbsp; before flowering, around mid April in most areas temperate areas.</span></li><span data-dcnode-id="615" instrument_node="">
</span><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Make the second application about a month later, after flowering is completed around the end of May.</span></li><span data-dcnode-id="612" instrument_node="">
</span><li data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">And the final application of fertilizer should be applied at the end of June, about a month after the second application.</span></li><span data-dcnode-id="609" instrument_node="">
</span></ul><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="607" id="AdThrive_Content_14_desktop" style="min-height: 250px;"></div><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Follow the directions on the fertilizer box.&nbsp; If the fertilizer gives an annual application rate, divide this by 3 to find out how much fertilizer to add with each application.</span></p><span data-dcnode-id="603" instrument_node="">
</span><h2 data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Don’t add any nitrogen rich fertilizer after July 1st</span></h2><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Adding nitrogen fertilizer later in the season can prevent the trees from going into dormancy as winter comes on.&nbsp; This can cause damage to the trees in the cold season.&nbsp; Instead, wait till spring to apply the fertilizer if you missed the opportune window.&nbsp; You can still add mulch to the trees as the mulch breaks down slowly and won’t promote lush, tender growth later in the season.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="597" id="AdThrive_Content_15_desktop" style="min-height: 250px;"></div><span data-dcnode-id="596" instrument_node="">
</span><h2 data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Mulching when fertilizing apple trees</span></h2><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Mulch improves the soil by increasing organic matter, improving soil texture, and increasing soil micro-organisms.&nbsp; As the soil health improves the need for soil amendments like nitrogen fertilizers lessens.&nbsp; Mulching also retains moisture at the soil level, reducing the need for supplemental water. Mulch keeps competing weeds and grass away from the drip zone of fruit trees and makes maintaining the tree easier.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="590" id="AdThrive_Content_16_desktop" style="min-height: 250px;"></div><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Adding 2 inches of nitrogen rich mulch in the early spring as a top dressing on all your fruit trees, give the tree a burst of nutrition just when they need it most.&nbsp; This is the best time to add alfalfa hay, compost, or well rotted manure.</span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">When adding alfalfa hay, grass hay, well rotted manure, leaf mold, or bark mulch to the soil surface around young trees, it’s important to keep the mulch well away from the trunk of the tree.&nbsp; Air needs to get to the trunk.&nbsp; Mulch in the shape of a donut, keeping the mulch at a distance from the trunk and mounding it in the drip zone.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="583" id="AdThrive_Content_17_desktop" style="min-height: 250px;"></div><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="578"><img alt="The book cover of Growing Urban Orchards" class="aligncenter wp-image-33708 size-full perfmatters-lazy" data-dcnode-id="581" data-pin-nopin="nopin" data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness" data-sizes="(max-width: 404px) 100vw, 404px" data-src="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/Growing-Urban-Orchards.jpg" data-srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/Growing-Urban-Orchards.jpg 404w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/Growing-Urban-Orchards-121x150.jpg 121w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/Growing-Urban-Orchards-242x300.jpg 242w" height="500" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='404'%20height='500'%20viewBox='0%200%20404%20500'%3E%3C/svg%3E" width="404"><noscript data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">&lt;img data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness" data-pin-nopin="nopin" class="aligncenter wp-image-33708 size-full" src="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/Growing-Urban-Orchards.jpg" alt="The book cover of Growing Urban Orchards" width="404" height="500" srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/Growing-Urban-Orchards.jpg 404w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/Growing-Urban-Orchards-121x150.jpg 121w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/Growing-Urban-Orchards-242x300.jpg 242w" sizes="(max-width: 404px) 100vw, 404px" /&gt;</span></noscript></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="577" id="AdThrive_Content_18_desktop" style="min-height: 250px;"></div><span data-dcnode-id="576" instrument_node="">
</span><h2 data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Growing Urban Orchards</span></h2><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="572" instrument_node="">I found Susan Poizner’s book </span><strong data-dcnode-id="567"><em data-dcnode-id="568"><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2nPyRlw" rel="nofollow noopener" target="_blank"><span data-dcnode-id="571" instrument_node="">Growing Urban Orchards, How to Care for Fruit Trees in the City and Beyond</span></a><span data-dcnode-id="569" instrument_node=""> </span></em></strong><span data-dcnode-id="566" instrument_node="">very helpful in learning the tips and tricks for nurturing fruit trees in the colder areas of the country.&nbsp; Susan established fruit trees in urban Toronto (USDA zone 5) in 2009.&nbsp; Her book is focused on bring fruitfulness, reestablishing pollinators, and providing healthy food through establishing urban orchards.</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">Her information is easily accessible for the home gardener, homesteader, and permaculture gardener and covers the basics of fruit tree care from</span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//joybileefarm.com/fruit-trees-zone-3/" rel="noopener" target="_blank"><span data-dcnode-id="562" instrument_node=""> choosing trees that will do well in your hardiness zone</span></a><span data-dcnode-id="560" instrument_node="">&nbsp;to preparing the planting hole, fertilizing fruit trees, and protecting them from pests and human marauders.</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Susan is a community fruit tree expert and a leader in Growing for Green, a community group that plants orchards in and around the Toronto area.&nbsp; While her book focuses on her experience in Toronto, she includes suggestions on growing fruit trees in different regions and explains how to research solutions that will work for you, where you live.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="554" instrument_node="">My favourite part of </span><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2nPyRlw" rel="nofollow noopener" target="_blank"><span data-dcnode-id="553" instrument_node="">the book</span></a><span data-dcnode-id="551" instrument_node=""> was reading the stories of other urban orchard projects in zones 3 (Calgary, Alberta) to zone 8 (Richmond, BC and Seattle, Washington).&nbsp; The stories of community and partnership, between growing food and using food in the community were inspirational.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="539"><picture class="aligncenter wp-image-33715 size-full perfmatters-lazy" data-dcnode-id="543" data-pin-description="Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive. But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity." data-pin-nopin="nopin" data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness"><span data-dcnode-id="548" instrument_node="">
</span><source data-dcnode-id="547" data-sizes="(max-width: 700px) 100vw, 700px" data-srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness.jpg.webp 700w" srcset="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='700'%20height='465'%20viewBox='0%200%20700%20465'%3E%3C/svg%3E" type="image/webp"><span data-dcnode-id="546" instrument_node="">
</span><img alt="Apple blossoms in spring" data-dcnode-id="545" data-pin-description="Fertilizing apple trees and other fruit trees will keep your orchard healthy and productive. But knowing when to fertilize and how to do it organically can be confusing. These tips will give clarity." data-pin-nopin="nopin" data-pin-title="7 Tips for Fertilizing Apple Trees Organically for Long Fruitfulness" data-sizes="(max-width: 700px) 100vw, 700px" data-src="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness.jpg" data-srcset="https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness.jpg 700w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-150x100.jpg 150w, https://g6c4m6d2.rocketcdn.me/wp-content/uploads/2018/02/7-Tips-for-Fertilizing-Apple-Trees-Organically-for-Long-Fruitfulness-300x199.jpg 300w" height="465" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='700'%20height='465'%20viewBox='0%200%20700%20465'%3E%3C/svg%3E" width="700"><span data-dcnode-id="544" instrument_node="">
</span></picture><span data-dcnode-id="542" instrument_node="">
