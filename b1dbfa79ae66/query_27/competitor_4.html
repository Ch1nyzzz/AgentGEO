es in her garden every year to provide the vegetables needed to feed her family of six for the entire year. She practices organic gardening without the use of any pesticide and chemical.</span></p></div></div></a></aside></div><div class="print-this" data-dcnode-id="715"><a class="print-button" data-dcnode-id="716" onclick="window.print();return false;"><span data-dcnode-id="719" instrument_node="">Print </span><svg data-dcnode-id="717" height="15px" viewBox="0 0 475.1 475.1" width="15px" xmlns="http://www.w3.org/2000/svg"><path d="M459 217.1c-10.8-10.8-23.7-16.1-38.7-16.1h-18.3v-73.1c0-7.6-1.9-16-5.7-25.1 -3.8-9.1-8.4-16.4-13.7-21.7L339.2 37.7c-5.3-5.3-12.6-9.9-21.7-13.7 -9.1-3.8-17.5-5.7-25.1-5.7H100.5c-7.6 0-14.1 2.7-19.4 8 -5.3 5.3-8 11.8-8 19.4V201H54.8c-15 0-27.9 5.4-38.7 16.1C5.4 227.9 0 240.8 0 255.8v118.8c0 2.5 0.9 4.6 2.7 6.4 1.8 1.8 4 2.7 6.4 2.7h64v45.7c0 7.6 2.7 14.1 8 19.4 5.3 5.3 11.8 8 19.4 8h274.1c7.6 0 14.1-2.7 19.4-8 5.3-5.3 8-11.8 8-19.4v-45.7h64c2.5 0 4.6-0.9 6.4-2.7 1.8-1.8 2.7-3.9 2.7-6.4V255.8C475.1 240.8 469.7 227.9 459 217.1zM365.4 420.3H109.6v-73.1h255.8V420.3zM365.4 237.5H109.6V54.8h182.7v45.7c0 7.6 2.7 14.1 8 19.4 5.3 5.3 11.8 8 19.4 8h45.7V237.5zM433.1 268.7c-3.6 3.6-7.9 5.4-12.8 5.4 -4.9 0-9.2-1.8-12.8-5.4 -3.6-3.6-5.4-7.9-5.4-12.8s1.8-9.2 5.4-12.8c3.6-3.6 7.9-5.4 12.8-5.4 4.9 0 9.2 1.8 12.8 5.4 3.6 3.6 5.4 7.9 5.4 12.8S436.7 265 433.1 268.7z" data-dcnode-id="718"></path></svg></a></div></header><div class="entry-post" data-dcnode-id="406" id="entry-post"><div class="entry-image" data-dcnode-id="710"><noscript data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">&lt;img width="1200" height="800" src="https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease.jpg" class="post-image post-lead" alt="" srcset="https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease.jpg 1200w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-352x235.jpg 352w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><img alt="" class="post-image post-lead lazyloaded" data-dcnode-id="711" data-sizes="(max-width: 1200px) 100vw, 1200px" data-src="https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease.jpg 1200w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-352x235.jpg 352w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/08/houseplant-disease.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease.jpg 1200w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/08/houseplant-disease-352x235.jpg 352w" width="1200"></div><p class="affiliate-disclosure" data-dcnode-id="705" style="border-bottom: 1px solid #ddd;padding-bottom: 15px;"><span data-dcnode-id="709" instrument_node="">If you buy an item via links on this page, we may earn a commission. Our editorial content is not influenced by commissions. </span><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/disclosure/" target="_blank"><span data-dcnode-id="708" instrument_node="">Read the full disclosure</span></a><span data-dcnode-id="706" instrument_node="">.</span></p><div class="entry-content" data-dcnode-id="407"><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Houseplants beautify your home and bring a bit of nature indoors. The bad news is that there are several common houseplant diseases that can infect them, turning that beauty ugly or even killing them.</span></p><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Many people associate plant diseases with outdoor plants, but indoor plants suffer from diseases as well. Your houseplants can even contract pests.</span></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">If you’re wondering what type of houseplant diseases you might find, here is a list of the most common ones. Remember, good preventative garden practices go a long way in preventing houseplant diseases.</span></p><h2 data-dcnode-id="697" id="h-11-common-houseplant-diseases"><span data-dcnode-id="698" instrument_node="">11 Common Houseplant Diseases</span></h2><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Using proper preventative measures to stop houseplant diseases in their tracks is what you need to focus on first. Make sure you avoid overwatering and never leave plant debris on the soil. Thin any plants that get overgrown and crowded. Ensure appropriate air circulation by opening windows or using a fan.</span></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">You’ll be surprised how easy it is to avoid contracting indoor plant diseases!</span></p><h3 data-dcnode-id="691" id="h-1-anthracnose"><span data-dcnode-id="692" instrument_node="">1. Anthracnose</span></h3><div class="wp-block-image" data-dcnode-id="686"><figure class="aligncenter size-large" data-dcnode-id="687"><noscript data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">&lt;img width="600" height="800" src="https://morningchores.com/wp-content/uploads/2021/07/anthracnose-600x800.jpg" alt="" class="wp-image-627774" srcset="https://morningchores.com/wp-content/uploads/2021/07/anthracnose-600x800.jpg 600w, https://morningchores.com/wp-content/uploads/2021/07/anthracnose-1152x1536.jpg 1152w, https://morningchores.com/wp-content/uploads/2021/07/anthracnose.jpg 1200w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><img alt="" class="wp-image-627774 lazyloaded" data-dcnode-id="688" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://morningchores.com/wp-content/uploads/2021/07/anthracnose-600x800.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/07/anthracnose-600x800.jpg 600w, https://morningchores.com/wp-content/uploads/2021/07/anthracnose-1152x1536.jpg 1152w, https://morningchores.com/wp-content/uploads/2021/07/anthracnose.jpg 1200w" height="800" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/07/anthracnose-600x800.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/07/anthracnose-600x800.jpg 600w, https://morningchores.com/wp-content/uploads/2021/07/anthracnose-1152x1536.jpg 1152w, https://morningchores.com/wp-content/uploads/2021/07/anthracnose.jpg 1200w" width="600"></figure></div><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Anthracnose is a soil-borne fungal disease that infects a range of plants, including houseplants. Outdoors, it’s difficult to get rid of this disease because the spores overwinter on the leaves and branches. Then, when warmer conditions arrive, the spores come alive.</span></p><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Inside, where it never gets cold enough to slow or kill the pathogen, the disease can really spread. That’s why you need to be on the lookout.</span></p><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Anthracnose appears on your plants for a range of reasons, such as:</span></p><ul data-dcnode-id="673"><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Reusing infected soil</span></li><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Letting dead plant debris stay on the soil</span></li><li data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Improper cultural conditions like wet soil or crowding</span></li></ul><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">The common sign of anthracnose is the leaf tips yellowing. The yellow areas darken, turning brown, and eventually dying. You might notice the discoloration going all around the leaf’s outer sides.</span></p><p data-dcnode-id="666"><span data-dcnode-id="670" instrument_node="">Check out our </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/anthracnose/"><span data-dcnode-id="669" instrument_node="">guide to anthracnose</span></a><span data-dcnode-id="667" instrument_node=""> in the garden for tips on controlling this disease, since the treatment is the same. Just keep in mind that some fungicides aren’t approved for indoor use.</span></p><h3 data-dcnode-id="664" id="h-2-bacterial-leaf-spot"><span data-dcnode-id="665" instrument_node="">2. Bacterial Leaf Spot</span></h3><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Bacterial leaf spot is one of the more serious houseplant diseases that you might face. It often results in the death of your plant, and various bacteria cause this disease. That means it can have different symptoms depending on the bacteria that is causing them.</span></p><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Sometimes, bacterial leaf spot is localized and only affects the foliage. Other times, it’s systemic and travels throughout the entire plant. It also might show up as black, water-soaked lesions that have a yellow pattern around them.</span></p><p data-dcnode-id="655"><span data-dcnode-id="659" instrument_node="">You can </span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/bacterial-leaf-spot/"><span data-dcnode-id="658" instrument_node="">learn more about bacterial leaf spot</span></a><span data-dcnode-id="656" instrument_node=""> in our guide.</span></p><h3 data-dcnode-id="653" id="h-3-cercospora"><span data-dcnode-id="654" instrument_node="">3. Cercospora</span></h3><div class="wp-block-image" data-dcnode-id="648"><figure class="aligncenter size-large" data-dcnode-id="649"><noscript data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">&lt;img width="800" height="600" src="https://morningchores.com/wp-content/uploads/2021/08/Cercospora-houseplant-800x600.jpg" alt="" class="wp-image-629598" srcset="https://morningchores.com/wp-content/uploads/2021/08/Cercospora-houseplant-800x600.jpg 800w, https://morningchores.com/wp-content/uploads/2021/08/Cercospora-houseplant-600x450.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/Cercospora-houseplant.jpg 1200w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><img alt="" class="wp-image-629598 lazyloaded" data-dcnode-id="650" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2021/08/Cercospora-houseplant-800x600.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/08/Cercospora-houseplant-800x600.jpg 800w, https://morningchores.com/wp-content/uploads/2021/08/Cercospora-houseplant-600x450.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/Cercospora-houseplant.jpg 1200w" height="600" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/08/Cercospora-houseplant-800x600.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/08/Cercospora-houseplant-800x600.jpg 800w, https://morningchores.com/wp-content/uploads/2021/08/Cercospora-houseplant-600x450.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/Cercospora-houseplant.jpg 1200w" width="800"></figure></div><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">If you notice yellow spots on the underside of the leaves on your houseplants that eventually make their way to the top of the plant, your plants might have Cercospora. Over time, the yellow spots get larger and become sunken into the leaves with a purplish-brown look.</span></p><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Cercospora eventually causes leaf loss with infections close to the node. This disease is typically caused by poor air circulation and too much moisture on the leaves.</span></p><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">The bad thing about Cercospora is that no fungicides help to get rid of this disease. You need to use other methods to control it before it kills your entire plant.</span></p><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">First, trim off any infected leaves or flowers. Then, be sure to only water at the soil level, not on leaves. If you can, you might also want to prune your plants to improve air circulation.</span></p><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Finally, if you can’t seem to get ahead of the problem, try removing the plant from its pot and washing away all the soil from the roots. Clean the pot with a 1:10 bleach to water mixture and repot with fresh, clean soil.</span></p><h3 data-dcnode-id="636" id="h-4-fungal-leaf-spots"><span data-dcnode-id="637" instrument_node="">4. Fungal Leaf Spots</span></h3><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Houseplants can suffer from fungal leaf spots caused by various fungi, but thankfully, preventative measures and treatments work to get rid of many of these diseases. Fungal leaf spots are common when the potting mix is consistently wet, and the foliage remains wet for long periods.</span></p><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">This disease shows up on the foliage of your houseplants in different colors, such as brown, black, red, yellow, or tan. It also causes leaf drop and distortion.</span></p><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Removing infected leaves and fallen debris is one way to stop the spread of this disease. Fungicidal sprays can kill the fungi on your plants, but make sure to use a type that is approved for indoor use.</span></p><h3 data-dcnode-id="628" id="h-5-gray-mold"><span data-dcnode-id="629" instrument_node="">5. Gray Mold</span></h3><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Gray mold is known as Botrytis blight, and it’s one of the most common houseplant diseases. It’s a fungal disease that is a serious issue – it easily kills the infected plants.</span></p><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Gray mold survives on the dead plant debris, so unless it’s cleaned up, this fungi spreads easily. Also, the spores release into the air, infecting other nearby houseplants. The spores also transfer to the foliage through the water splashing onto the plant.</span></p><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">How do you know if your plants have gray mold?</span></p><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">The disease prefers blooming plants, killing the flowers before they open. It also causes grayish, bull’s-eye patterns to develop on the older foliage as well as cankers on the stems. You’ll notice a thick, gray mold covering the dead plant debris, as well.</span></p><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Treating gray mold is possible, especially with proper environmental changes. It’s vital to treat it quickly as possible to avoid spreading it to other plants in your house. Prune plants to improve air circulation and consider using a fan in the room until the disease is under control.</span></p><p data-dcnode-id="610"><span data-dcnode-id="617" instrument_node="">Water at the base of your plants and consider adding a </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B08BCSW2XL/%3Ftag%3Dmorningchores-20"><span data-dcnode-id="616" instrument_node="">houseplant mulch</span></a><span data-dcnode-id="614" instrument_node="">. Indoor use </span><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00BSULSHA/%3Ftag%3Dmorningchores-20"><span data-dcnode-id="613" instrument_node="">fungicides</span></a><span data-dcnode-id="611" instrument_node=""> can be used in severe situations.</span></p><h3 data-dcnode-id="608" id="h-6-powdery-mildew"><span data-dcnode-id="609" instrument_node="">6. Powdery Mildew</span></h3><div class="wp-block-image" data-dcnode-id="603"><figure class="aligncenter size-large" data-dcnode-id="604"><noscript data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">&lt;img width="600" height="800" src="https://morningchores.com/wp-content/uploads/2021/08/sooty-mold-600x800.jpg" alt="" class="wp-image-629601" srcset="https://morningchores.com/wp-content/uploads/2021/08/sooty-mold-600x800.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/sooty-mold.jpg 900w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><img alt="" class="wp-image-629601 lazyloaded" data-dcnode-id="605" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://morningchores.com/wp-content/uploads/2021/08/sooty-mold-600x800.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/08/sooty-mold-600x800.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/sooty-mold.jpg 900w" height="800" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/08/sooty-mold-600x800.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/08/sooty-mold-600x800.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/sooty-mold.jpg 900w" width="600"></figure></div><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Most gardeners have heard of powdery mildew. Not only is it one of the most common garden diseases, but it also infects plenty of indoor plants. Powdery mildew is a fungal disease that happens in the winter months on houseplants when the indoor temperatures are cooler and humidity is high.</span></p><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Typically, powdery mildew won’t kill the houseplants, but it’s ugly and the spores can travel through the air and infect other plants. Diagnosing the problem is fairly easy; you’ll notice white, powdery-like circles on the leaves that enlarge and spread.</span></p><p data-dcnode-id="594"><span data-dcnode-id="598" instrument_node="">If houseplants contract powdery mildew, it’s typically an indication that cultural changes need to be made. Learn more about </span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/powdery-mildew/"><span data-dcnode-id="597" instrument_node="">powdery mildew</span></a><span data-dcnode-id="595" instrument_node=""> by reading our guide. Neem oil and copper fungicide are good treatment options.</span></p><h3 data-dcnode-id="592" id="h-7-root-and-stem-rot"><span data-dcnode-id="593" instrument_node="">7. Root and Stem Rot</span></h3><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">One of the chronic problems that plague houseplants is frequent overwatering and poorly draining soil. Well-meaning plant lovers sometimes water daily, thinking that they’re doing the best thing, but overwatering leads to root and stem rot.</span></p><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Root and stem rot is caused by different fungal organisms. These pathogens live in soil that drains poorly and stays soggy all the time.</span></p><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Spotting root and stem rot are a bit tricky because the main symptoms are that the roots are mushy and black, but you can only see the roots if you remove the plant out of the container. Another symptom is that the plant will wilt from the bottom to the top as foliage and stems turn brown or black.</span></p><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Unfortunately, dealing with root and stem rot is hard if not impossible. In most cases, tossing out the plant is the best way to handle it.</span></p><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">If you want to try saving your plant, remove it from the pot and rinse away all of the soil. Wipe the container with a 1:10 bleach and water mixture. Dust the roots with copper fungicide powder. Then, repot with fresh potting soil. Be extra cautious to water appropriately.</span></p><p data-dcnode-id="577"><span data-dcnode-id="581" instrument_node="">You might want to nab a </span><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B08RMPVY6Z/%3Ftag%3Dmorningchores-20"><span data-dcnode-id="580" instrument_node="">moisture meter</span></a><span data-dcnode-id="578" instrument_node=""> to help you know when it’s time to water.</span></p><h3 data-dcnode-id="575" id="h-8-rust"><span data-dcnode-id="576" instrument_node="">8. Rust</span></h3><div class="wp-block-image" data-dcnode-id="566"><figure class="aligncenter size-large" data-dcnode-id="567"><noscript data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">&lt;img width="800" height="490" src="https://morningchores.com/wp-content/uploads/2021/08/rust-houseplant-800x490.jpg" alt="" class="wp-image-629641" srcset="https://morningchores.com/wp-content/uploads/2021/08/rust-houseplant-800x490.jpg 800w, https://morningchores.com/wp-content/uploads/2021/08/rust-houseplant-600x368.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/rust-houseplant.jpg 1200w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><div class="wpr-pinterest-container" data-dcnode-id="568" style="max-width: 728px;"><img alt="" class="wp-image-629641 lazyloaded" data-dcnode-id="572" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2021/08/rust-houseplant-800x490.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/08/rust-houseplant-800x490.jpg 800w, https://morningchores.com/wp-content/uploads/2021/08/rust-houseplant-600x368.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/rust-houseplant.jpg 1200w" height="490" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/08/rust-houseplant-800x490.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/08/rust-houseplant-800x490.jpg 800w, https://morningchores.com/wp-content/uploads/2021/08/rust-houseplant-600x368.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/rust-houseplant.jpg 1200w" width="800"><div class="wpr-pinterest-button" data-dcnode-id="569"><a aria-label="pin this image" class="pin-this" data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/link/%3Furl%3Dhttps%253A%252F%252Fmorningchores.com%252Fhouseplant-diseases%252F%3Futm_source%3Dimagepin%26media%3Dhttps%3A//morningchores.com/wp-content/uploads/2021/08/rust-houseplant-800x490.jpg%26description%3D11%2520Common%2520Houseplant%2520Diseases%2520and%2520How%2520to%2520Treat%2520Them" rel="noopener noreferrer" target="_blank"><span class="wpr-pin-image" data-dcnode-id="571"></span></a></div></div></figure></div><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Rust is more common outside than it is inside. It’s most common on roses, fuchsias, and chrysanthemums, so if you grow those as houseplants, watch out because rust is a particularly damaging infection.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="563" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Here’s how to spot rust on your houseplants.</span></p><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Look for brown rings or spots on the leaves. These spots typically start on the underside of the leaves, but advanced stages of rust appear on both sides. Over time, the leaves fall off the plant prematurely without any yellowing.</span></p><p data-dcnode-id="554"><span data-dcnode-id="558" instrument_node="">Dealing with rust on your plants is challenging; regular applications of copper fungicide can control it, if not get rid of it. Here’s what you need to know about </span><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/plant-rust/"><span data-dcnode-id="557" instrument_node="">rust on your plants</span></a><span data-dcnode-id="555" instrument_node="">.</span></p><h3 data-dcnode-id="552" id="h-9-southern-blight"><span data-dcnode-id="553" instrument_node="">9. Southern Blight</span></h3><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">While southern blight isn’t as common as other houseplant diseases, it’s still a problem that you might face. This disease causes the rapid loss of the lower leaves on your plant along with root rot.</span></p><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">At first, you might notice parts of your plant turning creamy yellow and, eventually, brown with a mushy appearance. Sometimes, a white fungal growth appears on the stems of the plants if there is a lot of humidity in the environment because of poor air circulation.</span></p><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Removing the affected leaves and discarding them is one way to help slow the spread of the disease. Then, try to improve the air circulation in your home. Unfortunately, fungicides and other typical treatment options for fungal diseases won’t work for southern blight.</span></p><h3 data-dcnode-id="544" id="h-10-sooty-mold"><span data-dcnode-id="545" instrument_node="">10. Sooty Mold</span></h3><p data-dcnode-id="540"><a data-dcnode-id="542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/sooty-mold/"><span data-dcnode-id="543" instrument_node="">Sooty mold</span></a><span data-dcnode-id="541" instrument_node=""> is most common on outdoor plants, but it’s also possible for these fungi to infect houseplants. If you find that you have sooty mold on your plants, it means you have another problem – pests.</span></p><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Sooty mold typically happens when your plants have honeydew that comes from different pests on your plants. A few of the common pests that secrete honeydew include:</span></p><ul data-dcnode-id="529"><li data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Aphids</span></li><li data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Mealybugs</span></li><li data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Whiteflies</span></li><li data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Leafhoppers</span></li></ul><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Thankfully, in most cases, sooty mold is just an annoying eyesore on your plant rather than a serious problem. The real problem is the pests that causing the honeydew and attracting sooty mold. That’s what you need to treat the most.</span></p><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">While you get the pests under control, wipe your plants clean with a little dish soap mixed into water.</span></p><h3 data-dcnode-id="523" id="h-11-white-mold"><span data-dcnode-id="524" instrument_node="">11. White Mold</span></h3><div class="wp-block-image" data-dcnode-id="514"><figure class="aligncenter size-large" data-dcnode-id="515"><noscript data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">&lt;img width="800" height="533" src="https://morningchores.com/wp-content/uploads/2021/08/white-mold-800x533.jpg" alt="" class="wp-image-629644" srcset="https://morningchores.com/wp-content/uploads/2021/08/white-mold-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2021/08/white-mold-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/white-mold-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/08/white-mold-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/08/white-mold-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2021/08/white-mold.jpg 1200w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><div class="wpr-pinterest-container" data-dcnode-id="516" style="max-width: 728px;"><img alt="" class="wp-image-629644 lazyloaded" data-dcnode-id="520" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2021/08/white-mold-800x533.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/08/white-mold-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2021/08/white-mold-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/white-mold-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/08/white-mold-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/08/white-mold-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2021/08/white-mold.jpg 1200w" height="533" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/08/white-mold-800x533.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/08/white-mold-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2021/08/white-mold-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/08/white-mold-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/08/white-mold-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/08/white-mold-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2021/08/white-mold.jpg 1200w" width="800"><div class="wpr-pinterest-button" data-dcnode-id="517"><a aria-label="pin this image" class="pin-this" data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/link/%3Furl%3Dhttps%253A%252F%252Fmorningchores.com%252Fhouseplant-diseases%252F%3Futm_source%3Dimagepin%26media%3Dhttps%3A//morningchores.com/wp-content/uploads/2021/08/white-mold-800x533.jpg%26description%3D11%2520Common%2520Houseplant%2520Diseases%2520and%2520How%2520to%2520Treat%2520Them" rel="noopener noreferrer" target="_blank"><span class="wpr-pin-image" data-dcnode-id="519"></span></a></div></div></figure></div><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Houseplants commonly contract white mold, which is a white moldy substance that grows on the top of the potting mixes. While white mold won’t kill your plants, it’s ugly, and no one wants that on their plants!</span></p><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">What causes white mold?</span></p><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Poor cultural conditions are the usual culprit behind white mold, but it’s typically an easy fix. White fungus growing on your potting mix is a sign that the growing conditions aren’t correct, and it might lead to more serious problems.</span></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">A few causes of white mold include:</span></p><ul data-dcnode-id="499"><li data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Overwatering</span></li><li data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Growing in previously infected potting mixes</span></li><li data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Improper drainage</span></li></ul><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">You can remove the white mold off the top of the soil, but you will need to change your growing practices to stop it from coming back.</span></p><span data-dcnode-id="496" instrument_node=""> </span><span data-dcnode-id="493" instrument_node=""> </span><div data-dcnode-id="484" id="af-was"><h3 data-dcnode-id="491" id="13-was-this-article-helpful"><span data-dcnode-id="492" instrument_node="">Was this article helpful?</span></h3><span data-dcnode-id="490" instrument_node=""> </span><a data-dcnode-id="488" href="#" id="af-yes"><span data-dcnode-id="489" instrument_node="">Yes</span></a><span data-dcnode-id="487" instrument_node=""> </span><a data-dcnode-id="485" href="#" id="af-no"><span data-dcnode-id="486" instrument_node="">No</span></a></div><div data-dcnode-id="468" id="af-popup-1"><div data-dcnode-id="469"><di
