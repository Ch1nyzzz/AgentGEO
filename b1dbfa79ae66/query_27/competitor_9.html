</span><p class="has-background" data-dcnode-id="2226" style="background-color:#d9ffcc"><span class="tadv-background-color" data-dcnode-id="2227" style="background-color:#d9ffcc"><span class="tadv-color" data-dcnode-id="2232" style="color:#71767a"><span data-dcnode-id="2233" instrument_node="">Disclosure: This post contains affiliate links.</span></span><span data-dcnode-id="2231" instrument_node=""> </span><a data-dcnode-id="2229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//realselfsufficiency.com/disclosure/"><span data-dcnode-id="2230" instrument_node="">Click here to read my affiliate policy</span></a><span data-dcnode-id="2228" instrument_node="">.</span></span></p><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Common basil diseases and pests are always of concern to growers. These fungi, pathogens, and pests can attack at any time during the growing year. And most are not exclusive to basil – they’ll attack many of your other plants, too.</span></p><span data-dcnode-id="2222" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2217"><figure class="aligncenter size-large is-resized" data-dcnode-id="2218"><img alt="" class="wp-image-12386 entered error" data-dcnode-id="2221" data-lazy-sizes="(max-width: 512px) 100vw, 512px" data-lazy-src="https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-683x1024.jpg" data-lazy-srcset="https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-683x1024.jpg 683w, https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-200x300.jpg 200w, https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-768x1152.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests.jpg 1000w" data-ll-status="error" data-pin-nopin="true" data-pin-title="Plant Problems: Basil Diseases and Pests (and How to Treat Them Naturally)" data-zoom-image="https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-683x1024.jpg" height="768" sizes="(max-width: 512px) 100vw, 512px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-683x1024.jpg&amp;raw" srcset="https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-683x1024.jpg 683w, https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-200x300.jpg 200w, https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-768x1152.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests.jpg 1000w" width="512"><noscript data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">&lt;img data-pin-title="Plant Problems: Basil Diseases and Pests (and How to Treat Them Naturally)" src="https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-683x1024.jpg" alt="" class="wp-image-12386" width="512" height="768" srcset="https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-683x1024.jpg 683w, https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-200x300.jpg 200w, https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests-768x1152.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2021/05/Plant-Problems-Basil-Diseases-and-Pests.jpg 1000w" sizes="(max-width: 512px) 100vw, 512px" /&gt;</span></noscript></figure></div><span data-dcnode-id="2216" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Fusarium wilt, for example, will infect beans, peas, tomatoes, and peppers, as well as your basil. While flea beetles chow down on squashes, beans, corn, lettuce, potatoes, and more.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2210"><br data-dcnode-id="2212"><span data-dcnode-id="2211" instrument_node="">We’ve put together a guide to the most common basil pests and diseases to help you learn how to prevent, spot, and treat them. You might’ve noticed wilting leaves, chunks missing, the plant seeming stunted, or perhaps you’ve seen yellow, brown or black spots on basil leaves.</span></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Whatever the problem, you’ll find the most likely culprits here. We’ll not only show you basil pest and disease pictures, we’ll show you how to reduce the likelihood of an infection or invasion, and what to do if your basil does start to suffer.</span></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Remember, a couple of the best ways to keep your basil free of pests and diseases is to keep the plants as healthy as possible by providing the right growing conditions and by using the right companion planting combinations.</span></p><span data-dcnode-id="2203" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2198"><figure class="aligncenter size-large is-resized" data-dcnode-id="2199"><img alt="planting basil" class="wp-image-11984 entered lazyloaded" data-dcnode-id="2202" data-lazy-sizes="(max-width: 675px) 100vw, 675px" data-lazy-src="https://realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil.jpg" data-lazy-srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil.jpg 900w, https://realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil-300x200.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil-768x512.jpg 768w" data-ll-status="loaded" data-pin-nopin="true" data-zoom-image="https://realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil.jpg" height="450" sizes="(max-width: 675px) 100vw, 675px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil.jpg&amp;raw" srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil.jpg 900w, https://realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil-300x200.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil-768x512.jpg 768w" width="675"><noscript data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">&lt;img src="https://realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil.jpg" alt="planting basil" class="wp-image-11984" width="675" height="450" srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil.jpg 900w, https://realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil-300x200.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2021/04/planting-basil-768x512.jpg 768w" sizes="(max-width: 675px) 100vw, 675px" /&gt;</span></noscript></figure></div><span data-dcnode-id="2197" instrument_node="">
</span><h2 data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Common Basil Diseases and How to Treat Them</span></h2><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">You might be practicing proper soil management, it’s possible you could have a pathogen lurking in the ground. Or maybe you’ve got overwintering pests in fallen leaves you haven’t swept up. Or perhaps it’s just a really good year for a specific pest, or there’s a prolonged period of the perfect climatic conditions for a fungus or bacteria to thrive.</span></p><span data-dcnode-id="2191" instrument_node="">
</span><p data-dcnode-id="2188"><br data-dcnode-id="2190"><span data-dcnode-id="2189" instrument_node="">Even if you take every possible precaution, you’re still at the mercy of Mother Nature. Let’s take a look at some of the most common basil diseases</span></p><span data-dcnode-id="2187" instrument_node="">
</span><h3 data-dcnode-id="2184"><strong data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">Fusarium Wilt (Fusarium oxysporum)</span></strong></h3><span data-dcnode-id="2183" instrument_node="">
</span><p data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Fusarium wilt is unfortunately common. It also affects other plants including asparagus, French beans, peas, and tomatoes. </span></p><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">Caused by the Fusarium oxysporum fungus, this common basil problem affects field-, greenhouse-, and hydroponic-grown plants right across the world. And it’s easy to unwittingly carry spores on your clothes, gloves, tools, and boots to infect a previously unaffected area.</span></p><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Fusarium wilt is prolific during the summer, particularly in hot weather. This is a soil-borne fungus and can remain dormant in the soil if no suitable hosts are available for many years, so once your plants show symptoms, it’s important that you don’t grow any susceptible plants in the same spot for around 5 years, unless you successfully solarize/sterilize the soil there first.</span></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2171"><br data-dcnode-id="2173"><span data-dcnode-id="2172" instrument_node="">Fusarium wilt blocks the plant’s water vessels, causing wilt, dehydration, and death. The disease commonly occurs later in the growing season.</span></p><span data-dcnode-id="2170" instrument_node="">
</span><h4 data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Symptoms of Fusarium Wilt in Basil</span></h4><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">The first symptoms of fusarium wilt are first noticed on the older leaves, before progressing to the younger leaves and eventually the death of the plant. </span></p><span data-dcnode-id="2164" instrument_node="">
</span><ul data-dcnode-id="2145"><li data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Yellowing of the leaves</span></li><li data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Stunted growth</span></li><li data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">Discoloration of the xylem vessels</span></li><li data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">Fungal growth on the outside of the stems – white, orange, or pink.</span></li><li data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">Stem decay</span></li><li data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">Asymmetric growth – the fungus often attacks one side of the plant first, rapidly spreading to the other</span></li><li data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Root rot</span></li><li data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Leaves brown, shrivel, and fall</span></li><li data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">The stem tops dry out and curl over in a tell-tale “shepherd’s crook”</span></li></ul><span data-dcnode-id="2144" instrument_node="">
</span><h4 data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">How to Prevent or Control Fusarium Wilt in Basil</span></h4><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">There’s no cure for Fusarium wilt and it spreads like wildfire. So the best method of control is prevention. One key method of prevention is to purchase a resistant variety of basil. There are a few good options:</span></p><span data-dcnode-id="2138" instrument_node="">
</span><ul data-dcnode-id="2129"><li data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Nufar</span></li><li data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Aroma</span></li><li data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Plenty</span></li><li data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Elidia</span></li></ul><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Lots of growers report that they have success with disinfecting seeds with hot water, although the seeds do become sticky and difficult to work with once you expose them to hot water, so this isn’t practical if you want to grow large numbers of basil plants.</span></p><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2119"><br data-dcnode-id="2124"><span data-dcnode-id="2123" instrument_node="">Proper greenhouse, tool, glove, boot, and equipment sanitation and cleanliness is one of the best preventatives for this and all other plant diseases. (</span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//realselfsufficiency.com/how-to-care-for-your-garden-tools/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2122" instrument_node="">You can find out more about caring for your garden tools here</span></a><span data-dcnode-id="2120" instrument_node="">.)</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">If you’ve had any Fusarium wilt in the greenhouse, you need to properly sanitize all surfaces inside, including frames, glass, trays, and plant stands. The spores can attach themselves to any surface and even be airborne.</span></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2112"><br data-dcnode-id="2114"><span data-dcnode-id="2113" instrument_node="">Keep on top of weeds as much as possible, because they can harbor spores. Additionally, weeds around your plants inhibit airflow, creating warm, damp conditions in which Fusarium wilt thrives.</span></p><span data-dcnode-id="2111" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2110" instrument_node="">Avoid ammonium-nitrogen fertilizers because it encourages the fungus spores to reproduce. (</span><a data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//realselfsufficiency.com/9-organic-fertilizers-make-home-without-spending-penny/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2109" instrument_node="">I recommend using homemade organic fertilizers anyway</span></a><span data-dcnode-id="2107" instrument_node="">).</span></p><span data-dcnode-id="2105" instrument_node="">
</span><p data-dcnode-id="2098"><br data-dcnode-id="2104"><span data-dcnode-id="2103" instrument_node="">There is no cure, chemical or natural, so there’s very little you can do to treat Fusarium wilt in basil.</span><br data-dcnode-id="2102"><span data-dcnode-id="2101" instrument_node="">As soon as you spot that your basil plant is suffering from Fusarium wilt, remove it. Don’t compost it.</span><br data-dcnode-id="2100"><span data-dcnode-id="2099" instrument_node="">In fact, I’d recommend burning it to limit the risk of spreading the spores.</span></p><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2094"><br data-dcnode-id="2096"><span data-dcnode-id="2095" instrument_node="">If you grow your basil in pots, throw away the pot that housed the infected plant. And, if you don’t want to throw away the soil, sterilize it.</span></p><span data-dcnode-id="2093" instrument_node="">
</span><h3 data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Bacterial Leaf Spot/Basil Shoot Blight</span></h3><span data-dcnode-id="2090" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2067"><figure class="aligncenter size-large is-resized" data-dcnode-id="2068"><img alt="bacterial leaf spot on basil" class="wp-image-11977 entered lazyloaded" data-dcnode-id="2089" data-lazy-sizes="(max-width: 576px) 100vw, 576px" data-lazy-src="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-bacterial-leaf-spot.jpg" data-lazy-srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-bacterial-leaf-spot.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-bacterial-leaf-spot-300x211.jpg 300w" data-ll-status="loaded" data-pin-nopin="true" data-zoom-image="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-bacterial-leaf-spot.jpg" height="404" sizes="(max-width: 576px) 100vw, 576px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//realselfsufficiency.com/wp-content/uploads/2021/04/basil-bacterial-leaf-spot.jpg&amp;raw" srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-bacterial-leaf-spot.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-bacterial-leaf-spot-300x211.jpg 300w" width="576"><noscript data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">&lt;img src="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-bacterial-leaf-spot.jpg" alt="bacterial leaf spot on basil" class="wp-image-11977" width="576" height="404" srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-bacterial-leaf-spot.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-bacterial-leaf-spot-300x211.jpg 300w" sizes="(max-width: 576px) 100vw, 576px" /&gt;</span></noscript><figcaption data-dcnode-id="2069"><em data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Attribution:</span></em><span data-dcnode-id="2084" instrument_node=""> </span><em data-dcnode-id="2077"><span class="tadv-color" data-dcnode-id="2081" style="color:#9ea1a4"><a data-dcnode-id="2082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.forestryimages.org/browse/detail.cfm%3Fimgnum%3D5373492" target="_blank"><span data-dcnode-id="2083" instrument_node="">Florida </span></a></span><span class="tadv-color" data-dcnode-id="2078" style="color:#99a0a6"><a data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.forestryimages.org/browse/detail.cfm%3Fimgnum%3D5373492" target="_blank"><span data-dcnode-id="2080" instrument_node="">Division of Plant Industry Archive, Florida Department of Agriculture and Consumer Services, Bugwood.org</span></a></span></em><span data-dcnode-id="2076" instrument_node="">.</span><em data-dcnode-id="2071"><span class="tadv-color" data-dcnode-id="2072" style="color:#99a0a6"><span data-dcnode-id="2075" instrument_node=""> </span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc/3.0/us/" target="_blank"><span data-dcnode-id="2074" instrument_node="">Licensed under a Creative Commons Attribution-Noncommercial 3.0 License</span></a></span></em><span data-dcnode-id="2070" instrument_node="">.</span></figcaption></figure></div><span data-dcnode-id="2066" instrument_node="">
</span><p data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Caused by a pathogen known as Pseudomonas cichorii, this unfortunately common basil disease thrives in wet soil and humid conditions. It shows itself as brown or black spots on the leaves, as well as streaking on the stems. It occurs when infected water in the soil is splashed onto the leaves of the plant. There’s also some evidence that it may be seed-borne, too.</span></p><span data-dcnode-id="2063" instrument_node="">
</span><p data-dcnode-id="2060"><br data-dcnode-id="2062"><span data-dcnode-id="2061" instrument_node="">Bacterial leaf spot, or basil shoot blight, isn’t confined to basil. It attacks a wide variety of other plants including lettuce, celery, and chrysanthemums.</span></p><span data-dcnode-id="2059" instrument_node="">
</span><h4 data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Symptoms of Bacterial Leaf Spot</span></h4><span data-dcnode-id="2056" instrument_node="">
</span><ul data-dcnode-id="2047"><li data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Irregular, angular brown or black spots with water on the leaves</span></li><li data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Black to brown streaks on the stems</span></li><li data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Older lesions stay black and become papery</span></li><li data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">Wet stem rot may set in</span></li></ul><span data-dcnode-id="2046" instrument_node="">
</span><h4 data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">How to Control Bacterial Leaf Spot</span></h4><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">There is no way to cure bacterial leaf spot, but there are measures you can take to prevent it and minimize the damage. Many of these prevention and mitigation methods are the same for other common basil diseases.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2036"><br data-dcnode-id="2039"><span data-dcnode-id="2038" instrument_node="">Remove infected plants as soon as possible. Gently water the basil plants close to the soil so potential pathogens don’t splash up onto the leaves.</span><br data-dcnode-id="2037"></p><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Use drip irrigation if you can. Lower relative humidity by improving airflow. Space plants appropriately and keep them free of weeds. This allows air to circulate and reduces humidity in the microclimate around the plants.</span></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2029"><br data-dcnode-id="2031"><span data-dcnode-id="2030" instrument_node="">Try to avoid handling the plants when the leaves are wet, as this can spread the disease.</span></p><span data-dcnode-id="2028" instrument_node="">
</span><h3 data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">Downy Mildew</span></h3><span data-dcnode-id="2025" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2011"><figure class="aligncenter size-large is-resized" data-dcnode-id="2012"><img alt="downy mildew on basil" class="wp-image-11978" data-dcnode-id="2024" data-lazy-sizes="(max-width: 576px) 100vw, 576px" data-lazy-src="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-downy-mildew.jpg" data-lazy-srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-downy-mildew.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-downy-mildew-300x200.jpg 300w" data-pin-nopin="true" data-zoom-image="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-downy-mildew.jpg" height="384" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20576%20384'%3E%3C/svg%3E" width="576"><noscript data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">&lt;img src="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-downy-mildew.jpg" alt="downy mildew on basil" class="wp-image-11978" width="576" height="384" srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-downy-mildew.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-downy-mildew-300x200.jpg 300w" sizes="(max-width: 576px) 100vw, 576px" /&gt;</span></noscript><figcaption data-dcnode-id="2013"><em data-dcnode-id="2014"><span data-dcnode-id="2021" instrument_node="">Attribution: </span><a data-dcnode-id="2019" href="attribution:%20Gerald%20Holmes,%20Strawberry%20Center,%20Cal%20Poly%20San%20Luis%20Obispo,%20Bugwood.org%20Licensed%20under%20a%20Creative%20Commons%20Attribution-Noncommercial%203.0%20License%20%C2%A0https://www.forestryimages.org/browse/detail.cfm?imgnum=5606923" target="_blank"><span data-dcnode-id="2020" instrument_node="">Gerald Holmes, Strawberry Center, Cal Poly San Luis Obispo, Bugwood.org</span></a><span data-dcnode-id="2018" instrument_node="">. </span><a data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc/3.0/us/" target="_blank"><span data-dcnode-id="2017" instrument_node="">Licensed under a Creative Commons Attribution-Noncommercial 3.0 License</span></a><span data-dcnode-id="2015" instrument_node="">.</span></em></figcaption></figure></div><span data-dcnode-id="2010" instrument_node="">
</span><p data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">First reported in Florida in 2007, this relatively new fungal disease is highly destructive and contagious. Caused by the pathogen Peronospora belbahrii, it’s not always instantly recognized as downy mildew because the first sign is yellowing leaves, similar to a nutrient deficiency.</span></p><span data-dcnode-id="2007" instrument_node="">
</span><h4 data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">Symptoms Include:</span></h4><span data-dcnode-id="2004" instrument_node="">
</span><ul data-dcnode-id="1991"><li data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">Chlorotic yellowing on the upper leaf surface</span></li><li data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">As the disease progresses, you’ll see brown blotches on the leaf surface</span></li><li data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Mold-like growth on underside of leaf (these are the spores)</span></li><li data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Severely affected leaves turn brown and shrivel</span></li><li data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Basil plants may become stunted</span></li><li data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">You’ll often see streaks on the stems</span></li></ul><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">Only specific sections of the leaves are affected as downy mildew cannot pass across the major veins in the leaves. As the disease progresses, a fuzzy mold grows on the lower leaves of the plant. This can either be white, gray, or purple.</span></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1984"><br data-dcnode-id="1986"><span data-dcnode-id="1985" instrument_node="">Interestingly, younger plants are more susceptible to this disease than mature plants.</span></p><span data-dcnode-id="1983" instrument_node="">
</span><h4 data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">How to Control Downy Mildew on Basil Leaves</span></h4><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1979" instrument_node="">It’s transmitted by infected seeds, by human error (if you move from infected plants to healthy plants with hands, gloves, or tools), and by wind-borne spores.</span><br data-dcnode-id="1978"><span data-dcnode-id="1977" instrument_node="">Downy mildew is another common basil disease that likes wet soil and high humidity.</span></p><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1962"><br data-dcnode-id="1974"><span data-dcnode-id="1973" instrument_node="">The spores thrive in wet weather. If the plants are indoors or in a greenhouse, then try not to get the leaves too wet, as this encourages the disease.</span><br data-dcnode-id="1972"><span data-dcnode-id="1971" instrument_node="">Avoid watering the plants in the evening as the leaf wetness can persist throughout the night, leading to downy mildew.</span><br data-dcnode-id="1970"><span data-dcnode-id="1969" instrument_node="">Instead, water early in the morning and, if you’re growing basil in a greenhouse, leave the door open to allow air to circulate and let the leaves dry out.</span><br data-dcnode-id="1968"><span data-dcnode-id="1967" instrument_node="">Space basil plants appropriately to stimulate proper air flow.</span><br data-dcnode-id="1966"><span data-dcnode-id="1965" instrument_node="">Remove infected leaves as soon as possible. Severely affected plants should be pulled up and destroyed. Once an area has been affected, avoid replanting the same area with basil for at least a year.</span><br data-dcnode-id="1964"><span data-dcnode-id="1963" instrument_node="">If downy mildew is a persistent problem for you, then grow a more resistant basil variety. And, because young plants are a greater risk, isolate them from any other plants and garden areas that have been affected by this fungal plant pathogen in recent years.</span></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">Sweet basils are far more susceptible than spicy basil varieties. Resistant types include:</span></p><span data-dcnode-id="1958" instrument_node="">
</span><ul data-dcnode-id="1949"><li data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Red Basil</span></li><li data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">Thai Basil</span></li><li data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Lemon Basil</span></li><li data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">Lime Basil</span></li></ul><span data-dcnode-id="1948" instrument_node="">
</span><h3 data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Basil Root Rot</span></h3><span data-dcnode-id="1945" instrument_node="">
</span><p data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Basil root rot, Rhizoctonia solani is also known as damping off. It’s a fungal basil disease that occurs in wet and cool conditions. It enters the plant via the small roots and over the following week it spreads through the entire root system. This prevents the nutrients and water from reaching the plant and eventually kills the basil.</span></p><span data-dcnode-id="1942" instrument_node="">
</span><h4 data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Symptoms of Basil Root Rot</span></h4><span data-dcnode-id="1939" instrument_node="">
</span><ul data-dcnode-id="1926"><li data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">Seeds fail to germinate</span></li><li data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Recently germinated seedlings collapse and die</span></li><li data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Seedlings have a shrivelled brown area at the bottom of the stem</span></li><li data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">The first signs of root rot in your plant are the leaves wilting and changing color to yellow and then brown.</span></li><li data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">The leaves then fall off the plant.</span></li><li data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">If you look at the roots, you’ll see they turn brown and feel soft. Once the roots feel mushy, then the plant will quickly die off.</span></li></ul><span data-dcnode-id="1925" instrument_node="">
</span><h4 data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">How to Treat Basil Root Rot</span></h4><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1910"><span data-dcnode-id="1921" instrument_node="">The most common cause of root rot is constantly wet soil, which provides the ideal conditions for the fungus to grow in. It also spreads in high humidity, like many other common basil diseases.</span><br data-dcnode-id="1920"><span data-dcnode-id="1919" instrument_node="">Plant basil in high-quality seed starting compost and make sure the containers drain well. And don’t be afraid to let the soil dry out between waterings. Don’t soak them and make sure you maintain good airflow around the plants.</span><br data-dcnode-id="1918"><span data-dcnode-id="1917" instrument_node="">Unlike many other basil problems, root rot is potentially easily treatable. But you have to be vigilant.</span><br data-dcnode-id="1916"><span data-dcnode-id="1915" instrument_node="">As soon as you notice the first signs of root rot it is imperative to treat the plants. The first thing to do is remove the plant from the soil and wash the roots.</span><br data-dcnode-id="1914"><span data-dcnode-id="1913" instrument_node="">Trim any of the roots that show signs of root rot and repot the plant in fresh soil and a different pot.</span><br data-dcnode-id="1912"><span data-dcnode-id="1911" instrument_node="">If you use rainwater to water your plants, make sure the water container is covered to prevent any organic debris from entering the water that may have root rot pathogens on them.</span></p><span data-dcnode-id="1909" instrument_node="">
</span><h3 data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Impatiens Necrotic Spot Virus (INSV)</span></h3><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Impatiens Necrotic Spot Virus, or INSV, is a devastating plant disease and can quickly ruin whole crops of basil and many other plants. It mainly attacks greenhouse crops. Other susceptible crops include, but are not limited to, tomatoes, peas, peppers, endive, eggplant, cauliflower, and more. Unlike many other problems on this list, INSV is a virus and it’s spread by Western flower thrips.</span></p><span data-dcnode-id="1903" instrument_node="">
</span><h4 data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Symptoms of Impatiens Necrotic Spot Virus on Basil</span></h4><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">INSV causes a wide variety of symptoms and can mimic other diseases. Symptoms include:</span></p><span data-dcnode-id="1897" instrument_node="">
</span><ul data-dcnode-id="1880"><li data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">Leaf wilting</span></li><li data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Stem Death</span></li><li data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Stunted Growth</span></li><li data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Chlorotic yellowing</span></li><li data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Ring spots on leaves</span></li><li data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Sunken leaf spots</span></li><li data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Blotchy stems</span></li><li data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">A patchwork-like area of browned necrotic spots</span></li></ul><span data-dcnode-id="1879" instrument_node="">
</span><h4 data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">How to Control INSV on Basil Plants</span></h4><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">It’s difficult to control INSV on basil or any other plant because the symptoms are so wide-ranging and non-specific. Plus, symptoms vary based on how old the plant was when in contracted the virus, when humidity and growing conditions, the particular strain of virus, and many other variables, so you’ve really got your work cut out for you when it comes to spotting this disease. Some plants even have the virus yet exhibit no symptoms.</span></p><span data-dcnode-id="1873" instrument_node="">
</span><p data-dcnode-id="1868"><br data-dcnode-id="1872"><span data-dcnode-id="1871" instrument_node="">The best method of prevention is to eliminate the Western Flower Thrip. This tiny pest carries the virus that infects your plants. It also lays its eggs inside the flesh of the basil plants where you can’t see them until they hatch, by which time the damage is often done.</span><br data-dcnode-id="1870"><span data-dcnode-id="1869" instrument_node="">Inspect every plant that you bring into your greenhouse and if you suspect any are harboring thrips, don’t take the risk.</span></p><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1863"><br data-dcnode-id="1866"><span data-dcnode-id="1865" instrument_node="">There’s no treatment for the virus itself, so if you suspect any plants are infected, they need to be destroyed/burned, not composted.</span><br data-dcnode-id="1864"></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1861" instrument_node="">You can control the thrips with natural pesticides, but do be careful, as even natural ones so often kill off beneficial insects and pollinators as well as the pests. However, because these bugs pose such a huge problem, if you do have an infection, it’s necessary.</span><br data-dcnode-id="1860"><span data-dcnode-id="1859" instrument_node="">They are also susceptible to soap or mild dish detergent mixtures used to combat aphids, so this is another possibility that will remove thrips without harding helpful insects.</span></p><span data-dcnode-id="1857" instrument_node="">
</span><h3 data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Basil Sunburn</span></h3><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Basil sunburn isn’t strictly a disease or infection, but it’s definitely a common basil problem. It occurs when basil plants that aren’t properly hardened off are exposed to too much direct sunlight and simultaneously don’t receive enough water.</span></p><span data-dcnode-id="1851" instrument_node="">
</span><h4 data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Basil Sunburn Symptoms</span></h4><span data-dcnode-id="1848" instrument_node="">
</span><ul data-dcnode-id="1839"><li data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">Yellowing</span></li><li data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">White papery leaf burns</span></li><li data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">Scorching</span></li><li data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Crispy shrivelled leaf edges</span></li></ul><span data-dcnode-id="1838" instrument_node="">
</span><h4 data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">How to Control Basil Sunburn</span></h4><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1834" instrument_node="">Make sure you harden off young plants before transplanting them to their final position, increasing their exposure to, and tolerance of, sunlight. Provide adequate water and don’t plant them where they get full sunlight all day.</span><br data-dcnode-id="1833"><span data-dcnode-id="1832" instrument_node="">Provide some shade in hot climates and, in a heat wave, you’ll likely have to create shade for overly exposed plants.</span><br data-dcnode-id="1831"><span data-dcnode-id="1830" instrument_node="">If your basil still gets sunburned, pinch off the affected leaves so the plant can channel its energy into the remaining healthy leaves.</span></p><span data-dcnode-id="1828" instrument_node="">
</span><h3 data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Gray Mold</span></h3><span data-dcnode-id="1825" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1811"><figure class="aligncenter size-large is-resized" data-dcnode-id="1812"><img alt="basil disease picture, gray mold on basil" class="wp-image-11990" data-dcnode-id="1824" data-lazy-sizes="(max-width: 576px) 100vw, 576px" data-lazy-src="https://realselfsufficiency.com/wp-content/uploads/2017/06/basil-gray-mold.jpg" data-lazy-srcset="https://realselfsufficiency.com/wp-content/uploads/2017/06/basil-gray-mold.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2017/06/basil-gray-mold-300x225.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2017/06/basil-gray-mold-90x68.jpg 90w, https://realselfsufficiency.com/wp-content/uploads/2017/06/basil-gray-mold-500x375.jpg 500w" data-pin-nopin="true" data-zoom-image="https://realselfsufficiency.com/wp-content/uploads/2017/06/basil-gray-mold.jpg" height="432" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20576%20432'%3E%3C/svg%3E" width="576"><noscript data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">&lt;img src="https://realselfsufficiency.com/wp-content/uploads/2017/06/basil-gray-mold.jpg" alt="basil disease picture, gray mold on basil" class="wp-image-11990" width="576" height="432" srcset="https://realselfsufficiency.com/wp-content/uploads/2017/06/basil-gray-mold.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2017/06/basil-gray-mold-300x225.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2017/06/basil-gray-mold-90x68.jpg 90w, https://realselfsufficiency.com/wp-content/uploads/2017/06/basil-gray-mold-500x375.jpg 500w" sizes="(max-width: 576px) 100vw, 576px" /&gt;</span></noscript><figcaption data-dcnode-id="1813"><em data-dcnode-id="1814"><span data-dcnode-id="1821" instrument_node="">Attribution: </span><a data-dcnode-id="1819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forestryimages.org/browse/detail.cfm%3Fimgnum%3D5528455" target="_blank"><span data-dcnode-id="1820" instrument_node="">Bruce Watt, University of Maine, Bugwood.org.</span></a><span data-dcnode-id="1818" instrument_node=""> </span><a data-dcnode-id="1816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc/3.0/us/" target="_blank"><span data-dcnode-id="1817" instrument_node="">Licensed under a Creative Commons Attribution-Noncommercial 3.0 License</span></a><span data-dcnode-id="1815" instrument_node="">. </span></em></figcaption></figure></div><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Another fungal pathogen that preys on basil, gray mold or Botrytis cinerea likes wet, humid conditions and it attacks wounded leaves and stems. This nasty little fungus most commonly infects basil plants when leaves are harvested in wet or rainy conditions.</span></p><span data-dcnode-id="1807" instrument_node="">
</span><p data-dcnode-id="1804"><br data-dcnode-id="1806"><span data-dcnode-id="1805" instrument_node="">It takes around 48 hours for basil plants to effectively heal their wounds, and it’s during this window that gray mold strikes.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><h4 data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Gray Mold Symptoms on Basil</span></h4><span data-dcnode-id="1800" instrument_node="">
</span><ul data-dcnode-id="1787"><li data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">Brown or gray growths on stems that progress to leaves</span></li><li data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Leaves dying</span></li><li data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">Leaves are overcome with mold and drop to the floor as they die</span></li><li data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Soft, mushy spots on leaves that then turn gray and they’re covered in mold</span></li><li data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Shrivelling plants</span></li><li data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Black, stoney sclerotia (a compacted mass of the fungi’s filaments) under the rotting areas.</span></li></ul><span data-dcnode-id="1786" instrument_node="">
</span><h4 data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">How to Control Gray Mold on Basil</span></h4><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">There is no effective treatment for gray mold, commercial or natural. So, if you are faced with a gray mold infection, your only choice is to remove and destroy the plants. If you catch it in the earliest stages of infection, you can just nip out affected stems. However, if the infection has already reached the main plant stem, it’s just a matter of time until the plant dies. Most growers pull the whole plant even if the infection appears fairly minor, just to be safe because this fungal disease spreads fast.</span></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1776"><br data-dcnode-id="1779"><span data-dcnode-id="1778" instrument_node="">Prevention is the best method of control. Keep plants spaced and staked so that air can circulate freely and prevent leaves staying excessively wet for long periods. Don’t water overhead or in the evening. Instead, water in the mornings and use drip irrigation or water gently at ground level to prevent infected soil splashing up onto the leaves. Keep soil free of debris and consider using high-quality mulch.</span><br data-dcnode-id="1777"></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">One of the most important methods of controlling gray mold on basil is to make sure you don’t work with, prune, or harvest the plants in wet weather. Only harvest basil when it’s dry and is forecast to remain dry for around 48 hours. This gives the plants enough time to heal the wounds from harvesting before the rain sets in and risks spores splashing up from the soil and infecting open wounds.</span></p><span data-dcnode-id="1772" instrument_node="">
</span><h3 data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Bacterial Wilt</span></h3><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">Known to infect more than 200 plants aside from basil, bacterial wilt, or Ralstonia solanacearum can quickly devastate large swathes of crops. The danger lies in this bacteria being so hard to spot early during an infection, because it attacks below ground, infecting the roots.</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1763"><br data-dcnode-id="1765"><span data-dcnode-id="1764" instrument_node="">Bacterial wilt basically infects the roots. Once inside, the bacteria multiply and invade the stem’s water-conducting tissues, filling them with slime as the disease takes hold. By the time symptoms present above ground, it’s too late – the plant will die and has to be destroyed.</span></p><span data-dcnode-id="1762" instrument_node="">
</span><h4 data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Symptoms of Bacterial Wilt in Basil</span></h4><span data-dcnode-id="1759" instrument_node="">
</span><ul data-dcnode-id="1750"><li data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Wilting of some leaves in hot weather which recovers overnight</span></li><li data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Yellowing leaves that wilt and stay wilted</span></li><li data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">The leaf areas between veins darken, turn brown, and die as the disease progresses</span></li><li data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Main stem remains outwardly green and stays upright even as the leaves die and fall</span></li></ul><span data-dcnode-id="1749" instrument_node="">
</span><h4 data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">How to Control Bacterial Wilt in Basil</span></h4><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">There’s no cure for bacterial wilt and it spreads in the soil and with contact, so it’s important that you exercise good tool, glove, and boot hygiene. If you see an infected plant, lift it and destroy it. If possible, also remove the soil around the roots, as this is where the bacteria live. And they’ll remain in the soil for several years unless you can effectively sterilize your soil.</span></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1740"><br data-dcnode-id="1742"><span data-dcnode-id="1741" instrument_node="">Make sure you remove any fallen leaves from the soil, just in case. And practice crop rotation, companion planting, and good soil management. Healthy, nitrogen-rich soil and a diverse microbiome is essential for reducing the risk of all plant diseases.</span></p><span data-dcnode-id="1739" instrument_node="">
</span><h2 data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Common Basil Pests and How to Get Rid of Them</span></h2><span data-dcnode-id="1736" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1735" instrument_node="">It’s not just pathogens that can harm basil. This popular herb is also a favorite of many different pests. I haven’t listed every single bug that likes to chow down on tasty basil, but I’ve tried to cover the ones you’re most likely to see and how to control them.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><h3 data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Slugs and Snails</span></h3><span data-dcnode-id="1730" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1725"><figure class="aligncenter size-large is-resized" data-dcnode-id="1726"><img alt="common basil pests" class="wp-image-11991" data-dcnode-id="1729" data-lazy-sizes="(max-width: 512px) 100vw, 512px" data-lazy-src="https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-1024x683.jpg" data-lazy-srcset="https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-1024x683.jpg 1024w, https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-300x200.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-768x512.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-1536x1024.jpg 1536w, https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-scaled.jpg 1500w" data-pin-nopin="true" data-zoom-image="https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-1024x683.jpg" height="342" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20342'%3E%3C/svg%3E" width="512"><noscript data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">&lt;img src="https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-1024x683.jpg" alt="common basil pests" class="wp-image-11991" width="512" height="342" srcset="https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-1024x683.jpg 1024w, https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-300x200.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-768x512.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-1536x1024.jpg 1536w, https://realselfsufficiency.com/wp-content/uploads/2017/06/brown-slug-scaled.jpg 1500w" sizes="(max-width: 512px) 100vw, 512px" /&gt;</span></noscript></figure></div><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Slugs and snails particularly love fragrant basil. If your plants are under attack from these pesky molluscs, you’ll see irregular holes in leaves and stems. And if you’ve got a serious infestation on your hands, leaves will be shredded or missing.</span></p><span data-dcnode-id="1721" instrument_node="">
</span><h4 data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">How to Stop Slugs and Snails Eating Basil Plants</span></h4><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1717" instrument_node="">These basil pests like damp, shady locations and are most active at night. So, firstly, make the conditions as inhospitable as possible. Keep weeds to a minimum and only water in the morning. Also make use of companion planting, using trap crops. You can find out more about </span><a data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//realselfsufficiency.com/control-slugs-naturally/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1716" instrument_node="">controlling slugs and snails naturally here</span></a><span data-dcnode-id="1714" instrument_node="">.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><h3 data-dcnode-id="1709"><strong data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Cutworms</span></strong></h3><span data-dcnode-id="1708" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1703"><figure class="aligncenter size-large is-resized" data-dcnode-id="1704"><img alt="common basil pest cutworm" class="wp-image-11992" data-dcnode-id="1707" data-lazy-sizes="(max-width: 450px) 100vw, 450px" data-lazy-src="https://realselfsufficiency.com/wp-content/uploads/2017/06/cutworm.jpg" data-lazy-srcset="https://realselfsufficiency.com/wp-content/uploads/2017/06/cutworm.jpg 900w, https://realselfsufficiency.com/wp-content/uploads/2017/06/cutworm-300x186.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2017/06/cutworm-768x477.jpg 768w" data-pin-nopin="true" data-zoom-image="https://realselfsufficiency.com/wp-content/uploads/2017/06/cutworm.jpg" height="280" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20450%20280'%3E%3C/svg%3E" width="450"><noscript data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">&lt;img src="https://realselfsufficiency.com/wp-content/uploads/2017/06/cutworm.jpg" alt="common basil pest cutworm" class="wp-image-11992" width="450" height="280" srcset="https://realselfsufficiency.com/wp-content/uploads/2017/06/cutworm.jpg 900w, https://realselfsufficiency.com/wp-content/uploads/2017/06/cutworm-300x186.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2017/06/cutworm-768x477.jpg 768w" sizes="(max-width: 450px) 100vw, 450px" /&gt;</span></noscript></figure></div><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Cutworms are frustrating, voracious pests that cut through the stems of basil and other plants close to ground level, immediately killing the plant. They are the larvae of night-flying moths and come in a huge variety of different colors and markings based on the species of moth.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1696"><br data-dcnode-id="1698"><span data-dcnode-id="1697" instrument_node="">These variations make them difficult to identify, as does their habit of hiding in the soil during the day and only venturing out to feast on your plants at night. However, if you do spot one and pick it up, it’ll curl into a tell-tale “c” shape.</span></p><span data-dcnode-id="1695" instrument_node="">
</span><h4 data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">How to Get Rid of Cutworms on Basil</span></h4><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Because we try to avoid all chemicals, we try to be proactive and prevent pests rather than just reacting to their presence. One of the best ways to prevent cutworms is to till the soil before you plant. This kills the larvae overwintering in the soil. And make sure you remove all organic debris at the end of the growing season so you don’t leave warm patches for the larvae to thrive in.</span></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1685"><br data-dcnode-id="1688"><span data-dcnode-id="1687" instrument_node="">You can also make collars from aluminum foil or toilet paper rolls to protect young plants. Just make sure you push the collars into the ground an inch or two to stop the caterpillars burrowing underneath.</span><br data-dcnode-id="1686"></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Bacillus thuringiensis, or Bt, is a natural form of pest control that’s gaining in popularity. It’s a bacterium that specifically targets many different caterpillar species</span></p><span data-dcnode-id="1681" instrument_node="">
</span><h3 data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Flea Beetles</span></h3><span data-dcnode-id="1678" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1673"><figure class="aligncenter size-large is-resized" data-dcnode-id="1674"><img alt="Flea Beetle Larvae of the species Omophoita argus" class="wp-image-11993" data-dcnode-id="1677" data-lazy-sizes="(max-width: 675px) 100vw, 675px" data-lazy-src="https://realselfsufficiency.com/wp-content/uploads/2021/04/flea-beetle-larvae.jpg" data-lazy-srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/flea-beetle-larvae.jpg 900w, https://realselfsufficiency.com/wp-content/uploads/2021/04/flea-beetle-larvae-300x200.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2021/04/flea-beetle-larvae-768x512.jpg 768w" data-pin-nopin="true" data-zoom-image="https://realselfsufficiency.com/wp-content/uploads/2021/04/flea-beetle-larvae.jpg" height="450" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20675%20450'%3E%3C/svg%3E" width="675"><noscript data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">&lt;img src="https://realselfsufficiency.com/wp-content/uploads/2021/04/flea-beetle-larvae.jpg" alt="Flea Beetle Larvae of the species Omophoita argus" class="wp-image-11993" width="675" height="450" srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/flea-beetle-larvae.jpg 900w, https://realselfsufficiency.com/wp-content/uploads/2021/04/flea-beetle-larvae-300x200.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2021/04/flea-beetle-larvae-768x512.jpg 768w" sizes="(max-width: 675px) 100vw, 675px" /&gt;</span></noscript></figure></div><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Flea beetles put small round holes, commonly referred to as “shotholes” in basil leaves. These tiny beetles only grow up to 3 mm but they can cause enough damage to young plants to significantly inhibit growth and, if the infestation is severe, can kill young plants. </span></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Immature basil plants are far more susceptible than mature ones and can tolerate a flea beetle infestation. They tend to be shiny and jump when you disturb them, hence the term “flea” beetle.</span></p><span data-dcnode-id="1666" instrument_node="">
</span><h4 data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">How to Get Rid of Flea Beetles on Basil</span></h4><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Planting early so that plants can reach greater levels of maturity before the flea beetles emerge is a great method of prevention. You can also use floating row covers if you install them early in the season, before the beetles arrive.</span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1657"><br data-dcnode-id="1659"><span data-dcnode-id="1658" instrument_node="">Keep weeds to a minimum and make sure your soil is free of debris, as flea beetles overwinter in weeds and organic debris.</span></p><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1652"><br data-dcnode-id="1655"><span data-dcnode-id="1654" instrument_node="">You can try adding a thick mulch layer around your basil plants which helps stop the beetles reaching the surface.</span><br data-dcnode-id="1653"></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Neem oil and diatomaceous earth are both very effective against flea beetles, too.</span></p><span data-dcnode-id="1648" instrument_node="">
</span><h3 data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Grasshoppers</span></h3><span data-dcnode-id="1645" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1640"><figure class="aligncenter size-large is-resized" data-dcnode-id="1641"><img alt="grasshopper " class="wp-image-11994" data-dcnode-id="1644" data-lazy-sizes="(max-width: 675px) 100vw, 675px" data-lazy-src="https://realselfsufficiency.com/wp-content/uploads/2021/04/grasshopper.jpg" data-lazy-srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/grasshopper.jpg 900w, https://realselfsufficiency.com/wp-content/uploads/2021/04/grasshopper-300x164.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2021/04/grasshopper-768x421.jpg 768w" data-pin-nopin="true" data-zoom-image="https://realselfsufficiency.com/wp-content/uploads/2021/04/grasshopper.jpg" height="370" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20675%20370'%3E%3C/svg%3E" width="675"><noscript data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">&lt;img src="https://realselfsufficiency.com/wp-content/uploads/2021/04/grasshopper.jpg" alt="grasshopper " class="wp-image-11994" width="675" height="370" srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/grasshopper.jpg 900w, https://realselfsufficiency.com/wp-content/uploads/2021/04/grasshopper-300x164.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2021/04/grasshopper-768x421.jpg 768w" sizes="(max-width: 675px) 100vw, 675px" /&gt;</span></noscript></figure></div><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Grasshoppers are problematic at all stages of their lifecycle. Nymphs and mature grasshoppers feast on basil leaves and stems. They are voracious feeders and a small number can do a lot of damage. The nymphs leave round holes in the leaves as they feed, but the adults devour the whole leaf.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><h4 data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">How to Get Rid of Grasshoppers on Basil</span></h4><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">The best way to control grasshoppers on basil and in the garden generally is to minimize weed growth and encourage birds and predatory insects.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1627"><br data-dcnode-id="1629"><span data-dcnode-id="1628" instrument_node="">You can also make use of companion planting to include plants in your landscape that grasshoppers find repellant. Plants that deter grasshoppers include:</span></p><span data-dcnode-id="1626" instrument_node="">
</span><ul data-dcnode-id="1613"><li data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Sage</span></li><li data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Lilac</span></li><li data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Verbena</span></li><li data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Jasmine</span></li><li data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Juniper</span></li><li data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Dianthus</span></li></ul><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">There are also a couple of microbes you can introduce that specifically infect and kill grasshoppers. These are Nosema locustae and Beauveria bassiana.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><h3 data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Japanese Beetles</span></h3><span data-dcnode-id="1606" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1601"><figure class="aligncenter size-large is-resized" data-dcnode-id="1602"><img alt="Japanese Beetles" class="wp-image-11995" data-dcnode-id="1605" data-lazy-sizes="(max-width: 450px) 100vw, 450px" data-lazy-src="https://realselfsufficiency.com/wp-content/uploads/2021/04/japanese-beetle.jpg" data-lazy-srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/japanese-beetle.jpg 900w, https://realselfsufficiency.com/wp-content/uploads/2021/04/japanese-beetle-300x200.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2021/04/japanese-beetle-768x512.jpg 768w" data-pin-nopin="true" data-zoom-image="https://realselfsufficiency.com/wp-content/uploads/2021/04/japanese-beetle.jpg" height="300" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20450%20300'%3E%3C/svg%3E" width="450"><noscript data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">&lt;img src="https://realselfsufficiency.com/wp-content/uploads/2021/04/japanese-beetle.jpg" alt="Japanese Beetles" class="wp-image-11995" width="450" height="300" srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/japanese-beetle.jpg 900w, https://realselfsufficiency.com/wp-content/uploads/2021/04/japanese-beetle-300x200.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2021/04/japanese-beetle-768x512.jpg 768w" sizes="(max-width: 450px) 100vw, 450px" /&gt;</span></noscript></figure></div><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">The Japanese beetle, Popillia japonica, skeletonizes basil leaves, with only the veins being left behind. With an infestation of these common basil pests, plant damage is likely to be extensive, and, as well as significantly stunting growth and reducing plant yield, the plant may die.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1594"><br data-dcnode-id="1596"><span data-dcnode-id="1595" instrument_node="">The adults are up to 13mm long with a metallic appearance, colored green-bronze. They also have white hairs sticking out from under their wing cases on the sides of the body. The larvae grow in the soil and are cream-colored grubs very similar to many other beetle larvae. These immature grubs feed on the roots of plants, so are just as problematic as the mature leaf-eaters.</span></p><span data-dcnode-id="1593" instrument_node="">
</span><h4 data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">How to Get Rid of a Japanese Beetle Infestation</span></h4><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">Getting rid of Japanese beetles is a bit of a challenge, but there are a few natural options at your disposal. Firstly, use floating row covers from early spring. You can also spray kaolin clay in the area. Be vigilant and pick the bugs off the plants and drown them in soapy water. Parasitic nematodes are another good option here, as is neem oil. If you opt for nematodes or natural bacteria such as Bacillus thuringiensis (Bt) or milky spore.</span></p><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1581"><br data-dcnode-id="1586"><span data-dcnode-id="1585" instrument_node="">A great strategy is </span><a data-dcnode-id="1583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//realselfsufficiency.com/pepper-companion-plants/"><span data-dcnode-id="1584" instrument_node="">companion planting</span></a><span data-dcnode-id="1582" instrument_node=""> to deter the pests before they become a problem. Planting garlic, chives, onion, tansy, catnip, and valerian all help to ward off Japanese beetles.</span></p><span data-dcnode-id="1580" instrument_node="">
</span><h3 data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Root Knot Nematodes</span></h3><span data-dcnode-id="1577" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1572"><figure class="aligncenter size-large is-resized" data-dcnode-id="1573"><img alt="root knot nematode basil parasite" class="wp-image-11996" data-dcnode-id="1576" data-lazy-sizes="(max-width: 576px) 100vw, 576px" data-lazy-src="https://realselfsufficiency.com/wp-content/uploads/2021/04/root-knot-nematode.jpg" data-lazy-srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/root-knot-nematode.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2021/04/root-knot-nematode-300x225.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2021/04/root-knot-nematode-90x68.jpg 90w, https://realselfsufficiency.com/wp-content/uploads/2021/04/root-knot-nematode-500x375.jpg 500w" data-pin-nopin="true" data-zoom-image="https://realselfsufficiency.com/wp-content/uploads/2021/04/root-knot-nematode.jpg" height="432" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20576%20432'%3E%3C/svg%3E" width="576"><noscript data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">&lt;img src="https://realselfsufficiency.com/wp-content/uploads/2021/04/root-knot-nematode.jpg" alt="root knot nematode basil parasite" class="wp-image-11996" width="576" height="432" srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/root-knot-nematode.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2021/04/root-knot-nematode-300x225.jpg 300w, https://realselfsufficiency.com/wp-content/uploads/2021/04/root-knot-nematode-90x68.jpg 90w, https://realselfsufficiency.com/wp-content/uploads/2021/04/root-knot-nematode-500x375.jpg 500w" sizes="(max-width: 576px) 100vw, 576px" /&gt;</span></noscript></figure></div><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">You don’t hear much about root knot nematodes, but an infestation can destroy many plants in a single season. Root knot nematodes are several species of microscopic parasitic worms that prey on plant roots.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1565"><br data-dcnode-id="1567"><span data-dcnode-id="1566" instrument_node="">If you’ve got a root knot nematode problem, it’s difficult to diagnose early on as they are microscopic and beneath the ground, and the above-ground symptoms are similar to many other problems that impact basil. You’ll notice your basil plants turning yellow, stunted growth, and significant and unexplained wilting in warm weather.</span></p><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1561"><br data-dcnode-id="1563"><span data-dcnode-id="1562" instrument_node="">Beneath the ground, you can see tell-tale signs. On the roots, you’ll notice bumps and “knots”. These galls range from tiny bumps to large 1-inch knots. Roots may also exhibit other deformities and be hairy. These galls and deformities inhibit the roots taking up water and nutrients, therefore starving and dehydrating the plant.</span></p><span data-dcnode-id="1560" instrument_node="">
</span><h4 data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">How to Get Rid of Root Knot Nematodes on Basil</span></h4><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">It’s difficult to get rid of root knot nematodes. Keeping them out of your soil by only bringing in plants from clean, trusted sources is the best course of action. However, if you do inadvertently introduce them, solarizing your soil is perhaps the best method to get rid of root knot nematodes. </span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">However, it’s not always 100% effective, so it’s advisable to let the area lay fallow for a year too, preventing the remaining nematodes laying their eggs so that they die out naturally without reproducing.</span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1548"><br data-dcnode-id="1550"><span data-dcnode-id="1549" instrument_node="">If you can’t leave the area to fallow, plant crops that root knot nematodes don’t attack, including clover, corn, wheat, and rye.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1544"><br data-dcnode-id="1546"><span data-dcnode-id="1545" instrument_node="">And make sure you keep weeds to an absolute minimum, because these parasitic garden pests aggressively parasitize many weeds such as dandelion.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><h3 data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">Leaf Miners</span></h3><span data-dcnode-id="1540" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1535"><figure class="aligncenter size-large is-resized" data-dcnode-id="1536"><img alt="leaf miner common basil pest" class="wp-image-11997" data-dcnode-id="1539" data-lazy-sizes="(max-width: 576px) 100vw, 576px" data-lazy-src="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-leaf-miner.jpg" data-lazy-srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-leaf-miner.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-leaf-miner-300x240.jpg 300w" data-pin-nopin="true" data-zoom-image="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-leaf-miner.jpg" height="461" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20576%20461'%3E%3C/svg%3E" width="576"><noscript data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">&lt;img src="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-leaf-miner.jpg" alt="leaf miner common basil pest" class="wp-image-11997" width="576" height="461" srcset="https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-leaf-miner.jpg 768w, https://realselfsufficiency.com/wp-content/uploads/2021/04/basil-leaf-miner-300x240.jpg 300w" sizes="(max-width: 576px) 100vw, 576px" /&gt;</span></noscript></figure></div><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1533" instrument_node="">Leaf miners are a number of species of nondescript black flies. The mature flies make a tiny hole in the leaf tips and lays her eggs inside this hole. The larvae hatch and burrow their way through the leaves, eating the flesh and nutrients inside. It’s this action that causes such extensive damage.</span><br data-dcnode-id="1532"><span data-dcnode-id="1531" instrument_node="">If your basil has leaf miners, you’ll see yellow or white wiggly lines all over the leaves.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><h4 data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">How to Get Rid of Leaf Miners on Basil</span></h4><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Getting rid of leaf miners on basil is essential. These pests can go through up to 10 generations in a single year – that’s a lot of bugs to eat their way through all of your crops, not just your basil. You can see how quickly you can have a serious infestation problem.</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1520"><br data-dcnode-id="1522"><span data-dcnode-id="1521" instrument_node="">Neem oil is a great option as it inhibits the growth cycle, significantly reducing the number of larvae that mature, therefore reducing the number of new eggs that are laid.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1516"><br data-dcnode-id="1518"><span data-dcnode-id="1517" instrument_node="">One very effective method of killing leaf miners naturally is to purchase and release natural predators. In this case, the predatory wasps, Diglyphus isaea are incredibly useful. These beneficial insects will quickly get on top of your leaf miner population.</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1512"><br data-dcnode-id="1514"><span data-dcnode-id="1513" instrument_node="">And make sure you rake up leaves fallen leaves and till the soil at the end of the season, as the mature larvae pupate in the soil and can overwinter there.</span></p><span data-dcnode-id="1511" instrument_node="">
</span><h2 data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">Basil Pest and Disease Prevention: How to Minimize the Risk of Basil Diseases and Pest Infestation</span></h2><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Basil is a beautiful, fragrant herb that enhances your food but also benefits many of your other plants, too. It’s well-known, for example, that growing basil near tomatoes enhances the flavor of the tomatoes, stimulates growth and increases yield, and keeps the tomato plants healthy. Plus it deters the tomato hornworm.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1501"><br data-dcnode-id="1504"><span data-dcnode-id="1503" instrument_node="">But it’s a target for a wide variety of pests and pathogens.</span><br data-dcnode-id="1502"></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">However, there are plenty of natural steps you can take to minimize the risk of basil diseases and pests becoming a problem for you.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1494"><br data-dcnode-id="1496"><span data-dcnode-id="1495" instrument_node="">Your aim should be to maintain healthy basil plants by ensuring the right growing conditions. Utilize companion planting to create a rich, biodiverse ecosystem and practice proper soil management.</span></p><span data-dcnode-id="1493" instrument_node="">
