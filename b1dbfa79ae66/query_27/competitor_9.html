</span><h2 data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">FAQs</span></h2><span data-dcnode-id="1365" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="1351"><span data-dcnode-id="1364" instrument_node="">
</span><h3 data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Can you eat basil with downy mildew?</span></h3><span data-dcnode-id="1361" instrument_node=""> </span><div data-dcnode-id="1353"><span data-dcnode-id="1360" instrument_node="">
</span><div class="sc_fs_faq__content" data-dcnode-id="1355"><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">While downy mildew isn’t thought to be poisonous to humans, it’s not advisable to eat basil or any other plants infected with it. Instead, if you spot any signs of downy mildew, remove and destroy the affected leaves. If the damage is extensive, remove and destroy the whole plant.&nbsp;</span></p><span data-dcnode-id="1356" instrument_node="">
</span></div><span data-dcnode-id="1354" instrument_node="">
</span></div><span data-dcnode-id="1352" instrument_node="">
</span></section><span data-dcnode-id="1350" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="1336"><span data-dcnode-id="1349" instrument_node="">
</span><h3 data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Why is my basil plant wilting?</span></h3><span data-dcnode-id="1346" instrument_node=""> </span><div data-dcnode-id="1338"><span data-dcnode-id="1345" instrument_node="">
</span><div class="sc_fs_faq__content" data-dcnode-id="1340"><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Basil can wilt for all kinds of reasons – some as simple as the plant is too hot or hasn’t been given enough water. Common causes of wilting basil include fusarium wilt, root knot nematodes, bacterial wilt, impatiens necrotic spot virus (INSV), and basil root rot.</span></p><span data-dcnode-id="1341" instrument_node="">
</span></div><span data-dcnode-id="1339" instrument_node="">
</span></div><span data-dcnode-id="1337" instrument_node="">
</span></section><span data-dcnode-id="1335" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="1305"><span data-dcnode-id="1334" instrument_node="">
</span><h3 data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">What causes brown spots on basil leaves?</span></h3><span data-dcnode-id="1331" instrument_node=""> </span><div data-dcnode-id="1307"><span data-dcnode-id="1330" instrument_node="">
</span><div class="sc_fs_faq__content" data-dcnode-id="1309"><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Lots of diseases cause brown spots on basil leaves. The most common are:</span></p><span data-dcnode-id="1326" instrument_node="">
</span><ul data-dcnode-id="1311"><li data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Bacterial wilt</span></li><li data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Gray mold</span></li><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Impatiens necrotic spot virus (INSV)</span></li><li data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Basil root rot</span></li><li data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Downy mildew</span></li><li data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Bacterial leaf spot</span></li><li data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Fusarium Wilt</span></li></ul><span data-dcnode-id="1310" instrument_node="">
</span></div><span data-dcnode-id="1308" instrument_node="">
</span></div><span data-dcnode-id="1306" instrument_node="">
</span></section><span data-dcnode-id="1304" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="1287"><span data-dcnode-id="1303" instrument_node="">
</span><h3 data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Why is my basil plant dying?</span></h3><span data-dcnode-id="1300" instrument_node=""> </span><div data-dcnode-id="1289"><span data-dcnode-id="1299" instrument_node="">
</span><div class="sc_fs_faq__content" data-dcnode-id="1291"><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">There are many pests and diseases that can cause your basil plant to die. But most basil plants are made susceptible to these pests and pathogens by either overwatering or underwatering. If your basil plant is dying, first look at the growing conditions. </span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Is your basil getting enough sun? Is it experiencing temperature stress? Is the soil very wet or dry? Can you see any specific symptoms like brown leaves, gray specks, round holes, or yellow patches? The key to find out why your basil plant is dying, and how to save it, is to identify the condition, pest, or disease that’s afflicting it.</span></p><span data-dcnode-id="1292" instrument_node="">
</span></div><span data-dcnode-id="1290" instrument_node="">
</span></div><span data-dcnode-id="1288" instrument_node="">
</span></section><span data-dcnode-id="1286" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="1264"><span data-dcnode-id="1285" instrument_node="">
</span><h3 data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">What causes holes in basil leaves?</span></h3><span data-dcnode-id="1282" instrument_node=""> </span><div data-dcnode-id="1266"><span data-dcnode-id="1281" instrument_node="">
</span><div class="sc_fs_faq__content" data-dcnode-id="1268"><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">The most common pests that cause holes in basil leaves are:</span></p><span data-dcnode-id="1277" instrument_node="">
</span><ul data-dcnode-id="1270"><li data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Slugs and snails</span></li><li data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Flea beetles</span></li><li data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Grasshoppers</span></li></ul><span data-dcnode-id="1269" instrument_node="">
</span></div><span data-dcnode-id="1267" instrument_node="">
</span></div><span data-dcnode-id="1265" instrument_node="">
</span></section><span data-dcnode-id="1263" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="1235"><span data-dcnode-id="1262" instrument_node="">
</span><h3 data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">What is eating my basil?</span></h3><span data-dcnode-id="1259" instrument_node=""> </span><div data-dcnode-id="1237"><span data-dcnode-id="1258" instrument_node="">
</span><div class="sc_fs_faq__content" data-dcnode-id="1239"><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Many bugs like to feast on basil. Some of the most common pests that eat basil are:</span></p><span data-dcnode-id="1254" instrument_node="">
</span><ul data-dcnode-id="1241"><li data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Slugs and snails</span></li><li data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Flea beetles</span></li><li data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Grasshoppers</span></li><li data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Cutworms</span></li><li data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">Japanese beetles</span></li><li data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Leaf miners</span></li></ul><span data-dcnode-id="1240" instrument_node="">
</span></div><span data-dcnode-id="1238" instrument_node="">
</span></div><span data-dcnode-id="1236" instrument_node="">
</span></section><span data-dcnode-id="1234" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="1217"><span data-dcnode-id="1233" instrument_node="">
</span><h3 data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Why is my basil light green?</span></h3><span data-dcnode-id="1230" instrument_node=""> </span><div data-dcnode-id="1219"><span data-dcnode-id="1229" instrument_node="">
</span><div class="sc_fs_faq__content" data-dcnode-id="1221"><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">Your basil may be light green because you’re overwatering it, causing the roots to decay. Your basil may also be infected by basil root rot which destroys the roots, stopping the plant absorbing sufficient water and nutrients.</span></p><span data-dcnode-id="1225" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Root knot nematodes may also be the cause of your basil turning light green. These parasitic microscopic worms cause galls and deformities on the basil’s roots, preventing them from taking up sufficient water and nutrients.</span></p><span data-dcnode-id="1222" instrument_node="">
</span></div><span data-dcnode-id="1220" instrument_node="">
</span></div><span data-dcnode-id="1218" instrument_node="">
</span></section><span data-dcnode-id="1216" instrument_node="">
</span><section class="sc_fs_faq sc_card" data-dcnode-id="1199"><span data-dcnode-id="1215" instrument_node="">
</span><h3 data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">How do you keep bugs from eating basil?</span></h3><span data-dcnode-id="1212" instrument_node=""> </span><div data-dcnode-id="1201"><span data-dcnode-id="1211" instrument_node="">
</span><div class="sc_fs_faq__content" data-dcnode-id="1203"><span data-dcnode-id="1210" instrument_node="">
</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Introduce or encourage predatory insects and birds. Use floating row covers. Companion plant to deter specific bugs. Use parasitic or fungal nematodes that target specific pest species. Spray neem oil if absolutely necessary. </span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">To stop bugs eating basil naturally, you may have to use more than one approach. But your primary goal should be to keep your basil healthy to minimize the risk of attack.</span></p><span data-dcnode-id="1204" instrument_node="">
</span></div><span data-dcnode-id="1202" instrument_node="">
</span></div><span data-dcnode-id="1200" instrument_node="">

</span><section class="ast-comment-content comment" data-dcnode-id="948"><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Yes, herbs don’t like being over-watered. If you’re growing them outside directly in the ground, take a 1 or 2 liter juice bottle, take the lid off, cut the bottom off the bottle, then bury it 1/3 of the way into the soil with the neck downwards, a few inches from your plant. Fill it with water, then the water will slowly leak out of the bottle into the soil. It keeps your plant moist but not too wet and helps prevent these kinds of diseases.</span></p><span data-dcnode-id="956" instrument_node="">
