ps://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%3A//morningchores.com/asparagus-diseases/%26media%3Dhttps%3A//morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases.jpg%26description%3D10%2BMost%2BCommon%2BAsparagus%2BDiseases%2Band%2BHow%2Bto%2BTreat%2BThem" rel="noopener noreferrer" target="_blank"><span class="icon-pinterest-p" data-dcnode-id="709"></span></a><span data-dcnode-id="707" instrument_node=""> </span><a aria-label="Tweet on Twitter" class="share-button twitter" data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A//morningchores.com/asparagus-diseases/%26text%3D10%2BMost%2BCommon%2BAsparagus%2BDiseases%2Band%2BHow%2Bto%2BTreat%2BThem" rel="noopener noreferrer" target="_blank"><span class="icon-twitter" data-dcnode-id="706"></span></a><span data-dcnode-id="704" instrument_node=""> </span><a aria-label="Send via Email" class="share-button email" data-dcnode-id="702" href="mailto:?&amp;subject=&amp;body=Check%20out%20this%20article%20from%20MorningChores%3A%20https://morningchores.com/asparagus-diseases/" rel="noopener noreferrer" target="_blank"><span class="icon-envelope" data-dcnode-id="703"></span></a></div><h1 class="entry-title" data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">10 Most Common Asparagus Diseases and How to Treat Them</span></h1><div class="entry-meta" data-dcnode-id="683"><span data-dcnode-id="698" instrument_node="">By </span><span class="entry-author" data-dcnode-id="695" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span class="entry-author-name as-link" data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Rebekah Pierce</span></span></span><aside class="author-box-wrapper" data-dcnode-id="684"><a class="author-box-link" data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/author/rebekahpierce/" itemprop="url"><div class="author-box" data-dcnode-id="686" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><noscript data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">&lt;img alt='' src='https://morningchores.com/wp-content/uploads/2019/11/rebekahpiercepp-125x125.jpg' srcset='https://morningchores.com/wp-content/uploads/2019/11/rebekahpiercepp-250x250.jpg 2x' class='avatar avatar-125 photo' height='125' width='125' /&gt;</span></noscript><img alt="" class="lazyload avatar avatar-125 photo" data-dcnode-id="692" data-src="https://morningchores.com/wp-content/uploads/2019/11/rebekahpiercepp-125x125.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2019/11/rebekahpiercepp-250x250.jpg 2x" height="125" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20125%20125%22%3E%3C/svg%3E" width="125"><span class="author-box-title as-heading text-normal" data-dcnode-id="690" itemprop="name"><span data-dcnode-id="691" instrument_node="">Rebekah Pierce</span></span><div class="author-box-content text-small" data-dcnode-id="687" itemprop="description"><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Rebekah started a small farm with her husband in 2016 in upstate New York, just north of the pristine Adirondack Mountains, where she grows vegetables and herbs and also raises sheep, chickens, and pigs. There’s nothing she loves more than helping others learn more especially about sustainable living as it pertains to health and homesteading. An avid cook, she works hard to grow and preserve enough food to support her family throughout the year.</span></p></div></div></a></aside></div><div class="print-this" data-dcnode-id="678"><a class="print-button" data-dcnode-id="679" onclick="window.print();return false;"><span data-dcnode-id="682" instrument_node="">Print </span><svg data-dcnode-id="680" height="15px" viewBox="0 0 475.1 475.1" width="15px" xmlns="http://www.w3.org/2000/svg"><path d="M459 217.1c-10.8-10.8-23.7-16.1-38.7-16.1h-18.3v-73.1c0-7.6-1.9-16-5.7-25.1 -3.8-9.1-8.4-16.4-13.7-21.7L339.2 37.7c-5.3-5.3-12.6-9.9-21.7-13.7 -9.1-3.8-17.5-5.7-25.1-5.7H100.5c-7.6 0-14.1 2.7-19.4 8 -5.3 5.3-8 11.8-8 19.4V201H54.8c-15 0-27.9 5.4-38.7 16.1C5.4 227.9 0 240.8 0 255.8v118.8c0 2.5 0.9 4.6 2.7 6.4 1.8 1.8 4 2.7 6.4 2.7h64v45.7c0 7.6 2.7 14.1 8 19.4 5.3 5.3 11.8 8 19.4 8h274.1c7.6 0 14.1-2.7 19.4-8 5.3-5.3 8-11.8 8-19.4v-45.7h64c2.5 0 4.6-0.9 6.4-2.7 1.8-1.8 2.7-3.9 2.7-6.4V255.8C475.1 240.8 469.7 227.9 459 217.1zM365.4 420.3H109.6v-73.1h255.8V420.3zM365.4 237.5H109.6V54.8h182.7v45.7c0 7.6 2.7 14.1 8 19.4 5.3 5.3 11.8 8 19.4 8h45.7V237.5zM433.1 268.7c-3.6 3.6-7.9 5.4-12.8 5.4 -4.9 0-9.2-1.8-12.8-5.4 -3.6-3.6-5.4-7.9-5.4-12.8s1.8-9.2 5.4-12.8c3.6-3.6 7.9-5.4 12.8-5.4 4.9 0 9.2 1.8 12.8 5.4 3.6 3.6 5.4 7.9 5.4 12.8S436.7 265 433.1 268.7z" data-dcnode-id="681"></path></svg></a></div></header><div class="entry-post" data-dcnode-id="401" id="entry-post"><div class="entry-image" data-dcnode-id="673"><noscript data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">&lt;img width="1200" height="800" src="https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases.jpg" class="post-image post-lead" alt="" srcset="https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases.jpg 1200w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-352x235.jpg 352w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><img alt="" class="post-image post-lead lazyloaded" data-dcnode-id="674" data-sizes="(max-width: 1200px) 100vw, 1200px" data-src="https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases.jpg 1200w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-352x235.jpg 352w" height="800" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases.jpg 1200w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-800x533.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/03/Asparagus-Diseases-352x235.jpg 352w" width="1200"></div><div class="entry-content" data-dcnode-id="402"><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">I’ve never been very successful at growing asparagus.</span></p><p data-dcnode-id="666"><span data-dcnode-id="670" instrument_node="">The first year I </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/growing-asparagus/"><span data-dcnode-id="669" instrument_node="">grew asparagus</span></a><span data-dcnode-id="667" instrument_node="">, I completely ignored conventional wisdom (and planting instructions) and harvested asparagus shoots during the first growing season. Rookie mistake! You aren’t supposed to harvest asparagus until at least the second year, and even then it should be done sparingly so that the plants have time to get established.</span></p><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">The next year, I recognized my mistake. I waited and waited and waited to harvest…. and ended up not cutting any asparagus at all because by the point I had built up enough confidence to do so, the shoots were tough and woody.</span></p><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">This year is going to be my year. I felt so confident in my asparagus growing prowess that I even started some plants from seed – and they are doing very well. In preparing for my bumper crop, I did some preventative research about the most common asparagus diseases.&nbsp;</span></p><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Here’s what you need to know.&nbsp;</span></p><h2 data-dcnode-id="658" id="h-10-most-common-asparagus-diseases"><span data-dcnode-id="659" instrument_node="">10 Most Common Asparagus Diseases</span></h2><h3 data-dcnode-id="656" id="h-1-purple-spot"><span data-dcnode-id="657" instrument_node="">1. Purple Spot</span></h3><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Purple spot is a disease that usually only affects asparagus plants, unlike many other diseases on this list that target plants of all kinds.&nbsp;</span></p><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">It’s pretty easy to diagnose. During particularly wet or windy weather, purple spots will develop on your spears. The good news is that the spots don’t affect the taste or texture of your asparagus spears, and they often disappear entirely during cooking.</span></p><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">The bad news is that, if you are trying to sell your spears or otherwise just care how they look, the purple spots will detract from their overall appearance.</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Also, if left unattended, the spots can develop into full lesions and grow together into large blobs, ultimately killing affected tissue and defoliating the plants.&nbsp;</span></p><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Most common in cool, damp weather, purple spots can be prevented by following good field sanitation. Cut back last year’s ferns and remove any plants affected by the disease.</span></p><h3 data-dcnode-id="644" id="h-2-rust"><span data-dcnode-id="645" instrument_node="">2. Rust</span></h3><div class="wp-block-image" data-dcnode-id="639"><figure class="aligncenter size-large" data-dcnode-id="640"><noscript data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">&lt;img width="800" height="534" src="https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-800x534.jpg" alt="" class="wp-image-622415" srcset="https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-800x534.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant.jpg 1000w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><img alt="" class="wp-image-622415 lazyloaded" data-dcnode-id="641" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-800x534.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-800x534.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant.jpg 1000w" height="534" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-800x534.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-800x534.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2021/03/Rust-on-asparagus-plant.jpg 1000w" width="800"></figure></div><p data-dcnode-id="635"><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/plant-rust/"><span data-dcnode-id="638" instrument_node="">Rust</span></a><span data-dcnode-id="636" instrument_node=""> is one of the most common asparagus diseases. It presents several symptoms depending on the season.&nbsp;</span></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">It first rears its ugly head in the early spring or early summer, appearing as small, raised lesions that are generally light green.</span></p><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Eventually, these turn a whiter or orange color and become more sunken in. You might not notice them at first, but as they progress, additional lesions will appear around the base of the stems.&nbsp;</span></p><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Then, the namesake rust develops. This occurs as the weather warms later in the summer. The first set of lesions will burst, disseminating spores into the air and infecting other plants. You’ll know it’s rust for sure if you brush the asparagus ferns and come away with your hands covered in a reddish tinge.&nbsp;</span></p><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">The problem does not go away as the weather cools, with black overwintering spores being produced that can weaken the stems the following spring. It can cause the whole plant to die back.&nbsp;</span></p><p data-dcnode-id="622"><span data-dcnode-id="626" instrument_node="">The easiest way to prevent rust is to cut back the ferns as they die over the winter. Dispose of the infected pieces. Although crop rotation isn’t really possible with asparagus since it is a perennial plant, avoid planting new beds in the same general vicinity as the old ones. You may have to use a </span><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/homemade-fungicides/"><span data-dcnode-id="625" instrument_node="">fungicide</span></a><span data-dcnode-id="623" instrument_node=""> to kill existing spores.</span></p><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Of course, fungal spores are more likely to infect plants when they are damp from rain or dew. Planting in a location that is sunny and somewhat breezy can help the plants dry out.&nbsp;</span></p><h3 data-dcnode-id="618" id="h-3-fusarium-crown-rot"><span data-dcnode-id="619" instrument_node="">3. Fusarium Crown Rot</span></h3><figure class="wp-block-image size-large" data-dcnode-id="614"><noscript data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">&lt;img width="800" height="586" src="https://morningchores.com/wp-content/uploads/2021/03/Fusarium-800x586.jpg" alt="" class="wp-image-622473" srcset="https://morningchores.com/wp-content/uploads/2021/03/Fusarium-800x586.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Fusarium-600x440.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Fusarium.jpg 1000w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><img alt="" class="wp-image-622473 lazyloaded" data-dcnode-id="615" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2021/03/Fusarium-800x586.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/03/Fusarium-800x586.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Fusarium-600x440.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Fusarium.jpg 1000w" height="586" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/03/Fusarium-800x586.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/03/Fusarium-800x586.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Fusarium-600x440.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Fusarium.jpg 1000w" width="800"></figure><p data-dcnode-id="607"><span data-dcnode-id="613" instrument_node="">Fusarium crown root is generally caused by one of three species of Fusarium fungus: </span><em data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Fusarium oxysporum f. sp. asparagi, Fusarium proliferatum</span></em><span data-dcnode-id="610" instrument_node="">, and </span><em data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Fusarium moniliform.</span></em></p><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">This issue, also known simply as Fusarium disease, can cause yellowing, dry rot, wilting, and eventual plant death. It’s a soil-borne fungus that kills plants quickly after it infects them with red-brown lesions. It typically causes the roots to rot and die immediately, too.&nbsp;</span></p><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Unfortunately, this disease is hard to prevent and get rid of. Crown rot can live in soil for a long period, spreading through infected air, soil, and seeds.</span></p><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Plants that are stressed are more likely to be infected, so keeping up good cultural practices to avoid stressing your plants is essential. You should also work to improve drainage so that the soil does not remain soggy.&nbsp;</span></p><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">A simple way to prevent the disease is to keep the area around the asparagus beds free from weeds – these can harbor fungal spores and make it tough for you to get rid of the disease in the future.</span></p><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Don’t harvest your asparagus plants continuously throughout the season, but let them rest periodically so that you don’t overstress them. Being consistent with fertilization and irrigation is also essential.&nbsp;</span></p><h3 data-dcnode-id="595" id="h-4-blight"><span data-dcnode-id="596" instrument_node="">4. Blight</span></h3><figure class="wp-block-image size-large" data-dcnode-id="591"><noscript data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">&lt;img width="600" height="800" src="https://morningchores.com/wp-content/uploads/2021/03/Blight-600x800.jpg" alt="" class="wp-image-622474" srcset="https://morningchores.com/wp-content/uploads/2021/03/Blight-600x800.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Blight.jpg 750w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript><img alt="" class="wp-image-622474 lazyloaded" data-dcnode-id="592" data-sizes="(max-width: 600px) 100vw, 600px" data-src="https://morningchores.com/wp-content/uploads/2021/03/Blight-600x800.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/03/Blight-600x800.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Blight.jpg 750w" height="800" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/03/Blight-600x800.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/03/Blight-600x800.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Blight.jpg 750w" width="600"></figure><p data-dcnode-id="583"><span data-dcnode-id="590" instrument_node="">Blight, also known as </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//extension.okstate.edu/fact-sheets/diseases-of-asparagus-in-oklahoma.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="589" instrument_node="">Cercospora blight</span></a><span data-dcnode-id="587" instrument_node="">, is caused by </span><em data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Cercospora asparagi</span></em><span data-dcnode-id="584" instrument_node=""> fungus. It causes gray or tan lesions to form on needles and small branches of plants, with each lesion surrounded by a red-brown border. These spores, like other fungal spores, are distributed by wind and rain.&nbsp;</span></p><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">As you might expect, this disease is more common during periods of wet weather. It can cause poor photosynthesis and a reduction in plant yields. Over time, it can reduce the longevity of your plants.</span></p><p data-dcnode-id="576"><span data-dcnode-id="580" instrument_node="">To prevent blight, </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/automatic-watering-systems/"><span data-dcnode-id="579" instrument_node="">water in the morning</span></a><span data-dcnode-id="577" instrument_node=""> so that the foliage has time to dry off. Make sure plants are spaced in rows 6-feet apart so that air can move among the plants to dry them off. You may have to get rid of infected plants, but some fungicides can be effective at getting rid of this disease, too.&nbsp;</span></p><h3 data-dcnode-id="574" id="h-5-dead-stem"><span data-dcnode-id="575" instrument_node="">5. Dead Stem</span></h3><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Dead stem is a fungal plant pathogen that is closely related to the pathogens responsible for common root rot, stalk rot, ear blight, and other diseases that can affect asparagus and other plants like cereal grains.&nbsp;</span></p><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Another soil-borne fungus, this disease can spread through infected seeds. Using sterilized equipment, seeds, and growing supplies is essential. There are several resistant cultivars to the dead stem that you can grow and again, making sure the soil is healthy and clear of disease before planting is also essential.&nbsp;</span></p><h3 data-dcnode-id="568" id="h-6-phytophthora-crown-root-and-spear-rot"><span data-dcnode-id="569" instrument_node="">6. Phytophthora Crown, Root, and Spear Rot</span></h3><div class="wp-block-image" data-dcnode-id="563"><figure class="aligncenter size-large" data-dcnode-id="564"><noscript data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">&lt;img width="800" height="534" src="https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-800x534.jpg" alt="" class="wp-image-622416" srcset="https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-800x534.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant.jpg 1000w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><img alt="" class="wp-image-622416 lazyloaded" data-dcnode-id="565" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-800x534.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-800x534.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant.jpg 1000w" height="534" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-800x534.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-800x534.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-600x400.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-728x485.jpg 728w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-550x367.jpg 550w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant-352x235.jpg 352w, https://morningchores.com/wp-content/uploads/2021/03/Rot-on-asparagus-plant.jpg 1000w" width="800"></figure></div><p data-dcnode-id="558"><span data-dcnode-id="562" instrument_node="">This disease is also fungal, caused by the pathogen </span><em data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Phytophthora asparagi</span></em><span data-dcnode-id="559" instrument_node="">. It is most common when soils are wet and starts as soft, water-soaked lesions that begin on the plant just above the soil line. Plants that are infected often become yellow, and you may find that the crowns die off, too.&nbsp;</span></p><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Crown, root, and spear rot, left untreated, can dramatically shorten the lifespan of your plants.&nbsp;</span></p><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">This disease is best prevented by avoiding planting in wet areas. You can also apply fungicides to get rid of it should it set in.</span></p><h3 data-dcnode-id="552" id="h-7-watery-soft-rot"><span data-dcnode-id="553" instrument_node="">7. Watery Soft Rot</span></h3><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">The good news is that this disease of asparagus is relatively uncommon. It results in watery-looking lesions on your plants that eventually enlarge to look like white mold. Advanced stages of the disease may cause hard black growths.&nbsp;</span></p><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">This disease is often confused with Fusarium rot – it’s only when the mold develops that you can truly tell the difference. It is often spread from plant to plant and is more likely to affect plants that have been wounded somehow. Avoid over harvesting your plants and use sterile tools when you do so. Again, maintaining proper watering and soil conditions is ideal.&nbsp;</span></p><h3 data-dcnode-id="546" id="h-8-asparagus-mosaic-virus"><span data-dcnode-id="547" instrument_node="">8. Asparagus Mosaic Virus</span></h3><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">There are few viral diseases to which asparagus is prone, but asparagus mosaic virus is one of them. This disease often goes unnoticed with very few visible symptoms. However, it can dramatically decrease your yields and make your plants more likely to suffer from other diseases.</span></p><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Occasionally the virus will also cause a “mosaic” pattern of light and dark green mottling on the plant.&nbsp;</span></p><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Removing infected plants can help, as can moving plants to new spots if the virus has been detected in the original planting location. The virus can sometimes be seed-borne, so make sure you are using certified seed stock to start your plants. Pests like aphids can also spread it, so you will have to control insects in your garden as well.</span></p><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">This virus can overwinter on your plants so clean up the garden after each growing season and keep weeds under control.</span></p><h3 data-dcnode-id="536" id="h-9-zopfia-root-rot"><span data-dcnode-id="537" instrument_node="">9. Zopfia Root Rot</span></h3><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Zopfia root rot is an asparagus-specific disease that can lead to root rot when plants are wounded or weakened. It spreads slowly in the rhizome at first, but then moves quickly in the roots, forming dark cankers.&nbsp;</span></p><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Again, this disease can be tough to treat and prevent, but following good watering and ventilation practices can help keep it at bay.</span></p><h3 data-dcnode-id="530" id="h-10-gray-mold-shoot-blight"><span data-dcnode-id="531" instrument_node="">10. Gray Mold Shoot Blight</span></h3><figure class="wp-block-image size-large" data-dcnode-id="522"><noscript data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">&lt;img width="800" height="600" src="https://morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea-800x600.jpg" alt="" class="wp-image-622475" srcset="https://morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea-800x600.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea-600x450.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea.jpg 1000w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><div class="wpr-pinterest-container" data-dcnode-id="523" style="max-width: 728px;"><img alt="" class="wp-image-622475 lazyloaded" data-dcnode-id="527" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea-800x600.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea-800x600.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea-600x450.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea.jpg 1000w" height="600" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea-800x600.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea-800x600.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea-600x450.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea.jpg 1000w" width="800"><div class="wpr-pinterest-button" data-dcnode-id="524"><a aria-label="pin this image" class="pin-this" data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/link/%3Furl%3Dhttps%253A%252F%252Fmorningchores.com%252Fasparagus-diseases%252F%3Futm_source%3Dimagepin%26media%3Dhttps%3A//morningchores.com/wp-content/uploads/2021/03/Botrytis-cinerea-800x600.jpg%26description%3D10%2520Most%2520Common%2520Asparagus%2520Diseases%2520and%2520How%2520to%2520Treat%2520Them" rel="noopener noreferrer" target="_blank"><span class="wpr-pin-image" data-dcnode-id="526"></span></a></div></div></figure><p data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">Gray mold shoot blight, often known simply as gray mold, is caused by a fungus named </span><em data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Botrytis cinerea</span></em><span data-dcnode-id="518" instrument_node="">. It affects many kinds of plants in addition to asparagus, such as strawberries and wine grapes.&nbsp;</span></p><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">The most obvious sign of an infestation is the development of gray masses and rot. It is most common in wet, humid conditions and in soils with a low pH. Standing water harbors spores and makes it possible for the disease to live a long time in the soil.</span></p><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Avoid placing your asparagus plants too close together and water first thing in the morning so the plants have time to dry out at night. Ventilation and airflow are crucial in preventing this disease. You should also avoid over fertilizing with excess nitrogen, as it can increase the incidence of disease.</span></p><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Finally, be sure to harvest asparagus every year (after the first year, of course). There’s evidence that regularly pruning and purposely removing bits of plants can help keep this disease at bay. There are some fungicides you can use, too, but many strains of this fungus are resistant, so you’ll have to use them sparingly.&nbsp;</span></p><h2 data-dcnode-id="509" id="h-how-to-prevent-asparagus-diseases"><span data-dcnode-id="510" instrument_node="">How to Prevent Asparagus Diseases</span></h2><div class="wp-block-image" data-dcnode-id="500"><figure class="aligncenter size-large" data-dcnode-id="501"><noscript data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">&lt;img width="800" height="496" src="https://morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant-800x496.jpg" alt="" class="wp-image-622414" srcset="https://morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant-800x496.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant-600x372.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant.jpg 1000w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript><div class="wpr-pinterest-container" data-dcnode-id="502" style="max-width: 728px;"><img alt="" class="wp-image-622414 lazyloaded" data-dcnode-id="506" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant-800x496.jpg" data-srcset="https://morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant-800x496.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant-600x372.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant.jpg 1000w" height="496" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant-800x496.jpg&amp;raw" srcset="https://morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant-800x496.jpg 800w, https://morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant-600x372.jpg 600w, https://morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant.jpg 1000w" width="800"><div class="wpr-pinterest-button" data-dcnode-id="503"><a aria-label="pin this image" class="pin-this" data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/link/%3Furl%3Dhttps%253A%252F%252Fmorningchores.com%252Fasparagus-diseases%252F%3Futm_source%3Dimagepin%26media%3Dhttps%3A//morningchores.com/wp-content/uploads/2021/03/Watering-asparagus-plant-800x496.jpg%26description%3D10%2520Most%2520Common%2520Asparagus%2520Diseases%2520and%2520How%2520to%2520Treat%2520Them" rel="noopener noreferrer" target="_blank"><span class="wpr-pin-image" data-dcnode-id="505"></span></a></div></div></figure></div><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">When it comes to preventing and treating asparagus diseases, it’s important to act early and often. Proper watering and ample amounts of air circulation are doubly important to make sure your plants don’t suffer from any life-threatening illnesses.</span></p><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Even if you take all the proper preventative measures, though, it is still possible for your plants to suffer at some stage in their life. After all, asparagus plants live quite a long time – several decades, in some cases – so some hardship is inevitable.&nbsp;</span></p><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Again, treating your plants early is essential. There are various fungicides you can use to control many fungal diseases.&nbsp;</span></p><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Otherwise, follow the tips above for preventing and treating each disease and you’ll be able to enjoy a bumper crop of tasty, tender shoots for years to come.&nbsp;</span></p><span data-dcnode-id="491" instrument_node=""> </span><span data-dcnode-id="488" instrument_node=""> </span><div data-dcnode-id="479" id="af-was"><h3 data-dcnode-id="486" id="13-was-this-article-helpful"><span data-dcnode-id="487" instrument_node="">Was this article helpful?</span></h3><span data-dcnode-id="485" instrument_node=""> </span><a data-dcnode-id="483" href="#" id="af-yes"><span data-dcnode-id="
