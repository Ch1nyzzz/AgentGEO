</span><figure class="wp-block-image size-large" data-dcnode-id="1135"><img alt="Tomato with Phytophthora infestans" class="wp-image-35051 jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="35051" data-comments-opened="1" data-dcnode-id="1138" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="gardeningchannel-celebrity-tomato-pets-diseases" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-celebrity-tomato-pets-diseases.jpg?fit=600%2C303&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-celebrity-tomato-pets-diseases.jpg?fit=600%2C303&amp;ssl=1" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-celebrity-tomato-pets-diseases.jpg?fit=600%2C303&amp;ssl=1" data-orig-size="600,303" data-permalink="https://www.gardeningchannel.com/gardeningchannel-celebrity-tomato-pets-diseases/" data-recalc-dims="1" height="303" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-celebrity-tomato-pets-diseases.jpg%3Fresize%3D600%252C303%26ssl%3D1&amp;raw" width="600"><noscript data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">&lt;img data-attachment-id="35051" data-permalink="https://www.gardeningchannel.com/gardeningchannel-celebrity-tomato-pets-diseases/" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-celebrity-tomato-pets-diseases.jpg?fit=600%2C303&amp;amp;ssl=1" data-orig-size="600,303" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="gardeningchannel-celebrity-tomato-pets-diseases" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-celebrity-tomato-pets-diseases.jpg?fit=600%2C303&amp;amp;ssl=1" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-celebrity-tomato-pets-diseases.jpg?fit=600%2C303&amp;amp;ssl=1" width="600" height="303" src="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-celebrity-tomato-pets-diseases.jpg?resize=600%2C303&amp;#038;ssl=1" alt="Tomato with Phytophthora infestans" class="wp-image-35051" data-recalc-dims="1"/&gt;</span></noscript></figure><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">by Bethany Hayes</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">If you belong to the 90 percent of gardeners who grow tomatoes, understanding tomato plant diseases need to be on your list of things to do. Many gardeners find growing tomatoes frustrating because the plants fall victim to a range of diseases. Knowing the common plant diseases helps you learn how to prevent them and how to stop infections before they destroy your plants.&nbsp;</span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Plant diseases are sneaky, so prevention measures are essential. Bacteria and fungi operate on the microscopic level, making it hard to notice a disease until it takes over your entire plant.&nbsp;</span></p><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">The last thing you want to do is treat your plants with chemicals that could seep into the food you’re growing. Organic gardeners face an extra step – learning how to treat tomato plant diseases organically. Chemicals have a time and place, but in most situations, organic treatment options exist.&nbsp;</span></p><span data-dcnode-id="1122" instrument_node="">
</span><span data-dcnode-id="1121" id="more-40684"></span><span data-dcnode-id="1120" instrument_node="">
</span><h2 data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">11 Common Tomato Plant Diseases</span></h2><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">We’re going to look at the most common tomato plant disease. It’s impossible to cover all of the diseases your plants could face; many diseases are regional. Instead, we’ll look at the ones you are most likely to encounter and show you how to stop the disease in its tracks.&nbsp;</span></p><span data-dcnode-id="1114" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1113"><span data-dcnode-id="1112" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1108"><img alt="" class="wp-image-31675 jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="31675" data-comments-opened="1" data-dcnode-id="1111" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="damping-off-tomato-seedlings" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?fit=600%2C314&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?fit=1200%2C628&amp;ssl=1" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?fit=1200%2C628&amp;ssl=1" data-orig-size="1200,628" data-permalink="https://www.gardeningchannel.com/tomato-diseases-how-to-fight-damping-off/damping-off-tomato-seedlings/" data-recalc-dims="1" height="314" loading="eager" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg%3Fresize%3D600%252C314%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?resize=600%2C314&amp;ssl=1 600w, https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?resize=768%2C402&amp;ssl=1 768w, https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?w=1200&amp;ssl=1 1200w" width="600"><noscript data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">&lt;img data-attachment-id="31675" data-permalink="https://www.gardeningchannel.com/tomato-diseases-how-to-fight-damping-off/damping-off-tomato-seedlings/" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?fit=1200%2C628&amp;amp;ssl=1" data-orig-size="1200,628" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"1"}" data-image-title="damping-off-tomato-seedlings" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?fit=1200%2C628&amp;amp;ssl=1" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?fit=600%2C314&amp;amp;ssl=1" loading="lazy" width="600" height="314" src="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?resize=600%2C314&amp;#038;ssl=1" alt="" class="wp-image-31675" srcset="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?resize=600%2C314&amp;amp;ssl=1 600w, https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?resize=768%2C402&amp;amp;ssl=1 768w, https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/damping-off-tomato-seedlings.jpg?w=1200&amp;amp;ssl=1 1200w" sizes="(max-width: 600px) 100vw, 600px" data-recalc-dims="1" /&gt;</span></noscript></figure><span data-dcnode-id="1107" instrument_node="">
</span><h2 data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Damping Off</span></h2><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">One of the first tomato plant diseases you might encounter is damping off, a fungal disease that causes the collapse of seedlings or the failure to germinate. It can be frustrating for new gardeners to put work into starting seeds at home, only to have plants fail and die because of damping off.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">In most cases, damping off is due to poor drainage or compacted soil. It also can happen due to poor air circulation around your seedlings.&nbsp;</span></p><span data-dcnode-id="1098" instrument_node="">
</span><h4 data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Signs of Damping Off</span></h4><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Damping off affects seedlings more so than larger plants. The most common signs are that they fall over and die soon after germination and emerging from the soil. The stems might turn dark and start to shrivel at the soil line.</span></p><span data-dcnode-id="1092" instrument_node="">
</span><h4 data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Preventing and Treating Damping Off&nbsp;</span></h4><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1088" instrument_node="">There is no cure for plants that have damping off, but you can prevent the problem from happening at all. Using small fans to increase air circulation and using sterilize potting soil are just a few ways </span><a data-dcnode-id="1086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeningchannel.com/tomato-diseases-how-to-fight-damping-off/"><span data-dcnode-id="1087" instrument_node="">to fight damping off</span></a><span data-dcnode-id="1085" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1083" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1082"><span data-dcnode-id="1081" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1077"><img alt="" class="wp-image-31827 jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="31827" data-comments-opened="1" data-dcnode-id="1080" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;1&quot;}" data-image-title="Bacterial-Canker" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?fit=600%2C314&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?fit=1200%2C628&amp;ssl=1" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?fit=1200%2C628&amp;ssl=1" data-orig-size="1200,628" data-permalink="https://www.gardeningchannel.com/tomato-diseases-how-to-fight-bacterial-canker/bacterial-canker/" data-recalc-dims="1" height="314" loading="eager" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg%3Fresize%3D600%252C314%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?resize=600%2C314&amp;ssl=1 600w, https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?resize=768%2C402&amp;ssl=1 768w, https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?w=1200&amp;ssl=1 1200w" width="600"><noscript data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">&lt;img data-attachment-id="31827" data-permalink="https://www.gardeningchannel.com/tomato-diseases-how-to-fight-bacterial-canker/bacterial-canker/" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?fit=1200%2C628&amp;amp;ssl=1" data-orig-size="1200,628" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"1"}" data-image-title="Bacterial-Canker" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?fit=1200%2C628&amp;amp;ssl=1" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?fit=600%2C314&amp;amp;ssl=1" loading="lazy" width="600" height="314" src="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?resize=600%2C314&amp;#038;ssl=1" alt="" class="wp-image-31827" srcset="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?resize=600%2C314&amp;amp;ssl=1 600w, https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?resize=768%2C402&amp;amp;ssl=1 768w, https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/01/Bacterial-Canker.jpg?w=1200&amp;amp;ssl=1 1200w" sizes="(max-width: 600px) 100vw, 600px" data-recalc-dims="1" /&gt;</span></noscript></figure><span data-dcnode-id="1076" instrument_node="">
</span><h2 data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Bacterial Canker</span></h2><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1069"><em data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Clavibacter michniganesis </span></em><span data-dcnode-id="1070" instrument_node="">causes this bacterial infection. It occurs naturally; it’s easy to bring it into your garden on different tools or previously infected plants. Water splashes the bacteria onto the plant, and once the bacteria find an open sore or wound, it infects the plant.&nbsp;</span></p><span data-dcnode-id="1068" instrument_node="">
</span><h4 data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Signs of Bacterial Canker</span></h4><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">It’s easy to mistake bacterial canker for cloudy spot disease.&nbsp;</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">It starts as yellow dots on ripening red tomatoes. If you have a magnifying glass, a close inspection of those dots will show that they have dark rims around each of the spots. That’s one way to tell bacterial canker vs. cloudy spot disease.&nbsp;</span></p><span data-dcnode-id="1059" instrument_node="">
</span><h4 data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Preventing and Treating Bacterial Canker&nbsp;</span></h4><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Unfortunately, this bacterial disease is impossible to treat. Once infected, plants must be removed from the garden beds immediately, and avoid planting tomatoes in the same soil for a minimum of three years.&nbsp;</span></p><span data-dcnode-id="1053" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Make sure you trash the plants or burn them; never put them in your compost bin.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">While treating bacterial canker is impossible, preventing it is possible.&nbsp;</span></p><span data-dcnode-id="1047" instrument_node="">
</span><ol data-dcnode-id="1044"><li data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Rotate Crops</span></li></ol><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">It’s essential to rotate your crops to prevent diseases and bacteria from taking hold in the soil. In the following year, don’t plant tomatoes or any other nightshade plant in the same garden bed.&nbsp;</span></p><span data-dcnode-id="1040" instrument_node="">
</span><ol data-dcnode-id="1037" start="2"><li data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">Clear Out Garden Weeds</span></li></ol><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Bacterial canker runs rampant in the Solanaceae family. That includes many common garden weeds, so keep your garden clean and clear of weeds. That’s a simple way to reduce the spread of bacterial canker.&nbsp;</span></p><span data-dcnode-id="1033" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1032"><span data-dcnode-id="1031" instrument_node="">
</span><h2 data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Anthracnose&nbsp;</span></h2><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1027" instrument_node="">A fungus called </span><em data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Colletotrichum phomoides </span></em><span data-dcnode-id="1024" instrument_node="">causes anthracnose. This fungus loves hot, moist weather, and it spreads easily by overhead irrigation and sprinklers, as well as heavy rain. When the water hits infected soil, it splashes the soil onto the stem and leaves, infecting the plant.&nbsp;</span></p><span data-dcnode-id="1022" instrument_node="">
</span><h4 data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Signs of Anthracnose</span></h4><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Anthracnose presents itself as the tomatoes start to ripen, forming a dark, bull’s eye on the fruits that appear on the blossom end of the tomato. The spot is mushy and sunken, making it easy to spot.&nbsp;</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">In some cases, the flesh of the fruit might rot entirely off. If you slice into an infected tomato, the black spot looks rotten on the inside. Picking ripens fruits frequently helps to reduce the spread.&nbsp;</span></p><span data-dcnode-id="1013" instrument_node="">
</span><h4 data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Preventing and Treating Anthracnose&nbsp;</span></h4><span data-dcnode-id="1010" instrument_node="">
</span><ol data-dcnode-id="1007"><li data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Water Correctly</span></li></ol><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Make sure you water correctly. That might mean you need to switch watering methods, allowing the water to drip on the roots, not the leaves. The water should reach the roots.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><ol data-dcnode-id="1000" start="2"><li data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Try Liquid Copper Sprays and Sulfur Powders</span></li></ol><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">You can apply liquid copper sprays and sulfur powders weekly, starting when the foliage appears in the early spring. It’s best to spray your plants in the early morning.</span></p><span data-dcnode-id="996" instrument_node="">
</span><ol data-dcnode-id="993" start="3"><li data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Use Neem Oil Spray</span></li></ol><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Neem oil is always good to have on hand because it’s multi-purpose and organic. It prevents fungal attacks on plants, and when applied early, it can stop the fungus right in its tracks.&nbsp;</span></p><span data-dcnode-id="989" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="988"><span data-dcnode-id="987" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="983"><img alt="Plant Diseases" class="wp-image-36649 jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="36649" data-comments-opened="1" data-dcnode-id="986" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="gardeningchannel-early-blight" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-early-blight.jpg?fit=600%2C378&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-early-blight.jpg?fit=600%2C378&amp;ssl=1" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-early-blight.jpg?fit=600%2C378&amp;ssl=1" data-orig-size="600,378" data-permalink="https://www.gardeningchannel.com/grow-black-prince-tomato/gardeningchannel-early-blight/" data-recalc-dims="1" height="378" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-early-blight.jpg%3Fresize%3D600%252C378%26ssl%3D1&amp;raw" width="600"><noscript data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">&lt;img data-attachment-id="36649" data-permalink="https://www.gardeningchannel.com/grow-black-prince-tomato/gardeningchannel-early-blight/" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-early-blight.jpg?fit=600%2C378&amp;amp;ssl=1" data-orig-size="600,378" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="gardeningchannel-early-blight" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-early-blight.jpg?fit=600%2C378&amp;amp;ssl=1" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-early-blight.jpg?fit=600%2C378&amp;amp;ssl=1" loading="lazy" width="600" height="378" src="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-early-blight.jpg?resize=600%2C378&amp;#038;ssl=1" alt="Plant Diseases" class="wp-image-36649" data-recalc-dims="1"/&gt;</span></noscript></figure><span data-dcnode-id="982" instrument_node="">
</span><h2 data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Early Blight</span></h2><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="978" instrument_node="">Chances are you’ve heard of blight. There are two forms: early and late. </span><em data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Alternaria solani </span></em><span data-dcnode-id="975" instrument_node="">is the fungus that causes early blight.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Early blight lives in the soil throughout the winter, which is why it’s best to change locations for your tomato plants. If they had early blight in the previous years and didn’t rotate crops, they’ll contract it again from the soil’s fungus. It lives for years!</span></p><span data-dcnode-id="970" instrument_node="">
</span><h4 data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Signs of Early Blight</span></h4><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Early blight leads to brown or black spots on the tomato leaves; the disease starts with the oldest leaves first and works its way up. Each spot develops a ring as the disease progresses, similar to a target. The leaves with the spots turn brown and eventually fall off of the plant.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">The fruit stems might be attacked as well, developing sunken black areas. If early blight takes over, it leads to the plant having few, if any, leaves. If high humidity and temperatures take place at the same time, most of the foliage will die.&nbsp;</span></p><span data-dcnode-id="961" instrument_node="">
</span><h4 data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Preventing and Treating Early Blight&nbsp;</span></h4><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Getting rid of early blight is more challenging than you might imagine. Here is what you can try.</span></p><span data-dcnode-id="955" instrument_node="">
</span><ol data-dcnode-id="952"><li data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Use Proper Plant Care Recommendations</span></li></ol><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Using proper care and gardening techniques is the best way to prevent late blight. Rotate crops, clear away debris and weeds, and space tomato plants appropriately for air circulation. Always water tomato plants at the base, not on the stem.&nbsp;</span></p><span data-dcnode-id="948" instrument_node="">
</span><ol data-dcnode-id="945" start="2"><li data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">An Organic Fungicide</span></li></ol><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Look for a brand of fungicides that is compliant with organic gardening. One option is called Safer; look at your local garden center for other choices. Garden fungicides can treat plants infected with early blight.&nbsp;</span></p><span data-dcnode-id="941" instrument_node="">
</span><ol data-dcnode-id="938" start="3"><li data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Use Liquid Copper Fungicide</span></li></ol><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Another option is to spray the plant with liquid copper fungicide concentrate. It’s an organic treatment that needs to be done on a dry day. The next time, remove the lower branches and repeat the treatment in one to two weeks.&nbsp;</span></p><span data-dcnode-id="934" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="933"><span data-dcnode-id="932" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="928"><img alt="Late blight infects leaves" class="wp-image-36650 jetpack-lazy-image jetpack-lazy-image--handled" data-attachment-id="36650" data-comments-opened="1" data-dcnode-id="931" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="gardeningchannel-late-blight" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-late-blight.jpg?fit=600%2C380&amp;ssl=1" data-lazy-loaded="1" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-late-blight.jpg?fit=600%2C380&amp;ssl=1" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-late-blight.jpg?fit=600%2C380&amp;ssl=1" data-orig-size="600,380" data-permalink="https://www.gardeningchannel.com/grow-black-prince-tomato/gardeningchannel-late-blight/" data-recalc-dims="1" height="380" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-late-blight.jpg%3Fresize%3D600%252C380%26ssl%3D1&amp;raw" width="600"><noscript data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">&lt;img data-attachment-id="36650" data-permalink="https://www.gardeningchannel.com/grow-black-prince-tomato/gardeningchannel-late-blight/" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-late-blight.jpg?fit=600%2C380&amp;amp;ssl=1" data-orig-size="600,380" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="gardeningchannel-late-blight" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-late-blight.jpg?fit=600%2C380&amp;amp;ssl=1" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-late-blight.jpg?fit=600%2C380&amp;amp;ssl=1" loading="lazy" width="600" height="380" src="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-late-blight.jpg?resize=600%2C380&amp;#038;ssl=1" alt="Late blight infects leaves" class="wp-image-36650" data-recalc-dims="1"/&gt;</span></noscript></figure><span data-dcnode-id="927" instrument_node="">
</span><h2 data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Late Blight</span></h2><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">In contrast, another one of the most common tomato plant diseases is light blight, caused by the fungus </span><em data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Phytophthora infestans. </span></em><span data-dcnode-id="920" instrument_node="">Late blight appears during cool, rainy periods that most often happen at the end of a growing season.&nbsp;</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">This plant disease is no joke; it affects all parts of the plant. Complete defoliation of the tomato plant happens within 14 days after the first symptoms, so watching your plants closely is key to stopping the disease before it gets too bad.&nbsp;</span></p><span data-dcnode-id="915" instrument_node="">
</span><h4 data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Signs of Late Blight</span></h4><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">As the weather starts to cool or periods of rain happen, look for signs of late blight. It might look as if there is frost damage on the leaves of your plant, leading to irregular green-black splotches. The fruits could have enormous, irregular-shaped brown blotches that rot quickly.&nbsp;</span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">These leaf spots enlarge quickly, and white mold might appear at the margins of the affected areas. Depending on the severity of the disease, the fruits could develop shiny, dark lesions. Complete browning and wilting of the leaves and stems happen within two weeks after the first symptoms.&nbsp;</span></p><span data-dcnode-id="906" instrument_node="">
</span><h4 data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Preventing and Treating Late Blight</span></h4><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Getting rid of late blight is tricky, so the first steps are to prevent the disease. Purchase certified disease-free plants and seeds and keep your garden beds cleared out to remove debris that might harbor disease.&nbsp;</span></p><span data-dcnode-id="900" instrument_node="">
</span><ol data-dcnode-id="897"><li data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Water Properly</span></li></ol><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">It’s wise to water adequately. Keep the foliage dry and water the base of the plant only. Overhead watering spreads diseases even more. When planting, provide extra room between the tomato plants; air circulation reduces diseases.&nbsp;</span></p><span data-dcnode-id="893" instrument_node="">
</span><ol data-dcnode-id="890" start="2"><li data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Pull Out Plants</span></li></ol><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Plants infected with late blight often needed to be pulled out of the garden and destroyed. Don’t compost them; they should be trashed or burned.&nbsp;</span></p><span data-dcnode-id="886" instrument_node="">
</span><ol data-dcnode-id="883" start="3"><li data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Use Copper Fungicide</span></li></ol><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">In some cases, a copper fungicide can be applied and used to treat late blight effectively.&nbsp;</span></p><span data-dcnode-id="879" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="878"><span data-dcnode-id="877" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="873"><img alt="Septoria Leaf Spot" class="wp-image-36651 jetpack-lazy-image" data-attachment-id="36651" data-comments-opened="1" data-dcnode-id="876" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="gardeningchannel-septoria-leaf-spot" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-septoria-leaf-spot.jpg?fit=500%2C332&amp;ssl=1" data-lazy-src="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-septoria-leaf-spot.jpg?resize=500%2C332&amp;is-pending-load=1#038;ssl=1" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-septoria-leaf-spot.jpg?fit=500%2C332&amp;ssl=1" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-septoria-leaf-spot.jpg?fit=500%2C332&amp;ssl=1" data-orig-size="500,332" data-permalink="https://www.gardeningchannel.com/grow-black-prince-tomato/gardeningchannel-septoria-leaf-spot/" data-recalc-dims="1" height="332" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-septoria-leaf-spot.jpg%3Fresize%3D500%252C332%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="500"><noscript data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">&lt;img data-attachment-id="36651" data-permalink="https://www.gardeningchannel.com/grow-black-prince-tomato/gardeningchannel-septoria-leaf-spot/" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-septoria-leaf-spot.jpg?fit=500%2C332&amp;amp;ssl=1" data-orig-size="500,332" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="gardeningchannel-septoria-leaf-spot" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-septoria-leaf-spot.jpg?fit=500%2C332&amp;amp;ssl=1" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-septoria-leaf-spot.jpg?fit=500%2C332&amp;amp;ssl=1" loading="lazy" width="500" height="332" src="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/08/gardeningchannel-septoria-leaf-spot.jpg?resize=500%2C332&amp;#038;ssl=1" alt="Septoria Leaf Spot" class="wp-image-36651" data-recalc-dims="1"/&gt;</span></noscript></figure><span data-dcnode-id="872" instrument_node="">
</span><h2 data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Septoria Leaf Spot&nbsp;</span></h2><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="868" instrument_node="">Here is another fungal disease that might take over your plants. A fungus called </span><em data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Septoria lycopersici </span></em><span data-dcnode-id="865" instrument_node="">leads to this infection that takes over and infects the plant’s foliage.&nbsp;</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Like many fungal infections, Septoria Leaf Spot primarily happens when watering the plants. The water spreads the spores across the leaves on the plant, and the disease begins.&nbsp;</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">It also appears in warm, wet weather; humidity and moisture are primary spreaders. This fungus is most active when temperatures range between 68 and 77℉ and when humidity levels are high.&nbsp;</span></p><span data-dcnode-id="857" instrument_node="">
</span><h4 data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Signs of Septoria Leaf Spot</span></h4><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">As the plants grow and develop, the lower leaves start to develop yellow spots. Look closely, and you’ll find dark grey centers with dark borders appearing as the fungus progresses.&nbsp;</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Eventually, black dots appear in the center of the spots. Those black specks are spore-producing bodies and spread the disease further. The foliage starts to die and falls off the plant after it turns yellow. It takes time for this to happen as the fungus spreads throughout the plant.&nbsp;</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Defoliation weakens the tomato plants, reduces the tomatoes’ quality, and leaves the plant vulnerable to other diseases.&nbsp;</span></p><span data-dcnode-id="845" instrument_node="">
</span><h4 data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Preventing and Treating Septoria Leaf Spot&nbsp;</span></h4><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Getting rid of Septoria Leaf Spot is a bit tricky; it’s best to focus on preventative measures, such as proper watering techniques and leaving room between plants for air circulation. If your plants end up infected anyway, here are some suggestions.</span></p><span data-dcnode-id="839" instrument_node="">
</span><ol data-dcnode-id="836"><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Rotate Crops</span></li></ol><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Always practice crop rotation to reduce the inoculum. Removing crop debris is an essential part of crop rotation and decreases the risk of the disease living in the soil for years.&nbsp;</span></p><span data-dcnode-id="832" instrument_node="">
</span><ol data-dcnode-id="829" start="2"><li data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Use a Garden Fungicide</span></li></ol><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">With this fungus, you also can use an organic fungicide as a treatment. Spray the foliage and entire plant at least one time to kill off the spores. Copper fungicides or those containing chlorothalonil are most effective.&nbsp;</span></p><span data-dcnode-id="825" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="824"><span data-dcnode-id="823" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="819"><img alt="Tomaquera amb Fusarium" class="wp-image-34103 jetpack-lazy-image" data-attachment-id="34103" data-comments-opened="1" data-dcnode-id="822" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="gardeningchannel-fusarium-wilt" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-fusarium-wilt.jpg?fit=400%2C500&amp;ssl=1" data-lazy-src="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-fusarium-wilt.jpg?resize=400%2C500&amp;is-pending-load=1#038;ssl=1" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-fusarium-wilt.jpg?fit=400%2C500&amp;ssl=1" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-fusarium-wilt.jpg?fit=400%2C500&amp;ssl=1" data-orig-size="400,500" data-permalink="https://www.gardeningchannel.com/gardeningchannel-fusarium-wilt/" data-recalc-dims="1" height="500" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-fusarium-wilt.jpg%3Fresize%3D400%252C500%26ssl%3D1&amp;raw" srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="400"><noscript data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">&lt;img data-attachment-id="34103" data-permalink="https://www.gardeningchannel.com/gardeningchannel-fusarium-wilt/" data-orig-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-fusarium-wilt.jpg?fit=400%2C500&amp;amp;ssl=1" data-orig-size="400,500" data-comments-opened="1" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="gardeningchannel-fusarium-wilt" data-image-description="" data-image-caption="" data-medium-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-fusarium-wilt.jpg?fit=400%2C500&amp;amp;ssl=1" data-large-file="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-fusarium-wilt.jpg?fit=400%2C500&amp;amp;ssl=1" loading="lazy" width="400" height="500" src="https://i0.wp.com/www.gardeningchannel.com/wp-content/uploads/2020/06/gardeningchannel-fusarium-wilt.jpg?resize=400%2C500&amp;#038;ssl=1" alt="Tomaquera amb Fusarium" class="wp-image-34103" data-recalc-dims="1"/&gt;</span></noscript></figure><span data-dcnode-id="818" instrument_node="">
</span><h2 data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Fusarium Wilt&nbsp;</span></h2><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">If your plants look fine then suddenly start to wilt, you might have fusarium wilt. </span><em data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Fusarium oxysporum f.sp. Lycopersici </span></em><span data-dcnode-id="811" instrument_node="">is a fungus that attacks your tomato plant’s vascular system, which is similar to the veins throughout your body.&nbsp;</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">As this fungus progresses through your body, it destroys the xylem tubes, essential for transporting water and nutrients from the roots into the leaves. That’s devastating to tomato plants and often leads to their death.&nbsp;</span></p><span data-dcnode-id="806" instrument_node="">
</span><h4 data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Signs of Fusarium Wilt</span></h4><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Fusarium wilt develops rapidly. One day, the plant looks healthy and fine, and then suddenly, it starts to wilt even if appropriately watered. The wilting might begin on one side, but quickly, the entire plant is wilting. Within a few days, the whole plant is dead.&nbsp;</span></p><span data-dcnode-id="800" instrument_node="">
</span><h4 data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Preventing and Treating Fusarium Wilt&nbsp;</span></h4><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">When it comes to fusarium wilt, preventative measures are most important because there is no proven treatment method. It happens so quickly that most gardeners say that their plants are dead within a week.&nbsp;</span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Focus on proven methods to prevent fusarium wilt. Here are some suggestions.</span></p><span data-dcnode-id="791" instrument_node="">
</span><ol data-dcnode-id="788"><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Crop Rotation</span></li></ol><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Rotating crops is a vital trick to preventing this fungus from taking over your garden. Make sure you don’t plant tomatoes in the same part of the garden the following year.&nbsp;</span></p><span data-dcnode-id="784" instrument_node="">
</span><ol data-dcnode-id="781" start="2"><li data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Purchase Resistant Varieties</span></li></ol><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Purchase wilt resistant tomato varieties if you’ve experienced these problems in the past. The fungus overwinters in garden soil, so you need plants that can fight it off.&nbsp;</span></p><span data-dcnode-id="777" instrument_node="">
</span><ol data-dcnode-id="774" start="3"><li data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Try Actionvate</span></li></ol><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">One product that might work against Fusarium Wilt is Actinovate, which is a pesticide and fungicide that targets the diseases that cause these problems. It introduces beneficial microbes into the soil to help the roots and foliage fight back.</span></p><span data-dcnode-id="770" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="769"><span data-dcnode-id="768" instrument_node="">
</span><h2 data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Verticillium Wilt&nbsp;</span></h2><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">Here is another fungal disease that is a common tomato plant disease. </span><em data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Verticilliurn albo-atrum </span></em><span data-dcnode-id="761" instrument_node="">is the fungus that causes this infection. It attacks the roots and goes up the xylem tube along with water. Once it enters the xylem tube, it stops the flow of water and nutrients to the leaves.&nbsp;</span></p><span data-dcnode-id="759" instrument_node="">
</span><h4 data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Signs of Verticillium Wilt</span></h4><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">This fungal disease starts when yellow blotches appear on the lower leaves. As the disease progresses, the veins in the leaves turn brown, and eventually, the leaves fall off of the plant.&nbsp;</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">In the end, the disease prevents water and nutrients from spreading throughout the plant, causing it to die. At first, it seems as if its growth is stunted, but soon, the entire plant dies.&nbsp;</span></p><span data-dcnode-id="750" instrument_node="">
</span><h4 data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Preventing and Treating Verticillium Wilt</span></h4><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Like Fusarium Wilt, treating Verticillium wilt isn’t possible. Once infected, saving the plants is impossible, so the best solution is to remove them from the garden and toss them into a trash bag.&nbsp;</span></p><span data-dcnode-id="744" instrument_node="">
</span><ol data-dcnode-id="741"><li data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Keep Your Plants Healthy</span></li></ol><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">You might be able to help your plants survive verticillium wilt. Water regularly, fertilize on a schedule using a low-nitrogen, high-phosphorus fertilizer and prune off dead branches.&nbsp;</span></p><span data-dcnode-id="737" instrument_node="">
</span><ol data-dcnode-id="734" start="2"><li data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Soil Solarization</span></li></ol><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Since verticillium wilt lives in the soil, soil solarization can get rid of it in the ground. This method heats the top six inches of the soil high enough to kill any fungus present.</span></p><span data-dcnode-id="730" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="729"><span data-dcnode-id="728" instrument_node="">
</span><h2 data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Mosaic Virus&nbsp;</span></h2><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">The Mosaic Virus attacks tomato plants, as well as a range of other vegetable plants. This virus doesn’t kill most plants, but it can reduce the number of fruits produced and their quality. That means all your hard work might go down the drain.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Open wounds in the leaves and stems allow the virus to enter, so avoid handling the plants. That’s especially true if you smoke because tobacco harbors the mosaic virus.&nbsp;</span></p><span data-dcnode-id="719" instrument_node="">
</span><h4 data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Signs of Mosaic Virus</span></h4><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">The virus gets its name because the markings resemble a mosaic with light green and yellow marks on the leaves. It also causes mottling on the fruits, and some leaves might become distorted, resembling ferns instead of tomato plant leaves.&nbsp;</span></p><span data-dcnode-id="713" instrument_node="">
</span><h4 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Preventing and Treating Mosaic Virus&nbsp;</span></h4><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Since this is a viral disease, there is no cure for a virus, and every effort should be made to prevent it from taking over in your garden. Using fungicides will be of help treating this virus, and don’t save seeds from infected crops.&nbsp;</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Here’s how to prevent the mosaic virus.</span></p><span data-dcnode-id="704" instrument_node="">
</span><ol data-dcnode-id="701"><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Treat with Neem Oil</span></li></ol><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Several insects carry the mosaic virus, so pre-treating your plants regularly with neem oil and other natural pest control products can help ward off the insects.&nbsp;</span></p><span data-dcnode-id="697" instrument_node="">
</span><ol data-dcnode-id="694" start="2"><li data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Use Row Covers&nbsp;</span></li></ol><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Another trick to keep insects off of your plants is to cover your tomato plants with row covers. These will keep the pests off your vulnerable plants.&nbsp;</span></p><span data-dcnode-id="690" instrument_node="">
</span><ol data-dcnode-id="687" start="3"><li data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Always Clean Garden Tools</span></li></ol><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">This virus often spreads by garden tools. Always disinfect garden tools, ties, pots, and any other equipment with a solution that is one part bleach hand four parts water.&nbsp;</span></p><span data-dcnode-id="683" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">
</span><h2 data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Leaf Mold</span></h2><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="677" instrument_node="">Here is another fungal disease that infects tomato plants. </span><em data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Fulvia fulva </span></em><span data-dcnode-id="674" instrument_node="">is the fungus that causes leaf mold, and it loves to grow in places with poor air circulation and high humidity levels. That’s why it’s most commonly found on tomatoes grown in greenhouses.&nbsp;</span></p><span data-dcnode-id="672" instrument_node="">
</span><h4 data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Signs of Leaf Mold</span></h4><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">The fungus starts on the older leaves closest to the soil, where air circulation is the lowest. It begins with pale green or yellow spots on the leaf surface that gradually get larger. Over time, the spots turn a distinctive yellow color.&nbsp;</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">If humidity levels are high, these spots turn grey and develop a velvety texture, the fungus spores. Severe cases cause the spots to join and kill the foliage entirely.&nbsp;</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Leaf mold affects more than the leaves; the fungus also likes the stems, blossoms, and fruit. Both green and mature fruits develop black, leathery spots on the stem end.&nbsp;</span></p><span data-dcnode-id="660" instrument_node="">
</span><h4 data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Preventing and Treating Leaf Mold&nbsp;</span></h4><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Preventing leaf mold is like many other fungal diseases. Improving air circulation and using proper watering techniques are essential. Always stake your tomato plants to increase airflow and avoid getting water on the leaves.&nbsp;</span></p><span data-dcnode-id="654" instrument_node="">
</span><ol data-dcnode-id="651"><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Use an Appropriate Fungicide&nbsp;</span></li></ol><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">One of the most common leaf mold treatments is to use a preventative fungicide that contains chlorothalonil or copper fungicide.&nbsp;</span></p><span data-dcnode-id="647" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="646"><span data-dcnode-id="645" instrument_node="">
</span><h2 data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Bacterial Spot</span></h2><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="641" instrument_node="">Bacterial spot is caused by the bacterium </span><em data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Xanthomonas vesicatoria. </span></em><span data-dcnode-id="638" instrument_node="">Instead of attaching red tomatoes, this bacteria targets green tomatoes, as well as peppers. It’s more common to experience bacterial spot during wet seasons with excess rain and humidity.&nbsp;</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">The bacteria survive winter on infected plant debris and other plants, so you must remove as much plant debris as possible at the end of the growing season. It loves and thrives in moist weather. Most bacterial spot outbreaks are due to heavy rainstorms that cause the bacteria to find open wounds on the leaves.&nbsp;</span></p><span data-dcnode-id="633" instrument_node="">
</span><h4 data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Signs of Bacterial Spot</span></h4><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">As the bacteria take over, bacterial spot causes damage to the plant such as spots on the leaf and fruit, reduced yields, and defoliation. Small, irregular, water-soaked spots might develop on the leaves, and scabby spots appear on the fruits.&nbsp;</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">The leaf spots might have a yellow halo with a dry center. Over time, the leaves tear open and start to die off of the plant. Defoliation is common with these bacteria.&nbsp;</span></p><span data-dcnode-id="624" instrument_node="">
</span><h4 data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Preventing and Treating Bacterial Spot</span></h4><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">It’s hard to prevent and control bacterial spot when it appears in your garden. The bacteria spread by water, splashing from one plant to another. Avoiding overhead watering is the first step; using drip irrigation is essential around tomato plants.&nbsp;</span></p><span data-dcnode-id="618" instrument_node="">
</span><ol data-dcnode-id="615"><li data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Prune Your Plants</span></li></ol><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">It’s essential to prune your plants to encourage good air circulation.&nbsp;</span></p><span data-dcnode-id="611" instrument_node="">
</span><ol data-dcnode-id="608" start="2"><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Spray a Copper Fungicide</span></li></ol><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">The best way to treat bacterial spot organically is to spray your plants with copper fungicide. It’s effective at controlling this bacterial disease.&nbsp;</span></p><span data-dcnode-id="604" instrument_node="">
</span><h2 data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Work to Prevent Tomato Plant Diseases</span></h2><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Unfortunately, a common theme that you might notice is that getting rid of tomato plant diseases is hard, if not impossible, in many cases. That’s why the key is preventing these diseases from happening by using proper watering and gardening techniques. Those will keep your plants as healthy as possible.</span></p><span data-dcnode-id="598" instrument_node="">
