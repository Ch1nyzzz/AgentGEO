</span><figure aria-describedby="caption-attachment-20289" class="wp-caption aligncenter" data-dcnode-id="1287" id="attachment_20289" style="width: 500px"><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/pothos-plant.jpg"><img alt="Money Plant Diseases" class="wp-image-20289 size-full lazyautosizes lazyloaded" data-dcnode-id="1292" data-sizes="auto" data-src="https://indiagardening.com/wp-content/uploads/2020/05/pothos-plant.jpg" data-srcset="https://indiagardening.com/wp-content/uploads/2020/05/pothos-plant.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/pothos-plant-20x18.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/pothos-plant-385x343.jpg 385w" height="446" sizes="535px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/pothos-plant.jpg&amp;raw" srcset="https://indiagardening.com/wp-content/uploads/2020/05/pothos-plant.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/pothos-plant-20x18.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/pothos-plant-385x343.jpg 385w" width="500"></a><figcaption class="wp-caption-text" data-dcnode-id="1288" id="caption-attachment-20289"><a data-dcnode-id="1289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//percywatersflorist.com/product/house-plant-pothos-ivy/" rel="noopener" target="_blank"><span data-dcnode-id="1290" instrument_node="">percywatersflorist</span></a></figcaption></figure><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1280" style="text-align: center;"><span data-dcnode-id="1285" instrument_node="">Pothos is the pride of every Indian house, thanks to their exuberant foliage and creeping stems. However, if you are not careful, the plant may be prone to trouble. Here are the major </span><em data-dcnode-id="1282"><strong data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Money Plant Diseases</span></strong></em><span data-dcnode-id="1281" instrument_node=""> and pests you must be aware of!</span></p><span data-dcnode-id="1279" instrument_node="">
</span><h3 data-dcnode-id="1272" style="text-align: center;"><em data-dcnode-id="1273"><a data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/garden-ideas/how-to-grow-money-plant-care/"><span data-dcnode-id="1278" instrument_node="">Here’s</span></a><span data-dcnode-id="1276" instrument_node=""> </span><span data-dcnode-id="1274" style="color: #ff0000;"><span data-dcnode-id="1275" instrument_node="">all you need to know about growing money plant in India</span></span></em></h3><span data-dcnode-id="1271" instrument_node="">
</span><hr data-dcnode-id="1270"><span data-dcnode-id="1269" instrument_node="">
</span><h2 data-dcnode-id="1266" style="text-align: center;"><em data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Common Money Plant Diseases&nbsp;</span></em></h2><span data-dcnode-id="1265" instrument_node="">
</span><h3 data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">1. Rhizoctonia Root Rot</span></h3><span data-dcnode-id="1262" instrument_node="">
</span><figure aria-describedby="caption-attachment-20283" class="wp-caption aligncenter" data-dcnode-id="1256" id="attachment_20283" style="width: 500px"><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Rhizoctonia-Root-Rot.jpg"><img alt="" class="wp-image-20283 size-full lazyautosizes lazyloaded" data-dcnode-id="1261" data-sizes="auto" data-src="https://indiagardening.com/wp-content/uploads/2020/05/Rhizoctonia-Root-Rot.jpg" data-srcset="https://indiagardening.com/wp-content/uploads/2020/05/Rhizoctonia-Root-Rot.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Rhizoctonia-Root-Rot-20x27.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Rhizoctonia-Root-Rot-385x513.jpg 385w" height="666" sizes="535px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Rhizoctonia-Root-Rot.jpg&amp;raw" srcset="https://indiagardening.com/wp-content/uploads/2020/05/Rhizoctonia-Root-Rot.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Rhizoctonia-Root-Rot-20x27.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Rhizoctonia-Root-Rot-385x513.jpg 385w" width="500"></a><figcaption class="wp-caption-text" data-dcnode-id="1257" id="caption-attachment-20283"><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/IndoorGarden/comments/9w07i6/are_these_healthy_pothos_roots_have_lots_of/" rel="noopener" target="_blank"><span data-dcnode-id="1259" instrument_node="">reddit</span></a></figcaption></figure><span data-dcnode-id="1255" instrument_node="">
</span><h4 data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Causing Agent: Fungus Rhizoctonia Solani</span></h4><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Leaving the plant in soggy soil and overwatering are the two major causes of root rot that can even lead to the plant’s demise. Wilting of the plant, leaves getting dark blotches, and roots turning brown or black are the indication of this disease. You can even observe a web of fungal growth in the soil in some cases.</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1244" style="text-align: center;"><em data-dcnode-id="1245"><strong data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">Solution</span></strong><span data-dcnode-id="1246" instrument_node="">: Take the plant out of the pot and discard all the affected roots. Re-pot it in fresh potting soil, and water only when the topsoil feels completely dry.&nbsp;</span></em></p><span data-dcnode-id="1243" instrument_node="">
</span><h3 data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">2. Bacterial Wilt Disease</span></h3><span data-dcnode-id="1240" instrument_node="">
</span><figure aria-describedby="caption-attachment-20287" class="wp-caption aligncenter" data-dcnode-id="1234" id="attachment_20287" style="width: 500px"><a data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Bacterial-Wilt-Disease.jpg"><img alt="Money Plant Diseases 2" class="wp-image-20287 size-full lazyautosizes lazyloaded" data-dcnode-id="1239" data-sizes="auto" data-src="https://indiagardening.com/wp-content/uploads/2020/05/Bacterial-Wilt-Disease.jpg" data-srcset="https://indiagardening.com/wp-content/uploads/2020/05/Bacterial-Wilt-Disease.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Bacterial-Wilt-Disease-20x13.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Bacterial-Wilt-Disease-385x258.jpg 385w" height="335" sizes="535px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Bacterial-Wilt-Disease.jpg&amp;raw" srcset="https://indiagardening.com/wp-content/uploads/2020/05/Bacterial-Wilt-Disease.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Bacterial-Wilt-Disease-20x13.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Bacterial-Wilt-Disease-385x258.jpg 385w" width="500"></a><figcaption class="wp-caption-text" data-dcnode-id="1235" id="caption-attachment-20287"><a data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//geartrench.com/snow-queen-pothos-care/" rel="noopener" target="_blank"><span data-dcnode-id="1237" instrument_node="">geartrench</span></a></figcaption></figure><span data-dcnode-id="1233" instrument_node="">
</span><h4 data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Causing Agent: Pseudomonas cichorii</span></h4><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">This disease causes the veins of the leaves and stems to turn darker. The foliage wilts and develops yellow spots that spread rapidly.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1222" style="text-align: center;"><em data-dcnode-id="1223"><strong data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Solution</span></strong><span data-dcnode-id="1224" instrument_node="">: Discard the infected parts and repot the plant in fresh soil in a new container. Avoid overwatering the money plant and use a well-draining and porous potting mix only.</span></em></p><span data-dcnode-id="1221" instrument_node="">
</span><h3 data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">3. Manganese Toxicity</span></h3><span data-dcnode-id="1218" instrument_node="">
</span><h3 data-dcnode-id="1215"><a data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Manganese-Toxicity.jpg"><img alt="" class="aligncenter size-full wp-image-20290 lazyautosizes lazyloaded" data-dcnode-id="1217" data-sizes="auto" data-src="https://indiagardening.com/wp-content/uploads/2020/05/Manganese-Toxicity.jpg" data-srcset="https://indiagardening.com/wp-content/uploads/2020/05/Manganese-Toxicity.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Manganese-Toxicity-20x27.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Manganese-Toxicity-385x513.jpg 385w" height="666" sizes="500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Manganese-Toxicity.jpg&amp;raw" srcset="https://indiagardening.com/wp-content/uploads/2020/05/Manganese-Toxicity.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Manganese-Toxicity-20x27.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Manganese-Toxicity-385x513.jpg 385w" width="500"></a></h3><span data-dcnode-id="1214" instrument_node="">
</span><h4 data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Causing Agent: Excess Manganese</span></h4><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">This problem is not caused by any bacteria, virus, or fungus attack, but due to excess manganese absorption from the fertilizer or fungicides accumulated in the soil. This toxicity gives rise to yellow flecks or spots on the foliage and also leads to the dropping of the new leaves.</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1203" style="text-align: center;"><em data-dcnode-id="1204"><strong data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Solution</span></strong><span data-dcnode-id="1205" instrument_node="">: Minimize the use of fungicides especially those containing manganese and you can apply lime to raise the pH level in the soil.</span></em></p><span data-dcnode-id="1202" instrument_node="">
</span><hr data-dcnode-id="1201"><span data-dcnode-id="1200" instrument_node="">
</span><h2 data-dcnode-id="1197" style="text-align: center;"><em data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Insects and Pests Problem</span></em></h2><span data-dcnode-id="1196" instrument_node="">
</span><h3 data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">4. Spider Mite</span></h3><span data-dcnode-id="1193" instrument_node="">
</span><h3 data-dcnode-id="1190"><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Spider-Mite.jpg"><img alt="Money Plant Diseases 3" class="aligncenter wp-image-20288 size-full lazyautosizes lazyloaded" data-dcnode-id="1192" data-sizes="auto" data-src="https://indiagardening.com/wp-content/uploads/2020/05/Spider-Mite.jpg" data-srcset="https://indiagardening.com/wp-content/uploads/2020/05/Spider-Mite.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Spider-Mite-20x15.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Spider-Mite-385x288.jpg 385w" height="374" sizes="500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Spider-Mite.jpg&amp;raw" srcset="https://indiagardening.com/wp-content/uploads/2020/05/Spider-Mite.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Spider-Mite-20x15.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Spider-Mite-385x288.jpg 385w" width="500"></a></h3><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Spider mites infestation in large numbers can be dangerous for the plant. You can spot them wandering on the leaves and stems. These mites often thrive in the dry environment, so regularly misting the plant is a key to prevention.</span></p><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1181" style="text-align: center;"><em data-dcnode-id="1182"><strong data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">Solution</span></strong><span data-dcnode-id="1183" instrument_node="">: If the spider mites have caused the heavy infestation, spray or apply dish soap or neem oil solution to deter the mites away.</span></em></p><span data-dcnode-id="1180" instrument_node="">
</span><h3 data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">5. Aphids</span></h3><span data-dcnode-id="1177" instrument_node="">
</span><h3 data-dcnode-id="1174"><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Aphides.jpg"><img alt="" class="aligncenter size-full wp-image-20284 lazyautosizes lazyloaded" data-dcnode-id="1176" data-sizes="auto" data-src="https://indiagardening.com/wp-content/uploads/2020/05/Aphides.jpg" data-srcset="https://indiagardening.com/wp-content/uploads/2020/05/Aphides.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Aphides-20x13.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Aphides-385x243.jpg 385w" height="315" sizes="500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Aphides.jpg&amp;raw" srcset="https://indiagardening.com/wp-content/uploads/2020/05/Aphides.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Aphides-20x13.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Aphides-385x243.jpg 385w" width="500"></a></h3><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Aphids attach themselves to the soft green stems of the plant, feast on the leaves sap, and make the plant look stunted.&nbsp; They also encourage mold and ants infestation, as aphids secrete a sugary liquid that attracts ants.</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1165" style="text-align: center;"><em data-dcnode-id="1166"><strong data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">Solution</span></strong><span data-dcnode-id="1167" instrument_node="">: To combat aphids, use a strong jet of water or turn your plant upside down in a bucket with water for a couple of minutes. You can also use neem oil or soapy water to deter them away.</span></em></p><span data-dcnode-id="1164" instrument_node="">
</span><h3 data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">6. Mealy Bugs</span></h3><span data-dcnode-id="1161" instrument_node="">
</span><figure aria-describedby="caption-attachment-20286" class="wp-caption aligncenter" data-dcnode-id="1155" id="attachment_20286" style="width: 500px"><a data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Mealy-Bugs.jpg"><img alt="Money Plant Diseases 4" class="wp-image-20286 size-full lazyautosizes lazyloaded" data-dcnode-id="1160" data-sizes="auto" data-src="https://indiagardening.com/wp-content/uploads/2020/05/Mealy-Bugs.jpg" data-srcset="https://indiagardening.com/wp-content/uploads/2020/05/Mealy-Bugs.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Mealy-Bugs-320x225.jpg 320w, https://indiagardening.com/wp-content/uploads/2020/05/Mealy-Bugs-20x14.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Mealy-Bugs-385x270.jpg 385w" height="351" sizes="535px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Mealy-Bugs.jpg&amp;raw" srcset="https://indiagardening.com/wp-content/uploads/2020/05/Mealy-Bugs.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Mealy-Bugs-320x225.jpg 320w, https://indiagardening.com/wp-content/uploads/2020/05/Mealy-Bugs-20x14.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Mealy-Bugs-385x270.jpg 385w" width="500"></a><figcaption class="wp-caption-text" data-dcnode-id="1156" id="caption-attachment-20286"><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardeners.com/how-to/mealybug/5317.html" rel="noopener" target="_blank"><span data-dcnode-id="1158" instrument_node="">gardeners</span></a></figcaption></figure><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Mealybugs are white cotton-like pests that feed on the sap of leaves and stems, causing yellowing and curling of the foliage. These are spotted near the soft or growing tissues of the plants.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1146" style="text-align: center;"><em data-dcnode-id="1147"><strong data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Solution</span></strong><span data-dcnode-id="1148" instrument_node="">: Wipe them away using a cotton swab dipped in an insecticidal solution or alcohol. You can also prepare a neem oil and water solution, and spray it on the infected areas.</span></em></p><span data-dcnode-id="1145" instrument_node="">
</span><h3 data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">7. Scales</span></h3><span data-dcnode-id="1142" instrument_node="">
</span><figure aria-describedby="caption-attachment-20285" class="wp-caption aligncenter" data-dcnode-id="1136" id="attachment_20285" style="width: 500px"><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Scale.jpg"><img alt="" class="wp-image-20285 size-full lazyautosizes lazyloaded" data-dcnode-id="1141" data-sizes="auto" data-src="https://indiagardening.com/wp-content/uploads/2020/05/Scale.jpg" data-srcset="https://indiagardening.com/wp-content/uploads/2020/05/Scale.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Scale-20x27.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Scale-385x513.jpg 385w" height="666" sizes="535px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//indiagardening.com/wp-content/uploads/2020/05/Scale.jpg&amp;raw" srcset="https://indiagardening.com/wp-content/uploads/2020/05/Scale.jpg 500w, https://indiagardening.com/wp-content/uploads/2020/05/Scale-20x27.jpg 20w, https://indiagardening.com/wp-content/uploads/2020/05/Scale-385x513.jpg 385w" width="500"></a><figcaption class="wp-caption-text" data-dcnode-id="1137" id="caption-attachment-20285"><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/houseplants/comments/ftog14/scales_or_aerial_roots_on_this_pothos/" rel="noopener" target="_blank"><span data-dcnode-id="1139" instrument_node="">reddit</span></a></figcaption></figure><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">If you notice dark brown bumps on the leaves or stem joints, then that’s the doing of scales. They are one of the hard-to-control insects, as their firm outer shell prevents them from the effect of a strong jet of water or insecticidal solutions.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1127" style="text-align: center;"><em data-dcnode-id="1128"><strong data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Solution</span></strong><span data-dcnode-id="1129" instrument_node="">: Take a cotton swab soaked in alcohol or neem oil solution, and rub it against the infected parts directly. Check all the parts like cervices, stem joint, and underneath leaves, as scales have a tendency to hide in such places.</span></em></p><span data-dcnode-id="1126" instrument_node="">
