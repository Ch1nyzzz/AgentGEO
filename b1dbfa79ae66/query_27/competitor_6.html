</span><p data-dcnode-id="351"><span data-dcnode-id="355" instrument_node="">There are a number of common hedging diseases that can affect </span><a data-dcnode-id="353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ashridgetrees.co.uk/hedging"><span data-dcnode-id="354" instrument_node="">hedging</span></a><span data-dcnode-id="352" instrument_node=""> of different types. This can lead primarily to discolouration, ruining the visual impact you’ve worked so hard to achieve with your hedging. In some – admittedly rare – cases, it can lead to plants dying. That’s why we’ve put this article together; so that you can diagnose some of the most common problems and treat them. Luckily, most diseases are quite easy to deal with, particularly with a little bit of love and care.</span></p><span data-dcnode-id="350" instrument_node="">
</span><h2 data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Powdery Mildew</span></h2><span data-dcnode-id="347" instrument_node="">
</span><figure aria-describedby="caption-attachment-10940" class="wp-caption aligncenter" data-dcnode-id="342" id="attachment_10940" style="width: 1014px"><img alt="Powdery mildew on hedge" class="wp-image-10940 size-full" data-dcnode-id="346" height="1024" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epicgardening.com/wp-content/uploads/2017/12/Powdery-mildew-on-hedge.jpg&amp;raw" srcset="https://www.epicgardening.com/wp-content/uploads/2017/12/Powdery-mildew-on-hedge.jpg 1024w, https://www.epicgardening.com/wp-content/uploads/2017/12/Powdery-mildew-on-hedge-150x150.jpg 150w, https://www.epicgardening.com/wp-content/uploads/2017/12/Powdery-mildew-on-hedge-300x300.jpg 300w, https://www.epicgardening.com/wp-content/uploads/2017/12/Powdery-mildew-on-hedge-768x768.jpg 768w" width="1024"><figcaption class="wp-caption-text" data-dcnode-id="343" id="caption-attachment-10940"><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/scotnelson/14753056169/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="345" instrument_node="">Powdery mildew on hedge. Source: Scot Nelson</span></a></figcaption></figure><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="337"><a data-dcnode-id="339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epicgardening.com/powdery-mildew-treatment-and-prevention/"><span data-dcnode-id="340" instrument_node="">Powdery mildew</span></a><span data-dcnode-id="338" instrument_node=""> is a powdery, grey fungal coating that affects a variety of hedging plants, such as native hawthorn hedges. Unfortunately, it is quite common and almost no hedge is fully immune.</span></p><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">However, the condition is actually relatively easy to treat. You could spray the hedge with a fungicide, or you could simply do nothing. It will go away if the underlying causes have been removed.</span></p><div class="eg-shp-bed" data-dcnode-id="331" style="text-align:center;margin: 20px 0px"><a data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop.epicgardening.com/" rel="noopener" target="_blank" title="Modular Metal Garden Bed"><img alt="Modular Metal Garden Bed" data-dcnode-id="333" height="150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epicgardening.com/wp-content/themes/generatepress-child/img/ad2.jpg&amp;raw" width="538"></a></div><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Mildew often arises due to plants having been dry. This is because they get weakened and become easy targets. The best way to treat powdery mildew in hot weather is by watering. Alongside this, a longer term solution is to include more well-rotted organic matter in your soil. This enables the ground to hold more water, reducing the stress the hedging may suffer in dry periods. A quick-and-easy solution for native hedging is to simply distribute your grass clippings along the bottom of your hedge.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">The other reason for mildew is poor air circulation around the plant. This is particularly the case for sheltered climbing plants and thick hedging. The best way to deal with mildew in this case is to spray with a fungicide or liberally prune the most overgrown parts of the plant.</span></p><span data-dcnode-id="324" instrument_node="">
</span><h2 data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Box Blight</span></h2><span data-dcnode-id="321" instrument_node="">
</span><figure aria-describedby="caption-attachment-10938" class="wp-caption aligncenter" data-dcnode-id="316" id="attachment_10938" style="width: 755px"><img alt="Boxwood Blight" class="wp-image-10938 size-full" data-dcnode-id="320" height="1024" loading="lazy" sizes="(max-width: 765px) 100vw, 765px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epicgardening.com/wp-content/uploads/2017/12/Boxwood-Blight-2.jpg&amp;raw" srcset="https://www.epicgardening.com/wp-content/uploads/2017/12/Boxwood-Blight-2.jpg 765w, https://www.epicgardening.com/wp-content/uploads/2017/12/Boxwood-Blight-2-224x300.jpg 224w" width="765"><figcaption class="wp-caption-text" data-dcnode-id="317" id="caption-attachment-10938"><a data-dcnode-id="318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/oragriculture/13434946953/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="319" instrument_node="">Boxwood blight. Source: Oregon Department of Agriculture</span></a></figcaption></figure><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="311"><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/advice/profile%3Fpid%3D96"><span data-dcnode-id="314" instrument_node="">Box blight</span></a><span data-dcnode-id="312" instrument_node="">, unsurprisingly, affects box hedging. Sometimes called boxwood blight, it is actually caused by two different strains of fungi, both believed to lie dormant in dead leaves and produce spores as temperatures rise through spring.</span></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">One form, cylindrocladium buxicola, can be identified by the spots it causes on leaves, as well as wispy grey fungus growing on the underside of leaves and black staining on woody parts. Over time, these spots can become larger areas of dead tissue, leading to defoliation.</span></p><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">The other form of blight fungus, volutella buxi, is typically diagnosed due to pink pustules developing underneath the leaves. Most often, this happens in humid weather. Leaves can turn yellow, fall off and sometimes the fungus leads to the development of cankers on the plant’s branches.</span></p><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Due to the way these fungi lie dormant, one form of treatment is by raking up dead leaves and burning them, while also disposing of other affected material (such as branches).</span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">While there aren’t any garden chemicals that deal specifically with either blight, copper fungicides are known to have some effect. Perhaps the best form of treatment, however, is prevention; planting well, in good organic soil with a top dressing of fish and bone, and utilising a fungicide spray in early April can go a long way towards preventing box blight. This is particularly the case if you also avoid clipping your hedge in warm, damp weather, as the fungi are most active in humid conditions.</span></p><span data-dcnode-id="298" instrument_node="">
</span><h2 data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Bronze Foliage</span></h2><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Some types of hedging can end up turning bronze. This is the case for yew hedging. Individual plants can go bronze, signifying that the plant is stressed in some way. There are a range of underlying reasons for this.</span></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Firstly, bronze foliage on yew hedges can be due to windburn, as well as other weather extremes, like hot summers and heavy frosts. This is due to sudden weather changes, so the best solution in this case is to leave them alone – they will soon regain their colour.</span></p><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Secondly, it can be due to starvation. This happens with pot-grown yew plants that are then planted out. This can often be because the ground into which they were planted was badly prepared. For example, the planting holes for the plants may have been too small. The best way to diagnose this is to gently dig up the plant; if the rootball is still pot-shaped, you’ll soon know why the yew is suffering from bronze foliage. Luckily, the solution is then pretty straightforward; enlarge the hole, mix in compost and replant.</span></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="281"><span data-dcnode-id="285" instrument_node="">Thirdly, bronze foliage can arise from </span><a data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rhs.org.uk/advice/profile%3FPID%3D542"><span data-dcnode-id="284" instrument_node="">root rot</span></a><span data-dcnode-id="282" instrument_node="">. When the plants are establishing, they are particularly susceptible to phytophthora infection if the soil remains wet. This means extra care has to be taken when planting yew hedging in soils with poor drainage. If the bronze foliage is due to root rot, you can usually diagnose this by looking at where the bronzing is. It tends to start where the leaf is attached to the stem. Ultimately, the only solution is to improve the drainage; if that’s not possible, you’ll either have to wait until the affliction passes or avoid planting in the same place if the hedge plants do die.</span></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Finally, bronze foliage can occur from ‘unwanted’ organic matter with high levels of uric acid from dogs, cats and their ‘you know what’. Stopping animals from using this area for their business will prevent the problem and the yew hedge should soon recover.</span></p><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">&nbsp;</span></p><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">While hedging can suffer from a number of afflictions, most of them are easy to deal with. Bronzing often passes as yew plants are very tough, good preparation can prevent box blight, and powdery mildew can be treated with good watering and liberal pruning. What’s more, due to their hardiness, hedge plants will almost certainly recover quickly.</span></p><span data-dcnode-id="271" instrument_node="">
</span><hr data-dcnode-id="270"><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="262"><strong data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Author’s Bio:</span></strong><span data-dcnode-id="266" instrument_node="">&nbsp;I’m Julian Bosdari and gardens, gardening and plants have been a lifelong passion. This passion has ended up with my owning and running Ashridge Nurseries for over 20 years, during which time we have sold millions of plants to well over 100,000 customers, with free, expert advice as part of the package. Why not come and share my obsession with hedging, trees, roses, soft fruit, flower bulbs and the like at </span><a data-dcnode-id="264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ashridgetrees.co.uk/"><span data-dcnode-id="265" instrument_node="">www.ashridgetrees.co.uk</span></a><span data-dcnode-id="263" instrument_node="">.</span></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Did you enjoy Julian Bosdari’s guest piece? Let us know in the comments below!</span></p><span data-dcnode-id="258" instrument_node="">
