id-Interest Interest-news1 MuiGrid-item-1024 MuiGrid-item-Interest" data-dcnode-id="104"><div class="Interest-news2" data-dcnode-id="105"><h2 class="MuiTypography-root-1153 MuiTypography-Interest MuiTypography-caption-1156" data-dcnode-id="111"><span data-dcnode-id="112" instrument_node="">OF RELATED INTEREST</span></h2><ul class="Interest-news4" data-dcnode-id="106"><li data-dcnode-id="107"><a class="Interest-news5" data-dcnode-id="108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uvm.edu/extension/mastergardener"><p class="MuiTypography-root-1153 MuiTypography-Interest Interest-news6 MuiTypography-body1-1155" data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">UVM Extension Master Gardener Program</span></p></a></li></ul></div></div></div></aside></div><div class="Content-news9" data-dcnode-id="57" style="transition: opacity 0.6s ease 0s; opacity: 1; margin-left: 25%; min-height: 550px;"><div data-dcnode-id="58"><div data-dcnode-id="59"><div class="MuiGrid-root-816 MuiGrid-Content Content-news5 css-1r8imjr MuiGrid-item-818 MuiGrid-item-Content MuiGrid-grid-sm-12-904" data-dcnode-id="60"><p data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">By Nadie VanZandt</span></p><p data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">Extension Master Gardener</span></p><p data-dcnode-id="95"><span data-dcnode-id="96" instrument_node="">University&nbsp;of Vermont</span></p><p data-dcnode-id="93"><span data-dcnode-id="94" instrument_node="">&nbsp;</span></p><p data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">If your tomato plants look overgrown and crowded, now may be a good time to consider pruning them. Although pruning tomato plants is not required, it is a good practice to adopt during the growing season.&nbsp;</span></p><p data-dcnode-id="89"><span data-dcnode-id="90" instrument_node="">Properly pruning tomato plants improves the quality of your fruit. It creates airflow to keep diseases at bay and speeds ripening in cold climates. Pruning also prevents crowding and improves sun exposure, which makes it easier to spot hornworms and other pests.</span></p><p data-dcnode-id="87"><span data-dcnode-id="88" instrument_node="">Plan this task for a dry day. Be sure to disinfect your pruning shears with a 10 percent solution of chlorine (one part chlorine to nine parts water) before you begin.</span></p><p data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">How you prune a tomato plant depends on its type: determinate or indeterminate.</span></p><p data-dcnode-id="83"><span data-dcnode-id="84" instrument_node="">Determinate types are recognizable by flowering at the terminal end of a branch. This signals stems to stop growing. Determinates grow to a fixed height of about four to five feet. Blossoms develop at the same time, culminating in a short harvest period of about three to five weeks.</span></p><p data-dcnode-id="81"><span data-dcnode-id="82" instrument_node="">Indeterminate types have a vining growth habit. Their terminal buds grow new leaves and branches that progressively produce blossoms and fruit as the vine grows. Indeterminate tomatoes have fruit in various stages throughout the growing season.</span></p><p data-dcnode-id="79"><span data-dcnode-id="80" instrument_node="">If you cannot identify the type by observation, check the seed packet or plant tag from where you obtained your tomato plants. Tomato types should be clearly labeled as determinate or indeterminate on the packaging.</span></p><p data-dcnode-id="77"><span data-dcnode-id="78" instrument_node="">Only minimal pruning should be done on determinate tomatoes because this type sets a fixed amount of fruit. At this time in the growing season, pruning determinate tomatoes should be limited to removing the lower leaves to increase air circulation and pruning the leaves that touch the soil to avoid contamination from soil-borne disease. During heavy rains, this minimizes dirt splashing on the leaves and prevents early blight.</span></p><p data-dcnode-id="75"><span data-dcnode-id="76" instrument_node="">Indeterminate tomatoes benefit from the removal of their lower leaves as well as the following pruning guidelines.</span></p><p data-dcnode-id="73"><span data-dcnode-id="74" instrument_node="">Remove auxiliary buds or suckers (the shoots growing in the angle between the main stem and a leaf stem) to promote earlier and bigger fruit and to help create airflow potentially preventing disease.</span></p><p data-dcnode-id="71"><span data-dcnode-id="72" instrument_node="">Suckers on indeterminates are best pinched off when they are small. Use your fingers to snip them off. You also can use clean pruning shears to remove larger suckers.&nbsp;</span></p><p data-dcnode-id="69"><span data-dcnode-id="70" instrument_node="">About a month before your first expected frost, remove the growing tips of the main stems of indeterminates. This will signal the plant to stop making flowers and setting new fruit. Instead, it will use its energy to grow larger established fruit and speed the ripening process.</span></p><p data-dcnode-id="67"><span data-dcnode-id="68" instrument_node="">You also can prune the crowded leaves at the center of an indeterminate tomato plant, again to increase airflow. Just be mindful not to remove the leaves above and below a cluster of fruit as these leaves provide shade and supply the fruit with sugar.</span></p><p data-dcnode-id="65"><span data-dcnode-id="66" instrument_node="">Pruning can be intimidating to novice gardeners, but don't be afraid to try. You will be rewarded with healthier plants and juicier fruit.</span></p><p data-dcnode-id="63"><span data-dcnode-id="64" instrument_node="">&nbsp;</span></p><p data-dcnode-id="61"><span data-dcnode-id="62" instrument_node="">Nadie VanZandt is a UVM Extension Master Gardener from Panton.</span></p></div></div></div></div></div></div></div></div></div><footer class="css-1j1tkv5
