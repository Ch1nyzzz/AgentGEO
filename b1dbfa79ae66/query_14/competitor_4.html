</span><h1 class="entry-title article-heading" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Growing Grapes – How To Plant &amp; Maintain Grape Vines</span></h1><span data-dcnode-id="868" instrument_node="">
</span></header><span data-dcnode-id="866" instrument_node="">
</span><article class="article-post article post-7237 post type-post status-publish format-standard has-post-thumbnail hentry category-fruit tag-concord-grapes tag-growing-grapes tag-how-to-maintain-grapes tag-how-to-plant-grapes tag-planting-grape-vines mv-content-wrapper" data-dcnode-id="134" id="post-7237"><span data-dcnode-id="865" instrument_node="">
</span><div class="entry-content mvt-content" data-dcnode-id="189"><span data-dcnode-id="864" instrument_node="">
</span><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Growing grapes is an excellent way to add perennial fruit to your landscape. But even better, it can let you enjoy everything from jams, jellies and juice, to to trying your hand at making homemade wine as well!</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Grapevines, depending on their size at planting, can take a few years to establish themselves. But when they do, they will produce heavy yields from their vines for decades to come.</span></p><span data-dcnode-id="855" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="848"><noscript data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">&lt;img width="1024" height="113" src="https://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-1024x113.jpg" alt="podcast banner ad" class="wp-image-13289" srcset="http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-1024x113.jpg 1024w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-300x33.jpg 300w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-768x85.jpg 768w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-735x81.jpg 735w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-335x37.jpg 335w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-347x38.jpg 347w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-520x58.jpg 520w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-640x71.jpg 640w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-960x106.jpg 960w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-1080x120.jpg 1080w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner.jpg 1500w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="podcast banner ad" class="wp-image-13289 lazyload" data-dcnode-id="852" data-pin-media="http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner.jpg" data-src="https://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-1024x113.jpg.webp" data-srcset="http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-1024x113.jpg.webp 1024w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-300x33.jpg.webp 300w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-768x85.jpg.webp 768w, http://thisismygarden.com/wp-content/uploads/2022/01/podcast-banner-735x81.jpg.webp 735w, http://thisismygarden </span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Grapes are not difficult to grow, especially when you select varieties that are best suited for your soil and growing conditions. </span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Beyond that, success boils down to starting plants off right when planting, and providing the proper long term support and care for vines. </span></p><span data-dcnode-id="384" instrument_node="">
</span><h2 data-dcnode-id="382" id="h-how-to-grow-maintain-grapes-in-the-home-landscape"><span data-dcnode-id="383" instrument_node="">How To Grow &amp; Maintain Grapes In The Home Landscape</span></h2><span data-dcnode-id="381" instrument_node="">
</span><h4 data-dcnode-id="379" id="h-growing-grapes-selecting-the-right-variety-to-plant"><span data-dcnode-id="380" instrument_node="">Growing Grapes – Selecting The Right Variety To Plant</span></h4><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Selecting what grape variety to grow starts with knowing what you want from your crop. Are you looking for table grapes to eat? Or perhaps grapes for making jam, jellies, juice or wine?</span></p><span data-dcnode-id="375" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="370"><figure class="aligncenter size-large" data-dcnode-id="371"><noscript data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">&lt;img loading="lazy" width="400" height="600" src="https://thisismygarden.com/wp-content/uploads/2020/02/grape-plants-young.jpg" alt="" class="wp-image-7249" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/grape-plants-young.jpg 400w, http://thisismygarden.com/wp-content/uploads/2020/02/grape-plants-young-200x300.jpg 200w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="" class="wp-image-7249 lazyload" data-dcnode-id="372" data-pin-media="http://thisismygarden.com/wp-content/uploads/2020/02/grape-plants-young.jpg" data-src="https://thisismygarden.com/wp-content/uploads/2020/02/grape-plants-young.jpg.webp" data-srcset="http://thisismygarden.com/wp-content/uploads/2020/02/grape-plants-young.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/grape-plants-young-200x300.jpg.webp 200w" data-trellis-processed="1" data-webp="true" height="600" id="mv-trellis-img-2" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thisismygarden.com/wp-content/uploads/2020/02/grape-plants-young.jpg.webp&amp;raw" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/grape-plants-young.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/grape-plants-young-200x300.jpg.webp 200w" width="400"></figure></div><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">There are 2 main styles of grapes, table grapes, and wine or juice grapes. Within these 2 general silos, there are hundreds of variations. But to simplify, most can be boiled down to being either European, or American grape varieties.</span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">European varieties are more well-known for wine making, although there are certainly table grapes within the many choices.</span></p><span data-dcnode-id="363" instrument_node="">
</span><h4 data-dcnode-id="361" id="h-american-vs-european-style-grapes"><span data-dcnode-id="362" instrument_node="">American vs. European Style Grapes</span></h4><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">American varieties such as Concord and Mars are sweeter types, and excellent choices for both eating and making juice, jellies and jams. </span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">In addition, these two varieties tend to handle cold winters much better than European varieties. As for wine making, there have been many new hybrids and varieties among both sides of the pond that work well.</span></p><span data-dcnode-id="354" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="347"><figure class="aligncenter size-large" data-dcnode-id="348"><noscript data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">&lt;img loading="lazy" width="400" height="600" src="https://thisismygarden.com/wp-content/uploads/2020/02/concord-grapes.jpg" alt="concord" class="wp-image-7250" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/concord-grapes.jpg 400w, http://thisismygarden.com/wp-content/uploads/2020/02/concord-grapes-200x300.jpg 200w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="concord" class="wp-image-7250 lazyload" data-dcnode-id="351" data-pin-media="http://thisismygarden.com/wp-content/uploads/2020/02/concord-grapes.jpg" data-src="https://thisismygarden.com/wp-content/uploads/2020/02/concord-grapes.jpg.webp" data-srcset="http://thisismygarden.com/wp-content/uploads/2020/02/concord-grapes.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/concord-grapes-200x300.jpg.webp 200w" data-trellis-processed="1" data-webp="true" height="600" id="mv-trellis-img-3" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thisismygarden.com/wp-content/uploads/2020/02/concord-grapes.jpg.webp&amp;raw" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/concord-grapes.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/concord-grapes-200x300.jpg.webp 200w" width="400"><figcaption data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Concord grapes ripening on the vine. Concord grapes are perfect for those looking to make juice, jams and jellies.</span></figcaption></figure></div><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">The most important task of all for successful planting is selecting a grape variety that handles your climate and soil conditions well. (We have included at then end of the article a selection of some of the more common grape varieties planted, along with their growing zone range as well.)</span></p><span data-dcnode-id="343" instrument_node="">
</span><h4 data-dcnode-id="341" id="h-growing-grapes-when-and-how-to-plant"><span data-dcnode-id="342" instrument_node="">Growing Grapes – When And How To Plant</span></h4><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">All grapes need sun to grow well. For starters, select a location that is either full sun, or as close to full sun as possible. </span></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Locations that receive at least morning and afternoon sun are the best. It not only helps to ripen crops, but also helps dry vines and prevent mildew.</span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">When to plant depends on how your grapes arrive to you – bare root and dormant, or rooted and budding. Bare root grape vines need to be planted as soon as ground can be worked in the early spring. </span></p><span data-dcnode-id="331" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="324"><figure class="aligncenter size-large" data-dcnode-id="325"><noscript data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">&lt;img loading="lazy" width="400" height="600" src="https://thisismygarden.com/wp-content/uploads/2020/02/grape-cuttings-bare-root-plants.jpg" alt="planting grapes - bare root plants" class="wp-image-7247" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/grape-cuttings-bare-root-plants.jpg 400w, http://thisismygarden.com/wp-content/uploads/2020/02/grape-cuttings-bare-root-plants-200x300.jpg 200w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="planting grapes - bare root plants" class="wp-image-7247 lazyload" data-dcnode-id="328" data-pin-media="http://thisismygarden.com/wp-content/uploads/2020/02/grape-cuttings-bare-root-plants.jpg" data-src="https://thisismygarden.com/wp-content/uploads/2020/02/grape-cuttings-bare-root-plants.jpg.webp" data-srcset="http://thisismygarden.com/wp-content/uploads/2020/02/grape-cuttings-bare-root-plants.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/grape-cuttings-bare-root-plants-200x300.jpg.webp 200w" data-trellis-processed="1" data-webp="true" height="600" id="mv-trellis-img-4" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thisismygarden.com/wp-content/uploads/2020/02/grape-cuttings-bare-root-plants.jpg.webp&amp;raw" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/grape-cuttings-bare-root-plants.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/grape-cuttings-bare-root-plants-200x300.jpg.webp 200w" width="400"><figcaption data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Bare root grapes beginning to bud and flower. Once this occurs, you must wait until the threat of hard frosts or freezes pass.</span></figcaption></figure></div><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">These vines are dormant, and will warm up and spring to life as the temperatures warm. Because they are dormant, they are not affected by early or late spring frosts or freezes.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">If, however, you have purchased flowering plants, or bare root plants that are already flowering, you need to wait until the threat of hard frost in your area is over to plant.&nbsp;</span></p><span data-dcnode-id="317" instrument_node="">
</span><h4 data-dcnode-id="315" id="h-the-planting-process"><span data-dcnode-id="316" instrument_node="">The Planting Process </span></h4><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="309"><span data-dcnode-id="313" instrument_node="">Grapes are a perennial, meaning the soil needs to be prepared for years of future growth. It is vital to amend the soil at planting time to provide both long-term nutrients, and good drainage. Compost is by far the best way to accomplish this.  </span><a data-dcnode-id="311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thisismygarden.com/2018/07/summer-compost-pile/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="312" instrument_node="">See: How To Make Great Compost</span></a><span data-dcnode-id="310" instrument_node=""> </span></p><span data-dcnode-id="308" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="301"><figure class="aligncenter size-large" data-dcnode-id="302"><noscript data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">&lt;img loading="lazy" width="400" height="600" src="https://thisismygarden.com/wp-content/uploads/2020/02/Planting-grape-vines.jpg" alt="" class="wp-image-7248" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/Planting-grape-vines.jpg 400w, http://thisismygarden.com/wp-content/uploads/2020/02/Planting-grape-vines-200x300.jpg 200w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="" class="wp-image-7248 lazyload" data-dcnode-id="305" data-pin-media="http://thisismygarden.com/wp-content/uploads/2020/02/Planting-grape-vines.jpg" data-src="https://thisismygarden.com/wp-content/uploads/2020/02/Planting-grape-vines.jpg.webp" data-srcset="http://thisismygarden.com/wp-content/uploads/2020/02/Planting-grape-vines.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/Planting-grape-vines-200x300.jpg.webp 200w" data-trellis-processed="1" data-webp="true" height="600" id="mv-trellis-img-5" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thisismygarden.com/wp-content/uploads/2020/02/Planting-grape-vines.jpg.webp&amp;raw" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/Planting-grape-vines.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/Planting-grape-vines-200x300.jpg.webp 200w" width="400"><figcaption data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">A potted grape plant going into the planting hole. It is important to provide a good source of nutrients to planting holes. </span></figcaption></figure></div><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">For each plant or bare root, dig holes 12″ in depth and diameter. Fill the bottom of each hole with a few inches of an equal mixture of soil and compost. Next, set the roots of the grape vine down into the hole. </span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">The top soil level of the plant or the crown of the bare root should be planted 1/4″ to 1/2 inch below the new soil line. This keeps the crown well protected as the grapes begin growing. </span></p><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">At this point, water the roots well in the planting hole. Finish by filling the hole with a 50/50 mix of soil and compost. Do not tamp down on the soil, as this will compact the roots.</span></p><span data-dcnode-id="291" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="284"><figure class="aligncenter size-large" data-dcnode-id="285"><noscript data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">&lt;img loading="lazy" width="400" height="600" src="https://thisismygarden.com/wp-content/uploads/2020/02/tender-young-grape-vine.jpg" alt="Growing grapes - planting" class="wp-image-7244" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/tender-young-grape-vine.jpg 400w, http://thisismygarden.com/wp-content/uploads/2020/02/tender-young-grape-vine-200x300.jpg 200w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="Growing grapes - planting" class="wp-image-7244 lazyload" data-dcnode-id="288" data-pin-media="http://thisismygarden.com/wp-content/uploads/2020/02/tender-young-grape-vine.jpg" data-src="https://thisismygarden.com/wp-content/uploads/2020/02/tender-young-grape-vine.jpg.webp" data-srcset="http://thisismygarden.com/wp-content/uploads/2020/02/tender-young-grape-vine.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/tender-young-grape-vine-200x300.jpg.webp 200w" data-trellis-processed="1" data-webp="true" height="600" id="mv-trellis-img-6" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thisismygarden.com/wp-content/uploads/2020/02/tender-young-grape-vine.jpg.webp&amp;raw" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/tender-young-grape-vine.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/tender-young-grape-vine-200x300.jpg.webp 200w" width="400"><figcaption data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">The soil around new plants should be left as loose as possible. This allows for good drainage and air to the roots of the vines.</span></figcaption></figure></div><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Grape plants are susceptible to rot, especially when young and tender. Leaving the soil loose helps to provide circulation and drainage early on. If you pack the soil too tightly, the roots simple can’t breathe.</span></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">The soil may sink over the following month around the plant, simply add more as it does to level up to the soil line.</span></p><span data-dcnode-id="277" instrument_node="">
</span><h4 data-dcnode-id="275" id="h-growing-grapes-supporting-your-crop-long-term"><span data-dcnode-id="276" instrument_node="">Growing Grapes – Supporting Your Crop Long Term</span></h4><span data-dcnode-id="274" instrument_node="">
</span><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Grape plants need support, both to keep vines protected, and to keep fruit  off the ground. Depending on how many plants you will grow, everything from a simple trellis to a few lines of wire attached to poles can work.</span></p><span data-dcnode-id="271" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="264"><figure class="aligncenter size-large" data-dcnode-id="265"><noscript data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">&lt;img loading="lazy" width="400" height="600" src="https://thisismygarden.com/wp-content/uploads/2020/02/grape-arbor.jpg" alt="arbor" class="wp-image-7246" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/grape-arbor.jpg 400w, http://thisismygarden.com/wp-content/uploads/2020/02/grape-arbor-200x300.jpg 200w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="arbor" class="wp-image-7246 lazyload" data-dcnode-id="268" data-pin-media="http://thisismygarden.com/wp-content/uploads/2020/02/grape-arbor.jpg" data-src="https://thisismygarden.com/wp-content/uploads/2020/02/grape-arbor.jpg.webp" data-srcset="http://thisismygarden.com/wp-content/uploads/2020/02/grape-arbor.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/grape-arbor-200x300.jpg.webp 200w" data-trellis-processed="1" data-webp="true" height="600" id="mv-trellis-img-7" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thisismygarden.com/wp-content/uploads/2020/02/grape-arbor.jpg.webp&amp;raw" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/grape-arbor.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/grape-arbor-200x300.jpg.webp 200w" width="400"><figcaption data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Whether on an arbor, a trellis, post and lines, or even a fence – grape vines need support to produce a healthy crop of grapes.</span></figcaption></figure></div><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Grapes can also be grown to cover a fence, or to fill the top of an arbor or pergola. </span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Plants should be spaced 6 to 10′ apart when growing in long rows. For planting on a trellis or around a structure, plant vines on the corners out of direct foot traffic. </span></p><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">No matter where you plant, remember that birds are very fond of grapes as well. As the crop begins to mature, it is a good idea to have netting on hand for protection.</span></p><span data-dcnode-id="254" instrument_node="">
</span><h4 data-dcnode-id="252" id="h-long-term-care"><span data-dcnode-id="253" instrument_node="">Long Term Care</span></h4><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">During the first year of growth, all grapes that form on vines should be removed from the plant. This allows all of the power of the plant to go towards growing strong stems and roots. </span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">One of the most important tasks when growing grapes is long-term pruning. Pruning vines is important to keep plants healthy and productive. Pruning should be performed in early spring when plants are still dormant.  </span></p><span data-dcnode-id="245" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="238"><figure class="aligncenter size-large" data-dcnode-id="239"><noscript data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">&lt;img loading="lazy" width="400" height="600" src="https://thisismygarden.com/wp-content/uploads/2020/02/removing-old-growth-grapes.jpg" alt="pruning old growth" class="wp-image-7374" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/removing-old-growth-grapes.jpg 400w, http://thisismygarden.com/wp-content/uploads/2020/02/removing-old-growth-grapes-200x300.jpg 200w" sizes="(max-width: 760px) calc(100vw - 40px), 720px"&gt;</span></noscript><img alt="pruning old growth" class="wp-image-7374 lazyload" data-dcnode-id="242" data-pin-media="http://thisismygarden.com/wp-content/uploads/2020/02/removing-old-growth-grapes.jpg" data-src="https://thisismygarden.com/wp-content/uploads/2020/02/removing-old-growth-grapes.jpg.webp" data-srcset="http://thisismygarden.com/wp-content/uploads/2020/02/removing-old-growth-grapes.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/removing-old-growth-grapes-200x300.jpg.webp 200w" data-trellis-processed="1" data-webp="true" height="600" id="mv-trellis-img-8" loading="lazy" sizes="(max-width: 760px) calc(100vw - 40px), 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thisismygarden.com/wp-content/uploads/2020/02/removing-old-growth-grapes.jpg.webp&amp;raw" srcset="http://thisismygarden.com/wp-content/uploads/2020/02/removing-old-growth-grapes.jpg.webp 400w, http://thisismygarden.com/wp-content/uploads/2020/02/removing-old-growth-grapes-200x300.jpg.webp 200w" width="400"><figcaption data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Removing old growth is vital to keep vines producing for years to come.</span></figcaption></figure></div><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Grapes form only on new shoots from the main canes, so prune back old growth to the main canes.</span></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">For most new grape plantings, the first two to three years will require minimal pruning. As plants mature, more old growth will need to be removed in subsequent years.</span></p><span data-dcnode-id="231" instrument_node="">
</span><p data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Here is a look at some of the more popular varieties to grow:</span></p><span data-dcnode-id="228" instrument_node="">
