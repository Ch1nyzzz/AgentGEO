-email dpsp-last dpsp-has-label" data-dcnode-id="704" href="mailto:?subject=https%3A%2F%2Ftimberlandtreecare.com%2Ftypes-soil-for-plants%2F&amp;body=The%206%20Types%20of%20Soil%20for%20Plants%20%26%20How%20to%20Choose" rel="nofollow noopener" style="font-size:14px;padding:0rem;max-height:40px" target="_blank" title="Send over email"><span data-dcnode-id="714" instrument_node=""> </span><span class="dpsp-network-icon" data-dcnode-id="708"><span data-dcnode-id="713" instrument_node=""> </span><span class="dpsp-network-icon-inner" data-dcnode-id="710"><svg data-dcnode-id="711" height="32" version="1.1" viewBox="0 0 28 32" width="32" xmlns="http://www.w3.org/2000/svg"><path d="M18.56 17.408l8.256 8.544h-25.248l8.288-8.448 4.32 4.064zM2.016 6.048h24.32l-12.16 11.584zM20.128 15.936l8.224-7.744v16.256zM0 24.448v-16.256l8.288 7.776z" data-dcnode-id="712"></path></svg></span><span data-dcnode-id="709" instrument_node=""> </span></span><span data-dcnode-id="707" instrument_node=""> </span><span class="dpsp-network-label" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Email</span></span></a></li></ul></div><p data-dcnode-id="699"><img alt="The 6 Types of Soil for Plants &amp; How to Choose" class="aligncenter size-full wp-image-174" data-dcnode-id="700" data-recalc-dims="1" height="450" sizes="(max-width: 817px) 100vw, 817px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/timberlandtreecare.com/wp-content/uploads/2017/04/types-of-soil-for-plants.jpg%3Fresize%3D817%252C450&amp;raw" srcset="https://i0.wp.com/timberlandtreecare.com/wp-content/uploads/2017/04/types-of-soil-for-plants.jpg?resize=300%2C165&amp;ssl=1 300w, https://i0.wp.com/timberlandtreecare.com/wp-content/uploads/2017/04/types-of-soil-for-plants.jpg?resize=768%2C423&amp;ssl=1 768w, https://i0.wp.com/timberlandtreecare.com/wp-content/uploads/2017/04/types-of-soil-for-plants.jpg?fit=817%2C450&amp;ssl=1 817w" width="817"></p><p data-dcnode-id="695"><span data-dcnode-id="698" instrument_node="">You may think that dirt is dirt and any plant can grow just fine in any medium with just a bit of fertilizer, water, sunlight, and love. Unfortunately, you’d be incorrect. Many plants must be planted in a specific type of soil to achieve their greatest height or bear fruit and many will not even grow at all, without the appropriate soil type.</span><br data-dcnode-id="697"><span data-dcnode-id="696" instrument_node=""> When determining your soil type, the best thing you can do is feel them – each one has a distinct feel when wet and dry. Let’s look at a few different soil types and what grows best in them.</span></p><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="693" data-fontsize="32" data-lineheight="48px" style="--fontSize:32; line-height: 1.5;"><span data-dcnode-id="694" instrument_node="">Clay Soil</span></h2><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">It’s the most plentiful type and a bear to work with as a gardener. You can recognize clay soil by its lumpy, sticky nature when wet, as well as how heavy it is. If you find it in your yard, do not worry! There are things you can do to make your life a bit easier. First, control the drainage around the area. Clay soil is very good for plants because its heavy nature holds more nutrients than other types. However, controlling the water is key.</span></p><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="689" data-fontsize="26" data-lineheight="39px" style="--fontSize:26; line-height: 1.5;"><span data-dcnode-id="690" instrument_node="">Our favorite plant for clay soil:</span></h3><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Aster. These perennials are hardy, green plants that have flowers that range from white, to pink to violet.</span></p><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="685" data-fontsize="32" data-lineheight="48px" style="--fontSize:32; line-height: 1.5;"><span data-dcnode-id="686" instrument_node="">Sandy Soil</span></h2><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Sandy soil is grainy to the touch and looks like…well…sand. It drains very well, dries out rapidly and is easy to cultivate crops in because it is light. However, because of its good drainage and sandy nature, it may lack key nutrients. Plants may need a bit of fertilizer to truly take off.</span></p><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="681" data-fontsize="26" data-lineheight="39px" style="--fontSize:26; line-height: 1.5;"><span data-dcnode-id="682" instrument_node="">Our favorite plant for sandy soil:</span></h3><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Lavender. Wonderful to smell, see and drink (in tea!), lavender loves sandy soil and doesn’t need water often. Perfect for the low-maintenance garden.</span></p><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="677" data-fontsize="32" data-lineheight="48px" style="--fontSize:32; line-height: 1.5;"><span data-dcnode-id="678" instrument_node="">Silty Soil</span></h2><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Silty soil is like sandy, except that it is a bit heavier and maintains moisture much better. Silty soil is an excellent soil to plant in if it is well managed. It tends to compact very easily and your plants need some air down there at the roots!</span></p><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="673" data-fontsize="26" data-lineheight="39px" style="--fontSize:26; line-height: 1.5;"><span data-dcnode-id="674" instrument_node="">Our favorite plant for silty soil:</span></h3><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Hakonechloa grass. A very slow growing plant, this grass provides beautiful fall colors, including gold, yellow, and reds.</span></p><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="669" data-fontsize="32" data-lineheight="48px" style="--fontSize:32; line-height: 1.5;"><span data-dcnode-id="670" instrument_node="">Peaty Soil</span></h2><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Dark in color, peaty soil is exactly what you think it is. It’s a soil that contains a high concentration of organic matter – this increases the airflow and retains quite a bit of water. However, because of the acidic nature of the soil, many nutrients are lacking.</span></p><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="665" data-fontsize="26" data-lineheight="39px" style="--fontSize:26; line-height: 1.5;"><span data-dcnode-id="666" instrument_node="">Our favorite plant for peaty soil:</span></h3><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Blueberries. That’s right – blueberries love extremely acidic soil and grow, essentially, like weeds given the right conditions.</span></p><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="661" data-fontsize="32" data-lineheight="48px" style="--fontSize:32; line-height: 1.5;"><span data-dcnode-id="662" instrument_node="">Chalky Soil</span></h2><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">You’ll immediately recognize this if you have chalky soil because you’ll see rocks, stones, and other minerals within it. Chalky soil tends to be very alkaline and drains well. This means, unfortunately, that nutrients are almost non-existent and a fertilizer is required.</span></p><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="657" data-fontsize="26" data-lineheight="39px" style="--fontSize:26; line-height: 1.5;"><span data-dcnode-id="658" instrument_node="">Our favorite plant for chalky soil:</span></h3><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Lilac. If you’ve got the space, a lilac tree loves stony soil and produces beautiful purple flowers.</span></p><h2 class="fusion-responsive-typography-calculated" data-dcnode-id="653" data-fontsize="32" data-lineheight="48px" style="--fontSize:32; line-height: 1.5;"><span data-dcnode-id="654" instrument_node="">Loamy Soil</span></h2><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">The perfect soil, far and away. It maintains its structure well, is not overly heavy, retains water easily, while simultaneously draining well. Additionally, it has lots of nutrients. Unfortunately, most of us don’t have loamy soil and if we do, it’s because it has been developed in our raised beds or gardens over many years.</span></p><h3 class="fusion-responsive-typography-calculated" data-dcnode-id="649" data-fontsize="26" data-lineheight="39px" style="--fontSize:26; line-height: 1.5;"><span data-dcnode-id="650" instrument_node="">Our favorite plant for loamy soil:</span></h3><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Wisteria. Wisteria is an absolutely beautiful plant that produces violet to white flowers and climbs easily up trees, homes and other structures.</span></p><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Once you have a good idea of what kind of soil you have, you can select plants that fit in that area!</span></p><div class="dpsp-content-wrapper dpsp-shape-rectangular dpsp-size-medium dpsp-show-on-mobile dpsp-button-style-1" data-dcnode-id="578" id="dpsp-content-bottom" style="min-height:40px;position:relative"><ul class="dpsp-networks-btns-wrapper dpsp-networks-btns-share dpsp-networks-btns-content dpsp-column-5" data-dcnode-id="579" style="padding:0;margin:0;list-style-type:none"><li class="dpsp-network-list-item dpsp-network-list-item-facebook" data-dcnode-id="632" style="float:left"><span data-dcnode-id="644" instrument_node=""> </span><a aria-label="Share on Facebook" class="dpsp-network-btn dpsp-facebook dpsp-first dpsp-has-label" data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer
