</span><h1 data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">How to Maintain Strawberry Plants Over Winter</span></h1><span data-dcnode-id="614" instrument_node="">
</span><div class="single-post-meta" data-dcnode-id="580"><span data-dcnode-id="613" instrument_node="">

</span><div class="post-content" data-dcnode-id="524"><span data-dcnode-id="573" instrument_node="">
</span><h2 data-dcnode-id="569"><strong data-dcnode-id="570"><u data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Strawberry Plant Sort out</span></u></strong></h2><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="567" instrument_node="">As you know, I’m more than a bit partial to some sun-warmed, superbly juicy and sweet home grown strawberries ….but just because the season is well and truly over that’s not to say that we can forget</span><strong data-dcnode-id="565"><span data-dcnode-id="566" instrument_node=""> those small, inconspicuous strawberry plants</span></strong><span data-dcnode-id="564" instrument_node=""> . With a little bit of TLC right now you can ensure that the plants will be in top condition for the coming cropping season.</span></p><span data-dcnode-id="562" instrument_node="">
</span><h3 data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">How Best to Weed Your Strawberry Patch</span></h3><span data-dcnode-id="559" instrument_node="">
</span><figure aria-describedby="caption-attachment-10414" class="wp-caption alignleft" data-dcnode-id="555" id="attachment_10414" style="width: 300px"><img alt="vine-weevil-on-strawberry-plant" class="size-medium wp-image-10414" data-dcnode-id="558" height="205" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goto4gardening.co.uk/wp-content/uploads/2021/10/vine-weevil-on-strawberry-plant-300x205-1.jpg&amp;raw" width="300"><figcaption class="wp-caption-text" data-dcnode-id="556" id="caption-attachment-10414"><span data-dcnode-id="557" instrument_node="">vine weevil on strawberry plant</span></figcaption></figure><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="553" instrument_node="">Start by weeding out any strawberry plants which didn’t grow or perform well in recent years – we all have off days or seasons, but repeated poor performance in a strawberry usually means that the plant is past its best and unlikely to become significantly more productive.&nbsp; It isn’t advisable to put a replacement plant in exactly the same spot, as the build up of soil borne diseases or pests may have been partly to blame for the first plant’s decline. When you dig out any plants and as you weed between the plants do look out for </span><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onti.uk/d/goto4gardening/vine-weevils-yuk/" target="_blank"><span data-dcnode-id="552" instrument_node="">vine weevil adults or grubs</span></a><span data-dcnode-id="550" instrument_node="">, this horrible little pest loves strawberry plants and the grubs will eat away at the roots, causing serious problems. It is too late in the year &nbsp;for the soil temperature to be warm enough to use the brilliant nematode control but collect up any adults or grubs you find and make a note to treat the plants in the spring as soon as temperatures warm up.</span></p><span data-dcnode-id="548" instrument_node="">
</span><h3 data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Avoiding Strawberry Plant Leaf Fungus</span></h3><span data-dcnode-id="545" instrument_node="">
</span><figure aria-describedby="caption-attachment-10415" class="wp-caption alignright" data-dcnode-id="541" id="attachment_10415" style="width: 300px"><img alt="strawberry-plant-leaf-fungus" class="size-medium wp-image-10415" data-dcnode-id="544" height="225" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goto4gardening.co.uk/wp-content/uploads/2021/10/strawberry-plant-leaf-fungus-300x225-1.jpg&amp;raw" width="300"><figcaption class="wp-caption-text" data-dcnode-id="542" id="caption-attachment-10415"><span data-dcnode-id="543" instrument_node="">strawberry plant leaf fungus</span></figcaption></figure><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Some of the leaves may have fallen from the plants already but as winters are generally milder, many strawberry plants hold some leaves throughout the year.&nbsp; This means leaf spot and other fungal problems are easily carried over from one year to the next, so use a pair of sharp scissors to snip off and dispose of any leaves showing bright red, orange, purple or brown spots – classic leaf spot fungus !</span></p><span data-dcnode-id="537" instrument_node="">
</span><h3 data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Best Practices for Thinning and Pruning Strawberry Plants</span></h3><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Left to their own devices strawberry plants will move from their neat rows to form a tangled jungle of plants as they put on more and more runners which root to form new plants. You should be able to carefully dig up and re-plant some of these newly formed runner-strawberrry plants but choose only those which look perfectly healthy and which came from really good-looking parent plants. You can use these to increase the size of your strawberry patch or to plant up a new area or a few containers. You should also do some clearing between the rows, clearing newly formed unwanted plants to allow space between the chosen plants. This space allows for better air circulation (so fewer disease problems next year)&nbsp; and reduces competition between the plants, so allowing those which remain to perform better! Finally mulch around and between the plants with well rotted manure…then sit back and dream of sundaes, cream, jam&nbsp; and pavlovas to come!</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><img alt="Strawberry Cake with Cream" class="aligncenter size-full wp-image-10416" data-dcnode-id="530" height="299" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goto4gardening.co.uk/wp-content/uploads/2021/10/strawberry-cream-cake.jpg&amp;raw" width="448"></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">&nbsp;</span></p><span data-dcnode-id="525" instrument_node="">
