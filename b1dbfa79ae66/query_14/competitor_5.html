</span><section class="article-section article-section__full" data-dcnode-id="534"><span data-dcnode-id="1323" instrument_node="">
</span><section class="article-section__content capital-first-letter" data-dcnode-id="1219" id="embr202051069-sec-0001"><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1321" instrument_node="">The human gut microbiome is a complex system of gazillions of bacteria, fungi, viruses, protists and archaea that has an enormous effect on our metabolism, health and well-being. The same holds true for the plant rhizosphere, the crucial parts below ground: roots are immersed in a soil microbiome that provides plants with important nutrients, protects them from disease and pathogens and helps plants to adapt to environmental changes (Fig&nbsp;</span><a data-dcnode-id="1319" href="#embr202051069-fig-0001"><span data-dcnode-id="1320" instrument_node="">1</span></a><span data-dcnode-id="1318" instrument_node="">). And, similar to faecal transplants in humans, soil transplants can have a drastic effect on plant health and growth. Moreover, plant and human microbiomes are linked to each other: since the gut and the soil microbiome share similar bacteria phyla and since microbes from fruits, salads and vegetables join the human gut microbiome, the plant microbiome can affect the gut microbiome and thereby human health (Fig&nbsp;</span><a data-dcnode-id="1316" href="#embr202051069-fig-0002"><span data-dcnode-id="1317" instrument_node="">2</span></a><span data-dcnode-id="1315" instrument_node="">). The current and well-known concept of a healthy diet</span><a aria-controls="embr202051069-note-1001_5" aria-expanded="false" aria-haspopup="false" aria-label="Note" class="noteLink scrollableLink" data-dcnode-id="1312" href="#embr202051069-note-1001_5" id="embr202051069-note-1001_5-controller" title="Link to note"><sup data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">†</span></sup></a><span aria-labelledby="embr202051069-note-1001_5-controller" class="footNotePopup" data-dcnode-id="1301" id="embr202051069-note-1001_5" style="display: none;"><button class="footNoteClose" data-dcnode-id="1310"><i aria-hidden="true" class="icon-tools_close" data-dcnode-id="1311"></i></button><span aria-labelledby="Footnote 1" class="footNotePopup__item" data-dcnode-id="1303" title="Footnote 1"><span class="number" data-dcnode-id="1306"><sup data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">†</span></sup><span data-dcnode-id="1307" instrument_node=""> </span></span><span data-dcnode-id="1305" instrument_node="">
                  Correction added on 15 January 2021, after first online publication: “died” was corrected to “diet”.</span><br data-dcnode-id="1304"></span><span class="chevronDown" data-dcnode-id="1302"></span></span><span data-dcnode-id="1300" instrument_node="">—one that includes a lot of fibre, minerals and vitamins from fruits and vegetables—should therefore be expanded to consider plant microbes that not only benefit plant health but via food also human health. Vice versa, as much as antibiotics can severely change the human gut microbiome and its function, the use of herbicides, fungicides and pesticides in food production has drastic effects on the plant microbiomes in the soil and on the fruits and vegetables that we eat.</span></p><span data-dcnode-id="1298" instrument_node="">

</span><section class="article-section__content" data-dcnode-id="1173" id="embr202051069-sec-0002"><span data-dcnode-id="1217" instrument_node="">
</span><h2 class="article-section__title section__title to-section section1" data-dcnode-id="1215" id="embr202051069-sec-0002-title"><span data-dcnode-id="1216" instrument_node=""> The gut microbiome</span></h2><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1213" instrument_node="">A human body consists of about ten times more bacterial cells than human cells, the majority of which are in the gut. The ratio of microbial to human genes is even more impressive, counting more than 3 million microbial genes compared with 22,000 human genes. The gut microbiome starts to develop before birth and becomes fully established 2–3&nbsp;years into childhood. The formation of the infant microbiome is not only important for gut function, but also crucial for the development of the systemic and mucosal immune system thereby influencing infant and eventually adult health (Lozupone </span><i data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="1210" instrument_node="">, </span><span data-dcnode-id="1207"><a class="bibLink tab-link" data-dcnode-id="1208" data-tab="pane-pcw-references" href="#embr202051069-bib-0005" id="#embr202051069-bib-0005R"><span data-dcnode-id="1209" instrument_node="">2012</span></a></span><span data-dcnode-id="1206" instrument_node="">).</span></p><span data-dcnode-id="1204" instrument_node="">
</span><blockquote class="quote" data-dcnode-id="1199" id="embr202051069-blk-0001"><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">… since microbes from fruits, salads and vegetables join the human gut microbiome, the plant microbiome can affect the gut microbiome and thereby human health.</span></p><span data-dcnode-id="1200" instrument_node="">
</span></blockquote><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1197" instrument_node="">The original view of a simple mutualistic interaction between gut cells and microbial cells has given way to a much more complex and dynamic view of a close symbiotic interaction between humans and bacteria. The intestinal epithelial and mucosal immune cells recognize and interact with select bacterial species which contribute to the proper functioning of the human immune system. Microbially generated metabolites not only help the gut to extract nutrients from food, but can also influence immune function (Postler &amp; Ghosh, </span><span data-dcnode-id="1194"><a class="bibLink tab-link" data-dcnode-id="1195" data-tab="pane-pcw-references" href="#embr202051069-bib-0009" id="#embr202051069-bib-0009R"><span data-dcnode-id="1196" instrument_node="">2017</span></a></span><span data-dcnode-id="1193" instrument_node="">). In fact, a dysfunctional gut microbiome has been shown to cause or contribute to various gastrointestinal diseases, inflammatory or immune-mediated diseases, diabetes, obesity, atopic diseases and chronic kidney diseases (Lozupone </span><i data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="1190" instrument_node="">, </span><span data-dcnode-id="1187"><a class="bibLink tab-link" data-dcnode-id="1188" data-tab="pane-pcw-references" href="#embr202051069-bib-0005" id="#embr202051069-bib-0005R"><span data-dcnode-id="1189" instrument_node="">2012</span></a></span><span data-dcnode-id="1186" instrument_node="">). Generally, microbiome richness and diversity are directly associated with human health, but this simple equation&nbsp;needs to be considered with care.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1183" instrument_node="">An important step towards our current understanding was the finding that healthy and sick gut microbiomes differ in their microbial composition. Although gut microbiomes contain up to 1,000 different microbial species and show large variations between individuals, 99% of the gut microbiota belongs to only 30–40 species (Lozupone </span><i data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="1180" instrument_node="">, </span><span data-dcnode-id="1177"><a class="bibLink tab-link" data-dcnode-id="1178" data-tab="pane-pcw-references" href="#embr202051069-bib-0005" id="#embr202051069-bib-0005R"><span data-dcnode-id="1179" instrument_node="">2012</span></a></span><span data-dcnode-id="1176" instrument_node="">) that change in positive or negative ways in response to external or environmental factors. Novel sequencing techniques now allow the detection and quantification of virtually all gut microbes, but we still know almost nothing about the role and function of many microbial species, let&nbsp;alone the role of viruses that also populate the gut ecosystem.</span></p><span data-dcnode-id="1174" instrument_node="">
</span></section><span data-dcnode-id="1172" instrument_node="">
</span><section class="article-section__content" data-dcnode-id="1161" id="embr202051069-sec-0003"><span data-dcnode-id="1171" instrument_node="">
</span><h2 class="article-section__title section__title to-section section1" data-dcnode-id="1169" id="embr202051069-sec-0003-title"><span data-dcnode-id="1170" instrument_node=""> Changes of the microbiota in historical times</span></h2><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">As humans and human civilization changed over millennia so did the human gut microbiota in response to changes in diet. The gut microbiome of contemporary hunter–gatherer societies for instance shows drastic changes during the year reflecting the changes in food supply. Moreover, major differences can also be observed between the microbiota of female and male members of these societies: the microbiota of women resembles more those of herbivores, while the male members have a more carnivore-like microbiome. The changes in gut microbiota from earlier to modern civilizations also reflect changes in hygiene, which can still be observed between urban and rural communities. Modern lifestyle with improved hygiene, processed food and the widespread use of medicines, notably antibiotics, seems to have had a major effect on human gut microbiome diversity during the past decades, overall reducing its variety.</span></p><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Importantly, what people eat has a much stronger influence on the gut microbial composition than genetics: members of the same family living in different locations show larger differences in their microbiomes than genetically unrelated individuals who share the same household and similar lifestyle and nutrition.</span></p><span data-dcnode-id="1162" instrument_node="">
</span></section><span data-dcnode-id="1160" instrument_node="">
</span><section class="article-section__content" data-dcnode-id="1135" id="embr202051069-sec-0004"><span data-dcnode-id="1159" instrument_node="">
</span><h2 class="article-section__title section__title to-section section1" data-dcnode-id="1157" id="embr202051069-sec-0004-title"><span data-dcnode-id="1158" instrument_node=""> Microbes enhance food quality and content</span></h2><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Humans can only synthesize 11 of the 20 essential amino acids themselves; they rely on food intake for the other nine along with all 13 essential vitamins. Most of these amino acids and vitamins are retrieved from meat, eggs, milk products, fruits and vegetables, but a few essential compounds are produced by microbes—which are important producers of essential amino acids and vitamins themselves. For example, cobalamin (Vitamin B12) cannot be produced by either plants or animals; it is synthesized by microbes in the plant microbiotas or in the gut of ruminant animals.</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">In addition to primary metabolites, amino acids and vitamins, many microbes also produce a large variety of chemicals known as secondary metabolites or natural products. Among the best-known of these compounds are antibiotics but also immunosuppressants, anticancer and anti-inflammatory drugs.</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1149" instrument_node="">Yet, plants are at least as capable as microbes in producing secondary metabolites; overall plants synthesize more than hundred thousand compounds, many of which are used as pharmaceuticals or are important for human health. Flavonoids, a highly diverse class of plant compounds that are present in many fruits, vegetables or nuts, have many biological activities including anti-inflammatory, anticancer and anti-viral properties. Omega-3 (n-3) polyunsaturated fatty acids (PUFA) are found in nuts and seeds of twenty different plants, including soy bean, rape seed or flax. PUFA reduce the risk of cardiovascular diseases, blood pressure and inflammatory reactions. Another class of important plant products are conjugated linoleic acid, L-carnitine, choline or sphingomyelin, which all positively affect the gut microbiome (Postler &amp; Ghosh, </span><span data-dcnode-id="1146"><a class="bibLink tab-link" data-dcnode-id="1147" data-tab="pane-pcw-references" href="#embr202051069-bib-0009" id="#embr202051069-bib-0009R"><span data-dcnode-id="1148" instrument_node="">2017</span></a></span><span data-dcnode-id="1145" instrument_node="">). Interestingly, many plants produce only tiny amounts of these secondary metabolites, but beneficial microbes associated with their plant host can boost their production. The interaction of microbes and plants thereby influences food quality, taste and texture (Flandroy </span><i data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="1142" instrument_node="">, </span><span data-dcnode-id="1139"><a class="bibLink tab-link" data-dcnode-id="1140" data-tab="pane-pcw-references" href="#embr202051069-bib-0003" id="#embr202051069-bib-0003R"><span data-dcnode-id="1141" instrument_node="">2018</span></a></span><span data-dcnode-id="1138" instrument_node="">).</span></p><span data-dcnode-id="1136" instrument_node="">
</span></section><span data-dcnode-id="1134" instrument_node="">
</span><section class="article-section__content" data-dcnode-id="1055" id="embr202051069-sec-0005"><span data-dcnode-id="1133" instrument_node="">
</span><h2 class="article-section__title section__title to-section section1" data-dcnode-id="1131" id="embr202051069-sec-0005-title"><span data-dcnode-id="1132" instrument_node=""> Where does our food come from?</span></h2><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1129" instrument_node="">Food production has changed tremendously during the past century. Today's agricultural production systems are mostly large-scale monocultures of a few elite crop varieties that require fertilizers, herbicides and pesticides to ensure a high yield. Most of these high-yield breeds have lost important secondary metabolites that protect plants and humans alike. A good example is the domestication of plants of the </span><i data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Brassicacae</span></i><span data-dcnode-id="1126" instrument_node=""> family, such as cabbage and cauliflower, in which the amount of glucosinolates has been reduced to eliminate their bitter taste. Yet, glucosinolates not only help the plant to resist to pathogens but are also suspected to be a prebiotic anticancer metabolite (Blum </span><i data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="1123" instrument_node="">, </span><span data-dcnode-id="1120"><a class="bibLink tab-link" data-dcnode-id="1121" data-tab="pane-pcw-references" href="#embr202051069-bib-0002" id="#embr202051069-bib-0002R"><span data-dcnode-id="1122" instrument_node="">2019</span></a></span><span data-dcnode-id="1119" instrument_node="">).</span></p><span data-dcnode-id="1117" instrument_node="">
</span><blockquote class="quote" data-dcnode-id="1112" id="embr202051069-blk-0002"><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Modern lifestyle with improved hygiene, processed food and the widespread use of medicines, […] seems to have had a major effect on human gut microbiome diversity during the past decades</span></p><span data-dcnode-id="1113" instrument_node="">
</span></blockquote><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1110" instrument_node="">Industrial agriculture requires increasing amounts of fertilizers and pesticides to maintain yield. This seems to be the result and/or the cause of a poor microbial diversity in the soil. Soil erosion and climate change also affect microbial biodiversity and contribute to the loss of large areas of arable land and their microbial populations (Blum </span><i data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="1107" instrument_node="">, </span><span data-dcnode-id="1104"><a class="bibLink tab-link" data-dcnode-id="1105" data-tab="pane-pcw-references" href="#embr202051069-bib-0002" id="#embr202051069-bib-0002R"><span data-dcnode-id="1106" instrument_node="">2019</span></a></span><span data-dcnode-id="1103" instrument_node="">). In this way, crop plants today lack many of their important symbiotic partners to produce or increase the contents of vitamins, minerals, antioxidants and other metabolites that are beneficial for both plant and human health.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1100" instrument_node="">Soil is the ultimate source from which plants recruit beneficial microbes for the rhizosphere and phyllosphere, that is the root and shoot surfaces, but also for the inner plant organs (endosphere), including fruits and seeds. Plant rhizo-, phyllo- and endosphere microbes not only increase nutrient use efficiency and thereby crop yield, they are also involved in enhancing resistance against herbivores, insects, bacterial and fungal pathogens and even nematodes or viral infections (Blum </span><i data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="1097" instrument_node="">, </span><span data-dcnode-id="1094"><a class="bibLink tab-link" data-dcnode-id="1095" data-tab="pane-pcw-references" href="#embr202051069-bib-0002" id="#embr202051069-bib-0002R"><span data-dcnode-id="1096" instrument_node="">2019</span></a></span><span data-dcnode-id="1093" instrument_node="">).</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">The use of herbicides, excessive mineral fertilization and improper land management have serious effects on microbial communities. A good example is glyphosate that has been used for more than 40&nbsp;years in agriculture. This chemical inhibits enoylpyruvylshikimate-5-phosphate (EPSP) synthase, an enzyme of the shikimate pathway that is responsible for the biosynthesis of aromatic amino acids in plants. EPSP synthase is present in all plants but not in humans, which makes glyphosate an ideal herbicide. The application of glyphosate to kill weeds is linked with the use of glyphosate-resistant crops which has helped considerably to assure high crop yields.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1087" instrument_node="">But the use of glyphosate might come with a price. Although the acute toxicity of glyphosate to humans is low, the fact that humans are exposed to it over long terms prompted the WHO to classify glyphosate as a potential carcinogenic in 2015. Importantly, glyphosate is also an antimicrobial, as both bacteria and fungi rely on the shikimate pathway for aromatic amino acid production. A number of reports show negative effects on beneficial soil, rhizosphere and endosphere microbes, including arbuscular mycorrhizal fungi and nitrogen-fixing </span><i data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Rhizobium spp</span></i><span data-dcnode-id="1084" instrument_node="">. (Van Bruggen </span><i data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="1081" instrument_node="">, </span><span data-dcnode-id="1078"><a class="bibLink tab-link" data-dcnode-id="1079" data-tab="pane-pcw-references" href="#embr202051069-bib-0010" id="#embr202051069-bib-0010R"><span data-dcnode-id="1080" instrument_node="">2018</span></a></span><span data-dcnode-id="1077" instrument_node="">). Glyphosate also seems to inhibit a number of soil, plant and gut beneficial microbes at much lower concentrations than pathogenic microbes. In terms of the human gut microbiome, such inhibition was observed for the beneficial microbes </span><i data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Bifidobacterium</span></i><span data-dcnode-id="1074" instrument_node=""> sp. and </span><i data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Enterococcus</span></i><span data-dcnode-id="1071" instrument_node=""> sp. compared with pathogenic strains of </span><i data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Clostridium</span></i><span data-dcnode-id="1068" instrument_node=""> sp. and </span><i data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Salmonella</span></i><span data-dcnode-id="1065" instrument_node=""> sp. (Van Bruggen </span><i data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="1062" instrument_node="">, </span><span data-dcnode-id="1059"><a class="bibLink tab-link" data-dcnode-id="1060" data-tab="pane-pcw-references" href="#embr202051069-bib-0010" id="#embr202051069-bib-0010R"><span data-dcnode-id="1061" instrument_node="">2018</span></a></span><span data-dcnode-id="1058" instrument_node="">). Overall these indirect effects of glyphosate on soil, plant and human microbes might affect human health.</span></p><span data-dcnode-id="1056" instrument_node="">
</span></section><span data-dcnode-id="1054" instrument_node="">
</span><section class="article-section__content" data-dcnode-id="979" id="embr202051069-sec-0006"><span data-dcnode-id="1053" instrument_node="">
</span><h2 class="article-section__title section__title to-section section1" data-dcnode-id="1051" id="embr202051069-sec-0006-title"><span data-dcnode-id="1052" instrument_node=""> Food quality beyond fibres, minerals and vitamins</span></h2><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">The protein-rich input from increased meat consumption in Western diets also massively affects the gut microbiome, whereby certain microbes suppress beneficial competitors and change our eating behaviour to favour more unhealthy food. Much of the current discussion on maintaining a diverse and healthy gut microbiome is focused on eating a healthy diet, which is defined by a high content of fibre, minerals and vitamins. However, this still leaves out an important aspect of food.</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1046" instrument_node="">Most of our daily food comes from industrial agriculture and has been exposed to herbicides, fertilizers and a large array of pesticides to obtain high yields. Pesticides are a large class of chemical compounds that include fungicides, bactericides, nematicides, molluscicides, avicides, rodenticides and animal repellents. A large literature is available to show the negative effects of many commonly used pesticides on human health. For example, various carbamates, pyrethroids and neonicotinides have endocrine-disrupting activity and negative effects on reproduction in animals and humans (Nicolopoulou-Stamati </span><i data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="1043" instrument_node="">, </span><span data-dcnode-id="1040"><a class="bibLink tab-link" data-dcnode-id="1041" data-tab="pane-pcw-references" href="#embr202051069-bib-0008" id="#embr202051069-bib-0008R"><span data-dcnode-id="1042" instrument_node="">2016</span></a></span><span data-dcnode-id="1039" instrument_node="">). However, many beneficial microbes are also among the targets of pesticides with direct and indirect implications on soil, plant and food safety.</span></p><span data-dcnode-id="1037" instrument_node="">
</span><blockquote class="quote" data-dcnode-id="1032" id="embr202051069-blk-0003"><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">The interaction of microbes and plants thereby influences food quality, taste and texture.</span></p><span data-dcnode-id="1033" instrument_node="">
</span></blockquote><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1030" instrument_node="">For example, most copper-based fungicides have a deleterious effect on nitrogen-fixing bacteria (Meena </span><i data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="1027" instrument_node="">, </span><span data-dcnode-id="1024"><a class="bibLink tab-link" data-dcnode-id="1025" data-tab="pane-pcw-references" href="#embr202051069-bib-0006" id="#embr202051069-bib-0006R"><span data-dcnode-id="1026" instrument_node="">2020</span></a></span><span data-dcnode-id="1023" instrument_node="">). Similarly, long-term application of organomercurials has negative effects on cellulolytic fungal species. Triarimol and captan decrease the content of </span><i data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Aspergillus fungi</span></i><span data-dcnode-id="1020" instrument_node=""> that help plants to grow and develop. Carbendazim is highly toxic to </span><i data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">Trichoderma harzianum</span></i><span data-dcnode-id="1017" instrument_node="">, a potent biocontrol agent against the soil-borne fungal pathogens </span><i data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Fusarium</span></i><span data-dcnode-id="1014" instrument_node="">, </span><i data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Pythium</span></i><span data-dcnode-id="1011" instrument_node=""> and </span><i data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Rhizoctonia</span></i><span data-dcnode-id="1008" instrument_node=""> and many fungicides also inhibit hyphal growth and root colonization by arbuscular mycorrhizal fungi. The insecticides chlorpyrifos, phosphamidon, malathion, fenthion, methyl phosphorothioate, parathion, chlorfluazuron, cypermethrin or phoximin have negative effects on soil and rhizosphere microbiota at field-recommended concentrations (Meena </span><i data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="1005" instrument_node="">, </span><span data-dcnode-id="1002"><a class="bibLink tab-link" data-dcnode-id="1003" data-tab="pane-pcw-references" href="#embr202051069-bib-0006" id="#embr202051069-bib-0006R"><span data-dcnode-id="1004" instrument_node="">2020</span></a></span><span data-dcnode-id="1001" instrument_node="">).</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Many fresh fruit, salads and vegetables are stored and shipped, often over long distances, before they arrive at the supermarket. Long storage and shipping periods, however, are not possible without treating fruit and vegetables with a variety of pesticides and antibiotics for preservation. Not only will some of these chemicals make their way through food into the human gut, but they also kill off the plant microbiota.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="995" instrument_node="">Agriculture uses about four times more antibiotics than human medicine. This massive (ab)use of antibiotics in farming, mostly to enhance growth and health of livestock, has greatly contributed to the emergence of resistant bacteria. Not only do antibiotics excreted by animals change microbial function and composition of soil, waterways and other biotopes but also the antibiotic resistance genes can spread to other microbes via horizontal gene transfer (Jechalke </span><i data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="992" instrument_node="">, </span><span data-dcnode-id="989"><a class="bibLink tab-link" data-dcnode-id="990" data-tab="pane-pcw-references" href="#embr202051069-bib-0004" id="#embr202051069-bib-0004R"><span data-dcnode-id="991" instrument_node="">2014</span></a></span><span data-dcnode-id="988" instrument_node="">). The consumption of fresh produce from fields fertilized with manure from antibiotics-treated animals can thus spread resistance genes to the human gut microbiome and further the emergence of multi-drug-resistant human pathogens. The widespread application of pesticides and herbicides could similarly increase the risk of new pathogens and diseases against both plants and humans.</span></p><span data-dcnode-id="986" instrument_node="">
</span><blockquote class="quote" data-dcnode-id="981" id="embr202051069-blk-0004"><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">… crop plants today lack many of their important symbiotic partners to produce or increase the contents of vitamins, minerals, antioxidants and other metabolites…</span></p><span data-dcnode-id="982" instrument_node="">
</span></blockquote><span data-dcnode-id="980" instrument_node="">
</span></section><span data-dcnode-id="978" instrument_node="">
</span><section class="article-section__content" data-dcnode-id="946" id="embr202051069-sec-0007"><span data-dcnode-id="977" instrument_node="">
</span><h2 class="article-section__title section__title to-section section1" data-dcnode-id="975" id="embr202051069-sec-0007-title"><span data-dcnode-id="976" instrument_node=""> Similarities between root and gut microbiomes</span></h2><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="973" instrument_node="">Recent research suggests that the root and gut microbial communities exist under similar conditions (Mendes &amp; Raaijmakers, </span><span data-dcnode-id="970"><a class="bibLink tab-link" data-dcnode-id="971" data-tab="pane-pcw-references" href="#embr202051069-bib-0007" id="#embr202051069-bib-0007R"><span data-dcnode-id="972" instrument_node="">2015</span></a></span><span data-dcnode-id="969" instrument_node="">). Both are open systems characterized by gradients of oxygen, water and pH that create a diversity of different niches. Both systems inherit their microbial members from the environment: food in humans and soil in plants, respectively. Plant and gut systems are populated by a multitude of similar bacterial phyla (Firmicutes, Bacteroidetes, Proteobacteria, Actinobacteria) and, similar to human faecal transfer, transplantation of beneficial microbes from disease-suppressive soils can protect plants against various diseases (Mendes &amp; Raaijmakers, </span><span data-dcnode-id="966"><a class="bibLink tab-link" data-dcnode-id="967" data-tab="pane-pcw-references" href="#embr202051069-bib-0007" id="#embr202051069-bib-0007R"><span data-dcnode-id="968" instrument_node="">2015</span></a></span><span data-dcnode-id="965" instrument_node="">). Research on different mammalian herbivores and carnivores indicates that the gut microbiome recruits some of its members from eating raw plant material. Root and gut microbes synthesize essential amino acids, vitamins and many other secondary metabolites that modulate their host immune system: as such, the plant and gut microbiomes can be considered as meta-organs with paramount importance for the health of their hosts.</span></p><span data-dcnode-id="963" instrument_node="">
</span><blockquote class="quote" data-dcnode-id="958" id="embr202051069-blk-0005"><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Most of our daily food comes from industrial agriculture and has been exposed to herbicides, fertilizers and a large array of pesticides to obtain high yields.</span></p><span data-dcnode-id="959" instrument_node="">
</span></blockquote><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="948"><span data-dcnode-id="956" instrument_node="">It is therefore important to better understand the functions and roles of the hundreds of different microbial species in the complex interaction network with their hosts. Of equal importance is the question how to establish and maintain a healthy microbiome. At the same time, the re-integration of beneficial microbes into agriculture could contribute to providing healthy food in a sustainable manner so as to help reduce the amount of fertilizer, pesticides and herbicides being used (Bender </span><i data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="953" instrument_node="">, </span><span data-dcnode-id="950"><a class="bibLink tab-link" data-dcnode-id="951" data-tab="pane-pcw-references" href="#embr202051069-bib-0001" id="#embr202051069-bib-0001R"><span data-dcnode-id="952" instrument_node="">2016</span></a></span><span data-dcnode-id="949" instrument_node="">). Moreover, given the food link, humans would also benefit from eating unprocessed organic food since it supplies beneficial microbes along with secondary metabolites. Research on the integral role of microbiomes on their host's metabolism and health should therefore not stop at the human gut microbiome but expand to the microbiota of plants and their function in plant growth and development. Given the food link, such an effort would benefit both plants and humans.</span></p><span data-dcnode-id="947" instrument_node="">
</span></section><span data-dcnode-id="945" instrument_node="">
</span><div class="article-section__content" data-dcnode-id="935"><span data-dcnode-id="944" instrument_node="">
