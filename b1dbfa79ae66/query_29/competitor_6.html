Training
and Pruning
Fruit Trees

M

any fruit-growing enthusiasts neglect
the annual training and pruning
of fruit trees. Without training and
pruning, however, fruit trees will not develop
proper shape and form. Properly trained and
pruned trees will yield high-quality fruit much
sooner and live significantly longer.
A primary objective of training and pruning
is to develop a strong tree framework that will
support fruit production. Improperly trained
fruit trees generally have very upright branch
angles, which result in serious limb breakage
under a heavy fruit load. This significantly
reduces the tree’s productivity and may greatly
reduce its life. Another goal of annual training
and pruning is to remove dead, diseased, or
broken limbs.
Proper tree training also opens up the tree
canopy to maximize light penetration. For most
deciduous tree fruit, flower buds for the current
season’s crop were formed the previous summer.
Light penetration is essential for strong flower
bud development and optimal fruit set, flavor,
and quality. Although a mature tree may be
growing in full sun, a very dense canopy may
not allow adequate light to reach 12 to 18 inches
inside the canopy. Opening the tree canopy also
permits air movement through the tree, which
promotes rapid drying to minimize disease
infection and allows thorough spray penetration.
Additionally, a well-shaped fruit tree is
aesthetically pleasing, whether in a landscaped
yard, garden, or commercial orchard.

    Training and Pruning Fruit Trees

Pruning vs. Training

Another factor to consider is tree age. Within a particular fruit type, the oldest trees should be pruned first.
Younger trees are more prone to winter injury from
early pruning.
Summer pruning eliminates an energy or “food”
producing portion of the tree and may result in reduced
tree growth. Summer pruning can begin as soon as
the buds start to grow, but it is generally started after
vegetative growth is several inches long. For most purposes, summer pruning should be limited to removing
the upright and vigorous current season’s growth; only
thinning cuts should be used. To minimize the potential
for winter injury, summer pruning should not be done
after the end of July.

Historically, fruit tree form and structure have been
maintained by pruning. Tree training, however, is a
much more efficient and desirable way to develop form
and structure.
Pruning is the removal of a portion of a tree and is
used to correct or maintain tree structure. Training is
a practice that allows tree growth to be directed into a
desired shape and form. Training young fruit trees is essential for proper tree development. It is more efficient
to direct tree growth with training than to correct it with
pruning.
Pruning is most often accomplished during the winter, commonly referred to as dormant pruning. Training
includes summer training and summer pruning as well
as dormant pruning. The goal of tree training is to direct
tree growth and to minimize pruning and removing a
portion of the tree, although dormant pruning is always
going to be needed.

Types of Pruning Cuts
Thinning Cut
A thinning cut removes an entire branch back to a side
shoot branch. Thinning cuts do not invigorate the tree near
the cut in comparison to some of the other pruning cuts.

Dormant Pruning vs. Summer Pruning

Heading Cut

Trees respond very differently to dormant and summer
pruning. Dormant pruning is an invigorating process.
During the fall, energy (as carbohydrates) is stored
primarily in the trunk and root system to support the
top portion of the tree. If a large portion of the tree is
removed during the winter while the tree is dormant,
the tree’s energy reserve is unchanged. In the spring,
the dormant pruned tree with fewer growing points
responds by producing many new vigorous, upright
shoots, called water sprouts, which shade the tree and
inhibit proper development. Heavy dormant pruning
also promotes excessive vegetative vigor, which uses
much of the tree’s energy, leaving little for fruit growth
and development.
Historically, much of the vigorous, upright vegetative growth has been removed during the dormant
season. But heavy dormant pruning results in a yearly
cycle with excessive vegetative growth and little or no
fruit production. It’s best to limit dormant pruning to
cuts that remove damaged, diseased, and dead wood
and those that develop the tree’s desired shape. Summer pruning can be used to remove upright growth
when 6 to 10 inches long in early summer, allowing optimal light penetration, and to minimize shading without the invigorating effect of dormant pruning.
The timing of dormant pruning is critical. Pruning
should begin as late in the winter as possible to avoid
winter injury. Apple and pecan trees should be pruned
first, followed by cherry, peach, and plum trees. A good
rule to follow is to prune the latest blooming trees first
and the earliest blooming last.

A heading cut removes only the terminal portion of a
branch. This type of cut promotes the growth of lower
buds with the greatest vigor just below the cut. When
lateral branches are headed into one-year-old wood, the
area near the cut is invigorated. The headed branch is
much stronger and rigid, resulting in lateral secondary
branching for approximately 12 to 15 inches. Older trees
can be held in their allotted space by “mold and hold”
cuts, which are devigorating heading cuts made into
at least two-year-old wood. Young trees and branches
where heading cuts are made are referred to as “headed.”

Bench Cut
A bench cut removes vigorous, upright branches back to
side branches that are similar in diameter to the branch
being pruned but are less upright and outward growing. Bench cuts are used to open up the center of the
tree and spread the branches outward. This is a major
cut and should be used only when necessary.
When making pruning cuts, it is important to use
techniques that will allow the cut surface to heal quickly. Rapid healing minimizes the incidence of disease
and insect infection. Pruning cuts should be close to the
adjacent branch without leaving stubs. Also, when large
horizontal cuts are made, they should be slightly angled
so that water does not sit on the cut surface, allowing
the growth of rot and disease organisms.

pruning paints, but the best treatment is to make proper

Training Systems
One of the most frequently asked questions is, “To what
shape should I train my fruit trees?”
It is difficult to give one answer. You can choose
from many different training shapes and forms with
multiple variations on each form. This publication focuses primarily on the central-leader and open-center
training systems. A list of fruit trees conventionally
trained to each system is also included. However, a fruit

Central-Leader Training —
Apple, Pear, Pecan, Plum
A central-leader tree is characterized by one main, upright trunk, referred to as the leader. Branching generally begins on the leader 24 to 36 inches above the soil
surface to allow management practices under the tree.

Figure 1. Pruning a semi-dwarf or larger central-leader tree when planted as an unbranched whip
Top View

Top View

A. At planting: As the buds
begin to swell, head the
tree at 30 to 34 inches
above the soil surface.

B. First-year summer pruning: Summer prune when new growth is 3 to 4
inches long. Leave a as the new leader,
and remove b and c. Select four to five
uniformly spaced laterals for the first
scaffold whirl, and remove the remaining
lateral branches.

Steps in Pruning
•	 Leave only one trunk for the central leader.
•	 Remove branches with crotch angles of less
than 60 degrees.
•	 Remove all branches directly across from
one another on the leader.
•	 Space lateral branches uniformly around
the leader to prevent crowding as the limbs
grow in diameter.

C. Dormant pruning: One year after
planting a whip or at planting, for a
well-branched tree, head the tree at
24 to 30 inches above the highest
branch of the first scaffold whorl.

D. After pruning the third year: Three scaffold whorls have
been developed with three to four branches uniformly spaced
around the tree in each whorl. A light slot of 18 to 24 inches
is left between each scaffold whorl. Note the Christmas-tree
shape that allows light penetration to the lower branches and
interior of the tree.

•	Mature trees
	 Mature trees that have been properly trained and
summer pruned will require minimal pruning. The
first step would be to remove dead, diseased, and
damaged wood and then upright shoots and shoots
below horizontal. To prevent shading, it is important
to maintain the Christmas-tree shape by heading lateral branches with “mold and hold” cuts. See Figures 7
and 8. For quality fruit production, it is also essential
that the light slots between the scaffold whorls be
maintained.
			 Mature fruit trees that have not been properly
trained frequently do not have a true central-leader
shape. For those trees, the objectives of training and
pruning as discussed earlier must be considered. In
many cases, too many lateral branches and upright
limbs (some may be 4 or more inches in diameter)
have been left and need to be removed to allow proper light penetration. This pruning needs to be accomplished during the dormant season.
			 Neglected trees often have overgrown tops that act
as an umbrella, shading the rest of the tree. The tops
of these trees need to be cut back or removed. Remember, if the principles of pruning are followed, there are
no perfect cuts and no incorrect cuts. However, do not
remove more than 30 percent of the tree to avoid shifting the tree into an excessively vegetative state with
little fruit development.

Figure 9. An apple tree trained to a multi-leader system.
This would be an ideal training system for pear trees in
North Carolina where fire blight is a threat.

The multi-leader tree uses the same concept as the
central-leader tree except there are several leaders in the
center of the tree. Each leader is maintained the same
as an individual central-leader tree. There is only one
difference in training a multi-leader from the central
leader. In the first and second year, instead of removing
the competing leaders, several should be left and maintained. For example, on the tree in Figure 1, it would be
necessary to leave shoots a, b, and c for a multi-leader
tree. However, it would be necessary to put spreaders
between the selected leaders to get the shape of the tree
in Figure 9.

•	Pecan tree considerations
	 In North Carolina, pecan trees should be trained to a
central leader. The potential for tropical storms and
hurricanes in September and October is high, and a
central-leader tree has a greater probability of surviving with minimal damage. The lateral branches, however, should be spiraled up the leader. Approximately
12 to 15 inches should be left between branches for adequate light penetration initially. As the tree matures, it
will be necessary to remove branches to prevent crowding and allow light penetration. See Figure 8B.

High-Density Central-Leader Training
In the apple industry, trees are now grown and sold
on size-controlling or dwarfing rootstocks. Many different rootstocks are available with varying degrees of
size control. Historically, apple trees were very large
trees that required a significant amount of work using ladders. These large trees took many years to reach
maximum production. With size-controlling rootstocks,
most or all of the maintenance can be completed from
the ground or with short ladders. And the trees begin
producing fruit much sooner after planting. Because

Multi-Leader Training
A multi-leader tree is a modification of the traditional
central-leader tree and an option for pear varieties that
are susceptible to fire blight. With a multi-leader tree, if
one leader is infected with fire blight, it may be removed
without loss of the major portion of the tree. See Figure 9.

many more trees are planted per acre in commercial
orchards, the term used to describe these orchards is
high density. The increased use of dwarfing rootstock
and the need to maximize fruit production have led to
a shift in the training and pruning of the smaller trees.
High-density trees are trained and pruned differently,
but basically they are modified central-leader trees with
branches continually along the central leader to the top
of the tree. Light penetration is not a problem as the
maximum height of the tree is limited to approximately
8 to 12 feet, with a canopy spread of 3 to 4 feet outward
from the leader.
There are many other types of high-density training
systems, some with elaborate trellis systems. A slender
spindle-type tree is the most popular high-density training system. High-density training systems are covered
in more detail in High Density Apple Orchard Management
(AG-581).
Table 1 illustrates four major high-density training systems, including the central leader, vertical axis,
hybrid tree cone (HYTEC), and the slender spindle.
The diagram of each tree type is accompanied by the
characteristics of each training system and its maintenance. Note that each tree has a central leader and all
the training systems involve modifications of the central
leader. The major differences among the systems are

tree height, density (spacing), and the way the leader is
managed. Many trellis systems using high-tensile wire
and posts are also used as well.
None of these high-density training systems leads to
a significant difference in productivity in the first three
years unless the trees are pruned heavily. Early heavy
pruning will reduce production. Light interception,
which depends on tree density (trees per acre), is the
factor that affects early production. The training system
is a greater factor later in the orchard’s life when training can affect light distribution within the tree canopy.
Allowing branches to remain in the top of the tree will
shade lower branches and reduce light interception.
This shading results from a lack of limb removal, improper limb placement or orientation, or all of these
together. The ratio of the tree height to the distance between tree rows also affects light interception. In general, tree height should be no more than twice the distance
between rows of trees to maximize light interception.
For the Southeast, no specific training system is recommended. Rather, the best approach is to develop a tree
that has specific characteristics. The characteristics of the
recommended tree type in the Southeast are those of a

not have continuous branching along the leader, which is
required for a productive and profitable tree. These trees
have lower branches, an area of 2 to 4 feet of unbranched
or “blind” leader growth, and branches at the top of the
tree. Therefore, the leader must be manipulated in some

All lateral branches with wide crotch angles should
be maintained for the first three to five years to maximize
early fruit production. A lower whorl of scaffolds should
be identified as permanent, and others should be removed as shading becomes a problem. There may also be
a second semipermanent whorl approximately 12 inches
above the first that should also be identified and removed if shading becomes a problem. Permanent whorls
are maintained in the lower portion of the tree because
there are concerns about a lack of vigor and light in that
area of the tree for re-growing lateral branches. The permanent whorls should be spread out to approximately 85
degrees from vertical to encourage lateral branching and
floral initiation. Above the second whorl of scaffolds, all
branches should be renewed every three to four years.
These lateral branches will be cropped for several years.
As the diameter of the lateral approaches 50 percent
of the leader’s diameter, the lateral is removed by a cut at
a downward angle, referred to as a Dutch cut (Figure 10).
This cut allows latent buds on the bottom of the stub to
grow, giving rise to lateral limbs with wide crotch angles.
It is also imperative to maintain the conical shape of the
tree to allow optimal light distribution within the canopy.
In the first three to four years, however, minimal pruning should be done and tree-training techniques, such
as bending and spreading branches during the growing
season, should be maximized.

Figure 11. Leader branching by bagging

•	Leader management techniques to encourage branching
	 Bagging (Figure 11) is done by placing a polyethylene
(plastic) sleeve (usually 3 mil)) over the previous year’s
unbranched growth. Bagging is effective on 30 to 32
inches of leader, thus longer leaders should be cut off
to 32 inches. Bags should be applied 4 to 6 weeks before anticipated bud break (early- to mid-February).
The ends of the poly sleeve must be closed tightly
with clothespins, tape, or ties that can be removed easily. The sleeves must remain closed and in place until
new lateral growth is 1 to 2 inches long (usually about
bloom time). Immediately upon bag removal, apply a
foliar application of 250 ppm of Promalin (1 pint per 10
gallons of water plus surfactant) and an anti-desiccant
to the previously bagged portion.
		 Snaking (Figure 12) is done during the growing
season by bending each 18-inch section of new leader
growth to a 45-degree angle and securing it to the
tree’s support system. Each successive bend is done in
the opposite direction to form a zig-zag leader shape.
The 45-degree angle is held by tying or taping the new
growth to the support system. This technique reduces
leader extension and results in lateral branches that
grow in the current season and some branches that
grow the following spring. Make sure laterals that
develop right at the bend don’t get too vigorous and
compete with the leader. This technique is useful with
very vigorous leader growth where some devigoration is appropriate and you want to try and use the
extended leader growth rather than cut it off (as with
weak-leader renewal).
		 Weak-leader renewal (Figure 13) is used where leader
growth is excessive with minimal lateral branching.
To balance tree vigor, cut the leader off to a weaker
(but still vigorous) lateral that can be encouraged to
branch. Tie the lateral to the support post to form a
new leader and encourage lateral branching on the
new leader. Do this in the dormant season.
		 Spot treatment of blank areas with notching (Figure 14)
is a remedial technique that can be used on trees with
blind wood. Use a hacksaw blade (1/ - to 1/8-inch wide)

Each notch should extend approximately one-third

through the bark (phloem) and not the structural
wood beneath the bark. Approximately 50 to 60 percent of the notched buds should grow to avoid having
to head the tree and eliminate the higher branches,
which would reduce early fruit production. Because
this procedure is time consuming, use it only to fill
in unbranched areas. To minimize the potential for fire
blight, avoid days with rainfall or high humidity.
•	Lateral branch management
	 When new laterals are 3 to 6 inches long, spread them
out horizontally or nearly horizontal with a clothespin
or toothpick.

Open-Center or Vase Training — Peach,
Nectarine, Plum
With the open-center system, the leader is removed,
leaving a “vase-shaped” tree with upright growth removed from the center. Instead of having a central leader, the open-center tree has three to five major limbs,
called scaffolds, coming out from the trunk. This training system allows for adequate light penetration into
the tree, which minimizes the shading problem prevalent in higher-vigor trees, such as peach trees.

At planting

Peach trees should be planted so that the graft union
will be 2 inches above the soil surface after the soil has
settled from planting. As the buds begin to swell, the
unbranched trees (whips) are generally headed. The
work that needs to be done under the tree determines
the appropriate height for branching, which is usually
24 to 32 inches. As discussed with the central-leader system, new branches will come primarily from the buds
that are 4 to 12 inches below the heading cut.

Summer pruning

Trees that are branched at planting are handled differently than the whips. Remove branches that are too
low. If there are three or four uniformly spaced branches
around the tree that can be selected as scaffolds, the tree
is headed just above the highest selected scaffold. Any
remaining branches not selected as scaffolds should be
removed. See Figure 15, page 13. However, if there are
less than three scaffolds, the tree should be cut back to
a whip and the side branches removed, leaving a short
stub for axillary buds to grow the following spring. See
Figures 15A and 15B.

After the new vegetative growth is approximately 3
to 4 inches long, it is time to select the branches that
will become the major scaffolds. The lowest scaffold
should be 24 to 32 inches above the soil surface to avoid
interfering with cultural work under the tree, such as
harvesting and weed control. It is best to select three to
four scaffolds that are uniformly spaced around the tree,
with wide branch angles, and not directly across from
another scaffold. See Figure 15.

During the summer, branches should be selected that
are growing outward at a 45- to 60-degree angle. All
other vigorous upright growth in the center of the tree
can be removed to minimize shading the primary scaffolds and lateral branches.

By the fourth year, the basic framework of the tree
should be completed. Prune moderately to eliminate
damaged, dead, and diseased wood, such as cankers.
Shriveled and dried fruit from the previous season, called
“mummies,” should also be removed from the orchard to
reduce disease pressure for the coming season.
Peach trees will suffer from reduced yields if pruned
too severely. Also, remember that moderately pruned
trees bear sooner than heavily pruned trees. However,
allowing trees to bear excessive crop loads before establishing the tree’s framework can stunt the tree as well as
destroy its shape. Bench cuts should be avoided. See Figure 16, page 14.
	 During summer pruning, undesirable upright
shoot growth can be removed as soon as it is 4 to 6 inches
long. Summer pruning can also be used to direct scaffold
growth outward to the desired growing points instead of
waiting until the dormant season.

Succeeding years
After the first year of growth, the primary scaffolds
should be selected and properly trained outward. Scaffolds should be headed during the dormant season of
the first two years to promote continued lateral branching and to stiffen and strengthen the scaffolds. Heading
scaffolds to outward-growing shoots similar in angle to
those being removed is recommended.
During the dormant season of the third year, the primary scaffolds can be pruned so that two (forked) secondary scaffolds arise from each primary approximately
3 feet from the trunk. These secondary scaffolds should
be pruned to outward- and upward-growing laterals if
needed to maintain the tree’s open-center system.
On each secondary scaffold, approximately 3 feet
from the first split, another split may be required to form
tertiary scaffolds. Lateral branching from all the scaffolds is to be encouraged for fruit production. One of the
problems with peach trees is that lateral branching from
the scaffolds closer to the trunk is eliminated because of
excessive shading. This shading can result in lateral fruiting wood only on the ends of the scaffolds, which results
in broken scaffolds under a heavy fruit load. It is best to
keep the fruiting wood on the scaffolds as close to the
tree trunk as possible to reduce tree breakage and to produce the highest quality fruit. This problem can be eliminated with summer pruning. During the dormant season,
all vigorous upright shoots not removed during summer
pruning should be removed along with the shoots growing downward.
