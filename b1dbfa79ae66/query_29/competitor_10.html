</span><article class="et_pb_post post-14479 post type-post status-publish format-standard has-post-thumbnail hentry category-apple category-fruit-tree category-pruning-fruit-trees tag-fruittree tag-pruning tag-grow_great_fruit" data-dcnode-id="702" id="post-14479"><span data-dcnode-id="1736" instrument_node="">
</span><div class="et_post_meta_wrapper" data-dcnode-id="1717"><span data-dcnode-id="1735" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Pruning Fruit Trees</span></h1><span data-dcnode-id="1732" instrument_node="">
</span><p class="post-meta" data-dcnode-id="1720"><span data-dcnode-id="1731" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1728"><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//growgreatfruit.com/author/katie/" rel="author" title="Posts by Katie"><span data-dcnode-id="1730" instrument_node="">Katie</span></a></span><span data-dcnode-id="1727" instrument_node=""> | </span><span class="published" data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">Mar 24, 2022</span></span><span data-dcnode-id="1724" instrument_node=""> | </span><span class="comments-number" data-dcnode-id="1721"><a data-dcnode-id="1722" href="#respond"><span data-dcnode-id="1723" instrument_node="">17 comments</span></a></span></p><img alt="" class="" data-dcnode-id="1719" height="675" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1080px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//growgreatfruit.com/wp-content/uploads/2021/01/Katie-pruning-plum-tree-smiling-cropped-1000x727-1-1000x675.jpg&amp;raw" srcset="https://growgreatfruit.com/wp-content/uploads/2021/01/Katie-pruning-plum-tree-smiling-cropped-1000x727-1-1000x675.jpg 1080w, https://growgreatfruit.com/wp-content/uploads/2021/01/Katie-pruning-plum-tree-smiling-cropped-1000x727-1-980x712.jpg 980w, https://growgreatfruit.com/wp-content/uploads/2021/01/Katie-pruning-plum-tree-smiling-cropped-1000x727-1-480x349.jpg 480w" width="1080"><span data-dcnode-id="1718" instrument_node="">
</span></div><span data-dcnode-id="1716" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1426"><span data-dcnode-id="1715" instrument_node="">
</span><figure class="wp-block-pullquote" data-dcnode-id="1711"><blockquote data-dcnode-id="1712"><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Use our foolproof 7-step Pruning Method</span></p></blockquote></figure><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1709"></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1707" instrument_node="">Are you confused about </span><strong data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">pruning your fruit trees</span></strong><span data-dcnode-id="1704" instrument_node="">?</span></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">You’re not alone. It’s one of the biggest worries for home fruit growers. Many are not sure when to prune, how to prune, or even which trees they should prune.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">How would you feel to learn that there’s no such thing as “right” or “wrong” when it comes to pruning, just cuts and consequences?</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Relieved, right?</span></p><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">When it comes to teaching people how to prune, that’s our approach. We find it instantly removes a lot of the stress about having to get pruning “right”, and replaces it with a curiosity about how a fruit tree responds when you prune in particular ways.  And that’s a great starting point for learning how to prune.</span></p><span data-dcnode-id="1690" instrument_node="">
</span><div class="wp-container-1 wp-block-group" data-dcnode-id="1430"><div class="wp-block-group__inner-container" data-dcnode-id="1431"><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1688"></p><span data-dcnode-id="1687" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1680"><img alt="Using principles instead of rules makes pruning fruit trees much easier. Photo credit: Janet Barker" class="wp-image-14506" data-dcnode-id="1686" height="563" loading="lazy" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 850px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//growgreatfruit.com/wp-content/uploads/2021/01/newstead-community-garden-pruning-workshop-photo-credit-Janet-Barker-3-1.jpg&amp;raw" srcset="https://growgreatfruit.com/wp-content/uploads/2021/01/newstead-community-garden-pruning-workshop-photo-credit-Janet-Barker-3-1.jpg 850w, https://growgreatfruit.com/wp-content/uploads/2021/01/newstead-community-garden-pruning-workshop-photo-credit-Janet-Barker-3-1-480x318.jpg 480w" width="850"><figcaption data-dcnode-id="1681"><em data-dcnode-id="1682"><em data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Using principles instead of rules makes pruning fruit trees much easier</span></em><span data-dcnode-id="1683" instrument_node="">. Photo credit: Janet Barker</span></em></figcaption></figure><span data-dcnode-id="1679" instrument_node="">
</span><h2 data-dcnode-id="1677" id="h-why-should-you-prune-your-fruit-trees" style="font-size:22px"><span data-dcnode-id="1678" instrument_node="">Why should you prune your fruit trees?</span></h2><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1673"><br data-dcnode-id="1675"><span data-dcnode-id="1674" instrument_node="">Pruning is not actually needed for a tree to bear fruit. In fact, the fastest way to get a new tree to bear fruit is not to prune it at all. </span></p><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">But while it’s tempting to get fruit from your trees as quickly as possible, not pruning is a bad idea for lots of reasons.</span></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">The first and most important reason to prune your trees is to establish a strong framework for the tree. This is particularly important for the first three or so years after you plant a fruit tree, and it’s a specialised area of pruning called “establishment pruning”. </span></p><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">From a practical point of view, pruning keeps the tree at the right height and shape for its location. You can also make sure the fruit will form on branches that you can actually reach. This makes thinning and picking much easier.</span></p><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Overall, pruning improves the quality of your fruit.</span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1659" instrument_node="">We also recommend learning more about the different parts of your fruit tree </span><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//growgreatfruit.com/winter-pruning-fruit-trees/"><span data-dcnode-id="1658" instrument_node="">here</span></a><span data-dcnode-id="1656" instrument_node=""> and learning how to tell the difference between fruit buds and leaf buds </span><a data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//growgreatfruit.com/how-to-tell-the-difference-between-fruit-buds-and-leaf-buds/"><span data-dcnode-id="1655" instrument_node="">here</span></a><span data-dcnode-id="1653" instrument_node="">.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1650" instrument_node="">It’s also a good idea to invest in a good pair of secateurs, like </span><a data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felco.com/au_en/felco-7.html"><span data-dcnode-id="1649" instrument_node="">these ones</span></a><span data-dcnode-id="1647" instrument_node=""> (and no, we don’t get a kickback, we just like these secateurs. They also come in a left-handed version.)</span></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1644"></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1642"></p><span data-dcnode-id="1641" instrument_node="">
</span><h2 data-dcnode-id="1639" id="h-how-pruning-fruit-trees-can-help-keep-them-healthy" style="font-size:22px"><span data-dcnode-id="1640" instrument_node="">How pruning fruit trees can help keep them healthy</span></h2><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1635"><br data-dcnode-id="1637"><span data-dcnode-id="1636" instrument_node="">The first principle of pruning is to remove all the dead and diseased wood. This is one of the key hygiene practices that you should be following all the time with your fruit trees. </span></p><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Removing the diseased wood helps to reduce the load of pathogens in the tree that will reinfect it the following year.</span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">It’s also important to correctly dispose of any diseased wood that you remove from the tree. </span></p><span data-dcnode-id="1628" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1627" instrument_node="">Prunings are a resource, and full of organic matter and nutrients. Ideally, they should be returned to the soil. But if the wood is diseased it’s really important to “clean” it somehow first, rather than just leaving them lying on the ground under your fruit tree. </span><a data-dcnode-id="1625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//growgreatfruit.com/what-to-do-with-prunings/"><span data-dcnode-id="1626" instrument_node="">This blog</span></a><span data-dcnode-id="1624" instrument_node=""> covers 3 different ways of managing your prunings. </span></p><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Pruning helps improve air circulation in the tree, and that helps to prevent disease. It allows more sun to get into the tree, which keeps it healthy and more fruitful.</span></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1618"></p><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1616"></p><span data-dcnode-id="1615" instrument_node="">
</span><h2 data-dcnode-id="1613" id="h-are-there-reasons-not-to-prune-your-fruit-tree" style="font-size:22px"><span data-dcnode-id="1614" instrument_node="">Are there reasons not to prune your fruit tree?</span></h2><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1609"><br data-dcnode-id="1611"><span data-dcnode-id="1610" instrument_node="">As we already mentioned, pruning your tree can delay fruiting in your tree. It can also reduce the yield of fruit, and create smaller trees.</span></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">These are often cited as reasons not to prune, but we actually think they’re all good things!</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Harvesting a smaller crop of fruit that’s better quality is by far preferable to harvesting a large crop of small, poor quality fruit, or trying to harvest fruit from the top of a massive tree. And it’s much better for your tree.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1601"></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1599"></p><span data-dcnode-id="1598" instrument_node="">
</span><h2 data-dcnode-id="1596" id="h-how-do-trees-respond-to-pruning" style="font-size:22px"><span data-dcnode-id="1597" instrument_node="">How do trees respond to pruning?</span></h2><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1592"><br data-dcnode-id="1594"><span data-dcnode-id="1593" instrument_node="">Fruit trees are always in balance between the parts of the tree that are below the ground (i.e., the roots) and the parts of the tree above the ground (the trunk, branches etc.). </span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Pruning changes that balance. The tree responds by growing more shoots, until the balance is re-established. </span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Usually, the regrowth is stimulated near where the cuts were made. The more pruning cuts you make and the more wood you remove from the tree, the more you stimulate a more generalised response, where growth is stimulated across the whole tree. </span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Basically, more pruning = more regrowth.</span></p><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1581"></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1579"></p><span data-dcnode-id="1578" instrument_node="">
</span><h2 data-dcnode-id="1576" id="h-understanding-the-principles-behind-pruning-fruit-trees" style="font-size:22px"><span data-dcnode-id="1577" instrument_node="">Understanding the principles behind pruning fruit trees</span></h2><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1572"><br data-dcnode-id="1574"><span data-dcnode-id="1573" instrument_node="">Here at Grow Great Fruit HQ, we steer clear of pruning “rules”. Here’s just some we’ve heard over the years:</span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1568"><em data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">“always remove 1/3 of the branch”</span></em></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1564"><em data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">“don’t prune in summer”</span></em></p><span data-dcnode-id="1563" instrument_node="">
</span><p data-dcnode-id="1560"><em data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">“prune after fruiting”</span></em></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1556"><em data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">“remove all side-shoots that are bigger than 1/3 the diameter of the main branch”</span></em></p><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1552"><em data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">“remove all shoots that are growing into the middle of the tree”</span></em></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Confused, much?</span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1547" instrument_node="">The truth is that some of these “rules” apply to some trees, some of the time. (We would </span><strong data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">never </span></strong><span data-dcnode-id="1544" instrument_node="">suggest removing all the shoots that grow into the middle of the tree, and have seen many trees damaged as a result of this practice.)</span></p><span data-dcnode-id="1542" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1536"><figure class="aligncenter size-large" data-dcnode-id="1537"><img alt="A dwarf peach tree is very different to an enormous plum tree - but the principles are the same no matter what type of fruit tree you're pruning" class="wp-image-14505" data-dcnode-id="1541" height="818" loading="lazy" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 603px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//growgreatfruit.com/wp-content/uploads/2021/01/Katie-Bozena-prune-dwarf-peach-tree-1.jpg&amp;raw" srcset="https://growgreatfruit.com/wp-content/uploads/2021/01/Katie-Bozena-prune-dwarf-peach-tree-1.jpg 603w, https://growgreatfruit.com/wp-content/uploads/2021/01/Katie-Bozena-prune-dwarf-peach-tree-1-480x651.jpg 480w" width="603"><figcaption data-dcnode-id="1538"><em data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">A dwarf peach tree is very different to an enormous plum tree – but the principles are the same no matter what type of fruit tree you’re pruning</span></em></figcaption></figure></div><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Fruit trees are all different, so we think it’s much safer and more effective to learn the principles behind pruning. Then you can apply these same principles to pretty much all fruit trees, all the time. </span></p><span data-dcnode-id="1532" instrument_node="">
</span><ul data-dcnode-id="1511"><li data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Remove dead and diseased wood</span></li><li data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Prune as little as possible to maintain the right shape</span></li><li data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Prune in winter to encourage growth</span></li><li data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Trim your trees in summer to slow growth</span></li><li data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Heading cuts create branching</span></li><li data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Sap flows most strongly to the highest part of the tree</span></li><li data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Horizontal wood produces more fruit than vertical wood</span></li><li data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Encourage fruit to grow close to the trunk and main limbs</span></li><li data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Prune young trees when you plant them</span></li><li data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Remove suckers when pruning</span></li></ul><span data-dcnode-id="1510" instrument_node="">
</span><h2 data-dcnode-id="1507" id="h-the-difference-between-heading-cuts-and-thinning-cuts"><br data-dcnode-id="1509"><span data-dcnode-id="1508" instrument_node="">The difference between heading cuts and thinning cuts</span></h2><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1503"><br data-dcnode-id="1505"><span data-dcnode-id="1504" instrument_node="">Heading cuts are any cuts that remove the end of a shoot or limb. The bud on the tip of any shoot is called the “apical” bud, and a heading cut removes this bud.</span></p><span data-dcnode-id="1502" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1497"><img alt="This heading cut is likely to stimulate the two or three buds directly below the cut to grow into new branches" class="wp-image-14511" data-dcnode-id="1501" height="666" loading="lazy" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1000px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//growgreatfruit.com/wp-content/uploads/2021/01/pruning-2-1-1000x666-1.jpg&amp;raw" srcset="https://growgreatfruit.com/wp-content/uploads/2021/01/pruning-2-1-1000x666-1.jpg 1000w, https://growgreatfruit.com/wp-content/uploads/2021/01/pruning-2-1-1000x666-1-980x653.jpg 980w, https://growgreatfruit.com/wp-content/uploads/2021/01/pruning-2-1-1000x666-1-480x320.jpg 480w" width="1000"><figcaption data-dcnode-id="1498"><em data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">This heading cut is likely to stimulate the two or three buds directly below the cut to grow into new branches</span></em></figcaption></figure><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">The job of the apical bud is to prevent the buds below it from growing into shoots.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">As soon as you understand that, it’s pretty obvious what will happen next if you make a heading cut that removes this bud.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Yep, you’ll create branching.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">That’s not good or bad, it’s just the likely consequence of this type of cut. </span></p><span data-dcnode-id="1484" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1478"><img alt="Shortening a lateral with a thinning cut. Note the shoot left behind on the tree with apical bud intact." class="wp-image-14508" data-dcnode-id="1483" height="666" loading="lazy" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) and (max-width: 980px) 980px, (min-width: 981px) 1000px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//growgreatfruit.com/wp-content/uploads/2021/01/shorten-lateral-after-1-1000x666-1.jpg&amp;raw" srcset="https://growgreatfruit.com/wp-content/uploads/2021/01/shorten-lateral-after-1-1000x666-1.jpg 1000w, https://growgreatfruit.com/wp-content/uploads/2021/01/shorten-lateral-after-1-1000x666-1-980x653.jpg 980w, https://growgreatfruit.com/wp-content/uploads/2021/01/shorten-lateral-after-1-1000x666-1-480x320.jpg 480w" width="1000"><figcaption data-dcnode-id="1479"><em data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Shortening a lateral with a thinning cut. Note the shoot left behind on the tree with apical bud intact</span></em><span data-dcnode-id="1480" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">There are a couple of different types of thinning cuts. They can be used to remove entire shoots or branches, or to cut back to a lateral shoot or spur. The point is to leave the apical bud intact at the end of the branch or shoot that you’re working on.</span></p><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">As you can immediately tell, thinning cuts are much calmer. It’s a great technique for removing wood from your fruit tree without stimulating lots of new growth.</span></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">This is powerful knowledge! Now you know how to create more branching in your fruit tree, and also how to prevent creating branching where you don’t want it.</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1467"></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1465"></p><span data-dcnode-id="1464" instrument_node="">
</span><h2 data-dcnode-id="1462" id="h-the-grow-great-fruit-foolproof-7-step-pruning-method"><span data-dcnode-id="1463" instrument_node="">The Grow Great Fruit foolproof 7-step pruning method</span></h2><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1458"><br data-dcnode-id="1460"><span data-dcnode-id="1459" instrument_node="">Now, we can bring all the information together into this very simple 7-step method. </span></p><span data-dcnode-id="1457" instrument_node="">
</span><ol data-dcnode-id="1439"><li data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Remove dead or diseased wood.</span></li><li data-dcnode-id="1450"><span data-dcnode-id="1454" instrument_node="">Look at the tree and imagine what shape you want it to be – if you’re not sure, the “vase” shape suits most backyards. There’s more information about different tree shapes including espalier in our </span><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//growgreatfruit.com/product/pruning-by-numbers/"><span data-dcnode-id="1453" instrument_node="">Pruning by Numbers ebook</span></a><span data-dcnode-id="1451" instrument_node="">.</span></li><li data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Identify the permanent limbs. Do any major limbs or branches need removing? If you’re not sure, leave them for now. The first time you prune your tree it may be difficult to identify the permanent limbs, but the more you apply this method year after year, the more obvious it becomes.</span></li><li data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Choose the easiest looking limb. Starting at the top of the limb, define and cut the leader to the right height. Use a thinning cut so you don’t create branching in the top of your tree. Aim to keep the top of your branches quite simple.</span></li><li data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Work your way very methodically down the limb. At each lateral (side shoot) growing from the branch, stop and make a decision about what to do with it. There are only three choices! Either leave it alone, shorten it, or remove it. Don’t remove a lateral if there are no others growing nearby, as this creates bare patches with no fruiting wood on the limb. (PRO TIP: don’t do the same thing to each lateral.)</span></li><li data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">Do the next limb, and methodically work your way around the tree.</span></li><li data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">To finish, remove any suckers that are growing from below the graft union.</span></li></ol><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">And that’s it! If it sounds simple, that’s because it is. While you’re learning, it can be really helpful to take lots of photos of your tree. Take ‘before’ and ‘after’ shot, but more importantly, take photos of the same tree in spring and summer after you’ve pruned.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">That’s where you really get to see the consequences of your cuts. And that’s where the gold is.</span></p><span data-dcnode-id="1432" instrument_node="">
</span></div></div><span data-dcnode-id="1429" instrument_node="">
</span><span class="et_bloom_bottom_trigger" data-dcnode-id="1428"></span><span data-dcnode-id="1427" instrument_node=""> </span></div><span data-dcnode-id="1425" instrument_node="">

</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Hi Marg, pruning in late summer will help to reduce the growth response in the tree, so helps to keep the trees smaller. But, it’s much harder to see the structure of the trees in summer when they’re covered in leaves. Dwarf trees are fairly easy to keep small anyway because they’re on a dwarf rootstock. So for the first few years at least, while you’re getting familiar with your trees and learning how to prune them we’d recommend pruning in winter when you can easily see what you’re doing. If you need help with any specific trees take a photo of them and post it on the Members Forum, and we can help you decide how to prune it.</span></p><span data-dcnode-id="1137" instrument_node="">

</span><p data-dcnode-id="869"><span data-dcnode-id="878" instrument_node="">Hello Jen,</span><br data-dcnode-id="877"><span data-dcnode-id="876" instrument_node="">
Depending on the scale of your orchard, the size of your trees and your budget there are a few options.</span><br data-dcnode-id="875"><span data-dcnode-id="874" instrument_node="">
Felco has a moderately priced folding pruning saw that is great for the home orchard.</span><br data-dcnode-id="873"><span data-dcnode-id="872" instrument_node="">
Next price bracket is Opinel – they have a really lovely, light, nimble folding saw on the market and they are great quality steel blades.</span><br data-dcnode-id="871"><span data-dcnode-id="870" instrument_node="">
Another brand to look out for is ‘Silky’ – they are a very well regarded Japanese saw brand on the pricier side, and have lots of different sizes (from pocket sized up to long handled). Beloved by arborists, the quality of the blades is amazingly good and many of them have replaceable parts. Some of the smaller Silky options are great for camping too! I have a small folding silky that is sooo lovely to use and well made and I definitely recommend them.</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Either way, it’s worth spending for a good quality blade that will last a lot longer and be easier to keep sharp. Plus, we always prefer tools with replaceable/maintainable parts as you can often go on using them for years. Happy to talk pruning anytime :), good luck, Meg – Grow Great Fruit team.</span></p><span data-dcnode-id="865" instrument_node="">
