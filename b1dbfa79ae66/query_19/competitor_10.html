</span><div class="post-ftimg-hld" data-dcnode-id="2058"><span data-dcnode-id="2061" instrument_node="">
</span><img alt="How to Garden in Clay Soil" data-dcnode-id="2060" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.australianplantsonline.com.au/media/Plazathemes/blog/images/5/7/570_apo_clay.jpg&amp;raw"><span data-dcnode-id="2059" instrument_node="">

</span><div class="post-text-hld" data-dcnode-id="1949"><span data-dcnode-id="2056" instrument_node="">
</span><h2 data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Planting in clay soil</span></h2><span data-dcnode-id="2053" instrument_node="">
</span><p data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">We're often asked how to manage clay soil and which plants work best, so we've put together a handy guide to improving your clay soil. Plants struggle to thrive in clay soil due to the density of its fine particles - roots have to work extra hard to establish themselves. When plants do thrive, they find that clay is often an excellent growing medium.</span></p><span data-dcnode-id="2050" instrument_node="">
</span><p data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2047" instrument_node="">
</span><img alt="clay soil" data-dcnode-id="2046" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.australianplantsonline.com.au/media/wysiwyg/clay-soil.jpg&amp;raw" style="border: 0pt none; float: left; padding-right: 35px; padding-bottom: 10px;" title="clay soil"><span data-dcnode-id="2045" instrument_node="">
</span><h3 data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">How to tell if your soil is clay</span></h3><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2041" instrument_node="">Grab a handful and squeeze it. </span><br data-dcnode-id="2040"><span data-dcnode-id="2039" instrument_node="">Wet clay soil is quite sticky and pliable, it takes a long time to dry out, and forms lumps. </span><br data-dcnode-id="2038"><span data-dcnode-id="2037" instrument_node="">Dry clay soil is almost rock hard and impossible to get a shovel into, except in the large cracks that often appear. </span><br data-dcnode-id="2036"><br data-dcnode-id="2035"><span data-dcnode-id="2034" instrument_node="">The plus side to clay soil is that it's loaded with nutrients! Improve the soil structure, choose plants suited to clay soil, and watch your garden thrive.</span></p><span data-dcnode-id="2032" instrument_node="">
</span><p data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2029" instrument_node="">
</span><h3 data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">Ways to improve the quality of clay soil</span></h3><span data-dcnode-id="2026" instrument_node="">
</span><ul data-dcnode-id="2012" style="list-style-type:circle;"><span data-dcnode-id="2025" instrument_node="">
</span><li data-dcnode-id="2020"><span data-dcnode-id="2024" instrument_node="">The simplest and most effective method is to </span><b data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">dig organic matter</span></b><span data-dcnode-id="2021" instrument_node=""> through the soil - generous amounts of it. It binds to the soil, improving drainage while retaining moisture during dry spells. Lots of organic matter – such as spent mushroom compost, well-rotted farmyard manure, homemade compost – will add nutrients to the soil and help open up the texture. 
</span></li><li data-dcnode-id="2014"><span data-dcnode-id="2019" instrument_node="">Grow an annual ‘</span><b data-dcnode-id="2016"><a data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.australianplantsonline.com.au/green-manure.html"><span data-dcnode-id="2018" instrument_node="">green manure</span></a></b><span data-dcnode-id="2015" instrument_node="">’ crop - such as clover, alfalfa, millet or lupin - and dig it into the soil at the end of the growing season. If your soil is too hard to plant green manure, try planting potatoes which will help break up the soil as they grow, and as you harvest them. </span></li><span data-dcnode-id="2013" instrument_node="">
</span></ul><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2008" instrument_node="">
</span><img alt="gypsum" data-dcnode-id="2007" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.australianplantsonline.com.au/media/wysiwyg/eco-flo-gypsum.jpg&amp;raw" style="border: 0pt none; float: left; padding-right: 35px; padding-bottom: 10px;" title="gypsum"><span data-dcnode-id="2006" instrument_node="">
</span><ul data-dcnode-id="1991" style="list-style-type:circle;"><li data-dcnode-id="1999"><span data-dcnode-id="2005" instrument_node="">Adding natural powdered </span><b data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">Gypsum</span></b><span data-dcnode-id="2002" instrument_node=""> to the soil changes its structure, and the soil becomes fine and crumbly. We recommend adding organic matter first, to improve its effectiveness.</span><p data-dcnode-id="2001"></p><span data-dcnode-id="2000" instrument_node="">
</span></li><li data-dcnode-id="1992"><span data-dcnode-id="1998" instrument_node="">Another great clay-breaker is&nbsp;</span><a data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.australianplantsonline.com.au/eco-flo-gypsum-500.html"><span data-dcnode-id="1997" instrument_node="">eco-flow gypsum</span></a><span data-dcnode-id="1995" instrument_node="">. Available in an easy hose-on application that includes a boost of eco-seaweed; as the product is liquid it's more readily available to plant roots than the dry powdered form. Again, the addition of organic matter will help to get the most out of this product.</span><p data-dcnode-id="1994"></p><span data-dcnode-id="1993" instrument_node="">
</span></li></ul><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1984" instrument_node="">
</span><h3 data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">Top Tips for Planting in Clay Soil</span></h3><span data-dcnode-id="1981" instrument_node="">
</span><ul data-dcnode-id="1961" style="list-style-type: circle; padding-left: 30px;"><span data-dcnode-id="1980" instrument_node="">
</span><li data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">Avoid planting when the soil is excessively wet or dry. Compacting the soil when it is wet makes the problem worse, so try not to walk on it! Laying a wide plank board across the garden bed to kneel on can help with this.</span></li><span data-dcnode-id="1977" instrument_node="">
</span><li data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Dig a hole that is at least three times the size of the root ball of the plant. Break up the sides and base of the hole – stab them with a garden fork or the corner of the spade – so they are rough.</span></li><span data-dcnode-id="1974" instrument_node="">
</span><li data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Add generous amounts of gravel or sharp sand to the bottom of the hole. . Add well-composted organic matter and turn these together with a garden fork</span></li><span data-dcnode-id="1971" instrument_node="">
</span><li data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Plant your shrub or perennial into the centre of a small hill or mound. That way any rainfall or irrigation water will drain away from the plant but towards to tips of the roots. Place the plant in the centre and back fill, taking care not to plant too deeply</span></li><span data-dcnode-id="1968" instrument_node="">
</span><li data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">Check regularly and water as required until the plant is established, usually around 12 weeks</span></li><span data-dcnode-id="1965" instrument_node="">
</span><li data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Apply a good layer of mulch during the dry season to help retain moisture</span></li><span data-dcnode-id="1962" instrument_node="">
</span></ul><br data-dcnode-id="1960"><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1956" instrument_node="">
