</span><div class="entry entry-post post-37 post type-post status-publish format-standard has-post-thumbnail hentry category-growing-fruit-trees tag-improve-clay-soil-for-fruit-trees" data-dcnode-id="743" id="post-37"><span data-dcnode-id="1150" instrument_node="">
</span><div class="entry-header" data-dcnode-id="1146"><span data-dcnode-id="1149" instrument_node="">
</span><div class="clearfix" data-dcnode-id="1148"></div><span data-dcnode-id="1147" instrument_node="">

</span><h1 class="entry-title" data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">How to Improve Clay Soil for Fruit Trees</span></h1><span data-dcnode-id="1142" instrument_node="">
</span><div class="entry-thumb" data-dcnode-id="1140"><img alt="How to Improve Clay Soil for Fruit Trees" class="img-responsive wp-post-image" data-dcnode-id="1141" height="480" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenofluma.com/wp-content/uploads/2018/08/pexels-photo-216692.jpeg&amp;raw" srcset="https://gardenofluma.com/wp-content/uploads/2018/08/pexels-photo-216692.jpeg 640w, https://gardenofluma.com/wp-content/uploads/2018/08/pexels-photo-216692-300x225.jpeg 300w" width="640"></div><span data-dcnode-id="1139" instrument_node="">
</span><div class="single-content" data-dcnode-id="771"><p align="LEFT" data-dcnode-id="1136" dir="LTR"><span data-dcnode-id="1137" style="font-size: 14pt;"><span data-dcnode-id="1138" instrument_node="">We don’t have the most fertile soil out here in the desert southwest. If you’re in a part of the world that is an arid, hot climate and have attempted to do any sort of gardening, you know what I’m talking about. Our soil can become so compacted that it becomes a physically painful experience trying to use a shovel to dig a hole. Let me share with you some ways that have worked for me to improve clay soil for fruit trees.</span></span></p><span data-dcnode-id="1135" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1130" dir="LTR"><span data-dcnode-id="1131" style="font-size: 14pt;"><span data-dcnode-id="1134" instrument_node="">Is it necessary to amend clay soil? </span><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">The short answer is no. I’ve planted fruit trees without any amending in our clay soil and these trees have been successful. With that being said, there are ways to improve clay soil that will help your fruit trees thrive. There are so many different variables and factors to consider when planting in clay soil.</span></strong></span></p><span data-dcnode-id="1129" instrument_node="">
</span><h2 align="LEFT" data-dcnode-id="1126" dir="LTR"><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Here is some of the immediate problems with clay soil</span></strong></h2><span data-dcnode-id="1125" instrument_node="">
</span><ul data-dcnode-id="1095"><span data-dcnode-id="1124" instrument_node="">
</span><li data-dcnode-id="1121"><span data-dcnode-id="1122" style="font-size: 14pt;"><span data-dcnode-id="1123" instrument_node="">Lacks drainage</span></span></li><span data-dcnode-id="1120" instrument_node="">
</span><li data-dcnode-id="1117"><span data-dcnode-id="1118" style="font-size: 14pt;"><span data-dcnode-id="1119" instrument_node="">Harder for roots to penetrate</span></span></li><span data-dcnode-id="1116" instrument_node="">
</span><li data-dcnode-id="1113"><span data-dcnode-id="1114" style="font-size: 14pt;"><span data-dcnode-id="1115" instrument_node="">Calcium build up’s increasing PH levels</span></span></li><span data-dcnode-id="1112" instrument_node="">
</span><li data-dcnode-id="1109"><span data-dcnode-id="1110" style="font-size: 14pt;"><span data-dcnode-id="1111" instrument_node="">High PH causes difficulties for plants to take in needed nutrients</span></span></li><span data-dcnode-id="1108" instrument_node="">
</span><li data-dcnode-id="1105"><span data-dcnode-id="1106" style="font-size: 14pt;"><span data-dcnode-id="1107" instrument_node="">Minimal organic material</span></span></li><span data-dcnode-id="1104" instrument_node="">
</span><li data-dcnode-id="1101"><span data-dcnode-id="1102" style="font-size: 14pt;"><span data-dcnode-id="1103" instrument_node="">Limited amounts of microorganisms to create healthier soil</span></span></li><span data-dcnode-id="1100" instrument_node="">
</span><li data-dcnode-id="1097"><span data-dcnode-id="1098" style="font-size: 14pt;"><span data-dcnode-id="1099" instrument_node="">Virtually no worms</span></span></li><span data-dcnode-id="1096" instrument_node="">
</span></ul><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><img alt="" class="alignnone size-medium wp-image-39" data-dcnode-id="1093" height="300" sizes="(max-width: 225px) 100vw, 225px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenofluma.com/wp-content/uploads/2018/08/IMG_0828-225x300.jpg&amp;raw" srcset="https://gardenofluma.com/wp-content/uploads/2018/08/IMG_0828-225x300.jpg 225w, https://gardenofluma.com/wp-content/uploads/2018/08/IMG_0828-768x1024.jpg 768w" width="225"></p><span data-dcnode-id="1091" instrument_node="">
</span><h2 align="LEFT" data-dcnode-id="1088" dir="LTR"><b data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">What does it mean to amend my soil?</span></b></h2><span data-dcnode-id="1087" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1084" dir="LTR"><span data-dcnode-id="1085" style="font-size: 14pt;"><span data-dcnode-id="1086" instrument_node="">Amending soil is adding various things to improve on what the soil is lacking. Amendments can help improve the drainage of the soil, so plant roots are able to get oxygen to breath.</span></span></p><span data-dcnode-id="1083" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1080" dir="LTR"><span data-dcnode-id="1081" style="font-size: 14pt;"><span data-dcnode-id="1082" instrument_node="">Adding to the soil can help increase the microorganisms that help to create a living soil or healthy soil for plant life.</span></span></p><div class="eaa-wrapper eaa_after_nth_p_1 eaa_desktop" data-dcnode-id="1065" id="eaa_after_nth_p_1"><div class="eaa-ad" data-dcnode-id="1066" style=""><span data-dcnode-id="1078" instrument_node="">
</span><div data-dcnode-id="1069" id="ezoic-pub-ad-placeholder-103"><span data-dcnode-id="1077" instrument_node="">
</span><span data-dcnode-id="1075" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4152976044548307" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="5922274040" data-dcnode-id="1074" style="display:block; text-align:center;"></ins><span data-dcnode-id="1073" instrument_node="">
</span><span data-dcnode-id="1070" instrument_node="">
</span></div><span data-dcnode-id="1068" instrument_node="">
</span></div></div><span data-dcnode-id="1064" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1061" dir="LTR"><span data-dcnode-id="1062" style="font-size: 14pt;"><span data-dcnode-id="1063" instrument_node="">Amending can also help with getting plant roots a chance to build some establishment before having to penetrate through tougher layers of clay soil.</span></span></p><span data-dcnode-id="1060" instrument_node="">
</span><h2 align="LEFT" data-dcnode-id="1057" dir="LTR"><strong data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">What to use to amend a clay soil type?</span></strong></h2><span data-dcnode-id="1056" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1053" dir="LTR"><span data-dcnode-id="1054" style="font-size: 14pt;"><span data-dcnode-id="1055" instrument_node="">When I amend my clay soil at planting I use a mix of the native clay soil, a cactus soil, and compost.</span></span></p><span data-dcnode-id="1052" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1049" dir="LTR"><span data-dcnode-id="1050" style="font-size: 14pt;"><span data-dcnode-id="1051" instrument_node="">I mix together equal parts of the cactus mix and compost (25% of each) and 50% native clay soil.</span></span></p><span data-dcnode-id="1048" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1045" dir="LTR"><span data-dcnode-id="1046" style="font-size: 14pt;"><span data-dcnode-id="1047" instrument_node="">This mix will help with drainage, feeding the fruit tree, and starting the process of creating a healthy soil.</span></span></p><span data-dcnode-id="1044" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1041" dir="LTR"><span data-dcnode-id="1042" style="font-size: 14pt;"><span data-dcnode-id="1043" instrument_node="">I’ll also toss in some worm castings, which tends to have worm eggs in them to start getting worm life into the soil.</span></span></p><span data-dcnode-id="1040" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1037" dir="LTR"><span data-dcnode-id="1038" style="font-size: 14pt;"><span data-dcnode-id="1039" instrument_node="">I also toss a bit of Mychorrhizae to foster beneficial fungi for root development and to help the roots take in nutrients.</span></span></p><span data-dcnode-id="1036" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1032" dir="LTR"><span data-dcnode-id="1033" style="font-size: 14pt; color: #ff0000;"><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenofluma.com/recommended-garden-products-and-tools/" style="color: #ff0000;"><span data-dcnode-id="1035" instrument_node="">Here are some the products I use and highly recommend.</span></a></span></p><span data-dcnode-id="1031" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1028" dir="LTR"><span data-dcnode-id="1029" style="font-size: 14pt;"><span data-dcnode-id="1030" instrument_node="">Finishing off with a thick layer of mulch on top of the soil puts the final touch on planting your fruit tree in clay soil.</span></span></p><div class="eaa-wrapper eaa_after_nth_p_2 eaa_desktop" data-dcnode-id="1013" id="eaa_after_nth_p_2"><div class="eaa-ad" data-dcnode-id="1014" style=""><span data-dcnode-id="1026" instrument_node="">
</span><div data-dcnode-id="1017" id="ezoic-pub-ad-placeholder-104"><span data-dcnode-id="1025" instrument_node="">
</span><span data-dcnode-id="1023" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4152976044548307" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="5922274040" data-dcnode-id="1022" style="display:block; text-align:center;"></ins><span data-dcnode-id="1021" instrument_node="">
</span><span data-dcnode-id="1018" instrument_node="">
</span></div><span data-dcnode-id="1016" instrument_node="">
</span></div></div><span data-dcnode-id="1012" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1009" dir="LTR"><span data-dcnode-id="1010" style="font-size: 14pt;"><span data-dcnode-id="1011" instrument_node="">After a few months, as the mulch begins to break down through the summer months, you’ll begin to see more bug activity and worm life in the soil.</span></span></p><span data-dcnode-id="1008" instrument_node="">
</span><p align="LEFT" data-dcnode-id="1005" dir="LTR"><span data-dcnode-id="1006" style="font-size: 14pt;"><span data-dcnode-id="1007" instrument_node="">Over longer periods of time, you’ll start seeing that black soil or humus that every gardener loves.</span></span></p><span data-dcnode-id="1004" instrument_node="">
</span><h2 align="LEFT" data-dcnode-id="1001" dir="LTR"><b data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Planting without amending</span></b></h2><span data-dcnode-id="1000" instrument_node="">
</span><p align="LEFT" data-dcnode-id="997" dir="LTR"><span data-dcnode-id="998" style="font-size: 14pt;"><span data-dcnode-id="999" instrument_node="">Some experts will swear by never putting anything but native soil back into the planting hole.</span></span></p><span data-dcnode-id="996" instrument_node="">
</span><p align="LEFT" data-dcnode-id="993" dir="LTR"><span data-dcnode-id="994" style="font-size: 14pt;"><span data-dcnode-id="995" instrument_node="">In my opinion, one of the greatest things about gardening is experimenting, and that different approaches can work to get similar results.</span></span></p><span data-dcnode-id="992" instrument_node="">
</span><p align="LEFT" data-dcnode-id="989" dir="LTR"><span data-dcnode-id="990" style="font-size: 14pt;"><span data-dcnode-id="991" instrument_node="">The things that have worked well for me without amending the planting hole is to utilize mulching and to get fruit trees with rootstocks that perform well in clay soils.</span></span></p><span data-dcnode-id="988" instrument_node="">
</span><p align="LEFT" data-dcnode-id="985" dir="LTR"><span data-dcnode-id="986" style="font-size: 14pt;"><span data-dcnode-id="987" instrument_node="">Mulching is a key component of building a healthy soil regardless if you are amending your planting hole or not.</span></span></p><span data-dcnode-id="984" instrument_node="">
</span><p align="LEFT" data-dcnode-id="981" dir="LTR"><span data-dcnode-id="982" style="font-size: 14pt;"><span data-dcnode-id="983" instrument_node="">Mulching will help with conserving water, which is critical for the health of your fruit tree.</span></span></p><span data-dcnode-id="980" instrument_node="">
</span><p align="LEFT" data-dcnode-id="977" dir="LTR"><span data-dcnode-id="978" style="font-size: 14pt;"><span data-dcnode-id="979" instrument_node="">Over time, the mulch will break down and provide extra nutrients to the soil, while providing food for microorganisms. This breakdown process will begin to create a living soil.</span></span></p><span data-dcnode-id="976" instrument_node="">
</span><p align="LEFT" data-dcnode-id="973" dir="LTR"><span data-dcnode-id="974" style="font-size: 14pt;"><span data-dcnode-id="975" instrument_node="">Fruit trees are generally grafted to a seedling rootstock. This is done by taking a cutting from a desirable fruit tree and attaching that cutting, through grafting methods, to the rootstock.</span></span></p><span data-dcnode-id="972" instrument_node="">
</span><p align="LEFT" data-dcnode-id="969" dir="LTR"><span data-dcnode-id="970" style="font-size: 14pt;"><span data-dcnode-id="971" instrument_node="">The reason for grafting is to ensure that you will have the same exact fruit on the new tree as the tree you are taking the cutting from.</span></span></p><span data-dcnode-id="968" instrument_node="">
</span><p align="LEFT" data-dcnode-id="965" dir="LTR"><span data-dcnode-id="966" style="font-size: 14pt;"><span data-dcnode-id="967" instrument_node="">Growing fruit trees from seed doesn’t typically produce the exact same tree as the parent, so the fruit quality can be variable. Some rootstocks can handle clay soils better than others.</span></span></p><span data-dcnode-id="964" instrument_node="">
</span><p align="LEFT" data-dcnode-id="961" dir="LTR"><span data-dcnode-id="962" style="font-size: 14pt;"><span data-dcnode-id="963" instrument_node="">When you buy locally, many of the local nurseries have fruit trees that are on rootstock designed to thrive in your area.</span></span></p><span data-dcnode-id="960" instrument_node="">
</span><p align="LEFT" data-dcnode-id="957" dir="LTR"><span data-dcnode-id="958" style="font-size: 14pt;"><span data-dcnode-id="959" instrument_node="">While buying from the big box stores, trees tend to be shipped in from other areas, so they may or may not be on the rootstocks for optimal production in your soil type.</span></span></p><span data-dcnode-id="956" instrument_node="">
</span><p align="LEFT" data-dcnode-id="954" dir="LTR"><img alt="" class="alignnone size-medium wp-image-41" data-dcnode-id="955" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenofluma.com/wp-content/uploads/2018/08/IMG_0805-225x300.jpg&amp;raw" width="225"></p><span data-dcnode-id="953" instrument_node="">
</span><h2 align="LEFT" data-dcnode-id="950" dir="LTR"><b data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">A few things that can help make it easier to work with clay soil</span></b></h2><span data-dcnode-id="949" instrument_node="">
</span><p align="LEFT" data-dcnode-id="946" dir="LTR"><span data-dcnode-id="947" style="font-size: 14pt;"><span data-dcnode-id="948" instrument_node="">One tip is to run a water drip on the area that you want to dig a hole overnight. When clay soil has a chance to absorb moisture it makes it so much easier to work with, but it will be heavier.</span></span></p><span data-dcnode-id="945" instrument_node="">
</span><p align="LEFT" data-dcnode-id="931" dir="LTR"><span data-dcnode-id="932" style="font-size: 14pt;"><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D161638%26u%3D1801997%26m%3D20940%26urllink%3Dwww.soillogic.com%252Fliquid-gypsum.html%26afftrack%3D"><span data-dcnode-id="943" style="color: #ff0000;"><span data-dcnode-id="944" instrument_node="">Gypsum</span></span></a><span data-dcnode-id="941" instrument_node=""> is a soil conditioner that is commonly used to loosen clay soils. </span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D161638%26u%3D1801997%26m%3D20940%26urllink%3Dwww.soillogic.com%252Fliquid-gypsum.html%26afftrack%3D"><span data-dcnode-id="939" style="color: #ff0000;"><span data-dcnode-id="940" instrument_node="">Gypsum</span></span></a><span data-dcnode-id="937" instrument_node=""> is composed of a mineral called calcium sulfate. </span><a data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D161638%26u%3D1801997%26m%3D20940%26urllink%3Dwww.soillogic.com%252Fliquid-gypsum.html%26afftrack%3D"><span data-dcnode-id="935" style="color: #ff0000;"><span data-dcnode-id="936" instrument_node="">Gypsum</span></span></a><span data-dcnode-id="933" instrument_node=""> is a salt, but is also effective in leaching the salts out of the soil.</span></span></p><span data-dcnode-id="930" instrument_node="">
</span><p align="LEFT" data-dcnode-id="923" dir="LTR"><span data-dcnode-id="924" style="font-size: 14pt;"><span data-dcnode-id="929" instrument_node="">When applying </span><span data-dcnode-id="926" style="color: #ff0000;"><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D161638%26u%3D1801997%26m%3D20940%26urllink%3Dwww.soillogic.com%252Fliquid-gypsum.html%26afftrack%3D" style="color: #ff0000;"><span data-dcnode-id="928" instrument_node="">Gypsum</span></a></span><span data-dcnode-id="925" instrument_node=""> to the top layer of soil it is important to let the water run for several hours to deeply soak the area to flush the salts away from the tree roots.</span></span></p><span data-dcnode-id="922" instrument_node="">
</span><p align="LEFT" data-dcnode-id="916" dir="LTR"><span data-dcnode-id="917" style="font-size: 14pt;"><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shareasale.com/r.cfm%3Fb%3D161638%26u%3D1801997%26m%3D20940%26urllink%3Dwww.soillogic.com%252Fliquid-gypsum.html%26afftrack%3D"><span data-dcnode-id="920" style="color: #ff0000;"><span data-dcnode-id="921" instrument_node="">Gypsum</span></span></a><span data-dcnode-id="918" instrument_node=""> isn’t fast acting but applying over time will help with loosen up the clay.</span></span></p><span data-dcnode-id="915" instrument_node="">
</span><h2 align="LEFT" data-dcnode-id="912" dir="LTR"><b data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Tools to use for digging in compacted clay soil</span></b></h2><span data-dcnode-id="911" instrument_node="">
</span><p align="LEFT" data-dcnode-id="908" dir="LTR"><span data-dcnode-id="909" style="font-size: 14pt;"><span data-dcnode-id="910" instrument_node="">The main tool that has worked well for me is a standard pick axe. I just chip away with it and use a shovel to remove the dirt as it breaks up.</span></span></p><span data-dcnode-id="907" instrument_node="">
</span><p align="LEFT" data-dcnode-id="904" dir="LTR"><span data-dcnode-id="905" style="font-size: 14pt;"><span data-dcnode-id="906" instrument_node="">I’ve seen people use a jackhammer. These can be purchased or rented from a big box store. I’ve also seen tools that look similar to an auger that you can use to basically drill out a hole.&nbsp;</span></span></p><span data-dcnode-id="903" instrument_node="">
</span><p align="LEFT" data-dcnode-id="898" dir="LTR"><span data-dcnode-id="899" style="font-size: 14pt;"><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenofluma.com/recommended-garden-products-and-tools/"><span data-dcnode-id="901" style="color: #ff0000;"><span data-dcnode-id="902" instrument_node="">Here are some of the tools and products I use and recommend.</span></span></a></span></p><span data-dcnode-id="897" instrument_node="">
</span><h2 align="LEFT" data-dcnode-id="894" dir="LTR"><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Check for drainage</span></strong></h2><span data-dcnode-id="893" instrument_node="">
</span><p align="LEFT" data-dcnode-id="890" dir="LTR"><span data-dcnode-id="891" style="font-size: 14pt;"><span data-dcnode-id="892" instrument_node="">Fill your planting hole up with water and see how long it takes for it to completely drain.</span></span></p><span data-dcnode-id="889" instrument_node="">
</span><p align="LEFT" data-dcnode-id="886" dir="LTR"><span data-dcnode-id="887" style="font-size: 14pt;"><span data-dcnode-id="888" instrument_node="">If it takes longer than 24 hours to drain you are either going to have to do more prep to the hole or plant in another spot.</span></span></p><span data-dcnode-id="885" instrument_node="">
</span><p align="LEFT" data-dcnode-id="882" dir="LTR"><span data-dcnode-id="883" style="font-size: 14pt;"><span data-dcnode-id="884" instrument_node="">I’d recommend try to dig deeper and see if there is that layer of caliche that needs to be broken.</span></span></p><span data-dcnode-id="881" instrument_node="">
</span><p align="LEFT" data-dcnode-id="878" dir="LTR"><span data-dcnode-id="879" style="font-size: 14pt;"><span data-dcnode-id="880" instrument_node="">When calcium carbonate forms within the soil over time it creates a hard pan layer called caliche.</span></span></p><span data-dcnode-id="877" instrument_node="">
</span><p align="LEFT" data-dcnode-id="874" dir="LTR"><span data-dcnode-id="875" style="font-size: 14pt;"><span data-dcnode-id="876" instrument_node="">This is commonly found in our desert soil, due to the lack of moisture and salt buildup.</span></span></p><span data-dcnode-id="873" instrument_node="">
</span><p align="LEFT" data-dcnode-id="870" dir="LTR"><span data-dcnode-id="871" style="font-size: 14pt;"><span data-dcnode-id="872" instrument_node="">You will know when you hit caliche after digging a few feet and you hit a hard almost concrete layer that will take a pick axe or even jackhammer to break through.</span></span></p><span data-dcnode-id="869" instrument_node="">
</span><p align="LEFT" data-dcnode-id="866" dir="LTR"><span data-dcnode-id="867" style="font-size: 14pt;"><span data-dcnode-id="868" instrument_node="">If you don’t break through this layer, your roots won’t be able to grow deep into the soil, and a shallow rooted tree can be uprooted by winds.</span></span></p><span data-dcnode-id="865" instrument_node="">
</span><p align="LEFT" data-dcnode-id="862" dir="LTR"><span data-dcnode-id="863" style="font-size: 14pt;"><span data-dcnode-id="864" instrument_node="">Caliche can also cause problems with drainage if the water has nowhere to go.</span></span></p><span data-dcnode-id="861" instrument_node="">
</span><h2 align="LEFT" data-dcnode-id="858" dir="LTR"><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Composting</span></strong></h2><span data-dcnode-id="857" instrument_node="">
</span><p align="LEFT" data-dcnode-id="854" dir="LTR"><span data-dcnode-id="855" style="font-size: 14pt;"><span data-dcnode-id="856" instrument_node="">Creating a compost pile or utilizing a compost bin is a great way to improve the quality of your soil.</span></span></p><span data-dcnode-id="853" instrument_node="">
</span><p align="LEFT" data-dcnode-id="850" dir="LTR"><span data-dcnode-id="851" style="font-size: 14pt;"><span data-dcnode-id="852" instrument_node="">It’s much more effective to create your compost on your own versus buy the bags from the store.</span></span></p><span data-dcnode-id="849" instrument_node="">
</span><p align="LEFT" data-dcnode-id="846" dir="LTR"><span data-dcnode-id="847" style="font-size: 14pt;"><span data-dcnode-id="848" instrument_node="">The quality is so much better at home and you know what is going into it.</span></span></p><span data-dcnode-id="845" instrument_node="">
</span><p align="LEFT" data-dcnode-id="841" dir="LTR"><span data-dcnode-id="842" style="font-size: 14pt;"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Here are some of the major benefits of composting:</span></strong></span></p><span data-dcnode-id="840" instrument_node="">
</span><ul data-dcnode-id="818"><span data-dcnode-id="839" instrument_node="">
</span><li data-dcnode-id="836"><span data-dcnode-id="837" style="font-size: 14pt;"><span data-dcnode-id="838" instrument_node="">Helps to provide trace elements, as well as the major elements like Nitrogen, Phosphorous, and potassium to the soil.</span></span></li><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="832"><span data-dcnode-id="833" style="font-size: 14pt;"><span data-dcnode-id="834" instrument_node="">Converts waste products into something sustainable</span></span></li><span data-dcnode-id="831" instrument_node="">
</span><li data-dcnode-id="828"><span data-dcnode-id="829" style="font-size: 14pt;"><span data-dcnode-id="830" instrument_node="">Feeds worms and microorganisms to help feed the trees and plants</span></span></li><span data-dcnode-id="827" instrument_node="">
</span><li data-dcnode-id="824"><span data-dcnode-id="825" style="font-size: 14pt;"><span data-dcnode-id="826" instrument_node="">Improves the overall structure of the soil </span></span></li><span data-dcnode-id="823" instrument_node="">
</span><li data-dcnode-id="820"><span data-dcnode-id="821" style="font-size: 14pt;"><span data-dcnode-id="822" instrument_node="">Beneficial Fungi</span></span></li><span data-dcnode-id="819" instrument_node="">
</span></ul><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><img alt="" class="alignnone size-medium wp-image-42" data-dcnode-id="816" height="300" sizes="(max-width: 225px) 100vw, 225px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenofluma.com/wp-content/uploads/2018/08/IMG_0283-225x300.jpg&amp;raw" srcset="https://gardenofluma.com/wp-content/uploads/2018/08/IMG_0283-225x300.jpg 225w, https://gardenofluma.com/wp-content/uploads/2018/08/IMG_0283-768x1024.jpg 768w" width="225"></p><span data-dcnode-id="814" instrument_node="">
</span><h1 data-dcnode-id="811"><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Benefits of clay soil</span></strong></h1><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" style="font-size: 14pt;"><span data-dcnode-id="809" instrument_node="">Believe it or not clay soil does come with some benefits.</span></span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" style="font-size: 14pt;"><span data-dcnode-id="805" instrument_node="">Clay soils actually do contain a lot of vital nutrients for plants and holds nutrients well.</span></span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" style="font-size: 14pt;"><span data-dcnode-id="801" instrument_node="">Soils that are sandy tend to wash the nutrients away when watered.</span></span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" style="font-size: 14pt;"><span data-dcnode-id="797" instrument_node="">Clay soils can provide a more solid foundation for keeping the trees up right, as long as deep watering is occurring, so the roots can get deep into the soil.</span></span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" style="font-size: 14pt;"><span data-dcnode-id="793" instrument_node="">Clay soils tend to hold a lot of moisture for longer periods of time, so one needs to be careful about over watering with clay.</span></span></p><span data-dcnode-id="790" instrument_node="">
</span><h1 data-dcnode-id="787"><strong data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Final Thoughts</span></strong></h1><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="784" style="font-size: 14pt;"><span data-dcnode-id="785" instrument_node="">You can create the backyard fruit orchard that you dream of, even in clay soil types.</span></span></p><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" style="font-size: 14pt;"><span data-dcnode-id="781" instrument_node="">It will take a little more effort to improve clay soil for fruit trees, but if you continue to breathe life into it through some of the methods discussed you will see that over time what was once a compacted nightmare, will turn into a beneficial soil for your fruit trees.</span></span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" style="font-size: 14pt;"><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Please comment below on anything you enjoyed from this post or experiences that you’ve had working with clay soils.</span></strong></span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="772"></p></div><span data-dcnode-id="770" instrument_node="">

</span><div class="sidebar-default sidebar-block sidebar-no-borders" data-dcnode-id="287"><div class="default-widget widget widget_media_image" data-dcnode-id="648" id="media_image-3"><img alt="garden of luma" class="image wp-image-259 attachment-medium size-medium" data-dcnode-id="649" height="225" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenofluma.com/wp-content/uploads/2018/09/IMG_0903-300x225.jpg&amp;raw" srcset="https://gardenofluma.com/wp-content/uploads/2018/09/IMG_0903-300x225.jpg 300w, https://gardenofluma.com/wp-content/uploads/2018/09/IMG_0903-768x576.jpg 768w, https://gardenofluma.com/wp-content/uploads/2018/09/IMG_0903-1024x768.jpg 1024w, https://gardenofluma.com/wp-content/uploads/2018/09/IMG_0903-e1537640816399.jpg 400w" style="max-width: 100%; height: auto;" width="300"></div><div class="default-widget widget widget_text" data-dcnode-id="634" id="text-9"><h3 class="widget-title" data-dcnode-id="645"><span data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">About Me</span></span></h3><span data-dcnode-id="644" instrument_node=""> </span><div class="textwidget" data-dcnode-id="636"><p data-dcnode-id="641"><em data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Hi I’m Joe, A passionate gardener in the Arizona Desert.&nbsp; I’ve been gardening in Arizona since 2011 and have learned so many things along the way.&nbsp; &nbsp;Gardening in a hot, dry climate presents many different challenges.&nbsp; I want to share my successes to help others create their own backyard food forest.&nbsp; I started Garden of Luma when we moved into our new home in 2016.&nbsp; I have around 25 fruit trees and edible fruiting plants along with several raised beds, native plants, herbs, and flowers.&nbsp;</span></em></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">&nbsp;</span></p><span data-dcnode-id="637" instrument_node="">
</span></div><span data-dcnode-id="635" instrument_node="">
</span></div><div class="widget_text default-widget widget widget_custom_html" data-dcnode-id="619" id="custom_html-9"><div class="textwidget custom-html-widget" data-dcnode-id="620"><span data-dcnode-id="632" instrument_node="">
