</span><h1 class="page-title" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">How to Improve Your Soil</span></h1><span data-dcnode-id="542" instrument_node="">
</span><span class="blog-author" data-dcnode-id="538"><span data-dcnode-id="541" instrument_node="">By </span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/blog/authors/joe-lampl-green-expert"><span data-dcnode-id="540" instrument_node="">Joe Lamp’l</span></a></span><span data-dcnode-id="537" instrument_node=""> </span><em data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">- Gardening Expert and Host of Growing a Greener World®</span></em><br data-dcnode-id="534"><span data-dcnode-id="533" instrument_node="">
</span><span class="blog-posted" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">March 27, 2017</span></span><br data-dcnode-id="530"><br data-dcnode-id="529"><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Just when I thought it couldn’t get any better, it does. I’m talking about the performance of my lawn and garden. While I’ve been gardening personally and professionally for most of my life, over the past several years, I’ve had a chance to really settle in to my forever landscape (and horticultural laboratory)&nbsp;and improve soil wherever I want plants to thrive.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><img alt="Healthy, green, organic lawn" data-dcnode-id="524" height="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/application/files/2714/9037/7101/GGW-Lawn_700x350.jpg&amp;raw" width="700"></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">I’ve always practiced what I’ve preached. But now I finally have time to put all that advice I teach and demonstrate on television and writing, into full-on testing here at the Garden Farm—my personal home garden and landscape. It’s also the filming set for our national television series, </span><a data-dcnode-id="519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.growingagreenerworld.com/" target="_blank"><span data-dcnode-id="520" instrument_node="">Growing a Greener World®</span></a><span data-dcnode-id="518" instrument_node="">.</span></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">For years, we’ve demonstrated all this great wisdom in everyone else’s garden or landscape. Finally, we’ve been doing it at my place long enough to really see the tangible results of our practices.</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="512" instrument_node="">Can I just say it’s pretty amazing—but </span><em data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">not</span></em><span data-dcnode-id="509" instrument_node=""> surprising?</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">The vegetable garden astounds all who visit. Plants seem to jump out of the ground with growth and vigor. Even seasoned gardeners are surprised.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><img alt="Raised garden beds" data-dcnode-id="503" height="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/application/files/4614/9037/7107/GGW-RaidedBeds700x350.jpg&amp;raw" width="700"></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">The organic lawn has never looked fuller or greener.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">And my tree, shrub and perennial installations have adapted beautifully. As with my veggies, they too seem to have tapped into some incredible energy source that has them.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">So what’s behind this across-the-board vigor?</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">If you didn’t know me, you might think lots of synthetic fertilizer. Not that. I’m an organic gardener. Perhaps it’s time-consuming hours of watering. No, not that either.</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="483"><strong data-dcnode-id="484"><span data-dcnode-id="488" instrument_node="">The common denominator to why all my plants and lawn are thriving is the </span><em data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">soil</span></em><span data-dcnode-id="485" instrument_node="">.</span></strong></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><img alt="Hands holding soil and compost" data-dcnode-id="481" height="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/application/files/9215/0334/5230/GGW-Hands-Soil_700x350-min.jpg&amp;raw" width="700"></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">When I think about planting, it’s not so much about how deep or wide to dig the hole. Although that’s very important, I’m planning well in advance to improve the growing conditions. That means giving plants the best foundation possible through great soil.</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Yes, it takes some forethought and patience, but the rewards are ongoing. No matter what type of soil you have to start, whether it’s loose and sandy, or heavy clay (like mine), doing what you can to incorporate organic matter will give it body, porosity, texture, and crucial microorganisms your plants need to really thrive.</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">So let’s break that down.</span></p><span data-dcnode-id="470" instrument_node="">
</span><div data-dcnode-id="462"><strong data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">What is </span></strong><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">organic</span></strong><strong data-dcnode-id="464"><span data-dcnode-id="465" instrument_node=""> matter?</span></strong><span data-dcnode-id="463" instrument_node=""> That’s the not-so-secret ingredient to improving any soil. In a nutshell, organic matter (my definition anyway) is the natural earthy material that when decomposed, makes up the non-mineral part of soil.</span></div><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Examples include rotted leaves, shredded bark or wood chips, aged manure, degraded straw, hay, grass, and yard debris. But the holy grail of all organic matter is compost. It’s made up of any or all of the elements listed above, and possibly food scraps, paper, cardboard, coffee grounds, and more.</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Over several months, these ingredients break down into the perfect soil amendment for your lawn or garden, complete with nutrients, and billions of beneficial microorganisms that serve as the workers in your soil in a symbiotic sort of way to help your plants thrive as nature intended.</span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">You may be surprised to know that in nature, organic matter only makes up about 5% of native soil. About 50% is air and water, and 45% is minerals (sand, silt and clay in some combination).</span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">Take comfort in knowing only a little bit of organic matter goes a long way to making any soil better. My suggestion is to mix all the natural inputs you can into a heap or bin and let them break down all together first. When it does, you have finished compost.</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Then, use it in your landscape or garden. At my place, I make all I can and add it in my vegetable garden, working about a half-inch slightly into the soil. The addition of compost (or other organic matter) will improve your soil which in turns, helps whatever is growing there.</span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="439"><strong data-dcnode-id="441"><span data-dcnode-id="445" instrument_node="">And there’s one other player that I attribute to the success of my lawn and landscape:&nbsp;</span><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.milorganite.com/using-milorganite/why-use-milorganite"><span data-dcnode-id="444" instrument_node="">Milorganite®</span></a><span data-dcnode-id="442" instrument_node="">. </span></strong><span data-dcnode-id="440" instrument_node="">The slow release nitrogen in this fertilizer product is itself a direct result of billions of microbes that safely add an extra boost to help stimulate my plants and lawn to grow.</span></p><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">As an organic gardener, whatever ingredients go into making my soil productive can’t be negated by inorganic inputs. That’s why Milorganite fits so well into my soil-building protocol. Healthier plants mean deeper roots, better water filtration, and drought tolerance. That leads to a healthier soil environment and overall improved vigor in everything above ground.</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">For your lawn, rent a core aerator and run it over your lawn first. That will extract soil plugs, leaving a great place to top-dress with compost and organic fertilizer. I do this twice a year in spring and fall.</span></p><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">In vegetable and landscaped beds, I work about a half inch of compost into the surface, add Milorganite as directed and top dress with mulch.</span></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">Hopefully, you’ve gotten the picture that it doesn’t take much to achieve big results over time.</span></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">Try to repeat this process twice a year if possible. While you should see good results quickly, the best results will occur over time. But I assure you, it’s worth the wait.</span></p><span data-dcnode-id="423" instrument_node="">
</span><div class="vWrap" data-dcnode-id="412"><span data-dcnode-id="422" instrument_node="">
