</span><h1 class="node-title page-title" data-dcnode-id="1309"><span data-dcnode-id="1313" instrument_node="">
</span><span class="field--bundle--node field--node-article--title field field--name-title field--type-string field--label-hidden" data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">How to improve border soil</span></span><span data-dcnode-id="1310" instrument_node="">
</span></h1><span data-dcnode-id="1308" instrument_node="">
</span></div><span data-dcnode-id="1306" instrument_node="">
</span></header><span data-dcnode-id="1304" instrument_node="">
</span><div class="entity_content node__content clearfix entity-has-header-indent" data-dcnode-id="1218"><span data-dcnode-id="1303" instrument_node="">
</span><div class="entity__content__indent container" data-dcnode-id="1302"></div><span data-dcnode-id="1301" instrument_node="">
</span><section class="layout layout--onecol" data-dcnode-id="1220"><span data-dcnode-id="1300" instrument_node="">
</span><div class="layout__region layout__region--content container" data-dcnode-id="1222"><span data-dcnode-id="1299" instrument_node="">
</span><div class="block block-layout-builder block-field-blocknodearticlebody" data-dcnode-id="1224"><span data-dcnode-id="1298" instrument_node="">
</span><div class="row" data-dcnode-id="1226"><span data-dcnode-id="1297" instrument_node="">
</span><div class="col-md-10 col-xl-8 offset-md-1 offset-xl-2" data-dcnode-id="1228"><span data-dcnode-id="1296" instrument_node="">
</span><div class="content" data-dcnode-id="1230"><span data-dcnode-id="1295" instrument_node="">
</span><div class="field--bundle--node field--node-article--body clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden" data-dcnode-id="1232"><span data-dcnode-id="1294" instrument_node="">
</span><div class="field__items" data-dcnode-id="1234"><span data-dcnode-id="1293" instrument_node="">
</span><div class="field__item" data-dcnode-id="1236"><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1289"><strong data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Not many of us are naturally blessed with a good rich loam soil that is ideal for growing all plants. Luckily, if you have poor soil, it is reasonably easy to improve it, so that nearly all plants will thrive.</span></strong></p><span data-dcnode-id="1288" instrument_node="">
</span><h3 data-dcnode-id="1285"><strong data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">In brief</span></strong></h3><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">The two soil extremes are heavy clay and light, sandy soils. Both can be improved by adding lots of bulky organic matter to improve the structure and widen the range of plants that will thrive.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Digging will help to improve the drainage of clay soils but is unnecessary on loam or sandy soils. While you are digging, incorporate as much bulky organic matter as you are able. Your compost heap will provide well-rotted material made from vegetable peelings, grass cuttings and other plant material such as fallen leaves, dead annual bedding plants and annual weeds. Alternatively, you can make leafmould from fallen tree and shrub leaves which will take a year or two to decompose to use.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">If you don’t have enough material from your garden compost for your needs, then you will need to buy in suitable materials. These can include well-rotted manure, mushroom compost, composted bark, all-purpose compost, tree and shrub planting compost and soil conditioners.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Also remember to dig in any compost from spent growing bags, patio pots and hanging baskets once they are finished.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><hr data-dcnode-id="1271"><h3 data-dcnode-id="1262"><span data-dcnode-id="1270" instrument_node="">
</span><div class="media-wrapper media-wrapper--blazy img-fluid" data-dcnode-id="1264"><span data-dcnode-id="1269" instrument_node=""> </span><div class="media media--blazy media--loading media--ratio media--ratio--fluid media--image" data-dcnode-id="1266" data-ratio="64.04" style="padding-bottom: 64.04%;"><span data-dcnode-id="1268" instrument_node="">
</span><img alt="Love the Garden / Soil" class="media__image media__element b-lazy" data-dcnode-id="1267" data-entity-type="image" data-entity-uuid="0" data-src="/sites/default/files/content/shutterstock_1363320362.jpg" height="2892" id="" loading="lazy" src="data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%204516%202892'%2F%3E" title="" typeof="foaf:Image" width="4516"></div><span data-dcnode-id="1265" instrument_node="">
</span></div><span data-dcnode-id="1263" instrument_node="">
</span></h3><span data-dcnode-id="1261" instrument_node="">
</span><h3 data-dcnode-id="1258"><strong data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Improving heavy clay soil</span></strong></h3><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Clay soils are usually cold, wet and sticky for most of the year but in dry weather, they dry out and can turn solid with surface cracks appearing or the surface cakes over. On the positive side clay soils are innately fertile and hold a lot of moisture and plant food which is not leached away by rain. Good clay soil will grow all plants well - a poor soil will only grow poor plants!</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Dig any unplanted areas in early autumn and add a generous amount of organic matter as you go. Leave the clods rough so that frost can break down the structure. A dressing of gypsum and even sharp sand or horticultural grit will also help in this process of producing a crumb structure. Repeat the process each autumn to help produce crumbly textured soil.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Soil in between plants can be gradually improved if bulky organic matter is forked into the top 15cm (6in) of soil each autumn. A mulch layer of material applied each spring around established plants will also help improve the structure and the amount of worm and micro-organism activity.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><hr data-dcnode-id="1247"><h3 data-dcnode-id="1244"><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Improving light sandy soils</span></strong></h3><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Light sandy soils soon run short of nutrients and water quickly drains out of them which means watering is required frequently during summer. Plants will probably &nbsp;establish a shallow root system.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">The way to improve this type of soil is to add bulky organic matter in spring. Use plenty of farmyard manure, garden compost or organic soil conditioner when planting to give moisture-holding material at the root level. Mulch all over in late spring to reduce evaporation and use ground cover plants to shield the soil.</span></p><span data-dcnode-id="1237" instrument_node="">
</span></div><span data-dcnode-id="1235" instrument_node="">
</span></div><span data-dcnode-id="1233" instrument_node="">
