</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">If you’ve ever purchased potted plants or veggie starts, or opened a bag of commercial potting mix, you may have noticed tiny white balls in the soil that look like Styrofoam bits.</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">These white balls are actually important soil components called perlite, and they’re not simply fillers or artificial rocks as some people might believe.</span></p><span data-dcnode-id="1498" instrument_node="">

</span><h2 data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">What is perlite?</span></h2><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1483" instrument_node="">First, let’s go over what perlite </span><em data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">isn’t</span></em><span data-dcnode-id="1480" instrument_node="">: Perlite is not a type of soil, it’s a soil additive that can also be used as a growing medium.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1477" instrument_node="">Perlite is </span><em data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">not</span></em><span data-dcnode-id="1474" instrument_node="">&nbsp;a fertilizer, and has no nutritional or microbial value to plants or soil. Its benefits are derived solely from keeping the soil structure loose and light.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1471" instrument_node="">What perlite </span><em data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">is</span></em><span data-dcnode-id="1468" instrument_node="">: an inorganic, non-toxic, lightweight soil amendment. But don’t let that dissuade you if you’re an organic gardener! (More on that below.)</span></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Also known as expanded pyrite, perlite is a mined volcanic rock that is mixed into many industrial building products for stability, such as masonry construction, loose-fill insulation, cement, and plaster.</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">It’s also used as filter media for swimming pool filters, and as a filter aid for beverages (like juices, beer, and wine) and for waste water.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">In the gardening world, perlite is used to improve soil structure by providing drainage and aeration. “Air for the soil” is what I like to call it, and it’s the next best thing to compost for circulating air between the roots for strong, healthy plant growth.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1456" instrument_node="">Look under a microscope and you’ll find that perlite is filled with many tiny cavities that hold water (like a sponge), making it efficient at delivering moisture to plant roots. All these nooks and crannies enable </span><a aria-label="perlite can hold three to four times its weight in water (opens in a new tab)" class="rank-math-link" data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/perlite" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1455" instrument_node="">perlite to hold three to four times its weight in water</span></a><span data-dcnode-id="1453" instrument_node="">.</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">It’s also capable of storing nutrients for a short period when they otherwise might wash away immediately.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1447" instrument_node="">At the same time, the cavities mean perlite is quite porous, so it drains excess water more readily than </span><a class="rank-math-link" data-dcnode-id="1445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenbetty.com/perlite-vs-vermiculite/"><span data-dcnode-id="1446" instrument_node="">vermiculite</span></a><span data-dcnode-id="1444" instrument_node=""> and other potting media. This is a good thing, since keeping your soil from becoming waterlogged is the number-one way to prevent root rot and fungal diseases.</span></p><span data-dcnode-id="1442" instrument_node="">

</span></div><span data-dcnode-id="1421" instrument_node="">
</span><h2 data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Is perlite organic?</span></h2><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">To call something organic depends on your personal beliefs (and here, it’s merely a case of semantics).</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">From a chemistry perspective, organic compounds contain carbon. Since perlite does not contain carbon, it’s considered an inorganic material.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">But from a gardening perspective, the term “organic” refers to something that is naturally produced without synthetic processes or significant chemical changes.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">It’s true that perlite has to be “popped” in an industrial process that turns it into the lightweight material we see and know, but it is still a naturally occurring mineral that’s extracted from the earth.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1405" instrument_node="">It’s no different from </span><a aria-label="seaweed emulsion (opens in a new tab)" class="rank-math-link" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3c4SUEH" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1404" instrument_node="">seaweed emulsion</span></a><span data-dcnode-id="1402" instrument_node=""> or </span><a aria-label="fish fertilizer (opens in a new tab)" class="rank-math-link" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3a4ybii" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1401" instrument_node="">fish fertilizer</span></a><span data-dcnode-id="1399" instrument_node=""> that has to undergo some kind of process to be suitable for gardening.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">And officially, horticultural perlite is OMRI listed for use in organic agriculture, so you don’t need to worry about what you’re putting in the ground.</span></p><span data-dcnode-id="1394" instrument_node="">

</span><h2 data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">How is perlite made?</span></h2><span data-dcnode-id="1380" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">The perlite we see in potting mixes is often called “volcanic popcorn,” and for good reason.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Straight out of the ground, perlite is a dense, amorphous volcanic glass with very high water content. In its natural state perlite is brown or black in color, as it’s typically formed during the cooling process of lava that produces obsidian.</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">During processing, raw perlite is superheated very rapidly to temperatures of 1560°F to 1650°F, which causes the material to soften and the moisture inside the glass to turn to steam. As the trapped moisture inside bubbles, trying to escape, it expands the material from 7 to 16 times its original size — much like popcorn popping.</span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">The expanded material turns white due to the reflectiveness of the trapped bubbles, and the resulting perlite is a chemically inert, sterile material that takes on an ultra lightweight, foamy texture.</span></p><span data-dcnode-id="1368" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1358"><picture class="wp-image-22505" data-dcnode-id="1362" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How to Use Perlite to Improve Soil and Boost Plant Growth" data-jpibfi-post-url="https://www.gardenbetty.com/perlite/" data-jpibfi-src="https://u9b2w4s6.rocketcdn.me/wp-content/uploads/2020/02/perlite-05.jpg"><span data-dcnode-id="1367" instrument_node="">

</span><h2 data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">How to use perlite in the garden</span></h2><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1353" instrument_node="">Perlite is commonly used in potting soil and soilless mixes (particularly for </span><a class="rank-math-link" data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenbetty.com/the-no-brainer-guide-to-starting-seeds-indoors/"><span data-dcnode-id="1352" instrument_node="">indoor seed starting</span></a><span data-dcnode-id="1350" instrument_node="">) to keep the soil structure loose and well-draining without risk of compaction over time.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1347" instrument_node="">You can combine equal parts perlite, vermiculite, and peat moss (or coco coir) for a clean, basic </span><a class="rank-math-link" data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenbetty.com/how-to-make-your-own-seed-starting-and-potting-mix/"><span data-dcnode-id="1346" instrument_node="">seed starting mix</span></a><span data-dcnode-id="1344" instrument_node=""> that supports healthy seedling development and reduces </span><a class="rank-math-link" data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenbetty.com/what-is-damping-off-disease/"><span data-dcnode-id="1343" instrument_node="">damping off disease</span></a><span data-dcnode-id="1341" instrument_node="">.</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">You can also use it to propagate plant cuttings. Rather than just rooting your cutting in water, you can root it in a small jar filled with moistened perlite.</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1335" instrument_node="">The same goes for seeds: start them in moistened perlite only, or test the germination of </span><a class="rank-math-link" data-dcnode-id="1333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenbetty.com/how-long-do-seeds-really-last-plus-a-cheat-sheet-on-seed-storage-life/"><span data-dcnode-id="1334" instrument_node="">older seeds</span></a><span data-dcnode-id="1332" instrument_node=""> in baggies filled with moistened perlite (as an alternative to the </span><a class="rank-math-link" data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenbetty.com/starting-seeds-in-coffee-filters-or-paper-towels/"><span data-dcnode-id="1331" instrument_node="">coffee filter method of starting seeds</span></a><span data-dcnode-id="1329" instrument_node="">).</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">In raised beds or in-ground garden beds that have trouble with cakey clay soil, you can improve drainage by raking in a 2-inch layer of perlite into the top 6 to 12 inches of soil, at the same time you amend the soil with compost and other nutrients.</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1323" instrument_node="">Because it doesn’t break down, a single application of perlite can keep the planting bed light and loose for several years! It was my “secret ingredient” during my years of </span><a class="rank-math-link" data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenbetty.com/video-my-spring-2017-garden-tour/"><span data-dcnode-id="1322" instrument_node="">gardening in Southern California</span></a><span data-dcnode-id="1320" instrument_node="">, when I needed something more than just compost to break up all the hard dirt clods in our beds.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Some (but not all) bagged potting and garden soils also benefit from having more perlite added to the mix.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1314" instrument_node="">This is especially beneficial for </span><a class="rank-math-link" data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenbetty.com/how-deep-are-the-roots-of-garden-vegetables/"><span data-dcnode-id="1313" instrument_node="">deep-rooted plants</span></a><span data-dcnode-id="1311" instrument_node=""> that are more productive when the roots don’t have to drive down into dense, compressed soil (think root vegetables like carrots and daikon — you’ll see how my previous clay soil was notorious for turning out </span><a class="rank-math-link" data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenbetty.com/carrot-porn-nsfw-or-maybe-it-is-depending-on-your-work/"><span data-dcnode-id="1310" instrument_node="">silly, topsy-turvy carrots</span></a><span data-dcnode-id="1308" instrument_node="">).</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1305" instrument_node="">I also like adding extra perlite to my </span><a class="rank-math-link" data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenbetty.com/growing-garlic/"><span data-dcnode-id="1304" instrument_node="">garlic planting beds in fall</span></a><span data-dcnode-id="1302" instrument_node="">, as the perlite helps keep bulbs from being waterlogged in winter and spring. Perlite also helps the soil dry out in the week or two before your </span><a class="rank-math-link" data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gardenbetty.com/the-trick-of-knowing-when-to-harvest-garlic/"><span data-dcnode-id="1301" instrument_node="">garlic crop is ready for harvest</span></a><span data-dcnode-id="1299" instrument_node="">.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1296" instrument_node="">Perlite is an essential soil conditioner that I </span><em data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">always</span></em><span data-dcnode-id="1293" instrument_node=""> keep on hand, and I buy several bags every year as I always find a use for it.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Be aware that smaller grades of perlite, and in some cases cheap perlite with little quality control, can get dusty (especially as you get to the bottom of a bag).</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">If you’re sensitive to fine particles in the air, be sure to wear a dust mask and glasses when you’re handling perlite. (I like to keep both of these items in my gardening toolkit. See my sources linked below for stylish reusable mask options that I own for working with dusty gardening products.)</span></p><span data-dcnode-id="1285" instrument_node="">
</span><div data-dcnode-id="1268"><span data-dcnode-id="1284" instrument_node="">

</span><h6 class="has-text-align-center" data-dcnode-id="1270"><a aria-label="Medium Perlite (opens in a new tab)" class="rank-math-link" data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3bRI4lk" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1272" instrument_node="">Medium Perlite</span></a></h6><span data-dcnode-id="1269" instrument_node="">
</span></div><span data-dcnode-id="1267" instrument_node="">
</span><h2 data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Grades or sizes of perlite</span></h2><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Perlite is typically available in four grades or granule sizes, which correspond to coarseness levels.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><figure class="wp-block-table aligncenter" data-dcnode-id="1219"><table data-dcnode-id="1220"><thead data-dcnode-id="1250"><tr data-dcnode-id="1251"><th data-dcnode-id="1258"><strong data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Type of Perlite</span></strong></th><th data-dcnode-id="1255"><strong data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Grade</span></strong></th><th data-dcnode-id="1252"><strong data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Granule Size</span></strong></th></tr></thead><tbody data-dcnode-id="1221"><tr data-dcnode-id="1243"><td data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">Super coarse perlite</span></td><td data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">#4</span></td><td data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">1 inch</span></td></tr><tr data-dcnode-id="1236"><td data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Coarse perlite</span></td><td data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">#3</span></td><td data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">1/2 inch</span></td></tr><tr data-dcnode-id="1229"><td data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Medium perlite</span></td><td data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">#2</span></td><td data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">1/4 inch to 3/8 inch</span></td></tr><tr data-dcnode-id="1222"><td data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Fine perlite</span></td><td data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">#1</span></td><td data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">1/8 inch</span></td></tr></tbody></table></figure><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1214"><strong data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">Super coarse and coarse perlite:</span></strong><span data-dcnode-id="1215" instrument_node=""> This type of perlite is often used to amend raised beds and garden beds, or dense soils with high water-holding capacity (clay). Size #4 perlite is a whopper of a particle that should only be used for extremely heavy soil.</span></p><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1209"><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Medium perlite:</span></strong><span data-dcnode-id="1210" instrument_node=""> You’ll mostly see medium-grade perlite in commercial potting soil. It’s a good all-around size for potted plants, window boxes, and general garden use.</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1201"><strong data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Fine perlite:</span></strong><span data-dcnode-id="1205" instrument_node=""> These smaller particles are ideal for starting seeds or rooting cuttings. Fine perlite is tough to find in this size as a standalone product, so I tend to go with </span><a aria-label="fine pumice (opens in a new tab)" class="rank-math-link" data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3bUPEeO" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1204" instrument_node="">fine pumice</span></a><span data-dcnode-id="1202" instrument_node="">, which is usually labeled for bonsai or succulent planting.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1190"><picture class="wp-image-22504" data-dcnode-id="1194" data-jpibfi-post-excerpt="" data-jpibfi-post-title="How to Use Perlite to Improve Soil and Boost Plant Growth" data-jpibfi-post-url="https://www.gardenbetty.com/perlite/" data-jpibfi-src="https://u9b2w4s6.rocketcdn.me/wp-content/uploads/2020/02/perlite-04.jpg"><span data-dcnode-id="1199" instrument_node="">

</span><div data-dcnode-id="1164"><span data-dcnode-id="1188" instrument_node="">
</span><h2 data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Benefits of using perlite in the garden</span></h2><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Perlite is a highly useful component of gardening for many reasons: </span></p><span data-dcnode-id="1182" instrument_node="">
</span><ul data-dcnode-id="1169"><li data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">It is physically stable and retains its shape, even in heavy or saturated soil. </span></li><li data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">It doesn’t decompose, so it’s ideal for use in potting mixes for plants that are repotted infrequently (such as succulents and other houseplants). </span></li><li data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">It has a neutral pH level, making it suitable for any container or garden bed. </span></li><li data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">It contains no toxic chemicals or additives; when you buy a bag labeled as perlite, that’s exactly what you’re getting. </span></li><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">It’s able to absorb some water while letting the rest of it drain freely. </span></li><li data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">It provides excellent aeration. Plants actually absorb 98 percent of their oxygen through the roots, so good aeration is crucial for healthy root development. Proper airflow also supports earthworms, beneficial nematodes, and other good things in the soil food web, which in turn supports plant life. </span></li></ul><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Because of these properties, perlite is also popular in orchid, cactus, and succulent planting mixes that like to be on the drier side, and in hydroponic setups as a standalone growing medium.</span></p><span data-dcnode-id="1165" instrument_node="">
</span></div><span data-dcnode-id="1163" instrument_node="">
</span><h2 data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Does perlite cause fluoride burn in plants?</span></h2><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">There’s a rumor that perlite is responsible for fluoride burn in houseplants, which appears as brown leaf spots or scorched leaf tips in susceptible plants like dracaena, spider plants, and Easter lilies.</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">If you’re using a commercial potting soil that contains perlite, however, the chances of that happening are very slim.</span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1150"><a aria-label="Fluorine toxicity (opens in a new tab)" class="rank-math-link" data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pnwhandbooks.org/plantdisease/pathogen-articles/nonpathogenic-phenomena/fluorine-toxicity-plants" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1153" instrument_node="">Fluorine toxicity</span></a><span data-dcnode-id="1151" instrument_node=""> can be caused by many things, including fluoridated water, superphosphate fertilizers, low soil pH, and other environmental conditions that have little to do with potting medium that simply has perlite in it.</span></p><span data-dcnode-id="1149" instrument_node="">

</span><h2 data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Where to buy perlite</span></h2><span data-dcnode-id="1135" instrument_node="">
</span><p data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">The most convenient source of perlite is your local independent garden center or big-box plant nursery. When buying perlite, make sure you are buying 100 percent perlite and not a soil or soilless blend.</span></p><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">I’ve also linked my favorite brands of perlite (below) in a variety of sizes, which you can easily buy online.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">If you can’t find perlite locally, pumice makes a good substitute as it has similar qualities. Sometimes you can use vermiculite in a pinch (especially as a seed starting medium), but keep in mind it retains more moisture than perlite does.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">When it comes down to it, perlite is still the best choice for a soil amendment when you want moderate water retention, excellent aeration and drainage, and long-term benefits.</span></p><span data-dcnode-id="1123" instrument_node="">
</span><div data-dcnode-id="940"><span data-dcnode-id="1122" instrument_node="">
