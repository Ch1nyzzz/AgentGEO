/plugins/simple-share-buttons-adder/buttons/somacro/email.png%3Fw%3D1040%26ssl%3D1&amp;raw" style="width: 39px;" title="Email"><noscript data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">&lt;img  style="width: 39px;" title="Email"  alt="Email this to someone" data-recalc-dims="1" data-src="https://i0.wp.com/www.growingwildroots.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/email.png?w=1040&amp;#038;ssl=1" class="ssba ssba-img lazyload" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" /&gt;&lt;noscript&gt;&lt;img src="https://i0.wp.com/www.growingwildroots.com/wp-content/plugins/simple-share-buttons-adder/buttons/somacro/email.png?w=1040&amp;#038;ssl=1" style="width: 39px;" title="Email" class="ssba ssba-img" alt="Email this to someone" data-recalc-dims="1" /&gt;</span></noscript><div class="ssbp-text" data-dcnode-id="976" title="email"><span data-dcnode-id="977" instrument_node="">email</span></div></a></div></div><p data-dcnode-id="970"><span data-dcnode-id="971" style="font-weight: 400;"><span data-dcnode-id="972" instrument_node="">Do you find your potted vegetables dry out way too fast in the heat of the summer sun? &nbsp;</span></span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" style="font-weight: 400;"><span data-dcnode-id="968" instrument_node="">Feeling like your plants are lacking, but want to improve soil health without commercial fertilizers?</span></span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" style="font-weight: 400;"><span data-dcnode-id="964" instrument_node="">Finding yourself watering them once or twice a day? </span></span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" style="font-weight: 400;"><span data-dcnode-id="960" instrument_node="">Afraid to miss a day and have your plants shrivel up and be knocked back?</span></span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="952" style="font-weight: 400;"><span data-dcnode-id="956" instrument_node="">Here are some </span><strong data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">simple solutions to improve soil</span></strong><span data-dcnode-id="953" instrument_node=""> when it comes to growing potted plants.</span></span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="946"><img alt="These 5 simple solutions will help improve soil quality for potted plants, and cause them to thrive." class="aligncenter wp-image-1305 lazyloaded" data-dcnode-id="949" data-recalc-dims="1" data-sizes="(max-width: 804px) 100vw, 804px" data-src="https://i0.wp.com/growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1-1024x535.jpg?resize=804%2C420" data-srcset="https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?resize=1024%2C535&amp;ssl=1 1024w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?resize=150%2C78&amp;ssl=1 150w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?resize=200%2C104&amp;ssl=1 200w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?resize=750%2C392&amp;ssl=1 750w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?w=1256&amp;ssl=1 1256w" height="420" sizes="(max-width: 804px) 100vw, 804px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1-1024x535.jpg%3Fresize%3D804%252C420&amp;raw" srcset="https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?resize=1024%2C535&amp;ssl=1 1024w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?resize=150%2C78&amp;ssl=1 150w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?resize=200%2C104&amp;ssl=1 200w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?resize=750%2C392&amp;ssl=1 750w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?w=1256&amp;ssl=1 1256w" width="804"><noscript data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">&lt;img class="aligncenter wp-image-1305" src="https://i0.wp.com/growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1-1024x535.jpg?resize=804%2C420" alt="These 5 simple solutions will help improve soil quality for potted plants, and cause them to thrive." width="804" height="420" srcset="https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?resize=1024%2C535&amp;amp;ssl=1 1024w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?resize=150%2C78&amp;amp;ssl=1 150w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?resize=200%2C104&amp;amp;ssl=1 200w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?resize=750%2C392&amp;amp;ssl=1 750w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header1.jpg?w=1256&amp;amp;ssl=1 1256w" sizes="(max-width: 804px) 100vw, 804px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="943" style="font-weight: 400;"><span data-dcnode-id="944" instrument_node="">First off, we need to </span></span><b data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">recognize the problem</span></b><span data-dcnode-id="939" style="font-weight: 400;"><span data-dcnode-id="940" instrument_node="">—moisture retention. The healthier your soil is the better it will be at retaining moisture and creating the right conditions to promote growth. Completely dry soil is dead soil and does not absorb moisture well at all. Many people use potting soil from the garden store for their potted garden, which is usually made mostly from sterile peat and </span></span><span data-dcnode-id="937" style="font-weight: 400;"><span data-dcnode-id="938" instrument_node="">Perlite. </span></span><span data-dcnode-id="933" style="font-weight: 400;"><span data-dcnode-id="936" instrument_node="">Normal ground soil comes with an assortment of organic material that help regulate soil moisture levels. </span><strong data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Let’s look at how mother nature tackles this problem organically.</span></strong></span></p><span data-dcnode-id="931" instrument_node="">
</span><h3 data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Underground</span></h3><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" style="font-weight: 400;"><span data-dcnode-id="927" instrument_node="">In natural ecosystem soil you can find partly decomposed sticks, feathers, leaves, insects and sometimes even animals. These act as sponges and hold onto moisture longer than straight soil. </span><strong data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">The presence of this type of material also attracts the organisms that aid with decomposition and improve soil.</span></strong><span data-dcnode-id="924" instrument_node=""> These ground-dwelling critters dig holes, move soil around, and leave liquid fertilizer, in turn bringing even more moisture to the soil. </span></span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" style="font-weight: 400;"><span data-dcnode-id="920" instrument_node="">Root systems of other plants also act as moisture reservoirs, helping contribute to stable soil moisture. </span><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Many plants have roots that drive far down into the soil, pulling water and other helpful nutrients from deeper parts of the ground.</span></strong></span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" style="font-weight: 400;"><span data-dcnode-id="914" instrument_node=""> Many garden heirloom varieties have deep root systems, which is one reason they are resilient in drought conditions. </span></span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" style="font-weight: 400;"><strong data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Mycelium (the fungi body of mushrooms) is also a hero</span></strong><span data-dcnode-id="908" instrument_node=""> when it comes to soil moisture retention. It typically thrives in soil that is not parched and will hold onto moisture longer, helping with moisture maintenance. The mycelium of different fungi often grow around root system of plants creating a mutually beneficial relationship. They have the ability to move nutrients, minerals, and moisture from one organism to the other. </span></span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" style="font-weight: 400;"><span data-dcnode-id="904" instrument_node="">Microorganisms provide a rich environment for life and for cycling nutrients in the soil. If the soil is bone dry many of these will either die off or become inactive.&nbsp;</span></span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" style="font-weight: 400;"><span data-dcnode-id="900" instrument_node="">Remember, </span><strong data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">potting soil from your local garden centre comes sterile.</span></strong></span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="891"><img alt="These four simple tips will help improve soil quality and cause potted plants to flourish and thrive." class="aligncenter wp-image-1303 lazyloaded" data-dcnode-id="894" data-recalc-dims="1" data-sizes="(max-width: 725px) 100vw, 725px" data-src="https://i0.wp.com/growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header-1024x521.jpg?resize=725%2C369" data-srcset="https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?resize=1024%2C521&amp;ssl=1 1024w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?resize=150%2C76&amp;ssl=1 150w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?resize=200%2C102&amp;ssl=1 200w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?resize=750%2C382&amp;ssl=1 750w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?w=2080&amp;ssl=1 2080w" height="369" sizes="(max-width: 725px) 100vw, 725px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header-1024x521.jpg%3Fresize%3D725%252C369&amp;raw" srcset="https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?resize=1024%2C521&amp;ssl=1 1024w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?resize=150%2C76&amp;ssl=1 150w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?resize=200%2C102&amp;ssl=1 200w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?resize=750%2C382&amp;ssl=1 750w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?w=2080&amp;ssl=1 2080w" width="725"><noscript data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">&lt;img class="aligncenter wp-image-1303" src="https://i0.wp.com/growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header-1024x521.jpg?resize=725%2C369" alt="These four simple tips will help improve soil quality and cause potted plants to flourish and thrive." width="725" height="369" srcset="https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?resize=1024%2C521&amp;amp;ssl=1 1024w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?resize=150%2C76&amp;amp;ssl=1 150w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?resize=200%2C102&amp;amp;ssl=1 200w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?resize=750%2C382&amp;amp;ssl=1 750w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Header.jpg?w=2080&amp;amp;ssl=1 2080w" sizes="(max-width: 725px) 100vw, 725px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="890" instrument_node="">
</span><h3 data-dcnode-id="887"><b data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Ground surface</span></b></h3><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" style="font-weight: 400;"><span data-dcnode-id="885" instrument_node="">Directly on top of the ground in a natural ecosystem you can find all sorts of organic debris such as sticks, leaves, dead grass, bark, etc. </span><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">This helps with soil moisture in a few ways:</span></strong></span></p><span data-dcnode-id="880" instrument_node="">
</span><ol data-dcnode-id="859"><span data-dcnode-id="879" instrument_node="">
</span><li data-dcnode-id="876"><span data-dcnode-id="877" style="font-weight: 400;"><span data-dcnode-id="878" instrument_node="">By covering the soil they block the harsh effect of direct sun, which causes the soil to heat up and moisture to evaporate. &nbsp;</span></span></li><span data-dcnode-id="875" instrument_node="">
</span><li data-dcnode-id="872"><span data-dcnode-id="873" style="font-weight: 400;"><span data-dcnode-id="874" instrument_node="">Organic ground cover acts as a protective layer or mat over the soil, preventing held moisture from escaping it too quickly but allowing water to permeate the ground cover. The more organic material on top, the more moisture in is capable of retaining—to a point, of course. If you have too much ground cover the water can’t reach the soil because the ground cover absorbs it all. Stability is in diversity.</span></span></li><span data-dcnode-id="871" instrument_node="">
</span><li data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">As mentioned, organic ground cover acts like a sponge and holds onto moisture, slowly releasing it as needed.</span></li><span data-dcnode-id="868" instrument_node="">
</span><li data-dcnode-id="861"><span data-dcnode-id="867" instrument_node="">Similar to how organic matter in the soil attracts the presence of decomposers, organic material </span><i data-dcnode-id="864" style="font-size: inherit;"><span data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">on top</span></span></i><span data-dcnode-id="862" style="font-weight: 400;"><span data-dcnode-id="863" instrument_node=""> of the soil also attracts the same activity, causing beneficial action to happen in the soil.</span></span></li><span data-dcnode-id="860" instrument_node="">
</span></ol><span data-dcnode-id="858" instrument_node="">
</span><h3 data-dcnode-id="855"><b data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Above ground </span></b></h3><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" style="font-weight: 400;"><span data-dcnode-id="853" instrument_node="">There are typically </span><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">many layers to a healthy ecosystem</span></strong><span data-dcnode-id="850" instrument_node="">. All of them provide some level of shade to the ground floor.</span></span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" style="font-weight: 400;"><span data-dcnode-id="846" instrument_node=""> This is obvious in a forest but also is very much the case in fields, and other open ecosystems. Any amount of shade provided to the soil will reduce the evaporation of moisture and provoke healthier moisture retention. An open patch of soil in nature does not like to stay exposed and is quickly consumed by plant growth when left on its own. </span></span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" style="font-weight: 400;"><span data-dcnode-id="842" instrument_node="">When weeding a garden you remove annoying weeds that compete for resources, but you are also removing a shade source. I’m not suggesting that you stop weeding your garden, but it is good to be aware of the benefits we remove when weeding. Understanding problems and creating solutions helps to improve soil and creates successful gardening. </span></span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" style="font-weight: 400;"><strong data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">There is typically less shade cover in potted plants then ground gardens</span></strong><span data-dcnode-id="836" instrument_node="">, which make soil retention more difficult. You generally are also trying to get as much sun exposure as possible if you are growing any type of fruiting plants, which makes it more difficult.&nbsp;</span></span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="829"><img alt="Simple Solutions to improve soil and cause potted plants to thrive." class="aligncenter wp-image-1304 lazyloaded" data-dcnode-id="832" data-recalc-dims="1" data-sizes="(max-width: 727px) 100vw, 727px" data-src="https://i0.wp.com/growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-1.jpg?resize=727%2C397" data-srcset="https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-1.jpg?w=725&amp;ssl=1 725w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-1.jpg?resize=150%2C82&amp;ssl=1 150w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-1.jpg?resize=200%2C109&amp;ssl=1 200w" height="397" sizes="(max-width: 727px) 100vw, 727px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-1.jpg%3Fresize%3D727%252C397&amp;raw" srcset="https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-1.jpg?w=725&amp;ssl=1 725w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-1.jpg?resize=150%2C82&amp;ssl=1 150w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-1.jpg?resize=200%2C109&amp;ssl=1 200w" width="727"><noscript data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">&lt;img class="aligncenter wp-image-1304" src="https://i0.wp.com/growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-1.jpg?resize=727%2C397" alt="Simple Solutions to improve soil and cause potted plants to thrive." width="727" height="397" srcset="https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-1.jpg?w=725&amp;amp;ssl=1 725w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-1.jpg?resize=150%2C82&amp;amp;ssl=1 150w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-1.jpg?resize=200%2C109&amp;amp;ssl=1 200w" sizes="(max-width: 727px) 100vw, 727px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="828" instrument_node="">
</span><h3 data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Solutions to improve soil conditions</span></h3><span data-dcnode-id="825" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" style="font-weight: 400;"><span data-dcnode-id="824" instrument_node="">Now that we understand the problem of moisture retention,</span><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node=""> let’s look at a few simple ways to improve the soil of potted plants. </span></strong></span></p><span data-dcnode-id="819" instrument_node="">
</span><ol data-dcnode-id="782"><span data-dcnode-id="818" instrument_node="">
</span><li data-dcnode-id="805" style="font-weight: 400;"><span data-dcnode-id="813" style="font-weight: 400;"><span data-dcnode-id="817" instrument_node="">Use or mix organic potting soil with different organic debris and micro organisms into your planting and potting mix. You can do this by mixing your own aged compost—see </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//growingwildroots.com/easiest-composting-method/" onclick="javascript:window.open('http://growingwildroots.com/easiest-composting-method/'); return false;"><span data-dcnode-id="816" instrument_node="">Easiest Composting Method Ever</span></a><span data-dcnode-id="814" instrument_node="">—with potting soil or by simply collecting organic material from outdoors. </span></span><span data-dcnode-id="811" style="font-weight: 400;"><span data-dcnode-id="812" instrument_node="">Pre-bought mixes such as </span></span><a data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2McFLvL" onclick="javascript:window.open('https://amzn.to/2McFLvL'); return false;" rel="nofollow"><span data-dcnode-id="809" style="font-weight: 400;"><span data-dcnode-id="810" instrument_node="">Super Soil Organic Concentrate</span></span></a><span data-dcnode-id="806" style="font-weight: 400;"><span data-dcnode-id="807" instrument_node=""> can be bought at most garden stores. </span></span></li><span data-dcnode-id="804" instrument_node="">
</span><li data-dcnode-id="801" style="font-weight: 400;"><span data-dcnode-id="802" style="font-weight: 400;"><span data-dcnode-id="803" instrument_node="">Increase the pot size to allow more moisture to be accessible to your potted plant. The difference between a 2 Gallon (7.6L) &nbsp;pot and 7 gallon (25.5L) pot can be having to water half as often. </span></span></li><span data-dcnode-id="800" instrument_node="">
</span><li data-dcnode-id="792" style="font-weight: 400;"><span data-dcnode-id="798" style="font-weight: 400;"><span data-dcnode-id="799" instrument_node="">Water plants in the early morning or at night to allow the water to soak into the soil. The moisture will be retained for longer periods before it gets consumed and dries up. If you can set the pots up on a drip system it is easy to put in a automatic water timer. I use the </span></span><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2KnMwZX" onclick="javascript:window.open('https://amzn.to/2KnMwZX'); return false;" rel="nofollow"><span data-dcnode-id="796" style="font-weight: 400;"><span data-dcnode-id="797" instrument_node="">Instapark PWT-07</span></span></a><span data-dcnode-id="793" style="font-weight: 400;"><span data-dcnode-id="794" instrument_node=""> water timers, which save tons of time and stress.</span></span></li><span data-dcnode-id="791" instrument_node="">
</span><li data-dcnode-id="788" style="font-weight: 400;"><span data-dcnode-id="789" style="font-weight: 400;"><span data-dcnode-id="790" instrument_node="">Create a ground cover! This is probably one of the easiest and most effective ways to increase moisture retention in potted plants. Don’t have access to your own mulch, leaves, grass cuttings, or aged wood chips? Get creative! </span></span></li><span data-dcnode-id="787" instrument_node="">
</span><li data-dcnode-id="784" style="font-weight: 400;"><span data-dcnode-id="785" style="font-weight: 400;"><span data-dcnode-id="786" instrument_node="">What food are you already eating? Chop up those banana peels into 1”(2.5cm) pieces and toss them in your potted plants. After a day or two in the sun they will be dried and ideal to help improve soil. Garlic or onion peels are great to use because they spread out and are light in colour, reflecting more sun from hitting the soil. Let some leafy greens go bad in the fridge? Give them a new life covering the soil for your potted tomatoes. Extra potato peels, grape stems, or watermelon rinds? Use them too. Just remember not to be adding too much slop as a cover as it can attract the wrong kinds of pests. &nbsp;&nbsp;</span></span></li><span data-dcnode-id="783" instrument_node="">
</span></ol><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="775"><strong data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">Pin:&nbsp;</span><img alt="These four simple tips will help improve soil quality and cause potted plants to flourish and thrive. " class="aligncenter wp-image-1300 lazyloaded" data-dcnode-id="779" data-recalc-dims="1" data-sizes="(max-width: 406px) 100vw, 406px" data-src="https://i0.wp.com/growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin-580x1024.jpg?resize=406%2C717" data-srcset="https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin.jpg?resize=580%2C1024&amp;ssl=1 580w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin.jpg?resize=85%2C150&amp;ssl=1 85w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin.jpg?resize=170%2C300&amp;ssl=1 170w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin.jpg?w=714&amp;ssl=1 714w" height="717" sizes="(max-width: 406px) 100vw, 406px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin-580x1024.jpg%3Fresize%3D406%252C717&amp;raw" srcset="https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin.jpg?resize=580%2C1024&amp;ssl=1 580w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin.jpg?resize=85%2C150&amp;ssl=1 85w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin.jpg?resize=170%2C300&amp;ssl=1 170w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin.jpg?w=714&amp;ssl=1 714w" width="406"><noscript data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">&lt;img class="aligncenter wp-image-1300" src="https://i0.wp.com/growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin-580x1024.jpg?resize=406%2C717" alt="These four simple tips will help improve soil quality and cause potted plants to flourish and thrive. " width="406" height="717" srcset="https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin.jpg?resize=580%2C1024&amp;amp;ssl=1 580w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin.jpg?resize=85%2C150&amp;amp;ssl=1 85w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin.jpg?resize=170%2C300&amp;amp;ssl=1 170w, https://i0.wp.com/www.growingwildroots.com/wp-content/uploads/2018/08/Improve-Soil-Pin.jpg?w=714&amp;amp;ssl=1 714w" sizes="(max-width: 406px) 100vw, 406px" data-recalc-dims="1" /&gt;</span></noscript></strong></p><span data-dcnode-id="774" instrument_node="">
