</span><p class="has-text-align-center" data-dcnode-id="1636"><strong data-dcnode-id="1637"><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0864RHT36%3Ftag%3Dprettyac-20" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1639" instrument_node="">Victorinox Pruning Knife on Amazon</span></a></strong></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">However, for some older fruit trees and older shrubs, a small pruning saw like a Grecian saw that has a curved blade or the English pruning saw with tapered blades and teeth on both edges can be very useful in removing green wood and larger branches.</span></p><span data-dcnode-id="1632" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1628"><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B005PG7462%3Ftag%3Dprettyac-20" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Felco Pruning Saw&nbsp;on Amazon</span></strong></a></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1626" instrument_node="">These should be all the tools necessary to allow you to begin pruning most plants in ordinary home gardens other than </span><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/gear/tools-and-supplies/gardening-tote-bags-reviewed/"><strong data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">perhaps a tool tote</span></strong></a><span data-dcnode-id="1622" instrument_node="">.</span></p><span data-dcnode-id="1620" instrument_node="">
</span><h2 data-dcnode-id="1618" id="General-Pruning-Tips"><span data-dcnode-id="1619" instrument_node="">General Pruning Tips</span></h2><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">I recommend that gardeners who need to learn more about pruning to find the specific pruning instructions for each plant in their garden. I consider each plant we add to our garden as an investment and like any investment I want the care manual.</span></p><span data-dcnode-id="1614" instrument_node="">
</span></div></div><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">I want to know what it needs to eat and drink, where it likes to rest, in the shade or in partial sun or full, and how it needs to be groomed (pruned).</span></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Doing some basic research before you buy a plant is a good idea for all gardeners. Because pruning is best done as a young plant grows, learning what type and how to prune your plant is key. And make sure to allow enough space for mature dimensions at planting time.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">In the following segments,&nbsp;I give some examples of different basic garden plants and how to prune each one from initial planting to routine maintenance. There are also some great garden books available and I will highlight a few that we own.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><h2 data-dcnode-id="1600" id="Pruning-Roses"><span data-dcnode-id="1601" instrument_node="">Pruning Roses</span></h2><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Every gardener knows how incredibly beautiful a rose bush can be or how straggly and homely an uncared-for rose can be! And for this article, it’s also important to note that while roses could be grouped with other shrubs and climbing bushes, they are such a large category and one that is beloved by many gardeners.</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">There is also a lot of variation in cultivated rose species – from sprawling giants to petite miniatures, some that bloom at very specific times, and others that bloom the entire summer.</span></p><span data-dcnode-id="1593" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1588"><figure class="aligncenter" data-dcnode-id="1589"><img alt="A woman wearing gloves and holding the stem of a rose in one hand and clippers in the other smiles while the prunes the plants." class="wp-image-14 perfmatters-lazy" data-dcnode-id="1592" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/prunning-roses.jpg" data-pin-nopin="true" data-sizes="(max-width: 680px) 100vw, 680px" data-src="https://gardenerspath.com/wp-content/uploads/2014/08/prunning-roses.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2014/08/prunning-roses.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/prunning-roses-300x199.jpg 300w" height="452" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='680'%20height='452'%20viewBox='0%200%20680%20452'%3E%3C/svg%3E" width="680"><noscript data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">&lt;img width="680" height="452" data-pin-nopin="true" src="https://gardenerspath.com/wp-content/uploads/2014/08/prunning-roses.jpg" alt="A woman wearing gloves and holding the stem of a rose in one hand and clippers in the other smiles while the prunes the plants." class="wp-image-14" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/prunning-roses.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/prunning-roses-300x199.jpg 300w" sizes="(max-width: 680px) 100vw, 680px" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/prunning-roses.jpg"&gt;</span></noscript></figure></div><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Again, best results will be gained by knowing what your specific rose species requires. But there are three main categories that cover most varieties: modern bush hybrid roses, species and shrub roses, and climbing, rambling types.</span></p><span data-dcnode-id="1584" instrument_node="">
</span><h3 data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Modern Bush Roses</span></h3><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Basic techniques begin with buying plants that have three or four strong shoots and a well developed root system. Before you even plant, be sure to trim long, coarse, or damaged roots.</span></p><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">If you’re planting in autumn or early winter, cut back damaged or unripe growth at the end of the shoots behind the terminal end bud. Just chop them off neatly to allow new bushier growth.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1570"><figure class="aligncenter" data-dcnode-id="1571"><img alt="A woman prunes rose bushes with clippers, and she wears long sleeves and protective gloves." class="wp-image-742 perfmatters-lazy" data-dcnode-id="1574" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes.jpg" data-pin-nopin="true" data-sizes="(max-width: 680px) 100vw, 680px" data-src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-300x200.jpg 300w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-600x401.jpg 600w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-175x117.jpg 175w" height="454" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='680'%20height='454'%20viewBox='0%200%20680%20454'%3E%3C/svg%3E" width="680"><noscript data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">&lt;img width="680" height="454" data-pin-nopin="true" src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes.jpg" alt="A woman prunes rose bushes with clippers, and she wears long sleeves and protective gloves." class="wp-image-742" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-300x200.jpg 300w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-600x401.jpg 600w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-175x117.jpg 175w" sizes="(max-width: 680px) 100vw, 680px" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes.jpg"&gt;</span></noscript></figure></div><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">This initial hard pruning will root out any damaged shoots and will encourage vigorous growth in the spring. Inexperienced gardeners often fear “hurting” their new precious rose, but if they don’t give it that hard initial pruning, they will have a weaker plant in the spring.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1566" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><div class="mailmunch-forms-in-post-middle" data-dcnode-id="1565" style="display: none !important;"></div><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1563" instrument_node="">Cut back to about six inches of shoot before you plant the rose. Follow other good planting techniques as per our </span><strong data-dcnode-id="1560"><a data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/plants/flowers/grow-roses/"><span data-dcnode-id="1562" instrument_node="">guide to growing roses</span></a></strong><span data-dcnode-id="1559" instrument_node="">. Then watch your new rose grow throughout the first year of spring and summer.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">In mid to late autumn it’s a good time to cut out unripe growth or shoots that didn’t flourish and to tip (cut back) stems carrying faded flowers. In an exposed garden, where a lot of wind blows, it’s a good idea to shorten each stem by about one-third.</span></p><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">This basic maintenance pruning should have you cutting back each stem to a bud that is between six and 10 inches above ground level. Cut back weak growth more severely than stronger stems, and to encourage the replacement of old wood with new, cut one of two main stems of oldest wood right down to the base.</span></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Now on a younger plant, you won’t have as much old wood, maybe not any on a one-year-old rose.</span></p><span data-dcnode-id="1548" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1543"><figure class="aligncenter" data-dcnode-id="1544"><img alt="Gloved hands and arms protected by long sleeves, pruning thorny roses." class="wp-image-743 perfmatters-lazy" data-dcnode-id="1547" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-2.jpg" data-pin-nopin="true" data-sizes="(max-width: 680px) 100vw, 680px" data-src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-2.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-2.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-2-300x200.jpg 300w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-2-600x401.jpg 600w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-2-175x117.jpg 175w" height="454" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='680'%20height='454'%20viewBox='0%200%20680%20454'%3E%3C/svg%3E" width="680"><noscript data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">&lt;img width="680" height="454" data-pin-nopin="true" src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-2.jpg" alt="Gloved hands and arms protected by long sleeves, pruning thorny roses." class="wp-image-743" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-2.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-2-300x200.jpg 300w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-2-600x401.jpg 600w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-2-175x117.jpg 175w" sizes="(max-width: 680px) 100vw, 680px" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-rose-bushes-2.jpg"&gt;</span></noscript></figure></div><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">As you make your pruning cuts, look at the direction the stem is growing in and make your cuts angled to allow them to grow out or in. A slight angle on your cut can change the direction of a stem or branch. Look at your rose bush and assess the directions you want the stems to grow.</span></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Remember, roses don’t have to be one round shape, they can branch off with longer main stems and have shorter stems along several longer ones.</span></p><span data-dcnode-id="1536" instrument_node="">
</span><p data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node="">You can virtually sculpt the shape of your rose bush by the choice of where and what direction you make your pruning cut.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><h3 data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Hybrid Roses</span></h3><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">These roses are deciduous thorny shrubs and they flower in summer and early autumn. Most grow to be three to four feet high with stiff, upright stems and large flowers.</span></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1522"><strong data-dcnode-id="1524"><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/how-to/pruning/roses/"><span data-dcnode-id="1526" instrument_node="">The aim of good pruning</span></a></strong><span data-dcnode-id="1523" instrument_node=""> is to encourage a good floral abundance, with the bushes planted in beds or mixed in with other ornamental plants.</span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">These hybrids vary in vigor and growth patterns depending upon the breeding behind them, so monitoring these shrubs is important to ensure beautiful flowers and maintain healthy rose bushes.</span></p><span data-dcnode-id="1518" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1513"><figure class="aligncenter" data-dcnode-id="1514"><img alt="Pruning hybrid roses, wearing gloves for protection." class="wp-image-744 perfmatters-lazy" data-dcnode-id="1517" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-hybrid-roses.jpg" data-pin-nopin="true" data-sizes="(max-width: 680px) 100vw, 680px" data-src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-hybrid-roses.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-hybrid-roses.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-hybrid-roses-300x200.jpg 300w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-hybrid-roses-600x401.jpg 600w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-hybrid-roses-175x117.jpg 175w" height="454" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='680'%20height='454'%20viewBox='0%200%20680%20454'%3E%3C/svg%3E" width="680"><noscript data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">&lt;img width="680" height="454" data-pin-nopin="true" src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-hybrid-roses.jpg" alt="Pruning hybrid roses, wearing gloves for protection." class="wp-image-744" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-hybrid-roses.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-hybrid-roses-300x200.jpg 300w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-hybrid-roses-600x401.jpg 600w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-hybrid-roses-175x117.jpg 175w" sizes="(max-width: 680px) 100vw, 680px" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-hybrid-roses.jpg"&gt;</span></noscript></figure></div><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">As these roses bloom during the summer months, they are capable of producing more flowers if fading or decaying roses are removed, and the entire stem (or truss) that held the flower is cut off at the first strong well placed eye (or new bud growth).</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">So when maintaining your rose garden, it’s important to carry with you a short hand pruner to undertake small daily pruning tasks. I also recommend garden gloves, since you will be working with thorny stems.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><h3 data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Species and Shrub Roses</span></h3><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">These roses have great variation in size, growth, and flowering performance and generally only bloom once during a growing season.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Because of this, and because these plants generally have a freer and more naturalized look about them, they require less maintenance pruning. Again, before you plant, prepare as above for other rose plantings.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1496" instrument_node="">You will not </span><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/plants/flowers/deadhead-roses/"><strong data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">deadhead (remove spent flowers)</span></strong></a><span data-dcnode-id="1492" instrument_node=""> during the blooming season, and the only pruning you need to do to maintain these plants is light to moderate – to remove diseased branches or stems and to contain the bush to the area you have assigned it.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1485"><figure class="aligncenter" data-dcnode-id="1486"><img alt="Pruning shrub roses near the base of the plant, with clean and sharp tools." class="wp-image-745 perfmatters-lazy" data-dcnode-id="1489" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-shrub-roses.jpg" data-pin-nopin="true" data-sizes="(max-width: 680px) 100vw, 680px" data-src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-shrub-roses.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-shrub-roses.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-shrub-roses-300x200.jpg 300w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-shrub-roses-600x401.jpg 600w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-shrub-roses-175x117.jpg 175w" height="454" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='680'%20height='454'%20viewBox='0%200%20680%20454'%3E%3C/svg%3E" width="680"><noscript data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">&lt;img width="680" height="454" data-pin-nopin="true" src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-shrub-roses.jpg" alt="Pruning shrub roses near the base of the plant, with clean and sharp tools." class="wp-image-745" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-shrub-roses.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-shrub-roses-300x200.jpg 300w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-shrub-roses-600x401.jpg 600w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-shrub-roses-175x117.jpg 175w" sizes="(max-width: 680px) 100vw, 680px" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-shrub-roses.jpg"&gt;</span></noscript></figure></div><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Prune in late winter or early spring by cutting back up to a third of the vigorous shoots that developed during the preceding growing season. At the same time, you can cut the older wood to about six inches.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">You do not want to cut back as far on newer shoots as this could destroy the nice arching aspect of these roses and reduce the flowering in the summer.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Remember, new shoots produce the largest, most attractive flowers. Old shoots support the structure of the plant.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">The main purpose of pruning for these plants is aimed to providing space and to cut out older wood to allow the development of new vigorous shoots from the base of the plant.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Your maintenance pruning plan is to remove dead and diseased wood in the late winter or early spring, shorten by a third long new shoots and cut back laterals on shoots that have flowered already to about four to six inches.</span></p><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">And then in mid to late autumn cut back very long growths and of course any diseased stems or shoots that you notice.</span></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Always keeping a lookout for signs of disease when you prune is a good tip. And again, there are so many variations in rose categories, that it’s difficult to pinpoint common practices that affect every single variety.</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Knowing and figuring out what each species or rose plant requires is up to the gardener when he purchases and plants a distinct flower.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">For instance ‘Nevada’ is a modern shrub rose that needs almost no pruning. If in doubt, contact a good rose breeder and ask for specific pruning techniques for your rose bush.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1456" instrument_node="">I always keep a </span><strong data-dcnode-id="1453"><a data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/gear/gardening-books/best-gardening-journals/"><span data-dcnode-id="1455" instrument_node="">gardening journal</span></a></strong><span data-dcnode-id="1452" instrument_node=""> with pages for each plant we purchase detailing planting dates, maintenance, nutrition needs, etc.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><h3 data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">Climbing Rambling Roses</span></h3><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">The final main category of roses are those climbers and ramblers that have very different characters. Some grow large enough to be virtual trees, some bloom only once, others produce prodigious displays of flowers the entire summer.</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">But all of these respond well to a regular programming of control and management and this is often the only way to accommodate them in any garden!</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">The result of good pruning is plants that will produce flowers along much of the stem length and not merely at the tip. But this is also the plant that requires the most skill and education on good pruning technique.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Again, there are three main types of ramblers that each require different techniques. Identify which type of rambling rose you have purchased and find out the best technique for your unique variety.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">A good example and common rambler in home gardens these days are hybrid tea roses. These repeat flower during a season, show fair to good resistance to disease, and are easily trained against walls and fences. They reach a short height of four to five feet, so are excellent for smaller gardens.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><div class="wp-block-image wp-image-746 size-full" data-dcnode-id="1425"><figure class="aligncenter size-full" data-dcnode-id="1426"><img alt="An orange and yellow hybrid tea rose blossom." class="wp-image-746 perfmatters-lazy" data-dcnode-id="1431" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/hybrid-tea-rose.jpg" data-pin-nopin="true" data-sizes="(max-width: 450px) 100vw, 450px" data-src="https://gardenerspath.com/wp-content/uploads/2014/08/hybrid-tea-rose.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2014/08/hybrid-tea-rose.jpg 450w, https://gardenerspath.com/wp-content/uploads/2014/08/hybrid-tea-rose-240x300.jpg 240w, https://gardenerspath.com/wp-content/uploads/2014/08/hybrid-tea-rose-94x117.jpg 94w" height="562" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='450'%20height='562'%20viewBox='0%200%20450%20562'%3E%3C/svg%3E" width="450"><noscript data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">&lt;img width="450" height="562" data-pin-nopin="true" src="https://gardenerspath.com/wp-content/uploads/2014/08/hybrid-tea-rose.jpg" alt="An orange and yellow hybrid tea rose blossom." class="wp-image-746" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/hybrid-tea-rose.jpg 450w, https://gardenerspath.com/wp-content/uploads/2014/08/hybrid-tea-rose-240x300.jpg 240w, https://gardenerspath.com/wp-content/uploads/2014/08/hybrid-tea-rose-94x117.jpg 94w" sizes="(max-width: 450px) 100vw, 450px" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/hybrid-tea-rose.jpg"&gt;</span></noscript><figcaption data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Hybrid tea roses bloom profusely during the summer months, and special care should be given to their initial pruning.</span></figcaption></figure></div><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">At planting, do not hard prune back stems. Trim any long roots and only tip back damaged ends of stems and any weak side shoots. Begin training the rose as you plant it.</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Do not force stiff stems, but whenever possible slant your pruning cuts in horizontal or angled cuts to encourage growth in that direction. Between mid-autumn and spring, after the first year, cut back stems that flowered the previous year to about six inches.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Cutting back these leaders allows new vigorous shoots and occasionally removing old stems at near ground level will encourage even more new growth.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1415" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">With rambling roses, you need to provide strong support in the form of either tripods, or rustic poles and metal frames, brick walls, or other older trees. Flexible stems can be tied up as necessary to maintain height until the plant itself develops some strong older shoots.</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Training climbing roses requires patience and a good eye for direction, support, and art. It’s fun, but challenging and it’s often why gardeners fear these plants in their garden.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Remember, pruning can be done wrong, and the plant will still survive and you start in a different direction with the plant. If all else fails, cut way back and start again!</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1400"><strong data-dcnode-id="1402"><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/how-to/pruning/roses/"><span data-dcnode-id="1404" instrument_node="">Read more about pruning roses here</span></a></strong><span data-dcnode-id="1401" instrument_node="">.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><h2 data-dcnode-id="1397" id="Pruning-Shrubs"><span data-dcnode-id="1398" instrument_node="">Pruning Shrubs</span></h2><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Shrubbery is the cornerstone of all garden beds. It’s what gives the garden structure, height, and is the base planting in most beds. Shrubs are either deciduous (lose their leaves each year) or evergreen.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1388"><a data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/how-to/pruning/ornamental-trees-and-shrubs/" title="Pruning Ornamental Trees and Shrubs"><strong data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Many ornamental shrubs require only minimal pruning</span></strong></a><span data-dcnode-id="1389" instrument_node=""> from one year to the next with just the cutting out of dead, diseased or damaged wood as soon as it is noticed.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><div class="wp-block-image wp-image-747 size-full" data-dcnode-id="1380"><figure class="aligncenter" data-dcnode-id="1381"><img alt="Magonolias blooming in early spring." class="wp-image-747 perfmatters-lazy" data-dcnode-id="1386" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Magonolias-in-early-spring.jpg" data-pin-nopin="true" data-sizes="(max-width: 680px) 100vw, 680px" data-src="https://gardenerspath.com/wp-content/uploads/2014/08/Magonolias-in-early-spring.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Magonolias-in-early-spring.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/Magonolias-in-early-spring-300x200.jpg 300w, https://gardenerspath.com/wp-content/uploads/2014/08/Magonolias-in-early-spring-600x401.jpg 600w, https://gardenerspath.com/wp-content/uploads/2014/08/Magonolias-in-early-spring-175x117.jpg 175w" height="454" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='680'%20height='454'%20viewBox='0%200%20680%20454'%3E%3C/svg%3E" width="680"><noscript data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">&lt;img width="680" height="454" data-pin-nopin="true" src="https://gardenerspath.com/wp-content/uploads/2014/08/Magonolias-in-early-spring.jpg" alt="Magonolias blooming in early spring." class="wp-image-747" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Magonolias-in-early-spring.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/Magonolias-in-early-spring-300x200.jpg 300w, https://gardenerspath.com/wp-content/uploads/2014/08/Magonolias-in-early-spring-600x401.jpg 600w, https://gardenerspath.com/wp-content/uploads/2014/08/Magonolias-in-early-spring-175x117.jpg 175w" sizes="(max-width: 680px) 100vw, 680px" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Magonolias-in-early-spring.jpg"&gt;</span></noscript><figcaption data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">When properly pruned, magnolias, dogwoods, and some other blooming trees should have graceful, wide sweeping branches with plenty of “white space” to let sunlight gleam through. Think Japanese garden.</span></figcaption></figure></div><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">However, some shrubs need regular pruning to enhance the decorative impact of the plant, the flowering strength, and the overall shape of the plant in the gardeners design.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><h3 data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Deciduous Shrubs</span></h3><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">As with most plants, focusing your pruning on the early young years of the plant establishes a well balanced framework. Some shrubs do not produce new growth from the base, magnolias and witch hazels being examples of this, and so just giving them a haircut occasionally is enough to keep them looking groomed and healthy.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">For these plants, at planting remove any weak growth. And then in the spring of the second year, make any corrective cuts necessary to begin laying out the shape that you desire in the shrub.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Look at the basic plant and remove any laterals or extensions growths that are too closely spaced. This lays the basic framework for how and in what direction your shrub will flourish. In the third and following years, little more than routine pruning to remove dead or diseased wood is required.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><div class="wp-block-image wp-image-748 size-full" data-dcnode-id="1357"><figure class="aligncenter size-full" data-dcnode-id="1358"><img alt="Pruning a young dogwood tree with long loppers." class="wp-image-748 perfmatters-lazy" data-dcnode-id="1363" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Dogwood.jpg" data-pin-nopin="true" data-sizes="(max-width: 450px) 100vw, 450px" data-src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Dogwood.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Dogwood.jpg 450w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Dogwood-225x300.jpg 225w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Dogwood-88x117.jpg 88w" height="600" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='450'%20height='600'%20viewBox='0%200%20450%20600'%3E%3C/svg%3E" width="450"><noscript data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">&lt;img width="450" height="600" data-pin-nopin="true" src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Dogwood.jpg" alt="Pruning a young dogwood tree with long loppers." class="wp-image-748" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Dogwood.jpg 450w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Dogwood-225x300.jpg 225w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Dogwood-88x117.jpg 88w" sizes="(max-width: 450px) 100vw, 450px" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Dogwood.jpg"&gt;</span></noscript><figcaption data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">Sometimes dogwoods and other similar species can have minds of their own. It’s best to get rid of any competing trunk structures, unless you think you can weave these into a special design.</span></figcaption></figure></div><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">These shrubs sometimes will produce what I call an independent shoot that just zooms out from the base. You may be able to train them in to your plan and basic framework, but if it’s not possible, just cut them out at the base to avoid the branches from becoming congested and not having the balance you want.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1352" instrument_node="">Many of these deciduous shrubs produce flowers in spring or early summer. </span><strong data-dcnode-id="1349"><a data-dcnode-id="1350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/plants/ornamentals/grow-forsythia/"><span data-dcnode-id="1351" instrument_node="">Forsythia is a vivid common example</span></a></strong><span data-dcnode-id="1348" instrument_node="">. To maintain their profuse floral displays, you should cut out a proportion of the wood in late spring or early summer. If left unpruned, these plants often have lots of twiggy growth and sparse spattering of flowers.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">The annual cutting out of dead or old wood allows development of new replacement shoots low down on the shrub and these new shoots will flower freely the following year. This annual pruning keeps the shrub shapely and compact but it’s more imperative to ensure good floral display.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Most plants purchased at a nursery will have had a couple of years of good framework pruning to establish a good structure from the beginning. But as these shrubs flower, new growth develops below the flowering wood.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">The strongest shoots are those lowest on the stem, and these are the best to select as shoots when pruning. Leave them and encourage their growth by removing old wood. Cut the old and leave the young is the best rule of thumb for flowering shrubs.</span></p><span data-dcnode-id="1337" instrument_node="">
</span><h3 data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Evergreen Shrubs</span></h3><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Every garden has evergreen shrubs. All of them have widely varying needs for pruning and you should consult your garden store or nursery for exact pruning advice or consult a good gardening book.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1326"><figure class="aligncenter" data-dcnode-id="1327"><img alt="A man on a ladder wears a protective head covering to prune hedges with an electric cutting tool." class="wp-image-750 perfmatters-lazy" data-dcnode-id="1330" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Evergreen-Shrubs.jpg" data-pin-nopin="true" data-sizes="(max-width: 680px) 100vw, 680px" data-src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Evergreen-Shrubs.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Evergreen-Shrubs.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Evergreen-Shrubs-300x199.jpg 300w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Evergreen-Shrubs-600x397.jpg 600w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Evergreen-Shrubs-175x117.jpg 175w" height="450" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='680'%20height='450'%20viewBox='0%200%20680%20450'%3E%3C/svg%3E" width="680"><noscript data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">&lt;img width="680" height="450" data-pin-nopin="true" src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Evergreen-Shrubs.jpg" alt="A man on a ladder wears a protective head covering to prune hedges with an electric cutting tool." class="wp-image-750" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Evergreen-Shrubs.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Evergreen-Shrubs-300x199.jpg 300w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Evergreen-Shrubs-600x397.jpg 600w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Evergreen-Shrubs-175x117.jpg 175w" sizes="(max-width: 680px) 100vw, 680px" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-Evergreen-Shrubs.jpg"&gt;</span></noscript></figure></div><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1324" instrument_node="">Pruning of evergreens can vary from broadleaf examples like </span><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/plants/herbs/grow-lavender/"><strong data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">lavender</span></strong></a><span data-dcnode-id="1320" instrument_node="">, </span><a data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/plants/landscape-trees/identifying-conifers/"><strong data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">dwarf conifers</span></strong></a><span data-dcnode-id="1316" instrument_node="">, and even </span><a data-dcnode-id="1313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/plants/ornamentals/grow-camellia/"><strong data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">camellias</span></strong></a><span data-dcnode-id="1312" instrument_node=""> and </span><a data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/plants/ornamentals/grow-rhododendrons/"><strong data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">rhododendrons</span></strong></a><span data-dcnode-id="1308" instrument_node="">. Most of them require minimal maintenance but again you can’t lump them all together.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">If left to their own devices there are a number of small evergreen shrubs that tend to not do well. They will produce fewer and fewer flowers and eventually become quite bare at the base. It’s almost impossible to rejuvenate some of them successfully once they have been neglected.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Lavender is a good example of this. These shrubs need to be cut back hard in their first year and in following years in mid-spring, just as new growth is starting.</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Although dead flowers can be removed in autumn, in cold areas it is best leave them on to protect the plant from severe cold. Pruning in mid-spring works best. And then new growth that year will emerge.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">For older plants with bare bases, it’s almost better to dig up and discard plant and start anew!</span></p><span data-dcnode-id="1294" instrument_node="">
</span><div class="wp-container-3 wp-block-group alignwide" data-dcnode-id="1203"><div class="wp-block-group__inner-container" data-dcnode-id="1204"><span data-dcnode-id="1293" instrument_node="">
</span><h2 data-dcnode-id="1291" id="More-Gardening-Tips"><span data-dcnode-id="1292" instrument_node="">More Gardening Tips</span></h2><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">I cannot emphasize enough for the beginning gardener the need to keep good written records and notes. I suggest you purchase a nice binder with pockets, dividers, etc.</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">For each plant that you buy, create a folder. Yes, an entire folder! In this folder write the correct scientific name. Consult gardening books, online sites, your local nursery or extension office for advice.</span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Treat each plant as an investment of time, love, resources, and labour. Write down the care instructions, the pruning times, the garden placement. Identify your plants, get to know them well, care for them properly.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Record when they bloom, what they were fed.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1277" instrument_node="">A good gardener goes into his or her garden each day and does regular daily tasks of </span><a data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/plants/flowers/deadhead-blooming-plants/"><strong data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">deadheading</span></strong></a><span data-dcnode-id="1273" instrument_node="">, weeding, supporting, feeding, and watering as necessary.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">I think often, too much emphasis is placed on watering and feeding and not enough on grooming and removing diseased and dead branches, stems, and flowers.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Remove the dead, care for the healthy, encourage new growth and you’ll have a magnificent beautifully groomed garden that will reward you with hours and years of enjoyment.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Do the research you need to find healthy plants, and then care for them like your children and your pets. Your garden plants are living beings and need nurturing to excel and reach their full potential!</span></p><span data-dcnode-id="1262" instrument_node="">
