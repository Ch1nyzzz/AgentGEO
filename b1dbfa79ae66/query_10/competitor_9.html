</span><div class="wp-container-1 wp-block-group alignwide" data-dcnode-id="1930"><div class="wp-block-group__inner-container" data-dcnode-id="1931"><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">When to prune, how to prune, where to prune? There’s no other task that strikes fear into the heart of most amateur gardeners as does the subject of pruning plants.</span></p><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">Yet successful pruning can be among the most satisfying of garden tasks, because the results can be spectacular. Done correctly, it can yield an abundance of flowers, foliage, and fruit.</span></p><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">However, done incorrectly, it can result in damaged plants, disappointment, and failure! No wonder we fear the process.</span></p><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">While pruning successfully may appear complicated and difficult, the fact is that it is no more complex than the many other gardening activities that gardeners engage in regularly.</span></p><span data-dcnode-id="1953" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1943"><figure class="aligncenter size-full" data-dcnode-id="1944"><div class="dpsp-pin-it-wrapper wp-image-62540 perfmatters-lazy loading" data-dcnode-id="1947"><img alt="A human hand holds a set of clippers while trimming a shrub." class="error" data-dcnode-id="1952" data-pin-description="When, why, and how should you prune shrubs and woody plants? As well as for maintaining an aesthetically pleasing shape, pruning is important for plant health as well. Learn the right way to prune your plants and shrubs for optimal health in this guide now on Gardener's Path. #pruning #gardening #gardenerspath" data-pin-id="325174035603234828" data-pin-media="https://gardenerspath.com/wp-content/uploads/2021/04/The-Basics-of-Pruning-Shrubs-and-Woody-Plants-Pin2.jpg" data-pin-title="The Basics of Pruning Shrubs and Woody Plants" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://gardenerspath.com/wp-content/uploads/2021/04/The-Basics-of-Pruning-Shrubs-and-Woody-Plants-Pin2.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2021/04/The-Basics-of-Pruning-Shrubs-and-Woody-Plants-Pin2.jpg 800w, https://gardenerspath.com/wp-content/uploads/2021/04/The-Basics-of-Pruning-Shrubs-and-Woody-Plants-Pin2-200x300.jpg 200w, https://gardenerspath.com/wp-content/uploads/2021/04/The-Basics-of-Pruning-Shrubs-and-Woody-Plants-Pin2-683x1024.jpg 683w, https://gardenerspath.com/wp-content/uploads/2021/04/The-Basics-of-Pruning-Shrubs-and-Woody-Plants-Pin2-768x1152.jpg 768w" data-was-processed="true" height="1200" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/wp-content/uploads/2021/04/The-Basics-of-Pruning-Shrubs-and-Woody-Plants-Pin2.jpg&amp;raw" srcset="https://gardenerspath.com/wp-content/uploads/2021/04/The-Basics-of-Pruning-Shrubs-and-Woody-Plants-Pin2.jpg 800w, https://gardenerspath.com/wp-content/uploads/2021/04/The-Basics-of-Pruning-Shru </span><p class="has-text-align-center has-small-font-size" data-dcnode-id="1933"><span data-dcnode-id="1941" instrument_node=""> </span><em data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">We link to vendors to help you find relevant products. If you buy from one of our links,&nbsp;</span></em><a data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/affiliate-disclosure/"><em data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">we may earn a commission</span></em></a><em data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">.</span></em></p><span data-dcnode-id="1932" instrument_node="">
</span></div></div><span data-dcnode-id="1929" instrument_node="">
</span><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">It’s all about learning the correct methods for each type and variety of plant. There are distinct differences and the answer lies in what all good gardeners already know: Understand each and every one of your plants and what they need to thrive.</span></p><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1920"><span data-dcnode-id="1925" instrument_node="">Along with quality soil, the right lighting, and </span><strong data-dcnode-id="1922"><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/how-to/composting/plant-nutrients/"><span data-dcnode-id="1924" instrument_node="">essential nutrients,</span></a></strong><span data-dcnode-id="1921" instrument_node=""> good pruning is just another tool in the gardener’s toolshed and one that has some easy basic steps to master. Good pruning will result in a healthier, more vigorous garden.</span></p><span data-dcnode-id="1919" instrument_node="">
</span><div class="scbb-content-box scbb-content-box-green" data-dcnode-id="1879"><span data-dcnode-id="1918" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">What You’ll Learn</span></h2><span data-dcnode-id="1915" instrument_node="">
</span><ul data-dcnode-id="1882"><li data-dcnode-id="1911"><strong data-dcnode-id="1912"><a data-dcnode-id="1913" href="#What-is-Pruning"><span data-dcnode-id="1914" instrument_node="">What Is Pruning?</span></a></strong></li><li data-dcnode-id="1907"><strong data-dcnode-id="1908"><a data-dcnode-id="1909" href="#Why-Prune"><span data-dcnode-id="1910" instrument_node="">Why Prune?</span></a></strong></li><li data-dcnode-id="1903"><strong data-dcnode-id="1904"><a data-dcnode-id="1905" href="#When-to-Prune"><span data-dcnode-id="1906" instrument_node="">When to Prune</span></a></strong></li><li data-dcnode-id="1899"><strong data-dcnode-id="1900"><a data-dcnode-id="1901" href="#Tools-for-Pruning"><span data-dcnode-id="1902" instrument_node="">Tools for Pruning</span></a></strong></li><li data-dcnode-id="1895"><strong data-dcnode-id="1896"><a data-dcnode-id="1897" href="#General-Pruning-Tips"><span data-dcnode-id="1898" instrument_node="">General Pruning Tips</span></a></strong></li><li data-dcnode-id="1891"><strong data-dcnode-id="1892"><a data-dcnode-id="1893" href="#Pruning-Roses"><span data-dcnode-id="1894" instrument_node="">Pruning Roses</span></a></strong></li><li data-dcnode-id="1887"><strong data-dcnode-id="1888"><a data-dcnode-id="1889" href="#Pruning-Shrubs"><span data-dcnode-id="1890" instrument_node="">Pruning Shrubs</span></a></strong></li><li data-dcnode-id="1883"><strong data-dcnode-id="1884"><a data-dcnode-id="1885" href="#More-Gardening-Tips"><span data-dcnode-id="1886" instrument_node="">More Gardening Tips</span></a></strong></li></ul><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1880"></p></div><span data-dcnode-id="1878" instrument_node="">
</span><h2 data-dcnode-id="1876" id="What-is-Pruning"><span data-dcnode-id="1877" instrument_node="">What Is Pruning?</span></h2><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">First of all, let’s define what pruning actually is and what it can do to help your plants. While you don’t have to be a master gardener to understand the entire process, you do need to have some basic plant knowledge.</span></p><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Simply put, when pruning, a gardener is controlling the plants growth and development into specific patterns. Each shoot (or branch) on a woody plant ends in what is known as the terminal bud, below which other buds (or future branches) are positioned in specific patterns that are different for varying species of plants.</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">There are four basic arrangements of budding: alternate, opposite, spiral, or whorled.</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">The terminal (end) bud is where the branch is growing longer and is the lead bud on the shoot. This bud produces a chemical that slows the growth of the buds behind it on the shoot.</span></p><span data-dcnode-id="1863" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">If the terminal bud is removed by pruning, pinching, or breaking off, the supply of that chemical is slowed and the other buds (which will form what are called lateral shoots) quickly grow and branch out, resulting in a bushier look to the plant instead of a long spirally growth.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">That sounds pretty simple right? Well, it’s a bit more complicated than that, depending upon the individual species.</span></p><span data-dcnode-id="1857" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1852"><figure class="aligncenter size-full" data-dcnode-id="1853"><img alt="Gloved hands trim rose bushes with pruning shears." class="wp-image-16 perfmatters-lazy error" data-dcnode-id="1856" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/pruning-roses-with-gloves-and-shears-closeup.jpg" data-pin-nopin="true" data-sizes="(max-width: 680px) 100vw, 680px" data-src="https://gardenerspath.com/wp-content/uploads/2014/08/pruning-roses-with-gloves-and-shears-closeup.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2014/08/pruning-roses-with-gloves-and-shears-closeup.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/pruning-roses-with-gloves-and-shears-closeup-300x201.jpg 300w" data-was-processed="true" height="456" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/wp-content/uploads/2014/08/pruning-roses-with-gloves-and-shears-closeup.jpg&amp;raw" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/pruning-roses-with-gloves-and-shears-closeup.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/pruning-roses-with-gloves-and-shears-closeup-300x201.jpg 300w" width="680"><noscript data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">&lt;img width="680" height="456" data-pin-nopin="true" src="https://gardenerspath.com/wp-content/uploads/2014/08/pruning-roses-with-gloves-and-shears-closeup.jpg" alt="Gloved hands trim rose bushes with pruning shears." class="wp-image-16" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/pruning-roses-with-gloves-and-shears-closeup.jpg 680w, https://gardenerspath.com/wp-content/uploads/2014/08/pruning-roses-with-gloves-and-shears-closeup-300x201.jpg 300w" sizes="(max-width: 680px) 100vw, 680px" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/pruning-roses-with-gloves-and-shears-closeup.jpg"&gt;</span></noscript></figure></div><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">For the most part, pruning always stimulates growth, but how severely you prune a plant will depend on exactly what you want to happen.</span></p><span data-dcnode-id="1848" instrument_node="">
</span><p data-dcnode-id="1843"><span data-dcnode-id="1847" instrument_node="">If a plant has not been regularly pruned and has been left to grow in whatever pattern comes naturally, that plant may need what is called a severe cutting back which </span><strong data-dcnode-id="1844"><a data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/how-to/pruning/bloom-spring/" title="Pruning for Bloom in the Spring"><span data-dcnode-id="1846" instrument_node="">will result in lots of new shoots and fast growth the following spring.</span></a></strong></p><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Severe pruning (or cutting way back) will typically result in vigorous growth but light pruning will allow slower growth.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><h2 data-dcnode-id="1837" id="Why-Prune"><span data-dcnode-id="1838" instrument_node="">Why Prune?</span></h2><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">There are people who claim that pruning goes against the natural growth pattern of the plant and has a potential to actually damage the plant, opening up a cut that allows disease to flourish. Plants do get sick and need surgery just like people.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">The argument to prune states that a garden is a managed or controlled environment, and as such, each plant co-exists in relation to other plants in the landscape.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">There are times when it is absolutely necessary to prune to encourage healthier growth and to rejuvenate shrubs and plants. And then of course, there is the ornamental element.</span></p><span data-dcnode-id="1827" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Gardeners often want a balanced symmetry to their garden plots, borders, and hedges. Pruning well will encourage that groomed and well-cared-for look in a garden.</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Of course, successful planting is key here also.</span></p><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Knowing how large a plant will eventually become is important. There are plants that require much more space than the gardener allowed for them at planting time and no amount of pruning will squeeze them into a smaller space allotment – and in fact may truly damage the plant.</span></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1811"><span data-dcnode-id="1817" instrument_node="">We’ve all seen the </span><strong data-dcnode-id="1813"><a data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/plants/ornamentals/bonsai-information/"><span data-dcnode-id="1816" instrument_node="">beautiful tiny bonsai trees</span></a><span data-dcnode-id="1814" instrument_node="">,</span></strong><span data-dcnode-id="1812" instrument_node=""> but that is a special technique. Most garden shrubs have their spacing requirements based on mature dimensions. Plan carefully as you plant.</span></p><span data-dcnode-id="1810" instrument_node="">
</span><div class="wp-block-image wp-image-751 size-full" data-dcnode-id="1803"><figure class="aligncenter size-full" data-dcnode-id="1804"><img alt="A man prunes a young tree with long-handled loppers." class="wp-image-751 perfmatters-lazy loaded" data-dcnode-id="1809" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree.jpg" data-pin-nopin="true" data-sizes="(max-width: 450px) 100vw, 450px" data-src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree.jpg 450w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree-200x300.jpg 200w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree-78x117.jpg 78w" data-was-processed="true" height="675" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree.jpg&amp;raw" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree.jpg 450w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree-200x300.jpg 200w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree-78x117.jpg 78w" width="450"><noscript data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">&lt;img width="450" height="675" data-pin-nopin="true" src="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree.jpg" alt="A man prunes a young tree with long-handled loppers." class="wp-image-751" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree.jpg 450w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree-200x300.jpg 200w, https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree-78x117.jpg 78w" sizes="(max-width: 450px) 100vw, 450px" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Pruning-young-tree.jpg"&gt;</span></noscript><figcaption data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">With careful trimming, young trees and shrubs can achieve a perfect form in four or five years.</span></figcaption></figure></div><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">The argument against pruning causing disease is that cuts on young plants typically heal quickly. Four or five years of pruning on young establishing plants can get them into a great shape and basic framework that will only require occasional light pruning to maintain.</span></p><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Again, knowing your plant and what shape, space and design you want it to have in your garden is important in knowing how and when to prune the plant.</span></p><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">However, even the most unrestricted of older plants will benefit some form of annual trimming to keep them healthy and productive of fruit and flower.</span></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Annual cutting removes old wood to allow young shoots to flourish and become stronger as well as encouraging good airflow to prevent fungal disease from taking hold. Flowers, like roses, have larger blooms on young shoots than on old shoots.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1790" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Annual or renewal pruning results in plants that remain compact and youthful. Dead, damaged, and diseased shoots and branches need to be cut all the way back to healthy wood.</span></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">These shoots need to be disposed of in the trash or by burning – if permitted in your locale – to get rid of any infection or disease and prevent its spread in the garden. Correct pruning is one of the most essential methods of restoring a sick plant to good health.</span></p><span data-dcnode-id="1783" instrument_node="">
</span><h2 data-dcnode-id="1781" id="When-to-Prune"><span data-dcnode-id="1782" instrument_node="">When to Prune</span></h2><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">It is accepted theory that the best time to prune is during the dormant period. In most growing zones in the United States this is the period between late fall and early spring. Winter pruning stimulates growth, while summer pruning slows it down.</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">However, on flowering shrubs, when you want to stimulate the most beautiful flower growth, pruning immediately after blooming is the best way to encourage full and abundant flowering growth the following spring. There are some plants that for various reasons are best served by spring, summer, and early fall pruning.</span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Grapes, birch trees, and maple trees are examples. So again, knowing your goal and when to prune your plant is essential for best results.</span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Talking with your nursery, consulting online plant information, or finding a good basic gardening book on pruning will help you find specific information for every plant you purchase.</span></p><span data-dcnode-id="1768" instrument_node="">
</span><div class="wp-container-2 wp-block-group alignwide" data-dcnode-id="1612"><div class="wp-block-group__inner-container" data-dcnode-id="1613"><span data-dcnode-id="1767" instrument_node="">
</span><h2 data-dcnode-id="1765" id="Tools-for-Pruning"><span data-dcnode-id="1766" instrument_node="">Tools for Pruning</span></h2><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1763" instrument_node="">Very few tools are needed for normal garden pruning but purchasing </span><a data-dcnode-id="1760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/gear/tools-and-supplies/ten-essential-tools-every-gardeners-shed/"><strong data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">good quality equipment</span></strong></a><span data-dcnode-id="1759" instrument_node=""> is a solid investment for the amateur gardener. There are several important items to have in your toolkit.</span></p><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1756" instrument_node="">A good pair of secateurs (or hand pruners</span><b data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">&nbsp;</span></b><span data-dcnode-id="1753" instrument_node="">as they are often labeled). Three main kinds are available: anvil, bypass, and parrot-bill. All of them should have a safety catch that locks the blades in a closed position.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Don’t buy cheap ones! They will break and not make the good quality cuts you need in successful pruning.</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">The anvil type has a straight edged cutting blade. The bypass has a curved blade that cuts against a curved fixed blade, and the parrot bill has two curved edge blades that work like scissors.</span></p><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">When cutting with them, gripping the stem to be pruned off as far back on the blades as possible will ensure a stronger cut and poses less risk of damage to the tool. These hand pruners are for smaller plants and thinner stems.</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1741" instrument_node="">I would recommend </span><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00023RYS6%3Ftag%3Dprettyac-20" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">the </span></strong></a><strong data-dcnode-id="1735"><a data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00023RYS6%3Ftag%3Dprettyac-20" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1737" instrument_node="">F</span></a></strong><a data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00023RYS6%3Ftag%3Dprettyac-20" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">elco F-2</span></strong></a><span data-dcnode-id="1731" instrument_node=""> for the best quality and for a set that should last for a life time. They’re Swiss made and great for rose bushes, flowering bushes, and plants. </span><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gardenerspath.com/gear/tools-and-supplies/felco-f-2-review/"><strong data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">You can read our review of the Felco F-2 here</span></strong></a><span data-dcnode-id="1727" instrument_node="">.</span></p><span data-dcnode-id="1725" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1721"><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00023RYS6/%3Ftag%3Dprettyac-20" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Felco F-2 Hand Pruner on Amazon</span></strong></a></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1719" instrument_node="">For those with smaller hands, </span><strong data-dcnode-id="1715"><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0001IOYX0/%3Ftag%3Dprettyac-20" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1718" instrument_node="">the Felco F-6</span></a><span data-dcnode-id="1716" instrument_node=""> </span></strong><span data-dcnode-id="1714" instrument_node="">is a better choice.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1708"><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B0001IOYX0%3Ftag%3Dprettyac-20" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Felco F-6 Hand Pruner on Amazon</span></strong></a></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">For larger shrubs and small trees, a long-handled pruner is essential for cutting the thick stems. We use two main types in our home garden, a hand shear with long blade and handles, and the long handled pruner (aka “lopper”).</span></p><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1703" instrument_node="">Long bladed hedging shears work well for trimming evergreen shrubs and hedges. </span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00LY5IX40%3Ftag%3Dprettyac-20" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Fiskars Garden Powergear2 Hedge Shears</span></strong></a><span data-dcnode-id="1699" instrument_node=""> are a good choice here.</span></p><span data-dcnode-id="1697" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1691"><figure class="aligncenter size-full" data-dcnode-id="1692"><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00LY5IX40%3Ftag%3Dprettyac-20" rel="nofollow"><img alt="Fiskars Garden Powergear2 Hedge Shears on white, isolated background." class="wp-image-62517 perfmatters-lazy" data-dcnode-id="1696" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Fiskars-Garden-Powergear2-Hedge-Shears.jpg" data-pin-nopin="true" data-sizes="(max-width: 500px) 100vw, 500px" data-src="https://gardenerspath.com/wp-content/uploads/2014/08/Fiskars-Garden-Powergear2-Hedge-Shears.jpg" data-srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Fiskars-Garden-Powergear2-Hedge-Shears.jpg 500w, https://gardenerspath.com/wp-content/uploads/2014/08/Fiskars-Garden-Powergear2-Hedge-Shears-300x165.jpg 300w" height="275" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='500'%20height='275'%20viewBox='0%200%20500%20275'%3E%3C/svg%3E" width="500"><noscript data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">&lt;img width="500" height="275" data-pin-nopin="true" src="https://gardenerspath.com/wp-content/uploads/2014/08/Fiskars-Garden-Powergear2-Hedge-Shears.jpg" alt="Fiskars Garden Powergear2 Hedge Shears on white, isolated background." class="wp-image-62517" srcset="https://gardenerspath.com/wp-content/uploads/2014/08/Fiskars-Garden-Powergear2-Hedge-Shears.jpg 500w, https://gardenerspath.com/wp-content/uploads/2014/08/Fiskars-Garden-Powergear2-Hedge-Shears-300x165.jpg 300w" sizes="(max-width: 500px) 100vw, 500px" data-pin-media="https://gardenerspath.com/wp-content/uploads/2014/08/Fiskars-Garden-Powergear2-Hedge-Shears.jpg"&gt;</span></noscript></a></figure></div><span data-dcnode-id="1690" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1686"><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B00LY5IX40%3Ftag%3Dprettyac-20" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Fiskars Powergear2 Hedge Shears on Amazon</span></strong></a></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1684" instrument_node="">But when getting into difficult spaces and dealing with very thick stems, long handled pruners supply the extra cutting leverage and strength needed. And again, I’d recommend </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B07B534XHV%3Ftag%3Dprettyac-20" rel="noreferrer noopener nofollow" target="_blank"><strong data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">going with Felco quality</span></strong></a><span data-dcnode-id="1680" instrument_node="">.</span></p><span data-dcnode-id="1678" instrument_node="">

</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">These can require some practice to get used to working with them, and for most beginning or amateur gardeners is not necessary.</span></p><span data-dcnode-id="1652" instrument_node="">

52Fgardenerspath.com%252Fhow-to%252Fpruning%252Fbasics-pruning%252F%26is_video%3Dfalse%26description%3DThe%2520Basics%2520of%2520Pruning%2520Shrubs%2520and%2520Woody%2520Plants%2520%257C%2520Gardener%27s%2520Path" rel="noopener" target="_blank" title="Save"><span class="dpsp-network-icon" data-dcnode-id="1648"><svg data-dcnode-id="1649" height="32" viewBox="0 0 23 32" width="23" xmlns="http://www.w3.org/2000/svg"><path d="M0 10.656q0-1.92 0.672-3.616t1.856-2.976 2.72-2.208 3.296-1.408 3.616-0.448q2.816 0 5.248 1.184t3.936 3.456 1.504 5.12q0 1.728-0.32 3.36t-1.088 3.168-1.792 2.656-2.56 1.856-3.392 0.672q-1.216 0-2.4-0.576t-1.728-1.568q-0.16 0.704-0.48 2.016t-0.448 1.696-0.352 1.28-0.48 1.248-0.544 1.12-0.832 1.408-1.12 1.536l-0.224 0.096-0.16-0.192q-0.288-2.816-0.288-3.36 0-1.632 0.384-3.68t1.184-5.152 0.928-3.616q-0.576-1.152-0.576-3.008 0-1.504 0.928-2.784t2.368-1.312q1.088 0 1.696 0.736t0.608 1.824q0 1.184-0.768 3.392t-0.8 3.36q0 1.12 0.8 1.856t1.952 0.736q0.992 0 1.824-0.448t1.408-1.216 0.992-1.696 0.672-1.952 0.352-1.984 0.128-1.792q0-3.072-1.952-4.8t-5.12-1.728q-3.552 0-5.952 2.304t-2.4 5.856q0 0.8 0.224 1.536t0.48 1.152 0.48 0.832 0.224 0.544q0 0.48-0.256 1.28t-0.672 0.8q-0.032 0-0.288-0.032-0.928-0.288-1.632-0.992t-1.088-1.696-0.576-1.92-0.192-1.92z" data-dcnode-id="1650"></path></svg></span></a></div><noscript data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">&lt;img class="easyazon-image aligncenter" height="375" src="https://gardenerspath.com/wp-content/uploads/2021/04/31z29oo6XL.SL500.jpg" width="500" data-pin-media="https://gardenerspath.com/wp-content/uploads/2021/04/31z29oo6XL.SL500.jpg"&gt;</span></noscript><span data-dcnode-id="1642" instrument_node="">
