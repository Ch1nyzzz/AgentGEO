</span><section aria-label="extension information" data-dcnode-id="275" id="content" role="page content"><span data-dcnode-id="654" instrument_node="">
</span><h1 data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Ornamental Shrubs in Arkansas Landscape</span></h1><span data-dcnode-id="651" instrument_node="">
</span><div class="right-image-caption40" data-dcnode-id="638"><span data-dcnode-id="650" instrument_node="">
</span><div class="photo" data-dcnode-id="643"><span data-dcnode-id="649" instrument_node="">
</span><img alt="" class="fs-img" data-aspect-ratio="auto" data-dcnode-id="647" data-src="/yard-garden/home-landscape/images/Hydrangea%20paniculata.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/Hydrangea%2520paniculata.jpg&amp;raw"><noscript data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">&lt;img src="/yard-garden/home-landscape/images/Hydrangea%20paniculata.jpg" alt="" width="377" height="306"&gt;</span></noscript><span data-dcnode-id="644" instrument_node="">
</span></div><span data-dcnode-id="642" instrument_node="">
</span><div class="caption" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Limelight Hydrangea shrubs are a great addition to your landscape. Flowers start off
                              lime green before turning white later in the season. USDA hardines zone 3-9.
                           </span></div><span data-dcnode-id="639" instrument_node="">
</span></div><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">A shrub may be defined as a woody plant of relatively low height (&lt; 20 ft) and having
                           several stems arising from the base. Although the distinction may not be black &amp; white
                           in all situations, a shrub is most often distinguished from a tree by its multiple
                           stems and shorter height.
                        </span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">In addition to a variation in plant height, shrubs can be grouped according to characteristics
                           such as </span><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">leaf retention and flowering</span></strong><span data-dcnode-id="630" instrument_node="">.
                        </span></p><span data-dcnode-id="628" instrument_node="">
</span><h2 data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Deciduous or evergreen shrubs</span></h2><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="622"><span class="st" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">For leaf retention, plants may be categorized as either deciduous (lose leaves every
                              fall) or evergreen (leaves retained during the winter). Broadleaf evergreen shrubs
                              such as hollies, Indian hawthorn, glossy abelia, thorny Elaeagnus, gardenia, azalea,
                              heavenly bamboo, and Chinese fringeflower are frequently used in Arkansas landscapes.</span></span></p><span data-dcnode-id="621" instrument_node="">
</span><h2 data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Flowering, fruiting, and fall color</span></h2><span data-dcnode-id="618" instrument_node="">
</span><div class="right-image-caption30" data-dcnode-id="605"><span data-dcnode-id="617" instrument_node="">
</span><div class="photo" data-dcnode-id="610"><span data-dcnode-id="616" instrument_node="">
</span><img alt="" class="fs-img" data-aspect-ratio="auto" data-dcnode-id="614" data-src="/yard-garden/home-landscape/images/Fothergilla%20major%20fallclfm%20101707%20GosslerN%20EugeneOR.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/Fothergilla%2520major%2520fallclfm%2520101707%2520GosslerN%2520EugeneOR.jpg&amp;raw" title="Fall foliage on Fothergilla shrub"><noscript data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">&lt;img title="Fall foliage on Fothergilla shrub" src="/yard-garden/home-landscape/images/Fothergilla%20major%20fallclfm%20101707%20GosslerN%20EugeneOR.jpg" alt="" width="1823" height="1220"&gt;</span></noscript><span data-dcnode-id="611" instrument_node="">
</span></div><span data-dcnode-id="609" instrument_node="">
</span><div class="caption" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Fothergilla major (witch-alder) shrub is deciduous and is native to the southern US.
                              It can grow in zones 4-8 and blooms April through May. The bonus of this shrub is
                              it's lovely fall color!
                           </span></div><span data-dcnode-id="606" instrument_node="">
</span></div><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">For flowering, plants may be categorized as either monoecious (mow-knee-shuss) [if
                           both male and female flowers appear on the same plant] or dioecious (di-ee-shuss)
                           [if all of the flowers on a plant are male, or female]. Knowing that a shrub is dioecious
                           is important especially when we want fruits (female plants). On shrubs such as holly
                           (Ilex) and Aucuba you want mostly female plants so you can enjoy the beautiful fruits.&nbsp;
                        </span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Ornamental shrubs are a key component of any landscape as they can contribute flowers,
                           fruits, and fall color to the garden design. Ornamental shrubs may also serve to attract
                           wildlife to your garden. With such a large array in plant sizes and textures, ornamental
                           shrubs are a key component of any landscape. A sustainable landscape will match the
                           appropriate plant to the specific site.
                        </span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">&nbsp;</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">&nbsp;</span></p><span data-dcnode-id="592" instrument_node="">
</span><div class="accordion" data-dcnode-id="329" id="accordion-d15e230"><span data-dcnode-id="591" instrument_node="">
</span><div class="card" data-dcnode-id="571"><span data-dcnode-id="590" instrument_node="">
</span><div class="card-header" data-dcnode-id="582" id="heading-1"><span data-dcnode-id="589" instrument_node="">
</span><h3 class="mb-0" data-dcnode-id="584"><button aria-controls="collapse-d15e230-1" aria-expanded="true" class="btn btn-link accordion-trigger" data-dcnode-id="585" data-target="#collapse-d15e230-1" data-toggle="collapse"><span data-dcnode-id="588" instrument_node="">Summer Flowering Shrubs</span><span class="fas fa-plus" data-dcnode-id="587"></span><span class="fas fa-minus" data-dcnode-id="586"></span></button></h3><span data-dcnode-id="583" instrument_node="">
</span></div><span data-dcnode-id="581" instrument_node="">
</span><div aria-labelledby="heading-1" class="collapse show" data-dcnode-id="573" data-parent="#accordion-d15e230" id="collapse-d15e230-1"><span data-dcnode-id="580" instrument_node="">
</span><div class="card-body" data-dcnode-id="575"><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">We want our landscapes to have color in every season. There are many good flowering
                                       shrubs to choose from that can take the heat of an Arkansas summer.
                                    </span></p><span data-dcnode-id="576" instrument_node="">
</span></div><span data-dcnode-id="574" instrument_node="">
</span></div><span data-dcnode-id="572" instrument_node="">
</span></div><span data-dcnode-id="570" instrument_node="">
</span><div class="card" data-dcnode-id="540"><span data-dcnode-id="569" instrument_node="">
</span><div class="card-header" data-dcnode-id="561" id="heading-2"><span data-dcnode-id="568" instrument_node="">
</span><h3 class="mb-0" data-dcnode-id="563"><button aria-controls="collapse-d15e230-2" aria-expanded="false" class="btn btn-link accordion-trigger" data-dcnode-id="564" data-target="#collapse-d15e230-2" data-toggle="collapse"><span data-dcnode-id="567" instrument_node="">Abelia</span><span class="fas fa-plus" data-dcnode-id="566"></span><span class="fas fa-minus" data-dcnode-id="565"></span></button></h3><span data-dcnode-id="562" instrument_node="">
</span></div><span data-dcnode-id="560" instrument_node="">
</span><div aria-labelledby="heading-2" class="collapse" data-dcnode-id="542" data-parent="#accordion-d15e230" id="collapse-d15e230-2"><span data-dcnode-id="559" instrument_node="">
</span><div class="card-body" data-dcnode-id="544"><span data-dcnode-id="558" instrument_node="">
</span><article class="content-article" data-dcnode-id="546"><span data-dcnode-id="557" instrument_node="">
</span><div class="photo" data-dcnode-id="554"><a data-dcnode-id="555" href="#"><img alt="white flowers on abelia" data-dcnode-id="556" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/abelia%2520blooms.JPG&amp;raw" title="Abelia" width="125"></a></div><span data-dcnode-id="553" instrument_node="">
</span><div class="description" data-dcnode-id="548"><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Abelia – Your grandmother grew glossy abelia, and it was a small leafed green plant
                                             with small bell shaped white flowers.&nbsp; Today, there are so many better varieties with
                                             a range of leaf colors and even some new flower colors.&nbsp; ‘Kaleidoscope’ is a smaller
                                             form which grows to three feet tall and about 3-4 feet wide. New growth appears with
                                             lime-green centers and bright yellow edges. When summer arrives, the yellow matures
                                             to orange and the variegation doesn’t fade. In fall and winter the foliage color deepens
                                             to shades of orange and fiery red.&nbsp; It blooms with small white blooms from frost to
                                             frost.&nbsp; ‘Twist of Lime’ is another low grower with white, yellow and green foliage
                                             and pale pink blooms, while ‘Bronze Anniversary’ is a variegated larger abelia getting
                                             about 48 inches tall.&nbsp; Some dark pink bloomers include the older variety ‘Edward Goucher’
                                             and the new dwarf ‘Pinky Bells’ which only grows 24-36 inches tall and has pink blooms
                                             all season.&nbsp; The newest variety ‘Sunny Anniversary’ has green foliage but a yellow
                                             and pink bloom that grows up to 4 feet tall.&nbsp; In Arkansas, most abelian are evergreen,
                                             but can shed some leaves in the coldest years.&nbsp; They thrive in full sun to partial
                                             shade and are quite attractive to bees and butterflies.
                                          </span></p><span data-dcnode-id="549" instrument_node="">
</span></div><span data-dcnode-id="547" instrument_node="">
</span></article><span data-dcnode-id="545" instrument_node="">
</span></div><span data-dcnode-id="543" instrument_node="">
</span></div><span data-dcnode-id="541" instrument_node="">
</span></div><span data-dcnode-id="539" instrument_node="">
</span><div class="card" data-dcnode-id="509"><span data-dcnode-id="538" instrument_node="">
</span><div class="card-header" data-dcnode-id="530" id="heading-3"><span data-dcnode-id="537" instrument_node="">
</span><h3 class="mb-0" data-dcnode-id="532"><button aria-controls="collapse-d15e230-3" aria-expanded="false" class="btn btn-link accordion-trigger" data-dcnode-id="533" data-target="#collapse-d15e230-3" data-toggle="collapse"><span data-dcnode-id="536" instrument_node="">Althea</span><span class="fas fa-plus" data-dcnode-id="535"></span><span class="fas fa-minus" data-dcnode-id="534"></span></button></h3><span data-dcnode-id="531" instrument_node="">
</span></div><span data-dcnode-id="529" instrument_node="">
</span><div aria-labelledby="heading-3" class="collapse" data-dcnode-id="511" data-parent="#accordion-d15e230" id="collapse-d15e230-3"><span data-dcnode-id="528" instrument_node="">
</span><div class="card-body" data-dcnode-id="513"><span data-dcnode-id="527" instrument_node="">
</span><article class="content-article" data-dcnode-id="515"><span data-dcnode-id="526" instrument_node="">
</span><div class="photo" data-dcnode-id="523"><a data-dcnode-id="524" href="#"><img alt="image description" data-dcnode-id="525" height="94" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/althea1.JPG&amp;raw" width="125"></a></div><span data-dcnode-id="522" instrument_node="">
</span><div class="description" data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Althea or Rose of Sharon – This member of the hibiscus family has made a big comeback
                                             in recent years.&nbsp; The plants can be pruned as much or as little as you like before
                                             growth begins, since they bloom on the new growth.&nbsp; Mature height on a standard variety
                                             can be 8-15 feet depending on variety, but they can be pruned more if needed.&nbsp; Flower
                                             color can range from white, pink, purple and apricot, with doubles and singles, and
                                             bi-colors thrown in.&nbsp; New varieties do not set seeds, so they don’t have to be deadheaded
                                             and will continue to bloom all summer.&nbsp;&nbsp; ‘Aphrodite’ – is a pink flowering form with
                                             a dark red center.&nbsp; ‘Pink Chiffon’ has large lacy double pink blooms; ‘Blue Satin’
                                             has a large deep blue single bloom.&nbsp; ‘Lil Kim’ is a dwarf form that only gets 3 feet
                                             tall with white flowers and a deep red throat. They thrive in full sun to partial
                                             shade, and will reward you with months of blooms if given enough light.&nbsp;&nbsp; They do
                                             best with moderate amounts of water and fertilizer—but don’t overdo it.
                                          </span></p><span data-dcnode-id="518" instrument_node="">
</span></div><span data-dcnode-id="516" instrument_node="">
</span></article><span data-dcnode-id="514" instrument_node="">
</span></div><span data-dcnode-id="512" instrument_node="">
</span></div><span data-dcnode-id="510" instrument_node="">
</span></div><span data-dcnode-id="508" instrument_node="">
</span><div class="card" data-dcnode-id="478"><span data-dcnode-id="507" instrument_node="">
</span><div class="card-header" data-dcnode-id="499" id="heading-4"><span data-dcnode-id="506" instrument_node="">
</span><h3 class="mb-0" data-dcnode-id="501"><button aria-controls="collapse-d15e230-4" aria-expanded="false" class="btn btn-link accordion-trigger" data-dcnode-id="502" data-target="#collapse-d15e230-4" data-toggle="collapse"><span data-dcnode-id="505" instrument_node="">Buddlea or Butterfly bush</span><span class="fas fa-plus" data-dcnode-id="504"></span><span class="fas fa-minus" data-dcnode-id="503"></span></button></h3><span data-dcnode-id="500" instrument_node="">
</span></div><span data-dcnode-id="498" instrument_node="">
</span><div aria-labelledby="heading-4" class="collapse" data-dcnode-id="480" data-parent="#accordion-d15e230" id="collapse-d15e230-4"><span data-dcnode-id="497" instrument_node="">
</span><div class="card-body" data-dcnode-id="482"><span data-dcnode-id="496" instrument_node="">
</span><article class="content-article" data-dcnode-id="484"><span data-dcnode-id="495" instrument_node="">
</span><div class="photo" data-dcnode-id="492"><a data-dcnode-id="493" href="#"><img alt="dark purple bloom on butterfly bush" data-dcnode-id="494" height="124" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/buddleia%2520dark%2520purple%2520saline%2520small..JPG&amp;raw" title="butterfly bush" width="125"></a></div><span data-dcnode-id="491" instrument_node="">
</span><div class="description" data-dcnode-id="486"><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Buddleia – Butterfly bush is a long blooming plant with outstanding blooms in purple,
                                             pink, white or red.&nbsp; The new dwarf plants include Lo and Behold ‘Blue Chip’, Lavender
                                             Chip and White Chip. These plants are deciduous in colder winters but fit easily into
                                             any sun landscape.&nbsp; Older varieties set seeds and started becoming a bit invasive
                                             in some states.&nbsp; New varieties don’t set seeds, so bloom continuously.&nbsp; Larger varieties
                                             include: ‘Miss Molly’ with deep red blooms, ‘Black Knight’ with dark purple flowers,
                                             ‘Asian Moon’ with lavender blooms and ‘Peach Cobbler’ with peachy, pink blooms.&nbsp;&nbsp;
                                             Full sun provides more flowers. Prune them hard in late February, because they bloom
                                             on the new growth.&nbsp; If you don’t prune, they tend to get woody and less productive.&nbsp;
                                             Choose plants that will fit the situation.&nbsp; From dwarf to standards, they thrive in
                                             sunny locations.
                                          </span></p><span data-dcnode-id="487" instrument_node="">
</span></div><span data-dcnode-id="485" instrument_node="">
</span></article><span data-dcnode-id="483" instrument_node="">
</span></div><span data-dcnode-id="481" instrument_node="">
</span></div><span data-dcnode-id="479" instrument_node="">
</span></div><span data-dcnode-id="477" instrument_node="">
</span><div class="card" data-dcnode-id="447"><span data-dcnode-id="476" instrument_node="">
</span><div class="card-header" data-dcnode-id="468" id="heading-5"><span data-dcnode-id="475" instrument_node="">
</span><h3 class="mb-0" data-dcnode-id="470"><button aria-controls="collapse-d15e230-5" aria-expanded="false" class="btn btn-link accordion-trigger" data-dcnode-id="471" data-target="#collapse-d15e230-5" data-toggle="collapse"><span data-dcnode-id="474" instrument_node="">Clethra or summersweet</span><span class="fas fa-plus" data-dcnode-id="473"></span><span class="fas fa-minus" data-dcnode-id="472"></span></button></h3><span data-dcnode-id="469" instrument_node="">
</span></div><span data-dcnode-id="467" instrument_node="">
</span><div aria-labelledby="heading-5" class="collapse" data-dcnode-id="449" data-parent="#accordion-d15e230" id="collapse-d15e230-5"><span data-dcnode-id="466" instrument_node="">
</span><div class="card-body" data-dcnode-id="451"><span data-dcnode-id="465" instrument_node="">
</span><article class="content-article" data-dcnode-id="453"><span data-dcnode-id="464" instrument_node="">
</span><div class="photo" data-dcnode-id="461"><a data-dcnode-id="462" href="#"><img alt="white blooms on a summer blooming clethra" data-dcnode-id="463" height="88" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/clethra%2520small.JPG&amp;raw" title="clethra" width="108"></a></div><span data-dcnode-id="460" instrument_node="">
</span><div class="description" data-dcnode-id="455"><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Clethra or summersweet is a great native shrub for full sun to partial shade.&nbsp; From
                                             standards to dwarfs, this deciduous shrub begins to bloom in late June or July with
                                             fragrant pink or white blooms.&nbsp; Also called sweet pepperbush because of the pepper
                                             like seed pods which persist all winter, it is a low maintenance shrub for the summer
                                             landscape. ‘Ruby Spice’ is a pink flowering form growing to 8 feet tall.&nbsp; Two good
                                             dwarf forms ‘Sixteen Candles’ and ‘Hummingbird’ are great bloomers on a compact plant.
                                          </span></p><span data-dcnode-id="456" instrument_node="">
</span></div><span data-dcnode-id="454" instrument_node="">
</span></article><span data-dcnode-id="452" instrument_node="">
</span></div><span data-dcnode-id="450" instrument_node="">
</span></div><span data-dcnode-id="448" instrument_node="">
</span></div><span data-dcnode-id="446" instrument_node="">
</span><div class="card" data-dcnode-id="410"><span data-dcnode-id="445" instrument_node="">
</span><div class="card-header" data-dcnode-id="437" id="heading-6"><span data-dcnode-id="444" instrument_node="">
</span><h3 class="mb-0" data-dcnode-id="439"><button aria-controls="collapse-d15e230-6" aria-expanded="false" class="btn btn-link accordion-trigger" data-dcnode-id="440" data-target="#collapse-d15e230-6" data-toggle="collapse"><span data-dcnode-id="443" instrument_node="">Crape Myrtle</span><span class="fas fa-plus" data-dcnode-id="442"></span><span class="fas fa-minus" data-dcnode-id="441"></span></button></h3><span data-dcnode-id="438" instrument_node="">
</span></div><span data-dcnode-id="436" instrument_node="">
</span><div aria-labelledby="heading-6" class="collapse" data-dcnode-id="412" data-parent="#accordion-d15e230" id="collapse-d15e230-6"><span data-dcnode-id="435" instrument_node="">
</span><div class="card-body" data-dcnode-id="414"><span data-dcnode-id="434" instrument_node="">
</span><article class="content-article" data-dcnode-id="416"><span data-dcnode-id="433" instrument_node="">
</span><div class="photo" data-dcnode-id="430"><a data-dcnode-id="431" href="#"><img alt="crape myrtle with pink blooms" data-dcnode-id="432" height="83" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/crapemyrle%2520dwarf%2520small.JPG&amp;raw" title="dwarf crape myrtle" width="109"></a></div><span data-dcnode-id="429" instrument_node="">
</span><div class="description" data-dcnode-id="418"><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Crape myrtles come in groundcover to tree forms, so choose the size you need.&nbsp; They
                                             thrive in hot weather and bloom all summer.&nbsp;&nbsp; Groundcover forms include : ‘Rosy Carpet’
                                             and ‘Orchid Cascade’ growing no taller than two feet.&nbsp; Dwarf forms include Ozark Spring
                                             and Dwarf White which get no taller than 5 feet.&nbsp; The new Black Diamond series with
                                             dark almost black foliage grow up to 10-12 feet tall and then the standard&nbsp; Natchez
                                             and Biloxi can get up to 30 feet tall.&nbsp; By choosing a plant that at maturity will
                                             fit your landscape needs, you can avoid ‘crape murder’!
                                          </span></p><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">&nbsp;</span></p><span data-dcnode-id="422" instrument_node="">
</span><strong data-dcnode-id="419"><a data-dcnode-id="420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/resource-library/crapemyrtle/"><span data-dcnode-id="421" instrument_node="">Visit our crape myrtle database</span></a></strong></div><span data-dcnode-id="417" instrument_node="">
</span></article><span data-dcnode-id="415" instrument_node="">
</span></div><span data-dcnode-id="413" instrument_node="">
</span></div><span data-dcnode-id="411" instrument_node="">
</span></div><span data-dcnode-id="409" instrument_node="">
</span><div class="card" data-dcnode-id="365"><span data-dcnode-id="408" instrument_node="">
</span><div class="card-header" data-dcnode-id="400" id="heading-7"><span data-dcnode-id="407" instrument_node="">
</span><h3 class="mb-0" data-dcnode-id="402"><button aria-controls="collapse-d15e230-7" aria-expanded="false" class="btn btn-link accordion-trigger" data-dcnode-id="403" data-target="#collapse-d15e230-7" data-toggle="collapse"><span data-dcnode-id="406" instrument_node="">Hydrangeas</span><span class="fas fa-plus" data-dcnode-id="405"></span><span class="fas fa-minus" data-dcnode-id="404"></span></button></h3><span data-dcnode-id="401" instrument_node="">
</span></div><span data-dcnode-id="399" instrument_node="">
</span><div aria-labelledby="heading-7" class="collapse" data-dcnode-id="367" data-parent="#accordion-d15e230" id="collapse-d15e230-7"><span data-dcnode-id="398" instrument_node="">
</span><div class="card-body" data-dcnode-id="369"><span data-dcnode-id="397" instrument_node="">
</span><article class="content-article" data-dcnode-id="371"><span data-dcnode-id="396" instrument_node="">
</span><div class="photo" data-dcnode-id="393"><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/hydrangea%2520paniculata%2520story.JPG" title="hydrangea paniculata big"><img alt="panicle hydrangea with white flowers turning pink" data-dcnode-id="395" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/hydrangea%2520paniculata%2520story%2520small.JPG&amp;raw" title="panicle hydrangea" width="125"></a></div><span data-dcnode-id="392" instrument_node="">
</span><div class="description" data-dcnode-id="373"><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Hydrangeas are in a class by themselves.&nbsp; While most people plant the big leafed varieties</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="381"><img alt="pink mophead bloom on a big leaf hydrangea" data-dcnode-id="387" height="94" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/hydrangeas%2520summer%2520small%2520.JPG&amp;raw" title="big leaf hydrangea" width="125"><span data-dcnode-id="386" instrument_node="">&nbsp;(Hydrangea macrophylla), there are some other great species to try.&nbsp; Oakleaf hydrangea
                                             (Hydrangea quercifolia) thrives in a woodland garden with morning sun and afternoon
                                             shade.&nbsp; Large panicles of white flowers fade to dusty rose and then tan.&nbsp; In the fall
                                             of the year, the plants turn fire engine red before dropping their leaves. Standard
                                             forms can grow up to 8-10 feet tall, while dwarf varieties get no larger than three
                                             feet.&nbsp;</span><br data-dcnode-id="385"><img alt="panicle hydrangea " data-dcnode-id="384" height="94" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/hydrangea%2520paniculata%2520small.JPG&amp;raw" title="panicle hydrangea" width="125"><br data-dcnode-id="383"><span data-dcnode-id="382" instrument_node="">The Hydrangea paniculata is also making a strong showing in the garden.&nbsp; These hydrangeas
                                             bloom on the new growth and will take more sun. They also don’t wilt nearly as much
                                             as the big leafed forms in hot, dry days.&nbsp; PeeGee or panicle hydrangeas as they are
                                             commonly called usually have large white blooms which can fade to shades of pink.&nbsp;
                                             ‘Limelight’ has pale green to white flowers which fade to white, while ‘Pink Diamond’
                                             has pink and white blooms.&nbsp; Other new varieties to try include ‘White Diamonds’, ‘Chantilly
                                             Lace’ and the new dwarf ‘Pinky Winky’. &nbsp;&nbsp;Another hydrangea that blooms on new growth,
                                             so is not bothered by winter is the Annabelle or smooth hydrangeas
                                          </span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="375"><img alt="white blooms on smooth hydrangea" data-dcnode-id="379" height="94" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/hydrangea%2520arborescens%2520small.JPG&amp;raw" title="smooth hydrangea" width="125"><br data-dcnode-id="378"><span data-dcnode-id="376" style="font-size: 12px; color: inherit; font-family: inherit; line-height: 1.333em;"><span data-dcnode-id="377" instrument_node="">(Hydrangea arborescens).&nbsp; From the old fashioned Annabelle with large white blooms
                                                to the newer Invincibelle, Invincibelle Spirit, and Invinciball.</span></span></p><span data-dcnode-id="374" instrument_node="">
</span></div><span data-dcnode-id="372" instrument_node="">
</span></article><span data-dcnode-id="370" instrument_node="">
</span></div><span data-dcnode-id="368" instrument_node="">

</span><div class="card" data-dcnode-id="331"><span data-dcnode-id="363" instrument_node="">
</span><div class="card-header" data-dcnode-id="355" id="heading-8"><span data-dcnode-id="362" instrument_node="">
</span><h3 class="mb-0" data-dcnode-id="357"><button aria-controls="collapse-d15e230-8" aria-expanded="false" class="btn btn-link accordion-trigger" data-dcnode-id="358" data-target="#collapse-d15e230-8" data-toggle="collapse"><span data-dcnode-id="361" instrument_node="">Spirea</span><span class="fas fa-plus" data-dcnode-id="360"></span><span class="fas fa-minus" data-dcnode-id="359"></span></button></h3><span data-dcnode-id="356" instrument_node="">
</span></div><span data-dcnode-id="354" instrument_node="">
</span><div aria-labelledby="heading-8" class="collapse" data-dcnode-id="333" data-parent="#accordion-d15e230" id="collapse-d15e230-8"><span data-dcnode-id="353" instrument_node="">
</span><div class="card-body" data-dcnode-id="335"><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">&nbsp;</span></p><span data-dcnode-id="349" instrument_node="">
</span><article class="content-article" data-dcnode-id="337"><span data-dcnode-id="348" instrument_node="">
</span><div class="photo" data-dcnode-id="345"><a data-dcnode-id="346" href="#"><img alt="pink bloom on spirea" data-dcnode-id="347" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uaex.uada.edu/yard-garden/home-landscape/images/summer%2520spirea%2520bloom%2520up%2520close%2520small.JPG&amp;raw" title="summer blooming spirea" width="125"></a></div><span data-dcnode-id="344" instrument_node="">
</span><div class="description" data-dcnode-id="339"><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Summer blooming spirea are great additions to full sun to partial shade landscapes.&nbsp;
                                             Much more compact than their spring blooming cousins, the bridalwreath spirea, the
                                             summer spireas bloom as long as they are putting on new growth. ‘Anthony Waterer’,
                                             ‘Little Princess’, ‘Lime Mound’ and ‘Gold Flame’ have been around for many years.&nbsp;
                                             Newer introductions include ‘Magic Carpet’, ‘Double Play’ and ‘Neon Flash’.&nbsp; Deadhead
                                             the spent blooms and they will continue to bloom off and on all summer.&nbsp; Pest free
                                             and drought tolerant, once established, they are easy to grow, but they are deciduous
                                             and not the most attractive in the winter, so have some evergreens nearby for winter
                                             interest too.
                                          </span></p><span data-dcnode-id="340" instrument_node="">
</span></div><span data-dcnode-id="338" instrument_node="">
</span></article><span data-dcnode-id="336" instrument_node="">
