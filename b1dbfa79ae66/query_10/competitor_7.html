</span><main data-dcnode-id="222" role="main"><span data-dcnode-id="309" instrument_node="">
</span><h1 class="display__title" data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Ornamental plants</span></h1><span data-dcnode-id="306" instrument_node="">
</span><div class="summary" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Ornamental and food producing plants can enhance the bushfire resilience of your home</span></div><span data-dcnode-id="303" instrument_node=""> </span><div class="section__wysiwyg content__classic" data-dcnode-id="224"><span data-dcnode-id="302" instrument_node="">
</span><div class="container" data-dcnode-id="296" style="width:100%;margin:0;padding: 0px 0px 27px 0px;font-size:16px;color:black"><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298" style="line-height: 1.5;background-color: #f4f4f4;padding: 9px"><span data-dcnode-id="299" instrument_node="">
Ornamentals and food producing plants, provide variety and colour to the garden and are generally less flammable compared to other types of vegetation. Nonetheless, it is important to maintain them appropriately by removing dead plant materials from the garden bed and regularly pruning dead limbs. Most ornamental and food producing plants are seasonal, so consider what this means for the design of your garden and its bushfire resilient properties. Remember that all plants, no matter how green or succulent will burn if the fire is intense enough.</span></p><span data-dcnode-id="297" instrument_node="">
</span></div><span data-dcnode-id="295" instrument_node="">
</span><div class="grid" data-dcnode-id="226"><div class="col-1-2" data-dcnode-id="240"><div class="column-block" data-dcnode-id="241"><span data-dcnode-id="294" instrument_node="">
</span><div class="container" data-dcnode-id="244" style="width: 100%;padding: 9px 15px 0 3px;margin: 0 0 0 3px;font-size: 15.5px"><span data-dcnode-id="293" instrument_node="">
</span><h4 data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Do’s</span></h4><span data-dcnode-id="290" instrument_node="">
</span><ul data-dcnode-id="270" style="margin: 0 3px 18px 0;padding: 3px 9px 12px 29px;line-height: 1.6"><span data-dcnode-id="289" instrument_node="">
</span><li data-dcnode-id="287" style="margin-bottom:11px"><span data-dcnode-id="288" instrument_node="">Keep plants irrigated and clear of debris.</span></li><span data-dcnode-id="286" instrument_node="">
</span><li data-dcnode-id="284" style="margin-bottom:11px"><span data-dcnode-id="285" instrument_node="">Position ornamentals and food producing plants in strategic locations.</span></li><span data-dcnode-id="283" instrument_node="">
</span><li data-dcnode-id="278" style="margin-bottom:11px"><span data-dcnode-id="282" instrument_node="">Orchard trees and large flowering shrubs can be used as </span><a data-dcnode-id="280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//research.csiro.au/bushfire/landscaping/screen-plantings/" rel="noopener" target="_blank"><span data-dcnode-id="281" instrument_node="">Screen plantings</span></a><span data-dcnode-id="279" instrument_node=""> when positioned between the home and the likely direction of the bushfire, while smaller ornamentals and food producing plants (such as herbs and vegetables) can be used to break up areas of more flammable vegetation.</span></li><span data-dcnode-id="277" instrument_node="">
</span><li data-dcnode-id="275" style="margin-bottom:11px"><span data-dcnode-id="276" instrument_node="">Plant ornamental and food producing plants in widely separated garden beds, away from the house and other structures.</span></li><span data-dcnode-id="274" instrument_node="">
</span><li data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Break-up or separate large or dense plantings with non-combustible features, such as pathways, retaining walls, open spaces or irrigated lawn.</span></li><span data-dcnode-id="271" instrument_node="">
</span></ul><span data-dcnode-id="269" instrument_node="">
</span><div data-dcnode-id="246" style="background-color: #f4f4f4;margin: 21px 0 0 0;padding: 16px 0 0 0"><span data-dcnode-id="268" instrument_node="">
</span><h4 data-dcnode-id="266" style="padding-left:7px"><span data-dcnode-id="267" instrument_node="">Don’ts</span></h4><span data-dcnode-id="265" instrument_node="">
</span><ul data-dcnode-id="248" style="margin: 0 3px 18px 0;padding: 3px 9px 12px 29px;line-height: 1.6;background-color: #f4f4f4"><span data-dcnode-id="264" instrument_node="">
</span><li data-dcnode-id="262" style="margin-bottom:11px"><span data-dcnode-id="263" instrument_node="">Avoid plants that have highly flammable characteristics.</span></li><span data-dcnode-id="261" instrument_node="">
</span><li data-dcnode-id="259" style="margin-bottom:11px"><span data-dcnode-id="260" instrument_node="">Avoid plants that produce a lot of leaf litter or other dead plant material.</span></li><span data-dcnode-id="258" instrument_node="">
</span><li data-dcnode-id="256" style="margin-bottom:11px"><span data-dcnode-id="257" instrument_node="">Do not plant large or continuous areas of vegetation – break up or separate your plantings.</span></li><span data-dcnode-id="255" instrument_node="">
</span><li data-dcnode-id="253" style="margin-bottom:11px"><span data-dcnode-id="254" instrument_node="">Do not store on window ledges or in window mounted pots.</span></li><span data-dcnode-id="252" instrument_node="">
</span><li data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Do not plant under or around vents, doors or other vulnerable elements of the house.</span></li><span data-dcnode-id="249" instrument_node="">
</span></ul><span data-dcnode-id="247" instrument_node="">
</span></div><span data-dcnode-id="245" instrument_node="">
</span></div><span data-dcnode-id="243" instrument_node="">
</span><p data-dcnode-id="242"></p></div></div><div class="col-1-2" data-dcnode-id="227"><div class="column-block" data-dcnode-id="228"><span data-dcnode-id="239" instrument_node="">
