</span><h1 data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Pruning Shrubs</span></h1><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">The natural forests of the Pacific Northwest are characterized by several canopy layers—from the towering canopies of Douglas firs; to the under story shrubs including rhododendron and salal; down to ground-covering ferns. In Oregon’s urban forest, these shrubs can grow to be impressive foundation plantings over time, some reaching heights of thirty feet or more.</span></p><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Our experts recommend regular pruning of your shrubs throughout their life to promote a balanced, strong, open structure and minimize breakages, disease, and growth infringement on surrounding plants and buildings. Proper pruning of shrubs and trees involves technique and timing and is important to maintain a healthy, strong structure and maximize flowering. Our arborists excel at careful ornamental hand pruning of prized shrubs of all sizes.</span></p><span data-dcnode-id="325" instrument_node="">
