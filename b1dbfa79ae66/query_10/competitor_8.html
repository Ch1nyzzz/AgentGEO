</span><h1 class="text-white text-center pb-5 display-2" data-dcnode-id="427"><span data-dcnode-id="428" instrument_node="">About Us</span></h1><span data-dcnode-id="426" instrument_node="">

</span><div class="row justify-content-center" data-dcnode-id="405"><span data-dcnode-id="423" instrument_node="">
</span><div class="col-sm-8" data-dcnode-id="412"><span data-dcnode-id="422" instrument_node="">
</span><p class="text-white text-center px-4 px-md-0 px-lg-4" data-dcnode-id="417"><span data-dcnode-id="421" instrument_node="">My name is Chris Brown and I am the owner and operator of Higher Place Tree 
                Care.</span><span data-dcnode-id="419" style="color: #00aced;"><span data-dcnode-id="420" instrument_node=""> I am an ISA Certified arborist and tree worker (ON 1285-AT)</span></span><span data-dcnode-id="418" instrument_node=""> 
                and I have been working in the field of Arboriculture since 2004. I started my career in residential tree care and 
                have since worked in a variety of roles including: municipal tree care for several GTA municipalities, hydro line clearing, 
                and tree protection by-law administration.</span></p><span data-dcnode-id="416" instrument_node="">
</span><p class="text-white text-center px-4" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">I am dedicated to tree care, education and building relationships with people. My 
                extensive and varied experience helped me realize that my passion lies in residential and commercial 
                tree care. The urban tree canopy is a community asset and much of this canopy is located on private land. 
                By helping individual property owners to preserve and enhance the trees on their property there is a net benefit to the entire community, 
                which is why I find this aspect of tree care so rewarding.</span></p><span data-dcnode-id="413" instrument_node="">
</span></div><span data-dcnode-id="411" instrument_node="">
</span><div class="col-sm-4 text-center" data-dcnode-id="407"><span data-dcnode-id="410" instrument_node="">

</span><h1 class="text-white text-center pb-5 pb-sm-5 mb-5 display-2" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Services</span></h1><span data-dcnode-id="352" instrument_node="">

</span><img alt="" class="service-img" data-dcnode-id="347" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.152/e23.ecd.myftpupload.com/wp-content/uploads/2021/07/service-1-1.jpeg&amp;raw"><span data-dcnode-id="346" instrument_node="">
</span><h6 class="text-info py-5 py-sm-5" data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">TREE AND
      SHRUB PRUNING</span></h6><span data-dcnode-id="343" instrument_node="">
</span><p class="text-white px-3 px-md-0 px-lg-3" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">
        Trees and shrubs require pruning for a variety of reasons. Small ornamental trees and shrubs are often pruned for aesthetics while mature trees are typically pruned for structural integrity and safety. Depending on the age, size, species, condition and location of your trees and shrubs, the prescribed pruning can vary greatly.
      </span></p><span data-dcnode-id="340" instrument_node="">
</span><p class="text-white px-3 px-md-0 px-lg-3" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">
        Sometimes pruning should be avoided for certain species at certain times of the year. Knowing when, what and how much to prune can make the difference between a healthy, vigorous tree and a diseased and declining one.
      </span></p><span data-dcnode-id="337" instrument_node="">
</span></div><span data-dcnode-id="335" instrument_node="">
</span><div class="col-sm-4 text-center mx-lg-0 pb-5 mb-5" data-dcnode-id="322"><span data-dcnode-id="334" instrument_node="">
</span><img alt="" class="service-img" data-dcnode-id="333" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.152/e23.ecd.myftpupload.com/wp-content/uploads/2021/07/service-2-1.jpeg&amp;raw"><span data-dcnode-id="332" instrument_node="">
</span><h6 class="text-center text-info py-5 py-sm-5" data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">TREE AND
      SHRUB REMOVAL</span></h6><span data-dcnode-id="329" instrument_node="">
</span><p class="text-white px-3 px-md-0 px-lg-3" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">
        Trees in the urban environment sometimes need to be removed. While we do our best to preserve as many trees as possible, sometimes the best option is removal. Diseases, storm damage, construction and structural defects are all valid reasons why a tree might need to be removed.
      </span></p><span data-dcnode-id="326" instrument_node="">
</span><p class="text-white px-3 px-md-0 px-lg-3" data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">
        Tree removal can be very technical and challenging depending on the location, size, and condition of the tree being removed. We use the proper tools and equipment to ensure all tree removals are done safely and efficiently. We also carry 2 million dollars in liability insurance for your peace of mind.
      </span></p><span data-dcnode-id="323" instrument_node="">
</span></div><span data-dcnode-id="321" instrument_node="">
</span><div class="col-sm-4 text-center pb-5 mb-5" data-dcnode-id="308"><span data-dcnode-id="320" instrument_node="">
</span><img alt="" class="service-img" data-dcnode-id="319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secureservercdn.net/198.71.233.152/e23.ecd.myftpupload.com/wp-content/uploads/2021/07/service-3-1.jpeg&amp;raw"><span data-dcnode-id="318" instrument_node="">
</span><h6 class="text-center text-info py-5 pt-sm-5 pb-sm-2" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">ARBORIST REPORTS, TREE PROTECTION PLANS &amp; PERMIT APPLICATIONS</span></h6><span data-dcnode-id="315" instrument_node="">
</span><p class="text-white px-3 px-md-0 px-lg-3 pt-sm-3" data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">
        Most GTA municipalities have passed by-laws that regulate the injury and/or destruction of trees located on private property. The requirement for a permit to remove trees on private land is determined by the diameter of the tree in question and varies according to which municipality the property is located in.
      </span></p><span data-dcnode-id="312" instrument_node="">
</span><p class="text-white px-3 px-md-0 px-lg-3" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">
        The permit application process can be daunting and onerous for property owners. Working with an arborist who knows the requirements of municipalities minimizes delays in processing. Chris has worked for the municipalities of Oakville, Toronto, and Vaughan administering their various tree by-laws and knows exactly what is required to get applications processed as quickly and smoothly as possible.
      </span></p><span data-dcnode-id="309" instrument_node="">
</span></div><span data-dcnode-id="307" instrument_node="">

</span><h1 class="text-white text-center display-2" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">WHY HIRE US?</span></h1><span data-dcnode-id="225" instrument_node="">
</span></div><span data-dcnode-id="223" instrument_node="">
</span><div class="row justify-content-center" data-dcnode-id="209"><span data-dcnode-id="222" instrument_node="">
</span><div class="col-sm-10 col-11 text-center text-white border-bottom border-white" data-dcnode-id="211"><span data-dcnode-id="221" instrument_node="">
</span><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">
        When you call Higher Place Tree Care, you are really calling Chris. You are not calling a large company where
        you
        speak to a different person each time and a different person comes to do your tree work. You retain Higher Place
        when you want to build a personal, professional relationship with an expert in the field. I personally undertake
        all
        of the work agreed upon.
      </span></p><span data-dcnode-id="218" instrument_node="">
</span><p class="py-3" data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">
        Unlike municipalities and power companies, many property owners are unaware of what to look for when retaining
        an
        arborist and unfortunately Arborists are not regulated in the same way as trades such as electricians and
        plumbers.
        This means there are many people out there calling themselves arborists who have no formal training or education
        and
        do not know best practices for caring for trees and shrubs. Hiring someone who isn’t adequately educated and
        trained
        can result in irreparable damage to not only your trees and shrubs but also your property. More importantly,
        this
        work is inherently dangerous and workers without the proper training and education are far more likely to be
        injured
        or killed on the job.
      </span></p><span data-dcnode-id="215" instrument_node="">
</span><p class="pb-4" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">
        This is why you call me. When I pursued a career as an arborist I chose to seek out and attain all of the
        available,
        pertinent qualifications in the field and apprentice under and associate with arborists who share this attitude.
        I
        continue to seek out training and education opportunities, as this field is constantly evolving and staying
        current
        is vital to providing the best possible service for my clients. Below is a list of the qualifications that I
        currently
        hold.
      </span></p><span data-dcnode-id="212" instrument_node="">
</span></div><span data-dcnode-id="210" instrument_node="">
</span></div><span data-dcnode-id="208" instrument_node="">
