</span><p class="article__description" data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">Tips, techniques and tools to consider when pruning your evergreen shrubs this spring.</span></p><span data-dcnode-id="2362" instrument_node="">
</span><div class="article__wysiwyg" data-dcnode-id="2235" id="wordCount-js"><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2358"><em data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">This is Part 2 in a series on pruning ornamental plants.</span></em></p><span data-dcnode-id="2357" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">With the onset of spring, gardeners gear up for their annual landscape “make over” by extracting dusty saws and hand pruners from the garage and investing in the season’s first sore muscles. Pruning can be one of the most perplexing rituals for the spring gardener because pruning requirements vary with each species.</span></p><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">I find it very entertaining to drive along and look around the neighborhood at over-enthusiastic pruning jobs. The green meatballs and tuna cans that people call shrubs outside their homes are pruning atrocities!</span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">All plants have a “natural growth habit.” The best place to see the natural form of a foundation plant, such as yew or juniper, is an old cemetery. Given free reign, these plants we label as shrubs can be as tall as a house. You can see why it is difficult to prune them into various shapes.</span></p><span data-dcnode-id="2348" instrument_node="">
</span><h3 data-dcnode-id="2345"><strong data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Meatball and tuna can theory</span></strong></h3><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">There are few areas in one’s life where we have the ability to exercise supreme control without repercussion or police involvement except in our home landscape. Armed with a dull pair of shears or a power hedge trimmer, we can totally dominate our plants! The act of trimming may keep your shrubs from growing too large or too wide, but one should always question, “Was the shrub planted in the right location to begin with?”</span></p><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Gardeners who attempt to exert “uniform conformity” over a shrub like a juniper may even be rewarded by deformity and even death if you’re not careful. I like to keep the chain saw (for removal) in the running as an option.</span></p><span data-dcnode-id="2338" instrument_node="">
</span><h3 data-dcnode-id="2335"><strong data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">Sharpen your skills and your tools!</span></strong></h3><span data-dcnode-id="2334" instrument_node="">
</span><p data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">Where to start? If there’s one mistake I see home gardeners repeat often, it’s making poor cuts because of cheap tools. The adage “you get what you pay for” is definitely true here. If you invest in a quality pair of hand pruners and a good saw, I daresay you will never need to replace them. Sharpening or replacing the blade is imperative as well. Don’t go out there with rusty, dull tools and expect to do your shrubs any favors!</span></p><span data-dcnode-id="2331" instrument_node="">
</span><h3 data-dcnode-id="2328"><strong data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Plant response</span></strong></h3><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">The next thing you should understand is how the shrub will react to your pruning cuts. Pruning in general stimulates a growth response. Some methods of pruning generate more re-growth than others. To keep it simple, I will refer to “heading” and “thinning” cuts.</span></p><span data-dcnode-id="2324" instrument_node="">
</span><p data-dcnode-id="2312"><span data-dcnode-id="2323" instrument_node="">Cutting off the tip, or growing point, of a plant is called </span><strong data-dcnode-id="2320"><em data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">heading</span></em></strong><span data-dcnode-id="2319" instrument_node=""> or </span><strong data-dcnode-id="2316"><em data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">heading back</span></em></strong><em data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">.</span></em><span data-dcnode-id="2313" instrument_node=""> By removing the point containing the terminal bud on a twig, other buds below that tip are stimulated to grow. This is a common practice used to “thicken” plants such as in a hedge or with herbaceous plants (pinching) such as Chrysanthemum.</span></p><span data-dcnode-id="2311" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2310" instrument_node="">A </span><strong data-dcnode-id="2307"><em data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">thinning cut</span></em></strong><span data-dcnode-id="2306" instrument_node=""> is made by removing a branch at its point of origin along the stem or trunk. Ultimately, what you have done is redirect the way a plant is going to grow. Thinning stimulates very little in the way of re-growth and in many cases is the desired method of pruning for both size reduction and enhancing the shrub’s natural appearance.</span></p><span data-dcnode-id="2304" instrument_node="">
</span><h3 data-dcnode-id="2301"><strong data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">Pruning yews</span></strong></h3><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2299" instrument_node="">In many cases, we have planted or inherited foundation plants around our homes. When a plant is small, it is easy to underestimate the ultimate size of a shrub and most often, size control is the primary reason for pruning foundation plants. A common evergreen known as the yew easily adapts to being planted too close. Although they tend to grow a fair amount each season, when pruned properly, they can be dense and attractive for many years. Yews respond well to the </span><strong data-dcnode-id="2296"><em data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">heading cut</span></em></strong><span data-dcnode-id="2295" instrument_node=""> I mentioned earlier. By hand trimming back the leggy shoots that appear each June, the plant can have a natural appearance and still stay in bounds. When the plant has gotten out of control, however, more drastic cuts deep into the “shoulders” of the plant are also acceptable and may ultimately result in the size reduction you are seeking. Don’t worry about cutting into the lower woody tissue on a yew because lower buds will respond and grow when exposed to sunlight. Temper your pruning into the lower woody tissue on a yew because lower buds are slow to respond in most cases.</span></p><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">No matter how much you prune back your shrubs, remember to keep the top of the plant more narrow than the bottom. This will encourage thickness at the base by allowing sunlight to stimulate growth all the way to the bottom.</span></p><span data-dcnode-id="2290" instrument_node="">
</span><p class="caption" data-dcnode-id="2283"><img alt="When pruning a hedge, as in this yew, be sure to allow the bottom to be wider than the top." data-dcnode-id="2289" height="305" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canr.msu.edu/uploads/images/4-27%2520Yew%2520Hedge%2520Crop%2520Pruning.jpg&amp;raw" style="border: 1px solid #000000;" title="When pruning a hedge, as in this yew, be sure to allow the bottom to be wider than the top." width="288"><br data-dcnode-id="2288"><span data-dcnode-id="2287" instrument_node="">When pruning a hedge, as in this yew, be sure to allow the bottom to be wider than the top. Photo credit: Rebecca Finneran, </span><abbr data-dcnode-id="2285" title="Michigan State University Extension"><span data-dcnode-id="2286" instrument_node="">MSUE</span></abbr><span data-dcnode-id="2284" instrument_node="">.</span></p><span data-dcnode-id="2282" instrument_node="">
</span><h3 data-dcnode-id="2279"><strong data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Pruning junipers</span></strong></h3><span data-dcnode-id="2278" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2277" instrument_node="">Junipers have a very different growth habit compared to the yew. Since they do not sprout from the interior branches when cut hard, gardeners need to be aware of the growing tips for best success. In this case, your best pruning success will be with the </span><strong data-dcnode-id="2274"><em data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">thinning</span></em></strong><span data-dcnode-id="2273" instrument_node=""> method and avoid hedging shears all together. Junipers can easily outgrow their site unless thoughtful, size-reduction techniques are used. When a juniper has been cut repeatedly with hedge shears, it is likely to become deformed and die back beyond recognition.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p class="caption" data-dcnode-id="2264"><img alt="Because junipers need their new shoots for continued growth, hedging these shrubs will end in failure." data-dcnode-id="2270" height="192" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canr.msu.edu/uploads/images/4-27%2520finneran002Pruning.jpg&amp;raw" style="border: 1px solid #000000;" title="Because junipers need their new shoots for continued growth, hedging these shrubs will end in failure." width="288"><br data-dcnode-id="2269"><span data-dcnode-id="2268" instrument_node="">Because junipers need their new shoots for continued growth, hedging these shrubs will end in failure. Photo credit: Rebecca Finneran, </span><abbr data-dcnode-id="2266" title="Michigan State University Extension"><span data-dcnode-id="2267" instrument_node="">MSUE</span></abbr><span data-dcnode-id="2265" instrument_node="">.</span></p><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Select the branch that you want to remove and follow it all the way back into the center of the plant then cut. Since junipers tend to be “layered,” the feathery foliage on top of your cut will cover up the wound and keep the integrity of the plant. I see many junipers that have been planted in the wrong place. This is where you will need to evaluate whether or not to use the chain saw!</span></p><span data-dcnode-id="2260" instrument_node="">
</span><p data-dcnode-id="2249"><span data-dcnode-id="2259" instrument_node="">Find out about other educational resources and classes at </span><a class="external_link" data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.migarden.msu.edu/" title=""><span data-dcnode-id="2258" instrument_node="">www.migarden.msu.edu</span></a><span data-dcnode-id="2256" instrument_node=""> and at Finneran’s </span><a class="external_link" data-dcnode-id="2254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stuckongardening.com/" title=""><span data-dcnode-id="2255" instrument_node="">blog</span></a><span data-dcnode-id="2253" instrument_node="">. Also see Part 1: </span><a class="external_link" data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//news.msue.msu.edu/news/article/spring_shape_up_tidying_up_your_plants" title=""><span data-dcnode-id="2252" instrument_node="">Spring shape up: Tidying up your plants</span></a><span data-dcnode-id="2250" instrument_node="">.</span></p><span data-dcnode-id="2248" instrument_node="">
