</span><h1 class="post-title" data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">How to Make a Homemade Gopher Basket for Trees</span></h1><span data-dcnode-id="1981" instrument_node="">
</span><div class="post-meta clear-fix" data-dcnode-id="1970"><span data-dcnode-id="1980" instrument_node="">
</span><span class="post-date" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">April 1, 2021</span></span><span data-dcnode-id="1977" instrument_node="">
</span><span class="meta-sep" data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">/</span></span><span data-dcnode-id="1974" instrument_node="">
</span><a class="post-comments" data-dcnode-id="1972" href="#comments"><span data-dcnode-id="1973" instrument_node="">12 Comments</span></a><span data-dcnode-id="1971" instrument_node=""> </span></div><span data-dcnode-id="1969" instrument_node="">
</span></header><span data-dcnode-id="1967" instrument_node="">
</span><div class="post-content" data-dcnode-id="1451"><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1961"><span data-dcnode-id="1965" instrument_node="">Planting trees is one of the most rewarding and earth-friendly things you can do in your landscape. Trees offer beauty, shade, habitat for wildlife, sequester carbon, and depending on the type, may feed you as well! We’ve planted dozens of fruit trees in our garden. But you know who else loves trees just as much as we do? </span><em data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Gophers! </span></em><span data-dcnode-id="1962" instrument_node="">Those frustrating little creatures LOVE to eat tree roots. Thankfully, it isn’t difficult to stop gophers from destroying trees. We simply have to plant trees in wire gopher baskets – and those are easy to make! </span></p><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1952"><span data-dcnode-id="1959" instrument_node="">Follow along and learn how to make a homemade gopher basket to protect trees from gopher damage, along with tips on how to install the basket and plant a tree inside. The cages we make from hardware cloth are </span><strong data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">large, inexpensive, and durable</span></strong><span data-dcnode-id="1956" instrument_node="">. (To be honest, they’re far better than anything you could buy!) You can follow the same steps to create more petite baskets for shrubs or smaller plants too. To make things even easier, I’ve included a demonstration </span><strong data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">video</span></strong><span data-dcnode-id="1953" instrument_node=""> at the end of this article. But first, let’s go over a few frequently asked questions about gophers and using gopher baskets.</span></p><span data-dcnode-id="1951" instrument_node="">
</span><p data-dcnode-id="1949"><br data-dcnode-id="1950"></p><span data-dcnode-id="1948" instrument_node="">
</span><span class="PIN_1650912789862_embed_pin PIN_1650912789862_medium PIN_1650912789862_ PIN_1650912789862_fresh" data-dcnode-id="1929" data-pin-current="0" data-pin-href="https://www.pinterest.com/pin/598908450447580592/" data-pin-id="598908450447580592" data-pin-log="embed_pin"><span class="PIN_1650912789862_pages" data-dcnode-id="1940" data-pin-href="https://www.pinterest.com/pin/598908450447580592/" data-pin-log="embed_pin" style="padding-bottom: 177.63%;"><span class="PIN_1650912789862_page" data-dcnode-id="1944" data-pin-href="https://www.pinterest.com/pin/598908450447580592/" data-pin-log="embed_pin"><span class="PIN_1650912789862_blocks" data-dcnode-id="1945" data-pin-href="https://www.pinterest.com/pin/598908450447580592/" data-pin-log="embed_pin"><span class="PIN_1650912789862_block" data-dcnode-id="1946" data-pin-href="https://www.pinterest.com/pin/598908450447580592/" data-pin-log="embed_pin" style="height: 100%; width: 100%;"><span class="PIN_1650912789862_image PIN_1650912789862_coverMe" data-dcnode-id="1947" data-pin-href="https://www.pinterest.com/pin/598908450447580592/" data-pin-log="embed_pin" style="height: 100%; width: 100%; background-image: url(&quot;https://i.pinimg.com/345x/de/be/b9/debeb9f40abbb02ea51cf9ef8bb2ba95.jpg&quot;);"></span></span></span></span><span class="PIN_1650912789862_overlay PIN_1650912789862_" data-dcnode-id="1941" data-pin-href="https://www.pinterest.com/pin/598908450447580592/" data-pin-log="embed_pin"><span class="PIN_1650912789862_repin" data-dcnode-id="1942" data-pin-href="https://www.pinterest.com/pin/598908450447580592/" data-pin-id="598908450447580592" data-pin-log="embed_pin_repin_medium"><span data-dcnode-id="1943" instrument_node="">Save</span></span></span></span><span class="PIN_1650912789862_footer PIN_1650912789862_native" data-dcnode-id="1930" data-pin-href="https://www.pinterest.com/deannacat3/" data-pin-log="embed_pin_follow"><span class="PIN_1650912789862_container" data-dcnode-id="1931" data-pin-hre </span><span data-dcnode-id="1927" instrument_node="">
</span><h2 data-dcnode-id="1924"><br data-dcnode-id="1926"><span data-dcnode-id="1925" instrument_node="">What is a gopher basket?</span></h2><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1917"><br data-dcnode-id="1922"><span data-dcnode-id="1921" instrument_node="">A gopher basket is a </span><strong data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">protective wire mesh enclosure</span></strong><span data-dcnode-id="1918" instrument_node=""> designed to prevent burrowing pests from accessing and eating plant roots. Also known as a gopher cage, these physical barriers offer protection against voles and moles as well. Gopher baskets can be used when planting new trees, vines, shrubs, or other susceptible plants. The basket or cage is buried in the soil with the plant’s root ball tucked safely inside, surrounded on the bottom and all sides.&nbsp;</span></p><span data-dcnode-id="1916" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1915" instrument_node="">Gardeners can either make a homemade gopher basket, or purchase </span><a data-dcnode-id="1913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B06XHS5JFD/%3Fref%3Didea_lv_dp_ov_d%26tag%3Daiponsite-20%26linkCode%3Dic6%26ascsubtag%3Damzn1.ideas.2ZWAGY2SLCOWT" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1914" instrument_node="">pre-made gopher baskets</span></a><span data-dcnode-id="1912" instrument_node=""> – which come in a variety of sizes for shrubs and smaller plants, or larger options for trees. While it takes some added effort, it’s </span><strong data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">more cost-effective to make your own</span></strong><span data-dcnode-id="1909" instrument_node="">. A single roll of wire hardware cloth costs about the same as one large pre-made gopher cage, but is enough material to create dozens of them! Plus, we use handy hardware cloth for all sorts of homestead projects – including to block gophers from under </span><a data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/build-raised-garden-bed-on-concrete/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1908" instrument_node="">raised garden beds </span></a><span data-dcnode-id="1906" instrument_node="">and predator-proof our </span><a data-dcnode-id="1904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/expecting-backyard-chickens/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1905" instrument_node="">chicken coop.</span></a></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><br data-dcnode-id="1901"></p><span data-dcnode-id="1899" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1894"><figure class="aligncenter size-full is-resized" data-dcnode-id="1895"><img alt="A birds eye view of the surrounding area around a fig tree that has been planted in a homemade gopher basket. Three separate captions have been superimposed on the image. The bottom left corner has a caption that reads &quot;fig tree safe in basket&quot;, directly to the right middle lies the caption &quot;gopher mound&quot;, and directly above that to the top of the image lies the caption &quot;gopher hole&quot;. Surrounding the tree in its cage amongst the gopher activity also lies nasturtium with reddish pink flowers, irrigation tubing, a solar powered garden light, as well as the bottom leaves from an avocado tree. " class="wp-image-2030924" data-dcnode-id="1898" height="876" loading="lazy" sizes="(max-width: 709px) 100vw, 709px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-fig-protected.jpeg%3Fresize%3D709%252C945%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-fig-protected.jpeg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-fig-protected.jpeg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-fig-protected.jpeg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-fig-protected.jpeg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-fig-protected.jpeg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-fig-protected.jpeg?resize=600%2C800&amp;ssl=1 600w" width="657"><figcaption data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">A fig tree in our garden with gopher activity all around it.</span></figcaption></figure></div><span data-dcnode-id="1893" instrument_node="">
</span><h2 data-dcnode-id="1890"><br data-dcnode-id="1892"><span data-dcnode-id="1891" instrument_node="">What types of tree roots do gophers eat?</span></h2><span data-dcnode-id="1889" instrument_node="">
</span><p data-dcnode-id="1880"><br data-dcnode-id="1888"><span data-dcnode-id="1887" instrument_node="">Gophers are herbivores and survive by eating vegetation. As subterranean dwellers, they primarily dine on the roots of herbaceous plants, including most common garden crops, trees, shrubs, flowers, and vines. </span><a data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nwf.org/Educational-Resources/Wildlife-Guide/Mammals/Pocket-Gophers" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1886" instrument_node="">Gophers</span></a><span data-dcnode-id="1884" instrument_node=""> will eat a </span><strong data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">wide variety of tree roots</span></strong><span data-dcnode-id="1881" instrument_node="">, but are particularly fond of fruit tree roots and the extra-tender roots of young trees. In our coastal California garden, our fig trees are especially irresistible to gophers! We’ve found that they’re not quite as drawn to citrus tree roots, though gophers will eat just about any type of fruit tree roots when food is scarce.&nbsp;&nbsp;</span></p><span data-dcnode-id="1879" instrument_node="">
</span><h2 data-dcnode-id="1876"><br data-dcnode-id="1878"><span data-dcnode-id="1877" instrument_node="">How Gophers Damage Trees</span></h2><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1857"><br data-dcnode-id="1874"><span data-dcnode-id="1873" instrument_node="">True to form as part of the </span><a data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ucmp.berkeley.edu/mammal/rodentia/rodentia.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1872" instrument_node="">Rodentia</span></a><span data-dcnode-id="1870" instrument_node=""> animal order, gophers have sharp, long, rat-like front teeth. They’re perfectly adapted for </span><strong data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">cutting and chewing</span></strong><span data-dcnode-id="1867" instrument_node=""> on tough vegetation, or even to </span><strong data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">strip bark</span></strong><span data-dcnode-id="1864" instrument_node="">! Gophers eat tree roots and will also gnaw at the base of tree trunks (also known as the crown of the tree). Depending on the age of the tree and the extent of chewing done, gopher damage can range from a </span><strong data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">minor irritation to lethal</span></strong><span data-dcnode-id="1861" instrument_node="">. </span><em data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">So yes: gophers can absolutely kill trees, shrubs, vines, and more</span></em><span data-dcnode-id="1858" instrument_node="">. Especially if the feast is left unchecked!&nbsp;</span></p><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1855" instrument_node="">Large, established plants and those with extensive fibrous root systems may suffer only minimal damage (e.g. minor stunting) – particularly if the gophers nibble on a small percentage of the most exterior roots. However, if gophers manage to eat a significant portion of the roots, the tree or plant will most certainly suffer. This leaves </span><strong data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">young trees</span></strong><span data-dcnode-id="1852" instrument_node=""> with small root systems especially vulnerable. As an added bummer, gophers are most active during the spring and fall – the best time to </span><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/how-to-plant-a-tree/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1851" instrument_node="">plant new trees</span></a><span data-dcnode-id="1849" instrument_node="">!</span></p><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1845"><br data-dcnode-id="1846"></p><span data-dcnode-id="1844" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1839"><figure class="aligncenter size-full is-resized" data-dcnode-id="1840"><img alt="A close up image of a gopher, partially emerging from its subterranean dwelling. It's front top and bottom teeth resemble that of a beaver. " class="wp-image-2030921" data-dcnode-id="1843" height="455" loading="lazy" sizes="(max-width: 712px) 100vw, 712px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/Homemade-gopher-baskets-trees.jpg%3Fresize%3D712%252C492%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/Homemade-gopher-baskets-trees.jpg?w=1248&amp;ssl=1 1248w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/Homemade-gopher-baskets-trees.jpg?resize=300%2C208&amp;ssl=1 300w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/Homemade-gopher-baskets-trees.jpg?resize=1024%2C709&amp;ssl=1 1024w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/Homemade-gopher-baskets-trees.jpg?resize=768%2C532&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/Homemade-gopher-baskets-trees.jpg?resize=1140%2C789&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/Homemade-gopher-baskets-trees.jpg?resize=600%2C415&amp;ssl=1 600w" width="657"><figcaption data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">“I want to eat your trees.”</span></figcaption></figure></div><span data-dcnode-id="1838" instrument_node="">
</span><h2 data-dcnode-id="1835"><br data-dcnode-id="1837"><span data-dcnode-id="1836" instrument_node="">Signs of Gopher Damage on Trees&nbsp;</span></h2><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1825"><br data-dcnode-id="1833"><span data-dcnode-id="1832" instrument_node="">Gophers leave tell-tale dirt mounds around their shallow burrows and tunnel systems. So, if you see signs of gopher activity around your trees or yard, be on alert! Trees that are under attack by gophers may exhibit </span><strong data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">yellowing leaves, unseasonal leaf drop, or wilting</span></strong><span data-dcnode-id="1829" instrument_node="">. Less obvious symptoms include </span><strong data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">reduced vigor,</span></strong><span data-dcnode-id="1826" instrument_node=""> especially for mature trees and plants. You may sometimes see chewing marks around the base of the tree trunk just above the soil. Or, if you gently dig down a few inches below the soil to reveal missing bark or evidence of gnawing, there is likely a gopher at work.&nbsp;</span></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1822"><br data-dcnode-id="1823"></p><span data-dcnode-id="1821" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1816"><figure class="aligncenter size-full is-resized" data-dcnode-id="1817"><img alt="DeannaCat, clad in a bikini top with short workout type shorts and brown sunglasses is holding a fig tree that has had all but a few roots chewed off as well as a good portion of the trunk chewed down. The bottom of the tree resembles a field hockey stick although all of its leaves still remain intact. A homemade gopher basket would have helped this tree thrive instead of forcing it to be moved. The background contains portions of a couple garden beds with tomatoes and kale growing amongst them. There are various other green plants amongst the image with large trellises along the back fence line that are  naked aside from a small vine centered in the middle of each. " class="wp-image-8143" data-dcnode-id="1820" height="876" loading="lazy" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2019/08/how-to-plant-a-tree-gopher-damage-fig-roots-chewed.jpeg%3Fresize%3D680%252C907%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2019/08/how-to-plant-a-tree-gopher-damage-fig-roots-chewed.jpeg?w=768&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2019/08/how-to-plant-a-tree-gopher-damage-fig-roots-chewed.jpeg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2019/08/how-to-plant-a-tree-gopher-damage-fig-roots-chewed.jpeg?resize=600%2C800&amp;ssl=1 600w" width="657"><figcaption data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">Excuse my attire (it was hot out, I was young… lol) When I went to explore below the soil for this yellowing, slightly wilted fig tree, imagine my surprise to find no roots at all! You can also see extensive chew marks on the trunk that was just below the soil line. We replanted this fig tree in a basket and surprisingly it survived, though it’s never been as happy as our others. </span></figcaption></figure></div><span data-dcnode-id="1815" instrument_node="">
</span><h3 data-dcnode-id="1812"><br data-dcnode-id="1814"><span data-dcnode-id="1813" instrument_node="">Do I need to use a gopher basket for my tree?</span></h3><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1802"><br data-dcnode-id="1810"><span data-dcnode-id="1809" instrument_node="">If gophers are </span><strong data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">prevalent</span></strong><span data-dcnode-id="1806" instrument_node=""> in your yard, I </span><strong data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">highly recommend</span></strong><span data-dcnode-id="1803" instrument_node=""> using gopher baskets for trees – especially when planting small fruit trees. If there’s only a mild gopher issue in your garden, you could experiment and skip using a basket if you’d like. See what happens! While it’s a bummer to potentially lose a tree in the process, you should be able to dig it up and salvage it (and add a basket) if issues arise. Plus, there are other ways to control gophers too. I will write an article all about that subject soon, but know that physical barriers (i.e. cages) are always our preferred method since we avoid using poisons on our homestead.</span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1800" instrument_node="">After a couple of years of trial and error, we’ve come to accept that we need to use gopher baskets on most trees to keep them safe. We use them for new fruit trees that come in 5 to 15 gallon pots, including apples, loquats, persimmon, </span><a data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/how-to-grow-avocados/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1799" instrument_node="">avocado</span></a><span data-dcnode-id="1797" instrument_node="">, guava, figs, and more. However, we have opted to NOT use gopher cages for larger, hardier trees – like when we planted our California pepper tree.&nbsp;</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">The pepper tree came in a huge 36” wood nursery box, and we planted it in an area where we hadn’t witnessed much gopher activity. We also knew: a) it would grow large quickly, and b) pepper trees aren’t a known gopher favorite. We took a risk and it has grown in beautifully, with no signs of gophers. By not using a gopher basket, we also avoided constricting its growth at all. Since we planted that particular tree as a privacy screen, unbridled growth was a priority! Which leads us to another common question about gopher baskets: root binding.</span></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1790"><br data-dcnode-id="1791"></p><span data-dcnode-id="1789" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1784"><figure class="aligncenter size-full is-resized" data-dcnode-id="1785"><img alt="DeannaCat is standing next to a loquat tree in a 15 gallon nursery pot, it stands almost twice her size. The surrounding area contains paver lined gravel pathways amongst pollinator islands that contain perennials, annuals, aloe vera, and agave. The flower colors range from yellow to purple and pink, all contrasting against the various shades of green. The house in the background is blue green in color with a tall pepper tree next to it. " class="wp-image-2030935" data-dcnode-id="1788" height="867" loading="lazy" sizes="(max-width: 755px) 100vw, 755px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-deannacat-homestead-loquat-1.jpeg%3Fresize%3D755%252C996%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-deannacat-homestead-loquat-1.jpeg?w=1552&amp;ssl=1 1552w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-deannacat-homestead-loquat-1.jpeg?resize=227%2C300&amp;ssl=1 227w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-deannacat-homestead-loquat-1.jpeg?resize=776%2C1024&amp;ssl=1 776w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-deannacat-homestead-loquat-1.jpeg?resize=768%2C1013&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-deannacat-homestead-loquat-1.jpeg?resize=1164%2C1536&amp;ssl=1 1164w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-deannacat-homestead-loquat-1.jpeg?resize=1140%2C1504&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-deannacat-homestead-loquat-1.jpeg?resize=600%2C792&amp;ssl=1 600w" width="657"><figcaption data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Let’s plant this loquat tree in a gopher basket together! (The pepper tree I mentioned above is in the background)</span></figcaption></figure></div><span data-dcnode-id="1783" instrument_node="">
</span><h3 data-dcnode-id="1780"><br data-dcnode-id="1782"><span data-dcnode-id="1781" instrument_node="">Do gopher baskets cause root binding or restrict tree growth?</span></h3><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1773"><br data-dcnode-id="1778"><span data-dcnode-id="1777" instrument_node="">Root binding is when plant roots wind tightly around themselves in a limited or confined space, such as a too-small pot. This can cause stress or stunted growth in many plants. Gopher baskets </span><strong data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">may or may not restrict growth</span></strong><span data-dcnode-id="1774" instrument_node=""> or lead to root binding, depending on the type of tree, basket size, and wire material they’re made of.&nbsp;</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1771" instrument_node="">Some types of wire gopher cages</span><strong data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node=""> eventually break down</span></strong><span data-dcnode-id="1768" instrument_node=""> (or break open) as the tree matures over time, including gopher baskets made from </span><strong data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">chicken wire</span></strong><span data-dcnode-id="1765" instrument_node="">, or certain pre-made baskets that are designed to slowly degrade. This allows the tree roots to escape, but also leaves the tree potentially vulnerable to pests in the future. The good news is that large mature trees are typically more resilient and less attractive to gophers, so they </span><em data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">may</span></em><span data-dcnode-id="1762" instrument_node=""> not need the added protection of a gopher basket later in life.&nbsp;</span></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1759" instrument_node="">Other gopher baskets are constructed of far more durable wire material like galvanized hardware cloth – which is what we use to make all of our homemade gopher baskets! </span><strong data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Hardware cloth</span></strong><span data-dcnode-id="1756" instrument_node=""> gopher baskets should not corrode, rust, or otherwise degrade. With that, some </span><strong data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">modest root-binding will occur</span></strong><span data-dcnode-id="1753" instrument_node=""> over time. Small feeder roots will grow through the holes, but the vast majority of roots will be confined to (and protected in) the basket. To help combat stunting, we create extra-large gopher baskets that provide plenty of room to grow.&nbsp;</span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1750" instrument_node="">Note that it </span><strong data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">isn’t necessarily a bad thing</span></strong><span data-dcnode-id="1747" instrument_node=""> to slightly constrict the growth of a tree! Especially if you live in an urban or suburban setting that doesn’t easily accommodate massive trees. Personally, we gladly accept the trade-off of potentially smaller trees than those destroyed by gophers. We also grow many dwarf or semi-dwarf tree varieties that take more kindly to small spaces anyways. Finally, a tree planted in the ground within a gopher basket will be happier than those </span><strong data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">in a pot</span></strong><span data-dcnode-id="1744" instrument_node=""> – and tons of gardeners successfully grow trees in large pots and containers!</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">So, keeping all that in mind, let’s learn how to make a homemade gopher basket.</span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><br data-dcnode-id="1738"></p><span data-dcnode-id="1736" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1731"><figure class="aligncenter size-full is-resized" data-dcnode-id="1732"><img alt="A two way image collage of the loquat tree after it has been planted in the yard. The first image shows the tree after it has been planted inside a homemade gopher cage. There is a fig tree, avocado tree, pineapple guava, and a magnolia tree around it. The background is a fence with the tree just barely poking over the top of the fence line. The second image shows the tree a couple years after it has been planted. The tree now extends another four feet above the fence line and its trunk has grown quite large in thickness. The surrounding trees have all filled in nicely as well, nasturtium with pink flowers grow amongst the floor of the trees. " class="wp-image-2030937" data-dcnode-id="1735" height="493" loading="lazy" sizes="(max-width: 924px) 100vw, 924px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-tree-growth.jpeg%3Fresize%3D924%252C693%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-tree-growth.jpeg?w=1440&amp;ssl=1 1440w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-tree-growth.jpeg?resize=300%2C225&amp;ssl=1 300w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-tree-growth.jpeg?resize=1024%2C768&amp;ssl=1 1024w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-tree-growth.jpeg?resize=768%2C576&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-tree-growth.jpeg?resize=500%2C375&amp;ssl=1 500w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-tree-growth.jpeg?resize=1140%2C855&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-tree-growth.jpeg?resize=600%2C450&amp;ssl=1 600w" width="657"><figcaption data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Here is the loquat tree right after we planted it in December 2018 (left) versus March 2021 (right). In just over 2 years, it has grown PLENTY, despite being enclosed in a gopher basket. It’s now several feel taller than the fence, and check out how thick the trunk has grown too!</span></figcaption></figure></div><span data-dcnode-id="1730" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="1727"><br data-dcnode-id="1729"><span data-dcnode-id="1728" instrument_node="">How to Make a Homemade Gopher Basket</span></h2><span data-dcnode-id="1726" instrument_node="">
</span><h2 data-dcnode-id="1723"><br data-dcnode-id="1725"><span data-dcnode-id="1724" instrument_node="">Materials Needed:</span></h2><span data-dcnode-id="1722" instrument_node="">
</span><p data-dcnode-id="1720"><br data-dcnode-id="1721"></p><span data-dcnode-id="1719" instrument_node="">
</span><ul data-dcnode-id="1711"><li data-dcnode-id="1712"><strong data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Wire mesh</span></strong><span data-dcnode-id="1716" instrument_node=""> material of choice. Use </span><a data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B000RZCI2G%3Fref%3Dexp_deannacat3_dp_vv_d" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1715" instrument_node="">galvanized hardware cloth</span></a><span data-dcnode-id="1713" instrument_node=""> with ¼” or ½” openings for durable, long-lasting protection. Gophers can fit through holes as small as one inch, potentially even ¾”. A two or three-foot tall roll of wire works perfectly. Stainless steel is another great option, though not as affordable. If you want the cage to break down as the tree matures (as discussed above) you can use chicken wire, though it isn’t recommended for areas with persistent and abundant gophers. Rumor has it that gophers may be able to chew through chicken wire. Also note that voles are smaller than gophers and can fit through the holes in chicken wire.</span></li></ul><span data-dcnode-id="1710" instrument_node="">
</span><ul data-dcnode-id="1707"><li data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Galvanized wire (16 to 20 gauge) and/or heavy-duty zip ties for securing the basket together&nbsp;</span></li></ul><span data-dcnode-id="1706" instrument_node="">
</span><ul data-dcnode-id="1703"><li data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">Wire snips or aviation snips&nbsp;</span></li></ul><span data-dcnode-id="1702" instrument_node="">
</span><ul data-dcnode-id="1699"><li data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Work gloves – hardware cloth can be sharp and pokey to work with!</span></li></ul><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1696"><br data-dcnode-id="1697"></p><span data-dcnode-id="1695" instrument_node="">
</span><span data-dcnode-id="1692" instrument_node="">
</span><span data-dcnode-id="1690" instrument_node="">
</span><h2 data-dcnode-id="1687"><br data-dcnode-id="1689"><span data-dcnode-id="1688" instrument_node="">Instructions:</span></h2><span data-dcnode-id="1686" instrument_node="">
</span><h3 data-dcnode-id="1683"><br data-dcnode-id="1685"><span data-dcnode-id="1684" instrument_node="">Create a wire cylinder</span></h3><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><br data-dcnode-id="1681"></p><span data-dcnode-id="1679" instrument_node="">
</span><ol data-dcnode-id="1646"><li data-dcnode-id="1669"><span data-dcnode-id="1678" instrument_node="">Start by taking note of the tree pot size. The finished homemade gopher basket should be several inches larger than the tree root ball in all directions, </span><strong data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">about double the pot size</span></strong><span data-dcnode-id="1675" instrument_node="">. (Or more, if you’re starting with a petite 5 gallon tree pot). For trees, our average homemade gopher basket ends up being about 24 to 30” wide and just under 2 feet deep. Scale down as needed for smaller plants.&nbsp;The finished homemade gopher basket should stick up </span><strong data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">a few inches above the soil line</span></strong><span data-dcnode-id="1672" instrument_node=""> for maximum protection. </span><br data-dcnode-id="1671"><br data-dcnode-id="1670"></li><li data-dcnode-id="1662"><span data-dcnode-id="1668" instrument_node="">Use metal snips to cut the wire mesh into a cylinder of the desired size. Tip: I wrap the wire wide around the tree pot to get a good visual before I cut. Cut it a little larger than the final cage will be. Allow for a few inches of </span><strong data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">overlap</span></strong><span data-dcnode-id="1665" instrument_node=""> where the two ends will meet.&nbsp;&nbsp;</span><br data-dcnode-id="1664"><br data-dcnode-id="1663"></li><li data-dcnode-id="1655"><span data-dcnode-id="1661" instrument_node="">Because it can be difficult to dig a planting hole that has totally straight sides, overlap the ends of the cut wire in a manner that makes the </span><strong data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">basket wider at the top</span></strong><span data-dcnode-id="1658" instrument_node=""> and a few inches more narrow at the bottom. That way, the basket will fit nicely in your planting hole.</span><br data-dcnode-id="1657"><br data-dcnode-id="1656"></li><li data-dcnode-id="1647"><span data-dcnode-id="1654" instrument_node="">Secure the wire cylinder together using cut pieces of galvanized wire. Twist the </span><strong data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">wire “ties”</span></strong><span data-dcnode-id="1651" instrument_node=""> so they won’t come undone. You could also use strong </span><strong data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">zip ties</span></strong><span data-dcnode-id="1648" instrument_node=""> but they could eventually break, so I recommend adding at least a few pieces of wire too. If you don’t have extra wire on hand, see how I used the “pokey ends” of the hardware cloth to secure it to itself in a few places in the photo below.</span></li></ol><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1643"><br data-dcnode-id="1644"></p><span data-dcnode-id="1642" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1639"><figure class="aligncenter size-full is-resized" data-dcnode-id="1640"><img alt="Hardware cloth fashioned into a cylinder shape is shown sitting on the ground next to various plants, metal snips, a bundle of zip ties, and the remainder of the roll of hardware cloth. The hardware cloth cylinder has zip ties that keep the two ends closed together and the bottom of the cylinder has been crimped slightly so there is about three inches of overlap with a small circular opening with no hardware cloth. " class="wp-image-2030938" data-dcnode-id="1641" height="876" loading="lazy" sizes="(max-width: 744px) 100vw, 744px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-cage.jpg%3Fresize%3D744%252C992%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-cage.jpg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-cage.jpg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-cage.jpg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-cage.jpg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-cage.jpg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-cage.jpg?resize=600%2C800&amp;ssl=1 600w" width="657"></figure></div><span data-dcnode-id="1638" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1633"><figure class="aligncenter size-full is-resized" data-dcnode-id="1634"><img alt="A two way image collage, the first image shows the ends of the hardware cloth cylinder fashioned together with zip ties from the top to the bottom about every 8 inches. The second image shows how the end of the hardware cloth can be bent to wrap around the other end of the cylinder (as the zip ties do) to make the homemade gopher basket even more sturdy." class="wp-image-2030939" data-dcnode-id="1637" data-recalc-dims="1" height="598" loading="lazy" sizes="(max-width: 797px) 100vw, 797px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-overlap-hardware-cloth.jpeg%3Fresize%3D797%252C598%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-overlap-hardware-cloth.jpeg?w=1440&amp;ssl=1 1440w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-overlap-hardware-cloth.jpeg?resize=300%2C225&amp;ssl=1 300w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-overlap-hardware-cloth.jpeg?resize=1024%2C768&amp;ssl=1 1024w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-overlap-hardware-cloth.jpeg?resize=768%2C576&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-overlap-hardware-cloth.jpeg?resize=500%2C375&amp;ssl=1 500w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-overlap-hardware-cloth.jpeg?resize=1140%2C855&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-overlap-hardware-cloth.jpeg?resize=600%2C450&amp;ssl=1 600w" width="797"><figcaption data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Note how the hardware cloth is overlapped more at the bottom of the cage, making the opening wider at the top and more narrow at the bottom. I didn’t have a roll of wire handy when we made this particular basket, so I secured it with zip ties AND tucked a few loops of the hardware cloth around itself.</span></figcaption></figure></div><span data-dcnode-id="1632" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1629"><figure class="aligncenter size-full is-resized" data-dcnode-id="1630"><img alt="The hardware cloth cylinder is sitting next to a loquat tree in a 15 gallon nursery pot on a gravel pathway with pavers. Beyond lies various perennial plants with yellow, purple, and pink flowers with a fence constructed with horizontal fence boards as the back drop. " class="wp-image-2030943" data-dcnode-id="1631" data-recalc-dims="1" height="940" loading="lazy" sizes="(max-width: 746px) 100vw, 746px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-hardware-cloth-size.jpeg%3Fresize%3D746%252C940%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-hardware-cloth-size.jpeg?w=1623&amp;ssl=1 1623w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-hardware-cloth-size.jpeg?resize=238%2C300&amp;ssl=1 238w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-hardware-cloth-size.jpeg?resize=812%2C1024&amp;ssl=1 812w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-hardware-cloth-size.jpeg?resize=768%2C969&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/homemade-gopher-basket-tree-hardware-cloth-size.jpeg?resize=600%2C757&amp;ssl=1 600w" width="746"></figure></div><span data-dcnode-id="1628" instrument_node="">
</span><h3 data-dcnode-id="1625"><br data-dcnode-id="1627"><span data-dcnode-id="1626" instrument_node="">Add or form a bottom</span></h3><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><br data-dcnode-id="1623"></p><span data-dcnode-id="1621" instrument_node="">
</span><ol data-dcnode-id="1602" start="5"><li data-dcnode-id="1608"><span data-dcnode-id="1620" instrument_node="">If you’re working with </span><strong data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">3-foot</span></strong><span data-dcnode-id="1617" instrument_node=""> tall hardware cloth, bend and fold the bottom 12” to 16” towards the center of the basket. This will leave you with a basket just under 2 feet tall. I find it easiest to fold a 4-6” wide section over at a time, moving around the rim of the basket to repeat the process until it has several folds that overlap and completely cover the bottom. Pinch the folds together to make everything nice and tight.&nbsp;</span><br data-dcnode-id="1616"><br data-dcnode-id="1615"><span data-dcnode-id="1614" instrument_node="">If you started with </span><strong data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">2-foot</span></strong><span data-dcnode-id="1611" instrument_node=""> tall hardware cloth, follow the same process but only fold over about 3 or 4 inches of the bottom towards the center. Then, cut another piece of hardware cloth to cover the open hole that is left on the bottom. A square piece will do the trick, but you can get fancy and cut a circle if you prefer. Again, make this piece larger than needed so there will be overlap. Coming in from the top of the basket, push that piece down inside the basket to cover the open bottom.&nbsp;As it gets stuffed inside, the hardware cloth catches itself and locks in place nicely.</span><br data-dcnode-id="1610"><br data-dcnode-id="1609"></li><li data-dcnode-id="1603"><span data-dcnode-id="1607" instrument_node="">Now pinch the bottom folds together, and make sure everything is nice and tight with no large gaps. I’ve found the best method is to GET IN! I </span><strong data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">stand inside</span></strong><span data-dcnode-id="1604" instrument_node=""> the basket and use my weight and feet to push and squish everything into place. Then add a few zip ties or wire to hold the bottom together. Focus on areas that seem prone to gapping.&nbsp;</span></li></ol><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1599"><br data-dcnode-id="1600"></p><span data-dcnode-id="1598" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1593"><figure class="aligncenter size-full is-resized" data-dcnode-id="1594"><img alt="A two way image collage of the inside of a homemade gopher basket. The first image shows the inside of the gopher basket before the bottom piece is affixed to close the opening at the bottom. The second image shows the inside of the basket after the bottom piece has been tied to the rest of the basket. " class="wp-image-2030940" data-dcnode-id="1597" data-recalc-dims="1" height="509" loading="lazy" sizes="(max-width: 763px) 100vw, 763px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-bottom-hardware-cloth-cage.jpeg%3Fresize%3D763%252C509%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-bottom-hardware-cloth-cage.jpeg?w=1620&amp;ssl=1 1620w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-bottom-hardware-cloth-cage.jpeg?resize=300%2C200&amp;ssl=1 300w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-bottom-hardware-cloth-cage.jpeg?resize=1024%2C683&amp;ssl=1 1024w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-bottom-hardware-cloth-cage.jpeg?resize=768%2C512&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-bottom-hardware-cloth-cage.jpeg?resize=1536%2C1024&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-bottom-hardware-cloth-cage.jpeg?resize=1140%2C760&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-bottom-hardware-cloth-cage.jpeg?resize=600%2C400&amp;ssl=1 600w" width="763"><figcaption data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">It’s kind of hard to see, but I added a square piece inside the bottom to cover the hole (and then climbed inside to press it flat and into the sides).</span></figcaption></figure></div><span data-dcnode-id="1592" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1587"><figure class="aligncenter size-full is-resized" data-dcnode-id="1588"><img alt="DeannaCat's feet are visible next to the homemade gopher basket which has been turned upside down to illustrate how the zip ties were used to tie the bottom middle piece to the body of the basket. " class="wp-image-2030941" data-dcnode-id="1591" data-recalc-dims="1" height="1007" loading="lazy" sizes="(max-width: 755px) 100vw, 755px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-bottom-zip-ties.jpg%3Fresize%3D755%252C1007%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-bottom-zip-ties.jpg?w=1536&amp;ssl=1 1536w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-bottom-zip-ties.jpg?resize=225%2C300&amp;ssl=1 225w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-bottom-zip-ties.jpg?resize=768%2C1024&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-bottom-zip-ties.jpg?resize=1152%2C1536&amp;ssl=1 1152w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-bottom-zip-ties.jpg?resize=1140%2C1520&amp;ssl=1 1140w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-hardware-cloth-bottom-zip-ties.jpg?resize=600%2C800&amp;ssl=1 600w" width="755"><figcaption data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Done! Ready for planting.</span></figcaption></figure></div><span data-dcnode-id="1586" instrument_node="">
</span><h2 data-dcnode-id="1583"><br data-dcnode-id="1585"><span data-dcnode-id="1584" instrument_node="">How to Plant a Tree in a Gopher Basket</span></h2><span data-dcnode-id="1582" instrument_node="">
</span><p data-dcnode-id="1580"><br data-dcnode-id="1581"></p><span data-dcnode-id="1579" instrument_node="">
</span><ul data-dcnode-id="1547"><li data-dcnode-id="1574"><span data-dcnode-id="1578" instrument_node="">Dig a hole </span><strong data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">two to three times wider</span></strong><span data-dcnode-id="1575" instrument_node=""> than the tree pot and root ball, and deep enough to fit the gopher basket</span></li><li data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Add your homemade gopher basket to the planting hole. </span></li><li data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Check the height. Remember, the goal is for the basket to extend a few inches above grade. Adjust the planting hole if needed.</span></li><li data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">While pressing down, shimmy the gopher basket back and forth to get it settled in the bottom of the hole. Try to get it to sit as level as possible. </span></li><li data-dcnode-id="1563"><span data-dcnode-id="1567" instrument_node="">Set the potted tree inside the basket. Note the depth compared to the surrounding soil level. Then, take the tree back out and add enough soil to the bottom of the basket so that once the tree is inside, the crown (base of the trunk) will be elevated to just above ground level. (</span><strong data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Do not bury the trunk of the tree</span></strong><span data-dcnode-id="1564" instrument_node="">).</span></li><li data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Carefully remove the tree from its pot and place the root ball centered in the gopher basket. </span></li><li data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Backfill soil around the tree, taking care to keep it standing straight.</span></li><li data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">If your homemade gopher basket is extra-tall, you can bend it inward slightly to create a dome over the top of the rootball.</span></li><li data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Thoroughly water the tree.</span></li><li data-dcnode-id="1550"><span data-dcnode-id="1554" instrument_node="">Add 2-4″ of </span><a data-dcnode-id="1552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/garden-mulch-types-pros-cons/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1553" instrument_node="">organic mulch</span></a><span data-dcnode-id="1551" instrument_node=""> around the base of the tree, but not directly against the tree trunk. Leave a few inches of clear space around the trunk.</span></li><li data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Stand back and admire your hard work!</span></li></ul><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1540"><br data-dcnode-id="1545"><span data-dcnode-id="1544" instrument_node="">For more detailed information on planting trees including soil, fertilizer, timing, planting location and more, please visit: </span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/how-to-plant-a-tree/" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">“How to Plant a Tree: Best Practices for Success”</span></strong></a></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><br data-dcnode-id="1538"></p><span data-dcnode-id="1536" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1531"><figure class="aligncenter size-full is-resized" data-dcnode-id="1532"><img alt="A four way image collage of planting the loquat tree in a gopher basket. The first image shows Aaron standing in a hole that has been dug for the tree, it is a sloped area so the back of the soil line is at his knees while the front of the hole soil line is around his shins. The second image shows the loquat tree and nursery pot sitting inside the homemade gopher basket inside of the hole that has been dug for the it. The third photo shows the gopher basket sitting inside the hole, the bottom has been covered with dirt as it has been worked into the hole itself, thus allowing the free soil around the area to infiltrate the bottom of the basket. The final image shows the tree after it has been planted and mulched with leaves and bark. The top of the gopher basket is still visible as it sits just above the soil line. " class="wp-image-2030942" data-dcnode-id="1535" data-recalc-dims="1" height="1127" loading="lazy" sizes="(max-width: 806px) 100vw, 806px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-planting-hole.jpeg%3Fresize%3D806%252C1127%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-planting-hole.jpeg?w=1080&amp;ssl=1 1080w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-planting-hole.jpeg?resize=214%2C300&amp;ssl=1 214w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-planting-hole.jpeg?resize=768%2C1075&amp;ssl=1 768w, https://i0.wp.com/homesteadandchill.com/wp-content/uploads/2021/04/how-to-make-homemade-gopher-basket-trees-planting-hole.jpeg?resize=600%2C840&amp;ssl=1 600w" width="806"><figcaption data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Planting the loquat. The height looks a little funny at first because this area is on a slope. Once it was all planted and backfilled, the gopher cage protrudes just a few inches above the soil.</span></figcaption></figure></div><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1527"><br data-dcnode-id="1529"><span data-dcnode-id="1528" instrument_node="">Here is the video I promised! Check out minutes 2-13 to watch me sizing and making the homemade gopher basket, then installing it in the planting hole. The second half of the video is more focused on planting trees, how we amend the soil, etc. At the very end, you can see it all planted, mulched, and the cage just above the soil.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><br data-dcnode-id="1525"></p><span data-dcnode-id="1523" instrument_node="">
</span><figure class="wp-block-embed aligncenter is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="1517"><div class="wp-block-embed__wrapper" data-dcnode-id="1518"><span data-dcnode-id="1522" instrument_node="">
</span><span class="embed-youtube" data-dcnode-id="1520" style="text-align:center; display: block;"><iframe allowfullscreen="true" class="youtube-player" data-dcnode-id="1521" height="540" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups allow-presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/yNVRRFkaiZQ%3Fversion%3D3%26rel%3D1%26showsearch%3D0%26showinfo%3D1%26iv_load_policy%3D1%26fs%3D1%26hl%3Den-US%26autohide%3D2%26wmode%3Dtransparent&amp;raw" style="border:0;" width="960"></iframe></span><span data-dcnode-id="1519" instrument_node="">
</span></div></figure><span data-dcnode-id="1516" instrument_node="">
</span><h3 class="has-text-align-center" data-dcnode-id="1513"><br data-dcnode-id="1515"><span data-dcnode-id="1514" instrument_node="">And that is how to make a homemade gopher basket.</span></h3><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1509"><br data-dcnode-id="1511"><span data-dcnode-id="1510" instrument_node="">These things have been a lifesaver in our garden, literally! If you also live in an area where pesky gophers rule the subterranean land, you may want to seriously consider planting trees in gopher baskets too. After reading this article, I hope you feel empowered and prepared to do so! Please let me know if you have any questions. Also, please share or pin this article if you found it useful. Thank you so much for tuning in. May your trees be happy, healthy, and safe from gophers!</span></p><span data-dcnode-id="1508" instrument_node="">

</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Hello Colleen, those pesky gophers can really make you work can’t they? We have not yet used castor oil as a gopher deterrent and its efficacy seems to have mixed reviews but it should be safe to use in and around the garden. There are solar powered ultrasonic spikes that are used to keep gophers away with some brands getting pretty good reviews. It may allow you to set up a perimeter to keep the gophers away from your garden space. Let us know if you have any other questions, hope that helps and good luck!</span></p><span data-dcnode-id="1163" instrument_node="">

</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Our yard is a war zone of gopher invasions. We have a young Everbearing Mulberry tree, still in the nursery container, that is less than two feet tall and very scrawny. I understand these can grow 8-10 feet wide and 15 feet high. Given how vulnerable it’s root system is now, and potentially how massive it can become, would you suggest putting this in a gopher basket? Or should we keep it in the container and pot up until it’s mature enough to handle a gopher onslaught? If you think the latter option is wise, how big should the tree be before we put it in the ground? Or would you suggest a totally different option? (So many questions! lol) Thanks in advance for any guidance.</span></p><span data-dcnode-id="1051" instrument_node="">

</span><a aria-label="Reply to Aaron (Mr. DeannaCat)" class="comment-reply-link" data-belowelement="comment-2036365" data-commentid="2036365" data-dcnode-id="1027" data-postid="2030900" data-replyto="Reply to Aaron (Mr. DeannaCat)" data-respondelement="respond" href="#comment-2036365" rel="nofollow"><span data-dcnode-id="1028" instrument_node="">Reply</span></a><span data-dcnode-id="1026" instrument_node="">

</span><div class="comment-text" data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Hello Oriana, we have a few trees (fig and avocado) that we have planted in gopher baskets that have become quite large even with being planted in baskets. The Mulberry tree will do much better and should take off quicker if planted in the ground versus being kept in its pot. If you want the tree to have unlimited growth, look into the pre made gopher baskets that will usually last for at least 3 to 5 years before they eventually break down and allow the larger roots to expand beyond the cage after that. They have various sizes depending on how large of a rootball you have to work with, though I would size up with the idea that the tree will grow and need more room for its roots. Hope that helps and good luck! Let us know how it works out for you!</span></p><span data-dcnode-id="1018" instrument_node="">

</span><div class="comment-text" data-dcnode-id="931"><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Hi Deanna,</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">What an amazing wealth of information you have on your site and an utterly beautiful gardening history. I came across your website while researching tree planting practices for my new home in Santa Rosa, Ca. To my surprise, we know eachother and went to college together while sharing a circle of friends in the environmental/sustainability fields at Chico State some time ago.</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Small and amazing world. I hope you and your husband are doing well in these crazy times. </span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">I’m planting two trees in my yard, a Valley Oak and an October Glory Maple. They are both in 24 inch boxes and about 12-15 feet tall from their base. Their trunks are about 2 inches in diameter near the base. I’m trying to determine if I should gopher cage them or not. Those little jerks are around my property, but I’m not sure if they care about these type of trees or not. I have the 1/2 inch square galvanized hardware coth (wire) to make baskets, but wonder if they would inhibit their growth too much, if gophers would even care for these tree types, or if they’re established enough at this size/age to widthstand some gopher nibbles.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">I need shade bad in my yard and the sweat equity I’ve put in thus far would be painful to see go to waste if these beauties are wrecked from down below. </span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Any thoughts you have would be welcome and I appreciate your insight. I hope your new digs are treating you both well.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="936" instrument_node="">Cheers,</span><br data-dcnode-id="935"><span data-dcnode-id="934" instrument_node="">
Nathan</span></p><span data-dcnode-id="932" instrument_node="">
</span></div><span data-dcnode-id="930" instrument_node="">

</span><div class="comment-meta" data-dcnode-id="907"><span data-dcnode-id="913" instrument_node="">
</span><a class="comment-date" data-dcnode-id="911" href="#comment-2047037"><span data-dcnode-id="912" instrument_node="">August 6, 2021&nbsp;at&nbsp;8:13 am</span></a><span data-dcnode-id="910" instrument_node="">

</span></div><span data-dcnode-id="906" instrument_node="">
</span><div class="comment-text" data-dcnode-id="901"><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Hi Nathan, I don’t know how we missed this comment but it is definitely a small world! It’s also great to hear from people from our past Chico days. Now, in regards to your questions, your trees should be just fine without the gopher cages due to their age and size of their root ball. Gophers typically like younger tree roots and as trees get bigger, their roots become more tough or the root ball is big enough to handle small gopher attacks. Hope that helps and sorry we didn’t see this sooner, good luck!</span></p><span data-dcnode-id="902" instrument_node="">

</span><img alt="🌎 Happy Earth Day! I’m sure you’re being flooded with ideas &amp; tips to help save Mama Earth today, but I have to plug a few of my favorite eco-friendly things you can do at home - and not just today! 👇🏼
.
🌿 Start a Garden. In addition to being a healthy, enjoyable, family-friendly hobby, growing and preserving your own food reduces dependence on the grocery store, which reduces food packaging, waste, and transportation impacts.
.
🪱 Compost! Composting is a fantastic way to divert food and garden waste from the landfill, and upcycle it into free organic fertilizer for your plants - houseplants included, and even if you don’t have a garden or yard! There are SO many different ways to compost at home: worm bins, tumblers, passive piles, hot piles, bokashi... you just need to figure out what method(s) works best for you. We’ve kept a worm bin in an apartment and office before!
.
🌲 Plant a tree. Cliche, but really, do it. They offer shade, habitat for wildlife, sequester carbon from the air, and improve soil health &amp; fertility. Bonus points if it’s native and/or edible!
.
🌻 Plant nectar and pollen-rich flowers for pollinators, and keep areas of your yard wild and dense to offer habitat, shelter, and nesting places for wildlife.
.
🐝 Please please please, avoid using toxic pesticides and herbicides.
.
💰 If you can’t garden at home, do your best to support organic ag and local farmers (hey farmer’s market/CSA!) I know there is an access/privilege issue here, so if you’re able, also consider donating to organizations that focus on making healthy organic food more accessible to underprivileged communities through local farming projects, education, or community gardens.
.

</span><span data-dcnode-id="374" instrument_node=""> </span><img alt="💚 Have you tried kohlrabi before? 👽 This weekend's harvest featured our first 2 green kholrabi of the season (the purple variety is maturing more slowly). You know how much I love our leafy greens, but I'm definitely stoked to see more variety in our harvest! 😍
.
As a member of the brassica family, kholrabi tastes like the center portion of a really sweet, tender broccoli stem - but even more juicy and crisp!  While there are numerous ways to prepare kholrabi (ferment, pickle, roast, sauté, in coleslaw, soup or kraut) we enjoy them raw and fresh best! It's good to peel them since the outer layer can be tough, but after that we slice up the insides like carrot sticks, ideal for snacking on plain or with hummus/other dips 👌🏼 If you haven't yet, I highly recommend giving it a try - or growing your own!
.

</span><span data-dcnode-id="356" instrument_node=""> </span><img alt="🌿 We harvested the last of the spring radishes today! (Well, the smaller, quick-maturing varieties that is - the daikons are still out there sizing up). If it weren't for this weeks heat wave, we could have left some of these out there a little longer, but they're prone to get pithy and woody in high heat - so out they came!
.
To preserve the bumper harvest we made lacto-fermented dilly radish &quot;pickles&quot; yesterday, and it hit me that it was the first time we've fermented anything (aside from sourdough) in over a year thanks to our move 🤯 So its exciting to get back on that train, seeing that fermentation is one of my favorite ways to preserve and all. It's literally the only prevention method where your food becomes MORE nutritious rather than less! (Hello probiotics) I documented the process in Stories - they're up right now and I'll save a highlight. The recipe is also on the blog, and can be used for carrots, beets, green beans and more 👍🏼 
.
Today for lunch we had sliced radishes on multigrain crackers w/ cream cheese, garden dill, and flaky sea salt 🤤 and then of course we've been eating tons of them on salads, tostadas, veggie sandwiches and sautéed over the last month or so too. Feels SO wonderful to be eating garden-to-table more and more once again!
.
Bonus: spy the imposter radish tail.
.

</span><span data-dcnode-id="338" instrument_node=""> </span><img alt="🔥 Heat Wave Tips! 🥵 Is it unseasonably warm where you are right now too? It’s going to be nearly 90°F today, in the 80s for a few days thereafter, and we don’t want our cool-season crops to bolt! Below are 6 things you can do to protect your garden during a heat wave. Some immediate, and some that take a little planning.
.
1) 🌞 Cover plants w/ hoops and shade cloth. We put ours up early this morning. Shade cloth comes in black, white, green... they all work to reduce the hot sun rays beating down on the plants - and also help keep the soil more cool! (Plants are more sensitive to the temperature of soil and their root zone, not air)
.
2) 💧 Water everything really well (slow, long and deep) either the morning of or night before the heat wave. BUT resist the urge to over water. Some plants may go limp during the peak heat of the day, no matter if they have ample water or not. So, don’t take wilting as a sign that they automatically need watwr. Check the soil moisture level before adding more. The plants almost always perk back up in the evening!
.
3) 🌿 Avoid wetting plant leaves when you water, especially before a heat wave. Moisture and water droplets act like a magnifying glass, amplifying the impact of the sun. Plants get sunburn too! 
.
4) 🍂 Mulch. Providing a couple inches of compost, wood chips, straw, pine needles, or other organic material on top of the soil will buffer it against temperature extremes and also reduce evaporation.
.
5) 🧐 Choose heat-tolerant or slow-bolting cool season crop varieties (leafy greens, broccoli, cauliflower, radishes, etc) especially if your area is prone to unpredictable weather.
.
6) 💦 Develop good watering practices early. It’s ALWAYS best to water your garden deeply and less frequently than in short bouts of shallow water more often. Deep, slow water will encourage roots to grow deeper and longer - which makes them more resilient to temperature swings and drought. Plants with shallower roots are prone to get stressed more easily. Stress can lead to bolting, along with less overall resilience against pests &amp; disease.
.
I hope this helps your plants stay cool and healthy. Save this post for your next heat wave!✌🏼" data-dcnode-id="337" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homesteadandchill.com/wp-content/uploads/sb-instagram-feed-images/277969182_129785162713339_3552150035933619437_n.webpfull.jpg&amp;raw" style="display: none;"><span data-dcnode-id="336" instrument_node="">

</span><span data-dcnode-id="320" instrument_node=""> </span><img alt="📸 Garden update + photo dump 🌿 cuz you all still like photos, right? I mean, I know videos and reels can be fun (though I wholeheartedly despise the pressure that you &quot;have to&quot; make them these days). Regardless of trends, I'll always primarily post photos here. It's why I joined this app nearly 10 years ago, and documenting my life via photos has been a passion of mine since I was a little girl. Plus we have SO much going on in the garden right now, I can hardly keep up with capturing and sharing it all! 
.
1) Helloooo beautiful lettuce 😍 Yeah, we've been eating a lot of salad. 😹 So have the chickie babes.
2) Helloooo agave flower spike 😳 She's been getting more feisty by the minute but hasn't even fully flowered yet.
3) Kohlrabi is coming in hot! 👽
4/5) The grow room is still full big beautiful seedlings. Cukes, pumpkins, melons and hard squash just sprouted a couple weeks ago, we topped the basil and some of the peppers this weekend, the massive eggplant finally got transplanted outside yesterday, and we potted up the tomatoes into larger containers than shown here a few days ago.
6, 7, 8) Been harvesting tons of radishes and fat stacks of greens 😉💵
9) The first little handful of homegrown blueberries 🫐

</span><span data-dcnode-id="302" instrument_node=""> </span><img alt="🥑 How it started VS How it's going ➡️ (Alternate caption: yes, we kill plants too! 😅) One of the most painful parts of leaving our old homestead was parting with our beloved Hass avocado tree, which has just begun to prolifically bear fruit for us. So one of the very first things we did at the new homestead was plant 4 avo trees: 2 Hass, 1 Lamb Hass, and 1 Fuerte (a type B to cross pollinate all the type A Hass). Well, the trees are all pretty pissed right now 😬
.
First of all, I made a dumb mistake setting up their irrigation system (set zone 1, but they were on zone 2) so the poor things go almost zero water for the first few months until we realized it. They were already looking pretty pathetic by then. Second, we were hit with a fairly rare hard freeze in February - with a low of 27 or 28, and Hass are only hardy down to 28-29 (and mostly once they're larger/more mature). I totally forgot to cover them with frost cloth; I was too busy fretting over and protecting the veggie seedlings we'd just planted instead. Looking back, waiting to plant until spring may have been most wise too, giving them more time to get settled before cold weather set in. 
.
The smallest Hass tree turned completely black down to the base, a sign of dead wood. We replaced that one this weekend with a new larger Hass. The medium-size Lamb Hass had some black limbs; we pruned those back into the healthier wood. Thankfully the main trunk looks healthy and has lots of new growth. The largest Hass is fine, minus some singed frumpy leaves. The Fuerte lost some leaves but has no damaged wood. The least impacted 2 were not only more mature, but also tucked into a sheltered microclimate by the hillside and big oak nearby. The two that were hit harder were more exposed, and smaller trees.
.
Anywho, just keeping it real and sharing our experience as we go, killing trees and all. 😅 One day we'll be harvesting big homegrown avocados once again... mark my words! 🙌🏼
.
🥑 Also, there are many avo varieties that are far more cold-hardy than Hass, some into the low 20s! Google &quot;Homestead and Chill avocados&quot; to see our grow guide + a list of over 20 different varieties to try 
.
