</span><h2 data-dcnode-id="645" id="section-one"></h2><span data-dcnode-id="644" instrument_node="">
</span><p class="large-subhead" data-dcnode-id="643"></p><p class="large-text" data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Trees are a truly beautiful part of the natural environment, but they are also amazingly efficient machines—constantly working to make Earth a healthier planet. </span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">The Trees for Wildlife™ program is designed to help you guide children and teens through activities that will deepen their understanding of how trees make a difference in their lives and in the world.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Here are 10 proven ways that trees make a big difference.</span></p><p data-dcnode-id="634"></p><span data-dcnode-id="633" instrument_node="">
</span></div><span data-dcnode-id="631" instrument_node="">
</span><div class="col-sm-6" data-dcnode-id="627"><span data-dcnode-id="630" instrument_node="">
</span><img alt="Rodents in Trees: Debra Milne" class="img-responsive center-block" data-dcnode-id="629" height="420" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nwf.org/-/media/NEW-WEBSITE/Programs/GatherContent/mammalrodenttreesquirrelsleepingpennsylvaniadebramilne420x420jpg.ashx%3Fh%3D420%26la%3Den%26w%3D420%26hash%3D2A80B9A97B042052CA0BECD821A185703AF96A6B&amp;raw" width="420"><span data-dcnode-id="628" instrument_node="">
</span></div><span data-dcnode-id="626" instrument_node="">
</span></div><span data-dcnode-id="623" instrument_node="">
</span><span data-dcnode-id="621" instrument_node="">
</span><h2 data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">1. Trees improve air quality.</span></h2><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">
Trees are sometimes called the lungs of the Earth because they absorb pollutants through their leaves, trapping (or “sequestering”), and filtering contaminants in the air. Like all green plants, trees also produce oxygen through photosynthesis.
</span></p><span data-dcnode-id="615" instrument_node="">
</span><h2 data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">2. Trees improve water quality, and reduce flooding and erosion.</span></h2><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">
A tree’s leafy canopy catches precipitation before it reaches the ground, allowing some of it to gently drip and the rest to evaporate. Tree roots hold soil in place, reducing erosion. In these ways, trees lessen the force of storms and reduce the amount of runoff into sewers, streams, and rivers, improving water quality. One hundred mature trees can intercept about 100,000 gallons of rainfall per year.
</span></p><span data-dcnode-id="609" instrument_node="">
</span><h2 data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">3. Trees temper climate.</span></h2><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">
Trees lower air temperatures and humidity; they can also influence wind speed. Evaporation of water from trees, or transpiration, has a cooling effect. Cities develop “heat islands” because dark roofs and pavement absorb solar energy and radiate it back. Trees in parking lots have been shown to reduce asphalt temperatures by 36 degrees Fahrenheit and car interiors by up to 47 degrees Fahrenheit.
</span></p><span data-dcnode-id="603" instrument_node="">
</span><h2 data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">4. Trees conserve energy.</span></h2><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">
Three or more large trees strategically placed on sunny sides of a house shade it from the hot summer sun, reducing air-conditioning costs by as much as 30 percent. Deciduous trees are best for this use because they lose their leaves in winter, exposing the house to the warming winter sun, which lowers the energy needed to heat the house. Coniferous trees, because they retain their needles year-round, serve to reduce wind when placed on the north and northwest sides of a building, resulting in significantly lower winter heating costs.
</span></p><span data-dcnode-id="597" instrument_node="">
</span><h2 data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">5. Trees are good for the economy.</span></h2><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">
Economic analyses have found that the value of homes near trees is 9 to 15 percent higher than homes without. Research shows that shoppers linger longer along a shaded avenue than one barren of trees and are even willing to pay more for goods and services.
</span></p><span data-dcnode-id="591" instrument_node="">
</span><h2 data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">6. Trees create habitat for plants and animals.</span></h2><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">
Wherever trees are established, wildlife and other plants are sure to follow, ensuring a healthier ecosystem. Trees provide shelter and food for a variety of birds and small animals.
</span></p><span data-dcnode-id="585" instrument_node="">
</span><h2 data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">7. Trees improve health.</span></h2><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">
Research demonstrates that exposure to trees has a relaxing effect on humans, reducing stress and imparting a sense of well-being. Hospital patients with a window view of trees recover faster than those without. Children with Attention Deficit Disorder (ADD) are better able to concentrate after time spent in outdoor green settings.
</span></p><span data-dcnode-id="579" instrument_node="">
</span><h2 data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">8. Trees reduce crime.</span></h2><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">
Data show that apartment buildings with high levels of greenery had significantly fewer crimes than those without any trees.
</span></p><span data-dcnode-id="573" instrument_node="">
</span><h2 data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">9. Trees reduce noise pollution and can serve as screens.</span></h2><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">
A belt of trees 100 feet wide and 50 feet tall can reduce highway noise by up to 10 decibels, reducing the sound volume by half. Densely planted trees can also block unsightly views.
</span></p><span data-dcnode-id="567" instrument_node="">
</span><h2 data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">10. Trees promote community.</span></h2><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">
Trees can enhance a community’s sense of pride, and ownership. Active involvement in tree planting programs leads to a stronger sense of community and the promotion of environmental responsibility and ethics. Planting programs also project a visible sign of change and provide the impetus for other community renewal and action programs.</span></p><span data-dcnode-id="561" instrument_node="">
</span><hr data-dcnode-id="560"><span data-dcnode-id="559" instrument_node="">
</span><h4 data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">
How Trees Help our Climate
</span></h4><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">
One tree can sequester (or take in) more than one ton of carbon dioxide in its lifetime. Planting trees and avoiding deforestation are key measures in reducing the human impact on global climate change.
</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">
