</span><div class="wp-caption aligncenter" data-dcnode-id="806" id="attachment_4795" style="width: 510px"><img alt="how-to-grow-trees-fast" aria-describedby="caption-attachment-4795" class="size-full wp-image-4795 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="811" data-lazy-loaded="1" data-recalc-dims="1" height="370" loading="eager" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/how-to-grow-trees-fast.jpg%3Fresize%3D500%252C370%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/how-to-grow-trees-fast.jpg?w=500&amp;ssl=1 500w, https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/how-to-grow-trees-fast.jpg?resize=300%2C222&amp;ssl=1 300w, https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/how-to-grow-trees-fast.jpg?resize=100%2C74&amp;ssl=1 100w" width="500"><noscript data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">&lt;img aria-describedby="caption-attachment-4795" loading="lazy" class="size-full wp-image-4795" src="https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/how-to-grow-trees-fast.jpg?resize=500%2C370&amp;#038;ssl=1" alt="how-to-grow-trees-fast" width="500" height="370" srcset="https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/how-to-grow-trees-fast.jpg?w=500&amp;amp;ssl=1 500w, https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/how-to-grow-trees-fast.jpg?resize=300%2C222&amp;amp;ssl=1 300w, https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/how-to-grow-trees-fast.jpg?resize=100%2C74&amp;amp;ssl=1 100w" sizes="(max-width: 500px) 100vw, 500px" data-recalc-dims="1" /&gt;</span></noscript><p class="wp-caption-text" data-dcnode-id="807" id="caption-attachment-4795"><span data-dcnode-id="808" instrument_node="">Fruit trees will get off to the best start if fed a steady diet of compost. Humus is important if trees are to be productive, disease-free and fast-growing. Use your compost as a mulch as well as a steady source of nutrients to your growing trees.</span></p></div><span data-dcnode-id="805" instrument_node="">
</span><h4 data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Using Compost For Tree Growth</span></h4><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="799"><strong data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Start right from the very beginning. Use compost to start and nourish your tree. We cannot recommend commercial, chemical fertilizers which do not add humus to the soil. You must add organic matter to the soil if you want productive, disease-free trees. Soil that is well supplied with humus retains moisture and has good drainage and aeration.</span></strong></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">As humus decomposes, it releases a continuous supply of plant food in contrast to the “flash” action produced by chemical fertilizers. It encourages the existence of beneficial bacteria and earthworms. It fights erosion and over-compactness of the soil.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Every tree grower must have a compost pile. Use your compost as a mulch around each tree. Your trees need nitrogen, phosphorus and potash and your compost pile should contain these nutrients in good proportion.</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">When organic expert Herbert Clarence White of Paradise, California, plants a tree, he doesn’t even glance at the little instruction sheet that the nursery sent with the stock. He proceeds to plant the tree using an unusual method handed down to him by his grandmother years ago.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Grandma White’s method has worked so well for Herbert over the years that he has used it to plant hundreds—possibly even thousands—of trees. He has seen fruit trees planted by Grandma White’s method show 3 or 4 feet of new growth in a year, and start bearing crops in only a couple of seasons.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">You start out by digging a hole 3 feet wide and 3 feet deep in which to plant your young tree. That size hole is much bigger than is usually recommended, but a big hole is the heart of Herbert’s method and he insists on it.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Separate the topsoil from the subsoil that is dug from the planting hole. In the bottom of the hole place, a couple of pieces of 4-inch drain tile and plug up the ends with stones. Fill up the bottom foot of the hole with a mixture of equal parts of topsoil, peat moss and finished compost, plus about five pounds of phosphate rock or colloidal phosphate.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">The top 12-inch layer—consisting of a mixture of compost, thoroughly soaked peat moss, leafmold, colloidal phosphate, and rich topsoil, is most important. This is the immediate “seedbed” where the tender young feeder roots will be working.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">No raw manure or chemical fertilizer should ever contact this area. Such materials will seriously burn the roots, and perhaps even kill the tree outright. Even raw manure, used as a mulch at the top has often proved disastrous to newly planted trees. So go slow on the manure!</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">On top of that mixture place a layer of small rocks. The next one-foot layer consists of pure topsoil. Now put into the hole a large stone. Spread the roots of the tree over that stone, then fill the rest of the hole with the compost-topsoil-peat-phosphate-rock mixture.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">As mulch over the planting, place one inch of compost, 3 inches of leaves, plus a layer of stones if desired. White also advises putting 250 to 500 earthworms in the top compost layer, and adds this postscript to the description of his method:</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Does all this sound too weird and grotesque? Too utterly fantastic? If so, far be it from me to try and convince you. But if you are just a wee bit interested in watching a miracle, just try it out on one little tree—following the planting plan as indicated in the diagram carefully—and it will be hard for you to believe your own eyes when that baby tree starts growing.”</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="761"><img alt="planting-trees-fast" class="aligncenter size-full wp-image-4796 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="764" data-lazy-loaded="1" data-recalc-dims="1" height="394" loading="eager" sizes="(max-width: 507px) 100vw, 507px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/planting-trees-fast.jpg%3Fresize%3D507%252C394%26ssl%3D1&amp;raw" srcset="https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/planting-trees-fast.jpg?w=507&amp;ssl=1 507w, https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/planting-trees-fast.jpg?resize=300%2C233&amp;ssl=1 300w, https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/planting-trees-fast.jpg?resize=100%2C78&amp;ssl=1 100w" width="507"><noscript data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-4796" src="https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/planting-trees-fast.jpg?resize=507%2C394&amp;#038;ssl=1" alt="planting-trees-fast" width="507" height="394" srcset="https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/planting-trees-fast.jpg?w=507&amp;amp;ssl=1 507w, https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/planting-trees-fast.jpg?resize=300%2C233&amp;amp;ssl=1 300w, https://i0.wp.com/mdcreekmore.com/wp-content/uploads/2018/10/planting-trees-fast.jpg?resize=100%2C78&amp;amp;ssl=1 100w" sizes="(max-width: 507px) 100vw, 507px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="757"><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Here is the “Grandma White” method for planting trees. Start out by digging a hole that is 3 feet wide and deep, separating topsoil from the subsoil. Place drain tile, stones at the bottom, filling the hole with topsoil, compost, peat moss, and mineral powders.</span></strong></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">In treating a sick tree, or one which has failed year after year to produce a crop, use the same formula as used in planting a baby tree. In other words, make a “blend” or mixture consisting of ½ yard (12 bushels) topsoil; 2 bushels compost (completely decomposed); 2 bushels leaf mold (completely broken down); 20 pounds colloidal phosphate (or rock phosphate); and 20 pounds of rock potash.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">The above formula will be sufficient for a young tree from 2 to 6 years of age that has shown little vitality and below average growth. This enriched earth will be used to fill the 20-inch holes that encircle the young tree. (Dig 8 holes, 8 inches in diameter and 20 inches deep, around the tree at the drip line.)</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">The next step in “treating” a sick tree is to level off the land around the trunk a little beyond the drip line of the branches and to build a sturdy dike just outside the ring of 20-inch holes. Ten pounds of each of the two above-mentioned minerals should then be spread from the trunk of the tree out to the rim of the basin and worked lightly into the soil with a rake.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">One inch of compost and leaf mold (mixed) should then be added to the area within the basin and spread out evenly.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">If domesticated earthworms are to be used in this “health-building” program, they should be spread over the compost (from 500 to 1,000) and covered with a 3-inch leaf mulch. A little cornmeal or coffee grounds spread on the compost before spreading the leaves would help to give the worms a good start in their new environment.</span></p><span data-dcnode-id="741" instrument_node="">
</span><div class="awac-wrapper" data-dcnode-id="658"><div class="awac widget text-233" data-dcnode-id="659"><span data-dcnode-id="740" instrument_node=""> </span><div class="textwidget" data-dcnode-id="661"><div class="" data-account="1285710:t4w4u7d4k1" data-dcnode-id="663" data-form="1653976:o1i8n3"><span data-dcnode-id="737" instrument_node="">

</span><div class="abh_box abh_box_down abh_box_minimal" data-dcnode-id="572"><ul class="abh_tabs" data-dcnode-id="648"><span data-dcnode-id="656" instrument_node=""> </span><li class="abh_about abh_active" data-dcnode-id="653"><a data-dcnode-id="654" href="#abh_about"><span data-dcnode-id="655" instrument_node="">Author</span></a></li><span data-dcnode-id="652" instrument_node=""> </span><li class="abh_posts" data-dcnode-id="649"><a data-dcnode-id="650" href="#abh_posts"><span data-dcnode-id="651" instrument_node="">Recent Posts</span></a></li></ul><div class="abh_tab_content" data-dcnode-id="574"><section class="vcard author abh_about_tab abh_tab" data-dcnode-id="618" itemprop="author" itemscope="" itemtype="http://schema.org/Person" style="display:block"><div class="abh_image" data-dcnode-id="641" itemscope="" itemtype="http://schema.org/ImageObject"><a class="url" data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mdcreekmore.com/" rel="nofollow" target="_blank" title="M.D. Creekmore"><span data-dcnode-id="647" instrument_node=""> </span><img alt="M.D. Creekmore" class="photo jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="646" data-lazy-loaded="1" data-recalc-dims="1" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/mdcreekmore.com/wp-content/uploads/gravatar/me-in-vest.jpg%3Fw%3D250%26ssl%3D1&amp;raw"><noscript data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">&lt;img src="https://i0.wp.com/mdcreekmore.com/wp-content/uploads/gravatar/me-in-vest.jpg?w=250&amp;#038;ssl=1" class="photo" alt="M.D. Creekmore" data-recalc-dims="1" /&gt;</span></noscript></a><span data-dcnode-id="642" instrument_node=""> </span></div><div class="abh_social" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node=""> </span></div><div class="abh_text" data-dcnode-id="620"><div class="abh_name fn name" data-dcnode-id="636" itemprop="name"><a class="
