</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1218" id="mntl-sc-block_1-0-7"><span data-dcnode-id="1227" instrument_node="">
</span><br data-dcnode-id="1226"><span data-dcnode-id="1225" instrument_node="">While many fruiting plants are best pruned when they are </span><a data-component="link" data-dcnode-id="1223" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruce.com/what-is-dormancy-1403075"><span data-dcnode-id="1224" instrument_node="">dormant</span></a><span data-dcnode-id="1222" instrument_node="">, this is not the case with peach trees. Pruning them when the weather is still cold makes them susceptible to dieback and causes them to be less cold-hardy overall.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1220" data-id="#citation-1"><span data-dcnode-id="1221" instrument_node="">1</span></span><span data-dcnode-id="1219" instrument_node=""> Ideally, you should prune peach trees annually in spring, just as the buds swell and begin to turn pink. It's better to prune a little too late than too early. However, you can remove shoots developing in the center of the tree at any time since these will block sun and air from getting to the fruits. Plus, taking them out during the summer usually means less to remove the next spring.
</span></p><span data-dcnode-id="1217" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1206" id="mntl-sc-block_1-0-8"><div class="comp ad-group--how-to__ad-4 div mntl-block" data-dcnode-id="1207" id="ad-group--how-to__ad-4_1-0"><span data-dcnode-id="1216" instrument_node="">

</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1203" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1204" instrument_node="">
Major pruning of a peach tree should begin when the tree is at least three years old and has matured enough to produce a good fruit crop. Before this, pruning efforts should be limited to establishing the basic shape of the tree.
</span></p><span data-dcnode-id="1202" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1191" id="mntl-sc-block_1-0-10"><div class="comp ad-group--how-to__ad-5 div mntl-block" data-dcnode-id="1192" id="ad-group--how-to__ad-5_1-0"><span data-dcnode-id="1201" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1189" id="toc-before-getting-started"></span><span data-dcnode-id="1188" instrument_node=""> </span><h2 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1183" id="mntl-sc-block_1-0-11"><span data-dcnode-id="1187" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node=""> Before Getting Started </span></span><span data-dcnode-id="1184" instrument_node=""> </span></h2><span data-dcnode-id="1182" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1180" id="mntl-sc-block_1-0-12"><span data-dcnode-id="1181" instrument_node="">
Rather than pruning to emphasize a central trunk, as is done with other fruit trees, peach trees are best pruned into an open "V" or vase shape, with three to five well-spaced main branches forming the vase. These main "scaffold "branches should be at roughly 45-degree angles to the trunk, leaving the center open to sun and air.
</span></p><span data-dcnode-id="1179" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1168" id="mntl-sc-block_1-0-13"><div class="comp ad-group--how-to__ad-6 div mntl-block" data-dcnode-id="1169" id="ad-group--how-to__ad-6_1-0"><span data-dcnode-id="1178" instrument_node="">

</span></div><span data-dcnode-id="1172" instrument_node="">
</span></div><span data-dcnode-id="1170" instrument_node="">
</span></div></div><span data-dcnode-id="1167" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1165" id="mntl-sc-block_1-0-14"><span data-dcnode-id="1166" instrument_node="">
Peach trees produce fruit on one-year-old wood, so a mature tree can be pruned rather extensively. Remove around 40 percent of the tree each year to encourage new growth after pruning, so there will be fruiting branches every year. In general, remove old gray shoots because these will not fruit. But leave the one-year-old shoots, which will be reddish in appearance.
</span></p><span data-dcnode-id="1164" instrument_node="">

</span><header class="section__header" data-dcnode-id="1084"><h2 class="section__title" data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Instructions</span></h2></header><span data-dcnode-id="1083" instrument_node="">
</span><div class="loc section-content section__content" data-dcnode-id="927"><span data-dcnode-id="1082" instrument_node="">
</span><div class="comp text-passage structured-content how-to__steps sc-page--mantle mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="929" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="54em" data-sc-content-positions="[300,600,900,1200,1500,1800,2100]" data-sc-load-immediate="1" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="60" id="how-to__steps_1-0"><span data-dcnode-id="1081" instrument_node="">
</span><ol class="comp mntl-sc-block-group--OL mntl-sc-block mntl-sc-block-startgroup" data-dcnode-id="931" id="mntl-sc-block_2-0"><span data-dcnode-id="1080" instrument_node="">
</span><li class="comp mntl-sc-block-group--LI mntl-sc-block mntl-sc-block-startgroup" data-dcnode-id="1052" id="mntl-sc-block_2-0-1"><span data-dcnode-id="1079" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1078" id="toc-remove-dead-damaged-and-diseased-branches"></span><span data-dcnode-id="1077" instrument_node=""> </span><h3 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1072" id="mntl-sc-block_2-0-2"><span data-dcnode-id="1076" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node=""> Remove Dead, Damaged, and Diseased Branches </span></span><span data-dcnode-id="1073" instrument_node=""> </span></h3><span data-dcnode-id="1071" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1069" id="mntl-sc-block_2-0-3"><span data-dcnode-id="1070" instrument_node="">
Use long-handled pruners or a pruning saw to remove all branches in poor condition. Such branches should be removed whenever you see them. This is true of all trees but especially for trees that bear fruit on new wood, such as peach trees.
</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1066" id="mntl-sc-block_2-0-4"><span data-dcnode-id="1067" instrument_node="">
Cut removed branches into manageable pieces and bag them or bundle them for disposal
</span></p><span data-dcnode-id="1065" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1054" id="mntl-sc-block_2-0-5"><div class="comp ad-group--how-to__ad-7 div mntl-block" data-dcnode-id="1055" id="ad-group--how-to__ad-7_1-0"><span data-dcnode-id="1064" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard7-sticky-dynamic billboard-sticky mntl-sc-sticky-billboard is-hidden" data-dcnode-id="1057" data-height="600" id="billboard7-sticky-dynamic_1-0" style="height: 600px;"><span data-dcnode-id="1063" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard7-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic" data-dcnode-id="1059" id="mntl-sc-sticky-billboard-ad_11-0"><span data-dcnode-id="1062" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="a4b0d581587e48879e01b507a75f7019" data-auction-floor-value="190" data-dcnode-id="1061" data-pos="btf6" data-priority="9" data-rtb="true" data-sizes="[[300, 250],[300, 256],[8, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard7"></div><span data-dcnode-id="1060" instrument_node="">
</span></div><span data-dcnode-id="1058" instrument_node="">
</span></div><span data-dcnode-id="1056" instrument_node="">
</span></div></div><span data-dcnode-id="1053" instrument_node="">
</span></li><span data-dcnode-id="1051" instrument_node="">
</span><li class="comp mntl-sc-block-group--LI mntl-sc-block mntl-sc-block-startgroup" data-dcnode-id="1024" id="mntl-sc-block_2-0-7"><span data-dcnode-id="1050" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1049" id="toc-choose-main-branches-remove-the-others"></span><span data-dcnode-id="1048" instrument_node=""> </span><h3 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1043" id="mntl-sc-block_2-0-8"><span data-dcnode-id="1047" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node=""> Choose Main Branches, Remove the Others </span></span><span data-dcnode-id="1044" instrument_node=""> </span></h3><span data-dcnode-id="1042" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1040" id="mntl-sc-block_2-0-9"><span data-dcnode-id="1041" instrument_node="">
In the early years of the tree's life, select three to five main upward-growing "scaffold" branches along the outside of the tree. Then, remove any competing large branches using a pruner or pruning saw. Pay special attention to removing branches in the center of the tree and those growing downward or horizontal. The goal is to create a tree that has a V- or vase-shaped profile with an open center.
</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1037" id="mntl-sc-block_2-0-10"><span data-dcnode-id="1038" instrument_node="">
Most growers recommend that the first of these scaffold branches be no closer than 18 inches from the ground. The main branches should be spaced evenly around the trunk, with a vertical offset of about 6 inches between adjacent branches. Ideally, all scaffold branches should emerge from the trunk between 18 and 36 inches from the ground. This creates a compact tree that will be easy to harvest without a tall ladder.
</span></p><span data-dcnode-id="1036" instrument_node="">
</span><div class="comp theme-recipetip text-passage lifestyle-sc-block-callout--icon mntl-sc-block lifestyle-sc-block-callout--recipetip lifestyle-sc-block-callout mntl-sc-block-callout mntl-block" data-dcnode-id="1026" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_2-0-11"><span data-dcnode-id="1035" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1033" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="1034" instrument_node="">
Tip</span></h3><span data-dcnode-id="1032" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1028" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Try to prune in a way that eliminates narrow, V-shaped crotches, which are weak and will become prone to splitting when the branches are supporting a heavy fruit crop. Crotches 45 degrees or wider will be less susceptible to splitting.</span></p></div><span data-dcnode-id="1027" instrument_node="">
</span></div><span data-dcnode-id="1025" instrument_node="">
</span></li><span data-dcnode-id="1023" instrument_node="">
</span><li class="comp mntl-sc-block-group--LI mntl-sc-block mntl-sc-block-startgroup" data-dcnode-id="1008" id="mntl-sc-block_2-0-13"><span data-dcnode-id="1022" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1021" id="toc-trim-tall-branches"></span><span data-dcnode-id="1020" instrument_node=""> </span><h3 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="1015" id="mntl-sc-block_2-0-14"><span data-dcnode-id="1019" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node=""> Trim Tall Branches </span></span><span data-dcnode-id="1016" instrument_node=""> </span></h3><span data-dcnode-id="1014" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="1012" id="mntl-sc-block_2-0-15"><span data-dcnode-id="1013" instrument_node="">
Use a pruner to trim the ends of any tall branches, The goal here is to keep the tree at a harvestable height. If you prune without a ladder, this will mean cutting the branches to a height that you can reach from the ground.
</span></p><span data-dcnode-id="1011" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1010" id="mntl-sc-block_2-0-16"></div><span data-dcnode-id="1009" instrument_node="">
</span></li><span data-dcnode-id="1007" instrument_node="">
</span><li class="comp mntl-sc-block-group--LI mntl-sc-block mntl-sc-block-startgroup" data-dcnode-id="992" id="mntl-sc-block_2-0-18"><span data-dcnode-id="1006" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1005" id="toc-remove-spindly-interior-branches"></span><span data-dcnode-id="1004" instrument_node=""> </span><h3 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="999" id="mntl-sc-block_2-0-19"><span data-dcnode-id="1003" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node=""> Remove Spindly Interior Branches </span></span><span data-dcnode-id="1000" instrument_node=""> </span></h3><span data-dcnode-id="998" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="996" id="mntl-sc-block_2-0-20"><span data-dcnode-id="997" instrument_node="">
Prune any small, spindly branches growing from the main scaffold branches inward. Make sure to remove any shoots that point straight up or down, as they won't allow the peach tree to properly grow into the desired V shape.
</span></p><span data-dcnode-id="995" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="994" id="mntl-sc-block_2-0-21"></div><span data-dcnode-id="993" instrument_node="">
</span></li><span data-dcnode-id="991" instrument_node="">
</span><li class="comp mntl-sc-block-group--LI mntl-sc-block mntl-sc-block-startgroup" data-dcnode-id="970" id="mntl-sc-block_2-0-23"><span data-dcnode-id="990" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="989" id="toc-cut-back-remaining-red-shoots"></span><span data-dcnode-id="988" instrument_node=""> </span><h3 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="983" id="mntl-sc-block_2-0-24"><span data-dcnode-id="987" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="985"><span data-dcnode-id="986" instrument_node=""> Cut Back Remaining Red Shoots </span></span><span data-dcnode-id="984" instrument_node=""> </span></h3><span data-dcnode-id="982" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="980" id="mntl-sc-block_2-0-25"><span data-dcnode-id="981" instrument_node="">
Use pruners to cut back the new red shoots to a length of around 18 inches. Make the cuts to within 1/4 inch of an outward-facing bud. These are fruit-producing shoots, and you want to keep them close to the main branches so the fruit will be adequately supported and easy to harvest.
</span></p><span data-dcnode-id="979" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="974" id="mntl-sc-block_2-0-26"><span data-dcnode-id="978" instrument_node="">
Also, prune off the </span><a data-component="link" data-dcnode-id="976" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruce.com/ways-to-control-plant-suckers-3269528"><span data-dcnode-id="977" instrument_node="">suckers</span></a><span data-dcnode-id="975" instrument_node=""> at the base of the tree. You can pull them off with your hand if they are small enough; they will be less likely to regrow if they are pulled instead of cut.
</span></p><span data-dcnode-id="973" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block lifestyle-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="972" id="mntl-sc-block_2-0-27"></div><span data-dcnode-id="971" instrument_node="">
</span></li><span data-dcnode-id="969" instrument_node="">
</span><li class="comp mntl-sc-block-group--LI mntl-sc-block mntl-sc-block-startgroup" data-dcnode-id="933" id="mntl-sc-block_2-0-29"><span data-dcnode-id="968" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="967" id="toc-plan-for-future-growth"></span><span data-dcnode-id="966" instrument_node=""> </span><h3 class="comp u-how-to-title-align mntl-sc-block lifestyle-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="961" id="mntl-sc-block_2-0-30"><span data-dcnode-id="965" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="963"><span data-dcnode-id="964" instrument_node=""> Plan for Future Growth </span></span><span data-dcnode-id="962" instrument_node=""> </span></h3><span data-dcnode-id="960" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="958" id="mntl-sc-block_2-0-31"><span data-dcnode-id="959" instrument_node="">
If there is no new growth within reach on a tall branch, remove the entire branch. These are not likely to be productive, and removing them ensures the tree will put its energy into plenty of new productive growth.
</span></p><span data-dcnode-id="957" instrument_node="">
</span><p class="comp text-passage u-how-to-title-align mntl-sc-block lifestyle-sc-block-html mntl-sc-block-html" data-dcnode-id="955" id="mntl-sc-block_2-0-32"><span data-dcnode-id="956" instrument_node="">
And if the tree doesn't have enough upward-curving main branches, find a secondary branch that has new upward-curving growth, and cut back to that new growth. This will become one of the main branches for future seasons.
</span></p><span data-dcnode-id="954" instrument_node="">
</span><div class="comp theme-recipetip text-passage lifestyle-sc-block-callout--icon mntl-sc-block lifestyle-sc-block-callout--recipetip lifestyle-sc-block-callout mntl-sc-block-callout mntl-block" data-dcnode-id="944" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_2-0-33"><span data-dcnode-id="953" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="951" id="mntl-sc-block-callout-heading_1-0-1"><span data-dcnode-id="952" instrument_node="">
Tip</span></h3><span data-dcnode-id="950" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="946" id="mntl-sc-block-callout-body_1-0-1"><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Peach trees are not long-lived. So planting a new tree every five to six years will ensure you are never without a peach tree.</span></p></div><span data-dcnode-id="945" instrument_node="">
</span></div><span data-dcnode-id="943" instrument_node="">
</span><div class="comp readnext-link lifestyle-sc-block-featuredlink--text mntl-sc-block lifestyle-sc-block-featuredlink--readnext lifestyle-sc-block-featuredlink mntl-sc-block-featuredlink mntl-block" data-dcnode-id="937" id="mntl-sc-block_2-0-34"><span data-dcnode-id="942" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="939" data-tracking-container="true" data-tracking-id="featured-link-readnext" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thespruce.com/how-to-grow-and-care-for-peach-trees-4589455" id="mntl-sc-block-featuredlink__link_1-0-1"><span class="link__wrapper" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">How to Grow Your Own Peaches</span></span></a><span data-dcnode-id="938" instrument_node="">
