</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot;><div id=&quot;abst0010&quot;><p id=&quot;spar0010&quot;>In a review published over two decades ago I asserted that, along soil fertility gradients, plant traits change in ways that reinforce patterns of soil fertility and net primary productivity (NPP). I reevaluate this assertion in light of recent research, focusing on feedbacks to NPP operating through litter decomposition. I conclude that mechanisms emerging since my previous review might weaken these positive feedbacks, such as negative effects of nitrogen on decomposition, while others might strengthen them, such as slower decomposition of roots compared to leaf litter. I further conclude that predictive understanding of plant species effects on nutrient cycling will require developing new frameworks that are broadened beyond litter decomposition to consider the full litter–soil organic matter (SOM) continuum.</p></div></div></div>" data-dcnode-id="6631" lang="en" name="citation_abstract"><span data-dcnode-id="6630" instrument_node="">

instrument_node="">Highlights</span></h2><div data-dcnode-id="6069" id="abst0005"><p data-dcnode-id="6070" id="spar0005"></p><dl class="list" data-dcnode-id="6071"><dt class="list-label" data-dcnode-id="6095"><span data-dcnode-id="6096" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6092"><p data-dcnode-id="6093" id="par0005"><span data-dcnode-id="6094" instrument_node="">The evidence is strong that foliar and soil nutrients covary across soil nutrient gradients.</span></p></dd><dt class="list-label" data-dcnode-id="6090"><span data-dcnode-id="6091" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6087"><p data-dcnode-id="6088" id="par0010"><span data-dcnode-id="6089" instrument_node="">Negative effects of N on litter decomposition weaken positive feedbacks to soil fertility.</span></p></dd><dt class="list-label" data-dcnode-id="6085"><span data-dcnode-id="6086" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6082"><p data-dcnode-id="6083" id="par0015"><span data-dcnode-id="6084" instrument_node="">Litter characteristics other than N and lignin can predominantly influence decomposition.</span></p></dd><dt class="list-label" data-dcnode-id="6080"><span data-dcnode-id="6081" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6077"><p data-dcnode-id="6078" id="par0020"><span data-dcnode-id="6079" instrument_node="">Root decomposition may reinforce positive leaf litter feedbacks to soil fertility.</span></p></dd><dt class="list-label" data-dcnode-id="6075"><span data-dcnode-id="6076" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="6072"><p data-dcnode-id="6073" id="par0025"><span data-dcnode-id="6074" instrument_node="">The effects of plant species on soil organic matter dynamics deserve increased attention.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="6064" id="abs0010"><div data-dcnode-id="6065" id="abst0010"><p data-dcnode-id="6066" id="spar0010"><span data-dcnode-id="6067" instrument_node="">In a review published over two decades ago I asserted that, along soil fertility gradients, plant traits change in ways that reinforce patterns of soil fertility and net primary productivity (NPP). I reevaluate this assertion in light of recent research, focusing on feedbacks to NPP operating through litter decomposition. I conclude that mechanisms emerging since my previous review might weaken these positive feedbacks, such as negative effects of nitrogen on decomposition, while others might strengthen them, such as slower decomposition of roots compared to leaf litter. I further conclude that predictive understanding of plant species effects on nutrient cycling will require developing new frameworks that are broadened beyond litter decomposition to consider the full litter–soil organic matter (SOM) continuum.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="6040" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="6052"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0169534715000774"><svg class="icon icon-navigate-left" data-dcnode-id="6061" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="6062"></path></svg><span class="button-alternative-text" data-dcnode-id="6054"><strong data-dcnode-id="6059"><span data-dcnode-id="6060" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="6057"><span data-dcnode-id="6058" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6055"><span data-dcnode-id="6056" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="6041"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="6042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0169534715000798"><span class="button-alternative-text" data-dcnode-id="6045"><strong data-dcnode-id="6050"><span data-dcnode-id="6051" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="6048"><span data-dcnode-id="6049" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="6046"><span data-dcnode-id="6047" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="6043" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="6044"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="6021"><div class="keywords-section" data-dcnode-id="6022" id="kwd0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6038"><span data-dcnode-id="6039" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="6035" id="kw0005"><span data-dcnode-id="6036"><span data-dcnode-id="6037" instrument_node="">decomposition</span></span></div><div class="keyword" data-dcnode-id="6032" id="kw0010"><span data-dcnode-id="6033"><span data-dcnode-id="6034" instrument_node="">feedback</span></span></div><div class="keyword" data-dcnode-id="6029" id="kw0015"><span data-dcnode-id="6030"><span data-dcnode-id="6031" instrument_node="">litter</span></span></div><div class="keyword" data-dcnode-id="6026" id="kw0020"><span data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">nutrient cycling</span></span></div><div class="keyword" data-dcnode-id="6023" id="kw0025"><span data-dcnode-id="6024"><span data-dcnode-id="6025" instrument_node="">species effects</span></span></div></div></div><span data-dcnode-id="6020" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="5433" id="body"><div data-dcnode-id="5439"><section data-dcnode-id="5948" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6018" id="sect0015"><span data-dcnode-id="6019" instrument_node="">Plant litter feedback paradigm</span></h2><div data-dcnode-id="5951"><p data-dcnode-id="5977" id="par0030"><span data-dcnode-id="6017" instrument_node="">Understanding how plant species influence nutrient cycling is important in a variety of contexts, from elucidating the effects of invasive species on soil fertility, to informing land managers about the potential ecosystem consequences of species selection, to understanding the consequences of species range shifts in response to environmental change. In a review published in </span><em data-dcnode-id="6015"><span data-dcnode-id="6016" instrument_node="">Trends in Ecology and Evolution</span></em><span data-dcnode-id="6014" instrument_node=""> over two decades ago </span><a class="workspace-trigger" data-dcnode-id="6012" href="#bib0505" name="bbib0505"><span data-dcnode-id="6013" instrument_node="">[1]</span></a><span data-dcnode-id="6011" instrument_node=""> I asserted that, along soil fertility gradients, plant traits change in predictable ways that reinforce patterns of fertility by creating positive feedbacks to rates of ecosystem nutrient cycling, and potentially to NPP (</span><a class="workspace-trigger" data-dcnode-id="6009" href="#fig0005" name="bfig0005"><span data-dcnode-id="6010" instrument_node="">Figure 1</span></a><span data-dcnode-id="6008" instrument_node="">: Original feedback hypothesis). This assertion has a rich history in the literature, both preceding (e.g., </span><a class="workspace-trigger" data-dcnode-id="6006" href="#bib0510" name="bbib0510"><span data-dcnode-id="6007" instrument_node="">2</span></a><span data-dcnode-id="6005" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6003" href="#bib0515" name="bbib0515"><span data-dcnode-id="6004" instrument_node="">3</span></a><span data-dcnode-id="6002" instrument_node="">) and following (e.g., </span><a class="workspace-trigger" data-dcnode-id="6000" href="#bib0520" name="bbib0520"><span data-dcnode-id="6001" instrument_node="">4</span></a><span data-dcnode-id="5999" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5997" href="#bib0525" name="bbib0525"><span data-dcnode-id="5998" instrument_node="">5</span></a><span data-dcnode-id="5996" instrument_node="">) that publication. Nevertheless, since my original review research in this area has grown considerably, with some studies calling into question my original assertions. For example, while some common garden studies demonstrate that plant traits are correlated with N mineralization from surface soils </span><a class="workspace-trigger" data-dcnode-id="5994" href="#bib0530" name="bbib0530"><span data-dcnode-id="5995" instrument_node="">6</span></a><span data-dcnode-id="5993" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5991" href="#bib0535" name="bbib0535"><span data-dcnode-id="5992" instrument_node="">7</span></a><span data-dcnode-id="5990" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5988" href="#bib0540" name="bbib0540"><span data-dcnode-id="5989" instrument_node="">8</span></a><span data-dcnode-id="5987" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5985" href="#bib0545" name="bbib0545"><span data-dcnode-id="5986" instrument_node="">9</span></a><span data-dcnode-id="5984" instrument_node="">, in others soil nutrient-cycling rates are not readily explained by plant traits </span><a class="workspace-trigger" data-dcnode-id="5982" href="#bib0550" name="bbib0550"><span data-dcnode-id="5983" instrument_node="">10</span></a><span data-dcnode-id="5981" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5979" href="#bib0555" name="bbib0555"><span data-dcnode-id="5980" instrument_node="">11</span></a><span data-dcnode-id="5978" instrument_node="">. Such mixed results suggest that the relationship between species traits and soil nutrient cycling deserves further attention.</span></p><figure class="figure text-xs" data-dcnode-id="5952" id="fig0005"><span data-dcnode-id="5967"><img alt="" aria-describedby="cap0005" data-dcnode-id="5976" height="496" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0169534715000786-gr1.jpg&amp;raw"><span data-dcnode-id="5975" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5968"><li data-dcnode-id="5969"><a class="anchor download-link u-font-sans" data-dcnode-id="5970" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0169534715000786-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5971"><span data-dcnode-id="5974" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5972"><span data-dcnode-id="5973" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5953"><span data-dcnode-id="5954" id="cap0005"><p data-dcnode-id="5955" id="spar0015"><span class="label" data-dcnode-id="5965"><span data-dcnode-id="5966" instrument_node="">Figure 1</span></span><span data-dcnode-id="5964" instrument_node="">. </span><span data-dcnode-id="5962" instrument_node="">Mechanisms of species effects on nutrient cycling that have emerged since Hobbie </span><a class="workspace-trigger" data-dcnode-id="5960" href="#bib0505" name="bbib0505"><span data-dcnode-id="5961" instrument_node="">[1]</span></a><span data-dcnode-id="5959" instrument_node=""> that might strengthen or weaken potential positive feedbacks to rates of nutrient cycling and net primary productivity (NPP). In these examples, N limits NPP. Original feedback hypothesis: The original positive feedback idea </span><a class="workspace-trigger" data-dcnode-id="5957" href="#bib0505" name="bbib0505"><span data-dcnode-id="5958" instrument_node="">[1]</span></a><span data-dcnode-id="5956" instrument_node=""> posited that higher soil N availability increases NPP and the concentration of N in litter which increases decomposition rates and litter N release, creating a positive feedback loop to NPP and litter N. Mechanism 1: Negative effects of litter N on the later stages of litter decomposition could weaken the positive feedback loop. By how much is unknown because the effects of changes in decomposition and litter N release on soil N availability are uncertain and potentially offsetting. The rate of N release from litter depends on both how much N is released as litter decomposes (which should be higher for more N-rich litter) and on the decomposition rate (which in this case would be lower for more N-rich litter). Mechanism 2: If decomposition is limited by the availability of a nutrient that does not limit NPP, such as Ca, whose concentration in litter is not correlated with that of litter N, the consequences for soil N availability are uncertain. Higher litter Ca will increase decomposition rate, while higher litter N might increase how much N is released as litter decomposes, and the rate of litter N release rate will depend on both litter N and Ca, which are independent. Mechanism 3: If decomposition and litter N release are limited by the availability of a nutrient that does not limit NPP, such as P, whose concentration in litter is correlated with that of litter N (the nutrient that limits NPP in this example), then the feedback loop will operate because N and P are coupled in litter – higher litter N will lead to greater litter N release, and higher litter P will accelerate decomposition rates, increasing soil N availability. Mechanism 4: If higher soil N availability increases aboveground NPP (ANPP) relative to belowground NPP (BNPP), decomposition rates will increase because of the relatively faster decomposition of leaf litter relative to roots. Uncertainties arise because the cause of more rapid decomposition of leaf litter relative to roots is unclear, and not always predictable from N concentration. Further uncertainties arise because roots sometimes release N more rapidly despite decomposing more slowly than leaf litter, and N release is not always predictable from root N concentration.</span></p></span></span></figure></div><p data-dcnode-id="5949" id="par0035"><span data-dcnode-id="5950" instrument_node="">I review here the evidence that suites of plant traits are arrayed predictably along fertility gradients and act to reinforce those gradients and patterns of NPP, focusing on feedbacks operating through plant litter decomposition. Specifically, I evaluate two key assumptions underlying the plant litter feedback idea: (i) plant litter traits vary predictably along fertility gradients, and (ii) such variation reinforces soil fertility gradients through effects on decomposition and litter N release. Given the number of synthetic cross-site analyses of plant traits and their consequences for nutrient cycling over the past two decades, the time is ripe for revisiting my original assertions. Indeed, I show that my original assertion is more nuanced and complex than originally claimed. In particular, I discuss the need to consider leaf litter decomposition more carefully and move beyond consideration of leaf litter feedbacks to a more comprehensive understanding of whole-plant litter and how species affect nutrient cycling through effects on SOM dynamics.</span></p></section><section data-dcnode-id="5799" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5946" id="sect0020"><span data-dcnode-id="5947" instrument_node="">Community-scale patterns in traits: soil fertility gradients and fertilization studies</span></h2><p data-dcnode-id="5914" id="par0040"><span data-dcnode-id="5945" instrument_node="">Plant species that use limiting nutrients more efficiently should have a competitive advantage </span><a class="workspace-trigger" data-dcnode-id="5943" href="#bib0510" name="bbib0510"><span data-dcnode-id="5944" instrument_node="">2</span></a><span data-dcnode-id="5942" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5940" href="#bib0560" name="bbib0560"><span data-dcnode-id="5941" instrument_node="">12</span></a><span data-dcnode-id="5939" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5937" href="#bib0565" name="bbib0565"><span data-dcnode-id="5938" instrument_node="">13</span></a><span data-dcnode-id="5936" instrument_node="">. Thus, as soil fertility increases, tissue nutrient concentrations should increase because species use nutrients less efficiently and other resources become limiting. Nevertheless, several mechanisms might weaken soil fertility–trait relationships. For example, cluster roots in low-phosphorus (P) environments, arbuscular mycorrhizae in environments with low inorganic nutrient availability, ericoid mycorrhizae and ectomycorrhizae where nutrients are bound up in insoluble organic forms, and N-fixing symbioses in low-N environments all increase plant access to nutrients in low supply </span><a class="workspace-trigger" data-dcnode-id="5934" href="#bib0570" name="bbib0570"><span data-dcnode-id="5935" instrument_node="">14</span></a><span data-dcnode-id="5933" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5931" href="#bib0575" name="bbib0575"><span data-dcnode-id="5932" instrument_node="">15</span></a><span data-dcnode-id="5930" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5928" href="#bib0580" name="bbib0580"><span data-dcnode-id="5929" instrument_node="">16</span></a><span data-dcnode-id="5927" instrument_node="">. Further, increases in foliar nutrients that sometimes occur with increasing elevation </span><a class="workspace-trigger" data-dcnode-id="5925" href="#bib0585" name="bbib0585"><span data-dcnode-id="5926" instrument_node="">[17]</span></a><span data-dcnode-id="5924" instrument_node=""> and latitude </span><a class="workspace-trigger" data-dcnode-id="5922" href="#bib0590" name="bbib0590"><span data-dcnode-id="5923" instrument_node="">[18]</span></a><span data-dcnode-id="5921" instrument_node=""> might weaken relationships between soil nutrient availability and foliar nutrients at larger spatial scales because of negative relationships between mean annual temperature and foliar N </span><a class="workspace-trigger" data-dcnode-id="5919" href="#bib0595" name="bbib0595"><span data-dcnode-id="5920" instrument_node="">[19]</span></a><span data-dcnode-id="5918" instrument_node=""> that counter the positive relationship between mean annual temperature and soil N supply </span><a class="workspace-trigger" data-dcnode-id="5916" href="#bib0600" name="bbib0600"><span data-dcnode-id="5917" instrument_node="">[20]</span></a><span data-dcnode-id="5915" instrument_node="">.</span></p><section data-dcnode-id="5837" id="sec0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5912" id="sect0025"><span data-dcnode-id="5913" instrument_node="">Strong patterns across fertility gradients</span></h3><p data-dcnode-id="5838" id="par0045"><span data-dcnode-id="5911" instrument_node="">Nevertheless, a number of studies, many published since Hobbie </span><a class="workspace-trigger" data-dcnode-id="5909" href="#bib0505" name="bbib0505"><span data-dcnode-id="5910" instrument_node="">[1]</span></a><span data-dcnode-id="5908" instrument_node="">, reveal positive associations between foliar and/or litter nutrients and soil nutrients across soil fertility gradients at regional to global scales, providing evidence in support of my first assumption. For example, within regions ranging from lowland and montane tropical forests </span><a class="workspace-trigger" data-dcnode-id="5906" href="#bib0525" name="bbib0525"><span data-dcnode-id="5907" instrument_node="">5</span></a><span data-dcnode-id="5905" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5903" href="#bib0605" name="bbib0605"><span data-dcnode-id="5904" instrument_node="">21</span></a><span data-dcnode-id="5902" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5900" href="#bib0610" name="bbib0610"><span data-dcnode-id="5901" instrument_node="">22</span></a><span data-dcnode-id="5899" instrument_node=""> to temperate forests </span><a class="workspace-trigger" data-dcnode-id="5897" href="#bib0615" name="bbib0615"><span data-dcnode-id="5898" instrument_node="">23</span></a><span data-dcnode-id="5896" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5894" href="#bib0620" name="bbib0620"><span data-dcnode-id="5895" instrument_node="">24</span></a><span data-dcnode-id="5893" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5891" href="#bib0625" name="bbib0625"><span data-dcnode-id="5892" instrument_node="">25</span></a><span data-dcnode-id="5890" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5888" href="#bib0630" name="bbib0630"><span data-dcnode-id="5889" instrument_node="">26</span></a><span data-dcnode-id="5887" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5885" href="#bib0635" name="bbib0635"><span data-dcnode-id="5886" instrument_node="">27</span></a><span data-dcnode-id="5884" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5882" href="#bib0640" name="bbib0640"><span data-dcnode-id="5883" instrument_node="">28</span></a><span data-dcnode-id="5881" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5879" href="#bib0645" name="bbib0645"><span data-dcnode-id="5880" instrument_node="">29</span></a><span data-dcnode-id="5878" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5876" href="#bib0650" name="bbib0650"><span data-dcnode-id="5877" instrument_node="">30</span></a><span data-dcnode-id="5875" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5873" href="#bib0655" name="bbib0655"><span data-dcnode-id="5874" instrument_node="">31</span></a><span data-dcnode-id="5872" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5870" href="#bib0660" name="bbib0660"><span data-dcnode-id="5871" instrument_node="">32</span></a><span data-dcnode-id="5869" instrument_node=""> and grasslands </span><a class="workspace-trigger" data-dcnode-id="5867" href="#bib0665" name="bbib0665"><span data-dcnode-id="5868" instrument_node="">[33]</span></a><span data-dcnode-id="5866" instrument_node="">, the concentrations of leaf and/or litter nutrients, including N, P, and calcium (Ca), relate positively to various measures of soil nutrient availability both because of sorting of species along fertility gradients and because of plasticity within widespread species </span><a class="workspace-trigger" data-dcnode-id="5864" href="#bib0655" name="bbib0655"><span data-dcnode-id="5865" instrument_node="">[31]</span></a><span data-dcnode-id="5863" instrument_node="">. Positive associations between green leaf and soil nutrients (e.g., </span><a class="workspace-trigger" data-dcnode-id="5861" href="#bib0610" name="bbib0610"><span data-dcnode-id="5862" instrument_node="">[22]</span></a><span data-dcnode-id="5860" instrument_node="">) should translate into steeper positive associations between leaf litter and soil nutrients because leaves with higher nutrient concentrations resorb less nutrients than do those with lower nutrient concentrations </span><a class="workspace-trigger" data-dcnode-id="5858" href="#bib0670" name="bbib0670"><span data-dcnode-id="5859" instrument_node="">34</span></a><span data-dcnode-id="5857" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5855" href="#bib0675" name="bbib0675"><span data-dcnode-id="5856" instrument_node="">35</span></a><span data-dcnode-id="5854" instrument_node="">, although most studies of retranslocation efficiency have found little variation across soil fertility gradients (e.g., </span><a class="workspace-trigger" data-dcnode-id="5852" href="#bib0660" name="bbib0660"><span data-dcnode-id="5853" instrument_node="">[32]</span></a><span data-dcnode-id="5851" instrument_node="">). The few studies that have examined tissue carbon chemistry across soil fertility gradients suggest that plants have higher concentrations of carbon-based structural and defense compounds in infertile sites </span><a class="workspace-trigger" data-dcnode-id="5849" href="#bib0610" name="bbib0610"><span data-dcnode-id="5850" instrument_node="">22</span></a><span data-dcnode-id="5848" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5846" href="#bib0635" name="bbib0635"><span data-dcnode-id="5847" instrument_node="">27</span></a><span data-dcnode-id="5845" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5843" href="#bib0680" name="bbib0680"><span data-dcnode-id="5844" instrument_node="">36</span></a><span data-dcnode-id="5842" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5840" href="#bib0685" name="bbib0685"><span data-dcnode-id="5841" instrument_node="">37</span></a><span data-dcnode-id="5839" instrument_node="">.</span></p></section><section data-dcnode-id="5800" id="sec0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5835" id="sect0030"><span data-dcnode-id="5836" instrument_node="">Weaker patterns in fertilization studies</span></h3><p data-dcnode-id="5806" id="par0050"><span data-dcnode-id="5834" instrument_node="">Such correlations cannot distinguish the influence of soil fertility on plant traits (via sorting in response to variation in nutrient supply) from that of plant traits on soil fertility (e.g., via effects of plant species on soil biotic processes). Demonstrating the former requires fertilization studies at spatial and temporal scales appropriate to examining community responses and associated trait changes. Gradients in atmospheric deposition arising from human activities provide unintended ‘experiments’ in which to examine soil fertility–trait relationships. Multi-decadal changes in herbaceous vegetation in regions with chronic N deposition show increased abundance of species with higher foliar N concentrations </span><a class="workspace-trigger" data-dcnode-id="5832" href="#bib0690" name="bbib0690"><span data-dcnode-id="5833" instrument_node="">[38]</span></a><span data-dcnode-id="5831" instrument_node="">. Deliberate fertilization studies reveal that, in forests, added nutrients increase litterfall and its nutrient concentration </span><a class="workspace-trigger" data-dcnode-id="5829" href="#bib0695" name="bbib0695"><span data-dcnode-id="5830" instrument_node="">39</span></a><span data-dcnode-id="5828" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5826" href="#bib0700" name="bbib0700"><span data-dcnode-id="5827" instrument_node="">40</span></a><span data-dcnode-id="5825" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5823" href="#bib0705" name="bbib0705"><span data-dcnode-id="5824" instrument_node="">41</span></a><span data-dcnode-id="5822" instrument_node="">, although forest experiments generally are too short to examine how species turnover might influence ecosystem response to nutrient addition. In short-statured ecosystems, added N and/or P increased plant nutrient concentrations in alpine </span><a class="workspace-trigger" data-dcnode-id="5820" href="#bib0710" name="bbib0710"><span data-dcnode-id="5821" instrument_node="">[42]</span></a><span data-dcnode-id="5819" instrument_node=""> and arctic </span><a class="workspace-trigger" data-dcnode-id="5817" href="#bib0715" name="bbib0715"><span data-dcnode-id="5818" instrument_node="">[43]</span></a><span data-dcnode-id="5816" instrument_node=""> tundra, as well as in temperate grasslands </span><a class="workspace-trigger" data-dcnode-id="5814" href="#bib0720" name="bbib0720"><span data-dcnode-id="5815" instrument_node="">[44]</span></a><span data-dcnode-id="5813" instrument_node="">. A meta-analysis of fertilization studies showed higher root N concentrations with N addition </span><a class="workspace-trigger" data-dcnode-id="5811" href="#bib0725" name="bbib0725"><span data-dcnode-id="5812" instrument_node="">[45]</span></a><span data-dcnode-id="5810" instrument_node="">. While these examples are compelling, most studies of plant response to nutrient enrichment have focused on individual species; a better understanding of soil fertility-trait relationships requires long-term studies of the relative importance of intra-specific phenotypic plasticity, genotypic sorting, and shifts in species composition in mediating community-level trait responses to long-term nutrient addition (e.g., </span><a class="workspace-trigger" data-dcnode-id="5808" href="#bib0730" name="bbib0730"><span data-dcnode-id="5809" instrument_node="">[46]</span></a><span data-dcnode-id="5807" instrument_node="">), including traits other than foliar nutrient concentrations, such as foliar carbon chemistry and traits of other plant organs.</span></p><p data-dcnode-id="5801" id="par0055"><span data-dcnode-id="5805" instrument_node="">In summary, evidence to support my first assertion, that plant traits relevant to litter-mediated nutrient-cycling feedbacks vary predictably across soil fertility gradients, has become stronger since Hobbie </span><a class="workspace-trigger" data-dcnode-id="5803" href="#bib0505" name="bbib0505"><span data-dcnode-id="5804" instrument_node="">[1]</span></a><span data-dcnode-id="5802" instrument_node="">, particularly for leaf N and P across soil N and P gradients, although understanding could be enhanced by more long-term fertilization studies. In the following I revisit my second assumption, that such patterns in plant litter traits reinforce soil fertility gradients through effects on decomposition and litter N release.</span></p></section></section><section data-dcnode-id="5707" id="sec0025"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5797" id="sect0035"><span data-dcnode-id="5798" instrument_node="">Leaf litter N effects on decomposition</span></h2><section data-dcnode-id="5725" id="sec0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5795" id="sect0040"><span data-dcnode-id="5796" instrument_node="">Contrasting N effects on different litter fractions</span></h3><p data-dcnode-id="5778" id="par0060"><span data-dcnode-id="5794" instrument_node="">Many studies have demonstrated that higher leaf litter N concentrations are associated with faster litter decomposition rates, although most of these studies lasted 1 year or less (</span><a class="workspace-trigger" data-dcnode-id="5792" href="#bib0735" name="bbib0735"><span data-dcnode-id="5793" instrument_node="">[47]</span></a><span data-dcnode-id="5791" instrument_node=""> and many others). A growing number of longer studies have found evidence that litter with higher initial N concentrations ends up with a larger fraction decomposing at near-zero rates, such that overall decomposition rates can be slowed by higher N concentrations </span><a class="workspace-trigger" data-dcnode-id="5789" href="#bib0740" name="bbib0740"><span data-dcnode-id="5790" instrument_node="">48</span></a><span data-dcnode-id="5788" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5786" href="#bib0745" name="bbib0745"><span data-dcnode-id="5787" instrument_node="">49</span></a><span data-dcnode-id="5785" instrument_node="">. This phenomenon should weaken positive feedbacks between litter N and rates of soil N cycling and NPP (</span><a class="workspace-trigger" data-dcnode-id="5783" href="#fig0005" name="bfig0005"><span data-dcnode-id="5784" instrument_node="">Figure 1</span></a><span data-dcnode-id="5782" instrument_node="">: Mechanism 1). However, litter with higher initial N concentrations immobilizes less N and releases N earlier in the decomposition process </span><a class="workspace-trigger" data-dcnode-id="5780" href="#bib0750" name="bbib0750"><span data-dcnode-id="5781" instrument_node="">[50]</span></a><span data-dcnode-id="5779" instrument_node="">, such that net effects on the rate of litter N release and litter-driven feedbacks to soil N availability are uncertain.</span></p><p data-dcnode-id="5746" id="par0065"><span data-dcnode-id="5777" instrument_node="">Various mechanisms have been proposed to explain why and where N might slow the rate of decomposition in its later stages </span><a class="workspace-trigger" data-dcnode-id="5775" href="#bib0740" name="bbib0740"><span data-dcnode-id="5776" instrument_node="">[48]</span></a><span data-dcnode-id="5774" instrument_node="">. Nitrogen might induce abiotic formation of compounds that resist microbial attack </span><a class="workspace-trigger" data-dcnode-id="5772" href="#bib0755" name="bbib0755"><span data-dcnode-id="5773" instrument_node="">51</span></a><span data-dcnode-id="5771" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5769" href="#bib0760" name="bbib0760"><span data-dcnode-id="5770" instrument_node="">52</span></a><span data-dcnode-id="5768" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5766" href="#bib0765" name="bbib0765"><span data-dcnode-id="5767" instrument_node="">53</span></a><span data-dcnode-id="5765" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5763" href="#bib0770" name="bbib0770"><span data-dcnode-id="5764" instrument_node="">54</span></a><span data-dcnode-id="5762" instrument_node="">, inhibit oxidative enzymes involved in lignin degradation </span><a class="workspace-trigger" data-dcnode-id="5760" href="#bib0775" name="bbib0775"><span data-dcnode-id="5761" instrument_node="">55</span></a><span data-dcnode-id="5759" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5757" href="#bib0780" name="bbib0780"><span data-dcnode-id="5758" instrument_node="">56</span></a><span data-dcnode-id="5756" instrument_node="">, stimulate microbial biomass production early in decomposition, leading to the accumulation of microbial residues that are resistant to decay </span><a class="workspace-trigger" data-dcnode-id="5754" href="#bib0785" name="bbib0785"><span data-dcnode-id="5755" instrument_node="">[57]</span></a><span data-dcnode-id="5753" instrument_node="">, or increase microbial carbon-use efficiency </span><a class="workspace-trigger" data-dcnode-id="5751" href="#bib0790" name="bbib0790"><span data-dcnode-id="5752" instrument_node="">58</span></a><span data-dcnode-id="5750" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5748" href="#bib0795" name="bbib0795"><span data-dcnode-id="5749" instrument_node="">59</span></a><span data-dcnode-id="5747" instrument_node="">. Empirical evaluations of these various mechanisms are sparse.</span></p><p data-dcnode-id="5726" id="par0070"><span data-dcnode-id="5745" instrument_node="">Complicating matters is that higher litter N increases the fraction of slowly-cycling litter in some instances but not others, for reasons that are unclear but that could be elucidated by cross-site studies in ecosystems with contrasting decomposer and plant communities. For example, inhibition of oxidative enzyme activity might not cause negative effects of litter N on decomposition in ecosystems where oxidative enzyme activity is not a bottleneck to decomposition, such as in grasslands with low plant lignin concentrations </span><a class="workspace-trigger" data-dcnode-id="5743" href="#bib0800" name="bbib0800"><span data-dcnode-id="5744" instrument_node="">[60]</span></a><span data-dcnode-id="5742" instrument_node="">. Future studies need to be coupled with measurements that allow investigators to identify and distinguish among possible mechanisms giving rise to negative effects of N on decomposition. For example, measures of enzyme activity </span><a class="workspace-trigger" data-dcnode-id="5740" href="#bib0775" name="bbib0775"><span data-dcnode-id="5741" instrument_node="">55</span></a><span data-dcnode-id="5739" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5737" href="#bib0780" name="bbib0780"><span data-dcnode-id="5738" instrument_node="">56</span></a><span data-dcnode-id="5736" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5734" href="#bib0805" name="bbib0805"><span data-dcnode-id="5735" instrument_node="">61</span></a><span data-dcnode-id="5733" instrument_node="">, characterization of abiotic chemical incorporation of N into potentially recalcitrant organic matter </span><a class="workspace-trigger" data-dcnode-id="5731" href="#bib0765" name="bbib0765"><span data-dcnode-id="5732" instrument_node="">[53]</span></a><span data-dcnode-id="5730" instrument_node="">, and measurements of microbial biomass and necromass </span><a class="workspace-trigger" data-dcnode-id="5728" href="#bib0810" name="bbib0810"><span data-dcnode-id="5729" instrument_node="">[62]</span></a><span data-dcnode-id="5727" instrument_node=""> as well as carbon-use efficiency might elucidate the underlying mechanisms.</span></p></section><section data-dcnode-id="5708" id="sec0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5723" id="sect0045"><span data-dcnode-id="5724" instrument_node="">Incomplete representation in ecosystem models</span></h3><p data-dcnode-id="5709" id="par0075"><span data-dcnode-id="5722" instrument_node="">The treatment of interactions between N and decomposition in ecosystem models requires revisiting. Some models partition litter into fast- and slow-cycling pools according to the litter N concentration in a manner opposite to what empirical studies show </span><a class="workspace-trigger" data-dcnode-id="5720" href="#bib0740" name="bbib0740"><span data-dcnode-id="5721" instrument_node="">[48]</span></a><span data-dcnode-id="5719" instrument_node="">. For example, in the Century model, less litter is partitioned into the slow-cycling pool as litter N increases </span><a class="workspace-trigger" data-dcnode-id="5717" href="#bib0815" name="bbib0815"><span data-dcnode-id="5718" instrument_node="">[63]</span></a><span data-dcnode-id="5716" instrument_node="">. Other models include inhibitory effects of increases in external supply of N on decomposition, by increasing the amount of detritus that enters more stable organic matter pools with added N </span><a class="workspace-trigger" data-dcnode-id="5714" href="#bib0820" name="bbib0820"><span data-dcnode-id="5715" instrument_node="">64</span></a><span data-dcnode-id="5713" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5711" href="#bib0825" name="bbib0825"><span data-dcnode-id="5712" instrument_node="">65</span></a><span data-dcnode-id="5710" instrument_node="">, but do not include effects of changes in litter N concentrations on decomposition. Because the mechanisms underlying these effects of N and how they vary among ecosystems are poorly understood, and thus not explicit, the models are limited in their predictive capacity.</span></p></section></section><section data-dcnode-id="5552" id="sec0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5705" id="sect0050"><span data-dcnode-id="5706" instrument_node="">Moving beyond leaf litter N and lignin</span></h2><section data-dcnode-id="5659" id="sec0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5703" id="sect0055"><span data-dcnode-id="5704" instrument_node="">Other traits are important</span></h3><p data-dcnode-id="5674" id="par0080"><span data-dcnode-id="5702" instrument_node="">Studies of plant species effects on nutrient cycling have logically focused on plant traits known to affect decomposition of leaf litter, notably foliar and litter nutrient (especially N) and lignin concentrations </span><a class="workspace-trigger" data-dcnode-id="5700" href="#bib0830" name="bbib0830"><span data-dcnode-id="5701" instrument_node="">[66]</span></a><span data-dcnode-id="5699" instrument_node="">. However, leaf litter N and lignin might not cause expected variation in nutrient cycling if other litter characteristics are more important drivers of decomposition and litter nutrient release, in other words because the dominant or keystone decomposers in a system have unique nutritional requirements </span><a class="workspace-trigger" data-dcnode-id="5697" href="#bib0835" name="bbib0835"><span data-dcnode-id="5698" instrument_node="">[67]</span></a><span data-dcnode-id="5696" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="5694" href="#fig0005" name="bfig0005"><span data-dcnode-id="5695" instrument_node="">Figure 1</span></a><span data-dcnode-id="5693" instrument_node="">: Mechanism 2). For example, the high Ca requirement of lumbricid earthworms leads to positive relationships between litter Ca and decomposition rates </span><a class="workspace-trigger" data-dcnode-id="5691" href="#bib0540" name="bbib0540"><span data-dcnode-id="5692" instrument_node="">8</span></a><span data-dcnode-id="5690" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5688" href="#bib0840" name="bbib0840"><span data-dcnode-id="5689" instrument_node="">68</span></a><span data-dcnode-id="5687" instrument_node="">. A similar relationship could arise for sodium (Na) because of the Na requirement of some detritus consumers </span><a class="workspace-trigger" data-dcnode-id="5685" href="#bib0845" name="bbib0845"><span data-dcnode-id="5686" instrument_node="">[69]</span></a><span data-dcnode-id="5684" instrument_node="">. Yet, these kinds of relationships are unlikely to emerge from regional and synthetic studies of litter decomposition using litter bags, which largely exclude macroinvertebrates </span><a class="workspace-trigger" data-dcnode-id="5682" href="#bib0540" name="bbib0540"><span data-dcnode-id="5683" instrument_node="">[8]</span></a><span data-dcnode-id="5681" instrument_node="">. On the microbial side of things, the requirement for manganese (Mn) by fungi that use Mn peroxidase to break down lignin presumably underlies the positive relationship between litter Mn and decomposition rates </span><a class="workspace-trigger" data-dcnode-id="5679" href="#bib0740" name="bbib0740"><span data-dcnode-id="5680" instrument_node="">48</span></a><span data-dcnode-id="5678" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5676" href="#bib0850" name="bbib0850"><span data-dcnode-id="5677" instrument_node="">70</span></a><span data-dcnode-id="5675" instrument_node="">. Notably, Na and Mn, and to lesser degree Ca, are not commonly measured in litter decomposition studies.</span></p><p data-dcnode-id="5660" id="par0085"><span data-dcnode-id="5673" instrument_node="">In these examples, the nutrients that limit NPP differ from those that influence decomposition and nutrient release from litter (</span><a class="workspace-trigger" data-dcnode-id="5671" href="#fig0005" name="bfig0005"><span data-dcnode-id="5672" instrument_node="">Figure 1</span></a><span data-dcnode-id="5670" instrument_node="">: Mechanism 2). Thus, any sorting of plant species on the landscape in response to underlying nutrient availability gradients will create positive nutrient-driven feedbacks to NPP only insofar as concentrations of the nutrient that limits NPP and those of nutrients or carbon fractions that influence decomposition covary in litter (</span><a class="workspace-trigger" data-dcnode-id="5668" href="#fig0005" name="bfig0005"><span data-dcnode-id="5669" instrument_node="">Figure 1</span></a><span data-dcnode-id="5667" instrument_node="">: Mechanism 3). While litter N and P often exhibit such correlations, litter concentrations of other elements, such as Ca or Mn, are inconsistently related to those of N and P, the elements that most commonly limit NPP (</span><a class="workspace-trigger" data-dcnode-id="5665" href="#bib0855" name="bbib0855"><span data-dcnode-id="5666" instrument_node="">[71]</span></a><span data-dcnode-id="5664" instrument_node="">, but see </span><a class="workspace-trigger" data-dcnode-id="5662" href="#bib0850" name="bbib0850"><span data-dcnode-id="5663" instrument_node="">[70]</span></a><span data-dcnode-id="5661" instrument_node="">).</span></p></section><section data-dcnode-id="5603" id="sec0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5657" id="sect0060"><span data-dcnode-id="5658" instrument_node="">Other organs contribute significantly to ecosystem detritus production</span></h3><p data-dcnode-id="5647" id="par0090"><span data-dcnode-id="5656" instrument_node="">Although leaf traits influence leaf litter decomposition and nutrient release, whether they influence ecosystem-scale nutrient cycling beyond the process of leaf litter decomposition is less clear, particularly because nutrients released during leaf litter decomposition might not directly support substantial plant nutrient uptake </span><a class="workspace-trigger" data-dcnode-id="5654" href="#bib0860" name="bbib0860"><span data-dcnode-id="5655" instrument_node="">[72]</span></a><em data-dcnode-id="5652"><span data-dcnode-id="5653" instrument_node="">.</span></em><span data-dcnode-id="5651" instrument_node=""> Variation in leaf litter traits will only predict ecosystem-scale variation in carbon and nutrient dynamics of detritus insofar as (i) leaf litter dominates detrital inputs to soils, or (ii) the characteristics of leaf litter are correlated with decomposition and nutrient release from other, dominant components of detritus. The former is unlikely in most ecosystems because other components of plant production besides leaves (root biomass, stem biomass, root exudates, mycorrhizae) are often significant fractions of total detritus production. For example, in non-agricultural ecosystems, belowground NPP (BNPP) is at least 40% of aboveground NPP (ANPP), and exceeds ANPP in many ecosystems </span><a class="workspace-trigger" data-dcnode-id="5649" href="#bib0865" name="bbib0865"><span data-dcnode-id="5650" instrument_node="">[73]</span></a><span data-dcnode-id="5648" instrument_node="">. In some ecosystems, substantial ANPP is removed via burning, mowing, or herbivory, further increasing the relative importance of belowground inputs to soils.</span></p><p data-dcnode-id="5624" id="par0095"><span data-dcnode-id="5646" instrument_node="">That other components of production in addition to leaves, in other words roots and stems, can be as or more important to detrital carbon and nutrient cycling raises questions about the predictability of litter feedbacks to fertility and NPP based on knowledge of leaf litter traits alone. Are rates of leaf litter decomposition and nutrient release related to those of roots and stems across species? Do root and stem traits vary predictably across fertility gradients in ways that affect decomposition? On a global scale, root, stem, and leaf N and P concentrations are correlated across species </span><a class="workspace-trigger" data-dcnode-id="5644" href="#bib0870" name="bbib0870"><span data-dcnode-id="5645" instrument_node="">[74]</span></a><span data-dcnode-id="5643" instrument_node="">, but these relationships are not always apparent within sites </span><a class="workspace-trigger" data-dcnode-id="5641" href="#bib0875" name="bbib0875"><span data-dcnode-id="5642" instrument_node="">[75]</span></a><span data-dcnode-id="5640" instrument_node="">. Nevertheless, there is evidence that root and leaf N can change in concert across gradients in soil resources: across an aridity gradient </span><a class="workspace-trigger" data-dcnode-id="5638" href="#bib0880" name="bbib0880"><span data-dcnode-id="5639" instrument_node="">[76]</span></a><span data-dcnode-id="5637" instrument_node="">, a temperate fire frequency gradient </span><a class="workspace-trigger" data-dcnode-id="5635" href="#bib0885" name="bbib0885"><span data-dcnode-id="5636" instrument_node="">[77]</span></a><span data-dcnode-id="5634" instrument_node="">, and a temperate rain forest soil chronosequence </span><a class="workspace-trigger" data-dcnode-id="5632" href="#bib0650" name="bbib0650"><span data-dcnode-id="5633" instrument_node="">[30]</span></a><span data-dcnode-id="5631" instrument_node=""> leaf and root N and/or P were positively related. Although stem and leaf N are related among species </span><a class="workspace-trigger" data-dcnode-id="5629" href="#bib0870" name="bbib0870"><span data-dcnode-id="5630" instrument_node="">[74]</span></a><span data-dcnode-id="5628" instrument_node="">, I was unable to find studies that characterized stem traits across fertility gradients. Further, although traits of leaf, stem, and root may be correlated across fertility gradients, whether those traits similarly affect decomposition rates across such gradients has rarely been evaluated (but see </span><a class="workspace-trigger" data-dcnode-id="5626" href="#bib0890" name="bbib0890"><span data-dcnode-id="5627" instrument_node="">[78]</span></a><span data-dcnode-id="5625" instrument_node="">).</span></p><p data-dcnode-id="5604" id="par0100"><span data-dcnode-id="5623" instrument_node="">In a meta-analysis of decomposition studies of root, stem, and leaf litter of multiple species, decomposition rates of roots and leaf litter were strongly positively related </span><a class="workspace-trigger" data-dcnode-id="5621" href="#bib0895" name="bbib0895"><span data-dcnode-id="5622" instrument_node="">[79]</span></a><span data-dcnode-id="5620" instrument_node="">, as were those of leaf litter and fine stems. These relationships were less consistent within sites, where some sites showed weak or no relationships between decomposition rates of different plant organs (e.g., </span><a class="workspace-trigger" data-dcnode-id="5618" href="#bib0875" name="bbib0875"><span data-dcnode-id="5619" instrument_node="">[75]</span></a><span data-dcnode-id="5617" instrument_node="">). Roots and stems decomposed on average 1.5- and 2.8-fold more slowly, respectively, than did leaf litter. Furthermore, root traits associated with slower decomposition could promote fungal over bacterial biomass, further slowing decomposition via production of fungal necromass with relatively poor carbon quality </span><a class="workspace-trigger" data-dcnode-id="5615" href="#bib0900" name="bbib0900"><span data-dcnode-id="5616" instrument_node="">[80]</span></a><span data-dcnode-id="5614" instrument_node="">. Thus, patterns of allocation among plant organs across fertility gradients might be as or more important in driving feedbacks to nutrient cycling than the patterns of traits within any single plant organ </span><a class="workspace-trigger" data-dcnode-id="5612" href="#bib0895" name="bbib0895"><span data-dcnode-id="5613" instrument_node="">[79]</span></a><span data-dcnode-id="5611" instrument_node="">. For example, higher BNPP:ANPP in infertile sites </span><a class="workspace-trigger" data-dcnode-id="5609" href="#bib0905" name="bbib0905"><span data-dcnode-id="5610" instrument_node="">[81]</span></a><span data-dcnode-id="5608" instrument_node=""> combined with slow decomposition of roots relative to leaf litter should reinforce low soil fertility (</span><a class="workspace-trigger" data-dcnode-id="5606" href="#fig0005" name="bfig0005"><span data-dcnode-id="5607" instrument_node="">Figure 1</span></a><span data-dcnode-id="5605" instrument_node="">: Mechanism 4).</span></p></section><section data-dcnode-id="5553" id="sec0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5601" id="sect0065"><span data-dcnode-id="5602" instrument_node="">N dynamics of decomposing roots</span></h3><p data-dcnode-id="5554" id="par0105"><span data-dcnode-id="5600" instrument_node="">Complicating this prediction is the need to understand not only the decomposition rates of root and stem detritus but also their nutrient dynamics during decomposition. In studies comparing nutrient dynamics of decomposing roots and leaf litter within species, some showed that decomposing roots immobilized nutrients at lower or similar rates compared with leaf litter of the same species </span><a class="workspace-trigger" data-dcnode-id="5598" href="#bib0910" name="bbib0910"><span data-dcnode-id="5599" instrument_node="">82</span></a><span data-dcnode-id="5597" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5595" href="#bib0915" name="bbib0915"><span data-dcnode-id="5596" instrument_node="">83</span></a><span data-dcnode-id="5594" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5592" href="#bib0920" name="bbib0920"><span data-dcnode-id="5593" instrument_node="">84</span></a><span data-dcnode-id="5591" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5589" href="#bib0925" name="bbib0925"><span data-dcnode-id="5590" instrument_node="">85</span></a><span data-dcnode-id="5588" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5586" href="#bib0930" name="bbib0930"><span data-dcnode-id="5587" instrument_node="">86</span></a><span data-dcnode-id="5585" instrument_node="">. By contrast, other studies found that roots immobilized more nutrients than did leaf litter of the same species </span><a class="workspace-trigger" data-dcnode-id="5583" href="#bib0540" name="bbib0540"><span data-dcnode-id="5584" instrument_node="">8</span></a><span data-dcnode-id="5582" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5580" href="#bib0875" name="bbib0875"><span data-dcnode-id="5581" instrument_node="">75</span></a><span data-dcnode-id="5579" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5577" href="#bib0890" name="bbib0890"><span data-dcnode-id="5578" instrument_node="">78</span></a><span data-dcnode-id="5576" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5574" href="#bib0935" name="bbib0935"><span data-dcnode-id="5575" instrument_node="">87</span></a><span data-dcnode-id="5573" instrument_node="">. More N-rich roots sometimes immobilized less N than roots with lower initial N concentrations </span><a class="workspace-trigger" data-dcnode-id="5571" href="#bib0875" name="bbib0875"><span data-dcnode-id="5572" instrument_node="">75</span></a><span data-dcnode-id="5570" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5568" href="#bib0920" name="bbib0920"><span data-dcnode-id="5569" instrument_node="">84</span></a><span data-dcnode-id="5567" instrument_node="">. However, roots sometimes immobilized less </span><a class="workspace-trigger" data-dcnode-id="5565" href="#bib0920" name="bbib0920"><span data-dcnode-id="5566" instrument_node="">[84]</span></a><span data-dcnode-id="5564" instrument_node=""> or more </span><a class="workspace-trigger" data-dcnode-id="5562" href="#bib0935" name="bbib0935"><span data-dcnode-id="5563" instrument_node="">[87]</span></a><span data-dcnode-id="5561" instrument_node=""> N than leaf litter with similar initial N concentrations. More comprehensive analyses of nutrient dynamics during root decomposition are necessary to elucidate general patterns – a higher root fraction of NPP in low-fertility systems combined with their relatively slow decomposition rate </span><a class="workspace-trigger" data-dcnode-id="5559" href="#bib0895" name="bbib0895"><span data-dcnode-id="5560" instrument_node="">[79]</span></a><span data-dcnode-id="5558" instrument_node=""> would reinforce low fertility only if slower decomposition is not accompanied by more rapid nutrient release from decomposing roots (</span><a class="workspace-trigger" data-dcnode-id="5556" href="#fig0005" name="bfig0005"><span data-dcnode-id="5557" instrument_node="">Figure 1</span></a><span data-dcnode-id="5555" instrument_node="">: Mechanism 4).</span></p></section></section><section data-dcnode-id="5453" id="sec0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5550" id="sect0070"><span data-dcnode-id="5551" instrument_node="">Moving beyond litter altogether: species effects on SOM nutrient dynamics</span></h2><section data-dcnode-id="5539" id="sec0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5548" id="sect0075"><span data-dcnode-id="5549" instrument_node="">Both litter and SOM contribute to nutrient supply</span></h3><p data-dcnode-id="5540" id="par0110"><span data-dcnode-id="5547" instrument_node="">Given that SOM in mineral soil horizons can contribute as much to ecosystem-scale nutrient supply as litter-dominated horizons, the emphasis on litter decomposition should be broadened to consider the litter–SOM continuum </span><a class="workspace-trigger" data-dcnode-id="5545" href="#bib0940" name="bbib0940"><span data-dcnode-id="5546" instrument_node="">[88]</span></a><span data-dcnode-id="5544" instrument_node="">; even in organic horizons, fresh litter can be but a small fraction of the organic matter. For example, on an area basis, gross rates of N mineralization in the mineral soil can exceed those in the O horizon </span><a class="workspace-trigger" data-dcnode-id="5542" href="#bib0945" name="bbib0945"><span data-dcnode-id="5543" instrument_node="">[89]</span></a><span data-dcnode-id="5541" instrument_node="">. Averaged across monocultures of 14 tree species, potential rates of net N mineralization were fourfold higher in the uppermost A horizon compared to the O horizon, and, on an area basis, ranged from less than 5% of O horizon rates for species with substantial O horizon accumulation to ∼400% for species with rapidly decomposing litter, high earthworm activity, and sparse O horizons (unpublished data).</span></p></section><section data-dcnode-id="5454" id="sec0070"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5537" id="sect0080"><span data-dcnode-id="5538" instrument_node="">Plant litter traits might not predict SOM feedbacks</span></h3><p data-dcnode-id="5508" id="par0115"><span data-dcnode-id="5536" instrument_node="">Therefore, understanding how plant species influence SOM dynamics might be as important to understanding ecosystem fertility as understanding species effects on litter dynamics </span><a class="workspace-trigger" data-dcnode-id="5534" href="#bib0950" name="bbib0950"><span data-dcnode-id="5535" instrument_node="">[90]</span></a><span data-dcnode-id="5533" instrument_node="">. Nevertheless, paradigms regarding species effects developed for litter might not predict how plant species affect SOM dynamics because plant traits that contribute biochemical recalcitrance to fresh litter might not confer long-term (&gt;decadal scale) stability to SOM </span><a class="workspace-trigger" data-dcnode-id="5531" href="#bib0940" name="bbib0940"><span data-dcnode-id="5532" instrument_node="">88</span></a><span data-dcnode-id="5530" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5528" href="#bib0955" name="bbib0955"><span data-dcnode-id="5529" instrument_node="">91</span></a><span data-dcnode-id="5527" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5525" href="#bib0960" name="bbib0960"><span data-dcnode-id="5526" instrument_node="">92</span></a><span data-dcnode-id="5524" instrument_node="">. For example, plant species with relatively rapid litter decomposition do not always cause rapid decomposition of SOM </span><a class="workspace-trigger" data-dcnode-id="5522" href="#bib0965" name="bbib0965"><span data-dcnode-id="5523" instrument_node="">[93]</span></a><span data-dcnode-id="5521" instrument_node="">, and in fact can be associated with relatively greater accumulation of SOM in mineral horizons </span><a class="workspace-trigger" data-dcnode-id="5519" href="#bib0530" name="bbib0530"><span data-dcnode-id="5520" instrument_node="">6</span></a><span data-dcnode-id="5518" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5516" href="#bib0785" name="bbib0785"><span data-dcnode-id="5517" instrument_node="">57</span></a><span data-dcnode-id="5515" instrument_node="">. This can occur because more efficient microbial degradation of high-quality litter in the O horizon leads to accumulation of microbial necromass that promotes the aggregation and chemical stabilization of SOM in association with clay minerals in deeper horizons </span><a class="workspace-trigger" data-dcnode-id="5513" href="#bib0785" name="bbib0785"><span data-dcnode-id="5514" instrument_node="">[57]</span></a><span data-dcnode-id="5512" instrument_node="">; or because of processes (leaching, earthworm activity) that transport organic matter into deeper horizons where it can be stabilized onto mineral surfaces </span><a class="workspace-trigger" data-dcnode-id="5510" href="#bib0970" name="bbib0970"><span data-dcnode-id="5511" instrument_node="">[94]</span></a><span data-dcnode-id="5509" instrument_node="">.</span></p><p data-dcnode-id="5503" id="par0120"><span data-dcnode-id="5507" instrument_node="">The importance of SOM in influencing nutrient availability, together with the evolving view of the factors that influence SOM dynamics </span><a class="workspace-trigger" data-dcnode-id="5505" href="#bib0975" name="bbib0975"><span data-dcnode-id="5506" instrument_node="">[95]</span></a><span data-dcnode-id="5504" instrument_node="">, suggest the need for integrated thinking about how plant species influence decomposition and nutrient dynamics of both SOM and litter, and whether such combined influences will reinforce versus weaken gradients of soil fertility. Although developing such a framework is beyond the scope of this review, I provide some examples of how plant traits might be expected to influence SOM decomposition and nutrient dynamics in ways that could feed back either positively or negatively to NPP and plant traits.</span></p><p data-dcnode-id="5480" id="par0125"><span data-dcnode-id="5502" instrument_node="">As one example, plant allocation to roots and mycorrhizae, likely higher in infertile systems </span><a class="workspace-trigger" data-dcnode-id="5500" href="#bib0905" name="bbib0905"><span data-dcnode-id="5501" instrument_node="">[81]</span></a><span data-dcnode-id="5499" instrument_node="">, will have myriad effects on SOM decomposition and soil nutrient dynamics </span><a class="workspace-trigger" data-dcnode-id="5497" href="#bib0900" name="bbib0900"><span data-dcnode-id="5498" instrument_node="">[80]</span></a><span data-dcnode-id="5496" instrument_node="">. Roots, mycorrhizae, and associated exudates promote soil aggregation and can increase the mean residence time (MRT) of SOM </span><a class="workspace-trigger" data-dcnode-id="5494" href="#bib0900" name="bbib0900"><span data-dcnode-id="5495" instrument_node="">80</span></a><span data-dcnode-id="5493" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5491" href="#bib0980" name="bbib0980"><span data-dcnode-id="5492" instrument_node="">96</span></a><span data-dcnode-id="5490" instrument_node="">. Stabilization of SOM into large macroaggregates (MRT &lt;5 years </span><a class="workspace-trigger" data-dcnode-id="5488" href="#bib0985" name="bbib0985"><span data-dcnode-id="5489" instrument_node="">[97]</span></a><span data-dcnode-id="5487" instrument_node="">) could promote soil fertility by reducing nutrient losses and supplying nutrients to plants as aggregates destabilize (negative feedback). By contrast, stabilization of SOM and associated nutrients into smaller macroaggregates and microaggregates, with longer MRT, could depress soil fertility (positive feedback). Root exudates could either accelerate or decelerate SOM decomposition and nutrient mineralization via priming or promotion of aggregate formation, respectively (positive or negative feedback </span><a class="workspace-trigger" data-dcnode-id="5485" href="#bib0900" name="bbib0900"><span data-dcnode-id="5486" instrument_node="">80</span></a><span data-dcnode-id="5484" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5482" href="#bib0990" name="bbib0990"><span data-dcnode-id="5483" instrument_node="">98</span></a><span data-dcnode-id="5481" instrument_node="">).</span></p><p data-dcnode-id="5469" id="par0130"><span data-dcnode-id="5479" instrument_node="">As a second example, concentrations of nutrients in plant tissues, that track soil nutrient supply as outlined above, influence SOM decomposition and nutrient dynamics in ways that could feed back either positively or negatively to NPP and plant traits. By promoting nitrification, high tissue N can increase soil acidity and solubilize aluminum (Al) and iron (Fe) </span><a class="workspace-trigger" data-dcnode-id="5477" href="#bib0995" name="bbib0995"><span data-dcnode-id="5478" instrument_node="">[99]</span></a><span data-dcnode-id="5476" instrument_node="">. High concentrations of plant tissue Ca generally promote Ca-rich soils </span><a class="workspace-trigger" data-dcnode-id="5474" href="#bib1000" name="bbib1000"><span data-dcnode-id="5475" instrument_node="">[100]</span></a><span data-dcnode-id="5473" instrument_node="">. High concentrations of polyvalent cations in soil (Al, Fe, Ca) facilitate the stabilization of SOM onto mineral surfaces </span><a class="workspace-trigger" data-dcnode-id="5471" href="#bib0995" name="bbib0995"><span data-dcnode-id="5472" instrument_node="">[99]</span></a><span data-dcnode-id="5470" instrument_node="">, likely reducing its turnover and release of nutrients on a per unit soil mass basis (negative feedback), although a larger SOM pool might release more N on a per unit ground area basis (positive feedback).</span></p><p data-dcnode-id="5455" id="par0135"><span data-dcnode-id="5468" instrument_node="">Predicting the effects of plant species on soil nutrient dynamics is further complicated because different plant traits likely influence the simultaneous mineralization versus immobilization of nutrients by different SOM and/or litter pools. For example, even in soils where the majority of gross nutrient mineralization is derived from turnover of SOM, and potentially is not directly influenced by plant litter traits, leaf litter and root traits of fresh detritus might influence net nutrient mineralization via their effects on nutrient immobilization, perhaps explaining the correlations between litter or root traits and N mineralization in surface soils </span><a class="workspace-trigger" data-dcnode-id="5466" href="#bib0530" name="bbib0530"><span data-dcnode-id="5467" instrument_node="">6</span></a><span data-dcnode-id="5465" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5463" href="#bib0535" name="bbib0535"><span data-dcnode-id="5464" instrument_node="">7</span></a><span data-dcnode-id="5462" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5460" href="#bib0540" name="bbib0540"><span data-dcnode-id="5461" instrument_node="">8</span></a><span data-dcnode-id="5459" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5457" href="#bib0545" name="bbib0545"><span data-dcnode-id="5458" instrument_node="">9</span></a><span data-dcnode-id="5456" instrument_node="">.</span></p></section></section><section data-dcnode-id="5440" id="sec0075"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5451" id="sect0085"><span data-dcnode-id="5452" instrument_node="">Conclusions and recommendations for future research</span></h2><p data-dcnode-id="5446" id="par0140"><span data-dcnode-id="5450" instrument_node="">Does my original assertion that plant species reinforce patterns of soil fertility through litter feedbacks hold up? In reviewing the evidence I conclude that plant species can indeed create positive feedbacks to rates of nutrient cycling because of predictable variation in plant traits across soil fertility gradients. However, these feedbacks are likely to be strongest when plant traits are tightly related to underlying gradients in soil nutrient supply, the same nutrients limit NPP and decomposition, low soil fertility leads to relatively greater allocation to roots that decompose and release nutrients relatively slowly, and gross mineralization and/or immobilization occurs predominantly from detritus rather than from SOM. By contrast, several conditions might weaken such potential feedbacks (</span><a class="workspace-trigger" data-dcnode-id="5448" href="#fig0005" name="bfig0005"><span data-dcnode-id="5449" instrument_node="">Figure 1</span></a><span data-dcnode-id="5447" instrument_node="">), including negative effects of N on decomposition, limitation of NPP and decomposition by different nutrients, and rapid nutrient release from decomposing roots.</span></p><p data-dcnode-id="5441" id="par0145"><span data-dcnode-id="5445" instrument_node="">Through evaluating the evidence amassed since Hobbie </span><a class="workspace-trigger" data-dcnode-id="5443" href="#bib0505" name="bbib0505"><span data-dcnode-id="5444" instrument_node="">[1]</span></a><span data-dcnode-id="5442" instrument_node="">, several research needs have emerged. A more comprehensive understanding of the patterns and mechanisms of litter nutrient effects on decomposition and nutrient release is needed, including of the mechanisms and generality of negative effects of N on decomposition, and of where different nutrients limit decomposition and litter nutrient release versus NPP. Such understanding will require decomposition studies that last long enough to elucidate the dynamics of the later stages of decomposition, assessment of a full suite of plant traits and organs that potentially influence those dynamics at the ecosystem scale, and approaches to measuring decomposition that allow access to a broader suite of decomposing organisms than soil microbes. Finally, frameworks are needed for predicting plant species effects on nutrient cycling that are broadened beyond litter decomposition to consider the full litter–SOM continuum.</span></p></section></div><section data-dcnode-id="5434" id="ack0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5437" id="sect0090"><span data-dcnode-id="5438" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="5435" id="par0150"><span data-dcnode-id="5436" instrument_node="">I am grateful to Kevin Mueller and members of my laboratory group, Clare Kazanski, Christine O’Connell, Charlotte Riggs, and William Eddy, for stimulating discussions on this topic and useful comments on earlier versions of the manuscript. Suggestions from two anonymous reviewers greatly improved the manuscript. Much of my own research that has shaped my thinking on this topic was carried out as part of the Cedar Creek Long Term Ecological Research program. Terry Chapin and Peter Vitousek have been particularly inspirational in my thinking on this topic over the years and for that I am very grateful.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="5429"><button class="button button-anchor" data-dcnode-id="5430" type="button"><span class="button-text" data-dcnode-id="5431"><span data-dcnode-id="5432" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="5428"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="571" id="bibl0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5426"><span data-dcnode-id="5427" instrume
