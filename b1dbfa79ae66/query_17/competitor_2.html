x=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0016706122001562" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="565" id="citing-articles-article0-title"><span data-dcnode-id="566" instrument_node="">Humipedon dynamics in lowland Amazonian forests: are there Amphi humus forms even in tropical rain forests?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">2022, Geoderma</span></div></div><div class="buttons" data-dcnode-id="555"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="556" type="button"><span class="button-link-text" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="557" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="558"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="544"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="545" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="546"><p data-dcnode-id="547" id="sp0010"><span data-dcnode-id="554" instrument_node="">Understanding humipedon dynamics is crucial to capture forest ecological processes. However, studies disentangling humipedon dynamics in tropical forests are scarce. The humipedon structure classification is important because it shows how forest ecosystems interact and react with (a)biotic factors. Here, we used the humus morpho-functional approach to investigate how soil texture and reduced impact-logging affect forest humipedon structure and dynamics in the eastern Amazon. We used a morpho-functional classification of humus forms as the foundation to visualize, classify, and code 133 soil profiles in two contrasting soil textures and different post-logging practices, to identify litter leaching, fragmentation, and humification processes coupled with soil aggregation and root dynamics. The classification of humus forms resulted in the identification of three humus systems: Mull, Moder and Amphi. Sandy and clayey textures differ statistically (χ</span><sup data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">2</span></sup><span data-dcnode-id="551" instrument_node="">&nbsp;=&nbsp;51.83; p&nbsp;&lt;&nbsp;0.001), with sandy texture predominating in Moder system, while clayey texture exhibits Amphi or Mull systems. Sandy textures presented a weak soil aggregation, but strong association with root (rhiOF) and humification (OH) horizons, leading to a clear transition between organic and mineral pools. In contrast, clayey textures show a strong carbon storage and soil aggregation. The humipedon horizons differ significantly (p&nbsp;=&nbsp;0.009; stress&nbsp;=&nbsp;0.1142 and R</span><sup data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">2</span></sup><span data-dcnode-id="548" instrument_node="">&nbsp;=&nbsp;0.987) and their dynamics clearly evolve towards an opposite direction. The classification framework introduced here supports environmental management by promoting speed and viability in diagnosing forest ecosystem soils towards forest protection or use in the landscape, and specific climate mitigation goals both in local and regional planning.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="381"><div class="sub-heading" data-dcnode-id="537"><a data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S030438002200062X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="541" id="citing-articles-article1-title"><span data-dcnode-id="542" instrument_node="">Quantifying root turnover in grasslands from biomass dynamics: Application of the growth-maintenance respiration paradigm and re-analysis of historical data</span></h3></a><div class="article-source ellipsis" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">2022, Ecological Modelling</span></div></div><div class="buttons" data-dcnode-id="531"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="532" type="button"><span class="button-link-text" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="533" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="534"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="382"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="383" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="384"><p data-dcnode-id="385" id="spara013"><span data-dcnode-id="530" instrument_node="">Root turnover rates define how frequently plants replace their root systems and input organic matter into soil. Turnover rates are often computed using measurements of total living and dead (standing) root biomass (</span><em data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">r</span></em><span data-dcnode-id="527" instrument_node="">) by assuming gross and net production are equivalent during the growing season. This assumption may be inappropriate in grasslands where root lifespans are relatively short, and decomposition substantially offsets growth. The objective of this study was to quantify turnover rates from measurements of </span><em data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">r</span></em><span data-dcnode-id="524" instrument_node=""> over time assuming growth and decomposition happen simultaneously, and that net </span><em data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">r</span></em><span data-dcnode-id="521" instrument_node=""> changes (</span><span class="math" data-dcnode-id="480"><span class="MathJax_Preview" data-dcnode-id="520" style=""></span><span class="MathJax_SVG" data-dcnode-id="483" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><mstyle mathvariant=&quot;normal&quot; is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x394;</mi></mstyle><mi is=&quot;true&quot;>r</mi></mrow><mrow is=&quot;true&quot;><mstyle mathvariant=&quot;normal&quot; is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x394;</mi></mstyle><mi is=&quot;true&quot;>t</mi></mrow></mfrac></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="499" focusable="false" height="3.428ex" role="img" style="vertical-align: -1.108ex;" viewBox="0 -999.2 1268.6 1476.1" width="2.947ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="500" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="501" is="true"><g data-dcnode-id="502" transform="translate(120,0)"><rect data-dcnode-id="519" height="60" stroke="none" width="1028" x="0" y="220"></rect><g data-dcnode-id="511" is="true" transform="translate(60,407)"><g data-dcnode-id="515" is="true"><g data-dcnode-id="516" is="true"><use data-dcnode-id="517" href="#MJMAIN-394" transform="scale(0.707)"><path d="M51 0Q46 4 46 7Q46 9 215 357T388 709Q391 716 416 716Q439 716 444 709Q447 7 15 224 298T190 165Q156 25 151 16Q138 -11 108 -11Q95 -11 87 -5T76 7T74 17Q74 30 114 189T154 366Q154 405 128 405Q107 405 92 377T68 316T57 280Q55 278 41 278H27Q21 284 21 287Z" data-dcnode-id="477" id="MJMATHI-72" stroke-width="1"></path></use></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="469" role="presentation"><math data-dcnode-id="470" xmlns="http://www.w3.org/1998/Math/MathML"><mi data-dcnode-id="471" is="true"><span data-dcnode-id="472" instrument_node="">r</span></mi></math></span></span></span><span data-dcnode-id="464" instrument_node=""> increases (first-order kinetics). These hypotheses were interpreted with the growth-maintenance respiration paradigm (</span><em data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">GMRP</span></em><span data-dcnode-id="461" instrument_node="">) based on whether daily growth is constant (</span><em data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">GP</span></em><span data-dcnode-id="458" instrument_node="">) or reduced by the costs of tissue maintenance (</span><em data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">MP</span></em><span data-dcnode-id="455" instrument_node="">). The two parameters of the linear </span><em data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">GMRP</span></em><span data-dcnode-id="452" instrument_node=""> models were inferred using Bayesian methods from 111 growing season records of </span><span class="math" data-dcnode-id="438"><span class="MathJax_Preview" data-dcnode-id="451" style=""></span><span class="MathJax_SVG" data-dcnode-id="441" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mi is=&quot;true&quot;>r</mi></math>" id="MathJax-Element-3-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="446" focusable="false" height="1.443ex" role="img" style="vertical-align: -0.225ex;" viewBox="0 -524.4 451.5 621.3" width="1.049ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="447" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="448" is="true"><use data-dcnode-id="449" href="#MJMATHI-72"><path d="M21 287Q22 290 23 295T28 317T38 348T53 381T73 411T99 433T132 442Q161 442 183 430T214 408T225 388Q227 382 228 382T236 389Q284 441 347 441H350Q398 441 422 400Q430 381 430 363Q430 333 417 315T391 292T366 288Q346 288 334 299T322 328Q322 376 378 392Q356 405 342 405Q286 405 239 331Q229 315 224 298T190 165Q156 25 151 16Q138 -11 108 -11Q95 -11 87 -5T76 7T74 17Q74 30 114 189T154 366Q154 405 128 405Q107 405 92 377T68 316T57 280Q55 278 41 278H27Q21 284 21 287Z" data-dcnode-id="450" id="MJMATHI-72" stroke-width="1"></path></use></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="442" role="presentation"><math data-dcnode-id="443" xmlns="http://www.w3.org/1998/Math/MathML"><mi data-dcnode-id="444" is="true"><span data-dcnode-id="445" instrument_node="">r</span></mi></math></span></span></span><span data-dcnode-id="437" instrument_node=""> versus </span><span class="math" data-dcnode-id="396"><span class="MathJax_Preview" data-dcnode-id="436" style=""></span><span class="MathJax_SVG" data-dcnode-id="399" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><mstyle mathvariant=&quot;normal&quot; is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x394;</mi></mstyle><mi is=&quot;true&quot;>r</mi></mrow><mrow is=&quot;true&quot;><mstyle mathvariant=&quot;normal&quot; is=&quot;true&quot;><mi is=&quot;true&quot;>&amp;#x394;</mi></mstyle><mi is=&quot;true&quot;>t</mi></mrow></mfrac></math>" id="MathJax-Element-4-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="415" focusable="false" height="3.428ex" role="img" style="vertical-align: -1.108ex;" viewBox="0 -999.2 1268.6 1476.1" width="2.947ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="416" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="417" is="true"><g data-dcnode-id="418" transform="translate(120,0)"><rect data-dcnode-id="435" height="60" stroke="none" width="1028" x="0" y="220"></rect><g data-dcnode-id="427" is="true" transform="translate(60,407)"><g data-dcnode-id="431" is="true"><g data-dcnode-id="432" is="true"><use data-dcnode-id="433" href="#MJMAIN-394" transform="scale(0.707)"><path d="M51 0Q46 4 46 7Q46 9 215 357T388 709Q391 716 416 716Q439 716 444 709Q447 705 616 357T786 7Q786 4 781 0H51ZM507 344L384 596L137 92L383 91H630Q630 93 507 344Z" data-dcnode-id="434" id="MJMAIN-394" stroke-width="1"></path></use></g></g><g data-dcnode-id="428" is="true" transform="translate(589,0)"><use data-dcnode-id="429" href="#MJMATHI-72" transform="scale(0.707)"><path d="M21 287Q22 290 23 295T28 317T38 348T53 381T73 411T99 433T132 442Q161 442 183 430T214 408T225 388Q227 382 228 382T236 389Q284 441 347 441H350Q398 441 422 400Q430 381 430 363Q430 333 417 315T391 292T366 288Q346 288 334 299T322 328Q322 376 378 392Q356 405 342 405Q286 405 239 331Q229 315 224 298T190 165Q156 25 151 16Q138 -11 108 -11Q95 -11 87 -5T76 7T74 17Q74 30 114 189T154 366Q154 405 128 405Q107 405 92 377T68 316T57 280Q55 278 41 278H27Q21 284 21 287Z" data-dcnode-id="430" id="MJMATHI-72" stroke-width="1"></path></use></g></g><g data-dcnode-id="419" is="true" transform="translate(91,-407)"><g data-dcnode-id="423" is="true"><g data-dcnode-id="424" is="true"><use data-dcnode-id="425" href="#MJMAIN-394" transform="scale(0.707)"><path d="M51 0Q46 4 46 7Q46 9 215 357T388 709Q391 716 416 716Q439 716 444 709Q447 705 616 357T786 7Q786 4 781 0H51ZM507 344L384 596L137 92L383 91H630Q630 93 507 344Z" data-dcnode-id="426" id="MJMAIN-394" stroke-width="1"></path></use></g></g><g data-dcnode-id="420" is="true" transform="translate(589,0)"><use data-dcnode-id="421" href="#MJMATHI-74" transform="scale(0.707)"><path d="M26 385Q19 392 19 395Q19 399 22 411T27 425Q29 430 36 430T87 431H140L159 511Q162 522 166 540T173 566T179 586T187 603T197 615T211 624T229 626Q247 625 254 615T261 596Q261 589 252 549T232 470L222 433Q222 431 272 431H323Q330 424 330 420Q330 398 317 385H210L174 240Q135 80 135 68Q135 26 162 26Q197 26 230 60T283 144Q285 150 288 151T303 153H307Q322 153 322 145Q322 142 319 133Q314 117 301 95T267 48T216 6T155 -11Q125 -11 98 4T59 56Q57 64 57 83V101L92 241Q127 382 128 383Q128 385 77 385H26Z" data-dcnode-id="422" id="MJMATHI-74" stroke-width="1"></path></use></g></g></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="400" role="presentation"><math data-dcnode-id="401" xmlns="http://www.w3.org/1998/Math/MathML"><mfrac data-dcnode-id="402" is="true"><mrow data-dcnode-id="409" is="true"><mstyle data-dcnode-id="412" is="true" mathvariant="normal"><mi data-dcnode-id="413" is="true"><span data-dcnode-id="414" instrument_node="">Δ</span></mi></mstyle><mi data-dcnode-id="410" is="true"><span data-dcnode-id="411" instrument_node="">r</span></mi></mrow><mrow data-dcnode-id="403" is="true"><mstyle data-dcnode-id="406" is="true" mathvariant="normal"><mi data-dcnode-id="407" is="true"><span data-dcnode-id="408" instrument_node="">Δ</span></mi></mstyle><mi data-dcnode-id="404" is="true"><span data-dcnode-id="405" instrument_node="">t</span></mi></mrow></mfrac></math></span></span></span><span data-dcnode-id="395" instrument_node=""> from 15 grasslands. Two-level (hierarchical) inferences were setup for the 14 grasslands that had multiple records, assuming parameters from each grassland originated from the same population. For the grassland with one record, a single-level inference was conducted. A total of 89 records, at least one per grassland, substantially supported the </span><em data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">GMRP</span></em><span data-dcnode-id="392" instrument_node=""> models. Median predicted turnover rates based on production/decomposition for the </span><em data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">GP</span></em><span data-dcnode-id="389" instrument_node=""> and </span><em data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">MP</span></em><span data-dcnode-id="386" instrument_node=""> models were 1.8/1.1 and 1.4/1.2 per growing season, respectively. These estimates were 3 to 7 times faster than those from traditional algorithms that neglect decomposition, suggesting organic matter inputs from roots may be larger than expected in some grasslands, especially where growth occurs almost year-round.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="363"><div class="sub-heading" data-dcnode-id="375"><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0048969721066614" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="379" id="citing-articles-article2-title"><span data-dcnode-id="380" instrument_node="">Changes in soil total, microbial and enzymatic C-N-P contents and stoichiometry with depth and latitude in forest ecosystems</span></h3></a><div class="article-source ellipsis" data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">2022, Science of the Total Environment</span></div></div><div class="buttons" data-dcnode-id="369"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="370" type="button"><span class="button-link-text" data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="371" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="372"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="364"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="365" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="366"><p data-dcnode-id="367" id="sp0035"><span data-dcnode-id="368" instrument_node="">Soil microorganisms and their extracellular enzymes are key factors determining the biogeochemical cycles of carbon (C), nitrogen (N) and phosphorus (P). Relevant studies mainly focus on surface soils (0–20&nbsp;cm), while deep soils (&gt;20&nbsp;cm) are often neglected, let alone comparing multiple ecosystems simultaneously. In this study, we studied the latitudinal (19–48°N) and vertical (0–100&nbsp;cm) patterns of soil total, microbial and enzymatic C-N-P contents and ratios (stoichiometry) in eight temperate, subtropical and tropical forest ecosystems in eastern China. We found that the C-N-P contents and their stoichiometry in soil, microbial biomass and extracellular enzymes all varied significantly with depth and latitude. Soil total C, N and P declined with depth, as did microbial biomass and enzyme activity, while microbial and enzymatic C:N ratios showed increasing or no trend with increasing soil depth. Moreover, soil total and microbial C-N-P contents in surface soils (0–20&nbsp;cm) showed positive correlations with increasing latitude, and such correlations tended to be weaker or disappeared in deep soils (&gt;20&nbsp;cm). Overall, changes in total, microbial and enzymatic C-N-P contents and ratios among latitudes suggested a shift from relative N limitation in the north to relative P limitation in the south.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="313"><div class="sub-heading" data-dcnode-id="357"><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2452219822000106" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="361" id="citing-articles-article3-title"><span data-dcnode-id="362" instrument_node="">Are native phosphate-solubilizing bacteria a relevant alternative to mineral fertilizations for crops? Part II: PSB inoculation enables a halving of P input and improves the microbial community in the rapeseed rhizosphere</span></h3></a><div class="article-source ellipsis" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">2022, Rhizosphere</span></div></div><div class="buttons" data-dcnode-id="351"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="352" type="button"><span class="button-link-text" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="353" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="354"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="314"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="315" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="316"><p data-dcnode-id="317" id="abspara0010"><span data-dcnode-id="350" instrument_node="">In this study, three PSB strains belonging to the </span><em data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Pseudomonas</span></em><span data-dcnode-id="347" instrument_node=""> genus, isolated from soil harvested under rapeseed (Pnapus), winter pea (</span><em data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Pisum sativum</span></em><span data-dcnode-id="344" instrument_node="">, Ppea), and faba bean (</span><em data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Vicia faba</span></em><span data-dcnode-id="341" instrument_node="">, Pfaba), were tested on rapeseed growth. This test was performed in a greenhouse experiment with four plant replicates in pots per modality during the vegetative stage of rapeseed (10 weeks), in combination with a gradient of P fertilization (P100, P50, P25 and P0 corresponding to 125, 62.5, 31.5 and 0&nbsp;mg P</span><sub data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">2</span></sub><span data-dcnode-id="338" instrument_node="">O</span><sub data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">5</span></sub><span data-dcnode-id="335" instrument_node=""> per plant, respectively). Contrasted results were observed for the three tested strains. PSB from rapeseed (Pnapus) showed no effect on plant biomass or P status. Ppea and Pfaba increased the biomass and P amount in roots when P fertilization was decreased to 50%, but winter pea PSB (Ppea) dramatically decreased plant biomass below this P input threshold. For fertilization at P50 with Ppea and Pfaba strains, an increase in alkaline phosphatase activity was concomitantly observed in the rhizosphere. The structure and diversity of the soil microbial community was then assessed to explore possible indirect effects of Pfaba application. Relative abundance of several bacterial genera potentially involved in biological control against phytopathogens were decreased (</span><em data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Sphingomonas,</span></em><span data-dcnode-id="332" instrument_node=""> Acidobacteria Gp6, </span><em data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Lysobacter, Thermomonas</span></em><span data-dcnode-id="329" instrument_node="">, and a genus belonging to the </span><em data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Spartobacteria</span></em><span data-dcnode-id="326" instrument_node=""> class), whereas relative abundance of other genera involved in the nitrogen and sulphur cycles were increased (</span><em data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Ramlibacter, Nocardioides, Inhella, Bradyrhizobium</span></em><u data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">,</span></u><span data-dcnode-id="321" instrument_node=""> and </span><em data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Thiobacillus</span></em><span data-dcnode-id="318" instrument_node="">), possibly sustaining even more plant access to essential nutrients.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="292"><div class="sub-heading" data-dcnode-id="307"><a data-dcnode-id="310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0378112721010999" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="311" id="citing-articles-article4-title"><span data-dcnode-id="312" instrument_node="">Hardwood mixtures facilitate leaf litter decomposition and soil nitrogen mineralization in conifer plantations</span></h3></a><div class="article-source ellipsis" data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">2022, Forest Ecology and Management</span></div></div><div class="buttons" data-dcnode-id="301"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="302" type="button"><span class="button-link-text" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="303" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="304"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="293"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="294" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="295"><p data-dcnode-id="296" id="sp0010"><span data-dcnode-id="300" instrument_node="">Productivity in conifer plantations can be increased by hardwood mixture. However, the underlying mechanisms that govern the relationship between hardwood mixture and productivity remain poorly understood, particularly with respect to nutrient cycling. We investigated how and to what extent hardwood mixtures alter nitrogen amounts in leaf litterfall, leaf litter decomposition rates, and soil nitrogen mineralization rates in an experiment that used different thinning intensities (i.e., a non-thinned “control” group with few hardwoods, a 33%-thinned “weak” group with a small amount of hardwoods, and a 67%-thinned “intensive” group with abundant hardwoods) in a conifer </span><em data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Cryptomeria japonica</span></em><span data-dcnode-id="297" instrument_node=""> plantation (38-year old). Most of the hardwoods were 15-year old trees that have been regenerated after the first thinning. The annual leaf litterfall amount for the conifer was highest in the control group and lowest in the intensive group, whereas the reverse was true for hardwoods, although the hardwoods’ annual leaf litterfall amount was approximately half that of conifers, even in the intensive group. Consequently, the annual amount of leaf litterfall of hardwoods and conifers combined was lowest in the intensive group. However, the total amount of nitrogen in the annual leaf litterfall of hardwoods and conifers combined did not differ according to thinning intensity, because the mass-based nitrogen concentration in the leaf litterfall of hardwoods was twice that of conifers. The leaf litter decomposition rate in hardwoods was approximately three times faster than that in conifers irrespective of thinning intensity, mainly due to the lower carbon-to-nitrogen (C:N) ratio. Thus, the total amount of nitrogen in the decomposed leaves of hardwoods and conifers combined, calculated by multiplying the total amount of nitrogen in the annual leaf litterfall of hardwoods and conifers by the decomposition rate and summing the results, was highest in the intensive group. In soil from shallow depths (0–10&nbsp;cm), the nitrogen mineralization rate increased in the order of control, weak, and intensive, attributable primarily to the C:N ratio, which decreased in the same order. The results indicated that increasing the hardwood content by intensive thinning significantly enhances the availability of soil inorganic nitrogen in conifer plantations, by facilitating leaf litter decomposition and soil nitrogen mineralization. These findings indicate that hardwood mixtures can increase forest productivity by enhancing nitrogen cycling.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="253"><div class="sub-heading" data-dcnode-id="286"><a data-dcnode-id="289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0038071721003850" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="290" id="citing-articles-article5-title"><span data-dcnode-id="291" instrument_node="">Nitrogen addition slows litter decomposition accompanied by accelerated manganese release: A five-year experiment in a subtropical evergreen broadleaf forest</span></h3></a><div class="article-source ellipsis" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">2022, Soil Biology and Biochemistry</span></div></div><div class="buttons" data-dcnode-id="280"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="281" type="button"><span class="button-link-text" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="282" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="283"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="254"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="255" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="256"><p data-dcnode-id="257" id="abspara0010"><span data-dcnode-id="279" instrument_node="">Litter decomposition is a key process for mediating ecosystem carbon (C) and nutrient cycling and is sensitive to increasing atmospheric nitrogen (N) deposition. However, the response of long-term litter decomposition to elevated N input remains unclear, especially in (sub) tropical regions with high ambient N deposition. We conducted a five-year field experiment in an evergreen broadleaf forest in the West China Rain Zone, an area with one of the highest levels of atmospheric N deposition. Three levels of N addition: control (ambient N deposition), low-N (+50&nbsp;kg&nbsp;N ha</span><sup data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">−1</span></sup><span data-dcnode-id="276" instrument_node=""> year</span><sup data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">−1</span></sup><span data-dcnode-id="273" instrument_node="">), and high-N (+50&nbsp;kg&nbsp;N ha</span><sup data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">−1</span></sup><span data-dcnode-id="270" instrument_node=""> year</span><sup data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">−1</span></sup><span data-dcnode-id="267" instrument_node="">); were applied monthly from April 2013. The decomposition process of two leaf litters, </span><em data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Schima sinensis</span></em><span data-dcnode-id="264" instrument_node=""> and </span><em data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Lithocarpus hancei</span></em><span data-dcnode-id="261" instrument_node="">, was then investigated from November 2013 to December 2018. For both litters, we observed two distinct decomposition stages: an early stage of rapid decomposition (the first 2 years); and a late stage of slow decomposition (the following 3 years). Nitrogen addition did not affect the early-stage but significantly inhibited late-stage mass loss, thus decreasing decomposition rate or extent. Cellulose degradation was accelerated in the early stage but suppressed in the late stage, while lignin degradation was inhibited throughout the decomposition process. Nitrogen addition affected the concentration and/or release of nutrients during decomposition, and especially significantly accelerated manganese (Mn) release, with a significant decrease in Mn concentration and Mn/lignin ratio. The reduction in Mn concentration may explain the inhibition of litter decomposition after N addition, because it retards the degradation of lignin through reducing ligninolytic enzyme activity. The slowed litter decomposition in this forest is predicted to decrease soil CO</span><sub data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">2</span></sub><span data-dcnode-id="258" instrument_node=""> emissions and increase soil C content.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84931011800%26md5%3Db69a7c0293e9172a1d966d4cd173527" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="250" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="251"></path></svg><span class="button-alternative-text" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0169534715000786"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Copyright © 2015 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" hei
