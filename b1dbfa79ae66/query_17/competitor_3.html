></strong></div></div><div class="host" data-dcnode-id="527"><span data-dcnode-id="546" instrument_node="">Water Resour. Res.</span><span data-dcnode-id="544" instrument_node="">, </span><span data-dcnode-id="542" instrument_node="">37</span><span data-dcnode-id="540" instrument_node=""> (</span><span data-dcnode-id="538" instrument_node="">2001</span><span data-dcnode-id="536" instrument_node="">)</span><span data-dcnode-id="534" instrument_node="">, pp. </span><span data-dcnode-id="532" instrument_node="">701</span><span data-dcnode-id="530" instrument_node="">-</span><span data-dcnode-id="528" instrument_node="">708</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="523"><span data-dcnode-id="526" instrument_node=""></span><a class="link" data-dcnode-id="524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DResponse%2520of%2520mean%2520annual%2520evapo-transpiration%2520to%2520vegetation%2520changes%2520at%2520catchment%2520scale%26publication_year%3D2001%26author%3DL.%2520Zhang%26author%3DW.R.%2520Dawes%26author%3DG.R.%2520Walker" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="525" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="519"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="520" href="#bbib0800" id="ref-id-bib0800"><span data-dcnode-id="521" instrument_node="">Zheng et al., 2000</span></a></dt><dd class="reference" data-dcnode-id="445"><div class="contribution" data-dcnode-id="470"><span data-dcnode-id="518" instrument_node="">D.</span><span data-dcnode-id="516" instrument_node=""> </span><span data-dcnode-id="514" instrument_node="">Zheng</span><span data-dcnode-id="512" instrument_node="">, </span><span data-dcnode-id="510" instrument_node="">J.</span><span data-dcnode-id="508" instrument_node=""> </span><span data-dcnode-id="506" instrument_node="">Chen</span><span data-dcnode-id="504" instrument_node="">, </span><span data-dcnode-id="502" instrument_node="">B.</span><span data-dcnode-id="500" instrument_node=""> </span><span data-dcnode-id="498" instrument_node="">Song</span><span data-dcnode-id="496" instrument_node="">, </span><span data-dcnode-id="494" instrument_node="">M.</span><span data-dcnode-id="492" instrument_node=""> </span><span data-dcnode-id="490" instrument_node="">Xu</span><span data-dcnode-id="488" instrument_node="">, </span><span data-dcnode-id="486" instrument_node="">P.</span><span data-dcnode-id="484" instrument_node=""> </span><span data-dcnode-id="482" instrument_node="">Sneed</span><span data-dcnode-id="480" instrument_node="">, </span><span data-dcnode-id="478" instrument_node="">R.</span><span data-dcnode-id="476" instrument_node=""> </span><span data-dcnode-id="474" instrument_node="">Jensen</span><div data-dcnode-id="471"><strong class="title" data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Effects of silvicultural treatments on summer forest microclimate in southeastern Missouri Ozarks</span></strong></div></div><div class="host" data-dcnode-id="450"><span data-dcnode-id="469" instrument_node="">Climate Res.</span><span data-dcnode-id="467" instrument_node="">, </span><span data-dcnode-id="465" instrument_node="">15</span><span data-dcnode-id="463" instrument_node=""> (</span><span data-dcnode-id="461" instrument_node="">2000</span><span data-dcnode-id="459" instrument_node="">)</span><span data-dcnode-id="457" instrument_node="">, pp. </span><span data-dcnode-id="455" instrument_node="">45</span><span data-dcnode-id="453" instrument_node="">-</span><span data-dcnode-id="451" instrument_node="">59</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="446"><span data-dcnode-id="449" instrument_node=""></span><a class="link" data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DEffects%2520of%2520silvicultural%2520treatments%2520on%2520summer%2520forest%2520microclimate%2520in%2520southeastern%2520Missouri%2520Ozarks%26publication_year%3D2000%26author%3DD.%2520Zheng%26author%3DJ.%2520Chen%26author%3DB.%2520Song%26author%3DM.%2520Xu%26author%3DP.%2520Sneed%26author%3DR.%2520Jensen" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="448" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="274" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="275"><div class="PageDivider" data-dcnode-id="441"></div><header data-dcnode-id="438" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Cited by (65)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="276"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="277"><ul data-dcnode-id="283"><li class="ListArticleItem" data-dcnode-id="417"><div class="sub-heading" data-dcnode-id="432"><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2666719322000280" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="436" id="citing-articles-article0-title"><span data-dcnode-id="437" instrument_node="">Net precipitation, infiltration and overland flow production in three types of community-managed forest in the Mid-hills of East Central Nepal</span></h3></a><div class="article-source ellipsis" data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">2022, Trees, Forests and People</span></div></div><div class="buttons" data-dcnode-id="426"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="427" type="button"><span class="button-link-text" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="428" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="429"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="418"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="419" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="420"><p data-dcnode-id="421" id="spara012"><span data-dcnode-id="425" instrument_node="">It is widely believed that community forest management concurrently improves the social, ecological and economic conditions of local populations. Accordingly, large areas of Nepal's Mid-hills’ forests are used and managed by local Community Forest User Groups (CFUGs). The CFUGs plant seedlings as well as thin and prune forest trees at varying intensities as determined by local forest conditions and the need for forest products (mainly timber, firewood, livestock fodder and compostable litter). However, the hydrological effects of these activities are uncertain. We present results of throughfall (Tf), stemflow (Sf) and overland flow (OF) measurements made between June 2015 and December 2016 (including two consecutive rainy seasons) in three types of community-managed forests subject to different levels of community usage in the Kavre district (East Central Nepal): (i) regenerating natural broad-leaved (BF), (ii) predominantly-planted pine (PF), and (iii) mixed pine-broad-leaved (MF). The BF and MF were used more intensively than the PF. Overall Tf fractions were 72.0%, 73.7% and 77.5% of incident precipitation (</span><em data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">P</span></em><span data-dcnode-id="422" instrument_node="">) for the BF, MF and PF, respectively, with corresponding Sf fractions of 1.6%, 1.3% and 0.6%. Overall rainfall interception fractions were 26.4%, 25.1% and 21.9% for the BF, MF and PF, respectively, and reflected the trend in leaf area index. Total amounts of OF constituted 11.4%. 9.8% and 4.7% of net precipitation (Tf+Sf) inputs to the forest floor in the BF, MF and PF, respectively and broadly followed the relative intensity of forest usage. Observed amounts of OF in the study forests represent ca. 50–115&nbsp;mm of foregone infiltration opportunity per year under average rainfall, implying reductions in the recharge of soil and groundwater reserves of ∼6% in the PF to 12–14% in the MF and BF. Our results thus show that regular harvesting of litter, fodder and firewood combined with surface compaction by human traffic constitute important determinants of hillslope hydrological functioning, particularly regarding amounts of foregone infiltration and runoff as OF in the more intensively used community-managed forests of Nepal's Mid-hills.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="363"><div class="sub-heading" data-dcnode-id="411"><a data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0378112722000032" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="415" id="citing-articles-article1-title"><span data-dcnode-id="416" instrument_node="">Does forest management affect the magnitude and direction of the afforestation effect on soil methane fluxes? A meta-analysis</span></h3></a><div class="article-source ellipsis" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">2022, Forest Ecology and Management</span></div></div><div class="buttons" data-dcnode-id="405"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="406" type="button"><span class="button-link-text" data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="407" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="408"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="364"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="365" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="366"><p data-dcnode-id="367" id="sp0010"><span data-dcnode-id="404" instrument_node="">Evidence suggests that tree plantations change soil methane (CH</span><sub data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">4</span></sub><span data-dcnode-id="401" instrument_node="">) fluxes (magnitude and/or direction of the fluxes) compared to herbaceous land (i.e. afforestation effect) due to the effect of trees increasing methanotroph bacteria abundance and enhancing soil gas diffusivity. However, the magnitude of this afforestation effect is highly variable across studies. Here, we evaluated whether the variation in the afforestation effect depends on forestry management strategies, described by stand age and density, as well as taxonomic identity of the tree species, and the interaction with climatic conditions. To this end, we conducted a </span><em data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">meta</span></em><span data-dcnode-id="398" instrument_node="">-analysis using 47 paired samples of afforested and contiguous herbaceous land from 14 studies located in different biomes worldwide. We found that afforestation predominantly increases the capacity of soil net CH</span><sub data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">4</span></sub><span data-dcnode-id="395" instrument_node=""> uptake (i.e. more negative fluxes) compared to herbaceous land, but the magnitude of this effect was highly heterogeneous across paired samples. This heterogeneity was explained by environmental conditions, but significant effects of forest stand age and density were also found proving the importance of forest management on this ecological service. Soil net CH</span><sub data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">4</span></sub><span data-dcnode-id="392" instrument_node=""> uptake following afforestation increases with increasing stand age. Although the stand stocking effect could be tested with a limited number of studies (24 out of the 47 paired samples), the results suggest that net CH</span><sub data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">4</span></sub><span data-dcnode-id="389" instrument_node=""> uptake decreases with tree stocking (stand density) in the range of values up to 1500 individuals per ha. No change in CH</span><sub data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">4</span></sub><span data-dcnode-id="386" instrument_node=""> fluxes was observed above this high stand density. Contrary to our expectations, no effect of taxonomic identity of the trees considering the most planted genera (</span><em data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Pinus</span></em><span data-dcnode-id="383" instrument_node=""> and </span><em data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Eucalyptus</span></em><span data-dcnode-id="380" instrument_node="">) was observed in the average soil CH</span><sub data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">4</span></sub><span data-dcnode-id="377" instrument_node=""> fluxes. Furthermore, a significant correlation between the afforestation effect on soil water content and CH</span><sub data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">4</span></sub><span data-dcnode-id="374" instrument_node=""> flux suggests that the most plausible cause of the increased soil net CH</span><sub data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">4</span></sub><span data-dcnode-id="371" instrument_node=""> uptake is driven by the forest impact on soil desiccation, which in turn increases in sites with higher water limitation (i.e. higher potential evapotranspiration and high temporal rainfalls variations within the ranges of the available studies). Finally, our study provides evidence that by modifying rotation time and stand stocking, afforested land may increase its environmental service as a sink of atmospheric CH</span><sub data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">4</span></sub><span data-dcnode-id="368" instrument_node="">.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="345"><div class="sub-heading" data-dcnode-id="357"><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2213305421000321" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="361" id="citing-articles-article2-title"><span data-dcnode-id="362" instrument_node="">Unravelling the role of vegetation on the different trends between climatic and hydrologic drought in headwater catchments of Spain</span></h3></a><div class="article-source ellipsis" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">2021, Anthropocene</span></div></div><div class="buttons" data-dcnode-id="351"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="352" type="button"><span class="button-link-text" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="353" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="354"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="346"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="347" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="348"><p data-dcnode-id="349" id="sp0075"><span data-dcnode-id="350" instrument_node="">The availability of water resources is a major challenge of the Mediterranean region. Intense land use transformation has impacted the headwaters of river basins that generate most of the water resources, reducing streamflow This study analyses the evolution of hydrological and climatic drought in headwater catchments of Spain and it explores the extent to which vegetation can reinforce trends in hydrological drought severity in comparison to the evolution of cFlimatic drought severity. We have used the Standardized Precipitation Evapotranspiration Index and Standardized Streamflow Index to examine hydrological and climatic drought, respectively, and examined the changes in the frequency, magnitude, and duration of climatic and hydrologic droughts over non-perturbed headwater catchments of Spain from 1961 to 2013. We quantified vegetation changes over time in the analysed catchments and we compared the changes in the climatic and hydrological droughts with changes in vegetation coverage using Pearson’s r correlations and linear regression model. The results show that the trends toward higher frequency, duration and severity of hydrological droughts are more marked than the observed trends in climatic droughts, which can be associated to the dominant increase in vegetation coverage and activity in the study domain. Finally, it is concluded that the spatial differences observed between the trends of climatic and hydrological droughts show some relationship with the patterns of forest succession observed in recent decades. Our results stress the relevance of land transformation processes on trends in water resources availability, particularly during periods of climatic droughts in which competence between vegetation water consumption and streamflow production is much more relevant.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="327"><div class="sub-heading" data-dcnode-id="339"><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2214581821001609" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="343" id="citing-articles-article3-title"><span data-dcnode-id="344" instrument_node="">Effects of climate and land cover changes on water availability in a Brazilian Cerrado basin</span></h3></a><div class="article-source ellipsis" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">2021, Journal of Hydrology: Regional Studies</span></div></div><div class="buttons" data-dcnode-id="333"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="334" type="button"><span class="button-link-text" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="335" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="336"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="328"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="329" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="330"><p data-dcnode-id="331" id="spar0080"><span data-dcnode-id="332" instrument_node="">The effects of riparian restoration and soil and water conservation practices on catchment hydrology are still unclear. Here, we assess whether a positive change in soil and water conservation practices and riparian reforestation will affect the water availability and boost resilience in a Brazilian Cerrado basin under climate change scenarios. This study was developed in the Três Marias basin (50.600 km²) located in southeastern Brazil. First, we calibrated (1992–2005) and evaluated (2006–2012) the Soil and Water Assessment Tool (SWAT) model. Then, we created a land cover and land use change (LCLUC) scenario that considers improving soil and water conservation practices and the reforestation of riparian zones, following the recommendations of the Brazilian Payment for Ecosystem Services (PES). We also used the trend SSP2-4.5 and the fossil-based economy SSP5-8.5 (Shared Socioeconomic Pathways) climate scenarios data from the Coupled Model Intercomparison Project Phase 6 (CMIP6) project for the period of 2015–2100. Along with a decrease of 5 %–15 % in precipitation in the projected period, an increase of 7 %–15 % in forest areas due to the LCLUC scenarios generated an increase in evapotranspiration values up to 38 %, resulting in a decrease of surface runoff and baseflow. Riparian reforestation and soil and water conservation practices did not necessarily enhance water availability on the simulations performed, as expected by many PES.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="306"><div class="sub-heading" data-dcnode-id="321"><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022169421003905" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="325" id="citing-articles-article4-title"><span data-dcnode-id="326" instrument_node="">Quantitative study on characteristics of hydrological drought in arid area of Northwest China under changing environment</span></h3></a><div class="article-source ellipsis" data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">2021, Journal of Hydrology</span></div></div><div class="buttons" data-dcnode-id="315"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="316" type="button"><span class="button-link-text" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="317" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="318"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="307"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="308" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="309"><p data-dcnode-id="310" id="sp0010"><span data-dcnode-id="314" instrument_node="">Under climate change, drought events have a great impact on different regions of the world. Quantitative evaluation of regional drought characteristics is of great significance for regional drought risk aversion. This study simulates the changes in the historical and future hydrological runoff based on historical observation data, the Community Land Model-Distributed Time Variant Gain Model (CLM-DTVGM), and CMIP5 data. Subsequently, it reveals the historical and future hydrological drought characteristics in the Aksu River Basin under a changing environment. The conclusions are as follows: (1) although both the asynchronous mutated precipitation and runoff in the upper reaches of the Aksu River Basin increased, with a maximum increase of 3.3&nbsp;mm and 1.2 m</span><sup data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">3</span></sup><span data-dcnode-id="311" instrument_node="">/s, the synchronous mutation of precipitation and runoff in the downstream indicated that human activities only affected the runoff in Alaer station; (2) CLM-DTGVM could be well applied in historical and future runoff simulation of the Aksu River basin with complex transformation of different land use under the changing environment; and (3) the seasons of drought development, maximum intensity, and drought termination mainly occurred in winter, followed by spring, summer, and autumn, while human activities had an obvious impact on the drought characteristics in the Aksu River Basin. These findings are of great significance for improving water-saving awareness and warning against drought risk.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="284"><div class="sub-heading" data-dcnode-id="300"><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2214581821000045" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="304" id="citing-articles-article5-title"><span data-dcnode-id="305" instrument_node="">Diverse responses of vegetation to hydroclimate across temporal scales in a humid subtropical region</span></h3></a><div class="article-source ellipsis" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">2021, Journal of Hydrology: Regional Studies</span></div></div><div class="buttons" data-dcnode-id="294"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="295" type="button"><span class="button-link-text" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="296" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="297"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="285"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="286" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="287"><p data-dcnode-id="292" id="spar0055"><span data-dcnode-id="293" instrument_node="">Guangdong Province, South China.</span></p><p data-dcnode-id="290" id="spar0060"><span data-dcnode-id="291" instrument_node="">With evident climate and land use changes, concerns have arisen regarding the challenges for land and water management brought by alterations of the vegetation-hydroclimate relationships. Here we characterized the relationships under contrasting dryness conditions in Guangdong province of China during 2002–2015 based on multiple datasets, with a focus on forests and crops, to identify the controlling roles of water and energy in vegetation growth.</span></p><p data-dcnode-id="288" id="spar0065"><span data-dcnode-id="289" instrument_node="">An increasing trend of annual vegetation and water availability, and diverse seasonal characteristics were revealed in dry and wet years. GPP was higher while NDVI and WUE were lower in dry years than wet years. Intra-annual NDVI and GPP were positively and WUE was negatively related to both water (TWS) and energy (ETp, Ta and Rs) factors. Linear regression shows that the correlation between TWSA and NDVI/GPP was stronger than that between atmospheric factors and NDVI/GPP at the annual scale, while the impact of the atmospheric factors on NDVI/GPP was stronger at the monthly scale. That is, water plays a dominant role in vegetation growth in the long term, while energy is more important in the short term. Different responses of NDVI and GPP to hydroclimate may lie in the GPP estimation algorithms. This study enhances our understanding of plant-water-energy interactions in the humid subtropical environment under contrasting dryness conditions.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84865355652%26md5%3D21cf89c745d2dcc2352169fec027e4c5" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="281" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="282"></path></svg><span class="button-alternative-text" data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0378377412001722"><span class="anchor-text" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="268"><span class="copyright-line" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Copyright © 2012 Elsevier B.V. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="126"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="127"><section class="SpecialIssueArticles" data-dcn
