</span><meta content="Forests play a critical role in the hydrological cycle making the study of water use by trees and forest stands of prime importance in the global chan…" data-dcnode-id="13871" property="og:description"><span data-dcnode-id="13870" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id12&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id13&quot;><p id=&quot;spar0010&quot;>Forests play a critical role in the hydrological cycle making the study of water use by trees and forest stands of prime importance in the global change context .Very negative effects of increasing and more intense droughts on forest vegetation have been described over the last decades. Symptoms of disease and decline have been associated with changed precipitation patterns in many forests particularly in European temperate and Mediterranean regions. Intra- and inter-specific differences in both physiology and morphology exert a large but not well understood influence on the water balance of forest ecosystems, further affecting their vulnerability to drought. Stand structure and composition influences rainfall interception, runoff and water fluxes of the whole ecosystem. Both expanding plantations of renovated interest for biofuel industry and natural and semi-natural forests must be managed in a sustainable way on the basis of their water consumption. We review the role of key drivers on forest water use such as species composition, tree canopy status of each of them and species specific sensitivity to soil water scarcity. Specifically we discuss the role of these factors for natural forest, but with references also to forest plantations. Water scarcity is expected to be one of the largest societal problems worldwide in the near future, so water use by natural and planted forest ecosystems has become a central subject in current research agendas.</p></div></div></div>" data-dcnode-id="13869" lang="en" name="citation_abstract"><span data-dcnode-id="13868" instrument_node="">

 data-dcnode-id="13158" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="13161" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="13162" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="13159"><span data-dcnode-id="13160" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="13148" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="13151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.agwat.2012.06.024" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="13152" instrument_node="">https://doi.org/10.1016/j.agwat.2012.06.024</span></a><a class="rights-and-content" data-dcnode-id="13149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0378377412001722%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="13150" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="13147"></section><section class="ReferencedArticles" data-dcnode-id="13146"></section><div class="PageDivider" data-dcnode-id="13145"></div><div class="Abstracts u-font-serif" data-dcnode-id="13132" id="abstracts"><div class="abstract author" data-dcnode-id="13139" id="aep-abstract-id12"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="13143"><span data-dcnode-id="13144" instrument_node="">Abstract</span></h2><div data-dcnode-id="13140" id="aep-abstract-sec-id13"><p data-dcnode-id="13141" id="spar0010"><span data-dcnode-id="13142" instrument_node="">Forests play a critical role in the hydrological cycle making the study of water use by trees and forest stands of prime importance in the global change context .Very negative effects of increasing and more intense droughts on forest vegetation have been described over the last decades. Symptoms of disease and decline have been associated with changed precipitation patterns in many forests particularly in European temperate and Mediterranean regions. Intra- and inter-specific differences in both physiology and morphology exert a large but not well understood influence on the water balance of forest ecosystems, further affecting their vulnerability to drought. Stand structure and composition influences rainfall interception, runoff and water fluxes of the whole ecosystem. Both expanding plantations of renovated interest for biofuel industry and natural and semi-natural forests must be managed in a sustainable way on the basis of their water consumption. We review the role of key drivers on forest water use such as species composition, tree canopy status of each of them and species specific sensitivity to soil water scarcity. Specifically we discuss the role of these factors for natural forest, but with references also to forest plantations. Water scarcity is expected to be one of the largest societal problems worldwide in the near future, so water use by natural and planted forest ecosystems has become a central subject in current research agendas.</span></p></div></div><div class="abstract graphical" data-dcnode-id="13133" id="aep-abstract-id10"><div data-dcnode-id="13134" id="aep-abstract-sec-id11"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="13137"><span data-dcnode-id="13138" instrument_node="">Highlights</span></h3><p data-dcnode-id="13135" id="spar0005"><span data-dcnode-id="13136" instrument_node="">► Main mechanisms that influence water use by forest tree species. ► Relevance of tree size and age, along with forest stand characteristics, in conditioning water use. ► Impact of different silvicultural practices and forest management on the water resource.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="13109" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="13121"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="13122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0378377412001746"><svg class="icon icon-navigate-left" data-dcnode-id="13130" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="13131"></path></svg><span class="button-alternative-text" data-dcnode-id="13123"><strong data-dcnode-id="13128"><span data-dcnode-id="13129" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="13126"><span data-dcnode-id="13127" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="13124"><span data-dcnode-id="13125" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="13110"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="13111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0378377412001904"><span class="button-alternative-text" data-dcnode-id="13114"><strong data-dcnode-id="13119"><span data-dcnode-id="13120" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="13117"><span data-dcnode-id="13118" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="13115"><span data-dcnode-id="13116" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="13112" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="13113"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="13093"><div class="keywords-section" data-dcnode-id="13094" id="aep-keywords-id14"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="13107"><span data-dcnode-id="13108" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="13104"><span data-dcnode-id="13105"><span data-dcnode-id="13106" instrument_node="">Sap flow</span></span></div><div class="keyword" data-dcnode-id="13101"><span data-dcnode-id="13102"><span data-dcnode-id="13103" instrument_node="">Forest management</span></span></div><div class="keyword" data-dcnode-id="13098"><span data-dcnode-id="13099"><span data-dcnode-id="13100" instrument_node="">Stomatal conductance</span></span></div><div class="keyword" data-dcnode-id="13095"><span data-dcnode-id="13096"><span data-dcnode-id="13097" instrument_node="">Water stress</span></span></div></div></div><span data-dcnode-id="13092" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="11670" id="body"><div data-dcnode-id="11688"><section data-dcnode-id="12985" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="13086"><span data-dcnode-id="13091" instrument_node="">1</span><span data-dcnode-id="13089" instrument_node="">. </span><span data-dcnode-id="13087" instrument_node="">Introduction</span></h2><p data-dcnode-id="13078" id="par0005"><span data-dcnode-id="13085" instrument_node="">Forest lands cover wide areas in the world, being one of the main actors in the global hydrological cycle. Trees, the key individual component of forests, have distinct characteristics, such as secondary growth and long lifespan, that differentiate them from other kinds of plants such as annual weeds or crops in terms of water use and must be considered for management purposes. The idiosyncratic characteristics of forest trees impact upon the water economy at the ecosystem level depending on the composition and structure of the particular forest community (</span><a class="workspace-trigger" data-dcnode-id="13083" href="#bib0030" name="bbib0030"><span data-dcnode-id="13084" instrument_node="">Asbjornsen et al., 2011</span></a><span data-dcnode-id="13082" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13080" href="#bib0165" name="bbib0165"><span data-dcnode-id="13081" instrument_node="">Dierick and Holscher, 2009</span></a><span data-dcnode-id="13079" instrument_node="">).</span></p><p data-dcnode-id="13058" id="par0010"><span data-dcnode-id="13077" instrument_node="">Water use by trees is controlled basically at the interphase leaf–atmosphere by a strict regulation of leaf stomatal conductance to water vapour. This role of stomatal performance in regulating the flux of water through the soil–plant continuum is common to most plants. Unlike herbaceous species, however, forest tree species must attain not only hydration of aboveground organs, but also functionality of the hydraulic system assuring the continuity of the water column from soil to leaves (</span><a class="workspace-trigger" data-dcnode-id="13075" href="#bib0495" name="bbib0495"><span data-dcnode-id="13076" instrument_node="">Meinzer et al., 2009</span></a><span data-dcnode-id="13074" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13072" href="#bib0650" name="bbib0650"><span data-dcnode-id="13073" instrument_node="">Salleo et al., 2000</span></a><span data-dcnode-id="13071" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13069" href="#bib0720" name="bbib0720"><span data-dcnode-id="13070" instrument_node="">Tyree and Sperry, 1988</span></a><span data-dcnode-id="13068" instrument_node="">). The interplay between stomatal control of water losses and maintenance of function in the hydraulic pathway has important consequences for the development of different strategies. Tree species range in its performance from isohydric to anisohydric strategies depending on whether they prioritize under dry conditions hydraulic safety or gas exchange respectively (</span><a class="workspace-trigger" data-dcnode-id="13066" href="#bib0200" name="bbib0200"><span data-dcnode-id="13067" instrument_node="">Franks et al., 2007</span></a><span data-dcnode-id="13065" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13063" href="#bib0700" name="bbib0700"><span data-dcnode-id="13064" instrument_node="">Tardieu and Simonneau, 1998</span></a><span data-dcnode-id="13062" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13060" href="#bib0360" name="bbib0360"><span data-dcnode-id="13061" instrument_node="">Kumagai and Porporato, 2012</span></a><span data-dcnode-id="13059" instrument_node="">).</span></p><p data-dcnode-id="13038" id="par0015"><span data-dcnode-id="13057" instrument_node="">However, water use by forest tree species goes beyond the specific differentiation in terms of sensitivity to environmental factors. Forest communities attain a functional and structural complexity that contributes to emergent properties at different scales. Thus, water is not only managed according to the species-specific response to factors such as water in soil and atmosphere or radiation inputs into the forest ecosystem. Dominance and hierarchical position of individual trees in the stand (</span><a class="workspace-trigger" data-dcnode-id="13055" href="#bib0445" name="bbib0445"><span data-dcnode-id="13056" instrument_node="">Martin et al., 1997</span></a><span data-dcnode-id="13054" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13052" href="#bib0240" name="bbib0240"><span data-dcnode-id="13053" instrument_node="">Granier et al., 2000</span></a><span data-dcnode-id="13051" instrument_node="">), and other elements such as the coupling to atmospheric conditions of the different tree crowns within the functional unity of the canopy, play important roles in the final water budget of the ecosystem (</span><a class="workspace-trigger" data-dcnode-id="13049" href="#bib0290" name="bbib0290"><span data-dcnode-id="13050" instrument_node="">Jarvis and McNaughton, 1986</span></a><span data-dcnode-id="13048" instrument_node="">). The proper structure of the stand in terms of stratification on different size and age classes (</span><a class="workspace-trigger" data-dcnode-id="13046" href="#bib0445" name="bbib0445"><span data-dcnode-id="13047" instrument_node="">Martin et al., 1997</span></a><span data-dcnode-id="13045" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13043" href="#bib0155" name="bbib0155"><span data-dcnode-id="13044" instrument_node="">Delzon and Loustau, 2005</span></a><span data-dcnode-id="13042" instrument_node="">) and the origin of individuals (e.g., seed-origin vs. resprouts from coppice), are elements that modulate the amount and type of water used by forests (</span><a class="workspace-trigger" data-dcnode-id="13040" href="#bib0030" name="bbib0030"><span data-dcnode-id="13041" instrument_node="">Asbjornsen et al., 2011</span></a><span data-dcnode-id="13039" instrument_node="">).</span></p><p data-dcnode-id="12991" id="par0020"><span data-dcnode-id="13037" instrument_node="">Forest vegetation has been seen to be quite vulnerable to the negative effects of climate change, particularly in terms of increasing intensity and recurrence of dry periods (IPCC 2007). The negative effect of increasing dry periods will be reinforced by a parallel increase in temperature, further magnifying the effects of drought. Consequences of water stress are especially relevant for broad-leaved temperate species not well adapted to droughts, as was notorious after the heat wave of 2003 that affected wide forest areas in Central Europe (</span><a class="workspace-trigger" data-dcnode-id="13035" href="#bib0410" name="bbib0410"><span data-dcnode-id="13036" instrument_node="">Leuzinger et al., 2005</span></a><span data-dcnode-id="13034" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13032" href="#bib0070" name="bbib0070"><span data-dcnode-id="13033" instrument_node="">Bréda et al., 2006</span></a><span data-dcnode-id="13031" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13029" href="#bib0220" name="bbib0220"><span data-dcnode-id="13030" instrument_node="">Geßler et al., 2007</span></a><span data-dcnode-id="13028" instrument_node="">). The presence of extreme dry periods might be common worldwide in the future, impacting very negatively the sustainability and productivity of forests already threat by drought such as those at the rear edge of their geographical distribution; this has been well documented for some areas of the Mediterranean Basin (</span><a class="workspace-trigger" data-dcnode-id="13026" href="#bib0305" name="bbib0305"><span data-dcnode-id="13027" instrument_node="">Jump et al., 2006</span></a><span data-dcnode-id="13025" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13023" href="#bib0420" name="bbib0420"><span data-dcnode-id="13024" instrument_node="">Linares et al., 2010</span></a><span data-dcnode-id="13022" instrument_node="">). The capacity of forest trees to cope with dry periods is conditioned by the many factors linked to the species specific use of water (</span><a class="workspace-trigger" data-dcnode-id="13020" href="#bib0555" name="bbib0555"><span data-dcnode-id="13021" instrument_node="">Oren et al., 1999a</span></a><span data-dcnode-id="13019" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13017" href="#bib0560" name="bbib0560"><span data-dcnode-id="13018" instrument_node="">Oren et al., 1999b</span></a><span data-dcnode-id="13016" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13014" href="#bib0440" name="bbib0440"><span data-dcnode-id="13015" instrument_node="">Martínez-Vilalta et al., 2003</span></a><span data-dcnode-id="13013" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13011" href="#bib0410" name="bbib0410"><span data-dcnode-id="13012" instrument_node="">Leuzinger et al., 2005</span></a><span data-dcnode-id="13010" instrument_node="">), and to the structure of the forests in terms of size and age classes, and tree density (</span><a class="workspace-trigger" data-dcnode-id="13008" href="#bib0245" name="bbib0245"><span data-dcnode-id="13009" instrument_node="">Granier and Bréda, 1996</span></a><span data-dcnode-id="13007" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13005" href="#bib0240" name="bbib0240"><span data-dcnode-id="13006" instrument_node="">Granier et al., 2000</span></a><span data-dcnode-id="13004" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="13002" href="#bib0515" name="bbib0515"><span data-dcnode-id="13003" instrument_node="">Moreno and Cubera, 2008</span></a><span data-dcnode-id="13001" instrument_node="">). All these factors can be controlled and considered in the adaptive forest management since they have a direct effect on the water budget of trees remaining after intervention in forest stands (</span><a class="workspace-trigger" data-dcnode-id="12999" href="#bib0065" name="bbib0065"><span data-dcnode-id="13000" instrument_node="">Bréda et al., 1995</span></a><span data-dcnode-id="12998" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12996" href="#bib0060" name="bbib0060"><span data-dcnode-id="12997" instrument_node="">Bladon et al., 2006</span></a><span data-dcnode-id="12995" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12993" href="#bib0250" name="bbib0250"><span data-dcnode-id="12994" instrument_node="">Gyenge et al., 2011</span></a><span data-dcnode-id="12992" instrument_node="">). Water use has not been considered a target in many afforestation programs, which are typically more centred in either increasing productivity or optimizing forests as carbon sinks. The expected increase in the importance of water as a limiting factor for the future of many forests supports its inclusion as a priority in the planning of new forest systems. However, gaps in knowledge may prevent an effective inclusion of water as a management priority in many cases.</span></p><p data-dcnode-id="12986" id="par0025"><span data-dcnode-id="12990" instrument_node="">We carry out an overview of some of the main factors influencing water use by forest ecosystems, from basic functional mechanisms involved in the regulation of the water use by trees to changes in the land use. Though, we acknowledge previous reviews that have dealt with specific key issues in relation to water use by trees (i.e. see </span><a class="workspace-trigger" data-dcnode-id="12988" href="#bib0070" name="bbib0070"><span data-dcnode-id="12989" instrument_node="">Bréda et al., 2006</span></a><span data-dcnode-id="12987" instrument_node="">) to build upon them, and to identify important gaps and challenges for future research.</span></p></section><section data-dcnode-id="12043" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="12979"><span data-dcnode-id="12984" instrument_node="">2</span><span data-dcnode-id="12982" instrument_node="">. </span><span data-dcnode-id="12980" instrument_node="">Importance of species specific physiological mechanisms</span></h2><section data-dcnode-id="12782" id="sec0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="12973"><span data-dcnode-id="12978" instrument_node="">2.1</span><span data-dcnode-id="12976" instrument_node="">. </span><span data-dcnode-id="12974" instrument_node="">Physiological control of water use by forest tree species</span></h3><div data-dcnode-id="12904"><p data-dcnode-id="12945" id="par0030"><span data-dcnode-id="12972" instrument_node="">The need of controlling water losses by a fine tuning of leaf stomatal regulation has been, as in other kind of plants, one of the most important selective forces of evolution of forest tree species (</span><a class="workspace-trigger" data-dcnode-id="12970" href="#bib0195" name="bbib0195"><span data-dcnode-id="12971" instrument_node="">Franks and Beerling, 2009</span></a><span data-dcnode-id="12969" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12967" href="#bib0400" name="bbib0400"><span data-dcnode-id="12968" instrument_node="">Lawson et al., 2011</span></a><span data-dcnode-id="12966" instrument_node="">). Probably, stomatal conductance is one the most relevant and complex plant physiological processes, acting during plant evolution as a crossroad in the interplay between carbon fixation and water loss. Daily and seasonal response of leaf stomatal conductance to water vapour (</span><em data-dcnode-id="12964"><span data-dcnode-id="12965" instrument_node="">g</span></em><sub data-dcnode-id="12962"><span data-dcnode-id="12963" instrument_node="">wv</span></sub><span data-dcnode-id="12961" instrument_node="">) establishes clear differences between forest tree species coexisting at a given site (</span><a class="workspace-trigger" data-dcnode-id="12959" href="#fig0005" name="bfig0005"><span data-dcnode-id="12960" instrument_node="">Fig. 1</span></a><span data-dcnode-id="12958" instrument_node="">). The response is highly variable according to the differential species sensitivity to climatic events such as drought (</span><a class="workspace-trigger" data-dcnode-id="12956" href="#bib0015" name="bbib0015"><span data-dcnode-id="12957" instrument_node="">Aranda et al., 2000</span></a><span data-dcnode-id="12955" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12953" href="#bib0460" name="bbib0460"><span data-dcnode-id="12954" instrument_node="">Mediavilla and Escudero, 2003</span></a><span data-dcnode-id="12952" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12950" href="#bib0705" name="bbib0705"><span data-dcnode-id="12951" instrument_node="">Tenhunen et al., 1990</span></a><span data-dcnode-id="12949" instrument_node="">), or atmospheric factors such as evaporative demand (</span><a class="workspace-trigger" data-dcnode-id="12947" href="#bib0060" name="bbib0060"><span data-dcnode-id="12948" instrument_node="">Bladon et al., 2006</span></a><span data-dcnode-id="12946" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="12905" id="fig0005"><span data-dcnode-id="12935"><img alt="" data-dcnode-id="12944" height="535" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378377412001722-gr1.jpg&amp;raw"><span data-dcnode-id="12943" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="12936"><li data-dcnode-id="12937"><a class="anchor download-link u-font-sans" data-dcnode-id="12938" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378377412001722-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="12939"><span data-dcnode-id="12942" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="12940"><span data-dcnode-id="12941" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="12906"><span data-dcnode-id="12907"><p data-dcnode-id="12908" id="spar0015"><span class="label" data-dcnode-id="12933"><span data-dcnode-id="12934" instrument_node="">Fig. 1</span></span><span data-dcnode-id="12932" instrument_node="">. </span><span data-dcnode-id="12930" instrument_node="">Seasonal evolution in daily leaf stomatal conductance to water vapour (</span><em data-dcnode-id="12928"><span data-dcnode-id="12929" instrument_node="">g</span></em><sub data-dcnode-id="12926"><span data-dcnode-id="12927" instrument_node="">wv</span></sub><span data-dcnode-id="12925" instrument_node="">) for sun leaves at the top canopy in a mixed stand of beech (</span><em data-dcnode-id="12923"><span data-dcnode-id="12924" instrument_node="">F. sylvatica</span></em><span data-dcnode-id="12922" instrument_node="">) and sessile oak (</span><em data-dcnode-id="12920"><span data-dcnode-id="12921" instrument_node="">Q. petraea</span></em><span data-dcnode-id="12919" instrument_node="">) at the southern area distribution of both species in Europe. There was a progressive increase in drought intensity that peaked by the middle of September. Beech shows a progressive decrease in maximum daily </span><em data-dcnode-id="12917"><span data-dcnode-id="12918" instrument_node="">g</span></em><sub data-dcnode-id="12915"><span data-dcnode-id="12916" instrument_node="">wv</span></sub><span data-dcnode-id="12914" instrument_node=""> that tends also to be earlier in the morning as drought intensifies. In the other hand, sessile oak showed a typical dome shaped daily evolution of </span><em data-dcnode-id="12912"><span data-dcnode-id="12913" instrument_node="">g</span></em><sub data-dcnode-id="12910"><span data-dcnode-id="12911" instrument_node="">wv</span></sub><span data-dcnode-id="12909" instrument_node="">, even for the most stressful dates when differences were maxima between both species. Data are for year 2000 at the beech-oak forest of Montejo de la Sierra (I. Aranda unpublished original data).</span></p></span></span></figure></div><p data-dcnode-id="12783" id="par0035"><span data-dcnode-id="12903" instrument_node="">The need to maintain functionality of hydraulic system through long living periods is probably one of the most singular and particular characteristics of forest tree species with regard to other plant groups. In this respect, the relationship between the response of leaf stomatal conductance, and the functionality of the hydraulic pathway through water movements within the tree, has emerged in the last decades as one of the most important points in the understanding of water use by trees (</span><a class="workspace-trigger" data-dcnode-id="12901" href="#bib0310" name="bbib0310"><span data-dcnode-id="12902" instrument_node="">Johnson et al., 2011</span></a><span data-dcnode-id="12900" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12898" href="#bib0495" name="bbib0495"><span data-dcnode-id="12899" instrument_node="">Meinzer et al., 2009</span></a><span data-dcnode-id="12897" instrument_node="">). Like other plants, stomatal regulation in trees must allow conservation of hydration of aboveground tissues. Stomatal performance also operates, in the specific case of forest tree species, maintaining the hydraulic system functionality within margins of security from catastrophic dysfunction (</span><a class="workspace-trigger" data-dcnode-id="12895" href="#bib0080" name="bbib0080"><span data-dcnode-id="12896" instrument_node="">Brodribb and Cochard, 2009</span></a><span data-dcnode-id="12894" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12892" href="#bib0725" name="bbib0725"><span data-dcnode-id="12893" instrument_node="">Tyree and Sperry, 1989</span></a><span data-dcnode-id="12891" instrument_node="">). There are numerous examples where the stomata closure, as drought intensify, runs in parallel with a decrease of the hydraulic efficiency into the water pathway of trees. Thus, it is common to observe a decrease in the leaf stomatal conductance to water vapour coupled to the loss of efficiency in the hydraulic system at different points in the continuum soil–tree–atmosphere. For instances, </span><a class="workspace-trigger" data-dcnode-id="12889" href="#bib0020" name="bbib0020"><span data-dcnode-id="12890" instrument_node="">Aranda et al. (2005)</span></a><span data-dcnode-id="12888" instrument_node=""> observed a seasonal decrease in </span><em data-dcnode-id="12886"><span data-dcnode-id="12887" instrument_node="">g</span></em><sub data-dcnode-id="12884"><span data-dcnode-id="12885" instrument_node="">wv</span></sub><span data-dcnode-id="12883" instrument_node=""> of beech leaves at the top of the canopy as dry intensified at the end of summer (</span><a class="workspace-trigger" data-dcnode-id="12881" href="#fig0005" name="bfig0005"><span data-dcnode-id="12882" instrument_node="">Fig. 1</span></a><span data-dcnode-id="12880" instrument_node="">). It was followed by a parallel drop of hydraulic efficiency in the continuum soil–plant–atmosphere, arriving almost to a 50% when comparing the beginning of summer with the peak of drought. Similar results are frequently signed for most forest tree species, and points out to the complex interplay between maintenance of the water supply to leaves and the risk of hydraulic failure from tensions developed within the xylem (</span><a class="workspace-trigger" data-dcnode-id="12878" href="#bib0495" name="bbib0495"><span data-dcnode-id="12879" instrument_node="">Meinzer et al., 2009</span></a><span data-dcnode-id="12877" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12875" href="#bib0650" name="bbib0650"><span data-dcnode-id="12876" instrument_node="">Salleo et al., 2000</span></a><span data-dcnode-id="12874" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12872" href="#bib0720" name="bbib0720"><span data-dcnode-id="12873" instrument_node="">Tyree and Sperry, 1988</span></a><span data-dcnode-id="12871" instrument_node="">). Under extreme droughts, the hydraulic failure can make trees to sacrifice branches and show symptoms of crown die-back (</span><a class="workspace-trigger" data-dcnode-id="12869" href="#bib0615" name="bbib0615"><span data-dcnode-id="12870" instrument_node="">Rood et al., 2000</span></a><span data-dcnode-id="12868" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12866" href="#bib0685" name="bbib0685"><span data-dcnode-id="12867" instrument_node="">Sperry et al., 1998</span></a><span data-dcnode-id="12865" instrument_node="">). This particular characteristic of the water conducting system has fostered the development of very different hydraulic designs in the evolution of woody plants, rendering not only very different xylem anatomies, but also different leaf hydraulic designs (</span><a class="workspace-trigger" data-dcnode-id="12863" href="#bib0085" name="bbib0085"><span data-dcnode-id="12864" instrument_node="">Brodribb and Holbrook, 2006</span></a><span data-dcnode-id="12862" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12860" href="#bib0635" name="bbib0635"><span data-dcnode-id="12861" instrument_node="">Sack and Holbrook, 2006</span></a><span data-dcnode-id="12859" instrument_node="">). Furthermore, hydraulic function has been underscored and is now claimed, together with the maintenance of a positive carbon balance, as the basis to understand the success of woody plants during acute water stress periods (</span><a class="workspace-trigger" data-dcnode-id="12857" href="#bib0075" name="bbib0075"><span data-dcnode-id="12858" instrument_node="">Breshears et al., 2009</span></a><span data-dcnode-id="12856" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12854" href="#bib0505" name="bbib0505"><span data-dcnode-id="12855" instrument_node="">McDowell, 2011</span></a><span data-dcnode-id="12853" instrument_node="">). In this respect, functioning of the hydraulic system is directly connected to the capacity of maintaining a positive carbon balance (</span><a class="workspace-trigger" data-dcnode-id="12851" href="#bib0500" name="bbib0500"><span data-dcnode-id="12852" instrument_node="">McDowell et al., 2008</span></a><span data-dcnode-id="12850" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12848" href="#bib0765" name="bbib0765"><span data-dcnode-id="12849" instrument_node="">Woodruff and Meinzer, 2011</span></a><span data-dcnode-id="12847" instrument_node="">). However, the matter is under debate, at least with regard to the role played by starvation of stored non-structural C compounds for tree survival (</span><a class="workspace-trigger" data-dcnode-id="12845" href="#bib0070" name="bbib0070"><span data-dcnode-id="12846" instrument_node="">Bréda et al., 2006</span></a><span data-dcnode-id="12844" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12842" href="#bib0645" name="bbib0645"><span data-dcnode-id="12843" instrument_node="">Sala et al., 2010</span></a><span data-dcnode-id="12841" instrument_node="">). The expected depletion of carbon balance with water stress is not always in accordance with empirical data (</span><a class="workspace-trigger" data-dcnode-id="12839" href="#bib0340" name="bbib0340"><span data-dcnode-id="12840" instrument_node="">Körner, 2003</span></a><span data-dcnode-id="12838" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12836" href="#bib0735" name="bbib0735"><span data-dcnode-id="12837" instrument_node="">Villar-Salvador et al., 2004</span></a><span data-dcnode-id="12835" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12833" href="#bib0755" name="bbib0755"><span data-dcnode-id="12834" instrument_node="">William et al., 2012</span></a><span data-dcnode-id="12832" instrument_node="">). Endogenous tree factors such as age (</span><a class="workspace-trigger" data-dcnode-id="12830" href="#bib0225" name="bbib0225"><span data-dcnode-id="12831" instrument_node="">Genet et al., 2010</span></a><span data-dcnode-id="12829" instrument_node="">), height (</span><a class="workspace-trigger" data-dcnode-id="12827" href="#bib0765" name="bbib0765"><span data-dcnode-id="12828" instrument_node="">Woodruff and Meinzer, 2011</span></a><span data-dcnode-id="12826" instrument_node="">), sensitivity of species to water stress (</span><a class="workspace-trigger" data-dcnode-id="12824" href="#bib0710" name="bbib0710"><span data-dcnode-id="12825" instrument_node="">Tissue and Wright, 1995</span></a><span data-dcnode-id="12823" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12821" href="#bib0390" name="bbib0390"><span data-dcnode-id="12822" instrument_node="">Latt et al., 2001</span></a><span data-dcnode-id="12820" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12818" href="#bib0600" name="bbib0600"><span data-dcnode-id="12819" instrument_node="">Piper and Fajardo, 2011</span></a><span data-dcnode-id="12817" instrument_node="">) and seasonal coupling between supply and demand of carbon for growth (</span><a class="workspace-trigger" data-dcnode-id="12815" href="#bib0740" name="bbib0740"><span data-dcnode-id="12816" instrument_node="">Walter et al., 2005</span></a><span data-dcnode-id="12814" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12812" href="#bib0680" name="bbib0680"><span data-dcnode-id="12813" instrument_node="">Smith and Stitt, 2007</span></a><span data-dcnode-id="12811" instrument_node="">), are all factors modulating the final carbon balance of tree and their capacity to cope with extreme dry events in the long term (see </span><a class="workspace-trigger" data-dcnode-id="12809" href="#bib0820" name="bbib0820"><span data-dcnode-id="12810" instrument_node="">Sala et al., 2012</span></a><span data-dcnode-id="12808" instrument_node=""> for a recent review on the matter). Finally, whichever the direct physiological mechanisms implied in the weakening and final death of trees, either maintenance of the functionality of tree hydraulic system or starvation by depletion of carbon reserves, they represent the mechanistic basis underpinning the recently observed decline of forest tree species under water stress conditions worldwide (</span><a class="workspace-trigger" data-dcnode-id="12806" href="#bib0500" name="bbib0500"><span data-dcnode-id="12807" instrument_node="">McDowell et al., 2008</span></a><span data-dcnode-id="12805" instrument_node="">, though see </span><a class="workspace-trigger" data-dcnode-id="12803" href="#bib0640" name="bbib0640"><span data-dcnode-id="12804" instrument_node="">Sala and Hoch, 2009</span></a><span data-dcnode-id="12802" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12800" href="#bib0645" name="bbib0645"><span data-dcnode-id="12801" instrument_node="">Sala et al., 2010</span></a><span data-dcnode-id="12799" instrument_node="">). This issue is of great relevance as forest die-back in same cases (</span><a class="workspace-trigger" data-dcnode-id="12797" href="#bib0115" name="bbib0115"><span data-dcnode-id="12798" instrument_node="">Carnicer et al., 2011</span></a><span data-dcnode-id="12796" instrument_node="">), or even important phenomena of mortality (</span><a class="workspace-trigger" data-dcnode-id="12794" href="#bib0420" name="bbib0420"><span data-dcnode-id="12795" instrument_node="">Linares et al., 2010</span></a><span data-dcnode-id="12793" instrument_node="">) seem to have accelerated and aggravated in the last decades (</span><a class="workspace-trigger" data-dcnode-id="12791" href="#bib0075" name="bbib0075"><span data-dcnode-id="12792" instrument_node="">Breshears et al., 2009</span></a><span data-dcnode-id="12790" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12788" href="#bib0010" name="bbib0010"><span data-dcnode-id="12789" instrument_node="">Allen et al., 2010</span></a><span data-dcnode-id="12787" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12785" href="#bib0425" name="bbib0425"><span data-dcnode-id="12786" instrument_node="">Linares et al., 2011</span></a><span data-dcnode-id="12784" instrument_node="">). Whichever the ultimate mechanistic basis, it seems clear for trees hydraulic failure and impairment of an optimum carbon balance are both elements impacting the capacity to cope with acute drought events in the long term.</span></p></section><section data-dcnode-id="12204" id="sec0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="12776"><span data-dcnode-id="12781" instrument_node="">2.2</span><span data-dcnode-id="12779" instrument_node="">. </span><span data-dcnode-id="12777" instrument_node="">Integration of water use mechanisms at the tree and canopy levels</span></h3><p data-dcnode-id="12757" id="par0040"><span data-dcnode-id="12775" instrument_node="">It should be noted that despite the large amount of information available, there is no current, successful mechanistic model accounting for the physiological basis and integrating the complex stomatal conductance performance in response to a multiplicity of endogenous and exogenous factors (</span><a class="workspace-trigger" data-dcnode-id="12773" href="#bib0200" name="bbib0200"><span data-dcnode-id="12774" instrument_node="">Franks et al., 2007</span></a><span data-dcnode-id="12772" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12770" href="#bib0815" name="bbib0815"><span data-dcnode-id="12771" instrument_node="">Mott and Peak, 2010</span></a><span data-dcnode-id="12769" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12767" href="#bib0520" name="bbib0520"><span data-dcnode-id="12768" instrument_node="">Mott and Peak, 2011</span></a><span data-dcnode-id="12766" instrument_node="">). Nonetheless, main environmental drivers, namely, soil moisture, air humidity and radiation, have been recognized historically as key factors eliciting different daily and seasonal patterns observed for </span><em data-dcnode-id="12764"><span data-dcnode-id="12765" instrument_node="">g</span></em><sub data-dcnode-id="12762"><span data-dcnode-id="12763" instrument_node="">wv</span></sub><span data-dcnode-id="12761" instrument_node=""> within tree crowns and canopies (</span><a class="workspace-trigger" data-dcnode-id="12759" href="#bib0290" name="bbib0290"><span data-dcnode-id="12760" instrument_node="">Jarvis and McNaughton, 1986</span></a><span data-dcnode-id="12758" instrument_node="">).</span></p><div data-dcnode-id="12380"><p data-dcnode-id="12695" id="par0045"><span data-dcnode-id="12756" instrument_node="">The physiological functioning of leaves in the regulation of water losses is coupled to the physical control imposed by leaf size and form. Morphology of leaves conditions the leaf boundary layer resistance to water diffusion (</span><a class="workspace-trigger" data-dcnode-id="12754" href="#bib0210" name="bbib0210"><span data-dcnode-id="12755" instrument_node="">Gates, 1968</span></a><span data-dcnode-id="12753" instrument_node="">). Smaller leaves of trees would be adaptive under warmer environments preventing leaf heating over harmful temperatures. Thus, recent reports highlight also its impact on the transpiration consumption at the individual tree level (</span><a class="workspace-trigger" data-dcnode-id="12751" href="#bib0045" name="bbib0045"><span data-dcnode-id="12752" instrument_node="">Bauerle and Bowden, 2011</span></a><span data-dcnode-id="12750" instrument_node="">). Thought importance of the leaf boundary layer at the ecosystem level relies in the consideration of canopies as aggregate of leaves (</span><a class="workspace-trigger" data-dcnode-id="12748" href="#bib0290" name="bbib0290"><span data-dcnode-id="12749" instrument_node="">Jarvis and McNaughton, 1986</span></a><span data-dcnode-id="12747" instrument_node="">). In this respect, the aggregation of the performance of different leaves into the crown in a unique functional unit, the canopy, results in the highest level of integration for transpiration, and where forest stand is viewed on the perspective of a big leaf (</span><a class="workspace-trigger" data-dcnode-id="12745" href="#bib0455" name="bbib0455"><span data-dcnode-id="12746" instrument_node="">McNaughton and Jarvis, 1984</span></a><span data-dcnode-id="12744" instrument_node="">). Although the overall flux of water through the continuum soil–tree–atmosphere is a very complex process, there are two main physical drivers exerting a control on the rates of water losses at the canopy scale under wet conditions, the physiological control and the boundary layer control over the canopy. Both impact the degree of coupling of tree canopy to the atmosphere (</span><a class="workspace-trigger" data-dcnode-id="12742" href="#bib0780" name="bbib0780"><span data-dcnode-id="12743" instrument_node="">Wullschleger et al., 2000</span></a><span data-dcnode-id="12741" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12739" href="#bib0250" name="bbib0250"><span data-dcnode-id="12740" instrument_node="">Gyenge et al., 2011</span></a><span data-dcnode-id="12738" instrument_node="">), and in particular to the two principal factors influencing evapotranspiration, the vapour pressure deficit surrounding vegetation and the incoming net radiation. After the inversion of the Penman–Monteith equation, and considering the flux of water into trees as water transpired, it is possible to estimate a physiological and aerodynamic canopy conductance to water vapour. Canopies integrate different structural and functional properties of individual leaves, but they do not result from the summing of those from individual leaves. The coupling to environmental factors of the aerodynamic and physiological conductance of canopy as a functional unity follows similar biophysical rules to those emerging from individual leaves (</span><a class="workspace-trigger" data-dcnode-id="12736" href="#bib0290" name="bbib0290"><span data-dcnode-id="12737" instrument_node="">Jarvis and McNaughton, 1986</span></a><span data-dcnode-id="12735" instrument_node="">). The coupling to the atmosphere is modulated daily from wind velocity, incoming radiation and VPD (</span><a class="workspace-trigger" data-dcnode-id="12733" href="#bib0780" name="bbib0780"><span data-dcnode-id="12734" instrument_node="">Wullschleger et al., 2000</span></a><span data-dcnode-id="12732" instrument_node="">), and seasonally from a high influence of the water deficit endured by trees (</span><a class="workspace-trigger" data-dcnode-id="12730" href="#bib0240" name="bbib0240"><span data-dcnode-id="12731" instrument_node="">Granier et al., 2000</span></a><span data-dcnode-id="12729" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12727" href="#bib0365" name="bbib0365"><span data-dcnode-id="12728" instrument_node="">Kumagai et al., 2004</span></a><span data-dcnode-id="12726" instrument_node="">). In this regard, the increase of canopy physiological conductance sensitivity to air water vapour deficit, as drought progresses, would be an effective manner to avoid the hydraulic failure in the soil–leaf–air pathway. Surface roughness of most forest canopies increase the degree of coupling to atmospheric conditions, and decrease the importance that aerodynamic conductance may play in controlling the overall water flux from vegetation to atmosphere (</span><a class="workspace-trigger" data-dcnode-id="12724" href="#bib0290" name="bbib0290"><span data-dcnode-id="12725" instrument_node="">Jarvis and McNaughton, 1986</span></a><span data-dcnode-id="12723" instrument_node="">). This is a fundamental difference of forest tree covers, mostly in temperate and Mediterranean areas, when compared to the smoothness of plant surfaces in grasslands or crops cultivars. However, even considering forest tree species as a group, there are important differences between conifers and temperate broad-leaved or tropical species (</span><a class="workspace-trigger" data-dcnode-id="12721" href="#bib0450" name="bbib0450"><span data-dcnode-id="12722" instrument_node="">Martyn et al., 1998</span></a><span data-dcnode-id="12720" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12718" href="#bib0490" name="bbib0490"><span data-dcnode-id="12719" instrument_node="">Meinzer et al., 1993</span></a><span data-dcnode-id="12717" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12715" href="#bib0470" name="bbib0470"><span data-dcnode-id="12716" instrument_node="">Meinzer et al., 1997</span></a><span data-dcnode-id="12714" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12712" href="#bib0365" name="bbib0365"><span data-dcnode-id="12713" instrument_node="">Kumagai et al., 2004</span></a><span data-dcnode-id="12711" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12709" href="#bib0780" name="bbib0780"><span data-dcnode-id="12710" instrument_node="">Wullschleger et al., 2000</span></a><span data-dcnode-id="12708" instrument_node="">), and even between different species within the same functional group (</span><a class="workspace-trigger" data-dcnode-id="12706" href="#bib0415" name="bbib0415"><span data-dcnode-id="12707" instrument_node="">Leuzinger and Körner, 2007</span></a><span data-dcnode-id="12705" instrument_node="">). Temperate broad-leaved forest tree species seems to be slightly decoupled from atmosphere (</span><a class="workspace-trigger" data-dcnode-id="12703" href="#tbl0005" name="btbl0005"><span data-dcnode-id="12704" instrument_node="">Table 1</span></a><span data-dcnode-id="12702" instrument_node="">, and see </span><a class="workspace-trigger" data-dcnode-id="12700" href="#tbl0010" name="btbl0010"><span data-dcnode-id="12701" instrument_node="">Table 2</span></a><span data-dcnode-id="12699" instrument_node=""> in </span><a class="workspace-trigger" data-dcnode-id="12697" href="#bib0775" name="bbib0775"><span data-dcnode-id="12698" instrument_node="">Wullschleger et al., 1998</span></a><span data-dcnode-id="12696" instrument_node="">), though this degree of decoupling is not as large as in tropical rainforest species. It translates in the later, into a higher importance of the control exerted by the physiological conductance to water vapour of the canopy for some forest tree species, transpiration becoming more dependent on the sensitivity of leaf stomata to changes in water vapour deficit of atmosphere.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="12491" id="tbl0005"><span class="captions" data-dcnode-id="12687"><span data-dcnode-id="12688"><p data-dcnode-id="12689" id="spar0030"><span class="label" data-dcnode-id="12693"><span data-dcnode-id="12694" instrument_node="">Table 1</span></span><span data-dcnode-id="12692" instrument_node="">. </span><span data-dcnode-id="12690" instrument_node="">Decoupling factor from conifer to tropical forest tree species. The ranges for some species represent variation according to time in the growing season or degree of canopy closure.</span></p></span></span><div class="groups" data-dcnode-id="12492"><table data-dcnode-id="12493"><thead class="valign-top" data-dcnode-id="12674"><tr data-dcnode-id="12675"><th class="rowsep-1 align-left" data-dcnode-id="12685" scope="col"><span data-dcnode-id="12686" instrument_node="">Species</span></th><th class="rowsep-1 align-left" data-dcnode-id="12680" scope="col"><span data-dcnode-id="12684" instrument_node="">Decoupling factor (</span><em data-dcnode-id="12682"><span data-dcnode-id="12683" instrument_node="">Ω</span></em><span data-dcnode-id="12681" instrument_node="">)</span></th><th class="rowsep-1 align-left" data-dcnode-id="12678" scope="col"><span data-dcnode-id="12679" instrument_node="">Type of vegetation</span></th><th class="rowsep-1 align-left" data-dcnode-id="12676" scope="col"><span data-dcnode-id="12677" instrument_node="">Study</span></th></tr></thead><tbody data-dcnode-id="12494"><tr data-dcnode-id="12663"><td class="align-left" data-dcnode-id="12671"><em data-dcnode-id="12672"><span data-dcnode-id="12673" instrument_node="">Chamaecyparis obtusa</span></em e="">0.66</span></td><td class="align-left" data-dcnode-id="12532"><span data-dcnode-id="12533" instrument_node="">Temperate forest</span></td><td class="align-left" data-dcnode-id="12529"><a class="workspace-trigger" data-dcnode-id="12530" href="#bib0275" name="bbib0275"><span data-dcnode-id="12531" instrument_node="">Hinckley et al. (1994)</span></a></td></tr><tr data-dcnode-id="12517"><td class="align-left" data-dcnode-id="12525"><em data-dcnode-id="12526"><span data-dcnode-id="12527" instrument_node="">Nothofagus antarctica</span></em></td><td class="align-char" data-dcnode-id="12523"><span data-dcnode-id="12524" instrument_node="">0.07–0.14</span></td><td class="align-left" data-dcnode-id="12521"><span data-dcnode-id="12522" instrument_node="">Temperate forest</span></td><td class="align-left" data-dcnode-id="12518"><a class="workspace-trigger" data-dcnode-id="12519" href="#bib0250" name="bbib0250"><span data-dcnode-id="12520" instrument_node="">Gyenge et al. (2011)</span></a></td></tr><tr data-dcnode-id="12506"><td class="align-left" data-dcnode-id="12514"><em data-dcnode-id="12515"><span data-dcnode-id="12516" instrument_node="">Mixed dipterocarp forest</span></em></td><td class="align-char" data-dcnode-id="12512"><span data-dcnode-id="12513" instrument_node="">0.24–0.43</span></td><td class="align-left" data-dcnode-id="12510"><span data-dcnode-id="12511" instrument_node="">Tropical rain forest</span></td><td class="align-left" data-dcnode-id="12507"><a class="workspace-trigger" data-dcnode-id="12508" href="#bib0365" name="bbib0365"><span data-dcnode-id="12509" instrument_node="">Kumagai et al. (2004)</span></a></td></tr><tr data-dcnode-id="12495"><td class="align-left" data-dcnode-id="12503"><em data-dcnode-id="12504"><span data-dcnode-id="12505" instrument_node="">Acer rubrum</span></em></td><td class="align-char" data-dcnode-id="12501"><span data-dcnode-id="12502" instrument_node="">0.12–0.37</span></td><td class="align-left" data-dcnode-id="12499"><span data-dcnode-id="12500" instrument_node="">Broad-leaved temperate forest</span></td><td class="align-left" data-dcnode-id="12496"><a class="workspace-trigger" data-dcnode-id="12497" href="#bib0780" name="bbib0780"><span data-dcnode-id="12498" instrument_node="">Wullschleger et al. (2000)</span></a></td></tr></tbody></table></div></div><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="12381" id="tbl0010"><span class="captions" data-dcnode-id="12483"><span data-dcnode-id="12484"><p data-dcnode-id="12485" id="spar0035"><span class="label" data-dcnode-id="12489"><span data-dcnode-id="12490" instrument_node="">Table 2</span></span><span data-dcnode-id="12488" instrument_node="">. </span><span data-dcnode-id="12486" instrument_node="">Impact on water use of outstanding trees after forest thinning. It was observed an increased water use in most cases in the following years after the treatment.</span></p></span></span><div class="groups" data-dcnode-id="12382"><table data-dcnode-id="12383"><thead class="valign-top" data-dcnode-id="12473"><tr data-dcnode-id="12474"><th class="rowsep-1 align-left" data-dcnode-id="12481" scope="col"><span data-dcnode-id="12482" instrument_node="">Species</span></th><th class="rowsep-1 align-left" data-dcnode-id="12479" scope="col"><span data-dcnode-id="12480" instrument_node="">Impact</span></th><th class="rowsep-1 align-left" data-dcnode-id="12477" scope="col"><span data-dcnode-id="12478" instrument_node="">Type of vegetation</span></th><th class="rowsep-1 align-left" data-dcnode-id="12475" scope="col"><span data-dcnode-id="12476" instrument_node="">Study</span></th></tr></thead><tbody data-dcnode-id="12384"><tr data-dcnode-id="12462"><td class="align-left" data-dcnode-id="12470"><em data-dcnode-id="12471"><span data-dcnode-id="12472" instrument_node="">Picea glauca</span></em></td><td class="align-left" data-dcnode-id="12468"><span data-dcnode-id="12469" instrument_node="">Increase</span></td><td class="align-left" data-dcnode-id="12466"><span data-dcnode-id="12467" instrument_node="">Temperate Forest</span></td><td class="align-left" data-dcnode-id="12463"><a class="workspace-trigger" data-dcnode-id="12464" href="#bib0060" name="bbib0060"><span data-dcnode-id="12465" instrument_node="">Bladon et al. (2006)</span></a></td></tr><tr data-dcnode-id="12451"><td class="align-left" data-dcnode-id="12459"><em data-dcnode-id="12460"><span data-dcnode-id="12461" instrument_node="">Betula papyrifera</span></em></td><td class="align-left" data-dcnode-id="12457"><span data-dcnode-id="12458" instrument_node="">Moderate increase</span></td><td class="align-left" data-dcnode-id="12455"><span data-dcnode-id="12456" instrument_node="">Temperate Forest</span></td><td class="align-left" data-dcnode-id="12452"><a class="workspace-trigger" data-dcnode-id="12453" href="#bib0060" name="bbib0060"><span data-dcnode-id="12454" instrument_node="">Bladon et al. (2006)</span></a></td></tr><tr data-dcnode-id="12440"><td class="align-left" data-dcnode-id="12448"><em data-dcnode-id="12449"><span data-dcnode-id="12450" instrument_node="">Populus balsamifera</span></em></td><td class="align-left" data-dcnode-id="12446"><span data-dcnode-id="12447" instrument_node="">No change</span></td><td class="align-left" data-dcnode-id="12444"><span data-dcnode-id="12445" instrument_node="">Temperate Forest</span></td><td class="align-left" data-dcnode-id="12441"><a class="workspace-trigger" data-dcnode-id="12442" href="#bib0060" name="bbib0060"><span data-dcnode-id="12443" instrument_node="">Bladon et al. (2006)</span></a></td></tr><tr data-dcnode-id="12429"><td class="align-left" data-dcnode-id="12437"><em data-dcnode-id="12438"><span data-dcnode-id="12439" instrument_node="">Pinus pinaster</span></em></td><td class="align-left" data-dcnode-id="12435"><span data-dcnode-id="12436" instrument_node="">Increase</span></td><td class="align-left" data-dcnode-id="12433"><span data-dcnode-id="12434" instrument_node="">Mediterranean conifer forest</span></td><td class="align-left" data-dcnode-id="12430"><a class="workspace-trigger" data-dcnode-id="12431" href="#bib0300" name="bbib0300"><span data-dcnode-id="12432" instrument_node="">Jiménez et al. (2008)</span></a></td></tr><tr data-dcnode-id="12418"><td class="align-left" data-dcnode-id="12426"><em data-dcnode-id="12427"><span data-dcnode-id="12428" instrument_node="">Quercus petraea</span></em></td><td class="align-left" data-dcnode-id="12424"><span data-dcnode-id="12425" instrument_node="">Increase</span></td><td class="align-left" data-dcnode-id="12422"><span data-dcnode-id="12423" instrument_node="">Temperate Forest</span></td><td class="align-left" data-dcnode-id="12419"><a class="workspace-trigger" data-dcnode-id="12420" href="#bib0065" name="bbib0065"><span data-dcnode-id="12421" instrument_node="">Bréda et al. (1995)</span></a></td></tr><tr data-dcnode-id="12407"><td class="align-left" data-dcnode-id="12415"><em data-dcnode-id="12416"><span data-dcnode-id="12417" instrument_node="">Quercus ilex</span></em></td><td class="align-left" data-dcnode-id="12413"><span data-dcnode-id="12414" instrument_node="">Increase</span></td><td class="align-left" data-dcnode-id="12411"><span data-dcnode-id="12412" instrument_node="">Mediterranean angiosperm forest</span></td><td class="align-left" data-dcnode-id="12408"><a class="workspace-trigger" data-dcnode-id="12409" href="#bib0235" name="bbib0235"><span data-dcnode-id="12410" instrument_node="">Gracia et al. (1999)</span></a></td></tr><tr data-dcnode-id="12396"><td class="align-left" data-dcnode-id="12404"><em data-dcnode-id="12405"><span data-dcnode-id="12406" instrument_node="">Nothofagus antarctica</span></em></td><td class="align-left" data-dcnode-id="12402"><span data-dcnode-id="12403" instrument_node="">Increase</span></td><td class="align-left" data-dcnode-id="12400"><span data-dcnode-id="12401" instrument_node="">Temperate Forest</span></td><td class="align-left" data-dcnode-id="12397"><a class="workspace-trigger" data-dcnode-id="12398" href="#bib0250" name="bbib0250"><span data-dcnode-id="12399" instrument_node="">Gyenge et al. (2011)</span></a></td></tr><tr data-dcnode-id="12385"><td class="align-left" data-dcnode-id="12393"><em data-dcnode-id="12394"><span data-dcnode-id="12395" instrument_node="">Pinus sylvestris</span></em></td><td class="align-left" data-dcnode-id="12391"><span data-dcnode-id="12392" instrument_node="">Moderate decrease</span></td><td class="align-left" data-dcnode-id="12389"><span data-dcnode-id="12390" instrument_node="">Temperate conifer forest</span></td><td class="align-left" data-dcnode-id="12386"><a class="workspace-trigger" data-dcnode-id="12387" href="#bib0380" name="bbib0380"><span data-dcnode-id="12388" instrument_node="">Lagergren et al. (2008)</span></a></td></tr></tbody></table></div></div></div><p data-dcnode-id="12315" id="par0050"><span data-dcnode-id="12379" instrument_node="">Water use by forests has been ascertained mainly from the use of techniques such as leaf porometry (</span><a class="workspace-trigger" data-dcnode-id="12377" href="#bib0230" name="bbib0230"><span data-dcnode-id="12378" instrument_node="">Goulden and Field, 1994</span></a><span data-dcnode-id="12376" instrument_node="">), tree sap-flow (</span><a class="workspace-trigger" data-dcnode-id="12374" href="#bib0550" name="bbib0550"><span data-dcnode-id="12375" instrument_node="">Oishi et al., 2008</span></a><span data-dcnode-id="12373" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12371" href="#bib0770" name="bbib0770"><span data-dcnode-id="12372" instrument_node="">Wullschleger et al., 2001</span></a><span data-dcnode-id="12370" instrument_node="">), eddy covariance (</span><a class="workspace-trigger" data-dcnode-id="12368" href="#bib0805" name="bbib0805"><span data-dcnode-id="12369" instrument_node="">Baldocchi and Ryu, 2011</span></a><span data-dcnode-id="12367" instrument_node="">) and catchment water balance (</span><a class="workspace-trigger" data-dcnode-id="12365" href="#bib0795" name="bbib0795"><span data-dcnode-id="12366" instrument_node="">Zhang et al., 2001</span></a><span data-dcnode-id="12364" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12362" href="#bib0530" name="bbib0530"><span data-dcnode-id="12363" instrument_node="">Nosetto et al., 2011</span></a><span data-dcnode-id="12361" instrument_node="">). The overview of all these methods is beyond the scope of this work, and good reviews have been already published (see </span><a class="workspace-trigger" data-dcnode-id="12359" href="#bib0230" name="bbib0230"><span data-dcnode-id="12360" instrument_node="">Goulden and Field, 1994</span></a><span data-dcnode-id="12358" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12356" href="#bib0805" name="bbib0805"><span data-dcnode-id="12357" instrument_node="">Baldocchi and Ryu, 2011</span></a><span data-dcnode-id="12355" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12353" href="#bib0330" name="bbib0330"><span data-dcnode-id="12354" instrument_node="">Kell et al., 2001</span></a><span data-dcnode-id="12352" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12350" href="#bib0750" name="bbib0750"><span data-dcnode-id="12351" instrument_node="">Wilson et al., 2001</span></a><span data-dcnode-id="12349" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12347" href="#bib0775" name="bbib0775"><span data-dcnode-id="12348" instrument_node="">Wullschleger et al., 1998</span></a><span data-dcnode-id="12346" instrument_node="">). We are going to outline only briefly one of them: the sap flow record. This measurement is an intermediate methodological approach to dissect the use of water by forest tree species from the micro-scale at the leaf level (e.g. porometry), to the macro-scale represented by the whole ecosystem (e.g. eddy covariance or catchment water balance). The response in terms of control of water use at the leaf level, and integrated through the full tree crown, result in different patterns in the water use at the integrative scale represented by a whole individual tree. Individual trees at the same place make use of water in different ways according to species (</span><a class="workspace-trigger" data-dcnode-id="12344" href="#bib0440" name="bbib0440"><span data-dcnode-id="12345" instrument_node="">Martínez-Vilalta et al., 2003</span></a><span data-dcnode-id="12343" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12341" href="#bib0020" name="bbib0020"><span data-dcnode-id="12342" instrument_node="">Aranda et al., 2005</span></a><span data-dcnode-id="12340" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12338" href="#bib0605" name="bbib0605"><span data-dcnode-id="12339" instrument_node="">Poyatos et al., 2005</span></a><span data-dcnode-id="12337" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12335" href="#bib0610" name="bbib0610"><span data-dcnode-id="12336" instrument_node="">Poyatos et al., 2007</span></a><span data-dcnode-id="12334" instrument_node="">), and hierarchical status of tree into the stand (</span><a class="workspace-trigger" data-dcnode-id="12332" href="#bib0620" name="bbib0620"><span data-dcnode-id="12333" instrument_node="">Ryan et al., 2000</span></a><span data-dcnode-id="12331" instrument_node="">). Measurement of sap flow density is one of the most extensively employed methods that allow discriminating water use by individual trees. The method has different technical approaches and methodological shortcomings (</span><a class="workspace-trigger" data-dcnode-id="12329" href="#bib0345" name="bbib0345"><span data-dcnode-id="12330" instrument_node="">Köstner et al., 1998</span></a><span data-dcnode-id="12328" instrument_node="">). Some of them related with the different patterns of sap flow profiling across sapwood depending on species, daily time lag between canopy transpiration and sap flow, or adjustment of the zero base line during nocturnal periods when sap flow is considered null. However, the technique allows resolving water consumption at the individual tree scale reasonably well, allowing to extrapolate to the overall forest stand after an affordable scaling exercise (</span><a class="workspace-trigger" data-dcnode-id="12326" href="#bib0320" name="bbib0320"><span data-dcnode-id="12327" instrument_node="">Kaufmann and Kelliher, 1991</span></a><span data-dcnode-id="12325" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12323" href="#bib0670" name="bbib0670"><span data-dcnode-id="12324" instrument_node="">Schwärzel et al., 2009</span></a><span data-dcnode-id="12322" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12320" href="#bib0545" name="bbib0545"><span data-dcnode-id="12321" instrument_node="">Oishi et al., 2010</span></a><span data-dcnode-id="12319" instrument_node="">). The approach has shortcomings as already mentioned, with some emerging ones as the nocturnal water fluxes, which have to be included in the water balance calculations (</span><a class="workspace-trigger" data-dcnode-id="12317" href="#bib0550" name="bbib0550"><span data-dcnode-id="12318" instrument_node="">Oishi et al., 2008</span></a><span data-dcnode-id="12316" instrument_node="">).</span></p><div data-dcnode-id="12264"><p data-dcnode-id="12298" id="par0055"><span data-dcnode-id="12314" instrument_node="">Once water is captured it moves through trees inhabiting the same forest in a very species-specific manner. This is linked in some cases to specific morphological traits such as leaf and rooting habits, namely deciduous versus evergreen leafing, and shallow vs. deep rooting patterns. The sensitivity of different species to environmental factors, specifically to soil water availability, evaporative demand or radiation, explain the different strategies in the sap flow on daily and seasonal temporal scales. An example is found when comparing the daily sap flow of two evergreen species, </span><em data-dcnode-id="12312"><span data-dcnode-id="12313" instrument_node="">Quercus ilex</span></em><span data-dcnode-id="12311" instrument_node=""> and </span><em data-dcnode-id="12309"><span data-dcnode-id="12310" instrument_node="">Pinus nigra</span></em><span data-dcnode-id="12308" instrument_node="">, growing together in mixed stands at the mid-mountains of the Iberian Peninsula. Both species showed a decline in the daily sap flow from the beginning to the middle of summer (</span><a class="workspace-trigger" data-dcnode-id="12306" href="#fig0010" name="bfig0010"><span data-dcnode-id="12307" instrument_node="">Fig. 2</span></a><span data-dcnode-id="12305" instrument_node="">). However, </span><em data-dcnode-id="12303"><span data-dcnode-id="12304" instrument_node="">P. nigra</span></em><span data-dcnode-id="12302" instrument_node=""> maintained a much more conservative performance with regard to the water transpired, showing an acute depression in daily sap flow, making transpiration almost null around midday, which was not observed in </span><em data-dcnode-id="12300"><span data-dcnode-id="12301" instrument_node="">Q. ilex</span></em><span data-dcnode-id="12299" instrument_node="">. Similar segregation and differential performance among species inhabiting the same place has been frequently explored in many kinds of forest tree species, from temperate to tropical biomes.</span></p><figure class="figure text-xs" data-dcnode-id="12265" id="fig0010"><span data-dcnode-id="12288"><img alt="" data-dcnode-id="12297" height="452" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378377412001722-gr2.jpg&amp;raw"><span data-dcnode-id="12296" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="12289"><li data-dcnode-id="12290"><a class="anchor download-link u-font-sans" data-dcnode-id="12291" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378377412001722-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="12292"><span data-dcnode-id="12295" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="12293"><span data-dcnode-id="12294" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="12266"><span data-dcnode-id="12267"><p data-dcnode-id="12268" id="spar0020"><span class="label" data-dcnode-id="12286"><span data-dcnode-id="12287" instrument_node="">Fig. 2</span></span><span data-dcnode-id="12285" instrument_node="">. </span><span data-dcnode-id="12283" instrument_node="">Daily water sap flow in two typical Mediterranean forest tree species (</span><em data-dcnode-id="12281"><span data-dcnode-id="12282" instrument_node="">Quercus ilex</span></em><span data-dcnode-id="12280" instrument_node=""> and </span><em data-dcnode-id="12278"><span data-dcnode-id="12279" instrument_node="">Pinus nigra</span></em><span data-dcnode-id="12277" instrument_node="">) recorded with the HBT technique. Two contrasted periods were considered, late spring (top graph) and mid summer (bottom graph). Pines suffered a much more acute decrease in summer water use than oaks. The trends represent the mean</span><span data-dcnode-id="12275" instrument_node="">&nbsp;</span><span data-dcnode-id="12273" instrument_node="">±</span><span data-dcnode-id="12271" instrument_node="">&nbsp;</span><span data-dcnode-id="12269" instrument_node="">SD for four trees per species (A. Forner original unpublished data).</span></p></span></span></figure></div><p data-dcnode-id="12205" id="par0060"><span data-dcnode-id="12263" instrument_node="">Therefore water consumption by forest trees varies daily and seasonal among species according to seasonal changes in the relative extractable water, radiation and vapour pressure deficit (</span><a class="workspace-trigger" data-dcnode-id="12261" href="#bib0555" name="bbib0555"><span data-dcnode-id="12262" instrument_node="">Oren et al., 1999a</span></a><span data-dcnode-id="12260" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12258" href="#bib0560" name="bbib0560"><span data-dcnode-id="12259" instrument_node="">Oren et al., 1999b</span></a><span data-dcnode-id="12257" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12255" href="#bib0355" name="bbib0355"><span data-dcnode-id="12256" instrument_node="">Kumagai, 2011</span></a><span data-dcnode-id="12254" instrument_node="">). Despite the well-known differentiation among forest tree species to climate and atmospheric factors, there has been a debate if the final water budget of forest stands is controlled purely by biophysical rules (</span><a class="workspace-trigger" data-dcnode-id="12252" href="#bib0745" name="bbib0745"><span data-dcnode-id="12253" instrument_node="">West et al., 1999</span></a><span data-dcnode-id="12251" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12249" href="#bib0175" name="bbib0175"><span data-dcnode-id="12250" instrument_node="">Enquist, 2002</span></a><span data-dcnode-id="12248" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12246" href="#bib0485" name="bbib0485"><span data-dcnode-id="12247" instrument_node="">Meinzer et al., 2001</span></a><span data-dcnode-id="12245" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12243" href="#bib0465" name="bbib0465"><span data-dcnode-id="12244" instrument_node="">Meinzer, 2003</span></a><span data-dcnode-id="12242" instrument_node="">). In this case, the proper application of general transformation scaling rules (i.e. relationship between sapwood and total leaf area) would result in the adjustment of the water use by different tree species to a similar pattern (</span><a class="workspace-trigger" data-dcnode-id="12240" href="#bib0485" name="bbib0485"><span data-dcnode-id="12241" instrument_node="">Meinzer et al., 2001</span></a><span data-dcnode-id="12239" instrument_node="">). Another example of confluence in the whole water used by different kind of species, was recently presented by </span><a class="workspace-trigger" data-dcnode-id="12237" href="#bib0040" name="bbib0040"><span data-dcnode-id="12238" instrument_node="">Baldocchi et al. (2010)</span></a><span data-dcnode-id="12236" instrument_node="">. They observed a similar pattern in the overall annual water budget and carbon fixed when comparing evergreen vs. deciduous species in Mediterranean oak woodlands. It was concluded most important factor controlling, as much water use or carbon uptake, was leaf area index. Inter-annual modulation in the maximum interchange of water and carbon fluxes with the atmosphere according to leaf habit was given by the changes in leaf area index. Thus, and besides leaf habit could be considered to exert an important role on the fluxes of water and carbon in forest ecosystems, it seems that the species-specific response was blurred when the overall water used through the full growing season was considered. In this respect, deciduous species would compensate their shorter vegetative period by maximizing the consumption of water during the wet spring months. However, as shown worldwide and from many studies, the sensitivity of each species to evaporative demand (</span><a class="workspace-trigger" data-dcnode-id="12234" href="#bib0270" name="bbib0270"><span data-dcnode-id="12235" instrument_node="">Hinckley et al., 1978</span></a><span data-dcnode-id="12233" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12231" href="#bib0555" name="bbib0555"><span data-dcnode-id="12232" instrument_node="">Oren et al., 1999a</span></a><span data-dcnode-id="12230" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12228" href="#bib0560" name="bbib0560"><span data-dcnode-id="12229" instrument_node="">Oren et al., 1999b</span></a><span data-dcnode-id="12227" instrument_node="">), perturbations such as intense droughts (</span><a class="workspace-trigger" data-dcnode-id="12225" href="#bib0410" name="bbib0410"><span data-dcnode-id="12226" instrument_node="">Leuzinger et al., 2005</span></a><span data-dcnode-id="12224" instrument_node="">) and modification of tree physiological performance in the subsequent years to the perturbation (</span><a class="workspace-trigger" data-dcnode-id="12222" href="#bib0070" name="bbib0070"><span data-dcnode-id="12223" instrument_node="">Bréda et al., 2006</span></a><span data-dcnode-id="12221" instrument_node="">), are issues to consider at least in environments where water is one of the main limiting environmental factors at some times during the growing season, and different adaptive strategies may have evolved. In this regard, there are numerous examples showing how sensitivity to drought explain differential species-specific decreases in the water use by trees as dry period advances (</span><a class="workspace-trigger" data-dcnode-id="12219" href="#bib0020" name="bbib0020"><span data-dcnode-id="12220" instrument_node="">Aranda et al., 2005</span></a><span data-dcnode-id="12218" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12216" href="#bib0140" name="bbib0140"><span data-dcnode-id="12217" instrument_node="">David et al., 2007</span></a><span data-dcnode-id="12215" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12213" href="#bib0375" name="bbib0375"><span data-dcnode-id="12214" instrument_node="">Kunert et al., 2010</span></a><span data-dcnode-id="12212" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12210" href="#bib0410" name="bbib0410"><span data-dcnode-id="12211" instrument_node="">Leuzinger et al., 2005</span></a><
