span data-dcnode-id="12209" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12207" href="#bib0565" name="bbib0565"><span data-dcnode-id="12208" instrument_node="">Oren and Pataki, 2001</span></a><span data-dcnode-id="12206" instrument_node="">).</span></p></section><section data-dcnode-id="12044" id="sec0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="12198"><span data-dcnode-id="12203" instrument_node="">2.3</span><span data-dcnode-id="12201" instrument_node="">. </span><span data-dcnode-id="12199" instrument_node="">Other functional species-specific processes involved in the water use: capacitance, nocturnal water flux and hydraulic lift</span></h3><p data-dcnode-id="12166" id="par0065"><span data-dcnode-id="12197" instrument_node="">Not only use, but also control and management of soil water differ from trees to other plant life styles. Unlike other plants, forest trees represent important aboveground reservoirs of water themselves (</span><a class="workspace-trigger" data-dcnode-id="12195" href="#bib0665" name="bbib0665"><span data-dcnode-id="12196" instrument_node="">Scholz et al., 2007</span></a><span data-dcnode-id="12194" instrument_node="">). Sapwood and elastic tissues of trees are the two main internal water storages. The relative importance of both compartments varies according to species (</span><a class="workspace-trigger" data-dcnode-id="12192" href="#bib0335" name="bbib0335"><span data-dcnode-id="12193" instrument_node="">Kravka et al., 1999</span></a><span data-dcnode-id="12191" instrument_node="">), tree size (</span><a class="workspace-trigger" data-dcnode-id="12189" href="#bib0595" name="bbib0595"><span data-dcnode-id="12190" instrument_node="">Phillips et al., 2010</span></a><span data-dcnode-id="12188" instrument_node="">), and soil water availability (</span><a class="workspace-trigger" data-dcnode-id="12186" href="#bib0260" name="bbib0260"><span data-dcnode-id="12187" instrument_node="">Hernández-Santana et al., 2008</span></a><span data-dcnode-id="12185" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12183" href="#bib0055" name="bbib0055"><span data-dcnode-id="12184" instrument_node="">Betsch et al., 2011</span></a><span data-dcnode-id="12182" instrument_node="">). Although, sapwood seems to be more relevant by conditioning daily tree water budget (</span><a class="workspace-trigger" data-dcnode-id="12180" href="#bib0125" name="bbib0125"><span data-dcnode-id="12181" instrument_node="">Čermak et al., 2007</span></a><span data-dcnode-id="12179" instrument_node="">). The impact of dry years on the amount of water withdrawn from both internal water storages has been assessed recently for </span><em data-dcnode-id="12177"><span data-dcnode-id="12178" instrument_node="">Fagus sylvatica</span></em><span data-dcnode-id="12176" instrument_node=""> considering the exceptional drought of 2003 in Central Europe (</span><a class="workspace-trigger" data-dcnode-id="12174" href="#bib0055" name="bbib0055"><span data-dcnode-id="12175" instrument_node="">Betsch et al., 2011</span></a><span data-dcnode-id="12173" instrument_node="">). The contribution of water accumulated within trees to the overall daily water balance, and specifically to the transpiration stream, increased with the intensity of drought reaching almost a 70% at the peak of the dry period (</span><a class="workspace-trigger" data-dcnode-id="12171" href="#bib0055" name="bbib0055"><span data-dcnode-id="12172" instrument_node="">Betsch et al., 2011</span></a><span data-dcnode-id="12170" instrument_node="">). However, its relevance as mechanism to avoid dry periods should be considered moderate, as most water depleted during diurnal hours must be replaced during the night in order to maintain hydration of aboveground tissues. Otherwise, a fast death of plant tissues would be expected from a fast dehydration. In fact, this recharge is lowered as water in soil gets scarcer (</span><a class="workspace-trigger" data-dcnode-id="12168" href="#bib0215" name="bbib0215"><span data-dcnode-id="12169" instrument_node="">Giovannelli et al., 2007</span></a><span data-dcnode-id="12167" instrument_node="">), showing the progressive difficulty to collect and replace internal water reservoirs as drought intensifies.</span></p><p data-dcnode-id="12074" id="par0070"><span data-dcnode-id="12165" instrument_node="">Until recently, water use by trees was considered to operate mainly during the daylight period. In the last years, this view is beginning to change, and nocturnal water flux has been described already for numerous forest tree species (</span><a class="workspace-trigger" data-dcnode-id="12163" href="#bib0135" name="bbib0135"><span data-dcnode-id="12164" instrument_node="">Daley and Phillips, 2006</span></a><span data-dcnode-id="12162" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12160" href="#bib0185" name="bbib0185"><span data-dcnode-id="12161" instrument_node="">Fisher et al., 2007</span></a><span data-dcnode-id="12159" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12157" href="#bib0655" name="bbib0655"><span data-dcnode-id="12158" instrument_node="">Sellin and Lubenets, 2010</span></a><span data-dcnode-id="12156" instrument_node="">). It can be a mere consequence of the recharge of internal water reservoirs on the first night hours, but also a consequence of incomplete stomatal closure during night (</span><a class="workspace-trigger" data-dcnode-id="12154" href="#bib0120" name="bbib0120"><span data-dcnode-id="12155" instrument_node="">Caird et al., 2007</span></a><span data-dcnode-id="12153" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12151" href="#bib0185" name="bbib0185"><span data-dcnode-id="12152" instrument_node="">Fisher et al., 2007</span></a><span data-dcnode-id="12150" instrument_node="">). After replacement of the internal reservoirs, the reason why trees assume costs of night-time water loss without simultaneous photosynthetic carbon gain remains unclear (</span><a class="workspace-trigger" data-dcnode-id="12148" href="#bib0595" name="bbib0595"><span data-dcnode-id="12149" instrument_node="">Phillips et al., 2010</span></a><span data-dcnode-id="12147" instrument_node="">). However, there are some possible benefits derived from this, such as the increase of nutrient availability to the plant (</span><a class="workspace-trigger" data-dcnode-id="12145" href="#bib0120" name="bbib0120"><span data-dcnode-id="12146" instrument_node="">Caird et al., 2007</span></a><span data-dcnode-id="12144" instrument_node="">), or provide oxygen to the respiring cells of the deep sapwood (</span><a class="workspace-trigger" data-dcnode-id="12142" href="#bib0135" name="bbib0135"><span data-dcnode-id="12143" instrument_node="">Daley and Phillips, 2006</span></a><span data-dcnode-id="12141" instrument_node="">). The nocturnal water transport has been quantified as a significant fraction of total daily water use although it depends on several factors including the particular species studied (</span><a class="workspace-trigger" data-dcnode-id="12139" href="#bib0150" name="bbib0150"><span data-dcnode-id="12140" instrument_node="">Dawson et al., 2007</span></a><span data-dcnode-id="12138" instrument_node="">). The value ranges from 4.9% to 7.3% in </span><em data-dcnode-id="12136"><span data-dcnode-id="12137" instrument_node="">Eucalyptus</span></em><span data-dcnode-id="12135" instrument_node=""> species (</span><a class="workspace-trigger" data-dcnode-id="12133" href="#bib0595" name="bbib0595"><span data-dcnode-id="12134" instrument_node="">Phillips et al., 2010</span></a><span data-dcnode-id="12132" instrument_node="">) and it is established as 2.4%, 6.6% and 13% in </span><em data-dcnode-id="12130"><span data-dcnode-id="12131" instrument_node="">Acer rubrum</span></em><span data-dcnode-id="12129" instrument_node="">, </span><em data-dcnode-id="12127"><span data-dcnode-id="12128" instrument_node="">Quercus rubra</span></em><span data-dcnode-id="12126" instrument_node=""> and </span><em data-dcnode-id="12124"><span data-dcnode-id="12125" instrument_node="">Betula papyrifera</span></em><span data-dcnode-id="12123" instrument_node="">, respectively (</span><a class="workspace-trigger" data-dcnode-id="12121" href="#bib0135" name="bbib0135"><span data-dcnode-id="12122" instrument_node="">Daley and Phillips, 2006</span></a><span data-dcnode-id="12120" instrument_node="">) and 6–8% in </span><em data-dcnode-id="12118"><span data-dcnode-id="12119" instrument_node="">Eucalyptus parramattensis</span></em><span data-dcnode-id="12117" instrument_node=""> and </span><em data-dcnode-id="12115"><span data-dcnode-id="12116" instrument_node="">Angophora bakeri</span></em><span data-dcnode-id="12114" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="12112" href="#bib0790" name="bbib0790"><span data-dcnode-id="12113" instrument_node="">Zeppel et al., 2010</span></a><span data-dcnode-id="12111" instrument_node="">). According to these values, the inter-specific variation in nocturnal water transport has been described to be lower than the intra-specific variation in some studies (</span><a class="workspace-trigger" data-dcnode-id="12109" href="#bib0595" name="bbib0595"><span data-dcnode-id="12110" instrument_node="">Phillips et al., 2010</span></a><span data-dcnode-id="12108" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12106" href="#bib0790" name="bbib0790"><span data-dcnode-id="12107" instrument_node="">Zeppel et al., 2010</span></a><span data-dcnode-id="12105" instrument_node="">). Another important factor that affects significantly to nocturnal sap flow is tree height (</span><a class="workspace-trigger" data-dcnode-id="12103" href="#bib0590" name="bbib0590"><span data-dcnode-id="12104" instrument_node="">Pfautsch et al., 2011</span></a><span data-dcnode-id="12102" instrument_node="">). Nevertheless, the factors that present higher correlations with nocturnal sap flow are the environmental ones. For example, it depends on the season, being higher when the soil water availability is not limited: up to almost 50% (commonly 35%) and 20–25% in </span><em data-dcnode-id="12100"><span data-dcnode-id="12101" instrument_node="">Eucalyptus victrix</span></em><span data-dcnode-id="12099" instrument_node=""> in wet and dry season, respectively (</span><a class="workspace-trigger" data-dcnode-id="12097" href="#bib0590" name="bbib0590"><span data-dcnode-id="12098" instrument_node="">Pfautsch et al., 2011</span></a><span data-dcnode-id="12096" instrument_node="">). Thus, nocturnal transpiration is highest in sites with higher soil water content and less prone to atmospheric or soil water deficits (</span><a class="workspace-trigger" data-dcnode-id="12094" href="#bib0150" name="bbib0150"><span data-dcnode-id="12095" instrument_node="">Dawson et al., 2007</span></a><span data-dcnode-id="12093" instrument_node="">). The night-time water transport is highly correlated with vapour pressure deficit (</span><a class="workspace-trigger" data-dcnode-id="12091" href="#bib0590" name="bbib0590"><span data-dcnode-id="12092" instrument_node="">Pfautsch et al., 2011</span></a><span data-dcnode-id="12090" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12088" href="#bib0790" name="bbib0790"><span data-dcnode-id="12089" instrument_node="">Zeppel et al., 2010</span></a><span data-dcnode-id="12087" instrument_node="">), although there is some study where the product between the vapour pressure deficit and the wind speed are both the principal drivers (</span><a class="workspace-trigger" data-dcnode-id="12085" href="#bib0595" name="bbib0595"><span data-dcnode-id="12086" instrument_node="">Phillips et al., 2010</span></a><span data-dcnode-id="12084" instrument_node="">). Specifically, some studies indicate nocturnal transpiration is less than 10% of the daily sap flow (</span><a class="workspace-trigger" data-dcnode-id="12082" href="#bib0135" name="bbib0135"><span data-dcnode-id="12083" instrument_node="">Daley and Phillips, 2006</span></a><span data-dcnode-id="12081" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12079" href="#bib0540" name="bbib0540"><span data-dcnode-id="12080" instrument_node="">Novick et al., 2009</span></a><span data-dcnode-id="12078" instrument_node="">). This supports the idea nocturnal refilling is more important than night-time transpiration, which disagree with the study carried out by </span><a class="workspace-trigger" data-dcnode-id="12076" href="#bib0790" name="bbib0790"><span data-dcnode-id="12077" instrument_node="">Zeppel et al. (2010)</span></a><span data-dcnode-id="12075" instrument_node=""> and where nocturnal sap flow depended mainly on transpiration.</span></p><p data-dcnode-id="12045" id="par0075"><span data-dcnode-id="12073" instrument_node="">The deep rooting patter of trees, unlike other plants, makes possible the movement of water from deep to shallow soil horizons. This specific water pumping property of trees, known as hydraulic lifting (</span><a class="workspace-trigger" data-dcnode-id="12071" href="#bib0105" name="bbib0105"><span data-dcnode-id="12072" instrument_node="">Caldwell and Richards, 1989</span></a><span data-dcnode-id="12070" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12068" href="#bib0145" name="bbib0145"><span data-dcnode-id="12069" instrument_node="">Dawson, 1993</span></a><span data-dcnode-id="12067" instrument_node="">), can have an important ecological role in terms of water redistribution in soils (</span><a class="workspace-trigger" data-dcnode-id="12065" href="#bib0280" name="bbib0280"><span data-dcnode-id="12066" instrument_node="">Horton and Hart, 1998</span></a><span data-dcnode-id="12064" instrument_node="">). Not only the water balance may be modulated by this process in some forest trees, but also hydraulic lift is affecting important ecological processes such as the facilitation of water use by individuals of different species and by juveniles of the same species (</span><a class="workspace-trigger" data-dcnode-id="12062" href="#bib0090" name="bbib0090"><span data-dcnode-id="12063" instrument_node="">Brooks et al., 2006</span></a><span data-dcnode-id="12061" instrument_node="">). Hydraulic lift was first observed in plants from dry sites such as deserts (</span><a class="workspace-trigger" data-dcnode-id="12059" href="#bib0105" name="bbib0105"><span data-dcnode-id="12060" instrument_node="">Caldwell and Richards, 1989</span></a><span data-dcnode-id="12058" instrument_node="">). Afterwards, there have been numerous reports describing this phenomenon for forest tree species from tropical rainforest to typical Mediterranean and temperate forests (</span><a class="workspace-trigger" data-dcnode-id="12056" href="#bib0480" name="bbib0480"><span data-dcnode-id="12057" instrument_node="">Meinzer et al., 2004</span></a><span data-dcnode-id="12055" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12053" href="#bib0525" name="bbib0525"><span data-dcnode-id="12054" instrument_node="">Nadezhdina et al., 2008</span></a><span data-dcnode-id="12052" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12050" href="#bib0660" name="bbib0660"><span data-dcnode-id="12051" instrument_node="">Scholz et al., 2002</span></a><span data-dcnode-id="12049" instrument_node="">). Yet the process seems to be species-specific as recently reported in a mixed beech-oak stand (</span><a class="workspace-trigger" data-dcnode-id="12047" href="#bib0785" name="bbib0785"><span data-dcnode-id="12048" instrument_node="">Zapater et al., 2011</span></a><span data-dcnode-id="12046" instrument_node="">).</span></p></section></section><section data-dcnode-id="11815" id="sec0030"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="12037"><span data-dcnode-id="12042" instrument_node="">3</span><span data-dcnode-id="12040" instrument_node="">. </span><span data-dcnode-id="12038" instrument_node="">The interacting influence of species identity, age, size, stand structure and management in the forest water use</span></h2><p data-dcnode-id="11999" id="par0080"><span data-dcnode-id="12036" instrument_node="">Segregation of many forest tree species across ranges of soil and atmospheric moisture availability is linked to the control exercised over the water use, on the other hand related to the own sensitivity of different species to water scarcity (</span><a class="workspace-trigger" data-dcnode-id="12034" href="#bib0050" name="bbib0050"><span data-dcnode-id="12035" instrument_node="">Baquedano and Castillo, 2006</span></a><span data-dcnode-id="12033" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12031" href="#bib0140" name="bbib0140"><span data-dcnode-id="12032" instrument_node="">David et al., 2007</span></a><span data-dcnode-id="12030" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12028" href="#bib0130" name="bbib0130"><span data-dcnode-id="12029" instrument_node="">Chirino et al., 2011</span></a><span data-dcnode-id="12027" instrument_node="">). From Mediterranean to temperate and tropical areas, there is a plethora of strategies ranging from a characteristic isohydric performance to other fully anysohydric ones (</span><a class="workspace-trigger" data-dcnode-id="12025" href="#bib0130" name="bbib0130"><span data-dcnode-id="12026" instrument_node="">Chirino et al., 2011</span></a><span data-dcnode-id="12024" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12022" href="#bib0360" name="bbib0360"><span data-dcnode-id="12023" instrument_node="">Kumagai and Porporato, 2012</span></a><span data-dcnode-id="12021" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12019" href="#bib0700" name="bbib0700"><span data-dcnode-id="12020" instrument_node="">Tardieu and Simonneau, 1998</span></a><span data-dcnode-id="12018" instrument_node="">). In the first case a water saver performance is expected as soil moisture availability decreases, in the second one, a more water spender use of water is sustained by trees. A typical example is given by </span><em data-dcnode-id="12016"><span data-dcnode-id="12017" instrument_node="">Fagus sylvatica</span></em><span data-dcnode-id="12015" instrument_node=""> and </span><em data-dcnode-id="12013"><span data-dcnode-id="12014" instrument_node="">Quercus petraea</span></em><span data-dcnode-id="12012" instrument_node=""> under sub-Mediterranean conditions. The former has a very high sensitivity to the depletion of soil water supply, suffering higher decreases in sap flow density rates than </span><em data-dcnode-id="12010"><span data-dcnode-id="12011" instrument_node="">Q. petraea</span></em><span data-dcnode-id="12009" instrument_node=""> as drought advances in summer months (</span><a class="workspace-trigger" data-dcnode-id="12007" href="#bib0020" name="bbib0020"><span data-dcnode-id="12008" instrument_node="">Aranda et al., 2005</span></a><span data-dcnode-id="12006" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12004" href="#bib0315" name="bbib0315"><span data-dcnode-id="12005" instrument_node="">Jonard et al., 2011</span></a><span data-dcnode-id="12003" instrument_node="">). However, most species would represent a point in what should be more considered a range of variation in the water economy management, than a strict double categorical classification (</span><a class="workspace-trigger" data-dcnode-id="12001" href="#bib0200" name="bbib0200"><span data-dcnode-id="12002" instrument_node="">Franks et al., 2007</span></a><span data-dcnode-id="12000" instrument_node="">).</span></p><div data-dcnode-id="11941"><p data-dcnode-id="11976" id="par0085"><span data-dcnode-id="11998" instrument_node="">Along with the species-specific strategy followed in the water use (</span><a class="workspace-trigger" data-dcnode-id="11996" href="#bib0570" name="bbib0570"><span data-dcnode-id="11997" instrument_node="">Pataki and Oren, 2003</span></a><span data-dcnode-id="11995" instrument_node="">), other factors are fundamental to understand the water balance of forests. In this respect, two important structural drivers influence water consumption. Height of tree and its hierarchical position in the stand determine total volume of water transpired (</span><a class="workspace-trigger" data-dcnode-id="11993" href="#fig0015" name="bfig0015"><span data-dcnode-id="11994" instrument_node="">Fig. 3</span></a><span data-dcnode-id="11992" instrument_node="">). Frequently, dominant trees maintain higher sap flow densities in the sapwood, together a higher spending of total water as consequence of higher inputs of radiation into tree crowns (</span><a class="workspace-trigger" data-dcnode-id="11990" href="#bib0445" name="bbib0445"><span data-dcnode-id="11991" instrument_node="">Martin et al., 1997</span></a><span data-dcnode-id="11989" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11987" href="#bib0475" name="bbib0475"><span data-dcnode-id="11988" instrument_node="">Meinzer et al., 1999</span></a><span data-dcnode-id="11986" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11984" href="#bib0240" name="bbib0240"><span data-dcnode-id="11985" instrument_node="">Granier et al., 2000</span></a><span data-dcnode-id="11983" instrument_node="">). Different sensitivity of leaf stomatal response to evaporative demand with tree height brings about also differences in the sap flow of tree (</span><a class="workspace-trigger" data-dcnode-id="11981" href="#bib0760" name="bbib0760"><span data-dcnode-id="11982" instrument_node="">Woodruff et al., 2010</span></a><span data-dcnode-id="11980" instrument_node="">). Even more, whether forest tree species grow in pure or mixed stands, it is also a factor that modifies the species-specific response and performance in terms of individual tree sap flow, conditioning the overall water use of stand in the last (</span><a class="workspace-trigger" data-dcnode-id="11978" href="#bib0315" name="bbib0315"><span data-dcnode-id="11979" instrument_node="">Jonard et al., 2011</span></a><span data-dcnode-id="11977" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="11942" id="fig0015"><span data-dcnode-id="11966"><img alt="" data-dcnode-id="11975" height="158" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378377412001722-gr3.jpg&amp;raw"><span data-dcnode-id="11974" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11967"><li data-dcnode-id="11968"><a class="anchor download-link u-font-sans" data-dcnode-id="11969" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0378377412001722-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11970"><span data-dcnode-id="11973" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11971"><span data-dcnode-id="11972" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11943"><span data-dcnode-id="11944"><p data-dcnode-id="11945" id="spar0025"><span class="label" data-dcnode-id="11964"><span data-dcnode-id="11965" instrument_node="">Fig. 3</span></span><span data-dcnode-id="11963" instrument_node="">. </span><span data-dcnode-id="11961" instrument_node="">Water is used by trees in Mediterranean mid-mountains conditions according to its hierarchical position in the stand. Sensitivity of species to the depletion of soil moisture as season advance is of prime importance as well. There were significant differences for </span><em data-dcnode-id="11959"><span data-dcnode-id="11960" instrument_node="">Fagus sylvatica</span></em><span data-dcnode-id="11958" instrument_node=""> (Fs) and </span><em data-dcnode-id="11956"><span data-dcnode-id="11957" instrument_node="">Quercus petraea</span></em><span data-dcnode-id="11955" instrument_node=""> (Qp) in the water use at midday, and whether dominant (Do) or co-dominant the status of tree in the stand. The differences were maintained only for Qp as the season progressed. Average values represent water use by trees at midday in three dates on July and August in the Beech-Oak forest of Montejo de la Sierra (</span><em data-dcnode-id="11953"><span data-dcnode-id="11954" instrument_node="">n</span></em><span data-dcnode-id="11952" instrument_node="">&nbsp;</span><span data-dcnode-id="11950" instrument_node="">=</span><span data-dcnode-id="11948" instrument_node="">&nbsp;</span><span data-dcnode-id="11946" instrument_node="">4, ±S.E.). This forest represents one of the southernmost beech populations in west of Europe. (A. Forner original unpublished data.)</span></p></span></span></figure></div><p data-dcnode-id="11918" id="par0090"><span data-dcnode-id="11940" instrument_node="">Beyond the size of the tree and its dominance of the forest stand, its own age profoundly modulates its water use (</span><a class="workspace-trigger" data-dcnode-id="11938" href="#bib0155" name="bbib0155"><span data-dcnode-id="11939" instrument_node="">Delzon and Loustau, 2005</span></a><span data-dcnode-id="11937" instrument_node="">). As trees age, there is a progressive decrease in the movement of water per sapwood unit, explained by what has been termed “the hydraulic limitation hypothesis” (</span><a class="workspace-trigger" data-dcnode-id="11935" href="#bib0630" name="bbib0630"><span data-dcnode-id="11936" instrument_node="">Ryan and Yoder, 1997</span></a><span data-dcnode-id="11934" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11932" href="#bib0625" name="bbib0625"><span data-dcnode-id="11933" instrument_node="">Ryan et al., 2006</span></a><span data-dcnode-id="11931" instrument_node="">). The lost of efficiency through the hydraulic path as tree ages, in terms of lower leaf-specific hydraulic conductance, would explain a more water conservative performance at the leaf stomatal control level at the top of the tree crown. This has practical consequences on the water used by natural or artificial forests. If stands are structured according to young or old age tree classes impacts directly in the forest water budget. For a similar sapwood area, young trees tend to maintain higher rates of transpiration than old ones. In this respect, silviculture practices focuses to maintain short rotation systems might promote a more water spending use by outstanding trees (</span><a class="workspace-trigger" data-dcnode-id="11929" href="#bib0385" name="bbib0385"><span data-dcnode-id="11930" instrument_node="">Lagergren and Lindroth, 2004</span></a><span data-dcnode-id="11928" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11926" href="#bib0190" name="bbib0190"><span data-dcnode-id="11927" instrument_node="">Forrester et al., 2010</span></a><span data-dcnode-id="11925" instrument_node="">). In the same way, some perturbations as wildfires or intensive logging prompt transformation of old to re-growth forests or coppice, the direct impact being an increase in the water consumption by forest in subsequent years (</span><a class="workspace-trigger" data-dcnode-id="11923" href="#bib0095" name="bbib0095"><span data-dcnode-id="11924" instrument_node="">Buckley et al., 2012</span></a><span data-dcnode-id="11922" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11920" href="#bib0430" name="bbib0430"><span data-dcnode-id="11921" instrument_node="">Macfarlane et al., 2010</span></a><span data-dcnode-id="11919" instrument_node="">).</span></p><p data-dcnode-id="11904" id="par0095"><span data-dcnode-id="11917" instrument_node="">Therefore, modification in the structure of stand as a consequence of different management practices, impacts directly in the water used by the remaining trees (</span><a class="workspace-trigger" data-dcnode-id="11915" href="#bib0065" name="bbib0065"><span data-dcnode-id="11916" instrument_node="">Bréda et al., 1995</span></a><span data-dcnode-id="11914" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11912" href="#bib0300" name="bbib0300"><span data-dcnode-id="11913" instrument_node="">Jiménez et al., 2008</span></a><span data-dcnode-id="11911" instrument_node="">). Coppice or seedling re-establishment are two different forest management practices for regeneration of natural forests or plantations, both also influencing forest water economy in the following years after the silvicultural practice (</span><a class="workspace-trigger" data-dcnode-id="11909" href="#bib0170" name="bbib0170"><span data-dcnode-id="11910" instrument_node="">Drake et al., 2012</span></a><span data-dcnode-id="11908" instrument_node="">). The former involves a higher development of root system which translate into a better access to deep water resources from groundwater, together with larger water interception and stand-scale transpiration rate (</span><a class="workspace-trigger" data-dcnode-id="11906" href="#bib0170" name="bbib0170"><span data-dcnode-id="11907" instrument_node="">Drake et al., 2012</span></a><span data-dcnode-id="11905" instrument_node="">). This would result in a more wasteful water use in stands maintained in a permanent re-growth state as coppice, at least on the first years after logging and re-sprouting of stumps.</span></p><p data-dcnode-id="11851" id="par0100"><span data-dcnode-id="11903" instrument_node="">The need of a precise knowledge of the water consumption of forest tree species or specific stand structure, it is also extensible to the impact of some management practices such as forest thinning (</span><a class="workspace-trigger" data-dcnode-id="11901" href="#bib0065" name="bbib0065"><span data-dcnode-id="11902" instrument_node="">Bréda et al., 1995</span></a><span data-dcnode-id="11900" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11898" href="#bib0250" name="bbib0250"><span data-dcnode-id="11899" instrument_node="">Gyenge et al., 2011</span></a><span data-dcnode-id="11897" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11895" href="#bib0515" name="bbib0515"><span data-dcnode-id="11896" instrument_node="">Moreno and Cubera, 2008</span></a><span data-dcnode-id="11894" instrument_node="">). Silvicultural treatments where forest stand stocking is reduced bring about direct structural changes making more open the stand. This has an impact not only in the interrelationships among residual trees (</span><a class="workspace-trigger" data-dcnode-id="11892" href="#bib0300" name="bbib0300"><span data-dcnode-id="11893" instrument_node="">Jiménez et al., 2008</span></a><span data-dcnode-id="11891" instrument_node="">), and species in the case of mixed stands (</span><a class="workspace-trigger" data-dcnode-id="11889" href="#bib0060" name="bbib0060"><span data-dcnode-id="11890" instrument_node="">Bladon et al., 2006</span></a><span data-dcnode-id="11888" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11886" href="#bib0265" name="bbib0265"><span data-dcnode-id="11887" instrument_node="">Herbst et al., 2008</span></a><span data-dcnode-id="11885" instrument_node="">), but also on the surrounding microclimate conditions (</span><a class="workspace-trigger" data-dcnode-id="11883" href="#bib0800" name="bbib0800"><span data-dcnode-id="11884" instrument_node="">Zheng et al., 2000</span></a><span data-dcnode-id="11882" instrument_node="">). Its well established that a decrease in tree density prompt an immediate positive effect on remnant trees, increasing on many cases the use of resources such as water (</span><a class="workspace-trigger" data-dcnode-id="11880" href="#tbl0010" name="btbl0010"><span data-dcnode-id="11881" instrument_node="">Table 2</span></a><span data-dcnode-id="11879" instrument_node="">), and improving growth in the subsequent years after stand stocking decrease (</span><a class="workspace-trigger" data-dcnode-id="11877" href="#bib0065" name="bbib0065"><span data-dcnode-id="11878" instrument_node="">Bréda et al., 1995</span></a><span data-dcnode-id="11876" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11874" href="#bib0235" name="bbib0235"><span data-dcnode-id="11875" instrument_node="">Gracia et al., 1999</span></a><span data-dcnode-id="11873" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11871" href="#bib0380" name="bbib0380"><span data-dcnode-id="11872" instrument_node="">Lagergren et al., 2008</span></a><span data-dcnode-id="11870" instrument_node="">). Amelioration of growth is clearly related with an increase in the water and radiation availability. However, it has been also observed on some cases, an abrupt change in the evaporative demand around remaining trees after cutting. This increases the xylem tension drop below the hydraulic margins of security for the hydraulic system of standing trees (</span><a class="workspace-trigger" data-dcnode-id="11868" href="#bib0060" name="bbib0060"><span data-dcnode-id="11869" instrument_node="">Bladon et al., 2006</span></a><span data-dcnode-id="11867" instrument_node="">). In the last, this could translate in a negative impact on the tree hydraulic system, provoking an increase of xylem dysfunction. The response is highly species-specific as shown by </span><a class="workspace-trigger" data-dcnode-id="11865" href="#bib0060" name="bbib0060"><span data-dcnode-id="11866" instrument_node="">Bladon et al. (2006)</span></a><span data-dcnode-id="11864" instrument_node=""> from a variable retention partial harvesting stand experiment. Forest tree species making up the mixed stand responded in a very different way. There was an improved in the water use of residual trees in </span><em data-dcnode-id="11862"><span data-dcnode-id="11863" instrument_node="">Picea glauca</span></em><span data-dcnode-id="11861" instrument_node=""> at the clear cutting plot, a moderate and slight increase in </span><em data-dcnode-id="11859"><span data-dcnode-id="11860" instrument_node="">Betula papyrifera</span></em><span data-dcnode-id="11858" instrument_node=""> and the maintenance of the same water consumption between control and cleared plots for </span><em data-dcnode-id="11856"><span data-dcnode-id="11857" instrument_node="">Populus balsamifera</span></em><span data-dcnode-id="11855" instrument_node="">. In the case of </span><em data-dcnode-id="11853"><span data-dcnode-id="11854" instrument_node="">Populus</span></em><span data-dcnode-id="11852" instrument_node=""> there was an increase in the risk of hydraulic failure after the thinning.</span></p><p data-dcnode-id="11816" id="par0105"><span data-dcnode-id="11850" instrument_node="">One the most important needs of information to assure management of new planted and natural forest in a sustainable way in the future is related to the water requirements of forests. The specific composition, along with structure, will be both the main drivers in the forest water use. This issue is especially relevant for areas of the world as tropical zones where basic information in the water use at the specific level is scarce (</span><a class="workspace-trigger" data-dcnode-id="11848" href="#bib0375" name="bbib0375"><span data-dcnode-id="11849" instrument_node="">Kunert et al., 2010</span></a><span data-dcnode-id="11847" instrument_node="">). Water is already a problem in wide areas of the world as the Mediterranean Basin. This obligates to have a good knowledge on the specie-specific water use at the tree level for plant materials used in reforestation programs, given the aforementioned different strategies followed by forest tree species. In order to assure sustainability of planted forest stands in the future, it is needed to ascertain how much water will be used by these new forest systems (</span><a class="workspace-trigger" data-dcnode-id="11845" href="#bib0585" name="bbib0585"><span data-dcnode-id="11846" instrument_node="">Petzold et al., 2010</span></a><span data-dcnode-id="11844" instrument_node="">), paying attention to the impact of natural hazards such as intensification of droughts in the water use by forest tree species in general (</span><a class="workspace-trigger" data-dcnode-id="11842" href="#bib0440" name="bbib0440"><span data-dcnode-id="11843" instrument_node="">Martínez-Vilalta et al., 2003</span></a><span data-dcnode-id="11841" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11839" href="#bib0205" name="bbib0205"><span data-dcnode-id="11840" instrument_node="">Gartner et al., 2009</span></a><span data-dcnode-id="11838" instrument_node="">). For instance, new plantations aimed to produce biomass as source for bioenergetic use, might increase the water consumed with regard traditional agricultural crops or natural forests (</span><a class="workspace-trigger" data-dcnode-id="11836" href="#bib0255" name="bbib0255"><span data-dcnode-id="11837" instrument_node="">Gyenge et al., 2008</span></a><span data-dcnode-id="11835" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11833" href="#bib0585" name="bbib0585"><span data-dcnode-id="11834" instrument_node="">Petzold et al., 2010</span></a><span data-dcnode-id="11832" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="11830" href="#bib0715" name="bbib0715"><span data-dcnode-id="11831" instrument_node="">Tricker et al. (2009)</span></a><span data-dcnode-id="11829" instrument_node=""> reported an increase in the annual water use by </span><em data-dcnode-id="11827"><span data-dcnode-id="11828" instrument_node="">Populus</span></em><span data-dcnode-id="11826" instrument_node=""> trees in bioenergy plantation under the future higher air CO</span><sub data-dcnode-id="11824"><span data-dcnode-id="11825" instrument_node="">2</span></sub><span data-dcnode-id="11823" instrument_node=""> levels expected in the next decades. This was despite the response, in terms of lower leaf stomatal conductance, followed the general pattern of decrease in the CO</span><sub data-dcnode-id="11821"><span data-dcnode-id="11822" instrument_node="">2</span></sub><span data-dcnode-id="11820" instrument_node=""> enriched air treatment regarding ambient conditions. Increases in other factors such as total leaf biomass would compensate the lowering in the water use at the leaf level. If these data are confirmed, the result could be the establishment of new plant production systems that would not be sustainable in relation to available water resources at some places in the world (</span><a class="workspace-trigger" data-dcnode-id="11818" href="#bib0160" name="bbib0160"><span data-dcnode-id="11819" instrument_node="">Delucchi, 2010</span></a><span data-dcnode-id="11817" instrument_node="">). The picture could be worse considering the forecasted more extreme dry period that forests will have to withstand in areas as the Mediterranean (IPCC 2007), or even ample tropical zones.</span></p></section><section data-dcnode-id="11698" id="sec0035"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11809"><span data-dcnode-id="11814" instrument_node="">4</span><span data-dcnode-id="11812" instrument_node="">. </span><span data-dcnode-id="11810" instrument_node="">Water use by forests and impact at the landscape scale</span></h2><p data-dcnode-id="11750" id="par0110"><span data-dcnode-id="11808" instrument_node="">Trees exert a strong control over the terrestrial ecosystem water cycle through their effect on forest water use (</span><a class="workspace-trigger" data-dcnode-id="11806" href="#bib0690" name="bbib0690"><span data-dcnode-id="11807" instrument_node="">Stoy et al., 2006</span></a><span data-dcnode-id="11805" instrument_node="">). As a consequence, changes in land cover may lead to profound hydrological changes, affecting the water balance and the quantity and quality of water resources (</span><a class="workspace-trigger" data-dcnode-id="11803" href="#bib0370" name="bbib0370"><span data-dcnode-id="11804" instrument_node="">Kume et al., 2007</span></a><span data-dcnode-id="11802" instrument_node="">). During the last decade, afforestations have been proposed as a promising tool for carbon sequestration, but their full environmental consequences have not been considered. Regarding water budgets, current evidence suggests that tree plantations usually reduce stream flow and groundwater recharge (</span><a class="workspace-trigger" data-dcnode-id="11800" href="#bib0180" name="bbib0180"><span data-dcnode-id="11801" instrument_node="">Farley et al., 2005</span></a><span data-dcnode-id="11799" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11797" href="#bib0530" name="bbib0530"><span data-dcnode-id="11798" instrument_node="">Nosetto et al., 2011</span></a><span data-dcnode-id="11796" instrument_node="">), since tree covers present greater evapotranspiratory capacity than croplands and herbaceous covers (</span><a class="workspace-trigger" data-dcnode-id="11794" href="#bib0180" name="bbib0180"><span data-dcnode-id="11795" instrument_node="">Farley et al., 2005</span></a><span data-dcnode-id="11793" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11791" href="#bib0285" name="bbib0285"><span data-dcnode-id="11792" instrument_node="">Huxman et al., 2005</span></a><span data-dcnode-id="11790" instrument_node="">). The combination of deeper root systems extended growing seasons, higher transpiration rates, greater interception of precipitation and higher inputs of radiant energy because of lower albedos explain the higher evapotranspiration and lower deep drainage in forest compared to herbaceous covers or croplands (</span><a class="workspace-trigger" data-dcnode-id="11788" href="#bib0325" name="bbib0325"><span data-dcnode-id="11789" instrument_node="">Kelliher et al., 1993</span></a><span data-dcnode-id="11787" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11785" href="#bib0110" name="bbib0110"><span data-dcnode-id="11786" instrument_node="">Canadell et al., 1996</span></a><span data-dcnode-id="11784" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11782" href="#bib0530" name="bbib0530"><span data-dcnode-id="11783" instrument_node="">Nosetto et al., 2011</span></a><span data-dcnode-id="11781" instrument_node="">). Due to these hydrological impacts reforestations programs are considered as a land use activity that may threaten water resources security, particularly in some drought prone areas (</span><a class="workspace-trigger" data-dcnode-id="11779" href="#bib0575" name="bbib0575"><span data-dcnode-id="11780" instrument_node="">Pacala and Socolow, 2004</span></a><span data-dcnode-id="11778" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11776" href="#bib0295" name="bbib0295"><span data-dcnode-id="11777" instrument_node="">Jackson et al., 2005</span></a><span data-dcnode-id="11775" instrument_node="">). In a global synthesis study, </span><a class="workspace-trigger" data-dcnode-id="11773" href="#bib0180" name="bbib0180"><span data-dcnode-id="11774" instrument_node="">Farley et al. (2005)</span></a><span data-dcnode-id="11772" instrument_node=""> showed that afforestation of grass and shrublands reduced annual runoff on average by 44% and by 31%, respectively. Similarly, stream flow reductions of up to 50% have been reported in the Ecuadorian Andes (</span><a class="workspace-trigger" data-dcnode-id="11770" href="#bib0100" name="bbib0100"><span data-dcnode-id="11771" instrument_node="">Buytaert et al., 2007</span></a><span data-dcnode-id="11769" instrument_node="">) after afforestation with </span><em data-dcnode-id="11767"><span data-dcnode-id="11768" instrument_node="">Pinus</span></em><span data-dcnode-id="11766" instrument_node=""> plantations while a water budget study in Brazil demonstrated that 95% of the precipitation is evapotranspirated by </span><em data-dcnode-id="11764"><span data-dcnode-id="11765" instrument_node="">Eucalypt</span></em><span data-dcnode-id="11763" instrument_node=""> plantations (</span><a class="workspace-trigger" data-dcnode-id="11761" href="#bib0005" name="bbib0005"><span data-dcnode-id="11762" instrument_node="">Almeida et al., 2007</span></a><span data-dcnode-id="11760" instrument_node="">). However, positive effects related to the control of flooding or the improvement of the quality of water resources are also claimed as main arguments for reforestation programs. In some cases, due to higher root density, microfaunal activity and/or content of soil organic matter and litter, tree plantations may improve the porosity and capacity of water transport of soils, improving water infiltration and deep drainage, and reducing erosion and the volume of sediment, nutrients and salt volumes transported into river systems (</span><a class="workspace-trigger" data-dcnode-id="11758" href="#bib0535" name="bbib0535"><span data-dcnode-id="11759" instrument_node="">Nosetto et al., 2007</span></a><span data-dcnode-id="11757" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11755" href="#bib0730" name="bbib0730"><span data-dcnode-id="11756" instrument_node="">Van Dijk and Keenan, 2007</span></a><span data-dcnode-id="11754" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11752" href="#bib0530" name="bbib0530"><span data-dcnode-id="11753" instrument_node="">Nosetto et al., 2011</span></a><span data-dcnode-id="11751" instrument_node="">).</span></p><p data-dcnode-id="11730" id="par0115"><span data-dcnode-id="11749" instrument_node="">Replacement of native woody vegetation by tree plantations has also strong effect on the water cycle. Reforestation programs usually used fast-growing species which are characterized by higher productivity and biomass, but also by higher annual transpiration and rainfall interception, particularly for fast growing evergreen species such as pines and eucalypts (</span><a class="workspace-trigger" data-dcnode-id="11747" href="#bib0180" name="bbib0180"><span data-dcnode-id="11748" instrument_node="">Farley et al., 2005</span></a><span data-dcnode-id="11746" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="11744" href="#bib0255" name="bbib0255"><span data-dcnode-id="11745" instrument_node="">Gyenge et al. (2008)</span></a><span data-dcnode-id="11743" instrument_node=""> demonstrated significantly greater water use by ponderosa pine plantations compared to natives </span><em data-dcnode-id="11741"><span data-dcnode-id="11742" instrument_node="">Austrocedrus chilensis</span></em><span data-dcnode-id="11740" instrument_node=""> forests in NW Patagonia. Hydraulic characteristics of </span><em data-dcnode-id="11738"><span data-dcnode-id="11739" instrument_node="">P. ponderosa</span></em><span data-dcnode-id="11737" instrument_node=""> (higher canopy-stomatal, whole hydraulic conductances and specific hydraulic conductivity) allow high stomatal conductance for more hours a day than </span><em data-dcnode-id="11735"><span data-dcnode-id="11736" instrument_node="">A. chilensis</span></em><span data-dcnode-id="11734" instrument_node=""> trees, and therefore greater transpiration. In a study of more than 600 observations, </span><a class="workspace-trigger" data-dcnode-id="11732" href="#bib0295" name="bbib0295"><span data-dcnode-id="11733" instrument_node="">Jackson et al. (2005)</span></a><span data-dcnode-id="11731" instrument_node=""> found reductions stream flows by almost 52% when native vegetation was replaced by forest plantations. In some cases, establishment of plantations caused streams to dry completely, especially in drier regions.</span></p><p data-dcnode-id="11713" id="par0120"><span data-dcnode-id="11729" instrument_node="">By contrast to afforestation, deforestation usually leads to increases in stream flows and ground water recharge since evapotranspiration is considerably reduced (</span><a class="workspace-trigger" data-dcnode-id="11727" href="#bib0180" name="bbib0180"><span data-dcnode-id="11728" instrument_node="">Farley et al., 2005</span></a><span data-dcnode-id="11726" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11724" href="#bib0530" name="bbib0530"><span data-dcnode-id="11725" instrument_node="">Nosetto et al., 2011</span></a><span data-dcnode-id="11723" instrument_node="">). Native forest clearing for cropping in Australia and the Sahel has led to increased groundwater recharge, arising of water table levels due to the lower evapotranspiration rates of croplands (</span><a class="workspace-trigger" data-dcnode-id="11721" href="#bib0675" name="bbib0675"><span data-dcnode-id="11722" instrument_node="">Schofield, 1992</span></a><span data-dcnode-id="11720" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11718" href="#bib0405" name="bbib0405"><span data-dcnode-id="11719" instrument_node="">Leblanc et al., 2008</span></a><span data-dcnode-id="11717" instrument_node="">). Similarly, </span><a class="workspace-trigger" data-dcnode-id="11715" href="#bib0530" name="bbib0530"><span data-dcnode-id="11716" instrument_node="">Nosetto et al. (2011)</span></a><span data-dcnode-id="11714" instrument_node=""> predict that replacement of large areas of dry forests by soybean crops in central Argentina would reduce evapotranspiration in a 30% and would almost increase three fold deep drainage fluxes.</span></p><p data-dcnode-id="11699" id="par0125"><span data-dcnode-id="11712" instrument_node="">Nevertheless, the impact of the hydrological changes generated by land-use changes varies depending on context where land use shifts occur (</span><a class="workspace-trigger" data-dcnode-id="11710" href="#bib0730" name="bbib0730"><span data-dcnode-id="11711" instrument_node="">Van Dijk and Keenan, 2007</span></a><span data-dcnode-id="11709" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11707" href="#bib0530" name="bbib0530"><span data-dcnode-id="11708" instrument_node="">Nosetto et al., 2011</span></a><span data-dcnode-id="11706" instrument_node="">). In drought prone regions the potential reductions of water resources caused by forest plantations are smaller in absolute terms than in humid regions, but the impact can be environmental, economical and socially more harmful due to the already scarce water availability. Even more, hydrological modification could trigger positive or negative impacts on water cycle depending on the context. For example, tree plantation in flooding-prone places may be positive, since it can reduce the risk of flooding and improve the soil drainage capacity. By contrast, afforestation in semiarid environments would reduce water availability even more. The replacement of forests by crops can improve stream flows and ground water recharge, but it could also cause the rise of water table levels, flooding and salinization (</span><a class="workspace-trigger" data-dcnode-id="11704" href="#bib0025" name="bbib0025"><span data-dcnode-id="11705" instrument_node="">Archibald et al., 2006</span></a><span data-dcnode-id="11703" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11701" href="#bib0580" name="bbib0580"><span data-dcnode-id="11702" instrument_node="">Peck, 1978</span></a><span data-dcnode-id="11700" instrument_node="">). In addition, for a given climatic condition, there are different options for developing sustainable forest management strategies in order to control or minimize the potential hydrological impacts of tree plantations: terrain conditions, planting arrangement, species physiology, water use efficiency, variation in stand age, spacing, site productivity, forestry operations, proportion of area planted, etc.</span></p></section><section data-dcnode-id="11689" id="sec0040"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11692"><span data-dcnode-id="11697" instrument_node="">5</span><span data-dcnode-id="11695" instrument_node="">. </span><span data-dcnode-id="11693" instrument_node="">Main conclusions and remarks</span></h2><p data-dcnode-id="11690" id="par0130"><span data-dcnode-id="11691" instrument_node="">Water is a keystone element influencing performance of forest tree species worldwide. The impact of water availability on the ecology and evolution of plants in general, has been one of the most important subjects of study for functional plant ecologists in the last decades. Main environmental factors influencing the species-specific water use by forest tree species, and the different functional strategies, are beginning to be elucidated. Nevertheless it must be recognized that there are important gaps in current functional knowledge regarding water use for many forest tree species, especially in tropical zones. Functional mechanisms governing water use at different scales of biological integration have been assessed in detail during the last decades. However, the complexity in the response to water availability, always interacting with other factors of the environment such as light or nutrients, and the proper structural complexity of forest ecosystems, explain the difficulties to implement water used by forest tree species as criteria in management practice. In any case, management of forests must guarantee the sustainability of forest stands in the future, taken into account the well documented relationship between forest health, tree growth and water availability. Management must make possible the difficult interplay between forests as water spenders and carbon fixing sinks. Some natural and artificial forest could be in serious risk of die-back and mortality of dominant trees as a consequence of a general harshening of climate in terms of more acute dry periods. This reinforces the urgent need to establish, despite the many aforementioned difficulties, the inclusion of water use as one of the main targets in the management of forest in the future, and within the context of a rapidly changing world. The issue is especially relevant for the new plantations planned to provide different goodness from biomass for bioenergetics purposes to soil protection from desertification.</span></p></section></div><section data-dcnode-id="11671" id="aep-acknowledgment-id15"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11686"><span data-dcnode-id="11687" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="11672" id="par0140"><span data-dcnode-id="11685" instrument_node="">Authors appreciate the kind invitation of the organizers of the XI Spanish-Portuguese Symposium of Plant Water Relations to contribute with present article. This work was supported by the </span><span data-dcnode-id="11683" id="gs0005"><span data-dcnode-id="11684" instrument_node="">INIA</span></span><span data-dcnode-id="11682" instrument_node=""> and </span><span data-dcnode-id="11680" id="gs0010"><span data-dcnode-id="11681" instrument_node="">Ministry of Economy and Competitiveness</span></span><span data-dcnode-id="11679" instrument_node=""> (grants </span><a data-dcnode-id="11677" href="#gs0005"><span data-dcnode-id="11678" instrument_node="">SUM2008-00004-C03-01</span></a><span data-dcnode-id="11676" instrument_node=""> and </span><a data-dcnode-id="11674" href="#gs0010"><span data-dcnode-id="11675" instrument_node="">AGL2011-25365</span></a><span data-dcnode-id="11673" instrument_node="">).</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="11663" D.</span><span data-dcnode-id="11630" instrument_node=""> </span><span data-dcnode-id="11628" instrument_node="">Rezende</span><div data-dcnode-id="11625"><strong class="title" data-dcnode-id="11626"><span data-dcnode-id="11627" instrument_node="">Growth and water balance of Eucalyptus grandis hybrid plantations in Brazil during a rotation for pulp production</span></strong></div></div><div class="host" data-dcnode-id="11604"><span data-dcnode-id="11623" instrument_node="">Forest Ecol. Manage.</span><span data-dcnode-id="11621" instrument_node="">, </span><span data-dcnode-id="11619" instrument_node="">251</span><span data-dcnode-id="11617" instrument_node=""> (</span><span data-dcnode-id="11615" instrument_node="">2007</span><span data-dcnode-id="11613" instrument_node="">)</span><span data-dcnode-id="11611" instrument_node="">, pp. </span><span data-dcnode-id="11609" instrument_node="">10</span><span data-dcnode-id="11607" instrument_node="">-</span><span data-dcnode-id="11605" instrument_node="">21</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="11588"><a class="link" data-dcnode-id="11602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S037811270700463X"><span data-dcnode-id="11603" instrument_node="">Article</span></a><a class="anchor pdf link" data-dcnode-id="11594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S037811270700463X/pdfft%3Fmd5%3De24256f7d5f2aab88b168425f2984414%26pid%3D1-s2.0-S037811270700463X-main.pdf" rel="nofollow" target="_blank"><svg class="icon icon-pdf-multicolor" data-dcnode-id="11597" focusable="false" height="24" viewBox="0 0 32 32" width="24"><path d="M7 .362h17.875l6.763 6.1V31.64H6.948V16z" data-dcnode-id="11601" fill="#fff" stroke="#000" stroke-width=".703"></path><path d="M.167 2.592H22.39V9.72H.166z" data-dcnode-id="11600" fill="#da0000" stroke="#aaa" stroke-width=".315"
