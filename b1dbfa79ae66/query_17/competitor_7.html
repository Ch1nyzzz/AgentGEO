"">Fun Fact</span><br data-dcnode-id="4487"></span></h3><p class="sc-gGCDDS lbFTHT pf-137_" data-dcnode-id="4481" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-139_" data-dcnode-id="4482" data-pf-type="Text"><span data-dcnode-id="4484" instrument_node="">The specific name, "Occidentalis", means "west," the direction from Sweden where this tree was discovered.</span><br data-dcnode-id="4483"></span></p><h3 class="sc-ezbkAF deEGdS pf-140_" data-dcnode-id="4477" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-142_" data-dcnode-id="4478" data-pf-type="Text"><span data-dcnode-id="4480" instrument_node="">Planting Region</span><br data-dcnode-id="4479"></span></h3><p class="sc-gGCDDS lbFTHT pf-143_" data-dcnode-id="4472" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-145_" data-dcnode-id="4473" data-pf-type="Text"><a data-dcnode-id="4475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="4476" instrument_node="">North America</span></a><br data-dcnode-id="4474"></span></p></div></div><div class="pf-c" data-dcnode-id="4444" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-146_" data-dcnode-id="4445" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-147_" data-dcnode-id="4469" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-ace4d9f8-5211-4b0c-8e67-a83d6b032bbf--Untitled-design-2.png%3F57820&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-ace4d9f8-5211-4b0c-8e67-a83d6b032bbf--Untitled-design-2.png?57820 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-148_" data-dcnode-id="4466" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-150_" data-dcnode-id="4467" data-pf-type="Text"><span data-dcnode-id="4468" instrument_node="">American Beech</span></span></h3><p class="sc-gGCDDS lbFTHT pf-151_" data-dcnode-id="4463" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-153_" data-dcnode-id="4464" data-pf-type="Text"><span data-dcnode-id="4465" instrument_node="">One of the most well-known trees in the state, given its wide distribution across forests. It is excellent as fuelwood. The disease on the bark of beech trees is currently threatening the species across its entire range.</span></span></p><h3 class="sc-ezbkAF deEGdS pf-154_" data-dcnode-id="4459" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-156_" data-dcnode-id="4460" data-pf-type="Text"><span data-dcnode-id="4462" instrument_node="">Fun Fact</span><br data-dcnode-id="4461"></span></h3><p class="sc-gGCDDS lbFTHT pf-157_" data-dcnode-id="4455" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-159_" data-dcnode-id="4456" data-pf-type="Text"><span data-dcnode-id="4458" instrument_node="">Beechnut was used as food for the cattle. Many forest mammals and birds consume beechnuts as a regular part of their diet.</span><br data-dcnode-id="4457"></span></p><h3 class="sc-ezbkAF deEGdS pf-160_" data-dcnode-id="4451" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-162_" data-dcnode-id="4452" data-pf-type="Text"><span data-dcnode-id="4454" instrument_node="">Planting Region</span><br data-dcnode-id="4453"></span></h3><p class="sc-gGCDDS lbFTHT pf-163_" data-dcnode-id="4446" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-165_" data-dcnode-id="4447" data-pf-type="Text"><a data-dcnode-id="4449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="4450" instrument_node="">North America</span></a><br data-dcnode-id="4448"></span></p></div></div><div class="pf-c" data-dcnode-id="4415" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-166_" data-dcnode-id="4416" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-167_" data-dcnode-id="4443" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-f606af62-dd98-42f8-9b23-2fad46c429c2--Untitled-design-3.png%3F57832&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-f606af62-dd98-42f8-9b23-2fad46c429c2--Untitled-design-3.png?57832 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-168_" data-dcnode-id="4440" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-170_" data-dcnode-id="4441" data-pf-type="Text"><span data-dcnode-id="4442" instrument_node="">American Chestnut</span></span></h3><p class="sc-gGCDDS lbFTHT pf-171_" data-dcnode-id="4435" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-173_" data-dcnode-id="4436" data-pf-type="Text"><span data-dcnode-id="4439" instrument_node="">The American chestnut tree was once a dominant forest species, but due to a blight disease, is now rare. Before the blight, trees grew close to 115 ft tall, now surviving trees are smaller than 32 ft.</span><br data-dcnode-id="4438"><br data-dcnode-id="4437"></span></p><h3 class="sc-ezbkAF deEGdS pf-174_" data-dcnode-id="4431" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-176_" data-dcnode-id="4432" data-pf-type="Text"><span data-dcnode-id="4434" instrument_node="">Fun Fact</span><br data-dcnode-id="4433"></span></h3><p class="sc-gGCDDS lbFTHT pf-177_" data-dcnode-id="4426" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-179_" data-dcnode-id="4427" data-pf-type="Text"><span data-dcnode-id="4430" instrument_node="">Chestnuts can be consumed raw, baked, boiled or roasted. It also can be dried and milled into flour.</span><br data-dcnode-id="4429"><br data-dcnode-id="4428"></span></p><h3 class="sc-ezbkAF deEGdS pf-180_" data-dcnode-id="4422" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-182_" data-dcnode-id="4423" data-pf-type="Text"><span data-dcnode-id="4425" instrument_node="">Planting Region</span><br data-dcnode-id="4424"></span></h3><p class="sc-gGCDDS lbFTHT pf-183_" data-dcnode-id="4417" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-185_" data-dcnode-id="4418" data-pf-type="Text"><a data-dcnode-id="4420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="4421" instrument_node="">North America</span></a><br data-dcnode-id="4419"></span></p></div></div><div class="pf-c" data-dcnode-id="4387" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-186_" data-dcnode-id="4388" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-187_" data-dcnode-id="4414" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-cd923148-dcfa-4f8d-8ea3-d0bcf9c98983--Untitled-design-4.png%3F57844&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-cd923148-dcfa-4f8d-8ea3-d0bcf9c98983--Untitled-design-4.png?57844 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-188_" data-dcnode-id="4411" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-190_" data-dcnode-id="4412" data-pf-type="Text"><span data-dcnode-id="4413" instrument_node="">American Elm</span></span></h3><p class="sc-gGCDDS lbFTHT pf-191_" data-dcnode-id="4407" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-193_" data-dcnode-id="4408" data-pf-type="Text"><span data-dcnode-id="4410" instrument_node="">The wood is strong and coarse-grained; largely used for veneer, crates and wheel hubs. It has nearly disappeared because of the Dutch Elm disease.&nbsp;&nbsp;</span><br data-dcnode-id="4409"></span></p><h3 class="sc-ezbkAF deEGdS pf-194_" data-dcnode-id="4403" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-196_" data-dcnode-id="4404" data-pf-type="Text"><span data-dcnode-id="4406" instrument_node="">Fun Fact</span><br data-dcnode-id="4405"></span></h3><p class="sc-gGCDDS lbFTHT pf-197_" data-dcnode-id="4398" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-199_" data-dcnode-id="4399" data-pf-type="Text"><span data-dcnode-id="4402" instrument_node="">There are isolated American Elm trees that survived Dutch Elm Disease with trunks over 4.5 m in circumference!</span><br data-dcnode-id="4401"><br data-dcnode-id="4400"></span></p><h3 class="sc-ezbkAF deEGdS pf-200_" data-dcnode-id="4394" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-202_" data-dcnode-id="4395" data-pf-type="Text"><span data-dcnode-id="4397" instrument_node="">Planting Region</span><br data-dcnode-id="4396"></span></h3><p class="sc-gGCDDS lbFTHT pf-203_" data-dcnode-id="4389" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-205_" data-dcnode-id="4390" data-pf-type="Text"><a data-dcnode-id="4392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="4393" instrument_node="">North America</span></a><br data-dcnode-id="4391"></span></p></div></div><div class="pf-c" data-dcnode-id="4359" style="--c-xs:12;--c-sm:3;--c-md:2;--c-lg:3"><div class="sc-jgrJph gHStpP pf-206_" data-dcnode-id="4360" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-207_" data-dcnode-id="4386" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-0ab6dcb4-0453-451b-83e1-7cc03003338e--Untitled-design-5.png%3F57856&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-0ab6dcb4-0453-451b-83e1-7cc03003338e--Untitled-design-5.png?57856 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-208_" data-dcnode-id="4383" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-210_" data-dcnode-id="4384" data-pf-type="Text"><span data-dcnode-id="4385" instrument_node="">American Hornbeam</span></span></h3><p class="sc-gGCDDS lbFTHT pf-211_" data-dcnode-id="4378" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-213_" data-dcnode-id="4379" data-pf-type="Text"><span data-dcnode-id="4382" instrument_node="">The tree is slow-growing and is rarely found larger than 10 inches in diameter. It makes excellent fuelwood when seasoned.</span><br data-dcnode-id="4381"><br data-dcnode-id="4380"></span></p><h3 class="sc-ezbkAF deEGdS pf-214_" data-dcnode-id="4374" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-216_" data-dcnode-id="4375" data-pf-type="Text"><span data-dcnode-id="4377" instrument_node="">Fun Fact</span><br data-dcnode-id="4376"></span></h3><p class="sc-gGCDDS lbFTHT pf-217_" data-dcnode-id="4370" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-219_" data-dcnode-id="4371" data-pf-type="Text"><span data-dcnode-id="4373" instrument_node="">Name "hornbeam" originates from old English words "horn", which was used to describe strong wood and "beam", that was used as a synonym for tree.</span><br data-dcnode-id="4372"></span></p><h3 class="sc-ezbkAF deEGdS pf-220_" data-dcnode-id="4366" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-222_" data-dcnode-id="4367" data-pf-type="Text"><span data-dcnode-id="4369" instrument_node="">Planting Region</span><br data-dcnode-id="4368"></span></h3><p class="sc-gGCDDS lbFTHT pf-223_" data-dcnode-id="4361" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-225_" data-dcnode-id="4362" data-pf-type="Text"><a data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="4365" instrument_node="">North America</span></a><br data-dcnode-id="4363"></span></p></div></div><div class="pf-c" data-dcnode-id="4329" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-226_" data-dcnode-id="4330" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-227_" data-dcnode-id="4358" data-pf-type="Image" height="165" sr an></p><h3 class="sc-ezbkAF deEGdS pf-538_" data-dcnode-id="3900" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-540_" data-dcnode-id="3901" data-pf-type="Text"><span data-dcnode-id="3903" instrument_node="">Planting Region</span><br data-dcnode-id="3902"></span></h3><p class="sc-gGCDDS lbFTHT pf-541_" data-dcnode-id="3895" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-543_" data-dcnode-id="3896" data-pf-type="Text"><a data-dcnode-id="3898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="3899" instrument_node="">North America</span></a><br data-dcnode-id="3897"></span></p></div></div><div class="pf-c" data-dcnode-id="3864" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-544_" data-dcnode-id="3865" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-545_" data-dcnode-id="3892" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-3e201ae5-5ae4-41a1-8048-4de2bab3ea52--Untitled-design-19.png%3F58030&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-3e201ae5-5ae4-41a1-8048-4de2bab3ea52--Untitled-design-19.png?58030 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-546_" data-dcnode-id="3889" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-548_" data-dcnode-id="3890" data-pf-type="Text"><span data-dcnode-id="3891" instrument_node="">Black Locust</span></span></h3><p class="sc-gGCDDS lbFTHT pf-549_" data-dcnode-id="3884" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-551_" data-dcnode-id="3885" data-pf-type="Text"><span data-dcnode-id="3888" instrument_node="">A medium-sized tree, growing up to 80 ft tall, with long compound leaves. In the spring the trees produce large, drooping clusters of fragrant, white flowers.</span><br data-dcnode-id="3887"><br data-dcnode-id="3886"></span></p><h3 class="sc-ezbkAF deEGdS pf-552_" data-dcnode-id="3880" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-554_" data-dcnode-id="3881" data-pf-type="Text"><span data-dcnode-id="3883" instrument_node="">Fun Fact</span><br data-dcnode-id="3882"></span></h3><p class="sc-gGCDDS lbFTHT pf-555_" data-dcnode-id="3875" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-557_" data-dcnode-id="3876" data-pf-type="Text"><span data-dcnode-id="3879" instrument_node="">This Locust Tree has nitrogen-fixing bacteria in its roots enabling the tree to grow vigorously in poor soil.</span><br data-dcnode-id="3878"><br data-dcnode-id="3877"></span></p><h3 class="sc-ezbkAF deEGdS pf-558_" data-dcnode-id="3871" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-560_" data-dcnode-id="3872" data-pf-type="Text"><span data-dcnode-id="3874" instrument_node="">Planting Region</span><br data-dcnode-id="3873"></span></h3><p class="sc-gGCDDS lbFTHT pf-561_" data-dcnode-id="3866" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-563_" data-dcnode-id="3867" data-pf-type="Text"><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="3870" instrument_node="">North America</span></a><br data-dcnode-id="3868"></span></p></div></div><div class="pf-c" data-dcnode-id="3835" style="--c-xs:12;--c-sm:3;--c-md:2;--c-lg:3"><div class="sc-jgrJph gHStpP pf-564_" data-dcnode-id="3836" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-565_" data-dcnode-id="3863" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-17b5ac05-d669-4fb8-b36a-b8c038e9e3b4--Untitled-design-20.png%3F58042&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-17b5ac05-d669-4fb8-b36a-b8c038e9e3b4--Untitled-design-20.png?58042 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-566_" data-dcnode-id="3859" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-568_" data-dcnode-id="3860" data-pf-type="Text"><span data-dcnode-id="3862" instrument_node="">Black Walnut</span><br data-dcnode-id="3861"></span></h3><p class="sc-gGCDDS lbFTHT pf-569_" data-dcnode-id="3854" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-571_" data-dcnode-id="3855" data-pf-type="Text"><span data-dcnode-id="3858" instrument_node="">It can reach a large size and produces highly prized wood and large edible nuts. It is largely used in cabinetmaking, interior trim, and for gunstocks.&nbsp;</span><br data-dcnode-id="3857"><br data-dcnode-id="3856"></span></p><h3 class="sc-ezbkAF deEGdS pf-572_" data-dcnode-id="3850" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-574_" data-dcnode-id="3851" data-pf-type="Text"><span data-dcnode-id="3853" instrument_node="">Fun Fact</span><br data-dcnode-id="3852"></span></h3><p class="sc-gGCDDS lbFTHT pf-575_" data-dcnode-id="3846" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-577_" data-dcnode-id="3847" data-pf-type="Text"><span data-dcnode-id="3849" instrument_node="">Black walnut trees secrete 'juglone', which kills many herbaceous plants around the root system of the tree.</span><br data-dcnode-id="3848"></span></p><h3 class="sc-ezbkAF deEGdS pf-578_" data-dcnode-id="3842" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-580_" data-dcnode-id="3843" data-pf-type="Text"><span data-dcnode-id="3845" instrument_node="">Planting Region</span><br data-dcnode-id="3844"></span></h3><p class="sc-gGCDDS lbFTHT pf-581_" data-dcnode-id="3837" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-583_" data-dcnode-id="3838" data-pf-type="Text"><a data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="3841" instrument_node="">North America</span></a><br data-dcnode-id="3839"></span></p></div></div></div><div class="sc-dJjYzT drCpbA pf-584_ pf-r pf-c-ct pf-r-eh" data-dcnode-id="3734" data-pf-type="Row" style="--s-xs:15px"><div class="pf-c" data-dcnode-id="3803" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-585_" data-dcnode-id="3804" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-586_" data-dcnode-id="3833" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-15055112-b7cb-445a-8661-fe19cf598d4b--Untitled-design-21.png%3F58054&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-15055112-b7cb-445a-8661-fe19cf598d4b--Untitled-design-21.png?58054 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-587_" data-dcnode-id="3830" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-589_" data-dcnode-id="3831" data-pf-type="Text"><span data-dcnode-id="3832" instrument_node="">Black Willow</span></span></h3><p class="sc-gGCDDS lbFTHT pf-590_" data-dcnode-id="3824" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-592_" data-dcnode-id="3825" data-pf-type="Text"><span data-dcnode-id="3829" instrument_node="">The largest and most widely distributed of the native Willow Trees. It is of little importance as a timber tree as it often divides into several crooked, medium-sized trunks.</span><br data-dcnode-id="3828"><span data-dcnode-id="3827" instrument_node="">&nbsp;</span><br data-dcnode-id="3826"></span></p><h3 class="sc-ezbkAF deEGdS pf-593_" data-dcnode-id="3820" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-595_" data-dcnode-id="3821" data-pf-type="Text"><span data-dcnode-id="3823" instrument_node="">Fun Fact</span><br data-dcnode-id="3822"></span></h3><p class="sc-gGCDDS lbFTHT pf-596_" data-dcnode-id="3814" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-598_" data-dcnode-id="3815" data-pf-type="Text"><span data-dcnode-id="3819" instrument_node="">Because the tree blooms so early, they provide important nectar for bees emerging from their hives after winter.</span><br data-dcnode-id="3818"><br data-dcnode-id="3817"><br data-dcnode-id="3816"></span></p><h3 class="sc-ezbkAF deEGdS pf-599_" data-dcnode-id="3810" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-601_" data-dcnode-id="3811" data-pf-type="Text"><span data-dcnode-id="3813" instrument_node="">Planting Region</span><br data-dcnode-id="3812"></span></h3><p class="sc-gGCDDS lbFTHT pf-602_" data-dcnode-id="3805" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-604_" data-dcnode-id="3806" data-pf-type="Text"><a data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="3809" instrument_node="">North America</span></a><br data-dcnode-id="3807"></span></p></div></div><div class="pf-c" data-dcnode-id="3767" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-605_" data-dcnode-id="3768" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-606_" data-dcnode-id="3802" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-ea7db5d3-257c-43c4-b6e9-26bea5a6a1ee--Untitled-design-96.png%3F59640&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-ea7db5d3-257c-43c4-b6e9-26bea5a6a1ee--Untitled-design-96.png?59640 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-607_" data-dcnode-id="3799" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-609_" data-dcnode-id="3800" data-pf-type="Text"><span data-dcnode-id="3801" instrument_node="">Bonsai Tree</span></span></h3><p class="sc-gGCDDS lbFTHT pf-610_" data-dcnode-id="3794" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-612_" data-dcnode-id="3795" data-pf-type="Text"><span data-dcnode-id="3798" instrument_node="">A Bonsai Tree is not intended for production of food or for medicine. Instead, Bonsai practice focuses on long-term cultivation and shaping of one or more small trees growing in a container.</span><br data-dcnode-id="3797"><br data-dcnode-id="3796"></span></p><h3 class="sc-ezbkAF deEGdS pf-613_" data-dcnode-id="3790" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-615_" data-dcnode-id="3791" data-pf-type="Text"><span data-dcnode-id="3793" instrument_node="">Fun Fact</span><br data-dcnode-id="3792"></span></h3><p class="sc-gGCDDS lbFTHT pf-616_" data-dcnode-id="3787" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-618_" data-dcnode-id="3788" data-pf-type="Text"><span data-dcnode-id="3789" instrument_node="">Its name stems from the Japanese word,&nbsp;"盆栽", meaning 'tray planting'. It is an Asian art form of cultivation techniques to replicate large scale trees, on a smaller scale in a container.</span></span></p><h3 class="sc-ezbkAF deEGdS pf-619_" data-dcnode-id="3783" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-621_" data-dcnode-id="3784" data-pf-type="Text"><span data-dcnode-id="3786" instrument_node="">Planting Region</span><br data-dcnode-id="3785"></span></h3><p class="sc-gGCDDS lbFTHT pf-622_" data-dcnode-id="3769" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-624_" data-dcnode-id="3770" data-pf-type="Text"><a data-dcnode-id="3781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="3782" instrument_node="">North America</span></a><span data-dcnode-id="3780" instrument_node="">, </span><a data-dcnode-id="3778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/asia" target="_blank"><span data-dcnode-id="3779" instrument_node="">Asia</span></a><span data-dcnode-id="3777" instrument_node="">, </span><a data-dcnode-id="3775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/latin-america" target="_blank"><span data-dcnode-id="3776" instrument_node="">Latin America</span></a><span data-dcnode-id="3774" instrument_node="">, </span><a data-dcnode-id="3772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/africa" target="_blank"><span data-dcnode-id="3773" instrument_node="">Africa</span></a><br data-dcnode-id="3771"></span></p></div></div><div class="pf-c" data-dcnode-id="3735" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-625_" data-dcnode-id="3736" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-626_" data-dcnode-id="3766" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-a515c5a2-dfb6-4134-8a76-c0db40211cf0--Untitled-design-22.png%3F58066&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-a515c5a2-dfb6-4134-8a76-c0db40211cf0--Untitled-design-22.png?58066 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-627_" data-dcnode-id="3763" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-629_" data-dcnode-id="3764" data-pf-type="Text"><span data-dcnode-id="3765" instrument_node="">Butternut Tree</span></span></h3><p class="sc-gGCDDS lbFTHT pf-630_" data-dcnode-id="3757" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-632_" data-dcnode-id="3758" data-pf-type="Text"><span data-dcnode-id="3762" instrument_node="">It produces attractive wood and edible nuts. It is common in moist soils, especially along fences and roads. Many butternut trees are infected with a canker disease.</span><br data-dcnode-id="3761"><br data-dcnode-id="3760"><br data-dcnode-id="3759"></span></p><h3 class="sc-ezbkAF deEGdS pf-633_" data-dcnode-id="3753" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-635_" data-dcnode-id="3754" data-pf-type="Text"><span data-dcnode-id="3756" instrument_node="">Fun Fact</span><br data-dcnode-id="3755"></span></h3><p class="sc-gGCDDS lbFTHT pf-636_" data-dcnode-id="3746" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-638_" data-dcnode-id="3747" data-pf-type="Text"><span data-dcnode-id="3752" instrument_node="">The Butternut tree (or white walnut) is the only walnut tree that is native to Canada.</span><br data-dcnode-id="3751"><br data-dcnode-id="3750"><br data-dcnode-id="3749"><br data-dcnode-id="3748"></span></p><h3 class="sc-ezbkAF deEGdS pf-639_" data-dcnode-id="3742" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-641_" data-dcnode-id="3743" data-pf-type="Text"><span data-dcnode-id="3745" instrument_node="">Planting Region</span><br data-dcnode-id="3744"></span></h3><p class="sc-gGCDDS lbFTHT pf-642_" data-dcnode-id="3737" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-644_" data-dcnode-id="3738" data-pf-type="Text"><a data-dcnode-id="3740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="3741" instrument_node="">North America</span></a><br data-dcnode-id="3739"></span></p></div></div></div><div class="sc-dJjYzT drCpbA pf-645_ pf-r pf-r-eh" data-dcnode-id="3728" data-pf-type="Row" style="--s-xs:15px"><div class="pf-c" data-dcnode-id="3729" style="--c-xs:12;--c-lg:12"><div class="sc-jgrJph gHStpP pf-646_" data-dcnode-id="3730" data-pf-type="Column"><a class="sc-hGPBjI iNZegS pf-647_" data-dcnode-id="3731" data-pf-type="Button" href="#top" target="_self"><span class="sc-jQrDum heCnGO pf-649_" data-dcnode-id="3732" data-pf-type="Text"><span data-dcnode-id="3733" instrument_node="">Back to Top</span></span></a></div></div></div><div class="sc-dJjYzT drCpbA pf-650_ pf-r pf-r-eh" data-dcnode-id="3719" data-pf-type="Row" style="--s-xs:15px"><div class="pf-c" data-dcnode-id="3723" style="--c-xs:12;--c-lg:1"><div class="sc-jgrJph gHStpP pf-651_" data-dcnode-id="3724" data-pf-type="Column"><h1 class="sc-ezbkAF deEGdS pf-652_" data-dcnode- 326/7189/t/67/assets/pf-ec8e4b34-4c61-4e84-b975-4c41e6e40d09--Untitled-design-24.png?58090 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-684_" data-dcnode-id="3683" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-686_" data-dcnode-id="3684" data-pf-type="Text"><span data-dcnode-id="3685" instrument_node="">California Redwood</span></span></h3><p class="sc-gGCDDS lbFTHT pf-687_" data-dcnode-id="3676" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-689_" data-dcnode-id="3677" data-pf-type="Text"><span data-dcnode-id="3682" instrument_node="">The California Redwood is native to California and Oregon. It belongs to the sequoia family, and can grow to be 379 feet tall.</span><br data-dcnode-id="3681"><br data-dcnode-id="3680"><br data-dcnode-id="3679"><br data-dcnode-id="3678"></span></p><h3 class="sc-ezbkAF deEGdS pf-690_" data-dcnode-id="3672" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-692_" data-dcnode-id="3673" data-pf-type="Text"><span data-dcnode-id="3675" instrument_node="">Fun Fact</span><br data-dcnode-id="3674"></span></h3><p class="sc-gGCDDS lbFTHT pf-693_" data-dcnode-id="3666" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-695_" data-dcnode-id="3667" data-pf-type="Text"><span data-dcnode-id="3671" instrument_node="">A log of sycamore wood is priced at around 200 US dollars.</span><br data-dcnode-id="3670"><br data-dcnode-id="3669"><br data-dcnode-id="3668"></span></p><h3 class="sc-ezbkAF deEGdS pf-696_" data-dcnode-id="3662" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-698_" data-dcnode-id="3663" data-pf-type="Text"><span data-dcnode-id="3665" instrument_node="">Planting Region</span><br data-dcnode-id="3664"></span></h3><p class="sc-gGCDDS lbFTHT pf-699_" data-dcnode-id="3657" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-701_" data-dcnode-id="3658" data-pf-type="Text"><a data-dcnode-id="3660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="3661" instrument_node="">North America</span></a><br data-dcnode-id="3659"></span></p></div></div><div class="pf-c" data-dcnode-id="3628" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-702_" data-dcnode-id="3629" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-703_" data-dcnode-id="3654" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-23afe8d4-3c02-47b4-8eee-93a4780debbc--Untitled-design-25.png%3F58102&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-23afe8d4-3c02-47b4-8eee-93a4780debbc--Untitled-design-25.png?58102 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-704_" data-dcnode-id="3651" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-706_" data-dcnode-id="3652" data-pf-type="Text"><span data-dcnode-id="3653" instrument_node="">California Sycamore</span></span></h3><p class="sc-gGCDDS lbFTHT pf-707_" data-dcnode-id="3647" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-709_" data-dcnode-id="3648" data-pf-type="Text"><span data-dcnode-id="3650" instrument_node="">The California sycamore is large, tall tree with a fast growth rate. The tree's potentially enormous size makes it best suited for large-scale landscapes. It is used for butchers' blocks, novelties, and occasionally for furniture.</span><br data-dcnode-id="3649"></span></p><h3 class="sc-ezbkAF deEGdS pf-710_" data-dcnode-id="3643" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-712_" data-dcnode-id="3644" data-pf-type="Text"><span data-dcnode-id="3646" instrument_node="">Fun Fact</span><br data-dcnode-id="3645"></span></h3><p class="sc-gGCDDS lbFTHT pf-713_" data-dcnode-id="3639" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-715_" data-dcnode-id="3640" data-pf-type="Text"><span data-dcnode-id="3642" instrument_node="">Sycamore tree seeds are known as "helicopters" because of their wings that rotate similar to helicopter's propeller on a wind.</span><br data-dcnode-id="3641"></span></p><h3 class="sc-ezbkAF deEGdS pf-716_" data-dcnode-id="3635" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-718_" data-dcnode-id="3636" data-pf-type="Text"><span data-dcnode-id="3638" instrument_node="">Planting Region</span><br data-dcnode-id="3637"></span></h3><p class="sc-gGCDDS lbFTHT pf-719_" data-dcnode-id="3630" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-721_" data-dcnode-id="3631" data-pf-type="Text"><a data-dcnode-id="3633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="3634" instrument_node="">North America</span></a><br data-dcnode-id="3632"></span></p></div></div><div class="pf-c" data-dcnode-id="3601" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-722_" data-dcnode-id="3602" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-723_" data-dcnode-id="3627" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-b1f3f419-12d0-4335-977e-af2384fa2bf9--Untitled-design-26.png%3F58114&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-b1f3f419-12d0-4335-977e-af2384fa2bf9--Untitled-design-26.png?58114 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-724_" data-dcnode-id="3624" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-726_" data-dcnode-id="3625" data-pf-type="Text"><span data-dcnode-id="3626" instrument_node="">Canadian Hemlock</span></span></h3><p class="sc-gGCDDS lbFTHT pf-727_" data-dcnode-id="3620" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-729_" data-dcnode-id="3621" data-pf-type="Text"><span data-dcnode-id="3623" instrument_node="">The Canadian hemlock grows to a height of 40–70' and a spread of 25–35' at maturity. This hemlock provides excellent cover for deer and songbirds. Nesting site for several warblers. Seeds are eaten by juncos, chickadees, and siskins.</span><br data-dcnode-id="3622"></span></p><h3 class="sc-ezbkAF deEGdS pf-730_" data-dcnode-id="3616" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-732_" data-dcnode-id="3617" data-pf-type="Text"><span data-dcnode-id="3619" instrument_node="">Fun Fact</span><br data-dcnode-id="3618"></span></h3><p class="sc-gGCDDS lbFTHT pf-733_" data-dcnode-id="3612" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-735_" data-dcnode-id="3613" data-pf-type="Text"><span data-dcnode-id="3615" instrument_node="">Very long lived, with the oldest recorded specimen, found in Tionesta, Pennsylvania, being at least 554 years old.</span><br data-dcnode-id="3614"></span></p><h3 class="sc-ezbkAF deEGdS pf-736_" data-dcnode-id="3608" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-738_" data-dcnode-id="3609" data-pf-type="Text"><span data-dcnode-id="3611" instrument_node="">Planting Region</span><br data-dcnode-id="3610"></span></h3><p class="sc-gGCDDS lbFTHT pf-739_" data-dcnode-id="3603" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-741_" data-dcnode-id="3604" data-pf-type="Text"><a data-dcnode-id="3606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="3607" instrument_node="">North America</span></a><br data-dcnode-id="3605"></span></p></div></div><div class="pf-c" data-dcnode-id="3572" style="--c-xs:12;--c-sm:3;--c-md:2;--c-lg:3"><div class="sc-jgrJph gHStpP pf-742_" data-dcnode-id="3573" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-743_" data-dcnode-id="3600" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-aad44105-80ee-4fdd-8bd7-78ee16d0d8cd--Untitled-design-27.png%3F58126&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-aad44105-80ee-4fdd-8bd7-78ee16d0d8cd--Untitled-design-27.png?58126 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-744_" data-dcnode-id="3596" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-746_" data-dcnode-id="3597" data-pf-type="Text"><span data-dcnode-id="3599" instrument_node="">Cape Chestnut</span><br data-dcnode-id="3598"></span></h3><p class="sc-gGCDDS lbFTHT pf-747_" data-dcnode-id="3592" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-749_" data-dcnode-id="3593" data-pf-type="Text"><span data-dcnode-id="3595" instrument_node="">The tree can reach 20 metres high in a forest, but in cultivation it is more likely to reach 10 metres, with a spreading canopy. The large pink flowers are produced in terminal panicles and cover the tree canopy in the early summer.</span><br data-dcnode-id="3594"></span></p><h3 class="sc-ezbkAF deEGdS pf-750_" data-dcnode-id="3588" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-752_" data-dcnode-id="3589" data-pf-type="Text"><span data-dcnode-id="3591" instrument_node="">Fun Fact</span><br data-dcnode-id="3590"></span></h3><p class="sc-gGCDDS lbFTHT pf-753_" data-dcnode-id="3583" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-755_" data-dcnode-id="3584" data-pf-type="Text"><span data-dcnode-id="3587" instrument_node="">Cape chestnut oil, obtained from the seeds, is a popular oil in African skin care.</span><br data-dcnode-id="3586"><br data-dcnode-id="3585"></span></p><h3 class="sc-ezbkAF deEGdS pf-756_" data-dcnode-id="3579" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-758_" data-dcnode-id="3580" data-pf-type="Text"><span data-dcnode-id="3582" instrument_node="">Planting Region</span><br data-dcnode-id="3581"></span></h3><p class="sc-gGCDDS lbFTHT pf-759_" data-dcnode-id="3574" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-761_" data-dcnode-id="3575" data-pf-type="Text"><a data-dcnode-id="3577" href="https://chatnoir-webcontent.c _node="">This tree sheds its bark to prevent the growth of lichen or fungi.</span><br data-dcnode-id="3555"><br data-dcnode-id="3554"><br data-dcnode-id="3553"></span></p><h3 class="sc-ezbkAF deEGdS pf-776_" data-dcnode-id="3547" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-778_" data-dcnode-id="3548" data-pf-type="Text"><span data-dcnode-id="3550" instrument_node="">Planting Region</span><br data-dcnode-id="3549"></span></h3><p class="sc-gGCDDS lbFTHT pf-779_" data-dcnode-id="3542" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-781_" data-dcnode-id="3543" data-pf-type="Text"><a data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/latin-america" target="_blank"><span data-dcnode-id="3546" instrument_node="">Latin America</span></a><br data-dcnode-id="3544"></span></p></div></div><div class="pf-c" data-dcnode-id="3509" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-782_" data-dcnode-id="3510" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-783_" data-dcnode-id="3539" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-ee838cc5-1792-4ffd-9971-b1bebc223359--Untitled-design-29.png%3F58150&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-ee838cc5-1792-4ffd-9971-b1bebc223359--Untitled-design-29.png?58150 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-784_" data-dcnode-id="3536" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-786_" data-dcnode-id="3537" data-pf-type="Text"><span data-dcnode-id="3538" instrument_node="">Carolina Silverbell</span></span></h3><p class="sc-gGCDDS lbFTHT pf-787_" data-dcnode-id="3530" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-789_" data-dcnode-id="3531" data-pf-type="Text"><span data-dcnode-id="3535" instrument_node="">The Carolina silverbell is native to the southeastern United States. It is characterized by bell-shaped white flowers which appear in spring before the leaves.</span><br data-dcnode-id="3534"><br data-dcnode-id="3533"><br data-dcnode-id="3532"></span></p><h3 class="sc-ezbkAF deEGdS pf-790_" data-dcnode-id="3526" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-792_" data-dcnode-id="3527" data-pf-type="Text"><span data-dcnode-id="3529" instrument_node="">Fun Fact</span><br data-dcnode-id="3528"></span></h3><p class="sc-gGCDDS lbFTHT pf-793_" data-dcnode-id="3520" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-795_" data-dcnode-id="3521" data-pf-type="Text"><span data-dcnode-id="3525" instrument_node="">The flowers turn into little green fruits.</span><br data-dcnode-id="3524"><br data-dcnode-id="3523"><br data-dcnode-id="3522"></span></p><h3 class="sc-ezbkAF deEGdS pf-796_" data-dcnode-id="3516" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-798_" data-dcnode-id="3517" data-pf-type="Text"><span data-dcnode-id="3519" instrument_node="">Planting Region</span><br data-dcnode-id="3518"></span></h3><p class="sc-gGCDDS lbFTHT pf-799_" data-dcnode-id="3511" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-801_" data-dcnode-id="3512" data-pf-type="Text"><a data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="3515" instrument_node="">North America</span></a><br data-dcnode-id="3513"></span></p></div></div><div class="pf-c" data-dcnode-id="3480" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-802_" data-dcnode-id="3481" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-803_" data-dcnode-id="3508" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-5e363cc6-ca9e-4f9f-a7be-20f3db8166b2--Untitled-design-20190703T105804004.png%3F62294&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-5e363cc6-ca9e-4f9f-a7be-20f3db8166b2--Untitled-design-20190703T105804004.png?62294 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-804_" data-dcnode-id="3505" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-806_" data-dcnode-id="3506" data-pf-type="Text"><span data-dcnode-id="3507" instrument_node="">Cherry Blossom Tree</span></span></h3><p class="sc-gGCDDS lbFTHT pf-807_" data-dcnode-id="3501" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-809_" data-dcnode-id="3502" data-pf-type="Text"><span data-dcnode-id="3504" instrument_node="">Known as "sakura" in Japanese, these pale blooms stand for renewal and hope.&nbsp;An average Japanese Cherry Tree is around 25 feet tall, while some can grow to 50 feet tall with a 40-foot wide canopy.</span><br data-dcnode-id="3503"></span></p><h3 class="sc-ezbkAF deEGdS pf-810_" data-dcnode-id="3497" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-812_" data-dcnode-id="3498" data-pf-type="Text"><span data-dcnode-id="3500" instrument_node="">Fun Fact</span><br data-dcnode-id="3499"></span></h3><p class="sc-gGCDDS lbFTHT pf-813_" data-dcnode-id="3494" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-815_" data-dcnode-id="3495" data-pf-type="Text"><span data-dcnode-id="3496" instrument_node="">Typically, they only last about 16-20 years. Certain species can live much longer. Black Cherry Trees can live up to 250 years.</span></span></p><h3 class="sc-ezbkAF deEGdS pf-816_" data-dcnode-id="3490" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-818_" data-dcnode-id="3491" data-pf-type="Text"><span data-dcnode-id="3493" instrument_node="">Planting Region</span><br data-dcnode-id="3492"></span></h3><p class="sc-gGCDDS lbFTHT pf-819_" data-dcnode-id="3482" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-821_" data-dcnode-id="3483" data-pf-type="Text"><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="3489" instrument_node="">North America</span></a><span data-dcnode-id="3487" instrument_node="">, </span><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/asia"><span data-dcnode-id="3486" instrument_node="">Asia</span></a><br data-dcnode-id="3484"></span></p></div></div></div><div class="sc-dJjYzT drCpbA pf-822_ pf-r pf-c-ct pf-r-eh" data-dcnode-id="3333" data-pf-type="Row" style="--s-xs:15px"><div class="pf-c" data-dcnode-id="3448" style="--c-xs:12;--c-sm:3;--c-md:2;--c-lg:3"><div class="sc-jgrJph gHStpP pf-823_" data-dcnode-id="3449" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-824_" data-dcnode-id="3478" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-e1e78ace-1177-4ba5-b967-6d439f939af9--Untitled-design-30.png%3F58180&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-e1e78ace-1177-4ba5-b967-6d439f939af9--Untitled-design-30.png?58180 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-825_" data-dcnode-id="3474" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-827_" data-dcnode-id="3475" data-pf-type="Text"><span data-dcnode-id="3477" instrument_node="">Chestnut Oak</span><br data-dcnode-id="3476"></span></h3><p class="sc-gGCDDS lbFTHT pf-828_" data-dcnode-id="3468" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-830_" data-dcnode-id="3469" data-pf-type="Text"><span data-dcnode-id="3473" instrument_node="">This tree gets its name from its chestnut-like leaves. It is found principally on dry, rocky ridges and hillsides. The wood is similar to white oak and is used generally for ties, posts, and rough construction.</span><br data-dcnode-id="3472"><span data-dcnode-id="3471" instrument_node="">&nbsp;</span><br data-dcnode-id="3470"></span></p><h3 class="sc-ezbkAF deEGdS pf-831_" data-dcnode-id="3464" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-833_" data-dcnode-id="3465" data-pf-type="Text"><span data-dcnode-id="3467" instrument_node="">Fun Fact</span><br data-dcnode-id="3466"></span></h3><p class="sc-gGCDDS lbFTHT pf-834_" data-dcnode-id="3459" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-836_" data-dcnode-id="3460" data-pf-type="Text"><span data-dcnode-id="3463" instrument_node="">In Shakespeare's Macbeth, one of the Wayward Sisters threatens to kill a woman's husband over a chestnut.</span><br data-dcnode-id="3462"><br data-dcnode-id="3461"></span></p><h3 class="sc-ezbkAF deEGdS pf-837_" data-dcnode-id="3455" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-839_" data-dcnode-id="3456" data-pf-type="Text"><span data-dcnode-id="3458" instrument_node="">Planting Region</span><br data-dcnode-id="3457"></span></h3><p class="sc-gGCDDS lbFTHT pf-840_" data-dcnode-id="3450" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-842_" data-dcnode-id="3451" data-pf-type="Text"><a data-dcnode-id="3453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="3454" instrument_node="">North America</span></a><br data-dcnode-id="3452"></span></p></div></div><div class="pf-c" data-dcnode-id="3420" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-843_" data-dcnode-id="3421" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-844_" data-dcnode-id="3447" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-3b0c535b-f962-4d34-acb0-e6fb8ab03245--Untitled-design-31.png%3F58192&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-3b0c535b-f962-4d34-acb0-e6fb8ab03245--Untitled-design-31.png?58192 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-845_" data-dcnode-id="3444" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-847_" data-dcnode-id="3445" data-pf-type="Text"><span data-dcnode-id="3446" instrument_node="">Colorado Blue Spruce</span></span></h3><p class="sc-gGCDDS lbFTHT pf-848_" data-dcnode-id="3441" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-850_" data-dcnode-id="3442" data-pf-type="Text"><span data-dcnode-id="3443" instrument_node="">The blue spruce has blue-green coloured needles and is a coniferous tree. This tree is often sold as a Christmas Tree, which includes the trees entire root ball so it can be planted after the holidays.</span></span></p><h3 class="sc-ezbkAF deEGdS pf-851_" data-dcnode-id="3437" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-853_" data-dcnode-id="3438" data-pf-type="Text"><span data-dcnode-id="3440" instrument_node="">Fun Fact</span><br data-dcnode-id="3439"></span></h3><p class="sc-gGCDDS lbFTHT pf-854_" data-dcnode-id="3431" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-856_" data-dcnode-id="3432" data-pf-type="Text"><span data-dcnode-id="3436" instrument_node="">In traditional medicine, an infusion of the needles is used to treat colds and settle the stomach.</span><br data-dcnode-id="3435"><br data-dcnode-id="3434"><br data-dcnode-id="3433"></span></p><h3 class="sc-ezbkAF deEGdS pf-857_" data-dcnode-id="3427" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-859_" data-dcnode-id="3428" data-pf-type="Text"><span data-dcnode-id="3430" instrument_node="">Planting Region</span><br data-dcnode-id="3429"></span></h3><p class="sc-gGCDDS lbFTHT pf-860_" data-dcnode-id="3422" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-862_" data-dcnode-id="3423" data-pf-type="Text"><a data-dcnode-id="3425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="3426" instrument_node="">North America</span></a><br data-dcnode-id= ata-dcnode-id="3128"></span></h3><p class="sc-gGCDDS lbFTHT pf-1079_" data-dcnode-id="3122" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1081_" data-dcnode-id="3123" data-pf-type="Text"><span data-dcnode-id="3125" instrument_node="">The Elderberry is found mostly in the northern hemisphere, but can be found in some southern areas as well. It bears large clusters of small white flowers in the late spring, which are followed by clusters of small black, blue-black, or red berries.</span><br data-dcnode-id="3124"></span></p><h3 class="sc-ezbkAF deEGdS pf-1082_" data-dcnode-id="3118" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1084_" data-dcnode-id="3119" data-pf-type="Text"><span data-dcnode-id="3121" instrument_node="">Fun Fact</span><br data-dcnode-id="3120"></span></h3><p class="sc-gGCDDS lbFTHT pf-1085_" data-dcnode-id="3113" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1087_" data-dcnode-id="3114" data-pf-type="Text"><span data-dcnode-id="3117" instrument_node="">Uncooked elderberries are poisonous to humans.</span><br data-dcnode-id="3116"><br data-dcnode-id="3115"></span></p><h3 class="sc-ezbkAF deEGdS pf-1088_" data-dcnode-id="3109" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1090_" data-dcnode-id="3110" data-pf-type="Text"><span data-dcnode-id="3112" instrument_node="">Planting Region</span><br data-dcnode-id="3111"></span></h3><p class="sc-gGCDDS lbFTHT pf-1091_" data-dcnode-id="3104" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1093_" data-dcnode-id="3105" data-pf-type="Text"><a data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="3108" instrument_node="">North America</span></a><br data-dcnode-id="3106"></span></p></div></div><div class="pf-c" data-dcnode-id="3071" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1094_" data-dcnode-id="3072" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1095_" data-dcnode-id="3101" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-4d3560dc-c7cb-4aa4-b53c-96844010f16e--Untitled-design-41.png%3F58336&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-4d3560dc-c7cb-4aa4-b53c-96844010f16e--Untitled-design-41.png?58336 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1096_" data-dcnode-id="3096" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1098_" data-dcnode-id="3097" data-pf-type="Text"><span data-dcnode-id="3100" instrument_node="">Engelmann Spruce</span><br data-dcnode-id="3099"><br data-dcnode-id="3098"></span></h3><p class="sc-gGCDDS lbFTHT pf-1099_" data-dcnode-id="3090" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1101_" data-dcnode-id="3091" data-pf-type="Text"><span data-dcnode-id="3095" instrument_node="">Engelmann spruce commonly occurs with subalpine fir in areas with long, cold winters and short, cool summers. It grows best on deep, rich soils with adequate moisture.&nbsp;</span><br data-dcnode-id="3094"><br data-dcnode-id="3093"><br data-dcnode-id="3092"></span></p><h3 class="sc-ezbkAF deEGdS pf-1102_" data-dcnode-id="3086" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1104_" data-dcnode-id="3087" data-pf-type="Text"><span data-dcnode-id="3089" instrument_node="">Fun Fact</span><br data-dcnode-id="3088"></span></h3><p class="sc-gGCDDS lbFTHT pf-1105_" data-dcnode-id="3082" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1107_" data-dcnode-id="3083" data-pf-type="Text"><span data-dcnode-id="3085" instrument_node="">Specialty items such as violins, pianos, and aircraft parts are produced from Engelmann spruce.</span><br data-dcnode-id="3084"></span></p><h3 class="sc-ezbkAF deEGdS pf-1108_" data-dcnode-id="3078" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1110_" data-dcnode-id="3079" data-pf- 31" data-pf-type="Column"><h1 class="sc-ezbkAF deEGdS pf-1141_" data-dcnode-id="3032" data-pf-type="Heading" id="alphabet-f"><span class="sc-jQrDum heCnGO pf-1143_" data-dcnode-id="3033" data-pf-type="Text"><span data-dcnode-id="3034" instrument_node="">F</span></span></h1></div></div><div class="pf-c" data-dcnode-id="3027" style="--c-xs:12;--c-lg:11"><div class="sc-jgrJph gHStpP pf-1144_" data-dcnode-id="3028" data-pf-type="Column"><div class="sc-bBHxTw gQKsJN pf-1145_" data-dcnode-id="3029" data-pf-type="Divider"></div></div></div></div><div class="sc-dJjYzT drCpbA pf-1148_ pf-r pf-c-ct pf-r-eh" data-dcnode-id="2970" data-pf-type="Row" style="--s-xs:15px"><div class="pf-c" data-dcnode-id="2998" style="--c-xs:12;--c-sm:3;--c-md:2;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1149_" data-dcnode-id="2999" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1150_" data-dcnode-id="3025" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-4290af6d-5ab4-4899-b98c-7ec39dd64b3b--Untitled-design-20190703T112901598.png%3F62432&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-4290af6d-5ab4-4899-b98c-7ec39dd64b3b--Untitled-design-20190703T112901598.png?62432 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1151_" data-dcnode-id="3021" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1153_" data-dcnode-id="3022" data-pf-type="Text"><span data-dcnode-id="3024" instrument_node="">Fig Tree</span><br data-dcnode-id="3023"></span></h3><p class="sc-gGCDDS lbFTHT pf-1154_" data-dcnode-id="3017" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1156_" data-dcnode-id="3018" data-pf-type="Text"><span data-dcnode-id="3020" instrument_node="">There are over 750 known Ficus Tree species in the world, native all across the globe. Fig trees produce fruit year round that are important food sources for thousands of animal species.</span><br data-dcnode-id="3019"></span></p><h3 class="sc-ezbkAF deEGdS pf-1157_" data-dcnode-id="3013" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1159_" data-dcnode-id="3014" data-pf-type="Text"><span data-dcnode-id="3016" instrument_node="">Fun Fact</span><br data-dcnode-id="3015"></span></h3><p class="sc-gGCDDS lbFTHT pf-1160_" data-dcnode-id="3009" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1162_" data-dcnode-id="3010" data-pf-type="Text"><span data-dcnode-id="3012" instrument_node="">Nearly every species of fig tree is pollinated by its own distinct species of fig wasp.</span><br data-dcnode-id="3011"></span></p><h3 class="sc-ezbkAF deEGdS pf-1163_" data-dcnode-id="3005" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1165_" data-dcnode-id="3006" data-pf-type="Text"><span data-dcnode-id="3008" instrument_node="">Planting Region</span><br data-dcnode-id="3007"></span></h3><p class="sc-gGCDDS lbFTHT pf-1166_" data-dcnode-id="3000" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1168_" data-dcnode-id="3001" data-pf-type="Text"><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="3004" instrument_node="">North America</span></a><br data-dcnode-id="3002"></span></p></div></div><div class="pf-c" data-dcnode-id="2971" style="--c-xs:12;--c-sm:3;--c-md:2;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1169_" data-dcnode-id="2972" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1170_" data-dcnode-id="2997" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-f8e7fc37-9798-4b61-a778-bbd308b519fb--Untitled-design-43.png%3F58360&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-f8e7fc37-9798-4b61-a778-bbd308b519fb--Untitled-design-43.png?58360 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1171_" data-dcnode-id="2993" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1173_" data-dcnode-id="2994" data-pf-type="Text"><span data-dcnode-id="2996" instrument_node="">Flowering Dogwood</span><br data-dcnode-id="2995"></span></h3><p class="sc-gGCDDS lbFTHT pf-1174_" data-dcnode-id="2990" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1176_" data-dcnode-id="2991" data-pf-type="Text"><span data-dcnode-id="2992" instrument_node="">One of the most common understory hardwoods you will see in both hardwood and coniferous forests in eastern North America. This dogwood tree will grow from sea level to nearly 5,000'.</span></span></p><h3 class="sc-ezbkAF deEGdS pf-1177_" data-dcnode-id="2986" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1179_" data-dcnode-id="2987" data-pf-type="Text"><span data-dcnode-id="2989" instrument_node="">Fun Fact</span><br data-dcnode-id="2988"></span></h3><p class="sc-gGCDDS lbFTHT pf-1180_" data-dcnode-id="2982" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1182_" data-dcnode-id="2983" data-pf-type="Text"><span data-dcnode-id="2985" instrument_node="">The dogwood is the state tree of two US States - Virginia and Missouri.</span><br data-dcnode-id="2984"></span></p><h3 class="sc-ezbkAF deEGdS pf-1183_" data-dcnode-id="2978" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1185_" data-dcnode-id="2979" data-pf-type="Text"><span data-dcnode-id="2981" instrument_node="">Planting Region</span><br data-dcnode-id="2980"></span></h3><p class="sc-gGCDDS lbFTHT pf-1186_" data-dcnode-id="2973" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1188_" data-dcnode-id="2974" data-pf-type="Text"><a data-dcnode-id="2976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="2977" instrument_node="">North America</span></a><br data-dcnode-id="2975"></span></p></div></div></div><div class="sc-d b--Tree-Pictures.png?156554 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1206_" data-dcnode-id="2950" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1208_" data-dcnode-id="2951" data-pf-type="Text"><span data-dcnode-id="2953" instrument_node="">Giant Sequoia</span><br data-dcnode-id="2952"></span></h3><p class="sc-gGCDDS lbFTHT pf-1209_" data-dcnode-id="2946" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1211_" data-dcnode-id="2947" data-pf-type="Text"><span data-dcnode-id="2949" instrument_node="">Giant sequoias are among the largest trees in the world. They grow to an average height of 164–279 ft with trunk diameters ranging 20–26 ft. Record trees have been measured at 311 ft tall.&nbsp;&nbsp;</span><br data-dcnode-id="2948"></span></p><h3 class="sc-ezbkAF deEGdS pf-1212_" data-dcnode-id="2942" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1214_" data-dcnode-id="2943" data-pf-type="Text"><span data-dcnode-id="2945" instrument_node="">Fun Fact</span><br data-dcnode-id="2944"></span></h3><p class="sc-gGCDDS lbFTHT pf-1215_" data-dcnode-id="2935" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1217_" data-dcnode-id="2936" data-pf-type="Text"><span data-dcnode-id="2941" instrument_node="">The oldest known giant sequoia is 3 500 years old.</span><br data-dcnode-id="2940"><br data-dcnode-id="2939"><br data-dcnode-id="2938"><br data-dcnode-id="2937"></span></p><h3 class="sc-ezbkAF deEGdS pf-1218_" data-dcnode-id="2931" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1220_" data-dcnode-id="2932" data-pf-type="Text"><span data-dcnode-id="2934" instrument_node="">Planting Region</span><br data-dcnode-id="2933"></span></h3><p class="sc-gGCDDS lbFTHT pf-1221_" data-dcnode-id="2926" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1223_" data-dcnode-id="2927" data-pf-type="Text"><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="2930" instrument_node="">North America</span></a><br data-dcnode-id="2928"></span></p></div></div><div class="pf-c" data-dcnode-id="2896" style="--c-xs:12;--c-sm:3;--c-md:2;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1224_" data-dcnode-id="2897" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1225_" data-dcnode-id="2923" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-285770c7-808d-4b32-b92e-065bca1fb8fa--Untitled-design-45.png%3F58384&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-285770c7-808d-4b32-b92e-065bca1fb8fa--Untitled-design-45.png?58384 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1226_" data-dcnode-id="2919" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1228_" data-dcnode-id="2920" data-pf-type="Text"><span data-dcnode-id="2922" instrument_node="">Giant Yellow Mulberry</span><br data-dcnode-id="2921"></span></h3><p class="sc-gGCDDS lbFTHT pf-1229_" data-dcnode-id="2915" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1231_" data-dcnode-id="2916" data-pf-type="Text"><span data-dcnode-id="2918" instrument_node="">Also known as, “Monkey Fruit”, is a tree averaging 20 m high shrub or tree with stilt roots, short bole, and spreading branches. It is a source of food and medicine in tropical Africa.</span><br data-dcnode-id="2917"></span></p><h3 class="sc-ezbkAF deEGdS pf-1232_" data-dcnode-id="2911" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1234_" data-dcnode-id="2912" data-pf-type="Text"><span data-dcnode-id="2914" instrument_node="">Fun Fact</span><br data-dcnode-id="2913"></span></h3><p class="sc-gGCDDS lbFTHT pf-1235_" data-dcnode-id="2907" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1237_" data-dcnode-id="2908" data-pf-type="Text"><span data-dcnode-id="2910" instrument_node="">Orange, red, purple, black, and blue pigments isolated from the fruit of mulberry trees are used as coloring agents in the industry of food and fabrics.</span><br data-dcnode-id="2909"></span></p><h3 class="sc-ezbkAF deEGdS pf-1238_" data-dcnode-id="2903" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1240_" data-dcnode-id="2904" data-pf-type="Text"><span data-dcnode-id="2906" instrument_node="">Planting Region</span><br data-dcnode-id="2905"></span></h3><p class="sc-gGCDDS lbFTHT pf-1241_" data-dcnode-id="2898" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1243_" data-dcnode-id="2899" data-pf-type="Text"><a data-dcnode-id="2901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/africa" target="_blank"><span data-dcnode-id="2902" instrument_node="">Africa</span></a><br data-dcnode-id="2900"></span></p></div></div><div class="pf-c" data-dcnode-id="2867" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1244_" data-dcnode-id="2868" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1245_" data-dcnode-id="2895" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-dc8cc6b8-6634-4366-b162-6a1c31ade40f--Untitled-design-46.png%3F58396&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-dc8cc6b8-6634-4366-b162-6a1c31ade40f--Untitled-design-46.png?58396 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1246_" data-dcnode-id="2892" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1248_" data-dcnode-id="2893" data-pf-type="Text"><span data-dcnode-id="2894" instrument_node="">Golden Jubilee Peach</span></span></h3><p class="sc-gGCDDS lbFTHT pf-1249_" data-dcnode-id="2887" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1251_" data-dcnode-id="2888" data-pf-type="Text"><span data-dcnode-id="2891" instrument_node="">This tree grows at a fast rate, with height increases of more than 24" per year. Produces oblong, freestone fruit with soft, yellow skin blushed with red.&nbsp;</span><br data-dcnode-id="2890"><br data-dcnode-id="2889"></span></p><h3 class="sc-ezbkAF deEGdS pf-1252_" data-dcnode-id="2883" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1254_" data-dcnode-id="2884" data-pf-type="Text"><span data-dcnode-id="2886" instrument_node="">Fun Fact</span><br data-dcnode-id="2885"></span></h3><p class="sc-gGCDDS lbFTHT pf-1255_" data-dcnode-id="2878" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1257_" data-dcnode-id="2879" data-pf-type="Text"><span data-dcnode-id="2882" instrument_node="">This peach tree has chill hour requirements of 800-850 hours (below 45°F (7°C)) in the winter for their buds to open in the spring.</span><br data-dcnode-id="2881"><br data-dcnode-id="2880"></span></p><h3 class="sc-ezbkAF deEGdS pf-1258_" data-dcnode-id="2874" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1260_" data-dcnode-id="2875" data-pf-type="Text"><span data-dcnode-id="2877" instrument_node="">Planting Region</span><br data-dcnode-id="2876"></span></h3><p class="sc-gGCDDS lbFTHT pf-1261_" data-dcnode-id="2869" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1263_" data-dcnode-id="2870" data-pf-type="Text"><a data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="2873" instrument_node="">North America</span></a><br data-dcnode-id="2871"></span></p></div></div><div class="pf-c" data-dcnode-id="2836" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1264_" data-dcnode-id="2837" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1265_" data-dcnode-id="2866" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-2ef77b2e-6155-40ed-baee-2d6888a09504--Untitled-design-47.png%3F58408&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-2ef77b2e-6155-40ed-baee-2d6888a09504--Untitled-design-47.png?58408 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1266_" data-dcnode-id="2863" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1268_" data-dcnode-id="2864" data-pf-type="Text"><span data-dcnode-id="2865" instrument_node="">Gray Birch</span></span></h3><p class="sc-gGCDDS lbFTHT pf-1269_" data-dcnode-id="2859" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1271_" data-dcnode-id="2860" data-pf-type="Text"><span data-dcnode-id="2862" instrument_node="">Colonizes disturbed and harsh sites and is particularly abundant on dry, gravelly soils of burned-over areas and abandoned farms. The tree is short-lived and is rarely as much as 8 inches in diameter.&nbsp;</span><br data-dcnode-id="2861"></span></p><h3 class="sc-ezbkAF deEGdS pf-1272_" data-dcnode-id="2855" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1274_" data-dcnode-id="2856" data-pf-type="Text"><span data-dcnode-id="2858" instrument_node="">Fun Fact</span><br data-dcnode-id="2857"></span></h3><p class="sc-gGCDDS lbFTHT pf-1275_" data-dcnode-id="2847" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1277_" data-dcnode-id="2848" data-pf-type="Text"><span data-dcnode-id="2854" instrument_node="">&nbsp;Native Americans used bark</span><br data-dcnode-id="2853"><span data-dcnode-id="2852" instrument_node="">extracts of Gray Birch on swollen or infected cuts.</span><br data-dcnode-id="2851"><br data-dcnode-id="2850"><br data-dcnode-id="2849"></span></p><h3 class="sc-ezbkAF deEGdS pf-1278_" data-dcnode-id="2843" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1280_" data-dcnode-id="2844" data-pf-type="Text"><span data-dcnode-id="2846" instrument_node="">Planting Region</span><br data-dcnode-id="2845"></span></h3><p class="sc-gGCDDS lbFTHT pf-1281_" data-dcnode-id="2838" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1283_" data-dcnode-id="2839" data-pf-type="Text"><a data-dcnode-id="2841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="2842" instrument_node="">North America</span></a><br data-dcnode-id="2840"></span></p></div></div><div class="pf-c" data-dcnode-id="2809" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1284_" data-dcnode-id="2810" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1285_" data-dcnode-id="2835" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-8f6d5340-d6c0-4dc6-82b8-272d6d892792--Untitled-design-48.png%3F58420&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-8f6d5340-d6c0-4dc6-82b8-272d6d892792--Untitled-design-48.png?58420 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1286_" data-dcnode-id="2832" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1288_" data-dcnode-id="2833" data-pf-type="Text"><span data-dcnode-id="2834" instrument_node="">Gray Dogwood</span></span></h3><p class="sc-gGCDDS lbFTHT pf-1289_" data-dcnode-id="2828" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1291_" data-dcnode-id="2829" data-pf-type="Text"><span data-dcnode-id="2831" instrument_node="">There are between 30 and 60 species of dogwood. Most of them have opposing leaves, while some have alternating. All have flowers which form in clusters of varying density.</span><br data-dcnode-id="2830"></span></p><h3 class="sc-ezbkAF deEGdS pf-1292_" data-dcnode-id="2824" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1294_" data-dcnode-id="2825" data-pf-type="Text"><span data-dcnode-id="2827" instrument_node="">Fun Fact</span><br data-dcnode-id="2826"></span></h3><p class="sc-gGCDDS lbFTHT pf-1295_" data-dcnode-id="2820" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1297_" da
