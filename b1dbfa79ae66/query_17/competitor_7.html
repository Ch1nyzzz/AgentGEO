data-dcnode-id="2670" data-pf-type="Text"><span data-dcnode-id="2672" instrument_node="">Laurel</span><br data-dcnode-id="2671"></span></h3><p class="sc-gGCDDS lbFTHT pf-1413_" data-dcnode-id="2664" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1415_" data-dcnode-id="2665" data-pf-type="Text"><span data-dcnode-id="2668" instrument_node="">It is native to the Mediterranean Region and is used as bay leaf for seasoning in cooking. The Laurel is a small evergreen tree or shrub, varying in size and sometimes reaching 23–59 ft tall.</span><br data-dcnode-id="2667"><br data-dcnode-id="2666"></span></p><h3 class="sc-ezbkAF deEGdS pf-1416_" data-dcnode-id="2660" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1418_" data-dcnode-id="2661" data-pf-type="Text"><span data-dcnode-id="2663" instrument_node="">Fun Fact</span><br data-dcnode-id="2662"></span></h3><p class="sc-gGCDDS lbFTHT pf-1419_" data-dcnode-id="2656" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1421_" data-dcnode-id="2657" data-pf-type="Text"><span data-dcnode-id="2659" instrument_node="">In herbal medicine, aqueous extracts of bay laurel have been used as an astringent and salve for open wounds</span><br data-dcnode-id="2658"></span></p><h3 class="sc-ezbkAF deEGdS pf-1422_" data-dcnode-id="2652" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1424_" data-dcnode-id="2653" data-pf-type="Text"><span data-dcnode-id="2655" instrument_node="">Planting Region</span><br data-dcnode-id="2654"></span></h3><p class="sc-gGCDDS lbFTHT pf-1425_" data-dcnode-id="2644" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1427_" data-dcnode-id="2645" data-pf-type="Text"><a data-dcnode-id="2650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="2651" instrument_node="">North America</span></a><span data-dcnode-id="2649" instrument_node="">, </span><a data-dcnode-id="2647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/where-we-plant" target="_blank"><span data-dcnode-id="2648" instrument_node="">Europe</span></a><br data-dcnode-id="2646"></span></p></div></div><div class="pf-c" data-dcnode-id="2609" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1428_" data-dcnode-id="2610" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1429_" data-dcnode-id="2641" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-be6e8953-3b87-4246-b17f-eae9b18e1450--Untitled-design-52.png%3F58468&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-be6e8953-3b87-4246-b17f-eae9b18e1450--Untitled-design-52.png?58468 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1430_" data-dcnode-id="2638" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1432_" data-dcnode-id="2639" data-pf-type="Text"><span data-dcnode-id="2640" instrument_node="">Lemon Tree</span></span></h3><p class="sc-gGCDDS lbFTHT pf-1433_" data-dcnode-id="2634" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1435_" data-dcnode-id="2635" data-pf-type="Text"><span data-dcnode-id="2637" instrument_node="">This tree's yellow fruit is used for culinary and non-culinary purposes throughout the world, primarily for its juice, which has both culinary and cleaning uses. The pulp and rind (zest) are also used in cooking and baking.</span><br data-dcnode-id="2636"></span></p><h3 class="sc-ezbkAF deEGdS pf-1436_" data-dcnode-id="2630" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1438_" data-dcnode-id="2631" data-pf-type="Text"><span data-dcnode-id="2633" instrument_node="">Fun Fact</span><br data-dcnode-id="2632"></span></h3><p class="sc-gGCDDS lbFTHT pf-1439_" data-dcnode-id="2626" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1441_" data-dcnode-id="2627" data-pf-type="Text"><span data-dcnode-id="2629" instrument_node="">Lemons contain flavonoids, which are composites that contain antioxidant and cancer fighting properties.</span><br data-dcnode-id="2628"></span></p><h3 class="sc-ezbkAF deEGdS pf-1442_" data-dcnode-id="2622" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1444_" data-dcnode-id="2623" data-pf-type="Text"><span data-dcnode-id="2625" instrument_node="">Planting Region</span><br data-dcnode-id="2624"></span></h3><p class="sc-gGCDDS lbFTHT pf-1445_" data-dcnode-id="2611" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1447_" data-dcnode-id="2612" data-pf-type="Text"><a data-dcnode-id="2620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="2621" instrument_node="">North America</span></a><span data-dcnode-id="2619" instrument_node="">, </span><a data-dcnode-id="2617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/asia" target="_blank"><span data-dcnode-id="2618" instrument_node="">Asia</span></a><span data-dcnode-id="2616" instrument_node="">, </span><a data-dcnode-id="2614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/africa" target="_blank"><span data-dcnode-id="2615" instrument_node="">Africa</span></a><br data-dcnode-id="2613"></span></p></div></div><div class="pf-c" data-dcnode-id="2581" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1448_" data-dcnode-id="2582" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1449_" data-dcnode-id="2608" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-f763fece-063a-44c1-93a4-9d27e19d82d1--Untitled-design-53.png%3F58480&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-f763fece-063a-44c1-93a4-9d27e19d82d1--Untitled-design-53.png?58480 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1450_" data-dcnode-id="2605" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1452_" data-dcnode-id="2606" data-pf-type="Text"><span data-dcnode-id="2607" instrument_node="">Lodgepole Pine</span></span></h3><p class="sc-gGCDDS lbFTHT pf-1453_" data-dcnode-id="2601" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1455_" data-dcnode-id="2602" data-pf-type="Text"><span data-dcnode-id="2604" instrument_node="">The Lodgepole Pine is prevalent in the Rocky Mountains, Colorado to Yukon and Saskatchewan; aspen parkland and boreal forests. It is a fire-dependent species, requiring wildfires to maintain healthy populations of diverse ages.</span><br data-dcnode-id="2603"></span></p><h3 class="sc-ezbkAF deEGdS pf-1456_" data-dcnode-id="2597" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1458_" data-dcnode-id="2598" data-pf-type="Text"><span data-dcnode-id="2600" instrument_node="">Fun Fact</span><br data-dcnode-id="2599"></span></h3><p class="sc-gGCDDS lbFTHT pf-1459_" data-dcnode-id="2592" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1461_" data-dcnode-id="2593" data-pf-type="Text"><span data-dcnode-id="2596" instrument_node="">Lodgepole pine is named for its common use as structural poles for the Native American tipi shelter.</span><br data-dcnode-id="2595"><br data-dcnode-id="2594"></span></p><h3 class="sc-ezbkAF deEGdS pf-1462_" data-dcnode-id="2588" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1464_" data-dcnode-id="2589" data-pf-type="Text"><span data-dcnode-id="2591" instrument_node="">Planting Region</span><br data-dcnode-id="2590"></span></h3><p class="sc-gGCDDS lbFTHT pf-1465_" data-dcnode-id="2583" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1467_" data-dcnode-id="2584" data-pf-type="Text"><a data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="2587" instrument_node="">North America</span></a><br data-dcnode-id="2585"></span></p></div></div><div class="pf-c" data-dcnode-id="2553" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1468_" data-dcnode-id="2554" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1469_" data-dcnode-id="2580" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-cf381973-a5e8-4353-9288-7e2199e173e7--Untitled-design-54.png%3F58492&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-cf381973-a5e8-4353-9288-7e2199e173e7--Untitled-design-54.png?58492 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1470_" data-dcnode-id="2577" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1472_" data-dcnode-id="2578" data-pf-type="Text"><span data-dcnode-id="2579" instrument_node="">Longleaf Pine</span></span></h3><p class="sc-gGCDDS lbFTHT pf-1473_" data-dcnode-id="2573" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1475_" data-dcnode-id="2574" data-pf-type="Text"><span data-dcnode-id="2576" instrument_node="">The longleaf pine reaches a height of 98–115 ft and a diameter of 28 in. The tree is a cultural symbol of the Southern United States, being the official state tree of Alabama and the unofficial state tree of North Carolina.</span><br data-dcnode-id="2575"></span></p><h3 class="sc-ezbkAF deEGdS pf-1476_" data-dcnode-id="2569" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1478_" data-dcnode-id="2570" data-pf-type="Text"><span data-dcnode-id="2572" instrument_node="">Fun Fact</span><br data-dcnode-id="2571"></span></h3><p class="sc-gGCDDS lbFTHT pf-1479_" data-dcnode-id="2564" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1481_" data-dcnode-id="2565" data-pf-type="Text"><span data-dcnode-id="2568" instrument_node="">In the past, before extensive logging, they reportedly grew to 154 ft with a diameter of 47 in.</span><br data-dcnode-id="2567"><br data-dcnode-id="2566"></span></p><h3 class="sc-ezbkAF deEGdS pf-1482_" data-dcnode-id="2560" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1484_" data-dcnode-id="2561" data-pf-type="Text"><span data-dcnode-id="2563" instrument_node="">Planting Region</span><br data-dcnode-id="2562"></span></h3><p class="sc-gGCDDS lbFTHT pf-1485_" data-dcnode-id="2555" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1487_" data-dcnode-id="2556" data-pf-type="Text"><a data-dcnode-id="2558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="2559" instrument_node="">North America</span></a><br data-dcnode-id="2557"></span></p></div></div></div><div class="sc-dJjYzT drCpbA pf-1488_ pf-r pf-r-eh" data-dcnode-id="2546" data-pf-type="Row" style="--s-xs:15px"><div class="pf-c" data-dcnode-id="2547" style="--c-xs:12;--c-lg:12"><div class="sc-jgrJph gHStpP pf-1489_" data-dcnode-id="2548" data-pf-type="Column"><a class="sc-hGPBjI iNZegS pf-1490_" data-dcnode-id="2549" data-pf-type="Button" href="#top" target="_self"><span class="sc-jQrDum heCnGO pf-1492_" data-dcnode-id="2550" data-pf-type="Text"><span data-dcnode-id="2551" instrument_node="">Back to Top</span></span></a></div></div></div><div class="sc-dJjYzT drCpbA pf-1493_ pf-r pf-r-eh" data-dcnode-id="2537" data-pf-type="Row" style="--s-xs:15px"><div class="pf-c" data-dcnode-id="2541" style="--c-xs:12;--c-lg:1"><div class="sc-jgrJph gHStpP pf-1494_" data-dcnode-id="2542" data-pf-type="Column"><h1 class="sc-ezbkAF deEGdS pf-1495_" data-dcnode-id="2543" data-pf-type="Heading" id="alphabet-m"><span class="sc-jQrDum heCnGO pf-1497_" data-dcnode-id="2544" data-pf-type="Text"><span data-dcnode-id="2545" instrument_node="">M</span></span></h1></div></div><div class="pf-c" data-dcnode-id="2538" style="--c-xs:12;--c-lg:11"><div class="sc-jgrJph gHStpP pf-1498_" data-dcnode-id="2539" data-pf-type="Column"><div class="sc-bBHxTw gQKsJN pf-1499_" data-dcnode-id="2540" data-pf-type="Divider"></div></div></div></div><div class="sc-dJjYzT drCpbA pf-1502_ pf-r pf-r-eh" data-dcnode-id="2418" data-pf-type="Row" style="--s-xs:15px"><div class="pf-c" data-dcnode-id="2507" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1503_" data-dcnode-id="2508" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1504_" data-dcnode-id="2536" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-158f2fd3-bd19-4657-af5d-e89deec9fffd--Untitled-design-97.png%3F62162&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-158f2fd3-bd19-4657-af5d-e89deec9fffd--Untitled-design-97.png?62162 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1505_" data-dcnode-id="2533" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1507_" data-dcnode-id="2534" data-pf-type="Text"><span data-dcnode-id="2535" instrument_node="">Magnolia Tree</span></span></h3><p class="sc-gGCDDS lbFTHT pf-1508_" data-dcnode-id="2529" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1510_" data-dcnode-id="2530" data-pf-type="Text"><span data-dcnode-id="2532" instrument_node="">There are close to 210 species of magnolia that differ in size, shape, color of the flower and type of habitat. Magnolia trees originate from Asia and North America.</span><br data-dcnode-id="2531"></span></p><h3 class="sc-ezbkAF deEGdS pf-1511_" data-dcnode-id="2525" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1513_" data-dcnode-id="2526" data-pf-type="Text"><span data-dcnode-id="2528" instrument_node="">Fun Fact</span><br data-dcnode-id="2527"></span></h3><p class="sc-gGCDDS lbFTHT pf-1514_" data-dcnode-id="2521" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1516_" data-dcnode-id="2522" data-pf-type="Text"><span data-dcnode-id="2524" instrument_node="">Magnolias do not produce pollen enriched with proteins, which bees use as food.</span><br data-dcnode-id="2523"></span></p><h3 class="sc-ezbkAF deEGdS pf-1517_" data-dcnode-id="2517" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1519_" data-dcnode-id="2518" data-pf-type="Text"><span data-dcnode-id="2520" instrument_node="">Planting Region</span><br data-dcnode-id="2519"></span></h3><p class="sc-gGCDDS lbFTHT pf-1520_" data-dcnode-id="2509" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1522_" data-dcnode-id="2510" data-pf-type="Text"><a data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="2516" instrument_node="">North America</span></a><span data-dcnode-id="2514" instrument_node="">,&nbsp;</span><a data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/asia"><span data-dcnode-id="2513" instrument_node="">Asia</span></a><br data-dcnode-id="2511"></span></p></div></div><div class="pf-c" data-dcnode-id="2473" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1523_" data-dcnode-id="2474" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1524_" data-dcnode-id="2506" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-28b491a4-b2b5-478f-85e8-0bc2c18c6d78--Untitled-design-55.png%3F58504&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-28b491a4-b2b5-478f-85e8-0bc2c18c6d78--Untitled-design-55.png?58504 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1525_" data-dcnode-id="2503" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1527_" data-dcnode-id="2504" data-pf-type="Text"><span data-dcnode-id="2505" instrument_node="">Mango Tree</span></span></h3><p class="sc-gGCDDS lbFTHT pf-1528_" data-dcnode-id="2499" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1530_" data-dcnode-id="2500" data-pf-type="Text"><span data-dcnode-id="2502" instrument_node="">Hundreds of cultivated varieties have been introduced to other warm regions of the world. It is a large fruit-tree, capable of growing to a height of about 100 ft.</span><br data-dcnode-id="2501"></span></p><h3 class="sc-ezbkAF deEGdS pf-1531_" data-dcnode-id="2495" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1533_" data-dcnode-id="2496" data-pf-type="Text"><span data-dcnode-id="2498" instrument_node="">Fun Fact</span><br data-dcnode-id="2497"></span></h3><p class="sc-gGCDDS lbFTHT pf-1534_" data-dcnode-id="2490" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1536_" data-dcnode-id="2491" data-pf-type="Text"><span data-dcnode-id="2494" instrument_node="">Some Mango trees bear fruits even at the age of 300 years and more!</span><br data-dcnode-id="2493"><br data-dcnode-id="2492"></span></p><h3 class="sc-ezbkAF deEGdS pf-1537_" data-dcnode-id="2486" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1539_" data-dcnode-id="2487" data-pf-type="Text"><span data-dcnode-id="2489" instrument_node="">Planting Region</span><br data-dcnode-id="2488"></span></h3><p class="sc-gGCDDS lbFTHT pf-1540_" data-dcnode-id="2475" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1542_" data-dcnode-id="2476" data-pf-type="Text"><a data-dcnode-id="2484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="2485" instrument_node="">North America</span></a><span data-dcnode-id="2483" instrument_node="">, </span><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/africa" target="_blank"><span data-dcnode-id="2482" instrument_node="">Africa</span></a><spa 457" data-pf-type="Text"><span data-dcnode-id="2460" instrument_node="">The roots are used in traditional medicine to treat backache.</span><br data-dcnode-id="2459"><br data-dcnode-id="2458"></span></p><h3 class="sc-ezbkAF deEGdS pf-1557_" data-dcnode-id="2452" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1559_" data-dcnode-id="2453" data-pf-type="Text"><span data-dcnode-id="2455" instrument_node="">Planting Region</span><br data-dcnode-id="2454"></span></h3><p class="sc-gGCDDS lbFTHT pf-1560_" data-dcnode-id="2447" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1562_" data-dcnode-id="2448" data-pf-type="Text"><a data-dcnode-id="2450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/africa" target="_blank"><span data-dcnode-id="2451" instrument_node="">Africa</span></a><br data-dcnode-id="2449"></span></p></div></div><div class="pf-c" data-dcnode-id="2419" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1563_" data-dcnode-id="2420" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1564_" data-dcnode-id="2444" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-8c18868c-9c7b-45e4-bf55-0927c9f22874--Untitled-design-57.png%3F58528&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-8c18868c-9c7b-45e4-bf55-0927c9f22874--Untitled-design-57.png?58528 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1565_" data-dcnode-id="2441" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1567_" data-dcnode-id="2442" data-pf-type="Text"><span data-dcnode-id="2443" instrument_node="">Medang</span></span></h3><p class="sc-gGCDDS lbFTHT pf-1568_" data-dcnode-id="2437" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1570_" data-dcnode-id="2438" data-pf-type="Text"><span data-dcnode-id="2440" instrument_node="">A native of Singapore. A common and fast growing tree, it is fairly easy to identify from the bark which is covered in small lenticles giving it a unique "bubbly" texture.</span><br data-dcnode-id="2439"></span></p><h3 class="sc-ezbkAF deEGdS pf-1571_" data-dcnode-id="2433" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1573_" data-dcnode-id="2434" data-pf-type="Text"><span data-dcnode-id="2436" instrument_node="">Fun Fact</span><br data-dcnode-id="2435"></span></h3><p class="sc-gGCDDS lbFTHT pf-1574_" data-dcnode-id="2430" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1576_" data-dcnode-id="2431" data-pf-type="Text"><span data-dcnode-id="2432" instrument_node="">The first indication of flowering is the appearance of yellow fluffy flowers on the forest floor.</span></span></p><h3 class="sc-ezbkAF deEGdS pf-1577_" data-dcnode-id="2426" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1579_" data-dcnode-id="2427" data-pf-type="Text"><span data-dcnode-id="2429" instrument_node="">Planting Region</span><br data-dcnode-id="2428"></span></h3><p class="sc-gGCDDS lbFTHT pf-1580_" data-dcnode-id="2421" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1582_" data-dcnode-id="2422" data-pf-type="Text"><a data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/asia" target="_blank"><span data-dcnode-id="2425" instrument_node="">Asia</span></a><br data-dcnode-id="2423"></span></p></div></div></div><div class="sc-dJjYzT drCpbA pf-1583_ pf-r pf-c-ct pf-r-eh" data-dcnode-id="2383" data-pf-type="Row" style="--s-xs:15px"><div class="pf-c" data-dcnode-id="2389" style="--c-xs:12;--c-sm:3;--c-md:2;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1584_" data-dcnode-id="2390" data-pf-type="Column"><img alt="Mangroves" class="sc-jJoQJp hALhgP pf-1585_" data-dcnode-id="2417" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/65/assets/pf-15df2dda--mangroves.jpg%3Fv%3D1629475648&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/65/assets/pf-15df2dda--mangroves.jpg?v=1629475648 1536w" title="Mangroves" width="165"><h3 class="sc-ezbkAF deEGdS pf-1586_" data-dcnode-id="2413" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1588_" data-dcnode-id="2414" data-pf-type="Text"><span data-dcnode-id="2416" instrument_node="">Mangroves</span><br data-dcnode-id="2415"></span></h3><p class="sc-gGCDDS lbFTHT pf-1589_" data-dcnode-id="2410" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1591_" data-dcnode-id="2411" data-pf-type="Text"><span data-dcnode-id="2412" instrument_node="">Mangroves are wonderful trees that are tolerant to salt (halophytes) and can be found where the coast meets land in both tropical and subtropical climates.</span></span></p><h3 class="sc-ezbkAF deEGdS pf-1592_" data-dcnode-id="2406" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1594_" data-dcnode-id="2407" data-pf-type="Text"><span data-dcnode-id="2409" instrument_node="">Fun Fact</span><br data-dcnode-id="2408"></span></h3><p class="sc-gGCDDS lbFTHT pf-1595_" data-dcnode-id="2403" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1597_" data-dcnode-id="2404" data-pf-type="Text"><span data-dcnode-id="2405" instrument_node="">Mangroves have twisted roots that keep them safe from high-impact waves. Their thick waxy leaves also act as a filter that repels salt from the water.</span></span></p><h3 class="sc-ezbkAF deEGdS pf-1598_" data-dcnode-id="2399" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1600_" data-dcnode-id="2400" data-pf-type="Text"><span data-dcnode-id="2402" instrument_node="">Planting Region</span><br data-dcnode-id="2401"></span></h3><p class="sc-gGCDDS lbFTHT pf-1601_" data-dcnode-id="2391" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1603_" data-dcnode-id="2392" data-pf-type="Text"><a data-dcnode-id="2397" href="https://chatnoir-webcontent. </span></p><h3 class="sc-ezbkAF deEGdS pf-1844_" data-dcnode-id="2053" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1846_" data-dcnode-id="2054" data-pf-type="Text"><span data-dcnode-id="2056" instrument_node="">Planting Region</span><br data-dcnode-id="2055"></span></h3><p class="sc-gGCDDS lbFTHT pf-1847_" data-dcnode-id="2048" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1849_" data-dcnode-id="2049" data-pf-type="Text"><a data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="2052" instrument_node="">North America</span></a><br data-dcnode-id="2050"></span></p></div></div><div class="pf-c" data-dcnode-id="2018" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-1850_" data-dcnode-id="2019" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-1851_" data-dcnode-id="2045" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-30bc63bd-bff2-4ab3-acb2-178bdf205f28--Untitled-design-20190703T114123133.png%3F62444&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-30bc63bd-bff2-4ab3-acb2-178bdf205f28--Untitled-design-20190703T114123133.png?62444 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1852_" data-dcnode-id="2042" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1854_" data-dcnode-id="2043" data-pf-type="Text"><span data-dcnode-id="2044" instrument_node="">Pine Tree</span></span></h3><p class="sc-gGCDDS lbFTHT pf-1855_" data-dcnode-id="2038" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1857_" data-dcnode-id="2039" data-pf-type="Text"><span data-dcnode-id="2041" instrument_node="">The Pine, is a family of resinous woody trees with needlelike, usually evergreen leaves. The family is the largest and most important of the conifers, providing naval stores, paper pulp, a 58636 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-1872_" data-dcnode-id="2014" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1874_" data-dcnode-id="2015" data-pf-type="Text"><span data-dcnode-id="2016" instrument_node="">Pitch Pine</span></span></h3><p class="sc-gGCDDS lbFTHT pf-1875_" data-dcnode-id="2009" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1877_" data-dcnode-id="2010" data-pf-type="Text"><span data-dcnode-id="2013" instrument_node="">The wood is coarse-grained and brownish red in color. The tree seldom reaches a large size and the lumber is generally knotty. Its uses are for rough framing lumber, ties, mine props, and crates.</span><br data-dcnode-id="2012"><br data-dcnode-id="2011"></span></p><h3 class="sc-ezbkAF deEGdS pf-1878_" data-dcnode-id="2005" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1880_" data-dcnode-id="2006" data-pf-type="Text"><span data-dcnode-id="2008" instrument_node="">Fun Fact</span><br data-dcnode-id="2007"></span></h3><p class="sc-gGCDDS lbFTHT pf-1881_" data-dcnode-id="2001" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1883_" data-dcnode-id="2002" data-pf-type="Text"><span data-dcnode-id="2004" instrument_node="">Pines produce resin that flows from the injured bark. This resin is highly flammable and it facilitates spreading of the forest fire.</span><br data-dcnode-id="2003"></span></p><h3 class="sc-ezbkAF deEGdS pf-1884_" data-dcnode-id="1997" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1886_" data-dcnode-id="1998" data-pf-type="Text"><span data-dcnode-id="2000" instrument_node="">Planting Region</span><br data-dcnode-id="1999"></span></h3><p class="sc-gGCDDS lbFTHT pf-1887_" data-dcnode-id="1992" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1889_" data-dcnode-id="1993" data-pf-type="Text"><a data-dcnode-id="1995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnod 06" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1949_" data-dcnode-id="1907" data-pf-type="Text"><span data-dcnode-id="1909" instrument_node="">Quaking Aspen</span><br data-dcnode-id="1908"></span></h3><p class="sc-gGCDDS lbFTHT pf-1950_" data-dcnode-id="1902" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1952_" data-dcnode-id="1903" data-pf-type="Text"><span data-dcnode-id="1905" instrument_node="">The most widely distributed tree in North America. It is a short-lived tree, but has value as a cover tree in slashes, burns, and in old fields where it quickly establishes itself.&nbsp;</span><br data-dcnode-id="1904"></span></p><h3 class="sc-ezbkAF deEGdS pf-1953_" data-dcnode-id="1898" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1955_" data-dcnode-id="1899" data-pf-type="Text"><span data-dcnode-id="1901" instrument_node="">Fun Fact</span><br data-dcnode-id="1900"></span></h3><p class="sc-gGCDDS lbFTHT pf-1956_" data-dcnode-id="1894" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1958_" data-dcnode-id="1895" data-pf-type="Text"><span data-dcnode-id="1897" instrument_node="">The quaking aspen reproduces through suckering, growing new clones from its roots. The roots tend to make their way into sewers, sidewalks and other areas where they can cause trouble.</span><br data-dcnode-id="1896"></span></p><h3 class="sc-ezbkAF deEGdS pf-1959_" data-dcnode-id="1890" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-1961_" data-dcnode-id="1891" data-pf-type="Text"><span data-dcnode-id="1893" instrument_node="">Planting Region</span><br data-dcnode-id="1892"></span></h3><p class="sc-gGCDDS lbFTHT pf-1962_" data-dcnode-id="1885" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-1964_" data-dcnode-id="1886" data-pf-type="Text"><a data-dcnode-id="1888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="1889" instrume ained, soft, and is in great demand for chemical wood pulp. A peculiar resonant quality that makes it valuable for the sounding boards of musical instruments. It is used also for framing.</span><br data-dcnode-id="1804"></span></p><h3 class="sc-ezbkAF deEGdS pf-2028_" data-dcnode-id="1798" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-2030_" data-dcnode-id="1799" data-pf-type="Text"><span data-dcnode-id="1801" instrument_node="">Fun Fact</span><br data-dcnode-id="1800"></span></h3><p class="sc-gGCDDS lbFTHT pf-2031_" data-dcnode-id="1794" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-2033_" data-dcnode-id="1795" data-pf-type="Text"><span data-dcnode-id="1797" instrument_node="">This spruce tree was used medicinally by several North American Indian tribes as a remedy for sicknesses.</span><br data-dcnode-id="1796"></span></p><h3 class="sc-ezbkAF deEGdS pf-2034_" data-dcnode-id="1790" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-2036_" data-dcnode-id="1791" data-pf-type="Text"><span data-dcnode-id="1793" instrument_node="">Planting Region</span><br data-dcnode-id="1792"></span></h3><p class="sc-gGCDDS lbFTHT pf-2037_" data-dcnode-id="1785" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-2039_" data-dcnode-id="1786" data-pf-type="Text"><a data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="1789" instrument_node="">North America</span></a><br data-dcnode-id="1787"></span></p></div></div><div class="pf-c" data-dcnode-id="1754" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-2040_" data-dcnode-id="1755" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-2041_" data-dcnode-id="1782" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-35e95326-f8e9-4dae-8ff3-246dbe060e16--Untitled-design-73. graph"><span class="sc-jQrDum heCnGO pf-2073_" data-dcnode-id="1739" data-pf-type="Text"><span data-dcnode-id="1741" instrument_node="">Fruit can be used as a substitute for coffee and as a flavoring agent for liqueurs and cordials.</span><br data-dcnode-id="1740"></span></p><h3 class="sc-ezbkAF deEGdS pf-2074_" data-dcnode-id="1734" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-2076_" data-dcnode-id="1735" data-pf-type="Text"><span data-dcnode-id="1737" instrument_node="">Planting Region</span><br data-dcnode-id="1736"></span></h3><p class="sc-gGCDDS lbFTHT pf-2077_" data-dcnode-id="1726" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-2079_" data-dcnode-id="1727" data-pf-type="Text"><a data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="1733" instrument_node="">North America</span></a><span data-dcnode-id="1731" instrument_node="">, </span><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/asia"><span data-dcnode-id="1730" instrument_node="">Asia</span></a><br data-dcnode-id="1728"></span></p></div></div></div><div class="sc-dJjYzT drCpbA pf-2080_ pf-r pf-r-eh" data-dcnode-id="1717" data-pf-type="Row" style="--s-xs:15px"><div class="pf-c" data-dcnode-id="1718" style="--c-xs:12;--c-lg:12"><div class="sc-jgrJph gHStpP pf-2081_" data-dcnode-id="1719" data-pf-type="Column"><a class="sc-hGPBjI iNZegS pf-2082_" data-dcnode-id="1720" data-pf-type="Button" href="#top" target="_self"><span class="sc-jQrDum heCnGO pf-2084_" data-dcnode-id="1721" data-pf-type="Text"><span data-dcnode-id="1722" instrument_node="">Back to Top</span></span></a></div></div></div><div class="sc-dJjYzT drCpbA pf-2085_ pf-r pf-r-eh" data-dcnode-id="1708" data-pf-type="Row" style="--s-xs:15px"><div class="pf-c" data-dcnode-id="1712" style="--c-xs:12;--c-lg:1"><div class="s able in contact with the soil.</span><br data-dcnode-id="1701"></span></p><h3 class="sc-ezbkAF deEGdS pf-2103_" data-dcnode-id="1695" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-2105_" data-dcnode-id="1696" data-pf-type="Text"><span data-dcnode-id="1698" instrument_node="">Fun Fact</span><br data-dcnode-id="1697"></span></h3><p class="sc-gGCDDS lbFTHT pf-2106_" data-dcnode-id="1690" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-2108_" data-dcnode-id="1691" data-pf-type="Text"><span data-dcnode-id="1694" instrument_node="">The rich flavor from sassafras roots have also been put in soups and stews for an unusual extra flavor.</span><br data-dcnode-id="1693"><br data-dcnode-id="1692"></span></p><h3 class="sc-ezbkAF deEGdS pf-2109_" data-dcnode-id="1686" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-2111_" data-dcnode-id="1687" data-pf-type="Text"><span data-dcnode-id="1689" instrument_node="">Planting Region</span><br data-dcnode-id="1688"></span></h3><p class="sc-gGCDDS lbFTHT pf-2112_" data-dcnode-id="1681" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-2114_" data-dcnode-id="1682" data-pf-type="Text"><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america" target="_blank"><span data-dcnode-id="1685" instrument_node="">North America</span></a><br data-dcnode-id="1683"></span></p></div></div><div class="pf-c" data-dcnode-id="1649" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-2115_" data-dcnode-id="1650" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-2116_" data-dcnode-id="1678" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-1cb50e9a-0696-4b93-a9fe-39afe7897fdb--Untitled-design-75.png%3F58744&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-1cb50e9a-0696-4b93-a9fe-39afe7897fdb--Untitled-design-75.png?58744 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-2117_" data-dcnode-id="1675" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-2119_" data-dcnode-id="1676" data-pf-type="Text"><span data-dcnode-id="1677" instrument_node="">Scarlet Oak</span></span></h3><p class="sc-gGCDDS lbFTHT pf-2120_" data-dcnode-id="1669" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-2122_" data-dcnode-id="1670" data-pf-type="Text"><span data-dcnode-id="1674" instrument_node="">This tree gets its name from the brilliant coloring of its autumn foliage, it is most commonly found on poor soils. The wood is heavy and coarse in texture.&nbsp;</span><br data-dcnode-id="1673"><br data-dcnode-id="1672"><br data-dcnode-id="1671"></span></p><h3 class="sc-ezbkAF deEGdS pf-2123_" data-dcnode-id="1665" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-2125_" data-dcnode-id="1666" data-pf-type="Text"><span data-dcnode-id="1668" instrument_node="">Fun Fact</span><br data-dcnode-id="1667"></span></h3><p class="sc-gGCDDS lbFTHT pf-2126_" data-dcnode-id="1660" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-2128_" data-dcnode-id="1661" data-pf-type="Text"><span data-dcnode-id="1664" instrument_node="">Oak is used in the manufacture of barrels for storing of vine, whiskey, brandy and other liquors.</span><br data-dcnode-id="1663"><br data-dcnode-id="1662"></span></p><h3 class="sc-ezbkAF deEGdS pf-2129_" data-dcnode-id="1656" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-2131_" data-dcnode-id="1657" data-pf-type="Text"><span data-dcnode-id="1659" instrument_node="">Planting Region</span><br data-dcnode-id="1658"></span></h3><p class="sc-gGCDDS lbFTHT pf-2132_" data-dcnode-id="1651" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-2134_" data-dcnode-id="1652" data-pf-type="Text"><a data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="1655" instrument_node="">North America</span></a><br data-dcnode-id="1653"></span></p></div></div><div class="pf-c" data-dcnode-id="1622" style="--c-xs:12;--c-sm:3;--c-lg:3"><div class="sc-jgrJph gHStpP pf-2135_" data-dcnode-id="1623" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-2136_" data-dcnode-id="1648" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-ecc4afa7-2902-4523-a97a-846dc7db77d9--Untitled-design-76.png%3F58756&amp;raw" srcset="https://cdn.shopify.com/s/files/1/0326/7189/t/67/assets/pf-ecc4afa7-2902-4523-a97a-846dc7db77d9--Untitled-design-76.png?58756 1536w" width="165"><h3 class="sc-ezbkAF deEGdS pf-2137_" data-dcnode-id="1645" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-2139_" data-dcnode-id="1646" data-pf-type="Text"><span data-dcnode-id="1647" instrument_node="">Shadbush Tree</span></span></h3><p class="sc-gGCDDS lbFTHT pf-2140_" data-dcnode-id="1641" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-2142_" data-dcnode-id="1642" data-pf-type="Text"><span data-dcnode-id="1644" instrument_node="">It is common throughout the central and southern highlands. Its wood is heavy, harder than white oak, and dark brown in color often tinged with red. It is occasionally used for tool handles and is highest of all native woods in heat value.</span><br data-dcnode-id="1643"></span></p><h3 class="sc-ezbkAF deEGdS pf-2143_" data-dcnode-id="1637" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-2145_" data-dcnode-id="1638" data-pf-type="Text"><span data-dcnode-id="1640" instrument_node="">Fun Fact</span><br data-dcnode-id="1639"></span></h3><p class="sc-gGCDDS lbFTHT pf-2146_" data-dcnode-id="1633" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-2148_" data-dcnode-id="1634" data-pf-type="Text"><span data-dcnode-id="1636" instrument_node="">“Shadbush” comes from the bloom time of this shrub ata-dcnode-id="1246" instrument_node="">This large, tree can grow to 80 metres tall and 850 years of age.  Like all larches, it loses its needles in the autumn. The wood of western larch is one of the strongest in Canada. It is often used in heavy construction and for railway ties and pilings.</span><br data-dcnode-id="1245"></span></p><h3 class="sc-ezbkAF deEGdS pf-2430_" data-dcnode-id="1239" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-2432_" data-dcnode-id="1240" data-pf-type="Text"><span data-dcnode-id="1242" instrument_node="">Fun Fact</span><br data-dcnode-id="1241"></span></h3><p class="sc-gGCDDS lbFTHT pf-2433_" data-dcnode-id="1235" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-2435_" data-dcnode-id="1236" data-pf-type="Text"><span data-dcnode-id="1238" instrument_node="">Native people used to collect sap and inner bark from this tree because it contained a natural sugar gelatin.</span><br data-dcnode-id="1237"></span></p><h3 class="sc-ezbkAF deEGdS pf-2436_" data-dcnode-id="1231" data-pf-type="Heading"><span class="sc-jQrDum heCnGO pf-2438_" data-dcnode-id="1232" data-pf-type="Text"><span data-dcnode-id="1234" instrument_node="">Planting Region</span><br data-dcnode-id="1233"></span></h3><p class="sc-gGCDDS lbFTHT pf-2439_" data-dcnode-id="1226" data-pf-type="Paragraph"><span class="sc-jQrDum heCnGO pf-2441_" data-dcnode-id="1227" data-pf-type="Text"><a data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onetreeplanted.org/collections/north-america"><span data-dcnode-id="1230" instrument_node="">North America</span></a><br data-dcnode-id="1228"></span></p></div></div><div class="pf-c" data-dcnode-id="1194" style="--c-xs:12;--c-sm:3;--c-md:2;--c-lg:3"><div class="sc-jgrJph gHStpP pf-2442_" data-dcnode-id="1195" data-pf-type="Column"><img class="sc-jJoQJp hALhgP pf-2443_" data-dcnode-id="1223" data-pf-type="Image" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;ur </span><p data-dcnode-id="568"><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">COLORADO:</span></strong><span data-dcnode-id="569" instrument_node=""> Colorado residents may obtain copies of registration and financial documents from the office of the Secretary of State, 303-894-2860, www.sos.state.co.us/ re: Reg. No 20193029414.
