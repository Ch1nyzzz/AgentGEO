</span><section class="article-section__sub-content" data-dcnode-id="4821" id="nph13434-sec-0012"><span data-dcnode-id="4904" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="4902" id="nph13434-sec-0012-title"><span data-dcnode-id="4903" instrument_node=""> Responses of root proliferation and mycorrhizal colonization to fertilization</span></h3><span data-dcnode-id="4901" instrument_node="">
</span><p data-dcnode-id="4875"><span data-dcnode-id="4900" instrument_node="">Fertilization treatments significantly affected root length proliferation (</span><i data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">P</span></i><span data-dcnode-id="4897" instrument_node="">&nbsp;=&nbsp;0.023) and root mass proliferation (</span><i data-dcnode-id="4895"><span data-dcnode-id="4896" instrument_node="">P</span></i><span data-dcnode-id="4894" instrument_node="">&nbsp;=&nbsp;0.045), as well as mycorrhizal colonization (</span><i data-dcnode-id="4892"><span data-dcnode-id="4893" instrument_node="">P&nbsp;</span></i><span data-dcnode-id="4891" instrument_node="">&lt;&nbsp;0.001), averaged across all 14 tree species (Table&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="4889" href="#nph13434-tbl-0003" title="Link to table"><span data-dcnode-id="4890" instrument_node="">3</span></a><span data-dcnode-id="4888" instrument_node="">). Compared with the unfertilized control, only the +NPK treatment significantly (</span><i data-dcnode-id="4886"><span data-dcnode-id="4887" instrument_node="">P</span></i><span data-dcnode-id="4885" instrument_node="">&nbsp;&lt;&nbsp;0.05) increased root length and reduced AM colonization (Fig.&nbsp;</span><a data-dcnode-id="4883" href="#nph13434-fig-0002"><span data-dcnode-id="4884" instrument_node="">2</span></a><span data-dcnode-id="4882" instrument_node="">). Although the +N treatment tended to increase root length and mass proliferation (Fig.&nbsp;</span><a data-dcnode-id="4880" href="#nph13434-fig-0002"><span data-dcnode-id="4881" instrument_node="">2</span></a><span data-dcnode-id="4879" instrument_node="">a, data of root mass not shown), both N and P additions (+P) tended to reduce AM colonization compared with the unfertilized control (Fig.&nbsp;</span><a data-dcnode-id="4877" href="#nph13434-fig-0002"><span data-dcnode-id="4878" instrument_node="">2</span></a><span data-dcnode-id="4876" instrument_node="">b).</span></p><span data-dcnode-id="4874" instrument_node="">
</span><section class="article-section__inline-figure" data-dcnode-id="4841"><span data-dcnode-id="4873" instrument_node="">
</span><figure class="figure" data-dcnode-id="4843" id="nph13434-fig-0002"><a data-dcnode-id="4868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nph.onlinelibrary.wiley.com/cms/asset/9ec723c9-53d1-48f5-adc6-049935926474/nph13434-fig-0002-m.jpg" target="_blank"><picture data-dcnode-id="4869"><span data-dcnode-id="4872" instrument_node="">
</span><source data-dcnode-id="4871" media="(min-width: 1650px)" srcset="/cms/asset/9ec723c9-53d1-48f5-adc6-049935926474/nph13434-fig-0002-m.jpg"><img alt="Details are in the caption following the image" class="figure__image" data-dcnode-id="4870" data-lg-src="/cms/asset/9ec723c9-53d1-48f5-adc6-049935926474/nph13434-fig-0002-m.jpg" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nph.onlinelibrary.wiley.com/cms/asset/0d1d267f-2d1c-4a6c-af68-fea25367e47d/nph13434-fig-0002-m.png&amp;raw"></picture></a><figcaption class="figure__caption" data-dcnode-id="4845"><span data-dcnode-id="4867" instrument_node="">
</span><div class="figure__caption__header" data-dcnode-id="4856"><strong class="figure__title" data-dcnode-id="4865"><span data-dcnode-id="4866" instrument_node="">Figure 2</span></strong><div class="figure-extra" data-dcnode-id="4858"><a class="open-figure-link" data-dcnode-id="4863" href="#"><span data-dcnode-id="4864" instrument_node="">Open in figure viewer</span></a><a class="ppt-figure-link" data-dcnode-id="4859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nph.onlinelibrary.wiley.com/action/downloadFigures%3Fid%3Dnph13434-fig-0002%26doi%3D10.1111%252Fnph.13434"><i aria-hidden="true" class="icon-Icon_Download" data-dcnode-id="4862"></i><span data-dcnode-id="4860"><span data-dcnode-id="4861" instrument_node="">PowerPoint</span></span></a></div><span data-dcnode-id="4857" instrument_node="">
</span></div><span data-dcnode-id="4855" instrument_node="">
</span><div class="figure__caption figure__caption-text" data-dcnode-id="4847"><span data-dcnode-id="4854" instrument_node="">(a) Absorptive fine root length proliferation and (b) arbuscular mycorrhizal (AM) colonization for 14 AM tree species and averages across 14 species under four treatments (Unfert., unfertilized control; +N, nitrogen addition; +P, phosphate addition; +NPK, multi-nutrient addition) (see Table&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="4852" href="#nph13434-tbl-0001" title="Link to table"><span data-dcnode-id="4853" instrument_node="">1</span></a><span data-dcnode-id="4851" instrument_node=""> for abbreviations of tree species). Error bars, ±&nbsp;SE of the mean; different letters show statistically significant differences among the fertilization treatments (</span><i data-dcnode-id="4849"><span data-dcnode-id="4850" instrument_node="">P</span></i><span data-dcnode-id="4848" instrument_node="">&nbsp;&lt;&nbsp;0.05).</span></div><span data-dcnode-id="4846" instrument_node="">
</span></figcaption><span data-dcnode-id="4844" instrument_node="">
</span></figure><span data-dcnode-id="4842" instrument_node="">
</span></section><span data-dcnode-id="4840" instrument_node="">
</span><p data-dcnode-id="4823"><span data-dcnode-id="4839" instrument_node="">We found little evidence that thin-root species exhibited a greater response than thick-root species of root proliferation and mycorrhizal colonization to fertilization based on the observation that slopes running across all species did not differ significantly across fertilization treatments (Fig.&nbsp;</span><a data-dcnode-id="4837" href="#nph13434-fig-0001"><span data-dcnode-id="4838" instrument_node="">1</span></a><span data-dcnode-id="4836" instrument_node="">b,d,e). In addition, we observed that variation in root length proliferation responses could be linked to root morphology in most species, but there were also exceptions. For example, </span><i data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">Acer cinnamomifolium</span></i><span data-dcnode-id="4833" instrument_node=""> has relatively thin and densely branched roots, but unexpectedly exhibited relatively low root length proliferation (Table&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="4831" href="#nph13434-tbl-0001" title="Link to table"><span data-dcnode-id="4832" instrument_node="">1</span></a><span data-dcnode-id="4830" instrument_node="">; Fig.&nbsp;</span><a data-dcnode-id="4828" href="#nph13434-fig-0002"><span data-dcnode-id="4829" instrument_node="">2</span></a><span data-dcnode-id="4827" instrument_node="">a), probably because the roots of this species were not fully developed (i.e. reaching a steady-state architecture), as indicated by the fact that the average individual root length of </span><i data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">A.&nbsp;cinnamomifolium</span></i><span data-dcnode-id="4824" instrument_node=""> in root bags was much shorter than that of other thin-root species, although all bags were harvested at the same time.</span></p><span data-dcnode-id="4822" instrument_node="">
</span></section><span data-dcnode-id="4820" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="4794" id="nph13434-sec-0013"><span data-dcnode-id="4819" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="4817" id="nph13434-sec-0013-title"><span data-dcnode-id="4818" instrument_node=""> Responses of root traits to fertilization</span></h3><span data-dcnode-id="4816" instrument_node="">
</span><p data-dcnode-id="4796"><span data-dcnode-id="4815" instrument_node="">Fertilization treatments had significant effects on root architectural traits (</span><i data-dcnode-id="4813"><span data-dcnode-id="4814" instrument_node="">P&nbsp;</span></i><span data-dcnode-id="4812" instrument_node="">&lt;&nbsp;0.001) and chemical traits (</span><i data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node="">P&nbsp;</span></i><span data-dcnode-id="4809" instrument_node="">=&nbsp;0.006 for root C concentration and </span><i data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">P</span></i><span data-dcnode-id="4806" instrument_node="">&nbsp;=&nbsp;0.001 for root N concentration), but not on root morphological traits (</span><i data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">P&nbsp;</span></i><span data-dcnode-id="4803" instrument_node="">&gt;&nbsp;0.05), except for individual root length (</span><i data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">P&nbsp;</span></i><span data-dcnode-id="4800" instrument_node="">=&nbsp;0.009) (Table&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="4798" href="#nph13434-tbl-0003" title="Link to table"><span data-dcnode-id="4799" instrument_node="">3</span></a><span data-dcnode-id="4797" instrument_node="">). For root architectural traits, root branching intensity and total branch order tended to increase under all fertilization treatments, but the root branching ratio tended to decrease with +N or +P treatment, and exhibited no significant change with +NPK treatment, compared with the unfertilized control (Table&nbsp;S2). For root chemical traits, root C and N concentrations increased with +N or +P treatment compared with the unfertilized control, but there was no effect of +NPK treatment (Table&nbsp;S2). Similarly, individual root length decreased only with +N or +P treatment compared with the unfertilized control (Table&nbsp;S2). Other morphological traits (diameter, SRL and root tissue density) were unaffected by nutrient additions. Overall, root architectural traits expressed the greatest phenotypic plasticity in response to nutrient-rich patches, followed by root chemical traits, and then root morphological traits.</span></p><span data-dcnode-id="4795" instrument_node="">
</span></section><span data-dcnode-id="4793" instrument_node="">
</span></section><span data-dcnode-id="4791" instrument_node="">
</span><section class="article-section__content" data-dcnode-id="4330" id="nph13434-sec-0014"><span data-dcnode-id="4790" instrument_node="">
</span><h2 class="article-section__title section__title section1" data-dcnode-id="4788" id="nph13434-sec-0014-title"><span data-dcnode-id="4789" instrument_node=""> Discussion</span></h2><span data-dcnode-id="4787" instrument_node="">
</span><p data-dcnode-id="4782"><span data-dcnode-id="4786" instrument_node="">We studied 14 AM tree species that varied widely in their absorptive fine root traits and subjected them to various types of nutrient addition to examine the complementarity between absorptive fine roots and mycorrhizal fungi in nutrient foraging behavior. These tree species ranged from highly branched, thin-root species to sparsely branched, thick-root species (Tables&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="4784" href="#nph13434-tbl-0001" title="Link to table"><span data-dcnode-id="4785" instrument_node="">1</span></a><span data-dcnode-id="4783" instrument_node="">, S5; Fig.&nbsp;S1). We specifically examined how species of markedly different root morphology responded to different nutrient-rich patches, and how the responses of roots themselves might differ from the responses of mycorrhizal fungi. We obtained three key findings. First, thin-root species mostly produced absorptive fine roots for resource foraging, whereas thick-root species showed greater reliance on mycorrhizal fungi. Second, root length increased, but mycorrhizal colonization decreased, significantly with the +NPK treatment across 14 species. Third, root architectural traits (e.g. branching intensity or ratio) exhibited greater phenotypic plasticity than root morphological traits (e.g. root diameter or SRL) in response to nutrient-rich patches.</span></p><span data-dcnode-id="4781" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="4572" id="nph13434-sec-0015"><span data-dcnode-id="4780" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="4778" id="nph13434-sec-0015-title"><span data-dcnode-id="4779" instrument_node=""> Complementarity between roots and fungi in nutrient foraging strategies</span></h3><span data-dcnode-id="4777" instrument_node="">
</span><p data-dcnode-id="4713"><span data-dcnode-id="4776" instrument_node="">Increasing evidence supports the idea that traits of absorptive fine roots exhibit wide variation across species and that the colonization by AM fungi is strongly influenced by the root traits (e.g. root diameter) of their host plants (Baylis, </span><span data-dcnode-id="4773"><a class="bibLink tab-link" data-dcnode-id="4774" data-tab="pane-pcw-references" href="#nph13434-bib-0004" id="nph13434-bib-0004R"><span data-dcnode-id="4775" instrument_node="">1975</span></a></span><span data-dcnode-id="4772" instrument_node="">; Fitter, </span><span data-dcnode-id="4769"><a class="bibLink tab-link" data-dcnode-id="4770" data-tab="pane-pcw-references" href="#nph13434-bib-0020" id="nph13434-bib-0020R"><span data-dcnode-id="4771" instrument_node="">2004</span></a></span><span data-dcnode-id="4768" instrument_node="">; Holdaway </span><i data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4765" instrument_node="">., </span><span data-dcnode-id="4762"><a class="bibLink tab-link" data-dcnode-id="4763" data-tab="pane-pcw-references" href="#nph13434-bib-0032" id="nph13434-bib-0032R"><span data-dcnode-id="4764" instrument_node="">2011</span></a></span><span data-dcnode-id="4761" instrument_node="">; Kong </span><i data-dcnode-id="4759"><span data-dcnode-id="4760" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4758" instrument_node="">., </span><span data-dcnode-id="4755"><a class="bibLink tab-link" data-dcnode-id="4756" data-tab="pane-pcw-references" href="#nph13434-bib-0040" id="nph13434-bib-0040R"><span data-dcnode-id="4757" instrument_node="">2014</span></a></span><span data-dcnode-id="4754" instrument_node="">). Species with thick and sparsely branched roots generally depend more on AM fungi than do species with thin and densely branched roots (Brundrett, </span><span data-dcnode-id="4751"><a class="bibLink tab-link" data-dcnode-id="4752" data-tab="pane-pcw-references" href="#nph13434-bib-0006" id="nph13434-bib-0006R"><span data-dcnode-id="4753" instrument_node="">2002</span></a></span><span data-dcnode-id="4750" instrument_node="">; Kong </span><i data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4747" instrument_node="">., </span><span data-dcnode-id="4744"><a class="bibLink tab-link" data-dcnode-id="4745" data-tab="pane-pcw-references" href="#nph13434-bib-0040" id="nph13434-bib-0040R"><span data-dcnode-id="4746" instrument_node="">2014</span></a></span><span data-dcnode-id="4743" instrument_node="">). In this study, we used a root-bag approach to test the complementarity between roots and fungi in nutrient foraging strategies. This approach has both shortcomings and tremendous potential value. For example, different species may have different recovery rates from root pruning, and some species, such as </span><i data-dcnode-id="4741"><span data-dcnode-id="4742" instrument_node="">A.&nbsp;cinnamomifolium</span></i><span data-dcnode-id="4740" instrument_node="">, showed low regrowth capacity from root pruning. Nevertheless, this approach is valuable for quantitative research on root production by isolating roots of different trees in a mixed forest (Comas &amp; Eissenstat, </span><span data-dcnode-id="4737"><a class="bibLink tab-link" data-dcnode-id="4738" data-tab="pane-pcw-references" href="#nph13434-bib-0009" id="nph13434-bib-0009R"><span data-dcnode-id="4739" instrument_node="">2004</span></a></span><span data-dcnode-id="4736" instrument_node="">). Our results showed that, compared with thick-root species, thin-root species had a better ability to regrow roots following pruning (Fig.&nbsp;</span><a data-dcnode-id="4734" href="#nph13434-fig-0001"><span data-dcnode-id="4735" instrument_node="">1</span></a><span data-dcnode-id="4733" instrument_node="">a) and showed more root length proliferation (Figs&nbsp;</span><a data-dcnode-id="4731" href="#nph13434-fig-0001"><span data-dcnode-id="4732" instrument_node="">1</span></a><span data-dcnode-id="4730" instrument_node="">b, </span><a data-dcnode-id="4728" href="#nph13434-fig-0002"><span data-dcnode-id="4729" instrument_node="">2</span></a><span data-dcnode-id="4727" instrument_node="">a), but had lower AM colonization and extramatrical hyphal length per unit root length (Fig.&nbsp;</span><a data-dcnode-id="4725" href="#nph13434-fig-0001"><span data-dcnode-id="4726" instrument_node="">1</span></a><span data-dcnode-id="4724" instrument_node="">d,e). These results indicate that a distinct complementarity in belowground resource foraging exists between absorptive fine roots and their associated mycorrhizal fungi across these species: thin-root species forage mainly by using absorptive fine roots, whereas thick-root species forage with more reliance on mycorrhizal fungi. In a similar study using six temperate AM tree species, Eissenstat </span><i data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4721" instrument_node="">. (</span><span data-dcnode-id="4718"><a class="bibLink tab-link" data-dcnode-id="4719" data-tab="pane-pcw-references" href="#nph13434-bib-0100" id="nph13434-bib-0100R"><span data-dcnode-id="4720" instrument_node="">2015</span></a></span><span data-dcnode-id="4717" instrument_node="">) also observed that thick-root species showed more reliance than thin-root species on mycorrhizal fungi for foraging after root pruning and following nutrient additions (</span><i data-dcnode-id="4715"><span data-dcnode-id="4716" instrument_node="">P</span></i><span data-dcnode-id="4714" instrument_node="">&nbsp;&lt;&nbsp;0.01).</span></p><span data-dcnode-id="4712" instrument_node="">
</span><p data-dcnode-id="4657"><span data-dcnode-id="4711" instrument_node="">The complementarity between absorptive fine roots and mycorrhizal fungi in resource foraging across species may be explained by the trade-off between root construction costs and resource acquisition benefits. From a cost–benefit perspective, the most successful plants should use root and mycorrhizal foraging to maximize benefits, whilst minimizing costs for soil resource acquisition (Eissenstat &amp; Yanai, </span><span data-dcnode-id="4708"><a class="bibLink tab-link" data-dcnode-id="4709" data-tab="pane-pcw-references" href="#nph13434-bib-0016" id="nph13434-bib-0016R"><span data-dcnode-id="4710" instrument_node="">1997</span></a></span><span data-dcnode-id="4707" instrument_node="">). One important cost is tissue construction costs for building absorptive surfaces for water and soil nutrients. Thin-root species have lower construction costs per unit root length (as indicated by their high SRL values, Table&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="4705" href="#nph13434-tbl-0001" title="Link to table"><span data-dcnode-id="4706" instrument_node="">1</span></a><span data-dcnode-id="4704" instrument_node="">); thus, it is not surprising that they show more root length proliferation to increase nutrient acquisition from soil (Fig.&nbsp;</span><a data-dcnode-id="4702" href="#nph13434-fig-0002"><span data-dcnode-id="4703" instrument_node="">2</span></a><span data-dcnode-id="4701" instrument_node="">a; Eissenstat, </span><span data-dcnode-id="4698"><a class="bibLink tab-link" data-dcnode-id="4699" data-tab="pane-pcw-references" href="#nph13434-bib-0015" id="nph13434-bib-0015R"><span data-dcnode-id="4700" instrument_node="">1991</span></a></span><span data-dcnode-id="4697" instrument_node="">; Hodge, </span><span data-dcnode-id="4694"><a class="bibLink tab-link" data-dcnode-id="4695" data-tab="pane-pcw-references" href="#nph13434-bib-0030" id="nph13434-bib-0030R"><span data-dcnode-id="4696" instrument_node="">2004</span></a></span><span data-dcnode-id="4693" instrument_node="">). Conversely, thick-root species have higher construction costs per unit root length (low SRL values, Table&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="4691" href="#nph13434-tbl-0001" title="Link to table"><span data-dcnode-id="4692" instrument_node="">1</span></a><span data-dcnode-id="4690" instrument_node="">); thus, the production of root length (thick root diameter) may not be a very efficient way of generating absorptive surfaces. Instead, investing carbon in much finer mycorrhizal fungal hyphae with low construction costs per unit length (hyphae typically have diameters of more than ten-fold thinner than even the finest roots in most tree species) (Friese &amp; Allen, </span><span data-dcnode-id="4687"><a class="bibLink tab-link" data-dcnode-id="4688" data-tab="pane-pcw-references" href="#nph13434-bib-0022" id="nph13434-bib-0022R"><span data-dcnode-id="4689" instrument_node="">1991</span></a></span><span data-dcnode-id="4686" instrument_node="">) may be more efficient. Although the high construction costs of thick-root species may be compensated by increasing the root lifespan (McCormack </span><i data-dcnode-id="4684"><span data-dcnode-id="4685" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4683" instrument_node="">., </span><span data-dcnode-id="4680"><a class="bibLink tab-link" data-dcnode-id="4681" data-tab="pane-pcw-references" href="#nph13434-bib-0047" id="nph13434-bib-0047R"><span data-dcnode-id="4682" instrument_node="">2012</span></a></span><span data-dcnode-id="4679" instrument_node="">; Adams </span><i data-dcnode-id="4677"><span data-dcnode-id="4678" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4676" instrument_node="">., </span><span data-dcnode-id="4673"><a class="bibLink tab-link" data-dcnode-id="4674" data-tab="pane-pcw-references" href="#nph13434-bib-0001" id="nph13434-bib-0001R"><span data-dcnode-id="4675" instrument_node="">2013</span></a></span><span data-dcnode-id="4672" instrument_node="">), increasing mycorrhizal hyphal production is clearly a strategy frequently adopted by these thick-root species (Kong </span><i data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4669" instrument_node="">., </span><span data-dcnode-id="4666"><a class="bibLink tab-link" data-dcnode-id="4667" data-tab="pane-pcw-references" href="#nph13434-bib-0040" id="nph13434-bib-0040R"><span data-dcnode-id="4668" instrument_node="">2014</span></a></span><span data-dcnode-id="4665" instrument_node="">; Lee </span><i data-dcnode-id="4663"><span data-dcnode-id="4664" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4662" instrument_node="">., </span><span data-dcnode-id="4659"><a class="bibLink tab-link" data-dcnode-id="4660" data-tab="pane-pcw-references" href="#nph13434-bib-0041" id="nph13434-bib-0041R"><span data-dcnode-id="4661" instrument_node="">2014</span></a></span><span data-dcnode-id="4658" instrument_node="">). Indeed, if thick-root species are to produce an absorptive length comparable with that of thin-root species, the production of more mycorrhizal hyphae would seem to be the only viable strategy.</span></p><span data-dcnode-id="4656" instrument_node="">
</span><p data-dcnode-id="4574"><span data-dcnode-id="4655" instrument_node="">Thus, our results are consistent with the hypothesis that thin-root species are generally efficient in producing root length, whereas thick-root species rely more on mycorrhizal fungi for the acquisition of nutrients. This finding suggests that thin- and thick-root species use markedly different nutrient foraging strategies. A recent meta-analysis by Maherali (</span><span data-dcnode-id="4652"><a class="bibLink tab-link" data-dcnode-id="4653" data-tab="pane-pcw-references" href="#nph13434-bib-0046" id="nph13434-bib-0046R"><span data-dcnode-id="4654" instrument_node="">2014</span></a></span><span data-dcnode-id="4651" instrument_node="">) argued that coarse root architecture is not necessarily a predictor of plant growth response to AM fungal colonization (see also Veresoglou &amp; Rillig, </span><span data-dcnode-id="4648"><a class="bibLink tab-link" data-dcnode-id="4649" data-tab="pane-pcw-references" href="#nph13434-bib-0071" id="nph13434-bib-0071R"><span data-dcnode-id="4650" instrument_node="">2014</span></a></span><span data-dcnode-id="4647" instrument_node="">), which seems to contradict our results. However, our study differs from this meta-analysis in that we focused on root and mycorrhizal length production rather than on the whole-plant growth response. Indeed, our results also showed that, despite the marked differences in root length proliferation and mycorrhizal colonization/hyphal production across species, total root biomass growth did not differ significantly across species. Thin-root species produced much more root length than thick-root species (Fig.&nbsp;</span><a data-dcnode-id="4645" href="#nph13434-fig-0002"><span data-dcnode-id="4646" instrument_node="">2</span></a><span data-dcnode-id="4644" instrument_node="">a), but with similar investments in root biomass (Fig.&nbsp;</span><a data-dcnode-id="4642" href="#nph13434-fig-0001"><span data-dcnode-id="4643" instrument_node="">1</span></a><span data-dcnode-id="4641" instrument_node="">c). For example, </span><i data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">Liquidambar formosana</span></i><span data-dcnode-id="4638" instrument_node="">, which had a thinner root diameter for combined first- and second-order roots (0.26&nbsp;±&nbsp;0.01&nbsp;mm), showed root length proliferation </span><i data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">c</span></i><span data-dcnode-id="4635" instrument_node="">.&nbsp;12-fold greater than that of </span><i data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">Taxus chinensis,</span></i><span data-dcnode-id="4632" instrument_node=""> which had a much thicker root diameter for combined first- and second-order roots (0.86&nbsp;±&nbsp;0.07&nbsp;mm), across different nutrient addition treatments (Table&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="4630" href="#nph13434-tbl-0001" title="Link to table"><span data-dcnode-id="4631" instrument_node="">1</span></a><span data-dcnode-id="4629" instrument_node="">; Fig.&nbsp;</span><a data-dcnode-id="4627" href="#nph13434-fig-0002"><span data-dcnode-id="4628" instrument_node="">2</span></a><span data-dcnode-id="4626" instrument_node="">a). However, the total root biomass corresponding to these contrasting root length responses only differed by </span><i data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">c</span></i><span data-dcnode-id="4623" instrument_node="">.&nbsp;three-fold between the two species (data not shown). Thus, total carbon allocation to root and hyphal production may not differ as markedly across different species. This is consistent with a recent study by Valverde-Barrantes </span><i data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4620" instrument_node="">. (</span><span data-dcnode-id="4617"><a class="bibLink tab-link" data-dcnode-id="4618" data-tab="pane-pcw-references" href="#nph13434-bib-0070" id="nph13434-bib-0070R"><span data-dcnode-id="4619" instrument_node="">2014</span></a></span><span data-dcnode-id="4616" instrument_node="">), who showed that different canopy species allocated similar root biomass in high-resource patches in natural forests. Moreover, although thin-root species may be efficient in producing root length, they may derive little benefit (commensalism, </span><i data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">sensu</span></i><span data-dcnode-id="4613" instrument_node=""> Johnson </span><i data-dcnode-id="4611"><span data-dcnode-id="4612" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4610" instrument_node="">., </span><span data-dcnode-id="4607"><a class="bibLink tab-link" data-dcnode-id="4608" data-tab="pane-pcw-references" href="#nph13434-bib-0037" id="nph13434-bib-0037R"><span data-dcnode-id="4609" instrument_node="">2015</span></a></span><span data-dcnode-id="4606" instrument_node="">) and may even be negatively impacted by AM fungi (parasitism, </span><i data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">sensu</span></i><span data-dcnode-id="4603" instrument_node=""> Johnson </span><i data-dcnode-id="4601"><span data-dcnode-id="4602" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4600" instrument_node="">., </span><span data-dcnode-id="4597"><a class="bibLink tab-link" data-dcnode-id="4598" data-tab="pane-pcw-references" href="#nph13434-bib-0037" id="nph13434-bib-0037R"><span data-dcnode-id="4599" instrument_node="">2015</span></a></span><span data-dcnode-id="4596" instrument_node="">), whereas thick-root species may consistently gain benefits from their mycorrhizal fungi, thus reducing the advantage of thin-root species, and placing both types of species on a balance in terms of overall plant performance. In fact, thin-root species tend to have a high percentage of passage cells (Zadworny &amp; Eissenstat, </span><span data-dcnode-id="4593"><a class="bibLink tab-link" data-dcnode-id="4594" data-tab="pane-pcw-references" href="#nph13434-bib-0075" id="nph13434-bib-0075R"><span data-dcnode-id="4595" instrument_node="">2011</span></a></span><span data-dcnode-id="4592" instrument_node="">). Because most mycorrhizal hyphae may enter roots exclusively through passage cells (Sharda &amp; Koide, </span><span data-dcnode-id="4589"><a class="bibLink tab-link" data-dcnode-id="4590" data-tab="pane-pcw-references" href="#nph13434-bib-0060" id="nph13434-bib-0060R"><span data-dcnode-id="4591" instrument_node="">2008</span></a></span><span data-dcnode-id="4588" instrument_node="">), it may be unavoidable for thin-root species to contain a certain degree of mycorrhizal colonization even if no benefits can be gained, particularly when soil available P is high, as in our study (soil available P concentration averaged 24.53&nbsp;±&nbsp;1.79&nbsp;mg&nbsp;kg</span><sup data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">−1</span></sup><span data-dcnode-id="4585" instrument_node="">) and a recent study in grasslands (available P concentration reaching 46.0&nbsp;±&nbsp;2.1&nbsp;mg&nbsp;kg</span><sup data-dcnode-id="4583"><span data-dcnode-id="4584" instrument_node="">−1</span></sup><span data-dcnode-id="4582" instrument_node="">; Johnson </span><i data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4579" instrument_node="">., </span><span data-dcnode-id="4576"><a class="bibLink tab-link" data-dcnode-id="4577" data-tab="pane-pcw-references" href="#nph13434-bib-0037" id="nph13434-bib-0037R"><span data-dcnode-id="4578" instrument_node="">2015</span></a></span><span data-dcnode-id="4575" instrument_node="">). Future studies should further examine these potential mechanisms related to soil N/P stoichiometry, root anatomy and mycorrhizal fungal behavior to fully understand how mycorrhizal fungi influence plant growth performance and plant competition in natural communities.</span></p><span data-dcnode-id="4573" instrument_node="">
</span></section><span data-dcnode-id="4571" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="4451" id="nph13434-sec-0016"><span data-dcnode-id="4570" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="4568" id="nph13434-sec-0016-title"><span data-dcnode-id="4569" instrument_node=""> Responses of roots and mycorrhizal fungi to different types of nutrient-rich patch</span></h3><span data-dcnode-id="4567" instrument_node="">
</span><p data-dcnode-id="4491"><span data-dcnode-id="4566" instrument_node="">Our results support the hypothesis that plants will increase root length, but reduce mycorrhizal colonization, in response to nutrient-rich patches. The responses of roots and mycorrhizal fungi found here are consistent with those in previous studies. For example, many studies have shown increased root growth (Drew, </span><span data-dcnode-id="4563"><a class="bibLink tab-link" data-dcnode-id="4564" data-tab="pane-pcw-references" href="#nph13434-bib-0011" id="nph13434-bib-0011R"><span data-dcnode-id="4565" instrument_node="">1975</span></a></span><span data-dcnode-id="4562" instrument_node="">; Drew &amp; Saker, </span><span data-dcnode-id="4559"><a class="bibLink tab-link" data-dcnode-id="4560" data-tab="pane-pcw-references" href="#nph13434-bib-0012" id="nph13434-bib-0012R"><span data-dcnode-id="4561" instrument_node="">1975</span></a></span><span data-dcnode-id="4558" instrument_node="">; Hodge </span><i data-dcnode-id="4556"><span data-dcnode-id="4557" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4555" instrument_node="">., </span><span data-dcnode-id="4552"><a class="bibLink tab-link" data-dcnode-id="4553" data-tab="pane-pcw-references" href="#nph13434-bib-0031" id="nph13434-bib-0031R"><span data-dcnode-id="4554" instrument_node="">1998</span></a></span><span data-dcnode-id="4551" instrument_node="">; Hodge, </span><span data-dcnode-id="4548"><a class="bibLink tab-link" data-dcnode-id="4549" data-tab="pane-pcw-references" href="#nph13434-bib-0030" id="nph13434-bib-0030R"><span data-dcnode-id="4550" instrument_node="">2004</span></a></span><span data-dcnode-id="4547" instrument_node="">), but decreased mycorrhizal colonization (Koide &amp; Li, </span><span data-dcnode-id="4544"><a class="bibLink tab-link" data-dcnode-id="4545" data-tab="pane-pcw-references" href="#nph13434-bib-0039" id="nph13434-bib-0039R"><span data-dcnode-id="4546" instrument_node="">1991</span></a></span><span data-dcnode-id="4543" instrument_node="">; Nilsson &amp; Wallander, </span><span data-dcnode-id="4540"><a class="bibLink tab-link" data-dcnode-id="4541" data-tab="pane-pcw-references" href="#nph13434-bib-0053" id="nph13434-bib-0053R"><span data-dcnode-id="4542" instrument_node="">2003</span></a></span><span data-dcnode-id="4539" instrument_node="">; Nilsson </span><i data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4536" instrument_node="">., </span><span data-dcnode-id="4533"><a class="bibLink tab-link" data-dcnode-id="4534" data-tab="pane-pcw-references" href="#nph13434-bib-0052" id="nph13434-bib-0052R"><span data-dcnode-id="4535" instrument_node="">2007</span></a></span><span data-dcnode-id="4532" instrument_node="">; Sharda &amp; Koide, </span><span data-dcnode-id="4529"><a class="bibLink tab-link" data-dcnode-id="4530" data-tab="pane-pcw-references" href="#nph13434-bib-0061" id="nph13434-bib-0061R"><span data-dcnode-id="4531" instrument_node="">2010</span></a></span><span data-dcnode-id="4528" instrument_node="">) , with increasing nutrient availability. The contrasting responses between roots and mycorrhizal fungi to nutrient-rich patches may be caused by the extra costs of maintenance and proliferation for hyphae, coupled with potential decreases in the relative benefits (i.e. nutrient acquisition), as nutrients become more freely available and are no longer limiting (Graham &amp; Eissenstat, </span><span data-dcnode-id="4525"><a class="bibLink tab-link" data-dcnode-id="4526" data-tab="pane-pcw-references" href="#nph13434-bib-0025" id="nph13434-bib-0025R"><span data-dcnode-id="4527" instrument_node="">1998</span></a></span><span data-dcnode-id="4524" instrument_node="">; Gavito &amp; Olsson, </span><span data-dcnode-id="4521"><a class="bibLink tab-link" data-dcnode-id="4522" data-tab="pane-pcw-references" href="#nph13434-bib-0023" id="nph13434-bib-0023R"><span data-dcnode-id="4523" instrument_node="">2003</span></a></span><span data-dcnode-id="4520" instrument_node="">). The finding that mycorrhizal colonization was reduced in all species to a similar degree (Fig.&nbsp;</span><a data-dcnode-id="4518" href="#nph13434-fig-0001"><span data-dcnode-id="4519" instrument_node="">1</span></a><span data-dcnode-id="4517" instrument_node="">d,e) differs somewhat from a similar study using six temperate AM tree species (Eissenstat </span><i data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">et al</span></i><span data-dcnode-id="4514" instrument_node="">., </span><span data-dcnode-id="4511"><a class="bibLink tab-link" data-dcnode-id="4512" data-tab="pane-pcw-references" href="#nph13434-bib-0100" id="nph13434-bib-0100R"><span data-dcnode-id="4513" instrument_node="">2015</span></a></span><span data-dcnode-id="4510" instrument_node="">), in which thin-root species showed a greater reduction than thick-root species in mycorrhizal colonization in nutrient-rich patches. These differences may again be related to the fact that, in our study, soil P availability was high and mycorrhizal colonization may offer little benefit to thin-root species, whereas, in Eissenstat </span><i data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">et al</span></i><span data-dcnode-id="4507" instrument_node="">. (</span><span data-dcnode-id="4504"><a class="bibLink tab-link" data-dcnode-id="4505" data-tab="pane-pcw-references" href="#nph13434-bib-0100" id="nph13434-bib-0100R"><span data-dcnode-id="4506" instrument_node="">2015</span></a></span><span data-dcnode-id="4503" instrument_node="">), soil available P was probably in short supply and thin-root species derived substantial benefits from mycorrhizal associations when soil was not amended with fertilizer. It should also be noted that the findings in our study and in Eissenstat </span><i data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">et al</span></i><span data-dcnode-id="4500" instrument_node="">. (</span><span data-dcnode-id="4497"><a class="bibLink tab-link" data-dcnode-id="4498" data-tab="pane-pcw-references" href="#nph13434-bib-0100" id="nph13434-bib-0100R"><span data-dcnode-id="4499" instrument_node="">2015</span></a></span><span data-dcnode-id="4496" instrument_node="">) apply only to mineral nutrient additions. Root and mycorrhizal fungal response to organic patches may differ as mycorrhizal fungi may have an advantage in utilizing organic patches by secreting enzymes, such as phosphatases (Koide &amp; Kabir, </span><span data-dcnode-id="4493"><a class="bibLink tab-link" data-dcnode-id="4494" data-tab="pane-pcw-references" href="#nph13434-bib-0038" id="nph13434-bib-0038R"><span data-dcnode-id="4495" instrument_node="">2000</span></a></span><span data-dcnode-id="4492" instrument_node="">).</span></p><span data-dcnode-id="4490" instrument_node="">
</span><p data-dcnode-id="4453"><span data-dcnode-id="4489" instrument_node="">Despite the general pattern of root proliferation being favored over mycorrhizal colonization in nutrient-rich patches, the degrees and intensities of the responses were not uniform across different species and types of nutrient-rich patch (Fig.&nbsp;</span><a data-dcnode-id="4487" href="#nph13434-fig-0002"><span data-dcnode-id="4488" instrument_node="">2</span></a><span data-dcnode-id="4486" instrument_node="">). Root proliferation was stimulated and mycorrhizal colonization was suppressed for most species in nutrient-rich patches, but overall responses of average all species were significant only in +NPK patches, but not in +N or +P patches (Fig.&nbsp;</span><a data-dcnode-id="4484" href="#nph13434-fig-0002"><span data-dcnode-id="4485" instrument_node="">2</span></a><span data-dcnode-id="4483" instrument_node="">). This may be a result of the differential sensitivity of species to different types of nutrient-rich patch, and root growth may be constrained by highly imbalanced N and P in the patches. These differential responses have also been observed in previous studies. For example, Jackson &amp; Caldwell (</span><span data-dcnode-id="4480"><a class="bibLink tab-link" data-dcnode-id="4481" data-tab="pane-pcw-references" href="#nph13434-bib-0034" id="nph13434-bib-0034R"><span data-dcnode-id="4482" instrument_node="">1989</span></a></span><span data-dcnode-id="4479" instrument_node="">) observed marked root proliferation of </span><i data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">Artemisia tridentata</span></i><span data-dcnode-id="4476" instrument_node=""> in NPK- and N-rich patches, but only slight root growth in P-rich soil, probably because plants can regulate the degree of root proliferation according to their demands for different soil resources. Liu </span><i data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4473" instrument_node="">. (</span><span data-dcnode-id="4470"><a class="bibLink tab-link" data-dcnode-id="4471" data-tab="pane-pcw-references" href="#nph13434-bib-0044" id="nph13434-bib-0044R"><span data-dcnode-id="4472" instrument_node="">2012</span></a></span><span data-dcnode-id="4469" instrument_node="">) found that </span><i data-dcnode-id="4467"><span data-dcnode-id="4468" instrument_node="">Elymus nutans</span></i><span data-dcnode-id="4466" instrument_node=""> roots showed a significant reduction in AM colonization with high fertilizer inputs (19.1&nbsp;g N and 21.1&nbsp;g P&nbsp;m</span><sup data-dcnode-id="4464"><span data-dcnode-id="4465" instrument_node="">−2</span></sup><span data-dcnode-id="4463" instrument_node="">&nbsp;yr</span><sup data-dcnode-id="4461"><span data-dcnode-id="4462" instrument_node="">−1</span></sup><span data-dcnode-id="4460" instrument_node="">), but no significant responses to low fertilizer inputs (12.7&nbsp;g N and 14.1&nbsp;g P&nbsp;m</span><sup data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">−2</span></sup><span data-dcnode-id="4457" instrument_node="">&nbsp;yr</span><sup data-dcnode-id="4455"><span data-dcnode-id="4456" instrument_node="">−1</span></sup><span data-dcnode-id="4454" instrument_node="">), in comparison with the unfertilized control, suggesting that nutrient addition doses may also influence the responses of AM fungi. Overall, the question of if and how a plant alters patterns of root proliferation or mycorrhizal colonization in nutrient-rich patches depends on both the degree and types of nutrient limitation and nutrient capture ability of different species.</span></p><span data-dcnode-id="4452" instrument_node="">
</span></section><span data-dcnode-id="4450" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="4341" id="nph13434-sec-0017"><span data-dcnode-id="4449" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="4447" id="nph13434-sec-0017-title"><span data-dcnode-id="4448" instrument_node=""> Plasticity of root morphological and architectural traits to nutrient-rich patches</span></h3><span data-dcnode-id="4446" instrument_node="">
</span><p data-dcnode-id="4433"><span data-dcnode-id="4445" instrument_node="">Plant roots often proliferate when they encounter nutrient-rich patches (Drew, </span><span data-dcnode-id="4442"><a class="bibLink tab-link" data-dcnode-id="4443" data-tab="pane-pcw-references" href="#nph13434-bib-0011" id="nph13434-bib-0011R"><span data-dcnode-id="4444" instrument_node="">1975</span></a></span><span data-dcnode-id="4441" instrument_node="">; Drew &amp; Saker, </span><span data-dcnode-id="4438"><a class="bibLink tab-link" data-dcnode-id="4439" data-tab="pane-pcw-references" href="#nph13434-bib-0012" id="nph13434-bib-0012R"><span data-dcnode-id="4440" instrument_node="">1975</span></a></span><span data-dcnode-id="4437" instrument_node="">). However, which types of root traits are primarily responsible for root proliferation in nutrient-rich patches have not been firmly established. In our study, root architectural traits (e.g. root branching intensity or ratio, and total branch order) responded significantly to fertilization treatments, whereas root morphological traits (e.g. root diameter, SRL and root tissue density) did not show significant responses to fertilization treatments averaged across 14 AM tree species (Table&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="4435" href="#nph13434-tbl-0003" title="Link to table"><span data-dcnode-id="4436" instrument_node="">3</span></a><span data-dcnode-id="4434" instrument_node="">).</span></p><span data-dcnode-id="4432" instrument_node="">
</span><p data-dcnode-id="4394"><span data-dcnode-id="4431" instrument_node="">The lack of response of root morphological traits to nutrient-rich patches may be a result of the phylogenetic conservatism of root morphology. Key root morphological traits, such as root diameter, may have high phylogenetic conservatism and thus have limited capacity to respond to environmental changes (Chen </span><i data-dcnode-id="4429"><span data-dcnode-id="4430" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4428" instrument_node="">., </span><span data-dcnode-id="4425"><a class="bibLink tab-link" data-dcnode-id="4426" data-tab="pane-pcw-references" href="#nph13434-bib-0007" id="nph13434-bib-0007R"><span data-dcnode-id="4427" instrument_node="">2013</span></a></span><span data-dcnode-id="4424" instrument_node="">; Kong </span><i data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4421" instrument_node="">., </span><span data-dcnode-id="4418"><a class="bibLink tab-link" data-dcnode-id="4419" data-tab="pane-pcw-references" href="#nph13434-bib-0040" id="nph13434-bib-0040R"><span data-dcnode-id="4420" instrument_node="">2014</span></a></span><span data-dcnode-id="4417" instrument_node="">). When encountering nutrient-rich patches in the soil, thick-root species of basal clades may have limited capacity for high root growth rates compared with the thin-root species of more recently diverged clades. In our study, AM tree species from more basal families, including Lauraceae (e.g. </span><i data-dcnode-id="4415"><span data-dcnode-id="4416" instrument_node="">Cinnamomum porrectum</span></i><span data-dcnode-id="4414" instrument_node="">,</span><i data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node=""> Machilus oculodracontis</span></i><span data-dcnode-id="4411" instrument_node=""> and </span><i data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">Neolitsea phanerophlebia</span></i><span data-dcnode-id="4408" instrument_node="">) and Magnoliaceae (e.g. </span><i data-dcnode-id="4406"><span data-dcnode-id="4407" instrument_node="">Manglietia yuyuanensis</span></i><span data-dcnode-id="4405" instrument_node="">), had thicker root diameters, lower root branching intensities and higher mycorrhizal colonization than other broadleaf tree species from more recently diverged families (Table&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="4403" href="#nph13434-tbl-0001" title="Link to table"><span data-dcnode-id="4404" instrument_node="">1</span></a><span data-dcnode-id="4402" instrument_node="">; see also Kong </span><i data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4399" instrument_node="">., </span><span data-dcnode-id="4396"><a class="bibLink tab-link" data-dcnode-id="4397" data-tab="pane-pcw-references" href="#nph13434-bib-0040" id="nph13434-bib-0040R"><span data-dcnode-id="4398" instrument_node="">2014</span></a></span><span data-dcnode-id="4395" instrument_node="">). Therefore, although the apparent cause of patterns of root proliferation and reliance on mycorrhizal fungi may be related to trade-offs associated with root diameter, more basic patterns of plant phylogeny could be the underlying factor.</span></p><span data-dcnode-id="4393" instrument_node="">
</span><p data-dcnode-id="4343"><span data-dcnode-id="4392" instrument_node="">In contrast with the high conservatism of root diameter, root branching has been shown to have relatively low phylogenetic conservatism and may be more sensitive to nutrient patches (Kong </span><i data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4389" instrument_node="">., </span><span data-dcnode-id="4386"><a class="bibLink tab-link" data-dcnode-id="4387" data-tab="pane-pcw-references" href="#nph13434-bib-0040" id="nph13434-bib-0040R"><span data-dcnode-id="4388" instrument_node="">2014</span></a></span><span data-dcnode-id="4385" instrument_node="">). Other studies have also shown that root morphological traits are less plastic than architectural traits to nutrient additions. For example, Fitter and coworkers showed that roots were much less variable in morphology than in architecture in the efficient exploration of soil resources (Fitter, </span><span data-dcnode-id="4382"><a class="bibLink tab-link" data-dcnode-id="4383" data-tab="pane-pcw-references" href="#nph13434-bib-0018" id="nph13434-bib-0018R"><span data-dcnode-id="4384" instrument_node="">1982</span></a></span><span data-dcnode-id="4381" instrument_node="">, </span><span data-dcnode-id="4378"><a class="bibLink tab-link" data-dcnode-id="4379" data-tab="pane-pcw-references" href="#nph13434-bib-0019" id="nph13434-bib-0019R"><span data-dcnode-id="4380" instrument_node="">1987</span></a></span><span data-dcnode-id="4377" instrument_node="">; Fitter &amp; Stickland, </span><span data-dcnode-id="4374"><a class="bibLink tab-link" data-dcnode-id="4375" data-tab="pane-pcw-references" href="#nph13434-bib-0021" id="nph13434-bib-0021R"><span data-dcnode-id="4376" instrument_node="">1991</span></a></span><span data-dcnode-id="4373" instrument_node="">). It should be noted that plants may also employ other strategies to increase nutrient uptake in fertile patches, potentially including adjustments in root anatomy (e.g. minimizing secondary development) (Lynch, </span><span data-dcnode-id="4370"><a class="bibLink tab-link" data-dcnode-id="4371" data-tab="pane-pcw-references" href="#nph13434-bib-0045" id="nph13434-bib-0045R"><span data-dcnode-id="4372" instrument_node="">2011</span></a></span><span data-dcnode-id="4369" instrument_node="">; Gu </span><i data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4366" instrument_node="">., </span><span data-dcnode-id="4363"><a class="bibLink tab-link" data-dcnode-id="4364" data-tab="pane-pcw-references" href="#nph13434-bib-0028" id="nph13434-bib-0028R"><span data-dcnode-id="4365" instrument_node="">2014</span></a></span><span data-dcnode-id="4362" instrument_node="">; Kong </span><i data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4359" instrument_node="">., </span><span data-dcnode-id="4356"><a class="bibLink tab-link" data-dcnode-id="4357" data-tab="pane-pcw-references" href="#nph13434-bib-0040" id="nph13434-bib-0040R"><span data-dcnode-id="4358" instrument_node="">2014</span></a></span><span data-dcnode-id="4355" instrument_node="">) or through plant signaling mechanisms responding to limiting resources (Bisseling &amp; Scheres, </span><span data-dcnode-id="4352"><a class="bibLink tab-link" data-dcnode-id="4353" data-tab="pane-pcw-references" href="#nph13434-bib-0005" id="nph13434-bib-0005R"><span data-dcnode-id="4354" instrument_node="">2014</span></a></span><span data-dcnode-id="4351" instrument_node="">; Tabata </span><i data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="4348" instrument_node="">., </span><span data-dcnode-id="4345"><a class="bibLink tab-link" data-dcnode-id="4346" data-tab="pane-pcw-references" href="#nph13434-bib-0065" id="nph13434-bib-0065R"><span data-dcnode-id="4347" instrument_node="">2014</span></a></span><span data-dcnode-id="4344" instrument_node="">). Overall, the root length proliferation in nutrient-rich patches observed in our study was mainly achieved by the production of greater numbers of individual roots rather than an alteration in basic root morphology.</span></p><span data-dcnode-id="4342" instrument_node="">
</span></section><span data-dcnode-id="4340" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="4332" id="nph13434-sec-0018"><span data-dcnode-id="4339" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="4337" id="nph13434-sec-0018-title"><span data-dcnode-id="4338" instrument_node=""> Conclusion</span></h3><span data-dcnode-id="4336" instrument_node="">
</span><p data-dcnode-id="4334"><span data-dcnode-id="4335" instrument_node="">In this study, we found that there exists distinct complementarity between absorptive fine roots and mycorrhizal fungi in belowground resource foraging: thin-root species forage by using primarily absorptive fine roots, whereas thick-root species rely more on mycorrhizal fungi. Furthermore, our finding that plants significantly increase root length, but reduce mycorrhizal colonization, in response to the +NPK patches suggests that roots are favored over mycorrhizal fungi when foraging in nutrient-rich patches. These findings suggest that both root traits and soil nutrient conditions regulate root–mycorrhizal interactions. Future studies may incorporate additional comparisons using ectomycorrhizal species and other plant forms to determine how root traits, mycorrhizal type and soil conditions together mediate belowground resource foraging strategies.</span></p><span data-dcnode-id="4333" instrument_node="">
</span></section><span data-dcnode-id="4331" instrument_node="">
</span></section><span data-dcnode-id="4329" instrument_node="">

</span><p data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">We thank Zhengxia Chen for laboratory assistance, Yuelong Liang for field assistance, and Zeqing Ma and Chengen Ma for assistance in drawing the graphics. We also thank M. Luke McCormack, Guigang Lin and Le Li for their valuable comments on earlier versions of the manuscript. We are also grateful for helpful comments and suggestions from three anonymous reviewers and the Editor Dr Richard Norby. This research was supported by the National Natural Science Foundation of China (grant no. 31325006), the One-Hundred Talent Project of Chinese Academy of Sciences (no. KZZD-EW-TZ-11) and the US National Science Foundation (IOS 1120482).</span></p><span data-dcnode-id="4322" instrument_node="">

</span><h2 data-dcnode-id="4216"><span data-dcnode-id="4222" instrument_node="">
