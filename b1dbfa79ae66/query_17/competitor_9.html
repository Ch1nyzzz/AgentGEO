</span><section class="article-section article-section__abstract" data-dcnode-id="6924" data-lang="en" id="section-1-en" lang="en" style=""><span data-dcnode-id="6950" instrument_node="">
</span><h2 class="article-section__header section__title main main" data-dcnode-id="6948" id="d16398529"><span data-dcnode-id="6949" instrument_node="">Summary</span></h2><span data-dcnode-id="6947" instrument_node="">
</span><div class="article-section__content en main" data-dcnode-id="6926"><span data-dcnode-id="6946" instrument_node="">
</span><p data-dcnode-id="6944"><span data-dcnode-id="6945" instrument_node="">
</span></p><ul class="unordered-list" data-dcnode-id="6930"><span data-dcnode-id="6943" instrument_node="">
</span><li data-dcnode-id="6941"><span data-dcnode-id="6942" instrument_node="">In most cases, both roots and mycorrhizal fungi are needed for plant nutrient foraging. Frequently, the colonization of roots by arbuscular mycorrhizal (AM) fungi seems to be greater in species with thick and sparsely branched roots than in species with thin and densely branched roots. Yet, whether a complementarity exists between roots and mycorrhizal fungi across these two types of root system remains unclear.</span></li><span data-dcnode-id="6940" instrument_node="">
</span><li data-dcnode-id="6938"><span data-dcnode-id="6939" instrument_node="">We measured traits related to nutrient foraging (root morphology, architecture and proliferation, AM colonization and extramatrical hyphal length) across 14 coexisting AM subtropical tree species following root pruning and nutrient addition treatments.</span></li><span data-dcnode-id="6937" instrument_node="">
</span><li data-dcnode-id="6935"><span data-dcnode-id="6936" instrument_node="">After root pruning, species with thinner roots showed more root growth, but lower mycorrhizal colonization, than species with thicker roots. Under multi-nutrient (NPK) addition, root growth increased, but mycorrhizal colonization decreased significantly, whereas no significant changes were found under nitrogen or phosphate additions. Moreover, root length proliferation was mainly achieved by altering root architecture, but not root morphology.</span></li><span data-dcnode-id="6934" instrument_node="">
</span><li data-dcnode-id="6932"><span data-dcnode-id="6933" instrument_node="">Thin-root species seem to forage nutrients mainly via roots, whereas thick-root species rely more on mycorrhizal fungi. In addition, the reliance on mycorrhizal fungi was reduced by nutrient additions across all species. These findings highlight complementary strategies for nutrient foraging across coexisting species with contrasting root traits.</span></li><span data-dcnode-id="6931" instrument_node="">
</span></ul><span data-dcnode-id="6929" instrument_node="">
</span><p data-dcnode-id="6928"></p><span data-dcnode-id="6927" instrument_node="">
</span></div><span data-dcnode-id="6925" instrument_node="">
</span></section><span data-dcnode-id="6923" instrument_node="">
</span><div class="pb-dropzone" data-dcnode-id="6921" data-pb-dropzone="below-abstract-group"></div><span data-dcnode-id="6920" instrument_node="">
</span><section class="article-section article-section__full" data-dcnode-id="817"><span data-dcnode-id="6919" instrument_node="">
</span><section class="article-section__content" data-dcnode-id="6586" id="nph13434-sec-0001"><span data-dcnode-id="6918" instrument_node="">
</span><h2 class="article-section__title section__title section1" data-dcnode-id="6916" id="nph13434-sec-0001-title"><span data-dcnode-id="6917" instrument_node=""> Introduction</span></h2><span data-dcnode-id="6915" instrument_node="">
</span><p data-dcnode-id="6809"><span data-dcnode-id="6914" instrument_node="">Absorptive fine roots (i.e. non-woody roots in woody plants; Pregitzer </span><i data-dcnode-id="6912"><span data-dcnode-id="6913" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6911" instrument_node="">., </span><span data-dcnode-id="6908"><a class="bibLink tab-link" data-dcnode-id="6909" data-tab="pane-pcw-references" href="#nph13434-bib-0054" id="nph13434-bib-0054R"><span data-dcnode-id="6910" instrument_node="">2002</span></a></span><span data-dcnode-id="6907" instrument_node="">; Guo </span><i data-dcnode-id="6905"><span data-dcnode-id="6906" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6904" instrument_node="">., </span><span data-dcnode-id="6901"><a class="bibLink tab-link" data-dcnode-id="6902" data-tab="pane-pcw-references" href="#nph13434-bib-0029" id="nph13434-bib-0029R"><span data-dcnode-id="6903" instrument_node="">2008</span></a></span><span data-dcnode-id="6900" instrument_node="">) and mycorrhizal fungi both play key roles in soil resource acquisition (Robinson </span><i data-dcnode-id="6898"><span data-dcnode-id="6899" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6897" instrument_node="">., </span><span data-dcnode-id="6894"><a class="bibLink tab-link" data-dcnode-id="6895" data-tab="pane-pcw-references" href="#nph13434-bib-0059" id="nph13434-bib-0059R"><span data-dcnode-id="6896" instrument_node="">2003</span></a></span><span data-dcnode-id="6893" instrument_node="">). Recent studies have shown that traits of absorptive fine roots can vary widely across plant species (Pregitzer </span><i data-dcnode-id="6891"><span data-dcnode-id="6892" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6890" instrument_node="">., </span><span data-dcnode-id="6887"><a class="bibLink tab-link" data-dcnode-id="6888" data-tab="pane-pcw-references" href="#nph13434-bib-0054" id="nph13434-bib-0054R"><span data-dcnode-id="6889" instrument_node="">2002</span></a></span><span data-dcnode-id="6886" instrument_node="">; Tjoelker </span><i data-dcnode-id="6884"><span data-dcnode-id="6885" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6883" instrument_node="">., </span><span data-dcnode-id="6880"><a class="bibLink tab-link" data-dcnode-id="6881" data-tab="pane-pcw-references" href="#nph13434-bib-0067" id="nph13434-bib-0067R"><span data-dcnode-id="6882" instrument_node="">2005</span></a></span><span data-dcnode-id="6879" instrument_node="">; Guo </span><i data-dcnode-id="6877"><span data-dcnode-id="6878" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6876" instrument_node="">., </span><span data-dcnode-id="6873"><a class="bibLink tab-link" data-dcnode-id="6874" data-tab="pane-pcw-references" href="#nph13434-bib-0029" id="nph13434-bib-0029R"><span data-dcnode-id="6875" instrument_node="">2008</span></a></span><span data-dcnode-id="6872" instrument_node="">; Comas &amp; Eissenstat, </span><span data-dcnode-id="6869"><a class="bibLink tab-link" data-dcnode-id="6870" data-tab="pane-pcw-references" href="#nph13434-bib-0010" id="nph13434-bib-0010R"><span data-dcnode-id="6871" instrument_node="">2009</span></a></span><span data-dcnode-id="6868" instrument_node="">; Holdaway </span><i data-dcnode-id="6866"><span data-dcnode-id="6867" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6865" instrument_node="">., </span><span data-dcnode-id="6862"><a class="bibLink tab-link" data-dcnode-id="6863" data-tab="pane-pcw-references" href="#nph13434-bib-0032" id="nph13434-bib-0032R"><span data-dcnode-id="6864" instrument_node="">2011</span></a></span><span data-dcnode-id="6861" instrument_node="">). This variation in root traits may reflect key belowground foraging behaviour, such as reliance on mycorrhizal fungi (Graham &amp; Syvertsen, </span><span data-dcnode-id="6858"><a class="bibLink tab-link" data-dcnode-id="6859" data-tab="pane-pcw-references" href="#nph13434-bib-0026" id="nph13434-bib-0026R"><span data-dcnode-id="6860" instrument_node="">1985</span></a></span><span data-dcnode-id="6857" instrument_node="">; Rillig </span><i data-dcnode-id="6855"><span data-dcnode-id="6856" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6854" instrument_node="">., </span><span data-dcnode-id="6851"><a class="bibLink tab-link" data-dcnode-id="6852" data-tab="pane-pcw-references" href="#nph13434-bib-0057" id="nph13434-bib-0057R"><span data-dcnode-id="6853" instrument_node="">2003</span></a></span><span data-dcnode-id="6850" instrument_node="">; Kong </span><i data-dcnode-id="6848"><span data-dcnode-id="6849" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6847" instrument_node="">., </span><span data-dcnode-id="6844"><a class="bibLink tab-link" data-dcnode-id="6845" data-tab="pane-pcw-references" href="#nph13434-bib-0040" id="nph13434-bib-0040R"><span data-dcnode-id="6846" instrument_node="">2014</span></a></span><span data-dcnode-id="6843" instrument_node="">), and may be linked to plant performance, such as growth rate (Wahl &amp; Ryser, </span><span data-dcnode-id="6840"><a class="bibLink tab-link" data-dcnode-id="6841" data-tab="pane-pcw-references" href="#nph13434-bib-0072" id="nph13434-bib-0072R"><span data-dcnode-id="6842" instrument_node="">2000</span></a></span><span data-dcnode-id="6839" instrument_node="">; Comas </span><i data-dcnode-id="6837"><span data-dcnode-id="6838" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6836" instrument_node="">., </span><span data-dcnode-id="6833"><a class="bibLink tab-link" data-dcnode-id="6834" data-tab="pane-pcw-references" href="#nph13434-bib-0008" id="nph13434-bib-0008R"><span data-dcnode-id="6835" instrument_node="">2002</span></a></span><span data-dcnode-id="6832" instrument_node="">; Comas &amp; Eissenstat, </span><span data-dcnode-id="6829"><a class="bibLink tab-link" data-dcnode-id="6830" data-tab="pane-pcw-references" href="#nph13434-bib-0009" id="nph13434-bib-0009R"><span data-dcnode-id="6831" instrument_node="">2004</span></a></span><span data-dcnode-id="6828" instrument_node="">). The identification of patterns of root trait variation across species is thus valuable for understanding the nutrient foraging behavior of absorptive fine roots and mycorrhizal fungi, and the diversity of belowground resource acquisition strategies (Bardgett </span><i data-dcnode-id="6826"><span data-dcnode-id="6827" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6825" instrument_node="">., </span><span data-dcnode-id="6822"><a class="bibLink tab-link" data-dcnode-id="6823" data-tab="pane-pcw-references" href="#nph13434-bib-0002" id="nph13434-bib-0002R"><span data-dcnode-id="6824" instrument_node="">2014</span></a></span><span data-dcnode-id="6821" instrument_node="">; Iversen, </span><span data-dcnode-id="6818"><a class="bibLink tab-link" data-dcnode-id="6819" data-tab="pane-pcw-references" href="#nph13434-bib-0033" id="nph13434-bib-0033R"><span data-dcnode-id="6820" instrument_node="">2014</span></a></span><span data-dcnode-id="6817" instrument_node="">; McCormack </span><i data-dcnode-id="6815"><span data-dcnode-id="6816" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6814" instrument_node="">., </span><span data-dcnode-id="6811"><a class="bibLink tab-link" data-dcnode-id="6812" data-tab="pane-pcw-references" href="#nph13434-bib-0049" id="nph13434-bib-0049R"><span data-dcnode-id="6813" instrument_node="">2014</span></a></span><span data-dcnode-id="6810" instrument_node="">).</span></p><span data-dcnode-id="6808" instrument_node="">
</span><p data-dcnode-id="6749"><span data-dcnode-id="6807" instrument_node="">The variation of absorptive fine root traits and mycorrhizal colonization may be related to plant phylogeny (Brundrett, </span><span data-dcnode-id="6804"><a class="bibLink tab-link" data-dcnode-id="6805" data-tab="pane-pcw-references" href="#nph13434-bib-0006" id="nph13434-bib-0006R"><span data-dcnode-id="6806" instrument_node="">2002</span></a></span><span data-dcnode-id="6803" instrument_node="">; Kong </span><i data-dcnode-id="6801"><span data-dcnode-id="6802" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6800" instrument_node="">., </span><span data-dcnode-id="6797"><a class="bibLink tab-link" data-dcnode-id="6798" data-tab="pane-pcw-references" href="#nph13434-bib-0040" id="nph13434-bib-0040R"><span data-dcnode-id="6799" instrument_node="">2014</span></a></span><span data-dcnode-id="6796" instrument_node="">). Species of basal clades tend to produce thick and sparsely branched root systems (thick-root species), whereas species of recently diverged clades tend to produce thin and densely branched root systems (thin-root species) (Baylis, </span><span data-dcnode-id="6793"><a class="bibLink tab-link" data-dcnode-id="6794" data-tab="pane-pcw-references" href="#nph13434-bib-0004" id="nph13434-bib-0004R"><span data-dcnode-id="6795" instrument_node="">1975</span></a></span><span data-dcnode-id="6792" instrument_node="">; St John, </span><span data-dcnode-id="6789"><a class="bibLink tab-link" data-dcnode-id="6790" data-tab="pane-pcw-references" href="#nph13434-bib-0063" id="nph13434-bib-0063R"><span data-dcnode-id="6791" instrument_node="">1980</span></a></span><span data-dcnode-id="6788" instrument_node="">; Pregitzer </span><i data-dcnode-id="6786"><span data-dcnode-id="6787" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6785" instrument_node="">., </span><span data-dcnode-id="6782"><a class="bibLink tab-link" data-dcnode-id="6783" data-tab="pane-pcw-references" href="#nph13434-bib-0054" id="nph13434-bib-0054R"><span data-dcnode-id="6784" instrument_node="">2002</span></a></span><span data-dcnode-id="6781" instrument_node="">; Comas &amp; Eissenstat, </span><span data-dcnode-id="6778"><a class="bibLink tab-link" data-dcnode-id="6779" data-tab="pane-pcw-references" href="#nph13434-bib-0010" id="nph13434-bib-0010R"><span data-dcnode-id="6780" instrument_node="">2009</span></a></span><span data-dcnode-id="6777" instrument_node="">; Chen </span><i data-dcnode-id="6775"><span data-dcnode-id="6776" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6774" instrument_node="">., </span><span data-dcnode-id="6771"><a class="bibLink tab-link" data-dcnode-id="6772" data-tab="pane-pcw-references" href="#nph13434-bib-0007" id="nph13434-bib-0007R"><span data-dcnode-id="6773" instrument_node="">2013</span></a></span><span data-dcnode-id="6770" instrument_node="">). Furthermore, there is evidence that thin-root species have greater rates of root growth (Eissenstat, </span><span data-dcnode-id="6767"><a class="bibLink tab-link" data-dcnode-id="6768" data-tab="pane-pcw-references" href="#nph13434-bib-0015" id="nph13434-bib-0015R"><span data-dcnode-id="6769" instrument_node="">1991</span></a></span><span data-dcnode-id="6766" instrument_node="">), whereas thick-root species are generally more densely colonized by arbuscular mycorrhizal (AM) fungi (Fitter, </span><span data-dcnode-id="6763"><a class="bibLink tab-link" data-dcnode-id="6764" data-tab="pane-pcw-references" href="#nph13434-bib-0020" id="nph13434-bib-0020R"><span data-dcnode-id="6765" instrument_node="">2004</span></a></span><span data-dcnode-id="6762" instrument_node="">; Smith &amp; Read, </span><span data-dcnode-id="6759"><a class="bibLink tab-link" data-dcnode-id="6760" data-tab="pane-pcw-references" href="#nph13434-bib-0062" id="nph13434-bib-0062R"><span data-dcnode-id="6761" instrument_node="">2008</span></a></span><span data-dcnode-id="6758" instrument_node="">). This may be because thick-root species have a limited intrinsic ability to acquire soil resources (Bates &amp; Lynch, </span><span data-dcnode-id="6755"><a class="bibLink tab-link" data-dcnode-id="6756" data-tab="pane-pcw-references" href="#nph13434-bib-0003" id="nph13434-bib-0003R"><span data-dcnode-id="6757" instrument_node="">2001</span></a></span><span data-dcnode-id="6754" instrument_node="">), and need to increase absorptive surfaces by relying more on finely structured AM fungal hyphae (Raven &amp; Edwards, </span><span data-dcnode-id="6751"><a class="bibLink tab-link" data-dcnode-id="6752" data-tab="pane-pcw-references" href="#nph13434-bib-0055" id="nph13434-bib-0055R"><span data-dcnode-id="6753" instrument_node="">2001</span></a></span><span data-dcnode-id="6750" instrument_node="">). Together, this implies that there exists a complementarity between absorptive fine roots and associated mycorrhizal fungi in nutrient foraging across species with contrasting root functional traits.</span></p><span data-dcnode-id="6748" instrument_node="">
</span><p data-dcnode-id="6688"><span data-dcnode-id="6747" instrument_node="">Given that roots and mycorrhizal fungi represent alternative strategies in the construction of belowground absorptive surface area, it is important to understand how roots and mycorrhizal fungi respond to heterogeneity in soil nutrient availability, which is ubiquitous in nature. Root growth within nutrient-rich patches has been widely reported to increase plant nutrient capture (Robinson, </span><span data-dcnode-id="6744"><a class="bibLink tab-link" data-dcnode-id="6745" data-tab="pane-pcw-references" href="#nph13434-bib-0058" id="nph13434-bib-0058R"><span data-dcnode-id="6746" instrument_node="">1994</span></a></span><span data-dcnode-id="6743" instrument_node="">; Hodge </span><i data-dcnode-id="6741"><span data-dcnode-id="6742" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6740" instrument_node="">., </span><span data-dcnode-id="6737"><a class="bibLink tab-link" data-dcnode-id="6738" data-tab="pane-pcw-references" href="#nph13434-bib-0031" id="nph13434-bib-0031R"><span data-dcnode-id="6739" instrument_node="">1998</span></a></span><span data-dcnode-id="6736" instrument_node="">), albeit with a few exceptions in which no root proliferation was observed in nutrient-rich patches (Jackson &amp; Caldwell, </span><span data-dcnode-id="6733"><a class="bibLink tab-link" data-dcnode-id="6734" data-tab="pane-pcw-references" href="#nph13434-bib-0034" id="nph13434-bib-0034R"><span data-dcnode-id="6735" instrument_node="">1989</span></a></span><span data-dcnode-id="6732" instrument_node="">; Li </span><i data-dcnode-id="6730"><span data-dcnode-id="6731" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6729" instrument_node="">., </span><span data-dcnode-id="6726"><a class="bibLink tab-link" data-dcnode-id="6727" data-tab="pane-pcw-references" href="#nph13434-bib-0043" id="nph13434-bib-0043R"><span data-dcnode-id="6728" instrument_node="">2014</span></a></span><span data-dcnode-id="6725" instrument_node="">). By contrast, mycorrhizal fungal colonization and external hyphal production often decrease under nutrient additions, mostly via broadcast fertilization (Johnson </span><i data-dcnode-id="6723"><span data-dcnode-id="6724" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6722" instrument_node="">., </span><span data-dcnode-id="6719"><a class="bibLink tab-link" data-dcnode-id="6720" data-tab="pane-pcw-references" href="#nph13434-bib-0036" id="nph13434-bib-0036R"><span data-dcnode-id="6721" instrument_node="">2003</span></a></span><span data-dcnode-id="6718" instrument_node="">; Treseder, </span><span data-dcnode-id="6715"><a class="bibLink tab-link" data-dcnode-id="6716" data-tab="pane-pcw-references" href="#nph13434-bib-0068" id="nph13434-bib-0068R"><span data-dcnode-id="6717" instrument_node="">2004</span></a></span><span data-dcnode-id="6714" instrument_node="">; Liu </span><i data-dcnode-id="6712"><span data-dcnode-id="6713" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6711" instrument_node="">., </span><span data-dcnode-id="6708"><a class="bibLink tab-link" data-dcnode-id="6709" data-tab="pane-pcw-references" href="#nph13434-bib-0044" id="nph13434-bib-0044R"><span data-dcnode-id="6710" instrument_node="">2012</span></a></span><span data-dcnode-id="6707" instrument_node="">; Grman &amp; Robinson, </span><span data-dcnode-id="6704"><a class="bibLink tab-link" data-dcnode-id="6705" data-tab="pane-pcw-references" href="#nph13434-bib-0027" id="nph13434-bib-0027R"><span data-dcnode-id="6706" instrument_node="">2013</span></a></span><span data-dcnode-id="6703" instrument_node="">; Johnson </span><i data-dcnode-id="6701"><span data-dcnode-id="6702" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6700" instrument_node="">., </span><span data-dcnode-id="6697"><a class="bibLink tab-link" data-dcnode-id="6698" data-tab="pane-pcw-references" href="#nph13434-bib-0037" id="nph13434-bib-0037R"><span data-dcnode-id="6699" instrument_node="">2015</span></a></span><span data-dcnode-id="6696" instrument_node="">; but see localized addition of phosphorus (P) and nitrogen (N) from Duke </span><i data-dcnode-id="6694"><span data-dcnode-id="6695" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6693" instrument_node="">., </span><span data-dcnode-id="6690"><a class="bibLink tab-link" data-dcnode-id="6691" data-tab="pane-pcw-references" href="#nph13434-bib-0013" id="nph13434-bib-0013R"><span data-dcnode-id="6692" instrument_node="">1994</span></a></span><span data-dcnode-id="6689" instrument_node="">). Overall, previous studies have evaluated how either roots or mycorrhizal fungi respond to nutrient additions, but few studies have examined the responses of both roots and mycorrhizal fungi in the field, especially with respect to mineral nutrient patches.</span></p><span data-dcnode-id="6687" instrument_node="">
</span><p data-dcnode-id="6619"><span data-dcnode-id="6686" instrument_node="">It is necessary to examine roots and mycorrhizal fungi simultaneously because tree species differ in their root and mycorrhizal traits, particularly in subtropical and tropical forests, in which thick-root species are very common and coexist with thin-root species. Because root traits are strongly correlated with mycorrhizal colonization and also potentially with hyphal density, particularly in AM woody species (Kong </span><i data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6683" instrument_node="">., </span><span data-dcnode-id="6680"><a class="bibLink tab-link" data-dcnode-id="6681" data-tab="pane-pcw-references" href="#nph13434-bib-0040" id="nph13434-bib-0040R"><span data-dcnode-id="6682" instrument_node="">2014</span></a></span><span data-dcnode-id="6679" instrument_node="">), roots and mycorrhizal fungi may respond to changes in soil nutrients in a coordinated manner. Moreover, different nutrient elements may influence the responses of roots and mycorrhizal fungi (Robinson, </span><span data-dcnode-id="6676"><a class="bibLink tab-link" data-dcnode-id="6677" data-tab="pane-pcw-references" href="#nph13434-bib-0058" id="nph13434-bib-0058R"><span data-dcnode-id="6678" instrument_node="">1994</span></a></span><span data-dcnode-id="6675" instrument_node="">; Johnson </span><i data-dcnode-id="6673"><span data-dcnode-id="6674" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6672" instrument_node="">., </span><span data-dcnode-id="6669"><a class="bibLink tab-link" data-dcnode-id="6670" data-tab="pane-pcw-references" href="#nph13434-bib-0035" id="nph13434-bib-0035R"><span data-dcnode-id="6671" instrument_node="">2008</span></a></span><span data-dcnode-id="6668" instrument_node="">) in a different manner. For example, Drew and coworkers reported that roots of non-mycorrhizal barley (</span><i data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">Hordeum vulgare</span></i><span data-dcnode-id="6665" instrument_node="">) plants showed increased root length and number of laterals under phosphate, ammonium or nitrate addition, but not under potassium (K) addition (Drew, </span><span data-dcnode-id="6662"><a class="bibLink tab-link" data-dcnode-id="6663" data-tab="pane-pcw-references" href="#nph13434-bib-0011" id="nph13434-bib-0011R"><span data-dcnode-id="6664" instrument_node="">1975</span></a></span><span data-dcnode-id="6661" instrument_node="">; Drew &amp; Saker, </span><span data-dcnode-id="6658"><a class="bibLink tab-link" data-dcnode-id="6659" data-tab="pane-pcw-references" href="#nph13434-bib-0012" id="nph13434-bib-0012R"><span data-dcnode-id="6660" instrument_node="">1975</span></a></span><span data-dcnode-id="6657" instrument_node="">). In three grassland systems, internal AM colonization and external hyphal density responded strongly and consistently to soil P availability, but not to soil N availability (Johnson </span><i data-dcnode-id="6655"><span data-dcnode-id="6656" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6654" instrument_node="">., </span><span data-dcnode-id="6651"><a class="bibLink tab-link" data-dcnode-id="6652" data-tab="pane-pcw-references" href="#nph13434-bib-0037" id="nph13434-bib-0037R"><span data-dcnode-id="6653" instrument_node="">2015</span></a></span><span data-dcnode-id="6650" instrument_node="">). It is likely that N-rich patches are less effective than P-rich patches in reducing internal colonization and external hyphal production, particularly in AM plant species, given that the major function of AM fungi is to facilitate P acquisition (Smith &amp; Read, </span><span data-dcnode-id="6647"><a class="bibLink tab-link" data-dcnode-id="6648" data-tab="pane-pcw-references" href="#nph13434-bib-0062" id="nph13434-bib-0062R"><span data-dcnode-id="6649" instrument_node="">2008</span></a></span><span data-dcnode-id="6646" instrument_node="">). However, other studies showed no&nbsp;definitive responses of internal AM colonization and external&nbsp;hyphal production to nutrient additions (Sylvia &amp; Neal, </span><span data-dcnode-id="6643"><a class="bibLink tab-link" data-dcnode-id="6644" data-tab="pane-pcw-references" href="#nph13434-bib-0064" id="nph13434-bib-0064R"><span data-dcnode-id="6645" instrument_node="">1990</span></a></span><span data-dcnode-id="6642" instrument_node="">; Treseder &amp; Allen, </span><span data-dcnode-id="6639"><a class="bibLink tab-link" data-dcnode-id="6640" data-tab="pane-pcw-references" href="#nph13434-bib-0069" id="nph13434-bib-0069R"><span data-dcnode-id="6641" instrument_node="">2002</span></a></span><span data-dcnode-id="6638" instrument_node="">; Johnson </span><i data-dcnode-id="6636"><span data-dcnode-id="6637" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6635" instrument_node="">., </span><span data-dcnode-id="6632"><a class="bibLink tab-link" data-dcnode-id="6633" data-tab="pane-pcw-references" href="#nph13434-bib-0036" id="nph13434-bib-0036R"><span data-dcnode-id="6634" instrument_node="">2003</span></a></span><span data-dcnode-id="6631" instrument_node="">; Egerton-Warburton </span><i data-dcnode-id="6629"><span data-dcnode-id="6630" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6628" instrument_node="">., </span><span data-dcnode-id="6625"><a class="bibLink tab-link" data-dcnode-id="6626" data-tab="pane-pcw-references" href="#nph13434-bib-0014" id="nph13434-bib-0014R"><span data-dcnode-id="6627" instrument_node="">2007</span></a></span><span data-dcnode-id="6624" instrument_node="">; Grman &amp; Robinson, </span><span data-dcnode-id="6621"><a class="bibLink tab-link" data-dcnode-id="6622" data-tab="pane-pcw-references" href="#nph13434-bib-0027" id="nph13434-bib-0027R"><span data-dcnode-id="6623" instrument_node="">2013</span></a></span><span data-dcnode-id="6620" instrument_node="">). Therefore, an understanding of root and mycorrhizal fungal responses to nutrient-rich patches and the root–mycorrhiza trade-off requires that we consider the attributes of the nutrient patch itself.</span></p><span data-dcnode-id="6618" instrument_node="">
</span><p data-dcnode-id="6605"><span data-dcnode-id="6617" instrument_node="">Finally, responses of roots and mycorrhizal fungi to nutrient availability may be reflected more strongly in some traits than in others. Both root morphological and architectural traits may be altered by nutrient availability, but architectural traits may be more responsive (Hodge, </span><span data-dcnode-id="6614"><a class="bibLink tab-link" data-dcnode-id="6615" data-tab="pane-pcw-references" href="#nph13434-bib-0030" id="nph13434-bib-0030R"><span data-dcnode-id="6616" instrument_node="">2004</span></a></span><span data-dcnode-id="6613" instrument_node="">), because root morphological traits, such as root diameter, have been shown to be phylogenetically conserved (Kong </span><i data-dcnode-id="6611"><span data-dcnode-id="6612" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6610" instrument_node="">., </span><span data-dcnode-id="6607"><a class="bibLink tab-link" data-dcnode-id="6608" data-tab="pane-pcw-references" href="#nph13434-bib-0040" id="nph13434-bib-0040R"><span data-dcnode-id="6609" instrument_node="">2014</span></a></span><span data-dcnode-id="6606" instrument_node="">), and may have limited plasticity as soil conditions vary. More studies are needed to clarify how root morphological and architectural traits differ in their responses to nutrient availability.</span></p><span data-dcnode-id="6604" instrument_node="">
</span><p data-dcnode-id="6588"><span data-dcnode-id="6603" instrument_node="">Here, we selected 14 AM tree species that coexist in a subtropical forest. We measured a variety of traits of the first two root branch orders (termed absorptive fine roots here, </span><i data-dcnode-id="6601"><span data-dcnode-id="6602" instrument_node="">sensu</span></i><span data-dcnode-id="6600" instrument_node=""> McCormack </span><i data-dcnode-id="6598"><span data-dcnode-id="6599" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6597" instrument_node="">., </span><span data-dcnode-id="6594"><a class="bibLink tab-link" data-dcnode-id="6595" data-tab="pane-pcw-references" href="#nph13434-bib-0048" id="nph13434-bib-0048R"><span data-dcnode-id="6596" instrument_node="">2015</span></a></span><span data-dcnode-id="6593" instrument_node="">) under four nutrient addition treatments using a root-bag approach (Comas &amp; Eissenstat, </span><span data-dcnode-id="6590"><a class="bibLink tab-link" data-dcnode-id="6591" data-tab="pane-pcw-references" href="#nph13434-bib-0009" id="nph13434-bib-0009R"><span data-dcnode-id="6592" instrument_node="">2004</span></a></span><span data-dcnode-id="6589" instrument_node="">). The studied species encompassed a wide variety of root morphology and architecture, with an almost four-fold range in root diameter of the finest lateral roots (or first-order roots) based on previous studies (D. L. Guo, unpublished data). The absorptive fine root and fungal traits measured covered several key aspects of foraging behavior, including root morphology and architecture, carbon (C) and N concentrations, length and mass proliferation, AM colonization and extramatrical hyphal length. The localized nutrient addition treatments consisted of unfertilized control, N addition, P addition and multi-nutrient (NPK) addition. We aimed to test the following hypotheses: (1)&nbsp;patterns of production in absorptive fine roots and their associated mycorrhizal fungi are complementary across species in nutrient foraging: thin-root species forage nutrients primarily using absorptive fine roots, whereas thick-root species forage with more reliance on mycorrhizal fungi; (2) plants increase root length but reduce mycorrhizal colonization in response to nutrient-rich patches; and (3) root architectural traits (e.g. root branching intensity or ratio) exhibit more phenotypic plasticity to nutrient-rich patches than do root morphological traits (e.g.&nbsp;root diameter or specific root length).</span></p><span data-dcnode-id="6587" instrument_node="">
</span></section><span data-dcnode-id="6585" instrument_node="">
</span><section class="article-section__content" data-dcnode-id="5547" id="nph13434-sec-0002"><span data-dcnode-id="6584" instrument_node="">
</span><h2 class="article-section__title section__title section1" data-dcnode-id="6582" id="nph13434-sec-0002-title"><span data-dcnode-id="6583" instrument_node=""> Materials and Methods</span></h2><span data-dcnode-id="6581" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="6038" id="nph13434-sec-0003"><span data-dcnode-id="6580" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="6578" id="nph13434-sec-0003-title"><span data-dcnode-id="6579" instrument_node=""> Study sites and species selection</span></h3><span data-dcnode-id="6577" instrument_node="">
</span><p data-dcnode-id="6568"><span data-dcnode-id="6576" instrument_node="">The study site was located in the Jiulianshan National Nature Reserve (24°29′18″–24°38′55″N, 114°22′50″–114°31′32″E) in Jiangxi province, China. The site belongs to the typical subtropical climatic zone with mean January, July and annual temperatures of 6.8, 24.4 and 16.4°C, respectively, and with mean annual precipitation of 2156&nbsp;mm (Li, </span><span data-dcnode-id="6573"><a class="bibLink tab-link" data-dcnode-id="6574" data-tab="pane-pcw-references" href="#nph13434-bib-0042" id="nph13434-bib-0042R"><span data-dcnode-id="6575" instrument_node="">2006</span></a></span><span data-dcnode-id="6572" instrument_node="">). Soils in this area are laterites rich in iron and aluminum, and soil texture is mainly clay loam according to the China Soil Scientific Database (</span><a class="linkBehavior" data-dcnode-id="6570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.soil.csdb.cn/"><span data-dcnode-id="6571" instrument_node="">www.soil.csdb.cn</span></a><span data-dcnode-id="6569" instrument_node="">).</span></p><span data-dcnode-id="6567" instrument_node="">
</span><p data-dcnode-id="6541"><span data-dcnode-id="6566" instrument_node="">Soil samples were collected and measured for their physical and chemical properties from 0 to 20&nbsp;cm depth in early March 2013. The average soil gravimetric water content was 24.8&nbsp;±&nbsp;0.7% (mean&nbsp;±&nbsp;SE) (using oven drying) during the study period. Soil total C and total N were 21.88&nbsp;±&nbsp;1.15&nbsp;g&nbsp;kg</span><sup data-dcnode-id="6564"><span data-dcnode-id="6565" instrument_node="">−1</span></sup><span data-dcnode-id="6563" instrument_node=""> and&nbsp;1.67&nbsp;±&nbsp;0.07&nbsp;g&nbsp;kg</span><sup data-dcnode-id="6561"><span data-dcnode-id="6562" instrument_node="">−1</span></sup><span data-dcnode-id="6560" instrument_node="">, respectively (using an elemental analyzer; Vario MAX CN; Elementar, Hanau, Germany). Soil available N (KCl-extractable ammonium and nitrate) was 11.91&nbsp;±&nbsp;0.58&nbsp;mg&nbsp;kg</span><sup data-dcnode-id="6558"><span data-dcnode-id="6559" instrument_node="">−1</span></sup><span data-dcnode-id="6557" instrument_node=""> (using an AutoAnalyzer 3; Bran &amp; Luebbe, Hamburg, Germany). These soils are characterized by relatively high total and available phosphorus (P) ((NH</span><sub data-dcnode-id="6555"><span data-dcnode-id="6556" instrument_node="">4</span></sub><span data-dcnode-id="6554" instrument_node="">)</span><sub data-dcnode-id="6552"><span data-dcnode-id="6553" instrument_node="">2</span></sub><span data-dcnode-id="6551" instrument_node="">CO</span><sub data-dcnode-id="6549"><span data-dcnode-id="6550" instrument_node="">3</span></sub><span data-dcnode-id="6548" instrument_node="">-extractable available P), with 0.41&nbsp;±&nbsp;0.02&nbsp;g&nbsp;kg</span><sup data-dcnode-id="6546"><span data-dcnode-id="6547" instrument_node="">−1</span></sup><span data-dcnode-id="6545" instrument_node=""> and 24.53&nbsp;±&nbsp;1.79&nbsp;mg&nbsp;kg</span><sup data-dcnode-id="6543"><span data-dcnode-id="6544" instrument_node="">−1</span></sup><span data-dcnode-id="6542" instrument_node="">, respectively (using an inductively coupled plasma-optical emission spectrometer (ICP-OES); Perkin Elmer, Norwalk, CT, USA). Soil pH was 4.5&nbsp;±&nbsp;0.1 (soil to water mass ratio of 1&nbsp;:&nbsp;2.5).</span></p><span data-dcnode-id="6540" instrument_node="">
</span><p data-dcnode-id="6524"><span data-dcnode-id="6539" instrument_node="">At this site, we chose 14 coexisting dominant tree species (Table&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="6537" href="#nph13434-tbl-0001" title="Link to table"><span data-dcnode-id="6538" instrument_node="">1</span></a><span data-dcnode-id="6536" instrument_node="">) that expressed a large degree of interspecific variation in the diameter and related root traits of first-order roots based on our preliminary observations. All 14 species at this site may be colonized by AM fungi (Wang &amp; Qiu, </span><span data-dcnode-id="6533"><a class="bibLink tab-link" data-dcnode-id="6534" data-tab="pane-pcw-references" href="#nph13434-bib-0073" id="nph13434-bib-0073R"><span data-dcnode-id="6535" instrument_node="">2006</span></a></span><span data-dcnode-id="6532" instrument_node="">; Kong </span><i data-dcnode-id="6530"><span data-dcnode-id="6531" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6529" instrument_node="">., </span><span data-dcnode-id="6526"><a class="bibLink tab-link" data-dcnode-id="6527" data-tab="pane-pcw-references" href="#nph13434-bib-0040" id="nph13434-bib-0040R"><span data-dcnode-id="6528" instrument_node="">2014</span></a></span><span data-dcnode-id="6525" instrument_node="">).</span></p><span data-dcnode-id="6523" instrument_node="">
</span><div class="article-table-content" data-dcnode-id="6040" id="nph13434-tbl-0001"><span data-dcnode-id="6522" instrument_node="">
</span><header class="article-table-caption" data-dcnode-id="6518"><span class="table-caption__label" data-dcnode-id="6520"><span data-dcnode-id="6521" instrument_node="">Table 1.
            </span></span><span data-dcnode-id="6519" instrument_node="">Absorptive fine root trait mean (SE) for four main variables measured from recovery after root pruning under unfertilized control for 14 arbuscular mycorrhizal (AM) tree species from a subtropical forest, China</span></header><span data-dcnode-id="6517" instrument_node="">
</span><div class="article-table-content-wrapper" data-dcnode-id="6053"><span data-dcnode-id="6516" instrument_node="">
</span><span data-dcnode-id="6515" instrument_node="">

</span><section class="article-section__sub-content" data-dcnode-id="5993" id="nph13434-sec-0004"><span data-dcnode-id="6036" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="6034" id="nph13434-sec-0004-title"><span data-dcnode-id="6035" instrument_node=""> Root bag installation, fertilization and harvesting</span></h3><span data-dcnode-id="6033" instrument_node="">
</span><p data-dcnode-id="6018"><span data-dcnode-id="6032" instrument_node="">A root-bag approach was used to isolate roots of different trees in a mixed forest (Comas &amp; Eissenstat, </span><span data-dcnode-id="6029"><a class="bibLink tab-link" data-dcnode-id="6030" data-tab="pane-pcw-references" href="#nph13434-bib-0009" id="nph13434-bib-0009R"><span data-dcnode-id="6031" instrument_node="">2004</span></a></span><span data-dcnode-id="6028" instrument_node="">). In early March 2013, a </span><i data-dcnode-id="6026"><span data-dcnode-id="6027" instrument_node="">c</span></i><span data-dcnode-id="6025" instrument_node="">. 5-mm-diameter woody root was traced back to an identified tree. The distal end of the root was trimmed of all fine lateral roots using scissors and </span><i data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">c</span></i><span data-dcnode-id="6022" instrument_node="">. 25&nbsp;cm of length was inserted into a root bag. Root bags were constructed from polyester fabric (30&nbsp;×&nbsp;30&nbsp;cm</span><sup data-dcnode-id="6020"><span data-dcnode-id="6021" instrument_node="">2</span></sup><span data-dcnode-id="6019" instrument_node="">), with a mesh size of 0.5&nbsp;mm, and were filled with 3&nbsp;kg of sieved fresh soil collected from the forest surface (0–20&nbsp;cm depth). The bags containing the pruned woody roots were reburied with the original forest soil, covered with the original litter layer, and watered. To ensure that a statistically sufficient number of root bags with well-developed root systems can be harvested (Supporting Information Fig.&nbsp;S1), we installed 48 root bags under four separate individual trees (12 bags per tree) for each species, with a total of 672 bags for all 14 species (Table&nbsp;S1).</span></p><span data-dcnode-id="6017" instrument_node="">
</span><p data-dcnode-id="6002"><span data-dcnode-id="6016" instrument_node="">In early June 2013, the four nutrient addition treatments were randomly assigned to 12 root bags per tree (three bags for each treatment), and then sprayed with deionized water, 300&nbsp;ml per bag. These four treatments included unfertilized control (Unfert.), N addition (+N; 0.13&nbsp;g N per bag, in the form of slow-release urea containing 40% N), P addition (+P; 0.29&nbsp;g P per bag, in the form of NaH</span><sub data-dcnode-id="6014"><span data-dcnode-id="6015" instrument_node="">2</span></sub><span data-dcnode-id="6013" instrument_node="">PO</span><sub data-dcnode-id="6011"><span data-dcnode-id="6012" instrument_node="">4</span></sub><span data-dcnode-id="6010" instrument_node=""> containing 20% P) and multi-nutrient addition (+NPK; 0.13&nbsp;g N, 0.07&nbsp;g P and 0.10&nbsp;g K per bag, in the form of Osmocote, which is a slow-release compound fertilizer containing 40% N, 22.5% P, 30% K and essential micronutrients, as well as calcium and magnesium). The amount of fertilizer given was approximately four times ‘available’ soil background N or P concentration, and was chosen according to the results of Adams </span><i data-dcnode-id="6008"><span data-dcnode-id="6009" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="6007" instrument_node="">. (</span><span data-dcnode-id="6004"><a class="bibLink tab-link" data-dcnode-id="6005" data-tab="pane-pcw-references" href="#nph13434-bib-0001" id="nph13434-bib-0001R"><span data-dcnode-id="6006" instrument_node="">2013</span></a></span><span data-dcnode-id="6003" instrument_node="">), who observed no increases in root length growth at threefold available soil N concentration, but increases at higher levels of N fertilization.</span></p><span data-dcnode-id="6001" instrument_node="">
</span><p data-dcnode-id="5995"><span data-dcnode-id="6000" instrument_node="">In late September 2013, root bags were harvested from the field by cutting the woody roots at the entrance of the bags. The intact bags were immediately placed into a cooler and transported to the laboratory. In the laboratory, the intact root samples were gently washed with tap water to remove the soil adhered to roots. Three intact root segments containing the first five root orders were spread out in water with minimal overlap and scanned in gray scale at 400&nbsp;dpi using automatic threshold settings (Comas &amp; Eissenstat, </span><span data-dcnode-id="5997"><a class="bibLink tab-link" data-dcnode-id="5998" data-tab="pane-pcw-references" href="#nph13434-bib-0009" id="nph13434-bib-0009R"><span data-dcnode-id="5999" instrument_node="">2004</span></a></span><span data-dcnode-id="5996" instrument_node="">). Afterwards, these samples were placed into formalin-aceto-alcohol (FAA) solution (90&nbsp;ml of 50% ethanol, 5&nbsp;ml of 100% glacial acetic acid, 5&nbsp;ml of 37% methanol) for the measurement of AM colonization later. The remaining samples were frozen at −20°C until the measurement of root traits.</span></p><span data-dcnode-id="5994" instrument_node="">
</span></section><span data-dcnode-id="5992" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="5643" id="nph13434-sec-0005"><span data-dcnode-id="5991" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="5989" id="nph13434-sec-0005-title"><span data-dcnode-id="5990" instrument_node=""> Root trait measurements</span></h3><span data-dcnode-id="5988" instrument_node="">
</span><p data-dcnode-id="5973"><span data-dcnode-id="5987" instrument_node="">Root recovery from pruning for a given species was expressed as the percentage of all bags for each of the four treatments that recovered from pruning by exhibiting new root growth. Averaged across all 14 species, </span><i data-dcnode-id="5985"><span data-dcnode-id="5986" instrument_node="">c</span></i><span data-dcnode-id="5984" instrument_node="">. 70% of root bags installed contained newly growing root systems (Table&nbsp;S1), with the remaining 30% of bags containing no new roots. In addition, for all the root bags that contained new roots, the amount of new root growth showed some variation (Fig.&nbsp;S1) and we separated these bags into two categories; we classified more than two-thirds of root bags with new root growth as well-developed root bags and the remaining less than one third as poorly developed root bags (Table&nbsp;S1). To reduce the labor requirements associated with the dissection of roots to each branch order and to enhance comparability across species with different root morphology and architecture, we randomly selected four bags from the well-developed root bag category for each treatment (including unfertilized control, +N, +P and +NPK) for each species, with a total of 224 bags for all 14 species. Samples of each bag were separately assessed for root traits, including morphology, architecture and chemistry, root length and mass proliferation, and AM colonization and extramatrical hyphal length in soils (Table&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="5982" href="#nph13434-tbl-0002" title="Link to table"><span data-dcnode-id="5983" instrument_node="">2</span></a><span data-dcnode-id="5981" instrument_node="">). These parameters were assessed on a root order basis following the root order classification suggested by Pregitzer </span><i data-dcnode-id="5979"><span data-dcnode-id="5980" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="5978" instrument_node="">. (</span><span data-dcnode-id="5975"><a class="bibLink tab-link" data-dcnode-id="5976" data-tab="pane-pcw-references" href="#nph13434-bib-0054" id="nph13434-bib-0054R"><span data-dcnode-id="5977" instrument_node="">2002</span></a></span><span data-dcnode-id="5974" instrument_node="">).</span></p><span data-dcnode-id="5972" instrument_node="">

ument_node="">cm</span><sup data-dcnode-id="5859"><span data-dcnode-id="5860" instrument_node="">−1</span></sup></td><td class="left-aligned" data-dcnode-id="5855"><span data-dcnode-id="5856" instrument_node="">Number of first-order roots per unit length of second-order roots</span></td></tr><tr data-dcnode-id="5839"><td class="right-bordered-cell left-aligned" data-dcnode-id="5849" style="padding-left:2em;"><span data-dcnode-id="5850" instrument_node="">Total branch order</span></td><td class="left-aligned" data-dcnode-id="5846"><span data-dcnode-id="5847" instrument_node="">TBO</span></td><td class="left-aligned" data-dcnode-id="5844"></td><td class="left-aligned" data-dcnode-id="5841"><span data-dcnode-id="5842" instrument_node="">Highest root branching order contained within a root bag</span></td></tr><tr data-dcnode-id="5825"><td class="right-bordered-cell left-aligned" data-dcnode-id="5835" style="padding-left:2em;"><span data-dcnode-id="5836" instrument_node="">Branching ratio</span></td><td class="left-aligned" data-dcnode-id="5832"><span data-dcnode-id="5833" instrument_node="">BrRatio</span></td><td class="left-aligned" data-dcnode-id="5830"></td><td class="left-aligned" data-dcnode-id="5827"><span data-dcnode-id="5828" instrument_node="">Number of first-order roots divided by the number of second-order roots</span></td></tr><tr data-dcnode-id="5819"><td class="left-aligned" colspan="4" data-dcnode-id="5821"><span data-dcnode-id="5822" instrument_node="">Chemical traits</span></td></tr><tr data-dcnode-id="5804"><td class="right-bordered-cell left-aligned" data-dcnode-id="5815" style="padding-left:2em;"><span data-dcnode-id="5816" instrument_node="">Root carbon concentration</span></td><td class="left-aligned" data-dcnode-id="5812"><span data-dcnode-id="5813" instrument_node="">Root C</span></td><td class="left-aligned" data-dcnode-id="5809"><span data-dcnode-id="5810" instrument_node="">%</span></td><td class="left-aligned" data-dcnode-id="5806"><span data-dcnode-id="5807" instrument_node="">Average root carbon concentration of combined first two order roots within a root bag</span></td></tr><tr data-dcnode-id="5789"><td class="right-bordered-cell left-aligned" data-dcnode-id="5800" style="padding-left:2em;"><span data-dcnode-id="5801" instrument_node="">Root nitrogen concentration</span></td><td class="left-aligned" data-dcnode-id="5797"><span data-dcnode-id="5798" instrument_node="">Root N</span></td><td class="left-aligned" data-dcnode-id="5794"><span data-dcnode-id="5795" instrument_node="">%</span></td><td class="left-aligned" data-dcnode-id="5791"><span data-dcnode-id="5792" instrument_node="">Average root nitrogen concentration of combined first two order roots within a root bag</span></td></tr><tr data-dcnode-id="5783"><td class="left-aligned" colspan="4" data-dcnode-id="5785"><span data-dcnode-id="5786" instrument_node="">Root proliferation</span></td></tr><tr data-dcnode-id="5768"><td class="right-bordered-cell left-aligned" data-dcnode-id="5779" style="padding-left:2em;"><span data-dcnode-id="5780" instrument_node="">Pruning recovery</span></td><td class="left-aligned" data-dcnode-id="5776"><span data-dcnode-id="5777" instrument_node="">PR</span></td><td class="left-aligned" data-dcnode-id="5773"><span data-dcnode-id="5774" instrument_node="">%</span></td><td class="left-aligned" data-dcnode-id="5770"><span data-dcnode-id="5771" instrument_node="">Percentage of a given species that recovered from pruning by proliferating new absorptive roots</span></td></tr><tr data-dcnode-id="5753"><td class="right-bordered-cell left-aligned" data-dcnode-id="5764" style="padding-left:2em;"><span data-dcnode-id="5765" instrument_node="">Root length growth</span></td><td class="left-aligned" data-dcnode-id="5761"><span data-dcnode-id="5762" instrument_node="">RL</span></td><td class="left-aligned" data-dcnode-id="5758"><span data-dcnode-id="5759" instrument_node="">cm</span></td><td class="left-aligned" data-dcnode-id="5755"><span data-dcnode-id="5756" instrument_node="">Total absorptive fine root (combined first two order roots) length proliferation within a root bag</span></td></tr><tr data-dcnode-id="5738"><td class="right-bordered-cell left-aligned" data-dcnode-id="5749" style="padding-left:2em;"><span data-dcnode-id="5750" instrument_node="">Root mass growth</span></td><td class="left-aligned" data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">RM</span></td><td class="left-aligned" data-dcnode-id="5743"><span data-dcnode-id="5744" instrument_node="">mg</span></td><td class="left-aligned" data-dcnode-id="5740"><span data-dcnode-id="5741" instrument_node="">Total absorptive fine root (combined first two order roots) dry mass proliferation within a root bag</span></td></tr><tr data-dcnode-id="5732"><td class="left-aligned" colspan="4" data-dcnode-id="5734"><span data-dcnode-id="5735" instrument_node="">Mycorrhizal colonization</span></td></tr><tr data-dcnode-id="5717"><td class="right-bordered-cell left-aligned" data-dcnode-id="5728" style="padding-left:2em;"><span data-dcnode-id="5729" instrument_node="">Arbuscular mycorrhizal colonization</span></td><td class="left-aligned" data-dcnode-id="5725"><span data-dcnode-id="5726" instrument_node="">AMC</span></td><td class="left-aligned" data-dcnode-id="5722"><span data-dcnode-id="5723" instrument_node="">%</span></td><td class="left-aligned" data-dcnode-id="5719"><span data-dcnode-id="5720" instrument_node="">Percentage of absorptive root length colonized by arbuscules, vesicles or coils within a root bag</span></td></tr><tr data-dcnode-id="5702"><td class="right-bordered-cell left-aligned" data-dcnode-id="5713" style="padding-left:2em;"><span data-dcnode-id="5714" instrument_node="">Extramatrical hyphal length</span></td><td class="left-aligned" data-dcnode-id="5710"><span data-dcnode-id="5711" instrument_node="">EHL</span></td><td class="left-aligned" data-dcnode-id="5707"><span data-dcnode-id="5708" instrument_node="">m</span></td><td class="left-aligned" data-dcnode-id="5704"><span data-dcnode-id="5705" instrument_node="">Extramatrical hyphal length within a root bag</span></td></tr></tbody></table><span data-dcnode-id="5697" instrument_node="">
</span></div><span data-dcnode-id="5695" instrument_node="">
</span><div class="article-section__table-source" data-dcnode-id="5694"></div><span data-dcnode-id="5693" instrument_node="">
</span></div><span data-dcnode-id="5691" instrument_node="">
</span><p data-dcnode-id="5689"><span data-dcnode-id="5690" instrument_node="">Following the dissection, samples from each root order were arranged in water with minimal overlap and scanned on an Epson Expression 10&nbsp;000 XL desktop scanner (resolution of 400&nbsp;dpi, document type set to ‘film mode’). Root samples were then oven dried at 60°C for 48&nbsp;h and weighed. After weighing, each sample was ground to a fine powder, and root C and N concentrations were determined using an elemental analyzer (Vario EL Cube; Elementar). From the scanned images, the average root diameter, root total length, volume and root number for each root order were measured using WinRHIZO software (Regent Instruments Inc., Quebec City, QC, Canada).</span></p><span data-dcnode-id="5688" instrument_node="">
</span><p data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">The specific root length (SRL) was calculated as the root total length divided by its dry mass for each root order. The root tissue density was calculated as the ratio of root dry mass to its volume. The root branching intensity was calculated as the number of first-order roots divided by the total root length of second-order roots. The root branching ratio was calculated as the number of first-order roots divided by the number of second-order roots. The total branch order was obtained by recording the highest root order from the newly growing root branching system after pruning in each root bag. The root total length for each root order within each root bag was measured for all roots, including root samples stored in FAA. The root total dry mass for each root order was calculated as the root total length divided by its SRL for each root bag.</span></p><span data-dcnode-id="5685" instrument_node="">
</span><p data-dcnode-id="5645"><span data-dcnode-id="5684" instrument_node="">Here, we combined the first two root orders for our analyses and defined them as absorptive fine roots (</span><i data-dcnode-id="5682"><span data-dcnode-id="5683" instrument_node="">sensu</span></i><span data-dcnode-id="5681" instrument_node=""> McCormack </span><i data-dcnode-id="5679"><span data-dcnode-id="5680" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="5678" instrument_node="">., </span><span data-dcnode-id="5675"><a class="bibLink tab-link" data-dcnode-id="5676" data-tab="pane-pcw-references" href="#nph13434-bib-0048" id="nph13434-bib-0048R"><span data-dcnode-id="5677" instrument_node="">2015</span></a></span><span data-dcnode-id="5674" instrument_node="">). Furthermore, previous studies have shown that the first two or three root orders for most tree species have an intact cortex, are frequently colonized by mycorrhizal fungi and mainly perform the function of resource acquisition (Pregitzer </span><i data-dcnode-id="5672"><span data-dcnode-id="5673" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="5671" instrument_node="">., </span><span data-dcnode-id="5668"><a class="bibLink tab-link" data-dcnode-id="5669" data-tab="pane-pcw-references" href="#nph13434-bib-0054" id="nph13434-bib-0054R"><span data-dcnode-id="5670" instrument_node="">2002</span></a></span><span data-dcnode-id="5667" instrument_node="">; Guo </span><i data-dcnode-id="5665"><span data-dcnode-id="5666" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="5664" instrument_node="">., </span><span data-dcnode-id="5661"><a class="bibLink tab-link" data-dcnode-id="5662" data-tab="pane-pcw-references" href="#nph13434-bib-0029" id="nph13434-bib-0029R"><span data-dcnode-id="5663" instrument_node="">2008</span></a></span><span data-dcnode-id="5660" instrument_node="">; Xia </span><i data-dcnode-id="5658"><span data-dcnode-id="5659" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="5657" instrument_node="">., </span><span data-dcnode-id="5654"><a class="bibLink tab-link" data-dcnode-id="5655" data-tab="pane-pcw-references" href="#nph13434-bib-0074" id="nph13434-bib-0074R"><span data-dcnode-id="5656" instrument_node="">2010</span></a></span><span data-dcnode-id="5653" instrument_node="">; Gu </span><i data-dcnode-id="5651"><span data-dcnode-id="5652" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="5650" instrument_node="">., </span><span data-dcnode-id="5647"><a class="bibLink tab-link" data-dcnode-id="5648" data-tab="pane-pcw-references" href="#nph13434-bib-0028" id="nph13434-bib-0028R"><span data-dcnode-id="5649" instrument_node="">2014</span></a></span><span data-dcnode-id="5646" instrument_node="">). Our assessment on mycorrhizal colonization also confirmed that the first two root orders in all 14 species were non-woody and mycorrhizal, consistent with these previous studies.</span></p><span data-dcnode-id="5644" instrument_node="">
</span></section><span data-dcnode-id="5642" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="5588" id="nph13434-sec-0006"><span data-dcnode-id="5641" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="5639" id="nph13434-sec-0006-title"><span data-dcnode-id="5640" instrument_node=""> Mycorrhizal colonization</span></h3><span data-dcnode-id="5638" instrument_node="">
</span><p data-dcnode-id="5625"><span data-dcnode-id="5637" instrument_node="">Root samples stored in FAA solution were washed carefully with deionized water and the first two root orders were selected for the measurement of AM colonization using acid fuchsin staining (Giovannetti &amp; Mosse, </span><span data-dcnode-id="5634"><a class="bibLink tab-link" data-dcnode-id="5635" data-tab="pane-pcw-references" href="#nph13434-bib-0024" id="nph13434-bib-0024R"><span data-dcnode-id="5636" instrument_node="">1980</span></a></span><span data-dcnode-id="5633" instrument_node="">). Root segments were cleared in 10% (w/v) KOH solution at 90°C for 50&nbsp;min, acidified in 2% HCl at room temperature for 5&nbsp;min and stained with 0.05% (w/v) acid fuchsin (1.2&nbsp;g acid fuchsin mixed with glycerin, lactic acid (10%) and water in proportions of 1&nbsp;:&nbsp;1&nbsp;:&nbsp;1 by volume) at 90°C for 20&nbsp;min. Then 50 1-cm-long root segments were randomly selected for the measurement of AM colonization at ×200 magnification (Leica DM 2500; Leica Mikrosysteme Vertrieb GmbH, Bensheim, Germany) using the line-intersect method described by McGonigle </span><i data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="5630" instrument_node="">. (</span><span data-dcnode-id="5627"><a class="bibLink tab-link" data-dcnode-id="5628" data-tab="pane-pcw-references" href="#nph13434-bib-0050" id="nph13434-bib-0050R"><span data-dcnode-id="5629" instrument_node="">1990</span></a></span><span data-dcnode-id="5626" instrument_node="">). Arbuscules, vesicles, non-septate and pink-coloured hyphae within the roots were all considered as evidence of AM colonization, and overall colonization was expressed as the percentage of the total root segments scored.</span></p><span data-dcnode-id="5624" instrument_node="">
</span><p data-dcnode-id="5590"><span data-dcnode-id="5623" instrument_node="">After all roots from a root bag had been carefully picked, a fresh soil subsample containing no roots was taken from each bag and extramatrical hyphae were extracted from this soil sample by the membrane filter technique (Miller </span><i data-dcnode-id="5621"><span data-dcnode-id="5622" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="5620" instrument_node="">., </span><span data-dcnode-id="5617"><a class="bibLink tab-link" data-dcnode-id="5618" data-tab="pane-pcw-references" href="#nph13434-bib-0051" id="nph13434-bib-0051R"><span data-dcnode-id="5619" instrument_node="">1995</span></a></span><span data-dcnode-id="5616" instrument_node="">; Rillig </span><i data-dcnode-id="5614"><span data-dcnode-id="5615" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="5613" instrument_node="">., </span><span data-dcnode-id="5610"><a class="bibLink tab-link" data-dcnode-id="5611" data-tab="pane-pcw-references" href="#nph13434-bib-0056" id="nph13434-bib-0056R"><span data-dcnode-id="5612" instrument_node="">1999</span></a></span><span data-dcnode-id="5609" instrument_node="">). Specifically, a fresh soil subsample of 4.0&nbsp;g from each root bag was mixed by hand with 100&nbsp;ml deionized water and 12&nbsp;ml sodium hexametaphosphate (35&nbsp;g&nbsp;l</span><sup data-dcnode-id="5607"><span data-dcnode-id="5608" instrument_node="">−1</span></sup><span data-dcnode-id="5606" instrument_node="">). The blended suspensions were shaken for 30&nbsp;s and left on the bench to settle for 30&nbsp;min. The supernatant was poured through a 38-μm sieve to retain hyphae, roots and other organic matter. The materials on the sieve were sprayed gently with deionized water to remove clay particles, and then transferred to a 250-ml flask with deionized water to reach a volume of 200&nbsp;ml. The flask was shaken vigorously by hand for 5&nbsp;s and left on the bench for 1&nbsp;min. Duplicate 2-ml aliquots were pipetted onto 25-mm-diameter, 1.2-μm Millipore filters. The filters were covered with 1% acid fuchsin for 5&nbsp;min and observed at ×200 magnification (Nikon 80i; Nikon, Tokyo, Japan) using the line-intersect method described by McGonigle </span><i data-dcnode-id="5604"><span data-dcnode-id="5605" instrument_node="">et&nbsp;al</span></i><span data-dcnode-id="5603" instrument_node="">. (</span><span data-dcnode-id="5600"><a class="bibLink tab-link" data-dcnode-id="5601" data-tab="pane-pcw-references" href="#nph13434-bib-0050" id="nph13434-bib-0050R"><span data-dcnode-id="5602" instrument_node="">1990</span></a></span><span data-dcnode-id="5599" instrument_node="">). Hyphal length was determined using the modified formula by Tennant (</span><span data-dcnode-id="5596"><a class="bibLink tab-link" data-dcnode-id="5597" data-tab="pane-pcw-references" href="#nph13434-bib-0066" id="nph13434-bib-0066R"><span data-dcnode-id="5598" instrument_node="">1975</span></a></span><span data-dcnode-id="5595" instrument_node="">). Because extramatrical hyphae may have rapid decomposition rates (Fernandez &amp; Koide, </span><span data-dcnode-id="5592"><a class="bibLink tab-link" data-dcnode-id="5593" data-tab="pane-pcw-references" href="#nph13434-bib-0017" id="nph13434-bib-0017R"><span data-dcnode-id="5594" instrument_node="">2012</span></a></span><span data-dcnode-id="5591" instrument_node="">) and require a relatively long period of time to be extracted, we were not able to measure extramatrical hyphae for all treatments. We instead focused our analyses on the unfertilized control samples and the +NPK samples, a comparison that should show the strongest contrast.</span></p><span data-dcnode-id="5589" instrument_node="">
</span></section><span data-dcnode-id="5587" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="5549" id="nph13434-sec-0007"><span data-dcnode-id="5586" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="5584" id="nph13434-sec-0007-title"><span data-dcnode-id="5585" instrument_node=""> Data analysis</span></h3><span data-dcnode-id="5583" instrument_node="">
</span><p data-dcnode-id="5567"><span data-dcnode-id="5582" instrument_node="">Testing of our first hypothesis required the determination of whether the absorptive fine root diameter across species was positively correlated with its proliferation (root recovery from pruning, root length and mass proliferation) and negatively correlated with mycorrhizal colonization (AM colonization and extramatrical hyphal length per unit length of absorptive fine roots within a root bag). We used linear regression to examine the relationship between root diameter vs root proliferation and between root diameter vs mycorrhizal colonization. The slopes of the linear regressions under all nutrient addition treatments were compared in the R 3.0.3 statistical platform (R Development Core Team, </span><span data-dcnode-id="5579"><a class="bibLink tab-link" data-dcnode-id="5580" data-tab="pane-pcw-references" href="#nph13434-bib-0104" id="nph13434-bib-0104R"><span data-dcnode-id="5581" instrument_node="">2014</span></a></span><span data-dcnode-id="5578" instrument_node="">) with the R package </span><span class="smallCaps" data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node="">smart</span></span><span data-dcnode-id="5575" instrument_node=""> (Higdon </span><i data-dcnode-id="5573"><span data-dcnode-id="5574" instrument_node="">et al</span></i><span data-dcnode-id="5572" instrument_node="">., </span><span data-dcnode-id="5569"><a class="bibLink tab-link" data-dcnode-id="5570" data-tab="pane-pcw-references" href="#nph13434-bib-0101" id="nph13434-bib-0101R"><span data-dcnode-id="5571" instrument_node="">2004</span></a></span><span data-dcnode-id="5568" instrument_node="">). Parameters of root proliferation and mycorrhizal colonization were logarithmically transformed to meet a normal distribution and homogeneity of variance.</span></p><span data-dcnode-id="5566" instrument_node="">
</span><p data-dcnode-id="5551"><span data-dcnode-id="5565" instrument_node="">To test the second hypothesis, we determined whether plants tended to increase absorptive fine root length proliferation as opposed to mycorrhizal colonization across 14 species in response to nutrient-rich patches. In addition, to test the third hypothesis, we determined whether root architectural traits (e.g. root branching) exhibited more phenotypic plasticity than root morphological traits (e.g. root diameter and SRL) in response to nutrient-rich patches. We used two-way factorial ANOVA to test the influence of species and fertilization treatments on root traits, root proliferation and mycorrhizal colonization, and, when appropriate, </span><i data-dcnode-id="5563"><span data-dcnode-id="5564" instrument_node="">post hoc</span></i><span data-dcnode-id="5562" instrument_node=""> means comparisons were made using least square difference (LSD) tests in SPSS 17.0 (SPSS Inc., Chicago, IL, USA). The mean values and coefficient of variation (CV) of all traits averaged across 14 species for each of the four treatments were calculated. Pairwise trait relationships were calculated using Pearson's correlations in SPSS 17.0 (SPSS Inc.). In addition, trait relationships were analyzed after removing the influence of phylogeny via phylogenetic independent contrasts (PICs) using the R package </span><i data-dcnode-id="5560"><span data-dcnode-id="5561" instrument_node="">picante</span></i><span data-dcnode-id="5559" instrument_node=""> (Kembel </span><i data-dcnode-id="5557"><span data-dcnode-id="5558" instrument_node="">et al</span></i><span data-dcnode-id="5556" instrument_node="">., </span><span data-dcnode-id="5553"><a class="bibLink tab-link" data-dcnode-id="5554" data-tab="pane-pcw-references" href="#nph13434-bib-0103" id="nph13434-bib-0103R"><span data-dcnode-id="5555" instrument_node="">2010</span></a></span><span data-dcnode-id="5552" instrument_node="">).</span></p><span data-dcnode-id="5550" instrument_node="">

</span><h2 class="article-section__title section__title section1" data-dcnode-id="5543" id="nph13434-sec-0008-title"><span data-dcnode-id="5544" instrument_node=""> Results</span></h2><span data-dcnode-id="5542" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="5021" id="nph13434-sec-0009"><span data-dcnode-id="5541" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="5539" id="nph13434-sec-0009-title"><span data-dcnode-id="5540" instrument_node=""> Root trait variation across species</span></h3><span data-dcnode-id="5538" instrument_node="">
</span><p data-dcnode-id="5500"><span data-dcnode-id="5537" instrument_node="">We observed wide variation in root morphology and architecture in the lateral fine root branches across 14 coexisting subtropical AM tree species (Fig.&nbsp;S2). These traits were measured on new roots growing in root bags and may differ in specific values from naturally growing roots, but the species differences were the same between roots in root bags and roots in the field (Fig.&nbsp;S3). The mean diameter of absorptive fine roots based on the first two root orders combined varied 4.5-fold across the 14 species, ranging from 0.19&nbsp;mm in </span><i data-dcnode-id="5535"><span data-dcnode-id="5536" instrument_node="">Acer fabri</span></i><span data-dcnode-id="5534" instrument_node=""> to 0.86&nbsp;mm in </span><i data-dcnode-id="5532"><span data-dcnode-id="5533" instrument_node="">Taxus chinensis</span></i><span data-dcnode-id="5531" instrument_node=""> (</span><i data-dcnode-id="5529"><span data-dcnode-id="5530" instrument_node="">P&nbsp;</span></i><span data-dcnode-id="5528" instrument_node="">&lt;&nbsp;0.001, CV&nbsp;=&nbsp;49%, Tables&nbsp;</span><a class="tableLink scrollableLink" data-dcnode-id="5526" href="#nph13434-tbl-0001" title="Link to table"><span data-dcnode-id="5527" instrument_node="">1, 3</span></a><span data-dcnode-id="5525" instrument_node=""> and S2). SRL varied almost 16-fold with a CV of 73% (from 12.0&nbsp;m&nbsp;g</span><sup data-dcnode-id="5523"><span data-dcnode-id="5524" instrument_node="">−1</span></sup><span data-dcnode-id="5522" instrument_node=""> for </span><i data-dcnode-id="5520"><span data-dcnode-id="5521" instrument_node="">T.&nbsp;chinensis</span></i><span data-dcnode-id="5519" instrument_node=""> to 190.3&nbsp;m&nbsp;g</span><sup data-dcnode-id="5517"><span data-dcnode-id="5518" instrument_node="">−1</span></sup><span data-dcnode-id="5516" instrument_node=""> for </span><i data-dcnode-id="5514"><span data-dcnode-id="5515" instrument_node="">A.&nbsp;fabri</span></i><span data-dcnode-id="5513" instrument_node="">). Root branching intensity varied nearly 14-fold with a CV of 75% (from 0.16&nbsp;cm</span><sup data-dcnode-id="5511"><span data-dcnode-id="5512" instrument_node="">−1</span></sup><span data-dcnode-id="5510" instrument_node=""> for </span><i data-dcnode-id="5508"><span data-dcnode-id="5509" instrument_node="">Cunninghamia lanceolata</span></i><span data-dcnode-id="5507" instrument_node=""> to 2.23&nbsp;cm</span><sup data-dcnode-id="5505"><span data-dcnode-id="5506" instrument_node="">−1</span></sup><span data-dcnode-id="5504" instrument_node=""> for </span><i data-dcnode-id="5502"><span data-dcnode-id="5503" instrument_node="">A.&nbsp;fabri</span></i><span data-dcnode-id="5501" instrument_node="">). By contrast, variations in root tissue density, total branch order and root branching ratio across species were smaller, with CVs of 16%, 21% and 27%, respectively (Table&nbsp;S2).</span></p><span data-dcnode-id="5499" instrument_node="">

</span><section class="article-section__sub-content" data-dcnode-id="5003" id="nph13434-sec-0010"><span data-dcnode-id="5019" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="5017" id="nph13434-sec-0010-title"><span data-dcnode-id="5018" instrument_node=""> Correlations of root traits across species</span></h3><span data-dcnode-id="5016" instrument_node="">
</span><p data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">Across 14 species, root diameter and SRL were significantly correlated with most root morphological and architectural traits (Table&nbsp;S3). Root diameter was negatively correlated with SRL, root tissue density, branching intensity and total branch order, but positively correlated with individual root length. SRL was negatively correlated with root diameter, but unrelated to root tissue density (Table&nbsp;S3), indicating that the variation in SRL across species was predominantly controlled by root diameter and its influence on root volume per unit length, rather than tissue density (mass per volume). These correlations remained robust under all treatments (Table&nbsp;S3), but were greatly reduced after removing the influence of phylogeny via PICs (Table&nbsp;S4), demonstrating a strong phylogenetic influence. In addition, root morphological and architectural traits were almost unrelated to measured root chemical traits (e.g. root C and N concentrations) under all treatments (Table&nbsp;S3).</span></p><span data-dcnode-id="5013" instrument_node="">
</span><p data-dcnode-id="5005"><span data-dcnode-id="5012" instrument_node="">Mycorrhizal colonization was also significantly correlated with many morphological and architectural traits. Specifically, AM colonization showed a strong positive (</span><i data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">r</span></i><span data-dcnode-id="5009" instrument_node="">&nbsp;&gt;&nbsp;0.60) relationship with root diameter and individual root length (Table&nbsp;S3). At the same time, AM colonization was strongly and negatively (</span><i data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">r&nbsp;</span></i><span data-dcnode-id="5006" instrument_node="">&lt;&nbsp;−0.60) related to SRL, branching intensity and total branch order, but was generally unrelated to root tissue density or branching ratio (Table&nbsp;S3).</span></p><span data-dcnode-id="5004" instrument_node="">
</span></section><span data-dcnode-id="5002" instrument_node="">
</span><section class="article-section__sub-content" data-dcnode-id="4906" id="nph13434-sec-0011"><span data-dcnode-id="5001" instrument_node="">
</span><h3 class="article-section__sub-title section2" data-dcnode-id="4999" id="nph13434-sec-0011-title"><span data-dcnode-id="5000" instrument_node=""> Complementarity between roots and mycorrhizal fungi across species</span></h3><span data-dcnode-id="4998" instrument_node="">
</span><p data-dcnode-id="4957"><span data-dcnode-id="4997" instrument_node="">Average root recovery from pruning across species decreased linearly with absorptive fine root diameter averaged across treatments (</span><i data-dcnode-id="4995"><span data-dcnode-id="4996" instrument_node="">R</span></i><sup data-dcnode-id="4993"><span data-dcnode-id="4994" instrument_node="">2</span></sup><span data-dcnode-id="4992" instrument_node="">&nbsp;=&nbsp;0.46, </span><i data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">P&nbsp;</span></i><span data-dcnode-id="4989" instrument_node="">&lt;&nbsp;0.01, Fig.&nbsp;</span><a data-dcnode-id="4987" href="#nph13434-fig-0001"><span data-dcnode-id="4988" instrument_node="">1</span></a><span data-dcnode-id="4986" instrument_node="">a), suggesting that thin-root species are better equipped for recovery from disturbance to roots. Moreover, root length proliferation across all species decreased linearly with absorptive fine root diameter (</span><i data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">R</span></i><sup data-dcnode-id="4982"><span data-dcnode-id="4983" instrument_node="">2</span></sup><span data-dcnode-id="4981" instrument_node="">&nbsp;≥&nbsp;0.28, </span><i data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">P&nbsp;</span></i><span data-dcnode-id="4978" instrument_node="">&lt;&nbsp;0.05, Fig.&nbsp;</span><a data-dcnode-id="4976" href="#nph13434-fig-0001"><span data-dcnode-id="4977" instrument_node="">1</span></a><span data-dcnode-id="4975" instrument_node="">b) under three of the treatments, other than the N addition (+N) treatment, whereas AM colonization under all four treatments and extramatrical hyphal length per unit length of absorptive fine roots under unfertilized control and multi-nutrient addition (+NPK) treatments increased linearly with absorptive fine root diameter (</span><i data-dcnode-id="4973"><span data-dcnode-id="4974" instrument_node="">R</span></i><sup data-dcnode-id="4971"><span data-dcnode-id="4972" instrument_node="">2</span></sup><span data-dcnode-id="4970" instrument_node="">&nbsp;≥&nbsp;0.4, </span><i data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">P&nbsp;</span></i><span data-dcnode-id="4967" instrument_node="">&lt;&nbsp;0.05, Fig.&nbsp;</span><a data-dcnode-id="4965" href="#nph13434-fig-0001"><span data-dcnode-id="4966" instrument_node="">1</span></a><span data-dcnode-id="4964" instrument_node="">d,e). There was no evidence that thin-root species were differentially affected by the attributes of the nutrient patch itself relative to thick-root species (slopes of regression lines across different fertilization treatments did not differ, </span><i data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">P&nbsp;</span></i><span data-dcnode-id="4961" instrument_node="">&gt;&nbsp;0.05, Fig.&nbsp;</span><a data-dcnode-id="4959" href="#nph13434-fig-0001"><span data-dcnode-id="4960" instrument_node="">1</span></a><span data-dcnode-id="4958" instrument_node="">b,d,e).</span></p><span data-dcnode-id="4956" instrument_node="">

</span><div class="figure__caption figure__caption-text" data-dcnode-id="4914"><span data-dcnode-id="4936" instrument_node="">The relationship of (a) root recovery from pruning averaged across different treatments, (b) absorptive fine root length proliferation, (c) absorptive fine root dry mass proliferation, (d) arbuscular mycorrhizal (AM) colonization and (e) extramatrical hyphal length per unit length absorptive fine roots in each bag (EHL/RL) with mean diameter of the first two order roots across 14 AM tree species under four treatments (Unfert., unfertilized control; +N, nitrogen addition;+P, phosphate addition; +NPK, multi-nutrient addition). Error bars, ±&nbsp;SE of the mean. Note that the </span><i data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">y</span></i><span data-dcnode-id="4933" instrument_node=""> axes of (b), (c) and (e) are presented at log</span><sub data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">10</span></sub><span data-dcnode-id="4930" instrument_node=""> scale. Solid lines of (b), (d) and (e) represent the linear correlations across species for different treatments. Differences between the slopes of the regression lines of all graphs were not significant (</span><i data-dcnode-id="4928"><span data-dcnode-id="4929" instrument_node="">P</span></i><span data-dcnode-id="4927" instrument_node="">&nbsp;&gt;&nbsp;0.05). *, </span><i data-dcnode-id="4925"><span data-dcnode-id="4926" instrument_node="">P</span></i><span data-dcnode-id="4924" instrument_node="">&nbsp;&lt;&nbsp;0.05; **, </span><i data-dcnode-id="4922"><span data-dcnode-id="4923" instrument_node="">P</span></i><span data-dcnode-id="4921" instrument_node="">&nbsp;&lt;&nbsp;0.01; ***, </span><i data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">P</span></i><span data-dcnode-id="4918" instrument_node="">&nbsp;&lt;&nbsp;0.001; </span><i data-dcnode-id="4916"><span data-dcnode-id="4917" instrument_node="">ns</span></i><span data-dcnode-id="4915" instrument_node="">, not significant.</span></div><span data-dcnode-id="4913" instrument_node="">
