</span></a></div></figure></div><p data-dcnode-id="2484"><span data-dcnode-id="2512" instrument_node="">Hierarchical partitioning analysis indicated temporal variations in NuRE over the years under study, from 18.13 % KRE to 96.04 % PRE in the three oak species (Table </span><a data-dcnode-id="2510" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2511" instrument_node="">S3</span></a><span data-dcnode-id="2509" instrument_node="">). The NRE was strongly associated with MAT and leaf N, CuRE with MAP in the three species, PRE with MAT and leaf P, MgRE with MAT in </span><i data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">Q. aliena</span></i><span data-dcnode-id="2506" instrument_node=""> var. </span><i data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">acuteserrata</span></i><span data-dcnode-id="2503" instrument_node=""> and </span><i data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Q. glandulifera</span></i><span data-dcnode-id="2500" instrument_node="">, and CaRE, MnRE, and BaRE with MAT and leaf elements in </span><i data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">Q. glandulifera</span></i><span data-dcnode-id="2497" instrument_node=""> and </span><i data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Q. variabilis.</span></i><span data-dcnode-id="2494" instrument_node=""> The NuRE of the remaining elements was mostly related to leaf element concentrations, except for K, Na, and Cu. Soil elements did not influence NuRE, except for CRE in </span><i data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Q. glandulifera</span></i><span data-dcnode-id="2491" instrument_node=""> and ZnRE in </span><i data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Q. variabilis</span></i><span data-dcnode-id="2488" instrument_node=""> (Table </span><a data-dcnode-id="2486" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2487" instrument_node="">S3</span></a><span data-dcnode-id="2485" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="2248" data-title="Discussion"><div class="c-article-section" data-dcnode-id="2249" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2479" id="Sec10"><span data-dcnode-id="2480" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="2250" id="Sec10-content"><h3 class="c-article__sub-heading" data-dcnode-id="2477" id="Sec11"><span data-dcnode-id="2478" instrument_node="">Analogous response of interspecies NuREs to interannual climate variability</span></h3><p data-dcnode-id="2451"><span data-dcnode-id="2476" instrument_node="">In contrast to deciduous plants on a global scale (Vergutz et al. </span><a aria-label="Reference 2012" data-dcnode-id="2474" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d12231357e3783" title="Vergutz L, Manzoni S, Porporato A, Novais RF, Jackson RB (2012) Global resorption efficiencies and concentrations of carbon and nutrients in leaves of terrestrial plants. Ecol Monogr 82:205–220"><span data-dcnode-id="2475" instrument_node="">2012</span></a><span data-dcnode-id="2473" instrument_node="">), the three oak species under study demonstrated higher N, P, and K resorption efficiencies, but lower C and Mg resorption efficiencies. The NuRE of N and P in this study was higher than that of deciduous plants in a subtropical karst region (Liu et al. </span><a aria-label="Reference 2014" data-dcnode-id="2471" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d12231357e3786" title="Liu CC, Liu YG, Guo K, Wang SJ, Yang Y (2014) Concentrations and resorption patterns of 13 nutrients in different plant functional types in the karst region of south-western China. Ann Bot 113:873–885"><span data-dcnode-id="2472" instrument_node="">2014</span></a><span data-dcnode-id="2470" instrument_node="">), and higher than that of </span><i data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Q. variabilis</span></i><span data-dcnode-id="2467" instrument_node=""> across China (Sun et al. </span><a aria-label="Reference 2015" data-dcnode-id="2465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d12231357e3792" title="Sun X, Kang H, Chen HY, Berg B, Bartels SF, Liu C (2015) Biogeographic patterns of nutrient resorption from Quercus variabilis Blume leaves across China. Plant Biol 18:505–513"><span data-dcnode-id="2466" instrument_node="">2015</span></a><span data-dcnode-id="2464" instrument_node="">). These results signified that plants may have more N and P demand for growth in this region. This may have been because the plants grew at high altitudes where due to low temperatures, they required higher levels of nutrient resorption to store nutrients for the following growing season. This was demonstrated by Du et al. (</span><a aria-label="Reference 2017" data-dcnode-id="2462" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d12231357e3795" title="Du B, Ji H, Peng C, Liu X, Liu C (2017) Altitudinal patterns of leaf stoichiometry and nutrient resorption in Quercus variabilis in the Baotianman Mountains, China. Plant Soil 413:193–202"><span data-dcnode-id="2463" instrument_node="">2017</span></a><span data-dcnode-id="2461" instrument_node="">), who found that the resorption of N, P, and S (at least in </span><i data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Q. variabilis</span></i><span data-dcnode-id="2458" instrument_node="">) was the greatest at high altitudes. Moreover, PRE in the three oaks was greater than NRE (except in 2018). This was in alignment with the research of Chai et al. (</span><a aria-label="Reference 2015" data-dcnode-id="2456" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d12231357e3802" title="Chai Y, Zhang X, Yue M, Liu X, Li Q, Shang H, Meng Q, Zhang R (2015) Leaf traits suggest different ecological strategies for two Quercus species along an altitudinal gradient in the Qinling Mountains. J Forest Res 20:501–513"><span data-dcnode-id="2457" instrument_node="">2015</span></a><span data-dcnode-id="2455" instrument_node="">) and Du et al. (</span><a aria-label="Reference 2017" data-dcnode-id="2453" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d12231357e3805" title="Du B, Ji H, Peng C, Liu X, Liu C (2017) Altitudinal patterns of leaf stoichiometry and nutrient resorption in Quercus variabilis in the Baotianman Mountains, China. Plant Soil 413:193–202"><span data-dcnode-id="2454" instrument_node="">2017</span></a><span data-dcnode-id="2452" instrument_node="">), who revealed that in the same or neighboring regions, the growth of oaks was commonly restrained by P in contrast to N.</span></p><p data-dcnode-id="2419"><span data-dcnode-id="2450" instrument_node="">As a conservation mechanism, nutrient resorption plays a key role in balancing plant nutrient demands and acquisition (Killingbeck </span><a aria-label="Reference 2004" data-dcnode-id="2448" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d12231357e3811" title="Killingbeck KT (2004) Nutrient resorption. In: Noodén LD (ed) Plant cell death processes. Academic Press, Cambridge"><span data-dcnode-id="2449" instrument_node="">2004</span></a><span data-dcnode-id="2447" instrument_node="">; Brant and Chen </span><a aria-label="Reference 2015" data-dcnode-id="2445" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d12231357e3814" title="Brant AN, Chen HY (2015) Patterns and mechanisms of nutrient resorption in plants. Crit Rev Plant Sci 34:471–486"><span data-dcnode-id="2446" instrument_node="">2015</span></a><span data-dcnode-id="2444" instrument_node="">). Our results revealed that NuRE varied significantly among the different years but did not differ between species. Interestingly, the three oak species displayed analogous NuRE responses to interannual climate variability, particularly for C, N, P, S, Mg, Fe, Mn, and Cu (Table&nbsp;</span><a data-dcnode-id="2442" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2443" instrument_node="">2</span></a><span data-dcnode-id="2441" instrument_node="">), and cluster analysis also indicated five similar clusters in the three oak species (Fig.&nbsp;</span><a data-dcnode-id="2439" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2440" instrument_node="">2</span></a><span data-dcnode-id="2438" instrument_node="">). The similarity in NuRE between different plants indicated that the same plant types (only deciduous plants were investigated in the study) growing in the same region might have parallel or convergent mechanisms in terms of nutrient conservation (Yeaman et al. </span><a aria-label="Reference 2016" data-dcnode-id="2436" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d12231357e3823" title="Yeaman S, Hodgins KA, Lotterhos KE, Suren H, Nadeau S, Degner JC, Nurkowski KA, Smets P, Wang T, Gray LK, Liepe KJ, Hamann A, Holliday JA, Whitlock MC, Rieseberg LH, Aitken SN (2016) Convergent local adaptation to climate in distantly related conifers. Science 353:1431–1433"><span data-dcnode-id="2437" instrument_node="">2016</span></a><span data-dcnode-id="2435" instrument_node="">). This aligned well with a study by Bahamonde et al. (</span><a aria-label="Reference 2019" data-dcnode-id="2433" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d12231357e3827" title="Bahamonde HA, Fernández V, Gyenge J, Mattenet F, Peri PL (2019) Essential nutrient and trace element foliar resorption of two co-existing Nothofagus species grown under different environmental conditions in southern Patagonia. Front Plant Sci 10:1542. 
                  https://doi.org/10.3389/fpls.2019.01542
                  
                "><span data-dcnode-id="2434" instrument_node="">2019</span></a><span data-dcnode-id="2432" instrument_node="">), who found that the NuRE did not vary between </span><i data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">Nothofagus pumilio</span></i><span data-dcnode-id="2429" instrument_node=""> and </span><i data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">N. antarctica</span></i><span data-dcnode-id="2426" instrument_node=""> at the sites they investigated. Similar results were reported following a five year manipulative field study by Prieto and Querejeta (</span><a aria-label="Reference 2020" data-dcnode-id="2424" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d12231357e3836" title="Prieto I, Querejeta JI (2020) Simulated climate change decreases nutrient resorption from senescing leaves. Glob Chang Biol 26:1795–1807"><span data-dcnode-id="2425" instrument_node="">2020</span></a><span data-dcnode-id="2423" instrument_node="">), and demonstrated by Lü et al. (</span><a aria-label="Reference 2013" data-dcnode-id="2421" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d12231357e3839" title="Lü XT, Reed S, Yu Q, He NP, Wang ZW, Han XG (2013) Convergent responses of nitrogen and phosphorus resorption to nitrogen inputs in a semiarid grassland. Glob Chang Biol 19:2775–2784"><span data-dcnode-id="2422" instrument_node="">2013</span></a><span data-dcnode-id="2420" instrument_node="">), who found that with N inputs, plants exhibited a convergent response in the resportion of N and P. These results indicated that plants growing under the same conditions, or occupying the same niche, may experience analogous limitations for nutrient absorption and conservation processes. Thus, our findings may have important implications for the study of localized plant adaptations and evolution.</span></p><p data-dcnode-id="2369"><span data-dcnode-id="2418" instrument_node="">In addition, our results showed that the NuRE of P, K, N, S, Mg, C, and Zn was greater than zero, while that of Mn, Na, Ca, Ba, Fe, Cu, and Al was less than zero in the three oak species (Table&nbsp;</span><a data-dcnode-id="2416" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2417" instrument_node="">2</span></a><span data-dcnode-id="2415" instrument_node="">), which was demonstrated by the study of Du et al. (</span><a aria-label="Reference 2017" data-dcnode-id="2413" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d12231357e3848" title="Du B, Ji H, Peng C, Liu X, Liu C (2017) Altitudinal patterns of leaf stoichiometry and nutrient resorption in Quercus variabilis in the Baotianman Mountains, China. Plant Soil 413:193–202"><span data-dcnode-id="2414" instrument_node="">2017</span></a><span data-dcnode-id="2412" instrument_node="">) for </span><i data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Q. variabilis</span></i><span data-dcnode-id="2409" instrument_node="">. Macroelements (P, K, N, S, Mg, C, and Zn) that are constituents of amino acids, proteins, nucleic acids, and enzymes (Marschner and Marschner </span><a aria-label="Reference 2012" data-dcnode-id="2407" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d12231357e3854" title="Marschner H, Marschner P (2012) Marschner’s mineral nutrition of higher plants. Academic Press, California"><span data-dcnode-id="2408" instrument_node="">2012</span></a><span data-dcnode-id="2406" instrument_node="">) are essential for new growth, and therefore had a high resorption efficiency (except for Ca) (Liu et al. </span><a aria-label="Reference 2014" data-dcnode-id="2404" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d12231357e3857" title="Liu CC, Liu YG, Guo K, Wang SJ, Yang Y (2014) Concentrations and resorption patterns of 13 nutrients in different plant functional types in the karst region of south-western China. Ann Bot 113:873–885"><span data-dcnode-id="2405" instrument_node="">2014</span></a><span data-dcnode-id="2403" instrument_node="">; Du et al. </span><a aria-label="Reference 2017" data-dcnode-id="2401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d12231357e3861" title="Du B, Ji H, Peng C, Liu X, Liu C (2017) Altitudinal patterns of leaf stoichiometry and nutrient resorption in Quercus variabilis in the Baotianman Mountains, China. Plant Soil 413:193–202"><span data-dcnode-id="2402" instrument_node="">2017</span></a><span data-dcnode-id="2400" instrument_node="">). Microelements and trace elements (Mn, Na, Ca, Ba, Fe, Cu, and Al) are closely related to enzymes, cell structure and detoxification. The negative resorption efficiencies of these elements have also been reported previously (Killingbeck </span><a aria-label="Reference 1993" data-dcnode-id="2398" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d12231357e3864" title="Killingbeck KT (1993) Inefficient nitrogen resorption in genets of the actinorhizal nitrogen fixing shrub Comptonia peregrina: physiological ineptitude or evolutionary tradeoff? Oecologia 94:542–549"><span data-dcnode-id="2399" instrument_node="">1993</span></a><span data-dcnode-id="2397" instrument_node="">; Liu et al. </span><a aria-label="Reference 2014" data-dcnode-id="2395" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d12231357e3867" title="Liu CC, Liu YG, Guo K, Wang SJ, Yang Y (2014) Concentrations and resorption patterns of 13 nutrients in different plant functional types in the karst region of south-western China. Ann Bot 113:873–885"><span data-dcnode-id="2396" instrument_node="">2014</span></a><span data-dcnode-id="2394" instrument_node="">; Du et al. </span><a aria-label="Reference 2017" data-dcnode-id="2392" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d12231357e3870" title="Du B, Ji H, Peng C, Liu X, Liu C (2017) Altitudinal patterns of leaf stoichiometry and nutrient resorption in Quercus variabilis in the Baotianman Mountains, China. Plant Soil 413:193–202"><span data-dcnode-id="2393" instrument_node="">2017</span></a><span data-dcnode-id="2391" instrument_node="">). This is likely due to these nutrients being freely loaded into xylem but highly restricted in phloem (Bukovac and Wittwer </span><a aria-label="Reference 1957" data-dcnode-id="2389" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d12231357e3873" title="Bukovac MJ, Wittwer SH (1957) Absorption and mobility of foliar applied nutrients. Plant Physiol 32:428–435"><span data-dcnode-id="2390" instrument_node="">1957</span></a><span data-dcnode-id="2388" instrument_node="">; Hill </span><a aria-label="Reference 1980" data-dcnode-id="2386" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d12231357e3876" title="Hill J (1980) The remobilization of nutrients from leaves. J Plant Nutr 2:407–444"><span data-dcnode-id="2387" instrument_node="">1980</span></a><span data-dcnode-id="2385" instrument_node="">), which limits their inputs into perennial tissues, and therefore had a low even negative resorption efficiency. As expected, seasonal variations in the elements of </span><i data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">Q. variabilis</span></i><span data-dcnode-id="2382" instrument_node=""> of the same region also demonstrated low nutrients for microelements and trace elements and high nutrients for macroelements at the onset of the growing season (Du et al. </span><a aria-label="Reference 2021" data-dcnode-id="2380" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d12231357e3883" title="Du B, Zheng J, Ji H, Zhu Y, Yuan J, Wen J, Kang H, Liu C (2021) Stable carbon isotope used to estimate water use efficiency can effectively indicate seasonal variation in leaf stoichiometry. Ecol Indic 121:107250"><span data-dcnode-id="2381" instrument_node="">2021</span></a><span data-dcnode-id="2379" instrument_node="">). These findings indicated that the oak species engaged in resorption trade-offs as the end of the growing season approached, which may affect plant regrowth. Furthermore, we found that the elemental CVs between different years generally decreased with higher NuREs in all three oak species (Fig.&nbsp;</span><a data-dcnode-id="2377" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2378" instrument_node="">3</span></a><span data-dcnode-id="2376" instrument_node="">) as supported by the study of Karimi and Folt (</span><a aria-label="Reference 2006" data-dcnode-id="2374" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d12231357e3889" title="Karimi R, Folt CL (2006) Beyond macronutrients: element variability and multielement stoichiometry in freshwater invertebrates. Ecol Lett 9:1273–1283"><span data-dcnode-id="2375" instrument_node="">2006</span></a><span data-dcnode-id="2373" instrument_node="">). This was because high elemental concentrations with low variability benefitted plants by maintaining their homeostasis (Han et al. </span><a aria-label="Reference 2011" data-dcnode-id="2371" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d12231357e3892" title="Han WX, Fang JY, Reich PB, Ian Woodward F, Wang ZH (2011) Biogeography and variability of eleven mineral elements in plant leaves across gradients of climate, soil and plant functional type in China. Ecol Lett 14:788–796"><span data-dcnode-id="2372" instrument_node="">2011</span></a><span data-dcnode-id="2370" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2367" id="Sec12"><span data-dcnode-id="2368" instrument_node="">Effects of interannual climate, and leaf and soil nutrient status on NuRE</span></h3><p data-dcnode-id="2338"><span data-dcnode-id="2366" instrument_node="">Significant fluctuations in nutrient resorption due to interannual variabilities in temperature and precipitation were reported in two prior studies (May and Killingbeck </span><a aria-label="Reference 1992" data-dcnode-id="2364" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d12231357e3903" title="May JD, Killingbeck KT (1992) Effects of preventing nutrient resorption on plant fitness and foliar nutrient dynamics. Ecology 73:1868–1878"><span data-dcnode-id="2365" instrument_node="">1992</span></a><span data-dcnode-id="2363" instrument_node="">; Killingbeck </span><a aria-label="Reference 1993" data-dcnode-id="2361" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d12231357e3906" title="Killingbeck KT (1993) Inefficient nitrogen resorption in genets of the actinorhizal nitrogen fixing shrub Comptonia peregrina: physiological ineptitude or evolutionary tradeoff? Oecologia 94:542–549"><span data-dcnode-id="2362" instrument_node="">1993</span></a><span data-dcnode-id="2360" instrument_node="">). Of the fourteen elements examined the NuRE of C, N, P, S, Ca, and Mg was closely associated with MAT and MAP (Figs.&nbsp;</span><a data-dcnode-id="2358" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2359" instrument_node="">4</span></a><span data-dcnode-id="2357" instrument_node=""> and </span><a data-dcnode-id="2355" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2356" instrument_node="">5</span></a><span data-dcnode-id="2354" instrument_node="">). The results suggested that these elements were more sensitive to interannual climate variability compared to others, which due to their importance translated to limitations in photosynthesis and growth in plants (Elser et al. </span><a aria-label="Reference 2007" data-dcnode-id="2352" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d12231357e3915" title="Elser JJ, Bracken ME, Cleland EE, Gruner DS, Harpole WS, Hillebrand H, Ngai JT, Seabloom EW, Shurin JB, Smith JE (2007) Global analysis of nitrogen and phosphorus limitation of primary producers in freshwater, marine and terrestrial ecosystems. Ecol Lett 10:1135–1142"><span data-dcnode-id="2353" instrument_node="">2007</span></a><span data-dcnode-id="2351" instrument_node="">; Marschner and Marschner </span><a aria-label="Reference 2012" data-dcnode-id="2349" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d12231357e3919" title="Marschner H, Marschner P (2012) Marschner’s mineral nutrition of higher plants. Academic Press, California"><span data-dcnode-id="2350" instrument_node="">2012</span></a><span data-dcnode-id="2348" instrument_node="">). This finding signified that the responses of resorption to climatic variability were contingent on element type (Vergutz et al. </span><a aria-label="Reference 2012" data-dcnode-id="2346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d12231357e3922" title="Vergutz L, Manzoni S, Porporato A, Novais RF, Jackson RB (2012) Global resorption efficiencies and concentrations of carbon and nutrients in leaves of terrestrial plants. Ecol Monogr 82:205–220"><span data-dcnode-id="2347" instrument_node="">2012</span></a><span data-dcnode-id="2345" instrument_node="">; Sun et al. </span><a aria-label="Reference 2015" data-dcnode-id="2343" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d12231357e3925" title="Sun X, Kang H, Chen HY, Berg B, Bartels SF, Liu C (2015) Biogeographic patterns of nutrient resorption from Quercus variabilis Blume leaves across China. Plant Biol 18:505–513"><span data-dcnode-id="2344" instrument_node="">2015</span></a><span data-dcnode-id="2342" instrument_node="">; Du et al. </span><a aria-label="Reference 2017" data-dcnode-id="2340" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d12231357e3928" title="Du B, Ji H, Peng C, Liu X, Liu C (2017) Altitudinal patterns of leaf stoichiometry and nutrient resorption in Quercus variabilis in the Baotianman Mountains, China. Plant Soil 413:193–202"><span data-dcnode-id="2341" instrument_node="">2017</span></a><span data-dcnode-id="2339" instrument_node="">), where some elements that are directly related to growth (such as nucleic acid-proteins and photosynthetic elements) may be more sensitive to climate change.</span></p><p data-dcnode-id="2312"><span data-dcnode-id="2337" instrument_node="">There was negative relationship between NRE and temperature across all species (Fig.&nbsp;</span><a data-dcnode-id="2335" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2336" instrument_node="">4</span></a><span data-dcnode-id="2334" instrument_node="">), which was demonstrated in numerous previous studies (Yuan and Chen </span><a aria-label="Reference 2009" data-dcnode-id="2332" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d12231357e3937" title="Yuan Z, Chen HY (2009) Global-scale patterns of nutrient resorption associated with latitude, temperature and precipitation. Global Ecol Biogeogr 18:11–18"><span data-dcnode-id="2333" instrument_node="">2009</span></a><span data-dcnode-id="2331" instrument_node="">; Sun et al. </span><a aria-label="Reference 2015" data-dcnode-id="2329" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d12231357e3940" title="Sun X, Kang H, Chen HY, Berg B, Bartels SF, Liu C (2015) Biogeographic patterns of nutrient resorption from Quercus variabilis Blume leaves across China. Plant Biol 18:505–513"><span data-dcnode-id="2330" instrument_node="">2015</span></a><span data-dcnode-id="2328" instrument_node="">; Prieto and Querejeta </span><a aria-label="Reference 2020" data-dcnode-id="2326" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d12231357e3943" title="Prieto I, Querejeta JI (2020) Simulated climate change decreases nutrient resorption from senescing leaves. Glob Chang Biol 26:1795–1807"><span data-dcnode-id="2327" instrument_node="">2020</span></a><span data-dcnode-id="2325" instrument_node="">). This was primarily because colder temperatures not only inhibited the metabolic activity of plants, but also restricted nutrient release and root N uptake. Consequently, plants need to extract additional N to enhance metabolic activity and growth rates, while reducing their dependence on available soil nutrients. This result also uncovered the interesting finding that temperature had a consistent influence on NRE regardless of spatial or temporal scales. However, precipitation had more complex influence on nutrient resorption. For instance, NRE and PRE initially decreased and then increased with MAP (Fig.&nbsp;</span><a data-dcnode-id="2323" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2324" instrument_node="">5</span></a><span data-dcnode-id="2322" instrument_node="">). Comparatively, Yuan and Chen (</span><a aria-label="Reference 2009" data-dcnode-id="2320" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d12231357e3950" title="Yuan Z, Chen HY (2009) Global-scale patterns of nutrient resorption associated with latitude, temperature and precipitation. Global Ecol Biogeogr 18:11–18"><span data-dcnode-id="2321" instrument_node="">2009</span></a><span data-dcnode-id="2319" instrument_node="">) found that P resorption increased with higher precipitation, while Vergutz et al. (</span><a aria-label="Reference 2012" data-dcnode-id="2317" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d12231357e3953" title="Vergutz L, Manzoni S, Porporato A, Novais RF, Jackson RB (2012) Global resorption efficiencies and concentrations of carbon and nutrients in leaves of terrestrial plants. Ecol Monogr 82:205–220"><span data-dcnode-id="2318" instrument_node="">2012</span></a><span data-dcnode-id="2316" instrument_node="">) reported that N and P resorption decreased with precipitation on a global scale. Moreover, Du et al. (</span><a aria-label="Reference 2017" data-dcnode-id="2314" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d12231357e3956" title="Du B, Ji H, Peng C, Liu X, Liu C (2017) Altitudinal patterns of leaf stoichiometry and nutrient resorption in Quercus variabilis in the Baotianman Mountains, China. Plant Soil 413:193–202"><span data-dcnode-id="2315" instrument_node="">2017</span></a><span data-dcnode-id="2313" instrument_node="">) found that N and P resorption was enhanced with precipitation along an altitude gradient in the same area. Our study indicated that excessive or low precipitation may have restricted the growth of plants, which resulted in high N and P resorption. These results revealed that precipitation may play a predominant role in the determination of nutrient demands and plant growth in different oak forests.</span></p><p data-dcnode-id="2283"><span data-dcnode-id="2311" instrument_node="">During the driest year of the study (2014) CRE was significantly enhanced in the oak trees (Table&nbsp;</span><a data-dcnode-id="2309" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2310" instrument_node="">2</span></a><span data-dcnode-id="2308" instrument_node="">), which suggested that plants may store additional energy for reproduction under drought conditions (Vergutz et al. </span><a aria-label="Reference 2012" data-dcnode-id="2306" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d12231357e3965" title="Vergutz L, Manzoni S, Porporato A, Novais RF, Jackson RB (2012) Global resorption efficiencies and concentrations of carbon and nutrients in leaves of terrestrial plants. Ecol Monogr 82:205–220"><span data-dcnode-id="2307" instrument_node="">2012</span></a><span data-dcnode-id="2305" instrument_node="">). Correspondingly, the concentrations of C in the litter of the forest floor were reduced (Fig. </span><a data-dcnode-id="2303" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2304" instrument_node="">S3</span></a><span data-dcnode-id="2302" instrument_node="">), as was demonstrated by Sardans et al. (</span><a aria-label="Reference 2008" data-dcnode-id="2300" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d12231357e3971" title="Sardans J, Penuelas J, Estiarte M, Prieto P (2008) Warming and drought alter C and N concentration, allocation and accumulation in a Mediterranean shrubland. Glob Chang Biol 14:2304–2316"><span data-dcnode-id="2301" instrument_node="">2008</span></a><span data-dcnode-id="2299" instrument_node="">). This might influence future litter quality and decomposition, and even ecosystem C cycling. Based on the predicted changes in local temperature and precipitation (0.9&nbsp;°C higher annual mean temperature and 6.4 mm lower total precipitation over the next twenty years) (Zhao et al. </span><a aria-label="Reference 2012" data-dcnode-id="2297" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d12231357e3974" title="Zhao G, Li T, Wang J, Cao S, Wang J (2012) Predition reseach of climate change trends in Henan Provience in the future 30 years. Henan Water Resour South-to-North Water Diversion 2:8–10 (in Chinese)"><span data-dcnode-id="2298" instrument_node="">2012</span></a><span data-dcnode-id="2296" instrument_node="">), the resorption efficiency of C, N, and P will likely (to some extent) decrease over the next twenty years (Table </span><a data-dcnode-id="2294" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2295" instrument_node="">S4</span></a><span data-dcnode-id="2293" instrument_node="">), as demonstrated by Prieto and Querejeta (</span><a aria-label="Reference 2020" data-dcnode-id="2291" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d12231357e3981" title="Prieto I, Querejeta JI (2020) Simulated climate change decreases nutrient resorption from senescing leaves. Glob Chang Biol 26:1795–1807"><span data-dcnode-id="2292" instrument_node="">2020</span></a><span data-dcnode-id="2290" instrument_node="">). This decrease likely reduced nutrient demands and plant growth and may have some influence on litter quality and decomposition (Prescott </span><a aria-label="Reference 2010" data-dcnode-id="2288" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d12231357e3984" title="Prescott CE (2010) Litter decomposition: what controls it and how can we alter it to sequester more carbon in forest soils? Biogeochemistry 101:133–149"><span data-dcnode-id="2289" instrument_node="">2010</span></a><span data-dcnode-id="2287" instrument_node="">; Prieto et al. </span><a aria-label="Reference 2019" data-dcnode-id="2285" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d12231357e3987" title="Prieto I, Almagro M, Bastida F, Querejeta JI (2019) Altered leaf litter quality exacerbates the negative impact of climate change on decomposition. J Ecol 10:2364–2382"><span data-dcnode-id="2286" instrument_node="">2019</span></a><span data-dcnode-id="2284" instrument_node="">).</span></p><p data-dcnode-id="2251"><span data-dcnode-id="2282" instrument_node="">NuRE was also associated with the elemental concentrations of green leaves. Surprisingly, there were positive relationships between the concentrations of leaf element and NuREs (except for P) (Fig. </span><a data-dcnode-id="2280" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2281" instrument_node="">S2</span></a><span data-dcnode-id="2279" instrument_node="">). Our results were different from previous studies, where the high nutrient contents of green leaves typically led to low nutrient resorption (Kobe et al. </span><a aria-label="Reference 2005" data-dcnode-id="2277" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d12231357e3996" title="Kobe RK, Lepczyk CA, Iyer M (2005) Resorption efficiency decreases with increasing green leaf nutrients in a global data set. Ecology 86:2780–2792"><span data-dcnode-id="2278" instrument_node="">2005</span></a><span data-dcnode-id="2276" instrument_node="">; Ratnam et al. </span><a aria-label="Reference 2008" data-dcnode-id="2274" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d12231357e3999" title="Ratnam J, Sankaran M, Hanan NP, Grant RC, Zambatis N (2008) Nutrient resorption patterns of plant functional groups in a tropical savanna: variation and functional significance. Oecologia 157:141–151"><span data-dcnode-id="2275" instrument_node="">2008</span></a><span data-dcnode-id="2273" instrument_node="">; Vergutz et al. </span><a aria-label="Reference 2012" data-dcnode-id="2271" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d12231357e4002" title="Vergutz L, Manzoni S, Porporato A, Novais RF, Jackson RB (2012) Global resorption efficiencies and concentrations of carbon and nutrients in leaves of terrestrial plants. Ecol Monogr 82:205–220"><span data-dcnode-id="2272" instrument_node="">2012</span></a><span data-dcnode-id="2270" instrument_node="">), or there was no significant relationship between them (Chapin and Moilanen </span><a aria-label="Reference 1991" data-dcnode-id="2268" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d12231357e4005" title="Chapin FS, Moilanen L (1991) Nutritional controls over nitrogen and phosphorus resorption from Alaskan birch leaves. Ecology 72:709–715"><span data-dcnode-id="2269" instrument_node="">1991</span></a><span data-dcnode-id="2267" instrument_node="">; Aerts </span><a aria-label="Reference 1996" data-dcnode-id="2265" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d12231357e4009" title="Aerts R (1996) Nutrient resorption from senescing leaves of perennials: are there general patterns? J Ecol 84:597–608"><span data-dcnode-id="2266" instrument_node="">1996</span></a><span data-dcnode-id="2264" instrument_node="">). For our study, the relationships between the elemental concentrations of green leaves and climatic factors were also analyzed, which were consistent with the relationships between NuRE and climatic factors. This revealed that both the elemental concentrations of green leaves and the resorption of nutrients were impacted by climatic factors, which may form coupling relationships. When plants possessed high nutrient concentrations during the growing season, increased nutrient resorption was likely to occur at the end of the growing season to maintain a source-sink balance (Killingbeck </span><a aria-label="Reference 2004" data-dcnode-id="2262" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d12231357e4012" title="Killingbeck KT (2004) Nutrient resorption. In: Noodén LD (ed) Plant cell death processes. Academic Press, Cambridge"><span data-dcnode-id="2263" instrument_node="">2004</span></a><span data-dcnode-id="2261" instrument_node="">). Furthermore, we found that soil had no influence on NuRE during the years under study (Table </span><a data-dcnode-id="2259" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2260" instrument_node="">S3</span></a><span data-dcnode-id="2258" instrument_node="">), which agreed with the findings of Aerts (</span><a aria-label="Reference 1996" data-dcnode-id="2256" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d12231357e4018" title="Aerts R (1996) Nutrient resorption from senescing leaves of perennials: are there general patterns? J Ecol 84:597–608"><span data-dcnode-id="2257" instrument_node="">1996</span></a><span data-dcnode-id="2255" instrument_node="">) and Aerts and Chapin (</span><a aria-label="Reference 1999" data-dcnode-id="2253" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d12231357e4021" title="Aerts R, Chapin FS (1999) The mineral nutrition of wild plants revisited: a re-evaluation of processes and patterns. Adv Ecol Res 30:1–67"><span data-dcnode-id="2254" instrument_node="">1999</span></a><span data-dcnode-id="2252" instrument_node="">). This was likely caused by the low fluctuation of available soil nutrients between years and low sensitivity to changes in the soil due to the long-term adaptation to the local environment.</span></p></div></div></section><section data-dcnode-id="2241" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="2242" id="Sec13-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2246" id="Sec13"><span data-dcnode-id="2247" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="2243" id="Sec13-content"><p data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">Our study described a comprehensive representation relating to the interannual patterns of nutrient resorption of multiple elements in three oak species. Our conclusions were that (1) different plants growing in the same region may have analogous nutrient conservation strategies in response to interannual climate change; (2) at the conclusion of the growing season deciduous plants may engage a tradeoff mechanism to rebalance nutrients for regrowth; (3) interannual climate variations strongly impacted plant nutrient resorption, particularly, C, N, P, S, Ca, and Mg, which play important roles in adapting to interannual climate variabilities and reproduction. Our findings have clear implications for understanding localized plant adaptation strategies and biogeochemical cycling processes under global climate change.</span></p></div></div></section><span data-dcnode-id="2240" instrument_node="">
