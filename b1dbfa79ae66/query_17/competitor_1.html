</span><title data-dcnode-id="4026">Nutrient resorption strategies of three oak tree species in response to interannual climate variability | Forest Ecosystems | Full Text</title><span data-dcnode-id="4025" instrument_node="">
</span><meta content="Nutrient resorption is critical for plants toward balancing their nutritional requirements and adapting to environmental variabilities, which further impacts litter quality and nutrient cycling. However, the interannual variability of nutrient resorption under climate change remains unclear. We investigated the five-year nutrient resorption efficiencies (NuRE, %) of 14 elements in three deciduous oak tree species (Quercus aliena var. acuteserrata, Q. glandulifera, and Q. variabilis) in a warm-temperate forest of Central China and assessed their relationships with interannual climate and soil factors. Nutrient resorption did not differ between species but varied significantly between different years. For each year, N, P, S, K, C, Mg, and Zn were preferentially resorbed in all of the oak species in contrast to Ca, Na, Mn, Ba, Al, Fe, Cu, which were to some extent discriminated. Among the 14 elements, the NuRE of C, N, P, S, Ca, and Mg was more sensitive to interannual climate variations in the three oak species. The carbon resorption efficiency was significantly increased during the driest year of the study (2014); N resorption efficiency was reduced with temperature; whereas N and P resorption efficiency initially decreased and then increased with precipitation. Moreover, the elements with higher NuREs typically had lower coefficient of variation (CV) in all three oak species. Different oak species exhibited analogous nutrient conservation strategies in response to annual climate variabilities, and interannual climate variations strongly impacted plant nutrient resorption. Deciduous plants may establish a tradeoff mechanism to rebalance somatic nutrients for regrowth at the end of the growing season." data-dcnode-id="4024" name="citation_abstract"><span data-dcnode-id="4023" instrument_node="">

</span><meta content="Background Nutrient resorption is critical for plants toward balancing their nutritional requirements and adapting to environmental variabilities, which further impacts litter quality and nutrient cycling. However, the interannual variability of nutrient resorption under climate change remains unclear. Methods We investigated the five-year nutrient resorption efficiencies (NuRE, %) of 14 elements in three deciduous oak tree species (Quercus aliena var. acuteserrata, Q. glandulifera, and Q. variabilis) in a warm-temperate forest of Central China and assessed their relationships with interannual climate and soil factors. Results Nutrient resorption did not differ between species but varied significantly between different years. For each year, N, P, S, K, C, Mg, and Zn were preferentially resorbed in all of the oak species in contrast to Ca, Na, Mn, Ba, Al, Fe, Cu, which were to some extent discriminated. Among the 14 elements, the NuRE of C, N, P, S, Ca, and Mg was more sensitive to interannual climate variations in the three oak species. The carbon resorption efficiency was significantly increased during the driest year of the study (2014); N resorption efficiency was reduced with temperature; whereas N and P resorption efficiency initially decreased and then increased with precipitation. Moreover, the elements with higher NuREs typically had lower coefficient of variation (CV) in all three oak species. Conclusions Different oak species exhibited analogous nutrient conservation strategies in response to annual climate variabilities, and interannual climate variations strongly impacted plant nutrient resorption. Deciduous plants may establish a tradeoff mechanism to rebalance somatic nutrients for regrowth at the end of the growing season." data-dcnode-id="3687" property="og:description"><span data-dcnode-id="3686" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="3041" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3042" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3072" id="Abs1"><span data-dcnode-id="3073" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3043" id="Abs1-content"><h3 class="c-article__sub-heading" data-dcnode-id="3070" data-test="abstract-sub-heading"><span data-dcnode-id="3071" instrument_node="">Background</span></h3><p data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">Nutrient resorption is critical for plants toward balancing their nutritional requirements and adapting to environmental variabilities, which further impacts litter quality and nutrient cycling. However, the interannual variability of nutrient resorption under climate change remains unclear.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3066" data-test="abstract-sub-heading"><span data-dcnode-id="3067" instrument_node="">Methods</span></h3><p data-dcnode-id="3052"><span data-dcnode-id="3065" instrument_node="">We investigated the five-year nutrient resorption efficiencies (NuRE, %) of 14 elements in three deciduous oak tree species (</span><i data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">Quercus aliena</span></i><span data-dcnode-id="3062" instrument_node=""> var. </span><i data-dcnode-id="3060"><span data-dcnode-id="3061" instrument_node="">acuteserrata</span></i><span data-dcnode-id="3059" instrument_node="">, </span><i data-dcnode-id="3057"><span data-dcnode-id="3058" instrument_node="">Q. glandulifera</span></i><span data-dcnode-id="3056" instrument_node="">, and </span><i data-dcnode-id="3054"><span data-dcnode-id="3055" instrument_node="">Q. variabilis</span></i><span data-dcnode-id="3053" instrument_node="">) in a warm-temperate forest of Central China and assessed their relationships with interannual climate and soil factors.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3050" data-test="abstract-sub-heading"><span data-dcnode-id="3051" instrument_node="">Results</span></h3><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Nutrient resorption did not differ between species but varied significantly between different years. For each year, N, P, S, K, C, Mg, and Zn were preferentially resorbed in all of the oak species in contrast to Ca, Na, Mn, Ba, Al, Fe, Cu, which were to some extent discriminated. Among the 14 elements, the NuRE of C, N, P, S, Ca, and Mg was more sensitive to interannual climate variations in the three oak species. The carbon resorption efficiency was significantly increased during the driest year of the study (2014); N resorption efficiency was reduced with temperature; whereas N and P resorption efficiency initially decreased and then increased with precipitation. Moreover, the elements with higher NuREs typically had lower coefficient of variation (CV) in all three oak species.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3046" data-test="abstract-sub-heading"><span data-dcnode-id="3047" instrument_node="">Conclusions</span></h3><p data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Different oak species exhibited analogous nutrient conservation strategies in response to annual climate variabilities, and interannual climate variations strongly impacted plant nutrient resorption. Deciduous plants may establish a tradeoff mechanism to rebalance somatic nutrients for regrowth at the end of the growing season.</span></p></div></div></section><span data-dcnode-id="3040" instrument_node="">
</span><section data-dcnode-id="2838" data-title="Background"><div class="c-article-section" data-dcnode-id="2839" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3038" id="Sec1"><span data-dcnode-id="3039" instrument_node="">Background</span></h2><div class="c-article-section__content" data-dcnode-id="2840" id="Sec1-content"><p data-dcnode-id="2988"><span data-dcnode-id="3037" instrument_node="">Plants obtain the nutrients they require, on one hand, through soil nutrient cycling, which includes inputs from litter decomposition, biological fixation, atmospheric deposition, weathering, removal by root uptake, and leaching losses (Pallardy </span><a aria-label="Reference 2010" data-dcnode-id="3035" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d12231357e933" title="Pallardy S (2010) Physiology of woody plants. Academic Press, California"><span data-dcnode-id="3036" instrument_node="">2010</span></a><span data-dcnode-id="3034" instrument_node="">; Cronan </span><a aria-label="Reference 2017" data-dcnode-id="3032" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d12231357e936" title="Cronan C (2017) Ecosystem biogeochemistry: element cycling in the forest landscape. Springer, Cham"><span data-dcnode-id="3033" instrument_node="">2017</span></a><span data-dcnode-id="3031" instrument_node="">), and on the other hand through the reallocation of nutrients to different structures (Killingbeck </span><a aria-label="Reference 2004" data-dcnode-id="3029" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d12231357e939" title="Killingbeck KT (2004) Nutrient resorption. In: Noodén LD (ed) Plant cell death processes. Academic Press, Cambridge"><span data-dcnode-id="3030" instrument_node="">2004</span></a><span data-dcnode-id="3028" instrument_node="">; Marschner and Marschner </span><a aria-label="Reference 2012" data-dcnode-id="3026" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d12231357e942" title="Marschner H, Marschner P (2012) Marschner’s mineral nutrition of higher plants. Academic Press, California"><span data-dcnode-id="3027" instrument_node="">2012</span></a><span data-dcnode-id="3025" instrument_node="">). Nutrient resorption is a process through which plants reallocate nutrients from senescing structures to storage and/or developing tissues, which contributes to a reduction in their dependence on nutrient uptake (Aerts and Chapin </span><a aria-label="Reference 1999" data-dcnode-id="3023" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d12231357e945" title="Aerts R, Chapin FS (1999) The mineral nutrition of wild plants revisited: a re-evaluation of processes and patterns. Adv Ecol Res 30:1–67"><span data-dcnode-id="3024" instrument_node="">1999</span></a><span data-dcnode-id="3022" instrument_node="">; Killingbeck </span><a aria-label="Reference 2004" data-dcnode-id="3020" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d12231357e949" title="Killingbeck KT (2004) Nutrient resorption. In: Noodén LD (ed) Plant cell death processes. Academic Press, Cambridge"><span data-dcnode-id="3021" instrument_node="">2004</span></a><span data-dcnode-id="3019" instrument_node="">; Brant and Chen </span><a aria-label="Reference 2015" data-dcnode-id="3017" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d12231357e952" title="Brant AN, Chen HY (2015) Patterns and mechanisms of nutrient resorption in plants. Crit Rev Plant Sci 34:471–486"><span data-dcnode-id="3018" instrument_node="">2015</span></a><span data-dcnode-id="3016" instrument_node="">). Nutrient resorption can assist plants with adapting to environmental variabilities (May and Killingbeck </span><a aria-label="Reference 1992" data-dcnode-id="3014" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d12231357e955" title="May JD, Killingbeck KT (1992) Effects of preventing nutrient resorption on plant fitness and foliar nutrient dynamics. Ecology 73:1868–1878"><span data-dcnode-id="3015" instrument_node="">1992</span></a><span data-dcnode-id="3013" instrument_node="">; Killingbeck </span><a aria-label="Reference 1993" data-dcnode-id="3011" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d12231357e958" title="Killingbeck KT (1993) Inefficient nitrogen resorption in genets of the actinorhizal nitrogen fixing shrub Comptonia peregrina: physiological ineptitude or evolutionary tradeoff? Oecologia 94:542–549"><span data-dcnode-id="3012" instrument_node="">1993</span></a><span data-dcnode-id="3010" instrument_node="">; Prieto and Querejeta </span><a aria-label="Reference 2020" data-dcnode-id="3008" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d12231357e961" title="Prieto I, Querejeta JI (2020) Simulated climate change decreases nutrient resorption from senescing leaves. Glob Chang Biol 26:1795–1807"><span data-dcnode-id="3009" instrument_node="">2020</span></a><span data-dcnode-id="3007" instrument_node="">), which can further affect plant reproduction, litter decomposition, and ecosystem nutrient cycling through altering nutrient storage and litter quality (Attiwill and Adams </span><a aria-label="Reference 1993" data-dcnode-id="3005" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d12231357e964" title="Attiwill PM, Adams MA (1993) Nutrient cycling in forests. New Phytol 124:561–582"><span data-dcnode-id="3006" instrument_node="">1993</span></a><span data-dcnode-id="3004" instrument_node="">; Aerts </span><a aria-label="Reference 1996" data-dcnode-id="3002" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d12231357e968" title="Aerts R (1996) Nutrient resorption from senescing leaves of perennials: are there general patterns? J Ecol 84:597–608"><span data-dcnode-id="3003" instrument_node="">1996</span></a><span data-dcnode-id="3001" instrument_node="">; Xu et al. </span><a aria-label="Reference 2020" data-dcnode-id="2999" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d12231357e971" title="Xu JW, Lin G, Liu B, Mao R (2020) Linking leaf nutrient resorption and litter decomposition to plant mycorrhizal associations in boreal peatlands. Plant Soil 448:413–424"><span data-dcnode-id="3000" instrument_node="">2020</span></a><span data-dcnode-id="2998" instrument_node="">). Therefore, the study of nutrient resorption under climate change has gained increasing attention in recent years (Fujita et al. </span><a aria-label="Reference 2014" data-dcnode-id="2996" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d12231357e974" title="Fujita Y, Venterink HO, van Bodegom PM, Douma JC, Heil GW, Holzel N, Jablonska E, Kotowski W, Okruszko T, Pawlikowski P, de Ruiter PC, Wassen MJ (2014) Low investment in sexual reproduction threatens plants adapted to phosphorus limitation. Nature 505:82–86"><span data-dcnode-id="2997" instrument_node="">2014</span></a><span data-dcnode-id="2995" instrument_node="">; Yan et al. </span><a aria-label="Reference 2016" data-dcnode-id="2993" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d12231357e977" title="Yan Z, Li P, Chen Y, Han W, Fang J (2016) Nutrient allocation strategies of woody plants: an approach from the scaling of nitrogen and phosphorus between twig stems and leaves. Sci Rep 6:20099"><span data-dcnode-id="2994" instrument_node="">2016</span></a><span data-dcnode-id="2992" instrument_node="">; Drenovsky et al. </span><a aria-label="Reference 2019" data-dcnode-id="2990" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d12231357e980" title="Drenovsky RE, Pietrasiak N, Short TH (2019) Global temporal patterns in plant nutrient resorption plasticity. Global Ecol Biogeogr 28:728–743"><span data-dcnode-id="2991" instrument_node="">2019</span></a><span data-dcnode-id="2989" instrument_node="">).</span></p><p data-dcnode-id="2908"><span data-dcnode-id="2987" instrument_node="">Nutrient resorption varies substantially with temperature and precipitation along large geographical gradients (Kobe et al. </span><a aria-label="Reference 2005" data-dcnode-id="2985" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d12231357e986" title="Kobe RK, Lepczyk CA, Iyer M (2005) Resorption efficiency decreases with increasing green leaf nutrients in a global data set. Ecology 86:2780–2792"><span data-dcnode-id="2986" instrument_node="">2005</span></a><span data-dcnode-id="2984" instrument_node="">; Yuan and Chen </span><a aria-label="Reference 2009" data-dcnode-id="2982" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d12231357e989" title="Yuan Z, Chen HY (2009) Global-scale patterns of nutrient resorption associated with latitude, temperature and precipitation. Global Ecol Biogeogr 18:11–18"><span data-dcnode-id="2983" instrument_node="">2009</span></a><span data-dcnode-id="2981" instrument_node="">; Reed et al. </span><a aria-label="Reference 2012" data-dcnode-id="2979" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d12231357e992" title="Reed SC, Townsend AR, Davidson EA, Cleveland CC (2012) Stoichiometric patterns in foliar nutrient resorption across multiple scales. New Phytol 196:173–180"><span data-dcnode-id="2980" instrument_node="">2012</span></a><span data-dcnode-id="2978" instrument_node="">; Vergutz et al. </span><a aria-label="Reference 2012" data-dcnode-id="2976" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d12231357e995" title="Vergutz L, Manzoni S, Porporato A, Novais RF, Jackson RB (2012) Global resorption efficiencies and concentrations of carbon and nutrients in leaves of terrestrial plants. Ecol Monogr 82:205–220"><span data-dcnode-id="2977" instrument_node="">2012</span></a><span data-dcnode-id="2975" instrument_node="">; Du et al. </span><a aria-label="Reference 2017" data-dcnode-id="2973" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d12231357e998" title="Du B, Ji H, Peng C, Liu X, Liu C (2017) Altitudinal patterns of leaf stoichiometry and nutrient resorption in Quercus variabilis in the Baotianman Mountains, China. Plant Soil 413:193–202"><span data-dcnode-id="2974" instrument_node="">2017</span></a><span data-dcnode-id="2972" instrument_node="">; Tong et al. </span><a aria-label="Reference 2021" data-dcnode-id="2970" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d12231357e1002" title="Tong R, Zhou B, Jiang L, Ge X, Cao Y (2021) Spatial patterns of leaf carbon, nitrogen, and phosphorus stoichiometry and nutrient resorption in Chinese fir across subtropical China. Catena 201:105221"><span data-dcnode-id="2971" instrument_node="">2021</span></a><span data-dcnode-id="2969" instrument_node="">). Climate change issues including global warming, extreme drought, and N deposition also influence nutrient resorption (Suseela et al. </span><a aria-label="Reference 2015" data-dcnode-id="2967" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d12231357e1005" title="Suseela V, Tharayil N, Xing B, Dukes JS (2015) Warming and drought differentially influence the production and resorption of elemental and metabolic nitrogen pools in Quercus rubra. Glob Chang Biol 21:4177–4195"><span data-dcnode-id="2968" instrument_node="">2015</span></a><span data-dcnode-id="2966" instrument_node="">; Zheng et al. </span><a aria-label="Reference 2018" data-dcnode-id="2964" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d12231357e1008" title="Zheng J, She W, Zhang Y, Bai Y, Qin S, Wu B (2018) Nitrogen enrichment alters nutrient resorption and exacerbates phosphorus limitation in the desert shrub Artemisia ordosica. Ecol Evol 8:9998–10007"><span data-dcnode-id="2965" instrument_node="">2018</span></a><span data-dcnode-id="2963" instrument_node="">; Huang et al. </span><a aria-label="Reference 2018" data-dcnode-id="2961" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d12231357e1011" title="Huang G, Su YG, Mu XH, Li Y (2018) Foliar nutrient resorption responses of three life-form plants to water and nitrogen additions in a temperate desert. Plant Soil 424:479–489"><span data-dcnode-id="2962" instrument_node="">2018</span></a><span data-dcnode-id="2960" instrument_node="">; Prieto and Querejeta </span><a aria-label="Reference 2020" data-dcnode-id="2958" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d12231357e1014" title="Prieto I, Querejeta JI (2020) Simulated climate change decreases nutrient resorption from senescing leaves. Glob Chang Biol 26:1795–1807"><span data-dcnode-id="2959" instrument_node="">2020</span></a><span data-dcnode-id="2957" instrument_node="">; Lü et al. </span><a aria-label="Reference 2021" data-dcnode-id="2955" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d12231357e1017" title="Lü XT, Hou SL, Reed S, Yin JX, Hu YY, Wei HW, Zhang ZW, Yang GJ, Liu ZY, Han XG (2021) Nitrogen enrichment reduces nitrogen and phosphorus resorption through changes to species resorption and plant community composition. Ecosystems 24:602–612"><span data-dcnode-id="2956" instrument_node="">2021</span></a><span data-dcnode-id="2954" instrument_node="">). For instance, climatic warming may reduce nutrient resorption (Suseela et al. </span><a aria-label="Reference 2015" data-dcnode-id="2952" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d12231357e1021" title="Suseela V, Tharayil N, Xing B, Dukes JS (2015) Warming and drought differentially influence the production and resorption of elemental and metabolic nitrogen pools in Quercus rubra. Glob Chang Biol 21:4177–4195"><span data-dcnode-id="2953" instrument_node="">2015</span></a><span data-dcnode-id="2951" instrument_node="">), while drought can advance leaf senescence, which increases (Lobo-do-Vale et al. </span><a aria-label="Reference 2019" data-dcnode-id="2949" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d12231357e1024" title="Lobo-do-Vale R, Kurz BC, Caldeira MC, Chaves MM, Pereira JS (2019) Drought reduces tree growing season length but increases nitrogen resorption efficiency in a Mediterranean ecosystem. Biogeosciences 16:1265–1279"><span data-dcnode-id="2950" instrument_node="">2019</span></a><span data-dcnode-id="2948" instrument_node="">) or reduces (Zhao et al. </span><a aria-label="Reference 2020" data-dcnode-id="2946" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d12231357e1027" title="Zhao Q, Guo J, Shu M, Wang P, Hu S (2020) Impacts of drought and nitrogen enrichment on leaf nutrient resorption and root nutrient allocation in four Tibetan plant species. Sci Total Environ 723:138106"><span data-dcnode-id="2947" instrument_node="">2020</span></a><span data-dcnode-id="2945" instrument_node="">) resorption. Aside from climatic factors, nutrient resorption is also determined through the availability of soil nutrients, plant nutrient status, and functional groups (Chapin and Moilanen </span><a aria-label="Reference 1991" data-dcnode-id="2943" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d12231357e1030" title="Chapin FS, Moilanen L (1991) Nutritional controls over nitrogen and phosphorus resorption from Alaskan birch leaves. Ecology 72:709–715"><span data-dcnode-id="2944" instrument_node="">1991</span></a><span data-dcnode-id="2942" instrument_node="">; Wright and Westoby </span><a aria-label="Reference 2003" data-dcnode-id="2940" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d12231357e1033" title="Wright IJ, Westoby M (2003) Nutrient concentration, resorption and lifespan: leaf traits of Australian sclerophyll species. Funct Ecol 17:10–19"><span data-dcnode-id="2941" instrument_node="">2003</span></a><span data-dcnode-id="2939" instrument_node="">; Liu et al. </span><a aria-label="Reference 2014" data-dcnode-id="2937" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d12231357e1036" title="Liu CC, Liu YG, Guo K, Wang SJ, Yang Y (2014) Concentrations and resorption patterns of 13 nutrients in different plant functional types in the karst region of south-western China. Ann Bot 113:873–885"><span data-dcnode-id="2938" instrument_node="">2014</span></a><span data-dcnode-id="2936" instrument_node="">; Bahamonde et al. </span><a aria-label="Reference 2019" data-dcnode-id="2934" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d12231357e1040" title="Bahamonde HA, Fernández V, Gyenge J, Mattenet F, Peri PL (2019) Essential nutrient and trace element foliar resorption of two co-existing Nothofagus species grown under different environmental conditions in southern Patagonia. Front Plant Sci 10:1542. 
                  https://doi.org/10.3389/fpls.2019.01542
                  
                "><span data-dcnode-id="2935" instrument_node="">2019</span></a><span data-dcnode-id="2933" instrument_node="">; Gerdol et al. </span><a aria-label="Reference 2019" data-dcnode-id="2931" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d12231357e1043" title="Gerdol R, Iacumin P, Brancaleoni L (2019) Differential effects of soil chemistry on the foliar resorption of nitrogen and phosphorus across altitudinal gradients. Funct Ecol 33:1351–1361"><span data-dcnode-id="2932" instrument_node="">2019</span></a><span data-dcnode-id="2930" instrument_node="">; Xu et al. </span><a aria-label="Reference 2020" data-dcnode-id="2928" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d12231357e1046" title="Xu M, Zhong Z, Sun Z, Han X, Ren C, Yang G (2020) Soil available phosphorus and moisture drive nutrient resorption patterns in plantations on the Loess Plateau. Forest Ecol Manag 461:117910"><span data-dcnode-id="2929" instrument_node="">2020</span></a><span data-dcnode-id="2927" instrument_node="">), as well as source-sink relations (Killingbeck </span><a aria-label="Reference 2004" data-dcnode-id="2925" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d12231357e1049" title="Killingbeck KT (2004) Nutrient resorption. In: Noodén LD (ed) Plant cell death processes. Academic Press, Cambridge"><span data-dcnode-id="2926" instrument_node="">2004</span></a><span data-dcnode-id="2924" instrument_node="">), and the mobility of nutrients in the phloem (Bukovac and Wittwer </span><a aria-label="Reference 1957" data-dcnode-id="2922" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d12231357e1052" title="Bukovac MJ, Wittwer SH (1957) Absorption and mobility of foliar applied nutrients. Plant Physiol 32:428–435"><span data-dcnode-id="2923" instrument_node="">1957</span></a><span data-dcnode-id="2921" instrument_node="">; Hill </span><a aria-label="Reference 1980" data-dcnode-id="2919" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d12231357e1055" title="Hill J (1980) The remobilization of nutrients from leaves. J Plant Nutr 2:407–444"><span data-dcnode-id="2920" instrument_node="">1980</span></a><span data-dcnode-id="2918" instrument_node="">). Since most species are unlikely to migrate quickly enough to keep pace with environmental changes (IPCC </span><a aria-label="Reference 2014" data-dcnode-id="2916" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d12231357e1059" title="IPCC (2014) Pachauri RK, Meyer LA (eds) Climate change 2014: synthesis report. Contribution of working groups I, II and III to the fifth assessment report of the Intergovernmental Panel on Climate Change. Cambridge University Press, Cambridge"><span data-dcnode-id="2917" instrument_node="">2014</span></a><span data-dcnode-id="2915" instrument_node="">), the capacity to adapt to variations in localized environments might assist them with surviving under the altered climatic environments that are anticipated in the near future (Jump and Peñuelas </span><a aria-label="Reference 2005" data-dcnode-id="2913" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d12231357e1062" title="Jump AS, Peñuelas J (2005) Running to stand still: adaptation and the response of plants to rapid climate change. Ecol Lett 8:1010–1020"><span data-dcnode-id="2914" instrument_node="">2005</span></a><span data-dcnode-id="2912" instrument_node="">; Prieto and Querejeta </span><a aria-label="Reference 2020" data-dcnode-id="2910" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d12231357e1065" title="Prieto I, Querejeta JI (2020) Simulated climate change decreases nutrient resorption from senescing leaves. Glob Chang Biol 26:1795–1807"><span data-dcnode-id="2911" instrument_node="">2020</span></a><span data-dcnode-id="2909" instrument_node="">). However, it is largely unknown how local plants might respond to disparities in environmental factors that are driven by interannual climate variations, which is critical to elucidate the physiological and evolutionary adaptation of plants under climate change.</span></p><p data-dcnode-id="2864"><span data-dcnode-id="2907" instrument_node="">The nutrient resorption levels of plants are associated with their constituent elements (Liu et al. </span><a aria-label="Reference 2014" data-dcnode-id="2905" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d12231357e1071" title="Liu CC, Liu YG, Guo K, Wang SJ, Yang Y (2014) Concentrations and resorption patterns of 13 nutrients in different plant functional types in the karst region of south-western China. Ann Bot 113:873–885"><span data-dcnode-id="2906" instrument_node="">2014</span></a><span data-dcnode-id="2904" instrument_node="">). Generally, N, P, S, and K are preferentially withdrawn from senescing leaves and exhibit high resorption, while Ca, Mg, Al, and Fe are accreted in senesced leaves, thus, showing low or negative resorption (Killingbeck </span><a aria-label="Reference 1993" data-dcnode-id="2902" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d12231357e1074" title="Killingbeck KT (1993) Inefficient nitrogen resorption in genets of the actinorhizal nitrogen fixing shrub Comptonia peregrina: physiological ineptitude or evolutionary tradeoff? Oecologia 94:542–549"><span data-dcnode-id="2903" instrument_node="">1993</span></a><span data-dcnode-id="2901" instrument_node="">; Liu et al. </span><a aria-label="Reference 2014" data-dcnode-id="2899" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d12231357e1077" title="Liu CC, Liu YG, Guo K, Wang SJ, Yang Y (2014) Concentrations and resorption patterns of 13 nutrients in different plant functional types in the karst region of south-western China. Ann Bot 113:873–885"><span data-dcnode-id="2900" instrument_node="">2014</span></a><span data-dcnode-id="2898" instrument_node="">; Estiarte and Peñuelas </span><a aria-label="Reference 2015" data-dcnode-id="2896" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d12231357e1080" title="Estiarte M, Peñuelas J (2015) Alteration of the phenology of leaf senescence and fall in winter deciduous species by climate change: effects on nutrient proficiency. Glob Chang Biol 21:1005–1017"><span data-dcnode-id="2897" instrument_node="">2015</span></a><span data-dcnode-id="2895" instrument_node="">; Du et al. </span><a aria-label="Reference 2017" data-dcnode-id="2893" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d12231357e1083" title="Du B, Ji H, Peng C, Liu X, Liu C (2017) Altitudinal patterns of leaf stoichiometry and nutrient resorption in Quercus variabilis in the Baotianman Mountains, China. Plant Soil 413:193–202"><span data-dcnode-id="2894" instrument_node="">2017</span></a><span data-dcnode-id="2892" instrument_node="">; Prieto and Querejeta </span><a aria-label="Reference 2020" data-dcnode-id="2890" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d12231357e1087" title="Prieto I, Querejeta JI (2020) Simulated climate change decreases nutrient resorption from senescing leaves. Glob Chang Biol 26:1795–1807"><span data-dcnode-id="2891" instrument_node="">2020</span></a><span data-dcnode-id="2889" instrument_node="">). Various elements are often distributed in a coordinated pattern during the nutrient resorption process in a tradeoff manner (Killingbeck </span><a aria-label="Reference 1993" data-dcnode-id="2887" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d12231357e1090" title="Killingbeck KT (1993) Inefficient nitrogen resorption in genets of the actinorhizal nitrogen fixing shrub Comptonia peregrina: physiological ineptitude or evolutionary tradeoff? Oecologia 94:542–549"><span data-dcnode-id="2888" instrument_node="">1993</span></a><span data-dcnode-id="2886" instrument_node="">, </span><a aria-label="Reference 2004" data-dcnode-id="2884" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d12231357e1093" title="Killingbeck KT (2004) Nutrient resorption. In: Noodén LD (ed) Plant cell death processes. Academic Press, Cambridge"><span data-dcnode-id="2885" instrument_node="">2004</span></a><span data-dcnode-id="2883" instrument_node="">), i.e. some elements are taken up preferentially (NuRE ≥ 0) and others are discriminated (NuRE &lt; 0) (Du et al. </span><a aria-label="Reference 2017" data-dcnode-id="2881" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d12231357e1096" title="Du B, Ji H, Peng C, Liu X, Liu C (2017) Altitudinal patterns of leaf stoichiometry and nutrient resorption in Quercus variabilis in the Baotianman Mountains, China. Plant Soil 413:193–202"><span data-dcnode-id="2882" instrument_node="">2017</span></a><span data-dcnode-id="2880" instrument_node="">). Further, to adapt to environmental changes, plants have also evolved a homeostasis mechanism that is based on the stability of the limiting elements hypothesis, i.e. with higher elemental concentrations and lower variability (low coefficient of variation) (Han et al. </span><a aria-label="Reference 2011" data-dcnode-id="2878" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d12231357e1099" title="Han WX, Fang JY, Reich PB, Ian Woodward F, Wang ZH (2011) Biogeography and variability of eleven mineral elements in plant leaves across gradients of climate, soil and plant functional type in China. Ecol Lett 14:788–796"><span data-dcnode-id="2879" instrument_node="">2011</span></a><span data-dcnode-id="2877" instrument_node="">). However, less is known about how different nutrients interact during the resorption process. Moreover, plants growing at the same sites may exhibit parallel or convergent adaptations in terms of functional traits, physiology, and genetics (Aspinwall et al. </span><a aria-label="Reference 2016" data-dcnode-id="2875" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d12231357e1102" title="Aspinwall MJ, Drake JE, Campany C, Vårhammar A, Ghannoum O, Tissue DT, Reich PB, Tjoelker MG (2016) Convergent acclimation of leaf photosynthesis and respiration to prevailing ambient temperatures under current and warmer climates in Eucalyptus tereticornis. New Phytol 212:354–367"><span data-dcnode-id="2876" instrument_node="">2016</span></a><span data-dcnode-id="2874" instrument_node="">; Yeaman et al. </span><a aria-label="Reference 2016" data-dcnode-id="2872" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d12231357e1106" title="Yeaman S, Hodgins KA, Lotterhos KE, Suren H, Nadeau S, Degner JC, Nurkowski KA, Smets P, Wang T, Gray LK, Liepe KJ, Hamann A, Holliday JA, Whitlock MC, Rieseberg LH, Aitken SN (2016) Convergent local adaptation to climate in distantly related conifers. Science 353:1431–1433"><span data-dcnode-id="2873" instrument_node="">2016</span></a><span data-dcnode-id="2871" instrument_node="">; Bauters et al. </span><a aria-label="Reference 2017" data-dcnode-id="2869" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d12231357e1109" title="Bauters M, Verbeeck H, Demol M, Bruneel S, Taveirne C, Van der Heyden D, Cizungu L, Boeckx P (2017) Parallel functional and stoichiometric trait shifts in South American and African forest communities with elevation. Biogeosciences 14:5313–5321"><span data-dcnode-id="2870" instrument_node="">2017</span></a><span data-dcnode-id="2868" instrument_node="">; Bahamonde et al. </span><a aria-label="Reference 2019" data-dcnode-id="2866" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d12231357e1112" title="Bahamonde HA, Fernández V, Gyenge J, Mattenet F, Peri PL (2019) Essential nutrient and trace element foliar resorption of two co-existing Nothofagus species grown under different environmental conditions in southern Patagonia. Front Plant Sci 10:1542. 
                  https://doi.org/10.3389/fpls.2019.01542
                  
                "><span data-dcnode-id="2867" instrument_node="">2019</span></a><span data-dcnode-id="2865" instrument_node="">). Whether different plants also exhibit analogous responses in nutrient resorption remains unclear. These findings will assist ecologists with optimizing their biogeochemical models, while improving their understanding of nutrient cycling.</span></p><p data-dcnode-id="2841"><span data-dcnode-id="2863" instrument_node="">The genus </span><i data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">Quercus</span></i><span data-dcnode-id="2860" instrument_node=""> is widely distributed in temperate forests of the Northern Hemisphere and provides important ecological and economic roles (Aldrich and Cavender-Bares </span><a aria-label="Reference 2011" data-dcnode-id="2858" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d12231357e1121" title="Aldrich PR, Cavender-Bares J (2011) Quercus, wild crop relatives: genomic and breeding resources. Springer, Berlin Heidelberg"><span data-dcnode-id="2859" instrument_node="">2011</span></a><span data-dcnode-id="2857" instrument_node="">). In our study area, three </span><i data-dcnode-id="2855"><span data-dcnode-id="2856" instrument_node="">Quercus</span></i><span data-dcnode-id="2854" instrument_node=""> species emerged to dominate an area. Previous studies have focused primarily on the impacts of warming and drought on soil carbon dynamics (Liu et al. </span><a aria-label="Reference 2017" data-dcnode-id="2852" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d12231357e1127" title="Liu Y, Liu S, Wan S, Wang J, Wang H, Liu K (2017) Effects of experimental throughfall reduction and soil warming on fine root biomass and its decomposition in a warm temperate oak forest. Sci Total Environ 574:1448–1455"><span data-dcnode-id="2853" instrument_node="">2017</span></a><span data-dcnode-id="2851" instrument_node="">), spatiotemporal variations in plant stoichiometry, and water use efficiencies in different oak forests (Du et al. </span><a aria-label="Reference 2017" data-dcnode-id="2849" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d12231357e1130" title="Du B, Ji H, Peng C, Liu X, Liu C (2017) Altitudinal patterns of leaf stoichiometry and nutrient resorption in Quercus variabilis in the Baotianman Mountains, China. Plant Soil 413:193–202"><span data-dcnode-id="2850" instrument_node="">2017</span></a><span data-dcnode-id="2848" instrument_node="">, </span><a aria-label="Reference 2021" data-dcnode-id="2846" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d12231357e1134" title="Du B, Zheng J, Ji H, Zhu Y, Yuan J, Wen J, Kang H, Liu C (2021) Stable carbon isotope used to estimate water use efficiency can effectively indicate seasonal variation in leaf stoichiometry. Ecol Indic 121:107250"><span data-dcnode-id="2847" instrument_node="">2021</span></a><span data-dcnode-id="2845" instrument_node="">), yet, less is known about the effects of annual climatic variations on nutrient resorption. For this study, we investigated the interannual variations in multiple element stoichiometry and resorption for three deciduous oak species over five years. Our objectives were to examine the nutritional responses of different plants to climatic differences driven by interannual variability, and to assess the regulation patterns and driving factors of nutrient resorption based on climate change and multiple additional elements. To achieve our objectives, we measured the NuRE variations of seven macroelements (C, N, P, S, K, Ca, and Mg), four microelements (Fe, Mn, Zn, and Cu), and three trace elements (Na, Al, and Ba) (CRE referenced Vergutz et al. </span><a aria-label="Reference 2012" data-dcnode-id="2843" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d12231357e1137" title="Vergutz L, Manzoni S, Porporato A, Novais RF, Jackson RB (2012) Global resorption efficiencies and concentrations of carbon and nutrients in leaves of terrestrial plants. Ecol Monogr 82:205–220"><span data-dcnode-id="2844" instrument_node="">2012</span></a><span data-dcnode-id="2842" instrument_node="">). We evaluated the effects of interannual temperature, precipitation, as well as green leaf concentration and soil nutrient status, on the nutrient resorption of multiple elements.</span></p></div></div></section><section data-dcnode-id="2717" data-title="Materials and methods"><div class="c-article-section" data-dcnode-id="2718" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2836" id="Sec2"><span data-dcnode-id="2837" instrument_node="">Materials and methods</span></h2><div class="c-article-section__content" data-dcnode-id="2719" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="2834" id="Sec3"><span data-dcnode-id="2835" instrument_node="">Study area</span></h3><p data-dcnode-id="2814"><span data-dcnode-id="2833" instrument_node="">This study was conducted from 2013 to 2016, and 2018 at the Forest Ecological Research Station of the Baotianman Natural Reserve (111°47′–112°04′ E, 33°20′–33°36′ N, 500 to 1,845&nbsp;m a.s.l) in Henan Province, Central China. The missing study in 2017 was caused by accidental damage to the sampling equipment. This area belongs to a temperate-subtropical ecotone zone with mean annual precipitation of 936 mm, and air temperature of 12.4&nbsp;°C over the past thirty years (from 1981 to 2010) (</span><a data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//climateap.net/"><span data-dcnode-id="2832" instrument_node="">http://climateap.net/</span></a><span data-dcnode-id="2830" instrument_node="">). With the main soil type comprised of haplic luvisol (Liu et al. </span><a aria-label="Reference 2017" data-dcnode-id="2828" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d12231357e1159" title="Liu Y, Liu S, Wan S, Wang J, Wang H, Liu K (2017) Effects of experimental throughfall reduction and soil warming on fine root biomass and its decomposition in a warm temperate oak forest. Sci Total Environ 574:1448–1455"><span data-dcnode-id="2829" instrument_node="">2017</span></a><span data-dcnode-id="2827" instrument_node="">), the forest primarily consists of deciduous oak, including </span><i data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">Q. aliena</span></i><span data-dcnode-id="2824" instrument_node=""> var. </span><i data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">acuteserrata</span></i><span data-dcnode-id="2821" instrument_node="">, </span><i data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">Q. glandulifera</span></i><span data-dcnode-id="2818" instrument_node="">, and </span><i data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Q. variabilis</span></i><span data-dcnode-id="2815" instrument_node="">, in addition to several minor components of other deciduous woodland species and shrubs.</span></p><h3 class="c-article__sub-heading c-article__sub-heading--divider" data-dcnode-id="2812" id="Sec4"><span data-dcnode-id="2813" instrument_node="">Soil and leaf sampling</span></h3><p data-dcnode-id="2807"><span data-dcnode-id="2811" instrument_node="">Three study sites were selected, where each site represented a stand of a subject tree species. For each site, three 20&nbsp;m × 20&nbsp;m plots were demarcated and the latitude, longitude, and altitude were recorded with a global positioning system (Thales Navigation, Santa Barbara, CA, USA) (Table&nbsp;</span><a data-dcnode-id="2809" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2810" instrument_node="">1</span></a><span data-dcnode-id="2808" instrument_node="">). Within each plot, five dominant trees were selected for the collection of leaf samples in the upper central south-facing part of crown. Two hundred leaves were collected in August (green leaves) and again in December (senesced leaves). The green and senesced leaves were obtained by cutting the upper middle branches with a retrofitted fishing rod on the ground. A total of five soil cores (0–10&nbsp;cm) were randomly extracted using a 2-cm diameter stainless-steel earth borer in each plot, which were combined to produce a composite sample. The soil samples were air-dried, while the green leaf and senesced leaf samples both were oven dried (65&nbsp;°C) for 72&nbsp;h. The soil and leaf samples were ground and sieved through a 60-mesh sieve (0.25 mm diameter) for chemical analysis.</span></p><span data-dcnode-id="2806" instrument_node="">
</span><div class="c-article-table" data-container-section="table" data-dcnode-id="2788" data-test="inline-table" id="table-1"><figure data-dcnode-id="2789"><figcaption class="c-article-table__figcaption" data-dcnode-id="2800"><b data-dcnode-id="2801" data-test="table-caption" id="Tab1"><span data-dcnode-id="2805" instrument_node="">Table 1 Site and vegetation conditions of the three </span><i data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Quercus</span></i><span data-dcnode-id="2802" instrument_node=""> stands under study at the Baotianman Natural Reserve of Central China</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2790"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="2791" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forestecosyst.springeropen.com/articles/10.1186/s40663-021-00350-8/tables/1" rel="nofollow"><span data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2792" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2793" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2794" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2797" instrument_node="">

</span></a></div></figure></div><span data-dcnode-id="2787" instrument_node="">
</span><p data-dcnode-id="2775"><span data-dcnode-id="2786" instrument_node="">Nutrient resorption was expressed as the difference in the elemental concentrations between the green (</span><i data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">X</span></i><sub data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">gr</span></sub><span data-dcnode-id="2781" instrument_node="">) and senescent (</span><i data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">X</span></i><sub data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">sen</span></sub><span data-dcnode-id="2776" instrument_node="">) leaves by dry mass.
</span></p><div class="c-article-equation" data-dcnode-id="2768" id="Equa"><div class="c-article-equation__content" data-dcnode-id="2769"><span class="mathjax-tex" data-dcnode-id="2770"><span class="MathJax_Preview" data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">\text{Nutrient}\; \text{resorption}\; \text{efficiency} =(1-\frac{{X}_{\text{s}\text{e}\text{n}}}{{X}_{\text{g}\text{r}}}\text{M}\text{L}\text{C}\text{F})\times 100</span></span></span></div></div><p data-dcnode-id="2763"><span data-dcnode-id="2767" instrument_node="">where MLCF is the mass loss correction factor and ~ 0.784 for deciduous broadleaved species (Vergutz et al. </span><a aria-label="Reference 2012" data-dcnode-id="2765" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d12231357e1471" title="Vergutz L, Manzoni S, Porporato A, Novais RF, Jackson RB (2012) Global resorption efficiencies and concentrations of carbon and nutrients in leaves of terrestrial plants. Ecol Monogr 82:205–220"><span data-dcnode-id="2766" instrument_node="">2012</span></a><span data-dcnode-id="2764" instrument_node="">).</span></p><h3 class="c-article__sub-heading c-article__sub-heading--divider" data-dcnode-id="2761" id="Sec5"><span data-dcnode-id="2762" instrument_node="">Chemical analyses</span></h3><p data-dcnode-id="2756"><span data-dcnode-id="2760" instrument_node="">The total C and N concentrations of the leaves and soil were determined using elemental analysis (Vario EL cube, Elementar, Germany) (Sun et al. </span><a aria-label="Reference 2012" data-dcnode-id="2758" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d12231357e1482" title="Sun X, Kang H, Du H, Hu H, Zhou J, Hou J, Zhou X, Liu C (2012) Stoichiometric traits of oriental oak (Quercus variabilis) acorns and their variations in relation to environmental variables across temperate to subtropical China. Ecol Res 27:765–773"><span data-dcnode-id="2759" instrument_node="">2012</span></a><span data-dcnode-id="2757" instrument_node="">), whereas the total P, S, K, Na, Ca, Mg, Al, Fe, Mn, Zn, Cu, and Ba were assessed using an inductively coupled plasma optical emission spectrometer (ICP-OES) (Iris Advantage 1000, Thermo Jarrell Ash, Franklin, MA, USA) following digestion with hydrofluoric and nitrohydrochloric acid for the soil samples, and nitric and perchloric acid for the leaf samples.</span></p><h3 class="c-article__sub-heading c-article__sub-heading--divider" data-dcnode-id="2754" id="Sec6"><span data-dcnode-id="2755" instrument_node="">Data analyses</span></h3><p data-dcnode-id="2746"><span data-dcnode-id="2753" instrument_node="">Soil element concentrations of the three sampled oak species sites are summarized in Table </span><a data-dcnode-id="2751" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2752" instrument_node="">S1</span></a><span data-dcnode-id="2750" instrument_node="">. Meteorological data was obtained from the Neixiang Meteorological Bureau and Baotianman Forest Ecological Research Station (Fig.&nbsp;</span><a data-dcnode-id="2748" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2749" instrument_node="">1</span></a><span data-dcnode-id="2747" instrument_node="">). One-way ANOVA was conducted to test the differences in nutrient resorption between the different years. One-way repeated measures ANOVA was employed to determine whether resorption of nutrients and their interacting effects differed between species and years. Cluster analysis was run to group elements by NuRE. Subsequently, linear regressions were employed to examine the nutrient resorption correlations with MAT, MAP, and the concentrations of elements in the green leaves. Hierarchical partitioning (HP) analysis was performed to test the combined effects of MAT, MAP, as well as leaf and soil element concentrations on nutrient resorption efficiencies. One-way ANOVA, one-way repeated measures ANOVA, and cluster analyses were performed using SPSS 16.0 (IBM, Chicago, IL, USA). The HP analysis were carried using R version 3.6.1 (R Development Core Team, accessed 2019). The linear regressions and all figures were conducted using SigmaPlot 10.0 (Systat Software, Inc., Richmond, CA, USA).</span></p><span data-dcnode-id="2745" instrument_node="">
</span><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2721" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="2722"><figcaption data-dcnode-id="2742"><b class="c-article-section__figure-caption" data-dcnode-id="2743" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="2744" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2733"><div class="c-article-section__figure-item" data-dcnode-id="2737"><a class="c-article-section__figure-link" data-dcnode-id="2738" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forestecosyst.springeropen.com/articles/10.1186/s40663-021-00350-8/figures/1" rel="nofollow"><picture data-dcnode-id="2739"><source data-dcnode-id="2741" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs40663-021-00350-8/MediaObjects/40663_2021_350_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="2740" height="408" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s40663-021-00350-8/MediaObjects/40663_2021_350_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2734" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">Mean annual temperature and precipitation over five years in the Baotianman Mountains of Central China</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2723"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="2724" data-test="article-link" data-track="click" data-track-ac </span></div></div></section><section data-dcnode-id="2481" data-title="Results"><div class="c-article-section" data-dcnode-id="2482" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2715" id="Sec7"><span data-dcnode-id="2716" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="2483" id="Sec7-content"><h3 class="c-article__sub-heading" data-dcnode-id="2713" id="Sec8"><span data-dcnode-id="2714" instrument_node="">Interannual and interspecies variations in nutrient resorption efficiencies</span></h3><p data-dcnode-id="2690"><span data-dcnode-id="2712" instrument_node="">For all elements examined, NuRE generally followed the order of P, K, N, S, Mg, C, Zn, Mn, Na, Ca, Ba, Fe, Cu, and Al (from high to low) for the three oak species. Generally, the NuRE of P, K, N, S, Mg, C, and Zn was greater than zero, while that of Mn, Na, Ca, Ba, Fe, Cu, and Al was less than zero (Table&nbsp;</span><a data-dcnode-id="2710" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2711" instrument_node="">2</span></a><span data-dcnode-id="2709" instrument_node="">). In the three oak species, with the exception of Zn, the NuREs of other elements did not exhibit significant differences, and over the five years of the study the NuREs of all elements (except for K, Mn, and Ba) showed significant differences (Table&nbsp;</span><a data-dcnode-id="2707" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="2708" instrument_node="">3</span></a><span data-dcnode-id="2706" instrument_node="">). Cluster analysis indicated five similar clusters in the three oak species (Fig.&nbsp;</span><a data-dcnode-id="2704" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2705" instrument_node="">2</span></a><span data-dcnode-id="2703" instrument_node="">). Canonical discriminant analysis further indicated that nutrient resorption did not differ between species, but varied significantly between years (</span><i data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">P</span></i><span data-dcnode-id="2700" instrument_node=""> &lt; 0.001) (Fig. </span><a data-dcnode-id="2698" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2699" instrument_node="">S1</span></a><span data-dcnode-id="2697" instrument_node="">). For all three species, the coefficient of variation (CV, %) of elements between the different years generally decreased with higher NuREs (Fig.&nbsp;</span><a data-dcnode-id="2695" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2696" instrument_node="">3</span></a><span data-dcnode-id="2694" instrument_node="">, Table </span><a data-dcnode-id="2692" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2693" instrument_node="">S2</span></a><span data-dcnode-id="2691" instrument_node="">).
</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2663" data-test="inline-table" id="table-2"><figure data-dcnode-id="2664"><figcaption class="c-article-table__figcaption" data-dcnode-id="2675"><b data-dcnode-id="2676" data-test="table-caption" id="Tab2"><span data-dcnode-id="2689" instrument_node="">Table 2 Nutrient resorption efficiency (NuRE) (Mean ± SE) of three oak species (</span><i data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">Q. aliena</span></i><span data-dcnode-id="2686" instrument_node=""> var. </span><i data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">acuteserrata</span></i><span data-dcnode-id="2683" instrument_node="">, </span><i data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">Q. glandulifera</span></i><span data-dcnode-id="2680" instrument_node="">, and </span><i data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">Q. variabilis</span></i><span data-dcnode-id="2677" instrument_node="">) over five years</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2665"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="2666" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forestecosyst.springeropen.com/articles/10.1186/s40663-021-00350-8/tables/2" rel="nofollow"><span data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2667" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2668" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2669" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2672" instrument_node="">

</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2572" id="Sec9"><span data-dcnode-id="2573" instrument_node="">Effects of climatic and nutritional conditions on plant nutrient resorption</span></h3><p data-dcnode-id="2561"><span data-dcnode-id="2571" instrument_node="">During the driest year of the study (2014), CRE was significantly enhanced in the oak trees. It was observed that NRE and SRE were generally reduced with higher MAT, while CaRE and MgRE initially increased and then decreased with MAT (Fig.&nbsp;</span><a data-dcnode-id="2569" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2570" instrument_node="">4</span></a><span data-dcnode-id="2568" instrument_node="">). The CRE and CuRE were typically decreased with higher MAP. Additionally, NRE, PRE, and SRE initially decreased and then increased with MAP, whereas CaRE and MgRE first increased and then decreased with MAP (Fig.&nbsp;</span><a data-dcnode-id="2566" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="2567" instrument_node="">5</span></a><span data-dcnode-id="2565" instrument_node="">). The NuREs of most elements were positively correlated with the elemental concentrations of green leaves; however, PRE was negatively correlated with the P concentrations of green leaves (Fig. </span><a data-dcnode-id="2563" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2564" instrument_node="">S2</span></a><span data-dcnode-id="2562" instrument_node="">).
</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2537" data-test="figure" data-title="Fig. 4" id="figure-4"><figure data-dcnode-id="2538"><figcaption data-dcnode-id="2558"><b class="c-article-section__figure-caption" data-dcnode-id="2559" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="2560" instrument_node="">Fig. 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2549"><div class="c-article-section__figure-item" data-dcnode-id="2553"><a class="c-article-section__figure-link" data-dcnode-id="2554" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forestecosyst.springeropen.com/articles/10.1186/s40663-021-00350-8/figures/4" rel="nofollow"><picture data-dcnode-id="2555"><source data-dcnode-id="2557" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1186%2Fs40663-021-00350-8/MediaObjects/40663_2021_350_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="2556" height="478" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1186/s40663-021-00350-8/MediaObjects/40663_2021_350_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2550" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">Relationships between element resorption efficiencies and mean annual temperature</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2539"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="2540" data-test="article-link" data-track="click" data-track-action="view figure ack-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//forestecosyst.springeropen.com/articles/10.1186/s40663-021-00350-8/figures/5" rel="nofollow"><span data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2517" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2518" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2519" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2522" instrument_node="">
