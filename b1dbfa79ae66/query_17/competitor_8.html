</span><table class="plant-ratings-table" data-dcnode-id="804"><tbody data-dcnode-id="805"><tr class="plant-ratings-table-odd" data-dcnode-id="1650"><th data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Rating</span></th><th data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Content</span></th></tr><tr data-dcnode-id="1629" id="cid-176141"><td data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Positive</span></td><td data-dcnode-id="1631"><p data-dcnode-id="1640"><span data-dcnode-id="1644" instrument_node="">On Jun 7, 2021, </span><a data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/UtahTropics12/"><span data-dcnode-id="1643" instrument_node="">UtahTropics12</span></a><span data-dcnode-id="1641" instrument_node="">  from Salt Lake City, UT (Zone 7b) wrote:</span></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1633"><span data-dcnode-id="1638" instrument_node="">This species of Araucaria does surprisingly well here in Salt Lake City, Utah (Zone 7b). I have had two specimens growing in my garden for about 8 years now and they have both put on some significant growth in my book. Neither of them have been injured or even mildly damaged  in our harshest winters ( 2013 was the worst i’ve ever seen here) even as relatively young trees. They DEFINITELY need to be grown in a position where they receive afternoon shade in the hot desert southwest though, or they will fry pretty badly when temps get over 100 F which is extremely often nowadays. Araucaria araucana also very much appreciates ample water in a climate like this, but i’ve found they are also pretty drought tolerant. I would love to see this tree used more often around the Southwest in the right </span><a data-dcnode-id="1636" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-176141').style.display='inline'; return false;"><span data-dcnode-id="1637" instrument_node="">... read more</span></a><span data-dcnode-id="1634" id="readmore-176141" style="display:none;"><span data-dcnode-id="1635" instrument_node="">microclimates! I’m very curious to see how big they will get here in a dry zone 7b, I guess i’ll just have to wait and see! You can purchase them at a nursery here in Salt Lake City luckily and they seem to always have them. I’ve also seen and heard of them being tried in other places here in Utah with success. Don’t be afraid to try this magnificent and ancient tree in zone 7, it’s definitely worth the effort! </span></span></p><span data-dcnode-id="1632" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1612" id="cid-175912"><td data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Neutral</span></td><td data-dcnode-id="1614"><p data-dcnode-id="1619"><span data-dcnode-id="1623" instrument_node="">On Apr 6, 2021, </span><a data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/amypag/"><span data-dcnode-id="1622" instrument_node="">amypag</span></a><span data-dcnode-id="1620" instrument_node="">  from Keansburg, NJ wrote:</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">I would love to plant a Araucaria Species, Chilean Pine, Monkey Puzzle Tree. I am in Zone 7a but see there are trees living in NY which is north and a lower zone then me. I think if I plant it with afternoon shade it will benefit, as noted by some of the comments. My question for all of you is: How invasive is the root system for this tree. I would like to plant it near my garage so it will receive shade in its early growing years. But if the roots need a wide area I will have to think of some where else to plant it. Thank you for any help. Amy P</span></p><span data-dcnode-id="1615" instrument_node="">
</span></td></tr><tr data-dcnode-id="1586" id="cid-174555"><td data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Neutral</span></td><td data-dcnode-id="1588"><p data-dcnode-id="1602"><span data-dcnode-id="1606" instrument_node="">On Nov 2, 2019, </span><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/RandyAllen/"><span data-dcnode-id="1605" instrument_node="">RandyAllen</span></a><span data-dcnode-id="1603" instrument_node="">  from White House, TN wrote:</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1600" instrument_node="">I’ve been trying to grow Monkey Puzzle Trees for about 50 years.  Middle Tennessee area, at different estates I would buy and live in.  I would try about one per decade.  I could never get one to survive more than 3 years.  I’m not sure the problem.  I’ve studied trees and bamboos for 53 + years.  Could it be humidity here, winter length, late summer droughts, low elevation, or what ?  Not sure after 50 years of studying them.  I’m in touch with tree organizations and key people in TN, and nobody understands.  I do know of one man, high on a hill in West Nashville that has the two largest and oldest I’ve seen in TN.  They are about 20’ tall and 22 years old.  I just gave in again, in 2019, and planted one for this decade. smile.  I had about given up on trying, but I figure why not try one</span><a data-dcnode-id="1598" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-174555').style.display='inline'; return false;"><span data-dcnode-id="1599" instrument_node="">... read more</span></a><span data-dcnode-id="1591" id="readmore-174555" style="display:none;"><span data-dcnode-id="1597" instrument_node=""> at this higher elevation, here at my most recent arboretum </span><a data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.whitehousearboretum.com/" rel="nofollow" target="_dgnew"><span data-dcnode-id="1596" instrument_node="">http://www.WhiteHouseArboretum.com</span></a><span data-dcnode-id="1594" instrument_node=""> .  Thank you, Randy Allen.    P.S. #1 - I have a 40’, elite formed, Cunninghamia lanceolata “Blue” here at my arboretum that many people in TN confuse with Monkey Puzzle. Ha.  The extreme cold on Jan 20 of 1985 (-17 F) killed every Cunninghamia lanceolata to the ground, in TN, even the one at our governor’s mansion. But they always resprout.  Smile</span><br data-dcnode-id="1593"><span data-dcnode-id="1592" instrument_node="">
P.S. #2 - I just had an Epiphany in July of 2020, regarding this species growing well in England but not in eastern USA:  I read recently that when the English brought Crape Myrtles to their country from China a few hundred years ago, that they weren’t very impressed with their performance, because it wasn’t hot enough.  But, when introduced to the eastern USA, the Crape Myrtles excelled in most areas.  Well, that tells me that maybe the Monkey Puzzle doesn’t like our elongated 90+ F deg humid  summers.  Just a thought.  Randy Allen of Tennessee</span></span></p><span data-dcnode-id="1589" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1558" id="cid-169031"><td data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Positive</span></td><td data-dcnode-id="1560"><p data-dcnode-id="1576"><span data-dcnode-id="1580" instrument_node="">On Aug 10, 2016, </span><a data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/Lulollipolli/"><span data-dcnode-id="1579" instrument_node="">Lulollipolli</span></a><span data-dcnode-id="1577" instrument_node="">  from San Francisco, CA wrote:</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1574" instrument_node="">Hi, my name is Luci and I'm Brazilian. I just started searching the net to find out if there are any araucaria trees in USA. We have them mostly in southern Brasil, and I absolutely looove the edible seeds from it. I've been reading the comments here and it seems most people who actually have a tree don't even know they can cook the seeds to eat. It's even gluten-free. </span><br data-dcnode-id="1573"><span data-dcnode-id="1572" instrument_node="">
In Portuguese the seed is called "pinhão", and they are widely consumed during winter (their season). To make sure they are the same, just google the word and see if the images match the seeds from your tree. </span><br data-dcnode-id="1571"><span data-dcnode-id="1570" instrument_node="">
I'd love to hear from the person from Livermore (CA) as I live in San Francisco, and I'm also trying to find out if I can get the seeds here (anywhere in US). If anyone reading my posting has the tree, p</span><a data-dcnode-id="1568" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-169031').style.display='inline'; return false;"><span data-dcnode-id="1569" instrument_node="">... read more</span></a><span data-dcnode-id="1563" id="readmore-169031" style="display:none;"><span data-dcnode-id="1567" instrument_node="">ls contact me at </span><a data-dcnode-id="1565" href="mailto:Lulollipolli@yahoo.com"><span data-dcnode-id="1566" instrument_node="">Lulollipolli@yahoo.com</span></a><span data-dcnode-id="1564" instrument_node="">.  If really appreciate it.  </span></span></p><span data-dcnode-id="1561" instrument_node="">
</span></td></tr><tr data-dcnode-id="1533" id="cid-151611"><td data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Positive</span></td><td data-dcnode-id="1535"><p data-dcnode-id="1548"><span data-dcnode-id="1552" instrument_node="">On Feb 28, 2015, </span><a data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/PatYates/"><span data-dcnode-id="1551" instrument_node="">PatYates</span></a><span data-dcnode-id="1549" instrument_node="">  from Ogden, UT wrote:</span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1546" instrument_node="">The cold hardiness of this tree has probably been more underrated than any other plant I can think of. People are having success in Salt Lake City, Ogden and there is even one at the USU campus in Logan that has been there for several years. I'm guessing that one is in at least zone 5b if not lower.</span><br data-dcnode-id="1545"><span data-dcnode-id="1544" instrument_node="">
</span><br data-dcnode-id="1543"><span data-dcnode-id="1542" instrument_node="">
The one thing that does bother it here is the hot summer afternoons. Especially when young. I would give them afternoon shade if possible or carefully give them enough water in midsummer to keep them cool without overwatering them.</span><br data-dcnode-id="1541"><span data-dcnode-id="1540" instrument_node="">
</span><br data-dcnode-id="1539"><span data-dcnode-id="1538" instrument_node="">
Amazing tree though. Grows slowly the first 3 years or so but speeds up a bit after that.</span></p><span data-dcnode-id="1536" instrument_node="">
</span></td></tr><tr data-dcnode-id="1526" id="cont_ad_rev"><td colspan="2" data-dcnode-id="1527"><div class="ad ad-300x250" data-dcnode-id="1528"><div class="ad-image" data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">
</span></div></div></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1509" id="cid-135577"><td data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Positive</span></td><td data-dcnode-id="1511"><p data-dcnode-id="1516"><span data-dcnode-id="1520" instrument_node="">On Sep 10, 2013, </span><a data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/Hibiscusfan/"><span data-dcnode-id="1519" instrument_node="">Hibiscusfan</span></a><span data-dcnode-id="1517" instrument_node="">  from Villas, NJ wrote:</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Grows in Villas, New Jersey! Such a NEAT tree!</span></p><span data-dcnode-id="1512" instrument_node="">
</span></td></tr><tr data-dcnode-id="1488" id="cid-126347"><td data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Positive</span></td><td data-dcnode-id="1490"><p data-dcnode-id="1499"><span data-dcnode-id="1503" instrument_node="">On Mar 7, 2012, </span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/floramakros/"><span data-dcnode-id="1502" instrument_node="">floramakros</span></a><span data-dcnode-id="1500" instrument_node="">  from Sacramento Valley, CA wrote:</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1497" instrument_node="">Young specimens (about 6 to 12 ft) are truly eyecatching, like an alien standing on your lawn. Regarding the comments that a gardener won't live to see the adult tree, I got news for you, most of us tree lovers will never live to see the adult size of the trees we plant! We do it for future generations. I consider every tree I plant to be a time capsule for my great-grandchildren (and I'm still pretty young, lol). They are surprisingly heat resistant in CA, you can see a beautiful example at the Sacramento Zoo. The Norfolk Island Pines there unfortunately are not doing too well, I consider them an indoor tree in the Sac Valley and that's how most people keep them, I have 7 which tells you how much I love Araucarias. The negative experiences described are obviously talking about bunya-bunya</span><a data-dcnode-id="1495" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-126347').style.display='inline'; return false;"><span data-dcnode-id="1496" instrument_node="">... read more</span></a><span data-dcnode-id="1493" id="readmore-126347" style="display:none;"><span data-dcnode-id="1494" instrument_node="">s, I don't know how anyone can confuse the two species. The Northwest US is the perfect environment for Monkey Puzzles and all Araucarias in general (giant Norfolks can be seen all over San Francisco). The SF Arboretum has specimens of all 3, they're fantastic looking trees. Highly recommended.</span></span></p><span data-dcnode-id="1491" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1461" id="cid-124546"><td data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Neutral</span></td><td data-dcnode-id="1463"><p data-dcnode-id="1476"><span data-dcnode-id="1482" instrument_node="">On Oct 20, 2011, </span><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/DMersh/"><span data-dcnode-id="1481" instrument_node="">DMersh</span></a><span data-dcnode-id="1479" instrument_node="">  from Perth,</span><br data-dcnode-id="1478"><span data-dcnode-id="1477" instrument_node="">United Kingdom (Zone 7b) wrote:</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1474" instrument_node="">One of the most viciously spiny growing things on the planet, you'd have to look to cacti to find a more dangerous plant/tree. Even the cones are sharply spined and leaves on bigger branches are actually like small daggers (leaves get woodier and stronger with age). And best of all the branches are highly prone to dropping off! (the wood is poor and lightweight and prone to breakages)</span><br data-dcnode-id="1473"><span data-dcnode-id="1472" instrument_node="">
I wouldn't fancy the chances of anyone hit by a large falling branch, quite apart from the weight the sharp leaves could inflict severe flesh wounds. Best not to be underneath a large tree, at least in windy weather!</span><br data-dcnode-id="1471"><span data-dcnode-id="1470" instrument_node="">
A high altitude  alpine tree needing excellent light, clean air and reasonably high rainfall but no high temperatures - it is ill suited to areas that have hot, dry summers. Accepts</span><a data-dcnode-id="1468" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-124546').style.display='inline'; return false;"><span data-dcnode-id="1469" instrument_node="">... read more</span></a><span data-dcnode-id="1466" id="readmore-124546" style="display:none;"><span data-dcnode-id="1467" instrument_node=""> cold winters with snow and prolonged freezing periods.</span></span></p><span data-dcnode-id="1464" instrument_node="">
</span></td></tr><tr data-dcnode-id="1444" id="cid-116788"><td data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">Positive</span></td><td data-dcnode-id="1446"><p data-dcnode-id="1451"><span data-dcnode-id="1455" instrument_node="">On Sep 26, 2010, </span><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/clcg1/"><span data-dcnode-id="1454" instrument_node="">clcg1</span></a><span data-dcnode-id="1452" instrument_node="">  from Cleveland, OH wrote:</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">I have to disagree with coments made that this tree is extremely poorly adapted to the south east US,and does not tolorate heat and humidity well.When I used to live in tuscaloosa alabama before i moved back home to ohio.My monkey puzzel tree was perectly healthy for three years outside in a pot down there in full sunlight with no protection whats so ever all year long.neither the summer heat nor the frosts of winter damaged it.i believe what kills many araucaria trees is to much or to little water.</span></p><span data-dcnode-id="1447" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1419" id="cid-113826"><td data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Neutral</span></td><td data-dcnode-id="1421"><p data-dcnode-id="1434"><span data-dcnode-id="1438" instrument_node="">On Jun 9, 2010, </span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/runnow/"><span data-dcnode-id="1437" instrument_node="">runnow</span></a><span data-dcnode-id="1435" instrument_node="">  from Sevierville, TN wrote:</span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1432" instrument_node="">               This rather odd looking tree is extremely poorly adapted for Southeast U.S. as it does not tolerate heat and</span><br data-dcnode-id="1431"><span data-dcnode-id="1430" instrument_node="">
humidity well. I have tried it 4 times and 4 times it has died</span><br data-dcnode-id="1429"><span data-dcnode-id="1428" instrument_node="">
once the temperature have been in the 80's for a few weeks.It is frequently confused with A. bidwilli which is suited</span><br data-dcnode-id="1427"><span data-dcnode-id="1426" instrument_node="">
for the lower South. By contrast A. angustifolia has been succesful both times I have tried it. Most people in the South</span><br data-dcnode-id="1425"><span data-dcnode-id="1424" instrument_node="">
who think they have this actually have A. bidwillii. </span></p><span data-dcnode-id="1422" instrument_node="">
</span></td></tr><tr data-dcnode-id="1412" id="cont_ad_rev"><td colspan="2" data-dcnode-id="1413"><div class="ad ad-300x250" data-dcnode-id="1414"><div class="ad-image" data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">

</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">We  bought a home with this Wonderful Tree. We had no clue what it was then we looked it up. My teen daughter touched it &amp; gave him a name  His name is "PRICK" it takes 3 people to groom him/Her. They are great conversation starts for people that have never seen one. We just learned that  Prick is a Female. She has her first cone. </span></p><span data-dcnode-id="1398" instrument_node="">

</span><p data-dcnode-id="1378"><span data-dcnode-id="1381" instrument_node="">Got one of these as a present from a German lady. I have put it in a large pot and have overwintered it in a cool passage-way. So far, it looks good. Will put it out soon. I suspect this one will become soon too cumbersome to be handled easily. I lost two expensive specimens a couple of years ago, so had been wary of purchasing any more of these. Pollution is the suspected culprit. Sofia, Bulgaria, 2300 feet AMSL, Z 6b.</span><br data-dcnode-id="1380"><span data-dcnode-id="1379" instrument_node="">
I love this tree. It is so attractive-looking.</span></p><span data-dcnode-id="1377" instrument_node="">

</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">I have a MPT that lives inside (we live in Calgary).   It is starting to turn brown.  Is this due to too much water, too little water, something else?  Any suggestions would be appreciated.  Thanks, dhkmpt</span></p><span data-dcnode-id="1358" instrument_node="">

</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Does anybody have any experience planting from seed? I found some under a large old specimen in Hillcrest, San Diego.  I think they may have dried out and are not viable. I'd like to hear from anybody who has had experience planting from seed.</span></p><span data-dcnode-id="1341" instrument_node="">

</span><p data-dcnode-id="1291"><span data-dcnode-id="1300" instrument_node="">There are many Monkey Trees in Victoria, BC, Canada - we even have a Monkey Tree Pub!!  (where one once grew, and has been now taken down to make more room for pub patrons).  Many LARGE ones on residential properties grow in Victoria - they aren't too hard to find as they stick up above our large fir trees.  </span><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">
</span><br data-dcnode-id="1297"><span data-dcnode-id="1296" instrument_node="">
On a fun note, my boyfriend and I play the "monkey tree" game while driving (although we know where most are in Victoria), but when we see one, we get to 'anti-up' (punch buggy) on eachother with them - the rules are, you can't use the same tree in the same day, and you can't 'anti-up' until you actually see the tree.  Its a fun game while driving (especially being the passenger in the vehicle).</span><br data-dcnode-id="1295"><span data-dcnode-id="1294" instrument_node="">
</span><br data-dcnode-id="1293"><span data-dcnode-id="1292" instrument_node="">
Enjoy Monkey Tree Climbing- LOL!!!</span></p><span data-dcnode-id="1290" instrument_node="">

</span><p data-dcnode-id="1272"><span data-dcnode-id="1275" instrument_node="">From Shine2:</span><br data-dcnode-id="1274"><span data-dcnode-id="1273" instrument_node="">
I haven't grown this plant, but just wanted to share with fellow gardeners that there is a beautiful specimen of Araucaria araucana growing at Hoyt Arboretum in Portland, Oregon.  During the 1906 Lewis and Clark Exposition people from Chile gave out either seeds or small plants to people from Portland and went home and planted it in there neighborhoods.  I am not sure which neighborhoods they are in, but will find out and share the infomation with you.  Many people grow Araucaria heterophylla (Norfolk Island Pine) as an indoor plant.  It is a favorite Christmas tree in Hawaii.</span></p><span data-dcnode-id="1271" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1229" id="cid-56863"><td data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Positive</span></td><td data-dcnode-id="1231"><p data-dcnode-id="1256"><span data-dcnode-id="1262" instrument_node="">On Feb 12, 2006, </span><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/Gustichock/"><span data-dcnode-id="1261" instrument_node="">Gustichock</span></a><span data-dcnode-id="1259" instrument_node="">  from Tandil,</span><br data-dcnode-id="1258"><span data-dcnode-id="1257" instrument_node="">Argentina (Zone 10b) wrote:</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1254" instrument_node="">I'm from Argentina but I live in Buenos Aires. Unfortunately, temperature here is quite high to grow this tree, so I’ve always wonder how different it would be from the other native Araucaria that grows in my country and that is also cultivated here where I live as an ornamental tree (A. angustifolia). There are also other types of exotics Araucarias that are cultivated here (A. Bidwillii, A. heterophylla, etc.) but are completely different from A. araucana. There’s no way to confuse them!</span><br data-dcnode-id="1253"><span data-dcnode-id="1252" instrument_node="">
</span><br data-dcnode-id="1251"><span data-dcnode-id="1250" instrument_node="">
Anyway! I’ve always seen this tree by pictures until I’ve made a trip to Patagonia! Oh my Gosh!! They are beautiful!!! Separated or in groups, they are just beautiful!! I had the chance to go to National Parks over there and literally be able to hug araucarias 800 years old!</span><br data-dcnode-id="1249"><span data-dcnode-id="1248" instrument_node="">
</span><br data-dcnode-id="1247"><span data-dcnode-id="1246" instrument_node="">
</span><a data-dcnode-id="1244" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-56863').style.display='inline'; return false;"><span data-dcnode-id="1245" instrument_node="">... read more</span></a><span data-dcnode-id="1234" id="readmore-56863" style="display:none;"><span data-dcnode-id="1243" instrument_node="">
I’ve brought some seeds with me and I’ve made them germinate. Actually, I had four little trees but they didn’t make it through the summer. Too bad!</span><br data-dcnode-id="1242"><span data-dcnode-id="1241" instrument_node="">
</span><br data-dcnode-id="1240"><span data-dcnode-id="1239" instrument_node="">
Now, I see there’s people that say they grow this tree in Florida. </span><br data-dcnode-id="1238"><span data-dcnode-id="1237" instrument_node="">
Gus.</span><br data-dcnode-id="1236"><span data-dcnode-id="1235" instrument_node="">
</span></span></p><span data-dcnode-id="1232" instrument_node="">

</span><p data-dcnode-id="1208"><span data-dcnode-id="1217" instrument_node="">I really love the Monkey Puzzle Tree and bought a 2 foot tree from a mailorder nursery back in February 2005. I planted it in a pot using cacti soil mix as recommended by my local nursery since it has good drainage. I kept the tree in my greenhouse until May 2005 and then put it outside. It grew well until about August 2005 when I noticed the leaves starting to turn brown. It looks like I wont be able to save the tree but I have no idea what I did wrong. </span><br data-dcnode-id="1216"><span data-dcnode-id="1215" instrument_node="">
</span><br data-dcnode-id="1214"><span data-dcnode-id="1213" instrument_node="">
Iwant to purchase another Monkey Puzzle Tree and give it one last shot.</span><br data-dcnode-id="1212"><span data-dcnode-id="1211" instrument_node="">
</span><br data-dcnode-id="1210"><span data-dcnode-id="1209" instrument_node="">
Hans</span></p><span data-dcnode-id="1207" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1167" id="cid-42825"><td data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Neutral</span></td><td data-dcnode-id="1169"><p data-dcnode-id="1194"><span data-dcnode-id="1198" instrument_node="">On May 1, 2005, </span><a data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/coastgarden/"><span data-dcnode-id="1197" instrument_node="">coastgarden</span></a><span data-dcnode-id="1195" instrument_node="">  from Bay Center, WA (Zone 5a) wrote:</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1171"><span data-dcnode-id="1192" instrument_node="">We bought our home, built 1892.  It is located in a fishing village, which now is about 1/10th the activity of the community when it was originally formed.  Back in the 1900s, ships used to come into the harbor on the bay here.  The original owner of this house would go out to meet the ship captains and invited them to dinner.  One of the captains had brought the seeds from monkey puzzle tree in Chile and gifted one to her.  She planted it and it has been growing for 90 + years. </span><br data-dcnode-id="1191"><span data-dcnode-id="1190" instrument_node="">
</span><br data-dcnode-id="1189"><span data-dcnode-id="1188" instrument_node="">
It was quite the landmark in the village and was featured in a drawing along with the historic house in Back Roads of Washington.  We have few actual photos though, of what it looked like over the years as it was maturing and still holding it's limbs and green color. </span><br data-dcnode-id="1187"><span data-dcnode-id="1186" instrument_node="">
</span><br data-dcnode-id="1185"><span data-dcnode-id="1184" instrument_node="">
 While it was sp</span><a data-dcnode-id="1182" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-42825').style.display='inline'; return false;"><span data-dcnode-id="1183" instrument_node="">... read more</span></a><span data-dcnode-id="1172" id="readmore-42825" style="display:none;"><span data-dcnode-id="1181" instrument_node="">ectacular back in its day, when we bought the house it was losing its limbs and looking scraggly.  By the next year, it was more brown than green.  We had a neighbor brave the nasty, spindly branches and cut them off upwards to open some space and hopefully save the tree.  It was planted at an intersection and its huge growth cut off visibility. </span><br data-dcnode-id="1180"><span data-dcnode-id="1179" instrument_node="">
</span><br data-dcnode-id="1178"><span data-dcnode-id="1177" instrument_node="">
I'm not even sure if the tree is still 'alive' now as it is all brown and there are only hints of green at the tip and in some few new side branch shoots.  We are loathe to take it down, but I don't know enough about the nature of a mature monkey puzzle tree to know if it is living or dying.   I'm concerned that if it is dying, at some point it will topple and that will mean some serious damage.  Again, we don't know the nature of aged monkey puzzle trees or their life-span.  It's our homeowner dilemna. </span><br data-dcnode-id="1176"><span data-dcnode-id="1175" instrument_node="">
</span><br data-dcnode-id="1174"><span data-dcnode-id="1173" instrument_node="">
See the photo I entered showing the mature 90 + yr old monkey puzzle tree.  Photo taken at dusk, so it's dark, doesn't show how brown the limbs are in daylight. </span></span></p><span data-dcnode-id="1170" instrument_node="">
</span></td></tr><tr data-dcnode-id="1160" id="cont_ad_rev"><td colspan="2" data-dcnode-id="1161"><div class="ad ad-300x250" data-dcnode-id="1162"><div class="ad-image" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">
</span></div></div></td></tr><tr data-dcnode-id="1113" id="cid-39791"><td data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Positive</span></td><td data-dcnode-id="1115"><p data-dcnode-id="1148"><span data-dcnode-id="1154" instrument_node="">On Mar 9, 2005, </span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/Ursula/"><span data-dcnode-id="1153" instrument_node="">Ursula</span></a><span data-dcnode-id="1151" instrument_node="">  from Santiago,</span><br data-dcnode-id="1150"><span data-dcnode-id="1149" instrument_node="">Chile (Zone 9b) wrote:</span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1146" instrument_node="">Araucaria araucana is native to Chile and Argentina.  This magnificent tree can reach 50 m height and 1000 year old trees have been found in Chile.  Their natural habitat is in the mountains (between 600 and 1700 m.a.s.l.), at full sun and specially growing in volcanic, well drained and nutrient rich soil.  Their root system goes down very deep.</span><br data-dcnode-id="1145"><span data-dcnode-id="1144" instrument_node="">
</span><br data-dcnode-id="1143"><span data-dcnode-id="1142" instrument_node="">
This tree is 'dioico'; i.e. has female and male flowers on separate trees.  Adult trees only grow branches on their very top.  They grow slowly during their first years and will produce fruits around their 25th year.</span><br data-dcnode-id="1141"><span data-dcnode-id="1140" instrument_node="">
</span><br data-dcnode-id="1139"><span data-dcnode-id="1138" instrument_node="">
Their popular name is "Pehuén" and it is the sacred tree of the Pehuenches (Pehuén men) that have always lived associated to this tree from which they obtain their food.  The seed is edible and used in man</span><a data-dcnode-id="1136" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-39791').style.display='inline'; return false;"><span data-dcnode-id="1137" instrument_node="">... read more</span></a><span data-dcnode-id="1118" id="readmore-39791" style="display:none;"><span data-dcnode-id="1135" instrument_node="">y ways.  It can be eaten cooked the same as chesnuts.  Pehuenches make flour to bake their bread, etc.</span><br data-dcnode-id="1134"><span data-dcnode-id="1133" instrument_node="">
</span><br data-dcnode-id="1132"><span data-dcnode-id="1131" instrument_node="">
Arauco is the area of the country where they mainly grow.</span><br data-dcnode-id="1130"><span data-dcnode-id="1129" instrument_node="">
</span><br data-dcnode-id="1128"><span data-dcnode-id="1127" instrument_node="">
To propagate this tree you must be sure you have VERY fresh seeds, because they are viable only 3 to 4 months.  They must be cold treated at 4°C, wrapped in humid newspaper and left in the fruit-compartment of the refrigerator for a whole month.  Then they must be sowed in individual bags or pots in a mix of equal parts of river sand, acid soil and compost.  Be sure the bags/pots have good drainage.  Otherwise, the excessive water can cause yellow leaves and roots to rot.</span><br data-dcnode-id="1126"><span data-dcnode-id="1125" instrument_node="">
</span><br data-dcnode-id="1124"><span data-dcnode-id="1123" instrument_node="">
This tree is recommended for parks, plazas, city landscaping and only very large private gardens.</span><br data-dcnode-id="1122"><span data-dcnode-id="1121" instrument_node="">
</span><br data-dcnode-id="1120"><span data-dcnode-id="1119" instrument_node="">
</span></span></p><span data-dcnode-id="1116" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1090" id="cid-26292"><td data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Positive</span></td><td data-dcnode-id="1092"><p data-dcnode-id="1103"><span data-dcnode-id="1107" instrument_node="">On Sep 1, 2004, </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/jaoakley/"><span data-dcnode-id="1106" instrument_node="">jaoakley</span></a><span data-dcnode-id="1104" instrument_node="">  from Toronto, ON (Zone 5b) wrote:</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1101" instrument_node="">These are rather peculiar trees, or at least they are from my perspective. These trees cannot be grown in any part of Canada except the warm areas of coastal British Columbia, meaning that these trees are very different from the ones I'm used to seeing in Ontario. The large bract-like leaves are certainly a feature unseen on Canadian conifers.</span><br data-dcnode-id="1100"><span data-dcnode-id="1099" instrument_node="">
</span><br data-dcnode-id="1098"><span data-dcnode-id="1097" instrument_node="">
These trees have a very interesting growth pattern that isn't easy to see unless you observe a specimen for a period of time. Instead of producing one whorl of branches a year like other conifers such as spruce and fir, Monkey Puzzles produce an average of only two thirds of a whorl a year. Thus, a tree with 50 whorls is actually 75.</span><br data-dcnode-id="1096"><span data-dcnode-id="1095" instrument_node="">
</span></p><span data-dcnode-id="1093" instrument_node="">
</span></td></tr><tr data-dcnode-id="1073" id="cid-23735"><td data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Positive</span></td><td data-dcnode-id="1075"><p data-dcnode-id="1080"><span data-dcnode-id="1084" instrument_node="">On Jul 23, 2004, </span><a data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/Fresnojoe/"><span data-dcnode-id="1083" instrument_node="">Fresnojoe</span></a><span data-dcnode-id="1081" instrument_node="">  from Fresno, CA wrote:</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">We live in Fresno, CA.  we inherited our tree as well.  When we first arrived the tree was surrounded by juniper bushes.  The tree was small and grew very little.  We removed the junipers and the tree doubled in height in little over a year.  That was 10 years ago and this year was the first that cones started to hit the ground.  The tree is shapely and beautiful.  It always draws a comment from visitors.  If you plan to plant one, give it plenty of space away from walkways.  Buy a good pair of gloves and wear a hat and goggles when pruning.    I have had little problem keeping it looking good despite the occasional role of TP in the branches!!</span></p><span data-dcnode-id="1076" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1056" id="cid-23372"><td data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Positive</span></td><td data-dcnode-id="1058"><p data-dcnode-id="1063"><span data-dcnode-id="1067" instrument_node="">On Jul 16, 2004, </span><a data-dcnode-id="1065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/billjudyc/"><span data-dcnode-id="1066" instrument_node="">billjudyc</span></a><span data-dcnode-id="1064" instrument_node="">  from Mount Pulaski, IL wrote:</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">I have had mine in my sunroom ,which has overhead skylights, for about 5 years. It's about 7' tall. I'm in Central Illinois. The decorative pot it's in is sitting in a larger pot without touching the bottom. The bottom always has water standing and the roots have snaked through the original pot and are exposed and touching the water at all times. I'm afraid to transplant now. But lately I've noticed the tips of the branches are dying (only about 1-2") Don't know what I should do now.</span></p><span data-dcnode-id="1059" instrument_node="">
</span></td></tr><tr data-dcnode-id="1039" id="cid-22166"><td data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Positive</span></td><td data-dcnode-id="1041"><p data-dcnode-id="1046"><span data-dcnode-id="1050" instrument_node="">On Jun 28, 2004, </span><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/TTPVentura/"><span data-dcnode-id="1049" instrument_node="">TTPVentura</span></a><span data-dcnode-id="1047" instrument_node="">  from Ojai, CA wrote:</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">We recently purchased a home with a Monkey Puzzle tree in the front yard.  It is about 80 feet tall and very beautiful.  That was until last week when 8 to 10 pound green cones started falling from the top of the tree.  I have put up barrier tape to block part of the driveway.  We were told, by the previous owners, that these dropped in the fall every other year, but this seems very early.  We really love the tree and it is very unique, but our front yard looks like a scene out of CSI.</span></p><span data-dcnode-id="1042" instrument_node="">
</span></td></tr><tr data-dcnode-id="1032" id="cont_ad_rev"><td colspan="2" data-dcnode-id="1033"><div class="ad ad-300x250" data-dcnode-id="1034"><div class="ad-image" data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">
</span></div></div></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1013" id="cid-19846"><td data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Negative</span></td><td data-dcnode-id="1015"><p data-dcnode-id="1022"><span data-dcnode-id="1026" instrument_node="">On May 28, 2004, </span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/livermore/"><span data-dcnode-id="1025" instrument_node="">livermore</span></a><span data-dcnode-id="1023" instrument_node="">  from Livermore, CA wrote:</span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1020" instrument_node="">My trees are 120 years old - part of a large garden which belonged to a Sanitarium in the 1890's. The dropped limbs and cones are extremely dangerous. Cones the size of basketballs have dropped, weighing 17 pounds! As these cones drop (from the top of the tree) they break the lower branches, badly damaging the shape of the tree. Only the male tree keeps a nice shape, since it doesn't suffer the damage from the cones.</span><br data-dcnode-id="1019"><span data-dcnode-id="1018" instrument_node="">
You might like this unique tree, but few gardeners will live long enough to enjoy seeing this tree grow to its full height, or to bear the consequences of the dangerous cones. If you must have one, plant it in a large space - away from pedestrian traffic.</span></p><span data-dcnode-id="1016" instrument_node="">
</span></td></tr><tr data-dcnode-id="994" id="cid-17239"><td data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Neutral</span></td><td data-dcnode-id="996"><p data-dcnode-id="1001"><span data-dcnode-id="1007" instrument_node="">On Apr 5, 2004, </span><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/insydney/"><span data-dcnode-id="1006" instrument_node="">insydney</span></a><span data-dcnode-id="1004" instrument_node="">  from sydney,</span><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">Australia wrote:</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">All the araucarias - the Norfolk, Hoop, Bunya, Cook etc- are named after this. It is named for the Araucanos indians in whose territory it grew (hence Araucaria Araucanos). The seeds were eaten by the Spanish in the nearest ports, but the tree had never been seen till explorers went inland. It was one of the most popular 'gardenesque' trees in Victorian gardens, and often grown on estates in avenues. In England it seems to grow quite quickly, and with a more pronounced trunk. It is called a 'monkeypuzzle' because one 19thC observor commented that with such a spiny trunk and leaves 'even a monkey would find it a puzzle to climb'. A quintessential tree for a period garden.</span></p><span data-dcnode-id="997" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="977" id="cid-15074"><td data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Positive</span></td><td data-dcnode-id="979"><p data-dcnode-id="984"><span data-dcnode-id="988" instrument_node="">On Feb 9, 2004, </span><a data-dcnode-id="986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/kaylee0922/"><span data-dcnode-id="987" instrument_node="">kaylee0922</span></a><span data-dcnode-id="985" instrument_node="">  wrote:</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">I had purchased a monkey puzzle tree about 6 months ago at a local nursery here in Wisconsin for $25. They didn't know much about the tree so I am trying to find out all that I can. At the moment I have it growing in my apartment in a pot. It is about 4 feet tall and very healthy. I treat it lightly with fertilizer and water regularly. I would say though that it receives full sun.  I am a bit confused as to its actual value.. Some sites state that they are quite expensive and rare.  I personally love it and it draws a lot of conversation when people come over!</span></p><span data-dcnode-id="980" instrument_node="">
</span></td></tr><tr data-dcnode-id="960" id="cid-14377"><td data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Positive</span></td><td data-dcnode-id="962"><p data-dcnode-id="967"><span data-dcnode-id="971" instrument_node="">On Jan 12, 2004, </span><a data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/Dutch/"><span data-dcnode-id="970" instrument_node="">Dutch</span></a><span data-dcnode-id="968" instrument_node="">  wrote:</span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">I enjoy seeing the dif types of trees and plants from one climate to another. I moved from the Canadian prairies to the West Coast and this tree is def something we didn't have. I have also discovered it in England growing strangley tall and all trunk. I am now in the Netherlands and am suprised to find them thriving in this wet climate. </span></p><span data-dcnode-id="963" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="941" id="cid-11088"><td data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Positive</span></td><td data-dcnode-id="943"><p data-dcnode-id="948"><span data-dcnode-id="954" instrument_node="">On Sep 2, 2003, </span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/pleb/"><span data-dcnode-id="953" instrument_node="">pleb</span></a><span data-dcnode-id="951" instrument_node="">  from Plymouth,,</span><br data-dcnode-id="950"><span data-dcnode-id="949" instrument_node="">United Kingdom (Zone 9a) wrote:</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">The Monkey Puzzle can be grown from seed. Sow in heat, about 70F, in spring. The seeds are very large and can be sown one to a pot. Germination should occur after a month or two. The trouble is that the seedling tends to emerge above ground with their seedcoat attached and this has to be carefully removed. After germination the seedling can have its heat reduced. I obtained my seeds from Chilterns.</span></p><span data-dcnode-id="944" instrument_node="">
</span></td></tr><tr data-dcnode-id="922" id="cid-11038"><td data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Neutral</span></td><td data-dcnode-id="924"><p data-dcnode-id="929"><span data-dcnode-id="935" instrument_node="">On Aug 31, 2003, </span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/stevenova/"><span data-dcnode-id="934" instrument_node="">stevenova</span></a><span data-dcnode-id="932" instrument_node="">  from Newcastle,</span><br data-dcnode-id="931"><span data-dcnode-id="930" instrument_node="">United Kingdom (Zone 8a) wrote:</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">The image posted by agardener2 Looks more like A. bidwillii (Bunya-Bunya Pine) to me. The trailing branchlets are definately not a feature of the cool growing A. araucana!</span></p><span data-dcnode-id="925" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="905" id="cid-11031"><td data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Negative</span></td><td data-dcnode-id="907"><p data-dcnode-id="912"><span data-dcnode-id="916" instrument_node="">On Aug 31, 2003, </span><a data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/agardener2/"><span data-dcnode-id="915" instrument_node="">agardener2</span></a><span data-dcnode-id="913" instrument_node="">  wrote:</span></p><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">I live in the central valley of California where the summers are extremely hot and have a Monkey Puzzle Tree in my yard which is approximately 70-90 feet tall. While it is a magnificent tree, I find it to be a royal pain in an urban landscape. It is very messy - there is always debris to clean up (you'd better have heavy duty gloves due to the razor sharp edges). I inherited this tree and it is planted close to the street which is frequented by walkers. The seed cones fall only from the top part of the tree every few years and weigh up to 10 pounds. There have been some near misses! Just make sure you have plenty of room if you plant one, and plant it in a spot which won't have a lot of people or property underneath.</span></p><span data-dcnode-id="908" instrument_node="">
</span></td></tr><tr data-dcnode-id="880" id="cid-9570"><td data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Positive</span></td><td data-dcnode-id="882"><p data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">On Jul 16, 2003, </span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/palmbob/"><span data-dcnode-id="898" instrument_node="">palmbob</span></a><span data-dcnode-id="896" instrument_node="">  from Acton, CA (Zone 8b) wrote:</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="893" instrument_node="">As a lover of spiny, weird things, this has always been one of my favorite trees.  It is like a tree-cycad... stiff, incredibly sharp, all over- trunk to tips of branches.  Alas, though living in So Cal, we are often blessed with great growing seasons and a humongous variety of possibilities, this is one of the few that only grows were it doesn't get too hot.  Several attempts at this species have all failed.  It can't handle the heat of inland Los Angeles climates.  Too bad.</span><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node="">
</span><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node="">
Many comments below (notably the two negative ones) are obviously directed toward the Bunya Bunya, or False Monkey Puzzle tree (Araucaria bidwillii), also a very tall, massive tree with huge cones (Monkey Puzzle trees have fascinating cones, but they are not unusually large or dangerous) that grows well</span><a data-dcnode-id="887" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-9570').style.display='inline'; return false;"><span data-dcnode-id="888" instrument_node="">... read more</span></a><span data-dcnode-id="885" id="readmore-9570" style="display:none;"><span data-dcnode-id="886" instrument_node=""> (and significantly faster than a Monkey Puzzle tree) in warmer climates such as those of inland and southern California.  The two species are not that alike however, and those comments below provided by those who obviously do not know the difference, need to be taken with a grain of salt.  </span></span></p><span data-dcnode-id="883" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="857" id="cid-8855"><td data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Neutral</span></td><td data-dcnode-id="859"><p data-dcnode-id="870"><span data-dcnode-id="874" instrument_node="">On Jun 22, 2003, </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/IslandJim/"><span data-dcnode-id="873" instrument_node="">IslandJim</span></a><span data-dcnode-id="871" instrument_node="">  from Keizer, OR (Zone 8b) wrote:</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="868" instrument_node="">this is a very interesting tree. it is often confused with araucaria bidwillii--and the latter is often sold as the former because, i would guess, more people will buy something called "monkey puzzle" than something called "bunya-bunya." of interest, perhaps, is that the other common species of this genus, a. heterophylla, is the norfolk island pine, which looks cute in a pot in a northern office but looks very ugly in a tropical landscape.</span><br data-dcnode-id="867"><span data-dcnode-id="866" instrument_node="">
the largest true monkey puzzle i've seen is on the capital grounds in sacramento. huge old specimen on the northwest corner of the mall.</span><br data-dcnode-id="865"><span data-dcnode-id="864" instrument_node="">
</span><br data-dcnode-id="863"><span data-dcnode-id="862" instrument_node="">
</span></p><span data-dcnode-id="860" instrument_node="">
</span></td></tr><tr data-dcnode-id="840" id="cid-8851"><td data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Positive</span></td><td data-dcnode-id="842"><p data-dcnode-id="847"><span data-dcnode-id="851" instrument_node="">On Jun 22, 2003, </span><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/fje65/"><span data-dcnode-id="850" instrument_node="">fje65</span></a><span data-dcnode-id="848" instrument_node="">  from Levittown, NY wrote:</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">This tree always gets a comment. From people asking me where to get one, to my Father calling it Charlie Brown's Christmas tree. We live on Long Island, NY. It is groing very well, We did lose a few bottom branches to this bad winter. Overall very unique plant to Have. WE Love it !!!!  Frank &amp; Jackie</span></p><span data-dcnode-id="843" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="823" id="cid-8156"><td data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Positive</span></td><td data-dcnode-id="825"><p data-dcnode-id="830"><span data-dcnode-id="834" instrument_node="">On May 30, 2003, </span><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/snowelk2002/"><span data-dcnode-id="833" instrument_node="">snowelk2002</span></a><span data-dcnode-id="831" instrument_node="">  wrote:</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">I has seen this tree grow for years and it pretty heavy pine cone which is green but very carefully when the heavy pine cone drop to ground then I pick up the pine cone and sure it weight about either 5 or 8 pounds green fresh pine cone then it dried up tan pine cone also it has seeds inside of the leaves. It's take long time to sow the seeds.</span></p><span data-dcnode-id="826" instrument_node="">
</span></td></tr><tr data-dcnode-id="806" id="cid-8063"><td data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Positive</span></td><td data-dcnode-id="808"><p data-dcnode-id="813"><span data-dcnode-id="817" instrument_node="">On May 26, 2003, </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/Stribling/"><span data-dcnode-id="816" instrument_node="">Stribling</span></a><span data-dcnode-id="814" instrument_node="">  from Thomasville, GA wrote:</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">I have seen two of these trees in Thomasville, Georgia and one in Pavo, Georgia.  The one in PAVO is on the MILAM Nursery Farm on Rt. 122.  It is over 150 years old according to Mrs. Milam.  It is majestic and worth stopping by to see.  They were brought to Georgia via England.  The Brits brought it back from Chile and propagated it in England.  Mrs. Milam says that the branches that turn up on the end are the ones to use to root new seedlings.</span></p><span data-dcnode-id="809" instrument_node="">
