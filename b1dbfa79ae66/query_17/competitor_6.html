and photoperiod decreases with increasing elevation</span></h3></a><div class="article-source ellipsis" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">2022, Agricultural and Forest Meteorology</span></div></div><div class="buttons" data-dcnode-id="395"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="396" type="button"><span class="button-link-text" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="397" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="398"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="350"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="351" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="352"><p data-dcnode-id="353" id="spara007"><span data-dcnode-id="394" instrument_node="">Climate change substantially affects plant phenology, resulting in earlier vegetation onset across temperate and boreal regions. Phenological shifts caused by warming may alter species interactions across trophic levels because of species-specific responses, and influence the reproductive success of dioecious species if the phenological sensitivity to warming (</span><em data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">S</span></em><sub data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">T</span></sub><span data-dcnode-id="389" instrument_node="">) differs between genders. We used twigs collected from male and female gingko trees at three elevations on Tianmu Mountain in eastern China. The twigs were cultivated in climate chambers to determine the effects of three temperatures (10, 15, and 20&nbsp;°C) and two photoperiods (8 and 16&nbsp;h). We observed slightly earlier leaf unfolding dates in male twigs (1 day), and a higher heat requirement (growing degree hours) for leaf unfolding in female (14,334&nbsp;±&nbsp;588&nbsp;°C) compared to male twigs (13,874&nbsp;±&nbsp;551&nbsp;°C). Similar responses to temperature (</span><em data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">S</span></em><sub data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">T</span></sub><span data-dcnode-id="384" instrument_node="">&nbsp;=&nbsp;3.7 days °C</span><sup data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">−1</span></sup><span data-dcnode-id="381" instrument_node="">), photoperiod and elevation were observed across genders. The long photoperiod treatment shortened the time to leaf unfolding by 9.1 days, but temperature and photoperiod effects on leaf unfolding differed significantly depending on the elevation of the donor trees. Specifically, </span><em data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">S</span></em><sub data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">T</span></sub><span data-dcnode-id="376" instrument_node=""> was higher (4.17 days °C</span><sup data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">−1</span></sup><span data-dcnode-id="373" instrument_node="">) and the photoperiod effect on </span><em data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">S</span></em><sub data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">T</span></sub><span data-dcnode-id="368" instrument_node=""> was larger (decreased by 1.15 days °C</span><sup data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">−1</span></sup><span data-dcnode-id="365" instrument_node="">) at the lowest elevation than at the higher elevations (</span><em data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">S</span></em><sub data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">T</span></sub><span data-dcnode-id="360" instrument_node="">&nbsp;=&nbsp;3.26 days °C</span><sup data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">−1</span></sup><span data-dcnode-id="357" instrument_node="">; decreased by 0.48 days °C</span><sup data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">−1</span></sup><span data-dcnode-id="354" instrument_node="">). This may be related to environment-induced local adaptations and self-protection mechanisms of trees at high elevations to avoid frost damage. Our results indicate that the photoperiod and genetic adaptations to local environments influenced the warming-induced phenological responses in ginkgo, but these responses were generally similar between the genders. For a given species, individuals in different climates may exhibit different phenological responses to higher temperatures, with individuals in warmer regions likely becoming increasingly limited by the photoperiod as the climate warms further.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="331"><div class="sub-heading" data-dcnode-id="343"><a data-dcnode-id="346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168192321004883" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="347" id="citing-articles-article1-title"><span data-dcnode-id="348" instrument_node="">Spring phenology in subtropical trees: Developing process-based models on an experimental basis</span></h3></a><div class="article-source ellipsis" data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">2022, Agricultural and Forest Meteorology</span></div></div><div class="buttons" data-dcnode-id="337"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="338" type="button"><span class="button-link-text" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="339" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="340"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="332"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="333" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="334"><p data-dcnode-id="335" id="spara016"><span data-dcnode-id="336" instrument_node="">Process-based phenological models are currently used for assessing the effects of climatic warming on the timing of spring phenological events, such as leafout and flowering, in trees. However, the biological realism of the models may be undermined by the practices of often formulating the models solely on the basis of observational records of the phenological event rather than addressing the physiological processes actually modelled. Here we introduce a framework for developing process-based phenological models on the basis of experiments explicitly designed for this purpose and apply the framework to developing process-based models for leafout in four subtropical tree species. Our method is based on a hypothetico-deductive approach, where the air temperature responses of the simulated processes are inferred from their implications for the occurrence and timing of leafout in the experimental conditions. That approach has only rarely been taken with boreal or temperate trees, and to the best of our knowledge, never before with subtropical trees. Big differences were found between the four species in the air temperature responses modelled, and these differences implied major differences in the dormancy dynamics predicted for the four species. Together with the results of a recent modelling study based on observational data, our results highlight the importance of experimental studies for the development of biologically realistic process-based models of spring phenology in trees. The framework developed in the present study can be applied to developing such models for all tree species that show the phenomena of rest (endodormancy) and chilling requirement, no matter whether the trees are boreal, temperate, or subtropical.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="310"><div class="sub-heading" data-dcnode-id="325"><a data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168192321004044" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="329" id="citing-articles-article2-title"><span data-dcnode-id="330" instrument_node="">Effects of chilling on heat requirement of spring phenology vary between years</span></h3></a><div class="article-source ellipsis" data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">2022, Agricultural and Forest Meteorology</span></div></div><div class="buttons" data-dcnode-id="319"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="320" type="button"><span class="button-link-text" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="321" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="322"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="311"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="312" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="313"><p data-dcnode-id="314" id="spara011"><span data-dcnode-id="318" instrument_node="">The controlled experiments are increasingly used to examine the effect of chilling on the spring phenology of temperate woody plants. Previous studies demonstrated a delaying effect of lack of chilling on spring events due to a negative relationship between chilling accumulation (CA) and heat requirement (HR). However, most experiments only lasted for one year, and limited studies examined the consistency of the CA-HR relationship between years. Here, we conducted a twig experiment with 14 temperate woody species in two winter seasons (2018/2019 and 2019/2020) to assess the between-year difference in the impact of chilling on HR of flowering or leaf-out. The CA and HR for each species in each year were estimated based on the common-used chilling and forcing model. The results showed that 8 of 14 species exhibited a significantly different slope or intercept of the linear function of HR against CA between two winter seasons. Using the first-year CA-HR function to simulate the second-year spring events would result in large uncertainties with root-mean-square errors ranging from 1.3 to 9.9 days. In addition to the original chilling model, we further selected an optimal one for each species from another 8 chilling models. The optimal chilling models varied among species and could reduce the </span><em data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">RMSE</span></em><span data-dcnode-id="315" instrument_node=""> of phenological simulation of 10 species by 0.1–3.7 days. Our results suggest that using one-year experimental data to develop the phenological model or estimate the chilling and heat requirement of spring events is unsuitable. Further studies are still needed to better quantify the rate of chilling under different temperature conditions for various species.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="289"><div class="sub-heading" data-dcnode-id="304"><a data-dcnode-id="307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1360138521002181" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="308" id="citing-articles-article3-title"><span data-dcnode-id="309" instrument_node="">Towards understanding the biological foundations of perenniality</span></h3></a><div class="article-source ellipsis" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">2022, Trends in Plant Science</span></div></div><div class="buttons" data-dcnode-id="298"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="299" type="button"><span class="button-link-text" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="300" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="301"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="290"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="291" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="292"><p data-dcnode-id="293" id="sp0045"><span data-dcnode-id="297" instrument_node="">Perennial life cycles enable plants to have remarkably long lifespans, as exemplified by trees that can live for thousands of years. For this, they require sophisticated regulatory networks that sense environmental changes and initiate adaptive responses in their growth patterns. Recent research has gradually elucidated fundamental mechanisms underlying the perennial life cycle. Intriguingly, several conserved components of the floral transition pathway in annuals such as </span><em data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Arabidopsis thaliana</span></em><span data-dcnode-id="294" instrument_node=""> also participate in these regulatory mechanisms underpinning perenniality. Here, we provide an overview of perennials’ physiological features and summarise their recently discovered molecular foundations. We also highlight the importance of deepening our understanding of perenniality in the development of perennial grain crops, which are promising elements of future sustainable agriculture.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="271"><div class="sub-heading" data-dcnode-id="283"><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168192321001106" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="287" id="citing-articles-article4-title"><span data-dcnode-id="288" instrument_node="">Increasing importance of precipitation in spring phenology with decreasing latitudes in subtropical forest area in China</span></h3></a><div class="article-source ellipsis" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">2021, Agricultural and Forest Meteorology</span></div></div><div class="buttons" data-dcnode-id="277"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="278" type="button"><span class="button-link-text" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="279" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="280"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="272"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="273" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="274"><p data-dcnode-id="275" id="spara009"><span data-dcnode-id="276" instrument_node="">Climate warming has significantly advanced plant spring phenology in temperate and boreal biomes in the northern hemisphere. However, the response of subtropical forest phenology to climate change remains largely unclear. This study aimed to determine the spatiotemporal patterns of spring photosynthetic phenology in subtropical forests in China over the period 2002-2017 and explore its underlying mechanism in response to the changes of different climate variables. We applied four methods to extract the start of the photosynthetic period (SOP) from a solar–induced chlorophyll fluorescence (SIF) data set during the period 2002 to 2017, and determined correlations between SOP and environmental factors using partial correlation analyses. Overall, the SOP was advanced by 6.8 days. Furthermore, we found that the SIF-based SOP is highly correlated with the flux data–based photosynthetic onset dates, demonstrating that SIF can be a useful index in characterizing the photosynthetic phenology in subtropical forests. Interestingly, based on partial correlation analysation temperature dominated the SOP in the northern subtropical forest, but the importance of precipitation increased with decreasing latitudes, and the primary climatic control of SOP in southern monsoon evergreen forests is precipitation. These results suggested that the predicted increase in temperature and shift in precipitation regimes under ongoing climate change might potentially largely affect the photosynthetic phenology, and thus affect the carbon and water cycles in subtropical forests.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="253"><div class="sub-heading" data-dcnode-id="265"><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0378112720315826" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="269" id="citing-articles-article5-title"><span data-dcnode-id="270" instrument_node="">Chilling accumulation and photoperiod regulate rest break and bud burst in five subtropical tree species</span></h3></a><div class="article-source ellipsis" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">2021, Forest Ecology and Management</span></div></div><div class="buttons" data-dcnode-id="259"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="260" type="button"><span class="button-link-text" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="261" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="262"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="254"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="255" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="256"><p data-dcnode-id="257" id="sp0015"><span data-dcnode-id="258" instrument_node="">The environmental regulation of spring phenology in boreal and temperate trees is generally well-understood, but little is known about the regulation in subtropical trees. It has been shown recently that similarly to the more northern trees, subtropical trees also exhibit rest (endodormancy) and chilling requirement of rest break (chilling requirement of endodormancy release), but the effects of photoperiod remain largely unexplored. Here we did an experimental study of the effects of chilling accumulation and photoperiod on the occurrence (bud burst percentage, BB%) and timing (days to bud burst, DBB) of bud burst in five subtropical tree species growing commonly in subtropical China. In all of the five species examined, both chilling accumulation and photoperiod showed a significant effect on DBB, and several significant effects were found for BB%. The responses to chilling accumulation and photoperiod we found are thought to be adaptive to the conditions of relatively short and warm subtropical winters: first, an independent effect of photoperiod would reduce the risk of frost damage caused by a premature bud burst in the case of false springs, which are especially common in subtropical conditions. Second, an interaction of photoperiod with chilling accumulation would facilitate a timely bud burst in spring after an exceptionally warm winter with reduced chilling accumulation. On the basis of our findings, we put forward a conceptual model for the various effects of chilling accumulation and photoperiod on rest break and bud burst in subtropical trees. The model facilitates future efforts towards developing process-based spring phenology models for subtropical tree species. Our limited but novel results show that 1) the modelling needs to address the effects of photoperiod; 2) because of the large differences found in the responses among the five species examined, the model development needs to be based on species-specific experimental data.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85070228126%26md5%3Dfff7a6cc4a59f79b9b8d21f4eb8210" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="250" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="251"></path></svg><span class="button-alternative-text" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0168192319303090"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2019 Elsevier B.V. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span d
