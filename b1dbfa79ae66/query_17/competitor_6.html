</span><meta content="It is well known that spring phenology has advanced in temperate regions over the last few decades in response to climate change. However, we understa…" data-dcnode-id="6391" property="og:description"><span data-dcnode-id="6390" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abst0010&quot;><p id=&quot;spar0040&quot;>It is well known that spring phenology has advanced in temperate regions over the last few decades in response to climate change. However, we understand much less about climate-driven changes in phenology within subtropical and tropical regions, where the timing of events is less predictable and has not been well-studied. It is not known whether subtropical plants have a similar winter chilling requirement to what has been well-documented in temperate species. To explore this possibility, we established a climate chamber experiment to test the effects of photoperiod and chilling on the timing of budburst within 37 subtropical woody species. We found that both moderate and strong chilling treatments advanced budburst and reduced forcing requirements, relative to plants subjected to a low chilling treatment. Longer photoperiod enhanced budburst rate for only two species, suggesting that chilling is more important for regulating budburst for most species. With respect to future climate change, the spring phenology of subtropical species is expected to be delayed further because species could lack the ability to meet their fundamental chilling requirement. These results have important implications for the conservation and management of tropical and subtropical plant populations under future climate change scenarios.</p></div></div></div>" data-dcnode-id="6389" lang="en" name="citation_abstract"><span data-dcnode-id="6388" instrument_node="">

rticle-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="5878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.agrformet.2019.107693" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="5879" instrument_node="">https://doi.org/10.1016/j.agrformet.2019.107693</span></a><a class="rights-and-content" data-dcnode-id="5876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0168192319303090%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="5877" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="5874"></section><section class="ReferencedArticles" data-dcnode-id="5873"></section><div class="PageDivider" data-dcnode-id="5872"></div><div class="Abstracts u-font-serif" data-dcnode-id="5838" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="5845" id="abs0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5870"><span data-dcnode-id="5871" instrument_node="">Highlights</span></h2><div data-dcnode-id="5846" id="abst0005"><p data-dcnode-id="5847" id="spar0035"></p><dl class="list" data-dcnode-id="5848"><dt class="list-label" data-dcnode-id="5868"><span data-dcnode-id="5869" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5862"><p data-dcnode-id="5863" id="par0005"><span data-dcnode-id="5867" instrument_node="">Moderate-high chilling is needed in </span><a class="topic-link" data-dcnode-id="5865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/budburst" title="Learn more about budburst from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5866" instrument_node="">budburst</span></a><span data-dcnode-id="5864" instrument_node=""> for subtropical species.</span></p></dd><dt class="list-label" data-dcnode-id="5860"><span data-dcnode-id="5861" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5854"><p data-dcnode-id="5855" id="par0010"><span data-dcnode-id="5859" instrument_node="">Chilling outweighs </span><a class="topic-link" data-dcnode-id="5857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/photoperiod" title="Learn more about photoperiod from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5858" instrument_node="">photoperiod</span></a><span data-dcnode-id="5856" instrument_node=""> in initiating budburst of subtropical species.</span></p></dd><dt class="list-label" data-dcnode-id="5852"><span data-dcnode-id="5853" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="5849"><p data-dcnode-id="5850" id="par0015"><span data-dcnode-id="5851" instrument_node="">Twig cutting experiments can be applied to subtropical evergreen species.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="5839" id="abs0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">Abstract</span></h2><div data-dcnode-id="5840" id="abst0010"><p data-dcnode-id="5841" id="spar0040"><span data-dcnode-id="5842" instrument_node="">It is well known that spring phenology has advanced in temperate regions over the last few decades in response to climate change. However, we understand much less about climate-driven changes in phenology within subtropical and tropical regions, where the timing of events is less predictable and has not been well-studied. It is not known whether subtropical plants have a similar winter chilling requirement to what has been well-documented in temperate species. To explore this possibility, we established a climate chamber experiment to test the effects of photoperiod and chilling on the timing of budburst within 37 subtropical woody species. We found that both moderate and strong chilling treatments advanced budburst and reduced forcing requirements, relative to plants subjected to a low chilling treatment. Longer photoperiod enhanced budburst rate for only two species, suggesting that chilling is more important for regulating budburst for most species. With respect to future climate change, the spring phenology of subtropical species is expected to be delayed further because species could lack the ability to meet their fundamental chilling requirement. These results have important implications for the conservation and management of tropical and subtropical plant populations under future climate change scenarios.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5815" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5827"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168192319302692"><svg class="icon icon-navigate-left" data-dcnode-id="5836" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5837"></path></svg><span class="button-alternative-text" data-dcnode-id="5829"><strong data-dcnode-id="5834"><span data-dcnode-id="5835" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5832"><span data-dcnode-id="5833" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5830"><span data-dcnode-id="5831" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5816"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0168192319303119"><span class="button-alternative-text" data-dcnode-id="5820"><strong data-dcnode-id="5825"><span data-dcnode-id="5826" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5823"><span data-dcnode-id="5824" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5821"><span data-dcnode-id="5822" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5818" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5819"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="5793"><div class="keywords-section" data-dcnode-id="5794" id="kwd0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5813"><span data-dcnode-id="5814" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5810" id="kw0005"><span data-dcnode-id="5811"><span data-dcnode-id="5812" instrument_node="">Budburst</span></span></div><div class="keyword" data-dcnode-id="5807" id="kw0010"><span data-dcnode-id="5808"><span data-dcnode-id="5809" instrument_node="">Chilling</span></span></div><div class="keyword" data-dcnode-id="5804" id="kw0015"><span data-dcnode-id="5805"><span data-dcnode-id="5806" instrument_node="">Climate change</span></span></div><div class="keyword" data-dcnode-id="5801" id="kw0020"><span data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">Evergreen species</span></span></div><div class="keyword" data-dcnode-id="5798" id="kw0025"><span data-dcnode-id="5799"><span data-dcnode-id="5800" instrument_node="">Phenology</span></span></div><div class="keyword" data-dcnode-id="5795" id="kw0030"><span data-dcnode-id="5796"><span data-dcnode-id="5797" instrument_node="">Twig cutting experiment</span></span></div></div></div><span data-dcnode-id="5792" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3652" id="body"><div data-dcnode-id="3700"><section data-dcnode-id="5626" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5788" id="sect0020"><span data-dcnode-id="5791" instrument_node="">1</span><span data-dcnode-id="5790" instrument_node="">. </span><span data-dcnode-id="5789" instrument_node="">Introduction</span></h2><p data-dcnode-id="5710" id="par0020"><span data-dcnode-id="5771"><span data-dcnode-id="5775"><span data-dcnode-id="5779"><span data-dcnode-id="5787" instrument_node="">Plant </span><a class="topic-link" data-dcnode-id="5785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/phenology" title="Learn more about phenology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5786" instrument_node="">phenology</span></a><span data-dcnode-id="5780"><span data-dcnode-id="5784" instrument_node="">, or the seasonal timing of important life history events such as </span><a class="topic-link" data-dcnode-id="5782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/budburst" title="Learn more about bud burst from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5783" instrument_node="">bud burst</span></a><span data-dcnode-id="5781" instrument_node=""> and </span></span></span><a class="topic-link" data-dcnode-id="5777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/anthesis" title="Learn more about flowering from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5778" instrument_node="">flowering</span></a><span data-dcnode-id="5776" instrument_node="">, is highly sensitive to the </span></span><a class="topic-link" data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/climate-change-impact" title="Learn more about effects of climate change from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5774" instrument_node="">effects of climate change</span></a><span data-dcnode-id="5772" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="5769" href="#bib0035" name="bbib0035"><span data-dcnode-id="5770" instrument_node="">Cleland et al., 2007</span></a><span data-dcnode-id="5768" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5766" href="#bib0110" name="bbib0110"><span data-dcnode-id="5767" instrument_node="">Menzel et al., 2006</span></a><span data-dcnode-id="5765" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5763" href="#bib0245" name="bbib0245"><span data-dcnode-id="5764" instrument_node="">Zohner et al., 2018</span></a><span data-dcnode-id="5762" instrument_node="">). Plant phenology underpins a variety of aspects of ecosystem function (</span><a class="workspace-trigger" data-dcnode-id="5760" href="#bib0115" name="bbib0115"><span data-dcnode-id="5761" instrument_node="">Miller-Rushing and Primack, 2008</span></a><span data-dcnode-id="5759" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5757" href="#bib0150" name="bbib0150"><span data-dcnode-id="5758" instrument_node="">Pau et al., 2011</span></a><span data-dcnode-id="5756" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5754" href="#bib0155" name="bbib0155"><span data-dcnode-id="5755" instrument_node="">Piao et al., 2007</span></a><span data-dcnode-id="5753" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5751" href="#bib0190" name="bbib0190"><span data-dcnode-id="5752" instrument_node="">Richardson et al., 2010</span></a><span data-dcnode-id="5750" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5748" href="#bib0200" name="bbib0200"><span data-dcnode-id="5749" instrument_node="">Scheffers et al., 2016</span></a><span data-dcnode-id="5747" instrument_node="">), and is a vital determinant of species distribution (</span><a class="workspace-trigger" data-dcnode-id="5745" href="#bib0030" name="bbib0030"><span data-dcnode-id="5746" instrument_node="">Chuine, 2010</span></a><span data-dcnode-id="5744" instrument_node="">). A growing body of literature suggests that spring phenology has advanced significantly in the northern hemisphere as a response to climate change (</span><a class="workspace-trigger" data-dcnode-id="5742" href="#bib0045" name="bbib0045"><span data-dcnode-id="5743" instrument_node="">Du et al., 2017</span></a><span data-dcnode-id="5741" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5739" href="#bib0060" name="bbib0060"><span data-dcnode-id="5740" instrument_node="">Fu et al., 2015</span></a><span data-dcnode-id="5738" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5736" href="#bib0080" name="bbib0080"><span data-dcnode-id="5737" instrument_node="">Jiang et al., 2016</span></a><span data-dcnode-id="5735" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5733" href="#bib0145" name="bbib0145"><span data-dcnode-id="5734" instrument_node="">Parmesan and Yohe, 2003</span></a><span data-dcnode-id="5732" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5730" href="#bib0160" name="bbib0160"><span data-dcnode-id="5731" instrument_node="">Piao et al., 2015</span></a><span data-dcnode-id="5729" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5727" href="#bib0170" name="bbib0170"><span data-dcnode-id="5728" instrument_node="">Polgar and Primack, 2011</span></a><span data-dcnode-id="5726" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5724" href="#bib0195" name="bbib0195"><span data-dcnode-id="5725" instrument_node="">Root et al., 2003</span></a><span data-dcnode-id="5723" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5721" href="#bib0205" name="bbib0205"><span data-dcnode-id="5722" instrument_node="">Shen et al., 2014</span></a><span data-dcnode-id="5720" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5718" href="#bib0225" name="bbib0225"><span data-dcnode-id="5719" instrument_node="">Wolkovich et al., 2012</span></a><span data-dcnode-id="5717" instrument_node="">). However, much less is known about climate-driven changes in phenology within subtropical and tropical regions. This is likely due to the relative scarcity of long-term field observations of plant phenology in tropical and subtropical systems (</span><a class="workspace-trigger" data-dcnode-id="5715" href="#bib0140" name="bbib0140"><span data-dcnode-id="5716" instrument_node="">Park and Schwartz, 2015</span></a><span data-dcnode-id="5714" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5712" href="#bib0180" name="bbib0180"><span data-dcnode-id="5713" instrument_node="">Primack and Miller-Rushing, 2011</span></a><span data-dcnode-id="5711" instrument_node="">).</span></p><p data-dcnode-id="5682" id="par0025"><span data-dcnode-id="5705"><span data-dcnode-id="5709" instrument_node="">The three factors considered to be most important for controlling plant phenology in temperate and boreal trees are winter chilling, </span><a class="topic-link" data-dcnode-id="5707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/photoperiod" title="Learn more about photoperiod from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5708" instrument_node="">photoperiod</span></a><span data-dcnode-id="5706" instrument_node=""> (i.e., spring day length) and spring warming temperature (</span></span><a class="workspace-trigger" data-dcnode-id="5703" href="#bib0095" name="bbib0095"><span data-dcnode-id="5704" instrument_node="">Korner and Basler, 2010</span></a><span data-dcnode-id="5702" instrument_node="">). The adaptive advantage of having a chilling requirement is to avoid reliance on warm temperatures alone, which can result in fatal damage if freezing weather returns (</span><a class="workspace-trigger" data-dcnode-id="5700" href="#bib0120" name="bbib0120"><span data-dcnode-id="5701" instrument_node="">Morin and Chuine, 2014</span></a><span data-dcnode-id="5699" instrument_node="">). Likewise, sensitivity to photoperiod can protect plants from similar types of damage, since it provides additional protection against plants leafing out too soon in the spring (</span><a class="workspace-trigger" data-dcnode-id="5697" href="#bib0085" name="bbib0085"><span data-dcnode-id="5698" instrument_node="">Keskitalo et al., 2005</span></a><span data-dcnode-id="5696" instrument_node="">). In temperate regions, plants need a certain duration of chilling conditions to break dormancy. Specifically, if chilling requirements are not met, a warm autumn and winter can lead to delayed phenology in the spring (</span><a class="workspace-trigger" data-dcnode-id="5694" href="#bib0125" name="bbib0125"><span data-dcnode-id="5695" instrument_node="">Morin et al., 2009</span></a><span data-dcnode-id="5693" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5691" href="#bib0230" name="bbib0230"><span data-dcnode-id="5692" instrument_node="">Yu et al., 2010</span></a><span data-dcnode-id="5690" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="5688" href="#bib0060" name="bbib0060"><span data-dcnode-id="5689" instrument_node="">Fu et al. (2015)</span></a><span data-dcnode-id="5683"><span data-dcnode-id="5687" instrument_node=""> found that leaf unfolding has become significantly less sensitive to climate warming in European tree species from 1980 to 2013, and that the declining sensitivity could be simulated by chilling-based phenology models. Together, this suggests that strong winter warming in the future may further reduce sensitivity and therefore result in a slowdown of tree spring phenology. Plants with chilling requirements in milder regions, including the </span><a class="topic-link" data-dcnode-id="5685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/subtropics" title="Learn more about subtropics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5686" instrument_node="">subtropics</span></a><span data-dcnode-id="5684" instrument_node="">, may suffer in the coming decades from abbreviated chilling periods under continued climate warming.</span></span></p><p data-dcnode-id="5650" id="par0030"><span data-dcnode-id="5681" instrument_node="">Unravelling the mechanisms that drive tree phenology in response to environmental cues using manipulative experiments is challenging due to the size of adult individuals. This problem has forced researchers to use either young trees or cuttings as substitutes for adult individuals (</span><a class="workspace-trigger" data-dcnode-id="5679" href="#bib0100" name="bbib0100"><span data-dcnode-id="5680" instrument_node="">Laube et al., 2014</span></a><span data-dcnode-id="5678" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5676" href="#bib0175" name="bbib0175"><span data-dcnode-id="5677" instrument_node="">Primack et al., 2015</span></a><span data-dcnode-id="5675" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5673" href="#bib0220" name="bbib0220"><span data-dcnode-id="5674" instrument_node="">Vitasse and Basler, 2014</span></a><span data-dcnode-id="5672" instrument_node="">). Past studies have shown that twigs from adult trees can be used as an effective replacement for the full adult in warming and photoperiod experiments (</span><a class="workspace-trigger" data-dcnode-id="5670" href="#bib0005" name="bbib0005"><span data-dcnode-id="5671" instrument_node="">Basler and Korner, 2012</span></a><span data-dcnode-id="5669" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5667" href="#bib0100" name="bbib0100"><span data-dcnode-id="5668" instrument_node="">Laube et al., 2014</span></a><span data-dcnode-id="5666" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5664" href="#bib0165" name="bbib0165"><span data-dcnode-id="5665" instrument_node="">Polgar et al., 2014</span></a><span data-dcnode-id="5663" instrument_node="">). However, almost all twig-cutting experiments published to date have focused on temperate species. Overall, photoperiod appears to play a relatively minor role, whereas spring forcing (warming) and winter chilling tend to be the dominant drivers of spring phenology (</span><a class="workspace-trigger" data-dcnode-id="5661" href="#bib0040" name="bbib0040"><span data-dcnode-id="5662" instrument_node="">Cook et al., 2012</span></a><span data-dcnode-id="5660" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5658" href="#bib0100" name="bbib0100"><span data-dcnode-id="5659" instrument_node="">Laube et al., 2014</span></a><span data-dcnode-id="5657" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5655" href="#bib0165" name="bbib0165"><span data-dcnode-id="5656" instrument_node="">Polgar et al., 2014</span></a><span data-dcnode-id="5654" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5652" href="#bib0240" name="bbib0240"><span data-dcnode-id="5653" instrument_node="">Zohner et al., 2016</span></a><span data-dcnode-id="5651" instrument_node="">).</span></p><p data-dcnode-id="5629" id="par0035"><span data-dcnode-id="5645"><span data-dcnode-id="5649" instrument_node="">The mechanisms regulating the phenology of leaf out, flowering, and leaf senescence in subtropical and tropical </span><a class="topic-link" data-dcnode-id="5647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/ecoregions" title="Learn more about ecoregions from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5648" instrument_node="">ecoregions</span></a><span data-dcnode-id="5646" instrument_node=""> remain largely unknown (</span></span><a class="workspace-trigger" data-dcnode-id="5643" href="#bib0025" name="bbib0025"><span data-dcnode-id="5644" instrument_node="">Chen et al., 2017</span></a><span data-dcnode-id="5642" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5640" href="#bib0235" name="bbib0235"><span data-dcnode-id="5641" instrument_node="">Zhao et al., 2013</span></a><span data-dcnode-id="5639" instrument_node="">). It remains unclear, for example, the degree to which the phenologies of subtropical and tropical species are influenced by chilling requirement, photoperiod and spring warming (</span><a class="workspace-trigger" data-dcnode-id="5637" href="#bib0010" name="bbib0010"><span data-dcnode-id="5638" instrument_node="">Borchert et al., 2005</span></a><span data-dcnode-id="5636" instrument_node="">). It also remains unclear whether twig cutting experiments are suitable for evergreen species. In subtropical and tropical regions, temperatures rarely descend below 5 °C, which is the typical minimum temperature needed for most temperate plants to meet their winter chilling requirement (</span><a class="workspace-trigger" data-dcnode-id="5634" href="#bib0065" name="bbib0065"><span data-dcnode-id="5635" instrument_node="">Ghelardini et al., 2010</span></a><span data-dcnode-id="5633" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5631" href="#bib0220" name="bbib0220"><span data-dcnode-id="5632" instrument_node="">Vitasse and Basler, 2014</span></a><span data-dcnode-id="5630" instrument_node="">). Therefore, subtropical and tropical plants are often not exposed to the temperatures that are involved in winter chilling in temperate plants, so it is not known whether they have a winter chilling requirement, or if it is the same as the winter chilling requirement of temperate species.</span></p><p data-dcnode-id="5627" id="par0040"><span data-dcnode-id="5628" instrument_node="">In this study, we present our results from a climate chamber experiment conducted using 37 subtropical woody species. We studied the effects of photoperiod and chilling, as well as their interactions, on spring forcing requirements for budburst. We tested: (i) whether the spring phenology of subtropical species is sensitive to photoperiod, and/or whether they possess a strong chilling requirement；(ii) which factor is more important in influencing spring budburst: chilling or photoperiod?; (iii) do the chilling and forcing requirements differ between functional groups (i.e., evergreen vs. deciduous species, tree vs. shrub, and light vs shade-tolerant species) and are there differences between subtropical and the better-studied temperate species?</span></p></section><section data-dcnode-id="5459" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5622" id="sect0025"><span data-dcnode-id="5625" instrument_node="">2</span><span data-dcnode-id="5624" instrument_node="">. </span><span data-dcnode-id="5623" instrument_node="">Materials and methods</span></h2><section data-dcnode-id="5595" id="sec0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5618" id="sect0030"><span data-dcnode-id="5621" instrument_node="">2.1</span><span data-dcnode-id="5620" instrument_node="">. </span><span data-dcnode-id="5619" instrument_node="">Sampling region</span></h3><p data-dcnode-id="5596" id="par0045"><span data-dcnode-id="5613"><span data-dcnode-id="5617" instrument_node="">We selected adults from 37 species within a 24-ha permanent plot (29°15.101’－29°15.344’N, 118°07.010’ －118°07.400’E) in Gutianshan Nature Reserve (GNNR), Kaihua County, Zhejiang Province in eastern China. The dominant </span><a class="topic-link" data-dcnode-id="5615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/vegetation-types" title="Learn more about vegetation type from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5616" instrument_node="">vegetation type</span></a><span data-dcnode-id="5614" instrument_node=""> in GNNR is subtropical evergreen broad-leaved forest dominated by </span></span><span data-dcnode-id="5609"><em data-dcnode-id="5610"><a class="topic-link" data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/castanopsis" title="Learn more about Castanopsis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5612" instrument_node="">Castanopsis</span></a></em></span><span data-dcnode-id="5608" instrument_node=""> spp., </span><span data-dcnode-id="5604"><em data-dcnode-id="5605"><a class="topic-link" data-dcnode-id="5606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/quercus" title="Learn more about Cyclobalanopsis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5607" instrument_node="">Cyclobalanopsis</span></a></em></span><span data-dcnode-id="5603" instrument_node=""> spp. and </span><em data-dcnode-id="5601"><span data-dcnode-id="5602" instrument_node="">Schima superba</span></em><span data-dcnode-id="5600" instrument_node="">. The mean annual temperature is 15.3 °C. The hottest month is July, with a mean temperature of 27.9 °C, and the coldest is January, with a mean temperature of 4.3 °C. The mean annual precipitation is 1787 mm, with seasonal distribution. There are two wet seasons, from March to June and in September, and two dry seasons, from July to August and October to February. The number of mean frost-free days per year is 250. Elevation ranged from 446 m to 715 m. Within the plot, all woody stems ≥ 1 cm diameter at breast height (DBH) were mapped, measured, identified and tagged in 2005 (</span><a class="workspace-trigger" data-dcnode-id="5598" href="#bib0105" name="bbib0105"><span data-dcnode-id="5599" instrument_node="">Legendre et al., 2009</span></a><span data-dcnode-id="5597" instrument_node="">). There was a total of 140,700 individuals belonging to 159 species in the plot.</span></p></section><section data-dcnode-id="5571" id="sec0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5591" id="sect0035"><span data-dcnode-id="5594" instrument_node="">2.2</span><span data-dcnode-id="5593" instrument_node="">. </span><span data-dcnode-id="5592" instrument_node="">Experiment</span></h3><p data-dcnode-id="5589" id="par0050"><span data-dcnode-id="5590" instrument_node="">These 37 species cover a variety of different functional groups, including light- demanding and shade-tolerant species, evergreen and deciduous species, and shrub and tree species. For each species, we randomly selected three donor trees in the plot, and six twigs were cut from each donor tree. Nineteen individuals from eight species were selected outside the plot, but within 3 km in the same forest, because some individuals of these species were too tall to collect from in the plot. Because some species had less than 3 donor tree individuals in and outside the plot, or some individuals were too high to cut, some species had less than 18 twigs for each cutting date. We sampled 1844 individuals from 37 species over three cutting dates. Although upper and lower canopy twigs may have differed slightly in bud-burst timing, all twigs were cut from the lower canopy of trees in our study. Because all trees were equally affected, we believe this sampling should be largely unbiased.</span></p><p data-dcnode-id="5577" id="par0055"><span data-dcnode-id="5584"><span data-dcnode-id="5588" instrument_node="">We implemented a fully reciprocal climate chamber experiment using three chilling and three </span><a class="topic-link" data-dcnode-id="5586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/photoperiod" title="Learn more about photoperiod from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5587" instrument_node="">photoperiod</span></a><span data-dcnode-id="5585" instrument_node=""> treatments to investigate budburst during an 8-week forcing period. Different chilling treatments (C1–C3, low to high) were designated according to how long the twigs were exposed to outdoor chilling conditions (for rough estimates of chilling conditions, see Table S1). Twig cutting was conducted on December 31 (C1), February 5 (C2) and February 28 (C3), dividing the chilling days into approximately 15-day intervals. The second cutting would have occurred a few days earlier, but heavy snow on February 1 prevented us from climbing the mountain until February 5. Climate chambers differed in photoperiod treatment, with daily photoperiods of 10, 12 and 14 h (P10, P12 and P14). These values roughly mirror the range in day length at this latitude (from 10.1 h to 13.9 h). Photon flux in all chambers was approximately 165 μmol m</span></span><sup data-dcnode-id="5579"><span data-dcnode-id="5583" instrument_node="">−2 s</span><sup data-dcnode-id="5581"><span data-dcnode-id="5582" instrument_node="">−</span></sup><span data-dcnode-id="5580" instrument_node="">2</span></sup><span data-dcnode-id="5578" instrument_node="">. The temperature was maintained at 25 °C in the chambers for both photoperiod and chilling treatments.</span></p><p data-dcnode-id="5572" id="par0060"><span data-dcnode-id="5576" instrument_node="">Samples were prepared according to the method described in </span><a class="workspace-trigger" data-dcnode-id="5574" href="#bib0005" name="bbib0005"><span data-dcnode-id="5575" instrument_node="">Basler and Korner (2012)</span></a><span data-dcnode-id="5573" instrument_node="">. Twigs were cut to a length of 30–40 cm. Twigs were then cleaned, disinfected with commercial hypochlorite solution, and put into 250 ml plastic bottles with 200 ml tap water. For each species, 6 replicate twigs (originating from two to three donor trees) were kept in each chamber. Nine climate chambers were used. Twigs were washed every week to remove mold growing on the stem, and they were also trimmed 1 cm each week when the water was changed. The bud developmental stage was recorded three times per week. Twigs that had not reached budburst by the end of week eight were removed from the chambers.</span></p></section><section data-dcnode-id="5491" id="sec0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5567" id="sect0040"><span data-dcnode-id="5570" instrument_node="">2.3</span><span data-dcnode-id="5569" instrument_node="">. </span><span data-dcnode-id="5568" instrument_node="">Trait and weather data</span></h3><div data-dcnode-id="5492"><p data-dcnode-id="5531" id="par0065"><span data-dcnode-id="5566" instrument_node="">For four species (</span><span data-dcnode-id="5560"><em data-dcnode-id="5563"><a class="topic-link" data-dcnode-id="5564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/machilus" title="Learn more about Machilus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5565" instrument_node="">Machilus</span></a></em><em data-dcnode-id="5561"><span data-dcnode-id="5562" instrument_node=""> thunbergii</span></em></span><span data-dcnode-id="5559" instrument_node="">, </span><em data-dcnode-id="5557"><span data-dcnode-id="5558" instrument_node="">Cyclobalanopsis glauca</span></em><span data-dcnode-id="5556" instrument_node="">, </span><em data-dcnode-id="5554"><span data-dcnode-id="5555" instrument_node="">Machilus grijsii</span></em><span data-dcnode-id="5553" instrument_node="">, and </span><span data-dcnode-id="5547"><em data-dcnode-id="5550"><a class="topic-link" data-dcnode-id="5551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/michelia" title="Learn more about Michelia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5552" instrument_node="">Michelia</span></a></em><em data-dcnode-id="5548"><span data-dcnode-id="5549" instrument_node=""> skinnneriana</span></em></span><span data-dcnode-id="5546" instrument_node="">), all twigs died during the experiment, and these species were thus removed from analyses. The remaining 33 species achieved budburst during the experiment (</span><a class="workspace-trigger" data-dcnode-id="5544" href="#fig0005" name="bfig0005"><span data-dcnode-id="5545" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5543" instrument_node="">). Therefore, only 33 species are listed in the Supporting Information Table S2. Shade tolerance information for species was obtained from </span><a class="workspace-trigger" data-dcnode-id="5541" href="#bib0210" name="bbib0210"><span data-dcnode-id="5542" instrument_node="">Song (2014)</span></a><span data-dcnode-id="5532"><span data-dcnode-id="5540" instrument_node="">. Because the trees are tall and the </span><a class="topic-link" data-dcnode-id="5538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/overstory" title="Learn more about overstory from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5539" instrument_node="">overstory</span></a><span data-dcnode-id="5533"><span data-dcnode-id="5537" instrument_node=""> is shaded, it was hard to monitor budburst in our </span><a class="topic-link" data-dcnode-id="5535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/evergreen-forest" title="Learn more about evergreen forest from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5536" instrument_node="">evergreen forest</span></a><span data-dcnode-id="5534" instrument_node="">. Field weather data was obtained from an adjacent meteorological station (&lt;3 km from the field site).</span></span></span></p><figure class="figure text-xs" data-dcnode-id="5493" id="fig0005"><span data-dcnode-id="5515"><img alt="Fig. 1" aria-describedby="cap0005" data-dcnode-id="5530" height="253" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-gr1.jpg&amp;raw"><span data-dcnode-id="5529" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5516"><li data-dcnode-id="5523"><a class="anchor download-link u-font-sans" data-dcnode-id="5524" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-gr1_lrg.jpg" target="_blank" title="Download high-res image (416KB)"><span class="anchor-text" data-dcnode-id="5525"><span data-dcnode-id="5528" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5526"><span data-dcnode-id="5527" instrument_node="">Download high-res image (416KB)</span></span></span></a></li><li data-dcnode-id="5517"><a class="anchor download-link u-font-sans" data-dcnode-id="5518" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5519"><span data-dcnode-id="5522" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5520"><span data-dcnode-id="5521" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5494"><span data-dcnode-id="5495" id="cap0005"><p data-dcnode-id="5496" id="spar0005"><span class="label" data-dcnode-id="5513"><span data-dcnode-id="5514" instrument_node="">Fig. 1</span></span><span data-dcnode-id="5512" instrument_node="">. </span><span data-dcnode-id="5503"><span data-dcnode-id="5507"><span data-dcnode-id="5511" instrument_node="">Examples of twigs sampled for use in the </span><a class="topic-link" data-dcnode-id="5509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/budburst" title="Learn more about budburst from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5510" instrument_node="">budburst</span></a><span data-dcnode-id="5508" instrument_node=""> experiment. We show that twigs can be used to study the influence of chilling and </span></span><a class="topic-link" data-dcnode-id="5505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/photoperiod" title="Learn more about photoperiod from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5506" instrument_node="">photoperiod</span></a><span data-dcnode-id="5504" instrument_node=""> on evergreen species. (A) </span></span><em data-dcnode-id="5501"><span data-dcnode-id="5502" instrument_node="">Rhododendron ovatum</span></em><span data-dcnode-id="5500" instrument_node="">; (B) </span><em data-dcnode-id="5498"><span data-dcnode-id="5499" instrument_node="">Illicium lanceolatum</span></em><span data-dcnode-id="5497" instrument_node="">.</span></p></span></span></figure></div></section><section data-dcnode-id="5460" id="sec0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5487" id="sect0045"><span data-dcnode-id="5490" instrument_node="">2.4</span><span data-dcnode-id="5489" instrument_node="">. </span><span data-dcnode-id="5488" instrument_node="">Analysis</span></h3><p data-dcnode-id="5485" id="par0070"><span data-dcnode-id="5486" instrument_node="">Twigs that did not achieve budburst within eight weeks were considered dead and were thus removed from analysis. In the end, 1135 out of the original 1771 twigs (64%) from 33 species were used for analysis.</span></p><p data-dcnode-id="5477" id="par0075"><span data-dcnode-id="5484" instrument_node="">After each collection period, we calculated the days between collection and bud-burst dates for each twig. The total amount of forcing until budburst was then used as the response variable in our models. Chilling days were calculated as the number of days after November 1 on which the mean temperature was below 5 °C (</span><a class="workspace-trigger" data-dcnode-id="5482" href="#bib0130" name="bbib0130"><span data-dcnode-id="5483" instrument_node="">Murray et al., 1989</span></a><span data-dcnode-id="5481" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5479" href="#bib0170" name="bbib0170"><span data-dcnode-id="5480" instrument_node="">Polgar and Primack, 2011</span></a><span data-dcnode-id="5478" instrument_node="">). The thermal unit of forcing is the sum of degree days, with the starting date of accumulation as January 1 with a base threshold of 0 °C, which encompasses field and experimental temperatures for forcing units.</span></p><p data-dcnode-id="5466" id="par0080"><span data-dcnode-id="5476" instrument_node="">We used generalized linear models (GLM) with a binomial error distribution to assess the effect of chilling and photoperiod on species’ ability to reach budburst. Models with or without interaction terms between photoperiod and chilling were compared using Akaike’s Information Criterion (AIC). Models without the interaction term had the smallest AIC value, and were chosen for reporting. Due to the limited treatment period of eight weeks, the response (forcing sums) may be skewed right where budburst is not observed within the 8-week period. Survival analyses were then performed using the ‘survival’ package (</span><a class="workspace-trigger" data-dcnode-id="5474" href="#bib0215" name="bbib0215"><span data-dcnode-id="5475" instrument_node="">Therneau, 2013</span></a><span data-dcnode-id="5473" instrument_node="">). The ‘survival’ in our analysis is equivalent to ‘no budburst’, while medians are Kaplan–Meier estimates of the forcing sum at which 50% of the twigs reached budburst (</span><a class="workspace-trigger" data-dcnode-id="5471" href="#bib0100" name="bbib0100"><span data-dcnode-id="5472" instrument_node="">Laube et al., 2014</span></a><span data-dcnode-id="5470" instrument_node="">). The statistical significance of the treatment and functional group effects on the forcing sums was assessed using a nonparametric log-rank test, which is based on differences in survival curves (</span><a class="workspace-trigger" data-dcnode-id="5468" href="#bib0070" name="bbib0070"><span data-dcnode-id="5469" instrument_node="">Harrington and Fleming, 1982</span></a><span data-dcnode-id="5467" instrument_node="">).</span></p><p data-dcnode-id="5461" id="par0085"><span data-dcnode-id="5465" instrument_node="">All calculations were performed using the R statistical software (</span><a class="workspace-trigger" data-dcnode-id="5463" href="#bib0185" name="bbib0185"><span data-dcnode-id="5464" instrument_node="">R Core Team, 2017</span></a><span data-dcnode-id="5462" instrument_node="">).</span></p></section></section><section data-dcnode-id="3957" id="sec0035"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5455" id="sect0050"><span data-dcnode-id="5458" instrument_node="">3</span><span data-dcnode-id="5457" instrument_node="">. </span><span data-dcnode-id="5456" instrument_node="">Results</span></h2><section data-dcnode-id="4290" id="sec0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5451" id="sect0055"><span data-dcnode-id="5454" instrument_node="">3.1</span><span data-dcnode-id="5453" instrument_node="">. </span><span data-dcnode-id="5452" instrument_node="">Effects of chilling and photoperiod on budburst</span></h3><div data-dcnode-id="5406"><p data-dcnode-id="5438" id="par0090"><span data-dcnode-id="5446"><span data-dcnode-id="5450" instrument_node="">Sixty-four percent of twigs achieved </span><a class="topic-link" data-dcnode-id="5448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/budburst" title="Learn more about budburst from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5449" instrument_node="">budburst</span></a><span data-dcnode-id="5447" instrument_node=""> for these 33 species (1135/1771). We observed no differences in the percentages of species reaching budburst between deciduous species, 64.1% (582/908), and evergreen species, 64.0% (553/863). The percentage of cuttings that achieved budburst in the low chilling treatment was 53.4% (N = 585), followed by moderate chilling (68.1%; N = 592) and high chilling (72.3%; N = 594). Generally, cuttings in the longer-day treatments achieved a higher percentage of budburst (</span></span><a class="workspace-trigger" data-dcnode-id="5444" href="#fig0010" name="bfig0010"><span data-dcnode-id="5445" instrument_node="">Fig. 2</span></a><span data-dcnode-id="5439"><span data-dcnode-id="5443" instrument_node="">), and the differences in budburst among </span><a class="topic-link" data-dcnode-id="5441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/photoperiod" title="Learn more about photoperiod from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5442" instrument_node="">photoperiod</span></a><span data-dcnode-id="5440" instrument_node=""> treatments were 13.7% for both the C1 (between C1-P10 and C1-P14) and C2 (between C2-P10 and C2-P14) treatments.</span></span></p><figure class="figure text-xs" data-dcnode-id="5407" id="fig0010"><span data-dcnode-id="5422"><img alt="Fig. 2" aria-describedby="cap0010" data-dcnode-id="5437" height="241" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-gr2.jpg&amp;raw"><span data-dcnode-id="5436" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5423"><li data-dcnode-id="5430"><a class="anchor download-link u-font-sans" data-dcnode-id="5431" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-gr2_lrg.jpg" target="_blank" title="Download high-res image (116KB)"><span class="anchor-text" data-dcnode-id="5432"><span data-dcnode-id="5435" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">Download high-res image (116KB)</span></span></span></a></li><li data-dcnode-id="5424"><a class="anchor download-link u-font-sans" data-dcnode-id="5425" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5426"><span data-dcnode-id="5429" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5427"><span data-dcnode-id="5428" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5408"><span data-dcnode-id="5409" id="cap0010"><p data-dcnode-id="5410" id="spar0010"><span class="label" data-dcnode-id="5420"><span data-dcnode-id="5421" instrument_node="">Fig. 2</span></span><span data-dcnode-id="5419" instrument_node="">. </span><span data-dcnode-id="5414"><span data-dcnode-id="5418" instrument_node="">The percentage of twigs that achieved </span><a class="topic-link" data-dcnode-id="5416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/budburst" title="Learn more about budburst from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5417" instrument_node="">budburst</span></a><span data-dcnode-id="5415" instrument_node=""> during the chilling and </span></span><a class="topic-link" data-dcnode-id="5412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/photoperiod" title="Learn more about photoperiod from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5413" instrument_node="">photoperiod</span></a><span data-dcnode-id="5411" instrument_node=""> treatments. Chilling C1: low chilling, C2: moderate chilling, C3: high chilling. Photoperiod P10: 10 h, P12: 12 h, P14: 14 h daily photoperiod.</span></p></span></span></figure></div><div data-dcnode-id="4332"><p data-dcnode-id="5382" id="par0095"><span data-dcnode-id="5405" instrument_node="">Greater chilling significantly enhanced budburst for 48.5% (16/33 species) of species (</span><a class="workspace-trigger" data-dcnode-id="5403" href="#tbl0005" name="btbl0005"><span data-dcnode-id="5404" instrument_node="">Table 1</span></a><span data-dcnode-id="5402" instrument_node="">). Both the chilling 2 and chilling 3 treatments significantly and positively affected budburst for five species: </span><em data-dcnode-id="5400"><span data-dcnode-id="5401" instrument_node="">Acer cordatum</span></em><span data-dcnode-id="5399" instrument_node="">, </span><em data-dcnode-id="5397"><span data-dcnode-id="5398" instrument_node="">Meliosma oldhamii</span></em><span data-dcnode-id="5396" instrument_node="">, </span><span data-dcnode-id="5390"><em data-dcnode-id="5393"><a class="topic-link" data-dcnode-id="5394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/styrax" title="Learn more about Styrax from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5395" instrument_node="">Styrax</span></a></em><em data-dcnode-id="5391"><span data-dcnode-id="5392" instrument_node=""> odoratissimus</span></em></span><span data-dcnode-id="5389" instrument_node="">, </span><em data-dcnode-id="5387"><span data-dcnode-id="5388" instrument_node="">Cleyera japonica</span></em><span data-dcnode-id="5386" instrument_node=""> and </span><em data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">Adinandra millettii</span></em><span data-dcnode-id="5383" instrument_node="">, while 11 species showed a significantly enhanced budburst ability in either the chilling 2 or chilling 3 treatments.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4333" id="tbl0005"><span class="captions" data-dcnode-id="5352"><span data-dcnode-id="5353" id="cap0025"><p data-dcnode-id="5354" id="spar0025"><span class="label" data-dcnode-id="5380"><span data-dcnode-id="5381" instrument_node="">Table 1</span></span><span data-dcnode-id="5379" instrument_node="">. </span><span data-dcnode-id="5370"><span data-dcnode-id="5378" instrument_node="">Significant effects of chilling and </span><a class="topic-link" data-dcnode-id="5376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/photoperiod" title="Learn more about photoperiod from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5377" instrument_node="">photoperiod</span></a><span data-dcnode-id="5371"><span data-dcnode-id="5375" instrument_node=""> treatments on species’ ability to reach </span><a class="topic-link" data-dcnode-id="5373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/budburst" title="Learn more about budburst from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5374" instrument_node="">budburst</span></a><span data-dcnode-id="5372" instrument_node="">. Calculations were performed with binomial generalized linear models. Models without interaction terms showed lower Akaike’s Information Criterion (AIC) values, hence p-values refer to models without interaction terms. C: chilling, P: photoperiod, C2/C1: </span></span></span><em data-dcnode-id="5368"><span data-dcnode-id="5369" instrument_node="">P</span></em><span data-dcnode-id="5367" instrument_node=""> value of difference between moderate chilling and low chilling, C3/C1: </span><em data-dcnode-id="5365"><span data-dcnode-id="5366" instrument_node="">P</span></em><span data-dcnode-id="5364" instrument_node=""> value of difference between high chilling and low chilling, P12/P10: </span><em data-dcnode-id="5362"><span data-dcnode-id="5363" instrument_node="">P</span></em><span data-dcnode-id="5361" instrument_node=""> value of difference between P12 and P10, P14/P10: </span><em data-dcnode-id="5359"><span data-dcnode-id="5360" instrument_node="">P</span></em><span data-dcnode-id="5358" instrument_node=""> value of difference between P14 and P10. Number: number of twigs with budburst per chilling treatment, tot: total number, bb: number with budburst within treatment period (8 weeks), ns: not significant (</span><em data-dcnode-id="5356"><span data-dcnode-id="5357" instrument_node="">P</span></em><span data-dcnode-id="5355" instrument_node=""> &gt;  0.10).</span></p></span></span><div class="groups" data-dcnode-id="4334"><table data-dcnode-id="4335"><thead class="valign-top" data-dcnode-id="5296"><tr data-dcnode-id="5331"><t
