<span data-dcnode-id="4368" instrument_node="">12</span></td></tr><tr data-dcnode-id="4337"><th class="align-left" data-dcnode-id="4363" scope="row"><em data-dcnode-id="4364"><span data-dcnode-id="4365" instrument_node="">Tutcheria microcarpa</span></em></th><td class="align-left" data-dcnode-id="4361"><span data-dcnode-id="4362" instrument_node="">Theaceae</span></td><td class="align-left" data-dcnode-id="4359"><span data-dcnode-id="4360" instrument_node="">ns</span></td><td class="align-left" data-dcnode-id="4357"><span data-dcnode-id="4358" instrument_node="">ns</span></td><td class="align-left" data-dcnode-id="4354"><strong data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">0.039</span></strong></td><td class="align-left" data-dcnode-id="4352"><span data-dcnode-id="4353" instrument_node="">ns</span></td><td class="align-left" data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">ns</span></td><td class="align-left" data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">18</span></td><td class="align-left" data-dcnode-id="4346"><span data-dcnode-id="4347" instrument_node="">9</span></td><td class="align-left" data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">17</span></td><td class="align-left" data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">9</span></td><td class="align-left" data-dcnode-id="4340"><span data-dcnode-id="4341" instrument_node="">18</span></td><td class="align-left" data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">15</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="4312" id="par0100"><span data-dcnode-id="4327"><span data-dcnode-id="4331" instrument_node="">Generally, species of the same family showed similar responses to chilling. For example, all three species in the family Styracaeae and three of the four species in the family </span><a class="topic-link" data-dcnode-id="4329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/theaceae" title="Learn more about Theaceae from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4330" instrument_node="">Theaceae</span></a><span data-dcnode-id="4328" instrument_node=""> showed increased budburst rates with longer chilling times (</span></span><a class="workspace-trigger" data-dcnode-id="4325" href="#tbl0005" name="btbl0005"><span data-dcnode-id="4326" instrument_node="">Table 1</span></a><span data-dcnode-id="4316"><span data-dcnode-id="4320"><span data-dcnode-id="4324" instrument_node="">). However, the budburst rate was not significantly enhanced for all four species in the family </span><a class="topic-link" data-dcnode-id="4322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/rosaceae" title="Learn more about Rosaceae from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4323" instrument_node="">Rosaceae</span></a><span data-dcnode-id="4321" instrument_node=""> or for three of the four species in the family </span></span><a class="topic-link" data-dcnode-id="4318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/ericaceae" title="Learn more about Ericaceae from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4319" instrument_node="">Ericaceae</span></a><span data-dcnode-id="4317" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="4314" href="#tbl0005" name="btbl0005"><span data-dcnode-id="4315" instrument_node="">Table 1</span></a><span data-dcnode-id="4313" instrument_node="">).</span></p><p data-dcnode-id="4291" id="par0105"><span data-dcnode-id="4311" instrument_node="">Longer day length only enhanced the budburst rate for two species: </span><em data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">Meliosma oldhamii</span></em><span data-dcnode-id="4308" instrument_node=""> and </span><span data-dcnode-id="4302"><em data-dcnode-id="4305"><a class="topic-link" data-dcnode-id="4306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/prunus" title="Learn more about Prunus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4307" instrument_node="">Prunus</span></a></em><em data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node=""> schneideriana</span></em></span><span data-dcnode-id="4301" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="4299" href="#tbl0005" name="btbl0005"><span data-dcnode-id="4300" instrument_node="">Table 1</span></a><span data-dcnode-id="4298" instrument_node="">). </span><em data-dcnode-id="4296"><span data-dcnode-id="4297" instrument_node="">Meliosma oldhamii</span></em><span data-dcnode-id="4295" instrument_node=""> had a significantly higher budburst rate in the P12 and P14 than the P10 (P10: 16%, P12: 44%, P14: 50%), while </span><em data-dcnode-id="4293"><span data-dcnode-id="4294" instrument_node="">Prunus schneideriana</span></em><span data-dcnode-id="4292" instrument_node=""> only had a significantly higher budburst rate in P14 than P10 (P10: 72%, P12: 78%, P14: 94%).</span></p></section><section data-dcnode-id="4151" id="sec0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4286" id="sect0060"><span data-dcnode-id="4289" instrument_node="">3.2</span><span data-dcnode-id="4288" instrument_node="">. </span><span data-dcnode-id="4287" instrument_node="">Effects of chilling and photoperiod on forcing requirements</span></h3><div data-dcnode-id="4229"><p data-dcnode-id="4260" id="par0110"><span data-dcnode-id="4285" instrument_node="">We found that increased chilling advanced budburst. The median days until budburst were 39 days for C1, 17 days for C2, and 13 days for C3 (</span><a class="workspace-trigger" data-dcnode-id="4283" href="#fig0015" name="bfig0015"><span data-dcnode-id="4284" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4282" instrument_node="">a). The C3 treatment advanced budburst significantly compared to C2, and C2 advanced budburst significantly compared to C1 (</span><a class="workspace-trigger" data-dcnode-id="4280" href="#fig0015" name="bfig0015"><span data-dcnode-id="4281" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4279" instrument_node="">a; </span><em data-dcnode-id="4277"><span data-dcnode-id="4278" instrument_node="">P</span></em><span data-dcnode-id="4276" instrument_node=""> &lt; 0.001). For photoperiod, only the P14 treatment (median = 17 days) advanced budburst significantly when compared to P10 (</span><a class="workspace-trigger" data-dcnode-id="4274" href="#fig0015" name="bfig0015"><span data-dcnode-id="4275" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4273" instrument_node="">b; </span><em data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">P</span></em><span data-dcnode-id="4270" instrument_node=""> =  0.013). No significant advance was found in budburst between P10 (21 days) and P12 (19 days; </span><em data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">P</span></em><span data-dcnode-id="4267" instrument_node=""> =  0.42), nor between P12 and P14 (</span><em data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">P</span></em><span data-dcnode-id="4264" instrument_node=""> =  0.06). Of the 36 paired treatments, 23 differed significantly in the number of days until budburst (</span><a class="workspace-trigger" data-dcnode-id="4262" href="#fig0015" name="bfig0015"><span data-dcnode-id="4263" instrument_node="">Fig. 3</span></a><span data-dcnode-id="4261" instrument_node="">c; Table S3).</span></p><figure class="figure text-xs" data-dcnode-id="4230" id="fig0015"><span data-dcnode-id="4244"><img alt="Fig. 3" aria-describedby="cap0015" data-dcnode-id="4259" height="708" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-gr3.jpg&amp;raw"><span data-dcnode-id="4258" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4245"><li data-dcnode-id="4252"><a class="anchor download-link u-font-sans" data-dcnode-id="4253" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-gr3_lrg.jpg" target="_blank" title="Download high-res image (505KB)"><span class="anchor-text" data-dcnode-id="4254"><span data-dcnode-id="4257" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4255"><span data-dcnode-id="4256" instrument_node="">Download high-res image (505KB)</span></span></span></a></li><li data-dcnode-id="4246"><a class="anchor download-link u-font-sans" data-dcnode-id="4247" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4248"><span data-dcnode-id="4251" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4249"><span data-dcnode-id="4250" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4231"><span data-dcnode-id="4232" id="cap0015"><p data-dcnode-id="4233" id="spar0015"><span class="label" data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">Fig. 3</span></span><span data-dcnode-id="4241" instrument_node="">. </span><span data-dcnode-id="4237"><a class="topic-link" data-dcnode-id="4239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/budburst" title="Learn more about Budburst from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4240" instrument_node="">Budburst</span></a><span data-dcnode-id="4238" instrument_node=""> curves (‘survival’) for all treatments calculated for the number of days in the climate chamber; (a) chilling treatment only, (b) </span></span><a class="topic-link" data-dcnode-id="4235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/photoperiod" title="Learn more about photoperiod from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4236" instrument_node="">photoperiod</span></a><span data-dcnode-id="4234" instrument_node=""> treatment only; (c) combined chilling and photoperiod treatment. Treatments listed are C1: low chilling, C2: moderate chilling, C3: high chilling. Photoperiod P10: 10 h, P12: 12 h, P14: 14 h daily photoperiod. The shadows in (a) and (b) represent the 95% confidence interval of each treatment.</span></p></span></span></figure></div><div data-dcnode-id="4175"><p data-dcnode-id="4206" id="par0115"><span data-dcnode-id="4228" instrument_node="">For the total amount of forcing, as measured in degree days until budburst, plants in the chilling 1 treatment required a relatively higher median of degree days to reach budburst (</span><a class="workspace-trigger" data-dcnode-id="4226" href="#fig0020" name="bfig0020"><span data-dcnode-id="4227" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4225" instrument_node="">a). In contrast, there was no significant difference between number of degree days in chilling treatments 2 and 3 (</span><em data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">P</span></em><span data-dcnode-id="4222" instrument_node=""> =  0.37). Altogether, median forcing requirements were considerably higher for chilling treatment 1 (979 °C days) than for chilling treatment 2 (586°C days) and chilling treatment 3 (646 °C days) (</span><em data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">P</span></em><span data-dcnode-id="4219" instrument_node=""> &lt;  0.01; </span><a class="workspace-trigger" data-dcnode-id="4217" href="#fig0020" name="bfig0020"><span data-dcnode-id="4218" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4216" instrument_node="">a, c). In contrast, differences among the photoperiod treatments in the median forcing requirements were considerably smaller (photoperiod 14 h: 596 °C days; photoperiod 12 h: 646 °C days; 10 h: 696 °C days; </span><a class="workspace-trigger" data-dcnode-id="4214" href="#fig0020" name="bfig0020"><span data-dcnode-id="4215" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4213" instrument_node="">b, c). Only the P14 treatment had significantly lower forcing requirements than P10 (</span><a class="workspace-trigger" data-dcnode-id="4211" href="#fig0020" name="bfig0020"><span data-dcnode-id="4212" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4210" instrument_node="">b; </span><em data-dcnode-id="4208"><span data-dcnode-id="4209" instrument_node="">P</span></em><span data-dcnode-id="4207" instrument_node=""> =  0.009).</span></p><figure class="figure text-xs" data-dcnode-id="4176" id="fig0020"><span data-dcnode-id="4190"><img alt="Fig. 4" aria-describedby="cap0020" data-dcnode-id="4205" height="700" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-gr4.jpg&amp;raw"><span data-dcnode-id="4204" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4191"><li data-dcnode-id="4198"><a class="anchor download-link u-font-sans" data-dcnode-id="4199" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-gr4_lrg.jpg" target="_blank" title="Download high-res image (498KB)"><span class="anchor-text" data-dcnode-id="4200"><span data-dcnode-id="4203" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4201"><span data-dcnode-id="4202" instrument_node="">Download high-res image (498KB)</span></span></span></a></li><li data-dcnode-id="4192"><a class="anchor download-link u-font-sans" data-dcnode-id="4193" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4194"><span data-dcnode-id="4197" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4177"><span data-dcnode-id="4178" id="cap0020"><p data-dcnode-id="4179" id="spar0020"><span class="label" data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">Fig. 4</span></span><span data-dcnode-id="4187" instrument_node="">. </span><span data-dcnode-id="4183"><a class="topic-link" data-dcnode-id="4185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/budburst" title="Learn more about Budburst from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4186" instrument_node="">Budburst</span></a><span data-dcnode-id="4184" instrument_node=""> curves (‘survival’) for all treatments calculated for absolute degree days of forcing (field and chamber) until budburst; (a) chilling treatment only, (b) </span></span><a class="topic-link" data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/photoperiod" title="Learn more about photoperiod from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4182" instrument_node="">photoperiod</span></a><span data-dcnode-id="4180" instrument_node=""> treatment only; (c) combined chilling and photoperiod treatment. Treatments listed are C1: low chilling, C2: moderate chilling, C3: high chilling; photoperiod P10: 10 h, P12: 12 h, P14: 14 h daily photoperiod. The shadows in (a) and (b) represent the 95% confidence interval of each treatment.</span></p></span></span></figure></div><p data-dcnode-id="4152" id="par0120"><span data-dcnode-id="4174" instrument_node="">Longer photoperiods reduced forcing requirements significantly within chilling treatments 1 (</span><a class="workspace-trigger" data-dcnode-id="4172" href="#fig0020" name="bfig0020"><span data-dcnode-id="4173" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4171" instrument_node="">c; </span><em data-dcnode-id="4169"><span data-dcnode-id="4170" instrument_node="">P</span></em><span data-dcnode-id="4168" instrument_node=""> =  0.012) and 2 (</span><a class="workspace-trigger" data-dcnode-id="4166" href="#fig0020" name="bfig0020"><span data-dcnode-id="4167" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4165" instrument_node="">c; </span><em data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">P</span></em><span data-dcnode-id="4162" instrument_node=""> =  0.008), but not chilling treatment 3 (</span><a class="workspace-trigger" data-dcnode-id="4160" href="#fig0020" name="bfig0020"><span data-dcnode-id="4161" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4159" instrument_node="">c; </span><em data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">P</span></em><span data-dcnode-id="4156" instrument_node=""> =  0.26). In contrast, the reduction in forcing requirement between chilling treatments 2 and 3 was marginally significant in P14 (</span><em data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">P</span></em><span data-dcnode-id="4153" instrument_node=""> =  0.065).</span></p></section><section data-dcnode-id="3958" id="sec0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4147" id="sect0065"><span data-dcnode-id="4150" instrument_node="">3.3</span><span data-dcnode-id="4149" instrument_node="">. </span><span data-dcnode-id="4148" instrument_node="">Treatment effects on forcing requirements of different groups of species</span></h3><div data-dcnode-id="3986"><p data-dcnode-id="4142" id="par0125"><span data-dcnode-id="4146" instrument_node="">To assess whether species responses are linked to species traits, treatment effects were compared between different species groups. The effects of chilling are shown in </span><a class="workspace-trigger" data-dcnode-id="4144" href="#tbl0010" name="btbl0010"><span data-dcnode-id="4145" instrument_node="">Table 2</span></a><span data-dcnode-id="4143" instrument_node="">. Photoperiod had no significant effect across any of the groups, so we did not list the results here.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="3987" id="tbl0010"><span class="captions" data-dcnode-id="4125"><span data-dcnode-id="4126" id="cap0030"><p data-dcnode-id="4127" id="spar0030"><span class="label" data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">Table 2</span></span><span data-dcnode-id="4139" instrument_node="">. </span><span data-dcnode-id="4138" instrument_node="">Treatment effects on forcing requirements for different groups of species. Median C1: Kaplan–Meier estimate for chilling 1 (low); Median C2: Kaplan–Meier estimate for chilling 2 (moderate); Median C3: Kaplan–Meier estimate for chilling 3 (high); p chilling: P-value of log-rank test for chilling effects; p C2/C3: P-value of chi-square test for differences between chilling treatments 2 and 3; ns: not significant (</span><em data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">P</span></em><span data-dcnode-id="4135" instrument_node=""> &gt;  0.05); bold: significant (</span><em data-dcnode-id="4133"><span data-dcnode-id="4134" instrument_node="">P</span></em><span data-dcnode-id="4128"><span data-dcnode-id="4132" instrument_node=""> &lt;  0.05). NA signifies that no median value was observed, indicating the </span><a class="topic-link" data-dcnode-id="4130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/budburst" title="Learn more about budburst from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4131" instrument_node="">budburst</span></a><span data-dcnode-id="4129" instrument_node=""> rate was less than 50%.</span></span></p></span></span><div class="groups" data-dcnode-id="3988"><table data-dcnode-id="3989"><thead class="valign-top" data-dcnode-id="4109"><tr class="rowsep-1" data-dcnode-id="4110"><th class="align-left" data-dcnode-id="4123" scope="col"><span data-dcnode-id="4124" instrument_node="">Group</span></th><th class="align-left" data-dcnode-id="4121" scope="col"><span data-dcnode-id="4122" instrument_node="">Median C1 (°C days)</span></th><th class="align-left" data-dcnode-id="4117" scope="col"><span data-dcnode-id="4120" instrument_node="">Median C2</span><br data-dcnode-id="4119"><span data-dcnode-id="4118" instrument_node="">(°C days)</span></th><th class="align-left" data-dcnode-id="4115" scope="col"><span data-dcnode-id="4116" instrument_node="">Median C3 (°C days)</span></th><th class="align-left" data-dcnode-id="4113" scope="col"><span data-dcnode-id="4114" instrument_node="">P chilling</span></th><th class="align-left" data-dcnode-id="4111" scope="col"><span data-dcnode-id="4112" instrument_node="">P C2/C3</span></th></tr></thead><tbody data-dcnode-id="3990"><tr data-dcnode-id="4100"><th class="align-left" data-dcnode-id="4106" scope="row"><strong data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">Shade tolerance</span></strong></th><td class="align-left" data-dcnode-id="4105"></td><td class="align-left" data-dcnode-id="4104"></td><td class="align-left" data-dcnode-id="4103"></td><td class="align-left" data-dcnode-id="4102"></td><td class="align-left" data-dcnode-id="4101"></td></tr><tr data-dcnode-id="4086"><th class="align-left" data-dcnode-id="4098" scope="row"><span data-dcnode-id="4099" instrument_node="">light</span></th><td class="align-left" data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">679</span></td><td class="align-left" data-dcnode-id="4094"><span data-dcnode-id="4095" instrument_node="">586</span></td><td class="align-left" data-dcnode-id="4092"><span data-dcnode-id="4093" instrument_node="">596</span></td><td class="align-left" data-dcnode-id="4089"><strong data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">0.026</span></strong></td><td class="align-left" data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">ns</span></td></tr><tr data-dcnode-id="4071"><th class="align-left" data-dcnode-id="4084" scope="row"><span data-dcnode-id="4085" instrument_node="">Shade</span></th><td class="align-left" data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">NA</span></td><td class="align-left" data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">586</span></td><td class="align-left" data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">696</span></td><td class="align-left" data-dcnode-id="4075"><strong data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">&lt;0.001</span></strong></td><td class="align-left" data-dcnode-id="4072"><strong data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">0.033</span></strong></td></tr><tr data-dcnode-id="4068"><th class="align-left" colspan="6" data-dcnode-id="4069" scope="row"><br data-dcnode-id="4070"></th></tr><tr data-dcnode-id="4059"><th class="align-left" data-dcnode-id="4065" scope="row"><strong data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">Deciduousness</span></strong></th><td class="align-left" data-dcnode-id="4064"></td><td class="align-left" data-dcnode-id="4063"></td><td class="align-left" data-dcnode-id="4062"></td><td class="align-left" data-dcnode-id="4061"></td><td class="align-left" data-dcnode-id="4060"></td></tr><tr data-dcnode-id="4045"><th class="align-left" data-dcnode-id="4057" scope="row"><span data-dcnode-id="4058" instrument_node="">Deciduous</span></th><td class="align-left" data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">1029</span></td><td class="align-left" data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">636</span></td><td class="align-left" data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">596</span></td><td class="align-left" data-dcnode-id="4048"><strong data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">&lt;0.001</span></strong></td><td class="align-left" data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">ns</span></td></tr><tr data-dcnode-id="4031"><th class="align-left" data-dcnode-id="4043" scope="row"><span data-dcnode-id="4044" instrument_node="">Evergreen</span></th><td class="align-left" data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">929</span></td><td class="align-left" data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node="">586</span></td><td class="align-left" data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">646</span></td><td class="align-left" data-dcnode-id="4034"><strong data-dcnode-id="4035"><span data-dcnode-id="4036" instrument_node="">0.005</span></strong></td><td class="align-left" data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">ns</span></td></tr><tr data-dcnode-id="4028"><th class="align-left" colspan="6" data-dcnode-id="4029" scope="row"><br data-dcnode-id="4030"></th></tr><tr data-dcnode-id="4019"><th class="align-left" data-dcnode-id="4025" scope="row"><strong data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">Growth form</span></strong></th><td class="align-left" data-dcnode-id="4024"></td><td class="align-left" data-dcnode-id="4023"></td><td class="align-left" data-dcnode-id="4022"></td><td class="align-left" data-dcnode-id="4021"></td><td class="align-left" data-dcnode-id="4020"></td></tr><tr data-dcnode-id="4005"><th class="align-left" data-dcnode-id="4017" scope="row"><span data-dcnode-id="4018" instrument_node="">Shrub</span></th><td class="align-left" data-dcnode-id="4015"><span data-dcnode-id="4016" instrument_node="">804</span></td><td class="align-left" data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">586</span></td><td class="align-left" data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">646</span></td><td class="align-left" data-dcnode-id="4008"><strong data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">&lt;0.001</span></strong></td><td class="align-left" data-dcnode-id="4006"><span data-dcnode-id="4007" instrument_node="">ns</span></td></tr><tr data-dcnode-id="3991"><th class="align-left" data-dcnode-id="4003" scope="row"><span data-dcnode-id="4004" instrument_node="">Tree</span></th><td class="align-left" data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">1354</span></td><td class="align-left" data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">586</span></td><td class="align-left" data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">596</span></td><td class="align-left" data-dcnode-id="3994"><strong data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">&lt;0.001</span></strong></td><td class="align-left" data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">ns</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="3972" id="par0130"><span data-dcnode-id="3985" instrument_node="">Shade-tolerant species showed much greater forcing requirements for budburst than light-demanding species in both C1 and C3 (</span><em data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">P</span></em><span data-dcnode-id="3982" instrument_node=""> &lt;  0.0001; </span><a class="workspace-trigger" data-dcnode-id="3980" href="#tbl0010" name="btbl0010"><span data-dcnode-id="3981" instrument_node="">Table 2</span></a><span data-dcnode-id="3979" instrument_node="">). No significant difference was found between shade-tolerant and light species in C2 (</span><em data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">P</span></em><span data-dcnode-id="3976" instrument_node=""> =  0.33). Chilling treatment had significant effects on forcing requirements for both shade-tolerant and light species, but differences in forcing requirements between chilling treatments 2 and 3 were not significant for light-demanding species (</span><a class="workspace-trigger" data-dcnode-id="3974" href="#tbl0010" name="btbl0010"><span data-dcnode-id="3975" instrument_node="">Table 2</span></a><span data-dcnode-id="3973" instrument_node="">).</span></p><p data-dcnode-id="3967" id="par0135"><span data-dcnode-id="3971" instrument_node="">Chilling treatment affected forcing requirements for both deciduous and evergreen species, with considerable reductions observed for C2 and C3 when compared to C1. However, chilling treatments 2 and 3 did not differ significantly from one another. Forcing requirements did not differ significantly between evergreen and deciduous species in any of the chilling treatments (all </span><em data-dcnode-id="3969"><span data-dcnode-id="3970" instrument_node="">P</span></em><span data-dcnode-id="3968" instrument_node=""> &gt;  0.05).</span></p><p data-dcnode-id="3959" id="par0140"><span data-dcnode-id="3966" instrument_node="">Tree and shrub species both required significantly less forcing in chilling treatments 2 and 3 than chilling treatment 1. However, there was no significant difference between chilling treatments 2 and 3 for shrub and tree species. Forcing requirement were not found to differ significantly in either C1 or C2 (both </span><em data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">P</span></em><span data-dcnode-id="3963" instrument_node=""> &gt;  0.05). Shrub species had higher forcing requirements than tree species in C3 (</span><em data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">P</span></em><span data-dcnode-id="3960" instrument_node=""> &lt;  0.001).</span></p></section></section><section data-dcnode-id="3735" id="sec0055"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3953" id="sect0070"><span data-dcnode-id="3956" instrument_node="">4</span><span data-dcnode-id="3955" instrument_node="">. </span><span data-dcnode-id="3954" instrument_node="">Discussion</span></h2><section data-dcnode-id="3873" id="sec0060"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3949" id="sect0075"><span data-dcnode-id="3952" instrument_node="">4.1</span><span data-dcnode-id="3951" instrument_node="">. </span><span data-dcnode-id="3950" instrument_node="">Is twig phenology a sensible proxy for subtropical woody species phenology?</span></h3><p data-dcnode-id="3907" id="par0145"><span data-dcnode-id="3940"><span data-dcnode-id="3948" instrument_node="">Previous methods for studying tree </span><a class="topic-link" data-dcnode-id="3946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/phenology" title="Learn more about phenology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3947" instrument_node="">phenology</span></a><span data-dcnode-id="3941"><span data-dcnode-id="3945" instrument_node=""> have several key limitations. It is difficult to quantify the effect of key environmental drivers independently when using traditional methods, including </span><a class="topic-link" data-dcnode-id="3943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/remote-sensing" title="Learn more about remote sensing from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3944" instrument_node="">remote sensing</span></a><span data-dcnode-id="3942" instrument_node=""> and field observations (</span></span></span><a class="workspace-trigger" data-dcnode-id="3938" href="#bib0095" name="bbib0095"><span data-dcnode-id="3939" instrument_node="">Korner and Basler, 2010</span></a><span data-dcnode-id="3933"><span data-dcnode-id="3937" instrument_node="">). Manipulative experiments using twig cuttings from woody species have been proven to present an affordable, easily replicated approach to investigate the relative importance of winter chilling, </span><a class="topic-link" data-dcnode-id="3935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/photoperiod" title="Learn more about photoperiod from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3936" instrument_node="">photoperiod</span></a><span data-dcnode-id="3934" instrument_node="">, and spring warming (</span></span><a class="workspace-trigger" data-dcnode-id="3931" href="#bib0055" name="bbib0055"><span data-dcnode-id="3932" instrument_node="">Flynn and Wolkovich, 2018</span></a><span data-dcnode-id="3930" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3928" href="#bib0175" name="bbib0175"><span data-dcnode-id="3929" instrument_node="">Primack et al., 2015</span></a><span data-dcnode-id="3927" instrument_node="">). It remains unclear whether differences in twig preparation and experimental treatments influence the results significantly. For example, methods that result in fungal growth or that alter water movement in the plants may affect the accuracy of results (</span><a class="workspace-trigger" data-dcnode-id="3925" href="#bib0175" name="bbib0175"><span data-dcnode-id="3926" instrument_node="">Primack et al., 2015</span></a><span data-dcnode-id="3920"><span data-dcnode-id="3924" instrument_node="">). Currently, it is challenging to test whether advanced </span><a class="topic-link" data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/budburst" title="Learn more about budburst from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3923" instrument_node="">budburst</span></a><span data-dcnode-id="3921" instrument_node=""> or leaf-out has been caused by strong chilling or by other factors (such as nutrients, humidity). However, previous studies have shown that when done carefully, results from twig-cutting experiments are broadly robust and reflect observations from the wild (</span></span><a class="workspace-trigger" data-dcnode-id="3918" href="#bib0055" name="bbib0055"><span data-dcnode-id="3919" instrument_node="">Flynn and Wolkovich, 2018</span></a><span data-dcnode-id="3917" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3915" href="#bib0100" name="bbib0100"><span data-dcnode-id="3916" instrument_node="">Laube et al., 2014</span></a><span data-dcnode-id="3914" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3912" href="#bib0165" name="bbib0165"><span data-dcnode-id="3913" instrument_node="">Polgar et al., 2014</span></a><span data-dcnode-id="3911" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3909" href="#bib0175" name="bbib0175"><span data-dcnode-id="3910" instrument_node="">Primack et al., 2015</span></a><span data-dcnode-id="3908" instrument_node="">).</span></p><p data-dcnode-id="3892" id="par0150"><span data-dcnode-id="3902"><span data-dcnode-id="3906" instrument_node="">Here, 33 of 37 species survived during the study period, and 64% of twigs achieved budburst. This indicates that twig-cutting experiments can be used for evergreen broad-leaved species. The budburst rates for the twigs subjected to the low chilling treatment in this study (72.3%) were lower than those in </span><a class="topic-link" data-dcnode-id="3904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/temperate-forest" title="Learn more about temperate forests from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3905" instrument_node="">temperate forests</span></a><span data-dcnode-id="3903" instrument_node=""> (e.g. </span></span><a class="workspace-trigger" data-dcnode-id="3900" href="#bib0005" name="bbib0005"><span data-dcnode-id="3901" instrument_node="">Basler and Korner, 2012</span></a><span data-dcnode-id="3899" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3897" href="#bib0100" name="bbib0100"><span data-dcnode-id="3898" instrument_node="">Laube et al., 2014</span></a><span data-dcnode-id="3896" instrument_node="">). These lower budburst rates in a subtropical area may be due to fungal infections or other diseases affecting the developing tissues (</span><a class="workspace-trigger" data-dcnode-id="3894" href="#bib0175" name="bbib0175"><span data-dcnode-id="3895" instrument_node="">Primack et al., 2015</span></a><span data-dcnode-id="3893" instrument_node="">).</span></p><p data-dcnode-id="3874" id="par0155"><span data-dcnode-id="3891" instrument_node="">Because the forest in our study is very dense and the trees are very tall, it is difficult to determine in the field with binoculars whether bud-burst occurred in the donor trees or not. However, recent studies conducted in temperate forests have found that cut twigs develop similarly to those persisting on donor trees in the wild (</span><a class="workspace-trigger" data-dcnode-id="3889" href="#bib0100" name="bbib0100"><span data-dcnode-id="3890" instrument_node="">Laube et al., 2014</span></a><span data-dcnode-id="3888" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3886" href="#bib0165" name="bbib0165"><span data-dcnode-id="3887" instrument_node="">Polgar et al., 2014</span></a><span data-dcnode-id="3885" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3883" href="#bib0220" name="bbib0220"><span data-dcnode-id="3884" instrument_node="">Vitasse and Basler, 2014</span></a><span data-dcnode-id="3878"><span data-dcnode-id="3882" instrument_node="">). Some </span><a class="topic-link" data-dcnode-id="3880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/ecologists" title="Learn more about ecologists from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3881" instrument_node="">ecologists</span></a><span data-dcnode-id="3879" instrument_node=""> have proposed that additional ecosystems, such as subtropical forests, should also be investigated using dormant twigs to study the drivers of spring phenology (e.g. </span></span><a class="workspace-trigger" data-dcnode-id="3876" href="#bib0175" name="bbib0175"><span data-dcnode-id="3877" instrument_node="">Primack et al., 2015</span></a><span data-dcnode-id="3875" instrument_node="">). Therefore, we conclude that twig-cutting experiment is a useful tool for studying subtropical woody species phenology.</span></p></section><section data-dcnode-id="3818" id="sec0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3869" id="sect0080"><span data-dcnode-id="3872" instrument_node="">4.2</span><span data-dcnode-id="3871" instrument_node="">. </span><span data-dcnode-id="3870" instrument_node="">General effects of chilling</span></h3><p data-dcnode-id="3864" id="par0160"><span data-dcnode-id="3868" instrument_node="">We observed that species in the same family tend to have similar responses to chilling treatments. As far as we know, no study has tested the influence of </span><a class="topic-link" data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/phylogeny" title="Learn more about phylogeny from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3867" instrument_node="">phylogeny</span></a><span data-dcnode-id="3865" instrument_node=""> on the phenological response to chilling requirement, so future research should further investigate whether closely-related species have similar chilling requirements.</span></p><p data-dcnode-id="3835" id="par0165"><span data-dcnode-id="3863" instrument_node="">Both moderate and strong chilling treatments advanced budburst, which is consistent with previous studies conducted in temperate Europe and North America (</span><a class="workspace-trigger" data-dcnode-id="3861" href="#bib0015" name="bbib0015"><span data-dcnode-id="3862" instrument_node="">Caffarra et al., 2011</span></a><span data-dcnode-id="3860" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3858" href="#bib0055" name="bbib0055"><span data-dcnode-id="3859" instrument_node="">Flynn and Wolkovich, 2018</span></a><span data-dcnode-id="3857" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3855" href="#bib0100" name="bbib0100"><span data-dcnode-id="3856" instrument_node="">Laube et al., 2014</span></a><span data-dcnode-id="3850"><span data-dcnode-id="3854" instrument_node="">). Thus, we conclude that moderate chilling (i.e., 38 days in our study) was adequate for the initiation of spring development in subtropical woody species. Previous work suggests that 90–120 chill days are not sufficient to complete winter dormancy for most species in </span><a class="topic-link" data-dcnode-id="3852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/temperate-ecosystem" title="Learn more about temperate ecosystems from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3853" instrument_node="">temperate ecosystems</span></a><span data-dcnode-id="3851" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="3848" href="#bib0130" name="bbib0130"><span data-dcnode-id="3849" instrument_node="">Murray et al., 1989</span></a><span data-dcnode-id="3847" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3845" href="#bib0165" name="bbib0165"><span data-dcnode-id="3846" instrument_node="">Polgar et al., 2014</span></a><span data-dcnode-id="3836"><span data-dcnode-id="3840"><span data-dcnode-id="3844" instrument_node="">). Our findings indicate that plants in subtropical </span><a class="topic-link" data-dcnode-id="3842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/evergreen-forest" title="Learn more about evergreen forests from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3843" instrument_node="">evergreen forests</span></a><span data-dcnode-id="3841" instrument_node=""> need significantly fewer chilling days to complete their winter dormancy than plants in temperate </span></span><a class="topic-link" data-dcnode-id="3838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/deciduous-forest" title="Learn more about deciduous forests from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3839" instrument_node="">deciduous forests</span></a><span data-dcnode-id="3837" instrument_node="">.</span></span></p><p data-dcnode-id="3824" id="par0170"><span data-dcnode-id="3834" instrument_node="">Plants subjected to moderate and strong chilling treatments required less forcing than plants subjected to low chilling treatments. Our study revealed the major importance of the chilling effect, which is consistent with temperate studies in Concord, MA (</span><a class="workspace-trigger" data-dcnode-id="3832" href="#bib0165" name="bbib0165"><span data-dcnode-id="3833" instrument_node="">Polgar et al., 2014</span></a><span data-dcnode-id="3831" instrument_node="">) and in Munich (</span><a class="workspace-trigger" data-dcnode-id="3829" href="#bib0100" name="bbib0100"><span data-dcnode-id="3830" instrument_node="">Laube et al., 2014</span></a><span data-dcnode-id="3828" instrument_node="">), and supports the ‘residual effect of dormancy’ hypothesis, which is defined as a reduction in forcing requirements as chilling duration increases (</span><a class="workspace-trigger" data-dcnode-id="3826" href="#bib0020" name="bbib0020"><span data-dcnode-id="3827" instrument_node="">Campoy et al., 2011</span></a><span data-dcnode-id="3825" instrument_node="">).</span></p><p data-dcnode-id="3819" id="par0175"><span data-dcnode-id="3823" instrument_node="">To our knowledge, ours is the first study directly investigating whether subtropical species have a chilling requirement for spring phenology. Our findings did not support prior thought that subtropical and tropical plants do not have chilling requirements. The existence of moderate and pervasive chilling requirements in our study provides a possible explanation for why global warming may delay spring phenology—warmer winters will not meet the chilling requirements of plants in subtropical regions. This has also been verified by a few studies for subtropical species (</span><a class="workspace-trigger" data-dcnode-id="3821" href="#bib0025" name="bbib0025"><span data-dcnode-id="3822" instrument_node="">Chen et al., 2017</span></a><span data-dcnode-id="3820" instrument_node="">). However, it remains to be tested whether plant species have chilling requirements in the tropics, where the temperature rarely descends below 5 or 10 °C.</span></p></section><section data-dcnode-id="3780" id="sec0070"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3814" id="sect0085"><span data-dcnode-id="3817" instrument_node="">4.3</span><span data-dcnode-id="3816" instrument_node="">. </span><span data-dcnode-id="3815" instrument_node="">General effects of photoperiod</span></h3><p data-dcnode-id="3792" id="par0180"><span data-dcnode-id="3813" instrument_node="">Of all the individual species, longer day length significantly enhanced budburst rate for just two species. This is consistent with one study in North America, in which only 1 of 17 species had a higher leaf-out rate during longer photoperiod treatments (</span><a class="workspace-trigger" data-dcnode-id="3811" href="#bib0165" name="bbib0165"><span data-dcnode-id="3812" instrument_node="">Polgar et al., 2014</span></a><span data-dcnode-id="3810" instrument_node="">), and with another study in Europe in which photoperiod influenced leaf-out times for 5 of 14 species (</span><a class="workspace-trigger" data-dcnode-id="3808" href="#bib0005" name="bbib0005"><span data-dcnode-id="3809" instrument_node="">Basler and Korner, 2012</span></a><span data-dcnode-id="3807" instrument_node="">). However, a recent study found contrasting results, showing that all species in a North American study responded strongly to photoperiod (</span><a class="workspace-trigger" data-dcnode-id="3805" href="#bib0055" name="bbib0055"><span data-dcnode-id="3806" instrument_node="">Flynn and Wolkovich, 2018</span></a><span data-dcnode-id="3796"><span data-dcnode-id="3804" instrument_node="">). Photoperiod was also found to induce </span><a class="topic-link" data-dcnode-id="3802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/synchronous-flowering" title="Learn more about synchronous flowering from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3803" instrument_node="">synchronous flowering</span></a><span data-dcnode-id="3797"><span data-dcnode-id="3801" instrument_node=""> near the </span><a class="topic-link" data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/equator" title="Learn more about equator from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3800" instrument_node="">equator</span></a><span data-dcnode-id="3798" instrument_node="">, even with daylength varying less than 30 min per year (</span></span></span><a class="workspace-trigger" data-dcnode-id="3794" href="#bib0010" name="bbib0010"><span data-dcnode-id="3795" instrument_node="">Borchert et al., 2005</span></a><span data-dcnode-id="3793" instrument_node="">). Therefore, more studies are needed in a wider range of species and ecosystems to test the effect of photoperiod on phenology.</span></p><p data-dcnode-id="3781" id="par0185"><span data-dcnode-id="3791" instrument_node="">Across all species, a longer photoperiod reduced the forcing requirements within the low and moderate chilling treatments, suggesting less cold requires longer photoperiod. These results are consistent with another study within temperate species in Germany (</span><a class="workspace-trigger" data-dcnode-id="3789" href="#bib0100" name="bbib0100"><span data-dcnode-id="3790" instrument_node="">Laube et al., 2014</span></a><span data-dcnode-id="3788" instrument_node="">), which suggested that plants become sensitive to photoperiod when the chilling requirement is not met. This is in contrast to the previous hypothesis that plants only become receptive to the photoperiod signal after chilling (</span><a class="workspace-trigger" data-dcnode-id="3786" href="#bib0095" name="bbib0095"><span data-dcnode-id="3787" instrument_node="">Korner and Basler, 2010</span></a><span data-dcnode-id="3785" instrument_node="">). Our findings indicate that insufficient chilling can be offset by a longer photoperiod because it can enhance cell growth (</span><a class="workspace-trigger" data-dcnode-id="3783" href="#bib0075" name="bbib0075"><span data-dcnode-id="3784" instrument_node="">Heide, 1993</span></a><span data-dcnode-id="3782" instrument_node="">).</span></p></section><section data-dcnode-id="3736" id="sec0075"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3776" id="sect0090"><span data-dcnode-id="3779" instrument_node="">4.4</span><span data-dcnode-id="3778" instrument_node="">. </span><span data-dcnode-id="3777" instrument_node="">Effects of shade tolerance, deciduousness and growth form</span></h3><p data-dcnode-id="3764" id="par0190"><span data-dcnode-id="3775" instrument_node="">Photoperiod showed no significant effect for any of the functional groups examined here. Our results did not support the hypothesis that climax species are more photosensitive than pioneer species (</span><a class="workspace-trigger" data-dcnode-id="3773" href="#bib0095" name="bbib0095"><span data-dcnode-id="3774" instrument_node="">Korner and Basler, 2010</span></a><span data-dcnode-id="3768"><span data-dcnode-id="3772" instrument_node="">). Previous studies have reported contradictory conclusions with respect to the </span><a class="topic-link" data-dcnode-id="3770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/photosensitivity" title="Learn more about photosensitivity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3771" instrument_node="">photosensitivity</span></a><span data-dcnode-id="3769" instrument_node=""> of species. </span></span><a class="workspace-trigger" data-dcnode-id="3766" href="#bib0005" name="bbib0005"><span data-dcnode-id="3767" instrument_node="">Basler and Korner (2012)</span></a><span data-dcnode-id="3765" instrument_node=""> found significant effects of photoperiod for climax species, but not for pioneer species. However, the photoperiod effect was minor in their study.</span></p><p data-dcnode-id="3753" id="par0195"><span data-dcnode-id="3763" instrument_node="">We found that forcing requirements were higher in low than in high chilling for all functional groups. However, a reduction in forcing requirements between C2 and C3 was not significant for almost all functional groups (except for shade-tolerant species). This suggests that moderate chilling seems to be sufficient for budburst in subtropical species. Shade-tolerant species in low chilling treatments had higher forcing requirements than light-demanding species, which supports the hypothesis that climax species should have higher forcing requirements than pioneer species (</span><a class="workspace-trigger" data-dcnode-id="3761" href="#bib0095" name="bbib0095"><span data-dcnode-id="3762" instrument_node="">Korner and Basler, 2010</span></a><span data-dcnode-id="3760" instrument_node="">). Even within the high chilling treatment the median estimate of forcing was significantly higher for shade-tolerant species than for light-demanding species. This finding agrees with the results of previous studies conducted in temperate regions (</span><a class="workspace-trigger" data-dcnode-id="3758" href="#bib0015" name="bbib0015"><span data-dcnode-id="3759" instrument_node="">Caffarra et al., 2011</span></a><span data-dcnode-id="3757" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3755" href="#bib0100" name="bbib0100"><span data-dcnode-id="3756" instrument_node="">Laube et al., 2014</span></a><span data-dcnode-id="3754" instrument_node="">).</span></p><p data-dcnode-id="3748" id="par0200"><span data-dcnode-id="3752" instrument_node="">Evergreen species had a similar forcing requirement as deciduous species in all chilling treatments. Our results suggest that when chilling requirements are not met, deciduous species need similar cumulative temperatures with evergreen species to budburst. We expect that when chilling is incomplete in the </span><a class="topic-link" data-dcnode-id="3750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/subtropics" title="Learn more about subtropics from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3751" instrument_node="">subtropics</span></a><span data-dcnode-id="3749" instrument_node=""> under climate change in the future, the spring phenologies of evergreen species will be nearly the same as deciduous species because they will have similar forcing requirements.</span></p><p data-dcnode-id="3737" id="par0205"><span data-dcnode-id="3747" instrument_node="">We found that shrub species had higher forcing requirements than tree species in the low chilling treatment only. This suggests that both shrub and tree species have relatively higher forcing requirements when chilling is not met, but when the chilling requirement is met, the tree species have fewer forcing requirements to begin spring phenology. This is consistent with the previously supported finding that tree species tend to begin spring phenology earlier than shrubs (</span><a class="workspace-trigger" data-dcnode-id="3745" href="#bib0050" name="bbib0050"><span data-dcnode-id="3746" instrument_node="">Du et al., 2015</span></a><span data-dcnode-id="3744" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3742" href="#bib0090" name="bbib0090"><span data-dcnode-id="3743" instrument_node="">Kochmer and Handel, 1986</span></a><span data-dcnode-id="3741" instrument_node="">). The greater availability of light and soil moisture for trees could explain the pattern that trees have fewer forcing requirements and that they begin spring phenology earlier than shrubs (</span><a class="workspace-trigger" data-dcnode-id="3739" href="#bib0135" name="bbib0135"><span data-dcnode-id="3740" instrument_node="">Opler et al., 1980</span></a><span data-dcnode-id="3738" instrument_node="">).</span></p></section></section><section data-dcnode-id="3709" id="sec0080"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3731" id="sect0095"><span data-dcnode-id="3734" instrument_node="">5</span><span data-dcnode-id="3733" instrument_node="">. </span><span data-dcnode-id="3732" instrument_node="">Conclusions</span></h2><p data-dcnode-id="3710" id="par0210"><span data-dcnode-id="3726"><span data-dcnode-id="3730" instrument_node="">To our knowledge, this is the first twig cutting experiment conducted using subtropical plant species. Our experiment shows that twig cutting experiments can be successfully applied to subtropical evergreen species. We show that a moderate to high chilling requirement is needed for </span><a class="topic-link" data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/budburst" title="Learn more about budburst from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3729" instrument_node="">budburst</span></a><span data-dcnode-id="3727" instrument_node=""> in subtropical species. Chilling holds a larger influence than </span></span><a class="topic-link" data-dcnode-id="3724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/photoperiod" title="Learn more about photoperiod from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3725" instrument_node="">photoperiod</span></a><span data-dcnode-id="3711"><span data-dcnode-id="3715"><span data-dcnode-id="3719"><span data-dcnode-id="3723" instrument_node=""> in initiating budburst in subtropical </span><a class="topic-link" data-dcnode-id="3721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/evergreen-forest" title="Learn more about evergreen forests from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3722" instrument_node="">evergreen forests</span></a><span data-dcnode-id="3720" instrument_node="">. Subtropical </span></span><a class="topic-link" data-dcnode-id="3717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/woody-plant" title="Learn more about woody plants from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3718" instrument_node="">woody plants</span></a><span data-dcnode-id="3716" instrument_node=""> had different forcing requirements under different chilling treatments, which also depended on their shade tolerance, deciduousness and growth form. With respect to future climate change, chilling, rather than photoperiod, is hypothesized to be of primary ecological relevance in subtropical evergreen and deciduous species. Spring </span></span><a class="topic-link" data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/phenology" title="Learn more about phenology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="3714" instrument_node="">phenology</span></a><span data-dcnode-id="3712" instrument_node=""> may be delayed under a warming future climate because the chilling requirements will be unfulfilled for most species. These results have important implications for the conservation and management of tropical and subtropical plant populations under future climate change scenarios.</span></span></p></section><section data-dcnode-id="3701" id="sec0085"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3707" id="sect0100"><span data-dcnode-id="3708" instrument_node="">Data availability</span></h2><p data-dcnode-id="3702" id="par0215"><span data-dcnode-id="3706" instrument_node="">Data for the degree days of forcing for all individuals has been made publicly available, and it can be downloaded at: </span><a data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/YanjunDu/AFM-chilling" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="3705" instrument_node="">https://github.com/YanjunDu/AFM-chilling</span></a><span data-dcnode-id="3703" instrument_node="">.</span></p></section></div><section data-dcnode-id="3695" id="coi0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3698" id="sect0105"><span data-dcnode-id="3699" instrument_node="">Declaration of Competing Interest</span></h2><p data-dcnode-id="3696" id="par0225"><span data-dcnode-id="3697" instrument_node="">No.</span></p></section><section data-dcnode-id="3672" id="ack0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3693" id="sect0110"><span data-dcnode-id="3694" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="3673" id="par0230"><span data-dcnode-id="3692" instrument_node="">This work was supported by the </span><span data-dcnode-id="3690" id="gs0005"><span data-dcnode-id="3691" instrument_node="">National Natural Science Foundation of China</span></span><span data-dcnode-id="3689" instrument_node=""> (</span><a data-dcnode-id="3687" href="#gs0005"><span data-dcnode-id="3688" instrument_node="">31670480</span></a><span data-dcnode-id="3686" instrument_node="">), the </span><span data-dcnode-id="3684" id="gs0010"><span data-dcnode-id="3685" instrument_node="">Hainan University</span></span><span data-dcnode-id="3683" instrument_node=""> (</span><a data-dcnode-id="3681" href="#gs0010"><span data-dcnode-id="3682" instrument_node="">KYQD(ZR)1979</span></a><span data-dcnode-id="3680" instrument_node="">) and the </span><span data-dcnode-id="3678" id="gs0015"><span data-dcnode-id="3679" instrument_node="">Ministry of Science and Technology of China</span></span><span data-dcnode-id="3677" instrument_node=""> (</span><a data-dcnode-id="3675" href="#gs0015"><span data-dcnode-id="3676" instrument_node="">2016YFC0503303</span></a><span data-dcnode-id="3674" instrument_node="">). We thank Prof. Richard Primack and Dr. Abe Miller-Rushing for their many helpful comments, and Dr. Haibao Ren for sharing climate data. We would also like to thank Dr. Murphy Stephen at the Yale University for his assistance with English language and grammatical editing of the manuscript. We appreciate the Gutianshan Research Station for their permission to carry out the experiment.</span></p></section><div class="Appendices" data-dcnode-id="3653"><section data-dcnode-id="3654" id="sec0095"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3668" id="sect0120"><span data-dcnode-id="3671" instrument_node="">Appendix A</span><span data-dcnode-id="3670" instrument_node="">. </span><span data-dcnode-id="3669" instrument_node="">Supplementary data</span></h2><p data-dcnode-id="3655" id="par0240"><span data-dcnode-id="3667" instrument_node="">The following is Supplementary data to this article:</span><span class="display" data-dcnode-id="3656"><span class="e-component e-component-mmc1" data-dcnode-id="3657" id="upi0005"><span class="article-attachment" data-dcnode-id="3658"><a class="icon-link" data-dcnode-id="3664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0168192319303090-mmc1.docx" rel="noreferrer noopener" target="_blank" title="Download Word document (25KB)"><svg class="icon icon-text-document" data-dcnode-id="3665" focusable="false" height="24" viewBox="0 0 94 128" width="17.625"><path d="m35.6 1e1c-5.38 0-10.62 1.92-14.76 5.4-9.1 7.68-18.84 20.14-18.84 32.1v70.5h9e1v-15.99-2.01-4e1 -17.64-32.36h-56.4zm0 1e1h46.4v22.36 17.64 4e1 2.01 5.99h-7e1v-49c0-6.08 4.92-11 11-11h17v-2e1h-6c-2.2 0-4 1.8-4 4v6h-7c-3.32 0-6.44 0.78-9.22 2.16 2.46-5.62 7.28-11.86 13.5-17.1 2.34-1.98 5.3-3.06 8.32-3.06zm-13.6 38v1e1h5e1v-1e1h-5e1zm0 2e1v1e1h5e1v-1e1h-5e1z" data-dcnode-id="3666"></path></svg></a><a class="anchor download-link u-font-sans" data-dcnode-id="3659" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=
