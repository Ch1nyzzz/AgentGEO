</span><table class="plant-ratings-table" data-dcnode-id="801"><tbody data-dcnode-id="802"><tr class="plant-ratings-table-odd" data-dcnode-id="1410"><th data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Rating</span></th><th data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Content</span></th></tr><tr data-dcnode-id="1393" id="cid-173328"><td data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Positive</span></td><td data-dcnode-id="1395"><p data-dcnode-id="1400"><span data-dcnode-id="1404" instrument_node="">On Nov 16, 2018, </span><a data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/charliegulf/"><span data-dcnode-id="1403" instrument_node="">charliegulf</span></a><span data-dcnode-id="1401" instrument_node="">  from Cookeville, TN wrote:</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">I was so happy when we moved here to find that a local tree farm had Franklinia.  Had a 7 ft tree planted in February with high hopes but reasonable expectations.  The tree started blooming in the middle of July and had over a hundred blossoms that finished up the last of August.  Now in November the leaves have turned dull red.  Tree seems real healthy and I can't wait until next summer to see how well it does.  Fingers crossed as we have heavy clay soil here.  </span></p><span data-dcnode-id="1396" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1354" id="cid-168460"><td data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Positive</span></td><td data-dcnode-id="1356"><p data-dcnode-id="1383"><span data-dcnode-id="1387" instrument_node="">On Jun 16, 2016, </span><a data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/jaylizz1/"><span data-dcnode-id="1386" instrument_node="">jaylizz1</span></a><span data-dcnode-id="1384" instrument_node="">  from Reno, NV wrote:</span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1381" instrument_node="">Okay, this is my third try and I know the trick now.  First I'm in Reno, Zone 5a.  We have harsh dry winds year round with a really intense blue sun because of our elevation.  The sun comes up at 430 and goes down at 900 in the summer.  Our soil is full of salt because we were once the Great Basin.  When you dig where I am it is like chipping the ground.  The shovel doesn't just go straight down.   I planted 8 of these guys this time here is what I learned.  They like acidic well drained soil but that can come in many forms.  I'm an electrical engineer who did well in chemistry so here is what it means to have an acidic soil for those who don't know.  When water hits carbon or decaying carbon or on the ground old plant leaves leaves, petals, etc.. you get carbonic acid.  Carbonic acid is a</span><a data-dcnode-id="1379" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-168460').style.display='inline'; return false;"><span data-dcnode-id="1380" instrument_node="">... read more</span></a><span data-dcnode-id="1359" id="readmore-168460" style="display:none;"><span data-dcnode-id="1378" instrument_node=""> weak acid but it is capable of pulling the the hydrogen ion in amonia nitrate, thus releasing nitrogen (plant food) and hydrogen from their bond.  Some plants can't fix their own nitrogen and they need this acid to get the nitrogen.  Sorry for the science. </span><br data-dcnode-id="1377"><span data-dcnode-id="1376" instrument_node="">
I planted 3 in a dg area with dappled sun.  I dug the hole in the dg but I back filled with all the old leaves and sticks around the area and the dg.  These guys get about maybe two hours top of direct sunlight but they only get a 1/4 of a gallon drip every day.</span><br data-dcnode-id="1375"><span data-dcnode-id="1374" instrument_node="">
The next I dug out a pine and it left a 36 x 12 inch whole which I filled with old horse manure, key word OLD.  Horse manure has nitrogen and plenty of decaying carbon fiber so wetting this medium makes sense.  I planted this guy right in the manure between two tall pines east and west of him.  He gets 1.25 gallons of drip everyday and more than 6 hours of direct sunlight.  He has great growth with zero sun damage.  I'm going add a drip to him to see if it increases his growth rate.</span><br data-dcnode-id="1373"><span data-dcnode-id="1372" instrument_node="">
The last guys I planted in a 12" high raised planter with a triple mix soil and store bought peat moss mixed in.  The planted  is under and all around two mature and healthy globe willows, so these guys get hardly any direct light but a whole lot of dappled light.  </span><br data-dcnode-id="1371"><span data-dcnode-id="1370" instrument_node="">
The ones doing best are in the planter they are in a protected yard that sees no wind.  They get plenty of warmth and no intense heat.  The peat smells likes old forest when scrape the bottom.  The dirt always looks black.  When you water it the organic stuff floats for a minute then the water is gone.  It's like walking on memory foam.  I don't walk on it much because I don't want to pack it.  I have a good compost tea recipe that makes everything grow crazy.  I will use it on some of these guys soon to see what happens and report back later.</span><br data-dcnode-id="1369"><span data-dcnode-id="1368" instrument_node="">
</span><br data-dcnode-id="1367"><span data-dcnode-id="1366" instrument_node="">
UPDATE:</span><br data-dcnode-id="1365"><span data-dcnode-id="1364" instrument_node="">
I bought 9 more from burgess seed or kelly seed I forget. These were the best plants I've ever seen from that place.  Anyway, I have truly figured these guys out.  You must plant them in a raised planter with six hours of sun and a gallon of water a day per foot of tree minimum.  New plants will have sun burnt leaves after opening.  They eventually normalize.  I planted a few in a window box that works too.  I planted a two on the side of 2 foot hill (fastest grow), in a medium of 80% peat moss rest native soil.</span><br data-dcnode-id="1363"><span data-dcnode-id="1362" instrument_node="">
These guys need sun, water, acidic soil, and well well well drained soil. The water cannot stand.</span><br data-dcnode-id="1361"><span data-dcnode-id="1360" instrument_node="">
</span></span></p><span data-dcnode-id="1357" instrument_node="">
</span></td></tr><tr data-dcnode-id="1323" id="cid-165644"><td data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Positive</span></td><td data-dcnode-id="1325"><p data-dcnode-id="1344"><span data-dcnode-id="1348" instrument_node="">On Feb 10, 2016, </span><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/DavidLMo/"><span data-dcnode-id="1347" instrument_node="">DavidLMo</span></a><span data-dcnode-id="1345" instrument_node="">  from St Joseph, MO wrote:</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1342" instrument_node="">I have one tree (purchased - expensive) here in NW Missouri Zone 5B.</span><br data-dcnode-id="1341"><span data-dcnode-id="1340" instrument_node="">

From other comments ... "Easy to grow if you know the trick."</span><br data-dcnode-id="1333"><span data-dcnode-id="1332" instrument_node="">

That's helpful.</span><br data-dcnode-id="1329"><span data-dcnode-id="1328" instrument_node="">

</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1302" id="cid-162345"><td data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Positive</span></td><td data-dcnode-id="1304"><p data-dcnode-id="1313"><span data-dcnode-id="1317" instrument_node="">On Nov 28, 2015, </span><a data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/RIGHTandreason/"><span data-dcnode-id="1316" instrument_node="">RIGHTandreason</span></a><span data-dcnode-id="1314" instrument_node="">  from Fairfield, CT wrote:</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1311" instrument_node="">A wonderful native tree. I have read extensively on this tree, rooted cuttings and grown from seed. The skinny on this plant, the why it died out in the wild, may have been due to the growing of cotton in the surrounding fields. It was never a prevalent tree to begin with and suffered from being extremely sensitive to the residue of cotton farming. Rain, floods and such washed and continue to wash this cotton seed meal residue pathogen into the very soil that made up the natural area where it grew. Attempts to reintroduce it into former ranges may be difficult at best as the cotton seed meal residue is very persistent in the soil. I have about 350 seedlings that are about 4 inches tall . Easy to grow if you know the trick. I will look for variegated foliage, darker foliage,different size f</span><a data-dcnode-id="1309" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-162345').style.display='inline'; return false;"><span data-dcnode-id="1310" instrument_node="">... read more</span></a><span data-dcnode-id="1307" id="readmore-162345" style="display:none;"><span data-dcnode-id="1308" instrument_node="">lowers, doubles and new  forms and shapes as they grow and get closer to bloom size. Doing the same with Stewartia ovata, Stewartia malecodendron and Halesia monticola  and tetraptera forms.</span></span></p><span data-dcnode-id="1305" instrument_node="">
</span></td></tr><tr data-dcnode-id="1285" id="cid-157299"><td data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Positive</span></td><td data-dcnode-id="1287"><p data-dcnode-id="1292"><span data-dcnode-id="1296" instrument_node="">On Aug 10, 2015, </span><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/jadc/"><span data-dcnode-id="1295" instrument_node="">jadc</span></a><span data-dcnode-id="1293" instrument_node="">  from Philippi, WV wrote:</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">I have grown Franklinia here in Philippi, WV for more than ten years.  It took several seasons for it to bloom, but now it does so every year starting in August and lasting into late September. The tree has survived winter of -10F nd a bit lower with no damage.  The soil here is mostly clay with a bit of loam  I have use a commercial fertilizer on it once years ago, but the plant seems to thrive without it The late season flowers are spectacular and really go well with the red autumn foliage.</span></p><span data-dcnode-id="1288" instrument_node="">
</span></td></tr><tr data-dcnode-id="1278" id="cont_ad_rev"><td colspan="2" data-dcnode-id="1279"><div class="ad ad-300x250" data-dcnode-id="1280"><div class="ad-image" data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">
</span></div></div></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1257" id="cid-153890"><td data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Neutral</span></td><td data-dcnode-id="1259"><p data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node="">On Jun 17, 2015, </span><a data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/lovescout/"><span data-dcnode-id="1271" instrument_node="">lovescout</span></a><span data-dcnode-id="1269" instrument_node="">  from Portland, OR wrote:</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1266" instrument_node="">I live in Portland, OR and purchased two 1.5 caliper Franklinias as replacements for the two Birch I removed next to the street. I planted them in January and one of them is doing very well. The other seems to be very dry. I water them fairly regularly, but it has been very hot for this part of the year. Any suggestions? Anything I have done to one I have done to the other. I have used fertilizer (triple 16, if I'm remembering correctly) on them about a month ago, but again, one is thriving while the other seems to be dying. The one that isn't doing as well is closer to the driveway, but I'm not sure if that would effect anything. They are also in morning sun and stay in the sun pretty much all day. Any help would be greatly appreciated.</span><br data-dcnode-id="1265"><span data-dcnode-id="1264" instrument_node="">
</span><br data-dcnode-id="1263"><span data-dcnode-id="1262" instrument_node="">
Kristina</span></p><span data-dcnode-id="1260" instrument_node="">
</span></td></tr><tr data-dcnode-id="1238" id="cid-150537"><td data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Positive</span></td><td data-dcnode-id="1240"><p data-dcnode-id="1245"><span data-dcnode-id="1251" instrument_node="">On Feb 11, 2015, </span><a data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/arbol/"><span data-dcnode-id="1250" instrument_node="">arbol</span></a><span data-dcnode-id="1248" instrument_node="">  from Nelson,</span><br data-dcnode-id="1247"><span data-dcnode-id="1246" instrument_node="">Canada wrote:</span></p><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">I heard this spectacular little tree was a fussy transplanter, but I thought I would give it a go anyways. I must admit that I did not provide an ideal growing medium in terms of pH and soil texture, but the tree is persisting into its 4th year. Also might add that I am in what would be a USDA zone 5. Must say thanks to the northernexotics (Aug. 9th 2014) subscriber for providing such excellent information with regards to its specific growing requirements. Unfortunately, I must dash your hopes of being the most northernly grown Franklinia in North America as you are at 43 degrees latitude and I am just under 50 degrees latitude. I am sure there will be other reports of specimens even further north in time.</span></p><span data-dcnode-id="1241" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1213" id="cid-149624"><td data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Neutral</span></td><td data-dcnode-id="1215"><p data-dcnode-id="1228"><span data-dcnode-id="1232" instrument_node="">On Jan 25, 2015, </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/giegertree/"><span data-dcnode-id="1231" instrument_node="">giegertree</span></a><span data-dcnode-id="1229" instrument_node="">  from Savannah, GA wrote:</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1217"><span data-dcnode-id="1226" instrument_node="">Sadly, some moron here in the South has perpetuated a myth that the Franklin tree needs to grow in wet/mucky conditions since it was found along the Altamaha River.</span><br data-dcnode-id="1225"><span data-dcnode-id="1224" instrument_node="">
</span><br data-dcnode-id="1223"><span data-dcnode-id="1222" instrument_node="">
NOT! It grew on the upper banks above the river, having excellent drainage. This is the main cause of Franklin trees croaking here in the Deep South, leading to root fungal problems!</span><br data-dcnode-id="1221"><span data-dcnode-id="1220" instrument_node="">
</span><br data-dcnode-id="1219"><span data-dcnode-id="1218" instrument_node="">
A humusy, rich soil with excellent drainage (but never really dry) is necessary. Partial shade or under pine (high shade) is ideal this far south.</span></p><span data-dcnode-id="1216" instrument_node="">
</span></td></tr><tr data-dcnode-id="1176" id="cid-144258"><td data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">Positive</span></td><td data-dcnode-id="1178"><p data-dcnode-id="1203"><span data-dcnode-id="1207" instrument_node="">On Sep 28, 2014, </span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/wvbotanist/"><span data-dcnode-id="1206" instrument_node="">wvbotanist</span></a><span data-dcnode-id="1204" instrument_node="">  from Morgantown, WV wrote:</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1201" instrument_node="">As a botanist, Franklinia alatamaha was on my "to have" list.  On field trips during graduate work at UNC, Chapel Hill, I saw many Gordonia to which it is related.  Actually, were it not a "nomen conservandum" then it would be of the genus Gordonia.</span><br data-dcnode-id="1200"><span data-dcnode-id="1199" instrument_node="">
</span><br data-dcnode-id="1198"><span data-dcnode-id="1197" instrument_node="">
I obtained my Franklinia about 16 years ago as the result of the power company giving vouchers for trees they cut along my property.  I was taking care of my mother at the time in the home where I grew up and now own.  It is 5 acres of an old farm.  I planted it in an area with sun, but as it turned out, poor drainage.  It almost died.  In desperation, I moved it "down back" to an area my dad had planted with hemlock, oak, hickory, birch, beech and tulip poplar in 1937 when they bought the almost treeless property. It is just bel</span><a data-dcnode-id="1195" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-144258').style.display='inline'; return false;"><span data-dcnode-id="1196" instrument_node="">... read more</span></a><span data-dcnode-id="1181" id="readmore-144258" style="display:none;"><span data-dcnode-id="1194" instrument_node="">ow the yard and I can see my little Georgia belle from the kitchen window.  Last year it had 16 bloom and I photographed almost every one.  Our winter was unusual, even for northern West Virginia.  We had almost a week with temperatures staying well below zero on two different occasions.  I would go down and check the buds which always felt supple.  It leafed out w/ only one small branch killed.  There is a bloom now and 4 more buds.  I had a total of 42 buds earlier and what a joy to watch them come out.  One day I had 7 at one time.  </span><br data-dcnode-id="1193"><span data-dcnode-id="1192" instrument_node="">
</span><br data-dcnode-id="1191"><span data-dcnode-id="1190" instrument_node="">
A grad school friend of mine, now retired, spent his career in GA where he grew up.  A number of years ago on a GA field trip to see Elliottia (a member of the Ericaceae on its way out due to cloning and no/little viable seed production) my friend and a history friend of his talked about hunting Franklinia.  They mapped out GA with all possible spots where it might be found and over 30 years, systematically searched for it to no avail.  They felt it had never been abundant there.</span><br data-dcnode-id="1189"><span data-dcnode-id="1188" instrument_node="">
</span><br data-dcnode-id="1187"><span data-dcnode-id="1186" instrument_node="">
Recently, I saw a surmise that it originally may have been a more northern species which was pushed south by glacial climates and did not make it back north.  A lot of our middle/southern eastern North American flora is closely related to that of Japan and China.  As a member of the Theaceae (tea family) this would make sense for Franklinia to be akin to some cooler climate species and actually do better farther north than GA.  </span><br data-dcnode-id="1185"><span data-dcnode-id="1184" instrument_node="">
</span><br data-dcnode-id="1183"><span data-dcnode-id="1182" instrument_node="">
I want to try germinating some of the seed.  </span></span></p><span data-dcnode-id="1179" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1149" id="cid-143218"><td data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Positive</span></td><td data-dcnode-id="1151"><p data-dcnode-id="1164"><span data-dcnode-id="1170" instrument_node="">On Aug 9, 2014, </span><a data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/northernexotics/"><span data-dcnode-id="1169" instrument_node="">northernexotics</span></a><span data-dcnode-id="1167" instrument_node="">  from Guelph, Ontario,</span><br data-dcnode-id="1166"><span data-dcnode-id="1165" instrument_node="">Canada wrote:</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1162" instrument_node="">I live in Guelph, Ontario, Canada, USDA zone 6a. It is negative 23 Celsius winters on average. My franklinia survived with minor twig die-back after 10 days of negative 34C temperatures in the unusually frigid winter of 2013-14.  It is planted on the south side of the house protected from winter winds on a 6ft x 6ft x 3 ft pile of soil mixed specifically for the franklinia, and is similar to my rhododendron soil mix. I cover the franklinia with commercial nursery felt in  winter and treat it no differently than my rhododendrons, hardy camellias, magnolia grandiflora "Edith Bogue", hardy crepe myrtle and magnolia virginiana "porcelain Dove" for over-wintering. It is planted on a mound of soil to ensure perfect drainage, always, particularly after an all day rain, the winter snow melts in Ma</span><a data-dcnode-id="1160" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-143218').style.display='inline'; return false;"><span data-dcnode-id="1161" instrument_node="">... read more</span></a><span data-dcnode-id="1154" id="readmore-143218" style="display:none;"><span data-dcnode-id="1159" instrument_node="">rch and the heavy summer thunderstorm rains. The soil mix is 50% commercial bagged acid soil mix (4.5 to 5.8 ph), 25% small natural pine bark nuggets (naturally acidic) and 25% sand. Peat  is avoided except for the peat contained in the commercial bagged acid soil.  Peat has a  tendency to compact over time as it decomposes. Peat does not maintain the small air-filled soil pockets required by the fibrous roots to search  for moisture, oxygen and nutrients. The pine bark chips provide these air pockets and prevent root rot.  The soil is monitored several times a week. Soil is kept moist but not wet. In times of hot summer weather I fog the leaves with a hose end fogger in early morning ( time for leaves to dry) to provide humidity. I researched the climate and growing conditions along the Alamataha River where it grew historically and try to duplicate the climate and growing conditions.  The plant responds well with abundant flowers, lush foliage all season, beautiful autumn colour and 8 in to 15 in of new season growth after the first planting year.   I am very pleased almost in awe of having such a rare and amazing franklinia growing happily so far north.  A local community college, Fanshawe College in London Ontario Canada in a growing zone slightly warmer than Guelph ( USDA 7a vs. 6a) reports on its website it has an established franklinia growing in their campus arboretum.  They claim it is the most northerly franklinia  grown in the world.   Assuming their claim has merit, London, Ontario  being about 60 km south-west  of Guelph makes my franklinia the most northerly grown franklinia in the world. Not likely but fun to think so. </span><br data-dcnode-id="1158"><span data-dcnode-id="1157" instrument_node="">
From my experience I conclude it is not so much cold winter temperature ( within reason) that makes growing a franklinia in the north such a challenge but it is meeting the exacting soil requirements it has. </span><br data-dcnode-id="1156"><span data-dcnode-id="1155" instrument_node="">
Credentials: Landscape Architect (MLA) and life-long practical horticultural experience. </span></span></p><span data-dcnode-id="1152" instrument_node="">
</span></td></tr><tr data-dcnode-id="1142" id="cont_ad_rev"><td colspan="2" data-dcnode-id="1143"><div class="ad ad-300x250" data-dcnode-id="1144"><div class="ad-image" data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">
</span></div></div></td></tr><tr data-dcnode-id="1101" id="cid-137473"><td data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Positive</span></td><td data-dcnode-id="1103"><p data-dcnode-id="1132"><span data-dcnode-id="1136" instrument_node="">On Feb 13, 2014, </span><a data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/coriaceous/"><span data-dcnode-id="1135" instrument_node="">coriaceous</span></a><span data-dcnode-id="1133" instrument_node="">  from ROSLINDALE, MA wrote:</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1130" instrument_node="">This legendary tree is the latest of the ornamental flowering trees to bloom, and it would be a valuable contribution to the garden for that reason alone. (Here in Boston Z6a it blooms from mid-August to late September.)</span><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node="">
</span><br data-dcnode-id="1127"><span data-dcnode-id="1126" instrument_node="">
But it also has spectacular scarlet fall foliage and a graceful open upright habit (at least when young) that integrates well with other plants in restricted garden spaces. In habit it somewhat resembles sweetbay magnolia (M. virginiana).</span><br data-dcnode-id="1125"><span data-dcnode-id="1124" instrument_node="">
</span><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node="">
Here in the north, establishment can be a gamble. It takes several years to get established, during which time it can be killed by a hard winter, and should receive winter protection. Once established, it's reliably hardy. I have a local friend who grew a specimen from a quart-pot plant, but I recommend start</span><a data-dcnode-id="1120" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-137473').style.display='inline'; return false;"><span data-dcnode-id="1121" instrument_node="">... read more</span></a><span data-dcnode-id="1106" id="readmore-137473" style="display:none;"><span data-dcnode-id="1119" instrument_node="">ing with a larger plant, preferably at least 5 gallons. It's best planted in spring.</span><br data-dcnode-id="1118"><span data-dcnode-id="1117" instrument_node="">
</span><br data-dcnode-id="1116"><span data-dcnode-id="1115" instrument_node="">
Performance is best in a protected microclimate in full sun, but it will tolerate light shade. Be patient with it in the spring---it's normally late to leaf out.</span><br data-dcnode-id="1114"><span data-dcnode-id="1113" instrument_node="">
</span><br data-dcnode-id="1112"><span data-dcnode-id="1111" instrument_node="">
The specimens at the Arnold Arboretum are remarkable.</span><br data-dcnode-id="1110"><span data-dcnode-id="1109" instrument_node="">
</span><br data-dcnode-id="1108"><span data-dcnode-id="1107" instrument_node="">
Dirr gives its height as 10-20', and the old trees in the Arnold Arboretum are only about 20' tall. The national champion tree at Wyndmoor, PA is 37' tall.</span></span></p><span data-dcnode-id="1104" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1084" id="cid-136540"><td data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Positive</span></td><td data-dcnode-id="1086"><p data-dcnode-id="1091"><span data-dcnode-id="1095" instrument_node="">On Dec 3, 2013, </span><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/Rickwebb/"><span data-dcnode-id="1094" instrument_node="">Rickwebb</span></a><span data-dcnode-id="1092" instrument_node="">  from Downingtown, PA wrote:</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">It is an expensive and rare plant that does well in southeast Pennsylvania in locations with good quality soil and shelter from strong winds. My main employer planted one from the Bartram estate in Philadelphia in her back yard and it is doing well, growing about 1 ft/yr so far. Pretty big solitary flowers, good red fall color, and neat, clean habit.</span></p><span data-dcnode-id="1087" instrument_node="">
</span></td></tr><tr data-dcnode-id="1067" id="cid-134533"><td data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Positive</span></td><td data-dcnode-id="1069"><p data-dcnode-id="1074"><span data-dcnode-id="1078" instrument_node="">On Jul 2, 2013, </span><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/bobbieberecz/"><span data-dcnode-id="1077" instrument_node="">bobbieberecz</span></a><span data-dcnode-id="1075" instrument_node="">  from Concrete, WA wrote:</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">This is one of my favorite trees in the garden (and I have MANY!).  It survived a transplant 1 year after the original placement.  The first 3 years the buds didn't open before our frosts hit, but last year they finally became delightful flowers and, true to their reputation, kept poking in and out of the red/orange foliage.  I'm in the mountains of northwest Washington state and our winters can get to 5 degrees.  My tree gets mid morning sun into the afternoon, then, about 3PM, shade.  It gets watered regularly with the other flowers in the bed and my soil is sandy loam with fertile mulch.  It loves it's spot and is really putting on the growth this year (its fourth).</span></p><span data-dcnode-id="1070" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="1050" id="cid-133481"><td data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Positive</span></td><td data-dcnode-id="1052"><p data-dcnode-id="1057"><span data-dcnode-id="1061" instrument_node="">On May 14, 2013, </span><a data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/tdculp/"><span data-dcnode-id="1060" instrument_node="">tdculp</span></a><span data-dcnode-id="1058" instrument_node="">  from Lima, PA wrote:</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">I recently bought a house in media, pa and to my surprise i have recently been informed that we have 4 Franklinia's on the property.  3 of them are along the roadway and are about 20' tall and one closer to my house and is about 12' tall.  It has beautiful flowers last october right after we moved in.</span></p><span data-dcnode-id="1053" instrument_node="">
</span></td></tr><tr data-dcnode-id="1015" id="cid-129785"><td data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Positive</span></td><td data-dcnode-id="1017"><p data-dcnode-id="1040"><span data-dcnode-id="1044" instrument_node="">On Aug 18, 2012, </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/surpriseberry/"><span data-dcnode-id="1043" instrument_node="">surpriseberry</span></a><span data-dcnode-id="1041" instrument_node="">  from Edgewater, MD wrote:</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1038" instrument_node="">From </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.finegardening.com/" rel="nofollow" target="_dgnew"><span data-dcnode-id="1037" instrument_node="">http://www.finegardening.com</span></a><br data-dcnode-id="1035"><span data-dcnode-id="1034" instrument_node="">
</span><br data-dcnode-id="1033"><span data-dcnode-id="1032" instrument_node="">
Discovered in the wild along Georgia's Altamaha River in 1765 by botanists John and William Bartram, this beautiful landscape tree is considered extinct in the wild. The Bartrams named the plant in honor of their friend Benjamin Franklin. All Franklinias today are descended from those propagated by the Bartrams in their Philadelphia garden. It is a deciduous, understory tree with an upright habit. It can be grown as a single-trunked tree or a multi-stemmed shrub. The fragrant white flowers have bushy yellow stamens and the leaves are dark green and glossy, turning orange, red, and purple in the fall. It blooms in late summer and early autumn, when few other trees are in</span><a data-dcnode-id="1030" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-129785').style.display='inline'; return false;"><span data-dcnode-id="1031" instrument_node="">... read more</span></a><span data-dcnode-id="1020" id="readmore-129785" style="display:none;"><span data-dcnode-id="1029" instrument_node=""> flower. The fruit that follows is woody and spherical. Franklin tree makes a great addition to an open area of a woodland garden.</span><br data-dcnode-id="1028"><span data-dcnode-id="1027" instrument_node="">
Noteworthy characteristics: Glossy foliage and good fall color. Beautiful, camellia-like flowers that are fragrant and bloom late in the season. Native.</span><br data-dcnode-id="1026"><span data-dcnode-id="1025" instrument_node="">
Care: Grow in organically rich, moist but very well-drained soil of acidic to neutral pH, in full sun. Resents transplanting and should not be disturbed in the landscape.</span><br data-dcnode-id="1024"><span data-dcnode-id="1023" instrument_node="">
Propagation: Sow seed as soon as ripe at 50° to 64°F. Root softwood cuttings in summer using bottom heat.</span><br data-dcnode-id="1022"><span data-dcnode-id="1021" instrument_node="">
Problems: Wilt and root rot can be serious problems, and Japanese beetles may eat the flowers.</span></span></p><span data-dcnode-id="1018" instrument_node="">
</span></td></tr><tr data-dcnode-id="1008" id="cont_ad_rev"><td colspan="2" data-dcnode-id="1009"><div class="ad ad-300x250" data-dcnode-id="1010"><div class="ad-image" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">
</span></div></div></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="991" id="cid-128091"><td data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Positive</span></td><td data-dcnode-id="993"><p data-dcnode-id="998"><span data-dcnode-id="1002" instrument_node="">On May 25, 2012, </span><a data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/blackberrylily/"><span data-dcnode-id="1001" instrument_node="">blackberrylily</span></a><span data-dcnode-id="999" instrument_node="">  from Erie, PA wrote:</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">I looked for some time for a Franklinia tree - most nurseries were not familiar with it in Erie, Pennsylvania (zone 5).  I finally found  one and planted it two years ago on the north side of my house.  The first winter we had a blanket of snow the entire season and come spring I thought it was dead.  It finally leafed out, sending small shoots from the trunk, some of which I pinched hoping to encourage the stronger, top branches.  Last winter I wrapped it in burlap and it has sent one green growth out; the top branches are dead.  I hope it has some additional growth this summer and I'm not touching it!  So far, no sign of its spectacular bloom.  </span></p><span data-dcnode-id="994" instrument_node="">
</span></td></tr><tr data-dcnode-id="970" id="cid-127500"><td data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Positive</span></td><td data-dcnode-id="972"><p data-dcnode-id="981"><span data-dcnode-id="985" instrument_node="">On May 4, 2012, </span><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/rustyduck/"><span data-dcnode-id="984" instrument_node="">rustyduck</span></a><span data-dcnode-id="982" instrument_node="">  from Morrisville, PA wrote:</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="979" instrument_node="">I had seen a Franklinia at a nursery a number of years ago.  I loved its blooms and form.  At the time, I did not own a home, so filed it away as a must have for when I did have a yard.  When the time came, it was a bit of a challenge for my local nursery to find me a suitable speciman, and it was much shorter than I wanted.  I planted it in the fall with care, but was very disappointed the following spring when the buds formed and then dried up.  I was about to dig the remains up and start over when I noticed that a small shoot was coming out of the side of the skinny trunk.  It grow well last summer.  I held my breath this spring, knowing that the Franklinia was among the last to leaf out.  It's back!  It's only about three feet tall, but it is a survivor!  It will be well worth the atte</span><a data-dcnode-id="977" href="#" onclick="javascript:this.style.display='none';document.getElementById('readmore-127500').style.display='inline'; return false;"><span data-dcnode-id="978" instrument_node="">... read more</span></a><span data-dcnode-id="975" id="readmore-127500" style="display:none;"><span data-dcnode-id="976" instrument_node="">ntion ... I can't wait for it to mature.</span></span></p><span data-dcnode-id="973" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="953" id="cid-123665"><td data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Positive</span></td><td data-dcnode-id="955"><p data-dcnode-id="960"><span data-dcnode-id="964" instrument_node="">On Aug 21, 2011, </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/QuercusAlba/"><span data-dcnode-id="963" instrument_node="">QuercusAlba</span></a><span data-dcnode-id="961" instrument_node="">  from Beverly, MA (Zone 6b) wrote:</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">If carefully sited, this unusual camellia relative performs beautifully in southern and coastal New England. Ideal location here is a warm sunny spot protected from northwesterly winds.</span></p><span data-dcnode-id="956" instrument_node="">
</span></td></tr><tr data-dcnode-id="936" id="cid-109014"><td data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Neutral</span></td><td data-dcnode-id="938"><p data-dcnode-id="943"><span data-dcnode-id="947" instrument_node="">On Dec 12, 2009, </span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/holeth/"><span data-dcnode-id="946" instrument_node="">holeth</span></a><span data-dcnode-id="944" instrument_node="">  from Corpus Christi, TX (Zone 9a) wrote:</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Hardy here.  Extremely fragrant.  Only specimen I've ever seen is gone.  Eradicated about 20 yrs ago from white pines lining a neighbor's border because it didn't fit in.  Property owner considered it a weed and destroyed it. </span></p><span data-dcnode-id="939" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="919" id="cid-108461"><td data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Positive</span></td><td data-dcnode-id="921"><p data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">On Nov 20, 2009, </span><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/CarterGardener/"><span data-dcnode-id="929" instrument_node="">CarterGardener</span></a><span data-dcnode-id="927" instrument_node="">  from Asheville, NC wrote:</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">There is a Franklinia tree growing at Biltmore Estate in Asheville NC.  The Fall color is an amazing orange, and the bark pattern is like no other! It is approximately 12 feet tall and planted amongst other larger trees.</span></p><span data-dcnode-id="922" instrument_node="">
</span></td></tr><tr data-dcnode-id="912" id="cont_ad_rev"><td colspan="2" data-dcnode-id="913"><div class="ad ad-300x250" data-dcnode-id="914"><div class="ad-image" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">
</span></div></div></td></tr><tr data-dcnode-id="895" id="cid-108095"><td data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Neutral</span></td><td data-dcnode-id="897"><p data-dcnode-id="902"><span data-dcnode-id="906" instrument_node="">On Nov 6, 2009, </span><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/ScudAg56/"><span data-dcnode-id="905" instrument_node="">ScudAg56</span></a><span data-dcnode-id="903" instrument_node="">  from Grand Bay, AL wrote:</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">This facinating tree was first discovered by Bartram in 1765 and was last seen in the wild in 1790.  Despite its southeastern location, the tree appears to grow better in cooler climes.  It is theorized that glaciation eradicated the tree from almost all of its original range, leaving only a remnant growing in its southernmost portion along the Altamaha River. It is one of the few trees that flower in the fall.</span></p><span data-dcnode-id="898" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="878" id="cid-91555"><td data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Positive</span></td><td data-dcnode-id="880"><p data-dcnode-id="885"><span data-dcnode-id="889" instrument_node="">On Jul 2, 2008, </span><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/fordhere/"><span data-dcnode-id="888" instrument_node="">fordhere</span></a><span data-dcnode-id="886" instrument_node="">  from Akron, OH wrote:</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">I have had this tree in my yard for nearly twenty years and it has thrived even though it is not listed for zone 5.  It is planted close to my front porch so it is protected.  The Franklinia is one of my favorite trees.  When we bought it at the nursery no one knew anything about this tree and it looked like it was dead (it doesn't leaf until after the other trees).                  </span></p><span data-dcnode-id="881" instrument_node="">
</span></td></tr><tr data-dcnode-id="855" id="cid-8958"><td data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Neutral</span></td><td data-dcnode-id="857"><p data-dcnode-id="866"><span data-dcnode-id="872" instrument_node="">On Jun 27, 2003, </span><a data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/Monocromatico/"><span data-dcnode-id="871" instrument_node="">Monocromatico</span></a><span data-dcnode-id="869" instrument_node="">  from Rio de Janeiro,</span><br data-dcnode-id="868"><span data-dcnode-id="867" instrument_node="">Brazil (Zone 11) wrote:</span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="864" instrument_node="">I was reading about this species. I saw it listed among the most endangered species in Texas. It naturally has a low rate of germination from seeds, and propagation by stem cuttings is always a failure... So bad, I saw so many pictures of flowering individuals, the flowers are awesome!...</span><br data-dcnode-id="863"><span data-dcnode-id="862" instrument_node="">
</span><br data-dcnode-id="861"><span data-dcnode-id="860" instrument_node="">
edit: I recently read an article where the authros were sucessful on hybridizing F. alatamaha with a chinese relative, Schima argentea, in an atempt to save the Franklinia´s genome, "stored" in a different plant until it can be used to effectively propagate Franklinia Trees.</span></p><span data-dcnode-id="858" instrument_node="">
</span></td></tr><tr class="plant-ratings-table-odd" data-dcnode-id="838" id="cid-106"><td data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Neutral</span></td><td data-dcnode-id="840"><p data-dcnode-id="845"><span data-dcnode-id="849" instrument_node="">On Jan 13, 2001, </span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/Ivey/"><span data-dcnode-id="848" instrument_node="">Ivey</span></a><span data-dcnode-id="846" instrument_node="">  from Lyles, TN wrote:</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Just a reminder, Franklinia is now known only in cultivation. Don't let this happen to your favorite plant!</span></p><span data-dcnode-id="841" instrument_node="">
</span></td></tr><tr data-dcnode-id="810" id="cid-42"><td data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Positive</span></td><td data-dcnode-id="812"><p data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">On Nov 11, 2000, </span><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/members/Chooch/"><span data-dcnode-id="831" instrument_node="">Chooch</span></a><span data-dcnode-id="829" instrument_node="">  from Chatham-Kent, ON (Zone 6a) wrote:</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="826" instrument_node="">The most famous discovery of American botanists John and  William Bartram.   The father and son explorers discovered a small grove of this  unknown tree growing along the Altamaha River in Georgia in 1765.   On a later trip, William gathered seeds to propagate at their Philadelphia garden. They named the tree </span><i data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Franklinia alatamaha</span></i><span data-dcnode-id="823" instrument_node=""> in honor of John Bartram's great friend, Benjamin Franklin.</span><br data-dcnode-id="822"><span data-dcnode-id="821" instrument_node="">
</span><br data-dcnode-id="820"><span data-dcnode-id="819" instrument_node="">
A multi-stemmed tree, the growth Rate is 10-20 feet in 20 years. Creamy white fragrant flowers bloom late July into September.</span><br data-dcnode-id="818"><span data-dcnode-id="817" instrument_node="">
</span><br data-dcnode-id="816"><span data-dcnode-id="815" instrument_node="">
Dark green leaves turn orange and red in the fall, often in combination with a few late flowers. Subtly striped branches and persistent seed capsules add winter interest.</span></p><span data-dcnode-id="813" instrument_node="">
</span></td></tr><tr data-dcnode-id="803" id="cont_ad_rev"><td colspan="2" data-dcnode-id="804"><div class="ad ad-300x250" data-dcnode-id="805"><div class="ad-image" data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">
</span></div></div></td></tr></tbody></table><span data-dcnode-id="800" instrument_node=""> </span><div class="comment-add-report-box" data-dcnode-id="794"><a class="comment" data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//davesgarden.com/guides/pf/addcomment.php%3Fpid%3D43"><span class="icon" data-dcnode-id="799"></span><span class="text" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Post a comment about this plant</span></span></a><span data-dcnode-id="795" instrument_node=""> </span></div><span data-dcnode-id="792" instrument_node="">
