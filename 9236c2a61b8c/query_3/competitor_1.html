</span><h1 data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Youth Voting Trends</span></h1><span data-dcnode-id="254" instrument_node="">
</span></div><span data-dcnode-id="252" instrument_node="">
</span></div><span data-dcnode-id="250" instrument_node="">
</span><div class="block block--main-page-content" data-block-plugin-id="system_main_block" data-dcnode-id="130" id="block-elections-content"><span data-dcnode-id="249" instrument_node="">
</span><div class="block__content" data-dcnode-id="132"><span data-dcnode-id="248" instrument_node="">
</span><article about="https://electionsanddemocracy.ca/canadas-elections/youth-voting-trends" class="node node--type-page node--display-mode-full" data-dcnode-id="134"><span data-dcnode-id="247" instrument_node="">
</span><div class="node__content" data-dcnode-id="136"><span data-dcnode-id="246" instrument_node="">
</span><div class="layout layout--onecol" data-dcnode-id="138"><span data-dcnode-id="245" instrument_node="">
</span><div class="layout__region layout__region--content" data-dcnode-id="140"><span data-dcnode-id="244" instrument_node="">
</span><div class="block block--" data-block-plugin-id="field_block:node:page:body" data-dcnode-id="142"><span data-dcnode-id="243" instrument_node="">
</span><div class="block__content" data-dcnode-id="144"><span data-dcnode-id="242" instrument_node="">
</span><div alt="A person walking into a polling station" class="embedded-entity" data-dcnode-id="240" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-embed-display-settings="full" data-entity-type="media" data-entity-uuid="bc99964b-aa14-4542-86cb-259f7c9186fb" data-langcode="en" title="Youth Voting Trends - polling station"><img alt="A person walking into a polling station" data-dcnode-id="241" height="420" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//electionsanddemocracy.ca/sites/default/files/styles/full/public/polling%2520station.jpg%3Fitok%3D60RobmLL&amp;raw" title="Youth Voting Trends - polling station" typeof="foaf:Image" width="1200"></div><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">The health of any democracy depends on informed and engaged citizens. This section discusses the trends and the research done to understand why young Canadians tend to vote less than older Canadians, and how civic education can help get more young Canadians to the polls.</span></p><h2 data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Trends in Overall Voter Turnout</span></h2><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">For several decades, there was a downward trend in overall voter turnout. Before the 1990s, voter turnout was at 70% or higher in most federal elections. The voting rate declined in the years after that, and reached a record low of 59% in 2008.</span></p><div alt="A line graph showing voter turnout from 1970 to 2019" class="embedded-entity" data-dcnode-id="232" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-embed-display-settings="landscape" data-entity-type="media" data-entity-uuid="9c2ca2a8-ec02-4368-842a-25a4f483129b" data-langcode="en" title="Youth Voter Trends - EN Graph "><img alt="A line graph showing voter turnout from 1970 to 2019" data-dcnode-id="233" height="400" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//electionsanddemocracy.ca/sites/default/files/styles/landscape/public/Youth%2520Voter%2520Trends%2520Update_Graph%25201_EN.JPG%3Fitok%3Dzo4AgNsF&amp;raw" title="Youth Voter Trends - EN Graph " typeof="foaf:Image" width="600"></div><p data-dcnode-id="229"><a data-dcnode-id="230" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="430503bc-16b1-49cf-8768-214b50500de5" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//electionsanddemocracy.ca/canadas-elections/youth-voting-trends/voter-turnout-graph-text-version" title="Voter turnout graph - Text version"><span data-dcnode-id="231" instrument_node="">Voter turnout graph - Text version</span></a></p><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Those trends started to reverse in 2011, and the results for 2015 were even more positive. Overall, voter turnout reached 68.3% in 2015 and only slightly decreased to 67% in 2019.</span></p><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">In 2015, voter turnout for youth (aged 18 to 24) increased the most of any age group: compared with 2011, over half a million more young Canadians voted.</span></p><p data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">But, in 2019, youth voter turnout decreased by 3.2 percentage points. Could it signal a downward shift in the trend? Or could it be a sign that participation is stabilizing?</span></p><h2 data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Voting Trends by Age</span></h2><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">One thing has remained true in the last decade: there is a significant turnout gap between younger and older demographics. In 2015, the turnout for young voters was more than 20 percentage points lower than that for people in the 65 to 74 age group.</span></p><p data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">In 2019, the gap between these age groups increased, with youth at 25 percentage points lower than the 65 to 74 age group.</span></p><div alt="A infographic comparing turnout in two age groups. Turnout in the 18 to 24 age group is 54%. Turnout in the 65 to 74 age group is 79%." class="embedded-entity" data-dcnode-id="215" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-embed-display-settings="landscape" data-entity-type="media" data-entity-uuid="f9c792df-f008-4cba-b946-d550e71e6ceb" data-langcode="en" title="Youth Voter Trends - EN Infographic"><img alt="A infographic comparing turnout in two age groups. Turnout in the 18 to 24 age group is 54%. Turnout in the 65 to 74 age group is 79%." data-dcnode-id="216" height="400" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//electionsanddemocracy.ca/sites/default/files/styles/landscape/public/Youth%2520Voter%2520Trends%2520Update_Graph%25202_EN.JPG%3Fitok%3DxnrBjJ3r&amp;raw" title="Youth Voter Trends - EN Infographic" typeof="foaf:Image" width="600"></div><p data-dcnode-id="212"><strong data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Voting is habit-forming</span></strong></p><p data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">If a person votes in their first election, they will probably be a life-long voter. On the other hand, if someone does not vote in their first election, they will probably not pick up the habit later in life.</span></p><p data-dcnode-id="205"><span data-dcnode-id="209" instrument_node="">This graph represents the results of a </span><a data-dcnode-id="207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Drec/part/yth/gnchng%26document%3Dp1%26lang%3De"><span data-dcnode-id="208" instrument_node="">study</span></a><span data-dcnode-id="206" instrument_node=""> conducted with three cohorts of eligible voters between 1965 and 2011.</span></p><p data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">&nbsp;</span></p><div alt="A line graph showing three study groups that demonstrate how voting as of an early age is habit-forming and makes for higher long-term participation rates " class="embedded-entity" data-dcnode-id="201" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-embed-display-settings="landscape" data-entity-type="media" data-entity-uuid="83537de0-56d5-465e-a55a-2bf95e51edf0" data-langcode="en" title="Youth Voting Trends - first time voters graph"><img alt="A line graph showing three study groups that demonstrate how voting as of an early age is habit-forming and makes for higher long-term participation rates " data-dcnode-id="202" height="400" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//electionsanddemocracy.ca/sites/default/files/styles/landscape/public/first%2520time%2520voters%2520graph.png%3Fitok%3DXSSrWhvL&amp;raw" title="Youth Voting Trends - first time voters graph" typeof="foaf:Image" width="600"></div><p data-dcnode-id="198"><a data-dcnode-id="199" data-entity-substitution="canonical" data-entity-type="node" data-entity-uuid="884449cd-554a-417c-a94e-61b86ccfc914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//electionsanddemocracy.ca/canadas-elections/youth-voting-trends/first-time-voter-turnout-graph-text-version" title="First-time voter turnout graph - Text version"><span data-dcnode-id="200" instrument_node="">First-time voter turnout graph - Text version</span></a></p><h2 data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Why are fewer young people voting?</span></h2><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Elections Canada has commissioned several research studies to better understand why many young people are not showing up to the polls. This research is part of Elections Canada’s ongoing efforts to understand how barriers to voting are evolving.</span></p><p data-dcnode-id="189"><span data-dcnode-id="193" instrument_node="">From the </span><a data-dcnode-id="191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Drec/eval/pes2015/nys%26document%3Dindex%26lang%3De"><span data-dcnode-id="192" instrument_node="">2015 National Youth Survey</span></a><span data-dcnode-id="190" instrument_node="">, the agency found two major barriers that prevented youth from voting: motivation and access. The survey found that compared to older voters, Canadian youth</span></p><ul data-dcnode-id="180"><li data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">are less interested in Canadian politics</span></li><li data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">feel less strongly that voting will make a difference</span></li><li data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">believe that the government does not care what they think</span></li><li data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">tend to see voting as a choice rather than a duty</span></li></ul><p data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">In terms of access, the survey discovered that youth</span></p><ul data-dcnode-id="171"><li data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">were less likely to receive a voter information card</span></li><li data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">were less aware of the ways to register and vote</span></li><li data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">perceived the voting process as too difficult (getting to the polls, proving their identity)</span></li></ul><p data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">The research suggests that a key factor in overcoming these barriers is increasing the interest level and political knowledge of future voters.</span></p><h2 data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">The Value of Civic Education</span></h2><p data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">Given all this research, Elections Canada knows that when it comes to preparing future voters to take part in civic life, education matters. In the 2015 National Youth Survey, young people who voted were much more likely to say that</span></p><ul data-dcnode-id="160"><li data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">they learned about government and politics in high school</span></li><li data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">they took part in a mock election</span></li></ul><p data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">Creating future voters who are engaged and prepared to vote will require families, schools, government and others to work towards this goal. Our democracy depends on it!</span></p><h2 data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Helpful Links</span></h2><ul data-dcnode-id="146"><li data-dcnode-id="153"><a data-dcnode-id="154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//electionsanddemocracy.ca/resources"><span data-dcnode-id="155" instrument_node="">Elections Canada educational resources</span></a></li><li data-dcnode-id="150"><a data-dcnode-id="151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//electionsanddemocracy.ca/curriculum-connections"><span data-dcnode-id="152" instrument_node="">Curriculum connections</span></a></li><li data-dcnode-id="147"><a data-dcnode-id="148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Drec/part%26document%3Dindex%26lang%3De"><span data-dcnode-id="149" instrument_node="">Elections Canada research on youth voting</span></a></li></ul><span data-dcnode-id="145" instrument_node="">
