things altered a bit over the years. We changed the way the electoral college picks the president and vice president. We declared that black people in the south each were 3/5 of a person, and even though they were 60% human, the voting rights belonged to the 40% they were not. Then we fixed that and made them 100% human, gave them 40 acres and a mule. It was a helluva fight. They still didn’t get to vote much, and had to sit in the back of the bus even when the front was empty, and had to drink from their own fountains even if one was right in front of them and theirs was a block away. We fixed that, too. There were riots and soldiers. Then we stopped letting 7 guys in a closed room decide when all the 19 year olds had to go get their butts blown up for no good reason. It was a big argument. Nobody really won. We also discovered that black people made pretty good music. White people stole it for a while, but some white people decided to promote the original composers, and led the way to helping people get along. Who knew that it really came down to knowing how to boogie? Since that time we discovered our Presidents and Congressmen had more than a little trouble with some of the basics of life, like how many people they can have sex with and where, and the like. Several of them were caught lying. We always knew they did it but before, they had the decency to hide it. It was embarrassing. We became a very reactive country, and were attacked in ways we never anticipated. Twice, terrorists bombed a couple of our African embassies, and we got even by blowing up an aspirin factory. I guess we figured if they are going to give us a headache, we are going to make them unable to get rid of theirs. We elected a black man named Bill Clinton office, but the real black people were not happy with that and wanted one a little darker skinned. They finally got their wish. We almost had a female president. She said she had been wearing the pants in the family for a long time anyway, might as well go national with it. It didn’t happen. We are not sure why. We got a lot of conflicting stories about it.</span></span></p><span data-dcnode-id="4081" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4078" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4079" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4080" instrument_node="">Yes, the U.S. Government has changed a lot. One thing that has only changed one time, though, and that only for a short time, is that we owe money. We started out owing some money. One of our guys, a real horses’ ass named Andrew Jackson actually got the debt paid off, but the next guy put us right back in hawk, and we have been there ever since. Sometimes I think the national anthem should be changed to “Sixteen Tons”.</span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="4067" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4069" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4070" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4077" instrument_node="">You load sixteen tons, what do you get?</span><br data-dcnode-id="4076"><span data-dcnode-id="4075" instrument_node="">Another day older and deeper in debt</span><br data-dcnode-id="4074"><span data-dcnode-id="4073" instrument_node="">Saint Peter don't you call me 'cause I can't go</span><br data-dcnode-id="4072"><span data-dcnode-id="4071" instrument_node="">I owe my soul to the company store</span></span></p><div class="q-absolute qu-borderRadius--p  direction: ltr;"><span data-dcnode-id="3804" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3805" instrument_node="">However, we can infer a lot. The United States' system of government was essentially unique at the time it was created. It combined elements of British parliamentarianism and Swiss federalism, and retained the trappings of British constitutional monarchy, but with one major change--the head of state had to undergo a renewal of mandate every four years. The United States was the fir</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3791" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3792" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3793" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3794" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3795" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3800" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3801" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3802" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3796" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3797"><svg data-dcnode-id="3798" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3799" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3751" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3752" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3753"><span class="q-box qu-userSelect--text" data-dcnode-id="3754" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3783" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3784" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3785" instrument_node="">This isn't something we can scientifically prove one way or the other, since there's no direct comparison of a country arising based on the Anglo-Saxon culture in similar circumstances, and lasting to the modern day.</span></span></p><span data-dcnode-id="3782" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3779" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3780" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3781" instrument_node="">However, we can infer a lot. The United States' system of government was essentially unique at the time it was created. It combined elements of British parliamentarianism and Swiss federalism, and retained the trappings of British constitutional monarchy, but with one major change--the head of state had to undergo a renewal of mandate every four years. The United States was the first country to have a Presidential system of government; in fact, we even invented the concept of a President as head of state.</span></span></p><span data-dcnode-id="3778" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3775" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3776" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3777" instrument_node="">The Presidential system, in actual practice, has failed in more countries than not. Most successful democratic republics have used what we now call the semi-presidential system, in which the head of government and head of state are two different people, as opposed to the Presidential system, where the same person holds both roles. Presidential systems almost always end up as dictatorships.</span></span></p><span data-dcnode-id="3774" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3771" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3772" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3773" instrument_node="">That didn't happen here because of one man--George Washington.</span></span></p><span data-dcnode-id="3770" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3767" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3768" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3769" instrument_node="">Washington was chosen as the first President by acclimation. He didn't want the job, but accepted it and served for eight years because he knew that for the system to work, the first President had to set a precedent for how the office would be run. He governed strictly according to the Constitution, refused more than one offer to remain in the office for life, and at the end of his second term, voluntarily stepped down and returned to his home. By doing all of these things, he used his moral authority to create a de facto code of conduct for future Presidents, which has survived to this day. Any abuse of power, or perceived abuse of power, by a President has drawn an immediate reaction both from the people and their representatives in Congress. This is all because George Washington set the standard for what a U.S. President should be, and how one should conduct themselves while holding that office. </span></span></p><span data-dcnode-id="3766" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3763" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3764" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3765" instrument_node="">Washington's great adversary, King George III of Great Britain, once asked his American painter, Benjamin West, what Washington would do after winning independence. West replied, “They say he will return to his farm.” The king replied, “If he does that, he will be the greatest man in the world.”</span></span></p><span data-dcnode-id="3762" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3759" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3760" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3761" instrument_node="">The correct answer is that the United States' form of government has been successful in part because it was formulated as a free, open, democratic society, but at least as much so because its first leader, given every opportunity to be a new Caesar, decided he would rather be a new Cincinnatus, and refused every well-meaning entreaty to be anything but. And everyone who succeeded him as President has been morally compelled to follow the example of this country's founder and first leader, whether he wanted to or not, and has been called on the carpet for failing to do this.</span></span></p><span data-dcnode-id="3758" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3755" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3756" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3757" instrument_node="">If a more ambitious man, someone like Benedict Arnold, Horatio Gates, Aaron Burr, or Alexander Hamilton (those last two were so much alike, it's no wonder they fought to the death) had risen to leadership of the Continental Army during the Revolutionary War, and led America to victory, he would have set a very different example as its first President. Indeed, there might never have been such an office, because he probably would have set himself up as King (or, following Cromwell's example, "Lord Protector") before the Constitution even came into being. If that had happened, the United States never would have become what it has, and might have totally failed.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3673" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3674" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3675" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3689" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3721" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3722" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3732" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3733" style="box-sizing: border-box; position: relative;"><button aria-label="16 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill q text qu-wordBreak--break-word" data-dcnode-id="3558" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="3559" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3580" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3581" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3582" instrument_node="">We may have troubles and we always do. But to suggest the most successful government in all history has failed is just a bit on the wild side.</span></span></p><span data-dcnode-id="3579" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3576" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3577" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3578" instrument_node="">The fact that you are hearing our troubles being discussed isn’t because we are failing, it is because we are fixing the troubles. In a land where troubles cannot be heard is where failure lives. Learn to see what really is going on. The fact of certain troubles being exposed doesn’t mean failure, it means healing.</span></span></p><span data-dcnode-id="3575" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3572" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3573" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3574" instrument_node="">I was in the Philippines some years ago and the people there were fussing that the corruption scandals were making them lose faith in the situ</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="3560" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="3561" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3562" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3563" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3564" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3569" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3570" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3571" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3565" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3566"><svg data-dcnode-id="3567" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3568" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3520" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3521" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3522"><span class="q-box qu-userSelect--text" data-dcnode-id="3523" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3552" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3553" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3554" instrument_node="">We may have troubles and we always do. But to suggest the most successful government in all history has failed is just a bit on the wild side.</span></span></p><span data-dcnode-id="3551" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3548" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3549" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3550" instrument_node="">The fact that you are hearing our troubles being discussed isn’t because we are failing, it is because we are fixing the troubles. In a land where troubles cannot be heard is where failure lives. Learn to see what really is going on. The fact of certain troubles being exposed doesn’t mean failure, it means healing.</span></span></p><span data-dcnode-id="3547" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3544" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3545" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3546" instrument_node="">I was in the Philippines some years ago and the people there were fussing that the corruption scandals were making them lose faith in the situation. I told them think for a moment. If you were not hearing about it, would the corruption be ending?</span></span></p><span data-dcnode-id="3543" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3540" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3541" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3542" instrument_node="">It is a natural law that you get sick with symptoms as you start to heal up and get well. It is a natural law that wounds hurt the most as they heal. A bullet impact hurts very little but recovery is rough!</span></span></p><span data-dcnode-id="3539" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3536" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3537" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3538" instrument_node="">This is a stunningly important natural law for you to learn. It will serve you well throughout your life and give you much understanding of things. When you learn the natural laws which no man can alter or oppose, you will quickly learn to see past the fake news etc .</span></span></p><span data-dcnode-id="3535" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3532" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3533" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3534" instrument_node="">This is why the supporters of President Trump are so strongly supporting him. They know the fuss and fight they are seeing is in fact evidence of the success of the effort. The press can tell us a ton of lies and they do it every day. We are not fooled because we know that fuss wouldn’t be happening if we were losing. The fuss is happening because the opposition is being destroyed and freedom and prosperity is spreading out beyond the elites. It is why the fake news has found it impossible to defeat us. The greatest propaganda effort in human history with computers and AI and everything against us has failed because we learned to read the signs outside of their chatter.</span></span></p><span data-dcnode-id="3531" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3528" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3529" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3530" instrument_node="">When you learn the natural laws you will also learn the cycles and how life works. Let me assure you that the college professors don’t know this and couldn’t teach you this even if they wanted to.</span></span></p><span data-dcno  That said the overall outlays as a percentage of GDP (one measure) are higher, but probably not egregiously. The government spends a larger percentage of the GDP now than it did 50 years ago, by a couple percent (20.5% or so versus 18.5% or so in ‘67), and the exact percentage swings a fair amount each year:</span></span></p><span data-dcnode-id="2218" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2210" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="2211" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fred.stlouisfed.org/series/FYONGDA188S" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="fred.stlouisfed.org"><span data-dcnode-id="2217" instrument_node="">Federal Net Outlays as Percent of Gross Domestic Product</span></a><span class="q-inlineBlock" data-dcnode-id="2212" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2213"><svg data-dcnode-id="2214" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2215" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="2209" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2206" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2207" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2208" instrument_node="">The “Holy Sh*t” isn’t the size of the government (even though I do believe that beast should be starved, but I’m not sure anyone knows how any longer because the government has so distorted “free markets”). It’s the size of the government debt. That was around 35% of the GDP 50 years ago. It shrank to closer to 30% in the Reagan years and then ballooned swiftly and steadily, over doubling to 65% by 1995. Then Congress chipped away at it, getting it down to 54% by 2001. Then it reversed again, rising back up to 62% by 2007.</span></span></p><span data-dcnode-id="2205" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2202" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2203" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2204" instrument_node="">Then………………………….</span></span></p><span data-dcnode-id="2201" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2194" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2199" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2200" instrument_node="">Thomas Jefferson said </span></span><span data-dcnode-id="2197" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2198" instrument_node="">“Experience demands that man is the only animal which devours his own kind, for I can apply no milder term to the general prey of the rich on the poor.“ </span></span><span data-dcnode-id="2195" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2196" instrument_node="">And what happened next will undoubtedly go down in history as the ultimate example of this.</span></span></p><span data-dcnode-id="2193" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2186" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2191" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2192" instrument_node="">The Federal debt skyrocketed to </span></span><span data-dcnode-id="2189" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="2190" instrument_node="">105% of the GDP. 105%!!!!! </span></span><span data-dcnode-id="2187" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2188" instrument_node="">Yet as you see the government didn’t increase in size in terms of outlays.</span></span></p><span data-dcnode-id="2185" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2182" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2183" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2184" instrument_node="">What happened? The government sucked the notional wealth out of the pockets of our children and our children's children (or maybe not because, as a result of this, the State as we know it isn’t likely to survive that long) by allowing the Federal Reserve (a private bank, and BTW Jefferson warned us exactly this would happen) to create debt worth some number that may never really be known but is well over a third of the GDP.</span></span></p><span data-dcnode-id="2181" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2178" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2179" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2180" instrument_node="">This allowed them to pay off the bad bets of a handful of banks (who had made huge fees on laying those bets) and flood the markets with free capital (but not available to small businesses - only large ones). This created enormous wealth for a small handful of people. Far worse, all correlation between risk and reward is now erased permanently as long as you were/are too big to fail. And the final indignity - this virtually free capital has been used not to create jobs but to buy back stock and consolidate the economy. This rewards, primarily, those same bankers and destroys jobs, screws consumers, and has generated massive fees for - again - those same bankers. And creates more industries each week that are controlled by a handful of mega-corporations that have pricing power, privileged access to capital to erect larger self-reinforcing competitive barriers to stifle competition and innovation, buy legislation to do the same, and are - of course - too big to fail.</span></span></p><span data-dcnode-id="2177" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2174" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2175" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2176" instrument_node="">The following chart is more horrifying than the most perverse and disgusting photo you can find in the nether reaches of the Internet.</span></span></p><span data-dcnode-id="2173" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2165" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="2166" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="2171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fred.stlouisfed.org/series/GFDEGDQ188S%3Futm_source%3Dseries_page%26utm_medium%3Drelated_content%26utm_term%3Drelated_resources%26utm_campaign%3Dcategories" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="fred.stlouisfed.org"><span data-dcnode-id="2172" instrument_node="">Federal Debt: Total Public Debt as Percent of Gross Domestic Product</span></a><span class="q-inlineBlock" data-dcnode-id="2167" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="2168"><svg data-dcnode-id="2169" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="2170" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="2164" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2161" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2162" style="font-weight: normal; font-style: normal; background: none;"><span data-d  give a factual rebuttal.</span></span></li><li class="q-relative" data-dcnode-id="1766" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1767" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1768" instrument_node="">Once was a time when, with a little self fortitude, a person could strike out and if they failed, well pick yourself up and dust off and try again. Now failure is a dirty word and there seems to be a growing sense of wanting to be taken care of. Instead of failure beiing an option, it is disallowed and looked down on.</span></span></li><li class="q-relative" data-dcnode-id="1763" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1764" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1765" instrument_node="">Compromise, horse trading, give and take. This is now foreign to the process. Maybe it has been all along, but in recent years it has raken a forefront.</span></span></li><li class="q-relative" data-dcnode-id="1760" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1761" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1762" instrument_node="">Political parties, what a waste. I see nothing inherently evil with like minded people coming together and even fronting people for office. It is however evil to allow the parties to dicate how the political process works.</span></span></li><li class="q-relative" data-dcnode-id="1757" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1758" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1759" instrument_node="">Immigrates and immigration is not a photo-op session, to be trotted out evey so often and used to beat each other over our collective heads. This country was founded, even from the very paleo indians, if I use the term correctly, on immigration. Yes we ought to change it to be just like other countries, merit based, one must prove they are worthwhile.</span></span></li><li class="q-relative" data-dcnode-id="1754" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1755" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1756" instrument_node="">Voting and voting rights are another issue that is banted around from time to time because one party and the other feels each other is going to screw the other over.</span></span></li><li class="q-relative" data-dcnode-id="1751" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="1752" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1753" instrument_node="">Rule by edict, i just blews my mind that a president thinks that they can just whip out their trusty penis and make some executive order because congress will not do what they want done. It is not just the last 10 years this is a problem dealing with.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1747" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1748" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1749" instrument_node="">If I think of any more, I may or may not update.</span></span></p><span data-dcnode-id="1746" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1743" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1744" style="font-we called  into the actual service of the United States; he may require the  opinion, in writing, of the principal officer in each of the executive  departments, upon any subject relat</span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1570" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="1557" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="1558" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="1559" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1560" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1561" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1566" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1567" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1568" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1562" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1563"><svg data-dcnode-id="1564" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1565" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1493" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1494" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1495"><span class="q-box qu-userSelect--text" data-dcnode-id="1496" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1549" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1550" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1551" instrument_node="">Actually, no, presidential power has steadily increased, particularly over the past century. People are generally stunned to read the U.S. Constitution and find that the President was almost nothing more than a figurehead. In fact, this is the full list of the Executive Branch's power:</span></span></p><span data-dcnode-id="1548" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1545" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1546" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1547" instrument_node=""></span></span></p><blockquote class="q-relative qu-color--gray qu-borderWidth--retinaOverride" data-dcnode-id="1518" style="box-sizing: border-box; position: relative; margin-bottom: 1em; border-width: 0px; border-color: transparent; padding-left: 1em;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1520" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1537" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1544" instrument_node="">The President shall be commander in chief of the Army and Navy of the  United States, and of the militia of the several states, when called  into the actual service of the United States; he may require the  opinion, in writing, of the principal officer in each of the executive  departments, upon any subject relating to the duties of their respective  offices, and he shall have power to grant reprieves and pardons for  offenses against the United States, except in cases of impeachment.</span><br data-dcnode-id="1543"><span data-dcnode-id="1542" instrument_node="">He  shall have power, by and with the advice and consent of the Senate, to  make treaties, provided two thirds of the Senators present concur; and  he shall nominate, and by and with the advice and consent of the Senate,  shall appoint ambassadors, other public ministers and consuls, judges  of the Supreme Court, and all other officers of the United States, whose  appointments are not herein otherwise provided for, and which shall be  established by law: but the Congress may by law vest the appointment of  such inferior officers, as they think proper, in the President alone, in  the courts of law, or in the heads of departments.</span><br data-dcnode-id="1541"><span data-dcnode-id="1540" instrument_node="">The President  shall have power to fill up all vacancies that may happen during the  recess of the Senate, by granting commissions which shall expire at the  end of their next session.</span><br data-dcnode-id="1539"><span data-dcnode-id="1538" instrument_node=""></span></span><span data-dcnode-id="1535" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1536" instrument_node="">Section 3.</span></span><span data-dcnode-id="1529" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1534" instrument_node=""> </span><br data-dcnode-id="1533"><span data-dcnode-id="1532" instrument_node="">He  shall from time to time give to the Congress information of the state  of the union, and recommend to their consideration such measures as he  shall judge necessary and expedient; he may, on extraordinary occasions,  convene both Houses, or either of them, and in case of disagreement  between them, with respect to the time of adjournment, he may adjourn  them to such time as he shall think proper; he shall receive ambassadors  and other public ministers; he shall take care that the laws be  faithfully executed, and shall commission all the officers of the United  States.</span><br data-dcnode-id="1531"><span data-dcnode-id="1530" instrument_node=""></span></span><span data-dcnode-id="1527" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1528" instrument_node="">Section 4.</span></span><span data-dcnode-id="1521" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1526" instrument_node=""> </span><br data-dcnode-id="1525"><span data-dcnode-id="1524" instrument_node="">The  President, Vice President and all civil officers of the United States,  shall be removed from office on impeachment for, and conviction of,  treason, bribery, or other high crimes and misdemeanors.</span><br data-dcnode-id="1523"><span data-dcnode-id="1522" instrument_node=""></span></span></p><div class="q-absolute qu-borderRadius--pill QTextBlockQuote___StyledAbsolute-an1wlz-0 dHUDep" data-dcnode-id="1519" style="box-sizing: border-box; position: absolute; top: 0px; bottom: 0px; width: 3px; background-color: currentcolor; opacity: 0.3;" width="3"></div></blockquote><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1513" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1514" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1517" instrument_node=""></span><br data-dcnode-id="1516"><span data-dcnode-id="1515" instrument_node="">It's not much more than the power to direct the military once war is declared; the responsibility to keep Congress aprised of the situation; appoint ambassadors and Supreme Court Justices. </span></span></p><span data-dcnode-id="1512" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1509" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1510" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1511" instrument_node="">Compare that to the tremendously powerful Presidents we see today--something has certainly changed. The War Powers Act was one such change, as it allowed the President to initiate military activity. Previously, only Congress could send the military into action, and the President was only in charge once they were in action. It's like Congress was allowed to crank the vehicle, but only the President could drive it. The War Powers Act gave the President the authority to crank the vehicle, too, and I would argue that's been a bad thing. Because now we have loopholes and other legal shenanigans where the President is ordering assassinations and using drones to drop bombs in whatever country he chooses (Bush did the same), and that's unequivocally not something the Founders had in mind when they wrote the Constitution.</span></span></p><span data-dcnode-id="1508" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1505" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1506" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1507" instrument_node="">Executive Orders are another example, because Presidents have been abusing those for a rather long time. Initially, they were more or less just special notes that the President fixed onto a bill as he signed it into law. Now, they basically ARE laws, which undermines the entire system of checks and balances. The President was never meant to legislate, and Executive Orders now allow the President to do so. </span></span></p><span data-dcnode-id="1504" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1501" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1502" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1503" instrument_node="">The trend is one that steadily moves toward more centralized authority. I would argue that the reason for this is that most Americans have no idea what the Constitution says or why it is important, and that the notion that "the government would never do anything unconstitutional" blinds them to the unconstitutional stuff that the government does in our faces every day. It's an interesting little thing that I have experienced from time to time, with people basically arguing, "The government can't do anything unconstitutional, and they did it, so it MUST be constitutional." Obviously, that disregards the fact that the government can violate the Constitution all it wants if WE don't force them to abide it (I'm not a Constitutionalist, I should say). I've heard people honestly argue that Congress should be abolished--I read a Salon writer make that case within the past year or so. People regularly say the Constitution is no longer relevant. </span></span></p><span data-dcnode-id="1500" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1497" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1498" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1499" instrument_node="">Power tends to collect unto itself; if you give someone an inch, they'll take a mile, and the Executive Branch has certainly done that, with policies that have been going on for well over a century. The President is supposed to be a lame, sitting duck figurehead more than anything--a face, as it were, for the rest of the world, while Congress and the Supreme Court were supposed to be the brain. Now the unelected, unaccountable position of Secretary of State is the figurehead face, the President is the brain, Congress is more like the circulatory system, and unelected, unaccountable, appointed positions and Three Letter Agencies are the norm. I believe it was Thomas Paine who pointed out that having multiple tyrannies is still tyranny (see the NSA, EPA, FBI, Fed, IRS). All of this is generally a result of Congress either foolishly surrendering its power or having its power altogether usurped.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1420" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1421" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="1422" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="1436" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="1463" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="1464" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="1474" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="1475" style="box-sizing: border-box; position: relative;"><button aria-label="13 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--bg--darken qu-hover--textDecoration--none" data-dcnode-id="1476" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 10px; height: 30px; transition-duration: 60ms; p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="880" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="881" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="882" instrument_node="">Slavery was a big thing in a handful of the original 13 states. The founding fathers had to accommodate slavery in the Constitution to appease the slaveholders, or they wouldn’t ratify. This appeasement gave us the wonderful 3/5 clause, the electoral college, and a Senate that can be gamed by a few small states to force the entire country into laws that the majority of the country doesn’t want.</span></span></p><span data-dcnode-id="879" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="876" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="877" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="878" instrument_node="">Federalism is on the way out. Unfortunately Trump somehow got 3 Supreme Court seats that he filled with originalists/federalists, and there’s no telling how much damage that will do, nor how long it will take to restore fairness to the court. The Supreme Court has become just another political branch of government, and we need to change how the justices are appointed so the “Trump effect” doesn’t happen again. Even settled law like Roe is getting overturned by a tiny minority of Americans. But this court is a freak event; Trump was a freak event. I estimate his loyal supporters can’t be more than 13% of the electorate, which is where the percentage will likely remain.</span></span></p><span data-dcnode-id="875" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="872" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="873" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="874" instrument_node="">Otherwise, America is moving toward a unified Federal government that coordinates state activities rather than enabling them to do pretty much anything they want. Activity such as the massive voter suppression laws currently underway in the Red states will soon become antiquated — a relic of the past. Coordination between the Federal government and the states for such activities as national vaccine distribution will continue, but unfair law-making and SuperPAC activities at the state level won’t stand.</span></span></p><span data-dcnode-id="871" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="868" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="869" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="870" instrument_node="">Soon enough the Federal government will oversee a national electronic voting system whereby any registered voter can vote from any Internet node (computer, smart phone, etc.). A combination of biometric validation and strictly monitored voter roles will bring America a democratic system whereby every voice is heard and a majority or plurality will dictate policy. If you don’t like it, work harder to get people to come to your side. Right now the GOP is mostly a bunch of retired whiners enabling a plutocracy that has power far beyond what the founding fathers foresaw.</span></span></p><span data-dcnode-id="867" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="864" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="865" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="866" instrument_node="">This, simply, is progress, and it prevents autocracy and dictatorship by a small minority party like the GOP.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="863" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="855" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="856" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thirteen.org/wnet/slavery/experience/legal/docs2.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.thirteen.org"><span data-dcnode-id="862" instrument_node="">Slavery and the Making of America . The Slave Experience: Legal Rights &amp; Gov't</span></a><span class="q-inlineBlock" data-dcnode-id="857" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="858"><svg data-dcnode-id="859" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="860" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span
