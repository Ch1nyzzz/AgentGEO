</span><h3 data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Elections &amp; Voting Explained</span></h3><span data-dcnode-id="662" instrument_node="">
</span><img alt="Elections &amp; Voting Explained banner" data-dcnode-id="661" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britpolitics.co.uk/wp-content/uploads/2019/01/elections-voting-explained.jpg&amp;raw"><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node="">
</span><br data-dcnode-id="658"><span data-dcnode-id="657" instrument_node="">
</span><h1 align="" data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Should the voting age be lowered to 16?</span></h1><span data-dcnode-id="654" instrument_node="">
</span><p align="" data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">The voting age was reduced from 21 to 18 in 1969.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p align="" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Recently there has been a discussion as to whether it should be reduced to 16 and the Labour and Liberal Democrat parties are both committed to the change.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p align="" data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Opinion polls, at present, show that younger voters are less likely to support the Conservatives.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p align="" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">This has been given extra impetus by the Scottish Independence Referendum.&nbsp; David Cameron and Alex Salmond, leader of the Scottish Nationalist Party at the time of the Referendum agreed that 16 and 17 year olds would be able to vote in the Referendum and the SNP leader expected them to be more pro-independence. Young people were active in the debates and campaigns.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="636"><br data-dcnode-id="639"><span data-dcnode-id="638" instrument_node="">
</span></p><span data-dcnode-id="635" instrument_node="">
</span><p class="p1" data-dcnode-id="603"></p><form action="https://app.convertkit.com/forms/2585751/subscriptions" class="seva-form formkit-form" data-dcnode-id="604" data-format="inline" data-sv-form="2585751" data-uid="638e1bea19" data-version="5" method="post" min-width="400" style="background-color:#fff;border-radius:8px"><div data-dcnode-id="607" data-style="card"><div class="formkit-column" data-dcnode-id="626" data-element="column" style="background-color:#b9383e"><div class="formkit-background" data-dcnode-id="634" style="background-image:url('https://embed.filekitcdn.com/e/uzzJy8pYRgo7oqreoWZpGR/atFqrt4j42TqGXYSjYQVFX');opacity:0.95"></div><div class="formkit-header" data-dcnode-id="627" data-element="header" style="color:#393535;font-size:20px;font-weight:700"><h2 data-dcnode-id="628" style="text-align:left"><span data-dcnode-id="633" instrument_node="">Do you want to grow your history blog faster?</span><br data-dcnode-id="632"><span data-dcnode-id="631" instrument_node="">​</span><br data-dcnode-id="630"><span data-dcnode-id="629" instrument_node="">Try my FREE Mini Training </span></h2></div></div><div class="formkit-column" data-dcnode-id="608" data-element="column"><div class="formkit-subheader" data-dcnode-id="623" data-element="subheader" style="color:#7D7D7D;font-size:16px"><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Learn my three step process to focus on the right things for you and grow your history blog (even when you don't have much time : ) Unlock actionable tips to prioritise, gain momentum and reach your goals.</span></p></div><ul class="formkit-alert formkit-alert-error" data-dcnode-id="622" data-element="errors" data-group="alert"></ul><div class="seva-fields formkit-fields" data-dcnode-id="612" data-element="fields"><div class="formkit-field" data-dcnode-id="620"><input aria-label="Your Email Address" class="formkit-input" data-dcnode-id="621" name="email_address" placeholder="Your Email Address" required="" st </span><h3 data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Arguments for lowering the voting age to 16</span></h3><span data-dcnode-id="599" instrument_node="">
</span><p align="" data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Votes at 16 would be consistent with other areas of responsibility. 16 year olds can marry, join the armed forces and consent to medical treatment.</span></p><span data-dcnode-id="596" instrument_node="">
</span><p align="" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">There is a need to reduce the political alienation of young people who are likely to be as aware of issues at 16 as they would be at 18 and might feel that their views do not matter if they cannot vote.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p align="" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">A wide range of political decisions affect them such as tax rates, job seekers’ allowance, university fees, bullying and public transport. &nbsp;Politicians would be more likely to act on these if young people could vote.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p align="" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Young people may well have better knowledge of issues than some older people as they are more likely to follow them on the internet and Citizenship Education, which includes electoral systems and how government works, is taught as part of the National Curriculum.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p align="" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">It is important to increase turnout at elections.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p align="" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">In the 1964 general election the youngest age group turned out to vote as strongly as other age groups but this has changed.&nbsp; 44% of 18 to 24 year olds voted in the 2010 general election compared with 76% of the over 65s. Voting at 16 when politics is still discussed at school/college may get them into the habit of voting.</span></p><span data-dcnode-id="581" instrument_node="">
</span><h2 align="" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Arguments against lowering the voting age to 16</span></h2><span data-dcnode-id="578" instrument_node="">
</span><p align="" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">People legally become adults at 18.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p align="" data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Many of the things that 16 year olds can do are still circumscribed, for example, they can join the armed forces but not in frontline service and only with the permission of their parents.</span></p><span data-dcnode-id="572" instrument_node="">
</span><p align="" data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">At 16 people may not have the maturity and life experience to make political judgements.&nbsp; They may still be under the influence of parents and teachers or college lecturers.</span></p><span data-dcnode-id="569" instrument_node="">
</span><p align="" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">They may also be easily influenced by popular trends as Cleggmania, which developed after the leaders’ debates in the 2010 general election campaign ,showed, when support for Clegg soared through the social media because of the way that he spoke on camera in the first debate.</span></p><span data-dcnode-id="566" instrument_node="">
</span><p align="" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">The majority of voters in opinion polls, including half of those in the 16-18 year old group, felt that the voting age should stay at 18.</span></p><span data-dcnode-id="563" instrument_node="">
</span><p align="" data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Most other countries have chosen 18.</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="554"><br data-dcnode-id="557"><span data-dcnode-id="556" instrument_node="">
