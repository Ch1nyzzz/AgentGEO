          Leadnow | August 23, 2016
        
        
        </span><h1 data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Pros and Cons of Lowering the Voting Age to 16</span></h1><span data-dcnode-id="260" instrument_node="">
</span></div><span data-dcnode-id="258" instrument_node="">
</span></div><span data-dcnode-id="256" instrument_node="">
</span></div><span data-dcnode-id="254" instrument_node="">
</span><div class="blogcontent" data-dcnode-id="128"><span data-dcnode-id="253" instrument_node="">
</span><div class="container" data-dcnode-id="130" style="position: relative;"><span data-dcnode-id="252" instrument_node="">
</span><div class="row para" data-dcnode-id="132"><span data-dcnode-id="251" instrument_node="">
</span><div class="col-md-10 col-md-offset-1" data-dcnode-id="134"><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">To prepare for our presentation to the voting reform committee on August 30th, we asked our community what they thought about online voting, mandatory voting and lowering the voting age. Here are the pros and cons of lowering the voting age&nbsp;that we provided in the survey.</span></p><span data-dcnode-id="247" instrument_node="">
</span><h3 data-dcnode-id="244"><br data-dcnode-id="246"><span data-dcnode-id="245" instrument_node="">
Arguments for lowering the voting age</span></h3><span data-dcnode-id="243" instrument_node="">
</span><ul data-dcnode-id="217"><span data-dcnode-id="242" instrument_node="">
</span><li data-dcnode-id="237"><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Many 16 year olds can drive, hold a job and pay taxes and thus should have a say in government</span></p><span data-dcnode-id="238" instrument_node="">
</span></li><span data-dcnode-id="236" instrument_node="">
</span><li data-dcnode-id="231"><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">It would help develop a habit at an earlier age when they are still at home and in school, increasing the likelihood they would continue to vote later in life</span></p><span data-dcnode-id="232" instrument_node="">
</span></li><span data-dcnode-id="230" instrument_node="">
</span><li data-dcnode-id="225"><span data-dcnode-id="229" instrument_node="">
</span><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Many youth already participate informally in politics through school, political parties and social media and therefore would be capable of participating in formal politics</span></p><span data-dcnode-id="226" instrument_node="">
</span></li><span data-dcnode-id="224" instrument_node="">
</span><li data-dcnode-id="219"><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">It would mean better representation of issues youth care about</span></p><span data-dcnode-id="220" instrument_node="">
</span></li><span data-dcnode-id="218" instrument_node="">
</span></ul><span data-dcnode-id="216" instrument_node="">
</span><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">&nbsp;</span></p><span data-dcnode-id="213" instrument_node="">
</span><h3 data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Arguments against lowering the voting age</span></h3><span data-dcnode-id="210" instrument_node="">
</span><ul data-dcnode-id="190"><span data-dcnode-id="209" instrument_node="">
</span><li data-dcnode-id="204"><span data-dcnode-id="208" instrument_node="">
</span><p data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Some argue 16 and 17 year olds may not be mature or informed enough to responsibly vote</span></p><span data-dcnode-id="205" instrument_node="">
</span></li><span data-dcnode-id="203" instrument_node="">
</span><li data-dcnode-id="198"><span data-dcnode-id="202" instrument_node="">
</span><p data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">There’s no evidence it would improve voter turnout long-term</span></p><span data-dcnode-id="199" instrument_node="">
</span></li><span data-dcnode-id="197" instrument_node="">
</span><li data-dcnode-id="192"><span data-dcnode-id="196" instrument_node="">
</span><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Youth may be more susceptible than other age groups to pressure from peers and external influences</span></p><span data-dcnode-id="193" instrument_node="">
</span></li><span data-dcnode-id="191" instrument_node="">
</span></ul><span data-dcnode-id="189" instrument_node="">
</span><p data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">&nbsp;</span></p><span data-dcnode-id="186" instrument_node="">
</span><h3 data-dcnode-id="183"><br data-dcnode-id="185"><span data-dcnode-id="184" instrument_node="">
