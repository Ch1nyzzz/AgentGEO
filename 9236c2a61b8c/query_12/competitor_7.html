ent_node=""> and tagged </span><a data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatingdisorderhope.com/blog/tag/social-media" rel="tag"><span data-dcnode-id="676" instrument_node="">Social Media</span></a><span data-dcnode-id="674" instrument_node=""> on </span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatingdisorderhope.com/blog/body-image-technology" rel="bookmark" title="11:52 am"><time class="entry-date updated" data-dcnode-id="672" datetime="2019-04-16T11:52:28-07:00"><span data-dcnode-id="673" instrument_node="">April 16, 2019</span></time></a><span class="by-author" data-dcnode-id="666"><span data-dcnode-id="670" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="667"><a class="url fn n" data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatingdisorderhope.com/blog/author/baxter" rel="author" title="View all posts by Baxter Ekern"><span data-dcnode-id="669" instrument_node="">Baxter Ekern</span></a></span></span><span data-dcnode-id="665" instrument_node="">.</span></div><div class="entry-content" data-dcnode-id="525"><span data-dcnode-id="663" instrument_node=""> </span><a class="blogheadimg" data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatingdisorderhope.com/blog/body-image-technology"><img alt="Social Media Words" class="lazy lazy-hidden attachment-large size-large wp-post-image" data-dcnode-id="662" data-lazy-type="image" data-src="https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words-1024x614.jpg" data-srcset="https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words-1024x614.jpg 1024w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words-300x180.jpg 300w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words-768x460.jpg 768w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words-467x280.jpg 467w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words-400x240.jpg 400w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words.jpg 1280w" height="375" loading="lazy" sizes="(max-width: 625px) 100vw, 625px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatingdisorderhope.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="625"><noscript data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">&lt;img width="625" height="375" src="https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words-1024x614.jpg" class="attachment-large size-large wp-post-image" alt="Social Media Words" loading="lazy" srcset="https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words-1024x614.jpg 1024w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words-300x180.jpg 300w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words-768x460.jpg 768w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words-467x280.jpg 467w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words-400x240.jpg 400w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/07/Social-Media-words.jpg 1280w" sizes="(max-width: 625px) 100vw, 625px" /&gt;</span></noscript></a><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">In the rapid evolution of our society today, advances in technology have dictated the course of human interactions. The way we interface with one another is largely hinged on the capacities that have developed throughout the years. Face-to-face connections are often pushed aside for text messaging, emails, and the like. What has been lost and sacrificed in the name of convenience and expediency?</span></p><h2 data-dcnode-id="655" id="There-Are-Consequences-to-Our-Convenient-Technology"><span data-dcnode-id="656" instrument_node="">There Are Consequences to Our Convenient Technology</span></h2><p data-dcnode-id="650"><span data-dcnode-id="654" instrument_node="">While technology has allowed us the accessibility of </span><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatingdisorderhope.com/blog/social-media-be-mindful-before-you-click" rel="noopener" target="_blank"><span data-dcnode-id="653" instrument_node="">connecting with one another</span></a><span data-dcnode-id="651" instrument_node=""> through countless venues, it is also necessary to understand the potential consequences of living within a saturated culture. With billions of dollars spent in advertising and marketing in the United States alone, technology is typically the platform of delivery in which we intercept and interpret messages about ourselves, our self-worth, and our bodies.</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">While immersed in a social media culture, we are continually bombarded with advertisements, whether through our Smartphone’s, tablets, or like device, facing a constant stream of products and services that we come to believe are needed. This is all in addition to the images we see on a constant basis. While we may not be conscious of it, technology has influenced the way we perceive ourselves and one another.</span></p><h2 data-dcnode-id="646" id="Media-Does-Play-a-Role-in-Body-Image"><span data-dcnode-id="647" instrument_node="">Media Does Play a Role in Body Image</span></h2><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">As eating disorders because increasingly problematic in countless individuals, understanding the impact of technology and media in our society is a cause for concern. Experts have hypothesized that media does in fact play a significant role on the development of an adolescent’s body image, weight apprehensions, and self-perception.</span></p><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">As mass media has often taken a central part of our daily functioning, researchers are making correlations between poor body image, an increased prevalence in eating disorders, and media [1].</span></p><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">The truth of the matter is that our culture today is defined by the mass media, from the readily accessible Internet, including:</span></p><ul data-dcnode-id="627"><li data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Movies</span></li><li data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Magazines</span></li><li data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Fashion ideals</span></li><li data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Billboards</span></li><li data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Advertisements</span></li><li data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Other mediums</span></li></ul><p data-dcnode-id="622"><img alt="Woman using phone and techology" class="lazy lazy-hidden size-medium wp-image-15343 alignright" data-dcnode-id="626" data-lazy-type="image" data-src="https://www.eatingdisorderhope.com/wp-content/uploads/2016/03/girl-with-phone-1192032_640-300x200.jpg" data-srcset="https://www.eatingdisorderhope.com/wp-content/uploads/2016/03/girl-with-phone-1192032_640-300x200.jpg 300w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/03/girl-with-phone-1192032_640-421x280.jpg 421w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/03/girl-with-phone-1192032_640-400x266.jpg 400w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/03/girl-with-phone-1192032_640.jpg 640w" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatingdisorderhope.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="300"><noscript data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">&lt;img loading="lazy" class="size-medium wp-image-15343 alignright" src="https://www.eatingdisorderhope.com/wp-content/uploads/2016/03/girl-with-phone-1192032_640-300x200.jpg" alt="Woman using phone and techology" width="300" height="200" srcset="https://www.eatingdisorderhope.com/wp-content/uploads/2016/03/girl-with-phone-1192032_640-300x200.jpg 300w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/03/girl-with-phone-1192032_640-421x280.jpg 421w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/03/girl-with-phone-1192032_640-400x266.jpg 400w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/03/girl-with-phone-1192032_640.jpg 640w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript><span data-dcnode-id="623" instrument_node="">Statistics have revealed that our children are exposed to an average of six to seven hours of combined media on any given day [2]. This is particularly troublesome, considering the fact that children do not yet have the developed thought processes to differentiate between what is real and what is false.</span></p><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">The mainstream media is permeated with diet culture, including photo shopped images of men and women, advertisements for diet products, weight loss messages, and more. For individuals frequently exposed to the mainstream media messages through technology use, there can be little differentiation between what is reality and what is falsified.</span></p><h2 data-dcnode-id="618" id="The-Influence-of-Media-Is-Strong-During-Childhood"><span data-dcnode-id="619" instrument_node="">The Influence of Media Is Strong During Childhood</span></h2><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">The media, through technological advances, penetrates the minds of younger generations early in their lives, powerfully influencing decreased body satisfaction. Many research studies have discovered a connection between exposure to fashion magazines and a heightened level of eating disorder symptoms in girls [1]. Children and adolescents are not the only vulnerable groups to media saturation, as research has also shown a relationship between media exposure and eating disorders among college-aged students [3].</span></p><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">With so much at stake, what are the best ways to approach media? How can technology be used in a manner that is favorable and beneficial to us as individuals? Here are some helpful tips for approaching the daily infiltration we encounter through media and technology:</span></p><h2 data-dcnode-id="612" id="Be-Educated"><span data-dcnode-id="613" instrument_node="">Be Educated</span></h2><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Many individuals are unaware of the unrealistic standards of beauty that are often idealized in media. Becoming educated with media literacy can be instrumental in helping young people evaluate advertising content more critically [1]. Local schools and colleges may offer these types of programs that can offer greater understanding into the complexities of media and advertising.</span></p><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Educating children, adolescents, and teenagers about the role of the mainstream media, how advertisements are run, the intent behind marketing, etc., can all be helpful in raising awareness about the false lure of media itself.</span></p><h2 data-dcnode-id="606" id="Be-Empowered"><span data-dcnode-id="607" instrument_node="">Be Empowered</span></h2><p data-dcnode-id="601"><span data-dcnode-id="605" instrument_node="">Parents, caregivers, family members, and friends can all play a powerful role by advocating for and promoting positive body image. Constructive and affirmative actions are instrumental for establishing a strong foundation for life. Living and promoting </span><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatingdisorderhope.com/blog/body-image-self-acceptance-loving-imperfect-body" rel="noopener" target="_blank"><span data-dcnode-id="604" instrument_node="">body acceptance</span></a><span data-dcnode-id="602" instrument_node=""> at any size, weight, or shape is a beautiful message to share with own family and society as a whole.</span></p><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">While these messages are typically counter to what the mainstream media says is acceptable, it is exactly these kinds of voices that are needed in a society that is generally unforgiving to individuals who don’t meet the standard body shape that is constantly promoted.</span></p><h2 data-dcnode-id="597" id="Become-Involved"><span data-dcnode-id="598" instrument_node="">Become Involved</span></h2><p data-dcnode-id="593"><img alt="Woman on phone " class="lazy lazy-hidden size-medium wp-image-14880 alignleft" data-dcnode-id="596" data-lazy-type="image" data-src="https://www.eatingdisorderhope.com/wp-content/uploads/2016/01/lady-with-phone-791644_640x426-300x200.jpg" data-srcset="https://www.eatingdisorderhope.com/wp-content/uploads/2016/01/lady-with-phone-791644_640x426-300x200.jpg 300w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/01/lady-with-phone-791644_640x426-421x280.jpg 421w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/01/lady-with-phone-791644_640x426-400x266.jpg 400w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/01/lady-with-phone-791644_640x426.jpg 640w" height="200" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatingdisorderhope.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="300"><noscript data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">&lt;img loading="lazy" class="size-medium wp-image-14880 alignleft" src="https://www.eatingdisorderhope.com/wp-content/uploads/2016/01/lady-with-phone-791644_640x426-300x200.jpg" alt="Woman on phone " width="300" height="200" srcset="https://www.eatingdisorderhope.com/wp-content/uploads/2016/01/lady-with-phone-791644_640x426-300x200.jpg 300w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/01/lady-with-phone-791644_640x426-421x280.jpg 421w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/01/lady-with-phone-791644_640x426-400x266.jpg 400w, https://www.eatingdisorderhope.com/wp-content/uploads/2016/01/lady-with-phone-791644_640x426.jpg 640w" sizes="(max-width: 300px) 100vw, 300px" /&gt;</span></noscript></p><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Many advocacy groups, such as the Eating Disorder Coalition, have goals of promoting legislation at the federal level, which will bring greater transparency to advertising and marketing. You can help the cause of these groups by joining their efforts and becoming an advocate!</span></p><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">This is a wonderful way to involve children and teenagers in a cause that is greater than themselves, helping them understand the bigger picture and how millions are impacted by an unregulated advertising market.</span></p><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Eating disorders are severe psychiatric illnesses with unforgiving consequences. While we cannot be shielded from the multiple ways that the media falsifies beauty and body images, we can have a greater understanding about how to filter the messages that are continually transcribed.</span></p><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Practicing awareness of how technology and media are used to advance a purpose can also be helpful in discerning the messages we encounter on a daily basis.</span></p><hr data-dcnode-id="584"><p data-dcnode-id="578"><img alt="Crystal Headshot 2" class="lazy lazy-hidden wp-image-11924 alignleft" data-dcnode-id="583" data-lazy-type="image" data-src="https://www.eatingdisorderhope.com/wp-content/uploads/2015/01/Crystal-Headshot-2-244x300.jpg" data-srcset="https://www.eatingdisorderhope.com/wp-content/uploads/2015/01/Crystal-Headshot-2-244x300.jpg 244w, https://www.eatingdisorderhope.com/wp-content/uploads/2015/01/Crystal-Headshot-2-228x280.jpg 228w, https://www.eatingdisorderhope.com/wp-content/uploads/2015/01/Crystal-Headshot-2.jpg 361w" height="161" loading="lazy" sizes="(max-width: 131px) 100vw, 131px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatingdisorderhope.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="131"><noscript data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">&lt;img loading="lazy" class="wp-image-11924 alignleft" src="https://www.eatingdisorderhope.com/wp-content/uploads/2015/01/Crystal-Headshot-2-244x300.jpg" alt="Crystal Headshot 2" width="131" height="161" srcset="https://www.eatingdisorderhope.com/wp-content/uploads/2015/01/Crystal-Headshot-2-244x300.jpg 244w, https://www.eatingdisorderhope.com/wp-content/uploads/2015/01/Crystal-Headshot-2-228x280.jpg 228w, https://www.eatingdisorderhope.com/wp-content/uploads/2015/01/Crystal-Headshot-2.jpg 361w" sizes="(max-width: 131px) 100vw, 131px" /&gt;</span></noscript><em data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">About the Author: Crystal Karges, MS, RDN, IBCLC is a Contributing Writer for Eating Disorder Hope.</span></em></p><p data-dcnode-id="573"><em data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Crystal is a Masters-level Registered Dietitian Nutritionist (RDN) with a specialty focus in eating disorders, maternal/child health and wellness, and intuitive eating. Combining clinical experience with a love of social media and writing. &nbsp;</span></em><em data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">As a Certified Intuitive Eating Counselor, Crystal has dedicated her career to helping others establish a healthy relationship with food and body through her nutrition private practice.</span></em></p><hr data-dcnode-id="572"><p data-dcnode-id="569"><em data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">References:</span></em></p><span data-dcnode-id="568" instrument_node=""> [1]: &nbsp;</span><span data-dcnode-id="566" style="font-weight: 400;"><span data-dcnode-id="567" instrument_node="">Anne M Morris, MBBS, MPH, FRACP, and Debra K Katzman, MD, FRCPC. The impact of the media on&nbsp;</span></span><span data-dcnode-id="562" style="font-weight: 400;"><span data-dcnode-id="565" instrument_node="">eating disorders in children and adolescents. Paediatr Child Health. 2003 May-Jun; 8(5): 287–289.</span><br data-dcnode-id="564"><span data-dcnode-id="563" instrument_node=""> </span></span><span data-dcnode-id="560" style="font-weight: 400;"><span data-dcnode-id="561" instrument_node="">[2]: The mass media and American adolescents’ health. Brown JD, Witherspoon EM J Adolesc Health.&nbsp;</span></span><span data-dcnode-id="556" style="font-weight: 400;"><span data-dcnode-id="559" instrument_node="">2002 Dec; 31(6 Suppl):153-70.</span><br data-dcnode-id="558"><span data-dcnode-id="557" instrument_node=""> </span></span><span data-dcnode-id="554" style="font-weight: 400;"><span data-dcnode-id="555" instrument_node="">[3]: Harrison K, Cantor J. The relationship between media consumption and eating disorders. J Commun. &nbsp;</span></span><span data-dcnode-id="552" style="font-weight: 400;"><span data-dcnode-id="553" instrument_node="">1997;47:40–67.</span></span><p data-dcnode-id="551"></p><hr data-dcnode-id="550"><p data-dcnode-id="547"><em data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">The opinions and views of our guest contributors are shared to provide a broad perspective of eating disorders. These are not necessarily the views of Eating Disorder Hope, but an effort to offer discussion of various issues by different concerned individuals. </span></em></p><p data-dcnode-id="541"><em data-dcnode-id="542"><span data-dcnode-id="546" instrument_node="">We at Eating Disorder Hope understand that eating disorders result from a combination of environmental and genetic factors. If you or a loved one are suffering from an eating disorder, please know that there is hope for you, and </span><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatingdisorderhope.com/treatment-centers" rel="noopener" target="_blank"><span data-dcnode-id="545" instrument_node="">seek immediate professional help</span></a><span data-dcnode-id="543" instrument_node="">.</span></em></p><p data-dcnode-id="526"><em data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Published on July 17, 2017.</span></em><br data-dcnode-id="538"><span data-dcnode-id="537" instrument_node=""> </span><em data-dcnode-id="527"><span data-dcnode-id="536" instrument_node="">Edited And Updated By: Crystal Karges, MS, RDN, IBCLC.</span><br data-dcnode-id="535"><span data-dcnode-id="534" instrument_node=""> </span><em data-dcnode-id="528"><span data-dcnode-id="533" instrument_node="">Reviewed By: Jacquelyn Ekern, MS, LPC on July 17, 2017.</span><br data-dcnode-id="532"><span data-dcnode-id="531" instrument_node=""> Published on </span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eatingdisorderhope.com/" rel="noopener" target="_blank"><span data-dcnode-id="530" instrument_node="">EatingDisorderHope.com</span></a></em></em></p></div><footer class="ent
