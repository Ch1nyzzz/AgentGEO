	 M342.125,233.906L512,424V85.25L342.125,233.906z M0,85.25V424l169.859-190.125L0,85.25z" data-dcnode-id="1142"></path></svg></div></a></div></div></div></aside><div class="entry__content-and-right-rail-container" data-dcnode-id="950"><div class="entry__content-list-container js-cet-unit-buzz_body" data-dcnode-id="986"><section class="entry__content-list js-main-content-list" data-dcnode-id="1013" data-rapid="marko-sec" id="entry-body"><section class="entry__content-list js-entry-content js-cet-subunit" data-dcnode-id="1014"><figure class="cli cli-image js-no-inject cli-image--header-media" data-dcnode-id="1126"><div class="img-sized" data-dcnode-id="1129"><div class="img-sized__placeholder" data-dcnode-id="1133" style="width:628px"><div data-dcnode-id="1134" style="padding-top:50%"></div></div><picture data-dcnode-id="1130"><source data-dcnode-id="1132" srcset="https://img.huffingtonpost.com/asset/5b9eaa202200003000da1f00.jpeg?ops=scalefit_720_noupscale&amp;format=webp" type="image/webp"><img alt="" class="img-sized__img landscape" data-dcnode-id="1131" height="314" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.huffingtonpost.com/asset/5b9eaa202200003000da1f00.jpeg%3Fops%3Dscalefit_720_noupscale&amp;raw" width="628"></picture></div><div class="cli-image__spacer" data-dcnode-id="1128"></div><div class="cli-image__source-wrapper" data-dcnode-id="1127"></div></figure><div class="primary-cli cli cli-text" data-dcnode-id="1120"><p data-dcnode-id="1121"><span data-dcnode-id="1125" instrument_node="">Almost all teenagers in first-world countries have a strong Internet presence and extensively share personal content and opinions online. </span><a class="js-entry-link cet-external-link" data-dcnode-id="1123" data-vars-item-name="The 2011 Pew Internet survey" data-vars-item-type="text" data-vars-position-in-subunit="0" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.pewinternet.org/2011/01/18/the-social-side-of-the-internet/" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewinternet.org/2011/01/18/the-social-side-of-the-internet/" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1124" instrument_node="">The 2011 Pew Internet survey</span></a><span data-dcnode-id="1122" instrument_node=""> reported that 95% of U.S. young adults between ages 12 through 17 are online, of whom, 80% have profiles on social media sites, as compared to only 64% of the online population aged 30 and older.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1117"><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Why is there so much media use among teenagers? The answer lies largely in the change in lifestyle of the upwardly mobile population where increasing numbers of single working parent and dual-working parent households raise latchkey kids and after school programs that eat into play and socialization time of the kids. The lack of time for face-to-face socialization is compounded by practical issues such as mobility difficulties, curfew legislations and parental restrictions that stem from fears of predators, drug dealers and gangs. Changes in society, market and law, along with the advent of Internet and its various applications, have thus resulted in the emergence of a decentralized social life in a virtual setting.</span></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1108"><div class="advertisement__label" data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1109"><div class="ad-entry_paragraph_1 ad-spot--gam ad-spot--gam-inline-1" data-dcnode-id="1114" id="ad-inline-1-1"></div><span data-dcnode-id="1113" instrument_node="">
</span><span data-dcnode-id="1110" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1099"><p data-dcnode-id="1100"><span data-dcnode-id="1107" instrument_node="">The increased presence of youth online has raised serious concerns about the safety of Internet and social media use. Difficulty in self-regulation, lack of awareness of repercussions of privacy compromise and susceptibility to peer pressure are listed as reasons for teenagers' cavalier attitude towards online risks such as sexting, cyberbullying and exposure to inappropriate content as they navigate the tricky waters of social media. On the other hand, there has also been </span><a class="js-entry-link cet-external-link" data-dcnode-id="1105" data-vars-item-name="criticism of the moral panic" data-vars-item-type="text" data-vars-position-in-subunit="1" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.danah.org/papers/WhyYouthHeart.pdf" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.danah.org/papers/WhyYouthHeart.pdf" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1106" instrument_node="">criticism of the moral panic</span></a><span data-dcnode-id="1104" instrument_node=""> that surrounds the safety of extensive digital (in particular Internet/social networking) use by youth. So, is Internet really a minefield or is it just a digital-extension of the </span><a class="js-entry-link cet-external-link" data-dcnode-id="1102" data-vars-item-name="pervasive stereotype" data-vars-item-type="text" data-vars-position-in-subunit="2" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.independent.co.uk/news/uk/this-britain/behind-the-stereotypes-the-shocking-truth-about-teenagers-421295.html" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.independent.co.uk/news/uk/this-britain/behind-the-stereotypes-the-shocking-truth-about-teenagers-421295.html" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1103" instrument_node="">pervasive stereotype</span></a><span data-dcnode-id="1101" instrument_node=""> that demonizes youth?</span></p></div><div class="js-newsletter-container" data-dcnode-id="1076" data-rapid="marko-sec" id="newsletter-bottom"><section aria-label="Newsletter subscription" class="newsletter newsletter--initial newsletter--logged-out js-cet-subunit" data-dcnode-id="1077"><div class="newsletter__contents" data-dcnode-id="1078"><div class="newsletter__prompts" data-dcnode-id="1092"><div class="newsletter__info" data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Newsletter Sign Up</span></div><h2 class="newsletter__cta" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Raise the kind of person you'd like to know</span></h2><div class="newsletter__description" data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Subscribe to our parenting newsletter.</span></div></div><form class="newsletter__input" data-dcnode-id="1088"><input aria-describedby="newsletter-error" aria-label="Enter your email address" autocomplete="email" class="newsletter__input__text" data-dcnode-id="1091" name="email_address" placeholder="address@email.com" type="email" value=""><input aria-label="Subscribe" class="newsletter__input__submit js-cet-item" data-dcnode-id="1090" type="submit" value="SUBSCRIBE"><div class="newsletter__error" data-dcnode-id="1089" id="newsletter-error"></div></form><div aria-hidden="true" class="newsletter__success" data-dcnode-id="1079"><div class="newsletter__success__1" data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Successfully Subscribed!</span></div><div class="newsletter__success__2" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Realness delivered to your inbox</span></div><div class="newsletter__success__checkmark" data-dcnode-id="1080"><svg data-dcnode-id="1081" height="30px" version="1.1" viewBox="0 0 30 30" width="30px"><g data-dcnode-id="1082" fill="none" fill-rule="evenodd" id="Page-1" stroke="none" stroke-width="1"><path d="M20.8802625,10.013175 L12.8342625,18.019425 L9.8867625,15.032175 C9.5282625,14.63355 8.8907625,14.63355 8.4925125,15.032175 C8.0942625,15.390675 8.0942625,16.0278 8.4925125,16.42605 L12.1570125,20.130675 C12.3561375,20.289675 12.5950125,20.4093 12.8740125,20.4093 C13.1530125,20.4093 13.3918875,20.3298 13.5910125,20.130675 L22.3540125,11.407425 C22.7522625,11.048925 22.7522625,10.411425 22.3540125,10.013175 C21.9557625,9.614925 21.3182625,9.614925 20.8802625,10.013175" data-dcnode-id="1083" fill="#FFFFFF" id="Fill-1"></path></g></svg></div></div></div></section></div><div class="primary-cli cli cli-text" data-dcnode-id="1061"><p data-dcnode-id="1062"><span data-dcnode-id="1075" instrument_node="">Moral panic notwithstanding, the risks of Internet and social media to teenagers is just as real as the risks in society. Cyberbullying, in the forms of name-calling and gossiping, spreading rumors, making threats or otherwise sending malicious messages through emails, message boards and social media, has augmented offline bullying and estimates of the incidence of cyber bullying range from 23 to 72% in various studies (see </span><a class="js-entry-link cet-external-link" data-dcnode-id="1073" data-vars-item-name="here" data-vars-item-type="text" data-vars-position-in-subunit="3" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.tandfonline.com/doi/full/10.1080/01639620701457816#abstract" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tandfonline.com/doi/full/10.1080/01639620701457816%23abstract" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1074" instrument_node="">here</span></a><span data-dcnode-id="1072" instrument_node="">, </span><a class="js-entry-link cet-external-link" data-dcnode-id="1070" data-vars-item-name="here" data-vars-item-type="text" data-vars-position-in-subunit="4" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.ncbi.nlm.nih.gov/pubmed/18422417" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/18422417" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1071" instrument_node="">here</span></a><span data-dcnode-id="1069" instrument_node=""> and </span><a class="js-entry-link cet-external-link" data-dcnode-id="1067" data-vars-item-name="here" data-vars-item-type="text" data-vars-position-in-subunit="5" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://yvj.sagepub.com/content/4/2/148.short?rss=1&amp;ssource=mfr" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//yvj.sagepub.com/content/4/2/148.short%3Frss%3D1%26ssource%3Dmfr" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1068" instrument_node="">here</span></a><span data-dcnode-id="1066" instrument_node="">). Exposure to </span><a class="js-entry-link cet-external-link" data-dcnode-id="1064" data-vars-item-name="age-inappropriate content" data-vars-item-type="text" data-vars-position-in-subunit="6" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.ncbi.nlm.nih.gov/pmc/articles/PMC3180617/" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3180617/" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1065" instrument_node="">age-inappropriate content</span></a><span data-dcnode-id="1063" instrument_node=""> is another serious risk because it causes much damage to an age-group that is already prone to sexual uncertainty and uncommitted and possibly unsafe sexual exploration. Dangerous communities that support self-harm activities, such as anorexia, drug use, and such other disruptive concepts are also serious pitfalls of unsupervised Internet usage among teens.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1058"><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Of course, seeing the above risks as standalone perils will raise mass hysteria against youth or Internet or more likely, both. It must be remembered that the online risks to adolescents is a subset of overall teenage hazards. Youngsters already emotionally imbalanced or prone to disruptive behavior are obviously more vulnerable online and are more likely to commit to unsafe or irresponsible actions in the virtual world. However, there are some risks that are common to all youngsters and such risks are largely built on the attitude and behavior of the youth themselves, rather than them being victims of an unfair attack.</span></p></div><div class="pg-placeholder" data-dcnode-id="1056" id="public-good-placeholder"><div class="pgs-dpg-flex" data-dcnode-id="1057" data-loaded="true" data-pgs-partner-id="verizon-huffpost" widget-loading="true"></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1051"><p data-dcnode-id="1052"><a class="js-entry-link cet-external-link" data-dcnode-id="1054" data-vars-item-name="Research has shown that" data-vars-item-type="text" data-vars-position-in-subunit="7" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.sciencedirect.com/science/article/pii/S0747563214000144" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sciencedirect.com/science/article/pii/S0747563214000144" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1055" instrument_node="">Research has shown that</span></a><span data-dcnode-id="1053" instrument_node=""> there is a positive correlation between parents' level of privacy concern and that of their teenaged children. Thus, parents can influence their children's attitudes and behavior through advice and perhaps monitoring the media presence of these teenagers. However, the latter could be a double-edged sword, as teenagers, naturally inclined to rebel against parental insurgence into their private space, may practice deception, which may override any parental measure to increase safety. For example, adolescents may use pseudonyms and false identifying information like age and location to protect themselves, on the advice of their parents. Ironically, the same technique could also be adopted by them to insulate themselves from the eyes of parents.</span></p></div><div class="cli cli-advertisement advertisement-holder" data-dcnode-id="1042"><div class="advertisement__label" data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Advertisement</span></div><div class="advertisement" data-dcnode-id="1043"><div class="ad-entry_paragraph_3 ad-spot--gam ad-spot--gam-inline-2" data-dcnode-id="1048" id="ad-inline-2-1"></div><span data-dcnode-id="1047" instrument_node="">
</span><span data-dcnode-id="1044" instrument_node="">
</span></div></div><div class="primary-cli cli cli-text" data-dcnode-id="1036"><p data-dcnode-id="1037"><span data-dcnode-id="1041" instrument_node="">Many youngsters suppose that security through obscurity is protection enough. Teen bloggers, for example, often believe that their audience is limited to their friends and (less likely) family and could reveal compromising information and exhibit themselves in provocative and socially unacceptable forms. The personal anonymity of the Internet is, however deceptive, </span><a class="js-entry-link cet-external-link" data-dcnode-id="1039" data-vars-item-name="especially for teens" data-vars-item-type="text" data-vars-position-in-subunit="8" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://goo.gl/ZUK3oi" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//goo.gl/ZUK3oi" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1040" instrument_node="">especially for teens</span></a><span data-dcnode-id="1038" instrument_node="">, who are the focus of two groups of people -- parents, teachers, local government officials, etc., who may wish to protect them, and marketers and predators that do harm.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1027"><p data-dcnode-id="1028"><span data-dcnode-id="1035" instrument_node="">Peluchette and Karl from the University of Southern Indiana found that </span><a class="js-entry-link cet-external-link" data-dcnode-id="1033" data-vars-item-name="young adults in the U.S. expressed little concern about sharing updates and pictures on social network sites" data-vars-item-type="text" data-vars-position-in-subunit="9" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.ncbi.nlm.nih.gov/pubmed/18275320" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/18275320" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1034" instrument_node="">young adults in the U.S. expressed little concern about sharing updates and pictures on social network sites</span></a><span data-dcnode-id="1032" instrument_node=""> such as Facebook. Women were more concerned about future employers seeing some of their pictures and comments, especially those related to alcohol, than men. The women were justified by </span><a class="js-entry-link cet-external-link" data-dcnode-id="1030" data-vars-item-name="a 2013 survey that reports that 1 of every 10 young job applicants was rejected because of content they had posted on social media" data-vars-item-type="text" data-vars-position-in-subunit="10" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://jobs.aol.com/articles/2013/06/04/applicants-rejected-social-media-on-device-research/" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jobs.aol.com/articles/2013/06/04/applicants-rejected-social-media-on-device-research/" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1031" instrument_node="">a 2013 survey that reports that 1 of every 10 young job applicants was rejected because of content they had posted on social media</span></a><span data-dcnode-id="1029" instrument_node="">, including "provocative or inappropriate photos or posts," and "content about drinking or using drugs."</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1021"><p data-dcnode-id="1022"><span data-dcnode-id="1026" instrument_node="">Online victimization of youth is only one head of Janus. The youngster, without proper guidance, could be a perpetrator herself; indeed. </span><a class="js-entry-link cet-external-link" data-dcnode-id="1024" data-vars-item-name="A recent study by McAfee reports" data-vars-item-type="text" data-vars-position-in-subunit="11" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.mcafee.com/in/about/news/2012/q2/20120625-01.aspx" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mcafee.com/in/about/news/2012/q2/20120625-01.aspx" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1025" instrument_node="">A recent study by McAfee reports</span></a><span data-dcnode-id="1023" instrument_node=""> that 15% of teens have hacked a social network account, 30.7% access pirated movies and music, 8.7% have hacked someone's email online, 16% of teens having admitted to looking for test answers on their phone and 48.1% of teens having looked up answers online.</span></p></div><div class="primary-cli cli cli-text" data-dcnode-id="1015"><p data-dcnode-id="1016"><span data-dcnode-id="1020" instrument_node="">It is very essential for a child to know of the potential risks even before she enter tweendom. </span><a class="js-entry-link cet-external-link" data-dcnode-id="1018" data-vars-item-name="Early intervention and education" data-vars-item-type="text" data-vars-position-in-subunit="12" data-vars-subunit-name="article_body" data-vars-subunit-type="component" data-vars-target-content-id="http://www.mobicip.com/" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="5b9eaa20e4b03a1dcc9bdb37" data-vars-unit-type="buzz_body" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mobicip.com/" rel="nofollow" role="link" target="_hplink"><span data-dcnode-id="1019" instrument_node="">Early intervention and education</span></a><span data-dcnode-id="1017" instrument_node=""> enables the teenager to make responsible decisions on how to use the net and its various functions. For this, open communication between the adult and child is extremely important from early childhood. It is indeed tricky to find the balance between setting boundaries and giving freedom but it must be done early on to enable easy and safe transition of the teenager into adulthood.</span></p></div></section></section><section class="entry__extra js-extra-content-list" data-dcnode-id="1011" data-rapid="marko-sec" id="entry-extra"><section class="entry__content-list js-entry-content js-cet-subunit" data-dcnode-id="1012"></section></section><div class="openweb-conatiner" data-dcnode-id="1007"><h2 class="openweb-pitc-title" data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Popular in the Community</span></h2><div data-dcnode-id="1008" data-spotim-module="pitc" id="spot_pitc"></div></div><section data-dcnode-id="987" data-rapid="marko-sec" id="entry-footer"><section class="entry__corrections js-cet-subunit" data-dcnode-id="1004"><button data-dcnode-id="1005" data-vars-item-name="SUGGEST_A_CORRECTION" data-vars-item-type="text" data-vars-target-content-id="mailto:corrections@huffingtonpost.com?subject=Correction%3A%20Teenagers%20and%20the%20Internet&amp;body=https%3A%2F%2Fwww.huffpost.com%2Fentry%2Fteenagers-and-the-internet_b_7012050" data-vars-target-content-type="url" data-vars-type="web_external_link" data-vars-unit-name="7012050" data-vars-unit-type="buzz_body"><span data-dcnode-id="1006" instrument_node="">Suggest a correction</span></button></section><section class="entry__tags js-cet-subunit control" data-dcnode-id="988" id="bottomTags"><div aria-label="Read more in the following topics" cl
