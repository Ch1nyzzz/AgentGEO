-dcnode-id="3451"><span data-dcnode-id="3452" instrument_node="">29</span></span><span data-dcnode-id="3450" instrument_node=""> What does the US government help regulate?</span></a></li><li data-dcnode-id="3443"><a data-dcnode-id="3444" href="#Why_do_governments_intervene_in_markets"><span class="toc_number toc_depth_1" data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">30</span></span><span data-dcnode-id="3445" instrument_node=""> Why do governments intervene in markets?</span></a></li><li data-dcnode-id="3438"><a data-dcnode-id="3439" href="#What_can_government_do_to_improve_economy"><span class="toc_number toc_depth_1" data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">31</span></span><span data-dcnode-id="3440" instrument_node=""> What can government do to improve economy?</span></a></li><li data-dcnode-id="3433"><a data-dcnode-id="3434" href="#What_are_the_effects_of_increased_government_spending"><span class="toc_number toc_depth_1" data-dcnode-id="3436"><span data-dcnode-id="3437" instrument_node="">32</span></span><span data-dcnode-id="3435" instrument_node=""> What are the effects of increased government spending?</span></a></li><li data-dcnode-id="3428"><a data-dcnode-id="3429" href="#When_did_government_began_to_get_involved_in_people8217s_daily_lives"><span class="toc_number toc_depth_1" data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">33</span></span><span data-dcnode-id="3430" instrument_node=""> When did government began to get involved in people’s daily lives?</span></a></li><li data-dcnode-id="3423"><a data-dcnode-id="3424" href="#How_does_government_spend_money"><span class="toc_number toc_depth_1" data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">34</span></span><span data-dcnode-id="3425" instrument_node=""> How does government spend money?</span></a></li><li data-dcnode-id="3418"><a data-dcnode-id="3419" href="#How_does_government_impact_your_everyday"><span class="toc_ </span><h2 data-dcnode-id="3396"><span data-dcnode-id="3397" id="How_does_the_government_impact_us"><span data-dcnode-id="3398" id="How does the government impact us?"><span data-dcnode-id="3399" instrument_node="">How does the government impact us?</span></span></span></h2><span data-dcnode-id="3395" instrument_node="">
</span><p data-dcnode-id="3389"><span class="hgKElc" data-dcnode-id="3390"><span data-dcnode-id="3394" instrument_node="">The U.S. government’s role in the economy can be broken down into two basic sets of functions: it </span><b data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">attempts to promote economic stability and growth</span></b><span data-dcnode-id="3391" instrument_node="">, and it attempts to regulate and control the economy. The federal government regulates and controls the economy through numerous laws affecting economic activity.</span></span></p><span data-dcnode-id="3388" instrument_node="">
</span><h2 data-dcnode-id="3384"><span data-dcnode-id="3385" id="What_are_3_things_the_government_does_for_us"><span data-dcnode-id="3386" id="What are 3 things the government does for us?"><span data-dcnode-id="3387" instrument_node="">What are 3 things the government does for us?</span></span></span></h2><span data-dcnode-id="3383" instrument_node="">
</span><div class="wDYxhc" data-dcnode-id="757" data-md="61" style="clear:none"><span data-dcnode-id="3382" instrument_node="">
</span><div aria-level="3" class="LGOjhe" data-attrid="wa:/description" data-dcnode-id="758" data-hveid="CBIQAA" role="heading"><span class="ILfuVd" data-dcnode-id="3376"><span class="hgKElc" data-dcnode-id="3377"><span data-dcnode-id="3381" instrument_node="">Only the federal government </span><b data-dcnode-id="3379"><span data-dcnode-id="3380" instrument_node="">can regulate interstate and foreign commerce, declare war and set taxing, spending and other national policies</span></b><span data-dcnode-id="3378" instrument_node="">. These actions often start with legislation from Congress, made up of the 435-member House of Representatives and the 100-member U.S. Senate.</span></span></span><p data-dcnode-id="3375"></p><span data-dcnode-id="3374" instrument_node="">
</span><h2 data-dcnode-id="3370"><span data-dcnode-id="3371" id="What_are_3_ways_that_the_government_can_influence_the_economy"><span data-dcnode-id="3372" id="What are 3 ways that the government can influence the economy?"><span data-dcnode-id="3373" instrument_node="">What are 3 ways that the government can influence the economy?</span></span></span></h2><span data-dcnode-id="3369" instrument_node="">
</span><p data-dcnode-id="3363"><span class="hgKElc" data-dcnode-id="3364"><span data-dcnode-id="3368" instrument_node="">Some of the most common ways that a government may attempt to influence a country’s economic activities are by </span><b data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">adjusting the cost of borrowing money (by lowering or raising the interest rate), managing the money supply, and controlling the use of credit</span></b><span data-dcnode-id="3365" instrument_node="">. Collectively, these policies are referred to as monetary policy.</span></span></p><span data-dcnode-id="3362" instrument_node="">
</span><h2 data-dcnode-id="3358"><span data-dcnode-id="3359" id="How_does_our_government_influence_our_culture"><span data-dcnode-id="3360" id="How does our government influence our culture?"><span data-dcnode-id="3361" instrument_node="">How does our government influence our culture?</span></span></span></h2><span data-dcnode-id="3357" instrument_node="">
</span><p data-dcnode-id="3351"><span class="hgKElc" data-dcnode-id="3352"><span data-dcnode-id="3356" instrument_node="">Government is the most powerful influence on our culture today be- cause government spends about $2.5 trillion a year, and every dollar carries the power to affect our culture and behavior through </span><b data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">laws, regulations, grants, entitlements, and tax credits</span></b><span data-dcnode-id="3353" instrument_node="">.</span></span></p><span data-dcnode-id="3350" instrument_node="">
</span><h2 data-dcnode-id="3346"><span data-dcnode-id="3347" id="How_does_the_government_help_the_community"><span data-dcnode-id="3348" id="How does the government help the community?"><span data-dcnode-id="3349" instrument_node="">How does the government help the community?</span></span></span></h2><span data-dcnode-id="3345" instrument_node="">
</span><p data-dcnode-id="3339"><span class="hgKElc" data-dcnode-id="3340"><span data-dcnode-id="3344" instrument_node="">Government involvement </span><b data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">acts as both a guide and a buffer for community development</span></b><span data-dcnode-id="3341" instrument_node="">, and can lower some of the risks that communities have when making improvements. The rules they put in place help keep things on track, which means it’s a little harder to accidentally or intentionally skip steps.</span></span></p><span data-dcnode-id="3338" instrument_node="">
</span><h2 data-dcnode-id="3334"><span data-dcnode-id="3335" id="What_does_the_government_make_for_everyone_to"><span data-dcnode-id="3336" id="What does the government make for everyone to?"><span data-dcnode-id="3337" instrument_node="">What does the government make for everyone to?</span></span></span></h2><span data-dcnode-id="3333" instrument_node="">
</span><p data-dcnode-id="3328"><span class="hgKElc" data-dcnode-id="3329"><b data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">The laws</span></b><span data-dcnode-id="3330" instrument_node=""> are made by the government for all the citizens in the country. The government makes laws to safeguard the citizens, control resources and protect the boundaries of the country. The government uses the laws to enforce its decisions. Every citizen must abide the laws of government.</span></span></p><span data-dcnode-id="3327" instrument_node="">
</span><h2 data-dcnode-id="3323"><span data-dcnode-id="3324" id="What_is_the_government_responsible_for"><span data-dcnode-id="3325" id="What is the government responsible for?"><span data-dcnode-id="3326" instrument_node="">What is the government responsible for?</span></span></span></h2><span data-dcnode-id="3322" instrument_node="">

</span><p data-dcnode-id="2963"><span class="hgKElc" data-dcnode-id="2964"><span data-dcnode-id="2968" instrument_node="">Increased government spending is likely to </span><b data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">cause a rise in aggregate demand (AD)</span></b><span data-dcnode-id="2965" instrument_node="">. This can lead to higher growth in the short-term. It can also potentially lead to inflation.</span></span></p><span data-dcnode-id="2962" instrument_node="">
</span><h2 data-dcnode-id="2958"><span data-dcnode-id="2959" id="When_did_government_began_to_get_involved_in_people8217s_daily_lives"><span data-dcnode-id="2960" id="When did government began to get involved in people's daily lives?"><span data-dcnode-id="2961" instrument_node="">When did government began to get involved in people’s daily lives?</span></span></span></h2><span data-dcnode-id="2957" instrument_node="">
</span><p data-dcnode-id="2951"><span class="hgKElc" data-dcnode-id="2952"><span data-dcnode-id="2956" instrument_node="">Governments become involved with the economic workings of their countries. In </span><b data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">the 1930s</span></b><span data-dcnode-id="2953" instrument_node="">, the Federal Reserve System began to take a role in helping the American economy prevent another depression by locating currency reserves at centralized banks.</span></span></p><span data-dcnode-id="2950" instrument_node="">
</span><h2 data-dcnode-id="2946"><span data-dcnode-id="2947" id="How_does_government_spend_money"><span data-dcnode-id="2948" id="How does government spend money?"><span data-dcnode-id="2949" instrument_node="">How does government spend money?</span></span></span></h2><span data-dcnode-id="2945" instrument_node="">
</span><p data-dcnode-id="2939"><span class="hgKElc" data-dcnode-id="2940"><span data-dcnode-id="2944" instrument_node="">More than half of FY 2019 discretionary spending went </span><b data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">for national defense</span></b><span data-dcnode-id="2941" instrument_node="">, and most of the rest went for domestic programs, including transportation, education and training, veterans’ benefits, income security, and health care (figure 4).</span></span></p><span data-dcnode-id="2938" instrument_node="">
