</span><article class="post-6442 post type-post status-publish format-standard hentry category-communication-and-advocacy-cert category-persuading-congress tag-joseph-gibson tag-persuading-congress tag-presidential-veto tag-veto" data-dcnode-id="1589" id="post-6442" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1745" instrument_node="">
</span><div class="inside-article" data-dcnode-id="1591"><span data-dcnode-id="1744" instrument_node="">
</span><header aria-label="Content" class="entry-header" data-dcnode-id="1739"><span data-dcnode-id="1743" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1741" itemprop="headline"><span data-dcnode-id="1742" instrument_node="">How the President Influences Congress</span></h1><span data-dcnode-id="1740" instrument_node=""> </span></header><span data-dcnode-id="1738" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1620" itemprop="text"><span data-dcnode-id="1737" instrument_node="">
</span><p data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">More than any other outside entity, the President has a tremendous amount of influence regarding Congress. This is primarily due to the power of the veto. Provided there is one-third of either chamber of Congress that is in support of the position of the president, a veto can kill any piece of legislation. Only in rare circumstances is Congress able to override a veto.</span></p><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1731"><a data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hobnobblog.com/constitution/james-madison-father-of-the-constitution-1751-1836/"><img alt="James Madison, 4th U.S. President, 1809-1817" class="aligncenter size-medium wp-image-6451" data-dcnode-id="1733" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hobnobblog.com/wp-content/uploads/2013/06/James_Madison.jpg&amp;raw" title="James Madison, 4th U.S. President, 1809-1817" width="246"></a></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">This remains relatively true even during times when the president may be unpopular. Even when the president is scoring low in the opinion polls with the public, it is still possible for him to affect the ability of Congress to enact legislation. The mere threat of the president using a veto can be enough to shape legislation in the direction of the president’s position. This is why presidents utilize the threat of a veto more than they actually use a veto.  </span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">The president also has an array of tools available for influencing Congress that extend beyond the veto. For instance, the president may choose to command public attention and focus it on his agenda. Regardless of the president’s popularity, when he speaks, the media covers what he says.</span></p><span data-dcnode-id="1724" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1723" instrument_node="">Ultimately, the president also controls the executive </span><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thecapitol.net/Publications/PersuadingCongress.html"><img alt="Persuading Congress, by Joseph Gibson" class="alignright size-medium wp-image-3677" data-dcnode-id="1722" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hobnobblog.com/wp-content/uploads/2013/06/PersuadingCongress_cover.jpg&amp;raw" title="Persuading Congress, by Joseph Gibson" width="195"></a><span data-dcnode-id="1720" instrument_node="">departments. This is accomplished through the appointment power granted to the president. By acting under presidential direction, many federal departments and agencies decide critical policy issues. </span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">The president also has a tremendous amount of influence and power regarding the ways in which the federal government spends money. Congress ultimately exercises the power of spending under the Constitution, and the president develops an annual budget request. Even though Congress may choose to make changes to the budget request of the president, the presidential request still forms a broad outline of the ways in which money is spent. </span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">The popularity of presidents rises and falls, but they always wields a tremendous amount of influence regarding Congressional affairs. </span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1711" instrument_node="">Are you interested in learning more about persuading Congress? Sign up for TheCapitol.Net’s 1-day course </span><a data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thecapitol.net/PublicPrograms/swcs.html"><span data-dcnode-id="1710" instrument_node="">Strategies for Working with Congress: Effective Communication and Advocacy on Capitol Hill</span></a><span data-dcnode-id="1708" instrument_node=""> and their 3-day </span><a data-dcnode-id="1706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thecapitol.net/PublicPrograms/capitolhillworkshop.html"><span data-dcnode-id="1707" instrument_node="">Capitol Hill Workshop</span></a><span data-dcnode-id="1705" instrument_node="">.  </span></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1695"><em data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Reference</span></em><span data-dcnode-id="1700" instrument_node="">: </span><em data-dcnode-id="1697"><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thecapitol.net/Publications/PersuadingCongress.html"><span data-dcnode-id="1699" instrument_node="">Persuading Congress</span></a></em><span data-dcnode-id="1696" instrument_node="">, by Joseph Gibson, Ch. 8 The President</span></p><span data-dcnode-id="1694" instrument_node="">
</span><div class="a-single a-1" data-dcnode-id="1647"><br data-dcnode-id="1693"><br data-dcnode-id="1692"><span data-dcnode-id="1691" instrument_node="">
</span><center data-dcnode-id="1689"><hr color="#F3EBC5" data-dcnode-id="1690" noshade="noshade" size="4" width="45%"></center><span data-dcnode-id="1688" instrument_node="">
</span><br data-dcnode-id="1687"><br data-dcnode-id="1686"><span data-dcnode-id="1685" instrument_node="">
For more than 40 years, TheCapitol.Net and its predecessor, Congressional Quarterly Executive Conferences, have been teaching professionals from government, military, business, and NGOs about the dynamics and operations of the legislative and executive branches and how to work with them.
</span><br data-dcnode-id="1684"><br data-dcnode-id="1683"><span data-dcnode-id="1682" instrument_node="">
Our </span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapitol.net/CustomPrograms/"><span data-dcnode-id="1681" instrument_node="">custom on-site and online training</span></a><span data-dcnode-id="1679" instrument_node="">, </span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapitol.net/Publications/"><span data-dcnode-id="1678" instrument_node="">publications</span></a><span data-dcnode-id="1676" instrument_node="">, and </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecapitol.net/CapitolLearning/"><span data-dcnode-id="1675" instrument_node="">audio courses</span></a><span data-dcnode-id="1673" instrument_node=""> include congressional operations, legislative and budget process, communication and advocacy, media and public relations, testifying before Congress, research skills, legislative drafting, critical thinking and writing, and more.
