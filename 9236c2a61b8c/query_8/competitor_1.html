&lt;a title="Topic Index" href="/ace-en/topics/lf/topic_index"&gt;Topic Index&lt;/a&gt;
&lt;br /&gt;
&lt;h2&gt;The Scope of Electoral Reform&lt;/h2&gt;
&lt;div&gt;
&lt;p&gt;A signiﬁcant area of electoral reform is the nature and structure of the institutions engaged in electoral management or delivering electoral services. Reforms in this area may enhance the independence of the EMB — for example, by adopting Independent Model electoral management in countries such as Bhutan and Tonga, or a Mixed Model as in Timor-Leste. Electoral responsibilities may be reassigned among existing and/or new bodies to promote better service delivery — as in New Zealand, Sweden and the UK. In Sweden, the EMB itself initiated the reform of electoral management. In Indonesia in 1998–99 and in the UK, the government initiated the reforms. Pressure from local civil society or international groups may also instigate the reform of electoral management arrangements, as in Georgia and Liberia.&lt;/p&gt;
&lt;p&gt;Reforms of electoral processes, such as the introduction of a new electoral system, may have a broad effect on an EMB’s strategies, policies and procedures. They may target key electoral issues such as electoral participation and representation, the delimitation of electoral districts, voter registration, the registration and oversight of political parties, and improving electoral integrity. They may also target speciﬁc technical or technological aspects of the electoral process, such as introducing new procurement or employment processes, voter registration systems, or voting and vote-counting methods or systems. They may involve social policies, such as reducing a gender imbalance in representation, improving access to electoral processes for marginalized sectors of society or improving the representativeness of the EMB’s staff.&lt;/p&gt;
&lt;p&gt;Electoral system reform, as in Indonesia, Papua New Guinea and New Zealand, is one of the most far-reaching reforms in election administration. It is often the result of a functional need, for example, of perceptions of ‘unfairness’ in representation or of government ineffectiveness or lack of responsiveness. In 2003 Indonesia changed its electoral system from closed-list proportional representation (PR) in very large electoral districts to open-list PR in small electoral districts in order to address perceived deﬁciencies in the links between voters and representatives, while maintaining the consensus nature of Indonesian governance. Electoral system reform places a substantial information responsibility on the EMB, and may require it to implement new methods of electoral district boundary delimitation, voting and vote counting.&lt;/p&gt;
&lt;p&gt;EMBs can play a signiﬁcant role in reform of electoral district boundary delimitation, for example as advocates of more transparent and equitable boundary delimitation processes; by providing expert opinions on boundary delimitation issues; and by ensuring that they exercise any responsibilities for boundary delimitation impartially, equitably and with integrity. Some electoral reforms have introduced multi-member districts, as this type of system, usually based on PR, can decrease the influence of electoral boundaries on election results. Other reforms have required boundary delimitations based on ‘one person, one vote, one value’. Some reforms have attempted to make boundary delimitation processes more transparent and objective, for example by excluding the legislature from the delimitation process, placing an independent body in charge of delimitation, and requiring open hearings and independent review of proposed boundaries.&lt;/p&gt;
&lt;p&gt;The process of registering electors has attracted many efforts at modernization in both emerging and established democracies. Voter registration determines the ability of eligible voters to participate in an election, and thus is a key element of the fairness of an election. As it generally occurs well before election day, and often outside the direct scrutiny of observers (especially where electoral registers are derived from civil or population registers), the internal integrity of voter registration systems needs to be very high. Reforms have increasingly targeted the efﬁciency, as well as the integrity, of voter registration processes. They have often included the introduction of biometric data capture and processing, with the stated aim of decreasing the scope for multiple registrations, voter impersonation and/or multiple voting.&lt;/p&gt;
&lt;p&gt;Many EMBs have implemented systems to improve the inclusiveness, fairness, accuracy and transparency of &amp;nbsp;voter &amp;nbsp;registration, &amp;nbsp;for &amp;nbsp;example, &amp;nbsp;by &amp;nbsp;providing for continuously updated voter &amp;nbsp;registration, &amp;nbsp;special &amp;nbsp;registration &amp;nbsp;provisions for transient voters, and safeguards against the wrongful rejection of a registration or removal from the electoral register. EMBs and other agencies responsible for maintaining data from which electoral registers are derived are improving the integrity of electoral registers by using better methods to check the identity of qualiﬁed persons and reducing data processing times, often using modern technological solutions. EMBs need to ensure that technological solutions for voter registration enjoy citizens’ trust and are sustainable, especially&amp;nbsp;in emerging democracies where EMBs may have uncertain levels of future ﬁnancial support.&lt;/p&gt;
&lt;p&gt;There have been signiﬁcant reforms in the role played by EMBs in monitoring and regulating the activities of political parties. Some are the consequences of legal reforms targeted at levelling the playing ﬁeld for political competition — for example, reforms in the administration of state funding of political parties and candidates’ election campaigns, and the qualiﬁcations for registering parties and candidates to contest elections. Others have been targeted at improving oversight of campaign contributions and expenditures, and the internal democracy of political parties — such as oversight of candidate selection processes. Reforms to promote a level playing ﬁeld for elections have also given some EMBs the responsibility of administering or monitoring arrangements that require the media to allocate campaign advertising opportunities equitably.&lt;br /&gt;A growing number of EMBs are introducing new voting methods. Brazil, India, Bhutan and Venezuela have replaced manual voting with EVMs, while Estonia has introduced Internet voting. Many of the issues that need to be considered in reforming electoral processes by introducing electronic voting are discussed in Chapter 9.&lt;/p&gt;
&lt;p&gt;There have been signiﬁcant efforts to make electoral participation more accessible. Access to voter registration has sometimes been opened to those who are out of the country, of no ﬁxed abode or in prison. Access to polling has been widened for many people through the introduction of in-person absentee, postal or pre-poll (early) voting, including for voters who are out of the country, and by providing special voting and voter information facilities for refugees, internally displaced persons, the disabled, the aged and those in remote areas, in prison or in hospital. EMBs have had to respond to all these reforms by introducing procedures and systems that enable the additional access while maintaining high integrity in the voter registration, voting and counting processes. Internet voting is the subject of much current research, and poses a challenge to EMBs that might be contemplating its adoption, since the skill sets required to manage such a process are radically different from those typically found in EMBs that manage traditional voting methods.&lt;/p&gt;
&lt;p&gt;It should be noted that reforms that give rise to a proliferation of different voting methods, or more generally to a range of different modalities for performing a particular function, tend to be more challenging for an EMB than ones that simply update a single mechanism to a different single mechanism.&lt;/p&gt;
&lt;p&gt;Reform of electoral access has attempted in some countries to provide equal access for speciﬁc societal groups and for women. Such reforms may well have to be pursued in a complementary way in the legal, administrative and political areas. EMBs can promote equitable access by insisting on it in their own stafﬁng, for example by requiring gender balance in temporary stafﬁng for polling stations, and using internal professional development programmes to ensure that women advance into EMB management positions.&lt;/p&gt;
&lt;/div&gt;

" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="716"></span><span data-dcnode-id="715" instrument_node=""> Electoral Reform</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-68-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="713" id="ui-accordion-68-panel-0" role="tabpanel" style="display: none;"></div></div><div data-dcnode-id="650" style="list-style-type: none;padding-right:0;margin-right:0;margin-left:1em;"><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="707" role="tablist"><a aria-controls="ui-accordion-69-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="709" href="file://aceproject.org/ace-en/topics/lf/eml/eml03" id="ui-accordion-69-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="711"></span><span data-dcnode-id="710" instrument_node="">The EMB’s Role in Electoral Reforms </span></a><div aria-hidden="true" aria-labelledby="ui-accordion-69-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="708" id="ui-accordion-69-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="666" role="tablist"><a aria-controls="ui-accordion-70-panel-0" aria-expanded="true" aria-selected="true" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-accordion-icons ui-accordion-header-active ui-state-active ui-corner-top" data-dcnode-id="704" href="file://aceproject.org/ace-en/topics/lf/eml/eml04" id="ui-accordion-70-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-s" data-dcnode-id="706"></span><span data-dcnode-id="705" instrument_node="">The Scope of Electoral Reform</span></a><div aria-hidden="false" aria-labelledby="ui-accordion-70-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom ui-accordion-content-active" data-dcnode-id="667" id="ui-accordion-70-panel-0" role="tabpanel" style="display: block;"><span data-dcnode-id="703" instrument_node="">
</span><div data-dcnode-id="669"><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">A signiﬁcant area of electoral reform is the nature and structure of the institutions engaged in electoral management or delivering electoral services. Reforms in this area may enhance the independence of the EMB — for example, by adopting Independent Model electoral management in countries such as Bhutan and Tonga, or a Mixed Model as in Timor-Leste. Electoral responsibilities may be reassigned among existing and/or new bodies to promote better service delivery — as in New Zealand, Sweden and the UK. In Sweden, the EMB itself initiated the reform of electoral management. In Indonesia in 1998–99 and in the UK, the government initiated the reforms. Pressure from local civil society or international groups may also instigate the reform of electoral management arrangements, as in Georgia and Liberia.</span></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Reforms of electoral processes, such as the introduction of a new electoral system, may have a broad effect on an EMB’s strategies, policies and procedures. They may target key electoral issues such as electoral participation and representation, the delimitation of electoral districts, voter registration, the registration and oversight of political parties, and improving electoral integrity. They may also target speciﬁc technical or technological aspects of the electoral process, such as introducing new procurement or employment processes, voter registration systems, or voting and vote-counting methods or systems. They may involve social policies, such as reducing a gender imbalance in representation, improving access to electoral processes for marginalized sectors of society or improving the representativeness of the EMB’s staff.</span></p><span data-dcnode-id="696" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Electoral system reform, as in Indonesia, Papua New Guinea and New Zealand, is one of the most far-reaching reforms in election administration. It is often the result of a functional need, for example, of perceptions of ‘unfairness’ in representation or of government ineffectiveness or lack of responsiveness. In 2003 Indonesia changed its electoral system from closed-list proportional representation (PR) in very large electoral districts to open-list PR in small electoral districts in order to address perceived deﬁciencies in the links between voters and representatives, while maintaining the consensus nature of Indonesian governance. Electoral system reform places a substantial information responsibility on the EMB, and may require it to implement new methods of electoral district boundary delimitation, voting and vote counting.</span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">EMBs can play a signiﬁcant role in reform of electoral district boundary delimitation, for example as advocates of more transparent and equitable boundary delimitation processes; by providing expert opinions on boundary delimitation issues; and by ensuring that they exercise any responsibilities for boundary delimitation impartially, equitably and with integrity. Some electoral reforms have introduced multi-member districts, as this type of system, usually based on PR, can decrease the influence of electoral boundaries on election results. Other reforms have required boundary delimitations based on ‘one person, one vote, one value’. Some reforms have attempted to make boundary delimitation processes more transparent and objective, for example by excluding the legislature from the delimitation process, placing an independent body in charge of delimitation, and requiring open hearings and independent review of proposed boundaries.</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">The process of registering electors has attracted many efforts at modernization in both emerging and established democracies. Voter registration determines the ability of eligible voters to participate in an election, and thus is a key element of the fairness of an election. As it generally occurs well before election day, and often outside the direct scrutiny of observers (especially where electoral registers are derived from civil or population registers), the internal integrity of voter registration systems needs to be very high. Reforms have increasingly targeted the efﬁciency, as well as the integrity, of voter registration processes. They have often included the introduction of biometric data capture and processing, with the stated aim of decreasing the scope for multiple registrations, voter impersonation and/or multiple voting.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Many EMBs have implemented systems to improve the inclusiveness, fairness, accuracy and transparency of &nbsp;voter &nbsp;registration, &nbsp;for &nbsp;example, &nbsp;by &nbsp;providing for continuously updated voter &nbsp;registration, &nbsp;special &nbsp;registration &nbsp;provisions for transient voters, and safeguards against the wrongful rejection of a registration or removal from the electoral register. EMBs and other agencies responsible for maintaining data from which electoral registers are derived are improving the integrity of electoral registers by using better methods to check the identity of qualiﬁed persons and reducing data processing times, often using modern technological solutions. EMBs need to ensure that technological solutions for voter registration enjoy citizens’ trust and are sustainable, especially&nbsp;in emerging democracies where EMBs may have uncertain levels of future ﬁnancial support.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="683" instrument_node="">There have been signiﬁcant reforms in the role played by EMBs in monitoring and regulating the activities of political parties. Some are the consequences of legal reforms targeted at levelling the playing ﬁeld for political competition — for example, reforms in the administration of state funding of political parties and candidates’ election campaigns, and the qualiﬁcations for registering parties and candidates to contest elections. Others have been targeted at improving oversight of campaign contributions and expenditures, and the internal democracy of political parties — such as oversight of candidate selection processes. Reforms to promote a level playing ﬁeld for elections have also given some EMBs the responsibility of administering or monitoring arrangements that require the media to allocate campaign advertising opportunities equitably.</span><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node="">A growing number of EMBs are introducing new voting methods. Brazil, India, Bhutan and Venezuela have replaced manual voting with EVMs, while Estonia has introduced Internet voting. Many of the issues that need to be considered in reforming electoral processes by introducing electronic voting are discussed in Chapter 9.</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">There have been signiﬁcant efforts to make electoral participation more accessible. Access to voter registration has sometimes been opened to those who are out of the country, of no ﬁxed abode or in prison. Access to polling has been widened for many people through the introduction of in-person absentee, postal or pre-poll (early) voting, including for voters who are out of the country, and by providing special voting and voter information facilities for refugees, internally displaced persons, the disabled, the aged and those in remote areas, in prison or in hospital. EMBs have had to respond to all these reforms by introducing procedures and systems that enable the additional access while maintaining high integrity in the voter registration, voting and counting processes. Internet voting is the subject of much current research, and poses a challenge to EMBs that might be contemplating its adoption, since the skill sets required to manage such a process are radically different from those typically found in EMBs that manage traditional voting methods.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">It should be noted that reforms that give rise to a proliferation of different voting methods, or more generally to a range of different modalities for performing a particular function, tend to be more challenging for an EMB than ones that simply update a single mechanism to a different single mechanism.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Reform of electoral access has attempted in some countries to provide equal access for speciﬁc societal groups and for women. Such reforms may well have to be pursued in a complementary way in the legal, administrative and political areas. EMBs can promote equitable access by insisting on it in their own stafﬁng, for example by requiring gender balance in temporary stafﬁng for polling stations, and using internal professional development programmes to ensure that women advance into EMB management positions.</span></p><span data-dcnode-id="670" instrument_node="">
</span></div><span data-dcnode-id="668" instrument_node="">
</span></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="661" role="tablist"><a aria-controls="ui-accordion-71-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="663" href="file://aceproject.org/ace-en/topics/lf/eml/eml05" id="ui-accordion-71-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="665"></span><span data-dcnode-id="664" instrument_node="">Managing Electoral Change</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-71-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="662" id="ui-accordion-71-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="656" role="tablist"><a aria-controls="ui-accordion-72-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="658" href="file://aceproject.org/ace-en/topics/lf/eml/eml06" id="ui-accordion-72-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="660"></span><span data-dcnode-id="659" instrument_node="">Risks Associated with Electoral Reform</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-72-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="657" id="ui-accordion-72-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="651" role="tablist"><a aria-controls="ui-accordion-73-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-def
