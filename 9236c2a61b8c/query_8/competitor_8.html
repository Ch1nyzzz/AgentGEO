</span><h1 data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Electoral Reform in Canada</span></h1><span data-dcnode-id="1590" instrument_node="">

</span><div class="article-content" data-dcnode-id="491"><span data-dcnode-id="1529" instrument_node="">
</span><div class="article-summary" data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">
                Electoral reform is the process of reviewing and reconfiguring the structure of electoral politics, i.e., the way in which voters elect their representatives. In Canada, electoral reform has historically occurred through reconfigurations of electoral ridings, or the extension of the right to vote to previously disenfranchised groups of people. Attempts have been made to change electoral systems on a number of occasions, at both the provincial and federal level. The matter was of specific interest throughout 2016 due to the Liberal Party’s pledge during the 2015 federal election campaign to enact reform by 2019. However, the Trudeau government abandoned this in February 2017, citing a lack of consensus on the issue.
            </span></div><span data-dcnode-id="1526" instrument_node="">
</span><div class="article-summary-new" data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">
                Electoral reform is the process of reviewing and reconfiguring the structure of electoral politics, i.e., the way in which voters elect their representatives. In Canada, electoral reform has historically occurred through reconfigurations of electoral ridings, or the extension of the right to vote to previously disenfranchised groups of people. Attempts have been made to change electoral systems on a number of occasions, at both the provincial and federal level. The matter was of specific interest throughout 2016 due to the Liberal Party’s pledge during the 2015 federal election campaign to enact reform by 2019. However, the Trudeau government abandoned this in February 2017, citing a lack of consensus on the issue.
            </span></div><span data-dcnode-id="1523" instrument_node="">
</span><br data-dcnode-id="1522"><span data-dcnode-id="1521" instrument_node="">
</span><br data-dcnode-id="1520"><span data-dcnode-id="1519" instrument_node="">
</span><div class="article-content-body" data-dcnode-id="495"><span data-dcnode-id="1518" instrument_node="">
</span><div data-dcnode-id="497" id="article-content-def"><span data-dcnode-id="1517" instrument_node="">
</span><h3 data-dcnode-id="1515" id="Background"><span data-dcnode-id="1516" instrument_node="">Background</span></h3><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1513" instrument_node="">
	               Since the 1990s, electoral reform has been increasingly associated with calls for an end to the </span><a data-dcnode-id="1511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/federal-government/"><span data-dcnode-id="1512" instrument_node="">federal</span></a><span data-dcnode-id="1510" instrument_node=""> and </span><a data-dcnode-id="1508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/provincial-government/"><span data-dcnode-id="1509" instrument_node="">provincial governments</span></a><span data-dcnode-id="1507" instrument_node="">’ use of the first past the post (FPTP) </span><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/electoral-systems/"><span data-dcnode-id="1506" instrument_node="">voting system</span></a><span data-dcnode-id="1504" instrument_node=""> in favour of one that is proportionally representative of Canadians’ political preferences. Reform has been supported by such civil organizations as Fair Vote Canada, Lead Now, the </span><a data-dcnode-id="1502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/council-of-canadians/"><span data-dcnode-id="1503" instrument_node="">Council of Canadians</span></a><span data-dcnode-id="1501" instrument_node="">, the </span><a data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/assembly-of-first-nations/"><span data-dcnode-id="1500" instrument_node="">Assembly of First Nations</span></a><span data-dcnode-id="1498" instrument_node="">, the Canadian Federation of Students, and others, in addition to the federal </span><a data-dcnode-id="1496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/liberal-party/"><span data-dcnode-id="1497" instrument_node="">Liberal Party</span></a><span data-dcnode-id="1495" instrument_node="">, the </span><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/new-democratic-party/"><span data-dcnode-id="1494" instrument_node="">New Democratic Party</span></a><span data-dcnode-id="1492" instrument_node=""> and the </span><a data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/green-party-of-canada/"><span data-dcnode-id="1491" instrument_node="">Green Party</span></a><span data-dcnode-id="1489" instrument_node="">. (</span><em data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">See also</span></em><span data-dcnode-id="1486" instrument_node=""> </span><a data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/electoral-systems/"><span data-dcnode-id="1485" instrument_node="">Electoral Systems</span></a><span data-dcnode-id="1483" instrument_node="">)
</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">
	               In addition to ensuring that Canadians’ political preferences are reflected in </span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/parliament/"><span data-dcnode-id="1479" instrument_node="">government</span></a><span data-dcnode-id="1477" instrument_node="">, electoral reform is considered desirable because of its potential to promote participation from women and cultural minorities. Multiple studies have demonstrated that mixed and proportional electoral systems are associated with stronger representation of women, while majoritarian systems such as Canada’s are associated with relatively weak representation of women.
</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1474" instrument_node="">
	               There is no substantial indication that such alternative electoral systems lead to enhanced representation of cultural minorities. However, some proponents of reform, such as the </span><a data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/law-reform-commission-of-canada/"><span data-dcnode-id="1473" instrument_node="">Law Commission of Canada</span></a><span data-dcnode-id="1471" instrument_node="">, have supported legislative changes that would encourage </span><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/party-system/"><span data-dcnode-id="1470" instrument_node="">political parties</span></a><span data-dcnode-id="1468" instrument_node=""> to increase the representation of </span><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/aboriginal-people/"><span data-dcnode-id="1467" instrument_node="">Indigenous persons</span></a><span data-dcnode-id="1465" instrument_node=""> and people of colour among their candidates.
</span></p><span data-dcnode-id="1463" instrument_node="">
</span><h3 data-dcnode-id="1461" id="ElectoralSystems"><span data-dcnode-id="1462" instrument_node="">Electoral Systems</span></h3><span data-dcnode-id="1460" instrument_node="">
</span><h3 data-dcnode-id="1458" id="FirstPastthePost"><span data-dcnode-id="1459" instrument_node="">First Past the Post</span></h3><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1456" instrument_node="">
	               Under FPTP, all </span><a data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/member-of-parliament/"><span data-dcnode-id="1455" instrument_node="">Members of Parliament</span></a><span data-dcnode-id="1453" instrument_node=""> (MPs) are elected to represent specific geographical electoral districts (known as </span><em data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">ridings</span></em><span data-dcnode-id="1450" instrument_node="">). In each riding, the candidate who receives the most votes wins the corresponding seat in </span><a data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/parliament/"><span data-dcnode-id="1449" instrument_node="">Parliament</span></a><span data-dcnode-id="1447" instrument_node=""> (</span><em data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">see</span></em><span data-dcnode-id="1444" instrument_node=""> </span><a data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/electoral-systems/"><span data-dcnode-id="1443" instrument_node="">Electoral Systems</span></a><span data-dcnode-id="1441" instrument_node="">). This system has been in place since the earliest </span><a data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/elections/"><span data-dcnode-id="1440" instrument_node="">elections</span></a><span data-dcnode-id="1438" instrument_node=""> under French and British colonial rule. FPTP is simple to understand and is widely acknowledged to produce more majority parliaments and therefore stable government over the long term.
</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1435" instrument_node="">
</span><strong data-dcnode-id="1434"></strong><span data-dcnode-id="1433" instrument_node="">
</span></p><span data-dcnode-id="1431" instrument_node="">
</span><div data-dcnode-id="1422"><a class="modal-trigger-wrapper" data-dcnode-id="1423" href="#"><img alt="First Past the Post" data-dcnode-id="1430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3d0lqu00lnqvz.cloudfront.net/media/media/76c76acf-0105-4132-a22d-251839c113b3.png&amp;raw" title="First Past the Post"><figcaption data-dcnode-id="1424"><div class="img-modal-title" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">First Past the Post</span></div><div class="img-modal-caption" data-dcnode-id="1427"></div><div class="img-modal-creator" data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">(© Library of Parliament)</span></div></figcaption></a></div><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1420" instrument_node="">
	               The primary issue that critics of this system highlight is that it often leads to majority governments when the winning party garnered less than a majority of popular votes. In the 2015 federal election, for instance, the </span><a data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/liberal-party/"><span data-dcnode-id="1419" instrument_node="">Liberal Party</span></a><span data-dcnode-id="1417" instrument_node=""> won almost 40 per cent of the popular vote, but won 54 per cent of the seats in Parliament. The structure of the FPTP system does not guarantee that the party with the greatest number of popular votes will form the </span><a data-dcnode-id="1415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/government/"><span data-dcnode-id="1416" instrument_node="">government</span></a><span data-dcnode-id="1414" instrument_node="">. This occurred in the 1979 federal election, when the </span><a data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/conservative-party/"><span data-dcnode-id="1413" instrument_node="">Progressive Conservatives</span></a><span data-dcnode-id="1411" instrument_node=""> won 35 per cent of the popular vote but formed the government with 48 per cent of the seats in Parliament, while the Liberals won 40 per cent of the popular vote but won fewer seats.
</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">
	               It is often argued that FPTP encourages strategic voting — in which voters attempt to ensure that their ballot is not wasted. This happens when a voter’s preferred candidate has, for instance, a lesser chance of winning in a three-way race. In such cases, voters use their ballot to block their least preferred candidate by voting for a second choice. FPTP can also result in vote-splitting, in which similar parties or candidates take votes from each other — sometimes to the advantage of other candidates.
</span></p><span data-dcnode-id="1406" instrument_node="">
</span><h3 data-dcnode-id="1404" id="AlternativeVoteorRankedBallot"><span data-dcnode-id="1405" instrument_node="">Alternative Vote or Ranked Ballot</span></h3><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">
	               Alternative vote systems (sometimes called ranked ballot voting) involve single-member ridings. Voters rank the candidates on the ballot, one from each party, in order of preference. If a candidate does not win by a majority of first-choice votes, then the candidate with the least first-choice votes is eliminated and the second-choice votes of people who voted for that candidate are distributed among the remaining candidates. This process is repeated until one candidate amasses more than 50 per cent of votes.
</span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1399" instrument_node="">
</span><strong data-dcnode-id="1398"></strong><span data-dcnode-id="1397" instrument_node="">
</span></p><span data-dcnode-id="1395" instrument_node="">
</span><div data-dcnode-id="1386"><a class="modal-trigger-wrapper" data-dcnode-id="1387" href="#"><img alt="Alternative Vote" data-dcnode-id="1394" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3d0lqu00lnqvz.cloudfront.net/media/media/42a90134-8a22-43e4-aee5-5a6369e6544a.png&amp;raw" title="Alternative Vote"><figcaption data-dcnode-id="1388"><div class="img-modal-title" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Alternative Vote</span></div><div class="img-modal-caption" data-dcnode-id="1391"></div><div class="img-modal-creator" data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">(© Library of Parliament)</span></div></figcaption></a></div><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1384" instrument_node="">
	               It’s argued that in such systems candidates are elected by a true majority of voters and that the impulse towards strategic voting may be diminished along with vote splitting. It’s also thought to reduce negative </span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/political-campaign/"><span data-dcnode-id="1383" instrument_node="">campaigning</span></a><span data-dcnode-id="1381" instrument_node=""> since candidates need the support of their rivals’ followers. A criticism of the alternative vote in single member constituencies is that, as a majoritarian system, it can squeeze out smaller parties in favour of larger political parties.
</span></p><span data-dcnode-id="1379" instrument_node="">
</span><h3 data-dcnode-id="1377" id="ProportionalRepresentationinCanada"><span data-dcnode-id="1378" instrument_node="">Proportional Representation in Canada</span></h3><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1375" instrument_node="">
</span><em data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Proportional representation</span></em><span data-dcnode-id="1372" instrument_node=""> (PR) is a term used to describe any electoral system that is designed to ensure that the share of a party’s representation in the legislature is proportional to the votes that party received in the </span><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/elections/"><span data-dcnode-id="1371" instrument_node="">election</span></a><span data-dcnode-id="1369" instrument_node="">. Generally, the idea is that if </span><em data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">x</span></em><span data-dcnode-id="1366" instrument_node=""> per cent of people vote for a party, then that party should receive </span><em data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">x</span></em><span data-dcnode-id="1363" instrument_node=""> per cent of the seats in the legislature. Each variation requires that more than one representative be elected in each riding.
</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1360" instrument_node="">
	               Proportional representation is not itself a </span><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/electoral-systems/"><span data-dcnode-id="1359" instrument_node="">voting system</span></a><span data-dcnode-id="1357" instrument_node="">; however, there are a number of systems that follow its principles. There are three main variations: party list PR, single transferable vote (STV) and mixed-member proportional (MMP). Options for electoral reform in Canada have generally revolved around STV and MMP.
</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">
	               Each system can be organized in different ways — the following descriptions cover their general composition.
</span></p><span data-dcnode-id="1352" instrument_node="">
</span><h3 data-dcnode-id="1350" id="PartyListPR"><span data-dcnode-id="1351" instrument_node="">Party List PR</span></h3><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1348" instrument_node="">
	               In the party list system, each </span><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/party-system/"><span data-dcnode-id="1347" instrument_node="">political party</span></a><span data-dcnode-id="1345" instrument_node=""> releases a list of its candidates to the public, who in turn vote for a party of their choosing. Depending on the specific system, voters can either have a say in which candidates appear on the party list (called an “open list”), or not (a “closed list”). The number of votes a party receives is equal to the number of candidates elected from that party. In such systems, voters cast their ballot for the party of their choosing and not for specific local candidates.
</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1342" instrument_node="">
</span><strong data-dcnode-id="1341"></strong><span data-dcnode-id="1340" instrument_node="">
</span></p><span data-dcnode-id="1338" instrument_node="">
</span><div data-dcnode-id="1329"><a class="modal-trigger-wrapper" data-dcnode-id="1330" href="#"><img alt="List Proportional Representation (List PR)" data-dcnode-id="1337" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3d0lqu00lnqvz.cloudfront.net/media/media/528ce1fd-9224-41bb-bcc0-a1cbf52e2182.png&amp;raw" title="List Proportional Representation (List PR)"><figcaption data-dcnode-id="1331"><div class="img-modal-title" data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">List Proportional Representation (List PR)</span></div><div class="img-modal-caption" data-dcnode-id="1334"></div><div class="img-modal-creator" data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">(© Library of Parliament)</span></div></figcaption></a></div><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1327" instrument_node="">
	               In this system, used in many countries worldwide, governments are often composed of many political parties. </span><a data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/coalition-government/"><span data-dcnode-id="1326" instrument_node="">Coalition governments</span></a><span data-dcnode-id="1324" instrument_node=""> or other forms of multi-party cooperation are therefore necessary if </span><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/parliament/"><span data-dcnode-id="1323" instrument_node="">government</span></a><span data-dcnode-id="1321" instrument_node=""> is to work effectively.
</span></p><span data-dcnode-id="1319" instrument_node="">
</span><h3 data-dcnode-id="1317" id="SingleTransferableVote"><span data-dcnode-id="1318" instrument_node="">Single Transferable Vote</span></h3><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">
	               The single transferable vote (STV) involves a system of ranked-ballot voting in which multiple candidates are elected in each riding. Parties can run more than one candidate in each riding. Voters rank the candidates in their district in order of preference. Before the election, a quota, or set number of votes a candidate needs to gain a seat, is established. If a candidate receives more votes than the quota requires, those “surplus votes” are distributed to the second preference of the voters who chose that particular candidate. If there are still seats to fill in that district, the candidate in last place is eliminated, and the second preference of voters who had voted for him or her are distributed accordingly. This process continues until all seats in the district are filled.
</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1312" instrument_node="">
</span><strong data-dcnode-id="1311"></strong><span data-dcnode-id="1310" instrument_node="">
</span></p><span data-dcnode-id="1308" instrument_node="">
</span><div data-dcnode-id="1299"><a class="modal-trigger-wrapper" data-dcnode-id="1300" href="#"><img alt="Single Transferable Vote" data-dcnode-id="1307" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3d0lqu00lnqvz.cloudfront.net/media/media/ce5d1f7a-4856-49ad-b341-4aa16f8df316.png&amp;raw" title="Single Transferable Vote"><figcaption data-dcnode-id="1301"><div class="img-modal-title" data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Single Transferable Vote</span></div><div class="img-modal-caption" data-dcnode-id="1304"></div><div class="img-modal-creator" data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">(© Library of Parliament)</span></div></figcaption></a></div><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1297" instrument_node="">
	               Critics have suggested that STV is overly complex and that having multiple representatives in the same riding could lead to political disorder. It is also argued that STV tends to create </span><a data-dcnode-id="1295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/minority-government/"><span data-dcnode-id="1296" instrument_node="">minority</span></a><span data-dcnode-id="1294" instrument_node=""> or </span><a data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/coalition-government/"><span data-dcnode-id="1293" instrument_node="">coalition governments</span></a><span data-dcnode-id="1291" instrument_node="">. Proponents of STV argue that is creates more proportional election results and bolsters local representation.
</span></p><span data-dcnode-id="1289" instrument_node="">
</span><h3 data-dcnode-id="1287" id="MixedMemberProportional"><span data-dcnode-id="1288" instrument_node="">Mixed-Member Proportional</span></h3><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1285" instrument_node="">
	               Under MMP, representatives would be elected to represent constituencies on a first past the post basis. However, under most versions of MMP, voters would also be given a second ballot on which they would vote for their preferred </span><a data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/party-system/"><span data-dcnode-id="1284" instrument_node="">party</span></a><span data-dcnode-id="1282" instrument_node="">. Therefore, while voters may vote strategically on their first ballot, the second ballot would deliver a comprehensive nationwide popular vote. Once the regional representatives have been elected, an additional group of representatives would be added to the legislature from either a closed or open list to ensure that its composition reflects the popular vote.
</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1279" instrument_node="">
</span><strong data-dcnode-id="1278"></strong><span data-dcnode-id="1277" instrument_node="">
</span></p><span data-dcnode-id="1275" instrument_node="">
</span><div data-dcnode-id="1266"><a class="modal-trigger-wrapper" data-dcnode-id="1267" href="#"><img alt="Mixed Member Proportional" data-dcnode-id="1274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3d0lqu00lnqvz.cloudfront.net/media/media/a79bf8b4-10b3-43fb-8b83-7b8c9d9bdf32.png&amp;raw" title="Mixed Member Proportional"><figcaption data-dcnode-id="1268"><div class="img-modal-title" data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Mixed Member Proportional</span></div><div class="img-modal-caption" data-dcnode-id="1271"></div><div class="img-modal-creator" data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">(© Library of Parliament)</span></div></figcaption></a></div><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1264" instrument_node="">
	               With the exception of </span><a data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/british-columbia/"><span data-dcnode-id="1263" instrument_node="">British Columbia</span></a><span data-dcnode-id="1261" instrument_node="">, every province that has taken an active interest in electoral reform has examined MMP as the most viable opportunity. It was endorsed by the 2004 report on electoral reform compiled by the </span><a data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/law-reform-commission-of-canada/"><span data-dcnode-id="1260" instrument_node="">Law Commission of Canada</span></a><span data-dcnode-id="1258" instrument_node=""> — a comprehensive study of the issue.
</span></p><span data-dcnode-id="1256" instrument_node="">
</span><h3 data-dcnode-id="1254" id="SenateReforminCanada"><span data-dcnode-id="1255" instrument_node="">Senate Reform in Canada</span></h3><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1252" instrument_node="">
	               Discussions of electoral reform in Canada have not been limited to FPTP and its alternatives. An important and related conversation has concerned reform of the </span><a data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/senate/"><span data-dcnode-id="1251" instrument_node="">Senate</span></a><span data-dcnode-id="1249" instrument_node="">.
</span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1246" instrument_node="">
	               Since its establishment in 1867, senators have been appointed by the </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/governor-general/"><span data-dcnode-id="1245" instrument_node="">governor general</span></a><span data-dcnode-id="1243" instrument_node=""> on the advice of the </span><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/prime-minister/"><span data-dcnode-id="1242" instrument_node="">prime minister</span></a><span data-dcnode-id="1240" instrument_node="">. (These appointments were initially for life, but senators are now forced to retire at age 75.) Several politicians and commentators have criticized the institution on the basis that it is undemocratic. Polls also suggest that the vast majority of Canadians support some form of Senate change, be it abolition or reform (</span><em data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">see</span></em><span data-dcnode-id="1237" instrument_node=""> </span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/public-opinion/"><span data-dcnode-id="1236" instrument_node="">Public Opinion</span></a><span data-dcnode-id="1234" instrument_node="">). According to a poll released in April 2015, 41 per cent of Canadians believe the Senate should be abolished, while another 45 per cent believe it should be reformed.
</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1231" instrument_node="">
	               Although the </span><a data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/new-democratic-party/"><span data-dcnode-id="1230" instrument_node="">NDP</span></a><span data-dcnode-id="1228" instrument_node="">, the </span><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/liberal-party/"><span data-dcnode-id="1227" instrument_node="">Liberals</span></a><span data-dcnode-id="1225" instrument_node=""> and the </span><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/conservative-party/"><span data-dcnode-id="1224" instrument_node="">Conservative Party</span></a><span data-dcnode-id="1222" instrument_node=""> have all expressed a willingness and desire to reform the Senate, there is little consensus on what that reform would encompass. Under </span><a data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/stephen-joseph-harper/"><span data-dcnode-id="1221" instrument_node="">Stephen Harper</span></a><span data-dcnode-id="1219" instrument_node="">, the Conservatives supported a transition toward a system in which senators are democratically elected and subject to term limits. The Liberal Party supports a system in which senators are not connected to the political parties themselves, but are suggested for appointment by officials outside of the </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/prime-ministers-office/"><span data-dcnode-id="1218" instrument_node="">Prime Minister’s Office</span></a><span data-dcnode-id="1216" instrument_node="">. To demonstrate his commitment to such reform, Liberal leader </span><a data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/justin-trudeau/"><span data-dcnode-id="1215" instrument_node="">Justin Trudeau</span></a><span data-dcnode-id="1213" instrument_node=""> ejected all 32 of the Liberal senators from his caucus in January 2014. As prime minister, Trudeau appointed 22 independent senators selected by an advisory board, in 2016. The NDP, on the other hand, supports the complete abolition of the Senate.
</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1210" instrument_node="">
	               The actual process of Senate reform is complex. According to the </span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/supreme-court-of-canada/"><span data-dcnode-id="1209" instrument_node="">Supreme Court of Canada</span></a><span data-dcnode-id="1207" instrument_node="">, a </span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/constitution/"><span data-dcnode-id="1206" instrument_node="">constitutional</span></a><span data-dcnode-id="1204" instrument_node=""> amendment to alter the Senate would demand agreement from the </span><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/house-of-commons/"><span data-dcnode-id="1203" instrument_node="">House of Commons</span></a><span data-dcnode-id="1201" instrument_node="">, the Senate and seven or more of the </span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/provincial-government/"><span data-dcnode-id="1200" instrument_node="">provinces</span></a><span data-dcnode-id="1198" instrument_node="">, representing at least 50 per cent of Canada’s </span><a data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/population/"><span data-dcnode-id="1197" instrument_node="">population</span></a><span data-dcnode-id="1195" instrument_node="">. Complete abolition of the Senate would demand the agreement of all of the provinces.
</span></p><span data-dcnode-id="1193" instrument_node="">
</span><h3 data-dcnode-id="1191" id="FederalElectoralReform"><span data-dcnode-id="1192" instrument_node="">Federal Electoral Reform</span></h3><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">
	               The move to implement some form of electoral reform is politically divisive. Since reform stands to affect the number of seats each party wins in an election, the move to one system or another can arguably benefit one or more parties above others.
</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1186" instrument_node="">
	               During the 2015 federal </span><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/elections/"><span data-dcnode-id="1185" instrument_node="">election</span></a><span data-dcnode-id="1183" instrument_node=""> </span><a data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/political-campaign/"><span data-dcnode-id="1182" instrument_node="">campaign</span></a><span data-dcnode-id="1180" instrument_node="">, the </span><a data-dcnode-id="1178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/liberal-party/"><span data-dcnode-id="1179" instrument_node="">Liberal</span></a><span data-dcnode-id="1177" instrument_node="">, </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/new-democratic-party/"><span data-dcnode-id="1176" instrument_node="">NDP</span></a><span data-dcnode-id="1174" instrument_node=""> and </span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/green-party-of-canada/"><span data-dcnode-id="1173" instrument_node="">Green Party</span></a><span data-dcnode-id="1171" instrument_node=""> each included electoral reform in its platform. Liberal leader </span><a data-dcnode-id="1169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/justin-trudeau/"><span data-dcnode-id="1170" instrument_node="">Justin Trudeau</span></a><span data-dcnode-id="1168" instrument_node=""> was the most vocal, announcing that the party was “committed to ensuring that the 2015 election will be the last federal election using first past the post.” The </span><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/conservative-party/"><span data-dcnode-id="1167" instrument_node="">Conservative Party</span></a><span data-dcnode-id="1165" instrument_node=""> supported a </span><a data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/referendum/"><span data-dcnode-id="1164" instrument_node="">referendum</span></a><span data-dcnode-id="1162" instrument_node=""> on the matter.
</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">
	               After the Liberals won a majority, they established the all-party Special Committee on Electoral Reform on 7 June 2016. The committee’s report, tabled that December, recommended that the government consider a national referendum on the question of electoral reform. Although the report suggested that any new system adopted should be one of proportional representation, it did not recommend a specific alternative.
</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">
	       The government commissioned an online survey called MyDemocracy.ca, which was circulated in December 2016. Though its aim was to consult and engage Canadians on the subject of electoral reform, its results were inconclusive. Critics pointed out that the survey did not clearly discuss electoral reform or specific electoral systems and instead focused attention on democratic values.
</span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">
	       On 1 February 2017, the Liberal government dropped electoral reform from its official mandate.
</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1150" instrument_node="">
	               Legal experts point out that </span><span data-dcnode-id="1148" style="background-color: initial;"><span data-dcnode-id="1149" instrument_node="">federal </span></span><span data-dcnode-id="1146" style="background-color: initial;"><span data-dcnode-id="1147" instrument_node="">electoral reform may require constitutional amendment, a historically difficult process (</span></span><em data-dcnode-id="1144" style="background-color: initial;"><span data-dcnode-id="1145" instrument_node="">see</span></em><span data-dcnode-id="1142" style="background-color: initial;"><span data-dcnode-id="1143" instrument_node=""> </span></span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/constitutional-history/" style="background-color: initial;"><span data-dcnode-id="1141" instrument_node="">Constitutional History</span></a><span data-dcnode-id="1138" style="background-color: initial;"><span data-dcnode-id="1139" instrument_node="">).</span></span><span data-dcnode-id="1137" instrument_node="">
</span></p><span data-dcnode-id="1135" instrument_node="">
</span><h3 data-dcnode-id="1133" id="ElectoralReformintheProvinces"><span data-dcnode-id="1134" instrument_node="">Electoral Reform in the Provinces</span></h3><span data-dcnode-id="1132" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1131" instrument_node="">
	               Electoral reform in the provinces is less complex than at the federal level, as the main requirement would be democratic approval in a </span><a data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/referendum/"><span data-dcnode-id="1130" instrument_node="">referendum</span></a><span data-dcnode-id="1128" instrument_node="">. However, in practice, it remains difficult. The decade from 2000 to 2010 saw a surge in interest for electoral reform at the provincial level in </span><a data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/british-columbia/"><span data-dcnode-id="1127" instrument_node="">British Columbia</span></a><span data-dcnode-id="1125" instrument_node="">, </span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/new-brunswick/"><span data-dcnode-id="1124" instrument_node="">New Brunswick</span></a><span data-dcnode-id="1122" instrument_node="">, </span><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/ontario/"><span data-dcnode-id="1121" instrument_node="">Ontario</span></a><span data-dcnode-id="1119" instrument_node="">, </span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/prince-edward-island/"><span data-dcnode-id="1118" instrument_node="">Prince Edward Island</span></a><span data-dcnode-id="1116" instrument_node=""> and </span><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/quebec/"><span data-dcnode-id="1115" instrument_node="">Québec</span></a><span data-dcnode-id="1113" instrument_node="">. Despite the ambitious initiatives undertaken in each of these provinces, reform failed to occur in any of them (although New Brunswick and Ontario did adopt a system of fixed election dates during that time period).
</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1110" instrument_node="">
</span><strong data-dcnode-id="1108" style="background-color: initial;"><span data-dcnode-id="1109" instrument_node="">British Columbia</span></strong><span data-dcnode-id="1107" instrument_node="">
</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1104" instrument_node="">
	               In January 2004, the provincial government of </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/british-columbia/"><span data-dcnode-id="1103" instrument_node="">British Columbia</span></a><span data-dcnode-id="1101" instrument_node=""> established the British Columbia Citizens’ Assembly on Electoral Reform, which, following nine months of discussion, proposed an STV system. In the provincial election held in May 2005, British Columbians voted on whether to adopt reform. The vote fell just short of the 60 per cent threshold required, with 57 per cent voting in favour of the proposal. In May 2009, a second </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/referendum/"><span data-dcnode-id="1100" instrument_node="">referendum</span></a><span data-dcnode-id="1098" instrument_node=""> was held, in which the proposal garnered significantly less support: 39 per cent.
</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1095" instrument_node="">
</span><strong data-dcnode-id="1094"></strong><span data-dcnode-id="1093" instrument_node="">
</span></p><span data-dcnode-id="1091" instrument_node="">

</span><p data-dcnode-id="565"><span data-dcnode-id="569" instrument_node="">
</span><strong data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">New Brunswick</span></strong><span data-dcnode-id="566" instrument_node="">
</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="563" instrument_node="">
	               Movement toward electoral reform began in </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/new-brunswick/"><span data-dcnode-id="562" instrument_node="">New Brunswick</span></a><span data-dcnode-id="560" instrument_node=""> with the establishment of the eight-person Commission on Legislative Democracy in December 2003. The commission released a report in January 2005 that endorsed the MMP option, and the government of Progressive Conservative Premier </span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/bernard-lord/"><span data-dcnode-id="559" instrument_node="">Bernard Lord</span></a><span data-dcnode-id="557" instrument_node=""> responded by pledging to hold a </span><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/referendum/"><span data-dcnode-id="556" instrument_node="">referendum</span></a><span data-dcnode-id="554" instrument_node=""> on the reform in May 2008. Lord’s government was defeated by the Liberal party in a September 2006 election, however, and the referendum was never held.
</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="551" instrument_node="">
</span><strong data-dcnode-id="549" style="background-color: initial;"><span data-dcnode-id="550" instrument_node="">Ontario</span></strong><span data-dcnode-id="548" instrument_node="">
</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="545" instrument_node="">
	               The Ontario Citizens’ Assembly on Electoral Reform was formed in 2006, and in May of the following year they released a report endorsing the MMP voting system. A </span><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/referendum/"><span data-dcnode-id="544" instrument_node="">referendum</span></a><span data-dcnode-id="542" instrument_node=""> was held on the proposal in October 2007. It required 60 per cent support to pass, but failed, receiving only 37 per cent. Following the vote, Elections Ontario, the province’s non-partisan agency responsible for the administration of </span><a data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/elections/"><span data-dcnode-id="541" instrument_node="">elections</span></a><span data-dcnode-id="539" instrument_node="">, was criticized by politicians representing all of the major parties for failing to adequately inform voters about the nature of the proposed reform.
</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="536" instrument_node="">
</span><strong data-dcnode-id="534" style="background-color: initial;"><span data-dcnode-id="535" instrument_node="">Prince Edward Island</span></strong><span data-dcnode-id="533" instrument_node="">
</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="530" instrument_node="">
	               In 2005, a similar situation played out in </span><a data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/prince-edward-island/"><span data-dcnode-id="529" instrument_node="">PEI</span></a><span data-dcnode-id="527" instrument_node="">, where voters were faced with a </span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/referendum/"><span data-dcnode-id="526" instrument_node="">referendum</span></a><span data-dcnode-id="524" instrument_node=""> on MMP. The proposal received only 36 per cent support — a result that many proponents of the reform claimed was the result of an insufficient public education campaign by Elections PEI. A second referendum was held in 2016, in which a majority (52 per cent) voted in favour of MMP representation. However, Premier </span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/wade-maclauchlan/"><span data-dcnode-id="523" instrument_node="">Wade MacLauchlan</span></a><span data-dcnode-id="521" instrument_node=""> stated that government would not act on the result of the referendum — which was not legally binding — because voter turnout was too low (36 per cent) to reflect a clear majority decision. MacLauchlan proposed that another referendum be held in conjunction with the next provincial election.
</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="518" instrument_node="">
</span><span data-dcnode-id="515" style="background-color: initial;"><strong data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Québec</span></strong></span><span data-dcnode-id="514" instrument_node="">
