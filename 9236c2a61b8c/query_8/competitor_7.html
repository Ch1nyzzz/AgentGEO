</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Starting with the People’s Gathering in July 2012, Democracy Max sought to create a non-partisan space where those with different views could debate and discuss ideas about our democracy, and where political rhetoric could be challenged and unpicked.</span></p><span data-dcnode-id="529" instrument_node="">

</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">At the close of the polls on Thursday, people in Scotland will have faced 10 opportunities to vote in the last eight years. Of these elections and referendums, the general election is the only completely non-proportional vote, using First Past The Post to decide who we send to Westminster. Where Scottish democracy has moved forward […]</span></p><span data-dcnode-id="514" instrument_node="">

</span><div class="team-block__bio" data-dcnode-id="242"><p data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Willie is the Director of ERS Scotland. He has worked at senior levels in the business, voluntary and public sector. He was the Campaign consultant on the successful Fairshare Campaign for introduction of STV for Scottish Local Government and was Campaign Director for Vote for a Change, the campaign to secure a referendum on electoral reform.</span></p><span data-dcnode-id="246" instrument_node="">

</span><div class="team-block__bio" data-dcnode-id="188"><p data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">Alice joined ERS in June 2017. While completing her MA in International Studies and Diplomacy from the School of Oriental and African Studies in London, she worked for youth and human rights based campaign groups in the U.K. Fluent in Spanish she lived in both Brazil and Spain undertaking work with local democratic organisations and movements. Returning to Scotland Alice undertook policy research for Common Weal think tank and co-ordinates conferences on political and social issues in Scotland whilst furthering her interest in the political economy of state society relations.</span></p><span data-dcnode-id="189" instrument_node="">
