</span><h2 data-dcnode-id="254"><br data-dcnode-id="258"><span data-dcnode-id="257" instrument_node="">
</span><br data-dcnode-id="256"><span data-dcnode-id="255" instrument_node="">
General information</span></h2><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Our regular office hours are Monday - Thursday, 7:00 AM&nbsp;to 5:30&nbsp;PM.&nbsp;Our office is closed on Fridays. Please visit the specific election sections below for any additional hours that the office may be open for election-related business.</span></p><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="245"><span data-dcnode-id="249" instrument_node="">Visit the </span><a data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oakgov.com/clerkrod/elections" target="_blank"><span data-dcnode-id="248" instrument_node="">Oakland County Elections Division Website</span></a><span data-dcnode-id="246" instrument_node="">&nbsp;for additional&nbsp;information.</span></p><span data-dcnode-id="244" instrument_node="">
</span><h2 data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Voting</span></h2><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="237"><span data-dcnode-id="240" instrument_node="">Are you registered to vote? Do you know your voting precinct? </span><a data-dcnode-id="238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.michigan.gov/sos/0%2C1607%2C7-127-1633-49313--%2C00.html" target="_blank"><span data-dcnode-id="239" instrument_node="">Click here to find your voter information.</span></a></p><span data-dcnode-id="236" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">To register to vote, you must be all the following:</span></p><span data-dcnode-id="233" instrument_node="">
</span><ul data-dcnode-id="219"><span data-dcnode-id="232" instrument_node="">
</span><li data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">A U.S. citizen</span></li><span data-dcnode-id="229" instrument_node="">
</span><li data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">At least 18 years old by Election Day</span></li><span data-dcnode-id="226" instrument_node="">
</span><li data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">A resident of Michigan</span></li><span data-dcnode-id="223" instrument_node="">
</span><li data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">A resident of the Township for at least 30 days before Election Day</span></li><span data-dcnode-id="220" instrument_node="">
</span></ul><span data-dcnode-id="218" instrument_node="">
</span><img alt="" data-dcnode-id="217" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/Images/pdf-icon.aspx&amp;raw"><span data-dcnode-id="216" instrument_node="">&nbsp;</span><a data-dcnode-id="214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/Resources/Forms/Clerk/VoterRegForm.aspx" target="_blank"><span data-dcnode-id="215" instrument_node="">Voter Registration Form</span></a><br data-dcnode-id="213"><span data-dcnode-id="212" instrument_node="">
</span><br data-dcnode-id="211"><span data-dcnode-id="210" instrument_node="">
The Clerk’s Office maintains a Permanent Absent Voter List. Registered voters on this list automatically receive an application for an absent voter ballot 60-75 days before an election. If you wish to be added to this list, please call our office (248-433-7702) or send us an </span><a data-dcnode-id="208" href="javascript:send('clerk','bloomfieldtwp.org')"><span data-dcnode-id="209" instrument_node="">email</span></a><span data-dcnode-id="207" instrument_node="">.

</span><h2 data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Elections</span></h2><span data-dcnode-id="204" instrument_node="">
As of October 2021, the next scheduled elections in Bloomfield Township will be held August 2, 2022 and November 8, 2022.</span><br data-dcnode-id="203"><span data-dcnode-id="202" instrument_node="">
</span><br data-dcnode-id="201"><span data-dcnode-id="200" instrument_node="">
Are you curious or have questions as to how elections work at the local level?</span><br data-dcnode-id="199"><span data-dcnode-id="198" instrument_node="">
If so, become an election inspector and learn all about local election procedures, policies and the steps we take to ensure Bloomfield Township elections are secure and run smoothly and efficiently. Complete the </span><a data-dcnode-id="196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/Resources/Forms/Clerk/ElectionInspector.aspx" target="_blank"><span data-dcnode-id="197" instrument_node="">Election Inspector Application</span></a><span data-dcnode-id="195" instrument_node=""> and submit it to the Clerk’s Office (Instructions for returning it are on the form).</span><br data-dcnode-id="194"><span data-dcnode-id="193" instrument_node="">
</span><br data-dcnode-id="192"><span data-dcnode-id="191" instrument_node="">
</span><a data-dcnode-id="189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vimeo.com/632286450" target="_blank"><span data-dcnode-id="190" instrument_node="">Watch the ceremony to honor Election Inspectors with 20+ years of service</span></a><span data-dcnode-id="188" instrument_node="">.</span><br data-dcnode-id="187"><span data-dcnode-id="186" instrument_node="">
&nbsp;
</span><h2 data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Polling Locations and Precincts</span></h2><span data-dcnode-id="183" instrument_node="">
</span><img alt="" data-dcnode-id="182" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/Images/pdf-icon.aspx&amp;raw"><span data-dcnode-id="181" instrument_node="">&nbsp;</span><a data-dcnode-id="179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/Services-%281%29/Clerk/Voting-and-Elections/Polling-Locations-2020.aspx" target="_blank"><span data-dcnode-id="180" instrument_node="">Click here for polling locations.</span></a><span data-dcnode-id="178" instrument_node="">
</span><p data-dcnode-id="170"><br data-dcnode-id="177"><span data-dcnode-id="176" instrument_node="">
</span><img alt="" data-dcnode-id="175" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/Images/pdf-icon.aspx&amp;raw"><span data-dcnode-id="174" instrument_node="">&nbsp;See a </span><a data-dcnode-id="172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/Services-%281%29/Clerk/Voting-and-Elections/PRECINCT-MAP-11X17.aspx" target="_blank"><span data-dcnode-id="173" instrument_node="">precinct map here</span></a><span data-dcnode-id="171" instrument_node="">.</span></p><span data-dcnode-id="169" instrument_node="">
</span><br data-dcnode-id="168"><span data-dcnode-id="167" instrument_node="">
</span><span data-dcnode-id="165" style="color: rgb(0, 83, 149); font-family: arial, sans-serif; font-size: 20px; font-weight: bold;"><span data-dcnode-id="166" instrument_node="">Accessibility</span></span><br data-dcnode-id="164"><span data-dcnode-id="163" instrument_node="">
All polling places are handicap accessible. Braille and audio versions of voting instructions are available. New voting equipment for individuals with disabilities will be available.
</span><h3 data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">Voter Identification</span></h3><span data-dcnode-id="160" instrument_node="">
Since 2007, every Michigan voter who votes at the polls or requests a ballot over the counter must show picture identification or sign an affidavit attesting that he or she is not in possession of picture identification.&nbsp; A ballot cannot be issued unless the voter displays picture identification or signs the affidavit.</span><br data-dcnode-id="159"><span data-dcnode-id="158" instrument_node="">
</span><br data-dcnode-id="157"><span data-dcnode-id="156" instrument_node="">
To satisfy the requirement, voters must show a Michigan driver’s license or a Michigan personal identification card.</span><br data-dcnode-id="155"><span data-dcnode-id="154" instrument_node="">
</span><br data-dcnode-id="153"><span data-dcnode-id="152" instrument_node="">
In the absence of either document, a voter may show any of the following forms of picture identification as long as they are current:</span><br data-dcnode-id="151"><span data-dcnode-id="150" instrument_node="">
&nbsp;
</span><ul data-dcnode-id="130"><span data-dcnode-id="149" instrument_node="">
</span><li data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">Driver’s license or personal identification card issued by another state</span></li><span data-dcnode-id="146" instrument_node="">
</span><li data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">Federal or state government-issued photo identification</span></li><span data-dcnode-id="143" instrument_node="">
</span><li data-dcnode-id="141"><span data-dcnode-id="142" instrument_node="">U.S. passport</span></li><span data-dcnode-id="140" instrument_node="">
</span><li data-dcnode-id="138"><span data-dcnode-id="139" instrument_node="">Military identification card with photo</span></li><span data-dcnode-id="137" instrument_node="">
</span><li data-dcnode-id="135"><span data-dcnode-id="136" instrument_node="">Student identification with photo from a high school or an accredited institution of higher education</span></li><span data-dcnode-id="134" instrument_node="">
</span><li data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">Tribal identification with photo</span></li><span data-dcnode-id="131" instrument_node="">
</span></ul><span data-dcnode-id="129" instrument_node="">
</span><h3 data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">Redistricting in Michigan</span></h3><span data-dcnode-id="126" instrument_node="">
