    </span></a></h1><div class="social-author clearfix" data-dcnode-id="2646"><div class="social-author__avatar image" data-dcnode-id="2649"><div class="cover-all image" data-dcnode-id="2650" style="background-image: url(&quot;https://thefulcrum.us/res/avatars/default&quot;)"></div></div><a class="social-author__name rm-stats-tracked" data-dcnode-id="2647" data-type="text" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/u/kevinjohnson"><span data-dcnode-id="2648" instrument_node="">Kevin Johnson</span></a></div><div class="social-date" data-dcnode-id="2643"><span class="social-date__text" data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">November 12, 2020</span></span></div></div><div class="widget__head" data-dcnode-id="2638"><picture data-dcnode-id="2639"><source data-dcnode-id="2641" srcset="https://thefulcrum.us/media-library/usa-map-with-flags.jpg?id=23523912&amp;width=1200&amp;quality=85&amp;coordinates=0%2C468%2C0%2C468&amp;height=600 3x, https://thefulcrum.us/media-library/usa-map-with-flags.jpg?id=23523912&amp;width=1200&amp;quality=85&amp;coordinates=0%2C468%2C0%2C468&amp;height=600 2x, https://thefulcrum.us/media-library/usa-map-with-flags.jpg?id=23523912&amp;width=1200&amp;quality=85&amp;coordinates=0%2C468%2C0%2C468&amp;height=600 1x"><img alt="USA map with flags" aria-label="USA map with flags" class="rm-lazyloadable-image" data-dcnode-id="2640" height="600" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/media-library/usa-map-with-flags.jpg%3Fid%3D23523912%26width%3D1200%26quality%3D85%26coordinates%3D0%252C468%252C0%252C468%26height%3D600&amp;raw" style="object-fit: cover;" width="1200"></picture></div><div class="widget__body clearfix sm-mt-1" data-dcnode-id="2480"><div class="photo-credit" data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">
        FotografiaBasica/Getty Images
    </span></div><span class="js-scroll-trigger" data-dcnode-id="2635" data-target="body" data-toggle-class="with-floating-shares" data-triggers="render-rebelbar"></span><div data-dcnode-id="2634" id="utm_campaign"></div><div class="body js-expandable clearfix js-listicle-body js-update-url css-listicle-body-2648875192" data-authors="Kevin Johnson" data-dcnode-id="2495" data-elid="2648875192" data-headline="Distorted U.S. democracy underscores urgency of Electoral College reform" data-post-url="https://thefulcrum.us/election-dissection/electoral-college-reform"><div class="body-description" data-dcnode-id="2496"><p data-dcnode-id="2628"><span data-dcnode-id="2633" instrument_node="">On Dec. 14, the </span><a class="rm-stats-tracked" data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncsl.org/research/elections-and-campaigns/the-electoral-college.aspx" target="_blank"><span data-dcnode-id="2632" instrument_node="">Electoral College</span></a><span data-dcnode-id="2630" instrument_node=""> will cast its votes. Barring any unforeseen outrage, a majority will vote for Joe Biden, the popular vote winner in the general election, to sighs of relief. Many may conclude the creaky Electoral College works most of the time, and that any fixes are just too hard to worry about.</span><br data-dcnode-id="2629"></p><p data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">That would be a mistake. </span></p><hr data-dcnode-id="2625"><p data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">With a shift only .07 percent of the vote, we would have a second-place winner again, just as in 2000 and 2016.</span></p><p data-dcnode-id="2615"><span data-dcnode-id="2622" instrument_node="">And even when the Electoral College doesn't produce a </span><a class="rm-stats-tracked" data-dcnode-id="2620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalpopularvote.com/5-45-presidents-came-office-without-winning-national-popular-vote" target="_blank"><span data-dcnode-id="2621" instrument_node="">second-place winner</span></a><span data-dcnode-id="2619" instrument_node=""> its structure deeply distorts U.S. democracy. It is the reason swing states dominate campaigns. It marginalizes voters in all other states, and it deters strong independent candidates from running. Moreover, minority rule enabled by the Electoral College is now embedded in </span><a class="rm-stats-tracked" data-dcnode-id="2617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/21448334/republicans-supreme-court-ginsburg-democracy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2618" instrument_node="">Republican strategy</span></a><span data-dcnode-id="2616" instrument_node="">. It's in their campaigns for president and governing in the White House — judging by President Trump's treatment of California, New York and other blue states.</span></p><p data-dcnode-id="2610"><span data-dcnode-id="2614" instrument_node="">The biggest problem with the Electoral College is not the issue most people talk about, that </span><a class="rm-stats-tracked" data-dcnode-id="2612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/opinion/articles/2019-06-12/electoral-college-may-not-give-advantage-to-smaller-states" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2613" instrument_node="">small-state voters</span></a><span data-dcnode-id="2611" instrument_node=""> have more weight. Many countries convey greater voting impact to less populated regions. In the United Kingdom, for example, the smallest parliamentary district has one-fifth the voting population — and thus five times the impact on who becomes prime minister — as the largest. Moreover, Republicans do not dominate small states: the 16 smallest divided evenly between the parties in 2016 and 2020. </span></p><p data-dcnode-id="2609"></p><p data-dcnode-id="2606" id="sufn" style="text-align: center;"><a class="rm-stats-tracked" data-dcnode-id="2607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/st/newsletters" style="font-weight: bold;margin:40px auto;font-size:2rem"><span data-dcnode-id="2608" instrument_node="">Sign up for The Fulcrum newsletter </span></a></p><p data-dcnode-id="2605"></p><p data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">The more serious problem with the Electoral College is that it compels states to allocate electoral votes on a winner-take-all basis, giving swing states their dominant role and enabling the culture of minority rule now metastasized in the Republican Party. </span></p><p data-dcnode-id="2596"><a class="rm-stats-tracked" data-dcnode-id="2601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairvote.org/how-the-electoral-college-became-winner-take-all" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2602" instrument_node="">Winner-take-all </span></a><span data-dcnode-id="2600" instrument_node="">is not in the Constitution and was not part of the founders' intent. But it is very difficult to change without collective action among states. One idea, the </span><a class="rm-stats-tracked" data-dcnode-id="2598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalpopularvote.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2599" instrument_node="">National Popular Vote Interstate Compact</span></a><span data-dcnode-id="2597" instrument_node="">, would bypass a constitutional amendment through an agreement for states to give all electoral votes to the national popular vote winner. National Popular Vote survived a referendum in Colorado with 52 percent of the vote. That close result doesn't bode well for the compact's chances in the Republican-controlled legislatures that still need to approve it. The Colorado referendum also highlighted a vulnerability: The plan can require states to give all their electoral votes to a candidate who did not win that state.</span></p><p data-dcnode-id="2595"></p><div class="x12" data-dcnode-id="2593"><div class="htlad-Desktop_Content_Banner" data-dcnode-id="2594"></div></div><p data-dcnode-id="2592"></p><p data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">What's the alternative to National Popular Vote? Nebraska- or Maine-style allocation of electors by district won't work. That approach injects gerrymandering into presidential elections and would not have stopped a second-place Trump win in 2016. </span></p><p data-dcnode-id="2585"><span data-dcnode-id="2589" instrument_node="">The best alternative is a constitutional amendment offering something for both sides. Republicans want to keep the small-state advantage and the state-based, rather than national, calculation of results. Democrats want results that reflect the popular vote. Both priorities can be achieved by the </span><a class="rm-stats-tracked" data-dcnode-id="2587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//electionreformers.org/the-proportional-allocation-solution/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2588" instrument_node="">Top-Two Proportional Amendment</span></a><span data-dcnode-id="2586" instrument_node="">, which makes states allocate their electoral votes proportionally to the top two vote-getters in the state and replaces human electors with electoral votes expressed in decimal form. </span></p><p data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">Here are four reasons this is a good idea:</span></p><ol class="ee-ol" data-dcnode-id="2574"><li data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">The president would nearly always be the popular vote winner.</span></li><li data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">With shares of electoral votes available in every state, candidates will have incentive to campaign nationwide.</span></li><li data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">The "spoiler" problem would largely be fixed. (The 1 percent in Michigan four years ago for Jill Stein probably swung 16 electoral votes; with top-two, her impact would have been .05 of an electoral vote.)</span></li><li data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">State results would finally reflect our true preferences, replacing the image of warring red and blue with different shades of purple.</span></li></ol><p data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">It may sound borderline crazy to talk about something requiring broad-based national agreement when one side won't even accept the Nov. 3 election results. But the idea could appeal to Republican officials outside of swing states because it would bring the presidential campaign back to their states to help with down-ballot races. </span></p><p data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">More importantly, the democracy-distorting impact of the Electoral College is increasing, and it is not just an every-four-year problem. Allowing this institution to continue in its current form is not an option. </span></p><p data-dcnode-id="2549"><a class="rm-stats-tracked" data-dcnode-id="2567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//electionreformers.org/leadership/" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">Kevin Johnson</span></em></a><em data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node=""> is founder and executive director of </span></em><a class="rm-stats-tracked" data-dcnode-id="2562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/election-reformers-network" target="_self"><em data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Election Reformers Network</span></em></a><em data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">. Read more from The Fulcrum's </span></em><a class="rm-stats-tracked" data-dcnode-id="2557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/election-dissection" target="_self"><em data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">Election Dissection</span></em></a><em data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node=""> blog or see our </span></em><a class="rm-stats-tracked" data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/election-dissection/election-coverage" target="_self"><em data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">full list of contributors</span></em></a><em data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">.</span></em></p><div class="around-the-web" data-dcnode-id="2497"><div class="from-your-site__headline" data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">From Your Site Articles</span></div><ul class="around-the-web__list" data-dcnode-id="2516"><li class="from-your-site__item" data-dcnode-id="2544"><a class="from-your-site__link rm-stats-tracked" data-dcnode-id="2545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/national-popular-vote-compact" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2546" instrument_node="">Coloradans vote in favor of national popular vote compact - The ... ›</span></a></li><li class="from-your-site__item" data-dcnode-id="2541"><a class="from-your-site__link rm-stats-tracked" data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/balance-of-power/national-popular-vote-ranked-choice" rel="noopener noreferrer" target="_blank"><span data-dcnode- noir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/voting/electoral-college-votes" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2528" instrument_node="">The Electoral College would be improved by more members - The Fulcrum ›</span></a></li><li class="from-your-site__item" data-dcnode-id="2523"><a class="from-your-site__link rm-stats-tracked" data-dcnode-id="2524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/Elections/Voting/us-election-reform" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2525" instrument_node="">We can build on agreed-upon election fundamentals - The Fulcrum ›</span></a></li><li class="from-your-site__item" data-dcnode-id="2520"><a class="from-your-site__link rm-stats-tracked" data-dcnode-id="2521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/Elections/Voting/what-is-the-electoral-college" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2522" instrument_node="">Is it time to replace the electoral college? - The Fulcrum ›</span></a></li><li class="from-your-site__item" data-dcnode-id="2517"><a class="from-your-site__link rm-stats-tracked" data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/voting-reform-2656441557" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2519" instrument_node="">Election reform advocates regroup, plan next steps - The Fulcrum ›</span></a></li></ul><div class="around-the-web__headline" data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Related Articles Around the Web</span></div><ul class="around-the-web__list" data-dcnode-id="2498"><li class="around-the-web__item" data-dcnode-id="2511"><a class="around-the-web__link rm-stats-tracked" data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cato.org/policy-report/marchapril-2013         The state of voting: April 18, 2022
    </span></a><span data-dcnode-id="2408" instrument_node="">
</span></h2><div class="social-author clearfix" data-dcnode-id="2397"><span data-dcnode-id="2406" instrument_node="">
</span><div class="social-author__avatar image" data-dcnode-id="2402"><span data-dcnode-id="2405" instrument_node="">
</span><div class="cover-all image" data-dcnode-id="2404" style="background-image: url(&quot;https://thefulcrum.us/media-library/eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpbWFnZSI6Imh0dHBzOi8vYXNzZXRzLnJibC5tcy8yNzg5MDU2NC9vcmlnaW4ucG5nIiwiZXhwaXJlc19hdCI6MTY4MTkwMjEzM30.xkqgqJBSdHMwxikwAxd_jLa_IoTtQE8h_z-oG40DPZw/image.png?width=210&quot;)"></div><span data-dcnode-id="2403" instrument_node="">
</span></div><span data-dcnode-id="2401" instrument_node="">
</span><a class="social-author__name rm-stats-tracked" data-dcnode-id="2399" data-type="text" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/u/ourstaff"><span data-dcnode-id="2400" instrument_node="">Our Staff</span></a><span data-dcnode-id="2398" instrument_node="">

</span><span data-dcnode-id="2395" instrument_node="">
</span><span data-dcnode-id="2394" instrument_node="">
</span></div><div class="widget__head" data-dcnode-id="2389"><a aria-label="The state of voting: April 18, 2022" class="rm-stats-tracked" data-dcnode-id="2391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/changes-in-election-laws-2657172708"><img alt="State of voting - election law changes" aria-label="State of voting - election law changes" class="rm-lazyloadable-image" data-dcnode-id="2392" height="600" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/media-library/state-of-voting-election-law-changes.png%3Fid%3D29694059%26width%3D1200%26quality%3D85%26coordinates%3D0%252C0%252C0%252C0%26height%3D600&amp;raw" style="object-fit: cover;" width="1200"></a><span data-dcnode-id="2390" instrument_node="">
</span></div><div class="widget__body clearfix sm-mt-1" data-dcnode-id="2215"><div class="body js-expandable clearfix js-listicle-body js-update-url css-listicle-body-2657172708" data-authors="Our Staff" data-dcnode-id="2241" data-elid="2657172708" data-headline="The state of voting: April 18, 2022" data-post-url="https://thefulcrum.us/changes-in-election-laws-2657172708"><div class="body-description" data-dcnode-id="2243"><div class="widget__brief" data-dcnode-id="2332"><p data-dcnode-id="2375"><em data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">This weekly update summarizing legislative activity affecting voting and elections is powered by the </span></em><a class="rm-stats-tracked" data-dcnode-id="2384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//votingrightslab.org/" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Voting Rights Lab</span></em></a><em data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">. Sign up for VRL’s weekly newsletter </span></em><a class="rm-stats-tracked" data-dcnode-id="2379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//votingrightslab.us4.list-manage.com/subscribe%3Fu%3D726a2570656bae04d06b099ef%26id%3D8d7e6dc6e2" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">here</span></em></a><em data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">.</span></em><br data-dcnode-id="2376"></p><span data-dcnode-id="2374" instrument_node="">
</span><p data-dcnode-id="2363"><span data-dcnode-id="2373" instrument_node="">The Voting Rights Lab is tracking </span><a class="rm-stats-tracked" data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2372" instrument_node="">2,445 bills</span></a><span data-dcnode-id="2370" instrument_node=""> so far this session, with </span><a class="rm-stats-tracked" data-dcnode-id="2368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search%3Fnumber%3D5831204609034429" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2369" instrument_node="">572 bills</span></a><span data-dcnode-id="2367" instrument_node=""> that tighten the rules governing voter access or election administration and </span><a class="rm-stats-tracked" data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search%3Fnumber%3D4679963964209919" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2366" instrument_node="">1,087 bills</span></a><span data-dcnode-id="2364" instrument_node=""> that expand the rules.</span></p><p data-dcnode-id="2345"><span data-dcnode-id="2362" instrument_node="">Much of last week’s action focused on voter ID requirements. The Missouri Senate’s Local Government and Elections Committee advanced legislation that would make the state’s </span><a class="rm-stats-tracked" data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search/MO2022H1878" target="_blank"><span data-dcnode-id="2361" instrument_node="">voter ID law much stricter</span></a><span data-dcnode-id="2359" instrument_node="">. But the Arizona House </span><a class="rm-stats-tracked" data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ktar.com/story/5002435/arizona-house-votes-to-delay-new-election-law-stiffening-citizenship-proof-to-vote/" target="_blank"><span data-dcnode-id="2358" instrument_node="">voted to delay</span></a><span data-dcnode-id="2356" instrument_node=""> implementation of a new law requiring proof of citizenship until after the 2022 general election. New York made it easier to vote for </span><a class="rm-stats-tracked" data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/04/06/nyregion/new-york-disabilities-voting-access.html" target="_blank"><span data-dcnode-id="2355" instrument_node="">voters with disabilities</span></a><span data-dcnode-id="2353" instrument_node="">, </span><a class="rm-stats-tracked" data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search/NY2021A454" target="_blank"><span data-dcnode-id="2352" instrument_node="">college students</span></a><span data-dcnode-id="2350" instrument_node="">, and </span><a class="rm-stats-tracked" data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search/NY2021A454" target="_blank"><span data-dcnode-id="2349" instrument_node="">mail voters</span></a><span data-dcnode-id="2347" instrument_node="">.</span><br data-dcnode-id="2346"></p><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2339"><span data-dcnode-id="2343" instrument_node="">And Wisconsin Gov. Tony Evers vetoed more </span><a class="rm-stats-tracked" data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search/WI2021S213" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2342" instrument_node="">legislation</span></a><span data-dcnode-id="2340" instrument_node="">. In this case, the bill would have affected independent election administration.</span></p><p data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Looking ahead: The Missouri Senate will consider an omnibus election reform bill if it is able to resolve outstanding impasses concerning other topics, including congressional redistricting.</span></p><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Here are the details: </span></p><span data-dcnode-id="2333" instrument_node="">
</span></div><span data-dcnode-id="2331" instrument_node="">
</span><div class="content-container" data-dcnode-id="2256"><p data-dcnode-id="2317"><strong data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Arizona House votes to delay proof of citizenship implementation. </span></strong><span data-dcnode-id="2328" instrument_node="">Amid </span><a data-dcnode-id="2326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//campaignlegal.org/sites/default/files/2022-03/DPOC%2520Complaint_Final.pdf" target="_blank"><span data-dcnode-id="2327" instrument_node="">lawsuits</span></a><span data-dcnode-id="2325" instrument_node=""> and </span><a data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//azgovernor.gov/sites/default/files/hb2492_signing_letter.pdf" target="_blank"><span data-dcnode-id="2324" instrument_node="">Gov. Doug Ducey’s attempt</span></a><span data-dcnode-id="2322" instrument_node=""> to reject a more extreme interpretation of the legislation, the </span><a data-dcnode-id="2320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ktar.com/story/5002435/arizona-house-votes-to-delay-new-election-law-stiffening-citizenship-proof-to-vote/" target="_blank"><span data-dcnode-id="2321" instrument_node="">Arizona House voted to delay the effective date</span></a><span data-dcnode-id="2319" instrument_node=""> for the new requirement that voters provide evidence of citizenship to vote. This new law would not allow people to vote in presidential elections, or in any elections by mail, unless election officials confirmed the person’s citizenship through documentation provided by the voter or an existing database. This new requirement is currently scheduled to take effect between the primary and general elections this year. If the delay is approved by the Senate and Ducey, the requirement will not take effect until after the 2022 general election.</span><br data-dcnode-id="2318"></p><span data-dcnode-id="2316" instrument_node="">
</span><p data-dcnode-id="2315"></p><p data-dcnode-id="2312" id="sufn" style="text-align: center;"><a data-dcnode-id="2313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/st/newsletters" style="font-weight: bold;margin:40px auto;font-size:2rem"><span data-dcnode-id="2314" instrument_node="">Sign up for The Fulcrum newsletter </span></a></p><p data-dcnode-id="2311"></p><p data-dcnode-id="2299"><strong data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">A bill that creates early voting, but also makes the state ID requirement much stricter, advances out of Missouri elections committee. </span></strong><a data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search/MO2022H1878" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2308" instrument_node="">H.B. 1878</span></a><span data-dcnode-id="2306" instrument_node=""> was voted out of Missouri’s Senate Local Government and Elections Committee. The bill would only allow citizens to vote in person if they are able to show a photo ID. Under </span><a data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/issues/21VoterID%3Flaw%3D100%23Q100" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2305" instrument_node="">current Missouri law</span></a><span data-dcnode-id="2303" instrument_node="">, voters can prove their identity using a variety of ID types, including utility bills, bank statements and paychecks. Notably, before advancing the bill, the committee added language creating up to six weeks of in-person early voting. Missouri is currently </span><a data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/issues/21ErlyVtngAvlblty" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2302" instrument_node="">one of only seven states</span></a><span data-dcnode-id="2300" instrument_node=""> that does not generally offer any type of in-person early voting. The bill will now move to the full Senate for consideration, though the Senate remains deadlocked on other issues – including congressional redistricting – that are slowing down consideration of any legislation. </span></p><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2297"></p><div class="x12" data-dcnode-id="2295"><div class="htlad-Desktop_Content_Banner" data-dcnode-id="2296"></div></div><p data-dcnode-id="2294"></p><p data-dcnode-id="2284"><strong data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">New York makes casting a ballot easier for those with disabilities, students and mail voters. </span></strong><span data-dcnode-id="2291" instrument_node="">As part of a settlement, the New York State Board of Elections will allow voters with disabilities to </span><a data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2022/04/06/nyregion/new-york-disabilities-voting-access.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2290" instrument_node="">request electronic, accessible ballots</span></a><span data-dcnode-id="2288" instrument_node=""> up to 15 days before any elections. The ballots will also feature raised markers to aid voters with visual impairments. Last week, the Legislature </span><a data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search/NY2021S8005" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2287" instrument_node="">enacted legislation</span></a><span data-dcnode-id="2285" instrument_node=""> requiring that all absentee ballots include prepaid return postage. The bill also ensures that there is a polling place on every college campus with 300 or more registered voters. This legislation will make it easier for students to vote, particularing with college campuses are divided into multiple districts.</span></p><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2273"><strong data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Wisconsin governor vetoes legislation that would interfere with the administration of elections. </span></strong><span data-dcnode-id="2280" instrument_node="">On Friday, Evers vetoed two election bills. </span><a data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search/WI2021S213" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2279" instrument_node="">S.B. 213</span></a><span data-dcnode-id="2277" instrument_node=""> would have shifted election authority away from the Wisconsin Election Commission by enabling people to skip a WEC administrative process and directly petition the court to test the validity of any decision on the part of an election official. </span><a data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search/WI2021S936" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2276" instrument_node="">S.B. 936</span></a><span data-dcnode-id="2274" instrument_node=""> would have created a performance audit of voting equipment after each general election and made several changes to how the WEC responds to complaints received about violations of election law and the reporting of those complaints.</span></p><span data-dcnode-id="2272" instrument_node="">
</span><p data-dcnode-id="2265"><strong data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Maryland legislature passes legislation strengthening its cure process.</span></strong><span data-dcnode-id="2269" instrument_node=""> Last week, the Maryland General Assembly sent </span><a data-dcnode-id="2267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search/MD2022S163" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2268" instrument_node="">S.B. 163</span></a><span data-dcnode-id="2266" instrument_node=""> to the governor’s desk. The bill would ensure that voters who forget to sign the oath on their mail ballot are notified and given a chance to correct their error and have their vote counted.</span></p><span data-dcnode-id="2264" instrument_node="">
</span><p data-dcnode-id="2257"><strong data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Colorado protects voting for victims of natural disasters.</span></strong><span data-dcnode-id="2261" instrument_node=""> Colorado enacted </span><a data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tracker.votingrightslab.org/pending/search/CO2022S152" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2260" instrument_node="">S.B. 152</span></a><span data-dcnode-id="2258" instrument_node="">, which allows people to maintain their voter registrations after their homes have been destroyed by wildfire or other natural disasters, provided the voter intends to rebuild and move back to their residence. Existing law requires a voter’s registration address to match their motor vehicle registration address and income tax address.</span></p></div><span data-dcnode-id="2255" instrument_node="">
</span><div class="js-appear-on-expand" data-dcnode-id="2253"><template data-dcnode-id="2254"></template></div><span data-dcnode-id="2252" instrument_node="">

</span><span class="widget__section js-load-brick-on-click" data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">Your Take</span></span><span data-dcnode-id="2187" instrument_node="">
</span><h2 class="widget__headline h2" data-dcnode-id="2182"><span data-dcnode-id="2186" instrument_node="">
</span><a aria-label="Your Take: Elon Musk &amp; Twitter" class="widget__headline-text custom-post-headline rm-stats-tracked" data-dcnode-id="2184" data-type="text" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/Pop-Culture/your-take/-2657198505"><span data-dcnode-id="2185" instrument_node="">
        Your Take: Elon Musk &amp; Twitter
    </span></a><span data-dcnode-id="2183" instrument_node="">
</span></h2><div class="social-author clearfix" data-dcnode-id="2172"><span data-dcnode-id="2181" instrument_node="">
</span><div class="social-author__avatar image" data-dcnode-id="2177"><span data-dcnode-id="2180" instrument_node="">
</span><div class="cover-all image" data-dcnode-id="2179" style="background-image: url(&quot;https://thefulcrum.us/media-library/eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpbWFnZSI6Imh0dHBzOi8vYXNzZXRzLnJibC5tcy8yNzg5MDU2NC9vcmlnaW4ucG5nIiwiZXhwaXJlc19hdCI6MTY4MTkwMjEzM30.xkqgqJBSdHMwxikwAxd_jLa_IoTtQE8h_z-oG40DPZw/image.png?width=210&quot;)"></div><span data-dcnode-id="2178" instrument_node="">
</span></div><span data-dcnode-id="2176" instrument_node="">
</span><a class="social-author__name rm-stats-tracked" data-dcnode-id="2174" data-type="text" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/u/ourstaff"><span data-dcnode-id="2175" instrument_node="">Our Staff</span></a><span data-dcnode-id="2173" instrument_node="">
</span></div><span data-dcnode-id="2171" instrument_node="">
</span><span data-dcnode-id="2170" instrument_node="">
</span><span data-dcnode-id="2169" instrument_node="">
</span><div class="social-date" data-dcnode-id="2164"><span data-dcnode-id="2168" instrument_node="">
</span><span class="social-date__text" data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">April 22, 2022</span></span><span data-dcnode-id="2165" instrument_node="">
</span></div></div><div class="widget__head" data-dcnode-id="2159"><a aria-label="Your Take: Elon Musk &amp; Twitter" class="rm-stats-tracked" data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/Pop-Culture/your-take/-2657198505"><img alt="Your Take: Elon Musk &amp; Twitter" aria-label="Your Take: Elon Musk &amp; Twitter" class="rm-lazyloadable-image" data-dcnode-id="2162" height="600" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/media-library/image.png%3Fid%3D29713420%26width%3D1200%26quality%3D85%26coordinates%3D0%252C0%252C0%252C0%26height%3D600&amp;raw" style="object-fit: cover;" width="1200"></a><span data-dcnode-id="2160" instrument_node="">
</span></div><div class="widget__body clearfix sm-mt-1" data-dcnode-id="2070"><div class="body js-expandable clearfix js-listicle-body js-update-url css-listicle-body-2657198505" data-authors="Our Staff" data-dcnode-id="2096" data-elid="2657198505" data-headline="Your Take: Elon Musk &amp; Twitter" data-post-url="https://thefulcrum.us/Pop-Culture/your-take/-2657198505"><div class="body-description" data-dcnode-id="2098"><div class="widget__brief" data-dcnode-id="2153"><p data-dcnode-id="2156"><span data-dcnode-id="2158" instrument_node="">Last week, we asked people for their opinions on Elon Musk’s bid to buy Twitter. It’s an issue fraught with questions about social media, federal regulations, algorithmic transparency, content moderation and of course, free speech.</span><br data-dcnode-id="2157"></p><p data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">People have … opinions. Some readers believe Twitter needs to be revamped and hope Musk has the creativity to fix things. Others fear consolidating so much control of a major social media platform in one person’s hands. Many people consider this a free speech issue and wonder whether Twitter should be considered more like a public service than a private company (which is not subject to the First Amendment’s free speech protections).</span></p></div><span data-dcnode-id="2152" instrument_node="">
</span><div class="content-container" data-dcnode-id="2111"><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Your responses, edited for clarity and length:</span></p><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">I believe Musk being in charge of Twitter would add to the already toxic divisive environment on the internet and would ultimately undermine what is left of democracy in this country. The only possible way this could be OK is if there were NO retweets. -Tom Daly</span></p><p data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">My take on the matter is that this is either a) Musk's typical behavior when presented with an arena he doesn't control (i.e., make a bid for control and then leave in a huff if it doesn't go his way) or b) a scheme to pump the Twitter stock he's already got. While I don't like Twitter at all, and I think it lowers the level of public discourse, I don't think an eccentric billionaire seizing the reins will improve matters much. -William Shaffer</span></p><p data-dcnode-id="2145"></p><p data-dcnode-id="2142" id="sufn" style="text-align: center;"><a data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/st/newsletters" style="font-weight: bold;margin:40px auto;font-size:2rem"><span data-dcnode-id="2144" instrument_node="">Sign up for The Fulcrum newsletter </span></a></p><p data-dcnode-id="2141"></p><p data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">It appears some people want to change the rules to prevent Musk from taking over Twitter. Some things I like about Musk, some things I don't, but I think his wealth should NOT disqualify him. He advocates more free speech, rather than less. The fact that he is much more in the public eye than most of the people who control our major news media and communications is a plus for me. -Greg Ripps</span></p><p data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Twitter is not currently oriented towards free speech. Their fear of Elon Musk is exposing its leaders’ lack of objectivity. When a platform like Twitter gets big enough it should be considered a public accommodation, which means it should not be kicking so many people off. -Steve Yurash</span></p><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">I do not believe one person should have control of a social media platform. I am especially concerned because Musk has said he wants to make Twitter a free speech platform. It's my observation that other social media platforms that promote themselves as being for free speech always end up as echo chambers for extreme right wing conspiracy theorists who promote violence. Take a look at Parler and Gab, for instance. I hope that the Twitter board stands their ground and resists this takeover. -Marcia Claesson</span></p><span data-dcnode-id="2134" instrument_node="">I do not think he is serious about algorithmic transparency — I can't see why he would want that, other than to find out how Jack Dorsey </span><p data-dcnode-id="2133"></p><div class="x12" data-dcnode-id="2131"><div class="htlad-Desktop_Content_Banner" data-dcnode-id="2132"></div></div><p data-dcnode-id="2130"></p><a data-dcnode-id="2128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/ElonJet" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2129" instrument_node="">tracks his jet</span></a><span data-dcnode-id="2127" instrument_node="">. Yes, when you are that rich you can be that self-absorbed. I see it also as another bluff thrown out to keep people holding their Twitter stock to "protect" democracy and free speech from his hostile takeover. By the way, I believe his definition of "free speech" includes the right to lie, deceive and cheat. I am no fan of Elon Musk. I admire him not. -Laura Madden</span><p data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">It all depends on what he does with it. The way it is currently being run is obviously not good from either a freedom of speech perspective or a speech forum perspective. Everyone who is paying attention knows what needs to be done. Open up the algorithm so it is open source. Adequately define out-of-bounds behavior. Make it easier to fact-check information. None of this will be done by the current owners, because it is being run as a cash cow for the investors, and the current algorithm is designed to drive engagement by raising adrenaline levels. They have no incentive to change. He can't make it any worse, and he could make it a lot better. -Ray Curtis</span></p><p data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">I do not believe free speech can exist in a forum without guard rails. The reason is that people who don’t have extreme views get trolled and then quit using the forum. The result is that only one view ends up being expressed on the forum. As a result I am against Elon Musk buying Twitter and hope it remains a stockholder-owned company. -Lucy Schumer</span></p><p data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">I am worried about social media platforms' ability to amplify misinformation, rage and anger. I am also worried about extremely wealthy people having an oversized influence on discourse, politics and government. However, I am not sure how we balance freedom of speech and the ability of social platforms to generate distrust in government — that has resulted in the decline in democracy. Perhaps social media companies should not be allowed to have any one person with controlling interest. Perhaps there should be public oversight of major social media platforms. Elon Musk is incredibly creative, intelligent and driven. However, he also appears to be irrational and at times a megalomaniac. I do not think it would be wise for him to have control of Twitter. -Karen Alongi</span></p><p data-dcnode-id="2116"><span data-dcnode-id="2120" instrument_node="">My take is that Congress needs to dramatically revise </span><a data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uscode.house.gov/view.xhtml%3Freq%3D%28title%3A47%2520section%3A230%2520edition%3Aprelim%29" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2119" instrument_node="">Section 230</span></a><span data-dcnode-id="2117" instrument_node="">, not merely unshielding platforms for content carried, but specifically holding them accountable for their algorithms that prioritize incendiary content to increase interaction. While they may not be able to police everything on their platform, they are absolutely capable of modifying the algorithms and making transparent how they push content. And when they don't, criminal prosecutions and hefty fines should follow. -Alan LaPolice</span></p><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">I don’t like wealthy individuals or companies gobbling up smaller guys- too much concentration of wealth and power in the hands of a few. I’d rather see the money spent on buyouts creating jobs or something else productive. -Kevin Cushing</span></p><p data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Musk claims he wants to ensure free speech but I think he really wants to ensure irresponsible speech. I hope Twitter holds on. I resent that Musk thinks he can buy what he wants and then morph it into a platform for those that cling to the Big Lie. -Sonja Barclift</span></p></div><span data-dcnode-id="2110" instrument_node="">
</span><div class="js-appear-on-expand" data-dcnode-id="2108"><template data-dcnode-id="2109"></template></div><span data-dcnode-id="2107" instrument_node="">

</span></div></div><div class="widget__head" data-dcnode-id="2017"><a aria-label="Tut, tut: Notes on an invitation to solidarity" class="rm-stats-tracked" data-dcnode-id="2019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/Columns/Democracy-Pie/-2657198000"><img alt="Solidarity with Ukraine" aria-label="Solidarity with Ukraine" class="rm-lazyloadable-image" data-dcnode-id="2020" data-runner-src="https://thefulcrum.us/media-library/solidarity-with-ukraine.jpg?id=29713340&amp;width=1200&amp;quality=85&amp;coordinates=0%2C440%2C0%2C560&amp;height=600" height="600" role="img" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201200%20600'%3E%3C/svg%3E" style="object-fit: cover;" type="lazy-image" width="1200"></a><span data-dcnode-id="2018" instrument_node="">
</span></div><div class="widget__body clearfix sm-mt-1" data-dcnode-id="1939"><div class="photo-credit" data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">
        Andriy Onufriyenko/Getty Images
    </span></div><div class="body js-expandable clearfix js-listicle-body js-update-url css-listicle-body-2657198000" data-authors="Wendy  Willis" data-dcnode-id="1965" data-elid="2657198000" data-headline="Tut, tut: Notes on an invitation to solidarity" data-post-url="https://thefulcrum.us/Columns/Democracy-Pie/-2657198000"><div class="body-description" data-dcnode-id="1967"><div class="widget__brief" data-dcnode-id="1982"><p data-dcnode-id="2011"><em data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Willis is the founder and director of Oregon's Kitchen Table at Portland State University and executive director of the Deliberative Democracy Consortium. She is the author of a textbook, a book of essays and two books of poems.</span></em><br data-dcnode-id="2012"></p><span data-dcnode-id="2010" instrument_node="">
</span><blockquote data-dcnode-id="1996"><em data-dcnode-id="2007"><span data-dcnode-id="2009" instrument_node="">Blessed are those</span><br data-dcnode-id="2008"></em><em data-dcnode-id="2004"><span data-dcnode-id="2006" instrument_node="">who break off from separateness</span><br data-dcnode-id="2005"></em><em data-dcnode-id="2001"><span data-dcnode-id="2003" instrument_node="">theirs is wild</span><br data-dcnode-id="2002"></em><em data-dcnode-id="1998"><span data-dcnode-id="2000" instrument_node="">Heaven.</span><br data-dcnode-id="1999"></em><span data-dcnode-id="1997" instrument_node="">-Jean Valentine, “The Harrowing”</span></blockquote><p data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">They told us what was coming. So I — like so many others around the world — coiled myself into a fatalistic ball waiting for the Russians to roll across the border into Ukraine. Two days, Vladimir Putin supposedly told his troops. Two days, and the Russians would be, if not greeted as liberators, at least accepted as neighborly occupiers. Ukrainian President Volodymyr Zelensky and his cabinet would flee to some sympathetic nation in Central Europe, and the world would move on. That was the plan, at least. And it was a plan that, somewhere in the back of my head, I accepted.</span></p><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Of course, as we all know now, that was not what the citizens of Ukraine had in mind. Zelensky stayed. The Ukrainian people have banded together and delivered babies and fed neighbors and torn down street signs, and fought and fought. Russian troops have grown increasingly brutal. They are raping and murdering civilians. They are shelling hospitals. Thousands upon thousands of Ukrainians have been killed, many of them dumped into mass graves dug on the edges of suburban neighborhoods. Millions more have fled.</span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1989"></p><p data-dcnode-id="1986" id="sufn" style="text-align: center;"><a class="rm-stats-tracked" data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/st/newsletters" style="font-weight: bold;margin:40px auto;font-size:2rem"><span data-dcnode-id="1988" instrument_node="">Sign up for The Fulcrum newsletter </span></a></p><p data-dcnode-id="1985"></p><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">So what are we to do? Of course, President Biden and Prime Minister Sanna Marin of Finland and Chinese President Xi Jinping and the U.N. Security Council have real decisions to make. But what about the rest of us?</span></p></div><span data-dcnode-id="1981" instrument_node="">
</span><div class="content-container" data-dcnode-id="1980"></div><span data-dcnode-id="1979" instrument_node="">

</span></div></div><div class="widget__head" data-dcnode-id="1566"><a aria-label="The Allies negotiated with Hitler. And it was called ‘appeasement.’" class="rm-stats-tracked" data-dcnode-id="1568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/big-picture/Leadership/putin-russia-ukraine"><img alt="Ukrainians in a bomb shelter" aria-label="Ukrainians in a bomb shelter" class="rm-lazyloadable-image" data-dcnode-id="1569" data-runner-src="https://thefulcrum.us/media-library/ukrainians-in-a-bomb-shelter.jpg?id=29708245&amp;width=1200&amp;quality=85&amp;coordinates=0%2C499%2C0%2C621&amp;height=600" height="600" role="img" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201200%20600'%3E%3C/svg%3E" style="object-fit: cover;" type="lazy-image" width="1200"></a><span data-dcnode-id="1567" instrument_node="">

</span></div><div class="photo-credit" data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">
        Gian Marco Benedetto/Anadolu Agency via Getty Images
    </span></div><div class="body js-expandable clearfix js-listicle-body js-update-url css-listicle-body-2657191499" data-authors="David L. Nevins" data-dcnode-id="1530" data-elid="2657191499" data-headline="The Allies negotiated with Hitler. And it was called ‘appeasement.’" data-post-url="https://thefulcrum.us/big-picture/Leadership/putin-russia-ukraine"><div class="body-description" data-dcnode-id="1532"><div class="widget__brief" data-dcnode-id="1547"><p data-dcnode-id="1555"><em data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Nevins is co-publisher of The Fulcrum and co-founder and board chairman of the Bridge Alliance Education Fund.</span></em><br data-dcnode-id="1556"></p><p data-dcnode-id="1552"><span data-dcnode-id="1554" instrument_node="">I hesitated before approving the headline above.</span><br data-dcnode-id="1553"></p><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">So often the Hitler analogy is used when a person does something that is particularly egregious in the mind of someone with a differing opinion. It has been so overused, particularly in this highly charged political environment, that one tends to dismiss it as rhetoric deployed solely for the purpose of achieving a political advantage.</span></p><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Yet today, as one watches the horrific events in Ukraine, and witnesses Russia’s indiscriminate attacks on innocent civilians, including children, the comparison to Hitler is appropriate. The United States and our NATO allies must recognize who Putin is if they are to respond in a manner commensurate with the ungodly acts perpetrated by this evil man.</span></p></div><span data-dcnode-id="1546" instrument_node="">

</span></div></div><div class="widget__head" data-dcnode-id="1451"><a aria-label="Podcast: When the stars begin to fall with Dr. Theodore R. Johnson" class="rm-stats-tracked" data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/big-picture/Leadership/-2657191062"><img alt="Podcast: When the stars begin to fall with Dr. Theodore R. Johnson" aria-label="Podcast: When the stars begin to fall with Dr. Theodore R. Johnson" class="rm-lazyloadable-image" data-dcnode-id="1454" data-runner-src="https://thefulcrum.us/media-library/image.jpg?id=29707994&amp;width=1200&amp;quality=85&amp;coordinates=488%2C0%2C0%2C0&amp;height=600" height="600" role="img" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201200%20600'%3E%3C/svg%3E" style="object-fit: cover;" type="lazy-image" width="1200"></a><span data-dcnode-id="1452" instrument_node="">
</span></div><div class="widget__body clearfix sm-mt-1" data-dcnode-id="1403"><div class="body js-expandable clearfix js-listicle-body js-update-url css-listicle-body-2657191062" data-authors="Our Staff" data-dcnode-id="1429" data-elid="2657191062" data-headline="Podcast: When the stars begin to fall with Dr. Theodore R. Johnson" data-post-url="https://thefulcrum.us/big-picture/Leadership/-2657191062"><div class="body-description" data-dcnode-id="1431"><div class="widget__brief" data-dcnode-id="1446"><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Dr. Theodore R. Johnson is the great-grandson of sharecroppers who, unfathomably, believed in what Johnson calls “the Promise,” that we Americans are created equal and that “each of us will respect and defend the rights and liberty of others.” Willie and Annie Johnson so believed in that promise that they named Dr. Johnson’s grandfather and namesake Theodore Roosevelt Johnson, after our 26th president invited the first black man, Booker T. Washington, to the White House for dinner. Dr. Johnson shares his family’s deep reverence for this American experiment, but also believes our failure to bind together around our highest ideals is an existential threat to our future.</span></p><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Listen to Village Squarecast's recent podcast where Dr. Johnson makes an invitation—and a challenge—to all of us, born of lived experience as a black son of the American south and love of this country he took an oath to preserve.</span></p></div><span data-dcnode-id="1445" instrument_node="">

</span></div></div><div class="widget__head" data-dcnode-id="1353"><a aria-label="Freedom of speech comes with the responsibility to use it" class="rm-stats-tracked" data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/freedom-of-speech"><img alt="Mike Pence at the University of Virginia" aria-label="Mike Pence at the University of Virginia" class="rm-lazyloadable-image" data-dcnode-id="1356" data-runner-src="https://thefulcrum.us/media-library/mike-pence-at-the-university-of-virginia.jpg?id=29705808&amp;width=1200&amp;quality=85&amp;coordinates=0%2C160%2C0%2C404&amp;height=600" height="600" role="img" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201200%20600'%3E%3C/svg%3E" style="object-fit: cover;" type="lazy-image" width="1200"></a><span data-dcnode-id="1354" instrument_node="">

</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Former Vice President Mike Pence speaks at the University of Virginia on April 12.</span></p><span data-dcnode-id="1349" instrument_node="">
</span></div><div class="photo-credit" data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">
        Ryan M. Kelly/AFP via Getty Images
    </span></div><div class="body js-expandable clearfix js-listicle-body js-update-url css-listicle-body-2657188346" data-authors="Lawrence Goldstone" data-dcnode-id="1308" data-elid="2657188346" data-headline="Freedom of speech comes with the responsibility to use it" data-post-url="https://thefulcrum.us/freedom-of-speech"><div class="body-description" data-dcnode-id="1310"><div class="widget__brief" data-dcnode-id="1325"><p data-dcnode-id="1337"><em data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Goldstone’s most recent book is "</span></em><a class="rm-stats-tracked" data-dcnode-id="1341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Account-Race-Supremacy-Ravaging-American/dp/1640093923/ref%3Dsr_1_1%3Fkeywords%3Don%2Baccount%2Bof%2Brace%26qid%3D1636492065%26sr%3D8-1" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">On Account of Race: The Supreme Court, White Supremacy, and the Ravaging of African American Voting Rights</span></em></a><em data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">."</span></em><br data-dcnode-id="1338"></p><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">On April 12, former Vice President Mike Pence gave a talk at the University of Virginia as part of the Ken &amp; Janice Shengold Advancing Freedom Lecture Series. His appearance was sponsored by Young Americans for Freedom, a conservative students’ organization founded by William F. Buckley Jr. in 1960. Tickets were free and the lecture was open to all. After the invitation was announced, as is inevitable these days when a controversial speaker is invited to a college campus, fierce protests ensued with demands that Pence not be granted such a prestigious forum.</span></p><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">An editorial in the Cavalier Daily, the university’s student newspaper established in 1890, was particularly scathing. “For Pence,” it read, “gay couples signify a ‘societal collapse,’ Black lives do not matter, transgender individuals and immigrants do not deserve protection, and the pandemic should not be taken seriously.” The editorial went on to accuse Pence of at least tacitly encouraging violence against marginalized groups, with the college administration complicit by its willingness to provide him a platform. “The University’s silence is deafening. Do not mistake this for neutrality, however. To be silent in the face of those like Pence is a choice — in this case, a choice to fail to protect the lives of those on Grounds who Pence blatantly threatens through his rhetoric and policies.”</span></p><p data-dcnode-id="1332"></p><p data-dcnode-id="1329" id="sufn" style="text-align: center;"><a class="rm-stats-tracked" data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/st/newsletters" style="font-weight: bold;margin:40px auto;font-size:2rem"><span data-dcnode-id="1331" instrument_node="">Sign up for The Fulcrum newsletter </span></a></p><p data-dcnode-id="1328"></p><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">The editorial instigated as much of a backlash as had the invitation, and the resulting kerfuffle made national headlines. Liberals decried Pence’s opportunity to foist hate speech on impressionable students, while conservatives brayed about censorship and cancel culture, as if they, unlike the left, believed in a free exchange of ideas.</span></p></div><span data-dcnode-id="1324" instrument_node="">

</span></div></div><div class="widget__head" data-dcnode-id="1128"><a aria-label="Survey finds most Americans favor ranked-choice voting" class="rm-stats-tracked" data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/Elections/Voting/ranked-choice-voting-survey"><img alt="Rally for ranked-choice voting" aria-label="Rally for ranked-choice voting" class="rm-lazyloadable-image" data-dcnode-id="1131" data-runner-src="https://thefulcrum.us/media-library/rally-for-ranked-choice-voting.jpg?id=29702414&amp;width=1200&amp;quality=85&amp;coordinates=0%2C0%2C0%2C912&amp;height=600" height="600" role="img" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201200%20600'%3E%3C/svg%3E" style="object-fit: cover;" type="lazy-image" width="1200"></a><span data-dcnode-id="1129" instrument_node="">

</span></div><div class="photo-credit" data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">
        Suzanne Kreiter/The Boston Globe via Getty Images
    </span></div><div class="body js-expandable clearfix js-listicle-body js-update-url css-listicle-body-2657183954" data-authors="David Meyers" data-dcnode-id="1093" data-elid="2657183954" data-headline="Survey finds most Americans favor ranked-choice voting" data-post-url="https://thefulcrum.us/Elections/Voting/ranked-choice-voting-survey"><div class="body-description" data-dcnode-id="1095"><div class="widget__brief" data-dcnode-id="1110"><p data-dcnode-id="1118"><span data-dcnode-id="1120" instrument_node="">More than 60 percent of Americans favor using an alternative method of casting ballots known as ranked-choice voting for federal elections, according to polling data released Wednesday morning.</span><br data-dcnode-id="1119"></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">RCV, also known as an instant runoff election, has already been used statewide in Maine, for municipal elections in New York City and in more than 40 other jurisdictions. Alaska will use ranked-choice voting for the first-time this summer in a special election for a vacant seat in the U.S. House of Representatives.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">While there is a partisan divide over RCV, with 73 percent of Democrats and 55 percent of independents in favor of its use, virtually half (49 percent) of Republicans also support ranked elections, according to the poll, which was conducted by the University of Maryland's Program for Public Consultation and Voice of the People.</span></p><span data-dcnode-id="1111" instrument_node="">

</span></div></div><div class="widget__head" data-dcnode-id="1014"><a aria-label="New York will break your heart … open" class="rm-stats-tracked" data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/big-picture/Leveraging-big-ideas/social-interaction"><img alt="New York subway shooting" aria-label="New York subway shooting" class="rm-lazyloadable-image" data-dcnode-id="1017" data-runner-src="https://thefulcrum.us/media-library/new-york-subway-shooting.jpg?id=29717371&amp;width=1200&amp;quality=85&amp;coordinates=0%2C382%2C0%2C2&amp;height=600" height="600" role="img" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201200%20600'%3E%3C/svg%3E" style="object-fit: cover;" type="lazy-image" width="1200"></a><span data-dcnode-id="1015" instrument_node="">

         Alexi J. Rosenfeld/Getty Images
    </span></div><div class="body js-expandable clearfix js-listicle-body js-update-url css-listicle-body-2657177838" data-authors="Debilyn Molineaux" data-dcnode-id="976" data-elid="2657177838" data-headline="New York will break your heart … open" data-post-url="https://thefulcrum.us/big-picture/Leveraging-big-ideas/social-interaction"><div class="body-description" data-dcnode-id="978"><div class="widget__brief" data-dcnode-id="993"><p data-dcnode-id="1003"><em data-dcnode-id="1005" style="background-color: initial;"><span data-dcnode-id="1006" instrument_node="">Molineaux is co-publisher of The Fulcrum and president/CEO of the Bridge Alliance Education Fund.</span></em><br data-dcnode-id="1004"></p><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">While visiting New York City recently, I saw a man in a wheelchair attempting to cross the street near Penn Station. Between the bag he was holding, a missing foot and a quick signal light, he was challenged. I observed dozens of people flowing around him, presumably not seeing a human in need of assistance. In a neighborly way, I asked if he’d like a push? When he agreed, I handed him my roller luggage and said “If you push this, I’ll push you.” Within seconds, we were across the intersection and I was ready to move on with my day. But the gentleman needed more. </span></p><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">As he got settled on the sidewalk in a spot of sun, he noted that we were outside a diner and he asked me to get him some hot tea. Digging in his pocket, he pulled out a wad of cash and offered to buy me a drink, too. I declined because I just wanted to get on with my day and go to my hotel room. But I agreed to get him two cups of hot tea with lots of sugar. He gave me a $10 bill and I fulfilled his request. And I must admit to some impatience when he wanted me to pour the many sugar packets into his tea for him. Then I noticed his hands were misshapen. All through our interaction, he was speaking (more mumbling, really) and jumping from subject to subject so fast that I stopped trying to keep up. He needed human interaction.</span></p><p data-dcnode-id="998"></p><p data-dcnode-id="995" id="sufn" style="text-align: center;"><a class="rm-stats-tracked" data-dcnode-id="996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/st/newsletters" style="font-weight: bold;margin:40px auto;font-size:2rem"><span data-dcnode-id="997" instrument_node="">Sign up for The Fulcrum newsletter </span></a></p><p data-dcnode-id="994"></p></div><span data-dcnode-id="992" instrument_node="">

    </span></div><div class="body js-expandable clearfix js-listicle-body js-update-url css-listicle-body-2657178255" data-authors="Thomas O'Rourke" data-dcnode-id="855" data-elid="2657178255" data-headline="The indecent nature of social media" data-post-url="https://thefulcrum.us/big-picture/Media/why-is-social-media-bad"><div class="body-description" data-dcnode-id="857"><div class="widget__brief" data-dcnode-id="872"><p data-dcnode-id="891"><em data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">O’Rourke, a senior at Emory University studying economics and philosophy, is an intern at the Bridge Alliance, which operates The Fulcrum.</span></em><br data-dcnode-id="892"></p><p data-dcnode-id="880"><span data-dcnode-id="890" instrument_node="">Only about a decade ago, social media use among adults in the United States </span><a class="rm-stats-tracked" data-dcnode-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/fact-sheet/social-media/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="889" instrument_node="">became the norm</span></a><span data-dcnode-id="887" instrument_node=""> — garnering the attention of more than 50 percent of the population for the first time since the technology was introduced. Since then, the effects of social media cannot be overstated. Indeed, social media and digital technology use has become the dominant arena of social engagement, evidenced by a recent report finding that the average American spends </span><a class="rm-stats-tracked" data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/technology-59952557" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="886" instrument_node="">nearly five hours per day</span></a><span data-dcnode-id="884" instrument_node=""> on their phone, and over </span><a class="rm-stats-tracked" data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/petersuciu/2021/06/24/americans-spent-more-than-1300-hours-on-social-media/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="883" instrument_node="">three hours per day</span></a><span data-dcnode-id="881" instrument_node=""> on social media.</span></p><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">As digital technology and social media rose in prominence, a legitimate debate arose over whether they were a force for good or evil. Some argue that social media is an excellent tool for connecting people across previously insurmountable boundaries, empowering the voices of the marginalized and democratizing access to information. Yet others believe that the rise of digital technology increases tribalism among groups and promotes isolation among individuals. Though the resolution to this debate was unsettled for a long while, the jury has reached its verdict — and the outcome should not be a surprise. </span></p><p data-dcnode-id="877"></p><p data-dcnode-id="874" id="sufn" style="text-align: center;"><a class="rm-stats-tracked" data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/st/newsletters" style="font-weight: bold;margin:40px auto;font-size:2rem"><span data-dcnode-id="876" instrument_node="">Sign up for The Fulcrum newsletter </span></a></p><p data-dcnode-id="873"></p></div><span data-dcnode-id="871" instrument_node="">

</span><a class="social-author__name rm-stats-tracked" data-dcnode-id="791" data-type="text" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/u/barbararodriguez"><span data-dcnode-id="792" instrument_node="">Barbara Rodriguez, The 19th</span></a><span data-dcnode-id="790" instrument_node="">

</span></div></div><div class="widget__head" data-dcnode-id="776"><a aria-label="Florida redistricting continues. The head of the state League of Women Voters talks about what’s at stake." class="rm-stats-tracked" data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/Elections/Redistricting/florida-redistricting"><img alt="Florida voters" aria-label="Florida voters" class="rm-lazyloadable-image" data-dcnode-id="779" data-runner-src="https://thefulcrum.us/media-library/florida-voters.jpg?id=29697655&amp;width=1200&amp;quality=85&amp;coordinates=0%2C212%2C0%2C438&amp;height=600" height="600" role="img" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201200%20600'%3E%3C/svg%3E" style="object-fit: cover;" type="lazy-image" width="1200"></a><span data-dcnode-id="777" instrument_node="">

    </span></div><div class="body js-expandable clearfix js-listicle-body js-update-url css-listicle-body-2657177543" data-authors="Barbara Rodriguez, The 19th" data-dcnode-id="734" data-elid="2657177543" data-headline="Florida redistricting continues. The head of the state League of Women Voters talks about what’s at stake." data-post-url="https://thefulcrum.us/Elections/Redistricting/florida-redistricting"><div class="body-description" data-dcnode-id="736"><div class="widget__brief" data-dcnode-id="751"><p data-dcnode-id="761"><span data-dcnode-id="768" instrument_node="">
</span><em data-dcnode-id="763"><span data-dcnode-id="767" instrument_node="">Originally published by </span><a class="rm-stats-tracked" data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//19thnews.org/2022/04/florida-redistricting-2022-cecile-scoon-voting-rights/"><span data-dcnode-id="766" instrument_node="">The 19th</span></a><span data-dcnode-id="764" instrument_node="">.</span></em><span data-dcnode-id="762" instrument_node="">
</span></p><p data-dcnode-id="756"><span data-dcnode-id="760" instrument_node="">
	The League of Women Voters of Florida was among the voting rights groups that celebrated last month </span><a class="rm-stats-tracked" data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tampabay.com/news/florida-politics/2022/03/31/federal-judge-says-parts-of-2021-florida-voting-law-are-unconstitutional/"><span data-dcnode-id="759" instrument_node="">when a federal judge struck down</span></a><span data-dcnode-id="757" instrument_node=""> parts of the state’s 2021 voting law. The League, as one of the plaintiffs in the case, had argued those provisions — which included new restrictions on drop boxes and aiding people in line to vote — were unconstitutional, and a judge agreed.
</span></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">
	Now another battle looms: State lawmakers on Tuesday are kicking off a dayslong special session designed to approve a map that will set congressional district lines for the next decade. Cecile Scoon, president of the League of Women Voters of Florida since last summer, plans to be there at the state Capitol in Tallahassee.
</span></p><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">
	The League, along with other organizations, has already been reaching out to voters to alert them about the special session. Several organizations are expected to keep up pressure with public testimony at the state Capitol. They’re asking members to contact their elected officials and urge them to vote against the map.
</span></p></div><span data-dcnode-id="750" instrument_node="">
