</span><strong data-dcnode-id="1834"><span data-dcnode-id="1838" instrument_node="">Washington's Law Disenfranchising People with Felony Convictions Upheld in </span><em data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">en banc</span></em><span data-dcnode-id="1835" instrument_node=""> Reversal of 9th US Circuit Court Decision</span></strong><span data-dcnode-id="1833" instrument_node="">
</span></p><span data-dcnode-id="1831" instrument_node="">
On Oct. 7, 2010, the 9th Circuit Court of Appeals, in a full 11 judge bench hearing of </span><em data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Farrakhan v. Gregoire</span></em><span data-dcnode-id="1828" instrument_node="">, reversed the court’s 2-1 panel decision from Jan. 5, 2010, and ruled 11-0 that Washington’s law disenfranchising of people with felony convictions did not violate the Voting Rights Act. </span><br data-dcnode-id="1827"><span data-dcnode-id="1826" instrument_node="">
</span><br data-dcnode-id="1825"><span data-dcnode-id="1824" instrument_node="">
The court's majority opinion stated: "Because plaintiffs presented no evidence of intentional discrimination in the operation of Washington’s criminal justice system and argue no other theory under which a section 2 challenge might be sustained, we conclude that they didn’t meet their burden of showing a violation of the VRA. Accordingly, the district court didn’t err when it granted summary judgment against them."

</span><strong data-dcnode-id="1784"><span data-dcnode-id="1787" instrument_node="">US Supreme Court Declines Taking Up Massachusetts Voting Case </span><em data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Simmons v. Galvin</span></em></strong><span data-dcnode-id="1783" instrument_node="">
</span></p><span data-dcnode-id="1781" instrument_node="">
On Oct. 18, 2010 the US Supreme Court published its denial of a Writ of Certiorari filed Feb. 1, 2010 in the case of </span><em data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Simmons v. Galvin</span></em><span data-dcnode-id="1778" instrument_node=""> thus refusing to hear the case.
The petitioners had claimed that a Massachusetts law banning people with felony convictions from voting while incarcerated was racially discriminatory and in violation of the Voting Rights Act.

</span><strong data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">Iowa Rescinds Automatic Voting Restoration for People with Felony Convictions Who Have Completed Their Sentences</span></strong><span data-dcnode-id="1743" instrument_node="">
</span></p><span data-dcnode-id="1741" instrument_node="">
On Jan. 14, 2011, the Republican Governor of Iowa, Terry Branstad, issued executive order 70, rescinding a law allowing people convicted of a felony to automatically have their ability to vote restored after completing their sentences. The automatic voting restoration law had been instituted by former Democratic Governor Tom Vilsack's signing of executive order 42 in 2005. People with felony convictions in Iowa must now pay all outstanding monetary obligations to the court in addition to completing their sentence and period of parole or probation. People convicted of a felony may then apply for restoration of the ability to vote. </span><div class="sources" data-dcnode-id="1731"><span data-dcnode-id="1740" instrument_node="">

</span><strong data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Florida Rescinds Automatic Voting Restoration for People with Felony Convictions Who Have Completed Their Sentences</span></strong><span data-dcnode-id="1720" instrument_node="">
</span></p><span data-dcnode-id="1718" instrument_node="">
On Mar. 9, 2011 the Florida rules of Executive Clemency were toughened. Automatic restoration of civil rights and the ability to vote will no longer be granted for any offenses. All individuals convicted of any felony will now have to apply for executive clemency after a five year waiting period. Individuals who are convicted, or who have previously been convicted, of certain felonies such as murder, assault, child abuse, drug trafficking, arson, etc. are subject to a seven year waiting period and a clemency board hearing to determine whether or not the ability to vote will be restored.</span><br data-dcnode-id="1717"><span data-dcnode-id="1716" instrument_node="">
</span><br data-dcnode-id="1715"><span data-dcnode-id="1714" instrument_node="">
Prior to the Mar. 9, 2011 rule change some individuals convicted of nonviolent felonies were re-enfranchised automatically by the Clemency Board upon completion of their full sentence, including payment of fines and fees.
</span><br data-dcnode-id="1713"><br data-dcnode-id="1712"><span data-dcnode-id="1711" instrument_node="">

</span><strong data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">South Dakota Enacts HB 1247, Removing the Vote from People with Felony Convictions until Completion of Probation</span></strong><span data-dcnode-id="1686" instrument_node="">
</span></p><span data-dcnode-id="1684" instrument_node="">
On Mar. 19, 2012, HB 1247 was enacted. The bill took the ability to vote away from people with felony convictions serving terms of probation. Previously, only persons on parole or incarcerated were ineligible to register to vote. Now people with felony convictions must serve their full term of incarceration, parole, and probation before they may register to vote.
</span><br data-dcnode-id="1683"><br data-dcnode-id="1682"><span data-dcnode-id="1681" instrument_node="">

</span><strong data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Delaware Senate Passes the Hazel D. Plant Voter Restoration Act</span></strong><span data-dcnode-id="1656" instrument_node="">
</span></p><span data-dcnode-id="1654" instrument_node="">
On April 16, 2013 the Delaware Senate passed the Hazel D. Plant Voter Restoration Act in a 15-6 vote. The act amended the Delaware Constitution by removing the five year waiting period for most people with felony convictions to regain the ability to vote. Persons convicted of a felony (with some exceptions) are now automatically eligible to vote after serving their full sentence including incarceration, parole, and probation. </span><div class="sources" data-dcnode-id="1644"><span data-dcnode-id="1653" instrument_node="">

</span><strong data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">Virginia Institutes Automatic Vote Restoration to All People with Nonviolent Felony Convictions Who Have Completed Their Full Sentences</span></strong><span data-dcnode-id="1632" instrument_node="">
</span></p><span data-dcnode-id="1630" instrument_node="">
</span><div class="image-text align-left" data-dcnode-id="1619" style="max-width: 0px;"><span data-dcnode-id="1629" instrument_node="">
</span><img alt="" data-dcnode-id="1628" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.procon.org/wp-content/uploads/sites/48/virginia-governor-mc-donnell-announces-automatic-restoration.jpg&amp;raw" title="Virginia Institutes Automatic Vote Restoration to All Nonviolent Felons Who Have Completed Their Full Sentences"><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1626" instrument_node="">
Virginia Governor Robert F. McDonnell announces automatic restoration of the vote to nonviolent felons who have completed their sentences </span><br data-dcnode-id="1625"><em data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Source: "Photo Galleries," governor.virginia.gov (accessed June 28, 2013)</span></em><span data-dcnode-id="1622" instrument_node="">
</span></p><span data-dcnode-id="1620" instrument_node="">
</span></div><span data-dcnode-id="1618" instrument_node="">
On May 29, 2013, Governor Bob McDonnell announced that he will automatically restore the ability to vote to all people with nonviolent felony convictions who meet the following conditions:
</span><br data-dcnode-id="1617"><br data-dcnode-id="1616"><span data-dcnode-id="1615" instrument_node="">
1) have completed their term of incarceration and all probation or parole;</span><br data-dcnode-id="1614"><span data-dcnode-id="1613" instrument_node="">
2) have paid all court costs, fines, and any restitution; and</span><br data-dcnode-id="1612"><span data-dcnode-id="1611" instrument_node="">
3) have no pending felony charges.</span><br data-dcnode-id="1610"><br data-dcnode-id="1609"><span data-dcnode-id="1608" instrument_node="">
Previously, individuals convicted of most nonviolent felonies had to wait two years to apply for a gubernatorial restoration of voting ability after completion of their sentence and the payment of any fines and restitution.
</span><br data-dcnode-id="1607"><br data-dcnode-id="1606"><span data-dcnode-id="1605" instrument_node="">
Persons convicted of violent felonies, drug sales or manufacturing, crimes against minors, and election law offenses must wait five years to apply for a gubernatorial restoration of rights. </span><div class="sources" data-dcnode-id="1595"><span data-dcnode-id="1604" instrument_node="">
</span><p class="source" data-dcnode-id="1597"><span data-dcnode-id="1603" instrument_node="">
</span><a alt="Governor McDonnell’s Letter Outlining His Policy Changes" data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.procon.org/wp-content/uploads/sites/48/governor-mcdonnell-felon-voting-policy-changes.pdf" target="_blank" title="Governor McDonnell’s Letter Outlining His Policy Changes"><span data-dcnode-id="1602" instrument_node="">
Governor McDonnell’s Letter Outlining His Policy Changes </span><img data-dcnode-id="1601" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.procon.org/wp-content/uploads/sites/37/pdficon_small.gif&amp;raw" style="height:13px;width:13px"><span data-dcnode-id="1600" instrument_node=""> </span></a><span data-dcnode-id="1598" instrument_node="">
, governor.virginia.gov, May 29, 2013 </span></p><span data-dcnode-id="1596" instrument_node="">
</span></div><span data-dcnode-id="1594" instrument_node="">

</span><strong data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Attorney General Eric Holder Calls for Restoration of the Vote to People Convicted of a Felony</span></strong><span data-dcnode-id="1583" instrument_node="">
</span></p><span data-dcnode-id="1581" instrument_node="">
In a </span><a data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/ag-holder-speech-on-felon-disenfranchisement-2-11-14.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1580" instrument_node="">speech on criminal justice reform</span></a><span data-dcnode-id="1578" instrument_node=""> </span><img alt="" data-dcnode-id="1577" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" title="" width="13"><span data-dcnode-id="1576" instrument_node=""> at the Georgetown University Law Center on Feb. 11, 2014, Attorney General Eric Holder called for the restoration of the vote to people convicted of a felony. According to the </span><em data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">New York Times</span></em><span data-dcnode-id="1573" instrument_node="">, "The call was mostly symbolic — Mr. Holder has no authority to enact these changes himself — but it marked the attorney general’s latest effort to eliminate laws that he says disproportionately keep minorities from the polls."
</span><br data-dcnode-id="1572"><br data-dcnode-id="1571"><span data-dcnode-id="1570" instrument_node="">
In his speech, Attorney General Holder stated the following: "Across this country today, an estimated 5.8 million Americans – 5.8 million of our fellow citizens – are prohibited from voting because of current or previous felony convictions. That’s more than the individual populations of 31 U.S. states. And although well over a century has passed since post-Reconstruction states used these measures to strip African Americans of their most fundamental rights, the impact of felony disenfranchisement on modern communities of color remains both disproportionate and unacceptable...
</span><br data-dcnode-id="1569"><br data-dcnode-id="1568"><span data-dcnode-id="1567" instrument_node="">
It is unwise, it is unjust, and it is not in keeping with our democratic values. These laws deserve to be not only reconsidered, but repealed. And so today, I call upon state leaders and other elected officials across the country to pass clear and consistent reforms to restore the voting rights of all who have served their terms in prison or jail, completed their parole or probation, and paid their fines." </span><div class="sources" data-dcnode-id="1553"><span data-dcnode-id="1566" instrument_node="">
</span><p class="source" data-dcnode-id="1561"><span data-dcnode-id="1565" instrument_node="">
</span><a alt="Eric H. Holder, JD" data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/source-biographies/eric-h-holder/" target="_blank" title="Eric H. Holder, JD"><span data-dcnode-id="1564" instrument_node="">
Eric H. Holder, JD </span></a><span data-dcnode-id="1562" instrument_node="">
"Attorney General Eric Holder Delivers Remarks on Criminal Justice Reform at Georgetown University Law Center," www.justice.gov, Feb. 11, 2013 </span></p><span data-dcnode-id="1560" instrument_node="">
</span><p class="source" data-dcnode-id="1555"><span data-dcnode-id="1559" instrument_node="">
</span><a alt="New York Times" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/source-biographies/new-york-times/" target="_blank" title="New York Times"><span data-dcnode-id="1558" instrument_node="">
New York Times </span></a><span data-dcnode-id="1556" instrument_node="">
“Holder Urges States to Repeal Bans on Felons’ Voting,” nytimes.com, Feb. 11, 2014 </span></p><span data-dcnode-id="1554" instrument_node="">

</span><strong data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Voting Rights Restored to People with Nonviolent Felony Convictions in Kentucky</span></strong><span data-dcnode-id="1541" instrument_node="">
</span></p><span data-dcnode-id="1539" instrument_node="">
"[T]he governor of Kentucky [Steven L. Beshear] on Tuesday </span><a data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/kentucky-executive-order-felon-voting.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1538" instrument_node="">issued an executive order</span></a><span data-dcnode-id="1536" instrument_node=""> </span><img alt="" data-dcnode-id="1535" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" title="" width="13"><span data-dcnode-id="1534" instrument_node=""> that immediately granted the right to vote to about 140,000 nonviolent felons who have completed their sentences...</span><br data-dcnode-id="1533"><br data-dcnode-id="1532"><span data-dcnode-id="1531" instrument_node="">
Kentucky had been one of just three states imposing a lifetime voting ban on felons unless they received a special exemption from the governor. Florida and Iowa still carry the lifetime ban...</span><br data-dcnode-id="1530"><br data-dcnode-id="1529"><span data-dcnode-id="1528" instrument_node="">
As an executive order, the new policy can be altered or scrapped by a future governor. But the initial response from the governor-elect, Matt Bevin, a conservative Republican, was positive...</span><br data-dcnode-id="1527"><br data-dcnode-id="1526"><span data-dcnode-id="1525" instrument_node="">
[The executive] order excludes those with new pending charges and those convicted of violent crimes, sex crimes, bribery or treason." </span><div class="sources" data-dcnode-id="1517"><span data-dcnode-id="1524" instrument_node="">

New York Times </span></a><span data-dcnode-id="1520" instrument_node="">

</span><strong data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Maryland Senate Restores the Vote to People with Felony Convictions Immediately upon Release from Prison</span></strong><span data-dcnode-id="1480" instrument_node="">

</span><strong data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Virginia Governor Restores Voting Rights to All People with Felony Convictions</span></strong><span data-dcnode-id="1455" instrument_node="">
</span></p><span data-dcnode-id="1453" instrument_node="">
"Gov. Terry McAuliffe of Virginia used his executive power on Friday to restore voting rights to more than 200,000 convicted felons, circumventing the Republican-run legislature. The action overturns a Civil War-era provision in the state’s Constitution aimed, he said, at disenfranchising African-Americans.</span><br data-dcnode-id="1452"><br data-dcnode-id="1451"><span data-dcnode-id="1450" instrument_node="">
The sweeping order, in a swing state that could play a role in deciding the November presidential election, will enable all felons who have served their prison time and finished parole or probation to register to vote. Most are African-Americans, a core constituency of Democrats, Mr. McAuliffe’s political party." </span><div class="sources" data-dcnode-id="1442"><span data-dcnode-id="1449" instrument_node="">

</span><strong data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Virginia Supreme Court Rules Executive Order Restoring Voting Rights to 200,000 People Who Have Completed Felony Sentences Unconstitutional</span></strong><span data-dcnode-id="1430" instrument_node="">
</span></p><span data-dcnode-id="1428" instrument_node="">
"Virginia Gov. Terry McAuliffe's [Apr. 22, 2016] sweeping executive order restoring the voting rights of more than 200,000 felons is unconstitutional, the state's highest court ruled Friday [July 22, 2016], siding with Republican lawmakers who said the governor overstepped his authority.
</span><br data-dcnode-id="1427"><br data-dcnode-id="1426"><span data-dcnode-id="1425" instrument_node="">
In a 4-3 decision, the Supreme Court of Virginia ordered the state to cancel the registrations of the more than 11,000 felons who have signed up to vote so far under the governor's April executive order...
</span><br data-dcnode-id="1424"><br data-dcnode-id="1423"><span data-dcnode-id="1422" instrument_node="">
Republicans argued that [Virginia] governors cannot restore rights en masse but must consider each former offender's case individually."</span><br data-dcnode-id="1421"><br data-dcnode-id="1420"><span data-dcnode-id="1419" instrument_node="">
</span><p align="right" data-dcnode-id="1410"><span data-dcnode-id="1411" style="font-size: 0.85rem;color: #696969"><a data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/source-biographies/washington-times/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1418" instrument_node="">Washington Times</span></a><span data-dcnode-id="1416" instrument_node=""> </span><i class="fa fa-star pcstar" data-dcnode-id="1415"></i><span data-dcnode-id="1414" instrument_node=""> </span><i class="fa fa-star pcstar" data-dcnode-id="1413"></i><span data-dcnode-id="1412" instrument_node=""> "Virginia Court Nixes Order Restoring Felons’ Voting Rights," washingtontimes.com, July 22, 2016</span></span></p><br data-dcnode-id="1409"><br data-dcnode-id="1408"><span data-dcnode-id="1407" instrument_node="">
In a press release issued after the Supreme Court of Virginia ruling, the Governor stated that, because the court invalidated his blanket order to restore voting rights to all felons in the state, he "will expeditiously sign nearly 13,000 individual orders to restore the fundamental rights of the citizens who have had their rights restored and registered to vote. And I will continue to sign orders until I have completed restoration for all 200,000 Virginians."
</span><p align="right" data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">&nbsp;</span></p><br data-dcnode-id="1404"><br data-dcnode-id="1403"><span data-dcnode-id="1402" instrument_node="">

Governor Jerry Brown signed AB2466, which allows those serving low-level felony conviction sentences in county jails to vote. The bill also restores voting rights to people who have completed felony sentences on probation or under community supervision. The bill does not change the voting status of those serving felony convictions in state or federal prisons. </span><div class="sources" data-dcnode-id="1374"><span data-dcnode-id="1378" instrument_node="">

"Florida added 1.4 million possible voters to the rolls when it passed Amendment 4, which said most felons will automatically have their voting rights restored when they complete their sentences and probation...

</span><strong class="date" data-dcnode-id="1196"><span data-dcnode-id="1198" instrument_node="">Jan. 16, 2020</span><a data-dcnode-id="1197" name="florida-jan-2020"></a></strong><span data-dcnode-id="1195" instrument_node="">
-
</span><strong data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Florida Supreme Court Rules People Who Have Completed Felony Sentences Will Have to Pay Fines and Fees before Voting</span></strong><span data-dcnode-id="1192" instrument_node="">
</span></p><span data-dcnode-id="1190" instrument_node="">
"Florida’s Supreme Court ruled Thursday [Jan. 16, 2020]&nbsp;that convicted felons must pay fines and other fees related to their sentences before voting, concluding a legal controversy that pitted the state government against civil voting rights advocacy groups.
The court decided in its ruling that 'all terms of sentence' includes not only terms of a person’s imprisonment and supervision, but also fines and other obligations imposed as part of a punishment..
The amendment to the Florida constitution that allows 1.4 million convicted felons to vote following their release from incarceration was lauded by civil rights advocates after its passage in November, with the advocates noting that people of color had been disproportionately impacted by the ban.
However, Gov. Ron DeSantis (R) signed a bill in June [2019]&nbsp;mandating that the former convicts pay off restitution, court fees and fines before regaining the right to vote, sparking criticism from opponents who said the law amounted to a poll tax.
Several groups, including the Florida State Conference of the NAACP, the Orange County Branch of the NAACP, and the League of Women Voters of Florida, sued the state government following the bill’s signing."
</span><p align="right" data-dcnode-id="1187"><span data-dcnode-id="1188" style="font-size: 0.85rem;color: #696969"><span data-dcnode-id="1189" instrument_node="">
Tal Axelrod, “Florida Supreme Court Rules Convicted Felons Must Pay Fines, Fees before Voting,” thehill.com, Jan. 16, 2020
</span></span></p><span data-dcnode-id="1186" instrument_node=""> </span><div class="sources" data-dcnode-id="1181"><span data-dcnode-id="1185" instrument_node="">
</span><p class="source" data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">
</span></p><span data-dcnode-id="1182" instrument_node="">
</span></div><span data-dcnode-id="1180" instrument_node="">
</span><p class="editors-note" data-dcnode-id="1179"></p><p data-dcnode-id="1173"><span data-dcnode-id="1178" instrument_node="">[</span><strong data-dcnode-id="1175"><span data-dcnode-id="1176" style="color: #ff0000"><span data-dcnode-id="1177" instrument_node="">Editor’s Note</span></span></strong><span data-dcnode-id="1174" instrument_node="">: A federal appeals court ruled on Feb. 19, 2020 that a Florida law requiring former felons to pay off restitution, court fees, and fines before voting again violates the Equal Protection Clause of the Constitution. Governor DeSantis has appealed the decision.]</span></p><span data-dcnode-id="1172" instrument_node="">
</span><p align="right" data-dcnode-id="1169"><span data-dcnode-id="1170" style="font-size: 0.85rem;color: #696969"><span data-dcnode-id="1171" instrument_node="">Tal Axelrod, “Court Sides with Ex-Felons Who Challenged Florida Voting Requirement,” thehill.com, Feb. 19, 2020</span></span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1167"></p><span data-dcnode-id="1166" instrument_node="">
</span></div><span data-dcnode-id="1164" instrument_node="">

</span><p class="title" data-dcnode-id="1154"><span data-dcnode-id="1162" instrument_node="">
</span><strong class="date" data-dcnode-id="1159"><span data-dcnode-id="1161" instrument_node="">May 24, 2020 </span><a data-dcnode-id="1160" name="florida-may-2020"></a></strong><span data-dcnode-id="1158" instrument_node="">
-
</span><strong data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">People Who Have Completed Felony Sentences in Florida Cannot Be Barred from Voting for Owing Court Fees, Rules Federal Judge</span></strong><span data-dcnode-id="1155" instrument_node="">
</span></p><span data-dcnode-id="1153" instrument_node="">
US District Judge Robert Hinkle ruled on Sunday, May 24, 2020 that parts of the Florida law requiring people who have completed felony sentences to pay court fees, fines, and restitution to victims before they can vote is unconstitutional.
</span><br data-dcnode-id="1152"><br data-dcnode-id="1151"><span data-dcnode-id="1150" instrument_node="">
Hinkle ruled that the following people who have completed felony sentences should have their right to vote restored: those who were appointed a public defender, those whose fines, fees, and restitution were converted to civil liens (in which property such as a house is put up as collateral for payment), and those who only owe court fees.
</span><br data-dcnode-id="1149"><br data-dcnode-id="1148"><span data-dcnode-id="1147" instrument_node="">
The ruling stated, "This order holds that the State can condition voting on payment of fines and restitution that a person is able to pay but cannot condition voting on payment of amounts a person is unable to pay.” </span><div class="sources" data-dcnode-id="1136"><span data-dcnode-id="1146" instrument_node="">
</span><p class="source" data-dcnode-id="1141"><span data-dcnode-id="1145" instrument_node="">
</span><em data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Kelvin Leon Jones, et al., v. Ron DeSantis et al.</span></em><span data-dcnode-id="1142" instrument_node="">, politico.com, May 24, 2020 </span></p><span data-dcnode-id="1140" instrument_node="">
</span><p class="source" data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">
Lawrence Mower, "‘A Game Changer’: Five Takeaways from Sunday’s Ruling on Felon Voting,” tampabay.com, May 25, 2020 </span></p><span data-dcnode-id="1137" instrument_node="">
</span></div><span data-dcnode-id="1135" instrument_node="">
</span><p class="editors-note" data-dcnode-id="1134"></p><p data-dcnode-id="1128"><span data-dcnode-id="1133" instrument_node="">[</span><span data-dcnode-id="1130" style="color: #ff0000"><strong data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Editor’s Note:</span></strong></span><span data-dcnode-id="1129" instrument_node=""> The US Supreme Court ruled on July 16, 2020, that the law requiring payment of fines prior to restoration of voting rights can be enforced by the state of Florida. The case remains in federal appeals court, but, until the resolution of that case, people who have completed felony sentences in Florida may be required to pay any and all outstanding court fines and fees before being allowed to register to vote.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><h6 data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Source: Dan Berman, “Supreme Court Says Florida Can Enforce Law Limiting Felons Who Owe Fines from Voting,” cnn.com, July 16, 2020]</span></h6><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1123"></p><span data-dcnode-id="1122" instrument_node="">

</span><strong class="date" data-dcnode-id="1115"><span data-dcnode-id="1117" instrument_node="">Aug. 5, 2020 </span><a data-dcnode-id="1116" name="iowa-2020"></a></strong><span data-dcnode-id="1114" instrument_node="">
-
</span><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Iowa Governor Kim Reynolds Signs Executive Order Restoring Vote to Some People Who Have Completed Felony Sentences</span></strong><span data-dcnode-id="1111" instrument_node="">
</span></p><span data-dcnode-id="1109" instrument_node="">
Iowa Governor Kim Reynolds signed an executive order automatically restoring the vote to some people who have completed felony sentences. People convicted of felony homicide will still have to apply for reenfranchisement.
</span><br data-dcnode-id="1108"><br data-dcnode-id="1107"><span data-dcnode-id="1106" instrument_node="">
Iowa was the last remaining state to have a complete ban on voting for people who have completed felony sentences. The state constitution still disenfranchises all people who have completed felony sentences so the next governor could easily overturn Reynolds' executive order. </span><div class="sources" data-dcnode-id="1101"><span data-dcnode-id="1105" instrument_node="">
</span><p class="source" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">
Veronica Stracqualursi, “Iowa Governor Signs Executive Order Restoring Some Ex-Felons’ Voting Rights,” cnn.com, Aug. 5, 2020 </span></p><span data-dcnode-id="1102" instrument_node="">
</span></div><span data-dcnode-id="1100" instrument_node="">

</span><strong class="date" data-dcnode-id="1093"><span data-dcnode-id="1095" instrument_node="">Sep. 11, 2020 </span><a data-dcnode-id="1094" name="florida-sep-2020"></a></strong><span data-dcnode-id="1092" instrument_node="">

</span><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Appeals Court Upholds Florida Law Requiring Fine and Fee Payment</span></strong><span data-dcnode-id="1089" instrument_node="">
</span></p><span data-dcnode-id="1087" instrument_node="">
The 11th Circuit Court of Appeals ruled 6-4 that Florida can require repayment of fines and fees before people who have completed felony sentences are eligible to vote. The court stated, "Florida withholds the franchise from any felon, regardless of wealth, who has failed to complete any term of his criminal sentence—financial or otherwise." This ruling overturns the May 24, 2020 ruling that struck down the repayment requirement. </span><div class="sources" data-dcnode-id="1082"><span data-dcnode-id="1086" instrument_node="">
</span><p class="source" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">
J. Edward Moreno, “Court Upholds Florida Law Requiring Felons to Pay Fines, Fees before They Can Vote,” thehill.com, Sep. 11, 2020 </span></p><span data-dcnode-id="1083" instrument_node="">
</span></div><span data-dcnode-id="1081" instrument_node="">

</span><strong class="date" data-dcnode-id="1074"><span data-dcnode-id="1076" instrument_node="">Sep. 22, 2020 </span><a data-dcnode-id="1075" name="snoop-and-tyson"></a></strong><span data-dcnode-id="1073" instrument_node="">
-
</span><strong data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Snoop Dogg and Mike Tyson to Vote for First Time in Nov. 2020 Election</span></strong><span data-dcnode-id="1070" instrument_node="">
</span></p><span data-dcnode-id="1068" instrument_node="">
Rapper and TV star Snoop Dogg and former heavyweight boxing champion Mike Tyson both said they would vote for the first time in the Nov. 2020 election. Both stars were convicted of felonies, Snoop Dogg in 1990 and 2007 and Tyson in 1992.</span><br data-dcnode-id="1067"><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">
Snoop Dogg explained that he was lead to believe he couldn't vote even after his record was expunged. He stated about voting, "We got to make a difference, I can't talk about it and not be about it. I can't tell you to do it and then not go do it... If I tell you to do something, I done it already."</span><br data-dcnode-id="1064"><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">
Mike Tyson was ineligible to vote until this year due to Nevada law. Nevada restored voting rights to former felons in 2019. Tyson tweeted on Sep. 22, 2020, "This election will be my 1st time voting. I never thought I could because of my felony record. I’m proud to finally vote." </span><div class="sources" data-dcnode-id="1051"><span data-dcnode-id="1061" instrument_node="">
</span><p class="source" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">
Kelsie Smith, "Why This Year Will Be the First Time Mike Tyson Will Vote," cnn.com, Sep. 22, 2020 </span></p><span data-dcnode-id="1058" instrument_node="">
</span><p class="source" data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">
Jasmine Ting, "Snoop Dogg Is Voting for the Very First Time Ever," papermag.com, June 7, 2020 </span></p><span data-dcnode-id="1055" instrument_node="">
</span><p class="source" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">
Mike Tyson, Twitter.com, Sep. 22, 2020 </span></p><span data-dcnode-id="1052" instrument_node="">
