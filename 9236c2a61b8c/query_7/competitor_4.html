</span><h3 data-dcnode-id="3696"><a data-dcnode-id="3697" name="1100-bc-1799"><span data-dcnode-id="3698" instrument_node="">1100 BC-1799</span></a></h3><span data-dcnode-id="3695" instrument_node="">
</span><div class="event" data-dcnode-id="3643"><span data-dcnode-id="3694" instrument_node="">
</span><p class="title" data-dcnode-id="3685"><span data-dcnode-id="3693" instrument_node="">
</span><strong class="date" data-dcnode-id="3690"><a data-dcnode-id="3692" name="medieval_germany"></a><span data-dcnode-id="3691" instrument_node="">1100 BC - 16th Century</span></strong><span data-dcnode-id="3689" instrument_node="">
-
</span><strong data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">"Civil Death" Used as Punishment for Crime in Ancient Athens, Ancient Rome, and Medieval Europe</span></strong><span data-dcnode-id="3686" instrument_node="">
</span></p><span data-dcnode-id="3684" instrument_node="">
"In Athens and other Greek city-states [approximately 1100 BC - 400 BC], the status of atimia [literally without honor, a form of disenfranchisement] was imposed upon criminal offenders. This status carried the loss of many citizenship rights, including the right to participate in the polis (polity). Of course, only elites had those rights to begin with, so disenfranchisement [losing the ability to vote] was a penalty imposed on deviant elites.</span><br data-dcnode-id="3683"><br data-dcnode-id="3682"><span data-dcnode-id="3681" instrument_node="">
In ancient Rome, the related punishment of infamia [loss of public rights] could be imposed on criminal offenders. In this case, the principle penalties were loss of suffrage and the right to serve in the Roman legions (a desired opportunity)...</span><br data-dcnode-id="3680"><br data-dcnode-id="3679"><span data-dcnode-id="3678" instrument_node="">
In medieval [a historical period ending in the 16th Century] Europe, the legal doctrines of 'civil death' and 'outlawry' carried forward similar notions. As with atimia, those punished with civil death generally suffered a complete loss of citizenship rights (in some early Germanic texts, outlaw status meant a 'loss of peace' that was comparable to becoming a wolf, since the outlaw had to 'live in the forest'). In extreme cases, civil death could be injurious or fatal, since outlaws could be killed by anyone with impunity, or have their property seized. In most medieval contexts, political rights held little substantive meaning. But the civil death model carried over into parts of modern criminal law."</span><br data-dcnode-id="3677"><br data-dcnode-id="3676"><span data-dcnode-id="3675" instrument_node="">
</span><p align="right" data-dcnode-id="3651"><span data-dcnode-id="3652" style="font-size: 0.85rem;color: #696969"><span data-dcnode-id="3674" instrument_node="">
</span><a data-dcnode-id="3672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/source-biographies/jeff-manza/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3673" instrument_node="">Jeff Manza, PhD</span></a><span data-dcnode-id="3671" instrument_node=""> </span><i class="fa fa-star pcstar" data-dcnode-id="3670"></i><span data-dcnode-id="3669" instrument_node=""> </span><i class="fa fa-star pcstar" data-dcnode-id="3668"></i><span data-dcnode-id="3667" instrument_node=""> </span><i class="fa fa-star pcstar" data-dcnode-id="3666"></i><span data-dcnode-id="3665" instrument_node=""> and </span><a data-dcnode-id="3663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/source-biographies/christopher-uggen/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="3664" instrument_node="">Christopher Uggen, PhD</span></a><span data-dcnode-id="3662" instrument_node=""> </span><i class="fa fa-star pcstar" data-dcnode-id="3661"></i><span data-dcnode-id="3660" instrument_node=""> </span><i class="fa fa-star pcstar" data-dcnode-id="3659"></i><span data-dcnode-id="3658" instrument_node=""> </span><i class="fa fa-star pcstar" data-dcnode-id="3657"></i><span data-dcnode-id="3656" instrument_node=""> </span><em data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">Locked Out: Felon Disenfranchisement and American Democracy</span></em><span data-dcnode-id="3653" instrument_node="">, 2006
</span></span></p><span data-dcnode-id="3650" instrument_node=""> </span><div class="sources" data-dcnode-id="3645"><span data-dcnode-id="3649" instrument_node="">
</span><p class="source" data-dcnode-id="3647"><span data-dcnode-id="3648" instrument_node="">
</span></p><span data-dcnode-id="3646" instrument_node="">
</span></div><span data-dcnode-id="3644" instrument_node="">
</span></div><span data-dcnode-id="3642" instrument_node="">

</span><p class="title" data-dcnode-id="3632"><span data-dcnode-id="3640" instrument_node="">
</span><strong class="date" data-dcnode-id="3637"><span data-dcnode-id="3639" instrument_node="">1607 - 1776</span><a data-dcnode-id="3638" name="british-colonies-america"></a></strong><span data-dcnode-id="3636" instrument_node="">
-
</span><strong data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">Practice of "Civil Death" Is Carried over to the British Colonies in America</span></strong><span data-dcnode-id="3633" instrument_node="">
</span></p><span data-dcnode-id="3631" instrument_node="">
"Criminal disenfranchisement has its roots in the punishment of 'civil death,' imposed for criminal offences under Greek, Roman, Germanic and later Anglo-Saxon law. English law developed the related punishment of attainder which resulted in forfeiture of all property, inability to inherit or devise property, and loss of all civil rights. These principles were transplanted to the British colonies [the first British settlement was established at Jamestown, Virginia in 1607] which later became Canada and the United States [in 1776]." </span><div class="sources" data-dcnode-id="3620"><span data-dcnode-id="3630" instrument_node="">
</span><p class="source" data-dcnode-id="3622"><span data-dcnode-id="3629" instrument_node="">
</span><a alt="Debora Parkes, LLM" data-dcnode-id="3627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/source-biographies/debora-parkes/" target="_blank" title="Debora Parkes, LLM"><span data-dcnode-id="3628" instrument_node="">
Debora Parkes, LLM </span></a><span data-dcnode-id="3626" instrument_node="">
"Ballot Boxes Behind Bars: Toward the Repeal of Prisoner Disenfranchisement Laws," </span><em data-dcnode-id="3624"><span data-dcnode-id="3625" instrument_node="">Temple Political and Civil Rights Law Review</span></em><span data-dcnode-id="3623" instrument_node="">, Fall 2003 </span></p><span data-dcnode-id="3621" instrument_node="">
</span></div><span data-dcnode-id="3619" instrument_node="">
</span></div><span data-dcnode-id="3617" instrument_node="">

</span><p class="title" data-dcnode-id="3608"><span data-dcnode-id="3615" instrument_node="">
</span><strong class="date" data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">1789</span></strong><span data-dcnode-id="3612" instrument_node="">
-
</span><strong data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">US Constitution Forges a Link Between Voting in National Elections and State Suffrage Rules</span></strong><span data-dcnode-id="3609" instrument_node="">
</span></p><span data-dcnode-id="3607" instrument_node="">
</span><div class="image-text align-left" data-dcnode-id="3596" style="max-width: 0px;"><span data-dcnode-id="3606" instrument_node="">
</span><img alt="" data-dcnode-id="3605" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.procon.org/wp-content/uploads/sites/48/the_signing_of_the_constitution_of_the_united_states.jpg&amp;raw" title="1789 - US Constitution Forges a Link Between Voting in National Elections and State Suffrage Rules"><span data-dcnode-id="3604" instrument_node="">
</span><p data-dcnode-id="3598"><span data-dcnode-id="3603" instrument_node="">
Artist's rendition of the signing of the United States Constitution in 1789 </span><br data-dcnode-id="3602"><em data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">Source: "Scene at the Signing of the Constitution of the United States," commons.wikimedia.org (accessed June 28, 2013)</span></em><span data-dcnode-id="3599" instrument_node="">
</span></p><span data-dcnode-id="3597" instrument_node="">
</span></div><span data-dcnode-id="3595" instrument_node="">
"Under the Articles of Confederation [ratified in 1777], the states had retained complete control over the [voting] franchise. But the Constitution of the United States forged a link between state suffrage rules and the right to vote in national elections: those who participated in elections for the 'most numerous Branch of the state legislature'... there was no formal debate about the possibility of a national standard more inclusive than the laws already prevailing in the states. Indeed, the records of the federal convention and state constitutional conventions suggest that most members of the new nation's political leadership did not favor a more democratic franchise... </span><br data-dcnode-id="3594"><span data-dcnode-id="3593" instrument_node="">
</span><br data-dcnode-id="3592"><span data-dcnode-id="3591" instrument_node="">
By making the franchise in national elections dependent on state suffrage laws, the authors of the Constitution compromised their substantive disagreements to solve a potentially explosive political problem... citizenship in the new nation - controlled by the federal government - was divorced from the right to vote." </span><div class="sources" data-dcnode-id="3580"><span data-dcnode-id="3590" instrument_node="">
</span><p class="source" data-dcnode-id="3582"><span data-dcnode-id="3589" instrument_node="">
</span><a alt="Alexander Keyssar, PhD" data-dcnode-id="3587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/source-biographies/alexander-keyssar/" target="_blank" title="Alexander Keyssar, PhD"><span data-dcnode-id="3588" instrument_node="">
Alexander Keyssar, PhD </span></a><span data-dcnode-id="3586" instrument_node="">
</span><em data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node=""> The Right to Vote</span></em><span data-dcnode-id="3583" instrument_node="">, 2000 </span></p><span data-dcnode-id="3581" instrument_node="">
</span></div><span data-dcnode-id="3579" instrument_node="">

</span><strong data-dcnode-id="3569"><a data-dcnode-id="3571" name="kentucky_1792"></a><span data-dcnode-id="3570" instrument_node="">Kentucky Constitution Is First among US States to Establish Criminal Disenfranchisement</span></strong><span data-dcnode-id="3568" instrument_node="">
</span></p><span data-dcnode-id="3566" instrument_node="">
Kentucky's state constitution is ratified. It states "Laws shall be made to exclude from... suffrage those who thereafter be convicted of bribery, perjury, forgery, or other high crimes and misdemeanors." </span><div class="sources" data-dcnode-id="3556"><span data-dcnode-id="3565" instrument_node="">

</span><a alt="1792 Kentucky Constitution" data-dcnode-id="3560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.procon.org/wp-content/uploads/sites/48/1792_ky_constitution.pdf" target="_blank" title="1792 Kentucky Constitution"><span data-dcnode-id="3563" instrument_node="">

1793 Vermont Constitution </span><img data-dcnode-id="3539" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.procon.org/wp-content/uploads/sites/37/pdficon_small.gif&amp;raw" style="height:13px;width:13px"><span data-dcnode-id="3538" instrument_node=""> </span></a><span data-dcnode-id="3536" instrument_node="">

</span><p data-dcnode-id="2966"><span data-dcnode-id="2971" instrument_node="">
1867 wood engraving print image of African American men voting by A.R. Waud </span><br data-dcnode-id="2970"><em data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">Source: Library of Congress, "The Right to Vote," www.loc.gov (accessed June 28, 2013)</span></em><span data-dcnode-id="2967" instrument_node="">

The US Constitution's 15th Amendment is ratified on Feb. 3, 1870. It stipulates:
"Section 1. The right of citizens of the United States to vote shall not be denied or abridged by the United States or by any State on account of race, color, or previous condition of servitude.
Section 2. The Congress shall have the power to enforce this article by appropriate legislation."

</span><strong data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">New Alabama Constitution Expands Criminal Disenfranchisement in Effort to Maintain White Supremacy</span></strong><span data-dcnode-id="2899" instrument_node="">
</span></p><span data-dcnode-id="2897" instrument_node="">
"Between 1890 and 1910 many states adopted new laws or reconfigured preexisting laws to handicap newly enfranchised black citizens whose rights had been expanded by both the Fourteenth and Fifteenth Amendments...</span><br data-dcnode-id="2896"><span data-dcnode-id="2895" instrument_node="">
</span><br data-dcnode-id="2894"><span data-dcnode-id="2893" instrument_node="">

</span><br data-dcnode-id="2890"><span data-dcnode-id="2889" instrument_node="">
The 1901 Constitution stated the following: "The following persons shall be disqualified both from registering, and from voting, namely:</span><br data-dcnode-id="2888"><span data-dcnode-id="2887" instrument_node="">
</span><br data-dcnode-id="2886"><span data-dcnode-id="2885" instrument_node="">
All idiots and insane persons; those who shall by reason of conviction of crime be disqualified from voting at the time of the ratification of this Constitution; those who shall be convicted of treason, murder, arson, embezzlement, malfeasance in office, larceny, receiving stolen property, obtaining property or money under false pretenses, perjury, subornation of perjury, robbery, assault with intent to rob, burglary, forgery, bribery, assault and battery on the wife, bigamy, living in adultery, sodomy, incest, rape, miscegenation, crime against nature, or any crime punishable by imprisonment in the penitentiary, or of any infamous crime or crime involving moral turpitude; also, any person who shall be convicted as a vagrant or tramp, or of selling or offering to sell his vote or the vote of another, or of buying or offering to buy the vote of another, or of making or offering to make a false return in any election by the people or in any primary election to procure the nomination or election of any person to any office, or of suborning any witness or registrar to secure the registration of any person as an elector."
</span><br data-dcnode-id="2884"><br data-dcnode-id="2883"><span data-dcnode-id="2882" instrument_node="">
</span><p align="right" data-dcnode-id="2874"><span data-dcnode-id="2875" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="2881" instrument_node="">

</span><strong data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">President Eisenhower Signs the Civil Rights Act of 1957</span></strong><span data-dcnode-id="2843" instrument_node="">
</span></p><span data-dcnode-id="2841" instrument_node="">
"Congress passes the Civil Rights Act of 1957, giving the U.S. Attorney General the authority to bring lawsuits on behalf of African Americans denied the right to vote.
The Civil Rights Act of 1957 is the first such measure to pass Congress since adoption of the federal civil rights laws of 1875. Among other things, the Act authorizes the U.S. Attorney General to sue to correct discrimination and intimidation of potential voters."
</span><br data-dcnode-id="2840"><br data-dcnode-id="2839"><span data-dcnode-id="2838" instrument_node="">
</span><p align="right" data-dcnode-id="2830"><span data-dcnode-id="2831" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="2837" instrument_node="">

</span><strong data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">President Johnson Signs the Voting Rights Act</span></strong><span data-dcnode-id="2809" instrument_node="">
</span></p><span data-dcnode-id="2807" instrument_node="">
</span><div class="image-text align-left" data-dcnode-id="2796" style="max-width: 0px;"><span data-dcnode-id="2806" instrument_node="">
</span><img alt="" data-dcnode-id="2805" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.procon.org/wp-content/uploads/sites/48/lyndon-johnson-signs-the-voting-rights-act.jpg&amp;raw" title="Aug. 6, 1965<a name=&quot;VRA&quot;></a> - President Johnson Signs the Voting Rights Act"><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2798"><span data-dcnode-id="2803" instrument_node="">
President Lyndon Johnson signing the Voting Rights Act </span><br data-dcnode-id="2802"><em data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">Source: National Archives, "Photograph of President Lyndon Johnson Signing the Voting Rights Act," archives.gov, Aug. 6, 1965</span></em><span data-dcnode-id="2799" instrument_node="">
</span></p><span data-dcnode-id="2797" instrument_node="">
</span></div><span data-dcnode-id="2795" instrument_node="">
"President Johnson signed the [Voting Rights Act] into law on August 6, 1965. Section 2 of the Act, which closely followed the language of the 15th amendment, applied a nationwide prohibition against the denial or abridgment of the right to vote on the literacy tests on a nationwide basis.
Among its other provisions, the Act contained special enforcement provisions targeted at those areas of the country where Congress believed the potential for discrimination to be the greatest. Under Section 5, jurisdictions covered by these special provisions could not implement any change affecting voting until the Attorney General or the United States District Court for the District of Columbia determined that the change did not have a discriminatory purpose and would not have a discriminatory effect. In addition, the Attorney General could designate a county covered by these special provisions for the appointment of a federal examiner to review the qualifications of persons who wanted to register to vote. Further, in those counties where a federal examiner was serving, the Attorney General could request that federal observers monitor activities within the county's polling place."
</span><br data-dcnode-id="2794"><br data-dcnode-id="2793"><span data-dcnode-id="2792" instrument_node="">
</span><p align="right" data-dcnode-id="2784"><span data-dcnode-id="2785" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="2791" instrument_node="">
</span><a data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/voting-rights-act-of-1965.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2790" instrument_node="">Voting Rights Act of 1965</span></a><span data-dcnode-id="2788" instrument_node=""> </span><img alt="" border="0" data-dcnode-id="2787" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" width="13"><span data-dcnode-id="2786" instrument_node="">, Aug. 6, 1965
</span></span></p><span data-dcnode-id="2783" instrument_node="">

</span><a alt="US Department of Justice" data-dcnode-id="2779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/source-biographies/u-s-department-of-justice/" target="_blank" title="US Department of Justice"><span data-dcnode-id="2780" instrument_node="">
US Department of Justice </span></a><span data-dcnode-id="2778" instrument_node="">
"The Voting Rights Act of 1965," www.usdoj.gov (accessed July 15, 2009) </span></p><span data-dcnode-id="2776" instrument_node="">
</span></div><span data-dcnode-id="2774" instrument_node="">
</span><p class="editors-note" data-dcnode-id="2773"></p><p data-dcnode-id="2761"><span data-dcnode-id="2772" instrument_node="">[</span><strong data-dcnode-id="2769"><span data-dcnode-id="2770" style="color: #ff0000"><span data-dcnode-id="2771" instrument_node="">Editor’s Note</span></span></strong><span data-dcnode-id="2768" instrument_node="">: The Voting Rights Act was renewed in 1970 for five years, 1975 for seven years, 1982 for 25 years, and in 2006 for an additional 25 years. On June 25, 2013, in the case </span><em data-dcnode-id="2765"><a data-dcnode-id="2766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/shelby-v-holder.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2767" instrument_node="">Shelby v. Holder</span></a></em><span data-dcnode-id="2764" instrument_node=""> </span><img alt="" border="0" data-dcnode-id="2763" height="13" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" width="13"><span data-dcnode-id="2762" instrument_node="">, the United States Supreme Court struck down section 4 of the Voting Rights Act in a 5-4 decision.]</span></p><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2759"></p><span data-dcnode-id="2758" instrument_node="">

</span><p class="title" data-dcnode-id="2747"><span data-dcnode-id="2754" instrument_node="">
</span><strong class="date" data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">Mar. 24, 1966</span></strong><span data-dcnode-id="2751" instrument_node="">
-
</span><strong data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">US Supreme Court Rules States Cannot Require Payment of Fees as a Condition to Vote</span></strong><span data-dcnode-id="2748" instrument_node="">
</span></p><span data-dcnode-id="2746" instrument_node="">
In Harper v. Virginia Board Of Elections, Harper and co-defendants filed suit against the state of Virginia, alleging it was a violation of the U.S. Constitution for the state to require payment of state-imposed voting taxes (aka “poll tax,” designated to pay for “services”) prior to voting.</span><br data-dcnode-id="2745"><br data-dcnode-id="2744"><span data-dcnode-id="2743" instrument_node="">
The District court dismissed the case. The U.S. Supreme Court reversed in favor of Harper et al., noting that voter qualifications have nothing to do with wealth or paying taxes or fees.
</span><br data-dcnode-id="2742"><br data-dcnode-id="2741"><span data-dcnode-id="2740" instrument_node="">
The U.S. Supreme Court’s ruling that “the Equal Protection Clause of the Fourteenth Amendment restrains the States from fixing voter qualifications which invidiously discriminate” has been cited as meaning that if a felon disenfranchisement law “invidiously discriminates,” it should be ruled unconstitutional.</span><br data-dcnode-id="2739"><br data-dcnode-id="2738"><span data-dcnode-id="2737" instrument_node="">
The court ruled:
</span><br data-dcnode-id="2736"><br data-dcnode-id="2735"><span data-dcnode-id="2734" instrument_node="">
“Held: A State’s conditioning of the right to vote on the payment of a fee or tax violates the Equal Protection Clause of the Fourteenth Amendment…
While the right to vote in federal elections is conferred by Art. 1, 2, of the Constitution, the right to vote in state elections is nowhere expressly mentioned… For it is enough to say that once the franchise is granted to the electorate, lines may not be drawn which are inconsistent with the Equal Protection Clause of the Fourteenth Amendment…
</span><br data-dcnode-id="2733"><br data-dcnode-id="2732"><span data-dcnode-id="2731" instrument_node="">
We conclude that a State violates the Equal Protection Clause of the Fourteenth Amendment whenever it makes the affluence of the voter or payment of any fee an electoral standard.
</span><br data-dcnode-id="2730"><br data-dcnode-id="2729"><span data-dcnode-id="2728" instrument_node="">
Voter qualifications have no relation to wealth nor to paying or not paying this or any other tax. Our cases demonstrate that the Equal Protection Clause of the Fourteenth Amendment restrains the States from fixing voter qualifications which invidiously discriminate … [W]e must remember that the interest of the State, when it comes to voting, is limited to the power to fix qualifications.”
</span><br data-dcnode-id="2727"><br data-dcnode-id="2726"><span data-dcnode-id="2725" instrument_node=""> </span><div class="sources" data-dcnode-id="2717"><span data-dcnode-id="2724" instrument_node="">
</span><p class="source" data-dcnode-id="2719"><span data-dcnode-id="2723" instrument_node="">
</span><a data-dcnode-id="2721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.procon.org/wp-content/uploads/sites/48/harper.pdf"><span data-dcnode-id="2722" instrument_node="">Harper v. Virginia Board Of Elections</span></a><span data-dcnode-id="2720" instrument_node="">, Mar. 24, 1966 </span></p><span data-dcnode-id="2718" instrument_node="">
</span></div><span data-dcnode-id="2716" instrument_node="">
</span></div><span data-dcnode-id="2714" instrument_node="">
</span><div class="event" data-dcnode-id="2660"><span data-dcnode-id="2713" instrument_node="">
</span><p class="title" data-dcnode-id="2702"><span data-dcnode-id="2712" instrument_node="">
</span><strong class="date" data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">May 24, 1966</span></strong><span data-dcnode-id="2709" instrument_node="">
-
</span><strong data-dcnode-id="2704"><span data-dcnode-id="2708" instrument_node="">California Supreme Court in </span><em data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Otsuka v. Hite</span></em><span data-dcnode-id="2705" instrument_node=""> Defines the Term "Infamous Crimes"</span></strong><span data-dcnode-id="2703" instrument_node="">
</span></p><span data-dcnode-id="2701" instrument_node="">
The California Supreme Court rules in </span><em data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">Otsuka v. Hite </span></em><span data-dcnode-id="2698" instrument_node="">that the phrase "infamous crimes" in the state constitution should only disenfranchise those "deemed to constitute a threat to the integrity of the elective process."</span><br data-dcnode-id="2697"><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">
Katsuki James Otsuka, et al., filed a Class Action suit against the California Registrar of Voters, Benjamin S. Hite, etc., for refusing to register them to vote due to their prior convictions as conscientious objectors. The refusal to register the plaintiffs to vote was based on California’s constitution barring voters convicted of “infamous crimes.”</span><br data-dcnode-id="2694"><br data-dcnode-id="2693"><span data-dcnode-id="2692" instrument_node="">
The California Superior Court ruled that Otsuka et al. should be permitted to register to vote, and that California’s list of “infamous crimes” was too broad, and should be narrowed to “moral corruption and dishonesty.” As a result of this case all California counties attempted to bar from voting those convicted of “moral corruption and dishonesty.”</span><br data-dcnode-id="2691"><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node="">
The court ruled:</span><br data-dcnode-id="2688"><br data-dcnode-id="2687"><span data-dcnode-id="2686" instrument_node="">
“After reviewing the history and purpose of this ground of voter disqualifications we have concluded that to preserve its constitutionality it must be limited to conviction of crimes involving moral corruption and dishonesty, thereby branding their perpetrator a threat to the integrity of the elective process. Plaintiffs’ crime was not ‘infamous’ as thus construed, and hence the judgment is reversed...</span><br data-dcnode-id="2685"><br data-dcnode-id="2684"><span data-dcnode-id="2683" instrument_node="">
In ruling on the validity of state-imposed restrictions on this fundamental right the United States Supreme Court has in effect tended to apply the principle that the state must show it has a compelling interest in abridging the right, and that in any event such restrictions must be drawn with narrow specificity</span><br data-dcnode-id="2682"><br data-dcnode-id="2681"><span data-dcnode-id="2680" instrument_node="">
Viewed in this light, serious constitutional difficulties appear when the disfranchising provision of article II, section 1, is applied to these plaintiffs.”
</span><br data-dcnode-id="2679"><br data-dcnode-id="2678"><span data-dcnode-id="2677" instrument_node="">
</span><p align="right" data-dcnode-id="2668"><span data-dcnode-id="2669" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="2676" instrument_node="">
</span><em data-dcnode-id="2673"><a data-dcnode-id="2674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/otsukavhite.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2675" instrument_node="">Otsuka v. Hite</span></a></em><span data-dcnode-id="2672" instrument_node=""> </span><img alt="" border="0" data-dcnode-id="2671" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" width="13"><span data-dcnode-id="2670" instrument_node="">, May 24, 1966
</span></span></p><span data-dcnode-id="2667" instrument_node="">
</span><div class="sources" data-dcnode-id="2662"><span data-dcnode-id="2666" instrument_node="">
</span><p class="source" data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">
</span></p><span data-dcnode-id="2663" instrument_node="">
</span></div><span data-dcnode-id="2661" instrument_node="">
</span></div><span data-dcnode-id="2659" instrument_node="">
</span><div class="event" data-dcnode-id="2612"><span data-dcnode-id="2658" instrument_node="">
</span><p class="title" data-dcnode-id="2648"><span data-dcnode-id="2657" instrument_node="">
</span><strong class="date" data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">June 13, 1967</span></strong><span data-dcnode-id="2654" instrument_node="">
-
</span><strong data-dcnode-id="2650"><span data-dcnode-id="2653" instrument_node="">New York Supreme Court Rules That Criminal Disenfranchisement Is Reasonable and Constitutional in </span><em data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">Green v. Board of Elections</span></em></strong><span data-dcnode-id="2649" instrument_node="">
</span></p><span data-dcnode-id="2647" instrument_node="">
The New York Supreme Court rules in </span><em data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">Green v. Board of Elections</span></em><span data-dcnode-id="2644" instrument_node=""> that criminal disenfranchisement statutes are constitutional, arguing that "a man who breaks the laws he has authorized his agent to make for his own governance could fairly have been thought to have abandoned the right to participate in further administering the compact... It can scarcely be deemed unreasonable for a state to decide that perpetrators of serious crimes shall not take part in electing the legislators who make the laws."</span><br data-dcnode-id="2643"><br data-dcnode-id="2642"><span data-dcnode-id="2641" instrument_node="">
Gilbert Green, a felon convicted of conspiracy “to organize the Communist Party as a group to teach and advocate the overthrow and destruction of the government by force and violence,” filed suit in New York Supreme Court challenging his disenfranchisement.
The New York Supreme Court ruled in Green v. Board of Elections that there is nothing unreasonable or unconstitutional about criminal disenfranchisement statutes.
</span><br data-dcnode-id="2640"><br data-dcnode-id="2639"><span data-dcnode-id="2638" instrument_node="">
Green was challenging the New York law that stated that no person “convicted of a felony in a federal court of an offense of which such court has exclusive jurisdiction, shall have the right to register for or vote at any election unless he shall have been pardoned or restored to the rights of citizenship by the president of the United States.”
</span><br data-dcnode-id="2637"><br data-dcnode-id="2636"><span data-dcnode-id="2635" instrument_node="">
The court ruled:
</span><br data-dcnode-id="2634"><br data-dcnode-id="2633"><span data-dcnode-id="2632" instrument_node="">
“While this is ample to demonstrate to us the obvious lack of merit in Green’s contentions we have yet to mention the point on which New York most heavily relies — the provision in § 2 of the Fourteenth Amendment reducing the basis of representation of a state in the House of Representatives ‘when the right to vote at any election is denied to any of the male inhabitants of such State, being twenty-one years of age, and citizens of the United States, or in any way abridged, except for participation in rebellion or other crime.’ The framers of the Amendment, says the Attorney General, could hardly have intended the general language of § 1 to outlaw a discrimination which § 2 expressly allowed without the penalty of reduced representation. The argument is convincing. We see nothing in the language or in history to support plaintiff’s suggestion that ‘other crimes’ meant only a crime connected with the rebellion. The Court’s rejection of Mr. Justice Harlan’s position that § 2 is the only portion of the Fourteenth Amendment dealing with voting rights…in no way indicates it would deny that § 1 of the Amendment cannot be fairly read to prohibit a discrimination which § 2 expressly permits — especially in the light of the Justices’ frequent and consistent statements approving voting disqualification for felony.”
</span><br data-dcnode-id="2631"><br data-dcnode-id="2630"><span data-dcnode-id="2629" instrument_node="">
</span><p align="right" data-dcnode-id="2620"><span data-dcnode-id="2621" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="2628" instrument_node="">
</span><em data-dcnode-id="2625"><a data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/green_v_board.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2627" instrument_node="">Green v. Board of Elections</span></a></em><span data-dcnode-id="2624" instrument_node=""> </span><img alt="" border="0" data-dcnode-id="2623" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" width="13"><span data-dcnode-id="2622" instrument_node="">, June 13, 1967
</span></span></p><span data-dcnode-id="2619" instrument_node="">

</span><strong data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">Federal Appeals Court Argues That "Constitutional Concepts" Should Evolve Along with Modern Concepts of Justice and Punishment</span></strong><span data-dcnode-id="2603" instrument_node="">
</span></p><span data-dcnode-id="2601" instrument_node="">
The Ninth Circuit Court of Appeals stated in </span><em data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Dillenburg v. Kramer </span></em><span data-dcnode-id="2598" instrument_node="">that "courts have been hard pressed to define state interest served by laws disenfranchising persons convicted of crimes."</span><br data-dcnode-id="2597"><span data-dcnode-id="2596" instrument_node="">
</span><br data-dcnode-id="2595"><span data-dcnode-id="2594" instrument_node="">
The ruling overturned a lower court decision denying the appellant, Byrle L. Dillenburg, a chance to have a three judge panel in US district court decide whether or not Washington's criminal disenfranchisement law was unconstitutional.</span><br data-dcnode-id="2593"><br data-dcnode-id="2592"><span data-dcnode-id="2591" instrument_node="">
This case examined a challenge to Washington’s felon disenfranchisement laws on the grounds that they violated the US Constitution’s Equal Protection Clause. The 9th Circuit Court of Appeals questioned the state’s interest in disenfranchising felons, but it also noted that other courts have previously recognized the general pronouncement that a state has an interest in preventing persons who have been convicted of serious crimes from voting. The Court noted that the state interest served by disenfranchisement has never been adequately explained.</span><br data-dcnode-id="2590"><br data-dcnode-id="2589"><span data-dcnode-id="2588" instrument_node="">
The U.S. 9th Circuit Court of Appeals ruled that “constitutional concepts” can change over time, and laws disenfranchising felons should evolve along with society’s modern concepts of justice and punishment.</span><br data-dcnode-id="2587"><br data-dcnode-id="2586"><span data-dcnode-id="2585" instrument_node="">
“[The] search for modern reasons to sustain the old governmental disenfranchisement prerogative has usually ended with a general pronouncement that the state has an interest in preventing persons who have been convicted of serious crimes from participating in the electoral process … a quasi-metaphysical invocation that the interest is preservation of the ‘purity of the ballot box.’</span><br data-dcnode-id="2584"><br data-dcnode-id="2583"><span data-dcnode-id="2582" instrument_node="">
...Few decisions have penetrated the disenfranchisement classification to ascertain whether the offenses that restrict or destroy voting rights have anything to do with the integrity of the electoral process or whether there is any valid distinction between the class of offenses that disenfranchise and the class of offenses that do not...</span><br data-dcnode-id="2581"><br data-dcnode-id="2580"><span data-dcnode-id="2579" instrument_node="">
[C]onstitutional concepts of equal protection are not immutably frozen like insects trapped in Devonian amber.”
</span><br data-dcnode-id="2578"><br data-dcnode-id="2577"><span data-dcnode-id="2576" instrument_node="">
</span><p align="right" data-dcnode-id="2567"><span data-dcnode-id="2568" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="2575" instrument_node="">
</span><a data-dcnode-id="2572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/dillenburg_v_kramer.pdf" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Dillenburg v. Kramer</span></em></a><span data-dcnode-id="2571" instrument_node=""> </span><img alt="" border="0" data-dcnode-id="2570" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" width="13"><span data-dcnode-id="2569" instrument_node="">, Nov. 16, 1972
</span></span></p><span data-dcnode-id="2566" instrument_node="">

</span><strong class="date" data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">June 24, 1974</span></strong><span data-dcnode-id="2553" instrument_node="">

</span><strong data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">US Supreme Court Rules That Disenfranchising People with Felony Convictions Does Not Violate the Equal Protection Clause of the US Constitution</span></strong><span data-dcnode-id="2550" instrument_node="">
</span></p><span data-dcnode-id="2548" instrument_node="">
The US Supreme Court rules in a 6-3 decision in </span><em data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Richardson v. Ramirez </span></em><span data-dcnode-id="2545" instrument_node="">that "California, in disenfranchising convicted felons who have completed their sentences and paroles, does not violate the Equal Protection Clause... </span><br data-dcnode-id="2544"><span data-dcnode-id="2543" instrument_node="">
</span><br data-dcnode-id="2542"><span data-dcnode-id="2541" instrument_node="">
Although the Court has never given plenary consideration to the precise question of whether a State may constitutionally exclude some or all convicted felons from the franchise, we have indicated approval of such exclusions on a number of occasions... recently we have strongly suggested in dicta that exclusion of convicted felons from the franchise violates no constitutional provision... </span><br data-dcnode-id="2540"><span data-dcnode-id="2539" instrument_node="">
</span><br data-dcnode-id="2538"><span data-dcnode-id="2537" instrument_node="">
But it is not for us to choose one set of values over the other. If respondents are correct, and the view which they advocate is indeed the more enlightened one, presumably the people of the State of California will ultimately come around to the view. And if they do not do so, their failure is some evidence, at least, of the fact that there are two sides to the argument."
</span><br data-dcnode-id="2536"><br data-dcnode-id="2535"><span data-dcnode-id="2534" instrument_node="">
Ramirez, Lee, and Gill were denied the ability to register to vote in three California counties after completing their felony sentences. They filed suit against the California Secretary of State and other election officials, including Viola Richardson, County Clerk of Mendocino County.
California election officials relented and registered Ramirez et al. to vote. However, the case had been certified as a class action lawsuit that would effect all felons in California and was therefore permitted to continue through the courts.
The California Supreme Court ruled that the state’s felon disenfranchisement law violated the Equal Protection Clause of the 14th Amendment.
The U.S. Supreme Court disagreed, ruling that California’s felon disenfranchisement law was constitutionally permissible.
Even though the U.S. Supreme Court found California’s felon disenfranchisement clause to be constitutional, the California state legislature amended its constitution on Nov. 5, 1974 to limit disenfranchisement to those people convicted of crimes when “imprisoned or on parole for the conviction of a felony.”
</span><br data-dcnode-id="2533"><br data-dcnode-id="2532"><span data-dcnode-id="2531" instrument_node="">
The court ruled:
</span><br data-dcnode-id="2530"><br data-dcnode-id="2529"><span data-dcnode-id="2528" instrument_node="">
“Pressed upon us by the respondents, and by amici curiae, are contentions that these notions are outmoded, and that the more modern view is that it is essential to the process of rehabilitating the ex-felon that he be returned to his role in society as a fully participating citizen when he has completed the serving of his term. We would by no means discount these arguments if addressed to the legislative forum which may properly weigh and balance them against those advanced in support of California’s present constitutional provisions.
But it is not for us to choose one set of values over the other. If respondents are correct, and the view which they advocate is indeed the more enlightened and sensible one, presumably the people of the State of California will ultimately come around to that view. And if they do not do so, their failure is some evidence, at least, of the fact that there are two sides to the argument …
</span><br data-dcnode-id="2527"><br data-dcnode-id="2526"><span data-dcnode-id="2525" instrument_node="">
It is argued that disenfranchisement is necessary to prevent vote frauds. Although the State has a legitimate and, in fact, compelling interest in preventing election fraud, the challenged provision is not sustainable on that ground. First, the disenfranchisement provisions are patently both overinclusive and underinclusive. The provision is not limited to those who have demonstrated a marked propensity for abusing the ballot by violating election laws. Rather, it encompasses all former felons and there has been no showing that ex-felons generally are any more likely to abuse the ballot than the remainder of the population.”
</span><br data-dcnode-id="2524"><br data-dcnode-id="2523"><span data-dcnode-id="2522" instrument_node="">
</span><p align="right" data-dcnode-id="2512"><span data-dcnode-id="2513" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="2521" instrument_node="">
</span><em data-dcnode-id="2517"><a data-dcnode-id="2519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/richardsonvramirez.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2520" instrument_node="">Richardson v. Ramirez</span></a><span data-dcnode-id="2518" instrument_node=""> </span></em><span data-dcnode-id="2516" instrument_node=""> </span><img alt="" border="0" data-dcnode-id="2515" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" width="13"><span data-dcnode-id="2514" instrument_node="">, June 24, 1974
</span></span></p><span data-dcnode-id="2511" instrument_node="">
</span><div class="sources" data-dcnode-id="2506"><span data-dcnode-id="2510" instrument_node="">
</span><p class="source" data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">
</span></p><span data-dcnode-id="2507" instrument_node="">

</span><p class="title" data-dcnode-id="2494"><span data-dcnode-id="2501" instrument_node="">
</span><strong class="date" data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Nov. 5, 1974</span></strong><span data-dcnode-id="2498" instrument_node="">

</span><strong data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">California Amends Constitution to Allow People with Felony Convictions to Vote After Completion of Incarceration and Parole</span></strong><span data-dcnode-id="2495" instrument_node="">
</span></p><span data-dcnode-id="2493" instrument_node="">
"In November of 1974, California voters passed Proposition 10, which effectively restored voting rights to former felons. California thus joined a growing number of states that removed permanent voting restrictions for people convicted of felonies, ‘infamous’ crimes and a variety of lesser offenses. While this measure received little fanfare in the media, its impact was substantial due to California’s dramatic increase in incarceration rates beginning in the 1970s. Over the next 30 years, this change restored voting rights for hundreds of thousands of citizens who otherwise would have been disenfranchised."</span><br data-dcnode-id="2492"><span data-dcnode-id="2491" instrument_node="">
</span><br data-dcnode-id="2490"><span data-dcnode-id="2489" instrument_node="">
The constitution restricts felons from voting "while... imprisoned or on parole for the conviction of a felony."
</span><br data-dcnode-id="2488"><br data-dcnode-id="2487"><span data-dcnode-id="2486" instrument_node="">
</span><p align="right" data-dcnode-id="2478"><span data-dcnode-id="2479" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="2485" instrument_node="">
</span><a data-dcnode-id="2483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/1974_cal_article2_const.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2484" instrument_node="">California State Constitution; Article 2</span></a><span data-dcnode-id="2482" instrument_node=""> </span><img alt="" border="0" data-dcnode-id="2481" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" width="13"><span data-dcnode-id="2480" instrument_node="">, Nov. 5, 1974
</span></span></p><span data-dcnode-id="2477" instrument_node=""> </span><div class="sources" data-dcnode-id="2466"><span data-dcnode-id="2476" instrument_node="">
</span><p class="source" data-dcnode-id="2468"><span data-dcnode-id="2475" instrument_node="">
</span><a alt="Michael C. Campbell" data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/source-biographies/michael-c-campbell/" target="_blank" title="Michael C. Campbell"><span data-dcnode-id="2474" instrument_node="">
Michael C. Campbell </span></a><span data-dcnode-id="2472" instrument_node="">
"Criminal Disenfranchisement Reform in California: A Deviant Case Study," </span><em data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Punishment Society</span></em><span data-dcnode-id="2469" instrument_node="">, 2007 </span></p><span data-dcnode-id="2467" instrument_node="">
</span></div><span data-dcnode-id="2465" instrument_node="">

</span><strong class="date" data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Apr. 22, 1980</span></strong><span data-dcnode-id="2458" instrument_node="">

</span><strong data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">US Supreme Court Rules That Purposeful Racial Discrimination Must Be Evident for a Disenfranchisement Law to Be Unconstitutional</span></strong><span data-dcnode-id="2455" instrument_node="">
</span></p><span data-dcnode-id="2453" instrument_node="">
The US Supreme Court rules in a 6-3 decision in&nbsp;</span><em data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">City of Mobile, Alabama v. Bolden </span></em><span data-dcnode-id="2450" instrument_node="">that only actions undertaken with "racially discriminatory motivation" were unconstitutional or illegal under the Voting Rights Act. </span><br data-dcnode-id="2449"><span data-dcnode-id="2448" instrument_node="">
</span><br data-dcnode-id="2447"><span data-dcnode-id="2446" instrument_node="">
The Supreme Court ruling states that there must be "purposeful discrimination" for a voting disenfranchisement law to be found unconstitutional. Racial discrimination alone is irrelevant unless it can be shown that the intent was to racially discriminate. </span><br data-dcnode-id="2445"><span data-dcnode-id="2444" instrument_node="">
</span><br data-dcnode-id="2443"><span data-dcnode-id="2442" instrument_node="">
This case set one of the benchmarks for future cases challenging laws that disenfranchise people with felony convictions based upon racial intent.</span><br data-dcnode-id="2441"><br data-dcnode-id="2440"><span data-dcnode-id="2439" instrument_node="">
Bolden et al. filed a class action lawsuit in Federal District Court, alleging that “the practice of electing the City Commissioners at large unfairly diluted the voting strength of Negroes in violation of the Fourteenth and Fifteenth Amendments” of the U.S. Constitution.
The District Court and the Court of Appeals (5th District) agreed with Bolden. The case was overturned by the U.S. Supreme Court, which ruled that there must be “purposeful discrimination” for a voting disenfranchisement law to be found unconstitutional. Racial discrimination alone is irrelevant unless it can be shown that the intent was to racially discriminate.
</span><br data-dcnode-id="2438"><br data-dcnode-id="2437"><span data-dcnode-id="2436" instrument_node="">
This case set one of the benchmarks for future cases challenging felon disenfranchisement laws based upon racial intent.
</span><br data-dcnode-id="2435"><br data-dcnode-id="2434"><span data-dcnode-id="2433" instrument_node="">
The court ruled:
</span><br data-dcnode-id="2432"><br data-dcnode-id="2431"><span data-dcnode-id="2430" instrument_node="">
“Only if there is purposeful discrimination can there be a violation of the Equal Protection Clause. And this principle applies to claims of racial discrimination affecting voting just as it does to other claims of racial discrimination...</span><br data-dcnode-id="2429"><br data-dcnode-id="2428"><span data-dcnode-id="2427" instrument_node="">
Disproportionate effects alone are insufficient to establish a claim of unconstitutional racial vote dilution. Where the character of a law is readily explainable on grounds apart from race … disproportionate impact alone cannot be decisive, and courts must look to other evidence to support a finding of discriminatory purpose.”
</span><br data-dcnode-id="2426"><br data-dcnode-id="2425"><span data-dcnode-id="2424" instrument_node="">
</span><p align="right" data-dcnode-id="2415"><span data-dcnode-id="2416" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="2423" instrument_node="">
</span><em data-dcnode-id="2420"><a data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/mobilevbolden.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2422" instrument_node="">Mobile v. Bolden</span></a></em><span data-dcnode-id="2419" instrument_node=""> </span><img alt="" border="0" data-dcnode-id="2418" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" width="13"><span data-dcnode-id="2417" instrument_node="">, Apr. 22, 1980
</span></span></p><span data-dcnode-id="2414" instrument_node=""> </span><div class="sources" data-dcnode-id="2409"><span data-dcnode-id="2413" instrument_node="">
</span><p class="source" data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">
</span></p><span data-dcnode-id="2410" instrument_node="">
</span></div><span data-dcnode-id="2408" instrument_node="">
</span></div><span data-dcnode-id="2406" instrument_node="">
</span><div class="event" data-dcnode-id="2361"><span data-dcnode-id="2405" instrument_node="">
</span><p class="title" data-dcnode-id="2397"><span data-dcnode-id="2404" instrument_node="">
</span><strong class="date" data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">Apr. 16, 1985</span></strong><span data-dcnode-id="2401" instrument_node="">
-
</span><strong data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">US Supreme Court Rules That Criminal Disenfranchisement Is Legal if There Is No Racially Discriminatory Intent</span></strong><span data-dcnode-id="2398" instrument_node="">
</span></p><span data-dcnode-id="2396" instrument_node="">
The US Supreme Court rules in an 8-0 decision in </span><em data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">Hunter v. Underwood </span></em><span data-dcnode-id="2393" instrument_node="">that states have the right to disenfranchise criminals but "not with a racially discriminatory intent."
</span><br data-dcnode-id="2392"><br data-dcnode-id="2391"><span data-dcnode-id="2390" instrument_node="">
Victor Underwood, described in court documents as “a white,” and Carmen Edwards, “a black,” had been blocked from voting in Alabama because they each had been convicted of “presenting a worthless check … a crime involving moral turpitude.” They filed a class action lawsuit, claiming the disenfranchisement was intended to discriminate against blacks.
The District Court ruled against them. The Court of Appeals (11th Circuit) reversed, saying the provision “would not have been adopted in the absence of the racially discriminatory motivation.” The U.S. Supreme Court agreed, finding that the disenfranchisement provision “violated the Equal Protection Clause of the Fourteenth Amendment.”
</span><br data-dcnode-id="2389"><br data-dcnode-id="2388"><span data-dcnode-id="2387" instrument_node="">
The U.S. Supreme Court’s ruling in this case struck down the provision of the Alabama Constitution that mandated voting disenfranchisement for people who committed “crimes of moral turpitude.” Whether a law was passed with a racially biased intent became a litmus test for whether a disenfranchisement law is constitutional.</span><br data-dcnode-id="2386"><br data-dcnode-id="2385"><span data-dcnode-id="2384" instrument_node="">
The court ruled:
</span><br data-dcnode-id="2383"><br data-dcnode-id="2382"><span data-dcnode-id="2381" instrument_node="">“Held: Section 182 [of the Alabama constitution of 1901] violates the Equal Protection Clause of the Fourteenth Amendments... That 182 may have been adopted to discriminate against poor whites as well as against blacks would not render nugatory [worthless, futile] the purpose to discriminate against blacks...</span><br data-dcnode-id="2380"><br data-dcnode-id="2379"><span data-dcnode-id="2378" instrument_node="">
The drafters [of Section 182] retained the general felony provision – ‘any crime punishable by imprisonment in the penitentiary’ – but also added a new catchall provision covering ‘any... crime involving moral turpitude.’ ...It is alleged, and the Court of Appeals found, that the crimes selected for inclusion in 182 were believed by the delegates to be more frequently committed by blacks.”
</span><p align="right" data-dcnode-id="2369"><span data-dcnode-id="2370" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="2377" instrument_node="">
</span><em data-dcnode-id="2374"><a data-dcnode-id="2375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/huntervunderwood.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2376" instrument_node="">Hunter v. Underwood</span></a></em><span data-dcnode-id="2373" instrument_node=""> </span><img alt="" border="0" data-dcnode-id="2372" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" width="13"><span data-dcnode-id="2371" instrument_node="">, Apr. 16, 1985
</span></span></p><span data-dcnode-id="2368" instrument_node=""> </span><div class="sources" data-dcnode-id="2363"><span data-dcnode-id="2367" instrument_node="">
</span><p class="source" data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">
</span></p><span data-dcnode-id="2364" instrument_node="">

</span><div class="event" data-dcnode-id="2333"><span data-dcnode-id="2352" instrument_node="">
</span><p class="title" data-dcnode-id="2344"><span data-dcnode-id="2351" instrument_node="">
</span><strong class="date" data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Nov. 4, 2000</span></strong><span data-dcnode-id="2348" instrument_node="">

</span><strong data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Massachusetts Voters Ban Incarcerated People with Felony Convictions from Voting</span></strong><span data-dcnode-id="2345" instrument_node="">

"In 2000 [Nov. 4], Massachusetts became the only state in recent history to further restrict voting rights for felons. Prior to a ballot question [passed by 60.3% of voters] that year, there were no voting restrictions for felons in Massachusetts. This changed when the Massachusetts constitution was amended to include, ’Persons who are incarcerated in a correctional facility due to a felony conviction’ may not vote' (Mass Const. Art. III as amended in 2000)." </span><div class="sources" data-dcnode-id="2335"><span data-dcnode-id="2342" instrument_node="">

Massachusetts Statewide Harm Reduction Coalition (SHaRC) </span></a><span data-dcnode-id="2338" instrument_node="">
"Statewide Harm Reduction Coalition Demands Voting Rights for Felons," www.massdecarcerate.org (accessed July 17, 2009) </span></p><span data-dcnode-id="2336" instrument_node="">

</span><strong data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">New Mexico Repeals Lifetime Ban on Disenfranchisement of People with Felony Convictions</span></strong><span data-dcnode-id="2324" instrument_node="">
</span></p><span data-dcnode-id="2322" instrument_node="">
"In March 2001, the New Mexico legislature adopted Senate Bill 204, repealing the state’s lifetime ban on ex-felon voting. Prior to the bill’s passage, anyone convicted of a felony faced permanent disenfranchisement. According to the new law, persons convicted of a felony who have completed their prison terms, as well as any offenders completing probation or parole, are automatically eligible to register. There is no application process required to restore voting rights. It is estimated that over 50,000 New Mexicans were barred from voting at the time of the law’s enactment."
</span><br data-dcnode-id="2321"><br data-dcnode-id="2320"><span data-dcnode-id="2319" instrument_node="">

</span><strong data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">US Senate Votes Down Amendment Granting People with Felony Convictions the Right to Vote in Federal Elections</span></strong><span data-dcnode-id="2290" instrument_node="">
</span></p><span data-dcnode-id="2288" instrument_node="">
"[In] 2002 U.S. Senate vote on an amendment to the federal voting reform legislation [Equal protection of Voting Rights Act of 2001] that proposed to restore voting rights to ex-felons in federal elections. Senators from the 11 former confederate states voted 18 to 4 against enfranchisement (the measure went down by a 63-31 floor vote), and the most passionate speeches against it were made by southerners..."
</span><br data-dcnode-id="2287"><br data-dcnode-id="2286"><span data-dcnode-id="2285" instrument_node="">

</span><strong data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Alabama Passes Bill Allowing Most People with Felony Convictions to Register to Vote</span></strong><span data-dcnode-id="2236" instrument_node="">
</span></p><span data-dcnode-id="2234" instrument_node="">
"In 2003, [Alabama] Governor Riley signed into law a bill [Section 15-22-36.1] that permits most people with felony convictions [in the state of Alabama] to apply for a certificate of eligibility to register to vote after completing their sentence."
</span><br data-dcnode-id="2233"><br data-dcnode-id="2232"><span data-dcnode-id="2231" instrument_node="">
</span><p align="right" data-dcnode-id="2223"><span data-dcnode-id="2224" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="2230" instrument_node="">
</span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/alabama_vote_2003.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2229" instrument_node="">Section 15-22-36.1</span></a><span data-dcnode-id="2227" instrument_node=""> </span><img alt="" border="0" data-dcnode-id="2226" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" width="13"><span data-dcnode-id="2225" instrument_node="">, 2003

</span><strong data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Nevada Passes Bill to Automatically Restore the Vote to People with Felony Convictions</span></strong><span data-dcnode-id="2203" instrument_node="">
</span></p><span data-dcnode-id="2201" instrument_node="">
"In 2003, the Nevada legislature passed Assembly Bill 55. Highlights of the new law include: </span><br data-dcnode-id="2200"><span data-dcnode-id="2199" instrument_node="">
</span><br data-dcnode-id="2198"><span data-dcnode-id="2197" instrument_node="">
For people released from parole, prison, or probation before July 1, 2003, the law automatically restores voting rights and the right to serve as a juror in a civil case. These individuals gain the right to run for public office after four years and can serve as a juror in a criminal case after six years. This applies to all former felons, regardless of the number or seriousness of the convictions. </span><br data-dcnode-id="2196"><span data-dcnode-id="2195" instrument_node="">
</span><br data-dcnode-id="2194"><span data-dcnode-id="2193" instrument_node="">
For people released after July 1, 2003, the bill requires the immediate restoration of these rights only for individuals who have committed a single, nonviolent felony, including a drug offense. Those who have been convicted of a violent felony or who have served for multiple convictions must petition a court for the restoration of their rights. </span><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">
</span><br data-dcnode-id="2190"><span data-dcnode-id="2189" instrument_node="">
The bill also allows ex-felons to hold 26 different occupations from which they were previously banned." </span><div class="sources" data-dcnode-id="2181"><span data-dcnode-id="2188" instrument_node="">
</span><p class="source" data-dcnode-id="2183"><span data-dcnode-id="2187" instrument_node="">
</span><a alt="Applied Research Center" data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/source-biographies/applied-research-center/" target="_blank" title="Applied Research Center"><span data-dcnode-id="2186" instrument_node="">
Applied Research Center </span></a><span data-dcnode-id="2184" instrument_node="">
"Re-Enfranchising Ex-Felons Assembly Bill, 55, State of Nevada, 2003," www.arc.org (accessed Aug. 3, 2009) </span></p><span data-dcnode-id="2182" instrument_node="">

</span><strong data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Nebraska Repeals Lifetime Ban of Disenfranchisement of People with Felony Convictions</span></strong><span data-dcnode-id="2170" instrument_node="">
</span></p><span data-dcnode-id="2168" instrument_node="">
"In March 2005, the [Nebraska] Legislature repealed the lifetime ban on all felons and replaced it with a two-year post-sentence ban. Gov. Dave Heineman vetoed the bill but was overridden by the Legislature." </span><div class="sources" data-dcnode-id="2157"><span data-dcnode-id="2167" instrument_node="">

</span><strong data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">Iowa Restores Vote to All People with Felony Convictions Who Have Completed Their Sentences</span></strong><span data-dcnode-id="2146" instrument_node="">
</span></p><span data-dcnode-id="2144" instrument_node="">
"Gov. Tom Vilsack of Iowa announced yesterday [6/17/05] that he would restore voting rights for all felons who have completed their sentences, ending what advocates for voting rights had called one of the most restrictive disenfranchisement laws in the country." </span><div class="sources" data-dcnode-id="2136"><span data-dcnode-id="2143" instrument_node="">

</span><strong data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Washington District Court Rules in Farrakhan v. Gregoire That State's Criminal Disenfranchisement Laws Do Not Violate Section 2 of the Voting Rights Act</span></strong><span data-dcnode-id="2125" instrument_node="">
</span></p><span data-dcnode-id="2123" instrument_node="">
"On July 7, the Eastern District Court of Washington dismissed the Farrakhan v. Gregoire case, in which the plaintiffs charged that Washington's felon disenfranchisement laws and restoration policies disproportionately result in the denial of voting rights for racial minorities and therefore violate Section 2 of the 1965 Voting Rights Act. </span><br data-dcnode-id="2122"><span data-dcnode-id="2121" instrument_node="">
</span><br data-dcnode-id="2120"><span data-dcnode-id="2119" instrument_node="">
In its Decision, the Court concluded that it is 'compelled to find that there is discrimination in Washington's criminal justice system on account of race' and that this discrimination 'clearly hinders the ability of racial minorities to participate effectively in the political process.' Despite these conclusions, however, the Court dismissed the case citing a 'remarkable absence of any history of official discrimination' in Washington's electoral process and felon disenfranchisement provisions." </span><div class="sources" data-dcnode-id="2111"><span data-dcnode-id="2118" instrument_node="">

</span><strong data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Florida Gov. Charlie Crist Institutes Automatic Vote Restoration to People with Felony Convictions Who Have Completed Their Full Sentences</span></strong><span data-dcnode-id="2100" instrument_node="">
</span></p><span data-dcnode-id="2098" instrument_node="">
The Florida Rules of Executive Clemency were amended by Gov. Charlie Crist (R) and the Florida Board of Executive Clemency on Apr. 5, 2007. The new rules now permit disenfranchised people with felony convictions to have their ability to vote automatically restored once they have completed their full sentences, including "imprisonment, parole, probation, community control, control release, and conditional release [and] has paid all restitution." Additional requirements are also mandated. Previous rules required at least five "crime-free" years before such restoration.
</span><br data-dcnode-id="2097"><br data-dcnode-id="2096"><span data-dcnode-id="2095" instrument_node="">

</span><a data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/FL-App-Instruc.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2093" instrument_node="">Florida Rules of Executive Clemency</span></a><span data-dcnode-id="2091" instrument_node=""> </span><img alt="" border="0" data-dcnode-id="2090" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" width="13"><span data-dcnode-id="2089" instrument_node=""> (accessed July 31, 2008)</span><br data-dcnode-id="2088"><br data-dcnode-id="2087"><span data-dcnode-id="2086" instrument_node="">

</span><strong data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">Washington Supreme Court Reinstates Fine Payment as Part of Re-Enfranchisement Qualifications</span></strong><span data-dcnode-id="2029" instrument_node="">
</span></p><span data-dcnode-id="2027" instrument_node="">
On July 26, 2007, the Washington State Supreme Court, in Madison v. Washington, reversed an Apr. 21 2006 King County superior Court order giving "all felons who have satisfied the terms of their sentences except for paying legal financial obligations, and who, due to their financial status, are unable to pay their legal financial obligations immediately," the right to vote. </span><br data-dcnode-id="2026"><span data-dcnode-id="2025" instrument_node="">
</span><br data-dcnode-id="2024"><span data-dcnode-id="2023" instrument_node="">
The Washington State Supreme Court ruled that persons convicted of a felony in the state of Washington who were convicted after July 1, 1984 have their ability to vote restored once all probation/parole is completed and all fines are paid.</span><br data-dcnode-id="2022"><span data-dcnode-id="2021" instrument_node="">
</span><br data-dcnode-id="2020"><span data-dcnode-id="2019" instrument_node="">
Those convicted prior to July 1, 1984 must petition the sentencing review board to have their ability to vote restored.</span><br data-dcnode-id="2018"><br data-dcnode-id="2017"><span data-dcnode-id="2016" instrument_node="">
Daniel Madison, Beverly Dubois, and Dannielle Garner, convicted felons, filed suit against the state of Washington, challenging the constitutionality of Washington’s disenfranchisement law, claiming it denies the right to vote to convicted felons who have not completed all the terms of their sentences, including full payment of their legal financial obligations (LFOs).</span><br data-dcnode-id="2015"><br data-dcnode-id="2014"><span data-dcnode-id="2013" instrument_node="">
All convicted felons in this case had completed all of their sentences except for the payment of LFOs. They had payment plans established, which were current and still owed (approximately, with interest) as follows:
</span><br data-dcnode-id="2012"><br data-dcnode-id="2011"><span data-dcnode-id="2010" instrument_node="">
Maddison: Monthly Payment: $15; Total Due: $242.25</span><br data-dcnode-id="2009"><br data-dcnode-id="2008"><span data-dcnode-id="2007" instrument_node="">
DuBois: Monthly Payment: $10; Total Due: $1,805.69</span><br data-dcnode-id="2006"><br data-dcnode-id="2005"><span data-dcnode-id="2004" instrument_node="">
Garner: Monthly Payment: $10; Total Due: $360.00</span><br data-dcnode-id="2003"><br data-dcnode-id="2002"><span data-dcnode-id="2001" instrument_node="">
Madison et al. felt that Washington’s requirement that all LFOs must be paid in full prior to their sentence being considered “complete” was biased against the poor. Washington’s Supreme Court disagreed, opining that as long as all felons were treated in the same way the law could not be considered biased.
</span><br data-dcnode-id="2000"><br data-dcnode-id="1999"><span data-dcnode-id="1998" instrument_node="">
The court ruled:
</span><br data-dcnode-id="1997"><br data-dcnode-id="1996"><span data-dcnode-id="1995" instrument_node="">
“We hold that Washington’s disenfranchisement scheme does not violate the privileges and immunities clause of the Washington Constitution or the equal protection clause of the United States Constitution.</span><br data-dcnode-id="1994"><br data-dcnode-id="1993"><span data-dcnode-id="1992" instrument_node="">
The privileges and immunities clause does reflect, in part, our framers’ concerns with ‘undue political influence exercised by those with large concentrations of wealth’ and ‘avoiding favoritism toward the wealthy.’ However, such concerns are not triggered by Washington’s felon disenfranchisement scheme because it grants the ‘privilege’ of restoration of voting rights ‘upon the same terms... equally... to all citizens.’
</span><br data-dcnode-id="1991"><br data-dcnode-id="1990"><span data-dcnode-id="1989" instrument_node="">
The Washington Constitution grants the right to vote to all Washington citizens on equal terms. Additionally, the Washington Constitution disqualifies voters on equal terms — that is, when individuals have been convicted of committing a felony. … The system of only restoring voting rights to felons who have satisfied all of the terms of their sentences, including fully paying their LFOs, does not constitute a grant of favoritism or a granting of a privilege on unequal terms … because the same standard is applied evenly to all felons seeking restoration of their voting rights.”
</span><br data-dcnode-id="1988"><br data-dcnode-id="1987"><span data-dcnode-id="1986" instrument_node="">
</span><p align="right" data-dcnode-id="1969"><span data-dcnode-id="1970" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="1985" instrument_node="">
</span><a data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/final_court_order_4-21-06.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1984" instrument_node="">King County Superior Court Order</span></a><span data-dcnode-id="1982" instrument_node=""> </span><img alt="" border="0" data-dcnode-id="1981" height="13" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//felonvoting.procon.org/wp-content/uploads/sites/48/pdf-logo.gif&amp;raw" width="13"><span data-dcnode-id="1980" instrument_node="">, Apr. 21, 2006 </span><br data-dcnode-id="1979"><span data-dcnode-id="1978" instrument_node="">
</span><br data-dcnode-id="1977"><span data-dcnode-id="1976" instrument_node="">

Presidential candidate Barack Obama made a statement supporting the re-enfranchisement of people who have completed felony sentences in a Dec. 7, 2007 questionnaire for the National Association for the Advancement of Colored People (NAACP): </span><br data-dcnode-id="1949"><span data-dcnode-id="1948" instrument_node="">

</span><strong data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">US Senator Ted Stevens (R-AK) Convicted; May Lose Ability to Vote</span></strong><span data-dcnode-id="1918" instrument_node="">
</span></p><span data-dcnode-id="1916" instrument_node="">
On Oct. 27, 2008 Senator Stevens was convicted on 7 of 7 felony charges.
"The </span><em data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">New York Times</span></em><span data-dcnode-id="1913" instrument_node=""> reports, correctly, that Sen. Stevens can run for reelection despite his convicted felon status…
</span><br data-dcnode-id="1912"><br data-dcnode-id="1911"><span data-dcnode-id="1910" instrument_node="">
Ironically, though, it looks like Stevens may not be able to vote for himself. Felons whose crimes involve ‘moral turpitude’ (defined by state law to include bribery, Alaska Stat. 15.60.010(9)) cannot vote in Alaska, at least until their civil rights are restored, which only happens when ‘a person is released from all disability arising under a conviction and sentence, including probation and parole.’ (The statute is at this citation: Alaska Stat. 15.60.010(39).) Deregistration from the voting rolls is automatic upon conviction.
</span><br data-dcnode-id="1909"><br data-dcnode-id="1908"><span data-dcnode-id="1907" instrument_node="">
Stevens was convicted of violating ethics disclosure rules. Technically the indictment charged violation of the federal criminal statute 18 U.S.C. 1001, which makes it a crime to knowingly fill out a federal form falsely. I guess the question now is whether that offense fits within the definition of a ‘felony involving moral turpitude’ under Alaska law.” </span><div class="sources" data-dcnode-id="1902"><span data-dcnode-id="1906" instrument_node="">
</span><p class="source" data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">
Shayana Kadidal, "Can Ted Stevens Vote for Himself? Not Anymore," huffingtonpost.com, Oct. 27, 2008 </span></p><span data-dcnode-id="1903" instrument_node="">

</span><strong data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">9th US Circuit Court of Appeals Rules that Washington's Disenfranchisement Law Violates the Voting Rights Act</span></strong><span data-dcnode-id="1890" instrument_node="">
</span></p><span data-dcnode-id="1888" instrument_node="">
A three judge panel of the 9th US Circuit Court of Appeals ruled 2-1 in </span><em data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Farrakhan v. Gregoire </span></em><span data-dcnode-id="1885" instrument_node="">that Washington's law disenfranchising people with felony convictions violates Section 2 of the Voting Rights Act and that plaintiffs "demonstrated that the discriminatory impact of Washington’s felon disenfranchisement is attributable to racial discrimination." According to a press release from Washington Secretary of State Sam Reed, the ruling will allow "inmates currently behind bars to vote in Washington."
</span><br data-dcnode-id="1884"><br data-dcnode-id="1883"><span data-dcnode-id="1882" instrument_node="">
</span><p align="right" data-dcnode-id="1864"><span data-dcnode-id="1865" style="font-size: 0.85rem;color:#696969"><span data-dcnode-id="1881" instrument_node="">
