</span><div class="article-body-text" data-dcnode-id="1998"><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2331"><span data-dcnode-id="2351" instrument_node="">On an otherwise perfectly normal Monday in mid-February, a bill was </span><a data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//olis.leg.state.or.us/liz/2019R1/Downloads/MeasureDocument/SJR22/Introduced" rel="nofollow"><span data-dcnode-id="2350" instrument_node="">introduced</span></a><span data-dcnode-id="2348" instrument_node=""> in the Oregon legislature to lower the </span><a data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_age" rel="nofollow"><span data-dcnode-id="2347" instrument_node="">voting age</span></a><span data-dcnode-id="2345" instrument_node=""> from 18, as required (maximum) by </span><a data-dcnode-id="2343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/constitution/amendmentxxvi" rel="nofollow"><span data-dcnode-id="2344" instrument_node="">Amendment XXVI</span></a><span data-dcnode-id="2342" instrument_node=""> to the </span><a data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.law.cornell.edu/constitution" rel="nofollow"><span data-dcnode-id="2341" instrument_node="">US Constitution</span></a><span data-dcnode-id="2339" instrument_node="">, to 16. The bill made </span><a data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.google.com/stories/CAAqSQgKIkNDQklTTERvSmMzUnZjbmt0TXpZd1NoOGFIV1I2TTNsMmVXRnZWbGRSVDFSSlRVSlFlR3hrUkhOYWNHSkVYMjlOS0FBUAE%3Fq%3Doregon%2Blower%2Bvoting%2Bage%26lr%3DEnglish%26sa%3DX%26ved%3D0ahUKEwij5qmg1dHgAhXZ4KYKHVq5BgkQqgIIKjAA%26hl%3Den-US%26gl%3DUS%26ceid%3DUS%3Aen" rel="nofollow"><span data-dcnode-id="2338" instrument_node="">headlines</span></a><span data-dcnode-id="2336" instrument_node=""> and was, among other places, discussed on </span><em data-dcnode-id="2333"><a data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.today.com/video/oregon-considers-lowering-voting-age-to-16-1445390403557" rel="nofollow"><span data-dcnode-id="2335" instrument_node="">The TODAY Show</span></a></em><span data-dcnode-id="2332" instrument_node="">.</span></p><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2316"><span data-dcnode-id="2329" instrument_node="">There has been a slight beginning trend to lower the voting age, in Europe and elsewhere. Austria </span><a data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2007/06/06/world/europe/06fbriefs-austria.html" rel="nofollow"><span data-dcnode-id="2328" instrument_node="">lowered</span></a><span data-dcnode-id="2326" instrument_node=""> the general elections voting age to 16 in 2007. In Malta, a </span><a data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.timesofmalta.com/articles/view/20180305/local/16-year-olds-granted-the-vote-in-national-elections.672453" rel="nofollow"><span data-dcnode-id="2325" instrument_node="">bill was passed</span></a><span data-dcnode-id="2323" instrument_node=""> only last year to do the same. Estonia has a voting age of 16 for </span><a data-dcnode-id="2321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.err.ee/115792/voting-age-lowered-to-16-in-local-elections" rel="nofollow"><span data-dcnode-id="2322" instrument_node="">local elections</span></a><span data-dcnode-id="2320" instrument_node="">. In Europe, the voting age varies from 16 to 25, the most common being 18, as elsewhere around the world. The voting age for the </span><a data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.senato.it/3801" rel="nofollow"><span data-dcnode-id="2319" instrument_node="">Italian Senate</span></a><span data-dcnode-id="2317" instrument_node=""> is 25, where the eligibility age is 40.</span></p><span data-dcnode-id="2315" instrument_node="">
</span><h2 data-dcnode-id="2313" id="link-0"><span data-dcnode-id="2314" instrument_node="">Fourth Defeated Attempt in Norway</span></h2><span data-dcnode-id="2312" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2311" instrument_node="">In my own home country of Norway, there has been a campaign for some years to lower the voting age from 18 to 16, and it has been unsuccessful thus far. </span><a data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stortinget.no/en/In-English/About-the-Storting/The-Constitution/" rel="nofollow"><span data-dcnode-id="2310" instrument_node="">Constitutional amendments</span></a><span data-dcnode-id="2308" instrument_node=""> in Norway need to be introduced in one parliamentary term, by approximately a year before the next election, and then voted on in the next term, requiring a two-thirds majority.</span></p><span data-dcnode-id="2306" instrument_node="">
</span><p data-dcnode-id="2295"><span data-dcnode-id="2305" instrument_node="">A constitutional bill to lower the voting age </span><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stortinget.no/no/Saker-og-publikasjoner/Saker/Sak/Voteringsoversikt/%3Fp%3D66403%26dnid%3D1" rel="nofollow"><span data-dcnode-id="2304" instrument_node="">failed</span></a><span data-dcnode-id="2302" instrument_node=""> in January for the fourth consecutive term. </span><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.regjeringen.no/no/tema/valg-og-demokrati/den-norske-valgordningen/forsok-med-stemmerett-for-16-aringer_2/forsok-med-stemmerett-for-16-aringer-2/id581646/" rel="nofollow"><span data-dcnode-id="2301" instrument_node="">Experiments</span></a><span data-dcnode-id="2299" instrument_node=""> with lowering the voting age to 16, limited to a small number of municipalities, were conducted in 2011 and 2015 during local elections. There were mixed results, according to evaluation reports from the </span><a data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norwegian_Institute_for_Social_Research" rel="nofollow"><span data-dcnode-id="2298" instrument_node="">Norwegian Institute for Social Research</span></a><span data-dcnode-id="2296" instrument_node="">.</span></p><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2238"><span class="rte-quote" data-dcnode-id="2239"><span data-dcnode-id="2293" instrument_node="">There is some law of gravity of politics that whatever has limits must come down to no limit at all.</span></span></p><ul class="social-links share-quotes" data-dcnode-id="2240"><span data-dcnode-id="2292" instrument_node="">
</span><div class="event-addthis" data-dcnode-id="2242"><span data-dcnode-id="2291" instrument_node="">
</span><li data-dcnode-id="2284"><span data-dcnode-id="2290" instrument_node="">
</span><a addthis:href="https://fee.org/articles/don-t-lower-the-voting-age-raise-it/" addthis:quote="There is some law of gravity of politics that whatever has limits must come down to no limit at all." addthis:title="There is some law of gravity of politics that whatever has limits must come down to no limit at all." class="fb-button" data-dcnode-id="2286" title="facebook"><span data-dcnode-id="2289" instrument_node="">
</span><i aria-hidden="true" class="fa fa-facebook" data-dcnode-id="2288"></i><span data-dcnode-id="2287" instrument_node="">
</span></a><span data-dcnode-id="2285" instrument_node="">

</span><p data-dcnode-id="2229"><span data-dcnode-id="2236" instrument_node="">In Parliament, support for lowering the voting age is currently at approximately 13 percent. According to Norwegian elections and democracy researcher </span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.samfunnsforskning.no/english/people/res/johaberg/index.html" rel="nofollow"><span data-dcnode-id="2235" instrument_node="">Johannes Bergh</span></a><span data-dcnode-id="2233" instrument_node="">, support among the public for lowering the voting age to 16 typically lies around 25 percent. An </span><a data-dcnode-id="2231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.minervanett.no/1-av-4-vil-heve-aldersgrensen-for-stemmerett/" rel="nofollow"><span data-dcnode-id="2232" instrument_node="">opinion poll conducted</span></a><span data-dcnode-id="2230" instrument_node=""> in January indicated support for a lower voting age was at 20 percent, whereas the support for a higher voting age was measured at 23 percent.</span></p><span data-dcnode-id="2228" instrument_node="">
</span><p data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">With all this beginning drive to lower the voting age, as if there is some law of gravity of politics that whatever has limits must come down to no limit at all, i.e., zero, perhaps we should start considering raising the voting age.</span></p><span data-dcnode-id="2225" instrument_node="">
</span><h2 data-dcnode-id="2223" id="link-1"><span data-dcnode-id="2224" instrument_node="">Classical Liberals on Suffrage</span></h2><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2221" instrument_node="">After all, </span><a data-dcnode-id="2219" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/people/f-a-hayek/" rel="nofollow"><span data-dcnode-id="2220" instrument_node="">Friedrich August von Hayek</span></a><span data-dcnode-id="2218" instrument_node=""> had an </span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Law%2C_Legislation_and_Liberty" rel="nofollow"><span data-dcnode-id="2217" instrument_node="">interesting proposal</span></a><span data-dcnode-id="2215" instrument_node=""> of letting people vote once in a lifetime, i.e., at 45, for candidates to the legislative assembly, of their own age, for a term of 15 years. The legislative assembly was, in von Hayek's idea, to be elected with 1/15 of the assembly each year, such that it would consist of members of 45-60 years of age.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2199"><span data-dcnode-id="2212" instrument_node="">Limiting and expanding suffrage has been an important part of the long development of democracy. The Frenchman </span><a data-dcnode-id="2210" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/people/benjamin-constant/" rel="nofollow"><span data-dcnode-id="2211" instrument_node="">Benjamin Constant</span></a><span data-dcnode-id="2209" instrument_node=""> is an example of a classical liberal who wanted </span><a data-dcnode-id="2207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//press.princeton.edu/titles/6564.html" rel="nofollow"><span data-dcnode-id="2208" instrument_node="">limited suffrage</span></a><span data-dcnode-id="2206" instrument_node="">. The Englishman </span><a data-dcnode-id="2204" data-toggle="popover" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/topics/John%2520Stuart%2520Mill" rel="nofollow"><span data-dcnode-id="2205" instrument_node="">John Stuart Mill</span></a><span data-dcnode-id="2203" instrument_node=""> proposed giving </span><a data-dcnode-id="2201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ebooks.adelaide.edu.au/m/mill/john_stuart/m645r/chapter8.html" rel="nofollow"><span data-dcnode-id="2202" instrument_node="">extra votes</span></a><span data-dcnode-id="2200" instrument_node=""> to the well-informed.</span></p><span data-dcnode-id="2198" instrument_node="">
</span><p data-dcnode-id="2142"><span class="rte-quote" data-dcnode-id="2143"><span data-dcnode-id="2197" instrument_node="">The epoch of unlimited suffrage and mass democracy has not exactly shown impressive results when it comes to limiting politics, government, and power.</span></span></p><ul class="social-links share-quotes" data-dcnode-id="2144"><span data-dcnode-id="2196" instrument_node="">

</span><p data-dcnode-id="2113"><span data-dcnode-id="2135" instrument_node="">More recently, </span><a data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//press.princeton.edu/titles/8756.html" rel="nofollow"><span data-dcnode-id="2134" instrument_node="">Bryan Caplan</span></a><span data-dcnode-id="2132" instrument_node=""> and later </span><a data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sup.org/books/title/%3Fid%3D26809" rel="nofollow"><span data-dcnode-id="2131" instrument_node="">Ilya Somin</span></a><span data-dcnode-id="2129" instrument_node=""> have </span><a data-dcnode-id="2127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Myth_of_the_Rational_Voter" rel="nofollow"><span data-dcnode-id="2128" instrument_node="">been</span></a><span data-dcnode-id="2126" instrument_node=""> arguing </span><a data-dcnode-id="2124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democracy_and_Political_Ignorance" rel="nofollow"><span data-dcnode-id="2125" instrument_node="">that</span></a><span data-dcnode-id="2123" instrument_node=""> democracies produce uninformed and irrational outcomes simply because it is irrational for a single voter to spend very much time studying the relevant issues given the very limited impact of a single vote in a mass democracy. </span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//press.princeton.edu/titles/10843.html" rel="nofollow"><span data-dcnode-id="2122" instrument_node="">Jason Brennan</span></a><span data-dcnode-id="2120" instrument_node=""> recently took it to the next level by proposing </span><a data-dcnode-id="2118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Against_Democracy" rel="nofollow"><span data-dcnode-id="2119" instrument_node="">replacing democracy</span></a><span data-dcnode-id="2117" instrument_node=""> with some sort of </span><a data-dcnode-id="2115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epistocracy" rel="nofollow"><span data-dcnode-id="2116" instrument_node="">epistocracy</span></a><span data-dcnode-id="2114" instrument_node="">, rule of the informed, starting small with limited experiments.</span></p><span data-dcnode-id="2112" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2111" instrument_node="">Now, should we be reversing the apparent one-way development of democracy? Given that the epoch of unlimited suffrage and mass </span><a data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theamericanconservative.com/articles/what-is-democracy-anyway/" rel="nofollow"><span data-dcnode-id="2110" instrument_node="">democracy</span></a><span data-dcnode-id="2108" instrument_node=""> has not exactly shown impressive results when it comes to limiting politics, government, and power, we should at the very least be open to it as an option.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><h2 data-dcnode-id="2104" id="link-2"><span data-dcnode-id="2105" instrument_node="">Why Raise the Voting Age?</span></h2><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">If we look at the voting age, adjusting it is certainly a very broad and general measure. Indeed any general voting age, i.e., not having individual requirements, will be based on an evaluation of people as a group—age group in this case—and not as individuals. It is also important to keep in mind that when it comes to voting, it is the number of votes that counts; the one single vote hardly matters at all. Arguments for raising the voting age—as for lowering it—will necessarily be less fine-tuned than those for more individually-oriented measures.</span></p><span data-dcnode-id="2100" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2099" instrument_node="">I </span><a data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bt.no/btmeninger/debatt/i/gPBRB1/stemmerettsalderen-br-heves" rel="nofollow"><span data-dcnode-id="2098" instrument_node="">have launched</span></a><span data-dcnode-id="2096" instrument_node=""> the idea that the (Norwegian) voting age should be </span><a data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nettavisen.no/meninger/friskemeninger/hev-stemmeretten-til-25-ar/3423482318.html" rel="nofollow"><span data-dcnode-id="2095" instrument_node="">raised to 25</span></a><span data-dcnode-id="2093" instrument_node="">. I have had the opportunity so far to </span><a data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//radio.nrk.no/sok%3Fq%3DJ.K.%2520Baltzersen" rel="nofollow"><span data-dcnode-id="2092" instrument_node="">argue for this position</span></a><span data-dcnode-id="2090" instrument_node=""> twice on </span><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NRK" rel="nofollow"><span data-dcnode-id="2089" instrument_node="">Norwegian national radio</span></a><span data-dcnode-id="2087" instrument_node="">.</span></p><span data-dcnode-id="2085" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2084" instrument_node="">The main argument is that there should be greater requirements for taking part in decisions for society as a whole—or in deciding for others, if you will—than for taking full legal responsibility for one’s own affairs. The anarchist position would be that such lording over others should not take place at all, but in any case, more responsibility would be better than less—for both </span><a data-dcnode-id="2082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Anarchism%23Anarcho-capitalism" rel="nofollow"><span data-dcnode-id="2083" instrument_node="">anarchists</span></a><span data-dcnode-id="2081" instrument_node=""> and </span><a data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rationalwiki.org/wiki/Minarchism" rel="nofollow"><span data-dcnode-id="2080" instrument_node="">minarchists</span></a><span data-dcnode-id="2078" instrument_node="">.</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2075" instrument_node="">These requirements involve maturity and life and work experience, but they also involve having paid an accumulative share of taxes before receiving loads of free stuff from the government, incentivizing more responsibility. </span><span class="rte-quote" data-dcnode-id="2020"><span data-dcnode-id="2074" instrument_node="">Young people should be involved in their own lives, not politics.</span></span></p><ul class="social-links share-quotes" data-dcnode-id="2021"><span data-dcnode-id="2073" instrument_node="">

</span><a addthis:href="https://fee.org/articles/don-t-lower-the-voting-age-raise-it/" addthis:quote="Young people should be involved in their own lives, not politics." addthis:title="Young people should be involved in their own lives, not politics." class="addthis_button_reddit at300b" data-dcnode-id="2035" href="#" target="_blank" title="reddit"><span data-dcnode-id="2038" instrument_node="">

</span><a addthis:href="https://fee.org/articles/don-t-lower-the-voting-age-raise-it/" addthis:quote="Young people should be involved in their own lives, not politics." addthis:title="Young people should be involved in their own lives, not politics." class="addthis_button_more at300b" data-dcnode-id="2027" href="#" target="_blank" title="more"><span data-dcnode-id="2030" instrument_node="">
</span><i aria-hidden="true" class="fa fa-plus-square-o" data-dcnode-id="2029"></i><span data-dcnode-id="2028" instrument_node="">
</span></a><span data-dcnode-id="2026" instrument_node="">
</span></li><span data-dcnode-id="2024" instrument_node="">
</span></div><span data-dcnode-id="2022" instrument_node="">
</span></ul><span data-dcnode-id="2019" instrument_node=""> The latter is more relevant the more so-called generous the welfare state is, but it still is relevant in most countries, even the United States, where so-called democratic socialism is apparently growing in popularity.</span><p></p><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">We hear the argument that young people need to be involved in politics, so a low voting age, i.e., letting the young vote, is a good way of including them. No, they don’t need to be involved in politics. A free society with limitations on power and low involvement of government in society needs to have less such involvement. Young people should be involved in their own lives, not politics.</span></p><span data-dcnode-id="2014" instrument_node="">
</span><h2 data-dcnode-id="2012" id="link-3"><span data-dcnode-id="2013" instrument_node="">No Fringe Opinion</span></h2><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">As mentioned, there was an opinion poll in Norway in January showing 23 percent support for a higher voting age. Polling for support for a higher voting age is not very common, as the unawareness of any such polls of prominent Norwegian elections and democracy researcher Johannes Bergh should bear witness.</span></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2007" instrument_node="">The January poll was conducted by </span><a data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsanalyse.no/om-oss/" rel="nofollow"><span data-dcnode-id="2006" instrument_node="">a polling agency</span></a><span data-dcnode-id="2004" instrument_node=""> upon my request, and the respondents were asked what they would set the voting age to if they themselves could freely set it with no limiting or guiding alternatives. Hence, it has been shown that there likely is considerable support for raising the voting age; it is not a fringe position. I would encourage more such polling, not taking the one-way development for granted.</span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Let's go the other way than what those Oregon legislators are suggesting. Given how the reach and size of government have grown as the franchise has been expanded, there is reason to believe there is empirical evidence that people have been voting themselves other people's money. Hence, looking at ways of reducing the franchise should at least be explored. Raising the voting age should certainly seriously be considered.</span></p><span data-dcnode-id="1999" instrument_node="">

%2C0.5083333333333333&amp;mode=crop&amp;height=200&amp;widthratio=2.0171673819742489270386266094&amp;rnd=132097531300000000&amp;format=webp" type="image/webp"><img alt="" data-dcnode-id="1748" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/media/34572/hong-kong.jpg%3Fcenter%3D0.5775%252C0.5083333333333333%26mode%3Dcrop%26height%3D200%26widthratio%3D2.0171673819742489270386266094%26rnd%3D132097531300000000&amp;raw"></picture></a></div></div></div></div><div class="related-article-info col-sm-8" data-dcnode-id="1727"><h2 data-dcnode-id="1739"><a data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/mass-peaceful-demonstrations-protect-hong-kongs-autonomy-from-china-for-now/%3Fitm_source%3Dparsely-api"><span data-dcnode-id="1741" instrument_node="">Mass Peaceful Demonstrations Protect Hong Kong's Autonomy from China—for Now</span></a></h2><div class="meta" data-dcnode-id="1728"><div class="author-info float-none" data-dcnode-id="1734"><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/people/kelly-chernin"><span data-dcnode-id="1738" instrument_node="">Kelly Chernin</span></a><span data-dcnode-id="1736" instrument_node=""> - </span><span data-dcnode-id="1735" instrument_node="">6/19/2019</span></div><div class="share-comment float-none addthis_toolbox" data-dcnode-id="1729"><a class="addthis_button_more first at300b" data-addthis-title="Mass Peaceful Demonstrations Protect Hong Kong's Autonomy from China—for Now" data-addthis-url="https://fee.org/articles/mass-peaceful-demonstrations-protect-hong-kongs-autonomy-from-china-for-now/?itm_source=parsely-api" data-dcnode-id="1732" href="#" target="_blank" title="More"><img alt="" data-dcnode-id="1733" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/images/ico-share.png&amp;raw" title="Share"></a><a class="disqus_thread" data- ebp"><img alt="" data-dcnode-id="1696" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/media/39364/first-woman-mayor.png%3Fanchor%3Dcenter%26mode%3Dcrop%26height%3D200%26widthratio%3D2.0171673819742489270386266094%26rnd%3D132618336870000000&amp;raw"></picture></a></div></div></div></div><div class="related-article-info col-sm-8" data-dcnode-id="1675"><h2 data-dcnode-id="1687"><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/susanna-m-salter-the-first-woman-mayor/%3Fitm_source%3Dparsely-api"><span data-dcnode-id="1689" instrument_node="">Susanna M. Salter: The First Woman Mayor</span></a></h2><div class="meta" data-dcnode-id="1676"><div class="author-info float-none" data-dcnode-id="1682"><a data-dcnode-id="1685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/people/lawrence-w-reed"><span data-dcnode-id="1686" instrument_node="">Lawrence W. Reed</span></a><span data-dcnode-id="1684" instrument_node=""> - </span><span data-dcnode-id="1683" instrument_node="">4/4/2021</span></div><div class="share-comment float-none addthis_toolbox" data-dcnode-id="1677"><a class="addthis_button_more first at300b" data-addthis-title="Susanna M. Salter: The First Woman Mayor" data-addthis-url="https://fee.org/articles/susanna-m-salter-the-first-woman-mayor/?itm_source=parsely-api" data-dcnode-id="1680" href="#" target="_blank" title="More"><img alt="" data-dcnode-id="1681" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/images/ico-share.png&amp;raw" title="Share"></a><a class="disqus_thread" data-dcnode-id="1679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/susanna-m-salter-the-first-woman-mayor/%3Fitm_source%3Dparsely-api%23disqus_thread"></a><div class="atclear" data-dcnode-id="1678"></div></div></div></div></div></div></div></div></section></section><span data-dcnode-id="1668" instrument_node="">

</span><section data-article-id="179848" data-dcnode-id="282" id="infinite-scroll"><div class="article-container" data-dcnode-id="286"><div data-dcnode-id="918" style="position: relative;"><section class="text-left infinite-article-detail-container print75" data-dcnode-id="920"><div class="container" data-dcnode-id="921"><div class="row" data-dcnode-id="922"><div class="offset-lg-2 col-lg-8" data-dcnode-id="923"><div class="single-article" data-dcnode-id="924"><div class="article-about" data-dcnode-id="1660"><a class="article-link" data-dcnode-id="1663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/celebrating-freedom-in-prague-three-decades-after-its-liberation-from-soviet-socialism/"><h1 class="article-republish-title" data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Celebrating Freedom in Prague—Three Decades After Its Liberation from Soviet Socialism</span></h1></a><h6 class="sub-heading article-date" data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Saturday, April 23, 2022</span></h6></div><div class="article-body-cont infinite-article-body more-articles" data-dcnode-id="930" responsive-videos="true"><div class="article-body-text" data-dcnode-id="1020"><p data-dcnode-id="1652"><span data-dcnode-id="1659" instrument_node="">PRAGUE, CZECH REPUBLIC—I am in one of my favorite cities this weekend to deliver a speech at </span><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//studentsforliberty.org/europe/" rel="nofollow"><span data-dcnode-id="1658" instrument_node="">European Students for Liberty’s</span></a><span data-dcnode-id="1656" instrument_node=""> big </span><a data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//libertycon.net/" rel="nofollow"><span data-dcnode-id="1655" instrument_node="">LibertyCon</span></a><span data-dcnode-id="1653" instrument_node=""> conference. Hundreds of students have gathered here in the Czech Republic from all over Europe. As a venue to celebrate liberty, few cities can compare to beautiful Prague.</span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1650" instrument_node="">This is one of the countries of Eastern Europe that suffered under decades of Soviet-imposed socialism. When new leadership began inching away from that hellish nightmare in 1968, Soviet and Warsaw Pact forces rolled in with tanks and guns. As I’ve written before (</span><a data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/remembering-prague-spring/" rel="nofollow"><span data-dcnode-id="1649" instrument_node="">here</span></a><span data-dcnode-id="1647" instrument_node=""> and </span><a data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/the-sound-of-freedom/" rel="nofollow"><span data-dcnode-id="1646" instrument_node="">here</span></a><span data-dcnode-id="1644" instrument_node="">), that despicable invasion prompted a 14-year-old from Beaver Falls, Pennsylvania, to get involved in the cause of liberty. (His name rhymes with “Seed.”)</span></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1641" instrument_node="">This is the country that was sacrificed to Adolf Hitler at the 1938 Munich Conference. Neville Chamberlain of Britain brandished the worthless agreement back home as producing “peace in our time.” Less than a year later, World War II began in Europe and in the months in between, </span><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/resources/the-story-of-nicholas-winton/" rel="nofollow"><span data-dcnode-id="1640" instrument_node="">a young stockbroker named Nicholas Winton</span></a><span data-dcnode-id="1638" instrument_node=""> labored feverishly to help hundreds of Jewish children escape before the conflict started.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1635" instrument_node="">Czechoslovakia (now two countries, the Czech Republic and Slovakia) is where a courageous student, </span><a data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rferl.org/a/29714035.html" rel="nofollow"><span data-dcnode-id="1634" instrument_node="">Jan Palach</span></a><span data-dcnode-id="1632" instrument_node="">, gave his life by self-immolation to protest the Soviet invasion.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1629" instrument_node="">In November 1989, I was in Warsaw, Poland, for the first time since the communist regime </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fee.org/articles/a-tribute-to-the-polish-people/" rel="nofollow"><span data-dcnode-id="1628" instrument_node="">threw me out</span></a><span data-dcnode-id="1626" instrument_node=""> just three years earlier. Soviet satellites were falling like dominoes that year. The Berlin Wall had come down just days before Polish friends and I assembled for dinner at Wierzynek Restaurant in Krakow. During our meal, another friend arrived and announced, “A million people are demonstrating in Wenceslaus Square in Prague right now, demanding the resignation of the communist government!”</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">We all raised a glass to the imminently successful Velvet Revolution.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1620" instrument_node="">This is the country that produced a famous playwright who later became a famous president of a free Czechoslovakia, </span><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pen.org/vaclav-havel-constant-champion-for-freedom-of-expression/" rel="nofollow"><span data-dcnode-id="1619" instrument_node="">Vaclav Havel</span></a><span data-dcnode-id="1617" instrument_node="">. Another recent Czech president with the same first name, </span><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.klaus.cz/clanky/3634" rel="nofollow"><span data-dcnode-id="1616" instrument_node="">Vaclav Klaus</span></a><span data-dcnode-id="1614" instrument_node="">, warned the world about such dangers as global warming extremism and the centralizing tendencies of the European Union.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1611" instrument_node="">Prague is where you can visit a terrific museum that documents the stupidity and </span><a data-dcnode-id="1609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elamerican.com/every-country-needs-museum-communism/" rel="nofollow"><span data-dcnode-id="1610" instrument_node="">brutality of communism</span></a><span data-dcnode-id="1608" instrument_node="">. Located near the foot of Wenceslaus Square, don’t miss it if you’re ever in town.</span></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1605" instrument_node="">One spot in Prague is almost magical. It’s the Charles Bridge over the Vltava River in the center of the city. Completed in 1402 after 45 years of construction, it’s the oldest bridge in town and one of the most famous on the continent. Fortified by medieval Gothic towers at both ends of its 1,700-foot span, it is now an exclusively-pedestrian walkway lined with artists, musicians, and souvenir vendors. Thirty sculptures adorn the bridge, 15 on each side. On every occasion, including this visit, I requested one of the local violinists play “Amazing Grace” as I gazed uphill at </span><a data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prague_Castle" rel="nofollow"><span data-dcnode-id="1604" instrument_node="">Prague Castle</span></a><span data-dcnode-id="1602" instrument_node="">, the largest ancient castle in the world (dating from the 8th Century). Instant goosebumps!</span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Prague was a delightful, peaceful city of history, music, and freedom before 1939. It would be 50 years before it would be free and vibrant again. More than 30 years now since its liberation from Soviet socialism, its charm is greater than ever.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1596" instrument_node="">According to the Heritage Foundation’s </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heritage.org/index/country/czechrepublic" rel="nofollow"><span data-dcnode-id="1595" instrument_node="">Index of Economic Freedom</span></a><span data-dcnode-id="1593" instrument_node="">, the Czech Republic is the world’s 21st freest nation (Slovakia ranks nearly as high, at #36). A few hundred miles to the east, Moscow is terrorizing yet another nation, Ukraine. But here in Prague, I can only marvel at the stunning changes from the pain and stagnation this country endured under the Soviet thumb.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Thank you, European Students for Liberty, for hosting this year’s LibertyCon in such a wonderful place!</span></p><span data-dcnode-id="1588" instrument_node="">

-id="929" instrument_node="">Continue Reading</span><span class="fa fa-angle-down" data-dcnode-id="928"></span></a></div></div></div></div></div></div></section><hr class="hr" data-dcnode-id="919"></div><div data-dcnode-id="287" style="position: relative;"><section class="text-left infinite-article-detail-container print75" data-dcnode-id="289"><div class="container" data-dcnode-id="290"><div class="row" data-dcnode-id="291"><div class="offset-lg-2 col-lg-8" data-dcnode-id="292"><div class="single-article" data-dcnode-id="293"><div class="article-about" data-dcnode-id="912"><a class="article-link" data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/articles/the-biggest-reason-netflix-shares-are-tanking/"><h1 class="article-republish-title" data-dcnode-id="916"><span data-dcnode-id="917" instrument_node=""> The Biggest Reason Netflix Shares Are Tanking</span></h1></a><h6 class="sub-heading article-date" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Saturday, April 23, 2022</span></h6></div><div class="article-body-cont infinite-article-body more-articles" data-dcnode-id="299" responsive-videos="true"><div class="article-body-text" data-dcnode-id="349"><p data-dcnode-id="907"><span data-dcnode-id="911" instrument_node="">When asked about the best way to fight monopolies in his documentary series </span><a data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.imdb.com/title/tt0852785/" rel="nofollow"><span data-dcnode-id="910" instrument_node="">Free to Choose</span></a><span data-dcnode-id="908" instrument_node="">, Milton Friedman had a firm answer: “the free market.” Some of his guests had other positions and argued that government intervention was necessary, but Friedman didn’t buy it.</span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">The Netflix case has proved Friedman right, once again.</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="902" instrument_node="">On Wednesday, Netflix shares plunged </span><a data-anchor="?consumer=googlenews" data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.latimes.com/entertainment-arts/business/story/2022-04-20/lat-et-ct-netflix-stock-plunges%3Fconsumer%3Dgooglenews"><span data-dcnode-id="901" instrument_node="">an impressive 36 percent</span></a><span data-dcnode-id="899" instrument_node="">. Conventional press releases blamed the loss of subscribers as the main cause for the crumbling value of the entertainment company. Others blamed Netflix's ideological story lines, which in recent times have been advocating mainly leftist causes. These factors are undoubtedly part of the reason why its shares in the market crumbled, but the main reason was far more straightforward: competition.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="896" instrument_node="">No one can doubt that Netflix’s founders were forerunners. They discovered or created the subscription-based entertainment service, and they, far from selling or renting movies, as Blockbuster did, reinvented the industry. In 2016 an article was published in </span><em data-dcnode-id="893"><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/hollywood-fears-the-netflix-monopoly-2016-9" rel="nofollow"><span data-dcnode-id="895" instrument_node="">Business Insider</span></a></em><span data-dcnode-id="892" instrument_node=""> that claimed Hollywood was terrified that Netflix would become a huge monopoly that would displace them. However, as usually happens in any society where there is capital, opportunity, and space for free competition, soon other companies began to copy Netflix's business model and provide better service: cheaper prices, shared subscriptions with advertising, other productions, among other perks, which gradually began to bring down Netflix's solitary reign.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Netflix knows it, too. They argue that the emergence of competitors (Disney, HBO, Amazon, among others) is one of the causes of the loss of customers. Of course, there’s also prices, ideology, and programming—there are a number of factors that have caused thousands of people to leave Netflix—but the main thing is that people have the ability to freely choose their entertainment service provider.</span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="886" instrument_node="">Now Netflix will have to adjust its rates, plans, and programming in an attempt to regain lost customers, and will surely backtrack on its intentions to increase subscription prices; in fact, it has been rumored that the company may be considering the possibility of implementing </span><em data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">cheaper </span></em><span data-dcnode-id="883" instrument_node="">subscriptions with the inclusion of advertising.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Regardless of which company ends up being the one that consolidates as the most powerful in the entertainment market, we should all be grateful to have a healthy competition that allows us all to have better and cheaper services, because surely without such competition Netflix could unilaterally set the prices they see fit and include the programming that their directors establish without thinking about the consumer. Most likely this setback will make them rethink the editorial line of programming they have adopted in recent times.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Americans should be grateful to have in the country different large companies competing among themselves for customers. That is the essence of capitalism and the free market, and it is the reason why the United States has been such a successful nation. In Venezuela, the country where I was born and spent 27 years of my life, due to the shortage of products because of the enormous state intervention in the economy, I was forced on many occasions to buy soaps, deodorants, food, and other products of very poor quality and at high prices, because we could only buy what the government bureaucrats offered.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Similarly, I spent years of my life having electricity and water cuts that sometimes lasted 48 hours, because the government was the entity that managed the basic service companies, with the supposed intention of making it more accessible to the entire population. As it turns out—thanks to this intervention—no one in the whole country could enjoy smooth electricity service, a problem that remains to this day.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">So as we watch Netflix shares fall, let’s be thankful and celebrate the market process, including the large companies and consolidation it creates. Because I assure you that if these big companies commit any irregularity or fail to comply with consumer demands, the market will put them in their place in a timely manner, something that the government will never be able to do.</span></p><span data-dcnode-id="869" instrument_node="">
