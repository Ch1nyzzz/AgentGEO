></a><div class="article-source ellipsis" data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">2021, Electoral Studies</span></div></div><div class="buttons" data-dcnode-id="444"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="445" type="button"><span class="button-link-text" data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="446" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="447"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="439"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="440" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="441"><p data-dcnode-id="442" id="abspara0010"><span data-dcnode-id="443" instrument_node="">If two elections are held at the same day, why do some people choose to vote in one but to abstain in another? We argue that selective abstention is driven by the same factors that determine voter turnout. Our empirical analysis focuses on Sweden where the (aggregate) turnout gap between local and national elections has been about 2–3%. Rich administrative register data reveal that people from higher socio-economic backgrounds, immigrants, women, older individuals, and people who have been less geographically mobile are less likely to selectively abstain.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="420"><div class="sub-heading" data-dcnode-id="432"><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261379420300469" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="436" id="citing-articles-article1-title"><span data-dcnode-id="437" instrument_node="">Theoretically, yes, but also empirically? How the corruption-turnout link is marginally explained by civic duty to vote</span></h3></a><div class="article-source ellipsis" data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">2020, Electoral Studies</span></div></div><div class="buttons" data-dcnode-id="426"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="427" type="button"><span class="button-link-text" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="428" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="429"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="421"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="422" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="423"><p data-dcnode-id="424" id="abspara0010"><span data-dcnode-id="425" instrument_node="">Corruption is generally associated with low electoral participation. A recurrent explanation of the negative correlation between corruption and electoral turnout involves the rational calculus of the costs and benefits of voting. More specifically, in a context of high corruption, citizens do not vote because they think that doing so will hardly affect policy decisions. A number of influential studies has argued that corruption affects citizens' electoral engagement in a different and more fundamental way as well: It erodes their sense of civic duty to vote in elections. Yet, a relation between corruption and civic duty and a mediation effect of the attitude remains empirically untested. This article examines empirically whether perceived corruption and sense of civic duty are correlated, as well as whether civic duty mediates the relation between perceived corruption and turnout. It does so with the pooled Making Electoral Democracy Work data, as these data contain measures on individuals’ sense of civic duty to vote in four election levels, namely, national, regional, European, and municipal elections, as well as on their perception of corruption in each of these government levels, and on their participation in these four election levels as well. I find a weak relation between perceived corruption and civic duty, and a low mediation effect of the attitude (compared with rational factors), irrespective of the election level.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="402"><div class="sub-heading" data-dcnode-id="414"><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261379418303469" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="418" id="citing-articles-article2-title"><span data-dcnode-id="419" instrument_node="">If you ask, they will come (to register and vote): Field experiments with state election agencies on encouraging voter registration</span></h3></a><div class="article-source ellipsis" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">2020, Electoral Studies</span></div></div><div class="buttons" data-dcnode-id="408"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="409" type="button"><span class="button-link-text" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="410" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="411"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="403"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="404" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="405"><p data-dcnode-id="406" id="abspara0010"><span data-dcnode-id="407" instrument_node="">We address the frequent critique that voter registration is a barrier to participation in the US. Institutional reforms to voter registration produce only small impacts on participation. We show the registration barrier can be reduced without changing laws or administrative processes using official communication seeking to change individual political behavior. In collaboration with state election agencies in two states, we conducted large-scale field experiments using low cost postcards aimed at increasing registration among eligible but unregistered citizens. The experiments find statistically and substantively significant effects on registration and turnout in subsequent elections. The research partnership with election officials is unusual and important for understanding electoral participation. Further, the population targeted for registration is broader than prior experiments on voter registration in the US. The results provide important insights about voter registration as a barrier to political participation, plus practical guidance for election officials to reduce this barrier.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="391"><div class="sub-heading" data-dcnode-id="396"><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/S0003055422000144" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="400" id="citing-articles-article3-title"><span data-dcnode-id="401" instrument_node="">The Ex-Factor: Examining the Gendered Effect of Divorce on Voter Turnout</span></h3></a><div class="article-source ellipsis" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">2022, American Political Science Review</span></div></div><div class="buttons" data-dcnode-id="395"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="392"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="393" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="394"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="380"><div class="sub-heading" data-dcnode-id="385"><a data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/S1743923X21000386" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="389" id="citing-articles-article4-title"><span data-dcnode-id="390" instrument_node="">Who Does the Caring? Gender Disparities in COVID-19 Attitudes and Behaviors</span></h3></a><div class="article-source ellipsis" data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">2022, Politics and Gender</span></div></div><div class="buttons" data-dcnode-id="384"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="381"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="382" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="383"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="369"><div class="sub-heading" data-dcnode-id="374"><a data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/S0007123419000644" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="378" id="citing-articles-article5-title"><span data-dcnode-id="379" instrument_node="">The Cultural Sources of the Gender Gap in Voter Turnout</span></h3></a><div class="article-source ellipsis" data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">2021, British Journal of Political Science</span></div></div><div class="buttons" data-dcnode-id="373"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="370"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="371" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="372"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85041555670%26md5%3D71c3c8236f51c1a9a4afdc4b259614b" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="366" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="367"></path></svg><span class="button-alternative-text" data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="243"><dl class="footnote" data-dcnode-id="336"><dt class="footnote-label" data-dcnode-id="355"><sup data-dcnode-id="356"><a data-dcnode-id="357" href="#bfn1"><span data-dcnode-id="358" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="337"><p data-dcnode-id="338" id="ntpara0010"><span data-dcnode-id="354" instrument_node="">In this article, I adopt the classical perspective of political participation as actions “aimed at influencing the selection of government personnel and/or the actions they take” (</span><a class="workspace-trigger" data-dcnode-id="352" href="#bib80" name="bbib80"><span data-dcnode-id="353" instrument_node="">Verba and Nie, 1972</span></a><span data-dcnode-id="351" instrument_node="">: 2). This broad definition includes ‘conventional’ actions –e.g. voting, contacting politicians– and ‘unconventional’ actions –e.g. joining demonstrations–, but excludes actions such as political consumerism that are not directly aimed at electing/influencing government officials. It is important to note, however, that a growing literature shows that women are more actively involved in ‘emerging’ or non-institutionalized forms of political participation, such as boycotting products or signing petitions (</span><a class="workspace-trigger" data-dcnode-id="349" href="#bib18" name="bbib18"><span data-dcnode-id="350" instrument_node="">Coffé and Bolzendahl, 2010</span></a><span data-dcnode-id="348" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="346" href="#bib58" name="bbib58"><span data-dcnode-id="347" instrument_node="">Marien et al., 2010</span></a><span data-dcnode-id="345" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="343" href="#bib75" name="bbib75"><span data-dcnode-id="344" instrument_node="">Stolle and Hooghe, 2011</span></a><span data-dcnode-id="342" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="340" href="#bib76" name="bbib76"><span data-dcnode-id="341" instrument_node="">Stolle et al., 2005</span></a><span data-dcnode-id="339" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="325"><dt class="footnote-label" data-dcnode-id="332"><sup data-dcnode-id="333"><a data-dcnode-id="334" href="#bfn2"><span data-dcnode-id="335" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="326"><p data-dcnode-id="327" id="ntpara0015"><span data-dcnode-id="331" instrument_node="">Due to space constraints, I do not present the predicted probabilities of engaging in other political activities for female and male respondents. But these additional estimations are available in </span><a class="workspace-trigger" data-dcnode-id="329" href="#appsec1" name="bappsec1"><span data-dcnode-id="330" instrument_node="">Table A1</span></a><span data-dcnode-id="328" instrument_node=""> in the online Appendix.</span></p></dd></dl><dl class="footnote" data-dcnode-id="317"><dt class="footnote-label" data-dcnode-id="321"><sup data-dcnode-id="322"><a data-dcnode-id="323" href="#bfn3"><span data-dcnode-id="324" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="318"><p data-dcnode-id="319" id="ntpara0020"><span data-dcnode-id="320" instrument_node="">In their analysis, they consider the participatory inequalities in terms of gender, age, education, and locality.</span></p></dd></dl><dl class="footnote" data-dcnode-id="309"><dt class="footnote-label" data-dcnode-id="313"><sup data-dcnode-id="314"><a data-dcnode-id="315" href="#bfn4"><span data-dcnode-id="316" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="310"><p data-dcnode-id="311" id="ntpara0025"><span data-dcnode-id="312" instrument_node="">The countries included in the 2014 ISSP module are: Austria; Australia; Belgium; Switzerland; Chile; Czech Republic; Germany; Denmark; Spain; Finland; France; Great Britain; Georgia; Croatia; Hungary; Israel; India; Iceland; Japan; Republic of Korea; Lithuania; the Netherlands; Norway; Philippines; Poland; Russia; Sweden; Slovenia; Slovakia; Turkey; the United States; Venezuela; and South Africa.</span></p></dd></dl><dl class="footnote" data-dcnode-id="301"><dt class="footnote-label" data-dcnode-id="305"><sup data-dcnode-id="306"><a data-dcnode-id="307" href="#bfn5"><span data-dcnode-id="308" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="302"><p data-dcnode-id="303" id="ntpara0030"><span data-dcnode-id="304" instrument_node="">Unfortunately, other cross-national public opinion surveys such as the European Social Surveys, the AmericasBarometer, or the Comparative Study of Electoral Systems do not include variables to capture the civic duty to vote.</span></p></dd></dl><dl class="footnote" data-dcnode-id="290"><dt class="footnote-label" data-dcnode-id="297"><sup data-dcnode-id="298"><a data-dcnode-id="299" href="#bfn6"><span data-dcnode-id="300" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="291"><p data-dcnode-id="292" id="ntpara0035"><span data-dcnode-id="296" instrument_node="">The reason for creating a dichotomous variable is that the variations at the low end of the scale (e.g. from 1 to 2 or from 2 to 3) are not relevant for this analysis. What I want to assess is whether women are more likely to feel a strong sense of civic duty (i.e. to place themselves at the high end of the scale). However, using the continuous variable rather than the dummy variable does not change the results. These alternative models are available in </span><a class="workspace-trigger" data-dcnode-id="294" href="#appsec1" name="bappsec1"><span data-dcnode-id="295" instrument_node="">Tables A3 and A4</span></a><span data-dcnode-id="293" instrument_node=""> in the online Appendix.</span></p></dd></dl><dl class="footnote" data-dcnode-id="282"><dt class="footnote-label" data-dcnode-id="286"><sup data-dcnode-id="287"><a data-dcnode-id="288" href="#bfn7"><span data-dcnode-id="289" instrument_node="">7</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="283"><p data-dcnode-id="284" id="ntpara0040"><span data-dcnode-id="285" instrument_node="">These predicted probabilities suggest that the civic duty to vote is weak in early adulthood and becomes stronger during the life-cycle. This suggests that the perception that voting is a duty is constantly being reinforced as citizens are exposed to more electoral processes during their adult life.</span></p></dd></dl><dl class="footnote" data-dcnode-id="271"><dt class="footnote-label" data-dcnode-id="278"><sup data-dcnode-id="279"><a data-dcnode-id="280" href="#bfn8"><span data-dcnode-id="281" instrument_node="">8</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="272"><p data-dcnode-id="273" id="ntpara0045"><span data-dcnode-id="277" instrument_node="">Since the models include dichotomous variables, the coefficients have to be rescaled (standardized) before the mediation effect can be estimated (</span><a class="workspace-trigger" data-dcnode-id="275" href="#bib51" name="bbib51"><span data-dcnode-id="276" instrument_node="">Kenny, 2013</span></a><span data-dcnode-id="274" instrument_node="">). Given the hierarchical structure of the data, I added country fixed effects to the list of covariates in this estimation.</span></p></dd></dl><dl class="footnote" data-dcnode-id="260"><dt class="footnote-label" data-dcnode-id="267"><sup data-dcnode-id="268"><a data-dcnode-id="269" href="#bfn9"><span data-dcnode-id="270" instrument_node="">9</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="261"><p data-dcnode-id="262" id="ntpara0050"><span data-dcnode-id="266" instrument_node="">Fieldwork was conducted by the institute TNS-Sofres in all seven countries. In each country, nationally representative samples were drawn from existing online panels which include several hundred thousands of email addresses, randomly chosen with a simple stratification by region. In order to overcome the well-known sociodemographic biases of internet samples, quotas on sex, age, and social status were also imposed (</span><a class="workspace-trigger" data-dcnode-id="264" href="#bib69" name="bbib69"><span data-dcnode-id="265" instrument_node="">Sauger et al., 2015</span></a><span data-dcnode-id="263" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="252"><dt class="footnote-label" data-dcnode-id="256"><sup data-dcnode-id="257"><a data-dcnode-id="258" href="#bfn10"><span data-dcnode-id="259" instrument_node="">10</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="253"><p data-dcnode-id="254" id="ntpara0055"><span data-dcnode-id="255" instrument_node="">The descriptive statistics are as follows: no civic duty (0): 21%, moderate civic duty (1): 34.5%, high civic duty (2): 26%, and very high civic duty (3): 18.5%.</span></p></dd></dl><dl class="footnote" data-dcnode-id="244"><dt class="footnote-label" data-dcnode-id="248"><sup data-dcnode-id="249"><a data-dcnode-id="250" href="#bfn11"><span data-dcnode-id="251" instrument_node="">11</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="245"><p data-dcnode-id="246" id="ntpara0060"><span data-dcnode-id="247" instrument_node="">In this model, 29% of the total effect of “female” on “electoral participation” is mediated through “civic duty,” which again shows that there is a (partial) mediation.</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0261379417303815"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2018 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up but
