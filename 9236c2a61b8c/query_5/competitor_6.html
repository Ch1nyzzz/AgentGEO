 data-dcnode-id="5493"><span data-dcnode-id="5494" instrument_node="">0.022***</span></td><td class="align-left" data-dcnode-id="5491"><span data-dcnode-id="5492" instrument_node="">−0.001</span></td><td class="align-left" data-dcnode-id="5489"><span data-dcnode-id="5490" instrument_node="">0.007**</span></td></tr><tr class="valign-top" data-dcnode-id="5481"><td class="align-left" data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">(0.003)</span></td><td class="align-left" data-dcnode-id="5484"><span data-dcnode-id="5485" instrument_node="">(0.003)</span></td><td class="align-left" data-dcnode-id="5482"><span data-dcnode-id="5483" instrument_node="">(0.003)</span></td></tr><tr class="valign-top" data-dcnode-id="5472"><td class="align-left" data-dcnode-id="5479" rowspan="2"><span data-dcnode-id="5480" instrument_node="">Political interest</span></td><td class="align-left" data-dcnode-id="5477"><span data-dcnode-id="5478" instrument_node="">0.515***</span></td><td class="align-left" data-dcnode-id="5475"><span data-dcnode-id="5476" instrument_node="">0.412***</span></td><td class="align-left" data-dcnode-id="5473"><span data-dcnode-id="5474" instrument_node="">0.456***</span></td></tr><tr class="valign-top" data-dcnode-id="5465"><td class="align-left" data-dcnode-id="5470"><span data-dcnode-id="5471" instrument_node="">(0.014)</span></td><td class="align-left" data-dcnode-id="5468"><span data-dcnode-id="5469" instrument_node="">(0.014)</span></td><td class="align-left" data-dcnode-id="5466"><span data-dcnode-id="5467" instrument_node="">(0.013)</span></td></tr><tr class="valign-top" data-dcnode-id="5456"><td class="align-left" data-dcnode-id="5463" rowspan="2"><span data-dcnode-id="5464" instrument_node="">Employment status</span></td><td class="align-left" data-dcnode-id="5461"><span data-dcnode-id="5462" instrument_node="">−0.030</span></td><td class="align-left" data-dcnode-id="5459"><span data-dcnode-id="5460" instrument_node="">−0.127***</span></td><td class="align-left" data-dcnode-id="5457"><span data-dcnode-id="5458" instrument_node="">−0.109***</span></td></tr><tr class="valign-top" data-dcnode-id="5449"><td class="align-left" data-dcnode-id="5454"><span data-dcnode-id="5455" instrument_node="">(0.024)</span></td><td class="align-left" data-dcnode-id="5452"><span data-dcnode-id="5453" instrument_node="">(0.026)</span></td><td class="align-left" data-dcnode-id="5450"><span data-dcnode-id="5451" instrument_node="">(0.023)</span></td></tr><tr class="valign-top" data-dcnode-id="5440"><td class="align-left" data-dcnode-id="5447" rowspan="2"><span data-dcnode-id="5448" instrument_node="">Urban</span></td><td class="align-left" data-dcnode-id="5445"><span data-dcnode-id="5446" instrument_node="">−0.076***</span></td><td class="align-left" data-dcnode-id="5443"><span data-dcnode-id="5444" instrument_node="">−0.105***</span></td><td class="align-left" data-dcnode-id="5441"><span data-dcnode-id="5442" instrument_node="">0.074***</span></td></tr><tr class="valign-top" data-dcnode-id="5433"><td class="align-left" data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">(0.025)</span></td><td class="align-left" data-dcnode-id="5436"><span data-dcnode-id="5437" instrument_node="">(0.027)</span></td><td class="align-left" data-dcnode-id="5434"><span data-dcnode-id="5435" instrument_node="">(0.023)</span></td></tr><tr class="valign-top" data-dcnode-id="5424"><td class="align-left" data-dcnode-id="5431" rowspan="2"><span data-dcnode-id="5432" instrument_node="">Constant</span></td><td class="align-left" data-dcnode-id="5429"><span data-dcnode-id="5430" instrument_node="">−1.511***</span></td><td class="align-left" data-dcnode-id="5427"><span data-dcnode-id="5428" instrument_node="">−2.437***</span></td><td class="align-left" data-dcnode-id="5425"><span data-dcnode-id="5426" instrument_node="">−1.516***</span></td></tr><tr class="valign-top" data-dcnode-id="5417"><td class="align-left" data-dcnode-id="5422"><span data-dcnode-id="5423" instrument_node="">(0.129)</span></td><td class="align-left" data-dcnode-id="5420"><span data-dcnode-id="5421" instrument_node="">(0.134)</span></td><td class="align-left" data-dcnode-id="5418"><span data-dcnode-id="5419" instrument_node="">(0.127)</span></td></tr><tr class="valign-top" data-dcnode-id="5414"><td class="align-left" colspan="4" data-dcnode-id="5415"><br data-dcnode-id="5416"></td></tr><tr class="valign-top" data-dcnode-id="5405"><td class="align-left" data-dcnode-id="5412"><span data-dcnode-id="5413" instrument_node="">Observations</span></td><td class="align-left" data-dcnode-id="5410"><span data-dcnode-id="5411" instrument_node="">44,675</span></td><td class="align-left" data-dcnode-id="5408"><span data-dcnode-id="5409" instrument_node="">43,769</span></td><td class="align-left" data-dcnode-id="5406"><span data-dcnode-id="5407" instrument_node="">44,034</span></td></tr><tr class="valign-top" data-dcnode-id="5396"><td class="align-left" data-dcnode-id="5403"><span data-dcnode-id="5404" instrument_node="">Number of groups</span></td><td class="align-left" data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">33</span></td><td class="align-left" data-dcnode-id="5399"><span data-dcnode-id="5400" instrument_node="">33</span></td><td class="align-left" data-dcnode-id="5397"><span data-dcnode-id="5398" instrument_node="">33</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="5388"></p><p data-dcnode-id="5391" id="tspara0065"><span data-dcnode-id="5392" instrument_node="">Standard errors in parentheses.</span></p><p data-dcnode-id="5389" id="tspara0070"><span data-dcnode-id="5390" instrument_node="">***p&nbsp;&lt;&nbsp;0.01, **p&nbsp;&lt;&nbsp;0.05, *p&nbsp;&lt;&nbsp;0.1.</span></p><p></p></div></div><div data-dcnode-id="5265"><p data-dcnode-id="5381" id="p0180"><span data-dcnode-id="5385" instrument_node="">The first interesting finding is that, as expected, female respondents are more likely to express a sense of civic duty to participate in elections. In model 1, the variable “female” is positive and statistically significant. In order to find out whether this significant coefficient is substantively important, I estimated the predicted probabilities of civic duty to vote. </span><a class="workspace-trigger" data-dcnode-id="5383" href="#tbl6" name="btbl6"><span data-dcnode-id="5384" instrument_node="">Table 6</span></a><span data-dcnode-id="5382" instrument_node=""> presents the predicted probabilities of voting at different values of the independent variables that were statistically significant in Model 1 above, holding all other variables at their means.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="5266" id="tbl6"><span class="captions" data-dcnode-id="5374"><span data-dcnode-id="5375" id="cap0040"><p data-dcnode-id="5376" id="tspara0075"><span class="label" data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">Table 6</span></span><span data-dcnode-id="5378" instrument_node="">. </span><span data-dcnode-id="5377" instrument_node="">Predicted probabilities of civic duty (ISSP 2014).</span></p></span></span><div class="groups" data-dcnode-id="5267"><table data-dcnode-id="5268"><thead data-dcnode-id="5368"><tr class="rowsep-1 valign-top" data-dcnode-id="5369"><th data-dcnode-id="5372" scope="col"><span data-dcnode-id="5373" instrument_node="">Value on the independent variable</span></th><th data-dcnode-id="5370" scope="col"><span data-dcnode-id="5371" instrument_node="">Predicted probability</span></th></tr></thead><tbody data-dcnode-id="5269"><tr class="valign-top" data-dcnode-id="5363"><td class="align-left" data-dcnode-id="5366"><span data-dcnode-id="5367" instrument_node="">All variables at their mean values</span></td><td class="align-left" data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">.71</span></td></tr><tr class="valign-top" data-dcnode-id="5360"><td class="align-left" colspan="2" data-dcnode-id="5361"><br data-dcnode-id="5362"></td></tr><tr class="valign-top" data-dcnode-id="5355"><td class="align-left" data-dcnode-id="5358"><span data-dcnode-id="5359" instrument_node="">Male</span></td><td class="align-left" data-dcnode-id="5356"><span data-dcnode-id="5357" instrument_node="">.69</span></td></tr><tr class="valign-top" data-dcnode-id="5350"><td class="align-left" data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">Female</span></td><td class="align-left" data-dcnode-id="5351"><span data-dcnode-id="5352" instrument_node="">.73</span></td></tr><tr class="valign-top" data-dcnode-id="5347"><td class="align-left" colspan="2" data-dcnode-id="5348"><br data-dcnode-id="5349"></td></tr><tr class="valign-top" data-dcnode-id="5342"><td class="align-left" data-dcnode-id="5345"><span data-dcnode-id="5346" instrument_node="">Primary education</span></td><td class="align-left" data-dcnode-id="5343"><span data-dcnode-id="5344" instrument_node="">.69</span></td></tr><tr class="valign-top" data-dcnode-id="5337"><td class="align-left" data-dcnode-id="5340"><span data-dcnode-id="5341" instrument_node="">Higher education</span></td><td class="align-left" data-dcnode-id="5338"><span data-dcnode-id="5339" instrument_node="">.73</span></td></tr><tr class="valign-top" data-dcnode-id="5334"><td class="align-left" colspan="2" data-dcnode-id="5335"><br data-dcnode-id="5336"></td></tr><tr class="valign-top" data-dcnode-id="5329"><td class="align-left" data-dcnode-id="5332"><span data-dcnode-id="5333" instrument_node="">Age 18-24</span></td><td class="align-left" data-dcnode-id="5330"><span data-dcnode-id="5331" instrument_node="">.60</span></td></tr><tr class="valign-top" data-dcnode-id="5324"><td class="align-left" data-dcnode-id="5327"><span data-dcnode-id="5328" instrument_node="">Age 25-34</span></td><td class="align-left" data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">.65</span></td></tr><tr class="valign-top" data-dcnode-id="5319"><td class="align-left" data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node="">Age 35-49</span></td><td class="align-left" data-dcnode-id="5320"><span data-dcnode-id="5321" instrument_node="">.70</span></td></tr><tr class="valign-top" data-dcnode-id="5314"><td class="align-left" data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">Age 50-64</span></td><td class="align-left" data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">.75</span></td></tr><tr class="valign-top" data-dcnode-id="5309"><td class="align-left" data-dcnode-id="5312"><span data-dcnode-id="5313" instrument_node="">Age &gt; 64</span></td><td class="align-left" data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">.79</span></td></tr><tr class="valign-top" data-dcnode-id="5306"><td class="align-left" colspan="2" data-dcnode-id="5307"><br data-dcnode-id="5308"></td></tr><tr class="valign-top" data-dcnode-id="5301"><td class="align-left" data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">Low political interest (1)</span></td><td class="align-left" data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">.56</span></td></tr><tr class="valign-top" data-dcnode-id="5296"><td class="align-left" data-dcnode-id="5299"><span data-dcnode-id="5300" instrument_node="">High political interest (4)</span></td><td class="align-left" data-dcnode-id="5297"><span data-dcnode-id="5298" instrument_node="">.85</span></td></tr><tr class="valign-top" data-dcnode-id="5293"><td class="align-left" colspan="2" data-dcnode-id="5294"><br data-dcnode-id="5295"></td></tr><tr class="valign-top" data-dcnode-id="5288"><td class="align-left" data-dcnode-id="5291"><span data-dcnode-id="5292" instrument_node="">Employed</span></td><td class="align-left" data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">.71</span></td></tr><tr class="valign-top" data-dcnode-id="5283"><td class="align-left" data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">Unemployed</span></td><td class="align-left" data-dcnode-id="5284"><span data-dcnode-id="5285" instrument_node="">.72</span></td></tr><tr class="valign-top" data-dcnode-id="5280"><td class="align-left" colspan="2" data-dcnode-id="5281"><br data-dcnode-id="5282"></td></tr><tr class="valign-top" data-dcnode-id="5275"><td class="align-left" data-dcnode-id="5278"><span data-dcnode-id="5279" instrument_node="">Urban</span></td><td class="align-left" data-dcnode-id="5276"><span data-dcnode-id="5277" instrument_node="">.71</span></td></tr><tr class="valign-top" data-dcnode-id="5270"><td class="align-left" data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">Rural</span></td><td class="align-left" data-dcnode-id="5271"><span data-dcnode-id="5272" instrument_node="">.72</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="5259" id="p0185"><span data-dcnode-id="5264" instrument_node="">The predicted probabilities show that female voters are significantly more likely to feel a civic duty to vote than male citizens. When all variables are at their mean values, a respondent has a 71% probability of expressing a civic duty to vote. This probability goes up (down) by 2 percentage points when the respondent is a woman (man). While two other variables are more strongly associated with civic duty (age and political interest), the sex of the respondent is clearly related with the probability of feeling a civic duty to vote.</span><a class="workspace-trigger" data-dcnode-id="5261" href="#fn7" name="bfn7"><sup data-dcnode-id="5262"><span data-dcnode-id="5263" instrument_node="">7</span></sup></a><span data-dcnode-id="5260" instrument_node=""> This may help explain why women participate more in elections, while they are less politically engaged overall.</span></p><p data-dcnode-id="5254" id="p0190"><span data-dcnode-id="5258" instrument_node="">However, the higher predisposition to feel a civic duty to vote among female respondents could not explain the puzzle of higher female turnout if women also felt a stronger sense of duty to participate in other political activities. Since other forms of </span><a class="topic-link" data-dcnode-id="5256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/political-participation" title="Learn more about political participation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5257" instrument_node="">political participation</span></a><span data-dcnode-id="5255" instrument_node=""> (e.g. protest or contacting politicians) tend to be presented as democratic rights rather than democratic norms, I do not expect women to feel a moral obligation to be politically active in other domains. This is exactly what the results suggest.</span></p><p data-dcnode-id="5249" id="p0195"><span data-dcnode-id="5253" instrument_node="">The models 2 and 3 in </span><a class="workspace-trigger" data-dcnode-id="5251" href="#tbl5" name="btbl5"><span data-dcnode-id="5252" instrument_node="">Table 5</span></a><span data-dcnode-id="5250" instrument_node=""> show that women are not more likely to feel a duty to be politically active in social and political associations or to keep watch on government actions. The coefficient for the variable “female” is positive in model 2 and negative in model 3 but is not statistically significant in either model.</span></p><p data-dcnode-id="5247" id="p0200"><span data-dcnode-id="5248" instrument_node="">In sum, the three models reported in this section are consistent with my theoretical intuitions. In line with psychological research which shows a higher level of conscientiousness among women, the results indicate that female citizens are more likely to express a civic duty to vote. However, the models also suggest that women are not more likely to feel a moral obligation to engage in other political activities.</span></p></section><section data-dcnode-id="5059" id="sec7"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5242" id="sectitle0045"><span data-dcnode-id="5245" instrument_node="">7</span><span data-dcnode-id="5244" instrument_node="">. </span><span data-dcnode-id="5243" instrument_node="">Mediation analysis</span></h2><div data-dcnode-id="5087"><p data-dcnode-id="5212" id="p0205"><span data-dcnode-id="5241" instrument_node="">To test </span><a class="workspace-trigger" data-dcnode-id="5239" href="#enun2" name="benun2"><span data-dcnode-id="5240" instrument_node="">Hypothesis 2</span></a><span data-dcnode-id="5234"><span data-dcnode-id="5238" instrument_node="">, I conducted a </span><a class="topic-link" data-dcnode-id="5236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/mediation" title="Learn more about mediation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5237" instrument_node="">mediation</span></a><span data-dcnode-id="5235" instrument_node=""> analysis to show that the relationship between the respondents’ sex and turnout is mediated by civic duty. Four conditions need to be met to show that there is (complete) mediation (</span></span><a class="workspace-trigger" data-dcnode-id="5232" href="#bib4" name="bbib4"><span data-dcnode-id="5233" instrument_node="">Baron and Kenny, 1986</span></a><span data-dcnode-id="5231" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5229" href="#bib50" name="bbib50"><span data-dcnode-id="5230" instrument_node="">Judd and Kenny, 1981</span></a><span data-dcnode-id="5228" instrument_node="">). First, the key independent variable, “female,” should be significantly correlated with the main outcome variable, “electoral participation,” without controlling for the mediator, “civic duty.” Model 1 in </span><a class="workspace-trigger" data-dcnode-id="5226" href="#tbl7" name="btbl7"><span data-dcnode-id="5227" instrument_node="">Table 7</span></a><span data-dcnode-id="5225" instrument_node=""> shows that this correlation exists. Second, the variable “female” should be positively and significantly associated with the mediator variable, “civic duty.” Model 2 in </span><a class="workspace-trigger" data-dcnode-id="5223" href="#tbl7" name="btbl7"><span data-dcnode-id="5224" instrument_node="">Table 7</span></a><span data-dcnode-id="5222" instrument_node=""> shows this to be the case. Third, the mediator, “civic duty,” should be positively related to “electoral participation” controlling for the key independent variable, “female.” And fourth, the correlation between “female” and “electoral participation” should be small and not statistically significant when controlling for “civic duty.” Model 3 in </span><a class="workspace-trigger" data-dcnode-id="5220" href="#tbl7" name="btbl7"><span data-dcnode-id="5221" instrument_node="">Table 7</span></a><span data-dcnode-id="5219" instrument_node=""> shows that conditions 3 and 4 are also satisfied. </span><a class="workspace-trigger" data-dcnode-id="5217" href="#fig1" name="bfig1"><span data-dcnode-id="5218" instrument_node="">Fig. 1</span></a><span data-dcnode-id="5216" instrument_node=""> graphically presents the relevant coefficients from these models in </span><a class="workspace-trigger" data-dcnode-id="5214" href="#tbl7" name="btbl7"><span data-dcnode-id="5215" instrument_node="">Table 7</span></a><span data-dcnode-id="5213" instrument_node="">.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="5114" id="tbl7"><span class="captions" data-dcnode-id="5205"><span data-dcnode-id="5206" id="cap0045"><p data-dcnode-id="5207" id="tspara0080"><span class="label" data-dcnode-id="5210"><span data-dcnode-id="5211" instrument_node="">Table 7</span></span><span data-dcnode-id="5209" instrument_node="">. </span><span data-dcnode-id="5208" instrument_node="">Mediation analysis (ISSP 2014).</span></p></span></span><div class="groups" data-dcnode-id="5120"><table data-dcnode-id="5121"><thead data-dcnode-id="5188"><tr class="rowsep-1 valign-top" data-dcnode-id="5196"><th data-dcnode-id="5203" rowspan="2" scope="col"><span data-dcnode-id="5204" instrument_node="">Variables</span></th><th data-dcnode-id="5201" scope="col"><span data-dcnode-id="5202" instrument_node="">(1)</span></th><th data-dcnode-id="5199" scope="col"><span data-dcnode-id="5200" instrument_node="">(2)</span></th><th data-dcnode-id="5197" scope="col"><span data-dcnode-id="5198" instrument_node="">(3)</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="5189"><th data-dcnode-id="5194" scope="col"><span data-dcnode-id="5195" instrument_node="">Vote</span></th><th data-dcnode-id="5192" scope="col"><span data-dcnode-id="5193" instrument_node="">Civic duty to vote</span></th><th data-dcnode-id="5190" scope="col"><span data-dcnode-id="5191" instrument_node="">Vote</span></th></tr></thead><tbody data-dcnode-id="5122"><tr class="valign-top" data-dcnode-id="5179"><td class="align-left" data-dcnode-id="5186" rowspan="2"><span data-dcnode-id="5187" instrument_node="">Female</span></td><td class="align-left" data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">0.053**</span></td><td class="align-left" data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">0.087***</span></td><td class="align-left" data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">0.043</span></td></tr><tr class="valign-top" data-dcnode-id="5172"><td class="align-left" data-dcnode-id="5177"><span data-dcnode-id="5178" instrument_node="">(0.026)</span></td><td class="align-left" data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node="">(0.021)</span></td><td class="align-left" data-dcnode-id="5173"><span data-dcnode-id="5174" instrument_node="">(0.028)</span></td></tr><tr class="valign-top" data-dcnode-id="5165"><td class="align-left" data-dcnode-id="5170" rowspan="2"><span data-dcnode-id="5171" instrument_node="">Civic duty to vote</span></td><td data-dcnode-id="5169"></td><td data-dcnode-id="5168"></td><td class="align-left" data-dcnode-id="5166"><span data-dcnode-id="5167" instrument_node="">1.355***</span></td></tr><tr class="valign-top" data-dcnode-id="5160"><td data-dcnode-id="5164"></td><td data-dcnode-id="5163"></td><td class="align-left" data-dcnode-id="5161"><span data-dcnode-id="5162" instrument_node="">(0.029)</span></td></tr><tr class="valign-top" data-dcnode-id="5151"><td class="align-left" data-dcnode-id="5158" rowspan="2"><span data-dcnode-id="5159" instrument_node="">Constant</span></td><td class="align-left" data-dcnode-id="5156"><span data-dcnode-id="5157" instrument_node="">1.639***</span></td><td class="align-left" data-dcnode-id="5154"><span data-dcnode-id="5155" instrument_node="">0.882***</span></td><td class="align-left" data-dcnode-id="5152"><span data-dcnode-id="5153" instrument_node="">0.829***</span></td></tr><tr class="valign-top" data-dcnode-id="5144"><td class="align-left" data-dcnode-id="5149"><span data-dcnode-id="5150" instrument_node="">(0.137)</span></td><td class="align-left" data-dcnode-id="5147"><span data-dcnode-id="5148" instrument_node="">(0.103)</span></td><td class="align-left" data-dcnode-id="5145"><span data-dcnode-id="5146" instrument_node="">(0.136)</span></td></tr><tr class="valign-top" data-dcnode-id="5141"><td class="align-left" colspan="4" data-dcnode-id="5142"><br data-dcnode-id="5143"></td></tr><tr class="valign-top" data-dcnode-id="5132"><td class="align-left" data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node="">Observations</span></td><td class="align-left" data-dcnode-id="5137"><span data-dcnode-id="5138" instrument_node="">42,060</span></td><td class="align-left" data-dcnode-id="5135"><span data-dcnode-id="5136" instrument_node="">46,494</span></td><td class="align-left" data-dcnode-id="5133"><span data-dcnode-id="5134" instrument_node="">41,363</span></td></tr><tr class="valign-top" data-dcnode-id="5123"><td class="align-left" data-dcnode-id="5130"><span data-dcnode-id="5131" instrument_node="">Number of groups</span></td><td class="align-left" data-dcnode-id="5128"><span data-dcnode-id="5129" instrument_node="">32</span></td><td class="align-left" data-dcnode-id="5126"><span data-dcnode-id="5127" instrument_node="">33</span></td><td class="align-left" data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">32</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="5115"></p><p data-dcnode-id="5118" id="tspara0085"><span data-dcnode-id="5119" instrument_node="">Standard errors in parentheses.</span></p><p data-dcnode-id="5116" id="tspara0090"><span data-dcnode-id="5117" instrument_node="">***p&nbsp;&lt;&nbsp;0.01, **p&nbsp;&lt;&nbsp;0.05, *p&nbsp;&lt;&nbsp;0.1.</span></p><p></p></div><figure class="figure text-xs" data-dcnode-id="5088" id="fig1"><span data-dcnode-id="5098"><img alt="Fig. 1" aria-describedby="cap0010" data-dcnode-id="5113" height="234" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379417303815-gr1.jpg&amp;raw"><span data-dcnode-id="5112" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5099"><li data-dcnode-id="5106"><a class="anchor download-link u-font-sans" data-dcnode-id="5107" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379417303815-gr1_lrg.jpg" target="_blank" title="Download high-res image (133KB)"><span class="anchor-text" data-dcnode-id="5108"><span data-dcnode-id="5111" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">Download high-res image (133KB)</span></span></span></a></li><li data-dcnode-id="5100"><a class="anchor download-link u-font-sans" data-dcnode-id="5101" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379417303815-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5102"><span data-dcnode-id="5105" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5103"><span data-dcnode-id="5104" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5089"><span data-dcnode-id="5090" id="cap0010"><p data-dcnode-id="5091" id="fspara0010"><span class="label" data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">Fig. 1</span></span><span data-dcnode-id="5095" instrument_node="">. </span><a class="topic-link" data-dcnode-id="5093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/mediation" title="Learn more about Mediation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5094" instrument_node="">Mediation</span></a><span data-dcnode-id="5092" instrument_node=""> model.</span></p></span></span></figure></div><p data-dcnode-id="5078" id="p0210"><span data-dcnode-id="5086" instrument_node="">In order to assess more precisely the magnitude of this mediation, I estimated the proportion of the total effect that is mediated (</span><a class="workspace-trigger" data-dcnode-id="5084" href="#bib67" name="bbib67"><span data-dcnode-id="5085" instrument_node="">Preacher and Kelley, 2011</span></a><span data-dcnode-id="5083" instrument_node="">) using the Stata command “binary mediation.”</span><a class="workspace-trigger" data-dcnode-id="5080" href="#fn8" name="bfn8"><sup data-dcnode-id="5081"><span data-dcnode-id="5082" instrument_node="">8</span></sup></a><span data-dcnode-id="5079" instrument_node=""> In this model, 45% of the total effect of “female” on “electoral participation” is mediated through “civic duty,” which shows that there is a (partial) mediation. This again confirms that the fact that women have a higher sense of civic duty to vote is critical to explain the absence of a gender gap in electoral participation.</span></p><p data-dcnode-id="5060" id="p0215"><span data-dcnode-id="5077" instrument_node="">It is important to note here that the civic duty to vote only mediates the relationship between sex and </span><em data-dcnode-id="5075"><span data-dcnode-id="5076" instrument_node="">electoral</span></em><span data-dcnode-id="5074" instrument_node=""> participation. In fact, I reproduced the mediation analysis reported in </span><a class="workspace-trigger" data-dcnode-id="5072" href="#tbl7" name="btbl7"><span data-dcnode-id="5073" instrument_node="">Table 7</span></a><span data-dcnode-id="5067"><span data-dcnode-id="5071" instrument_node=""> for each of the different forms of </span><a class="topic-link" data-dcnode-id="5069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/political-participation" title="Learn more about political participation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5070" instrument_node="">political participation</span></a><span data-dcnode-id="5068" instrument_node=""> reported in </span></span><a class="workspace-trigger" data-dcnode-id="5065" href="#tbl1" name="btbl1"><span data-dcnode-id="5066" instrument_node="">Table 1</span></a><span data-dcnode-id="5064" instrument_node="">. The results indicate that the civic duty to vote is positively associated with these other political activities, but the coefficient of the variable “female” remains negative and statistically significant when the variable “civic duty” is included in these models. In other words, there is no indication that civic duty mediates the relationship between sex and political engagement more broadly. These additional mediation analyses are reported in the online Appendix (</span><a class="workspace-trigger" data-dcnode-id="5062" href="#appsec1" name="bappsec1"><span data-dcnode-id="5063" instrument_node="">Tables A5 to A10</span></a><span data-dcnode-id="5061" instrument_node="">).</span></p></section><section data-dcnode-id="5024" id="sec8"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5055" id="sectitle0050"><span data-dcnode-id="5058" instrument_node="">8</span><span data-dcnode-id="5057" instrument_node="">. </span><span data-dcnode-id="5056" instrument_node="">Robustness models</span></h2><p data-dcnode-id="5047" id="p0220"><span data-dcnode-id="5054" instrument_node="">I estimated a series of additional models to make sure that the results presented above are robust. There are alternative ways to deal with multilevel data. One possibility is to estimate logistic regressions with country fixed effects. Another option is to estimate logistic regressions with standard errors clustered around countries. I re-estimated the models in </span><a class="workspace-trigger" data-dcnode-id="5052" href="#tbl5" name="btbl5"><span data-dcnode-id="5053" instrument_node="">Table 5</span></a><span data-dcnode-id="5051" instrument_node=""> using these alternative ways to estimate the models, and the results are the same. The variable “female” is positive and statistically significant in the models analyzing the determinants of civic duty to vote, but not significant in the models analyzing the moral obligation to engage in other political activities. The results of these models are presented in </span><a class="workspace-trigger" data-dcnode-id="5049" href="#appsec1" name="bappsec1"><span data-dcnode-id="5050" instrument_node="">Table A2</span></a><span data-dcnode-id="5048" instrument_node=""> in the online Appendix.</span></p><p data-dcnode-id="5042" id="p0225"><span data-dcnode-id="5046" instrument_node="">I also made sure that the relationship between the variables “female” and “civic duty” is not driven by any single country. In fact, the main result reported in model 1 in </span><a class="workspace-trigger" data-dcnode-id="5044" href="#tbl5" name="btbl5"><span data-dcnode-id="5045" instrument_node="">Table 5</span></a><span data-dcnode-id="5043" instrument_node=""> (i.e. women are more likely to feel a sense of civic duty to vote) holds when each country is successively dropped from the regression, and the size of the coefficients is very similar in all the models.</span></p><p data-dcnode-id="5027" id="p0230"><span data-dcnode-id="5041" instrument_node="">Finally, I re-estimated the civic duty model in </span><a class="workspace-trigger" data-dcnode-id="5039" href="#tbl5" name="btbl5"><span data-dcnode-id="5040" instrument_node="">Table 5</span></a><span data-dcnode-id="5038" instrument_node=""> and the mediation analysis in </span><a class="workspace-trigger" data-dcnode-id="5036" href="#tbl7" name="btbl7"><span data-dcnode-id="5037" instrument_node="">Table 7</span></a><span data-dcnode-id="5031"><span data-dcnode-id="5035" instrument_node=""> using the ordinal variable “importance of voting” (1–7 scale) rather than the dummy variable I created to capture “civic duty.” The results are very similar. The variable “female” is positively associated with the feeling that voting is important to be a good citizen, and the coefficient is statistically significant. The mediation analysis with this alternative measure of “civic duty” also provides support for the theoretical expectations of this paper. The four conditions of the mediation analysis are fulfilled. The variable “female” is positively associated with electoral participation and with the belief that voting is important to be a good citizen. However, when the belief that voting is important for </span><a class="topic-link" data-dcnode-id="5033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/citizenship" title="Learn more about citizenship from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5034" instrument_node="">citizenship</span></a><span data-dcnode-id="5032" instrument_node=""> is controlled for, the sex of the respondent does not predict turnout. I also estimated the proportion of the total effect that is mediated. In this alternative mediation analysis, 61% of the total effect of “female” on “electoral participation” is mediated through “belief in the importance of voting,” which shows that the mediation analysis reported above is robust. The models described in this paragraph are presented in </span></span><a class="workspace-trigger" data-dcnode-id="5029" href="#appsec1" name="bappsec1"><span data-dcnode-id="5030" instrument_node="">Tables A3-A4</span></a><span data-dcnode-id="5028" instrument_node=""> in the online Appendix.</span></p><p data-dcnode-id="5025" id="p0235"><span data-dcnode-id="5026" instrument_node="">In sum, this section has shown that the findings reported in the paper are not an artifact of a particular form of estimating the model or the way in which the variable “civic duty” is operationalized.</span></p></section><section data-dcnode-id="4729" id="sec9"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5020" id="sectitle0055"><span data-dcnode-id="5023" instrument_node="">9</span><span data-dcnode-id="5022" instrument_node="">. </span><span data-dcnode-id="5021" instrument_node="">Supplementary analyses</span></h2><p data-dcnode-id="5012" id="p0240"><span data-dcnode-id="5019" instrument_node="">This study relies on the largest cross-national survey dataset that includes a survey item that can be used to measure citizens' civic duty to vote. A potential limitation of the empirical analysis is that only one variable is used to capture respondents’ belief that it is a moral obligation to go the polls on Election Day. Several studies emphasize the importance of using several indicators for measuring attitudinal dimensions (</span><a class="workspace-trigger" data-dcnode-id="5017" href="#bib3" name="bbib3"><span data-dcnode-id="5018" instrument_node="">Ansolabehere et al., 2008</span></a><span data-dcnode-id="5016" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5014" href="#bib14" name="bbib14"><span data-dcnode-id="5015" instrument_node="">Carmines and Zeller, 1979</span></a><span data-dcnode-id="5013" instrument_node="">).</span></p><div data-dcnode-id="4924"><p data-dcnode-id="5000" id="p0245"><span data-dcnode-id="5011" instrument_node="">Fortunately, a recent cross-national internet survey that was conducted after the 2014 European Parliament election in seven different countries (France, Germany, Italy, Spain, Austria, Greece, and Portugal) includes a battery of 13 questions to measure civic duty.</span><a class="workspace-trigger" data-dcnode-id="5008" href="#fn9" name="bfn9"><sup data-dcnode-id="5009"><span data-dcnode-id="5010" instrument_node="">9</span></sup></a><span data-dcnode-id="5007" instrument_node=""> Using this dataset, </span><a class="workspace-trigger" data-dcnode-id="5005" href="#bib8" name="bbib8"><span data-dcnode-id="5006" instrument_node="">Blais and Galais (2016)</span></a><span data-dcnode-id="5004" instrument_node=""> conduct a confirmatory factor analysis and determine that four indicators are particularly suitable to create a “civic duty” construct that is both internally consistent and has sufficient item heterogeneity. These four items are described in </span><a class="workspace-trigger" data-dcnode-id="5002" href="#tbl8" name="btbl8"><span data-dcnode-id="5003" instrument_node="">Table 8</span></a><span data-dcnode-id="5001" instrument_node="">.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4925" id="tbl8"><span class="captions" data-dcnode-id="4993"><span data-dcnode-id="4994" id="cap0050"><p data-dcnode-id="4995" id="tspara0095"><span class="label" data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">Table 8</span></span><span data-dcnode-id="4997" instrument_node="">. </span><span data-dcnode-id="4996" instrument_node="">Four duty indicators.</span></p></span></span><div class="groups" data-dcnode-id="4935"><table data-dcnode-id="4936"><thead data-dcnode-id="4983"><tr class="rowsep-1 valign-top" data-dcnode-id="4984"><th data-dcnode-id="4991" scope="col"><span data-dcnode-id="4992" instrument_node="">Item</span></th><th data-dcnode-id="4989" scope="col"><span data-dcnode-id="4990" instrument_node="">Question wording</span></th><th data-dcnode-id="4987" scope="col"><span data-dcnode-id="4988" instrument_node="">Answer options</span></th><th data-dcnode-id="4985" scope="col"><span data-dcnode-id="4986" instrument_node="">Recodification</span></th></tr></thead><tbody data-dcnode-id="4937"><tr class="valign-top" data-dcnode-id="4974"><td class="align-left" data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">CHOICE</span></td><td class="align-left" data-dcnode-id="4979"><span data-dcnode-id="4980" instrument_node="">Different people feel differently about voting. For some voting is a duty. They feel that they should vote in every election however they feel about the candidates and parties. For some, voting is a choice. They feel free to vote or not to vote in an election depending on how they feel about the candidates and parties. For you personally, is voting in an election first and foremost a duty or a choice? (if duty) How strongly do you feel that voting in an election is a duty:</span></td><td class="align-left" data-dcnode-id="4977"><span data-dcnode-id="4978" instrument_node="">(0) choice/don't know; (1) Duty: not very strongly; (2) Duty: somewhat strongly; (3) Duty, very strongly</span></td><td class="align-left" data-dcnode-id="4975"><span data-dcnode-id="4976" instrument_node="">(0) 0/1; (1) 2/3</span></td></tr><tr class="valign-top" data-dcnode-id="4971"><td class="align-left" colspan="4" data-dcnode-id="4972"><br data-dcnode-id="4973"></td></tr><tr class="valign-top" data-dcnode-id="4962"><td class="align-left" data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">GUILTY</span></td><td class="align-left" data-dcnode-id="4967"><span data-dcnode-id="4968" instrument_node="">How guilty would you feel if you did not vote in an election?</span></td><td class="align-left" data-dcnode-id="4965"><span data-dcnode-id="4966" instrument_node="">(0) I would not feel guilty at all … (10) I would feel extremely guilty</span></td><td class="align-left" data-dcnode-id="4963"><span data-dcnode-id="4964" instrument_node="">(0) 0/7 (1) 8/10</span></td></tr><tr class="valign-top" data-dcnode-id="4959"><td class="align-left" colspan="4" data-dcnode-id="4960"><br data-dcnode-id="4961"></td></tr><tr class="valign-top" data-dcnode-id="4950"><td class="align-left" data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">COUNTRY</span></td><td class="align-left" data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">I see voting as a way to show love for my country.</span></td><td class="align-left" data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">(0) Fully disagree … (10) Fully agree</span></td><td class="align-left" data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">(0) 0/7 (1) 8/10</span></td></tr><tr class="valign-top" data-dcnode-id="4947"><td class="align-left" colspan="4" data-dcnode-id="4948"><br data-dcnode-id="4949"></td></tr><tr class="valign-top" data-dcnode-id="4938"><td class="align-left" data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">OPINION</span></td><td class="align-left" data-dcnode-id="4943"><span data-dcnode-id="4944" instrument_node="">It is OK to abstain if you have no opinion in an election.</span></td><td class="align-left" data-dcnode-id="4941"><span data-dcnode-id="4942" instrument_node="">(0) Fully disagree … (10) Fully agree</span></td><td class="align-left" data-dcnode-id="4939"><span data-dcnode-id="4940" instrument_node="">(0) 3/10 (1) 0/2</span></td></tr></tbody></table></div><p class="source" data-dcnode-id="4926"><span data-dcnode-id="4927"><span data-dcnode-id="4934" instrument_node="">Source: </span><a class="workspace-trigger" data-dcnode-id="4932" href="#bib69" name="bbib69"><span data-dcnode-id="4933" instrument_node="">Sauger et al. (2015)</span></a><span data-dcnode-id="4931" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="4929" href="#bib8" name="bbib8"><span data-dcnode-id="4930" instrument_node="">Blais and Galais (2016)</span></a><span data-dcnode-id="4928" instrument_node="">.</span></span></p></div></div><div data-dcnode-id="4730"><p data-dcnode-id="4909" id="p0250"><span data-dcnode-id="4923" instrument_node="">I recoded these four indicators into dummies (as detailed in </span><a class="workspace-trigger" data-dcnode-id="4921" href="#tbl8" name="btbl8"><span data-dcnode-id="4922" instrument_node="">Table 8</span></a><span data-dcnode-id="4920" instrument_node="">), and then created a civic duty additive scale that ranges from 0 to 3. This procedure suggests that the belief that voting is a civic duty is widespread in these seven countries, but the strength of that belief varies considerably.</span><a class="workspace-trigger" data-dcnode-id="4917" href="#fn10" name="bfn10"><sup data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">10</span></sup></a><span data-dcnode-id="4916" instrument_node=""> I then replicated the statistical analysis presented in the paper in this smaller sample of seven countries using this more fine-grained and very reliable construct of civic duty. The results are very similar, as can be observed in </span><a class="workspace-trigger" data-dcnode-id="4914" href="#tbl9" name="btbl9"><span data-dcnode-id="4915" instrument_node="">Table 9</span></a><span data-dcnode-id="4913" instrument_node="">. The coefficients for the variable “female” are positive and statistically significant in models 1 and 2, which suggests that women are more likely to vote and to have a strong sense of civic duty. However, the sex of the respondent is no longer a statistically significant predictor of electoral participation when the civic duty scale is included as an independent variable. Again, this suggests that civic duty mediates the relationship between sex and turnout.</span><a class="workspace-trigger" data-dcnode-id="4910" href="#fn11" name="bfn11"><sup data-dcnode-id="4911"><span data-dcnode-id="4912" instrument_node="">11</span></sup></a></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="4731" id="tbl9"><span class="captions" data-dcnode-id="4902"><span data-dcnode-id="4903" id="cap0055"><p data-dcnode-id="4904" id="tspara0100"><span class="label" data-dcnode-id="4907"><span data-dcnode-id="4908" instrument_node="">Table 9</span></span><span data-dcnode-id="4906" instrument_node="">. </span><span data-dcnode-id="4905" instrument_node="">Determinants of electoral participation and civic duty (CED-EU14).</span></p></span></span><div class="groups" data-dcnode-id="4737"><table data-dcnode-id="4738"><thead data-dcnode-id="4885"><tr class="rowsep-1 valign-top" data-dcnode-id="4893"><th data-dcnode-id="4900" rowspan="2" scope="col"><span data-dcnode-id="4901" instrument_node="">Variables</span></th><th data-dcnode-id="4898" scope="col"><span data-dcnode-id="4899" instrument_node="">(1)</span></th><th data-dcnode-id="4896" scope="col"><span data-dcnode-id="4897" instrument_node="">(3)</span></th><th data-dcnode-id="4894" scope="col"><span data-dcnode-id="4895" instrument_node="">(6)</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="4886"><th data-dcnode-id="4891" scope="col"><span data-dcnode-id="4892" instrument_node="">Vote</span></th><th data-dcnode-id="4889" scope="col"><span data-dcnode-id="4890" instrument_node="">Civic duty to vote</span></th><th data-dcnode-id="4887" scope="col"><span data-dcnode-id="4888" instrument_node="">Vote</span></th></tr></thead><tbody data-dcnode-id="4739"><tr cl -id="4841"><td class="align-left" data-dcnode-id="4846"><span data-dcnode-id="4847" instrument_node="">(0.002)</span></td><td class="align-left" data-dcnode-id="4844"><span data-dcnode-id="4845" instrument_node="">(0.000)</span></td><td class="align-left" data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">(0.002)</span></td></tr><tr class="valign-top" data-dcnode-id="4832"><td class="align-left" data-dcnode-id="4839" rowspan="2"><span data-dcnode-id="4840" instrument_node="">Education</span></td><td class="align-left" data-dcnode-id="4837"><span data-dcnode-id="4838" instrument_node="">0.072***</span></td><td class="align-left" data-dcnode-id="4835"><span data-dcnode-id="4836" instrument_node="">0.008*</span></td><td class="align-left" data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">0.066***</span></td></tr><tr class="valign-top" data-dcnode-id="4825"><td class="align-left" data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">(0.016)</span></td><td class="align-left" data-dcnode-id="4828"><span data-dcnode-id="4829" instrument_node="">(0.005)</span></td><td class="align-left" data-dcnode-id="4826"><span data-dcnode-id="4827" instrument_node="">(0.016)</span></td></tr><tr class="valign-top" data-dcnode-id="4816"><td class="align-left" data-dcnode-id="4823" rowspan="2"><span data-dcnode-id="4824" instrument_node="">Income</span></td><td class="align-left" data-dcnode-id="4821"><span data-dcnode-id="4822" instrument_node="">0.106***</span></td><td class="align-left" data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">0.009***</span></td><td class="align-left" data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">0.107***</span></td></tr><tr class="valign-top" data-dcnode-id="4809"><td class="align-left" data-dcnode-id="4814"><span data-dcnode-id="4815" instrument_node="">(0.010)</span></td><td class="align-left" data-dcnode-id="4812"><span data-dcnode-id="4813" instrument_node="">(0.003)</span></td><td class="align-left" data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node="">(0.010)</span></td></tr><tr class="valign-top" data-dcnode-id="4800"><td class="align-left" data-dcnode-id="4807" rowspan="2"><span data-dcnode-id="4808" instrument_node="">Political interest</span></td><td class="align-left" data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">0.179***</span></td><td class="align-left" data-dcnode-id="4803"><span data-dcnode-id="4804" instrument_node="">0.111***</span></td><td class="align-left" data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">0.138***</span></td></tr><tr class="valign-top" data-dcnode-id="4793"><td class="align-left" data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">(0.009)</span></td><td class="align-left" data-dcnode-id="4796"><span data-dcnode-id="4797" instrument_node="">(0.003)</span></td><td class="align-left" data-dcnode-id="4794"><span data-dcnode-id="4795" instrument_node="">(0.009)</span></td></tr><tr class="valign-top" data-dcnode-id="4784"><td class="align-left" data-dcnode-id="4791" rowspan="2"><span data-dcnode-id="4792" instrument_node="">Employment status</span></td><td class="align-left" data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">0.016</span></td><td class="align-left" data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">0.112***</span></td><td class="align-left" data-dcnode-id="4785"><span data-dcnode-id="4786" instrument_node="">−0.036</span></td></tr><tr class="valign-top" data-dcnode-id="4777"><td class="align-left" data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">(0.050)</span></td><td class="align-left" data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">(0.015)</span></td><td class="align-left" data-dcnode-id="4778"><span data-dcnode-id="4779" instrument_node="">(0.051)</span></td></tr><tr class="valign-top" data-dcnode-id="4768"><td class="align-left" data-dcnode-id="4775" rowspan="2"><span data-dcnode-id="4776" instrument_node="">Constant</span></td><td class="align-left" data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">−0.856***</span></td><td class="align-left" data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">0.318***</span></td><td class="align-left" data-dcnode-id="4769"><span data-dcnode-id="4770" instrument_node="">−1.117***</span></td></tr><tr class="valign-top" data-dcnode-id="4761"><td class="align-left" data-dcnode-id="4766"><span data-dcnode-id="4767" instrument_node="">(0.163)</span></td><td class="align-left" data-dcnode-id="4764"><span data-dcnode-id="4765" instrument_node="">(0.049)</span></td><td class="align-left" data-dcnode-id="4762"><span data-dcnode-id="4763" instrument_node="">(0.166)</span></td></tr><tr class="valign-top" data-dcnode-id="4758"><td class="align-left" colspan="4" data-dcnode-id="4759"><br data-dcnode-id="4760"></td></tr><tr class="valign-top" data-dcnode-id="4749"><td class="align-left" data-dcnode-id="4756"><span data-dcnode-id="4757" instrument_node="">Observations</span></td><td class="align-left" data-dcnode-id="4754"><span data-dcnode-id="4755" instrument_node="">18,435</span></td><td class="align-left" data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">19,706</span></td><td class="align-left" data-dcnode-id="4750"><span data-dcnode-id="4751" instrument_node="">18,435</span></td></tr><tr class="valign-top" data-dcnode-id="4740"><td class="align-left" data-dcnode-id="4747"><span data-dcnode-id="4748" instrument_node="">Number of groups</span></td><td class="align-left" data-dcnode-id="4745"><span data-dcnode-id="4746" instrument_node="">7</span></td><td class="align-left" data-dcnode-id="4743"><span data-dcnode-id="4744" instrument_node="">7</span></td><td class="align-left" data-dcnode-id="4741"><span data-dcnode-id="4742" instrument_node="">7</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="4732"></p><p data-dcnode-id="4735" id="tspara0105"><span data-dcnode-id="4736" instrument_node="">Standard errors in parentheses.</span></p><p data-dcnode-id="4733" id="tspara0110"><span data-dcnode-id="4734" instrument_node="">***p&nbsp;&lt;&nbsp;0.01, **p&nbsp;&lt;&nbsp;0.05, *p&nbsp;&lt;&nbsp;0.1.</span></p><p></p></div></div></section><section data-dcnode-id="4690" id="sec10"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4725" id="sectitle0060"><span data-dcnode-id="4728" instrument_node="">10</span><span data-dcnode-id="4727" instrument_node="">. </span><span data-dcnode-id="4726" instrument_node="">Conclusion</span></h2><p data-dcnode-id="4723" id="p0255"><span data-dcnode-id="4724" instrument_node="">While women are less interested in politics and less likely to participate in a diverse array of political activities, recent cross-national survey research shows that there is no gender gap in electoral participation. The results presented above suggest that, if anything, women are slightly more likely to vote. This paper provides an explanation for this paradox. Social psychological research has shown repeatedly that women tend to be more conscientious than me. I therefore argue that women should have a higher sense of civic duty, which in turn explains why they are more likely to turnout. I conduct several tests of these hypotheses and find strong support for my theoretical intuitions. Using data from the 2014 ISSP module, I find that women are significantly more likely to express a civic duty to vote.</span></p><p data-dcnode-id="4704" id="p0260"><span data-dcnode-id="4718"><span data-dcnode-id="4722" instrument_node="">The main contribution of this paper is therefore to show that there are psychological factors that contribute to closing the gender gap in a critical form of </span><a class="topic-link" data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/political-participation" title="Learn more about political participation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4721" instrument_node="">political participation</span></a><span data-dcnode-id="4719" instrument_node="">: voting. This finding has important implications. First, it is well known that elections serve as a key mechanism of political representation and accountability (</span></span><a class="workspace-trigger" data-dcnode-id="4716" href="#bib57" name="bbib57"><span data-dcnode-id="4717" instrument_node="">Manin et al., 1999</span></a><span data-dcnode-id="4715" instrument_node="">). Political leaders pay less attention to citizens who do not vote (</span><a class="workspace-trigger" data-dcnode-id="4713" href="#bib55" name="bbib55"><span data-dcnode-id="4714" instrument_node="">Lijphart, 1997</span></a><span data-dcnode-id="4712" instrument_node="">). The fact that women now vote at least as much as men in most contexts might lead political parties to adopt policy programs that better represent specific demands and preferences of women. Second, the relatively high level of female political participation might gradually lead to more women in elected offices (</span><a class="workspace-trigger" data-dcnode-id="4710" href="#bib47" name="bbib47"><span data-dcnode-id="4711" instrument_node="">Jalalzai, 2013</span></a><span data-dcnode-id="4705"><span data-dcnode-id="4709" instrument_node="">). Women are less likely to hold gender biases against female politicians, and presumably are more likely to support them for elected positions. While the political </span><a class="topic-link" data-dcnode-id="4707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/advancement-of-women" title="Learn more about advancement of women from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4708" instrument_node="">advancement of women</span></a><span data-dcnode-id="4706" instrument_node=""> is in part the result of institutional mechanisms (e.g. gender quotas), the absence of a gender gap in turnout might also facilitate the election of women to different political offices.</span></span></p><p data-dcnode-id="4699" id="p0265"><span data-dcnode-id="4703" instrument_node="">The results of the mediation analysis suggest that about half of the total effect of sex on electoral participation is mediated through civic duty. This is an important finding, but also one that suggests that there might be other factors contributing to the paradox analyzed in this paper. First, women might prioritize electoral participation (rather than contacting politicians or attending political meetings) because voting is a participatory form that requires relatively little time, and time is a resource that women often lack (</span><a class="workspace-trigger" data-dcnode-id="4701" href="#bib70" name="bbib70"><span data-dcnode-id="4702" instrument_node="">Schlozman et al., 1994</span></a><span data-dcnode-id="4700" instrument_node="">). Second, voting is a more private form of participation –the vote is secret and individuals are alone in the ballot box– which allows women to be politically engaged in a way that is less public and confrontational than working for a political party or joining a demonstration. Future research should assess whether (and to what extent) these factors also contribute to the absence of a gender gap in electoral participation.</span></p><p data-dcnode-id="4691" id="p0270"><span data-dcnode-id="4698" instrument_node="">The findings in this paper also point to an interesting distinction between participatory forms that are widely perceived as civic </span><em data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">duties</span></em><span data-dcnode-id="4695" instrument_node=""> (e.g. voting) and political actions that are normally perceived as civic </span><em data-dcnode-id="4693"><span data-dcnode-id="4694" instrument_node="">rights</span></em><span data-dcnode-id="4692" instrument_node=""> in democratic systems (e.g. contacting politicians or joining a demonstration). Of course, not all individuals perceive these different actions in a similar light. Individual traits might affect which forms of political participation are considered civic duties and which actions are considered democratic rights. In this paper, I investigated the impact of gender on the perception that voting is a civic duty but other factors (in particular age and education) might influence perceptions of dutifulness in regard to different political actions. It might also be interesting to explore how contextual (e.g. institutional) factors shape mass perceptions of dutifulness at the cross-national level. These are all interesting avenues for further research.</span></p></section></div><section data-dcnode-id="4684" id="ack0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4687" id="sectitle0010a"><span data-dcnode-id="4688" instrument_node="">Acknowledgement</span></h2><p data-dcnode-id="4685" id="p0010a"><span data-dcnode-id="4686" instrument_node="">The author is grateful for all the insightful feedback provided by the anonymous reviewers. A special thanks is also extended to Dan Biggers, William Daniel, and all of the participants at the UCR Mass Behavior workshop.</span></p></section><div class="Appendices" data-dcnode-id="4659"><section data-dcnode-id="4660" id="appsec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4680" id="sectitle0065"><span data-dcnode-id="4683" instrument_node="">Appendix A</span><span data-dcnode-id="4682" instrument_node="">. </span><span data-dcnode-id="4681" instrument_node="">Supplementary data</span></h2><p data-dcnode-id="4661" id="p0275"><span data-dcnode-id="4679" instrument_node="">The following is the supplementary data related to this article:</span><span class="display" data-dcnode-id="4662"><span class="e-compo
