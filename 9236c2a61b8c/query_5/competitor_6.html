</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>Previous research in comparative political behavior has generated an interesting paradox. Female citizens are less likely to engage in a variety of political activities (e.g. contacting politicians and working for parties), and are less cognitively engaged with the political process (i.e. they have lower levels of political interest and political efficacy). However, for reasons that remain unclear, several cross-national surveys reveal that there is no gender gap in electoral participation. In a number of countries, such as the United States, turnout rates for women have even slightly exceeded turnout rates for men in recent elections. I argue that the main reason for this pattern is the higher sense of civic duty of female citizens. This theory is grounded in research in social psychology that demonstrates that women have a higher level of conscientiousness than men. I use data from the 2014 ISSP Citizenship module to test my theoretical expectations, and find strong support for the argument that civic duty mediates the relationship between sex and electoral participation.</p></div></div></div>" data-dcnode-id="7892" lang="en" name="citation_abstract"><span data-dcnode-id="7891" instrument_node="">

38 0 12.12-2.76 16.14-7.12l28.64 15.38c-0.5 1.84-0.78 3.76-0.78 5.74 0 12.14 9.86 22 22 22s22-9.86 22-22-9.86-22-22-22z" data-dcnode-id="7352"></path></svg><span class="button-text" data-dcnode-id="7349"><span data-dcnode-id="7350" instrument_node="">Share</span></span></button></div></div></div><div class="ExportCitation u-display-inline-block" data-dcnode-id="7337" id="export-citation"><div class="popover export-citation-popover" data-dcnode-id="7338" id="export-citation-popover"><div data-dcnode-id="7339" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="7340" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="7343" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="7344" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="7341"><span data-dcnode-id="7342" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="7330" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="7333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.electstud.2018.01.007" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="7334" instrument_node="">https://doi.org/10.1016/j.electstud.2018.01.007</span></a><a class="rights-and-content" data-dcnode-id="7331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0261379417303815%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7332" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="7329"></section><section class="ReferencedArticles" data-dcnode-id="7328"></section><div class="PageDivider" data-dcnode-id="7327"></div><div class="Abstracts u-font-serif" data-dcnode-id="7313" id="abstracts"><div class="abstract author" data-dcnode-id="7314" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7325"><span data-dcnode-id="7326" instrument_node="">Abstract</span></h2><div data-dcnode-id="7315" id="abssec0010"><p data-dcnode-id="7316" id="abspara0010"><span data-dcnode-id="7320"><span data-dcnode-id="7324" instrument_node="">Previous research in comparative </span><a class="topic-link" data-dcnode-id="7322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/political-behaviour" title="Learn more about political behavior from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7323" instrument_node="">political behavior</span></a><span data-dcnode-id="7321" instrument_node=""> has generated an interesting paradox. Female citizens are less likely to engage in a variety of political activities (e.g. contacting politicians and working for parties), and are less cognitively engaged with the political process (i.e. they have lower levels of political interest and political efficacy). However, for reasons that remain unclear, several cross-national surveys reveal that there is no gender gap in electoral participation. In a number of countries, such as the United States, turnout rates for women have even slightly exceeded turnout rates for men in recent elections. I argue that the main reason for this pattern is the higher sense of civic duty of female citizens. This theory is grounded in research in social psychology that demonstrates that women have a higher level of conscientiousness than men. I use data from the 2014 ISSP </span></span><a class="topic-link" data-dcnode-id="7318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/citizenship" title="Learn more about Citizenship from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7319" instrument_node="">Citizenship</span></a><span data-dcnode-id="7317" instrument_node=""> module to test my theoretical expectations, and find strong support for the argument that civic duty mediates the relationship between sex and electoral participation.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="7290" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="7302"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="7303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261379417303153"><svg class="icon icon-navigate-left" data-dcnode-id="7311" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="7312"></path></svg><span class="button-alternative-text" data-dcnode-id="7304"><strong data-dcnode-id="7309"><span data-dcnode-id="7310" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="7307"><span data-dcnode-id="7308" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="7305"><span data-dcnode-id="7306" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="7291"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="7292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261379417300902"><span class="button-alternative-text" data-dcnode-id="7295"><strong data-dcnode-id="7300"><span data-dcnode-id="7301" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="7298"><span data-dcnode-id="7299" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="7296"><span data-dcnode-id="7297" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="7293" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="7294"></path></svg></a></li></ul><span data-dcnode-id="7289" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4658" id="body"><div data-dcnode-id="4689"><section data-dcnode-id="7196" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7285" id="sectitle0015"><span data-dcnode-id="7288" instrument_node="">1</span><span data-dcnode-id="7287" instrument_node="">. </span><span data-dcnode-id="7286" instrument_node="">Introduction</span></h2><p data-dcnode-id="7260" id="p0010"><span data-dcnode-id="7276"><span data-dcnode-id="7280"><span data-dcnode-id="7284" instrument_node="">One of the most robust findings in the </span><a class="topic-link" data-dcnode-id="7282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/political-participation" title="Learn more about political participation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7283" instrument_node="">political participation</span></a><span data-dcnode-id="7281" instrument_node=""> literature is that there are persistent participatory </span></span><a class="topic-link" data-dcnode-id="7278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/inequality" title="Learn more about inequalities from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7279" instrument_node="">inequalities</span></a><span data-dcnode-id="7277" instrument_node="">. Certain sociodemographic groups are considerably less likely to engage in mainstream political activities, such as voting, contacting politicians, and working for political parties. In particular, young citizens, individuals with lower socioeconomic status, and women tend to participate less in conventional political activities (</span></span><a class="workspace-trigger" data-dcnode-id="7274" href="#bib24" name="bbib24"><span data-dcnode-id="7275" instrument_node="">Dalton, 2017</span></a><span data-dcnode-id="7273" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7271" href="#bib71" name="bbib71"><span data-dcnode-id="7272" instrument_node="">Schlozman et al., 2012</span></a><span data-dcnode-id="7270" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7268" href="#bib77" name="bbib77"><span data-dcnode-id="7269" instrument_node="">Teorell et al., 2007</span></a><span data-dcnode-id="7267" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7265" href="#bib82" name="bbib82"><span data-dcnode-id="7266" instrument_node="">Verba et al., 1995</span></a><span data-dcnode-id="7264" instrument_node="">). In this paper, I focus on an understudied paradox in the study of gender participatory inequalities: i.e. the lack of a gender gap in </span><em data-dcnode-id="7262"><span data-dcnode-id="7263" instrument_node="">electoral</span></em><span data-dcnode-id="7261" instrument_node=""> participation.</span></p><p data-dcnode-id="7246" id="p0015"><span data-dcnode-id="7259" instrument_node="">Previous comparative research has shown a clear gender gap in political engagement. First, women are less likely to be cognitively engaged with the political process. Female citizens tend to be less politically interested and less politically informed than male citizens (</span><a class="workspace-trigger" data-dcnode-id="7257" href="#bib34" name="bbib34"><span data-dcnode-id="7258" instrument_node="">Fraile and Gómez, 2017</span></a><span data-dcnode-id="7256" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7254" href="#bib46" name="bbib46"><span data-dcnode-id="7255" instrument_node="">Inglehart and Norris, 2003</span></a><span data-dcnode-id="7253" instrument_node="">). Second, women tend to participate less in the political arena. They are less likely to contact politicians, to work for political parties, and to participate in demonstrations (</span><a class="workspace-trigger" data-dcnode-id="7251" href="#bib18" name="bbib18"><span data-dcnode-id="7252" instrument_node="">Coffé and Bolzendahl, 2010</span></a><span data-dcnode-id="7250" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7248" href="#bib58" name="bbib58"><span data-dcnode-id="7249" instrument_node="">Marien et al., 2010</span></a><span data-dcnode-id="7247" instrument_node="">).</span></p><p data-dcnode-id="7229" id="p0020"><span data-dcnode-id="7245" instrument_node="">Two types of arguments have commonly been offered to explain why women are less likely to participate in political activities. First, cultural explanations emphasize the traditional norms, attitudes, and values about the role of men and women in public life. Cultural norms limit female political engagement because the political arena is perceived as a male domain (</span><a class="workspace-trigger" data-dcnode-id="7243" href="#bib46" name="bbib46"><span data-dcnode-id="7244" instrument_node="">Inglehart and Norris, 2003</span></a><span data-dcnode-id="7242" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7240" href="#bib48" name="bbib48"><span data-dcnode-id="7241" instrument_node="">Jennings, 1983</span></a><span data-dcnode-id="7239" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7237" href="#bib66" name="bbib66"><span data-dcnode-id="7238" instrument_node="">Paxton and Kunovich, 2003</span></a><span data-dcnode-id="7236" instrument_node="">). Second, resource-based explanations link gender gaps in political activism to concomitant gender gaps in wealth, income, time, or access to networks. The non-political institutions of daily life (e.g. the family and the workplace) generate gender differences in resources and skills which create barriers for female political participation (</span><a class="workspace-trigger" data-dcnode-id="7234" href="#bib12" name="bbib12"><span data-dcnode-id="7235" instrument_node="">Burns et al., 2001</span></a><span data-dcnode-id="7233" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7231" href="#bib70" name="bbib70"><span data-dcnode-id="7232" instrument_node="">Schlozman et al., 1994</span></a><span data-dcnode-id="7230" instrument_node="">).</span></p><p data-dcnode-id="7199" id="p0025"><span data-dcnode-id="7228" instrument_node="">However, previous research studying the impact of sex on electoral participation finds no clear gender gap. While some studies report no statistically significant difference in turnout across genders (</span><a class="workspace-trigger" data-dcnode-id="7226" href="#bib1" name="bbib1"><span data-dcnode-id="7227" instrument_node="">Alexander and Coffé, 2018</span></a><span data-dcnode-id="7225" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7223" href="#bib37" name="bbib37"><span data-dcnode-id="7224" instrument_node="">Gallego, 2007</span></a><span data-dcnode-id="7222" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7220" href="#bib58" name="bbib58"><span data-dcnode-id="7221" instrument_node="">Marien et al., 2010</span></a><span data-dcnode-id="7219" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7217" href="#bib64" name="bbib64"><span data-dcnode-id="7218" instrument_node="">Norris, 2002</span></a><span data-dcnode-id="7216" instrument_node="">), other studies suggest that women are slightly more likely to vote in a variety of contexts (</span><a class="workspace-trigger" data-dcnode-id="7214" href="#bib15" name="bbib15"><span data-dcnode-id="7215" instrument_node="">Carreras and Castañeda-Angarita, 2014</span></a><span data-dcnode-id="7213" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7211" href="#bib18" name="bbib18"><span data-dcnode-id="7212" instrument_node="">Coffé and Bolzendahl, 2010</span></a><span data-dcnode-id="7210" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7208" href="#bib20" name="bbib20"><span data-dcnode-id="7209" instrument_node="">Conway et al., 1997</span></a><span data-dcnode-id="7203"><span data-dcnode-id="7207" instrument_node="">). This is a relatively new phenomenon. Until about the 1990s, female turnout was lower than that of men in most countries where this relationship was investigated. This was due to a habit of non-voting which resulted from women's </span><a class="topic-link" data-dcnode-id="7205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/political-socialization" title="Learn more about political socialization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7206" instrument_node="">political socialization</span></a><span data-dcnode-id="7204" instrument_node=""> before female enfranchisement (</span></span><a class="workspace-trigger" data-dcnode-id="7201" href="#bib35" name="bbib35"><span data-dcnode-id="7202" instrument_node="">Franklin, 2004</span></a><span data-dcnode-id="7200" instrument_node="">). But the trend has clearly reversed in the past few decades. This constitutes a real paradox. If women are less interested in politics, less informed, and less knowledgeable; why are they not less likely to go to the polls on Election Day? While previous studies have shown this inconsistency between the electoral participation of women and their overall political participation, they have not fully explained what drives these patterns.</span></p><p data-dcnode-id="7197" id="p0030"><span data-dcnode-id="7198" instrument_node="">I argue that the lack of a gender gap in electoral participation is related to the fact that female citizens are more likely to feel a strong civic duty to participate in elections. Previous research in social psychology has established that women are more conscientious than men, i.e. they are more likely to dutifully perform tasks and to take seriously obligations to others. This is critical to understand why there is no gender gap in electoral participation (a participatory form often presented as a democratic duty), while at the same time women participate less in other political activities, such as protest or party work (participatory forms that can be described as democratic rights rather than duties).</span></p></section><section data-dcnode-id="5828" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7192" id="sectitle0020"><span data-dcnode-id="7195" instrument_node="">2</span><span data-dcnode-id="7194" instrument_node="">. </span><span data-dcnode-id="7193" instrument_node="">Gender differences in political participation</span></h2><p data-dcnode-id="7160" id="p0035"><span data-dcnode-id="7187"><span data-dcnode-id="7191" instrument_node="">After conducting a seven-nation comparison of different dimensions of </span><a class="topic-link" data-dcnode-id="7189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/political-participation" title="Learn more about political participation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7190" instrument_node="">political participation</span></a><span data-dcnode-id="7188" instrument_node=""> during the 1970s, </span></span><a class="workspace-trigger" data-dcnode-id="7185" href="#bib81" name="bbib81"><span data-dcnode-id="7186" instrument_node="">Verba et al. (1978</span></a><span data-dcnode-id="7180"><span data-dcnode-id="7184" instrument_node="">: 267) concluded: “In all societies for which we have data, sex is related to political activity; men are more active than women.” By and large, the gender gap in political engagement has been confirmed in more recent cross-national studies. Women are less likely to participate in the political arena, even after controlling for sociodemographic characteristics and relevant </span><a class="topic-link" data-dcnode-id="7182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/political-behaviour" title="Learn more about political attitudes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7183" instrument_node="">political attitudes</span></a><span data-dcnode-id="7181" instrument_node="">, such as political interest (</span></span><a class="workspace-trigger" data-dcnode-id="7178" href="#bib18" name="bbib18"><span data-dcnode-id="7179" instrument_node="">Coffé and Bolzendahl, 2010</span></a><span data-dcnode-id="7177" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7175" href="#bib58" name="bbib58"><span data-dcnode-id="7176" instrument_node="">Marien et al., 2010</span></a><span data-dcnode-id="7174" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="7171" href="#fn1" name="bfn1"><sup data-dcnode-id="7172"><span data-dcnode-id="7173" instrument_node="">1</span></sup></a><span data-dcnode-id="7170" instrument_node=""> However, for reasons that remain unclear, there is no similar gender gap in electoral participation (</span><a class="workspace-trigger" data-dcnode-id="7168" href="#bib15" name="bbib15"><span data-dcnode-id="7169" instrument_node="">Carreras and Castañeda-Angarita, 2014</span></a><span data-dcnode-id="7167" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7165" href="#bib18" name="bbib18"><span data-dcnode-id="7166" instrument_node="">Coffé and Bolzendahl, 2010</span></a><span data-dcnode-id="7164" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7162" href="#bib58" name="bbib58"><span data-dcnode-id="7163" instrument_node="">Marien et al., 2010</span></a><span data-dcnode-id="7161" instrument_node="">).</span></p><p data-dcnode-id="7155" id="p0040"><span data-dcnode-id="7159" instrument_node="">This section uses several recent cross-national datasets to assess whether these patterns can be observed in various contexts. I use data from the 2014 International Social Survey Program (ISSP) </span><a class="topic-link" data-dcnode-id="7157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/citizenship" title="Learn more about Citizenship from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7158" instrument_node="">Citizenship</span></a><span data-dcnode-id="7156" instrument_node=""> module, several waves of the European Social Surveys (ESS), and several waves of the AmericasBarometer (LAPOP) to evaluate whether female respondents are more or less likely to be politically engaged and to participate in different political activities.</span></p><div data-dcnode-id="6024"><p data-dcnode-id="7144" id="p0045"><span data-dcnode-id="7154" instrument_node="">The models presented in </span><a class="workspace-trigger" data-dcnode-id="7152" href="#tbl1" name="btbl1"><span data-dcnode-id="7153" instrument_node="">Table 1</span></a><span data-dcnode-id="7151" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7149" href="#tbl2" name="btbl2"><span data-dcnode-id="7150" instrument_node="">Table 2</span></a><span data-dcnode-id="7148" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7146" href="#tbl3" name="btbl3"><span data-dcnode-id="7147" instrument_node="">Table 3</span></a><span data-dcnode-id="7145" instrument_node=""> evaluate whether respondents’ sex is associated with cognitive political engagement (models 1–4) and a variety of participatory forms (models 5–8). The results of these analyses provide additional support for the gender participation gaps identified in previous research. Women are markedly less cognitively engaged with the political process. The cross-national survey data reveals that female respondents are less likely to be politically interested, to be politically informed, to feel politically efficacious and to have a partisan identification. Similarly, the results confirm that women are less likely to engage in a variety of participatory forms in the political arena, such as contacting politicians (except in Latin America), working for a political party, attending political meetings, and participating in protest demonstrations. In sum, the models clearly show that women tend to be less politically active than men.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="6795" id="tbl1"><span class="captions" data-dcnode-id="7134"><span data-dcnode-id="7135" id="cap0015"><p data-dcnode-id="7136" id="tspara0010"><span class="label" data-dcnode-id="7142"><span data-dcnode-id="7143" instrument_node="">Table 1</span></span><span data-dcnode-id="7141" instrument_node="">. </span><span data-dcnode-id="7140" instrument_node="">Determinants of </span><a class="topic-link" data-dcnode-id="7138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/political-participation" title="Learn more about political participation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7139" instrument_node="">political participation</span></a><span data-dcnode-id="7137" instrument_node=""> in 33 countries (ISSP 2014).</span></p></span></span><div class="groups" data-dcnode-id="6801"><table data-dcnode-id="6802"><thead data-dcnode-id="7097"><tr class="ro -id="6063" instrument_node="">101,770</span></td><td class="align-left" data-dcnode-id="6060"><span data-dcnode-id="6061" instrument_node="">118,612</span></td><td class="align-left" data-dcnode-id="6058"><span data-dcnode-id="6059" instrument_node="">113,218</span></td><td class="align-left" data-dcnode-id="6056"><span data-dcnode-id="6057" instrument_node="">98,513</span></td><td class="align-left" data-dcnode-id="6054"><span data-dcnode-id="6055" instrument_node="">117,102</span></td></tr><tr class="valign-top" data-dcnode-id="6034"><td class="align-left" data-dcnode-id="6051"><span data-dcnode-id="6052" instrument_node="">Number of groups</span></td><td class="align-left" data-dcnode-id="6049"><span data-dcnode-id="6050" instrument_node="">22</span></td><td class="align-left" data-dcnode-id="6047"><span data-dcnode-id="6048" instrument_node="">22</span></td><td class="align-left" data-dcnode-id="6045"><span data-dcnode-id="6046" instrument_node="">22</span></td><td class="align-left" data-dcnode-id="6043"><span data-dcnode-id="6044" instrument_node="">22</span></td><td class="align-left" data-dcnode-id="6041"><span data-dcnode-id="6042" instrument_node="">22</span></td><td class="align-left" data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">21</span></td><td class="align-left" data-dcnode-id="6037"><span data-dcnode-id="6038" instrument_node="">22</span></td><td class="align-left" data-dcnode-id="6035"><span data-dcnode-id="6036" instrument_node="">22</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="6026"></p><p data-dcnode-id="6029" id="tspara0045"><span data-dcnode-id="6030" instrument_node="">Standard errors in parentheses.</span></p><p data-dcnode-id="6027" id="tspara0050"><span data-dcnode-id="6028" instrument_node="">***p&nbsp;&lt;&nbsp;0.01, **p&nbsp;&lt;&nbsp;0.05, *p&nbsp;&lt;&nbsp;0.1.</span></p><p></p></div></div><div data-dcnode-id="5942"><p data-dcnode-id="5997" id="p0050"><span data-dcnode-id="6023" instrument_node="">However, the gender gap is reversed for the models estimating the relationship between respondents’ sex and electoral participation (model 8 in </span><a class="workspace-trigger" data-dcnode-id="6021" href="#tbl1" name="btbl1"><span data-dcnode-id="6022" instrument_node="">Table 1</span></a><span data-dcnode-id="6020" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6018" href="#tbl2" name="btbl2"><span data-dcnode-id="6019" instrument_node="">Table 2</span></a><span data-dcnode-id="6017" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6015" href="#tbl3" name="btbl3"><span data-dcnode-id="6016" instrument_node="">Table 3</span></a><span data-dcnode-id="6014" instrument_node="">). The three cross-national survey datasets show that female respondents are more likely to vote in national elections. In order to assess the substantive importance of this gender gap, I estimated the predicted probabilities of electoral participation for female and male respondents when other variables are held at their mean values. These predicted probabilities are presented in </span><a class="workspace-trigger" data-dcnode-id="6012" href="#tbl4" name="btbl4"><span data-dcnode-id="6013" instrument_node="">Table 4</span></a><span data-dcnode-id="6011" instrument_node="">.</span><a class="workspace-trigger" data-dcnode-id="6008" href="#fn2" name="bfn2"><sup data-dcnode-id="6009"><span data-dcnode-id="6010" instrument_node="">2</span></sup></a><span data-dcnode-id="6007" instrument_node=""> The gap in electoral participation is substantively small in the three cross-national surveys. The regression models based on ESS and ISSP surveys show a 1 percentage point difference in the likelihood of voting, while the results of the analysis using LAPOP data suggest a slightly larger effect (a 3-percentage points difference). My results therefore confirm the findings of recent studies that show that there is no gender gap in electoral participation (</span><a class="workspace-trigger" data-dcnode-id="6005" href="#bib1" name="bbib1"><span data-dcnode-id="6006" instrument_node="">Alexander and Coffé, 2018</span></a><span data-dcnode-id="6004" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6002" href="#bib37" name="bbib37"><span data-dcnode-id="6003" instrument_node="">Gallego, 2007</span></a><span data-dcnode-id="6001" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5999" href="#bib58" name="bbib58"><span data-dcnode-id="6000" instrument_node="">Marien et al., 2010</span></a><span data-dcnode-id="5998" instrument_node="">). If anything, the predicted probabilities indicate that women are slightly more likely to vote.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="5943" id="tbl4"><span class="captions" data-dcnode-id="5990"><span data-dcnode-id="5991" id="cap0030"><p data-dcnode-id="5992" id="tspara0055"><span class="label" data-dcnode-id="5995"><span data-dcnode-id="5996" instrument_node="">Table 4</span></span><span data-dcnode-id="5994" instrument_node="">. </span><span data-dcnode-id="5993" instrument_node="">Predicted probabilities of electoral participation, by sex (ESS and LAPOP).</span></p></span></span><div class="groups" data-dcnode-id="5944"><table data-dcnode-id="5945"><thead data-dcnode-id="5985"><tr class="rowsep-1 valign-top" data-dcnode-id="5986"><th colspan="2" data-dcnode-id="5987" scope="col"><strong data-dcnode-id="5988"><span data-dcnode-id="5989" instrument_node="">ISSP</span></strong></th></tr></thead><tbody data-dcnode-id="5946"><tr class="valign-top" data-dcnode-id="5980"><td class="align-left" data-dcnode-id="5983"><span data-dcnode-id="5984" instrument_node="">Female</span></td><td class="align-left" data-dcnode-id="5981"><span data-dcnode-id="5982" instrument_node="">.85</span></td></tr><tr class="valign-top" data-dcnode-id="5975"><td class="rowsep-1 align-left" data-dcnode-id="5978"><span data-dcnode-id="5979" instrument_node="">Male</span></td><td class="rowsep-1 align-left" data-dcnode-id="5976"><span data-dcnode-id="5977" instrument_node="">.84</span></td></tr><tr class="valign-top" data-dcnode-id="5971"><td class="rowsep-1 align-left" colspan="2" data-dcnode-id="5972"><strong data-dcnode-id="5973"><span data-dcnode-id="5974" instrument_node="">ESS</span></strong></td></tr><tr class="valign-top" data-dcnode-id="5966"><td class="align-left" data-dcnode-id="5969"><span data-dcnode-id="5970" instrument_node="">Female</span></td><td class="align-left" data-dcnode-id="5967"><span data-dcnode-id="5968" instrument_node="">.81</span></td></tr><tr class="valign-top" data-dcnode-id="5961"><td class="rowsep-1 align-left" data-dcnode-id="5964"><span data-dcnode-id="5965" instrument_node="">Male</span></td><td class="rowsep-1 align-left" data-dcnode-id="5962"><span data-dcnode-id="5963" instrument_node="">.80</span></td></tr><tr class="valign-top" data-dcnode-id="5957"><td class="rowsep-1 align-left" colspan="2" data-dcnode-id="5958"><strong data-dcnode-id="5959"><span data-dcnode-id="5960" instrument_node="">LAPOP</span></strong></td></tr><tr class="valign-top" data-dcnode-id="5952"><td class="align-left" data-dcnode-id="5955"><span data-dcnode-id="5956" instrument_node="">Female</span></td><td class="align-left" data-dcnode-id="5953"><span data-dcnode-id="5954" instrument_node="">.78</span></td></tr><tr class="valign-top" data-dcnode-id="5947"><td class="align-left" data-dcnode-id="5950"><span data-dcnode-id="5951" instrument_node="">Male</span></td><td class="align-left" data-dcnode-id="5948"><span data-dcnode-id="5949" instrument_node="">.75</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="5899" id="p0055"><span data-dcnode-id="5941" instrument_node="">How can we make sense of the results presented in this section? In particular, why is there no gender gap in turnout? The literature offers three possible explanations for this pattern. First, previous research has shown that voting is the most egalitarian form of political participation (</span><a class="workspace-trigger" data-dcnode-id="5939" href="#bib25" name="bbib25"><span data-dcnode-id="5940" instrument_node="">Dalton et al., 2005</span></a><span data-dcnode-id="5938" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5936" href="#bib82" name="bbib82"><span data-dcnode-id="5937" instrument_node="">Verba et al., 1995</span></a><span data-dcnode-id="5935" instrument_node="">). Participating in elections requires fewer resources (in terms of time, economic, and cognitive resources) than contacting politicians or working for a political party (</span><a class="workspace-trigger" data-dcnode-id="5933" href="#bib12" name="bbib12"><span data-dcnode-id="5934" instrument_node="">Burns et al., 2001</span></a><span data-dcnode-id="5932" instrument_node="">). For instance, </span><a class="workspace-trigger" data-dcnode-id="5930" href="#bib77" name="bbib77"><span data-dcnode-id="5931" instrument_node="">Teorell et al. (2007)</span></a><span data-dcnode-id="5925"><span data-dcnode-id="5929" instrument_node=""> conduct a cross-national analysis of participatory </span><a class="topic-link" data-dcnode-id="5927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/inequality" title="Learn more about inequalities from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5928" instrument_node="">inequalities</span></a><span data-dcnode-id="5926" instrument_node=""> in 13 European societies and they conclude that “voting appears to be greatly insulated from inequalities based on social groupings” (</span></span><a class="workspace-trigger" data-dcnode-id="5923" href="#bib77" name="bbib77"><span data-dcnode-id="5924" instrument_node="">Teorell et al., 2007</span></a><span data-dcnode-id="5922" instrument_node="">: 398).</span><a class="workspace-trigger" data-dcnode-id="5919" href="#fn3" name="bfn3"><sup data-dcnode-id="5920"><span data-dcnode-id="5921" instrument_node="">3</span></sup></a><span data-dcnode-id="5918" instrument_node=""> Second, voting is a more private form of participation –the vote is secret and individuals are alone in the ballot box– which allows women to have a voice without having to openly and vocally defend their ideas in the political arena. Since many women feel that politics is a male domain and perceive themselves as less qualified than men to be politically active (</span><a class="workspace-trigger" data-dcnode-id="5916" href="#bib54" name="bbib54"><span data-dcnode-id="5917" instrument_node="">Lawless and Fox, 2005</span></a><span data-dcnode-id="5915" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5913" href="#bib66" name="bbib66"><span data-dcnode-id="5914" instrument_node="">Paxton and Kunovich, 2003</span></a><span data-dcnode-id="5912" instrument_node="">), the individualized nature of the act of voting might also contribute to the absence of a gender gap in electoral participation. Third, scholars have suggested that women may “find it easier to participate in ways that can be incorporated in daily life and do not put more strain on already (relatively) limited resources” (</span><a class="workspace-trigger" data-dcnode-id="5910" href="#bib18" name="bbib18"><span data-dcnode-id="5911" instrument_node="">Coffé and Bolzendahl, 2010</span></a><span data-dcnode-id="5909" instrument_node="">: 320). While most studies tend to focus on non-institutionalized “private” actions –e.g. political consumerism and signing petitions– (</span><a class="workspace-trigger" data-dcnode-id="5907" href="#bib56" name="bbib56"><span data-dcnode-id="5908" instrument_node="">Lowndes, 2000</span></a><span data-dcnode-id="5906" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5904" href="#bib75" name="bbib75"><span data-dcnode-id="5905" instrument_node="">Stolle and Hooghe, 2011</span></a><span data-dcnode-id="5903" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5901" href="#bib76" name="bbib76"><span data-dcnode-id="5902" instrument_node="">Stolle et al., 2005</span></a><span data-dcnode-id="5900" instrument_node="">), voting is also a political activity that women can more easily intertwine with their daily routines.</span></p><p data-dcnode-id="5894" id="p0060"><span data-dcnode-id="5898" instrument_node="">In sum, previous studies suggest that the lack of a gender gap in electoral participation is related to the fact that voting is easier than other forms of political participation because it is less time-consuming, less public, and requires fewer civic skills. I argue here that this is only part of the explanation. The decision to take part in an election is not only a result of individual resources. In a survey analysis of the anticipated political engagement of American teenagers, </span><a class="workspace-trigger" data-dcnode-id="5896" href="#bib44" name="bbib44"><span data-dcnode-id="5897" instrument_node="">Hooghe and Stolle (2004)</span></a><span data-dcnode-id="5895" instrument_node=""> reveal that fourteen-year old girls anticipate voting at a higher rate than fourteen-year old boys (83.8 vs. 75). This finding is interesting because it suggests that women report a higher likelihood of future turnout at a time when systematic differences in the availability of resources have not yet crystalized (i.e. adolescence).</span></p><p data-dcnode-id="5843" id="p0065"><span data-dcnode-id="5893" instrument_node="">More generally, the classic theoretical framework developed by </span><a class="workspace-trigger" data-dcnode-id="5891" href="#bib82" name="bbib82"><span data-dcnode-id="5892" instrument_node="">Verba et al. (1995)</span></a><span data-dcnode-id="5886"><span data-dcnode-id="5890" instrument_node=""> suggests that the participatory process rests on three main factors: motivation, capacity, and networks of </span><a class="topic-link" data-dcnode-id="5888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/recruitment" title="Learn more about recruitment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5889" instrument_node="">recruitment</span></a><span data-dcnode-id="5887" instrument_node="">. The motivation to participate in elections is strongly associated with factors such as political interest, political efficacy, political awareness, and partisanship (</span></span><a class="workspace-trigger" data-dcnode-id="5884" href="#bib15" name="bbib15"><span data-dcnode-id="5885" instrument_node="">Carreras and Castañeda-Angarita, 2014</span></a><span data-dcnode-id="5883" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5881" href="#bib53" name="bbib53"><span data-dcnode-id="5882" instrument_node="">Kuenzi and Lambright, 2011</span></a><span data-dcnode-id="5880" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5878" href="#bib64" name="bbib64"><span data-dcnode-id="5879" instrument_node="">Norris, 2002</span></a><span data-dcnode-id="5877" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5875" href="#bib79" name="bbib79"><span data-dcnode-id="5876" instrument_node="">Verba et al., 1997</span></a><span data-dcnode-id="5874" instrument_node="">). An extensive body of research (covering different geographical areas) reveals that women tend to know less about politics, be less politically interested, and less politically efficacious (</span><a class="workspace-trigger" data-dcnode-id="5872" href="#bib1" name="bbib1"><span data-dcnode-id="5873" instrument_node="">Alexander and Coffé, 2018</span></a><span data-dcnode-id="5871" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5869" href="#bib6" name="bbib6"><span data-dcnode-id="5870" instrument_node="">Bennett and Bennett, 1989</span></a><span data-dcnode-id="5868" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5866" href="#bib31" name="bbib31"><span data-dcnode-id="5867" instrument_node="">Ferrín Pereira et al., 2015</span></a><span data-dcnode-id="5865" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5863" href="#bib33" name="bbib33"><span data-dcnode-id="5864" instrument_node="">Fraile and Gómez, 2017</span></a><span data-dcnode-id="5862" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5860" href="#bib34" name="bbib34"><span data-dcnode-id="5861" instrument_node="">Fraile and Gómez, 2017</span></a><span data-dcnode-id="5859" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5857" href="#bib46" name="bbib46"><span data-dcnode-id="5858" instrument_node="">Inglehart and Norris, 2003</span></a><span data-dcnode-id="5856" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5854" href="#bib79" name="bbib79"><span data-dcnode-id="5855" instrument_node="">Verba et al., 1997</span></a><span data-dcnode-id="5853" instrument_node="">). The results presented in </span><a class="workspace-trigger" data-dcnode-id="5851" href="#tbl1" name="btbl1"><span data-dcnode-id="5852" instrument_node="">Table 1</span></a><span data-dcnode-id="5850" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5848" href="#tbl2" name="btbl2"><span data-dcnode-id="5849" instrument_node="">Table 2</span></a><span data-dcnode-id="5847" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5845" href="#tbl3" name="btbl3"><span data-dcnode-id="5846" instrument_node="">Table 3</span></a><span data-dcnode-id="5844" instrument_node=""> once again confirm these patterns, and also show that women tend to be less attached to political parties.</span></p><p data-dcnode-id="5829" id="p0070"><span data-dcnode-id="5842" instrument_node="">We are then confronted with a paradox. Since women are less cognitively engaged with the political process (i.e. less interested in politics and less efficacious), they should be less motivated to vote. However, the results in </span><a class="workspace-trigger" data-dcnode-id="5840" href="#tbl1" name="btbl1"><span data-dcnode-id="5841" instrument_node="">Table 1</span></a><span data-dcnode-id="5839" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5837" href="#tbl2" name="btbl2"><span data-dcnode-id="5838" instrument_node="">Table 2</span></a><span data-dcnode-id="5836" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5834" href="#tbl3" name="btbl3"><span data-dcnode-id="5835" instrument_node="">Table 3</span></a><span data-dcnode-id="5833" instrument_node=""> suggest that, if anything, women's propensity to vote is slightly higher than that of male citizens. This paradox was also noted in a study of political interest in the United States: “since political interest has long been known to be a powerful determinant of turnout, why is it that women's turnout rate is now equal men's while gender differences in interest remain?” (</span><a class="workspace-trigger" data-dcnode-id="5831" href="#bib6" name="bbib6"><span data-dcnode-id="5832" instrument_node="">Bennett and Bennett, 1989</span></a><span data-dcnode-id="5830" instrument_node="">: 117). In the remainder of this paper, I argue that the lack of a gender gap in turnout is related to the fact that female citizens have a stronger sense of civic duty to vote, which acts as a powerful motivator for women's electoral participation.</span></p></section><section data-dcnode-id="5623" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5824" id="sectitle0025"><span data-dcnode-id="5827" instrument_node="">3</span><span data-dcnode-id="5826" instrument_node="">. </span><span data-dcnode-id="5825" instrument_node="">Civic duty and female electoral participation</span></h2><p data-dcnode-id="5816" id="p0075"><span data-dcnode-id="5823" instrument_node="">In any large election, the probability that any particular vote will be decisive is extremely small. From a rational choice perspective, the act of voting appears irrational because the costs of voting (e.g. the time required to go to the polling station) are always higher than any benefit that might be obtained (</span><a class="workspace-trigger" data-dcnode-id="5821" href="#bib65" name="bbib65"><span data-dcnode-id="5822" instrument_node="">Owen and Grofman, 1984</span></a><span data-dcnode-id="5820" instrument_node="">). Still, most people vote in most national elections. </span><a class="workspace-trigger" data-dcnode-id="5818" href="#bib32" name="bbib32"><span data-dcnode-id="5819" instrument_node="">Fiorina (1981)</span></a><span data-dcnode-id="5817" instrument_node=""> describes this pattern as the “paradox of voting.”</span></p><p data-dcnode-id="5808" id="p0080"><span data-dcnode-id="5815" instrument_node="">How can we make sense of the relatively high electoral participation rate in modern democracies? One of the main arguments that has been proposed to explain the paradox of voting is that citizens feel a civic duty to vote. As </span><a class="workspace-trigger" data-dcnode-id="5813" href="#bib36" name="bbib36"><span data-dcnode-id="5814" instrument_node="">Galais and Blais (2016</span></a><span data-dcnode-id="5812" instrument_node="">: 213) write,</span></p><blockquote data-dcnode-id="5809"><p data-dcnode-id="5810" id="dspara0010"><span data-dcnode-id="5811" instrument_node="">“One possible reason [for high electoral participation] is that they feel it is a citizen's duty to vote in a democracy. People vote not because they calculate that the benefits outweigh the costs but because they consider that this is the ‘right’, ‘ethical’ thing to do. They believe that they have a moral obligation to vote.”</span></p></blockquote><p></p><p data-dcnode-id="5782" id="p0085"><span data-dcnode-id="5807" instrument_node="">The belief that there is a duty to vote is often associated with a social norm (</span><a class="workspace-trigger" data-dcnode-id="5805" href="#bib7" name="bbib7"><span data-dcnode-id="5806" instrument_node="">Blais, 2000</span></a><span data-dcnode-id="5804" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5802" href="#bib19" name="bbib19"><span data-dcnode-id="5803" instrument_node="">Coleman, 1990</span></a><span data-dcnode-id="5801" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5799" href="#bib63" name="bbib63"><span data-dcnode-id="5800" instrument_node="">Mueller, 1989</span></a><span data-dcnode-id="5798" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5796" href="#bib78" name="bbib78"><span data-dcnode-id="5797" instrument_node="">Uhlaner, 1986</span></a><span data-dcnode-id="5795" instrument_node="">). Citizens are members of a broader community, and the act of voting is a public good. Turning out to vote is something that is perceived by citizens as necessary for the well-being of the community and for maintaining healthy democratic systems. In other words, citizens are not narrowly self-interested, and they vote to conform with a cooperative norm even when the costs of voting are relatively high. The civic duty to vote is internalized in early adulthood through socialization (</span><a class="workspace-trigger" data-dcnode-id="5793" href="#bib13" name="bbib13"><span data-dcnode-id="5794" instrument_node="">Campbell, 2008</span></a><span data-dcnode-id="5792" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5790" href="#bib41" name="bbib41"><span data-dcnode-id="5791" instrument_node="">Gidengil et al., 2016</span></a><span data-dcnode-id="5789" instrument_node="">), which creates a feeling of guilt when this socially cooperative norm is violated –i.e. when people do not vote– (</span><a class="workspace-trigger" data-dcnode-id="5787" href="#bib7" name="bbib7"><span data-dcnode-id="5788" instrument_node="">Blais, 2000</span></a><span data-dcnode-id="5786" instrument_node="">). The duty to vote is also externally enforced by the social networks in which individuals are embedded, which often create a social pressure to go to the polls on Election Day (</span><a class="workspace-trigger" data-dcnode-id="5784" href="#bib52" name="bbib52"><span data-dcnode-id="5785" instrument_node="">Knack and Kropf, 1998</span></a><span data-dcnode-id="5783" instrument_node="">).</span></p><p data-dcnode-id="5753" id="p0090"><span data-dcnode-id="5781" instrument_node="">Moreover, citizens are often reminded of their moral obligation to vote by the media, political leaders, and even some religious institutions around election time. Major national newspapers often publish editorials or op-ed pieces before elections reminding citizens of the importance of the act of voting (</span><a class="workspace-trigger" data-dcnode-id="5779" href="#bib5" name="bbib5"><span data-dcnode-id="5780" instrument_node="">Bátiz, 2009</span></a><span data-dcnode-id="5778" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5776" href="#bib42" name="bbib42"><span data-dcnode-id="5777" instrument_node="">Guénolé, 2012</span></a><span data-dcnode-id="5775" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5773" href="#bib59" name="bbib59"><span data-dcnode-id="5774" instrument_node="">Maskivker, 2016</span></a><span data-dcnode-id="5772" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="5770" href="#bib52" name="bbib52"><span data-dcnode-id="5771" instrument_node="">Knack and Kropf (1998</span></a><span data-dcnode-id="5769" instrument_node="">: 593) similarly show that local newspapers in the United States communicate to their readers that voting is a civic duty. Political leaders also remind voters of the importance of voting before elections, and celebrate high rates of electoral participation after elections (even when they are defeated). In a similar vein, some religious institutions (in particular the Catholic Church) present the act of voting as a moral obligation that citizens should perform (</span><a class="workspace-trigger" data-dcnode-id="5767" href="#bib16" name="bbib16"><span data-dcnode-id="5768" instrument_node="">Clarín, 2001</span></a><span data-dcnode-id="5766" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5764" href="#bib29" name="bbib29"><span data-dcnode-id="5765" instrument_node="">El País, 2008</span></a><span data-dcnode-id="5763" instrument_node="">). It is then not surprising that the belief that voting is a civic duty is held by a majority of citizens in most democracies. Previous research estimates that between 70% and 80% of citizens in different democratic regimes have internalized the norm that voting in national elections is a duty (</span><a class="workspace-trigger" data-dcnode-id="5761" href="#bib7" name="bbib7"><span data-dcnode-id="5762" instrument_node="">Blais, 2000</span></a><span data-dcnode-id="5760" instrument_node="">: 105; </span><a class="workspace-trigger" data-dcnode-id="5758" href="#bib10" name="bbib10"><span data-dcnode-id="5759" instrument_node="">Bolzendahl and Coffé, 2013</span></a><span data-dcnode-id="5757" instrument_node="">: 52; </span><a class="workspace-trigger" data-dcnode-id="5755" href="#bib11" name="bbib11"><span data-dcnode-id="5756" instrument_node="">Bowler and Donovan, 2013</span></a><span data-dcnode-id="5754" instrument_node="">: 269).</span></p><p data-dcnode-id="5721" id="p0095"><span data-dcnode-id="5752" instrument_node="">Several studies demonstrate a strong link between civic duty and turnout. People who express a moral obligation to vote are much more likely to participate in elections (</span><a class="workspace-trigger" data-dcnode-id="5750" href="#bib7" name="bbib7"><span data-dcnode-id="5751" instrument_node="">Blais, 2000</span></a><span data-dcnode-id="5749" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5747" href="#bib10" name="bbib10"><span data-dcnode-id="5748" instrument_node="">Bolzendahl and Coffé, 2013</span></a><span data-dcnode-id="5746" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5744" href="#bib82" name="bbib82"><span data-dcnode-id="5745" instrument_node="">Verba et al., 1995</span></a><span data-dcnode-id="5743" instrument_node="">). In fact, previous research suggests that citizens' duty is one of the strongest predictors of electoral participation at the individual level (</span><a class="workspace-trigger" data-dcnode-id="5741" href="#bib17" name="bbib17"><span data-dcnode-id="5742" instrument_node="">Clarke et al., 2004</span></a><span data-dcnode-id="5740" instrument_node="">: 259; </span><a class="workspace-trigger" data-dcnode-id="5738" href="#bib23" name="bbib23"><span data-dcnode-id="5739" instrument_node="">Dalton, 2008</span></a><span data-dcnode-id="5737" instrument_node="">). While some scholars argue that the ‘D term’ might simply be an a posteriori rationalization of the act of voting (</span><a class="workspace-trigger" data-dcnode-id="5735" href="#bib60" name="bbib60"><span data-dcnode-id="5736" instrument_node="">Matsusaka and Palda, 1999</span></a><span data-dcnode-id="5734" instrument_node="">), recent research with panel data suggests that this view is misguided. In fact, several studies show that respondents who express a civic duty to vote </span><em data-dcnode-id="5732"><span data-dcnode-id="5733" instrument_node="">before</span></em><span data-dcnode-id="5731" instrument_node=""> an election are more likely to go to the polls on Election Day (</span><a class="workspace-trigger" data-dcnode-id="5729" href="#bib9" name="bbib9"><span data-dcnode-id="5730" instrument_node="">Blais and Rubenson, 2013</span></a><span data-dcnode-id="5728" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5726" href="#bib36" name="bbib36"><span data-dcnode-id="5727" instrument_node="">Galais and Blais, 2016</span></a><span data-dcnode-id="5725" instrument_node="">). In a similar vein, experimental research shows that when people are reminded of their duty to participate in elections, they are significantly more likely to vote (</span><a class="workspace-trigger" data-dcnode-id="5723" href="#bib40" name="bbib40"><span data-dcnode-id="5724" instrument_node="">Gerber et al., 2008</span></a><span data-dcnode-id="5722" instrument_node="">).</span></p><p data-dcnode-id="5697" id="p0100"><span data-dcnode-id="5716"><span data-dcnode-id="5720" instrument_node="">The key argument in this paper is that female citizens are more likely to feel a moral obligation to vote. This hypothesis is based on psychological research which has identified consistent gender gaps in personality traits. The Five Factor Model in psychology suggests that five broad dimensions can be used to describe the human personality: openness to experience, conscientiousness, extraversion, agreeableness, and </span><a class="topic-link" data-dcnode-id="5718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/neuroticism" title="Learn more about neuroticism from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5719" instrument_node="">neuroticism</span></a><span data-dcnode-id="5717" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="5714" href="#bib26" name="bbib26"><span data-dcnode-id="5715" instrument_node="">Digman, 1990</span></a><span data-dcnode-id="5713" instrument_node="">). One of these dimensions is particularly important for our purposes, i.e. conscientiousness. </span><a class="workspace-trigger" data-dcnode-id="5711" href="#bib49" name="bbib49"><span data-dcnode-id="5712" instrument_node="">John and Srivastava (1999</span></a><span data-dcnode-id="5710" instrument_node="">: 121) describe conscientiousness as “socially prescribed impulse control that facilitates task- and goal-directed behavior, such as thinking before acting, delaying gratification, following norms and rules, and planning, organizing, and prioritizing tasks.” Conscientious individuals are more likely to behave dutifully and to follow social norms (</span><a class="workspace-trigger" data-dcnode-id="5708" href="#bib61" name="bbib61"><span data-dcnode-id="5709" instrument_node="">McCrae and Costa, 2005</span></a><span data-dcnode-id="5707" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5705" href="#bib62" name="bbib62"><span data-dcnode-id="5706" instrument_node="">Mondak, 2010</span></a><span data-dcnode-id="5704" instrument_node="">). Recent studies similarly show that conscientious people feel a stronger sense of civic duty to vote in US and Spanish elections (</span><a class="workspace-trigger" data-dcnode-id="5702" href="#bib38" name="bbib38"><span data-dcnode-id="5703" instrument_node="">Gallego and Oberski, 2012</span></a><span data-dcnode-id="5701" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5699" href="#bib84" name="bbib84"><span data-dcnode-id="5700" instrument_node="">Weinschenk, 2014</span></a><span data-dcnode-id="5698" instrument_node="">).</span></p><p data-dcnode-id="5686" id="p0105"><span data-dcnode-id="5696" instrument_node="">Previous research in psychology has revealed that women tend to be more conscientious than men. </span><a class="workspace-trigger" data-dcnode-id="5694" href="#bib72" name="bbib72"><span data-dcnode-id="5695" instrument_node="">Schmitt et al. (2008)</span></a><span data-dcnode-id="5693" instrument_node=""> study gender differences in personality traits across 55 cultures, and find that women report higher levels of conscientiousness than men in most countries. </span><a class="workspace-trigger" data-dcnode-id="5691" href="#bib30" name="bbib30"><span data-dcnode-id="5692" instrument_node="">Feingold (1994)</span></a><span data-dcnode-id="5690" instrument_node=""> similarly shows that women in Canada, China, Finland, Germany, Poland, and Russia score higher than men on a scale related to the personality trait of conscientiousness. Another cross-national analysis of 25 countries shows that women are more dutiful than men (</span><a class="workspace-trigger" data-dcnode-id="5688" href="#bib22" name="bbib22"><span data-dcnode-id="5689" instrument_node="">Costa et al., 2001</span></a><span data-dcnode-id="5687" instrument_node="">). In sum, there is consistent cross-national evidence indicating a higher level of conscientiousness among women.</span></p><p data-dcnode-id="5659" id="p0110"><span data-dcnode-id="5685" instrument_node="">The reason for this difference is not entirely clear. One of the leading explanations of sex differences in personality traits across cultures is the social role model. According to this model, the observed gender differences in personality and social behavior result from a process of sex role socialization which defines appropriate behavior for men and women. Individuals observe since an early age the social roles occupied by men and women, and derive from this socialization a series of beliefs about the desirable attributes for each sex (</span><a class="workspace-trigger" data-dcnode-id="5683" href="#bib27" name="bbib27"><span data-dcnode-id="5684" instrument_node="">Eagly, 1987</span></a><span data-dcnode-id="5682" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5680" href="#bib68" name="bbib68"><span data-dcnode-id="5681" instrument_node="">Ruble et al., 2007</span></a><span data-dcnode-id="5679" instrument_node="">). In most cultures, women are much less likely to occupy leadership positions and are overrepresented in lower-level positions in organizations (</span><a class="workspace-trigger" data-dcnode-id="5677" href="#bib28" name="bbib28"><span data-dcnode-id="5678" instrument_node="">Eagly and Karau, 2002</span></a><span data-dcnode-id="5676" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5674" href="#bib43" name="bbib43"><span data-dcnode-id="5675" instrument_node="">Heilman, 2001</span></a><span data-dcnode-id="5669"><span data-dcnode-id="5673" instrument_node="">). This unequal gender distribution of leadership roles might influence the personality traits of women and men. In particular, the higher level of conscientiousness observed among women might result from the fact that women occupy lower-level positions in which they have to follow norms decided by people in leadership positions (mostly men). In fact, research in social and </span><a class="topic-link" data-dcnode-id="5671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/political-behaviour" title="Learn more about political psychology from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5672" instrument_node="">political psychology</span></a><span data-dcnode-id="5670" instrument_node=""> has consistently shown that men are more likely than women to be perceived as having </span></span><em data-dcnode-id="5667"><span data-dcnode-id="5668" instrument_node="">agentic</span></em><span data-dcnode-id="5666" instrument_node=""> characteristics –i.e. forcefulness, self-sufficiency, and self-confidence– (</span><a class="workspace-trigger" data-dcnode-id="5664" href="#bib27" name="bbib27"><span data-dcnode-id="5665" instrument_node="">Eagly, 1987</span></a><span data-dcnode-id="5663" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5661" href="#bib45" name="bbib45"><span data-dcnode-id="5662" instrument_node="">Huddy and Terkildsen, 1993</span></a><span data-dcnode-id="5660" instrument_node="">).</span></p><p data-dcnode-id="5657" id="p0115"><span data-dcnode-id="5658" instrument_node="">Regardless of what drives this gender gap in dutifulness and conscientiousness, I argue that these personality differences are critical to explain why women are more likely to go to the polls on Election Day. From the discussion above, it is clear that conscientiousness is positively associated with the feeling of civic duty; and the feeling of civic duty is in turn positively associated with the decision to participate in elections. Hence, the higher level of conscientiousness observed among women might be the key element to solve the puzzle identified above, i.e. lower female political engagement but no gender gap in electoral participation.</span></p><p data-dcnode-id="5649" id="p0120"><span data-dcnode-id="5656" instrument_node="">To my knowledge, this is the first study that attempts to explain the absence of a gender gap in electoral participation by looking at differences in the civic duty to vote for each sex. However, there are some findings in recent studies that are consistent with this argument. </span><a class="workspace-trigger" data-dcnode-id="5654" href="#bib21" name="bbib21"><span data-dcnode-id="5655" instrument_node="">Córdova and Rangel (2017)</span></a><span data-dcnode-id="5653" instrument_node=""> show that compulsory voting increases electoral participation, but that this effect is particularly strong for female citizens. In other words, female citizens are more responsive to norms that make voting mandatory. This is exactly what the theory of this paper would predict. In a similar vein, </span><a class="workspace-trigger" data-dcnode-id="5651" href="#bib83" name="bbib83"><span data-dcnode-id="5652" instrument_node="">Wang (2014)</span></a><span data-dcnode-id="5650" instrument_node=""> shows that conscientiousness increases female electoral participation in the United States, but has no effect on male turnout. Both studies suggest that dutifulness and respect for social norms are particularly important to explain the turnout decision of female citizens.</span></p><p data-dcnode-id="5638" id="p0125"><span data-dcnode-id="5648" instrument_node="">Building on these studies, I argue that female citizens have a higher sense of civic duty than male citizens. I further contend that this gender gap in civic duty is largely responsible for the relatively high level of female turnout. While previous research has shown that women are more likely to express a civic duty to vote in countries such as Canada (</span><a class="workspace-trigger" data-dcnode-id="5646" href="#bib7" name="bbib7"><span data-dcnode-id="5647" instrument_node="">Blais, 2000</span></a><span data-dcnode-id="5645" instrument_node="">), the United Kingdom (</span><a class="workspace-trigger" data-dcnode-id="5643" href="#bib11" name="bbib11"><span data-dcnode-id="5644" instrument_node="">Bowler and Donovan, 2013</span></a><span data-dcnode-id="5642" instrument_node="">), and the United States (</span><a class="workspace-trigger" data-dcnode-id="5640" href="#bib84" name="bbib84"><span data-dcnode-id="5641" instrument_node="">Weinschenk, 2014</span></a><span data-dcnode-id="5639" instrument_node="">), no study has addressed this hypothesis systematically with a large cross-national dataset.</span></p><p data-dcnode-id="5624" id="p0130"><span data-dcnode-id="5637" instrument_node="">The hypotheses of this paper follow from this discussion:</span></p><section data-dcnode-id="5631"><p data-dcnode-id="5634" id="enun1"><strong data-dcnode-id="5635"><span data-dcnode-id="5636" instrument_node="">Hypothesis 1</span></strong></p><p data-dcnode-id="5632" id="p0135"><span data-dcnode-id="5633" instrument_node="">Female citizens are more likely to feel a civic duty to vote.</span></p></section><section data-dcnode-id="5625"><p data-dcnode-id="5628" id="enun2"><strong data-dcnode-id="5629"><span data-dcnode-id="5630" instrument_node="">Hypothesis 2</span></strong></p><p data-dcnode-id="5626" id="p0140"><span data-dcnode-id="5627" instrument_node="">The positive relationship between the variables “female” and “turnout” is mediated by the sense of civic duty.</span></p></section><p></p></section><section data-dcnode-id="5574" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5619" id="sectitle0030"><span data-dcnode-id="5622" instrument_node="">4</span><span data-dcnode-id="5621" instrument_node="">. </span><span data-dcnode-id="5620" instrument_node="">Research design</span></h2><p data-dcnode-id="5610" id="p0145"><span data-dcnode-id="5614"><span data-dcnode-id="5618" instrument_node="">I use data from the 2014 International Social Survey Program (ISSP) module on </span><a class="topic-link" data-dcnode-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/citizenship" title="Learn more about Citizenship from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5617" instrument_node="">Citizenship</span></a><span data-dcnode-id="5615" instrument_node="">. The ISSP is a cross-national collaboration conducting annual surveys on diverse topics relevant to social sciences. Each survey is fielded by a scientific organization within the member nation, typically as part of a larger random survey of the adult population. More detailed information on the 2014 Citizenship module is available in </span></span><a class="workspace-trigger" data-dcnode-id="5612" href="#bib73" name="bbib73"><span data-dcnode-id="5613" instrument_node="">Scholz et al. (2017)</span></a><span data-dcnode-id="5611" instrument_node="">.</span></p><p data-dcnode-id="5601" id="p0150"><span data-dcnode-id="5609" instrument_node="">The sample I analyze has individual-level data from 33 countries. The 2014 ISSP module includes data from several rich consolidated democracies, but also a number of newer and more fragile democracies.</span><a class="workspace-trigger" data-dcnode-id="5606" href="#fn4" name="bfn4"><sup data-dcnode-id="5607"><span data-dcnode-id="5608" instrument_node="">4</span></sup></a><span data-dcnode-id="5605" instrument_node=""> After dropping observations with missing data on the independent variables (</span><a class="workspace-trigger" data-dcnode-id="5603" href="#bib2" name="bbib2"><span data-dcnode-id="5604" instrument_node="">Allison, 2002</span></a><span data-dcnode-id="5602" instrument_node="">), the sample size is 44,675.</span></p><p data-dcnode-id="5589" id="p0155"><span data-dcnode-id="5600" instrument_node="">This 2014 ISSP Citizenship module is appropriate for this analysis because it includes a question that can be used to capture respondents’ civic duty to vote.</span><a class="workspace-trigger" data-dcnode-id="5597" href="#fn5" name="bfn5"><sup data-dcnode-id="5598"><span data-dcnode-id="5599" instrument_node="">5</span></sup></a><span data-dcnode-id="5596" instrument_node=""> The survey item used asked respondents the following question: “</span><em data-dcnode-id="5594"><span data-dcnode-id="5595" instrument_node="">There are different opinions as to what it takes to be a good citizen. As far as you are concerned personally on a scale of 1 to 7, where 1 is not at all important and 7 is very important, how important is it: always to vote in elections.</span></em><span data-dcnode-id="5593" instrument_node="">” Using this question, I created a dummy variable “civic duty to vote” coded as 1 when respondents answered 6 or 7 to the above question, and 0 otherwise.</span><a class="workspace-trigger" data-dcnode-id="5590" href="#fn6" name="bfn6"><sup data-dcnode-id="5591"><span data-dcnode-id="5592" instrument_node="">6</span></sup></a></p><p data-dcnode-id="5587" id="p0160"><span data-dcnode-id="5588" instrument_node="">The survey also includes a few questions that capture whether respondents feel a civic duty to be politically engaged (beyond voting). In particular, using the same 1–7 scale two survey items asked respondents whether keeping watch on the actions of government and being active in social or political associations was important to be a good citizen. I also recoded these variables into dummy variables to create the variables “duty to be politically active” and “duty to keep watch on government actions” (respondents who answered 6 or 7 on these items are coded as 1, everyone else is coded as 0).</span></p><p data-dcnode-id="5575" id="p0165"><span data-dcnode-id="5582"><span data-dcnode-id="5586" instrument_node="">The main independent variable in the statistical analysis below captures the sex of the respondent (coded as 1 if the respondent is a woman, and 0 if the respondent is a man). I also include in the analysis several sociodemographic characteristics (age, education, employment status, and place of residence) and one </span><a class="topic-link" data-dcnode-id="5584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/political-behaviour" title="Learn more about political attitude from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5585" instrument_node="">political attitude</span></a><span data-dcnode-id="5583" instrument_node=""> (satisfaction with democracy) that are traditionally associated with electoral participation in comparative studies (</span></span><a class="workspace-trigger" data-dcnode-id="5580" href="#bib15" name="bbib15"><span data-dcnode-id="5581" instrument_node="">Carreras and Castañeda-Angarita, 2014</span></a><span data-dcnode-id="5579" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5577" href="#bib53" name="bbib53"><span data-dcnode-id="5578" instrument_node="">Kuenzi and Lambright, 2011</span></a><span data-dcnode-id="5576" instrument_node="">), and might also be associated with the civic duty to vote.</span></p></section><section data-dcnode-id="5561" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5570" id="sectitle0035"><span data-dcnode-id="5573" instrument_node="">5</span><span data-dcnode-id="5572" instrument_node="">. </span><span data-dcnode-id="5571" instrument_node="">Model estimation</span></h2><p data-dcnode-id="5562" id="p0170"><span data-dcnode-id="5569" instrument_node="">The empirical model in this paper applies multilevel techniques that distinguish between two levels, that is, the individual level and the country level. The multilevel approach takes the layered character of the data into account. In my data set, individuals are embedded within 33 different countries. Multilevel models have the advantage that separate residual components can be specified at each level, and therefore, they adjust for the correlation of these error components of the various levels when estimating the coefficients (</span><a class="workspace-trigger" data-dcnode-id="5567" href="#bib39" name="bbib39"><span data-dcnode-id="5568" instrument_node="">Gelman and Hill, 2006</span></a><span data-dcnode-id="5566" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5564" href="#bib74" name="bbib74"><span data-dcnode-id="5565" instrument_node="">Steenbergen and Jones, 2002</span></a><span data-dcnode-id="5563" instrument_node="">). Hierarchical models also allow for a more precise estimation of individual-level factors because they control for important contextual factors that may bias the results. Because the dependent variables used in the empirical analysis are binary (duty to vote, duty to be politically active, and duty to keep watch on government actions), these models were estimated using a multilevel logistic regression.</span></p></section><section data-dcnode-id="5246" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5557" id="sectitle0040"><span data-dcnode-id="5560" instrument_node="">6</span><span data-dcnode-id="5559" instrument_node="">. </span><span data-dcnode-id="5558" instrument_node="">Results</span></h2><div data-dcnode-id="5386"><p data-dcnode-id="5553" id="p0175"><a class="workspace-trigger" data-dcnode-id="5555" href="#tbl5" name="btbl5"><span data-dcnode-id="5556" instrument_node="">Table 5</span></a><span data-dcnode-id="5554" instrument_node=""> presents three multilevel models estimating duty to engage in different political activities at the individual level. Three different “duties” are analyzed: the duty to vote, the duty to be active in social and political associations, and the duty to keep watch on government actions.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="5387" id="tbl5"><span class="captions" data-dcnode-id="5546"><span data-dcnode-id="5547" id="cap0035"><p data-dcnode-id="5548" id="tspara0060"><span class="label" data-dcnode-id="5551"><span data-dcnode-id="5552" instrument_node="">Table 5</span></span><span data-dcnode-id="5550" instrument_node="">. </span><span data-dcnode-id="5549" instrument_node="">Determinants of civic duty to vote, to be politically active, and to keep watch on government (ISSP 2014).</span></p></span></span><div class="groups" data-dcnode-id="5393"><table data-dcnode-id="5394"><thead data-dcnode-id="5529"><tr class="rowsep-1 valign-top" data-dcnode-id="5537"><th data-dcnode-id="5544" rowspan="2" scope="col"><span data-dcnode-id="5545" instrument_node="">Variables</span></th><th data-dcnode-id="5542" scope="col"><span data-dcnode-id="5543" instrument_node="">(1)</span></th><th data-dcnode-id="5540" scope="col"><span data-dcnode-id="5541" instrument_node="">(2)</span></th><th data-dcnode-id="5538" scope="col"><span data-dcnode-id="5539" instrument_node="">(3)</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="5530"><th data-dcnode-id="5535" scope="col"><span data-dcnode-id="5536" instrument_node="">Civic duty to vote</span></th><th data-dcnode-id="5533" scope="col"><span data-dcnode-id="5534" instrument_node="">Duty to be politically active</span></th><th data-dcnode-id="5531" scope="col"><span data-dcnode-id="5532" instrument_node="">Duty to keep watch on government</span></th></tr></thead><tbody data-dcnode-id="5395"><tr class="valign-top" data-dcnode-id="5520"><td class="align-left" data-dcnode-id="5527" rowspan="2"><span data-dcnode-id="5528" instrument_node="">Female</span></td><td class="align-left" data-dcnode-id="5525"><span data-dcnode-id="5526" instrument_node="">0.193***</span></td><td class="align-left" data-dcnode-id="5523"><span data-dcnode-id="5524" instrument_node="">0.034</span></td><td class="align-left" data-dcnode-id="5521"><span data-dcnode-id="5522" instrument_node="">−0.022</span></td></tr><tr class="valign-top" data-dcnode-id="5513"><td class="align-left" data-dcnode-id="5518"><span data-dcnode-id="5519" instrument_node="">(0.022)</span></td><td class="align-left" data-dcnode-id="5516"><span data-dcnode-id="5517" instrument_node="">(0.024)</span></td><td class="align-left" data-dcnode-id="5514"><span data-dcnode-id="5515" instrument_node="">(0.021)</span></td></tr><tr class="valign-top" data-dcnode-id="5504"><td class="align-left" data-dcnode-id="5511" rowspan="2"><span data-dcnode-id="5512" instrument_node="">Age</span></td><td class="align-left" data-dcnode-id="5509"><span data-dcnode-id="5510" instrument_node="">0.020***</span></td><td class="align-left" data-dcnode-id="5507"><span data-dcnode-id="5508" instrument_node="">0.007***</span></td><td class="align-left" data-dcnode-id="5505"><span data-dcnode-id="5506" instrument_node="">0.011***</span></td></tr><tr class="valign-top" data-dcnode-id="5497"><td class="align-left" data-dcnode-id="5502"><span data-dcnode-id="5503" instrument_node="">(0.001)</span></td><td class="align-left" data-dcnode-id="5500"><span data-dcnode-id="5501" instrument_node="">(0.001)</span></td><td class="align-left" data-dcnode-id="5498"><span data-dcnode-id="5499" instrument_node="">(0.001)</span></td></tr><tr class="valign-top" data-dcnode-id="5488"><td class="align-left" data-dcnode-id="5495" rowspan="2"><span data-dcnode-id="5496" instrument_node="">Education</span></td><td class="align-left"
