</title><link data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hls.harvard.edu/favicon.ico&amp;raw" rel="shortcut icon" type="image/x-icon"><span data-dcnode-id="434" instrument_node="">

</span><h2 class="pagetitle" data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">The US Constitution: Is Reform Necessary? Is It Possible?</span></h2><span data-dcnode-id="421" instrument_node="">
</span><div class="CourseCatalog" data-dcnode-id="331" id="CatalogControl"><span data-dcnode-id="420" instrument_node="">
</span><div class="CourseDetailPanel" data-dcnode-id="333" id="CatalogControl_DetailPanel"><span data-dcnode-id="419" instrument_node="">
</span><p class="panel" data-dcnode-id="408"><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hls.harvard.edu/academics/curriculum/catalog/default.aspx%3Fyear%3D2020-2021%26faculty%3DLevinson%252C%2520Sanford"><span data-dcnode-id="418" instrument_node="">Professor Sanford Levinson</span></a><br data-dcnode-id="416"><a data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hls.harvard.edu/academics/curriculum/catalog/default.aspx%3Fyear%3D2020-2021%26term%3DFall%25202020"><span data-dcnode-id="415" instrument_node="">Fall 2020</span></a><span data-dcnode-id="413" instrument_node=""> reading group</span><br data-dcnode-id="412"><span data-dcnode-id="411" instrument_node="">Th 8:30am - 10:00am</span><br data-dcnode-id="410"><span data-dcnode-id="409" instrument_node="">1 classroom credit</span></p><div data-dcnode-id="341"><p data-dcnode-id="407"></p><p data-dcnode-id="406"></p><p data-dcnode-id="402"><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Prerequisites:</span></strong><span data-dcnode-id="403" instrument_node=""> None</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="397"><strong data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Exam Type:</span></strong><span data-dcnode-id="398" instrument_node=""> No Exam</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">The main impetus for the Constitution of 1787 was the perception, spelled out in the very first paragraph of Federalist 1, that the current system established under the Articles of Confederation was not serving the nation well; by Federalist 15, it would be described as an “imbecil[ic]” system demanding (and justifying) radical transformation.  The Framers of the 1787 Constitution scarcely believed they had achieved perfection, however; that is one reason for the existence of Article V, allowing amendment to the Constitution.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">The radical flaws of the 1787 Constitution both led to civil war in 1861 and then served as the basis for what were viewed as the corrective changes we sometimes refer to as “the Reconstruction Amendments.”  The term itself is completely ambiguous:  Were they designed to “restore” a Union that had gone amiss by straying from the original plan, or, instead, to create a fundamentally different (and better) Union that was fatally compromised from the outset and thus needed transformation?</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">We are meeting as we are, by Zoom, in part because the United States, like the rest of the world, is faced with a challenging pandemic that requires extraordinarily response.  But the summer of 2020 is also the occasion for the most important mass movement in the United States in at least a half-century, sparked by the murder of George Floyd in Minneapolis and building on the anger and organization of what has come to be called the Black Lives Matter movement.  Moreever, 2020 has been the year of the third impeachment trial in our history, where the Senate, on a completely partisan vote, acquitted Donald J. Trump of violating the Impeachment Clause after his impeachment, on an almost equally partisan vote, by the House of Representatives.  There will, of course, be an election in November, 2020, which will be carried out under the rules established by the “electoral college” system that is perhaps one of the most peculiar features of “American exceptionalism.”</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">All of these crises and events raise a variety of important legal issues.  Some of them can be viewed as “internal” to the existing constitutional order in the United States, i.e., turning on how one defines existing statutes or passages of the Constitution.  What is a “High Crime and Misdemeanor” anyway?  But there are also those who ask whether the system created by the 1787 Constitution, even as amended and “reconstructed,” does not have sufficiently “imbecilic” features to justify significant reform and transformation today. Would we, for example, be better off by having a process for a vote of “no confidence” in a president or even allowing, as in Wisconsin and California, the possibility of a “recall election” that could displace a president from office?  Might it even be time to consider replacing “presidentialism” with a parliamentary form of government?</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">I am not a neutral party with regard to such discussions.  I published a book in 2006, Our Undemocratic Constitution, that focused on a number of structural features that could not plausibly be defended under any 21st century theory of democracy.  In 2012, I published Framed:  America’s 51 Constitutions and the Crisis of Governance, in which the focus was less on the undemocratic features of the Constitution and more on the sheer fact that more and more of the American public was significantly dissatisfied with the actual operation of the national government, posing the possibility of a genuine “legitimacy crisis.”  My wife and I published a book in 2017, with a 2nd edition rapidly following in 2019, Fault Lines in the Constitution, ostensibly directed at teenagers, that set out the threats that, if activated, like geologic fault lines and techtonic plates, could destroy our polity and not only a great city.  I have advocated a new constitutional convention as one way of addressing these problems.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="380" instrument_node="">What is more telling, perhaps, is that for the first time in many years, there seems to be some genuine interest in the possibility of constitutional reform.  One of the assignments will be a report by a bi-partisan blue-ribbon commission put together by the American Academy of Arts and Sciences to address </span><a data-dcnode-id="378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amacad.org/sites/default/files/publication/downloads/2020-Democratic-Citizenship_Our-Common-Purpose_0.pdf"><span data-dcnode-id="379" instrument_node="">Our Common Purpose:  Reinventing American Democracy for the 21st Century</span></a><span data-dcnode-id="377" instrument_node="">. The National Constitution Center in Philadelphia has organized three groups, one “liberal,” one “conservative,” and the last “libertarian,” to offer proposed suggestions for constitutional reform, all of which should be available by the time of our first meeting.  I am chairing a group organized under the aegis of Michael Tomasky, the editor of Democracy, that is exploring what a constitution suitable to the 21st century might look like.</span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">So our project this semester will be to look at some of the suggested constitutional reforms and to debate their attractiveness.  One reason I am excited by the ability to teach this particular reading course during a time slot designed in part for students far away from the United States is that the inquiry will benefit strongly from a comparative approach that I anticipate that some of you will bring, whether or not you consider ourself to be  comparativists.</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Accompanying the question of the desirability of constitutional reform, though, is the quite separate question of whether it is in fact possible, especially if one operates under the constraints of Article V of the Constitution, which requires ratification of any proposed amendments by three-quarters of the 50 states, i.e., 38 states.  Theoretically, the thirteen states able to veto any proposed changes could comprise less than 5% of the total American population of approximately 340,000,000 people.  Thus the last of our eight sessions will be devoted entirely to this very practical problem (and the comparative question, of course, is how easy or hard it is in some of your own countries to effectuate significant constitutional change). Similar questions, incidentally, can be raised regarding the widely-recognized desirability of changing some of the ways the United Nations operates, particularly with regard to the Security Council and the unique possession by the five winning countries in World War II of the “veto power” that can override any decisions made by the majority of the Council.</span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Reading courses, of course, have no exams or extensive writing requirements.  I do, however, ask that all of you submit, over the course of our time together, two “response papers” of approximately 600-750 words to the readings assigned for the particular weeks of your choice.  A major purpose of these papers is to provide an agenda for our discussions.  That is, you should focus on whatever you regard as the most interesting aspects of the particular reading, about which you would be particularly benefit from some collective conversation.</span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="362"><strong data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Note:</span></strong><span data-dcnode-id="363" instrument_node=""> This reading group will meet for eight sessions held on the following dates: 9/10, 9/24, 10/8, 10/15, 10/22, 10/29, 11/5, 11/12</span></p><span data-dcnode-id="361" instrument_node="">
</span><p data-dcnode-id="358"><strong data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Textbook(s):</span></strong></p><span data-dcnode-id="357" instrument_node="">

</span><li data-dcnode-id="345"><span data-dcnode-id="349" instrument_node=""> </span><i data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Fault Lines in the Constitution: The Framers, Their Fights, and the Flaws that Affect Us Today</span></i><span data-dcnode-id="346" instrument_node=""> (Peachtree Publishing Co., 2d edition, 2019) </span></li><span data-dcnode-id="344" instrument_node="">
</span></ol><p data-dcnode-id="342"></p></div><p data-dcnode-id="335"><strong data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Subject Areas:</span></strong><span data-dcnode-id="338" instrument_node=""> </span><a data-dcnode-id="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hls.harvard.edu/academics/curriculum/catalog/default.aspx%3Fyear%3D2020-2021%26subject%3DConstitutional%2520Law%2520%2526%2520Civil%2520Rights"><span data-dcnode-id="337" instrument_node="">Constitutional Law &amp; Civil Rights</span></a></p><span data-dcnode-id="334" instrument_node="">
