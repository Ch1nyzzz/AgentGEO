</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="6375" id="firstHeading"><span data-dcnode-id="6376" instrument_node="">Amendments to the Voting Rights Act of 1965</span></h1><span data-dcnode-id="6374" instrument_node="">
</span><div class="vector-body" data-dcnode-id="427" id="bodyContent"><span data-dcnode-id="6373" instrument_node="">
</span><div class="noprint" data-dcnode-id="6371" id="siteSub"><span data-dcnode-id="6372" instrument_node="">From Wikipedia, the free encyclopedia</span></div><span data-dcnode-id="6370" instrument_node="">

</span><a class="mw-jump-link" data-dcnode-id="6362" href="#mw-head"><span data-dcnode-id="6363" instrument_node="">Jump to navigation</span></a><span data-dcnode-id="6361" instrument_node="">
</span><a class="mw-jump-link" data-dcnode-id="6359" href="#searchInput"><span data-dcnode-id="6360" instrument_node="">Jump to search</span></a><span data-dcnode-id="6358" instrument_node="">
</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="484" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="493"><div class="thumb tright" data-dcnode-id="6344"><div class="thumbinner" data-dcnode-id="6345" style="width:222px;"><a class="image" data-dcnode-id="6356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABush_Signs_Voting_Rights_Act_of_2006.jpg"><img alt="refer to caption" class="thumbimage" data-dcnode-id="6357" data-file-height="343" data-file-width="515" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Bush_Signs_Voting_Rights_Act_of_2006.jpg/220px-Bush_Signs_Voting_Rights_Act_of_2006.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Bush_Signs_Voting_Rights_Act_of_2006.jpg/330px-Bush_Signs_Voting_Rights_Act_of_2006.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Bush_Signs_Voting_Rights_Act_of_2006.jpg/440px-Bush_Signs_Voting_Rights_Act_of_2006.jpg 2x" width="220"></a><span data-dcnode-id="6355" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6346"><div class="magnify" data-dcnode-id="6353"><a class="internal" data-dcnode-id="6354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABush_Signs_Voting_Rights_Act_of_2006.jpg" title="Enlarge"></a></div><a data-dcnode-id="6351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="6352" instrument_node="">United States President</span></a><span data-dcnode-id="6350" instrument_node=""> </span><a data-dcnode-id="6348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="6349" instrument_node="">George W. Bush</span></a><span data-dcnode-id="6347" instrument_node=""> signs amendments to the Act in July 2006.</span></div></div></div><span data-dcnode-id="6343" instrument_node="">
</span><p data-dcnode-id="6322"><span data-dcnode-id="6342" instrument_node="">Congress enacted major </span><b data-dcnode-id="6340"><span data-dcnode-id="6341" instrument_node="">amendments to the Voting Rights Act of 1965</span></b><span data-dcnode-id="6339" instrument_node=""> in 1970, 1975, 1982, 1992, and 2006. Each of these amendments coincided with an impending expiration of some of the </span><a data-dcnode-id="6337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_Rights_Act_of_1965" title="Voting Rights Act of 1965"><span data-dcnode-id="6338" instrument_node="">Act's</span></a><span data-dcnode-id="6336" instrument_node=""> special provisions, which originally were set to expire by 1970. However, in recognition of the voting discrimination that continued despite the Act, Congress repeatedly amended the Act to reauthorize the special provisions.</span><sup class="reference" data-dcnode-id="6333" id="cite_ref-RevisedBailout_1-0"><a data-dcnode-id="6334" href="#cite_note-RevisedBailout-1"><span data-dcnode-id="6335" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6330"><span data-dcnode-id="6331" title="Page / location: 6–8"><span data-dcnode-id="6332" instrument_node="">: 6–8 </span></span></sup><sup class="reference" data-dcnode-id="6327" id="cite_ref-Bending_2-0"><a data-dcnode-id="6328" href="#cite_note-Bending-2"><span data-dcnode-id="6329" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6324"><span data-dcnode-id="6325" title="Page / location: 209–210"><span data-dcnode-id="6326" instrument_node="">: 209–210 </span></span></sup><span data-dcnode-id="6323" instrument_node="">
</span></p><p data-dcnode-id="6309"><span data-dcnode-id="6321" instrument_node="">In each of these amendments except for the 1992 amendments, Congress extended the special provisions that were tied to the coverage formula, such as the preclearance requirement. These provisions were extended for five years in 1970, seven years in 1975, and 25 years in both 1982 and 2006. In 1970 and 1975, Congress also expanded the coverage formula, supplementing it with new 1968 and 1972 trigger dates. Coverage was further enlarged in 1975 when Congress expanded the meaning of "tests or devices" to encompass any jurisdiction that provided English-only election information, such as ballots, if the jurisdiction had a single language minority group that constituted more than five percent of the jurisdiction's voting-age citizens. These expansions brought numerous jurisdictions into coverage, including many located outside of the South.</span><sup class="reference" data-dcnode-id="6318" id="cite_ref-DOJsection4_3-0"><a data-dcnode-id="6319" href="#cite_note-DOJsection4-3"><span data-dcnode-id="6320" instrument_node="">[3]</span></a></sup><span data-dcnode-id="6317" instrument_node=""> To ease the burdens of the reauthorized special provisions, Congress liberalized the bailout procedure in 1982, allowing covered jurisdictions to escape coverage by upholding the voting rights of protected minorities and affirmatively acting to expand minority political participation.</span><sup class="reference" data-dcnode-id="6314" id="cite_ref-democracy_4-0"><a data-dcnode-id="6315" href="#cite_note-democracy-4"><span data-dcnode-id="6316" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6311"><span data-dcnode-id="6312" title="Page / location: 523"><span data-dcnode-id="6313" instrument_node="">: 523 </span></span></sup><span data-dcnode-id="6310" instrument_node="">
</span></p><p data-dcnode-id="6274"><span data-dcnode-id="6308" instrument_node="">In addition to reauthorizing the special provisions and expanding coverage, Congress amended and added several other provisions to the Act. For instance, Congress expanded the original ban on "tests or devices" to apply nationwide in 1970, and in 1975, Congress made the ban permanent.</span><sup class="reference" data-dcnode-id="6305" id="cite_ref-RevisedBailout_1-1"><a data-dcnode-id="6306" href="#cite_note-RevisedBailout-1"><span data-dcnode-id="6307" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6302"><span data-dcnode-id="6303" title="Page / location: 6–9"><span data-dcnode-id="6304" instrument_node="">: 6–9 </span></span></sup><span data-dcnode-id="6301" instrument_node=""> Separately, in 1975 Congress expanded the Act's scope to protect </span><a data-dcnode-id="6299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minority_language" title="Minority language"><span data-dcnode-id="6300" instrument_node="">language minorities</span></a><span data-dcnode-id="6298" instrument_node=""> from voting discrimination. Congress defined "language minority" to include "persons who are </span><a data-dcnode-id="6296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Native_Americans_in_the_United_States" title="Native Americans in the United States"><span data-dcnode-id="6297" instrument_node="">American Indian</span></a><span data-dcnode-id="6295" instrument_node="">, </span><a data-dcnode-id="6293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asian_Americans" title="Asian Americans"><span data-dcnode-id="6294" instrument_node="">Asian American</span></a><span data-dcnode-id="6292" instrument_node="">, </span><a data-dcnode-id="6290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska_Natives" title="Alaska Natives"><span data-dcnode-id="6291" instrument_node="">Alaskan Natives</span></a><span data-dcnode-id="6289" instrument_node=""> or of </span><a data-dcnode-id="6287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hispanic_and_Latino_Americans" title="Hispanic and Latino Americans"><span data-dcnode-id="6288" instrument_node="">Spanish heritage</span></a><span data-dcnode-id="6286" instrument_node="">."</span><sup class="reference" data-dcnode-id="6283" id="cite_ref-5"><a data-dcnode-id="6284" href="#cite_note-5"><span data-dcnode-id="6285" instrument_node="">[5]</span></a></sup><span data-dcnode-id="6282" instrument_node=""> Congress amended various provisions, such as the Section 5 preclearance requirement and Section 2 general prohibition of discriminatory voting laws, to prohibit discrimination against language minorities.</span><sup class="reference" data-dcnode-id="6279" id="cite_ref-enfranchise_6-0"><a data-dcnode-id="6280" href="#cite_note-enfranchise-6"><span data-dcnode-id="6281" instrument_node="">[6]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6276"><span data-dcnode-id="6277" title="Page / location: 199"><span data-dcnode-id="6278" instrument_node="">: 199 </span></span></sup><span data-dcnode-id="6275" instrument_node="">
</span></p><p data-dcnode-id="6255"><span data-dcnode-id="6273" instrument_node="">Congress also enacted a bilingual election requirement in Section 203, which requires election officials in certain jurisdictions with large numbers of English-illiterate language minorities to provide ballots and voting information in the language of the language minority group. Originally set to expire after 10 years, Congress reauthorized Section 203 in 1982 for seven years, expanded and reauthorized it in 1992 for 15 years, and reauthorized it in 2006 for 25 years.</span><sup class="reference" data-dcnode-id="6270" id="cite_ref-CRS_7-0"><a data-dcnode-id="6271" href="#cite_note-CRS-7"><span data-dcnode-id="6272" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6267"><span data-dcnode-id="6268" title="Page / location: 19–21, 25, 49"><span data-dcnode-id="6269" instrument_node="">: 19–21, 25, 49 </span></span></sup><span data-dcnode-id="6266" instrument_node=""> The bilingual election requirements have remained controversial, with proponents arguing that bilingual assistance is necessary to enable recently naturalized citizens to vote and opponents arguing that the bilingual election requirements constitute costly </span><a data-dcnode-id="6264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unfunded_mandate" title="Unfunded mandate"><span data-dcnode-id="6265" instrument_node="">unfunded mandates</span></a><span data-dcnode-id="6263" instrument_node="">.</span><sup class="reference" data-dcnode-id="6260" id="cite_ref-CRS_7-1"><a data-dcnode-id="6261" href="#cite_note-CRS-7"><span data-dcnode-id="6262" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6257"><span data-dcnode-id="6258" title="Page / location: 26"><span data-dcnode-id="6259" instrument_node="">: 26 </span></span></sup><span data-dcnode-id="6256" instrument_node="">
</span></p><p data-dcnode-id="6212"><span data-dcnode-id="6254" instrument_node="">Several of the amendments responded to judicial rulings that Congress disagreed with. In 1982, amended the Section 2 general prohibition of discriminatory voting laws to overturn the Supreme Court case </span><i data-dcnode-id="6251"><a data-dcnode-id="6252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mobile_v._Bolden" title="Mobile v. Bolden"><span data-dcnode-id="6253" instrument_node="">Mobile v. Bolden</span></a></i><span data-dcnode-id="6250" instrument_node=""> (1980), which held that Section 2 prohibited only </span><i data-dcnode-id="6248"><span data-dcnode-id="6249" instrument_node="">purposeful</span></i><span data-dcnode-id="6247" instrument_node=""> discrimination. Congress expanded Section 2 to explicitly ban any voting practice that had a discriminatory effect, irrespective of whether the practice was enacted or operated for a discriminatory purpose.</span><sup class="reference" data-dcnode-id="6244" id="cite_ref-Rhodes_2017_8-0"><a data-dcnode-id="6245" href="#cite_note-Rhodes_2017-8"><span data-dcnode-id="6246" instrument_node="">[8]</span></a></sup><span data-dcnode-id="6243" instrument_node=""> The creation of this "results test" shifted the majority of litigation brought under the Voting Rights Act from claims of Section 5 violations to claims of Section 2 violations.</span><sup class="reference" data-dcnode-id="6240" id="cite_ref-democracy_4-1"><a data-dcnode-id="6241" href="#cite_note-democracy-4"><span data-dcnode-id="6242" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6237"><span data-dcnode-id="6238" title="Page / location: 644–645"><span data-dcnode-id="6239" instrument_node="">: 644–645 </span></span></sup><span data-dcnode-id="6236" instrument_node=""> In 2006, Congress amended the Act to overturn two Supreme Court cases: </span><i data-dcnode-id="6233"><a class="new" data-dcnode-id="6234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReno_v._Bossier_Parish_School_Board%26action%3Dedit%26redlink%3D1" title="Reno v. Bossier Parish School Board (page does not exist)"><span data-dcnode-id="6235" instrument_node="">Reno v. Bossier Parish School Board</span></a></i><span data-dcnode-id="6232" instrument_node=""> (2000),</span><sup class="reference" data-dcnode-id="6229" id="cite_ref-Reno_9-0"><a data-dcnode-id="6230" href="#cite_note-Reno-9"><span data-dcnode-id="6231" instrument_node="">[9]</span></a></sup><span data-dcnode-id="6228" instrument_node=""> which interpreted Section 5 to prohibit voting changes that were enacted or maintained for a "retrogressive" discriminatory purpose instead of any discriminatory purpose, and </span><i data-dcnode-id="6225"><a data-dcnode-id="6226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgia_v._Ashcroft" title="Georgia v. Ashcroft"><span data-dcnode-id="6227" instrument_node="">Georgia v. Ashcroft</span></a></i><span data-dcnode-id="6224" instrument_node=""> (2003),</span><sup class="reference" data-dcnode-id="6221" id="cite_ref-Ash_10-0"><a data-dcnode-id="6222" href="#cite_note-Ash-10"><span data-dcnode-id="6223" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6220" instrument_node=""> which established a broader test for determining whether a redistricting plan had an impermissible effect under Section 5 than assessing only whether a minority group could elect its preferred candidates.</span><sup class="reference" data-dcnode-id="6217" id="cite_ref-Promise_11-0"><a data-dcnode-id="6218" href="#cite_note-Promise-11"><span data-dcnode-id="6219" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6214"><span data-dcnode-id="6215" title="Page / location: 207–208"><span data-dcnode-id="6216" instrument_node="">: 207–208 </span></span></sup><span data-dcnode-id="6213" instrument_node="">
</span></p><p data-dcnode-id="6183"><span data-dcnode-id="6211" instrument_node="">In response to the Supreme Court case </span><i data-dcnode-id="6208"><a data-dcnode-id="6209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shelby_County_v._Holder" title="Shelby County v. Holder"><span data-dcnode-id="6210" instrument_node="">Shelby County v. Holder</span></a></i><span data-dcnode-id="6207" instrument_node=""> (2013), which struck down the current coverage formula as unconstitutional,</span><sup class="reference" data-dcnode-id="6204" id="cite_ref-12"><a data-dcnode-id="6205" href="#cite_note-12"><span data-dcnode-id="6206" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6203" instrument_node=""> several amendment acts were proposed, all of which failed to make progress.</span><sup class="reference" data-dcnode-id="6200" id="cite_ref-13"><a data-dcnode-id="6201" href="#cite_note-13"><span data-dcnode-id="6202" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="6197" id="cite_ref-14"><a data-dcnode-id="6198" href="#cite_note-14"><span data-dcnode-id="6199" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="6194" id="cite_ref-15"><a data-dcnode-id="6195" href="#cite_note-15"><span data-dcnode-id="6196" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="6191" id="cite_ref-16"><a data-dcnode-id="6192" href="#cite_note-16"><span data-dcnode-id="6193" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="6188" id="cite_ref-17"><a data-dcnode-id="6189" href="#cite_note-17"><span data-dcnode-id="6190" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="6185" id="cite_ref-18"><a data-dcnode-id="6186" href="#cite_note-18"><span data-dcnode-id="6187" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6184" instrument_node="">
</span></p><span data-dcnode-id="6182" instrument_node="">

</span><table class="infobox" data-dcnode-id="6007" style="width:28.0em"><caption class="infobox-title" data-dcnode-id="6099" style="padding-bottom:0.25em"><span data-dcnode-id="6100" instrument_node="">Voting Rights Act, amendments of 1970</span></caption><tbody data-dcnode-id="6008"><tr data-dcnode-id="6095"><td class="infobox-image" colspan="2" data-dcnode-id="6096"><a class="image" data-dcnode-id="6097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGreat_Seal_of_the_United_States_%28obverse%29.svg"><img alt="Great Seal of the United States" data-dcnode-id="6098" data-file-height="600" data-file-width="600" decoding="async" height="140" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Great_Seal_of_the_United_States_%2528obverse%2529.svg/140px-Great_Seal_of_the_United_States_%2528obverse%2529.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Great_Seal_of_the_United_States_%28obverse%29.svg/210px-Great_Seal_of_the_United_States_%28obverse%29.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Great_Seal_of_the_United_States_%28obverse%29.svg/280px-Great_Seal_of_the_United_States_%28obverse%29.svg.png 2x" width="140"></a></td></tr><tr data-dcnode-id="6090"><th class="infobox-label" data-dcnode-id="6093" scope="row" style="padding-top:0.245em;line-height:1.15em;padding-right:0.65em"><span data-dcnode-id="6094" instrument_node="">Long title</span></th><td class="infobox-data" data-dcnode-id="6091" style="text-align:left;line-height:1.3em"><span data-dcnode-id="6092" instrument_node="">An Act To extend the Voting Rights Act of 1965 with respect to the discriminatory use of tests, and for other purposes</span></td></tr><tr data-dcnode-id="6083"><th class="infobox-label" data-dcnode-id="6088" scope="row" style="padding-top:0.245em;line-height:1.15em;padding-right:0.65em"><span data-dcnode-id="6089" instrument_node="">Enacted&nbsp;by</span></th><td class="infobox-data" data-dcnode-id="6084" style="text-align:left;line-height:1.3em"><span data-dcnode-id="6087" instrument_node="">the </span><a data-dcnode-id="6085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/91st_United_States_Congress" title="91st United States Congress"><span data-dcnode-id="6086" instrument_node="">91st United States Congress</span></a></td></tr><tr data-dcnode-id="6078"><th class="infobox-label" data-dcnode-id="6081" scope="row" style="padding-top:0.245em;line-height:1.15em;padding-right:0.65em"><span data-dcnode-id="6082" instrument_node="">Effective</span></th><td class="infobox-data" data-dcnode-id="6079" style="text-align:left;line-height:1.3em"><span data-dcnode-id="6080" instrument_node="">June 22, 1970</span></td></tr><tr data-dcnode-id="6075"><th class="infobox-header" colspan="2" data-dcnode-id="6076" style="background:#bbddff"><span data-dcnode-id="6077" instrument_node="">Citations</span></th></tr><tr data-dcnode-id="6069"><th class="infobox-label" data-dcnode-id="6073" scope="row" style="padding-top:0.245em;line-height:1.15em;padding-right:0.65em"><span data-dcnode-id="6074" instrument_node="">Public law</span></th><td class="infobox-data" data-dcnode-id="6070" style="text-align:left;line-height:1.3em"><a class="external text" data-dcnode-id="6071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govinfo.gov/content/pkg/STATUTE-84/pdf/STATUTE-84-Pg825.pdf" rel="nofollow"><span data-dcnode-id="6072" instrument_node="">91-825</span></a></td></tr><tr data-dcnode-id="6057"><th class="infobox-label" data-dcnode-id="6065" scope="row" style="padding-top:0.245em;line-height:1.15em;padding-right:0.65em"><a data-dcnode-id="6066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Statutes_at_Large" title="United States Statutes at Large"><span class="wrap" data-dcnode-id="6067"><span data-dcnode-id="6068" instrument_node="">Statutes at Large</span></span></a></th><td class="infobox-data" data-dcnode-id="6058" style="text-align:left;line-height:1.3em"><span data-dcnode-id="6064" instrument_node="">84&nbsp;</span><a data-dcnode-id="6062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Statutes_at_Large" title="United States Statutes at Large"><span data-dcnode-id="6063" instrument_node="">Stat.</span></a><span data-dcnode-id="6061" instrument_node="">&nbsp;</span><a class="external text" data-dcnode-id="6059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//legislink.org/us/stat-84-314" rel="nofollow"><span data-dcnode-id="6060" instrument_node="">314</span></a></td></tr><tr data-dcnode-id="6054"><th class="infobox-header" colspan="2" data-dcnode-id="6055" style="background:#bbddff"><span data-dcnode-id="6056" instrument_node="">Codification</span></th></tr><tr data-dcnode-id="6048"><th class="infobox-label" data-dcnode-id="6052" scope="row" style="padding-top:0.245em;line-height:1.15em;padding-right:0.65em"><span data-dcnode-id="6053" instrument_node="">Acts amended</span></th><td class="infobox-data" data-dcnode-id="6049" style="text-align:left;line-height:1.3em"><a data-dcnode-id="6050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_Rights_Act_of_1965" title="Voting Rights Act of 1965"><span data-dcnode-id="6051" instrument_node="">Voting Rights Act of 1965</span></a></td></tr><tr data-dcnode-id="6045"><th class="infobox-header" colspan="2" data-dcnode-id="6046" style="background:#bbddff"><span data-dcnode-id="6047" instrument_node="">Legislative history</span></th></tr><tr data-dcnode-id="6009"><td class="infobox-full-data" colspan="2" data-dcnode-id="6010" style="text-align:left;line-height:1.3em"><div data-dcnode-id="6011"><ul data-dcnode-id="6012" style="line-height:1.3em;text-align:left"><li data-dcnode-id="6041"><b data-dcnode-id="6043"><span data-dcnode-id="6044" instrument_node="">Introduced</span></b><span data-dcnode-id="6042" instrument_node=""> in the House as H.R. 4249  on January 23, 1969</span></li><li data-dcnode-id="6034"><b data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">Passed the House</span></b><span data-dcnode-id="6038" instrument_node=""> on December 11, 1969&nbsp;(</span><a class="external text" data-dcnode-id="6036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govtrack.us/congress/votes/91-1969/h151" rel="nofollow"><span data-dcnode-id="6037" instrument_node="">234-179</span></a><span data-dcnode-id="6035" instrument_node="">)</span></li><li data-dcnode-id="6027"><b data-dcnode-id="6032"><span data-dcnode-id="6033" instrument_node="">Passed the Senate</span></b><span data-dcnode-id="6031" instrument_node="">  on March 13, 1970&nbsp;(</span><a class="external text" data-dcnode-id="6029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govtrack.us/congress/votes/91-1970/s342" rel="nofollow"><span data-dcnode-id="6030" instrument_node="">64-12</span></a><span data-dcnode-id="6028" instrument_node="">) with amendment</span></li><li data-dcnode-id="6020"><b data-dcnode-id="6025"><span data-dcnode-id="6026" instrument_node="">House agreed to Senate amendment</span></b><span data-dcnode-id="6024" instrument_node=""> on June 17, 1970&nbsp;(</span><a class="external text" data-dcnode-id="6022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govtrack.us/congress/votes/91-1970/h273" rel="nofollow"><span data-dcnode-id="6023" instrument_node="">224-183</span></a><span data-dcnode-id="6021" instrument_node="">)</span></li><li data-dcnode-id="6013"><b data-dcnode-id="6018"><span data-dcnode-id="6019" instrument_node="">Signed into law</span></b><span data-dcnode-id="6017" instrument_node=""> by President </span><a class="mw-redirect" data-dcnode-id="6015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_M._Nixon" title="Richard M. Nixon"><span data-dcnode-id="6016" instrument_node="">Richard M. Nixon</span></a><span data-dcnode-id="6014" instrument_node=""> on June 22, 1970</span></li></ul></div></td></tr></tbody></table><span data-dcnode-id="6006" instrument_node="">
</span><p data-dcnode-id="5997"><span data-dcnode-id="6005" instrument_node="">Anticipating the expiration of the Act's special provisions in 1970, Congress held extensive hearings on whether the Act should be amended and its special provisions reauthorized. Congress noted discrimination in voting continued in spite of the Act and that the Section 5 preclearance requirement had been minimally enforced since its enactment; between 1965 and 1970, covered jurisdictions had made merely 578 preclearance submissions. Ultimately, Congress determined that although significant progress had been made in reducing racial discrimination in voting since 1965, sufficient discrimination existed to justify extending the special provisions.</span><sup class="reference" data-dcnode-id="6002" id="cite_ref-RevisedBailout_1-2"><a data-dcnode-id="6003" href="#cite_note-RevisedBailout-1"><span data-dcnode-id="6004" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5999"><span data-dcnode-id="6000" title="Page / location: 6−8"><span data-dcnode-id="6001" instrument_node="">: 6−8 </span></span></sup><span data-dcnode-id="5998" instrument_node="">
</span></p><p data-dcnode-id="5958"><span data-dcnode-id="5996" instrument_node="">President </span><a data-dcnode-id="5994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Nixon" title="Richard Nixon"><span data-dcnode-id="5995" instrument_node="">Richard Nixon</span></a><span data-dcnode-id="5993" instrument_node="">'s administration, which generally disliked civil rights laws but hoped to politically capitalize on the alienation of Southern white voters from the Democratic Party that the Act was causing, sought to reauthorize but weaken the law. Attorney General </span><a data-dcnode-id="5991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_N._Mitchell" title="John N. Mitchell"><span data-dcnode-id="5992" instrument_node="">John N. Mitchell</span></a><span data-dcnode-id="5990" instrument_node=""> proposed a 3-year extension with amendments to extend the ban on "tests or devices" nationwide and abolish both the coverage formula and the preclearance requirement. Opposed by </span><a data-dcnode-id="5988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_liberalism_in_the_United_States" title="Modern liberalism in the United States"><span data-dcnode-id="5989" instrument_node="">liberals</span></a><span data-dcnode-id="5987" instrument_node=""> and supported by </span><a data-dcnode-id="5985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southern_Democrats" title="Southern Democrats"><span data-dcnode-id="5986" instrument_node="">Southern Democrats</span></a><span data-dcnode-id="5984" instrument_node=""> and Midwestern Republicans, this proposal initially passed in the House of Representatives,</span><sup class="reference" data-dcnode-id="5981" id="cite_ref-Bending_2-1"><a data-dcnode-id="5982" href="#cite_note-Bending-2"><span data-dcnode-id="5983" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5978"><span data-dcnode-id="5979" title="Page / location: 204–205"><span data-dcnode-id="5980" instrument_node="">: 204–205 </span></span></sup><span data-dcnode-id="5977" instrument_node=""> but it was rejected by the Senate, which crafted its own compromise bill. The Senate passed its version by a 64–12 vote, and the House then passed it by a bipartisan 237–132 vote.</span><sup class="reference" data-dcnode-id="5974" id="cite_ref-ironic_19-0"><a data-dcnode-id="5975" href="#cite_note-ironic-19"><span data-dcnode-id="5976" instrument_node="">[19]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5971"><span data-dcnode-id="5972" title="Page / location: 686–687"><span data-dcnode-id="5973" instrument_node="">: 686–687 </span></span></sup><span data-dcnode-id="5970" instrument_node=""> The legislation was enacted on June 17, 1970, as the Voting Rights Act Amendments of 1970.</span><sup class="reference" data-dcnode-id="5967" id="cite_ref-20"><a data-dcnode-id="5968" href="#cite_note-20"><span data-dcnode-id="5969" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5966" instrument_node=""> President Nixon signed it into law on June 22.</span><sup class="reference" data-dcnode-id="5963" id="cite_ref-Bending_2-2"><a data-dcnode-id="5964" href="#cite_note-Bending-2"><span data-dcnode-id="5965" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5960"><span data-dcnode-id="5961" title="Page / location: 204–205, 207"><span data-dcnode-id="5962" instrument_node="">: 204–205, 207 </span></span></sup><span data-dcnode-id="5959" instrument_node="">
</span></p><p data-dcnode-id="5938"><span data-dcnode-id="5957" instrument_node="">Through this legislation, Congress extended the special provisions for five years.</span><sup class="reference" data-dcnode-id="5954" id="cite_ref-RevisedBailout_1-3"><a data-dcnode-id="5955" href="#cite_note-RevisedBailout-1"><span data-dcnode-id="5956" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5951"><span data-dcnode-id="5952" title="Page / location: 8"><span data-dcnode-id="5953" instrument_node="">: 8 </span></span></sup><span data-dcnode-id="5950" instrument_node=""> Congress also expanded the coverage formula by supplementing it with 1968 trigger dates, bringing into coverage several new jurisdictions outside of the South</span><sup class="reference" data-dcnode-id="5947" id="cite_ref-DOJsection4_3-1"><a data-dcnode-id="5948" href="#cite_note-DOJsection4-3"><span data-dcnode-id="5949" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5946" instrument_node=""> and appeasing several Southern legislators who felt the original coverage formula unfairly singled out Southern states. Simultaneously, Congress amended the bailout provision to require covered jurisdictions seeking bailout to prove that they had not used a test or device in a discriminatory manner in the ten-year period preceding their bailout request, an increase from the original five-year period requirement. Congress also expanded the ban on using tests or devices to the entire nation.</span><sup class="reference" data-dcnode-id="5943" id="cite_ref-RevisedBailout_1-4"><a data-dcnode-id="5944" href="#cite_note-RevisedBailout-1"><span data-dcnode-id="5945" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5940"><span data-dcnode-id="5941" title="Page / location: 6–8"><span data-dcnode-id="5942" instrument_node="">: 6–8 </span></span></sup><span data-dcnode-id="5939" instrument_node="">
</span></p><p data-dcnode-id="5885"><span data-dcnode-id="5937" instrument_node="">Congress also added new provisions to the Act. Two new provisions exclusively regulated </span><a data-dcnode-id="5935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_presidential_election" title="United States presidential election"><span data-dcnode-id="5936" instrument_node="">presidential elections</span></a><span data-dcnode-id="5934" instrument_node="">: one created uniform rules for voter registration and </span><a class="mw-redirect" data-dcnode-id="5932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absentee_voting" title="Absentee voting"><span data-dcnode-id="5933" instrument_node="">absentee voting</span></a><span data-dcnode-id="5931" instrument_node="">, and the other prohibited states from applying their own durational residency requirements as voting qualifications.</span><sup class="reference" data-dcnode-id="5928" id="cite_ref-RevisedBailout_1-5"><a data-dcnode-id="5929" href="#cite_note-RevisedBailout-1"><span data-dcnode-id="5930" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5925"><span data-dcnode-id="5926" title="Page / location: 7"><span data-dcnode-id="5927" instrument_node="">: 7 </span></span></sup><span data-dcnode-id="5924" instrument_node=""> Influenced by the </span><a data-dcnode-id="5922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conscription_in_the_United_States" title="Conscription in the United States"><span data-dcnode-id="5923" instrument_node="">draft</span></a><span data-dcnode-id="5921" instrument_node=""> of males at least 18 years of age to fight in the </span><a data-dcnode-id="5919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="5920" instrument_node="">Vietnam War</span></a><span data-dcnode-id="5918" instrument_node="">, Senator </span><a data-dcnode-id="5916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ted_Kennedy" title="Ted Kennedy"><span data-dcnode-id="5917" instrument_node="">Ted Kennedy</span></a><span data-dcnode-id="5915" instrument_node=""> convinced Congress to add a provision guaranteeing citizens at least 18 years of age the right to vote in federal, state, and local elections.</span><sup class="reference" data-dcnode-id="5912" id="cite_ref-Bending_2-3"><a data-dcnode-id="5913" href="#cite_note-Bending-2"><span data-dcnode-id="5914" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5909"><span data-dcnode-id="5910" title="Page / location: 205–206"><span data-dcnode-id="5911" instrument_node="">: 205–206 </span></span></sup><span data-dcnode-id="5908" instrument_node=""> In a statement explaining his decision to sign the amendments, Nixon expressed doubts that this provision was constitutional, and he instructed the Attorney General to expedite litigation to test its constitutionality.</span><sup class="reference" data-dcnode-id="5905" id="cite_ref-21"><a data-dcnode-id="5906" href="#cite_note-21"><span data-dcnode-id="5907" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5904" instrument_node=""> Later that year, the Supreme Court, in </span><i data-dcnode-id="5901"><a data-dcnode-id="5902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oregon_v._Mitchell" title="Oregon v. Mitchell"><span data-dcnode-id="5903" instrument_node="">Oregon v. Mitchell</span></a></i><span data-dcnode-id="5900" instrument_node=""> (1970),</span><sup class="reference" data-dcnode-id="5897" id="cite_ref-Oregon_22-0"><a data-dcnode-id="5898" href="#cite_note-Oregon-22"><span data-dcnode-id="5899" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5896" instrument_node=""> struck down the part of the provision lowering the voting age in state elections as unconstitutional; the Court upheld only the part of the provision that lowered the voting age in federal elections. The decision precipitated the ratification of the </span><a data-dcnode-id="5894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twenty-sixth_Amendment_to_the_United_States_Constitution" title="Twenty-sixth Amendment to the United States Constitution"><span data-dcnode-id="5895" instrument_node="">Twenty-sixth Amendment</span></a><span data-dcnode-id="5893" instrument_node=""> the following year, which lowered the voting age in all elections to 18.</span><sup class="reference" data-dcnode-id="5890" id="cite_ref-democracy_4-2"><a data-dcnode-id="5891" href="#cite_note-democracy-4"><span data-dcnode-id="5892" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5887"><span data-dcnode-id="5888" title="Page / location: 60"><span data-dcnode-id="5889" instrument_node="">: 60 </span></span></sup><span data-dcnode-id="5886" instrument_node="">
</span></p><span data-dcnode-id="5884" instrument_node="">
</span><h2 data-dcnode-id="5874"><span class="mw-headline" data-dcnode-id="5882" id="1975"><span data-dcnode-id="5883" instrument_node="">1975</span></span><span class="mw-editsection" data-dcnode-id="5875"><span class="mw-editsection-bracket" data-dcnode-id="5880"><span data-dcnode-id="5881" instrument_node="">[</span></span><a data-dcnode-id="5878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmendments_to_the_Voting_Rights_Act_of_1965%26action%3Dedit%26section%3D2" title="Edit section: 1975"><span data-dcnode-id="5879" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5876"><span data-dcnode-id="5877" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5873" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="5859"><div class="thumbinner" data-dcnode-id="5860" style="width:222px;"><a class="image" data-dcnode-id="5871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_Gerald_R._Ford_Signing_H.R._6219%2C_Extending_the_Voting_Rights_Act_of_1965%2C_at_a_Ceremony_in_the_Rose_Garden_-_NARA_-_23898507.jpg"><img alt="" class="thumbimage" data-dcnode-id="5872" data-file-height="2400" data-file-width="3625" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/29/President_Gerald_R._Ford_Signing_H.R._6219%252C_Extending_the_Voting_Rights_Act_of_1965%252C_at_a_Ceremony_in_the_Rose_Garden_-_NARA_-_23898507.jpg/220px-President_Gerald_R._Ford_Signing_H.R._6219%252C_Extending_the_Voting_Rights_Act_of_1965%252C_at_a_Ceremony_in_the_Rose_Garden_-_NARA_-_23898507.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/29/President_Gerald_R._Ford_Signing_H.R._6219%2C_Extending_the_Voting_Rights_Act_of_1965%2C_at_a_Ceremony_in_the_Rose_Garden_-_NARA_-_23898507.jpg/330px-President_Gerald_R._Ford_Signing_H.R._6219%2C_Extending_the_Voting_Rights_Act_of_1965%2C_at_a_Ceremony_in_the_Rose_Garden_-_NARA_-_23898507.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/29/President_Gerald_R._Ford_Signing_H.R._6219%2C_Extending_the_Voting_Rights_Act_of_1965%2C_at_a_Ceremony_in_the_Rose_Garden_-_NARA_-_23898507.jpg/440px-President_Gerald_R._Ford_Signing_H.R._6219%2C_Extending_the_Voting_Rights_Act_of_1965%2C_at_a_Ceremony_in_the_Rose_Garden_-_NARA_-_23898507.jpg 2x" width="220"></a><span data-dcnode-id="5870" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5861"><div class="magnify" data-dcnode-id="5868"><a class="internal" data-dcnode-id="5869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_Gerald_R._Ford_Signing_H.R._6219%2C_Extending_the_Voting_Rights_Act_of_1965%2C_at_a_Ceremony_in_the_Rose_Garden_-_NARA_-_23898507.jpg" title="Enlarge"></a></div><a data-dcnode-id="5866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="5867" instrument_node="">United States President</span></a><span data-dcnode-id="5865" instrument_node=""> </span><a data-dcnode-id="5863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerald_Ford" title="Gerald Ford"><span data-dcnode-id="5864" instrument_node="">Gerald Ford</span></a><span data-dcnode-id="5862" instrument_node=""> signs H.R. 6219, Extending the Voting Rights Act of 1965, August 1975.</span></div></div></div><span data-dcnode-id="5858" instrument_node="">
</span><link data-dcnode-id="5857" href="mw-data:TemplateStyles:r1066479718" rel="mw-deduplicated-inline-style"><table class="infobox" data-dcnode-id="5754" style="width:28.0em"><caption class="infobox-title" data-dcnode-id="5855" style="padding-bottom:0.25em"><span data-dcnode-id="5856" instrument_node="">Voting Rights Act, amendments of 1975</span></caption><tbody data-dcnode-id="5755"><tr data-dcnode-id="5851"><td class="infobox-image" colspan="2" data-dcnode-id="5852"><a class="image" data-dcnode-id="5853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGreat_Seal_of_the_United_States_%28obverse%29.svg"><img alt="Great Seal of the United States" data-dcnode-id="5854" data-file-height="600" data-file-width="600" decoding="async" height="140" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Great_Seal_of_the_United_States_%2528obverse%2529.svg/140px-Great_Seal_of_the_United_States_%2528obverse%2529.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Great_Seal_of_the_United_States_%28obverse%29.svg/210px-Great_Seal_of_the_United_States_%28obverse%29.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Great_Seal_of_the_United_States_%28obverse%29.svg/280px-Great_Seal_of_the_United_States_%28obverse%29.svg.png 2x" width="140"></a></td></tr><tr data-dcnode-id="5846"><th class="infobox-label" data-dcnode-id="5849" scope="row" style="padding-top:0.245em;line-height:1.15em;padding-right:0.65em"><span data-dcnode-id="5850" instrument_node="">Long title</span></th><td class="infobox-data" data-dcnode-id="5847" style="text-align:left;line-height:1.3em"><span data-dcnode-id="5848" instrument_node="">An Act to amend the Voting Rights Act of 1965 to extend certain provisions for an additional seven years, to make permanent the ban against certain prerequisites to voting, and for other purposes</span></td></tr><tr data-dcnode-id="5839"><th class="infobox-label" data-dcnode-id="5844" scope="row" style="padding-top:0.245em;line-height:1.15em;padding-right:0.65em"><span data-dcnode-id="5845" instrument_node="">Enacted&nbsp;by</span></th><td class="infobox-data" data-dcnode-id="5840" style="text-align:left;line-height:1.3em"><span data-dcnode-id="5843" instrument_node="">the </span><a data-dcnode-id="5841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/94th_United_States_Congress" title="94th United States Congress"><span data-dcnode-id="5842" instrument_node="">94th United States Congress</span></a></td></tr><tr data-dcnode-id="5834"><th class="infobox-label" data-dcnode-id="5837" scope="row" style="padding-top:0.245em;line-height:1.15em;padding-right:0.65em"><span data-dcnode-id="5838" instrument_node="">Effective</span></th><td class="infobox-data" data-dcnode-id="5835" style="text-align:left;line-height:1.3em"><span data-dcnode-id="5836" instrument_node="">August 6, 1975</span></td></tr><tr data-dcnode-id="5831"><th class="infobox-header" colspan="2" data-dcnode-id="5832" style="background:#bbddff"><span data-dcnode-id="5833" instrument_node="">Citations</span></th></tr><tr data-dcnode-id="5825"><th class="infobox-label" data-dcnode-id="5829" scope="row" style="padding-top:0.245em;line-height:1.15em;padding-right:0.65em"><span data-dcnode-id="5830" instrument_node="">Public law</span></th><td class="infobox-data" data-dcnode-id="5826" style="text-align:left;line-height:1.3em"><a class="external text" data-dcnode-id="5827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govinfo.gov/content/pkg/STATUTE-89/pdf/STATUTE-89-Pg400.pdf%23page%3D3" rel="nofollow"><span data-dcnode-id="5828" instrument_node="">94-73</span></a></td></tr><tr data-dcnode-id="5813"><th class="infobox-label" data-dcnode-id="5821" scope="row" style="padding-top:0.245em;line-height:1.15em;padding-right:0.65em"><a data-dcnode-id="5822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Statutes_at_Large" title="United States Statutes at Large"><span class="wrap" data-dcnode-id="5823"><span data-dcnode-id="5824" instrument_node="">Statutes at Large</span></span></a></th><td class="infobox-data" data-dcnode-id="5814" style="text-align:left;line-height:1.3em"><span data-dcnode-id="5820" instrument_node="">89&nbsp;</span><a data-dcnode-id="5818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Statutes_at_Large" title="United States Statutes at Large"><span data-dcnode-id="5819" instrument_node="">Stat.</span></a><span data-dcnode-id="5817" instrument_node="">&nbsp;</span><a class="external text" data-dcnode-id="5815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//legislink.org/us/stat-89-400" rel="nofollow"><span data-dcnode-id="5816" instrument_node="">400</span></a></td></tr><tr data-dcnode-id="5810"><th class="infobox-header" colspan="2" data-dcnode-id="5811" style="background:#bbddff"><span data-dcnode-id="5812" instrument_node="">Codification</span></th></tr><tr data-dcnode-id="5804"><th class="infobox-label" data-dcnode-id="5808" scope="row" style="padding-top:0.245em;line-height:1.15em;padding-right:0.65em"><span data-dcnode-id="5809" instrument_node="">Acts amended</span></th><td class="infobox-data" data-dcnode-id="5805" style="text-align:left;line-height:1.3em"><a data-dcnode-id="5806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_Rights_Act_of_1965" title="Voting Rights Act of 1965"><span data-dcnode-id="5807" instrument_node="">Voting Rights Act of 1965</span></a></td></tr><tr data-dcnode-id="5801"><th class="infobox-header" colspan="2" data-dcnode-id="5802" style="background:#bbddff"><span data-dcnode-id="5803" instrument_node="">Legislative history</span></th></tr><tr data-dcnode-id="5756"><td class="infobox-full-data" colspan="2" data-dcnode-id="5757" style="text-align:left;line-height:1.3em"><div data-dcnode-id="5758"><ul data-dcnode-id="5759" style="line-height:1.3em;text-align:left"><li data-dcnode-id="5788"><b data-dcnode-id="5799"><span data-dcnode-id="5800" instrument_node="">Introduced</span></b><span data-dcnode-id="5798" instrument_node=""> in the House as H.R. 6219 by </span><a data-dcnode-id="5796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Don_Edwards" title="Don Edwards"><span data-dcnode-id="5797" instrument_node="">Don Edwards</span></a><span data-dcnode-id="5795" instrument_node=""> (</span><a data-dcnode-id="5793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Party_%28United_States%29" title="Democratic Party (United States)"><span data-dcnode-id="5794" instrument_node="">D</span></a><span data-dcnode-id="5792" instrument_node="">–</span><a data-dcnode-id="5790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California" title="California"><span data-dcnode-id="5791" instrument_node="">CA</span></a><span data-dcnode-id="5789" instrument_node="">) on April 22, 1975</span></li><li data-dcnode-id="5781"><b data-dcnode-id="5786"><span data-dcnode-id="5787" instrument_node="">Passed the House</span></b><span data-dcnode-id="5785" instrument_node=""> on June 4, 1975&nbsp;(</span><a class="external text" data-dcnode-id="5783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govtrack.us/congress/votes/94-1975/h192" rel="nofollow"><span data-dcnode-id="5784" instrument_node="">341-70</span></a><span data-dcnode-id="5782" instrument_node="">)</span></li><li data-dcnode-id="5774"><b data-dcnode-id="5779"><span data-dcnode-id="5780" instrument_node="">Passed the Senate</span></b><span data-dcnode-id="5778" instrument_node="">  on July 24, 1975&nbsp;(</span><a class="external text" data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govtrack.us/congress/votes/94-1975/s329" rel="nofollow"><span data-dcnode-id="5777" instrument_node="">77-12</span></a><span data-dcnode-id="5775" instrument_node="">) with amendment</span></li><li data-dcnode-id="5767"><b data-dcnode-id="5772"><span data-dcnode-id="5773" instrument_node="">House agreed to Senate amendment</span></b><span data-dcnode-id="5771" instrument_node=""> on July 28, 1975&nbsp;(</span><a class="external text" data-dcnode-id="5769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.govtrack.us/congress/votes/94-1975/h328" rel="nofollow"><span data-dcnode-id="5770" instrument_node="">345-56</span></a><span data-dcnode-id="5768" instrument_node="">)</span></li><li data-dcnode-id="5760"><b data-dcnode-id="5765"><span data-dcnode-id="5766" instrument_node="">Signed into law</span></b><span data-dcnode-id="5764" instrument_node=""> by President </span><a data-dcnode-id="5762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerald_Ford" title="Gerald Ford"><span data-dcnode-id="5763" instrument_node="">Gerald Ford</span></a><span data-dcnode-id="5761" instrument_node=""> on August 6, 1975</span></li></ul></div></td></tr></tbody></table><span data-dcnode-id="5753" instrument_node="">
</span><p data-dcnode-id="5724"><span data-dcnode-id="5752" instrument_node="">Congress revisited the Act in 1975, the year that the Act's special provisions were again set to expire. The debate was less acrimonious than previous debates concerning the Act, reflecting an expanded consensus in Congress that the law remained necessary to remedy continued racial discrimination in voting. Unlike Nixon, President </span><a data-dcnode-id="5750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerald_Ford" title="Gerald Ford"><span data-dcnode-id="5751" instrument_node="">Gerald Ford</span></a><span data-dcnode-id="5749" instrument_node="">'s administration, which worked to improve relations with African Americans after Nixon's presidency, supported extending the Act without weakening it.</span><sup class="reference" data-dcnode-id="5746" id="cite_ref-Bending_2-4"><a data-dcnode-id="5747" href="#cite_note-Bending-2"><span data-dcnode-id="5748" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5743"><span data-dcnode-id="5744" title="Page / location: 209–210"><span data-dcnode-id="5745" instrument_node="">: 209–210 </span></span></sup><span data-dcnode-id="5742" instrument_node=""> After conducting several hearings, Congress passed legislation amending the Act; the Senate approved the amendments by a 77–12 vote, and the House of Representatives by a 346–56 vote.</span><sup class="reference" data-dcnode-id="5739" id="cite_ref-ironic_19-1"><a data-dcnode-id="5740" href="#cite_note-ironic-19"><span data-dcnode-id="5741" instrument_node="">[19]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5736"><span data-dcnode-id="5737" title="Page / location: 706"><span data-dcnode-id="5738" instrument_node="">: 706 </span></span></sup><span data-dcnode-id="5735" instrument_node=""> President Ford signed the amendments into law on August 6, 1975.</span><sup class="reference" data-dcnode-id="5732" id="cite_ref-Bending_2-5"><a data-dcnode-id="5733" href="#cite_note-Bending-2"><span data-dcnode-id="5734" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5729"><span data-dcnode-id="5730" title="Page / location: 214"><span data-dcnode-id="5731" instrument_node="">: 214 </span></span></sup><sup class="reference" data-dcnode-id="5726" id="cite_ref-23"><a data-dcnode-id="5727" href="#cite_note-23"><span data-dcnode-id="5728" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5725" instrument_node="">
</span></p><p data-dcnode-id="5694"><span data-dcnode-id="5723" instrument_node="">The amendments extended the Act's special provisions for seven years. Congress chose seven years to avoid having to reconsider the special provisions during the 1980s </span><a class="mw-redirect" data-dcnode-id="5721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reapportionment" title="Reapportionment"><span data-dcnode-id="5722" instrument_node="">reapportionment</span></a><span data-dcnode-id="5720" instrument_node=""> process.</span><sup class="reference" data-dcnode-id="5717" id="cite_ref-democracy_4-3"><a data-dcnode-id="5718" href="#cite_note-democracy-4"><span data-dcnode-id="5719" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5714"><span data-dcnode-id="5715" title="Page / location: 624"><span data-dcnode-id="5716" instrument_node="">: 624 </span></span></sup><span data-dcnode-id="5713" instrument_node=""> Relatedly, Congress amended the bailout provision to require covered jurisdictions seeking bailout to prove that they had not used a test or device in a discriminatory manner in the 17-year period preceding their bailout request.</span><sup class="reference" data-dcnode-id="5710" id="cite_ref-1982hist_24-0"><a data-dcnode-id="5711" href="#cite_note-1982hist-24"><span data-dcnode-id="5712" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5707"><span data-dcnode-id="5708" title="Page / location: 1349"><span data-dcnode-id="5709" instrument_node="">: 1349 </span></span></sup><span data-dcnode-id="5706" instrument_node=""> Congress also expanded the coverage formula by adding new dates in 1972 as triggering dates, which brought more jurisdictions into coverage.</span><sup class="reference" data-dcnode-id="5703" id="cite_ref-DOJsection4_3-2"><a data-dcnode-id="5704" href="#cite_note-DOJsection4-3"><span data-dcnode-id="5705" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5702" instrument_node=""> Furthermore, Congress made permanent the nationwide prohibition on tests or devices.</span><sup class="reference" data-dcnode-id="5699" id="cite_ref-RevisedBailout_1-6"><a data-dcnode-id="5700" href="#cite_note-RevisedBailout-1"><span data-dcnode-id="5701" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5696"><span data-dcnode-id="5697" title="Page / location: 9"><span data-dcnode-id="5698" instrument_node="">: 9 </span></span></sup><span data-dcnode-id="5695" instrument_node="">
</span></p><p data-dcnode-id="5650"><span data-dcnode-id="5693" instrument_node="">The 1975 amendments also expanded voting rights for minority groups that traditionally had fallen outside the Act's protections. Civil rights organizations representing </span><a data-dcnode-id="5691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hispanic" title="Hispanic"><span data-dcnode-id="5692" instrument_node="">Hispanic</span></a><span data-dcnode-id="5690" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asian_American" title="Asian American"><span data-dcnode-id="5689" instrument_node="">Asian American</span></a><span data-dcnode-id="5687" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Native_Alaskan" title="Native Alaskan"><span data-dcnode-id="5686" instrument_node="">Native Alaskan</span></a><span data-dcnode-id="5684" instrument_node="">, and </span><a data-dcnode-id="5682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Native_Americans_in_the_United_States" title="Native Americans in the United States"><span data-dcnode-id="5683" instrument_node="">Native American</span></a><span data-dcnode-id="5681" instrument_node=""> interests argued before Congress that such groups often were the victims of discriminatory voting practices, particularly in areas where English was not the dominant language.</span><sup class="reference" data-dcnode-id="5678" id="cite_ref-1982hist_24-1"><a data-dcnode-id="5679" href="#cite_note-1982hist-24"><span data-dcnode-id="5680" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5675"><span data-dcnode-id="5676" title="Page / location: 1350"><span data-dcnode-id="5677" instrument_node="">: 1350 </span></span></sup><span data-dcnode-id="5674" instrument_node=""> After Congress heard testimony of language discrimination in voting, Congresswoman </span><a data-dcnode-id="5672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barbara_Jordan" title="Barbara Jordan"><span data-dcnode-id="5673" instrument_node="">Barbara Jordan</span></a><span data-dcnode-id="5671" instrument_node=""> (D-TX) successfully led an effort to amend the Act to protect language minorities.</span><sup class="reference" data-dcnode-id="5668" id="cite_ref-Bending_2-6"><a data-dcnode-id="5669" href="#cite_note-Bending-2"><span data-dcnode-id="5670" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5665"><span data-dcnode-id="5666" title="Page / location: 211"><span data-dcnode-id="5667" instrument_node="">: 211 </span></span></sup><span data-dcnode-id="5664" instrument_node=""> Specifically, Congress amended the definition of "test or device" to prohibit laws requiring ballots and voting information be provided exclusively in </span><a data-dcnode-id="5662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_language" title="English language"><span data-dcnode-id="5663" instrument_node="">English</span></a><span data-dcnode-id="5661" instrument_node=""> in jurisdictions where a single-language minority group comprised more than 5% of the voting-age population. This in turn expanded the coverage formula to reach states such as </span><a data-dcnode-id="5659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Texas" title="Texas"><span data-dcnode-id="5660" instrument_node="">Texas</span></a><span data-dcnode-id="5658" instrument_node=""> that Congress wanted to cover. Congress also enacted bilingual election requirements, which require election officials in certain jurisdictions to provide ballots and voting information in the language of language minority groups.</span><sup class="reference" data-dcnode-id="5655" id="cite_ref-democracy_4-4"><a data-dcnode-id="5656" href="#cite_note-democracy-4"><span data-dcnode-id="5657" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5652"><span data-dcnode-id="5653" title="Page / location: 57, 521"><span data-dcnode-id="5654" instrument_node="">: 57, 521 </span></span></sup><span data-dcnode-id="5651" instrument_node="">
</span></p><span data-dcnode-id="5649" instrument_node="">
</span><h2 data-dcnode-id="5639"><span class="mw-headline" data-dcnode-id="5647" id="1982"><span data-dcnode-id="5648" instrument_node="">1982</span></span><span class="mw-editsection" data-dcnode-id="5640"><span class="mw-editsection-bracket" data-dcnode-id="5645"><span data-dcnode-id="5646" instrument_node="">[</span></span><a data-dcnode-id="5643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmendments_to_the_Voting_Rights_Act_of_1965%26action%3Dedit%26section%3D3" title="Edit section: 1982"><span data-dcnode-id="5644" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5641"><span data-dcnode-id="5642" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5638" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="5624"><div class="thumbinner" data-dcnode-id="5625" style="width:222px;"><a class="image" data-dcnode-id="5636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_Ronald_Reagan_at_the_signing_ceremony_for_Voting_Rights_Act_legislation_in_the_East_Room.jpg"><img alt="" class="thumbimage" data-dcnode-id="5637" data-file-height="2615" data-file-width="4000" decoding="async" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/27/President_Ronald_Reagan_at_the_signing_ceremony_for_Voting_Rights_Act_legislation_in_the_East_Room.jpg/220px-President_Ronald_Reagan_at_the_signing_ceremony_for_Voting_Rights_Act_legislation_in_the_East_Room.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/27/President_Ronald_Reagan_at_the_signing_ceremony_for_Voting_Rights_Act_legislation_in_the_East_Room.jpg/330px-President_Ronald_Reagan_at_the_signing_ceremony_for_Voting_Rights_Act_legislation_in_the_East_Room.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/27/President_Ronald_Reagan_at_the_signing_ceremony_for_Voting_Rights_Act_legislation_in_the_East_Room.jpg/440px-President_Ronald_Reagan_at_the_signing_ceremony_for_Voting_Rights_Act_legislation_in_the_East_Room.jpg 2x" width="220"></a><span data-dcnode-id="5635" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5626"><div class="magnify" data-dcnode-id="5633"><a class="internal" data-dcnode-id="5634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_Ronald_Reagan_at_the_signing_ceremony_for_Voting_Rights_Act_legislation_in_the_East_Room.jpg" title="Enlarge"></a></div><a data-dcnode-id="5631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="5632" instrument_node="">United States President</span></a><span data-dcnode-id="5630" instrument_node=""> </span><a data-dcnode-id="5628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="5629" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="5627" instrument_node=""> signs amendments to the Act in June 1982.</span></div></div></div><span data-dcnode-id="5623" instrument_node="">
</span><p data-dcnode-id="5594"><span data-dcnode-id="5622" instrument_node="">As the special provisions neared expiration again, Congress reconsidered the Act in 1982.</span><sup class="reference" data-dcnode-id="5619" id="cite_ref-25"><a data-dcnode-id="5620" href="#cite_note-25"><span data-dcnode-id="5621" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5618" instrument_node=""> Organizations in </span><a data-dcnode-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leadership_Conference_on_Civil_and_Human_Rights" title="Leadership Conference on Civil and Human Rights"><span data-dcnode-id="5617" instrument_node="">The Leadership Conference on Civil Rights</span></a><span data-dcnode-id="5615" instrument_node="">, such as the </span><a class="mw-redirect" data-dcnode-id="5613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Association_for_the_Advancement_of_Colored_People" title="National Association for the Advancement of Colored People"><span data-dcnode-id="5614" instrument_node="">National Association for the Advancement of Colored People</span></a><span data-dcnode-id="5612" instrument_node=""> (NAACP) and the </span><a data-dcnode-id="5610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Education_Association" title="National Education Association"><span data-dcnode-id="5611" instrument_node="">National Education Association</span></a><span data-dcnode-id="5609" instrument_node=""> (NEA), organized to pressure Congress both to extend the special provisions and to expand the Act's general prohibition on discriminatory voting laws.</span><sup class="reference" data-dcnode-id="5606" id="cite_ref-1982hist_24-2"><a data-dcnode-id="5607" href="#cite_note-1982hist-24"><span data-dcnode-id="5608" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5603"><span data-dcnode-id="5604" title="Page / location: 1351–1353"><span data-dcnode-id="5605" instrument_node="">: 1351–1353 </span></span></sup><span data-dcnode-id="5602" instrument_node=""> Congressional opponents of the amendments had little support for their positions outside of Congress.</span><sup class="reference" data-dcnode-id="5599" id="cite_ref-1982hist_24-3"><a data-dcnode-id="5600" href="#cite_note-1982hist-24"><span data-dcnode-id="5601" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5596"><span data-dcnode-id="5597" title="Page / location: 1387"><span data-dcnode-id="5598" instrument_node="">: 1387 </span></span></sup><span data-dcnode-id="5595" instrument_node="">
</span></p><p data-dcnode-id="5500"><span data-dcnode-id="5593" instrument_node="">The House of Representatives, which was the first chamber to consider amendments,</span><sup class="reference" data-dcnode-id="5590" id="cite_ref-1982hist_24-4"><a data-dcnode-id="5591" href="#cite_note-1982hist-24"><span data-dcnode-id="5592" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5587"><span data-dcnode-id="5588" title="Page / location: 1380"><span data-dcnode-id="5589" instrument_node="">: 1380 </span></span></sup><span data-dcnode-id="5586" instrument_node=""> conducted seven weeks of hearings on amendatory legislation at which over 100 witnesses testified, most of whom supported extending the Act's special provisions by at least 10 years.</span><sup class="reference" data-dcnode-id="5583" id="cite_ref-RevisedBailout_1-7"><a data-dcnode-id="5584" href="#cite_note-RevisedBailout-1"><span data-dcnode-id="5585" instrument_node="">[1]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5580"><span data-dcnode-id="5581" title="Page / location: 17"><span data-dcnode-id="5582" instrument_node="">: 17 </span></span></sup><span data-dcnode-id="5579" instrument_node=""> President </span><a data-dcnode-id="5577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="5578" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="5576" instrument_node="">'s administration largely stayed out of the debate as the legislation worked its way through the House. However, President Reagan did indicate he supported replacing the coverage formula with a nationwide preclearance requirement.</span><sup class="reference" data-dcnode-id="5573" id="cite_ref-1982hist_24-5"><a data-dcnode-id="5574" href="#cite_note-1982hist-24"><span data-dcnode-id="5575" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5570"><span data-dcnode-id="5571" title="Page / location: 1384–1385"><span data-dcnode-id="5572" instrument_node="">: 1384–1385 </span></span></sup><span data-dcnode-id="5569" instrument_node=""> This caused a major controversy against the Reagan administration because it occurred at around the same time the administration was seeking to block the </span><a data-dcnode-id="5567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internal_Revenue_Service" title="Internal Revenue Service"><span data-dcnode-id="5568" instrument_node="">Internal Revenue Service</span></a><span data-dcnode-id="5566" instrument_node=""> from denying </span><a data-dcnode-id="5564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tax_exemption" title="Tax exemption"><span data-dcnode-id="5565" instrument_node="">tax-exempt status</span></a><span data-dcnode-id="5563" instrument_node=""> to </span><a data-dcnode-id="5561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Segregation_academy" title="Segregation academy"><span data-dcnode-id="5562" instrument_node="">segregated private schools</span></a><span data-dcnode-id="5560" instrument_node="">, which soon forced the Reagan administration to backtrack some of its opposition.</span><sup class="reference" data-dcnode-id="5557" id="cite_ref-26"><a data-dcnode-id="5558" href="#cite_note-26"><span data-dcnode-id="5559" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5556" instrument_node=""> The House ultimately passed legislation maintaining the coverage formula and permanently extending the special provisions.</span><sup class="reference" data-dcnode-id="5553" id="cite_ref-1982hist_24-6"><a data-dcnode-id="5554" href="#cite_note-1982hist-24"><span data-dcnode-id="5555" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5550"><span data-dcnode-id="5551" title="Page / location: 1383"><span data-dcnode-id="5552" instrument_node="">: 1383 </span></span></sup><span data-dcnode-id="5549" instrument_node=""> Supporters of the House bill hoped to sustain the momentum from the House and expedite approval of the House bill in the Senate, but Senators opposing the legislation slowed its passage through extensive committee hearings.</span><sup class="reference" data-dcnode-id="5546" id="cite_ref-1982hist_24-7"><a data-dcnode-id="5547" href="#cite_note-1982hist-24"><span data-dcnode-id="5548" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5543"><span data-dcnode-id="5544" title="Page / location: 1383–1384"><span data-dcnode-id="5545" instrument_node="">: 1383–1384 </span></span></sup><span data-dcnode-id="5542" instrument_node=""> Furthermore, the Reagan Administration announced its support for only a 10-year extension of the special provisions.</span><sup class="reference" data-dcnode-id="5539" id="cite_ref-1982hist_24-8"><a data-dcnode-id="5540" href="#cite_note-1982hist-24"><span data-dcnode-id="5541" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5536"><span data-dcnode-id="5537" title="Page / location: 1386"><span data-dcnode-id="5538" instrument_node="">: 1386 </span></span></sup><span data-dcnode-id="5535" instrument_node=""> The Senate eventually compromised on maintaining the coverage formula unchanged and extending the special provisions by 25 years,</span><sup class="reference" data-dcnode-id="5532" id="cite_ref-1982hist_24-9"><a data-dcnode-id="5533" href="#cite_note-1982hist-24"><span data-dcnode-id="5534" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5529"><span data-dcnode-id="5530" title="Page / location: 1415"><span data-dcnode-id="5531" instrument_node="">: 1415 </span></span></sup><span data-dcnode-id="5528" instrument_node=""> except for the Section 203(c) bilingual election requirement, which was extended for seven years.</span><sup class="reference" data-dcnode-id="5525" id="cite_ref-CRS_7-2"><a data-dcnode-id="5526" href="#cite_note-CRS-7"><span data-dcnode-id="5527" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5522"><span data-dcnode-id="5523" title="Page / location: 23"><span data-dcnode-id="5524" instrument_node="">: 23 </span></span></sup><span data-dcnode-id="5521" instrument_node=""> The Senate also agreed to liberalize the bailout procedure to allow a covered state or local government to escape coverage by proving to the </span><a data-dcnode-id="5519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_District_Court_for_the_District_of_Columbia" title="United States District Court for the District of Columbia"><span data-dcnode-id="5520" instrument_node="">U.S. District Court for D.C.</span></a><span data-dcnode-id="5518" instrument_node=""> that it had complied with the Voting Rights Act and undertook constructive efforts to expand opportunities for political participation in the 10 years preceding its bailout request.</span><sup class="reference" data-dcnode-id="5515" id="cite_ref-democracy_4-5"><a data-dcnode-id="5516" href="#cite_note-democracy-4"><span data-dcnode-id="5517" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5512"><span data-dcnode-id="5513" title="Page / location: 523"><span data-dcnode-id="5514" instrument_node="">: 523 </span></span></sup><span data-dcnode-id="5511" instrument_node=""> The bailout procedure was also amended to allow a local government to bail out of coverage even if its parent state was covered.</span><sup class="reference" data-dcnode-id="5508" id="cite_ref-CRS_7-3"><a data-dcnode-id="5509" href="#cite_note-CRS-7"><span data-dcnode-id="5510" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5505"><span data-dcnode-id="5506" title="Page / location: 23"><span data-dcnode-id="5507" instrument_node="">: 23 </span></span></sup><sup class="reference" data-dcnode-id="5502" id="cite_ref-VRA-4(a)_27-0"><a data-dcnode-id="5503" href="#cite_note-VRA-4(a)-27"><span data-dcnode-id="5504" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5501" instrument_node="">
</span></p><p data-dcnode-id="5464"><span data-dcnode-id="5499" instrument_node="">The provision Congress most intensely focused on amending was Section 2, which prescribes a general prohibition of discriminatory voting laws.</span><sup class="reference" data-dcnode-id="5496" id="cite_ref-1982hist_24-10"><a data-dcnode-id="5497" href="#cite_note-1982hist-24"><span data-dcnode-id="5498" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5493"><span data-dcnode-id="5494" title="Page / location: 1352"><span data-dcnode-id="5495" instrument_node="">: 1352 </span></span></sup><span data-dcnode-id="5492" instrument_node=""> Two years earlier, the Supreme Court, in </span><i data-dcnode-id="5489"><a data-dcnode-id="5490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mobile_v._Bolden" title="Mobile v. Bolden"><span data-dcnode-id="5491" instrument_node="">Mobile v. Bolden</span></a></i><span data-dcnode-id="5488" instrument_node=""> (1980), held that racially discriminatory laws violated the Fourteenth or Fifteenth Amendments only if the laws were enacted or maintained for a discriminatory </span><i data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">purpose</span></i><span data-dcnode-id="5485" instrument_node="">; thus, showing that a law simply had a discriminatory </span><i data-dcnode-id="5483"><span data-dcnode-id="5484" instrument_node="">effect</span></i><span data-dcnode-id="5482" instrument_node=""> was insufficient to state a constitutional claim of discrimination. The Court further held that Section 2 mirrored this constitutional standard.</span><sup class="reference" data-dcnode-id="5479" id="cite_ref-Mobile_28-0"><a data-dcnode-id="5480" href="#cite_note-Mobile-28"><span data-dcnode-id="5481" instrument_node="">[28]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5476"><span data-dcnode-id="5477" title="Page / location: 60–61"><span data-dcnode-id="5478" instrument_node="">: 60–61 </span></span></sup><span data-dcnode-id="5475" instrument_node=""> The decision had a major effect on voting rights litigation; civil rights lawyers decided not to pursue many planned cases, and courts overturned several judgments that were previously entered in favor of </span><a data-dcnode-id="5473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plaintiff" title="Plaintiff"><span data-dcnode-id="5474" instrument_node="">plaintiffs</span></a><span data-dcnode-id="5472" instrument_node="">. This prompted nationwide outrage that weighed heavily on Congress as it considered amending the Act in 1982.</span><sup class="reference" data-dcnode-id="5469" id="cite_ref-Derf_29-0"><a data-dcnode-id="5470" href="#cite_note-Derf-29"><span data-dcnode-id="5471" instrument_node="">[29]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5466"><span data-dcnode-id="5467" title="Page / location: 149"><span data-dcnode-id="5468" instrument_node="">: 149 </span></span></sup><span data-dcnode-id="5465" instrument_node="">
