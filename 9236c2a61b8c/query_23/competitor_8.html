</span></p><p data-dcnode-id="5401"><span data-dcnode-id="5463" instrument_node="">During the nine days of Senate hearings concerning whether to amend the Act, Section 2 was the primary focus</span><sup class="reference" data-dcnode-id="5460" id="cite_ref-1982hist_24-11"><a data-dcnode-id="5461" href="#cite_note-1982hist-24"><span data-dcnode-id="5462" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5457"><span data-dcnode-id="5458" title="Page / location: 1389"><span data-dcnode-id="5459" instrument_node="">: 1389 </span></span></sup><span data-dcnode-id="5456" instrument_node="">—in particular, whether to amend Section 2 to create a "results" test that prohibited any voting law that had a discriminatory effect, irrespective of whether the law was enacted or operated for a discriminatory purpose. President Reagan opposed creating a results test because its impact would be uncertain.</span><sup class="reference" data-dcnode-id="5453" id="cite_ref-1982hist_24-12"><a data-dcnode-id="5454" href="#cite_note-1982hist-24"><span data-dcnode-id="5455" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5450"><span data-dcnode-id="5451" title="Page / location: 1388–1389"><span data-dcnode-id="5452" instrument_node="">: 1388–1389 </span></span></sup><span data-dcnode-id="5449" instrument_node=""> Furthermore, some members of Congress, such as Senator </span><a data-dcnode-id="5447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orrin_Hatch" title="Orrin Hatch"><span data-dcnode-id="5448" instrument_node="">Orrin Hatch</span></a><span data-dcnode-id="5446" instrument_node=""> (R-UT), raised concerns that a results test would fundamentally alter American democracy by requiring courts to impose </span><a data-dcnode-id="5444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proportional_representation" title="Proportional representation"><span data-dcnode-id="5445" instrument_node="">proportional representation</span></a><span data-dcnode-id="5443" instrument_node=""> for protected minority groups as a remedy.</span><sup class="reference" data-dcnode-id="5440" id="cite_ref-1982hist_24-13"><a data-dcnode-id="5441" href="#cite_note-1982hist-24"><span data-dcnode-id="5442" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5437"><span data-dcnode-id="5438" title="Page / location: 1392"><span data-dcnode-id="5439" instrument_node="">: 1392 </span></span></sup><span data-dcnode-id="5436" instrument_node=""> To assuage this concern, Senator </span><a class="mw-redirect" data-dcnode-id="5434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Dole" title="Robert Dole"><span data-dcnode-id="5435" instrument_node="">Robert Dole</span></a><span data-dcnode-id="5433" instrument_node=""> (R-KS) proposed legislative language explicitly disclaiming that a results test would require proportional representation. This compromise won support from the Senate, the House, and the Reagan Administration.</span><sup class="reference" data-dcnode-id="5430" id="cite_ref-1982hist_24-14"><a data-dcnode-id="5431" href="#cite_note-1982hist-24"><span data-dcnode-id="5432" instrument_node="">[24]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5427"><span data-dcnode-id="5428" title="Page / location: 1414–1415"><span data-dcnode-id="5429" instrument_node="">: 1414–1415 </span></span></sup><span data-dcnode-id="5426" instrument_node=""> The House passed this version of the bill by a 389–24 vote, and the Senate passed it by an 85–8 vote.</span><sup class="reference" data-dcnode-id="5423" id="cite_ref-ironic_19-2"><a data-dcnode-id="5424" href="#cite_note-ironic-19"><span data-dcnode-id="5425" instrument_node="">[19]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5420"><span data-dcnode-id="5421" title="Page / location: 707"><span data-dcnode-id="5422" instrument_node="">: 707 </span></span></sup><sup class="reference" data-dcnode-id="5417" id="cite_ref-30"><a data-dcnode-id="5418" href="#cite_note-30"><span data-dcnode-id="5419" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5416" instrument_node=""> President Reagan signed the legislation into law on June 29, 1982.</span><sup class="reference" data-dcnode-id="5413" id="cite_ref-Bending_2-7"><a data-dcnode-id="5414" href="#cite_note-Bending-2"><span data-dcnode-id="5415" instrument_node="">[2]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5410"><span data-dcnode-id="5411" title="Page / location: 231"><span data-dcnode-id="5412" instrument_node="">: 231 </span></span></sup><span data-dcnode-id="5409" instrument_node=""> The creation of the Section 2 results test shifted the majority of litigation brought under the Voting Rights Act from claims of Section 5 violations to claims of Section 2 violations.</span><sup class="reference" data-dcnode-id="5406" id="cite_ref-democracy_4-6"><a data-dcnode-id="5407" href="#cite_note-democracy-4"><span data-dcnode-id="5408" instrument_node="">[4]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5403"><span data-dcnode-id="5404" title="Page / location: 645"><span data-dcnode-id="5405" instrument_node="">: 645 </span></span></sup><span data-dcnode-id="5402" instrument_node="">
</span></p><span data-dcnode-id="5400" instrument_node="">
</span><h2 data-dcnode-id="5390"><span class="mw-headline" data-dcnode-id="5398" id="1992"><span data-dcnode-id="5399" instrument_node="">1992</span></span><span class="mw-editsection" data-dcnode-id="5391"><span class="mw-editsection-bracket" data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">[</span></span><a data-dcnode-id="5394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmendments_to_the_Voting_Rights_Act_of_1965%26action%3Dedit%26section%3D4" title="Edit section: 1992"><span data-dcnode-id="5395" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5392"><span data-dcnode-id="5393" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5389" instrument_node="">
</span><p data-dcnode-id="5347"><span data-dcnode-id="5388" instrument_node="">As the bilingual election requirement in Section 203(c) neared expiration in 1992, Congress considered legislation to extend and expand it. Representative </span><a data-dcnode-id="5386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jos%25C3%25A9_E._Serrano" title="José E. Serrano"><span data-dcnode-id="5387" instrument_node="">José E. Serrano</span></a><span data-dcnode-id="5385" instrument_node=""> (D-NY) introduced legislation,</span><sup class="reference" data-dcnode-id="5382" id="cite_ref-langtrack_31-0"><a data-dcnode-id="5383" href="#cite_note-langtrack-31"><span data-dcnode-id="5384" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5381" instrument_node=""> dubbed the Voting Rights Language Assistance Act of 1992, to extend the provision for 15 years, making its term coterminous with the other special provisions scheduled to expire in 2007. The legislation also expanded the coverage formula and the Section 203(c) bilingual election requirement to cover jurisdictions containing at least 10,000 persons of any one of the covered language minorities.</span><sup class="reference" data-dcnode-id="5378" id="cite_ref-32"><a data-dcnode-id="5379" href="#cite_note-32"><span data-dcnode-id="5380" instrument_node="">[32]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5375"><span data-dcnode-id="5376" title="Page / location: 50–51"><span data-dcnode-id="5377" instrument_node="">: 50–51 </span></span></sup><span data-dcnode-id="5374" instrument_node=""> This reached major cities such as </span><a data-dcnode-id="5372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philadelphia" title="Philadelphia"><span data-dcnode-id="5373" instrument_node="">Philadelphia</span></a><span data-dcnode-id="5371" instrument_node="">, </span><a data-dcnode-id="5369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/San_Francisco" title="San Francisco"><span data-dcnode-id="5370" instrument_node="">San Francisco</span></a><span data-dcnode-id="5368" instrument_node="">, and </span><a data-dcnode-id="5366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Los_Angeles" title="Los Angeles"><span data-dcnode-id="5367" instrument_node="">Los Angeles</span></a><span data-dcnode-id="5365" instrument_node="">.</span><sup class="reference" data-dcnode-id="5362" id="cite_ref-Save_33-0"><a data-dcnode-id="5363" href="#cite_note-Save-33"><span data-dcnode-id="5364" instrument_node="">[33]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5359"><span data-dcnode-id="5360" title="Page / location: 1486–1487"><span data-dcnode-id="5361" instrument_node="">: 1486–1487 </span></span></sup><span data-dcnode-id="5358" instrument_node=""> Finally, in recognition of "the historical fact that reservation boundaries predate and therefore often do not correspond to State or county lines," the legislation created an alternative coverage formula for Native American language-minority voters living on </span><a class="mw-redirect" data-dcnode-id="5356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_reservations" title="Indian reservations"><span data-dcnode-id="5357" instrument_node="">Indian reservations</span></a><span data-dcnode-id="5355" instrument_node="">.</span><sup class="reference" data-dcnode-id="5352" id="cite_ref-enfranchise_6-1"><a data-dcnode-id="5353" href="#cite_note-enfranchise-6"><span data-dcnode-id="5354" instrument_node="">[6]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5349"><span data-dcnode-id="5350" title="Page / location: 225–226"><span data-dcnode-id="5351" instrument_node="">: 225–226 </span></span></sup><span data-dcnode-id="5348" instrument_node="">
</span></p><p data-dcnode-id="5320"><span data-dcnode-id="5346" instrument_node="">This legislation received more Congressional opposition than the 1982 amendments did, most of it from Republicans.</span><sup class="reference" data-dcnode-id="5343" id="cite_ref-Save_33-1"><a data-dcnode-id="5344" href="#cite_note-Save-33"><span data-dcnode-id="5345" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5342" instrument_node=""> Proponents argued that the lack of bilingual assistance hindered recently naturalized citizens from exercising their voting rights and that the country had a history of acceptance toward linguistic pluralism. Opponents argued that the Voting Rights Act was never meant to protect language minorities and that the bilingual assistance provision was a costly </span><a data-dcnode-id="5340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unfunded_mandate" title="Unfunded mandate"><span data-dcnode-id="5341" instrument_node="">unfunded mandate</span></a><span data-dcnode-id="5339" instrument_node="">.</span><sup class="reference" data-dcnode-id="5336" id="cite_ref-CRS_7-4"><a data-dcnode-id="5337" href="#cite_note-CRS-7"><span data-dcnode-id="5338" instrument_node="">[7]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5333"><span data-dcnode-id="5334" title="Page / location: 26"><span data-dcnode-id="5335" instrument_node="">: 26 </span></span></sup><span data-dcnode-id="5332" instrument_node=""> Opponents proposed several amendments to weaken the legislation, including limiting the extension to 5 years, requiring the federal government to pay for the bilingual voting materials, and completely removing the bilingual provisions. These amendments failed, and Congress passed the legislation with mostly Democratic support;</span><sup class="reference" data-dcnode-id="5329" id="cite_ref-Save_33-2"><a data-dcnode-id="5330" href="#cite_note-Save-33"><span data-dcnode-id="5331" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5328" instrument_node=""> the House passed it by a 237–125 vote, and the Senate passed it by a 75–20 vote. President </span><a data-dcnode-id="5326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_H._W._Bush" title="George H. W. Bush"><span data-dcnode-id="5327" instrument_node="">George H. W. Bush</span></a><span data-dcnode-id="5325" instrument_node=""> signed the legislation on August 26, 1992.</span><sup class="reference" data-dcnode-id="5322" id="cite_ref-langtrack_31-1"><a data-dcnode-id="5323" href="#cite_note-langtrack-31"><span data-dcnode-id="5324" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5321" instrument_node="">
</span></p><span data-dcnode-id="5319" instrument_node="">
</span><h2 data-dcnode-id="5309"><span class="mw-headline" data-dcnode-id="5317" id="2006"><span data-dcnode-id="5318" instrument_node="">2006</span></span><span class="mw-editsection" data-dcnode-id="5310"><span class="mw-editsection-bracket" data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">[</span></span><a data-dcnode-id="5313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmendments_to_the_Voting_Rights_Act_of_1965%26action%3Dedit%26section%3D5" title="Edit section: 2006"><span data-dcnode-id="5314" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5311"><span data-dcnode-id="5312" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5308" instrument_node="">
</span><p data-dcnode-id="5253"><span data-dcnode-id="5307" instrument_node="">Congress reconsidered the Act in 2006 as the special provisions were due to expire in 2007. Civil rights organizations advocated for the renewal and strengthening of the special provisions.</span><sup class="reference" data-dcnode-id="5304" id="cite_ref-Tucker_34-0"><a data-dcnode-id="5305" href="#cite_note-Tucker-34"><span data-dcnode-id="5306" instrument_node="">[34]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5301"><span data-dcnode-id="5302" title="Page / location: 206"><span data-dcnode-id="5303" instrument_node="">: 206 </span></span></sup><span data-dcnode-id="5300" instrument_node=""> As a matter of principle, Democrats generally supported renewing the special provisions. However, the Republican Party controlled both chambers of Congress and the presidency, and many Republicans considered the preclearance requirement an affront to </span><a data-dcnode-id="5298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/States%2527_rights" title="States' rights"><span data-dcnode-id="5299" instrument_node="">states' rights</span></a><span data-dcnode-id="5297" instrument_node=""> and the principle of </span><a class="mw-redirect" data-dcnode-id="5295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Color_blindness_%28race%29_in_the_United_States" title="Color blindness (race) in the United States"><span data-dcnode-id="5296" instrument_node="">color-blindness</span></a><span data-dcnode-id="5294" instrument_node="">.</span><sup class="reference" data-dcnode-id="5291" id="cite_ref-Promise_11-1"><a data-dcnode-id="5292" href="#cite_note-Promise-11"><span data-dcnode-id="5293" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5288"><span data-dcnode-id="5289" title="Page / location: 180"><span data-dcnode-id="5290" instrument_node="">: 180 </span></span></sup><span data-dcnode-id="5287" instrument_node=""> Furthermore, </span><a data-dcnode-id="5285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservatism_in_the_United_States" title="Conservatism in the United States"><span data-dcnode-id="5286" instrument_node="">conservatives</span></a><span data-dcnode-id="5284" instrument_node=""> believed that the primary beneficiaries of the special provisions were African Americans, who overwhelmingly and increasingly voted for Democratic Party candidates.</span><sup class="reference" data-dcnode-id="5281" id="cite_ref-Tucker_34-1"><a data-dcnode-id="5282" href="#cite_note-Tucker-34"><span data-dcnode-id="5283" instrument_node="">[34]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5278"><span data-dcnode-id="5279" title="Page / location: 207"><span data-dcnode-id="5280" instrument_node="">: 207 </span></span></sup><span data-dcnode-id="5277" instrument_node=""> However, Republicans were receiving increasing support from some language minority groups, particularly Hispanics and Asian Americans, and they did not wish to risk losing that support by refusing to reauthorize the special provisions.</span><sup class="reference" data-dcnode-id="5274" id="cite_ref-Tucker_34-2"><a data-dcnode-id="5275" href="#cite_note-Tucker-34"><span data-dcnode-id="5276" instrument_node="">[34]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5271"><span data-dcnode-id="5272" title="Page / location: 208"><span data-dcnode-id="5273" instrument_node="">: 208 </span></span></sup><span data-dcnode-id="5270" instrument_node=""> Republicans also recognized that the Act often helped Republican candidates win by requiring jurisdictions to pack Democratic-leaning racial minorities into few </span><a data-dcnode-id="5268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_district" title="Electoral district"><span data-dcnode-id="5269" instrument_node="">electoral districts</span></a><span data-dcnode-id="5267" instrument_node="">. In addition, </span><a data-dcnode-id="5265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_House_Committee_on_the_Judiciary" title="United States House Committee on the Judiciary"><span data-dcnode-id="5266" instrument_node="">House Judiciary Committee</span></a><span data-dcnode-id="5264" instrument_node=""> Chair </span><a data-dcnode-id="5262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Sensenbrenner" title="Jim Sensenbrenner"><span data-dcnode-id="5263" instrument_node="">Jim Sensenbrenner</span></a><span data-dcnode-id="5261" instrument_node=""> (R-WI) had a strong desire to reauthorize the special provisions, and he led an early effort to pass a reauthorization bill before his chairmanship expired at the end of 2006. Thus, a consensus in favor of reauthorizing the special provisions emerged early in the legislative process.</span><sup class="reference" data-dcnode-id="5258" id="cite_ref-Promise_11-2"><a data-dcnode-id="5259" href="#cite_note-Promise-11"><span data-dcnode-id="5260" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5255"><span data-dcnode-id="5256" title="Page / location: 180–181"><span data-dcnode-id="5257" instrument_node="">: 180–181 </span></span></sup><span data-dcnode-id="5254" instrument_node="">
</span></p><p data-dcnode-id="5223"><span data-dcnode-id="5252" instrument_node="">In 2005, the </span><a class="mw-redirect" data-dcnode-id="5250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_House_Judiciary_Subcommittee_on_the_Constitution_and_Civil_Justice" title="United States House Judiciary Subcommittee on the Constitution and Civil Justice"><span data-dcnode-id="5251" instrument_node="">House Judiciary Subcommittee on the Constitution</span></a><span data-dcnode-id="5249" instrument_node=""> began holding hearings on amending the Voting Rights Act. Few witnesses at the hearings testified against reauthorizing the special provisions, and the committee focused primarily on assembling evidence of discrimination in voting.</span><sup class="reference" data-dcnode-id="5246" id="cite_ref-Promise_11-3"><a data-dcnode-id="5247" href="#cite_note-Promise-11"><span data-dcnode-id="5248" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5243"><span data-dcnode-id="5244" title="Page / location: 181–182"><span data-dcnode-id="5245" instrument_node="">: 181–182 </span></span></sup><span data-dcnode-id="5242" instrument_node=""> Congress's evidentiary record of voting discrimination was viewed as particularly important because Congress believed that according to the Supreme Court case </span><i data-dcnode-id="5239"><a class="mw-redirect" data-dcnode-id="5240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boerne_v._Flores" title="Boerne v. Flores"><span data-dcnode-id="5241" instrument_node="">Boerne v. Flores</span></a></i><span data-dcnode-id="5238" instrument_node=""> (1997) and its progeny, Congress needed to demonstrate that legislation passed to enforce the Reconstruction Amendments was "congruent and proportional" to remedying or preventing constitutional violations. To make this showing, the committee needed to assemble evidence to demonstrate that the special provisions were generally successful in combating racial discrimination in voting, but not so successful as to no longer be necessary. Given the uncertainty surrounding the congruence and proportionality standard, political constraints, and the Supreme Court previously having upheld the special provisions as constitutional, the committee decided to reauthorize the special provisions without amending the coverage formula.</span><sup class="reference" data-dcnode-id="5235" id="cite_ref-Promise_11-4"><a data-dcnode-id="5236" href="#cite_note-Promise-11"><span data-dcnode-id="5237" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5232"><span data-dcnode-id="5233" title="Page / location: 192–194"><span data-dcnode-id="5234" instrument_node="">: 192–194 </span></span></sup><span data-dcnode-id="5231" instrument_node=""> The committee ultimately included in the record four types of evidence to support this reauthorization: statistics showing rates of minority voter registration, turnout, and elective officeholding in covered versus non-covered jurisdictions; statistics showing the behavior of covered jurisdictions and the Department of Justice in the preclearance process; instances of voting discrimination in covered jurisdictions; and data comparing successful Section 2 litigation in covered versus non-covered jurisdictions.</span><sup class="reference" data-dcnode-id="5228" id="cite_ref-Promise_11-5"><a data-dcnode-id="5229" href="#cite_note-Promise-11"><span data-dcnode-id="5230" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5225"><span data-dcnode-id="5226" title="Page / location: 195"><span data-dcnode-id="5227" instrument_node="">: 195 </span></span></sup><span data-dcnode-id="5224" instrument_node="">
</span></p><p data-dcnode-id="5166"><span data-dcnode-id="5222" instrument_node="">On May 2, 2006, Representative Sensenbrenner introduced the Fannie Lou Hamer, Rosa Parks, and Coretta Scott King Voting Rights Act Reauthorization and Amendments Act of 2006.</span><sup class="reference" data-dcnode-id="5219" id="cite_ref-35"><a data-dcnode-id="5220" href="#cite_note-35"><span data-dcnode-id="5221" instrument_node="">[35]</span></a></sup><sup class="reference" data-dcnode-id="5216" id="cite_ref-GovTrack2006_36-0"><a data-dcnode-id="5217" href="#cite_note-GovTrack2006-36"><span data-dcnode-id="5218" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5215" instrument_node=""> The bill proposed to extend the special provisions by 25 years and keep the coverage formula unchanged. The bill also proposed to amend the Act to overturn two recent Supreme Court cases: </span><i data-dcnode-id="5212"><a class="new" data-dcnode-id="5213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DReno_v._Bossier_Parish_School_Board%26action%3Dedit%26redlink%3D1" title="Reno v. Bossier Parish School Board (page does not exist)"><span data-dcnode-id="5214" instrument_node="">Reno v. Bossier Parish School Board</span></a></i><span data-dcnode-id="5211" instrument_node=""> (2000),</span><sup class="reference" data-dcnode-id="5208" id="cite_ref-Reno_9-1"><a data-dcnode-id="5209" href="#cite_note-Reno-9"><span data-dcnode-id="5210" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5207" instrument_node=""> which interpreted Section 5 to prohibit voting changes that were enacted or maintained for a "retrogressive" purpose instead of any discriminatory purpose, and </span><i data-dcnode-id="5204"><a data-dcnode-id="5205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgia_v._Ashcroft" title="Georgia v. Ashcroft"><span data-dcnode-id="5206" instrument_node="">Georgia v. Ashcroft</span></a></i><span data-dcnode-id="5203" instrument_node=""> (2003),</span><sup class="reference" data-dcnode-id="5200" id="cite_ref-Ash_10-1"><a data-dcnode-id="5201" href="#cite_note-Ash-10"><span data-dcnode-id="5202" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5199" instrument_node=""> which established a broader test for determining whether a redistricting plan had an impermissible effect under Section 5 than assessing only whether a minority group could elect its preferred candidates.</span><sup class="reference" data-dcnode-id="5196" id="cite_ref-Promise_11-6"><a data-dcnode-id="5197" href="#cite_note-Promise-11"><span data-dcnode-id="5198" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5193"><span data-dcnode-id="5194" title="Page / location: 207–208"><span data-dcnode-id="5195" instrument_node="">: 207–208 </span></span></sup><span data-dcnode-id="5192" instrument_node=""> While passage of the bill was virtually certain, a few Republican lawmakers attempted to amend the bill on the House floor. One group of legislators, led by Congressman </span><a data-dcnode-id="5190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lynn_Westmoreland" title="Lynn Westmoreland"><span data-dcnode-id="5191" instrument_node="">Lynn Westmoreland</span></a><span data-dcnode-id="5189" instrument_node=""> (R–GA), argued that the reauthorization unfairly targeted certain jurisdictions for long-past discrimination.</span><sup class="reference" data-dcnode-id="5186" id="cite_ref-37"><a data-dcnode-id="5187" href="#cite_note-37"><span data-dcnode-id="5188" instrument_node="">[37]</span></a></sup><sup class="reference" data-dcnode-id="5183" id="cite_ref-38"><a data-dcnode-id="5184" href="#cite_note-38"><span data-dcnode-id="5185" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5182" instrument_node=""> Another group of 80 legislators signed a letter originated by Congressman </span><a data-dcnode-id="5180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steve_King" title="Steve King"><span data-dcnode-id="5181" instrument_node="">Steve King</span></a><span data-dcnode-id="5179" instrument_node=""> (R–IA) arguing that the Act's bilingual election requirements constituted costly unfunded mandates.</span><sup class="reference" data-dcnode-id="5176" id="cite_ref-Post1_39-0"><a data-dcnode-id="5177" href="#cite_note-Post1-39"><span data-dcnode-id="5178" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5175" instrument_node=""> All proposed amendments to the bill failed, though three received the support of a majority of the Republican caucus. Following the defeat of these amendments, the House passed the bill on July 13, 2006, by a 390–33 vote.</span><sup class="reference" data-dcnode-id="5172" id="cite_ref-GovTrack2006_36-1"><a data-dcnode-id="5173" href="#cite_note-GovTrack2006-36"><span data-dcnode-id="5174" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5171" instrument_node=""> Notably, this tally included many Republicans who had previously voted in favor of the failed amendments.</span><sup class="reference" data-dcnode-id="5168" id="cite_ref-Rhodes_2017_8-1"><a data-dcnode-id="5169" href="#cite_note-Rhodes_2017-8"><span data-dcnode-id="5170" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5167" instrument_node="">
</span></p><p data-dcnode-id="5114"><span data-dcnode-id="5165" instrument_node="">Shortly thereafter, the Senate unanimously passed the bill without amendment on July 20, 2006, by a 98–0 vote.</span><sup class="reference" data-dcnode-id="5162" id="cite_ref-APVRA_40-0"><a data-dcnode-id="5163" href="#cite_note-APVRA-40"><span data-dcnode-id="5164" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5161" instrument_node=""> However, in an unprecedented event for a bill that passed unanimously out of committee, Senators of only one political party, Republicans, signed onto the bill's Senate committee report,</span><sup class="reference" data-dcnode-id="5158" id="cite_ref-Promise_11-7"><a data-dcnode-id="5159" href="#cite_note-Promise-11"><span data-dcnode-id="5160" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5155"><span data-dcnode-id="5156" title="Page / location: 178"><span data-dcnode-id="5157" instrument_node="">: 178 </span></span></sup><span data-dcnode-id="5154" instrument_node=""> and the report was not filed until six days after the bill's passage. The Senate report differed in significant ways from the House report, and in their own statement, Senate Democrats objected to parts of the Senate report that they believed highlighted evidence that could jeopardize the bill's constitutionality.</span><sup class="reference" data-dcnode-id="5151" id="cite_ref-Promise_11-8"><a data-dcnode-id="5152" href="#cite_note-Promise-11"><span data-dcnode-id="5153" instrument_node="">[11]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5148"><span data-dcnode-id="5149" title="Page / location: 186–189"><span data-dcnode-id="5150" instrument_node="">: 186–189 </span></span></sup><span data-dcnode-id="5147" instrument_node=""> The day after the committee report was filed, President </span><a data-dcnode-id="5145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="5146" instrument_node="">George W. Bush</span></a><span data-dcnode-id="5144" instrument_node=""> signed the bill in a morning ceremony on the </span><a class="mw-redirect" data-dcnode-id="5142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Lawn_%28White_House%29" title="South Lawn (White House)"><span data-dcnode-id="5143" instrument_node="">South Lawn</span></a><span data-dcnode-id="5141" instrument_node=""> of the </span><a data-dcnode-id="5139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_House" title="White House"><span data-dcnode-id="5140" instrument_node="">White House</span></a><span data-dcnode-id="5138" instrument_node=""> on July 27, 2006, one year in advance of the 2007 expiration date.</span><sup class="reference" data-dcnode-id="5135" id="cite_ref-APVRA_40-1"><a data-dcnode-id="5136" href="#cite_note-APVRA-40"><span data-dcnode-id="5137" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5134" instrument_node=""> The audience at the signing ceremony included family members of </span><a data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Luther_King_Jr." title="Martin Luther King Jr."><span data-dcnode-id="5133" instrument_node="">Martin Luther King Jr.</span></a><span data-dcnode-id="5131" instrument_node=""> and </span><a data-dcnode-id="5129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rosa_Parks" title="Rosa Parks"><span data-dcnode-id="5130" instrument_node="">Rosa Parks</span></a><span data-dcnode-id="5128" instrument_node="">, the reverends </span><a data-dcnode-id="5126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al_Sharpton" title="Al Sharpton"><span data-dcnode-id="5127" instrument_node="">Al Sharpton</span></a><span data-dcnode-id="5125" instrument_node=""> and </span><a data-dcnode-id="5123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jesse_Jackson" title="Jesse Jackson"><span data-dcnode-id="5124" instrument_node="">Jesse Jackson</span></a><span data-dcnode-id="5122" instrument_node="">, NAACP Chairman </span><a data-dcnode-id="5120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julian_Bond" title="Julian Bond"><span data-dcnode-id="5121" instrument_node="">Julian Bond</span></a><span data-dcnode-id="5119" instrument_node="">, and other civil rights leaders.</span><sup class="reference" data-dcnode-id="5116" id="cite_ref-APVRA_40-2"><a data-dcnode-id="5117" href="#cite_note-APVRA-40"><span data-dcnode-id="5118" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5115" instrument_node="">
</span></p><span data-dcnode-id="5113" instrument_node="">
</span><h2 data-dcnode-id="5103"><span class="mw-headline" data-dcnode-id="5111" id="Proposed"><span data-dcnode-id="5112" instrument_node="">Proposed</span></span><span class="mw-editsection" data-dcnode-id="5104"><span class="mw-editsection-bracket" data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">[</span></span><a data-dcnode-id="5107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmendments_to_the_Voting_Rights_Act_of_1965%26action%3Dedit%26section%3D6" title="Edit section: Proposed"><span data-dcnode-id="5108" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5102" instrument_node="">
</span><p data-dcnode-id="5058"><span data-dcnode-id="5101" instrument_node="">Many proposals to amend the Voting Rights Act of 1965 have been unsuccessful or remain pending in Congress. In 2013 the Supreme Court, in </span><i data-dcnode-id="5099"><span data-dcnode-id="5100" instrument_node="">Shelby County v. Holder</span></i><span data-dcnode-id="5098" instrument_node="">, invalidated the Voting Rights Act's coverage formula; several bills have been proposed to create a new coverage formula. In 2014, the Voting Rights Amendments Act was introduced in Congress to create a new coverage formula and amend various other provisions.</span><sup class="reference" data-dcnode-id="5095" id="cite_ref-41"><a data-dcnode-id="5096" href="#cite_note-41"><span data-dcnode-id="5097" instrument_node="">[41]</span></a></sup><span data-dcnode-id="5094" instrument_node=""> It was referred to the Constitution and Civil Justice congressional subcommittee on February 11, 2015, but no action was taken on it, and it expired</span><sup class="reference" data-dcnode-id="5091" id="cite_ref-42"><a data-dcnode-id="5092" href="#cite_note-42"><span data-dcnode-id="5093" instrument_node="">[42]</span></a></sup><span data-dcnode-id="5090" instrument_node=""> in 2017.</span><sup class="reference" data-dcnode-id="5087" id="cite_ref-43"><a data-dcnode-id="5088" href="#cite_note-43"><span data-dcnode-id="5089" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5086" instrument_node=""> Again in 2019, </span><a data-dcnode-id="5084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Sensenbrenner" title="Jim Sensenbrenner"><span data-dcnode-id="5085" instrument_node="">Reps. Jim Sensenbrenner</span></a><span data-dcnode-id="5083" instrument_node=""> (R-Wisconsin) and </span><a data-dcnode-id="5081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Conyers" title="John Conyers"><span data-dcnode-id="5082" instrument_node="">John Conyers Jr.</span></a><span data-dcnode-id="5080" instrument_node=""> (D-Michigan) introduced bipartisan legislation to update the Voting Rights Act. The bill's proposed coverage formula would cover 13 states with a history of voter discrimination: Alabama, Georgia, Mississippi, Texas, Louisiana, Florida, South Carolina, North Carolina, Arkansas, Arizona, California, New York, and Virginia.</span><sup class="reference" data-dcnode-id="5077" id="cite_ref-restoration_44-0"><a data-dcnode-id="5078" href="#cite_note-restoration-44"><span data-dcnode-id="5079" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5076" instrument_node=""> On December 6, 2019, the House of Representatives voted 228–187 in favor of the bill. Pennsylvania Congressman </span><a data-dcnode-id="5074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brian_Fitzpatrick_%28American_politician%29" title="Brian Fitzpatrick (American politician)"><span data-dcnode-id="5075" instrument_node="">Brian Fitzpatrick</span></a><span data-dcnode-id="5073" instrument_node=""> was the lone Republican to support it.</span><sup class="reference" data-dcnode-id="5070" id="cite_ref-restoration_44-1"><a data-dcnode-id="5071" href="#cite_note-restoration-44"><span data-dcnode-id="5072" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5069" instrument_node=""> Should it have been passed by the Senate, President </span><a data-dcnode-id="5067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="5068" instrument_node="">Donald Trump</span></a><span data-dcnode-id="5066" instrument_node=""> threatened to </span><a data-dcnode-id="5064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veto" title="Veto"><span data-dcnode-id="5065" instrument_node="">veto</span></a><span data-dcnode-id="5063" instrument_node=""> it.</span><sup class="reference" data-dcnode-id="5060" id="cite_ref-45"><a data-dcnode-id="5061" href="#cite_note-45"><span data-dcnode-id="5062" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5059" instrument_node="">
</span></p><p data-dcnode-id="5045"><a data-dcnode-id="5056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/For_the_People_Act" title="For the People Act"><span data-dcnode-id="5057" instrument_node="">The For the People Act</span></a><span data-dcnode-id="5055" instrument_node=""> was reintroduced, again as H.R. 1 in the </span><a data-dcnode-id="5053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/117th_United_States_Congress" title="117th United States Congress"><span data-dcnode-id="5054" instrument_node="">117th Congress</span></a><span data-dcnode-id="5052" instrument_node="">, and was passed by the House of Representatives on March 3, 2021, by a narrow, near-party line vote of 220–210, with all Republicans voting against and all but one Democrat voting for. The For the People Act currently awaits a vote in the Senate, which is divided 50-50 between Democrats and Republicans, with </span><a data-dcnode-id="5050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vice_President_of_the_United_States" title="Vice President of the United States"><span data-dcnode-id="5051" instrument_node="">Vice President</span></a><span data-dcnode-id="5049" instrument_node=""> </span><a data-dcnode-id="5047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kamala_Harris" title="Kamala Harris"><span data-dcnode-id="5048" instrument_node="">Kamala Harris</span></a><span data-dcnode-id="5046" instrument_node=""> holding the tie-breaking vote, though Republican use of the Senate filibuster has threatened to prevent the legislation from coming to a vote.
</span></p><p data-dcnode-id="5038"><a data-dcnode-id="5043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Lewis_Voting_Rights_Act" title="John Lewis Voting Rights Act"><span data-dcnode-id="5044" instrument_node="">The John Lewis Voting Rights Act</span></a><span data-dcnode-id="5042" instrument_node="">, which would create a new coverage formula for Section 5 of the Voting Rights Act of 1965 to replace the formula struck down by the </span><i data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">Shelby County</span></i><span data-dcnode-id="5039" instrument_node=""> decision, currently awaits a vote in the House of Representatives, where it is similarly expected to pass with Democrats largely in support and Republicans largely opposed.
</span></p><span data-dcnode-id="5037" instrument_node="">
</span><h2 data-dcnode-id="5027"><span class="mw-headline" data-dcnode-id="5035" id="References"><span data-dcnode-id="5036" instrument_node="">References</span></span><span class="mw-editsection" data-dcnode-id="5028"><span class="mw-editsection-bracket" data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">[</span></span><a data-dcnode-id="5031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAmendments_to_the_Voting_Rights_Act_of_1965%26action%3Dedit%26section%3D7" title="Edit section: References"><span data-dcnode-id="5032" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5029"><span data-dcnode-id="5030" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5026" instrument_node="">
