s kid.</span></div><img alt="" aria-hidden="true" class="image-3" data-dcnode-id="85" loading="lazy" sizes="50.000003814697266px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/617b6681a904fdb5c25f4462/617c6a95ccd862c361e460a0_Right%2520Quote.png&amp;raw" srcset="https://uploads-ssl.webflow.com/617b6681a904fdb5c25f4462/617c6a95ccd862c361e460a0_Right%20Quote-p-500.png 500w, https://uploads-ssl.webflow.com/617b6681a904fdb5c25f4462/617c6a95ccd862c361e460a0_Right%20Quote-p-800.png 800w, https://uploads-ssl.webflow.com/617b6681a904fdb5c25f4462/617c6a95ccd862c361e460a0_Right%20Quote.png 980w" width="50"><div aria-hidden="true" class="quotename testmonials" data-dcnode-id="81"><span data-dcnode-id="84" instrument_node="">Anonymous</span><br aria-hidden="true" data-dcnode-id="83"><span data-dcnode-id="82" instrument_node="">Voter in New York City</span></div></div></div><div aria-atomic="true" aria-live="off" class="w-slider-aria-label" data-dcnode-id="78" data-wf-ignore=""></div></div><div aria-controls="w-slider-mask-1" aria-label="previous slide" class="w-slider-arrow-left" data-dcnode-id="75" role="button" tabindex="0"><div class="icon-2 w-icon-slider-left" data-dcnode-id="76"></div></div><div aria-controls="w-slider-mask-1" aria-label="next slide" class="w-slider-arrow-right" data-dcnode-id="73" role="button" tabindex="0"><div class="icon w-icon-slider-right" data-dcnode-id="74"></div></div><div class="slide-nav w-slider-nav w-round" data-dcnode-id="69"><div aria-label="Show slide 1 of 3" aria-pressed="true" class="w-slider-dot w-active" data-dcnode-id="72" data-wf-ignore="" role="button" style="margin-left: 3px; margin-right: 3px;" tabindex="0"></div><div aria-label="Show slide 2 of 3" aria-pressed="false" class="w-slider-dot" data-dcnode-id="71" data-wf-ignore="" role="button" style="margin-left: 3px; margin-right: 3px;" tabindex="-1"></div><div aria-label="Show slide 3 of 3" aria-pressed="false" class="w-slider-dot" data-dcnode-id="70" data-wf-ignore="" role="button" style="margin-left: 3px; margin-right: 3px;" tabindex="-1"></div></div></div></div></div><div class="section blue wf-section" data-dcnode-id="21"><div class="container white w-container" data-dcnode-id="48" data-w-id="086f2cdf-2bb9-fe5c-da15-6b01c815a0e8" style="opacity: 1; transform: translate3d(0px, 0px, 0px) scale3d(1, 1, 1) rotateX(0deg) rotateY(0deg) rotateZ(0deg) skew(0deg, 0deg); transform-style: preserve-3d;"><h1 class="h3-main middle" data-dcnode-id="64"><span data-dcnode-id="65" instrument_node="">Why We Vote</span></h1><div class="main-paragraphy author" data-dcnode-id="61"><em data-dcnode-id="62"><span data-dcnode-id="63" instrument_node="">By: Nate Rodden, Chief of Editing</span></em></div><p class="main-paragraphy" data-dcnode-id="49"><span data-dcnode-id="60" instrument_node="">Youth Voting Initiation is an organization concerned with promoting increased voter participation in all communities, particularly those that typically demonstrate lower levels of turnout, such as Hispanic, African-American, and Asian-American communities. In the 2020 presidential election, only 63 percent of non-hispanic whites voted; 59 percent of non-hispanic asians voted, and 54 percent of hispanics voted. These numbers mean that a large proportion of these communities are being underrepresented, and thus are receiving less attention from policymakers. We aim to increase voter turnout in these communities so that more legislation might be passed for their benefit.</span><br data-dcnode-id="59"><span data-dcnode-id="58" instrument_node="">‍</span><br data-dcnode-id="57"><span data-dcnode-id="56" instrument_node="">Rather than focusing on voting as civic duty, our approach is to highlight the ability of political participation to transform communities and impact individual lives. It is our belief that by helping to increase the voter turnout in these communities, we may also help promote increased equity in our larger community.</span><br data-dcnode-id="55"><br data-dcnode-id="54"><span data-dcnode-id="53" instrument_node="">Voting allows individuals to impact their communities and promote their interests. Greater participation can bring better representation, more beneficial allocation of finances, and fairer legislation, among other benefits. Communities with higher turnout are more likely to receive high-quality education, healthcare, infrastructure, employment, and they often have a higher quality of life.</span><br data-dcnode-id="52"><br data-dcnode-id="51"><span data-dcnode-id="50" instrument_node="">It is important for voters to know that every vote makes a change; in several instances, a single vote has determined the result of an election. The ability to vote is a precious right that everybody should utilize to help themselves and their communities.</span></p></div><div class="container w-container" data-dcnode-id="22" data-w-id="d86b1601-2b4d-7c7d-defb-950bd9b289c9" style="opacity: 0;"><div class="form-block w-form" data-dcnode-id="23"><h1 class="h3-main" data-dcnode-id="46"><span data-dcnode-id="47" instrument_node="">Let's Work Together!</span></h1><p class="paragraph" data-dcnode-id="44"><span data-dcnode-id="45" instrument_node="">Email: youthvotingclub@gmail.com</span></p><form class="form" data-dcnode-id="30" data-name="Email Form" id="email-form" name="email-form"><div class="w-layout-grid grid-5" data-dcnode-id="35"><div data-dcnode-id="40"><label class="form-label" data-dcnode-id="42" for="name-2"><span data-dcnode-id="43" instrument_node="">Name</span></label><input class="w-input" data-dcnode-id="41" data-name="Name 2" id="name-2" maxlength="256" name="name-2" placeholder="" type="text"></div><div data-dcnode-id="36"><label class="form-label" data-dcnode-id="38" for="email-2"><span data-dcnode-id="39" instrument_node="">Email Address</span></label><input class="w-input" data-dcnode-id="37" data-name="Email 2" id="email-2" maxlength="256" name="email-2" placehol
