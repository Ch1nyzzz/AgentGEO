">−</span></mo><mn data-dcnode-id="3249" is="true"><span data-dcnode-id="3250" instrument_node="">2</span></mn><mspace data-dcnode-id="3248" is="true" width="0.25em"></mspace><mi data-dcnode-id="3246" is="true"><span data-dcnode-id="3247" instrument_node="">ln</span></mi><mspace data-dcnode-id="3245" is="true" width="0.25em"></mspace><msub data-dcnode-id="3239" is="true"><mi data-dcnode-id="3243" is="true"><span data-dcnode-id="3244" instrument_node="">L</span></mi><mrow data-dcnode-id="3240" is="true"><mn data-dcnode-id="3241" is="true"><span data-dcnode-id="3242" instrument_node="">18</span></mn></mrow></msub><mo data-dcnode-id="3237" is="true"><span data-dcnode-id="3238" instrument_node="">)</span></mo></mrow><mo data-dcnode-id="3234" is="true"><span data-dcnode-id="3235" instrument_node="">]</span></mo></mrow></mrow></math></span></span></span></span></span></p><p data-dcnode-id="3206" id="p0220"><span data-dcnode-id="3222" instrument_node="">ln&nbsp;</span><em data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">L</span></em><sub data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">c</span></sub><span data-dcnode-id="3217" instrument_node=""> is the fitted log-likelihood for a combined model that includes both age-groups, while ln&nbsp;</span><em data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">L</span></em><sub data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">16–17</span></sub><span data-dcnode-id="3212" instrument_node=""> and ln&nbsp;</span><em data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">L</span></em><sub data-dcnode-id="3208"><span data-dcnode-id="3209" instrument_node="">18</span></sub><span data-dcnode-id="3207" instrument_node=""> are the fitted log-likelihood for each of the age-groups. This test uses the chi-squared distribution with degrees of freedom equal to the number of parameters (including the intercept).</span></p></section><section data-dcnode-id="3168" id="sec4.5"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3199"><span data-dcnode-id="3204" instrument_node="">4.5</span><span data-dcnode-id="3202" instrument_node="">. </span><span data-dcnode-id="3200" instrument_node="">Data – the Norwegian high school election survey</span></h3><p data-dcnode-id="3193" id="p0225"><span data-dcnode-id="3198" instrument_node="">Norwegian high schools perform mock elections every other year, in advance of the actual Norwegian parliamentary or local elections.</span><a class="workspace-trigger" data-dcnode-id="3195" href="#fn10" name="bfn10"><sup data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">10</span></sup></a><span data-dcnode-id="3194" instrument_node=""> The Norwegian Social Science Data Services collect election statistics from these mock elections, and also do an interview-survey of high school students in connection with the election. They carried out the first such survey in 1989, and have continued to do so in connection with every election since then. The 2011 survey, which I use in this paper, consist of responses from 30&nbsp;758 students. The students answer questions online, in their school time.</span></p><p data-dcnode-id="3191" id="p0230"><span data-dcnode-id="3192" instrument_node="">2558 of the respondents stated that they reside in one of the municipalities where the voting age trial was held. Out of these, 1803 were 16 or 17 years of age and thus got voting rights as a result of the trial. The remaining 755 was older than 17. As discussed below, I assume that the vast majority of these were 18 years of age.</span></p><p data-dcnode-id="3189" id="p0235"><span data-dcnode-id="3190" instrument_node="">For the purposes of the analyses in this paper I have divided the student-respondents into four categories: 1) not in a trial municipality, aged 16 or 17, 2) not in a trial municipality, aged 18, 3) in a trial municipality, aged 16 or 17, and 4) in a trial municipality aged 18.</span></p><p data-dcnode-id="3179" id="p0240"><span data-dcnode-id="3188" instrument_node="">The data on age in the survey is less than ideal, but by using other available information, one can divide students into these categories. First, I define age in this survey as a person's age on December 31 2011. This corresponds to the criterion for getting voting rights in Norway: turning 18 by the end of the election year.</span><a class="workspace-trigger" data-dcnode-id="3185" href="#fn11" name="bfn11"><sup data-dcnode-id="3186"><span data-dcnode-id="3187" instrument_node="">11</span></sup></a><span data-dcnode-id="3184" instrument_node=""> Second, the standard age for high school students in Norway is 16 through 18. One finishes primary school the year one turns 16, and can then start three years of high school studies. Some students take longer than three years, and there are some study-programs that require a fourth year of high school. Still, 86 percent of high school students in Norway are aged 16 through 18.</span><a class="workspace-trigger" data-dcnode-id="3181" href="#fn12" name="bfn12"><sup data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">12</span></sup></a><span data-dcnode-id="3180" instrument_node=""> This percentage is higher in the group of students that is over represented in the survey-data: those taking general studies aiming for higher education. I therefore assume that the respondents in the survey are for the most part aged 16 through 18.</span></p><p data-dcnode-id="3177" id="p0245"><span data-dcnode-id="3178" instrument_node="">Respondents in the survey are asked whether they have voting rights or not. For those who do not reside in the trial municipalities, I categorize those without voting rights as being aged 16 or 17. I put those who say they have voting rights, and are not part of the voting age trial, in the 18-year-old category.</span></p><p data-dcnode-id="3175" id="p0250"><span data-dcnode-id="3176" instrument_node="">Respondents who reside in the trial municipalities are asked about their year of birth, with the following alternatives: “1995”, “1994” and “1993 or earlier”. Those born in 1995 or 1994 are 16 or 17 years of age. Those replying “1993 or earlier” will for the most part be 18, but there could also be some older students in this category.</span></p><p data-dcnode-id="3169" id="p0255"><span data-dcnode-id="3174" instrument_node="">Finally, it should be noted that the survey of high school students naturally does not include people aged 16 through 18 who are not in school. While high school education is a legal right in Norway, it is not mandatory. Out of all teenagers in this age-group, 91 percent are in school.</span><a class="workspace-trigger" data-dcnode-id="3171" href="#fn13" name="bfn13"><sup data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">13</span></sup></a><span data-dcnode-id="3170" instrument_node=""> The High School Election Survey is therefore representative of the vast majority of Norwegians in this age group, but one should keep in mind that some young people are outside of the school system, and their attitudes and behavior cannot be measured in this survey.</span></p></section></section><section data-dcnode-id="1588" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3161"><span data-dcnode-id="3166" instrument_node="">5</span><span data-dcnode-id="3164" instrument_node="">. </span><span data-dcnode-id="3162" instrument_node="">Results</span></h2><p data-dcnode-id="3159" id="p0260"><span data-dcnode-id="3160" instrument_node="">Using the 2011 High School Election Survey I look for differences in political maturity between the age categories 16 and 17 on the one hand and 18 on the other, both in the trial municipalities and in the rest of the country. I test for such differences on four indicators of maturity: 1) political interest, 2) political efficacy, 3) attitudinal constraint and 4) consistency between attitudes and vote choice.</span></p><section data-dcnode-id="3120" id="sec5.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3153"><span data-dcnode-id="3158" instrument_node="">5.1</span><span data-dcnode-id="3156" instrument_node="">. </span><span data-dcnode-id="3154" instrument_node="">Political interest</span></h3><div data-dcnode-id="3128"><p data-dcnode-id="3148" id="p0265"><span data-dcnode-id="3152" instrument_node="">The share of respondents who say that they are “very” or “somewhat” interested in politics, in the four categories defined by age and residence in a trial municipality, are in </span><a class="workspace-trigger" data-dcnode-id="3150" href="#fig1" name="bfig1"><span data-dcnode-id="3151" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="3149" instrument_node="">. As expected, there is an age-difference in political interest among those that are not part of the voting age trial. 18-year-olds express more political interest than 16- and 17-year-olds.</span></p><figure class="figure text-xs" data-dcnode-id="3129" id="fig1"><span data-dcnode-id="3138"><img alt="" data-dcnode-id="3147" height="279" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379412001333-gr1.jpg&amp;raw"><span data-dcnode-id="3146" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3139"><li data-dcnode-id="3140"><a class="anchor download-link u-font-sans" data-dcnode-id="3141" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379412001333-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3142"><span data-dcnode-id="3145" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3130"><span data-dcnode-id="3131"><p data-dcnode-id="3132" id="fspara0010"><span class="label" data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">Fig.&nbsp;1</span></span><span data-dcnode-id="3135" instrument_node="">. </span><span data-dcnode-id="3133" instrument_node="">Interest in politics* by age and participation in the voting agetrial. Percent.</span></p></span></span></figure></div><p data-dcnode-id="3123" id="p0270"><span data-dcnode-id="3127" instrument_node="">Contrary to expectations, this difference in political interest remains at about the same size in the trial municipalities. When looking at political interest, there is no apparent effect of the trial. The difference in political interest between the age-groups is not evened out when the voting age is lowered to 16. The differences are statistically significant (</span><em data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">p</span></em><span data-dcnode-id="3124" instrument_node="">&nbsp;≤&nbsp;.05).</span></p><p data-dcnode-id="3121" id="p0275"><span data-dcnode-id="3122" instrument_node="">Overall interest-levels seem to be somewhat higher in the trial municipalities than in the rest of the country. This could be an effect of the trial, but I am unable to determine if it is. The municipalities were selected for the trial because of fairly active involvement of youth in politics. It is therefore possible that the relatively high levels of interest in politics in these municipalities are a result of selection bias.</span></p></section><section data-dcnode-id="3076" id="sec5.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3114"><span data-dcnode-id="3119" instrument_node="">5.2</span><span data-dcnode-id="3117" instrument_node="">. </span><span data-dcnode-id="3115" instrument_node="">Political efficacy</span></h3><div data-dcnode-id="3089"><p data-dcnode-id="3109" id="p0280"><span data-dcnode-id="3113" instrument_node="">Internal and external political efficacy is measured using two different questions, and Likert-scales from strongly agree to strongly disagree. Both questions are statements indicating a low level of efficacy. I use the balance of opinion (difference between the percentage that agrees and the percentage that disagrees) to measure internal and external efficacy in the four groups. Low values indicate a high proportion of disagreements with the statement, and thus a high level of efficacy. The results, for both questions, are in </span><a class="workspace-trigger" data-dcnode-id="3111" href="#fig2" name="bfig2"><span data-dcnode-id="3112" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="3110" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="3090" id="fig2"><span data-dcnode-id="3099"><img alt="" data-dcnode-id="3108" height="425" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379412001333-gr2.jpg&amp;raw"><span data-dcnode-id="3107" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3100"><li data-dcnode-id="3101"><a class="anchor download-link u-font-sans" data-dcnode-id="3102" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0261379412001333-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3103"><span data-dcnode-id="3106" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3104"><span data-dcnode-id="3105" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3091"><span data-dcnode-id="3092"><p data-dcnode-id="3093" id="fspara0015"><span class="label" data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Fig.&nbsp;2</span></span><span data-dcnode-id="3096" instrument_node="">. </span><span data-dcnode-id="3094" instrument_node="">Two measures of political efficacy, balance of opinion (% agree–% disagree).</span></p></span></span></figure></div><p data-dcnode-id="3084" id="p0285"><span data-dcnode-id="3088" instrument_node="">External political efficacy (displayed the black column in </span><a class="workspace-trigger" data-dcnode-id="3086" href="#fig2" name="bfig2"><span data-dcnode-id="3087" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="3085" instrument_node="">) is greatest among 18-year-olds that are not in the trial municipalities. 16- and 17-year-olds that are part of the trial express the greatest amount of agreement with the statement, and therefore the lowest level of political efficacy. As for differences by age, those aged 18 have a higher level of external political efficacy than younger high school students, both in the trial municipalities and in the rest of the country. There is no indication that being part of the voting age trial reduces these differences. In fact, the difference is greater in the trial municipalities than in the rest of the country.</span></p><p data-dcnode-id="3082" id="p0290"><span data-dcnode-id="3083" instrument_node="">The results for the question that taps internal political efficacy are similar. There is an overall grater level of disagreement with this statement, resulting in negative balances of opinion. In the trial municipalities, 16- and 17-year olds tend to agree more with the statement than 18-year-olds. Outside of the trial municipalities, the two age-groups have about the same level of internal efficacy.</span></p><p data-dcnode-id="3077" id="p0295"><span data-dcnode-id="3081" instrument_node="">The differences in </span><a class="workspace-trigger" data-dcnode-id="3079" href="#fig2" name="bfig2"><span data-dcnode-id="3080" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="3078" instrument_node=""> are not statistically significant. Still, there is no support for the hypothesis that age-differences in political efficacy will be evened out when the voting age changes to 16. Indications are that if there are differences in efficacy by age; these are not weakened when 16- and 17-year-olds get the right to vote.</span></p></section><section data-dcnode-id="2674" id="sec5.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3070"><span data-dcnode-id="3075" instrument_node="">5.3</span><span data-dcnode-id="3073" instrument_node="">. </span><span data-dcnode-id="3071" instrument_node="">Attitudinal constraint</span></h3><p data-dcnode-id="3062" id="p0300"><span data-dcnode-id="3069" instrument_node="">The degree to which people's attitudes are constrained can be measured by looking at correlations between attitude questions (</span><a class="workspace-trigger" data-dcnode-id="3067" href="#bib2" name="bbib2"><span data-dcnode-id="3068" instrument_node="">Baldassarri and Gelman, 2008</span></a><span data-dcnode-id="3066" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3064" href="#bib8" name="bbib8"><span data-dcnode-id="3065" instrument_node="">Converse, 1964</span></a><span data-dcnode-id="3063" instrument_node="">). People who are politically sophisticated are expected to have the strongest linkage between survey items. Furthermore, there should be a strong relationship between a politically sophisticated or mature person's attitudes and his or her ideological position.</span></p><p data-dcnode-id="3060" id="p0305"><span data-dcnode-id="3061" instrument_node="">I use correlations between issue-questions as the first indicator of attitudinal constraint, and the effect of these issues on ideological self-placement as the second indicator.</span></p><div data-dcnode-id="2948"><p data-dcnode-id="3055" id="p0310"><span data-dcnode-id="3059" instrument_node="">The mean correlations between survey items tapping “old politics”, “new politics” and “law and order/terrorism” are in </span><a class="workspace-trigger" data-dcnode-id="3057" href="#tbl1" name="btbl1"><span data-dcnode-id="3058" instrument_node="">Table 1</span></a><span data-dcnode-id="3056" instrument_node="">.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="2949" id="tbl1"><span class="captions" data-dcnode-id="3044"><span data-dcnode-id="3045"><p data-dcnode-id="3046" id="tspara0010"><span class="label" data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">Table 1</span></span><span data-dcnode-id="3052" instrument_node="">. </span><span data-dcnode-id="3050" instrument_node="">Mean correlations between issue positions among high school students by age and participation in the voting age trial in 2011. Pearson's </span><em data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">r</span></em><span data-dcnode-id="3047" instrument_node="">.</span></p></span></span><div class="groups" data-dcnode-id="2969"><table data-dcnode-id="2970"><thead data-dcnode-id="3026"><tr class="rowsep-1 valign-top" data-dcnode-id="3036"><td data-dcnode-id="3041" rowspan="2" scope="col"><span class="screen-reader-only" data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">Empty Cell</span></span></td><th colspan="2" data-dcnode-id="3039" scope="col"><span data-dcnode-id="3040" instrument_node="">No trial</span></th><th colspan="2" data-dcnode-id="3037" scope="col"><span data-dcnode-id="3038" instrument_node="">Trial</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="3027"><th data-dcnode-id="3034" scope="col"><span data-dcnode-id="3035" instrument_node="">16–17 Years</span></th><th data-dcnode-id="3032" scope="col"><span data-dcnode-id="3033" instrument_node="">18 Years</span></th><th data-dcnode-id="3030" scope="col"><span data-dcnode-id="3031" instrument_node="">16–17 Years</span></th><th data-dcnode-id="3028" scope="col"><span data-dcnode-id="3029" instrument_node="">18 Years</span></th></tr></thead><tbody data-dcnode-id="2971"><tr class="valign-top" data-dcnode-id="3012"><td data-dcnode-id="3021"><span data-dcnode-id="3025" instrument_node="">Old left–right issues</span><a class="workspace-trigger" data-dcnode-id="3022" href="#tbl1fna" name="btbl1fna"><sup data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">a</span></sup></a></td><td data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">.11</span></td><td data-dcnode-id="3017"><span data-dcnode-id="3018" instrument_node="">.11</span></td><td data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">.11</span></td><td data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">.16</span></td></tr><tr class="valign-top" data-dcnode-id="2998"><td data-dcnode-id="3007"><span data-dcnode-id="3011" instrument_node="">New left–right issues</span><a class="workspace-trigger" data-dcnode-id="3008" href="#tbl1fnb" name="btbl1fnb"><sup data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">b</span></sup></a></td><td data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node="">.15</span></td><td data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">.15</span></td><td data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">.14</span></td><td data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">.15</span></td></tr><tr class="valign-top" data-dcnode-id="2984"><td data-dcnode-id="2993"><span data-dcnode-id="2997" instrument_node="">Law and order/terrorism</span><a class="workspace-trigger" data-dcnode-id="2994" href="#tbl1fnc" name="btbl1fnc"><sup data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">c</span></sup></a></td><td data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node="">.42</span></td><td data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">.47</span></td><td data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">.46</span></td><td data-dcnode-id="2985"><span data-dcnode-id="2986" instrument_node="">.46</span></td></tr><tr class="valign-top" data-dcnode-id="2972"><td data-dcnode-id="2981"><em data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">N</span></em></td><td data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">14,675</span></td><td data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">7279</span></td><td data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">1467</span></td><td data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">597</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="2966"></p><p data-dcnode-id="2967" id="tspara0015"><span data-dcnode-id="2968" instrument_node="">The variables are reversed when needed so that all correlations are positive.</span></p><p></p><dl class="footnotes" data-dcnode-id="2950"><dt data-dcnode-id="2964" id="tbl1fna"><span data-dcnode-id="2965" instrument_node="">a</span></dt><dd data-dcnode-id="2961"><p data-dcnode-id="2962"><span data-dcnode-id="2963" instrument_node="">Mean correlations between pairs of the following three issue positions (Likert scales): 1) “It is more important expand public services than to lower taxes” 2) “government has a unique responsibility to assist people who cannot take care of themselves, no matter what the cause of their problems is” 3) “in order to encourage the drive of the individual, we should accept larger differences in wages”.</span></p></dd><dt data-dcnode-id="2959" id="tbl1fnb"><span data-dcnode-id="2960" instrument_node="">b</span></dt><dd data-dcnode-id="2956"><p data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node="">Mean correlations between pairs of the following four issue positions (Likert scales): 1) “We should limit the use of privately owned cars and expand the use of public transportation” 2) “to secure economic growth, we need continued expansion of industry, even if this is in conflict with environmental interests” 3) “immigration is a serious threat to our national character” 4) “the Norwegian voting-age should be lowered from 18 to 16”.</span></p></dd><dt data-dcnode-id="2954" id="tbl1fnc"><span data-dcnode-id="2955" instrument_node="">c</span></dt><dd data-dcnode-id="2951"><p data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">Mean correlations between pairs of the following three issue positions: “Imagine that the government suspected that a terrorist attack was imminent. Do you think the government should have the right to…” 1) “keep people in custody indefinitely without holding a trial?” 2) “tapping people's phones?” 3) “randomly stopping and searching people on the street”. The response-alternatives are: 1. Should definitely have the right (to do so) 2. should probably have the right 3. Should probably not have the right and 4. Should definitely not have the right.</span></p></dd></dl></div></div><p data-dcnode-id="2946" id="p0315"><span data-dcnode-id="2947" instrument_node="">As may be expected among young people, the items tapping new politics issues are more highly correlated than those measuring old left–right issue positions. The three law and order/terrorism items are very highly correlated, probably because they were asked together, and deal with similar issues.</span></p><p data-dcnode-id="2944" id="p0320"><span data-dcnode-id="2945" instrument_node="">The general pattern for respondents that are not part of the voting age trial is of small variations in these correlations by age. The average correlations with respect to the law and order/terrorism items are somewhat higher among 18-year-olds than among those aged 16 or 17.</span></p><p data-dcnode-id="2939" id="p0325"><span data-dcnode-id="2943" instrument_node="">Looking at those that reside in the trial municipalities, the difference by age is slightly more pronounced. 18-year-olds in the trial municipalities express more attitudinal constraint than high school students at the age of 16 or 17. This difference is evident in the groupings of issues labeled “old” and “new politics” in </span><a class="workspace-trigger" data-dcnode-id="2941" href="#tbl1" name="btbl1"><span data-dcnode-id="2942" instrument_node="">Table 1</span></a><span data-dcnode-id="2940" instrument_node="">, but not with respect to the “law and order/terrorism” category.</span></p><p data-dcnode-id="2934" id="p0330"><span data-dcnode-id="2938" instrument_node="">When using correlations between issue-items as a measure of attitudinal constraint, there is no support for the hypothesis that age-differences in constraint are leveled out when the voting age changes to 16. Indications from </span><a class="workspace-trigger" data-dcnode-id="2936" href="#tbl1" name="btbl1"><span data-dcnode-id="2937" instrument_node="">Table 1</span></a><span data-dcnode-id="2935" instrument_node=""> are that 18-year-olds have a small advantage over younger students when it comes to constraint, and this is not affected by a change in the voting age.</span></p><div data-dcnode-id="2689"><p data-dcnode-id="2929" id="p0335"><span data-dcnode-id="2933" instrument_node="">The results of the second test for differences in attitudinal constraint are in </span><a class="workspace-trigger" data-dcnode-id="2931" href="#tbl2" name="btbl2"><span data-dcnode-id="2932" instrument_node="">Table 2</span></a><span data-dcnode-id="2930" instrument_node="">. It includes the results of 16 OLS regression analyses (4 groups of issue-items analyzed in 4 groups of respondents). The four groups of issue-questions are used as independent variables, with the left–right self-placement scale as the dependent variable. I use Chow tests to test for statistically significant differences between age-groups.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="2690" id="tbl2"><span class="captions" data-dcnode-id="2908"><span data-dcnode-id="2909"><p data-dcnode-id="2910" id="tspara0020"><span class="label" data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Table 2</span></span><span data-dcnode-id="2926" instrument_node="">. </span><span data-dcnode-id="2924" instrument_node="">Explained variance (</span><em data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">R</span></em><sup data-dcnode-id="2920"><span data-dcnode-id="2921" instrument_node="">2</span></sup><span data-dcnode-id="2919" instrument_node="">) of OLS regression models in which left–right self-placement</span><a class="workspace-trigger" data-dcnode-id="2916" href="#tbl2fna" name="btbl2fna"><sup data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">a</span></sup></a><span data-dcnode-id="2915" instrument_node=""> is a function of issue-attitudes,</span><a class="workspace-trigger" data-dcnode-id="2912" href="#tbl2fnb" name="btbl2fnb"><sup data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">b</span></sup></a><span data-dcnode-id="2911" instrument_node=""> by age and participation in the voting age-trial. Chow tests of the differences in the models by age.</span></p></span></span><div class="groups" data-dcnode-id="2721"><table data-dcnode-id="2722"><thead data-dcnode-id="2885"><tr class="rowsep-1 valign-top" data-dcnode-id="2892"><td data-dcnode-id="2905" rowspan="2" scope="col"><span class="screen-reader-only" data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">Empty Cell</span></span></td><td data-dcnode-id="2902" rowspan="2" scope="col"><span class="screen-reader-only" data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="2900" rowspan="2" scope="col"><span data-dcnode-id="2901" instrument_node="">Age</span></th><th data-dcnode-id="2895" rowspan="2" scope="col"><em data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">R</span></em><sup data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">2</span></sup></th><th colspan="3" data-dcnode-id="2893" scope="col"><span data-dcnode-id="2894" instrument_node="">Chow-test</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="2886"><th data-dcnode-id="2889" scope="col"><em data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">F</span></em></th><th colspan="2" data-dcnode-id="2887" scope="col"><span data-dcnode-id="2888" instrument_node="">Degrees of freedom</span></th></tr></thead><tbody data-dcnode-id="2723"><tr class="valign-top" data-dcnode-id="2870"><td data-dcnode-id="2883" rowspan="4"><span data-dcnode-id="2884" instrument_node="">Old politics</span></td><td data-dcnode-id="2881" rowspan="2"><span data-dcnode-id="2882" instrument_node="">No trial</span></td><td data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">16–17</span></td><td class="align-char" data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">.16</span></td><td class="align-char" data-dcnode-id="2875" rowspan="2"><span data-dcnode-id="2876" instrument_node="">1.73</span></td><td class="align-char" data-dcnode-id="2873" rowspan="2"><span data-dcnode-id="2874" instrument_node="">4</span></td><td class="align-char" data-dcnode-id="2871" rowspan="2"><span data-dcnode-id="2872" instrument_node="">15,411</span></td></tr><tr class="valign-top" data-dcnode-id="2865"><td data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">18</span></td><td class="align-char" data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">.17</span></td></tr><tr class="valign-top" data-dcnode-id="2852"><td data-dcnode-id="2863" rowspan="2"><span data-dcnode-id="2864" instrument_node="">Trial</span></td><td data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">16–17</span></td><td class="align-char" data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">.12</span></td><td class="align-char" data-dcnode-id="2857" rowspan="2"><span data-dcnode-id="2858" instrument_node="">.34</span></td><td class="align-char" da ment_node="">16–17</span></td><td class="align-char" data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">.01</span></td><td class="align-char" data-dcnode-id="2775" rowspan="2"><span data-dcnode-id="2776" instrument_node="">1.02</span></td><td class="align-char" data-dcnode-id="2773" rowspan="2"><span data-dcnode-id="2774" instrument_node="">4</span></td><td class="align-char" data-dcnode-id="2771" rowspan="2"><span data-dcnode-id="2772" instrument_node="">1729</span></td></tr><tr class="valign-top" data-dcnode-id="2765"><td data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">18</span></td><td class="align-char" data-dcnode-id="2766"><span data-dcnode-id="2767" instrument_node="">.02</span></td></tr><tr class="valign-top" data-dcnode-id="2762"><td colspan="7" data-dcnode-id="2763"><br data-dcnode-id="2764"></td></tr><tr class="valign-top" data-dcnode-id="2747"><td data-dcnode-id="2760" rowspan="4"><span data-dcnode-id="2761" instrument_node="">Combined model</span></td><td data-dcnode-id="2758" rowspan="2"><span data-dcnode-id="2759" instrument_node="">No trial</span></td><td data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">16–17</span></td><td class="align-char" data-dcnode-id="2754"><span data-dcnode-id="2755" instrument_node="">.21</span></td><td class="align-char" data-dcnode-id="2752" rowspan="2"><span data-dcnode-id="2753" instrument_node="">1.61</span></td><td class="align-char" data-dcnode-id="2750" rowspan="2"><span data-dcnode-id="2751" instrument_node="">11</span></td><td class="align-char" data-dcnode-id="2748" rowspan="2"><span data-dcnode-id="2749" instrument_node="">13,340</span></td></tr><tr class="valign-top" data-dcnode-id="2742"><td data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">18</span></td><td class="align-char" data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">.24</span></td></tr><tr class="valign-top" data-dcnode-id="2729"><td data-dcnode-id="2740" rowspan="2"><span data-dcnode-id="2741" instrument_node="">Trial</span></td><td data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">16–17</span></td><td class="align-char" data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">.16</span></td><td class="align-char" data-dcnode-id="2734" rowspan="2"><span data-dcnode-id="2735" instrument_node="">.74</span></td><td class="align-char" data-dcnode-id="2732" rowspan="2"><span data-dcnode-id="2733" instrument_node="">11</span></td><td class="align-char" data-dcnode-id="2730" rowspan="2"><span data-dcnode-id="2731" instrument_node="">1416</span></td></tr><tr class="valign-top" data-dcnode-id="2724"><td data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">18</span></td><td class="align-char" data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">.24</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="2705"></p><p data-dcnode-id="2716" id="tspara0025"><span data-dcnode-id="2720" instrument_node="">*</span><em data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">p</span></em><span data-dcnode-id="2717" instrument_node="">&nbsp;&lt;&nbsp;.05.</span></p><p data-dcnode-id="2711" id="tspara0030"><span data-dcnode-id="2715" instrument_node="">**</span><em data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">p</span></em><span data-dcnode-id="2712" instrument_node="">&nbsp;&lt;&nbsp;.01.</span></p><p data-dcnode-id="2706" id="tspara0035"><span data-dcnode-id="2710" instrument_node="">***</span><em data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">p</span></em><span data-dcnode-id="2707" instrument_node="">&nbsp;&lt;&nbsp;.001.</span></p><p></p><dl class="footnotes" data-dcnode-id="2691"><dt data-dcnode-id="2703" id="tbl2fna"><span data-dcnode-id="2704" instrument_node="">a</span></dt><dd data-dcnode-id="2700"><p data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">In politics people sometimes talk of left and right. Where would you generally place yourself on this scale (from 1 to 10)?</span></p></dd><dt data-dcnode-id="2698" id="tbl2fnb"><span data-dcnode-id="2699" instrument_node="">b</span></dt><dd data-dcnode-id="2692"><p data-dcnode-id="2693"><span data-dcnode-id="2697" instrument_node="">For question-wordings see </span><a class="workspace-trigger" data-dcnode-id="2695" href="#tbl1" name="btbl1"><span data-dcnode-id="2696" instrument_node="">Table 1</span></a><span data-dcnode-id="2694" instrument_node="">.</span></p></dd></dl></div></div><p data-dcnode-id="2687" id="p0340"><span data-dcnode-id="2688" instrument_node="">The “old” and “new” politics questions are fairly strongly related to self-placement on the left right scale, while the law and order/terrorism questions only have a minor effect. This indicates that when high school students are asked about their general ideological position, they do connect that to specific policy issues, and especially to policy issues that are commonly related to left and right.</span></p><p data-dcnode-id="2679" id="p0345"><span data-dcnode-id="2686" instrument_node="">There is a consistent pattern in </span><a class="workspace-trigger" data-dcnode-id="2684" href="#tbl2" name="btbl2"><span data-dcnode-id="2685" instrument_node="">Table 2</span></a><span data-dcnode-id="2683" instrument_node="">, in which there is a higher </span><em data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">R</span></em><span data-dcnode-id="2680" instrument_node="">-squared with respect to 18-year-olds than with respect to 16- and 17-year-olds. There is, in other words, a stronger relationship between issue positions and ideological position among those aged 18, than among younger adolescents. This pattern is evident in all four models (old politics, new politics, law and order/terrorism and the combined model), both in the trial municipalities and in the rest of the country.</span></p><p data-dcnode-id="2677" id="p0350"><span data-dcnode-id="2678" instrument_node="">The only model that has statistically significantly different results, when applied to the two age-groups, is the new politics model. The chow-test for this model is statistically significant both in the trial municipalities, and outside of the voting age trial. This means that there is a stronger relationship between issue positions and ideology among 18-year-olds than among those aged 16 or 17. There are no indications that this effect is weakened or evened out in the trial municipalities. On the contrary, these differences appear to be larger in the trial municipalities than elsewhere.</span></p><p data-dcnode-id="2675" id="p0355"><span data-dcnode-id="2676" instrument_node="">In sum, using two measures of attitudinal constraint, I find no evidence that a lowering of the voting age affects the political maturity of 16- and 17-year-olds. High school students at 18 years of age have consistently higher levels of constraint than their younger counterparts.</span></p></section><section data-dcnode-id="1589" id="sec5.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2668"><span data-dcnode-id="2673" instrument_node="">5.4</span><span data-dcnode-id="2671" instrument_node="">. </span><span data-dcnode-id="2669" instrument_node="">Consistency between attitudes and vote choice</span></h3><p data-dcnode-id="2666" id="p0360"><span data-dcnode-id="2667" instrument_node="">The final measure of political maturity taps the degree of consistency between attitudes and vote choice. The inclusion of this measure is based on the idea that politically mature voters are best equipped to evaluate which party shares their own political attitudes, and then vote accordingly.</span></p><p data-dcnode-id="2661" id="p0365"><span data-dcnode-id="2665" instrument_node="">I use the same independent variables as in </span><a class="workspace-trigger" data-dcnode-id="2663" href="#tbl2" name="btbl2"><span data-dcnode-id="2664" instrument_node="">Table 2</span></a><span data-dcnode-id="2662" instrument_node="">, but the dependent variable is voting for one of the following four parties: the Socialist Left Party, the Labor Party, the Conservatives and the Progress Party.</span></p><div data-dcnode-id="2403"><p data-dcnode-id="2656" id="p0370"><span data-dcnode-id="2660" instrument_node="">The results of the first logistic regression analyses are in </span><a class="workspace-trigger" data-dcnode-id="2658" href="#tbl3" name="btbl3"><span data-dcnode-id="2659" instrument_node="">Table 3</span></a><span data-dcnode-id="2657" instrument_node="">, in which a Socialist Left Party vote is a function of the groups of issue-questions from the high school election survey.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="2404" id="tbl3"><span class="captions" data-dcnode-id="2639"><span data-dcnode-id="2640"><p data-dcnode-id="2641" id="tspara0040"><span class="label" data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">Table 3</span></span><span data-dcnode-id="2653" instrument_node="">. </span><span data-dcnode-id="2651" instrument_node="">Logit regressions in which support for the Socialist left party is a function of issue-attitudes,</span><a class="workspace-trigger" data-dcnode-id="2648" href="#tbl3fna" name="btbl3fna"><sup data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">a</span></sup></a><span data-dcnode-id="2647" instrument_node=""> by age and participation in the voting age-trial. Pseudo </span><em data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">R</span></em><sup data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">2</span></sup><span data-dcnode-id="2642" instrument_node=""> and chi-squared tests for the differences in the models by age.</span></p></span></span><div class="groups" data-dcnode-id="2430"><table data-dcnode-id="2431"><thead data-dcnode-id="2610"><tr class="rowsep-1 valign-top" data-dcnode-id="2622"><td data-dcnode-id="2636" rowspan="2" scope="col"><span class="screen-reader-only" data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">Empty Cell</span></span></td><td data-dcnode-id="2633" rowspan="2" scope="col"><span class="screen-reader-only" data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Empty Cell</span></span></td><th data-dcnode-id="2631" rowspan="2" scope="col"><span data-dcnode-id="2632" instrument_node="">Age</span></th><th data-dcnode-id="2625" rowspan="2" scope="col"><span data-dcnode-id="2630" instrument_node="">Pseudo-</span><em data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">R</span></em><sup data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">2</span></sup></th><th colspan="3" data-dcnode-id="2623" scope="col"><span data-dcnode-id="2624" instrument_node="">Test for difference by age</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="2611"><th data-dcnode-id="2617" scope="col"><em data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">X</span></em><sup data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">2</span></sup></th><th data-dcnode-id="2615" scope="col"><span data-dcnode-id="2616" instrument_node="">D.F.</span></th><th data-dcnode-id="2612" scope="col"><em data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">N</span></em></th></tr></thead><tbody data-dcnode-id="2432"><tr class="valign-top" data-dcnode-id="2595"><td data-dcnode-id="2608" rowspan="4"><span data-dcnode-id="2609" instrument_node="">Old politics</span></td><td data-dcnode-id="2606" rowspan="2"><span data-dcnode-id="2607" instrument_node="">No trial</span></td><td data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">16–17</span></td><td class="align-char" data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">.09</span></td><td class="align-char" data-dcnode-id="2600" rowspan="2"><span dat dcnode-id="2445" rowspan="2"><span data-dcnode-id="2446" instrument_node="">12.07</span></td><td class="align-char" data-dcnode-id="2443" rowspan="2"><span data-dcnode-id="2444" instrument_node="">11</span></td><td class="align-char" data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">938</span></td></tr><tr class="valign-top" data-dcnode-id="2433"><td data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">18</span></td><td class="align-char" data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">.19</span></td><td class="align-char" data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">443</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="2414"></p><p data-dcnode-id="2425" id="tspara0045"><span data-dcnode-id="2429" instrument_node="">*</span><em data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">p</span></em><span data-dcnode-id="2426" instrument_node="">&nbsp;&lt;&nbsp;.05.</span></p><p data-dcnode-id="2420" id="tspara0050"><span data-dcnode-id="2424" instrument_node="">**</span><em data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">p</span></em><span data-dcnode-id="2421" instrument_node="">&nbsp;&lt;&nbsp;.01.</span></p><p data-dcnode-id="2415" id="tspara0055"><span data-dcnode-id="2419" instrument_node="">***</span><em data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">p</span></em><span data-dcnode-id="2416" instrument_node="">&nbsp;&lt;&nbsp;.001.</span></p><p></p><dl class="footnotes" data-dcnode-id="2405"><dt data-dcnode-id="2412" id="tbl3fna"><span data-dcnode-id="2413" instrument_node="">a</span></dt><dd data-dcnode-id="2406"><p data-dcnode-id="2407"><span data-dcnode-id="2411" instrument_node="">For question-wordings see </span><a class="workspace-trigger" data-dcnode-id="2409" href="#tbl1" name="btbl1"><span data-dcnode-id="2410" instrument_node="">Table 1</span></a><span data-dcnode-id="2408" instrument_node="">.</span></p></dd></dl></div></div><p data-dcnode-id="2398" id="p0375"><span data-dcnode-id="2402" instrument_node="">As you would expect for a “new left” party, the new politics issues reveal the strongest relationship between attitudes and voting. Contrary to my hypotheses, I find the largest psudo-R</span><sup data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">2</span></sup><span data-dcnode-id="2399" instrument_node=""> with respect to this attitude-model among 16- and 17-year olds. The chi-square test for the difference between the models, when applied to the two age-groups, is statistically significant outside of the trial municipalities. This leads to a significant difference in the combined model as well. The results indicate higher consistency between attitudes and voting among the youngest age group.</span></p><p data-dcnode-id="2396" id="p0380"><span data-dcnode-id="2397" instrument_node="">The old politics issues reveal an opposite pattern, one that is congruent with what I found in the analyses of attitudinal constraint: higher consistency among 18-year-olds than 16 and 17-year-olds, and no indications that this difference is evened out in the trial municipalities. However, these differences are not statistically significant. The analysis of Socialist Left Party voting is therefore somewhat inconclusive.</span></p><div data-dcnode-id="2133"><p data-dcnode-id="2386" id="p0385"><span data-dcnode-id="2395" instrument_node="">The same analysis with respect to the Labor Party vote is in </span><a class="workspace-trigger" data-dcnode-id="2393" href="#tbl4" name="btbl4"><span data-dcnode-id="2394" instrument_node="">Table 4</span></a><span data-dcnode-id="2392" instrument_node="">, and the results are even less conclusive. Clearly, the attitude questions used in this survey are not a good predictor of Labor Party vote among high school students. In most models 16- and 17-year olds have a higher level of consistency than 18-year-olds, but the levels of psudo-</span><em data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">R</span></em><sup data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">2</span></sup><span data-dcnode-id="2387" instrument_node=""> are small, and the differences between age-groups are not statistically significant. In the combined models, there appears to be no real differences between age-groups.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="2134" id="tbl4"><span class="captions" data-dcnode-id="2369"><span data-dcnode-id="2370"><p data-dcnode-id="2371" id="tspara0060"><span class="label" data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Table 4</span></span><span data-dcnode-id="2383" instrument_node="">. </span><span data-dcnode-id="2381" instrument_node="">Logit regressions in which support for the Labor Party is a function of issue-attitudes,</span><a class="workspace-trigger" data-dcnode-id="2378" href="#tbl4fna" name="btbl4fna"><sup data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">a</span></sup></a><span data-dcnode-id="2377" instrument_node=""> by age and participation in the voting age-trial. Pseudo </span><em data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">R</span></em><sup data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">2</span></sup><span data-dcnode-id="2372" instrument_node=""> and chi-squared tests for the differences in the models by age.</span></p></span></span><div class="groups" data-dcnode-id="2160"><table data-dcnode-id="2161"><thead data-dcnode-id="2340"><tr class="rowsep-1 valign-top" data-dcnode-id="2352"><td data-dcnode-id="2366" rowspan="2" scope="col"><span class="screen-reader-only" data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">Empty Cell</span></span></td><td data-dcnode-id="2363" rowspan="2" scope="col"><span class="screen-reader-only" data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_n nstrument_node="">Trial</span></td><td data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">16–17</span></td><td class="align-char" data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">.02</span></td><td class="align-char" data-dcnode-id="1689" rowspan="2"><span data-dcnode-id="1690" instrument_node="">5.08</span></td><td class="align-char" data-dcnode-id="1687" rowspan="2"><span data-dcnode-id="1688" instrument_node="">4</span></td><td class="align-char" data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">1203</span></td></tr><tr class="valign-top" data-dcnode-id="1677"><td data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">18</span></td><td class="align-char" data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">.02</span></td><td class="align-char" data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">522</span></td></tr><tr class="valign-top" data-dcnode-id="1674"><td colspan="7" data-dcnode-id="1675"><br data-dcnode-id="1676"></td></tr><tr class="valign-top" data-dcnode-id="1659"><td data-dcnode-id="1672" rowspan="4"><span data-dcnode-id="1673" instrument_node="">Combined model</span></td><td data-dcnode-id="1670" rowspan="2"><span data-dcnode-id="1671" instrument_node="">No trial</span></td><td data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">16–17</span></td><td class="align-char" data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">.22</span></td><td class="align-char" data-dcnode-id="1664" rowspan="2"><span data-dcnode-id="1665" instrument_node="">11.53</span></td><td class="align-char" data-dcnode-id="1662" rowspan="2"><span data-dcnode-id="1663" instrument_node="">11</span></td><td class="align-char" data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">9426</span></td></tr><tr class="valign-top" data-dcnode-id="1652"><td data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">18</span></td><td class="align-char" data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">.22</span></td><td class="align-char" data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">4920</span></td></tr><tr class="valign-top" data-dcnode-id="1639"><td data-dcnode-id="1650" rowspan="2"><span data-dcnode-id="1651" instrument_node="">Trial</span></td><td data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">16–17</span></td><td class="align-char" data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">.19</span></td><td class="align-char" data-dcnode-id="1644" rowspan="2"><span data-dcnode-id="1645" instrument_node="">16.69</span></td><td class="align-char" data-dcnode-id="1642" rowspan="2"><span data-dcnode-id="1643" instrument_node="">11</span></td><td class="align-char" data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">938</span></td></tr><tr class="valign-top" data-dcnode-id="1632"><td data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">18</span></td><td class="align-char" data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">.28</span></td><td class="align-char" data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">443</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="1613"></p><p data-dcnode-id="1624" id="tspara0105"><span data-dcnode-id="1628" instrument_node="">*</span><em data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">p</span></em><span data-dcnode-id="1625" instrument_node="">&nbsp;&lt;&nbsp;.05.</span></p><p data-dcnode-id="1619" id="tspara0110"><span data-dcnode-id="1623" instrument_node="">**</span><em data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">p</span></em><span data-dcnode-id="1620" instrument_node="">&nbsp;&lt;&nbsp;.01.</span></p><p data-dcnode-id="1614" id="tspara0115"><span data-dcnode-id="1618" instrument_node="">***</span><em data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">p</span></em><span data-dcnode-id="1615" instrument_node="">&nbsp;&lt;&nbsp;.001.</span></p><p></p><dl class="footnotes" data-dcnode-id="1604"><dt data-dcnode-id="1611" id="tbl6fna"><span data-dcnode-id="1612" instrument_node="">a</span></dt><dd data-dcnode-id="1605"><p data-dcnode-id="1606"><span data-dcnode-id="1610" instrument_node="">For question-wordings see </span><a class="workspace-trigger" data-dcnode-id="1608" href="#tbl1" name="btbl1"><span data-dcnode-id="1609" instrument_node="">Table 1</span></a><span data-dcnode-id="1607" instrument_node="">.</span></p></dd></dl></div></div><p data-dcnode-id="1592" id="p0415"><span data-dcnode-id="1601" instrument_node="">Of all the models of voting, Progress Party voting shows the best fit with the independent variables. The general pattern in </span><a class="workspace-trigger" data-dcnode-id="1599" href="#tbl6" name="btbl6"><span data-dcnode-id="1600" instrument_node="">Table 6</span></a><span data-dcnode-id="1598" instrument_node=""> is that there is greater consistency between attitudes and voting among 18-year-olds than among 16–17-year olds. In some models, there is no difference by age, but when there is a difference, 18-year-olds show greater consistency. Two of those differences in model-fit, both outside of the trial municipalities, are statistically significant. However, looking at actual psudo-</span><em data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">R</span></em><sup data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">2</span></sup><span data-dcnode-id="1593" instrument_node=""> levels, the age-differences appear to be larger within than outside of the voting age trial.</span></p><p data-dcnode-id="1590" id="p0420"><span data-dcnode-id="1591" instrument_node="">The results for the Progress Party vote, on the whole, are that 18-year-olds show greater consistency between attitudes and voting than 16- and 17-year-olds. The voting-age trial does not even out those differences.</span></p></section></section><section data-dcnode-id="1530" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="1582"><span data-dcnode-id="1587" instrument_node="">6</span><span data-dcnode-id="1585" instrument_node="">. </span><span data-dcnode-id="1583" instrument_node="">Conclusion</span></h2><p data-dcnode-id="1580" id="p0425"><span data-dcnode-id="1581" instrument_node="">The point of departure in this paper is the current European debate about voting age. There seems to be a movement, growing in strength, which advocates a change in the voting age from 18 to 16. But there is also strong resistance against such a change, both in the public and among politicians in European countries.</span></p><p data-dcnode-id="1575" id="p0430"><span data-dcnode-id="1579" instrument_node="">One key question in the voting-age-debate is whether 16- and 17-year-olds are mature enough to take part in elections. Research from the United Kingdom indicates that 16- and 17-year-olds are not as mature as those aged 18 and up (</span><a class="workspace-trigger" data-dcnode-id="1577" href="#bib6" name="bbib6"><span data-dcnode-id="1578" instrument_node="">Chan and Clayton, 2006</span></a><span data-dcnode-id="1576" instrument_node="">). Results from Austria, where the voting age was lowered to 16, indicate that there is no such gap in maturity by age. Therefore, the hypothesis in this paper is that voting rights affect the political maturity of 16- and 17-year-olds. I expect there to be a gap in maturity by age when the voting age remained at 18, but that the differences were evened out when the voting age was lowered to 16.</span></p><p data-dcnode-id="1561" id="p0435"><span data-dcnode-id="1574" instrument_node="">I use four indicators of political maturity. With respect to 1) </span><em data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">interest in politics</span></em><span data-dcnode-id="1571" instrument_node="">, I find that 18-year-olds are more interested in politics than younger high school students, both in the trial municipalities and elsewhere. Those at the age of 18 also have a greater sense of 2) </span><em data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">political efficacy</span></em><span data-dcnode-id="1568" instrument_node=""> than 16- and 17-year-olds. There is no evidence to indicate that the gap in political efficacy is smaller in the trial municipalities where the voting age was 16. Norwegian voters at 18 have greater 3) </span><em data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">attitudinal constraint</span></em><span data-dcnode-id="1565" instrument_node=""> than 16- and 17-year-olds, irrespective of whether the voting age is set at 18 or 16. And finally, the evidence with respect to 4) </span><em data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">consistency between attitudes and voting</span></em><span data-dcnode-id="1562" instrument_node=""> is somewhat more mixed, and depends on which party is studied. Still, the strongest evidence points in the same direction: that 18-year-olds show greater consistency than people at the age of 16 or 17, both in and outside of the trial municipalities.</span></p><p data-dcnode-id="1559" id="p0440"><span data-dcnode-id="1560" instrument_node="">Overall, the results show a consistent difference in political maturity between 16- and 17-year-olds on the one hand, and 18-year-olds on the other. As one would expect, the differences between these age-groups are not substantially large, but they are consistent across indicators. There are no indications that the differences by age are reduced or become smaller when the voting age is set at 16. The answer to the question in the title of this paper is therefore clearly, “no”. Voting rights does not affect the political maturity of 16- and 17-year-olds.</span></p><p data-dcnode-id="1554" id="p0445"><span data-dcnode-id="1558" instrument_node="">These findings are in line with those of </span><a class="workspace-trigger" data-dcnode-id="1556" href="#bib6" name="bbib6"><span data-dcnode-id="1557" instrument_node="">Chan and Clayton (2006)</span></a><span data-dcnode-id="1555" instrument_node="">, who argue against lowering the voting age. Their basic argument is that the franchise should not be extended to people who are, to a significant degree, less politically mature than those currently enjoying voting rights. If that argument is accepted, the voting age should not be lowered to 16.</span></p><p data-dcnode-id="1533" id="p0450"><span data-dcnode-id="1553" instrument_node="">Furthermore, the results in this paper appear to be at odds with recent results from Austria (</span><a class="workspace-trigger" data-dcnode-id="1551" href="#bib24" name="bbib24"><span data-dcnode-id="1552" instrument_node="">Wagner et&nbsp;al., 2012</span></a><span data-dcnode-id="1550" instrument_node="">). The differing findings may be a result of differences in the measures used to tap political maturity or “quality of vote choice” (</span><a class="workspace-trigger" data-dcnode-id="1548" href="#bib24" name="bbib24"><span data-dcnode-id="1549" instrument_node="">Wagner et&nbsp;al., 2012</span></a><span data-dcnode-id="1547" instrument_node="">). Also, one cannot exclude the possibility that the Austrian case differs from Norway in ways that impact on the results. Nevertheless, the data used by </span><a class="workspace-trigger" data-dcnode-id="1545" href="#bib24" name="bbib24"><span data-dcnode-id="1546" instrument_node="">Wagner et&nbsp;al. (2012)</span></a><span data-dcnode-id="1544" instrument_node=""> has a low </span><em data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">N</span></em><span data-dcnode-id="1541" instrument_node=""> for the key age-groups 16 to 17 and 18 to 21.</span><a class="workspace-trigger" data-dcnode-id="1538" href="#fn14" name="bfn14"><sup data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">14</span></sup></a><span data-dcnode-id="1537" instrument_node=""> On their measures of political interest and congruence between voting and attitudes, </span><a class="workspace-trigger" data-dcnode-id="1535" href="#bib24" name="bbib24"><span data-dcnode-id="1536" instrument_node="">Wagner et&nbsp;al. (2012)</span></a><span data-dcnode-id="1534" instrument_node=""> find non-significant differences between age-groups. These results are not inconsistent with the small significant differences between age-groups found in this paper, using a larger survey sample.</span></p><p data-dcnode-id="1531" id="p0455"><span data-dcnode-id="1532" instrument_node="">In conclusion, the results in this paper indicate that a lowering of the voting age would result in the incorporation of people in the electorate with lower levels of political maturity than those already enfranchised. Nevertheless I do not aim to provide a final answer to the question of whether the voting-age should be lowered. For some, the fact that 16- and 17-year-olds turned out to vote in high numbers is in itself an argument in favor of giving voting rights to this group. A key question for future research is whether the high turnout-rates for those given voting rights at 16 can be maintained as they grow older. Our Norwegian research-team aim to answer that question, by studying turnout and political engagement in future elections, among those that were given voting rights at 16 in the Norwegian local elections of 2011.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="1524"><button class="button button-anchor" data-dcnode-id="1525" type="button"><span class="button-text" data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="1523"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="466" id="cebi
