 </span><span data-dcnode-id="490" instrument_node="">, Cambridge</span><span data-dcnode-id="488" instrument_node=""> (</span><span data-dcnode-id="486" instrument_node="">1992</span><span data-dcnode-id="484" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="479"><span data-dcnode-id="482" instrument_node=""></span><a class="link" data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DThe%2520Nature%2520and%2520Origins%2520of%2520Mass%2520Opinion%26publication_year%3D1992%26author%3DJ.R.%2520Zaller" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="481" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="475"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="476" href="#bbib27" id="ref-id-bib27"><span data-dcnode-id="477" instrument_node="">Zeglovits and Schwarzer, 2009</span></a></dt><dd class="reference" data-dcnode-id="469"><span data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Zeglovits, E., Schwarzer, S., 2009. Lowering voting age in Austria – evaluation of accompanying campaigns for 16–18 year olds. In: Paper presented at 5th ECPR General Conference. Potsdam, September 12th–15th.</span></span><div class="ReferenceLinks u-font-sans" data-dcnode-id="470"><a class="link" data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DZeglovits%2C%2520E.%2C%2520Schwarzer%2C%2520S.%2C%25202009.%2520Lowering%2520voting%2520age%2520in%2520Austria%2520%2520evaluation%2520of%2520accompanying%2520campaigns%2520for%25201618%2520year%2520olds.%2520In%3A%2520Paper%2520presented%2520at%25205th%2520ECPR%2520General%2520Conference.%2520Potsdam%2C%2520September%252012th15th." rel="noopener noreferrer" target="_blank"><span data-dcnode-id="472" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="366" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="367"><div class="PageDivider" data-dcnode-id="465"></div><header data-dcnode-id="462" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Cited by (32)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="368"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="369"><ul data-dcnode-id="375"><li class="ListArticleItem" data-dcnode-id="444"><div class="sub-heading" data-dcnode-id="456"><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261379419302860" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="460" id="citing-articles-article0-title"><span data-dcnode-id="461" instrument_node="">Are 16-year-olds able to cast a congruent vote? Evidence from a “voting at 16” initiative in the city of Ghent (Belgium)</span></h3></a><div class="article-source ellipsis" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">2020, Electoral Studies</span></div></div><div class="buttons" data-dcnode-id="450"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="451" type="button"><span class="button-link-text" data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="452" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="453"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="445"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="446" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="447"><p data-dcnode-id="448" id="abspara0010"><span data-dcnode-id="449" instrument_node="">An often used argument against lowering the voting age to the age of 16 is that this age group would lack a sufficiently high level of “political maturity” and therefore would not be able to cast a vote that is in line with their political opinions. In this paper, we use a unique initiative set up by the city of Ghent (Belgium) to invite 16- and 17-year-olds to take part in a mock election to investigate whether adolescents are able to cast an ideologically congruent or “correct” vote. Our results do not show differences in proximity voting between adolescents and adult respondents. Furthermore, we find no evidence of socio-economic stratification in the extent to which adolescents cast a congruent vote. Our conclusion, therefore, is that this recurrent argument against lowering the voting age lacks empirical validity.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="420"><div class="sub-heading" data-dcnode-id="432"><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261379414000882" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="442" id="citing-articles-article1-title"><span data-dcnode-id="443" instrument_node="">The link between social attitudes and voting propensities: Attitude-vote consistency among adolescents in Belgium</span></h3></a><div class="article-source ellipsis" data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">2014, Electoral Studies</span></div><div class="CitedSection" data-dcnode-id="433"><div class="snippet" data-dcnode-id="434"><div class="cite-header" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">Taking into account their limited operationalization, they find no convincing evidence that voting decisions of sixteen-year-olds are less linked with their own preferences than voting decisions of eighteen-year-olds. A second study by Bergh (2013) found mixed evidence for attitude-vote consistency among adolescents. He found some significant differences in attitude-vote choice consistency between sixteen- and seventeen-year-olds when compared with older voters, but this was dependent on the party and the analyzed attitude.</span></p></div></div></div><div class="buttons" data-dcnode-id="426"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="427" type="button"><span class="button-link-text" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="428" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="429"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="421"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="422" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="423"><p data-dcnode-id="424" id="abspara0010"><span data-dcnode-id="425" instrument_node="">Research on the political development of adolescents is mainly focused on political engagement and attitudes. The more complex relationship between attitudes and voting behavior is less studied among citizens under the legal voting age. We investigate whether there is a link between social attitudes and voting propensities among Flemish adolescents, using data from the Parent–Child Socialization Study 2012. We observe attitude-vote consistency for three Flemish parties with a clear-cut ideological profile – the Green, radical rightist and Flemish Nationalist party. Findings show that adolescents' attitude-vote consistency is reinforced by their level of political sophistication. The correspondence between social attitudes and vote choice, however, is not impressive and significantly lower than among experienced adults, leaving room for other influential factors.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="409"><div class="sub-heading" data-dcnode-id="414"><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/psrm.2020.8" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="418" id="citing-articles-article2-title"><span data-dcnode-id="419" instrument_node="">Voting at 16: Does lowering the voting age lead to more political engagement? Evidence from a quasi-experiment in the city of Ghent (Belgium)</span></h3></a><div class="article-source ellipsis" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">2021, Political Science Research and Methods</span></div></div><div class="buttons" data-dcnode-id="413"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="410"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="411" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="412"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="398"><div class="sub-heading" data-dcnode-id="403"><a data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/S0007123417000515" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="407" id="citing-articles-article3-title"><span data-dcnode-id="408" instrument_node="">Rising to the Occasion? Youth Political Knowledge and the Voting Age</span></h3></a><div class="article-source ellipsis" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">2020, British Journal of Political Science</span></div></div><div class="buttons" data-dcnode-id="402"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="399"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="400" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="401"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="387"><div class="sub-heading" data-dcnode-id="392"><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/S0008423920000232" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="396" id="citing-articles-article4-title"><span data-dcnode-id="397" instrument_node="">Lowering the Voting Age to 16? A Comparative Study on the Political Competence and Engagement of Underage and Adult Youth</span></h3></a><div class="article-source ellipsis" data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">2020, Canadian Journal of Political Science</span></div></div><div class="buttons" data-dcnode-id="391"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="388"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="389" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="390"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="376"><div class="sub-heading" data-dcnode-id="381"><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/S0003055418000059" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="385" id="citing-articles-article5-title"><span data-dcnode-id="386" instrument_node="">Trickle-up political socialization: The causal effect on turnout of parenting a newly enfranchised voter</span></h3></a><div class="article-source ellipsis" data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">2018, American Political Science Review</span></div></div><div class="buttons" data-dcnode-id="380"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="377"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="378" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="379"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84875368737%26md5%3Dcb248b47f16e76cd85a1ad15ba92371c" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="373" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="374"></path></svg><span class="button-alternative-text" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="243"><dl class="footnote" data-dcnode-id="358"><dt class="footnote-label" data-dcnode-id="362"><sup data-dcnode-id="363"><a data-dcnode-id="364" href="#bfn1"><span data-dcnode-id="365" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="359"><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">This research is conducted as part of an evaluation of the 2011 Norwegian voting age trial, financed by the Ministry of Local Government and Regional Development. The paper was presented at the National Norwegian Political Science Conference in January 2012. I would like to thank the workshop participants as well as the anonymous reviewers for their helpful comments.</span></p></dd></dl><dl class="footnote" data-dcnode-id="350"><dt class="footnote-label" data-dcnode-id="354"><sup data-dcnode-id="355"><a data-dcnode-id="356" href="#bfn2"><span data-dcnode-id="357" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="351"><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">In addition, some states in Germany and Switzerland have a voting age of 16 for local elections. 16-year-olds can vote in Slovenia, Bosnia, Serbia and Montenegro, if they are employed.</span></p></dd></dl><dl class="footnote" data-dcnode-id="342"><dt class="footnote-label" data-dcnode-id="346"><sup data-dcnode-id="347"><a data-dcnode-id="348" href="#bfn3"><span data-dcnode-id="349" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="343"><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">A nationally representative Norwegian survey from 2011 found that only 21 percent of the electorate favored a lowering of the voting age to 16; 69 percent opposed such a change. Even a plurality of 16- and 17-year-olds in the survey of high school students used in this paper opposes a voting age of 16.</span></p></dd></dl><dl class="footnote" data-dcnode-id="334"><dt class="footnote-label" data-dcnode-id="338"><sup data-dcnode-id="339"><a data-dcnode-id="340" href="#bfn4"><span data-dcnode-id="341" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="335"><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">The 20 municipalities were: Ålesund, Austevoll, Gjesdal, Grimstad, Hamar, Hammerfest, Kautokeino, Kåfjord, Luster, Lørenskog, Mandal, Marker, Namdalseid, Osen, Porsgrunn, Re, Sigdal, Stavanger, Tysfjord, and Vågå.</span></p></dd></dl><dl class="footnote" data-dcnode-id="326"><dt class="footnote-label" data-dcnode-id="330"><sup data-dcnode-id="331"><a data-dcnode-id="332" href="#bfn5"><span data-dcnode-id="333" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="327"><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">“Most people at my age are more knowledgeable about politics than I am” (Likert-scale).</span></p></dd></dl><dl class="footnote" data-dcnode-id="318"><dt class="footnote-label" data-dcnode-id="322"><sup data-dcnode-id="323"><a data-dcnode-id="324" href="#bfn6"><span data-dcnode-id="325" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="319"><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">“Politics is so complicated that ordinary people are unable to comprehend what it is about” (Likert-scale).</span></p></dd></dl><dl class="footnote" data-dcnode-id="310"><dt class="footnote-label" data-dcnode-id="314"><sup data-dcnode-id="315"><a data-dcnode-id="316" href="#bfn7"><span data-dcnode-id="317" instrument_node="">7</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="311"><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">I include the following three survey-questions (Likert-scales): 1) “It is more important expand public services than to lower taxes” 2) “government has a unique responsibility to assist people who cannot take care of themselves, no matter what the cause of their problems is” 3) “in order to encourage the drive of the individual, we should accept larger differences in wages”.</span></p></dd></dl><dl class="footnote" data-dcnode-id="302"><dt class="footnote-label" data-dcnode-id="306"><sup data-dcnode-id="307"><a data-dcnode-id="308" href="#bfn8"><span data-dcnode-id="309" instrument_node="">8</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="303"><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">I include the following three survey-questions (Likert-scales): 1) “We should limit the use of privately owned cars and expand the use of public transportation” 2) “to secure economic growth, we need continued expansion of industry, even if this is in conflict with environmental interests” 3) “immigration is a serious threat to our national character” 4) “the Norwegian voting-age should be lowered from 18 to 16”.</span></p></dd></dl><dl class="footnote" data-dcnode-id="294"><dt class="footnote-label" data-dcnode-id="298"><sup data-dcnode-id="299"><a data-dcnode-id="300" href="#bfn9"><span data-dcnode-id="301" instrument_node="">9</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="295"><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Includes the following three questions: “Imagine that the government suspected that a terrorist attack was imminent. Do you think the government should have the right to…” 1) “keep people in custody indefinitely without holding a trial?” 2) “tapping people's phones?” 3) “randomly stopping and searching people on the street”. The response-alternatives are: 1. Should definitely have the right (to do so) 2. should probably have the right 3. Should probably not have the right and 4. Should definitely not have the right.</span></p></dd></dl><dl class="footnote" data-dcnode-id="286"><dt class="footnote-label" data-dcnode-id="290"><sup data-dcnode-id="291"><a data-dcnode-id="292" href="#bfn10"><span data-dcnode-id="293" instrument_node="">10</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="287"><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Parliamentary and local elections in Norway are each held every four years, with an interval of two years between local and parliamentary elections. The voting age trial analyzed in this paper was carried out in the local election of 2011.</span></p></dd></dl><dl class="footnote" data-dcnode-id="278"><dt class="footnote-label" data-dcnode-id="282"><sup data-dcnode-id="283"><a data-dcnode-id="284" href="#bfn11"><span data-dcnode-id="285" instrument_node="">11</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="279"><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">In the voting age trial, this criterion was changed so that a voter had to turn 16 by the end of the election year.</span></p></dd></dl><dl class="footnote" data-dcnode-id="268"><dt class="footnote-label" data-dcnode-id="274"><sup data-dcnode-id="275"><a data-dcnode-id="276" href="#bfn12"><span data-dcnode-id="277" instrument_node="">12</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="269"><p data-dcnode-id="270"><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssb.no/english/subjects/04/02/30/vgu_en/tab-2011-12-14-01-en.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="273" instrument_node="">http://www.ssb.no/english/subjects/04/02/30/vgu_en/tab-2011-12-14-01-en.html</span></a><span data-dcnode-id="271" instrument_node=""> (downloaded on April 17, 2012).</span></p></dd></dl><dl class="footnote" data-dcnode-id="258"><dt class="footnote-label" data-dcnode-id="264"><sup data-dcnode-id="265"><a data-dcnode-id="266" href="#bfn13"><span data-dcnode-id="267" instrument_node="">13</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="259"><p data-dcnode-id="260"><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssb.no/english/subjects/04/02/30/vgu_en/tab-2011-12-14-05-en.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="263" instrument_node="">http://www.ssb.no/english/subjects/04/02/30/vgu_en/tab-2011-12-14-05-en.html</span></a><span data-dcnode-id="261" instrument_node=""> (downloaded on April 17, 2012).</span></p></dd></dl><dl class="footnote" data-dcnode-id="244"><dt class="footnote-label" data-dcnode-id="254"><sup data-dcnode-id="255"><a data-dcnode-id="256" href="#bfn14"><span data-dcnode-id="257" instrument_node="">14</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="245"><p data-dcnode-id="246"><span data-dcnode-id="253" instrument_node="">The </span><em data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">N</span></em><span data-dcnode-id="250" instrument_node=""> is 50 for 16–17-year-olds, and 92 for 18–21-year-olds. The data was downloaded from </span><a data-dcnode-id="248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//methods.univie.ac.at/data/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="249" instrument_node="">http://methods.univie.ac.at/data/</span></a><span data-dcnode-id="247" instrument_node="">on April 16 2012.</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0261379412001333"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Copyright © 2012 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h
