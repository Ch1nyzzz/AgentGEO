</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id4&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id5&quot;><p id=&quot;abspara0010&quot;>A key question in an ongoing debate about voting age is whether people below the age of 18 are politically mature enough to take part in elections. Previous research indicate that 16- and 17-year-olds are not as mature as other voters when the voting age is at 18 (<a name=&quot;bbib6&quot; href=&quot;#bib6&quot; class=&quot;workspace-trigger&quot;>Chan and Clayton, 2006</a>), but that such age-differences are evened out when 16-year olds are given the right to vote (<a name=&quot;bbib24&quot; href=&quot;#bib24&quot; class=&quot;workspace-trigger&quot;>Wagner et&nbsp;al., 2012</a>).</p><p id=&quot;abspara0015&quot;>This paper tests that hypothesis by utilizing data from a Norwegian trial in which the voting age was lowered from 18 to 16 in some municipalities. The results are that there is a significant gap in maturity between 16- and 17- year olds and older voters. There is no evidence to indicate that adolescent maturity levels go up when the voting age is lowered.</p></div></div></div>" data-dcnode-id="4530" lang="en" name="citation_abstract"><span data-dcnode-id="4529" instrument_node="">

ks" data-dcnode-id="4080" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="4083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.electstud.2012.11.001" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="4084" instrument_node="">https://doi.org/10.1016/j.electstud.2012.11.001</span></a><a class="rights-and-content" data-dcnode-id="4081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0261379412001333%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4082" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="4079"></section><section class="ReferencedArticles" data-dcnode-id="4078"></section><div class="PageDivider" data-dcnode-id="4077"></div><div class="Abstracts u-font-serif" data-dcnode-id="4056" id="abstracts"><div class="abstract author" data-dcnode-id="4063" id="aep-abstract-id4" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">Abstract</span></h2><div data-dcnode-id="4064" id="aep-abstract-sec-id5"><p data-dcnode-id="4067" id="abspara0010"><span data-dcnode-id="4074" instrument_node="">A key question in an ongoing debate about voting age is whether people below the age of 18 are politically mature enough to take part in elections. Previous research indicate that 16- and 17-year-olds are not as mature as other voters when the voting age is at 18 (</span><a class="workspace-trigger" data-dcnode-id="4072" href="#bib6" name="bbib6"><span data-dcnode-id="4073" instrument_node="">Chan and Clayton, 2006</span></a><span data-dcnode-id="4071" instrument_node="">), but that such age-differences are evened out when 16-year olds are given the right to vote (</span><a class="workspace-trigger" data-dcnode-id="4069" href="#bib24" name="bbib24"><span data-dcnode-id="4070" instrument_node="">Wagner et&nbsp;al., 2012</span></a><span data-dcnode-id="4068" instrument_node="">).</span></p><p data-dcnode-id="4065" id="abspara0015"><span data-dcnode-id="4066" instrument_node="">This paper tests that hypothesis by utilizing data from a Norwegian trial in which the voting age was lowered from 18 to 16 in some municipalities. The results are that there is a significant gap in maturity between 16- and 17- year olds and older voters. There is no evidence to indicate that adolescent maturity levels go up when the voting age is lowered.</span></p></div></div><div class="abstract graphical" data-dcnode-id="4057" id="aep-abstract-id6"><div data-dcnode-id="4058" id="aep-abstract-sec-id7"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">Highlights</span></h3><p data-dcnode-id="4059" id="abspara0020"><span data-dcnode-id="4060" instrument_node="">► The paper uses data from a trial when the voting age was lowered to 16. ► 16- and 17-year-olds have lower levels of political maturity than 18-year-olds. ► This age-difference remains after the lowering of the voting age to 16. ► Voting rights do not affect the political maturity of adolescents.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="4033" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="4045"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261379412001345"><svg class="icon icon-navigate-left" data-dcnode-id="4054" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="4055"></path></svg><span class="button-alternative-text" data-dcnode-id="4047"><strong data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="4050"><span data-dcnode-id="4051" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="4034"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S026137941200131X"><span class="button-alternative-text" data-dcnode-id="4038"><strong data-dcnode-id="4043"><span data-dcnode-id="4044" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4039"><span data-dcnode-id="4040" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="4036" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="4037"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="4020"><div class="keywords-section" data-dcnode-id="4021" id="aep-keywords-id8"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="4028"><span data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">Voting age</span></span></div><div class="keyword" data-dcnode-id="4025"><span data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">Political maturity</span></span></div><div class="keyword" data-dcnode-id="4022"><span data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">Political participation</span></span></div></div></div><span data-dcnode-id="4019" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="1528" id="body"><div data-dcnode-id="1529"><section data-dcnode-id="3960" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4010"><span data-dcnode-id="4018" instrument_node="">1</span><span data-dcnode-id="4016" instrument_node="">. </span><span data-dcnode-id="4014" instrument_node="">Introduction</span><a class="workspace-trigger" data-dcnode-id="4011" href="#fn1" name="bfn1"><sup data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">1</span></sup></a></h2><p data-dcnode-id="4004" id="p0010"><span data-dcnode-id="4009" instrument_node="">In recent years, voting age has again become an issue for public debate in European countries. The standard voting age in Europe, and most of the democratic world, remains at 18. However, support of a lowering of the voting age to 16 seems to have grown. Austria is so far the only European country to lower the voting age for all political elections,</span><a class="workspace-trigger" data-dcnode-id="4006" href="#fn2" name="bfn2"><sup data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">2</span></sup></a><span data-dcnode-id="4005" instrument_node=""> and this has spurred on a debate about the appropriate voting age in other countries.</span></p><p data-dcnode-id="3984" id="p0015"><span data-dcnode-id="4003" instrument_node="">The voting-age-debate revolves around a number of issues, such as the possible effect of a lowering of the voting age on election turnout, on political representation and on political discourse. A number of legal, constitutional and normative arguments can also be frequently heard (</span><a class="workspace-trigger" data-dcnode-id="4001" href="#bib10" name="bbib10"><span data-dcnode-id="4002" instrument_node="">Electoral Commission, 2004</span></a><span data-dcnode-id="4000" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3998" href="#bib20" name="bbib20"><span data-dcnode-id="3999" instrument_node="">Milner, 2010</span></a><span data-dcnode-id="3997" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3995" href="#bib21" name="bbib21"><span data-dcnode-id="3996" instrument_node="">Ødegård and Aars, 2011</span></a><span data-dcnode-id="3994" instrument_node="">). A key question, nonetheless, is the issue of political maturity. Those in favor of a lowering of the voting age hold that today's youth are well informed and are able to make reasonable political decisions, and should therefore be given the right to vote (</span><a class="workspace-trigger" data-dcnode-id="3992" href="#bib14" name="bbib14"><span data-dcnode-id="3993" instrument_node="">Hart and Atkins, 2011</span></a><span data-dcnode-id="3991" instrument_node="">). Those who oppose a change in the voting age argue that 16- and 17-year-olds are not politically mature enough to be given voting rights (</span><a class="workspace-trigger" data-dcnode-id="3989" href="#bib6" name="bbib6"><span data-dcnode-id="3990" instrument_node="">Chan and Clayton, 2006</span></a><span data-dcnode-id="3988" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3986" href="#bib10" name="bbib10"><span data-dcnode-id="3987" instrument_node="">Electoral Commission, 2004</span></a><span data-dcnode-id="3985" instrument_node="">).</span></p><p data-dcnode-id="3979" id="p0020"><span data-dcnode-id="3983" instrument_node="">Previous research shows conflicting evidence with regard to the political maturity of 16- and 17-year olds. </span><a class="workspace-trigger" data-dcnode-id="3981" href="#bib6" name="bbib6"><span data-dcnode-id="3982" instrument_node="">Chan and Clayton (2006)</span></a><span data-dcnode-id="3980" instrument_node="">, who use data from the United Kingdom, find that this age group is significantly less mature than those aged 18 or more. Thus they argue that the voting age should not be lowered.</span></p><p data-dcnode-id="3971" id="p0025"><span data-dcnode-id="3978" instrument_node="">Recent research from Austria, looking at enfranchised 16- and 17-year-olds, finds that adolescents at this age have increased their level of political maturity to the point that they are as mature as older voters (</span><a class="workspace-trigger" data-dcnode-id="3976" href="#bib27" name="bbib27"><span data-dcnode-id="3977" instrument_node="">Zeglovits and Schwarzer, 2009</span></a><span data-dcnode-id="3975" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3973" href="#bib24" name="bbib24"><span data-dcnode-id="3974" instrument_node="">Wagner et&nbsp;al., 2012</span></a><span data-dcnode-id="3972" instrument_node="">). A reasonable hypothesis, given the conflicting results in Austria and the UK, is that voting rights affect the political maturity of 16- and 17-year-olds. Perhaps this age group becomes more interested in politics, develops more thoughtful political positions, and generally becomes more politically mature, when given voting rights.</span></p><p data-dcnode-id="3969" id="p0030"><span data-dcnode-id="3970" instrument_node="">I test that hypothesis in this paper by looking at a trial in the Norwegian local elections of 2011, in which the voting age was lowered to 16 in a select group of municipalities. The trial provides an opportunity to compare the maturity levels of 16- and 17-year-olds to those of older voters, both when the voting age is 18, and when it has been lowered to&nbsp;16.</span></p><p data-dcnode-id="3967" id="p0035"><span data-dcnode-id="3968" instrument_node="">I get the toughest test of the hypothesis by comparing 18-year-olds to 16- and 17-year-olds. Since political maturity is related to age, you would expect those aged 18 to have the lowest level of maturity in the electorate. Such a comparison therefore sets a high bar for finding differences between currently enfranchised voters, and those aged 16 or 17.</span></p><p data-dcnode-id="3965" id="p0040"><span data-dcnode-id="3966" instrument_node="">Employing a survey conducted among Norwegian high school students (aged 16 through 18); I use four indicators of political maturity: 1) interest in politics, 2) political efficacy, 3) attitudinal constraint and 4) consistency between attitudes and (hypothetical) vote choice. Through these measures, I compare maturity levels among the age group 16–17 with those who are 18, both in the municipalities where the trial was conducted and in the rest of the country.</span></p><p data-dcnode-id="3963" id="p0045"><span data-dcnode-id="3964" instrument_node="">I expect to find that 18-year-olds are significantly more mature than younger high school students as long as the voting age remains at 18, and that the difference in maturity is reduced when the voting changes to 16.</span></p><p data-dcnode-id="3961" id="p0050"><span data-dcnode-id="3962" instrument_node="">This paper continues with a look at previous research regarding political maturity. I then briefly describe the Norwegian voting age trial, before discussing my measures of political maturity, as well as other methodological issues. After presenting the results, I discuss the implications of my findings for the voting-age-debate.</span></p></section><section data-dcnode-id="3857" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3954"><span data-dcnode-id="3959" instrument_node="">2</span><span data-dcnode-id="3957" instrument_node="">. </span><span data-dcnode-id="3955" instrument_node="">Political maturity and the voting-age-debate</span></h2><p data-dcnode-id="3937" id="p0055"><span data-dcnode-id="3953" instrument_node="">The public and academic debate about voting age in western societies deals with several empirical and normative issues. Those in favor of changing the voting age to 16 may argue that such a change will have a positive effect on election turnout in the long run, because people then get into the habit of voting at an early stage in life (</span><a class="workspace-trigger" data-dcnode-id="3951" href="#bib10" name="bbib10"><span data-dcnode-id="3952" instrument_node="">Electoral Commission, 2004</span></a><span data-dcnode-id="3950" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3948" href="#bib12" name="bbib12"><span data-dcnode-id="3949" instrument_node="">Franklin, 2004</span></a><span data-dcnode-id="3947" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3945" href="#bib15" name="bbib15"><span data-dcnode-id="3946" instrument_node="">Kozeluh and Nitsch, 2006</span></a><span data-dcnode-id="3944" instrument_node="">). Others claim that 16- and 17-year olds have approximately the same skills and level of maturity as 18-year-olds; hence the voting age should be lowered (</span><a class="workspace-trigger" data-dcnode-id="3942" href="#bib14" name="bbib14"><span data-dcnode-id="3943" instrument_node="">Hart and Atkins, 2011</span></a><span data-dcnode-id="3941" instrument_node="">). From a normative perspective some argue that young people deserve a greater say in political decisions that concern them (</span><a class="workspace-trigger" data-dcnode-id="3939" href="#bib10" name="bbib10"><span data-dcnode-id="3940" instrument_node="">Electoral Commission, 2004</span></a><span data-dcnode-id="3938" instrument_node="">).</span></p><p data-dcnode-id="3917" id="p0060"><span data-dcnode-id="3936" instrument_node="">The arguments in favor of keeping the most common current voting age of 18 involve some of the same issues. An oft-heard argument is that people in western societies get a number of other rights and responsibilities when they turn 18. The age of 18 is customarily and legally considered the age at which one becomes an adult (</span><a class="workspace-trigger" data-dcnode-id="3934" href="#bib10" name="bbib10"><span data-dcnode-id="3935" instrument_node="">Electoral Commission, 2004</span></a><span data-dcnode-id="3933" instrument_node="">). A voting age of 18 therefore fits with established custom, with other minimum age-limits, and the age of majority in most countries. Some also argue that there is a real difference in political maturity between those at age 18, and younger adolescents (</span><a class="workspace-trigger" data-dcnode-id="3931" href="#bib6" name="bbib6"><span data-dcnode-id="3932" instrument_node="">Chan and Clayton, 2006</span></a><span data-dcnode-id="3930" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3928" href="#bib10" name="bbib10"><span data-dcnode-id="3929" instrument_node="">Electoral Commission, 2004</span></a><span data-dcnode-id="3927" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3925" href="#bib17" name="bbib17"><span data-dcnode-id="3926" instrument_node="">Lauglo, 2011</span></a><span data-dcnode-id="3924" instrument_node="">). In terms of election turnout, one could reasonably contend that enfranchising more young people will have a detrimental effect on turnout, given that young people in general are less likely to vote than the older parts of the electorate. Finally, public opinion generally seems to be set against an expansion of the franchise to 16-year-olds (</span><a class="workspace-trigger" data-dcnode-id="3922" href="#bib10" name="bbib10"><span data-dcnode-id="3923" instrument_node="">Electoral Commission, 2004</span></a><span data-dcnode-id="3921" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="3918" href="#fn3" name="bfn3"><sup data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">3</span></sup></a></p><p data-dcnode-id="3909" id="p0065"><span data-dcnode-id="3916" instrument_node="">The question of whether the voting age should be lowered to 16 is in other words not one that can be determined by a single factor, or by testing a single empirical question. Nevertheless, the degree to which 16- and 17-year-olds are politically mature is perhaps the central issue in this debate (</span><a class="workspace-trigger" data-dcnode-id="3914" href="#bib6" name="bbib6"><span data-dcnode-id="3915" instrument_node="">Chan and Clayton, 2006</span></a><span data-dcnode-id="3913" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3911" href="#bib24" name="bbib24"><span data-dcnode-id="3912" instrument_node="">Wagner et&nbsp;al., 2012</span></a><span data-dcnode-id="3910" instrument_node="">). Political maturity is also an issue that can be studied empirically, and has thus been the subject of research.</span></p><p data-dcnode-id="3902" id="p0070"><a class="workspace-trigger" data-dcnode-id="3907" href="#bib6" name="bbib6"><span data-dcnode-id="3908" instrument_node="">Chan and Clayton (2006)</span></a><span data-dcnode-id="3906" instrument_node=""> look at the issue of political maturity in some detail, in an article that in part is a response to the </span><a class="workspace-trigger" data-dcnode-id="3904" href="#bib10" name="bbib10"><span data-dcnode-id="3905" instrument_node="">UK Electoral Commission's report (2004)</span></a><span data-dcnode-id="3903" instrument_node="">. Their indicators of political maturity are interest and engagement in politics, political knowledge, as well as consistency and stability in political attitudes. They find that 16- and 17-year olds, who do not have the right to vote in the UK, have a lower score than older voters on all these indicators. Those aged 16 and 17 are less interested and engaged in politics, they have lower levels of political knowledge, and their attitudes are not as consistent or stable as those of older voters. Based on these findings, Chan and Clayton conclude that the voting age in the UK should remain at 18.</span></p><p data-dcnode-id="3879" id="p0075"><span data-dcnode-id="3901" instrument_node="">After Austria reduced its voting age to 16 in 2007, a number of studies have looked at the newly enfranchised young voters in that country (see e.g. </span><a class="workspace-trigger" data-dcnode-id="3899" href="#bib15" name="bbib15"><span data-dcnode-id="3900" instrument_node="">Kozeluh and Nitsch, 2006</span></a><span data-dcnode-id="3898" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3896" href="#bib11" name="bbib11"><span data-dcnode-id="3897" instrument_node="">Filzmaier and Klepp, 2009</span></a><span data-dcnode-id="3895" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3893" href="#bib23" name="bbib23"><span data-dcnode-id="3894" instrument_node="">Perlot and Zandonella, 2009</span></a><span data-dcnode-id="3892" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3890" href="#bib27" name="bbib27"><span data-dcnode-id="3891" instrument_node="">Zeglovits and Schwarzer, 2009</span></a><span data-dcnode-id="3889" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3887" href="#bib24" name="bbib24"><span data-dcnode-id="3888" instrument_node="">Wagner et&nbsp;al., 2012</span></a><span data-dcnode-id="3886" instrument_node="">). The general lesson to draw from these studies seems to be that 16- and 17-year-olds are well equipped to take part in the election. Turnout is relatively high, but more importantly the “quality of vote choice” (</span><a class="workspace-trigger" data-dcnode-id="3884" href="#bib24" name="bbib24"><span data-dcnode-id="3885" instrument_node="">Wagner et&nbsp;al., 2012</span></a><span data-dcnode-id="3883" instrument_node="">) among adolescents is on par with other age-groups. “Quality” is measured by political interest, engagement, political trust, knowledge and congruence between attitudes and vote choice. These are similar to </span><a class="workspace-trigger" data-dcnode-id="3881" href="#bib6" name="bbib6"><span data-dcnode-id="3882" instrument_node="">Chan and Clayton's (2006)</span></a><span data-dcnode-id="3880" instrument_node=""> measures of political maturity.</span></p><p data-dcnode-id="3871" id="p0080"><span data-dcnode-id="3878" instrument_node="">Apparently, the gap in political maturity between adolescents and older voters that exists in the UK cannot be found in Austria. A possible reason for the differing results is the difference in voting age between the two countries. When 16- and 17-year-olds received the right to vote in Austria, they also got an incentive to become interested, engaged and informed about politics. </span><a class="workspace-trigger" data-dcnode-id="3876" href="#bib27" name="bbib27"><span data-dcnode-id="3877" instrument_node="">Zeglovits and Schwarzer (2009)</span></a><span data-dcnode-id="3875" instrument_node=""> find that political maturity among 16- and 17-year-olds went up after the change in voting age. It seems, then, that voting rights affect the political maturity of 16- and 17-year-olds. When given voting rights, this group will be as politically mature as older voters. If this is the case, it neutralizes </span><a class="workspace-trigger" data-dcnode-id="3873" href="#bib6" name="bbib6"><span data-dcnode-id="3874" instrument_node="">Chan and Clayton's (2006)</span></a><span data-dcnode-id="3872" instrument_node=""> arguments against lowering the voting age. One could hypothesize that if the voting age in the UK was lowered to 16, the result would be an increase in political maturity among the young. I am not able to test that hypothesis in a UK setting, but the Norwegian 2011 voting age trial provides an opportunity to test whether voting age has an effect on political maturity.</span></p><p data-dcnode-id="3863" id="p0085"><span data-dcnode-id="3870" instrument_node="">While research into this topic is limited, there are some examples of similar studies from countries outside of Austria and the UK. </span><a class="workspace-trigger" data-dcnode-id="3868" href="#bib14" name="bbib14"><span data-dcnode-id="3869" instrument_node="">Hart and Atkins (2011)</span></a><span data-dcnode-id="3867" instrument_node=""> look at what they call the “quality of citizenship” among young people in the United States. They study the extent to which citizenship ideals with respect to membership, concern for rights and participation in society are met in different age-groups. On indicators of civic knowledge, tolerance, political skill, political efficacy, civic interest and community service, they find no substantial differences between 16- and 17-year-olds on the one hand, and 18-year-olds on the other. The current US voting age of 18 is therefore arbitrary, in the view of </span><a class="workspace-trigger" data-dcnode-id="3865" href="#bib14" name="bbib14"><span data-dcnode-id="3866" instrument_node="">Hart and Atkins (2011)</span></a><span data-dcnode-id="3864" instrument_node="">, and should be lowered to 16.</span></p><p data-dcnode-id="3858" id="p0090"><span data-dcnode-id="3862" instrument_node="">Finally, in an analysis of Norwegian survey-data of young people aged 13 to 18 from 2002, </span><a class="workspace-trigger" data-dcnode-id="3860" href="#bib17" name="bbib17"><span data-dcnode-id="3861" instrument_node="">Lauglo (2011)</span></a><span data-dcnode-id="3859" instrument_node=""> finds linear relationships between various indicators of political maturity and age. 18-year-olds score consistently higher on measures such as political interest, efficacy, engagement and willingness to express political preferences. Based on these findings he expresses skepticism toward a lowering of the voting age in Norway.</span></p></section><section data-dcnode-id="3819" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3851"><span data-dcnode-id="3856" instrument_node="">3</span><span data-dcnode-id="3854" instrument_node="">. </span><span data-dcnode-id="3852" instrument_node="">The 2011 Norwegian voting age trial</span></h2><p data-dcnode-id="3846" id="p0095"><span data-dcnode-id="3850" instrument_node="">In 2008, the Norwegian government decided that a trial would be held in some municipalities in the election of 2011, in which the voting age would be lowered to 16. This decision came after some years of debate regarding the quality, and possible decline, of Norwegian local democracy. The main reason for concern seems to have been the decline in turnout in Norwegian local elections, but this prompted a broader debate about the role of local government and citizen participation (</span><a class="workspace-trigger" data-dcnode-id="3848" href="#bib5" name="bbib5"><span data-dcnode-id="3849" instrument_node="">Bjørklund, 2005</span></a><span data-dcnode-id="3847" instrument_node="">). The government's stated reason for holding the trial was to find out if voting rights would increase political consciousness and engagement among adolescents.</span></p><p data-dcnode-id="3840" id="p0100"><span data-dcnode-id="3845" instrument_node="">All of Norway's 430 municipalities could apply for participation in the trial, and 143 did so. Out of these, 20 municipalities</span><a class="workspace-trigger" data-dcnode-id="3842" href="#fn4" name="bfn4"><sup data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">4</span></sup></a><span data-dcnode-id="3841" instrument_node=""> and the local council of Longyearbyen in arctic Svalbard where selected as participants. There were various criteria for selecting municipalities for the trial. The government aimed for the greatest possible variation in terms of size, geography, location in the country, political composition of the municipal councils, as well as age-composition of the population. The ministry in charge of the trial also looked for municipalities that had actively tried to get its youth involved in local society in various ways.</span></p><p data-dcnode-id="3838" id="p0105"><span data-dcnode-id="3839" instrument_node="">While the selected municipalities are, for most analytical purposes, a good sample of Norway's municipalities, they do deviate from the rest of the country by having pursued an active youth policy. Such policies may have had an effect on the political maturity of youth in these municipalities. The analyses in this paper will therefore not look at differences in maturity levels between the trial municipalities and the rest of the country. My focus is on differences in political maturity by age (between 16- and 17-year-olds on the one hand, and 18-year-olds on the other), and whether such differences are reduced when the voting age is lowered to 16.</span></p><p data-dcnode-id="3830" id="p0110"><span data-dcnode-id="3837" instrument_node="">The election was held on September 12, 2011, less than two months after the July 22 terrorist attacks in Oslo and the island of Utøya. The terrorist attacks may have affected political participation and interest among young people in Norway (</span><a class="workspace-trigger" data-dcnode-id="3835" href="#bib3" name="bbib3"><span data-dcnode-id="3836" instrument_node="">Bergh and Ødegård, 2013</span></a><span data-dcnode-id="3834" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3832" href="#bib25" name="bbib25"><span data-dcnode-id="3833" instrument_node="">Wollebæk et&nbsp;al., 2012</span></a><span data-dcnode-id="3831" instrument_node="">). There is no reason to believe that this effect was stronger in the trial municipalities than in the rest of the country. Therefore, it seems unlikely that the results in this paper could be influenced by these tragic events in advance of the election.</span></p><p data-dcnode-id="3828" id="p0115"><span data-dcnode-id="3829" instrument_node="">Local elections in Norway include both county-council elections and elections for municipal councils. 16- and 17-year-olds were only allowed to vote in the municipal elections, i.e. the most local of the two elections. Turnout among the newly enfranchised adolescents were 58 percent for all the trial municipalities as a whole, which is somewhat lower than the overall turnout-level of 63 percent in these municipalities. However, compared to the turnout-rate for first-time-voters, 58 percent is remarkably high. First-time-voters (aged 18–21) turned out to vote at a rate of 46 percent, both in the&nbsp;country as a whole and in the trial municipalities.</span></p><p data-dcnode-id="3820" id="p0120"><span data-dcnode-id="3827" instrument_node="">The high turnout-rate among 16- and 17-year-olds was generally seen as an indication that the trial has successful at getting young people engaged in politics (</span><a class="workspace-trigger" data-dcnode-id="3825" href="#bib3" name="bbib3"><span data-dcnode-id="3826" instrument_node="">Bergh and Ødegård, 2013</span></a><span data-dcnode-id="3824" instrument_node="">). It is unclear, however, if the high turnout was a reflection of true engagement, or if young people were mobilized by the novelty of the trial. What is clear is that turnout varied substantially between municipalities, probably due to varying efforts made by local officials to get young people to the polls (Saglie and </span><a class="workspace-trigger" data-dcnode-id="3822" href="#bib22" name="bbib22"><span data-dcnode-id="3823" instrument_node="">Ødegård and Saglie, in press</span></a><span data-dcnode-id="3821" instrument_node="">). In any case, the fact that 16- and 17-year-olds voted in high numbers does make it especially relevant to ask if these voters were mature enough, and had the right skills to make a reasonable voting-decision.</span></p></section><section data-dcnode-id="3167" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3813"><span data-dcnode-id="3818" instrument_node="">4</span><span data-dcnode-id="3816" instrument_node="">. </span><span data-dcnode-id="3814" instrument_node="">Measuring political maturity</span></h2><p data-dcnode-id="3811" id="p0125"><span data-dcnode-id="3812" instrument_node="">To uncover what effect the trial may have had on the political maturity of adolescents, I need empirical measures of political maturity. The studies cited above look at political maturity as a series of qualities or traits that a person may need when engaging in politics. Maturity in this sense is not a matter of physiological or emotional development. Rather, political maturity is a question of whether a person has a set of qualities or tools that are useful when getting involved in politics. The most frequently used measures of political maturity are political interest, knowledge of politics, political efficacy, consistency in political attitudes, and consistency between attitudes and voting.</span></p><p data-dcnode-id="3809" id="p0130"><span data-dcnode-id="3810" instrument_node="">Since the standard measures of political knowledge deal with national politics and tap knowledge that is not very useful for a voter in a local election, such questions were not included in the survey-data used in this study. Political knowledge questions are therefore not available for the young voters under study in this paper. I do, however, employ the other four measures to tap political maturity: 1) interest in politics, 2) political efficacy, 3) attitudinal consistency or “constraint” and 4) consistency between attitudes and vote choice.</span></p><section data-dcnode-id="3795" id="sec4.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3803"><span data-dcnode-id="3808" instrument_node="">4.1</span><span data-dcnode-id="3806" instrument_node="">. </span><span data-dcnode-id="3804" instrument_node="">Political interest</span></h3><p data-dcnode-id="3798" id="p0135"><span data-dcnode-id="3802" instrument_node="">A person's interest in politics can be measured by a single, simple question: “How interested are you in politics?” Some have argued that this question is unsuited for measuring political interest among the young, because they are less likely than adults to describe their interest or engagement as “political” (</span><a class="workspace-trigger" data-dcnode-id="3800" href="#bib18" name="bbib18"><span data-dcnode-id="3801" instrument_node="">Liden and Ødegård, 2002</span></a><span data-dcnode-id="3799" instrument_node="">). This may be a problem when comparing youth to adults, but should be less of a problem when comparing within the age group 16 through 18 in this paper.</span></p><p data-dcnode-id="3796" id="p0140"><span data-dcnode-id="3797" instrument_node="">I compare responses to the political interest question among 16- and 17-year-olds on the one hand, and 18-year-olds on the other, both in the trial municipalities, and in the rest of the country. The key tests are, first, is there a difference by age in the non-trial parts of the country, and second, does that difference disappear in the trial municipalities?</span></p></section><section data-dcnode-id="3764" id="sec4.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3789"><span data-dcnode-id="3794" instrument_node="">4.2</span><span data-dcnode-id="3792" instrument_node="">. </span><span data-dcnode-id="3790" instrument_node="">Political efficacy</span></h3><p data-dcnode-id="3775" id="p0145"><span data-dcnode-id="3788" instrument_node="">Political efficacy is the degree to which a person feels that he or she is competent and able to influence or take part in politics (</span><a class="workspace-trigger" data-dcnode-id="3786" href="#bib13" name="bbib13"><span data-dcnode-id="3787" instrument_node="">Gamson, 1968</span></a><span data-dcnode-id="3785" instrument_node="">). A person's evaluation of his or her own competence in this respect is usually referred to as “internal efficacy” (</span><a class="workspace-trigger" data-dcnode-id="3783" href="#bib4" name="bbib4"><span data-dcnode-id="3784" instrument_node="">Beaumont, 2011</span></a><span data-dcnode-id="3782" instrument_node="">). External efficacy is the degree to which a person believes that people in general are competent and able to take part in politics (</span><a class="workspace-trigger" data-dcnode-id="3780" href="#bib16" name="bbib16"><span data-dcnode-id="3781" instrument_node="">Lane, 1959</span></a><span data-dcnode-id="3779" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3777" href="#bib19" name="bbib19"><span data-dcnode-id="3778" instrument_node="">Listhaug 1989</span></a><span data-dcnode-id="3776" instrument_node="">). I presume that politically mature people express high levels of efficacy.</span></p><p data-dcnode-id="3765" id="p0150"><span data-dcnode-id="3774" instrument_node="">I use one question to tap internal efficacy,</span><a class="workspace-trigger" data-dcnode-id="3771" href="#fn5" name="bfn5"><sup data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">5</span></sup></a><span data-dcnode-id="3770" instrument_node=""> and another to measure external efficacy</span><a class="workspace-trigger" data-dcnode-id="3767" href="#fn6" name="bfn6"><sup data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">6</span></sup></a><span data-dcnode-id="3766" instrument_node=""> among the young in the analyses.</span></p></section><section data-dcnode-id="3434" id="sec4.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3758"><span data-dcnode-id="3763" instrument_node="">4.3</span><span data-dcnode-id="3761" instrument_node="">. </span><span data-dcnode-id="3759" instrument_node="">Attitudinal constraint</span></h3><p data-dcnode-id="3745" id="p0155"><a class="workspace-trigger" data-dcnode-id="3756" href="#bib8" name="bbib8"><span data-dcnode-id="3757" instrument_node="">Converse (1964)</span></a><span data-dcnode-id="3755" instrument_node=""> is often credited with the idea that the attitudes of politically sophisticated voters are more “constrained” than those of less sophisticated voters (</span><a class="workspace-trigger" data-dcnode-id="3753" href="#bib26" name="bbib26"><span data-dcnode-id="3754" instrument_node="">Zaller, 1992</span></a><span data-dcnode-id="3752" instrument_node="">). People who are knowledgeable of politics, politically sophisticated or politically mature, will be constrained in their attitude-formation by previously held attitudes (</span><a class="workspace-trigger" data-dcnode-id="3750" href="#bib2" name="bbib2"><span data-dcnode-id="3751" instrument_node="">Baldassarri and Gelman, 2008</span></a><span data-dcnode-id="3749" instrument_node="">). The source of constraint may to some extent be pure logics: “One cannot believe that government expenditures should be increased, that government revenues should be decreased, and that a more favorable balance of the budget should be achieved all at the same time” (</span><a class="workspace-trigger" data-dcnode-id="3747" href="#bib8" name="bbib8"><span data-dcnode-id="3748" instrument_node="">Converse, 1964</span></a><span data-dcnode-id="3746" instrument_node="">, p. 209).</span></p><p data-dcnode-id="3740" id="p0160"><span data-dcnode-id="3744" instrument_node="">Still, the main source of constraint is probably social (or political) norms regarding linkages between different types of attitudes. Politically sophisticated voters are more receptive of such norms, and of cues from political elites, and this leads to higher levels of constraint (</span><a class="workspace-trigger" data-dcnode-id="3742" href="#bib26" name="bbib26"><span data-dcnode-id="3743" instrument_node="">Zaller, 1992</span></a><span data-dcnode-id="3741" instrument_node="">).</span></p><p data-dcnode-id="3726" id="p0165"><span data-dcnode-id="3739" instrument_node="">In this study, I look at attitudinal constraint with respect to three categories of political attitude questions. I refer to the first two as “old politics” and “new politics”. Old politics refers to the dispute between left and right in economic policy, and with regard to the distribution of wealth in society.</span><a class="workspace-trigger" data-dcnode-id="3736" href="#fn7" name="bfn7"><sup data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">7</span></sup></a><span data-dcnode-id="3735" instrument_node=""> New politics includes a variety of issues that have come up in recent decades, after the establishment of the party systems in Western Europe. For instance: environmental protection, immigration and a debate over youth involvement in politics.</span><a class="workspace-trigger" data-dcnode-id="3732" href="#fn8" name="bfn8"><sup data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">8</span></sup></a><span data-dcnode-id="3731" instrument_node=""> I further use a separate battery of questions regarding “law and order/terrorism”</span><a class="workspace-trigger" data-dcnode-id="3728" href="#fn9" name="bfn9"><sup data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">9</span></sup></a><span data-dcnode-id="3727" instrument_node=""> as a third category.</span></p><p data-dcnode-id="3724" id="p0170"><span data-dcnode-id="3725" instrument_node="">Constraint is measured as correlations between items within each of these categories. My hypothesis is that correlations will be higher among 18-year-olds than among those aged 16 or 17, as long as the voting age remains at 18. I expect correlations to be about equal between age-groups when the voting age is lowered to 16.</span></p><p data-dcnode-id="3722" id="p0175"><span data-dcnode-id="3723" instrument_node="">People whose attitudes are coherent should also express a political ideology which is in line with those attitudes. The left–right self-placement scale is an abstract measure of ideological position. There should be a stronger relationship between issue-attitudes and ideological self-placement among politically mature people, than among those that are less politically mature. As a second measure of constraint, I therefore look at the relationship between the same batteries of issues on the one hand, and the left–right self-placement scale on the other. Using OLS regression analysis, I look for differences between age-groups in the degree to which these attitudes can explain self-placement on the left–right scale.</span></p><p data-dcnode-id="3720" id="p0180"><span data-dcnode-id="3721" instrument_node="">For those who are not part of the voting age trial, I expect to find higher levels of explained variance among 18-year-olds than among younger high school students. Such differences may not be present among those taking part in the voting age trial.</span></p><p data-dcnode-id="3452" id="p0185"><span data-dcnode-id="3719" instrument_node="">Explained variance is measured by </span><em data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">R</span></em><span data-dcnode-id="3716" instrument_node="">-squared. I use the Chow-test (</span><a class="workspace-trigger" data-dcnode-id="3714" href="#bib7" name="bbib7"><span data-dcnode-id="3715" instrument_node="">Chow, 1960</span></a><span data-dcnode-id="3713" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="3711" href="#bib9" name="bbib9"><span data-dcnode-id="3712" instrument_node="">DeMaris, 2004</span></a><span data-dcnode-id="3710" instrument_node="">) to determine if there are significant differences between the model when applied to 18-year-olds on the one hand, and 16- and 17-year-olds on the other. The Chow-test compares the residual sum of squares in a combined model (RSS</span><sub data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">c</span></sub><span data-dcnode-id="3707" instrument_node="">) that includes both groups, with those for each group analyzed separately (RSS</span><sub data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">16–17</span></sub><span data-dcnode-id="3704" instrument_node=""> and RSS</span><sub data-dcnode-id="3702"><span data-dcnode-id="3703" instrument_node="">18</span></sub><span data-dcnode-id="3701" instrument_node="">). The test-statistic has the following form (</span><em data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">p</span></em><span data-dcnode-id="3698" instrument_node=""> is the number of parameters and </span><em data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">n</span></em><span data-dcnode-id="3695" instrument_node=""> is the </span><em data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">N</span></em><span data-dcnode-id="3692" instrument_node=""> in the combined model):</span><span class="display" data-dcnode-id="3453"><span class="formula" data-dcnode-id="3454" id="ufd1"><span class="math" data-dcnode-id="3455"><span class="MathJax_Preview" data-dcnode-id="3691" style=""></span><span class="MathJax_SVG" data-dcnode-id="3458" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>F</mi><mo is=&quot;true&quot;>=</mo><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><mrow is=&quot;true&quot;><mo is=&quot;true&quot;>[</mo><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mtext is=&quot;true&quot;>RSS</mtext></mrow><mtext is=&quot;true&quot;>c</mtext></msub><mo is=&quot;true&quot;>&amp;#x2212;</mo><mrow is=&quot;true&quot;><mo is=&quot;true&quot;>(</mo><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mtext is=&quot;true&quot;>RSS</mtext></mrow><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>16</mn><mo is=&quot;true&quot;>&amp;#x2212;</mo><mn is=&quot;true&quot;>17</mn></mrow></msub><mo is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mtext is=&quot;true&quot;>RSS</mtext></mrow><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>18</mn></mrow></msub></mrow><mo is=&quot;true&quot;>)</mo></mrow></mrow><mo is=&quot;true&quot;>]</mo></mrow></mrow><mi is=&quot;true&quot;>p</mi></mfrac></mrow><mrow is=&quot;true&quot;><mfrac is=&quot;true&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mtext is=&quot;true&quot;>RSS</mtext></mrow><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>16</mn><mo is=&quot;true&quot;>&amp;#x2212;</mo><mn is=&quot;true&quot;>17</mn></mrow></msub><mo is=&quot;true&quot;>+</mo><msub is=&quot;true&quot;><mrow is=&quot;true&quot;><mtext is=&quot;true&quot;>RSS</mtext></mrow><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>18</mn></mrow></msub></mrow><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>n</mi><mo is=&quot;true&quot;>&amp;#x2212;</mo><mn is=&quot;true&quot;>2</mn><mi is=&quot;true&quot;>p</mi></mrow></mfrac></mrow></mfrac></mrow></math>" id="MathJax-Element-1-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="3544" focusable="false" height="7.249ex" role="img" style="vertical-align: -3.072ex;" viewBox="0 -1798.2 9495.3 3120.9" width="22.054ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="3545" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="3546" is="true"><g data-dcnode-id="3688" is="true"><use data-dcnode-id="3689" href="#MJMATHI-46"><path d="M48 1Q31 1 31 11Q31 13 34 25Q38 41 42 43T65 46Q92 46 125 49Q139 52 144 61Q146 66 215 342T285 622Q285 629 281 629Q273 632 228 634H197Q191 640 191 642T193 659Q197 676 203 680H742Q749 676 749 669Q749 664 736 557T722 447Q720 440 702 440H690Q683 445 683 453Q683 454 686 477T689 530Q689 560 682 579T663 610T626 626T575 633T503 634H480Q398 633 393 631Q388 629 386 623Q385 622 352 492L320 363H375Q378 363 398 363T426 364T448 367T472 374T489 386Q502 398 511 419T524 457T529 475Q532 480 548 480H560Q567 475 567 470Q567 467 536 339T502 207Q500 200 482 200H470Q463 206 463 212Q463 215 468 234 rument_node="">−</span></mo><mn data-dcnode-id="3519" is="true"><span data-dcnode-id="3520" instrument_node="">17</span></mn></mrow></msub><mo data-dcnode-id="3515" is="true"><span data-dcnode-id="3516" instrument_node="">+</span></mo><msub data-dcnode-id="3508" is="true"><mrow data-dcnode-id="3512" is="true"><mtext data-dcnode-id="3513" is="true"><span data-dcnode-id="3514" instrument_node="">RSS</span></mtext></mrow><mrow data-dcnode-id="3509" is="true"><mn data-dcnode-id="3510" is="true"><span data-dcnode-id="3511" instrument_node="">18</span></mn></mrow></msub></mrow><mo data-dcnode-id="3505" is="true"><span data-dcnode-id="3506" instrument_node="">)</span></mo></mrow></mrow><mo data-dcnode-id="3501" is="true"><span data-dcnode-id="3502" instrument_node="">]</span></mo></mrow></mrow><mi data-dcnode-id="3497" is="true"><span data-dcnode-id="3498" instrument_node="">p</span></mi></mfrac></mrow><mrow data-dcnode-id="3463" is="true"><mfrac data-dcnode-id="3464" is="true"><mrow data-dcnode-id="3474" is="true"><msub data-dcnode-id="3484" is="true"><mrow data-dcnode-id="3492" is="true"><mtext data-dcnode-id="3493" is="true"><span data-dcnode-id="3494" instrument_node="">RSS</span></mtext></mrow><mrow data-dcnode-id="3485" is="true"><mn data-dcnode-id="3490" is="true"><span data-dcnode-id="3491" instrument_node="">16</span></mn><mo data-dcnode-id="3488" is="true"><span data-dcnode-id="3489" instrument_node="">−</span></mo><mn data-dcnode-id="3486" is="true"><span data-dcnode-id="3487" instrument_node="">17</span></mn></mrow></msub><mo data-dcnode-id="3482" is="true"><span data-dcnode-id="3483" instrument_node="">+</span></mo><msub data-dcnode-id="3475" is="true"><mrow data-dcnode-id="3479" is="true"><mtext data-dcnode-id="3480" is="true"><span data-dcnode-id="3481" instrument_node="">RSS</span></mtext></mrow><mrow data-dcnode-id="3476" is="true"><mn data-dcnode-id="3477" is="true"><span data-dcnode-id="3478" instrument_node="">18</span></mn></mrow></msub></mrow><mrow data-dcnode-id="3465" is="true"><mi data-dcnode-id="3472" is="true"><span data-dcnode-id="3473" instrument_node="">n</span></mi><mo data-dcnode-id="3470" is="true"><span data-dcnode-id="3471" instrument_node="">−</span></mo><mn data-dcnode-id="3468" is="true"><span data-dcnode-id="3469" instrument_node="">2</span></mn><mi data-dcnode-id="3466" is="true"><span data-dcnode-id="3467" instrument_node="">p</span></mi></mrow></mfrac></mrow></mfrac></mrow></math></span></span></span></span></span></p><p data-dcnode-id="3435" id="p0190"><span data-dcnode-id="3451" instrument_node="">This statistic has the </span><em data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">F</span></em><span data-dcnode-id="3448" instrument_node="">-distribution with </span><em data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">p</span></em><span data-dcnode-id="3445" instrument_node=""> and </span><em data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">n</span></em><span data-dcnode-id="3442" instrument_node="">&nbsp;−2</span><em data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">p</span></em><span data-dcnode-id="3439" instrument_node=""> degrees of freedom, and performs a test in which the null-hypothesis is that there are no differences between the models. If my hypotheses are confirmed, I will find significant differences between the models (with the highest </span><em data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">R</span></em><span data-dcnode-id="3436" instrument_node="">-squared for 18-year-olds) in the parts of the country where there is no trial, but no significant differences in the trial municipalities.</span></p></section><section data-dcnode-id="3205" id="sec4.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3428"><span data-dcnode-id="3433" instrument_node="">4.4</span><span data-dcnode-id="3431" instrument_node="">. </span><span data-dcnode-id="3429" instrument_node="">Consistency between attitudes and vote choice</span></h3><p data-dcnode-id="3423" id="p0195"><span data-dcnode-id="3427" instrument_node="">The final indicator of political maturity is a measure of the relationship between vote choice and political attitudes. There should be a strong linkage between political attitudes and vote choice among politically mature voters (</span><a class="workspace-trigger" data-dcnode-id="3425" href="#bib24" name="bbib24"><span data-dcnode-id="3426" instrument_node="">Wagner et&nbsp;al., 2012</span></a><span data-dcnode-id="3424" instrument_node="">).</span></p><p data-dcnode-id="3421" id="p0200"><span data-dcnode-id="3422" instrument_node="">In order to assess consistency between attitudes and vote choice, I use the same battery of attitude questions as independent variables, and look at their effect on vote choice. A problem with that approach is that 16- and 17-year-olds who are not part of the voting age trial do not have the right to vote in the election. The respondents in my data do, however, take part in a mock-election that is carried out in Norwegian high schools in advance of every election in the country. I therefore have a measure of vote choice among adolescents without actual voting rights.</span></p><p data-dcnode-id="3419" id="p0205"><span data-dcnode-id="3420" instrument_node="">A possible solution, then, to use voting in the mock-election as the dependent variable for 16- and 17-year-olds without voting rights, and voting in the actual election as the dependent variable for those with voting rights. As it turns out, students who can vote in both the mock-election and in the real election tend to (state that they) vote for the same party; 85 percent did so in the survey-data. In order to avoid any methodological effects of using different dependent variables in different subgroups, I opt for using voting in the mock-election as the dependent variable in all groups.</span></p><p data-dcnode-id="3414" id="p0210"><span data-dcnode-id="3418" instrument_node="">I analyze voting for two left-of-center parties, The Socialist Left Party and the Labor Party, and two right-of-center parties, the Conservative Party and the Progress Party. Using logistic regression analysis, I look for differences in model-fit between age-groups. I generally expect higher pseudo </span><em data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">R</span></em><span data-dcnode-id="3415" instrument_node="">-squared levels among 18-year-olds than among 16- and 17-year-olds that are not part of the trial. For those that are part of the trial, I hypothesize smaller or no such age-differences.</span></p><p data-dcnode-id="3223" id="p0215"><span data-dcnode-id="3413" instrument_node="">I use the method outlined in </span><a class="workspace-trigger" data-dcnode-id="3411" href="#bib1" name="bbib1"><span data-dcnode-id="3412" instrument_node="">Allison (1999)</span></a><span data-dcnode-id="3410" instrument_node=""> to assess whether there are significant differences between the models by age. This Chow-test analog for logistic regression (</span><a class="workspace-trigger" data-dcnode-id="3408" href="#bib9" name="bbib9"><span data-dcnode-id="3409" instrument_node="">DeMaris, 2004</span></a><span data-dcnode-id="3407" instrument_node="">) has the following test-statistic:</span><span class="display" data-dcnode-id="3224"><span class="formula" data-dcnode-id="3225" id="ufd2"><span class="math" data-dcnode-id="3226"><span class="MathJax_Preview" data-dcnode-id="3406" style=""></span><span class="MathJax_SVG" data-dcnode-id="3229" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><msup is=&quot;true&quot;><mi is=&quot;true&quot;>X</mi><mn is=&quot;true&quot;>2</mn></msup><mo is=&quot;true&quot;>=</mo><mo is=&quot;true&quot;>&amp;#x2212;</mo><mn is=&quot;true&quot;>2</mn><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mi is=&quot;true&quot;>ln</mi><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><msub is=&quot;true&quot;><mi is=&quot;true&quot;>L</mi><mtext is=&quot;true&quot;>c</mtext></msub><mo is=&quot;true&quot;>&amp;#x2212;</mo><mrow is=&quot;true&quot;><mo is=&quot;true&quot;>[</mo><mrow is=&quot;true&quot;><mo is=&quot;true&quot;>&amp;#x2212;</mo><mn is=&quot;true&quot;>2</mn><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mi is=&quot;true&quot;>ln</mi><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><msub is=&quot;true&quot;><mi is=&quot;true&quot;>L</mi><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>16</mn><mo is=&quot;true&quot;>&amp;#x2212;</mo><mn is=&quot;true&quot;>17</mn></mrow></msub><mo is=&quot;true&quot;>+</mo><mo is=&quot;true&quot;>(</mo><mo is=&quot;true&quot;>&amp;#x2212;</mo><mn is=&quot;true&quot;>2</mn><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><mi is=&quot;true&quot;>ln</mi><mspace width=&quot;0.25em&quot; is=&quot;true&quot; /><msub is=&quot;true&quot;><mi is=&quot;true&quot;>L</mi><mrow is=&quot;true&quot;><mn is=&quot;true&quot;>18</mn></mrow></msub><mo is=&quot;true&quot;>)</mo></mrow><mo is=&quot;true&quot;>]</mo></mrow></mrow></math>" id="MathJax-Element-2-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="3299" focusable="false" height="2.831ex" role="img" style="vertical-align: -0.741ex;" viewBox="0 -900.1 20604.3 1219.1" width="47.855ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="3300" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="3301" is="true"><g data-dcnode-id="3399" is="true"><g data-dcnode-id="3403" is="true"><use data-dcnode-id="3404" href="#MJMATHI-58"><path d="M42 0H40Q26 0 26 11Q26 15 29 27Q33 41 36 43T55 46Q141 49 190 98Q200 108 306 224T411 342Q302 620 297 625Q288 636 234 637H206Q200 643 200 645T202 664Q206 677 212 683H226Q260 681 347 681Q380 681 408 681T453
