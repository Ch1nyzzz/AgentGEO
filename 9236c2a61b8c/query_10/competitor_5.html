</span><p data-dcnode-id="681"><em data-dcnode-id="682"><span data-dcnode-id="686" instrument_node="">Interested in this topic?&nbsp;</span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//org.salsalabs.com/o/2495/p/salsa/web/common/public/signup%3Fsignup_page_KEY%3D5995" target="_blank"><span data-dcnode-id="685" instrument_node="">Sign up</span></a><span data-dcnode-id="683" instrument_node="">&nbsp;to receive our newsletter&nbsp;and other updates on elections and electoral reform.</span></em></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Brazilians flocked to the polls on October 5 to vote for their next president. Yet, after all the votes were counted, no one was elected. &nbsp;In fact, there will be no new president-elect until after a second round runoff vote, which will occur on October 26th.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="676" instrument_node="">The incumbent,</span><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dilma.com.br/"><span data-dcnode-id="675" instrument_node="">&nbsp;Dilma Rousseff</span></a><span data-dcnode-id="673" instrument_node="">, gained 42% of the national vote in the first round election, well short of the 50% required to win. In second place, with 34% of the vote, was</span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-latin-america-29509998"><span data-dcnode-id="672" instrument_node="">&nbsp;Aecio Neves</span></a><span data-dcnode-id="670" instrument_node="">. &nbsp;Immediately after the election, opinion polls had shown Neves trailing Rousseff, the</span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-latin-america-11446466"><span data-dcnode-id="669" instrument_node="">&nbsp;protege</span></a><span data-dcnode-id="667" instrument_node="">&nbsp;of the extremely popular former President Luiz Inácio Lula da Silva, by a large margin. However, the third place candidate, Marina Silva’s</span><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-latin-america-29590608"><span data-dcnode-id="666" instrument_node="">&nbsp;backing of Neves</span></a><span data-dcnode-id="664" instrument_node="">&nbsp;has changed all that. Silva won 21% of the vote, and it seems many of Silva’s supporters have gravitated toward Neves.&nbsp;</span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economist.com/blogs/americasview/2014/10/brazils-presidential-election"><span data-dcnode-id="663" instrument_node="">Polls are now neck and neck</span></a><span data-dcnode-id="661" instrument_node="">.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="658" instrument_node="">Runoff elections double the expense of holding elections. They also tend to&nbsp;</span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//archive.fairvote.org/%3Fpage%3D1946"><span data-dcnode-id="657" instrument_node="">return</span></a><span data-dcnode-id="655" instrument_node="">&nbsp;the plurality winner from the first round, making the expense of a second election seem unnecessary. In the United States, FairVote advocates for the use of</span><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairvote.org/reforms/instant-runoff-voting/"><span data-dcnode-id="654" instrument_node="">&nbsp;Ranked Choice Voting</span></a><span data-dcnode-id="652" instrument_node="">&nbsp;(RCV) as a better -- and cheaper -- method of ensuring voters get a meaningful say in elections, eliminating&nbsp;</span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairvote.org/reforms/instant-runoff-voting/irv-and-the-status-quo/spoiler-effect/"><span data-dcnode-id="651" instrument_node="">the spoiler effect</span></a><span data-dcnode-id="649" instrument_node="">&nbsp;and maximizing the likelihood that winning candidates have majority support.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="646" instrument_node="">The Brazilian election is interesting for another reason: millions of Brazilian 16 and 17-year-olds, from Sao Paulo to the Amazon, turned out to vote. These young voters make up&nbsp;</span><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//journals.sub.uni-hamburg.de/giga/jpla/article/view/23/23"><span data-dcnode-id="645" instrument_node="">2.3% of the Brazilian electorate on average</span></a><span data-dcnode-id="643" instrument_node="">, even though, unlike Brazilians aged between 18 and 69, they are not legally required to vote.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="640" instrument_node="">Brazil is one of an increasing number of countries that allow citizens in this age group to vote. As part of a recent movement, Austria, Nicaragua, Argentina, some states in Germany and a canton in Switzerland have all lowered their voting age to 16. Indonesia and South Sudan are among the ranks of several countries that allow 17-year-olds to vote.&nbsp;</span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairvote.org/is-no-the-status-quo-the-scottish-vote-on-independence"><span data-dcnode-id="639" instrument_node="">The 2014 Scottish referendum</span></a><span data-dcnode-id="637" instrument_node="">&nbsp;was fascinating, not only because of its salience for British and world politics, but also because 16 year-old lads and lasses had the right to vote for the first time anywhere in the British Isles. The United Kingdom, intact,&nbsp;</span><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uk.news.yahoo.com/cameron-rules-reducing-voting-age-160601994.html%235vrkaLX"><span data-dcnode-id="636" instrument_node="">continues to consider</span></a><span data-dcnode-id="634" instrument_node="">&nbsp;lowering the voting age. Norway</span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0261379412001333"><span data-dcnode-id="633" instrument_node="">&nbsp;experimented</span></a><span data-dcnode-id="631" instrument_node="">&nbsp;with a lowered voting age in 2011 and several American states (including California, Florida and Alaska) have considered bills to lower the voting age in recent years.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="628" instrument_node="">Studies from a</span><a data-dcnode-id="626" href="#.Utf5oxCwLYg"><span data-dcnode-id="627" instrument_node="">&nbsp;municipal election in the United States</span></a><span data-dcnode-id="625" instrument_node="">, as well as national elections in</span><a data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.promoteourvote.com/uploads/9/2/2/7/9227685/leaving_the_nest_and_the_social_act_of_voting.pdf"><span data-dcnode-id="624" instrument_node="">&nbsp;Denmark</span></a><span data-dcnode-id="622" instrument_node="">&nbsp;and</span><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.timmale.com/uploads/2/9/2/2/2922364/results_voting_at_16_handout.pdf"><span data-dcnode-id="621" instrument_node="">&nbsp;Austria</span></a><span data-dcnode-id="619" instrument_node="">, have shown that 16- and 17-year-olds are avid political participants and that voting at 16 and 17 is habit-forming. Socialized into a culture of participation early on, 16- and 17-year-old voters may age into more politically active older people than those who do not vote for the first time until they are 18 on 19. &nbsp;An&nbsp;</span><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ann.sagepub.com/content/633/1/201.full.pdf"><span data-dcnode-id="618" instrument_node="">American study</span></a><span data-dcnode-id="616" instrument_node="">&nbsp;found that 16- and 17 year olds have similar levels of political knowledge and competencies as young people aged between 18 and 30 years.</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">While it is not clear yet who will be next Brazilian President, it is increasingly apparent that lowering the voting age to 16 will remain a widely debated and advocated reform in the next decade. &nbsp;</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">&nbsp;</span></p><span data-dcnode-id="608" instrument_node="">
