</span><span data-dcnode-id="878" instrument_node=""> </span><p data-dcnode-id="871"><span class="dropcap" data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">N</span></span><span data-dcnode-id="875" instrument_node="">ew Yorkers were headed to the polls Tuesday to cast votes in a Democratic primary that’s all but certain to determine the identity of the next mayor of the nation’s largest city. The turnout should be up from </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/projects/elections/2013/nyc-primary/mayor/map.html" rel="noopener" target="_blank"><span data-dcnode-id="874" instrument_node="">2013</span></a><span data-dcnode-id="872" instrument_node="">, when less than 24 percent of eligible voters cast ballots in the city’s last vigorously contested Democratic mayoral primary. But the safe bet is that most eligible voters won’t participate in what is widely seen as a definitional contest for the future of not just of New York but urban centers nationwide, as they wrestle with issues of equity, policing, housing affordability, and post-pandemic renewal. </span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">What can be done to boost public engagement with local elections? One of the best suggestions, from scholars and activists, is to get young people hooked on the habit of voting early on. And the best way to do that is by lowering the voting age to 16.
</span></p><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">In the few localities where the voting age has been lowered, teenagers have proven to be more reliable voters than adults.</span></p><div data-dcnode-id="865" id="ConnatixPlaceholder"></div><span data-dcnode-id="864" instrument_node="">
</span><blockquote data-dcnode-id="861"><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Young people make good voters. When the voting age has been lowered to 16, young people have shown our interest in voting. In 2013, when Takoma Park, Maryland, lowered its voting age to 16, registered voters under 18 had a turnout rate four times higher than voters over 18. And again in Hyattsville, Maryland (the second place in the U.S. to lower the voting age to 16), registered 16- and 17-year-old voters had a higher turnout out rate than older voters,</span></p></blockquote><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="856"><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youthrights.org/issues/voting-age/top-ten-reasons-to-lower-the-voting-age/" rel="noopener" target="_blank"><span data-dcnode-id="859" instrument_node="">notes</span></a><span data-dcnode-id="857" instrument_node=""> the National Youth Rights Association. “Similar trends have occurred outside the United States. Voters aged 16 to 17 had a higher turnout rate than older voters under age 30 in Norway’s 2011 elections, voters under 35 in Scotland’s 2014 referendum election, and voters aged 18-20 in Austria’s elections in 2011 and 2014.”
</span></p><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">When they grow older, these reliable voters keep voting,
</span></p><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">“Voting is a habitual act—people who vote in one election are more likely to vote in the next,” explains the youth rights association.</span></p><div class="inline-counter" data-dcnode-id="851"></div><span data-dcnode-id="850" instrument_node="">
</span><blockquote data-dcnode-id="790"><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Lowering the voting age will establish new voters when people are less likely to be moving as a result of attending college or leaving their families. People under 18 tend to have stronger roots in their community, often having lived in the same area for many years and established connections to their school, family and friends, and other community groups. This gives us an awareness and appreciation of local issues. As we are less likely to live away from home, we don’t have to deal with unclear residency laws or absentee ballots that can discourage college students or other new voters. Because of the habitual nature of voting, encouraging new voters at a younger age will increase voter turnout as the population gets older. </span></p><aside class="left indent indents related-newarticle author-modules" data-dcnode-id="792" data-nosnippet=""><span data-dcnode-id="847" instrument_node="">
</span><div class="author-img" data-dcnode-id="842"><span data-dcnode-id="846" instrument_node="">
</span><a class="no-target-blank imgHover" data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenation.com/authors/john-nichols/"><img alt="" data-dcnode-id="845" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenation.com/cdn-cgi/image/width%3D60%2Cquality%3D80%2Cformat%3Dauto/wp-content/uploads/2015/06/johnnichols_small1.jpg&amp;raw"></a><span data-dcnode-id="843" instrument_node=""> </span></div><span data-dcnode-id="841" instrument_node="">

</span></a><p class="author" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">April 26, 2022</span></p><span data-dcnode-id="815" instrument_node=""> </span></div><span data-dcnode-id="813" instrument_node="">

</span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenation.com/article/politics/mallory-mcmorrow-public-education/"><span data-dcnode-id="811" instrument_node="">
</span><h5 data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">A Michigan Legislator Shows How to Shred GOP's Hateful Politics</span></h5><span data-dcnode-id="808" instrument_node="">
</span></a><p class="author" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">April 22, 2022</span></p><span data-dcnode-id="804" instrument_node=""> </span></div><span data-dcnode-id="802" instrument_node="">
</span><div class="newrelated-blocks" data-dcnode-id="794"><span data-dcnode-id="801" instrument_node="">
</span><p class="author" data-dcnode-id="796"><span data-dcnode-id="800" instrument_node="">
</span><a data-dcnode-id="798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenation.com/authors/john-nichols/"><span data-dcnode-id="799" instrument_node="">Author page</span></a><span data-dcnode-id="797" instrument_node="">
</span></p><span data-dcnode-id="795" instrument_node="">
</span></div><span data-dcnode-id="793" instrument_node="">
</span></aside><span data-dcnode-id="791" instrument_node="">
</span></blockquote><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">As a presidential candidate in 2020 and as a mayoral candidate in 2021, Andrew Yang has advocated lowering the voting age and, no matter what folks may think about his other stances, Yang is right on this one.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">“If you were to have 16-year-olds vote, what would that do? That would transform every high school in New York City into a hotbed of democracy,” </span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/andrew-yang-lower-voting-age-to-16-nyc-mayoral-race-2021-5" rel="noopener" target="_blank"><span data-dcnode-id="784" instrument_node="">announced Yang</span></a><span data-dcnode-id="782" instrument_node=""> at a May event at which he rolled out proposals to lower the voting age and to allow “non-citizens who are lawful permanent residents” to vote.
</span></p><p data-dcnode-id="776"><span data-dcnode-id="780" instrument_node="">Yang included these ideas—which he argued could be implemented on the local level—in a comprehensive </span><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yangforny.com/policies/expanding-democracy-in-new-york-city" rel="noopener" target="_blank"><span data-dcnode-id="779" instrument_node="">“Expanding Democracy in New York City” proposal</span></a><span data-dcnode-id="777" instrument_node=""> that was part of his campaign platform. It explained: “Expanding the franchise has historically been the cornerstone of democratic reforms—and always met with skepticism and sometimes violent opposition. Expanding the voting age to 16 and to noncitizen New Yorkers in municipal elections makes good sense—and criticisms of these proposals don’t hold up. New York City can make these democratic reforms—and we ought to be at the forefront of these essential, and more inclusive, measures.”
</span></p><p data-dcnode-id="771"><span data-dcnode-id="775" instrument_node="">The idea of lowering the voting age also </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/andrew-yang-lower-voting-age-to-16-nyc-mayoral-race-2021-5" rel="noopener" target="_blank"><span data-dcnode-id="774" instrument_node="">drew support</span></a><span data-dcnode-id="772" instrument_node=""> from mayoral candidate Shaun Donovan, while candidates Maya Wiley, Eric Adams, Ray McGuire, and Scott Stringer expressed support for allowing green card holders to vote in municipal elections. </span></p><aside class="inline-cta-1 tn-inline-cta-module" data-dcnode-id="755" data-nosnippet="" id="inline_cta_1_module_389251"><span data-dcnode-id="770" instrument_node="">
</span><div class="inline-cta-blocks" data-dcnode-id="761" id="inline_cta_389251"><h4 data-dcnode-id="764"><strong data-dcnode-id="765"><span data-dcnode-id="769" instrument_node="">Donate Now to Power </span><em data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">The Nation</span></em><span data-dcnode-id="766" instrument_node="">.</span></strong></h4><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Readers like you make our independent journalism possible.</span></p></div><span data-dcnode-id="760" instrument_node="">
</span><div class="cta" data-dcnode-id="757" id="inline_cta_btn_389251"><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenation.com/donate-website%3Futm_medium%3Dwebsite%26utm_source%3DWebsite%26utm_campaign%3Djune-appeal%26sourceid%3D1066666%26ms%3Dpost-inline%26utm_content%3Dpost-inline"><input class="btn" data-dcnode-id="759" name="submit_sailthru" style="background: rgb(255, 207, 13); color: rgb(0, 0, 0);" type="button" value="Donate"></a></div><span data-dcnode-id="756" instrument_node="">
</span></aside><span data-dcnode-id="754" instrument_node="">
</span><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">The debate about expanding the franchise should not end with this election, and it certainly should not be limited to New York City.
</span></p><p data-dcnode-id="744"><span data-dcnode-id="748" instrument_node="">US Representative Ayanna Pressley (D-Mass.) has emerged as a vital national advocate on this issue, </span><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pressley.house.gov/media/press-releases/pressley-meng-schakowsky-re-introduce-amendment-lower-voting-age"><span data-dcnode-id="747" instrument_node="">saying</span></a><span data-dcnode-id="745" instrument_node="">, “From gun violence, to immigration reform, to climate change, to the future of work—our young people are organizing, mobilizing and calling us to action. They are at the forefront of social and legislative movements and have earned inclusion in our democracy.”
</span></p><p data-dcnode-id="739"><span data-dcnode-id="743" instrument_node="">To that end, the Massachusetts Democrat has in the last two sessions of Congress proposed federal legislation to lower the voting age from 18 to 16. A March vote on a voting-age amendment advanced by Pressley and Representatives Grace Meng (D-N.Y.) and Jan Schakowsky (D-Ill.) </span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/house-defeats-effort-to-expand-voting-to-16-year-olds-11614798907" rel="noopener" target="_blank"><span data-dcnode-id="742" instrument_node="">drew 125 votes in the House</span></a><span data-dcnode-id="740" instrument_node="">—all from Democrats. </span></p><aside class="left indent indents current-issue" data-dcnode-id="713" data-nosnippet=""><span data-dcnode-id="738" instrument_node="">
</span><h4 data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Current Issue</span></h4><div class="current-blocks" data-dcnode-id="729"><span data-dcnode-id="735" instrument_node="">
</span><a class="no-target-blank imgHover" data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenation.com/issue/may-16-23-2022-issue/"><span data-dcnode-id="734" instrument_node="">
</span><img alt="" data-dcnode-id="733" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenation.com/wp-content/uploads/2022/04/cover0516.jpg&amp;raw"><span data-dcnode-id="732" instrument_node="">
</span></a><span data-dcnode-id="730" instrument_node="">
</span></div><span data-dcnode-id="728" instrument_node=""> </span><div class="current-blocks" data-dcnode-id="715"><span data-dcnode-id="727" instrument_node="">
</span><a class="textred-highlighted" data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thenation.com/issue/may-16-23-2022-issue/"><span data-dcnode-id="726" instrument_node="">View our current issue</span></a><span data-dcnode-id="724" instrument_node="">
</span><div class="magazine_text" data-dcnode-id="721" id="magazine_text_389251"><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Subscribe today and Save up to $129.</span></p></div><span data-dcnode-id="720" instrument_node="">
</span><div class="cta magazine_button" data-dcnode-id="717" id="magazine_button_389251"><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//subscriptions.thenation.com/Nation_index%3Fpk%3DG2A1CLT"><input class="btn btn_d41d00" data-dcnode-id="719" name="submit_sailthru" style="background: rgb(221, 51, 51);" type="button" value="Subscribe"></a></div><span data-dcnode-id="716" instrument_node="">
</span></div><span data-dcnode-id="714" instrument_node="">
</span></aside><span data-dcnode-id="712" instrument_node="">
</span><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">“A sixteen-year-old in 2021 possesses a wisdom and a maturity that comes from 2021 challenges, 2021 hardships, and 2021 threats,” Pressley explained in March. “Now is the time for us to demonstrate the courage that matches the challenges of the modern-day sixteen and seventeen-year-old. My amendment with Congresswomen Meng and Schakowsky would lower the voting age for federal elections from eighteen to sixteen years of age, and allow young people to have a say in our federal elections and the policies that impact their lives today and will shape the nation in their lifetime.”
</span></p><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">The fight to lower the voting age to 16 may seem like something of a new frontier in the long struggle to expand voting rights in the United States. But this is not a radical notion. This is a reform based in common sense and honest observation.
</span></p><p data-dcnode-id="697"><span data-dcnode-id="704" instrument_node="">Noting that high school students have “far better BS detectors” than adults, constitutional scholar </span><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/tribelaw%3Fref_src%3Dtwsrc%255Etfw%257Ctwcamp%255Etweetembed%257Ctwterm%255E965574015401299969%26ref_url%3Dhttps%253A%252F%252Fwww.washingtontimes.com%252Fnews%252F2018%252Ffeb%252F19%252Flaurence-h-tribe-harvard-law-prof-wants-childrens-%252F" rel="noopener" target="_blank"><span data-dcnode-id="703" instrument_node="">Lawrence Tribe</span></a><span data-dcnode-id="701" instrument_node=""> asked several years ago, as Parkland, Fl., high school students </span><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tampabay.com/florida-politics/buzz/2019/02/13/here-is-every-new-gun-law-in-the-us-since-the-parkland-shooting/" rel="noopener" target="_blank"><span data-dcnode-id="700" instrument_node="">reframed the gun debate</span></a><span data-dcnode-id="698" instrument_node="">, “Wouldn’t it be great if the voting age were lowered to 16?”
</span></p><p class="article-n-logo" data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">It would be great. And it ought to be on the agenda of progressives at the federal, state, and local levels going forward.
</span></p></div><span data-dcnode-id="693" instrument_node="">
</span></section><span data-dcnode-id="691" instrument_node="">
