</span><h2 data-dcnode-id="3910"><a data-dcnode-id="3912" id="your_polling_station" name="your_polling_station"></a><span data-dcnode-id="3911" instrument_node="">Your polling station</span></h2><span data-dcnode-id="3909" instrument_node="">
</span><p data-dcnode-id="3904"><span data-dcnode-id="3908" instrument_node="">You can </span><a data-dcnode-id="3906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//secured.knowsley.gov.uk/myneighbourhood" target="_blank"><span data-dcnode-id="3907" instrument_node="">find your polling station by searching online</span></a><span data-dcnode-id="3905" instrument_node="">. Input your address and/or postcode&nbsp;and click the 'electoral'&nbsp;tab for details.</span></p><span data-dcnode-id="3903" instrument_node="">
</span><h2 data-dcnode-id="3900"><a data-dcnode-id="3902" id="electoral_register" name="electoral_register"></a><span data-dcnode-id="3901" instrument_node="">The Electoral Register</span></h2><span data-dcnode-id="3899" instrument_node="">
</span></div><span data-dcnode-id="3897" instrument_node="">
</span><p data-dcnode-id="3872"><span data-dcnode-id="3896" instrument_node="">The </span><strong data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">electoral register</span></strong><span data-dcnode-id="3893" instrument_node=""> lists the names and addresses of everyone who is registered to vote in public elections. The register is used for electoral purposes, such as making sure only eligible people can vote. It is also used for other limited purposes specified in law, such as: detecting crime (for example, fraud), calling people for jury service, checking credit applications.</span><br data-dcnode-id="3892"><span data-dcnode-id="3891" instrument_node="">
</span><br data-dcnode-id="3890"><span data-dcnode-id="3889" instrument_node="">
The </span><strong data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">open register</span></strong><span data-dcnode-id="3886" instrument_node=""> is an extract of the electoral register, but is not used for elections. It can be bought by any person, company or organisation. For example, it is used by businesses and charities to confirm name and address details.</span><br data-dcnode-id="3885"><span data-dcnode-id="3884" instrument_node="">
</span><br data-dcnode-id="3883"><span data-dcnode-id="3882" instrument_node="">
Removing your details from the open register does not affect your right to vote.</span><br data-dcnode-id="3881"><span data-dcnode-id="3880" instrument_node="">
</span><br data-dcnode-id="3879"><span data-dcnode-id="3878" instrument_node="">
</span><strong data-dcnode-id="3873"><span data-dcnode-id="3877" instrument_node="">Your name and address will be included in the open register unless you ask for them to be removed. You can remove your details at any time by contacting us via </span><a data-dcnode-id="3875" href="mailto:elections@knowsley.gov.uk"><span data-dcnode-id="3876" instrument_node="">elections@knowsley.gov.uk</span></a><span data-dcnode-id="3874" instrument_node=""> or 0151 443 3583.</span></strong></p><span data-dcnode-id="3871" instrument_node="">
</span><p data-dcnode-id="3866" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3870" instrument_node="">You can inspect the&nbsp;</span><a data-dcnode-id="3868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.knowsley.gov.uk/residents/libraries/find-your-local-library.aspx" title="Your local library"><span data-dcnode-id="3869" instrument_node="">register of electors in Knowsley at Knowsley libraries</span></a><span data-dcnode-id="3867" instrument_node="">.</span></p><span data-dcnode-id="3865" instrument_node="">
</span><span data-dcnode-id="3864" instrument_node="">
</span><span data-dcnode-id="3858" instrument_node="">
</span><span data-dcnode-id="3857" instrument_node="">
</span><span data-dcnode-id="3855" instrument_node="">
</span><table border="1" cellpadding="1" cellspacing="1" data-dcnode-id="3854" style="width: 100%;"><caption data-dcnode-id="3859"><span data-dcnode-id="3863" instrument_node="">
</span><div data-dcnode-id="3861" style="text-align: left;"><span data-dcnode-id="3862" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3860" instrument_node="">
</span></caption><tbody data-dcnode-id="3856"></tbody></table><span data-dcnode-id="3853" instrument_node="">
</span><h2 data-dcnode-id="3850" style="text-align: left;"><a data-dcnode-id="3852" id="who_can_register_to_vote" name="who_can_register_to_vote"></a><span data-dcnode-id="3851" instrument_node="">Who can register to vote</span></h2><span data-dcnode-id="3849" instrument_node="">
&nbsp;

</span><p data-dcnode-id="3847" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3848" instrument_node="">To be able to vote:</span></p><span data-dcnode-id="3846" instrument_node="">
</span><ul data-dcnode-id="3832" style="text-align: left; color: rgb(51, 51, 51); font-size: 1.3em; margin-top: 0.8em;"><span data-dcnode-id="3845" instrument_node="">
</span><li data-dcnode-id="3843" style="background-image: url(&quot;http://www.knowsley.gov.uk/images/template/ul-bullet.png&quot;);"><span data-dcnode-id="3844" instrument_node="">You must be a resident in the electoral area</span></li><span data-dcnode-id="3842" instrument_node="">
</span><li data-dcnode-id="3840" style="background-image: url(&quot;http://www.knowsley.gov.uk/images/template/ul-bullet.png&quot;);"><span data-dcnode-id="3841" instrument_node="">You must be a British or Irish citizen, Commonwealth citizen or a citizen of a European Union country</span></li><span data-dcnode-id="3839" instrument_node="">
</span><li data-dcnode-id="3837" style="background-image: url(&quot;http://www.knowsley.gov.uk/images/template/ul-bullet.png&quot;);"><span data-dcnode-id="3838" instrument_node="">You must be 18 years of age. 16 or 17 year olds may also be able to register depending on your date of birth</span></li><span data-dcnode-id="3836" instrument_node="">
</span><li data-dcnode-id="3834" style="background-image: url(&quot;http://www.knowsley.gov.uk/images/template/ul-bullet.png&quot;);"><span data-dcnode-id="3835" instrument_node="">You must not be subject to any legal incapacity to vote</span></li><span data-dcnode-id="3833" instrument_node="">
</span></ul><span data-dcnode-id="3831" instrument_node="">
</span><p data-dcnode-id="3829" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3830" instrument_node="">You can also register if:</span></p><span data-dcnode-id="3828" instrument_node="">
</span><ul data-dcnode-id="3812" style="text-align: left; color: rgb(51, 51, 51); font-size: 1.3em; margin-top: 0.8em;"><span data-dcnode-id="3827" instrument_node="">
</span><li data-dcnode-id="3825" style="background-image: url(&quot;http://www.knowsley.gov.uk/images/template/ul-bullet.png&quot;);"><span data-dcnode-id="3826" instrument_node="">You are working away (unless you are away for more than six months</span></li><span data-dcnode-id="3824" instrument_node="">
</span><li data-dcnode-id="3822" style="background-image: url(&quot;http://www.knowsley.gov.uk/images/template/ul-bullet.png&quot;);"><span data-dcnode-id="3823" instrument_node="">You are a resident but are away for the time being (for example - on holiday, students, in hospital - including voluntary patients in psychiatric hospitals)</span></li><span data-dcnode-id="3821" instrument_node="">
</span><li data-dcnode-id="3819" style="background-image: url(&quot;http://www.knowsley.gov.uk/images/template/ul-bullet.png&quot;);"><span data-dcnode-id="3820" instrument_node="">You are a lodger or guest (but not short-stay visitors) in the household</span></li><span data-dcnode-id="3818" instrument_node="">
</span><li data-dcnode-id="3814" style="background-image: url(&quot;http://www.knowsley.gov.uk/images/template/ul-bullet.png&quot;);"><span data-dcnode-id="3817" instrument_node="">You are an Overseas Elector. </span><a data-dcnode-id="3815" href="#Overseas%20Electors"><span data-dcnode-id="3816" instrument_node="">Please see 'Overseas Electors' section below.</span></a></li><span data-dcnode-id="3813" instrument_node="">
</span></ul><span data-dcnode-id="3811" instrument_node="">
</span><p data-dcnode-id="3809" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3810" instrument_node="">Crown Servants and Members of the British Council must register annually. Service Voters and their partners must re-register every five years. However, they may choose to register as an ordinary voter at their home address if they wish.</span></p><span data-dcnode-id="3808" instrument_node="">
</span><h2 data-dcnode-id="3805" style="text-align: left; color: rgb(51, 51, 51);"><a data-dcnode-id="3807" id="registering_to_vote" name="registering_to_vote"></a><span data-dcnode-id="3806" instrument_node="">Registering to Vote</span></h2><span data-dcnode-id="3804" instrument_node="">
</span><br data-dcnode-id="3803"><span data-dcnode-id="3802" instrument_node="">
</span><span data-dcnode-id="3787" style="font-size: 14px;"><span data-dcnode-id="3801" instrument_node="">If you are not registered to vote, you can register at online at </span><a data-dcnode-id="3798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/register-to-vote/" target="_blank"><strong data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">www.gov.uk/register-to-vote</span></strong></a><span data-dcnode-id="3797" instrument_node="">. It only takes a few minutes – you will need your date of birth and national insurance number to register.</span><br data-dcnode-id="3796"><span data-dcnode-id="3795" instrument_node="">
</span><br data-dcnode-id="3794"><span data-dcnode-id="3793" instrument_node="">
Not being registered can also impact on applications for mortgages or mobile phones, since credit reference agencies use the register to validate applications.</span><br data-dcnode-id="3792"><span data-dcnode-id="3791" instrument_node="">
We can also send you a form to register, please contact us via </span><a data-dcnode-id="3789" href="mailto:elections@knowsley.gov.uk"><span data-dcnode-id="3790" instrument_node="">elections@knowsley.gov.uk</span></a><span data-dcnode-id="3788" instrument_node=""> or 0151 443 3583.</span></span><span data-dcnode-id="3786" instrument_node="">
</span><h3 data-dcnode-id="3783"><span data-dcnode-id="3784" style="font-size: 14px;"><span data-dcnode-id="3785" instrument_node="">How do I find my National Insurance number?</span></span></h3><span data-dcnode-id="3782" instrument_node="">
&nbsp;

</span><p data-dcnode-id="3780"><span data-dcnode-id="3781" instrument_node="">The easiest place to find your National Insurance number is on official paperwork, such as your National Insurance card, payslips or letters from the Department for Work and Pensions or HM Revenue and Customs (HMRC). If you still can’t find it, you can use the HMRC enquiry service.</span></p><span data-dcnode-id="3779" instrument_node="">
</span><p data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">Please be aware HMRC won't tell you your National Insurance number over the phone. They will post the information to you.</span></p><span data-dcnode-id="3776" instrument_node="">
</span><h3 data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">I don't know my date of birth</span></h3><span data-dcnode-id="3773" instrument_node="">
</span><br data-dcnode-id="3772"><span data-dcnode-id="3771" instrument_node="">
</span><span data-dcnode-id="3765" style="font-size: 14px;"><span data-dcnode-id="3770" instrument_node="">If you do not know your actual date of birth, you may have been given an official one in the past and this can be used to register to vote. This can be found on paperwork, including a passport, adoption certificate, driving licence or naturalisation certificate.</span><br data-dcnode-id="3769"><span data-dcnode-id="3768" instrument_node="">
</span><br data-dcnode-id="3767"><span data-dcnode-id="3766" instrument_node="">
If you do not have one, you will need to explain why you are unable to provide it in your registration application. We may contact you to ask you for other proof of identity.</span></span><br data-dcnode-id="3764"><span data-dcnode-id="3763" instrument_node="">
&nbsp;
</span><h3 data-dcnode-id="3758"><span data-dcnode-id="3759" style="font-size: 16px;"><strong data-dcnode-id="3760"><a data-dcnode-id="3762" id="change_name_electoral_register" name="change_name_electoral_register"></a><span data-dcnode-id="3761" instrument_node="">I need to change my name on the register.</span></strong></span></h3><span data-dcnode-id="3757" instrument_node="">
</span><br data-dcnode-id="3756"><span data-dcnode-id="3755" instrument_node="">
</span><span data-dcnode-id="3752" style="font-size: 14px;"><strong data-dcnode-id="3753"><span data-dcnode-id="3754" instrument_node="">You will need to provide evidence to support a change of name.</span></strong></span><br data-dcnode-id="3751"><span data-dcnode-id="3750" instrument_node="">
</span><br data-dcnode-id="3749"><span data-dcnode-id="3748" instrument_node="">
</span><span data-dcnode-id="3746" style="font-size: 14px;"><span data-dcnode-id="3747" instrument_node="">This will include a marriage certificate or deed poll certificate (copies only required). If this information cannot be provided, then your National Insurance Number and Date of Birth must be supplied instead to enable us to match your new name against DWP records.</span></span><span data-dcnode-id="3745" instrument_node="">
</span><h3 data-dcnode-id="3741"><span data-dcnode-id="3742" style="font-size:16px;"><a data-dcnode-id="3744" id="canvas-reform" name="canvas-reform"></a><span data-dcnode-id="3743" instrument_node="">Annual Canvas 2021</span></span></h3><span data-dcnode-id="3740" instrument_node="">
</span><p data-dcnode-id="3632"><span data-dcnode-id="3739" instrument_node="">The Electoral Registration Officer (ERO) must conduct an annual canvass to ensure the electoral register is accurate and complete.</span><br data-dcnode-id="3738"><span data-dcnode-id="3737" instrument_node="">
</span><br data-dcnode-id="3736"><span data-dcnode-id="3735" instrument_node="">
As part of this process, a letter confirming who is currently registered (or if the property is registered as empty) will be sent to every residential property in the borough during August. Please respond to this letter if required.</span><br data-dcnode-id="3734"><span data-dcnode-id="3733" instrument_node="">
</span><br data-dcnode-id="3732"><span data-dcnode-id="3731" instrument_node="">
</span><strong data-dcnode-id="3729"><span data-dcnode-id="3730" instrument_node="">How will the canvass work?</span></strong><br data-dcnode-id="3728"><span data-dcnode-id="3727" instrument_node="">
</span><br data-dcnode-id="3726"><span data-dcnode-id="3725" instrument_node="">
</span><strong data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">Step 1: Data matching </span></strong><br data-dcnode-id="3722"><span data-dcnode-id="3721" instrument_node="">
The Electoral Register was sent securely to the Department for Work and Pensions &nbsp;(DWP) database to be matched in July. Electors' names and address were matched against National Insurance details and the other information held by the DWP.</span><br data-dcnode-id="3720"><span data-dcnode-id="3719" instrument_node="">
In addition to this, the ERO has also undertook a matching exercise with local data (Council Tax and Housing Benefit records).</span><br data-dcnode-id="3718"><span data-dcnode-id="3717" instrument_node="">
If </span><strong data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">all</span></strong><span data-dcnode-id="3714" instrument_node=""> the registered people at a property can be matched by either of the above databases, the property will be sent down Route 1 for the annual canvass.</span><br data-dcnode-id="3713"><span data-dcnode-id="3712" instrument_node="">
If there are any people at a property that </span><strong data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">cannot be matched</span></strong><span data-dcnode-id="3709" instrument_node="">, the property will be sent down Route 2 for the annual canvass.</span><br data-dcnode-id="3708"><span data-dcnode-id="3707" instrument_node="">
Care homes/nursing homes that have a responsible person i.e. a duty manager will be sent down Route 3 for the annual canvass.</span><br data-dcnode-id="3706"><span data-dcnode-id="3705" instrument_node="">
</span><br data-dcnode-id="3704"><span data-dcnode-id="3703" instrument_node="">
</span><strong data-dcnode-id="3701"><span data-dcnode-id="3702" instrument_node="">Step 2: Routes of communication </span></strong><br data-dcnode-id="3700"><span data-dcnode-id="3699" instrument_node="">
</span><br data-dcnode-id="3698"><span data-dcnode-id="3697" instrument_node="">
</span><strong data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">Route 1 </span></strong><br data-dcnode-id="3694"><span data-dcnode-id="3693" instrument_node="">
We will send the property a form which will have the elector details pre-printed on it.</span><br data-dcnode-id="3692"><span data-dcnode-id="3691" instrument_node="">
If these pre-printed details are correct - you do not need to do anything.</span><br data-dcnode-id="3690"><span data-dcnode-id="3689" instrument_node="">
If you would like to add or remove someone from the property (or make other changes), go to the website address included on the form (using the security codes listed) to make the change(s).</span><br data-dcnode-id="3688"><span data-dcnode-id="3687" instrument_node="">
</span><br data-dcnode-id="3686"><span data-dcnode-id="3685" instrument_node="">
</span><strong data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Route 2 </span></strong><br data-dcnode-id="3682"><span data-dcnode-id="3681" instrument_node="">
We will send a form to the property which will have elector details pre-printed on it (if we are aware of any registered electors). A blank form will be sent if the property is empty.</span><br data-dcnode-id="3680"><span data-dcnode-id="3679" instrument_node="">
We need a response from this form even if there are no changes to report.</span><br data-dcnode-id="3678"><span data-dcnode-id="3677" instrument_node="">
</span><br data-dcnode-id="3676"><span data-dcnode-id="3675" instrument_node="">
To confirm the pre-printed details are still correct or to add or remove someone's name from the property (or make other changes), go to the website address included on the form (using the security codes listed) to make the change(s). A telephone confirmation option is also available where no changes are required.</span><br data-dcnode-id="3674"><span data-dcnode-id="3673" instrument_node="">
Alternatively, you can return the form by post using the envelope provided (to confirm either the details pre-printed are correct or to make the necessary changes).</span><br data-dcnode-id="3672"><span data-dcnode-id="3671" instrument_node="">
If we do not receive a response from you, we will make every attempt to get a response from you, this may be via reminder forms, the telephone or a visit to your property.</span><br data-dcnode-id="3670"><span data-dcnode-id="3669" instrument_node="">
</span><br data-dcnode-id="3668"><span data-dcnode-id="3667" instrument_node="">
</span><strong data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">Next Step</span></strong><span data-dcnode-id="3664" instrument_node="">&nbsp;- any new electors added above must now also need to register on the </span><a data-dcnode-id="3662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.uk/register-to-vote" target="_blank"><span data-dcnode-id="3663" instrument_node="">Government website</span></a><span data-dcnode-id="3661" instrument_node="">.</span><br data-dcnode-id="3660"><span data-dcnode-id="3659" instrument_node="">
&nbsp;</span><br data-dcnode-id="3658"><span data-dcnode-id="3657" instrument_node="">
It only takes a couple of minutes to register and you will need your National Insurance Number</span><br data-dcnode-id="3656"><span data-dcnode-id="3655" instrument_node="">
If you are unable to register online, we will send you a registration form.</span><br data-dcnode-id="3654"><span data-dcnode-id="3653" instrument_node="">
&nbsp;</span><br data-dcnode-id="3652"><span data-dcnode-id="3651" instrument_node="">
</span><strong data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">Route 3 </span></strong><br data-dcnode-id="3648"><span data-dcnode-id="3647" instrument_node="">
We will make contact with the care home managers/duty managers and send a letter with a list of those currently registered at the address.</span><br data-dcnode-id="3646"><span data-dcnode-id="3645" instrument_node="">
&nbsp;</span><br data-dcnode-id="3644"><span data-dcnode-id="3643" instrument_node="">
The updated register will be published on 1 December 2021.</span><br data-dcnode-id="3642"><span data-dcnode-id="3641" instrument_node="">
&nbsp;</span><br data-dcnode-id="3640"><span data-dcnode-id="3639" instrument_node="">
For further information please contact us at:</span><br data-dcnode-id="3638"><span data-dcnode-id="3637" instrument_node="">
</span><a data-dcnode-id="3635" href="mailto:elections@knowsley.gov.uk"><span data-dcnode-id="3636" instrument_node="">elections@knowsley.gov.uk</span></a><br data-dcnode-id="3634"><span data-dcnode-id="3633" instrument_node="">
Helpline – 0151 443 2222</span></p><span data-dcnode-id="3631" instrument_node="">
</span><h2 data-dcnode-id="3628" style="text-align: left;"><a data-dcnode-id="3630" id="students_living_away_from_home" name="students_living_away_from_home"></a><span data-dcnode-id="3629" instrument_node="">Students living away from home</span></h2><span data-dcnode-id="3627" instrument_node="">
</span><p data-dcnode-id="3625" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3626" instrument_node="">Students are entitled to register at their home address and their university address. Although it is an offence to vote more than once in a national election, you can vote in local elections at both addresses.&nbsp;&nbsp;</span></p><span data-dcnode-id="3624" instrument_node="">
</span><h3 data-dcnode-id="3621" style="text-align: left; color: rgb(51, 51, 51);"><a data-dcnode-id="3622" id="Overseas Electors" name="Overseas Electors"><span data-dcnode-id="3623" instrument_node="">Overseas Electors</span></a></h3><span data-dcnode-id="3620" instrument_node="">
&nbsp;

</span><p data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">If you are a UK citizen living abroad you can register to vote for UK Parliamentary General Elections if you have been registered to vote in the UK in the last 15 years. As part of your application you will be asked the address where you were last registered to vote and it will be in that area where your vote will be counted.</span></p><span data-dcnode-id="3617" instrument_node="">
</span><h3 data-dcnode-id="3614"><a data-dcnode-id="3616" id="uk_voters_living_overseas" name="uk_voters_living_overseas"></a><span data-dcnode-id="3615" instrument_node="">Registering to Vote as an Overseas Elector</span></h3><span data-dcnode-id="3613" instrument_node="">
&nbsp;

</span><p data-dcnode-id="3611"><span data-dcnode-id="3612" instrument_node="">You can register to vote online the same way an elector in the UK does. The only difference being that an overseas elector must include their passport details.</span></p><span data-dcnode-id="3610" instrument_node="">
</span><p data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">An overseas registration lasts for a year&nbsp;so should be renewed annually by re-registering to vote online.</span></p><span data-dcnode-id="3607" instrument_node="">
</span><p data-dcnode-id="3605"><span data-dcnode-id="3606" instrument_node="">When you register to vote, by default you will vote at a polling station, until you complete a second application form to inform us which method you wish to vote by.</span></p><span data-dcnode-id="3604" instrument_node="">
</span><h3 data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">How can you vote from overseas?</span></h3><span data-dcnode-id="3601" instrument_node="">
</span><ul data-dcnode-id="3585"><span data-dcnode-id="3600" instrument_node="">
</span><li data-dcnode-id="3594"><a data-dcnode-id="3596" href="#Postal%20Voting"><strong data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">Postal vote</span></strong><span data-dcnode-id="3597" instrument_node=""> </span></a><span data-dcnode-id="3595" instrument_node="">-&nbsp;You can opt to vote by post (see below), however please take into consideration the time the postal vote will take reach you and then be returned to us by the&nbsp; 10pm deadline on election day.&nbsp; If it&nbsp;does not arrive in time or gets lost in the post, you cannot then change your method of voting.&nbsp;By law, all postal votes must be posted out, we are not allowed to email them to electors.​</span></li><span data-dcnode-id="3593" instrument_node="">
</span><li data-dcnode-id="3587"><strong data-dcnode-id="3589"><a data-dcnode-id="3591" href="#Proxy%20Voting"><span data-dcnode-id="3592" instrument_node="">Proxy voting</span></a><span data-dcnode-id="3590" instrument_node=""> </span></strong><span data-dcnode-id="3588" instrument_node="">-&nbsp;If you are not based in the UK you can appoint someone to vote on your behalf (see below). &nbsp;As an overseas elector we would advise that you apply to vote by proxy if possible. Your appointed proxy has to attend the polling station you were last registered to vote at, so make sure that the person you appoint is familiar with where you would have previously voted.&nbsp;</span></li><span data-dcnode-id="3586" instrument_node="">
</span></ul><span data-dcnode-id="3584" instrument_node="">
</span><h2 data-dcnode-id="3581"><a data-dcnode-id="3583" id="anonymous_registration" name="anonymous_registration"></a><span data-dcnode-id="3582" instrument_node="">Anonymous Registration</span></h2><span data-dcnode-id="3580" instrument_node="">
</span><p data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">If your safety or that of any other person in your home will be at risk if your name or address is made public, you can register anonymously. Your name and address will not be visible to anyone inspecting the register.</span></p><span data-dcnode-id="3577" instrument_node="">
</span><p data-dcnode-id="3572"><span data-dcnode-id="3576" instrument_node="">To register anonymously call us on 0151 443 3603. </span><strong data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">Do not complete an application online</span></strong><span data-dcnode-id="3573" instrument_node="">.</span></p><span data-dcnode-id="3571" instrument_node="">
</span><p data-dcnode-id="3568"><strong data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">To register anonymously you will need to provide court documents or get your application supported and signed by, for example, a senior police officer or director of social services.</span></strong></p><span data-dcnode-id="3567" instrument_node="">
</span><p data-dcnode-id="3565"><span data-dcnode-id="3566" instrument_node="">Anonymous registration lasts for one year at a time and then must be renewed.</span></p><span data-dcnode-id="3564" instrument_node="">
</span><h2 data-dcnode-id="3561" style="text-align: left;"><a data-dcnode-id="3563" id="voting" name="voting"></a><span data-dcnode-id="3562" instrument_node="">Voting</span></h2><span data-dcnode-id="3560" instrument_node="">
</span><p data-dcnode-id="3558" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3559" instrument_node="">Shortly before an election, you will get a poll card (or postal vote poll card if you are registered to vote by post).&nbsp;The poll card will tell you the election date, where your polling station is and the hours of the poll. You do not need to take this card with you to vote, but it will make things easier if you do. The postal vote card will tell you when to expect your ballot paper(s) by post.</span></p><span data-dcnode-id="3557" instrument_node="">
</span><p data-dcnode-id="3555" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3556" instrument_node="">If you don’t receive a poll card, call us on 0151 443 2222 to check you are included on the electoral register.&nbsp;&nbsp;</span></p><span data-dcnode-id="3554" instrument_node="">
</span><h2 data-dcnode-id="3551" style="text-align: left;"><a data-dcnode-id="3553" id="postal_proxy_voting" name="postal_proxy_voting"></a><span data-dcnode-id="3552" instrument_node="">Postal and proxy voting</span></h2><span data-dcnode-id="3550" instrument_node="">
</span><p data-dcnode-id="3546" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3549" instrument_node="">If you can't get to the polling station on election day, you can apply for a postal or proxy vote by contacting the elections office on 0151 443 2222 or by email </span><a data-dcnode-id="3547" href="mailto:elections@knowsley.gov.uk"><span data-dcnode-id="3548" instrument_node="">elections@knowsley.gov.uk</span></a></p><span data-dcnode-id="3545" instrument_node="">
</span><h3 data-dcnode-id="3542"><a data-dcnode-id="3543" name="Postal Voting"><span data-dcnode-id="3544" instrument_node="">Postal voting</span></a></h3><span data-dcnode-id="3541" instrument_node="">
</span><p data-dcnode-id="3539" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3540" instrument_node="">Once registered, we will send ballot papers to your home address before the election. You should then complete and return your ballot paper in the envelope provided before the polling stations close on election day. You can apply to vote by post for a particular election or on a permanent basis. Instructions on how to complete your postal vote will be enclosed within the postal vote pack.</span></p><span data-dcnode-id="3538" instrument_node="">
</span><h3 data-dcnode-id="3535"><a data-dcnode-id="3536" id="Proxy Voting" name="Proxy Voting"><span data-dcnode-id="3537" instrument_node="">Proxy voting</span></a></h3><span data-dcnode-id="3534" instrument_node="">
</span><p data-dcnode-id="3532" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3533" instrument_node="">You can appoint a proxy voter to vote on your behalf if you cannot get to the polling station on election day. You must give a reason why you cannot vote in person, for example, if you are on holiday.</span></p><span data-dcnode-id="3531" instrument_node="">
</span><p data-dcnode-id="3529" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3530" instrument_node="">You can apply to vote by proxy for a particular election only, or on a permanent basis. Permanent proxy applications may require a signature in support, such as your doctor or employer.</span></p><span data-dcnode-id="3528" instrument_node="">
</span><p data-dcnode-id="3526" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3527" instrument_node="">Please note, both you and your proxy need to be registered to be able to vote by proxy.</span></p><span data-dcnode-id="3525" instrument_node="">
</span><p data-dcnode-id="3523" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3524" instrument_node="">Contact the Elections Team on 0151 443 2222 for a postal or proxy voting application form.</span></p><span data-dcnode-id="3522" instrument_node="">
</span><h3 data-dcnode-id="3517" style="text-align: left;"><br data-dcnode-id="3521"><span data-dcnode-id="3520" instrument_node="">
</span><a data-dcnode-id="3519" id="electoral_commission_guidance_standing_election" name="electoral_commission_guidance_standing_election"></a><span data-dcnode-id="3518" instrument_node="">Electoral Commission Guidance on standing for election</span></h3><span data-dcnode-id="3516" instrument_node="">
</span><div data-dcnode-id="3478" style="margin: 0cm 0cm 0pt;"><span data-dcnode-id="3515" instrument_node="">
</span><div data-dcnode-id="3487" style="background: rgb(255, 255, 255); margin: 0cm 0cm 0pt; padding: 0px; color: rgb(51, 51, 51); font-family: Arial, sans-serif; font-size: 1.3em;"><a data-dcnode-id="3513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electoralcommission.org.uk/__data/assets/pdf_file/0007/141784/Part-1-Can-you-stand-for-election-LGEW.pdf" target="_blank"><span data-dcnode-id="3514" instrument_node="">Can you stand for election?</span></a><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node="">
</span><a data-dcnode-id="3509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electoralcommission.org.uk/__data/assets/pdf_file/0008/141785/Part-2a-Standing-as-an-independent-candidate-LGEW.pdf" target="_blank"><span data-dcnode-id="3510" instrument_node="">Standing as an independent candidate</span></a><span data-dcnode-id="3508" instrument_node="">&nbsp;</span><br data-dcnode-id="3507"><span data-dcnode-id="3506" instrument_node="">
</span><a data-dcnode-id="3504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electoralcommission.org.uk/__data/assets/pdf_file/0010/141787/Part-2b-standing-as-a-party-candidate-LGEW.pdf" target="_blank"><span data-dcnode-id="3505" instrument_node="">Standing as a party candidate</span></a><br data-dcnode-id="3503"><span data-dcnode-id="3502" instrument_node="">
</span><a data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electoralcommission.org.uk/__data/assets/pdf_file/0019/236044/Spending-and-Donations-Local-Elections-England-May-2018.pdf" target="_blank"><span data-dcnode-id="3501" instrument_node="">Spending and donations</span></a><br data-dcnode-id="3499"><span data-dcnode-id="3498" instrument_node="">
</span><a data-dcnode-id="3496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electoralcommission.org.uk/__data/assets/pdf_file/0011/141788/Part-4-The-campaign-LGEW.pdf" target="_blank"><span data-dcnode-id="3497" instrument_node="">The campaign</span></a><br data-dcnode-id="3495"><span data-dcnode-id="3494" instrument_node="">
</span><a data-dcnode-id="3492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electoralcommission.org.uk/__data/assets/pdf_file/0003/141789/Part-5-Your-right-to-attend-key-electoral-events-LGEW.pdf" target="_blank"><span data-dcnode-id="3493" instrument_node="">Your right to attend key electoral events</span></a><br data-dcnode-id="3491"><span data-dcnode-id="3490" instrument_node="">
</span><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.electoralcommission.org.uk/__data/assets/pdf_file/0005/141791/Part-6-After-the-declaration-of-results-LGEW.pdf" target="_blank"><span data-dcnode-id="3489" instrument_node="">After the declaration of results</span></a></div><span data-dcnode-id="3486" instrument_node="">
</span><h2 data-dcnode-id="3484" style="background: rgb(255, 255, 255); margin: 0cm 0cm 0pt; padding: 0px; color: rgb(51, 51, 51); font-family: Arial, sans-serif; font-size: 1.3em;"><span data-dcnode-id="3485" instrument_node="">&nbsp;</span></h2><span data-dcnode-id="3483" instrument_node="">
</span><h2 data-dcnode-id="3480"><a data-dcnode-id="3482" id="elections_held_in_knowsley" name="elections_held_in_knowsley"></a><span data-dcnode-id="3481" instrument_node="">Elections held in Knowsley</span></h2><span data-dcnode-id="3479" instrument_node="">
</span></div><span data-dcnode-id="3477" instrument_node="">
</span><h3 data-dcnode-id="3475" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3476" instrument_node="">Borough elections</span></h3><span data-dcnode-id="3474" instrument_node="">
</span><p data-dcnode-id="3466" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3473" instrument_node="">Borough elections are held every third year of a 4 year cycle with the next scheduled elections taking place on Thursday 5&nbsp;May 2022.</span><br data-dcnode-id="3472"><span data-dcnode-id="3471" instrument_node="">
</span><br data-dcnode-id="3470"><span data-dcnode-id="3469" instrument_node="">
</span><a data-dcnode-id="3467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//councillors.knowsley.gov.uk/mgmemberindex.aspx%3Fbcr%3D1" target="_blank"><span data-dcnode-id="3468" instrument_node="">To find your local councillor, click here.</span></a></p><span data-dcnode-id="3465" instrument_node="">
</span><h3 data-dcnode-id="3463" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3464" instrument_node="">Member of Parliament - Parliamentary elections</span></h3><span data-dcnode-id="3462" instrument_node="">
</span><p data-dcnode-id="3454" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3461" instrument_node="">Parliamentary elections are held every 5 years with the next scheduled elections taking place in 2024.</span><br data-dcnode-id="3460"><span data-dcnode-id="3459" instrument_node="">
</span><br data-dcnode-id="3458"><span data-dcnode-id="3457" instrument_node="">
</span><a data-dcnode-id="3455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//councillors.knowsley.gov.uk/mgMemberIndexMP.aspx%3Fbcr%3D1" target="_blank"><span data-dcnode-id="3456" instrument_node="">To find your local MP, click here.</span></a></p><span data-dcnode-id="3453" instrument_node="">
</span><h3 data-dcnode-id="3451" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3452" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="3450" instrument_node="">
</span><h3 data-dcnode-id="3448" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3449" instrument_node="">Parish and Town Council elections</span></h3><span data-dcnode-id="3447" instrument_node="">
</span><p data-dcnode-id="3440" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3446" instrument_node="">Knowsley has&nbsp;</span><a data-dcnode-id="3444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowsley.gov.uk/your-council/parish-and-town-councils" target="_blank"><span data-dcnode-id="3445" instrument_node="">five town and parish councils</span></a><span data-dcnode-id="3443" instrument_node="">. Elections are held every four years with the next scheduled elections taking place on Thursday 4 May 2023.</span><br data-dcnode-id="3442"><span data-dcnode-id="3441" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="3439" instrument_node="">
</span><h2 data-dcnode-id="3434" style="margin: 0.83em 0cm;"><span data-dcnode-id="3435" lang="EN" style="font-family: &quot;Arial&quot;,&quot;sans-serif&quot;; mso-ansi-language: EN;"><font data-dcnode-id="3436" size="3"><a data-dcnode-id="3438" id="petition_elected_mayor" name="petition_elected_mayor"></a><span data-dcnode-id="3437" instrument_node="">Petition for an Elected Mayor</span></font></span></h2><span data-dcnode-id="3433" instrument_node="">
</span><p data-dcnode-id="3429" style="margin: 0.83em 0cm;"><span data-dcnode-id="3430" lang="EN" style="font-family: &quot;Arial&quot;,&quot;sans-serif&quot;; mso-ansi-language: EN;"><font data-dcnode-id="3431" size="3"><span data-dcnode-id="3432" instrument_node="">Knowsley currently has a Leader elected by the Council, and a cabinet of&nbsp;Councillors.</span></font></span></p><span data-dcnode-id="3428" instrument_node="">
</span><p data-dcnode-id="3424"><span data-dcnode-id="3425" lang="EN" style="font-family: &quot;Arial&quot;,&quot;sans-serif&quot;; mso-ansi-language: EN;"><font data-dcnode-id="3426" size="3"><span data-dcnode-id="3427" instrument_node="">However, under the Local Government Act 2000, you can petition the Council to hold a referendum on whether local people should elect a Mayor to lead the Council and be the head of the Council's decision making body.</span></font></span></p><span data-dcnode-id="3423" instrument_node="">
</span><p data-dcnode-id="3419"><span data-dcnode-id="3420" lang="EN" style="font-family: &quot;Arial&quot;,&quot;sans-serif&quot;; mso-ansi-language: EN;"><font data-dcnode-id="3421" size="3"><span data-dcnode-id="3422" instrument_node="">In order to call a referendum for a directly elected Mayor, a petition must be raised which is signed by 5% of local government electors that are included in the current Register of Electors. &nbsp;The verification figure is published annually in a formal notice:</span></font></span></p><span data-dcnode-id="3418" instrument_node="">
</span><p data-dcnode-id="3413"><a data-dcnode-id="3414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowsley.gov.uk/knowsleycouncil/media/Documents/Petition-Notice-Feb-2022.doc"><span data-dcnode-id="3415" lang="EN" style="font-family: &quot;Arial&quot;,&quot;sans-serif&quot;; mso-ansi-language: EN;"><font data-dcnode-id="3416" size="3"><span data-dcnode-id="3417" instrument_node="">Petition Notice</span></font></span></a></p><span data-dcnode-id="3412" instrument_node="">
</span><p data-dcnode-id="3408"><span data-dcnode-id="3409" lang="EN" style="font-family: &quot;Arial&quot;,&quot;sans-serif&quot;; mso-ansi-language: EN;"><font data-dcnode-id="3410" size="3"><span data-dcnode-id="3411" instrument_node="">Having a directly elected Mayor is a constitutional change and a referendum would be held to give voters in Knowsley the opportunity to choose if they would want this new arrangement.</span></font></span></p><span data-dcnode-id="3407" instrument_node="">
</span><h2 data-dcnode-id="3404" style="text-align: left;"><a data-dcnode-id="3406" id="election_spending" name="election_spending"></a><span data-dcnode-id="3405" instrument_node="">Election spending</span></h2><span data-dcnode-id="3403" instrument_node="">
</span><p data-dcnode-id="3389" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3402" instrument_node="">Candidates and political parties are subject to limits on their spending on items and services used during the regulated period of an election.</span><br data-dcnode-id="3401"><span data-dcnode-id="3400" instrument_node="">
</span><br data-dcnode-id="3399"><span data-dcnode-id="3398" instrument_node="">
Election expenses returns relate to these permitted spending limits and are required to provide accountability and transparency about the campaigns of candidates. Spending limits are set by legislation and are subject to change.</span><br data-dcnode-id="3397"><span data-dcnode-id="3396" instrument_node="">
</span><br data-dcnode-id="3395"><span data-dcnode-id="3394" instrument_node="">
All candidates and election agents, where applicable, are required to submit a Declaration and Return of Expenses to the Returning Officer within a statutory timescale – whether or not they were elected. Even if no spending was incurred, a nil return still has to be submitted along with the declaration.</span><br data-dcnode-id="3393"><span data-dcnode-id="3392" instrument_node="">
</span><br data-dcnode-id="3391"><span data-dcnode-id="3390" instrument_node="">
These documents are then made available for inspection, during normal office hours at the Elections Office, for the following statutory periods:</span></p><span data-dcnode-id="3388" instrument_node="">
</span><ul data-dcnode-id="3377" style="text-align: left; color: rgb(51, 51, 51); font-size: 1.3em; margin-top: 0.8em;"><span data-dcnode-id="3387" instrument_node="">
</span><li data-dcnode-id="3385" style="background-image: url(&quot;http://www.knowsley.gov.uk/images/template/ul-bullet.png&quot;);"><span data-dcnode-id="3386" instrument_node="">UK Parliamentary Election: 2 years from receipt (public notice must be given in two or more local newspapers)</span></li><span data-dcnode-id="3384" instrument_node="">
</span><li data-dcnode-id="3382" style="background-image: url(&quot;http://www.knowsley.gov.uk/images/template/ul-bullet.png&quot;);"><span data-dcnode-id="3383" instrument_node="">Local Government – Borough elections: 2 years from receipt</span></li><span data-dcnode-id="3381" instrument_node="">
</span><li data-dcnode-id="3379" style="background-image: url(&quot;http://www.knowsley.gov.uk/images/template/ul-bullet.png&quot;);"><span data-dcnode-id="3380" instrument_node="">Local Government – Parish elections: 1 year from receipt</span></li><span data-dcnode-id="3378" instrument_node="">
</span></ul><span data-dcnode-id="3376" instrument_node="">
</span><p data-dcnode-id="3374" style="text-align: left; color: rgb(51, 51, 51);"><span data-dcnode-id="3375" instrument_node="">A copy of the documents can be provided on receipt of the statutory fee (currently 20 pence (20p) for each side of each page). Please contact the office to make an appointment to inspect or to request a copy.</span></p><span data-dcnode-id="3373" instrument_node="">
</span><h2 data-dcnode-id="3370"><a data-dcnode-id="3372" id="parish_polls" name="parish_polls"></a><span data-dcnode-id="3371" instrument_node="">Parish polls</span></h2><span data-dcnode-id="3369" instrument_node="">
</span><p data-dcnode-id="3365"><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowsley.gov.uk/knowsleycouncil/media/Documents/guide-to-Parish-polls.pdf" target="_blank"><span data-dcnode-id="3368" instrument_node="">Parish polls</span></a><span data-dcnode-id="3366" instrument_node=""> provide an opportunity for local electors to express an opinion on a specific subject.</span></p><span data-dcnode-id="3364" instrument_node="">
