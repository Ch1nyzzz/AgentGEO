</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Hawaii conducts statewide elections in even-numbered years. The primary election is held on the second Saturday in August and the general election is held on the first Tuesday after the first Monday in November.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="717"><strong data-dcnode-id="718"><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elections.hawaii.gov/about-us/calendar/"><span data-dcnode-id="721" instrument_node="">View the election calendar for dates and deadlines</span></a><span data-dcnode-id="719" instrument_node="">.</span></strong></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="715" instrument_node="">Pursuant to </span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.capitol.hawaii.gov/measure_indiv.aspx%3Fbilltype%3DHB%26billnumber%3D1248%26year%3D2019"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Act 136, SLH 2019</span></strong></a><span data-dcnode-id="711" instrument_node="">, elections are conducted by mail. All registered voters automatically receive their ballot in the mail approximately eighteen (18) days prior to the election. Ballots are sent to the mailing address provided with the voter's voter registration. To register or update your voter registration, visit</span><strong data-dcnode-id="707"><span data-dcnode-id="710" instrument_node=""> </span><a data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elections.hawaii.gov/voters/registration/"><span data-dcnode-id="709" instrument_node="">Voter Registration</span></a></strong><span data-dcnode-id="706" instrument_node="">.</span></p><span data-dcnode-id="704" instrument_node="">
</span><h4 data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Primary Election</span></h4><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">The primary election nominates candidates to represent political parties in the general election. Similarly, candidates who do not belong to a political party will be nominated to the general election by meeting the </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elections.hawaii.gov/candidates/nonpartisan-candidates-in-partisan-contests/"><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">qualifications as a nonpartisan candidate running in a partisan contest.</span></strong></a></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Hawaii voters do not declare a political affiliation with the voter registration pursuant to the Hawaii State Constitution, ensuring every voter's right to secrecy. On the primary election ballot, voters must first select a political affiliation and then vote for candidates of the political affiliation of their choice only.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Voters may also vote for candidates for the Office of Hawaiian Affairs and county contests regardless of party affiliation.</span></p><span data-dcnode-id="689" instrument_node="">
</span><h4 data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">General Election</span></h4><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">The general election is a candidate contest, meaning that voters may vote for the candidate of their choice regardless of political affiliation. Voters will select federal, state, county, and Office of Hawaiian Affairs candidates, as well as State Constitutional Amendments and/or Charter Amendments.</span></p><span data-dcnode-id="683" instrument_node="">
</span><h4 data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Presidential Elections</span></h4><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="679" instrument_node="">Hawaii does not conduct a presidential primary. The political parties independently conduct presidential caucuses to nominate candidates for president and vice-president. For information on how to participate in the party-run presidential caucuses, contact the </span><strong data-dcnode-id="676"><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elections.hawaii.gov/political-parties/qualified-political-parties/"><span data-dcnode-id="678" instrument_node="">qualified political parties</span></a></strong><span data-dcnode-id="675" instrument_node=""> directly. The Electoral College elects the president and vice-president of the United States. </span><strong data-dcnode-id="671"><a data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elections.hawaii.gov/electoral-college/"><span data-dcnode-id="674" instrument_node="">Learn more about the Electoral College</span></a><span data-dcnode-id="672" instrument_node="">.</span></strong></p><span data-dcnode-id="669" instrument_node="">
</span><h3 data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Registering to Vote</span></h3><span data-dcnode-id="666" instrument_node="">
</span><hr data-dcnode-id="665"><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">To register to vote in the State of Hawaii, you must be:</span></p><span data-dcnode-id="661" instrument_node="">
</span><ul data-dcnode-id="644"><span data-dcnode-id="660" instrument_node="">
</span><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">A U.S. Citizen</span></li><span data-dcnode-id="657" instrument_node="">
</span><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">A resident of Hawaii</span></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="646"><span data-dcnode-id="653" instrument_node="">At least sixteen (16) years old.
</span><ul data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">
</span><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Hawaii law allows qualified individuals to pre-register at sixteen (16) years of age. Upon reaching eighteen (18) years of age, they will be automatically registered and mailed a ballot.</span></li><span data-dcnode-id="649" instrument_node="">
</span></ul><span data-dcnode-id="647" instrument_node="">
</span></li><span data-dcnode-id="645" instrument_node="">
</span></ul><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="639" style="text-align: left;"><strong data-dcnode-id="640"><a data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elections.hawaii.gov/voters/registration/"><span data-dcnode-id="642" instrument_node="">Learn more about Voter Registration.</span></a></strong></p><span data-dcnode-id="638" instrument_node="">
</span><h3 data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Voting by Mail</span></h3><span data-dcnode-id="635" instrument_node="">
</span><hr data-dcnode-id="634"><span data-dcnode-id="633" instrument_node="">
</span><h4 data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Keep Your Voter Registration Current</span></h4><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Ballots are mailed to the mailing address associated with your voter registration. If you move to a new residence, change your mailing address or name, you must update your voter registration. You may check online or contact your County Elections Division to confirm that your registration record is current.</span></p><span data-dcnode-id="627" instrument_node="">
</span><h4 data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Receiving Your Ballot</span></h4><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">You will receive a mail ballot packet by:</span></p><span data-dcnode-id="621" instrument_node="">
</span><ul data-dcnode-id="609"><span data-dcnode-id="620" instrument_node="">
</span><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="1" data-dcnode-id="615" data-font="Symbol" data-leveltext="" data-listid="7"><span data-contrast="auto" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Primary:&nbsp;July 26, 2022</span></span><span data-ccp-props="{&quot;134233279&quot;:true,&quot;201341983&quot;:0,&quot;335559739&quot;:0,&quot;335559740&quot;:240}" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">&nbsp;</span></span></li><span data-dcnode-id="614" instrument_node="">
</span><li aria-setsize="-1" data-aria-level="1" data-aria-posinset="2" data-dcnode-id="611" data-font="Symbol" data-leveltext="" data-listid="7"><span data-contrast="auto" data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">General:&nbsp;October 21, 2022</span></span></li><span data-dcnode-id="610" instrument_node="">
</span></ul><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Your packet consists of a ballot, ballot secrecy sleeve, and a prepaid postage return ballot envelope.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="604" instrument_node="">Voters with special needs may request for an </span><span class="TextRun Highlight BCX0 SCXW15654284" data-contrast="auto" data-dcnode-id="601" lang="EN-US" xml:lang="EN-US"><span class="NormalTextRun BCX0 SCXW15654284" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">electronic ballot through the Voter Registration Application or by contacting</span></span></span><span data-dcnode-id="600" instrument_node=""> their County Elections Division.</span></p><span data-dcnode-id="598" instrument_node="">
</span><h4 data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Returning Your Ballot</span></h4><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">You may return your voted ballot by mail or in person at a designated place of deposit within your county. Voted ballots must be received by your County Elections Division by 7:00 p.m. on Election Day.</span></p><span data-dcnode-id="592" instrument_node="">
</span><h4 data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Tracking Your Ballot</span></h4><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">You may check on the status of your ballot, whether it has been mailed and/or received, by contacting your County Elections Division.</span></p><span data-dcnode-id="586" instrument_node="">
</span><h4 data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Processing Your Ballot</span></h4><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Upon receipt of your return envelope, your County Elections Division validates the signature to confirm your identity. After your signature is validated, your ballot will be forwarded to state election officials to be counted.</span></p><span data-dcnode-id="580" instrument_node="">
</span><h4 data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Voting at a Voter Service Center</span></h4><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">The County Elections Divisions establish voter service centers that will be open 10 days prior and on Election Day. Services include accessible in person voting and same day registration.</span></p><span data-dcnode-id="574" instrument_node="">
</span><hr data-dcnode-id="573"><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">If you require special assistance (i.e. large print, taped materials, etc.) contact the Office of Elections at 453-VOTE (8683).</span></p><span data-dcnode-id="569" instrument_node="">
</span></div><span data-dcnode-id="567" instrument_node="">
</span></div></div></div><div class="so-panel widget widget_sow-editor panel-last-child" data-dcnode-id="316" data-index="2" id="panel-9634-0-0-2"><div class="panel-widget-style panel-widget-style-for-9634-0-0-2" data-dcnode-id="317"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="318"><h3 class="widget-title" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Frequently Asked Questions</span></h3><span data-dcnode-id="561" instrument_node="">
</span><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="320"><span data-dcnode-id="560" instrument_node="">
</span><span data-dcnode-id="557" instrument_node="">
</span><div class="wpsm_panel-group" data-dcnode-id="326" id="wpsm_accordion_12150"><span data-dcnode-id="556" instrument_node="">
</span><div class="wpsm_panel wpsm_panel-default" data-dcnode-id="525"><span data-dcnode-id="555" instrument_node="">
</span><div class="wpsm_panel-heading" data-dcnode-id="542" role="tab"><span data-dcnode-id="554" instrument_node="">
</span><h4 class="wpsm_panel-title" data-dcnode-id="544"><span data-dcnode-id="553" instrument_node="">
</span><a class="" data-dcnode-id="546" data-parent="#wpsm_accordion_12150 " data-target="#ac_12150_collapse1" data-toggle="collapse" href="javascript:void(0)"><span data-dcnode-id="552" instrument_node="">
</span><span class="ac_open_cl_icon fa fa-plus" data-dcnode-id="551"></span><span data-dcnode-id="550" instrument_node="">
</span><span class="ac_title_class" data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">
How do I vote? </span></span><span data-dcnode-id="547" instrument_node="">
</span></a><span data-dcnode-id="545" instrument_node="">
</span></h4><span data-dcnode-id="543" instrument_node="">
</span></div><span data-dcnode-id="541" instrument_node="">
</span><div class="wpsm_panel-collapse collapse" data-dcnode-id="527" id="ac_12150_collapse1"><span data-dcnode-id="540" instrument_node="">
</span><div class="wpsm_panel-body" data-dcnode-id="529"><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">You must be a registered voter to receive a ballot. Then, you will receive your ballot in the mail. To vote, review the instructions, contests, and candidates on your ballot and make your selections. You can also leave a contest blank and it will not impact your votes.
</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">After voting, fold the ballot and slip it into the ballot secrecy sleeve. Insert the ballot secrecy sleeve into your return envelope and be sure to sign. Your ballot cannot be counted without your signature on the return envelope. </span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Return your ballot by mail or by dropping it off at a place of deposit. Your voted ballot must be received by your County Elections Divisions by 7:00 pm on Election Day to be counted. </span></p><span data-dcnode-id="530" instrument_node=""> </span></div><span data-dcnode-id="528" instrument_node="">
</span></div><span data-dcnode-id="526" instrument_node="">
</span></div><span data-dcnode-id="524" instrument_node="">
</span><div class="wpsm_panel wpsm_panel-default" data-dcnode-id="489"><span data-dcnode-id="523" instrument_node="">
</span><div class="wpsm_panel-heading" data-dcnode-id="510" role="tab"><span data-dcnode-id="522" instrument_node="">
</span><h4 class="wpsm_panel-title" data-dcnode-id="512"><span data-dcnode-id="521" instrument_node="">
</span><a class="collapsed" data-dcnode-id="514" data-parent="#wpsm_accordion_12150 " data-target="#ac_12150_collapse2" data-toggle="collapse" href="javascript:void(0)"><span data-dcnode-id="520" instrument_node="">
</span><span class="ac_open_cl_icon fa fa-plus" data-dcnode-id="519"></span><span data-dcnode-id="518" instrument_node="">
</span><span class="ac_title_class" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">
When can I expect to receive my ballot? </span></span><span data-dcnode-id="515" instrument_node="">
</span></a><span data-dcnode-id="513" instrument_node="">
</span></h4><span data-dcnode-id="511" instrument_node="">
</span></div><span data-dcnode-id="509" instrument_node="">
</span><div class="wpsm_panel-collapse collapse" data-dcnode-id="491" id="ac_12150_collapse2"><span data-dcnode-id="508" instrument_node="">
</span><div class="wpsm_panel-body" data-dcnode-id="493"><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">You should expect to receive your mail ballot packet by:</span></p><span data-dcnode-id="504" instrument_node="">
</span><ul data-dcnode-id="498"><span data-dcnode-id="503" instrument_node="">
</span><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Primary Election: July 26, 2022
</span></li><li data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">General Election: October 21, 2022
</span></li></ul><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">If you do not, contact your County Elections Division for a replacement. </span></p><span data-dcnode-id="494" instrument_node=""> </span></div><span data-dcnode-id="492" instrument_node="">
</span></div><span data-dcnode-id="490" instrument_node="">
</span></div><span data-dcnode-id="488" instrument_node="">
</span><div class="wpsm_panel wpsm_panel-default" data-dcnode-id="466"><span data-dcnode-id="487" instrument_node="">
</span><div class="wpsm_panel-heading" data-dcnode-id="474" role="tab"><span data-dcnode-id="486" instrument_node="">
</span><h4 class="wpsm_panel-title" data-dcnode-id="476"><span data-dcnode-id="485" instrument_node="">
</span><a class="collapsed" data-dcnode-id="478" data-parent="#wpsm_accordion_12150 " data-target="#ac_12150_collapse3" data-toggle="collapse" href="javascript:void(0)"><span data-dcnode-id="484" instrument_node="">
</span><span class="ac_open_cl_icon fa fa-plus" data-dcnode-id="483"></span><span data-dcnode-id="482" instrument_node="">
</span><span class="ac_title_class" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">
What if I didn’t receive my ballot? </span></span><span data-dcnode-id="479" instrument_node="">
</span></a><span data-dcnode-id="477" instrument_node="">
</span></h4><span data-dcnode-id="475" instrument_node="">
</span></div><span data-dcnode-id="473" instrument_node="">
</span><div class="wpsm_panel-collapse collapse" data-dcnode-id="468" id="ac_12150_collapse3"><span data-dcnode-id="472" instrument_node="">
</span><div class="wpsm_panel-body" data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">
If you did not receive your ballot, please contact your County Elections Division and they will issue you a replacement ballot. </span></div><span data-dcnode-id="469" instrument_node="">
</span></div><span data-dcnode-id="467" instrument_node="">
</span></div><span data-dcnode-id="465" instrument_node="">
</span><div class="wpsm_panel wpsm_panel-default" data-dcnode-id="443"><span data-dcnode-id="464" instrument_node="">
</span><div class="wpsm_panel-heading" data-dcnode-id="451" role="tab"><span data-dcnode-id="463" instrument_node="">
</span><h4 class="wpsm_panel-title" data-dcnode-id="453"><span data-dcnode-id="462" instrument_node="">
</span><a class="collapsed" data-dcnode-id="455" data-parent="#wpsm_accordion_12150 " data-target="#ac_12150_collapse4" data-toggle="collapse" href="javascript:void(0)"><span data-dcnode-id="461" instrument_node="">
</span><span class="ac_open_cl_icon fa fa-plus" data-dcnode-id="460"></span><span data-dcnode-id="459" instrument_node="">
</span><span class="ac_title_class" data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">
What if I make a mistake on my ballot? </span></span><span data-dcnode-id="456" instrument_node="">
</span></a><span data-dcnode-id="454" instrument_node="">
</span></h4><span data-dcnode-id="452" instrument_node="">
</span></div><span data-dcnode-id="450" instrument_node="">
</span><div class="wpsm_panel-collapse collapse" data-dcnode-id="445" id="ac_12150_collapse4"><span data-dcnode-id="449" instrument_node="">
</span><div class="wpsm_panel-body" data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">
If you make a mistake, misplace, or damage your ballot, you may request for a replacement ballot with your County Elections Division. </span></div><span data-dcnode-id="446" instrument_node="">
</span></div><span data-dcnode-id="444" instrument_node="">
</span></div><span data-dcnode-id="442" instrument_node="">
</span><div class="wpsm_panel wpsm_panel-default" data-dcnode-id="420"><span data-dcnode-id="441" instrument_node="">
</span><div class="wpsm_panel-heading" data-dcnode-id="428" role="tab"><span data-dcnode-id="440" instrument_node="">
</span><h4 class="wpsm_panel-title" data-dcnode-id="430"><span data-dcnode-id="439" instrument_node="">
</span><a class="collapsed" data-dcnode-id="432" data-parent="#wpsm_accordion_12150 " data-target="#ac_12150_collapse5" data-toggle="collapse" href="javascript:void(0)"><span data-dcnode-id="438" instrument_node="">
</span><span class="ac_open_cl_icon fa fa-plus" data-dcnode-id="437"></span><span data-dcnode-id="436" instrument_node="">
</span><span class="ac_title_class" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">
Will my vote still count if I did not vote on all measures and/or candidates? </span></span><span data-dcnode-id="433" instrument_node="">
</span></a><span data-dcnode-id="431" instrument_node="">
</span></h4><span data-dcnode-id="429" instrument_node="">
</span></div><span data-dcnode-id="427" instrument_node="">
</span><div class="wpsm_panel-collapse collapse" data-dcnode-id="422" id="ac_12150_collapse5"><span data-dcnode-id="426" instrument_node="">
</span><div class="wpsm_panel-body" data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">
Yes, your ballot will still be counted. </span></div><span data-dcnode-id="423" instrument_node="">
</span></div><span data-dcnode-id="421" instrument_node="">
</span></div><span data-dcnode-id="419" instrument_node="">
</span><div class="wpsm_panel wpsm_panel-default" data-dcnode-id="397"><span data-dcnode-id="418" instrument_node="">
</span><div class="wpsm_panel-heading" data-dcnode-id="405" role="tab"><span data-dcnode-id="417" instrument_node="">
</span><h4 class="wpsm_panel-title" data-dcnode-id="407"><span data-dcnode-id="416" instrument_node="">
</span><a class="collapsed" data-dcnode-id="409" data-parent="#wpsm_accordion_12150 " data-target="#ac_12150_collapse6" data-toggle="collapse" href="javascript:void(0)"><span data-dcnode-id="415" instrument_node="">
</span><span class="ac_open_cl_icon fa fa-plus" data-dcnode-id="414"></span><span data-dcnode-id="413" instrument_node="">
</span><span class="ac_title_class" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">
Can I change my mind after I’ve returned the ballot? </span></span><span data-dcnode-id="410" instrument_node="">
</span></a><span data-dcnode-id="408" instrument_node="">
</span></h4><span data-dcnode-id="406" instrument_node="">
</span></div><span data-dcnode-id="404" instrument_node="">
</span><div class="wpsm_panel-collapse collapse" data-dcnode-id="399" id="ac_12150_collapse6"><span data-dcnode-id="403" instrument_node="">
</span><div class="wpsm_panel-body" data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">
No. Once you return your ballot and is received by the County Elections Division, it is considered cast and you will not be able to receive a new ballot. </span></div><span data-dcnode-id="400" instrument_node="">
</span></div><span data-dcnode-id="398" instrument_node="">
</span></div><span data-dcnode-id="396" instrument_node="">
</span><div class="wpsm_panel wpsm_panel-default" data-dcnode-id="374"><span data-dcnode-id="395" instrument_node="">
</span><div class="wpsm_panel-heading" data-dcnode-id="382" role="tab"><span data-dcnode-id="394" instrument_node="">
</span><h4 class="wpsm_panel-title" data-dcnode-id="384"><span data-dcnode-id="393" instrument_node="">
</span><a class="collapsed" data-dcnode-id="386" data-parent="#wpsm_accordion_12150 " data-target="#ac_12150_collapse7" data-toggle="collapse" href="javascript:void(0)"><span data-dcnode-id="392" instrument_node="">
</span><span class="ac_open_cl_icon fa fa-plus" data-dcnode-id="391"></span><span data-dcnode-id="390" instrument_node="">
</span><span class="ac_title_class" data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">
Why do I have to sign the return ballot envelope? </span></span><span data-dcnode-id="387" instrument_node="">
</span></a><span data-dcnode-id="385" instrument_node="">
</span></h4><span data-dcnode-id="383" instrument_node="">
</span></div><span data-dcnode-id="381" instrument_node="">
</span><div class="wpsm_panel-collapse collapse" data-dcnode-id="376" id="ac_12150_collapse7"><span data-dcnode-id="380" instrument_node="">
</span><div class="wpsm_panel-body" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">
Your signature on the return envelope enables election officials to verify you as the voter. The signature you provide on the return ballot envelope is verified against the signature on file in your voter registration record. If you do not sign your return ballot envelope, your ballot will not be counted. </span></div><span data-dcnode-id="377" instrument_node="">
</span></div><span data-dcnode-id="375" instrument_node="">
</span></div><span data-dcnode-id="373" instrument_node="">
</span><div class="wpsm_panel wpsm_panel-default" data-dcnode-id="351"><span data-dcnode-id="372" instrument_node="">
</span><div class="wpsm_panel-heading" data-dcnode-id="359" role="tab"><span data-dcnode-id="371" instrument_node="">
</span><h4 class="wpsm_panel-title" data-dcnode-id="361"><span data-dcnode-id="370" instrument_node="">
</span><a class="collapsed" data-dcnode-id="363" data-parent="#wpsm_accordion_12150 " data-target="#ac_12150_collapse8" data-toggle="collapse" href="javascript:void(0)"><span data-dcnode-id="369" instrument_node="">
</span><span class="ac_open_cl_icon fa fa-plus" data-dcnode-id="368"></span><span data-dcnode-id="367" instrument_node="">
</span><span class="ac_title_class" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">
How can I receive my ballot if I’m on vacation or away at college? </span></span><span data-dcnode-id="364" instrument_node="">
</span></a><span data-dcnode-id="362" instrument_node="">
</span></h4><span data-dcnode-id="360" instrument_node="">
</span></div><span data-dcnode-id="358" instrument_node="">
</span><div class="wpsm_panel-collapse collapse" data-dcnode-id="353" id="ac_12150_collapse8"><span data-dcnode-id="357" instrument_node="">
</span><div class="wpsm_panel-body" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">
If you will be away during the election you may request for a ballot to be mailed to an alternate address. Simply complete an absentee application and indicate where you would like your ballot to be mailed to. </span></div><span data-dcnode-id="354" instrument_node="">
</span></div><span data-dcnode-id="352" instrument_node="">
</span></div><span data-dcnode-id="350" instrument_node="">
</span><div class="wpsm_panel wpsm_panel-default" data-dcnode-id="328"><span data-dcnode-id="349" instrument_node="">

</span><span class="ac_open_cl_icon fa fa-plus" data-dcnode-id="345"></span><span data-dcnode-id="344" instrument_node="">
</span><span class="ac_title_class" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">
Can I still vote in-person? </span></span><span data-dcnode-id="341" instrument_node="">
</span></a><span data-dcnode-id="339" instrument_node="">
</span></h4><span data-dcnode-id="337" instrument_node="">
</span></div><span data-dcnode-id="335" instrument_node="">
</span><div class="wpsm_panel-collapse collapse" data-dcnode-id="330" id="ac_12150_collapse9"><span data-dcnode-id="334" instrument_node="">
</span><div class="wpsm_panel-body" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">
Yes, you may vote in-person by visiting any voter service center in your county. Voter service centers are open 10 days through Election Day for in-person voting, same day registration and accessible voting. </span></div><span data-dcnode-id="331" instrument_node="">
