</span><p data-dcnode-id="307"><b data-dcnode-id="308"><b data-dcnode-id="309"><span data-dcnode-id="310" style="font-size: 13px;"><span data-dcnode-id="311" instrument_node="">Oct 28 - Robotics student/faculty mixer</span></span></b></b></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="295"><b data-dcnode-id="296"><b data-dcnode-id="297"><span data-dcnode-id="298" style="font-size: 13px;"><span data-dcnode-id="305" instrument_node="">Oct 21 - Anca Dragan, Carnegie Mellon&nbsp; </span><em data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Interaction as Manipulation</span></em><span data-dcnode-id="302" instrument_node=""> (</span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/129"><span data-dcnode-id="301" instrument_node="">video</span></a><span data-dcnode-id="299" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="294" instrument_node="">
</span><blockquote data-dcnode-id="281"><p data-dcnode-id="289"><b data-dcnode-id="290"><b data-dcnode-id="291"><span data-dcnode-id="292" style="font-size: 13px;"><span data-dcnode-id="293" instrument_node="">The goal of my research is to enable robots to autonomously produce behavior that reasons about function _and_ interaction with and around people. I aim to develop a formal understanding of interaction that leads to algorithms which are informed by mathematical models of how people interact with robots, enabling generalization across robot morphologies and interaction modalities.</span></span></b></b></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="283"><b data-dcnode-id="284"><b data-dcnode-id="285"><span data-dcnode-id="286" style="font-size: 13px;"><span data-dcnode-id="287" instrument_node="">In this talk, I will focus on one specific instance of this agenda: autonomously generating motion for coordination during human-robot collaborative manipulation. Most motion in robotics is purely functional: industrial robots move to package parts, vacuuming robots move to suck dust, and personal robots move to clean up a dirty table. This type of motion is ideal when the robot is performing a task in isolation. Collaboration, however, does not happen in isolation, and demands that we move beyond purely functional motion. In collaboration, the robot's motion has an observer, watching and interpreting the motion – inferring the robot's intent from the motion, and anticipating the robot's motion based on its intent. My work develops a mathematical model of these inferences, and integrates this model into motion planning, so that the robot can generate motion that matches people's expectations and clearly conveys its intent. In doing so, I draw on action interpretation theory, Bayesian inference, constrained trajectory optimization, and interactive learning. The resulting motion not only leads to more efficient collaboration, but also increases the fluency of the interaction as defined through both objective and subjective measures. The underlying formalism has been applied across robot morphologies, from manipulator arms to mobile robots, and across interaction modalities, such as motion, gestures, and shared autonomy with assistive arms.</span></span></b></b></p><span data-dcnode-id="282" instrument_node="">
</span></blockquote><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="269"><b data-dcnode-id="270"><b data-dcnode-id="271"><span data-dcnode-id="272" style="font-size: 13px;"><span data-dcnode-id="279" instrument_node="">Oct 14 - Sangbae Kim, MIT </span><em data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">The actuation and the control of the MIT Cheetah </span></em><span data-dcnode-id="276" instrument_node="">(</span><a data-dcnode-id="274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/120"><span data-dcnode-id="275" instrument_node="">video</span></a><span data-dcnode-id="273" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="268" instrument_node="">
</span><blockquote data-dcnode-id="261"><p data-dcnode-id="263"><b data-dcnode-id="264"><b data-dcnode-id="265"><span data-dcnode-id="266" style="font-size: 13px;"><span data-dcnode-id="267" instrument_node="">Biological machines created by millions of years of evolution suggest a paradigm shift in robotic design. Realizing animals’ magnificent locomotive capabilities is next big challenge in mobile robotic applications. The main theme of MIT Biomimetic Robotics Laboratory is innovation through ‘principle extraction’ from biology. The embodiment of such innovations includes Stickybot that employs the world’s first synthetic directional dry adhesive inspired by geckos, and the MIT Cheetah, designed after the fastest land animal. The design principles in structures, actuation and control algorithms applied in the MIT Cheetah will be presented during the talk. The Kim’s creations are opening new frontiers in robotics and leading to advanced mobile robots that can save lives in dangerous situations, and new all-around robotic transportation systems for the mobility-impaired.</span></span></b></b></p><span data-dcnode-id="262" instrument_node="">
</span></blockquote><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="253"><b data-dcnode-id="254"><b data-dcnode-id="255"><span data-dcnode-id="256" style="font-size: 13px;"><span data-dcnode-id="259" instrument_node="">Oct 7 - Nick Roy, MIT&nbsp; </span><em data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Project Wing: Self-flying vehicles for Package Delivery</span></em></span></b></b></p><span data-dcnode-id="252" instrument_node="">
</span><blockquote data-dcnode-id="245"><p data-dcnode-id="247"><b data-dcnode-id="248"><b data-dcnode-id="249"><span data-dcnode-id="250" style="font-size: 13px;"><span data-dcnode-id="251" instrument_node="">Autonomous UAVs, or "self-flying vehicles", hold the promise of transforming a number of industries, and changing how we move things around the world. Building from the foundation of decades of research in autonomy and UAVs, Google launched Project Wing in 2012 and recently announced trials of a delivery service using a small fleet of autonomous UAVs in Australia. In this talk, I will provide an introduction to the work Google has been doing in developing this service, describe the capabilities (and limitations) of the vehicles, and talk briefly about the promise of UAVs in general.</span></span></b></b></p><span data-dcnode-id="246" instrument_node="">
</span></blockquote><span data-dcnode-id="244" instrument_node="">
