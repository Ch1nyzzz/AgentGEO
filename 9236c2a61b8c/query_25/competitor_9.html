</span><p data-dcnode-id="3586" wrap=""><b data-dcnode-id="3587"><b data-dcnode-id="3588"><span data-dcnode-id="3600" instrument_node="">October 30, </span><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cs.princeton.edu/~funk/"><span data-dcnode-id="3599" instrument_node="">Thomas Funkhouser</span></a><span data-dcnode-id="3597" instrument_node="">, Princeton/Google</span><strong data-dcnode-id="3593"><span data-dcnode-id="3596" instrument_node=""> </span><em data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">3D Scene Understanding with a RGB-D Camera </span></em></strong><span data-dcnode-id="3592" instrument_node="">(</span><a data-dcnode-id="3590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/1032"><span data-dcnode-id="3591" instrument_node="">video</span></a><span data-dcnode-id="3589" instrument_node="">)</span></b></b></p><span data-dcnode-id="3585" instrument_node="">
</span><blockquote data-dcnode-id="3557"><p data-dcnode-id="3581" wrap=""><b data-dcnode-id="3582"><b data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">Three-dimensional scene understanding is important for computer systems that respond to and/or interact with the physical world, such as robotic manipulation and autonomous navigatio. For example, they may need to estimate the 3D geometry of the surrounding space (e.g., in order to navigate without collisions) and/or to recognize the semantic categories of nearby objects (e.g., in order to interact with them appropriately). In this talk, I will describe recent work on 3D scene understanding by the 3D Vision Group at Princeton University. I will focus on three projects that infer 3D structural and semantic models of scenes from partial observations with a RGB-D camera. The first learns to infer depth (D) from color (RGB) in regions where the depth sensor provides no return (e.g., because surfaces are shiny or far away). The second learns to predict the 3D structure and semantics within volumes of space occluded from view (e.g., behind a table). The third learns to infer the 3D structure and semantics of the entire surrounding environment (i.e., inferring an annotated 360 degree panorama from a single image). For each project, I will discuss the problem formulation, scene representation, network architecture, dataset curation, and potential applications.</span></b></b></p><span data-dcnode-id="3580" instrument_node="">
</span><p data-dcnode-id="3576" wrap=""><b data-dcnode-id="3577"><b data-dcnode-id="3578"><span data-dcnode-id="3579" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3575" instrument_node="">
</span><p data-dcnode-id="3571" wrap=""><b data-dcnode-id="3572"><b data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">This is joint work with Angel X. Chang, Angela Dai, Kyle Genova, Maciej Halber, Matthias Niessner, Shuran Song, Fisher Yu, Andy Zeng, and Yinda Zhang.</span></b></b></p><span data-dcnode-id="3570" instrument_node="">
</span><p data-dcnode-id="3566" wrap=""><b data-dcnode-id="3567"><b data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3565" instrument_node="">
</span><p data-dcnode-id="3559" wrap=""><b data-dcnode-id="3560"><b data-dcnode-id="3561"><strong data-dcnode-id="3563"><span data-dcnode-id="3564" instrument_node="">Bio:</span></strong><span data-dcnode-id="3562" instrument_node=""> Thomas Funkhouser is the David M. Siegel Professor of Computer Science at Princeton University. He received a PhD in computer science from UC Berkeley in 1993 and was a member of the technical staff at Bell Labs until 1997 before joining the faculty at Princeton. For most of his career, he focused on research problems in computer graphics, including foundational work on 3D shape retrieval, analysis, and modeling. His most recent research has focused on 3D scene understanding in computer vision and robotics. He has published more than 100 research papers and received several awards, including a ACM SIGGRAPH Computer Graphics Achievement Award, ACM SIGGRAPH Academy membership, NSF Career Award, Sloan Foundation Fellowship, Emerson Electric, E. Lawrence Keyes Faculty Advancement Award, and University Council Excellence in Teaching Awards.</span></b></b></p><span data-dcnode-id="3558" instrument_node="">
</span></blockquote><span data-dcnode-id="3556" instrument_node="">
</span><p data-dcnode-id="3552"><b data-dcnode-id="3553"><b data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3551" instrument_node="">
</span><p data-dcnode-id="3536"><b data-dcnode-id="3537"><b data-dcnode-id="3538"><span data-dcnode-id="3550" instrument_node="">October 23, </span><a data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cc.gatech.edu/~bboots3/"><span data-dcnode-id="3549" instrument_node="">Byron Boots</span></a><span data-dcnode-id="3547" instrument_node="">, Georgia Tech </span><strong data-dcnode-id="3543"><em data-dcnode-id="3545"><span data-dcnode-id="3546" instrument_node="">Machine Learning for Robot Perception, Planning, and Control</span></em><span data-dcnode-id="3544" instrument_node=""> </span></strong><span data-dcnode-id="3542" instrument_node="">(</span><a data-dcnode-id="3540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/1021"><span data-dcnode-id="3541" instrument_node="">video</span></a><span data-dcnode-id="3539" instrument_node="">)</span></b></b></p><span data-dcnode-id="3535" instrument_node="">
</span><blockquote data-dcnode-id="3517"><p data-dcnode-id="3531" wrap=""><b data-dcnode-id="3532"><b data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">The main goal of this talk is to illustrate how machine learning can start to address some of the fundamental perceptual and control challenges involved in building intelligent robots. I’ll discuss how to learn dynamics models for planning and control, how to use imitation to efficiently learn deep policies directly from sensor data, and how policies can be parameterized with task-relevant structure. I’ll show how some of these ideas have been applied to a new high speed autonomous “AutoRally” platform built at Georgia Tech and an off-road racing task that requires impressive sensing, speed, and agility to complete. Along the way, I’ll show how theoretical insights from reinforcement learning, imitation learning, and online learning help us to overcome practical challenges involved in learning on real-world platforms. I will conclude by discussing ongoing work in my lab related to machine learning for robotics.</span></b></b></p><span data-dcnode-id="3530" instrument_node="">
</span><p data-dcnode-id="3526" wrap=""><b data-dcnode-id="3527"><b data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3525" instrument_node="">
</span><p data-dcnode-id="3519" wrap=""><b data-dcnode-id="3520"><b data-dcnode-id="3521"><strong data-dcnode-id="3523"><span data-dcnode-id="3524" instrument_node="">Bio:</span></strong><span data-dcnode-id="3522" instrument_node=""> Byron Boots is an Assistant Professor of Interactive Computing in the College of Computing at the Georgia Institute of Technology. He concurrently holds an adjunct appointment in the School of Electrical and Computer Engineering at Georgia Tech and a Visiting Faculty appointment at Nvidia Research. Byron received his M.S. and Ph.D. in Machine Learning from Carnegie Mellon University and was a postdoctoral scholar in Computer Science and Engineering at the University of Washington. He joined Georgia Tech in 2014, where he founded the Georgia Tech Robot Learning Lab, affiliated with the Center for Machine Learning and the Institute for Robotics and Intelligent Machines. Byron is the recipient of several awards including Best Paper at ICML, Best Paper at AISTATS, Best Paper Finalist at ICRA, Best Systems Paper Finalist at RSS, and the NSF CAREER award. His main research interests are in theory and systems that tightly integrate perception, learning, and control.</span></b></b></p><span data-dcnode-id="3518" instrument_node="">
</span></blockquote><span data-dcnode-id="3516" instrument_node="">
</span><p data-dcnode-id="3512"><b data-dcnode-id="3513"><b data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3511" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3496" wrap=""><b data-dcnode-id="3497"><b data-dcnode-id="3498"><span data-dcnode-id="3510" instrument_node="">October 16, </span><a data-dcnode-id="3508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.seas.harvard.edu/directory/rjwood"><span data-dcnode-id="3509" instrument_node="">Rob Wood</span></a><span data-dcnode-id="3507" instrument_node="">, Harvard University </span><strong data-dcnode-id="3503"><em data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">The Mechanical Side of Artificial Intelligence</span></em><span data-dcnode-id="3504" instrument_node=""> </span></strong><span data-dcnode-id="3502" instrument_node="">(</span><a data-dcnode-id="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/1012"><span data-dcnode-id="3501" instrument_node="">video</span></a><span data-dcnode-id="3499" instrument_node=""> - no audio)</span></b></b></p><span data-dcnode-id="3495" instrument_node="">
</span><blockquote data-dcnode-id="3477"><p data-dcnode-id="3491"><b data-dcnode-id="3492"><b data-dcnode-id="3493"><span data-dcnode-id="3494" instrument_node="">Artificial Intelligence typically focuses on perception, learning, and control methods to enable autonomous robots to make and act on decisions in real environments. On the contrary, our research is focused on the design, mechanics, materials, and manufacturing of novel robot platforms that make the perception, control, or action easier or more robust for natural, unstructured, and often unpredictable environments. Key principles in this pursuit include bioinspired designs, smart materials for novel sensors and actuators, and the development of multi-scale, multi-material manufacturing methods. This talk will illustrate this philosophy by highlighting the creation of two unique classes of robots: soft-bodied autonomous robots and highly agile aerial and terrestrial robotic insects.</span></b></b></p><span data-dcnode-id="3490" instrument_node="">
</span><p data-dcnode-id="3486"><b data-dcnode-id="3487"><b data-dcnode-id="3488"><span data-dcnode-id="3489" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3485" instrument_node="">
</span><p data-dcnode-id="3479"><b data-dcnode-id="3480"><b data-dcnode-id="3481"><strong data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">Bio:</span></strong><span data-dcnode-id="3482" instrument_node=""> Robert Wood is the Charles River Professor of Engineering and Applied Sciences in the Harvard John A. Paulson School of Engineering and Applied Sciences, a founding core faculty member of the Wyss Institute for Biologically Inspired Engineering and a National Geographic Explorer. Prof. Wood completed his M.S. and Ph.D. degrees in the Dept. of Electrical Engineering and Computer Sciences at the University of California, Berkeley. He is the winner of multiple awards for his work including the DARPA Young Faculty Award, NSF Career Award, ONR Young Investigator Award, Air Force Young Investigator Award, Technology Review's TR35, and multiple best paper awards. In 2010 Wood received the Presidential Early Career Award for Scientists and Engineers from President Obama for his work in microrobotics. In 2012 he was selected for the Alan T. Waterman award, the National Science Foundation's most prestigious early career award. In 2014 he was named one of National Geographic's "Emerging Explorers". Wood's group is also dedicated to STEM education by using novel robots to motivate young students to pursue careers in science and engineering.</span></b></b></p><span data-dcnode-id="3478" instrument_node="">
</span></blockquote><span data-dcnode-id="3476" instrument_node="">
</span><p data-dcnode-id="3472"><b data-dcnode-id="3473"><b data-dcnode-id="3474"><span data-dcnode-id="3475" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3471" instrument_node="">
</span><p data-dcnode-id="3456"><b data-dcnode-id="3457"><b data-dcnode-id="3458"><span data-dcnode-id="3470" instrument_node="">September 25, </span><a data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//Matei%20Ciocarlie%20%2C%20Columbia%20University/"><span data-dcnode-id="3469" instrument_node="">Matei Ciocarlie</span></a><span data-dcnode-id="3467" instrument_node="">, Columbia University </span><strong data-dcnode-id="3463"><em data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">How to Make, Sense, and Make Sense of Contact in Robotic Manipulation</span></em><span data-dcnode-id="3464" instrument_node=""> </span></strong><span data-dcnode-id="3462" instrument_node="">(</span><a data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/983"><span data-dcnode-id="3461" instrument_node="">video</span></a><span data-dcnode-id="3459" instrument_node=""> - intermitent audio for the first ~20mins)</span></b></b></p><span data-dcnode-id="3455" instrument_node="">
</span><blockquote data-dcnode-id="3437"><p data-dcnode-id="3451"><b data-dcnode-id="3452"><b data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">Dexterous manipulation is a key open problem for many new robotic applications, owing in great measure to the difficulty of dealing with transient contact. From an analytical standpoint, intermittent frictional contact (the essence of manipulation) is difficult to model, as it gives rise to non convex problems with no known efficient solvers. Contact is also difficult to sense, particularly with sensors integrated in a mechanical package that must also be compact, highly articulated and appropriately actuated (i.e. a robot hand). Articulation and actuation present their own challenges: a dexterous hand comes with a high-dimensional posture space, difficult to design, actuate, and control. In this talk, I will present our work trying to address these challenges: analytical models of grasp stability (with realistic energy dissipation constraints), design and use of sensors (tactile and proprioceptive) for manipulation, and hand posture subspaces (for design optimization and teleoperation). These are stepping stones towards achieving versatile robotic manipulation, needed by applications as diverse as logistics, manufacturing, disaster response and space robots.</span></b></b></p><span data-dcnode-id="3450" instrument_node="">
</span><p data-dcnode-id="3446"><b data-dcnode-id="3447"><b data-dcnode-id="3448"><span data-dcnode-id="3449" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3445" instrument_node="">
</span><p data-dcnode-id="3439"><b data-dcnode-id="3440"><b data-dcnode-id="3441"><strong data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">Bio:</span></strong><span data-dcnode-id="3442" instrument_node=""> Matei Ciocarlie is an Associate Professor of Mechanical Engineering at Columbia University. His current work focuses on robot motor control, mechanism and sensor design, planning and learning, all aiming to demonstrate complex motor skills such as dexterous manipulation. Matei completed his Ph.D. at Columbia University in New York; before joining the faculty at Columbia, he was a Research Scientist and Group Manager at Willow Garage, Inc., a privately funded Silicon Valley robotics research lab, and then a Senior Research Scientist at Google, Inc. In recognition of his work, Matei has been awarded the Early Career Award by the IEEE Robotics and Automation Society, a Young Investigator Award by the Office of Naval Research, a CAREER Award by the National Science Foundation, and a Sloan Research Fellowship by the Alfred P. Sloan Foundation.</span></b></b></p><span data-dcnode-id="3438" instrument_node="">
</span></blockquote><span data-dcnode-id="3436" instrument_node="">
</span><p data-dcnode-id="3432"><b data-dcnode-id="3433"><b data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3431" instrument_node="">
</span><p data-dcnode-id="3415"><b data-dcnode-id="3416"><b data-dcnode-id="3417"><strong data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">Spring 2018 Campus-wide Robotics Seminar</span></strong><strong data-dcnode-id="3418"><span data-dcnode-id="3428" instrument_node=""> (sponsored by </span><a data-dcnode-id="3426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aurora.aero/"><span data-dcnode-id="3427" instrument_node="">Aurora Flight Sciences</span></a><span data-dcnode-id="3425" instrument_node=""> , </span><a data-dcnode-id="3423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mathworks.com/"><span data-dcnode-id="3424" instrument_node="">The MathWorks</span></a><span data-dcnode-id="3422" instrument_node=""> , and the </span><a data-dcnode-id="3420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.russellsage.org/"><span data-dcnode-id="3421" instrument_node="">Russell Sage Foundation</span></a><span data-dcnode-id="3419" instrument_node=""> )&nbsp; </span></strong></b></b></p><span data-dcnode-id="3414" instrument_node="">
</span><p data-dcnode-id="3400"><b data-dcnode-id="3401"><b data-dcnode-id="3402"><span data-dcnode-id="3413" instrument_node="">May 29, </span><a data-dcnode-id="3411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//robotics.stanford.edu/~jks/"><span data-dcnode-id="3412" instrument_node="">Kenneth Salisbury</span></a><span data-dcnode-id="3410" instrument_node="">, Stanford </span><em data-dcnode-id="3407"><strong data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">Who Doesn't Want Another Arm? </span></strong></em><span data-dcnode-id="3406" instrument_node="">(</span><a data-dcnode-id="3404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/910"><span data-dcnode-id="3405" instrument_node="">video</span></a><span data-dcnode-id="3403" instrument_node="">, CSAIL only)</span></b></b></p><span data-dcnode-id="3399" instrument_node="">
</span><blockquote data-dcnode-id="3393"><p data-dcnode-id="3395"><b data-dcnode-id="3396"><b data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">Our laboratory has been developing wearable robot arms. They are designed to augment your capabilities and dexterity through physical cooperation. These "Third Arms" are typically waist-mounted and designed to work in the volume directly in front of you, cooperating with your arms' actions. We are not developing fast or strong robots, rather we focus on the interaction design issues and variety of task opportunities that arise. Putting a robot directly in your personal space enables new ways for human-robot cooperation. Ours are designed to contact the environment with all their surfaces. This enables "whole-arm manipulation" as well as end-effector-based actions. How should you communicate with such a robot? How do you it teach it physical tasks? Can it learn by observing things you do and anticipate helpful actions? In this talk I will describe our work on wearables and discuss the design process leading to current embodiments. Be prepared to tell me what your favorite 3rd arm task is!!</span></b></b></p><span data-dcnode-id="3394" instrument_node="">
</span></blockquote><span data-dcnode-id="3392" instrument_node="">
</span><blockquote data-dcnode-id="3384"><p data-dcnode-id="3386"><b data-dcnode-id="3387"><b data-dcnode-id="3388"><strong data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">Bio:</span></strong><span data-dcnode-id="3389" instrument_node=""> Professor Salisbury received his Ph.D. from Stanford in 1982. That fall he arrived at MIT for a one year post-doc. He says he was having so much fun that he ended up spending the next 16 years at the 'tute. He then spent four years at Intuitive Surgical helping develop the first-gen da Vinci robot. He then returned to Stanford to become a Professor in the Departments of Computer Science and Surgery. He and his students have been responsible for a number of seminal technologies including the Salisbury Hands, the PHANToM Haptic Interface, the MIT WAM/Barrett Arm, the da Vinci Haptic Interface, the Silver Falcon Medical Robot, implicit surface and polyhedral haptic rendering techniques, the JPL Force Reflecting Hand Controller, and other devices. Kenneth is inventor or co-inventor on over 50 patents on robotics, haptics, sensors, rendering, UI and other topics. His current research interests include arm design, active physical perception, high fidelity haptics. In his spare time, he plays the flute a lot and makes things.</span></b></b></p><span data-dcnode-id="3385" instrument_node="">
</span></blockquote><span data-dcnode-id="3383" instrument_node="">
</span><p data-dcnode-id="3369"><b data-dcnode-id="3370"><b data-dcnode-id="3371"><span data-dcnode-id="3382" instrument_node="">May 1, </span><a data-dcnode-id="3380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//lentinklab.stanford.edu/"><span data-dcnode-id="3381" instrument_node="">David Lentink</span></a><span data-dcnode-id="3379" instrument_node="">, Stanford </span><em data-dcnode-id="3376"><strong data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">Avian Inspired Design </span></strong></em><span data-dcnode-id="3375" instrument_node="">(</span><a data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/875"><span data-dcnode-id="3374" instrument_node="">video</span></a><span data-dcnode-id="3372" instrument_node="">, CSAIL only)</span></b></b></p><span data-dcnode-id="3368" instrument_node="">
</span><blockquote data-dcnode-id="3362"><p data-dcnode-id="3364"><b data-dcnode-id="3365"><b data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">Many organisms fly in order to survive and reproduce. My lab focusses on understanding bird flight to improve flying robots—because birds fly further, longer, and more reliable in complex visual and wind environments. I use this multidisciplinary lens that integrates biomechanics, aerodynamics, and robotics to advance our understanding of the evolution of flight more generally across birds, bats, insects, and autorotating seeds. The development of flying organisms as an individual and their evolution as a species are shaped by the physical interaction between organism and surrounding air. The organism’s architecture is tuned for propelling itself and controlling its motion. Flying animals and plants maximize performance by generating and manipulating vortices. These vortices are created close to the body as it is driven by the action of muscles or gravity, then are ‘shed’ to form a wake (a trackway left behind in the fluid). I study how the organism’s architecture is tuned to utilize these and other aeromechanical principles to compare the function of bird wings to that of bat, insect, and maple seed wings. The experimental approaches range from making robotic models to training birds to fly in a custom-designed wind tunnel as well as in visual flight arena’s—and inventing methods to 3D scan birds and measure the aerodynamic force they generate—nonintrusively—with a novel aerodynamic force platform. The studies reveal that animals and plants have converged upon the same solution for generating high lift: A strong vortex that runs parallel to the leading edge of the wing, which it sucks upward. Why this vortex remains stably attached to flapping animal and spinning plant wings is elucidated and linked to kinematics and wing morphology. While wing morphology is quite rigid in insects and maple seeds, it is extremely fluid in birds. I will show how such ‘wing morphing’ significantly expands the performance envelope of birds during flight, and will dissect the mechanisms that enable birds to morph better than any aircraft can. Finally, I will show how these findings have inspired my students to design new flapping and morphing aerial robots.</span></b></b></p><span data-dcnode-id="3363" instrument_node="">
</span></blockquote><span data-dcnode-id="3361" instrument_node="">
</span><blockquote data-dcnode-id="3350"><p data-dcnode-id="3352"><b data-dcnode-id="3353"><b data-dcnode-id="3354"><strong data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">Bio:</span></strong><span data-dcnode-id="3358" instrument_node=""> Professor&nbsp;Lentink's multidisciplinary lab studies how birds fly to develop better flying robots—integrating biomechanics, fluid mechanics, and robot design. He has a BS and MS in Aerospace Engineering (Aerodynamics, Delft University of Technology) and a PhD in Experimental Zoology </span><em data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">cum laude</span></em><span data-dcnode-id="3355" instrument_node=""> (Wageningen University). During his PhD he visited the California institute of Technology for 9 months to study insect flight. His postdoctoral training at Harvard was focused on studying bird flight. Publications range from technical journals to cover publications in Nature and Science. He is an alumnus of the Young Academy of the Royal Netherlands Academy of Arts and Sciences, recipient of the Dutch Academic Year Prize, the NSF CAREER award, he has been recognized in 2013 as one of 40 scientists under 40 by the World Economic Forum, and he is the inaugural winner of the Steven Vogel Young Investigator Award from the Journal Bioinspiration &amp; Biomimetics for early career brilliance.</span></b></b></p><span data-dcnode-id="3351" instrument_node="">
</span></blockquote><span data-dcnode-id="3349" instrument_node="">
</span><p data-dcnode-id="3335"><b data-dcnode-id="3336"><b data-dcnode-id="3337"><span data-dcnode-id="3348" instrument_node="">April 24, </span><a data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mykel.kochenderfer.com/"><span data-dcnode-id="3347" instrument_node="">Mykel Kochenderfer</span></a><span data-dcnode-id="3345" instrument_node="">, Stanford </span><em data-dcnode-id="3342"><strong data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">Building Trust in Decision Support Systems for Aerospace </span></strong></em><span data-dcnode-id="3341" instrument_node="">(</span><a data-dcnode-id="3339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/869"><span data-dcnode-id="3340" instrument_node="">video</span></a><span data-dcnode-id="3338" instrument_node=""> - audio starts ~2min 20sec, CSAIL only)</span></b></b></p><span data-dcnode-id="3334" instrument_node="">
</span><blockquote data-dcnode-id="3316"><p data-dcnode-id="3330" wrap=""><b data-dcnode-id="3331"><b data-dcnode-id="3332"><span data-dcnode-id="3333" instrument_node="">Starting in the 1970s, decades of effort went into building human-designed rules for providing automatic maneuver guidance to pilots to avoid mid-air collisions. The resulting system was later mandated worldwide on all large aircraft and significantly improved the safety of the airspace. Recent work has investigated the feasibility of using computational techniques to help derive optimized decision logic that better handles various sources of uncertainty and balances competing system objectives. This approach has resulted in a system called Airborne Collision Avoidance System (ACAS) X that significantly reduces the risk of mid-air collision while also reducing the alert rate, and it is in the process of becoming the next international standard. Using ACAS X as a case study, this talk will discuss lessons learned about building trust in advanced decision support systems. This talk will also outline research challenges in facilitating greater levels of automation into safety critical systems.</span></b></b></p><span data-dcnode-id="3329" instrument_node="">
</span><p data-dcnode-id="3325" wrap=""><b data-dcnode-id="3326"><b data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3324" instrument_node="">
</span><p data-dcnode-id="3318" wrap=""><b data-dcnode-id="3319"><b data-dcnode-id="3320"><strong data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">Bio:</span></strong><span data-dcnode-id="3321" instrument_node=""> Mykel Kochenderfer is Assistant Professor of Aeronautics and Astronautics at Stanford University. He is the director of the Stanford Intelligent Systems Laboratory (SISL), conducting research on advanced algorithms and analytical methods for the design of robust decision making systems. Of particular interest are systems for air traffic control, unmanned aircraft, and other aerospace applications where decisions must be made in uncertain, dynamic environments while maintaining safety and efficiency. Prior to joining the faculty, he was at MIT Lincoln Laboratory where he worked on airspace modeling and aircraft collision avoidance, with his early work leading to the establishment of the ACAS X program. He received a Ph.D. from the University of Edinburgh and B.S. and M.S. degrees in computer science from Stanford University.&nbsp; He is the author of "Decision Making under Uncertainty: Theory and Application" from MIT Press. He is a third generation pilot.</span></b></b></p><span data-dcnode-id="3317" instrument_node="">
</span></blockquote><span data-dcnode-id="3315" instrument_node="">
</span><p data-dcnode-id="3300" wrap=""><b data-dcnode-id="3301"><b data-dcnode-id="3302"><span data-dcnode-id="3314" instrument_node="">April 10, </span><span data-dcnode-id="3310" style="font-size: 13px;"><a data-dcnode-id="3312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ece.neu.edu/people/singh-hanumant"><span data-dcnode-id="3313" instrument_node="">Hanu Singh</span></a><span data-dcnode-id="3311" instrument_node="">, Northeastern&nbsp;</span></span><em data-dcnode-id="3307"><strong data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">One fish, two fish: The role of Robotics in Fisheries Stock Assessment </span></strong></em><span data-dcnode-id="3306" instrument_node="">(</span><a data-dcnode-id="3304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/854"><span data-dcnode-id="3305" instrument_node="">video</span></a><span data-dcnode-id="3303" instrument_node="">, CSAIL only)</span></b></b></p><span data-dcnode-id="3299" instrument_node="">
</span><blockquote data-dcnode-id="3281"><p data-dcnode-id="3295" wrap=""><b data-dcnode-id="3296"><b data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">Fisheries stock have been decimated around the world. In this talk we examine the role of Robotics to help us assess fish stock. Unlike traditional methods Robotics hold the promise of yielding assessment methods that do not rely on actually catching fish. The complexities of Robotics for fish counting however include complexities associated with imaging underwater, fish avoidance and attraction, and the role of camouflage in fish predator prey interactions. This talks looks at how we are coming to grips with these issues and how the insights gained in tackling these problems have spilled out to other areas of robotics including edge cases to do with autonomous driving.</span></b></b></p><span data-dcnode-id="3294" instrument_node="">
</span><p data-dcnode-id="3290" wrap=""><b data-dcnode-id="3291"><b data-dcnode-id="3292"><span data-dcnode-id="3293" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3289" instrument_node="">
</span><p data-dcnode-id="3283" wrap=""><b data-dcnode-id="3284"><b data-dcnode-id="3285"><strong data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">Bio: </span></strong><span data-dcnode-id="3286" instrument_node="">Hanumant Singh is a Professor at Northeastern University where he is also the Director of the multidisciplinary Center for Robotics at NU. He received his Ph.D. from the MIT WHOI Joint Program in 1995 after which he worked on the Staff at WHOI until 2016 when he joined Northeastern. His group designed and built the Seabed AUV, as well as the Jetyak Autonomous Surface Vehicle dozens of which are in use for scientific and other purposes across the globe. He has participated in 60 expeditions in all of the world's oceans in support of Marine Geology, Marine Biology, Deep Water Archaeology, Chemical Oceanography, Polar Studies, and Coral Reef Ecology.</span></b></b></p><span data-dcnode-id="3282" instrument_node="">
</span></blockquote><span data-dcnode-id="3280" instrument_node="">
</span><p data-dcnode-id="3276" wrap=""><b data-dcnode-id="3277"><b data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3275" instrument_node="">
</span><p data-dcnode-id="3260" wrap=""><b data-dcnode-id="3261"><b data-dcnode-id="3262"><span data-dcnode-id="3274" instrument_node="">April 3, </span><span data-dcnode-id="3270" style="font-size: 13px;"><a data-dcnode-id="3272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//research.engr.oregonstate.edu/rdml/"><span data-dcnode-id="3273" instrument_node="">Geoff Hollinger</span></a><span data-dcnode-id="3271" instrument_node="">, Oregon State</span></span><em data-dcnode-id="3267"><strong data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node=""> Marine Robotics: Planning, Decision Making, and Learning </span></strong></em><span data-dcnode-id="3266" instrument_node="">(</span><a data-dcnode-id="3264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/849"><span data-dcnode-id="3265" instrument_node="">video</span></a><span data-dcnode-id="3263" instrument_node="">)</span></b></b></p><span data-dcnode-id="3259" instrument_node="">
</span><blockquote data-dcnode-id="3241"><p data-dcnode-id="3255" wrap=""><b data-dcnode-id="3256"><b data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">Underwater gliders, propeller-driven submersibles, and other marine robots are increasingly being tasked with gathering information (e.g., in environmental monitoring, offshore inspection, and coastal surveillance scenarios). However, in most of these scenarios, human operators must carefully plan the mission to ensure completion of the task. Strict human oversight not only makes such deployments expensive and time consuming but also makes some tasks impossible due to the requirement for heavy cognitive loads or reliable communication between the operator and the vehicle. We can mitigate these limitations by making the robotic information gatherers semi-autonomous, where the human provides high-level input to the system and the vehicle fills in the details on how to execute the plan. In this talk, I will show how a general framework that unifies information theoretic optimization and physical motion planning makes semi-autonomous information gathering feasible in marine environments. I will leverage techniques from stochastic motion planning, adaptive decision making, and deep learning to provide scalable solutions in a diverse set of applications such as underwater inspection, ocean search, and ecological monitoring. The techniques discussed here make it possible for autonomous marine robots to “go where no one has gone before,” allowing for information gathering in environments previously outside the reach of human divers.</span></b></b></p><span data-dcnode-id="3254" instrument_node="">
</span><p data-dcnode-id="3250" wrap=""><b data-dcnode-id="3251"><b data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3249" instrument_node="">
</span><p data-dcnode-id="3243" wrap=""><b data-dcnode-id="3244"><b data-dcnode-id="3245"><strong data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">Bio: </span></strong><span data-dcnode-id="3246" instrument_node="">Geoff Hollinger is an Assistant Professor in the Collaborative Robotics and Intelligent Systems (CoRIS) Institute at Oregon State University. His current research interests are in adaptive information gathering, distributed coordination, and learning for autonomous robotic systems. He has previously held research positions at the University of Southern California, Intel Research Pittsburgh, University of Pennsylvania’s GRASP Laboratory, and NASA's Marshall Space Flight Center. He received his Ph.D. (2010) and M.S. (2007) in Robotics from Carnegie Mellon University and his B.S. in General Engineering along with his B.A. in Philosophy from Swarthmore College (2005). He is a recipient of the 2017 Office of Naval Research Young Investigator Program (YIP) award.</span></b></b></p><span data-dcnode-id="3242" instrument_node="">
</span></blockquote><span data-dcnode-id="3240" instrument_node="">
</span><p data-dcnode-id="3236" wrap=""><b data-dcnode-id="3237"><b data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3235" instrument_node="">
</span><p data-dcnode-id="3220" wrap=""><b data-dcnode-id="3221"><b data-dcnode-id="3222"><span data-dcnode-id="3234" instrument_node="">March 20, </span><span data-dcnode-id="3230" style="font-size: 13px;"><a data-dcnode-id="3232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ai.uni-bremen.de/team/michael_beetz"><span data-dcnode-id="3233" instrument_node="">Michael Beetz</span></a><span data-dcnode-id="3231" instrument_node="">, University of Bremen </span></span><em data-dcnode-id="3227"><strong data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Everyday Activity Science and Engineering (EASE) </span></strong></em><span data-dcnode-id="3226" instrument_node="">(</span><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/838"><span data-dcnode-id="3225" instrument_node="">video</span></a><span data-dcnode-id="3223" instrument_node="">)</span></b></b></p><span data-dcnode-id="3219" instrument_node="">
</span><blockquote data-dcnode-id="3181"><p data-dcnode-id="3215" wrap=""><b data-dcnode-id="3216"><b data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">Recently we have witnessed the first robotic agents performing everyday manipulation activities such as loading a dishwasher and setting a table. While these agents successfully accomplish specific instances of these tasks, they only perform them within the narrow range of conditions for which they have been carefully designed. They are still far from achieving the human ability to autonomously perform a wide range of everyday tasks reliably in a wide range of contexts. In other words, they are far from mastering everyday activities. Mastering everyday activities is an important step for robots to become the competent (co-)workers, assistants, and companions who are widely considered a necessity for dealing with the enormous challenges our aging society is facing.</span></b></b></p><span data-dcnode-id="3214" instrument_node="">
</span><p data-dcnode-id="3210" wrap=""><b data-dcnode-id="3211"><b data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">We propose Everyday Activity Science and Engineering (EASE), a fundamental research endeavour to investigate the cognitive information processing principles employed by humans to master everyday activities and to transfer the obtained insights to models for autonomous control of robotic agents. The aim of EASE is to boost the robustness, efficiency, and flexibility of various information processing subtasks necessary to master everyday activities by uncovering and exploiting the structures within these tasks.</span></b></b></p><span data-dcnode-id="3209" instrument_node="">
</span><p data-dcnode-id="3205" wrap=""><b data-dcnode-id="3206"><b data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">Everyday activities are by definition mundane, mostly stereotypical, and performed regularly. The core research hypothesis of EASE is that robots can achieve mastery by exploiting the nature of everyday activities. We intend to investigate this hypothesis by focusing on two core principles: The first principle is narrative-enabled episodic memories (NEEMs), which are data structures that enable robotic agents to draw knowledge from a large body of observations, experiences, or descriptions of activities. The NEEMs are used to find representations that can exploit the structure of activities by transferring tasks into problem spaces that are computationally easier to handle than the original spaces. These representations are termed pragmatic everyday activity manifolds (PEAMs), analogous to the concept of manifolds as low-dimensional local representations in mathematics. The exploitation of PEAMs should enable agents to achieve the desired task performance while preserving computational feasibility.</span></b></b></p><span data-dcnode-id="3204" instrument_node="">
</span><p data-dcnode-id="3200" wrap=""><b data-dcnode-id="3201"><b data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">The vision behind EASE is a cognition-enabled robot capable of performing human-scale everyday manipulation tasks in the open world based on high-level instructions and mastering them.</span></b></b></p><span data-dcnode-id="3199" instrument_node="">
</span><p data-dcnode-id="3195" wrap=""><b data-dcnode-id="3196"><b data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3194" instrument_node="">
</span><p data-dcnode-id="3188" wrap=""><b data-dcnode-id="3189"><b data-dcnode-id="3190"><strong data-dcnode-id="3192"><span data-dcnode-id="3193" instrument_node="">Bio: </span></strong><span data-dcnode-id="3191" instrument_node="">Michael Beetz is a professor for Computer Science at the Faculty for Mathematics &amp; Informatics of the University Bremen and head of the Institute for Artificial Intelligence (IAI). IAI investigates AI-based control methods for robotic agents, with a focus on human-scale everyday manipulation tasks. With his openEASE, a web-based knowledge service providing robot and human activity data, Michael Beetz aims at improving interoperability in robotics and lowering the barriers for robot programming. Due to this the IAI group provides most of its results as open-source software, primarily in the ROS software library.</span></b></b></p><span data-dcnode-id="3187" instrument_node="">
</span><p data-dcnode-id="3183" wrap=""><b data-dcnode-id="3184"><b data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">Michael Beetz received his diploma degree in Computer Science with distinction from the University of Kaiserslautern. His MSc, MPhil, and PhD degrees were awarded by Yale University in 1993, 1994, and 1996 and his Venia Legendi from the University of Bonn in 2000. Michael Beetz was a member of the steering committee of the European network of excellence in AI planning (PLANET) and coordinating the research area “robot planning”. He is associate editor of the AI Journal. His research interests include plan-based control of robotic agents, knowledge processing and representation for robots, integrated robot learning, and cognitive perception.</span></b></b></p><span data-dcnode-id="3182" instrument_node="">
</span></blockquote><span data-dcnode-id="3180" instrument_node="">
</span><p data-dcnode-id="3176" wrap=""><b data-dcnode-id="3177"><b data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3175" instrument_node="">
</span><p data-dcnode-id="3160" wrap=""><b data-dcnode-id="3161"><b data-dcnode-id="3162"><span data-dcnode-id="3174" instrument_node="">March 6, </span><span data-dcnode-id="3170" style="font-size: 13px;"><a data-dcnode-id="3172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//web.stanford.edu/~pavone/"><span data-dcnode-id="3173" instrument_node="">Marco Pavone</span></a><span data-dcnode-id="3171" instrument_node="">, Stanford </span></span><em data-dcnode-id="3167"><strong data-dcnode-id="3168"><span data-dcnode-id="3169" instrument_node="">Planning and Decision Making for Autonomous Spacecraft and Space Robots </span></strong></em><span data-dcnode-id="3166" instrument_node="">(</span><a data-dcnode-id="3164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/830"><span data-dcnode-id="3165" instrument_node="">video</span></a><span data-dcnode-id="3163" instrument_node="">)</span></b></b></p><span data-dcnode-id="3159" instrument_node="">
</span><blockquote data-dcnode-id="3136"><p data-dcnode-id="3155" wrap=""><b data-dcnode-id="3156"><b data-dcnode-id="3157"><span data-dcnode-id="3158" instrument_node="">In this talk I will present planning and decision-making techniques for safely and efficiently maneuvering autonomous aerospace vehicles during proximity operations, manipulation tasks, and surface locomotion. I will first address the "spacecraft motion planning problem," by discussing its unique aspects and presenting recent results on planning under uncertainty via Monte Carlo sampling. I will then turn the discussion to higher-level decision making; in particular, I will discuss an axiomatic theory of risk and how one can leverage such a theory for a principled and tractable inclusion of risk-awareness in robotic decision making, in the context of Markov decision processes and reinforcement learning. Throughout the talk, I will highlight a variety of space-robotic applications my research group is contributing to (including the Mars 2020 and Hedgehog rovers, and the Astrobee free-flying robot), as well as applications to the automotive and UAV domains.</span></b></b></p><span data-dcnode-id="3154" instrument_node="">
</span><p data-dcnode-id="3150" wrap=""><b data-dcnode-id="3151"><b data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">This work is in collaboration with NASA JPL, NASA Ames, NASA Goddard, and MIT.</span></b></b></p><span data-dcnode-id="3149" instrument_node="">
</span><p data-dcnode-id="3145" wrap=""><b data-dcnode-id="3146"><b data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3144" instrument_node="">
</span><p data-dcnode-id="3138" wrap=""><b data-dcnode-id="3139"><b data-dcnode-id="3140"><strong data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Bio: </span></strong><span data-dcnode-id="3141" instrument_node="">Dr. Marco Pavone is an Assistant Professor of Aeronautics and Astronautics at Stanford University, where he is the Director of the Autonomous Systems Laboratory and Co-Director of the Center for Automotive Research at Stanford. Before joining Stanford, he was a Research Technologist within the Robotics Section at the NASA Jet Propulsion Laboratory. He received a Ph.D. degree in Aeronautics and Astronautics from the Massachusetts Institute of Technology in 2010. His main research interests are in the development of methodologies for the analysis, design, and control of autonomous systems, with an emphasis on autonomous aerospace vehicles and large-scale robotic networks. He is a recipient of a Presidential Early Career Award for Scientists and Engineers, an ONR YIP Award, an NSF CAREER Award, a NASA Early Career Faculty Award, a Hellman Faculty Scholar Award, and was named NASA NIAC Fellow in 2011. His work has been recognized with best paper nominations or awards at the Field and Service Robotics Conference, at the Robotics: Science and Systems Conference, and at NASA symposia.</span></b></b></p><span data-dcnode-id="3137" instrument_node="">
</span></blockquote><span data-dcnode-id="3135" instrument_node="">
</span><p data-dcnode-id="3131" wrap=""><b data-dcnode-id="3132"><b data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3130" instrument_node="">
</span><p data-dcnode-id="3113"><b data-dcnode-id="3114"><b data-dcnode-id="3115"><strong data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">Fall&nbsp; 2017 Campus-wide Robotics Seminar</span></strong><strong data-dcnode-id="3117"><span data-dcnode-id="3127" instrument_node="">&nbsp;(sponsored by&nbsp;</span><a data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aurora.aero/"><span data-dcnode-id="3126" instrument_node="">Aurora Flight Sciences</span></a><span data-dcnode-id="3124" instrument_node="">&nbsp;,&nbsp;</span><a data-dcnode-id="3122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mathworks.com/"><span data-dcnode-id="3123" instrument_node="">The MathWorks</span></a><span data-dcnode-id="3121" instrument_node="">&nbsp;, and the&nbsp;</span><a data-dcnode-id="3119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.russellsage.org/"><span data-dcnode-id="3120" instrument_node="">Russell Sage Foundation</span></a><span data-dcnode-id="3118" instrument_node="">&nbsp;)&nbsp; (11am-noon in 32-G449</span></strong><span data-dcnode-id="3116" instrument_node="">)</span></b></b></p><span data-dcnode-id="3112" instrument_node="">
</span><p data-dcnode-id="3101" wrap=""><b data-dcnode-id="3102"><b data-dcnode-id="3103"><span data-dcnode-id="3111" instrument_node="">December 15, </span><span data-dcnode-id="3107" style="font-size: 13px;"><a data-dcnode-id="3109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ocf.berkeley.edu/~sanjayk/"><span data-dcnode-id="3110" instrument_node="">Sanjay Krishnan</span></a><span data-dcnode-id="3108" instrument_node="">, UC Berkeley </span></span><em data-dcnode-id="3104"><strong data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">Dirty Data, Robotics, and Artificial Intelligence</span></strong></em></b></b></p><span data-dcnode-id="3100" instrument_node="">
</span><blockquote data-dcnode-id="3082"><p data-dcnode-id="3096" wrap=""><b data-dcnode-id="3097"><b data-dcnode-id="3098"><span data-dcnode-id="3099" instrument_node="">Large training datasets have revolutionized AI research, but enabling similar breakthroughs in other fields, such as Robotics, requires a new understanding of how to acquire, clean, and structure emergent forms of large-scale, unstructured sequential data. My talk presents a systematic approach to handling such dirty data in the context of modern AI applications. I start by introducing a statistical formalization on data cleaning in this setting including research on: (1) how common data cleaning operations affect model training, (2) how data cleaning programs can be expected to generalize to unseen data, (3) and how to prioritize limited human intervention in rapidly growing datasets. Then, using surgical robotics as a motivating example, I present a series of robust Bayesian models for automatically extracting hierarchical structure from highly varied and noisy robot trajectory data facilitating imitation learning and reinforcement learning on short, consistent sub-p! roblems. I present how the combination of clean training data and structured learning tasks enables learning highly accurate control policies in tasks ranging from surgical cutting to debridement.</span></b></b></p><span data-dcnode-id="3095" instrument_node="">
</span><p data-dcnode-id="3091" wrap=""><b data-dcnode-id="3092"><b data-dcnode-id="3093"><span data-dcnode-id="3094" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3084" wrap=""><b data-dcnode-id="3085"><b data-dcnode-id="3086"><strong data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Bio: </span></strong><span data-dcnode-id="3087" instrument_node="">Sanjay Krishnan is a Computer Science PhD candidate in the RISELab and in the Berkeley Laboratory for Automation Science and Engineering at UC Berkeley. His research studies problems on the intersection of database theory, machine learning, and robotics. Sanjay's work has received a number of awards including the 2016 SIGMOD Best Demonstration award, 2015 IEEE GHTC Best Paper award, and Sage Scholar award.</span></b></b></p><span data-dcnode-id="3083" instrument_node="">
</span></blockquote><span data-dcnode-id="3081" instrument_node="">
</span><p data-dcnode-id="3077" wrap=""><b data-dcnode-id="3078"><b data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3076" instrument_node="">
</span><p data-dcnode-id="3064" wrap=""><b data-dcnode-id="3065"><b data-dcnode-id="3066"><span data-dcnode-id="3075" instrument_node="">December 5, </span><span data-dcnode-id="3071" style="font-size: 13px;"><a data-dcnode-id="3073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cynthiabreazeal.media.mit.edu/"><span data-dcnode-id="3074" instrument_node="">Cynthia Breazeal</span></a><span data-dcnode-id="3072" instrument_node="">, MIT </span></span><em data-dcnode-id="3068"><strong data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">Toward Personal Robots and Daily Life </span></strong></em><span data-dcnode-id="3067" instrument_node="">(** POSTPONED TO THE SPRING **)</span></b></b></p><span data-dcnode-id="3063" instrument_node="">
</span><blockquote data-dcnode-id="3045"><p data-dcnode-id="3059" wrap=""><b data-dcnode-id="3060"><b data-dcnode-id="3061"><span data-dcnode-id="3062" instrument_node="">In this informal talk, I will present an overview of the research program of the Personal&nbsp; Robots Group at the Media Lab. In particular, I will highlight a number of projects where we are developing, fielding, and assessing social robots over repeated encounters with people in real world environments such as the home, schools, or hospitals. We develop adaptive algorithmic capabilities for the robot to support sustained interpersonal engagement and personalization to support specific interventions. We then examine the impact of the robot’s social embodiment, non-verbal and emotive expression, and personalization on sustaining engagement, learning, behavior, and attitudes. I will also touch on the commercialization of social robots as a mass consumer product and developer platform, with opportunities to support research in long-term human-robot interaction in the context of daily life. In a time where citizens have the opportunity to live with intelligent machines, we have the opportunity to explore, develop and assess humanistic design principles to support and promote human flourishing at all ages and stages.</span></b></b></p><span data-dcnode-id="3058" instrument_node="">
</span><p data-dcnode-id="3054" wrap=""><b data-dcnode-id="3055"><b data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3053" instrument_node="">
</span><p data-dcnode-id="3047" wrap=""><b data-dcnode-id="3048"><b data-dcnode-id="3049"><strong data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">Bio</span></strong><span data-dcnode-id="3050" instrument_node="">: Dr. Cynthia Breazeal is an Associate Professor at MIT where she founded and directs the Personal Robots Group at the Media Lab. She is also founder and Chief Scientist of Jibo, Inc. Dr. Breazeal is recognized as a pioneer of Social Robotics and Human Robot Interaction. She is also internationally recognized as an award-winning innovator, designer, and entrepreneur such as Technology Review’s TR35 Award, TIME magazine’s Best Inventions, and the National Design Awards in Communication.</span></b></b></p><span data-dcnode-id="3046" instrument_node="">
</span></blockquote><span data-dcnode-id="3044" instrument_node="">
</span><p data-dcnode-id="3040" wrap=""><b data-dcnode-id="3041"><b data-dcnode-id="3042"><span data-dcnode-id="3043" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3039" instrument_node="">
</span><p data-dcnode-id="3024" wrap=""><b data-dcnode-id="3025"><b data-dcnode-id="3026"><span data-dcnode-id="3038" instrument_node="">November 28, </span><span data-dcnode-id="3035" style="font-size: 13px;"><a data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//robotics.usc.edu/~gaurav"><span data-dcnode-id="3037" instrument_node="">Gaurav S. Sukhatme</span></a></span><span data-dcnode-id="3034" instrument_node="">, USC </span><em data-dcnode-id="3031"><strong data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">Robots at Sea </span></strong></em><span data-dcnode-id="3030" instrument_node="">(</span><a data-dcnode-id="3028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/748"><span data-dcnode-id="3029" instrument_node="">video</span></a><span data-dcnode-id="3027" instrument_node="">, no audio)</span></b></b></p><span data-dcnode-id="3023" instrument_node="">
</span><blockquote data-dcnode-id="3003"><p data-dcnode-id="3018"><b data-dcnode-id="3019"><b data-dcnode-id="3020"><span data-dcnode-id="3021" style="font-size: 13px;"><span data-dcnode-id="3022" instrument_node="">Underwater robotics is undergoing a transformation. Advances in AI and machine learning are enabling a new generation of underwater robots to make intelligent decisions (where to sample? how to navigate?) by reasoning about their environment (what is the shipping and water forecast?). At USC, we are engaged in a long-term effort to explore ideas and develop algorithms that will lead to persistent, autonomous underwater robots. In this talk, I will discuss some of our recent results focusing on two problems in adaptive sampling: underwater change detection and biological sampling. Time permitting; I will also present our work on hazard avoidance, allowing underwater robots to operate in regions where there is substantial ship traffic.</span></span></b></b></p><span data-dcnode-id="3017" instrument_node="">
</span><p data-dcnode-id="3013"><b data-dcnode-id="3014"><b data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3012" instrument_node="">
</span><p data-dcnode-id="3005"><b data-dcnode-id="3006"><b data-dcnode-id="3007"><span data-dcnode-id="3008" style="font-size: 13px;"><strong data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">Bio:&nbsp;</span></strong><span data-dcnode-id="3009" instrument_node="">Gaurav S. Sukhatme is the Fletcher Jones Professor of Computer Science and Electrical Engineering at the University of Southern California (USC). He currently serves as the Executive Vice Dean of the USC Viterbi School of Engineering. His research is in networked robots with applications to aquatic robots and on-body networks. Sukhatme has published extensively in these areas and served as PI on numerous federal grants. He is Fellow of the IEEE and a recipient of the NSF CAREER and the Okawa foundation research awards. He is one of the founders of the RSS conference, serves on the RSS Foundation Board, and has served as program chair of three major robotics conferences (ICRA, IROS and RSS). He is the Editor-in-Chief of the Springer journal Autonomous Robots.</span></span></b></b></p><span data-dcnode-id="3004" instrument_node="">
</span></blockquote><span data-dcnode-id="3002" instrument_node="">
</span><p data-dcnode-id="2998"><b data-dcnode-id="2999"><b data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2997" instrument_node="">
</span><p data-dcnode-id="2982" wrap=""><b data-dcnode-id="2983"><b data-dcnode-id="2984"><span data-dcnode-id="2996" instrument_node="">November 14, </span><span data-dcnode-id="2993" style="font-size: 13px;"><a data-dcnode-id="2994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//robertmaccurdy.com/"><span data-dcnode-id="2995" instrument_node="">Rob MacCurdy</span></a></span><span data-dcnode-id="2992" instrument_node="">, MIT </span><em data-dcnode-id="2989"><strong data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">Multicellular Machines: A Bio-inspired approach to automated electromechanical design and fabrication </span></strong></em><span data-dcnode-id="2988" instrument_node="">(</span><a data-dcnode-id="2986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/733"><span data-dcnode-id="2987" instrument_node="">video</span></a><span data-dcnode-id="2985" instrument_node="">)</span></b></b></p><span data-dcnode-id="2981" instrument_node="">
</span><blockquote data-dcnode-id="2961"><p data-dcnode-id="2976"><b data-dcnode-id="2977"><b data-dcnode-id="2978"><span data-dcnode-id="2979" style="font-size: 13px;"><span data-dcnode-id="2980" instrument_node="">Designing and building robots is a labor-intensive process that requires experts at all stages. This reality is due, in part, to the fact that the robot design-space is unbounded. To address this issue, I have borrowed a simple but powerful design concept from multi-cellular organisms: the regular tiling of a relatively small number of individual cell types yields assemblies with spectacular functional capacity. This capability comes at the cost of substantial complexity in design synthesis and assembly, which nature has addressed via evolutionary search and developmental processes. I will describe my application of these ideas to electromechanical systems, which has led to the development of electro-mechanical “cell” types, automated assembly methods, and design synthesis tools. The inspiration for this work comes from ongoing collaborations with Ecologists and Evolutionary Biologists. As part of this effort I have developed wildlife monitoring tools that provide unprecedented volumes of data, enabling previously intractable scientific studies of small organisms. Sensor mass, which is dominated by energy-storage, is the primary constraint for these applications, and I will discuss a time-of-arrival tracking system that is 3 orders of magnitude more energy-efficient than equivalent position tracking methods.</span></span></b></b></p><span data-dcnode-id="2975" instrument_node="">
</span><p data-dcnode-id="2971"><b data-dcnode-id="2972"><b data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2970" instrument_node="">
</span><p data-dcnode-id="2963"><b data-dcnode-id="2964"><b data-dcnode-id="2965"><span data-dcnode-id="2966" style="font-size: 13px;"><strong data-dcnode-id="2968"><span data-dcnode-id="2969" instrument_node="">Bio:&nbsp;</span></strong><span data-dcnode-id="2967" instrument_node="">Dr. Robert MacCurdy is a Postdoctoral Associate with Daniela Rus at MIT and will be an assistant professor at the University of Colorado Boulder in January 2018. He is developing new methods to automatically design and manufacture robots. As part of this work, he developed an additive manufacturing process, Printable Hydraulics, that incorporates liquids into 3D-printed parts as they are built, allowing hydraulically-actuated robots to be automatically fabricated. Rob did his PhD work with Hod Lipson at Cornell University where he developed materials and methods to automatically design and build electromechanical systems using additive manufacturing and digital materials. Funded by an NSF graduate research fellowship and a Liebmann Fund fellowship, this work demonstrated systems capable of automatically assembling functional electromechanical devices, with the goal of printing robots that literally walk out of the printer. Rob is also committed to developing research tools that automate the study and conservation of wildlife, work that he began while working as a research engineer at Cornell’s Lab of Ornithology. He holds a B.A. in Physics from Ithaca College, a B.S. in Electrical Engineering from Cornell University, and an M.S. and PhD in Mechanical Engineering from Cornell University.</span></span></b></b></p><span data-dcnode-id="2962" instrument_node="">
</span></blockquote><span data-dcnode-id="2960" instrument_node="">
</span><p data-dcnode-id="2956"><b data-dcnode-id="2957"><b data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2955" instrument_node="">
</span><p data-dcnode-id="2940" wrap=""><b data-dcnode-id="2945"><b data-dcnode-id="2946"><span data-dcnode-id="2954" instrument_node="">November 7, </span><span data-dcnode-id="2951" style="font-size: 13px;"><a data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healthcare-robotics.com/"><span data-dcnode-id="2953" instrument_node="">Charlie Kemp</span></a></span><span data-dcnode-id="2950" instrument_node="">, Georgia Tech </span><em data-dcnode-id="2947"><strong data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node="">Mobile Manipulators for Intelligent Physical Assistance </span></strong></em></b></b><span data-dcnode-id="2944" instrument_node="">(</span><a data-dcnode-id="2942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/724"><span data-dcnode-id="2943" instrument_node="">video</span></a><span data-dcnode-id="2941" instrument_node="">)</span></p><span data-dcnode-id="2939" instrument_node="">
</span><blockquote data-dcnode-id="2916"><p data-dcnode-id="2934"><b data-dcnode-id="2935"><b data-dcnode-id="2936"><span data-dcnode-id="2937" style="font-size: 13px;"><span data-dcnode-id="2938" instrument_node="">Since founding the Healthcare Robotics Lab at Georgia Tech 10 years ago, my research has focused on developing mobile manipulators for intelligent physical assistance. Mobile manipulators are mobile robots with the ability to physically manipulate their surroundings. They offer a number of distinct capabilities compared to other forms of robotic assistance, including being able to operate independently from the user, being appropriate for users with diverse needs, and being able to assist with a wide variety of tasks, such as object retrieval, hygiene, and feeding. My lab has worked with hundreds of representative end users - including older adults, nurses, and people with severe motor impairments - to better understand the challenges and opportunities associated with this technology. In my talk, I will provide evidence for the following assertions: 1) many people will be open to assistance from mobile manipulators; 2) assistive mobile manipulation at home is feasible for people with profound motor impairments using off-the-shelf computer access devices; and 3) permitting contact and intelligently controlling forces increases the effectiveness of mobile manipulators. I will conclude with a brief overview of some of our most recent research.</span></span></b></b></p><span data-dcnode-id="2933" instrument_node="">
</span><p data-dcnode-id="2929"><b data-dcnode-id="2930"><b data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2928" instrument_node="">
</span><p data-dcnode-id="2918"><b data-dcnode-id="2919"><b data-dcnode-id="2920"><span data-dcnode-id="2921" style="font-size: 13px;"><strong data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">Bio:</span></strong><span data-dcnode-id="2925" instrument_node=""> Charles C. Kemp (Charlie) is an Associate Professor at the Georgia Institute of Technology in the Department of Biomedical Engineering with adjunct appointments in the School of Interactive Computing and the School of Electrical and Computer Engineering. He earned a doctorate in Electrical Engineering and Computer Science (2005), an MEng, and BS from MIT. In 2007, he joined the faculty at Georgia Tech where he directs the Healthcare Robotics Lab ( </span><a data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healthcare-robotics.com/"><span data-dcnode-id="2924" instrument_node="">http://healthcare-robotics.com</span></a><span data-dcnode-id="2922" instrument_node=""> ). He is an active member of Georgia Tech’s Institute for Robotics &amp; Intelligent Machines (IRIM) and its multidisciplinary Robotics Ph.D. program. He has received a 3M Non-tenured Faculty Award, the Georgia Tech Research Corporation Robotics Award, a Google Faculty Research Award, and an NSF CAREER award. He was a Hesburgh Award Teaching Fellow in 2017. His research has been covered extensively by the popular media, including the New York Times, Technology Review, ABC, and CNN.</span></span></b></b></p><span data-dcnode-id="2917" instrument_node="">
</span></blockquote><span data-dcnode-id="2915" instrument_node="">
</span><p data-dcnode-id="2911"><b data-dcnode-id="2912"><b data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2910" instrument_node="">
</span><p data-dcnode-id="2895" wrap=""><b data-dcnode-id="2896"><b data-dcnode-id="2897"><span data-dcnode-id="2909" instrument_node="">October 31, </span><span data-dcnode-id="2906" style="font-size: 13px;"><a data-dcnode-id="2907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jeff-mahler.com/"><span data-dcnode-id="2908" instrument_node="">Jeff Mahler</span></a></span><span data-dcnode-id="2905" instrument_node="">, UC Berkeley </span><em data-dcnode-id="2902"><strong data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">The Dexterity Network: Deep Learning to Plan Robust Robot Grasps using Datasets of Synthetic Point Clouds, Analytic Grasp Metrics, and 3D Object Models </span></strong></em><span data-dcnode-id="2901" instrument_node="">(</span><a data-dcnode-id="2899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/717"><span data-dcnode-id="2900" instrument_node="">video</span></a><span data-dcnode-id="2898" instrument_node="">)</span></b></b></p><span data-dcnode-id="2894" instrument_node="">
</span><p data-dcnode-id="2890" wrap=""><b data-dcnode-id="2891"><b data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2889" instrument_node="">
</span><blockquote data-dcnode-id="2864"><p data-dcnode-id="2884"><b data-dcnode-id="2885"><b data-dcnode-id="2886"><span data-dcnode-id="2887" style="font-size: 13px;"><span data-dcnode-id="2888" instrument_node="">Reliable robot grasping across a wide variety of objects is challenging due to imprecision in sensing, which leads to uncertainty about properties such as object shape, pose, mass, and friction. Recent results suggest that deep learning from millions of labeled grasps and images can be used to rapidly plan successful grasps across a diverse set of objects without explicit inference of physical properties, but training typically requires tedious hand-labeling or months of execution time. In this talk I present the Dexterity Network (Dex-Net), a framework to automatically synthesize training datasets containing millions of point clouds and robot grasps labeled with robustness to perturbations by analyzing contact models across thousands of 3D object CAD models. I will describe generative models for datasets of both parallel-jaw and suction-cup grasps. Experiments suggest that Convolutional Neural Networks trained from scratch on Dex-Net datasets can be used to plan grasps for novel objects in clutter with high precision on a physical robot.</span></span></b></b></p><span data-dcnode-id="2883" instrument_node="">
</span><p data-dcnode-id="2879"><b data-dcnode-id="2880"><b data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2878" instrument_node="">
</span><p data-dcnode-id="2871"><b data-dcnode-id="2872"><b data-dcnode-id="2873"><span data-dcnode-id="2874" style="font-size: 13px;"><strong data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Bio:</span></strong><span data-dcnode-id="2875" instrument_node=""> Jeff Mahler is a Ph.D. student at the University of California at Berkeley advised by Prof. Ken Goldberg and a member of the the AUTOLAB and Berkeley Artificial Intelligence Research Lab. His current research is on the Dexterity Network (Dex-Net), a project that aims to train robot grasping policies from massive synthetic datasets of labeled point clouds and grasps generated using stochastic contact analysis across thousands of 3D object CAD models. He has also studied deep learning from demonstration and control for surgical robots. He received the National Defense Science and Engineering Fellowship in 2015 and cofounded the 3D scanning startup Lynx Laboratories in 2012 as an undergraduate at the University of Texas at Austin.</span></span></b></b></p><span data-dcnode-id="2870" instrument_node="">
</span><p data-dcnode-id="2866"><b data-dcnode-id="2867"><b data-dcnode-id="2868"><span data-dcnode-id="2869" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2865" instrument_node="">
</span></blockquote><span data-dcnode-id="2863" instrument_node="">
</span><p data-dcnode-id="2848" wrap=""><b data-dcnode-id="2849"><b data-dcnode-id="2850"><span data-dcnode-id="2862" instrument_node="">October 17, </span><span data-dcnode-id="2858" style="font-size: 13px;"><a data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//verifiablerobotics.com/"><span data-dcnode-id="2861" instrument_node="">Hadas Kress-Gazit</span></a><span data-dcnode-id="2859" instrument_node="">, Cornell University </span></span><strong data-dcnode-id="2855"><em data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">Synthesis for robots: guarantees and feedback for complex behaviors </span></em></strong><span data-dcnode-id="2854" instrument_node="">(</span><a data-dcnode-id="2852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/702"><span data-dcnode-id="2853" instrument_node="">video</span></a><span data-dcnode-id="2851" instrument_node="">)</span></b></b></p><span data-dcnode-id="2847" instrument_node="">
</span><blockquote data-dcnode-id="2835"><p data-dcnode-id="2842"><span data-dcnode-id="2846" instrument_node="">
</span><b data-dcnode-id="2843"><b data-dcnode-id="2844"><span data-dcnode-id="2845" instrument_node="">Getting a robot to perform a complex task, for example completing the DARPA Robotics Challenge, typically requires a team of engineers who program the robot in a time consuming and error prone process and who validate the resulting robot behavior through testing in different environments. The vision of synthesis for robotics is to bypass the manual programming and testing cycle by enabling users to provide specifications – what the robot should do – and automatically generating, from the specification, robot control that provides guarantees for the robot’s behavior.</span></b></b></p><span data-dcnode-id="2841" instrument_node="">
</span><p data-dcnode-id="2837"><b data-dcnode-id="2838"><b data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">In this talk I will describe the work done in my group towards realizing the synthesis vision. I will discuss what it means to provide guarantees for physical robots, types of feedback we can generate, specification formalisms that we use and our approach to synthesis for different robotic systems such as modular robots and multi robot systems.</span></b></b></p><span data-dcnode-id="2836" instrument_node="">
</span></blockquote><span data-dcnode-id="2834" instrument_node="">
</span><blockquote data-dcnode-id="2826"><p data-dcnode-id="2828" wrap=""><b data-dcnode-id="2829"><b data-dcnode-id="2830"><strong data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">Bio:</span></strong><span data-dcnode-id="2831" instrument_node=""> Hadas Kress-Gazit is an Associate Professor at the Sibley School of Mechanical and Aerospace Engineering at Cornell University. She received her Ph.D. in Electrical and Systems Engineering from the University of Pennsylvania in 2008 and has been at Cornell since 2009. Her research focuses on formal methods for robotics and automation and more specifically on synthesis for robotics - automatically creating verifiable robot controllers for complex high-level tasks. Her group explores different types of robotic systems including modular robots, soft robots and swarms and synthesizes (pun intended) ideas from different communities such as robotics, formal methods, control, hybrid systems and computational linguistics. She received an NSF CAREER award in 2010, a DARPA Young Faculty Award in 2012 and the Fiona Ip Li '78 and Donald Li '75 Excellence in teaching award in 2013. She lives in Ithaca with her partner and two kids.</span></b></b></p><span data-dcnode-id="2827" instrument_node="">
</span></blockquote><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2821"><b data-dcnode-id="2822"><b data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2820" instrument_node="">
</span><p data-dcnode-id="2805" wrap=""><b data-dcnode-id="2806"><b data-dcnode-id="2807"><span data-dcnode-id="2819" instrument_node="">October 3, </span><span data-dcnode-id="2815" style="font-size: 13px;"><a data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//faculty.engineering.asu.edu/acs/springberman"><span data-dcnode-id="2818" instrument_node="">Spring Berman</span></a><span data-dcnode-id="2816" instrument_node="">, Arizona State University </span></span><strong data-dcnode-id="2812"><em data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">A Control and Estimation Framework for Robotic Swarms in Uncertain Environments </span></em></strong><span data-dcnode-id="2811" instrument_node="">(</span><a data-dcnode-id="2809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/688"><span data-dcnode-id="2810" instrument_node="">video</span></a><span data-dcnode-id="2808" instrument_node=""> - no audio)</span></b></b></p><span data-dcnode-id="2804" instrument_node="">
</span><blockquote data-dcnode-id="2797"><p data-dcnode-id="2799"><span data-dcnode-id="2803" instrument_node="">
