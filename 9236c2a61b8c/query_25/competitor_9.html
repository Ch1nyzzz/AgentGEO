</span><p data-dcnode-id="1968"><b data-dcnode-id="1969"><b data-dcnode-id="1970"><span data-dcnode-id="1971" style="font-size: 13px;"><span data-dcnode-id="1977" instrument_node="">Nov 15 - </span><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mcgill.ca/mecheng/facultystaff/staff/innasharf"><span data-dcnode-id="1976" instrument_node="">Inna Sharf</span></a><span data-dcnode-id="1974" instrument_node="">, McGill University, </span><em data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Towards Greater Autonomy and Safety of UAVs: Recovering from Collisions</span></em></span></b></b></p><span data-dcnode-id="1967" instrument_node="">
</span><blockquote data-dcnode-id="1947"><p data-dcnode-id="1962" wrap=""><b data-dcnode-id="1963"><b data-dcnode-id="1964"><span data-dcnode-id="1965" style="font-size: 13px;"><span data-dcnode-id="1966" instrument_node="">Making small unmanned aerial vehicles more autonomous is a continuing endeavour in the UAV research community; it is also the focus of Sharf’s research. In this context, her group has been working on problems of state estimation, localization and mapping, system integration and controller design for multicopters and indoor blimps. Following a brief overview of past research projects, this presentation will focus on current work on the development of collision recovery controllers for quadcopters. The collision dynamics model and post collision response characterization of the quadrotor are presented, followed by their experimental validation. A collision recover pipeline is proposed to allow propeller protected quadrotors to recover from a collision. This pipeline includes collision detection, impact characterization and aggressive attitude control. The strategy is validated via a comprehensive Monte Carlo simulation of collisions against a wall, showing the feasibility of recovery from challenging collision scenarios. The pipeline is implemented on a custom quadrotor platform, demonstrating feasibility of real-time performance and successful recovery from a range of pre-collision conditions. The ultimate goal is to implement a general collision recovery solution to further advance the autonomy and safety of quadrotor vehicles.&nbsp;</span></span></b></b></p><span data-dcnode-id="1961" instrument_node="">
</span><p data-dcnode-id="1957" wrap=""><b data-dcnode-id="1958"><b data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1949" wrap=""><b data-dcnode-id="1950"><b data-dcnode-id="1951"><span data-dcnode-id="1952" style="font-size: 13px;"><strong data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">Bio:</span></strong><span data-dcnode-id="1953" instrument_node=""> Dr. Inna Sharf is a professor in the Department of Mechanical Engineering at McGill University, Montreal, Canada. She received her B.A.Sc. in Engineering Science from the University of Toronto (1D at the Institute for Aerospace Studies, University of Toronto (1991). Prior to relocating to McGill in 2001, she was on faculty with the Department of Mechanical Engineering at the University of Victoria. Sharf’s research activities are in the areas of dynamics and control with applications to space robotic systems, unmanned aerial vehicles and legged robots. Sharf has published over 150 conference and journal papers on her academic research. She is an associate fellow of AIAA and a member of IEEE.</span></span></b></b></p><span data-dcnode-id="1948" instrument_node="">
</span></blockquote><span data-dcnode-id="1946" instrument_node="">
</span><p data-dcnode-id="1932"><b data-dcnode-id="1933"><b data-dcnode-id="1934"><span data-dcnode-id="1935" style="font-size: 13px;"><span data-dcnode-id="1945" instrument_node="">Nov 8 -&nbsp;</span><a data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//karaman.mit.edu/"><span data-dcnode-id="1944" instrument_node="">Sertac Karaman</span></a><span data-dcnode-id="1942" instrument_node="">, MIT,&nbsp;</span><em data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Control of High-performance Autonomous Vehicle and Their Systems </span></em><span data-dcnode-id="1939" instrument_node="">(</span><a data-dcnode-id="1937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/510"><span data-dcnode-id="1938" instrument_node="">video</span></a><span data-dcnode-id="1936" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1931" instrument_node="">
</span><blockquote data-dcnode-id="1911"><p data-dcnode-id="1926"><b data-dcnode-id="1927"><b data-dcnode-id="1928"><span data-dcnode-id="1929" style="font-size: 13px;"><span data-dcnode-id="1930" instrument_node="">In this talk, we present control and planning algorithms for autonomous vehicles that deliver high performance. In the first part of the talk, we focus on control problems for vehicle-level autonomy, i.e., for controlling a single vehicle with complex dynamics to execute complex tasks. Specifically, we introduce novel algorithms that construct arbitrarily good solutions for stochastic optimal control problems. We show that their running time scales linearly with dimension and polynomially with the rank of the optimal cost-to-go function, breaking the curse of dimensionality for low-rank problems. Our results are enabled by a novel continuous analogue of the well-known tensor-train decomposition. We demonstrate the new algorithms on a simulated perching problem, where the computational savings reach ten orders of magnitude when compared to naive approaches, such as value iteration on a grid. In the second part of the talk, we focus on system-level autonomy, i.e., problems that concern systems that consist of several autonomous vehicles. Specifically, we present results on optimal coordination of vehicles passing through an intersection. We reduce the problem to a polling system, under mild technical conditions. We show that the resulting system provides orders of magnitude improvement in delay, when compared to conventional traffic light systems.</span></span></b></b></p><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1921"><b data-dcnode-id="1922"><b data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1913"><b data-dcnode-id="1914"><b data-dcnode-id="1915"><span data-dcnode-id="1916" style="font-size: 13px;"><strong data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Bio:</span></strong><span data-dcnode-id="1917" instrument_node="">&nbsp;Sertac Karaman is an Associate Professor of Aeronautics and Astronautics at the Massachusetts Institute of Technology. He has obtained B.S. degrees in mechanical engineering and in computer engineering from the Istanbul Technical University, Turkey, in 2007; an S.M. degree in mechanical engineering from MIT in 2009; and a Ph.D. degree in electrical engineering and computer science also from MIT in 2012. His research interests lie in the broad areas of robotics and control theory. In particular, he studies the applications of probability theory, stochastic processes, stochastic geometry, formal methods, and optimization for the design and analysis of high-performance cyber-physical systems. The application areas of his research include driverless cars, unmanned aerial vehicles, distributed aerial surveillance systems, air traffic control, certification and verification of control systems software, and many others. He is the recipient of an Army Research Office Young Investigator Award in 2015, National Science Foundation Faculty Career Development (CAREER) Award in 2014, AIAA Wright Brothers Graduate Award in 2012, and an NVIDIA Fellowship in 2011. &nbsp;</span></span></b></b></p><span data-dcnode-id="1912" instrument_node="">
</span></blockquote><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1894"><b data-dcnode-id="1895"><b data-dcnode-id="1896"><span data-dcnode-id="1897" style="font-size: 13px;"><span data-dcnode-id="1909" instrument_node="">Nov 1 -&nbsp;</span><a data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//meche.mit.edu/people/faculty/ALBERTOR%40MIT.EDU"><span data-dcnode-id="1908" instrument_node="">G</span></a><a data-dcnode-id="1905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cs.brown.edu/people/gdk/"><span data-dcnode-id="1906" instrument_node="">eorge Konidaris</span></a><span data-dcnode-id="1904" instrument_node="">, Brown University,&nbsp;</span><em data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Robot Motion Planning on a Chip </span></em><span data-dcnode-id="1901" instrument_node="">(</span><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/507"><span data-dcnode-id="1900" instrument_node="">video</span></a><span data-dcnode-id="1898" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1893" instrument_node="">
</span><blockquote data-dcnode-id="1873"><p data-dcnode-id="1888"><b data-dcnode-id="1889"><b data-dcnode-id="1890"><span data-dcnode-id="1891" style="font-size: 13px;"><span data-dcnode-id="1892" instrument_node="">Despite decades of research, real-time, general-purpose robot motion&nbsp;planning remains beyond our reach. A solution to this problem is&nbsp;critical to dealing with natural environments that are not carefully&nbsp;controlled or designed, and our inability to solve it is a major&nbsp;obstacle preventing the widespread deployment of robots in the&nbsp;workplace and the home. I will describe recent research that aims to solve the real-time&nbsp;motion planning problem through the use of a specialized hardware: a&nbsp;custom processor designed solely and specifically to perform motion&nbsp;planning, capable of finding plans for interesting robots in less than&nbsp;one millisecond, while consuming less than 15 watts. I will describe&nbsp;the design of this processor, the research questions and trade-offs&nbsp;that that design induces, and the new potential capabilities created&nbsp;by the ability to find thousands of plans per second. (Collaborative research with Sean Murray, Will Floyd-Jones, Ying Qi,&nbsp;and Dan Sorin, all of Duke University.)&nbsp;</span></span></b></b></p><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1883"><b data-dcnode-id="1884"><b data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1875"><b data-dcnode-id="1876"><b data-dcnode-id="1877"><span data-dcnode-id="1878" style="font-size: 13px;"><strong data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Bio:</span></strong><span data-dcnode-id="1879" instrument_node="">&nbsp;George Konidaris is an Assistant Professor of Computer Science at&nbsp;Brown. Before joining Brown, he was on the faculty at Duke, and a&nbsp;postdoctoral researcher at MIT. George holds a PhD in Computer Science&nbsp;from the University of Massachusetts Amherst, an MSc in Artificial&nbsp;Intelligence from the University of Edinburgh, and a BScHons in&nbsp;Computer Science from the University of the Witwatersrand. He is the&nbsp;recent recipient of Young Faculty Awards from DARPA and the AFOSR.&nbsp;</span></span></b></b></p><span data-dcnode-id="1874" instrument_node="">
</span></blockquote><span data-dcnode-id="1872" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1871" instrument_node="">
</span><b data-dcnode-id="1862"><b data-dcnode-id="1863"><span data-dcnode-id="1864" style="font-size: 13px;"><span data-dcnode-id="1870" instrument_node="">Oct 25 -&nbsp;</span><a data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//meche.mit.edu/people/faculty/ALBERTOR%40MIT.EDU"><span data-dcnode-id="1869" instrument_node="">Alberto Rodriguez</span></a><span data-dcnode-id="1867" instrument_node="">, MIT&nbsp;</span><em data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">Feedback Control of the Pusher-Slider: A Story of Hybrid and Underactuated Contact Dynamics</span></em></span></b></b></p><span data-dcnode-id="1860" instrument_node="">
</span><blockquote data-dcnode-id="1835"><p data-dcnode-id="1855"><b data-dcnode-id="1856"><b data-dcnode-id="1857"><span data-dcnode-id="1858" style="font-size: 13px;"><span data-dcnode-id="1859" instrument_node="">In this talk I'll discuss ideas and ongoing work on real-time control strategies for dynamical systems that involve frictional contact interactions. Hybridness and underactuation are key characteristics of these systems that complicate the design of feedback controllers. I'll discuss these challenges and possible control solutions in the context of the pusher-slider system, where the purpose is to control the motion of an object sliding on a flat surface using a point pusher. The pusher-slider is a classical simple dynamical system with many of the challenges present in robotic manipulation tasks: noisy planar sliding friction, instability, hybridness, underactuation, ... I like to call it the simplest but still interesting problem in manipulation, a sort of "inverted pendulum" for robotic manipulation. I'll start the talk by briefing on recent work in my group's participation in the Amazon Picking Challenge, and motivate the need for closed-loop control in grasping and manipulation.</span></span></b></b></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1850"><b data-dcnode-id="1851"><b data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1842"><b data-dcnode-id="1843"><b data-dcnode-id="1844"><span data-dcnode-id="1845" style="font-size: 13px;"><strong data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Bio:</span></strong><span data-dcnode-id="1846" instrument_node="">&nbsp;Alberto Rodriguez is the Walter Henry Gale (1929) Career Development Professor at the Mechanical Engineering Department at MIT. Alberto graduated in Mathematics ('05) and Telecommunication Engineering ('06) from the Universitat Politecnica de Catalunya (UPC) in Barcelona, and earned his PhD in Robotics (’13) from the Robotics Institute at Carnegie Mellon University. After spending a year in the Locomotion group at MIT, he joined &nbsp;the faculty at MIT in 2014, where he started the Manipulation and Mechanisms Lab (MCube). Alberto is the recipient of the Best Student Paper Awards at conferences RSS 2011 and ICRA 2013 and Best Paper finalist at IROS 2016. &nbsp;His main research interests are in robotic manipulation, mechanical design, and automation. His long-term research goal is to provide robots with enough sensing, reasoning and acting capabilities to reliably manipulate their environment.</span></span></b></b></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1837"><b data-dcnode-id="1838"><b data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1836" instrument_node="">
</span></blockquote><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1824"><b data-dcnode-id="1825"><b data-dcnode-id="1826"><span data-dcnode-id="1827" style="font-size: 13px;"><span data-dcnode-id="1833" instrument_node="">Oct 18 - </span><a data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ece.rochester.edu/people/faculty/howard_tom/"><span data-dcnode-id="1832" instrument_node="">Tom Howard</span></a><span data-dcnode-id="1830" instrument_node="">, University of Rochester </span><em data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Learning Models for Robot Decision Making </span></em></span></b></b></p><span data-dcnode-id="1823" instrument_node="">
</span><blockquote data-dcnode-id="1792"><p data-dcnode-id="1818"><b data-dcnode-id="1819"><b data-dcnode-id="1820"><span data-dcnode-id="1821" style="font-size: 13px;"><span data-dcnode-id="1822" instrument_node="">The efficiency and optimality of robot decision making is often dictated by the fidelity and complexity of models for how a robot can interact with its environment.&nbsp; It is common for researchers to engineer these models a priori to achieve particular levels of performance for specific tasks in a restricted set of environments and initial conditions.&nbsp; As we progress towards more intelligent systems that perform a wider range of objectives in a greater variety of domains, the models for how robots make decisions must adapt to achieve, if not exceed,&nbsp; engineered levels of performance.&nbsp; In this talk I will discuss progress towards model adaptation for robot intelligence, including recent efforts in natural language understanding for human-robot interaction.</span></span></b></b></p><span data-dcnode-id="1817" instrument_node="">
</span><p data-dcnode-id="1813"><b data-dcnode-id="1814"><b data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1805"><b data-dcnode-id="1806"><b data-dcnode-id="1807"><span data-dcnode-id="1808" style="font-size: 13px;"><strong data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">Bio:</span></strong><span data-dcnode-id="1809" instrument_node=""> Thomas Howard is an assistant professor in the Department of Electrical and Computer Engineering and the Department of Computer Science at the University of Rochester.&nbsp; He is also a member of the Georgen Institute for Data Science and holds a secondary appointment in the Department of Biomedical Engineering. Previously he held appointments as a research scientist and a postdoctoral associate at MIT's Computer Science and Artificial Intelligence Laboratory in the Robust Robotics Group, a research technologist at the Jet Propulsion Laboratory in the Robotic Software Systems Group, and a lecturer in mechanical engineering at Caltech.</span></span></b></b></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1800"><b data-dcnode-id="1801"><b data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1794"><b data-dcnode-id="1795"><b data-dcnode-id="1796"><span data-dcnode-id="1797" style="font-size: 13px;"><span data-dcnode-id="1798" instrument_node="">Howard earned a PhD in robotics from the Robotics Institute at Carnegie Mellon University in 2009 in addition to BS degrees in electrical and computer engineering and mechanical engineering from the University of Rochester in 2004. His research interests span artificial intelligence, robotics, and human-robot interaction with particular research focus on improving the optimality, efficiency, and fidelity of models for decision making in complex and unstructured environments with applications to robot motion planning and natural language understanding.&nbsp; He has applied his research on numerous robots including planetary rovers, autonomous automobiles, mobile manipulators, robotic torsos, and unmanned aerial vehicles.&nbsp; Howard was a member of the flight software team for the Mars Science Laboratory, the motion planning lead for the JPL/Caltech DARPA Autonomous Robotic Manipulation team, and a member of Tartan Racing, winner of the DARPA Urban Challenge.</span></span></b></b></p><span data-dcnode-id="1793" instrument_node="">
</span></blockquote><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1787"><b data-dcnode-id="1788"><b data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1776"><b data-dcnode-id="1777"><b data-dcnode-id="1778"><span data-dcnode-id="1779" style="font-size: 13px;"><span data-dcnode-id="1785" instrument_node="">Oct 4 - </span><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//users.eecs.northwestern.edu/~argall/"><span data-dcnode-id="1784" instrument_node="">Brenna Argal</span></a><span data-dcnode-id="1782" instrument_node="">l, Northwestern University </span><em data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Human Autonomy through Robotics Autonomy</span></em></span></b></b></p><span data-dcnode-id="1775" instrument_node="">
</span><blockquote data-dcnode-id="1755"><p data-dcnode-id="1770"><b data-dcnode-id="1771"><b data-dcnode-id="1772"><span data-dcnode-id="1773" style="font-size: 13px;"><span data-dcnode-id="1774" instrument_node="">It is a paradox that often the more severe a person's motor impairment, the more assistance they require and yet the less able they are to operate the very assistive machines created provide this assistance. A primary aim of my lab is to address this confound by incorporating robotics autonomy and intelligence into assistive machines---to offload some of the control burden from the user. Robots already synthetically sense, act in and reason about the world, and these technologies can be leveraged to help bridge the gap left by sensory, motor or cognitive impairments in the users of assistive machines. However, here the human-robot team is a very particular one: the robot is physically supporting or attached to the human, replacing or enhancing lost or diminished function. In this case getting the allocation of control between the human and robot right is absolutely essential, and will be critical for the adoption of physically assistive robots within larger society. This talk will overview some of the ongoing projects and studies in my lab, whose research lies at the intersection of artificial intelligence, rehabilitation robotics and machine learning. We are working with a range of hardware platforms, including smart wheelchairs and assistive robotic arms. A distinguishing theme present within many of our projects is that the machine automation is customizable---to a user's unique and changing physical abilities, personal preferences or even financial means.</span></span></b></b></p><span data-dcnode-id="1769" instrument_node="">
</span><p data-dcnode-id="1765"><b data-dcnode-id="1766"><b data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1757"><b data-dcnode-id="1758"><b data-dcnode-id="1759"><span data-dcnode-id="1760" style="font-size: 13px;"><strong data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Bio:</span></strong><span data-dcnode-id="1761" instrument_node=""> Brenna Argall is the June and Donald Brewer Junior Professor of Electrical Engineering &amp; Computer Science at Northwestern University, and also an assistant professor in the Department of Mechanical Engineering and the Department of Physical Medicine &amp; Rehabilitation. Her research lies at the intersection of robotics, machine learning and human rehabilitation. She is director of the assistive &amp; rehabilitation robotics laboratory (argallab) at the Rehabilitation Institute of Chicago (RIC), the premier rehabilitation hospital in the United States, and her lab's mission is to advance human ability through robotics autonomy. Argall is a 2016 recipient of the NSF CAREER award. Her Ph.D. in Robotics (2009) was received from the Robotics Institute at Carnegie Mellon University, as well as her M.S. in Robotics (2006) and B.S. in Mathematics (2002). Prior to joining Northwestern, she was a postdoctoral fellow (2009-2011) at the École Polytechnique Fédérale de Lausanne (EPFL), and prior to graduate school she held a Computational Biology position at the National Institutes of Health (NIH).</span></span></b></b></p><span data-dcnode-id="1756" instrument_node="">
</span></blockquote><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1750"><b data-dcnode-id="1751"><b data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1739" wrap=""><b data-dcnode-id="1740"><b data-dcnode-id="1741"><span data-dcnode-id="1742" style="font-size: 13px;"><span data-dcnode-id="1748" instrument_node="">Sep 20 - </span><a data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//people.eecs.berkeley.edu/~dsadigh/"><span data-dcnode-id="1747" instrument_node="">Dorsa Sadigh</span></a><span data-dcnode-id="1745" instrument_node="">, UC Berkeley </span><em data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Towards a Theory of Human-Cyber-Physical Systems</span></em></span></b></b></p><span data-dcnode-id="1738" instrument_node="">
</span><blockquote data-dcnode-id="1707"><p data-dcnode-id="1733" wrap=""><b data-dcnode-id="1734"><b data-dcnode-id="1735"><span data-dcnode-id="1736" style="font-size: 13px;"><span data-dcnode-id="1737" instrument_node="">The goal of my research is to enable safe and reliable integration of Human-Cyber-Physical Systems (h-CPS) in our society by providing a unified framework for modeling and design of these systems. Today’s society is rapidly advancing towards CPS that interact and collaborate with humans, e.g., semiautonomous vehicles interacting with drivers and pedestrians, medical robots used in collaboration with doctors, or service robots interacting with their users in smart homes. The safety-critical nature of these systems requires us to provide provably correct guarantees about their performance. I aim to develop a formalism for design of algorithms and mathematical models that enable correct-by-construction control and verification of h-CPS.&nbsp;</span></span></b></b></p><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1728" wrap=""><b data-dcnode-id="1729"><b data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1722" wrap=""><b data-dcnode-id="1723"><b data-dcnode-id="1724"><span data-dcnode-id="1725" style="font-size: 13px;"><span data-dcnode-id="1726" instrument_node="">In this talk, I will focus on two natural instances of this agenda. I will first talk about interaction-aware control, where we use algorithmic HRI to be mindful of the effects of autonomous systems on humans, and further leverage these effects for better safety and efficiency. I will then talk about providing correctness guarantees while taking into account the uncertainty arising from the environment. Through this effort, I will introduce Probabilistic Signal Temporal Logic (PrSTL), an expressive specification language that allows representing Bayesian graphical models as part of its predicates. Then, I will provide a solution for synthesizing controllers that satisfy PrSTL specifications, and further discuss a diagnosis and repair algorithm for systematic transfer of control to the human in unrealizable settings. While the algorithms and techniques introduced can be applied to many h-CPS applications, in this talk, I will focus on the implications of my work for semiautonomous driving.</span></span></b></b></p><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1717" wrap=""><b data-dcnode-id="1718"><b data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1716" instrument_node="">
</span><p data-dcnode-id="1709" wrap=""><b data-dcnode-id="1710"><b data-dcnode-id="1711"><span data-dcnode-id="1712" style="font-size: 13px;"><strong data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Bio:</span></strong><span data-dcnode-id="1713" instrument_node=""> Dorsa Sadigh is a Ph.D. candidate in the Electrical Engineering and Computer Sciences department at UC Berkeley. Her research interests lie in the intersection of control theory, formal methods and human-robot interactions. Specifically, she works on developing a unified framework for safe and reliable design of&nbsp; human-cyber-physical systems. Dorsa received her B.S. from Berkeley EECS in 2012. She was awarded the NDSEG and NSF graduate research fellowships in 2013. She was the recipient of the 2016 Leon O. Chua department award and the 2011 Arthur M. Hopkin department award for achievement in the field of nonlinear science, and she received the Google Anita Borg Scholarship in 2016.</span></span></b></b></p><span data-dcnode-id="1708" instrument_node="">
</span></blockquote><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1702"><b data-dcnode-id="1703"><b data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1701" instrument_node="">
</span><p data-dcnode-id="1683"><b data-dcnode-id="1684"><b data-dcnode-id="1685"><span data-dcnode-id="1686" style="font-size: 13px;"><strong data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Spring 2016 Campus-wide Robotics Seminar</span></strong><strong data-dcnode-id="1688"><span data-dcnode-id="1698" instrument_node=""> (sponsored by </span><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aurora.aero/"><span data-dcnode-id="1697" instrument_node="">Aurora Flight Sciences</span></a><span data-dcnode-id="1695" instrument_node=""> , </span><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mathworks.com/"><span data-dcnode-id="1694" instrument_node="">The MathWorks</span></a><span data-dcnode-id="1692" instrument_node=""> , and the </span><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.russellsage.org/"><span data-dcnode-id="1691" instrument_node="">Russell Sage Foundation</span></a><span data-dcnode-id="1689" instrument_node=""> )&nbsp; (11am-noon in 32-G449</span></strong><span data-dcnode-id="1687" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1678"><b data-dcnode-id="1679"><b data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1677" instrument_node="">
</span><p data-dcnode-id="1663" wrap=""><b data-dcnode-id="1664"><b data-dcnode-id="1665"><span data-dcnode-id="1666" style="font-size: 13px;"><span data-dcnode-id="1676" instrument_node="">May 10 - </span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//april.eecs.umich.edu/people/ebolson/"><span data-dcnode-id="1675" instrument_node="">Ed Olson</span></a><span data-dcnode-id="1673" instrument_node="">, Michigan </span><em data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Reliable robots: failing without failing </span></em><span data-dcnode-id="1670" instrument_node="">(</span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/438"><span data-dcnode-id="1669" instrument_node="">video</span></a><span data-dcnode-id="1667" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1662" instrument_node="">
</span><blockquote data-dcnode-id="1639"><p data-dcnode-id="1657" wrap=""><b data-dcnode-id="1658"><b data-dcnode-id="1659"><span data-dcnode-id="1660" style="font-size: 13px;"><span data-dcnode-id="1661" instrument_node="">Everything about a robot is unreliable: sensors lie, state estimators compute poor means and variances, and actuators slip and slide. It is too much to ask these systems to be 100% reliable, but then how do we build incredibly reliable systems that can operate for 100 million miles between serious mishap, or those that can inhabit a house alongside people without occasionally running over the cats?</span></span></b></b></p><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1652" wrap=""><b data-dcnode-id="1653"><b data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1646" wrap=""><b data-dcnode-id="1647"><b data-dcnode-id="1648"><span data-dcnode-id="1649" style="font-size: 13px;"><span data-dcnode-id="1650" instrument_node="">In this talk, I describe two different approaches that allow robots to tolerate failures, moving us away from the need for 100% reliability. The first is an probabilistic inference system (Max-Mixtures) that allows us to model non-Gaussian sensor failures. Max-Mixtures can be used to unify outlier rejection and state estimation or to do inference when sensor data is multi-modal, but they are nearly as fast as ordinary least squares methods. The second approach is a planning approach (Multi-Policy Decision Making, MPDM) that allows a robot to introspectively choose between multiple ways of performing a task, selecting the more reliable approach. For example, a robot might choose to visually servo towards a target instead of trajectory planning through a 3D model acquired from LIDAR. In short, the robot does the easy dumb thing when it can, and resorts to the complex thing when it must.</span></span></b></b></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1641" wrap=""><b data-dcnode-id="1642"><b data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1640" instrument_node="">
</span></blockquote><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1624" wrap=""><b data-dcnode-id="1625"><b data-dcnode-id="1626"><span data-dcnode-id="1627" style="font-size: 13px;"><span data-dcnode-id="1637" instrument_node="">Apr 26 - </span><a data-dcnode-id="1635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www-cvr.ai.uiuc.edu/~seth/"><span data-dcnode-id="1636" instrument_node="">Seth Hutchinson</span></a><span data-dcnode-id="1634" instrument_node="">, UIUC </span><em data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Robust Distributed Control Policies for Multi-Robot Systems</span></em><span data-dcnode-id="1631" instrument_node=""> (</span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/433"><span data-dcnode-id="1630" instrument_node="">video</span></a><span data-dcnode-id="1628" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1623" instrument_node="">
</span><blockquote data-dcnode-id="1603"><p data-dcnode-id="1618"><b data-dcnode-id="1619"><b data-dcnode-id="1620"><span data-dcnode-id="1621" style="font-size: 13px;"><span data-dcnode-id="1622" instrument_node="">In this talk, I will describe our recent progress in developing fault-tolerant distributed control policies for multi-robot systems. We consider two problems: rendezvous and coverage. For the former, the goal is to bring all robots to a common location, while for the latter the goal is to deploy robots to achieve optimal coverage of an environment. We consider the case in which each robot is an autonomous decision maker that is anonymous, memoryless, and dimensionless, i.e., robots are indistinguishable to one another, make decisions based upon only current information, and do not consider collisions. Each robot has a limited sensing range, and is able to directly estimate the state of only those robots within that sensing range, which induces a network topology for the multi-robot system. We assume that it is not possible for the fault-free robots to identify the faulty robots (e.g., due to the anonymous property of the robots). For each problem, we provide an efficient computational framework and analysis of algorithms, all of which converge in the face of faulty robots under a few assumptions on the network topology and sensing abilities.</span></span></b></b></p><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1613"><b data-dcnode-id="1614"><b data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1605" wrap=""><b data-dcnode-id="1606"><b data-dcnode-id="1607"><span data-dcnode-id="1608" style="font-size: 13px;"><strong data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Bio:</span></strong><span data-dcnode-id="1609" instrument_node=""> Seth Hutchinson received his Ph.D. from Purdue University in 1988. In 1990 he joined the faculty at the University of Illinois in Urbana-Champaign, where he is currently a Professor in the Department of Electrical and Computer Engineering, the Coordinated Science Laboratory, and the Beckman Institute for Advanced Science and Technology. He served as Associate Department Head of ECE from 2001 to 2007. He currently serves on the editorial boards of the International Journal of Robotics Research and the Journal of Intelligent Service Robotics, and chairs the steering committee of the IEEE Robotics and Automation Letters. He was Founding Editor-in-Chief of the IEEE Robotics and Automation Society's Conference Editorial Board (2006-2008), and Editor-in-Chief of the IEEE Transaction on Robotics (2008-2013). He has published more than 200 papers on the topics of robotics and computer vision, and is coauthor of the books "Principles of Robot Motion: Theory, Algorithms, and Implementations," published by MIT Press, and "Robot Modeling and Control," published by Wiley. Hutchinson is a Fellow of the IEEE.</span></span></b></b></p><span data-dcnode-id="1604" instrument_node="">
</span></blockquote><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1598" wrap=""><b data-dcnode-id="1599"><b data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1583" wrap=""><b data-dcnode-id="1584"><b data-dcnode-id="1585"><span data-dcnode-id="1586" style="font-size: 13px;"><span data-dcnode-id="1596" instrument_node="">April 12 - </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cs.cmu.edu/~siddh/"><span data-dcnode-id="1595" instrument_node="">Sidd Srinivasa</span></a><span data-dcnode-id="1593" instrument_node="">, CMU </span><em data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Physics-based Manipulation</span></em><span data-dcnode-id="1590" instrument_node=""> (</span><a data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/424"><span data-dcnode-id="1589" instrument_node="">video</span></a><span data-dcnode-id="1587" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1582" instrument_node="">
</span><blockquote data-dcnode-id="1570"><p data-dcnode-id="1577" wrap=""><b data-dcnode-id="1578"><b data-dcnode-id="1579"><span data-dcnode-id="1580" style="font-size: 13px;"><span data-dcnode-id="1581" instrument_node="">Humans effortlessly push, pull, and slide objects, fearlessly reconfiguring clutter, and using physics and the world as a helping hand. But most robots treat the world like a game of pick-up-sticks: avoiding clutter and attempting to rigidly grasp anything they want to move. I'll talk about some of our ongoing efforts at harnessing physics for nonprehensile manipulation, and the challenges of deploying our algorithms on real physical systems. I'll specifically focus on whole-arm manipulation, state estimation for contact manipulation, and on closing the feedback loop on nonprehensile manipulation.</span></span></b></b></p><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1572" wrap=""><b data-dcnode-id="1573"><b data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1571" instrument_node="">
</span></blockquote><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1555"><b data-dcnode-id="1556"><b data-dcnode-id="1557"><span data-dcnode-id="1558" style="font-size: 13px;"><span data-dcnode-id="1568" instrument_node="">April 7 - </span><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//robots.princeton.edu/people/xj/"><span data-dcnode-id="1567" instrument_node="">Jianxiong Xiao</span></a><span data-dcnode-id="1565" instrument_node="">, Princeton </span><em data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Three Design Principles for Robust Robot Perception</span></em><span data-dcnode-id="1562" instrument_node=""> (</span><a data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/422"><span data-dcnode-id="1561" instrument_node="">video</span></a><span data-dcnode-id="1559" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1554" instrument_node="">
</span><blockquote data-dcnode-id="1522"><p data-dcnode-id="1545"><b data-dcnode-id="1546"><b data-dcnode-id="1547"><span data-dcnode-id="1548" style="font-size: 13px;"><span data-dcnode-id="1553" instrument_node="">Recent years have witnessed tremendous progress in the development of autonomous machines. Autonomous cars have driven over millions of miles, and robots now regularly perform tasks too dangerous or monotonous for human beings. Yet despite these advancements, robots continue to remain highly dependent on human operators and carefully designed environments. In one prominent example, the DARPA Robotics Challenge asked dozens of participating robots to complete tasks in a mock disaster response scenario. But all teams, lacking confidence in their robot?s ability to reliably perceive its surroundings, opted to outsource most perception to humans. Team KAIST, the eventual winner, "found that the most (actually all) famous algorithms are not very effective in real situations."</span><br data-dcnode-id="1552"><span data-dcnode-id="1551" instrument_node="">
&nbsp;</span><br data-dcnode-id="1550"><span data-dcnode-id="1549" instrument_node="">
In this talk, I will address the endeavor of bridging the gap between computer vision and robot perception, summarizing my experiences in three design principles. First, I will argue that it is crucial for the algorithms to fully operate end-to-end in three-dimensions, establishing the grounds for the area of "3D Deep Learning". I will demonstrate this idea on object detection, view planning, and mapping in a personal robotics scenario. Second, I will highlight the importance of direct perception in estimating affordances for a robot's actions, demonstrating the idea in an autonomous driving application. Third, I will propose the design of robot systems with failure modes of perception in mind, allowing for pitfall avoidance and an extremely high level of robustness. Finally, going beyond perception, I will briefly mention some ongoing works in Big Data Robotics, Robot Learning, and Human Robot Collaboration.</span></span></b></b></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1540"><b data-dcnode-id="1541"><b data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1529"><b data-dcnode-id="1530"><b data-dcnode-id="1531"><span data-dcnode-id="1532" style="font-size: 13px;"><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Bio:</span></strong><span data-dcnode-id="1536" instrument_node=""> Jianxiong Xiao is an Assistant Professor in the Department of Computer Science at Princeton University. He received his Ph.D. from the Computer Science and Artificial Intelligence Laboratory (CSAIL) at the Massachusetts Institute of Technology (MIT) in 2013. Before that, he received a BEng. and MPhil. in Computer Science from the Hong Kong University of Science and Technology in 2009. His research focuses on bridging the gap between computer vision and robotics by building extremely robust and dependable computer vision systems for robot perception. In particular, he is interested in 3D Deep Learning, RGB-D Recognition and Mapping, Deep Learning for Robotics, Autonomous Driving, Big Data Robotics, and Robot Learning. His work has received the Best Student Paper Award at the European Conferenceon Computer Vision (ECCV) in 2012 and the Google Research Best Papers Award for 2012, and has appeared in the popular press. Jianxiong was awarded the Google U.S./Canada Fellowship in Computer Vision in 2012, the MIT CSW Best Research Award in 2011, and two Google Faculty Awards in 2014 and in 2015 respectively.&nbsp;More information can be found at </span><a class="moz-txt-link-freetext" data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//vision.princeton.edu/"><span data-dcnode-id="1535" instrument_node="">http://vision.princeton.edu</span></a><span data-dcnode-id="1533" instrument_node="">.</span></span></b></b></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1524"><b data-dcnode-id="1525"><b data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1523" instrument_node="">
</span></blockquote><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1507"><b data-dcnode-id="1508"><b data-dcnode-id="1509"><span data-dcnode-id="1510" style="font-size: 13px;"><span data-dcnode-id="1520" instrument_node="">April 5 - </span><a data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pracsyslab.org/bekris"><span data-dcnode-id="1519" instrument_node="">Kostas Bekris</span></a><span data-dcnode-id="1517" instrument_node="">, Rutgers </span><em data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Algorithmic Tradeoffs in Robot Motion Planning </span></em><span data-dcnode-id="1514" instrument_node="">(</span><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/420"><span data-dcnode-id="1513" instrument_node="">video</span></a><span data-dcnode-id="1511" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1506" instrument_node="">
</span><blockquote data-dcnode-id="1481"><p data-dcnode-id="1501" wrap=""><b data-dcnode-id="1502"><b data-dcnode-id="1503"><span data-dcnode-id="1504" style="font-size: 13px;"><span data-dcnode-id="1505" instrument_node="">Roboticists have addressed increasingly complicated motion planning challenges over the last decades. A popular paradigm related to this achievement corresponds to sampling and graph-based solutions, for which the conditions to achieve asymptotic optimality have been recently identified. In this domain, we have contributed a study on the practical properties of these planners after finite computation time and how sparse representations can guarantee to efficiently return near-optimal solutions. We have also proposed the first method that achieves asymptotic optimality for kinodynamic planning without access to a steering function, which can impact high-dimensional belief space planning. After reviewing these contributions, this talk will discuss recent work on manipulation task planning challenges. In particular, we will present a methodology for efficiently rearranging multiple similar objects using a robotic arm. The talk will conclude on how such algorithmic progress together with technological developments bring the hope of reliably deploying robots in important applications, ranging from space exploration to warehouse automation and logistics.&nbsp;</span></span></b></b></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1496" wrap=""><b data-dcnode-id="1497"><b data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1488" wrap=""><b data-dcnode-id="1489"><b data-dcnode-id="1490"><span data-dcnode-id="1491" style="font-size: 13px;"><strong data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Bio:</span></strong><span data-dcnode-id="1492" instrument_node=""> Kostas Bekris is an Assistant Professor of Computer Science at Rutgers University. He completed his PhD degree in Computer Science at Rice University, Houston, TX, under the supervision of Prof. Lydia Kavraki.&nbsp; He was Assistant Professor at the University of Nevada, Reno between 2008 and 2012. He works in robotics and his interests include motion planning, especially for systems with dynamics, manipulation, online replanning, motion coordination, and applications in cyber-physical systems and simulations. His research group has been supported by NSF, NASA (Early CAREER Faculty award), DHS, DoD and the NY/NJ Port Authority.</span></span></b></b></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1483" wrap=""><b data-dcnode-id="1484"><b data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1482" instrument_node="">
</span></blockquote><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1466" wrap=""><b data-dcnode-id="1467"><b data-dcnode-id="1468"><span data-dcnode-id="1469" style="font-size: 13px;"><span data-dcnode-id="1479" instrument_node="">March 29 - </span><a data-dcnode-id="1477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cs.cmu.edu/~ebrun/"><span data-dcnode-id="1478" instrument_node="">Emma Brunskill</span></a><span data-dcnode-id="1476" instrument_node="">, CMU</span><em data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node=""> Learning to Make Good Decisions in Noisy, Stochastic, Costly Domains </span></em><span data-dcnode-id="1473" instrument_node="">(</span><a data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/418"><span data-dcnode-id="1472" instrument_node="">video</span></a><span data-dcnode-id="1470" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1465" instrument_node="">
</span><blockquote data-dcnode-id="1458"><p data-dcnode-id="1460" wrap=""><b data-dcnode-id="1461"><b data-dcnode-id="1462"><span data-dcnode-id="1463" style="font-size: 13px;"><span data-dcnode-id="1464" instrument_node="">A critical aspect of human intelligence is the ability to learn to make good decisions. Achieving similar behavior in artificial agents is a key focus in AI, and could have enormous benefits, particularly in applications like education and healthcare where autonomous agents could help people expand their capacity and reach their potential. But tackling such domains requires approaches that can handle the noisy, stochastic, costly decisions that characterize interacting with people. In this talk I will describe some of our recent work in pursuing this agenda. One key focus has been on offline policy evaluation, how to use old data to estimate the performance of different strategies, and I will discuss a new estimator that can yield orders of magnitude smaller mean squared estimates. I will also describe how problems like transfer learning and partially observable reinforcement learning can be framed as instances of latent variable modeling for control, and enable new sample complexity results for these settings. Our advances in these topics have enabled us to obtain more engaging educational games and better news recommendations.</span></span></b></b></p><span data-dcnode-id="1459" instrument_node="">
</span></blockquote><span data-dcnode-id="1457" instrument_node="">
</span><blockquote data-dcnode-id="1448"><p data-dcnode-id="1450" wrap=""><b data-dcnode-id="1451"><b data-dcnode-id="1452"><span data-dcnode-id="1453" style="font-size: 13px;"><strong data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Bio:</span></strong><span data-dcnode-id="1454" instrument_node=""> Emma Brunskill is an assistant professor of computer science and an affiliate professor of machine learning at Carnegie Mellon University. She is a Rhodes Scholar, a Microsoft Faculty Fellow, a NSF CAREER awardee and a ONR Young Investigator Program recipient. Her work has been recognized with best paper nominations at the Educational Data Mining conference (2012,2013) and the Computer Human Interaction conference (2014), and a best paper award at the Reinforcement Learning and Decision Making Conference (2015).</span></span></b></b></p><span data-dcnode-id="1449" instrument_node="">
</span></blockquote><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1443"><b data-dcnode-id="1444"><b data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1431"><b data-dcnode-id="1432"><b data-dcnode-id="1433"><span data-dcnode-id="1434" style="font-size: 13px;"><span data-dcnode-id="1441" instrument_node="">March 8 - Cynthia Sung, MIT </span><em data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Computational Tools for Robot Design: A Composition Approach </span></em><span data-dcnode-id="1438" instrument_node="">(</span><a data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/408"><span data-dcnode-id="1437" instrument_node="">video</span></a><span data-dcnode-id="1435" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1430" instrument_node="">
</span><blockquote data-dcnode-id="1386"><p data-dcnode-id="1425"><b data-dcnode-id="1426"><b data-dcnode-id="1427"><span data-dcnode-id="1428" style="font-size: 13px;"><span data-dcnode-id="1429" instrument_node="">As robots become more prevalent in society, they must develop an ability to deal with more diverse situations. This ability entails customizability of not only software intelligence, but also of hardware. However, designing a functional robot remains challenging and often involves many iterations of design and testing even for skilled designers. My goal is to create computational tools for making functional machines, allowing future designers to quickly improvise new hardware.</span></span></b></b></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1420"><b data-dcnode-id="1421"><b data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1414"><b data-dcnode-id="1415"><b data-dcnode-id="1416"><span data-dcnode-id="1417" style="font-size: 13px;"><span data-dcnode-id="1418" instrument_node="">In this talk, I will discuss one possible approach to automated design using composition. I will describe our origami-inspired print-and-fold process that allows entire robots to be fabricated within a few hours, and I will demonstrate how foldable modules can be composed together to create foldable mechanisms and robots. The modules are represented parametrically, enabling a small set of modules to describe a wide range of geometries and also allowing geometries to be optimized in a straightforward manner. I will also introduce a tool that we have developed that combines this composition approach with simulations to help human designers of all skill levels to design and fabricate custom functional robots.</span></span></b></b></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1409"><b data-dcnode-id="1410"><b data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1393"><b data-dcnode-id="1394"><b data-dcnode-id="1395"><span data-dcnode-id="1396" style="font-size: 13px;"><strong data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">Bio:</span></strong><span data-dcnode-id="1405" instrument_node=""> Cynthia Sung is a Ph.D. candidate working with Prof. Daniela Rus in the Computer Science and Artificial Intelligence Laboratory at the</span><br data-dcnode-id="1404"><span data-dcnode-id="1403" instrument_node="">
Massachusetts Institute of Technology (MIT). She received a B.S. in Mechanical Engineering from Rice University in 2011 and an M.S. in</span><br data-dcnode-id="1402"><span data-dcnode-id="1401" instrument_node="">
Electrical Engineering and Computer Science from MIT in 2013. Cynthia is a recipient of the NDSEG and NSF graduate fellowships. Her research</span><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">
interests include computational design, folding theory, and rapid fabrication, and her current work focuses on algorithms for synthesis</span><br data-dcnode-id="1398"><span data-dcnode-id="1397" instrument_node="">
and analysis of engineering designs.</span></span></b></b></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1388"><b data-dcnode-id="1389"><b data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1387" instrument_node="">
</span></blockquote><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1371" wrap=""><b data-dcnode-id="1372"><b data-dcnode-id="1373"><span data-dcnode-id="1374" style="font-size: 13px;"><span data-dcnode-id="1384" instrument_node="">March 1 - </span><a data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mems.duke.edu/faculty/kris-hauser"><span data-dcnode-id="1383" instrument_node="">Kris Hauser</span></a><span data-dcnode-id="1381" instrument_node="">, Duke </span><em data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Motion Planning for Real World Robots</span></em><span data-dcnode-id="1378" instrument_node=""> (</span><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/405"><span data-dcnode-id="1377" instrument_node="">video</span></a><span data-dcnode-id="1375" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1370" instrument_node="">
</span><blockquote data-dcnode-id="1344"><p data-dcnode-id="1365" wrap=""><b data-dcnode-id="1366"><b data-dcnode-id="1367"><span data-dcnode-id="1368" style="font-size: 13px;"><span data-dcnode-id="1369" instrument_node="">Motion planning – the problem of computing physical actions to complete a specified task – is a fundamental problem in robotics, and has inspired some of the most rigorous and beautiful theoretical results in robotics research. But as robots proliferate in real-world applications like household service, driverless cars, warehouse automation, minimally-invasive surgery, search-and-rescue, and unmanned aerial vehicles, we are beginning to see the classical theory falter in light of the new reality of modern robotics practice. Today’s robots must handle large amounts of noisy sensor data, uncertainty, underspecified models, nonlinear and hysteretic dynamic effects, exotic objective functions and constraints, and real-time demands. This talk will present recent efforts to bring motion planners to bear on real robots, along four general directions 1) improving planning algorithm performance, 2) broadening the scope of problems that can be addressed by planners, 3) incorporating richer, higher fidelity models into planning, and 4) improved workflows for integrating planners into robot systems. This research is applied to a variety of systems, including ladder climbing in the DARPA Robotics Challenge, the Duke rock-climbing robot project, semiautonomous mobile manipulators, and object manipulation in the Amazon Picking Challenge.&nbsp;</span></span></b></b></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1360" wrap=""><b data-dcnode-id="1361"><b data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1352" wrap=""><b data-dcnode-id="1353"><b data-dcnode-id="1354"><span data-dcnode-id="1355" style="font-size: 13px;"><strong data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Bio:</span></strong><span data-dcnode-id="1356" instrument_node=""> Kris Hauser is an Associate Professor at the Pratt School of Engineering at Duke University with a joint appointment in the Electrical and Computer Engineering Department and the Mechanical Engineering and Materials Science Department. He received his PhD in Computer Science from Stanford University in 2008, bachelor's degrees in Computer Science and Mathematics from UC Berkeley in 2003, and worked as a postdoctoral fellow at UC Berkeley. He then joined the faculty at Indiana University from 2009-2014, where he started the Intelligent Motion Lab, and began his current position at Duke in 2014. He is a recipient of a Stanford Graduate Fellowship, Siebel Scholar Fellowship, Best Paper Award at IEEE Humanoids 2015, and an NSF CAREER award.&nbsp;</span></span></b></b></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1346" wrap=""><b data-dcnode-id="1347"><b data-dcnode-id="1348"><span data-dcnode-id="1349" style="font-size: 13px;"><span data-dcnode-id="1350" instrument_node="">Research interests include robot motion planning and control, semiautonomous robots, and integrating perception and planning, as well as applications to intelligent vehicles, robotic manipulation, robot-assisted medicine, and legged locomotion.&nbsp;</span></span></b></b></p><span data-dcnode-id="1345" instrument_node="">
</span></blockquote><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1339" wrap=""><b data-dcnode-id="1340"><b data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1324" wrap=""><b data-dcnode-id="1325"><b data-dcnode-id="1326"><span data-dcnode-id="1327" style="font-size: 13px;"><span data-dcnode-id="1337" instrument_node="">February 23 - </span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mit.edu/~pwensing/Patrick_Wensing/Home.html"><span data-dcnode-id="1336" instrument_node="">Patrick Wensing</span></a><span data-dcnode-id="1334" instrument_node="">, MIT MechE </span><em data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Control Design for Legged Robots: Physical Principles Enabling Dynamic Mobility </span></em><span data-dcnode-id="1331" instrument_node="">(</span><a data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/403"><span data-dcnode-id="1330" instrument_node="">video</span></a><span data-dcnode-id="1328" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1323" instrument_node="">
</span><blockquote data-dcnode-id="1314"><p data-dcnode-id="1316" wrap=""><b data-dcnode-id="1317"><b data-dcnode-id="1318"><span data-dcnode-id="1319" style="font-size: 13px;"><strong data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Abstract:</span></strong><span data-dcnode-id="1320" instrument_node=""> Recent technological advances have given way to a new generation of versatile legged robots. These machines are envisioned to replace first responders in disaster scenarios and enable unmanned exploration of distant planets. To achieve these aims, however, our robots must be able to manage physical interaction through contact to move through unstructured terrain. This talk reports on the development of control systems for legged robots to achieve unprecedented levels of dynamic mobility by addressing many critical problems for contact interaction with the environment. Drawing on key insights from biomechanics, the talk will open with a description of optimization-based balance control algorithms for high-speed locomotion in humanoid robots. It will then present design features of the MIT Cheetah 2 quadruped robot that enable dynamic locomotion in experimental hardware. A model predictive control framework for this robot will be described which enables the Cheetah to autonomously jump over obstacles with a maximum height of 40 cm (80% of leg length) while running at 2.5 m/s. Across these results, dynamic physical interaction with the environment is exploited, rather than avoided, to achieve new levels of performance.</span></span></b></b></p><span data-dcnode-id="1315" instrument_node="">
</span></blockquote><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1309"><b data-dcnode-id="1310"><b data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1294"><b data-dcnode-id="1295"><b data-dcnode-id="1296"><span data-dcnode-id="1297" style="font-size: 13px;"><span data-dcnode-id="1307" instrument_node="">February 16 - </span><a data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/adam-bry-a5788582"><span data-dcnode-id="1306" instrument_node="">Adam Bry</span></a><span data-dcnode-id="1304" instrument_node="">, Skydio </span><em data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Algorithms and challenges in scaling up autonomous flight </span></em><span data-dcnode-id="1301" instrument_node="">(</span><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/402"><span data-dcnode-id="1300" instrument_node="">video</span></a><span data-dcnode-id="1298" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1293" instrument_node="">
</span><blockquote data-dcnode-id="1266"><p data-dcnode-id="1288"><b data-dcnode-id="1289"><b data-dcnode-id="1290"><span data-dcnode-id="1291" style="font-size: 13px;"><span data-dcnode-id="1292" instrument_node="">Drones hold enormous potential for consumer video, inspection, mapping, monitoring, and perhaps even delivery. They’re also natural candidates for autonomy and likely to be among the first widely-deployed systems that incorporate meaningful intelligence based on computer vision and robotics research. In this talk I’ll discuss the trajectory of hobbies, research, and work that led me to start Skydio. I’ll cover some of the algorithms developed during my research at MIT which culminated in a fixed-wing vehicle that could navigate obstacles at high speeds. I’ll also present some of the work that we’ve done at Skydio in motion planning and perception, along with the challenges involved in building a robust robotics software system that needs to work at scale.</span></span></b></b></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1283"><b data-dcnode-id="1284"><b data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1275" wrap=""><b data-dcnode-id="1276"><b data-dcnode-id="1277"><span data-dcnode-id="1278" style="font-size: 13px;"><strong data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Bio: </span></strong><span data-dcnode-id="1279" instrument_node="">Adam Bry is co-founder and CEO of Skydio, a venture backed drone startup based in the bay area. Prior to Skydio he helped start Project Wing at Google[x] where he worked on the flight algorithms and software. He holds a SM in Aero/Astro from MIT and a BS in Mechanical Engineering from Olin College. Adam grew up flying radio controlled airplanes and is a former national champion in precision aerobatics.</span></span></b></b></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1268" wrap=""><b data-dcnode-id="1269"><b data-dcnode-id="1270"><span data-dcnode-id="1271" style="font-size: 13px;"><a class="moz-txt-link-freetext" data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.skydio.com/"><span data-dcnode-id="1273" instrument_node="">http://www.skydio.com/</span></a></span></b></b></p><span data-dcnode-id="1267" instrument_node="">
</span></blockquote><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1261" wrap=""><b data-dcnode-id="1262"><b data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1250" wrap=""><b data-dcnode-id="1251"><b data-dcnode-id="1252"><span data-dcnode-id="1253" style="font-size: 13px;"><span data-dcnode-id="1259" instrument_node="">February 9 - </span><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.seas.harvard.edu/directory/rjwood"><span data-dcnode-id="1258" instrument_node="">Rob Wood</span></a><span data-dcnode-id="1256" instrument_node="">, Harvard </span><em data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Manufacturing, actuation, sensing, and control for robotic insects</span></em></span></b></b></p><span data-dcnode-id="1249" instrument_node="">
</span><blockquote data-dcnode-id="1238"><p data-dcnode-id="1244" wrap=""><b data-dcnode-id="1245"><b data-dcnode-id="1246"><span data-dcnode-id="1247" style="font-size: 13px;"><span data-dcnode-id="1248" instrument_node="">As the characteristic size of a flying robot decreases, the challenges for successful flight revert to basic questions of fabrication, actuation, fluid mechanics, stabilization, and power -- whereas such questions have in general been answered for larger aircraft. When developing a robot on the scale of a housefly, all hardware must be developed from scratch as there is nothing "off-the-shelf" which can be used for mechanisms, sensors, or computation that would satisfy the extreme mass and power limitations. With these challenges in mind, this talk will present progress in the essential technologies for insect-scale robots and the latest flight experiments with robotic insects.</span></span></b></b></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1240"><a class="moz-txt-link-freetext" data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//micro.seas.harvard.edu/"><span data-dcnode-id="1242" instrument_node="">http://micro.seas.harvard.edu</span></a></p><span data-dcnode-id="1239" instrument_node="">
</span></blockquote><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1233" wrap=""><b data-dcnode-id="1234"><b data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1221" wrap=""><b data-dcnode-id="1222"><b data-dcnode-id="1223"><span data-dcnode-id="1224" style="font-size: 13px;"><span data-dcnode-id="1231" instrument_node="">December 15 - </span><a data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.is.mpg.de/sitti"><span data-dcnode-id="1230" instrument_node="">Metin Sitti</span></a><span data-dcnode-id="1228" instrument_node="">, Max Planck Institute</span><em data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node=""> Mobile Microrobotics </span></em><span data-dcnode-id="1225" instrument_node="">(no video)</span></span></b></b></p><span data-dcnode-id="1220" instrument_node="">
</span><blockquote data-dcnode-id="1200"><p data-dcnode-id="1215" wrap=""><b data-dcnode-id="1216"><b data-dcnode-id="1217"><span data-dcnode-id="1218" style="font-size: 13px;"><span data-dcnode-id="1219" instrument_node="">Untethered mobile microrobots have the unique capability of accessing to small spaces and scales directly. Due to their small size and micron-scale physics and dynamics, they could be agile and portable, and could be inexpensive and in large numbers if they are mass-produced. Mobile microrobots would have high impact applications in health-care, bioengineering, mobile sensor networks, desktop micromanufacturing, and inspection. In this presentation, mobile microrobots from few micrometers up to hundreds of micrometer overall sizes and various locomotion capabilities are presented.&nbsp; Going down to micron scale, one of the grand challenges for mobile microrobots is miniaturization limitation on on-board actuation, powering, sensing, processing, and communication components.&nbsp; Two alternative approaches are explored in this talk to solve the actuation and powering challenges.&nbsp; First, biological cells, e.g. bacteria, attached to the surface of a synthetic microrobot are used as on-board microactuators and microsensors using the&nbsp; chemical energy inside or outside the cell in physiological fluids. Bacteria-propelled randomly microswimmers are steered using chemical and pH gradients in the environment and remote magnetic fields towards future targeted drug delivery and environmental remediation applications. As the second approach, external actuation of untethered magnetic microrobots using remote magnetic fields in enclosed spaces is demonstrated. New magnetic microrobot locomotion principles based on rotational stick-slip and rolling&nbsp; dynamics are proposed. Novel magnetic composite materials are used to address and control teams of microrobots and to create novel soft actuators and programmable soft matter. Untethered microrobot teams are demonstrated to manipulate live cells and microgels with embedded cells for bioengineering applications, and to self-assemble into different patterns with remote magnetic control.</span></span></b></b></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1210" wrap=""><b data-dcnode-id="1211"><b data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1202" wrap=""><b data-dcnode-id="1203"><b data-dcnode-id="1204"><span data-dcnode-id="1205" style="font-size: 13px;"><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Bio:</span></strong><span data-dcnode-id="1206" instrument_node=""> Metin Sitti received the BSc and MSc degrees in electrical and electronics engineering from Bogazici University, Istanbul, Turkey, in 1992 and 1994, respectively, and the PhD degree in electrical engineering from the University of Tokyo, Tokyo, Japan, in 1999. He was a research scientist at UC Berkeley during 1999-2002. He is currently a director in Max-Planck Institute for Intelligent Systems and a professor in Department of Mechanical Engineering and Robotics Institute at Carnegie Mellon University. His research interests include small-scale physical intelligence, mobile microrobots, bio-inspired millirobots, smart and soft micro/nanomaterials, and programmable self-assembly. He is an IEEE Fellow. He received the SPIE Nanoengineering Pioneer Award in 2011 and NSF CAREER Award in 2005. He received the IEEE/ASME Best Mechatronics Paper Award in 2014, the Best Poster Award in the Adhesion Conference in 2014, the Best Paper Award in the IEEE/RSJ International Conference on Intelligent Robots and Systems in 2009 and 1998, the first prize in the World RoboCup Micro-Robotics Competition in 2012 and 2013, the Best Biomimetics Paper Award in the IEEE Robotics and Biomimetics Conference in 2004, and the Best Video Award in the IEEE Robotics and Automation Conference in 2002. He is the editor-in-chief of Journal of Micro-Bio Robotics.</span></span></b></b></p><span data-dcnode-id="1201" instrument_node="">
</span></blockquote><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1195" wrap=""><b data-dcnode-id="1196"><b data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1180" wrap=""><b data-dcnode-id="1181"><b data-dcnode-id="1182"><span data-dcnode-id="1183" style="font-size: 13px;"><span data-dcnode-id="1193" instrument_node="">December 8 - </span><a data-dcnode-id="1191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www-personal.umich.edu/~artkuo/"><span data-dcnode-id="1192" instrument_node="">Art Kuo</span></a><span data-dcnode-id="1190" instrument_node="">, University of Michigan </span><em data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Robot vs. Human: The Next Round of Legged Locomotion Battles </span></em><span data-dcnode-id="1187" instrument_node="">(</span><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/389"><span data-dcnode-id="1186" instrument_node="">video</span></a><span data-dcnode-id="1184" instrument_node="">, CSAIL only)</span></span></b></b></p><span data-dcnode-id="1179" instrument_node="">
</span><blockquote data-dcnode-id="1159"><p data-dcnode-id="1174"><b data-dcnode-id="1175"><b data-dcnode-id="1176"><span data-dcnode-id="1177" style="font-size: 13px;"><span data-dcnode-id="1178" instrument_node="">An enduring myth in the world of legged locomotion is that a robot should model itself upon human. The human presents a standard for performance, and a recipe for control strategy, and a blueprint for design. Not only is that myth false, but it has also (fortunately) been ignored. To date, robot locomotion has benefitted from humans and animals, and the understanding of them, only in how many legs to have. The reason is that hardware technology is presently far from making truly human-like locomotion possible, or even a good idea. This raises the question of what the next generation of legged robots should try to be. The correct answer is anything but humans, but even to achieve that means there is reason to understand humans. I will demonstrate a few unique ways that humans walk dynamically, and how they are optimal for humans and therefore suboptimal for robots. From a biomechanical perspective, I will muse on some interesting challenges for future robots that will act more dynamically, and one day perhaps even approach the standard set by humans.</span></span></b></b></p><span data-dcnode-id="1173" instrument_node="">
</span><p data-dcnode-id="1169"><b data-dcnode-id="1170"><b data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1168" instrument_node="">
