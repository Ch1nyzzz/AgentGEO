</span><article about="/robotics-seminar" class="article article-type-page article-promoted odd article-full clearfix" data-dcnode-id="233" id="article-118" role="article" typeof="foaf:Document"><span data-dcnode-id="5139" instrument_node="">

</span><h1 class="article-title" data-dcnode-id="5135"><span data-dcnode-id="5136" instrument_node="">
            Robotics Seminar          </span></h1><span data-dcnode-id="5134" instrument_node="">
</span></header><span data-dcnode-id="5132" instrument_node="">
</span><span class="rdf-meta element-hidden" content="Robotics Seminar" data-dcnode-id="5131" property="dc:title"></span><span class="rdf-meta element-hidden" content="0" data-dcnode-id="5130" datatype="xsd:integer" property="sioc:num_replies"></span><span data-dcnode-id="5129" instrument_node="">
</span><div class="article-content" data-dcnode-id="239"><span data-dcnode-id="5128" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden view-mode-full" data-dcnode-id="241"><div class="field-items" data-dcnode-id="242"><div class="field-item even" data-dcnode-id="243" property="content:encoded"><h2 class="moz-quote-pre" data-dcnode-id="5126" wrap=""><span data-dcnode-id="5127" instrument_node="">2022 Spring Seminar Schedule&nbsp;</span></h2><span data-dcnode-id="5125" instrument_node="">
</span><ul data-dcnode-id="5095"><li class="moz-quote-pre" data-dcnode-id="5123" wrap=""><span data-dcnode-id="5124" instrument_node="">Mar-11 TBD</span></li><span data-dcnode-id="5122" instrument_node="">
</span><li class="moz-quote-pre" data-dcnode-id="5120" wrap=""><span data-dcnode-id="5121" instrument_node="">Mar-18 Jeff Ichnowski, U.C. Berkeley</span></li><span data-dcnode-id="5119" instrument_node="">
</span><li class="moz-quote-pre" data-dcnode-id="5117" wrap=""><span data-dcnode-id="5118" instrument_node="">Apr-01 Stephano Nikolaidis, USC</span></li><span data-dcnode-id="5116" instrument_node="">
</span><li class="moz-quote-pre" data-dcnode-id="5114" wrap=""><span data-dcnode-id="5115" instrument_node="">Apr-08 Marco Hutter, ETH Zurich</span></li><span data-dcnode-id="5113" instrument_node="">
</span><li class="moz-quote-pre" data-dcnode-id="5109" wrap=""><span data-dcnode-id="5112" instrument_node="">Apr-15 Katherine Kuchenbecker,&nbsp;</span><span data-dcnode-id="5110" style="color: rgb(60, 64, 67); font-family: Roboto, arial, sans-serif; font-size: 14px;"><span data-dcnode-id="5111" instrument_node="">Max Planck Institute for Intelligent Systems</span></span></li><span data-dcnode-id="5108" instrument_node="">
</span><li class="moz-quote-pre" data-dcnode-id="5106" wrap=""><span data-dcnode-id="5107" instrument_node="">Apr-22 Harry Asada, MIT</span></li><span data-dcnode-id="5105" instrument_node="">
</span><li class="moz-quote-pre" data-dcnode-id="5103" wrap=""><span data-dcnode-id="5104" instrument_node="">Apr-29 Ayanna Howard, Ohio State</span></li><span data-dcnode-id="5102" instrument_node="">
</span><li class="moz-quote-pre" data-dcnode-id="5100" wrap=""><span data-dcnode-id="5101" instrument_node="">May-06 Marco Pavone, Stanford</span></li><span data-dcnode-id="5099" instrument_node="">
</span><li class="moz-quote-pre" data-dcnode-id="5097" wrap=""><span data-dcnode-id="5098" instrument_node="">May-13 Hadas Kress-Gazit, Cornell</span></li><span data-dcnode-id="5096" instrument_node="">
</span></ul><hr data-dcnode-id="5094"><p class="moz-quote-pre" data-dcnode-id="5087" wrap=""><strong data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">December 17, 2021 -&nbsp;Greg Chirikjian, NUS, "Robot Imagination: Affordance-Based Reasoning about Unknown Objects"&nbsp;</span></strong><span data-dcnode-id="5091" instrument_node="">&nbsp;(</span><a data-dcnode-id="5089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DLv37RvNDVw0"><span data-dcnode-id="5090" instrument_node="">video</span></a><span data-dcnode-id="5088" instrument_node="">)</span></p><span data-dcnode-id="5086" instrument_node="">
</span><blockquote data-dcnode-id="5081"><p class="moz-quote-pre" data-dcnode-id="5083" wrap=""><span data-dcnode-id="5084" style="font-family: Georgia, Times, &quot;Times New Roman&quot;, serif; font-style: italic;"><span data-dcnode-id="5085" instrument_node="">Today’s robots are very brittle in their intelligence. This follows from a legacy of industrial robotics where robots pick and place known parts repetitively. For humanoid robots to function as servants in the home and in hospitals they will need to demonstrate higher intelligence, and must be able to function in ways that go beyond the stiff prescribed programming of their industrial counterparts. A new approach to service robotics is discussed here. The affordances of common objects such as chairs, cups, etc., are defined in advance. When a new object is encountered, it is scanned and a virtual version is put into a simulation wherein the robot ``imagines’’ how the object can be used. In this way, robots can reason about objects that they have not encountered before, and for which they have no training using. Videos of physical demonstrations will illustrate this paradigm, which the presenter has developed with his students Hongtao Wu, Meng Xin, Sipu Ruan, and others.</span></span></p><span data-dcnode-id="5082" instrument_node="">
</span></blockquote><span data-dcnode-id="5080" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="5073" wrap=""><strong data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">December&nbsp;10, 2021 - David Held, CMU, "Perceptual Robot Learning"</span></strong><span data-dcnode-id="5077" instrument_node=""> (</span><a data-dcnode-id="5075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DYSj4cIFxvhc"><span data-dcnode-id="5076" instrument_node="">video</span></a><span data-dcnode-id="5074" instrument_node="">)</span></p><span data-dcnode-id="5072" instrument_node="">
</span><blockquote data-dcnode-id="5068"><p class="moz-quote-pre" data-dcnode-id="5070" wrap=""><span data-dcnode-id="5071" instrument_node="">Robots today are typically confined to interact with rigid, opaque objects with known object models. However, the objects in our daily lives are often non-rigid, can be transparent or reflective, and are diverse in shape and appearance. One reason for the limitations of current methods is that computer vision and robot planning are often considered separate fields. I argue that, to enhance the capabilities of robots, we should design state representations that consider both the perception and planning algorithms needed for the robotics task. I will show how we can develop novel perception and planning algorithms to assist with the tasks of manipulating cloth, manipulating novel objects, and manipulating transparent and reflective objects. By thinking about the downstream task while jointly developing perception and planning algorithms, we can significantly improve our progress on difficult robots tasks.</span></p><span data-dcnode-id="5069" instrument_node="">
</span></blockquote><span data-dcnode-id="5067" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="5057" wrap=""><strong data-dcnode-id="5062"><span data-dcnode-id="5066" instrument_node="">December 3, 2021 - </span><a data-dcnode-id="5064" href="mailto:frank.dellaert@cc.gatech.edu"><span data-dcnode-id="5065" instrument_node="">Frank&nbsp;Dellaert</span></a><span data-dcnode-id="5063" instrument_node="">, Georgia Tech, "Factor Graphs for Perception and Action" </span></strong><span data-dcnode-id="5061" instrument_node="">(</span><a data-dcnode-id="5059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D-yCC7mpgL4w"><span data-dcnode-id="5060" instrument_node="">video</span></a><span data-dcnode-id="5058" instrument_node="">)</span></p><span data-dcnode-id="5056" instrument_node="">
</span><blockquote data-dcnode-id="5049"><p class="moz-quote-pre" data-dcnode-id="5051" wrap=""><span data-dcnode-id="5055" instrument_node="">Factor graphs have been very successful in providing a lingua franca in which to phrase robotics perception and navigation problems. In this talk I will re-visit some of those successes, also discussed in depth in [</span><a data-dcnode-id="5053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/Xc0RMXyeYY"><span data-dcnode-id="5054" instrument_node="">a recent review article</span></a><span data-dcnode-id="5052" instrument_node="">]. However, I will focus on our more recent work in the talk, centered on using factor graphs for *action*. In particular, I will discuss our efforts in motion planning, trajectory optimization, optimal control, and model-predictive control, highlighting in each how factor graphs provide an intuitive and natural framework in which to think about these problems and generate state of the art solutions.</span></p><span data-dcnode-id="5050" instrument_node="">
</span></blockquote><span data-dcnode-id="5048" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="5041" wrap=""><strong data-dcnode-id="5046"><span data-dcnode-id="5047" instrument_node="">November 19,&nbsp;2021 - Adriana Schultz, UW,&nbsp;"Robotics for the Next Manufacturing Revolution"</span></strong><span data-dcnode-id="5045" instrument_node=""> (</span><a data-dcnode-id="5043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/tYGcGGNZyGc"><span data-dcnode-id="5044" instrument_node="">video</span></a><span data-dcnode-id="5042" instrument_node="">)</span></p><span data-dcnode-id="5040" instrument_node="">
</span><blockquote data-dcnode-id="5004"><p data-dcnode-id="5025"><strong data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">3D printers are radically transforming the aerospace and automotive</span></strong><br data-dcnode-id="5037"><span data-dcnode-id="5036" instrument_node="">
industries. Whole-garment knitting machines allow the automated</span><br data-dcnode-id="5035"><span data-dcnode-id="5034" instrument_node="">
production of complex apparel and shoes. Manufacturing electronics on</span><br data-dcnode-id="5033"><span data-dcnode-id="5032" instrument_node="">
flexible substrates enable a new range of integrated products for</span><br data-dcnode-id="5031"><span data-dcnode-id="5030" instrument_node="">
consumer electronics and medical diagnostics. These advances</span><br data-dcnode-id="5029"><span data-dcnode-id="5028" instrument_node="">
demonstrate the potential for a new economy of on-demand production of</span><br data-dcnode-id="5027"><span data-dcnode-id="5026" instrument_node="">
objects of unprecedented complexity and functionality.</span></p><span data-dcnode-id="5024" instrument_node="">
</span><p data-dcnode-id="5006"><span data-dcnode-id="5023" instrument_node="">In my talk, I argue that the next manufacturing revolution will impact</span><br data-dcnode-id="5022"><span data-dcnode-id="5021" instrument_node="">
Robotics in fundamental ways and that there are exciting open problems</span><br data-dcnode-id="5020"><span data-dcnode-id="5019" instrument_node="">
and challenges in this emerging research field. I will discuss how</span><br data-dcnode-id="5018"><span data-dcnode-id="5017" instrument_node="">
novel manufacturing technology will transform what kinds of robots we</span><br data-dcnode-id="5016"><span data-dcnode-id="5015" instrument_node="">
design and build and showcase opportunities for novel developments in</span><br data-dcnode-id="5014"><span data-dcnode-id="5013" instrument_node="">
Robotics to advance this revolution in manufacturing. I will conclude</span><br data-dcnode-id="5012"><span data-dcnode-id="5011" instrument_node="">
my talk by describing key insights from the field of computational</span><br data-dcnode-id="5010"><span data-dcnode-id="5009" instrument_node="">
design and fabrication, which can be used to address some of these</span><br data-dcnode-id="5008"><span data-dcnode-id="5007" instrument_node="">
opportunities.</span></p><span data-dcnode-id="5005" instrument_node="">
</span></blockquote><span data-dcnode-id="5003" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4989" wrap=""><strong data-dcnode-id="4995"><span data-dcnode-id="5002" instrument_node="">November 5, 2021 -&nbsp;</span><span data-dcnode-id="4998" style="color: rgb(51, 51, 51); font-family: sans-serif, Arial, Verdana, &quot;Trebuchet MS&quot;; font-size: 13px; background-color: rgb(255, 255, 255);"><a data-dcnode-id="5000" href="mailto:katef@cs.cmu.edu"><span data-dcnode-id="5001" instrument_node="">Katerina Fragkiadaki</span></a><span data-dcnode-id="4999" instrument_node="">, CMU, "</span></span><span data-dcnode-id="4996" style="color: rgb(0, 0, 0); font-family: Roboto, RobotoDraft, Helvetica, Arial, sans-serif; white-space: pre-wrap;"><span data-dcnode-id="4997" instrument_node="">Modular 3D neural scene representations for visuomotor control and language grounding" </span></span></strong><span data-dcnode-id="4990" style="color: rgb(0, 0, 0); font-family: Roboto, RobotoDraft, Helvetica, Arial, sans-serif; white-space: pre-wrap;"><span data-dcnode-id="4994" instrument_node="">(</span><a data-dcnode-id="4992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DLPfT8wZv3Hs"><span data-dcnode-id="4993" instrument_node="">video</span></a><span data-dcnode-id="4991" instrument_node="">)</span></span></p><span data-dcnode-id="4988" instrument_node="">
</span><blockquote data-dcnode-id="4983"><p class="moz-quote-pre" data-dcnode-id="4985" wrap=""><span data-dcnode-id="4986" style="font-family: Roboto, RobotoDraft, Helvetica, Arial, sans-serif; font-size: 13px; white-space: pre-wrap; background-color: rgb(255, 255, 255);"><span data-dcnode-id="4987" instrument_node="">Current state-of-the-art perception models localize rare object categories in images, yet often miss basic facts that a two-year-old has mastered: that objects have 3D extent, they persist over time despite changes in the camera view, they do not 3D intersect, and others. We will discuss models that learn to map 2D and 2.5D images and videos into amodal completed 3D feature maps of the scene and the objects in it by predicting views. We will show the proposed models learn object permanence, have objects emerge in 3D without human annotations, can ground language in 3D visual simulations, and learn intuitive physics and controllers that generalize across scene arrangements and camera configurations. In this way, the proposed world-centric scene representations overcome many limitations of image-centric representations for video understanding, model learning and language grounding.</span></span></p><span data-dcnode-id="4984" instrument_node="">
</span></blockquote><span data-dcnode-id="4982" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4969" wrap=""><strong data-dcnode-id="4977"><span data-dcnode-id="4981" instrument_node="">October 29, 2021 -</span><a data-dcnode-id="4979" href="mailto:krdc@illinois.edu"><span data-dcnode-id="4980" instrument_node=""> Katie Driggs-Campbell</span></a><span data-dcnode-id="4978" instrument_node="">, UIUC, "Fantastic Failures and Where to Find Them: Considering Safety as a Function of Structure"&nbsp;</span></strong><strong data-dcnode-id="4975" style="color: rgb(51, 51, 51); font-family: sans-serif, Arial, Verdana, &quot;Trebuchet MS&quot;; font-size: 13px; background-color: rgb(255, 255, 255);"><span data-dcnode-id="4976" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="4970" style="color: rgb(51, 51, 51); font-family: sans-serif, Arial, Verdana, &quot;Trebuchet MS&quot;; font-size: 13px; background-color: rgb(255, 255, 255);"><span data-dcnode-id="4974" instrument_node="">(</span><a data-dcnode-id="4972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/cQ-jhzhT8Cs"><span data-dcnode-id="4973" instrument_node="">video</span></a><span data-dcnode-id="4971" instrument_node="">)</span></span></p><span data-dcnode-id="4968" instrument_node="">
</span><blockquote data-dcnode-id="4964"><p class="moz-quote-pre" data-dcnode-id="4966" wrap=""><span data-dcnode-id="4967" instrument_node="">Autonomous systems and robots are becoming prevalent in our everyday lives and changing the foundations of our way of life (e.g., self-driving cars, agricultural robots, collaborative manufacturing). However, the desirable impacts of human-robot systems are only achievable if the underlying algorithms are robust to real-world conditions, can handle unexpected human behaviors, and are effective in (near) failure modes. This is often challenging in practice, as the scenarios in which general robots fail are often difficult to identify and characterize. In this talk, we’ll explore the notion of structure across high-impact application domains and consider how such structure impacts the system requirements and modes of human interaction. We will specifically consider how different contexts and tasks lend themselves to different mechanisms for safety assessment. Our approaches vary by context, ranging from highly structured, well-modeled systems where we can explicitly analyze time-of-first-failure; to black-box validation where we rely on efficient failure search in simulation; and to highly unstructured and uncertain settings where we must rely on anomaly detection to identify failures. We'll showcase our failures (and perhaps a few successes) on autonomous vehicles, crowd navigation, and agricultural robots in real-world settings.</span></p><span data-dcnode-id="4965" instrument_node="">
</span></blockquote><span data-dcnode-id="4963" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4961" wrap=""><span data-dcnode-id="4962" instrument_node="">&nbsp;</span></p><span data-dcnode-id="4960" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4950" wrap=""><strong data-dcnode-id="4955"><span data-dcnode-id="4959" instrument_node="">October 22, 2021 -&nbsp;</span><a data-dcnode-id="4957" href="mailto:berenson@eecs.umich.edu"><span data-dcnode-id="4958" instrument_node="">Dmitry Berenson</span></a><span data-dcnode-id="4956" instrument_node="">,&nbsp;University of Michigan, "Learning Where to Trust Unreliable Dynamics Models for Motion Planning and Manipulation" </span></strong><span data-dcnode-id="4954" instrument_node="">(</span><a data-dcnode-id="4952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/g80pIEUkRJo"><span data-dcnode-id="4953" instrument_node="">video</span></a><span data-dcnode-id="4951" instrument_node="">)</span></p><span data-dcnode-id="4949" instrument_node="">
</span><blockquote data-dcnode-id="4945"><p class="moz-quote-pre" data-dcnode-id="4947" wrap=""><span data-dcnode-id="4948" instrument_node="">The world outside our labs seldom conforms to the assumptions of our models. This is especially true for dynamics models used in control and motion planning for complex high-DOF systems like deformable objects. We must develop better models, but we must also accept that, no matter how powerful our simulators or how big our datasets, our models will sometimes be wrong. This talk will present our recent work on using unreliable dynamics models for motion planning and manipulation. Given a dynamics model, our methods learn where that model can be trusted given either batch data or online experience. These approaches allow imperfect dynamics models to be useful for a wide range of tasks in novel scenarios, while requiring much less data than baseline methods. This data-efficiency is a key requirement for scalable and flexible motion planning and manipulation capabilities.</span></p><span data-dcnode-id="4946" instrument_node="">
</span></blockquote><span data-dcnode-id="4944" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4934" wrap=""><strong data-dcnode-id="4939"><span data-dcnode-id="4943" instrument_node="">October 8, 2021 - </span><a data-dcnode-id="4941" href="mailto:imordatch@google.com"><span data-dcnode-id="4942" instrument_node="">Igor Mordatch</span></a><span data-dcnode-id="4940" instrument_node="">, Google Brain, "Reinforcement Learning via Sequence and Energy-Based Modeling</span></strong><span data-dcnode-id="4938" instrument_node="">"&nbsp;(</span><a data-dcnode-id="4936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//youtu.be/MX1uxty41no"><span data-dcnode-id="4937" instrument_node="">video</span></a><span data-dcnode-id="4935" instrument_node="">)</span></p><span data-dcnode-id="4933" instrument_node="">
</span><blockquote data-dcnode-id="4929"><p class="moz-quote-pre" data-dcnode-id="4931" wrap=""><span data-dcnode-id="4932" instrument_node="">Can standard sequence modeling frameworks train effective policies for reinforcement learning (RL)? Doing so would allow drawing upon the simplicity and scalability of the Transformer architecture, and associated advances and infrastructure investments in language modeling such as GPT-x and BERT. I will present our work investigating this by casting the problem of RL as optimality-conditioned sequence modeling. Despite the simplicity, such an approach is surprisingly competitive with current model-free offline RL baselines. However, robustness of such an approach remains a challenge in robotics applications. In the second part of the talk, I will discuss the ways in which implicit, energy-based models can address it - particularly with respect to approximating complex, potentially discontinuous and multi-valued functions. Robots with such implicit policies can learn complex and remarkably subtle behaviors on contact-rich tasks from human demonstrations, including tasks with high combinatorial complexity and tasks requiring 1mm precision.</span></p><span data-dcnode-id="4930" instrument_node="">
</span></blockquote><span data-dcnode-id="4928" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4915" wrap=""><strong data-dcnode-id="4921"><span data-dcnode-id="4927" instrument_node="">September 24, 2021 -&nbsp;</span><a data-dcnode-id="4925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dair.seas.upenn.edu/"><span data-dcnode-id="4926" instrument_node="">Michael Posa, UPenn</span></a><span data-dcnode-id="4924" instrument_node="">, "</span><span data-dcnode-id="4922" style="color: rgb(0, 0, 0); font-family: Roboto, RobotoDraft, Helvetica, Arial, sans-serif; white-space: pre-wrap;"><span data-dcnode-id="4923" instrument_node="">Contact-rich robotics: learning, impact-invariant control, and tactile feedback" </span></span></strong><span data-dcnode-id="4916" style="color: rgb(0, 0, 0); font-family: Roboto, RobotoDraft, Helvetica, Arial, sans-serif; white-space: pre-wrap;"><span data-dcnode-id="4920" instrument_node="">(</span><a data-dcnode-id="4918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DyPd1Pk2PTNw"><span data-dcnode-id="4919" instrument_node="">video</span></a><span data-dcnode-id="4917" instrument_node="">)</span></span></p><span data-dcnode-id="4914" instrument_node="">
</span><blockquote data-dcnode-id="4909"><p class="moz-quote-pre" data-dcnode-id="4911" wrap=""><span data-dcnode-id="4912" style="color: rgb(0, 0, 0); font-family: Roboto, RobotoDraft, Helvetica, Arial, sans-serif; white-space: pre-wrap;"><span data-dcnode-id="4913" instrument_node="">Whether operating in a manufacturing plant or assisting within the home, many robotic tasks require safe and controlled interaction with a complex and changing world. However, state-of-the-art approaches to both learning and control are most effective when this interaction either occurs in highly structured settings or at slow speeds unsuitable for real-world deployment. In this talk, I will focus broadly on our most recent efforts to model and control complex, multi-contact motions. Even given a known model, current approaches to control typically only function if the contact mode can be determined or planned a priori. Our recent work has focused on real-time feedback policies using tactile sensing and ADMM-style algorithms to adaptively react to making and breaking contact or stick-slip transitions. For dynamic impacts, like robotic jumping, tactile sensing may not be practical; instead, I will show how impact-invariant strategies can both be robust to uncertainty during collisions while preserving control authority. In the second half of the talk, I will discuss how such models can be learned from data. While it might be appealing to jump first to standard tools from deep learning, the inductive biases inherent in such methods fundamentally clash with the non-differentiable physics of contact-rich robotics. I will discuss these challenges using both intuitive examples and empirical results. Finally, I will show how carefully reasoning about the role of discontinuity, and integrating implicit, non-smooth structures into the learning framework, can dramatically improve learning performance across an array of metrics. This approach, ContactNets, leverages bilevel optimization to successfully identify the dynamics of a six-sided cube bouncing, sliding, and rolling across a surface from only a handful of sample trajectories.</span></span></p><span data-dcnode-id="4910" instrument_node="">
</span></blockquote><span data-dcnode-id="4908" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4895" wrap=""><strong data-dcnode-id="4903"><span data-dcnode-id="4907" instrument_node="">September 17, 2021 - </span><a data-dcnode-id="4905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//people.csail.mit.edu/tlp/"><span data-dcnode-id="4906" instrument_node="">Tomas Lozano-Perez, MIT</span></a><span data-dcnode-id="4904" instrument_node="">. "</span></strong><span data-dcnode-id="4896" style="color: rgb(0, 0, 0); font-family: Roboto, RobotoDraft, Helvetica, Arial, sans-serif; white-space: pre-wrap;"><strong data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">Generalization in Planning and Learning for Robotic Manipulation</span></strong><span data-dcnode-id="4900" instrument_node="">" (</span><a data-dcnode-id="4898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dk8Zh7ColEbw"><span data-dcnode-id="4899" instrument_node="">video</span></a><span data-dcnode-id="4897" instrument_node="">)</span></span></p><span data-dcnode-id="4894" instrument_node="">
</span><blockquote data-dcnode-id="4889"><p class="moz-quote-pre" data-dcnode-id="4891" wrap=""><span data-dcnode-id="4892" style="color: rgb(0, 0, 0); font-family: Roboto, RobotoDraft, Helvetica, Arial, sans-serif; white-space: pre-wrap;"><span data-dcnode-id="4893" instrument_node="">An enduring goal of AI and robotics has been to build a robot capable of robustly performing a wide variety of tasks in a wide variety of environments; not by sequentially being programmed (or taught) to perform one task in one environment at a time, but rather by intelligently choosing appropriate actions for whatever task and environment it is facing. This goal remains a challenge. In this talk I’ll describe recent work in our lab aimed at the goal of general-purpose robot manipulation by integrating task-and-motion planning with various forms of model learning. In particular, I’ll describe approaches to manipulating objects without prior shape models, to acquiring composable sensorimotor skills, and to exploiting past experience for more efficient planning.</span></span></p><span data-dcnode-id="4890" instrument_node="">
</span></blockquote><span data-dcnode-id="4888" instrument_node="">
</span><hr data-dcnode-id="4887"><p class="moz-quote-pre" data-dcnode-id="4880" wrap=""><strong data-dcnode-id="4881"><em data-dcnode-id="4882"><span data-dcnode-id="4886" instrument_node="">To safeguard against COVID-19, and the spread of the 2019 novel coronavirus, the 2020 spring semester MIT Robotics Seminar Series was replaced with the </span><a data-dcnode-id="4884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//roboticstoday.github.io/"><span data-dcnode-id="4885" instrument_node="">"Robotics Today" online seminar series</span></a><span data-dcnode-id="4883" instrument_node="">.&nbsp;</span></em></strong></p><span data-dcnode-id="4879" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4861" wrap=""><strong data-dcnode-id="4862"><span data-dcnode-id="4878" instrument_node="">Fall 2019 Campus-wide Robotics Seminar (sponsored by </span><a data-dcnode-id="4876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazonrobotics.com/"><span data-dcnode-id="4877" instrument_node="">Amazon Robotics</span></a><span data-dcnode-id="4875" instrument_node="">, </span><a data-dcnode-id="4873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bostondynamics.com/"><span data-dcnode-id="4874" instrument_node="">Boston Dynamics</span></a><span data-dcnode-id="4872" instrument_node="">, </span><a data-dcnode-id="4870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.berkshiregrey.com/"><span data-dcnode-id="4871" instrument_node="">Berkshire Grey</span></a><span data-dcnode-id="4869" instrument_node="">, </span><a data-dcnode-id="4867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merl.com/"><span data-dcnode-id="4868" instrument_node="">Mitsubishi Electric Research Laboratories</span></a><span data-dcnode-id="4866" instrument_node="">, and the </span><a data-dcnode-id="4864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tri.global/"><span data-dcnode-id="4865" instrument_node="">Toyota Research Institute</span></a><span data-dcnode-id="4863" instrument_node="">) (14:00 - 15:00 in 34-401)</span></strong></p><span data-dcnode-id="4860" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4846" wrap=""><b data-dcnode-id="4851"><b data-dcnode-id="4852"><span data-dcnode-id="4859" instrument_node="">December 13, </span><a data-dcnode-id="4857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//biology.st-andrews.ac.uk/contact/staffprofile.aspx%3FsunID%3Dcr68"><span data-dcnode-id="4858" instrument_node="">Christian Rutz</span></a><span data-dcnode-id="4856" instrument_node="">, University of St Andrews/Harvard</span><em data-dcnode-id="4853"><strong data-dcnode-id="4854"><span data-dcnode-id="4855" instrument_node="">15 years of studying tool-using New Caledonian crows: insights into human technological evolution, new electronic gadgets for observing wild birds, and some ideas for how to improve robots </span></strong></em></b></b><span data-dcnode-id="4850" instrument_node="">(</span><a data-dcnode-id="4848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DuGsUf67zfmo"><span data-dcnode-id="4849" instrument_node="">video</span></a><span data-dcnode-id="4847" instrument_node="">)</span></p><span data-dcnode-id="4845" instrument_node="">
</span><blockquote data-dcnode-id="4827"><p class="moz-quote-pre" data-dcnode-id="4841" wrap=""><b data-dcnode-id="4842"><b data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">New Caledonian crows have attracted intense academic and media interest with their unusually sophisticated tool behaviour. They use at least three distinct tool types for extractive foraging, elaborately craft some of their tools from raw plant materials, and appear to refine their tool designs across generations, leading to ever-more complex technologies. In this talk, I will take stock of my group’s research on the species over the past 15 years, pursuing three complementary goals. First, I will illustrate how these remarkable birds provide an invaluable non-human perspective on the drivers and processes of technological evolution. Second, I will showcase how my team responded to the challenges of studying free-ranging crows in their forested habitats, by developing two innovative tracking technologies – crow-mounted miniature video cameras (to obtain a crow’s-eye view of their tool behaviour) and proximity loggers (to chart crows’ highly-dynamic social networks). Finally, I will explain how insights from tool-using crows may help improve the dexterity of human-made robots, and share some other blue-skies ideas I am currently exploring as a Radcliffe Fellow at Harvard University.</span></b></b></p><span data-dcnode-id="4840" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4836" wrap=""><b data-dcnode-id="4837"><b data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4835" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4829" wrap=""><b data-dcnode-id="4830"><b data-dcnode-id="4831"><strong data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">Bio:</span></strong><span data-dcnode-id="4832" instrument_node=""> Christian Rutz is Professor of Biology at the University of St Andrews, Scotland, where he leads a research group studying animal tool behaviour. He combines observational, experimental and theoretical approaches, to address a major scientific puzzle: Why do so few animal species use tools, and how have humans become so technology-savvy? Rutz probes the evolutionary origins of tool behaviour with an innovative research strategy. Rather than studying our primate cousins, he investigates tropical crows that have the curious habit of using foraging tools. His principal study species, the renowned New Caledonian crow, fashions complex tool designs from a variety of plant materials, and may even refine its technology over time. Rutz recently discovered that the critically-endangered Hawaiian crow is also a skilled tool user, opening up exciting opportunities for comparative research. Rutz has pioneered cutting-edge wildlife tracking technologies, and currently serves as Founding President of the International Bio-Logging Society. He obtained his doctorate as a Rhodes Scholar from the University of Oxford, was subsequently awarded a prestigious David Phillips Research Fellowship, and held visiting appointments at the Universities of Oxford, Tokyo and New South Wales. His research is regularly published in leading interdisciplinary journals, including five papers to date in Nature and Science, has attracted a string of academic prizes and awards, and was showcased at major public science exhibitions. Rutz is currently a Fellow at the Radcliffe Institute for Advanced Study at Harvard University where he pursues a project examining the basic biological processes that allow rudimentary technologies to arise, advance and diversify.</span></b></b></p><span data-dcnode-id="4828" instrument_node="">
</span></blockquote><span data-dcnode-id="4826" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4822" wrap=""><b data-dcnode-id="4823"><b data-dcnode-id="4824"><span data-dcnode-id="4825" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4821" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4807" wrap=""><b data-dcnode-id="4812"><b data-dcnode-id="4813"><span data-dcnode-id="4820" instrument_node="">December 6, </span><a data-dcnode-id="4818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goldberg.berkeley.edu/"><span data-dcnode-id="4819" instrument_node="">Ken Goldberg</span></a><span data-dcnode-id="4817" instrument_node="">, University of California, Berkeley </span><em data-dcnode-id="4814"><strong data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">The New Wave in Robot Grasping </span></strong></em></b></b><span data-dcnode-id="4811" instrument_node="">(</span><a data-dcnode-id="4809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DATDrSWZXuwk"><span data-dcnode-id="4810" instrument_node="">video</span></a><span data-dcnode-id="4808" instrument_node="">)</span></p><span data-dcnode-id="4806" instrument_node="">
</span><blockquote data-dcnode-id="4775"><p class="moz-quote-pre" data-dcnode-id="4802" wrap=""><b data-dcnode-id="4803"><b data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">Despite 50 years of research, robots remain remarkably clumsy, limiting their reliability for warehouse order fulfillment, robot-assisted surgery, and home decluttering. The First Wave of grasping research is purely analytical, applying variations of screw theory to exact knowledge of pose, shape, and contact mechanics. The Second Wave is purely empirical: end-to-end hyperparametric function approximation (aka Deep Learning) based on human demonstrations or time-consuming self-exploration. A "New Wave" of research considers hybrid methods that combine analytic models with stochastic sampling and Deep Learning models. I'll present this history with new results from our lab on grasping diverse and previously-unknown objects.</span></b></b></p><span data-dcnode-id="4801" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4797" wrap=""><b data-dcnode-id="4798"><b data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4796" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4790" wrap=""><b data-dcnode-id="4791"><b data-dcnode-id="4792"><strong data-dcnode-id="4794"><span data-dcnode-id="4795" instrument_node="">Bio:</span></strong><span data-dcnode-id="4793" instrument_node=""> Ken Goldberg is an artist, inventor, and roboticist. He is William S. Floyd Jr Distinguished Chair in Engineering at UC Berkeley and Chief Scientist at Ambidextrous Robotics. Ken is on the Editorial Board of the journal Science Robotics, served as Chair of the Industrial Engineering and Operations Research Department, and co-founded the IEEE Transactions on Automation Science and Engineering. Short documentary films he co-wrote were selected for Sundance and one was nominated for an Emmy Award. Ken and his students have published 300 peer-reviewed papers, 9 US patents, and created award-winning artworks featured in 70 exhibits worldwide.</span></b></b></p><span data-dcnode-id="4789" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4785" wrap=""><b data-dcnode-id="4786"><b data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4784" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4777" wrap=""><b data-dcnode-id="4778"><b data-dcnode-id="4779"><span data-dcnode-id="4783" instrument_node="">Ken developed the first provably complete algorithm for part feeding and the first robot on the Internet. He was awarded the NSF PECASE (Presidential Faculty Fellowship) from President Bill Clinton in 1995, elected IEEE Fellow in 2005 and selected by the IEEE Robotics and Automation Society for the George Saridis Leadership Award in 2016. Ken founded UC Berkeley's Art, Technology, and Culture (ATC) public lecture series, serves on the Advisory Board of the RoboGlobal ETF, and has presented 500 invited lectures worldwide. He lives in the Bay Area and is madly in love with his wife, filmmaker and Webby Awards founder Tiffany Shlain, and their two daughters. (goldberg.berkeley.edu, @Ken_Goldberg, </span><a class="moz-txt-link-freetext" data-dcnode-id="4781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//goldberg.berkeley.edu/"><span data-dcnode-id="4782" instrument_node="">http://goldberg.berkeley.edu</span></a><span data-dcnode-id="4780" instrument_node=""> )</span></b></b></p><span data-dcnode-id="4776" instrument_node="">
</span></blockquote><span data-dcnode-id="4774" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4770" wrap=""><b data-dcnode-id="4771"><b data-dcnode-id="4772"><span data-dcnode-id="4773" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4769" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4755" wrap=""><b data-dcnode-id="4756"><b data-dcnode-id="4757"><span data-dcnode-id="4768" instrument_node="">November 22, </span><a data-dcnode-id="4766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cs.cmu.edu/~abhinavg/"><span data-dcnode-id="4767" instrument_node="">Abhinav Gupta</span></a><span data-dcnode-id="4765" instrument_node="">, Carnegie Mellon University </span><strong data-dcnode-id="4762"><em data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">Towards Self-supervised Curious Robots </span></em></strong><span data-dcnode-id="4761" instrument_node="">(</span><a data-dcnode-id="4759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DwCM4AOyDNXU"><span data-dcnode-id="4760" instrument_node="">video</span></a><span data-dcnode-id="4758" instrument_node="">)</span></b></b></p><span data-dcnode-id="4754" instrument_node="">
</span><blockquote data-dcnode-id="4736"><p class="moz-quote-pre" data-dcnode-id="4750" wrap=""><b data-dcnode-id="4751"><b data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">In the last decade, we have made significant advances in the field of artificial intelligence thanks to supervised learning. But this passive supervision of our models has now become our biggest bottleneck. In this talk, I will discuss our efforts towards scaling up and empowering visual and robotic learning. First, I will show how amount of labeled data is crucial factor in learning. I will then describe how we can overcome the passive supervision bottleneck by self-supervised learning. Next, I will discuss how embodiment is crucial for learning -- our agents live in the physical world and need the ability to interact in the physical world. Towards this goal, I will finally present our efforts in large-scale learning of embodied agents in robotics. Finally, I will discuss how we can move from passive supervision to active exploration -- the ability of agents to create their own training data.</span></b></b></p><span data-dcnode-id="4749" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4745" wrap=""><b data-dcnode-id="4746"><b data-dcnode-id="4747"><span data-dcnode-id="4748" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4744" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4738" wrap=""><b data-dcnode-id="4739"><b data-dcnode-id="4740"><strong data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">Bio: </span></strong><span data-dcnode-id="4741" instrument_node="">Abhinav Gupta is an Associate Professor at the Robotics Institute, Carnegie Mellon University and Research Manager at Facebook AI Research (FAIR). Abhinav's research focuses on scaling up learning by building self-supervised, lifelong and interactive learning systems. Specifically, he is interested in how self-supervised systems can effectively use data to learn visual representation, common sense and representation for actions in robots. Abhinav is a recipient of several awards including ONR Young Investigator Award, PAMI Young Researcher Award, Sloan Research Fellowship, Okawa Foundation Grant, Bosch Young Faculty Fellowship, YPO Fellowship, IJCAI Early Career Spotlight, ICRA Best Student Paper award, and the ECCV Best Paper Runner-up Award. His research has also been featured in Newsweek, BBC, Wall Street Journal, Wired and Slashdot.</span></b></b></p><span data-dcnode-id="4737" instrument_node="">
</span></blockquote><span data-dcnode-id="4735" instrument_node="">
</span><p data-dcnode-id="4731" wrap=""><b data-dcnode-id="4732"><b data-dcnode-id="4733"><span data-dcnode-id="4734" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4730" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4716" wrap=""><b data-dcnode-id="4717"><b data-dcnode-id="4718"><span data-dcnode-id="4729" instrument_node="">November 1, </span><a data-dcnode-id="4727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//people.eecs.berkeley.edu/~brecht/"><span data-dcnode-id="4728" instrument_node="">Ben Recht</span></a><span data-dcnode-id="4726" instrument_node="">, University of California, Berkeley</span><em data-dcnode-id="4723"><strong data-dcnode-id="4724"><span data-dcnode-id="4725" instrument_node=""> Trying to Make Sense of Control from Pixels </span></strong></em><span data-dcnode-id="4722" instrument_node="">(</span><a data-dcnode-id="4720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Do7qENRDB2ug"><span data-dcnode-id="4721" instrument_node="">video</span></a><span data-dcnode-id="4719" instrument_node="">)</span></b></b></p><span data-dcnode-id="4715" instrument_node="">
</span><blockquote data-dcnode-id="4692"><p class="moz-quote-pre" data-dcnode-id="4711" wrap=""><b data-dcnode-id="4712"><b data-dcnode-id="4713"><span data-dcnode-id="4714" instrument_node="">A prevalent motivation for merging machine learning and control is enabling decision systems to incorporate feedback from sensors like cameras, microphones, and other high dimensional sensing modalities. This talk will highlight some of the pressing research challenges impeding such a merger. Grounding the discussion in control of autonomous vehicles from vision alone, I will present a possible approach to designing robust controllers when the sensing modality is a learned from rich perceptual data. This proposal will combine first steps towards quantifying uncertainty in perception systems, designing robust controllers with such uncertainty in mind, and guaranteeing performance of these designs. I will close by attempting to illustrate the usefulness of these initial investigations in simulated and small-scale implementations of autonomous cars.</span></b></b></p><span data-dcnode-id="4710" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4706" wrap=""><b data-dcnode-id="4707"><b data-dcnode-id="4708"><span data-dcnode-id="4709" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4705" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4699" wrap=""><b data-dcnode-id="4700"><b data-dcnode-id="4701"><strong data-dcnode-id="4703"><span data-dcnode-id="4704" instrument_node="">Bio: </span></strong><span data-dcnode-id="4702" instrument_node="">Benjamin Recht is an Associate Professor in the Department of Electrical Engineering and Computer Sciences at the University of California, Berkeley. Ben's research group studies how to make machine learning systems more robust to interactions with a dynamic and uncertain world. Ben is the recipient of a Presidential Early Career Award for Scientists and Engineers, an Alfred P. Sloan Research Fellowship, the 2012 SIAM/MOS Lagrange Prize in Continuous Optimization, the 2014 Jamon Prize, the 2015 William O. Baker Award for Initiatives in Research, and the 2017 NIPS Test of Time Award.</span></b></b></p><span data-dcnode-id="4698" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4694" wrap=""><b data-dcnode-id="4695"><b data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4693" instrument_node="">
</span></blockquote><span data-dcnode-id="4691" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4677" wrap=""><b data-dcnode-id="4678"><b data-dcnode-id="4679"><span data-dcnode-id="4690" instrument_node="">October 25, </span><a data-dcnode-id="4688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//irom-lab.princeton.edu/majumdar/"><span data-dcnode-id="4689" instrument_node="">Ani Majumdar</span></a><span data-dcnode-id="4687" instrument_node="">, Princeton University</span><em data-dcnode-id="4684"><strong data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node=""> Safety and Generalization Guarantees for Learning-Based Control of Robots </span></strong></em><span data-dcnode-id="4683" instrument_node="">(</span><a data-dcnode-id="4681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DidGmY1t3gjs"><span data-dcnode-id="4682" instrument_node="">video</span></a><span data-dcnode-id="4680" instrument_node="">)</span></b></b></p><span data-dcnode-id="4676" instrument_node="">
</span><blockquote data-dcnode-id="4643"><p class="moz-quote-pre" data-dcnode-id="4672" wrap=""><b data-dcnode-id="4673"><b data-dcnode-id="4674"><span data-dcnode-id="4675" instrument_node="">Imagine an unmanned aerial vehicle that successfully navigates a thousand different obstacle environments or a robotic manipulator that successfully grasps a million objects in our dataset. How likely are these systems to succeed on a novel (i.e., previously unseen) environment or object? How can we learn control policies for robotic systems that provably generalize well to environments that our robot has not previously encountered? Unfortunately, current state-of-the-art approaches either do not generally provide such guarantees or do so only under very restrictive assumptions. This is a particularly pressing challenge for robotic systems with rich sensory inputs (e.g., vision) that employ neural network-based control policies.</span></b></b></p><span data-dcnode-id="4671" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4667" wrap=""><b data-dcnode-id="4668"><b data-dcnode-id="4669"><span data-dcnode-id="4670" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4666" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4662" wrap=""><b data-dcnode-id="4663"><b data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">In this talk, I will present approaches for learning control policies for robotic systems that provably generalize well with high probability to novel environments. The key technical idea behind our approach is to leverage tools from generalization theory (e.g., PAC-Bayes theory) and the theory of information bottlenecks. We apply our techniques on examples including navigation and grasping in order to demonstrate the potential to provide strong generalization guarantees on robotic systems with complicated (e.g., nonlinear) dynamics, rich sensory inputs (e.g., RGB-D), and neural network-based control policies.</span></b></b></p><span data-dcnode-id="4661" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4657" wrap=""><b data-dcnode-id="4658"><b data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4656" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4650" wrap=""><b data-dcnode-id="4651"><b data-dcnode-id="4652"><strong data-dcnode-id="4654"><span data-dcnode-id="4655" instrument_node="">Bio:</span></strong><span data-dcnode-id="4653" instrument_node=""> Anirudha Majumdar is an Assistant Professor in the Mechanical and Aerospace Engineering (MAE) department at Princeton University. He also holds a position as a Visiting Researcher at the newly-established Google AI lab at Princeton. Majumdar received a Ph.D. in Electrical Engineering and Computer Science from the Massachusetts Institute of Technology in 2016, and a B.S.E. in Mechanical Engineering and Mathematics from the University of Pennsylvania in 2011. Subsequently, he was a postdoctoral scholar at Stanford University from 2016 to 2017 at the Autonomous Systems Lab in the Aeronautics and Astronautics department. He is a recipient of the Paper of the Year Award from the International Journal of Robotics Research (IJRR), the Google Faculty Research Award, the Amazon Research Award, and the Best Conference Paper Award at the International Conference on Robotics and Automation (ICRA).</span></b></b></p><span data-dcnode-id="4649" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4645" wrap=""><b data-dcnode-id="4646"><b data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4644" instrument_node="">
</span></blockquote><span data-dcnode-id="4642" instrument_node="">
</span><p data-dcnode-id="4628" wrap=""><b data-dcnode-id="4629"><b data-dcnode-id="4630"><span data-dcnode-id="4641" instrument_node="">October 18, </span><a data-dcnode-id="4639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cs.stanford.edu/~karenliu/Home.html"><span data-dcnode-id="4640" instrument_node="">Karen Liu</span></a><span data-dcnode-id="4638" instrument_node="">, Stanford University </span><em data-dcnode-id="4635"><strong data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">Simulating Realistic Human Motion for Robotics</span></strong></em><span data-dcnode-id="4634" instrument_node=""> (</span><a data-dcnode-id="4632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D0SyGZC5twNU"><span data-dcnode-id="4633" instrument_node="">video</span></a><span data-dcnode-id="4631" instrument_node="">)</span></b></b></p><span data-dcnode-id="4627" instrument_node="">
</span><blockquote data-dcnode-id="4603"><p class="moz-quote-pre" data-dcnode-id="4623" wrap=""><b data-dcnode-id="4624"><b data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">Creating realistic virtual humans has traditionally been considered a research problem in Computer Animation primarily for entertainment applications. With the recent breakthrough in collaborative robots and deep reinforcement learning, accurately modeling human movements and behaviors has become a common challenge also faced by researchers in robotics and artificial intelligence. In this talk, I will first discuss our recent work on developing efficient computational tools for simulating and controlling human movements. By learning a differentiable kinematic constraints from the real world human motion data, we enable existing multi-body physics engines to simulate more humanlike motion. In a similar vein, we learn task-agnostic boundary conditions and energy functions from anatomically realistic neuromuscular models, effectively defining a new action space better reflecting the physiological constraints of the human body. The second part of the talk will focus on two different yet highly relevant problems: how to teach robots to move like humans and how to teach robots to interact with humans. While Computer Animation research has shown that it is possible to teach a virtual human to mimic real athletes’ movements, the current techniques still struggle to reliably transfer a basic locomotion control policy to robot hardware in the real world. We developed a series of sim-to-real transfer methods to address the intertwined issue of system identification and policy learning for challenging locomotion tasks. Finally, I will showcase our effort on teaching robot to physically interact with humans in the scenarios of robot-assisted dressing and walking assistance.</span></b></b></p><span data-dcnode-id="4622" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4618" wrap=""><b data-dcnode-id="4619"><b data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4617" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4610" wrap=""><b data-dcnode-id="4611"><b data-dcnode-id="4612"><em data-dcnode-id="4614"><strong data-dcnode-id="4615"><span data-dcnode-id="4616" instrument_node="">Bio: </span></strong></em><span data-dcnode-id="4613" instrument_node="">C. Karen Liu is an associate professor in the Department of Computer Science at Stanford University. She received her Ph.D. degree in Computer Science from the University of Washington. Liu's research interests are in computer graphics and robotics, including physics-based animation, character animation, optimal control, reinforcement learning, and computational biomechanics. She developed computational approaches to modeling realistic and natural human movements, learning complex control policies for humanoids and assistive robots, and advancing fundamental numerical simulation and optimal control algorithms. The algorithms and software developed in her lab have fostered interdisciplinary collaboration with researchers in robotics, computer graphics, mechanical engineering, biomechanics, neuroscience, and biology. Liu received a National Science Foundation CAREER Award, an Alfred P. Sloan Fellowship, and was named Young Innovators Under 35 by Technology Review. In 2012, Liu received the ACM SIGGRAPH Significant New Researcher Award for her contribution in the field of computer graphics.</span></b></b></p><span data-dcnode-id="4609" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4605" wrap=""><b data-dcnode-id="4606"><b data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4604" instrument_node="">
</span></blockquote><span data-dcnode-id="4602" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4588" wrap=""><b data-dcnode-id="4589"><b data-dcnode-id="4590"><span data-dcnode-id="4601" instrument_node="">October 16 (@14:30), </span><a data-dcnode-id="4599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biomechatronics.stanford.edu/"><span data-dcnode-id="4600" instrument_node="">Steve Collins</span></a><span data-dcnode-id="4598" instrument_node="">, Stanford University</span><em data-dcnode-id="4595"><strong data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node=""> Designing exoskeletons and prosthetic limbs that enhance human locomotor performance </span></strong></em><span data-dcnode-id="4594" instrument_node="">(</span><a data-dcnode-id="4592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DGfTythgVM-k"><span data-dcnode-id="4593" instrument_node="">video</span></a><span data-dcnode-id="4591" instrument_node="">)</span></b></b></p><span data-dcnode-id="4587" instrument_node="">
</span><blockquote data-dcnode-id="4561"><p class="moz-quote-pre" data-dcnode-id="4583" wrap=""><b data-dcnode-id="4584"><b data-dcnode-id="4585"><span data-dcnode-id="4586" instrument_node="">Exoskeletons and active prosthetic limbs could improve mobility for tens of millions of people, but two serious challenges must first be overcome: we need ways of identifying what a device should do to benefit an individual user, and we need cheap, efficient hardware that can do it. In this talk, we will describe an approach to the design of wearable robots based on versatile emulator systems and algorithms that automatically customize assistance, which we call human-in-the-loop optimization. We will discuss recent successes of the approach, including large improvements to the energy economy and speed of walking and running through optimized exoskeleton assistance. We will also discuss the design of exoskeletons that use no energy themselves yet reduce the energy cost of human walking, and ultra-efficient electroadhesive actuators that could make wearable robots substantially cheaper and more efficient.</span></b></b></p><span data-dcnode-id="4582" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4578" wrap=""><b data-dcnode-id="4579"><b data-dcnode-id="4580"><span data-dcnode-id="4581" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4577" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4568" wrap=""><b data-dcnode-id="4569"><b data-dcnode-id="4570"><strong data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">Bio: </span></strong><span data-dcnode-id="4574" instrument_node="">Steve Collins is an Associate Professor of Mechanical Engineering at Stanford University, where he teaches courses on design and robotics and directs the Stanford Biomechatronics Laboratory. He and his team develop wearable robotic devices to improve the efficiency, speed and balance of walking and running, especially for people with disabilities such as amputation or stroke. Their primary focus is to speed and systematize the design process itself by developing and using versatile prosthesis and exoskeleton emulator hardware and algorithms for human-in-the-loop optimization. They also develop efficient autonomous devices, such as energy-efficient walking robots, ultra-low-power electroadhesive clutches and unpowered exoskeletons that reduce the energy cost of walking. More information at: </span><a data-dcnode-id="4572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biomechatronics.stanford.edu/"><span data-dcnode-id="4573" instrument_node="">biomechatronics.stanford.edu</span></a><span data-dcnode-id="4571" instrument_node="">.</span></b></b></p><span data-dcnode-id="4567" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4563" wrap=""><b data-dcnode-id="4564"><b data-dcnode-id="4565"><span data-dcnode-id="4566" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4562" instrument_node="">
</span></blockquote><span data-dcnode-id="4560" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4546" wrap=""><b data-dcnode-id="4547"><b data-dcnode-id="4548"><span data-dcnode-id="4559" instrument_node="">October 4, </span><a data-dcnode-id="4557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//robotics.umich.edu/profile/jessy-grizzle/"><span data-dcnode-id="4558" instrument_node="">Jessy Grizzle</span></a><span data-dcnode-id="4556" instrument_node="">, University of Michigan</span><em data-dcnode-id="4553"><strong data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node=""> Mathematics and Learning for Agile and Dynamic Bipedal Locomotion </span></strong></em><span data-dcnode-id="4552" instrument_node="">(</span><a data-dcnode-id="4550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DrVPVZn2aNWI"><span data-dcnode-id="4551" instrument_node="">video</span></a><span data-dcnode-id="4549" instrument_node="">)</span></b></b></p><span data-dcnode-id="4545" instrument_node="">
</span><blockquote data-dcnode-id="4522"><p class="moz-quote-pre" data-dcnode-id="4541" wrap=""><b data-dcnode-id="4542"><b data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">Is it great fortune or a curse to do legged robotics on a University campus that has Maya Lin’s earthen sculpture, The Wave Field? Come to the talk and find out! Our work on model-based feedback control for highly dynamic locomotion in bipedal robots will be amply illustrated through images, videos, and math. The core technical portion of the presentation is a method to overcome the obstructions imposed by high-dimensional bipedal models by embedding a stable walking motion in an attractive low-dimensional surface of the system's state space. The process begins with trajectory optimization to design an open-loop periodic walking motion of the high-dimensional model and then adding to this solution, a carefully selected set of additional open-loop trajectories of the model that steer toward the nominal motion. A drawback of trajectories is that they provide little information on how to respond to a disturbance. To address this shortcoming, Supervised Machine Learning is used to extract a low-dimensional state-variable realization of the open-loop trajectories. The periodic orbit is now an attractor of a low-dimensional state-variable model but is not attractive in the full-order system. We then use the special structure of mechanical models associated with bipedal robots to embed the low-dimensional model in the original model in such a manner that the desired walking motions are locally exponentially stable. When combined with robot vision, we hope this approach to control design will allow the full complexity of the Wave Field to be conquered. In any case, as Jovanotti points out, “Non c'è scommessa più persa di quella che non giocherò”. The speaker for one will keep trying!</span></b></b></p><span data-dcnode-id="4540" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4536" wrap=""><b data-dcnode-id="4537"><b data-dcnode-id="4538"><span data-dcnode-id="4539" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4535" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4529" wrap=""><b data-dcnode-id="4530"><b data-dcnode-id="4531"><strong data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">Bio:</span></strong><span data-dcnode-id="4532" instrument_node=""> Jessy W. Grizzle received the Ph.D. in electrical engineering from The University of Texas at Austin in 1983. He is currently a Professor of Electrical Engineering and Computer Science at the University of Michigan, where he holds the titles of the Elmer Gilbert Distinguished University Professor and the Jerry and Carol Levin Professor of Engineering. He jointly holds sixteen patents dealing with emissions reduction in passenger vehicles through improved control system design. Professor Grizzle is a Fellow of the IEEE and IFAC. He received the Paper of the Year Award from the IEEE Vehicular Technology Society in 1993, the George S. Axelby Award in 2002, the Control Systems Technology Award in 2003, the Bode Prize in 2012 and the IEEE Transactions on Control Systems Technology Outstanding Paper Award in 2014. His work on bipedal locomotion has been the object of numerous plenary lectures and has been featured on CNN, ESPN, Discovery Channel, The Economist, Wired Magazine, Discover Magazine, Scientific American and Popular Mechanics.</span></b></b></p><span data-dcnode-id="4528" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4524" wrap=""><b data-dcnode-id="4525"><b data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4523" instrument_node="">
</span></blockquote><span data-dcnode-id="4521" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4507" wrap=""><b data-dcnode-id="4508"><b data-dcnode-id="4509"><span data-dcnode-id="4520" instrument_node="">September 27, </span><a data-dcnode-id="4518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.radhikanagpal.org/"><span data-dcnode-id="4519" instrument_node="">Radhika Nagpal</span></a><span data-dcnode-id="4517" instrument_node="">, Harvard University </span><strong data-dcnode-id="4514"><em data-dcnode-id="4515"><span data-dcnode-id="4516" instrument_node="">Collective Intelligence, from Nature to Robots </span></em></strong><span data-dcnode-id="4513" instrument_node="">(</span><a data-dcnode-id="4511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D8_UBE9rUv2w"><span data-dcnode-id="4512" instrument_node="">video</span></a><span data-dcnode-id="4510" instrument_node="">)</span></b></b></p><span data-dcnode-id="4506" instrument_node="">
</span><blockquote data-dcnode-id="4473"><p class="moz-quote-pre" data-dcnode-id="4502" wrap=""><b data-dcnode-id="4503"><b data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">In nature, groups of thousands of individuals cooperate to create complex structure purely through local interactions -- from cells that form complex organisms, to social insects like termites that build meter-high mounds and army ants that self-assemble into bridges and nests, to the complex and mesmerizing motion of fish schools and bird flocks. What makes these systems so fascinating to scientists and engineers alike, is that even though each individual has limited ability, as a collective they achieve tremendous complexity.</span></b></b></p><span data-dcnode-id="4501" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4497" wrap=""><b data-dcnode-id="4498"><b data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4496" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4492" wrap=""><b data-dcnode-id="4493"><b data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">What would it take to create our own artificial collectives of the scale and complexity that nature achieves? In this talk I will discuss four different ongoing projects that use inspiration from biological self-assembly to create robotic systems: The Kilobot Swarm, inspired by cells, the Termes robots, inspired by mound-building termites, the Eciton soft robots inspired by army ants, and the BlueSwarm project inspired by fish schools. There are many challenges for both building and programming robot swarms, and we use these systems to explore decentralized algorithms, embodied intelligence, and methods for synthesizing complex global behavior. Our theme is the same: can we create simple robots that cooperate to achieve collective complexity?</span></b></b></p><span data-dcnode-id="4491" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4487" wrap=""><b data-dcnode-id="4488"><b data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4486" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4480" wrap=""><b data-dcnode-id="4481"><b data-dcnode-id="4482"><strong data-dcnode-id="4484"><span data-dcnode-id="4485" instrument_node="">Bio:</span></strong><span data-dcnode-id="4483" instrument_node=""> Radhika Nagpal is the Kavli Professor of Computer Science at Harvard University and a core faculty member of the Wyss Institute for Biologically Inspired Engineering. At Harvard, she leads the Self-organizing Systems Research Group (SSR) and her research interests span computer science, robotics, and biology. Her awards include the Microsoft New Faculty Fellowship (2005), NSF Career Award (2007), Borg Early Career Award (2010), Radcliffe Fellowship (2012), and the McDonald Mentoring Award (2015). Nagpal was named by Nature magazine as one of the top ten influential scientists and engineers of the year (Nature 10 award, Dec 2014). Nagpal is also the co-founder of an educational robotics company, ROOT Robotics (acquired by iRobot, 2019) and the author of a popular Scientific American blog article, “The Awesomest 7-year Postdoc”, about changing science culture.</span></b></b></p><span data-dcnode-id="4479" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4475" wrap=""><b data-dcnode-id="4476"><b data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4474" instrument_node="">
</span></blockquote><span data-dcnode-id="4472" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4455" wrap=""><b data-dcnode-id="4456"><b data-dcnode-id="4457"><span data-dcnode-id="4471" instrument_node="">September 20,</span><em data-dcnode-id="4468"><strong data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node=""> </span></strong></em><a data-dcnode-id="4466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bcs.mit.edu/users/nevillemitedu"><span data-dcnode-id="4467" instrument_node="">Neville Hogan</span></a><span data-dcnode-id="4465" instrument_node="">, MIT </span><em data-dcnode-id="4462"><strong data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">How do we do it? Studying human performance may inform robotics </span></strong></em><span data-dcnode-id="4461" instrument_node="">(</span><a data-dcnode-id="4459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DgvTjT1iw_30"><span data-dcnode-id="4460" instrument_node="">video</span></a><span data-dcnode-id="4458" instrument_node="">)</span></b></b></p><span data-dcnode-id="4454" instrument_node="">
</span><blockquote data-dcnode-id="4436"><p class="moz-quote-pre" data-dcnode-id="4450" wrap=""><b data-dcnode-id="4451"><b data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">Humans are more dexterous than modern robots, yet we have slower actuators, communication and computation. We manage a mechanically complex body and routinely wield tools of even greater complexity. Understanding this accomplishment may point to superior robots. How do we do it? The key is our use of dynamic primitives, dynamic behaviors that emerge from neuro-mechanics without continuous central intervention. Classes include oscillations, sub movements and mechanical impedances, the latter to manage physical interaction. Combined in a generalization of Norton’s equivalent circuit, they enable a seamless approach to computation (signal processing) and mechanical physics (energy processing). Nonlinear mechanical impedances superimpose linearly. That enables simple ‘work-arounds’ for complex problems. Inverse kinematics may be eliminated, enabling redundancy management that is indifferent to ‘hard’ problems such as closed-chain kinematics and operation at singularities. Dynamic primitives also engender surprising limitations. Unimpaired humans cannot sustain the discreteness of rapid actions but ‘default’ to rhythmic performance. Conversely, rhythmicity of very slow oscillations cannot be sustained; instead performance ‘breaks down’ into a sequence of sub-movements. Moving an object with internal oscillatory dynamics (motivated by a cup of coffee) humans adjust hand mechanical impedance to improve predictability; in fact, predictability out-weighs effort. Predictability also underlies movement smoothness, which accounts for the widely-reported speed-curvature constraint of human movements. When a circular constraint eliminated curvature variation, an underlying speed-curvature relation reemerged in subjects’ force and motion fluctuations. When robot motion deviated from the biological speed-curvature pattern, subjects’ performance was compromised. Accommodating these ‘quirks’ of human performance may enable successful physical human-robot collaboration.</span></b></b></p><span data-dcnode-id="4449" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4445" wrap=""><b data-dcnode-id="4446"><b data-dcnode-id="4447"><span data-dcnode-id="4448" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4444" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4438" wrap=""><b data-dcnode-id="4439"><b data-dcnode-id="4440"><strong data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">Bio:</span></strong><span data-dcnode-id="4441" instrument_node=""> Neville Hogan is Sun Jae Professor of Mechanical Engineering and Professor of Brain and Cognitive Sciences at the Massachusetts Institute of Technology. He earned a Diploma in Engineering (with distinction) from Dublin Institute of Technology and M.S., Mechanical Engineer and Ph.D. degrees from MIT. He joined MIT’s faculty in 1979 and presently Directs the Newman Laboratory for Biomechanics and Human Rehabilitation. He co-founded Interactive Motion Technologies, now part of Bionik Laboratories. His research includes robotics, motor neuroscience, and rehabilitation engineering, emphasizing the control of physical contact and dynamic interaction. Awards include: Honorary Doctorates from Delft University of Technology and Dublin Institute of Technology; the Silver Medal of the Royal Academy of Medicine in Ireland; the Henry M. Paynter Outstanding Investigator Award and the Rufus T. Oldenburger Medal from the American Society of Mechanical Engineers, Dynamic Systems and Control Division; and the Academic Career Achievement Award from the Institute of Electrical and Electronics Engineers, Engineering in Medicine and Biology Society.</span></b></b></p><span data-dcnode-id="4437" instrument_node="">
</span></blockquote><span data-dcnode-id="4435" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4431" wrap=""><b data-dcnode-id="4432"><b data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4430" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4416" wrap=""><b data-dcnode-id="4417"><b data-dcnode-id="4418"><span data-dcnode-id="4429" instrument_node="">September 13, </span><a data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//droplab.engin.umich.edu/matthew-johnson-roberson"><span data-dcnode-id="4428" instrument_node="">Matthew Johnson-Roberson</span></a><span data-dcnode-id="4426" instrument_node="">, University of Michigan</span><em data-dcnode-id="4423"><strong data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node=""> Lessons from the field: applying machine learning to self-driving cars and underwater robots without massive amounts of human labeling </span></strong></em><span data-dcnode-id="4422" instrument_node="">(</span><a data-dcnode-id="4420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DUEXS8fw-9is"><span data-dcnode-id="4421" instrument_node="">video</span></a><span data-dcnode-id="4419" instrument_node="">)</span></b></b></p><span data-dcnode-id="4415" instrument_node="">
</span><blockquote data-dcnode-id="4397"><p class="moz-quote-pre" data-dcnode-id="4411" wrap=""><b data-dcnode-id="4412"><b data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">Mobile robots now deliver vast amounts of sensor data from large unstructured environments. In attempting to process and interpret this data there are many unique challenges in bridging the gap between prerecorded data sets and the field. This talk will present recent work addressing the application of deep learning techniques to robotic perception. We focus on solutions to several pervasive problems when attempting to deploy such techniques on fielded robotic systems. The themes of the talk revolve around alternatives to gathering and curating data sets for training. Are there ways of avoiding the labor-intensive human labeling required for supervised learning? These questions give rise to several lines of research based around self-supervision, adversarial learning, and simulation. We will show how these approaches applied to depth estimation, object classification, motion prediction, and domain transfer problems have great potential to change the way we train, test, and validate machine learning-based systems. Real examples from self-driving car and underwater vehicle deployments will be discussed.</span></b></b></p><span data-dcnode-id="4410" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4406" wrap=""><b data-dcnode-id="4407"><b data-dcnode-id="4408"><span data-dcnode-id="4409" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4405" instrument_node="">
