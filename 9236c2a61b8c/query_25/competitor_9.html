</span><p data-dcnode-id="1161"><b data-dcnode-id="1162"><b data-dcnode-id="1163"><span data-dcnode-id="1164" style="font-size: 13px;"><strong data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Bio:</span></strong><span data-dcnode-id="1165" instrument_node=""> Art Kuo is Professor of Mechanical Engineering and Biomedical Engineering at the University of Michigan. He directs the Human Biomechanics and Control Laboratory, which studies the basic principles of locomotion and other movements, and applies those principles to the development of robotic, assistive, and therapeutic devices to aid humans. Current interests include walking and running on uneven terrain, development of wearable sensors to track foot motion in the wild, and devices to improve the economy of locomotion in the impaired.</span></span></b></b></p><span data-dcnode-id="1160" instrument_node="">
</span></blockquote><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1154" wrap=""><b data-dcnode-id="1155"><b data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1143" wrap=""><b data-dcnode-id="1144"><b data-dcnode-id="1145"><span data-dcnode-id="1146" style="font-size: 13px;"><span data-dcnode-id="1152" instrument_node="">December 1 - </span><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//me.jhu.edu/faculty/louis-whitcomb/"><span data-dcnode-id="1151" instrument_node="">Louis Whitcomb</span></a><span data-dcnode-id="1149" instrument_node="">, Johns Hopkins </span><em data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Nereid Under-Ice: A Remotely Operated Underwater Robotic Vehicle for Oceanographic Access Under Ice</span></em></span></b></b></p><span data-dcnode-id="1142" instrument_node="">
</span><blockquote data-dcnode-id="1122"><p data-dcnode-id="1137" wrap=""><b data-dcnode-id="1138"><b data-dcnode-id="1139"><span data-dcnode-id="1140" style="font-size: 13px;"><span data-dcnode-id="1141" instrument_node="">This talk reports recent advances in underwater robotic vehicle research&nbsp; to enable novel oceanographic operations in extreme ocean environments, with focus on two recent novel vehicles developed by a team comprised of the speaker and his collaborators at the Woods Hole Oceanographic Institution. First, the development and operation of the Nereus underwater robotic vehicle will be briefly described, including successful scientific observation and sampling dive operations at hadal depths of 10,903 m. on a NSF sponsored expedition to the Challenger Deep of the Mariana Trench – the deepest place on Earth. Second, development and first sea trials of the new Nereid Under-Ice (UI) underwater vehicle will be described. NUI is a novel remotely-controlled underwater robotic vehicle capable of being teleoperated under ice under remote real-time human supervision. We report the results of NUI’s first under-ice deployments during a July 2014 expedition aboard R/V Polarstern at 83° N 6 W° in the Arctic Ocean – approximately 200 km NE of Greenland.&nbsp;</span></span></b></b></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1132" wrap=""><b data-dcnode-id="1133"><b data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1124" wrap=""><b data-dcnode-id="1125"><b data-dcnode-id="1126"><span data-dcnode-id="1127" style="font-size: 13px;"><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Bio:</span></strong><span data-dcnode-id="1128" instrument_node=""> Louis L. Whitcomb is Professor and Chairman at the Department of Mechanical Engineering, with secondary appointment in Computer Science, at the Johns Hopkins University’s Whiting School of Engineering. He completed a B.S. in Mechanical Engineering in 1984 and a Ph.D. in Electrical Engineering in 1992 at Yale University. From 1984 to 1986 he was a Research and Development engineer with the GMFanuc Robotics Corporation in Detroit, Michigan. He joined the Department of Mechanical Engineering at the Johns Hopkins University in 1995, after post doctoral fellowships at the University of Tokyo and the Woods Hole Oceanographic Institution. His research focuses on the navigation, dynamics, and control of robot systems – including industrial, medical, and underwater robots. Whitcomb is a principal investigator of the Nereus and Nereid Under-Ice Projects. He is former (founding) Director of the JHU Laboratory for Computational Sensing and Robotics. He received teaching awards at Johns Hopkins in 2001, 2002, 2004, and 2011, was awarded a National Science Foundation Career Award, and an Office of Naval Research Young Investigator Award. He is a Fellow of the IEEE. He is also Adjunct Scientist, Department of Applied Ocean Physics and Engineering, Woods Hole Oceanographic Institution.</span></span></b></b></p><span data-dcnode-id="1123" instrument_node="">
</span></blockquote><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1117"><b data-dcnode-id="1118"><b data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1104" wrap=""><b data-dcnode-id="1105"><b data-dcnode-id="1106"><span data-dcnode-id="1107" style="font-size: 13px;"><span data-dcnode-id="1115" instrument_node="">November 24 - </span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//people.csail.mit.edu/lpaull/"><span data-dcnode-id="1114" instrument_node="">Liam Paull</span></a><span data-dcnode-id="1112" instrument_node="">, MIT CSAIL </span><em data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">A Cooperative Area Coverage Framework that Accounts for Uncertainty and its Application to Autonomous Seabed Surveying </span></em><a data-dcnode-id="1108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/378"><span data-dcnode-id="1109" instrument_node="">(video)</span></a></span></b></b></p><span data-dcnode-id="1103" instrument_node="">
</span><blockquote data-dcnode-id="1086"><p data-dcnode-id="1094" wrap=""><b data-dcnode-id="1095"><b data-dcnode-id="1096"><span data-dcnode-id="1097" style="font-size: 13px;"><span data-dcnode-id="1102" instrument_node="">In this talk, we investigate the area coverage problem with mobile robots whose localization uncertainty is time-varying and significant.</span><br data-dcnode-id="1101"><span data-dcnode-id="1100" instrument_node="">
The vast majority of literature on robotics area coverage assumes that the robot's location estimate error is either zero or at least bounded.</span><br data-dcnode-id="1099"><span data-dcnode-id="1098" instrument_node="">
We remove this assumption and develop a probabilistic representation of coverage. Once we have formally connected robot sensor uncertainty with the area coverage, we motivate an adaptive sliding window filter pose estimator that is able to provide an arbitrarily close approximate to the full maximum a posteriori estimation with a computation cost that does not grow with time. An adaptive planning strategy is also presented that is able to automatically exploit conditions of low vehicle uncertainty to more aggressively cover area in realtime. This results in faster progress towards the coverage goal than overly conservative planners that assume worst-case error at all times.&nbsp;</span></span></b></b></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1088" wrap=""><b data-dcnode-id="1089"><b data-dcnode-id="1090"><span data-dcnode-id="1091" style="font-size: 13px;"><span data-dcnode-id="1092" instrument_node="">We further extend this to the multi-robot case where robots are able to communicate through a (possibly faulty) channel and make relative measurements of one another. In this case, area coverage can be achieved more quickly since the uncertainty of the robot trajectories will be reduced. We apply the framework to the scenario of mapping an area of seabed with a autonomous marine vehicles for minehunting purposes. The results show that the vehicles are able to achieve complete coverage with high confidence notwithstanding poor navigational sensors and resulting path-lengths are shorter than the worst-case planners.</span></span></b></b></p><span data-dcnode-id="1087" instrument_node="">
</span></blockquote><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1081"><b data-dcnode-id="1082"><b data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1066"><b data-dcnode-id="1067"><b data-dcnode-id="1068"><span data-dcnode-id="1069" style="font-size: 13px;"><span data-dcnode-id="1079" instrument_node="">November 17 - </span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.irt.uni-hannover.de/haddadin.html"><span data-dcnode-id="1078" instrument_node="">Sami Haddadin</span></a><span data-dcnode-id="1076" instrument_node="">, Hannover </span><em data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Robots For Humans </span></em><span data-dcnode-id="1073" instrument_node="">(</span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/368"><span data-dcnode-id="1072" instrument_node="">video</span></a><span data-dcnode-id="1070" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1065" instrument_node="">
</span><blockquote data-dcnode-id="1045"><p data-dcnode-id="1060" wrap=""><b data-dcnode-id="1061"><b data-dcnode-id="1062"><span data-dcnode-id="1063" style="font-size: 13px;"><span data-dcnode-id="1064" instrument_node="">Enabling robots for direct physical interaction and cooperation with humans and potentially unknown environments has been one of robotics research primary goals over decades. I will outline how our work on human-centered robot design, control, and planning may let robots for humans become a commodity in our near-future society. For this, we developed new generations of impedance controlled ultra-lightweight robots possibly equipped with Variable Impedance Actuation, previously at DLR, now in my new lab, which are sought to safely act as human assistants and collaborators at high performance over a variety of application domains. These may e.g. involve industrial assembly and manufacturing, medical assistance, or healthcare helpers in everyone's home, but also neurally controlled assistive devices. A recent generation of lightweight robots was commercialized as the KUKA LBR iiwa, which is considered to be the first commercial representative of this new class of robots. Based on a smart mechatronics design, a robot (let it be a manipulator, humanoid or flying system) has to be quipped with and also learn the skills than enable it to perceive and manipulate its' surrounding. Furthermore, it shall deduct according actions for successfully carrying out its given task, possibly in close collaboration with humans. At the same time the primary objective of a robot's action around humans is to ensure that even in case of malfunction or user errors no human shall be harmed, neither its surrounding be damaged. For this, instantaneous, truly human-safe, and intelligent context based force-sensitive controls and reactions to unforeseen events, partly inspired by the human motor control system, become crucial.&nbsp;</span></span></b></b></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1055" wrap=""><b data-dcnode-id="1056"><b data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1047" wrap=""><b data-dcnode-id="1048"><b data-dcnode-id="1049"><span data-dcnode-id="1050" style="font-size: 13px;"><strong data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Bio:</span></strong><span data-dcnode-id="1051" instrument_node=""> Sami Haddadin is Full Professor and Director of the Institute of Automatic Control (IRT) at Leibniz University Hanover (LUH), Germany. Until 2014 he was Scientific Coordinator "Terrestrial Assistance Systems" and "Human-Centered Robotics" at the DLR Robotics and Mechatronics Center. He was a visiting scholar at Stanford University in 2011 and a consulting scientist of Willow Garage, Inc., Palo Alto until 2013. He received degrees in Electrical Engineering (2006), Computer Science (2009), and Technology Management (2008) from TUM and LMU, respectively. He obtained his PhD with summa cum laude from RWTH Aachen in 2011. His research topics include physical Human-Robot Interaction, nonlinear robot control, real-time motion planning, real-time task and reflex planning, robot learning, optimal control, human motor control, variable impedance actuation, neuro-prosthetics, and safety in robotics. He was in the program/organization committee of several international robotics conferences and a guest editor of IJRR. He is an associate editor of the IEEE Transactions on Robotics. He published more than 100 scientific articles in international journals, conferences, and books. He received five best paper and video awards at ICRA/IROS, the 2008 Literati Best Paper Award, the euRobotics Technology Transfer Award 2011, and the 2012 George Giralt Award. He won the IEEE Transactions on Robotics King-Sun Fu Memorial Best Paper Award in 2011 and 2013. He is a recipient of the 2015 IEEE/RAS Early Career Award, the 2015 RSS Early Career Spotlight, the 2015 Alfried Krupp Award for Young Professors and was selected as 2015 Capital Young Elite Leader under 40 in Germany for the domain "Politics, State &amp; Society".</span></span></b></b></p><span data-dcnode-id="1046" instrument_node="">
</span></blockquote><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1040"><b data-dcnode-id="1041"><b data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1025"><b data-dcnode-id="1026"><b data-dcnode-id="1027"><span data-dcnode-id="1028" style="font-size: 13px;"><span data-dcnode-id="1038" instrument_node="">November 10 - </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//users.wpi.edu/~dberenson/"><span data-dcnode-id="1037" instrument_node="">Dmitry Berenson</span></a><span data-dcnode-id="1035" instrument_node="">, WPI&nbsp;</span><em data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Toward General-Purpose Manipulation of Deformable Objects </span></em><span data-dcnode-id="1032" instrument_node="">(</span><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/363"><span data-dcnode-id="1031" instrument_node="">video</span></a><span data-dcnode-id="1029" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1024" instrument_node="">
</span><blockquote data-dcnode-id="1004"><p data-dcnode-id="1019"><b data-dcnode-id="1020"><b data-dcnode-id="1021"><span data-dcnode-id="1022" style="font-size: 13px;"><span data-dcnode-id="1023" instrument_node="">Imagine a robot that could perceive and manipulate rigid objects as skillfully as a human adult. Would a robot that had such amazing capabilities be able to perform the range of practical manipulation tasks we expect in settings such as the home? Consider that this robot would still be unable to prepare a meal, do laundry, or make a bed because these tasks involve deformable object manipulation. Unlike in rigid-body manipulation, where methods exist for general-purpose pick-and-place tasks regardless of the size and shape of the object, no such methods exist for a similarly broad and practical class of deformable object manipulation tasks. The problem is indeed challenging, as these objects are not straightforward to model and have infinite-dimensional configuration spaces, making it difficult to apply established motion planning approaches. Our approach seeks to bypass these difficulties by representing deformable objects using simplified geometric models at both the global and local planning levels. Though we cannot predict the state of the object precisely, we can nevertheless perform tasks such as cable-routing, cloth folding, and surgical probe insertion in geometrically-complex environments. Building on this work, our new projects in this area aim to blend exploration of the model space with goal-directed manipulation of deformable objects and to generalize the methods we have developed to motion planning for soft robot arms, where we can exploit contact to mitigate the actuation uncertainty inherent in these systems.</span></span></b></b></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1014"><b data-dcnode-id="1015"><b data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1006"><b data-dcnode-id="1007"><b data-dcnode-id="1008"><span data-dcnode-id="1009" style="font-size: 13px;"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Bio:</span></strong><span data-dcnode-id="1010" instrument_node=""> Dmitry Berenson received a BS in Electrical Engineering from Cornell University in 2005 and received his Ph.D. degree from the Robotics Institute at Carnegie Mellon University in 2011, where he was supported by an Intel PhD Fellowship. He completed a post-doc at UC Berkeley in 2011 and started as an Assistant Professor in Robotics Engineering and Computer Science at WPI in 2012. He founded and directs the Autonomous Robotic Collaboration (ARC) Lab at WPI, which focuses on motion planning, manipulation, and human-robot collaboration.</span></span></b></b></p><span data-dcnode-id="1005" instrument_node="">
</span></blockquote><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="999"><b data-dcnode-id="1000"><b data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="984"><b data-dcnode-id="985"><b data-dcnode-id="986"><span data-dcnode-id="987" style="font-size: 13px;"><span data-dcnode-id="997" instrument_node="">November 3 - </span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//censi.mit.edu/"><span data-dcnode-id="996" instrument_node="">Andrea Censi</span></a><span data-dcnode-id="994" instrument_node="">, MIT&nbsp; </span><em data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Everything is the Same: Monotone Co-Design Problems </span></em><span data-dcnode-id="991" instrument_node="">(</span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/357"><span data-dcnode-id="990" instrument_node="">video</span></a><span data-dcnode-id="988" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="983" instrument_node="">
</span><blockquote data-dcnode-id="969"><p data-dcnode-id="971" wrap=""><b data-dcnode-id="972"><b data-dcnode-id="973"><span data-dcnode-id="974" style="font-size: 13px;"><span data-dcnode-id="982" instrument_node="">I will present some recent work towards developing a "theory of co-design" that is rich enough to represent the trade-offs in the design of complex robotic systems, including the recursive constraints that involve energetics, propulsion, communication, computation, sensing, control, perception, and planning. I am developing a formalism in which "design problems" are the primitive objects, and multiple design problems can be composed to obtain "co-design" problems through operations analogous to series, parallel, and feedback composition. Certain monotonicity properties are preserved by these operations, from which it is possible to conclude existence and uniqueness of minimal feasible design trade-offs, as well as obtaining a systematic solution procedure. The mathematical tools used are the</span><b class="moz-txt-star" data-dcnode-id="976"><span class="moz-txt-tag" data-dcnode-id="980"><span data-dcnode-id="981" instrument_node=""> *</span></span><span data-dcnode-id="979" instrument_node="">really elementary</span><span class="moz-txt-tag" data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">*</span></span></b><span data-dcnode-id="975" instrument_node=""> parts of the theory of fixed points on partially ordered sets (Kleene, Tarski, etc), of which no previous knowledge is assumed.&nbsp; We will conclude that: choosing the smallest battery for a drone, optimizing your controller to work over a network of limited bandwidth, and defining the semantics of programming languages, are one and the same problem.</span></span></b></b></p><span data-dcnode-id="970" instrument_node="">
</span></blockquote><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="964"><b data-dcnode-id="965"><b data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="949"><b data-dcnode-id="950"><b data-dcnode-id="951"><span data-dcnode-id="952" style="font-size: 13px;"><span data-dcnode-id="962" instrument_node="">October 27 - </span><a data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cs.cmu.edu/~astein/"><span data-dcnode-id="961" instrument_node="">Aaron Steinfeld</span></a><span data-dcnode-id="959" instrument_node="">, CMU&nbsp; </span><em data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Understanding and Creating Appropriate Robot Behavior </span></em><span data-dcnode-id="956" instrument_node="">(</span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/354"><span data-dcnode-id="955" instrument_node="">video</span></a><span data-dcnode-id="953" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="948" instrument_node="">
</span><blockquote data-dcnode-id="942"><p data-dcnode-id="943"><b data-dcnode-id="944"><b data-dcnode-id="945"><span data-dcnode-id="946" style="font-size: 13px;"><span data-dcnode-id="947" instrument_node="">End users expect appropriate robot actions, interventions, and requests for human assistance. As with most technologies, robots that behave in unexpected and inappropriate ways face misuse, abandonment, and sabotage. Complicating this challenge are human misperceptions of robot capability, intelligence, and performance. This talk will summarize work from several projects focused on this human-robot interaction challenge. Findings and examples will be shown from work on human trust in robots, deceptive robot behavior, robot motion, robot characteristics, and interaction with humans who are blind. I will also describe some lessons learned from related work in crowdsourcing (e.g., Tiramisu Transit) to help inform methods for enabling and supporting contributions by end users and local experts.</span></span></b></b></p></blockquote><span data-dcnode-id="941" instrument_node="">
</span><blockquote data-dcnode-id="933"><p data-dcnode-id="934"><b data-dcnode-id="935"><b data-dcnode-id="936"><span data-dcnode-id="937" style="font-size: 13px;"><b data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Bio:</span></b><span data-dcnode-id="938" instrument_node=""> Aaron Steinfeld is an Associate Research Professor in the Robotics Institute (RI) at Carnegie Mellon University. He received his BSE, MSE, and Ph.D. degrees in Industrial and Operations Engineering from the University of Michigan and completed a Post Doc at U.C. Berkeley. He is the Co-Director of the Rehabilitation Engineering Research Center on Accessible Public Transportation (RERC-APT), Director of the DRRP on Inclusive Cloud and Web Computing, and the area lead for transportation related projects in the Quality of Life Technology Center (QoLT). His research focuses on operator assistance under constraints, i.e., how to enable timely and appropriate interaction when technology use is restricted through design, tasks, the environment, time pressures, and/or user abilities. His work includes intelligent transportation systems, crowdsourcing, human-robot interaction, rehabilitation, and universal design.</span></span></b></b></p></blockquote><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="928"><b data-dcnode-id="929"><b data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="916"><b data-dcnode-id="917"><b data-dcnode-id="918"><span data-dcnode-id="919" style="font-size: 13px;"><span data-dcnode-id="926" instrument_node="">October 22 - </span><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//stanford.edu/~davheld/"><span data-dcnode-id="925" instrument_node="">David Held</span></a><span data-dcnode-id="923" instrument_node="">, Stanford University </span><em data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Using Motion to Understand Objects in the Real World </span></em><span data-dcnode-id="920" instrument_node="">(no video)</span></span></b></b></p><span data-dcnode-id="915" instrument_node="">
</span><blockquote data-dcnode-id="893"><p data-dcnode-id="910"><b data-dcnode-id="911"><b data-dcnode-id="912"><span data-dcnode-id="913" style="font-size: 13px;"><span data-dcnode-id="914" instrument_node="">Many robots today are confined to operate in relatively simple, controlled environments. One reason for this is that current methods for processing visual data tend to break down when faced with occlusions, viewpoint changes, poor lighting, and other challenging but common situations that occur when robots are placed in the real world. I will show that we can train robots to handle these variations by inferring the causes behind visual appearance changes. If we model how the world changes over time, we can be robust to the types of changes that objects often undergo. I demonstrate this idea in the context of autonomous driving, and I show how we can use this idea to improve performance on three different tasks: velocity estimation, segmentation, and tracking with neural networks. By inferring the causes of appearance changes over time, we can make our methods more robust to a variety of challenging situations that commonly occur in the real-world, thus enabling robots to come out of the factory and into our lives.</span></span></b></b></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="905"><b data-dcnode-id="906"><b data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="895"><b data-dcnode-id="896"><b data-dcnode-id="897"><span data-dcnode-id="900" style="font-size: 13px;"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Bio:</span></strong><span data-dcnode-id="901" instrument_node=""> David Held is a Computer Science Ph.D. student at Stanford working with Sebastian Thrun and Silvio Savarese. He research interests include robotics, vision, and machine learning, with applications to tracking and object detection for autonomous driving. David has previously been a researcher at the Weizmann Institute and has worked in industry as a software developer. David has a Master's Degree in Computer Science from Stanford and B.S. and M.S. degrees in Mechanical Engineering from MIT.</span></span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">
&nbsp;</span></b></b></p><span data-dcnode-id="894" instrument_node="">
</span></blockquote><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="885"><b data-dcnode-id="886"><b data-dcnode-id="887"><span data-dcnode-id="888" style="font-size: 13px;"><span data-dcnode-id="891" instrument_node="">October 20 - </span><em data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Robotics Student/Faculty Mixer</span></em></span></b></b></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="880"><b data-dcnode-id="881"><b data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="868"><b data-dcnode-id="869"><b data-dcnode-id="870"><span data-dcnode-id="871" style="font-size: 13px;"><span data-dcnode-id="878" instrument_node="">October 7 - </span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.matthewklingensmith.com/"><span data-dcnode-id="877" instrument_node="">Matt Klingensmith</span></a><span data-dcnode-id="875" instrument_node="">, CMU&nbsp; </span><em data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Articulated SLAM </span></em><span data-dcnode-id="872" instrument_node="">(no video)</span></span></b></b></p><span data-dcnode-id="867" instrument_node="">
</span><blockquote data-dcnode-id="861"><p data-dcnode-id="862"><b data-dcnode-id="863"><b data-dcnode-id="864"><span data-dcnode-id="865" style="font-size: 13px;"><span data-dcnode-id="866" instrument_node="">Uncertainty is a central problem in robotics. In order to understand and interact with the world, robots need to interpret signals from noisy sensors to reconstruct clear models not only of the world around them, but also their own internal state. For example, a mobile robot navigating an unknown space must simultaneously reconstruct a model of the world around it, and localize itself against that model using noisy sensor data from wheel odometry, lasers, cameras, or other sensors. This problem (called the SLAM problem) is very well-studied in the domain of mobile robots. Less well-studied is the equivalent problem for robot manipulators. That is, given a multi-jointed robot arm with a noisy hand-mounted sensor, how can the robot simultaneously estimate its state and generate a coherent 3D model of the world? We call this the articulated SLAM problem.</span></span></b></b></p></blockquote><span data-dcnode-id="860" instrument_node="">
</span><blockquote data-dcnode-id="854"><p data-dcnode-id="855"><b data-dcnode-id="856"><b data-dcnode-id="857"><span data-dcnode-id="858" style="font-size: 13px;"><span data-dcnode-id="859" instrument_node="">Given actuator uncertainty and sensor uncertainty, what is the correct way of simultaneously constructing a model of the world and estimating the robot's state? In this work, we show that certain contemporary visual SLAM techniques can be mapped to the articulated SLAM problem by using the robot's joint configuration space as the state space for localization, rather than the typical SE(3). We map one kind of visual SLAMt technique, Kinect Fusion, to the robot's configuration space, and show how the robot's joint encoders can be used appropriately to inform the pose of the camera. The idea that the configuration of the robot is not merely a sensor which informs the pose of the camera, but rather it is the underlying latent state of the system is critical to our analysis. Tracking the configuration of the robot directly allows us to build algorithms on top of the SLAM system which depend on knowledge of the joint angles (such as motion planners and control systems).</span></span></b></b></p></blockquote><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="849"><b data-dcnode-id="850"><b data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="844"><b data-dcnode-id="845"><b data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="830"><b data-dcnode-id="831"><b data-dcnode-id="832"><span data-dcnode-id="833" style="font-size: 13px;"><strong data-dcnode-id="835"><span data-dcnode-id="842" instrument_node="">Spring 2015 Campus-wide Robotics Seminar (sponsored by </span><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aurora.aero/"><span data-dcnode-id="841" instrument_node="">Aurora Flight Sciences</span></a><span data-dcnode-id="839" instrument_node=""> and </span><a data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mathworks.com/"><span data-dcnode-id="838" instrument_node="">The MathWorks</span></a><span data-dcnode-id="836" instrument_node="">)&nbsp; (11am-noon in 1-190</span></strong><span data-dcnode-id="834" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="829" instrument_node="">
</span><p class="rteright" data-dcnode-id="823"><b data-dcnode-id="824"><b data-dcnode-id="825"><span data-dcnode-id="826" style="font-size: 13px;"><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/channel/UCe5xeTWBFe-2-Rpob7bjdnA"><span data-dcnode-id="828" instrument_node="">Seminar series youtube channel</span></a></span></b></b></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="812"><b data-dcnode-id="813"><b data-dcnode-id="814"><span data-dcnode-id="815" style="font-size: 13px;"><span data-dcnode-id="821" instrument_node="">May 12 - </span><a data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homes.cs.washington.edu/~fox/"><span data-dcnode-id="820" instrument_node="">Dieter Fox</span></a><span data-dcnode-id="818" instrument_node="">, UW&nbsp; </span><em data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">RGB-D Perception in Robotics</span></em></span></b></b></p><span data-dcnode-id="811" instrument_node="">
</span><blockquote data-dcnode-id="781"><p data-dcnode-id="805"><b data-dcnode-id="806"><b data-dcnode-id="807"><span data-dcnode-id="809" style="font-size: 13px;"><span data-dcnode-id="810" instrument_node="">RGB-D cameras provide per pixel color and depth information at high frame rate and resolution. Gaming and entertainment applications such as the Microsoft Kinect system resulted in the mass production of RGB-D cameras at extremely low cost, also making them available for a wide range of robotics applications. In this talk, I will provide an overview of depth camera research done in the Robotics and State Estimation Lab over the last six years. This work includes 3D mapping of static and dynamic scenes, autonomous object modeling and recognition, and articulated object tracking.</span></span><span data-dcnode-id="808" instrument_node=""> </span></b></b></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="800"><b data-dcnode-id="801"><b data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="795"><b data-dcnode-id="796"><b data-dcnode-id="797"><span data-dcnode-id="798" instrument_node=""> </span></b></b></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="787"><b data-dcnode-id="788"><b data-dcnode-id="789"><span data-dcnode-id="790" style="font-size: 13px;"><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Bio:</span></strong><span data-dcnode-id="791" instrument_node=""> Dieter Fox is a Professor in the Department of Computer Science &amp; Engineering at the University of Washington, where he heads the UW Robotics and State Estimation Lab. From 2009 to 2011, he was also Director of the Intel Research Labs Seattle. He currently serves as the academic PI of the Intel Science and Technology Center for Pervasive Computing hosted at UW. Dieter obtained his Ph.D. from the University of Bonn, Germany. Before going to UW, he spent two years as a postdoctoral researcher at the CMU Robot Learning Lab. Fox's research is in artificial intelligence, with a focus on state estimation applied to robotics and activity recognition. He has published over 150 technical papers and is co-author of the text book "Probabilistic Robotics". He is an IEEE and a AAAI fellow, and received several best paper awards at major robotics and AI conferences. He is an editor of the IEEE Transactions on Robotics, was program co-chair of the 2008 AAAI Conference on Artificial Intelligence, and served as the program chair of the 2013 Robotics: Science and Systems conference.</span></span></b></b></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="782"><b data-dcnode-id="783"><b data-dcnode-id="784"><span data-dcnode-id="785" instrument_node=""> </span></b></b></p></blockquote><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="764"><b data-dcnode-id="765"><b data-dcnode-id="766"><span data-dcnode-id="767" style="font-size: 13px;"><span data-dcnode-id="779" instrument_node="">May 5 - </span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//groups.csail.mit.edu/locomotion/russt.html"><span data-dcnode-id="778" instrument_node="">Russ Tedrake</span></a><span data-dcnode-id="776" instrument_node="">, </span><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//web.mit.edu/"><span data-dcnode-id="775" instrument_node="">MIT</span></a><span data-dcnode-id="773" instrument_node=""> - </span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//csail.mit.edu/"><span data-dcnode-id="772" instrument_node="">CSAIL</span></a><span data-dcnode-id="770" instrument_node="">&nbsp; </span><em data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">MIT's Entry in the DARPA Robotics Challenge: Real-world, Interactive-rate Optimization for Humanoid Robots</span></em></span></b></b></p><span data-dcnode-id="763" instrument_node="">
</span><blockquote data-dcnode-id="725"><p data-dcnode-id="754"><b data-dcnode-id="755"><b data-dcnode-id="756"><span data-dcnode-id="758" style="font-size: 13px;"><span data-dcnode-id="762" instrument_node="">On June 5-6 of this year, 25 of the most advanced robots in the world will descend on Pomona, California to compete in the final DARPA Robotics Challenge competition (</span><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//theroboticschallenge.org/"><span data-dcnode-id="761" instrument_node="">http://theroboticschallenge.org</span></a><span data-dcnode-id="759" instrument_node="">). Each of these robots will be sent into a disaster response situation to perform complex locomotion and manipulation tasks with limited power and comms. Team MIT is one of only 2 academic teams that has survived all of the qualifying rounds, and we are working incredibly hard to showcase the power of our relatively formal approaches to perception, estimation, planning, and control.</span></span><span data-dcnode-id="757" instrument_node=""> </span></b></b></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="749"><b data-dcnode-id="750"><b data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="744"><b data-dcnode-id="745"><b data-dcnode-id="746"><span data-dcnode-id="747" instrument_node=""> </span></b></b></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="738"><b data-dcnode-id="739"><b data-dcnode-id="740"><span data-dcnode-id="741" style="font-size: 13px;"><span data-dcnode-id="742" instrument_node="">In this talk, I’ll dig into a number of technical research nuggets that have come to fruition during this effort, including an optimization-based planning and control method for robust and agile online gait and manipulation planning, efficient mixed-integer optimization for negotiating rough terrain, convex relaxations for grasp optimization, powerful real-time perception systems, and essentially drift-free state estimation. I’ll discuss the formal and practical challenges of fielding these on a very complex (36+ degree of freedom) humanoid robot that absolutely has to work on game day.</span></span></b></b></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="726"><b data-dcnode-id="727"><b data-dcnode-id="728"><span data-dcnode-id="736" instrument_node=""> </span><span data-dcnode-id="729" style="font-size: 13px;"><span data-dcnode-id="735" instrument_node=""> Relevant URLs: </span><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//drc.mit.edu/"><span data-dcnode-id="734" instrument_node="">http://drc.mit.edu</span></a><span data-dcnode-id="732" instrument_node="">, </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//youtube.com/mitdrc"><span data-dcnode-id="731" instrument_node="">http://youtube.com/mitdrc</span></a></span></b></b></p></blockquote><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="714"><b data-dcnode-id="715"><b data-dcnode-id="716"><span data-dcnode-id="717" style="font-size: 13px;"><span data-dcnode-id="723" instrument_node="">Apr 28 - </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.me.udel.edu/people/poulakakis.html"><span data-dcnode-id="722" instrument_node="">Ioannis Poulakakis</span></a><span data-dcnode-id="720" instrument_node="">, University of Delaware&nbsp; </span><em data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Legged Robots Across Scales: Integrating Motion Planning and Control through Canonical Locomotion Models</span></em></span></b></b></p><span data-dcnode-id="713" instrument_node="">
</span><blockquote data-dcnode-id="681"><p data-dcnode-id="705"><b data-dcnode-id="706"><b data-dcnode-id="707"><span data-dcnode-id="709" style="font-size: 13px;"><strong data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Abstract:</span></strong><span data-dcnode-id="710" instrument_node=""> On a macroscopic level, legged locomotion can be understood through reductive canonical models -- often termed templates -- the purpose of which is to capture the dominant features of an observed locomotion behavior without delving into the fine details of a robot’s (or animal’s) structure and morphology. Such models offer unifying, platform-independent, descriptions of task-level behaviors, and inform control design for legged robots. This talk will discuss reductive locomotion models for diverse legged robots, ranging from slow-moving, palm-size, eight-legged crawlers to larger bipeds and quadrupeds, and will focus on the role of such models in integrating locomotion control and motion planning within a unifying framework that translates task-level specifications to suitable low-level control actions that harness the locomotion capabilities of the robot platforms.</span></span><span data-dcnode-id="708" instrument_node=""> </span></b></b></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="700"><b data-dcnode-id="701"><b data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="695"><b data-dcnode-id="696"><b data-dcnode-id="697"><span data-dcnode-id="698" instrument_node=""> </span></b></b></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="687"><b data-dcnode-id="688"><b data-dcnode-id="689"><span data-dcnode-id="690" style="font-size: 13px;"><strong data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Bio:</span></strong><span data-dcnode-id="691" instrument_node=""> Prof. Poulakakis earned his Ph.D. in Electrical Engineering from the University of Michigan in 2008, served as a postdoctoral research associate at Princeton University for two years, and then joined the Department of Mechanical Engineering at the University of Delaware in 2010 as an Assistant Professor. His research interests are in the area of dynamics and control with application to bio-inspired robotic systems, specifically legged robots. In 2014 he received a Faculty Early Career Development Award from the National Science Foundation to investigate task planning and motion control for legged robots at different scales.</span></span></b></b></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="682"><b data-dcnode-id="683"><b data-dcnode-id="684"><span data-dcnode-id="685" instrument_node=""> </span></b></b></p></blockquote><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="675"><b data-dcnode-id="676"><b data-dcnode-id="677"><span data-dcnode-id="678" style="font-size: 13px;"><span data-dcnode-id="679" instrument_node="">Apr 21 - No seminar - MIT MONDAY SCHEDULE (due to Patriots Day)</span></span></b></b></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="667"><b data-dcnode-id="668"><b data-dcnode-id="669"><span data-dcnode-id="670" style="font-size: 13px;"><span data-dcnode-id="673" instrument_node="">Apr 14 - Ted Adelson, MIT&nbsp; </span><em data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">GelSight sensors for high resolution touch sensing in robotics, and many other things</span></em></span></b></b></p><span data-dcnode-id="666" instrument_node="">
</span><blockquote data-dcnode-id="660"><p data-dcnode-id="661"><b data-dcnode-id="662"><b data-dcnode-id="663"><span data-dcnode-id="664" style="font-size: 13px;"><span data-dcnode-id="665" instrument_node="">GelSight is a technology for high resolution touch sensing, which has a wide range of applications, some unexpected. A sensor consists of a slab of clear elastomer covered with a reflective membrane, along with an embedded camera and light system. The goal was to build a robot fingertip that could match the softness and sensitivity of human skin. Using machine vision (mainly photometric stereo) one can touch a surface and quickly derive high resolution 3D geometry, allowing estimates of shape, texture, and force. By adding internal markers one can estimate tangential interactions (friction, shear and slip). With collaborators we are learning how to use this information in robotic manipulation and surface sensing. GelSight’s extraordinarily high resolution has also led to a spin-off company, GelSight Inc., which makes instruments that measure the micron scale 3D geometry. Variants are being used commercially to support 3D printing, to enable forensics on bullet casings, to study human skin, and (in a large version) to measure feet for custom insoles.</span></span></b></b></p></blockquote><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="649"><b data-dcnode-id="650"><b data-dcnode-id="651"><span data-dcnode-id="652" style="font-size: 13px;"><span data-dcnode-id="658" instrument_node="">Apr 7 - </span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//charm.stanford.edu/Main/AllisonOkamura/"><span data-dcnode-id="657" instrument_node="">Allison Okamura</span></a><span data-dcnode-id="655" instrument_node="">, Stanford University Department of Mechanical Engineering&nbsp; </span><em data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Modeling, Planning, and Control for Robot-Assisted Medical Interventions</span></em></span></b></b></p><span data-dcnode-id="648" instrument_node="">
</span><blockquote data-dcnode-id="613"><p data-dcnode-id="640"><b data-dcnode-id="641"><b data-dcnode-id="642"><span data-dcnode-id="644" style="font-size: 13px;"><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Abstract:</span></strong><span data-dcnode-id="645" instrument_node=""> Many medical interventions today are qualitatively and quantitatively limited by human physical and cognitive capabilities. This talk will discuss several robot-assisted intervention techniques that will extend humans' ability to carry out interventions more accurately and less invasively. First, I will describe the development of minimally invasive systems that deliver therapy by steering needles through deformable tissue and around internal obstacles to reach specified targets. Second, I will review recent results in haptic (touch) feedback for robot-assisted teleoperated surgery, in particular the display of tissue mechanical properties. Finally, I will demonstrate the use of dynamic models of the body to drive novel rehabilitation strategies. All of these systems incorporate one or more key elements of robotic interventions: (1) quantitative descriptions of patient state, (2) the use of models to plan interventions, (3) the design of devices and control systems that connect information to physical action, and (4) the inclusion of human input in a natural way.</span></span><span data-dcnode-id="643" instrument_node=""> </span></b></b></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="635"><b data-dcnode-id="636"><b data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="630"><b data-dcnode-id="631"><b data-dcnode-id="632"><span data-dcnode-id="633" instrument_node=""> </span></b></b></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="619"><b data-dcnode-id="620"><b data-dcnode-id="621"><span data-dcnode-id="622" style="font-size: 13px;"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Biosketch:</span></strong><span data-dcnode-id="626" instrument_node=""> Allison M. Okamura received the BS degree from the University of California at Berkeley in 1994, and the MS and PhD degrees from Stanford University in 1996 and 2000, respectively, all in mechanical engineering. She is currently an Associate Professor in the mechanical engineering department at Stanford University, with a courtesy appointment in Computer Science. She is Editor-in-Chief of the IEEE International Conference on Robotics and Automation and an IEEE Fellow. Her academic interests include haptics, teleoperation, virtual and augmented reality, medical robotics, neuromechanics and rehabilitation, prosthetics, and engineering education. Outside academia, she enjoys spending time with her husband and two children, running, and playing ice hockey. For more information about her research, please see the Collaborative Haptics and Robotics in Medicine (CHARM) Laboratory website: </span><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//charm.stanford.edu/"><span data-dcnode-id="625" instrument_node="">http://charm.stanford.edu</span></a><span data-dcnode-id="623" instrument_node="">.</span></span></b></b></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="614"><b data-dcnode-id="615"><b data-dcnode-id="616"><span data-dcnode-id="617" instrument_node=""> </span></b></b></p></blockquote><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="607"><b data-dcnode-id="608"><b data-dcnode-id="609"><span data-dcnode-id="610" style="font-size: 13px;"><span data-dcnode-id="611" instrument_node="">Mar 31 - student/faculty mixer</span></span></b></b></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="596"><b data-dcnode-id="597"><b data-dcnode-id="598"><span data-dcnode-id="599" style="font-size: 13px;"><span data-dcnode-id="605" instrument_node="">Mar 24 - MIT SPRING VACATION Special : </span><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cc.gatech.edu/~dellaert/"><span data-dcnode-id="604" instrument_node="">Frank Dellaert</span></a><span data-dcnode-id="602" instrument_node="">, Georgia Tech&nbsp; </span><em data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Factor Graphs for Flexible Inference in Robotics and Vision</span></em></span></b></b></p><span data-dcnode-id="595" instrument_node="">
</span><blockquote data-dcnode-id="561"><p data-dcnode-id="587"><b data-dcnode-id="588"><b data-dcnode-id="589"><span data-dcnode-id="591" style="font-size: 13px;"><strong data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Abstract:</span></strong><span data-dcnode-id="592" instrument_node=""> Simultaneous Localization and Mapping (SLAM) and Structure from Motion (SFM) are important and closely related problems in robotics and vision. I will show how both SLAM and SFM instances can be posed in terms of a graphical model, a factor graph, and that inference in these graphs can be understood as variable elimination. The overarching theme of the talk will be to emphasize the advantages and intuition that come with seeing these problems in terms of graphical models. For example, while the graphical model perspective is completely general, linearizing the non-linear factors and assuming Gaussian noise yields the familiar direct linear solvers such as Cholesky and QR factorization. Based on these insights, we have developed both batch and incremental algorithms defined on graphs in the SLAM/SFM domain. I will also discuss my recent work on using polynomial bases for trajectory optimization, inspired by pseudospectral optimal control, which is made easy by the new Expressions language in GTSAM 4, currently under development.</span></span><span data-dcnode-id="590" instrument_node=""> </span></b></b></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="567"><b data-dcnode-id="568"><b data-dcnode-id="569"><span data-dcnode-id="570" style="font-size: 13px;"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Bio:</span></strong><span data-dcnode-id="583" instrument_node=""> Frank Dellaert is currently on leave from the Georgia Institute of Technology for a stint as Chief Scientist of Skydio, a startup founded by MIT grads to create intuitive interfaces for micro-aerial vehicles. When not on leave, he is a Professor in the School of Interactive Computing and Director of the Robotics PhD program at Georgia Tech. His research interests lie in the overlap of Robotics and Computer vision, and he is particularly interested in graphical model techniques to solve large-scale problems in mapping and 3D reconstruction. You can find out about his group’s research and publications at </span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borg.cc.gatech.edu/"><span data-dcnode-id="582" instrument_node="">https://borg.cc.gatech.edu</span></a><span data-dcnode-id="580" instrument_node=""> and </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cc.gatech.edu/~dellaert"><span data-dcnode-id="579" instrument_node="">http://www.cc.gatech.edu/~dellaert</span></a><span data-dcnode-id="577" instrument_node="">. The GTSAM toolbox which embodies many of the ideas his group has worked on in the past few years is available for download at </span><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tinyurl.com/gtsam"><span data-dcnode-id="576" instrument_node="">http://tinyurl.com/gtsam</span></a><span data-dcnode-id="574" instrument_node="">. But really hardcore users can ask to be plugged into our BitBucket motherlode. Just send mail to </span><a data-dcnode-id="572" href="mailto:frank@cc.gatech.edu?subject=Contact%20from%20the%20MIT%20Robotics%20Seminar"><span data-dcnode-id="573" instrument_node="">frank@cc.gatech.edu</span></a><span data-dcnode-id="571" instrument_node="">.</span></span></b></b></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="562"><b data-dcnode-id="563"><b data-dcnode-id="564"><span data-dcnode-id="565" instrument_node=""> </span></b></b></p></blockquote><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="550"><b data-dcnode-id="551"><b data-dcnode-id="552"><span data-dcnode-id="553" style="font-size: 13px;"><span data-dcnode-id="559" instrument_node="">Mar 17 - </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//lis.csail.mit.edu/new/"><span data-dcnode-id="558" instrument_node="">Leslie Pack Kaelbling</span></a><span data-dcnode-id="556" instrument_node="">, MIT CSAIL&nbsp; </span><em data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Making Robots Behave</span></em></span></b></b></p><span data-dcnode-id="549" instrument_node="">
</span><blockquote data-dcnode-id="542"><p data-dcnode-id="544"><b data-dcnode-id="545"><b data-dcnode-id="546"><span data-dcnode-id="547" style="font-size: 13px;"><span data-dcnode-id="548" instrument_node="">The fields of AI and robotics have made great improvements in many individual subfields, including in motion planning, symbolic planning, probabilistic reasoning, perception, and learning. Our goal is to develop an integrated approach to solving very large problems that are hopelessly intractable to solve optimally. We make a number of approximations during planning, including serializing subtasks, factoring distributions, and determinizing stochastic dynamics, but regain robustness and effectiveness through a continuous state-estimation and replanning process. This approach is demonstrated in three robotic domains, each of which integrates perception, estimation, planning, and manipulation.</span></span></b></b></p><span data-dcnode-id="543" instrument_node="">
</span></blockquote><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="531"><b data-dcnode-id="532"><b data-dcnode-id="533"><span data-dcnode-id="534" style="font-size: 13px;"><span data-dcnode-id="540" instrument_node="">Mar 10 - </span><a data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.whoi.edu/DSL/hanu/"><span data-dcnode-id="539" instrument_node="">Hanu Singh</span></a><span data-dcnode-id="537" instrument_node="">, Woods Hole Oceanographic Institute&nbsp; </span><em data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Bipolar Robotics: Exploring the Arctic and the Antarctic with a stop for some Coral Reef Ecology in the Middle</span></em></span></b></b></p><span data-dcnode-id="530" instrument_node="">
</span><blockquote data-dcnode-id="515"><p data-dcnode-id="516"><b data-dcnode-id="517"><b data-dcnode-id="518"><span data-dcnode-id="519" style="font-size: 13px;"><span data-dcnode-id="529" instrument_node="">The Arctic and Antarctic remain one of least explored parts of the world's oceans. This talk looks at efforts over the last decade to explore areas under-ice which have traditionally been difficult to access. The focus of the talk will be on the robots, the role of communications over low bandwidth acoustic links, navigation and imaging and mapping methodologies. This issues will all be discussed within the context of real data collected on several expeditions to the Arctic and Antarctic.</span><br data-dcnode-id="528"><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.whoi.edu/DSL/hanu"><span data-dcnode-id="527" instrument_node="">http://www.whoi.edu/DSL/hanu</span></a><br data-dcnode-id="525"><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.whoi.edu/oceanus/feature/the-jetyak"><span data-dcnode-id="524" instrument_node="">http://www.whoi.edu/oceanus/feature/the-jetyak</span></a><br data-dcnode-id="522"><a data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//polardiscovery.whoi.edu/expedition2/index.html"><span data-dcnode-id="521" instrument_node="">http://polardiscovery.whoi.edu/expedition2/index.html</span></a></span></b></b></p></blockquote><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="504"><b data-dcnode-id="505"><b data-dcnode-id="506"><span data-dcnode-id="507" style="font-size: 13px;"><span data-dcnode-id="513" instrument_node="">Mar 3 - </span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//vehicle.me.berkeley.edu/brandon-basso/"><span data-dcnode-id="512" instrument_node="">Brandon Basso</span></a><span data-dcnode-id="510" instrument_node="">, UC Berkeley&nbsp; </span><em data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">The 3D Robotics Open UAV Platform</span></em></span></b></b></p><span data-dcnode-id="503" instrument_node="">
</span><blockquote data-dcnode-id="497"><p data-dcnode-id="498"><b data-dcnode-id="499"><b data-dcnode-id="500"><span data-dcnode-id="501" style="font-size: 13px;"><span data-dcnode-id="502" instrument_node="">3D Robotics is a venture-backed aerospace startup in Berkeley, California. At the heart of our platform is the the Pixhawk autopilot which runs on more UAVs in the world than any other autopilot and represents the worlds largest open source robotics project, Ardupilot. This talk will explore the technological advancements that have enabled an entirely open and viral UAV platform, from low-level estimation to high-level system architecture. Two recent advancements will be explored in detail: Efficient algorithms for state estimation using low-cost IMUs, and cloud-based architecture for real-time uplink and downlink from any internet-connected vehicle. Some concluding thoughts on future platform evolution and the growing consumer drone space will be presented.</span></span></b></b></p></blockquote><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="486"><b data-dcnode-id="487"><b data-dcnode-id="488"><span data-dcnode-id="489" style="font-size: 13px;"><span data-dcnode-id="495" instrument_node="">Feb 24 - </span><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cs.jhu.edu/~rht/"><span data-dcnode-id="494" instrument_node="">Russell H. Taylor</span></a><span data-dcnode-id="492" instrument_node="">, The Johns Hopkins University&nbsp; </span><em data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Medical Robotics and Computer-Integrated Interventional Medicine</span></em></span></b></b></p><span data-dcnode-id="485" instrument_node="">
</span><blockquote data-dcnode-id="464"><p data-dcnode-id="478"><b data-dcnode-id="479"><b data-dcnode-id="480"><span data-dcnode-id="481" style="font-size: 13px;"><span data-dcnode-id="484" instrument_node="">Computer-integrated interventional systems (CIIS) combine innovative algorithms, robotic devices, imaging systems, sensors, and human-machine interfaces to work cooperatively with surgeons in the planning and execution of surgery and other interventional procedures. The impact of CIIS on medicine in the next 20 years will be as great as that of Computer-Integrated Manufacturing on industrial production over the past 20 years. A novel partnership between human surgeons and machines, made possible by advances in computing and engineering technology, will overcome many of the limitations of traditional surgery. By extending human surgeons’ ability to plan and carry out surgical interventions more accurately and less invasively, CIIS systems will address a vital need to greatly reduce costs, improve clinical outcomes, and improve the efficiency of health care delivery.</span><br data-dcnode-id="483"><span data-dcnode-id="482" instrument_node="">
This talk will describe past and emerging research themes in CIIS systems and illustrate them with examples drawn from our current research activities within Johns Hopkins University’s Engineering Research Center for Computer Integrated Surgical systems and Technology</span></span></b></b></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="472"><b data-dcnode-id="473"><b data-dcnode-id="474"><span data-dcnode-id="475" style="font-size: 13px;"><span data-dcnode-id="476" instrument_node="">Biography</span></span></b></b></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="466"><b data-dcnode-id="467"><b data-dcnode-id="468"><span data-dcnode-id="469" style="font-size: 13px;"><span data-dcnode-id="470" instrument_node="">Russell H. Taylor received his Ph.D. in Computer Science from Stanford in 1976. He joined IBM Research in 1976, where he developed the AML robot language and managed the Automation Technology Department and (later) the Computer-Assisted Surgery Group before moving in 1995 to Johns Hopkins, where he is the John C. Malone Professor of Computer Science with joint appointments in Mechanical Engineering, Radiology, and Surgery and is also Director of the Engineering Research Center for Computer-Integrated Surgical Systems and Technology (CISST ERC) and of the Laboratory for Computational Sensing and Robotics (LCSR). He is the author of over 375 peer-reviewed publications, a Fellow of the IEEE, of the AIMBE, of the MICCAI Society, and of the Engineering School of the University of Tokyo. He is also a recipient of numerous awards, including the IEEE Robotics Pioneer Award, the MICCAI Society Enduring Impact Award, and the Maurice Müller Award for Excellence in Computer-Assisted Orthopaedic Surgery.</span></span></b></b></p><span data-dcnode-id="465" instrument_node="">
</span></blockquote><span data-dcnode-id="463" instrument_node="">
</span><hr data-dcnode-id="462"><p data-dcnode-id="456"><b data-dcnode-id="457"><b data-dcnode-id="458"><span data-dcnode-id="459" style="font-size: 13px;"><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Fall 2014 Campus-wide Robotics Seminar</span></strong></span></b></b></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="444"><b data-dcnode-id="445"><b data-dcnode-id="446"><span data-dcnode-id="447" style="font-size: 13px;"><span data-dcnode-id="454" instrument_node="">Dec 9 - Tim Bretl, U Illinois Urbana-Champaign&nbsp;&nbsp; </span><em data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Mechanics, Manipulation, and Perception of an Elastic Rod </span></em><span data-dcnode-id="451" instrument_node="">(</span><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/150"><span data-dcnode-id="450" instrument_node="">video</span></a><span data-dcnode-id="448" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="443" instrument_node="">
</span><blockquote data-dcnode-id="406"><p data-dcnode-id="436"><b data-dcnode-id="437"><b data-dcnode-id="438"><span data-dcnode-id="439" style="font-size: 13px;"><strong data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Abstract:</span></strong><span data-dcnode-id="440" instrument_node=""> This talk is about robotic manipulation of canonical "deformable linear objects" like a Kirchhoff elastic rod (e.g., a flexible wire). I continue to be amazed by how much can be gained by looking carefully at the mechanics of these objects and at the underlying mathematics. For example, did you know that the free configuration space of an elastic rod is path-connected? I'll prove it, and tell you why it matters.</span></span></b></b></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="428"><b data-dcnode-id="429"><b data-dcnode-id="430"><span data-dcnode-id="431" style="font-size: 13px;"><strong data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Bio:</span></strong><span data-dcnode-id="432" instrument_node=""> Timothy Bretl comes from the University of Illinois at Urbana-Champaign, where he is an Associate Professor of Aerospace Engineering and of the Coordinated Science Laboratory.</span></span></b></b></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="418"><b data-dcnode-id="419"><b data-dcnode-id="420"><span data-dcnode-id="421" style="font-size: 13px;"><strong data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Website:</span></strong><span data-dcnode-id="424" instrument_node=""> </span><a data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bretl.csl.illinois.edu/"><span data-dcnode-id="423" instrument_node="">http://bretl.csl.illinois.edu/</span></a></span></b></b></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="408"><b data-dcnode-id="409"><b data-dcnode-id="410"><span data-dcnode-id="411" style="font-size: 13px;"><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Photo:</span></strong><span data-dcnode-id="414" instrument_node=""> </span><a data-dcnode-id="412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//goo.gl/F7BpMz"><span data-dcnode-id="413" instrument_node="">http://goo.gl/F7BpMz</span></a></span></b></b></p><span data-dcnode-id="407" instrument_node="">
</span></blockquote><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="394"><b data-dcnode-id="395"><b data-dcnode-id="396"><span data-dcnode-id="397" style="font-size: 13px;"><span data-dcnode-id="404" instrument_node="">Dec 2 - Steve LaValle, Professor, University of Illinois &amp; Principal Scientist, Oculus/Facebook&nbsp;&nbsp; </span><em data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Robotics Meets Virtual Reality </span></em><span data-dcnode-id="401" instrument_node="">(</span><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/148"><span data-dcnode-id="400" instrument_node="">video</span></a><span data-dcnode-id="398" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="393" instrument_node="">
</span><blockquote data-dcnode-id="366"><p data-dcnode-id="386"><b data-dcnode-id="387"><b data-dcnode-id="388"><span data-dcnode-id="389" style="font-size: 13px;"><strong data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Abstract:</span></strong><span data-dcnode-id="390" instrument_node=""> Roboticists are well positioned to strongly impact the rising field of virtual reality (VR). Using the latest technology, we can safely take control of your most trusted senses, thereby fooling your brain into believing you are in another world. VR has been around for a long time, but due to the recent convergence of sensing, display, and computation technologies, there is an unprecedented opportunity to explore this form of human augmentation with lightweight, low-cost materials and simple software platforms. Many of the issues are familiar to roboticists, such as position and orientation tracking from sensor data, maintaining features from vision data, and dynamical system modeling. In addition, there is an intense form of human-computer interaction (HCI) that requires re-examining core engineering principles with a direct infusion of perceptual psychology research. With the rapid rise in consumer VR, fundamental research questions are popping up everywhere, slicing across numerous disciplines from engineering to sociology to film to medicine. This talk will provide some perspective on where we have been and how roboticists can help participate in this exciting future!</span></span></b></b></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="378"><b data-dcnode-id="379"><b data-dcnode-id="380"><span data-dcnode-id="381" style="font-size: 13px;"><strong data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Bio:</span></strong><span data-dcnode-id="382" instrument_node=""> Steve LaValle started working with Oculus VR in September 2012, a few days after their successful Kickstarter campaign, and was the head scientist up until the Facebook acquisition in March 2014. He developed perceptually tuned head tracking methods based on IMUs and computer vision. He also led a team of perceptual psychologists to provide principled approaches to virtual reality system calibration and the design of comfortable user experiences. In addition to his continuing work at Oculus, he is also Professor of Computer Science at the University of Illinois, where he joined in 2001. He has worked in robotics for over 20 years and is known for his introduction of the Rapidly exploring Random Tree (RRT) algorithm of motion planning and his 2006 book, Planning Algorithms.</span></span></b></b></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="368"><b data-dcnode-id="369"><b data-dcnode-id="370"><span data-dcnode-id="371" style="font-size: 13px;"><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Website:</span></strong><span data-dcnode-id="374" instrument_node=""> </span><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//msl.cs.uiuc.edu/~lavalle/"><span data-dcnode-id="373" instrument_node="">http://msl.cs.uiuc.edu/~lavalle/</span></a></span></b></b></p><span data-dcnode-id="367" instrument_node="">
</span></blockquote><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="357"><b data-dcnode-id="358"><b data-dcnode-id="359"><span data-dcnode-id="360" style="font-size: 13px;"><span data-dcnode-id="364" instrument_node="">Nov 25 - </span><s data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Richard Newcombe, University of Washington</span></s><span data-dcnode-id="361" instrument_node=""> Andrea Censi, MIT LIDS</span></span></b></b></p><span data-dcnode-id="356" instrument_node="">
</span><blockquote data-dcnode-id="349"><p data-dcnode-id="351"><b data-dcnode-id="352"><b data-dcnode-id="353"><span data-dcnode-id="354" style="font-size: 13px;"><span data-dcnode-id="355" instrument_node="">Robotics video session : screening/voting session for the ICRA 2015 trailer</span></span></b></b></p><span data-dcnode-id="350" instrument_node="">
</span></blockquote><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="341"><b data-dcnode-id="342"><b data-dcnode-id="343"><span data-dcnode-id="344" style="font-size: 13px;"><span data-dcnode-id="347" instrument_node="">Nov 18 - Sachin Patil, UC Berkeley&nbsp;&nbsp; </span><em data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Coping with Uncertainty in Robotic Navigation, Exploration, and Grasping</span></em></span></b></b></p><span data-dcnode-id="340" instrument_node="">
</span><blockquote data-dcnode-id="333"><p data-dcnode-id="335"><b data-dcnode-id="336"><b data-dcnode-id="337"><span data-dcnode-id="338" style="font-size: 13px;"><span data-dcnode-id="339" instrument_node="">A key challenge in robotics is to robustly complete navigation, exploration, and manipulation tasks when the state of the world is uncertain. This is a fundamental problem in several application areas such as logistics, personal robotics, and healthcare where robots with imprecise actuation and sensing are being deployed in unstructured environments. In such a setting, it is necessary to reason about the acquisition of perceptual knowledge and to perform information gathering actions as necessary. In this talk, I will present an approach to motion planning under motion and sensing uncertainty called "belief space" planning where the objective is to trade off exploration (gathering information) and exploitation (performing actions) in the context of performing a task. In particular, I will present how we can use trajectory optimization to compute locally-optimal solutions to a determinized version of this problem in Gaussian belief spaces. I will show that it is possible to obtain significant computational speedups without explicitly optimizing over the covariances by considering a partial collocation approach. I will also address the problem of computing such trajectories, given that measurements may not be obtained during execution due to factors such as limited field of view of sensors and occlusions. I will demonstrate this approach in the context of robotic grasping in unknown environments where the robot has to simultaneously explore the environment and grasp occluded objects whose geometry and positions are initially unknown.</span></span></b></b></p><span data-dcnode-id="334" instrument_node="">
</span></blockquote><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="321"><b data-dcnode-id="322"><b data-dcnode-id="323"><span data-dcnode-id="324" style="font-size: 13px;"><span data-dcnode-id="331" instrument_node="">Nov 4 - Mark Cutkosky, Stanford&nbsp;&nbsp; </span><em data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Bio-Inspired Dynamic Surface Grasping </span></em><span data-dcnode-id="328" instrument_node="">(</span><a data-dcnode-id="326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/134"><span data-dcnode-id="327" instrument_node="">video</span></a><span data-dcnode-id="325" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="320" instrument_node="">
</span><blockquote data-dcnode-id="313"><p data-dcnode-id="315"><b data-dcnode-id="316"><b data-dcnode-id="317"><span data-dcnode-id="318" style="font-size: 13px;"><span data-dcnode-id="319" instrument_node="">The adhesive system of the gecko has several remarkable properties that make it ideal for agility on vertical and overhanging surfaces. It requires very little preload for sticking, and (unlike sticky tape) very little effort to detach. It resists fouling when the gecko travels over dusty surfaces, and it is controllable: the amount of adhesion in the normal direction depends on the applied tangential force. Moreover, it is fast, allowing the gecko to climb at speeds of a meter per second. The desirable properties of the gecko's adhesive apparatus are a result of its unique, hierarchical structure, with feature sizes ranging from hundreds of nanometers to millimeters. Over the last several years, analogous features have been incorporated into various synthetic gecko-inspired adhesives, with gradually improving performance from the standpoints of adhesion, ease and speed of attachment and detachment, etc. In this talk we will explore recent developments to scale gecko-inspired directional adhesives beyond small wall-climbing robots to new applications including perching quadrotors and grappling space debris in orbit. These applications require scaling the adhesives to areas of 10x10cm or larger on flat or curved surfaces without loss in performance, and attachment in milliseconds to prevent bouncing. The solutions draw some inspiration from the arrangement of tendons and other compliant structures in the gecko's toe.</span></span></b></b></p><span data-dcnode-id="314" instrument_node="">
</span></blockquote><span data-dcnode-id="312" instrument_node="">
