</span><p class="moz-quote-pre" data-dcnode-id="4399" wrap=""><b data-dcnode-id="4400"><b data-dcnode-id="4401"><strong data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">Bio:</span></strong><span data-dcnode-id="4402" instrument_node=""> Matthew Johnson-Roberson is Associate Professor of Engineering in the Department of Naval Architecture &amp; Marine Engineering and the Department of Electrical Engineering and Computer Science at the University of Michigan. He received a PhD from the University of Sydney in 2010. He has held prior postdoctoral appointments with the Centre for Autonomous Systems - CAS at KTH Royal Institute of Technology in Stockholm and the Australian Centre for Field Robotics at the University of Sydney. He is a recipient of the NSF CAREER award (2015). He has worked in robotic perception since the first DARPA grand challenge and his group focuses on enabling robots to better see and understand their environment.</span></b></b></p><span data-dcnode-id="4398" instrument_node="">
</span></blockquote><span data-dcnode-id="4396" instrument_node="">
</span><p data-dcnode-id="4392"><b data-dcnode-id="4393"><b data-dcnode-id="4394"><span data-dcnode-id="4395" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4391" instrument_node="">
</span><p data-dcnode-id="4387"><b data-dcnode-id="4388"><b data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4386" instrument_node="">
</span><p data-dcnode-id="4370"><b data-dcnode-id="4371"><b data-dcnode-id="4372"><strong data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">Spring 2019 Campus-wide Robotics Seminar</span></strong><strong data-dcnode-id="4373"><span data-dcnode-id="4383" instrument_node=""> (sponsored by </span><a data-dcnode-id="4381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aurora.aero/"><span data-dcnode-id="4382" instrument_node="">Aurora Flight Sciences</span></a><span data-dcnode-id="4380" instrument_node=""> , </span><a data-dcnode-id="4378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mathworks.com/"><span data-dcnode-id="4379" instrument_node="">The MathWorks</span></a><span data-dcnode-id="4377" instrument_node=""> , and the </span><a data-dcnode-id="4375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.russellsage.org/"><span data-dcnode-id="4376" instrument_node="">Russell Sage Foundation</span></a><span data-dcnode-id="4374" instrument_node=""> )&nbsp;</span></strong></b></b></p><span data-dcnode-id="4369" instrument_node="">
</span><p data-dcnode-id="4365"><b data-dcnode-id="4366"><b data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4364" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4350" wrap=""><b data-dcnode-id="4351"><b data-dcnode-id="4352"><span data-dcnode-id="4363" instrument_node="">May 17, </span><a data-dcnode-id="4361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mems.duke.edu/faculty/kris-hauser"><span data-dcnode-id="4362" instrument_node="">Kris Hauser</span></a><span data-dcnode-id="4360" instrument_node="">, Duke University</span><em data-dcnode-id="4357"><strong data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node=""> Exploiting inter-problem structure in motion planning and control </span></strong></em><span data-dcnode-id="4356" instrument_node="">(</span><a data-dcnode-id="4354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DZ27hzDqnjBU"><span data-dcnode-id="4355" instrument_node="">video</span></a><span data-dcnode-id="4353" instrument_node="">)</span></b></b></p><span data-dcnode-id="4349" instrument_node="">
</span><blockquote data-dcnode-id="4326"><p class="moz-quote-pre" data-dcnode-id="4345" wrap=""><b data-dcnode-id="4346"><b data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">The ability for a robot to plan its own motions is a critical component of intelligent behavior, but it has so far proven challenging to calculate high-quality motions quickly and reliably. This limits the speed at which dynamic systems can react to changing sensor input, and makes systems less robust to uncertainty. Moreover, planning problems involving many sequential interrelated tasks, like walking on rough terrain or cleaning a kitchen, can take minutes or hours to solve. This talk will describe methods that exploit experience to solve motion planning and optimal control problems much faster than de novo methods. Unlike typical machine learning settings, the planning and optimal control setting introduces peculiar inter-problem (codimensional) similarity structures that must be exploited to obtain good generalization. This line of work has seen successful application in several domains over the years, including legged robots, dynamic vehicle navigation, multi-object manipulation, and workcell design.</span></b></b></p><span data-dcnode-id="4344" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4340" wrap=""><b data-dcnode-id="4341"><b data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4339" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4333" wrap=""><b data-dcnode-id="4334"><b data-dcnode-id="4335"><strong data-dcnode-id="4337"><span data-dcnode-id="4338" instrument_node="">Bio:</span></strong><span data-dcnode-id="4336" instrument_node=""> Kris Hauser is an Associate Professor at Duke University with a joint appointment in the Electrical and Computer Engineering Department and the Mechanical Engineering and Materials Science Department. He received his PhD in Computer Science from Stanford University in 2008, bachelor's degrees in Computer Science and Mathematics from UC Berkeley in 2003, and worked as a postdoctoral fellow at UC Berkeley. He then joined the faculty at Indiana University from 2009-2014, moved to Duke in 2014, and will begin at University of Illinois Urbana-Champaign in 2019. He is a recipient of a Stanford Graduate Fellowship, Siebel Scholar Fellowship, Best Paper Award at IEEE Humanoids 2015, and an NSF CAREER award.</span></b></b></p><span data-dcnode-id="4332" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4328" wrap=""><b data-dcnode-id="4329"><b data-dcnode-id="4330"><span data-dcnode-id="4331" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4327" instrument_node="">
</span></blockquote><span data-dcnode-id="4325" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4315" wrap=""><b data-dcnode-id="4316"><b data-dcnode-id="4317"><span data-dcnode-id="4324" instrument_node="">May 16, </span><a data-dcnode-id="4322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ai.uni-bremen.de/team/michael_beetz"><span data-dcnode-id="4323" instrument_node="">Michael Beetz</span></a><span data-dcnode-id="4321" instrument_node="">, University of Bremen </span><em data-dcnode-id="4318"><strong data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">Digital Twin Knowledge Bases --- Knowledge Representation and Reasoning for Robotic Agents</span></strong></em></b></b></p><span data-dcnode-id="4314" instrument_node="">
</span><blockquote data-dcnode-id="4286"><p data-dcnode-id="4310"><b data-dcnode-id="4311"><b data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">Robotic agents that can accomplish manipulation tasks with the competence of humans have been one of the grand research challenges for artificial intelligence (AI) and robotics research for more than 50 years. However, while the fields made huge progress over the years, this ultimate goal is still out of reach. I believe that this is the case because the knowledge representation and reasoning methods that have been proposed in AI so far are necessary but too abstract. In this talk I propose to address this problem by endowing robots with the capability to internally emulate and simulate their perception-action loops based on realistic images and faithful physics simulations, which are made machine-understandable by casting them as virtual symbolic knowledge bases. These capabilities allow robots to generate huge collections of machine-understandable manipulation experiences, which robotic agents can generalize into commonsense and intuitive physics knowledge applicable to open varieties of manipulation tasks. The combination of learning, representation, and reasoning will equip robots with an understanding of the relation between their motions and the physical effects they cause at an unprecedented level of realism, depth, and breadth, and enable them to master human-scale manipulation tasks. This breakthrough will be achievable by combining leading-edge simulation and visual rendering technologies with mechanisms to semantically interpret and introspect internal simulation data structures and processes. Robots with such manipulation capabilities can help us to better deal with important societal, humanitarian, and economic challenges of our aging societies.</span></b></b></p><span data-dcnode-id="4309" instrument_node="">
</span><p data-dcnode-id="4305"><b data-dcnode-id="4306"><b data-dcnode-id="4307"><span data-dcnode-id="4308" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4304" instrument_node="">
</span><p data-dcnode-id="4300"><b data-dcnode-id="4301"><b data-dcnode-id="4302"><span data-dcnode-id="4303" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4299" instrument_node="">
</span><p data-dcnode-id="4293"><b data-dcnode-id="4294"><b data-dcnode-id="4295"><strong data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">Bio:</span></strong><span data-dcnode-id="4296" instrument_node=""> Michael Beetz is a professor for Computer Science at the Faculty for Mathematics &amp; Informatics of the University Bremen and head of the Institute for Artificial Intelligence (IAI). He received his diploma degree in Computer Science with distinction from the University of Kaiserslautern. His MSc, MPhil, and PhD degrees were awarded by Yale University in 1993, 1994, and 1996, and his Venia Legendi from the University of Bonn in 2000. In February 2019 he received an Honorary Doctorate from Örebro University. He was vice-coordinator of the German cluster of excellence CoTeSys (Cognition for Technical Systems, 2006--2011), coordinator of the European FP7 integrating project RoboHow (web-enabled and experience-based cognitive robots that learn complex everyday manipulation tasks, 2012-2016), and is the coordinator of the German collaborative research centre EASE (Everyday Activity Science and Engineering, since 2017). His research interests include plan-based control of robotic agents, knowledge processing and representation for robots, integrated robot learning, and cognition-enabled perception.</span></b></b></p><span data-dcnode-id="4292" instrument_node="">
</span><p data-dcnode-id="4288"><b data-dcnode-id="4289"><b data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4287" instrument_node="">
</span></blockquote><span data-dcnode-id="4285" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4281" wrap=""><b data-dcnode-id="4282"><b data-dcnode-id="4283"><span data-dcnode-id="4284" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4280" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4259" wrap=""><b data-dcnode-id="4260"><b data-dcnode-id="4261"><span data-dcnode-id="4279" instrument_node="">May 10, </span><a data-dcnode-id="4277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lucacarlone.mit.edu/"><span data-dcnode-id="4278" instrument_node="">Luca Carlone</span></a><span data-dcnode-id="4276" instrument_node="">, MIT</span><strong data-dcnode-id="4273"><em data-dcnode-id="4274"><span data-dcnode-id="4275" instrument_node=""> </span></em></strong><em data-dcnode-id="4268"><strong data-dcnode-id="4269"><font data-dcnode-id="4270" size="2"><span data-dcnode-id="4271" style="font-size:10pt;"><span data-dcnode-id="4272" instrument_node="">Certifiably-Robust Spatial Perception for Robots and Autonomous Vehicles </span></span></font></strong></em><font data-dcnode-id="4262" size="2"><span data-dcnode-id="4263" style="font-size:10pt;"><span data-dcnode-id="4267" instrument_node="">(</span><a data-dcnode-id="4265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D2bIC4Gu8Rtw"><span data-dcnode-id="4266" instrument_node="">video</span></a><span data-dcnode-id="4264" instrument_node="">)</span></span></font></b></b></p><span data-dcnode-id="4258" instrument_node="">
</span><blockquote data-dcnode-id="4220"><p class="moz-quote-pre" data-dcnode-id="4250" wrap=""><b data-dcnode-id="4251"><b data-dcnode-id="4252"><font data-dcnode-id="4255" size="2"><span data-dcnode-id="4256" style="font-size:10pt;"><span data-dcnode-id="4257" instrument_node="">Spatial perception is concerned with the estimation of a world model --that describes the state of the robot and the environment-- using sensor data and prior knowledge. As such, it includes a broad set of robotics and computer vision problems, ranging from object detection and pose estimation to robot localization and mapping. Most perception algorithms require extensive and application-dependent parameter tuning and often fail in off-nominal conditions (e.g., in the presence of large noise and outliers). While many applications can afford occasional failures (e.g., AR/VR, domestic robotics) or can structure the environment to simplify perception (e.g., industrial robotics), safety-critical applications of robotics in the wild, ranging from self-driving vehicles to search &amp; rescue, demand a new generation of algorithms.</span></span></font><br data-dcnode-id="4254"><span data-dcnode-id="4253" instrument_node="">
&nbsp;</span></b></b></p><span data-dcnode-id="4249" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4242" wrap=""><span data-dcnode-id="4248" instrument_node="">
</span><b data-dcnode-id="4243"><b data-dcnode-id="4244"><font data-dcnode-id="4245" size="2"><span data-dcnode-id="4246" style="font-size:10pt;"><span data-dcnode-id="4247" instrument_node="">In this talk I present recent advances in the design of spatial perception algorithms that are robust to extreme amounts of outliers and afford performance guarantees. I first provide a negative result, showing that a general formulation of outlier rejection is inapproximable: in the worst case, it is impossible to design an algorithm (even “slightly slower” than polynomial time) that approximately finds the set of outliers. While it is impossible to guarantee that an algorithm will reject outliers in worst-case scenarios, our second contribution is to develop certifiably-robust spatial perception algorithms, that are able to assess their performance in every given problem instance. We consider two popular spatial perception problems: Simultaneous Localization And Mapping and 3D registration, and present efficient algorithms that are certifiably-robust to extreme amounts of outliers. As a result, we can solve registration problems where 99% of the measurements are outliers and succeed in localizing objects where an average human would fail.</span></span></font></b></b></p><span data-dcnode-id="4241" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4237" wrap=""><b data-dcnode-id="4238"><b data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4236" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4227" wrap=""><span data-dcnode-id="4235" instrument_node="">
</span><b data-dcnode-id="4228"><b data-dcnode-id="4229"><strong data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">Bio: </span></strong><font data-dcnode-id="4230" size="2"><span data-dcnode-id="4231" style="font-size:10pt;"><span data-dcnode-id="4232" instrument_node="">Luca Carlone is the Charles Stark Draper Assistant Professor in the Department of Aeronautics and Astronautics at the Massachusetts Institute of Technology, and a Principal Investigator in the Laboratory for Information &amp; Decision Systems (LIDS). He received his PhD from the Polytechnic University of Turin in 2012. He joined LIDS as a postdoctoral associate (2015) and later as a Research Scientist (2016), after spending two years as a postdoctoral fellow at the Georgia Institute of Technology (2013-2015). His research interests include nonlinear estimation, numerical and distributed optimization, and probabilistic inference, applied to sensing, perception, and decision-making in single and multi-robot systems. He is a recipient of the 2017 Transactions on Robotics King-Sun Fu Memorial Best Paper Award, and the best paper award at WAFR 2016.</span></span></font></b></b></p><span data-dcnode-id="4226" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4222" wrap=""><b data-dcnode-id="4223"><b data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4221" instrument_node="">
</span></blockquote><span data-dcnode-id="4219" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4205" wrap=""><b data-dcnode-id="4206"><b data-dcnode-id="4207"><span data-dcnode-id="4218" instrument_node="">May 3, </span><a data-dcnode-id="4216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.media.mit.edu/people/haewon/overview/"><span data-dcnode-id="4217" instrument_node="">Hae Won Park</span></a><span data-dcnode-id="4215" instrument_node="">, MIT</span><strong data-dcnode-id="4212"><em data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node=""> Socio-Emotive Intelligence for Long-term Robot Companions: Why and How? </span></em></strong><span data-dcnode-id="4211" instrument_node="">(</span><a data-dcnode-id="4209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DXIQMfQteQZI"><span data-dcnode-id="4210" instrument_node="">video</span></a><span data-dcnode-id="4208" instrument_node="">)</span></b></b></p><span data-dcnode-id="4204" instrument_node="">
</span><blockquote data-dcnode-id="4181"><p class="moz-quote-pre" data-dcnode-id="4200" wrap=""><b data-dcnode-id="4201"><b data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">In this talk, I’d like to engage the Robotics @ MIT community to question whether robots need socio-emotive intelligence. To answer this question though, we need to first think about a new dimension of evaluating AI algorithms and systems that we build - measuring their impact on people’s lives in the real-world contexts. I will highlight a number of provocative research findings from our recent long-term deployment of social robots in schools, homes, and older adult living communities. We employ an affective reinforcement learning approach to personalize robot’s actions to modulate each user’s engagement and maximize the interaction benefit. The robot observes users’ verbal and nonverbal affective cues to understand the user state and to receive feedback on its actions. Our results show that the interaction with a robot companion influences users’ beliefs, learning, and how they interact with others. The affective personalization boosts these effects and helps sustain long-term engagement. During our deployment studies, we observed that people treat and interact with artificial agents as social partners and catalysts. We also learned that the effect of the interaction strongly correlates to the social relational bonding the user has built with the robot. So, to answer the question “does a robot need socio-emotive intelligence,” I argue that we should only draw conclusions based on what impact it has on the people living with it - is it helping us flourish in the direction that we want to thrive?</span></b></b></p><span data-dcnode-id="4199" instrument_node="">
</span><p data-dcnode-id="4195"><b data-dcnode-id="4196"><b data-dcnode-id="4197"><span data-dcnode-id="4198" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4194" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4188" wrap=""><b data-dcnode-id="4189"><b data-dcnode-id="4190"><strong data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">Bio: </span></strong><span data-dcnode-id="4191" instrument_node="">Hae Won Park is a Research Scientist at MIT Media Lab and a Principal Investigator of the Social Robot Companions Program. Her research focuses on socio-emotive AI and personalization of social robots that support long-term interaction and relationship between users and their robot companions. Her work spans a range of applications including education for young children and wellbeing benefits for older adults. Her research has been published at top robotics and AI venues and has received awards for best paper (HRI 2017), innovative robot applications (ICRA 2013), and pecha-kucha presentation (ICRA 2014). Hae Won received her PhD from Georgia Tech in 2014, at which time she also co-founded Zyrobotics, an assistive education robotics startup that was recognized as the best 2015 US robotics startup by Robohub and was the finalist of the Intel Innovation Award.</span></b></b></p><span data-dcnode-id="4187" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4183" wrap=""><b data-dcnode-id="4184"><b data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4182" instrument_node="">
</span></blockquote><span data-dcnode-id="4180" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4165" wrap=""><b data-dcnode-id="4166"><b data-dcnode-id="4167"><span data-dcnode-id="4179" instrument_node="">April 26,&nbsp; </span><a data-dcnode-id="4177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//homepages.inf.ed.ac.uk/svijayak/"><span data-dcnode-id="4178" instrument_node="">Sethu Vijayakumar</span></a><span data-dcnode-id="4176" instrument_node="">, University of Edinburgh </span><strong data-dcnode-id="4172"><em data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node="">Shared Autonomy for Robots in Dynamic Environments: Advances in Learning Control and Representations</span></em><span data-dcnode-id="4173" instrument_node=""> </span></strong><span data-dcnode-id="4171" instrument_node="">(</span><a data-dcnode-id="4169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DSqMDtJXMRuc"><span data-dcnode-id="4170" instrument_node="">video</span></a><span data-dcnode-id="4168" instrument_node="">)</span></b></b></p><span data-dcnode-id="4164" instrument_node="">
</span><blockquote data-dcnode-id="4126"><p class="moz-quote-pre" data-dcnode-id="4160" wrap=""><b data-dcnode-id="4161"><b data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node="">The next generation of robots are going to work much more closely with humans, other robots and interact significantly with the environment around it. As a result, the key paradigms are shifting from isolated decision making systems to one that involves shared control -- with significant autonomy devolved to the robot platform; and end-users in the loop making only high level decisions.</span></b></b></p><span data-dcnode-id="4159" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4155" wrap=""><b data-dcnode-id="4156"><b data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4154" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4150" wrap=""><b data-dcnode-id="4151"><b data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">This talk will briefly introduce powerful machine learning technologies ranging from robust multi-modal sensing, shared representations, scalable real-time learning and adaptation and compliant actuation that are enabling us to reap the benefits of increased autonomy while still feeling securely in control. This also raises some fundamental questions: while the robots are ready to share control, what is the optimal trade-off between autonomy and control that we are comfortable with?</span></b></b></p><span data-dcnode-id="4149" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4145" wrap=""><b data-dcnode-id="4146"><b data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4144" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4140" wrap=""><b data-dcnode-id="4141"><b data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">Domains where this debate is relevant include unmanned space exploration, self-driving cars, offshore asset inspection &amp; maintenance, deep sea &amp; autonomous mining, shared manufacturing, exoskeletons/prosthetics for rehabilitation as well as smart cities to list a few.</span></b></b></p><span data-dcnode-id="4139" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4135" wrap=""><b data-dcnode-id="4136"><b data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4134" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4128" wrap=""><b data-dcnode-id="4129"><b data-dcnode-id="4130"><strong data-dcnode-id="4132"><span data-dcnode-id="4133" instrument_node="">Bio:</span></strong><span data-dcnode-id="4131" instrument_node=""> Sethu Vijayakumar is the Professor of Robotics in the School of Informatics at the University of Edinburgh and the Director of the Edinburgh Centre for Robotics. He holds the prestigious Senior Research Fellowship of the Royal Academy of Engineering, co-funded by Microsoft Research and is also an Adjunct Faculty of the University of Southern California (USC), Los Angeles. Professor Vijayakumar, who has a PhD (1998) from the Tokyo Institute of Technology, is world renowned for development of large scale machine learning techniques in the real time control of several iconic large degree of freedom anthropomorphic robotic systems including the SARCOS and the HONDA ASIMO humanoid robots, KUKA-DLR robot arm and iLIMB prosthetic hand. His latest project (2016) involves a collaboration with NASA Johnson Space Centre on the Valkyrie humanoid robot being prepared for unmanned robotic pre-deployment missions to Mars. He is the author of over 180 highly cited publications in robotics and machine learning and the winner of the IEEE Vincent Bendix award, the Japanese Monbusho fellowship, 2013 IEEE Transaction on Robotics Best Paper Award and several other paper awards from leading conferences and journals. He has led several UK, EU and international projects in the field of Robotics, attracted funding of over £38M in research grants over the last 8 years and has been appointed to grant review panels for the DFG-Germany, NSF-USA and the EU. He is a Fellow of the Royal Society of Edinburgh and a keen science communicator with a significant annual outreach agenda. He is the recipient of the 2015 Tam Dalyell Award for excellence in engaging the public with science and serves as a judge on BBC Robot Wars and was involved with the UK wide launch of the BBC micro:bit initiative for STEM education. Since September 2018, he has taken on the role of the Programme co-Director of The Alan Turing Institute, the UK’s national institute for data science and artificial intelligence, driving their Robotics and Autonomous Systems agenda.</span></b></b></p><span data-dcnode-id="4127" instrument_node="">
</span></blockquote><span data-dcnode-id="4125" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4121" wrap=""><b data-dcnode-id="4122"><b data-dcnode-id="4123"><span data-dcnode-id="4124" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4120" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4106" wrap=""><b data-dcnode-id="4107"><b data-dcnode-id="4108"><span data-dcnode-id="4119" instrument_node="">April 19, </span><a data-dcnode-id="4117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cs.cornell.edu/~rak/"><span data-dcnode-id="4118" instrument_node="">Ross Knepper</span></a><span data-dcnode-id="4116" instrument_node="">, Cornell University </span><strong data-dcnode-id="4113"><em data-dcnode-id="4114"><span data-dcnode-id="4115" instrument_node="">Formalizing Teamwork in Human-Robot Interaction </span></em></strong><span data-dcnode-id="4112" instrument_node="">(</span><a data-dcnode-id="4110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dv5X19fkTDFs"><span data-dcnode-id="4111" instrument_node="">video</span></a><span data-dcnode-id="4109" instrument_node="">)</span></b></b></p><span data-dcnode-id="4105" instrument_node="">
</span><blockquote data-dcnode-id="4072"><p class="moz-quote-pre" data-dcnode-id="4101" wrap=""><b data-dcnode-id="4102"><b data-dcnode-id="4103"><span data-dcnode-id="4104" instrument_node="">Robots out in the world today work for people but not with people. Before robots can work closely with ordinary people as part of a human-robot team in a home or office setting, robots need the ability to acquire a new mix of functional and social skills. Working with people requires a shared understanding of the task, capabilities, intentions, and background knowledge. For robots to act jointly as part of a team with people, they must engage in collaborative planning, which involves forming a consensus through an exchange of information about goals, capabilities, and partial plans. Often, much of this information is conveyed through implicit communication.</span></b></b></p><span data-dcnode-id="4100" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4096" wrap=""><b data-dcnode-id="4097"><b data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4095" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4091" wrap=""><b data-dcnode-id="4092"><b data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">In this talk, I formalize components of teamwork involving collaboration, communication, and representation. I illustrate how these concepts interact in the application of social navigation, which I argue is a first-class example of teamwork. In this setting, participants must avoid collision by legibly conveying intended passing sides via nonverbal cues like path shape. A topological representation using the braid groups enables the robot to reason about a small enumerable set of passing outcomes. I show how implicit communication of topological group plans achieves rapid convergence to a group consensus, and how a robot in the group can deliberately influence the ultimate outcome to maximize joint performance, yielding pedestrian comfort with the robot.</span></b></b></p><span data-dcnode-id="4090" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4086" wrap=""><b data-dcnode-id="4087"><b data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4085" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4079" wrap=""><b data-dcnode-id="4080"><b data-dcnode-id="4081"><strong data-dcnode-id="4083"><span data-dcnode-id="4084" instrument_node="">Bio:</span></strong><span data-dcnode-id="4082" instrument_node=""> Ross A. Knepper is an Assistant Professor in the Department of Computer Science at Cornell University, where he directs the Robotic Personal Assistants Lab. His research focuses on the theory and algorithms of human-robot interaction in collaborative work. He builds systems to perform complex tasks where partnering a human and robot together is advantageous for both, such as factory assembly or home chores. Knepper has built robot systems that can assemble Ikea furniture, ask for help when something goes wrong, interpret informal speech and gesture commands, and navigate in a socially-competent manner among people. Before Cornell, Knepper was a Research Scientist at MIT. He received his Ph.D. in Robotics from Carnegie Mellon University in 2011.</span></b></b></p><span data-dcnode-id="4078" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4074" wrap=""><b data-dcnode-id="4075"><b data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4073" instrument_node="">
</span></blockquote><span data-dcnode-id="4071" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4054" wrap=""><b data-dcnode-id="4055"><b data-dcnode-id="4056"><span data-dcnode-id="4070" instrument_node="">April 12, </span><a data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.schoellig.name/"><span data-dcnode-id="4069" instrument_node="">Angela Schoellig</span></a><span data-dcnode-id="4067" instrument_node="">, University of Toronto</span><em data-dcnode-id="4064"><strong data-dcnode-id="4065"><span data-dcnode-id="4066" instrument_node=""> </span></strong></em><em data-dcnode-id="4061"><strong data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">Machine Learning for Robotics: Safety and Performance Guarantees for Learning-Based Control </span></strong></em><span data-dcnode-id="4060" instrument_node="">(</span><a data-dcnode-id="4058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DPxQUbMm_22E"><span data-dcnode-id="4059" instrument_node="">video</span></a><span data-dcnode-id="4057" instrument_node="">)</span></b></b></p><span data-dcnode-id="4053" instrument_node="">
</span><blockquote data-dcnode-id="4027"><p class="moz-quote-pre" data-dcnode-id="4049" wrap=""><b data-dcnode-id="4050"><b data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">The ultimate promise of robotics is to design devices that can physically interact with the world. To date, robots have been primarily deployed in highly structured and predictable environments. However, we envision the next generation of robots (ranging from self-driving and -flying vehicles to robot assistants) to operate in unpredictable and generally unknown environments alongside humans. This challenges current robot algorithms, which have been largely based on a-priori knowledge about the system and its environment. While research has shown that robots are able to learn new skills from experience and adapt to unknown situations, these results have been limited to learning single tasks, and demonstrated in simulation or lab settings. The next challenge is to enable robot learning in real-world application scenarios. This will require versatile, data-efficient and online learning algorithms that guarantee safety when placed in a closed-loop system architecture. It will also require to answer the fundamental question of how to design learning architectures for dynamic and interactive agents. This talk will highlight our recent progress in combining learning methods with formal results from control theory. By combining models with data, our algorithms&nbsp; achieve adaptation to changing conditions during long-term operation, data-efficient multi-robot, multi-task transfer learning, and safe reinforcement learning. We demonstrate our algorithms in vision-based off-road driving and drone flight experiments, as well as on mobile manipulators.</span></b></b></p><span data-dcnode-id="4048" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4044" wrap=""><b data-dcnode-id="4045"><b data-dcnode-id="4046"><span data-dcnode-id="4047" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4043" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4034" wrap=""><b data-dcnode-id="4035"><b data-dcnode-id="4036"><strong data-dcnode-id="4041"><span data-dcnode-id="4042" instrument_node="">Bio: </span></strong><span data-dcnode-id="4040" instrument_node="">Angela Schoellig is an Assistant Professor at the University of Toronto Institute for Aerospace Studies and an Associate Director of the Centre for Aerial Robotics Research and Education. She holds a Canada Research Chair in Machine Learning for Robotics and Control, is a principal investigator of the NSERC Canadian Robotics Network, and is a Faculty Affiliate of the Vector Institute for Artificial Intelligence. She conducts research at the intersection of robotics, controls, and machine learning. Her goal is to enhance the performance, safety, and autonomy of robots by enabling them to learn from past experiments and from each other. She is a recipient of a Sloan Research Fellowship (2017), an Ontario Early Researcher Award (2017), and a Connaught New Researcher Award (2015). She is one of MIT Technology Review’s Innovators Under 35 (2017), a Canada Science Leadership Program Fellow (2014), and one of Robohub’s “25 women in robotics you need to know about (2013)”. Her team won the 2018 North-American SAE AutoDrive Challenge sponsored by General Motors. Her PhD at ETH Zurich (2013) was awarded the ETH Medal and the Dimitris N. Chorafas Foundation Award. She holds both an M.Sc. in Engineering Cybernetics from the University of Stuttgart (2008) and an M.Sc. in Engineering Science and Mechanics from the Georgia Institute of Technology (2007). More information can be found at:</span><a class="moz-txt-link-abbreviated" data-dcnode-id="4038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.schoellig.name/"><span data-dcnode-id="4039" instrument_node=""> www.schoellig.name</span></a><span data-dcnode-id="4037" instrument_node="">.</span></b></b></p><span data-dcnode-id="4033" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4029" wrap=""><b data-dcnode-id="4030"><b data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4028" instrument_node="">
</span></blockquote><span data-dcnode-id="4026" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4012" wrap=""><b data-dcnode-id="4013"><b data-dcnode-id="4014"><span data-dcnode-id="4025" instrument_node="">April 5, </span><a data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cs.cmu.edu/~mason/"><span data-dcnode-id="4024" instrument_node="">Matthew Mason</span></a><span data-dcnode-id="4022" instrument_node="">, Carnegie Mellon University / Berkshire Grey </span><em data-dcnode-id="4019"><strong data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">Models of Robotic Manipulation </span></strong></em><span data-dcnode-id="4018" instrument_node="">(</span><a data-dcnode-id="4016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DLfWiBdOc2FI"><span data-dcnode-id="4017" instrument_node="">video</span></a><span data-dcnode-id="4015" instrument_node="">)</span></b></b></p><span data-dcnode-id="4011" instrument_node="">
</span><blockquote data-dcnode-id="3968"><p class="moz-quote-pre" data-dcnode-id="4007" wrap=""><b data-dcnode-id="4008"><b data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">Some of my earliest work focused on robot grasping: on decomposing the grasping process into phases, examining the contacts and motions occurring in each phase, and developing conditions under which a stable grasp might be obtained while addressing initial pose uncertainty. That was the start of my interest in the physics of manipulation, which has continued until now. The early work was inspired partly by robot programming experiences, especially applications in manufacturing automation. It is possible that materials handling is going to play a similar role, as the primary application of research in autonomous manipulation, changing our perceptions of the challenges and opportunities our field.</span></b></b></p><span data-dcnode-id="4006" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="4002" wrap=""><b data-dcnode-id="4003"><b data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="4001" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3995" wrap=""><b data-dcnode-id="3996"><b data-dcnode-id="3997"><strong data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">Bio:</span></strong><span data-dcnode-id="3998" instrument_node=""> Matt Mason earned his PhD in Computer Science and Artificial Intelligence from MIT in 1982. He has worked in robotics for over forty years. For most of that time Matt has been a Professor of Robotics and Computer Science at Carnegie Mellon University (CMU). He was Director of the Robotics Institute from 2004 to 2014.</span></b></b></p><span data-dcnode-id="3994" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3990" wrap=""><b data-dcnode-id="3991"><b data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3989" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3985" wrap=""><b data-dcnode-id="3986"><b data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">Since 2014, Matt has split his time between CMU and Berkshire Grey, where he is the Chief Scientist. Berkshire Grey is a Boston-based company that produces innovative materials-handling solutions for eCommerce and logistics.</span></b></b></p><span data-dcnode-id="3984" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3980" wrap=""><b data-dcnode-id="3981"><b data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3979" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3975" wrap=""><b data-dcnode-id="3976"><b data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">Matt is a Fellow of the AAAI and the IEEE. He won the IEEE R&amp;A Pioneer Award, and the IEEE Technical Field Award in Robotics and Automation.</span></b></b></p><span data-dcnode-id="3974" instrument_node="">
</span><p data-dcnode-id="3970"><b data-dcnode-id="3971"><b data-dcnode-id="3972"><span data-dcnode-id="3973" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3969" instrument_node="">
</span></blockquote><span data-dcnode-id="3967" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3953" wrap=""><b data-dcnode-id="3954"><b data-dcnode-id="3955"><span data-dcnode-id="3966" instrument_node="">March 22, </span><a data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www-personal.umich.edu/~dpanagou/research/index.html"><span data-dcnode-id="3965" instrument_node="">Dimitra Panagou</span></a><span data-dcnode-id="3963" instrument_node="">, University of Michigan </span><em data-dcnode-id="3960"><strong data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">Safety and Resilience in Multi-Agent Systems: Theory and Algorithms for Adversarially-Robust Multi-Robot Teams and Human-Robot Collaboration</span></strong></em><span data-dcnode-id="3959" instrument_node=""> (</span><a data-dcnode-id="3957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DHgUKVBBaXW8"><span data-dcnode-id="3958" instrument_node="">video</span></a><span data-dcnode-id="3956" instrument_node="">)</span></b></b></p><span data-dcnode-id="3952" instrument_node="">
</span><blockquote data-dcnode-id="3922"><p data-dcnode-id="3948"><b data-dcnode-id="3949"><b data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">Planning, decision-making and control for uncertain multi-agent systems has been a popular topic of research with numerous applications, e.g., in robotic networks operating in dynamic, unknown, or even adversarial environments, within or without the presence of humans. Despite significant progress over the years, challenges such as constraints (in terms of state and time specifications), malicious or faulty information, environmental uncertainty and scalability are typically not treated well enough with existing methods. In the first part of this talk, I will present some of our recent results and ongoing work on safety and resilience of multi-agent systems in the presence of adversaries. I will discuss (i) our approach on achieving safe, resilient consensus in the presence of malicious information and its application to resilient leader-follower robot teams under bounded inputs, and (ii) our method on safe multi-agent motion planning and de-confliction using finite-time controllers and estimators in the presence of bounded uncertainty. In the second part of the talk, I will present (iii) our results on human-robot collaboration that involve the unsupervised, on-the-fly learning of assistive information (camera views) by teams of co-robots in human multi-tasking environments.</span></b></b></p><span data-dcnode-id="3947" instrument_node="">
</span><p data-dcnode-id="3943"><b data-dcnode-id="3944"><b data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3942" instrument_node="">
</span><p data-dcnode-id="3936"><b data-dcnode-id="3937"><b data-dcnode-id="3938"><strong data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">Bio: </span></strong><span data-dcnode-id="3939" instrument_node="">Dimitra Panagou received the Diploma and PhD degrees in Mechanical Engineering from the National Technical University of Athens, Greece, in 2006 and 2012, respectively. Since September 2014 she has been an Assistant Professor with the Department of Aerospace Engineering, University of Michigan. Prior to joining the University of Michigan, she was a postdoctoral research associate with the Coordinated Science Laboratory, University of Illinois, Urbana-Champaign (2012-2014), a visiting research scholar with the GRASP Lab, University of Pennsylvania (June 2013, fall 2010) and a visiting research scholar with the University of Delaware, Mechanical Engineering Department (spring 2009).</span></b></b></p><span data-dcnode-id="3935" instrument_node="">
</span><p data-dcnode-id="3931"><b data-dcnode-id="3932"><b data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3930" instrument_node="">
</span><p data-dcnode-id="3924"><b data-dcnode-id="3925"><b data-dcnode-id="3926"><span data-dcnode-id="3929" instrument_node="">Dr. Panagou's research program emphasizes in the exploration, development, and implementation of control and estimation methods in order to address real-world problems via provably correct solutions. Her research spans the areas of nonlinear systems and control; control of multi-agent systems and networks; distributed systems and control; motion and path planning; switched and hybrid systems; constrained decision-making and control; navigation, guidance, and control of aerospace vehicles. She is particularly interested in the development of provably correct methods for the robustly safe and secure (resilient) operation of autonomous systems in complex missions, with applications in unmanned aerial systems, robot/sensor networks and multi-vehicle systems (ground, marine, aerial, space). Dr. Panagou is a recipient of a NASA Early Career Faculty Award, of an AFOSR Young Investigator Award, and a member of the IEEE and the AIAA. More details: </span><a data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www-personal.umich.edu/~dpanagou/research/index.html"><span data-dcnode-id="3928" instrument_node="">http://www-personal.umich.edu/~dpanagou/research/index.html</span></a></b></b></p><span data-dcnode-id="3923" instrument_node="">
</span></blockquote><span data-dcnode-id="3921" instrument_node="">
</span><p data-dcnode-id="3907"><b data-dcnode-id="3908"><b data-dcnode-id="3909"><span data-dcnode-id="3920" instrument_node="">March 8, </span><a data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//homes.cs.washington.edu/~fox/"><span data-dcnode-id="3919" instrument_node="">Dieter Fox</span></a><span data-dcnode-id="3917" instrument_node="">, University of Washington / NVIDIA </span><em data-dcnode-id="3914"><strong data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">Toward robust manipulation in complex scenarios </span></strong></em><span data-dcnode-id="3913" instrument_node="">(</span><a data-dcnode-id="3911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DIyje4BSOAxc"><span data-dcnode-id="3912" instrument_node="">video</span></a><span data-dcnode-id="3910" instrument_node="">)</span></b></b></p><span data-dcnode-id="3906" instrument_node="">
</span><blockquote data-dcnode-id="3890"><p data-dcnode-id="3902"><b data-dcnode-id="3903"><b data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">Over the last years, advances in deep learning and GPU based computing have enabled significant progress in several areas of robotics, including visual recognition, real-time tracking, object manipulation, and learning-based control. This progress has turned applications such as autonomous driving and delivery tasks in warehouses, hospitals, or hotels into realistic application scenarios. However, robust manipulation in complex settings is still an open research problem. Various research efforts show promising results on individual pieces of the manipulation puzzle, including manipulator control, touch sensing, object pose detection, task and motion planning, and object pickup. In this talk, I will present our recent efforts in integrating such components into a complete manipulation system. Specifically, I will describe a mobile robot manipulator that moves through a kitchen, can open and close cabinet doors and drawers, detect and pickup objects, and move these objects to desired locations. Our baseline system is designed to be applicable in a wide variety of environments, only relying on 3D articulated models of the kitchen and the relevant objects. I will discuss the design choices behind our approach, the lessons we learned so far, and various research directions toward enabling more robust and general manipulation systems.</span></b></b></p><span data-dcnode-id="3901" instrument_node="">
</span><p data-dcnode-id="3897"><b data-dcnode-id="3898"><b data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3896" instrument_node="">
</span><p data-dcnode-id="3892"><b data-dcnode-id="3893"><b data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">Bio: Dieter Fox is Senior Director of Robotics Research at NVIDIA. He is also a Professor in the Paul G. Allen School of Computer Science &amp; Engineering at the University of Washington, where he heads the UW Robotics and State Estimation Lab. Dieter obtained his Ph.D. from the University of Bonn, Germany. His research is in robotics and artificial intelligence, with a focus on state estimation and perception applied to problems such as mapping, object detection and tracking, manipulation, and activity recognition. He has published more than 200 technical papers and is the co-author of the textbook “Probabilistic Robotics”. He is a Fellow of the IEEE and the AAAI, and he received several best paper awards at major robotics, AI, and computer vision conferences. He was an editor of the IEEE Transactions on Robotics, program co-chair of the 2008 AAAI Conference on Artificial Intelligence, and program chair of the 2013 Robotics: Science and Systems conference.</span></b></b></p><span data-dcnode-id="3891" instrument_node="">
</span></blockquote><span data-dcnode-id="3889" instrument_node="">
</span><p data-dcnode-id="3885"><b data-dcnode-id="3886"><b data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3884" instrument_node="">
</span><p data-dcnode-id="3868"><b data-dcnode-id="3869"><b data-dcnode-id="3870"><strong data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">Fall 2018 Campus-wide Robotics Seminar</span></strong><strong data-dcnode-id="3871"><span data-dcnode-id="3881" instrument_node=""> (sponsored by </span><a data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aurora.aero/"><span data-dcnode-id="3880" instrument_node="">Aurora Flight Sciences</span></a><span data-dcnode-id="3878" instrument_node=""> , </span><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mathworks.com/"><span data-dcnode-id="3877" instrument_node="">The MathWorks</span></a><span data-dcnode-id="3875" instrument_node=""> , and the </span><a data-dcnode-id="3873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.russellsage.org/"><span data-dcnode-id="3874" instrument_node="">Russell Sage Foundation</span></a><span data-dcnode-id="3872" instrument_node=""> )</span></strong></b></b></p><span data-dcnode-id="3867" instrument_node="">
</span><p data-dcnode-id="3863"><b data-dcnode-id="3864"><b data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3862" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3845" wrap=""><b data-dcnode-id="3846"><b data-dcnode-id="3847"><span data-dcnode-id="3861" instrument_node="">December 4, </span><a data-dcnode-id="3859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nxr.northwestern.edu/people/kevin-lynch"><span data-dcnode-id="3860" instrument_node="">Kevin Lynch</span></a><span data-dcnode-id="3858" instrument_node="">, Northwestern University</span><em data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node=""> </span></em><strong data-dcnode-id="3852"><em data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">Motion Planning and Control for Robot and Human Manipulation</span></em><span data-dcnode-id="3853" instrument_node=""> </span></strong><span data-dcnode-id="3851" instrument_node="">(</span><a data-dcnode-id="3849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/1083"><span data-dcnode-id="3850" instrument_node="">video</span></a><span data-dcnode-id="3848" instrument_node="">)</span></b></b></p><span data-dcnode-id="3844" instrument_node="">
</span><blockquote data-dcnode-id="3797"><p class="moz-quote-pre" data-dcnode-id="3840" wrap=""><b data-dcnode-id="3841"><b data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">In this talk I will describe our progress on motion planning and control for two very different manipulation problems: (1) dexterous manipulation by robots and (2) control of arm neuroprosthetics for humans with spinal cord injuries.</span></b></b></p><span data-dcnode-id="3839" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3835" wrap=""><b data-dcnode-id="3836"><b data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3834" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3830" wrap=""><b data-dcnode-id="3831"><b data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">The first part of the talk will focus on manipulation modes commonly used by humans but mostly avoided by robots, such as rolling, sliding, pushing, pivoting, tapping, and in-hand manipulation. These manipulation modes exploit controlled motion of the object relative to the manipulator to increase dexterity.</span></b></b></p><span data-dcnode-id="3829" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3825" wrap=""><b data-dcnode-id="3826"><b data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3824" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3820" wrap=""><b data-dcnode-id="3821"><b data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">In the second part of the talk I will describe control of a functional electrical stimulation neuroprosthetic for the human arm. The goal of the project is to allow people with high spinal cord injury to recover the use of their arms for activities of daily living. Beginning with traditional methods for system identification and control of robot arms, I will describe how we have adapted the approach to identification and control of an electrically stimulated human arm.</span></b></b></p><span data-dcnode-id="3819" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3815" wrap=""><b data-dcnode-id="3816"><b data-dcnode-id="3817"><span data-dcnode-id="3818" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3814" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3804" wrap=""><b data-dcnode-id="3805"><b data-dcnode-id="3806"><span data-dcnode-id="3813" instrument_node="">Bio: Kevin Lynch is Professor and Chair of the Mechanical Engineering Department at Northwestern University. He is a member of the Neuroscience and Robotics Lab (nxr.northwestern.edu) and the Northwestern Institute on Complex Systems (nico.northwestern.edu). His research focuses on dynamics, motion planning, and control for robot manipulation and locomotion; self-organizing multi-agent systems; and functional electrical stimulation for restoration of human function. Dr. Lynch is Editor-in-Chief of the IEEE Transactions on Robotics. He is co-author of the textbooks "Modern Robotics: Mechanics, Planning, and Control" (Cambridge University Press, 2017, </span><a class="moz-txt-link-freetext" data-dcnode-id="3811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//modernrobotics.org/"><span data-dcnode-id="3812" instrument_node="">http://modernrobotics.org</span></a><span data-dcnode-id="3810" instrument_node="">), "Embedded Computing and Mechatronics" (Elsevier, 2015, </span><a class="moz-txt-link-freetext" data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//nu32.org/"><span data-dcnode-id="3809" instrument_node="">http://nu32.org</span></a><span data-dcnode-id="3807" instrument_node="">), and "Principles of Robot Motion" (MIT Press, 2005). He is the recipient of Northwestern's Professorship of Teaching Excellence and the Northwestern Teacher of the Year award in engineering. He earned a BSE in electrical engineering from Princeton University and a PhD in robotics from Carnegie Mellon University.</span></b></b></p><span data-dcnode-id="3803" instrument_node="">
</span><p class="moz-quote-pre" data-dcnode-id="3799" wrap=""><b data-dcnode-id="3800"><b data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3798" instrument_node="">
</span></blockquote><span data-dcnode-id="3796" instrument_node="">
</span><p data-dcnode-id="3782" wrap=""><b data-dcnode-id="3783"><b data-dcnode-id="3784"><span data-dcnode-id="3795" instrument_node="">November 27, </span><a data-dcnode-id="3793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.colorado.edu/mechanical/christoph-keplinger"><span data-dcnode-id="3794" instrument_node="">Christoph Keplinger</span></a><span data-dcnode-id="3792" instrument_node="">, University of Colorado </span><em data-dcnode-id="3789"><strong data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">HASEL Artificial Muscles—Versatile High-Performance Actuators for a New Generation of Life-like Robots</span></strong></em><span data-dcnode-id="3788" instrument_node=""> (</span><a data-dcnode-id="3786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/1067"><span data-dcnode-id="3787" instrument_node="">video</span></a><span data-dcnode-id="3785" instrument_node="">, CSAIL only)</span></b></b></p><span data-dcnode-id="3781" instrument_node="">
</span><blockquote data-dcnode-id="3748"><p data-dcnode-id="3777" wrap=""><b data-dcnode-id="3778"><b data-dcnode-id="3779"><span data-dcnode-id="3780" instrument_node="">Robots today rely on rigid components and electric motors based on metal and magnets, making them heavy, unsafe near humans, expensive and ill-suited for unpredictable environments. Nature, in contrast, makes extensive use of soft materials and has produced organisms that drastically outperform robots in terms of agility, dexterity, and adaptability. The Keplinger Lab aims to fundamentally challenge current limitations of robotic hardware, using an interdisciplinary approach that synergizes concepts from soft matter physics and chemistry with advanced engineering technologies to introduce intelligent materials systems for a new generation of life-like robots. One major theme of research is the development of new classes of actuators – a key component of all robotic systems – that replicate the sweeping success of biological muscle, a masterpiece of evolution featuring astonishing all-around actuation performance, the ability to self-heal after damage, and seamless integration with sensing.</span></b></b></p><span data-dcnode-id="3776" instrument_node="">
</span><p data-dcnode-id="3772" wrap=""><b data-dcnode-id="3773"><b data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3771" instrument_node="">
</span><p data-dcnode-id="3767" wrap=""><b data-dcnode-id="3768"><b data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">This talk is focused on the labs' recently introduced HASEL artificial muscle technology. Hydraulically Amplified Self-healing ELectrostatic (HASEL) transducers are a new class of self-sensing, high-performance muscle-mimetic actuators, which are electrically driven and harness a mechanism that couples electrostatic and hydraulic forces to achieve a wide variety of actuation modes. Current designs of HASEL are capable of exceeding actuation stress of 0.3 MPa, linear strain of 100%, specific power of 600W/kg, full-cycle electromechanical efficiency of 30% and bandwidth of over 100Hz; all these metrics match or exceed the capabilities of biological muscle. Additionally, HASEL actuators can repeatedly and autonomously self-heal after electric breakdown, thereby enabling robust performance. Further, this talk introduces a facile fabrication technique that uses an inexpensive CNC heat sealing device to rapidly prototype HASELs. New designs of HASEL incorporate mechanisms to greatly reduce operating voltages, enabling the use of lightweight and portable electronics packages to drive untethered soft robotic devices powered by HASELs. Modeling results predict the impact of material parameters and scaling laws of these actuators, laying out a roadmap towards future HASEL actuators with drastically improved performance. These results highlight opportunities to further develop HASEL artificial muscles for wide use in next-generation robots that replicate the vast capabilities of biological systems.</span></b></b></p><span data-dcnode-id="3766" instrument_node="">
</span><p data-dcnode-id="3762" wrap=""><b data-dcnode-id="3763"><b data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3761" instrument_node="">
</span><p data-dcnode-id="3755" wrap=""><b data-dcnode-id="3756"><b data-dcnode-id="3757"><strong data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">Bio:</span></strong><span data-dcnode-id="3758" instrument_node=""> Christoph Keplinger is an Assistant Professor of Mechanical Engineering and a Fellow of the Materials Science and Engineering Program at the University of Colorado Boulder, where he also holds an endowed appointment serving as Mollenkopf Faculty Fellow. Building upon his background in soft matter physics (PhD, JKU Linz), mechanics and chemistry (Postdoc, Harvard University), he leads a highly interdisciplinary research group at Boulder, with a current focus on (I) soft, muscle-mimetic actuators and sensors, (II) energy harvesting and (III) functional polymers. His work has been published in top journals including Science, Science Robotics, PNAS, Advanced Materials and Nature Chemistry, as well as highlighted in popular outlets such as National Geographic. He has received prestigious US awards such as a 2017 Packard Fellowship for Science and Engineering, and international awards such as the 2013 EAPromising European Researcher Award from the European Scientific Network for Artificial Muscles. He is the principal inventor of HASEL artificial muscles, a new technology that will help enable a next generation of life-like robotic hardware; in 2018 he co-founded Artimus Robotics to commercialize the HASEL technology.</span></b></b></p><span data-dcnode-id="3754" instrument_node="">
</span><p data-dcnode-id="3750" wrap=""><b data-dcnode-id="3751"><b data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3749" instrument_node="">
</span></blockquote><span data-dcnode-id="3747" instrument_node="">
</span><p data-dcnode-id="3733" wrap=""><b data-dcnode-id="3734"><b data-dcnode-id="3735"><span data-dcnode-id="3746" instrument_node="">November 20, </span><a data-dcnode-id="3744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//juliemwalker.wixsite.com/home"><span data-dcnode-id="3745" instrument_node="">Julie Walker</span></a><span data-dcnode-id="3743" instrument_node="">, Stanford University </span><em data-dcnode-id="3740"><strong data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">Handheld Kinesthetic Devices and Reinforcement Learning for Haptic Guidance</span></strong></em><span data-dcnode-id="3739" instrument_node=""> (</span><a data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/1060"><span data-dcnode-id="3738" instrument_node="">video</span></a><span data-dcnode-id="3736" instrument_node="">)</span></b></b></p><span data-dcnode-id="3732" instrument_node="">
</span><blockquote data-dcnode-id="3709"><p data-dcnode-id="3728" wrap=""><b data-dcnode-id="3729"><b data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">Screens, headphones, and now virtual and augmented reality headsets can provide people with instructions and guidance through visual and auditory feedback. Yet those senses are often overloaded, motivating the display of information through the sense of touch. Haptic devices, which display forces, vibrations, or other touch cues to a user’s hands or body, can be private, intuitive, and leave the other senses free. In this talk, I will discuss several novel hand-held haptic devices that provide clear, directional, kinesthetic cues while allowing the user to move through a large workspace. Using these devices, we study the anisotropies and variability in human touch perception and movement. Using modeling and reinforcement learning techniques, haptic devices can adapt to the user’s responses and provide effective guidance and intuitive touch interactions. These devices have applications in medical guidance and training, navigation, sports, and entertainment. Such holdable devices could enable haptic interfaces to become as prevalent and impactful in our daily lives as visual or audio interfaces.</span></b></b></p><span data-dcnode-id="3727" instrument_node="">
</span><p data-dcnode-id="3723" wrap=""><b data-dcnode-id="3724"><b data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3722" instrument_node="">
</span><p data-dcnode-id="3716" wrap=""><b data-dcnode-id="3717"><b data-dcnode-id="3718"><strong data-dcnode-id="3720"><span data-dcnode-id="3721" instrument_node="">Bio:</span></strong><span data-dcnode-id="3719" instrument_node=""> Julie Walker is a Ph.D. Candidate in Mechanical Engineering at Stanford University. She is a member of the Collaborative Haptics and Robotics in Medicine Lab, led by Professor Allison Okamura. She received a masters degree from Stanford University and a bachelors degree in Mechanical Engineering at Rice University. She has worked in haptics and human robot-interaction research since 2012, studying haptic feedback for prosthetic hands, robotic surgery, and teleoperation. Her Ph.D. thesis work focuses on haptic guidance through novel handheld devices, particularly for medical applications. She has received an NSF Graduate Research Fellowship and a Chateaubriand Fellowship.</span></b></b></p><span data-dcnode-id="3715" instrument_node="">
</span><p data-dcnode-id="3711"><b data-dcnode-id="3712"><b data-dcnode-id="3713"><span data-dcnode-id="3714" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3710" instrument_node="">
</span></blockquote><span data-dcnode-id="3708" instrument_node="">
</span><p data-dcnode-id="3696" wrap=""><b data-dcnode-id="3697"><b data-dcnode-id="3698"><span data-dcnode-id="3707" instrument_node="">November 13, Noah Jafferis, Harvard University </span><strong data-dcnode-id="3703"><em data-dcnode-id="3705"><span data-dcnode-id="3706" instrument_node="">Insect-scale mechanisms: from flying robots to piezoelectric fans</span></em><span data-dcnode-id="3704" instrument_node=""> </span></strong><span data-dcnode-id="3702" instrument_node="">(</span><a data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/1051"><span data-dcnode-id="3701" instrument_node="">video</span></a><span data-dcnode-id="3699" instrument_node=""> - CSAIL only)</span></b></b></p><span data-dcnode-id="3695" instrument_node="">
</span><blockquote data-dcnode-id="3657"><p data-dcnode-id="3691"><b data-dcnode-id="3692"><b data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">In recent years, there has been heightened interest in developing sub-gram hovering vehicles, in part for their predicted high maneuverability (based on the relative scaling of torques and inertias). In this regime, the efficiency of electromagnetic motors drops substantially, and piezoelectrics are generally the actuator of choice. These typically operate in an oscillatory mode, which is well matched with flapping wings. However, at such a small size, integrating on-board power and electronics is quite challenging (particularly given the high voltages required for piezoelectrics), and such vehicles have thus been limited to fly tethered to an off-board power supply and control system. In this talk, I will discuss recent advances in the Harvard Robobee to overcome these challenges, including non-linear resonance modeling, improved manufacturing, and multi-wing designs.</span></b></b></p><span data-dcnode-id="3690" instrument_node="">
</span><p data-dcnode-id="3686"><b data-dcnode-id="3687"><b data-dcnode-id="3688"><span data-dcnode-id="3689" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3685" instrument_node="">
</span><p data-dcnode-id="3681"><b data-dcnode-id="3682"><b data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">I will also discuss fabrication of an alternative mechanism for converting piezoelectric vibration to airflow. This is of interest as a low-profile fan for CPU cooling, a growing issue as electronic devices pack increasing power consumption (and thus heat) into smaller spaces. Additionally, a thruster based on this technology could achieve higher thrust-per-area and speed than flapping wings or propellers (at the expense of efficiency). Its extremely modular nature is also attractive in such an application.</span></b></b></p><span data-dcnode-id="3680" instrument_node="">
</span><p data-dcnode-id="3676"><b data-dcnode-id="3677"><b data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3675" instrument_node="">
</span><p data-dcnode-id="3671"><b data-dcnode-id="3672"><b data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">When we operate robots near resonance, particularly with very non-linear systems and/or multiple mechanically interacting actuators, control can be extremely challenging. In these scenarios, knowledge of the instantaneous deflections or velocities of each actuator is crucial. Toward this end, I will describe our work on monitoring the actuators’ current to obtain accurate velocity data regardless of external loading, without the need for any additional sensors.</span></b></b></p><span data-dcnode-id="3670" instrument_node="">
</span><p data-dcnode-id="3666"><b data-dcnode-id="3667"><b data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3665" instrument_node="">
</span><p data-dcnode-id="3659"><b data-dcnode-id="3660"><b data-dcnode-id="3661"><strong data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">Bio:</span></strong><span data-dcnode-id="3662" instrument_node=""> Noah T. Jafferis obtained his PhD in the Electrical Engineering Department at Princeton University in 2012, and is currently a Postdoctoral Research Associate in Harvard University's Microrobotics Lab. Noah was home-schooled until entering Yale University at the age of 16, where he received his B.S. in Electrical Engineering in 2005. At Princeton, Noah's research included printing silicon from nanoparticle suspensions and the development of a "flying carpet" (traveling wave based propulsion of a thin plastic sheet). His current research at Harvard includes nonlinear resonance modeling, scaling, and system optimization for flapping-wing vehicles; piezoelectric actuators and motors (manufacturing and modeling for optimal power density, efficiency, and lifetime); a fan/thruster using piezoelectrically actuated peristaltic pumping; solar power for autonomous operation of insect-scale robots; and self-sensing actuation. Some of his many research interests include micro/nano-robotics, bio-inspired engineering, 3D integrated circuits, MEMS/NEMS, piezoelectrics, 3D printing, energy harvesting, and large-area/flexible electronics.</span></b></b></p><span data-dcnode-id="3658" instrument_node="">
</span></blockquote><span data-dcnode-id="3656" instrument_node="">
</span><p data-dcnode-id="3652" wrap=""><b data-dcnode-id="3653"><b data-dcnode-id="3654"><span data-dcnode-id="3655" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3651" instrument_node="">
</span><p data-dcnode-id="3636" wrap=""><b data-dcnode-id="3637"><b data-dcnode-id="3638"><span data-dcnode-id="3650" instrument_node="">November 6, </span><a data-dcnode-id="3648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//people.csail.mit.edu/lpk/"><span data-dcnode-id="3649" instrument_node="">Leslie Kaelbling</span></a><span data-dcnode-id="3647" instrument_node="">, MIT </span><strong data-dcnode-id="3643"><em data-dcnode-id="3645"><span data-dcnode-id="3646" instrument_node="">Doing for our robots what evolution did for us</span></em><span data-dcnode-id="3644" instrument_node=""> </span></strong><span data-dcnode-id="3642" instrument_node="">(</span><a data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/1045"><span data-dcnode-id="3641" instrument_node="">video</span></a><span data-dcnode-id="3639" instrument_node="">)</span></b></b></p><span data-dcnode-id="3635" instrument_node="">
</span><blockquote data-dcnode-id="3607"><p data-dcnode-id="3631" wrap=""><b data-dcnode-id="3632"><b data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">We, as robot engineers, have to think hard about our role in the design of robots and how it interacts with learning, both in "the factory" (that is, at engineering time) and in "the wild" (that is, when the robot is delivered to a customer). I will share some general thoughts about the strategies for robot design and then talk in detail about some work I have been involved in, both in the design of an overall architecture for an intelligent robot and in strategies for learning to integrate new skills into the repertoire of an already competent robot.</span></b></b></p><span data-dcnode-id="3630" instrument_node="">
</span><p data-dcnode-id="3626" wrap=""><b data-dcnode-id="3627"><b data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3625" instrument_node="">
</span><p data-dcnode-id="3621" wrap=""><b data-dcnode-id="3622"><b data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">Joint work with: Tomas Lozano-Perez, Zi Wang, Caelan Garrett and a fearless group of summer robot students</span></b></b></p><span data-dcnode-id="3620" instrument_node="">
</span><p data-dcnode-id="3616" wrap=""><b data-dcnode-id="3617"><b data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3615" instrument_node="">
</span><p data-dcnode-id="3609" wrap=""><b data-dcnode-id="3610"><b data-dcnode-id="3611"><strong data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">Bio:</span></strong><span data-dcnode-id="3612" instrument_node=""> Leslie is a Professor at MIT. She has an undergraduate degree in Philosophy and a PhD in Computer Science from Stanford, and was previously on the faculty at Brown University. She was the founding editor-in-chief of the Journal of Machine Learning Research. Her research agenda is to make intelligent robots using methods including estimation, learning, planning, and reasoning. She is not a robot.</span></b></b></p><span data-dcnode-id="3608" instrument_node="">
</span></blockquote><span data-dcnode-id="3606" instrument_node="">
</span><p data-dcnode-id="3602" wrap=""><b data-dcnode-id="3603"><b data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="3601" instrument_node="">
