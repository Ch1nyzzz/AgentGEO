</span><b data-dcnode-id="2800"><b data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Robotic “swarms” comprising tens to thousands of robots have the potential to greatly reduce human workload and risk to human life. In many scenarios, the robots will lack global localization, prior data about the environment, and reliable communication, and they will be restricted to local sensing and signaling.&nbsp; We are developing a rigorous control and estimation framework for swarms that are subject to these constraints. This framework will enable swarms to operate largely autonomously, with user input consisting only of high-level directives. In this talk, I describe our work on various aspects of the framework, including scalable strategies for coverage, mapping, scalar field estimation, and cooperative manipulation. We use stochastic and deterministic models from chemical reaction network theory and fluid dynamics to describe the robots’ roles, state transitions, and motion at both the microscopic (individual) and macroscopic (population) levels. We also employ techniques from algebraic topology, nonlinear control theory, and optimization, and we model analogous behaviors in ant colonies to identify robot controllers that yield similarly robust performance. We are validating our framework on small mobile robots, called “Pheeno,” that we have designed to be low-cost, customizable platforms for multi-robot research and education.</span></b></b></p><span data-dcnode-id="2798" instrument_node="">
</span></blockquote><span data-dcnode-id="2796" instrument_node="">
</span><blockquote data-dcnode-id="2788"><p data-dcnode-id="2790" wrap=""><b data-dcnode-id="2791"><b data-dcnode-id="2792"><strong data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">Bio:</span></strong><span data-dcnode-id="2793" instrument_node=""> Spring Berman is an assistant professor of Mechanical and Aerospace Engineering at Arizona State University (ASU), where she directs the Autonomous Collective Systems (ACS) Laboratory. She received the B.S.E. degree in Mechanical and Aerospace Engineering from Princeton University in 2005 and the Ph.D. degree in Mechanical Engineering and Applied Mechanics from the University of Pennsylvania (GRASP Laboratory) in 2010. From 2010 to 2012, she was a postdoctoral researcher in Computer Science at Harvard University. Her research focuses on controlling swarms of resource-limited robots with stochastic behaviors to reliably perform collective tasks in realistic environments. She was a recipient of the 2014 DARPA Young Faculty Award and the 2016 ONR Young Investigator Award. She currently serves as the associate director of the newly established ASU Center for Human, Artificial Intelligence, and Robotic Teaming.</span></b></b></p><span data-dcnode-id="2789" instrument_node="">
</span></blockquote><span data-dcnode-id="2787" instrument_node="">
</span><p data-dcnode-id="2783" wrap=""><b data-dcnode-id="2784"><b data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2782" instrument_node="">
</span><p data-dcnode-id="2767" wrap=""><b data-dcnode-id="2768"><b data-dcnode-id="2769"><span data-dcnode-id="2781" instrument_node="">September 19, </span><span data-dcnode-id="2770" style="font-size: 13px;"><a data-dcnode-id="2779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ipvs.informatik.uni-stuttgart.de/mlr/marc/index.html/"><span data-dcnode-id="2780" instrument_node="">Marc Toussaint</span></a><span data-dcnode-id="2778" instrument_node="">, University of Stuttgart </span><strong data-dcnode-id="2775"><em data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Sufficient Symbols to Make Optimization-Based Manipulation Planning Tractable</span></em></strong><span data-dcnode-id="2774" instrument_node=""> (</span><a data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/670"><span data-dcnode-id="2773" instrument_node="">video</span></a><span data-dcnode-id="2771" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="2766" instrument_node="">
</span><blockquote data-dcnode-id="2746"><p data-dcnode-id="2761" wrap=""><b data-dcnode-id="2762"><b data-dcnode-id="2763"><span data-dcnode-id="2764" style="font-size: 13px;"><span data-dcnode-id="2765" instrument_node="">Not only is combined Task and Motion Planning a hard problem, it also relies on an appropriate symbolic representation to describe the task level, which to find is perhaps an even more fundamental problem. I first briefly report on our work that considered symbol learning and, relatedly, manipulation skill learning on its own. However, I now believe that what are appropriate abstractions should depend on their use in higher level planning. I will introduce Logic-Geometric Programming as a framework in which the role of the symbolic level is to make optimization over complex manipulation paths tractable. Similarly to enumerating categorical aspects of an otherwise infeasible problem, such as enumerating homotopy classes in path planning, or local optima in general optimization. I then report on recent results we got with this framework for combined task and motion planning and human-robot cooperative manipulation planning.</span></span></b></b></p><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2756" wrap=""><b data-dcnode-id="2757"><b data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2755" instrument_node="">
</span><p data-dcnode-id="2748" wrap=""><b data-dcnode-id="2749"><b data-dcnode-id="2750"><span data-dcnode-id="2751" style="font-size: 13px;"><strong data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Bio: </span></strong><span data-dcnode-id="2752" instrument_node="">Marc Toussaint currently visiting scholar at CSAIL until summer 2018. He is full professor for Machine Learning and Robotics at the University of Stuttgart since 2012. Before he was assistant professor and leading an Emmy Noether research group at FU &amp; TU Berlin. His research focuses on the combination of decision theory and machine learning, motivated by fundamental research questions in robotics. Specific interests include combining geometry, logic and probabilities in learning and reasoning, and appropriate representations and priors for real-world manipulation learning. </span></span></b></b></p><span data-dcnode-id="2747" instrument_node="">
</span></blockquote><span data-dcnode-id="2745" instrument_node="">
</span><p data-dcnode-id="2741"><b data-dcnode-id="2742"><b data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2722"><b data-dcnode-id="2723"><b data-dcnode-id="2724"><span data-dcnode-id="2725" style="font-size: 13px;"><strong data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">Spring 2017 Campus-wide Robotics Seminar</span></strong><strong data-dcnode-id="2727"><span data-dcnode-id="2737" instrument_node=""> (sponsored by </span><a data-dcnode-id="2735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aurora.aero/"><span data-dcnode-id="2736" instrument_node="">Aurora Flight Sciences</span></a><span data-dcnode-id="2734" instrument_node=""> , </span><a data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mathworks.com/"><span data-dcnode-id="2733" instrument_node="">The MathWorks</span></a><span data-dcnode-id="2731" instrument_node=""> , and the </span><a data-dcnode-id="2729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.russellsage.org/"><span data-dcnode-id="2730" instrument_node="">Russell Sage Foundation</span></a><span data-dcnode-id="2728" instrument_node=""> )&nbsp; (11am-noon in 32-G449</span></strong><span data-dcnode-id="2726" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2706"><b data-dcnode-id="2707"><b data-dcnode-id="2708"><span data-dcnode-id="2709" style="font-size: 13px;"><span data-dcnode-id="2720" instrument_node="">May 16, </span><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mila.umontreal.ca/en/person/aaron-courville/"><span data-dcnode-id="2719" instrument_node="">Aaron Courville</span></a><span data-dcnode-id="2717" instrument_node="">, Université de Montréal </span><strong data-dcnode-id="2714"><em data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">Adversarial learning for generative models and inference </span></em></strong><span data-dcnode-id="2713" instrument_node="">(</span><a data-dcnode-id="2711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/606"><span data-dcnode-id="2712" instrument_node="">video</span></a><span data-dcnode-id="2710" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="2705" instrument_node="">
</span><blockquote data-dcnode-id="2679"><p data-dcnode-id="2700" wrap=""><b data-dcnode-id="2701"><b data-dcnode-id="2702"><span data-dcnode-id="2703" style="font-size: 13px;"><span data-dcnode-id="2704" instrument_node="">Generative Adversarial Networks (GANs) pose the learning of a generative model as an adversarial game between a discriminator, trained to distinguish true and generated samples, and a generator, trained to try to fool the discriminator. Since their introduction in 2014, GANs have been the subject of a surge of research activity, due to their ability to produce realistic samples of highly structured data such as natural images.</span></span></b></b></p><span data-dcnode-id="2699" instrument_node="">
</span><p data-dcnode-id="2694" wrap=""><b data-dcnode-id="2695"><b data-dcnode-id="2696"><span data-dcnode-id="2697" style="font-size: 13px;"><span data-dcnode-id="2698" instrument_node="">In this talk I will present a brief introduction to Generative Adversarial Networks (GANs), and discuss some of our recent work in improving the stability of training of GAN models. I will also describe our recent work on adversarially learned inference (ALI), which jointly learns a generation network and an inference network using a GAN-like adversarial process. In ALI, the generation network maps samples from stochastic latent variables to the data space while the inference network maps training examples in data space to the space of latent variables. An adversarial game is cast between these two networks and a discriminative network is trained to distinguish between joint latent/data-space samples from the generative network and joint samples from the inference network.</span></span></b></b></p><span data-dcnode-id="2693" instrument_node="">
</span><p data-dcnode-id="2689" wrap=""><b data-dcnode-id="2690"><b data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2688" instrument_node="">
</span><p data-dcnode-id="2681" wrap=""><b data-dcnode-id="2682"><b data-dcnode-id="2683"><span data-dcnode-id="2684" style="font-size: 13px;"><strong data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">Bio: </span></strong><span data-dcnode-id="2685" instrument_node="">Aaron Courville is an Assistant Professor in the Department of Computer Science and Operations Research (DIRO) at the University of Montreal, and member of MILA, the Montreal Institute for Learning Algorithms. His research interests focus on deep learning, generative models and applications such as multimodal data, vision and dialogue. He also recently co-wrote a published a textbook on ``Deep Learning''. He work has been recognized with Focussed Research Award from Google and other research sponsors including Microsoft, Intel, Samsung and IBM.</span></span></b></b></p><span data-dcnode-id="2680" instrument_node="">
</span></blockquote><span data-dcnode-id="2678" instrument_node="">
</span><p data-dcnode-id="2674"><b data-dcnode-id="2675"><b data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2673" instrument_node="">
</span><p data-dcnode-id="2658"><b data-dcnode-id="2659"><b data-dcnode-id="2660"><span data-dcnode-id="2661" style="font-size: 13px;"><span data-dcnode-id="2672" instrument_node="">May 9, </span><a data-dcnode-id="2670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//web.mit.edu/mposa/www/"><span data-dcnode-id="2671" instrument_node="">Michael Posa</span></a><span data-dcnode-id="2669" instrument_node="">, MIT </span><em data-dcnode-id="2666"><strong data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Thesis Defense: Optimization for Control and Planning of Multi-contact Dynamic Motion</span></strong></em><span data-dcnode-id="2665" instrument_node=""> (</span><a data-dcnode-id="2663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/597"><span data-dcnode-id="2664" instrument_node="">video</span></a><span data-dcnode-id="2662" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="2657" instrument_node="">
</span><blockquote data-dcnode-id="2650"><p data-dcnode-id="2652"><b data-dcnode-id="2653"><b data-dcnode-id="2654"><span data-dcnode-id="2655" style="font-size: 13px;"><span data-dcnode-id="2656" instrument_node="">Whether a robot is assisting a person to move about the home, or packing containers in a warehouse, the fundamental promise of robotics centers on the ability to productively interact with a complex and changing environment in a safe and controlled fashion. However, current robots are largely limited to basic tasks in structured environments--operating slowly and cautiously, afraid of any incidental contact with the outside world. Dynamic interaction, encompassing both legged locomotion and manipulation, poses significant challenges to traditional control and planning techniques. Discontinuities from impact events and dry friction make standard tools poorly suited in scenarios with complex or uncertain contacts between robot and environment. I will present approaches that leverage the interplay between numerical optimization and the mathematical structure of contact dynamics to avoid the combinatorial complexity of mode enumeration. This will include a tractable algorithm for trajectory optimization, without an a priori encoding of the contact sequence, and an approach utilizing sums-of-squares programming to design and provably verify controllers that stabilize systems making and breaking contact.</span></span></b></b></p><span data-dcnode-id="2651" instrument_node="">
</span></blockquote><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2645" wrap=""><b data-dcnode-id="2646"><b data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2644" instrument_node="">
</span><p data-dcnode-id="2628" wrap=""><b data-dcnode-id="2629"><b data-dcnode-id="2630"><span data-dcnode-id="2631" style="font-size: 13px;"><span data-dcnode-id="2643" instrument_node="">May 2, </span><span data-dcnode-id="2639" style="font-size: 13px;"><a data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ccs.neu.edu/home/rplatt/"><span data-dcnode-id="2642" instrument_node="">Robert Platt</span></a><span data-dcnode-id="2640" instrument_node="">, Northeastern University </span></span><strong data-dcnode-id="2636"><em data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">Robotic Manipulation Without Geometric Models </span></em></strong><span data-dcnode-id="2635" instrument_node="">(</span><a data-dcnode-id="2633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/591"><span data-dcnode-id="2634" instrument_node="">video</span></a><span data-dcnode-id="2632" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="2627" instrument_node="">
</span><blockquote data-dcnode-id="2607"><p data-dcnode-id="2622" wrap=""><b data-dcnode-id="2623"><b data-dcnode-id="2624"><span data-dcnode-id="2625" style="font-size: 13px;"><span data-dcnode-id="2626" instrument_node="">Most approaches to planning for robotic manipulation take a geometric description of the world and the objects in it as input. Unfortunately, despite successes in SLAM, estimating the geometry of the world from sensor data can be challenging. This is particularly true in open world scenarios where we have little prior information about the geometry or appearance of the objects to be handled. This is a problem because even small modelling errors can cause a grasp or manipulation operation to fail. In this talk, I will describe some recent work on approaches to robotic manipulation that eschew geometric models. Our recent results show that these methods excel on manipulation tasks involving novel objects presented in dense clutter.</span></span></b></b></p><span data-dcnode-id="2621" instrument_node="">
</span><p data-dcnode-id="2617" wrap=""><b data-dcnode-id="2618"><b data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2609" wrap=""><b data-dcnode-id="2610"><b data-dcnode-id="2611"><span data-dcnode-id="2612" style="font-size: 13px;"><strong data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Bio: </span></strong><span data-dcnode-id="2613" instrument_node="">Dr. Robert Platt is an Assistant Professor of Computer Science at Northeastern University. Prior to coming to Northeastern, he was a Research Scientist at MIT and a technical lead at NASA Johnson Space Center, where he helped develop the control and autonomy subsystems for Robonaut 2, the first humanoid robot in space.</span></span></b></b></p><span data-dcnode-id="2608" instrument_node="">
</span></blockquote><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2602"><b data-dcnode-id="2603"><b data-dcnode-id="2604"><span data-dcnode-id="2605" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2585" wrap=""><b data-dcnode-id="2586"><b data-dcnode-id="2587"><span data-dcnode-id="2588" style="font-size: 13px;"><span data-dcnode-id="2600" instrument_node="">Apr 25, </span><span data-dcnode-id="2596" style="font-size: 13px;"><a data-dcnode-id="2598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eng.fsu.edu/~clarkj/"><span data-dcnode-id="2599" instrument_node="">Jonathan Clark</span></a><span data-dcnode-id="2597" instrument_node="">, Florida State University </span></span><strong data-dcnode-id="2593"><em data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">Dynamics, Design, and Control of Legged Robots that Rapidly Run and Climb </span></em></strong><span data-dcnode-id="2592" instrument_node="">(</span><a data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/583"><span data-dcnode-id="2591" instrument_node="">video</span></a><span data-dcnode-id="2589" instrument_node="">, CSAIL only)</span></span></b></b></p><span data-dcnode-id="2584" instrument_node="">
</span><blockquote data-dcnode-id="2564"><p data-dcnode-id="2579" wrap=""><b data-dcnode-id="2580"><b data-dcnode-id="2581"><span data-dcnode-id="2582" style="font-size: 13px;"><span data-dcnode-id="2583" instrument_node="">Finely tuned robotic limb systems that explicitly exploit their body’s natural dynamics have begun to rival specific performance criteria, such as speed over smooth terrain, of the most accomplished biological systems. The earliest successful robot implementations however, used only very specialized designs with a very limited number of active degrees of freedom. While more flexible, higher degree-of-freedom designs have been around for some time they have usually been restricted to comparatively slow speeds or manipulation of light-weight objects. The design of fast, dynamic multi-purpose robots has been stymied by the limitation of available mechanical actuators and the complexity of the design and control of these systems. This talk will describe recent efforts to understand how to effectively design robotic limbs to enable dynamic motions in multiple modalities, specifically high-speed running on horizontal and vertical surfaces.</span></span></b></b></p><span data-dcnode-id="2578" instrument_node="">
</span><p data-dcnode-id="2574" wrap=""><b data-dcnode-id="2575"><b data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2573" instrument_node="">
</span><p data-dcnode-id="2566" wrap=""><b data-dcnode-id="2567"><b data-dcnode-id="2568"><span data-dcnode-id="2569" style="font-size: 13px;"><strong data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">Bio: </span></strong><span data-dcnode-id="2570" instrument_node="">Jonathan Clark received his BS in Mechanical Engineering from Brigham Young University and his MS and PhD from Stanford University. Dr. Clark worked as an IC Postdoctoral Fellow at the GRASP lab at the University of Pennsylvania, and is currently an associate professor at the FAMU/FSU College of Engineering in the Department of Mechanical Engineering. During Dr. Clark’s career he has worked on a wide range of dynamic legged robotic systems including the Sprawl and RHex families of running robots, as well as the world’s first dynamical and fastest legged climbing robot Dynoclimber. In 2014, he received an NSF CAREER award for work on rotational dynamics for improved legged locomotion. His recent work has involved the development of multi-modal robots that can operate in varied terrain by running, climbing and flying. He currently serves as the associate director of the Center of Intelligent Systems, Control, and Robotics (CISCOR) and the director of the STRIDe lab.</span></span></b></b></p><span data-dcnode-id="2565" instrument_node="">
</span></blockquote><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2559"><b data-dcnode-id="2560"><b data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2558" instrument_node="">
</span><p data-dcnode-id="2546" wrap=""><b data-dcnode-id="2547"><b data-dcnode-id="2548"><span data-dcnode-id="2549" style="font-size: 13px;"><span data-dcnode-id="2557" instrument_node="">Apr 18, </span><span data-dcnode-id="2553" style="font-size: 13px;"><a data-dcnode-id="2555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//interactive.mit.edu/"><span data-dcnode-id="2556" instrument_node="">Julie Shah</span></a><span data-dcnode-id="2554" instrument_node="">, MIT </span></span><strong data-dcnode-id="2550"><em data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">Enhancing Human Capability with Intelligent Machine Teammates</span></em></strong></span></b></b></p><span data-dcnode-id="2545" instrument_node="">
</span><blockquote data-dcnode-id="2525"><p data-dcnode-id="2540" wrap=""><b data-dcnode-id="2541"><b data-dcnode-id="2542"><span data-dcnode-id="2543" style="font-size: 13px;"><span data-dcnode-id="2544" instrument_node="">Every team has top performers -- people who excel at working in a team to find the right solutions in complex, difficult situations. These top performers include nurses who run hospital floors, emergency response teams, air traffic controllers, and factory line supervisors. While they may outperform the most sophisticated optimization and scheduling algorithms, they cannot often tell us how they do it. Similarly, even when a machine can do the job better than most of us, it can’t explain how. In this talk I share recent work investigating effective ways to blend the unique decision-making strengths of humans and machines. I discuss the development of computational models that enable machines to efficiently infer the mental state of human teammates and thereby collaborate with people in richer, more flexible ways. Our studies demonstrate statistically significant improvements in people’s performance on military, healthcare and manufacturing tasks, when aided by intelligent machine teammates.</span></span></b></b></p><span data-dcnode-id="2539" instrument_node="">
</span><p data-dcnode-id="2535" wrap=""><b data-dcnode-id="2536"><b data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2534" instrument_node="">
</span><p data-dcnode-id="2527" wrap=""><b data-dcnode-id="2528"><b data-dcnode-id="2529"><span data-dcnode-id="2530" style="font-size: 13px;"><strong data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">Bio: </span></strong><span data-dcnode-id="2531" instrument_node="">Julie Shah is an Associate Professor of Aeronautics and Astronautics at MIT and director of the Interactive Robotics Group, which aims to imagine the future of work by designing collaborative robot teammates that enhance human capability. As a current fellow of Harvard University's Radcliffe Institute for Advanced Study, she is expanding the use of human cognitive models for artificial intelligence. She has translated her work to manufacturing assembly lines, healthcare applications, transportation and defense. Before joining the faculty, she worked at Boeing Research and Technology on robotics applications for aerospace manufacturing. Prof. Shah has been recognized by the National Science Foundation with a Faculty Early Career Development (CAREER) award and by MIT Technology Review on its 35 Innovators Under 35 list. Her work on industrial human-robot collaboration was also in Technology Review’s 2013 list of 10 Breakthrough Technologies. She has received international recognition in the form of best paper awards and nominations from the ACM/IEEE International Conference on Human-Robot Interaction, the American Institute of Aeronautics and Astronautics, the Human Factors and Ergonomics Society, the International Conference on Automated Planning and Scheduling, and the International Symposium on Robotics. She earned degrees in aeronautics and astronautics and in autonomous systems from MIT.</span></span></b></b></p><span data-dcnode-id="2526" instrument_node="">
</span></blockquote><span data-dcnode-id="2524" instrument_node="">
</span><p data-dcnode-id="2520"><b data-dcnode-id="2521"><b data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2519" instrument_node="">
</span><p data-dcnode-id="2503" wrap=""><b data-dcnode-id="2504"><b data-dcnode-id="2505"><span data-dcnode-id="2506" style="font-size: 13px;"><span data-dcnode-id="2518" instrument_node="">Apr 11, </span><span data-dcnode-id="2514" style="font-size: 13px;"><a data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cc.gatech.edu/~chernova/"><span data-dcnode-id="2517" instrument_node="">Sonia Chernova</span></a><span data-dcnode-id="2515" instrument_node="">, Georgia Tech </span></span><strong data-dcnode-id="2511"><em data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Toward Resilient Robot Autonomy through Learning, Interaction and Semantic Reasoning </span></em></strong><span data-dcnode-id="2510" instrument_node="">(</span><a data-dcnode-id="2508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/574"><span data-dcnode-id="2509" instrument_node="">video</span></a><span data-dcnode-id="2507" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="2502" instrument_node="">
</span><blockquote data-dcnode-id="2482"><p data-dcnode-id="2497" wrap=""><b data-dcnode-id="2498"><b data-dcnode-id="2499"><span data-dcnode-id="2500" style="font-size: 13px;"><span data-dcnode-id="2501" instrument_node="">Robotics is undergoing an exciting transition from factory automation to the deployment of autonomous systems in less structured environments, such as warehouses, hospitals and homes. One of the critical barriers to the wider adoption of autonomous robotic systems in the wild is the challenge of achieving reliable autonomy in complex and changing human environments.&nbsp; In this talk, I will discuss ways in which innovations in learning from demonstration and remote access technologies can be used to develop and deploy autonomous robotic systems alongside and in collaboration with human partners.&nbsp; I will present applications of this research paradigm to robot learning, object manipulation and semantic reasoning, as well as explore some exciting avenues for future research in this area.</span></span></b></b></p><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2492" wrap=""><b data-dcnode-id="2493"><b data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2484" wrap=""><b data-dcnode-id="2485"><b data-dcnode-id="2486"><span data-dcnode-id="2487" style="font-size: 13px;"><strong data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Bio: </span></strong><span data-dcnode-id="2488" instrument_node="">Sonia Chernova is the Catherine M. and James E. Allchin Early-Career Assistant Professor in the School of Interactive Computing at Georgia Tech, where she directs the Robot Autonomy and Interactive Learning research lab.&nbsp; She received B.S. and Ph.D. degrees in Computer Science from Carnegie Mellon University, and held positions as a Postdoctoral Associate at the MIT Media Lab and as Assistant Professor at Worcester Polytechnic Institute prior to joining Georgia Tech in August 2015.&nbsp; Prof. Chernova’s research focuses on developing robots that are able to effectively operate in human environments. Her work spans robotics and artificial intelligence, including semantic reasoning, adjustable autonomy, human computation and cloud robotics. She is the recipient of the NSF CAREER, ONR Young Investigator and NASA Early Career Faculty awards.</span></span></b></b></p><span data-dcnode-id="2483" instrument_node="">
</span></blockquote><span data-dcnode-id="2481" instrument_node="">
</span><p data-dcnode-id="2477"><b data-dcnode-id="2478"><b data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2458"><b data-dcnode-id="2459"><b data-dcnode-id="2460"><span data-dcnode-id="2461" style="font-size: 13px;"><span data-dcnode-id="2475" instrument_node="">April 4, </span><span data-dcnode-id="2471" style="font-size: 13px;"><a data-dcnode-id="2473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//stars.utias.utoronto.ca/~jkelly/"><span data-dcnode-id="2474" instrument_node="">Jon Kelly</span></a><span data-dcnode-id="2472" instrument_node="">, University of Toronto </span></span><strong data-dcnode-id="2467"><em data-dcnode-id="2468"><span class="m_8621507922709347157Apple-style-span" data-dcnode-id="2469" style="font-size:13px"><span data-dcnode-id="2470" instrument_node="">Getting More from What You've Already Got: Improving Stereo Visual Odometry Using Deep Visual Illumination Estimation </span></span></em></strong><span class="m_8621507922709347157Apple-style-span" data-dcnode-id="2462" style="font-size:13px"><span data-dcnode-id="2466" instrument_node="">(</span><a data-dcnode-id="2464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/570"><span data-dcnode-id="2465" instrument_node="">video</span></a><span data-dcnode-id="2463" instrument_node="">, CSAIL only)</span></span></span></b></b></p><span data-dcnode-id="2457" instrument_node="">
</span><blockquote data-dcnode-id="2410"><div data-dcnode-id="2426"><b data-dcnode-id="2451"><b data-dcnode-id="2452"><span data-dcnode-id="2454" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Visual navigation is essential for many successful robotics applications. Visual odometry (VO), an incremental dead reckoning technique, in particular, has been widely employed on many platforms, including the Mars Exploration Rovers and the Mars Science Laboratory. However, a drawback of this visual motion estimation approach is that it exhibits superlinear growth in positioning error with time, due in large part to orientation drift. </span></span></span><span data-dcnode-id="2453" instrument_node=""> </span></b></b><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2444"><b data-dcnode-id="2445"><b data-dcnode-id="2446"><span data-dcnode-id="2447" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">In this talk, I will describe recent work in our group on a method to incorporate global orientation information from the sun into a visual odometry (VO) pipeline, using data from the existing image stream only. This is challenging in part because the sun is typically not visible in the input images. Our work leverages recent advances in Bayesian Convolutional Neural Networks (BCNNs) to train and implement a sun detection model (dubbed Sun-BCNN) that infers a three-dimensional sun direction vector from a single RGB image. Crucially, the technique also computes a principled uncertainty associated with each prediction, using a Monte Carlo dropout scheme. We incorporate this uncertainty into a sliding window stereo VO pipeline where accurate uncertainty estimates are critical for optimal data fusion.</span></span></span></b></b></p><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2439"><b data-dcnode-id="2440"><b data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node=""> </span></b></b></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2432"><b data-dcnode-id="2433"><b data-dcnode-id="2434"><span data-dcnode-id="2435" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">I will present the results of our evaluation on the KITTI odometry benchmark, where significant improvements are obtained over ‘vanilla’ VO. I will also describe additional experimental evaluation on 10 km of navigation data from Devon Island in the Canadian High Arctic, at a Mars analogue site. Finally, I will give an overview of our analysis of the sensitivity of the model to cloud cover, and discuss the possibility of model transfer between urban and planetary analogue environments. </span></span></span></b></b></p><span data-dcnode-id="2431" instrument_node="">
</span><p data-dcnode-id="2427"><b data-dcnode-id="2428"><b data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node=""> </span></b></b></p></div><span data-dcnode-id="2425" instrument_node="">
</span><div data-dcnode-id="2421"><b data-dcnode-id="2422"><b data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">&nbsp;</span></b></b></div><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2412" style="margin:0px 0px 1em;color:rgb(2,2,2);font-family:&quot;open sans&quot;,arial,sans-serif"><b data-dcnode-id="2413"><b data-dcnode-id="2414"><span data-dcnode-id="2415" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2416"><strong data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">Bio:</span></strong><span data-dcnode-id="2417" instrument_node=""> Dr. Kelly is an Assistant Professor at the University of Toronto Institute for Aerospace Studies, where he directs the Space &amp; Terrestrial Autonomous Robotic Systems (STARS) Laboratory. Prior to joining U of T, he was a postdoctoral researcher in the Robust Robotics Group at MIT. Dr. Kelly received his PhD degree in 2011 from the University of Southern California, under the supervision of Prof. Gaurav Sukhatme. He was supported at USC in part by an Annenberg Fellowship. Prior to graduate school, he was a software engineer at the Canadian Space Agency in Montreal, Canada. His research interests lie primarily in the areas of sensor fusion, estimation, and machine learning for navigation and mapping, applied to both robots and human-centred assistive technologies.</span></span></span></b></b></p><span data-dcnode-id="2411" instrument_node="">
</span></blockquote><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2405"><b data-dcnode-id="2406"><b data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2391"><b data-dcnode-id="2392"><b data-dcnode-id="2393"><span data-dcnode-id="2394" style="font-size: 13px;"><span data-dcnode-id="2403" instrument_node="">March 28, </span><span data-dcnode-id="2399" style="font-size: 13px;"><a data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gracegao.ae.illinois.edu/"><span data-dcnode-id="2402" instrument_node="">Grace Gao</span></a><span data-dcnode-id="2400" instrument_node="">, UIUC </span></span><strong data-dcnode-id="2395"><em data-dcnode-id="2396"><span class="m_8621507922709347157Apple-style-span" data-dcnode-id="2397" style="font-size:13px"><span data-dcnode-id="2398" instrument_node="">Robust Navigation: From UAVs to Robot Swarms</span></span></em></strong></span></b></b></p><span data-dcnode-id="2390" instrument_node="">
</span><blockquote data-dcnode-id="2343"><div data-dcnode-id="2359"><b data-dcnode-id="2384"><b data-dcnode-id="2385"><span data-dcnode-id="2387" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">Robust navigation is critical and challenging for the ever-growing applications of robotics. Take Unmanned Aerial Vehicles (UAVs) as an example: the boom in applications of low-cost multi-copters requires UAVs to navigate in urban environments at low altitude. Traditionally, a UAV is equipped with a GPS receiver for outdoor flight. It may suffer from GPS signal blockage and multipath issues, making GPS-based positioning erroneous or unavailable. Moreover, GPS signals are vulnerable against attacks, such as jamming or spoofing. These attacks either disable GPS positioning, or more deliberately mislead the UAV with wrong positioning. </span></span></span><span data-dcnode-id="2386" instrument_node=""> </span></b></b><span data-dcnode-id="2383" instrument_node="">
</span><p data-dcnode-id="2377"><b data-dcnode-id="2378"><b data-dcnode-id="2379"><span data-dcnode-id="2380" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">In this talk, we present our recent work on robust UAV navigation. We deeply fuse GPS information with Lidar, camera vision and inertial measurements on the raw signal level. In addition, we turn the unwanted multipath signals into an additional useful signal source. Instead of one GPS receiver, we use multiple receivers either on the same UAV platform or across a wide area to further improve navigation accuracy, reliability and resilience to attacks. </span></span></span></b></b></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2372"><b data-dcnode-id="2373"><b data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node=""> </span></b></b></p><span data-dcnode-id="2371" instrument_node="">
</span><p data-dcnode-id="2365"><b data-dcnode-id="2366"><b data-dcnode-id="2367"><span data-dcnode-id="2368" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">The second part of the talk will address our work on navigating a swarm of 100 robots, designed and built in our lab. We call them “Shinerbots,” because they are inspired by the schooling behaviors of Golden Shiner Fish. We will demonstrate the successful navigation and environment exploration of our Shinerbot swarm. </span></span></span></b></b></p><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2360"><b data-dcnode-id="2361"><b data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node=""> </span></b></b></p></div><span data-dcnode-id="2358" instrument_node="">
</span><div data-dcnode-id="2354"><b data-dcnode-id="2355"><b data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">&nbsp;</span></b></b></div><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2345" style="margin:0px 0px 1em;color:rgb(2,2,2);font-family:&quot;open sans&quot;,arial,sans-serif"><b data-dcnode-id="2346"><b data-dcnode-id="2347"><span data-dcnode-id="2348" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2349"><strong data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Bio:</span></strong><span data-dcnode-id="2350" instrument_node=""> Grace Xingxin Gao is an assistant professor in the Aerospace Engineering Department at University of Illinois at Urbana-Champaign. She obtained her Ph.D. degree in Electrical Engineering from the GPS Laboratory at Stanford University. Prof. Gao has won a number of awards, including RTCA William E. Jackson Award and Institute of Navigation Early Achievement Award. She was named one of 50 GNSS Leaders to Watch by the GPS World Magazine. She has won Best Paper/Presentation of the Session Awards 11 times at ION GNSS+ conferences. She received Dean's Award for Excellence in Research from College of Engineering, University of Illinois at Urbana-Champaign. For her teaching, Prof. Gao has been on the List of Teachers Ranked as Excellent by Their Students at University of Illinois multiple times. She won the College of Engineering Everitt Award for Teaching Excellence at University of Illinois at Urbana-Champaign in 2015. She was chosen as American Institute of Aeronautics and Astronautics (AIAA) Illinois Chapter’s Teacher of the Year in 2016.</span></span></span></b></b></p><span data-dcnode-id="2344" instrument_node="">
</span></blockquote><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2338"><b data-dcnode-id="2339"><b data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2322"><b data-dcnode-id="2323"><b data-dcnode-id="2324"><span data-dcnode-id="2325" style="font-size: 13px;"><strong data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">POSTPONED DUE TO SNOW</span></strong><span data-dcnode-id="2334" instrument_node="">March 14, </span><span data-dcnode-id="2330" style="font-size: 13px;"><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//interactive.mit.edu/"><span data-dcnode-id="2333" instrument_node="">Julie Shah</span></a><span data-dcnode-id="2331" instrument_node="">, MIT </span></span><strong data-dcnode-id="2326"><em data-dcnode-id="2327"><span class="m_8621507922709347157Apple-style-span" data-dcnode-id="2328" style="font-size:13px"><span data-dcnode-id="2329" instrument_node="">Enhancing Human Capability with Intelligent Machine Teammates</span></span></em></strong></span></b></b></p><span data-dcnode-id="2321" instrument_node="">
</span><blockquote data-dcnode-id="2299"><div data-dcnode-id="2315"><b data-dcnode-id="2316"><b data-dcnode-id="2317"><span data-dcnode-id="2318" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">Every team has top performers -- people who excel at working in a team to find the right solutions in complex, difficult situations. These top performers include nurses who run hospital floors, emergency response teams, air traffic controllers, and factory line supervisors. While they may outperform the most sophisticated optimization and scheduling algorithms, they cannot often tell us how they do it. Similarly, even when a machine can do the job better than most of us, it can’t explain how. In this talk I share recent work investigating effective ways to blend the unique decision-making strengths of humans and machines. I discuss the development of computational models that enable machines to efficiently infer the mental state of human teammates and thereby collaborate with people in richer, more flexible ways. Our studies demonstrate statistically significant improvements in people’s performance on military, healthcare and manufacturing tasks, when aided by intelligent machine teammates. </span></span></span></b></b></div><span data-dcnode-id="2314" instrument_node="">
</span><div data-dcnode-id="2310"><b data-dcnode-id="2311"><b data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">&nbsp;</span></b></b></div><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2301" style="margin:0px 0px 1em;color:rgb(2,2,2);font-family:&quot;open sans&quot;,arial,sans-serif"><b data-dcnode-id="2302"><b data-dcnode-id="2303"><span data-dcnode-id="2304" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2305"><strong data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Bio:</span></strong><span data-dcnode-id="2306" instrument_node=""> Julie Shah is an Associate Professor of Aeronautics and Astronautics at MIT and director of the Interactive Robotics Group, which aims to imagine the future of work by designing collaborative robot teammates that enhance human capability. As a current fellow of Harvard University's Radcliffe Institute for Advanced Study, she is expanding the use of human cognitive models for artificial intelligence. She has translated her work to manufacturing assembly lines, healthcare applications, transportation and defense. Before joining the faculty, she worked at Boeing Research and Technology on robotics applications for aerospace manufacturing. Prof. Shah has been recognized by the National Science Foundation with a Faculty Early Career Development (CAREER) award and by MIT Technology Review on its 35 Innovators Under 35 list. Her work on industrial human-robot collaboration was also in Technology Review’s 2013 list of 10 Breakthrough Technologies. She has received international recognition in the form of best paper awards and nominations from the ACM/IEEE International Conference on Human-Robot Interaction, the American Institute of Aeronautics and Astronautics, the Human Factors and Ergonomics Society, the International Conference on Automated Planning and Scheduling, and the International Symposium on Robotics. She earned degrees in aeronautics and astronautics and in autonomous systems from MIT.</span></span></span></b></b></p><span data-dcnode-id="2300" instrument_node="">
</span></blockquote><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2294"><b data-dcnode-id="2295"><b data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2274"><b data-dcnode-id="2275"><b data-dcnode-id="2276"><span data-dcnode-id="2277" style="font-size: 13px;"><span data-dcnode-id="2292" instrument_node="">March 7, </span><span data-dcnode-id="2288" style="font-size: 13px;"><a data-dcnode-id="2290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//lexfridman.com/"><span data-dcnode-id="2291" instrument_node="">Lex Fridman</span></a><span data-dcnode-id="2289" instrument_node="">, MIT </span></span><em data-dcnode-id="2283"><span class="m_8621507922709347157Apple-style-span" data-dcnode-id="2284" style="font-size:13px"><strong data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Human-in-the-Loop: Deep Learning for Shared Autonomy in Naturalistic Driving</span></strong><span data-dcnode-id="2285" instrument_node=""> </span></span></em><span class="m_8621507922709347157Apple-style-span" data-dcnode-id="2278" style="font-size:13px"><span data-dcnode-id="2282" instrument_node="">(</span><a data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/551"><span data-dcnode-id="2281" instrument_node="">video</span></a><span data-dcnode-id="2279" instrument_node="">)</span></span></span></b></b></p><span data-dcnode-id="2273" instrument_node="">
</span><blockquote data-dcnode-id="2251"><div data-dcnode-id="2267"><b data-dcnode-id="2268"><b data-dcnode-id="2269"><span data-dcnode-id="2270" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Localization, mapping, perception, control, and trajectory planning are components of autonomous vehicle design that each have seen considerable progress in the previous three decades and especially since the first DARPA Robotics Challenge. These are areas of robotics research focused on perceiving and interacting with the external world through outward facing sensors and actuators. However, semi-autonomous driving is in many ways a human-centric activity where the at-times distracted, irrational, drowsy human may need to be included in-the-loop of safe and intelligent autonomous vehicle operation through the driver state sensing, communication, and shared control. In this talk, I will present deep neural network approaches for various subtasks of supervised vehicle autonomy with a special focus on driver state sensing and how those approaches helped us in (1) the collection, analysis, and understanding of human behavior over 100,000 miles and 1 billion video frames of on-road semi-autonomous driving in Tesla vehicles and (2) the design of real-time driver assistance systems that bring the human back into the loop of safe shared autonomy.</span></span></span></b></b></div><span data-dcnode-id="2266" instrument_node="">
</span><div data-dcnode-id="2262"><b data-dcnode-id="2263"><b data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">&nbsp;</span></b></b></div><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2253" style="margin:0px 0px 1em;color:rgb(2,2,2);font-family:&quot;open sans&quot;,arial,sans-serif"><b data-dcnode-id="2254"><b data-dcnode-id="2255"><span data-dcnode-id="2256" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2257"><strong data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Bio: </span></strong><span data-dcnode-id="2258" instrument_node="">Lex Fridman is a postdoc at MIT, working on computer vision and deep learning approaches in the context of self-driving cars with a human-in-the-loop. His work focuses on large-scale, real-world data, with the goal of building intelligent systems that have real world impact. Lex received his BS, MS, and PhD from Drexel University where he worked on applications of machine learning, computer vision, and decision fusion techniques in a number of fields including robotics, active authentication, activity recognition, and optimal resource allocation on multi-commodity networks. Before joining MIT, Lex was at Google working on deep learning and decision fusion methods for large-scale behavior-based authentication. Lex is a recipient of a CHI-17 best paper award.</span></span></span></b></b></p><span data-dcnode-id="2252" instrument_node="">
</span></blockquote><span data-dcnode-id="2250" instrument_node="">
</span><p data-dcnode-id="2246"><b data-dcnode-id="2247"><b data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2226"><b data-dcnode-id="2227"><b data-dcnode-id="2228"><span data-dcnode-id="2229" style="font-size: 13px;"><span data-dcnode-id="2244" instrument_node="">Feb 28, </span><span data-dcnode-id="2240" style="font-size: 13px;"><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www2.informatik.uni-freiburg.de/~burgard"><span data-dcnode-id="2243" instrument_node="">Wolfram Burgard</span></a><span data-dcnode-id="2241" instrument_node="">, University of Freiburg </span></span><em data-dcnode-id="2235"><span class="m_8621507922709347157Apple-style-span" data-dcnode-id="2236" style="font-size:13px"><strong data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Deep Learning for Robot Navigation and Perception</span></strong><span data-dcnode-id="2237" instrument_node=""> </span></span></em><span class="m_8621507922709347157Apple-style-span" data-dcnode-id="2230" style="font-size:13px"><span data-dcnode-id="2234" instrument_node="">(</span><a data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/546"><span data-dcnode-id="2233" instrument_node="">video</span></a><span data-dcnode-id="2231" instrument_node="">)</span></span></span></b></b></p><span data-dcnode-id="2225" instrument_node="">
</span><blockquote data-dcnode-id="2203"><div data-dcnode-id="2219"><b data-dcnode-id="2220"><b data-dcnode-id="2221"><span data-dcnode-id="2222" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">Autonomous robots are faced with a series of learning problems to optimize their behavior. In this presentation I will describe recent approaches developed in my group based on deep learning architectures for different perception problems including object recognition and segmentation and using RGB(-D) images. In addition, I will present a terrain classification approaches that utilize sound and vision. For all approaches I will describe expensive experiments quantifying in which way the corresponding approaches extend the state of the art.</span></span></span></b></b></div><span data-dcnode-id="2218" instrument_node="">
</span><div data-dcnode-id="2214"><b data-dcnode-id="2215"><b data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">&nbsp;</span></b></b></div><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2205" style="margin:0px 0px 1em;color:rgb(2,2,2);font-family:&quot;open sans&quot;,arial,sans-serif"><b data-dcnode-id="2206"><b data-dcnode-id="2207"><span data-dcnode-id="2208" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2209"><strong data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Bio:</span></strong><span data-dcnode-id="2210" instrument_node=""> Wolfram Burgard is a professor for computer science at the University of Freiburg and head of the research lab for Autonomous Intelligent Systems. His areas of interest lie in artificial intelligence and mobile robots. His research mainly focuses on the development of robust and adaptive techniques for state estimation and control. Over the past years Wolfram Burgard and his group have developed a series of innovative probabilistic techniques for robot navigation and control. They cover different aspects such as localization, map-building, SLAM, path-planning, exploration, and several other aspects. Wolfram Burgard coauthored two books and more than 300 scientific papers. In 2009, Wolfram Burgard received the Gottfried Wilhelm Leibniz Prize, the most prestigious German research award. In 2010, Wolfram Burgard received an Advanced Grant of the European Research Council. Since 2012, Wolfram Burgard is the coordinator of the Cluster of Excellence BrainLinks-BrainTools funded by the German Research Foundation. Wolfram Burgard is Fellow of the ECCAI, the AAAI, and the IEEE.</span></span></span></b></b></p><span data-dcnode-id="2204" instrument_node="">
</span></blockquote><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2198"><b data-dcnode-id="2199"><b data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2184"><b data-dcnode-id="2185"><b data-dcnode-id="2186"><span data-dcnode-id="2187" style="font-size: 13px;"><span data-dcnode-id="2196" instrument_node="">Feb 14, </span><span data-dcnode-id="2192" style="font-size: 13px;"><a data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//asl.stanford.edu/people/sumeet-singh/"><span data-dcnode-id="2195" instrument_node="">Sumeet Singh</span></a><span data-dcnode-id="2193" instrument_node="">, Stanford University, </span></span><strong data-dcnode-id="2188"><em data-dcnode-id="2189"><span class="m_8621507922709347157Apple-style-span" data-dcnode-id="2190" style="font-size:13px"><span data-dcnode-id="2191" instrument_node="">Robust and Risk-Sensitive Planning via Contraction Theory and Convex Optimization</span></span></em></strong></span></b></b></p><span data-dcnode-id="2183" instrument_node="">
</span><blockquote data-dcnode-id="2161"><div data-dcnode-id="2177"><b data-dcnode-id="2178"><b data-dcnode-id="2179"><span data-dcnode-id="2180" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">A key prerequisite for autonomous robots working alongside humans is the ability to cope with uncertainty at two levels: (1) low-level modeling errors or external disturbances, and (2) high-level uncertainty about the humans’ goals and actions. For the first part of this talk, I will present our framework for the online generation of robust motion plans for constrained nonlinear robotic systems such as UAVs subject to bounded disturbances while operating in cluttered environments. Specifically, by leveraging tools from contraction theory and convex optimization, we are able to provide a guaranteed margin of safety (i.e., a precise buffer zone) for any desired trajectory, thereby guaranteeing the safe, collision-free execution of the resulting motion plan. Having addressed this robust low-level control strategy, in the second part of the talk I will discuss our recent work on risk- and ambiguity- sensitive Inverse Reinforcement Learning for better capturing human decision making. In particular, by departing from the ubiquitous expected utility framework and proposing a flexible model using coherent risk metrics, we are able to capture an entire spectrum of risk preferences from risk-neutral to worst-case. This allows us to better predict the human decision making process, both qualitatively and quantitatively. We envision that leveraging such a methodology is an important step toward more reliable high- and low- level control processes for safety-critical robotics systems operating in shared environments.</span></span></span></b></b></div><span data-dcnode-id="2176" instrument_node="">
</span><div data-dcnode-id="2172"><b data-dcnode-id="2173"><b data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">&nbsp;</span></b></b></div><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2163" style="margin:0px 0px 1em;color:rgb(2,2,2);font-family:&quot;open sans&quot;,arial,sans-serif"><b data-dcnode-id="2164"><b data-dcnode-id="2165"><span data-dcnode-id="2166" style="font-size: 13px;"><span class="gmail-m_-4699993851188473964Apple-style-span" data-dcnode-id="2167"><strong data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Bio:</span></strong><span data-dcnode-id="2168" instrument_node=""> Sumeet Singh is a Ph.D. candidate in Aeronautics and Astronautics at Stanford University. He received a B.Eng. in Mechanical Engineering and a Diploma of Music (Performance) from University of Melbourne in 2012, and a M.Sc. in Aeronautics and Astronautics from Stanford University in 2015. Prior to joining Stanford, Sumeet worked in the Berkeley Micromechanical Analysis and Design lab at University of California Berkeley in 2011 and the Aeromechanics Branch at NASA Ames in 2013. Sumeet’s current research interests are twofold: 1) Robust motion planning for constrained nonlinear systems, and 2) Risk-sensitive Model Predictive Control (MPC). Within the first topic, Sumeet is investigating the design of nonlinear control algorithms for online generation of robust motion plans with guaranteed margins of safety for constrained robotic systems in cluttered environments. The second topic focuses on the development and analysis of stochastic MPC algorithms for robust and risk-sensitive decision making problems.</span></span></span></b></b></p><span data-dcnode-id="2162" instrument_node="">
</span></blockquote><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2156"><b data-dcnode-id="2157"><b data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2149"><b data-dcnode-id="2150"><b data-dcnode-id="2151"><span data-dcnode-id="2152" style="font-size: 13px;"><strong data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Fall 2016 Robotics Seminars</span></strong></span></b></b></p><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2134"><b data-dcnode-id="2135"><b data-dcnode-id="2136"><span data-dcnode-id="2137" style="font-size: 13px;"><span data-dcnode-id="2147" instrument_node="">Dec 13, </span><a data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//prorok.me/"><span data-dcnode-id="2146" instrument_node="">Amanda Prorok</span></a><span data-dcnode-id="2144" instrument_node="">, University of Pennsylvania, </span><em data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Diversity, Privacy, and Resilience in Robot Networks </span></em><span data-dcnode-id="2141" instrument_node="">(</span><a data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/527"><span data-dcnode-id="2140" instrument_node="">video</span></a><span data-dcnode-id="2138" instrument_node="">, CSAIL only)</span></span></b></b></p><span data-dcnode-id="2133" instrument_node="">
</span><blockquote data-dcnode-id="2100"><p class="gmail-m_-975184434121922608gmail-p1" data-dcnode-id="2127"><b data-dcnode-id="2128"><b data-dcnode-id="2129"><span data-dcnode-id="2130" style="font-size: 13px;"><span data-dcnode-id="2131" style="font-size: 12.8px;"><span data-dcnode-id="2132" instrument_node="">We are witnessing a profusion of networked robotic platforms with distinct features and unique capabilities. To realize the full potential of such networked robotic systems, we need to leverage heterogeneity and complementarity through collaborative mechanisms. However, as connections are established, information is shared, and dependencies are created, these systems give rise to new vulnerabilities and threats.</span></span></span></b></b></p><span data-dcnode-id="2126" instrument_node="">
</span><p class="gmail-m_-975184434121922608gmail-p2" data-dcnode-id="2122"><b data-dcnode-id="2123"><b data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2121" instrument_node="">
</span><p class="gmail-m_-975184434121922608gmail-p2" data-dcnode-id="2115"><b data-dcnode-id="2116"><b data-dcnode-id="2117"><span data-dcnode-id="2118" style="font-size: 13px;"><span data-dcnode-id="2119" style="font-size: 12.8px;"><span data-dcnode-id="2120" instrument_node="">To motivate the central questions of diversity, privacy, and resilience, I begin by presenting my experimental work on collaborative positioning with networked teams of robots. As the need for system-wide protection mechanisms becomes evident, I introduce a privacy model that quantifies how much is revealed to external observers about critical robotic entities and their specific interactions. My focus then shifts to the question of how to provide resilience through precautionary collaboration mechanisms, allowing robot teams to function in the presence of defective and/or malicious robots. Finally, I address the question of how to formalize diversity in the context of heterogeneous robot teams, with insights that pertain to performance.</span></span></span></b></b></p><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2110" wrap=""><b data-dcnode-id="2111"><b data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2109" instrument_node="">
</span><p data-dcnode-id="2102" wrap=""><b data-dcnode-id="2103"><b data-dcnode-id="2104"><span data-dcnode-id="2105" style="font-size: 13px;"><strong data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Bio:</span></strong><span data-dcnode-id="2106" instrument_node=""> Amanda Prorok is currently a Postdoctoral Researcher in the General Robotics, Automation, Sensing and Perception (GRASP) Laboratory at the University of Pennsylvania, where she works with Prof. Vijay Kumar on heterogeneous networked robotic systems. She completed her PhD at EPFL, Switzerland, where she addressed the topic of localization with ultra-wideband sensing for robotic networks. Her dissertation was awarded the Asea Brown Boveri (ABB) award for the best thesis at EPFL in the fields of Computer Sciences, Automatics and Telecommunications. She was selected as an MIT Rising Star in 2015, and won a Best Paper Award at BICT 2015.</span></span></b></b></p><span data-dcnode-id="2101" instrument_node="">
</span></blockquote><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2085"><b data-dcnode-id="2086"><b data-dcnode-id="2087"><span data-dcnode-id="2088" style="font-size: 13px;"><span data-dcnode-id="2098" instrument_node="">Dec 6, </span><a data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.robotmotionplanning.org/"><span data-dcnode-id="2097" instrument_node="">Erion Plaku</span></a><span data-dcnode-id="2095" instrument_node="">, Catholic University of America), </span><em data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">From High-Level Tasks to Robot Motions: Combined Task and Motion Planning as Hybrid Search over Discrete and Continuous Spaces </span></em><span data-dcnode-id="2092" instrument_node="">(</span><a data-dcnode-id="2090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/524"><span data-dcnode-id="2091" instrument_node="">video</span></a><span data-dcnode-id="2089" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="2084" instrument_node="">
</span><blockquote data-dcnode-id="2061"><p class="gmail-m_-975184434121922608gmail-p1" data-dcnode-id="2078"><b data-dcnode-id="2079"><b data-dcnode-id="2080"><span data-dcnode-id="2081" style="font-size: 13px;"><span data-dcnode-id="2082" style="font-size: 12.8px;"><span data-dcnode-id="2083" instrument_node="">As robots are deployed into less and less structured environments, it becomes increasingly important to enhance their ability to complete high-level tasks with little or no human intervention. Whether the task is to search, inspect, or navigate to target destinations, it generally involves decomposing it into discrete, logical actions, where each discrete action often requires complex collision-free and dynamically-feasible motions in order to be implemented. This talk will discuss our research efforts on a computationally-efficient framework and a formal treatment of the combined task and motion- planning problem as search over a hybrid space consisting of discrete and continuous components. The framework makes it possible to specify high-level tasks via Finite State Machines, Linear Temporal Logic, and Planning-Domain Definition Languages and automatically computes collision-free and dynamically-feasible motions that enable the robot to accomplish the assigned task. Applications in autonomous underwater vehicles will be highlighted.</span></span></span></b></b></p><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2073" wrap=""><b data-dcnode-id="2074"><b data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2063" wrap=""><b data-dcnode-id="2064"><b data-dcnode-id="2065"><span data-dcnode-id="2066" style="font-size: 13px;"><strong data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Bio:</span></strong><span data-dcnode-id="2069" instrument_node=""> Erion Plaku is an Associate Professor in the Department of Electrical Engineering and Computer Science at Catholic University of America. He received his Ph.D. degree in Computer Science from Rice University in 2008. He was a Postdoctoral Fellow in the Laboratory for Computational Sensing and Robotics at Johns Hopkins University during 2008—2010. Plaku's research is in Robotics and Artificial Intelligence, focusing on enhancing automation in human-machine cooperative tasks in complex domains, such as mobile robotics, autonomous underwater vehicles, and hybrid systems. His research is supported by NSF Intelligent Information Systems, NSF Software Infrastructure, and the U.S. Naval Research Laboratory. More information, including publications, research projects, open-source software he has developed for robot motion planning, and educational materials can be found at </span><a data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.robotmotionplanning.org/"><span data-dcnode-id="2068" instrument_node="">http://www.robotmotionplanning.org</span></a></span></b></b></p><span data-dcnode-id="2062" instrument_node="">
</span></blockquote><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2046"><b data-dcnode-id="2047"><b data-dcnode-id="2048"><span data-dcnode-id="2049" style="font-size: 13px;"><span data-dcnode-id="2059" instrument_node="">Nov 29 - </span><a data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www-clmc.usc.edu/Main/AlexanderHerzog"><span data-dcnode-id="2058" instrument_node="">Alex Herzog</span></a><span data-dcnode-id="2056" instrument_node="">, Max-Planck Institute for Intelligent Systems, </span><em data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Momentum-centric whole-body control and kino-dynamic motion generation for floating-base robots </span></em><span data-dcnode-id="2053" instrument_node="">(</span><a data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/523"><span data-dcnode-id="2052" instrument_node="">video</span></a><span data-dcnode-id="2050" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="2045" instrument_node="">
</span><blockquote data-dcnode-id="2013"><p class="gmail-m_-975184434121922608gmail-p1" data-dcnode-id="2039"><b data-dcnode-id="2040"><b data-dcnode-id="2041"><span data-dcnode-id="2042" style="font-size: 13px;"><span data-dcnode-id="2043" style="font-size: 12.8px;"><span data-dcnode-id="2044" instrument_node="">Humanoid robots with torque control capabilities are becoming increasingly available in our research community. These robots allow for an explicit control of contact interactions which have the potential to allow robots locomote through difficult terrains. In order to accomplish tasks under balance and contact constraints, whole-body planning and control strategies are required to generate motion and force commands for all limbs efficiently.</span></span></span></b></b></p><span data-dcnode-id="2038" instrument_node="">
</span><p class="gmail-m_-975184434121922608gmail-p1" data-dcnode-id="2034"><b data-dcnode-id="2035"><b data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2033" instrument_node="">
</span><p class="gmail-m_-975184434121922608gmail-p2" data-dcnode-id="2027"><b data-dcnode-id="2028"><b data-dcnode-id="2029"><span data-dcnode-id="2030" style="font-size: 13px;"><span data-dcnode-id="2031" style="font-size: 12.8px;"><span data-dcnode-id="2032" instrument_node="">Model-based control in combination with numerical optimization is becoming a reliable tool for efficient control of complex tasks on floating-base robots. In the first part of my talk I will discuss hierarchical inverse dynamics, a control framework that allows for the composition of complex behaviors from a hierarchy of simpler tasks and constraints. We use cascades of quadratic programs to resolve task hierarchies into joint torques in a 1kHz feedback-loop on our torque controlled humanoid. In our experiments we control the momentum of the robot embedded into a hierarchy of tasks and constraints leading to robust push recovery on our robot.</span></span></span></b></b></p><span data-dcnode-id="2026" instrument_node="">
</span><p class="gmail-m_-975184434121922608gmail-p2" data-dcnode-id="2022"><b data-dcnode-id="2023"><b data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">&nbsp;</span></b></b></p><span data-dcnode-id="2021" instrument_node="">
</span><p class="gmail-m_-975184434121922608gmail-p2" data-dcnode-id="2015"><b data-dcnode-id="2016"><b data-dcnode-id="2017"><span data-dcnode-id="2018" style="font-size: 13px;"><span data-dcnode-id="2019" style="font-size: 12.8px;"><span data-dcnode-id="2020" instrument_node="">In the second part of my talk I will discuss our kino-dynamic motion generation approach for the full body. We solve an optimization program to obtain whole-body joint and contact force trajectories over a horizon that consider the full robot dynamics and contact constraints. We decompose this non-convex optimization problem into two better structured mathematical programs that are solved iteratively with better informed solvers. Our analysis reveals structure in the centroidal momentum dynamics of floating-base robots that leads to new efficient solvers on the full humanoid model. We can improve the speed of naive off-the shelf solvers by an order of magnitude and phrase direct shooting methods on centroidal dynamics with linear time complexity.</span></span></span></b></b></p><span data-dcnode-id="2014" instrument_node="">
</span></blockquote><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="1998"><b data-dcnode-id="1999"><b data-dcnode-id="2000"><span data-dcnode-id="2001" style="font-size: 13px;"><span data-dcnode-id="2011" instrument_node="">Nov 22 - </span><a data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ipvs.informatik.uni-stuttgart.de/mlr/marc/index.html"><span data-dcnode-id="2010" instrument_node="">Marc Toussaint</span></a><span data-dcnode-id="2008" instrument_node="">, Uni Stuttgart, </span><em data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Challenges in Robotic AI </span></em><span data-dcnode-id="2005" instrument_node="">(</span><a data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//replay.csail.mit.edu/recordings/521"><span data-dcnode-id="2004" instrument_node="">video</span></a><span data-dcnode-id="2002" instrument_node="">)</span></span></b></b></p><span data-dcnode-id="1997" instrument_node="">
</span><blockquote data-dcnode-id="1979"><p data-dcnode-id="1992"><b data-dcnode-id="1993"><b data-dcnode-id="1994"><span data-dcnode-id="1995" style="font-size: 13px;"><span data-dcnode-id="1996" instrument_node="">There recently is, again, substantial optimism about AI. While I welcome and share the general enthusiasm, I believe that the great advances in machine learning and data-driven methods alone cannot solve fundamental problems in real-world robotic AI. A core challenge remains to capture and formalize essential structure in real-world decision making and manipulation problems, and thereby provide the foundation for sample-efficient learning. In this talk I will discuss three concrete pieces of work in this context: autonomously exploring the environment to learn what is manipulable and how; learning manipulation skills from few demonstrations; and learning sequential manipulation and cooperative assembly from demonstration. All three applications raise fundamental challenges especially w.r.t. the problem formulation and thereby guide us in what we think are interesting research questions to progress the field towards robotic AI.</span></span></b></b></p><span data-dcnode-id="1991" instrument_node="">
</span><p data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1988" instrument_node="">
</span><p data-dcnode-id="1981"><b data-dcnode-id="1982"><b data-dcnode-id="1983"><span data-dcnode-id="1984" style="font-size: 13px;"><strong data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Bio:</span></strong><span data-dcnode-id="1985" instrument_node=""> Marc Toussaint is full professor for Machine Learning and Robotics at the University of Stuttgart since 2012. Before that he was assistant professor at the Free University Berlin, leading an Emmy Noether research group at TU Berlin, and spend two years as a post-doc at the University of Edinburgh. His research focuses on the combination of decision theory and machine learning, motivated by research questions in robotics. Reoccurring themes in his research are appropriate representations (symbols, temporal abstractions, relational representations) to enable efficient learning and manipulation in real world environments, and how to achieve jointly geometric, logic and probabilistic learning and reasoning. He currently is coordinator of the German research priority programme on Autonomous Learning, member of the editorial board of the Journal of AI Research (JAIR), reviewer for the German Research Foundation, and programme committee member of several top conferences in the field (UAI, R:SS, ICRA, IROS, AIStats, ICML). His work was awarded best paper at R:SS'12, ICMLA'07 and runner up at UAI'08.</span></span></b></b></p><span data-dcnode-id="1980" instrument_node="">
</span></blockquote><span data-dcnode-id="1978" instrument_node="">
