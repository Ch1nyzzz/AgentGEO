“Squid Game”: An Ugly Reflection
Of Human Nature</span></p><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Television
You’re in a room with a
playground. There are cotton
candy clouds painted on blue walls,
a sand pit, and a large animatronic
girl far ahead, with her back facing
you, flanked by men in red suits
and black masks. You look around
and see others wearing bright green
tracksuits with flashing numbers.
The girl begins to sing a song,
sparking some long-lost memory
within you. You know this game;
you’ve played it before.
“Red light, green light…”
You begin to walk with the others
until the girl turns around and
you freeze. You scoff internally––
why a children’s game? Then, the
person in front of you moves, a
near imperceptible turn of the
head, and a loud gunshot rings out.
The person drops to the ground,
blood staining the sand. Chaos
ensues, and the game has begun.
“Squid Game” is Netflix’s
newest addition to its ever-growing
collection of Korean dramas and
is its most popular yet, being the
first to top Netflix’s US charts. So
what exactly is captivating about
the show?
The series revolves around a
group of people who have fallen on
desperate times and need a quick
payout. When these individuals are
offered the chance to play a few
games to make almost $40 million
by a mysterious benefactor, they
jump at the opportunity. However,
the games have a horrifying twist:
if you lose, you die. After this
revelation, “Squid Game” turns
into a test of survival and luck
with the only way out being to win.
But as friendships form and bodies
begin to pile up, the lengths the
participants must go to win only
grow more complicated.
The show opens with a
divorced father, Seong Gi-Hun
(Lee Jung-jae), who is drowning in
debt and decides to participate in</span></p><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Film
By ASA MUHAMMAD
The hood classic is dying, and I
don’t know how to feel. In order to
address this death, we should first
define the relatively vague term of
“the hood classic.” What’s so hood
about the movie? What makes it
classic? The hood classic really only
has three parameters, two of which
regard the production of a film:
I. The hood classic must be
made for the hood.
II. The hood classic must be
made by the hood (or at least have
authentic ties to it).
III. The hood classic must be
embraced by the hood.
A movie must meet all three
of the requirements in order to be
considered a hood classic, so movies
like “Scarface” (1983) and “Dragon
Ball Super: Broly” (2018) that have
entered hood canon don’t count
because they were made neither by
the hood nor for the hood. Movies
like any of the “Friday” sequels
don’t count simply because the
hood didn’t embrace them (for good
reason).
While it’s difficult to define the
hood in concrete socioeconomic
terms, you can imagine any
traditionally
underserved
neighborhood that has multiple
bodega-adjacent
establishments
with either plexiglass or barred
windows. These establishments are
rarely Black-owned (see “Menace
II Society” (1993), “Do the Right
Thing” (1989)). The distinction
between the hood as a community
and the Black community is</span></p><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">the games in order to be financially
stable enough to share custody of
his daughter. As he continues on in
the games, he forms alliances with
some of his fellow contestants,
including Sae-Byeok (Hoyeon
Jung), a tough North Korean
refugee, Cho Sang-Woo (Park Hae
Soo), a cunning businessman and
Gi-Hun’s childhood friend, Oh Ilnam (Oh Young-soo), an old man
who is dying of a brain tumor, and
Abdul Ali (Anupam Tripathi), a
naive immigrant from Pakistan.
The pacing of the show starts
off slow as it carefully sets up</span></p><p data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">more and more desperate. The
games themselves are children’sfare like “Red Light, Green Light”
and “Tug of War,” satirizing the
innocent significance they played
in our childhoods and contrasting
them with the brutal reality of
the present. The mystery of who
is actually behind the games also
intensifies as the games’ history
and origin are revealed little by little
through Joon Ho (Wi Ha-joon), an
undercover police officer who is in
charge of investigating the game.
The characters are a high point
of the show and add a surprising</span></p><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">its characters and introduces the
audience to the premise of the
game. But as the show progresses
and the stakes get higher, things
fall apart quickly. With each
passing game, participants become</span></p><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">sentimentality to an otherwise
action-filled show. In fact, the
series goes quite in depth with each
character’s story, especially with
their unique motives for wanting to
win the game. However, the game</span></p><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Jasmine Wang / The Spectator</span></p><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">By NICOLE LIU</span></p><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">itself brings out the worst qualities
in these characters. As a result, the
audience is often torn between
empathizing with the characters
and hating them.
The backstories of the
characters also reflect presentday situations that many people
in the real world find themselves
in. For example, Ali is a Pakistani
immigrant who is discriminated
against in his workplace, a problem
that is prevalent in today’s world.
In addition, Sae-Byeok is a refugee
who was separated from her
family, which is another pressing
global problem. The proximity
that these stories have to reality
further emphasizes how the game
and the people serve as a reflection
of humans and their willingness to
survive in a harsh world.
“Squid Game” also expertly
displays the emerging relationships
between the contestants and the
quick bonds that are eventually
fragmented by the pressure of the
games. An uneasy trust blooms
between the contestants despite
their differences, encouraged by
their determination to survive.
Even through the tension, there are
heartwarming moments between
the members of the group as they
work to keep each other alive and
sane.
The general unease surrounding
the game is bolstered by the show’s
color scheme and setting. When
the players first agree to participate
in the games, they wake up in an
underground bunker, devoid of
any furniture besides beds that
are gradually taken away as more
and more players die. The bunkbeds themselves resemble storage
shelves in a warehouse, further
emphasizing the expendability of
the players once their usefulness
in the games have run out. At the
very end of the show, the nearly
empty room serves as a melancholy
reminder of those who had passed.
The bunker room itself has a</span></p><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">very minimalistic, utilitarian gray
scheme, while the games take place
in bright pastel rooms, juxtaposing
the harsh reality of the games with
a cheery facade.
Additionally, the show often
incorporates vibrant block colors
into its background, such as the
green uniforms of the players and
the red suits of the workers, or
the pink bows on gift-resembling
coffin boxes of those who have
died playing the game. These colors
convey a childlike feel, highly
reminiscent of a playground.
Throughout the show, the audience
also sees glimpses of brightly
colored stairs, which symbolize the
contestants’ need to climb up in
society from underground. These
maze-like stairs further add to
the absurdity and the disorienting
feeling of the whole situation.
“Squid Game” also boasts an
especially memorable soundtrack.
The songs add tremendously to
the overall unease and childhood
nostalgia of the show. One of the
songs, “Way Back When,” contains
a distinctive flute sound that
harkens back to the innocence of
youth. Since this particular song is
often played as a motif during the
dangerous games depicted in the
show, the dissonance between the
innocence of childhood and the
current violent reality continues
even in the music.
A disturbing reflection of
society, “Squid Game” is a thrilling
dark satire that makes viewers
question whether we too might
resort to such lengths in a similar
situation. Though the desperate
lengths the characters go to in
order to win may seem far-fetched
at times, there are debtors and
powerless people all around us,
held stagnant by the economic and
social structures that determine
our lives. To what extent are these
characters ourselves, and the Squid
Game our world?</span></p><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">The Death of the Hood Classic
important because the death of the
hood classic seems to come at the
heels of the golden age of Black
cinema.
The nineties were a particularly
good era for hood film. John
Singleton perfected the formula
with his 1991 hit “Boyz in the
Hood,” which addressed the
primary demographic for what
would become known as hood films
in an original way. Singleton proved
stories of inner-city violence could
be portrayed on screen with a sense
of nuance and tragedy and still be
commercially viable. In the same
year, “New Jack City” was released,
chronicling the rise of the crack
epidemic through the lens of an
entrepreneurial drug dealer. While it
did not serve as a glorification of the
crack era, “New Jack City” represents
the genesis of another hood classic
formula: the Black mafia movie.
These two developments galvanized
the golden age of hood cinema
(1991-2002), and subsequent movies
generally fluctuated somewhere
between these two archetypes,
producing films like Tupac Shakur’s
breakout acting role “Juice” (1992),
the Hughes Brothers’ directorial
debut “Menace II Society,” and rap
album turned feature film “Paid in
Full” (2002), which bookended the
era.
While John Singleton was able
to pave the way for hood crime
dramas, there were still stories of
hood domesticity to be told, and
so Singleton once again attempted
to break barriers with his 1993
film, “Poetic Justice,” following a</span></p><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">romance between Janet Jackson and
Tupac Shakur. By 1995, the hood
movie had solidified itself with
gritty depictions of life in American
ghettos, and so the ensemble comedy
“Friday” was born as a much needed
reprieve from the angst.
While known for having
launched Ice Cube’s controversial
acting career, “Friday” also marks
a turning point in film history. The
hood movie could now be about
anything, which led to more diverse
offerings. “The Wood” (1999),
directed by Rick Famuyiwa became
a coming-of-age hood wedding
movie, and Eminem’s “8 Mile”
(2002) became the first white hood
movie.
The diversification of the hood
movie is what ultimately led to its
death. The 2000s bore a tragicmany hood movies, whilst yielding
very few hood classics, but this
diversification also led to new kinds
of Black stories being told, and it
was that genesis that brought us into
the new age of Black film starting
with “Precious” (2009). “Precious,”
a film very much set in the hood, is
an authentic depiction of the tragedy
of a child fallen through the cracks
of flawed welfare and education
systems. The reason “Precious” isn’t
a hood classic might just be because
it’s too authentic.
“Precious” is a hard-to-watch,
upsettingly tragic movie. “Precious”
serves to address the failings of our
government, and of the community,
but it does so without the reprieve
of comedic relief or the exhilaration
of gun violence, and so it joins the</span></p><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">pantheon of one of the greatest, and
saddest hood films ever made, but
without actually becoming a hood
classic. It’s simply too inaccessible,
not by virtue of any avant-garde
storytelling, but by subject matter.
While “Precious” serves to
demonstrate an evolution in Black
storytelling, it’s not a true bookend
to the genre of the hood classic. The
final hood classic is “Dope” (2015).
Though not a commercial success,
Rick Famuyiwa’s “Dope” is a final
goodbye to hood films as a genre. It
hits all the beats of a hood classic
but all the while deconstructing the
idea of a Black monolith. The film,
featuring Pharrell-authored poppunk, centers around protagonist
Malcolm who is in a band aptly
named “Awwreeoh.” “Dope” was
premiered in the indie movie circuit,
meaning that while it is a hood
classic, it marks as a departure from
the formulaic hood movies of the
past, not by actually departing from
the formula, but by injecting it with
new ideas on what the “hood” can
be. Black artists notable for having
pushed that boundary before join
the film, including A$AP Rocky,
aforementioned Pharrell Williams,
and Sean Combs in his “Puff
Daddy” era. The film is a love letter
to the hoods of Los Angeles, but it
also has white actor Blake Anderson,
and that multifaceted approach is
what ushered in a new era of Black
filmmaking.
The following year, Barry
Jenkins released “Moonlight,” which
also hits every hood classic trope
(drugs, crime, poverty), only now</span></p><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">bolstered by long shots, color theory,
and the overall arthouse aesthetic. It
uses techniques foreign to its genre,
and in doing so, alienates the hood
classic demographic. That alienation
in style makes it that much harder to
sell the substance of the film. In a
genre riddled with toxic masculinity,
how can you address homosexuality
and maintain the same audience?
The movie is still definitely a Black
coming of age story and so the
question arises: who is it for?
As Black cinema evolves, it
brings with it new possibilities, but
as new niches are explored, old
audiences are left behind. Movies
like “The Last Black Man in San
Francisco” (2019) portray images
of masculine friendship largely
construed as homoerotic, and
that theme of platonic intimacy is
offputting for some, and through
those themes a story of family and
community is built. All the while,
nothing really happens because it’s a
character study.
This diversity in storytelling is a
good thing. The expansion of what
a “Black” movie can be is really what
“diversity” in Hollywood should be.
There’s no function in having tons
of hood movies/Black movies/
whatever if they’re all the same
(Tyler Perry may disagree), and this
evolution has led artists to explore
their work outside the confines of
one genre: “The Black Movie” or
“The Hood Movie,” which have
historically been interchangeable.
As such, I haven’t found the time to
mourn the death of the hood classic.</span></p></section><hr data-dcnode-id="761"><section aria-label="Page 19" data-dcnode-id="734"><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">The Spectator ● October 15, 2021</span></p><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Page 23</span></p><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Arts and Entertainment

NBA</span></p><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">The Bens Simmons Situation
second round. Many people picked
the 76ers to win the series in five or
six games. They simply had more star
power (center Joel Embiid is more

What fans hadn’t anticipated was

If you’ve been following the
National Basketball Association
(NBA) in recent years, you probably
know who Ben Simmons is. He was
the number one pick in the 2016
draft, 2018 Rookie of the Year, and
widely considered one of the best
defenders and passers in the league.
He’s also known as one of the worst
shooters in the league, becoming
the butt of jokes and subject of
memes across social media. In the
2021 Playoffs, Simmons showed
us that his shooting problems are
too large to ignore. The top seeded
Philadelphia 76ers faced off against
the fifth seeded Atlanta Hawks in the</span></p><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">The 76ers led the game most
of the way throughout, but, in the
fourth quarter, the Hawks made a
surge with their efficient three-point
shooting. With around three minutes
remaining, Simmons passed up an
open dunk over the much smaller
Trae Young and sent his teammate
to the line. That moment right there
summed up Simmons’s entire series:
he was scared of the moment, and he
passed up an open dunk on his home
court. After the game, 76ers coach
Doc Rivers said he didn’t know if
Simmons could be a championship
point guard on their team.
Some may see this remark as
inappropriate coming from a coach,
but others see it as motivation.</span></p><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Simmons’s reaction has been
underwhelming at best. He recently
announced that he never wants to
play in a 76ers uniform again, and
he is not showing up for this year’s
training camp.
Simmons is not doing his
job. You get paid millions to play
basketball, so play it. The ball is quite
literally in Simmons’s court. The
best course of action now is for him
to respond with aggression (on the
court), come back a different man,
and remind the fans that he can be
their championship point guard.
Where do the Sixers go from
here? Simmons and General Manager
Daryl Morey both look to be standing
their ground. Simmons doesn’t want</span></p><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">to play, and Morey doesn’t want to
trade him for less than he is worth.
A possible trade could be Simmons
for the Brooklyn Nets’ Kyrie Irving.
The Nets have enough offensive star
power with Kevin Durant and James
Harden, and Simmons could be the
defensive anchor who sets them
up for the future and makes them
better. For the 76ers, Irving could
be an extremely skilled point guard
with elite ball handling, shooting,
and finishing, the perfect pick and
roll partner for Embiid. However,
it appears as though this trade will
likely not go through. All fans can
hope is that Simmons bucks up and
comes back as the player they expect
him to be.</span></p><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Football</span></p><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">New Season, New Challenges for the Peglegs
Down 22-14 during the final
seconds of regulation, the Stuyvesant
Peglegs knew that they had one last
shot to score and force the game into
overtime. Inside the Sheepshead Bay
Sharks’ 10-yard line and with parents,
students, and coaches nervously
watching from the sidelines, the
Peglegs broke out of their huddle
and lined up against their opponents.
Junior quarterback Adam Sherer
took his position directly behind the
center. At his call, Sherer received
the snap and ran it by himself down
the middle, weaving and dodging
opponents as he battled his way
toward the endzone for a touchdown.
Now, all the Peglegs needed was a
two-point conversion to tie the game
and send it into overtime. The ball
was snapped once again and tossed
back to junior running back Sam
Glusker, who ran it down the right
crease into the endzone.
With this game-tying play, the
Peglegs forced their opponents,
the undefeated Sheepshead Bay
Sharks, into OT during their
game on October 1. Though they
ultimately fell short in a thrilling
double overtime finish, the game was
indicative of the Peglegs’ resilience
and positive start to the season.
Down 22-8 in the third quarter, the</span></p><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Peglegs were persistent and slowly
worked play-by-play to get back into
the game against the Sharks, one of
the top teams in the division. “We
got another week of practice ahead
of us. We’re going to practice hard
[and] practice long. This is the topranked team in the division. Next</span></p><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">key starters due to injuries. Senior
running back George Lin, who was
essential to the Peglegs’ rushing
game, is out for the rest of the season
with a knee injury, and co-captain
and senior wide receiver Tolan
Aksay suffered a dislocated shoulder,
which has limited his playing time.</span></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">week should be better,” Sherer said.
Their competitiveness against
the top-ranked opposing team was
especially impressive considering
that the Peglegs were missing several</span></p><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">These injuries challenged the depth
of the team and forced reserves to
make plays in situations that they
weren’t accustomed to. Fortunately,
this obstacle wasn’t a major setback</span></p><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Zifei Zhao / The Spectator</span></p><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">By TAEE CHI and
JULIAN DURAN</span></p><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">for the Peglegs. “We’re a really deep
team, so we can fill those roles pretty
well […] We’ll continue to work
just as hard with whoever we have,”
Glusker said.
This positive outlook is one that
resonates among all the players on
the team. Given the daunting task of
facing two undefeated teams in backto-back weeks, the Peglegs remained
focused and driven. Whether facing
off against the Sheepshead Bay
Sharks team this week or the Dewitt
Clinton team in the previous game,
the mindset remained the same:
battle on every snap. “We try to be
a team with a short memory. We go
into every drive [and] every snap like
it’s 0-0,” Glusker said.
The Peglegs currently stand
with a 1-2 record after their loss to
Sheepshead Bay High. The Peglegs’
first PSAL game in nearly two years
was against William E. Grady High
School, which saw the Peglegs
dominate their opponents 22-0. The
team played well on offense, torching
Grady’s defense for 119 passing yards
and 146 yards on the ground. The
biggest highlight of the game was
senior wide receiver Phillip Phan’s
61-yard touchdown reception. His
fellow senior and co-captain William
Woodruff also played a key role in the
passing game, tallying five receptions
for 57 yards. On the other side of
the ball, Woodruff significantly led</span></p><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">the defense with nine tackles (three
of which were for a loss). Lin and
senior Yaqin Rahman also compiled
tackles for loss, which helped lead the
Peglegs to a commanding win.
The Peglegs’ second game against
Dewitt Clinton highlighted the team’s
aptitude for passing the ball as they
tallied a total of 103 passing yards
with 7.92 passing yards per play.
Woodruff once again led the team
in total receiving yards, tallying 87
yards from three receptions. Where
the team fell short, however, was in
total rushing yards (30 compared
to their opponent’s 318). Though
the final score indicated a lopsided
match, the Peglegs were hanging with
the opposing team and making it a
closely contested game entering the
fourth quarter. “Our defense is solid.
We held Clinton to eight points in the
first half,” Phan said.
During a time when the players
can easily become unmotivated and
distracted, the Peglegs have done
a good job staying determined and
working on improving in all aspects
of their game. With the overall
positive start to the season, the team
is optimistic about its remaining
games.
“We expect to win the remaining
games in the regular season, and we
plan on carrying that momentum
into the playoffs. From there, we’ll
see what happens,” Phan said.</span></p><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Girls’ Soccer</span></p><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">The Mimbas Are Prancing Their Way to Victory
After leading for three quarters
of the game against one of its rivals,
Beacon High School, the Mimbas,
the Stuyvesant girls’ varsity soccer
team, conceded the equalizing goal. It
may have been easy for the Mimbas,
who had dominated possession
throughout the game, to just fold
and play for a draw. However, they
refused to give in. With eight minutes
left and anxiety exuding from the
Stuyvesant sideline, the ball took
a deflection off an errant pass into
the box. Junior and co-captain Susie
McKnight was there to clean up the
rebound and bury the ball into the
back of the net for the game-winning
goal.
Going into the season, the
Mimbas were thrilled to finally get
back onto the field together. After
a COVID-19-ridden fall saw the
Mimbas lose out on their season last
year, they were excited to compete on
the pitch once again. However, due
to the unusual nature of last season,
the Mimbas needed time to adjust to
their changes in personnel. Despite a
strong returning core led by leading
goal-scorer and senior co-captain
Lucinda Bryce, the Mimbas have only
nine upperclassmen, who had limited
varsity experience as underclassmen.
Nine upperclassmen is the lowest</span></p><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">count for the Mimbas in many years.
Even with their expected rust, the
girls were happy that they came out
of the gates strong and put together
an impressive showing in their first
four matches. They ended September
with a 2-1 record. Despite their
strong start, which has the Mimbas
fifth in their 13-team Manhattan A
division, they still recognize that their
weaknesses, specifically defensively,
must be corrected in order to become
the team they want to be.
In two of their first three
matches, particularly against Lab
Museum United and LaGuardia
High School, the Mimbas were able
to use their offensive firepower to
take commanding leads. Led by
Bryce, who is attempting to follow
up her 17-goal sophomore year
campaign, with seven goals through
help from McKnight, senior Shivali
Korgaonkar, and junior Alessandra
Colagreco-Knight, the Mimbas were
able to outscore their opponents 12-1
over their first two wins. The team
utilized its speed and athleticism to
blow out the opposition.
Between the games against
LaGuardia and Lab, the Mimbas
were tested defensively for the first
time in the season against Bard High
School. The game started out rocky.
Defensive lapses, specifically around
the box, and the Mimbas’ tendency
to concede corners created easy</span></p><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">scoring chances for Bard. Though
the game ended in a 3-1 loss, the
Mimbas built off their strong second
half performance in order to learn</span></p><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">mental approach to the game in
order to provide an example for
the underclassmen. The captains
have been encouraging the team</span></p><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">and improve.
“Right now our biggest
weaknesses are transition defense and
connecting passes from the defense
to the midfield […] Against Bard, we
conceded too many corners,” Bryce
said. Her comments are reflected
in the fact that the team allowed a
season-high three goals against Bard.
The upperclassmen on the
team also want to instill a stronger</span></p><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">to be stronger on the ball and
more resilient in chasing it. “[Bard]
beat us to every 50/50 ball […]
We need to be more aggressive,”
McKnight said. Winning possession
for the team will allow more time
to construct a strong attack while
limiting the time opponents have to
create offensive opportunities. The
possession battle, often determined
by the aforementioned 50/50 balls, is</span></p><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Francesca Nemati / The Spectator</span></p><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">By ETHAN KIRSCHNER
and BEN HAMEL</span></p><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">a strong indicator of which team is
controlling the game.
The Mimbas seemed to carry
their captains’ message into their
game against Bronx Science High
School. While they were hoping
for a win, the game ended in a 1-1
tie. However, the team’s defensive
performance certainly represented
a step in the right direction. The
young defensive line for the Mimbas
stepped up to the task against a
formidable opponent, which was a
success for the team.
In their past two contests, against
the quality Hunter College High
School and Beacon High School
teams, the up-and-down nature of
the season continued. It seemed
that the team may have taken a step
back with the loss to Bard. But, the
team showed its progress in a 2-1
win against reigning city champion
Beacon. For its confidence and
playoff standing, the Beacon victory
meant a lot to the team.
As the season progresses,
the Mimbas will continue to gain
experience, particularly in the
defensive end. As inexperienced
defenders adapt to the pace of high
school soccer and pick up on the
tendencies of opponents’ strikers,
they will continue to improve. The
Mimbas hope to continue to make
history and improve defensive play
into the playoffs.</span></p></section><hr data-dcnode-id="561"><section aria-label="Page 24" data-dcnode-id="522"><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Page 24</span></p><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">The Spectator ● October 15, 2021</span></p><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">THE SPECTATOR SPORTS
Boys’ Soccer</span></p><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">A Strong Start for the Peglegs
The game had dragged on
for more hours than goals on
the scoreboard. It certainly
seemed to both spectators and
the team itself that the boys’
soccer Peglegs’ grueling trial
against the High School for
Math, Science, and Engineering
(HSMSE) would end in a tie.
As overtime began, the team
stepped onto the field with low
hopes and high tensions. But
those feelings didn’t stop them
from giving the game their all.
The Peglegs tapped into a supply
of energy, and co-captain and
senior Mathias Melucci moved
the ball down the wing, setting
up junior Ryan Petrauskas for
the header that won the game
within one minute of overtime.
It was here, with their first win
under the belt, that the Peglegs’
promising season really began.
After over a year away
from the sport, the Peglegs,
Stuyvesant’s boys’ varsity soccer
team, has returned with a
winning mentality. Led by cocaptains and seniors Benjamin
Hamel, Melucci, and Leo Rahn,
the Peglegs have started off the
season strong with five wins,
one loss, and one tie.
At the outset of the season,
the team faced a 5-0 loss against
Martin Luther King Jr. High
School. However, the squad did
not let this setback inhibit their
potential. Rallying together for
its next game, the team narrowly</span></p><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">defeated the HSMSE. All three
captains deemed this game their
most important win so far. “Our
victory against HSMSE gave us
momentum that set the tone to
win our next three games after</span></p><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">team after a lot of playing time,
both in games and at practice.
Coach Vincent Miller pointed
out their improvement in
scoring. “Our goals have started
to pick up, especially thanks to</span></p><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">the loss,” Rahn said.
Rahn’s statement proved
true as they defeated their next
three opponents by a margin
of at least three goals, and
one opponent by 10 goals.
Throughout these games, the
team has improved immensely.
“It took a while to figure out
ideal positioning on the field
and build confidence, but once
we did, we saw our playing
quality multiply,” Hamel said.
These developments in
chemistry have come to the</span></p><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">juniors Aden Garbutt, Patrick
Kawulok, [...] Petrauskas, and
Jack Colvin,” he said. Each
player he named has upwards
of four goals.
The game against Beacon
High School on October 4
was a chance for the Peglegs
to prove themselves against a
team with a strong reputation.
Though the Peglegs’ winning
streak was great for morale and
team chemistry, from Beacon
onward, they will be facing
historically harder opponents.</span></p><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Dorin Flocos / The Spectator</span></p><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">By ROXIE GOSFIELD
and SUSIE MCKNIGHT</span></p><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">The upcoming games present
multiple opportunities for
the team to demonstrate
its strength, chemistry, and
perseverance, rather than just its
scoring ability.
While the team hoped for a
win against Beacon, the game
resulted in a 0-0 tie. Dominating
possession and moving off each
other and the ball, the Peglegs
were able to open channels in
Beacon’s midfield and defense,
resulting in opportunities to
attack on goal. With the Peglegs’
back line serving as a brick
wall, they shut down almost
all of Beacon’s attempts to go
forward and distributed the ball
out quickly in order to maintain
possession. The midfield was
then able to build from there,
utilizing both central and wide
players to effectively stretch out
the opposing team’s defense,
which created space and time
for Garbutt, the striker, to
attack. Though Stuy had plenty
of shots on net, many of them

Nevertheless, the Peglegs’
ability to hold off a strong
team like Beacon is a testament

“I think we played really well
in that game. It was our best

However, we need to finish our

Looking
forward,
the
Peglegs want to focus on two

So far, the Peglegs have

of improvement, excitement,
and potential. However, the

soccer, the guys and I have
had so many laughs and good
times,” Miller said.</span></p><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">MLB</span></p><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">The 2021 MLB Wild Card Games Lived Up to Their Name
By MAYA BROSNICK
The 2021 MLB season has
been filled with new rules, fun
moments, and exciting players.
But as this year’s baseball winds
down, the fans’ attention is
turning to the Wild Card Games
ahead of the World Series.
The American League (AL)
Wildcard Game on October 6,
2021 featured the rival Yankees
and Red Sox, both fighting for
a spot in the AL Division Series.
The game went quickly in the
Red Sox’s favor with a huge
two-run home run by Xander
Bogaerts, stripping the Yankees
of any dreams of a comeback,
which was also partly because
of pitcher Gerrit Cole, who
allowed three runs on four hits
and did not record an out in the
third inning. The relievers settled
the game down a little, but the
Yankees’ only real chance to pull
off a win came in the top of the
sixth down 3-0.
Early in the inning, the
Yankees’
Anthony
Rizzo
cracked a home run to bring
the Yankees within two points
of the opposition. After an
Aaron Judge single, Giancarlo
Stanton came up to the plate
for the tying run, and he very
nearly delivered. Back in the first
inning, Stanton hit a long shot
that appeared to be a home run.
However, it was soon revealed</span></p><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">that the ball bounced off the
top of the “Green Monster” at
Fenway Park and back into play,
leaving Stanton with just a long
single to show for his efforts.
Afterward, the Yankees
didn’t present another challenge.
The Red Sox quickly matched
the Yankees’ run with another
one of their own in the bottom
of the sixth, and they added
two more in the bottom of the
seventh, propelling them to a 6-1
lead, which the Yankees, who
went 3-28 outside of Stanton,
would not threaten again. By the
game’s end, the Red Sox were up
6-2.
The NL Wild Card, on the
other hand, was a much tighter
contest. The game featured a
pitching matchup between two
aces, Adam Wainwright of the
St. Louis Cardinals and Max
Scherzer of the LA Dodgers.
Both pitchers started their
careers in 2005,and have turned
in some pretty impressive
numbers since. Wainwright
boasts a strikeout count of
over 2,000 and two Gold Glove
Awards, and Scherzer won the
Cy Young award twice in a row
in 2016 and 2017. Given these
statistics, it is not surprising
that the game was a low-scoring
affair. In fact, each team only
plated a single run during the
first eight innings of the game.
Cardinals second baseman</span></p><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Tommy Edman led off the game
with a line drive to right field.
Edman then stole second, and
Paul Goldschmidt followed with
a walk. The next batter flew out
with a little help from Mookie
Betts’s incredible defense, but
Edman still tagged up and
advanced a base. Nolan Arenado
came up to the plate with an
opportunity to bat a player to
home plate, but he quickly fell
behind with two strikes and no
balls. Instead of ending the atbat, however, Scherzer’s next
pitch bounced outside and
away from the catcher, allowing
Edman to score. A couple
batters and another error later,
the Cardinals had players on
first and third base with two
outs and Yadier Molina up at
the plate. In an anticlimactic end
to the intense inning, Molina
struck out, and the team wasn’t
able to rack up another run.
Scherzer and Wainwright
reluctantly came out of the
game in the fifth and sixth
innings, respectively, and the
teams traded zeros until the
ninth. At his next at-bat, Edman
once again singled to right and
stole second, but this time, it
came with one out, and the
following two batters struck out
to strand him on second, a base
that neither team had gotten
a runner past since the fourth
inning. With that, the Cardinals</span></p><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">and reliever T.J. McFarland’s goal
was to shut down the Dodgers’
offense in the bottom of the
ninth and send the game into
extra innings, when they had
their heavy hitters in Arenado
and Molina due up.
The plan started off well.
Both the Dodgers pinch
hitters lined out to center,
and the Cardinals were an out
away. McFarland walked Cody
Bellinger, so Cardinals manager
Mike Shildt brought in Alex
Reyes to face Chris Taylor,
who has destroyed lefties like
McFarland this year. Reyes
started off the at-bat with a</span></p><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">changeup that Taylor swung at
and missed. Reyes then threw
the next two pitches in the dirt
to dig himself into a 2-1 hole.
Pitch number four was a slider
but spun right over the middle
of the plate. Taylor was right
on it, and his 420-foot bomb
propelled the Dodgers to a 3-1
victory and to an NLDS contest
against the San Francisco Giants
later this week.
While the two Wild Card
Games were nearly opposites
in their makeups, both were
exciting contests, and the rest of
the postseason is shaping up to
be just as exciting.</span></p><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">SPORTSBEAT
The National Women’s Soccer League was thrust into the national
spotlight as North Carolina Courage coach Paul Riley was accused of
sexual misconduct by multiple women.
The MLB Postseason began, with the Boston Red Sox defeating Gerrit
Cole and the New York Yankees in the AL Wild Card game.
Las Vegas Raiders coach Jon Gruden is under fire after an e-mail
containing racist and sexist remarks.
The WNBA Finals began, with the Phoenix Mercury battling the
Chicago Sky.
UFC Legend Chuck Liddell was arrested on domestic violence
charges.</span></p></section><hr data-dcnode-id="521"></main><nav data-dcnode-id="446"><ul data-dcnode-id="447"><li data-dcnode-id="517" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/stuyspectator/docs/volume112issue3/1"><span data-dcnode-id="519" instrument_node="">1</span></a></li><li data-dcnode-id="514" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/stuyspectator/docs/volume112issue3/2"><span data-dcnode-id="516" instrument_node="">2</span></a></li><li data-dcnode-id="511" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/stuyspectator/docs/volume112issue3/3"><span data-dcnode-id="513" instrument_node="">3</span></a></li><li data-dcnode-id="508" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/stuyspectator/docs/volume112issue3/4"><span data-dcnode-id="510" instrument_node="">4</span></a></li><li data-dcnode-id="505" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//issuu.com/stuyspectator/docs/volume112issue3/5"><span data-dcnode-id="507" instrument_node="">5</span></a></li><li data-dcnode-id="502" style="display:inline-block;text-align:right;min-width:2.5rem;min-height:1.5rem;padding:0.75rem"><a data-dcnode-id="503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i
