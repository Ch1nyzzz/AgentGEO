The Stuyvesant High School Newspaper</span></p><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Volume 112  No. 3</span></p><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">October 15, 2021</span></p><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">stuyspec.com</span></p><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">FEATURES</span></p><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">“But How Are Your Lockers Holding
Up?”</span></p><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Even on the back end of a pandemic, Stuyvesant is hiring!
Meet eight of Stuyvesant’s new teachers for the 2021-2022
school year, and learn about their journeys to our school.</span></p><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Freshmen, ever wondered how your 10th-floor locker is doing? Or seniors, ever think about that locker that you shove
your iced coffee in every morning? Well, these lockers have
some thoughts.</span></p><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">COVID-19 Causes
Stuyvesant Classes to
Adjust
By REBECCA BAO, SARAH
DIAZ, ELAINE HUANG, and
JUNI PARK</span></p><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">every [instrumental] part is covered, and then I have the next band
playing. The other person plays
first clarinet, for example, and another person plays second clarinet,
instead of having them playing all
at the same time.”
For band and choral classes,
Stuyvesant ordered special personal protective equipment, including
choral masks, instrument-tailored
masks, and covers, all of which are
currently being distributed to students, to follow more safety guide-</span></p><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Julia Lee/ The Spectator</span></p><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Classrooms are filling up with
students, and hallways are returning to their pre-COVID bustling

By KERRY GARFINKEL
Kerry Garfinkel is an English teacher
at Stuyvesant.
I know it’s not that time of
year yet, but when it is, you will all
know what I mean: I’m referring to
that dreaded month when the entire school seems to shut down in
service of passing a certain set of
outsourced, standardized tests. I’m
talking about A.P. season.
Freshman and sophomores lose
their minds, their sleep, and their attention to other classes. (And while
I’m here, A.P. is supposed to be “college level.” So: Freshmen? Really?
For that matter: Sophomores? Really? College level?) Juniors seem to
hide their stress a little better, though
it may be that because they’ve signed
up for so many A.P.’s, they are numb
for the entire month. Seniors probably don’t care so much; they’ve already been accepted to college and
have lost the will to fight.
So here’s a proposal, modest
though it may be in our school full
of high-achievers and Ivy-aspirants:
Stuyvesant should drop out of
the A.P. program. Just dump it altogether. Instead, we should give our
own Honors classes, design our own
evaluations, and end the insanity that
is administered from afar by some
soulless office of the College Board.
I know, I know: sacrilege. How
will we compete? How will we show
our superiority? WHAT WILL THE
COLLEGES THINK?
Well, how about this: They’ll
think that we are so confident in our
teaching, our grading, and our students that when we say Honors, we
mean it. We don’t need some standardized test, given once and taken
in a few frenzied hours, to prove the
worth of our academic program.
(I’ll wait for the shock of all this
to settle in.)
To make my case, I will speak</span></p><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">mostly to the English Language and
Composition Exam, the one I prepare my junior students for every
year. Hear me now and hear me well:
The A.P. test is antithetical to the
study of English. It actually tests for
all the wrong aspects of our subject.
Let’s start with reading comprehension passages and their multiple-choice questions. This exercise
insists that there is only one right
way to interpret something you read.
Choice A, B, C, D, or E. That’s it.
In English class, we might entertain any number of student ideas
about a passage; we would compare
these responses to try to get closer
to a consensus on what the reading
might mean to us.
But on the A.P. test, students
are expected to tease out the subtle
clues that the test-makers have embedded—the difference in connotation between two words that are
essentially synonymous. Sure, I can
usually explain what the test-makers
had in mind. And sometimes it’s an
obvious distinction that any good
reader should pick up on. But too often, it comes down to splitting hairs
between two otherwise reasonable
responses.
This is English! We don’t do
multiple-choice questions on a Scantron! We’re about interpreting what
we read and convincing an audience
that our interpretation is valid. There
is more than one way to read anything! And your way shouldn’t have
to match some test-maker’s gotcha
moment.
Then, there are the writing portions of the test: three essays, back
to back to back, hastily scribbled (or
typed) in 45 minutes each, on material the students are seeing for the
very first time.
Everything we do in English is
about deliberative, reasoned, supported, and deeply understood argumentation and analysis! We want
you to actually digest what you are</span></p><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">writing about and devise and refine
your own written response! No one
ever wrote anything of real value
in 45 minutes, in a first draft, three
times in a row. (Well, maybe journalists, on deadline. Or law students, on
their LSATs. But there will be time
to learn those skills.)
The three essays themselves are
not inherently faulty, but the way to
approach the test is. The task encourages students to rely on the triedand-true, formulaic, five-paragraph
essay that we introduced to you in
elementary school. The five-paragraph essay I spend the entire junior
year, in an advanced class, teaching
my students to move beyond, in order to produce genuinely thoughtful,
in-depth analyses. Preparing for the
A.P. test undermines, and threatens
to reverse, the work of an entire year
of “college-level” writing.
So, I’m against the A.P. English
test.
Perhaps teachers of other subjects feel differently about this. But
I’m willing to bet that if given the
choice to design their own instrument to test their students’ knowledge and accomplishments, most
teachers would say that they could
do a better job than the College
Board, that their tests would be more
relevant, and that they wouldn’t have
to spend so much of the year teaching to the A.P. test and curriculum.
So what do you say, Stuyvesant?
Can we be as confident in ourselves
as we seem to be in the College
Board?
Can we truly stand behind our
own teaching, our own standards,
our own achievements?
I say we can. I say it’s obvious.
Ditch the A.P.’s.

Getting to Know Stuyvesant’s Newest Teachers
By ISABELLE YAREMENKO, JUDY CHEN, LAUREN LEE, and ZIFEI ZHAO</span></p><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Regardless of whether you’re a student or a teacher, every new school year brings on an onslaught of new challenges. But this is especially true when
you’re arriving at Stuyvesant High School. This year, meet eight new teachers who have been tasked with keeping up with Stuyvesant students and culture in
the midst of a pandemic.</span></p><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Steven Wen / The Spectator</span></p><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">Alice Yang is the newest member of the English department, and currently teaches American
Literature and Writing in the World. Born in Beijing, Yang moved to Houston, Texas, as a child and
spent her formative years in mostly small schools. After moving to New York for college, Yang fell
in love with teaching. Prior to arriving at Stuyvesant, she taught at multiple other schools throughout
the city, including Beacon High School. In contrast to her own upbringing and teaching experiences,
she finds Stuyvesant High School to be an incredibly diverse and large community. Yang loves the
variety of clubs that Stuyvesant has to offer, and is looking to get involved in any clubs relating to
animals, nature, or fashion.
Overall, Yang aims to teach her students to be intellectually challenged and to continually seek
different perspectives. “My joy is seeing the classroom come alive with people arguing for different
interpretations and honestly just expanding people’s perspectives and listening to each other. So, if a
student comes out of my class with more questions than answers, I think I’ve succeeded,” she said.
Yang is also dual certified in History, so she loves incorporating historical context into her English
curriculum. In her free time, Yang can be found taking road trips or walking her dogs.</span></p><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Jingwei Liu / The Spectator</span></p><p data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Jeremy Shahom joined the mathematics department this year and is teaching Geometry and
AP Calculus AB. Shahom’s interest in mathematics manifested early on in college. Though he had
initially considered pursuing Computer Science, he found debugging to be a tedious process. “Part
of it was the frustration of [having] one semicolon or parentheses in the wrong place and then having to look through it,” he described. Instead, Shahom fell in love with the precise, procedural nature
of math, and found himself taking more math courses as college progressed. After enjoying his time
as a part-time math workshop tutor, Shahom decided he wanted to become a math teacher. Since
then, Shahom has been working in the New York City School system for 19 years and counting.
Despite what many students may think, Shahom finds math to be a creative subject. “I love how
abstract it is and how you can solve problems, […] though students sometimes think that math is
right or wrong […] But nevertheless, there’s different approaches that can be very creative,” he explained.
Shahom has also heard all about the reputations of Stuyvesant students, and finds his students
more than just test-taking machines. “Everyone expects Stuyvesant students to be very smart and [to
be] able to handle a lot. I’m seeing that,” he said. “I’m also noticing how respectful and kind students
are, which is very refreshing and very nice to be around.” When he’s not teaching high schoolers, you
can find Shahom teaching his 10-year-old son the multiplication tables.</span></p><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Coco Fang / The Spectator</span></p><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Francesca Nemati / The Spectator</span></p><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Jeffery Wan has returned to Stuyvesant, his high school alma mater, as an honors physics
teacher. Having graduated from Stuyvesant in 2015, Wan went to City College where he majored
in physics and minored in education. As an alum, Wan already knows all of the stereotypes about
Stuyvesant students who sleep at 2:00 a.m., anxiously await graded papers, and study late into the
night.
Wan is looking to break these stereotypes. During his time at Stuyvesant, he was inspired by
biology teacher Maria Nedwidek-Moore and wants to follow in her footsteps to create a supportive
classroom environment. “I want to be that person who will help out; who will listen to somebody;
who will really think about the students,” he said. Wan also wants to have fun with his teaching and
make physics an engaging subject for his students by incorporating lots of drawings and demonstrations. “I try to have fun, I try to be spontaneous, and I try to make it as easy as possible,” he said.
Having been remote in all of his two-years of teaching, Wan sees this year as his “third first-year”
of teaching. The thing he’s most excited about for in-person learning? Finally getting to use chalk
on the blackboard.</span></p><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Computer science teacher Izagma Alonso found Stuyvesant High School to be the perfect fit

which allowed her to teach math in middle schools and high schools all over New York City. But

her classes are taught online or in-person, Alonso is eager to teach a diverse group of students who
are just as passionate about the subject as she is.</span></p><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Rania Zaki / The Spectator</span></p><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Xingjia (Ginger) Tang teaches Algebra 2 and Pre-Calculus. Tang graduated from SUNY

enjoyed teaching after becoming a teaching assistant at Stony Brook. Afterwards, she even taught

But after being a teacher’s assistant for her calculus professor, Yang was sure she wanted to be a

said, “It just clicked.”</span></p></section><hr data-dcnode-id="1283"><section aria-label="Page 7" data-dcnode-id="1248"><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">The Spectator • October 15, 2021</span></p><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Page 7</span></p><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Features
STEM Teachers and Media, a Beneficial Pair</span></p><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">By ISABELLE LAM</span></p><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">By ISABEL CHING
and JENNIFER JI</span></p><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">mentioned that Agatha Christie
novels were among his favorites. He described an appreciation for all of the small details
that build up to solving the
mystery––a common occurrence in Christie’s novels. When
quarantine started, Jaishankar
didn’t pick up any new books.
“I don’t like reading books online; I like having the hard copy
in my hands and reading it. I
don’t know, I guess I feel more
of a connection to the story
I’m reading,” he explained. He
instead resorted to re-reading
old classics such as “Sherlock
Holmes” and other assorted
short stories.
In an attempt to broaden his
horizons, Jaishankar turned to
his students for help. “I asked
on a test, ‘What’s your favorite
book?’ and I think three of [the
students] said “Cloud Atlas,””
he said. “That’s on my list, but
finding the time [was] hard because I was teaching and then
going back into dad mode.”
Similarly,
mathematics
teacher Patrick Honner has
been reading and spending time
with his family. Honner’s favorite books lately include a collection of science fiction short
stories by Ted Chiang and “The
Signal and the Noise” by Nate
Silver. He reads a balanced mix
of both fiction and nonfiction,
favoring science fiction and
reading about mathematics respectively.
In regards to science fiction,
Honner feels public perception
of the genre tends to be misconstrued. “Science fiction has</span></p><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">a connotation that it has to be
technical in nature, whereas a
lot of good science fiction isn’t
necessarily about technology
or science. [Instead it’s] stories
that could be told in alternate
possible futures,” he explained.
As for reading about mathematics, Honner often finds recommendations through Tweets
sent out by friends who have
similar interests.
Honner also indulges in music, but prefers to play it instead
of listening. “I rarely sit down
and think, Oh I want to listen
to music, let me sit down here,
and listen. Usually, it’s in the
background or it’s something
I’m actively doing,” he said.
He plays the guitar and is a beginner on the piano, which he
practices on a keyboard at his
home.
Like Orlando, Honner also
finds joy in playing games with
his family. “Some of the games
are competitive, and some are
collaborative [...] so that’s been
a lot of fun. We’ve gotten into
that in the past year,” he said.
His favorite games include Mario Kart and Mario World 3D,
which are multiplayer games.
Though STEM teachers’
jobs may not entail consuming
much literary media, teachers
are always open to the idea of
learning something new and
looking for ways to keep themselves entertained. Whether it
be playing fantasy games with
family or perusing through the
newest selection of science fiction, everyone has their own
ways of passing time.</span></p><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">College Coronavirus Craziness</span></p><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">It’s that time of year again.
Everybody feels slightly nauseous, bleary-eyed seniors
come to school in a haze, and
the whole building reeks with
five-days-a-week dreariness.
No, we’re not talking about
flu season, we’re talking about
a far more dreaded Stuyvesant yearly occurrence: college
season. As October wears on,
the all-too-real college application process looms large. Do
Stuyvesant seniors have what
it takes to weather the storm,
this time on the back end of a
pandemic?
Director of Stuyvesant’s
College Office Jeffrey Makris
offered his knowledge on the
process, and detailed what
has changed since the onset
of COVID. “The two biggest
shifts that have happened in
the admissions world would
be the availability of ways to
virtually engage colleges. Some
of that existed before, but that
exploded—virtual info sessions, virtual tours, webinars,”
he explained. While the future remains uncertain, Makris
added that he feels the virtual
component of the college application process will remain in
place even after the pandemic––colleges realized it is simply too expensive and inconvenient to rely on students to
travel. An anonymous senior
shared this gratitude for virtual
tours: “I appreciated that colleges held so many virtual information sessions and many
of the college fairs were quite
accessible.”
Another effect of the pandemic has been the newfound
popularity of test-optional
admissions. “For this year, I</span></p><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">think we’re probably going to
be looking at a similarly high
application volume at [Ivy
Leagues]. Selectivity doesn’t
seem to scare people away,
but having to submit high test
scores did seem to be a deterrent for some populations of
students,” Makris said. The
anonymous senior agrees: “I
thought that the COVID accommodations were satisfying
[…] In terms of the applications themselves, many schools
kept the optional testing policy,
which I think is helpful to students that didn’t get a chance
to take it,” he said. Senior Olivia Tedesco echoed Makris’s
statements, explaining that the
pandemic has increased college
accessibility. “The pandemic
has allowed me to learn more
about colleges virtually. College information has become
more universally available,
even if that means acceptance
rates are dropping,” she said.
However, the relatively recent shift to test-optional applications has raised alarm
about declining acceptance
rates. As the anonymous senior shared, “I feel that COVID is somewhat of a tradeoff
in terms of admissions. One
on hand, many schools have
had lower admission rates as
many more kids apply. On the
other hand, accessibility isn’t
a bad thing. I think that it can
be daunting to see these dropping admission rates, but all
you can do is try your best,” he
said. Long-term, Makris feels
the test-optional movement
will continue to gain steam because of the new opportunities
it provides for all applicants.
“Colleges found that when you
go test-optional, you typically
get more applicants and more
diverse applicants [...] You can</span></p><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">diversify your population, you
become more selective, your
average scores for students
typically increase,” he said. Senior Maxwell Seto echoes Markis’s sentiment, saying, “The
test-optional addition helps
in more ways than one in my
opinion. Outside of COVID,
there are many factors that
play into one’s test score and
it is less holistic than it may
seem.” While test scores can
help illuminate certain aspects
of a student, there has been a
growing sentiment that it is not
a puzzle piece that should be
required for every applicant’s
picture.
Makris also touched on
how admission officers are
handling students who have
been detrimentally affected
by the pandemic, whether it is
through a parent’s unemployment or, even worse, the loss
of a family member. “Their
challenge is to understand the
context of the applicant and
their high school, particularly
for the regions most impacted
by COVID [...] It’s very clear
that admissions officers overall understand us, and they are
all trying to be as fair as they
can given all these additional
challenges that everybody
faces,” he said. An example of
this sympathy is the Common
App’s new addition of the
COVID-19 section, a specific
space for applicants to describe
how “community disruptions
such as COVID-19 and natural
disasters” impacted them.
In any college season,
and especially one with this
much uncertainty, students are
bound to feel anxious. Seto
bravely admits, “Of course, I
am more worried about this
year’s college application process because I feel that there</span></p><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">is more competitiveness than
previous years. Because of the
nature of our school as well,
it is difficult to find solace at
times.” However, in the words
of Makris, “It’s important to
remember that the sky didn’t
fall.” If any students relate to
Seto’s sentiment, Makris reminds us that the college office
is always there: “Remember to
ask for help when you need it
[…] That is a sign of strength
and insight to know when you
need help and ask for it rather
than just struggle in silence.”
Tedesco agrees: “The Stuyvesant College Office has also
helped me to finalize my application list as well, and it’s nice
to hear that their door is always
open.”
Though many students have
the date November 1 ingrained
in their heads, some, such as
senior Devin Deng, feel as
though they are in a more fortunate position. “I don’t think
COVID has changed the way
I apply for colleges […] I’m
not that stressed. I think the
seniors last year had an even
better process because of the
free time they had to complete
applications.”
Whether you’re unruffled
like Deng or as stressed as can
be, it is important to know
your value as a student. Makris
points to his copy of Frank
Bruni’s 2015 book “Where
You Go is Not Who You’ll
Be.” “I display that cheesily for a reason [...] A lot of
times at schools like Stuyvesant, we treat college like its life
or death, and it really is not,”
he said “Where you go doesn’t
define you, it’s your talents
and your engagement. What
you do in the workforce, that’s
what leads to success, not what
college you go to.”</span></p><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Adrianna Peng / The Spectator</span></p><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">During in-person school,
most upperclassmen can remember posters scattered
around the sixth floor advertising books that English and
history teachers were leafing
through. But what about STEM
teachers’ media consumption?
Over the summer, chemistry teacher Michael Orlando
consumed all types of digital
media, ranging from role-play
games to YouTube tutorials.
“I have two small kids. [Even
though] my wife and I got vaccinated [...] we more or less
stayed home this summer,”
he said. During this time, Orlando played games such as
“Returnal,” “Castlevania: Symphony of the Night,” “Hollow Knight,” and “NieR: Automata.” “You’re the worst [if
you have not played ‘Hollow
Knight’],” Orlando said.
Another game he’s been
playing with a group of his
friends is Dungeons and Dragons, which heavily relies on
fantastical and role-playing
elements. His cousin was the
nexus for the group: everyone
knew his cousin, and eventually
got to know each other as they
played more. “I played back in
the early ‘90s when I was a kid,
so it’s always something that’s
been a part of my life. When
my cousin wanted to bring
it back, I bought a bunch of
books,” Orlando said.
Orlando revealed that he
thinks that his love for teaching
is bolstered by his appreciation</span></p><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">for the humanities. While he
could teach in a robotic, lecturestyled manner, he recognizes
that even the best of students
would eventually fall behind
and lose interest in the class, a
lesson learned when creating
and personalizing campaigns
for Dungeons and Dragons.
He’s also been watching a YouTube channel called
“Cracking The Cryptic,” which
specializes in solving challenging Sudoku puzzles. “Sometimes there are two hours of
these guys who are really really
good at Sudoku just banging
their head against the wall. [...]
I’ve seen him derive new formulas about how a Sudoku grid
works on the fly,” Orlando said.
As for mathematics teacher
Ashvin Jaishankar, he’s mainly
been making the most of his
Disney+ subscription. “You
can clearly see that I’m getting my seven bucks a month
value out of it,” he joked. He’s
had Disney+ since its inception, and has made great use
of it. For some time, Disney+
has been an integral source
of media consumption in his
household. Jaishankar’s twin
daughters were both two years
old when the streaming service
was launched. Because both of
them are now five years old,
Jaishankar has since introduced
them to a variety of Disney
classics such as a family favorite, “Cars.”
Unlike Orlando, Jaishankar
does not play many games, but
rather opts for movies, music,
and literature. For books, he</span></p><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Clara Shapiro’s
Advice Column
Querida Clara,
How do I talk to classmates
about applying to college?
—Anonymous, Senior
I, too, have picked up on
the ruckus about this whole
“college” thing. In fact, just a
scant few days ago I emerged
from my cave to go to The
College Meeting, and WHAT
DOES THE OFFICE TELL
ME? I must fill out “APPLICATIONS” to get into these
institutions! Suffice to say this
doesn’t play to my strengths,
such as my biceps. And now
here these colleges are, telling
me that “in the context of an
academic environment” my extreme musculature is a no-go.
Now I must write “an essay.”
Feh!
Well, my friend, if my equivocation is any hint, what I mean
to say is that you are right–– it
is difficult to talk about college,
even to our dearest friends. To
reveal the specific names of
colleges can feel like a jinx or
simply an invasion of privacy,
even to those who normally
love to share the sordid details
of their personal lives.
Yet at the root of it, why
might it be that a person would
ask another about The College?
Long have I pondered. Here
is what I think: October is the
fall, and we are falling. But why
are we falling? Because we have
jumped!
College is that jump. And
as we take the great leap, it is
only natural that we seek another person’s hand to grasp
during the plummet. Questions
such as “How are the applications going?” don’t really seek
the names of specific schools.
Rather, these questions are outstretched hands reaching for
another to hold onto in the
great freefall.
The details of what manner
of ground, what sort of campus we will hit after great fall
are unknown to us all and not
so important; what is certain
is that for the moment, we seniors are all in freefall, and so
we must feel free to grab one
another’s hands and share what
we feel as we plummet. By and
by the plummet will feel a bit
more like solid ground.</span></p><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Can’t get

Morning Mishaps, Entrance Errors,
and Headphone Hassles</span></p><p data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Filing into the building
after getting just a few hours
of sleep is a daily morning
occurrence for thousands of
Stuyvesant students. It’s no
surprise if they occasionally
fumble with their ID cards and
swipe the wrong way, show the
wrong screenshot of their daily Health Screening, or forget
to take out their headphones.
These are honest mistakes and
can be quickly corrected with
a modicum of patience. But
rather than being responded
to with sympathy, many students have been reprimanded
and even subjected to harsh
punishments, such as losing
their outdoor lunch privileges
for two weeks, because of a
five-second holdup.
However, these consequences were never clearly
communicated to students,
leaving them unaware of
what constitutes an error.
Additionally, when doling
out any punishment—especially something as severe as
ID confiscation or voiding
lunch—for a mistake that anyone could have made, students
should be well-informed of
the actions that warrant such
consequences. Yet virtually no
information about entrance
conduct has been available in
the Health Screening-related
e-mails sent to students. Instead, students learn of these
policies when it is too late,
causing frustration and a disconnect between the student</span></p><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Features
By AVA FUNG
Tests, teachers, and theorems are back in a full in-person slam. While we can now
put the challenges of bad internet connection and muted
silence behind us, there remain the scars of lost connection and community that have
yet to heal. Stuyvesant boasts
over 150 extracurricular activities covering everything from
volunteering to glowsticks––
there’s a club for everybody.</span></p><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">body and administration.
Despite the scrutiny students are put under before
8:00 in the morning, other
policies remain murky within
the school––most notably
the school’s phone and headphone policy. While the number of phone confiscations
has been greatly reduced this
year, school officials seem to
be more strictly enforcing the
headphone policy. The headphone policy is more relaxed
in certain areas of the school,
such as the library and cafeteria, which causes confusion
about the exact boundaries
and borders of the policy. It is
not just a lack of transparency
that makes this policy hard to
navigate, but also its inconsistent enforcement.
There must be clarity, communication, and trust between
students and the administration regarding these policies
and punishments. Over the
years, students have proven
that they can be trusted using
their devices outside of classrooms and that they are no
less focused in class because
of them. The same goes for
the headphones and the entrance policy; students have
made it clear that they will
work to respect the school’s
rules, so long as these rules are
crystalized and publicized.
The first step to addressing
the problem is to ensure that
school policies are made clear.
The lack of transparency re-</span></p><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Club Continuum</span></p><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">person setting can help the club
expand its community space.
“There are a lot of girls at Stuy
who are passionate about gender equality and who want an
outlet to convey that passion,”
junior and club president Lianne Ohayon said.
With a return to in-person
learning, there’s hope that a
physical space can help engage new members, especially
because recruiting members during remote learning
proved to be a challenge. As</span></p><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">“We hope to build community partnerships [and] relationships, as opposed to
getting in as many hours as we can or raising as much money as we can.”
—Leah D’Silva, senior
Last year, a virtual setting
caused clubs to shift from
school rooms to Zoom links,
leaving members disoriented,
and putting a big responsibility
on club leaders to provide the
structure of Stuyvesant’s four
walls in an online space. Now,
with school back to in-person,
clubs have had to adapt once
again.
Senior Leah D’Silva felt
the weight of responsibility
when she stepped up this year
as the president of ARISTA.
Compared to previous years,
ARISTA seems to be placing
a greater emphasis on community over prestige. “We hope to
build community partnerships
[and] relationships, as opposed
to getting in as many hours
as we can or raising as much
money as we can,” D’Silva said.
In a similar sense, Stuyvesant Girl-Up hopes that the in-</span></p><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">garding consequences and implications of breaching certain
school policies has left many
students frustrated about the
punishments that they end
up receiving. In addition to
communicating these policies
with students, the administration must also guarantee that
they are reasonable. Currently,
students have had IDs confiscated and lunches voided for
showing a Health Screening
for the wrong date, and headphones taken away from them
simply without explanation.
Perhaps a more reasonable
measure might be a required
redo of the health screening,
and a trip to the back of the
line. Whatever the policy ends
up being, the bottom line is
that students should know
what it is.
This problem does not rest
solely on the administration.
Yes, mistakes happen, but
students should also doublecheck their Health Screenings
to reciprocate respect towards
school officials and create
a more seamless school entrance. If students want to be
respected, they must respect
the rules and establishment
that they go to school under.
Through clear communication and empathy, the administration and student body can
build a foundation of mutual
respect and trust that makes
all of our early morning entrances a bit easier.</span></p><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">ARISTA works with many
middle schools, it was often a
struggle to keep students motivated over Zoom. “If [middle schoolers] were not in the
same physical space as the tutors, they had a lack of motivation to show up and lack of
relationship to form through a
screen,” D’Silva said.
Junior and Vice President
of Stuy Flow Sarah Ibrahim
shared a similar sentiment:
“We had to rely on past member recommendations to their
friends and people looking at
our Facebook posts and thinking, ‘That sounds cool, I should
join.’”
Senior and President of
Stuy Flow Aaron Hsu agreed
with this sentiment, noting
that he felt Flow was missing
the meaningful small interactions. “[The] Zoom environment just doesn’t conform to</span></p><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">that. You can’t always see everyone’s face, not to mention
their bodies, and if you want
to have small talk you have to
unmute, but when you unmute
everyone can also hear you, so
you feel less obligated to talk,”
he said.
Though getting people invested in clubs proved difficult,
online platforms also helped
increase productivity and communication. “Nobody [was] in
a rush to leave because everybody [was] home together,”
ARISTA faculty advisor Eric
Witosky mentioned.
Clubs did not only experience internal developments,
however; external reach also
expanded. During remote
learning, Girl-Up was able
to host Zoom sessions with
various female speakers ranging from business leaders to
creative thinkers, and more.
Ohayon stated that the Zoom
experience might have even
strengthened Girl Up as a club.
“Zoom [was] a great platform
for club meetings, since there
[were] no physical blockades,”
Ohayon said.
Moving forward this year,
club leaders are looking forward to mixing virtual strategies into in-person meetings.
For Stuy Flow, the cold journey of silent breakout rooms
is over now that they have set
up socially distanced practice
spaces. In addition to the focus
on new members for ARISTA,
D’Silva hopes to build up the
connection between the younger generations of leaders and
role models. “I’m really excited
to see how [new members] are
going to involve themselves in
these opportunities that we’ve
given them and make it their
own,” D’Silva said.</span></p><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">The Spectator</span></p><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">SPO RTS</span></p><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">The Stuyvesant High

Money Wins
By ASHLEY LIN
The most expensive presidential election happened just
last year with over $14.4 billion
spent, more than double the
total cost of the 2016 election.
A fraction of the $14.4 billion
was donated by average voters. However, the majority was
given by billionaires and corporations writing large checks
to Super Political Action Committees (PAC), large corporations, interest groups, and associations that provide pools of
funds. Super PACs raise unlimited amounts of money from
corporations, associations, individuals, and constituents.
Wealthy donors expand
their political power by donating unprecedented sums of
money to elections. For example, non-party independent
groups can donate an unlimited amount to their preferred
candidates, leading to over $4.5
billion donated over the decade,
while the 10 most generous
donors and their spouses injected $1.2 billion into federal
elections. These contributions
shift elections in favor of candidates with the most funding.
For seats in the House of Representatives, more than 90 percent of candidates who spend</span></p><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">By CHARLOTTE
PETERSON
President Joe Biden’s unofficial campaign slogan, “Settle
For Biden,” was frequently
echoed by American progressives prior to the 2020 Democratic primaries. In an effort to
remove the right-wing Donald
Trump from office, many leftists opted to vote for the more
moderate Biden, believing that
he had the highest chance out
of the Democratic nominees
of unseating Trump. Biden
was successfully elected, with
progressives intending to put
someone with more liberally
aligned policies and campaign
promises in office. However,
not as much has changed from
the previous presidency as was
implied or outright stated, yet
Biden is not receiving the same
pushback from Democrats as
Trump received for his empty
words.</span></p><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">the most win. While there was
only one election cycle in which
that did not hold true, the 2010
election, 86 percent of the top
spending candidates won, still
a shockingly large percentage. These statistics display the
scope of the control large corporations and millionaires have
over American democracy and
political campaigns.
Big money in politics has
disrupted the fundamental relationship between Americans
and their elected officials. Public servants and elected officials
should be serving America’s
best interests. Instead, politicians often vote in a way that
favors a specific demographic
group or business to ensure
they receive large amounts of
campaign donations. For example, in 2018, wealthy donors
Sheldon Adelson and Miriam
Adelson gave $122 million to
Super PACs that supported
Republican candidates. In the
previous four election cycles,
they donated close to $300 million to pro-Trump and pro-Republican Super PACs. As a result, they were able to persuade
Trump and his administration
to promote their casino project
and curb online gambling that
competed with their interests.
Additionally, mega-donor Bob</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Murray donated $1 million to
Trump’s Super PAC. His list
of policy wishes was soon incorporated into Trump’s “ToDo List.” Lastly, Doug Deason
made Republicans seeking campaign donations aware that if
they did not repeal the Affordable Care Act and pass major
tax cuts, he would not donate
any money in 2017. The Republican Party passed one of
the largest tax cut bills in history, appealing to the interests
of donors like Deason. In the
following 60 days, millionaires
and billionaires dramatically
increased their political donations, giving a total of $31.1
million in just two months.
The values and interests of the
richest one percent differ from
those of ordinary Americans,
who disagree on many pressing issues such as taxes, education, and unemployment. These
policies increasingly benefit the
wealthy and harm the poor.
It certainly does not help
that in the Citizens United v.
Federal Election Commission
case, the Supreme Court ruled
in favor of Citizens United,
which reversed campaign finance restrictions and allowed
corporations to spend unlimited amounts of money on
elections. Prior to this case,</span></p><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Citizens United, a right-leaning non-profit organization,
wanted to air a film criticizing
former Democratic presidential
candidate Hillary Clinton. This
release would have been a violation of the Bipartisan Campaign
Reform Act, which banned any
organization or corporation
from funding an “electioneering communication” within 30
days of a primary election or
60 days of a general election.
Citizens United argued that this
law was unconstitutional and
violated the First Amendment.
The ruling heavily increased the
amount of political spending
from outside groups, allowing
large donations to dominate the
U.S.’s political campaigns and
drown out the voices of ordinary American voters.
To fight big money, campaign finance laws and rules
must be enforced to ensure
political campaigns have integrity. The Federal Election Commission (FEC) should institute
reforms so it is no longer gridlocked due to partisan split and
can finally serve its true purpose of enforcing and regulating money in politics. The FEC
has not been able to perform all
of its duties, including enforcement, regulations, and audits,
and has failed to provide can-</span></p><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">didates and parties with guidance regarding legal obligations
and investigate allegations of
legal violations. A better functioning FEC would allow for
greater transparency in political
advertising and decrease unlimited political spending by large
corporations and millionaires.
Legislation that requires the
disclosure of all political spending should be passed to increase
transparency in who is trying to
control elections through large
political donations. Lastly, Congress should pass bills aimed to
prevent coordinated activity between PACs and political candidates. Closing these fundraising
loopholes would ensure that
elections are not controlled by
top donors.
Fair elections are a fundamental part of democracy, and
they should not be bought by
the rich and powerful. Certain
interests should not have less
representation because of donations from the top one percent. Big money in politics has
resulted in a government that
does not truly work for Americans anymore, and this issue
must be addressed to successfully confront all of its detrimental effects.</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">During the Trump administration, Biden criticized the
mishandling of immigrants
by the United States and the
Immigration and Customs
Enforcement. Biden’s official
campaign site stated that placing children in cages is “wrong,
and it stops when Joe Biden
is elected president.” At the
time Biden was elected, there
were fewer migrants detained
than at any other point in the
past 20 years. Despite these
promises, there has been a 70
percent increase in jailed immigrants since Biden took office.
Though there has been bipartisan criticism of Biden for his
handling of the influx in Haitian immigrants on our shores,
he has not been condemned as
much for the lack of change in
the whole immigration system,
which caused these very issues.
Many Latin American migrants
remain trapped in detention facilities from the Trump admin-</span></p><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">istration. Biden has not lived
up to his promises to improve
their lives, their unjust detainment, or the overall immigration process in any significant
way.
Additionally, Biden has
fallen short on racial justice.
At the height of mainstream
media visibility for Black Lives
Matter in late summer 2020,
Biden publicly addressed the
racial injustices and systemic
inequalities that Black Americans have dealt with since the
founding of our country. He
made campaign promises to
work toward racial equality
and reform the police and legal systems by creating a police
oversight task force. However,
many civil rights leaders did
not agree with the creation of
a task force, and activists called
for the defunding of police and
redistribution of funds to community programs. Biden did
not comply with these requests</span></p><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">and instead simply promised to
create a task force, which has
not been worked on either.
As the Black Lives Matter
movement gradually exited the
news cycle and was no longer
used for performative activism,
public calls for police reform
died down. In accordance with
this timeline, Biden’s initial
promise to create a police oversight commission fell short. He
claimed that his original plans
for the commission would
not be as effective as legislation, which he believed would
make a longer lasting impact.
The George Floyd bill—which
would have made it easier to
effectively prosecute police officers, according to Biden—did
not succeed either, failing to
pass by the Senate’s Republicans. While this result was
not Biden’s fault, little racial
justice has been achieved under Biden’s administration. His
promise for an oversight com-</span></p><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">mission slipped away despite
the bill’s failure, and his pledge
for racial justice fell through
the cracks.
Biden has accomplished a
lot in his first 250 days in office. He has more than fulfilled
his promise of administering
100 million COVID-19 vaccines, surpassing the 200 million mark on his 92nd day, and
has created the most diverse
cabinet in United States history. However, Biden still has unkept promises that need to be
upheld. Regardless of his party
and political alignment, Democrats should not hesitate to call
out his shortcomings as they
did with Trump and should always push Biden to do better.
Politicians need to be held accountable for their promises,
regardless of political faction,
if they are to properly serve
their constituents and make
progress.</span></p><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Settling for Biden</span></p><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">You Can Only Get Some of Your Rights Delivered</span></p><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">By PETER GOSWAMI</span></p><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">We live in a world where we
can open an app on our phones
and have food from our favorite
restaurants delivered to us without leaving our houses. Even
with this magic convenience,
we do not hold back on our dissatisfaction. Many times, I have
complained about the food arriving late, not getting the sauce
I wanted, or the food getting
cold, disregarding the difficulties that delivery workers have
to endure to provide me and
countless others with cheap and
fast delivery. Delivery workers in New York receive much
lower wages than other workers and often face robbery or
assault on the job. While New
York City has passed six new
bills to improve conditions for
delivery workers, more needs
to be done to ensure fair wages,
equality, and improved conditions for these workers.
Sixty-five thousand delivery
workers work in New York City,</span></p><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">and many are immigrants or
part of marginalized communities. These delivery workers
continue to face low wages even
as food delivery app companies
profit, made evident by the increase in food delivery app revenue and users in the U.S. from
$22 billion and 95 million users
in 2019 to $26.5 billion and 111
million in 2020. New York City
delivery workers earn an average of $7.87 an hour before
tips and $12.21 an hour with
tips, which is still well below
the minimum wage of $15 per
hour. With this low wage, it is
almost impossible for delivery
workers to live comfortably in
New York City, where the average overall costs of living and
housing are 1.87 times and 2.94
times, respectively, the national
index.
While delivery workers face
low wages, food delivery apps
continue to make false claims
about the rate of pay, leading to misinformation among
consumers and the circulation</span></p><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">of inaccurate data that make it
more difficult to assess the conditions that delivery workers
face. Approximately 42 percent
of delivery workers reported
unreliable or late payment, and
many face robbery or assault
on the job and do not receive
worker benefits. About half of
all delivery workers crash on
the job and then must pay for
their own medical care. Many
are even restricted from using
bathrooms at the restaurants
they deliver for.
In response, New York City
passed a set of six bills to improve some of the conditions
for delivery workers and put
certain restrictions on food delivery apps. One bill in this set is
Int 2296-2021, which prevents
food delivery apps from charging workers an additional fee to
receive their payment. Another
is Int 2399-2021, which allows
delivery workers to set parameters on the distance they travel
for delivery. Int 2298-2021 requires restaurants to make their</span></p><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">bathroom facilities available to
delivery workers, and Int 18462020 requires food delivery
apps to disclose their gratuity
policies to consumers. While
the new set of bills improves
certain conditions for delivery
workers, more steps need to
be taken to truly grant delivery
workers equal rights.
Under the new bills, delivery workers are still classified
as independent contractors,
preventing them from receiving workers’ compensation and
unemployment benefits. Especially during the pandemic,
delivery workers are essential
to our society and should be
given the same minimum wage
as others. Many are immigrants
with little to no generational
wealth and come from marginalized communities. Preventing
them from receiving fair wages
and benefits further disenfranchises them in a system already
designed to put them down.
The bills can be improved to
allow delivery workers to receive</span></p><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">the same standard minimum
wage as other workers. With the
high rate of assault and robbery
that delivery workers face, the
city must establish bills to give
delivery workers compensation
and medical benefits so they do
not have to pay for their own
medical care when harmed on
the job. The bills must be more
strict on food delivery apps and
require them to disclose their
payment and gratuity policies
to consumers so that if delivery
fees increase, consumers understand where the fees are going
and how they help support the
workers.
New York City is a delivery
hub of the world. We must create laws that protect and support the workers who provide
a service that has become commonplace. As a densely populated and influential city, we
must stand as a model for other
cities and states to create laws
that protect workers across the
board.</span></p></section><hr data-dcnode-id="1071"><section aria-label="Page 10" data-dcnode-id="1024"><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Page 10</span></p><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">The Spectator • October 1, 2021</span></p><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Opinions

may think of paid options: for
hobbies such as digital painting, photo editing, video editing, and other visual work, the</span></p><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Eleanor Chin / The Spectator</span></p><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">The Internet democratized

an unfairly high barrier of entry

in touch with one’s individual
artistry. We all have something

Drawing from this inspiration to come to a conclusion</span></p><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">the venture capital investments
in the startup in the corresponding market space fell by
40 percent on average. When

money during the pandemic,
especially with consumers
spending so much time online.

business gained another $1
billion in profits, and Microsoft’s profits jumped by
31 percent. These changes
are just the beginning. As the
world slowly embraces the digital revolution, Big Tech
companies will be
able to maintain their
dominance in their

problem allowing the retention of Big Tech’s power

consumers and ensure fair

judicial interpretation and
enforced by lawsuits and the

2020 House report suggests.
Additionally, America’s oldest antitrust law—the Sherman
Antitrust Act passed in 1890,
outlawing trusts, monopolies,
and cartels in order to preserve
a competitive market—never</span></p><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Sophia Li / The Spectator</span></p><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">The United States tech industry contributed around $1.99

design. Those aspiring to create videos may use DaVinci

Church and his fellow researchers studied the genomes of extinct species to identify key differences between them and their
modern cousins. In doing so,

genetic differences led to phenotypic, or observable, differences.

target the genome of Asian elephants, the living descendants
of woolly mammoths, to replicate them. He has been leading</span></p><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">a small team of geneticists, biologists who study genetics, in

What’s With the New Alzheimer’s Drug?
By ANDY CHEN
Over the past few decades,
billions of dollars have been invested into treating Alzheimer&amp;#39;s
disease with no promising results. That was the case until the
Food and Drug Administration
(FDA) approved aducanumab,
marketed as Aduhelm, ending the nearly two-decade-long
absence of approval for Alzheimer&amp;#39;s drugs. More than
simply improving symptoms,
aducanumab promises to slow
the progression of Alzheimer’s.
Can it really do what it promises, though?
Alzheimer&amp;#39;s disease, first discovered in 1906, is a progressive
disorder that causes memory
loss and destruction of mental
functions. The disease affects an
estimated 6.2 million Americans
and is the sixth leading cause of
death in the United States. Scientists suspect amyloid plaques,
abnormal protein structures
formed by the aggregation of
beta-amyloid between neurons,
to be a root cause of Alzheimer’s. Misfoldings and mutations
in the amyloid precursor protein
(APP) creates beta-amyloid, a
longer and stickier version of
the APP. Beta-amyloid is also
produced at a higher rate than
APP, leading to the formation
of amyloid clumps—clumps
are associated with disruption
in cell communications, death
of neurons, and symptoms of
Alzheimer’s.
Aducanumab, classified as
a monoclonal antibody, is the
first therapy to target plaques,
reducing amyloid aggregates
and preventing their buildup in
the first place. The drug functions by recognizing and binding to beta-amyloid, effectively
lowering the amount of protein
that could combine to form the
plaques. In fact, aducanumab
clinical trials in all phases con-</span></p><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">sistently reported significant
reduction in amyloid plaques.
However, it is still uncertain
whether reducing plaques will
improve the conditions of patients with Alzheimer&amp;#39;s.
Aducanumab, created by the
biotechnology company Biogen
in Cambridge, Massachusetts,
did not walk a smooth path to
approval. In March 2019, the
drug was almost discontinued
after two large late-stage clinical
trials failed an interim analysis.
While both trials showed decreased beta amyloid plaques,
one trial called ENGAGE indicated negative results in the
Clinical Dementia Rating Scale
Sum of Boxes (CDR-SB), implying that aducanumab was ineffective. In a later reevaluation</span></p><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">the FDA received backlash for
approving the controversial
drug. Many scientists, including members of the advisory
committee, expressed that there
was not enough conclusive evidence that the drug provided
any benefits. Three members of
the committee even resigned in
protest after the approval was
announced.
The FDA finally recognized
the problem of inadequate evidence only after approval and
took a different approach. They
moved aducanumab onto an accelerated approval program, an
alternative pathway that permits
drugs treating serious diseases
to be used without definite signs
of benefits. In aducanumab’s
case, it targeted the biological</span></p><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">these groups. In fact, prominent hospitals, private insurers,
and the Department of Veterans Affairs all deemed the drug
risky and prohibited its use.
Meanwhile, some like Eric
Siemers, a drug-development
consultant in Zionsville, Indiana, believe that aducanumab’s
approval could lead the way to
the revival of neuroscience research, especially with neurodegenerative disease. Many groups
such as the Amyotrophic Lateral Sclerosis Association welcome the new flexibility shown
by the FDA and hope that the
same flexibility would be directed towards other serious neurological diseases.
However, the drug tominersen, created by Roche and Ionis</span></p><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">A controversial Alzheimer’s drug, aducanumab, made its
way to the market, but it isn’t so clear if it provides any
cognitive benefits.</span></p><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">of the data, however, Biogen
found that participants in the
high dosage subset in the other
trial, dubbed EMERGE, experienced a slight improvement
in their cognitive functions.
Following this event, the firm
pursued an FDA approval for
aducanumab.
In June, the FDA disregarded the concerns from its
advisory committee and approved aducanumab, basing
their decision mostly on the
drug’s ability to lower levels of
amyloid plaques rather than its
clinical benefits. Unsurprisingly,</span></p><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">causes of the disease, and Biogen needed to produce a postmarketing analysis by 2030 to
prove the effectiveness of the
drug.
Despite the FDA’s second
chance for aducanumab, its situation remains a topic of great
controversy. Aside from the
lack of concrete evidence supporting its efficacy, aducanumab has serious side effects. In
clinical trials, 40 percent of the
high dosage groups experienced
brain swelling or bleeding. Nausea, dizziness, and diarrhea also
occurred more frequently in</span></p><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Pharmaceuticals, is an example
of why flexibility in regulation
could backfire. Tominersen was
developed to treat Huntington’s
disease, another neurodegenerative disease like Alzheimer’s, and
targeted the toxic version of the
huntingtin protein responsible
for symptoms, similar to aducanumab. While Tominersen
demonstrated potential for
treating Huntington’s at first, it
was eventually discontinued in
its phase III clinical trials when
studies showed that the drug
worsened patients’ conditions.
Health experts argue that</span></p><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">what happened with Tominersen could happen to aducanumab, but at a much larger
scale since it is on the market.
Not only is the drug extremely
expensive, at $56,000 a year, but
it relies on false hope instead
of scientific evidence, providing little to no benefits or, even
worse, endangering a patient’s
health. The drug’s approval also
came with criticism of the amyloid cascade hypothesis, which
states that the build-up of betaamyloid is the main disruptor of
neuronal function and has been
acting as the foundation for
pharmaceutical research. Yet,
the true function of amyloid in
Alzheimer’s is still unclear. One
theory states that amyloid is
not a cause of Alzheimer’s but
rather a response to the brain’s
degeneration, while others mention that Alzheimer’s is a heterogeneous disease that includes
several root causes besides betaamyloid aggregates, such as tau
tangles, formed by aggregation
of a protein called tau, and vascular abnormalities, changes in
blood flow of the brain.
Regardless of whether approving aducanumab was right,
the scientific community has
taken a big step. Aducanumab
represents a bright light for
Alzheimer’s patients who have
never seen a glimmer of hope
after being diagnosed with this
terminal disease. If aducanumab is successful, it could set a
precedent for other drugs treating serious diseases that need
conditional approval. This optimism is also a double-edged
sword, however. If it fails, the
hopes of patients and scientists alike could be crushed, and
therapy regulations would likely
become stricter. In any case, the
best thing to do is wish for aducanumab to be the miracle drug
that paves a promising future
for neurodegenerative diseases.</span></p><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Advertisement</span></p><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Can’t get enough of The Spectator?

Literature
By ANIKA AMIN
Many feel as if they are living
in unprecedented times. A hazy
question mark floats around
everything, whether with regard
to job prospects, the housing
market, or the fate of humanity
itself.
This sort of
anxiety
permeates the work of Irish
literary
wunderkind
Sally
Rooney, none the more so
than in her most recent novel,
“Beautiful World Where Are
You?” released on September
7. Following the success of her
first novel “Conversations with
Friends” (2017) and the even
greater success of her second,
“Normal
People”
(2018),
“Beautiful World Where Are
You?” sets out to answer the
very question posed in the title.
Alternating
between
omniscient
third
person
narration and an epistolary
e-mail
correspondence,
“Beautiful World Where Are
You?” follows a pair of best
friends (Alice and Eileen) and
their respective love interests.
The book differs from Rooney’s
other work, as the characters are
already in their late 20s and early
30s, well into their careers, and
past that fleeting precipice of
youth in which you still think
your dreams may very well be
realized.
For Alice, an idealistic and
successful novelist with critical
and
commercial
acclaim,
achieving her dreams was the
part that caused her to spiral.
Following a mental breakdown
and brief stint at the psychiatric
hospital, Alice has fled to a
small town near the ocean. She
meets Felix, working a bluecollar warehouse job, and asks
him to travel to Rome with her.
Back in Dublin her old college
roommate Eileen is recovering
from a bad breakup, stuck in
a dead-end job at a literary
magazine. Her story follows her
and Simon, a man she’s known
since childhood, and their tricky
relationship that has escaped
definition ever since.</span></p><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Zillenial Existential Dread
It is difficult to describe
“Beautiful World Where Are
You” beyond that—critics
and fans alike have noted the
style of Rooney’s novels, a
style that is best summed up
as “No plot, just vibes.” Of
course things happen, but it is
largely a character study. They
love, cry, fight, make up, and
worry. They have philosophical
conversations about the morality
of spending one’s life loving,
crying, fighting, making up, and
worrying.
Rooney’s writing may be
extremely accessible and easy
to read, but nevertheless, she
demonstrates an incredible
command
over
language.
Her dialogue is at its best in
“Beautiful World Where Are
You” and it seems that she
recently turned over a new leaf
in comedic writing––there are
actually some laugh-inducing
moments in this book. Her
signature lack of quotation
marks and the direct and sparse
narration invites readers to pass
their own judgments and come
to their own conclusions. But on
the few occasions that there is a
precise look into the heads of
the characters, it is all the more
impactful.
Alice and Eileen are
Rooney-typical leading ladies:
prestigiously educated, painfully
self-aware, and mildly unhinged.
Smart enough to understand
their poor decisions, but for
whatever reason, powerless to
stop. In between their romantic
entanglements, they write to
each other (in lengthy emails
that utilize at least one SAT
caliber vocabulary word per
sentence, for some reason)
about everything—their lives,
their loves, and the Bronze Age
Collapse.
The epistolary chapters
have garnered some criticism,
perhaps rightfully so. Though
providing valuable insight into
the voices of the characters and
acting as a sharp contrast to the
eerie omniscient uncertainty of
the other chapters, they are often
dominated by philosophical</span></p><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">musings and existential anxieties
that alternate between genuinely
lovely and thought provoking, to
ridiculously first-world, and—
this is the most important—
extremely meta. There is a
large emphasis placed on a
recurring question throughout
the e-mails, first posed by Alice.
In a world racked with suffering,
the majority of the population
living in what the girls would
consider abject poverty, what
do the things that Alice and
Eileen concern themselves
with even matter? The irony is
obvious, maybe even prompting
readers to wonder whether this
is satirical or not.
Where “Normal People”
and
“Conversations
With
Friends” had lasting appeal
and an ambiguous timeline—
obviously taking place within
the 21st century and post the
2008 economic downturn—
you can’t really pinpoint it
beyond that. The book is
really a book of the current
moment. Conversations on the
state of modern conservatism,
capitalism, and politics are
abundant throughout. What
makes it interesting is the
fact that the book directly
acknowledges its relation to
time. In an e-mail to Alice,
Eileen talks of how “there is no
longer a neutral setting, there is
only the timeline,” speaking of
the manner in which everything,
including art, is defined by its
relation to the current period
of historical crisis. By the end
of the book, the pandemic is
underway.
Contemporary novels being
chronically of their time is
nothing new. English literary
critic James Wood coined the
term “Hysterical Realism” in
2000 in an effort to describe
what he felt was a trend of
novels characterized by absurd
prose (the hysterical) and indepth discussion of social
phenomenon (the realism).
While Rooney’s writing could
hardly be characterized as
this—shorter and focused on
the mundane—she attempts</span></p><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">to describe how the world
works and how somebody felt
about something. This wouldn’t
be a problem if her social
commentary wasn’t half-baked
every single time.
At the start, it seems like
there is potential. Felix spends
more hours working, only to
make a fraction of what Alice
does; Eileen has conversations
with her fellow workers about
the state of capitalism. There
was the setup for something
more. The issue is that the
girls—Alice in particular, who is
literally a millionaire—spend so
much time reflecting upon their
privileged place in the world,
only to come to the conclusion
that the only thing you can do is
to savor the moment and cherish
your loved ones. In a way, this
is the best and worst thing
about “Beautiful World Where
Are You.” The conclusion is
emotionally fulfilling and leaves
you with a warm feeling because
alongside all the self-indulgent
moral debate, Alice and Eileen
do genuinely build precious
relationships with the boys and
with each other. The reader is
left happy that on the personal
end, things more or less worked
out. But for a book that presents
itself as a political project—and
it would be an entirely different
matter if it never attempted to
do so—it serves to reinforce the
sense of psychological comfort
that holds together the mental
health of those who are “aware”
of their privilege in the first
world.
From a literary point of
view, the novel is moving and
beautiful, and perhaps that is the
point it tries to make, that that is
all that matters. Funnily enough,
I feel as if I’ve fallen victim to
the very phenomenon described
in the book: judging art relative
to the timeline. But although I
appreciate the irony, I can’t help
but believe that the “lesson”
of the book, so to speak, is
the same stale rhetoric that has
always been used to keep people
comfortable and complacent.</span></p><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Television “Only Murders in the Building” Kills It
By ROXY PERAZZO
A true-crime lover’s dream,
“Only Murders in the Building”
features a trio of New Yorkers
simultaneously trying to solve a
murder and get their big break
into the world of podcasts.
With a story that continuously
peels back more and more layers
of mystery, alongside a healthy
dose of humor, the show
infuses a classic murder mystery
with comedy and, needless to
say, kills it.
“Only Murders in the
Building”
features
the
unexpected trio (both in real life
and in the show) of neighbors
Mabel (Selena Gomez), Charles
(Steve Martin), and Oliver
(Martin Short). After fellow
tenant Tim Kono (Julian Cihi)
dies mysteriously, they team up
to solve what they believe was
a murder. As they begin their
investigation, Oliver also has
the idea of creating the trio’s
own true-crime podcast: “Only
Murders in the Building.”
An almost-serious murder</span></p><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">mystery is new ground for
seasoned comedians Steve
Martin and Martin Short.
Charles’s
more
reserved
personality and dedication to the
investigation contrasts well with
Oliver’s more outgoing nature
and dedication to the podcast,
keeping time with the classic
dynamic of the two without
taking the spotlight. On top of
that, the show is even more of a
stretch for popidol and Wizards
of Waverly Place star Selena
Gomez. Despite this, all three
have great chemistry with each
other on screen.
The
seasoned
comics
work well with Mabel, whose
character is more serious and
mysterious. Charles and Mabel
connect on a shared reserved
quality, while Mabel and Oliver
connect over their constant
dedication to the investigation.
While the core trio is definitely
unorthodox, something they are
able to admit through humor,
they work surprisingly well
together. The age gap between
the two men and Mabel provides</span></p><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">moments of cross-generational
comedy, full of cheeky outdated
references and explanations
of modern slang. Despite not
always fitting the serious tone,
the comedy ties in well because
it mainly consists of quick, witty
banter between the characters
that gets the viewers’ attention
but isn’t drawn-out. Not only
does the wit of the show shine
through in the dialogue, but it
also shows in the trio’s parody
of a podcast team.
While the plot and writing
help balance the different
aspects of the show, the overall
structure also plays into the
show’s appeal. The pacing
is slow, but it works with
the suspense of the mystery
surrounding the characters,
especially Mabel. From the
start, she is presented as a very
private, closed-off character, but
as the episodes progress, we get
more insight into her personal
life and her past. The storylines
and mysteries are balanced such
that “Only Murders” never
feels tedious which could easily</span></p><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">be the case with less skillful
execution. And, as a result of
the pacing, each episode has
a chance to go in depth on a
specific and engaging aspect of
the investigation.
Not only does the pacing
play into the sense of mystery
within the show, but the
aesthetics are also perfectly
catered to the tone. The muted,
earthy color scheme along with
the dim lighting give it a cozy
and old-timey feel that adds
to the curious nature of the
characters and the investigation.
The building’s aesthetics play
into the sense of wealth that
comes from the characters,
something that could influence
the case.
A combination of classic
murder mystery and modern
comedy, “Only Murders in
the Building” has it all. Full
of twists and turns with witty
humor included, the show is
a genre-bending delight. The
mystery is continuing to unfold

out, and they’re sure to die for.</span></p><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Playlist
