</span></p><p data-dcnode-id="3673"><span data-dcnode-id="3681" instrument_node="">Noteworthy in understanding the New Zealand case is that the reforms were able to go forward on the basis of majority support. This stands in contrast to the 60% requirement imposed in some other cases, such as the 2005 referendum on this issue in the Canadian province of </span><a data-dcnode-id="3679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2005_British_Columbia_electoral_reform_referendum" title="2005 British Columbia electoral reform referendum"><span data-dcnode-id="3680" instrument_node="">British Columbia</span></a><span data-dcnode-id="3678" instrument_node=""> that failed despite a vote of 57.69% in support of the reform. Late in the campaign, Peter Shirtcliffe had in fact sought to act on this and proposed that the referendum should require a majority of the whole electorate, not just those voting, to pass the reform, which the government rejected.</span><sup class="reference" data-dcnode-id="3675" id="cite_ref-Cambridge_University_Press_33-2"><a data-dcnode-id="3676" href="#cite_note-Cambridge_University_Press-33"><span data-dcnode-id="3677" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3674" instrument_node="">
</span></p><span data-dcnode-id="3672" instrument_node="">
</span><h3 data-dcnode-id="3662"><span class="mw-headline" data-dcnode-id="3670" id="Introduction_of_MMP"><span data-dcnode-id="3671" instrument_node="">Introduction of MMP</span></span><span class="mw-editsection" data-dcnode-id="3663"><span class="mw-editsection-bracket" data-dcnode-id="3668"><span data-dcnode-id="3669" instrument_node="">[</span></span><a data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D12" title="Edit section: Introduction of MMP"><span data-dcnode-id="3667" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3664"><span data-dcnode-id="3665" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3661" instrument_node="">
</span><table class="box-Update plainlinks metadata ambox ambox-content ambox-Update" data-dcnode-id="3640" role="presentation"><tbody data-dcnode-id="3641"><tr data-dcnode-id="3642"><td class="mbox-image" data-dcnode-id="3658"><div data-dcnode-id="3659" style="width:52px"><img alt="Ambox current red Asia Australia.svg" data-dcnode-id="3660" data-file-height="290" data-file-width="360" decoding="async" height="34" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/42px-Ambox_current_red_Asia_Australia.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/63px-Ambox_current_red_Asia_Australia.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/84px-Ambox_current_red_Asia_Australia.svg.png 2x" width="42"></div></td><td class="mbox-text" data-dcnode-id="3643"><div class="mbox-text-span" data-dcnode-id="3644"><span data-dcnode-id="3657" instrument_node="">This section needs to be </span><b data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">updated</span></b><span data-dcnode-id="3654" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node=""> Please help update this article to reflect recent events or newly available information.</span></span><span data-dcnode-id="3651" instrument_node=""> </span><span class="date-container" data-dcnode-id="3645"><i data-dcnode-id="3646"><span data-dcnode-id="3650" instrument_node="">(</span><span class="date" data-dcnode-id="3648"><span data-dcnode-id="3649" instrument_node="">July 2015</span></span><span data-dcnode-id="3647" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3639" instrument_node="">
</span><p data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">The first election using the MMP system was held in 1996. Districts were re-drawn as in this election there were 34 fewer district members than had been elected in the 1993 election. As well, the Parliamentary seating had to be reconfigured as overall there were to be 21 more members than had been elected in 1993.
</span></p><p data-dcnode-id="3627"><span data-dcnode-id="3636" instrument_node="">Under MMP, each voter has two votes: the first vote is called the party vote and voters use this vote to express their support for a particular party.</span><sup class="reference" data-dcnode-id="3633" id="cite_ref-MMP_Voting_System_37-0"><a data-dcnode-id="3634" href="#cite_note-MMP_Voting_System-37"><span data-dcnode-id="3635" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3632" instrument_node=""> The second vote is the electorate vote, which is used to express support for a candidate to represent the voter's electorate in Parliament.</span><sup class="reference" data-dcnode-id="3629" id="cite_ref-38"><a data-dcnode-id="3630" href="#cite_note-38"><span data-dcnode-id="3631" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3628" instrument_node="">
</span></p><p data-dcnode-id="3621"><span data-dcnode-id="3626" instrument_node="">New Zealand's MMP system allocates top-up seats only to parties that have achieved an electoral threshold of 5 percent of the nationwide party vote, or success in an electorate, to ensure their proportion of the seat is about equal to its vote share. Parties who meet this threshold are entitled to a share of the seats in Parliament that is about the same as its share of the nationwide vote.</span><sup class="reference" data-dcnode-id="3623" id="cite_ref-MMP_Voting_System_37-1"><a data-dcnode-id="3624" href="#cite_note-MMP_Voting_System-37"><span data-dcnode-id="3625" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3622" instrument_node=""> If the number of its district seats are less than its vote share, it is allocated top-up seats. (Parties who do not exceed this threshold and who do not win at least one electorate seat receive no compensation for being under-represented. Those with less than .8 percent of the vote are not due any seats, of course.)
</span></p><p data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">For example, if a party gets 30% of the party vote it is due roughly 36 MPs in Parliament (being 30% of 120 seats). If that party won 20 electorate seats, it will receive 16 List MPs in addition to its 20 Electorate MPs.
</span></p><p data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">Because the system is proportional, it is difficult for any single party to gain a majority in Parliament alone. Therefore, coalitions or agreements between political parties are usually needed before Governments can be formed. The 2017 Election is a good example of this, resulting in a Labour-led government with coalitions with New Zealand First and the Greens.
</span></p><p data-dcnode-id="3615"><span data-dcnode-id="3616" instrument_node="">Under the FPP, the two main parties had taken the lion's share of the seats in 1993. The National party had taken majority government in 1993 with only 35 percent of the vote. Under MMP the result was much more proportional. The National Party was again the leading party and again took about 35 percent of the vote but this time won only 44 seats out of 120. Six parties won seats in the chamber compared to four under FPP in 1993. Such wide representation would be produced by MMP in every election until 2017.
</span></p><p data-dcnode-id="3609"><span data-dcnode-id="3614" instrument_node="">The 5% threshold has been criticised as a significant problem for minor parties, and impedes their ability to gain seats in Parliament. (In 2017 the Opportunities party took more than 2 percent of the vote and was due two seats proportionally but took none. About 6 percent of the vote in that election did not deliver any representation.) This has led to proposals to lower the percentage threshold.</span><sup class="reference" data-dcnode-id="3611" id="cite_ref-39"><a data-dcnode-id="3612" href="#cite_note-39"><span data-dcnode-id="3613" instrument_node="">[39]</span></a></sup><span data-dcnode-id="3610" instrument_node="">
</span></p><p data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">Coalition governments were rare, but not impossible under the FPP system. Most of the time a single party won majority government even if it did not win a majority of the vote. The majority governments elected in New Zealand have been mostly false-majority governments. Not since 1935 has a government been elected by a majority of the votes.
</span></p><p data-dcnode-id="3592"><span data-dcnode-id="3606" instrument_node="">As an example of a coalition government under FPP, in 1931–35 there was the </span><a data-dcnode-id="3604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Party_%28New_Zealand%29" title="United Party (New Zealand)"><span data-dcnode-id="3605" instrument_node="">United</span></a><span data-dcnode-id="3603" instrument_node="">/</span><a data-dcnode-id="3601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_Party_%28New_Zealand%29" title="Reform Party (New Zealand)"><span data-dcnode-id="3602" instrument_node="">Reform</span></a><span data-dcnode-id="3600" instrument_node=""> coalition. Following the </span><a data-dcnode-id="3598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1996_New_Zealand_general_election" title="1996 New Zealand general election"><span data-dcnode-id="3599" instrument_node="">1996 general election</span></a><span data-dcnode-id="3597" instrument_node=""> it took six weeks to form a coalition, showing that this is not a quick process.</span><sup class="reference" data-dcnode-id="3594" id="cite_ref-40"><a data-dcnode-id="3595" href="#cite_note-40"><span data-dcnode-id="3596" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3593" instrument_node="">
</span></p><p data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">MMP is arguably a more democratic system than FPP. Supporters of MMP criticised FPP for creating elective dictatorships, and promoting the excessive power of one party government. Supporters consider MMP to provide increased representational fairness, and better-considered, wiser, and more moderate policies because of cooperation of the leading party and minority parties. 
</span></p><p data-dcnode-id="3588"><span data-dcnode-id="3589" instrument_node="">Furthermore, MMP is considered to increase the representation of a diverse population, enabling a higher percentage of Maori, women, Pasifika and Asian people in Parliament. 
</span></p><p data-dcnode-id="3582"><span data-dcnode-id="3587" instrument_node="">However, supporters of FPP believe FPP provides a more stable Parliament, and avoids a minority party “kingmaker”, as was the case in 2017 with New Zealand First determining who would lead the government.</span><sup class="reference" data-dcnode-id="3584" id="cite_ref-41"><a data-dcnode-id="3585" href="#cite_note-41"><span data-dcnode-id="3586" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3583" instrument_node="">
</span></p><p data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">Prior to the switch to MMP, New Zealand largely had a two party system, with government interchanging between Labour and National since 1935. 
</span></p><p data-dcnode-id="3575"><span data-dcnode-id="3579" instrument_node="">Under MMP, National and Labour lost their complete dominance in the House, with the </span><a data-dcnode-id="3577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_New_Zealand_general_election" title="2020 New Zealand general election"><span data-dcnode-id="3578" instrument_node="">2020 election</span></a><span data-dcnode-id="3576" instrument_node=""> – the ninth since the introduction of MMP – being the first to give a single political party a majority of the seats (with very close to a majority of the votes). This had meant that electoral results have usually required political parties to form coalitions to govern. Indeed, since 1998 there have been minority coalition governments relying on supply and confidence from parties outside of government. 
</span></p><p data-dcnode-id="3570"><span data-dcnode-id="3574" instrument_node="">With the introduction of MMP, due to New Zealand's unique provision for parties to win list seats if they win at least one local seat despite getting less than the 5% </span><a class="mw-redirect" data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election_threshold" title="Election threshold"><span data-dcnode-id="3573" instrument_node="">threshold</span></a><span data-dcnode-id="3571" instrument_node="">, there has been a widening of political parties represented within the House. 
</span></p><p data-dcnode-id="3565"><span data-dcnode-id="3569" instrument_node="">Prior to the </span><a data-dcnode-id="3567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1996_New_Zealand_general_election" title="1996 New Zealand general election"><span data-dcnode-id="3568" instrument_node="">1996 election</span></a><span data-dcnode-id="3566" instrument_node="">, there were four parties in the chamber.
</span></p><p data-dcnode-id="3548"><span data-dcnode-id="3564" instrument_node="">After the switch to MMP, the </span><a data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1996_New_Zealand_general_election" title="1996 New Zealand general election"><span data-dcnode-id="3563" instrument_node="">1996 election</span></a><span data-dcnode-id="3561" instrument_node=""> gave seats in Parliament to six parties. The </span><a class="mw-redirect" data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Act_New_Zealand" title="Act New Zealand"><span data-dcnode-id="3560" instrument_node="">Act New Zealand</span></a><span data-dcnode-id="3558" instrument_node=""> party and </span><a data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_New_Zealand" title="United New Zealand"><span data-dcnode-id="3557" instrument_node="">United New Zealand</span></a><span data-dcnode-id="3555" instrument_node=""> was elected to Parliament for first time, joining the earlier elected Alliance, National, New Zealand First and Labour parties. Within a few years eight parties had seats in the chamber, after the </span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_Party_of_Aotearoa_New_Zealand" title="Green Party of Aotearoa New Zealand"><span data-dcnode-id="3554" instrument_node="">Greens</span></a><span data-dcnode-id="3552" instrument_node=""> separated from the Alliance for the 1999 election, and after the creation of the </span><a data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/M%25C4%2581ori_Party" title="Māori Party"><span data-dcnode-id="3551" instrument_node="">Māori Party</span></a><span data-dcnode-id="3549" instrument_node=""> in 2004, and with the continued use of MMP. 
</span></p><p data-dcnode-id="3536"><span data-dcnode-id="3547" instrument_node="">The number of political parties was then expected to fall </span><sup class="reference" data-dcnode-id="3544" id="cite_ref-42"><a data-dcnode-id="3545" href="#cite_note-42"><span data-dcnode-id="3546" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3543" instrument_node="">(as happened in </span><a data-dcnode-id="3541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="3542" instrument_node="">Germany</span></a><span data-dcnode-id="3540" instrument_node=""> after its adoption of MMP), but instead seven or eight parties consistently had seats (see the table below). This was the case until the </span><a data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2017_New_Zealand_general_election" title="2017 New Zealand general election"><span data-dcnode-id="3539" instrument_node="">2017 election</span></a><span data-dcnode-id="3537" instrument_node=""> where the number of parties in Parliament fell to five, the lowest it has been since MMP was introduced. 
</span></p><p data-dcnode-id="3527"><span data-dcnode-id="3535" instrument_node="">The 2017 election  saw a severe decrease in the vote share for the two larger minor parties that were returned to parliament. This could be attributed to political scandals</span><sup class="reference" data-dcnode-id="3532" id="cite_ref-43"><a data-dcnode-id="3533" href="#cite_note-43"><span data-dcnode-id="3534" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3531" instrument_node=""> and the popularity of the Labour leader candidate, </span><a data-dcnode-id="3529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacinda_Ardern" title="Jacinda Ardern"><span data-dcnode-id="3530" instrument_node="">Jacinda Ardern</span></a><span data-dcnode-id="3528" instrument_node="">, and evidence of the beginning of an overall decline.
</span></p><p data-dcnode-id="3518"><span data-dcnode-id="3526" instrument_node="">The transition to MMP increased the democratic accountability and tightened the relationship between votes cast and the seats. The change decreased the </span><a class="mw-redirect" data-dcnode-id="3524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gallagher_Index" title="Gallagher Index"><span data-dcnode-id="3525" instrument_node="">disproportionality</span></a><span data-dcnode-id="3523" instrument_node=""> of New Zealand's elections.</span><sup class="reference" data-dcnode-id="3520" id="cite_ref-44"><a data-dcnode-id="3521" href="#cite_note-44"><span data-dcnode-id="3522" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3519" instrument_node="">
</span></p><span data-dcnode-id="3517" instrument_node="">

</span><h3 data-dcnode-id="3291"><span class="mw-headline" data-dcnode-id="3299" id="2011_referendum"><span data-dcnode-id="3300" instrument_node="">2011 referendum</span></span><span class="mw-editsection" data-dcnode-id="3292"><span class="mw-editsection-bracket" data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">[</span></span><a data-dcnode-id="3295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D13" title="Edit section: 2011 referendum"><span data-dcnode-id="3296" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3290" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3284" role="note"><span data-dcnode-id="3287" instrument_node="">Main article: </span><a data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2011_New_Zealand_voting_system_referendum" title="2011 New Zealand voting system referendum"><span data-dcnode-id="3286" instrument_node="">2011 New Zealand voting system referendum</span></a></div><span data-dcnode-id="3283" instrument_node="">
</span><p data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">As part of the lead-up to the 2008 general election, the National Party promised a second referendum to decide whether or not to keep MMP. Upon gaining power, the party legislated that the referendum would be held alongside the 2011 general election, which took place on Saturday 26 November 2011. The referendum was similar to the 1992 referendum, in that voters were asked firstly to choose whether to keep the MMP system or to change to another system, and secondly to indicate which alternative system would, in the case of change, have their preference.
</span></p><p data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">Nearly 58% of voters voted to keep the MMP system in preference to any of the other four options, compared to 1993, where just under 54% had favoured MMP in preference to keeping FPP. On the second question, nearly one-third of voters didn't vote, or cast an invalid vote. Of those who did vote, nearly 47% favoured the former FPP system.
</span></p><span data-dcnode-id="3278" instrument_node="">

</span><p data-dcnode-id="2920"><span data-dcnode-id="2939" instrument_node="">On the back of the majority of voters voting to keep the MMP system, a review into the workings of the system by the </span><a class="mw-redirect" data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Electoral_Commission" title="New Zealand Electoral Commission"><span data-dcnode-id="2938" instrument_node="">Electoral Commission</span></a><span data-dcnode-id="2936" instrument_node=""> was automatically triggered. The Commission released a public consultation paper on 13 February 2012 calling for public submissions, with particular emphasis placed on six key areas. On 13 August 2012, the Commission released its proposal paper, recommending changes to some of the six areas.</span><sup class="reference" data-dcnode-id="2933" id="cite_ref-47"><a data-dcnode-id="2934" href="#cite_note-47"><span data-dcnode-id="2935" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2932" instrument_node=""> After submissions on the proposals were considered, the final report was presented to the Minister of Justice on 29 October 2012.</span><sup class="reference" data-dcnode-id="2929" id="cite_ref-48"><a data-dcnode-id="2930" href="#cite_note-48"><span data-dcnode-id="2931" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="2926" id="cite_ref-49"><a data-dcnode-id="2927" href="#cite_note-49"><span data-dcnode-id="2928" instrument_node="">[49]</span></a></sup><span data-dcnode-id="2925" instrument_node=""> It is up to Parliament to decide whether to enact any of the recommendations.</span><sup class="reference" data-dcnode-id="2922" id="cite_ref-50"><a data-dcnode-id="2923" href="#cite_note-50"><span data-dcnode-id="2924" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2921" instrument_node="">

</span><h3 data-dcnode-id="2797"><span class="mw-headline" data-dcnode-id="2805" id="Proposed_electoral_reform"><span data-dcnode-id="2806" instrument_node="">Proposed electoral reform</span></span><span class="mw-editsection" data-dcnode-id="2798"><span class="mw-editsection-bracket" data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">[</span></span><a data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D15" title="Edit section: Proposed electoral reform"><span data-dcnode-id="2802" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2796" instrument_node="">
</span><p data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">In response to generally declining voter turnout, a number of commentators have proposed changes to the electoral system.
</span></p><p data-dcnode-id="2784"><span data-dcnode-id="2793" instrument_node="">Former Prime Minister of New Zealand, Geoffrey Palmer, has expressed support for the introduction of compulsory voting in New Zealand, as has existed in Australia since 1924.</span><sup class="reference" data-dcnode-id="2790" id="cite_ref-:7_51-0"><a data-dcnode-id="2791" href="#cite_note-:7-51"><span data-dcnode-id="2792" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2789" instrument_node=""> It is believed that such a measure will improve democratic engagement, however not all agree, with current Prime Minister Jacinda Ardern considering that citizens should vote because they're engaged, not because they are compelled to.</span><sup class="reference" data-dcnode-id="2786" id="cite_ref-52"><a data-dcnode-id="2787" href="#cite_note-52"><span data-dcnode-id="2788" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2785" instrument_node="">
</span></p><p data-dcnode-id="2778"><span data-dcnode-id="2783" instrument_node="">Palmer has also expressed support for lowering the voting age to 16, considering that this may provide a platform for increased civic education during high school years.</span><sup class="reference" data-dcnode-id="2780" id="cite_ref-:7_51-1"><a data-dcnode-id="2781" href="#cite_note-:7-51"><span data-dcnode-id="2782" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2779" instrument_node="">
</span></p><p data-dcnode-id="2772"><span data-dcnode-id="2777" instrument_node="">In October 2021, the Labour government initiated a review of aspects of New Zealand's electoral law.</span><sup class="reference" data-dcnode-id="2774" id="cite_ref-53"><a data-dcnode-id="2775" href="#cite_note-53"><span data-dcnode-id="2776" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2773" instrument_node="">
</span></p><span data-dcnode-id="2771" instrument_node="">
</span><h2 data-dcnode-id="2761"><span class="mw-headline" data-dcnode-id="2769" id="Local_government_elections"><span data-dcnode-id="2770" instrument_node="">Local government elections</span></span><span class="mw-editsection" data-dcnode-id="2762"><span class="mw-editsection-bracket" data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">[</span></span><a data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D16" title="Edit section: Local government elections"><span data-dcnode-id="2766" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2728"><span data-dcnode-id="2759" instrument_node="">Up until the </span><a data-dcnode-id="2757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2004_New_Zealand_local_elections" title="2004 New Zealand local elections"><span data-dcnode-id="2758" instrument_node="">2004 local elections</span></a><span data-dcnode-id="2756" instrument_node="">, all </span><a data-dcnode-id="2754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Territorial_authorities_of_New_Zealand" title="Territorial authorities of New Zealand"><span data-dcnode-id="2755" instrument_node="">territorial authorities</span></a><span data-dcnode-id="2753" instrument_node=""> were elected using the </span><a class="mw-redirect" data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plurality-at-large_voting" title="Plurality-at-large voting"><span data-dcnode-id="2752" instrument_node="">bloc vote</span></a><span data-dcnode-id="2750" instrument_node=""> (although often referred to as first-past-the-post). In 2004, at the discretion of the council, they could use the </span><a data-dcnode-id="2748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Single_transferable_vote" title="Single transferable vote"><span data-dcnode-id="2749" instrument_node="">single transferable vote</span></a><span data-dcnode-id="2747" instrument_node="">. Eight local bodies used STV in the </span><a data-dcnode-id="2745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2007_New_Zealand_local_elections" title="2007 New Zealand local elections"><span data-dcnode-id="2746" instrument_node="">2007 local body elections</span></a><span data-dcnode-id="2744" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2737" style="white-space:nowrap;"><span data-dcnode-id="2743" instrument_node="">[</span><i data-dcnode-id="2739"><a data-dcnode-id="2740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2741" title="This claim needs references to reliable sources. (September 2013)"><span data-dcnode-id="2742" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2738" instrument_node="">]</span></sup><span data-dcnode-id="2736" instrument_node=""> However, only five territorial authorities used STV in the </span><a data-dcnode-id="2734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2013_New_Zealand_local_elections" title="2013 New Zealand local elections"><span data-dcnode-id="2735" instrument_node="">2013 local elections</span></a><span data-dcnode-id="2733" instrument_node="">.</span><sup class="reference" data-dcnode-id="2730" id="cite_ref-DIA_STV_54-0"><a data-dcnode-id="2731" href="#cite_note-DIA_STV-54"><span data-dcnode-id="2732" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2729" instrument_node="">
</span></p><p data-dcnode-id="2719"><span data-dcnode-id="2727" instrument_node="">Almost all </span><a data-dcnode-id="2725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regions_of_New_Zealand" title="Regions of New Zealand"><span data-dcnode-id="2726" instrument_node="">regional</span></a><span data-dcnode-id="2724" instrument_node=""> authorities in New Zealand use FPP. However the Greater Wellington Regional Council used STV for the first time in the 2013 elections, becoming the first time that a regional authority used STV.</span><sup class="reference" data-dcnode-id="2721" id="cite_ref-DIA_STV_54-1"><a data-dcnode-id="2722" href="#cite_note-DIA_STV-54"><span data-dcnode-id="2723" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2720" instrument_node="">
</span></p><p data-dcnode-id="2710"><span data-dcnode-id="2718" instrument_node="">All </span><a data-dcnode-id="2716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/District_health_board" title="District health board"><span data-dcnode-id="2717" instrument_node="">district health boards</span></a><span data-dcnode-id="2715" instrument_node=""> must use STV.</span><sup class="reference" data-dcnode-id="2712" id="cite_ref-DIA_STV_54-2"><a data-dcnode-id="2713" href="#cite_note-DIA_STV-54"><span data-dcnode-id="2714" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2711" instrument_node="">
</span></p><p data-dcnode-id="2690"><span data-dcnode-id="2709" instrument_node="">In February 2021, the government passed the </span><a data-dcnode-id="2707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Local_Electoral_%28M%25C4%2581ori_Wards_and_M%25C4%2581ori_Constituencies%29_Amendment_Act_2021" title="Local Electoral (Māori Wards and Māori Constituencies) Amendment Act 2021"><span data-dcnode-id="2708" instrument_node="">Local Electoral (Māori Wards and Māori Constituencies) Amendment Act</span></a><span data-dcnode-id="2706" instrument_node=""> which removed the option for citizens to require a local poll to decide whether the council should establish a Māori ward.</span><sup class="reference" data-dcnode-id="2703" id="cite_ref-55"><a data-dcnode-id="2704" href="#cite_note-55"><span data-dcnode-id="2705" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2702" instrument_node=""> The poll option had been seen as a barrier to establishing Māori wards. Twenty-four councils had sought to establish Māori wards since 2002 and only two had been successful.</span><sup class="reference" data-dcnode-id="2699" id="cite_ref-56"><a data-dcnode-id="2700" href="#cite_note-56"><span data-dcnode-id="2701" instrument_node="">[56]</span></a></sup><span data-dcnode-id="2698" instrument_node=""> The government enacted the change against advice from the </span><a class="mw-redirect" data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Department_of_Internal_Affairs_%28New_Zealand%29" title="Department of Internal Affairs (New Zealand)"><span data-dcnode-id="2697" instrument_node="">Department of Internal Affairs</span></a><span data-dcnode-id="2695" instrument_node="">, which recommended more time was provided to consult on the change.</span><sup class="reference" data-dcnode-id="2692" id="cite_ref-57"><a data-dcnode-id="2693" href="#cite_note-57"><span data-dcnode-id="2694" instrument_node="">[57]</span></a></sup><span data-dcnode-id="2691" instrument_node="">
</span></p><span data-dcnode-id="2689" instrument_node="">
</span><h2 data-dcnode-id="2679"><span class="mw-headline" data-dcnode-id="2687" id="See_also"><span data-dcnode-id="2688" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="2680"><span class="mw-editsection-bracket" data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">[</span></span><a data-dcnode-id="2683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D17" title="Edit section: See also"><span data-dcnode-id="2684" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2678" instrument_node="">
