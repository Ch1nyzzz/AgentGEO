</span><p data-dcnode-id="4983"><b data-dcnode-id="4991"><a data-dcnode-id="4993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_reform" title="Electoral reform"><span data-dcnode-id="4994" instrument_node="">Electoral reform</span></a><span data-dcnode-id="4992" instrument_node=""> in New Zealand</span></b><span data-dcnode-id="4990" instrument_node=""> has, in recent years, become a political issue as major changes have been made to both </span><a data-dcnode-id="4988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Parliament" title="New Zealand Parliament"><span data-dcnode-id="4989" instrument_node="">parliamentary</span></a><span data-dcnode-id="4987" instrument_node=""> and local government </span><a data-dcnode-id="4985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_system_of_New_Zealand" title="Electoral system of New Zealand"><span data-dcnode-id="4986" instrument_node="">electoral systems</span></a><span data-dcnode-id="4984" instrument_node="">.
</span></p><p data-dcnode-id="4942"><span data-dcnode-id="4982" instrument_node="">National elections in New Zealand were first held in 1853 using the basic </span><a class="mw-redirect" data-dcnode-id="4980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First-past-the-post" title="First-past-the-post"><span data-dcnode-id="4981" instrument_node="">first-past-the-post</span></a><span data-dcnode-id="4979" instrument_node=""> (FPP) voting system</span><sup class="reference" data-dcnode-id="4976" id="cite_ref-1"><a data-dcnode-id="4977" href="#cite_note-1"><span data-dcnode-id="4978" instrument_node="">[1]</span></a></sup><span data-dcnode-id="4975" instrument_node=""> and conducted over a period of two and a half months. At this time, the country was divided into 23 </span><a data-dcnode-id="4973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_electorates" title="New Zealand electorates"><span data-dcnode-id="4974" instrument_node="">electorates</span></a><span data-dcnode-id="4972" instrument_node=""> who elected either a single member or three members (MPs) depending on the population within that area.</span><sup class="reference" data-dcnode-id="4969" id="cite_ref-2"><a data-dcnode-id="4970" href="#cite_note-2"><span data-dcnode-id="4971" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4968" instrument_node=""> In the multiple-seat districts, </span><a data-dcnode-id="4966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multiple_non-transferable_vote" title="Multiple non-transferable vote"><span data-dcnode-id="4967" instrument_node="">Multiple non-transferable vote</span></a><span data-dcnode-id="4965" instrument_node=""> (AKA Block voting) was used. This basic system continued over a great period of time, with major diversions only in the form of the change to the second ballot system (a type of </span><a data-dcnode-id="4963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Two-round_system" title="Two-round system"><span data-dcnode-id="4964" instrument_node="">two-round system</span></a><span data-dcnode-id="4962" instrument_node="">) for two elections, in the </span><a data-dcnode-id="4960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1908_New_Zealand_general_election" title="1908 New Zealand general election"><span data-dcnode-id="4961" instrument_node="">1908 election</span></a><span data-dcnode-id="4959" instrument_node=""> and </span><a data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1911_New_Zealand_general_election" title="1911 New Zealand general election"><span data-dcnode-id="4958" instrument_node="">1911 election</span></a><span data-dcnode-id="4956" instrument_node="">, which was swiftly repealed in 1913,</span><sup class="reference" data-dcnode-id="4953" id="cite_ref-:1_3-0"><a data-dcnode-id="4954" href="#cite_note-:1-3"><span data-dcnode-id="4955" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4952" instrument_node=""> and the change to the </span><a class="mw-redirect" data-dcnode-id="4950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mixed-member_proportional" title="Mixed-member proportional"><span data-dcnode-id="4951" instrument_node="">mixed-member proportional</span></a><span data-dcnode-id="4949" instrument_node=""> (MMP) system in 1996. MMP is a system of </span><a data-dcnode-id="4947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proportional_representation" title="Proportional representation"><span data-dcnode-id="4948" instrument_node="">proportional representation</span></a><span data-dcnode-id="4946" instrument_node=""> in which there is a mix of electorate MPs and </span><a class="mw-redirect" data-dcnode-id="4944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Party_list" title="Party list"><span data-dcnode-id="4945" instrument_node="">list</span></a><span data-dcnode-id="4943" instrument_node=""> MPs. Following the introduction of proportional representation more minor parties entered Parliament, and coalition governments became the norm.
</span></p><span data-dcnode-id="4941" instrument_node="">

</span><h2 data-dcnode-id="4759"><span class="mw-headline" data-dcnode-id="4767" id="Overview"><span data-dcnode-id="4768" instrument_node="">Overview</span></span><span class="mw-editsection" data-dcnode-id="4760"><span class="mw-editsection-bracket" data-dcnode-id="4765"><span data-dcnode-id="4766" instrument_node="">[</span></span><a data-dcnode-id="4763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D1" title="Edit section: Overview"><span data-dcnode-id="4764" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4761"><span data-dcnode-id="4762" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4758" instrument_node="">
</span><p data-dcnode-id="4742"><span data-dcnode-id="4757" instrument_node="">The </span><a data-dcnode-id="4755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First-past-the-post_voting" title="First-past-the-post voting"><span data-dcnode-id="4756" instrument_node="">first-past-the-post voting</span></a><span data-dcnode-id="4754" instrument_node=""> (FPP) electoral system, used in New Zealand for much of its history, was a simple plurality system, in which voters marked their preference for the candidate they wish to represent the electorate they live in. The candidate or candidates that garners the most votes through this process is then elected to Parliament. Generally, elections conducted in this manner result in an </span><a class="mw-redirect" data-dcnode-id="4752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absolute_majority" title="Absolute majority"><span data-dcnode-id="4753" instrument_node="">absolute majority</span></a><span data-dcnode-id="4751" instrument_node="">,</span><sup class="reference" data-dcnode-id="4748" id="cite_ref-4"><a data-dcnode-id="4749" href="#cite_note-4"><span data-dcnode-id="4750" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4747" instrument_node=""> in which the party who wins the most votes wins a majority of seats and has the absolute power in the house. The only deviation from this in New Zealand during the FPP era was before the 1890s during which each member was independent and as such no political parties existed.</span><sup class="reference" data-dcnode-id="4744" id="cite_ref-5"><a data-dcnode-id="4745" href="#cite_note-5"><span data-dcnode-id="4746" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4743" instrument_node="">
</span></p><p data-dcnode-id="4737"><span data-dcnode-id="4741" instrument_node="">With the appearance of a New Liberal Party and the Independent Labour League, the old-time two-party system was crumbling significantly. Previously in such ridings as Ashburton the successful candidate had been getting elected with less than half he votes - in 1893 with as few as 32 percent of the vote. In the </span><a data-dcnode-id="4739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1905_New_Zealand_general_election" title="1905 New Zealand general election"><span data-dcnode-id="4740" instrument_node="">1905 election</span></a><span data-dcnode-id="4738" instrument_node="">, for the first time, all members were elected in single-member districts. Concern for fairness and avoidance of the bad effects of vote spitting led NZ to try out a majoritarian system of voting.  
</span></p><p data-dcnode-id="4728"><span data-dcnode-id="4736" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="4734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_ballot" title="Second ballot"><span data-dcnode-id="4735" instrument_node="">second-ballot</span></a><span data-dcnode-id="4733" instrument_node=""> system used from 1908–1913 was a modification of the existing FPP system. A first election was held same as under FPP, but it guaranteed that a candidate to be elected, must garner over 50% of the votes in their district.</span><sup class="reference" data-dcnode-id="4730" id="cite_ref-:1_3-1"><a data-dcnode-id="4731" href="#cite_note-:1-3"><span data-dcnode-id="4732" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4729" instrument_node=""> If no one reached this threshold in the first count, a new round of voting was conducted featuring only the two highest polling candidates, this ensured one or the other gains over 50%. This was discontinued in 1913, NZ reverting to FPP in single-member districts, the successful candidate winning by plurality, which in many cases was less than half the votes. As well, FPP was producing majority government but not since 1935 has a government been elected by a majority of the votes.
</span></p><p data-dcnode-id="4719"><span data-dcnode-id="4727" instrument_node="">Many NZ voters became dissatisfied with this voting by the 1990s. </span><a data-dcnode-id="4725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mixed-member_proportional_representation" title="Mixed-member proportional representation"><span data-dcnode-id="4726" instrument_node="">Mixed-member proportional (MMP)</span></a><span data-dcnode-id="4724" instrument_node="">, as seen in New Zealand from 1996 onward, is a proportional system wherein each voter has two votes. One of these is for the candidate in their electorate and one is for the overall political party.</span><sup class="reference" data-dcnode-id="4721" id="cite_ref-6"><a data-dcnode-id="4722" href="#cite_note-6"><span data-dcnode-id="4723" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4720" instrument_node=""> The party vote is what ultimately decides the number of seats each party gains in parliament, with any shortfall between the number of electorates won and the overall percentage made up by list party members.
</span></p><p data-dcnode-id="4697"><span data-dcnode-id="4718" instrument_node="">The impetus to change from FPP to MMP was largely due to the excessive </span><a class="mw-redirect" data-dcnode-id="4716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disproportionality" title="Disproportionality"><span data-dcnode-id="4717" instrument_node="">disproportionality</span></a><span data-dcnode-id="4715" instrument_node=""> FPP elections are prone to. Prominent examples of this include the 1966</span><sup class="reference" data-dcnode-id="4712" id="cite_ref-7"><a data-dcnode-id="4713" href="#cite_note-7"><span data-dcnode-id="4714" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4711" instrument_node=""> election, in which the </span><a data-dcnode-id="4709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Credit_Party_%28New_Zealand%29" title="Social Credit Party (New Zealand)"><span data-dcnode-id="4710" instrument_node="">Social Credit Party</span></a><span data-dcnode-id="4708" instrument_node=""> gained 9% of the vote and yet won only a single seat. Furthermore, this disproportionality often lead to the successful party winning less overall votes than the opposition, but gaining more seats. An example of this is the 1978 election, in which the </span><a data-dcnode-id="4706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Labour_Party" title="New Zealand Labour Party"><span data-dcnode-id="4707" instrument_node="">Labour Party</span></a><span data-dcnode-id="4705" instrument_node=""> won more than 10,000 votes (0.6%) more than the </span><a data-dcnode-id="4703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_National_Party" title="New Zealand National Party"><span data-dcnode-id="4704" instrument_node="">National Party</span></a><span data-dcnode-id="4702" instrument_node=""> but gained 11 fewer seats in Parliament.</span><sup class="reference" data-dcnode-id="4699" id="cite_ref-8"><a data-dcnode-id="4700" href="#cite_note-8"><span data-dcnode-id="4701" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4698" instrument_node="">
</span></p><p data-dcnode-id="4688"><span data-dcnode-id="4696" instrument_node="">Another major factor that highlighted the weaknesses of FPP was the potential abuse of power that could occur. New Zealand does not have a written Constitution, and as such it is subject to change. Under FPP the power is concentrated with the leader of the winning party. Prime Minister </span><a data-dcnode-id="4694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Muldoon" title="Robert Muldoon"><span data-dcnode-id="4695" instrument_node="">Robert Muldoon</span></a><span data-dcnode-id="4693" instrument_node=""> showed this clearly when he illegally abolished the Superannuation scheme upon his election in 1975. Though the Judiciary ruled this move illegal, they were unable to halt the action and Muldoon faced no repercussions for this abuse of power.</span><sup class="reference" data-dcnode-id="4690" id="cite_ref-9"><a data-dcnode-id="4691" href="#cite_note-9"><span data-dcnode-id="4692" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4689" instrument_node="">
</span></p><p data-dcnode-id="4679"><span data-dcnode-id="4687" instrument_node="">Due to these factors, in 1979 the Labour Party adopted policy to seriously consider the adoption of proportional representation in place of the contemporary FPP system. While changes resultant from this were extremely delayed, the undercurrent of support for electoral reform continued and were bolstered by the commissioning of the </span><a data-dcnode-id="4685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Commission_on_the_Electoral_System" title="Royal Commission on the Electoral System"><span data-dcnode-id="4686" instrument_node="">Royal Commission on the Electoral System</span></a><span data-dcnode-id="4684" instrument_node=""> in 1985 which ultimately recommended a change to MMP.</span><sup class="reference" data-dcnode-id="4681" id="cite_ref-:0_10-0"><a data-dcnode-id="4682" href="#cite_note-:0-10"><span data-dcnode-id="4683" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4680" instrument_node=""> Finally, both the Labour and National parties entered the 1990 election with policy for a referendum on electoral reform. (The National Party won majority government in the elections of 1990 and 1993 with less than half the votes - evidence of the effects of vote-splitting under FPP, a system not well-suited to the multi-party system that NZ had.)
</span></p><p data-dcnode-id="4669"><span data-dcnode-id="4678" instrument_node="">With both major parties calling for referendum on reform, a referendum to test public sentiment was held in 1992. The 1992 referendum represented the first tangible governmental step towards electoral reform. The results of this referendum overwhelmingly supported change and selected MMP as the preferred electoral system to replace FPP.</span><sup class="reference" data-dcnode-id="4675" id="cite_ref-:2_11-0"><a data-dcnode-id="4676" href="#cite_note-:2-11"><span data-dcnode-id="4677" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4674" instrument_node=""> Due to this a binding referendum was held the following year in 1993, offering a choice between these two systems. MMP was selected by a vote of 53.9% to 46.1%, a majority in favour of change.</span><sup class="reference" data-dcnode-id="4671" id="cite_ref-12"><a data-dcnode-id="4672" href="#cite_note-12"><span data-dcnode-id="4673" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4670" instrument_node=""> and was implemented before the next election in 1996.
</span></p><span data-dcnode-id="4668" instrument_node="">
</span><h2 data-dcnode-id="4658"><span class="mw-headline" data-dcnode-id="4666" id="Parliamentary_electoral_reform"><span data-dcnode-id="4667" instrument_node="">Parliamentary electoral reform</span></span><span class="mw-editsection" data-dcnode-id="4659"><span class="mw-editsection-bracket" data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">[</span></span><a data-dcnode-id="4662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D2" title="Edit section: Parliamentary electoral reform"><span data-dcnode-id="4663" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4657" instrument_node="">
</span><p data-dcnode-id="4622"><span data-dcnode-id="4656" instrument_node="">Authority for government in New Zealand is derived from </span><a data-dcnode-id="4654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Waitangi" title="Treaty of Waitangi"><span data-dcnode-id="4655" instrument_node="">Te Tiriti o Waitangi</span></a><span data-dcnode-id="4653" instrument_node=""> (Treaty of Waitangi),</span><sup class="reference" data-dcnode-id="4650" id="cite_ref-13"><a data-dcnode-id="4651" href="#cite_note-13"><span data-dcnode-id="4652" instrument_node="">[13]</span></a></sup><span data-dcnode-id="4649" instrument_node="">  which was signed in 1840. The meaning of Te Tiriti is complicated by the fact that the Maori and English texts of the agreement are not entirely consistent in their meanings. While the English version is generally interpreted to have ceded absolute sovereignty,  the Māori version only cedes governorship. Practically, in the years since 1840, the English interpretation was generally privileged. Thus, New Zealand officially became a British colony and was ruled by a governor until 1852, when the British government passed the </span><a data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Constitution_Act_1852" title="New Zealand Constitution Act 1852"><span data-dcnode-id="4648" instrument_node="">New Zealand Constitution Act 1852</span></a><span data-dcnode-id="4646" instrument_node="">.</span><sup class="reference" data-dcnode-id="4643" id="cite_ref-14"><a data-dcnode-id="4644" href="#cite_note-14"><span data-dcnode-id="4645" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4642" instrument_node=""> This Act established settler self-government in New Zealand by the way of a </span><a class="mw-redirect" data-dcnode-id="4640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bi-cameral_parliament" title="Bi-cameral parliament"><span data-dcnode-id="4641" instrument_node="">bi-cameral Parliament</span></a><span data-dcnode-id="4639" instrument_node=""> consisting of an appointed Legislative Council and a House of Representatives.</span><sup class="reference" data-dcnode-id="4636" id="cite_ref-15"><a data-dcnode-id="4637" href="#cite_note-15"><span data-dcnode-id="4638" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4635" instrument_node=""> Following this, the first government was elected using a simple first-past-the-post electoral system, with single and multi-member districts.</span><sup class="reference" data-dcnode-id="4632" id="cite_ref-16"><a data-dcnode-id="4633" href="#cite_note-16"><span data-dcnode-id="4634" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4631" instrument_node=""> Importantly, political franchise was only extended at this time to male land owners over the age of 21, which disqualified many Māori due to their communal ownership of land.</span><sup class="reference" data-dcnode-id="4628" id="cite_ref-17"><a data-dcnode-id="4629" href="#cite_note-17"><span data-dcnode-id="4630" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4627" instrument_node=""> Furthermore, no women were extended the right to vote. However this changed in 1893 when New Zealand became the first self-governing country in the world to allow women the right to vote.</span><sup class="reference" data-dcnode-id="4624" id="cite_ref-:5_18-0"><a data-dcnode-id="4625" href="#cite_note-:5-18"><span data-dcnode-id="4626" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4623" instrument_node="">
</span></p><span data-dcnode-id="4621" instrument_node="">
</span><h3 data-dcnode-id="4610"><span data-dcnode-id="4620" id="Establishment_of_M.C4.81ori_electorates"></span><span class="mw-headline" data-dcnode-id="4618" id="Establishment_of_Māori_electorates"><span data-dcnode-id="4619" instrument_node="">Establishment of Māori electorates</span></span><span class="mw-editsection" data-dcnode-id="4611"><span class="mw-editsection-bracket" data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">[</span></span><a data-dcnode-id="4614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D3" title="Edit section: Establishment of Māori electorates"><span data-dcnode-id="4615" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4612"><span data-dcnode-id="4613" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4609" instrument_node="">
</span><p data-dcnode-id="4595"><span data-dcnode-id="4608" instrument_node="">In response to Māori antagonism towards the governments of the time due to their general lack of franchise, in 1867 the Māori Representation Act was passed, which established four additional Māori electorates throughout the country.</span><sup class="reference" data-dcnode-id="4605" id="cite_ref-:3_19-0"><a data-dcnode-id="4606" href="#cite_note-:3-19"><span data-dcnode-id="4607" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4604" instrument_node=""> Each of these would each elect a single member to Parliament,</span><sup class="reference" data-dcnode-id="4601" id="cite_ref-:3_19-1"><a data-dcnode-id="4602" href="#cite_note-:3-19"><span data-dcnode-id="4603" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4600" instrument_node=""> who was mandated to be full blooded Māori. However, all Māori males over the age of 21 were allowed to vote in these electorates regardless of their bloodline. Initially, these seats were created on an interim basis with a provision for their removal after five years had passed. Despite this, the Māori seats have remained even to this day as a part of the New Zealand political framework and have even been expanded in the Electoral Act 1993.</span><sup class="reference" data-dcnode-id="4597" id="cite_ref-20"><a data-dcnode-id="4598" href="#cite_note-20"><span data-dcnode-id="4599" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4596" instrument_node="">
</span></p><span data-dcnode-id="4594" instrument_node="">
</span><h3 data-dcnode-id="4584"><span class="mw-headline" data-dcnode-id="4592" id="Introduction_of_universal_suffrage"><span data-dcnode-id="4593" instrument_node="">Introduction of universal suffrage</span></span><span class="mw-editsection" data-dcnode-id="4585"><span class="mw-editsection-bracket" data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">[</span></span><a data-dcnode-id="4588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D4" title="Edit section: Introduction of universal suffrage"><span data-dcnode-id="4589" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4586"><span data-dcnode-id="4587" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4583" instrument_node="">
</span><p data-dcnode-id="4567"><a class="mw-redirect" data-dcnode-id="4581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_male_suffrage" title="Universal male suffrage"><span data-dcnode-id="4582" instrument_node="">Universal male suffrage</span></a><span data-dcnode-id="4580" instrument_node=""> was introduced in 1879 by the passing of the Qualification of Electors Act, which abolished the previous requirement to own land.</span><sup class="reference" data-dcnode-id="4577" id="cite_ref-:4_21-0"><a data-dcnode-id="4578" href="#cite_note-:4-21"><span data-dcnode-id="4579" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4576" instrument_node=""> As such, all European men aged over 21 were now eligible to vote in New Zealand's elections. The only qualifiers to this were that to be eligible to vote, one must have resided in New Zealand for 12 months and in a specific electorate for 6 months. This had an immediate and profound effect on the number of registered voters as they rose from 82,271 (71%) of the adult European population in 1879 to 120,972 (91%) in 1881.</span><sup class="reference" data-dcnode-id="4573" id="cite_ref-:4_21-1"><a data-dcnode-id="4574" href="#cite_note-:4-21"><span data-dcnode-id="4575" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4572" instrument_node=""> Furthermore, this allowed for election of people of different class to Parliament, including many 'working men'.</span><sup class="reference" data-dcnode-id="4569" id="cite_ref-:4_21-2"><a data-dcnode-id="4570" href="#cite_note-:4-21"><span data-dcnode-id="4571" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4568" instrument_node="">
</span></p><p data-dcnode-id="4547"><span data-dcnode-id="4566" instrument_node="">Under huge pressure from suffrage campaigners lead by </span><a data-dcnode-id="4564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kate_Sheppard" title="Kate Sheppard"><span data-dcnode-id="4565" instrument_node="">Kate Sheppard</span></a><span data-dcnode-id="4563" instrument_node="">, </span><a data-dcnode-id="4561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_suffrage" title="Universal suffrage"><span data-dcnode-id="4562" instrument_node="">universal women's suffrage</span></a><span data-dcnode-id="4560" instrument_node=""> followed in 1893 with the passing of the Electoral Act 1893.</span><sup class="reference" data-dcnode-id="4557" id="cite_ref-:6_22-0"><a data-dcnode-id="4558" href="#cite_note-:6-22"><span data-dcnode-id="4559" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4556" instrument_node=""> With this, New Zealand became the first self-governing nation in the world to grant women the vote.</span><sup class="reference" data-dcnode-id="4553" id="cite_ref-:5_18-1"><a data-dcnode-id="4554" href="#cite_note-:5-18"><span data-dcnode-id="4555" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4552" instrument_node=""> However, women still had not gained the right to stand for Parliament.</span><sup class="reference" data-dcnode-id="4549" id="cite_ref-:6_22-1"><a data-dcnode-id="4550" href="#cite_note-:6-22"><span data-dcnode-id="4551" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4548" instrument_node=""> Women's suffrage only allowed women to vote for existing male candidates and as such, there was still a great deal of progress required until women had the same legal rights as men in these regards.
</span></p><span data-dcnode-id="4546" instrument_node="">
</span><h3 data-dcnode-id="4535"><span data-dcnode-id="4545" id="Second-ballot_system_1908.E2.80.931913"></span><span class="mw-headline" data-dcnode-id="4543" id="Second-ballot_system_1908–1913"><span data-dcnode-id="4544" instrument_node="">Second-ballot system 1908–1913</span></span><span class="mw-editsection" data-dcnode-id="4536"><span class="mw-editsection-bracket" data-dcnode-id="4541"><span data-dcnode-id="4542" instrument_node="">[</span></span><a data-dcnode-id="4539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D5" title="Edit section: Second-ballot system 1908–1913"><span data-dcnode-id="4540" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4534" instrument_node="">
</span><p data-dcnode-id="4515"><span data-dcnode-id="4533" instrument_node="">The second-ballot system was introduced in the </span><a data-dcnode-id="4531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Ballot_Act_1908" title="Second Ballot Act 1908"><span data-dcnode-id="4532" instrument_node="">Second Ballot Act 1908</span></a><span data-dcnode-id="4530" instrument_node=""> and was one of the first substantive reforms to the mechanism by which winning candidates are elected to Parliament to be seen in New Zealand.</span><sup class="reference" data-dcnode-id="4527" id="cite_ref-:1_3-2"><a data-dcnode-id="4528" href="#cite_note-:1-3"><span data-dcnode-id="4529" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4526" instrument_node=""> This system modified the original first-past-the-post electoral system to require the winning candidate in each electorate to have gained over 50% of the overall votes cast within their constituency. When the leading candidate did not achieve this, a second ballot would be held a week later featuring only the two leading candidates, to assure an </span><a class="mw-redirect" data-dcnode-id="4524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absolute_majority" title="Absolute majority"><span data-dcnode-id="4525" instrument_node="">absolute majority</span></a><span data-dcnode-id="4523" instrument_node=""> of votes was achieved. This method is otherwise known as </span><a data-dcnode-id="4521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Two-round_system" title="Two-round system"><span data-dcnode-id="4522" instrument_node="">runoff voting</span></a><span data-dcnode-id="4520" instrument_node="">. However, this system only remained in place for five years as it was abolished in 1913 due to its supposed inequitable nature in the emerging party environment of Parliament.</span><sup class="reference" data-dcnode-id="4517" id="cite_ref-:1_3-3"><a data-dcnode-id="4518" href="#cite_note-:1-3"><span data-dcnode-id="4519" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4516" instrument_node="">
</span></p><span data-dcnode-id="4514" instrument_node="">
</span><h3 data-dcnode-id="4504"><span class="mw-headline" data-dcnode-id="4512" id="Return_to_first_past_the_post"><span data-dcnode-id="4513" instrument_node="">Return to first past the post</span></span><span class="mw-editsection" data-dcnode-id="4505"><span class="mw-editsection-bracket" data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">[</span></span><a data-dcnode-id="4508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D6" title="Edit section: Return to first past the post"><span data-dcnode-id="4509" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4506"><span data-dcnode-id="4507" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4503" instrument_node="">
</span><p data-dcnode-id="4464"><span data-dcnode-id="4502" instrument_node="">Subsequently, </span><a data-dcnode-id="4500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elections_in_New_Zealand" title="Elections in New Zealand"><span data-dcnode-id="4501" instrument_node="">New Zealand elections</span></a><span data-dcnode-id="4499" instrument_node=""> from 1914 to 1993 returned to the first-past-the-post system for parliamentary elections. However, in the newfound party context that had solidified throughout the second-ballot era it had somewhat unforeseen effects. While initially three main parties existed (the </span><a data-dcnode-id="4497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Liberal_Party" title="New Zealand Liberal Party"><span data-dcnode-id="4498" instrument_node="">Liberal</span></a><span data-dcnode-id="4496" instrument_node="">, </span><a data-dcnode-id="4494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_Party_%28New_Zealand%29" title="Reform Party (New Zealand)"><span data-dcnode-id="4495" instrument_node="">Reform</span></a><span data-dcnode-id="4493" instrument_node=""> and </span><a data-dcnode-id="4491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Labour_Party" title="New Zealand Labour Party"><span data-dcnode-id="4492" instrument_node="">Labour</span></a><span data-dcnode-id="4490" instrument_node=""> parties), the system quickly solidified into a </span><a data-dcnode-id="4488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Two-party_system" title="Two-party system"><span data-dcnode-id="4489" instrument_node="">two party system</span></a><span data-dcnode-id="4487" instrument_node=""> wherein the </span><a data-dcnode-id="4485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_New_Zealand" title="Reform New Zealand"><span data-dcnode-id="4486" instrument_node="">Reform</span></a><span data-dcnode-id="4484" instrument_node=""> and </span><a data-dcnode-id="4482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Liberal_Party" title="New Zealand Liberal Party"><span data-dcnode-id="4483" instrument_node="">Liberal</span></a><span data-dcnode-id="4481" instrument_node=""> parties combined to create the </span><a data-dcnode-id="4479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_National_Party" title="New Zealand National Party"><span data-dcnode-id="4480" instrument_node="">National Party</span></a><span data-dcnode-id="4478" instrument_node=""> to oppose the </span><a data-dcnode-id="4476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Labour_Party" title="New Zealand Labour Party"><span data-dcnode-id="4477" instrument_node="">Labour Party</span></a><span data-dcnode-id="4475" instrument_node="">.</span><sup class="reference" data-dcnode-id="4472" id="cite_ref-23"><a data-dcnode-id="4473" href="#cite_note-23"><span data-dcnode-id="4474" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4471" instrument_node=""> This ushered in an era wherein </span><a data-dcnode-id="4469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_National_Party" title="New Zealand National Party"><span data-dcnode-id="4470" instrument_node="">National</span></a><span data-dcnode-id="4468" instrument_node=""> and </span><a data-dcnode-id="4466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Labour_Party" title="New Zealand Labour Party"><span data-dcnode-id="4467" instrument_node="">Labour</span></a><span data-dcnode-id="4465" instrument_node=""> parties dominated New Zealand politics, with only a small number of independent and other party candidates being elected.
</span></p><span data-dcnode-id="4463" instrument_node="">
</span><h3 data-dcnode-id="4453"><span class="mw-headline" data-dcnode-id="4461" id="Debates_around_electoral_reform"><span data-dcnode-id="4462" instrument_node="">Debates around electoral reform</span></span><span class="mw-editsection" data-dcnode-id="4454"><span class="mw-editsection-bracket" data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">[</span></span><a data-dcnode-id="4457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D7" title="Edit section: Debates around electoral reform"><span data-dcnode-id="4458" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4455"><span data-dcnode-id="4456" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4452" instrument_node="">
</span><p data-dcnode-id="4417"><span data-dcnode-id="4451" instrument_node="">This ushered in an era of relative stability for many years, until the electoral reform debate began in earnest following two successive general elections in </span><a data-dcnode-id="4449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1978_New_Zealand_general_election" title="1978 New Zealand general election"><span data-dcnode-id="4450" instrument_node="">1978</span></a><span data-dcnode-id="4448" instrument_node=""> and </span><a data-dcnode-id="4446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1981_New_Zealand_general_election" title="1981 New Zealand general election"><span data-dcnode-id="4447" instrument_node="">1981</span></a><span data-dcnode-id="4445" instrument_node=""> in which the </span><a data-dcnode-id="4443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_National_Party" title="New Zealand National Party"><span data-dcnode-id="4444" instrument_node="">National Party</span></a><span data-dcnode-id="4442" instrument_node=""> won a majority in Parliament with less than 40% of the vote and a lower overall share of the vote than the opposing </span><a data-dcnode-id="4440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Labour_Party" title="New Zealand Labour Party"><span data-dcnode-id="4441" instrument_node="">Labour Party</span></a><span data-dcnode-id="4439" instrument_node="">.</span><sup class="reference" data-dcnode-id="4436" id="cite_ref-Research_papers_24-0"><a data-dcnode-id="4437" href="#cite_note-Research_papers-24"><span data-dcnode-id="4438" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4435" instrument_node=""> Other examples of this are evident in both the </span><a data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1911_New_Zealand_general_election" title="1911 New Zealand general election"><span data-dcnode-id="4434" instrument_node="">1911</span></a><span data-dcnode-id="4432" instrument_node=""> and </span><a data-dcnode-id="4430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1931_New_Zealand_general_election" title="1931 New Zealand general election"><span data-dcnode-id="4431" instrument_node="">1931</span></a><span data-dcnode-id="4429" instrument_node=""> elections.</span><sup class="reference" data-dcnode-id="4426" id="cite_ref-Research_papers_24-1"><a data-dcnode-id="4427" href="#cite_note-Research_papers-24"><span data-dcnode-id="4428" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4425" instrument_node=""> Furthermore, the </span><a data-dcnode-id="4423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Credit_Party_%28New_Zealand%29" title="Social Credit Party (New Zealand)"><span data-dcnode-id="4424" instrument_node="">Social Credit Party</span></a><span data-dcnode-id="4422" instrument_node=""> was a victim of disproportionality as while they won 16.1% of the vote in 1978 and 20.7% of the vote in 1981, they only won one and two seats in Parliament respectively.</span><sup class="reference" data-dcnode-id="4419" id="cite_ref-25"><a data-dcnode-id="4420" href="#cite_note-25"><span data-dcnode-id="4421" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4418" instrument_node="">
</span></p><p data-dcnode-id="4385"><span data-dcnode-id="4416" instrument_node="">In its </span><a data-dcnode-id="4414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1984_New_Zealand_general_election" title="1984 New Zealand general election"><span data-dcnode-id="4415" instrument_node="">1984</span></a><span data-dcnode-id="4413" instrument_node=""> campaign platform, the </span><a data-dcnode-id="4411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Labour_Party" title="New Zealand Labour Party"><span data-dcnode-id="4412" instrument_node="">Labour party</span></a><span data-dcnode-id="4410" instrument_node=""> committed itself to appoint a royal commission on electoral reform if elected.</span><sup class="reference" data-dcnode-id="4407" id="cite_ref-26"><a data-dcnode-id="4408" href="#cite_note-26"><span data-dcnode-id="4409" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4406" instrument_node=""> Labour won that election and in 1985 Deputy Prime Minister and Minister of Justice </span><a data-dcnode-id="4404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geoffrey_Palmer_%28politician%29" title="Geoffrey Palmer (politician)"><span data-dcnode-id="4405" instrument_node="">Geoffrey Palmer</span></a><span data-dcnode-id="4403" instrument_node=""> established a </span><a data-dcnode-id="4401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Commission_on_the_Electoral_System" title="Royal Commission on the Electoral System"><span data-dcnode-id="4402" instrument_node="">Royal Commission on the Electoral System</span></a><span data-dcnode-id="4400" instrument_node="">. Palmer had promoted proportional representation as a law professor in his book </span><i data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">Unbridled Power?</span></i><span data-dcnode-id="4397" instrument_node="">, also published in 1984. The Royal Commission's 1986 report, entitled </span><i data-dcnode-id="4395"><span data-dcnode-id="4396" instrument_node="">Towards a Better Democracy</span></i><span data-dcnode-id="4394" instrument_node=""> recommended the adoption of the MMP electoral system.</span><sup class="reference" data-dcnode-id="4391" id="cite_ref-:0_10-1"><a data-dcnode-id="4392" href="#cite_note-:0-10"><span data-dcnode-id="4393" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4390" instrument_node=""> Recognising that a parliament dominated by the major parties might fail to implement a sweeping reform of this sort, the commission also proposed a referendum on the issue.</span><sup class="reference" data-dcnode-id="4387" id="cite_ref-:0_10-2"><a data-dcnode-id="4388" href="#cite_note-:0-10"><span data-dcnode-id="4389" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4386" instrument_node="">
</span></p><p data-dcnode-id="4367"><span data-dcnode-id="4384" instrument_node="">Ambivalence by the major parties and party politics led the issue to languish for several years, but in the meantime, an influential lobby group which had been formed, the </span><a data-dcnode-id="4382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_Reform_Coalition" title="Electoral Reform Coalition"><span data-dcnode-id="4383" instrument_node="">Electoral Reform Coalition</span></a><span data-dcnode-id="4381" instrument_node="">, continued to press for implementation of the royal commission’s proposals. During the </span><a data-dcnode-id="4379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1987_New_Zealand_general_election" title="1987 New Zealand general election"><span data-dcnode-id="4380" instrument_node="">1987 election</span></a><span data-dcnode-id="4378" instrument_node=""> campaign, Labour promised to hold a referendum on MMP at, or before, the next election. Although Labour was returned to power in that election, it failed to proceed further on the matter due to its own internal divisions. In May 1990, </span><a data-dcnode-id="4376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Labour_Party" title="New Zealand Labour Party"><span data-dcnode-id="4377" instrument_node="">Labour</span></a><span data-dcnode-id="4375" instrument_node=""> MP </span><a data-dcnode-id="4373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Terris" title="John Terris"><span data-dcnode-id="4374" instrument_node="">John Terris</span></a><span data-dcnode-id="4372" instrument_node=""> submitted a private members bill to force a binding referendum on the electoral system, but the bill was defeated.</span><sup class="reference" data-dcnode-id="4369" id="cite_ref-27"><a data-dcnode-id="4370" href="#cite_note-27"><span data-dcnode-id="4371" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4368" instrument_node="">
</span></p><p data-dcnode-id="4330"><span data-dcnode-id="4366" instrument_node="">Sensing </span><a data-dcnode-id="4364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Labour_Party" title="New Zealand Labour Party"><span data-dcnode-id="4365" instrument_node="">Labour’s</span></a><span data-dcnode-id="4363" instrument_node=""> vulnerability on the issue, the </span><a data-dcnode-id="4361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_National_Party" title="New Zealand National Party"><span data-dcnode-id="4362" instrument_node="">National</span></a><span data-dcnode-id="4360" instrument_node=""> opposition criticised the government inaction, and </span><a data-dcnode-id="4358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_National_Party" title="New Zealand National Party"><span data-dcnode-id="4359" instrument_node="">National Party</span></a><span data-dcnode-id="4357" instrument_node=""> Leader </span><a data-dcnode-id="4355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Bolger" title="Jim Bolger"><span data-dcnode-id="4356" instrument_node="">Jim Bolger</span></a><span data-dcnode-id="4354" instrument_node=""> promised to carry on with a referendum if elected in </span><a data-dcnode-id="4352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1990_New_Zealand_general_election" title="1990 New Zealand general election"><span data-dcnode-id="4353" instrument_node="">1990</span></a><span data-dcnode-id="4351" instrument_node=""> and do so before the next election in </span><a data-dcnode-id="4349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1993_New_Zealand_general_election" title="1993 New Zealand general election"><span data-dcnode-id="4350" instrument_node="">1993</span></a><span data-dcnode-id="4348" instrument_node="">.</span><sup class="reference" data-dcnode-id="4345" id="cite_ref-28"><a data-dcnode-id="4346" href="#cite_note-28"><span data-dcnode-id="4347" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4344" instrument_node=""> Although there was even less support for reform among </span><a data-dcnode-id="4342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_National_Party" title="New Zealand National Party"><span data-dcnode-id="4343" instrument_node="">National</span></a><span data-dcnode-id="4341" instrument_node=""> parliamentarians than in the </span><a data-dcnode-id="4339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_Labour_Party" title="New Zealand Labour Party"><span data-dcnode-id="4340" instrument_node="">Labour Party</span></a><span data-dcnode-id="4338" instrument_node="">, the new </span><a data-dcnode-id="4336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Zealand_National_Party" title="New Zealand National Party"><span data-dcnode-id="4337" instrument_node="">National</span></a><span data-dcnode-id="4335" instrument_node=""> government elected in 1990 was, like its predecessor, stuck with a rashly made campaign promise.</span><sup class="reference" data-dcnode-id="4332" id="cite_ref-29"><a data-dcnode-id="4333" href="#cite_note-29"><span data-dcnode-id="4334" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4331" instrument_node="">
</span></p><span data-dcnode-id="4329" instrument_node="">
</span><h3 data-dcnode-id="4319"><span class="mw-headline" data-dcnode-id="4327" id="1992_electoral_system_referendum"><span data-dcnode-id="4328" instrument_node="">1992 electoral system referendum</span></span><span class="mw-editsection" data-dcnode-id="4320"><span class="mw-editsection-bracket" data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">[</span></span><a data-dcnode-id="4323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D8" title="Edit section: 1992 electoral system referendum"><span data-dcnode-id="4324" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4321"><span data-dcnode-id="4322" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4318" instrument_node="">
</span><p data-dcnode-id="4310"><span data-dcnode-id="4317" instrument_node="">In 1992, a non-binding referendum was held on whether or not FPP should be replaced by a new, more </span><a data-dcnode-id="4315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proportional_representation" title="Proportional representation"><span data-dcnode-id="4316" instrument_node="">proportional</span></a><span data-dcnode-id="4314" instrument_node=""> voting system. Voters were asked two questions: whether or not to replace FPP with a new voting system; and which of four different alternative systems should be adopted instead (see question one and question two, below). The </span><a data-dcnode-id="4312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fourth_National_Government_of_New_Zealand" title="Fourth National Government of New Zealand"><span data-dcnode-id="4313" instrument_node="">government</span></a><span data-dcnode-id="4311" instrument_node=""> appointed a panel chaired by the Ombudsman to oversee the campaign. The panel issued a brochure describing each of the voting systems appearing on the ballot, which was delivered to all households, and sponsored other publications, television programs, and seminars to inform the public. Meanwhile, the Electoral Reform Coalition campaigned actively in favour of the MMP alternative originally recommended by the royal commission. These measures made it possible for voters to make an informed choice on what was otherwise a complicated issue.
</span></p><p data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">This led New Zealanders to vote overwhelmingly for change (84.7%) and to indicate a clear and overwhelming preference for the MMP alternative (70.5%). Such a result could not be ignored by the government, but rather than implementing MMP as the government was urged to do by the Electoral Reform Coalition, it opted to hold a second binding referendum on reform. This referendum featured a direct choice between FPP and MMP and was planned to be held to coincide with the next general election in 1993.
</span></p><span data-dcnode-id="4307" instrument_node="">
</span><h4 data-dcnode-id="4297"><span class="mw-headline" data-dcnode-id="4305" id="Question_one_in_the_1992_referendum"><span data-dcnode-id="4306" instrument_node="">Question one in the 1992 referendum</span></span><span class="mw-editsection" data-dcnode-id="4298"><span class="mw-editsection-bracket" data-dcnode-id="4303"><span data-dcnode-id="4304" instrument_node="">[</span></span><a data-dcnode-id="4301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D9" title="Edit section: Question one in the 1992 referendum"><span data-dcnode-id="4302" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4299"><span data-dcnode-id="4300" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4296" instrument_node="">
</span><p data-dcnode-id="4290"><span data-dcnode-id="4295" instrument_node="">The first question asked voters if they wished to retain FPP or change electoral systems. The result was 84.7 per cent favour of replacing FPP, and 15.3% against.</span><sup class="reference" data-dcnode-id="4292" id="cite_ref-:2_11-1"><a data-dcnode-id="4293" href="#cite_note-:2-11"><span data-dcnode-id="4294" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4291" instrument_node="">

</span><h4 data-dcnode-id="4186"><span class="mw-headline" data-dcnode-id="4194" id="Question_two_in_the_1992_referendum"><span data-dcnode-id="4195" instrument_node="">Question two in the 1992 referendum</span></span><span class="mw-editsection" data-dcnode-id="4187"><span class="mw-editsection-bracket" data-dcnode-id="4192"><span data-dcnode-id="4193" instrument_node="">[</span></span><a data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D10" title="Edit section: Question two in the 1992 referendum"><span data-dcnode-id="4191" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4188"><span data-dcnode-id="4189" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4185" instrument_node="">
</span><p data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">The second question asked voters which new system should replace FPP. Voters could choose between the following (as listed on the ballot):
</span></p><span data-dcnode-id="4182" instrument_node="">
</span><ul data-dcnode-id="4120"><li data-dcnode-id="4166"><a data-dcnode-id="4180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mixed-member_proportional_representation" title="Mixed-member proportional representation"><span data-dcnode-id="4181" instrument_node="">Mixed Member Proportional</span></a><span data-dcnode-id="4179" instrument_node=""> (MMP); also known as the </span><a class="mw-redirect" data-dcnode-id="4177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Additional_Member_System" title="Additional Member System"><span data-dcnode-id="4178" instrument_node="">Additional Member System</span></a><span data-dcnode-id="4176" instrument_node=""> used in </span><a data-dcnode-id="4174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="4175" instrument_node="">Germany</span></a><span data-dcnode-id="4173" instrument_node=""> (and later adopted in </span><a data-dcnode-id="4171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scotland" title="Scotland"><span data-dcnode-id="4172" instrument_node="">Scotland</span></a><span data-dcnode-id="4170" instrument_node="">, and </span><a data-dcnode-id="4168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wales" title="Wales"><span data-dcnode-id="4169" instrument_node="">Wales</span></a><span data-dcnode-id="4167" instrument_node="">); in which roughly half of the seats are elected by FPP; and the remainder are filled from party lists to top-up the local seats so as to ensure a proportional overall result;</span></li><span data-dcnode-id="4165" instrument_node="">
</span><li data-dcnode-id="4146"><a data-dcnode-id="4163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Single_transferable_vote" title="Single transferable vote"><span data-dcnode-id="4164" instrument_node="">Single Transferable Vote</span></a><span data-dcnode-id="4162" instrument_node=""> (STV); a proportional system used in </span><a data-dcnode-id="4160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Ireland" title="Northern Ireland"><span data-dcnode-id="4161" instrument_node="">Northern Ireland</span></a><span data-dcnode-id="4159" instrument_node="">, the </span><a data-dcnode-id="4157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Ireland" title="Republic of Ireland"><span data-dcnode-id="4158" instrument_node="">Republic of Ireland</span></a><span data-dcnode-id="4156" instrument_node="">, </span><a data-dcnode-id="4154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malta" title="Malta"><span data-dcnode-id="4155" instrument_node="">Malta</span></a><span data-dcnode-id="4153" instrument_node="">, </span><a data-dcnode-id="4151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tasmania" title="Tasmania"><span data-dcnode-id="4152" instrument_node="">Tasmania</span></a><span data-dcnode-id="4150" instrument_node="">, and for the </span><a class="mw-redirect" data-dcnode-id="4148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Senate_of_Australia" title="Senate of Australia"><span data-dcnode-id="4149" instrument_node="">Australian Senate</span></a><span data-dcnode-id="4147" instrument_node="">; in which the country is divided into multimember constituencies; and voters rank candidates in declining order of preference;</span></li><span data-dcnode-id="4145" instrument_node="">
</span><li data-dcnode-id="4132"><a class="mw-redirect" data-dcnode-id="4143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supplementary_Member" title="Supplementary Member"><span data-dcnode-id="4144" instrument_node="">Supplementary Member</span></a><span data-dcnode-id="4142" instrument_node=""> system (SM); commonly called the parallel system, used in </span><a data-dcnode-id="4140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="4141" instrument_node="">Japan</span></a><span data-dcnode-id="4139" instrument_node="">, </span><a data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="4138" instrument_node="">Russia</span></a><span data-dcnode-id="4136" instrument_node=""> and </span><a data-dcnode-id="4134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Italy" title="Italy"><span data-dcnode-id="4135" instrument_node="">Italy</span></a><span data-dcnode-id="4133" instrument_node="">; a semi-proportional mixed system with proportional representation used only for the seats filled by lists; and a larger proportion of seats elected by FPP.</span></li><span data-dcnode-id="4131" instrument_node="">
</span><li data-dcnode-id="4121"><a data-dcnode-id="4129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Instant-runoff_voting" title="Instant-runoff voting"><span data-dcnode-id="4130" instrument_node="">Preferential Voting</span></a><span data-dcnode-id="4128" instrument_node=""> (PV); used in </span><a data-dcnode-id="4126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australia" title="Australia"><span data-dcnode-id="4127" instrument_node="">Australia</span></a><span data-dcnode-id="4125" instrument_node=""> and </span><a data-dcnode-id="4123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fiji" title="Fiji"><span data-dcnode-id="4124" instrument_node="">Fiji</span></a><span data-dcnode-id="4122" instrument_node=""> elections; similar to FPP but with voters ranking candidates in descending order of preference in single-seat constituencies (also called Instant Runoff Voting).</span></li></ul><span data-dcnode-id="4119" instrument_node="">
</span><p data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">As noted earlier, an overwhelming majority of those favouring a new electoral system voted for MMP. The percentages of the vote cast for the four possible electoral system options offered in the second question were:

</span><h3 data-dcnode-id="3919"><span class="mw-headline" data-dcnode-id="3927" id="1993_electoral_referendum"><span data-dcnode-id="3928" instrument_node="">1993 electoral referendum</span></span><span class="mw-editsection" data-dcnode-id="3920"><span class="mw-editsection-bracket" data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">[</span></span><a data-dcnode-id="3923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform_in_New_Zealand%26action%3Dedit%26section%3D11" title="Edit section: 1993 electoral referendum"><span data-dcnode-id="3924" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3918" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3909"><div class="thumbinner" data-dcnode-id="3910" style="width:194px;"><a class="image" data-dcnode-id="3916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMmp-poster.jpg"><img alt="" class="thumbimage" data-dcnode-id="3917" data-file-height="294" data-file-width="192" decoding="async" height="294" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/a/aa/Mmp-poster.jpg&amp;raw" width="192"></a><span data-dcnode-id="3915" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3911"><div class="magnify" data-dcnode-id="3913"><a class="internal" data-dcnode-id="3914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMmp-poster.jpg" title="Enlarge"></a></div><span data-dcnode-id="3912" instrument_node="">A pro-MMP poster from the 1993 referendum campaign.</span></div></div></div><span data-dcnode-id="3908" instrument_node="">
</span><p data-dcnode-id="3900"><span data-dcnode-id="3907" instrument_node="">The second, binding, referendum was held in conjunction with the </span><a data-dcnode-id="3905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1993_New_Zealand_general_election" title="1993 New Zealand general election"><span data-dcnode-id="3906" instrument_node="">general election</span></a><span data-dcnode-id="3904" instrument_node=""> on 6 November 1993. Although reform had been strongly favoured by the electorate in 1992, the campaign in the second referendum was hard fought, as opposition to the reforms came together under an umbrella organisation called </span><a class="new" data-dcnode-id="3902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCampaign_for_Better_Government%26action%3Dedit%26redlink%3D1" title="Campaign for Better Government (page does not exist)"><span data-dcnode-id="3903" instrument_node="">Campaign for Better Government</span></a><span data-dcnode-id="3901" instrument_node=""> (CBG).
</span></p><p data-dcnode-id="3879"><span data-dcnode-id="3899" instrument_node="">Many senior politicians in both major parties and businesspeople were opposed to MMP: </span><a data-dcnode-id="3897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bill_Birch" title="Bill Birch"><span data-dcnode-id="3898" instrument_node="">Bill Birch</span></a><span data-dcnode-id="3896" instrument_node="">, then a senior National Cabinet Minister, had said MMP would be "a catastrophic disaster for democracy", and </span><a data-dcnode-id="3894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruth_Richardson" title="Ruth Richardson"><span data-dcnode-id="3895" instrument_node="">Ruth Richardson</span></a><span data-dcnode-id="3893" instrument_node="">, former Minister of Finance in </span><a data-dcnode-id="3891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Bolger" title="Jim Bolger"><span data-dcnode-id="3892" instrument_node="">Jim Bolger</span></a><span data-dcnode-id="3890" instrument_node="">'s government said MMP "would bring economic ruin". </span><a data-dcnode-id="3888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Shirtcliffe" title="Peter Shirtcliffe"><span data-dcnode-id="3889" instrument_node="">Peter Shirtcliffe</span></a><span data-dcnode-id="3887" instrument_node="">, chairman of </span><a data-dcnode-id="3885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spark_New_Zealand" title="Spark New Zealand"><span data-dcnode-id="3886" instrument_node="">Telecom New Zealand</span></a><span data-dcnode-id="3884" instrument_node=""> at the time and leader of the CBG, said MMP "would bring chaos".</span><sup class="reference" data-dcnode-id="3881" id="cite_ref-30"><a data-dcnode-id="3882" href="#cite_note-30"><span data-dcnode-id="3883" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3880" instrument_node="">
</span></p><p data-dcnode-id="3867"><span data-dcnode-id="3878" instrument_node="">The Electoral Reform Coalition (ERC) was the main advocate for the adoption of MMP, and had support from several people, including the </span><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_Party_of_Aotearoa_New_Zealand" title="Green Party of Aotearoa New Zealand"><span data-dcnode-id="3877" instrument_node="">Green Party</span></a><span data-dcnode-id="3875" instrument_node=""> co-leader </span><a data-dcnode-id="3873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rod_Donald" title="Rod Donald"><span data-dcnode-id="3874" instrument_node="">Rod Donald</span></a><span data-dcnode-id="3872" instrument_node="">. MMP faced an uphill battle, as acknowledged in the pro-MMP poster to the side, since the proposed model was for increase in the number of MPs from 99 to 120. The CBG responded to the proposed increase in the number of MPs with a controversial television advertisement showing 21 faceless list MPs with paper bags over their heads.</span><sup class="reference" data-dcnode-id="3869" id="cite_ref-31"><a data-dcnode-id="3870" href="#cite_note-31"><span data-dcnode-id="3871" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3868" instrument_node="">
</span></p><p data-dcnode-id="3861"><span data-dcnode-id="3866" instrument_node="">The ERC also had a "David and Goliath" battle financially. With the CBG being backed by a large business lobby, they had large amounts of money to spend. While the CBG could spend large on television, radio and full-page newspaper advertisements, often with fear-evoking graphic images, the ERC had limited funds and concentrated more on advocating in communities.</span><sup class="reference" data-dcnode-id="3863" id="cite_ref-Donald_32-0"><a data-dcnode-id="3864" href="#cite_note-Donald-32"><span data-dcnode-id="3865" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3862" instrument_node="">
</span></p><p data-dcnode-id="3848"><span data-dcnode-id="3860" instrument_node="">At the same time, the country's largest newspaper, </span><i data-dcnode-id="3857"><a data-dcnode-id="3858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_New_Zealand_Herald" title="The New Zealand Herald"><span data-dcnode-id="3859" instrument_node="">The New Zealand Herald</span></a></i><span data-dcnode-id="3856" instrument_node="">, came out in support of the MMP proposal in the last week of the campaign, and press coverage overall was extensive and largely favourable. The </span><a data-dcnode-id="3854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alliance_%28New_Zealand_political_party%29" title="Alliance (New Zealand political party)"><span data-dcnode-id="3855" instrument_node="">Alliance</span></a><span data-dcnode-id="3853" instrument_node=""> heavily supported MMP, featuring "vote MMP" on all of its election billboards.</span><sup class="reference" data-dcnode-id="3850" id="cite_ref-Donald_32-1"><a data-dcnode-id="3851" href="#cite_note-Donald-32"><span data-dcnode-id="3852" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3849" instrument_node="">
</span></p><span data-dcnode-id="3847" instrument_node="">
</span><div class="quotebox pullquote floatright" data-dcnode-id="3826" style="width:40%; ;"><span data-dcnode-id="3844" instrument_node="">
</span><blockquote class="quotebox-quote left-aligned" data-dcnode-id="3839" style=""><span data-dcnode-id="3843" instrument_node="">
</span><p data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">It was the combination of growing public anger with the operation of the political system and the successful efforts of the Electoral Reform Coalition to harness that dissatisfaction in the cause of electoral reform that proved crucial. [...] Politicians subsequently acquiesced as they lost control of the referendum process because to have done otherwise would have courted the full wrath of a public incensed by their own impotence in the face of years of broken promises.
</span></p><span data-dcnode-id="3840" instrument_node="">
</span></blockquote><span data-dcnode-id="3838" instrument_node="">
</span><p data-dcnode-id="3828"><cite class="left-aligned" data-dcnode-id="3830" style=""><span data-dcnode-id="3837" instrument_node="">Alan Renwick, </span><i data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">The Politics of Electoral Reform: Changing the Rules of Democracy</span></i><span data-dcnode-id="3834" instrument_node="">.</span><sup class="reference" data-dcnode-id="3831" id="cite_ref-Cambridge_University_Press_33-0"><a data-dcnode-id="3832" href="#cite_note-Cambridge_University_Press-33"><span data-dcnode-id="3833" instrument_node="">[33]</span></a></sup></cite><span data-dcnode-id="3829" instrument_node="">
</span></p><span data-dcnode-id="3827" instrument_node="">
</span></div><span data-dcnode-id="3825" instrument_node="">
</span><p data-dcnode-id="3793"><span data-dcnode-id="3824" instrument_node="">The CBG's backing of business leaders and politicians proved to be damaging to their cause, giving the impression that they were "a front for the business roundtable".</span><sup class="reference" data-dcnode-id="3821" id="cite_ref-Donald_32-2"><a data-dcnode-id="3822" href="#cite_note-Donald-32"><span data-dcnode-id="3823" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3820" instrument_node=""> The ERC capitalised on severe disenchantment with New Zealand's political class after the severe effects of the </span><a data-dcnode-id="3818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoliberalism" title="Neoliberalism"><span data-dcnode-id="3819" instrument_node="">neoliberal</span></a><span data-dcnode-id="3817" instrument_node=""> reforms of </span><a data-dcnode-id="3815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rogernomics" title="Rogernomics"><span data-dcnode-id="3816" instrument_node="">Rogernomics</span></a><span data-dcnode-id="3814" instrument_node=""> and </span><a data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruthanasia" title="Ruthanasia"><span data-dcnode-id="3813" instrument_node="">Ruthanasia</span></a><span data-dcnode-id="3811" instrument_node="">. After three elections in a row in which the parties that won power broke their promises and imposed unpopular market-oriented reforms,</span><sup class="reference" data-dcnode-id="3808" id="cite_ref-34"><a data-dcnode-id="3809" href="#cite_note-34"><span data-dcnode-id="3810" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="3805" id="cite_ref-35"><a data-dcnode-id="3806" href="#cite_note-35"><span data-dcnode-id="3807" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3804" instrument_node=""> the New Zealand public came to see MMP as a way to curb the power of governments to engage in dramatic and unpopular reforms. Cartoonist </span><a data-dcnode-id="3802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Murray_Ball" title="Murray Ball"><span data-dcnode-id="3803" instrument_node="">Murray Ball</span></a><span data-dcnode-id="3801" instrument_node=""> reflected this perception in a cartoon starring his characters </span><a data-dcnode-id="3799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Footrot_Flats" title="Footrot Flats"><span data-dcnode-id="3800" instrument_node="">Wal Footrot and Dog</span></a><span data-dcnode-id="3798" instrument_node="">, with Wal telling The Dog (and by extension the viewer), "Want a good reason for voting for MMP? Look at the people who are telling you not to..."</span><sup class="reference" data-dcnode-id="3795" id="cite_ref-36"><a data-dcnode-id="3796" href="#cite_note-36"><span data-dcnode-id="3797" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3794" instrument_node="">
</span></p><p data-dcnode-id="3784"><span data-dcnode-id="3792" instrument_node="">Given the link between the success of the referendum and anger at the </span><i data-dcnode-id="3790"><span data-dcnode-id="3791" instrument_node="">status quo</span></i><span data-dcnode-id="3789" instrument_node="">, politicians took lesser roles in the 1993 campaign, realising that their opposition to reform only increased voters' desire for change.</span><sup class="reference" data-dcnode-id="3786" id="cite_ref-Cambridge_University_Press_33-1"><a data-dcnode-id="3787" href="#cite_note-Cambridge_University_Press-33"><span data-dcnode-id="3788" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3785" instrument_node="">
</span></p><p data-dcnode-id="3775"><span data-dcnode-id="3783" instrument_node="">In the face of a strong opposition campaign, the final result was much closer than in 1992, but the reforms carried the day, with 53.9% of voters in favour of MMP. ERC spokesperson </span><a data-dcnode-id="3781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rod_Donald" title="Rod Donald"><span data-dcnode-id="3782" instrument_node="">Rod Donald</span></a><span data-dcnode-id="3780" instrument_node=""> reflected in 2003, "Had the referendum been held a week earlier I believe we would have lost."</span><sup class="reference" data-dcnode-id="3777" id="cite_ref-Donald_32-3"><a data-dcnode-id="3778" href="#cite_note-Donald-32"><span data-dcnode-id="3779" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3776" instrument_node=""> Lending additional legitimacy to the second referendum was the increase in the participation rate, which went from 55% in the 1992 referendum to 85% in the second one. The law had been written so that MMP came automatically into effect upon approval by the electorate, which it did.
</span></p><span data-dcnode-id="3774" instrument_node="">
