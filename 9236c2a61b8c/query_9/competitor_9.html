</span><article class="cf m-all d-4of5 post-95775 reference_term type-reference_term status-publish has-post-thumbnail hentry letter-v type-x-historic-issue-briefs" data-dcnode-id="306" id="post-95775" itemscope="" itemtype="http://schema.org/BlogPosting" role="article"><span data-dcnode-id="746" instrument_node="">
</span><header class="article-header" data-dcnode-id="741"><span data-dcnode-id="745" instrument_node="">
</span><h1 class="page-title" data-dcnode-id="743" itemprop="headline"><span data-dcnode-id="744" instrument_node="">Voting Systems and Electoral Reform</span></h1><span data-dcnode-id="742" instrument_node="">
</span></header><span data-dcnode-id="740" instrument_node="">
</span><section class="entry-content cf" data-dcnode-id="311" itemprop="articleBody"><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">
	Proportional Representation (PR) is the principle behind a number of electoral systems, all of which attempt to ensure that the outcome of the election reflects the proportion of support gained by each competing group.</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">
	PR contrasts to the Majoritarian principle, where whichever party or candidate obtains a plurality of votes within any given constituency wins that contest outright. Majoritarianism is the principle that underpins the First-Past-The-Post system that is used for elections to the House of Commons, along with other systems including alternative vote, bloc vote and various single member constituency systems.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">
	Similarly, there are a number of different systems based on PR. A simple party-list PR system is used in the UK for the European Parliament. A different Additional Member System (AMS) is used to elect the Scottish parliament and the Welsh Assembly. There are several important differences and the principle of proportionality is applied quite differently between the two.</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">
	The single transferable vote system is used to elect the district councils (since 1973) and the MEPs in Northern Ireland, and the local government councils in Scotland (since 2007).</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">
	The extent to which an electoral system is PR-based depends on the number of candidates elected per constituency and the existence of any thresholds for successful election. A number of electoral systems combine elements of both, such as the single non-transferable vote and cumulative voting systems.</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="723" instrument_node="">
</span><b data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Background</span></b></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">
	PR is a relative novelty in British politics, although it has long been used in Europe and went through a spell of popularity in some circles in the late 19th century. There were several attempts to introduce PR voting for the UK parliament during the early 1900s and there were several more reviews of the topic. The University members of the UK parliament were elected by STV-PR until this special category of MP was abolished. More recently, support for PR has been growing since the 1970s, and its leading champions in the UK are the Liberal Democrats.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">
	The growth in support for PR has stemmed largely from recent concerns about the First Past the Post system. In the 1970s, First Past the Post failed to produce the strong majority accountable governments that was said to be one of the key points in favour of the system. And throughout the 1980s, the growth of the third party share of the vote increasingly showed the handicaps of the First Past the Post system on parties other than the Conservatives and Labour.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">
	For example, in Labour's 1997 election landslide, the Liberal Democrats secured 16.8 per cent of the total national vote, but won fewer than 10 per cent of the seats.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">
	Labour promised a referendum on PR on coming to power in 1997, ostensibly as a result of an agreement with the Liberal Democrats, but nothing materialised. However, a combination of PR and First Past The Post (the Additional Member System) was used for the elections to the Scottish Parliament and the Welsh National Assembly, and the electoral system for the European Parliament was changed to a closed party list PR system.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">
	In the Scottish elections of 1999 and 2003, and the Welsh elections of 1999, the electoral system failed to return an absolute majority for any one party, requiring coalition administrations to be formed.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">
	Following the General Election in May 2010, one of the concessions the Liberal Democrats secured from the Conservatives as part of the deal to form a coalition government was that a referendum would be held on the AV voting system.&nbsp;</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">
	Subsequently, on 5th May 2011 an election was held on the voting system used to elect MPs to the House of Commons.&nbsp; In the event the electorate decided by a substantial majority to reject the proposal to change from the 'first past the post' system to the AV system.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="697" instrument_node="">
</span><b data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Controversies</span></b></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="692" instrument_node="">
	Arguments cited in favour of a change from First Past the Post to PR include:</span><br data-dcnode-id="691"><span data-dcnode-id="690" instrument_node="">
	The fairer treatment of minority parties and independent candidates</span><br data-dcnode-id="689"><span data-dcnode-id="688" instrument_node="">
	Fewer votes are 'wasted', as more people's preferences are taken into account</span><br data-dcnode-id="687"><span data-dcnode-id="686" instrument_node="">
	Greater effective choice for voters. By reducing the dominance of the large parties, PR may encourage turn-out and reduce apathy</span><br data-dcnode-id="685"><span data-dcnode-id="684" instrument_node="">
	By rarely producing an absolute majority for one party, PR ensures greater continuity of government and requires greater consensus in policy-making.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="681" instrument_node="">
	Arguments cited against PR include:</span><br data-dcnode-id="680"><span data-dcnode-id="679" instrument_node="">
	PR provides a route for extremists into the political mainstream, who would otherwise be excluded by the structure of FPTP</span><br data-dcnode-id="678"><span data-dcnode-id="677" instrument_node="">
	PR produces 'weak' coalition governments rather than 'strong' majority governments, which can lead to indecision, compromise and even legislative paralysis. It can also reduce accountability to voters, as an ousted party of government can reinstall itself by finding new coalition partners after an election</span><br data-dcnode-id="676"><span data-dcnode-id="675" instrument_node="">
	The adoption of list systems breaks the link between the elected representative and his or her constituency</span><br data-dcnode-id="674"><span data-dcnode-id="673" instrument_node="">
	The greater complexity and choice that PR allows can put voters off voting, by requiring them to have a greater knowledge of individual and party positions.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">
	There is also an institutional paradox built into the British political system, working against the adoption of Proportional Representation. Any party that comes to power under First Past The Post is likely to appreciate the advantages that it gives to the government: a strong mandate, (usually) a lack of coalition partners, and considerable freedom of action. Therefore, arrival in government under First Past The Post is likely to dampen any party's enthusiasm for PR – as some suggested was the case with Labour in 1997.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">
	However, the Coalition government elected in May 2010 agreed that the electorate should be allowed to decide, in a referendum scheduled for May 2011, whether the UK should adopt the 'alternative vote' system instead of the current 'first past the post' system for electing Members of Parliament to the House of Commons. Although the Conservatives have traditionally been opposed to changing from FPTP, they acceded to the Liberal Democrats' demand for a referendum on voting reform as part of the deal to secure a coalition government.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">
	But in order for the referendum to take place in May, the Parliamentary Voting System and Constituencies Bill had to be passed by 16th February according to Electoral Commission rules and the Opposition appeared to be intent on blocking the legislation.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">
	Labour objected to other provisions in the bill which would reduce the number of MPs from 650 to 600 and involve boundary changes which they believed would disadvantage their party. They therefore called for the other provisions to be removed before they would support the bill and allow a referendum to take place. Labour peers were also accused of "dragging their feet", subjecting the bill to unnecessary lengthy debate in the House of Lords in an attempt to slow its progress. However, the Government remained adamant that the bill would be passed in time.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">
	And finally, following a marathon debate in both Houses, 110 hours in committee and several sessions of 'ping pong', the Parliamentary Voting Systems and Constituencies Bill received Royal Assent just before midnight on the 16th February 2011.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="655" instrument_node="">
</span><b data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Voting systems</span></b></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">
	Party Lists: (proportional)</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="647" instrument_node="">
	Party list systems have two main forms – open and closed. Each party provides a list of candidates. With the open system, voters put a cross by the name of a candidate; with the closed system they put a cross by the name of a party. Voters have only one vote and seats are allocated in proportion to the number of votes received.</span><br data-dcnode-id="646"><span data-dcnode-id="645" instrument_node="">
	List PR is used to elect candidates in multi-member districts, or sometimes in an entire country. Party list systems vary considerably across the globe, determined chiefly by the size of districts, thresholds for securing seats and the manner in which the seats are allocated.</span><br data-dcnode-id="644"><span data-dcnode-id="643" instrument_node="">
	There are a number of methods used to translate votes into seat allocation. The most common are the d'Hondt method, the Sainte-Lague method, the Huntington-Hill method and the largest remainder (LR) method.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">
	Where used: Party lists are the most common method of election in the world. Places where they are used include British elections to the European Parliament (excluding Northern Ireland, which uses STV); Israel's Parliament, the Knesset; and The Netherlands' Second Chamber.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">
	Single Transferable Vote (STV): (semi-proportional)</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">
	STV uses preferential voting in multi-member constituencies. Each voter has one vote. This vote can transfer from the voter's first preference, to second preference and so on if the voter's preferred candidate has no chance of being elected or has enough votes already. Candidates do not need a majority of votes to be elected, just a known 'quota' or share of the votes determined by the size of the electorate and the number of positions to be filled.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">
	Where used: Republic of Ireland – all elections except for the presidency and by-elections when Alternative Vote is used; Northern Ireland – Assembly, European and local government elections; Scotland – local elections from 2007; Malta – all elections; Australian Senate; Tasmanian House of Assembly; New Zealand – various local authorities; India – the indirect elections to the Rajya Sabha, the upper house of India's federal Parliament.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">
	Additional Member System: (hybrid)</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">
	AMS is a hybrid voting system, part First Past The Post and part closed party list, the party list element added on to make the result more proportional. Outside the UK it is more commonly referred to as Mixed Member Proportional (MMP).The exact proportion of constituency representatives and list representatives varies from country to country; the constituency element usually makes up between 50 and 80 per cent. Voters typically have two votes – one for a candidate and one for a party.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">
	When all the votes are in, each constituency returns a winner, in the traditional FPTP style. If a candidate was standing in a constituency as well as on a party list, their name is taken off the list, with everyone below them moving up a place. The additional members are then allocated with the aim of tallying the number of seats won by each party to their share of the vote. Some systems do this solely on the basis of the party vote, others include the constituency vote too.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">
	Where used: Scottish Parliament; Welsh Assembly; Greater London Assembly; Italy – Senate and Chamber of Deputies; Germany – Bundestag; New Zealand – House of Representatives; Mexico – Camara de Diputados (lower house); Bolivia – Camara de Diputados (lower house); Lesotho – National Assembly (lower house).</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">
	First Past The Post: (majoritarian)</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="613" instrument_node="">
	First Past The Post voting, currently used to elect members of the House of Commons, takes place in single-member constituencies. The voter simply puts a cross in a box next to one candidate. The candidate with the most votes in the constituency wins. All other votes count for nothing. In some places, such as a number of English and Welsh local elections, FPTP is used to elect several representatives at one time. This system is known as the Multiple Non-Transferable Vote (MNTV).</span><br data-dcnode-id="612"><span data-dcnode-id="611" instrument_node="">
	FPTP is also known as simple majority voting or plurality voting.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">
	Where used: FPTP is the second most widely used voting system in the world, after party lists. Countries which use this system include the UK, the US, Canada and India.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">
	The Limited Vote: (majoritarian)</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">
	The Limited Vote is used in multi-member constituencies. It allows each elector more than one vote, but fewer votes than there are candidates to choose from. The candidates with the most votes get elected.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">
	Where used: The Spanish Senate; Gibraltar's House of Assembly, where electors have eight votes for the 15 seats; various local-level elections, such as those for municipal offices in some US States.</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">
	Alternative Vote: (majoritarian)</span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="593" instrument_node="">
	The Alternative Vote (AV) is very much like First Past The Post. It is used to elect representatives for single-member constituencies, but rather than simply marking a solitary 'X' on the ballot paper, the voter has the chance to rank the candidates on offer by putting a '1' by their first preference, a '2' by their second preference and so on.</span><br data-dcnode-id="592"><span data-dcnode-id="591" instrument_node="">
	If a candidate receives a majority of first-preference votes (more people put them as number one than all the rest combined), then they are elected. If no candidate gains a majority on first preferences, then the second-preference votes of the candidate who finished last on the first count are redistributed. This process is repeated until someone gets over 50 per cent.</span><br data-dcnode-id="590"><span data-dcnode-id="589" instrument_node="">
	AV is also known as Instant Run-off Voting (IRV), Ranked Choice Voting (RCV) and Preferential Voting.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">
	Where used: Australian House of Representatives; Australian Legislative Assemblies ("lower houses") of all states and territories (bar Tasmania and the Australian Capital Territory, which both use STV); Australian Legislative Council in Tasmania; Irish Presidential election; By-elections to the Dáil (the lower house of the Irish Parliament); By-elections to the Northern Ireland Assembly; Papua New Guinea National Parliament; Fijian House of Representatives; numerous American Mayoral and district elections; Student Union elections.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">
	Alternative Vote Plus:</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="580" instrument_node="">
	The Alternative Vote Plus (AV+) was invented by the 1998 Independent Commission on the Voting System, commonly known as the Jenkins Commission. The Commission described the system as a "limited" form of AMS aimed at achieving a balance between the requirements of "broad proportionality" and "stable government".</span><br data-dcnode-id="579"><span data-dcnode-id="578" instrument_node="">
	AV+ was created with the intention of being the alternative to First-Past-the-Post (FPTP) in Labour's promised referendum on the voting system for the House of Commons. The referendum never came and AV+ has, for now, been confined to the parliamentary archives.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">
	Supplementary Vote (SV):</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">
	The SV system is similar to the Alternative Vote system, but under SV voters are limited to a first and second preference only. All first choice votes are tallied and if the candidate has a majority they are elected. If no candidate receives a majority, the top two candidates are retained, and the rest eliminated. The second-preference votes of the eliminated candidates are then counted, and any for either of the top two candidates are added to their first-round totals. Whichever candidate has the most votes after these second-preferences have been allocated is declared the winner.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">
	Where used: Directly elected English mayors, most notably the Mayor of London.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">
	Source: Electoral Reform Society</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="563" instrument_node="">
</span><b data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Statistics</span></b></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">
	Turnout at the 2010 UK general election was 65.1%. This represents an improvement on the turnout at the 2005 general election which saw figures of 61.4%. Turnout at the 2001 general election was 59.4% – the lowest figures since 1918.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">
	Turnout at the local elections in May 2010 was 62.2%. The unusually high turnout could be explained as a result of the local elections being combined with the UK general election. Local election turnout in 2009 was 39.1%, marginally lower than the 2008 average of 39.9%.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">
	Average turnout in the UK at the European Parliamentary elections in June 2009 was 34.7%. At the 2004 elections it was approximately 38.5%, 14.5 percentage points higher than in 1999 when the UK had the lowest turnout of any member state.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">
	Recent elections have shown slight increases in turnout but voting levels are still not as high as they were in the last half of the twentieth century.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">
	According to the Office for National Statistics, there were 44,260,051 Parliamentary electors registered to vote in Great Britain as at 1 December 2009. This is a rise of 200,585 (0.5 per cent) on the previous year.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">
	Source: Electoral Commission&nbsp;</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="540" instrument_node="">
</span><b data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Quotes</span></b></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">
	"The Government believes that our political system is broken. We urgently need fundamental political reform, including a referendum on electoral reform, much greater co-operation across party lines, and changes to our political system to make it far more transparent and accountable."</span></p><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">
	"We will bring forward a Referendum Bill on electoral reform, which includes provision for the introduction of the Alternative Vote in the event of a positive result in the referendum, as well as for the creation of fewer and more equal sized constituencies. We will whip both Parliamentary parties in both Houses to support a simple majority referendum on the Alternative Vote, without prejudice to the positions parties will take during such a referendum."</span></p><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">
	The Coalition: Our programme for government&nbsp;</span></p><span data-dcnode-id="527" instrument_node="">
