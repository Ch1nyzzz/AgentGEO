</span><h1 class="c-post-hero__title" data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Why Canada Needs Electoral Reform</span></h1><span data-dcnode-id="974" instrument_node="">
</span><div class="c-post-hero__meta" data-dcnode-id="966"><span data-dcnode-id="973" instrument_node="">
</span><time data-dcnode-id="971" datetime="2020-03-30"><span data-dcnode-id="972" instrument_node="">30.Mar.2020 1:53 AM</span></time><span data-dcnode-id="970" instrument_node=""> .

</span><article class="c-post tag-the-americas tag-law-and-diplomacy" data-dcnode-id="686"><span data-dcnode-id="953" instrument_node="">
</span><div class="c-content" data-dcnode-id="806"><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="951" instrument_node="">The road to establishing democracy in Canada has been a long one, with the first instances of </span><a data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Dhis%26document%3Dintro%26lang%3De"><span data-dcnode-id="950" instrument_node="">popular elections</span></a><span data-dcnode-id="948" instrument_node=""> taking place in what was then the colony of New France, now the province of Quebec. Special members of the colonial council in Quebec City, called </span><a data-dcnode-id="946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Dhis%26document%3Dintro%26lang%3De"><span data-dcnode-id="947" instrument_node="">syndics</span></a><span data-dcnode-id="945" instrument_node="">, were elected to serve as mediums through which the council and electors could communicate to each other. This purely communicative role was later expanded into that of a full council member. </span><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Dhis%26document%3Dintro%26lang%3De"><span data-dcnode-id="944" instrument_node="">By 1657</span></a><span data-dcnode-id="942" instrument_node="">, it was decreed that there should be four popularly-elected candidates on the council who would be determined by a single-member plurality vote, meaning whichever candidate attained the most votes in their district would win the seat. This foundational mechanism has remained essentially unchanged ever since.</span></p><p data-dcnode-id="933"><span data-dcnode-id="940" instrument_node="">The rest of the political system and electoral conditions have evolved throughout the years, taking on considerable influence from the British following the </span><a data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/conquest"><span data-dcnode-id="939" instrument_node="">removal of French governance</span></a><span data-dcnode-id="937" instrument_node=""> with the 1763 Treaty of Paris. At the time, what is now Canada was still a collection of separate colonial territories, each with their own methods of governance and organization; it would not be until 1867, the year of Confederation and the creation of the Dominion of Canada, that the territories would be unified. Between these events, one of the main obstacles to democracy was that the upper houses of government, which were appointed, could </span><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Dhis%26document%3Dintro%26lang%3De"><span data-dcnode-id="936" instrument_node="">block legislation</span></a><span data-dcnode-id="934" instrument_node=""> approved by the lower houses, which were elected. Although technically still possible, as a bill must receive approval from both houses before it can pass into law, convention strongly dictates that the upper house should approve bills which pass in the lower house.</span></p><p data-dcnode-id="919"><span data-dcnode-id="932" instrument_node="">With the unification of Canada into a single country, uniform standards could then be applied across the provinces, leading to slow and incremental change. Women were given the right to vote in federal elections in </span><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lop.parl.ca/sites/PublicWebsite/default/en_CA/ResearchPublications/201381E"><span data-dcnode-id="931" instrument_node="">1918</span></a><span data-dcnode-id="929" instrument_node="">, although the franchise would only be formally defined by federal legislation in 1920. First Nations peoples living on reserves were given the right to vote in </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lop.parl.ca/sites/PublicWebsite/default/en_CA/ResearchPublications/201381E"><span data-dcnode-id="928" instrument_node="">1960</span></a><span data-dcnode-id="926" instrument_node="">, and the minimum </span><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lop.parl.ca/sites/PublicWebsite/default/en_CA/ResearchPublications/201381E"><span data-dcnode-id="925" instrument_node="">voting age was lowered</span></a><span data-dcnode-id="923" instrument_node=""> from 21 to 18 in 1970. Generally, subsequent attempts to restrict eligible voters due to incarceration, occupation, mental capacity, or other similar reasons have been </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lop.parl.ca/sites/PublicWebsite/default/en_CA/ResearchPublications/201381E"><span data-dcnode-id="922" instrument_node="">struck down</span></a><span data-dcnode-id="920" instrument_node="">. With this steady trend towards a more inclusive and fair democracy, it is curious that the fundamental mechanism for electing representatives has not changed since 1657. It seems that after a long period of evolution and modernization, the Canadian electoral system has come to a standstill, leading to increasing voter dissatisfaction and diminishing participation rates which threaten the very foundation of democracy. </span></p><p data-dcnode-id="890"><span data-dcnode-id="918" instrument_node="">Canada’s political system is officially a </span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Dces%26document%3Dpart1%26lang%3De"><span data-dcnode-id="917" instrument_node="">constitutional monarchy</span></a><span data-dcnode-id="915" instrument_node=""> with the Queen of Canada, Queen Elizabeth II of England, a holdover from Canada’s former colonial status, at its head. The Queen’s role, however, is purely symbolic, and she is said </span><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Dces%26document%3Dpart1%26lang%3De"><span data-dcnode-id="914" instrument_node="">to rule but not to govern.</span></a><span data-dcnode-id="912" instrument_node=""> The legislative branch of government, collectively referred to as Parliament, is divided between the </span><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Dhis%26document%3Dintro%26lang%3De"><span data-dcnode-id="911" instrument_node="">Senate and the House of Commons</span></a><span data-dcnode-id="909" instrument_node="">, the latter of which is popularly elected while members of the former are appointed. There are currently 338 seats in the House of Commons, each representing an electoral district established through a </span><a data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Dces%26document%3Dpart1%26lang%3De"><span data-dcnode-id="908" instrument_node="">representation formula</span></a><span data-dcnode-id="906" instrument_node=""> outlined in the Constitution. In order to win a seat in the House of Commons, a candidate only needs to achieve a </span><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Dces%26document%3Dpart1%26lang%3De"><span data-dcnode-id="905" instrument_node="">plurality of votes</span></a><span data-dcnode-id="903" instrument_node="">, meaning the greatest number of votes compared to other candidates, rather than a simple majority. This is a single-member plurality system, commonly referred to as </span><a data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Dces%26document%3Dpart1%26lang%3De"><span data-dcnode-id="902" instrument_node="">first-past-the-post</span></a><span data-dcnode-id="900" instrument_node=""> (FPTP). Rather than voting for a political party, </span><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lop.parl.ca/sites/PublicWebsite/default/en_CA/ResearchPublications/201381E%23a8"><span data-dcnode-id="899" instrument_node="">voters elect the individual</span></a><span data-dcnode-id="897" instrument_node=""> who may or may not be affiliated with a political party. Still, the overwhelming majority of elected Members of Parliament (MPs) are from official political parties, with the party winning the most seats in the House of Commons forming government. The leader of that party is then asked by the Governor General, the Queen’s official representative, to assume the role of </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Dces%26document%3Dpart1%26lang%3De"><span data-dcnode-id="896" instrument_node="">Prime Minister</span></a><span data-dcnode-id="894" instrument_node=""> and head the executive branch of government. This system prioritizes the party in power holding a majority of seats in Parliament in order to encourage the formation of a </span><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/electoral-reform"><span data-dcnode-id="893" instrument_node="">strong and stable</span></a><span data-dcnode-id="891" instrument_node=""> government. However, in recent decades there have been growing calls for electoral reform due to the recurrent disproportionality of elections and legislature, as well as the exaggeration and perpetuation of regional divisions.</span></p><h3 data-dcnode-id="888" id="failures-of-first-past-the-post"><span data-dcnode-id="889" instrument_node="">Failures of First-Past-the-Post</span></h3><p data-dcnode-id="874"><span data-dcnode-id="887" instrument_node="">The most common grievance Canadians have with the current electoral system is how the legislature consistently misrepresents the popular vote, often quite drastically. In the </span><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newsinteractives.cbc.ca/elections/federal/2019/results/"><span data-dcnode-id="886" instrument_node="">most recent election</span></a><span data-dcnode-id="884" instrument_node=""> for example, the Liberal Party of Canada obtained 46.4 percent of the seats in the House of Commons with only 33.1 percent of the popular vote. This allowed them to form government, despite the Conservative Party of Canada earning a slightly larger percentage of the popular vote with 34.4 percent. This example is far from being an outlier. The FPTP system often produces these disproportionate results; back in 2015, the Liberal Party won a majority of seats in government with only </span><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canadians.org/blog/canada-needs-electoral-reform"><span data-dcnode-id="883" instrument_node="">39.5 percent</span></a><span data-dcnode-id="881" instrument_node=""> of the popular vote. Such results clearly do not accurately reflect the will and opinions of the Canadian population as a whole, and they suffer from a lack of predictability. </span><a data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elections.ca/content.aspx%3Fsection%3Dres%26dir%3Dces%26document%3Dpart1%26lang%3De"><span data-dcnode-id="880" instrument_node="">Geography</span></a><span data-dcnode-id="878" instrument_node=""> comes to play a decisive role when it comes to political representation in single-member plurality constituencies, and this leads to a multitude of problems. Each party may only run one candidate per riding, a specific geographic division determined by demographic and population size, and electors cast a single vote for their preferred representative in their assigned constituency. The candidate with the most votes wins the seat, and there is no minimum threshold or margin of votes by which the candidate must win over the runner-up. Parties which acquire a significant portion of the popular vote but fail to come in first in a riding get nothing; the votes which go to parties with runner-up candidates are essentially wasted, as they do not translate into any form of representation in the government. This characteristic of the current electoral system often leads to </span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//canadians.org/blog/canada-needs-electoral-reform"><span data-dcnode-id="877" instrument_node="">“strategic” voting</span></a><span data-dcnode-id="875" instrument_node="">, where electors cast votes not for their preferred candidate, who could hail from a smaller or less popular party in their riding, but for the candidate most likely to beat their least preferred option. The political landscape thus devolves into a two-party system split between the most established parties, the Liberals and the Conservatives, even though Canada possesses a multi-party system with many alternatives. The FPTP system makes it hard for these alternative parties to gain a significant foothold in the House of Commons, despite the popular vote proving that they are, in fact, quite popular.</span></p><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">In addition to the prevalence of strategic voting, the dependence of FPTP on geographically-defined ridings makes the system susceptible to gerrymandering, the practice of defining constituencies in such a way that a specific party is inherently favored due to the distribution of partisan voters. Even without gerrymandering, the small geographic size of many ridings—determined by population density—means that voting populations are necessarily split up, making it harder to ensure an appropriate proportionality between electors and the legislature. In metropolitan areas, ridings usually encompass only a handful of neighbourhoods that are very demographically diverse, whereas in rural areas they are much larger but also more homogenous. Rural areas tend to come off stronger in elections because the voters are more unified, whereas in the urban population vote-splitting is a common occurrence. </span></p><p data-dcnode-id="867"><span data-dcnode-id="871" instrument_node="">For parties besides the Liberals and Conservatives, a very high concentration of regional support is needed for success. The system works in favor of region-specific interest groups, hindering parties with platforms that have more general appeal across the entire country. Case in point, during the </span><a data-dcnode-id="869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newsinteractives.cbc.ca/elections/federal/2019/results/"><span data-dcnode-id="870" instrument_node="">2019 federal election</span></a><span data-dcnode-id="868" instrument_node="">, the were major upsets between the Bloc Québécois, a party which only exists in the province of Quebec, the Green Party, Canada’s dedicated environmentalist party, and the New Democratic Party, a socialist democratic party that is traditionally third-largest in Parliament. The Bloc Québécois secured 7.7 percent of the popular vote while the Green Party obtained a comparable 6.5 percent, but the Bloc Québécois came away with 32 seats in the House of Commons while the Green Party only got three. Even more jarring was that the New Democratic Party earned 15.9 percent of the popular vote, more than double that of the Bloc Québécois, yet they only secured 24 seats. The tactics required of political parties in order to succeed in this system tend to exaggerate and encourage regional divisions across provinces and communities, since parties will often choose to prioritize region-specific issues to secure a voting stronghold. As a result, election results create the impression that Canadians are far more divided than they really are, as small shifts in the popular vote can lead to extreme changes in the legislature.</span></p><h3 data-dcnode-id="865" id="canadians-need-change"><span data-dcnode-id="866" instrument_node="">Canadians Need Change</span></h3><p data-dcnode-id="858"><span data-dcnode-id="864" instrument_node="">These are but a few of the well-documented discrepancies continually produced by the single-member plurality system. However, if the government has managed to function so far, what’s the point in changing now? A compelling argument for electoral reform is Canada’s diminishing voter participation, as well as overall low participation from young voters. Between the years of 1945 and 1988, approximately </span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/electoral-systems"><span data-dcnode-id="863" instrument_node="">75 percent of eligible voters</span></a><span data-dcnode-id="861" instrument_node=""> cast their ballot on election day. This has since dropped to 60 percent, a trend that shows little sign of reversing. Furthermore, it is especially worrying that this decline is happening in large part due to a lack of participation from young voters, with people in the age groups from 18 to 29 having the </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bdp.parl.ca/sites/PublicWebsite/default/en_CA/ResearchPublications/2016104E%23a2"><span data-dcnode-id="860" instrument_node="">lowest voter turnout.</span></a></p><p data-dcnode-id="853"><span data-dcnode-id="857" instrument_node="">Adopting an alternative electoral system that produces a more representative legislature is one way of tackling low voter participation rates. Studies have shown that proportional representation systems, which aim to translate the proportions which emerge in popular votes into the legislative body, </span><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mcgillpolicyassociation.com/journal/2019/10/29/making-votes-count-why-canada-needs-electoral-reform"><span data-dcnode-id="856" instrument_node="">increase voter turnout</span></a><span data-dcnode-id="854" instrument_node="">. It is suggested that one of the main reasons for this increase in participation is that every vote counts towards representation, instead of only the votes going towards winning candidates in individual districts. Currently, people will often decide not to vote if their riding traditionally leans very strongly towards one party, as they see no point in casting a ballot that is unlikely to make a difference.</span></p><p data-dcnode-id="836"><span data-dcnode-id="852" instrument_node="">Another issue with the Canadian political system that could potentially be improved through the adoption of a proportional representation voting system is the underrepresentation of women and minority groups in Parliament. Prime Minister Justin Trudeau made headlines when he appointed Canada’s </span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/news/politics/canada-trudeau-liberal-government-cabinet-1.3304590"><span data-dcnode-id="851" instrument_node="">first gender-balanced Cabinet</span></a><span data-dcnode-id="849" instrument_node=""> upon his election in 2015, but discrepancies still exist in overall representation. The results of the latest election have only </span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//newsinteractives.cbc.ca/elections/federal/2019/commons/"><span data-dcnode-id="848" instrument_node="">29 percent of seats</span></a><span data-dcnode-id="846" instrument_node=""> in the House of Commons held by women, and although they make up 5 percent of the population, just under 3 percent of seats are filled by </span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ipolitics.ca/article/diversifying-canadas-most-diverse-parliament/"><span data-dcnode-id="845" instrument_node="">First Nations representatives</span></a><span data-dcnode-id="843" instrument_node="">. Studies show that major democracies using proportional representation systems </span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fairvote.ca/women/"><span data-dcnode-id="842" instrument_node="">consistently outrank</span></a><span data-dcnode-id="840" instrument_node=""> major democracies that still use FPTP in the percentage of seats held by women. In the case of </span><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ipolitics.ca/article/diversifying-canadas-most-diverse-parliament/"><span data-dcnode-id="839" instrument_node="">ethnic and cultural minority candidates</span></a><span data-dcnode-id="837" instrument_node="">, they tend to only have strong chances of being elected in ridings with a large minority group population. This is another instance of the primacy and necessity of a high territorial concentration of support, something that is rarely guaranteed in many of the highly mixed and multicultural metropolitan areas where a significant portion of the Canadian population lives.</span></p><p data-dcnode-id="810"><span data-dcnode-id="835" instrument_node="">While retiring the FPTP system has been a significant topic of debate in Canada since the </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/electoral-reform"><span data-dcnode-id="834" instrument_node="">1990s</span></a><span data-dcnode-id="832" instrument_node="">, the issue gained new momentum during the 2015 federal election. Electoral reform was included in the platforms of </span><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecanadianencyclopedia.ca/en/article/electoral-systems"><span data-dcnode-id="831" instrument_node="">all major political parties</span></a><span data-dcnode-id="829" instrument_node="">, with the Liberal Party under Trudeau </span><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/news/politics/trudeau-electoral-reform-january-2018-1.4511902"><span data-dcnode-id="828" instrument_node="">pledging</span></a><span data-dcnode-id="826" instrument_node=""> to ensure that 2015 would be the last federal election to use FPTP. Although the Liberal Party won the election with a </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/news2/interactives/results-2015/"><span data-dcnode-id="825" instrument_node="">decisive majority</span></a><span data-dcnode-id="823" instrument_node=""> of seats, electoral reform was </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/news/politics/trudeau-electoral-reform-proportional-representation-1.5225616"><span data-dcnode-id="822" instrument_node="">dropped</span></a><span data-dcnode-id="820" instrument_node=""> from the agenda by 2017. </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/news/politics/trudeau-electoral-reform-january-2018-1.4511902"><span data-dcnode-id="819" instrument_node="">Trudeau justified</span></a><span data-dcnode-id="817" instrument_node=""> the breaking of this seminal campaign promise by claiming that Canadians did not agree on which alternative system of voting to adopt and voicing his own opposition to proportional representation. He instead offered the ranked ballot method, where voters classify a certain number of candidates based on preference, stating that it would result in </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/news/politics/trudeau-electoral-reform-wherry-analysis-1.4179928"><span data-dcnode-id="816" instrument_node="">greater political unity</span></a><span data-dcnode-id="814" instrument_node=""> for Canadians. This stance drew a fair amount of criticism, mainly because political theorists predict the </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/news/politics/trudeau-electoral-reform-wherry-analysis-1.4179928"><span data-dcnode-id="813" instrument_node="">Liberal Party would benefit</span></a><span data-dcnode-id="811" instrument_node=""> the most from a ranked ballot system.</span></p><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Notwithstanding the lack of consensus on which voting system is most suited to Canada, it is clear that Canadians care about their government and the fairness of elections. The Liberal Party lost its chance to push through reform on its own terms when it lost its majority government in the 2019 election and will now have to rely on cooperation with other parties to pass legislation. Canadians can only hope that the other parties push electoral reform onto the agenda, or else wait another five years for a new government to be elected.</span></p><span data-dcnode-id="807" instrument_node="">

</span><h3 class="c-widget-author__title" data-dcnode-id="674"><span data-dcnode-id="678" instrument_node="">
