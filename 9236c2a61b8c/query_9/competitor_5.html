&lt;br /&gt;
&lt;h2&gt;Trends in Electoral System Reform&lt;/h2&gt;
&lt;div&gt;
&lt;p style="text-align: justify;"&gt;The Italian referendum in 1993, leading to a change to a Mixed Member Proportional System for the elections the following year, marked the beginning of a series of significant changes in electoral systems all over the world. In the vast majority of the cases, changes have been made on the margins, with a new seat allocation formula, a new number of electoral districts, or an extra few appointed members in the legislature; but many countries have also gone through reform processes that have altered their electoral system completely. For instance, after the coups in the Democratic Republic of the Congo and Madagascar, elections were held after a transitional period under a Parallel System in 2006 and 2013, respectively. Another example is Fiji with its 2014 elections held under a Proportional Representation System after experiencing coups in 1987, 2000 and 2006.&lt;/p&gt;
&lt;p style="text-align: justify;"&gt;There are some other cases where an electoral system was unsuccessfully replaced only to be used again, such as in Kyrgyzstan and more recently in Bulgaria, where a Mixed system was used in the 2009 election instead of one of Proportional Representation System, which was then reinstated in 2013.&lt;/p&gt;
&lt;p style="text-align: justify;"&gt;As Table 1 shows, the trend is rather clear. Most countries that have changed electoral systems have done so in the direction of more proportionality, either by adding a PR element to a plurality system (making it a Parallel or MMP system) or by completely replacing their old system with List PR. The most common switch has been from a plurality/majority system to a mixed system, and there is not one example of a change in the opposite direction. The new plurality/majority systems all come from within the same family.&lt;/p&gt;
&lt;p style="text-align: justify;"&gt;The debate about reforming the electoral systems as a way to achieve greater representation is still in many countries´ agendas. Such is the case of the United Kingdom, where a referendum on the voting system was held in 2011; however, the proposal was rejected with 67.90% (13’013,123) of the votes cast against it and 32.10% (6’152,607) in favour.&lt;/p&gt;
&lt;p style="text-align: center;"&gt;&lt;img class="image-inline" src="copy2_of_copy_of_Table1.png" alt="Table 1 - Recent changes to electoral systems" width="604" /&gt;&lt;/p&gt;
&lt;p style="text-align: justify;"&gt;&amp;nbsp;&lt;/p&gt;
&lt;p style="text-align: justify;" class="discreet"&gt;&lt;em&gt;*Bhutan held elections for the first time in 2008 under the First Past the Post System and under the Two-Round System in 2013.&lt;/em&gt;&lt;/p&gt;
&lt;p style="text-align: justify;" class="discreet"&gt;&lt;em&gt;*The Democratic Republic of the Congo (Kinshasa) held elections for the first time in 2006 under a Mixed electoral system.&lt;/em&gt;&lt;/p&gt;
&lt;p style="text-align: justify;" class="discreet"&gt;&lt;em&gt;*Madagascar adopted a Parallel system in 2013.&lt;/em&gt;&lt;/p&gt;
&lt;p style="text-align: justify;" class="discreet"&gt;&lt;em&gt;*Bulgaria changed from a Proportional Representation system to a Mixed electoral system in 2009 and back to PR in 2013.&lt;/em&gt;&lt;/p&gt;
&lt;/div&gt;

pe: none;padding-right:0;margin-right:0;margin-left:1em;"><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="1127" role="tablist"><a aria-controls="ui-accordion-19-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="1129" href="file://aceproject.org/ace-en/topics/es/esb/esb01" id="ui-accordion-19-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="1131"></span><span data-dcnode-id="1130" instrument_node="">Who designs?</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-19-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="1128" id="ui-accordion-19-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="1122" role="tablist"><a aria-controls="ui-accordion-20-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="1124" href="file://aceproject.org/ace-en/topics/es/esb/esb02" id="ui-accordion-20-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="1126"></span><span data-dcnode-id="1125" instrument_node="">What are the Mechanisms for Reform and Amendment?</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-20-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="1123" id="ui-accordion-20-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="1117" role="tablist"><a aria-controls="ui-accordion-21-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="1119" href="file://aceproject.org/ace-en/topics/es/esb/esb03" id="ui-accordion-21-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="1121"></span><span data-dcnode-id="1120" instrument_node="">Advice on Debate and Dialogue</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-21-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="1118" id="ui-accordion-21-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="1112" role="tablist"><a aria-controls="ui-accordion-22-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="1114" href="file://aceproject.org/ace-en/topics/es/esb/esb04" id="ui-accordion-22-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="1116"></span><span data-dcnode-id="1115" instrument_node="">Advice on Implementation</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-22-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="1113" id="ui-accordion-22-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="1107" role="tablist"><a aria-controls="ui-accordion-23-panel-0" aria-expanded="false" aria-selected="false" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-corner-all ui-accordion-icons" data-dcnode-id="1109" href="file://aceproject.org/ace-en/topics/es/esb/esb05" id="ui-accordion-23-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-e" data-dcnode-id="1111"></span><span data-dcnode-id="1110" instrument_node="">Assessing the Impact of Change</span></a><div aria-hidden="true" aria-labelledby="ui-accordion-23-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom" data-dcnode-id="1108" id="ui-accordion-23-panel-0" role="tabpanel" style="display: none;"></div></div><div class="accordion ui-accordion ui-widget ui-helper-reset" data-dcnode-id="1064" role="tablist"><a aria-controls="ui-accordion-24-panel-0" aria-expanded="true" aria-selected="true" class="insert-page ui-accordion-header ui-helper-reset ui-state-default ui-accordion-icons ui-accordion-header-active ui-state-active ui-corner-top" data-dcnode-id="1104" href="file://aceproject.org/ace-en/topics/es/esb/esb06" id="ui-accordion-24-header-0" role="tab" tabindex="0"><span class="ui-accordion-header-icon ui-icon ui-icon-triangle-1-s" data-dcnode-id="1106"></span><span data-dcnode-id="1105" instrument_node="">Trends in Electoral System Reform</span></a><div aria-hidden="false" aria-labelledby="ui-accordion-24-header-0" class="targetdiv ui-accordion-content ui-helper-reset ui-widget-content ui-corner-bottom ui-accordion-content-active" data-dcnode-id="1065" id="ui-accordion-24-panel-0" role="tabpanel" style="display: block;"><span data-dcnode-id="1103" instrument_node="">
</span><div data-dcnode-id="1067"><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100" style="text-align: justify;"><span data-dcnode-id="1101" instrument_node="">The Italian referendum in 1993, leading to a change to a Mixed Member Proportional System for the elections the following year, marked the beginning of a series of significant changes in electoral systems all over the world. In the vast majority of the cases, changes have been made on the margins, with a new seat allocation formula, a new number of electoral districts, or an extra few appointed members in the legislature; but many countries have also gone through reform processes that have altered their electoral system completely. For instance, after the coups in the Democratic Republic of the Congo and Madagascar, elections were held after a transitional period under a Parallel System in 2006 and 2013, respectively. Another example is Fiji with its 2014 elections held under a Proportional Representation System after experiencing coups in 1987, 2000 and 2006.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097" style="text-align: justify;"><span data-dcnode-id="1098" instrument_node="">There are some other cases where an electoral system was unsuccessfully replaced only to be used again, such as in Kyrgyzstan and more recently in Bulgaria, where a Mixed system was used in the 2009 election instead of one of Proportional Representation System, which was then reinstated in 2013.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094" style="text-align: justify;"><span data-dcnode-id="1095" instrument_node="">As Table 1 shows, the trend is rather clear. Most countries that have changed electoral systems have done so in the direction of more proportionality, either by adding a PR element to a plurality system (making it a Parallel or MMP system) or by completely replacing their old system with List PR. The most common switch has been from a plurality/majority system to a mixed system, and there is not one example of a change in the opposite direction. The new plurality/majority systems all come from within the same family.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091" style="text-align: justify;"><span data-dcnode-id="1092" instrument_node="">The debate about reforming the electoral systems as a way to achieve greater representation is still in many countries´ agendas. Such is the case of the United Kingdom, where a referendum on the voting system was held in 2011; however, the proposal was rejected with 67.90% (13’013,123) of the votes cast against it and 32.10% (6’152,607) in favour.</span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088" style="text-align: center;"><img alt="Table 1 - Recent changes to electoral systems" class="image-inline" data-dcnode-id="1089" src="file://aceproject.org/ace-en/topics/es/esb/copy2_of_copy_of_Table1.png" width="604"></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085" style="text-align: justify;"><span data-dcnode-id="1086" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p class="discreet" data-dcnode-id="1081" style="text-align: justify;"><em data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">*Bhutan held elections for the first time in 2008 under the First Past the Post System and under the Two-Round System in 2013.</span></em></p><span data-dcnode-id="1080" instrument_node="">
</span><p class="discreet" data-dcnode-id="1077" style="text-align: justify;"><em data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">*The Democratic Republic of the Congo (Kinshasa) held elections for the first time in 2006 under a Mixed electoral system.</span></em></p><span data-dcnode-id="1076" instrument_node="">
</span><p class="discreet" data-dcnode-id="1073" style="text-align: justify;"><em data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">*Madagascar adopted a Parallel system in 2013.</span></em></p><span data-dcnode-id="1072" instrument_node="">
</span><p class="discreet" data-dcnode-id="1069" style="text-align: justify;"><em data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">*Bulgaria changed from a Proportional Representation system to a Mixed electoral system in 2009 and back to PR in 2013.</span></em></p><span data-dcnode-id="1068" instrument_node="">
</span></div><span data-dcnode-id="1066" instrument_node="">
