</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="475" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="484"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="9128" style="display:none"><span data-dcnode-id="9129" instrument_node="">Overview of postal voting in the United States of America</span></div><span data-dcnode-id="9127" instrument_node="">
</span><p class="mw-empty-elt" data-dcnode-id="9125"><span data-dcnode-id="9126" instrument_node="">
</span></p><span data-dcnode-id="9124" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9115"><div class="thumbinner" data-dcnode-id="9116" style="width:262px;"><a class="image" data-dcnode-id="9122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEarly_voting_US_States_2020%252Blabel.png"><img alt="" class="thumbimage" data-dcnode-id="9123" data-file-height="7072" data-file-width="5112" decoding="async" height="360" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Early_voting_US_States_2020%252Blabel.png/260px-Early_voting_US_States_2020%252Blabel.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Early_voting_US_States_2020%2Blabel.png/390px-Early_voting_US_States_2020%2Blabel.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Early_voting_US_States_2020%2Blabel.png/520px-Early_voting_US_States_2020%2Blabel.png 2x" width="260"></a><span data-dcnode-id="9121" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9117"><div class="magnify" data-dcnode-id="9119"><a class="internal" data-dcnode-id="9120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEarly_voting_US_States_2020%252Blabel.png" title="Enlarge"></a></div><span data-dcnode-id="9118" instrument_node="">Early voting in U.S. states, 2020</span></div></div></div><span data-dcnode-id="9114" instrument_node="">
</span><p data-dcnode-id="9073"><b data-dcnode-id="9112"><span data-dcnode-id="9113" instrument_node="">Postal voting in the United States</span></b><span data-dcnode-id="9111" instrument_node="">, also referred to as </span><b data-dcnode-id="9109"><span data-dcnode-id="9110" instrument_node="">mail-in voting</span></b><span data-dcnode-id="9108" instrument_node=""> or </span><b data-dcnode-id="9106"><span data-dcnode-id="9107" instrument_node="">vote by mail</span></b><span data-dcnode-id="9105" instrument_node="">,</span><sup class="reference" data-dcnode-id="9102" id="cite_ref-1"><a data-dcnode-id="9103" href="#cite_note-1"><span data-dcnode-id="9104" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9101" instrument_node=""> is a form of </span><a data-dcnode-id="9099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absentee_ballot" title="Absentee ballot"><span data-dcnode-id="9100" instrument_node="">absentee ballot</span></a><span data-dcnode-id="9098" instrument_node=""> in the </span><a data-dcnode-id="9096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="9097" instrument_node="">United States</span></a><span data-dcnode-id="9095" instrument_node="">, in which a </span><a data-dcnode-id="9093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballot" title="Ballot"><span data-dcnode-id="9094" instrument_node="">ballot</span></a><span data-dcnode-id="9092" instrument_node=""> is mailed to the home of a registered voter, who fills it out and returns it by postal mail or drops it off in-person at a secure drop box or voting center. </span><a data-dcnode-id="9090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Postal_voting" title="Postal voting"><span data-dcnode-id="9091" instrument_node="">Postal voting</span></a><span data-dcnode-id="9089" instrument_node=""> reduces staff requirements at polling centers during an election. All-mail elections can save money,</span><sup class="reference" data-dcnode-id="9086" id="cite_ref-pewt_Colo_2-0"><a data-dcnode-id="9087" href="#cite_note-pewt_Colo-2"><span data-dcnode-id="9088" instrument_node="">[2]</span></a></sup><span data-dcnode-id="9085" instrument_node=""> while a mix of voting options can cost more.</span><sup class="reference" data-dcnode-id="9082" id="cite_ref-ncsl-mar_3-0"><a data-dcnode-id="9083" href="#cite_note-ncsl-mar-3"><span data-dcnode-id="9084" instrument_node="">[3]</span></a></sup><span data-dcnode-id="9081" instrument_node=""> In some states, ballots may be sent by the </span><a data-dcnode-id="9079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Postal_Service" title="United States Postal Service"><span data-dcnode-id="9080" instrument_node="">Postal Service</span></a><span data-dcnode-id="9078" instrument_node=""> without prepayment of postage.</span><sup class="reference" data-dcnode-id="9075" id="cite_ref-4"><a data-dcnode-id="9076" href="#cite_note-4"><span data-dcnode-id="9077" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9074" instrument_node="">
</span></p><p data-dcnode-id="9034"><span data-dcnode-id="9072" instrument_node="">Research shows that the availability of postal voting increases </span><a data-dcnode-id="9070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_turnout" title="Voter turnout"><span data-dcnode-id="9071" instrument_node="">voter turnout</span></a><span data-dcnode-id="9069" instrument_node="">.</span><sup class="reference" data-dcnode-id="9066" id="cite_ref-NYT_2020-05-04_5-0"><a data-dcnode-id="9067" href="#cite_note-NYT_2020-05-04-5"><span data-dcnode-id="9068" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="9063" id="cite_ref-NYT_2020-05-25_6-0"><a data-dcnode-id="9064" href="#cite_note-NYT_2020-05-25-6"><span data-dcnode-id="9065" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="9060" id="cite_ref-7"><a data-dcnode-id="9061" href="#cite_note-7"><span data-dcnode-id="9062" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9059" instrument_node=""> It has been argued that postal voting has a greater risk of </span><a class="mw-redirect" data-dcnode-id="9057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_fraud_in_the_United_States" title="Voter fraud in the United States"><span data-dcnode-id="9058" instrument_node="">fraud</span></a><span data-dcnode-id="9056" instrument_node=""> than in-person voting, though known instances of such fraud are very rare,</span><sup class="reference" data-dcnode-id="9053" id="cite_ref-nprav_8-0"><a data-dcnode-id="9054" href="#cite_note-nprav-8"><span data-dcnode-id="9055" instrument_node="">[8]</span></a></sup><span data-dcnode-id="9052" instrument_node=""> with one database finding 491 cases of absentee ballot fraud from 2000 to 2012, a period in which billions of votes were cast.</span><sup class="reference" data-dcnode-id="9049" id="cite_ref-9"><a data-dcnode-id="9050" href="#cite_note-9"><span data-dcnode-id="9051" instrument_node="">[9]</span></a></sup><span data-dcnode-id="9048" instrument_node=""> Processing large numbers of ballots and signature verifications accurately has numerous challenges other than fraud.</span><sup class="reference" data-dcnode-id="9045" id="cite_ref-stan_10-0"><a data-dcnode-id="9046" href="#cite_note-stan-10"><span data-dcnode-id="9047" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="9042" id="cite_ref-aclu_11-0"><a data-dcnode-id="9043" href="#cite_note-aclu-11"><span data-dcnode-id="9044" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="9039" id="cite_ref-eac16_12-0"><a data-dcnode-id="9040" href="#cite_note-eac16-12"><span data-dcnode-id="9041" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="9036" id="cite_ref-nyt-wi_13-0"><a data-dcnode-id="9037" href="#cite_note-nyt-wi-13"><span data-dcnode-id="9038" instrument_node="">[13]</span></a></sup><span data-dcnode-id="9035" instrument_node="">
</span></p><p data-dcnode-id="8970"><span data-dcnode-id="9033" instrument_node="">As of 2022, eight states&nbsp;– </span><a data-dcnode-id="9031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California" title="California"><span data-dcnode-id="9032" instrument_node="">California</span></a><span data-dcnode-id="9030" instrument_node="">, </span><a data-dcnode-id="9028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colorado" title="Colorado"><span data-dcnode-id="9029" instrument_node="">Colorado</span></a><span data-dcnode-id="9027" instrument_node="">, </span><a data-dcnode-id="9025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hawaii" title="Hawaii"><span data-dcnode-id="9026" instrument_node="">Hawaii</span></a><span data-dcnode-id="9024" instrument_node="">, </span><a data-dcnode-id="9022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nevada" title="Nevada"><span data-dcnode-id="9023" instrument_node="">Nevada</span></a><span data-dcnode-id="9021" instrument_node="">, </span><a data-dcnode-id="9019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oregon" title="Oregon"><span data-dcnode-id="9020" instrument_node="">Oregon</span></a><span data-dcnode-id="9018" instrument_node="">, </span><a data-dcnode-id="9016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Utah" title="Utah"><span data-dcnode-id="9017" instrument_node="">Utah</span></a><span data-dcnode-id="9015" instrument_node="">, and </span><a data-dcnode-id="9013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington_%28state%29" title="Washington (state)"><span data-dcnode-id="9014" instrument_node="">Washington</span></a><span data-dcnode-id="9012" instrument_node="">&nbsp;– hold elections almost entirely by mail, with general elections also held via mail in </span><a data-dcnode-id="9010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vermont" title="Vermont"><span data-dcnode-id="9011" instrument_node="">Vermont</span></a><span data-dcnode-id="9009" instrument_node="">.</span><sup class="reference" data-dcnode-id="9006" id="cite_ref-fec_14-0"><a data-dcnode-id="9007" href="#cite_note-fec-14"><span data-dcnode-id="9008" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9005" instrument_node=""> Postal voting is an option in 33 states and the </span><a class="mw-redirect" data-dcnode-id="9003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/District_of_Columbia" title="District of Columbia"><span data-dcnode-id="9004" instrument_node="">District of Columbia</span></a><span data-dcnode-id="9002" instrument_node="">. Other states allow postal voting only in certain circumstances, though the </span><a data-dcnode-id="9000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic" title="COVID-19 pandemic"><span data-dcnode-id="9001" instrument_node="">COVID-19 pandemic</span></a><span data-dcnode-id="8999" instrument_node=""> in 2020 has prompted further discussion about relaxing some of those restrictions. In the run up to the </span><a data-dcnode-id="8997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_United_States_presidential_election" title="2020 United States presidential election"><span data-dcnode-id="8998" instrument_node="">2020 United States presidential election</span></a><span data-dcnode-id="8996" instrument_node="">, after repeatedly asserting that mail-in voting would result in widespread fraud, President </span><a data-dcnode-id="8994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="8995" instrument_node="">Donald Trump</span></a><span data-dcnode-id="8993" instrument_node=""> indicated he would block necessary funding for the postal service to ensure that postal votes would be processed securely</span><sup class="reference" data-dcnode-id="8990" id="cite_ref-15"><a data-dcnode-id="8991" href="#cite_note-15"><span data-dcnode-id="8992" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8989" instrument_node=""> and on time.</span><sup class="reference" data-dcnode-id="8986" id="cite_ref-16"><a data-dcnode-id="8987" href="#cite_note-16"><span data-dcnode-id="8988" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8985" instrument_node=""> In September 2020, CNN obtained a </span><a class="mw-redirect" data-dcnode-id="8983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homeland_Security_Department" title="Homeland Security Department"><span data-dcnode-id="8984" instrument_node="">Homeland Security Department</span></a><span data-dcnode-id="8982" instrument_node=""> intelligence bulletin asserting "Russia is likely to continue amplifying criticisms of vote-by-mail and shifting voting processes amidst the COVID-19 pandemic to undermine public trust in the electoral process."</span><sup class="reference" data-dcnode-id="8979" id="cite_ref-auto_17-0"><a data-dcnode-id="8980" href="#cite_note-auto-17"><span data-dcnode-id="8981" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8978" instrument_node=""> Motivated by false claims of widespread voter fraud in the 2020 election, Republican lawmakers initiated a </span><a class="mw-redirect" data-dcnode-id="8976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republican_efforts_to_make_voting_laws_more_restrictive_following_the_2020_presidential_election" title="Republican efforts to make voting laws more restrictive following the 2020 presidential election"><span data-dcnode-id="8977" instrument_node="">push to roll back access to postal voting</span></a><span data-dcnode-id="8975" instrument_node="">.</span><sup class="reference" data-dcnode-id="8972" id="cite_ref-18"><a data-dcnode-id="8973" href="#cite_note-18"><span data-dcnode-id="8974" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8971" instrument_node="">
</span></p><span data-dcnode-id="8969" instrument_node="">

</span><h2 data-dcnode-id="8771"><span class="mw-headline" data-dcnode-id="8779" id="History"><span data-dcnode-id="8780" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="8772"><span class="mw-editsection-bracket" data-dcnode-id="8777"><span data-dcnode-id="8778" instrument_node="">[</span></span><a data-dcnode-id="8775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="8776" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8773"><span data-dcnode-id="8774" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8770" instrument_node="">
</span><p data-dcnode-id="8734"><span data-dcnode-id="8769" instrument_node="">Absentee ballots were first used for the military during the </span><a data-dcnode-id="8767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_War" title="American Civil War"><span data-dcnode-id="8768" instrument_node="">American Civil War</span></a><span data-dcnode-id="8766" instrument_node="">.</span><sup class="reference" data-dcnode-id="8763" id="cite_ref-19"><a data-dcnode-id="8764" href="#cite_note-19"><span data-dcnode-id="8765" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="8760" id="cite_ref-20"><a data-dcnode-id="8761" href="#cite_note-20"><span data-dcnode-id="8762" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8759" instrument_node=""> Early absentee voting laws restricted the practice to members of the armed services.</span><sup class="reference" data-dcnode-id="8756" id="cite_ref-:1_21-0"><a data-dcnode-id="8757" href="#cite_note-:1-21"><span data-dcnode-id="8758" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8755" instrument_node=""> The first allowance for civilian absentee voting was in Vermont in 1896.</span><sup class="reference" data-dcnode-id="8752" id="cite_ref-:1_21-1"><a data-dcnode-id="8753" href="#cite_note-:1-21"><span data-dcnode-id="8754" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8751" instrument_node=""> By 1938, 42 states allowed absentee voting for civilians.</span><sup class="reference" data-dcnode-id="8748" id="cite_ref-:1_21-2"><a data-dcnode-id="8749" href="#cite_note-:1-21"><span data-dcnode-id="8750" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8747" instrument_node=""> Nearly 2% of voters in the 1936 election voted through absentee ballots.</span><sup class="reference" data-dcnode-id="8744" id="cite_ref-:1_21-3"><a data-dcnode-id="8745" href="#cite_note-:1-21"><span data-dcnode-id="8746" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8743" instrument_node=""> The share of absentee voters has increased over time.</span><sup class="reference" data-dcnode-id="8740" id="cite_ref-:1_21-4"><a data-dcnode-id="8741" href="#cite_note-:1-21"><span data-dcnode-id="8742" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8739" instrument_node=""> Historically, one particularly prominent group who voted through absentee ballots were federal employees in Washington, D.C.</span><sup class="reference" data-dcnode-id="8736" id="cite_ref-:1_21-5"><a data-dcnode-id="8737" href="#cite_note-:1-21"><span data-dcnode-id="8738" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8735" instrument_node="">
</span></p><span data-dcnode-id="8733" instrument_node="">
</span><h2 data-dcnode-id="8723"><span class="mw-headline" data-dcnode-id="8731" id="Process"><span data-dcnode-id="8732" instrument_node="">Process</span></span><span class="mw-editsection" data-dcnode-id="8724"><span class="mw-editsection-bracket" data-dcnode-id="8729"><span data-dcnode-id="8730" instrument_node="">[</span></span><a data-dcnode-id="8727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D2" title="Edit section: Process"><span data-dcnode-id="8728" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8725"><span data-dcnode-id="8726" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8722" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8713"><div class="thumbinner" data-dcnode-id="8714" style="width:222px;"><a class="image" data-dcnode-id="8720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOregon_ballot_return_box.jpg"><img alt="" class="thumbimage" data-dcnode-id="8721" data-file-height="1200" data-file-width="1600" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Oregon_ballot_return_box.jpg/220px-Oregon_ballot_return_box.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Oregon_ballot_return_box.jpg/330px-Oregon_ballot_return_box.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Oregon_ballot_return_box.jpg/440px-Oregon_ballot_return_box.jpg 2x" width="220"></a><span data-dcnode-id="8719" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8715"><div class="magnify" data-dcnode-id="8717"><a class="internal" data-dcnode-id="8718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOregon_ballot_return_box.jpg" title="Enlarge"></a></div><span data-dcnode-id="8716" instrument_node="">A vote-by-mail ballot being placed in a ballot drop box</span></div></div></div><span data-dcnode-id="8712" instrument_node="">
</span><p data-dcnode-id="8702"><span data-dcnode-id="8711" instrument_node="">After the introduction of absentee voting, postal votes were for people who could not go to the polling place on election day. Now some states let them be used for convenience, but state laws still call them absentee ballots.</span><sup class="reference" data-dcnode-id="8708" id="cite_ref-ncsl-allmap_22-0"><a data-dcnode-id="8709" href="#cite_note-ncsl-allmap-22"><span data-dcnode-id="8710" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8707" instrument_node=""> Some states let voters with permanent disabilities apply for permanent absentee voter status, and some other states let all citizens apply for permanent status, so they will automatically receive an absentee ballot for each election.</span><sup class="reference" data-dcnode-id="8704" id="cite_ref-ncsl-perm_23-0"><a data-dcnode-id="8705" href="#cite_note-ncsl-perm-23"><span data-dcnode-id="8706" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8703" instrument_node=""> Otherwise a voter must apply for an absentee ballot before each election.
</span></p><p data-dcnode-id="8669"><span data-dcnode-id="8701" instrument_node="">Ballots or applications for postal ballots are sent out before the election date, by a margin that depends on state law. In some states, a voter's pamphlet is also distributed. The election office prints a unique </span><a data-dcnode-id="8699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barcode" title="Barcode"><span data-dcnode-id="8700" instrument_node="">barcode</span></a><span data-dcnode-id="8698" instrument_node=""> on the return envelope provided for each ballot, so processing of each envelope can be </span><a class="mw-redirect" data-dcnode-id="8696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballot_Tracking_in_the_United_States" title="Ballot Tracking in the United States"><span data-dcnode-id="8697" instrument_node="">tracked</span></a><span data-dcnode-id="8695" instrument_node="">, sometimes publicly,</span><sup class="reference" data-dcnode-id="8692" id="cite_ref-stimes_24-0"><a data-dcnode-id="8693" href="#cite_note-stimes-24"><span data-dcnode-id="8694" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8691" instrument_node=""> and corresponding signature files can be loaded quickly to check the voter's signature on the envelope when it returns.</span><sup class="reference" data-dcnode-id="8688" id="cite_ref-eac_25-0"><a data-dcnode-id="8689" href="#cite_note-eac-25"><span data-dcnode-id="8690" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="8685" id="cite_ref-26"><a data-dcnode-id="8686" href="#cite_note-26"><span data-dcnode-id="8687" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="8682" id="cite_ref-27"><a data-dcnode-id="8683" href="#cite_note-27"><span data-dcnode-id="8684" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="8679" id="cite_ref-28"><a data-dcnode-id="8680" href="#cite_note-28"><span data-dcnode-id="8681" instrument_node="">[28]</span></a></sup><span data-dcnode-id="8678" instrument_node="">
Voters who lose the return envelope can still vote by obtaining another envelope from election officials,</span><sup class="reference" data-dcnode-id="8675" id="cite_ref-washoe_29-0"><a data-dcnode-id="8676" href="#cite_note-washoe-29"><span data-dcnode-id="8677" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8674" instrument_node=""> or in some jurisdictions by using a plain envelope.</span><sup class="reference" data-dcnode-id="8671" id="cite_ref-sac_30-0"><a data-dcnode-id="8672" href="#cite_note-sac-30"><span data-dcnode-id="8673" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8670" instrument_node="">
</span></p><p data-dcnode-id="8667"><span data-dcnode-id="8668" instrument_node="">To vote by mail, an individual marks the ballot for their choice of the candidates (or writes in their name), places it in the provided mailing envelope, seals it and signs and dates the back of the mailing envelope. Some jurisdictions use one envelope or privacy sleeve inside an outer envelope, for privacy. The envelope containing the ballot is then either mailed, or dropped off at a local ballot collection center.
</span></p><p data-dcnode-id="8658"><span data-dcnode-id="8666" instrument_node="">The deadline is determined by state law.</span><sup class="reference" data-dcnode-id="8663" id="cite_ref-ncls-date_31-0"><a data-dcnode-id="8664" href="#cite_note-ncls-date-31"><span data-dcnode-id="8665" instrument_node="">[31]</span></a></sup><span data-dcnode-id="8662" instrument_node=""> In some jurisdictions, postmarks are not counted, and ballots must be received by a certain time on election day. In other jurisdictions, a ballot must have a postmark on or before the day of the election and be received prior to the date of certification. Many vote-by-mail jurisdictions enlist the help of volunteers to take ballots in walk-up drop off booths or drive-up quick drop locations. The </span><a data-dcnode-id="8660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help_America_Vote_Act" title="Help America Vote Act"><span data-dcnode-id="8661" instrument_node="">Help America Vote Act</span></a><span data-dcnode-id="8659" instrument_node=""> requires some polling options, often at central election headquarters, with voting machines designed for disabled people.
</span></p><p data-dcnode-id="8646"><span data-dcnode-id="8657" instrument_node="">It is sometimes inaccurately claimed that absentee ballots are not counted unless the race is close; in fact, in most jurisdictions, all valid absentee ballots are counted even if they will not affect the outcome of an election.</span><sup class="reference" data-dcnode-id="8654" id="cite_ref-32"><a data-dcnode-id="8655" href="#cite_note-32"><span data-dcnode-id="8656" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="8651" id="cite_ref-33"><a data-dcnode-id="8652" href="#cite_note-33"><span data-dcnode-id="8653" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="8648" id="cite_ref-34"><a data-dcnode-id="8649" href="#cite_note-34"><span data-dcnode-id="8650" instrument_node="">[34]</span></a></sup><span data-dcnode-id="8647" instrument_node="">
</span></p><p data-dcnode-id="8637"><span data-dcnode-id="8645" instrument_node="">In the </span><a class="mw-redirect" data-dcnode-id="8643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2016_US_Presidential_election" title="2016 US Presidential election"><span data-dcnode-id="8644" instrument_node="">2016 US Presidential election</span></a><span data-dcnode-id="8642" instrument_node="">, approximately 33 million ballots were cast by postal vote, about a quarter of all ballots cast.</span><sup class="reference" data-dcnode-id="8639" id="cite_ref-35"><a data-dcnode-id="8640" href="#cite_note-35"><span data-dcnode-id="8641" instrument_node="">[35]</span></a></sup><span data-dcnode-id="8638" instrument_node=""> Some jurisdictions used only vote-by-mail and others absentee votes.
</span></p><p data-dcnode-id="8627"><span data-dcnode-id="8636" instrument_node="">In April 2020, during lockdowns for the coronavirus pandemic, an NBC News/Wall Street Journal poll found that 58% of American voters would favor nationwide election reform to allow everyone to vote by mail, and another 9% (total 67%) favor allowing it this year because of COVID-19.</span><sup class="reference" data-dcnode-id="8633" id="cite_ref-36"><a data-dcnode-id="8634" href="#cite_note-36"><span data-dcnode-id="8635" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8632" instrument_node=""> Pew Research found at the same time that 49% of Republicans supported this measure and 87% of Democrats did.</span><sup class="reference" data-dcnode-id="8629" id="cite_ref-pew-april_37-0"><a data-dcnode-id="8630" href="#cite_note-pew-april-37"><span data-dcnode-id="8631" instrument_node="">[37]</span></a></sup><span data-dcnode-id="8628" instrument_node="">
</span></p><span data-dcnode-id="8626" instrument_node="">
</span><h2 data-dcnode-id="8615"><span data-dcnode-id="8625" id="Voting_from_abroad_.28UOCAVA.29"></span><span class="mw-headline" data-dcnode-id="8623" id="Voting_from_abroad_(UOCAVA)"><span data-dcnode-id="8624" instrument_node="">Voting from abroad (UOCAVA)</span></span><span class="mw-editsection" data-dcnode-id="8616"><span class="mw-editsection-bracket" data-dcnode-id="8621"><span data-dcnode-id="8622" instrument_node="">[</span></span><a data-dcnode-id="8619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D3" title="Edit section: Voting from abroad (UOCAVA)"><span data-dcnode-id="8620" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8617"><span data-dcnode-id="8618" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8614" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="8608" role="note"><span data-dcnode-id="8611" instrument_node="">Main article: </span><a data-dcnode-id="8609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uniformed_and_Overseas_Citizens_Absentee_Voting_Act" title="Uniformed and Overseas Citizens Absentee Voting Act"><span data-dcnode-id="8610" instrument_node="">Uniformed and Overseas Citizens Absentee Voting Act</span></a></div><span data-dcnode-id="8607" instrument_node="">
</span><p data-dcnode-id="8586"><span data-dcnode-id="8606" instrument_node="">In 2018, 350,000 ballots came through procedures of the </span><a data-dcnode-id="8604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uniformed_and_Overseas_Citizens_Absentee_Voting_Act" title="Uniformed and Overseas Citizens Absentee Voting Act"><span data-dcnode-id="8605" instrument_node="">Uniformed and Overseas Citizens Absentee Voting Act</span></a><span data-dcnode-id="8603" instrument_node=""> (UOCAVA), from military and merchant marine voters stationed inside or outside the United States, and other citizens living outside the United States.</span><sup class="reference" data-dcnode-id="8600" id="cite_ref-eac18_38-0"><a data-dcnode-id="8601" href="#cite_note-eac18-38"><span data-dcnode-id="8602" instrument_node="">[38]</span></a></sup><span data-dcnode-id="8599" instrument_node=""> In 1986 Congress enacted UOCAVA, which requires that the states and territories allow United States citizens residing outside the United States, as well as members of the United States Uniformed Services and merchant marine, and their family members, inside or outside the United States, to register at their last residence in the US, and vote absentee in elections for federal offices.</span><sup class="reference" data-dcnode-id="8596" id="cite_ref-39"><a data-dcnode-id="8597" href="#cite_note-39"><span data-dcnode-id="8598" instrument_node="">[39]</span></a></sup><span data-dcnode-id="8595" instrument_node=""> Most states and territories also let these citizens vote in state and local elections,</span><sup class="reference" data-dcnode-id="8592" id="cite_ref-doj-uocava_40-0"><a data-dcnode-id="8593" href="#cite_note-doj-uocava-40"><span data-dcnode-id="8594" instrument_node="">[40]</span></a></sup><span data-dcnode-id="8591" instrument_node=""> and most states let citizens who have never lived in the US vote at their parents' last address.</span><sup class="reference" data-dcnode-id="8588" id="cite_ref-never_41-0"><a data-dcnode-id="8589" href="#cite_note-never-41"><span data-dcnode-id="8590" instrument_node="">[41]</span></a></sup><span data-dcnode-id="8587" instrument_node="">
</span></p><p data-dcnode-id="8566"><span data-dcnode-id="8585" instrument_node="">Though many states had pre-existing statutes in place, UOCAVA made it mandatory and nationally uniform. Voters eligible for UOCAVA who do not receive an absentee ballot from their state in time to vote, may use the Federal Write-In Absentee Ballot. The voter's signature goes on an information sheet enclosed with this ballot, not on the envelope.</span><sup class="reference" data-dcnode-id="8582" id="cite_ref-fwab_42-0"><a data-dcnode-id="8583" href="#cite_note-fwab-42"><span data-dcnode-id="8584" instrument_node="">[42]</span></a></sup><span data-dcnode-id="8581" instrument_node=""> It requires following state requirements for witnesses, but not for notaries. Almost half the states require ballots to be returned by mail. Other states allow mail along with some combination of </span><a data-dcnode-id="8579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fax" title="Fax"><span data-dcnode-id="8580" instrument_node="">fax</span></a><span data-dcnode-id="8578" instrument_node="">, or </span><a data-dcnode-id="8576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Email" title="Email"><span data-dcnode-id="8577" instrument_node="">email</span></a><span data-dcnode-id="8575" instrument_node="">; four states allow a web portal.</span><sup class="reference" data-dcnode-id="8572" id="cite_ref-ncsl-uo_43-0"><a data-dcnode-id="8573" href="#cite_note-ncsl-uo-43"><span data-dcnode-id="8574" instrument_node="">[43]</span></a></sup><span data-dcnode-id="8571" instrument_node=""> West Virginia experimented with use of smart phones, but this is no longer available.</span><sup class="reference" data-dcnode-id="8568" id="cite_ref-wvsos-abs_44-0"><a data-dcnode-id="8569" href="#cite_note-wvsos-abs-44"><span data-dcnode-id="8570" instrument_node="">[44]</span></a></sup><span data-dcnode-id="8567" instrument_node="">
</span></p><span data-dcnode-id="8565" instrument_node="">
</span><h2 data-dcnode-id="8555"><span class="mw-headline" data-dcnode-id="8563" id="In_states"><span data-dcnode-id="8564" instrument_node="">In states</span></span><span class="mw-editsection" data-dcnode-id="8556"><span class="mw-editsection-bracket" data-dcnode-id="8561"><span data-dcnode-id="8562" instrument_node="">[</span></span><a data-dcnode-id="8559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D4" title="Edit section: In states"><span data-dcnode-id="8560" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8557"><span data-dcnode-id="8558" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8554" instrument_node="">
</span><link data-dcnode-id="8553" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8549" role="note"><span data-dcnode-id="8552" instrument_node="">See also: </span><a data-dcnode-id="8550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vote-by-mail_in_Oregon" title="Vote-by-mail in Oregon"><span data-dcnode-id="8551" instrument_node="">Vote-by-mail in Oregon</span></a></div><div class="thumb tright" data-dcnode-id="8540"><div class="thumbinner" data-dcnode-id="8541" style="width:127px;"><a class="image" data-dcnode-id="8547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOregon_special_election_ballot.jpg"><img alt="" class="thumbimage" data-dcnode-id="8548" data-file-height="1364" data-file-width="1024" decoding="async" height="167" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Oregon_special_election_ballot.jpg/125px-Oregon_special_election_ballot.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Oregon_special_election_ballot.jpg/188px-Oregon_special_election_ballot.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Oregon_special_election_ballot.jpg/250px-Oregon_special_election_ballot.jpg 2x" width="125"></a><span data-dcnode-id="8546" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8542"><div class="magnify" data-dcnode-id="8544"><a class="internal" data-dcnode-id="8545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOregon_special_election_ballot.jpg" title="Enlarge"></a></div><span data-dcnode-id="8543" instrument_node="">An Oregon mail-in ballot for a special election in May 2005</span></div></div></div><span data-dcnode-id="8539" instrument_node="">
</span><p data-dcnode-id="8533"><span data-dcnode-id="8538" instrument_node="">The National Conference of State Legislatures has many tables showing rules about postal voting in every state.</span><sup class="reference" data-dcnode-id="8535" id="cite_ref-ncsl-allmap_22-1"><a data-dcnode-id="8536" href="#cite_note-ncsl-allmap-22"><span data-dcnode-id="8537" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8534" instrument_node="">
</span></p><p data-dcnode-id="8490"><span data-dcnode-id="8532" instrument_node="">In 1996, astronaut </span><a class="mw-redirect" data-dcnode-id="8530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Blaha" title="John Blaha"><span data-dcnode-id="8531" instrument_node="">John Blaha</span></a><span data-dcnode-id="8529" instrument_node=""> was not able to vote in the </span><a data-dcnode-id="8527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1996_United_States_elections" title="1996 United States elections"><span data-dcnode-id="8528" instrument_node="">November 1996 election</span></a><span data-dcnode-id="8526" instrument_node="">, because his mission on </span><a data-dcnode-id="8524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mir" title="Mir"><span data-dcnode-id="8525" instrument_node="">Mir</span></a><span data-dcnode-id="8523" instrument_node=""> began before ballots were finalized, and lasted beyond Election Day.</span><sup class="reference" data-dcnode-id="8520" id="cite_ref-NYT19970826_45-0"><a data-dcnode-id="8521" href="#cite_note-NYT19970826-45"><span data-dcnode-id="8522" instrument_node="">[45]</span></a></sup><span data-dcnode-id="8519" instrument_node=""> As a result, in 1997, Texas amended its election statutes to permit voting from outer space.</span><sup class="reference" data-dcnode-id="8516" id="cite_ref-NYT19970826_45-1"><a data-dcnode-id="8517" href="#cite_note-NYT19970826-45"><span data-dcnode-id="8518" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="8513" id="cite_ref-46"><a data-dcnode-id="8514" href="#cite_note-46"><span data-dcnode-id="8515" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="8510" id="cite_ref-47"><a data-dcnode-id="8511" href="#cite_note-47"><span data-dcnode-id="8512" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8509" instrument_node=""> The process extends traditional postal voting: the ballot is postal-mailed to a designated mailbox maintained by </span><a data-dcnode-id="8507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NASA" title="NASA"><span data-dcnode-id="8508" instrument_node="">NASA</span></a><span data-dcnode-id="8506" instrument_node="">, which sends it by encrypted electronic mail to the astronaut. After the astronaut completes the ballot, it is sent to the applicable Texas county clerk, who transcribes it to a paper ballot.</span><sup class="reference" data-dcnode-id="8503" id="cite_ref-Koren_48-0"><a data-dcnode-id="8504" href="#cite_note-Koren-48"><span data-dcnode-id="8505" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8502" instrument_node=""> The clerk is the only individual other than the voter who knows the contents of the submitted ballot.</span><sup class="reference" data-dcnode-id="8499" id="cite_ref-Koren_48-1"><a data-dcnode-id="8500" href="#cite_note-Koren-48"><span data-dcnode-id="8501" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8498" instrument_node=""> The first person to vote from space was astronaut </span><a data-dcnode-id="8496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Wolf_%28astronaut%29" title="David Wolf (astronaut)"><span data-dcnode-id="8497" instrument_node="">David Wolf</span></a><span data-dcnode-id="8495" instrument_node="">, who in 1997 voted in a local Texas election under the new law.</span><sup class="reference" data-dcnode-id="8492" id="cite_ref-Koren_48-2"><a data-dcnode-id="8493" href="#cite_note-Koren-48"><span data-dcnode-id="8494" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8491" instrument_node="">
</span></p><p data-dcnode-id="8466"><span data-dcnode-id="8489" instrument_node="">In 1998, voters in </span><a data-dcnode-id="8487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oregon" title="Oregon"><span data-dcnode-id="8488" instrument_node="">Oregon</span></a><span data-dcnode-id="8486" instrument_node=""> passed an </span><a class="mw-redirect" data-dcnode-id="8484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oregon_Ballot_Measure_60_%281998%29" title="Oregon Ballot Measure 60 (1998)"><span data-dcnode-id="8485" instrument_node="">initiative</span></a><span data-dcnode-id="8483" instrument_node=""> requiring that all elections be conducted by mail. Voters may also drop their ballots off at a </span><a data-dcnode-id="8481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/County_%28United_States%29" title="County (United States)"><span data-dcnode-id="8482" instrument_node="">county</span></a><span data-dcnode-id="8480" instrument_node=""> designated official drop site. Oregon has since reduced the cost of elections, and the time available to tally votes has increased. Oregon requires receipt of votes by 8:00</span><span class="nowrap" data-dcnode-id="8478"><span data-dcnode-id="8479" instrument_node="">&nbsp;</span></span><span data-dcnode-id="8477" instrument_node="">pm local time on election day. County elections offices collect from post offices at their closing time on election day and from drop boxes at 8:00</span><span class="nowrap" data-dcnode-id="8475"><span data-dcnode-id="8476" instrument_node="">&nbsp;</span></span><span data-dcnode-id="8474" instrument_node="">pm election day. Any valid ballot received by 8:00</span><span class="nowrap" data-dcnode-id="8472"><span data-dcnode-id="8473" instrument_node="">&nbsp;</span></span><span data-dcnode-id="8471" instrument_node="">pm local time on election day by any county is required to be counted, unless the cumulative votes of any valid ballots transferred to the relevant county elections office after the closing of the polls cannot change the outcome of the election for any given seat. Voter turnout in Oregon is among the highest in the United States.</span><sup class="reference" data-dcnode-id="8468" id="cite_ref-49"><a data-dcnode-id="8469" href="#cite_note-49"><span data-dcnode-id="8470" instrument_node="">[49]</span></a></sup><span data-dcnode-id="8467" instrument_node="">
</span></p><p data-dcnode-id="8431"><span data-dcnode-id="8465" instrument_node="">In 2011, the </span><a class="mw-redirect" data-dcnode-id="8463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington_%28U.S._state%29" title="Washington (U.S. state)"><span data-dcnode-id="8464" instrument_node="">Washington</span></a><span data-dcnode-id="8462" instrument_node=""> legislature passed a law requiring all counties to conduct vote-by-mail elections.</span><sup class="reference" data-dcnode-id="8459" id="cite_ref-50"><a data-dcnode-id="8460" href="#cite_note-50"><span data-dcnode-id="8461" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8458" instrument_node=""> Local governments in Washington had the option to do so since 1987, and statewide elections had permitted it since 1993.</span><sup class="reference" data-dcnode-id="8455" id="cite_ref-51"><a data-dcnode-id="8456" href="#cite_note-51"><span data-dcnode-id="8457" instrument_node="">[51]</span></a></sup><span data-dcnode-id="8454" instrument_node=""> By 2009, 38 of the state's 39 counties (all except </span><a data-dcnode-id="8452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierce_County%2C_Washington" title="Pierce County, Washington"><span data-dcnode-id="8453" instrument_node="">Pierce County</span></a><span data-dcnode-id="8451" instrument_node="">) had conducted all elections by mail.</span><sup class="reference" data-dcnode-id="8448" id="cite_ref-STimes09_52-0"><a data-dcnode-id="8449" href="#cite_note-STimes09-52"><span data-dcnode-id="8450" instrument_node="">[52]</span></a></sup><span data-dcnode-id="8447" instrument_node=""> Pierce County joined the rest of the state in all-mail balloting by 2014.</span><sup class="reference" data-dcnode-id="8444" id="cite_ref-53"><a data-dcnode-id="8445" href="#cite_note-53"><span data-dcnode-id="8446" instrument_node="">[53]</span></a></sup><span data-dcnode-id="8443" instrument_node=""> In Washington, ballots must be </span><a data-dcnode-id="8441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Postmark" title="Postmark"><span data-dcnode-id="8442" instrument_node="">postmarked</span></a><span data-dcnode-id="8440" instrument_node=""> by election day, which helps to ensure all voters' votes are counted; ballot counting takes several days after election day to receive and process ballots.</span><sup class="reference" data-dcnode-id="8437" id="cite_ref-STimes09_52-1"><a data-dcnode-id="8438" href="#cite_note-STimes09-52"><span data-dcnode-id="8439" instrument_node="">[52]</span></a></sup><span data-dcnode-id="8436" instrument_node=""> Beginning in 2018 postage is prepaid so voters do not have to use a stamp.</span><sup class="reference" data-dcnode-id="8433" id="cite_ref-54"><a data-dcnode-id="8434" href="#cite_note-54"><span data-dcnode-id="8435" instrument_node="">[54]</span></a></sup><span data-dcnode-id="8432" instrument_node="">
</span></p><p data-dcnode-id="8414"><span data-dcnode-id="8430" instrument_node="">In 2013, </span><a data-dcnode-id="8428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colorado" title="Colorado"><span data-dcnode-id="8429" instrument_node="">Colorado</span></a><span data-dcnode-id="8427" instrument_node=""> began holding all elections by mail.</span><sup class="reference" data-dcnode-id="8424" id="cite_ref-55"><a data-dcnode-id="8425" href="#cite_note-55"><span data-dcnode-id="8426" instrument_node="">[55]</span></a></sup><span data-dcnode-id="8423" instrument_node=""> A Pantheon Analytics study of the 2014 election showed a significant uptick in voter participation from what would have normally been "low propensity" voters.</span><sup class="reference" data-dcnode-id="8420" id="cite_ref-56"><a data-dcnode-id="8421" href="#cite_note-56"><span data-dcnode-id="8422" instrument_node="">[56]</span></a></sup><span data-dcnode-id="8419" instrument_node=""> A PEW Charitable Trust study of the same election showed significant cost savings.</span><sup class="reference" data-dcnode-id="8416" id="cite_ref-pewt_Colo_2-1"><a data-dcnode-id="8417" href="#cite_note-pewt_Colo-2"><span data-dcnode-id="8418" instrument_node="">[2]</span></a></sup><span data-dcnode-id="8415" instrument_node="">
</span></p><span data-dcnode-id="8413" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8404"><div class="thumbinner" data-dcnode-id="8405" style="width:222px;"><a class="image" data-dcnode-id="8411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATotal_votes_and_by_mail.png"><img alt="" class="thumbimage" data-dcnode-id="8412" data-file-height="1468" data-file-width="596" decoding="async" height="542" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Total_votes_and_by_mail.png/220px-Total_votes_and_by_mail.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Total_votes_and_by_mail.png/330px-Total_votes_and_by_mail.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Total_votes_and_by_mail.png/440px-Total_votes_and_by_mail.png 2x" width="220"></a><span data-dcnode-id="8410" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8406"><div class="magnify" data-dcnode-id="8408"><a class="internal" data-dcnode-id="8409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATotal_votes_and_by_mail.png" title="Enlarge"></a></div><span data-dcnode-id="8407" instrument_node="">Total votes and mailed votes, by state US 2016</span></div></div></div><span data-dcnode-id="8403" instrument_node="">
</span><p data-dcnode-id="8391"><span data-dcnode-id="8402" instrument_node="">In 2014, </span><a data-dcnode-id="8400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Utah" title="Utah"><span data-dcnode-id="8401" instrument_node="">Utah</span></a><span data-dcnode-id="8399" instrument_node=""> started allowing each county to make their own decision regarding whether to go to all mailed-out ballots. In the 2016 general election, 21 of 29 counties did so. That rose to 27 of 29 counties in 2018, covering over 98% of their electorate, with all counties doing so in 2020.</span><sup class="reference" data-dcnode-id="8396" id="cite_ref-57"><a data-dcnode-id="8397" href="#cite_note-57"><span data-dcnode-id="8398" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="8393" id="cite_ref-ncsl-allmap_22-2"><a data-dcnode-id="8394" href="#cite_note-ncsl-allmap-22"><span data-dcnode-id="8395" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8392" instrument_node=""> A Pantheon Analytics study of Utah's 2016 general election showed a 5–7% point higher turnout in the counties using vote by mail than those with traditional polling places, with even higher differences (~10% points) among younger voters.
</span></p><p data-dcnode-id="8370"><span data-dcnode-id="8390" instrument_node="">In 2016, </span><a data-dcnode-id="8388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/California" title="California"><span data-dcnode-id="8389" instrument_node="">California</span></a><span data-dcnode-id="8387" instrument_node=""> passed SB 450, which authorizes a roll-out of vote by mail across the state, at county discretion.</span><sup class="reference" data-dcnode-id="8384" id="cite_ref-58"><a data-dcnode-id="8385" href="#cite_note-58"><span data-dcnode-id="8386" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8383" instrument_node=""> The state publishes postal voting rates, rising from 3% in 1962 to 72% in 2020.</span><sup class="reference" data-dcnode-id="8380" id="cite_ref-ca62_59-0"><a data-dcnode-id="8381" href="#cite_note-ca62-59"><span data-dcnode-id="8382" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8379" instrument_node=""> For the 2018 elections, 14 counties were authorized to vote by mail and five ultimately did so: Madera, Napa, Nevada, Sacramento, and San Mateo. In each of those five counties, voter turnout was higher than the average turnout for the state.</span><sup class="reference" data-dcnode-id="8376" id="cite_ref-60"><a data-dcnode-id="8377" href="#cite_note-60"><span data-dcnode-id="8378" instrument_node="">[60]</span></a></sup><span data-dcnode-id="8375" instrument_node=""> For 2020, all counties will be authorized to do so, and as of April 8, 2020 the following ten additional counties have opted in: Amador, Butte, Calaveras, El Dorado, Fresno, Los Angeles, Mariposa, Orange, Santa Clara, and Tuolumne.</span><sup class="reference" data-dcnode-id="8372" id="cite_ref-61"><a data-dcnode-id="8373" href="#cite_note-61"><span data-dcnode-id="8374" instrument_node="">[61]</span></a></sup><span data-dcnode-id="8371" instrument_node="">
</span></p><p data-dcnode-id="8347"><span data-dcnode-id="8369" instrument_node="">As of 2022, California, Colorado, Hawaii, Oregon, Nevada, Utah, and Washington State conduct their elections entirely by mail, while </span><a data-dcnode-id="8367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vermont" title="Vermont"><span data-dcnode-id="8368" instrument_node="">Vermont</span></a><span data-dcnode-id="8366" instrument_node=""> holds general elections entirely by mail. In many other states there are counties or certain small elections where everyone votes by mail.</span><sup class="reference" data-dcnode-id="8363" id="cite_ref-ncsl-allmap_22-3"><a data-dcnode-id="8364" href="#cite_note-ncsl-allmap-22"><span data-dcnode-id="8365" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="8360" id="cite_ref-ncsl-all_62-0"><a data-dcnode-id="8361" href="#cite_note-ncsl-all-62"><span data-dcnode-id="8362" instrument_node="">[62]</span></a></sup><span data-dcnode-id="8359" instrument_node="">
California will mail every voter a ballot before the November 2020 election; California voters will also keep the option to vote in-person.</span><sup class="reference" data-dcnode-id="8356" id="cite_ref-63"><a data-dcnode-id="8357" href="#cite_note-63"><span data-dcnode-id="8358" instrument_node="">[63]</span></a></sup><sup class="reference" data-dcnode-id="8353" id="cite_ref-64"><a data-dcnode-id="8354" href="#cite_note-64"><span data-dcnode-id="8355" instrument_node="">[64]</span></a></sup><span data-dcnode-id="8352" instrument_node=""> Florida allows postal voting for any reason.</span><sup class="reference" data-dcnode-id="8349" id="cite_ref-65"><a data-dcnode-id="8350" href="#cite_note-65"><span data-dcnode-id="8351" instrument_node="">[65]</span></a></sup><span data-dcnode-id="8348" instrument_node="">
</span></p><p data-dcnode-id="8334"><span data-dcnode-id="8346" instrument_node="">In 2018, Michigan passed </span><a data-dcnode-id="8344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2018_Michigan_Proposal_3" title="2018 Michigan Proposal 3"><span data-dcnode-id="8345" instrument_node="">Proposal 3</span></a><span data-dcnode-id="8343" instrument_node="">, a state constitutional amendment legalizing "no-excuse" voting by mail (meaning that the voter does not need to provide a reason for requesting a mail-in ballot) and other election reforms. In 2020 three more states joined the majority of states which already allowed "no excuse" voting by mail: Pennsylvania, Rhode Island, and Virginia.</span><sup class="reference" data-dcnode-id="8340" id="cite_ref-ncsl-allmap_22-4"><a data-dcnode-id="8341" href="#cite_note-ncsl-allmap-22"><span data-dcnode-id="8342" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8339" instrument_node=""> Other states have relaxed restrictions on mail in ballots for a total of 46 states to allow voting by mail due to COVID-19.</span><sup class="reference" data-dcnode-id="8336" id="cite_ref-66"><a data-dcnode-id="8337" href="#cite_note-66"><span data-dcnode-id="8338" instrument_node="">[66]</span></a></sup><span data-dcnode-id="8335" instrument_node="">
</span></p><p data-dcnode-id="8299"><a data-dcnode-id="8332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kansas" title="Kansas"><span data-dcnode-id="8333" instrument_node="">Kansas</span></a><span data-dcnode-id="8331" instrument_node=""> conducted its </span><a data-dcnode-id="8329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_United_States_presidential_election_in_Kansas" title="2020 United States presidential election in Kansas"><span data-dcnode-id="8330" instrument_node="">Democratic primary in May 2020</span></a><span data-dcnode-id="8328" instrument_node=""> entirely by mail.</span><sup class="reference" data-dcnode-id="8325" id="cite_ref-67"><a data-dcnode-id="8326" href="#cite_note-67"><span data-dcnode-id="8327" instrument_node="">[67]</span></a></sup><span data-dcnode-id="8324" instrument_node=""> </span><a data-dcnode-id="8322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hawaii" title="Hawaii"><span data-dcnode-id="8323" instrument_node="">Hawaii</span></a><span data-dcnode-id="8321" instrument_node=""> used full vote by mail for all elections beginning with its </span><a data-dcnode-id="8319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_United_States_presidential_election_in_Hawaii" title="2020 United States presidential election in Hawaii"><span data-dcnode-id="8320" instrument_node="">primary in May 2020</span></a><span data-dcnode-id="8318" instrument_node="">.</span><sup class="reference" data-dcnode-id="8315" id="cite_ref-68"><a data-dcnode-id="8316" href="#cite_note-68"><span data-dcnode-id="8317" instrument_node="">[68]</span></a></sup><span data-dcnode-id="8314" instrument_node="">
</span><a data-dcnode-id="8312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Jersey" title="New Jersey"><span data-dcnode-id="8313" instrument_node="">New Jersey</span></a><span data-dcnode-id="8311" instrument_node=""> also conducted a primarily vote by mail election for the </span><a class="mw-redirect" data-dcnode-id="8309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_New_Jersey_Democratic_primary" title="2020 New Jersey Democratic primary"><span data-dcnode-id="8310" instrument_node="">primary in July 2020</span></a><span data-dcnode-id="8308" instrument_node=""> albeit a limited number of polling stations will be open for those who would vote provisionally as well as voters with disabilities.</span><sup class="reference" data-dcnode-id="8305" id="cite_ref-69"><a data-dcnode-id="8306" href="#cite_note-69"><span data-dcnode-id="8307" instrument_node="">[69]</span></a></sup><span data-dcnode-id="8304" instrument_node=""> The Trump campaign sued Pennsylvania to require voters to mail their ballot in a secrecy envelope or else to personally deliver it to an official county election office.</span><sup class="reference" data-dcnode-id="8301" id="cite_ref-70"><a data-dcnode-id="8302" href="#cite_note-70"><span data-dcnode-id="8303" instrument_node="">[70]</span></a></sup><span data-dcnode-id="8300" instrument_node="">
</span></p><p data-dcnode-id="8277"><span data-dcnode-id="8298" instrument_node="">Other jurisdictions are now starting to experiment with vote by mail, or run pilot programs. 31 of 53 counties in North Dakota now vote by mail,</span><sup class="reference" data-dcnode-id="8295" id="cite_ref-71"><a data-dcnode-id="8296" href="#cite_note-71"><span data-dcnode-id="8297" instrument_node="">[71]</span></a></sup><span data-dcnode-id="8294" instrument_node=""> as do over 1000 precincts in Minnesota (those with fewer than 400 registered voters). In 2018, pilot programs in Anchorage, Alaska exceeded previous turnout records</span><sup class="reference" data-dcnode-id="8291" id="cite_ref-72"><a data-dcnode-id="8292" href="#cite_note-72"><span data-dcnode-id="8293" instrument_node="">[72]</span></a></sup><span data-dcnode-id="8290" instrument_node=""> and Garden County, Nebraska saw higher turnout versus the state average.</span><sup class="reference" data-dcnode-id="8287" id="cite_ref-73"><a data-dcnode-id="8288" href="#cite_note-73"><span data-dcnode-id="8289" instrument_node="">[73]</span></a></sup><span data-dcnode-id="8286" instrument_node=""> Rockville, Maryland piloted vote-by-mail in 2019.</span><sup class="reference" data-dcnode-id="8283" id="cite_ref-74"><a data-dcnode-id="8284" href="#cite_note-74"><span data-dcnode-id="8285" instrument_node="">[74]</span></a></sup><span data-dcnode-id="8282" instrument_node=""> In 2018, Connecticut's Governor issued Executive Order 64, directing a study of a possible move to vote by mail.</span><sup class="reference" data-dcnode-id="8279" id="cite_ref-75"><a data-dcnode-id="8280" href="#cite_note-75"><span data-dcnode-id="8281" instrument_node="">[75]</span></a></sup><span data-dcnode-id="8278" instrument_node="">
</span></p><p data-dcnode-id="8253"><span data-dcnode-id="8276" instrument_node="">Nevada Governor </span><a data-dcnode-id="8274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steve_Sisolak" title="Steve Sisolak"><span data-dcnode-id="8275" instrument_node="">Steve Sisolak</span></a><span data-dcnode-id="8273" instrument_node=""> (D) signed legislation authorizing mail-in-voting for every registered voter in the state on August 3, 2020.</span><sup class="reference" data-dcnode-id="8270" id="cite_ref-76"><a data-dcnode-id="8271" href="#cite_note-76"><span data-dcnode-id="8272" instrument_node="">[76]</span></a></sup><span data-dcnode-id="8269" instrument_node=""> Donald Trump threatened to sue.</span><sup class="reference" data-dcnode-id="8266" id="cite_ref-77"><a data-dcnode-id="8267" href="#cite_note-77"><span data-dcnode-id="8268" instrument_node="">[77]</span></a></sup><span data-dcnode-id="8265" instrument_node=""> Trump endorsed mail-in-voting in Republican-controlled Florida.</span><sup class="reference" data-dcnode-id="8262" id="cite_ref-78"><a data-dcnode-id="8263" href="#cite_note-78"><span data-dcnode-id="8264" instrument_node="">[78]</span></a></sup><sup class="reference" data-dcnode-id="8259" id="cite_ref-79"><a data-dcnode-id="8260" href="#cite_note-79"><span data-dcnode-id="8261" instrument_node="">[79]</span></a></sup><span data-dcnode-id="8258" instrument_node=""> That law was only temporary, applying only to the 2020 election. On June 2, 2021, Governor Sisolak signed a law making all vote-by-mail permanent, although voters can opt out of getting ballots by mail.</span><sup class="reference" data-dcnode-id="8255" id="cite_ref-80"><a data-dcnode-id="8256" href="#cite_note-80"><span data-dcnode-id="8257" instrument_node="">[80]</span></a></sup><span data-dcnode-id="8254" instrument_node="">
</span></p><p data-dcnode-id="8240"><span data-dcnode-id="8252" instrument_node="">On May 18, 2021, the Vermont legislature passed a bill requiring general elections to be all vote-by-mail.</span><sup class="reference" data-dcnode-id="8249" id="cite_ref-81"><a data-dcnode-id="8250" href="#cite_note-81"><span data-dcnode-id="8251" instrument_node="">[81]</span></a></sup><span data-dcnode-id="8248" instrument_node=""> Vermont Governor </span><a data-dcnode-id="8246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phil_Scott" title="Phil Scott"><span data-dcnode-id="8247" instrument_node="">Phil Scott</span></a><span data-dcnode-id="8245" instrument_node=""> signed that bill on June 7, 2021 and asked the legislature to expand all vote-by-mail to primary elections too.</span><sup class="reference" data-dcnode-id="8242" id="cite_ref-82"><a data-dcnode-id="8243" href="#cite_note-82"><span data-dcnode-id="8244" instrument_node="">[82]</span></a></sup><span data-dcnode-id="8241" instrument_node="">
</span></p><p data-dcnode-id="8231"><span data-dcnode-id="8239" instrument_node="">On May 31, 2021, the Illinois legislature passed a bill that expanded curbside voting and establishes a permanent vote-by-mail system, and it creates a permanent voter list. It was signed by Illinois Governor </span><a class="mw-redirect" data-dcnode-id="8237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/JB_Pritzker" title="JB Pritzker"><span data-dcnode-id="8238" instrument_node="">JB Pritzker</span></a><span data-dcnode-id="8236" instrument_node=""> on June 18, 2021.</span><sup class="reference" data-dcnode-id="8233" id="cite_ref-83"><a data-dcnode-id="8234" href="#cite_note-83"><span data-dcnode-id="8235" instrument_node="">[83]</span></a></sup><span data-dcnode-id="8232" instrument_node="">
</span></p><span data-dcnode-id="8230" instrument_node="">
</span><h3 data-dcnode-id="8220"><span class="mw-headline" data-dcnode-id="8228" id="Timeline_of_adoption_of_no-excuse_postal_voting"><span data-dcnode-id="8229" instrument_node="">Timeline of adoption of no-excuse postal voting</span></span><span class="mw-editsection" data-dcnode-id="8221"><span class="mw-editsection-bracket" data-dcnode-id="8226"><span data-dcnode-id="8227" instrument_node="">[</span></span><a data-dcnode-id="8224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D5" title="Edit section: Timeline of adoption of no-excuse postal voting"><span data-dcnode-id="8225" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8222"><span data-dcnode-id="8223" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8219" instrument_node="">

</span><h2 data-dcnode-id="7409"><span class="mw-headline" data-dcnode-id="7417" id="Turnout"><span data-dcnode-id="7418" instrument_node="">Turnout</span></span><span class="mw-editsection" data-dcnode-id="7410"><span class="mw-editsection-bracket" data-dcnode-id="7415"><span data-dcnode-id="7416" instrument_node="">[</span></span><a data-dcnode-id="7413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D6" title="Edit section: Turnout"><span data-dcnode-id="7414" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7411"><span data-dcnode-id="7412" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7408" instrument_node="">
</span><link data-dcnode-id="7407" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7403" role="note"><span data-dcnode-id="7406" instrument_node="">Further information: </span><a data-dcnode-id="7404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_turnout%23United_States" title="Voter turnout"><span data-dcnode-id="7405" instrument_node="">Voter turnout §&nbsp;United States</span></a></div><span data-dcnode-id="7402" instrument_node="">
</span><p data-dcnode-id="7393"><span data-dcnode-id="7401" instrument_node="">Insofar as postal voting makes the act of voting easier, it may facilitate a campaign's </span><a data-dcnode-id="7399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Get_out_the_vote" title="Get out the vote"><span data-dcnode-id="7400" instrument_node="">get out the vote</span></a><span data-dcnode-id="7398" instrument_node=""> efforts. Campaigns can also target potential voters more efficiently by skipping those whose ballots have already been processed by the elections office. On the other hand, face-to-face canvassing has been found to be less effective with postal voting.</span><sup class="reference" data-dcnode-id="7395" id="cite_ref-85"><a data-dcnode-id="7396" href="#cite_note-85"><span data-dcnode-id="7397" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7394" instrument_node="">
</span></p><p data-dcnode-id="7387"><span data-dcnode-id="7392" instrument_node="">In 2016, the US Government Accountability Office (GAO) issued a report outlining turnout improvements seen in vote by mail elections.</span><sup class="reference" data-dcnode-id="7389" id="cite_ref-86"><a data-dcnode-id="7390" href="#cite_note-86"><span data-dcnode-id="7391" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7388" instrument_node="">
</span></p><p data-dcnode-id="7381"><span data-dcnode-id="7386" instrument_node="">Researchers in 2020 have found that in elections with all-mail voting, overall turnout increases. This increase is particularly pronounced among groups that typically have low turnout rates, such as young people and people of color. For instance, in Colorado they found overall turnout rose 9 percentage points, while it rose 16 percentage points among young people, 13 among African-Americans, 11 among Asian-Americans, 10 among Latinos, blue-collar workers, those without a high school diploma, and those with less than $10,000 of wealth.</span><sup class="reference" data-dcnode-id="7383" id="cite_ref-NYT_2020-05-04_5-1"><a data-dcnode-id="7384" href="#cite_note-NYT_2020-05-04-5"><span data-dcnode-id="7385" instrument_node="">[5]</span></a></sup><span data-dcnode-id="7382" instrument_node="">
</span></p><span data-dcnode-id="7380" instrument_node="">
</span><h2 data-dcnode-id="7370"><span class="mw-headline" data-dcnode-id="7378" id="Reliability_of_postal_ballots"><span data-dcnode-id="7379" instrument_node="">Reliability of postal ballots</span></span><span class="mw-editsection" data-dcnode-id="7371"><span class="mw-editsection-bracket" data-dcnode-id="7376"><span data-dcnode-id="7377" instrument_node="">[</span></span><a data-dcnode-id="7374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D7" title="Edit section: Reliability of postal ballots"><span data-dcnode-id="7375" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7372"><span data-dcnode-id="7373" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7369" instrument_node="">
</span><h3 data-dcnode-id="7359"><span class="mw-headline" data-dcnode-id="7367" id="Rejection_statistics"><span data-dcnode-id="7368" instrument_node="">Rejection statistics</span></span><span class="mw-editsection" data-dcnode-id="7360"><span class="mw-editsection-bracket" data-dcnode-id="7365"><span data-dcnode-id="7366" instrument_node="">[</span></span><a data-dcnode-id="7363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D8" title="Edit section: Rejection statistics"><span data-dcnode-id="7364" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7361"><span data-dcnode-id="7362" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7358" instrument_node="">
</span><p data-dcnode-id="7352"><span data-dcnode-id="7357" instrument_node="">In 2016, a presidential election year, a total of 318,728 ballots (1% of those submitted) were rejected. For the states that reported a reason, some of the reasons were:</span><sup class="reference" data-dcnode-id="7354" id="cite_ref-eac16_12-1"><a data-dcnode-id="7355" href="#cite_note-eac16-12"><span data-dcnode-id="7356" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7353" instrument_node="">
</span></p><span data-dcnode-id="7351" instrument_node="">
</span><ul data-dcnode-id="7330"><li data-dcnode-id="7349"><span data-dcnode-id="7350" instrument_node="">27.5% Non-matching signature</span></li><span data-dcnode-id="7348" instrument_node="">
</span><li data-dcnode-id="7346"><span data-dcnode-id="7347" instrument_node="">23.1% Ballot missed deadline</span></li><span data-dcnode-id="7345" instrument_node="">
</span><li data-dcnode-id="7343"><span data-dcnode-id="7344" instrument_node="">20.0% No signature</span></li><span data-dcnode-id="7342" instrument_node="">
</span><li data-dcnode-id="7340"><span data-dcnode-id="7341" instrument_node="">3.0% No witness signature</span></li><span data-dcnode-id="7339" instrument_node="">
</span><li data-dcnode-id="7337"><span data-dcnode-id="7338" instrument_node="">1.5% Voter deceased</span></li><span data-dcnode-id="7336" instrument_node="">
</span><li data-dcnode-id="7334"><span data-dcnode-id="7335" instrument_node="">1.3% Voted in person</span></li><span data-dcnode-id="7333" instrument_node="">
</span><li data-dcnode-id="7331"><span data-dcnode-id="7332" instrument_node="">1.1% First-time voter without proper identification</span></li></ul><span data-dcnode-id="7329" instrument_node="">
</span><p data-dcnode-id="7323"><span data-dcnode-id="7328" instrument_node="">By August 2020, after the next presidential primary season but before the general election, more than 550,000 had already been rejected.</span><sup class="reference" data-dcnode-id="7325" id="cite_ref-87"><a data-dcnode-id="7326" href="#cite_note-87"><span data-dcnode-id="7327" instrument_node="">[87]</span></a></sup><span data-dcnode-id="7324" instrument_node="">
</span></p><span data-dcnode-id="7322" instrument_node="">
</span><h3 data-dcnode-id="7312"><span class="mw-headline" data-dcnode-id="7320" id="Past_problems"><span data-dcnode-id="7321" instrument_node="">Past problems</span></span><span class="mw-editsection" data-dcnode-id="7313"><span class="mw-editsection-bracket" data-dcnode-id="7318"><span data-dcnode-id="7319" instrument_node="">[</span></span><a data-dcnode-id="7316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D9" title="Edit section: Past problems"><span data-dcnode-id="7317" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7314"><span data-dcnode-id="7315" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7311" instrument_node="">
</span><p data-dcnode-id="7291"><span data-dcnode-id="7310" instrument_node="">Postal ballots have been the source of "most significant vote-counting disputes in recent decades" according to Edward Foley, director of the Election Law program at Ohio State University.</span><sup class="reference" data-dcnode-id="7307" id="cite_ref-politico-mail_88-0"><a data-dcnode-id="7308" href="#cite_note-politico-mail-88"><span data-dcnode-id="7309" instrument_node="">[88]</span></a></sup><span data-dcnode-id="7306" instrument_node="">
Among the thousands of elections from 2000 to 2012, there were 491 known cases of absentee ballot fraud,</span><sup class="reference" data-dcnode-id="7303" id="cite_ref-news21_89-0"><a data-dcnode-id="7304" href="#cite_note-news21-89"><span data-dcnode-id="7305" instrument_node="">[89]</span></a></sup><sup class="reference" data-dcnode-id="7300" id="cite_ref-inq_90-0"><a data-dcnode-id="7301" href="#cite_note-inq-90"><span data-dcnode-id="7302" instrument_node="">[90]</span></a></sup><sup class="reference" data-dcnode-id="7297" id="cite_ref-nprav_8-1"><a data-dcnode-id="7298" href="#cite_note-nprav-8"><span data-dcnode-id="7299" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7296" instrument_node="">
and the Heritage Foundation lists additional cases since 2012.</span><sup class="reference" data-dcnode-id="7293" id="cite_ref-heritage_91-0"><a data-dcnode-id="7294" href="#cite_note-heritage-91"><span data-dcnode-id="7295" instrument_node="">[91]</span></a></sup><span data-dcnode-id="7292" instrument_node="">
</span></p><p data-dcnode-id="7262"><span data-dcnode-id="7290" instrument_node="">Richard Hasen, a professor at UC Irvine School of Law said "problems are extremely rare in the five states that rely primarily on vote-by-mail."</span><sup class="reference" data-dcnode-id="7287" id="cite_ref-factcheck_92-0"><a data-dcnode-id="7288" href="#cite_note-factcheck-92"><span data-dcnode-id="7289" instrument_node="">[92]</span></a></sup><span data-dcnode-id="7286" instrument_node="">
Justin Levitt, a law professor at Loyola Marymount University does not have statistics on postal ballot fraud, but said "I do collect anecdotal reports</span><span class="nowrap" data-dcnode-id="7284"><span data-dcnode-id="7285" instrument_node="">&nbsp;</span></span><span data-dcnode-id="7283" instrument_node="">... misconduct in the mail voting process is meaningfully more prevalent than misconduct in the process of voting in person</span><span class="nowrap" data-dcnode-id="7281"><span data-dcnode-id="7282" instrument_node="">&nbsp;</span></span><span data-dcnode-id="7280" instrument_node="">... Misconduct still amounts to only a tiny fraction of the ballots cast by mail."</span><sup class="reference" data-dcnode-id="7277" id="cite_ref-factcheck_92-1"><a data-dcnode-id="7278" href="#cite_note-factcheck-92"><span data-dcnode-id="7279" instrument_node="">[92]</span></a></sup><span data-dcnode-id="7276" instrument_node="">
</span><a data-dcnode-id="7274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lonna_Atkeson" title="Lonna Atkeson"><span data-dcnode-id="7275" instrument_node="">Lonna Atkeson</span></a><span data-dcnode-id="7273" instrument_node="">, an expert in election administration, said about mail-in voting fraud, "It's really hard to find</span><span class="nowrap" data-dcnode-id="7271"><span data-dcnode-id="7272" instrument_node="">&nbsp;</span></span><span data-dcnode-id="7270" instrument_node="">... The fact is, we really don't know how much fraud there is</span><span class="nowrap" data-dcnode-id="7268"><span data-dcnode-id="7269" instrument_node="">&nbsp;</span></span><span data-dcnode-id="7267" instrument_node="">... There aren't millions of fraudulent votes, but there are some."</span><sup class="reference" data-dcnode-id="7264" id="cite_ref-factcheck_92-2"><a data-dcnode-id="7265" href="#cite_note-factcheck-92"><span data-dcnode-id="7266" instrument_node="">[92]</span></a></sup><span data-dcnode-id="7263" instrument_node="">
