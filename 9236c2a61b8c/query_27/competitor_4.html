</span></p><p data-dcnode-id="6350"><span data-dcnode-id="6396" instrument_node="">While members of Congress pushed to expand absentee voting and the CDC and other public health experts advised postal voting as a form of voting which minimizes in-person contact, President Donald Trump claimed that expansion of absentee voting would lead to "levels of voting that, if you ever agreed to it, you'd never have a Republican elected in this country again."</span><sup class="reference" data-dcnode-id="6393" id="cite_ref-180"><a data-dcnode-id="6394" href="#cite_note-180"><span data-dcnode-id="6395" instrument_node="">[180]</span></a></sup><span data-dcnode-id="6392" instrument_node=""> In May 2020, Trump began to claim that postal voting was highly vulnerable to fraud.</span><sup class="reference" data-dcnode-id="6389" id="cite_ref-fox-trump_181-0"><a data-dcnode-id="6390" href="#cite_note-fox-trump-181"><span data-dcnode-id="6391" instrument_node="">[181]</span></a></sup><span data-dcnode-id="6388" instrument_node=""> Fact checkers say there is no evidence of substantial fraud associated with mail voting.</span><sup class="reference" data-dcnode-id="6385" id="cite_ref-factcheck_92-3"><a data-dcnode-id="6386" href="#cite_note-factcheck-92"><span data-dcnode-id="6387" instrument_node="">[92]</span></a></sup><sup class="reference" data-dcnode-id="6382" id="cite_ref-182"><a data-dcnode-id="6383" href="#cite_note-182"><span data-dcnode-id="6384" instrument_node="">[182]</span></a></sup><span data-dcnode-id="6381" instrument_node=""> In July 2020, Trump suggested postponing the </span><a data-dcnode-id="6379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_United_States_presidential_election" title="2020 United States presidential election"><span data-dcnode-id="6380" instrument_node="">2020 presidential election</span></a><span data-dcnode-id="6378" instrument_node=""> based on his unsubstantiated claims about extensive postal voting fraud.</span><sup class="reference" data-dcnode-id="6375" id="cite_ref-183"><a data-dcnode-id="6376" href="#cite_note-183"><span data-dcnode-id="6377" instrument_node="">[183]</span></a></sup><sup class="reference" data-dcnode-id="6372" id="cite_ref-184"><a data-dcnode-id="6373" href="#cite_note-184"><span data-dcnode-id="6374" instrument_node="">[184]</span></a></sup><sup class="reference" data-dcnode-id="6369" id="cite_ref-185"><a data-dcnode-id="6370" href="#cite_note-185"><span data-dcnode-id="6371" instrument_node="">[185]</span></a></sup><sup class="reference" data-dcnode-id="6366" id="cite_ref-186"><a data-dcnode-id="6367" href="#cite_note-186"><span data-dcnode-id="6368" instrument_node="">[186]</span></a></sup><span data-dcnode-id="6365" instrument_node=""> The new, Trump-appointed administration of the </span><a data-dcnode-id="6363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Postal_Service" title="United States Postal Service"><span data-dcnode-id="6364" instrument_node="">United States Postal Service</span></a><span data-dcnode-id="6362" instrument_node=""> made changes which resulted in </span><a data-dcnode-id="6360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_United_States_Postal_Service_crisis" title="2020 United States Postal Service crisis"><span data-dcnode-id="6361" instrument_node="">slower delivery of mail</span></a><span data-dcnode-id="6359" instrument_node="">. Donald Trump openly stated that he opposes funding USPS because of mail-in voting.</span><sup class="reference" data-dcnode-id="6356" id="cite_ref-187"><a data-dcnode-id="6357" href="#cite_note-187"><span data-dcnode-id="6358" instrument_node="">[187]</span></a></sup><span data-dcnode-id="6355" instrument_node=""> In September 2020, a federal judge issued an injunction against the recent USPS actions, ruling that Trump and DeJoy were "involved in a politically motivated attack on the efficiency of the Postal Service", adding that the 14 states requesting the injunction "demonstrated that this attack on the Postal Service is likely to irreparably harm the states' ability to administer the 2020 general election".</span><sup class="reference" data-dcnode-id="6352" id="cite_ref-188"><a data-dcnode-id="6353" href="#cite_note-188"><span data-dcnode-id="6354" instrument_node="">[188]</span></a></sup><span data-dcnode-id="6351" instrument_node="">
</span></p><p data-dcnode-id="6340"><span data-dcnode-id="6349" instrument_node="">The USPS warned that it could not guarantee that all ballots cast by mail in the 2020 election would arrive in time to be counted.</span><sup class="reference" data-dcnode-id="6346" id="cite_ref-189"><a data-dcnode-id="6347" href="#cite_note-189"><span data-dcnode-id="6348" instrument_node="">[189]</span></a></sup><span data-dcnode-id="6345" instrument_node=""> For this reason, election experts advocated that postal ballots be mailed weeks in advance of election day.</span><sup class="reference" data-dcnode-id="6342" id="cite_ref-:0_190-0"><a data-dcnode-id="6343" href="#cite_note-:0-190"><span data-dcnode-id="6344" instrument_node="">[190]</span></a></sup><span data-dcnode-id="6341" instrument_node="">
</span></p><p data-dcnode-id="6325"><span data-dcnode-id="6339" instrument_node="">In several court cases, Republicans in national and state legislatures have </span><a class="mw-redirect" data-dcnode-id="6337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republican_efforts_to_make_voting_laws_more_restrictive_following_the_2020_presidential_election" title="Republican efforts to make voting laws more restrictive following the 2020 presidential election"><span data-dcnode-id="6338" instrument_node="">pushed to restrict access or place more stringent limitations upon postal voting</span></a><span data-dcnode-id="6336" instrument_node=""> while Democrats have pushed to expand it or lift restrictions.</span><sup class="reference" data-dcnode-id="6333" id="cite_ref-191"><a data-dcnode-id="6334" href="#cite_note-191"><span data-dcnode-id="6335" instrument_node="">[191]</span></a></sup><sup class="reference" data-dcnode-id="6330" id="cite_ref-192"><a data-dcnode-id="6331" href="#cite_note-192"><span data-dcnode-id="6332" instrument_node="">[192]</span></a></sup><sup class="reference" data-dcnode-id="6327" id="cite_ref-193"><a data-dcnode-id="6328" href="#cite_note-193"><span data-dcnode-id="6329" instrument_node="">[193]</span></a></sup><span data-dcnode-id="6326" instrument_node="">
</span></p><span data-dcnode-id="6324" instrument_node="">
