</span></p><p data-dcnode-id="7250"><span data-dcnode-id="7261" instrument_node="">In 2018, a report from the US Senate Intelligence Committee of Russian meddling in the 2016 election pointed out that auditable paper ballots, by definition part of all vote by mail elections, were potentially safer than </span><a data-dcnode-id="7259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vote_counting%23Direct-recording_electronic_counting" title="Vote counting"><span data-dcnode-id="7260" instrument_node="">paperless voting systems</span></a><span data-dcnode-id="7258" instrument_node="">,</span><sup class="reference" data-dcnode-id="7255" id="cite_ref-93"><a data-dcnode-id="7256" href="#cite_note-93"><span data-dcnode-id="7257" instrument_node="">[93]</span></a></sup><span data-dcnode-id="7254" instrument_node="">
which are still used in a few states. However, only about half the states actually use paper ballots to conduct </span><a data-dcnode-id="7252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Election_audit%23Current_practices_in_election_results_auditing_in_the_United_States" title="Election audit"><span data-dcnode-id="7253" instrument_node="">election audits</span></a><span data-dcnode-id="7251" instrument_node="">.
</span></p><p data-dcnode-id="7248"><span data-dcnode-id="7249" instrument_node="">Specific types of problems include:
</span></p><span data-dcnode-id="7247" instrument_node="">
</span><ul data-dcnode-id="7087"><li data-dcnode-id="7242"><span data-dcnode-id="7246" instrument_node="">Voter's request for postal ballot is lost or not received or processed in time, in states that require one, thus the voter must vote in person or not vote (for example over 9,000 properly requested ballots were not sent in Wisconsin in 2020)</span><sup class="reference" data-dcnode-id="7243" id="cite_ref-nyt-wi_13-1"><a data-dcnode-id="7244" href="#cite_note-nyt-wi-13"><span data-dcnode-id="7245" instrument_node="">[13]</span></a></sup></li><span data-dcnode-id="7241" instrument_node="">
</span><li data-dcnode-id="7230"><span data-dcnode-id="7240" instrument_node="">Voter's request for postal ballot is altered or forged</span><sup class="reference" data-dcnode-id="7237" id="cite_ref-sun-phil_94-0"><a data-dcnode-id="7238" href="#cite_note-sun-phil-94"><span data-dcnode-id="7239" instrument_node="">[94]</span></a></sup><sup class="reference" data-dcnode-id="7234" id="cite_ref-wv-usps_95-0"><a data-dcnode-id="7235" href="#cite_note-wv-usps-95"><span data-dcnode-id="7236" instrument_node="">[95]</span></a></sup><sup class="reference" data-dcnode-id="7231" id="cite_ref-96"><a data-dcnode-id="7232" href="#cite_note-96"><span data-dcnode-id="7233" instrument_node="">[96]</span></a></sup></li><span data-dcnode-id="7229" instrument_node="">
</span><li data-dcnode-id="7224"><span data-dcnode-id="7228" instrument_node="">In states that mail ballots to registered voters without request, some voters have died or moved, and any ballots not returned by the post office can get into the wrong hands</span><sup class="reference" data-dcnode-id="7225" id="cite_ref-slt_97-0"><a data-dcnode-id="7226" href="#cite_note-slt-97"><span data-dcnode-id="7227" instrument_node="">[97]</span></a></sup></li><span data-dcnode-id="7223" instrument_node="">
</span><li data-dcnode-id="7210"><span data-dcnode-id="7222" instrument_node="">Election office sends voters the wrong instructions</span><sup class="reference" data-dcnode-id="7219" id="cite_ref-phil-instruc_98-0"><a data-dcnode-id="7220" href="#cite_note-phil-instruc-98"><span data-dcnode-id="7221" instrument_node="">[98]</span></a></sup><span data-dcnode-id="7218" instrument_node=""> or a ballot with someone else's name on it,</span><sup class="reference" data-dcnode-id="7215" id="cite_ref-delval_99-0"><a data-dcnode-id="7216" href="#cite_note-delval-99"><span data-dcnode-id="7217" instrument_node="">[99]</span></a></sup><span data-dcnode-id="7214" instrument_node=""> or wrong ballot, when offices on the ballot differ by party or district.</span><sup class="reference" data-dcnode-id="7211" id="cite_ref-phil-bal_100-0"><a data-dcnode-id="7212" href="#cite_note-phil-bal-100"><span data-dcnode-id="7213" instrument_node="">[100]</span></a></sup></li><span data-dcnode-id="7209" instrument_node="">
</span><li data-dcnode-id="7201"><span data-dcnode-id="7208" instrument_node="">Voter does not receive mailed ballot, because it does not arrive at the address in time, or someone else takes it</span><sup class="reference" data-dcnode-id="7205" id="cite_ref-nyt-wi_13-2"><a data-dcnode-id="7206" href="#cite_note-nyt-wi-13"><span data-dcnode-id="7207" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="7202" id="cite_ref-missing_ballots_101-0"><a data-dcnode-id="7203" href="#cite_note-missing_ballots-101"><span data-dcnode-id="7204" instrument_node="">[101]</span></a></sup></li><span data-dcnode-id="7200" instrument_node="">
</span><li data-dcnode-id="7192"><span data-dcnode-id="7199" instrument_node="">Voter misplaces ballot, so must vote with provisional ballot, and someone else may find and vote the original postal ballot, leading to rejection of the provisional ballot.</span><sup class="reference" data-dcnode-id="7196" id="cite_ref-ncsp-prov_102-0"><a data-dcnode-id="7197" href="#cite_note-ncsp-prov-102"><span data-dcnode-id="7198" instrument_node="">[102]</span></a></sup><sup class="reference" data-dcnode-id="7193" id="cite_ref-missing_ballots_101-1"><a data-dcnode-id="7194" href="#cite_note-missing_ballots-101"><span data-dcnode-id="7195" instrument_node="">[101]</span></a></sup></li><span data-dcnode-id="7191" instrument_node="">
</span><li data-dcnode-id="7183"><span data-dcnode-id="7190" instrument_node="">Voter is pressured to vote a certain way by family, caregiver, or other, or provide the blank ballot to someone</span><sup class="reference" data-dcnode-id="7187" id="cite_ref-wsj-snf_103-0"><a data-dcnode-id="7188" href="#cite_note-wsj-snf-103"><span data-dcnode-id="7189" instrument_node="">[103]</span></a></sup><sup class="reference" data-dcnode-id="7184" id="cite_ref-phil-snf_104-0"><a data-dcnode-id="7185" href="#cite_note-phil-snf-104"><span data-dcnode-id="7186" instrument_node="">[104]</span></a></sup></li><span data-dcnode-id="7182" instrument_node="">
</span><li data-dcnode-id="7177"><span data-dcnode-id="7181" instrument_node="">Voters may be paid to vote a certain way</span><sup class="reference" data-dcnode-id="7178" id="cite_ref-105"><a data-dcnode-id="7179" href="#cite_note-105"><span data-dcnode-id="7180" instrument_node="">[105]</span></a></sup></li><span data-dcnode-id="7176" instrument_node="">
</span><li data-dcnode-id="7167"><span data-dcnode-id="7175" instrument_node="">Someone collects many ballots</span><sup class="reference" data-dcnode-id="7172" id="cite_ref-pat20_106-0"><a data-dcnode-id="7173" href="#cite_note-pat20-106"><span data-dcnode-id="7174" instrument_node="">[106]</span></a></sup><span data-dcnode-id="7171" instrument_node=""> and does not deliver the ones from neighborhoods likely to vote against the collector's candidates</span><sup class="reference" data-dcnode-id="7168" id="cite_ref-orange_107-0"><a data-dcnode-id="7169" href="#cite_note-orange-107"><span data-dcnode-id="7170" instrument_node="">[107]</span></a></sup></li><span data-dcnode-id="7166" instrument_node="">
</span><li data-dcnode-id="7161"><span data-dcnode-id="7165" instrument_node="">Someone collects many ballots, opens envelopes, and marks votes; if voter has already voted, fraudster can mark extra votes on same contests, to invalidate ballot</span><sup class="reference" data-dcnode-id="7162" id="cite_ref-nc-nbc_108-0"><a data-dcnode-id="7163" href="#cite_note-nc-nbc-108"><span data-dcnode-id="7164" instrument_node="">[108]</span></a></sup></li><span data-dcnode-id="7160" instrument_node="">
</span><li data-dcnode-id="7152"><span data-dcnode-id="7159" instrument_node="">Mail can be stolen from postal service</span><sup class="reference" data-dcnode-id="7156" id="cite_ref-philkeys_109-0"><a data-dcnode-id="7157" href="#cite_note-philkeys-109"><span data-dcnode-id="7158" instrument_node="">[109]</span></a></sup><sup class="reference" data-dcnode-id="7153" id="cite_ref-torrance_110-0"><a data-dcnode-id="7154" href="#cite_note-torrance-110"><span data-dcnode-id="7155" instrument_node="">[110]</span></a></sup></li><span data-dcnode-id="7151" instrument_node="">
</span><li data-dcnode-id="7143"><span data-dcnode-id="7150" instrument_node="">Envelope printer prints erroneous tracking code on return envelope, so it may be processed inaccurately or rejected.</span><sup class="reference" data-dcnode-id="7147" id="cite_ref-vcstar_111-0"><a data-dcnode-id="7148" href="#cite_note-vcstar-111"><span data-dcnode-id="7149" instrument_node="">[111]</span></a></sup><sup class="reference" data-dcnode-id="7144" id="cite_ref-vcr_112-0"><a data-dcnode-id="7145" href="#cite_note-vcr-112"><span data-dcnode-id="7146" instrument_node="">[112]</span></a></sup></li><span data-dcnode-id="7142" instrument_node="">
</span><li data-dcnode-id="7134"><span data-dcnode-id="7141" instrument_node="">Voter's signature on envelope is missing (55,000 in 2018) or does not match signature on file (67,000), so either there is widespread fraud being prevented by signature reviews, or if these submissions were not fraudulent, then valid ballots are being rejected</span><sup class="reference" data-dcnode-id="7138" id="cite_ref-eac18_38-1"><a data-dcnode-id="7139" href="#cite_note-eac18-38"><span data-dcnode-id="7140" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="7135" id="cite_ref-stan_10-1"><a data-dcnode-id="7136" href="#cite_note-stan-10"><span data-dcnode-id="7137" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="7133" instrument_node="">
</span><li data-dcnode-id="7128"><span data-dcnode-id="7132" instrument_node="">Forged signature on envelope is accepted as close enough to signature on file, so invalid ballots are accepted</span><sup class="reference" data-dcnode-id="7129" id="cite_ref-stan_10-2"><a data-dcnode-id="7130" href="#cite_note-stan-10"><span data-dcnode-id="7131" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="7127" instrument_node="">
</span><li data-dcnode-id="7119"><span data-dcnode-id="7126" instrument_node="">Signature rejection rates vary by race, county and state, ranging from none to 20% rejected</span><sup class="reference" data-dcnode-id="7123" id="cite_ref-eac16_12-2"><a data-dcnode-id="7124" href="#cite_note-eac16-12"><span data-dcnode-id="7125" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="7120" id="cite_ref-aclu_11-1"><a data-dcnode-id="7121" href="#cite_note-aclu-11"><span data-dcnode-id="7122" instrument_node="">[11]</span></a></sup></li><span data-dcnode-id="7118" instrument_node="">
</span><li data-dcnode-id="7103"><span data-dcnode-id="7117" instrument_node="">Election office receives the ballot late (114,000 ballots in 2018);</span><sup class="reference" data-dcnode-id="7114" id="cite_ref-eac18_38-2"><a data-dcnode-id="7115" href="#cite_note-eac18-38"><span data-dcnode-id="7116" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="7111" id="cite_ref-va_113-0"><a data-dcnode-id="7112" href="#cite_note-va-113"><span data-dcnode-id="7113" instrument_node="">[113]</span></a></sup><sup class="reference" data-dcnode-id="7108" id="cite_ref-114"><a data-dcnode-id="7109" href="#cite_note-114"><span data-dcnode-id="7110" instrument_node="">[114]</span></a></sup><span data-dcnode-id="7107" instrument_node=""> in a Philadelphia experiment, most ballots were misplaced by the postal service, and even after they were found, 21% took more than 4 days to arrive and 3% took more than a week</span><sup class="reference" data-dcnode-id="7104" id="cite_ref-cbs20_115-0"><a data-dcnode-id="7105" href="#cite_note-cbs20-115"><span data-dcnode-id="7106" instrument_node="">[115]</span></a></sup></li><span data-dcnode-id="7102" instrument_node="">
</span><li data-dcnode-id="7094"><span data-dcnode-id="7101" instrument_node="">Staff who open envelopes falsify or ignore ballots</span><sup class="reference" data-dcnode-id="7098" id="cite_ref-miami_116-0"><a data-dcnode-id="7099" href="#cite_note-miami-116"><span data-dcnode-id="7100" instrument_node="">[116]</span></a></sup><sup class="reference" data-dcnode-id="7095" id="cite_ref-hawkins_117-0"><a data-dcnode-id="7096" href="#cite_note-hawkins-117"><span data-dcnode-id="7097" instrument_node="">[117]</span></a></sup></li><span data-dcnode-id="7093" instrument_node="">
</span><li data-dcnode-id="7088"><span data-dcnode-id="7092" instrument_node="">Compilation of votes omits postal ballots</span><sup class="reference" data-dcnode-id="7089" id="cite_ref-jeff_118-0"><a data-dcnode-id="7090" href="#cite_note-jeff-118"><span data-dcnode-id="7091" instrument_node="">[118]</span></a></sup></li></ul><span data-dcnode-id="7086" instrument_node="">
</span><p data-dcnode-id="7066"><span data-dcnode-id="7085" instrument_node="">These problems with postal ballots can be categorized as (A) procedural issues, which may not have solutions; (B) collection of ballots by dishonest collectors, which is partly controlled in many states by limits on the number of ballots that one person can deliver, though collectors can still mail in the ballots they collect,</span><sup class="reference" data-dcnode-id="7082" id="cite_ref-ncsl-col_119-0"><a data-dcnode-id="7083" href="#cite_note-ncsl-col-119"><span data-dcnode-id="7084" instrument_node="">[119]</span></a></sup><sup class="reference" data-dcnode-id="7079" id="cite_ref-orange_107-1"><a data-dcnode-id="7080" href="#cite_note-orange-107"><span data-dcnode-id="7081" instrument_node="">[107]</span></a></sup><span data-dcnode-id="7078" instrument_node="">
and the 9th Circuit Court of Appeals disallowed Arizona's limits based on discriminatory intent;</span><sup class="reference" data-dcnode-id="7075" id="cite_ref-cir9_120-0"><a data-dcnode-id="7076" href="#cite_note-cir9-120"><span data-dcnode-id="7077" instrument_node="">[120]</span></a></sup><span data-dcnode-id="7074" instrument_node="">
(C) signature verification, which has inherent errors and may have bias,</span><sup class="reference" data-dcnode-id="7071" id="cite_ref-aclu_11-2"><a data-dcnode-id="7072" href="#cite_note-aclu-11"><span data-dcnode-id="7073" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="7068" id="cite_ref-stan_10-3"><a data-dcnode-id="7069" href="#cite_note-stan-10"><span data-dcnode-id="7070" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7067" instrument_node=""> and (D) insider issues, which are partly addressed by enough staffing, quality control, and openness to observation by the public or candidates.
</span></p><p data-dcnode-id="7064"><span data-dcnode-id="7065" instrument_node="">Some problems have inherently limited scope, such as family pressure and bribes, while others can affect several percent of the vote, such as signature verification.
</span></p><span data-dcnode-id="7063" instrument_node="">
</span><h3 data-dcnode-id="7053"><span class="mw-headline" data-dcnode-id="7061" id="Security_printing"><span data-dcnode-id="7062" instrument_node="">Security printing</span></span><span class="mw-editsection" data-dcnode-id="7054"><span class="mw-editsection-bracket" data-dcnode-id="7059"><span data-dcnode-id="7060" instrument_node="">[</span></span><a data-dcnode-id="7057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D10" title="Edit section: Security printing"><span data-dcnode-id="7058" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7055"><span data-dcnode-id="7056" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7052" instrument_node="">
</span><link data-dcnode-id="7051" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7047" role="note"><span data-dcnode-id="7050" instrument_node="">Further information: </span><a data-dcnode-id="7048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Security_printing" title="Security printing"><span data-dcnode-id="7049" instrument_node="">Security printing</span></a></div><span data-dcnode-id="7046" instrument_node="">
</span><p data-dcnode-id="7006"><span data-dcnode-id="7045" instrument_node="">Some states say they print postal ballots on special paper to prevent forgeries.</span><sup class="reference" data-dcnode-id="7042" id="cite_ref-pbs520_121-0"><a data-dcnode-id="7043" href="#cite_note-pbs520-121"><span data-dcnode-id="7044" instrument_node="">[121]</span></a></sup><sup class="reference" data-dcnode-id="7039" id="cite_ref-farley_122-0"><a data-dcnode-id="7040" href="#cite_note-farley-122"><span data-dcnode-id="7041" instrument_node="">[122]</span></a></sup><span data-dcnode-id="7038" instrument_node=""> 
California assigns a tinted watermark to the ballots for each election,</span><sup class="reference" data-dcnode-id="7035" id="cite_ref-ca-water_123-0"><a data-dcnode-id="7036" href="#cite_note-ca-water-123"><span data-dcnode-id="7037" instrument_node="">[123]</span></a></sup><span data-dcnode-id="7034" instrument_node=""> which is created by printing an image with a </span><a data-dcnode-id="7032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Halftone%23Halftone_photographic_screening" title="Halftone"><span data-dcnode-id="7033" instrument_node="">screen</span></a><span data-dcnode-id="7031" instrument_node=""> rather than </span><a data-dcnode-id="7029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Watermark" title="Watermark"><span data-dcnode-id="7030" instrument_node="">density variations</span></a><span data-dcnode-id="7028" instrument_node="">.</span><sup class="reference" data-dcnode-id="7025" id="cite_ref-red-poppy_124-0"><a data-dcnode-id="7026" href="#cite_note-red-poppy-124"><span data-dcnode-id="7027" instrument_node="">[124]</span></a></sup><span data-dcnode-id="7024" instrument_node="">
Special papers, </span><a data-dcnode-id="7022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microprinting" title="Microprinting"><span data-dcnode-id="7023" instrument_node="">microprinting</span></a><span data-dcnode-id="7021" instrument_node="">, magnetic ink and other measures are common to protect </span><a data-dcnode-id="7019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banknote%23History_of_counterfeiting_and_security_measures" title="Banknote"><span data-dcnode-id="7020" instrument_node="">currency</span></a><span data-dcnode-id="7018" instrument_node="">, bank checks and stamps. Election officials do not say that envelopes have these features, nor that they review ballots based on these methods,</span><sup class="reference" data-dcnode-id="7015" id="cite_ref-eac18_38-3"><a data-dcnode-id="7016" href="#cite_note-eac18-38"><span data-dcnode-id="7017" instrument_node="">[38]</span></a></sup><sup class="reference" data-dcnode-id="7012" id="cite_ref-eac16_12-3"><a data-dcnode-id="7013" href="#cite_note-eac16-12"><span data-dcnode-id="7014" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7011" instrument_node=""> though the Labor Department reviews paper when considering if union election ballots are forged.</span><sup class="reference" data-dcnode-id="7008" id="cite_ref-dol12_125-0"><a data-dcnode-id="7009" href="#cite_note-dol12-125"><span data-dcnode-id="7010" instrument_node="">[125]</span></a></sup><span data-dcnode-id="7007" instrument_node="">
</span></p><p data-dcnode-id="6992"><span data-dcnode-id="7005" instrument_node="">The largest US vendor of election scanners required use of its own paper as of 2015,</span><sup class="reference" data-dcnode-id="7002" id="cite_ref-countright2015_126-0"><a data-dcnode-id="7003" href="#cite_note-countright2015-126"><span data-dcnode-id="7004" instrument_node="">[126]</span></a></sup><span data-dcnode-id="7001" instrument_node=""> and "highly recommended" it as of 2019.</span><sup class="reference" data-dcnode-id="6998" id="cite_ref-countright2019_127-0"><a data-dcnode-id="6999" href="#cite_note-countright2019-127"><span data-dcnode-id="7000" instrument_node="">[127]</span></a></sup><span data-dcnode-id="6997" instrument_node=""> The paper has specified weight, thickness, reflectivity for compatibility with scanners, but the scanner does not measure these to detect forgeries. The company says colored paper may not be used. Colors may be printed in areas away from the voting marks, but they are scanned as either black or white, no gray.</span><sup class="reference" data-dcnode-id="6994" id="cite_ref-countright2019_127-1"><a data-dcnode-id="6995" href="#cite_note-countright2019-127"><span data-dcnode-id="6996" instrument_node="">[127]</span></a></sup><span data-dcnode-id="6993" instrument_node="">
</span></p><p data-dcnode-id="6978"><span data-dcnode-id="6991" instrument_node="">States print bar codes on return envelopes to identify the voter (coding a serial number for each envelope mailed),</span><sup class="reference" data-dcnode-id="6988" id="cite_ref-128"><a data-dcnode-id="6989" href="#cite_note-128"><span data-dcnode-id="6990" instrument_node="">[128]</span></a></sup><span data-dcnode-id="6987" instrument_node=""> so a forger would need to access the coding system in order to forge bar codes.</span><sup class="reference" data-dcnode-id="6984" id="cite_ref-farley_122-1"><a data-dcnode-id="6985" href="#cite_note-farley-122"><span data-dcnode-id="6986" instrument_node="">[122]</span></a></sup><span data-dcnode-id="6983" instrument_node=""> California lets voters write votes "in a letter or note" on any paper, and enclose as many such notes in a vote by mail envelope as will fit, with a signature for each on the outside. Only one bar code on the envelope is needed.</span><sup class="reference" data-dcnode-id="6980" id="cite_ref-note_129-0"><a data-dcnode-id="6981" href="#cite_note-note-129"><span data-dcnode-id="6982" instrument_node="">[129]</span></a></sup><span data-dcnode-id="6979" instrument_node="">
</span></p><p data-dcnode-id="6956"><span data-dcnode-id="6977" instrument_node="">Ballot printing is centralized. For example, California has nine authorized ballot printers.</span><sup class="reference" data-dcnode-id="6974" id="cite_ref-bpca_130-0"><a data-dcnode-id="6975" href="#cite_note-bpca-130"><span data-dcnode-id="6976" instrument_node="">[130]</span></a></sup><span data-dcnode-id="6973" instrument_node="">
Maryland uses one ballot printer state-wide.</span><sup class="reference" data-dcnode-id="6970" id="cite_ref-opilo_131-0"><a data-dcnode-id="6971" href="#cite_note-opilo-131"><span data-dcnode-id="6972" instrument_node="">[131]</span></a></sup><span data-dcnode-id="6969" instrument_node="">
One company, Runbeck, printed 36 million ballots for 214 counties in 11 states for the November 2020 election, of which about half were postal ballots.</span><sup class="reference" data-dcnode-id="6966" id="cite_ref-wollan_132-0"><a data-dcnode-id="6967" href="#cite_note-wollan-132"><span data-dcnode-id="6968" instrument_node="">[132]</span></a></sup><span data-dcnode-id="6965" instrument_node="">
Runbeck did not use watermarks or tracking marks in the paper, at least in Maricopa County which has over 60% of Arizona's voters.</span><sup class="reference" data-dcnode-id="6962" id="cite_ref-fif_133-0"><a data-dcnode-id="6963" href="#cite_note-fif-133"><span data-dcnode-id="6964" instrument_node="">[133]</span></a></sup><span data-dcnode-id="6961" instrument_node="">
Another company serves many counties in Ohio and Pennsylvania.</span><sup class="reference" data-dcnode-id="6958" id="cite_ref-epstein_134-0"><a data-dcnode-id="6959" href="#cite_note-epstein-134"><span data-dcnode-id="6960" instrument_node="">[134]</span></a></sup><span data-dcnode-id="6957" instrument_node="">
</span></p><span data-dcnode-id="6955" instrument_node="">
</span><h3 data-dcnode-id="6945"><span class="mw-headline" data-dcnode-id="6953" id="Signature_verification_process"><span data-dcnode-id="6954" instrument_node="">Signature verification process</span></span><span class="mw-editsection" data-dcnode-id="6946"><span class="mw-editsection-bracket" data-dcnode-id="6951"><span data-dcnode-id="6952" instrument_node="">[</span></span><a data-dcnode-id="6949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D11" title="Edit section: Signature verification process"><span data-dcnode-id="6950" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6947"><span data-dcnode-id="6948" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6944" instrument_node="">
</span><link data-dcnode-id="6943" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6939" role="note"><span data-dcnode-id="6942" instrument_node="">Further information: </span><a data-dcnode-id="6940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Signature%23Detection_of_forged_signatures" title="Signature"><span data-dcnode-id="6941" instrument_node="">Signature §&nbsp;Detection of forged signatures</span></a></div><span data-dcnode-id="6938" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6927"><div class="thumbinner" data-dcnode-id="6928" style="width:222px;"><span class="mw-tmh-player video" data-dcnode-id="6934"><video class="thumbimage" data-dcnode-id="6937" data-durationhint="13" data-mwprovider="wikimediacommons" data-mwtitle="2018_Vote_by_mail_envelopes_being_sorted_in_Santa_Clara_County.webm" disabled="disabled" height="124" id="mwe_player_0_placeholder" poster="//upload.wikimedia.org/wikipedia/commons/thumb/c/cf/2018_Vote_by_mail_envelopes_being_sorted_in_Santa_Clara_County.webm/220px--2018_Vote_by_mail_envelopes_being_sorted_in_Santa_Clara_County.webm.jpg" preload="none" tabindex="-1" width="220"></video><a class="mw-tmh-play" data-dcnode-id="6935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2018_Vote_by_mail_envelopes_being_sorted_in_Santa_Clara_County.webm" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="6936"></span></a></span><span data-dcnode-id="6933" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6929"><div class="magnify" data-dcnode-id="6931"><a class="internal" data-dcnode-id="6932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2018_Vote_by_mail_envelopes_being_sorted_in_Santa_Clara_County.webm" title="Enlarge"></a></div><span data-dcnode-id="6930" instrument_node="">Sorting vote by mail envelopes, San Jose, Santa Clara County, California, 2018</span></div></div></div><span data-dcnode-id="6926" instrument_node="">
</span><p data-dcnode-id="6905"><span data-dcnode-id="6925" instrument_node="">Most States check signatures to attempt to prevent forged paper ballots. Signature mismatches were the most common reason for rejecting postal ballots in 2016</span><sup class="reference" data-dcnode-id="6922" id="cite_ref-eac16_12-4"><a data-dcnode-id="6923" href="#cite_note-eac16-12"><span data-dcnode-id="6924" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6921" instrument_node=""> and the second most common, after late arrival, in 2018.</span><sup class="reference" data-dcnode-id="6918" id="cite_ref-eac18_38-4"><a data-dcnode-id="6919" href="#cite_note-eac18-38"><span data-dcnode-id="6920" instrument_node="">[38]</span></a></sup><span data-dcnode-id="6917" instrument_node=""> While many states accept in-person votes without needing identification, most require some verification on postal ballots. Eighteen states simply require a signature on the ballot envelope, without verifying the signature,</span><sup class="reference" data-dcnode-id="6914" id="cite_ref-buchanan_135-0"><a data-dcnode-id="6915" href="#cite_note-buchanan-135"><span data-dcnode-id="6916" instrument_node="">[135]</span></a></sup><span data-dcnode-id="6913" instrument_node=""> The other 32 states verify if the signature matches one on file, and some of these states require witnesses or notaries.</span><sup class="reference" data-dcnode-id="6910" id="cite_ref-ncsl-wit_136-0"><a data-dcnode-id="6911" href="#cite_note-ncsl-wit-136"><span data-dcnode-id="6912" instrument_node="">[136]</span></a></sup><sup class="reference" data-dcnode-id="6907" id="cite_ref-PolitiFact_Ballot_137-0"><a data-dcnode-id="6908" href="#cite_note-PolitiFact_Ballot-137"><span data-dcnode-id="6909" instrument_node="">[137]</span></a></sup><span data-dcnode-id="6906" instrument_node="">
</span></p><p data-dcnode-id="6899"><span data-dcnode-id="6904" instrument_node="">The first step after receiving mailed ballots is to compare the voter's signature on the outside of the envelope with one or more signatures on file in the election office. Smaller jurisdictions have temporary staff compare signatures. Larger jurisdictions use computers to scan envelopes, quickly decide if the signature matches well enough, and set aside non-matches in a separate bin. Temporary staff then double-check the rejections, and in some places check the accepted envelopes too.</span><sup class="reference" data-dcnode-id="6901" id="cite_ref-stan_10-4"><a data-dcnode-id="6902" href="#cite_note-stan-10"><span data-dcnode-id="6903" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6900" instrument_node="">
</span></p><p data-dcnode-id="6893"><span data-dcnode-id="6898" instrument_node="">
Error rates of computerized signature reviews are not published. The best academic researchers have 10-14% error rates.</span><sup class="reference" data-dcnode-id="6895" id="cite_ref-hafe-lr_138-0"><a data-dcnode-id="6896" href="#cite_note-hafe-lr-138"><span data-dcnode-id="6897" instrument_node="">[138]</span></a></sup><span data-dcnode-id="6894" instrument_node=""> Algorithms:</span></p><blockquote data-dcnode-id="6878"><p data-dcnode-id="6879"><span data-dcnode-id="6892" instrument_node="">look for a certain number of points of similarity between the compared signatures</span><span class="nowrap" data-dcnode-id="6890"><span data-dcnode-id="6891" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6889" instrument_node="">... a wide range of algorithms and standards, each particular to that machine's manufacturer, are used to verify signatures. In addition, counties have discretion in managing the settings and implementing manufacturers' guidelines</span><span class="nowrap" data-dcnode-id="6887"><span data-dcnode-id="6888" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6886" instrument_node="">... there are no statewide standards for automatic signature verification</span><span class="nowrap" data-dcnode-id="6884"><span data-dcnode-id="6885" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6883" instrument_node="">... most counties do not have a publicly available, written explanation of the signature verification criteria and processes they use.</span><sup class="reference" data-dcnode-id="6880" id="cite_ref-stan_10-5"><a data-dcnode-id="6881" href="#cite_note-stan-10"><span data-dcnode-id="6882" instrument_node="">[10]</span></a></sup></p></blockquote><span data-dcnode-id="6877" instrument_node="">
</span><p data-dcnode-id="6834"><span data-dcnode-id="6876" instrument_node="">Handwriting experts say "it is extremely difficult for anyone to be able to figure out if a signature or other very limited writing sample has been forged,"</span><sup class="reference" data-dcnode-id="6873" id="cite_ref-prop_139-0"><a data-dcnode-id="6874" href="#cite_note-prop-139"><span data-dcnode-id="6875" instrument_node="">[139]</span></a></sup><span data-dcnode-id="6872" instrument_node=""> In manual signature reviews, "election officials with little or no training in verifying a person's signature are tasked with doing just that</span><span class="nowrap" data-dcnode-id="6870"><span data-dcnode-id="6871" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6869" instrument_node="">... it's unlikely that only one or two samples will show the spectrum of a person's normal variations</span><span class="nowrap" data-dcnode-id="6867"><span data-dcnode-id="6868" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6866" instrument_node="">..."</span><sup class="reference" data-dcnode-id="6863" id="cite_ref-prop_139-1"><a data-dcnode-id="6864" href="#cite_note-prop-139"><span data-dcnode-id="6865" instrument_node="">[139]</span></a></sup><span data-dcnode-id="6862" instrument_node="">
Colorado's guide for manual verification is recommended by the federal government.</span><sup class="reference" data-dcnode-id="6859" id="cite_ref-eac-ver_140-0"><a data-dcnode-id="6860" href="#cite_note-eac-ver-140"><span data-dcnode-id="6861" instrument_node="">[140]</span></a></sup><span data-dcnode-id="6858" instrument_node=""> Colorado accepts any signature that matches with respect to cursive v. printed, flowing v. slow and deliberate, overall spacing, size, proportions, slanted v. straight, spelling and punctuation. When signatures do not match on these items, staff still accept them if staff can think of a reasonable explanation for differences.</span><sup class="reference" data-dcnode-id="6855" id="cite_ref-co-guide_141-0"><a data-dcnode-id="6856" href="#cite_note-co-guide-141"><span data-dcnode-id="6857" instrument_node="">[141]</span></a></sup><span data-dcnode-id="6854" instrument_node="">
In a California study, most counties, when they manually reviewed ballot signatures, had "a basic presumption in favor of counting each ballot."</span><sup class="reference" data-dcnode-id="6851" id="cite_ref-stan_10-6"><a data-dcnode-id="6852" href="#cite_note-stan-10"><span data-dcnode-id="6853" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6850" instrument_node=""> California extended this standard in 2020 regulations, "begin with the basic presumption that the signature on the petition or ballot envelope is the voter's signature</span><span class="nowrap" data-dcnode-id="6848"><span data-dcnode-id="6849" instrument_node="">&nbsp;</span></span><span data-dcnode-id="6847" instrument_node="">... only be rejected if two different elections officials unanimously find beyond a reasonable doubt that the signature differs in multiple, significant, and obvious respects from all signatures in the voter's registration record."</span><sup class="reference" data-dcnode-id="6844" id="cite_ref-reject_142-0"><a data-dcnode-id="6845" href="#cite_note-reject-142"><span data-dcnode-id="6846" instrument_node="">[142]</span></a></sup><span data-dcnode-id="6843" instrument_node="">
Texas officials must use their "best judgment" without training.</span><sup class="reference" data-dcnode-id="6840" id="cite_ref-gdn20_143-0"><a data-dcnode-id="6841" href="#cite_note-gdn20-143"><span data-dcnode-id="6842" instrument_node="">[143]</span></a></sup><span data-dcnode-id="6839" instrument_node="">
Published examples show very different signatures coming from the same person.</span><sup class="reference" data-dcnode-id="6836" id="cite_ref-gdn20_143-1"><a data-dcnode-id="6837" href="#cite_note-gdn20-143"><span data-dcnode-id="6838" instrument_node="">[143]</span></a></sup><span data-dcnode-id="6835" instrument_node="">
</span></p><p data-dcnode-id="6824"><span data-dcnode-id="6833" instrument_node="">In 16 states, when election offices reject signatures, they notify the voters so they can mail another signature, which may be just as hard to check, or they can come to the office and vouch for the envelope, usually in less than a week; the other 36 states have no process to cure discrepancies.</span><sup class="reference" data-dcnode-id="6830" id="cite_ref-ncsl-ver_144-0"><a data-dcnode-id="6831" href="#cite_note-ncsl-ver-144"><span data-dcnode-id="6832" instrument_node="">[144]</span></a></sup><span data-dcnode-id="6829" instrument_node="">
Notification by US mail results in more cures than email or telephone notice.</span><sup class="reference" data-dcnode-id="6826" id="cite_ref-stan_10-7"><a data-dcnode-id="6827" href="#cite_note-stan-10"><span data-dcnode-id="6828" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6825" instrument_node="">
</span></p><p data-dcnode-id="6818"><span data-dcnode-id="6823" instrument_node="">Rejected envelopes, with ballots still unseen in them, are stored in case of future challenges. Accepted envelopes are opened and separated from the envelopes in a way that no one sees the external name and the ballot choices. The Election Advisory Commission says machines can help, but this step requires the most space of any step, especially when workers have to be 6 feet apart.</span><sup class="reference" data-dcnode-id="6820" id="cite_ref-eac-in_145-0"><a data-dcnode-id="6821" href="#cite_note-eac-in-145"><span data-dcnode-id="6822" instrument_node="">[145]</span></a></sup><span data-dcnode-id="6819" instrument_node="">
</span></p><span data-dcnode-id="6817" instrument_node="">
</span><h3 data-dcnode-id="6807"><span class="mw-headline" data-dcnode-id="6815" id="Unequal_signature_rejection_rates"><span data-dcnode-id="6816" instrument_node="">Unequal signature rejection rates</span></span><span class="mw-editsection" data-dcnode-id="6808"><span class="mw-editsection-bracket" data-dcnode-id="6813"><span data-dcnode-id="6814" instrument_node="">[</span></span><a data-dcnode-id="6811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D12" title="Edit section: Unequal signature rejection rates"><span data-dcnode-id="6812" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6809"><span data-dcnode-id="6810" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6806" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6797"><div class="thumbinner" data-dcnode-id="6798" style="width:222px;"><a class="image" data-dcnode-id="6804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APostal_ballots_rejection_rates.png"><img alt="" class="thumbimage" data-dcnode-id="6805" data-file-height="1523" data-file-width="592" decoding="async" height="566" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Postal_ballots_rejection_rates.png/220px-Postal_ballots_rejection_rates.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Postal_ballots_rejection_rates.png/330px-Postal_ballots_rejection_rates.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Postal_ballots_rejection_rates.png/440px-Postal_ballots_rejection_rates.png 2x" width="220"></a><span data-dcnode-id="6803" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6799"><div class="magnify" data-dcnode-id="6801"><a class="internal" data-dcnode-id="6802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APostal_ballots_rejection_rates.png" title="Enlarge"></a></div><span data-dcnode-id="6800" instrument_node="">Postal ballots, rejection rates by state, US, November 2016, except Georgia 2018</span></div></div></div><span data-dcnode-id="6796" instrument_node="">
</span><p data-dcnode-id="6766"><span data-dcnode-id="6795" instrument_node="">The highest error rates in signature verification are found with lay people, higher than for computers, which in turn make more errors than experts.</span><sup class="reference" data-dcnode-id="6792" id="cite_ref-comp-methods_146-0"><a data-dcnode-id="6793" href="#cite_note-comp-methods-146"><span data-dcnode-id="6794" instrument_node="">[146]</span></a></sup><span data-dcnode-id="6791" instrument_node="">
Researchers have published error rates for computerized signature verification. They compare different systems on a common database of true and false signatures. The best system falsely rejects 10% of true signatures, while it accepts 10% of forgeries. Another system has error rates on both of 14%, and the third-best has error rates of 17%.</span><sup class="reference" data-dcnode-id="6788" id="cite_ref-hafe-lr_138-1"><a data-dcnode-id="6789" href="#cite_note-hafe-lr-138"><span data-dcnode-id="6790" instrument_node="">[138]</span></a></sup><sup class="reference" data-dcnode-id="6785" id="cite_ref-bibi_147-0"><a data-dcnode-id="6786" href="#cite_note-bibi-147"><span data-dcnode-id="6787" instrument_node="">[147]</span></a></sup><span data-dcnode-id="6784" instrument_node="">
It is possible to be less stringent and reject fewer true signatures, at the cost of also rejecting fewer forgeries, which means erroneously accepting more forgeries.</span><sup class="reference" data-dcnode-id="6781" id="cite_ref-igarza_148-0"><a data-dcnode-id="6782" href="#cite_note-igarza-148"><span data-dcnode-id="6783" instrument_node="">[148]</span></a></sup><span data-dcnode-id="6780" instrument_node="">
Vendors of automated signature verification claim accuracy, and do not publish their error rates.</span><sup class="reference" data-dcnode-id="6777" id="cite_ref-parascript_149-0"><a data-dcnode-id="6778" href="#cite_note-parascript-149"><span data-dcnode-id="6779" instrument_node="">[149]</span></a></sup><sup class="reference" data-dcnode-id="6774" id="cite_ref-agilis_150-0"><a data-dcnode-id="6775" href="#cite_note-agilis-150"><span data-dcnode-id="6776" instrument_node="">[150]</span></a></sup><sup class="reference" data-dcnode-id="6771" id="cite_ref-fluence_151-0"><a data-dcnode-id="6772" href="#cite_note-fluence-151"><span data-dcnode-id="6773" instrument_node="">[151]</span></a></sup><sup class="reference" data-dcnode-id="6768" id="cite_ref-bluecrest_152-0"><a data-dcnode-id="6769" href="#cite_note-bluecrest-152"><span data-dcnode-id="6770" instrument_node="">[152]</span></a></sup><span data-dcnode-id="6767" instrument_node="">
</span></p><p data-dcnode-id="6760"><span data-dcnode-id="6765" instrument_node="">Voters with short names are at a disadvantage, since even experts make more mistakes on signatures with fewer "turning points and intersections."</span><sup class="reference" data-dcnode-id="6762" id="cite_ref-sita_153-0"><a data-dcnode-id="6763" href="#cite_note-sita-153"><span data-dcnode-id="6764" instrument_node="">[153]</span></a></sup><span data-dcnode-id="6761" instrument_node="">
</span></p><p data-dcnode-id="6754"><span data-dcnode-id="6759" instrument_node="">The National Vote at Home Institute reports that 17 states do not mandate a signature verification process.</span><sup class="reference" data-dcnode-id="6756" id="cite_ref-nvahi-50_154-0"><a data-dcnode-id="6757" href="#cite_note-nvahi-50-154"><span data-dcnode-id="6758" instrument_node="">[154]</span></a></sup><span data-dcnode-id="6755" instrument_node="">
</span></p><p data-dcnode-id="6731"><span data-dcnode-id="6753" instrument_node="">In the November 2016 general election, rejections ranged from none in Alabama and Puerto Rico, to 6% of ballots returned in Arkansas, Georgia, Kentucky and New York.</span><sup class="reference" data-dcnode-id="6750" id="cite_ref-eac16_12-5"><a data-dcnode-id="6751" href="#cite_note-eac16-12"><span data-dcnode-id="6752" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="6747" id="cite_ref-type_155-0"><a data-dcnode-id="6748" href="#cite_note-type-155"><span data-dcnode-id="6749" instrument_node="">[155]</span></a></sup><span data-dcnode-id="6746" instrument_node="">
In 2020 special elections in New Jersey, 10% of postal ballots were rejected, much higher than the 3% rejections in the 2018 general election in New Jersey. The rise was largely attributed to inexperience of many voters using postal ballots for the first time, though some elections have resulted in charges regarding voter fraud. One such race was the Paterson municipal election, where 19% of ballots cast were disqualified. Approximately 800 of the more than 3190 votes disqualified were related to the various voter fraud allegations.</span><sup class="reference" data-dcnode-id="6743" id="cite_ref-nj20_156-0"><a data-dcnode-id="6744" href="#cite_note-nj20-156"><span data-dcnode-id="6745" instrument_node="">[156]</span></a></sup><sup class="reference" data-dcnode-id="6740" id="cite_ref-157"><a data-dcnode-id="6741" href="#cite_note-157"><span data-dcnode-id="6742" instrument_node="">[157]</span></a></sup><sup class="reference" data-dcnode-id="6737" id="cite_ref-158"><a data-dcnode-id="6738" href="#cite_note-158"><span data-dcnode-id="6739" instrument_node="">[158]</span></a></sup><span data-dcnode-id="6736" instrument_node="">
Where reasons for rejection were known, in 2018, 114,000 ballots arrived late, 67,000 failed signature verification, 55,000 lacked voter signatures, and 11,000 lacked witness signatures in states that require them.</span><sup class="reference" data-dcnode-id="6733" id="cite_ref-eac18_38-5"><a data-dcnode-id="6734" href="#cite_note-eac18-38"><span data-dcnode-id="6735" instrument_node="">[38]</span></a></sup><span data-dcnode-id="6732" instrument_node="">
</span></p><p data-dcnode-id="6695"><span data-dcnode-id="6730" instrument_node="">Rejection rates are higher for ballots that claim to come from young or minority voters. In the 2020 primary</span><sup class="reference" data-dcnode-id="6727" id="cite_ref-fl20_159-0"><a data-dcnode-id="6728" href="#cite_note-fl20-159"><span data-dcnode-id="6729" instrument_node="">[159]</span></a></sup><span data-dcnode-id="6726" instrument_node=""> and 2016 general</span><sup class="reference" data-dcnode-id="6723" id="cite_ref-aclu_11-3"><a data-dcnode-id="6724" href="#cite_note-aclu-11"><span data-dcnode-id="6725" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6722" instrument_node=""> elections, Florida officials rejected 4% of postal ballots that claimed to come from voters aged 18–25. In the 2018 general election they rejected 5%.</span><sup class="reference" data-dcnode-id="6719" id="cite_ref-fl-bar_160-0"><a data-dcnode-id="6720" href="#cite_note-fl-bar-160"><span data-dcnode-id="6721" instrument_node="">[160]</span></a></sup><span data-dcnode-id="6718" instrument_node=""> In Florida over age 60 or 65, rejections were only one percent in 2020, two thirds of a percent in 2018 and half a percent in 2016. However over age 90, rejection rates were above average, though not as high as under age 25.</span><sup class="reference" data-dcnode-id="6715" id="cite_ref-fl-bar_160-1"><a data-dcnode-id="6716" href="#cite_note-fl-bar-160"><span data-dcnode-id="6717" instrument_node="">[160]</span></a></sup><span data-dcnode-id="6714" instrument_node=""> Rejections were 2% for ballots claiming to come from Florida non-white voters, and 1% from white voters in all three years.</span><sup class="reference" data-dcnode-id="6711" id="cite_ref-fl20_159-1"><a data-dcnode-id="6712" href="#cite_note-fl20-159"><span data-dcnode-id="6713" instrument_node="">[159]</span></a></sup><sup class="reference" data-dcnode-id="6708" id="cite_ref-fl-bar_160-2"><a data-dcnode-id="6709" href="#cite_note-fl-bar-160"><span data-dcnode-id="6710" instrument_node="">[160]</span></a></sup><sup class="reference" data-dcnode-id="6705" id="cite_ref-aclu_11-4"><a data-dcnode-id="6706" href="#cite_note-aclu-11"><span data-dcnode-id="6707" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6704" instrument_node="">
In the 2018 Florida election, 4% of postal ballots from military voters stationed inside the United States were rejected.</span><sup class="reference" data-dcnode-id="6701" id="cite_ref-fl-bar_160-3"><a data-dcnode-id="6702" href="#cite_note-fl-bar-160"><span data-dcnode-id="6703" instrument_node="">[160]</span></a></sup><span data-dcnode-id="6700" instrument_node="">
Florida voters are not allowed to cure signature problems if these are discovered after election day.</span><sup class="reference" data-dcnode-id="6697" id="cite_ref-ncsl-ver_144-1"><a data-dcnode-id="6698" href="#cite_note-ncsl-ver-144"><span data-dcnode-id="6699" instrument_node="">[144]</span></a></sup><span data-dcnode-id="6696" instrument_node="">
</span></p><p data-dcnode-id="6680"><span data-dcnode-id="6694" instrument_node="">Florida rejection rates in 2016 varied by county, ranging from none to 4%, and up to 5% for ballots that claimed to come from blacks or Hispanics in some counties. Two counties with large universities rejected 9% of 18-21-year-olds: </span><a data-dcnode-id="6692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alachua_County%2C_Florida" title="Alachua County, Florida"><span data-dcnode-id="6693" instrument_node="">Alachua</span></a><span data-dcnode-id="6691" instrument_node=""> and </span><a data-dcnode-id="6689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orange_County%2C_Florida" title="Orange County, Florida"><span data-dcnode-id="6690" instrument_node="">Orange</span></a><span data-dcnode-id="6688" instrument_node="">, while </span><a data-dcnode-id="6686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pinellas_County%2C_Florida" title="Pinellas County, Florida"><span data-dcnode-id="6687" instrument_node="">Pinellas</span></a><span data-dcnode-id="6685" instrument_node="">, which also has large universities, rejected 0.2% of this age range.</span><sup class="reference" data-dcnode-id="6682" id="cite_ref-aclu_11-5"><a data-dcnode-id="6683" href="#cite_note-aclu-11"><span data-dcnode-id="6684" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6681" instrument_node="">
</span></p><p data-dcnode-id="6667"><span data-dcnode-id="6679" instrument_node="">In Georgia's 2018 general election, most counties rejected higher fractions of ballots claiming to come from black or Hispanic voters than from white voters. The highest rejection rates for ballots that claimed to come from black voters were in Polk 17%, Taylor and Clay 16%, Putnam, and Warren 14%, Atkinson and Candler 13%, McIntosh 12%, and Glynn 10%. For Hispanics, Thomas and Putnam counties rejected 20%, Bulloch 14%, Barlow 12%, Glynn 11%, Decatur 10%. The highest rates for whites were Pickens 13%, Coffee and Polk 10%. Researchers also found higher rejection rates for women, which they hypothesized could relate to name changes not updated at the voter registration office,</span><sup class="reference" data-dcnode-id="6676" id="cite_ref-shino_161-0"><a data-dcnode-id="6677" href="#cite_note-shino-161"><span data-dcnode-id="6678" instrument_node="">[161]</span></a></sup><sup class="reference" data-dcnode-id="6673" id="cite_ref-who_162-0"><a data-dcnode-id="6674" href="#cite_note-who-162"><span data-dcnode-id="6675" instrument_node="">[162]</span></a></sup><span data-dcnode-id="6672" instrument_node="">
though issues with hyphenated last names can also cause signature rejections.</span><sup class="reference" data-dcnode-id="6669" id="cite_ref-viebeck_163-0"><a data-dcnode-id="6670" href="#cite_note-viebeck-163"><span data-dcnode-id="6671" instrument_node="">[163]</span></a></sup><span data-dcnode-id="6668" instrument_node="">
Bias in computer verification depends on the set of signatures used for training the computer, and bias in manual review depends on whether the temporary staff recognize names as non-white.
</span></p><p data-dcnode-id="6653"><span data-dcnode-id="6666" instrument_node="">Many voter registrations, especially for younger voters, come from driver's license applications, where the signature was done on an electronic signature pad. People move their hands differently when signing on paper and on electronic pads. Further the pads used have low resolution, so distinctive elements of paper signatures on the ballot envelopes, are blurred or omitted in the electronic signatures used for comparison.</span><sup class="reference" data-dcnode-id="6663" id="cite_ref-stan_10-8"><a data-dcnode-id="6664" href="#cite_note-stan-10"><span data-dcnode-id="6665" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6662" instrument_node=""> Signatures also have more variation, and therefore are harder to verify, when they come from people who rarely use Roman characters, such as some Asian-Americans.</span><sup class="reference" data-dcnode-id="6659" id="cite_ref-stan_10-9"><a data-dcnode-id="6660" href="#cite_note-stan-10"><span data-dcnode-id="6661" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6658" instrument_node=""> Election officials find that a decline in cursive writing leads to young voters more often printing their names in signature blocks; a California official said she "cannot compare a printed name to a signature."</span><sup class="reference" data-dcnode-id="6655" id="cite_ref-stan_10-10"><a data-dcnode-id="6656" href="#cite_note-stan-10"><span data-dcnode-id="6657" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6654" instrument_node="">
</span></p><p data-dcnode-id="6647"><span data-dcnode-id="6652" instrument_node="">This is a difficult process for the actual workers that reject signatures.  Attorney Raul Macias said "Staff are under-trained, they're under-resourced, and they'll be under tremendous pressure to get results quickly and they're moving through thousands or millions of signatures."  While 22 states allow the "curing" of a ballot signature, 28 do not.</span><sup class="reference" data-dcnode-id="6649" id="cite_ref-164"><a data-dcnode-id="6650" href="#cite_note-164"><span data-dcnode-id="6651" instrument_node="">[164]</span></a></sup><span data-dcnode-id="6648" instrument_node="">
</span></p><span data-dcnode-id="6646" instrument_node="">
</span><h3 data-dcnode-id="6636"><span class="mw-headline" data-dcnode-id="6644" id="Recommendations_for_signature_verification"><span data-dcnode-id="6645" instrument_node="">Recommendations for signature verification</span></span><span class="mw-editsection" data-dcnode-id="6637"><span class="mw-editsection-bracket" data-dcnode-id="6642"><span data-dcnode-id="6643" instrument_node="">[</span></span><a data-dcnode-id="6640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D13" title="Edit section: Recommendations for signature verification"><span data-dcnode-id="6641" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6638"><span data-dcnode-id="6639" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6635" instrument_node="">
</span><p data-dcnode-id="6629"><span data-dcnode-id="6634" instrument_node="">The Election Assistance Commission says computers should be set to accept only nearly perfect signature matches, and humans should doublecheck a sample, but they do not discuss acceptable error rates or sample sizes.</span><sup class="reference" data-dcnode-id="6631" id="cite_ref-eac-ver_140-1"><a data-dcnode-id="6632" href="#cite_note-eac-ver-140"><span data-dcnode-id="6633" instrument_node="">[140]</span></a></sup><span data-dcnode-id="6630" instrument_node="">
</span></p><p data-dcnode-id="6619"><span data-dcnode-id="6628" instrument_node="">The Election Advisory Commission says the first human check of a signature rejected by machines will average 30 seconds, and a sample of decisions to accept should be checked. They recommend all rejections should be checked by bipartisan teams (6 feet apart</span><sup class="reference" data-dcnode-id="6625" id="cite_ref-eac-in_145-1"><a data-dcnode-id="6626" href="#cite_note-eac-in-145"><span data-dcnode-id="6627" instrument_node="">[145]</span></a></sup><span data-dcnode-id="6624" instrument_node="">) who will average 3 minutes for the final decision to reject, which means 6 minutes of staff time, plus supervision time. The commission also discusses the challenges of moving large numbers of envelopes without mixups from receipt, to machines, and various steps of verification, rejection, and voter notification to cure mismatches, as well as counting and logging the number of ballots at every step. They mention the extra security needed when voters send copies of identity documents to cure their signature rejection.</span><sup class="reference" data-dcnode-id="6621" id="cite_ref-eac-ver_140-2"><a data-dcnode-id="6622" href="#cite_note-eac-ver-140"><span data-dcnode-id="6623" instrument_node="">[140]</span></a></sup><span data-dcnode-id="6620" instrument_node="">
</span></p><p data-dcnode-id="6609"><span data-dcnode-id="6618" instrument_node="">The Election Assistance Commission notes that signatures over ten years old are another problem and recommends Hawaii's practice of inviting every voter to send a new signature.</span><sup class="reference" data-dcnode-id="6615" id="cite_ref-eac-ver_140-3"><a data-dcnode-id="6616" href="#cite_note-eac-ver-140"><span data-dcnode-id="6617" instrument_node="">[140]</span></a></sup><span data-dcnode-id="6614" instrument_node=""> California researchers recommended that the public needs easy access to see the signature on file before mailing in ballots, to further maximize matches.</span><sup class="reference" data-dcnode-id="6611" id="cite_ref-stan_10-11"><a data-dcnode-id="6612" href="#cite_note-stan-10"><span data-dcnode-id="6613" instrument_node="">[10]</span></a></sup><span data-dcnode-id="6610" instrument_node="">
</span></p><p data-dcnode-id="6599"><span data-dcnode-id="6608" instrument_node="">The National Vote at Home Institute recommends state-wide or regional centers for signature verification to increase transparency. and reduce the insider risks of temporary local staff,</span><sup class="reference" data-dcnode-id="6605" id="cite_ref-ncsl-expect_165-0"><a data-dcnode-id="6606" href="#cite_note-ncsl-expect-165"><span data-dcnode-id="6607" instrument_node="">[165]</span></a></sup><span data-dcnode-id="6604" instrument_node="">
though the Election Advisory Commission notes that shared equipment may not be consistent with local chain of custody requirements, and that public bidding may take months.</span><sup class="reference" data-dcnode-id="6601" id="cite_ref-eac-in_145-2"><a data-dcnode-id="6602" href="#cite_note-eac-in-145"><span data-dcnode-id="6603" instrument_node="">[145]</span></a></sup><span data-dcnode-id="6600" instrument_node="">
</span></p><span data-dcnode-id="6598" instrument_node="">
</span><h3 data-dcnode-id="6588"><span class="mw-headline" data-dcnode-id="6596" id="Blue_shift"><span data-dcnode-id="6597" instrument_node="">Blue shift</span></span><span class="mw-editsection" data-dcnode-id="6589"><span class="mw-editsection-bracket" data-dcnode-id="6594"><span data-dcnode-id="6595" instrument_node="">[</span></span><a data-dcnode-id="6592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D14" title="Edit section: Blue shift"><span data-dcnode-id="6593" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6590"><span data-dcnode-id="6591" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6587" instrument_node="">
</span><link data-dcnode-id="6586" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6582" role="note"><span data-dcnode-id="6585" instrument_node="">Main article: </span><a data-dcnode-id="6583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Blue_shift_%28politics%29" title="Blue shift (politics)"><span data-dcnode-id="6584" instrument_node="">Blue shift (politics)</span></a></div><span data-dcnode-id="6581" instrument_node="">
</span><p data-dcnode-id="6557"><span data-dcnode-id="6580" instrument_node="">Blue shift is an observed phenomenon under which in-person votes overstate the true final percent of votes for the </span><a data-dcnode-id="6578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republican_Party_%28United_States%29" title="Republican Party (United States)"><span data-dcnode-id="6579" instrument_node="">Republican Party</span></a><span data-dcnode-id="6577" instrument_node=""> (whose color is red), while provisional votes, which are counted later, overstate the true final percent of votes for the </span><a data-dcnode-id="6575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Party_%28United_States%29" title="Democratic Party (United States)"><span data-dcnode-id="6576" instrument_node="">Democratic Party</span></a><span data-dcnode-id="6574" instrument_node=""> (whose color is blue).</span><sup class="reference" data-dcnode-id="6571" id="cite_ref-YimengLi_166-0"><a data-dcnode-id="6572" href="#cite_note-YimengLi-166"><span data-dcnode-id="6573" instrument_node="">[166]</span></a></sup><span data-dcnode-id="6570" instrument_node=""> This means election day results can initially show a large Republican lead, or "red mirage," but mail-in ballots later demonstrate a Democratic victory. This can also happen in the opposite direction, when there is a "blue mirage," or early lead by Democrats, followed by a red shift back to Republicans.</span><sup class="reference" data-dcnode-id="6567" id="cite_ref-167"><a data-dcnode-id="6568" href="#cite_note-167"><span data-dcnode-id="6569" instrument_node="">[167]</span></a></sup><span data-dcnode-id="6566" instrument_node=""> This can lead observers to call into question the election legitimacy, when in fact, the election results are legitimate.</span><sup class="reference" data-dcnode-id="6563" id="cite_ref-168"><a data-dcnode-id="6564" href="#cite_note-168"><span data-dcnode-id="6565" instrument_node="">[168]</span></a></sup><span data-dcnode-id="6562" instrument_node=""> Blue shift occurs because young voters, low-income voters, and voters who move often, are likely to vote by mail and are likely to lean Democratic.</span><sup class="reference" data-dcnode-id="6559" id="cite_ref-Philadelphia_Inquirer_2020-01-27_169-0"><a data-dcnode-id="6560" href="#cite_note-Philadelphia_Inquirer_2020-01-27-169"><span data-dcnode-id="6561" instrument_node="">[169]</span></a></sup><span data-dcnode-id="6558" instrument_node="">
</span></p><p data-dcnode-id="6520"><span data-dcnode-id="6556" instrument_node="">The phenomenon was first identified by Edward Foley of </span><a data-dcnode-id="6554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ohio_State_University" title="Ohio State University"><span data-dcnode-id="6555" instrument_node="">Ohio State University</span></a><span data-dcnode-id="6553" instrument_node=""> in 2013.</span><sup class="reference" data-dcnode-id="6550" id="cite_ref-Philadelphia_Inquirer_2020-01-27_169-1"><a data-dcnode-id="6551" href="#cite_note-Philadelphia_Inquirer_2020-01-27-169"><span data-dcnode-id="6552" instrument_node="">[169]</span></a></sup><span data-dcnode-id="6549" instrument_node=""> He found that Democratic candidates are significantly more likely to gain votes during the canvass period, which is the votes counted after election night.</span><sup class="reference" data-dcnode-id="6546" id="cite_ref-Foley_170-0"><a data-dcnode-id="6547" href="#cite_note-Foley-170"><span data-dcnode-id="6548" instrument_node="">[170]</span></a></sup><span data-dcnode-id="6545" instrument_node=""> This asymmetry did not always exist, as in the 20th century, as recently as the </span><a data-dcnode-id="6543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1996_United_States_presidential_election" title="1996 United States presidential election"><span data-dcnode-id="6544" instrument_node="">1996 United States presidential election</span></a><span data-dcnode-id="6542" instrument_node="">, Republicans and Democrats were both able to cut their opponents' lead during the canvass period. Foley conjectured that the 2002 passage of the </span><a data-dcnode-id="6540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help_America_Vote_Act" title="Help America Vote Act"><span data-dcnode-id="6541" instrument_node="">Help America Vote Act</span></a><span data-dcnode-id="6539" instrument_node=""> accelerated the pronounced asymmetry of the blue shift phenomenon, because it required states to allow </span><a data-dcnode-id="6537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Provisional_ballot" title="Provisional ballot"><span data-dcnode-id="6538" instrument_node="">provisional ballots</span></a><span data-dcnode-id="6536" instrument_node=""> to be cast.</span><sup class="reference" data-dcnode-id="6533" id="cite_ref-Foley_170-1"><a data-dcnode-id="6534" href="#cite_note-Foley-170"><span data-dcnode-id="6535" instrument_node="">[170]</span></a></sup><span data-dcnode-id="6532" instrument_node=""> He later found that the variation in the size of the blue shift is positively associated with the number of provisional ballots and the Democratic partisanship of the state in question.</span><sup class="reference" data-dcnode-id="6529" id="cite_ref-FoleyStewart2015_171-0"><a data-dcnode-id="6530" href="#cite_note-FoleyStewart2015-171"><span data-dcnode-id="6531" instrument_node="">[171]</span></a></sup><span data-dcnode-id="6528" instrument_node=""> The growth in the persistent blue-shifted overtime vote began with the </span><a data-dcnode-id="6526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2004_United_States_presidential_election" title="2004 United States presidential election"><span data-dcnode-id="6527" instrument_node="">2004 United States presidential election</span></a><span data-dcnode-id="6525" instrument_node="">.</span><sup class="reference" data-dcnode-id="6522" id="cite_ref-FoleyStewart2015_171-1"><a data-dcnode-id="6523" href="#cite_note-FoleyStewart2015-171"><span data-dcnode-id="6524" instrument_node="">[171]</span></a></sup><span data-dcnode-id="6521" instrument_node="">
</span></p><span data-dcnode-id="6519" instrument_node="">
</span><h2 data-dcnode-id="6509"><span class="mw-headline" data-dcnode-id="6517" id="Other_challenges"><span data-dcnode-id="6518" instrument_node="">Other challenges</span></span><span class="mw-editsection" data-dcnode-id="6510"><span class="mw-editsection-bracket" data-dcnode-id="6515"><span data-dcnode-id="6516" instrument_node="">[</span></span><a data-dcnode-id="6513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D15" title="Edit section: Other challenges"><span data-dcnode-id="6514" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6511"><span data-dcnode-id="6512" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6508" instrument_node="">
</span><p data-dcnode-id="6502"><span data-dcnode-id="6507" instrument_node="">In the case of all-postal voting, or a high proportion of postal votes, there cannot be traditional "Election Night" news coverage in which the results are delivered within hours after polls close, as it takes several days to deliver and count ballots. As a result, it may require several days beyond the mail-in deadline before results can be publicized.</span><sup class="reference" data-dcnode-id="6504" id="cite_ref-172"><a data-dcnode-id="6505" href="#cite_note-172"><span data-dcnode-id="6506" instrument_node="">[172]</span></a></sup><span data-dcnode-id="6503" instrument_node="">
</span></p><p data-dcnode-id="6493"><span data-dcnode-id="6501" instrument_node="">Postal voting depends on the viability of the postal service. As of early 2020, the </span><a data-dcnode-id="6499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Postal_Service" title="United States Postal Service"><span data-dcnode-id="6500" instrument_node="">U.S. Postal Service</span></a><span data-dcnode-id="6498" instrument_node=""> has "a negative net worth of $65 billion and an additional $140 billion in unfunded liabilities." This financial crisis has become more pressing amidst the coronavirus pandemic, as the $2 trillion economic stimulus package did not include money for the postal service.</span><sup class="reference" data-dcnode-id="6495" id="cite_ref-173"><a data-dcnode-id="6496" href="#cite_note-173"><span data-dcnode-id="6497" instrument_node="">[173]</span></a></sup><span data-dcnode-id="6494" instrument_node="">
</span></p><span data-dcnode-id="6492" instrument_node="">
</span><h2 data-dcnode-id="6482"><span class="mw-headline" data-dcnode-id="6490" id="Alternatives"><span data-dcnode-id="6491" instrument_node="">Alternatives</span></span><span class="mw-editsection" data-dcnode-id="6483"><span class="mw-editsection-bracket" data-dcnode-id="6488"><span data-dcnode-id="6489" instrument_node="">[</span></span><a data-dcnode-id="6486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D16" title="Edit section: Alternatives"><span data-dcnode-id="6487" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6484"><span data-dcnode-id="6485" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6481" instrument_node="">
</span><p data-dcnode-id="6472"><span data-dcnode-id="6480" instrument_node="">An increasing number of states in the US now allow </span><a data-dcnode-id="6478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Drive-thru_voting" title="Drive-thru voting"><span data-dcnode-id="6479" instrument_node="">drive-thru voting</span></a><span data-dcnode-id="6477" instrument_node="">. In the process voters leave their absentee ballots in a drop box at designated locations. Some locations allow drop-off voting 24/7.</span><sup class="reference" data-dcnode-id="6474" id="cite_ref-174"><a data-dcnode-id="6475" href="#cite_note-174"><span data-dcnode-id="6476" instrument_node="">[174]</span></a></sup><span data-dcnode-id="6473" instrument_node="">
</span></p><p data-dcnode-id="6450"><span data-dcnode-id="6471" instrument_node="">Many states provide voters with multiple ways to return their ballot: by mail, via in person secure drop boxes, and at voting centers where they can get questions answered, replacement ballots, etc.</span><sup class="reference" data-dcnode-id="6468" id="cite_ref-nvahi-2018_175-0"><a data-dcnode-id="6469" href="#cite_note-nvahi-2018-175"><span data-dcnode-id="6470" instrument_node="">[175]</span></a></sup><span data-dcnode-id="6467" instrument_node=""> Oregon now has 300 drop boxes across the state in the weeks leading up to each election, and more voters now cast their ballot in person than by return mail.</span><sup class="reference" data-dcnode-id="6464" id="cite_ref-nvahi-db_176-0"><a data-dcnode-id="6465" href="#cite_note-nvahi-db-176"><span data-dcnode-id="6466" instrument_node="">[176]</span></a></sup><span data-dcnode-id="6463" instrument_node=""> The term "vote at home" is starting to replace "vote by mail" for that reason.</span><sup class="reference" data-dcnode-id="6460" id="cite_ref-fox-vah_177-0"><a data-dcnode-id="6461" href="#cite_note-fox-vah-177"><span data-dcnode-id="6462" instrument_node="">[177]</span></a></sup><span data-dcnode-id="6459" instrument_node=""> California's roll-out of vote-by-mail is incorporating voting centers as a key part of their effort.</span><sup class="reference" data-dcnode-id="6456" id="cite_ref-nvahi-db_176-1"><a data-dcnode-id="6457" href="#cite_note-nvahi-db-176"><span data-dcnode-id="6458" instrument_node="">[176]</span></a></sup><span data-dcnode-id="6455" instrument_node=""> Anchorage's successful pilot included many drop boxes and some voting centers.</span><sup class="reference" data-dcnode-id="6452" id="cite_ref-nvahi-db_176-2"><a data-dcnode-id="6453" href="#cite_note-nvahi-db-176"><span data-dcnode-id="6454" instrument_node="">[176]</span></a></sup><span data-dcnode-id="6451" instrument_node="">
</span></p><span data-dcnode-id="6449" instrument_node="">
</span><h2 data-dcnode-id="6439"><span class="mw-headline" data-dcnode-id="6447" id="Expansion_in_2020_election"><span data-dcnode-id="6448" instrument_node="">Expansion in 2020 election</span></span><span class="mw-editsection" data-dcnode-id="6440"><span class="mw-editsection-bracket" data-dcnode-id="6445"><span data-dcnode-id="6446" instrument_node="">[</span></span><a data-dcnode-id="6443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPostal_voting_in_the_United_States%26action%3Dedit%26section%3D17" title="Edit section: Expansion in 2020 election"><span data-dcnode-id="6444" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6441"><span data-dcnode-id="6442" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6438" instrument_node="">
</span><link data-dcnode-id="6437" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6433" role="note"><span data-dcnode-id="6436" instrument_node="">Main article: </span><a data-dcnode-id="6434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Postal_voting_in_the_2020_United_States_elections" title="Postal voting in the 2020 United States elections"><span data-dcnode-id="6435" instrument_node="">Postal voting in the 2020 United States elections</span></a></div><span data-dcnode-id="6432" instrument_node="">
</span><link data-dcnode-id="6431" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6424" role="note"><span data-dcnode-id="6430" instrument_node="">See also: </span><a data-dcnode-id="6428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_United_States_elections" title="2020 United States elections"><span data-dcnode-id="6429" instrument_node="">2020 United States elections</span></a><span data-dcnode-id="6427" instrument_node=""> and </span><a data-dcnode-id="6425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_United_States_Postal_Service_crisis" title="2020 United States Postal Service crisis"><span data-dcnode-id="6426" instrument_node="">2020 United States Postal Service crisis</span></a></div><span data-dcnode-id="6423" instrument_node="">
</span><p data-dcnode-id="6397"><span data-dcnode-id="6422" instrument_node="">In 2020, amid the </span><a data-dcnode-id="6420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic" title="COVID-19 pandemic"><span data-dcnode-id="6421" instrument_node="">COVID-19 pandemic</span></a><span data-dcnode-id="6419" instrument_node="">, a significant increase in postal ballots was expected. The National Vote at Home Institute, which advocates postal ballots and is led by former </span><a data-dcnode-id="6417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denver" title="Denver"><span data-dcnode-id="6418" instrument_node="">Denver</span></a><span data-dcnode-id="6416" instrument_node=""> elections director </span><a data-dcnode-id="6414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amber_McReynolds" title="Amber McReynolds"><span data-dcnode-id="6415" instrument_node="">Amber McReynolds</span></a><span data-dcnode-id="6413" instrument_node="">, analyzed all states and found that 32 states "are missing major pieces of policy or best practices that ensure a secure mail ballot process"</span><sup class="reference" data-dcnode-id="6410" id="cite_ref-den50_178-0"><a data-dcnode-id="6411" href="#cite_note-den50-178"><span data-dcnode-id="6412" instrument_node="">[178]</span></a></sup><sup class="reference" data-dcnode-id="6407" id="cite_ref-nvahi-50b_179-0"><a data-dcnode-id="6408" href="#cite_note-nvahi-50b-179"><span data-dcnode-id="6409" instrument_node="">[179]</span></a></sup><span data-dcnode-id="6406" instrument_node=""> including 15 states which lack steps to verify voters' addresses, 17 which do not mandate a signature verification process, and 30 do not have adequate options to cure defects in voter signatures.</span><sup class="reference" data-dcnode-id="6403" id="cite_ref-nvahi-50_154-1"><a data-dcnode-id="6404" href="#cite_note-nvahi-50-154"><span data-dcnode-id="6405" instrument_node="">[154]</span></a></sup><span data-dcnode-id="6402" instrument_node=""> In many systems voters have no way to remedy disqualifications due to signature mismatches.</span><sup class="reference" data-dcnode-id="6399" id="cite_ref-ncsl-ver_144-2"><a data-dcnode-id="6400" href="#cite_note-ncsl-ver-144"><span data-dcnode-id="6401" instrument_node="">[144]</span></a></sup><span data-dcnode-id="6398" instrument_node="">
