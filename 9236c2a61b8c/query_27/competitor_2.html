</span><div class="comp structured-content article-content expert-content right-rail__offset lock-journey health-sc-page mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1193" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="50em" data-sc-content-positions="[400, 1400, 1400, 1700, 2000, 2200, 2400, 2600, 2800]" data-sc-load-immediate="4" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="60" id="health-sc-page_1-0"><span data-dcnode-id="1354" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1346" id="mntl-sc-block_1-0"><span data-dcnode-id="1353" instrument_node="">
Turning 18 is a monumental time in a young person's life. Typically, they are graduating from high school and either </span><a data-component="link" data-dcnode-id="1351" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfamily.com/everything-you-need-to-know-before-college-drop-off-day-4171762"><span data-dcnode-id="1352" instrument_node="">going off to college</span></a><span data-dcnode-id="1350" instrument_node=""> or entering the workforce. What's more, if they are male, they will have registered for </span><a data-component="link" data-dcnode-id="1348" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfamily.com/selective-service-draft-18-year-old-3570786"><span data-dcnode-id="1349" instrument_node="">selective service</span></a><span data-dcnode-id="1347" instrument_node=""> as well.
</span></p><span data-dcnode-id="1345" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1344" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="1343" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1341" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1342" instrument_node="">
But, perhaps one of the most exciting things 18-year-olds can do is exercise their right to vote. They will finally have a say in what happens in the country. The key, of course, is registering to do so.
</span></p><span data-dcnode-id="1340" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1339" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="1338" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1337" id="toc-the-us-voting-age"></span><span data-dcnode-id="1336" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1331" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1335" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node=""> The U.S. Voting Age </span></span><span data-dcnode-id="1332" instrument_node=""> </span></h2><span data-dcnode-id="1330" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1328" id="mntl-sc-block_1-0-5"><span data-dcnode-id="1329" instrument_node="">
In many states, teens in the U.S. can register to vote during the year that they will turn 18. So, even when teens don't turn 18 until December, they can register to vote any time during the calendar year.&nbsp;Some states even allow teens to pre-register as young as 16, even though they cannot vote in an election until they are 18. Check your state's official voter registration page in order to find the most up-to-date information about registering to vote.
</span></p><span data-dcnode-id="1327" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1326" id="mntl-sc-block_1-0-6"></div><span data-dcnode-id="1325" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1320" id="mntl-sc-block_1-0-7"><span data-dcnode-id="1324" instrument_node="">
Once your teen is able to register, follow the guidelines suggested by your state. Many states now allow teens to register online. Keep in mind, even when kids are </span><a data-component="link" data-dcnode-id="1322" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfamily.com/college-freshman-first-year-4173196"><span data-dcnode-id="1323" instrument_node="">away at college</span></a><span data-dcnode-id="1321" instrument_node="">, they must register to vote in the state in which they live. Most of the time, this is where their parents live.
</span></p><span data-dcnode-id="1319" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1318" id="mntl-sc-block_1-0-8"></div><span data-dcnode-id="1317" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1312" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1316" instrument_node="">
Initially, teens may not have an interest in registering to vote. Still, you should encourage them to register. The right to vote is one of the most significant freedoms this country offers and should not be taken for granted. Additionally, talk to teens about the importance of </span><a data-component="link" data-dcnode-id="1314" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfamily.com/the-rights-and-responsibilities-of-parents-of-teens-2609100"><span data-dcnode-id="1315" instrument_node="">becoming an educated voter</span></a><span data-dcnode-id="1313" instrument_node="">. Encourage them to think carefully about the issues and candidates on the ballot.&nbsp;
</span></p><span data-dcnode-id="1311" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1303" id="mntl-sc-block_1-0-10"><div class="comp mntl-native" data-dcnode-id="1304" data-right-rail-index="1" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="1310" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="1306" id="mntl-native__adunit_1-0"><span data-dcnode-id="1309" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1308" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1307" instrument_node="">
</span></div><span data-dcnode-id="1305" instrument_node="">
</span></div></div><span data-dcnode-id="1302" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1301" id="toc-17-year-olds-and-primary-elections"></span><span data-dcnode-id="1300" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1295" id="mntl-sc-block_1-0-11"><span data-dcnode-id="1299" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node=""> 17-Year-Olds and Primary Elections </span></span><span data-dcnode-id="1296" instrument_node=""> </span></h2><span data-dcnode-id="1294" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1289" id="mntl-sc-block_1-0-12"><span data-dcnode-id="1293" instrument_node="">
A third of the states in the U.S. allow 17-year-olds to participate in primary elections if they will turn 18 on or before election day. As of 2020, states that allow 17-year-olds to vote in primary elections include&nbsp;Connecticut, Delaware, Illinois, Indiana, Kentucky, Maine, Maryland, Mississippi, Nebraska, New Mexico, North Carolina, Ohio, South Carolina, Utah, Vermont, Virginia, and West Virginia. The District of Columbia also allows 17-year-old voting. Some states may even allow 17-year-olds to vote in caucuses as well. See your state's official voting guidelines to determine what they allow and don't allow.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1291" data-id="#citation-3"><span data-dcnode-id="1292" instrument_node="">1</span></span><span data-dcnode-id="1290" instrument_node="">
</span></p><span data-dcnode-id="1288" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1287" id="mntl-sc-block_1-0-13"></div><span data-dcnode-id="1286" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1285" id="toc-the-history-of-the-us-voting-age"></span><span data-dcnode-id="1284" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1279" id="mntl-sc-block_1-0-14"><span data-dcnode-id="1283" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node=""> The History of the U.S. Voting Age </span></span><span data-dcnode-id="1280" instrument_node=""> </span></h2><span data-dcnode-id="1278" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1276" id="mntl-sc-block_1-0-15"><span data-dcnode-id="1277" instrument_node="">
Prior to 1970, American citizens needed to be 21 in order to vote. But, Congress passed the 26th Amendment to the Constitution in March 1971, and the states quickly ratified it. In July 1971, President Richard M. Nixon signed it into law.
</span></p><span data-dcnode-id="1275" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1274" id="mntl-sc-block_1-0-16"></div><span data-dcnode-id="1273" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1271" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1272" instrument_node="">
The argument for lowering the legal voting age from 21 to 18 began during World War II. Many argued that if young men could be drafted to fight in a war, they should be able to vote. This argument came back into the spotlight for the same reason in 1970 during the Vietnam War.
</span></p><span data-dcnode-id="1270" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1269" id="mntl-sc-block_1-0-18"></div><span data-dcnode-id="1268" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1266" id="mntl-sc-block_1-0-19"><span data-dcnode-id="1267" instrument_node="">
Today, many youth rights activists argue that the voting age should be lowered to 17, or even 16. They argue that it will give teenagers a chance to become involved in politics early and create lifetime voters.
</span></p><span data-dcnode-id="1265" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1264" id="mntl-sc-block_1-0-20"></div><span data-dcnode-id="1263" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1262" id="toc-the-voting-age-in-other-countries"></span><span data-dcnode-id="1261" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1256" id="mntl-sc-block_1-0-21"><span data-dcnode-id="1260" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node=""> The Voting Age in Other Countries </span></span><span data-dcnode-id="1257" instrument_node=""> </span></h2><span data-dcnode-id="1255" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1253" id="mntl-sc-block_1-0-22"><span data-dcnode-id="1254" instrument_node="">
The United States is not alone in requiring citizens to be 18 to cast a vote. The majority of countries in the world also have an 18-year-old voting age. Austria, Brazil, Cuba, and Nicaragua are among countries that allow 16-year-olds to vote; and a handful of countries allow 17-year-olds to vote. A few countries still do not allow voting until the age of 20 or 21.
</span></p><span data-dcnode-id="1252" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1251" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="1250" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1249" id="toc-should-the-us-voting-age-be-lowered"></span><span data-dcnode-id="1248" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1243" id="mntl-sc-block_1-0-24"><span data-dcnode-id="1247" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node=""> Should the U.S. Voting Age Be Lowered? </span></span><span data-dcnode-id="1244" instrument_node=""> </span></h2><span data-dcnode-id="1242" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1240" id="mntl-sc-block_1-0-25"><span data-dcnode-id="1241" instrument_node="">
The voting age has been a widely debated topic in the U.S. Proponents say teenagers as young as 16 should be allowed to participate in government elections, arguing that doing so would increase voter turnout, promote civic engagement, and let teens have a say in their futures.
</span></p><span data-dcnode-id="1239" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1238" id="mntl-sc-block_1-0-26"></div><span data-dcnode-id="1237" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1232" id="mntl-sc-block_1-0-27"><span data-dcnode-id="1236" instrument_node="">
However, critics argue that younger teenagers won't get involved in elections and do not have the skills to cast quality votes. According to one poll, the majority of Americans are opposed to allowing teens younger than 18 to vote. In fact, 75% of registered voters are opposed to allowing 17-year-olds to participate in elections. Meanwhile, 84% are opposed to allowing 16-year-olds to vote.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1234" data-id="#citation-2"><span data-dcnode-id="1235" instrument_node="">2</span></span><span data-dcnode-id="1233" instrument_node="">
</span></p><span data-dcnode-id="1231" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1230" id="mntl-sc-block_1-0-28"></div><span data-dcnode-id="1229" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1224" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1228" instrument_node="">
However, research on countries with younger voting ages indicates that 16-year-olds are just as motivated to participate in elections as their older counterparts. The research also shows that teens have the ability to cast votes that represent their best interests.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1226" data-id="#citation-1"><span data-dcnode-id="1227" instrument_node="">3</span></span><span data-dcnode-id="1225" instrument_node="">
</span></p><span data-dcnode-id="1223" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1222" id="mntl-sc-block_1-0-30"></div><span data-dcnode-id="1221" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1220" id="toc-encourage-your-teen-to-get-involved"></span><span data-dcnode-id="1219" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1214" id="mntl-sc-block_1-0-31"><span data-dcnode-id="1218" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node=""> Encourage Your Teen to Get Involved </span></span><span data-dcnode-id="1215" instrument_node=""> </span></h2><span data-dcnode-id="1213" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1208" id="mntl-sc-block_1-0-32"><span data-dcnode-id="1212" instrument_node="">
In order to ensure that teens exercise their right to vote, get them excited about politics at an early age. In fact, many teens are taking on </span><a data-component="link" data-dcnode-id="1210" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfamily.com/what-your-teen-should-know-about-protesting-4159879"><span data-dcnode-id="1211" instrument_node="">activist roles</span></a><span data-dcnode-id="1209" instrument_node=""> while they are still in high school. They are organizing protests, writing letters, giving speeches, and running social media campaigns about issues that are important to them.
</span></p><span data-dcnode-id="1207" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1206" id="mntl-sc-block_1-0-33"></div><span data-dcnode-id="1205" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1200" id="mntl-sc-block_1-0-34"><span data-dcnode-id="1204" instrument_node="">
To encourage your teen's interest in political issues and candidates, talk about any upcoming elections. Discuss ballot issues and talk about how voters create change. You also can discuss the different candidates who are running. Encourage your teen to research what each of the candidates stands for. And talk about how your teen's</span><a data-component="link" data-dcnode-id="1202" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellfamily.com/ways-to-build-character-in-children-620266"><span data-dcnode-id="1203" instrument_node="">&nbsp;personal value systems</span></a><span data-dcnode-id="1201" instrument_node=""> influence choices.
</span></p><span data-dcnode-id="1199" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1198" id="mntl-sc-block_1-0-35"></div><span data-dcnode-id="1197" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1195" id="mntl-sc-block_1-0-36"><span data-dcnode-id="1196" instrument_node="">
When teens express opinions contrary to yours, don't argue. Show them that you are a good listener and that you value their opinion. Part of becoming their own person may involve thinking differently than you do. The earlier teens begin thinking about these things, the more likely they'll be to vote when they're old enough.
</span></p><span data-dcnode-id="1194" instrument_node="">
</span></div><span data-dcnode-id="1192" instrument_node="">
