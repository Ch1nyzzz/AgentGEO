</span></p><p data-dcnode-id="6217"><span data-dcnode-id="6237" instrument_node="">All potential voters face new requirements since 2002, when President </span><a data-dcnode-id="6235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_W._Bush" title="George W. Bush"><span data-dcnode-id="6236" instrument_node="">George W. Bush</span></a><span data-dcnode-id="6234" instrument_node=""> signed the </span><a data-dcnode-id="6232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help_America_Vote_Act" title="Help America Vote Act"><span data-dcnode-id="6233" instrument_node="">Help America Vote Act</span></a><span data-dcnode-id="6231" instrument_node=""> (HAVA).</span><sup class="reference" data-dcnode-id="6228" id="cite_ref-110"><a data-dcnode-id="6229" href="#cite_note-110"><span data-dcnode-id="6230" instrument_node="">[109]</span></a></sup><sup class="reference" data-dcnode-id="6225" id="cite_ref-111"><a data-dcnode-id="6226" href="#cite_note-111"><span data-dcnode-id="6227" instrument_node="">[110]</span></a></sup><span data-dcnode-id="6224" instrument_node=""> It requires voters to provide their </span><a class="mw-redirect" data-dcnode-id="6222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Driver%2527s_license_in_the_United_States" title="Driver's license in the United States"><span data-dcnode-id="6223" instrument_node="">driver's license numbers</span></a><span data-dcnode-id="6221" instrument_node="">, or the last four digits of their </span><a class="mw-redirect" data-dcnode-id="6219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Security_Number" title="Social Security Number"><span data-dcnode-id="6220" instrument_node="">Social Security Number</span></a><span data-dcnode-id="6218" instrument_node=""> on their voter registration form. This has been enforced.
</span></p><span data-dcnode-id="6216" instrument_node="">
</span><h2 data-dcnode-id="6206"><span class="mw-headline" data-dcnode-id="6214" id="Special_interest_elections"><span data-dcnode-id="6215" instrument_node="">Special interest elections</span></span><span class="mw-editsection" data-dcnode-id="6207"><span class="mw-editsection-bracket" data-dcnode-id="6212"><span data-dcnode-id="6213" instrument_node="">[</span></span><a data-dcnode-id="6210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D19" title="Edit section: Special interest elections"><span data-dcnode-id="6211" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6208"><span data-dcnode-id="6209" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6205" instrument_node="">
</span><p data-dcnode-id="6174"><span data-dcnode-id="6204" instrument_node="">Several locales retained restrictions for specialized local elections, such as for school boards, </span><a data-dcnode-id="6202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special_district_%28United_States%29" title="Special district (United States)"><span data-dcnode-id="6203" instrument_node="">special districts</span></a><span data-dcnode-id="6201" instrument_node="">, or bond issues. Property restrictions, duration of residency restrictions, and, for school boards, restrictions of the franchise to voters with children, remained in force. In a series of rulings from 1969 to 1973, the Court ruled that the franchise could be restricted in some cases to those "primarily interested" or "primarily affected" by the outcome of a specialized election, but not in the case of school boards or bond issues, which affected taxation to be paid by all residents.</span><sup class="reference" data-dcnode-id="6198" id="cite_ref-justia_voter_23-1"><a data-dcnode-id="6199" href="#cite_note-justia_voter-23"><span data-dcnode-id="6200" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6197" instrument_node=""> In </span><i data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">Ball v. James</span></i><span data-dcnode-id="6194" instrument_node=""> </span><a data-dcnode-id="6192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_United_States_Supreme_Court_cases%2C_volume_451" title="List of United States Supreme Court cases, volume 451"><span data-dcnode-id="6193" instrument_node="">451</span></a><span data-dcnode-id="6191" instrument_node=""> </span><a data-dcnode-id="6189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Reports" title="United States Reports"><span data-dcnode-id="6190" instrument_node="">U.S.</span></a><span data-dcnode-id="6188" instrument_node=""> </span><a class="external text" data-dcnode-id="6186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//supreme.justia.com/cases/federal/us/451/335/" rel="nofollow"><span data-dcnode-id="6187" instrument_node="">335</span></a><span data-dcnode-id="6185" instrument_node=""> (1981), the Court further upheld a system of </span><a data-dcnode-id="6183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plural_voting" title="Plural voting"><span data-dcnode-id="6184" instrument_node="">plural voting</span></a><span data-dcnode-id="6182" instrument_node="">, by which votes for the board of directors of a </span><a class="mw-redirect" data-dcnode-id="6180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_reclamation" title="Water reclamation"><span data-dcnode-id="6181" instrument_node="">water reclamation</span></a><span data-dcnode-id="6179" instrument_node=""> district were allocated on the basis of a person's proportion of land owned in the district.</span><sup class="reference" data-dcnode-id="6176" id="cite_ref-justia_voter_23-2"><a data-dcnode-id="6177" href="#cite_note-justia_voter-23"><span data-dcnode-id="6178" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6175" instrument_node="">
</span></p><p data-dcnode-id="6152"><span data-dcnode-id="6173" instrument_node="">The Court has overseen operation of political party primaries to ensure open voting. While states were permitted to require voters to register for a political party 30 days before an election, or to require them to vote in only one party primary, the state could not prevent a voter from voting in a party primary if the voter has voted in another party's primary in the last 23 months.</span><sup class="reference" data-dcnode-id="6170" id="cite_ref-justia_voter_23-3"><a data-dcnode-id="6171" href="#cite_note-justia_voter-23"><span data-dcnode-id="6172" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6169" instrument_node=""> The Court also ruled that a state may not mandate a "closed primary" system and bar independents from voting in a party's primary against the wishes of the party. (</span><i data-dcnode-id="6167"><span data-dcnode-id="6168" instrument_node="">Tashijan v. Republican Party of Connecticut</span></i><span data-dcnode-id="6166" instrument_node=""> </span><a data-dcnode-id="6164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_United_States_Supreme_Court_cases%2C_volume_479" title="List of United States Supreme Court cases, volume 479"><span data-dcnode-id="6165" instrument_node="">479</span></a><span data-dcnode-id="6163" instrument_node=""> </span><a data-dcnode-id="6161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Reports" title="United States Reports"><span data-dcnode-id="6162" instrument_node="">U.S.</span></a><span data-dcnode-id="6160" instrument_node=""> </span><a class="external text" data-dcnode-id="6158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//supreme.justia.com/cases/federal/us/479/208/" rel="nofollow"><span data-dcnode-id="6159" instrument_node="">208</span></a><span data-dcnode-id="6157" instrument_node=""> (1986))</span><sup class="reference" data-dcnode-id="6154" id="cite_ref-112"><a data-dcnode-id="6155" href="#cite_note-112"><span data-dcnode-id="6156" instrument_node="">[111]</span></a></sup><span data-dcnode-id="6153" instrument_node="">
</span></p><p data-dcnode-id="6121"><span data-dcnode-id="6151" instrument_node="">The </span><a data-dcnode-id="6149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Office_of_Hawaiian_Affairs" title="Office of Hawaiian Affairs"><span data-dcnode-id="6150" instrument_node="">Office of Hawaiian Affairs</span></a><span data-dcnode-id="6148" instrument_node=""> of the state of </span><a data-dcnode-id="6146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hawaii" title="Hawaii"><span data-dcnode-id="6147" instrument_node="">Hawaii</span></a><span data-dcnode-id="6145" instrument_node="">, created in 1978, limited voting eligibility and candidate eligibility to </span><a data-dcnode-id="6143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Native_Hawaiians" title="Native Hawaiians"><span data-dcnode-id="6144" instrument_node="">native Hawaiians</span></a><span data-dcnode-id="6142" instrument_node=""> on whose behalf it manages 1,800,000 acres (7,300&nbsp;km</span><sup data-dcnode-id="6140"><span data-dcnode-id="6141" instrument_node="">2</span></sup><span data-dcnode-id="6139" instrument_node="">) of ceded land. The Supreme Court of the United States struck down the franchise restriction under the Fifteenth Amendment in </span><i data-dcnode-id="6136"><a data-dcnode-id="6137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rice_v._Cayetano" title="Rice v. Cayetano"><span data-dcnode-id="6138" instrument_node="">Rice v. Cayetano</span></a></i><span data-dcnode-id="6135" instrument_node=""> </span><a data-dcnode-id="6133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_United_States_Supreme_Court_cases%2C_volume_528" title="List of United States Supreme Court cases, volume 528"><span data-dcnode-id="6134" instrument_node="">528</span></a><span data-dcnode-id="6132" instrument_node=""> </span><a data-dcnode-id="6130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Reports" title="United States Reports"><span data-dcnode-id="6131" instrument_node="">U.S.</span></a><span data-dcnode-id="6129" instrument_node=""> </span><a class="external text" data-dcnode-id="6127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//supreme.justia.com/cases/federal/us/528/495/" rel="nofollow"><span data-dcnode-id="6128" instrument_node="">495</span></a><span data-dcnode-id="6126" instrument_node=""> (2000), following by eliminating the candidate restriction in </span><i data-dcnode-id="6123"><a data-dcnode-id="6124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arakaki_v._State_of_Hawai%2527i" title="Arakaki v. State of Hawai'i"><span data-dcnode-id="6125" instrument_node="">Arakaki v. State of Hawai'i</span></a></i><span data-dcnode-id="6122" instrument_node=""> a few months later.
</span></p><span data-dcnode-id="6120" instrument_node="">
</span><h2 data-dcnode-id="6110"><span class="mw-headline" data-dcnode-id="6118" id="Current_status_by_region"><span data-dcnode-id="6119" instrument_node="">Current status by region</span></span><span class="mw-editsection" data-dcnode-id="6111"><span class="mw-editsection-bracket" data-dcnode-id="6116"><span data-dcnode-id="6117" instrument_node="">[</span></span><a data-dcnode-id="6114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D20" title="Edit section: Current status by region"><span data-dcnode-id="6115" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6112"><span data-dcnode-id="6113" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6109" instrument_node="">
</span><h3 data-dcnode-id="6099"><span class="mw-headline" data-dcnode-id="6107" id="District_of_Columbia"><span data-dcnode-id="6108" instrument_node="">District of Columbia</span></span><span class="mw-editsection" data-dcnode-id="6100"><span class="mw-editsection-bracket" data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">[</span></span><a data-dcnode-id="6103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D21" title="Edit section: District of Columbia"><span data-dcnode-id="6104" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6101"><span data-dcnode-id="6102" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6098" instrument_node="">
</span><link data-dcnode-id="6097" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6093" role="note"><span data-dcnode-id="6096" instrument_node="">Main article: </span><a data-dcnode-id="6094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/District_of_Columbia_voting_rights" title="District of Columbia voting rights"><span data-dcnode-id="6095" instrument_node="">District of Columbia voting rights</span></a></div><span data-dcnode-id="6092" instrument_node="">
</span><p data-dcnode-id="6087"><span data-dcnode-id="6091" instrument_node="">Citizens of the nation's capital, </span><a data-dcnode-id="6089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington%2C_D.C." title="Washington, D.C."><span data-dcnode-id="6090" instrument_node="">Washington, D.C.</span></a><span data-dcnode-id="6088" instrument_node="">, have not been apportioned a representative or US senator in Congress. This is because D.C. is a federal district and not a state and, under the Constitution, only states are apportioned congresspersons.
</span></p><p data-dcnode-id="6076"><span data-dcnode-id="6086" instrument_node="">District of Columbia citizens had voting rights removed in 1801 by Congress, when Maryland delegated that portion of its land to Congress. Congress incrementally removed effective local control or </span><a data-dcnode-id="6084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Home_rule" title="Home rule"><span data-dcnode-id="6085" instrument_node="">home rule</span></a><span data-dcnode-id="6083" instrument_node=""> by 1871. It restored some home rule in 1971, but maintained the authority to override any local laws. Washington, D.C., does not have full representation in the U.S. House or Senate. The Twenty-third Amendment, restoring U.S. Presidential Election after a 164-year-gap, is the only known limit to Congressional "exclusive legislature" from Article I-8-17, forcing Congress to enforce for the first time Amendments 14, 15, 19, 24, and 26. It gave the District of Columbia three </span><a class="mw-redirect" data-dcnode-id="6081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Electoral_College" title="U.S. Electoral College"><span data-dcnode-id="6082" instrument_node="">electors</span></a><span data-dcnode-id="6080" instrument_node=""> and hence the right to vote for </span><a data-dcnode-id="6078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="6079" instrument_node="">President</span></a><span data-dcnode-id="6077" instrument_node="">, but not full U.S. Congresspersons nor U.S. Senators. In 1978, another amendment was proposed which would have restored to the District a full seat, but it failed to receive ratification by a sufficient number of states within the seven years required.
</span></p><p data-dcnode-id="6060"><span data-dcnode-id="6075" instrument_node="">As of 2013</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="6072" style="display:none;"><a class="external text" data-dcnode-id="6073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit"><span data-dcnode-id="6074" instrument_node="">[update]</span></a></sup><span data-dcnode-id="6071" instrument_node="">, </span><a data-dcnode-id="6069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/District_of_Columbia_voting_rights%23Proposal_during_administration_of_Barack_Obama" title="District of Columbia voting rights"><span data-dcnode-id="6070" instrument_node="">a bill</span></a><span data-dcnode-id="6068" instrument_node=""> is pending in Congress that would treat the District of Columbia as "a congressional district for purposes of representation in the House of Representatives", and permit United States citizens residing in the capital to vote for a member to represent them in the House of Representatives. The District of Columbia House Voting Rights Act, S. 160, 111th Cong. was passed by the </span><a class="mw-redirect" data-dcnode-id="6066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Senate" title="U.S. Senate"><span data-dcnode-id="6067" instrument_node="">U.S. Senate</span></a><span data-dcnode-id="6065" instrument_node=""> on February 26, 2009, by a vote of 61–37.</span><sup class="reference" data-dcnode-id="6062" id="cite_ref-113"><a data-dcnode-id="6063" href="#cite_note-113"><span data-dcnode-id="6064" instrument_node="">[112]</span></a></sup><span data-dcnode-id="6061" instrument_node="">
</span></p><p data-dcnode-id="6036"><span data-dcnode-id="6059" instrument_node="">On April 1, 1993, the </span><a data-dcnode-id="6057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inter-American_Commission_on_Human_Rights" title="Inter-American Commission on Human Rights"><span data-dcnode-id="6058" instrument_node="">Inter-American Commission on Human Rights</span></a><span data-dcnode-id="6056" instrument_node=""> of the </span><a data-dcnode-id="6054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organization_of_American_States" title="Organization of American States"><span data-dcnode-id="6055" instrument_node="">Organization of American States</span></a><span data-dcnode-id="6053" instrument_node=""> received a petition from Timothy Cooper on behalf of the Statehood Solidarity Committee (the "Petitioners") against the government of the United States (the "State" or "United States"). The petition indicated that it was presented on behalf of the members of the Statehood Solidarity Committee and all other U.S. citizens resident in the District of Columbia. The petition alleged that the United States was responsible for violations of Articles&nbsp;II (right to equality before law) and XX (right to vote and to participate in government) of the </span><a data-dcnode-id="6051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Declaration_of_the_Rights_and_Duties_of_Man" title="American Declaration of the Rights and Duties of Man"><span data-dcnode-id="6052" instrument_node="">American Declaration of the Rights and Duties of Man</span></a><span data-dcnode-id="6050" instrument_node=""> in connection with the inability of citizens of the District of Columbia to vote for and elect a representative to the U.S. Congress. On December 29, 2003, The Inter-American Commission on Human Rights having examined the information and arguments provided by the parties on the question of admissibility. Without prejudging the merits of the matter, the Commission decided to admit the present petition in respect of Articles&nbsp;II and XX of the American Declaration. In addition, the Commission concluded that the United States violates the Petitioners' rights under Articles&nbsp;II and XX of the </span><a data-dcnode-id="6048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Declaration_of_the_Rights_and_Duties_of_Man" title="American Declaration of the Rights and Duties of Man"><span data-dcnode-id="6049" instrument_node="">American Declaration of the Rights and Duties of Man</span></a><span data-dcnode-id="6047" instrument_node=""> by denying District of Columbia </span><a class="mw-redirect" data-dcnode-id="6045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Citizenship_in_the_United_States" title="Citizenship in the United States"><span data-dcnode-id="6046" instrument_node="">citizens</span></a><span data-dcnode-id="6044" instrument_node=""> an effective opportunity to participate in their </span><a data-dcnode-id="6042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Congress" title="United States Congress"><span data-dcnode-id="6043" instrument_node="">federal legislature</span></a><span data-dcnode-id="6041" instrument_node="">.</span><sup class="reference" data-dcnode-id="6038" id="cite_ref-114"><a data-dcnode-id="6039" href="#cite_note-114"><span data-dcnode-id="6040" instrument_node="">[113]</span></a></sup><span data-dcnode-id="6037" instrument_node="">
</span></p><span data-dcnode-id="6035" instrument_node="">
</span><h3 data-dcnode-id="6025"><span class="mw-headline" data-dcnode-id="6033" id="Overseas_and_nonresident_citizens"><span data-dcnode-id="6034" instrument_node="">Overseas and nonresident citizens</span></span><span class="mw-editsection" data-dcnode-id="6026"><span class="mw-editsection-bracket" data-dcnode-id="6031"><span data-dcnode-id="6032" instrument_node="">[</span></span><a data-dcnode-id="6029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D22" title="Edit section: Overseas and nonresident citizens"><span data-dcnode-id="6030" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6024" instrument_node="">
</span><link data-dcnode-id="6023" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6019" role="note"><span data-dcnode-id="6022" instrument_node="">Main article: </span><a data-dcnode-id="6020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_of_expatriates_to_vote_in_their_country_of_origin" title="Right of expatriates to vote in their country of origin"><span data-dcnode-id="6021" instrument_node="">Right of expatriates to vote in their country of origin</span></a></div><span data-dcnode-id="6018" instrument_node="">
</span><p data-dcnode-id="6006"><span data-dcnode-id="6017" instrument_node="">U.S. citizens residing overseas who would otherwise have the right to vote are guaranteed the right to vote in federal elections by the </span><a data-dcnode-id="6015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uniformed_and_Overseas_Citizens_Absentee_Voting_Act" title="Uniformed and Overseas Citizens Absentee Voting Act"><span data-dcnode-id="6016" instrument_node="">Uniformed and Overseas Citizens Absentee Voting Act</span></a><span data-dcnode-id="6014" instrument_node=""> (</span><a class="mw-redirect" data-dcnode-id="6012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UOCAVA" title="UOCAVA"><span data-dcnode-id="6013" instrument_node="">UOCAVA</span></a><span data-dcnode-id="6011" instrument_node="">) of 1986.</span><sup class="reference" data-dcnode-id="6008" id="cite_ref-usdoj.gov_40-1"><a data-dcnode-id="6009" href="#cite_note-usdoj.gov-40"><span data-dcnode-id="6010" instrument_node="">[39]</span></a></sup><span data-dcnode-id="6007" instrument_node=""> As a practical matter, individual states implement UOCAVA.
</span></p><p data-dcnode-id="6000"><span data-dcnode-id="6005" instrument_node="">A citizen who has never resided in the United States can vote if a parent is eligible to vote in certain states.</span><sup class="reference" data-dcnode-id="6002" id="cite_ref-115"><a data-dcnode-id="6003" href="#cite_note-115"><span data-dcnode-id="6004" instrument_node="">[114]</span></a></sup><span data-dcnode-id="6001" instrument_node=""> In some of these states the citizen can vote in local, state, and federal elections, in others in federal elections only.
</span></p><p data-dcnode-id="5994"><span data-dcnode-id="5999" instrument_node="">Voting rights of U.S. citizens who have never established residence in the U.S. vary by state and may be impacted by the residence history of their parents.</span><sup class="reference" data-dcnode-id="5996" id="cite_ref-116"><a data-dcnode-id="5997" href="#cite_note-116"><span data-dcnode-id="5998" instrument_node="">[115]</span></a></sup><span data-dcnode-id="5995" instrument_node="">
</span></p><span data-dcnode-id="5993" instrument_node="">
</span><h3 data-dcnode-id="5983"><span class="mw-headline" data-dcnode-id="5991" id="U.S._territories"><span data-dcnode-id="5992" instrument_node="">U.S. territories</span></span><span class="mw-editsection" data-dcnode-id="5984"><span class="mw-editsection-bracket" data-dcnode-id="5989"><span data-dcnode-id="5990" instrument_node="">[</span></span><a data-dcnode-id="5987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D23" title="Edit section: U.S. territories"><span data-dcnode-id="5988" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5985"><span data-dcnode-id="5986" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5982" instrument_node="">
</span><p data-dcnode-id="5955"><span data-dcnode-id="5981" instrument_node="">U.S. citizens and non-citizen </span><a class="mw-redirect" data-dcnode-id="5979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._national" title="U.S. national"><span data-dcnode-id="5980" instrument_node="">nationals</span></a><span data-dcnode-id="5978" instrument_node=""> who reside in </span><a data-dcnode-id="5976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Samoa" title="American Samoa"><span data-dcnode-id="5977" instrument_node="">American Samoa</span></a><span data-dcnode-id="5975" instrument_node="">, </span><a data-dcnode-id="5973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guam" title="Guam"><span data-dcnode-id="5974" instrument_node="">Guam</span></a><span data-dcnode-id="5972" instrument_node="">, </span><a data-dcnode-id="5970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Mariana_Islands" title="Northern Mariana Islands"><span data-dcnode-id="5971" instrument_node="">Northern Mariana Islands</span></a><span data-dcnode-id="5969" instrument_node="">, </span><a data-dcnode-id="5967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Puerto_Rico" title="Puerto Rico"><span data-dcnode-id="5968" instrument_node="">Puerto Rico</span></a><span data-dcnode-id="5966" instrument_node="">, or the </span><a data-dcnode-id="5964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Virgin_Islands" title="United States Virgin Islands"><span data-dcnode-id="5965" instrument_node="">United States Virgin Islands</span></a><span data-dcnode-id="5963" instrument_node=""> are not allowed to vote in U.S. national and presidential elections, as these </span><a data-dcnode-id="5961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Territories_of_the_United_States" title="Territories of the United States"><span data-dcnode-id="5962" instrument_node="">U.S. territories</span></a><span data-dcnode-id="5960" instrument_node=""> belong to the United States but do not have presidential electors. The U.S. Constitution requires a voter to be resident in one of the 50 states or in the District of Columbia to vote in federal elections. To say that the Constitution does not require extension of federal voting rights to U.S. territories residents does not, however, exclude the possibility that the Constitution may permit their enfranchisement under another source of law. Statehood or a constitutional amendment would allow people in the U.S. territories to vote in federal elections.</span><sup class="reference" data-dcnode-id="5957" id="cite_ref-iguartia_117-0"><a data-dcnode-id="5958" href="#cite_note-iguartia-117"><span data-dcnode-id="5959" instrument_node="">[116]</span></a></sup><span data-dcnode-id="5956" instrument_node="">
</span></p><p data-dcnode-id="5943"><span data-dcnode-id="5954" instrument_node="">Like the District of Columbia, territories of the United States do not have </span><a class="mw-redirect" data-dcnode-id="5952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._senators" title="U.S. senators"><span data-dcnode-id="5953" instrument_node="">U.S. senators</span></a><span data-dcnode-id="5951" instrument_node=""> representing them in the senate, and they each have one </span><a data-dcnode-id="5949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-voting_members_of_the_United_States_House_of_Representatives" title="Non-voting members of the United States House of Representatives"><span data-dcnode-id="5950" instrument_node="">member of the House of Representatives who is not allowed to vote</span></a><span data-dcnode-id="5948" instrument_node="">.</span><sup class="reference" data-dcnode-id="5945" id="cite_ref-Territories_vote_7-1"><a data-dcnode-id="5946" href="#cite_note-Territories_vote-7"><span data-dcnode-id="5947" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5944" instrument_node="">
</span></p><p data-dcnode-id="5904"><span data-dcnode-id="5942" instrument_node="">These voting restrictions have been challenged in a series of lawsuits in the 21st century. In 2015, residents of Guam, Puerto Rico, and the Virgin Islands joined as plaintiffs in </span><i data-dcnode-id="5939"><a class="new" data-dcnode-id="5940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSegovia_v._Board_of_Election_Commissioners%26action%3Dedit%26redlink%3D1" title="Segovia v. Board of Election Commissioners (page does not exist)"><span data-dcnode-id="5941" instrument_node="">Segovia v. Board of Election Commissioners</span></a></i><span data-dcnode-id="5938" instrument_node=""> (201 F. Supp. 3d 924, 939, N.D. Ill., 2016).</span><sup class="reference" data-dcnode-id="5935" id="cite_ref-Newkirk_118-0"><a data-dcnode-id="5936" href="#cite_note-Newkirk-118"><span data-dcnode-id="5937" instrument_node="">[117]</span></a></sup><span data-dcnode-id="5934" instrument_node=""> The participants had all formerly lived in Illinois, but because of a change of residency to an unincorporated territory were no longer able to vote. Their claim was that the </span><a data-dcnode-id="5932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uniformed_and_Overseas_Citizens_Absentee_Voting_Act" title="Uniformed and Overseas Citizens Absentee Voting Act"><span data-dcnode-id="5933" instrument_node="">Uniformed and Overseas Citizens Absentee Voting Act</span></a><span data-dcnode-id="5931" instrument_node="">, as it is implemented, violates the </span><a data-dcnode-id="5929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equal_Protection_Clause" title="Equal Protection Clause"><span data-dcnode-id="5930" instrument_node="">Equal Protection Clause</span></a><span data-dcnode-id="5928" instrument_node="">. At issue was that Illinois, the former residence of all of the plaintiffs, allowed residents of the </span><a data-dcnode-id="5926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Mariana_Islands" title="Northern Mariana Islands"><span data-dcnode-id="5927" instrument_node="">Northern Mariana Islands</span></a><span data-dcnode-id="5925" instrument_node=""> who had formerly lived in Illinois to vote as </span><a data-dcnode-id="5923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absentee_ballot" title="Absentee ballot"><span data-dcnode-id="5924" instrument_node="">absentee voters</span></a><span data-dcnode-id="5922" instrument_node="">, but denied former residents living in other unincorporated territories the same right. The </span><a data-dcnode-id="5920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_District_Court_for_the_Northern_District_of_Illinois" title="United States District Court for the Northern District of Illinois"><span data-dcnode-id="5921" instrument_node="">US District Court for the Northern District of Illinois</span></a><span data-dcnode-id="5919" instrument_node=""> ruled in 2016 that under the Absentee Voting Act, former residents of US states are entitled to vote in elections of the last jurisdiction in which they qualified to vote, as long as they reside in a foreign location. Using </span><a data-dcnode-id="5917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rational_basis_review" title="Rational basis review"><span data-dcnode-id="5918" instrument_node="">rational basis review</span></a><span data-dcnode-id="5916" instrument_node="">, the court stated that the Northern Mariana Islands had a unique relationship with the United States and could be treated differently. It further pointed out that as the law does not differentiate between residents within a territory, as to who formerly resided in a state, but all are treated equally, no violation occurred.</span><sup class="reference" data-dcnode-id="5913" id="cite_ref-Fegurgur_119-0"><a data-dcnode-id="5914" href="#cite_note-Fegurgur-119"><span data-dcnode-id="5915" instrument_node="">[118]</span></a></sup><span data-dcnode-id="5912" instrument_node=""> The </span><a data-dcnode-id="5910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Court_of_Appeals_for_the_Seventh_Circuit" title="United States Court of Appeals for the Seventh Circuit"><span data-dcnode-id="5911" instrument_node="">United States Court of Appeals for the Seventh Circuit</span></a><span data-dcnode-id="5909" instrument_node=""> concurred with the decision, but dismissed the case for lack of standing because the application of the Absentee Voting Act in Illinois is a state issue.</span><sup class="reference" data-dcnode-id="5906" id="cite_ref-120"><a data-dcnode-id="5907" href="#cite_note-120"><span data-dcnode-id="5908" instrument_node="">[119]</span></a></sup><span data-dcnode-id="5905" instrument_node="">
</span></p><p data-dcnode-id="5848"><span data-dcnode-id="5903" instrument_node="">In 2019, John Fitisemanu of </span><a data-dcnode-id="5901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Samoa" title="American Samoa"><span data-dcnode-id="5902" instrument_node="">American Samoa</span></a><span data-dcnode-id="5900" instrument_node=""> challenged his inability to vote because of his status as a non-citizen national of the United States. Though Fitisemanu had lived and paid taxes in Utah for twenty years, and had a US passport, he was unable to vote.</span><sup class="reference" data-dcnode-id="5897" id="cite_ref-Pacific_Daily_News_121-0"><a data-dcnode-id="5898" href="#cite_note-Pacific_Daily_News-121"><span data-dcnode-id="5899" instrument_node="">[120]</span></a></sup><span data-dcnode-id="5896" instrument_node=""> The </span><a data-dcnode-id="5894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_District_Court_for_the_District_of_Utah" title="United States District Court for the District of Utah"><span data-dcnode-id="5895" instrument_node="">United States District Court for the District of Utah</span></a><span data-dcnode-id="5893" instrument_node="">, ruled in </span><i data-dcnode-id="5890"><a class="new" data-dcnode-id="5891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFitisemanu_v._United_States%26action%3Dedit%26redlink%3D1" title="Fitisemanu v. United States (page does not exist)"><span data-dcnode-id="5892" instrument_node="">Fitisemanu v. United States</span></a></i><span data-dcnode-id="5889" instrument_node=""> (No. 18-36, D. Utah Dec. 13, 2019) that individuals born in American Samoa are </span><a data-dcnode-id="5887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Birthright_citizenship_in_the_United_States" title="Birthright citizenship in the United States"><span data-dcnode-id="5888" instrument_node="">birthright citizens</span></a><span data-dcnode-id="5886" instrument_node=""> under Section 1 of the </span><a data-dcnode-id="5884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fourteenth_Amendment_to_the_United_States_Constitution" title="Fourteenth Amendment to the United States Constitution"><span data-dcnode-id="5885" instrument_node="">Fourteenth Amendment to the United States Constitution</span></a><span data-dcnode-id="5883" instrument_node="">.</span><sup class="reference" data-dcnode-id="5880" id="cite_ref-Price_122-0"><a data-dcnode-id="5881" href="#cite_note-Price-122"><span data-dcnode-id="5882" instrument_node="">[121]</span></a></sup><span data-dcnode-id="5879" instrument_node=""> The day following the ruling, Fitisemanu registered to vote, but as the ruling was stayed pending an appeal filed in the </span><a data-dcnode-id="5877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Court_of_Appeals_for_the_Tenth_Circuit" title="United States Court of Appeals for the Tenth Circuit"><span data-dcnode-id="5878" instrument_node="">United States Court of Appeals for the Tenth Circuit</span></a><span data-dcnode-id="5876" instrument_node="">, he was still unable to participate in casting a ballot.</span><sup class="reference" data-dcnode-id="5873" id="cite_ref-Pacific_Daily_News_121-1"><a data-dcnode-id="5874" href="#cite_note-Pacific_Daily_News-121"><span data-dcnode-id="5875" instrument_node="">[120]</span></a></sup><sup class="reference" data-dcnode-id="5870" id="cite_ref-Price_122-1"><a data-dcnode-id="5871" href="#cite_note-Price-122"><span data-dcnode-id="5872" instrument_node="">[121]</span></a></sup><span data-dcnode-id="5869" instrument_node=""> In 2021, a divided panel of the </span><a data-dcnode-id="5867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Court_of_Appeals_for_the_Tenth_Circuit" title="United States Court of Appeals for the Tenth Circuit"><span data-dcnode-id="5868" instrument_node="">United States Court of Appeals for the Tenth Circuit</span></a><span data-dcnode-id="5866" instrument_node=""> ruled in </span><i data-dcnode-id="5864"><span data-dcnode-id="5865" instrument_node="">Fitisemanu v. United States</span></i><span data-dcnode-id="5863" instrument_node=""> (No. 20-4017, 10th Cir. 2021) that neither the Constitution nor Supreme Court precedent demands the district court's decision, and reversed it.</span><sup class="reference" data-dcnode-id="5860" id="cite_ref-123"><a data-dcnode-id="5861" href="#cite_note-123"><span data-dcnode-id="5862" instrument_node="">[122]</span></a></sup><sup class="reference" data-dcnode-id="5857" id="cite_ref-124"><a data-dcnode-id="5858" href="#cite_note-124"><span data-dcnode-id="5859" instrument_node="">[123]</span></a></sup><span data-dcnode-id="5856" instrument_node=""> Ahead of the 2020 elections, citizens from the Virgin Islands and Guam, who had formerly lived in Hawaii, instituted an action, </span><i data-dcnode-id="5854"><span data-dcnode-id="5855" instrument_node="">Reeves v. United States</span></i><span data-dcnode-id="5853" instrument_node="">, challenging their lack of voting rights.</span><sup class="reference" data-dcnode-id="5850" id="cite_ref-VI_Consortium_125-0"><a data-dcnode-id="5851" href="#cite_note-VI_Consortium-125"><span data-dcnode-id="5852" instrument_node="">[124]</span></a></sup><span data-dcnode-id="5849" instrument_node="">
</span></p><span data-dcnode-id="5847" instrument_node="">
</span><h4 data-dcnode-id="5837"><span class="mw-headline" data-dcnode-id="5845" id="Puerto_Rico"><span data-dcnode-id="5846" instrument_node="">Puerto Rico</span></span><span class="mw-editsection" data-dcnode-id="5838"><span class="mw-editsection-bracket" data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">[</span></span><a data-dcnode-id="5841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D24" title="Edit section: Puerto Rico"><span data-dcnode-id="5842" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5839"><span data-dcnode-id="5840" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5836" instrument_node="">
</span><link data-dcnode-id="5835" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5831" role="note"><span data-dcnode-id="5834" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="5832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_rights_in_Puerto_Rico" title="Voting rights in Puerto Rico"><span data-dcnode-id="5833" instrument_node="">Voting rights in Puerto Rico</span></a></div><span data-dcnode-id="5830" instrument_node="">
</span><p data-dcnode-id="5787"><a data-dcnode-id="5828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Puerto_Rico" title="Puerto Rico"><span data-dcnode-id="5829" instrument_node="">Puerto Rico</span></a><span data-dcnode-id="5827" instrument_node=""> is an </span><a data-dcnode-id="5825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Insular_area" title="Insular area"><span data-dcnode-id="5826" instrument_node="">insular area</span></a><span data-dcnode-id="5824" instrument_node="">—a </span><a data-dcnode-id="5822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="5823" instrument_node="">United States</span></a><span data-dcnode-id="5821" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="5819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organized_territory" title="Organized territory"><span data-dcnode-id="5820" instrument_node="">territory</span></a><span data-dcnode-id="5818" instrument_node=""> that is neither a part of one of the fifty </span><a data-dcnode-id="5816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._state" title="U.S. state"><span data-dcnode-id="5817" instrument_node="">states</span></a><span data-dcnode-id="5815" instrument_node=""> nor a part of the </span><a class="mw-redirect" data-dcnode-id="5813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/District_of_Columbia" title="District of Columbia"><span data-dcnode-id="5814" instrument_node="">District of Columbia</span></a><span data-dcnode-id="5812" instrument_node="">, the nation's </span><a data-dcnode-id="5810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_district" title="Federal district"><span data-dcnode-id="5811" instrument_node="">federal district</span></a><span data-dcnode-id="5809" instrument_node="">. Insular areas, such as Puerto Rico, the </span><a class="mw-redirect" data-dcnode-id="5807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Virgin_Islands" title="U.S. Virgin Islands"><span data-dcnode-id="5808" instrument_node="">U.S. Virgin Islands</span></a><span data-dcnode-id="5806" instrument_node=""> and </span><a data-dcnode-id="5804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guam" title="Guam"><span data-dcnode-id="5805" instrument_node="">Guam</span></a><span data-dcnode-id="5803" instrument_node="">, are not allowed to choose electors in </span><a class="mw-redirect" data-dcnode-id="5801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._presidential_election" title="U.S. presidential election"><span data-dcnode-id="5802" instrument_node="">U.S. presidential elections</span></a><span data-dcnode-id="5800" instrument_node=""> or elect voting members to the </span><a class="mw-redirect" data-dcnode-id="5798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Congress" title="U.S. Congress"><span data-dcnode-id="5799" instrument_node="">U.S. Congress</span></a><span data-dcnode-id="5797" instrument_node="">. This grows out of </span><a data-dcnode-id="5795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Article_One_of_the_United_States_Constitution" title="Article One of the United States Constitution"><span data-dcnode-id="5796" instrument_node="">Article&nbsp;I</span></a><span data-dcnode-id="5794" instrument_node=""> and </span><a data-dcnode-id="5792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Article_Two_of_the_United_States_Constitution" title="Article Two of the United States Constitution"><span data-dcnode-id="5793" instrument_node="">Article&nbsp;II</span></a><span data-dcnode-id="5791" instrument_node=""> of the </span><a class="mw-redirect" data-dcnode-id="5789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Constitution" title="United States Constitution"><span data-dcnode-id="5790" instrument_node="">United States Constitution</span></a><span data-dcnode-id="5788" instrument_node="">, which specifically mandate that electors are to be chosen by "the People of the several States". In 1961, the Twenty-third Amendment extended the right to choose electors to the District of Columbia.
</span></p><p data-dcnode-id="5779"><span data-dcnode-id="5786" instrument_node="">Any </span><a class="mw-redirect" data-dcnode-id="5784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._citizen" title="U.S. citizen"><span data-dcnode-id="5785" instrument_node="">U.S. citizen</span></a><span data-dcnode-id="5783" instrument_node=""> who resides in Puerto Rico (whether a </span><a class="mw-redirect" data-dcnode-id="5781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Puerto_Rican_people" title="Puerto Rican people"><span data-dcnode-id="5782" instrument_node="">Puerto Rican</span></a><span data-dcnode-id="5780" instrument_node=""> or not) is effectively disenfranchised at the national level. Although the Republican Party and Democratic Party chapters in Puerto Rico have selected voting delegates to the national nominating conventions participating in U.S. presidential primaries or caucuses, U.S. citizens not residing in one of the 50 states or in the District of Columbia may not vote in federal elections.
</span></p><p data-dcnode-id="5767"><span data-dcnode-id="5778" instrument_node="">Various scholars (including a prominent U.S. judge in the </span><a data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Court_of_Appeals_for_the_First_Circuit" title="United States Court of Appeals for the First Circuit"><span data-dcnode-id="5777" instrument_node="">United States Court of Appeals for the First Circuit</span></a><span data-dcnode-id="5775" instrument_node="">) conclude that the U.S. national-electoral process is not fully democratic due to U.S. government disenfranchisement of U.S. citizens residing in Puerto Rico.</span><sup class="reference" data-dcnode-id="5772" id="cite_ref-126"><a data-dcnode-id="5773" href="#cite_note-126"><span data-dcnode-id="5774" instrument_node="">[125]</span></a></sup><sup class="reference" data-dcnode-id="5769" id="cite_ref-127"><a data-dcnode-id="5770" href="#cite_note-127"><span data-dcnode-id="5771" instrument_node="">[126]</span></a></sup><span data-dcnode-id="5768" instrument_node="">
</span></p><p data-dcnode-id="5739"><span data-dcnode-id="5766" instrument_node="">As of 2010</span><sup class="plainlinks noexcerpt noprint asof-tag update" data-dcnode-id="5763" style="display:none;"><a class="external text" data-dcnode-id="5764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit"><span data-dcnode-id="5765" instrument_node="">[update]</span></a></sup><span data-dcnode-id="5762" instrument_node="">, under </span><i data-dcnode-id="5760"><span data-dcnode-id="5761" instrument_node="">Igartúa v. United States</span></i><span data-dcnode-id="5759" instrument_node="">, the </span><a data-dcnode-id="5757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Covenant_on_Civil_and_Political_Rights" title="International Covenant on Civil and Political Rights"><span data-dcnode-id="5758" instrument_node="">International Covenant on Civil and Political Rights</span></a><span data-dcnode-id="5756" instrument_node=""> (ICCPR) is judicially considered not to be </span><a data-dcnode-id="5754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-executing_rule" title="Self-executing rule"><span data-dcnode-id="5755" instrument_node="">self-executing</span></a><span data-dcnode-id="5753" instrument_node="">, and therefore requires further legislative action to put it into effect domestically. Judge </span><a data-dcnode-id="5751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kermit_Lipez" title="Kermit Lipez"><span data-dcnode-id="5752" instrument_node="">Kermit Lipez</span></a><span data-dcnode-id="5750" instrument_node=""> wrote in a concurring opinion, however, that the </span><a data-dcnode-id="5748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/En_banc" title="En banc"><span data-dcnode-id="5749" instrument_node="">en banc</span></a><span data-dcnode-id="5747" instrument_node=""> majority's conclusion that the ICCPR is non-self-executing is ripe for reconsideration in a new en banc proceeding, and that if issues highlighted in a partial dissent by Judge </span><a data-dcnode-id="5745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Juan_R._Torruella" title="Juan R. Torruella"><span data-dcnode-id="5746" instrument_node="">Juan R. Torruella</span></a><span data-dcnode-id="5744" instrument_node=""> were to be decided in favor of the plaintiffs, United States citizens residing in Puerto Rico would have a viable claim to equal voting rights .</span><sup class="reference" data-dcnode-id="5741" id="cite_ref-iguartia_117-1"><a data-dcnode-id="5742" href="#cite_note-iguartia-117"><span data-dcnode-id="5743" instrument_node="">[116]</span></a></sup><span data-dcnode-id="5740" instrument_node="">
</span></p><p data-dcnode-id="5730"><span data-dcnode-id="5738" instrument_node="">Congress has in fact acted in partial compliance with its obligations under the ICCPR when, in 1961, just a few years after the </span><a data-dcnode-id="5736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="5737" instrument_node="">United Nations</span></a><span data-dcnode-id="5735" instrument_node=""> first ratified the ICCPR, it amended our fundamental charter to allow the United States citizens who reside in the District of Columbia to vote for the Executive offices. See U.S. Constitutional Amendment XXIII.51. Indeed, a bill is now pending in Congress that would treat the District of Columbia as "a congressional district for purposes of representation in the House of Representatives", and permit United States citizens residing in the capitol to vote for members of the House of Representatives. See District of Columbia House Voting Rights Act, S.160, 111th Congress (passed by the Senate, February 26, 2009) (2009).52  However, the United States has not taken similar "steps" with regard to the five million United States citizens who reside in the other U.S. territories, of which close to four million are residents of Puerto Rico. This inaction is in clear violation of the United States' obligations under the ICCPR".</span><sup class="reference" data-dcnode-id="5732" id="cite_ref-iguartia_117-2"><a data-dcnode-id="5733" href="#cite_note-iguartia-117"><span data-dcnode-id="5734" instrument_node="">[116]</span></a></sup><span data-dcnode-id="5731" instrument_node="">
</span></p><span data-dcnode-id="5729" instrument_node="">
</span><h2 data-dcnode-id="5719"><span class="mw-headline" data-dcnode-id="5727" id="Accessibility"><span data-dcnode-id="5728" instrument_node="">Accessibility</span></span><span class="mw-editsection" data-dcnode-id="5720"><span class="mw-editsection-bracket" data-dcnode-id="5725"><span data-dcnode-id="5726" instrument_node="">[</span></span><a data-dcnode-id="5723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D25" title="Edit section: Accessibility"><span data-dcnode-id="5724" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5721"><span data-dcnode-id="5722" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5718" instrument_node="">
</span><p data-dcnode-id="5707"><span data-dcnode-id="5717" instrument_node="">Federal legislation such as the </span><a data-dcnode-id="5715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Americans_with_Disabilities_Act_of_1990" title="Americans with Disabilities Act of 1990"><span data-dcnode-id="5716" instrument_node="">Americans with Disabilities Act of 1990</span></a><span data-dcnode-id="5714" instrument_node=""> (ADA), the </span><a data-dcnode-id="5712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Voter_Registration_Act_of_1993" title="National Voter Registration Act of 1993"><span data-dcnode-id="5713" instrument_node="">National Voter Registration Act of 1993</span></a><span data-dcnode-id="5711" instrument_node=""> (NVRA, or "Motor-Voter Act") and the </span><a class="mw-redirect" data-dcnode-id="5709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help_America_Vote_Act_of_2002" title="Help America Vote Act of 2002"><span data-dcnode-id="5710" instrument_node="">Help America Vote Act of 2002</span></a><span data-dcnode-id="5708" instrument_node=""> (HAVA) help to address some of the concerns of disabled and non-English speaking voters in the United States.
</span></p><p data-dcnode-id="5698"><span data-dcnode-id="5706" instrument_node="">Some studies have shown that polling places are inaccessible to disabled voters.</span><sup class="reference" data-dcnode-id="5703" id="cite_ref-accessiblesociety.org_128-0"><a data-dcnode-id="5704" href="#cite_note-accessiblesociety.org-128"><span data-dcnode-id="5705" instrument_node="">[127]</span></a></sup><span data-dcnode-id="5702" instrument_node=""> The </span><a data-dcnode-id="5700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Election_Commission" title="Federal Election Commission"><span data-dcnode-id="5701" instrument_node="">Federal Election Commission</span></a><span data-dcnode-id="5699" instrument_node=""> reported that, in violation of state and federal laws, more than 20,000 polling places across the nation are inaccessible, depriving people with disabilities of their fundamental right to vote.
</span></p><p data-dcnode-id="5686"><span data-dcnode-id="5697" instrument_node="">In 1999, the </span><a data-dcnode-id="5695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attorney_General_of_New_York" title="Attorney General of New York"><span data-dcnode-id="5696" instrument_node="">Attorney General of the State of New York</span></a><span data-dcnode-id="5694" instrument_node=""> ran a check of polling places around the state to see if they were accessible to voters with disabilities and found many problems. A study of three </span><a data-dcnode-id="5692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Upstate_New_York" title="Upstate New York"><span data-dcnode-id="5693" instrument_node="">upstate counties of New York</span></a><span data-dcnode-id="5691" instrument_node=""> found fewer than 10 percent of polling places fully compliant with state and federal laws.</span><sup class="reference" data-dcnode-id="5688" id="cite_ref-129"><a data-dcnode-id="5689" href="#cite_note-129"><span data-dcnode-id="5690" instrument_node="">[128]</span></a></sup><span data-dcnode-id="5687" instrument_node="">
</span></p><p data-dcnode-id="5670"><span data-dcnode-id="5685" instrument_node="">Many polling booths are set in church basements or in upstairs meeting halls where there are no ramps or elevators. This means problems not just for people who use </span><a data-dcnode-id="5683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wheelchair" title="Wheelchair"><span data-dcnode-id="5684" instrument_node="">wheelchairs</span></a><span data-dcnode-id="5682" instrument_node="">, but for people using canes or walkers too. And in most states people who are blind do not have access to </span><a data-dcnode-id="5680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Braille" title="Braille"><span data-dcnode-id="5681" instrument_node="">Braille</span></a><span data-dcnode-id="5679" instrument_node=""> ballot to vote; they have to bring someone along to vote for them. Studies have shown that people with disabilities are more interested in government and public affairs than most and are more eager to participate in the democratic process.
</span><sup class="reference" data-dcnode-id="5676" id="cite_ref-accessiblesociety.org_128-1"><a data-dcnode-id="5677" href="#cite_note-accessiblesociety.org-128"><span data-dcnode-id="5678" instrument_node="">[127]</span></a></sup><span data-dcnode-id="5675" instrument_node=""> Many election officials urge people with disabilities to vote absentee, however some disabled individuals see this as an inferior form of participation.</span><sup class="reference" data-dcnode-id="5672" id="cite_ref-130"><a data-dcnode-id="5673" href="#cite_note-130"><span data-dcnode-id="5674" instrument_node="">[129]</span></a></sup><span data-dcnode-id="5671" instrument_node="">
</span></p><p data-dcnode-id="5661"><span data-dcnode-id="5669" instrument_node="">Voter turnout is lower among the disabled. In the </span><a data-dcnode-id="5667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2012_United_States_presidential_election" title="2012 United States presidential election"><span data-dcnode-id="5668" instrument_node="">2012 United States presidential election</span></a><span data-dcnode-id="5666" instrument_node=""> 56.8% of people with disabilities reported voting, compared to the 62.5% of eligible citizens without disabilities.</span><sup class="reference" data-dcnode-id="5663" id="cite_ref-131"><a data-dcnode-id="5664" href="#cite_note-131"><span data-dcnode-id="5665" instrument_node="">[130]</span></a></sup><span data-dcnode-id="5662" instrument_node="">
</span></p><span data-dcnode-id="5660" instrument_node="">
</span><h2 data-dcnode-id="5650"><span class="mw-headline" data-dcnode-id="5658" id="Candidacy_requirements"><span data-dcnode-id="5659" instrument_node="">Candidacy requirements</span></span><span class="mw-editsection" data-dcnode-id="5651"><span class="mw-editsection-bracket" data-dcnode-id="5656"><span data-dcnode-id="5657" instrument_node="">[</span></span><a data-dcnode-id="5654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D26" title="Edit section: Candidacy requirements"><span data-dcnode-id="5655" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5652"><span data-dcnode-id="5653" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5649" instrument_node="">
</span><p data-dcnode-id="5644"><span data-dcnode-id="5648" instrument_node="">Jurisprudence concerning candidacy rights and the rights of citizens to create a political party are less clear than voting rights. Different courts have reached different conclusions regarding what sort of restrictions, often in terms of </span><a data-dcnode-id="5646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballot_access" title="Ballot access"><span data-dcnode-id="5647" instrument_node="">ballot access</span></a><span data-dcnode-id="5645" instrument_node="">, public debate inclusion, filing fees, and residency requirements, may be imposed.
</span></p><p data-dcnode-id="5632"><span data-dcnode-id="5643" instrument_node="">In </span><i data-dcnode-id="5640"><a data-dcnode-id="5641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Williams_v._Rhodes" title="Williams v. Rhodes"><span data-dcnode-id="5642" instrument_node="">Williams v. Rhodes</span></a></i><span data-dcnode-id="5639" instrument_node=""> (1968), the United States Supreme Court struck down </span><a data-dcnode-id="5637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ohio" title="Ohio"><span data-dcnode-id="5638" instrument_node="">Ohio</span></a><span data-dcnode-id="5636" instrument_node=""> ballot access laws on </span><a data-dcnode-id="5634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Amendment_to_the_United_States_Constitution" title="First Amendment to the United States Constitution"><span data-dcnode-id="5635" instrument_node="">First</span></a><span data-dcnode-id="5633" instrument_node=""> and Fourteenth Amendment grounds. However, it subsequently upheld such laws in several other cases. States can require an independent or minor party candidate to collect signatures as high as five percent of the total votes cast in a particular preceding election before the court will intervene.
</span></p><p data-dcnode-id="5627"><span data-dcnode-id="5631" instrument_node="">The Supreme Court has also upheld a state ban on cross-party endorsements (also known as </span><a data-dcnode-id="5629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_fusion" title="Electoral fusion"><span data-dcnode-id="5630" instrument_node="">electoral fusion</span></a><span data-dcnode-id="5628" instrument_node="">) and primary write-in votes.
</span></p><span data-dcnode-id="5626" instrument_node="">
</span><h2 data-dcnode-id="5616"><span class="mw-headline" data-dcnode-id="5624" id="Noncitizen_voting"><span data-dcnode-id="5625" instrument_node="">Noncitizen voting</span></span><span class="mw-editsection" data-dcnode-id="5617"><span class="mw-editsection-bracket" data-dcnode-id="5622"><span data-dcnode-id="5623" instrument_node="">[</span></span><a data-dcnode-id="5620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D27" title="Edit section: Noncitizen voting"><span data-dcnode-id="5621" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5618"><span data-dcnode-id="5619" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5615" instrument_node="">
</span><link data-dcnode-id="5614" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5610" role="note"><span data-dcnode-id="5613" instrument_node="">Main article: </span><a data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_of_foreigners_to_vote_in_the_United_States" title="Right of foreigners to vote in the United States"><span data-dcnode-id="5612" instrument_node="">Right of foreigners to vote in the United States</span></a></div><span data-dcnode-id="5609" instrument_node="">
</span><link data-dcnode-id="5608" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5601" role="note"><span data-dcnode-id="5607" instrument_node="">See also: </span><a data-dcnode-id="5605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Citizenship_Clause" title="Citizenship Clause"><span data-dcnode-id="5606" instrument_node="">Citizenship Clause</span></a><span data-dcnode-id="5604" instrument_node=""> and </span><a data-dcnode-id="5602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minor_v._Happersett" title="Minor v. Happersett"><span data-dcnode-id="5603" instrument_node="">Minor v. Happersett</span></a></div><span data-dcnode-id="5600" instrument_node="">
</span><p data-dcnode-id="5564"><span data-dcnode-id="5599" instrument_node="">More than 40 states or territories, including colonies before the </span><a data-dcnode-id="5597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Declaration_of_Independence" title="United States Declaration of Independence"><span data-dcnode-id="5598" instrument_node="">Declaration of Independence</span></a><span data-dcnode-id="5596" instrument_node="">, have at some time allowed noncitizens who satisfied residential requirements to vote in some or all elections. This in part reflected the strong continuing immigration to the United States. Some cities like </span><a data-dcnode-id="5594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chicago" title="Chicago"><span data-dcnode-id="5595" instrument_node="">Chicago</span></a><span data-dcnode-id="5593" instrument_node="">, towns or villages (in Maryland) today allow noncitizen residents to vote in school or local elections.</span><sup class="reference" data-dcnode-id="5590" id="cite_ref-raskin1993_132-0"><a data-dcnode-id="5591" href="#cite_note-raskin1993-132"><span data-dcnode-id="5592" instrument_node="">[131]</span></a></sup><sup class="reference" data-dcnode-id="5587" id="cite_ref-williamson1960_57-1"><a data-dcnode-id="5588" href="#cite_note-williamson1960-57"><span data-dcnode-id="5589" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="5584" id="cite_ref-hayduk2006_133-0"><a data-dcnode-id="5585" href="#cite_note-hayduk2006-133"><span data-dcnode-id="5586" instrument_node="">[132]</span></a></sup><sup class="reference" data-dcnode-id="5581" id="cite_ref-134"><a data-dcnode-id="5582" href="#cite_note-134"><span data-dcnode-id="5583" instrument_node="">[Note 2]</span></a></sup><span data-dcnode-id="5580" instrument_node=""> In 1875, the Supreme Court in </span><i data-dcnode-id="5577"><a data-dcnode-id="5578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minor_v._Happersett" title="Minor v. Happersett"><span data-dcnode-id="5579" instrument_node="">Minor v. Happersett</span></a></i><span data-dcnode-id="5576" instrument_node=""> noted that "citizenship has not in all cases been made a condition precedent to the enjoyment of the right of suffrage. Thus, in Missouri, persons of foreign birth, who have declared their intention to become citizens of the United States, may under certain circumstances vote".</span><sup class="reference" data-dcnode-id="5573" id="cite_ref-135"><a data-dcnode-id="5574" href="#cite_note-135"><span data-dcnode-id="5575" instrument_node="">[133]</span></a></sup><span data-dcnode-id="5572" instrument_node=""> Federal law prohibits </span><a class="mw-redirect" data-dcnode-id="5570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Citizenship_in_the_United_States" title="Citizenship in the United States"><span data-dcnode-id="5571" instrument_node="">noncitizens</span></a><span data-dcnode-id="5569" instrument_node=""> from voting in federal elections.</span><sup class="reference" data-dcnode-id="5566" id="cite_ref-136"><a data-dcnode-id="5567" href="#cite_note-136"><span data-dcnode-id="5568" instrument_node="">[134]</span></a></sup><span data-dcnode-id="5565" instrument_node="">
</span></p><span data-dcnode-id="5563" instrument_node="">
