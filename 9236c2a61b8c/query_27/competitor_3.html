</span><a class="image" data-dcnode-id="8975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_coloured_voting_box.svg"><img alt="A coloured voting box.svg" class="noviewer" data-dcnode-id="8976" data-file-height="160" data-file-width="160" decoding="async" height="16" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/0/01/A_coloured_voting_box.svg/16px-A_coloured_voting_box.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/0/01/A_coloured_voting_box.svg/24px-A_coloured_voting_box.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/0/01/A_coloured_voting_box.svg/32px-A_coloured_voting_box.svg.png 2x" width="16"></a><span data-dcnode-id="8974" instrument_node="">&nbsp;</span><a data-dcnode-id="8972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portal%3APolitics" title="Portal:Politics"><span data-dcnode-id="8973" instrument_node="">Politics portal</span></a></td></tr><tr data-dcnode-id="8953"><td class="sidebar-navbar" data-dcnode-id="8954"><link data-dcnode-id="8969" href="mw-data:TemplateStyles:r1063604349" rel="mw-deduplicated-inline-style"><div class="navbar plainlinks hlist navbar-mini" data-dcnode-id="8955"><ul data-dcnode-id="8956"><li class="nv-view" data-dcnode-id="8965"><a data-dcnode-id="8966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3AVoting" title="Template:Voting"><abbr data-dcnode-id="8967" title="View this template"><span data-dcnode-id="8968" instrument_node="">v</span></abbr></a></li><li class="nv-talk" data-dcnode-id="8961"><a data-dcnode-id="8962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template_talk%3AVoting" title="Template talk:Voting"><abbr data-dcnode-id="8963" title="Discuss this template"><span data-dcnode-id="8964" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="8957"><a class="external text" data-dcnode-id="8958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3AVoting%26action%3Dedit"><abbr data-dcnode-id="8959" title="Edit this template"><span data-dcnode-id="8960" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="8950" instrument_node="">
</span><p data-dcnode-id="8940"><b data-dcnode-id="8948"><span data-dcnode-id="8949" instrument_node="">Voting rights in the United States</span></b><span data-dcnode-id="8947" instrument_node="">, specifically the </span><a data-dcnode-id="8945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suffrage" title="Suffrage"><span data-dcnode-id="8946" instrument_node="">enfranchisement and disenfranchisement</span></a><span data-dcnode-id="8944" instrument_node=""> of different groups, has been a moral and political issue throughout </span><a data-dcnode-id="8942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_United_States" title="History of the United States"><span data-dcnode-id="8943" instrument_node="">United States history</span></a><span data-dcnode-id="8941" instrument_node="">.
</span></p><p data-dcnode-id="8898"><span data-dcnode-id="8939" instrument_node="">Eligibility to vote in the </span><a data-dcnode-id="8937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="8938" instrument_node="">United States</span></a><span data-dcnode-id="8936" instrument_node=""> is governed by the </span><a class="mw-redirect" data-dcnode-id="8934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Constitution" title="United States Constitution"><span data-dcnode-id="8935" instrument_node="">United States Constitution</span></a><span data-dcnode-id="8933" instrument_node=""> and by federal and state laws. Several constitutional amendments (the </span><a data-dcnode-id="8931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fifteenth_Amendment_to_the_United_States_Constitution" title="Fifteenth Amendment to the United States Constitution"><span data-dcnode-id="8932" instrument_node="">Fifteenth</span></a><span data-dcnode-id="8930" instrument_node="">, </span><a data-dcnode-id="8928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nineteenth_Amendment_to_the_United_States_Constitution" title="Nineteenth Amendment to the United States Constitution"><span data-dcnode-id="8929" instrument_node="">Nineteenth</span></a><span data-dcnode-id="8927" instrument_node="">, and </span><a data-dcnode-id="8925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twenty-sixth_Amendment_to_the_United_States_Constitution" title="Twenty-sixth Amendment to the United States Constitution"><span data-dcnode-id="8926" instrument_node="">Twenty-sixth</span></a><span data-dcnode-id="8924" instrument_node=""> specifically) require that voting rights of U.S. citizens cannot be abridged on account of race, color, previous condition of servitude, sex, or age (18 and older); the constitution as originally written did not establish any such rights during 1787–1870, except that if a state permitted a person to vote for the "most numerous branch" of its state legislature, it was required to permit that person to vote in elections for members of the </span><a data-dcnode-id="8922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="8923" instrument_node="">United States House of Representatives</span></a><span data-dcnode-id="8921" instrument_node="">.</span><sup class="reference" data-dcnode-id="8918" id="cite_ref-1"><a data-dcnode-id="8919" href="#cite_note-1"><span data-dcnode-id="8920" instrument_node="">[1]</span></a></sup><span data-dcnode-id="8917" instrument_node=""> In the absence of a specific federal law or constitutional provision, each state is given considerable discretion to establish qualifications for suffrage and candidacy within its own respective jurisdiction; in addition, states and lower level jurisdictions establish election systems, such as </span><a data-dcnode-id="8915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/At-large" title="At-large"><span data-dcnode-id="8916" instrument_node="">at-large</span></a><span data-dcnode-id="8914" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="8912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Single_member_district" title="Single member district"><span data-dcnode-id="8913" instrument_node="">single member district</span></a><span data-dcnode-id="8911" instrument_node=""> elections for </span><a data-dcnode-id="8909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/County_council" title="County council"><span data-dcnode-id="8910" instrument_node="">county councils</span></a><span data-dcnode-id="8908" instrument_node=""> or </span><a class="mw-redirect" data-dcnode-id="8906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/School_board" title="School board"><span data-dcnode-id="8907" instrument_node="">school boards</span></a><span data-dcnode-id="8905" instrument_node="">. Beyond qualifications for suffrage, rules and regulations concerning voting (such as the </span><a class="mw-redirect" data-dcnode-id="8903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poll_tax_%28United_States%29" title="Poll tax (United States)"><span data-dcnode-id="8904" instrument_node="">poll tax</span></a><span data-dcnode-id="8902" instrument_node="">) have been contested since the advent of </span><a data-dcnode-id="8900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Crow_laws" title="Jim Crow laws"><span data-dcnode-id="8901" instrument_node="">Jim Crow laws</span></a><span data-dcnode-id="8899" instrument_node=""> and related provisions that indirectly disenfranchised racial minorities.
</span></p><p data-dcnode-id="8844"><span data-dcnode-id="8897" instrument_node="">A historic turning point was the 1964 </span><a data-dcnode-id="8895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_the_United_States" title="Supreme Court of the United States"><span data-dcnode-id="8896" instrument_node="">Supreme Court</span></a><span data-dcnode-id="8894" instrument_node=""> case </span><i data-dcnode-id="8891"><a data-dcnode-id="8892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reynolds_v._Sims" title="Reynolds v. Sims"><span data-dcnode-id="8893" instrument_node="">Reynolds v. Sims</span></a></i><span data-dcnode-id="8890" instrument_node=""> that ruled both houses of all state legislatures had to be based on electoral districts that were approximately equal in population size, under the "</span><a data-dcnode-id="8888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/One_man%2C_one_vote" title="One man, one vote"><span data-dcnode-id="8889" instrument_node="">one man, one vote</span></a><span data-dcnode-id="8887" instrument_node="">" principle.</span><sup class="reference" data-dcnode-id="8884" id="cite_ref-:0_2-0"><a data-dcnode-id="8885" href="#cite_note-:0-2"><span data-dcnode-id="8886" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="8881" id="cite_ref-:1_3-0"><a data-dcnode-id="8882" href="#cite_note-:1-3"><span data-dcnode-id="8883" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="8878" id="cite_ref-:2_4-0"><a data-dcnode-id="8879" href="#cite_note-:2-4"><span data-dcnode-id="8880" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8877" instrument_node=""> The </span><a data-dcnode-id="8875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warren_Court" title="Warren Court"><span data-dcnode-id="8876" instrument_node="">Warren Court</span></a><span data-dcnode-id="8874" instrument_node="">'s decisions on two previous landmark cases—</span><i data-dcnode-id="8870"><a data-dcnode-id="8872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baker_v._Carr" title="Baker v. Carr"><span data-dcnode-id="8873" instrument_node="">Baker v. Carr</span></a><span data-dcnode-id="8871" instrument_node=""> (1962)</span></i><span data-dcnode-id="8869" instrument_node=""> and </span><i data-dcnode-id="8865"><a data-dcnode-id="8867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wesberry_v._Sanders" title="Wesberry v. Sanders"><span data-dcnode-id="8868" instrument_node="">Wesberry v. Sanders</span></a><span data-dcnode-id="8866" instrument_node=""> (1964)</span></i><span data-dcnode-id="8864" instrument_node="">—also played a fundamental role in establishing the nationwide "one man, one vote" </span><a data-dcnode-id="8862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Electoral_College" title="United States Electoral College"><span data-dcnode-id="8863" instrument_node="">electoral system</span></a><span data-dcnode-id="8861" instrument_node="">.</span><sup class="reference" data-dcnode-id="8858" id="cite_ref-:3_5-0"><a data-dcnode-id="8859" href="#cite_note-:3-5"><span data-dcnode-id="8860" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="8855" id="cite_ref-:4_6-0"><a data-dcnode-id="8856" href="#cite_note-:4-6"><span data-dcnode-id="8857" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8854" instrument_node=""> Since the </span><a data-dcnode-id="8852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_Rights_Act_of_1965" title="Voting Rights Act of 1965"><span data-dcnode-id="8853" instrument_node="">Voting Rights Act of 1965</span></a><span data-dcnode-id="8851" instrument_node="">, the </span><a data-dcnode-id="8849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twenty-fourth_Amendment_to_the_United_States_Constitution" title="Twenty-fourth Amendment to the United States Constitution"><span data-dcnode-id="8850" instrument_node="">Twenty-fourth Amendment</span></a><span data-dcnode-id="8848" instrument_node="">, and related laws, voting rights have been legally considered an issue related to election systems. In 1972, the </span><a data-dcnode-id="8846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Burger_Court" title="Burger Court"><span data-dcnode-id="8847" instrument_node="">Burger Court</span></a><span data-dcnode-id="8845" instrument_node=""> ruled that state legislatures had to redistrict every ten years based on census results; at that point, many had not redistricted for decades, often leading to a rural bias.
</span></p><p data-dcnode-id="8830"><span data-dcnode-id="8843" instrument_node="">In cases of county or municipal elections, </span><a data-dcnode-id="8841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/At-large" title="At-large"><span data-dcnode-id="8842" instrument_node="">at-large</span></a><span data-dcnode-id="8840" instrument_node=""> voting has been repeatedly challenged when found to dilute the voting power of significant minorities in violation of the Voting Rights Act. In the early 20th century, numerous cities established small commission forms of government in the belief that "better government" could result from the suppression of ward politics. Commissioners were elected by the majority of voters, excluding candidates who could not afford large campaigns or who appealed to a minority. Generally the solution to such violations has been to adopt </span><a data-dcnode-id="8838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Single-member_district" title="Single-member district"><span data-dcnode-id="8839" instrument_node="">single-member districts</span></a><span data-dcnode-id="8837" instrument_node=""> (SMDs), but alternative election systems, such as </span><a data-dcnode-id="8835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Limited_voting" title="Limited voting"><span data-dcnode-id="8836" instrument_node="">limited voting</span></a><span data-dcnode-id="8834" instrument_node=""> or </span><a data-dcnode-id="8832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cumulative_voting" title="Cumulative voting"><span data-dcnode-id="8833" instrument_node="">cumulative voting</span></a><span data-dcnode-id="8831" instrument_node="">, have also been used since the late 20th century to correct for dilution of voting power and enable minorities to elect candidates of their choice.
</span></p><p data-dcnode-id="8803"><span data-dcnode-id="8829" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="8827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/District_of_Columbia" title="District of Columbia"><span data-dcnode-id="8828" instrument_node="">District of Columbia</span></a><span data-dcnode-id="8826" instrument_node=""> and five major </span><a data-dcnode-id="8824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Territories_of_the_United_States" title="Territories of the United States"><span data-dcnode-id="8825" instrument_node="">territories of the United States</span></a><span data-dcnode-id="8823" instrument_node=""> have </span><a data-dcnode-id="8821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-voting_members_of_the_United_States_House_of_Representatives" title="Non-voting members of the United States House of Representatives"><span data-dcnode-id="8822" instrument_node="">one non-voting member</span></a><span data-dcnode-id="8820" instrument_node=""> each (in the </span><a data-dcnode-id="8818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="8819" instrument_node="">United States House of Representatives</span></a><span data-dcnode-id="8817" instrument_node="">) and no representation in the </span><a data-dcnode-id="8815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Senate" title="United States Senate"><span data-dcnode-id="8816" instrument_node="">United States Senate</span></a><span data-dcnode-id="8814" instrument_node="">. People in the U.S. territories cannot vote for </span><a data-dcnode-id="8812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="8813" instrument_node="">president of the United States</span></a><span data-dcnode-id="8811" instrument_node="">.</span><sup class="reference" data-dcnode-id="8808" id="cite_ref-Territories_vote_7-0"><a data-dcnode-id="8809" href="#cite_note-Territories_vote-7"><span data-dcnode-id="8810" instrument_node="">[7]</span></a></sup><span data-dcnode-id="8807" instrument_node=""> People in the District of Columbia can vote for the president because of the </span><a data-dcnode-id="8805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twenty-third_Amendment_to_the_United_States_Constitution" title="Twenty-third Amendment to the United States Constitution"><span data-dcnode-id="8806" instrument_node="">Twenty-third Amendment</span></a><span data-dcnode-id="8804" instrument_node="">.
</span></p><span data-dcnode-id="8802" instrument_node="">

</span><h2 data-dcnode-id="8484"><span class="mw-headline" data-dcnode-id="8492" id="Background"><span data-dcnode-id="8493" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="8485"><span class="mw-editsection-bracket" data-dcnode-id="8490"><span data-dcnode-id="8491" instrument_node="">[</span></span><a data-dcnode-id="8488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D1" title="Edit section: Background"><span data-dcnode-id="8489" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8486"><span data-dcnode-id="8487" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8483" instrument_node="">
</span><p data-dcnode-id="8464"><span data-dcnode-id="8482" instrument_node="">The right to vote is the foundation of any democracy. Chief Justice </span><a data-dcnode-id="8480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earl_Warren" title="Earl Warren"><span data-dcnode-id="8481" instrument_node="">Earl Warren</span></a><span data-dcnode-id="8479" instrument_node="">, for example, wrote in </span><i data-dcnode-id="8476"><a data-dcnode-id="8477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reynolds_v._Sims" title="Reynolds v. Sims"><span data-dcnode-id="8478" instrument_node="">Reynolds v. Sims</span></a></i><span data-dcnode-id="8475" instrument_node="">, 377 U.S. 533, 555 (1964): "The right to vote freely for the candidate of one’s choice is of the essence of a democratic society, and any restrictions on that right strike at the heart of </span><a data-dcnode-id="8473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representative_democracy" title="Representative democracy"><span data-dcnode-id="8474" instrument_node="">representative government</span></a><span data-dcnode-id="8472" instrument_node="">. [...] Undoubtedly, the right of suffrage is a fundamental matter in a free and democratic society. Especially since the right to exercise the franchise in a free and unimpaired manner is preservative of other basic civil and political rights, any alleged infringement of the right of citizens to vote must be carefully and meticulously scrutinized." Justice </span><a data-dcnode-id="8470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hugo_Black" title="Hugo Black"><span data-dcnode-id="8471" instrument_node="">Hugo Black</span></a><span data-dcnode-id="8469" instrument_node=""> shared the same sentiment by stating in </span><i data-dcnode-id="8466"><a data-dcnode-id="8467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wesberry_v._Sanders" title="Wesberry v. Sanders"><span data-dcnode-id="8468" instrument_node="">Wesberry v. Sanders</span></a></i><span data-dcnode-id="8465" instrument_node="">, 376 U.S. 1, 17 (1964): "No right is more precious in a free country than that of having a voice in the election of those who make the laws under which, as good citizens, we must live. Other rights, even the most basic, are illusory if the right to vote is undermined."
</span></p><p data-dcnode-id="8362"><span data-dcnode-id="8463" instrument_node="">In the </span><a data-dcnode-id="8461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thirteen_Colonies%2317th_century" title="Thirteen Colonies"><span data-dcnode-id="8462" instrument_node="">17th-century Thirteen Colonies</span></a><span data-dcnode-id="8460" instrument_node="">, </span><a data-dcnode-id="8458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suffrage" title="Suffrage"><span data-dcnode-id="8459" instrument_node="">suffrage</span></a><span data-dcnode-id="8457" instrument_node=""> was often restricted by </span><a data-dcnode-id="8455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Property_qualification" title="Property qualification"><span data-dcnode-id="8456" instrument_node="">property qualifications</span></a><span data-dcnode-id="8454" instrument_node=""> or with a </span><a data-dcnode-id="8452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Religious_test" title="Religious test"><span data-dcnode-id="8453" instrument_node="">religious test</span></a><span data-dcnode-id="8451" instrument_node="">. In 1660, </span><a data-dcnode-id="8449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plymouth_Colony" title="Plymouth Colony"><span data-dcnode-id="8450" instrument_node="">Plymouth Colony</span></a><span data-dcnode-id="8448" instrument_node=""> restricted suffrage with a specified property qualification, and in 1671, Plymouth Colony restricted suffrage further to only </span><a data-dcnode-id="8446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freeman_%28Colonial%29" title="Freeman (Colonial)"><span data-dcnode-id="8447" instrument_node="">freemen</span></a><span data-dcnode-id="8445" instrument_node=""> "</span><a data-dcnode-id="8443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Puritans" title="Puritans"><span data-dcnode-id="8444" instrument_node="">orthodox in the fundamentals of religion</span></a><span data-dcnode-id="8442" instrument_node="">". </span><a data-dcnode-id="8440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Connecticut_Colony" title="Connecticut Colony"><span data-dcnode-id="8441" instrument_node="">Connecticut</span></a><span data-dcnode-id="8439" instrument_node=""> in mid-century also restricted suffrage with a specified property qualification and a religious test, and in </span><a data-dcnode-id="8437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Province_of_Pennsylvania" title="Province of Pennsylvania"><span data-dcnode-id="8438" instrument_node="">Pennsylvania</span></a><span data-dcnode-id="8436" instrument_node="">, the </span><a data-dcnode-id="8434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Province_of_Carolina" title="Province of Carolina"><span data-dcnode-id="8435" instrument_node="">Province of Carolina</span></a><span data-dcnode-id="8433" instrument_node="">, and the </span><a data-dcnode-id="8431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colony_of_Rhode_Island_and_Providence_Plantations" title="Colony of Rhode Island and Providence Plantations"><span data-dcnode-id="8432" instrument_node="">Colony of Rhode Island and Providence Plantations</span></a><span data-dcnode-id="8430" instrument_node=""> voting rights were </span><a data-dcnode-id="8428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_antisemitism_in_the_United_States%23Colonial_era" title="History of antisemitism in the United States"><span data-dcnode-id="8429" instrument_node="">restricted to Christians only</span></a><span data-dcnode-id="8427" instrument_node="">. Under the </span><a data-dcnode-id="8425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Duke%2527s_Laws" title="The Duke's Laws"><span data-dcnode-id="8426" instrument_node="">Duke's Laws</span></a><span data-dcnode-id="8424" instrument_node=""> in colonial </span><a data-dcnode-id="8422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Province_of_New_York" title="Province of New York"><span data-dcnode-id="8423" instrument_node="">New York</span></a><span data-dcnode-id="8421" instrument_node="">, suffrage did not require a religious test but was restricted to </span><a data-dcnode-id="8419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_tenure" title="Land tenure"><span data-dcnode-id="8420" instrument_node="">landholders</span></a><span data-dcnode-id="8418" instrument_node="">. In </span><a data-dcnode-id="8416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colony_of_Virginia" title="Colony of Virginia"><span data-dcnode-id="8417" instrument_node="">Virginia</span></a><span data-dcnode-id="8415" instrument_node="">, all </span><a data-dcnode-id="8413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_Americans" title="White Americans"><span data-dcnode-id="8414" instrument_node="">white</span></a><span data-dcnode-id="8412" instrument_node=""> </span><a data-dcnode-id="8410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freeman_%28Colonial%29" title="Freeman (Colonial)"><span data-dcnode-id="8411" instrument_node="">freemen</span></a><span data-dcnode-id="8409" instrument_node=""> were allowed to vote until suffrage was restricted temporarily to </span><a data-dcnode-id="8407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Household%23Government_definitions" title="Household"><span data-dcnode-id="8408" instrument_node="">householders</span></a><span data-dcnode-id="8406" instrument_node=""> from 1655 to 1656, to </span><a data-dcnode-id="8404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freehold_%28law%29" title="Freehold (law)"><span data-dcnode-id="8405" instrument_node="">freeholders</span></a><span data-dcnode-id="8403" instrument_node=""> from 1670 to 1676, and following the death of </span><a data-dcnode-id="8401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nathaniel_Bacon_%28Virginia_colonist%29" title="Nathaniel Bacon (Virginia colonist)"><span data-dcnode-id="8402" instrument_node="">Nathaniel Bacon</span></a><span data-dcnode-id="8400" instrument_node=""> in 1676, to freeholders permanently. </span><a data-dcnode-id="8398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quakers" title="Quakers"><span data-dcnode-id="8399" instrument_node="">Quakers</span></a><span data-dcnode-id="8397" instrument_node=""> were not permitted to vote in Plymouth Colony or in the </span><a data-dcnode-id="8395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Massachusetts_Bay_Colony" title="Massachusetts Bay Colony"><span data-dcnode-id="8396" instrument_node="">Massachusetts Bay Colony</span></a><span data-dcnode-id="8394" instrument_node="">, and along with </span><a data-dcnode-id="8392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baptists_in_the_United_States" title="Baptists in the United States"><span data-dcnode-id="8393" instrument_node="">Baptists</span></a><span data-dcnode-id="8391" instrument_node="">, were not permitted to vote in several other colonies as well, and </span><a data-dcnode-id="8389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Church_in_the_Thirteen_Colonies" title="Catholic Church in the Thirteen Colonies"><span data-dcnode-id="8390" instrument_node="">Catholics</span></a><span data-dcnode-id="8388" instrument_node=""> were </span><a data-dcnode-id="8386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disfranchisement" title="Disfranchisement"><span data-dcnode-id="8387" instrument_node="">disenfranchised</span></a><span data-dcnode-id="8385" instrument_node=""> following the </span><a data-dcnode-id="8383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glorious_Revolution" title="Glorious Revolution"><span data-dcnode-id="8384" instrument_node="">Glorious Revolution</span></a><span data-dcnode-id="8382" instrument_node=""> (1688–1689) in </span><a data-dcnode-id="8380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Province_of_Maryland" title="Province of Maryland"><span data-dcnode-id="8381" instrument_node="">Maryland</span></a><span data-dcnode-id="8379" instrument_node="">, </span><a data-dcnode-id="8377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Province_of_New_York" title="Province of New York"><span data-dcnode-id="8378" instrument_node="">New York</span></a><span data-dcnode-id="8376" instrument_node="">, </span><a data-dcnode-id="8374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colony_of_Rhode_Island_and_Providence_Plantations" title="Colony of Rhode Island and Providence Plantations"><span data-dcnode-id="8375" instrument_node="">Rhode Isl </span><li data-dcnode-id="8236"><a data-dcnode-id="8238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colony_of_Virginia" title="Colony of Virginia"><span data-dcnode-id="8239" instrument_node="">Virginia</span></a><span data-dcnode-id="8237" instrument_node="">: fifty acres of vacant land, twenty-fives acres of cultivated land, and a house twelve feet by twelve feet; or a town lot and a house twelve feet by twelve</span></li></ul><span data-dcnode-id="8234" instrument_node="">
</span><p data-dcnode-id="8173"><span data-dcnode-id="8233" instrument_node="">By the time the </span><a data-dcnode-id="8231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_the_United_States" title="Constitution of the United States"><span data-dcnode-id="8232" instrument_node="">United States Constitution</span></a><span data-dcnode-id="8230" instrument_node=""> came into effect on March 9, 1789,</span><sup class="reference" data-dcnode-id="8227" id="cite_ref-11"><a data-dcnode-id="8228" href="#cite_note-11"><span data-dcnode-id="8229" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8226" instrument_node=""> a small number of </span><a class="mw-redirect" data-dcnode-id="8224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_negro" title="Free negro"><span data-dcnode-id="8225" instrument_node="">free Blacks</span></a><span data-dcnode-id="8223" instrument_node=""> were among the voting citizens (men of property) in some states.</span><sup class="reference" data-dcnode-id="8220" id="cite_ref-12"><a data-dcnode-id="8221" href="#cite_note-12"><span data-dcnode-id="8222" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8219" instrument_node=""> The Constitution did not originally define who was eligible to vote, allowing each state to determine who was eligible. In the early history of the U.S., some states</span><sup class="noprint Inline-Template" data-dcnode-id="8212" style="white-space:nowrap;"><span data-dcnode-id="8218" instrument_node="">[</span><i data-dcnode-id="8214"><a class="mw-redirect" data-dcnode-id="8215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAvoid_weasel_words" title="Wikipedia:Avoid weasel words"><span data-dcnode-id="8216" title="The material near this tag possibly uses too vague attribution or weasel words. (October 2019)"><span data-dcnode-id="8217" instrument_node="">which?</span></span></a></i><span data-dcnode-id="8213" instrument_node="">]</span></sup><span data-dcnode-id="8211" instrument_node=""> allowed only </span><a class="mw-redirect" data-dcnode-id="8209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_American" title="White American"><span data-dcnode-id="8210" instrument_node="">white</span></a><span data-dcnode-id="8208" instrument_node=""> male adult property owners to vote, while others</span><sup class="noprint Inline-Template" data-dcnode-id="8201" style="white-space:nowrap;"><span data-dcnode-id="8207" instrument_node="">[</span><i data-dcnode-id="8203"><a class="mw-redirect" data-dcnode-id="8204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAvoid_weasel_words" title="Wikipedia:Avoid weasel words"><span data-dcnode-id="8205" title="The material near this tag possibly uses too vague attribution or weasel words. (October 2019)"><span data-dcnode-id="8206" instrument_node="">which?</span></span></a></i><span data-dcnode-id="8202" instrument_node="">]</span></sup><span data-dcnode-id="8200" instrument_node=""> either did not specify race, or specifically protected the rights of men of any race to vote.</span><sup class="reference" data-dcnode-id="8197" id="cite_ref-13"><a data-dcnode-id="8198" href="#cite_note-13"><span data-dcnode-id="8199" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="8194" id="cite_ref-NatArchives_14-0"><a data-dcnode-id="8195" href="#cite_note-NatArchives-14"><span data-dcnode-id="8196" instrument_node="">[14]</span></a></sup><span data-dcnode-id="8193" instrument_node=""> Women were largely prohibited from voting, as were men without property.</span><sup class="reference" data-dcnode-id="8190" id="cite_ref-15"><a data-dcnode-id="8191" href="#cite_note-15"><span data-dcnode-id="8192" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8189" instrument_node=""> Women could vote in </span><a data-dcnode-id="8187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Jersey" title="New Jersey"><span data-dcnode-id="8188" instrument_node="">New Jersey</span></a><span data-dcnode-id="8186" instrument_node=""> until 1807 (provided they could meet the property requirement) and in some local jurisdictions in other northern states. Free Blacks could also vote in these jurisdictions</span><sup class="noprint Inline-Template" data-dcnode-id="8179" style="white-space:nowrap;"><span data-dcnode-id="8185" instrument_node="">[</span><i data-dcnode-id="8181"><a class="mw-redirect" data-dcnode-id="8182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAvoid_weasel_words" title="Wikipedia:Avoid weasel words"><span data-dcnode-id="8183" title="The material near this tag possibly uses too vague attribution or weasel words. (October 2019)"><span data-dcnode-id="8184" instrument_node="">which?</span></span></a></i><span data-dcnode-id="8180" instrument_node="">]</span></sup><span data-dcnode-id="8178" instrument_node="">, provided they could meet the property requirement. In New Jersey particularly, these property requirements were purposely set quite low.</span><sup class="reference" data-dcnode-id="8175" id="cite_ref-16"><a data-dcnode-id="8176" href="#cite_note-16"><span data-dcnode-id="8177" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8174" instrument_node="">
</span></p><p data-dcnode-id="8138"><span data-dcnode-id="8172" instrument_node="">Beginning around 1790, individual states began to reassess property ownership as a qualification for enfranchisement in favor of gender and race, with most states disenfranchising women and non-white men.</span><sup class="reference" data-dcnode-id="8169" id="cite_ref-17"><a data-dcnode-id="8170" href="#cite_note-17"><span data-dcnode-id="8171" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8168" instrument_node=""> By 1856, white men were allowed to vote in all states regardless of property ownership, although requirements for paying tax remained in five states.</span><sup class="reference" data-dcnode-id="8165" id="cite_ref-NBER2005_18-0"><a data-dcnode-id="8166" href="#cite_note-NBER2005-18"><span data-dcnode-id="8167" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="8162" id="cite_ref-19"><a data-dcnode-id="8163" href="#cite_note-19"><span data-dcnode-id="8164" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8161" instrument_node=""> Several states,</span><sup class="noprint Inline-Template" data-dcnode-id="8154" style="white-space:nowrap;"><span data-dcnode-id="8160" instrument_node="">[</span><i data-dcnode-id="8156"><a class="mw-redirect" data-dcnode-id="8157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAvoid_weasel_words" title="Wikipedia:Avoid weasel words"><span data-dcnode-id="8158" title="The material near this tag possibly uses too vague attribution or weasel words. (October 2019)"><span data-dcnode-id="8159" instrument_node="">which?</span></span></a></i><span data-dcnode-id="8155" instrument_node="">]</span></sup><span data-dcnode-id="8153" instrument_node=""> including </span><a class="mw-redirect" data-dcnode-id="8151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1838_Pennsylvania_Loss_of_Voting_Rights_for_African_American_Men" title="1838 Pennsylvania Loss of Voting Rights for African American Men"><span data-dcnode-id="8152" instrument_node="">Pennsylvania</span></a><span data-dcnode-id="8150" instrument_node=""> and </span><a data-dcnode-id="8148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_New_Jersey_State_Constitution%23Vote_Rescinded_for_Women%2C_non-Whites" title="History of the New Jersey State Constitution"><span data-dcnode-id="8149" instrument_node="">New Jersey</span></a><span data-dcnode-id="8147" instrument_node="">, stripped the free black males of the right to vote in the same period.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="8140" style="white-space:nowrap;"><span data-dcnode-id="8146" instrument_node="">[</span><i data-dcnode-id="8142"><a data-dcnode-id="8143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="8144" title="This claim needs references to reliable sources. (May 2021)"><span data-dcnode-id="8145" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="8141" instrument_node="">]</span></sup><span data-dcnode-id="8139" instrument_node="">
</span></p><p data-dcnode-id="8136"><span data-dcnode-id="8137" instrument_node="">Four of the fifteen post-Civil War constitutional amendments were ratified to extend voting rights to different groups of citizens. These extensions state that voting rights cannot be denied or abridged based on the following:
</span></p><span data-dcnode-id="8135" instrument_node="">
</span><ul data-dcnode-id="8105"><li data-dcnode-id="8130"><span data-dcnode-id="8134" instrument_node="">"Race, color, or previous condition of servitude" (</span><a data-dcnode-id="8132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fifteenth_Amendment_to_the_United_States_Constitution" title="Fifteenth Amendment to the United States Constitution"><span data-dcnode-id="8133" instrument_node="">Fifteenth Amendment</span></a><span data-dcnode-id="8131" instrument_node="">, 1870)</span></li><span data-dcnode-id="8129" instrument_node="">
</span><li data-dcnode-id="8124"><span data-dcnode-id="8128" instrument_node="">"On account of sex" (</span><a data-dcnode-id="8126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nineteenth_Amendment_to_the_United_States_Constitution" title="Nineteenth Amendment to the United States Constitution"><span data-dcnode-id="8127" instrument_node="">Nineteenth Amendment</span></a><span data-dcnode-id="8125" instrument_node="">, 1920)</span></li><span data-dcnode-id="8123" instrument_node="">
</span><li data-dcnode-id="8112"><span data-dcnode-id="8122" instrument_node="">"By reason of failure to pay any </span><a class="mw-redirect" data-dcnode-id="8120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poll_tax_%28United_States%29" title="Poll tax (United States)"><span data-dcnode-id="8121" instrument_node="">poll tax</span></a><span data-dcnode-id="8119" instrument_node=""> or other tax" for federal elections (</span><a data-dcnode-id="8117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twenty-fourth_Amendment_to_the_United_States_Constitution" title="Twenty-fourth Amendment to the United States Constitution"><span data-dcnode-id="8118" instrument_node="">Twenty-fourth Amendment</span></a><span data-dcnode-id="8116" instrument_node="">, 1964)</span><sup class="reference" data-dcnode-id="8113" id="cite_ref-20"><a data-dcnode-id="8114" href="#cite_note-20"><span data-dcnode-id="8115" instrument_node="">[Note 1]</span></a></sup></li><span data-dcnode-id="8111" instrument_node="">
</span><li data-dcnode-id="8106"><span data-dcnode-id="8110" instrument_node="">"Who are eighteen years of age or older, to vote, shall not be denied or abridged by the United States or by any state on account of age" (</span><a data-dcnode-id="8108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twenty-sixth_Amendment_to_the_United_States_Constitution" title="Twenty-sixth Amendment to the United States Constitution"><span data-dcnode-id="8109" instrument_node="">Twenty-sixth Amendment</span></a><span data-dcnode-id="8107" instrument_node="">, 1971)</span></li></ul><span data-dcnode-id="8104" instrument_node="">
</span><p data-dcnode-id="8080"><span data-dcnode-id="8103" instrument_node="">Following the </span><a class="mw-redirect" data-dcnode-id="8101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reconstruction_Era" title="Reconstruction Era"><span data-dcnode-id="8102" instrument_node="">Reconstruction Era</span></a><span data-dcnode-id="8100" instrument_node=""> until the culmination of the </span><a class="mw-redirect" data-dcnode-id="8098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Rights_Movement" title="Civil Rights Movement"><span data-dcnode-id="8099" instrument_node="">Civil Rights Movement</span></a><span data-dcnode-id="8097" instrument_node="">, </span><a data-dcnode-id="8095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Crow_laws" title="Jim Crow laws"><span data-dcnode-id="8096" instrument_node="">Jim Crow laws</span></a><span data-dcnode-id="8094" instrument_node=""> such as </span><a data-dcnode-id="8092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literacy_test" title="Literacy test"><span data-dcnode-id="8093" instrument_node="">literacy tests</span></a><span data-dcnode-id="8091" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="8089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poll_tax_%28United_States%29" title="Poll tax (United States)"><span data-dcnode-id="8090" instrument_node="">poll taxes</span></a><span data-dcnode-id="8088" instrument_node="">, and religious tests were some of the state and local laws used in various parts of the United States to deny immigrants (including legal ones and newly </span><a data-dcnode-id="8086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_laws_concerning_immigration_and_naturalization_in_the_United_States" title="History of laws concerning immigration and naturalization in the United States"><span data-dcnode-id="8087" instrument_node="">naturalized</span></a><span data-dcnode-id="8085" instrument_node=""> citizens), non-white citizens, Native Americans, and any other locally "undesirable" groups from exercising voting rights granted under the Constitution.</span><sup class="reference" data-dcnode-id="8082" id="cite_ref-VG_21-0"><a data-dcnode-id="8083" href="#cite_note-VG-21"><span data-dcnode-id="8084" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8081" instrument_node=""> Because of such state and local discriminatory practices, over time, the federal role in elections has increased, through amendments to the Constitution and enacted legislation. These reforms in the 19th and 20th centuries extended the franchise to non-whites, those who do not own property, women, and those 18–21 years old.
</span></p><p data-dcnode-id="8067"><span data-dcnode-id="8079" instrument_node="">Since the "right to vote" is not explicitly stated in the U.S. Constitution except in the above referenced amendments, and only in reference to the fact that the franchise cannot be denied or abridged based solely on the aforementioned qualifications, the "right to vote" is perhaps better understood, in layman's terms, as only prohibiting certain forms of legal discrimination in establishing qualifications for suffrage. States may deny the "right to vote" for other reasons. For example, many states require eligible citizens to register to vote a set number of days prior to the election in order to vote. More controversial restrictions include those laws that </span><a class="mw-redirect" data-dcnode-id="8077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Felony_disenfranchisement" title="Felony disenfranchisement"><span data-dcnode-id="8078" instrument_node="">prohibit convicted felons from voting</span></a><span data-dcnode-id="8076" instrument_node="">, even those who have served their sentences. Another example, seen in </span><i data-dcnode-id="8073"><a data-dcnode-id="8074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bush_v._Gore" title="Bush v. Gore"><span data-dcnode-id="8075" instrument_node="">Bush v. Gore</span></a></i><span data-dcnode-id="8072" instrument_node="">, are disputes as to what rules should apply in counting or recounting ballots.</span><sup class="reference" data-dcnode-id="8069" id="cite_ref-22"><a data-dcnode-id="8070" href="#cite_note-22"><span data-dcnode-id="8071" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8068" instrument_node="">
</span></p><p data-dcnode-id="8061"><span data-dcnode-id="8066" instrument_node="">A state may choose to fill an office by means other than an election. For example, upon death or resignation of a legislator, the state may allow the affiliated political party to choose a replacement to hold office until the next scheduled election. Such an appointment is often affirmed by the governor.</span><sup class="reference" data-dcnode-id="8063" id="cite_ref-justia_voter_23-0"><a data-dcnode-id="8064" href="#cite_note-justia_voter-23"><span data-dcnode-id="8065" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8062" instrument_node="">
</span></p><p data-dcnode-id="8056"><span data-dcnode-id="8060" instrument_node="">The Constitution, in </span><a data-dcnode-id="8058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Article_Six_of_the_United_States_Constitution" title="Article Six of the United States Constitution"><span data-dcnode-id="8059" instrument_node="">Article VI</span></a><span data-dcnode-id="8057" instrument_node="">, clause (paragraph) 3, does state that "no religious Test shall ever be required as a Qualification to any Office or public Trust under the United States".
</span></p><span data-dcnode-id="8055" instrument_node="">
</span><h2 data-dcnode-id="8045"><span class="mw-headline" data-dcnode-id="8053" id="Milestones_of_national_franchise_changes"><span data-dcnode-id="8054" instrument_node="">Milestones of national franchise changes</span></span><span class="mw-editsection" data-dcnode-id="8046"><span class="mw-editsection-bracket" data-dcnode-id="8051"><span data-dcnode-id="8052" instrument_node="">[</span></span><a data-dcnode-id="8049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D2" title="Edit section: Milestones of national franchise changes"><span data-dcnode-id="8050" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8047"><span data-dcnode-id="8048" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8044" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="8038" role="note"><span data-dcnode-id="8041" instrument_node="">Further information: </span><a data-dcnode-id="8039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Timeline_of_voting_rights_in_the_United_States" title="Timeline of voting rights in the United States"><span data-dcnode-id="8040" instrument_node="">Timeline of voting rights in the United States</span></a></div><span data-dcnode-id="8037" instrument_node="">
</span><ul data-dcnode-id="7649"><li data-dcnode-id="8030"><b data-dcnode-id="8035"><span data-dcnode-id="8036" instrument_node="">1789:</span></b><span data-dcnode-id="8034" instrument_node=""> The Constitution grants the states the power to set voting requirements. Generally, states limited this right to property-owning or tax-paying white males (about 6% of the population).</span><sup class="reference" data-dcnode-id="8031" id="cite_ref-NatArchives_14-1"><a data-dcnode-id="8032" href="#cite_note-NatArchives-14"><span data-dcnode-id="8033" instrument_node="">[14]</span></a></sup></li><span data-dcnode-id="8029" instrument_node="">
</span><li data-dcnode-id="8015"><b data-dcnode-id="8027"><span data-dcnode-id="8028" instrument_node="">1790:</span></b><span data-dcnode-id="8026" instrument_node=""> The </span><a data-dcnode-id="8024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naturalization_Act_of_1790" title="Naturalization Act of 1790"><span data-dcnode-id="8025" instrument_node="">Naturalization Act of 1790</span></a><span data-dcnode-id="8023" instrument_node=""> limited citizenship to "free white persons."</span><sup class="reference" data-dcnode-id="8020" id="cite_ref-1790_Act_24-0"><a data-dcnode-id="8021" href="#cite_note-1790_Act-24"><span data-dcnode-id="8022" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8019" instrument_node=""> In practice, only white male property owners could naturalize and acquire the status of citizens, and the vote.</span><sup class="reference" data-dcnode-id="8016" id="cite_ref-1790_Act_24-1"><a data-dcnode-id="8017" href="#cite_note-1790_Act-24"><span data-dcnode-id="8018" instrument_node="">[23]</span></a></sup></li><span data-dcnode-id="8014" instrument_node="">
</span><li data-dcnode-id="8004"><b data-dcnode-id="8012"><span data-dcnode-id="8013" instrument_node="">1792–1838:</span></b><span data-dcnode-id="8011" instrument_node=""> Free black males lose the right to vote in several Northern states including </span><a class="mw-redirect" data-dcnode-id="8009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1838_Pennsylvania_Loss_of_Voting_Rights_for_African_American_Men" title="1838 Pennsylvania Loss of Voting Rights for African American Men"><span data-dcnode-id="8010" instrument_node="">in Pennsylvania</span></a><span data-dcnode-id="8008" instrument_node=""> and </span><a data-dcnode-id="8006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_New_Jersey_State_Constitution%23Vote_Rescinded_for_Women%2C_non-Whites" title="History of the New Jersey State Constitution"><span data-dcnode-id="8007" instrument_node="">in New Jersey</span></a><span data-dcnode-id="8005" instrument_node="">.</span></li><span data-dcnode-id="8003" instrument_node="">
</span><li data-dcnode-id="7927"><b data-dcnode-id="8001"><span data-dcnode-id="8002" instrument_node="">1792–1856:</span></b><span data-dcnode-id="8000" instrument_node=""> Abolition of property qualifications for white men, from 1792 (New Hampshire) to 1856 (North Carolina) during the periods of </span><a data-dcnode-id="7998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeffersonian_democracy" title="Jeffersonian democracy"><span data-dcnode-id="7999" instrument_node="">Jeffersonian</span></a><span data-dcnode-id="7997" instrument_node=""> and </span><a data-dcnode-id="7995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacksonian_democracy" title="Jacksonian democracy"><span data-dcnode-id="7996" instrument_node="">Jacksonian democracy</span></a><span data-dcnode-id="7994" instrument_node="">. However, tax-paying qualifications remained in five states in 1860—Massachusetts, Rhode Island, Pennsylvania, Delaware and North Carolina. They survived in Pennsylvania and Rhode Island until the 20th century.</span><sup class="reference" data-dcnode-id="7991" id="cite_ref-NBER2005_18-1"><a data-dcnode-id="7992" href="#cite_note-NBER2005-18"><span data-dcnode-id="7993" instrument_node="">[18]</span></a></sup><span data-dcnode-id="7990" instrument_node="">
</span><ul data-dcnode-id="7928"><li data-dcnode-id="7964"><span data-dcnode-id="7989" instrument_node="">In the </span><a data-dcnode-id="7987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1820_United_States_presidential_election" title="1820 United States presidential election"><span data-dcnode-id="7988" instrument_node="">1820 election</span></a><span data-dcnode-id="7986" instrument_node="">, there were 108,359 ballots cast. Most older states with property restrictions dropped them by the mid-1820s, except for </span><a data-dcnode-id="7984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhode_Island" title="Rhode Island"><span data-dcnode-id="7985" instrument_node="">Rhode Island</span></a><span data-dcnode-id="7983" instrument_node="">, </span><a data-dcnode-id="7981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Virginia" title="Virginia"><span data-dcnode-id="7982" instrument_node="">Virginia</span></a><span data-dcnode-id="7980" instrument_node=""> and </span><a data-dcnode-id="7978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Carolina" title="North Carolina"><span data-dcnode-id="7979" instrument_node="">North Carolina</span></a><span data-dcnode-id="7977" instrument_node="">. No new states had property qualifications although three had adopted tax-paying qualifications – </span><a data-dcnode-id="7975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ohio" title="Ohio"><span data-dcnode-id="7976" instrument_node="">Ohio</span></a><span data-dcnode-id="7974" instrument_node="">, </span><a data-dcnode-id="7972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louisiana" title="Louisiana"><span data-dcnode-id="7973" instrument_node="">Louisiana</span></a><span data-dcnode-id="7971" instrument_node="">, and </span><a data-dcnode-id="7969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mississippi" title="Mississippi"><span data-dcnode-id="7970" instrument_node="">Mississippi</span></a><span data-dcnode-id="7968" instrument_node="">, of which only in Louisiana were these significant and long lasting.</span><sup class="reference" data-dcnode-id="7965" id="cite_ref-25"><a data-dcnode-id="7966" href="#cite_note-25"><span data-dcnode-id="7967" instrument_node="">[24]</span></a></sup></li><span data-dcnode-id="7963" instrument_node="">
</span><li data-dcnode-id="7955"><span data-dcnode-id="7962" instrument_node="">The </span><a data-dcnode-id="7960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1828_United_States_presidential_election" title="1828 United States presidential election"><span data-dcnode-id="7961" instrument_node="">1828 presidential election</span></a><span data-dcnode-id="7959" instrument_node=""> was the first in which non-property-holding white males could vote in the vast majority of states. By the end of the 1820s, attitudes and state laws had shifted in favor of universal white male suffrage.</span><sup class="reference" data-dcnode-id="7956" id="cite_ref-26"><a data-dcnode-id="7957" href="#cite_note-26"><span data-dcnode-id="7958" instrument_node="">[25]</span></a></sup></li><span data-dcnode-id="7954" instrument_node="">
</span><li data-dcnode-id="7942"><span data-dcnode-id="7953" instrument_node="">Voter turnout soared during the 1830s, reaching about 80% of adult white male population in the </span><a data-dcnode-id="7951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1840_United_States_presidential_election" title="1840 United States presidential election"><span data-dcnode-id="7952" instrument_node="">1840 presidential election</span></a><span data-dcnode-id="7950" instrument_node="">.</span><sup class="reference" data-dcnode-id="7947" id="cite_ref-27"><a data-dcnode-id="7948" href="#cite_note-27"><span data-dcnode-id="7949" instrument_node="">[26]</span></a></sup><span data-dcnode-id="7946" instrument_node=""> 2,412,694 ballots were cast, an increase that far outstripped natural population growth, making poor voters a huge part of the electorate. The process was peaceful and widely supported, except in the state of Rhode Island where the </span><a data-dcnode-id="7944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dorr_Rebellion" title="Dorr Rebellion"><span data-dcnode-id="7945" instrument_node="">Dorr Rebellion</span></a><span data-dcnode-id="7943" instrument_node=""> of the 1840s demonstrated that the demand for equal suffrage was broad and strong, although the subsequent reform included a significant property requirement for anyone resident but born outside of the United States.</span></li><span data-dcnode-id="7941" instrument_node="">
</span><li data-dcnode-id="7929"><span data-dcnode-id="7940" instrument_node="">The last state to abolish property qualification was North Carolina in 1856. However, tax-paying qualifications remained in five states in 1860 – Massachusetts, Rhode Island, Pennsylvania, Delaware and North Carolina. They survived in Pennsylvania and Rhode Island until the 20th century.</span><sup class="reference" data-dcnode-id="7937" id="cite_ref-28"><a data-dcnode-id="7938" href="#cite_note-28"><span data-dcnode-id="7939" instrument_node="">[27]</span></a></sup><span data-dcnode-id="7936" instrument_node=""> In addition, many poor whites were later disenfranchised.</span><sup class="reference" data-dcnode-id="7933" id="cite_ref-:22_29-0"><a data-dcnode-id="7934" href="#cite_note-:22-29"><span data-dcnode-id="7935" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="7930" id="cite_ref-:13_30-0"><a data-dcnode-id="7931" href="#cite_note-:13-30"><span data-dcnode-id="7932" instrument_node="">[29]</span></a></sup></li></ul></li><span data-dcnode-id="7926" instrument_node="">
</span><li data-dcnode-id="7919"><b data-dcnode-id="7924"><span data-dcnode-id="7925" instrument_node="">1868:</span></b><span data-dcnode-id="7923" instrument_node=""> Citizenship is guaranteed to all persons born or naturalized in the United States by the </span><a data-dcnode-id="7921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fourteenth_Amendment_to_the_United_States_Constitution" title="Fourteenth Amendment to the United States Constitution"><span data-dcnode-id="7922" instrument_node="">Fourteenth Amendment</span></a><span data-dcnode-id="7920" instrument_node="">, setting the stage for future expansions to voting rights.</span></li><span data-dcnode-id="7918" instrument_node="">
</span><li data-dcnode-id="7914"><b data-dcnode-id="7916"><span data-dcnode-id="7917" instrument_node="">1869–1920:</span></b><span data-dcnode-id="7915" instrument_node=""> Some states allow women to vote. Wyoming was the first state to give women voting rights in 1869.</span></li><span data-dcnode-id="7913" instrument_node="">
</span><li data-dcnode-id="7871"><b data-dcnode-id="7911"><span data-dcnode-id="7912" instrument_node="">1870:</span></b><span data-dcnode-id="7910" instrument_node=""> The </span><a data-dcnode-id="7908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fifteenth_Amendment_to_the_United_States_Constitution" title="Fifteenth Amendment to the United States Constitution"><span data-dcnode-id="7909" instrument_node="">Fifteenth Amendment to the United States Constitution</span></a><span data-dcnode-id="7907" instrument_node=""> prevents states from denying the right to vote on grounds of "race, color, or previous condition of servitude".
</span><ul data-dcnode-id="7872"><li data-dcnode-id="7873"><a class="mw-redirect" data-dcnode-id="7905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disfranchisement_after_Reconstruction_era" title="Disfranchisement after Reconstruction era"><span data-dcnode-id="7906" instrument_node="">Disfranchisement after Reconstruction era</span></a><span data-dcnode-id="7904" instrument_node=""> began soon after. Former </span><a data-dcnode-id="7902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confederate_States_of_America" title="Confederate States of America"><span data-dcnode-id="7903" instrument_node="">Confederate</span></a><span data-dcnode-id="7901" instrument_node=""> states passed </span><a data-dcnode-id="7899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jim_Crow_laws" title="Jim Crow laws"><span data-dcnode-id="7900" instrument_node="">Jim Crow laws</span></a><span data-dcnode-id="7898" instrument_node=""> and amendments to effectively </span><a class="mw-redirect" data-dcnode-id="7896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disfranchise" title="Disfranchise"><span data-dcnode-id="7897" instrument_node="">disfranchise</span></a><span data-dcnode-id="7895" instrument_node=""> </span><a data-dcnode-id="7893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/African_Americans" title="African Americans"><span data-dcnode-id="7894" instrument_node="">African-American</span></a><span data-dcnode-id="7892" instrument_node=""> and poor white voters through </span><a class="mw-redirect" data-dcnode-id="7890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poll_tax_%28United_States%29" title="Poll tax (United States)"><span data-dcnode-id="7891" instrument_node="">poll taxes</span></a><span data-dcnode-id="7889" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literacy_tests" title="Literacy tests"><span data-dcnode-id="7888" instrument_node="">literacy tests</span></a><span data-dcnode-id="7886" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grandfather_clauses" title="Grandfather clauses"><span data-dcnode-id="7885" instrument_node="">grandfather clauses</span></a><span data-dcnode-id="7883" instrument_node=""> and other restrictions, applied in a discriminatory manner. During this period, the </span><a data-dcnode-id="7881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_the_United_States" title="Supreme Court of the United States"><span data-dcnode-id="7882" instrument_node="">Supreme Court</span></a><span data-dcnode-id="7880" instrument_node=""> generally upheld state efforts to discriminate against racial minorities; only later in the 20th century were these laws ruled unconstitutional. Black males in the Northern states could vote, but the majority of African Americans lived in the South.</span><sup class="reference" data-dcnode-id="7877" id="cite_ref-:22_29-1"><a data-dcnode-id="7878" href="#cite_note-:22-29"><span data-dcnode-id="7879" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="7874" id="cite_ref-:13_30-1"><a data-dcnode-id="7875" href="#cite_note-:13-30"><span data-dcnode-id="7876" instrument_node="">[29]</span></a></sup></li></ul></li><span data-dcnode-id="7870" instrument_node="">
</span><li data-dcnode-id="7863"><b data-dcnode-id="7868"><span data-dcnode-id="7869" instrument_node="">1887:</span></b><span data-dcnode-id="7867" instrument_node=""> Citizenship is granted to Native Americans who are willing to disassociate themselves from their tribe by the </span><a data-dcnode-id="7865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dawes_Act" title="Dawes Act"><span data-dcnode-id="7866" instrument_node="">Dawes Act</span></a><span data-dcnode-id="7864" instrument_node="">, making the men technically eligible to vote.</span></li><span data-dcnode-id="7862" instrument_node="">
</span><li data-dcnode-id="7849"><b data-dcnode-id="7860"><span data-dcnode-id="7861" instrument_node="">1913:</span></b><span data-dcnode-id="7859" instrument_node=""> Direct election of </span><a data-dcnode-id="7857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Senate" title="United States Senate"><span data-dcnode-id="7858" instrument_node="">Senators</span></a><span data-dcnode-id="7856" instrument_node="">, established by the </span><a data-dcnode-id="7854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seventeenth_Amendment_to_the_United_States_Constitution" title="Seventeenth Amendment to the United States Constitution"><span data-dcnode-id="7855" instrument_node="">Seventeenth Amendment</span></a><span data-dcnode-id="7853" instrument_node="">, gave voters rather than state legislatures the right to elect senators.</span><sup class="reference" data-dcnode-id="7850" id="cite_ref-autogenerated1_31-0"><a data-dcnode-id="7851" href="#cite_note-autogenerated1-31"><span data-dcnode-id="7852" instrument_node="">[30]</span></a></sup></li><span data-dcnode-id="7848" instrument_node="">
</span><li data-dcnode-id="7844"><b data-dcnode-id="7846"><span data-dcnode-id="7847" instrument_node="">1920:</span></b><span data-dcnode-id="7845" instrument_node=""> Women are guaranteed the right to vote in all US States by the Nineteenth Amendment. In practice, the same restrictions that hindered the ability of poor or non-white men to vote now also applied to poor or non-white women.</span></li><span data-dcnode-id="7843" instrument_node="">
</span><li data-dcnode-id="7829"><b data-dcnode-id="7841"><span data-dcnode-id="7842" instrument_node="">1924:</span></b><span data-dcnode-id="7840" instrument_node=""> All Native Americans are granted citizenship and the right to vote, regardless of tribal affiliation. By this point, approximately two thirds of Native Americans were already citizens.</span><sup class="reference" data-dcnode-id="7837" id="cite_ref-32"><a data-dcnode-id="7838" href="#cite_note-32"><span data-dcnode-id="7839" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="7834" id="cite_ref-33"><a data-dcnode-id="7835" href="#cite_note-33"><span data-dcnode-id="7836" instrument_node="">[32]</span></a></sup><span data-dcnode-id="7833" instrument_node=""> Notwithstanding, some western states continued to bar Native Americans from voting until 1948.</span><sup class="reference" data-dcnode-id="7830" id="cite_ref-cambridge.org_34-0"><a data-dcnode-id="7831" href="#cite_note-cambridge.org-34"><span data-dcnode-id="7832" instrument_node="">[33]</span></a></sup></li><span data-dcnode-id="7828" instrument_node="">
</span><li data-dcnode-id="7821"><b data-dcnode-id="7826"><span data-dcnode-id="7827" instrument_node="">1943:</span></b><span data-dcnode-id="7825" instrument_node=""> Chinese immigrants given the right to citizenship and the right to vote by the </span><a data-dcnode-id="7823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Magnuson_Act" title="Magnuson Act"><span data-dcnode-id="7824" instrument_node="">Magnuson Act</span></a><span data-dcnode-id="7822" instrument_node="">.</span></li><span data-dcnode-id="7820" instrument_node="">
</span><li data-dcnode-id="7807"><b data-dcnode-id="7818"><span data-dcnode-id="7819" instrument_node="">1948:</span></b><span data-dcnode-id="7817" instrument_node=""> Arizona and New Mexico became one of the last states to extend full voting rights to Native Americans, which had been opposed by some western states in contravention of the </span><a data-dcnode-id="7815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_Citizenship_Act" title="Indian Citizenship Act"><span data-dcnode-id="7816" instrument_node="">Indian Citizenship Act</span></a><span data-dcnode-id="7814" instrument_node=""> of 1924.</span><sup class="reference" data-dcnode-id="7811" id="cite_ref-cambridge.org_34-1"><a data-dcnode-id="7812" href="#cite_note-cambridge.org-34"><span data-dcnode-id="7813" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="7808" id="cite_ref-35"><a data-dcnode-id="7809" href="#cite_note-35"><span data-dcnode-id="7810" instrument_node="">[34]</span></a></sup></li><span data-dcnode-id="7806" instrument_node="">
</span><li data-dcnode-id="7786"><b data-dcnode-id="7804"><span data-dcnode-id="7805" instrument_node="">1954-1955:</span></b><span data-dcnode-id="7803" instrument_node=""> Maine extends full voting rights to Native Americans who live on reservations.</span><sup class="reference" data-dcnode-id="7800" id="cite_ref-:17_36-0"><a data-dcnode-id="7801" href="#cite_note-:17-36"><span data-dcnode-id="7802" instrument_node="">[35]</span></a></sup><sup class="reference" data-dcnode-id="7797" id="cite_ref-FOOTNOTEMaine_State_Museum201910_37-0"><a data-dcnode-id="7798" href="#cite_note-FOOTNOTEMaine_State_Museum201910-37"><span data-dcnode-id="7799" instrument_node="">[36]</span></a></sup><span data-dcnode-id="7796" instrument_node=""> Activist, </span><a data-dcnode-id="7794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lucy_Nicolar_Poolaw" title="Lucy Nicolar Poolaw"><span data-dcnode-id="7795" instrument_node="">Lucy Nicolar Poolaw</span></a><span data-dcnode-id="7793" instrument_node=""> (</span><a data-dcnode-id="7791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Penobscot" title="Penobscot"><span data-dcnode-id="7792" instrument_node="">Penobscot</span></a><span data-dcnode-id="7790" instrument_node="">), is the first to cast her vote under the new law.</span><sup class="reference" data-dcnode-id="7787" id="cite_ref-FOOTNOTEMaine_State_Museum201910_37-1"><a data-dcnode-id="7788" href="#cite_note-FOOTNOTEMaine_State_Museum201910-37"><span data-dcnode-id="7789" instrument_node="">[36]</span></a></sup></li><span data-dcnode-id="7785" instrument_node="">
</span><li data-dcnode-id="7778"><b data-dcnode-id="7783"><span data-dcnode-id="7784" instrument_node="">1961:</span></b><span data-dcnode-id="7782" instrument_node=""> Residents of </span><a data-dcnode-id="7780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington%2C_D.C." title="Washington, D.C."><span data-dcnode-id="7781" instrument_node="">Washington, D.C.</span></a><span data-dcnode-id="7779" instrument_node=""> are granted the right to vote in U.S. Presidential Elections by the Twenty-third Amendment.</span></li><span data-dcnode-id="7777" instrument_node="">
</span><li data-dcnode-id="7702"><b data-dcnode-id="7775"><span data-dcnode-id="7776" instrument_node="">1962-1964</span></b><span data-dcnode-id="7774" instrument_node="">: A historic turning point arrived after the </span><a class="mw-redirect" data-dcnode-id="7772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Supreme_Court" title="U.S. Supreme Court"><span data-dcnode-id="7773" instrument_node="">U.S. Supreme Court</span></a><span data-dcnode-id="7771" instrument_node=""> under </span><a data-dcnode-id="7769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chief_Justice_of_the_United_States" title="Chief Justice of the United States"><span data-dcnode-id="7770" instrument_node="">Chief Justice</span></a><span data-dcnode-id="7768" instrument_node=""> </span><a data-dcnode-id="7766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earl_Warren" title="Earl Warren"><span data-dcnode-id="7767" instrument_node="">Earl Warren</span></a><span data-dcnode-id="7765" instrument_node=""> made a series of landmark decisions which helped establish the nationwide "</span><a data-dcnode-id="7763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/One_man%2C_one_vote" title="One man, one vote"><span data-dcnode-id="7764" instrument_node="">one man, one vote</span></a><span data-dcnode-id="7762" instrument_node="">" </span><a data-dcnode-id="7760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Electoral_College" title="United States Electoral College"><span data-dcnode-id="7761" instrument_node="">electoral system</span></a><span data-dcnode-id="7759" instrument_node=""> in the United States.
</span><ul data-dcnode-id="7703"><li data-dcnode-id="7737"><span data-dcnode-id="7758" instrument_node="">In March 1962, the </span><a data-dcnode-id="7756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warren_Court" title="Warren Court"><span data-dcnode-id="7757" instrument_node="">Warren Court</span></a><span data-dcnode-id="7755" instrument_node=""> ruled in </span><i data-dcnode-id="7751"><a data-dcnode-id="7753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baker_v._Carr" title="Baker v. Carr"><span data-dcnode-id="7754" instrument_node="">Baker v. Carr</span></a><span data-dcnode-id="7752" instrument_node=""> (1962)</span></i><span data-dcnode-id="7750" instrument_node=""> that </span><a class="mw-redirect" data-dcnode-id="7748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Redistricting" title="Redistricting"><span data-dcnode-id="7749" instrument_node="">redistricting</span></a><span data-dcnode-id="7747" instrument_node=""> qualifies as a </span><a data-dcnode-id="7745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Justiciability" title="Justiciability"><span data-dcnode-id="7746" instrument_node="">justiciable</span></a><span data-dcnode-id="7744" instrument_node=""> question, thus enabling </span><a class="mw-redirect" data-dcnode-id="7742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Federal_Courts_of_the_United_States" title="Federal Courts of the United States"><span data-dcnode-id="7743" instrument_node="">federal courts</span></a><span data-dcnode-id="7741" instrument_node=""> to hear redistricting cases.</span><sup class="reference" data-dcnode-id="7738" id="cite_ref-:3_5-1"><a data-dcnode-id="7739" href="#cite_note-:3-5"><span data-dcnode-id="7740" instrument_node="">[5]</span></a></sup></li><span data-dcnode-id="7736" instrument_node="">
