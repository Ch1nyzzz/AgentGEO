</span><li data-dcnode-id="7723"><span data-dcnode-id="7735" instrument_node="">In February 1964, the Warren Court ruled in </span><i data-dcnode-id="7731"><a data-dcnode-id="7733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wesberry_v._Sanders" title="Wesberry v. Sanders"><span data-dcnode-id="7734" instrument_node="">Wesberry v. Sanders</span></a><span data-dcnode-id="7732" instrument_node=""> (1964)</span></i><span data-dcnode-id="7730" instrument_node=""> that districts in the </span><a data-dcnode-id="7728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="7729" instrument_node="">United States House of Representatives</span></a><span data-dcnode-id="7727" instrument_node=""> must be approximately equal in population.</span><sup class="reference" data-dcnode-id="7724" id="cite_ref-:4_6-1"><a data-dcnode-id="7725" href="#cite_note-:4-6"><span data-dcnode-id="7726" instrument_node="">[6]</span></a></sup></li><span data-dcnode-id="7722" instrument_node="">
</span><li data-dcnode-id="7704"><span data-dcnode-id="7721" instrument_node="">In June 1964, the Warren Court ruled in </span><i data-dcnode-id="7718"><a data-dcnode-id="7719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reynolds_v._Sims" title="Reynolds v. Sims"><span data-dcnode-id="7720" instrument_node="">Reynolds v. Sims</span></a></i><span data-dcnode-id="7717" instrument_node=""> (1964) that both houses of the electoral districts of </span><a data-dcnode-id="7715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_legislature_%28United_States%29" title="State legislature (United States)"><span data-dcnode-id="7716" instrument_node="">state legislative</span></a><span data-dcnode-id="7714" instrument_node=""> chambers must be roughly equal in population.</span><sup class="reference" data-dcnode-id="7711" id="cite_ref-:0_2-1"><a data-dcnode-id="7712" href="#cite_note-:0-2"><span data-dcnode-id="7713" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="7708" id="cite_ref-:1_3-1"><a data-dcnode-id="7709" href="#cite_note-:1-3"><span data-dcnode-id="7710" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="7705" id="cite_ref-:2_4-1"><a data-dcnode-id="7706" href="#cite_note-:2-4"><span data-dcnode-id="7707" instrument_node="">[4]</span></a></sup></li></ul></li><span data-dcnode-id="7701" instrument_node="">
</span><li data-dcnode-id="7697"><b data-dcnode-id="7699"><span data-dcnode-id="7700" instrument_node="">1964:</span></b><span data-dcnode-id="7698" instrument_node=""> Poll Tax payment prohibited from being used as a condition for voting in federal elections by the Twenty-fourth Amendment.</span></li><span data-dcnode-id="7696" instrument_node="">
</span><li data-dcnode-id="7683"><b data-dcnode-id="7694"><span data-dcnode-id="7695" instrument_node="">1965:</span></b><span data-dcnode-id="7693" instrument_node=""> Protection of </span><a data-dcnode-id="7691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_registration_in_the_United_States" title="Voter registration in the United States"><span data-dcnode-id="7692" instrument_node="">voter registration</span></a><span data-dcnode-id="7690" instrument_node=""> and voting for racial minorities, later applied to language minorities, is established by the </span><a data-dcnode-id="7688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_Rights_Act_of_1965" title="Voting Rights Act of 1965"><span data-dcnode-id="7689" instrument_node="">Voting Rights Act of 1965</span></a><span data-dcnode-id="7687" instrument_node="">. This has also been applied to correcting discriminatory election systems and districting.</span><sup class="reference" data-dcnode-id="7684" id="cite_ref-38"><a data-dcnode-id="7685" href="#cite_note-38"><span data-dcnode-id="7686" instrument_node="">[37]</span></a></sup></li><span data-dcnode-id="7682" instrument_node="">
</span><li data-dcnode-id="7675"><b data-dcnode-id="7680"><span data-dcnode-id="7681" instrument_node="">1966:</span></b><span data-dcnode-id="7679" instrument_node=""> Tax payment and wealth requirements for voting in state elections are prohibited by the Supreme Court in </span><a class="mw-redirect" data-dcnode-id="7677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harper_v._Virginia_Board_of_Elections" title="Harper v. Virginia Board of Elections"><span data-dcnode-id="7678" instrument_node="">Harper v. Virginia Board of Elections</span></a><span data-dcnode-id="7676" instrument_node="">.</span></li><span data-dcnode-id="7674" instrument_node="">
</span><li data-dcnode-id="7664"><b data-dcnode-id="7672"><span data-dcnode-id="7673" instrument_node="">1971:</span></b><span data-dcnode-id="7671" instrument_node=""> Adults aged 18 through 20 are granted the right to vote by the Twenty-sixth Amendment. This was enacted in response to Vietnam War protests, which argued that soldiers who were old enough to fight for their country should be granted the right to vote.</span><sup class="reference" data-dcnode-id="7668" id="cite_ref-autogenerated1_31-1"><a data-dcnode-id="7669" href="#cite_note-autogenerated1-31"><span data-dcnode-id="7670" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="7665" id="cite_ref-39"><a data-dcnode-id="7666" href="#cite_note-39"><span data-dcnode-id="7667" instrument_node="">[38]</span></a></sup></li><span data-dcnode-id="7663" instrument_node="">
</span><li data-dcnode-id="7650"><b data-dcnode-id="7661"><span data-dcnode-id="7662" instrument_node="">1986:</span></b><span data-dcnode-id="7660" instrument_node=""> United States Military and Uniformed Services, </span><a data-dcnode-id="7658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Merchant_Marine" title="United States Merchant Marine"><span data-dcnode-id="7659" instrument_node="">Merchant Marine</span></a><span data-dcnode-id="7657" instrument_node="">, other citizens overseas, living on bases in the United States, abroad, or aboard ship are granted the right to vote by the </span><a data-dcnode-id="7655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uniformed_and_Overseas_Citizens_Absentee_Voting_Act" title="Uniformed and Overseas Citizens Absentee Voting Act"><span data-dcnode-id="7656" instrument_node="">Uniformed and Overseas Citizens Absentee Voting Act</span></a><span data-dcnode-id="7654" instrument_node="">.</span><sup class="reference" data-dcnode-id="7651" id="cite_ref-usdoj.gov_40-0"><a data-dcnode-id="7652" href="#cite_note-usdoj.gov-40"><span data-dcnode-id="7653" instrument_node="">[39]</span></a></sup></li></ul><span data-dcnode-id="7648" instrument_node="">
</span><h2 data-dcnode-id="7638"><span class="mw-headline" data-dcnode-id="7646" id="Native_American_people"><span data-dcnode-id="7647" instrument_node="">Native American people</span></span><span class="mw-editsection" data-dcnode-id="7639"><span class="mw-editsection-bracket" data-dcnode-id="7644"><span data-dcnode-id="7645" instrument_node="">[</span></span><a data-dcnode-id="7642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D3" title="Edit section: Native American people"><span data-dcnode-id="7643" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7640"><span data-dcnode-id="7641" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7637" instrument_node="">
</span><link data-dcnode-id="7636" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7632" role="note"><span data-dcnode-id="7635" instrument_node="">See also: </span><a data-dcnode-id="7633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Native_American_civil_rights%23Voting" title="Native American civil rights"><span data-dcnode-id="7634" instrument_node="">Native American civil rights §&nbsp;Voting</span></a></div><span data-dcnode-id="7631" instrument_node="">
</span><p data-dcnode-id="7622"><span data-dcnode-id="7630" instrument_node="">From 1778 to 1871, the government tried to resolve its relationship with the various native tribes by negotiating treaties. These treaties formed agreements between two sovereign nations, stating that Native American people were citizens of their tribe, living within the boundaries of the United States. The treaties were negotiated by the executive branch and ratified by the U.S. Senate. It said that native tribes would give up their rights to hunt and live on huge parcels of land that they had inhabited in exchange for trade goods, yearly cash </span><a data-dcnode-id="7628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life_annuity" title="Life annuity"><span data-dcnode-id="7629" instrument_node="">annuity</span></a><span data-dcnode-id="7627" instrument_node=""> payments, and assurances that no further demands would be made on them. Most often, part of the land would be "reserved" exclusively for the tribe's use.</span><sup class="reference" data-dcnode-id="7624" id="cite_ref-41"><a data-dcnode-id="7625" href="#cite_note-41"><span data-dcnode-id="7626" instrument_node="">[40]</span></a></sup><span data-dcnode-id="7623" instrument_node="">
</span></p><p data-dcnode-id="7589"><span data-dcnode-id="7621" instrument_node="">Throughout the 1800s, many </span><a data-dcnode-id="7619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tribe_%28Native_American%29" title="Tribe (Native American)"><span data-dcnode-id="7620" instrument_node="">native tribes</span></a><span data-dcnode-id="7618" instrument_node=""> gradually lost claim to the lands they had inhabited for centuries through the federal government's </span><a class="mw-redirect" data-dcnode-id="7616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_Removal" title="Indian Removal"><span data-dcnode-id="7617" instrument_node="">Indian Removal</span></a><span data-dcnode-id="7615" instrument_node=""> policy to relocate tribes from the </span><a data-dcnode-id="7613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southeastern_United_States" title="Southeastern United States"><span data-dcnode-id="7614" instrument_node="">Southeast</span></a><span data-dcnode-id="7612" instrument_node=""> and </span><a data-dcnode-id="7610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Midwestern_United_States" title="Midwestern United States"><span data-dcnode-id="7611" instrument_node="">Northwest</span></a><span data-dcnode-id="7609" instrument_node=""> to </span><a data-dcnode-id="7607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_United_States" title="Western United States"><span data-dcnode-id="7608" instrument_node="">west of the Mississippi River</span></a><span data-dcnode-id="7606" instrument_node="">. European-American settlers continued to encroach on western lands. Only in 1879, in the </span><a data-dcnode-id="7604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standing_Bear" title="Standing Bear"><span data-dcnode-id="7605" instrument_node="">Standing Bear</span></a><span data-dcnode-id="7603" instrument_node=""> trial, were American Indians recognized as persons in the eyes of the United States government. Judge </span><a data-dcnode-id="7601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elmer_Scipio_Dundy" title="Elmer Scipio Dundy"><span data-dcnode-id="7602" instrument_node="">Elmer Scipio Dundy</span></a><span data-dcnode-id="7600" instrument_node=""> of </span><a data-dcnode-id="7598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nebraska" title="Nebraska"><span data-dcnode-id="7599" instrument_node="">Nebraska</span></a><span data-dcnode-id="7597" instrument_node=""> declared that Indians were people within the meaning of the laws, and they had the rights associated with a writ of </span><a data-dcnode-id="7595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Habeas_corpus" title="Habeas corpus"><span data-dcnode-id="7596" instrument_node="">habeas corpus</span></a><span data-dcnode-id="7594" instrument_node="">. However, Judge Dundy left unsettled the question as to whether Native Americans were guaranteed US citizenship.</span><sup class="reference" data-dcnode-id="7591" id="cite_ref-42"><a data-dcnode-id="7592" href="#cite_note-42"><span data-dcnode-id="7593" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7590" instrument_node="">
</span></p><p data-dcnode-id="7571"><span data-dcnode-id="7588" instrument_node="">Although Native Americans were born within the national boundaries of the United States, those on </span><a data-dcnode-id="7586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_reservation" title="Indian reservation"><span data-dcnode-id="7587" instrument_node="">Indian reservations</span></a><span data-dcnode-id="7585" instrument_node=""> were considered citizens of their own tribes, rather than of the United States. They were denied the right to vote because they were not considered citizens by law and were thus ineligible. Many Native Americans were told they would become citizens if they gave up their tribal affiliations in 1887 under the </span><a data-dcnode-id="7583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dawes_Act" title="Dawes Act"><span data-dcnode-id="7584" instrument_node="">Dawes Act</span></a><span data-dcnode-id="7582" instrument_node="">, which allocated communal lands to individual households and was intended to aid in the </span><a data-dcnode-id="7580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_assimilation_of_Native_Americans" title="Cultural assimilation of Native Americans"><span data-dcnode-id="7581" instrument_node="">assimilation of Native Americans into majority culture</span></a><span data-dcnode-id="7579" instrument_node="">. This still did not guarantee their right to vote. In 1924, the remaining Native Americans, estimated at one-third, became United States citizens through the </span><a data-dcnode-id="7577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_Citizenship_Act" title="Indian Citizenship Act"><span data-dcnode-id="7578" instrument_node="">Indian Citizenship Act</span></a><span data-dcnode-id="7576" instrument_node="">. Many western states, however, continued to restrict Native American ability to vote through property requirements, economic pressures, hiding the polls, and condoning of physical violence against those who voted.</span><sup class="reference" data-dcnode-id="7573" id="cite_ref-43"><a data-dcnode-id="7574" href="#cite_note-43"><span data-dcnode-id="7575" instrument_node="">[42]</span></a></sup><span data-dcnode-id="7572" instrument_node=""> Since the late 20th century, they have been protected under provisions of the Voting Rights Act as a racial minority, and in some areas, language minority, gaining election materials in their native languages.
</span></p><span data-dcnode-id="7570" instrument_node="">
</span><h3 data-dcnode-id="7560"><span class="mw-headline" data-dcnode-id="7568" id="Alaska_Natives"><span data-dcnode-id="7569" instrument_node="">Alaska Natives</span></span><span class="mw-editsection" data-dcnode-id="7561"><span class="mw-editsection-bracket" data-dcnode-id="7566"><span data-dcnode-id="7567" instrument_node="">[</span></span><a data-dcnode-id="7564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D4" title="Edit section: Alaska Natives"><span data-dcnode-id="7565" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7562"><span data-dcnode-id="7563" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7559" instrument_node="">
</span><p data-dcnode-id="7464"><span data-dcnode-id="7558" instrument_node="">The </span><a data-dcnode-id="7556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Territory_of_Alaska" title="Territory of Alaska"><span data-dcnode-id="7557" instrument_node="">Alaskan Territory</span></a><span data-dcnode-id="7555" instrument_node=""> did not consider </span><a data-dcnode-id="7553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska_Natives" title="Alaska Natives"><span data-dcnode-id="7554" instrument_node="">Alaska Natives</span></a><span data-dcnode-id="7552" instrument_node=""> to be citizens of the United States and so they could not vote.</span><sup class="reference" data-dcnode-id="7549" id="cite_ref-:5_44-0"><a data-dcnode-id="7550" href="#cite_note-:5-44"><span data-dcnode-id="7551" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="7546" id="cite_ref-:6_45-0"><a data-dcnode-id="7547" href="#cite_note-:6-45"><span data-dcnode-id="7548" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7545" instrument_node=""> An exception to this rule was that indigenous women were considered citizens if they were married to white men.</span><sup class="reference" data-dcnode-id="7542" id="cite_ref-:6_45-1"><a data-dcnode-id="7543" href="#cite_note-:6-45"><span data-dcnode-id="7544" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7541" instrument_node=""> In 1915, the Territorial Legislature passed a law that allowed Alaska Natives the right to vote if they gave up their "tribal customs and traditions."</span><sup class="reference" data-dcnode-id="7538" id="cite_ref-:5_44-1"><a data-dcnode-id="7539" href="#cite_note-:5-44"><span data-dcnode-id="7540" instrument_node="">[43]</span></a></sup><span data-dcnode-id="7537" instrument_node=""> </span><a data-dcnode-id="7535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Paul_%28attorney%29" title="William Paul (attorney)"><span data-dcnode-id="7536" instrument_node="">William Paul</span></a><span data-dcnode-id="7534" instrument_node=""> (</span><a data-dcnode-id="7532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tlingit" title="Tlingit"><span data-dcnode-id="7533" instrument_node="">Tlingit</span></a><span data-dcnode-id="7531" instrument_node="">) fought for the right of Alaska Natives to vote during the 1920s.</span><sup class="reference" data-dcnode-id="7528" id="cite_ref-FOOTNOTECole1992432_46-0"><a data-dcnode-id="7529" href="#cite_note-FOOTNOTECole1992432-46"><span data-dcnode-id="7530" instrument_node="">[45]</span></a></sup><span data-dcnode-id="7527" instrument_node=""> Others, like </span><a data-dcnode-id="7525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tillie_Paul" title="Tillie Paul"><span data-dcnode-id="7526" instrument_node="">Tillie Paul</span></a><span data-dcnode-id="7524" instrument_node=""> (Tlingit) and Charlie Jones (Tlingit), were arrested for voting because they were still not considered citizens.</span><sup class="reference" data-dcnode-id="7521" id="cite_ref-:33_47-0"><a data-dcnode-id="7522" href="#cite_note-:33-47"><span data-dcnode-id="7523" instrument_node="">[46]</span></a></sup><span data-dcnode-id="7520" instrument_node=""> Later, Paul would win a court case that set the precedent that Alaska Natives were legally allowed to vote.</span><sup class="reference" data-dcnode-id="7517" id="cite_ref-:33_47-1"><a data-dcnode-id="7518" href="#cite_note-:33-47"><span data-dcnode-id="7519" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="7514" id="cite_ref-48"><a data-dcnode-id="7515" href="#cite_note-48"><span data-dcnode-id="7516" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7513" instrument_node=""> In 1925, a literacy test was passed in Alaska to suppress the votes of Alaska Natives.</span><sup class="reference" data-dcnode-id="7510" id="cite_ref-FOOTNOTECole1992433_49-0"><a data-dcnode-id="7511" href="#cite_note-FOOTNOTECole1992433-49"><span data-dcnode-id="7512" instrument_node="">[48]</span></a></sup><span data-dcnode-id="7509" instrument_node=""> After passage of the </span><a data-dcnode-id="7507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska_Equal_Rights_Act_of_1945" title="Alaska Equal Rights Act of 1945"><span data-dcnode-id="7508" instrument_node="">Alaska Equal Rights Act of 1945</span></a><span data-dcnode-id="7506" instrument_node="">, Alaska Natives gained more rights, but there was still voter discrimination.</span><sup class="reference" data-dcnode-id="7503" id="cite_ref-FOOTNOTECole1992449_50-0"><a data-dcnode-id="7504" href="#cite_note-FOOTNOTECole1992449-50"><span data-dcnode-id="7505" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="7500" id="cite_ref-FOOTNOTETuckerLandrethLynch2017330_51-0"><a data-dcnode-id="7501" href="#cite_note-FOOTNOTETuckerLandrethLynch2017330-51"><span data-dcnode-id="7502" instrument_node="">[50]</span></a></sup><span data-dcnode-id="7499" instrument_node=""> When Alaska became a state, the new </span><a data-dcnode-id="7497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Alaska" title="Constitution of Alaska"><span data-dcnode-id="7498" instrument_node="">Constitution of Alaska</span></a><span data-dcnode-id="7496" instrument_node=""> provided Alaskans with a more lenient literacy test.</span><sup class="reference" data-dcnode-id="7493" id="cite_ref-FOOTNOTEChristen201998_52-0"><a data-dcnode-id="7494" href="#cite_note-FOOTNOTEChristen201998-52"><span data-dcnode-id="7495" instrument_node="">[51]</span></a></sup><span data-dcnode-id="7492" instrument_node=""> In 1970, the </span><a data-dcnode-id="7490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska_Legislature" title="Alaska Legislature"><span data-dcnode-id="7491" instrument_node="">Alaska Legislature</span></a><span data-dcnode-id="7489" instrument_node=""> ratified a constitutional amendment against state voter literacy tests.</span><sup class="reference" data-dcnode-id="7486" id="cite_ref-FOOTNOTEChristen201998_52-1"><a data-dcnode-id="7487" href="#cite_note-FOOTNOTEChristen201998-52"><span data-dcnode-id="7488" instrument_node="">[51]</span></a></sup><span data-dcnode-id="7485" instrument_node=""> The </span><a data-dcnode-id="7483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_Rights_Act_of_1965" title="Voting Rights Act of 1965"><span data-dcnode-id="7484" instrument_node="">Voting Rights Act of 1965</span></a><span data-dcnode-id="7482" instrument_node=""> (VRA), modified in 1975, provided additional help for Alaska Natives who do not speak English, which affects around 14 </span><a class="mw-redirect" data-dcnode-id="7480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Census_areas_of_Alaska" title="Census areas of Alaska"><span data-dcnode-id="7481" instrument_node="">census areas</span></a><span data-dcnode-id="7479" instrument_node="">.</span><sup class="reference" data-dcnode-id="7476" id="cite_ref-FOOTNOTEAlaska_Advisory_Committee_to_the_U.S._Commission_on_Civil_Rights20181_53-0"><a data-dcnode-id="7477" href="#cite_note-FOOTNOTEAlaska_Advisory_Committee_to_the_U.S._Commission_on_Civil_Rights20181-53"><span data-dcnode-id="7478" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="7473" id="cite_ref-FOOTNOTETuckerLandrethLynch2017336_54-0"><a data-dcnode-id="7474" href="#cite_note-FOOTNOTETuckerLandrethLynch2017336-54"><span data-dcnode-id="7475" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="7470" id="cite_ref-FOOTNOTEAlaska_Advisory_Committee_to_the_U.S._Commission_on_Civil_Rights20182_55-0"><a data-dcnode-id="7471" href="#cite_note-FOOTNOTEAlaska_Advisory_Committee_to_the_U.S._Commission_on_Civil_Rights20182-55"><span data-dcnode-id="7472" instrument_node="">[54]</span></a></sup><span data-dcnode-id="7469" instrument_node=""> Many villages with large Alaska Native populations continue to face difficulties voting.</span><sup class="reference" data-dcnode-id="7466" id="cite_ref-FOOTNOTETuckerLandrethLynch2017342-343_56-0"><a data-dcnode-id="7467" href="#cite_note-FOOTNOTETuckerLandrethLynch2017342-343-56"><span data-dcnode-id="7468" instrument_node="">[55]</span></a></sup><span data-dcnode-id="7465" instrument_node="">
</span></p><span data-dcnode-id="7463" instrument_node="">
</span><h2 data-dcnode-id="7453"><span class="mw-headline" data-dcnode-id="7461" id="Religious_test"><span data-dcnode-id="7462" instrument_node="">Religious test</span></span><span class="mw-editsection" data-dcnode-id="7454"><span class="mw-editsection-bracket" data-dcnode-id="7459"><span data-dcnode-id="7460" instrument_node="">[</span></span><a data-dcnode-id="7457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D5" title="Edit section: Religious test"><span data-dcnode-id="7458" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7455"><span data-dcnode-id="7456" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7452" instrument_node="">
</span><p data-dcnode-id="7428"><span data-dcnode-id="7451" instrument_node="">In several </span><a data-dcnode-id="7449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thirteen_Colonies" title="Thirteen Colonies"><span data-dcnode-id="7450" instrument_node="">British North American colonies</span></a><span data-dcnode-id="7448" instrument_node="">, before and after the 1776 </span><a data-dcnode-id="7446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Declaration_of_Independence" title="United States Declaration of Independence"><span data-dcnode-id="7447" instrument_node="">Declaration of Independence</span></a><span data-dcnode-id="7445" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jew" title="Jew"><span data-dcnode-id="7444" instrument_node="">Jews</span></a><span data-dcnode-id="7442" instrument_node="">, </span><a data-dcnode-id="7440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quakers" title="Quakers"><span data-dcnode-id="7441" instrument_node="">Quakers</span></a><span data-dcnode-id="7439" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Catholic_Church" title="Roman Catholic Church"><span data-dcnode-id="7438" instrument_node="">Catholics</span></a><span data-dcnode-id="7436" instrument_node="">, and/or </span><a class="mw-redirect" data-dcnode-id="7434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atheists" title="Atheists"><span data-dcnode-id="7435" instrument_node="">Atheists</span></a><span data-dcnode-id="7433" instrument_node=""> were excluded from the franchise and/or from running for elections.</span><sup class="reference" data-dcnode-id="7430" id="cite_ref-williamson1960_57-0"><a data-dcnode-id="7431" href="#cite_note-williamson1960-57"><span data-dcnode-id="7432" instrument_node="">[56]</span></a></sup><span data-dcnode-id="7429" instrument_node="">
</span></p><p data-dcnode-id="7377"><span data-dcnode-id="7427" instrument_node="">The </span><a data-dcnode-id="7425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delaware_Constitution_of_1776" title="Delaware Constitution of 1776"><span data-dcnode-id="7426" instrument_node="">Delaware Constitution of 1776</span></a><span data-dcnode-id="7424" instrument_node=""> stated that "Every person who shall be chosen a member of either house, or appointed to any office or place of trust, before taking his seat, or entering upon the execution of his office, shall</span><span class="nowrap" data-dcnode-id="7422"><span data-dcnode-id="7423" instrument_node="">&nbsp;</span></span><span data-dcnode-id="7421" instrument_node="">... also make and subscribe the following declaration, to wit: </span><i data-dcnode-id="7410"><span data-dcnode-id="7420" instrument_node="">I, A B. do profess faith in God the Father, and in Jesus Christ His only Son, and in the </span><a class="mw-redirect" data-dcnode-id="7418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holy_Spirit_%28Christianity%29" title="Holy Spirit (Christianity)"><span data-dcnode-id="7419" instrument_node="">Holy Ghost</span></a><span data-dcnode-id="7417" instrument_node="">, one God, blessed for evermore; and I do acknowledge the holy scriptures of the </span><a data-dcnode-id="7415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_Testament" title="Old Testament"><span data-dcnode-id="7416" instrument_node="">Old</span></a><span data-dcnode-id="7414" instrument_node=""> and </span><a data-dcnode-id="7412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Testament" title="New Testament"><span data-dcnode-id="7413" instrument_node="">New</span></a><span data-dcnode-id="7411" instrument_node=""> Testament to be given by divine inspiration.</span></i><span data-dcnode-id="7409" instrument_node="">".</span><sup class="reference" data-dcnode-id="7406" id="cite_ref-58"><a data-dcnode-id="7407" href="#cite_note-58"><span data-dcnode-id="7408" instrument_node="">[57]</span></a></sup><span data-dcnode-id="7405" instrument_node=""> This was repealed by Article&nbsp;I, Section&nbsp;II. of the </span><a data-dcnode-id="7403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Delaware_Constitution_of_1792" title="Delaware Constitution of 1792"><span data-dcnode-id="7404" instrument_node="">1792 Constitution</span></a><span data-dcnode-id="7402" instrument_node="">: "No religious test shall be required as a qualification to any office, or public trust, under this State".</span><sup class="reference" data-dcnode-id="7399" id="cite_ref-59"><a data-dcnode-id="7400" href="#cite_note-59"><span data-dcnode-id="7401" instrument_node="">[58]</span></a></sup><span data-dcnode-id="7398" instrument_node=""> The 1778 </span><a class="mw-redirect" data-dcnode-id="7396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Carolina_Constitution" title="South Carolina Constitution"><span data-dcnode-id="7397" instrument_node="">Constitution of the State of South Carolina</span></a><span data-dcnode-id="7395" instrument_node=""> stated, "No person shall be eligible to sit in the house of representatives unless he be of the </span><a data-dcnode-id="7393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protestantism_in_the_United_States" title="Protestantism in the United States"><span data-dcnode-id="7394" instrument_node="">Protestant</span></a><span data-dcnode-id="7392" instrument_node=""> religion",</span><sup class="reference" data-dcnode-id="7389" id="cite_ref-60"><a data-dcnode-id="7390" href="#cite_note-60"><span data-dcnode-id="7391" instrument_node="">[59]</span></a></sup><span data-dcnode-id="7388" instrument_node=""> the 1777 </span><a data-dcnode-id="7386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Georgia_%28U.S._state%29" title="Constitution of Georgia (U.S. state)"><span data-dcnode-id="7387" instrument_node="">Constitution of the State of Georgia</span></a><span data-dcnode-id="7385" instrument_node=""> (art. VI) that "The representatives shall be chosen out of the residents in each county</span><span class="nowrap" data-dcnode-id="7383"><span data-dcnode-id="7384" instrument_node="">&nbsp;</span></span><span data-dcnode-id="7382" instrument_node="">... and they shall be of the Protestant religion".</span><sup class="reference" data-dcnode-id="7379" id="cite_ref-61"><a data-dcnode-id="7380" href="#cite_note-61"><span data-dcnode-id="7381" instrument_node="">[60]</span></a></sup><span data-dcnode-id="7378" instrument_node="">
</span></p><p data-dcnode-id="7354"><span data-dcnode-id="7376" instrument_node="">With the growth in the number of </span><a data-dcnode-id="7374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baptists_in_the_United_States" title="Baptists in the United States"><span data-dcnode-id="7375" instrument_node="">Baptists</span></a><span data-dcnode-id="7373" instrument_node=""> in Virginia before the </span><a data-dcnode-id="7371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Revolution" title="American Revolution"><span data-dcnode-id="7372" instrument_node="">American Revolution</span></a><span data-dcnode-id="7370" instrument_node="">, who challenged the established </span><a data-dcnode-id="7368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Church_of_England" title="Church of England"><span data-dcnode-id="7369" instrument_node="">Church of England</span></a><span data-dcnode-id="7367" instrument_node="">, the issues of </span><a data-dcnode-id="7365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_religion_in_the_United_States" title="Freedom of religion in the United States"><span data-dcnode-id="7366" instrument_node="">religious freedom</span></a><span data-dcnode-id="7364" instrument_node=""> became important to rising leaders such as </span><a data-dcnode-id="7362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Madison" title="James Madison"><span data-dcnode-id="7363" instrument_node="">James Madison</span></a><span data-dcnode-id="7361" instrument_node="">. As a young lawyer, he defended Baptist preachers who were not licensed by (and were opposed by) the established state </span><a data-dcnode-id="7359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglican_Church_in_America" title="Anglican Church in America"><span data-dcnode-id="7360" instrument_node="">Anglican Church</span></a><span data-dcnode-id="7358" instrument_node="">. He carried developing ideas about religious freedom to be incorporated into the </span><a data-dcnode-id="7356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitutional_Convention_%28United_States%29" title="Constitutional Convention (United States)"><span data-dcnode-id="7357" instrument_node="">constitutional convention of the United States</span></a><span data-dcnode-id="7355" instrument_node="">.
</span></p><p data-dcnode-id="7343"><span data-dcnode-id="7353" instrument_node="">In 1787, </span><a data-dcnode-id="7351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Article_One_of_the_United_States_Constitution" title="Article One of the United States Constitution"><span data-dcnode-id="7352" instrument_node="">Article One of the United States Constitution</span></a><span data-dcnode-id="7350" instrument_node=""> stated that "the Electors in each State shall have the Qualifications requisite for Electors of the most numerous Branch of the </span><a data-dcnode-id="7348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_legislature_%28United_States%29" title="State legislature (United States)"><span data-dcnode-id="7349" instrument_node="">State Legislature</span></a><span data-dcnode-id="7347" instrument_node="">". More significantly, </span><a data-dcnode-id="7345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Article_Six_of_the_United_States_Constitution" title="Article Six of the United States Constitution"><span data-dcnode-id="7346" instrument_node="">Article Six</span></a><span data-dcnode-id="7344" instrument_node=""> disavowed the religious test requirements of several states, saying: "[N]o religious Test shall ever be required as a Qualification to any Office or public Trust under the United States."
</span></p><p data-dcnode-id="7331"><span data-dcnode-id="7342" instrument_node="">But, in </span><a data-dcnode-id="7340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maryland" title="Maryland"><span data-dcnode-id="7341" instrument_node="">Maryland</span></a><span data-dcnode-id="7339" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jewish_Americans" title="Jewish Americans"><span data-dcnode-id="7338" instrument_node="">Jewish Americans</span></a><span data-dcnode-id="7336" instrument_node=""> were excluded from State office until the law requiring candidates to affirm a belief in an afterlife</span><sup class="reference" data-dcnode-id="7333" id="cite_ref-62"><a data-dcnode-id="7334" href="#cite_note-62"><span data-dcnode-id="7335" instrument_node="">[61]</span></a></sup><span data-dcnode-id="7332" instrument_node=""> was repealed in 1828.
</span></p><span data-dcnode-id="7330" instrument_node="">
</span><h2 data-dcnode-id="7320"><span class="mw-headline" data-dcnode-id="7328" id="African_Americans_and_poor_whites"><span data-dcnode-id="7329" instrument_node="">African Americans and poor whites</span></span><span class="mw-editsection" data-dcnode-id="7321"><span class="mw-editsection-bracket" data-dcnode-id="7326"><span data-dcnode-id="7327" instrument_node="">[</span></span><a data-dcnode-id="7324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D6" title="Edit section: African Americans and poor whites"><span data-dcnode-id="7325" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7322"><span data-dcnode-id="7323" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7319" instrument_node="">
</span><link data-dcnode-id="7318" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7308" role="note"><span data-dcnode-id="7317" instrument_node="">See also: </span><a data-dcnode-id="7315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_suffrage_in_the_United_States" title="Black suffrage in the United States"><span data-dcnode-id="7316" instrument_node="">Black suffrage in the United States</span></a><span data-dcnode-id="7314" instrument_node="">, </span><a data-dcnode-id="7312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fifteenth_Amendment_to_the_United_States_Constitution" title="Fifteenth Amendment to the United States Constitution"><span data-dcnode-id="7313" instrument_node="">Fifteenth Amendment to the United States Constitution</span></a><span data-dcnode-id="7311" instrument_node="">, and </span><a data-dcnode-id="7309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disfranchisement_after_the_Reconstruction_era" title="Disfranchisement after the Reconstruction era"><span data-dcnode-id="7310" instrument_node="">Disfranchisement after the Reconstruction era</span></a></div><span data-dcnode-id="7307" instrument_node="">
</span><p data-dcnode-id="7288"><span data-dcnode-id="7306" instrument_node="">At the time of ratification of the Constitution in the late 18th century, most states had </span><a data-dcnode-id="7304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Property_qualification" title="Property qualification"><span data-dcnode-id="7305" instrument_node="">property qualifications</span></a><span data-dcnode-id="7303" instrument_node=""> which restricted the franchise; the exact amount varied by state, but by some estimates, more than half of white men were disenfranchised.</span><sup class="reference" data-dcnode-id="7300" id="cite_ref-63"><a data-dcnode-id="7301" href="#cite_note-63"><span data-dcnode-id="7302" instrument_node="">[62]</span></a></sup><span data-dcnode-id="7299" instrument_node="">
Several states granted suffrage to </span><a data-dcnode-id="7297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_people_of_color" title="Free people of color"><span data-dcnode-id="7298" instrument_node="">free men of color</span></a><span data-dcnode-id="7296" instrument_node=""> after the Revolution, including North Carolina. This fact was noted by </span><a data-dcnode-id="7294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Robbins_Curtis" title="Benjamin Robbins Curtis"><span data-dcnode-id="7295" instrument_node="">Justice Benjamin Robbins Curtis'</span></a><span data-dcnode-id="7293" instrument_node=""> dissent in </span><i data-dcnode-id="7290"><a data-dcnode-id="7291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dred_Scott_v._Sandford" title="Dred Scott v. Sandford"><span data-dcnode-id="7292" instrument_node="">Dred Scott v. Sandford</span></a></i><span data-dcnode-id="7289" instrument_node=""> (1857), as he emphasized that blacks had been considered citizens at the time the Constitution was ratified:
</span></p><span data-dcnode-id="7287" instrument_node="">
</span><blockquote data-dcnode-id="7281"><p data-dcnode-id="7282"><span data-dcnode-id="7286" instrument_node="">Of this there can be no doubt. At the time of the ratification of the Articles of Confederation, all free native-born inhabitants of the States of New Hampshire, Massachusetts, New York, New Jersey, and North Carolina, though descended from African slaves, were not only citizens of those States, but such of them as had the other necessary qualifications possessed the franchise of electors, on equal terms with other citizens.</span><sup class="reference" data-dcnode-id="7283" id="cite_ref-64"><a data-dcnode-id="7284" href="#cite_note-64"><span data-dcnode-id="7285" instrument_node="">[63]</span></a></sup></p></blockquote><span data-dcnode-id="7280" instrument_node="">
</span><ul data-dcnode-id="7256"><li data-dcnode-id="7275"><span data-dcnode-id="7279" instrument_node="">In the 1820s, New York State enlarged its franchise to white men by dropping the property qualification, but maintained it for free blacks.</span><sup class="reference" data-dcnode-id="7276" id="cite_ref-65"><a data-dcnode-id="7277" href="#cite_note-65"><span data-dcnode-id="7278" instrument_node="">[64]</span></a></sup></li><span data-dcnode-id="7274" instrument_node="">
</span><li data-dcnode-id="7260"><span data-dcnode-id="7273" instrument_node="">The </span><a data-dcnode-id="7271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Carolina_Supreme_Court" title="North Carolina Supreme Court"><span data-dcnode-id="7272" instrument_node="">Supreme Court of North Carolina</span></a><span data-dcnode-id="7270" instrument_node=""> had upheld the ability of free African Americans to vote in that state. In 1835, because of fears of the role of free blacks after </span><a class="mw-redirect" data-dcnode-id="7268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nat_Turner%2527s_Slave_Rebellion" title="Nat Turner's Slave Rebellion"><span data-dcnode-id="7269" instrument_node="">Nat Turner's Slave Rebellion</span></a><span data-dcnode-id="7267" instrument_node=""> of 1831, they were disenfranchised by decision of the </span><a data-dcnode-id="7265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Carolina_Constitutional_Convention_of_1835" title="North Carolina Constitutional Convention of 1835"><span data-dcnode-id="7266" instrument_node="">North Carolina Constitutional Convention</span></a><span data-dcnode-id="7264" instrument_node="">. At the same time, convention delegates relaxed religious and property qualifications for whites, thus expanding the franchise for them.</span><sup class="reference" data-dcnode-id="7261" id="cite_ref-66"><a data-dcnode-id="7262" href="#cite_note-66"><span data-dcnode-id="7263" instrument_node="">[65]</span></a></sup></li><span data-dcnode-id="7259" instrument_node="">
</span><li data-dcnode-id="7257"><span data-dcnode-id="7258" instrument_node="">Alabama entered the union in 1819 with universal white suffrage provided in its constitution.</span></li></ul><span data-dcnode-id="7255" instrument_node="">
</span><p data-dcnode-id="7243"><span data-dcnode-id="7254" instrument_node="">When the Fourteenth Amendment was ratified in 1868 after the Civil War, it granted citizenship to all persons born or naturalized in the United States and subject to its jurisdiction. In 1869, the Fifteenth Amendment prohibited the government from denying a citizen the right to vote based on that citizen's "race, color, or previous condition of servitude". The major effect of these amendments was to enfranchise </span><a class="mw-redirect" data-dcnode-id="7252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/African_American" title="African American"><span data-dcnode-id="7253" instrument_node="">African American</span></a><span data-dcnode-id="7251" instrument_node=""> men, the overwhelming majority of whom were </span><a class="mw-redirect" data-dcnode-id="7249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedmen" title="Freedmen"><span data-dcnode-id="7250" instrument_node="">freedmen</span></a><span data-dcnode-id="7248" instrument_node=""> in the South.</span><sup class="reference" data-dcnode-id="7245" id="cite_ref-Alio_67-0"><a data-dcnode-id="7246" href="#cite_note-Alio-67"><span data-dcnode-id="7247" instrument_node="">[66]</span></a></sup><span data-dcnode-id="7244" instrument_node="">
</span></p><p data-dcnode-id="7234"><span data-dcnode-id="7242" instrument_node="">After the war, some Southern states passed "</span><a data-dcnode-id="7240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Codes_%28United_States%29" title="Black Codes (United States)"><span data-dcnode-id="7241" instrument_node="">Black Codes</span></a><span data-dcnode-id="7239" instrument_node="">", state laws to restrict the new freedoms of African Americans. They attempted to control their movement, assembly, working conditions and other civil rights. Some states also prohibited them from voting.</span><sup class="reference" data-dcnode-id="7236" id="cite_ref-Alio_67-1"><a data-dcnode-id="7237" href="#cite_note-Alio-67"><span data-dcnode-id="7238" instrument_node="">[66]</span></a></sup><span data-dcnode-id="7235" instrument_node="">
</span></p><p data-dcnode-id="7191"><span data-dcnode-id="7233" instrument_node="">The Fifteenth Amendment, one of three ratified after the </span><a data-dcnode-id="7231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_War" title="American Civil War"><span data-dcnode-id="7232" instrument_node="">American Civil War</span></a><span data-dcnode-id="7230" instrument_node=""> to grant freedmen full rights of citizenship, prevented any state from denying the right to vote to any citizen based on race. This was primarily related to protecting the franchise of freedmen, but it also applied to non-white minorities, such as </span><a data-dcnode-id="7228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_Mexican_Americans_in_Texas" title="History of Mexican Americans in Texas"><span data-dcnode-id="7229" instrument_node="">Mexican Americans in Texas</span></a><span data-dcnode-id="7227" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7220" style="white-space:nowrap;"><span data-dcnode-id="7226" instrument_node="">[</span><i data-dcnode-id="7222"><a data-dcnode-id="7223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7224" title="This claim needs references to reliable sources. (December 2020)"><span data-dcnode-id="7225" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7221" instrument_node="">]</span></sup><span data-dcnode-id="7219" instrument_node=""> The </span><a data-dcnode-id="7217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_governments_of_the_United_States" title="State governments of the United States"><span data-dcnode-id="7218" instrument_node="">state governments</span></a><span data-dcnode-id="7216" instrument_node=""> under </span><a class="mw-redirect" data-dcnode-id="7214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reconstruction_Era" title="Reconstruction Era"><span data-dcnode-id="7215" instrument_node="">Reconstruction</span></a><span data-dcnode-id="7213" instrument_node=""> adopted new </span><a data-dcnode-id="7211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_constitution_%28United_States%29" title="State constitution (United States)"><span data-dcnode-id="7212" instrument_node="">state constitutions</span></a><span data-dcnode-id="7210" instrument_node=""> or amendments designed to protect the ability of freedmen to vote. The white resistance to black suffrage after the war regularly erupted into violence as white groups tried to protect their power. Particularly in the </span><a class="mw-redirect" data-dcnode-id="7208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Southern_states" title="U.S. Southern states"><span data-dcnode-id="7209" instrument_node="">South</span></a><span data-dcnode-id="7207" instrument_node="">, in the aftermath of the Civil War whites made efforts to suppress </span><a class="mw-redirect" data-dcnode-id="7205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_negro" title="Free negro"><span data-dcnode-id="7206" instrument_node="">freedmen</span></a><span data-dcnode-id="7204" instrument_node="">'s voting. In the 1860s, secret </span><a class="mw-redirect" data-dcnode-id="7202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vigilante" title="Vigilante"><span data-dcnode-id="7203" instrument_node="">vigilante</span></a><span data-dcnode-id="7201" instrument_node=""> groups such as the </span><a data-dcnode-id="7199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ku_Klux_Klan" title="Ku Klux Klan"><span data-dcnode-id="7200" instrument_node="">Ku Klux Klan</span></a><span data-dcnode-id="7198" instrument_node=""> (KKK) used violence and intimidation to keep freedmen in a controlled role and reestablish white supremacy. The </span><a data-dcnode-id="7196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Army" title="United States Army"><span data-dcnode-id="7197" instrument_node="">United States Army</span></a><span data-dcnode-id="7195" instrument_node=""> and </span><a data-dcnode-id="7193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_Justice" title="United States Department of Justice"><span data-dcnode-id="7194" instrument_node="">Department Of Justice</span></a><span data-dcnode-id="7192" instrument_node=""> were successfully able to disband the Klan through prosecution and black freedmen registered and voted in high numbers, many of whom were elected to local offices through the 1880s.
</span></p><p data-dcnode-id="7167"><span data-dcnode-id="7190" instrument_node="">In the mid-1870s, the insurgencies continued with a rise in more powerful white </span><a class="mw-redirect" data-dcnode-id="7188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paramilitary_organizations" title="Paramilitary organizations"><span data-dcnode-id="7189" instrument_node="">paramilitary groups</span></a><span data-dcnode-id="7187" instrument_node="">, such as the </span><a data-dcnode-id="7185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_League" title="White League"><span data-dcnode-id="7186" instrument_node="">White League</span></a><span data-dcnode-id="7184" instrument_node="">, originating in </span><a data-dcnode-id="7182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louisiana" title="Louisiana"><span data-dcnode-id="7183" instrument_node="">Louisiana</span></a><span data-dcnode-id="7181" instrument_node=""> in 1874 after a disputed gubernatorial election; and the </span><a class="mw-redirect" data-dcnode-id="7179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Shirts_%28Southern_United_States%29" title="Red Shirts (Southern United States)"><span data-dcnode-id="7180" instrument_node="">Red Shirts</span></a><span data-dcnode-id="7178" instrument_node="">, originating in </span><a data-dcnode-id="7176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mississippi" title="Mississippi"><span data-dcnode-id="7177" instrument_node="">Mississippi</span></a><span data-dcnode-id="7175" instrument_node=""> in 1875 and developing numerous chapters in North and </span><a data-dcnode-id="7173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Carolina" title="South Carolina"><span data-dcnode-id="7174" instrument_node="">South Carolina</span></a><span data-dcnode-id="7172" instrument_node="">; as well as other "White Line" rifle clubs. They operated openly, were more organized than the KKK, and directed their efforts at political goals: to disrupt Republican organizing, turn Republicans out of office, and intimidate or kill blacks to suppress black voting. They worked as "the military arm of the Democratic Party".</span><sup class="reference" data-dcnode-id="7169" id="cite_ref-rable_68-0"><a data-dcnode-id="7170" href="#cite_note-rable-68"><span data-dcnode-id="7171" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7168" instrument_node=""> For instance, estimates were that 150 blacks were killed in North Carolina before the 1876 elections. Economic tactics such as eviction from rental housing or termination of employment were also used to suppress the black vote. The federal government withdrew its troops as a result of a national compromise related to the presidency, officially ending Reconstruction, and soon afterward the Supreme Court would strike down nearly every law passed through reconstruction that protected freedman from racially motivated violence from private actors while also taking a narrow view to the federal government's ability to enforce laws against state actors who perpetrated racially motivated violence. White Democrats regained power in state legislatures across the South by the late 1870s and declined to enforce laws against white supremacist paramilitary groups.
</span></p><p data-dcnode-id="7161"><span data-dcnode-id="7166" instrument_node="">African Americans were a majority in three Southern states following the Civil War, and represented over 40% of the population in four other states and many whites feared and resented the political power exercised by freedmen.</span><sup class="reference" data-dcnode-id="7163" id="cite_ref-69"><a data-dcnode-id="7164" href="#cite_note-69"><span data-dcnode-id="7165" instrument_node="">[68]</span></a></sup><span data-dcnode-id="7162" instrument_node=""> After ousting the Republicans, whites worked to restore white supremacy.
</span></p><p data-dcnode-id="7156"><span data-dcnode-id="7160" instrument_node="">Although elections were often surrounded by violence, blacks continued to vote and gained many local offices in the late 19th century. In the late 19th century, a Populist-Republican coalition in several states gained </span><a data-dcnode-id="7158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Governor_%28United_States%29" title="Governor (United States)"><span data-dcnode-id="7159" instrument_node="">governorships</span></a><span data-dcnode-id="7157" instrument_node=""> and some congressional seats in 1894. To prevent such a coalition from forming again and reduce election violence, the Democratic Party, dominant in all southern state legislatures, took action to disfranchise most blacks and many poor whites outright.
</span></p><p data-dcnode-id="7141"><span data-dcnode-id="7155" instrument_node="">From 1890 to 1908, ten of the eleven former Confederate states completed political suppression and exclusion of these groups by ratifying new constitutions or amendments which incorporated provisions to make voter registration more difficult. These included such requirements as payment of </span><a class="mw-redirect" data-dcnode-id="7153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poll_tax_%28United_States%29" title="Poll tax (United States)"><span data-dcnode-id="7154" instrument_node="">poll taxes</span></a><span data-dcnode-id="7152" instrument_node="">, complicated record keeping, complicated timing of registration and length of residency in relation to elections, with related record-keeping requirements; </span><a class="mw-redirect" data-dcnode-id="7150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Felony_disenfranchisement" title="Felony disenfranchisement"><span data-dcnode-id="7151" instrument_node="">felony disenfranchisement</span></a><span data-dcnode-id="7149" instrument_node=""> focusing on crimes thought to be committed by African Americans,</span><sup class="reference" data-dcnode-id="7146" id="cite_ref-70"><a data-dcnode-id="7147" href="#cite_note-70"><span data-dcnode-id="7148" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7145" instrument_node=""> and a </span><a data-dcnode-id="7143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literacy_test" title="Literacy test"><span data-dcnode-id="7144" instrument_node="">literacy test</span></a><span data-dcnode-id="7142" instrument_node=""> or comprehension test.
</span></p><p data-dcnode-id="7136"><span data-dcnode-id="7140" instrument_node="">This was defended openly, on the floor of the Senate, by South Carolina Senator and former Governor </span><a data-dcnode-id="7138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benjamin_Tillman" title="Benjamin Tillman"><span data-dcnode-id="7139" instrument_node="">Benjamin Tillman</span></a><span data-dcnode-id="7137" instrument_node="">:
</span></p><span data-dcnode-id="7135" instrument_node="">
</span><blockquote data-dcnode-id="7120"><p data-dcnode-id="7121"><span data-dcnode-id="7134" instrument_node="">In my State there were 135,000 negro voters, or negroes of voting age, and some 90,000 or 95,000 white voters.</span><span class="nowrap" data-dcnode-id="7132"><span data-dcnode-id="7133" instrument_node="">&nbsp;</span></span><span data-dcnode-id="7131" instrument_node="">... Now, I want to ask you, with a free vote and a fair count, how are you going to beat 135,000 by 95,000? How are you going to do it? You had set us an impossible task.</span><br data-dcnode-id="7130"><br data-dcnode-id="7129"><span data-dcnode-id="7128" instrument_node="">We did not disfranchise the negroes until 1895. Then we had a constitutional convention convened which took the matter up calmly, deliberately, and avowedly with the purpose of disfranchising as many of them as we could under the Fourteenth and Fifteenth Amendments. We adopted the educational qualification as the only means left to us, and the negro is as contented and as prosperous and as well protected in South Carolina to-day as in any State of the Union south of the Potomac. He is not meddling with politics, for he found that the more he meddled with them the worse off he got. As to his "rights"—I will not discuss them now. We of the South have never recognized the right of the negro to govern white men, and we never will.</span><span class="nowrap" data-dcnode-id="7126"><span data-dcnode-id="7127" instrument_node="">&nbsp;</span></span><span data-dcnode-id="7125" instrument_node="">... I would to God the last one of them was in Africa and that none of them had ever been brought to our shores.</span><sup class="reference" data-dcnode-id="7122" id="cite_ref-71"><a data-dcnode-id="7123" href="#cite_note-71"><span data-dcnode-id="7124" instrument_node="">[70]</span></a></sup></p></blockquote><span data-dcnode-id="7119" instrument_node="">
</span><p data-dcnode-id="7102"><span data-dcnode-id="7118" instrument_node="">Prospective voters had to prove the ability to read and write the </span><a data-dcnode-id="7116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/English_language" title="English language"><span data-dcnode-id="7117" instrument_node="">English language</span></a><span data-dcnode-id="7115" instrument_node=""> to white voter registrars, who in practice applied subjective requirements. </span><a data-dcnode-id="7113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/African_Americans" title="African Americans"><span data-dcnode-id="7114" instrument_node="">Blacks</span></a><span data-dcnode-id="7112" instrument_node=""> were often denied the right to vote on this basis. Even well-educated blacks were often told they had "failed" such a test, if in fact, it had been administered. On the other hand, illiterate </span><a class="mw-redirect" data-dcnode-id="7110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Whites" title="Whites"><span data-dcnode-id="7111" instrument_node="">whites</span></a><span data-dcnode-id="7109" instrument_node=""> were sometimes allowed to vote through a "</span><a data-dcnode-id="7107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grandfather_clause" title="Grandfather clause"><span data-dcnode-id="7108" instrument_node="">grandfather clause</span></a><span data-dcnode-id="7106" instrument_node="">," which waived literacy requirements if one's grandfather had been a qualified voter before 1866, or had served as a soldier, or was from a foreign country. As most blacks had grandfathers who were slaves before 1866 and could not have fulfilled any of those conditions, they could not use the grandfather clause exemption. Selective enforcement of the </span><a class="mw-redirect" data-dcnode-id="7104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poll_tax_%28United_States%29" title="Poll tax (United States)"><span data-dcnode-id="7105" instrument_node="">poll tax</span></a><span data-dcnode-id="7103" instrument_node=""> was frequently also used to disqualify black and poor white voters. As a result of these measures, at the turn of the century voter rolls dropped markedly across the South. Most blacks and many poor whites were excluded from the political system for decades. Unable to vote, they were also excluded from juries or running for any office.
</span></p><p data-dcnode-id="7080"><span data-dcnode-id="7101" instrument_node="">In Alabama, for example, its 1901 constitution restricted the franchise for poor whites as well as blacks. It contained requirements for payment of cumulative </span><a class="mw-redirect" data-dcnode-id="7099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poll_tax_%28United_States%29" title="Poll tax (United States)"><span data-dcnode-id="7100" instrument_node="">poll taxes</span></a><span data-dcnode-id="7098" instrument_node="">, completion of </span><a class="mw-redirect" data-dcnode-id="7096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literacy_tests" title="Literacy tests"><span data-dcnode-id="7097" instrument_node="">literacy tests</span></a><span data-dcnode-id="7095" instrument_node="">, and increased residency at state, county and precinct levels, effectively </span><a class="mw-redirect" data-dcnode-id="7093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disfranchisement_after_Reconstruction_era" title="Disfranchisement after Reconstruction era"><span data-dcnode-id="7094" instrument_node="">disenfranchising</span></a><span data-dcnode-id="7092" instrument_node=""> tens of thousands of </span><a data-dcnode-id="7090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poor_White" title="Poor White"><span data-dcnode-id="7091" instrument_node="">poor whites</span></a><span data-dcnode-id="7089" instrument_node=""> as well as most blacks. Historian J. Morgan Kousser found, "They disfranchised these whites as willingly as they deprived blacks of the vote."</span><sup class="reference" data-dcnode-id="7086" id="cite_ref-72"><a data-dcnode-id="7087" href="#cite_note-72"><span data-dcnode-id="7088" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7085" instrument_node=""> By 1941, more whites than blacks in total had been disenfranchised.</span><sup class="reference" data-dcnode-id="7082" id="cite_ref-Glenn_Feldman_2004,_pp._135–136_73-0"><a data-dcnode-id="7083" href="#cite_note-Glenn_Feldman_2004,_pp._135%E2%80%93136-73"><span data-dcnode-id="7084" instrument_node="">[72]</span></a></sup><span data-dcnode-id="7081" instrument_node="">
</span></p><span data-dcnode-id="7079" instrument_node="">
</span><h3 data-dcnode-id="7069"><span class="mw-headline" data-dcnode-id="7077" id="Legal_challenges_to_disfranchisement"><span data-dcnode-id="7078" instrument_node="">Legal challenges to disfranchisement</span></span><span class="mw-editsection" data-dcnode-id="7070"><span class="mw-editsection-bracket" data-dcnode-id="7075"><span data-dcnode-id="7076" instrument_node="">[</span></span><a data-dcnode-id="7073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D7" title="Edit section: Legal challenges to disfranchisement"><span data-dcnode-id="7074" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7071"><span data-dcnode-id="7072" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7068" instrument_node="">
</span><link data-dcnode-id="7067" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7057" role="note"><span data-dcnode-id="7066" instrument_node="">Main articles: </span><a data-dcnode-id="7064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_rights_movement" title="Civil rights movement"><span data-dcnode-id="7065" instrument_node="">Civil rights movement</span></a><span data-dcnode-id="7063" instrument_node="">, </span><a data-dcnode-id="7061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_rights_movement_%281865%25E2%2580%25931896%29" title="Civil rights movement (1865–1896)"><span data-dcnode-id="7062" instrument_node="">Civil rights movement (1865–1896)</span></a><span data-dcnode-id="7060" instrument_node="">, and </span><a data-dcnode-id="7058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_rights_movement_%281896%25E2%2580%25931954%29" title="Civil rights movement (1896–1954)"><span data-dcnode-id="7059" instrument_node="">Civil rights movement (1896–1954)</span></a></div><span data-dcnode-id="7056" instrument_node="">
</span><p data-dcnode-id="7021"><span data-dcnode-id="7055" instrument_node="">Although African Americans quickly began legal challenges to such provisions in the 19th century, it was years before any were successful before the </span><a class="mw-redirect" data-dcnode-id="7053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._Supreme_Court" title="U.S. Supreme Court"><span data-dcnode-id="7054" instrument_node="">U.S. Supreme Court</span></a><span data-dcnode-id="7052" instrument_node="">. </span><a data-dcnode-id="7050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Booker_T._Washington" title="Booker T. Washington"><span data-dcnode-id="7051" instrument_node="">Booker T. Washington</span></a><span data-dcnode-id="7049" instrument_node="">, better known for his public stance of trying to work within societal constraints of the period at </span><a data-dcnode-id="7047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tuskegee_University" title="Tuskegee University"><span data-dcnode-id="7048" instrument_node="">Tuskegee University</span></a><span data-dcnode-id="7046" instrument_node="">, secretly helped fund and arrange representation for numerous legal challenges to disfranchisement. He called upon wealthy Northern allies and philanthropists to raise funds for the cause.</span><sup class="reference" data-dcnode-id="7043" id="cite_ref-74"><a data-dcnode-id="7044" href="#cite_note-74"><span data-dcnode-id="7045" instrument_node="">[73]</span></a></sup><span data-dcnode-id="7042" instrument_node=""> The Supreme Court's upholding of </span><a data-dcnode-id="7040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_of_Mississippi" title="Constitution of Mississippi"><span data-dcnode-id="7041" instrument_node="">Mississippi's new constitution</span></a><span data-dcnode-id="7039" instrument_node="">, in </span><i data-dcnode-id="7036"><a data-dcnode-id="7037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Williams_v._Mississippi" title="Williams v. Mississippi"><span data-dcnode-id="7038" instrument_node="">Williams v. Mississippi</span></a></i><span data-dcnode-id="7035" instrument_node=""> (1898), encouraged other states to follow the Mississippi plan of disfranchisement. African Americans brought other legal challenges, as in </span><i data-dcnode-id="7032"><a data-dcnode-id="7033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giles_v._Harris" title="Giles v. Harris"><span data-dcnode-id="7034" instrument_node="">Giles v. Harris</span></a></i><span data-dcnode-id="7031" instrument_node=""> (1903) and </span><i data-dcnode-id="7029"><span data-dcnode-id="7030" instrument_node="">Giles v. Teasley</span></i><span data-dcnode-id="7028" instrument_node=""> (1904), but the Supreme Court upheld </span><a data-dcnode-id="7026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alabama" title="Alabama"><span data-dcnode-id="7027" instrument_node="">Alabama</span></a><span data-dcnode-id="7025" instrument_node=""> constitutional provisions. In 1915, Oklahoma was the last state to append a </span><a data-dcnode-id="7023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grandfather_clause" title="Grandfather clause"><span data-dcnode-id="7024" instrument_node="">grandfather clause</span></a><span data-dcnode-id="7022" instrument_node=""> to its literacy requirement due to Supreme Court cases.
</span></p><p data-dcnode-id="7003"><span data-dcnode-id="7020" instrument_node="">From early in the 20th century, the newly established </span><a class="mw-redirect" data-dcnode-id="7018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Association_for_the_Advancement_of_Colored_People" title="National Association for the Advancement of Colored People"><span data-dcnode-id="7019" instrument_node="">National Association for the Advancement of Colored People</span></a><span data-dcnode-id="7017" instrument_node=""> (</span><a data-dcnode-id="7015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NAACP" title="NAACP"><span data-dcnode-id="7016" instrument_node="">NAACP</span></a><span data-dcnode-id="7014" instrument_node="">) took the lead in organizing or supporting legal challenges to segregation and disfranchisement. Gradually they planned the strategy of which cases to take forward. In </span><i data-dcnode-id="7011"><a data-dcnode-id="7012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guinn_v._United_States" title="Guinn v. United States"><span data-dcnode-id="7013" instrument_node="">Guinn v. United States</span></a></i><span data-dcnode-id="7010" instrument_node=""> (1915), the first case in which the NAACP filed a brief, the Supreme Court struck down the grandfather clause in </span><a data-dcnode-id="7008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oklahoma" title="Oklahoma"><span data-dcnode-id="7009" instrument_node="">Oklahoma</span></a><span data-dcnode-id="7007" instrument_node=""> and </span><a data-dcnode-id="7005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maryland" title="Maryland"><span data-dcnode-id="7006" instrument_node="">Maryland</span></a><span data-dcnode-id="7004" instrument_node="">. Other states in which it was used had to retract their legislation as well. The challenge was successful.
</span></p><p data-dcnode-id="6994"><span data-dcnode-id="7002" instrument_node="">But, nearly as rapidly as the Supreme Court determined a specific provision was unconstitutional, state legislatures developed new statutes to continue disenfranchisement. For instance, in </span><i data-dcnode-id="6999"><a data-dcnode-id="7000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smith_v._Allwright" title="Smith v. Allwright"><span data-dcnode-id="7001" instrument_node="">Smith v. Allwright</span></a></i><span data-dcnode-id="6998" instrument_node=""> (1944), the Supreme Court struck down the use of state-sanctioned all-white primaries by the </span><a data-dcnode-id="6996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southern_Democrats" title="Southern Democrats"><span data-dcnode-id="6997" instrument_node="">Southern Democrats</span></a><span data-dcnode-id="6995" instrument_node="">. States developed new restrictions on black voting; Alabama passed a law giving county registrars more authority as to which questions they asked applicants in comprehension or literacy tests. The NAACP continued with steady progress in legal challenges to disenfranchisement and segregation.
</span></p><p data-dcnode-id="6986"><span data-dcnode-id="6993" instrument_node="">In 1957, Congress passed the </span><a data-dcnode-id="6991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Rights_Act_of_1957" title="Civil Rights Act of 1957"><span data-dcnode-id="6992" instrument_node="">Civil Rights Act of 1957</span></a><span data-dcnode-id="6990" instrument_node=""> to implement the Fifteenth Amendment. It established the </span><a class="mw-redirect" data-dcnode-id="6988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Civil_Rights_Commission" title="United States Civil Rights Commission"><span data-dcnode-id="6989" instrument_node="">United States Civil Rights Commission</span></a><span data-dcnode-id="6987" instrument_node="">; among its duties is to investigate voter discrimination.
