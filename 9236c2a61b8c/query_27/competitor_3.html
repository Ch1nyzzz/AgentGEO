</span></p><p data-dcnode-id="6970"><span data-dcnode-id="6985" instrument_node="">As late as 1962, programs such as </span><a data-dcnode-id="6983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Eagle_Eye_%28United_States%29" title="Operation Eagle Eye (United States)"><span data-dcnode-id="6984" instrument_node="">Operation Eagle Eye</span></a><span data-dcnode-id="6982" instrument_node=""> in Arizona attempted to stymie minority voting through literacy tests.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6975" style="white-space:nowrap;"><span data-dcnode-id="6981" instrument_node="">[</span><i data-dcnode-id="6977"><a data-dcnode-id="6978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6979" title="This claim needs references to reliable sources. (December 2020)"><span data-dcnode-id="6980" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6976" instrument_node="">]</span></sup><span data-dcnode-id="6974" instrument_node=""> The </span><a data-dcnode-id="6972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twenty-fourth_Amendment_to_the_United_States_Constitution" title="Twenty-fourth Amendment to the United States Constitution"><span data-dcnode-id="6973" instrument_node="">Twenty-fourth Amendment</span></a><span data-dcnode-id="6971" instrument_node=""> was ratified in 1964 to prohibit poll taxes as a condition of voter registration and voting in federal elections. Many states continued to use them in state elections as a means of reducing the number of voters.
</span></p><p data-dcnode-id="6953"><span data-dcnode-id="6969" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="6967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_Rights_Movement" title="American Civil Rights Movement"><span data-dcnode-id="6968" instrument_node="">American Civil Rights Movement</span></a><span data-dcnode-id="6966" instrument_node="">, through such events as the </span><a data-dcnode-id="6964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Selma_to_Montgomery_marches" title="Selma to Montgomery marches"><span data-dcnode-id="6965" instrument_node="">Selma to Montgomery marches</span></a><span data-dcnode-id="6963" instrument_node=""> and </span><a data-dcnode-id="6961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_Summer" title="Freedom Summer"><span data-dcnode-id="6962" instrument_node="">Freedom Summer</span></a><span data-dcnode-id="6960" instrument_node=""> in Mississippi, gained passage by the </span><a data-dcnode-id="6958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Congress" title="United States Congress"><span data-dcnode-id="6959" instrument_node="">United States Congress</span></a><span data-dcnode-id="6957" instrument_node=""> of the </span><a data-dcnode-id="6955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_Rights_Act_of_1965" title="Voting Rights Act of 1965"><span data-dcnode-id="6956" instrument_node="">Voting Rights Act of 1965</span></a><span data-dcnode-id="6954" instrument_node="">, which authorized federal oversight of voter registration and election practices and other enforcement of voting rights. Congress passed the legislation because it found "case by case litigation was inadequate to combat widespread and persistent discrimination in voting". Activism by African Americans helped secure an expanded and protected franchise that has benefited all Americans, including racial and language minorities.
</span></p><p data-dcnode-id="6937"><span data-dcnode-id="6952" instrument_node="">The bill provided for federal oversight, if necessary, to ensure just voter registration and election procedures. The rate of African-American registration and voting in Southern states climbed dramatically and quickly, but it has taken years of federal oversight to work out the processes and overcome local resistance. In addition, it was not until the U.S. Supreme Court ruled 6–3 in </span><i data-dcnode-id="6949"><a class="mw-redirect" data-dcnode-id="6950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harper_v._Virginia_Board_of_Elections" title="Harper v. Virginia Board of Elections"><span data-dcnode-id="6951" instrument_node="">Harper v. Virginia Board of Elections</span></a></i><span data-dcnode-id="6948" instrument_node=""> (1966) that all state poll taxes (for state elections) were officially declared unconstitutional as violating the </span><a data-dcnode-id="6946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equal_Protection_Clause" title="Equal Protection Clause"><span data-dcnode-id="6947" instrument_node="">Equal Protection Clause</span></a><span data-dcnode-id="6945" instrument_node=""> of the Fourteenth Amendment. This removed a burden on the poor.</span><sup class="reference" data-dcnode-id="6942" id="cite_ref-Scher2015_75-0"><a data-dcnode-id="6943" href="#cite_note-Scher2015-75"><span data-dcnode-id="6944" instrument_node="">[74]</span></a></sup><sup class="reference" data-dcnode-id="6939" id="cite_ref-NHLTS2009_76-0"><a data-dcnode-id="6940" href="#cite_note-NHLTS2009-76"><span data-dcnode-id="6941" instrument_node="">[75]</span></a></sup><span data-dcnode-id="6938" instrument_node="">
</span></p><p data-dcnode-id="6926"><span data-dcnode-id="6936" instrument_node="">Legal challenges have continued under the </span><a data-dcnode-id="6934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_Rights_Act_of_1965" title="Voting Rights Act of 1965"><span data-dcnode-id="6935" instrument_node="">Voting Rights Act</span></a><span data-dcnode-id="6933" instrument_node="">, primarily in areas of </span><a data-dcnode-id="6931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Redistricting_in_the_United_States" title="Redistricting in the United States"><span data-dcnode-id="6932" instrument_node="">redistricting</span></a><span data-dcnode-id="6930" instrument_node=""> and election systems, for instance, challenging </span><a data-dcnode-id="6928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/At-large" title="At-large"><span data-dcnode-id="6929" instrument_node="">at-large</span></a><span data-dcnode-id="6927" instrument_node=""> election systems that effectively reduce the ability of minority groups to elect candidates of their choice. Such challenges have particularly occurred at the county and municipal level, including for school boards, where exclusion of minority groups and candidates at such levels has been persistent in some areas of the country. This reduces the ability of women and minorities to participate in the political system and gain entry-level experience.
</span></p><span data-dcnode-id="6925" instrument_node="">
</span><h2 data-dcnode-id="6915"><span class="mw-headline" data-dcnode-id="6923" id="Asian_Americans"><span data-dcnode-id="6924" instrument_node="">Asian Americans</span></span><span class="mw-editsection" data-dcnode-id="6916"><span class="mw-editsection-bracket" data-dcnode-id="6921"><span data-dcnode-id="6922" instrument_node="">[</span></span><a data-dcnode-id="6919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D8" title="Edit section: Asian Americans"><span data-dcnode-id="6920" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6917"><span data-dcnode-id="6918" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6914" instrument_node="">
</span><link data-dcnode-id="6913" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6909" role="note"><span data-dcnode-id="6912" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="6910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asian_American_civil_rights" title="Asian American civil rights"><span data-dcnode-id="6911" instrument_node="">Asian American civil rights</span></a></div><span data-dcnode-id="6908" instrument_node="">
</span><p data-dcnode-id="6878"><span data-dcnode-id="6907" instrument_node="">Voting rights for Asian Americans have been continuously battled for in the United States since the initial significant wave of Asian immigration to the country in the mid-nineteenth century.</span><sup class="reference" data-dcnode-id="6904" id="cite_ref-77"><a data-dcnode-id="6905" href="#cite_note-77"><span data-dcnode-id="6906" instrument_node="">[76]</span></a></sup><span data-dcnode-id="6903" instrument_node=""> The escalation of voting rights issues for Asian immigrants had started with the citizenship status of </span><a data-dcnode-id="6901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Americans" title="Chinese Americans"><span data-dcnode-id="6902" instrument_node="">Chinese Americans</span></a><span data-dcnode-id="6900" instrument_node=""> from 1882 with the </span><a data-dcnode-id="6898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Exclusion_Act" title="Chinese Exclusion Act"><span data-dcnode-id="6899" instrument_node="">Chinese Exclusion Act</span></a><span data-dcnode-id="6897" instrument_node=""> that was inspired by and built upon the </span><a data-dcnode-id="6895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naturalization_Act_of_1870" title="Naturalization Act of 1870"><span data-dcnode-id="6896" instrument_node="">Naturalization Act of 1870</span></a><span data-dcnode-id="6894" instrument_node="">.</span><sup class="reference" data-dcnode-id="6891" id="cite_ref-Race,_Nationality,_and_Reality_78-0"><a data-dcnode-id="6892" href="#cite_note-Race,_Nationality,_and_Reality-78"><span data-dcnode-id="6893" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6890" instrument_node=""> The latter act helped the judicial system decide a person's ethnicity, and if the person was white, they could proceed with the immigration process.</span><sup class="reference" data-dcnode-id="6887" id="cite_ref-Race,_Nationality,_and_Reality_78-1"><a data-dcnode-id="6888" href="#cite_note-Race,_Nationality,_and_Reality-78"><span data-dcnode-id="6889" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6886" instrument_node=""> While the </span><a data-dcnode-id="6884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Exclusion_Act" title="Chinese Exclusion Act"><span data-dcnode-id="6885" instrument_node="">Chinese Exclusion Act</span></a><span data-dcnode-id="6883" instrument_node=""> specifically targeted and banned the influx of Asian immigrants looking for work on the west coast due to the country that they were from and their ethnicity.</span><sup class="reference" data-dcnode-id="6880" id="cite_ref-1882act_79-0"><a data-dcnode-id="6881" href="#cite_note-1882act-79"><span data-dcnode-id="6882" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6879" instrument_node=""> Without the ability to become an American citizen, Asian immigrants were prohibited from voting or even immigrating to the United States during this time.
</span></p><p data-dcnode-id="6839"><span data-dcnode-id="6877" instrument_node="">Things started to improve when the </span><a data-dcnode-id="6875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Exclusion_Act" title="Chinese Exclusion Act"><span data-dcnode-id="6876" instrument_node="">Chinese Exclusion Act</span></a><span data-dcnode-id="6874" instrument_node=""> was repealed in the mid-twentieth century, and Chinese immigrants were once again able to seek citizenship and voting rights.</span><sup class="reference" data-dcnode-id="6871" id="cite_ref-1882act_79-1"><a data-dcnode-id="6872" href="#cite_note-1882act-79"><span data-dcnode-id="6873" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6870" instrument_node=""> In spite of these setbacks, it was not a complete ban for Asian Americans; simultaneously, a minority of Asian Americans were politically active during this era of the </span><a data-dcnode-id="6868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Naturalization_Act_of_1870" title="Naturalization Act of 1870"><span data-dcnode-id="6869" instrument_node="">1870 Naturalization Act</span></a><span data-dcnode-id="6867" instrument_node=""> and Chinese exclusion.</span><sup class="reference" data-dcnode-id="6864" id="cite_ref-80"><a data-dcnode-id="6865" href="#cite_note-80"><span data-dcnode-id="6866" instrument_node="">[79]</span></a></sup><span data-dcnode-id="6863" instrument_node=""> However, the Asian American community gained significant advancements in their voting rights later, with the </span><a data-dcnode-id="6861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_and_Nationality_Act_of_1952" title="Immigration and Nationality Act of 1952"><span data-dcnode-id="6862" instrument_node="">McCarran-Walter Act</span></a><span data-dcnode-id="6860" instrument_node=""> of 1952. With this Act, the Asian American community was able to seek citizenship that was not on the basis of race but on a quota system that was dependent upon their country of emigration.</span><sup class="reference" data-dcnode-id="6857" id="cite_ref-81"><a data-dcnode-id="6858" href="#cite_note-81"><span data-dcnode-id="6859" instrument_node="">[80]</span></a></sup><span data-dcnode-id="6856" instrument_node=""> Shortly after the </span><a data-dcnode-id="6854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Immigration_and_Nationality_Act_of_1952" title="Immigration and Nationality Act of 1952"><span data-dcnode-id="6855" instrument_node="">McCarran-Walter Act</span></a><span data-dcnode-id="6853" instrument_node="">, the </span><a data-dcnode-id="6851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_Rights_Act_of_1965" title="Voting Rights Act of 1965"><span data-dcnode-id="6852" instrument_node="">Voting Rights Act</span></a><span data-dcnode-id="6850" instrument_node=""> was signed by President </span><a data-dcnode-id="6848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyndon_B._Johnson" title="Lyndon B. Johnson"><span data-dcnode-id="6849" instrument_node="">Lyndon B. Johnson</span></a><span data-dcnode-id="6847" instrument_node=""> in 1965. It thus came a new era of civil liberties for Asian Americans who were in the voting minority.</span><sup class="reference" data-dcnode-id="6844" id="cite_ref-82"><a data-dcnode-id="6845" href="#cite_note-82"><span data-dcnode-id="6846" instrument_node="">[81]</span></a></sup><sup class="reference" data-dcnode-id="6841" id="cite_ref-83"><a data-dcnode-id="6842" href="#cite_note-83"><span data-dcnode-id="6843" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6840" instrument_node="">
</span></p><span data-dcnode-id="6838" instrument_node="">
</span><h2 data-dcnode-id="6828"><span class="mw-headline" data-dcnode-id="6836" id="Women"><span data-dcnode-id="6837" instrument_node="">Women</span></span><span class="mw-editsection" data-dcnode-id="6829"><span class="mw-editsection-bracket" data-dcnode-id="6834"><span data-dcnode-id="6835" instrument_node="">[</span></span><a data-dcnode-id="6832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D9" title="Edit section: Women"><span data-dcnode-id="6833" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6830"><span data-dcnode-id="6831" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6827" instrument_node="">
</span><link data-dcnode-id="6826" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6822" role="note"><span data-dcnode-id="6825" instrument_node="">See also: </span><a data-dcnode-id="6823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_suffrage_in_the_United_States" title="Women's suffrage in the United States"><span data-dcnode-id="6824" instrument_node="">Women's suffrage in the United States</span></a></div><span data-dcnode-id="6821" instrument_node="">
</span><p data-dcnode-id="6801"><span data-dcnode-id="6820" instrument_node="">A parallel, yet separate, movement was that for </span><a data-dcnode-id="6818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_suffrage" title="Women's suffrage"><span data-dcnode-id="6819" instrument_node="">women's suffrage</span></a><span data-dcnode-id="6817" instrument_node="">. Leaders of the suffrage movement included </span><a data-dcnode-id="6815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Susan_B._Anthony" title="Susan B. Anthony"><span data-dcnode-id="6816" instrument_node="">Susan B. Anthony</span></a><span data-dcnode-id="6814" instrument_node="">, </span><a data-dcnode-id="6812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_Cady_Stanton" title="Elizabeth Cady Stanton"><span data-dcnode-id="6813" instrument_node="">Elizabeth Cady Stanton</span></a><span data-dcnode-id="6811" instrument_node="">, and </span><a data-dcnode-id="6809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alice_Paul" title="Alice Paul"><span data-dcnode-id="6810" instrument_node="">Alice Paul</span></a><span data-dcnode-id="6808" instrument_node="">. In some ways this, too, could be said to have grown out of the </span><a data-dcnode-id="6806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_War" title="American Civil War"><span data-dcnode-id="6807" instrument_node="">American Civil War</span></a><span data-dcnode-id="6805" instrument_node="">, as women had been strong leaders of the </span><a data-dcnode-id="6803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abolitionism_in_the_United_States" title="Abolitionism in the United States"><span data-dcnode-id="6804" instrument_node="">abolition</span></a><span data-dcnode-id="6802" instrument_node=""> movement. Middle- and upper-class women generally became more politically active in the northern tier during and after the war.
</span></p><p data-dcnode-id="6781"><span data-dcnode-id="6800" instrument_node="">In 1848, the </span><a data-dcnode-id="6798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seneca_Falls_Convention" title="Seneca Falls Convention"><span data-dcnode-id="6799" instrument_node="">Seneca Falls Convention</span></a><span data-dcnode-id="6797" instrument_node="">, the first </span><a data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Women%2527s_rights" title="Women's rights"><span data-dcnode-id="6796" instrument_node="">women's rights</span></a><span data-dcnode-id="6794" instrument_node=""> convention, was held in </span><a data-dcnode-id="6792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seneca_Falls%2C_New_York" title="Seneca Falls, New York"><span data-dcnode-id="6793" instrument_node="">Seneca Falls, New York</span></a><span data-dcnode-id="6791" instrument_node="">. Of the 300 present, 68 women and 32 men signed the </span><a data-dcnode-id="6789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Declaration_of_Sentiments" title="Declaration of Sentiments"><span data-dcnode-id="6790" instrument_node="">Declaration of Sentiments</span></a><span data-dcnode-id="6788" instrument_node=""> which defined the women's rights movement. The first </span><a data-dcnode-id="6786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Women%2527s_Rights_Convention" title="National Women's Rights Convention"><span data-dcnode-id="6787" instrument_node="">National Women's Rights Convention</span></a><span data-dcnode-id="6785" instrument_node=""> took place in 1850 in </span><a data-dcnode-id="6783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Worcester%2C_Massachusetts" title="Worcester, Massachusetts"><span data-dcnode-id="6784" instrument_node="">Worcester, Massachusetts</span></a><span data-dcnode-id="6782" instrument_node="">, attracting more than 1,000 participants. This national convention was held yearly through 1860.
</span></p><p data-dcnode-id="6767"><span data-dcnode-id="6780" instrument_node="">When Susan B. Anthony and Elizabeth Cady Stanton formed the National Women Suffrage Association, their goal was to help women gain voting rights through reliance on the Constitution. Also, in 1869 </span><a data-dcnode-id="6778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lucy_Stone" title="Lucy Stone"><span data-dcnode-id="6779" instrument_node="">Lucy Stone</span></a><span data-dcnode-id="6777" instrument_node=""> and </span><a data-dcnode-id="6775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Browne_Blackwell" title="Henry Browne Blackwell"><span data-dcnode-id="6776" instrument_node="">Henry Blackwell</span></a><span data-dcnode-id="6774" instrument_node=""> formed the </span><a data-dcnode-id="6772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Woman_Suffrage_Association" title="American Woman Suffrage Association"><span data-dcnode-id="6773" instrument_node="">American Woman Suffrage Association</span></a><span data-dcnode-id="6771" instrument_node=""> (AWSA). However, AWSA focused on gaining voting rights for women through the amendment process. Although these two organization were fighting for the same cause, it was not until 1890 that they merged to form the </span><a data-dcnode-id="6769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_American_Woman_Suffrage_Association" title="National American Woman Suffrage Association"><span data-dcnode-id="6770" instrument_node="">National American Woman Suffrage Association</span></a><span data-dcnode-id="6768" instrument_node=""> (NAWSA). After the merger of the two organizations, the (NAWSA) waged a state-by-state campaign to obtain voting rights for women.
</span></p><p data-dcnode-id="6757"><a data-dcnode-id="6765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wyoming" title="Wyoming"><span data-dcnode-id="6766" instrument_node="">Wyoming</span></a><span data-dcnode-id="6764" instrument_node=""> was the first state in which women were able to vote, although it was a condition of the transition to statehood. </span><a data-dcnode-id="6762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Utah" title="Utah"><span data-dcnode-id="6763" instrument_node="">Utah</span></a><span data-dcnode-id="6761" instrument_node=""> was the second territory to allow women to vote, but the federal </span><a data-dcnode-id="6759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edmunds%25E2%2580%2593Tucker_Act" title="Edmunds–Tucker Act"><span data-dcnode-id="6760" instrument_node="">Edmunds–Tucker Act</span></a><span data-dcnode-id="6758" instrument_node=""> of 1887 repealed woman's suffrage in Utah. Colorado was the first established state to allow women to vote on the same basis as men. Some other states also extended the franchise to women before the Constitution was amended to this purpose.
</span></p><p data-dcnode-id="6737"><span data-dcnode-id="6756" instrument_node="">During the 1910s, Alice Paul, assisted by </span><a data-dcnode-id="6754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lucy_Burns" title="Lucy Burns"><span data-dcnode-id="6755" instrument_node="">Lucy Burns</span></a><span data-dcnode-id="6753" instrument_node=""> and many others, organized such events and organizations as the </span><a class="mw-redirect" data-dcnode-id="6751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1913_Women%2527s_Suffrage_Parade" title="1913 Women's Suffrage Parade"><span data-dcnode-id="6752" instrument_node="">1913 Women's Suffrage Parade</span></a><span data-dcnode-id="6750" instrument_node="">, the </span><a data-dcnode-id="6748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Woman%2527s_Party" title="National Woman's Party"><span data-dcnode-id="6749" instrument_node="">National Woman's Party</span></a><span data-dcnode-id="6747" instrument_node="">, and the </span><a data-dcnode-id="6745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silent_Sentinels" title="Silent Sentinels"><span data-dcnode-id="6746" instrument_node="">Silent Sentinels</span></a><span data-dcnode-id="6744" instrument_node="">. At the culmination of the suffragists' requests and protests, ratification of the </span><a data-dcnode-id="6742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nineteenth_Amendment_to_the_United_States_Constitution" title="Nineteenth Amendment to the United States Constitution"><span data-dcnode-id="6743" instrument_node="">Nineteenth Amendment</span></a><span data-dcnode-id="6741" instrument_node=""> gave women the right to vote in time to participate in the </span><a data-dcnode-id="6739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1920_United_States_presidential_election" title="1920 United States presidential election"><span data-dcnode-id="6740" instrument_node="">Presidential election of 1920</span></a><span data-dcnode-id="6738" instrument_node="">.
</span></p><p data-dcnode-id="6719"><span data-dcnode-id="6736" instrument_node="">Another political movement that was largely driven by women in the same era was the anti-</span><a data-dcnode-id="6734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alcohol_%28drug%29" title="Alcohol (drug)"><span data-dcnode-id="6735" instrument_node="">alcohol</span></a><span data-dcnode-id="6733" instrument_node=""> </span><a data-dcnode-id="6731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temperance_movement" title="Temperance movement"><span data-dcnode-id="6732" instrument_node="">Temperance movement</span></a><span data-dcnode-id="6730" instrument_node="">, which led to the </span><a data-dcnode-id="6728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eighteenth_Amendment_to_the_United_States_Constitution" title="Eighteenth Amendment to the United States Constitution"><span data-dcnode-id="6729" instrument_node="">Eighteenth Amendment</span></a><span data-dcnode-id="6727" instrument_node=""> and </span><a data-dcnode-id="6725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prohibition" title="Prohibition"><span data-dcnode-id="6726" instrument_node="">Prohibition</span></a><span data-dcnode-id="6724" instrument_node="">.</span><sup class="reference" data-dcnode-id="6721" id="cite_ref-84"><a data-dcnode-id="6722" href="#cite_note-84"><span data-dcnode-id="6723" instrument_node="">[83]</span></a></sup><span data-dcnode-id="6720" instrument_node="">
</span></p><span data-dcnode-id="6718" instrument_node="">
</span><h2 data-dcnode-id="6708"><span class="mw-headline" data-dcnode-id="6716" id="Military"><span data-dcnode-id="6717" instrument_node="">Military</span></span><span class="mw-editsection" data-dcnode-id="6709"><span class="mw-editsection-bracket" data-dcnode-id="6714"><span data-dcnode-id="6715" instrument_node="">[</span></span><a data-dcnode-id="6712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D10" title="Edit section: Military"><span data-dcnode-id="6713" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6710"><span data-dcnode-id="6711" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6707" instrument_node="">
</span><p data-dcnode-id="6698"><span data-dcnode-id="6706" instrument_node="">Suffrage was never extended to members of the </span><a data-dcnode-id="6704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Armed_Forces" title="United States Armed Forces"><span data-dcnode-id="6705" instrument_node="">United States Armed Forces</span></a><span data-dcnode-id="6703" instrument_node=""> due to military status - individual members of the military received suffrage in accordance with the distinct categorical extensions that occurred throughout the nation's history.</span><sup class="reference" data-dcnode-id="6700" id="cite_ref-:7_85-0"><a data-dcnode-id="6701" href="#cite_note-:7-85"><span data-dcnode-id="6702" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6699" instrument_node="">  Matters pertaining to military members voting rights in elections in the United States have focused around two issues: absentee voting rights and requirements for nonpartisanship in election-related activities.
</span></p><span data-dcnode-id="6697" instrument_node="">
</span><h3 data-dcnode-id="6687"><span class="mw-headline" data-dcnode-id="6695" id="Absentee_Voting_Rights"><span data-dcnode-id="6696" instrument_node="">Absentee Voting Rights</span></span><span class="mw-editsection" data-dcnode-id="6688"><span class="mw-editsection-bracket" data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">[</span></span><a data-dcnode-id="6691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D11" title="Edit section: Absentee Voting Rights"><span data-dcnode-id="6692" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6689"><span data-dcnode-id="6690" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6686" instrument_node="">
</span><p data-dcnode-id="6665"><span data-dcnode-id="6685" instrument_node="">Many military members stationed overseas were historically excluded from voting, de facto, due to state laws pertaining to absentee voting.</span><sup class="reference" data-dcnode-id="6682" id="cite_ref-:7_85-1"><a data-dcnode-id="6683" href="#cite_note-:7-85"><span data-dcnode-id="6684" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6681" instrument_node=""> Scholars have written that state-level policies to allow absentee voting for military members were often enacted when a political party in power thought that doing so would improve their reelection rates.</span><sup class="reference" data-dcnode-id="6678" id="cite_ref-:7_85-2"><a data-dcnode-id="6679" href="#cite_note-:7-85"><span data-dcnode-id="6680" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6677" instrument_node=""> For example, at the time of the </span><a data-dcnode-id="6675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Civil_War" title="American Civil War"><span data-dcnode-id="6676" instrument_node="">American Civil War</span></a><span data-dcnode-id="6674" instrument_node="">, it was widely believed that military members would vote Republican, and thus, states with Republican governors and legislatures tended to pass bills allowing military members to absentee vote or commission election officials to go to the battlefields and garrisons to collect votes.</span><sup class="reference" data-dcnode-id="6671" id="cite_ref-:7_85-3"><a data-dcnode-id="6672" href="#cite_note-:7-85"><span data-dcnode-id="6673" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6670" instrument_node=""> States with Democratic governors and legislatures tended not to pass such bills.</span><sup class="reference" data-dcnode-id="6667" id="cite_ref-:7_85-4"><a data-dcnode-id="6668" href="#cite_note-:7-85"><span data-dcnode-id="6669" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6666" instrument_node="">
</span></p><p data-dcnode-id="6630"><span data-dcnode-id="6664" instrument_node="">Similarly, a partisan controversy emerged over whether to simplify voting procedures to allow for absentee balloting for military members in the lead up to the 1944 elections, given that fewer than 2% of military members on active duty would be able to vote under current state laws at that time.</span><sup class="reference" data-dcnode-id="6661" id="cite_ref-:8_86-0"><a data-dcnode-id="6662" href="#cite_note-:8-86"><span data-dcnode-id="6663" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6660" instrument_node=""> The military and the general public were thought to be highly supportive of absentee ballot measures that would enable military members to vote while stationed overseas in active duty.</span><sup class="reference" data-dcnode-id="6657" id="cite_ref-:8_86-1"><a data-dcnode-id="6658" href="#cite_note-:8-86"><span data-dcnode-id="6659" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6656" instrument_node=""> However, following a December 1943 </span><a data-dcnode-id="6654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gallup_%28company%29%23Gallup_Poll" title="Gallup (company)"><span data-dcnode-id="6655" instrument_node="">Gallup</span></a><span data-dcnode-id="6653" instrument_node=""> Poll reporting that military members would favor President </span><a data-dcnode-id="6651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franklin_D._Roosevelt" title="Franklin D. Roosevelt"><span data-dcnode-id="6652" instrument_node="">Franklin D. Roosevelt</span></a><span data-dcnode-id="6650" instrument_node=""> (a Democrat) by 61 percent, and the belief that the military vote could swing the upcoming election, a fairly split </span><a data-dcnode-id="6648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/78th_United_States_Congress" title="78th United States Congress"><span data-dcnode-id="6649" instrument_node="">Seventy-eighth Congress</span></a><span data-dcnode-id="6647" instrument_node=""> was slow to pass measures to enfranchise military members stationed overseas.</span><sup class="reference" data-dcnode-id="6644" id="cite_ref-:8_86-2"><a data-dcnode-id="6645" href="#cite_note-:8-86"><span data-dcnode-id="6646" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6643" instrument_node=""> Generally, Democrats favored enabling absentee ballot procedures for military members, believing that a majority of the members of the armed forces would support their party, while Republicans were generally opposed, believing that their reelection would be disadvantaged.</span><sup class="reference" data-dcnode-id="6640" id="cite_ref-:8_86-3"><a data-dcnode-id="6641" href="#cite_note-:8-86"><span data-dcnode-id="6642" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6639" instrument_node=""> An exception to this pattern was that Southern Democrats tended to oppose the measures because it would enfranchise thousands of persons who were disqualified under state laws, such as Black Americans.</span><sup class="reference" data-dcnode-id="6636" id="cite_ref-:8_86-4"><a data-dcnode-id="6637" href="#cite_note-:8-86"><span data-dcnode-id="6638" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6635" instrument_node=""> The initial legislation (the Green-Lucas Bill) was rejected, and Congress instead passed a measure (which became Public Law 712) that made ballots contingent upon state certification.</span><sup class="reference" data-dcnode-id="6632" id="cite_ref-:8_86-5"><a data-dcnode-id="6633" href="#cite_note-:8-86"><span data-dcnode-id="6634" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6631" instrument_node="">
</span></p><p data-dcnode-id="6622"><span data-dcnode-id="6629" instrument_node="">Federal legislation, such as the Uniformed and </span><a data-dcnode-id="6627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uniformed_and_Overseas_Citizens_Absentee_Voting_Act" title="Uniformed and Overseas Citizens Absentee Voting Act"><span data-dcnode-id="6628" instrument_node="">Overseas Citizens Absentee Voting Act (UOCAVA)</span></a><span data-dcnode-id="6626" instrument_node=""> of 1986 and the </span><a data-dcnode-id="6624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_and_Overseas_Voter_Empowerment_Act%23%3A~%3Atext%3DThe_Military_and_Overseas_Voter_Empowerment_Act_%28or%2C_U.S._President_Barack_Obama_on_28_October_2009." title="Military and Overseas Voter Empowerment Act"><span data-dcnode-id="6625" instrument_node="">Military and Overseas Voter Empowerment (MOVE) Act</span></a><span data-dcnode-id="6623" instrument_node=""> of 2010 have removed the power from the states to control absentee voting regulations for military members --- military members are now able to absentee vote, no matter where they are stationed.
</span></p><span data-dcnode-id="6621" instrument_node="">
</span><h3 data-dcnode-id="6611"><span class="mw-headline" data-dcnode-id="6619" id="Non-partisanship_in_Election-related_Activities"><span data-dcnode-id="6620" instrument_node="">Non-partisanship in Election-related Activities</span></span><span class="mw-editsection" data-dcnode-id="6612"><span class="mw-editsection-bracket" data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">[</span></span><a data-dcnode-id="6615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D12" title="Edit section: Non-partisanship in Election-related Activities"><span data-dcnode-id="6616" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6613"><span data-dcnode-id="6614" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6610" instrument_node="">
</span><p data-dcnode-id="6581"><span data-dcnode-id="6609" instrument_node="">Military members are required to publicly maintain a </span><a data-dcnode-id="6607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nonpartisanism" title="Nonpartisanism"><span data-dcnode-id="6608" instrument_node="">nonpartisan</span></a><span data-dcnode-id="6606" instrument_node=""> stance on political matters while acting in their official capacity - they may not engage in activities that associate the Department of Defense with any partisan political campaign or elections, candidate, cause or issue.</span><sup class="reference" data-dcnode-id="6603" id="cite_ref-87"><a data-dcnode-id="6604" href="#cite_note-87"><span data-dcnode-id="6605" instrument_node="">[86]</span></a></sup><sup class="reference" data-dcnode-id="6600" id="cite_ref-88"><a data-dcnode-id="6601" href="#cite_note-88"><span data-dcnode-id="6602" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6599" instrument_node=""> The Department of Defense Directive 1344.10 and the </span><a class="mw-redirect" data-dcnode-id="6597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hatch_Act_of_1939" title="Hatch Act of 1939"><span data-dcnode-id="6598" instrument_node="">Hatch Act</span></a><span data-dcnode-id="6596" instrument_node=""> outline that members of the armed forces who are on active duty are permitted to express their personal opinions on political candidates, make a monetary contribution to a campaign, sign a petition to place a candidate's name on the ballot, and attend a political event as a spectator. Members on active duty may not participate in partisan activities such as soliciting or engaging in partisan fundraiser activities, serving as the sponsor of a partisan club, or speaking before a partisan gathering. In addition, all military members, including National Guard and Reserve forces, are prohibited from wearing military uniforms at political campaign events. The </span><a class="mw-redirect" data-dcnode-id="6594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hatch_Act_of_1939" title="Hatch Act of 1939"><span data-dcnode-id="6595" instrument_node="">Hatch Act</span></a><span data-dcnode-id="6593" instrument_node=""> allows most federal employees to actively participate in political activities outside of the workplace. There are, however, significant restrictions on fundraising, running for office in partisan elections and using one's authority in the political arena.</span><sup class="reference" data-dcnode-id="6590" id="cite_ref-:9_89-0"><a data-dcnode-id="6591" href="#cite_note-:9-89"><span data-dcnode-id="6592" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6589" instrument_node=""> Senate-confirmed presidential appointees and career and non-career </span><a data-dcnode-id="6587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Senior_Executive_Service_%28United_States%29" title="Senior Executive Service (United States)"><span data-dcnode-id="6588" instrument_node="">Senior Executive Service</span></a><span data-dcnode-id="6586" instrument_node=""> employees are subject to additional limitations.</span><sup class="reference" data-dcnode-id="6583" id="cite_ref-:9_89-1"><a data-dcnode-id="6584" href="#cite_note-:9-89"><span data-dcnode-id="6585" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6582" instrument_node="">
</span></p><p data-dcnode-id="6562"><span data-dcnode-id="6580" instrument_node="">Some notable military members, including </span><a data-dcnode-id="6578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Tecumseh_Sherman" title="William Tecumseh Sherman"><span data-dcnode-id="6579" instrument_node="">William Tecumseh Sherman</span></a><span data-dcnode-id="6577" instrument_node="">, </span><a data-dcnode-id="6575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_C._Marshall" title="George C. Marshall"><span data-dcnode-id="6576" instrument_node="">George C. Marshall</span></a><span data-dcnode-id="6574" instrument_node="">, and </span><a data-dcnode-id="6572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Petraeus" title="David Petraeus"><span data-dcnode-id="6573" instrument_node="">David Petraeus</span></a><span data-dcnode-id="6571" instrument_node="">, claim that they did not vote in U.S. presidential elections.</span><sup class="reference" data-dcnode-id="6568" id="cite_ref-:10_90-0"><a data-dcnode-id="6569" href="#cite_note-:10-90"><span data-dcnode-id="6570" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6567" instrument_node=""> The three, along with many officers from Marshall's generation, abstained from voting in order to avoid any sense of partisanship that could impair their professional judgement.</span><sup class="reference" data-dcnode-id="6564" id="cite_ref-:10_90-1"><a data-dcnode-id="6565" href="#cite_note-:10-90"><span data-dcnode-id="6566" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6563" instrument_node="">
</span></p><span data-dcnode-id="6561" instrument_node="">
</span><h2 data-dcnode-id="6550"><span data-dcnode-id="6560" id="Washington.2C_D.C."></span><span class="mw-headline" data-dcnode-id="6558" id="Washington,_D.C."><span data-dcnode-id="6559" instrument_node="">Washington, D.C.</span></span><span class="mw-editsection" data-dcnode-id="6551"><span class="mw-editsection-bracket" data-dcnode-id="6556"><span data-dcnode-id="6557" instrument_node="">[</span></span><a data-dcnode-id="6554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D13" title="Edit section: Washington, D.C."><span data-dcnode-id="6555" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6552"><span data-dcnode-id="6553" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6549" instrument_node="">
</span><p data-dcnode-id="6542"><a data-dcnode-id="6547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington%2C_D.C." title="Washington, D.C."><span data-dcnode-id="6548" instrument_node="">Washington, D.C.</span></a><span data-dcnode-id="6546" instrument_node="">, was created from a portion of the states of Maryland and Virginia in 1801. The Virginia portion was </span><a data-dcnode-id="6544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cession" title="Cession"><span data-dcnode-id="6545" instrument_node="">retroceded</span></a><span data-dcnode-id="6543" instrument_node=""> (returned) to Virginia upon request of the residents, by an Act of Congress in 1846 to protect slavery, and restore state and federal voting rights in that portion of Virginia. When Maryland delegated a portion of its land to Congress so it could be used as the Nation's capital, Congress did not continue Maryland Voting Laws. It canceled all state and federal elections starting with 1802. Local elections limped on in some neighborhoods, until 1871, when local elections were also forbidden by the U.S. Congress. The U.S. Congress is the National Legislature. Under Article&nbsp;I, Section&nbsp;8, Clause 17, Congress has the sole authority to exercise "Exclusive Legislature in all cases whatsoever" over the nation's capital and over federal military bases. Active disfranchisement is typically a States Rights Legislative issue, where the removal of voting rights is permitted. At the national level, the federal government typically ignored voting rights issues, or affirmed that they were extended.
</span></p><p data-dcnode-id="6540"><span data-dcnode-id="6541" instrument_node="">Congress, when exercising "exclusive legislation" over U.S. Military Bases in the United States, and Washington, D.C., viewed its power as strong enough to remove all voting rights. All state and federal elections were canceled by Congress in D.C. and all of Maryland's voting Rights laws no longer applied to D.C. when Maryland gave up that land. Congress did not pass laws to establish local voting processes in the District of Columbia. This omission of law strategy to disfranchise is contained in the Congressional debates in Annals of Congress in 1800 and 1801.
</span></p><p data-dcnode-id="6538"><span data-dcnode-id="6539" instrument_node="">In 1986, the US Congress voted to restore voting rights on U.S. Military bases for all state and federal elections.
</span></p><p data-dcnode-id="6530"><span data-dcnode-id="6537" instrument_node="">D.C. citizens were granted the right to vote in Presidential elections in 1961 after ratification of the Twenty-third Amendment. The citizens and territory converted in 1801 were represented by </span><a data-dcnode-id="6535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Chew_Thomas" title="John Chew Thomas"><span data-dcnode-id="6536" instrument_node="">John Chew Thomas</span></a><span data-dcnode-id="6534" instrument_node=""> from Maryland's 2nd, and </span><a data-dcnode-id="6532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Craik_%28politician%29" title="William Craik (politician)"><span data-dcnode-id="6533" instrument_node="">William Craik</span></a><span data-dcnode-id="6531" instrument_node=""> from Maryland's 3rd Congressional Districts, which were redrawn and removed from the city.
</span></p><p data-dcnode-id="6521"><span data-dcnode-id="6529" instrument_node="">No full Congressional elections have been held since in D.C., a gap continuing since 1801. Congress created a non-voting substitute for a U.S. Congressman, a Delegate, between 1871 and 1875, but then abolished that post as well. Congress permitted restoration of local elections and </span><a data-dcnode-id="6527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Home_rule" title="Home rule"><span data-dcnode-id="6528" instrument_node="">home rule</span></a><span data-dcnode-id="6526" instrument_node=""> for the District on December 24, 1973. In 1971, Congress still opposed restoring the position of a full U.S. Congressman for Washington, D.C. That year it re-established the position of non-voting Delegate to the U.S. Congress.</span><sup class="reference" data-dcnode-id="6523" id="cite_ref-91"><a data-dcnode-id="6524" href="#cite_note-91"><span data-dcnode-id="6525" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6522" instrument_node="">
</span></p><span data-dcnode-id="6520" instrument_node="">
</span><h2 data-dcnode-id="6510"><span class="mw-headline" data-dcnode-id="6518" id="Young_adults"><span data-dcnode-id="6519" instrument_node="">Young adults</span></span><span class="mw-editsection" data-dcnode-id="6511"><span class="mw-editsection-bracket" data-dcnode-id="6516"><span data-dcnode-id="6517" instrument_node="">[</span></span><a data-dcnode-id="6514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D14" title="Edit section: Young adults"><span data-dcnode-id="6515" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6512"><span data-dcnode-id="6513" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6509" instrument_node="">
</span><link data-dcnode-id="6508" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6504" role="note"><span data-dcnode-id="6507" instrument_node="">See also: </span><a data-dcnode-id="6505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twenty-sixth_Amendment_to_the_United_States_Constitution" title="Twenty-sixth Amendment to the United States Constitution"><span data-dcnode-id="6506" instrument_node="">Twenty-sixth Amendment to the United States Constitution</span></a></div><span data-dcnode-id="6503" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6494"><div class="thumbinner" data-dcnode-id="6495" style="width:252px;"><a class="image" data-dcnode-id="6501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVoting_Rights_for_17-year-olds_in_US_States.svg"><img alt="" class="thumbimage" data-dcnode-id="6502" data-file-height="593" data-file-width="959" decoding="async" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Voting_Rights_for_17-year-olds_in_US_States.svg/250px-Voting_Rights_for_17-year-olds_in_US_States.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Voting_Rights_for_17-year-olds_in_US_States.svg/375px-Voting_Rights_for_17-year-olds_in_US_States.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Voting_Rights_for_17-year-olds_in_US_States.svg/500px-Voting_Rights_for_17-year-olds_in_US_States.svg.png 2x" width="250"></a><span data-dcnode-id="6500" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6496"><div class="magnify" data-dcnode-id="6498"><a class="internal" data-dcnode-id="6499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVoting_Rights_for_17-year-olds_in_US_States.svg" title="Enlarge"></a></div><span data-dcnode-id="6497" instrument_node="">Some states (shown in blue) allow 17-year-olds to vote in primaries/caucuses if their 18th birthday is before the general election.</span></div></div></div><span data-dcnode-id="6493" instrument_node="">
</span><p data-dcnode-id="6476"><span data-dcnode-id="6492" instrument_node="">A third voting rights movement was won in the 1960s to lower the voting age from twenty-one to eighteen. Activists noted that most of the young men who were being </span><a data-dcnode-id="6490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conscription" title="Conscription"><span data-dcnode-id="6491" instrument_node="">drafted</span></a><span data-dcnode-id="6489" instrument_node=""> to fight in the </span><a data-dcnode-id="6487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="6488" instrument_node="">Vietnam War</span></a><span data-dcnode-id="6486" instrument_node=""> were too young to have any voice in the selection of the leaders who were sending them to fight. Some states had already lowered the voting age: notably </span><a data-dcnode-id="6484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgia_%28U.S._state%29" title="Georgia (U.S. state)"><span data-dcnode-id="6485" instrument_node="">Georgia</span></a><span data-dcnode-id="6483" instrument_node="">, </span><a data-dcnode-id="6481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kentucky" title="Kentucky"><span data-dcnode-id="6482" instrument_node="">Kentucky</span></a><span data-dcnode-id="6480" instrument_node="">, and </span><a data-dcnode-id="6478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hawaii" title="Hawaii"><span data-dcnode-id="6479" instrument_node="">Hawaii</span></a><span data-dcnode-id="6477" instrument_node="">, had already permitted voting by persons younger than twenty-one.
</span></p><p data-dcnode-id="6470"><span data-dcnode-id="6475" instrument_node="">The Twenty-sixth Amendment, ratified in 1971, prohibits federal and state laws which set a minimum voting age higher than 18 years. As of 2008, no state has opted for an earlier age, although some state governments have discussed it.</span><sup class="reference" data-dcnode-id="6472" id="cite_ref-92"><a data-dcnode-id="6473" href="#cite_note-92"><span data-dcnode-id="6474" instrument_node="">[91]</span></a></sup><span data-dcnode-id="6471" instrument_node=""> California has, since the 1980s, allowed persons who are 17 to register to vote for an election where the election itself will occur on or after their 18th birthday, and several states including Indiana allow 17-year-olds to vote in a primary election provided they will be 18 by the general election.
</span></p><span data-dcnode-id="6469" instrument_node="">
</span><h2 data-dcnode-id="6459"><span class="mw-headline" data-dcnode-id="6467" id="Prisoners"><span data-dcnode-id="6468" instrument_node="">Prisoners</span></span><span class="mw-editsection" data-dcnode-id="6460"><span class="mw-editsection-bracket" data-dcnode-id="6465"><span data-dcnode-id="6466" instrument_node="">[</span></span><a data-dcnode-id="6463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D15" title="Edit section: Prisoners"><span data-dcnode-id="6464" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6461"><span data-dcnode-id="6462" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6458" instrument_node="">
</span><link data-dcnode-id="6457" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6453" role="note"><span data-dcnode-id="6456" instrument_node="">See also: </span><a data-dcnode-id="6454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Felony_disenfranchisement_in_the_United_States" title="Felony disenfranchisement in the United States"><span data-dcnode-id="6455" instrument_node="">Felony disenfranchisement in the United States</span></a></div><span data-dcnode-id="6452" instrument_node="">
</span><p data-dcnode-id="6430"><span data-dcnode-id="6451" instrument_node="">Prisoner voting rights are defined by individual states, and the laws are different from state to state. Some states allow only individuals on probation to vote. Others allow individuals on parole and probation. As of 2012, only Florida, Kentucky and Virginia continue to impose a lifelong denial of the right to vote to all citizens with a </span><a data-dcnode-id="6449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Felony" title="Felony"><span data-dcnode-id="6450" instrument_node="">felony</span></a><span data-dcnode-id="6448" instrument_node=""> record, absent a restoration of rights granted by the </span><a data-dcnode-id="6446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Governor" title="Governor"><span data-dcnode-id="6447" instrument_node="">Governor</span></a><span data-dcnode-id="6445" instrument_node=""> or </span><a data-dcnode-id="6443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_legislature_%28United_States%29" title="State legislature (United States)"><span data-dcnode-id="6444" instrument_node="">state legislature</span></a><span data-dcnode-id="6442" instrument_node="">.</span><sup class="reference" data-dcnode-id="6439" id="cite_ref-SP_93-0"><a data-dcnode-id="6440" href="#cite_note-SP-93"><span data-dcnode-id="6441" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6438" instrument_node=""> However, in Kentucky, a felon's rights can be restored after the completion of a restoration process to regain civil rights.</span><sup class="reference" data-dcnode-id="6435" id="cite_ref-SP_93-1"><a data-dcnode-id="6436" href="#cite_note-SP-93"><span data-dcnode-id="6437" instrument_node="">[92]</span></a></sup><sup class="reference" data-dcnode-id="6432" id="cite_ref-94"><a data-dcnode-id="6433" href="#cite_note-94"><span data-dcnode-id="6434" instrument_node="">[93]</span></a></sup><span data-dcnode-id="6431" instrument_node="">
</span></p><p data-dcnode-id="6415"><span data-dcnode-id="6429" instrument_node="">In 2007, the </span><a data-dcnode-id="6427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Florida_Legislature" title="Florida Legislature"><span data-dcnode-id="6428" instrument_node="">Florida Legislature</span></a><span data-dcnode-id="6426" instrument_node=""> restored voting rights to convicted felons who had served their sentences. In March 2011, however, Governor </span><a data-dcnode-id="6424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rick_Scott" title="Rick Scott"><span data-dcnode-id="6425" instrument_node="">Rick Scott</span></a><span data-dcnode-id="6423" instrument_node=""> reversed the 2007 reforms. He signed legislation that permanently disenfranchises citizens with past felony convictions. After the </span><a data-dcnode-id="6421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2018_Florida_Amendment_4" title="2018 Florida Amendment 4"><span data-dcnode-id="6422" instrument_node="">2018 Florida Amendment 4</span></a><span data-dcnode-id="6420" instrument_node=""> referendum, however, Florida residents voted to restore voting rights to roughly 1.4 million felons who have completed their sentences.</span><sup class="reference" data-dcnode-id="6417" id="cite_ref-95"><a data-dcnode-id="6418" href="#cite_note-95"><span data-dcnode-id="6419" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6416" instrument_node="">
</span></p><p data-dcnode-id="6403"><span data-dcnode-id="6414" instrument_node="">In July 2005, Iowa Governor </span><a data-dcnode-id="6412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tom_Vilsack" title="Tom Vilsack"><span data-dcnode-id="6413" instrument_node="">Tom Vilsack</span></a><span data-dcnode-id="6411" instrument_node=""> issued an executive order restoring the right to vote for all persons who have completed supervision.</span><sup class="reference" data-dcnode-id="6408" id="cite_ref-SP_93-2"><a data-dcnode-id="6409" href="#cite_note-SP-93"><span data-dcnode-id="6410" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6407" instrument_node=""> On October 31, 2005, the </span><a data-dcnode-id="6405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iowa_Supreme_Court" title="Iowa Supreme Court"><span data-dcnode-id="6406" instrument_node="">Iowa Supreme Court</span></a><span data-dcnode-id="6404" instrument_node=""> upheld mass reenfranchisement of convicted felons. Nine other states disenfranchise felons for various lengths of time following the completion of their probation or parole.
</span></p><p data-dcnode-id="6391"><span data-dcnode-id="6402" instrument_node="">Other than </span><a data-dcnode-id="6400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maine" title="Maine"><span data-dcnode-id="6401" instrument_node="">Maine</span></a><span data-dcnode-id="6399" instrument_node=""> and </span><a data-dcnode-id="6397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vermont" title="Vermont"><span data-dcnode-id="6398" instrument_node="">Vermont</span></a><span data-dcnode-id="6396" instrument_node="">, all U.S. states prohibit felons from voting while they are in prison.</span><sup class="reference" data-dcnode-id="6393" id="cite_ref-96"><a data-dcnode-id="6394" href="#cite_note-96"><span data-dcnode-id="6395" instrument_node="">[95]</span></a></sup><span data-dcnode-id="6392" instrument_node=""> In Puerto Rico, felons in prison are allowed to vote in elections.
</span></p><p data-dcnode-id="6378"><span data-dcnode-id="6390" instrument_node="">Practices in the United States are in contrast to some European nations that allow prisoners to vote, while other European countries have restrictions on voting while serving a prison sentence, but not after release.</span><sup class="reference" data-dcnode-id="6387" id="cite_ref-97"><a data-dcnode-id="6388" href="#cite_note-97"><span data-dcnode-id="6389" instrument_node="">[96]</span></a></sup><span data-dcnode-id="6386" instrument_node=""> Prisoners have been allowed to vote in </span><a data-dcnode-id="6384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada" title="Canada"><span data-dcnode-id="6385" instrument_node="">Canada</span></a><span data-dcnode-id="6383" instrument_node=""> since 2002.</span><sup class="reference" data-dcnode-id="6380" id="cite_ref-98"><a data-dcnode-id="6381" href="#cite_note-98"><span data-dcnode-id="6382" instrument_node="">[97]</span></a></sup><span data-dcnode-id="6379" instrument_node="">
</span></p><p data-dcnode-id="6361"><span data-dcnode-id="6377" instrument_node="">The United States has a higher proportion of its population in prison than any other Western nation,</span><sup class="reference" data-dcnode-id="6374" id="cite_ref-99"><a data-dcnode-id="6375" href="#cite_note-99"><span data-dcnode-id="6376" instrument_node="">[98]</span></a></sup><span data-dcnode-id="6373" instrument_node=""> and more than Russia or China.</span><sup class="reference" data-dcnode-id="6370" id="cite_ref-WorldPrisonBrief_100-0"><a data-dcnode-id="6371" href="#cite_note-WorldPrisonBrief-100"><span data-dcnode-id="6372" instrument_node="">[99]</span></a></sup><span data-dcnode-id="6369" instrument_node=""> The dramatic rise in </span><a data-dcnode-id="6367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_incarceration_rate" title="United States incarceration rate"><span data-dcnode-id="6368" instrument_node="">the rate of incarceration in the United States</span></a><span data-dcnode-id="6366" instrument_node="">, a 500% increase from the 1970s to the 1990s,</span><sup class="reference" data-dcnode-id="6363" id="cite_ref-Pilkington,_Ed_101-0"><a data-dcnode-id="6364" href="#cite_note-Pilkington,_Ed-101"><span data-dcnode-id="6365" instrument_node="">[100]</span></a></sup><span data-dcnode-id="6362" instrument_node=""> has vastly increased the number of people disenfranchised because of the felon provisions.
</span></p><p data-dcnode-id="6348"><span data-dcnode-id="6360" instrument_node="">According to the </span><a class="mw-redirect" data-dcnode-id="6358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sentencing_Project" title="Sentencing Project"><span data-dcnode-id="6359" instrument_node="">Sentencing Project</span></a><span data-dcnode-id="6357" instrument_node="">, as of 2010 an estimated 5.9 million Americans are denied the right to vote because of a felony conviction, a number equivalent to 2.5% of the U.S. voting-age population and a sharp increase from the 1.2 million people affected by felony disenfranchisement in 1976.</span><sup class="reference" data-dcnode-id="6354" id="cite_ref-Pilkington,_Ed_101-1"><a data-dcnode-id="6355" href="#cite_note-Pilkington,_Ed-101"><span data-dcnode-id="6356" instrument_node="">[100]</span></a></sup><span data-dcnode-id="6353" instrument_node=""> Given the prison populations, the effects have been most disadvantageous for minority and poor communities.</span><sup class="reference" data-dcnode-id="6350" id="cite_ref-102"><a data-dcnode-id="6351" href="#cite_note-102"><span data-dcnode-id="6352" instrument_node="">[101]</span></a></sup><span data-dcnode-id="6349" instrument_node="">
</span></p><span data-dcnode-id="6347" instrument_node="">
</span><h2 data-dcnode-id="6337"><span class="mw-headline" data-dcnode-id="6345" id="Duration_of_residency"><span data-dcnode-id="6346" instrument_node="">Duration of residency</span></span><span class="mw-editsection" data-dcnode-id="6338"><span class="mw-editsection-bracket" data-dcnode-id="6343"><span data-dcnode-id="6344" instrument_node="">[</span></span><a data-dcnode-id="6341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D16" title="Edit section: Duration of residency"><span data-dcnode-id="6342" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6339"><span data-dcnode-id="6340" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6336" instrument_node="">
</span><p data-dcnode-id="6309"><span data-dcnode-id="6335" instrument_node="">The </span><a data-dcnode-id="6333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Court_of_the_United_States" title="Supreme Court of the United States"><span data-dcnode-id="6334" instrument_node="">Supreme Court of the United States</span></a><span data-dcnode-id="6332" instrument_node=""> struck down a one-year residency requirement to vote in </span><i data-dcnode-id="6330"><span data-dcnode-id="6331" instrument_node="">Dunn v. Blumstein</span></i><span data-dcnode-id="6329" instrument_node=""> </span><a data-dcnode-id="6327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_United_States_Supreme_Court_cases%2C_volume_405" title="List of United States Supreme Court cases, volume 405"><span data-dcnode-id="6328" instrument_node="">405</span></a><span data-dcnode-id="6326" instrument_node=""> </span><a data-dcnode-id="6324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Reports" title="United States Reports"><span data-dcnode-id="6325" instrument_node="">U.S.</span></a><span data-dcnode-id="6323" instrument_node=""> </span><a class="external text" data-dcnode-id="6321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//supreme.justia.com/cases/federal/us/405/330/" rel="nofollow"><span data-dcnode-id="6322" instrument_node="">330</span></a><span data-dcnode-id="6320" instrument_node=""> (1972),</span><sup class="reference" data-dcnode-id="6317" id="cite_ref-103"><a data-dcnode-id="6318" href="#cite_note-103"><span data-dcnode-id="6319" instrument_node="">[102]</span></a></sup><span data-dcnode-id="6316" instrument_node=""> ruling that limits on </span><a data-dcnode-id="6314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voter_registration_in_the_United_States" title="Voter registration in the United States"><span data-dcnode-id="6315" instrument_node="">voter registration</span></a><span data-dcnode-id="6313" instrument_node=""> of up to 30 to 50 days prior to an election were permissible for logistical reasons, but that residency requirements in excess of that violated the </span><a class="mw-redirect" data-dcnode-id="6311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equal_protection_clause" title="Equal protection clause"><span data-dcnode-id="6312" instrument_node="">equal protection clause</span></a><span data-dcnode-id="6310" instrument_node=""> under the Fourteenth Amendment.
</span></p><span data-dcnode-id="6308" instrument_node="">
</span><h2 data-dcnode-id="6298"><span class="mw-headline" data-dcnode-id="6306" id="Disability"><span data-dcnode-id="6307" instrument_node="">Disability</span></span><span class="mw-editsection" data-dcnode-id="6299"><span class="mw-editsection-bracket" data-dcnode-id="6304"><span data-dcnode-id="6305" instrument_node="">[</span></span><a data-dcnode-id="6302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D17" title="Edit section: Disability"><span data-dcnode-id="6303" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6300"><span data-dcnode-id="6301" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6297" instrument_node="">
</span><link data-dcnode-id="6296" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6292" role="note"><span data-dcnode-id="6295" instrument_node="">Further information: </span><a class="mw-redirect" data-dcnode-id="6293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suffrage_for_Americans_with_Disabilities" title="Suffrage for Americans with Disabilities"><span data-dcnode-id="6294" instrument_node="">Suffrage for Americans with Disabilities</span></a></div><span data-dcnode-id="6291" instrument_node="">
</span><p data-dcnode-id="6278"><span data-dcnode-id="6290" instrument_node="">In some states, people who are deemed </span><a class="mw-redirect" data-dcnode-id="6288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mentally_incompetent" title="Mentally incompetent"><span data-dcnode-id="6289" instrument_node="">mentally incompetent</span></a><span data-dcnode-id="6287" instrument_node=""> are not allowed to vote.</span><sup class="reference" data-dcnode-id="6284" id="cite_ref-dis1_104-0"><a data-dcnode-id="6285" href="#cite_note-dis1-104"><span data-dcnode-id="6286" instrument_node="">[103]</span></a></sup><span data-dcnode-id="6283" instrument_node=""> Voting rights specialist Michelle Bishop has said, "We are the last demographic within the U.S. where you can take away our right to vote because of our identity."</span><sup class="reference" data-dcnode-id="6280" id="cite_ref-105"><a data-dcnode-id="6281" href="#cite_note-105"><span data-dcnode-id="6282" instrument_node="">[104]</span></a></sup><span data-dcnode-id="6279" instrument_node="">
</span></p><p data-dcnode-id="6262"><span data-dcnode-id="6277" instrument_node="">In the </span><a data-dcnode-id="6275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservatorship" title="Conservatorship"><span data-dcnode-id="6276" instrument_node="">conservatorship</span></a><span data-dcnode-id="6274" instrument_node=""> process, people can lose their right to vote in 39 states and Washington, D.C. if they are deemed  “incapacitated” or “incompetent.”</span><sup class="reference" data-dcnode-id="6271" id="cite_ref-dis2_106-0"><a data-dcnode-id="6272" href="#cite_note-dis2-106"><span data-dcnode-id="6273" instrument_node="">[105]</span></a></sup><sup class="reference" data-dcnode-id="6268" id="cite_ref-107"><a data-dcnode-id="6269" href="#cite_note-107"><span data-dcnode-id="6270" instrument_node="">[106]</span></a></sup><span data-dcnode-id="6267" instrument_node=""> In California, SB 589 was passed in 2015, which created the presumption that those under conservatorship can vote.</span><sup class="reference" data-dcnode-id="6264" id="cite_ref-108"><a data-dcnode-id="6265" href="#cite_note-108"><span data-dcnode-id="6266" instrument_node="">[107]</span></a></sup><span data-dcnode-id="6263" instrument_node="">
</span></p><span data-dcnode-id="6261" instrument_node="">
</span><h2 data-dcnode-id="6251"><span class="mw-headline" data-dcnode-id="6259" id="Homelessness"><span data-dcnode-id="6260" instrument_node="">Homelessness</span></span><span class="mw-editsection" data-dcnode-id="6252"><span class="mw-editsection-bracket" data-dcnode-id="6257"><span data-dcnode-id="6258" instrument_node="">[</span></span><a data-dcnode-id="6255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVoting_rights_in_the_United_States%26action%3Dedit%26section%3D18" title="Edit section: Homelessness"><span data-dcnode-id="6256" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6253"><span data-dcnode-id="6254" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6250" instrument_node="">
</span><link data-dcnode-id="6249" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6245" role="note"><span data-dcnode-id="6248" instrument_node="">Main article: </span><a data-dcnode-id="6246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homelessness_in_the_United_States" title="Homelessness in the United States"><span data-dcnode-id="6247" instrument_node="">Homelessness in the United States</span></a></div><span data-dcnode-id="6244" instrument_node="">
</span><p data-dcnode-id="6238"><span data-dcnode-id="6243" instrument_node="">In the 1980s homelessness was recognized as an increasing national problem. By the early 21st century, there have been numerous court cases to help protect the voting rights of persons without a fixed address. Low income and homeless citizens face some obstacles in registering to vote. These obstacles include establishing residency, providing a mailing address, and showing proof of identification. A residency requirement varies from state to state. States cannot require citizens to show residency of more than 30 days before Election Day. The states of Idaho, Maine, Minnesota, Wisconsin, and Wyoming allow voters to register on Election Day. North Dakota does not require voters to register.</span><sup class="reference" data-dcnode-id="6240" id="cite_ref-109"><a data-dcnode-id="6241" href="#cite_note-109"><span data-dcnode-id="6242" instrument_node="">[108]</span></a></sup><span data-dcnode-id="6239" instrument_node="">
