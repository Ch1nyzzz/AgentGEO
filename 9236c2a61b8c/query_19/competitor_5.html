</span><h3 class="section-heading" data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">
								About Republicans for Voting Rights
							</span></h3><span data-dcnode-id="3467" instrument_node="">
</span></div><span data-dcnode-id="3465" instrument_node="">
</span><div data-dcnode-id="3451"><span data-dcnode-id="3464" instrument_node="">
</span><p data-dcnode-id="3461"><big data-dcnode-id="3462"><span data-dcnode-id="3463" instrument_node="">Republicans for Voting Rights is an initiative of the Republican Accountability Project with the purpose of defending the accessibility, integrity, and competitiveness of American elections.</span></big></p><span data-dcnode-id="3460" instrument_node="">
</span><hr data-dcnode-id="3459"><span data-dcnode-id="3458" instrument_node="">
</span><p data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">Voting is a sacred American right. But after the 2020 election, some Republicans began pushing for more restrictive voting laws designed to support unfounded accusations that the election was stolen and the results were illegitimate. Some even believe that voting is harmful to their electoral prospects. More still believe our electoral system is rife with fraud and security failures.</span></p><span data-dcnode-id="3455" instrument_node="">
</span><p data-dcnode-id="3453"><span data-dcnode-id="3454" instrument_node="">Republicans for Voting Rights rejects the false choice between voting access and election integrity. We believe that Republicans in federal, state, and local government should protect the right to vote, protect our election systems from partisan or foreign interference, and help build trust in our democracy.</span></p><span data-dcnode-id="3452" instrument_node="">
</span></div><span data-dcnode-id="3450" instrument_node="">

</span><h3 class="section-heading" data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Transcript for Nitin</span></h3><span data-dcnode-id="1769" instrument_node="">
</span></div><span data-dcnode-id="1767" instrument_node="">

						Hi, my name is Nitin, and I am a Republican voter in New York City. </span><br data-dcnode-id="1766"><span data-dcnode-id="1765" instrument_node="">
</span><br data-dcnode-id="1764"><span data-dcnode-id="1763" instrument_node="">
Like many Republican voters, I voted for Donald Trump in 2020, and now I have deep regrets for voting for him. </span><br data-dcnode-id="1762"><span data-dcnode-id="1761" instrument_node="">
</span><br data-dcnode-id="1760"><span data-dcnode-id="1759" instrument_node="">
What he did on January the sixth was an untold and a very bad horror that I would not have imagined in my country. </span><br data-dcnode-id="1758"><span data-dcnode-id="1757" instrument_node="">
</span><br data-dcnode-id="1756"><span data-dcnode-id="1755" instrument_node="">
I was an immigrant and I became a U.S. citizen and I exercise my right to vote. </span><br data-dcnode-id="1754"><span data-dcnode-id="1753" instrument_node="">
</span><br data-dcnode-id="1752"><span data-dcnode-id="1751" instrument_node="">
Donald Trump must be stopped. His enablers must be stopped. </span><br data-dcnode-id="1750"><span data-dcnode-id="1749" instrument_node="">
