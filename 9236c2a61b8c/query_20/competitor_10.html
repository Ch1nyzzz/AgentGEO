</span><h5 class="et_pb_toggle_title" data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Liberia Petroleum Refining</span></h5><span data-dcnode-id="2515" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2487"><p data-dcnode-id="2488"><span data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Creation:</span></span><br data-dcnode-id="2512"><span data-dcnode-id="2511" instrument_node=""> </span><span data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Name:</span></span><br data-dcnode-id="2508"><span data-dcnode-id="2507" instrument_node=""> </span><span data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Former Name:</span></span><br data-dcnode-id="2504"><span data-dcnode-id="2503" instrument_node=""> </span><span data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">Function:</span></span><br data-dcnode-id="2500"><span data-dcnode-id="2499" instrument_node=""> </span><span data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Order of Succession:</span></span><br data-dcnode-id="2496"><span data-dcnode-id="2495" instrument_node=""> </span><span data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Employees:</span></span><br data-dcnode-id="2492"><span data-dcnode-id="2491" instrument_node=""> </span><span data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Outlays:</span></span></p></div><span data-dcnode-id="2486" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_25 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2476"><span data-dcnode-id="2484" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2482"><span data-dcnode-id="2483" instrument_node="">THE NATIONAL HOUSING AND SAVINGS BANK</span></h5><span data-dcnode-id="2481" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2478"><p data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">The object and purpose of the Bank shall be to provide the funding required to satisfy the housing needs of the citizens of Liberia, including the making of long term loans for homeownership. Housing as used in this paragraph shall include single and multiple family dwelling units intended for purchase and occupancy, realty development, infrastructure including utilities, and community facilities incident to sound community development.</span></p></div><span data-dcnode-id="2477" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_26 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2465"><span data-dcnode-id="2475" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">THE LIBERIAN BANK FOR DEVELOPMENT AND INVESTMENT</span></h5><span data-dcnode-id="2472" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2467"><p data-dcnode-id="2468"><span data-dcnode-id="2471" instrument_node="">To assist in the establishment, expansion, and the modernization of productive private business and industrial enterprises in Liberia; to encourage and promote the development of internal and external private and public capital availabilities in the financing of such enterprises; to help, sponsor and facilitate the private establishment, acquisition, or ownership of a productive business and industrial investment, shares and securities and in particular by: providing finance in the form of long or medium-term loans, purchase of convertible debentures, or share participation; Guaranteeing and counter-guaranteeing loans and obligations of borrowers and others, and underwriting issues of shares and securities of all kinds; Making funds available for reinvesting by causing transfers of stocks and protection, and by revolving investments, as rapidly as prudent; Furnishing technical advice and assistance on the formulation, financing and execution of development plans and projects including the furnishing of professional and administrative information and services to Liberian enterprises; Investigating, carefully selecting, determining the size and character of the market for, and the technical feasibility and economic soundness of, documenting, promoting and advertising, and otherwise publicizing at home and abroad, add advising the Government concerning projects for private industrial enterprises in Liberia; and, for this purpose, to employ consultants and independent research organizations and enter into agreements with other national or international institutions, either public or private; and Establishing, in conjunction with the Government and with other appropriate agencies, priorities for productive businesses and industrial enterprises to receive development assistance according to the extent to which they utilize resources or possess other economic advantages.</span><br data-dcnode-id="2470"><span data-dcnode-id="2469" instrument_node="">To assist in the establishment, expansion, and the modernization of productive public business and industrial enterprises in Liberia, provided they are commercially operated and preferably under private management, and also provided the aggregate amount of the Bank’s financing of such an enterprise does not at any time exceed thirty (30%) percent of the aggregate of the Bank’s total cumulative commitments at the time of such financing.</span></p></div><span data-dcnode-id="2466" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_27 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2456"><span data-dcnode-id="2464" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">INTERNAL AUDIT AGENCY</span></h5><span data-dcnode-id="2461" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2458"><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">The Internal Audit Agency was established by an Act of the National Legislature on September 13, 2013, with a mandate to develop and direct internal audit functions within all branches of government as well as within all public sector entities such as public corporations, independent commission, government ministries and the central bank of Liberia. Promulgate and ensure that common internal audit standards and systems with best practices are established and maintained. Provide oversight, including managerial, administrative, and supervisory expertise at each of the established audit functions. Ensure that the ethics of internal audits according to internationally accepted standards are strictly adhered to and followed. These shall be, but not limited to, competence, integrity, confidentiality, and professionalism.</span></p></div><span data-dcnode-id="2457" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_28 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2447"><span data-dcnode-id="2455" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">PRESIDENTIAL APPOINTEE PAYROLL AUDIT</span></h5><span data-dcnode-id="2452" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2449"><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">Conducted a comprehensive and independent audit exercise of the Liberia Electricity Corporation Expand internal audit functions to four counties as part of the county treasury operation, with the deployment of eight (8) auditors, two to each of the four piloted counties ( Grand Bassa, Margibi, Bong, and Nimba Counties); Conducted payroll verification of the Ministry of Health to independently verify the information given by USAID to the Government of Liberia on healthcare employees of the Ministry of Health who are being paid by direct deposit; Conducted a system audit of the Bong County Technical College on its construction, finances, and administration; and Conducted system and IT audit of the Liberia Electricity Corporation</span></p></div><span data-dcnode-id="2448" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_29 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2429"><span data-dcnode-id="2446" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">AGRICULTURAL AND COOPERATIVE DEVELOPMENT BANK</span></h5><span data-dcnode-id="2443" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2431"><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">The purposes of the Bank shall be:</span></p><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2439" instrument_node="">To provide financing in short, medium, and long-term loans to individuals, farmers’ cooperatives, or farmers’ organizations to facilitate the establishment of agricultural enterprises and the development of rural industries in Liberia.</span><br data-dcnode-id="2438"><span data-dcnode-id="2437" instrument_node="">To encourage and promote the development of cooperatives, farmers’ organizations, cottage industries as well as mobilize savings in the rural areas;</span><br data-dcnode-id="2436"><span data-dcnode-id="2435" instrument_node="">To provide credit and such other facilities as shall be conducive to the development of training in the rural agricultural economy;</span><br data-dcnode-id="2434"><span data-dcnode-id="2433" instrument_node="">To render technical advice and assistance to individuals, farmers cooperatives, and farmers’ organizations, conduct research on agricultural credit, marketing or farming products and cooperative societies engaged in agriculture, provide training facilities for farmers and co-operatives and assist in the promotional work in organizing and establishing co-operative societies.</span></p></div><span data-dcnode-id="2430" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_30 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2420"><span data-dcnode-id="2428" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">CIVIL SERVICE AGENCY</span></h5><span data-dcnode-id="2425" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2422"><p data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">An Act of the National Legislature created the Civil Service Agency (CSA) in 1973. CSA manages the human resources of the Civil Service and is responsible for improving personnel services delivery and efficiency through planning human capacity needs of the service, selection, and recruitment of staff, training development, performance management, and career development, including placement, rotation, and promotion. The purpose of the Civil Service Agency is to increase the Public Service’s efficiency and secure for deserving employees a reasonable tenure of office and an opportunity for advancement according to merit and seniority and place the personnel employed by Government on a competitive merit system. The Agency recruits, examines, classifies, certifies, and places all Civil Servants; keeps an accurate and up-to-date record of every individual employed in the Civil Service system; establishes, with the approval of the President, a classification plan by the provisions of this Act based on the duties, responsibilities, and nature of work in the Government Service, and to ensure the continued maintenance and administration of the classification plan. The Agency also issues, with the approval of the President, rules, and regulations setting forth the conditions of employment for all Civil Servants; protects the interests and rights of Civil Servants through the objective administration and enforcement of the provisions of this Act and any rules and regulations promulgated thereunder; formulates and establishes effective liaison between the Civil Service and the National Social Security Agency; maintains a record of all Personnel Action Notices of all Civil Servants to ensure that the person so employed is a classified Civil Servant; establishes and maintains Eligibility Lists of all Civil Servants and conducts research and studies designed to improve the Service.</span></p></div><span data-dcnode-id="2421" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_31 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2402"><span data-dcnode-id="2419" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">INSTITUTE OF PUBLIC ADMINISTRATION</span></h5><span data-dcnode-id="2416" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2404"><p data-dcnode-id="2412"><span data-dcnode-id="2415" instrument_node="">A Liberian Legislative Act created the Liberia Institute of Public Administration (LIPA) in 1969. The Institute is mandated to produce viable organizational capabilities through training, consultancy, and research to improve service delivery in the public sector.</span><br data-dcnode-id="2414"><span data-dcnode-id="2413" instrument_node="">The Institute shall have power to:</span></p><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2405"><span data-dcnode-id="2410" instrument_node="">(a) organize and conduct conferences and discussions for opinions and views on the critical issues in the public service of the Government of Liberia, and (b) in the performance of its functions to solicit and receive assistance from any Ministry or Agency or Government official or an employee or another party.</span><br data-dcnode-id="2409"><span data-dcnode-id="2408" instrument_node="">The Institute shall be primarily concerned with improving the organizational performance and professional capabilities of the Government public service through training of personnel, research in problems of public administration, and consultation in public administration, for maximum utilization, the potential sources of talent of the workforce the Country.</span><br data-dcnode-id="2407"><span data-dcnode-id="2406" instrument_node="">The functions and duties of the Institute shall include but not be limited to: Operating training programs for public servants in all its forms (pre-entry service training, in-service training, initial postentry service training, on-the-job training, etc.) including the provision for the essential academic background; such training programs shall cover the whole range of Government positions, and shall extend, in particular, to: Organizing a broad-based top-to-bottom in-service training program for Government employees; Developing training programs for middle grade and upper-level employees; Creating and improving the capability needed for administering economic and social development programs; Enunciating a career-development program by identifying specific career ladders, encouraging in-service training, management interns and executive development programs, and promotional programs based on merit, etc.; Providing leadership and guidance to the agencies of Government in developing more and better quality on-the-job training programs, serving as a research study group to study particular governmental organizational and management problem areas; Researching and reviewing the indigenous situations and practices which affect social, economic and administrative development in Liberia; Performing studies of systems and procedure and assisting in making improvements (a) government-wide, (b) inter-departmental in such matters as record-keeping, forms control, document flow, work simplification, public relations, and improving the administrative inter-relationships with national and international technical cooperation bodies; Carrying on research in administration to provide adequate, systematic and precise information in critical areas of Government for planning and administration with the overall view towards improvement; Development of a library suitable for the needs of the research program and the use of public officers; Performing such other functions as may be prescribed by the President, by the general policy of Government and the intent and purpose of this act.</span></p></div><span data-dcnode-id="2403" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_32 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2393"><span data-dcnode-id="2401" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">LIBERIA INSTITUTE OF STATISTICS &amp; GEO-INFORMATION SERVICES</span></h5><span data-dcnode-id="2398" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2395"><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">The Liberia Institute of Statistics and Geo-Information Services (LISGIS) was established by an act of the National Legislature on July 22, 2004, with the mandate to serve as the prime authoritative agency of the Government responsible for collecting, managing, evaluating, and disseminating statistical and associated geo-information for national socio-economic reconstruction and development. Continue to pursue the primary responsibilities of collecting, organizing, evaluating, and publishing statistical and associated geoinformation for policy decision-making purposes and national socioeconomic and reconstruction</span></p></div><span data-dcnode-id="2394" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_33 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2384"><span data-dcnode-id="2392" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">FINANCIAL INTELLIGENCE UNIT</span></h5><span data-dcnode-id="2389" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2386"><p data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">The Financial Intelligence Unit of Liberia (FIU) was established as an autonomous agency of Liberia by an Act of the National Legislature in 2012. The FIU is the central national agency of Liberia responsible for receiving, requesting, and conducting preliminary investigations, analyzing, and disseminating information concerning suspected proceeds of money laundering, terrorist financing, and other financial crimes.</span></p></div><span data-dcnode-id="2385" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_34 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2375"><span data-dcnode-id="2383" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">LIBERIA EXTRACTIVE INDUSTRY TRANSPARENCY INITIATIVE</span></h5><span data-dcnode-id="2380" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2377"><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">An Act of the National legislature established the Liberia Extractive Industries Transparency Initiative in July 2009 as an autonomous agency mandated to assist in ensuring that all benefits due to the government on account of exploitation and extraction of the country’s minerals and other resources verifiably paid or provided, are duly accounted for and are prudently utilized for the benefit of the Liberians based on equity and sustainability.</span></p></div><span data-dcnode-id="2376" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_35 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2358"><span data-dcnode-id="2374" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">NATIONAL SCIENTIFIC INSTITUTE</span></h5><span data-dcnode-id="2371" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2360"><p data-dcnode-id="2367"><span data-dcnode-id="2370" instrument_node="">The Director shall perform the following duties in addition to supervising all activities of the Institute:</span><br data-dcnode-id="2369"><span data-dcnode-id="2368" instrument_node="">He shall be the chairman of all group and subgroup meetings of the scientists employed by the Institute; With the approval of the trustees of the University, he shall solicit the employment of and hire scientists to undertake research studies for the Institute; He shall coordinate the activities of the different fields of applied sciences within the Institute?’</span></p><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">The purposes and powers of the Institute shall be as follows: To devote its operations to basic scientific research; To collect from existing organs of Government, or acquire through study or otherwise, specialized scientific studies and coordinate the same; To send, during the embryonic stage of its development, qualified nationals of Liberia to the institutions of foreign nations where scientific research is carried out on a broad scope, to observe the methods of organization of such institutions;</span></p><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">To do basic research concerning the determination of such scientific standards as apply to conditions that exist within the Republic and establish standards for use within the Republic; To carry on research relating to nuclear and thermonuclear energy for devising means of increasing the economic power of the nation; To research in the field of geophysics and geochemistry. Institute will hire expatriate scientists from any country, provided, however, that the no-Liberian scientists agree to the following conditions: To give scientific loyalty to their employer, the Institute; To accept as total compensation for their inventions during their employment at the Institute the salaries agreed to be paid to them and to permit all patents and trademarks granted in connection with such innovations to be owned by and bear the name of the Republic.</span></p></div><span data-dcnode-id="2359" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_36 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2349"><span data-dcnode-id="2357" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">NATIONAL SECURITY AGENCY</span></h5><span data-dcnode-id="2354" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2351"><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">The National Security Agency derives its authority from the National Security and Intelligence Act of 2011, which, among other things, mandates the agency to collect intelligence and information relating to capabilities, intentions, and activities of foreign powers, organizations, and persons.</span></p></div><span data-dcnode-id="2350" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_37 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2340"><span data-dcnode-id="2348" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">EXECUTIVE PROTECTION SERVICES</span></h5><span data-dcnode-id="2345" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2342"><p data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">The Revised National Security Act of 2011 created the Executive Protection Service, absorbing the mandate of the Special Security Service, which is to provide maximum security protection to the President, Vice President and their immediate families, designated officials of government, dignitaries, and visiting guests of the Presidency.</span></p></div><span data-dcnode-id="2341" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_38 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2331"><span data-dcnode-id="2339" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">HUMAN RIGHTS COMMISSION</span></h5><span data-dcnode-id="2336" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2333"><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">According to Article III of the INCHR (2005) Act titled Powers of the Commission, the INCHR has general and special competence to protect, promote and monitor human rights in the Republic of Liberia, to monitor Liberia’s adherence and commitment to the international conventions and protocols, write reports and make recommendations to the government., The Truth and Reconciliation. The INCHR has the mandate to develop relations with the nongovernmental organizations devoted to protecting and promoting human rights, economic and social development, combat ethnic discrimination and sectionalism, and protect particularly vulnerable groups such as children, women, refugees, and physically and mentally impaired persons.</span></p></div><span data-dcnode-id="2332" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_39 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2310"><span data-dcnode-id="2330" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Liberia Freezone Authority</span></h5><span data-dcnode-id="2327" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2312"><p data-dcnode-id="2313"><span data-dcnode-id="2326" instrument_node="">Creation:</span><br data-dcnode-id="2325"><span data-dcnode-id="2324" instrument_node="">Name:</span><br data-dcnode-id="2323"><span data-dcnode-id="2322" instrument_node="">Former Name:</span><br data-dcnode-id="2321"><span data-dcnode-id="2320" instrument_node="">Function:</span><br data-dcnode-id="2319"><span data-dcnode-id="2318" instrument_node="">Order of Succession:</span><br data-dcnode-id="2317"><span data-dcnode-id="2316" instrument_node="">Employees:</span><br data-dcnode-id="2315"><span data-dcnode-id="2314" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2311" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_40 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2289"><span data-dcnode-id="2309" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Land Commission</span></h5><span data-dcnode-id="2306" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2291"><p data-dcnode-id="2292"><span data-dcnode-id="2305" instrument_node="">Creation:</span><br data-dcnode-id="2304"><span data-dcnode-id="2303" instrument_node="">Name:</span><br data-dcnode-id="2302"><span data-dcnode-id="2301" instrument_node="">Former Name:</span><br data-dcnode-id="2300"><span data-dcnode-id="2299" instrument_node="">Function: An Act of the National Legislature created the Land Commission on August 4, 2009, to propose, advocate, and coordinate reforms of land policy, laws, and programs in Liberia.</span><br data-dcnode-id="2298"><span data-dcnode-id="2297" instrument_node="">Order of Succession:</span><br data-dcnode-id="2296"><span data-dcnode-id="2295" instrument_node="">Employees:</span><br data-dcnode-id="2294"><span data-dcnode-id="2293" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2290" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_41 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2265"><span data-dcnode-id="2288" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">Millennium Challenge Account</span></h5><span data-dcnode-id="2285" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2267"><p data-dcnode-id="2275"><span data-dcnode-id="2284" instrument_node="">Creation:</span><br data-dcnode-id="2283"><span data-dcnode-id="2282" instrument_node="">Name:</span><br data-dcnode-id="2281"><span data-dcnode-id="2280" instrument_node="">Former Name:</span><br data-dcnode-id="2279"><span data-dcnode-id="2278" instrument_node="">Function: In October 2015, the United States of America government provided a grant of $257M to Liberia through its development agency, the Millennium Challenge Corporation (MCC), to address the lack of access to reliable and affordable electricity inadequate road infrastructure.</span><br data-dcnode-id="2277"><span data-dcnode-id="2276" instrument_node="">The MCC compact is a Liberia-U.S. partnership to reduce poverty and promote economic growth. MCC awards compact grants to countries that pass at least 10 of its 20 governance indicators, including control of corruption. The Millennium Challenge Account Liberia is an independent, legal, and autonomous agency of the Government of Liberia created by the legislature to administer the compact projects.</span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2273" instrument_node="">Order of Succession:</span><br data-dcnode-id="2272"><span data-dcnode-id="2271" instrument_node="">Employees:</span><br data-dcnode-id="2270"><span data-dcnode-id="2269" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2266" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_42 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2240"><span data-dcnode-id="2264" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Liberia Investment Commission</span></h5><span data-dcnode-id="2261" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2242"><p data-dcnode-id="2253"><span data-dcnode-id="2260" instrument_node="">Creation:</span><br data-dcnode-id="2259"><span data-dcnode-id="2258" instrument_node="">Name:</span><br data-dcnode-id="2257"><span data-dcnode-id="2256" instrument_node="">Former Name:</span><br data-dcnode-id="2255"><span data-dcnode-id="2254" instrument_node="">Function: The LNIC is a member of the Liberia Better Business Forum, which creates an investment environment that makes it easy and predictable to do business in Liberia.</span></p><span data-dcnode-id="2252" instrument_node="">
</span><p data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">The Liberia National Investment Commission (LNIC) is the Government of Liberia’s agency that attracts foreign direct investments (FDI) and supports the growth of the domestic private sector while advocating for the improvement of the business environment. The Commission formulates and implements several measures geared towards the actualization of this mandate.</span></p><span data-dcnode-id="2249" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2248" instrument_node="">&nbsp;Order of Succession:</span><br data-dcnode-id="2247"><span data-dcnode-id="2246" instrument_node="">Employees:</span><br data-dcnode-id="2245"><span data-dcnode-id="2244" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2241" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_43 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2219"><span data-dcnode-id="2239" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Forestry Development Authority</span></h5><span data-dcnode-id="2236" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2221"><p data-dcnode-id="2222"><span data-dcnode-id="2235" instrument_node="">Creation:</span><br data-dcnode-id="2234"><span data-dcnode-id="2233" instrument_node="">Name:</span><br data-dcnode-id="2232"><span data-dcnode-id="2231" instrument_node="">Former Name:</span><br data-dcnode-id="2230"><span data-dcnode-id="2229" instrument_node="">Function: The Forestry Development Authority is a state corporation established by an Act of the Legislature in 1976 with the mandate of ensuring the sustainable management and conservation of Liberia’s forest and related natural resources for the benefit of current and future generations. The 2006 National Forestry Reform Law is the current legal instrument that guides the management of forest resources in Liberia.</span><br data-dcnode-id="2228"><span data-dcnode-id="2227" instrument_node="">Order of Succession:</span><br data-dcnode-id="2226"><span data-dcnode-id="2225" instrument_node="">Employees:</span><br data-dcnode-id="2224"><span data-dcnode-id="2223" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2220" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_44 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2210"><span data-dcnode-id="2218" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Liberia Revenue Authority</span></h5><span data-dcnode-id="2215" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2212"><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">The Liberia Revenue Authority was established by an Act of the National Legislature in 2013 with the mandate to transparently, equitably, and fairly administer the assessment and collection of revenues, account for all payments to which the revenue laws apply, and deposit all amounts assessed and collected into the Consolidated Fund and ensure compliance with the Code and regulations.</span></p></div><span data-dcnode-id="2211" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_45 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2199"><span data-dcnode-id="2209" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Environmental Protection Agency</span></h5><span data-dcnode-id="2206" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2201"><p data-dcnode-id="2202"><span data-dcnode-id="2205" instrument_node="">The Environmental Protection Agency (EPA) is the regulatory Institution of the Government of Liberia for the sustainable management of the environment and its natural resources. The Agency was established by an act of the Legislature on November 26, 2002, and published into handbill on April 30, 2003.</span><br data-dcnode-id="2204"><span data-dcnode-id="2203" instrument_node="">The NEP seeks to harmonize cross-cutting functions between and amongst agencies. The NEP wants to ensure the long-term economic prosperity of Liberia through sustainable social and economic development of the generation without endangering the potential of future production. The objective of the NEP is to improve the physical environment, the quality of life, and the improvement of economic and social living conditions of the citizenry present and future generations.</span></p></div><span data-dcnode-id="2200" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_46 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2176"><span data-dcnode-id="2198" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">MANAGEMENT AND DISPOSAL OF GOVERNMENT PROPERTY</span></h5><span data-dcnode-id="2195" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2178"><p data-dcnode-id="2179"><span data-dcnode-id="2194" instrument_node="">Duties of heads of executive agencies.&nbsp;Maintain adequate inventory controls and accountability systems for the property under his control;</span><br data-dcnode-id="2193"><span data-dcnode-id="2192" instrument_node="">Continuously survey property under his command to determine which is excess property, and promptly report such property to</span><br data-dcnode-id="2191"><span data-dcnode-id="2190" instrument_node="">Transfer or dispose of surplus property as quickly as possible by authority delegated and regulations prescribed by the Director-General.</span><br data-dcnode-id="2189"><span data-dcnode-id="2188" instrument_node="">The agency shall, among other things,</span><br data-dcnode-id="2187"><span data-dcnode-id="2186" instrument_node="">Make reassignments of property among activities within the agency when such property is determined to be no longer required for the appropriation from which it was purchased</span><br data-dcnode-id="2185"><span data-dcnode-id="2184" instrument_node="">(Transfer excess property under his control to other Government agencies; and</span><br data-dcnode-id="2183"><span data-dcnode-id="2182" instrument_node="">Obtain excess property from other Government agencies, which will be helpful in its activities.</span><br data-dcnode-id="2181"><span data-dcnode-id="2180" instrument_node="">Regulations governing reporting of transfers. The Director of the Budget shall prescribe rules providing for the reporting to said director by executive Agencies of such reassignments or transfers of property between activities financed by different appropriations as he shall deem appropriate, and the reassignments and transfers so reported shall be reported to the Legislature in the annual budget or otherwise as of said Director might determine.</span></p></div><span data-dcnode-id="2177" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_47 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2154"><span data-dcnode-id="2175" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">MANAGEMENT OF GOVERNMENT RECORDS</span></h5><span data-dcnode-id="2172" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2156"><p data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Duties of agency heads as to records management.</span></p><span data-dcnode-id="2169" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2168" instrument_node="">Preserve public records</span><br data-dcnode-id="2167"><span data-dcnode-id="2166" instrument_node="">Establish and maintain an active, continuing program for the economical and efficient management of the agency’s records. Such application shall, among other things, provide for:</span><br data-dcnode-id="2165"><span data-dcnode-id="2164" instrument_node="">Adequate controls over the creation, maintenance, and use of files in the conduct of current business; Cooperation with the Director in applying standards, procedures, and techniques designed to improve management of documents, promote the maintenance and security of records deemed appropriate for preservation, and facilitate the segregation and disposal of records temporary value; and Compliance with the provisions of this chapter.</span><br data-dcnode-id="2163"><span data-dcnode-id="2162" instrument_node="">Whenever the head of a Government agency determines that substantial economies or increased efficiency can be affected thereby, he shall provide for the storage, processing, and servicing of records that are appropriate therefore in a records center maintained and operated by the Director or, when approved by the Director, in a records center operated by the head of such Government agency.</span><br data-dcnode-id="2161"><span data-dcnode-id="2160" instrument_node="">Safeguards against loss of records. The head of each Government agency shall establish such safeguards against the removal or loss of papers as he shall determine to be necessary and as may be required by regulations of the Minister of Foreign Affairs. Such safeguards shall include making it known to all officials and employees of the agency (a) that no records in the custody of the agency are to be alienated or destroyed except by the provisions of section 81.8 of this title and the penalties provided by law for the unlawful removal or destruction of records.</span><br data-dcnode-id="2159"><span data-dcnode-id="2158" instrument_node="">Duty in case of unlawful removal or destruction of records. The head of each Government agency shall notify the Director of any actual impending, or threatened illegal removal, defacing, alteration, or destruction of files in the custody of the agency of which he is the head that shall come to his attention, and with the assistance of the Director shall initiate action through the Minister of Justice for the recovery of records he knows or has reason to believe have been unlawfully removed from his agency</span></p></div><span data-dcnode-id="2155" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_48 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2124"><span data-dcnode-id="2153" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">ADMINISTRATIVE PROCEDURE ACT</span></h5><span data-dcnode-id="2150" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2126"><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Powers of presiding officers. Any officer or officers presiding at a hearing shall have authority, subject to provisions of law to the contrary, to</span></p><span data-dcnode-id="2147" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2146" instrument_node="">Administer oaths and affirmations,</span><br data-dcnode-id="2145"><span data-dcnode-id="2144" instrument_node="">Issue subpoenas authorized by law,</span><br data-dcnode-id="2143"><span data-dcnode-id="2142" instrument_node="">Rule upon offers of proof and receive relevant evidence,</span><br data-dcnode-id="2141"><span data-dcnode-id="2140" instrument_node="">Hold conferences for the settlement or simplification of the issues by consent of the parties,</span><br data-dcnode-id="2139"><span data-dcnode-id="2138" instrument_node="">Dispose of procedural requests or similar matters,</span><br data-dcnode-id="2137"><span data-dcnode-id="2136" instrument_node="">Make decisions or recommend decisions in conformity with section 82.5 of this title, and</span><br data-dcnode-id="2135"><span data-dcnode-id="2134" instrument_node="">Take any other action authorized by agency rule consistent with this • chapter.</span><br data-dcnode-id="2133"><span data-dcnode-id="2132" instrument_node="">Evidence. Except as statutes otherwise provide, the proponent of an order has the burden of proof. Any oral or documentary evidence may be received, but every agency shall provide for the exclusion of irrelevant, immaterial, or unduly repetitious evidence as a matter of policy. Agencies shall give effect to the rules of privilege recognized by law. Documentary evidence may be received in copies or excerpts if the original is not readily available.</span><br data-dcnode-id="2131"><span data-dcnode-id="2130" instrument_node="">Official notice. Notice may be taken of judicially cognizable facts. Besides, information may be taken of generally recognized technical or scientific facts within the agency’s specialized knowledge.</span><br data-dcnode-id="2129"><span data-dcnode-id="2128" instrument_node="">Conduct of officials. The same officers who preside at the reception of evidence shall make the initial determination required by section 82.5 of this title except where such officers become unavailable to the agency. Except to the extent necessary for the disposition of ex parte matters as authorized by law, no such officer shall consult any person or party on any fact in issue unless upon notice and opportunity to all parties to participate; nor shall such officer be responsible to or subject to the supervision or direction of any officer, employee or agent engaged in the investigative or prosecuting functions for any agency. No officer, employee, or agent involved in the performance of investigative or prosecuting functions for any agency, in any case, shall, in that or a factually related topic, participate or advise in the determination, recommended determination, or agency review under section 82.5 of this title, except as witness or counsel in public proceedings.</span></p></div><span data-dcnode-id="2125" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_49 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2115"><span data-dcnode-id="2123" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">COLLECTION OF INFORMATION</span></h5><span data-dcnode-id="2120" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2117"><p data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Power of Government Agency to collect information and ensures the freedom of information. Penalty for refusal to cooperate. The head of every agency of the Executive Branch of the Government is at this moment authorized to request, demand, and collect from any person, natural or legal residing within the Republic of Liberia, or from the head of any other agency of the Government all information necessary to enable it effectively to carry out its lawful functions. Any person, including any officer or employee of the Government, who refuses or willfully neglects, when requested by an authorized officer or employee of the Government, to answer truthfully and to the best of his knowledge any question addressed to him or to furnish any information which is reasonably within his power to provide and which it is not contrary to the public interest to disclose, is subject to a fine of not more than $200 or imprisonment of not more than 30 days or both. Still, under the provisions of this section, no person shall be required to answer any question or furnish any information that would tend to incriminate him or subject him to a penalty or forfeiture. Any person who willfully provides false or inaccurate information to an officer or employee of the Government empowered to collect such information is subject to a fine of not more than $500 or imprisonment for not more than six months, or both.</span></p></div><span data-dcnode-id="2116" instrument_node="">
</span></div><span data-dcnode-id="2114" instrument_node="">
</span></div><span data-dcnode-id="2112" instrument_node="">
</span></div><span data-dcnode-id="2110" instrument_node="">
</span></div><span data-dcnode-id="2108" instrument_node=""> </span></div><span data-dcnode-id="2106" instrument_node="">
</span></div><span data-dcnode-id="2104" instrument_node="">
</span><span class="et_bloom_bottom_trigger" data-dcnode-id="2103"></span><span data-dcnode-id="2102" instrument_node=""> </span></div><span data-dcnode-id="2100" instrument_node="">
