</span><div class="et_pb_text_inner" data-dcnode-id="3384"><p data-dcnode-id="3385"><span data-dcnode-id="3386" instrument_node="">The Executive Branch</span></p></div><span data-dcnode-id="3383" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_1 et_animated et_pb_text_align_center et_pb_bg_layout_light" data-animation-delay="0ms" data-animation-duration="1000ms" data-animation-intensity="4%" data-animation-repeat="" data-animation-speed-curve="ease-in-out" data-animation-starting-opacity="0%" data-animation-style="slideTop" data-dcnode-id="3372"><span data-dcnode-id="3381" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3374"><p data-dcnode-id="3375" style="text-align: left;"><span data-dcnode-id="3379" style="color: #ffffff;"><span data-dcnode-id="3380" instrument_node="">Article 50 </span></span><br data-dcnode-id="3378"><span data-dcnode-id="3376" style="color: #ffffff;"><span data-dcnode-id="3377" instrument_node="">The Executive Power of the Republic shall be vested in the President, who shall be Head of State, Head of Government, and Commander-in-Chief of the Armed Forces of Liberia. The president shall be elected by universal adult suffrage of registered voters in the Republic and shall hold office for six years commencing at noon on the third working Monday in January of the year immediately following the elections. No person shall serve as President for more than two terms.</span></span></p></div><span data-dcnode-id="3373" instrument_node="">
</span></div><span data-dcnode-id="3371" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_3 et_pb_column_1 et_pb_css_mix_blend_mode_passthrough et_pb_column_empty" data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">
</span></div><div class="et_pb_column et_pb_column_1_3 et_pb_column_2 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="3344"><span data-dcnode-id="3367" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_2 et_animated et_pb_text_align_center et_pb_bg_layout_light" data-animation-delay="0ms" data-animation-duration="1000ms" data-animation-intensity="10%" data-animation-repeat="" data-animation-speed-curve="ease-in-out" data-animation-starting-opacity="0%" data-animation-style="slideBottom" data-dcnode-id="3361"><span data-dcnode-id="3366" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3363"><p data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">The Legislature</span></p></div><span data-dcnode-id="3362" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_3 et_animated et_pb_text_align_center et_pb_bg_layout_light" data-animation-delay="0ms" data-animation-duration="1000ms" data-animation-intensity="4%" data-animation-repeat="" data-animation-speed-curve="ease-in-out" data-animation-starting-opacity="0%" data-animation-style="slideTop" data-dcnode-id="3346"><span data-dcnode-id="3360" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3348"><p data-dcnode-id="3351" style="text-align: left;"><span data-dcnode-id="3352" style="color: #ffffff;"><span data-dcnode-id="3359" instrument_node="">Article 29</span><br data-dcnode-id="3358"><span data-dcnode-id="3357" instrument_node="">The legislative power of the Republic shall be vested in the Legislature of Liberia, which shall consist of two separate houses: A Senate and a House of Representatives, both of which must pass on all legislation.</span><br data-dcnode-id="3356"><span data-dcnode-id="3355" instrument_node="">Article 30</span><br data-dcnode-id="3354"><span data-dcnode-id="3353" instrument_node="">Citizens of Liberia who meet the following qualifications are eligible to become members of the Legislature. a. for the Senate, have attained the age of 30 years and for the House of Representatives, have attained the age of 25 years. b. be domiciled in the country or constituency to be represented no less than one year before the election and be a taxpayer.&nbsp;</span></span></p><span data-dcnode-id="3350" instrument_node="">
</span><p data-dcnode-id="3349" style="text-align: left;"></p></div><span data-dcnode-id="3347" instrument_node="">
</span></div><span data-dcnode-id="3345" instrument_node="">
</span></div><span data-dcnode-id="3343" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_1 et_animated et_pb_equal_columns et_pb_gutters1" data-animation-delay="0ms" data-animation-duration="1000ms" data-animation-intensity="50%" data-animation-repeat="" data-animation-speed-curve="ease-in-out" data-animation-starting-opacity="0%" data-animation-style="fade" data-dcnode-id="3316"><span data-dcnode-id="3341" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_3 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="3318"><span data-dcnode-id="3340" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_4 et_animated et_pb_text_align_center et_pb_bg_layout_light" data-animation-delay="0ms" data-animation-duration="1000ms" data-animation-intensity="10%" data-animation-repeat="" data-animation-speed-curve="ease-in-out" data-animation-starting-opacity="0%" data-animation-style="slideBottom" data-dcnode-id="3334"><span data-dcnode-id="3339" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3336"><p data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">The Judicial Branch</span></p></div><span data-dcnode-id="3335" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_5 et_pb_text_align_center et_pb_bg_layout_light" data-dcnode-id="3322"><span data-dcnode-id="3333" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3324"><p data-dcnode-id="3325" style="text-align: left;"><span data-dcnode-id="3326" style="color: #000000;"><span data-dcnode-id="3331" style="color: #ffffff;"><span data-dcnode-id="3332" instrument_node="">Article 65 </span></span><br data-dcnode-id="3330"><span data-dcnode-id="3328" style="color: #ffffff;"><span data-dcnode-id="3329" instrument_node="">The Judicial Power of the Republic shall be vested in a Supreme Court and such subordinate courts as the legislature may from time to time establish. The courts shall apply both statutory and customary laws by the standards enacted by the Legislature. Judgments of the Supreme Court shall be final and binding and shall not be subject to appeal or review by any other branch of Government. Nothing in this Article shall prohibit administrative consideration of the Justiciable matter before a court of competent jurisdiction review.</span></span><br data-dcnode-id="3327"></span></p></div><span data-dcnode-id="3323" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_6 et_animated et_pb_text_align_center et_pb_bg_layout_light" data-animation-delay="0ms" data-animation-duration="1000ms" data-animation-intensity="4%" data-animation-repeat="" data-animation-speed-curve="ease-in-out" data-animation-starting-opacity="0%" data-animation-style="slideTop" data-dcnode-id="3320"><span data-dcnode-id="3321" instrument_node="">
</span></div><span data-dcnode-id="3319" instrument_node="">
</span></div><span data-dcnode-id="3317" instrument_node="">
</span></div><span data-dcnode-id="3315" instrument_node="">
</span></div><div class="et_pb_section et_pb_section_3 et_pb_with_background et_section_regular" data-dcnode-id="2109"><span data-dcnode-id="3313" instrument_node="">
</span><div class="et_pb_row et_pb_row_2" data-dcnode-id="3295"><span data-dcnode-id="3312" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_4 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="3297"><span data-dcnode-id="3311" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_7 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="3305"><span data-dcnode-id="3310" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3307"><h2 data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">Liberia Government at a Glance</span></h2></div><span data-dcnode-id="3306" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_8 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="3299"><span data-dcnode-id="3304" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3301"><p data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">The Constitution of Liberia divides the Government of Liberia into three co-equal branches. They are the executive, legislative and judicial. The executive enforces the legislature’s law, and the judiciary interprets the law through the courts. As co-equal branches of the government, the executive should not have undue influence over the lawmaking branch (the legislative) and the law interpretation organ (the judicial). If this occurs, power will fuse, and the Checks and Balances system will become violated. In other words, for good governance to exist in society, the three branches of the government must constantly check on one another to ensure no one branch of government violates the constitution and the laws of the land with impunity.&nbsp;</span></p></div><span data-dcnode-id="3300" instrument_node="">
</span></div><span data-dcnode-id="3298" instrument_node="">
</span></div><span data-dcnode-id="3296" instrument_node="">
</span></div><div class="et_pb_row et_pb_row_3" data-dcnode-id="2111"><span data-dcnode-id="3294" instrument_node="">
</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_5 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="2113"><span data-dcnode-id="3293" instrument_node="">
</span><div class="et_pb_module et_pb_toggle et_pb_toggle_0 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3252"><span data-dcnode-id="3292" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">The Executive Branch Chapter IV: The Executive</span></h5><span data-dcnode-id="3289" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3254"><h1 class="entry-title main_title" data-dcnode-id="3288"></h1><span data-dcnode-id="3287" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3255"><span data-dcnode-id="3286" instrument_node="">
</span><h4 data-dcnode-id="3285"></h4><span data-dcnode-id="3284" instrument_node="">
</span><h5 data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">Article 50</span></h5><span data-dcnode-id="3281" instrument_node="">
</span><p data-dcnode-id="3278"><em data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">The Executive Power of the Republic shall be vested in the President, who shall be Head of State, Head of Government, and Commander-in-Chief of the Armed Forces of Liberia. The president shall be elected by universal adult suffrage of registered voters in the Republic and shall hold office for six years commencing at noon on the third working Monday in January of the year immediately following the elections. No person shall serve as President for more than two terms.</span></em></p><span data-dcnode-id="3277" instrument_node="">
</span><p data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">In other words, the role of the Executive branch of government is to carry out the law that the Legislative Branch writes. The Constitution says that the President—as the head of this branch—is the head of state and the commander-in-chief of the Armed Forces of Liberia. It also says that the President can appoint or dismiss high-level government officials, such as cabinet ministers, to help implement government policies. However, the Liberian Constitution is clear in saying that the President cannot arbitrarily execute the laws that the legislative branch writes. The president has to follow the Constitution and all the laws of the country.</span></p><span data-dcnode-id="3274" instrument_node="">
</span><p data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">There shall be a Vice-President who shall assist the President in the discharge of his functions. The Vice-President shall be elected on the same political ticket and serve the same term as the President. The Vice-President shall be President of the Senate and preside over its deliberations without the right to vote, except in the case of a tie vote. He shall attend meetings of the cabinet and other governmental meetings. He shall perform such functions as the President shall delegate or deem appropriate, provided that no powers expressly vested in the President by the provisions of this Constitution shall be charged to the Vice-President.</span></p><span data-dcnode-id="3271" instrument_node="">
</span><p data-dcnode-id="3257"><span data-dcnode-id="3270" instrument_node="">Article 54 of the Liberian Constitution says, among other things, that the President shall nominate and, with the consent of the Senate, appoint and commission–</span><br data-dcnode-id="3269"><span data-dcnode-id="3268" instrument_node="">a. cabinet ministers, deputy and assistant cabinet ministers;</span><br data-dcnode-id="3267"><span data-dcnode-id="3266" instrument_node="">b. ambassadors, ministers, consuls; and</span><br data-dcnode-id="3265"><span data-dcnode-id="3264" instrument_node="">c. the Chief Justice and Associate Justice of the Supreme Court and judges of subordinate courts;</span><br data-dcnode-id="3263"><span data-dcnode-id="3262" instrument_node="">d. superintendents, other county officials, and officials of other political subdivisions;</span><br data-dcnode-id="3261"><span data-dcnode-id="3260" instrument_node="">e. members of the military from the rank of lieutenant or its equivalent and above; and</span><br data-dcnode-id="3259"><span data-dcnode-id="3258" instrument_node="">f. marshalls, deputy marshals, and sheriffs.</span></p><span data-dcnode-id="3256" instrument_node="">
</span></div></div><span data-dcnode-id="3253" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_1 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="3212"><span data-dcnode-id="3251" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">Chapter V: The Legislature</span></h5><span data-dcnode-id="3248" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="3214"><h1 class="entry-title main_title" data-dcnode-id="3247"></h1><span data-dcnode-id="3246" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3223"><span data-dcnode-id="3245" instrument_node="">
</span><h1 data-dcnode-id="3244"></h1><span data-dcnode-id="3243" instrument_node="">
</span><h4 data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">Article 29</span></h4><span data-dcnode-id="3240" instrument_node="">
</span><p data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">The legislative power of the Republic shall be vested in the Legislature of Liberia which shall consist of two separate houses: A Senate and a House of Representatives, both of which must pass on all legislation. The enacting style shall be: “It is enacted by the Senate and House of Representatives of the Republic of Liberia in Legislature assembled.</span></p><span data-dcnode-id="3237" instrument_node="">
</span><h4 data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">Article 30</span></h4><span data-dcnode-id="3234" instrument_node="">
</span><p data-dcnode-id="3228"><span data-dcnode-id="3233" instrument_node="">Citizens of Liberia who meet the following qualifications are eligible to become members of the Legislature.</span><br data-dcnode-id="3232"><span data-dcnode-id="3231" instrument_node="">a. for the Senate, have attained the age of 30 years and for the House of Representatives, have attained the age of 25 years;</span><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">b. be domiciled in the country or constituency to be represented not less than one year prior to the time of the election and be a taxpayer.</span></p><span data-dcnode-id="3227" instrument_node="">
</span><p data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">The House of Representatives has 64 members, one from each electoral district in Liberia. Members of the House of Representatives serve in government for six years. The Senate has 30 members, a junior and a senior Senator from each county. All Senators serve for nine years (except in the case of the special elections in 2005 where senior Senators serve 9 years and junior Senators 6 years).</span></p><span data-dcnode-id="3224" instrument_node="">
</span></div><span data-dcnode-id="3222" instrument_node="">
</span><p data-dcnode-id="3220"></p><span data-dcnode-id="3219" instrument_node="">
</span><p data-dcnode-id="3217"></p><span data-dcnode-id="3216" instrument_node="">
</span><h4 data-dcnode-id="3215"></h4></div><span data-dcnode-id="3213" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_2 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2984"><span data-dcnode-id="3211" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">Chapter VII: The Judiciary</span></h5><span data-dcnode-id="3208" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2986"><div class="entry-content" data-dcnode-id="2987"><span data-dcnode-id="3207" instrument_node="">
</span><h4 data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">Article 65</span></h4><span data-dcnode-id="3204" instrument_node="">
</span><p data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">The Judicial Power of the Republic shall be vested in a Supreme Court and such subordinate courts as the legislature may from time to time establish. The courts shall apply both statutory and customary laws in accordance with the standards enacted by the Legislature. Judgements of the Supreme Court shall be final and binding and shall not be subject to appeal or review by any other branch of Government. Nothing in this Article shall prohibit administrative consideration of the Justiciable matter prior to review by a court of competent jurisdiction.</span></p><span data-dcnode-id="3201" instrument_node="">
</span><h4 data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">Article 67</span></h4><span data-dcnode-id="3198" instrument_node="">
</span><p data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">The Supreme Court shall comprise of one Chief Justice and four Associate Justice, a majority of whom shall be deemed competent to transact the business of the Court. It a quorum is not obtained to enable the Court to hear any case, a circuit judge in the order of seniority shall sit as an ad hoc justice of the Supreme Court.</span></p><span data-dcnode-id="3195" instrument_node="">
</span><p data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">Liberia applies both statutory and customary laws. They coexist in Liberia. The legislators enact statutory laws. The customary laws are tribal customs, cultural or traditional practices. Local paramount chiefs, clan chiefs or town chiefs apply customary laws to judge marriage disputes, inheritance and land ownership rights cases, robberies and perfidies to a clan, to name a few examples. Customary laws, however, are practiced under the Ministry of Internal Affairs jurisdiction. These seem to fuse the power structure and checks and balance system between the executive and the judicial branch.</span></p><span data-dcnode-id="3192" instrument_node="">
</span><p data-dcnode-id="3188"><span data-dcnode-id="3191" instrument_node="">There are magistrate courts and 16 Circuit Courts in Liberia. Except for Montserrado county that has the first and sixth Circuit Courts, there is one Circuit Court in each county. There are also specialized courts including Debt Court, Probate Court, Tax Court, Traffic Court, Juvenile Court, and commercial court.</span><br data-dcnode-id="3190"><span data-dcnode-id="3189" instrument_node="">Circuit court is a jury trial court. A jury is a group of people selected according to law and given the power to decide questions of fact and return a verdict in the case submitted to them. A Justice of the Peace Court is a local judicial officer having jurisdiction over minor criminal offenses and minor civil disputes.&nbsp; Magistrate’s court has limited authority over small criminal and civil matters. Juvenile court has jurisdiction over cases involving children under 18 years old.</span></p><span data-dcnode-id="3187" instrument_node="">

</span><div class="et_pb_text_inner" data-dcnode-id="2978"><h1 class="entry-title main_title" data-dcnode-id="2981"><span data-dcnode-id="2982" instrument_node="">Ministries &amp; Agencies</span></h1><span data-dcnode-id="2980" instrument_node="">
</span><p data-dcnode-id="2979" style="text-align: left;"></p></div><span data-dcnode-id="2977" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_3 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2953"><span data-dcnode-id="2975" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">Ministry of Foreign Affairs</span></h5><span data-dcnode-id="2972" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2955"><p data-dcnode-id="2956"><span data-dcnode-id="2971" instrument_node="">Creation: 1848</span><br data-dcnode-id="2970"><span data-dcnode-id="2969" instrument_node="">Name Its current, Ministry of Foreign Affairs came into being in 1972</span><br data-dcnode-id="2968"><span data-dcnode-id="2967" instrument_node="">Former Name: Department of State (DoS). A Secretary of State initially headed the DoS. Hilary Teague, who also drafted the Liberian Declaration of Independence, became Liberia’s first secretary of State in 1848.</span><br data-dcnode-id="2966"><span data-dcnode-id="2965" instrument_node="">Current Function: It implements Liberia’s external policies and relations and manages its diplomatic missions accredited abroad.</span><br data-dcnode-id="2964"><span data-dcnode-id="2963" instrument_node="">Former Function: Same as the new function</span><br data-dcnode-id="2962"><span data-dcnode-id="2961" instrument_node="">Order of Succession: 3. The Minister of Foreign Affairs is the dean of the cabinet and therefore ascends to the presidency after the Speaker of the House of Representatives and the Pro Tempore of the Liberian Senate.</span><br data-dcnode-id="2960"><span data-dcnode-id="2959" instrument_node="">Employees:</span><br data-dcnode-id="2958"><span data-dcnode-id="2957" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2954" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_4 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2932"><span data-dcnode-id="2952" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">Ministry of Finance &amp; Development Planning</span></h5><span data-dcnode-id="2949" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2934"><p data-dcnode-id="2935"><span data-dcnode-id="2948" instrument_node="">Creation: 2014</span><br data-dcnode-id="2947"><span data-dcnode-id="2946" instrument_node="">Name: Ministry of Finance &amp; Development Planning</span><br data-dcnode-id="2945"><span data-dcnode-id="2944" instrument_node="">Former Name: Ministry of Finance</span><br data-dcnode-id="2943"><span data-dcnode-id="2942" instrument_node="">Function: MFDP formulates and administers economic development, fiscal and tax policies for the promotion of sound and efficient management of the financial resources of the Government, helps the revenue program of the Government, including supervision of the collection of the revenues; reports the financial activities and financial position of the Government to the President and the Legislature; maintains the central accounting records of the Government and prescribe for all Government agencies of accounts reporting and documentation necessary to safeguard the assets of the Government. MFDP also formulates fiscal policies for financial planning, disburses Government funds by legislative appropriations, and performs all such services relating to the Government finances imposed by law.</span><br data-dcnode-id="2941"><span data-dcnode-id="2940" instrument_node="">Order of Succession:</span><br data-dcnode-id="2939"><span data-dcnode-id="2938" instrument_node="">Employees:</span><br data-dcnode-id="2937"><span data-dcnode-id="2936" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2933" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_5 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2925"><span data-dcnode-id="2931" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">Ministry of Justice</span></h5><span data-dcnode-id="2928" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2927"></div><span data-dcnode-id="2926" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_6 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2903"><span data-dcnode-id="2924" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">Ministry of National Defense</span></h5><span data-dcnode-id="2921" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2905"><p data-dcnode-id="2913"><span data-dcnode-id="2920" instrument_node="">Creation: 1946</span><br data-dcnode-id="2919"><span data-dcnode-id="2918" instrument_node="">Name:</span><br data-dcnode-id="2917"><span data-dcnode-id="2916" instrument_node="">Former Name:</span><br data-dcnode-id="2915"><span data-dcnode-id="2914" instrument_node="">Function: The Ministry of Defense was established in 1956 by an Act of the National Legislature and charged with providing direction and supervision to the Armed Forces of Liberia. The Minister of National Defense shall have complete authority over the armed forces of Liberia, including all matters relating to their training, operation administration, logistic support and maintenance, development, welfare, preparedness, and effectiveness. The President shall, however, make all military appointments.</span></p><span data-dcnode-id="2912" instrument_node="">
</span><p data-dcnode-id="2906"><span data-dcnode-id="2911" instrument_node="">&nbsp;Order of Succession:</span><br data-dcnode-id="2910"><span data-dcnode-id="2909" instrument_node="">Employees:</span><br data-dcnode-id="2908"><span data-dcnode-id="2907" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2904" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_7 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2882"><span data-dcnode-id="2902" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">Ministry of Internal Affairs</span></h5><span data-dcnode-id="2899" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2884"><p data-dcnode-id="2885"><span data-dcnode-id="2898" instrument_node="">Creation:</span><br data-dcnode-id="2897"><span data-dcnode-id="2896" instrument_node="">Name:</span><br data-dcnode-id="2895"><span data-dcnode-id="2894" instrument_node="">Former Name:</span><br data-dcnode-id="2893"><span data-dcnode-id="2892" instrument_node="">Function: Functions of the Ministry include designing and implementing development projects and transforming rural communities into viable towns and cities. The Ministry also provides supervision and management of tribal affairs and is mandated to support democratic, effective and efficient local governance, including the decentralization process. Moreover, the Ministry of Internal affairs manages tribal affairs and all matters arising out of tribal relationships; coordinates and implements Government services rendered through the units of Local Government; reviews proposed budgets, taxes, projects, and programs offered by local government units, and makes recommendations and takes steps necessary for the implementation of the proposed activities. MoIA also determines the readiness of a county or other team of local government for increased responsibility; oversees the selection, training, and efficient performance Of the administrative personnel of local government; ensures the orderly functioning of tribal government and drafts rules and regulations to effectuate this purpose. The rules and regulations shall include provisions relating to tribal domestic relations, regulating and setting procedures in tribal trials, governing cultural institutions and societies, and stating the schedules of fees to be allowed in tribal courts; Supervising the elections of Paramount, Clan Chief, and Town Chiefs in cooperation with the Elections Commission; reviewing the budget of tribal treasurers and managing tribal authorities in the keeping of proper records; administering the system of tribal courts; and exercising administrative supervision over the Poro, Sande and other tribal societies through the Liaison Officer for Tribal Societies.</span><br data-dcnode-id="2891"><span data-dcnode-id="2890" instrument_node="">Order of Succession:</span><br data-dcnode-id="2889"><span data-dcnode-id="2888" instrument_node="">Employees:</span><br data-dcnode-id="2887"><span data-dcnode-id="2886" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2883" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_8 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2861"><span data-dcnode-id="2881" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">Ministry of Education</span></h5><span data-dcnode-id="2878" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2863"><p data-dcnode-id="2864"><span data-dcnode-id="2877" instrument_node="">Creation:</span><br data-dcnode-id="2876"><span data-dcnode-id="2875" instrument_node="">Name:</span><br data-dcnode-id="2874"><span data-dcnode-id="2873" instrument_node="">Former Name:</span><br data-dcnode-id="2872"><span data-dcnode-id="2871" instrument_node="">Function: It works to eradicate illiteracy among peoples of all ages and all origins, manages public education in Liberia, including full supervision of all public schools and all private schools and institutions of higher learning to the extent provided by law and permitted by their charters; informed the president and the public concerning the condition and operation of all schools and educational institutions, public and private, and of the general state of education in Liberia. MoE plans for, and to the fullest extent possible establishes a modern, sound, nationwide educational system; administers funds appropriated by the Government for financial assistance to individual students for study at home and abroad; and to the extent authorized by the Legislature, MoE shall oversee the establishment of public libraries accessible to the people of all areas of Liberia.</span><br data-dcnode-id="2870"><span data-dcnode-id="2869" instrument_node="">Order of Succession:</span><br data-dcnode-id="2868"><span data-dcnode-id="2867" instrument_node="">Employees:</span><br data-dcnode-id="2866"><span data-dcnode-id="2865" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2862" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_9 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2840"><span data-dcnode-id="2860" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2858"><span data-dcnode-id="2859" instrument_node="">Ministry of State</span></h5><span data-dcnode-id="2857" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2842"><p data-dcnode-id="2843"><span data-dcnode-id="2856" instrument_node="">Creation:</span><br data-dcnode-id="2855"><span data-dcnode-id="2854" instrument_node="">Name:</span><br data-dcnode-id="2853"><span data-dcnode-id="2852" instrument_node="">Former Name:</span><br data-dcnode-id="2851"><span data-dcnode-id="2850" instrument_node="">Function: MSPA follows through and coordinates all decisions of the Chief Executive; organizes, as the President shall direct, Cabinet Meetings and maintains of all records of such meetings; exercises such operational authority, intrinsic to his office, as the President may from time to time direct; and performs such other duties as may be assigned by the President.</span><br data-dcnode-id="2849"><span data-dcnode-id="2848" instrument_node="">Order of Succession:</span><br data-dcnode-id="2847"><span data-dcnode-id="2846" instrument_node="">Employees:</span><br data-dcnode-id="2845"><span data-dcnode-id="2844" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2841" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_10 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2819"><span data-dcnode-id="2839" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">Ministry of Agriculture</span></h5><span data-dcnode-id="2836" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2821"><p data-dcnode-id="2822"><span data-dcnode-id="2835" instrument_node="">Creation: 1972</span><br data-dcnode-id="2834"><span data-dcnode-id="2833" instrument_node="">Name:</span><br data-dcnode-id="2832"><span data-dcnode-id="2831" instrument_node="">Former Name: Department of Agriculture</span><br data-dcnode-id="2830"><span data-dcnode-id="2829" instrument_node="">Function: The 1972 Legislative Act repealed the 1964 law created to create the Ministry of Agriculture. It was called the Department of Agriculture (DOA). The Ministry of Agriculture is charged with achieving self-sufficiency in food production, increasing the country’s ability to earn and conserve foreign exchange, increasing farmers’ income, and bringing them out of subsistence farming. It also has the mandate to develop the agriculture sector and implement an effective organizational structure capable of planning, coordinating, implementing, monitoring, and evaluating agricultural development programs. It also ensures that its staff and the farmers are trained to cope with developing the agriculture sector. Other functions include the dissemination of useful information on agricultural subjects to farmers and the public in general; a collection of data and statistics concerning the condition, prospect, harvesting, and marketing of the principal crops and forest products; overseeing the conservation and judicious use of the soil, the forests, and the fish and wildlife resources of the nation; improvement of the economic well being and general welfare of the farmer; setting the standards for agricultural products; supervision of the extension of credit to farmers by any public agencies created for that purpose; administration of all laws relative to agricultural subjects or rural improvement, including regulatory rules designed to protect the farmer or agricultural means of production or farm commodities.</span><br data-dcnode-id="2828"><span data-dcnode-id="2827" instrument_node="">Order of Succession:</span><br data-dcnode-id="2826"><span data-dcnode-id="2825" instrument_node="">Employees:</span><br data-dcnode-id="2824"><span data-dcnode-id="2823" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2820" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_11 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2798"><span data-dcnode-id="2818" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">Ministry of Health &amp; Social Welfare</span></h5><span data-dcnode-id="2815" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2800"><p data-dcnode-id="2801"><span data-dcnode-id="2814" instrument_node="">Creation: 1972</span><br data-dcnode-id="2813"><span data-dcnode-id="2812" instrument_node="">Name:</span><br data-dcnode-id="2811"><span data-dcnode-id="2810" instrument_node="">Former Name:</span><br data-dcnode-id="2809"><span data-dcnode-id="2808" instrument_node="">Function: The Ministry formulates, implements and monitors and evaluates health policies and standards; Prevents the spread of communicable, infectious, and preventable diseases within the Republic; Provides medical care and treatment through public hospitals, clinics, mental institutions and rehabilitation centers for alcoholics and narcotic addicts; issues licenses and supervises medical practitioners and facilities; promotes and conduct of research in the prevention and – treatment of human diseases and the collects and compiles pertinent statistical data; oversee the collection of data relating to births, deaths, and burials; supervises and regulate the sanitary aspects of hotels, boarding houses, public eating and drinking establishments, bathing establishments, and other businesses and activities affecting public health; supervises the distribution of all relief and welfare funds granted by the Government to the needy and underprivileged; To the extent provided by law, oversees the care of juvenile delinquencies and homeless children in foster homes, hostels, and vocational institutions; promotes research, experiments, investigation and studies in the development of scientific methods for the diagnosis and prevention of social problems; offers assistance in the management of charitable organizations established within the Republic to provide maximum benefit to the public. It also performs such other functions as may from time to time be assigned by the President.</span><br data-dcnode-id="2807"><span data-dcnode-id="2806" instrument_node="">Order of Succession:</span><br data-dcnode-id="2805"><span data-dcnode-id="2804" instrument_node="">Employees:</span><br data-dcnode-id="2803"><span data-dcnode-id="2802" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2799" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_12 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2777"><span data-dcnode-id="2797" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">Ministry of Commerce &amp; Industry</span></h5><span data-dcnode-id="2794" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2779"><p data-dcnode-id="2780"><span data-dcnode-id="2793" instrument_node="">Creation: 1987</span><br data-dcnode-id="2792"><span data-dcnode-id="2791" instrument_node="">Name:</span><br data-dcnode-id="2790"><span data-dcnode-id="2789" instrument_node="">Former Name:</span><br data-dcnode-id="2788"><span data-dcnode-id="2787" instrument_node="">Function: Formulates and implements policies and strategies aimed at promoting investment, commerce, small business development, consumer protection, and fair trading in the domestic market; establishes and regulates commodity and trade standards; collects, evaluates, and publishes data about commerce and industry; shows and enforces rules of business practices; promotes the sound development of foreign and domestic trade; develops plans for the movements of goods and people within and without the Republic; conducts the registration of business enterprises, and performs such other duties as may be assigned from time to time by the President.</span><br data-dcnode-id="2786"><span data-dcnode-id="2785" instrument_node="">Order of Succession:</span><br data-dcnode-id="2784"><span data-dcnode-id="2783" instrument_node="">Employees:</span><br data-dcnode-id="2782"><span data-dcnode-id="2781" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2778" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_13 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2756"><span data-dcnode-id="2776" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Ministry of Lands Mines &amp; Energy</span></h5><span data-dcnode-id="2773" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2758"><p data-dcnode-id="2759"><span data-dcnode-id="2772" instrument_node="">Creation: 1972</span><br data-dcnode-id="2771"><span data-dcnode-id="2770" instrument_node="">Name:</span><br data-dcnode-id="2769"><span data-dcnode-id="2768" instrument_node="">Former Name:</span><br data-dcnode-id="2767"><span data-dcnode-id="2766" instrument_node="">Function: Ensures the management of lands, mines, and energy resources for the socio-economic development and equitable growth of Liberia; under applicable regulations, reviews, and in the proper cases grants or denies, applications for prospecting, exploration, and mining rights except for concessions; collects and distributes information about the mineral and water resources of the nation; conducts research and investigation in geology and related fields for new sources of supply and evolution of mineral resources and prepare topographic and geologic maps; promotes safety in mineral industries, investigates problems of mining and the preparation and utilization of minerals; and control the use of mineral resources according to approved; approves or denies applications for permission to prospect, mines, purchases, sales, imports, exports or otherwise deals in diamonds by the provisions of Chapter 6-A of the Natural Resources Law; With the approval of the President, request the participation of experts in any matter which may be deemed necessary or appropriate for the more efficient solution of things submitted to the Ministry; suspends operations of mining concessionaires for violations of the Mining Law or regulations issued thereunder and to impose fines on such concessionaires; authorizes the abandonment of a claim or concession at the request of the concessionaire, or to order cancellation on a ground stated in section 176 of the Natural Resources Law; proposes to the President the tariffs relating to mineral substances, except diamonds; and performs such other functions as may from time to time be assigned by the President; coordinates the exploration, exploitation and production of hydrocarbon activities in Liberia; supervises, organizes and conduct research in developing conventional alternatives, new or renewable energy sources. The Ministry also promulgates all regulations affecting lands, mines and energy in Liberia; monitors compliance with, as well as enforce, all laws and regulations affecting lands, mines and energy; formulates, in conjunction with relevant ministries and agencies, and in accordance with prevailing conditions and national requirements, a comprehensive national energy policy for submission to the Government of Liberia.</span><br data-dcnode-id="2765"><span data-dcnode-id="2764" instrument_node="">Order of Succession:</span><br data-dcnode-id="2763"><span data-dcnode-id="2762" instrument_node="">Employees:</span><br data-dcnode-id="2761"><span data-dcnode-id="2760" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2757" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_14 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2735"><span data-dcnode-id="2755" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">Ministry of Posts and Telecommunications</span></h5><span data-dcnode-id="2752" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2737"><p data-dcnode-id="2738"><span data-dcnode-id="2751" instrument_node="">Creation: 1978</span><br data-dcnode-id="2750"><span data-dcnode-id="2749" instrument_node="">Name:</span><br data-dcnode-id="2748"><span data-dcnode-id="2747" instrument_node="">Former Name:</span><br data-dcnode-id="2746"><span data-dcnode-id="2745" instrument_node="">Function: The Ministry was created by an Act of the National Legislature in September 1978 to administers postal and telecommunications services throughout Liberia and provides administrative guidelines for postal and telecommunication facilities that operate in the country. The Ministry is mandated by law to ensure the unhindered movement of mail and formulate appropriate policies which will access affordable information communications technology (IT) across the length and breadth of Liberia, ascertains and states in the annual report to the Legislature the revenues derived from and the cost of carrying and handling the several classes of mail matter and performing special services; and issues appropriate stamps in such denominations, form and design, and at such times as he deems necessary for use in payment of postage or fees for special services. MoPT also maintains and improves the postal service system of the Republic of Liberia.</span><br data-dcnode-id="2744"><span data-dcnode-id="2743" instrument_node="">Order of Succession:</span><br data-dcnode-id="2742"><span data-dcnode-id="2741" instrument_node="">Employees:</span><br data-dcnode-id="2740"><span data-dcnode-id="2739" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2736" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_15 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2714"><span data-dcnode-id="2734" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Ministry of Public Works</span></h5><span data-dcnode-id="2731" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2716"><p data-dcnode-id="2717"><span data-dcnode-id="2730" instrument_node="">Creation: 1928</span><br data-dcnode-id="2729"><span data-dcnode-id="2728" instrument_node="">Name:</span><br data-dcnode-id="2727"><span data-dcnode-id="2726" instrument_node="">Former Name:</span><br data-dcnode-id="2725"><span data-dcnode-id="2724" instrument_node="">Function: The National Legislature created the Ministry of Public Works (MPW in 1928. In 2008 by an Act of Legislature, National Legislature dissolved the Ministry of Rural Development and urban reconstruction and merged into the Ministry of Public Works. The Ministry performs the following responsibilities: drafting and designing constructions, planning and constructing public infrastructures; supervising construction contracts implementation, maintaining roads, bridges, and public buildings; enforces constriction standards for non-governmental buildings; Administer the law about the issuance of licenses to electricians, plumbers and any other persons who are required by law to obtain permits from this Ministry to carry on their occupations, among others</span><br data-dcnode-id="2723"><span data-dcnode-id="2722" instrument_node="">Order of Succession:</span><br data-dcnode-id="2721"><span data-dcnode-id="2720" instrument_node="">Employees:</span><br data-dcnode-id="2719"><span data-dcnode-id="2718" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2715" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_16 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2693"><span data-dcnode-id="2713" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">Ministry of Labor</span></h5><span data-dcnode-id="2710" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2695"><p data-dcnode-id="2696"><span data-dcnode-id="2709" instrument_node="">Creation: 1981</span><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node="">Name:</span><br data-dcnode-id="2706"><span data-dcnode-id="2705" instrument_node="">Former Name:</span><br data-dcnode-id="2704"><span data-dcnode-id="2703" instrument_node="">Function: The Ministry regulates and promotes industrial relations between employees and employers, provides employment services, enhances private sector productivity. The Ministry provides for the classification, registration of tradespeople and artisans and promotes the rights of employees and management. It also creates a conducive working environment within the industrial sectors.</span><br data-dcnode-id="2702"><span data-dcnode-id="2701" instrument_node="">Order of Succession:</span><br data-dcnode-id="2700"><span data-dcnode-id="2699" instrument_node="">Employees:</span><br data-dcnode-id="2698"><span data-dcnode-id="2697" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2694" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_17 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2672"><span data-dcnode-id="2692" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">Ministry of Transport</span></h5><span data-dcnode-id="2689" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2674"><p data-dcnode-id="2675"><span data-dcnode-id="2688" instrument_node="">Creation: 1987</span><br data-dcnode-id="2687"><span data-dcnode-id="2686" instrument_node="">Name:</span><br data-dcnode-id="2685"><span data-dcnode-id="2684" instrument_node="">Former Name:</span><br data-dcnode-id="2683"><span data-dcnode-id="2682" instrument_node="">Function: Implements transport law, insurance law, and maritime law, and to plan and execute policies relating modes of land, rail, sea, and air transport services. It exercises power to relating to marine administration; administers and implements the Transportation Law, the Insurance Law, and the Maritime Law, and to plan and execute policies relating to all modes of land, rail, sea and air transport; services within the Republic of Liberia and abroad; represents the Government’s interest in all negotiations in connection with Government participation in shipping and to serve the Government’s interest in international shipping and maritime conferences; collects, collates, evaluates and periodically publish such data relating to land, rail, sea and air transport services as well as insurance, as well as the maintenance of meteorological services; establishes rules and procedures and enforce standards for transport services of private and public common carriers of whatever nature and, in general, to develop, regulate, control and monitor vehicles, boats, ships, fishing vessels, railroads, aviation, ferries, canoes, rural and urban mass transit, and the inspection and safety of highways, the seas, railroads and civil aviation. The Ministry also establishes and implements the overall transportation policy of the Republic and develop plans for the movements of goods and people within and without the Republic; regulates the use of inland waterways and rivers, ships flying the Liberian flag in domestic and foreign commerce, as well as all modes of watercraft for civil transport and regulates the use of ports and harbors, local airports and vehicle parking lots as they affect shipping, civil aviation, and motor and rail transport.</span><br data-dcnode-id="2681"><span data-dcnode-id="2680" instrument_node="">Order of Succession:</span><br data-dcnode-id="2679"><span data-dcnode-id="2678" instrument_node="">Employees:</span><br data-dcnode-id="2677"><span data-dcnode-id="2676" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2673" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_18 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2651"><span data-dcnode-id="2671" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">Ministry of Gender, Children and Social Protection</span></h5><span data-dcnode-id="2668" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2653"><p data-dcnode-id="2654"><span data-dcnode-id="2667" instrument_node="">Creation: 2001</span><br data-dcnode-id="2666"><span data-dcnode-id="2665" instrument_node="">Name:</span><br data-dcnode-id="2664"><span data-dcnode-id="2663" instrument_node="">Former Name:</span><br data-dcnode-id="2662"><span data-dcnode-id="2661" instrument_node="">Function: The Mandate of the Ministry is promoting the development, empowerment, and protection of women, girls, and children, as well as the welfare and integration of persons with disabilities, the vulnerable, extremely poor, excluded, and disadvantaged. Significantly, the Ministry will initiate, develop and implement and coordinate policies and programs aimed at women, girls, and children, as well as those physically challenged, marginalized, disadvantaged, and excluded, to ensure that their rights are protected and integrated and beneficial. The Ministry advises the government on matters that impact the development and welfare of women and children. The Ministry is mandated to advise the Government on all issues affecting the development and welfare of women and children and any other matters referred to it.</span><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">Order of Succession:</span><br data-dcnode-id="2658"><span data-dcnode-id="2657" instrument_node="">Employees:</span><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2652" instrument_node="">
</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_19 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2621"><span data-dcnode-id="2650" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">Ministry of Information, Culture, &amp; Tourism</span></h5><span data-dcnode-id="2647" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2623"><p data-dcnode-id="2639"><span data-dcnode-id="2646" instrument_node="">Creation:</span><br data-dcnode-id="2645"><span data-dcnode-id="2644" instrument_node="">Name:</span><br data-dcnode-id="2643"><span data-dcnode-id="2642" instrument_node="">Former Name:</span><br data-dcnode-id="2641"><span data-dcnode-id="2640" instrument_node="">Function:</span></p><span data-dcnode-id="2638" instrument_node="">
</span><p data-dcnode-id="2634"><span data-dcnode-id="2637" instrument_node="">It develops and disseminates information about the government both at home and abroad, promoting culture and tourism via media and institutions such as the National Museum, the custodian of Historical Artifacts, and cultural villages and historic Providence Island.</span><br data-dcnode-id="2636"><span data-dcnode-id="2635" instrument_node="">Maintain close contacts with all Ministries and agencies of Government, and all national and private institutions and organizations for the purpose of gaining information and keeping the public informed of federal programs, projects and developments; counter unfavorable propaganda by disseminating a wide range of informative material that presents an accurate picture of Liberia’s national image, its aims and aspirations, policies, programs, institutions and progress to a worldwide audience; maintains contacts with Liberian diplomatic and consular missions abroad; organize regional information centers in Liberia, and plan, promote, coordinate, supervise and direct information programs and projects for these missions centers in pursuance of Liberia’s national and international objectives; organizes, fosters and encourages a tourist industry for which purpose he shall inquire into, collect and publicize all information about historical sites, landmarks, and places of natural scenic beauties, wherever found throughout the country, to be developed as tourist attractions; provides efficient administration, direction and coordination for the activities of the National Tourism Board and the National Picture and Television Review and issue regulations governing the establishment and operation of all cinema houses in Liberia; organizes, supervises and encourages the mass production, improvement and popularization of Liberia’s indigenous arts and handicrafts; establish, operate and maintain a National Cultural Center and an Ethnographic Museum; and plan and execute programs for the preservation of the folklore, mores and indigenous culture of the nation.</span></p><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2630" instrument_node="">

</span></div><div class="et_pb_module et_pb_toggle et_pb_toggle_20 et_pb_toggle_item et_pb_toggle_close" data-dcnode-id="2596"><span data-dcnode-id="2620" instrument_node="">
</span><h5 class="et_pb_toggle_title" data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">Ministry of Youth &amp; Sports</span></h5><span data-dcnode-id="2617" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2598"><p data-dcnode-id="2609"><span data-dcnode-id="2616" instrument_node="">Creation:</span><br data-dcnode-id="2615"><span data-dcnode-id="2614" instrument_node="">Name:</span><br data-dcnode-id="2613"><span data-dcnode-id="2612" instrument_node="">Former Name:</span><br data-dcnode-id="2611"><span data-dcnode-id="2610" instrument_node="">Function: The functions of the Ministry shall include the direction of the affairs of youths of the nation to enable them to most effectively discharge their responsibilities as valuable citizens of the Republic and promote, control, and direct all programs and activities relating to Sports. To the achievement of these objectives, it shall: Develop the social and national consciousness of Liberian youths, male and female, and educate them to be ready morally and physically to answer the call of their country; Initiate and develop plans and provide means and facilities to enable the youths of Liberia to perform public service to fulfill current needs; Work with, and coordinate youth activities in all Liberian youth organizations in the interest of national consciousness; Establish, maintain, and supervise the activities of the Liberian National Youth Organization according to the following aims: Training aimed at raising civic awareness and increasing personal initiative; Education aimed at training for constructive work; Training to aid the unification process of the nation; Training to inculcate loyalty to the country; Training to promote social and economic development and to raise the standard of living; Education to aid in professional training for youth; Training to develop a sense of responsibility and duty; and Training to improve physical fitness. Subject to the approval of the President, promulgate rules and regulations governing all sports and sports events; Administer all laws relating to the licensing of sports organizations; Certify the qualification of all referees and umpires for public sports events; Manage and control stadiums and playgrounds; Issue and sell tickets for sports events; Regulate the payment of a fair share of the gate receipts to the members of a team or individual contestant in a professional athletic match or sports event; Provide and supervise all youth apprenticeship and vocational training in agriculture, business, industry, and sports in the Republic; and Perform such other functions as may from time to time be assigned by the President.</span></p><span data-dcnode-id="2608" instrument_node="">

</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">The Corporation is empowered to construct, install, establish, operate, manage and supply to all parts of Liberia safe drinking water and perform all sewerage services, as well as to maintain such water and sewerage facilities; To engage in the management, development, construction, installation, manufacture, operation, transmission, distribution, sale and supply to all areas of water and sewage services and of equipment and facilities related to it.</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">To establish and maintain water and sewer facilities, offices and agencies within and everywhere inside Liberia; and to exercise any or all of its corporate powers and rights in Liberia and in any foreign or countries, if need be; determines fair and reasonable rates, fees, and charges which shall be charged in connection with the provision of water and sewage services; manufactures, import, buy, sell, install, collect, generally deal in water and sewage services and to manufacture, buy, sell and trade in all materials used in connection with the aforesaid services; applies for, purchase, or by other means, acquire, hold, sell, assign, lease, mortgage, or otherwise dispose of and protect, and prolong and renew whether in the Republic of Liberia or elsewhere any patents, patent rights, licenses, protections, concessions, trade marks and trade names and to use and turn account and to manufacture under grant of license and to experiment upon and test and improve or seek to improve any patents, inventions, or rights which the corporation may acquire or propose to acquire.</span></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">The Corporation also acquires, builds, operates, and disposes of all necessary, convenient lands, buildings, structures, machinery, reservoirs, water towers, and all other things and devices incidental to the purposes of the corporation; engages in and conduct studies and experiments to improve the suitability of water and sewer facilities and implements to local conditions; borrows or raises money for any purpose of the corporation, and acquire and dispense with same upon such terms and conditions, and or such considerations as the Board of the corporation shall determine to be reasonable through purchase, exchange, discount, rediscount, public or private sale, negotiation, assignment, the exercise of option or conversion of rights or otherwise, for cash or credit, with or without tangibles or intangibles, including but not limited to, mortgage, bonds, debentures.</span></p><span data-dcnode-id="2574" instrument_node="">

</span><h5 class="et_pb_toggle_title" data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">Liberia Electricity Corporation</span></h5><span data-dcnode-id="2558" instrument_node="">
</span><div class="et_pb_toggle_content clearfix" data-dcnode-id="2542"><p data-dcnode-id="2548"><span data-dcnode-id="2557" instrument_node="">Creation: 1973</span><br data-dcnode-id="2556"><span data-dcnode-id="2555" instrument_node="">Name:</span><br data-dcnode-id="2554"><span data-dcnode-id="2553" instrument_node="">Former Name:</span><br data-dcnode-id="2552"><span data-dcnode-id="2551" instrument_node="">Function: To increase reliable access to affordable electricity throughout the country in the quickest, most prudent, and sustainable manner possible. The Liberia Electricity Corporation, LEC is a public utility entity created in 1973 by the Government of the Republic of Liberia through an act of Legislature with a mandate to ensure that efficient, reliable. Affordable electric power is available to meet the increasing demand for electric energy in Liberia and serve as a catalyst for socio-economic development.</span><br data-dcnode-id="2550"><span data-dcnode-id="2549" instrument_node="">The Civil War destroyed the remainder of Liberia’s electricity infrastructure. Efforts have been underway since 2006 to restore the Monrovia grid, expand the mini-grid, and expand stand-alone power systems in the interior.</span></p><span data-dcnode-id="2547" instrument_node="">
</span><p data-dcnode-id="2543"><span data-dcnode-id="2546" instrument_node="">Employees:</span><br data-dcnode-id="2545"><span data-dcnode-id="2544" instrument_node="">Outlays:</span></p></div><span data-dcnode-id="2541" instrument_node="">
