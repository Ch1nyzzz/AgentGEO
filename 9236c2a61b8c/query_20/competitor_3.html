</span><h1 class="page-title__topic" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">      The Three Branches of Georgia’s State Government
  </span></h1><span data-dcnode-id="478" instrument_node="">
</span></div><span data-dcnode-id="476" instrument_node="">
</span><div class="body-content body-content--offset" data-dcnode-id="341"><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">The framers of the U.S. Constitution had a shared goal: create a government with a set system of checks and balances. This way, no single political party, office, individual, or group could hold all the power at the federal, state, or local level. To ensure this balance, they created three separate branches of government:</span></p><span data-dcnode-id="472" instrument_node="">
</span><ul data-dcnode-id="462"><li data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Legislative – Creates laws</span></li><span data-dcnode-id="469" instrument_node="">
</span><li data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Executive – Implements and enforces laws</span></li><span data-dcnode-id="466" instrument_node="">
</span><li data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Judicial – Assesses and interprets laws</span></li><span data-dcnode-id="463" instrument_node="">
</span></ul><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">These three branches exist at every level of our country’s government — federal, state and local. Here’s a quick overview of how it works in Georgia’s state government.</span></p><span data-dcnode-id="459" instrument_node="">
</span><h2 data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Legislative</span></h2><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="455" instrument_node="">The </span><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.georgiaencyclopedia.org/articles/government-politics/georgia-general-assembly%23The-Assembly-in-Operation"><span data-dcnode-id="454" instrument_node="">Georgia General Assembly</span></a><span data-dcnode-id="452" instrument_node=""> is made up of the </span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legis.ga.gov/senate"><span data-dcnode-id="451" instrument_node="">Georgia Senate</span></a><span data-dcnode-id="449" instrument_node=""> and the </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.legis.ga.gov/house"><span data-dcnode-id="448" instrument_node="">Georgia House of Representatives</span></a><span data-dcnode-id="446" instrument_node="">. It is in charge of creating, debating and determining the laws that guide our state. The Georgia General Assembly also has the power to:</span></p><span data-dcnode-id="444" instrument_node="">
</span><ul data-dcnode-id="434"><li data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Determine the state’s operating budget.</span></li><span data-dcnode-id="441" instrument_node="">
</span><li data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">Consider proposed amendments to the Georgia Constitution. If both chambers pass&nbsp; a proposal with two-thirds of members giving it a “yea” (yes) vote, the question will be put to Georgia voters in an upcoming election.</span></li><span data-dcnode-id="438" instrument_node="">
</span><li data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Establish legislative districts. Every 10 years, the General Assembly uses population data from the U.S. Census to draw district boundaries for the state House, state Senate, and U.S. House.</span></li><span data-dcnode-id="435" instrument_node="">
</span></ul><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">At the local level, legislative decisions are handled by your city council, county board of commissioners, board of supervisors, and board of trustees.</span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="430" instrument_node="">To learn more about the Legislative Branch, read Article 3 of the </span><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sos.ga.gov/admin/files/Constitution_2013_Final_Printed.pdf"><span data-dcnode-id="429" instrument_node="">State of Georgia Constitution</span></a><span data-dcnode-id="427" instrument_node="">.</span></p><span data-dcnode-id="425" instrument_node="">
</span><h2 data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Executive</span></h2><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="421" instrument_node="">Georgia’s main executive official and head of state is the </span><a data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gov.georgia.gov/"><span data-dcnode-id="420" instrument_node="">governor</span></a><span data-dcnode-id="418" instrument_node="">. Elected to a 4-year term by Georgia voters, the governor isn’t allowed to hold office more than 2 consecutive terms. Along with overseeing the state budget and leading an executive branch of more than 100,000 employees, the governor is in charge of:</span></p><span data-dcnode-id="416" instrument_node="">
</span><ul data-dcnode-id="397"><li data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Enforcing laws and maintaining peace</span></li><span data-dcnode-id="413" instrument_node="">
</span><li data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Leading our state’s National Guard and police forces as commander in chief</span></li><span data-dcnode-id="410" instrument_node="">
</span><li data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Vetoing, approving, or taking no action on legislation passed by the Georgia General Assembly</span></li><span data-dcnode-id="407" instrument_node="">
</span><li data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Filling unexpected vacancies in the Senate, House of Representatives, and other public offices</span></li><span data-dcnode-id="404" instrument_node="">
</span><li data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Convening special sessions of the Georgia Assembly</span></li><span data-dcnode-id="401" instrument_node="">
</span><li data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Nominating officials to positions in state government (these must be approved by the Georgia General Assembly)</span></li><span data-dcnode-id="398" instrument_node="">
</span></ul><p data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">The other elected members of the executive branch include:&nbsp;</span></p><span data-dcnode-id="394" instrument_node="">
</span><ul data-dcnode-id="378"><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Lieutenant governor&nbsp;</span></li><span data-dcnode-id="391" instrument_node="">
</span><li data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Secretary of state&nbsp;</span></li><span data-dcnode-id="388" instrument_node="">
</span><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Attorney general</span></li><span data-dcnode-id="385" instrument_node="">
</span><li data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">State school superintendent</span></li><span data-dcnode-id="382" instrument_node="">
</span><li data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">The commissioners of agriculture, insurance, and labor</span></li><span data-dcnode-id="379" instrument_node="">
</span></ul><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">This is only an overview of the different roles and services managed by the executive branch, which also includes various agencies, boards, and commissions.</span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="374" instrument_node="">To learn more about the Executive Branch, read Article 5 of the </span><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sos.ga.gov/admin/files/Constitution_2013_Final_Printed.pdf"><span data-dcnode-id="373" instrument_node="">State of Georgia Constitution</span></a><span data-dcnode-id="371" instrument_node="">.</span></p><span data-dcnode-id="369" instrument_node="">
</span><h2 data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Judicial</span></h2><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="365" instrument_node="">Georgia’s judicial branch interprets our state laws and administers justice through our legal system. Our judicial system has two appellate-level courts: the </span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gasupreme.us/"><span data-dcnode-id="364" instrument_node="">Supreme Court of Georgia</span></a><span data-dcnode-id="362" instrument_node=""> and the </span><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gaappeals.us/"><span data-dcnode-id="361" instrument_node="">Court of Appeals of Georgia</span></a><span data-dcnode-id="359" instrument_node="">. It also has five classes of trial-level courts: the superior, state, probate, juvenile, and magistrate courts.</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="356" instrument_node="">Georgia’s Judicial System is overseen by the </span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jcaoc.georgiacourts.gov/"><span data-dcnode-id="355" instrument_node="">Judicial Council</span></a><span data-dcnode-id="353" instrument_node="">. Its job is to develop policies for administering and improving our state courts. The Council is staffed by the </span><a data-dcnode-id="351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//georgiacourts.gov/"><span data-dcnode-id="352" instrument_node="">Administrative Office of the Courts (AOC)</span></a><span data-dcnode-id="350" instrument_node=""> and is led by the chief justice (chairperson) and the presiding justice (vice chairperson) of our state’s Supreme Court.&nbsp;</span></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="347" instrument_node="">To learn more about the Executive Branch, read Article 6 of the </span><a data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sos.ga.gov/admin/files/Constitution_2013_Final_Printed.pdf"><span data-dcnode-id="346" instrument_node="">State of Georgia Constitution</span></a><span data-dcnode-id="344" instrument_node="">.</span></p><span data-dcnode-id="342" instrument_node="">
</span></div><span data-dcnode-id="340" instrument_node="">
