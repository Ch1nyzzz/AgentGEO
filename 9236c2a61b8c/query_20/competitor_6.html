</span><h2 data-dcnode-id="4156" id="section---WhatDoTheFieldsOfPhilosophyStudy"><span data-dcnode-id="4157" instrument_node="">What Do the Fields of Philosophy Study?</span></h2><p data-dcnode-id="4151"><span data-dcnode-id="4155" instrument_node="">It is no exaggeration to say that philosophy applies to everything as we know it. Philosophy is organized into separate branches; we will survey each unit in this lesson. Although philosophy deals with various concepts, let's begin by defining philosophy and its importance. Merriam-Webster defines philosophy as "a set of ideas about knowledge, truth, the nature and meaning of life." The origin of the word Philosophy comes from two Latin words - Philo, meaning "love," and Sophia, "wisdom." Consider the question that children often ask: </span><i data-dcnode-id="4153"><span data-dcnode-id="4154" instrument_node="">why?</span></i><span data-dcnode-id="4152" instrument_node=""> This inherent love of wisdom, a need to understand, extends to everything in life. It is why philosophy addresses a litany of topics and concepts organized under the branches of philosophy. </span></p><p data-dcnode-id="4148"><br clear="all" data-dcnode-id="4150"><span data-dcnode-id="4149" instrument_node=""> </span></p><p data-dcnode-id="4147"></p><span data-dcnode-id="4146" instrument_node="">

</span><h2 data-dcnode-id="3460" id="section---WhatAreTheBranchesOfPhilosophy"><span data-dcnode-id="3461" instrument_node="">What Are the Branches of Philosophy?</span></h2><p data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">Even though some branches of philosophy break down slightly differently, the major components are universally recognized. Philosophy covers a wide and ever-evolving range of topics to address our ever-changing world. Naturally, there is some fluidity in categorizing philosophical branches and the subcategories of these branches. In general, the components of philosophy break down into these five branches. We will discuss each in this lesson: </span></p><ul data-dcnode-id="3441"><span data-dcnode-id="3457" instrument_node="">
</span><li data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">Epistemology </span></li><span data-dcnode-id="3454" instrument_node="">
</span><li data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">Metaphysics </span></li><span data-dcnode-id="3451" instrument_node="">
</span><li data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">Logic </span></li><span data-dcnode-id="3448" instrument_node="">
</span><li data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">Axiology (Aesthetics &amp; Ethics) </span></li><span data-dcnode-id="3445" instrument_node="">
</span><li data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">Political Philosophy </span></li><span data-dcnode-id="3442" instrument_node="">
</span></ul><p data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">It should be stated that these branches tend to be applied or thought of in combination when discussing philosophy. In other words, philosophers are not necessarily exclusive to any single component of philosophical thinking. Philosophical critical thinking often involves thoughts and concepts across several philosophical branches. Finally, the units of philosophy are not ranked in any particular order, so there is no hierarchy or status when surveying the components. </span></p><h3 data-dcnode-id="3437" id="section---Epistemology"><span data-dcnode-id="3438" instrument_node="">Epistemology</span></h3><p data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">Epistemology addresses philosophical questions about knowledge; it is the study of and seeks to answer how we gain knowledge and establish concepts like truth. For instance, can we ever know anything, or is knowledge relative? Is truth subjective or objective? Do we decide what is true or is the truth, regardless of whether we accept it or not? Epistemology examines whether we are born knowing certain things or are we a blank slate, a "tabula rasa," according to the philosopher John Locke, and progressively gain knowledge. Another critical problem in epistemology is knowledge related to perception, specifically optics. Can we trust what we see, take it as truth, and gain understanding from it? </span></p><h3 data-dcnode-id="3433" id="section---Metaphysics"><span data-dcnode-id="3434" instrument_node="">Metaphysics</span></h3><p data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">Metaphysics addresses philosophical questions about being and reality; it examines who we are and our place in existence. Metaphysics seeks to answer questions about a material world. For example, is there an afterlife, and do we exist beyond our physical forms? A fundamental question of concern in metaphysics is the concept of the soul. Therefore, questions about the existence of God, or a higher being, and how that shapes our soul into a purposeful reality come under metaphysics. Special topics in metaphysics also include human nature, identity, and the meaning of life. </span></p><h3 data-dcnode-id="3429" id="section---Logic"><span data-dcnode-id="3430" instrument_node="">Logic</span></h3><p data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">Logic addresses philosophical questions about reason and argumentation; it attempts to formulate systems for making reasoned arguments that can create and check views. Precisely formal logic tries to universalize how we form beliefs and check those arguments for validity and truth. Sound reasoning and argumentation versus fallacy or faulty logic are also points of emphasis within the philosophical branch of logic. Fallacies are arguments or conclusions premised on flawed logic or problematic reasoning. For example, making conclusions based on stereotypes or generalizations would be fallacious thinking since we cannot logically conclude that the actions or behaviors of a few are those of an entire group. Therefore, logic analyzes how we construct reasoning arguments and draw fallacy-free conclusions. </span></p><h3 data-dcnode-id="3425" id="section---Aesthetics"><span data-dcnode-id="3426" instrument_node="">Aesthetics</span></h3><p data-dcnode-id="3423"><span data-dcnode-id="3424" instrument_node="">Aesthetics is one component of Axiology; it addresses philosophical questions about beauty and art. Aesthetics investigates how we define beauty or taste, appreciate art, and recognize connections between forms found in nature and mathematics to artistic expressions across the arts. Aesthetics examines valuations about what is good, as exemplified by definitions of beauty. Furthermore, how do we define art, its purpose, and who makes those decisions? Is art subjective or objective? In other words, is art what each individual says is art, or is art what meets specific criteria and, thereby, becomes art? Other notable topics in aesthetics are composition in the arts and cultural ideas about physical attractiveness and fashion. </span></p><h3 data-dcnode-id="3421" id="section---Ethics"><span data-dcnode-id="3422" instrument_node="">Ethics</span></h3><p data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">Ethics is the second component of Axiology. It addresses philosophical questions about right and wrong, morality, and valuations of ethical standards by individuals or cultures. Ethics examines moral justifications for actions or inactions and how we come to understand and advocate what is right and wrong. In addition, ethics includes concepts relating to justice, more specifically, how we define justice and administer justice fairly. Fundamental problems discussed in ethics are consequential versus non-consequential theories of ethics. For example, should we justify actions based on the result or consequence, or are actions justified based on rules or standards no matter the result or non-consequence. In other words, are right and wrong circumstantial and situationally dependent? Ethics further breaks down into particular disciplines based on professions like business and medical ethics. Bioethics is a very specialized subset of ethics. It addressed the challenges of what being human is and the right and wrong of altering our humanness and controlling life and death. </span></p><span data-dcnode-id="3418" instrument_node="">
</span><div class="hidden" data-dcnode-id="3327" ng-non-bindable=""><h3 data-dcnode-id="3416" id="section---PoliticalPhilosophy"><span data-dcnode-id="3417" instrument_node="">Political Philosophy</span></h3><p data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">Political philosophy addresses philosophical questions about the state, laws, for those governing, and those governed. It examines justifications for a state's authority, our recognition of that authority, and the operation of functioning societies governed by law both nationally and internationally. Further, political philosophy includes discussions about war theories that seek to justify war declarations and ideas about pacifism, civil disobedience, Marxism, and anarchism. Some challenges within political philosophy discussion are what form of government is best, what form of economic system is best, and what laws are necessary and justified. Other topics and interests in political philosophy examine civic responsibility, social contracts, and representative democracy. </span></p><h2 data-dcnode-id="3412" id="section---ExamplesOfTheMainBranchesOfPhilosophy"><span data-dcnode-id="3413" instrument_node="">Examples of the Main Branches of Philosophy</span></h2><p data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">A fundamental principle in philosophy is doing philosophy, so practical applications of philosophy are essential to any branch of philosophy. Therefore, practical examples will help solidify an understanding of each branch. </span></p><p data-dcnode-id="3406"><b data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">Epistemology</span></b><span data-dcnode-id="3407" instrument_node=""> </span></p><p data-dcnode-id="3404"><span data-dcnode-id="3405" instrument_node="">Investigative journalists and crime detectives gather evidence based on witness statements and professional expertise. Scientific processes can determine and recreate what happened to approximate the truth. These professions operate on gaining knowledge or facts and investigating what is true or not. </span></p><p data-dcnode-id="3400"><b data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">Metaphysics</span></b><span data-dcnode-id="3401" instrument_node=""> </span></p><p data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">Currently, the abortion debate has reignited across the United States. When we think about our reality and being (metaphysics), we consider life and when it begins. Moreover, at what point does a soul come into existence, if at all? Debates about abortion and personhood call into question our understanding of existence, self, and God (metaphysics). </span></p><p data-dcnode-id="3394"><b data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">Logic</span></b><span data-dcnode-id="3395" instrument_node=""> </span></p><p data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">The United States legal system and courts operate on formal logic. Causality and lines of argument based on sound reasoning set the rules for allowable arguments. In other words, lawyers use logic to argue their cases with reason; otherwise, anyone at any time can say anything in a court of law. </span></p><p data-dcnode-id="3388"><b data-dcnode-id="3390"><span data-dcnode-id="3391" instrument_node="">Axiology (Aesthetics)</span></b><span data-dcnode-id="3389" instrument_node=""> </span></p><p data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">In today's digital world, creating music has come under scrutiny. Music generating programs/auto-tune have drawn the ire of traditional musicians, some of which claim that music comes from the soul and not an algorithm or artificial intelligence. However, technological advances are challenging conventional aesthetic notions of music as an art form. </span></p><p data-dcnode-id="3382"><b data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">Axiology (Ethics)</span></b><span data-dcnode-id="3383" instrument_node=""> </span></p><p data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">A current hot-button issue is the ethical implications of COVID vaccinations. For example, is it right or wrong to mandate vaccinations? Is it right or wrong to be vaccinated for the benefit of others? In other words, our current national discussion around vaccination mandates is ethics in practice. </span></p><p data-dcnode-id="3376"><b data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">Political Philosophy</span></b><span data-dcnode-id="3377" instrument_node=""> </span></p><p data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">Current debates about voters' rights and voter suppression display political philosophy in-process. Significant questions about the United States electoral college system for presidential elections continue to be a point of contention. Furthermore, the evergreen debate between socialism versus capitalism enters the debates and campaigns of political candidates. Political philosophy even extends to cable television news channels advocating and challenging a variety of political philosophies. </span></p><h2 data-dcnode-id="3372" id="section---LessonSummary"><span data-dcnode-id="3373" instrument_node="">Lesson Summary</span></h2><p data-dcnode-id="3369"><br clear="all" data-dcnode-id="3371"><span data-dcnode-id="3370" instrument_node=""> </span></p><p data-dcnode-id="3368"></p><span data-dcnode-id="3367" instrument_node="">

</span></caption><tbody data-dcnode-id="3353"><tr data-dcnode-id="3355"><td data-dcnode-id="3357"><img alt="busts of Greek philosophers" data-dcnode-id="3358" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fast.wistia.com/cimages/multimages/16/40418735333_b8d82c8634_c_copy1004545331953385626.jpg&amp;raw"></td></tr></tbody></table><p data-dcnode-id="3350"></p><p data-dcnode-id="3347"><br clear="all" data-dcnode-id="3349"><span data-dcnode-id="3348" instrument_node=""> </span></p><p data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">The branches of philosophy are widespread and deal with many aspects of life. Philosophy, or the love of wisdom, gives us a better understanding of all our intellectual and spiritual pursuits of knowledge. To organize all the fields of philosophical pursuit, we have branches tied to particular scopes of philosophical topics, problems, and interests. </span></p><p data-dcnode-id="3328"><span data-dcnode-id="3344" instrument_node="">To help conceptualize the branches of philosophy, it helps associate keywords or phrases to better differentiate the branches from one another. The major branches of philosophy are </span><b data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">epistemology</span></b><span data-dcnode-id="3341" instrument_node=""> (knowledge &amp; truth), </span><b data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">metaphysics</span></b><span data-dcnode-id="3338" instrument_node=""> (reality &amp; being), </span><b data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">logic</span></b><span data-dcnode-id="3335" instrument_node=""> (argumentation &amp; reason), </span><b data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">axiology</span></b><span data-dcnode-id="3332" instrument_node=""> (aesthetics &amp; ethics), and </span><b data-dcnode-id="3330"><span data-dcnode-id="3331" instrument_node="">political philosophy</span></b><span data-dcnode-id="3329" instrument_node=""> (the state &amp; government).</span></p></div><span data-dcnode-id="3326" instrument_node="">

</span><h2 data-dcnode-id="3292" id="section---PhilosophyWritingActivity"><span data-dcnode-id="3293" instrument_node="">Philosophy Writing Activity</span></h2><span data-dcnode-id="3291" instrument_node="">
</span><h4 data-dcnode-id="3289" id="section---CompareAndContrastEssay"><span data-dcnode-id="3290" instrument_node="">Compare and Contrast Essay</span></h4><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3283"><span data-dcnode-id="3287" instrument_node="">For this assignment, you will choose two branches of philosophy to compare and contrast. First, decide which two of the following branches you would like to explore: epistemology, metaphysics, logic, aesthetics, and ethics. Next, create a Venn diagram to help organize your ideas. To create a Venn diagram, draw two large circles that significantly overlap in the middle. In this middle section, write about the similarities these two branches share. In the outer sections, note the major differences between the two branches. For example, if you were writing about epistemology and metaphysics, you could write that epistemology focuses on how people acquire knowledge, while metaphysics is more concerned about abstract concepts, such as the nature of reality. Make sure that you have at least 3-4 notes in each section of the Venn diagram. Once your diagram is complete, it is time to develop a thesis statement. In your thesis statement, you want to express the main idea of the essay clearly and concisely. Here is an example that could be used for this essay: </span><i data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">While epistemology and metaphysics have a few inherent similarities, these two branches have several significant differences.</span></i><span data-dcnode-id="3284" instrument_node=""> Now that you have a thesis statement, use the outline below to help organize and structure your essay. After you have written your essay, make sure to proofread and edit before publishing or turning-in.
</span></p><span data-dcnode-id="3282" instrument_node="">
</span><p data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">I. Introduction
</span></p><span data-dcnode-id="3279" instrument_node="">
</span><ul data-dcnode-id="3272"><li data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">Hook/Attention-Getter
</span></li><li data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">Introduce philosophy and the main branches.
</span></li><li data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">Thesis Statement
</span></li></ul><p data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">II. Body Paragraphs
</span></p><span data-dcnode-id="3269" instrument_node="">
</span><ul data-dcnode-id="3266"><li data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">Similarities
</span></li></ul><ol data-dcnode-id="3261"><li data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">Discuss the similarities between the two branches of philosophy.
</span></li><li data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">Use specific examples and details to support your ideas.
</span></li></ol><ul data-dcnode-id="3258"><li data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">Differences
</span></li></ul><ol data-dcnode-id="3253"><li data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">Discuss the major differences between the two branches of philosophy.
</span></li><li data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">Use specific examples and details to support your ideas.
</span></li></ol><p data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">III. Conclusion
</span></p><span data-dcnode-id="3250" instrument_node="">
</span><ul data-dcnode-id="3243"><li data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">Summarize your main points.
</span></li><li data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">Re-state your thesis statement.
</span></li><li data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Provide a final statement that adds closure to your essay.</span></li></ul><span data-dcnode-id="3242" instrument_node="">

</span><h4 data-dcnode-id="3233" itemprop="name"><span data-dcnode-id="3234" instrument_node="">What type of field is philosophy?</span></h4><span data-dcnode-id="3232" instrument_node="">
</span><div data-dcnode-id="3224" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="3231" instrument_node="">
</span><div data-dcnode-id="3226" itemprop="text"><span data-dcnode-id="3230" instrument_node="">
</span><p data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Philosophy is a field that involves critical thinking, so philosophy plays a role in all fields.  Philosophy helped to develop and even create some fields.  For example, science developed out of natural philosophy.  Physics, the cosmos and nature, was studied as natural philosophy.</span></p><span data-dcnode-id="3227" instrument_node="">
</span></div><span data-dcnode-id="3225" instrument_node="">
</span></div><span data-dcnode-id="3223" instrument_node="">
</span></div><span data-dcnode-id="3221" instrument_node="">
</span><div data-dcnode-id="3207" itemprop="mainEntity" itemscope="" itemtype="https://schema.org/Question"><span data-dcnode-id="3220" instrument_node="">
</span><h4 data-dcnode-id="3218" itemprop="name"><span data-dcnode-id="3219" instrument_node="">What are the major branches of philosophy, and define each branch?</span></h4><span data-dcnode-id="3217" instrument_node="">
</span><div data-dcnode-id="3209" itemprop="acceptedAnswer" itemscope="" itemtype="https://schema.org/Answer"><span data-dcnode-id="3216" instrument_node="">
</span><div data-dcnode-id="3211" itemprop="text"><span data-dcnode-id="3215" instrument_node="">
</span><p data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">The major branches of philosophy are epistemology, which studies knowledge; metaphysics, which studies reality and being; logic, which studies argumentation and reason; axiology, which studies valuation within aesthetics&nbsp;and ethics; and political philosophy, which studies government.</span></p><span data-dcnode-id="3212" instrument_node="">
