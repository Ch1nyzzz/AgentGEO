ontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progressive_alliance_%28UK%29" title="Progressive alliance (UK)"><span data-dcnode-id="2023" instrument_node="">progressive alliance</span></a><span data-dcnode-id="2021" instrument_node=""> has seen significant discourse in left-leaning spaces, particularly on Twitter,</span><sup class="reference" data-dcnode-id="2018" id="cite_ref-46"><a data-dcnode-id="2019" href="#cite_note-46"><span data-dcnode-id="2020" instrument_node="">[46]</span></a></sup><span data-dcnode-id="2017" instrument_node=""> it is thought unlikely to ever happen. The Labour Party does not support electoral reform and has a clause in their constitution (section 5, clause IV) requiring them to stand candidates in every parliamentary seat bar Northern Ireland.</span><sup class="reference" data-dcnode-id="2014" id="cite_ref-47"><a data-dcnode-id="2015" href="#cite_note-47"><span data-dcnode-id="2016" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="2011" id="cite_ref-48"><a data-dcnode-id="2012" href="#cite_note-48"><span data-dcnode-id="2013" instrument_node="">[48]</span></a></sup><span data-dcnode-id="2010" instrument_node=""> Senior figures in Labour, the Liberal Democrats, and Greens have, with varying degrees of explicitness, all dismissed the idea.</span><sup class="reference" data-dcnode-id="2007" id="cite_ref-49"><a data-dcnode-id="2008" href="#cite_note-49"><span data-dcnode-id="2009" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="2004" id="cite_ref-50"><a data-dcnode-id="2005" href="#cite_note-50"><span data-dcnode-id="2006" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="2001" id="cite_ref-51"><a data-dcnode-id="2002" href="#cite_note-51"><span data-dcnode-id="2003" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2000" instrument_node=""> There is also concern that such a proposal would not function as intended if implemented, as none of the 92 constituencies Unite to Remain operated in were successful, and some believe both that voters would react negatively to what could be perceived as “backroom deals” and “stitch-ups,” or that association with the other parties would harm each one’s reputation with target voters.</span><sup class="reference" data-dcnode-id="1997" id="cite_ref-52"><a data-dcnode-id="1998" href="#cite_note-52"><span data-dcnode-id="1999" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="1994" id="cite_ref-53"><a data-dcnode-id="1995" href="#cite_note-53"><span data-dcnode-id="1996" instrument_node="">[53]</span></a></sup><span data-dcnode-id="1993" instrument_node="">
</span></p><span data-dcnode-id="1991" instrument_node="">
</span><h3 data-dcnode-id="1981"><span class="mw-headline" data-dcnode-id="1989" id="United_States"><span data-dcnode-id="1990" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="1982"><span class="mw-editsection-bracket" data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">[</span></span><a data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform%26action%3Dedit%26section%3D9" title="Edit section: United States"><span data-dcnode-id="1986" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1980" instrument_node="">
</span><link data-dcnode-id="1979" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1975" role="note"><span data-dcnode-id="1978" instrument_node="">Main article: </span><a data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_reform_in_the_United_States" title="Electoral reform in the United States"><span data-dcnode-id="1977" instrument_node="">Electoral reform in the United States</span></a></div><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1954"><span data-dcnode-id="1973" instrument_node="">Electoral reform is a continuing process in the United States, motivated by fear of both </span><a data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_fraud" title="Electoral fraud"><span data-dcnode-id="1972" instrument_node="">electoral fraud</span></a><span data-dcnode-id="1970" instrument_node=""> and </span><a data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disfranchisement" title="Disfranchisement"><span data-dcnode-id="1969" instrument_node="">disfranchisement</span></a><span data-dcnode-id="1967" instrument_node="">. There are also extensive debates of the fairness and effects of the </span><a class="mw-redirect" data-dcnode-id="1965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_College_%28United_States%29" title="Electoral College (United States)"><span data-dcnode-id="1966" instrument_node="">Electoral College</span></a><span data-dcnode-id="1964" instrument_node="">, existing </span><a class="mw-redirect" data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_systems" title="Voting systems"><span data-dcnode-id="1963" instrument_node="">voting systems</span></a><span data-dcnode-id="1961" instrument_node="">, and </span><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Campaign_finance_in_the_United_States" title="Campaign finance in the United States"><span data-dcnode-id="1960" instrument_node="">campaign financing laws</span></a><span data-dcnode-id="1958" instrument_node="">, as well as the proposals for reform. There are also initiatives to end </span><a data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerrymandering" title="Gerrymandering"><span data-dcnode-id="1957" instrument_node="">gerrymandering</span></a><span data-dcnode-id="1955" instrument_node="">, a process by which state legislatures alter the borders of representative districts to increase the chances of their candidates winning their seats (cracking), and concentrating opponents in specific districts to eliminate their influence in other districts (packing).
</span></p><span data-dcnode-id="1953" instrument_node="">
