</span><h2 data-dcnode-id="2755"><span class="mw-headline" data-dcnode-id="2763" id="Nation-building"><span data-dcnode-id="2764" instrument_node="">Nation-building</span></span><span class="mw-editsection" data-dcnode-id="2756"><span class="mw-editsection-bracket" data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">[</span></span><a data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform%26action%3Dedit%26section%3D1" title="Edit section: Nation-building"><span data-dcnode-id="2760" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">In less democratic countries, elections are often demanded by dissidents; therefore the most basic electoral-reform project in such countries is to achieve a transfer of power to a democratically elected government with a minimum of bloodshed, e.g. in South Africa in 1994. This case highlights the complexity of such reform: such projects tend to require changes to national or other constitutions, and to alter balances of power. Electoral reforms are often politically painful.
</span></p><span data-dcnode-id="2751" instrument_node="">
</span><h2 data-dcnode-id="2741"><span class="mw-headline" data-dcnode-id="2749" id="Role_of_United_Nations"><span data-dcnode-id="2750" instrument_node="">Role of United Nations</span></span><span class="mw-editsection" data-dcnode-id="2742"><span class="mw-editsection-bracket" data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">[</span></span><a data-dcnode-id="2745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform%26action%3Dedit%26section%3D2" title="Edit section: Role of United Nations"><span data-dcnode-id="2746" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2739" instrument_node="">The </span><a data-dcnode-id="2737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="2738" instrument_node="">United Nations</span></a><span data-dcnode-id="2736" instrument_node=""> Fair Elections Commission provides international observers to national elections that are likely to face challenges by the international community of nations, e.g., in 2001 in Yugoslavia, in 2002 in Zimbabwe.
</span></p><p data-dcnode-id="2721"><span data-dcnode-id="2734" instrument_node="">The United Nations standards address safety of citizens, coercion, scrutiny, and eligibility to vote. They do not impose ballot styles, party diversity, or borders on electoral constituencies. Various global political movements, e.g., </span><a data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_movement" title="Labour movement"><span data-dcnode-id="2733" instrument_node="">labour movements</span></a><span data-dcnode-id="2731" instrument_node="">, the </span><a data-dcnode-id="2729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_party" title="Green party"><span data-dcnode-id="2730" instrument_node="">Green party</span></a><span data-dcnode-id="2728" instrument_node="">, </span><a data-dcnode-id="2726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamism" title="Islamism"><span data-dcnode-id="2727" instrument_node="">Islamism</span></a><span data-dcnode-id="2725" instrument_node="">, </span><a data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zionism" title="Zionism"><span data-dcnode-id="2724" instrument_node="">Zionism</span></a><span data-dcnode-id="2722" instrument_node="">, advocate various cultural, social, ecological means of setting borders that they consider "objective" or "blessed" in some other way. Contention over electoral constituency borders within or between nations and definitions of "refugee", "citizen", and "right of return" mark various global conflicts, including those in Israel/Palestine, the Congo, and Rwanda.
</span></p><span data-dcnode-id="2720" instrument_node="">
</span><h2 data-dcnode-id="2710"><span class="mw-headline" data-dcnode-id="2718" id="Electoral_borders"><span data-dcnode-id="2719" instrument_node="">Electoral borders</span></span><span class="mw-editsection" data-dcnode-id="2711"><span class="mw-editsection-bracket" data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">[</span></span><a data-dcnode-id="2714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform%26action%3Dedit%26section%3D3" title="Edit section: Electoral borders"><span data-dcnode-id="2715" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2709" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2708" instrument_node="">Redrawing of electoral constituency (or "riding" or "district") borders should be conducted at regular intervals, or by statutory rules and definitions, if for no other reason than to eliminate </span><a data-dcnode-id="2706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apportionment_%28politics%29" title="Apportionment (politics)"><span data-dcnode-id="2707" instrument_node="">malapportionment</span></a><span data-dcnode-id="2705" instrument_node=""> attributable to population movements. Some electoral reforms seek to fix these borders according to some cultural or ecological criterion, e.g., </span><a data-dcnode-id="2703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bioregionalism" title="Bioregionalism"><span data-dcnode-id="2704" instrument_node="">bioregional</span></a><span data-dcnode-id="2702" instrument_node=""> democracy – which sets borders to fit exactly to </span><a data-dcnode-id="2700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecoregion" title="Ecoregion"><span data-dcnode-id="2701" instrument_node="">ecoregions</span></a><span data-dcnode-id="2699" instrument_node=""> – to avoid the obvious abuse of "</span><a data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerrymandering" title="Gerrymandering"><span data-dcnode-id="2698" instrument_node="">gerrymandering</span></a><span data-dcnode-id="2696" instrument_node="">" in which constituency borders are set deliberately to favor one party over another, or to improve management of the public's commonly owned property.
</span></p><p data-dcnode-id="2690"><span data-dcnode-id="2694" instrument_node="">Electoral borders and their manipulation have been a major issue in the United States in particular.  However the ability to respect 'natural' borders (meaning municipal or community or infrastructure or natural areas) has been cited often in criticisms of particular reforms, e.g. the </span><a class="mw-redirect" data-dcnode-id="2692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alternative_Vote_Plus" title="Alternative Vote Plus"><span data-dcnode-id="2693" instrument_node="">Alternative Vote Plus</span></a><span data-dcnode-id="2691" instrument_node=""> system proposed for the UK by Jenkins Commission.
</span></p><span data-dcnode-id="2689" instrument_node="">
</span><h3 data-dcnode-id="2679"><span class="mw-headline" data-dcnode-id="2687" id="Australia"><span data-dcnode-id="2688" instrument_node="">Australia</span></span><span class="mw-editsection" data-dcnode-id="2680"><span class="mw-editsection-bracket" data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">[</span></span><a data-dcnode-id="2683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform%26action%3Dedit%26section%3D4" title="Edit section: Australia"><span data-dcnode-id="2684" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2678" instrument_node="">
</span><p data-dcnode-id="2667"><span data-dcnode-id="2677" instrument_node="">The </span><a data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proportional_Representation_Society_of_Australia" title="Proportional Representation Society of Australia"><span data-dcnode-id="2676" instrument_node="">Proportional Representation Society of Australia</span></a><span data-dcnode-id="2674" instrument_node=""> advocates the </span><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Single_transferable_vote" title="Single transferable vote"><span data-dcnode-id="2673" instrument_node="">single transferable vote</span></a><span data-dcnode-id="2671" instrument_node=""> and </span><a data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proportional_representation" title="Proportional representation"><span data-dcnode-id="2670" instrument_node="">proportional representation</span></a><span data-dcnode-id="2668" instrument_node="">.
</span></p><span data-dcnode-id="2666" instrument_node="">
</span><h3 data-dcnode-id="2656"><span class="mw-headline" data-dcnode-id="2664" id="Canada"><span data-dcnode-id="2665" instrument_node="">Canada</span></span><span class="mw-editsection" data-dcnode-id="2657"><span class="mw-editsection-bracket" data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">[</span></span><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform%26action%3Dedit%26section%3D5" title="Edit section: Canada"><span data-dcnode-id="2661" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2655" instrument_node="">
</span><p data-dcnode-id="2630"><span data-dcnode-id="2654" instrument_node="">Several national and provincial organizations promote electoral reform, especially by advocating more party-proportional representation, as most regions of Canada have at least three competitive political parties (some four or five). Furthermore, </span><a class="external text" data-dcnode-id="2652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//electiondistrictsvoting.com/" rel="nofollow"><span data-dcnode-id="2653" instrument_node="">Election Districts Voting</span></a><span data-dcnode-id="2651" instrument_node=""> advocates proportional representation electoral reforms that enable large majorities of voters to directly elect party candidates of choice, not just parties of choice.</span><sup class="reference" data-dcnode-id="2648" id="cite_ref-1"><a data-dcnode-id="2649" href="#cite_note-1"><span data-dcnode-id="2650" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2647" instrument_node=""> As well, a large non-party organization advocating electoral reform nationally is </span><a data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fair_Vote_Canada" title="Fair Vote Canada"><span data-dcnode-id="2646" instrument_node="">Fair Vote Canada</span></a><span data-dcnode-id="2644" instrument_node=""> but there are other advocacy groups. One such group is </span><a class="external text" data-dcnode-id="2642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.equal.vote/" rel="nofollow"><span data-dcnode-id="2643" instrument_node="">The Equal Vote Coalition</span></a><span data-dcnode-id="2641" instrument_node=""> who has organized a multi-year </span><a class="external text" data-dcnode-id="2639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starvoting.us/star_pr" rel="nofollow"><span data-dcnode-id="2640" instrument_node="">research campaign</span></a><span data-dcnode-id="2638" instrument_node=""> involving many of the world experts on electoral reform. Several referendums to decide whether or not to adopt such reform have been held during provincial elections in the last decade; none has thus far resulted in a change from the plurality system currently in force. Controversially, the threshold for adoption of a new voting system has regularly been set at a "supermajority", for example, 60% of ballots cast approving the proposed system in order for the change to be implemented. In most provincial referendums the change side was roundly defeated, gaining less than 40% support in most cases. In the case of the November 7, 2016 electoral reform plebiscite on Prince Edward Island, the government declined to specify in advance how it would use the results. Although Mixed Member Proportional Representation won the 5-option ranked ballot with 52% of the final vote vs. 42% for </span><a class="mw-redirect" data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First-past-the-post" title="First-past-the-post"><span data-dcnode-id="2637" instrument_node="">first-past-the-post</span></a><span data-dcnode-id="2635" instrument_node="">, the PEI government has so far not committed to implementing a proportional voting system, citing the turnout of 36% as making it "doubtful whether these results can be said to constitute a clear expression of the will of Prince Edward Islanders". PEI regularly sees turnout above 80% in most elections.</span><sup class="reference" data-dcnode-id="2632" id="cite_ref-2"><a data-dcnode-id="2633" href="#cite_note-2"><span data-dcnode-id="2634" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2631" instrument_node=""> The seven provincial level referendums are:
</span></p><span data-dcnode-id="2629" instrument_node="">
</span><ul data-dcnode-id="2601"><li data-dcnode-id="2626"><a data-dcnode-id="2627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2005_British_Columbia_electoral_reform_referendum" title="2005 British Columbia electoral reform referendum"><span data-dcnode-id="2628" instrument_node="">2005 British Columbia electoral reform referendum</span></a></li><span data-dcnode-id="2625" instrument_node="">
</span><li data-dcnode-id="2622"><a data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2005_Prince_Edward_Island_electoral_reform_referendum" title="2005 Prince Edward Island electoral reform referendum"><span data-dcnode-id="2624" instrument_node="">2005 Prince Edward Island electoral reform referendum</span></a></li><span data-dcnode-id="2621" instrument_node="">
</span><li data-dcnode-id="2618"><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2007_Ontario_electoral_reform_referendum" title="2007 Ontario electoral reform referendum"><span data-dcnode-id="2620" instrument_node="">2007 Ontario electoral reform referendum</span></a></li><span data-dcnode-id="2617" instrument_node="">
</span><li data-dcnode-id="2614"><a data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2009_British_Columbia_electoral_reform_referendum" title="2009 British Columbia electoral reform referendum"><span data-dcnode-id="2616" instrument_node="">2009 British Columbia electoral reform referendum</span></a></li><span data-dcnode-id="2613" instrument_node="">
</span><li data-dcnode-id="2610"><a data-dcnode-id="2611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2016_Prince_Edward_Island_electoral_reform_referendum" title="2016 Prince Edward Island electoral reform referendum"><span data-dcnode-id="2612" instrument_node="">2016 Prince Edward Island electoral reform referendum</span></a></li><span data-dcnode-id="2609" instrument_node="">
</span><li data-dcnode-id="2606"><a data-dcnode-id="2607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2018_British_Columbia_electoral_reform_referendum" title="2018 British Columbia electoral reform referendum"><span data-dcnode-id="2608" instrument_node="">2018 British Columbia electoral reform referendum</span></a></li><span data-dcnode-id="2605" instrument_node="">
</span><li data-dcnode-id="2602"><a data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2019_Prince_Edward_Island_electoral_reform_referendum" title="2019 Prince Edward Island electoral reform referendum"><span data-dcnode-id="2604" instrument_node="">2019 Prince Edward Island electoral reform referendum</span></a></li></ul><span data-dcnode-id="2600" instrument_node="">
</span><p data-dcnode-id="2557"><span data-dcnode-id="2599" instrument_node="">During the </span><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2015_Canadian_federal_election" title="2015 Canadian federal election"><span data-dcnode-id="2598" instrument_node="">2015 federal election</span></a><span data-dcnode-id="2596" instrument_node=""> all three opposition parties promised some measure of electoral reform before the </span><a data-dcnode-id="2594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2019_Canadian_federal_election" title="2019 Canadian federal election"><span data-dcnode-id="2595" instrument_node="">next federal election</span></a><span data-dcnode-id="2593" instrument_node="">.  The NDP promised to implement </span><a data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mixed-member_proportional_representation" title="Mixed-member proportional representation"><span data-dcnode-id="2592" instrument_node="">mixed-member proportional representation</span></a><span data-dcnode-id="2590" instrument_node=""> with regional and open party lists, based on the 2004 recommendations of the Law Commission,</span><sup class="reference" data-dcnode-id="2587" id="cite_ref-macleans.ca_3-0"><a data-dcnode-id="2588" href="#cite_note-macleans.ca-3"><span data-dcnode-id="2589" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2586" instrument_node=""> while the Liberals simply promised to form an all-party committee to investigate various electoral reform options "including proportional representation, ranked ballots, mandatory voting and online voting".</span><sup class="reference" data-dcnode-id="2583" id="cite_ref-4"><a data-dcnode-id="2584" href="#cite_note-4"><span data-dcnode-id="2585" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2582" instrument_node=""> Liberal leader, and now prime minister, Justin Trudeau is believed to prefer a winner-take-all, preferential voting system known as </span><a class="mw-redirect" data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Instant_Runoff_Voting" title="Instant Runoff Voting"><span data-dcnode-id="2581" instrument_node="">Instant Runoff Voting</span></a><span data-dcnode-id="2579" instrument_node="">; however, there are many prominent members of his caucus and cabinet who openly support proportional representation (Stephane Dion, Dominic Leblanc, Chrystia Freeland, and others).</span><sup class="reference" data-dcnode-id="2576" id="cite_ref-macleans.ca_3-1"><a data-dcnode-id="2577" href="#cite_note-macleans.ca-3"><span data-dcnode-id="2578" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2575" instrument_node=""> In 2012 Dion authored an editorial for the </span><a data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Post" title="National Post"><span data-dcnode-id="2574" instrument_node="">National Post</span></a><span data-dcnode-id="2572" instrument_node=""> advocating his variation of </span><a class="mw-redirect" data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Single_Transferable_Vote" title="Single Transferable Vote"><span data-dcnode-id="2571" instrument_node="">Proportional Representation by the Single Transferable Vote</span></a><span data-dcnode-id="2569" instrument_node=""> dubbed "P3" (proportional, preferential and personalised).</span><sup class="reference" data-dcnode-id="2566" id="cite_ref-5"><a data-dcnode-id="2567" href="#cite_note-5"><span data-dcnode-id="2568" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2565" instrument_node=""> Regardless, Trudeau has promised to approach the issue with an open mind. Conservative interim leader, Rona Ambrose, has indicated a willingness to investigate electoral reform options, but her party's emphatic position is that any reform must first be approved by the voters in a referendum. The Liberal government's position is that a referendum is unnecessary as they clearly campaigned on making "2015 Canada's last First Past the Post election." The Green Party of Canada has always been supportive of proportional representation. At the party's Special General Meeting in Calgary on December 5, 2016, Green Party members passed a resolution endorsing Mixed Member Proportional Representation as its preferred model, while maintaining an openness to any proportional voting system producing an outcome with a score of 5 or less on the </span><a class="mw-redirect" data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gallagher_Index" title="Gallagher Index"><span data-dcnode-id="2564" instrument_node="">Gallagher Index</span></a><span data-dcnode-id="2562" instrument_node="">.</span><sup class="reference" data-dcnode-id="2559" id="cite_ref-6"><a data-dcnode-id="2560" href="#cite_note-6"><span data-dcnode-id="2561" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2558" instrument_node="">
</span></p><span data-dcnode-id="2556" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2547"><div class="thumbinner" data-dcnode-id="2548" style="width:1142px;"><a class="image" data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACanada-election-2015.jpg"><img alt="" class="thumbimage" data-dcnode-id="2555" data-file-height="255" data-file-width="1140" decoding="async" height="255" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/e/e6/Canada-election-2015.jpg&amp;raw" width="1140"></a><span data-dcnode-id="2553" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2549"><div class="magnify" data-dcnode-id="2551"><a class="internal" data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACanada-election-2015.jpg" title="Enlarge"></a></div><span data-dcnode-id="2550" instrument_node="">2015 Canadian Election: Seats do not reflect the popular vote</span></div></div></div><span data-dcnode-id="2546" instrument_node="">
</span><p data-dcnode-id="2537"><span data-dcnode-id="2545" instrument_node="">The Liberal members of the special all-committee on electoral reform urged Prime Minister Justin Trudeau to break his promise to change Canada’s voting system before the next federal election in 2019. That call for inaction came as opposition members of the committee pressured Trudeau to keep the commitment. In its </span><a class="external text" data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ourcommons.ca/DocumentViewer/en/42-1/ERRE/report-3/" rel="nofollow"><span data-dcnode-id="2544" instrument_node="">final report, Strengthening Democracy in Canada</span></a><span data-dcnode-id="2542" instrument_node="">, the Standing Committee on Electoral Reform recommended the government design a new proportional system and hold a national referendum to gauge Canadians' support.</span><sup class="reference" data-dcnode-id="2539" id="cite_ref-7"><a data-dcnode-id="2540" href="#cite_note-7"><span data-dcnode-id="2541" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2538" instrument_node="">
</span></p><p data-dcnode-id="2527"><span data-dcnode-id="2536" instrument_node="">In December 2016-January 2017, the Government of Canada undertook a survey of Canadian opinion regarding electoral reform, with some 360,000 responses received.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2529" style="white-space:nowrap;"><span data-dcnode-id="2535" instrument_node="">[</span><i data-dcnode-id="2531"><a data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2533" title="This claim needs references to reliable sources. (July 2019)"><span data-dcnode-id="2534" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2530" instrument_node="">]</span></sup><span data-dcnode-id="2528" instrument_node="">
</span></p><p data-dcnode-id="2521"><span data-dcnode-id="2526" instrument_node="">On February 1, 2017, the Liberal Minister of Democratic Institutions, Karina Gould, announced that a change of voting system would no longer be in her mandate, citing a lack of broad consensus among Canadians on what voting system would be best.</span><sup class="reference" data-dcnode-id="2523" id="cite_ref-8"><a data-dcnode-id="2524" href="#cite_note-8"><span data-dcnode-id="2525" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2522" instrument_node="">
</span></p><p data-dcnode-id="2504"><span data-dcnode-id="2520" instrument_node="">The Province of Ontario recently permitted the use of Instant Runoff Voting, often called the "ranked ballot," for municipal elections.</span><sup class="reference" data-dcnode-id="2517" id="cite_ref-9"><a data-dcnode-id="2518" href="#cite_note-9"><span data-dcnode-id="2519" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2516" instrument_node=""> IRV is not a proportional voting system and is opposed by both Election Districts Voting</span><sup class="reference" data-dcnode-id="2513" id="cite_ref-10"><a data-dcnode-id="2514" href="#cite_note-10"><span data-dcnode-id="2515" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2512" instrument_node=""> and </span><a data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fair_Vote_Canada" title="Fair Vote Canada"><span data-dcnode-id="2511" instrument_node="">Fair Vote Canada</span></a><span data-dcnode-id="2509" instrument_node=""> for provincial or federal elections.</span><sup class="reference" data-dcnode-id="2506" id="cite_ref-11"><a data-dcnode-id="2507" href="#cite_note-11"><span data-dcnode-id="2508" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2505" instrument_node="">
</span></p><span data-dcnode-id="2503" instrument_node="">
</span><h3 data-dcnode-id="2493"><span class="mw-headline" data-dcnode-id="2501" id="Israel"><span data-dcnode-id="2502" instrument_node="">Israel</span></span><span class="mw-editsection" data-dcnode-id="2494"><span class="mw-editsection-bracket" data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">[</span></span><a data-dcnode-id="2497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform%26action%3Dedit%26section%3D6" title="Edit section: Israel"><span data-dcnode-id="2498" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">There is continuous talk in Israel about "governability" ("משילות" in Hebrew). The following reforms were carried in the last three decades:
</span></p><span data-dcnode-id="2489" instrument_node="">
</span><ol data-dcnode-id="2478"><li data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">Between 1996 - 2001 the PM was elected directly, while keeping a strong parliament. Direct election for the PM was abandoned afterwards, amid disappointment with the change. The earlier Westminster system was reinstated like it was before.</span></li><span data-dcnode-id="2486" instrument_node="">
</span><li data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">The minimum threshold a party  needs to enter parliament was gradually raised. it was 1% until 1988; it was then raised to 1.5% and remained at that level until 2003, when it was again raised to 2%. On March 11, 2014, the Knesset approved a new law to raise the threshold to 3.25% (approximately 4 seats).</span></li><span data-dcnode-id="2483" instrument_node="">
</span><li data-dcnode-id="2479"><span data-dcnode-id="2482" instrument_node="">The process of throwing off an existing coalition government was slowly made harder, and now it is nearly impossible to impeach a government without triggering a new election. As of 2015, one needs to present a full new government with a majority support in order to impeach a government. This too, was done gradually between 1996 and 2014 </span><a class="extiw" data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//he.wikipedia.org/wiki/%25D7%2594%25D7%25A6%25D7%25A2%25D7%25AA_%25D7%2590%25D7%2599-%25D7%2590%25D7%259E%25D7%2595%25D7%259F" title="he:הצעת אי-אמון"><span data-dcnode-id="2481" instrument_node="">הצעת אי-אמון</span></a></li></ol><span data-dcnode-id="2477" instrument_node="">
</span><h3 data-dcnode-id="2467"><span class="mw-headline" data-dcnode-id="2475" id="New_Zealand"><span data-dcnode-id="2476" instrument_node="">New Zealand</span></span><span class="mw-editsection" data-dcnode-id="2468"><span class="mw-editsection-bracket" data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">[</span></span><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform%26action%3Dedit%26section%3D7" title="Edit section: New Zealand"><span data-dcnode-id="2472" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2466" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="2460" role="note"><span data-dcnode-id="2463" instrument_node="">Main article: </span><a data-dcnode-id="2461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_reform_in_New_Zealand" title="Electoral reform in New Zealand"><span data-dcnode-id="2462" instrument_node="">Electoral reform in New Zealand</span></a></div><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2440"><a data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_reform_in_New_Zealand" title="Electoral reform in New Zealand"><span data-dcnode-id="2458" instrument_node="">Electoral reform in New Zealand</span></a><span data-dcnode-id="2456" instrument_node=""> began in 1986 with the report of the </span><a data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Commission_on_the_Electoral_System" title="Royal Commission on the Electoral System"><span data-dcnode-id="2455" instrument_node="">Royal Commission on the Electoral System</span></a><span data-dcnode-id="2453" instrument_node=""> entitled </span><i data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">Towards A Better Democracy</span></i><span data-dcnode-id="2450" instrument_node="">.  The Royal Commission recommended that </span><a data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mixed-member_proportional_representation" title="Mixed-member proportional representation"><span data-dcnode-id="2449" instrument_node="">Mixed Member Proportional</span></a><span data-dcnode-id="2447" instrument_node=""> (MMP) be adopted instead of the current </span><a class="mw-redirect" data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First-past-the-post" title="First-past-the-post"><span data-dcnode-id="2446" instrument_node="">first-past-the-post</span></a><span data-dcnode-id="2444" instrument_node=""> system. After two referendums in 1992 and 1993, New Zealand adopted MMP.
In 2004, some local body elections in New Zealand were elected using single transferable vote instead of the </span><a class="mw-redirect" data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plurality-at-large_voting" title="Plurality-at-large voting"><span data-dcnode-id="2443" instrument_node="">block vote</span></a><span data-dcnode-id="2441" instrument_node="">.
</span></p><span data-dcnode-id="2439" instrument_node="">
</span><h3 data-dcnode-id="2429"><span class="mw-headline" data-dcnode-id="2437" id="United_Kingdom"><span data-dcnode-id="2438" instrument_node="">United Kingdom</span></span><span class="mw-editsection" data-dcnode-id="2430"><span class="mw-editsection-bracket" data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">[</span></span><a data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElectoral_reform%26action%3Dedit%26section%3D8" title="Edit section: United Kingdom"><span data-dcnode-id="2434" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2428" instrument_node="">
</span><ul data-dcnode-id="2412"><li data-dcnode-id="2413"><i data-dcnode-id="2414"><span data-dcnode-id="2427" instrument_node="">For 19th century reforms, see </span><a class="mw-redirect" data-dcnode-id="2425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Reform_Bills" title="The Reform Bills"><span data-dcnode-id="2426" instrument_node="">The Reform Bills</span></a><span data-dcnode-id="2424" instrument_node="">. Also the </span><a data-dcnode-id="2422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_Act_1832" title="Reform Act 1832"><span data-dcnode-id="2423" instrument_node="">Reform Act 1832</span></a><span data-dcnode-id="2421" instrument_node="">, the </span><a data-dcnode-id="2419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_Act_1867" title="Reform Act 1867"><span data-dcnode-id="2420" instrument_node="">Reform Act 1867</span></a><span data-dcnode-id="2418" instrument_node=""> and the </span><a data-dcnode-id="2416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representation_of_the_People_Act_1884" title="Representation of the People Act 1884"><span data-dcnode-id="2417" instrument_node="">Representation of the People Act 1884</span></a><span data-dcnode-id="2415" instrument_node="">.</span></i></li></ul><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2354"><span data-dcnode-id="2410" instrument_node="">The United Kingdom has generally used first-past-the-post (FPTP) for many years, but there have been several attempts at reform. A 1910 Royal Commission on Electoral Systems recommended AV be adopted for the Commons.</span><sup class="reference" data-dcnode-id="2407" id="cite_ref-butler04_12-0"><a data-dcnode-id="2408" href="#cite_note-butler04-12"><span data-dcnode-id="2409" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="2404" id="cite_ref-13"><a data-dcnode-id="2405" href="#cite_note-13"><span data-dcnode-id="2406" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2403" instrument_node=""> A very limited introduction of single transferable vote (STV) came in the </span><a data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_Ireland_Act_1914" title="Government of Ireland Act 1914"><span data-dcnode-id="2402" instrument_node="">Government of Ireland Act 1914</span></a><span data-dcnode-id="2400" instrument_node="">. A Speaker's Conference on electoral reform in January 1917 unanimously recommended a mix of AV and STV for elections to the House of Commons.</span><sup class="reference" data-dcnode-id="2397" id="cite_ref-butler04_12-1"><a data-dcnode-id="2398" href="#cite_note-butler04-12"><span data-dcnode-id="2399" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2396" instrument_node=""> However, that July the Commons rejected STV by 32 votes in the committee stage of the </span><a data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Representation_of_the_People_Act_1918" title="Representation of the People Act 1918"><span data-dcnode-id="2395" instrument_node="">Representation of the People Bill</span></a><span data-dcnode-id="2393" instrument_node="">,</span><sup class="reference" data-dcnode-id="2390" id="cite_ref-14"><a data-dcnode-id="2391" href="#cite_note-14"><span data-dcnode-id="2392" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2389" instrument_node=""> and by 1 vote substituted alternative vote (AV).</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2382" style="white-space:nowrap;"><span data-dcnode-id="2388" instrument_node="">[</span><i data-dcnode-id="2384"><a data-dcnode-id="2385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2386" title="This claim needs references to reliable sources. (September 2016)"><span data-dcnode-id="2387" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2383" instrument_node="">]</span></sup><span data-dcnode-id="2381" instrument_node=""> The House of Lords then voted for STV,</span><sup class="reference" data-dcnode-id="2378" id="cite_ref-15"><a data-dcnode-id="2379" href="#cite_note-15"><span data-dcnode-id="2380" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2377" instrument_node=""> but the Commons insisted on AV.</span><sup class="reference" data-dcnode-id="2374" id="cite_ref-16"><a data-dcnode-id="2375" href="#cite_note-16"><span data-dcnode-id="2376" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2373" instrument_node=""> In a compromise, AV was abandoned and the Boundary Commission were asked to prepare a limited plan of STV to apply to 100 seats.</span><sup class="reference" data-dcnode-id="2370" id="cite_ref-17"><a data-dcnode-id="2371" href="#cite_note-17"><span data-dcnode-id="2372" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="2367" id="cite_ref-hc19180206_18-0"><a data-dcnode-id="2368" href="#cite_note-hc19180206-18"><span data-dcnode-id="2369" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2366" instrument_node=""> This plan was then rejected by the Commons,</span><sup class="reference" data-dcnode-id="2363" id="cite_ref-hc19180206_18-1"><a data-dcnode-id="2364" href="#cite_note-hc19180206-18"><span data-dcnode-id="2365" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2362" instrument_node=""> although STV was introduced for the </span><a class="mw-redirect" data-dcnode-id="2360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_constituencies" title="University constituencies"><span data-dcnode-id="2361" instrument_node="">university constituencies</span></a><span data-dcnode-id="2359" instrument_node="">.</span><sup class="reference" data-dcnode-id="2356" id="cite_ref-Butler_DE_1953_19-0"><a data-dcnode-id="2357" href="#cite_note-Butler_DE_1953-19"><span data-dcnode-id="2358" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2355" instrument_node="">
</span></p><p data-dcnode-id="2345"><span data-dcnode-id="2353" instrument_node="">On 8 April 1921, a Private Member's Bill to introduce STV was rejected 211 votes to 112 by the Commons. A </span><a data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Party_%28UK%29" title="Liberal Party (UK)"><span data-dcnode-id="2352" instrument_node="">Liberal</span></a><span data-dcnode-id="2350" instrument_node=""> attempt to introduce an Alternative Vote Bill in March 1923 was defeated by 208 votes to 178. On 2 May 1924, another Private Member's Bill for STV was defeated 240 votes to 146 in the Commons.</span><sup class="reference" data-dcnode-id="2347" id="cite_ref-Butler_DE_1953_19-1"><a data-dcnode-id="2348" href="#cite_note-Butler_DE_1953-19"><span data-dcnode-id="2349" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2346" instrument_node="">
</span></p><p data-dcnode-id="2313"><span data-dcnode-id="2344" instrument_node="">In January 1931, the minority </span><a data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_Party_%28UK%29" title="Labour Party (UK)"><span data-dcnode-id="2343" instrument_node="">Labour</span></a><span data-dcnode-id="2341" instrument_node=""> government, then supported by the Liberals, introduced a Representation of the People Bill that included switching to AV. The Bill passed its second reading in the Commons by 295 votes to 230 on 3 February 1931</span><sup class="reference" data-dcnode-id="2338" id="cite_ref-20"><a data-dcnode-id="2339" href="#cite_note-20"><span data-dcnode-id="2340" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2337" instrument_node=""> and the clause introducing AV was passed at committee stage by 277 to 251.</span><sup class="reference" data-dcnode-id="2334" id="cite_ref-21"><a data-dcnode-id="2335" href="#cite_note-21"><span data-dcnode-id="2336" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2333" instrument_node=""> (The Speaker had refused to allow discussion of STV.</span><sup class="reference" data-dcnode-id="2330" id="cite_ref-22"><a data-dcnode-id="2331" href="#cite_note-22"><span data-dcnode-id="2332" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2329" instrument_node="">) The Bill's second reading in the Lords followed in June, with an amendment replacing AV with STV in 100 constituencies being abandoned as outside the scope of the Bill.</span><sup class="reference" data-dcnode-id="2326" id="cite_ref-23"><a data-dcnode-id="2327" href="#cite_note-23"><span data-dcnode-id="2328" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2325" instrument_node=""> An amendment was passed by 80 votes to 29 limiting AV to constituencies in boroughs with populations over 200,000.</span><sup class="reference" data-dcnode-id="2322" id="cite_ref-24"><a data-dcnode-id="2323" href="#cite_note-24"><span data-dcnode-id="2324" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2321" instrument_node=""> The Bill received its third reading in the Lords on 21 July, but the Labour government fell in August and the Bill was lost.</span><sup class="reference" data-dcnode-id="2318" id="cite_ref-Butler_DE_1953_19-2"><a data-dcnode-id="2319" href="#cite_note-Butler_DE_1953-19"><span data-dcnode-id="2320" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="2315" id="cite_ref-25"><a data-dcnode-id="2316" href="#cite_note-25"><span data-dcnode-id="2317" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2314" instrument_node="">
</span></p><p data-dcnode-id="2302"><span data-dcnode-id="2312" instrument_node="">Following the </span><a data-dcnode-id="2310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Churchill_war_ministry" title="Churchill war ministry"><span data-dcnode-id="2311" instrument_node="">wartime coalition government</span></a><span data-dcnode-id="2309" instrument_node="">, a landslide victory for the Labour Party in </span><a data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1945_United_Kingdom_general_election" title="1945 United Kingdom general election"><span data-dcnode-id="2308" instrument_node="">1945</span></a><span data-dcnode-id="2306" instrument_node=""> began a period of two-party dominance in British electoral politics, in which the Conservatives and Labour interchanged power with almost total dominance over seats won and votes cast (See </span><a data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_United_Kingdom_general_elections" title="List of United Kingdom general elections"><span data-dcnode-id="2305" instrument_node="">British General Elections since 1945</span></a><span data-dcnode-id="2303" instrument_node="">). There existed no incentive for these parties to embrace a pluralist voting system in such a political settlement, and so neither supported it, and electoral reform fell off the radar for several decades.
</span></p><p data-dcnode-id="2279"><span data-dcnode-id="2301" instrument_node="">With the rise of the </span><a data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SDP%25E2%2580%2593Liberal_Alliance" title="SDP–Liberal Alliance"><span data-dcnode-id="2300" instrument_node="">SDP-Liberal Alliance</span></a><span data-dcnode-id="2298" instrument_node=""> in </span><a data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Limehouse_Declaration" title="Limehouse Declaration"><span data-dcnode-id="2297" instrument_node="">1981</span></a><span data-dcnode-id="2295" instrument_node="">, Britain now featured a popular third-party bloc who supported significant reform of the voting and parliamentary systems. Several </span><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opinion_polling_for_the_1983_United_Kingdom_general_election" title="Opinion polling for the 1983 United Kingdom general election"><span data-dcnode-id="2294" instrument_node="">polls throughout the early 1980s</span></a><span data-dcnode-id="2292" instrument_node=""> placed the Alliance in front of Labour and the Conservatives, and nearly all had them within contention. The continuing Liberal Party had until then received minimal support at elections and little influence on government, with the brief exception of the </span><a data-dcnode-id="2290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lib%25E2%2580%2593Lab_pact%231977" title="Lib–Lab pact"><span data-dcnode-id="2291" instrument_node="">Lib-Lab Pact</span></a><span data-dcnode-id="2289" instrument_node=""> in the late 1970s, but in which their influence was somewhat limited. Despite receiving roughly a quarter of the popular vote in both </span><a data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1983_United_Kingdom_general_election" title="1983 United Kingdom general election"><span data-dcnode-id="2288" instrument_node="">1983</span></a><span data-dcnode-id="2286" instrument_node=""> and </span><a data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1987_United_Kingdom_general_election" title="1987 United Kingdom general election"><span data-dcnode-id="2285" instrument_node="">1987</span></a><span data-dcnode-id="2283" instrument_node=""> however, few SDP-Liberal candidates were elected owing to FPTP requiring a </span><a data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plurality_voting" title="Plurality voting"><span data-dcnode-id="2282" instrument_node="">plurality in each constituency</span></a><span data-dcnode-id="2280" instrument_node=""> and their vote being spread far more evenly geographically than the main parties. Therefore, the Conservatives, who benefited from overrepresentation of their vote and underrepresentation of the Alliance vote, won large majorities during this period and reform remained off the agenda.
</span></p><p data-dcnode-id="2258"><a data-dcnode-id="2277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elections_to_the_European_Parliament" title="Elections to the European Parliament"><span data-dcnode-id="2278" instrument_node="">Elections to the European Parliament</span></a><span data-dcnode-id="2276" instrument_node=""> in mainland Britain from their start in </span><a data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1979_European_Parliament_election_in_the_United_Kingdom" title="1979 European Parliament election in the United Kingdom"><span data-dcnode-id="2275" instrument_node="">1979</span></a><span data-dcnode-id="2273" instrument_node=""> used FPTP, but were switched to list PR in the </span><a data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1999_European_Parliament_election_in_the_United_Kingdom" title="1999 European Parliament election in the United Kingdom"><span data-dcnode-id="2272" instrument_node="">1999 elections</span></a><span data-dcnode-id="2270" instrument_node=""> following pressure to standardise with the rest of the EU.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2263" style="white-space:nowrap;"><span data-dcnode-id="2269" instrument_node="">[</span><i data-dcnode-id="2265"><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2267" title="This claim needs references to reliable sources. (November 2017)"><span data-dcnode-id="2268" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2264" instrument_node="">]</span></sup><sup class="reference" data-dcnode-id="2260" id="cite_ref-26"><a data-dcnode-id="2261" href="#cite_note-26"><span data-dcnode-id="2262" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2259" instrument_node="">
</span></p><p data-dcnode-id="2206"><span data-dcnode-id="2257" instrument_node="">When Labour regained power in </span><a data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1997_United_Kingdom_general_election" title="1997 United Kingdom general election"><span data-dcnode-id="2256" instrument_node="">1997</span></a><span data-dcnode-id="2254" instrument_node="">, they had committed in their manifesto to a slew of new reformist policies relating to modernisation and democratisation of various institutions through electoral reform.</span><sup class="reference" data-dcnode-id="2251" id="cite_ref-27"><a data-dcnode-id="2252" href="#cite_note-27"><span data-dcnode-id="2253" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2250" instrument_node=""> For General Elections, they had committed to implementing the findings of the </span><a data-dcnode-id="2248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jenkins_Commission_%28UK%29" title="Jenkins Commission (UK)"><span data-dcnode-id="2249" instrument_node="">Jenkins Commission</span></a><span data-dcnode-id="2247" instrument_node="">, which was set up to evaluate flaws in FPTP and propose a new electoral system that would suit the quirks of British politics. The commission reported back, including a proposal for AV+, but its findings were not embraced by the government and were never put before the House of Commons, therefore FPTP remained in place for these elections. They introduced a number of new assemblies, in </span><a data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London_Assembly" title="London Assembly"><span data-dcnode-id="2246" instrument_node="">London</span></a><span data-dcnode-id="2244" instrument_node="">, </span><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Senedd" title="Senedd"><span data-dcnode-id="2243" instrument_node="">Wales</span></a><span data-dcnode-id="2241" instrument_node=""> and </span><a data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scottish_Parliament" title="Scottish Parliament"><span data-dcnode-id="2240" instrument_node="">Scotland</span></a><span data-dcnode-id="2238" instrument_node="">, and opted for </span><a data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Additional_member_system" title="Additional member system"><span data-dcnode-id="2237" instrument_node="">additional member systems</span></a><span data-dcnode-id="2235" instrument_node=""> of PR in all of these. They also adopted the </span><a data-dcnode-id="2233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supplementary_vote" title="Supplementary vote"><span data-dcnode-id="2234" instrument_node="">supplementary vote</span></a><span data-dcnode-id="2232" instrument_node=""> system for directly elected mayors. While not specifically committing to elections by name, they had promised to abolish all </span><a data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hereditary_peer" title="Hereditary peer"><span data-dcnode-id="2231" instrument_node="">hereditary peers</span></a><span data-dcnode-id="2229" instrument_node=""> in the House of Lords and establish a system by which representation in the Lords "more accurately reflected the proportion of votes cast at the previous election." Having faced continual pressure against any reform from the Lords themselves, Blair was forced to water-down his proposals and </span><a data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_of_the_House_of_Lords%23The_Blair_Labour_government" title="Reform of the House of Lords"><span data-dcnode-id="2228" instrument_node="">agree to a settlement</span></a><span data-dcnode-id="2226" instrument_node=""> with Conservative leader in the Lords in which 92 hereditary peers would remain, along with faith-based peers, and all others would be life peers appointed by either the Prime Minister directly, or on the recommendation of an independent panel. In Scotland, a Labour/Liberal Democrat coalition in the new Scottish Parliament later introduced STV for local elections. However, such reforms encountered problems.  When 7% of votes (over 140,000) were discounted or spoilt in the 2007 Scottish Parliamentary and </span><a data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Local_government_in_the_United_Kingdom" title="Local government in the United Kingdom"><span data-dcnode-id="2225" instrument_node="">local council</span></a><span data-dcnode-id="2223" instrument_node=""> elections, </span><a class="mw-redirect" data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scottish_First_Minister" title="Scottish First Minister"><span data-dcnode-id="2222" instrument_node="">Scottish First Minister</span></a><span data-dcnode-id="2220" instrument_node=""> </span><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alex_Salmond" title="Alex Salmond"><span data-dcnode-id="2219" instrument_node="">Alex Salmond</span></a><span data-dcnode-id="2217" instrument_node=""> protested that "the decision to conduct an STV election at the same time as a </span><a class="mw-redirect" data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First-past-the-post" title="First-past-the-post"><span data-dcnode-id="2216" instrument_node="">first-past-the-post</span></a><span data-dcnode-id="2214" instrument_node=""> ballot for the </span><a data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scottish_Parliament" title="Scottish Parliament"><span data-dcnode-id="2213" instrument_node="">Scottish Parliament</span></a><span data-dcnode-id="2211" instrument_node=""> was deeply mistaken".</span><sup class="reference" data-dcnode-id="2208" id="cite_ref-28"><a data-dcnode-id="2209" href="#cite_note-28"><span data-dcnode-id="2210" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2207" instrument_node="">
</span></p><p data-dcnode-id="2168"><span data-dcnode-id="2205" instrument_node="">In the </span><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2010_United_Kingdom_general_election" title="2010 United Kingdom general election"><span data-dcnode-id="2204" instrument_node="">2010 general election</span></a><span data-dcnode-id="2202" instrument_node=""> campaign, the possibility of a </span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hung_parliament" title="Hung parliament"><span data-dcnode-id="2201" instrument_node="">hung parliament</span></a><span data-dcnode-id="2199" instrument_node=""> and the earlier expenses scandal pushed electoral reform up the agenda, something long supported by the Liberal Democrats. There were protests in favour of electoral reform organised by </span><a data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Take_Back_Parliament" title="Take Back Parliament"><span data-dcnode-id="2198" instrument_node="">Take Back Parliament</span></a><span data-dcnode-id="2196" instrument_node="">.</span><sup class="reference" data-dcnode-id="2193" id="cite_ref-29"><a data-dcnode-id="2194" href="#cite_note-29"><span data-dcnode-id="2195" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2192" instrument_node=""> The Conservative-Liberal Democrat coalition government held </span><a data-dcnode-id="2190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2011_United_Kingdom_Alternative_Vote_referendum" title="2011 United Kingdom Alternative Vote referendum"><span data-dcnode-id="2191" instrument_node="">a referendum</span></a><span data-dcnode-id="2189" instrument_node=""> on introducing AV for the Commons on 5 May 2011, which, despite commitments to review the voting system for "fair vote reforms" in the Conservative manifesto,</span><sup class="reference" data-dcnode-id="2186" id="cite_ref-30"><a data-dcnode-id="2187" href="#cite_note-30"><span data-dcnode-id="2188" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2185" instrument_node=""> and an unequivocal backing of AV from the Labour Party in their manifesto,</span><sup class="reference" data-dcnode-id="2182" id="cite_ref-:0_31-0"><a data-dcnode-id="2183" href="#cite_note-:0-31"><span data-dcnode-id="2184" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2181" instrument_node=""> was met by campaigning for No, and indifference with no clear or consistent party position, respectively.</span><sup class="reference" data-dcnode-id="2178" id="cite_ref-32"><a data-dcnode-id="2179" href="#cite_note-32"><span data-dcnode-id="2180" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2177" instrument_node=""> It was comprehensively defeated.</span><sup class="reference" data-dcnode-id="2174" id="cite_ref-33"><a data-dcnode-id="2175" href="#cite_note-33"><span data-dcnode-id="2176" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2173" instrument_node=""> The result of the referendum has had long-lasting political repercussions, being cited by later Conservative governments as proof that public opinion was decidedly against any reform of the voting system.</span><sup class="reference" data-dcnode-id="2170" id="cite_ref-34"><a data-dcnode-id="2171" href="#cite_note-34"><span data-dcnode-id="2172" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2169" instrument_node=""> As the Conservatives have been in government in some form or another since, electoral reform has never seriously been close to implementation post-2011.
</span></p><p data-dcnode-id="2150"><span data-dcnode-id="2167" instrument_node="">The coalition had also committed to reforming the House of Lords into a primarily elected body, and </span><a data-dcnode-id="2165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Lords_Reform_Bill_2012" title="House of Lords Reform Bill 2012"><span data-dcnode-id="2166" instrument_node="">a bill proposing elections under PR</span></a><span data-dcnode-id="2164" instrument_node=""> determining the majority of membership was put before the House in 2012. The bill was pulled before passage however, as while the government imposed a three-line whip on its MPs to support the measure, an enormous rebellion of Conservatives was brewing. Matters were not helped by the Labour Party promising to vote against the measures, despite having promised to support similar such measures in the manifesto in 2010.</span><sup class="reference" data-dcnode-id="2161" id="cite_ref-:0_31-1"><a data-dcnode-id="2162" href="#cite_note-:0-31"><span data-dcnode-id="2163" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2160" instrument_node=""> To avoid a painful and humiliating defeat, Deputy Prime Minister </span><a data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nick_Clegg" title="Nick Clegg"><span data-dcnode-id="2159" instrument_node="">Nick Clegg</span></a><span data-dcnode-id="2157" instrument_node="">, who had instigated the bill’s passage and whose Liberal Democrat party had long-since supported the reform, was forced to back down. Clegg accused the Conservatives of breaking the coalition agreement, and Prime Minister David Cameron was said to be furious at his backbenchers for endangering the government’s stability and authority. (</span><i data-dcnode-id="2152"><span data-dcnode-id="2156" instrument_node="">See main article: </span><a data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Lords_Reform_Bill_2012" title="House of Lords Reform Bill 2012"><span data-dcnode-id="2155" instrument_node="">House of Lords Reform Bill 2012</span></a><span data-dcnode-id="2153" instrument_node="">)</span></i><span data-dcnode-id="2151" instrument_node="">
</span></p><p data-dcnode-id="2098"><span data-dcnode-id="2149" instrument_node="">The </span><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2015_United_Kingdom_general_election" title="2015 United Kingdom general election"><span data-dcnode-id="2148" instrument_node="">2015 general election</span></a><span data-dcnode-id="2146" instrument_node=""> was expected to deliver a hung parliament. In the end the </span><a data-dcnode-id="2144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservative_Party_%28UK%29" title="Conservative Party (UK)"><span data-dcnode-id="2145" instrument_node="">Conservative Party</span></a><span data-dcnode-id="2143" instrument_node=""> won a narrow majority, winning 51% of the seats on 37% of the national vote, but the </span><a data-dcnode-id="2141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_Party_of_England_and_Wales" title="Green Party of England and Wales"><span data-dcnode-id="2142" instrument_node="">Green Party</span></a><span data-dcnode-id="2140" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UKIP" title="UKIP"><span data-dcnode-id="2139" instrument_node="">UKIP</span></a><span data-dcnode-id="2137" instrument_node=""> and the </span><a data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Democrats_%28UK%29" title="Liberal Democrats (UK)"><span data-dcnode-id="2136" instrument_node="">Liberal Democrats</span></a><span data-dcnode-id="2134" instrument_node=""> were under-represented and the </span><a data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scottish_National_Party" title="Scottish National Party"><span data-dcnode-id="2133" instrument_node="">Scottish National Party</span></a><span data-dcnode-id="2131" instrument_node=""> over-represented in the results compared to a proportional system.</span><sup class="reference" data-dcnode-id="2128" id="cite_ref-35"><a data-dcnode-id="2129" href="#cite_note-35"><span data-dcnode-id="2130" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2127" instrument_node=""> As a result, both during the campaign and after, there were various calls for electoral reform.</span><sup class="reference" data-dcnode-id="2124" id="cite_ref-36"><a data-dcnode-id="2125" href="#cite_note-36"><span data-dcnode-id="2126" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2123" instrument_node=""> </span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nigel_Farage" title="Nigel Farage"><span data-dcnode-id="2122" instrument_node="">Nigel Farage</span></a><span data-dcnode-id="2120" instrument_node="">, leader of UKIP, declared support for AV+.</span><sup class="reference" data-dcnode-id="2117" id="cite_ref-37"><a data-dcnode-id="2118" href="#cite_note-37"><span data-dcnode-id="2119" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2116" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="2114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baron_O%2527Donnell" title="Baron O'Donnell"><span data-dcnode-id="2115" instrument_node="">Baron O'Donnell</span></a><span data-dcnode-id="2113" instrument_node="">, the </span><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cabinet_Secretary_%28United_Kingdom%29" title="Cabinet Secretary (United Kingdom)"><span data-dcnode-id="2112" instrument_node="">Cabinet Secretary</span></a><span data-dcnode-id="2110" instrument_node=""> from 2005 to 2011, argued that FPTP is not fit for purpose given the move towards multi-party politics seen in the country.</span><sup class="reference" data-dcnode-id="2107" id="cite_ref-38"><a data-dcnode-id="2108" href="#cite_note-38"><span data-dcnode-id="2109" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2106" instrument_node=""> Journalist </span><a data-dcnode-id="2104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeremy_Paxman" title="Jeremy Paxman"><span data-dcnode-id="2105" instrument_node="">Jeremy Paxman</span></a><span data-dcnode-id="2103" instrument_node=""> also supported a move away from FPTP.</span><sup class="reference" data-dcnode-id="2100" id="cite_ref-39"><a data-dcnode-id="2101" href="#cite_note-39"><span data-dcnode-id="2102" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2099" instrument_node="">
</span></p><p data-dcnode-id="2089"><span data-dcnode-id="2097" instrument_node="">In 2016, it was reported that in a conversation with a Labour peer in 1997, the </span><a data-dcnode-id="2095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_II" title="Elizabeth II"><span data-dcnode-id="2096" instrument_node="">Queen</span></a><span data-dcnode-id="2094" instrument_node=""> had expressed her opposition to changing the voting system to proportional representation.</span><sup class="reference" data-dcnode-id="2091" id="cite_ref-40"><a data-dcnode-id="2092" href="#cite_note-40"><span data-dcnode-id="2093" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2090" instrument_node="">
</span></p><p data-dcnode-id="2058"><span data-dcnode-id="2088" instrument_node="">In 2021 home secretary </span><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Priti_Patel" title="Priti Patel"><span data-dcnode-id="2087" instrument_node="">Priti Patel</span></a><span data-dcnode-id="2085" instrument_node=""> proposed replacing the </span><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supplementary_vote" title="Supplementary vote"><span data-dcnode-id="2084" instrument_node="">supplementary vote</span></a><span data-dcnode-id="2082" instrument_node=""> method used in some elections in England and Wales with first-past-the-post. The posts affected are the </span><a data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mayor_of_London" title="Mayor of London"><span data-dcnode-id="2081" instrument_node="">Mayor of London</span></a><span data-dcnode-id="2079" instrument_node="">, elected mayors in nine </span><a data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Combined_authority" title="Combined authority"><span data-dcnode-id="2078" instrument_node="">combined authorities</span></a><span data-dcnode-id="2076" instrument_node=""> in England, and </span><a data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Police_and_crime_commissioner" title="Police and crime commissioner"><span data-dcnode-id="2075" instrument_node="">police and crime commissioners</span></a><span data-dcnode-id="2073" instrument_node=""> in England and Wales.</span><sup class="reference" data-dcnode-id="2070" id="cite_ref-41"><a data-dcnode-id="2071" href="#cite_note-41"><span data-dcnode-id="2072" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2069" instrument_node=""> In the </span><a class="mw-redirect" data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Queen%2527s_Speech" title="Queen's Speech"><span data-dcnode-id="2068" instrument_node="">Queen's Speech</span></a><span data-dcnode-id="2066" instrument_node=""> of May that year, the Government proposed the introduction of compulsory </span><a class="mw-redirect" data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Photo_ID" title="Photo ID"><span data-dcnode-id="2065" instrument_node="">Photo ID</span></a><span data-dcnode-id="2063" instrument_node=""> for voters in England and in UK-wide elections.</span><sup class="reference" data-dcnode-id="2060" id="cite_ref-42"><a data-dcnode-id="2061" href="#cite_note-42"><span data-dcnode-id="2062" instrument_node="">[42]</span></a></sup><span data-dcnode-id="2059" instrument_node="">
</span></p><p data-dcnode-id="1992"><span data-dcnode-id="2057" instrument_node="">A number of groups in the </span><a data-dcnode-id="2055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="2056" instrument_node="">United Kingdom</span></a><span data-dcnode-id="2054" instrument_node=""> are campaigning for electoral reform including the </span><a data-dcnode-id="2052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_Reform_Society" title="Electoral Reform Society"><span data-dcnode-id="2053" instrument_node="">Electoral Reform Society</span></a><span data-dcnode-id="2051" instrument_node="">, </span><a data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Make_Votes_Matter" title="Make Votes Matter"><span data-dcnode-id="2050" instrument_node="">Make Votes Matter</span></a><span data-dcnode-id="2048" instrument_node="">, Make Votes Count Coalition, Fairshare, and the </span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_Campaign_for_Electoral_Reform" title="Labour Campaign for Electoral Reform"><span data-dcnode-id="2047" instrument_node="">Labour Campaign for Electoral Reform</span></a><span data-dcnode-id="2045" instrument_node="">. In the lead up to, and especially since the </span><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2019_United_Kingdom_general_election" title="2019 United Kingdom general election"><span data-dcnode-id="2044" instrument_node="">2019 General Election</span></a><span data-dcnode-id="2042" instrument_node="">, various anti-Brexit pressure groups and online political influencers have pivoted to a stance supporting and calling for widespread tactical voting to bring about more favourable election results under FPTP to those parties that support reform, most notably </span><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Best_for_Britain" title="Best for Britain"><span data-dcnode-id="2041" instrument_node="">Best for Britain</span></a><span data-dcnode-id="2039" instrument_node="">.</span><sup class="reference" data-dcnode-id="2036" id="cite_ref-43"><a data-dcnode-id="2037" href="#cite_note-43"><span data-dcnode-id="2038" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2035" instrument_node=""> In its most comprehensive form, such proposals include a national roll-out of the </span><a data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unite_to_Remain" title="Unite to Remain"><span data-dcnode-id="2034" instrument_node="">Unite to Remain pact</span></a><span data-dcnode-id="2032" instrument_node=""> in 2019, in which the Liberal Democrats, Greens, and Plaid Cymru stood down in some constituencies and endorsed each other for election, but on a much wider scale and including the Labour Party, with the expressed aim of building a rainbow coalition that could enact PR in a new parliament.</span><sup class="reference" data-dcnode-id="2029" id="cite_ref-44"><a data-dcnode-id="2030" href="#cite_note-44"><span data-dcnode-id="2031" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2028" instrument_node=""> Their campaign for soft-left cooperation is ongoing and have primarily focused on social media initiatives and sponsoring research into voting patterns.</span><sup class="reference" data-dcnode-id="2025" id="cite_ref-45"><a data-dcnode-id="2026" href="#cite_note-45"><span data-dcnode-id="2027" instrument_node="">[45]</span></a></sup><span data-dcnode-id="2024" instrument_node=""> While a so-called </span><a data-dcnode-id="2022" href="https://chatnoir-webc
