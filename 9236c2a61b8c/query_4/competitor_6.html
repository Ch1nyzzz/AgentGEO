</span><p data-dcnode-id="3055"><span data-dcnode-id="3068" instrument_node="">An </span><b data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">Ontario electoral reform referendum</span></b><span data-dcnode-id="3065" instrument_node=""> was held on October 10, 2007, on the question of whether to establish a </span><a class="mw-redirect" data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mixed_member_proportional_representation" title="Mixed member proportional representation"><span data-dcnode-id="3064" instrument_node="">mixed member proportional representation</span></a><span data-dcnode-id="3062" instrument_node=""> (MMP) system for elections to the </span><a data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legislative_Assembly_of_Ontario" title="Legislative Assembly of Ontario"><span data-dcnode-id="3061" instrument_node="">Legislative Assembly of Ontario</span></a><span data-dcnode-id="3059" instrument_node="">. The vote was strongly in favour of the existing </span><a class="mw-redirect" data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plurality_voting_system" title="Plurality voting system"><span data-dcnode-id="3058" instrument_node="">plurality voting</span></a><span data-dcnode-id="3056" instrument_node=""> or first-past-the-post (FPTP) system.

</span><h2 data-dcnode-id="2820"><span class="mw-headline" data-dcnode-id="2828" id="Background"><span data-dcnode-id="2829" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="2821"><span class="mw-editsection-bracket" data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">[</span></span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D1" title="Edit section: Background"><span data-dcnode-id="2825" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2819" instrument_node="">
</span><p data-dcnode-id="2814"><span data-dcnode-id="2818" instrument_node="">Currently, Ontario elects Members of Provincial Parliament (MPPs) using the </span><a class="mw-redirect" data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Single_member_plurality" title="Single member plurality"><span data-dcnode-id="2817" instrument_node="">single member plurality</span></a><span data-dcnode-id="2815" instrument_node="">, or first-past-the-post (FPTP), system. In this system, each voter gives one vote to a candidate in an electoral district; the candidate with the most votes wins. In most cases, the party with the most elected candidates is asked to form a government.
</span></p><p data-dcnode-id="2793"><span data-dcnode-id="2813" instrument_node="">The initiative to reform this system was first proposed in 2001 by the Liberal Party opposition leader of the time, </span><a data-dcnode-id="2811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dalton_McGuinty" title="Dalton McGuinty"><span data-dcnode-id="2812" instrument_node="">Dalton McGuinty</span></a><span data-dcnode-id="2810" instrument_node="">. The impetus for the proposal was at least in part the experience of the province with two successive majority governments elected in three consecutive elections with less than 50% of the popular vote, the NDP from 1990-95 under Bob Rae (elected in </span><a data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1990_Ontario_general_election" title="1990 Ontario general election"><span data-dcnode-id="2809" instrument_node="">1990</span></a><span data-dcnode-id="2807" instrument_node=""> with only 38% of the popular vote), and the Conservatives, twice elected with 45% of the vote in </span><a data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1995_Ontario_general_election" title="1995 Ontario general election"><span data-dcnode-id="2806" instrument_node="">1995</span></a><span data-dcnode-id="2804" instrument_node=""> and </span><a data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1999_Ontario_general_election" title="1999 Ontario general election"><span data-dcnode-id="2803" instrument_node="">1999</span></a><span data-dcnode-id="2801" instrument_node=""> under Mike Harris. When the Harris government enacted sweeping changes in public services, a feeling developed that both of these governments lacked a sufficient democratic mandate to justify the extent of such changes.</span><sup class="reference" data-dcnode-id="2798" id="cite_ref-1"><a data-dcnode-id="2799" href="#cite_note-1"><span data-dcnode-id="2800" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2797" instrument_node=""> The Liberals won a landslide majority of their own in </span><a data-dcnode-id="2795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2003_Ontario_general_election" title="2003 Ontario general election"><span data-dcnode-id="2796" instrument_node="">October 2003</span></a><span data-dcnode-id="2794" instrument_node="">, winning 70% of the seats with 45% of the vote.
</span></p><p data-dcnode-id="2780"><span data-dcnode-id="2792" instrument_node="">On November 18, 2004, Premier McGuinty announced that a citizens’ assembly would be established to examine the FPTP electoral system and recommend possible changes to be voted upon by referendum in the next provincial election.</span><sup class="reference" data-dcnode-id="2789" id="cite_ref-PRB_04-17E_2-0"><a data-dcnode-id="2790" href="#cite_note-PRB_04-17E-2"><span data-dcnode-id="2791" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2788" instrument_node=""> Enabling legislation to implement these measures —the Election Amendment Act, 2005— received Royal Assent on June 13, 2005. It included provisions for Elections Ontario to select volunteers for a </span><a class="mw-redirect" data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ontario_Citizens%2527_Assembly_on_Electoral_Reform" title="Ontario Citizens' Assembly on Electoral Reform"><span data-dcnode-id="2787" instrument_node="">Citizens’ Assembly on Electoral Reform</span></a><span data-dcnode-id="2785" instrument_node="">. An all-party Committee on Electoral Reform was also created to consider and report on options for electoral reform. Its report was submitted in November 2005. It included a number of recommendations and defined the Citizen's Assembly's mandate.</span><sup class="reference" data-dcnode-id="2782" id="cite_ref-3"><a data-dcnode-id="2783" href="#cite_note-3"><span data-dcnode-id="2784" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2781" instrument_node="">
</span></p><p data-dcnode-id="2768"><span data-dcnode-id="2779" instrument_node="">The Ontario Citizen's Assembly was modeled primarily on the </span><a data-dcnode-id="2777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Citizens%2527_Assembly_on_Electoral_Reform_%28British_Columbia%29" title="Citizens' Assembly on Electoral Reform (British Columbia)"><span data-dcnode-id="2778" instrument_node="">British Columbia Citizens' Assembly on Electoral Reform</span></a><span data-dcnode-id="2776" instrument_node=""> established as the first of its kind in 2002, leading up to the </span><a data-dcnode-id="2774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2005_British_Columbia_electoral_reform_referendum" title="2005 British Columbia electoral reform referendum"><span data-dcnode-id="2775" instrument_node="">British Columbia referendum in 2005</span></a><span data-dcnode-id="2773" instrument_node="">. It was composed of 103 members, one from each of Ontario's existing ridings, including 51 women, 51 men, and one native member. Its deliberations began in September 2006 and ended with the Assembly's final meeting on April 28, 2007. Proceedings included a learning phase as members learned about the strengths and weaknesses of different electoral systems, a period of public consultations, and a "deliberative" phase during which the Assembly came to a consensus on its recommendations.</span><sup class="reference" data-dcnode-id="2770" id="cite_ref-4"><a data-dcnode-id="2771" href="#cite_note-4"><span data-dcnode-id="2772" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2769" instrument_node="">
</span></p><span data-dcnode-id="2767" instrument_node="">
</span><h2 data-dcnode-id="2757"><span class="mw-headline" data-dcnode-id="2765" id="Proposed_changes_to_the_electoral_system"><span data-dcnode-id="2766" instrument_node="">Proposed changes to the electoral system</span></span><span class="mw-editsection" data-dcnode-id="2758"><span class="mw-editsection-bracket" data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">[</span></span><a data-dcnode-id="2761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D2" title="Edit section: Proposed changes to the electoral system"><span data-dcnode-id="2762" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2756" instrument_node="">
</span><p data-dcnode-id="2751"><span data-dcnode-id="2755" instrument_node="">The Citizens' Assembly on Electoral Reform proposed a </span><a class="mw-redirect" data-dcnode-id="2753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mixed_member_proportional_representation" title="Mixed member proportional representation"><span data-dcnode-id="2754" instrument_node="">mixed member proportional representation</span></a><span data-dcnode-id="2752" instrument_node=""> (MMP) system. Although there exist slightly different variants of MMP, the model proposed for Ontario by the Citizen's Assembly was designed with simplicity and practicality in mind.
</span></p><span data-dcnode-id="2750" instrument_node="">
</span><h3 data-dcnode-id="2740"><span class="mw-headline" data-dcnode-id="2748" id="The_general_idea"><span data-dcnode-id="2749" instrument_node="">The general idea</span></span><span class="mw-editsection" data-dcnode-id="2741"><span class="mw-editsection-bracket" data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">[</span></span><a data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D3" title="Edit section: The general idea"><span data-dcnode-id="2745" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2739" instrument_node="">
</span><p data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">As is usually the case in MMP systems, each voter would cast two votes: 
</span></p><span data-dcnode-id="2736" instrument_node="">
</span><ul data-dcnode-id="2730"><li data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">one for a local candidate and</span></li><span data-dcnode-id="2733" instrument_node="">
</span><li data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">one for a political party.</span></li></ul><span data-dcnode-id="2729" instrument_node="">
</span><p data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">The local member would be elected according to the usual FPTP mechanism. These members would represent the electoral district, as in the past.
</span></p><p data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">However, there would also be a number of "list seats." The second ballot would be used to determine what share of total seats (local + list) should be proportionately assigned to each party to ensure proportionality of the overall result.
</span></p><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">The proposed Legislature would have 129 seats consisting of 90 local members (70% of the Legislature) and 39 list members (30% of the Legislature). The conventions as to which party is asked to form a government would remain unchanged.
</span></p><span data-dcnode-id="2722" instrument_node="">
</span><h3 data-dcnode-id="2712"><span class="mw-headline" data-dcnode-id="2720" id="The_use_of_party_lists"><span data-dcnode-id="2721" instrument_node="">The use of party lists</span></span><span class="mw-editsection" data-dcnode-id="2713"><span class="mw-editsection-bracket" data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">[</span></span><a data-dcnode-id="2716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D4" title="Edit section: The use of party lists"><span data-dcnode-id="2717" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2711" instrument_node="">
</span><p data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">List members would be chosen according to a ranked list of candidates proposed by each party before the election. In the Assembly's proposal, there would be only one such list per party for the whole province, as opposed to several regional lists, and it could include candidates also running for office locally. If a candidate for a list member seat had already been elected locally by the time that list seats were being allocated, that candidate's name would simply be passed over in favour of the next candidate on that party list.
</span></p><span data-dcnode-id="2708" instrument_node="">
</span><h3 data-dcnode-id="2698"><span class="mw-headline" data-dcnode-id="2706" id="The_largest_remainder_issue"><span data-dcnode-id="2707" instrument_node="">The largest remainder issue</span></span><span class="mw-editsection" data-dcnode-id="2699"><span class="mw-editsection-bracket" data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">[</span></span><a data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D5" title="Edit section: The largest remainder issue"><span data-dcnode-id="2703" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2697" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">The number of seats won by a party would be calculated by multiplying a party's share of the party vote by the total number of seats in the province. As this multiplication would not automatically yield a round number, the fractional part would be allocated in favour of the party or parties with the largest fractions.
</span></p><p data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">For example, if there were four parties with party votes yielding 45.43, 31.54, 24.76 and 5.27 seats respectively for a total of 107, the initial allocation without the fractions would be 45, 31, 24 and 5, for a total of 105 seats so far. This would leave two seats to be allocated on the basis of fractions; in this example, these seats would go to the second and third parties. The final tally of seats would thus be 45, 32, 25 and 5.
</span></p><p data-dcnode-id="2673"><span data-dcnode-id="2692" instrument_node="">This approach to allocating the fractional seats is called the </span><a data-dcnode-id="2690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Largest_remainder_method" title="Largest remainder method"><span data-dcnode-id="2691" instrument_node="">largest remainder method</span></a><span data-dcnode-id="2689" instrument_node="">. The result is as close to </span><a data-dcnode-id="2687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proportional_representation" title="Proportional representation"><span data-dcnode-id="2688" instrument_node="">proportionality</span></a><span data-dcnode-id="2686" instrument_node=""> as possible using a simple method given the need to allocate the fractional seats in some way. However it is not necessarily as close as that from the more complex </span><a class="mw-redirect" data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sainte-Lague_method" title="Sainte-Lague method"><span data-dcnode-id="2685" instrument_node="">Sainte-Lague method</span></a><span data-dcnode-id="2683" instrument_node=""> used for </span><a data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_system_of_New_Zealand" title="Electoral system of New Zealand"><span data-dcnode-id="2682" instrument_node="">New Zealand's MMP system</span></a><span data-dcnode-id="2680" instrument_node="">, given that unlike the latter formula the </span><a data-dcnode-id="2678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Largest_remainder_method" title="Largest remainder method"><span data-dcnode-id="2679" instrument_node="">largest remainder method</span></a><span data-dcnode-id="2677" instrument_node=""> may result in the so-called </span><a data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Apportionment_paradox" title="Apportionment paradox"><span data-dcnode-id="2676" instrument_node="">Apportionment paradox</span></a><span data-dcnode-id="2674" instrument_node=""> in allocating seats.
</span></p><span data-dcnode-id="2672" instrument_node="">
</span><h3 data-dcnode-id="2662"><span class="mw-headline" data-dcnode-id="2670" id="The_Allocation_of_list_members_seats"><span data-dcnode-id="2671" instrument_node="">The Allocation of list members seats</span></span><span class="mw-editsection" data-dcnode-id="2663"><span class="mw-editsection-bracket" data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">[</span></span><a data-dcnode-id="2666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D6" title="Edit section: The Allocation of list members seats"><span data-dcnode-id="2667" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2661" instrument_node="">
</span><p data-dcnode-id="2655"><span data-dcnode-id="2660" instrument_node="">Since the number of local seats is established by the election results at the local level, what remains to be done is to fill in the difference with the required number of list member seats for each party.</span><sup class="reference" data-dcnode-id="2657" id="cite_ref-5"><a data-dcnode-id="2658" href="#cite_note-5"><span data-dcnode-id="2659" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2656" instrument_node=""> In the above example, if the first party had won 39 local seats, they would now be allocated 6 more seats from the list, for a total of 45 as determined by their share of the party vote.
</span></p><span data-dcnode-id="2654" instrument_node="">
</span><h3 data-dcnode-id="2644"><span class="mw-headline" data-dcnode-id="2652" id="No_leveling_seats_for_overhang"><span data-dcnode-id="2653" instrument_node="">No leveling seats for overhang</span></span><span class="mw-editsection" data-dcnode-id="2645"><span class="mw-editsection-bracket" data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">[</span></span><a data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D7" title="Edit section: No leveling seats for overhang"><span data-dcnode-id="2649" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2643" instrument_node="">
</span><p data-dcnode-id="2629"><span data-dcnode-id="2642" instrument_node="">A particular situation that could arise, though rarely, is that a party might win more </span><b data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">local</span></b><span data-dcnode-id="2639" instrument_node=""> seats than it would normally be allowed </span><b data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">in total</span></b><span data-dcnode-id="2636" instrument_node=""> based on its share of the party vote. This excess of seats is called an "overhang" and in some systems, a form of compensation is made for this by adding "</span><a data-dcnode-id="2634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leveling_seat" title="Leveling seat"><span data-dcnode-id="2635" instrument_node="">leveling seats</span></a><span data-dcnode-id="2633" instrument_node="">" to the other parties. The Assembly did not allow for leveling seats, accepting instead that the system would be slightly less proportional in such cases (see the article "</span><a data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Overhang_seat" title="Overhang seat"><span data-dcnode-id="2632" instrument_node="">Overhang seat</span></a><span data-dcnode-id="2630" instrument_node="">", section "Dealing with overhang seats" for the alternative method that was proposed).
</span></p><span data-dcnode-id="2628" instrument_node="">
</span><h2 data-dcnode-id="2618"><span class="mw-headline" data-dcnode-id="2626" id="Referendum_question_and_threshold"><span data-dcnode-id="2627" instrument_node="">Referendum question and threshold</span></span><span class="mw-editsection" data-dcnode-id="2619"><span class="mw-editsection-bracket" data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">[</span></span><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D8" title="Edit section: Referendum question and threshold"><span data-dcnode-id="2623" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2617" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2616" instrument_node="">On June 20, 2007, the Ontario Democratic Renewal Secretariat announced that cabinet had decided on the following wording of the referendum question:</span><sup class="reference" data-dcnode-id="2613" id="cite_ref-6"><a data-dcnode-id="2614" href="#cite_note-6"><span data-dcnode-id="2615" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2612" instrument_node="">
</span></p><span data-dcnode-id="2610" instrument_node="">
</span><blockquote data-dcnode-id="2594"><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2605"><i data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Which electoral system should Ontario use to elect members to the provincial legislature? / Quel système électoral l’Ontario devrait-il utiliser pour élire les députés provinciaux à l’Assemblée législative?</span></i><span data-dcnode-id="2606" instrument_node="">
</span></p><span data-dcnode-id="2604" instrument_node="">
</span><ul data-dcnode-id="2596"><li data-dcnode-id="2601"><i data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">The existing electoral system (First-Past-the-Post) / L’actuel système électoral (système de la majorité relative)</span></i></li><span data-dcnode-id="2600" instrument_node="">
</span><li data-dcnode-id="2597"><i data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">The alternative electoral system proposed by the Citizens’ Assembly (Mixed Member Proportional) / L’autre système électoral proposé par l’Assemblée des citoyens (système de représentation proportionnelle mixte)</span></i></li></ul><span data-dcnode-id="2595" instrument_node="">
</span></blockquote><span data-dcnode-id="2593" instrument_node="">
</span><p data-dcnode-id="2588"><span data-dcnode-id="2592" instrument_node="">This approach to wording the question was subtly more neutral than that adopted in the </span><a data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2005_British_Columbia_electoral_reform_referendum" title="2005 British Columbia electoral reform referendum"><span data-dcnode-id="2591" instrument_node="">2005 referendum in British Columbia</span></a><span data-dcnode-id="2589" instrument_node=""> in two ways: 
</span></p><span data-dcnode-id="2587" instrument_node="">
</span><ul data-dcnode-id="2581"><li data-dcnode-id="2585"><span data-dcnode-id="2586" instrument_node="">it gave equal billing to the existing FPTP system rather than asking if voters were for or against the proposed reform using a Yes / No format; and</span></li><span data-dcnode-id="2584" instrument_node="">
</span><li data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">it used the word "proposed" rather than "recommended."</span></li></ul><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2574"><span data-dcnode-id="2579" instrument_node="">To pass, the alternative system required 60% support across the board, and at least 50% support in 64 of the 107 (60% of total) ridings. If successful, the new government would have proposed and passed a new law for MMP by December 31, 2008.</span><sup class="reference" data-dcnode-id="2576" id="cite_ref-7"><a data-dcnode-id="2577" href="#cite_note-7"><span data-dcnode-id="2578" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2575" instrument_node=""> and the resolution would have been in effect in any subsequent election.
</span></p><p data-dcnode-id="2569"><span data-dcnode-id="2573" instrument_node="">The referendum was held on October 10, concurrently with the </span><a data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2007_Ontario_general_election" title="2007 Ontario general election"><span data-dcnode-id="2572" instrument_node="">2007 provincial election</span></a><span data-dcnode-id="2570" instrument_node="">, which provided for a separate referendum ballot with the referendum question.
</span></p><span data-dcnode-id="2568" instrument_node="">
</span><h2 data-dcnode-id="2558"><span class="mw-headline" data-dcnode-id="2566" id="Elections_Ontario_education_campaign"><span data-dcnode-id="2567" instrument_node="">Elections Ontario education campaign</span></span><span class="mw-editsection" data-dcnode-id="2559"><span class="mw-editsection-bracket" data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">[</span></span><a data-dcnode-id="2562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D9" title="Edit section: Elections Ontario education campaign"><span data-dcnode-id="2563" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2557" instrument_node="">
</span><p data-dcnode-id="2551"><span data-dcnode-id="2556" instrument_node="">The Ontario Citizens' Assembly recommended that a comprehensive, well-funded public education program, 
be undertaken to assist voters with their decision, beginning in May 2007 (right after it released its final report) and continuing through to the referendum in October. The Assembly recommended that the education campaign include a description of the new system and how it differs from the current system; a description of the Citizens’ Assembly process; and the Assembly's rationale for recommending a Mixed Member Proportional system for Ontario.  This would ensure that Ontarians could make an informed decision.</span><sup class="reference" data-dcnode-id="2553" id="cite_ref-8"><a data-dcnode-id="2554" href="#cite_note-8"><span data-dcnode-id="2555" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2552" instrument_node="">
</span></p><p data-dcnode-id="2545"><span data-dcnode-id="2550" instrument_node="">A June Environics poll showed that 70% of those polled were not familiar with the proposal, including over 50% who knew nothing at all about the upcoming referendum.</span><sup class="reference" data-dcnode-id="2547" id="cite_ref-9"><a data-dcnode-id="2548" href="#cite_note-9"><span data-dcnode-id="2549" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2546" instrument_node="">
</span></p><p data-dcnode-id="2532"><span data-dcnode-id="2544" instrument_node="">The McGuinty government decided to mandate Elections Ontario to direct the education campaign, but with the referendum scheduled for October 10, 2007, Elections Ontario didn't formally launch its public education campaign until August of that year.</span><sup class="reference" data-dcnode-id="2541" id="cite_ref-10"><a data-dcnode-id="2542" href="#cite_note-10"><span data-dcnode-id="2543" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2540" instrument_node=""> The projected cost for the referendum was $6.825 million,</span><sup class="reference" data-dcnode-id="2537" id="cite_ref-11"><a data-dcnode-id="2538" href="#cite_note-11"><span data-dcnode-id="2539" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2536" instrument_node=""> an amount that fell short of the minimum $13 million called for by </span><a data-dcnode-id="2534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fair_Vote_Canada" title="Fair Vote Canada"><span data-dcnode-id="2535" instrument_node="">Fair Vote Canada</span></a><span data-dcnode-id="2533" instrument_node="">. The assigned money would give one mailout to each Ontario household, a part-time Referendum Resource Officer in each of the province's ridings, a call centre and a website.
</span></p><p data-dcnode-id="2526"><span data-dcnode-id="2531" instrument_node="">According to LeDuc et al., "Elections Ontario interpreted its information mandate quite narrowly, and did not inform the public of the substance of the proposal or the competing arguments in favour of or against it."</span><sup class="reference" data-dcnode-id="2528" id="cite_ref-archive1_12-0"><a data-dcnode-id="2529" href="#cite_note-archive1-12"><span data-dcnode-id="2530" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2527" instrument_node=""> Citizens were expected to get the information they needed from various websites or from the press. Remarkably, although the Citizens' Assembly had produced a shorter version of their report and a short leaflet further summarizing it, Elections Ontario distributed neither, to the surprise and disappointment of the Citizens' Assembly. By contrast in British Columbia, the Citizens' Assembly material was distributed to every household.
</span></p><p data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Similarly, the government made no effort to explain why the Citizen's Assembly had been created, how it had conducted its hearings and deliberations, or why they had made the recommendations upon which voters were expected to pronounce themselves.
</span></p><p data-dcnode-id="2518"><span data-dcnode-id="2523" instrument_node="">The lack of information was such that by late September 2007, public understanding of the question remained very low, with 47% of respondents telling pollster Strategic Counsel they knew nothing at all about the new system, and another 41% saying they knew only "a little." Only 12% said they knew a lot.</span><sup class="reference" data-dcnode-id="2520" id="cite_ref-13"><a data-dcnode-id="2521" href="#cite_note-13"><span data-dcnode-id="2522" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2519" instrument_node="">
</span></p><span data-dcnode-id="2517" instrument_node="">
</span><h2 data-dcnode-id="2507"><span class="mw-headline" data-dcnode-id="2515" id="Support_and_opposition_for_the_proposed_reform"><span data-dcnode-id="2516" instrument_node="">Support and opposition for the proposed reform</span></span><span class="mw-editsection" data-dcnode-id="2508"><span class="mw-editsection-bracket" data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">[</span></span><a data-dcnode-id="2511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D10" title="Edit section: Support and opposition for the proposed reform"><span data-dcnode-id="2512" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2506" instrument_node="">
</span><h3 data-dcnode-id="2496"><span class="mw-headline" data-dcnode-id="2504" id="Support"><span data-dcnode-id="2505" instrument_node="">Support</span></span><span class="mw-editsection" data-dcnode-id="2497"><span class="mw-editsection-bracket" data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">[</span></span><a data-dcnode-id="2500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D11" title="Edit section: Support"><span data-dcnode-id="2501" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2495" instrument_node="">
</span><p data-dcnode-id="2476"><span data-dcnode-id="2494" instrument_node="">The </span><a data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ontario_New_Democratic_Party" title="Ontario New Democratic Party"><span data-dcnode-id="2493" instrument_node="">Ontario New Democratic Party</span></a><span data-dcnode-id="2491" instrument_node=""> supported the referendum, although party leader </span><a data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Howard_Hampton" title="Howard Hampton"><span data-dcnode-id="2490" instrument_node="">Howard Hampton</span></a><span data-dcnode-id="2488" instrument_node=""> criticized the system for giving Northern Ontario a decreased number of
ridings.</span><sup class="reference" data-dcnode-id="2485" id="cite_ref-14"><a data-dcnode-id="2486" href="#cite_note-14"><span data-dcnode-id="2487" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2484" instrument_node="">
The </span><a data-dcnode-id="2482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_Party_of_Ontario" title="Green Party of Ontario"><span data-dcnode-id="2483" instrument_node="">Green Party of Ontario</span></a><span data-dcnode-id="2481" instrument_node=""> also lent its support.</span><sup class="reference" data-dcnode-id="2478" id="cite_ref-15"><a data-dcnode-id="2479" href="#cite_note-15"><span data-dcnode-id="2480" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2477" instrument_node="">
</span></p><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">As can be seen in the individual endorsements for and against shown below, the Liberals were divided on the issue, with a greater number in support of reform than against it. However, the Premier himself did not take a position on behalf of the government.
</span></p><p data-dcnode-id="2456"><span data-dcnode-id="2473" instrument_node="">Other political parties lending their support to </span><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electoral_reform" title="Electoral reform"><span data-dcnode-id="2472" instrument_node="">electoral reform</span></a><span data-dcnode-id="2470" instrument_node=""> included the </span><a class="mw-redirect" data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Family_Coalition_Party_of_Ontario" title="Family Coalition Party of Ontario"><span data-dcnode-id="2469" instrument_node="">Family Coalition Party of Ontario</span></a><sup class="reference" data-dcnode-id="2465" id="cite_ref-16"><a data-dcnode-id="2466" href="#cite_note-16"><span data-dcnode-id="2467" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2464" instrument_node=""> and the </span><a data-dcnode-id="2462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_Canada_%28Ontario%29" title="Communist Party of Canada (Ontario)"><span data-dcnode-id="2463" instrument_node="">Communist Party of Ontario</span></a><span data-dcnode-id="2461" instrument_node="">.</span><sup class="reference" data-dcnode-id="2458" id="cite_ref-17"><a data-dcnode-id="2459" href="#cite_note-17"><span data-dcnode-id="2460" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2457" instrument_node="">
</span></p><p data-dcnode-id="2439"><span data-dcnode-id="2455" instrument_node="">The proposed system received critical support from </span><a data-dcnode-id="2453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fair_Vote_Canada" title="Fair Vote Canada"><span data-dcnode-id="2454" instrument_node="">Fair Vote Canada</span></a><span data-dcnode-id="2452" instrument_node="">, which organized the Vote for MMP campaign,</span><sup class="reference" data-dcnode-id="2449" id="cite_ref-18"><a data-dcnode-id="2450" href="#cite_note-18"><span data-dcnode-id="2451" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2448" instrument_node=""> a multi-partisan citizen-based campaign. Vote for MMP had received a long list of public endorsements</span><sup class="reference" data-dcnode-id="2445" id="cite_ref-19"><a data-dcnode-id="2446" href="#cite_note-19"><span data-dcnode-id="2447" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2444" instrument_node=""> from all parts of the political spectrum. In addition, over 140 professors of law and politics have endorsed MMP.</span><sup class="reference" data-dcnode-id="2441" id="cite_ref-20"><a data-dcnode-id="2442" href="#cite_note-20"><span data-dcnode-id="2443" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2440" instrument_node="">
</span></p><p data-dcnode-id="2423"><span data-dcnode-id="2438" instrument_node="">The women's group </span><a data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equal_Voice" title="Equal Voice"><span data-dcnode-id="2437" instrument_node="">Equal Voice</span></a><span data-dcnode-id="2435" instrument_node=""> were also critically supportive during Select Committee on Electoral Reform hearings,</span><sup class="reference" data-dcnode-id="2432" id="cite_ref-21"><a data-dcnode-id="2433" href="#cite_note-21"><span data-dcnode-id="2434" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2431" instrument_node=""> speaking in support of </span><a data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proportional_representation" title="Proportional representation"><span data-dcnode-id="2430" instrument_node="">proportional representation</span></a><span data-dcnode-id="2428" instrument_node="">. Equal Voice, with the support of the Doris Anderson Fund has organized the Equal Voice in Politics</span><sup class="reference" data-dcnode-id="2425" id="cite_ref-22"><a data-dcnode-id="2426" href="#cite_note-22"><span data-dcnode-id="2427" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2424" instrument_node=""> campaign to support MMP in the referendum.
</span></p><p data-dcnode-id="2414"><span data-dcnode-id="2422" instrument_node="">MMP was endorsed by the Ontario chapter of the </span><a data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canadian_Federation_of_Students" title="Canadian Federation of Students"><span data-dcnode-id="2421" instrument_node="">Canadian Federation of Students</span></a><span data-dcnode-id="2419" instrument_node=""> and sixteen other Ontario student unions.</span><sup class="reference" data-dcnode-id="2416" id="cite_ref-23"><a data-dcnode-id="2417" href="#cite_note-23"><span data-dcnode-id="2418" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2415" instrument_node="">
</span></p><span data-dcnode-id="2413" instrument_node="">
</span><h4 data-dcnode-id="2403"><span class="mw-headline" data-dcnode-id="2411" id="Candidates_endorsing_MMP"><span data-dcnode-id="2412" instrument_node="">Candidates endorsing MMP</span></span><span class="mw-editsection" data-dcnode-id="2404"><span class="mw-editsection-bracket" data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">[</span></span><a data-dcnode-id="2407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D12" title="Edit section: Candidates endorsing MMP"><span data-dcnode-id="2408" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">There does not appear to exist any comprehensive review of the views of 2007 election candidates from each party on the referendum. The following identifies a selection of candidates upon which information could be found.
</span></p><p data-dcnode-id="2395"><span data-dcnode-id="2399" instrument_node="">Although the </span><a data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ontario_Liberal_Party" title="Ontario Liberal Party"><span data-dcnode-id="2398" instrument_node="">Ontario Liberal Party</span></a><span data-dcnode-id="2396" instrument_node=""> had not taken a formal position on MMP, a number of Liberal candidates took a public position in favour of the proposal, including the following.

</span><h3 data-dcnode-id="2238"><span class="mw-headline" data-dcnode-id="2246" id="Opposition"><span data-dcnode-id="2247" instrument_node="">Opposition</span></span><span class="mw-editsection" data-dcnode-id="2239"><span class="mw-editsection-bracket" data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">[</span></span><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D13" title="Edit section: Opposition"><span data-dcnode-id="2243" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2237" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2236" instrument_node="">The </span><a data-dcnode-id="2234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_Party_of_Ontario" title="Freedom Party of Ontario"><span data-dcnode-id="2235" instrument_node="">Freedom Party of Ontario</span></a><span data-dcnode-id="2233" instrument_node=""> was the only party that officially opposed the proposed system, claiming that rule by a majority could be anti-democratic and incompatible with the protection of minorities and of individual rights.</span><sup class="reference" data-dcnode-id="2230" id="cite_ref-29"><a data-dcnode-id="2231" href="#cite_note-29"><span data-dcnode-id="2232" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="2227" id="cite_ref-30"><a data-dcnode-id="2228" href="#cite_note-30"><span data-dcnode-id="2229" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2226" instrument_node="">
</span></p><p data-dcnode-id="2213"><span data-dcnode-id="2224" instrument_node="">Though the </span><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progressive_Conservative_Party_of_Ontario" title="Progressive Conservative Party of Ontario"><span data-dcnode-id="2223" instrument_node="">PC</span></a><span data-dcnode-id="2221" instrument_node=""> leader at the time, </span><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Tory" title="John Tory"><span data-dcnode-id="2220" instrument_node="">John Tory</span></a><span data-dcnode-id="2218" instrument_node="">, and most PC candidates opposed electoral reform,</span><sup class="reference" data-dcnode-id="2215" id="cite_ref-31"><a data-dcnode-id="2216" href="#cite_note-31"><span data-dcnode-id="2217" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2214" instrument_node=""> the party itself did not formally take a position on the issue.
</span></p><p data-dcnode-id="2203"><span data-dcnode-id="2212" instrument_node="">As explained by LeDuc et al., the mainstream print media were "uniformly opposed to both the Assembly process and the MMP proposal".</span><sup class="reference" data-dcnode-id="2209" id="cite_ref-scorevoting1_32-0"><a data-dcnode-id="2210" href="#cite_note-scorevoting1-32"><span data-dcnode-id="2211" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2208" instrument_node=""> This included the National Post, the Globe and Mail, and the Toronto Star. A content analysis conducted by the authors showed that newspaper coverage was predominantly negative, and that it failed to go beyond the statement of objections to explain the issue to the public.</span><sup class="reference" data-dcnode-id="2205" id="cite_ref-scorevoting1_32-1"><a data-dcnode-id="2206" href="#cite_note-scorevoting1-32"><span data-dcnode-id="2207" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2204" instrument_node="">
</span></p><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">Organized opposition to the proposal included the No MMP website.
</span></p><span data-dcnode-id="2200" instrument_node="">

</span><h3 data-dcnode-id="2092"><span class="mw-headline" data-dcnode-id="2100" id="No_official_position"><span data-dcnode-id="2101" instrument_node="">No official position</span></span><span class="mw-editsection" data-dcnode-id="2093"><span class="mw-editsection-bracket" data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">[</span></span><a data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D15" title="Edit section: No official position"><span data-dcnode-id="2097" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2083"><span data-dcnode-id="2090" instrument_node="">As already noted, neither the </span><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ontario_Liberal_Party" title="Ontario Liberal Party"><span data-dcnode-id="2089" instrument_node="">Ontario Liberal Party</span></a><span data-dcnode-id="2087" instrument_node=""> nor the </span><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progressive_Conservative_Party_of_Ontario" title="Progressive Conservative Party of Ontario"><span data-dcnode-id="2086" instrument_node="">Progressive Conservative Party of Ontario</span></a><span data-dcnode-id="2084" instrument_node=""> took an official position on electoral reform. The positions of Liberal candidates on the issue varied, while most PC candidates opposed the initiative.
</span></p><p data-dcnode-id="2066"><span data-dcnode-id="2082" instrument_node="">The </span><a data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ontario_Libertarian_Party" title="Ontario Libertarian Party"><span data-dcnode-id="2081" instrument_node="">Ontario Libertarian Party</span></a><span data-dcnode-id="2079" instrument_node="">, </span><a data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ontario_Provincial_Confederation_of_Regions_Party" title="Ontario Provincial Confederation of Regions Party"><span data-dcnode-id="2078" instrument_node="">Confederation of Regions Party</span></a><span data-dcnode-id="2076" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republican_Party_of_Ontario" title="Republican Party of Ontario"><span data-dcnode-id="2075" instrument_node="">Republican Party of Ontario</span></a><span data-dcnode-id="2073" instrument_node="">, </span><a data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reform_Party_of_Ontario" title="Reform Party of Ontario"><span data-dcnode-id="2072" instrument_node="">Reform Party of Ontario</span></a><span data-dcnode-id="2070" instrument_node=""> and </span><a data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Party_for_People_with_Special_Needs" title="Party for People with Special Needs"><span data-dcnode-id="2069" instrument_node="">Party for People with Special Needs</span></a><span data-dcnode-id="2067" instrument_node=""> did not officially state a position on electoral reform.
</span></p><span data-dcnode-id="2065" instrument_node="">
</span><h2 data-dcnode-id="2055"><span class="mw-headline" data-dcnode-id="2063" id="Results"><span data-dcnode-id="2064" instrument_node="">Results</span></span><span class="mw-editsection" data-dcnode-id="2056"><span class="mw-editsection-bracket" data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">[</span></span><a data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D16" title="Edit section: Results"><span data-dcnode-id="2060" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2053" instrument_node="">The proposal was defeated, with 36.8% of the valid votes cast supporting MMP, and 63.2% in favour of retaining FPTP. For detailed results by riding and by region, see </span><a class="mw-redirect" data-dcnode-id="2051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ontario_electoral_reform_referendum%2C_2007_detailed_results" title="Ontario electoral reform referendum, 2007 detailed results"><span data-dcnode-id="2052" instrument_node="">Ontario electoral reform referendum, 2007 detailed results</span></a><span data-dcnode-id="2050" instrument_node="">.

</span><p data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">The result was decisive, with only five constituencies in the Toronto area returning a majority in favour of MMP. Four of these constituencies also elected an NDP candidate.
</span></p><span data-dcnode-id="1958" instrument_node="">
</span><h2 data-dcnode-id="1948"><span class="mw-headline" data-dcnode-id="1956" id="Analysis"><span data-dcnode-id="1957" instrument_node="">Analysis</span></span><span class="mw-editsection" data-dcnode-id="1949"><span class="mw-editsection-bracket" data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">[</span></span><a data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3D2007_Ontario_electoral_reform_referendum%26action%3Dedit%26section%3D17" title="Edit section: Analysis"><span data-dcnode-id="1953" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1946" instrument_node="">Analysis and polling conducted after the referendum identified two features that had not been well received: the proposal to increase the number of members in the legislature to make room for a certain number of list members; and the use of closed lists defined by the parties themselves as a mechanism.</span><sup class="reference" data-dcnode-id="1943" id="cite_ref-36"><a data-dcnode-id="1944" href="#cite_note-36"><span data-dcnode-id="1945" instrument_node="">[36]</span></a></sup><span data-dcnode-id="1942" instrument_node=""> Aside from this, the major factor determining the outcome was widely seen to be the lack of adequate information and understanding of both the proposal itself and the Citizen's Assembly that had given rise to it. In a pre-referendum poll conducted in April 2007 by Stratcom Research, the most commonly cited argument in opposition to the MMP proposal was lack of information about it.</span><sup class="reference" data-dcnode-id="1939" id="cite_ref-37"><a data-dcnode-id="1940" href="#cite_note-37"><span data-dcnode-id="1941" instrument_node="">[37]</span></a></sup><span data-dcnode-id="1938" instrument_node="">
</span></p><p data-dcnode-id="1929"><a data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fair_Vote_Canada" title="Fair Vote Canada"><span data-dcnode-id="1936" instrument_node="">Fair Vote Canada</span></a><span data-dcnode-id="1934" instrument_node=""> adds that the version of MMP proposed by the Citizen's Assembly differed from that proposed in 2004 by the Law Commission of Canada</span><sup class="reference" data-dcnode-id="1931" id="cite_ref-38"><a data-dcnode-id="1932" href="#cite_note-38"><span data-dcnode-id="1933" instrument_node="">[38]</span></a></sup><span data-dcnode-id="1930" instrument_node=""> in two significant ways: 
</span></p><span data-dcnode-id="1928" instrument_node="">
</span><ul data-dcnode-id="1919"><li data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">the Law Commission had proposed that voters have the ability to vote directly for party candidates in each region —an option that would have addressed voters' concerns about the use of closed lists as proposed by the Citizen's Assembly;</span></li><span data-dcnode-id="1925" instrument_node="">
</span><li data-dcnode-id="1920"><span data-dcnode-id="1924" instrument_node="">the Law Commission had proposed that at-large members should be elected at the regional level, rather than province-wide —an option that would have alleviated any possible concerns about MLAs being "locally anchored and accountable."</span><sup class="reference" data-dcnode-id="1921" id="cite_ref-39"><a data-dcnode-id="1922" href="#cite_note-39"><span data-dcnode-id="1923" instrument_node="">[39]</span></a></sup></li></ul><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1917" instrument_node="">Other analysts, such as LeDuc et al. look to the ambivalence or hostility on the part of the political elite for an explanation. For them, the lack of information and balanced analysis available to voters was not an accident, but the result of inadequate funding, an excessively limited approach to public education by Elections Ontario, a last-minute approach to informing the public, the lack of attention to the role of the Assembly, and hostility from the media elite.</span><sup class="reference" data-dcnode-id="1914" id="cite_ref-40"><a data-dcnode-id="1915" href="#cite_note-40"><span data-dcnode-id="1916" instrument_node="">[40]</span></a></sup><span data-dcnode-id="1913" instrument_node="">
</span></p><p data-dcnode-id="1906"><span data-dcnode-id="1911" instrument_node="">Also worth noting from these authors' analysis, was the evident softness of public opinion on the issue. They point to past surveys that tend to show a public that is aware of electoral issues and somewhat positive towards the issue of proportionality, but does not have particularly strong views about it. They conclude that "in Canada, and particularly in Ontario, we do not find an underlying climate of opinion that would necessarily facilitate the passage of a reform proposal."</span><sup class="reference" data-dcnode-id="1908" id="cite_ref-41"><a data-dcnode-id="1909" href="#cite_note-41"><span data-dcnode-id="1910" instrument_node="">[41]</span></a></sup><span data-dcnode-id="1907" instrument_node="">
</span></p><p data-dcnode-id="1900"><span data-dcnode-id="1905" instrument_node="">For LeDuc et al., a victory for the reform proposal would have been surprising under the circumstances. As they argue based on the evidence of this case and others, "The political advantage in referendum campaigns, particularly those dealing with unfamiliar issues, often seems to rest with the NO side. Those opposed to a proposal do not necessarily have to make a coherent case against it. Often, it is enough merely to raise doubts about it in the minds of voters, question the motives of its advocates, or play upon a natural fear of the unknown."</span><sup class="reference" data-dcnode-id="1902" id="cite_ref-42"><a data-dcnode-id="1903" href="#cite_note-42"><span data-dcnode-id="1904" instrument_node="">[42]</span></a></sup><span data-dcnode-id="1901" instrument_node="">
</span></p><span data-dcnode-id="1899" instrument_node="">
