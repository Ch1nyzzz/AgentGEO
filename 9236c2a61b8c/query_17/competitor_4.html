data-dcnode-id="566"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-296b532" data-dcnode-id="567" data-element_type="column" data-id="296b532"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="568"><div class="elementor-element elementor-element-4f31967 elementor-widget elementor-widget-heading" data-dcnode-id="569" data-element_type="widget" data-id="4f31967" data-widget_type="heading.default"><div class="elementor-widget-container" data-dcnode-id="570"><span data-dcnode-id="573" instrument_node=""> </span><h1 class="elementor-heading-title elementor-size-default" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Voting Rights</span></h1></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-aaf2deb elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="510" data-element_type="section" data-id="aaf2deb" data-settings="{&quot;background_background&quot;:&quot;classic&quot;,&quot;_ha_eqh_enable&quot;:false}"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="511"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-f8ced60" data-dcnode-id="512" data-element_type="column" data-id="f8ced60"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="513"><section class="elementor-section elementor-inner-section elementor-element elementor-element-3950e03 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="542" data-element_type="section" data-id="3950e03" data-settings="{&quot;_ha_eqh_enable&quot;:false}"><div class="elementor-container elementor-column-gap-extended" data-dcnode-id="543"><div class="elementor-column elementor-col-50 elementor-inner-column elementor-element elementor-element-75e56af" data-dcnode-id="552" data-element_type="column" data-id="75e56af"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="553"><div class="elementor-element elementor-element-9f175b9 elementor-widget elementor-widget-text-editor" data-dcnode-id="554" data-element_type="widget" data-id="9f175b9" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="555"><span data-dcnode-id="564" instrument_node=""> </span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">In early US history, only white adult male property owners were allowed to vote. The 15th Amendment (ratified in 1870 and stipulated that men could not be denied the right to vote based on their race) and later the 19th Amendment (ratified in 1920 and granted women the right to vote) to the US Constitution set the foundation for voting rights in this nation.</span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Subsequent to the passage of these amendments, African Americans and others still faced discriminatory laws and practices in many parts of the country, especially the South. Poll taxes and literacy tests were used to deliberately suppress African Americans’ freedom to vote.</span></p><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">The fight for voting rights runs parallel to the fight for civil rights and is deeply associated with the African American experience in this country. It is also crucial to note the significance women, youth and people with disabilities have had in the fight for voting rights. But this history has significantly impacted the Asian American and Pacific Islander (AAPI) experience as well.</span></p><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">AAPIs have faced overt discrimination in the context of immigration laws that helped create negative stereotypes and the long-held image of the “perpetual foreigner.” Anti-Asian immigration laws not only made it difficult for Asian immigrants to enter and stay in the US, these laws also prevented them from being able to naturalize and become citizens. Immigration and naturalization laws were reformed in the 1940s and 50s to allow Asian immigrants to naturalize and be eligible to vote. Pacific Islanders and Native Hawaiians have faced similar discrimination, though their experiences are different from that of Asian Americans (see section below).</span></p></div></div></div></div><div class="elementor-column elementor-col-50 elementor-inner-column elementor-element elementor-element-6deb428" data-dcnode-id="544" data-element_type="column" data-id="6deb428"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="545"><div class="elementor-element elementor-element-6ce3b1c elementor-widget elementor-widget-image" data-dcnode-id="546" data-element_type="widget" data-id="6ce3b1c" data-widget_type="image.default"><div class="elementor-widget-container" data-dcnode-id="547"><span data-dcnode-id="551" instrument_node=""> </span><img alt="" class="attachment-large size-large lazyloaded" data-dcnode-id="550" data-src="https://apiavote.org/wp-content/uploads/voting-rights-march-680x1024.jpg" data-srcset="https://apiavote.org/wp-content/uploads/voting-rights-march-680x1024.jpg 680w, https://apiavote.org/wp-content/uploads/voting-rights-march-199x300.jpg 199w, https://apiavote.org/wp-content/uploads/voting-rights-march-768x1156.jpg 768w, https://apiavote.org/wp-content/uploads/voting-rights-march.jpg 800w" height="1024" sizes="(max-width: 680px) 100vw, 680px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apiavote.org/wp-content/uploads/voting-rights-march-680x1024.jpg&amp;raw" srcset="https://apiavote.org/wp-content/uploads/voting-rights-march-680x1024.jpg 680w, https://apiavote.org/wp-content/uploads/voting-rights-march-199x300.jpg 199w, https://apiavote.org/wp-content/uploads/voting-rights-march-768x1156.jpg 768w, https://apiavote.org/wp-content/uploads/voting-rights-march.jpg 800w" width="680"><noscript data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">&lt;img width="680" height="1024" src="https://apiavote.org/wp-content/uploads/voting-rights-march-680x1024.jpg" class="attachment-large size-large lazyload" alt="" srcset="https://apiavote.org/wp-content/uploads/voting-rights-march-680x1024.jpg 680w, https://apiavote.org/wp-content/uploads/voting-rights-march-199x300.jpg 199w, https://apiavote.org/wp-content/uploads/voting-rights-march-768x1156.jpg 768w, https://apiavote.org/wp-content/uploads/voting-rights-march.jpg 800w" sizes="(max-width: 680px) 100vw, 680px" /&gt;</span></noscript></div></div></div></div></div></section><section class="elementor-section elementor-inner-section elementor-element elementor-element-43a5a21 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="514" data-element_type="section" data-id="43a5a21" data-settings="{&quot;_ha_eqh_enable&quot;:false}"><div class="elementor-container elementor-column-gap-extended" data-dcnode-id="515"><div class="elementor-column elementor-col-50 elementor-inner-column elementor-element elementor-element-13d0e4f" data-dcnode-id="534" data-element_type="column" data-id="13d0e4f"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="535"><div class="elementor-element elementor-element-19b0508 elementor-widget elementor-widget-image" data-dcnode-id="536" data-element_type="widget" data-id="19b0508" data-widget_type="image.default"><div class="elementor-widget-container" data-dcnode-id="537"><span data-dcnode-id="541" instrument_node=""> </span><img alt="" class="attachment-large size-large lazyload" data-dcnode-id="540" data-src="https://apiavote.org/wp-content/uploads/Voting-Rights-March-1-680x1024.jpg" data-srcset="https://apiavote.org/wp-content/uploads/Voting-Rights-March-1-680x1024.jpg 680w, https://apiavote.org/wp-content/uploads/Voting-Rights-March-1-199x300.jpg 199w, https://apiavote.org/wp-content/uploads/Voting-Rights-March-1-768x1156.jpg 768w, https://apiavote.org/wp-content/uploads/Voting-Rights-March-1.jpg 1000w" height="1024" sizes="(max-width: 680px) 100vw, 680px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="680"><noscript data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">&lt;img width="680" height="1024" src="https://apiavote.org/wp-content/uploads/Voting-Rights-March-1-680x1024.jpg" class="attachment-large size-large lazyload" alt="" srcset="https://apiavote.org/wp-content/uploads/Voting-Rights-March-1-680x1024.jpg 680w, https://apiavote.org/wp-content/uploads/Voting-Rights-March-1-199x300.jpg 199w, https://apiavote.org/wp-content/uploads/Voting-Rights-March-1-768x1156.jpg 768w, https://apiavote.org/wp-content/uploads/Voting-Rights-March-1.jpg 1000w" sizes="(max-width: 680px) 100vw, 680px" /&gt;</span></noscript></div></div></div></div><div class="elementor-column elementor-col-50 elementor-inner-column elementor-element elementor-element-214acaf" data-dcnode-id="516" data-element_type="column" data-id="214acaf"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="517"><div class="elementor-element elementor-element-80a58ce elementor-widget elementor-widget-text-editor" data-dcnode-id="518" data-element_type="widget" data-id="80a58ce" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="519"><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Acts of voter suppression were finally addressed with the Voting Rights Act of 1965 (VRA) which provided federal protection for voting rights and prohibited state and local jurisdictions from harming minority voting rights. The VRA included provisions that required jurisdictions with a history of voter suppression to seek prior approval for any changes they planned to make to their election laws.</span></p><p data-dcnode-id="524"><span data-dcnode-id="531" instrument_node="">In 1975 an amendment was included that would require jurisdictions with a significant population of non-English speakers to provide those voters with election materials in their language, also known as </span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/crt/language-minority-citizens" rel="noopener" target="_blank"><span data-dcnode-id="530" instrument_node="">“Section 203”</span></a><span data-dcnode-id="528" instrument_node="">. There are currently </span><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/newsroom/press-releases/2021/section-203-voting-rights-act.html%23%3A~%3Atext%3D8%252C%25202021%2520%25E2%2580%2594%2520Today%2520the%2520U.S.%2Cor%2520understand%2520English%2520adequately%2520enough" rel="noopener" target="_blank"><span data-dcnode-id="527" instrument_node="">over 300</span></a><span data-dcnode-id="525" instrument_node=""> jurisdictions that are covered by this section and 53 of those are required to provide language assistance in an Asian language.</span></p><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">In 2013 the Supreme Court struck a blow to the VRA. In a 5-4 decision, the court ruled unconstitutional a section of the 1965 law stipulating that states and localities with a history of suppressing voting rights were required to submit election law changes to the US Department of Justice for review.</span></p><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">In the years since that ruling, many states across the country have ramped up barriers to voting, including passing strict voter ID laws, cutting voting hours, and restricting early voting and mail-in ballots.</span></p></div></div></div></div></div></section></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-c3d285e elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="464" data-element_type="section" data-id="c3d285e" data-settings="{&quot;background_background&quot;:&quot;classic&quot;,&quot;_ha_eqh_enable&quot;:false}"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="465"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-3895dbb" data-dcnode-id="466" data-element_type="column" data-id="3895dbb"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="467"><section class="elementor-section elementor-inner-section elementor-element elementor-element-bd476e8 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="488" data-element_type="section" data-id="bd476e8" data-settings="{&quot;_ha_eqh_enable&quot;:false}"><div class="elementor-container elementor-column-gap-extended" data-dcnode-id="489"><div class="elementor-column elementor-col-50 elementor-inner-column elementor-element elementor-element-afcafa5" data-dcnode-id="498" data-element_type="column" data-id="afcafa5"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="499"><div class="elementor-element elementor-element-a21d6f6 elementor-widget elementor-widget-text-editor" data-dcnode-id="500" data-element_type="widget" data-id="a21d6f6" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="501"><h2 data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Pacific Islander and Native Hawaiian Voting Rights</span></h2><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">The relationship that many islands in the Pacific have had with the US include a long, painful history that includes military force and colonial expansion. The complicated relationships also led to often confusing citizenship and immigration status laws that determine the voting rights of persons from these areas.&nbsp;</span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">After becoming a state in 1959, people in Hawaii, including of course Native Hawaiians, attained full citizenship rights in the&nbsp; U.S., including full voting rights.&nbsp;</span></p><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">In the case of Guam and the Commonwealth of the Northern Mariana Islands (CNMI), while people from those territories are considered US citizens, they cannot vote in presidential elections because they reside in a territory rather than a state within the US. The electoral college system, the mechanism used to elect the President, does not provide for electoral votes in US territories. However, the national political parties may authorize voters in territories to select delegates in primary elections to represent them at the political party conventions.</span></p></div></div></div></div><div class="elementor-column elementor-col-50 elementor-inner-column elementor-element elementor-element-75333cf" data-dcnode-id="490" data-element_type="column" data-id="75333cf"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="491"><div class="elementor-element elementor-element-abbc04f elementor-widget elementor-widget-image" data-dcnode-id="492" data-element_type="widget" data-id="abbc04f" data-widget_type="image.default"><div class="elementor-widget-container" data-dcnode-id="493"><span data-dcnode-id="497" instrument_node=""> </span><img alt="" class="attachment-large size-large lazyload" data-dcnode-id="496" data-src="https://apiavote.org/wp-content/uploads/pacific-islander-voting-917x1024.png" data-srcset="https://apiavote.org/wp-content/uploads/pacific-islander-voting-917x1024.png 917w, https://apiavote.org/wp-content/uploads/pacific-islander-voting-269x300.png 269w, https://apiavote.org/wp-content/uploads/pacific-islander-voting-768x858.png 768w, https://apiavote.org/wp-content/uploads/pacific-islander-voting.png 1080w" height="893" sizes="(max-width: 800px) 100vw, 800px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="800"><noscript data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">&lt;img width="800" height="893" src="https://apiavote.org/wp-content/uploads/pacific-islander-voting-917x1024.png" class="attachment-large size-large lazyload" alt="" srcset="https://apiavote.org/wp-content/uploads/pacific-islander-voting-917x1024.png 917w, https://apiavote.org/wp-content/uploads/pacific-islander-voting-269x300.png 269w, https://apiavote.org/wp-content/uploads/pacific-islander-voting-768x858.png 768w, https://apiavote.org/wp-content/uploads/pacific-islander-voting.png 1080w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></div></div></div></div></div></section><section class="elementor-section elementor-inner-section elementor-element elementor-element-64fe5d7 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="468" data-element_type="section" data-id="64fe5d7" data-settings="{&quot;_ha_eqh_enable&quot;:false}"><div class="elementor-container elementor-column-gap-extended" data-dcnode-id="469"><div class="elementor-column elementor-col-50 elementor-inner-column elementor-element elementor-element-c7488e1" data-dcnode-id="480" data-element_type="column" data-id="c7488e1"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="481"><div class="elementor-element elementor-element-d35bcae elementor-widget elementor-widget-image" data-dcnode-id="482" data-element_type="widget" data-id="d35bcae" data-widget_type="image.default"><div class="elementor-widget-container" data-dcnode-id="483"><span data-dcnode-id="487" instrument_node=""> </span><img alt="" class="attachment-large size-large lazyload" data-dcnode-id="486" data-src="https://apiavote.org/wp-content/uploads/samoan-voters-837x1024.jpg" data-srcset="https://apiavote.org/wp-content/uploads/samoan-voters-837x1024.jpg 837w, https://apiavote.org/wp-content/uploads/samoan-voters-245x300.jpg 245w, https://apiavote.org/wp-content/uploads/samoan-voters-768x939.jpg 768w, https://apiavote.org/wp-content/uploads/samoan-voters.jpg 1000w" height="979" sizes="(max-width: 800px) 100vw, 800px" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" width="800"><noscript data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">&lt;img width="800" height="979" src="https://apiavote.org/wp-content/uploads/samoan-voters-837x1024.jpg" class="attachment-large size-large lazyload" alt="" srcset="https://apiavote.org/wp-content/uploads/samoan-voters-837x1024.jpg 837w, https://apiavote.org/wp-content/uploads/samoan-voters-245x300.jpg 245w, https://apiavote.org/wp-content/uploads/samoan-voters-768x939.jpg 768w, https://apiavote.org/wp-content/uploads/samoan-voters.jpg 1000w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></div></div></div></div><div class="elementor-column elementor-col-50 elementor-inner-column elementor-element elementor-element-6ebbfcf" data-dcnode-id="470" data-element_type="column" data-id="6ebbfcf"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="471"><div class="elementor-element elementor-element-c43b92f elementor-widget elementor-widget-text-editor" data-dcnode-id="472" data-element_type="widget" data-id="c43b92f" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="473"><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">American Samoa is in a slightly different position than people in Guam or CNMI. People in American Samoa are US nationals, a status that differs from being a US citizen. Like those from Guam and CNMI, they cannot vote in presidential elections because they reside in a territory rather than a state within the US. But they, like those in Guam and CNMI, can participate in the primary process. And as is the case with Guam and CNMI, they can elect one nonvoting delegate to the US House of Representatives, who is permitted to cast votes in committee and on amendments to a bill but not its final passage.</span></p><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Another difference between persons from American Samoa and Guam or CNMI is that when someone from Guam or CNMI chooses to move to the US, they can participate in elections once they meet the state’s residency requirement to vote (usually 30 days or less). People from American Samoa moving to the US, however, would have to go through the naturalization process to become a US citizen before being able to vote.</span></p><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">There are other Pacific Island nations that have varying relationships with the US. There are Compacts of Free Association with the Micronesia and Marshall Islands and Palau which give these independent nations certain immigration benefits with the US. Other independent island nations such as Papua New Guinea, Fiji, and Tonga to name a few, do not have any compacts with the US and therefore no special immigration benefits. Whether a compact exists or not, these Pacific Islands are independent nations and their citizens cannot vote in US elections.</span></p></div></div></div></div></div></section></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-7e9a3b3 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="364" data-element_type="section" data-id="7e9a3b3" data-settings="{&quot;_ha_eqh_enable&quot;:false}"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="365"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-4e98d1d" data-dcnode-id="366" data-element_type="column" data-id="4e98d1d"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="367"><div class="elementor-element elementor-element-a9f5fd0 elementor-widget elementor-widget-menu-anchor" data-dcnode-id="460" data-element_type="widget" data-id="a9f5fd0" data-widget_type="menu-anchor.default"><div class="elementor-widget-container" data-dcnode-id="461"><span data-dcnode-id="463" instrument_node=""> </span><div class="elementor-menu-anchor" data-dcnode-id="462" id="legislation"></div></div></div><div class="elementor-element elementor-element-ac14d73 elementor-widget elementor-widget-text-editor" data-dcnode-id="368" data-element_type="widget" data-id="ac14d73" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="369"><h2 data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Voting Rights Legislation</span></h2><p data-dcnode-id="455"><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">What Does Voter Suppression Look Like?</span></strong></p><p data-dcnode-id="450"><span data-dcnode-id="454" instrument_node="">State </span><a data-dcnode-id="452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brennancenter.org/our-work/research-reports/voting-laws-roundup-february-2022" rel="noopener" target="_blank"><span data-dcnode-id="453" instrument_node="">voter suppression laws</span></a><span data-dcnode-id="451" instrument_node=""> that restrict the availability of absentee/mail-in ballots, remove ballot drop boxes, limit early voting opportunities, create confusing voter ID requirements, purge registered voters from the rolls, and reduce polling places, are among the provisions that most harm the AAPI community’s ability to vote.</span></p><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Many of these recent state laws have been directly aimed at the ways the AAPI community and others have overwhelmingly preferred to vote in recent elections. Examples include:</span></p><ul data-dcnode-id="439"><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Arizona has made purging voters off absentee ballot mailing lists easier, made it more difficult to get and submit mail-in ballots.</span></li><li data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Florida&nbsp; has also made purging voters off absentee ballot mailing lists easier, restricting who can provide assistance in returning a ballot, making registering to vote more difficult, reducing the availability of mail-in ballot drop boxes and reducing early voting opportunities.</span></li><li data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Georgia is making the mail-in voting procedures more difficult including reducing the number of ballot drop boxes and making it illegal to provide refreshments to people stuck in long polling lines on election day.</span></li><li data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Texas in 2021 installed one of the nation’s most restrictive election laws. The law’s ID requirements have made the absentee ballot process complicated and arduous. In the first election under the new law, there were reports of thousands of ballots getting rejected. Other restrictive provisions in the Texas law include limits on who can assist a voter in returning a ballot, reducing access to polling places, limited early voting opportunities and making the voter registration process more difficult.</span></li></ul><p data-dcnode-id="436"><strong data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Positive Voter Access Policies</span></strong></p><p data-dcnode-id="431"><span data-dcnode-id="435" instrument_node="">State voter suppression laws can be most effectively addressed through federal legislation. Notably, in January 2022, Congress was very close to passing the </span><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2022/01/19/politics/senate-voting-legislation-filibuster/index.html" rel="noopener" target="_blank"><span data-dcnode-id="434" instrument_node="">Freedom to Vote: John R. Lewis Act</span></a><span data-dcnode-id="432" instrument_node="">, which is a combination of the Freedom to Vote Act and the John Lewis Voting Rights Advancement Act. While unfortunately this bill was blocked, it would ultimately serve as the solution in addressing state voter suppression laws.&nbsp;&nbsp;</span></p><p data-dcnode-id="427"><strong data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">The Freedom to Vote Act</span></strong><span data-dcnode-id="428" instrument_node=""> would standardize voting election laws across the country and would significantly expand voting access, including reversing the effects of dozens of new state-level voting restrictions passed this year.&nbsp;</span></p><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">What the bill would require on voter access:</span></p><ul data-dcnode-id="400"><li data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Election Day as a federal holiday.</span></li><li data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Online, automatic, and same-day voter registration.</span></li><li data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">A minimum of 15 days of early voting, including during at least two weekends.</span></li><li data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">No-excuse mail voting with ample access to ballot drop boxes and online ballot tracking, in addition to streamlined election mail delivery by the US Postal Service.</span></li><li data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">States would need to accept a wide range of forms of non-photographic identification in places where ID is required to vote.&nbsp;</span></li><li data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Counting eligible votes on provisional ballots cast in the wrong precinct.</span></li><li data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Restoring voting rights to formerly incarcerated people convicted of felonies.</span></li><li data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Imposes stricter regulations on voter list maintenance that make it harder for states to remove eligible voters from the rolls.</span></li><li data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">More protections and resources to serve voters with disabilities and overseas/military voters.&nbsp;</span></li><li data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Greater federal protections and oversight for voting in US territories.</span></li><li data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">Improving voter registration resources and outreach, in addition to reauthorizing and strengthening the US Election Assistance Commission.</span></li><li data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">The bill also includes the Right to Vote Act, which creates an affirmative right to vote in federal law.</span></li></ul><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">On election administration and redistricting:</span></p><ul data-dcnode-id="385"><li data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Prohibits partisan gerrymandering by requiring states to use certain criteria when drawing new congressional districts.</span></li><li data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Requires states to use voter-verifiable paper ballots and conduct post-election audits.</span></li><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Gives cybersecurity grants to states and directs the EAC to strengthen cybersecurity standards for voting equipment.</span></li><li data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Prohibits local election officials from being fired or removed without cause.</span></li><li data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Makes interfering with voter registration a federal crime, and imposes stricter penalties against harassment, threats, and intimidation of election workers.</span></li><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Restates chain of custody requirements protecting the integrity of ballots and election materials, a provision meant to combat unofficial partisan “audits.”</span></li></ul><p data-dcnode-id="381"><strong data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">The John Lewis Voting Rights Advancement Act</span></strong><span data-dcnode-id="382" instrument_node=""> would restore key provisions of the Voting Rights Act of 1965 that have been struck down or weakened by the Supreme Court, and change the way federal courts handle election cases. The bill creates a new formula to restore the federal preclearance requirement mandating states with histories of discrimination to seek permission from the federal government before enacting new voting rules or redistricting plans.&nbsp;</span></p><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Other key provisions:</span></p><ul data-dcnode-id="370"><li data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Enshrines judicial precedent and legislative history to strengthen efforts to draw majority-minority districts under the parameters of the Voting Rights Act.&nbsp;</span></li><li data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Takes aim at the federal courts by requiring judges to explain their reasoning in emergency rulings they take up on the so-called shadow docket, and tries to limit judges’ from relying solely on the proximity to the election in deciding emergency cases on election rules.</span></li><li data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">The Senate version of the law also includes the Election Worker and Polling Place Protection Act, which provides greater federal protections for election workers against harassment and intimidation.</span></li><li data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">The Senate version further tacks on the Native American Voting Rights Act, a bill that strengthens voting rights and voter protections for voters in Indian Country.&nbsp;</span></li></ul></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-7d0926d elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="321" data-element_type="section" data-id="7d0926d" data-settings="{&quot;background_background&quot;:&quot;classic&quot;,&quot;_ha_eqh_enable&quot;:false}"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="322"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-49aaec5" data-dcnode-id="323" data-element_type="column" data-id="49aaec5"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="324"><div class="elementor-element elementor-element-ac44e73 elementor-widget elementor-widget-text-editor" data-dcnode-id="325" data-element_type="widget" data-id="ac44e73" data-widget_type="text-editor.default"><div class="elementor-widget-container" data-dcnode-id="326"><h2 data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Language Access</span></h2><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">One of the most important parts of the Voting Rights Act are the language access provisions, referred to as section 203, which require bilingual voting assistance in certain jurisdictions where a threshold number of language minority voters reside.&nbsp;</span></p><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">There are currently 53 jurisdictions in 14 states covered by sec. 203 that require coverage in one of eight Asian ethnic communities (Asian Indian, Bangladeshi, Filipino, Cambodian, Chinese, Hmong, Korean, and Vietnamese). Section 203 protects voting rights of language minorities by providing “registration or voting notices, forms, instructions, assistance, or other materials or information relating to the electoral process, including ballots” in the language appropriate to the covered minority group.</span></p><p data-dcnode-id="353"><span data-dcnode-id="357" instrument_node="">Based on the 2020 census there were 6 new jurisdictions covered by section 203 including communities such as: Maui County, HI (Filipino), Dallas County, TX (Vietnamese) and&nbsp;Ramsey County, MN, which is covering a new language not previously covered by sec. 203, Hmong.&nbsp; Some areas like San Mateo County, CA, which was already required to provide language assistance in Chinese, is now also required by sec. 203 to provide it for the Filipino community residing there. </span><a data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apiavote.org/wp-content/uploads/2020-Section-203-Determinations-AAPI.pdf" rel="noopener" target="_blank"><span data-dcnode-id="356" instrument_node="">See the full list of jurisdictions covered by section 203 here</span></a><span data-dcnode-id="354" instrument_node="">.</span></p><h3 data-dcnode-id="350"><strong data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Resources</span></strong></h3><ul data-dcnode-id="327"><li data-dcnode-id="347"><a data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.multistate.us/research/election-laws" rel="noopener" target="_blank"><span data-dcnode-id="349" instrument_node="">https://www.multistate.us/research/election-laws</span></a></li><li data-dcnode-id="344"><a data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncsl.org/research/elections-and-campaigns/election-laws-and-procedures-overview.aspx" rel="noopener" target="_blank"><span data-dcnode-id="346" instrument_node="">https://www.ncsl.org/research/elections-and-campaigns/election-laws-and-procedures-overview.aspx</span></a></li><li data-dcnode-id="341"><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncsl.org/research/elections-and-campaigns/voter-id.aspx" rel="noopener" target="_blank"><span data-dcnode-id="343" instrument_node="">https://www.ncsl.org/research/elections-and-campaigns/voter-id.aspx</span></a></li><li data-dcnode-id="338"><a data-dcnode-id="339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brennancenter.org/our-work/research-reports/voting-laws-roundup-february-2022" rel="noopener" target="_blank"><span data-dcnode-id="340" instrument_node="">https://www.brennancenter.org/our-work/research-reports/voting-laws-roundup-february-2022</span></a></li><li data-dcnode-id="335"><a data-dcnode-id="336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eac.gov/election-officials/glossaries-election-terminology" rel="noopener" target="_blank"><span data-dcnode-id="337" instrument_node="">https://www.eac.gov/election-officials/glossaries-election-terminology</span></a></li><li data-dcnode-id="332"><a data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vote.gov/" rel="noopener" target="_blank"><span data-dcnode-id="334" instrument_node="">https://vote.gov/</span></a></li><li data-dcnode-id="328"><a data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/voting-laws%23%3A~%3Atext%3DAccording%2520to%2520the%2520U.S.%2520Constitution%2Cvoting%2520mandatory%2520for%2520U.S.%2520citizen" rel="noopener" target="_blank"><span data-dcnode-id="331" instrument_node="">https://www.usa.gov/voting-laws#:~:text=According%20to%20the%20U.S.%20Constitution,voting%20mandatory%20for%20U.S.%20citizen</span></a><span data-dcnode-id="329" instrument_node="">s.</span></li></ul></div></div></div></div></div></section><section class="elementor-section elementor-top-section elementor-element elementor-element-2c621a3 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="244" data-element_type="section" data-id="2c621a3" data-settings="{&quot;_ha_eqh_enable&quot;:false}"><div class="elementor-container elementor-column-gap-default" data-dcnode-id="245"><div class="elementor-column elementor-col-100 elementor-top-column elementor-element elementor-element-7869cd0" data-dcnode-id="246" data-element_type="column" data-id="7869cd0"><div class="elementor-widget-wrap elementor-element-populated" data-dcnode-id="247"><div class="elementor-element elementor-element-fa7b380 elementor-widget elementor-widget-heading" data-dcnode-id="317" data-element_type="widget" data-id="fa7b380" data-widget_type="heading.default"><div class="elementor-widget-container" data-dcnode-id="318"><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Related Articles</span></h2></div></div><div class="elementor-element elementor-element-a5fa318 elementor-grid-1 elementor-posts--thumbnail-none elementor-grid-tablet-2 elementor-grid-mobile-1 elementor-widget elementor-widget-posts" data-dcnode-id="248" data-element_type="widget" data-id="a5fa318" data-settings="{&quot;classic_columns&quot;:&quot;1&quot;,&quot;pagination_type&quot;:&quot;numbers&quot;,&quot;classic_columns_tablet&quot;:&quot;2&quot;,&quot;classic_columns_mobile&quot;:&quot;1&quot;,&quot;classic_row_gap&quot;:{&quot;unit&quot;:&quot;px&quot;,&quot;size&quot;:35,&quot;sizes&quot;:[]},&quot;classic_row_gap_tablet&quot;:{&quot;unit&quot;:&quot;px&quot;,&quot;size&quot;:&quot;&quot;,&quot;sizes&quot;:[]},&quot;classic_row_gap_mobile&quot;:{&quot;unit&quot;:&quot;px&quot;,&quot;size&quot;:&quot;&quot;,&quot;sizes&quot;:[]}}" data-widget_type="posts.classic"><div class="elementor-widget-container" data-dcnode-id="249"><div class="elementor-posts-container elementor-posts elementor-posts--skin-classic elementor-grid" data-dcnode-id="262"><article class="elementor-post elementor-grid-item post-1615 post type-post status-publish format-standard has-post-thumbnail hentry category-news-updates tag-voting-rights" data-dcnode-id="308"><div class="elementor-post__text" data-dcnode-id="309"><h3 class="elementor-post__title" data-dcnode-id="313"><span data-dcnode-id="316" instrument_node=""> </span><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apiavote.org/aapisforvotingrights-launches-today/"><span data-dcnode-id="315" instrument_node=""> #AAPisforVotingRights Launches Today! </span></a></h3><div class="elementor-post__excerpt" data-dcnode-id="310"><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Our communities’ ability to vote is under attack like we have not seen in over a generation. While the Senate may have failed to pass the Freedom to Vote: John R. Lewis Act in January, the fight is far from over and this issue is still unbelievably important.</span></p></div></div></article><article class="elementor-post elementor-grid-item post-1692 post type-post status-publish format-standard hentry category-press-release tag-legislation tag-voting-rights" data-dcnode-id="299"><div class="elementor-post__text" data-dcnode-id="300"><h3 class="elementor-post__title" data-dcnode-id="304"><span data-dcnode-id="307" instrument_node=""> </span><a data-dcnode-id="305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apiavote.org/apiavote-sends-letter-to-president-biden-senate-majority-leader-schumer-to-push-for-voting-rights-legislation/"><span data-dcnode-id="306" instrument_node=""> APIAVote Sends Letter to President Biden, Senate Majority Leader Schumer to Push for Voting Rights Legislation </span></a></h3><div class="elementor-post__excerpt" data-dcnode-id="301"><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Bob Sakaniwa, Senior Policy Advisor at Asian and Pacific Islander American Vote (APIAVote), issued the following statement in announcement of two letters APIAVote and several organizations representing Asian American and Pacific Islander communities are spearheading in support of the Freedom to Vote Act and John Lewis Voting Rights Advancement Act.</span></p></div></div></article><article class="elementor-post elementor-grid-item post-1665 post type-post status-publish format-standard hentry category-press-release tag-legislation tag-voting-rights" data-dcnode-id="290"><div class="elementor-post__text" data-dcnode-id="291"><h3 class="elementor-post__title" data-dcnode-id="295"><span data-dcnode-id="298" instrument_node=""> </span><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apiavote.org/apiavote-applauds-the-house-passage-of-the-john-lewis-voting-rights-advancement-act/"><span data-dcnode-id="297" instrument_node=""> APIAVote Applauds the House Passage of the John Lewis Voting Rights Advancement Act </span></a></h3><div class="elementor-post__excerpt" data-dcnode-id="292"><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Christine Chen, Executive Director of Asian and Pacific Islander Vote, issued a statement after the House of Representatives passed the “John Lewis Voting Rights Advancement Act.”</span></p></div></div></article><article class="elementor-post elementor-grid-item post-1627 post type-post status-publish format-standard hentry category-press-release tag-voting-rights tag-white-house" data-dcnode-id="281"><div class="elementor-post__text" data-dcnode-id="282"><h3 class="elementor-post__title" data-dcnode-id="286"><span data-dcnode-id="289" instrument_node=""> </span><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apiavote.org/apiavote-and-aanhpi-leaders-meet-with-president-biden-and-vice-president-harris/"><span data-dcnode-id="288" instrument_node=""> APIAVote and AANHPI Leaders Meet With President Biden and Vice President Harris </span></a></h3><div class="elementor-post__excerpt" data-dcnode-id="283"><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Christine Chen, Executive Director of Asian and Pacific Islander American Vote, issued the following statement after meeting President Joseph R. Biden and Vice President Kamala Harris with a coalition of twelve other Asian American, Native Hawaiian and Pacific Islander civil rights leaders to discuss voting rights, anti-Asian hate, immigration, and economic opportunity.</span></p></div></div></article><article class="elementor-post elementor-grid-item post-1645 post type-post status-publish format-standard hentry category-press-release tag-voter-suppression tag-voting-rights" data-dcnode-id="272"><div class="elementor-post__text" data-dcnode-id="273"><h3 class="elementor-post__title" data-dcnode-id="277"><span data-dcnode-id="280" instrument_node=""> </span><a data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apiavote.org/apiavote-issues-statement-on-brnovich-v-dnc-decision/"><span data-dcnode-id="279" instrument_node=""> APIAVote Issues Statement on Brnovich V. DNC Decision </span></a></h3><div class="elementor-post__excerpt" data-dcnode-id="274"><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">On Thursday, July 1, in Brnovich v. Democratic National Committee, the Supreme Court upheld two electoral policies in Arizona that suppress voting rights for historically-marginalized communities. Executive Director Christine Chen of Asian and Pacific Islander American Vote (APIAVote) issues the following statement.</span></p></div></div></article><article class="elementor-post elementor-grid-item post-1643 post type-post status-publish format-standard hentry category-press-release tag-voter-suppression tag-voting-rights" data-dcnode-id="263"><div class="elementor-post__text" data-dcnode-id="264"><h3 class="elementor-post__title" data-dcnode-id="268"><span data-dcnode-id="271" instrument_node=""> </span><a data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apiavote.org/apiavote-issues-statement-on-blockage-of-the-for-the-people-act/"><span data-dcnode-id="270" instrument_node=""> APIAVote Issues Statement on Blockage of the For the People Act </span></a></h3><div class="elementor-post__excerpt" data-dcnode-id="265"><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">On Tuesday, June 22nd, the United States Senate voted against starting debate on The For the People Act, the first step in the consideration of a bill. Executive Director Christine Chen of Asian and Pacific Islander American Vote  (APIAVote) issues the following statement.</span></p></div></div></article></div><div class="e-load-more-anchor" data-dcnode-id="261" data-max-page="2" data-next-page="https://apiavote.org/policy-and-research/voting-rights/2/" data-page="1"></div><nav aria-label="Pagination" class="elementor-pagination" data-dcnode-id="250" role="navigation"><span data-dcnode-id="260" instrument_node=""> </span><span aria-current="page" class="page-numbers current" data-dcnode-id="256"><span class="elementor-screen-only" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">Page</span></span><span data-dcnode-id="257" instrument_node="">1</span></span><span data-dcnode-id="255" instrument_node=""> </span><a class="page-numbers" data-dcnode-id="251" href="https://chatnoir-webcontent.chatnoir.eu/?i
