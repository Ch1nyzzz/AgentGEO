</span><a class="slug" data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//remezcla.com/culture/"><span data-dcnode-id="1198" instrument_node="">Culture</span></a><span data-dcnode-id="1196" instrument_node="">
</span><h2 class="h1" data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">A Brief History of Latino Voting Rights Since the 1960s</span></h2><span data-dcnode-id="1193" instrument_node="">
</span><div class="feature-half-screen-author-time" data-dcnode-id="1182"><span data-dcnode-id="1192" instrument_node="">
</span><div class="bylines-wrapper" data-dcnode-id="1187"><span data-dcnode-id="1191" instrument_node="">
</span><a class="hero-shortform-byline" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//remezcla.com/author/raquel-reichard/" rel="author"><span data-dcnode-id="1190" instrument_node="">By Raquel Reichard</span></a><span data-dcnode-id="1188" instrument_node="">

</span><div class="single-wrapper single-re_features ads-inserted active" data-category="culture" data-dcnode-id="802" data-disable-inline-ads="" data-post-id="251148" data-sen-content="0"><span data-dcnode-id="1171" instrument_node="">
</span><section class="single-content" data-dcnode-id="804"><span data-dcnode-id="1170" instrument_node="">
</span><div class="social" data-dcnode-id="1162" style="position: absolute; top: auto; bottom: auto; left: auto;"><span data-dcnode-id="1169" instrument_node="">
</span><a class="twitter" data-dcnode-id="1168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%253A%252F%252Fremezcla.com%252Ffeatures%252Fculture%252Flatino-voting-rights-1960s%252F%26text%3DA%2520Brief%2520History%2520of%2520Latino%2520Voting%2520Rights%2520Since%2520the%25201960s%26via%3Dremezcla" target="_blank"></a><span data-dcnode-id="1167" instrument_node="">
</span><a class="facebook" data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fremezcla.com%252Ffeatures%252Fculture%252Flatino-voting-rights-1960s%252F" target="_blank"></a><span data-dcnode-id="1165" instrument_node="">
</span><a class="linkedin" data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/sharing/share-offsite/%3Furl%3Dhttps%3A//remezcla.com/features/culture/latino-voting-rights-1960s/" target="_blank"></a><span data-dcnode-id="1163" instrument_node="">
</span></div><span data-dcnode-id="1161" instrument_node="">
</span><div class="single-post-content" data-dcnode-id="831"><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1147"><span class="drop-cap culture-color" data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">A</span></span><span data-dcnode-id="1157" instrument_node="">t </span><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewresearch.org/fact-tank/2017/09/18/how-the-u-s-hispanic-population-is-changing/"><span data-dcnode-id="1156" instrument_node="">58 million</span></a><span data-dcnode-id="1154" instrument_node=""> , Latinos – the </span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewresearch.org/fact-tank/2017/09/18/how-the-u-s-hispanic-population-is-changing/" rel="noopener" target="_blank"><span data-dcnode-id="1153" instrument_node="">largest minority ethnic group in the US</span></a><span data-dcnode-id="1151" instrument_node=""> – are powerful. With </span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/politics/archive/2015/08/every-30-seconds-a-latino-reaches-voting-age-you-read-that-right/432627/" rel="noopener" target="_blank"><span data-dcnode-id="1150" instrument_node="">66,000</span></a><span data-dcnode-id="1148" instrument_node=""> Latinos turning 18, the voting age, every single month, that force is vast enough to transform the political balance of our local, state, and federal governments. But that potential depends on one factor: Those who are legally able to vote utilizing their right by turning out to the polls on Election Day. Suffrage wasn’t an easy right to obtain or maintain for people of color, including Latinos, many of whom had to wait a decade after the historic Voting Rights Act of 1965 to cast their ballot. Even still, our enfranchisement is under perpetual threat by increased voting restrictions that impact Black and brown populations the hardest.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Here, a look at Latino voting rights in the US, from preserving suffrage in the 1960s to defending it today.</span></p><span data-dcnode-id="1143" instrument_node="">
</span><h2 data-dcnode-id="1140"><strong data-dcnode-id="1141"><img alt="" class="alignnone size-full wp-image-251161" data-dcnode-id="1142" height="80" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//remezcla.com//wp-content/uploads/2018/10/1960.png&amp;raw" srcset="https://remezcla.com//wp-content/uploads/2018/10/1960.png 700w, https://remezcla.com//wp-content/uploads/2018/10/1960-300x34.png 300w, https://remezcla.com//wp-content/uploads/2018/10/1960-600x69.png 600w, https://remezcla.com//wp-content/uploads/2018/10/1960-180x21.png 180w" width="700"></strong></h2><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1138" instrument_node="">On August 6, 1965, at the height of the swinging sixties, a time of youth-led cultural and political upheaval and change, President Lyndon B. Johnson signed the </span><a data-dcnode-id="1136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/black-history/voting-rights-act" rel="noopener" target="_blank"><span data-dcnode-id="1137" instrument_node="">Voting Rights Act of 1965</span></a><span data-dcnode-id="1135" instrument_node="">. The law, a treasure of the civil rights movement, enforced the voting rights guaranteed by the Fourteenth and Fifteenth Amendments – which granted citizenship to anyone “born or naturalized in the United States” and prohibited states from disenfranchising voters “on account of race, color, or previous condition of servitude,” respectively. While the act intended to overcome legal barriers at the state and local levels that prevented African Americans in particular from employing their right to vote, the law was far-reaching, securing this right for most racial and ethnic minorities, including English-speaking Latinos in the southwest, northeast, and southeast.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><h2 data-dcnode-id="1130"><strong data-dcnode-id="1131"><img alt="" class="alignnone size-full wp-image-251162" data-dcnode-id="1132" height="80" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//remezcla.com//wp-content/uploads/2018/10/1970.png&amp;raw" srcset="https://remezcla.com//wp-content/uploads/2018/10/1970.png 700w, https://remezcla.com//wp-content/uploads/2018/10/1970-300x34.png 300w, https://remezcla.com//wp-content/uploads/2018/10/1970-600x69.png 600w, https://remezcla.com//wp-content/uploads/2018/10/1970-180x21.png 180w" width="700"></strong></h2><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1128" instrument_node="">In 1974, the </span><a data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//svrep.org/" rel="noopener" target="_blank"><span data-dcnode-id="1127" instrument_node="">Southwest Voter Registration Education Project</span></a><span data-dcnode-id="1125" instrument_node="">, the first and largest non-partisan Latino voter participation organization in the US, started operations, with founder William C. Velasquez, and other Mexican-American political activists, discovering early that, despite the achievements of the Voting Rights Act of 1965, there remained barriers – particularly, language – for Latino voters preventing them from exercising their right.</span></p><div class="ad video-ad video-inline-ad hide-before" data-dcnode-id="899"><div aria-describedby="jw-shortcuts-tooltip-explanation" aria-label="Video Player" class="jwplayer jw-reset jw-state-idle jw-stretch-uniform jw-flag-aspect-mode jw-flag-outstream jw-flag-outstream-pending jw-breakpoint-3 jw-floating-dismissible jw-flag-user-inactive" data-dcnode-id="900" id="inline-player-251148" role="application" style="width: 100%;" tabindex="0"><div class="jw-aspect jw-reset" data-dcnode-id="1123" style="padding-top: 56.25%;"></div><div class="jw-wrapper jw-reset" data-dcnode-id="903"><div data-dcnode-id="1119" style="opacity: 0; visibility: hidden; overflow: hidden; display: block; position: absolute; top: 0px; left: 0px; width: 100%; height: 100%;"><div data-dcnode-id="1121" style="overflow: auto; display: block; position: absolute; top: 0px; left: 0px; width: 100%; height: 100%;"><div data-dcnode-id="1122" style="height: 1px; width: 581px;"></div></div><div class="jw-contract-trigger" data-dcnode-id="1120" style="overflow: auto; display: block; position: absolute; top: 0px; left: 0px; width: 100%; height: 100%;"></div></div><div class="jw-top jw-reset" data-dcnode-id="1118"></div><div class="jw p;</span></div></div></div><div class="inline-ad-wrapper" data-dcnode-id="897"><div class="inline-ad ad" data-dcnode-id="898" id="adslot_inserted_ad_0"></div></div><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="895" instrument_node="">While the Voting Rights Act of 1965 </span><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//centropr.hunter.cuny.edu/centrovoices/current-affairs/puerto-ricans-and-50th-anniversary-voting-rights-act" rel="noopener" target="_blank"><span data-dcnode-id="894" instrument_node="">included a section</span></a><span data-dcnode-id="892" instrument_node=""> that ensured that people educated in US schools that were predominately taught in a language other than English – for instance, island Puerto Ricans – could not be denied the right to vote because of their inability to read, write, understand, or interpret material in English, Spanish-speakers in the contiguous US, including mainland Boricuas, were often still discriminated against at the polls. This changed on August 6, 1975, exactly one decade after the Voting Rights Act of 1965, when, following several court battles on behalf of Latino-Americans, </span><a data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/crt/history-federal-voting-rights-laws" rel="noopener" target="_blank"><span data-dcnode-id="891" instrument_node="">President Gerald Ford amended the act</span></a><span data-dcnode-id="889" instrument_node=""> to also end discrimination against so-called “language minorities.” Protecting the voting rights of Latinos, as well as non-English-speaking Asian Americans and Native Americans, made it possible to translate registration materials into other languages and strengthened the political power of communities of color.</span></p><span data-dcnode-id="887" instrument_node="">
</span><h2 data-dcnode-id="884"><strong data-dcnode-id="885"><img alt="" class="alignnone size-full wp-image-251163" data-dcnode-id="886" height="80" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//remezcla.com//wp-content/uploads/2018/10/1980.png&amp;raw" srcset="https://remezcla.com//wp-content/uploads/2018/10/1980.png 700w, https://remezcla.com//wp-content/uploads/2018/10/1980-300x34.png 300w, https://remezcla.com//wp-content/uploads/2018/10/1980-600x69.png 600w, https://remezcla.com//wp-content/uploads/2018/10/1980-180x21.png 180w" width="700"></strong></h2><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="882" instrument_node="">The voting triumphs of the 1960s and ‘70s saw a backlash a decade later when President Ronald Reagan took office in 1981. The Reagan administration embraced the notion of colorblindness, the idea of promoting racial equality through race-neutral governmental policies that ignore the ways in which race, ethnicity, language, and immigration status limit individuals’ opportunities. Unlike in the past, Reagan’s head of the Department of Justice Civil Rights Division, which enforced the Voting Rights Amendment, William Bradford Reynolds, </span><a data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2016/07/22/487033262/block-the-vote-a-journalist-discusses-voting-rights-and-restrictions" rel="noopener" target="_blank"><span data-dcnode-id="881" instrument_node="">argued that previous answers to discrimination</span></a><span data-dcnode-id="879" instrument_node="">, particularly affirmative action, busing quotas, and drawing districts so that candidates of color could be elected, favored Black and brown communities against white Americans and thus were a part of the racial problem, not an answer to them. Despite this new perspective in the White House, in 1982, when the special provisions made by Johnson and Ford neared expiration, Congress voted to extend most of the conditions by 25 years, except for the bilingual election requirement, which was expanded to just seven more years.</span></p><span data-dcnode-id="877" instrument_node="">
</span><h2 data-dcnode-id="875"><img alt="" class="alignnone size-full wp-image-251165" data-dcnode-id="876" height="80" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//remezcla.com//wp-content/uploads/2018/10/1990.png&amp;raw" srcset="https://remezcla.com//wp-content/uploads/2018/10/1990.png 700w, https://remezcla.com//wp-content/uploads/2018/10/1990-300x34.png 300w, https://remezcla.com//wp-content/uploads/2018/10/1990-600x69.png 600w, https://remezcla.com//wp-content/uploads/2018/10/1990-180x21.png 180w" width="700"></h2><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">In 1992, when the bilingual election requirement was close to expiring, Rep. José E. Serrano (D-NY) introduced the Voting Rights Language Assistance Act of 1992, legislation that aimed to extend the provision for 15 years, meaning it would expire in 2007 like the other special provisions. A contentious congressional battle followed, with proponents of the legislation arguing that the lack of language assistance hinders recent naturalized citizens from exercising their right to vote and opponents asserting that the provision was too costly, suggesting removing the amendment entirely, limiting the extension to five years or requiring the federal government to pay for bilingual voting materials. Still, with mostly Democratic support, the legislation passed and was signed by President George H. W. Bush on August 26, 1992.</span></p><span data-dcnode-id="871" instrument_node="">
</span><h2 data-dcnode-id="868"><strong data-dcnode-id="869"><img alt="" class="alignnone size-full wp-image-251166" data-dcnode-id="870" height="80" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//remezcla.com//wp-content/uploads/2018/10/2000.png&amp;raw" srcset="https://remezcla.com//wp-content/uploads/2018/10/2000.png 700w, https://remezcla.com//wp-content/uploads/2018/10/2000-300x34.png 300w, https://remezcla.com//wp-content/uploads/2018/10/2000-600x69.png 600w, https://remezcla.com//wp-content/uploads/2018/10/2000-180x21.png 180w" width="700"></strong></h2><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="866" instrument_node="">In 2006, a year away from the expiration of the special provisions, Congress reconsidered the act. While Republicans, who controlled both chambers as well as the presidency, largely considered the legislation a snub to color-blindness and states’ rights, others, who saw how the provisions allowed language-minority voters, particularly Latinos in South Florida and Asian Americans, in their districts to vote for them, helped renew the special provisions in what was called the </span><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/crt/history-federal-voting-rights-laws" rel="noopener" target="_blank"><span data-dcnode-id="865" instrument_node="">Fannie Lou Hamer, Rosa Parks, Coretta Scott King, Cesar E. Chavez, Barbara Jordan, William Velazquez and Dr. Hector Garcia Voting Rights Act Reauthorization and Amendments Act</span></a><span data-dcnode-id="863" instrument_node="">. However, the amended legislation eliminated the provision for voting examiners, appointees who oversaw registration in their jurisdictions, making it easier for voting discrimination to occur unnoticed.</span></p><span data-dcnode-id="861" instrument_node="">
</span><h2 data-dcnode-id="858"><strong data-dcnode-id="859"><img alt="" class="alignnone size-full wp-image-251167" data-dcnode-id="860" height="80" loading="lazy" sizes="(max-width: 700px) 100vw, 700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//remezcla.com//wp-content/uploads/2018/10/2010.png&amp;raw" srcset="https://remezcla.com//wp-content/uploads/2018/10/2010.png 700w, https://remezcla.com//wp-content/uploads/2018/10/2010-300x34.png 300w, https://remezcla.com//wp-content/uploads/2018/10/2010-600x69.png 600w, https://remezcla.com//wp-content/uploads/2018/10/2010-180x21.png 180w" width="700"></strong></h2><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="856" instrument_node="">Since 2010, communities of color have seen </span><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/politics/archive/2018/07/poll-prri-voter-suppression/565355/" rel="noopener" target="_blank"><span data-dcnode-id="855" instrument_node="">voting restrictions increase</span></a><span data-dcnode-id="853" instrument_node="">, particularly in the form of strict photo ID requirements, like in Texas, Wisconsin and North Carolina, to early voting cutbacks, as seen in Florida, to other registration restrictions. Also, in 2013, in the case of Shelby v. Holder, the </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aclu.org/voting-rights-act-major-dates-history" rel="noopener" target="_blank"><span data-dcnode-id="852" instrument_node="">Supreme Court weakened voting rights</span></a><span data-dcnode-id="850" instrument_node=""> protections by removing the requirement that some jurisdictions with a history of voting discrimination get pre-approval for voting changes, with states like Texas, Mississippi, North Carolina, Florida, Virginia, South Dakota, Iowa, and Indiana wasting little time enacting possibly discriminatory laws.</span></p><div class="inline-ad-wrapper" data-dcnode-id="847"><div class="inline-ad ad" data-dcnode-id="848" id="adslot_inserted_ad_1"></div></div><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="845" instrument_node="">A </span><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prri.org/research/American-democracy-in-crisis-voters-midterms-trump-election-2018/" rel="noopener" target="_blank"><span data-dcnode-id="844" instrument_node="">2018 poll</span></a><span data-dcnode-id="842" instrument_node=""> conducted by the Public Religion Research Institute (PRRI) and </span><em data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">The Atlantic</span></em><span data-dcnode-id="839" instrument_node=""> shows how these new qualifications and the loss of protections are leading to voter suppression, with Black and Latino voters facing more barriers at the voting booth. According to poll findings, 9 percent of Latino respondents, compared to 3 percent of whites, say that they (or someone in their household) were told that they lacked the proper identification to vote in the last election. Similarly, 11 percent of Latino respondents, compared to 5 percent of whites, reported that they were incorrectly told that they weren’t listed on voter rolls. In all, the poll found that Black and Latino respondents were twice as likely, or more, to have experienced barriers as their white respondents.</span></p><span data-dcnode-id="837" instrument_node="">
