s"><span data-dcnode-id="2093" instrument_node="">Reproductive</span></a></li><li data-dcnode-id="2088"><a data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_to_rest_and_leisure" title="Right to rest and leisure"><span data-dcnode-id="2090" instrument_node="">Rest and leisure</span></a></li><li data-dcnode-id="2085"><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_of_self-defense" title="Right of self-defense"><span data-dcnode-id="2087" instrument_node="">Self defense</span></a></li><li data-dcnode-id="2082"><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-determination" title="Self-determination"><span data-dcnode-id="2084" instrument_node="">Self-determination of people</span></a></li><li data-dcnode-id="2079"><a data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_of_speech" title="Freedom of speech"><span data-dcnode-id="2081" instrument_node="">Speech</span></a></li><li data-dcnode-id="2076"><a data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_to_sexuality" title="Right to sexuality"><span data-dcnode-id="2078" instrument_node="">Sexuality</span></a></li><li data-dcnode-id="2073"><a data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_right_to_water_and_sanitation" title="Human right to water and sanitation"><span data-dcnode-id="2075" instrument_node="">Water and sanitation</span></a></li></ul></div><span data-dcnode-id="2070" instrument_node="">

</span><p data-dcnode-id="2020"><span data-dcnode-id="2045" instrument_node="">The </span><b data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">youth rights</span></b><span data-dcnode-id="2042" instrument_node=""> movement (also known as </span><b data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">youth liberation</span></b><span data-dcnode-id="2039" instrument_node="">) seeks to grant the </span><a data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rights" title="Rights"><span data-dcnode-id="2038" instrument_node="">rights</span></a><span data-dcnode-id="2036" instrument_node=""> to </span><a data-dcnode-id="2034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth" title="Youth"><span data-dcnode-id="2035" instrument_node="">young people</span></a><span data-dcnode-id="2033" instrument_node=""> that are traditionally reserved for adults, due to having reached a specific age or sufficient maturity. This is closely akin to the notion of  </span><a data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Evolving_capacities" title="Evolving capacities"><span data-dcnode-id="2032" instrument_node="">evolving capacities</span></a><span data-dcnode-id="2030" instrument_node=""> within the </span><a data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Children%2527s_rights" title="Children's rights"><span data-dcnode-id="2029" instrument_node="">children's rights</span></a><span data-dcnode-id="2027" instrument_node=""> movement, but the youth rights movement differs from the children's rights movement in that the latter places emphasis on the welfare and protection of children through the actions and decisions of adults, while the youth rights movement seeks to grant youth the liberty to make their own decisions autonomously in the ways adults are permitted to, or to lower the legal minimum ages at which such rights are acquired, such as the </span><a data-dcnode-id="2025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Age_of_majority" title="Age of majority"><span data-dcnode-id="2026" instrument_node="">age of majority</span></a><span data-dcnode-id="2024" instrument_node=""> and the </span><a data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_age" title="Voting age"><span data-dcnode-id="2023" instrument_node="">voting age</span></a><span data-dcnode-id="2021" instrument_node="">.
</span></p><p data-dcnode-id="2011"><span data-dcnode-id="2019" instrument_node="">Youth rights have increased over the last century in many countries.</span><sup class="reference" data-dcnode-id="2016" id="cite_ref-1"><a data-dcnode-id="2017" href="#cite_note-1"><span data-dcnode-id="2018" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2015" instrument_node=""> The youth rights movement seeks to further increase youth rights, with some advocating </span><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergenerational_equity" title="Intergenerational equity"><span data-dcnode-id="2014" instrument_node="">intergenerational equity</span></a><span data-dcnode-id="2012" instrument_node="">.
</span></p><p data-dcnode-id="2006"><span data-dcnode-id="2010" instrument_node="">Codified youth rights constitute one aspect of how youth are treated in society. Other aspects include social questions of how adults see and treat youth, and how open a society is to </span><a data-dcnode-id="2008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_participation" title="Youth participation"><span data-dcnode-id="2009" instrument_node="">youth participation</span></a><span data-dcnode-id="2007" instrument_node="">.

</span><p data-dcnode-id="1804"><span data-dcnode-id="1881" instrument_node="">Of primary importance to advocates of youth rights are historical perceptions of young people, which they say are </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oppression" title="Oppression"><span data-dcnode-id="1880" instrument_node="">oppressive</span></a><span data-dcnode-id="1878" instrument_node=""> and informed by </span><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paternalism" title="Paternalism"><span data-dcnode-id="1877" instrument_node="">paternalism</span></a><span data-dcnode-id="1875" instrument_node="">, </span><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adultism" title="Adultism"><span data-dcnode-id="1874" instrument_node="">adultism</span></a><span data-dcnode-id="1872" instrument_node=""> and </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ageism" title="Ageism"><span data-dcnode-id="1871" instrument_node="">ageism</span></a><span data-dcnode-id="1869" instrument_node=""> in general, as well as fears of </span><a class="mw-redirect" data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedophobia_%28social_phenomena%29" title="Pedophobia (social phenomena)"><span data-dcnode-id="1868" instrument_node="">children</span></a><span data-dcnode-id="1866" instrument_node=""> and </span><a data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ephebiphobia" title="Ephebiphobia"><span data-dcnode-id="1865" instrument_node="">youth</span></a><span data-dcnode-id="1863" instrument_node="">. Several of these perceptions made by society include the assumption that young people are incapable of making crucial decisions and need protecting from their tendency to act impulsively.</span><sup class="reference" data-dcnode-id="1860" id="cite_ref-2"><a data-dcnode-id="1861" href="#cite_note-2"><span data-dcnode-id="1862" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1859" instrument_node=""> 
Youth rights advocates believe those perceptions inform </span><a class="mw-redirect" data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laws" title="Laws"><span data-dcnode-id="1858" instrument_node="">laws</span></a><span data-dcnode-id="1856" instrument_node=""> throughout society, including </span><a data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_age" title="Voting age"><span data-dcnode-id="1855" instrument_node="">voting age</span></a><span data-dcnode-id="1853" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_labor_laws" title="Child labor laws"><span data-dcnode-id="1852" instrument_node="">child labor laws</span></a><span data-dcnode-id="1850" instrument_node="">, </span><a data-dcnode-id="1848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right-to-work_law" title="Right-to-work law"><span data-dcnode-id="1849" instrument_node="">right-to-work laws</span></a><span data-dcnode-id="1847" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Curfews" title="Curfews"><span data-dcnode-id="1846" instrument_node="">curfews</span></a><span data-dcnode-id="1844" instrument_node="">, </span><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legal_drinking_age" title="Legal drinking age"><span data-dcnode-id="1843" instrument_node="">drinking</span></a><span data-dcnode-id="1841" instrument_node="">/</span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Smoking_age" title="Smoking age"><span data-dcnode-id="1840" instrument_node="">smoking age</span></a><span data-dcnode-id="1838" instrument_node="">, </span><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gambling_age" title="Gambling age"><span data-dcnode-id="1837" instrument_node="">gambling age</span></a><span data-dcnode-id="1835" instrument_node="">, </span><a data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Age_of_consent" title="Age of consent"><span data-dcnode-id="1834" instrument_node="">age of consent</span></a><span data-dcnode-id="1832" instrument_node="">, </span><a data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_minimum_driving_ages" title="List of minimum driving ages"><span data-dcnode-id="1831" instrument_node="">driving age</span></a><span data-dcnode-id="1829" instrument_node="">, </span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_suffrage" title="Youth suffrage"><span data-dcnode-id="1828" instrument_node="">youth suffrage</span></a><span data-dcnode-id="1826" instrument_node="">, </span><a data-dcnode-id="1824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emancipation_of_minors" title="Emancipation of minors"><span data-dcnode-id="1825" instrument_node="">emancipation of minors</span></a><span data-dcnode-id="1823" instrument_node="">, </span><a data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minors_and_abortion" title="Minors and abortion"><span data-dcnode-id="1822" instrument_node="">minors and abortion</span></a><span data-dcnode-id="1820" instrument_node="">, </span><a data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Closed_adoption" title="Closed adoption"><span data-dcnode-id="1819" instrument_node="">closed adoption</span></a><span data-dcnode-id="1817" instrument_node="">, </span><a data-dcnode-id="1815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corporal_punishment" title="Corporal punishment"><span data-dcnode-id="1816" instrument_node="">corporal punishment</span></a><span data-dcnode-id="1814" instrument_node="">, the </span><a data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Age_of_majority" title="Age of majority"><span data-dcnode-id="1813" instrument_node="">age of majority</span></a><span data-dcnode-id="1811" instrument_node="">, and </span><a data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military" title="Military"><span data-dcnode-id="1810" instrument_node="">military conscription</span></a><span data-dcnode-id="1808" instrument_node="">. Restrictions on young people that would be considered unacceptable if applied to adults are viewed by youth rights advocates as a form of </span><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Discrimination" title="Discrimination"><span data-dcnode-id="1807" instrument_node="">discrimination</span></a><span data-dcnode-id="1805" instrument_node="">.
</span></p><p data-dcnode-id="1731"><span data-dcnode-id="1803" instrument_node="">There are specific sets of issues addressing the rights of youth in schools, including </span><a class="mw-redirect" data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zero_tolerance_%28schools%29" title="Zero tolerance (schools)"><span data-dcnode-id="1802" instrument_node="">zero tolerance</span></a><span data-dcnode-id="1800" instrument_node="">, "</span><a class="mw-redirect" data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulag_schools" title="Gulag schools"><span data-dcnode-id="1799" instrument_node="">gulag schools</span></a><span data-dcnode-id="1797" instrument_node="">", </span><i data-dcnode-id="1794"><a data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/In_loco_parentis" title="In loco parentis"><span data-dcnode-id="1796" instrument_node="">In loco parentis</span></a></i><span data-dcnode-id="1793" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Student_rights" title="Student rights"><span data-dcnode-id="1792" instrument_node="">student rights</span></a><span data-dcnode-id="1790" instrument_node=""> in general. </span><a data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homeschooling" title="Homeschooling"><span data-dcnode-id="1789" instrument_node="">Homeschooling</span></a><span data-dcnode-id="1787" instrument_node="">, </span><a data-dcnode-id="1785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unschooling" title="Unschooling"><span data-dcnode-id="1786" instrument_node="">unschooling</span></a><span data-dcnode-id="1784" instrument_node="">, and </span><a data-dcnode-id="1782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alternative_school" title="Alternative school"><span data-dcnode-id="1783" instrument_node="">alternative schools</span></a><span data-dcnode-id="1781" instrument_node=""> are popular youth rights issues.
A long-standing effort within the youth rights movements has focused on </span><a data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civic_engagement" title="Civic engagement"><span data-dcnode-id="1780" instrument_node="">civic engagement</span></a><span data-dcnode-id="1778" instrument_node="">. There have been a number of historical campaigns to increase youth </span><a class="mw-redirect" data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_rights" title="Voting rights"><span data-dcnode-id="1777" instrument_node="">voting rights</span></a><span data-dcnode-id="1775" instrument_node=""> by lowering the </span><a data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voting_age" title="Voting age"><span data-dcnode-id="1774" instrument_node="">voting age</span></a><span data-dcnode-id="1772" instrument_node=""> and the </span><a data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Age_of_candidacy" title="Age of candidacy"><span data-dcnode-id="1771" instrument_node="">age of candidacy</span></a><span data-dcnode-id="1769" instrument_node="">. There are also efforts to get young people elected to prominent positions in local communities, including as members of </span><a class="mw-redirect" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/City_council" title="City council"><span data-dcnode-id="1768" instrument_node="">city councils</span></a><span data-dcnode-id="1766" instrument_node=""> and as mayors. For example, in the </span><a data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2011_Raleigh_mayoral_election" title="2011 Raleigh mayoral election"><span data-dcnode-id="1765" instrument_node="">2011 Raleigh mayoral election</span></a><span data-dcnode-id="1763" instrument_node=""> 17-year-old Seth Keel launched a campaign for Mayor despite the age requirement of 21.</span><sup class="reference" data-dcnode-id="1760" id="cite_ref-3"><a data-dcnode-id="1761" href="#cite_note-3"><span data-dcnode-id="1762" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1759" instrument_node="">
Strategies for gaining youth rights that are frequently utilized by their advocates include developing </span><a class="mw-redirect" data-dcnode-id="1757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_programs" title="Youth programs"><span data-dcnode-id="1758" instrument_node="">youth programs</span></a><span data-dcnode-id="1756" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_organizations" title="Youth organizations"><span data-dcnode-id="1755" instrument_node="">organizations</span></a><span data-dcnode-id="1753" instrument_node=""> that promote </span><a data-dcnode-id="1751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_activism" title="Youth activism"><span data-dcnode-id="1752" instrument_node="">youth activism</span></a><span data-dcnode-id="1750" instrument_node="">, </span><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_participation" title="Youth participation"><span data-dcnode-id="1749" instrument_node="">youth participation</span></a><span data-dcnode-id="1747" instrument_node="">, </span><a data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_empowerment" title="Youth empowerment"><span data-dcnode-id="1746" instrument_node="">youth empowerment</span></a><span data-dcnode-id="1744" instrument_node="">, </span><a data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_voice" title="Youth voice"><span data-dcnode-id="1743" instrument_node="">youth voice</span></a><span data-dcnode-id="1741" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth/adult_partnerships" title="Youth/adult partnerships"><span data-dcnode-id="1740" instrument_node="">youth/adult partnerships</span></a><span data-dcnode-id="1738" instrument_node="">, </span><a data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergenerational_equity" title="Intergenerational equity"><span data-dcnode-id="1737" instrument_node="">intergenerational equity</span></a><span data-dcnode-id="1735" instrument_node=""> and </span><a data-dcnode-id="1733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_disobedience" title="Civil disobedience"><span data-dcnode-id="1734" instrument_node="">civil disobedience</span></a><span data-dcnode-id="1732" instrument_node=""> between young people and adults.
</span></p><span data-dcnode-id="1730" instrument_node="">
</span><h2 data-dcnode-id="1720"><span class="mw-headline" data-dcnode-id="1728" id="History"><span data-dcnode-id="1729" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="1721"><span class="mw-editsection-bracket" data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">[</span></span><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_rights%26action%3Dedit%26section%3D2" title="Edit section: History"><span data-dcnode-id="1725" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1719" instrument_node="">
</span><link data-dcnode-id="1718" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1714" role="note"><span data-dcnode-id="1717" instrument_node="">Further information: </span><a data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_youth_rights_in_the_United_States" title="History of youth rights in the United States"><span data-dcnode-id="1716" instrument_node="">History of youth rights in the United States</span></a></div><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1712" instrument_node="">First emerging as a distinct movement in the 1930s, youth rights have long been concerned with </span><a class="mw-redirect" data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_rights" title="Civil rights"><span data-dcnode-id="1711" instrument_node="">civil rights</span></a><span data-dcnode-id="1709" instrument_node=""> and </span><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergenerational_equity" title="Intergenerational equity"><span data-dcnode-id="1708" instrument_node="">intergenerational equity</span></a><span data-dcnode-id="1706" instrument_node="">. Tracing its roots to </span><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_activism" title="Youth activism"><span data-dcnode-id="1705" instrument_node="">youth activists</span></a><span data-dcnode-id="1703" instrument_node=""> during the </span><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression" title="Great Depression"><span data-dcnode-id="1702" instrument_node="">Great Depression</span></a><span data-dcnode-id="1700" instrument_node="">, youth rights has influenced the </span><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_rights_movement" title="Civil rights movement"><span data-dcnode-id="1699" instrument_node="">civil rights movement</span></a><span data-dcnode-id="1697" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Opposition_to_the_Vietnam_War" title="Opposition to the Vietnam War"><span data-dcnode-id="1696" instrument_node="">opposition to the Vietnam War</span></a><span data-dcnode-id="1694" instrument_node="">, and many other movements. Since the advent of the </span><a data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet" title="Internet"><span data-dcnode-id="1693" instrument_node="">Internet</span></a><span data-dcnode-id="1691" instrument_node="">, the youth rights movement has been gaining predominance again.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1684" style="white-space:nowrap;"><span data-dcnode-id="1690" instrument_node="">[</span><i data-dcnode-id="1686"><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1688" title="This claim needs references to reliable sources. (February 2008)"><span data-dcnode-id="1689" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1685" instrument_node="">]</span></sup><span data-dcnode-id="1683" instrument_node="">
</span></p><span data-dcnode-id="1681" instrument_node="">
</span><h2 data-dcnode-id="1671"><span class="mw-headline" data-dcnode-id="1679" id="Fallibility_and_individual_differences"><span data-dcnode-id="1680" instrument_node="">Fallibility and individual differences</span></span><span class="mw-editsection" data-dcnode-id="1672"><span class="mw-editsection-bracket" data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">[</span></span><a data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_rights%26action%3Dedit%26section%3D3" title="Edit section: Fallibility and individual differences"><span data-dcnode-id="1676" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1669" instrument_node="">Certain youth rights advocates use the argument of </span><a class="mw-redirect" data-dcnode-id="1667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fallibility" title="Fallibility"><span data-dcnode-id="1668" instrument_node="">fallibility</span></a><span data-dcnode-id="1666" instrument_node=""> against the belief that others can know what is best or worst for an individual, and criticize the children's rights movement for assuming that exterior legislators, parents, authorities and so on can know what is for a "minor"'s own good. These thinkers argue that the ability to correct what others think about one's own </span><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Welfare" title="Welfare"><span data-dcnode-id="1665" instrument_node="">welfare</span></a><span data-dcnode-id="1663" instrument_node=""> in a </span><a data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Falsifiability" title="Falsifiability"><span data-dcnode-id="1662" instrument_node="">falsificationist</span></a><span data-dcnode-id="1660" instrument_node=""> (as opposed to </span><a data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Postmodernism" title="Postmodernism"><span data-dcnode-id="1659" instrument_node="">postmodernist</span></a><span data-dcnode-id="1657" instrument_node="">) manner constitutes a non-arbitrary mental threshold at which an individual can speak for his or herself independently of exterior assumptions, as opposed to arbitrary chronological minimum ages in legislation. They also criticize the carte blanche for arbitrary definitions of "maturity" implicit in children's rights laws such as "with rising age and maturity" for being part of the problem, and suggest the absolute threshold of conceptual after-correcture to remedy it.</span><sup class="reference" data-dcnode-id="1654" id="cite_ref-4"><a data-dcnode-id="1655" href="#cite_note-4"><span data-dcnode-id="1656" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1653" instrument_node="">
</span></p><p data-dcnode-id="1634"><span data-dcnode-id="1651" instrument_node="">These views are often supported by people with experience of the belief in absolutely gradual mental development being abused as an argument for "necessity" of arbitrary distinctions such as </span><a data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Age_of_majority" title="Age of majority"><span data-dcnode-id="1650" instrument_node="">age of majority</span></a><span data-dcnode-id="1648" instrument_node=""> which they perceive as oppressive (either currently oppressing or having formerly oppressed them, depending on age and jurisdiction), and instead cite types of </span><a data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Connectionism" title="Connectionism"><span data-dcnode-id="1647" instrument_node="">connectionism</span></a><span data-dcnode-id="1645" instrument_node=""> that allows for </span><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Critical_phenomena" title="Critical phenomena"><span data-dcnode-id="1644" instrument_node="">critical phenomena</span></a><span data-dcnode-id="1642" instrument_node=""> that encompasses the entire </span><a data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brain" title="Brain"><span data-dcnode-id="1641" instrument_node="">brain</span></a><span data-dcnode-id="1639" instrument_node="">. These thinkers tend to stress that different individuals reach the critical threshold at somewhat different ages with no more than one in 365 (one in 366 in the case of leap years) chance of coinciding with a birthday, and that the relevant difference that it is acceptable to base different treatment on is only between individuals and not between jurisdictions. Generally, the importance of judging each individual by observable relevant behaviors and not by birth date is stressed by advocates of these views.</span><sup class="reference" data-dcnode-id="1636" id="cite_ref-5"><a data-dcnode-id="1637" href="#cite_note-5"><span data-dcnode-id="1638" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1635" instrument_node="">
</span></p><span data-dcnode-id="1633" instrument_node="">

</span><p data-dcnode-id="1592"><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Children%2527s_rights" title="Children's rights"><span data-dcnode-id="1601" instrument_node="">Children's rights</span></a><span data-dcnode-id="1599" instrument_node=""> cover all rights belonging to children. When individuals grow up, they are granted new rights (such as voting, consent, and driving) and duties (such as criminal responsibility and draft eligibility). There are different </span><a class="mw-redirect" data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minimum" title="Minimum"><span data-dcnode-id="1598" instrument_node="">minimum</span></a><span data-dcnode-id="1596" instrument_node=""> limits of age at which </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth" title="Youth"><span data-dcnode-id="1595" instrument_node="">youth</span></a><span data-dcnode-id="1593" instrument_node=""> are, situationally, not independent or deemed legally competent to make certain decisions or take certain actions. Some rights and responsibilities that legally come with age are:

</span><li data-dcnode-id="1567"><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Age_of_criminal_responsibility" title="Age of criminal responsibility"><span data-dcnode-id="1570" instrument_node="">Age of criminal responsibility</span></a><span data-dcnode-id="1568" instrument_node="">,</span></li><span data-dcnode-id="1566" instrument_node="">

</span><li data-dcnode-id="1552"><a data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Legal_working_age" title="Legal working age"><span data-dcnode-id="1555" instrument_node="">Legal working age</span></a><span data-dcnode-id="1553" instrument_node="">,</span></li><span data-dcnode-id="1551" instrument_node="">

</span><p data-dcnode-id="1525"><span data-dcnode-id="1535" instrument_node="">After youth reach these limits they are free to </span><a class="mw-redirect" data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_to_vote" title="Right to vote"><span data-dcnode-id="1534" instrument_node="">vote</span></a><span data-dcnode-id="1532" instrument_node="">, buy or consume </span><a class="mw-redirect" data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alcohol_beverages" title="Alcohol beverages"><span data-dcnode-id="1531" instrument_node="">alcohol beverages</span></a><span data-dcnode-id="1529" instrument_node="">, and drive </span><a class="mw-redirect" data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cars" title="Cars"><span data-dcnode-id="1528" instrument_node="">cars</span></a><span data-dcnode-id="1526" instrument_node="">, among other acts.
</span></p><span data-dcnode-id="1524" instrument_node="">
</span><h2 data-dcnode-id="1514"><span class="mw-headline" data-dcnode-id="1522" id="Movement"><span data-dcnode-id="1523" instrument_node="">Movement</span></span><span class="mw-editsection" data-dcnode-id="1515"><span class="mw-editsection-bracket" data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">[</span></span><a data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_rights%26action%3Dedit%26section%3D5" title="Edit section: Movement"><span data-dcnode-id="1519" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1512" instrument_node="">The "youth rights movement", also described as "youth liberation", is a nascent </span><a class="mw-redirect" data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grass-roots_movement" title="Grass-roots movement"><span data-dcnode-id="1511" instrument_node="">grass-roots movement</span></a><span data-dcnode-id="1509" instrument_node=""> whose aim is to fight against </span><a data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ageism" title="Ageism"><span data-dcnode-id="1508" instrument_node="">ageism</span></a><span data-dcnode-id="1506" instrument_node=""> and for the </span><a class="mw-redirect" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_rights" title="Civil rights"><span data-dcnode-id="1505" instrument_node="">civil rights</span></a><span data-dcnode-id="1503" instrument_node=""> of young people – those "under the age of majority", which is 18 in most countries. It is ostensibly an effort to combat </span><a class="mw-redirect" data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedophobia_%28social_phenomena%29" title="Pedophobia (social phenomena)"><span data-dcnode-id="1502" instrument_node="">pedophobia</span></a><span data-dcnode-id="1500" instrument_node=""> and </span><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ephebiphobia" title="Ephebiphobia"><span data-dcnode-id="1499" instrument_node="">ephebiphobia</span></a><span data-dcnode-id="1497" instrument_node=""> throughout society by promoting </span><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_voice" title="Youth voice"><span data-dcnode-id="1496" instrument_node="">youth voice</span></a><span data-dcnode-id="1494" instrument_node="">, </span><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_empowerment" title="Youth empowerment"><span data-dcnode-id="1493" instrument_node="">youth empowerment</span></a><span data-dcnode-id="1491" instrument_node=""> and ultimately, </span><a data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergenerational_equity" title="Intergenerational equity"><span data-dcnode-id="1490" instrument_node="">intergenerational equity</span></a><span data-dcnode-id="1488" instrument_node=""> through </span><a class="mw-redirect" data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth/adult_partnerships" title="Youth/adult partnerships"><span data-dcnode-id="1487" instrument_node="">youth/adult partnerships</span></a><span data-dcnode-id="1485" instrument_node="">.</span><sup class="reference" data-dcnode-id="1482" id="cite_ref-6"><a data-dcnode-id="1483" href="#cite_note-6"><span data-dcnode-id="1484" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1481" instrument_node="">
Advocates of youth rights distinguish their movement from the </span><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Children%2527s_rights" title="Children's rights"><span data-dcnode-id="1480" instrument_node="">children's rights</span></a><span data-dcnode-id="1478" instrument_node=""> movement, which they argue advocates changes that are often restrictive towards children and youth, and which they accuse of </span><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paternalism" title="Paternalism"><span data-dcnode-id="1477" instrument_node="">paternalism</span></a><span data-dcnode-id="1475" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pedophobia_%28social_phenomena%29" title="Pedophobia (social phenomena)"><span data-dcnode-id="1474" instrument_node="">pedophobia</span></a><span data-dcnode-id="1472" instrument_node="">, and </span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adultism" title="Adultism"><span data-dcnode-id="1471" instrument_node="">adultism</span></a><span data-dcnode-id="1469" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1462" style="white-space:nowrap;"><span data-dcnode-id="1468" instrument_node="">[</span><i data-dcnode-id="1464"><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1466" title="This claim needs references to reliable sources. (March 2007)"><span data-dcnode-id="1467" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1463" instrument_node="">]</span></sup><span data-dcnode-id="1461" instrument_node=""> They point out distinctions between 1970s youth liberation literature and child rights literature from groups such as the </span><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Children%2527s_Defense_Fund" title="Children's Defense Fund"><span data-dcnode-id="1460" instrument_node="">Children's Defense Fund</span></a><span data-dcnode-id="1458" instrument_node="">.</span><sup class="reference" data-dcnode-id="1455" id="cite_ref-7"><a data-dcnode-id="1456" href="#cite_note-7"><span data-dcnode-id="1457" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1454" instrument_node="">
</span></p><span data-dcnode-id="1452" instrument_node="">
</span><h3 data-dcnode-id="1442"><span class="mw-headline" data-dcnode-id="1450" id="Organizations_in_China"><span data-dcnode-id="1451" instrument_node="">Organizations in China</span></span><span class="mw-editsection" data-dcnode-id="1443"><span class="mw-editsection-bracket" data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">[</span></span><a data-dcnode-id="1446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_rights%26action%3Dedit%26section%3D6" title="Edit section: Organizations in China"><span data-dcnode-id="1447" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1437"><a data-dcnode-id="1439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Youth_Rights" title="International Youth Rights"><span data-dcnode-id="1440" instrument_node="">International Youth Rights</span></a><span data-dcnode-id="1438" instrument_node=""> (IYR) is a student-run youth rights organization in China, with regional chapters across the country and abroad. Its aim is to make voices of youth be heard across the world and give opportunities for youths to carry out their own creative solutions to world issues in real life.
</span></p><span data-dcnode-id="1436" instrument_node="">
</span><h3 data-dcnode-id="1426"><span class="mw-headline" data-dcnode-id="1434" id="Organizations_in_Europe"><span data-dcnode-id="1435" instrument_node="">Organizations in Europe</span></span><span class="mw-editsection" data-dcnode-id="1427"><span class="mw-editsection-bracket" data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">[</span></span><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_rights%26action%3Dedit%26section%3D7" title="Edit section: Organizations in Europe"><span data-dcnode-id="1431" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1417"><span data-dcnode-id="1424" instrument_node="">The </span><a class="external text" data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.youthforum.org/" rel="nofollow"><span data-dcnode-id="1423" instrument_node="">European Youth Forum</span></a><span data-dcnode-id="1421" instrument_node=""> (YFJ, from Youth Forum Jeunesse) is the platform of the National Youth Council and International Non-Governmental Youth Organisations in Europe. It strives for youth rights in International Institutions such as the European Union, the Council of Europe and the United Nations.
The European Youth Forum works in the fields of youth policy and youth work development. It focuses its work on European youth policy matters, whilst through engagement on the global level it is enhancing the capacities of its members and promoting global interdependence. In its daily work the European Youth Forum represents the views and opinions of youth organisations in all relevant policy areas and promotes the cross-sectoral nature of youth policy towards a variety of institutional actors. The principles of equality and sustainable development are mainstreamed in the work of the European Youth Forum.
Other International youth rights organizations include </span><a class="new" data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DArticle_12_in_Scotland%26action%3Dedit%26redlink%3D1" title="Article 12 in Scotland (page does not exist)"><span data-dcnode-id="1420" instrument_node="">Article 12 in Scotland</span></a><span data-dcnode-id="1418" instrument_node=""> and K.R.A.T.Z.A. in Germany.
</span></p><p data-dcnode-id="1408"><span data-dcnode-id="1416" instrument_node="">In </span><a data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Malta" title="Malta"><span data-dcnode-id="1415" instrument_node="">Malta</span></a><span data-dcnode-id="1413" instrument_node="">, the voting age has been lowered to 16 in 2018 to vote in national and European Parliament elections.</span><sup class="reference" data-dcnode-id="1410" id="cite_ref-8"><a data-dcnode-id="1411" href="#cite_note-8"><span data-dcnode-id="1412" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1409" instrument_node="">
</span></p><p data-dcnode-id="1400"><span data-dcnode-id="1407" instrument_node="">The </span><a class="external text" data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//europa.eu/youth/_en" rel="nofollow"><span data-dcnode-id="1406" instrument_node="">European Youth Portal</span></a><span data-dcnode-id="1404" instrument_node=""> is the starting place for the European Union's youth policy, with </span><a data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Erasmus%252B" title="Erasmus+"><span data-dcnode-id="1403" instrument_node="">Erasmus+</span></a><span data-dcnode-id="1401" instrument_node=""> as one of its key initiatives.
</span></p><span data-dcnode-id="1399" instrument_node="">
</span><h3 data-dcnode-id="1389"><span class="mw-headline" data-dcnode-id="1397" id="Organizations_in_the_United_States"><span data-dcnode-id="1398" instrument_node="">Organizations in the United States</span></span><span class="mw-editsection" data-dcnode-id="1390"><span class="mw-editsection-bracket" data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">[</span></span><a data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_rights%26action%3Dedit%26section%3D8" title="Edit section: Organizations in the United States"><span data-dcnode-id="1394" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1387" instrument_node="">The </span><a data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Youth_Rights_Association" title="National Youth Rights Association"><span data-dcnode-id="1386" instrument_node="">National Youth Rights Association</span></a><span data-dcnode-id="1384" instrument_node=""> is the primary youth rights organization for the </span><a class="mw-redirect" data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youths_in_the_United_States" title="Youths in the United States"><span data-dcnode-id="1383" instrument_node="">youths in the United States</span></a><span data-dcnode-id="1381" instrument_node="">, with local chapters across the country. The organization known as </span><a data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Americans_for_a_Society_Free_from_Age_Restrictions" title="Americans for a Society Free from Age Restrictions"><span data-dcnode-id="1380" instrument_node="">Americans for a Society Free from Age Restrictions</span></a><span data-dcnode-id="1378" instrument_node=""> is also an important organization. </span><a class="mw-redirect" data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Freechild_Project" title="The Freechild Project"><span data-dcnode-id="1377" instrument_node="">The Freechild Project</span></a><span data-dcnode-id="1375" instrument_node=""> has gained a reputation for interjecting youth rights issues into organizations historically focused on </span><a class="mw-redirect" data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_development" title="Youth development"><span data-dcnode-id="1374" instrument_node="">youth development</span></a><span data-dcnode-id="1372" instrument_node=""> and </span><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_service" title="Youth service"><span data-dcnode-id="1371" instrument_node="">youth service</span></a><span data-dcnode-id="1369" instrument_node=""> through their consulting and training activities. The </span><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_Youth_Action_Network" title="Global Youth Action Network"><span data-dcnode-id="1368" instrument_node="">Global Youth Action Network</span></a><span data-dcnode-id="1366" instrument_node=""> engages young people around the world in advocating for youth rights, and </span><a data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peacefire" title="Peacefire"><span data-dcnode-id="1365" instrument_node="">Peacefire</span></a><span data-dcnode-id="1363" instrument_node=""> provides </span><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Technology" title="Technology"><span data-dcnode-id="1362" instrument_node="">technology</span></a><span data-dcnode-id="1360" instrument_node="">-specific support for youth rights activists.
</span><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Choose_Responsibility" title="Choose Responsibility"><span data-dcnode-id="1359" instrument_node="">Choose Responsibility</span></a><span data-dcnode-id="1357" instrument_node=""> and their successor organization, the </span><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amethyst_Initiative" title="Amethyst Initiative"><span data-dcnode-id="1356" instrument_node="">Amethyst Initiative</span></a><span data-dcnode-id="1354" instrument_node="">, founded by Dr. </span><a class="mw-redirect" data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_McCardell%2C_Jr." title="John McCardell, Jr."><span data-dcnode-id="1353" instrument_node="">John McCardell, Jr.</span></a><span data-dcnode-id="1351" instrument_node="">, exist to promote the discussion of the drinking age, specifically. Choose Responsibility focuses on promoting a legal drinking age of 18, but includes provisions such as education and licensing. The Amethyst Initiative, a collaboration of college presidents and other educators, focuses on discussion and examination of the drinking age, with specific attention paid to the culture of alcohol as it exists on college campuses and the negative impact of the drinking age on alcohol education and responsible drinking.
</span></p><span data-dcnode-id="1349" instrument_node="">
</span><h3 data-dcnode-id="1339"><span class="mw-headline" data-dcnode-id="1347" id="Organizations_in_India"><span data-dcnode-id="1348" instrument_node="">Organizations in India</span></span><span class="mw-editsection" data-dcnode-id="1340"><span class="mw-editsection-bracket" data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">[</span></span><a data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_rights%26action%3Dedit%26section%3D9" title="Edit section: Organizations in India"><span data-dcnode-id="1344" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1326"><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Young_India_Foundation" title="Young India Foundation"><span data-dcnode-id="1337" instrument_node="">Young India Foundation</span></a><span data-dcnode-id="1335" instrument_node=""> (YIF) is a youth-led youth rights organization in India, based in Gurgaon with regional chapters across India. Its aim is to make voices of youth be heard across India and seek representation for the 60% of India's demographic that is below the age of 25.</span><sup class="reference" data-dcnode-id="1332" id="cite_ref-9"><a data-dcnode-id="1333" href="#cite_note-9"><span data-dcnode-id="1334" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1331" instrument_node=""> YIF is also the organization behind the age of candidacy campaign to bring down the age when a Member of Legislative Assembly or Member of Parliament can contest.</span><sup class="reference" data-dcnode-id="1328" id="cite_ref-10"><a data-dcnode-id="1329" href="#cite_note-10"><span data-dcnode-id="1330" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1327" instrument_node="">
</span></p><span data-dcnode-id="1325" instrument_node="">
</span><h3 data-dcnode-id="1315"><span class="mw-headline" data-dcnode-id="1323" id="Prominent_individuals"><span data-dcnode-id="1324" instrument_node="">Prominent individuals</span></span><span class="mw-editsection" data-dcnode-id="1316"><span class="mw-editsection-bracket" data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">[</span></span><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DYouth_rights%26action%3Dedit%26section%3D10" title="Edit section: Prominent individuals"><span data-dcnode-id="1320" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1313" instrument_node="">Youth rights, as a philosophy and as a movement, has been informed and is led by a variety of individuals and institutions across the United States and around the world. In the 1960s and 70s </span><a class="mw-redirect" data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Caldwell_Holt" title="John Caldwell Holt"><span data-dcnode-id="1312" instrument_node="">John Holt</span></a><span data-dcnode-id="1310" instrument_node="">, </span><a data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Farson" title="Richard Farson"><span data-dcnode-id="1309" instrument_node="">Richard Farson</span></a><span data-dcnode-id="1307" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Goodman_%28writer%29" title="Paul Goodman (writer)"><span data-dcnode-id="1306" instrument_node="">Paul Goodman</span></a><span data-dcnode-id="1304" instrument_node=""> and </span><a data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neil_Postman" title="Neil Postman"><span data-dcnode-id="1303" instrument_node="">Neil Postman</span></a><span data-dcnode-id="1301" instrument_node=""> were regarded authors who spoke out about youth rights throughout society, including education, government, social services and popular citizenship. Shulamith Firestone also wrote about youth rights issues in the second-wave feminist classic "The Dialectic of Sex." </span><a data-dcnode-id="1299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alex_Koroknay-Palicz" title="Alex Koroknay-Palicz"><span data-dcnode-id="1300" instrument_node="">Alex Koroknay-Palicz</span></a><span data-dcnode-id="1298" instrument_node=""> has become a vocal youth rights proponent, making regular appearances on television and in newspapers. </span><a data-dcnode-id="1296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mike_A._Males" title="Mike A. Males"><span data-dcnode-id="1297" instrument_node="">Mike A. Males</span></a><span data-dcnode-id="1295" instrument_node=""> is a prominent </span><a class="mw-redirect" data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sociologist" title="Sociologist"><span data-dcnode-id="1294" instrument_node="">sociologist</span></a><span data-dcnode-id="1292" instrument_node=""> and researcher who has published several books regarding the rights of young people across the United States. </span><a data-dcnode-id="1290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Epstein" title="Robert Epstein"><span data-dcnode-id="1291" instrument_node="">Robert Epstein</span></a><span data-dcnode-id="1289" instrument_node=""> is another prominent author who has called for greater rights and responsibilities for youth. Several organizational leaders, including </span><a class="new" data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSarah_Fitz-Claridge%26action%3Dedit%26redlink%3D1" title="Sarah Fitz-Claridge (page does not exist)"><span data-dcnode-id="1288" instrument_node="">Sarah Fitz-Claridge</span></a><span data-dcnode-id="1286" instrument_node=""> of </span><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taking_Children_Seriously" title="Taking Children Seriously"><span data-dcnode-id="1285" instrument_node="">Taking Children Seriously</span></a><span data-dcnode-id="1283" instrument_node="">, </span><a data-dcnode-id="1281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bennett_Haselton" title="Bennett Haselton"><span data-dcnode-id="1282" instrument_node="">Bennett Haselton</span></a><span data-dcnode-id="1280" instrument_node=""> of </span><a data-dcnode-id="1278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peacefire" title="Peacefire"><span data-dcnode-id="1279" instrument_node="">Peacefire</span></a><span data-dcnode-id="1277" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adam_Fletcher_%28activist%29" title="Adam Fletcher (activist)"><span data-dcnode-id="1276" instrument_node="">Adam Fletcher (activist)</span></a><span data-dcnode-id="1274" instrument_node=""> of </span><a class="mw-redirect" data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Freechild_Project" title="The Freechild Project"><span data-dcnode-id="1273" instrument_node="">The Freechild Project</span></a><span data-dcnode-id="1271" instrument_node=""> conduct local, national, and international </span><a class="mw-redirect" data-dcnode-id="1269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Youth_programs" title="Youth programs"><span data-dcnode-id="1270" instrument_node="">outreach</span></a><span data-dcnode-id="1268" instrument_node=""> for youth and adults regarding youth rights. </span><a data-dcnode-id="1266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Giuseppe_Porcaro" title="Giuseppe Porcaro"><span data-dcnode-id="1267" instrument_node="">Giuseppe Porcaro</span></a><span data-dcnode-id="1265" instrument_node=""> during his mandate as Secretary General of the </span><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Youth_Forum" title="European Youth Forum"><span data-dcnode-id="1264" instrument_node="">European Youth Forum</span></a><span data-dcnode-id="1262" instrument_node=""> edited the second edition of the volume "The International Law of Youth Rights" published by </span><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brill_Publishers" title="Brill Publishers"><span data-dcnode-id="1261" instrument_node="">Brill Publishers</span></a><span data-dcnode-id="1259" instrument_node="">.
</span></p><span data-dcnode-id="1257" instrument_node="">
