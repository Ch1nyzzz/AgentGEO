</span><h3 data-dcnode-id="519" style="text-align: center;"><strong data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Voting Rights: An Introduction to Federal Voting Rights Laws</span></strong></h3><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">&nbsp;</span></p><span data-dcnode-id="515" instrument_node="">
</span><figure aria-describedby="caption-attachment-21386" class="wp-caption alignleft" data-dcnode-id="501" id="attachment_21386" style="width: 537px"><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2015/11/Marchers_with_signs_at_the_March_on_Washington_1963.jpg" target="_blank"><img alt="Marchers with signs at the 1963 March on Washington" class="wp-image-21386 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="514" data-lazy-loaded="1" height="356" loading="eager" sizes="(max-width: 537px) 100vw, 537px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2015/11/Marchers_with_signs_at_the_March_on_Washington_1963.jpg&amp;raw" srcset="https://3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2015/11/Marchers_with_signs_at_the_March_on_Washington_1963.jpg 1005w, https://3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2015/11/Marchers_with_signs_at_the_March_on_Washington_1963-300x199.jpg 300w, https://3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2015/11/Marchers_with_signs_at_the_March_on_Washington_1963-768x510.jpg 768w" width="537"><noscript data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">&lt;img class=" wp-image-21386" src="https://3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2015/11/Marchers_with_signs_at_the_March_on_Washington_1963.jpg" alt="Marchers with signs at the 1963 March on Washington" width="537" height="356" srcset="https://3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2015/11/Marchers_with_signs_at_the_March_on_Washington_1963.jpg 1005w, https://3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2015/11/Marchers_with_signs_at_the_March_on_Washington_1963-300x199.jpg 300w, https://3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2015/11/Marchers_with_signs_at_the_March_on_Washington_1963-768x510.jpg 768w" sizes="(max-width: 537px) 100vw, 537px" /&gt;</span></noscript></a><figcaption class="wp-caption-text" data-dcnode-id="502" id="caption-attachment-21386"><strong data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Marchers with signs at the March on Washington, 1963</span></strong><br data-dcnode-id="508"><span data-dcnode-id="507" instrument_node="">Image: Library of Congress </span><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.loc.gov/pictures/resource/ppmsca.37229/" target="_blank"><span data-dcnode-id="506" instrument_node="">LC-U9- 10344-16</span></a><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">Marion S. Trikosko, photographer</span></figcaption></figure><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="496"><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/crt/introduction-federal-voting-rights-laws-1" rel="noopener" target="_blank"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Introduction To Federal Voting Rights Laws</span></strong></a></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">The Voting Rights Act, adopted initially in 1965 and extended in 1970, 1975, and 1982, is generally considered the most successful piece of civil rights legislation ever adopted by the United States Congress. The Act codifies and effectuates the 15th Amendment’s permanent guarantee that, throughout the nation, no person shall be denied the right to vote on account of race or color. In addition, the Act contains several special provisions that impose even more stringent requirements in certain jurisdictions throughout the country.</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Adopted at a time when African Americans were substantially disfranchised in many Southern states, the Act employed measures to restore the right to vote that intruded in matters previously reserved to the individual states. Section 4 ended the use of literacy requirements for voting in six Southern states (Alabama, Georgia, Louisiana, Mississippi, South Carolina, and Virginia) and in many counties of North Carolina, where voter registration or turnout in the 1964 presidential election was less than 50 percent of the voting-age population. Under the terms of Section 5 of the Act, no voting changes were legally enforceable in these jurisdictions until approved either by a three-judge court in the District of Columbia or by the Attorney General of the United States. Other sections authorized the Attorney General to appoint federal voting examiners who could be sent into covered jurisdictions to ensure that legally qualified persons were free to register for federal, state, and local elections, or to assign federal observers to oversee the conduct of elections.</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Congress determined that such a far-reaching statute only in response to compelling evidence of continuing interference with attempts by African American citizens to exercise their right to vote. As the Supreme Court put it in its 1966 decision upholding the constitutionality of the Act:</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Congress had found that case-by-case litigation was inadequate to combat wide-spread and persistent discrimination in voting, because of the inordinant amount of time and energy required to overcome the obstructionist tactics invariably encountered in these lawsuits. After enduring nearly a century of systematic resistance to the Fifteenth Amendment, Congress might well decide to shift the advantage of time and inertia from the perpetrators of the evil to its victims.</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="476"><em data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">South Carolina</span></em><span data-dcnode-id="480" instrument_node="">&nbsp;v.&nbsp;</span><em data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Katzenbach</span></em><span data-dcnode-id="477" instrument_node="">, 383 U.S. 301, 327-28 (1966).</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">At the time the Act was first adopted, only one-third of all African Americans of voting age were on the registration rolls in the specially covered states, while two-thirds of eligible whites were registered. Now black voter registration rates are approaching parity with that of whites in many areas, and Hispanic voters in jurisdictions added to the list of those specially covered by the Act in 1975 are not far behind. Enforcement of the Act has also increased the opportunity of black and Latino voters to elect representatives of their choice by providing a vehicle for challenging discriminatory election methods such as at-large elections, racially gerrymandered districting plans, or runoff requirements that may dilute minority voting strength. Virtually excluded from all public offices in the South in 1965, black and Hispanic voters are now substantially represented in the state legislatures and local governing bodies throughout the region.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="468"><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/crt/introduction-federal-voting-rights-laws" rel="noopener" target="_blank"><strong data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Before the Voting Rights Act</span></strong></a></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="464"><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Reconstruction and the Civil War Amendments&nbsp;</span></strong></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Before the Civil War the United States Constitution did not provide specific protections for voting. Qualifications for voting were matters which neither the Constitution nor federal laws governed. At that time, although a few northern states permitted a small number of free black men to register and vote, slavery and restrictive state laws and practices led the franchise to be exercised almost exclusively by white males.</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Shortly after the end of the Civil War Congress enacted the Military Reconstruction Act of 1867, which allowed former Confederate States to be readmitted to the Union if they adopted new state constitutions that permitted universal male suffrage. The 14th Amendment, which conferred citizenship to all persons born or naturalized in the United States, was ratified in 1868.</span></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">In 1870 the 15th Amendment was ratified, which provided specifically that the right to vote shall not be denied or abridged on the basis of race, color or previous condition of servitude. This superseded state laws that had directly prohibited black voting. Congress then enacted the Enforcement Act of 1870, which contained criminal penalties for interference with the right to vote, and the Force Act of 1871, which provided for federal election oversight.</span></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">As a result, in the former Confederate States, where new black citizens in some cases comprised outright or near majorities of the eligible voting population, hundreds of thousands — perhaps one million — recently-freed slaves registered to vote. Black candidates began for the first time to be elected to state, local and federal offices and to play a meaningful role in their governments.</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="448" style="text-align: left;"><strong data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Disfranchisement</span></strong></p><span data-dcnode-id="447" instrument_node="">
</span><figure aria-describedby="caption-attachment-20281" class="wp-caption alignright" data-dcnode-id="434" id="attachment_20281" style="width: 450px"><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2014/04/Poll-Tax-1948-bill-alt-rsz-small.jpg" target="_blank"><img alt="Virginia Poll Tax receipt 1947" class="size-full wp-image-20281 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="446" data-lazy-loaded="1" height="323" loading="eager" sizes="(max-width: 450px) 100vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2014/04/Poll-Tax-1948-bill-alt-rsz-small.jpg&amp;raw" srcset="https://3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2014/04/Poll-Tax-1948-bill-alt-rsz-small.jpg 450w, https://3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2014/04/Poll-Tax-1948-bill-alt-rsz-small-300x215.jpg 300w" width="450"><noscript data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-20281" src="https://3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2014/04/Poll-Tax-1948-bill-alt-rsz-small.jpg" alt="Virginia Poll Tax receipt 1947" width="450" height="323" srcset="https://3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2014/04/Poll-Tax-1948-bill-alt-rsz-small.jpg 450w, https://3rc9rg1aoo2w15zsjn2jp37o-wpengine.netdna-ssl.com/wp-content/uploads/2014/04/Poll-Tax-1948-bill-alt-rsz-small-300x215.jpg 300w" sizes="(max-width: 450px) 100vw, 450px" /&gt;</span></noscript></a><figcaption class="wp-caption-text" data-dcnode-id="435" id="caption-attachment-20281"><span data-dcnode-id="442" instrument_node="">Virginia Poll Tax receipt, 1947</span><br data-dcnode-id="441"><span data-dcnode-id="440" instrument_node="">Photo: Courtesy of the Virginia Commonwealth University</span><br data-dcnode-id="439"><span data-dcnode-id="438" instrument_node="">Special Collections and Archives</span><br data-dcnode-id="437"><span data-dcnode-id="436" instrument_node="">James Branch Cabell Library</span></figcaption></figure><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">The extension of the franchise to black citizens was strongly resisted. Among others, the Ku Klux Klan, the Knights of the White Camellia, and other terrorist organizations attempted to prevent the 15th Amendment from being enforced by violence and intimidation. Two decisions in 1876 by the Supreme Court narrowed the scope of enforcement under the Enforcement Act and the Force Act, and, together with the end of Reconstruction marked by the removal of federal troops after the Hayes-Tilden Compromise of 1877, resulted in a climate in which violence could be used to depress black voter turnout and fraud could be used to undo the effect of lawfully cast votes.</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Once whites regained control of the state legislatures using these tactics, a process known as “Redemption,” they used gerrymandering of election districts to further reduce black voting strength and minimize the number of black elected officials. In the 1890s, these states began to amend their constitutions and to enact a series of laws intended to re-establish and entrench white political supremacy.</span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Such disfranchising laws included poll taxes, literacy tests, vouchers of “good character,” and disqualification for “crimes of moral turpitude.” These laws were “color-blind” on their face, but were designed to exclude black citizens disproportionately by allowing white election officials to apply the procedures selectively. Other laws and practices, such as the “white primary,”, attempted to evade the 15th Amendment by allowing “private” political parties to conduct elections and establish qualifications for their members.</span></p><span data-dcnode-id="424" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">As a result of these efforts, in the former Confederate states nearly all black citizens were disenfranchised and removed from by 1910. The process of restoring the rights taken stolen by these tactics would take many decades.</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="418" style="text-align: left;"><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Attacks on Disfranchisement Before the Voting Rights Act</span></strong></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="416" instrument_node="">In&nbsp;</span><em data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Guinn</span></em><span data-dcnode-id="413" instrument_node="">&nbsp;v.&nbsp;</span><em data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">United States</span></em><span data-dcnode-id="410" instrument_node="">, 238 U.S. 347 (1915), the Supreme Court held that voter registration requirements containing “grandfather clauses,”, which made voter registration in part dependent upon whether the applicant was descended from men enfranchised before enactment of the 15th Amendment violated that amendment. The Supreme Court found the Oklahoma law was adopted in order to give whites, who might otherwise have been disfranchised by the state’s literacy test, a way of qualifying to vote that was not available to blacks. In 1944, the Supreme Court held that the Texas “white primary” violated the 15th Amendment.&nbsp;</span><em data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Smith</span></em><span data-dcnode-id="407" instrument_node="">&nbsp;v.&nbsp;</span><em data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Allwright</span></em><span data-dcnode-id="404" instrument_node="">, 321 U.S. 649 (1944). The Southern states experimented with numerous additional restrictions to limit black participation in politics, many of which were struck down by federal courts over the next decade.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Congress passed legislation in 1957, 1960, and 1964 that contained voting-related provisions. The 1957 Act created the Civil Rights Division within the Department of Justice and the Commission on Civil Rights; the Attorney General was given authority to intervene in and institute lawsuits seeking injunctive relief against violations of the 15th Amendment. The 1960 Act permitted federal courts to appoint voting referees to conduct voter registration following a judicial finding of voting discrimination. The 1964 Act also contained several relatively minor voting-related provisions. Although court decisions and these laws made it more difficult, at least in theory, for states to keep all of their black citizens disenfranchised, the strategy of litigation on a case-by-case basis proved to be of very limited success in the jurisdictions were sued and it did not prompt voluntary compliance among jurisdictions that had not been sued. Literacy tests, poll taxes, and other formal and informal practices combined to keep black registration rates minimal in Alabama, Louisiana, and Mississippi, and well below white registration rates in the others.</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="398" instrument_node="">Faced with the prospect that black voter registration could not be suppressed forever, however, some states began to change political boundaries and election structures so as to minimize the impact of black re-enfranchisement. In 1960, the Supreme Court struck down one such effort, in which the state legislature had gerrymandered the city boundaries of Tuskegee, Alabama, so as to remove all but a handful of the city’s black registered voters. The Supreme Court ruled that by doing so Alabama had violated the 15th Amendment.&nbsp;&nbsp;</span><em data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Gomillion</span></em><span data-dcnode-id="395" instrument_node="">&nbsp;v.&nbsp;</span><em data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Lightfoot</span></em><span data-dcnode-id="392" instrument_node="">, 364 U.S. 339 (1960).</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="387" style="text-align: left;"><strong data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">The “Reapportionment Revolution”</span></strong></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="385" instrument_node="">In the early 1960s, the Supreme Court also overcame its reluctance to apply the Constitution to unfair redistricting practices. Prior to 1962, the United States Supreme Court had declined to decide constitutional challenges to legislative apportionment schemes, on the grounds that such “political questions” were not within the federal courts’ jurisdiction. In&nbsp;</span><em data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Baker</span></em><span data-dcnode-id="382" instrument_node="">&nbsp;v.&nbsp;</span><em data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Carr</span></em><span data-dcnode-id="379" instrument_node="">, 369 U.S. 186 (1962), however, the Supreme Court recognized that grossly malapportioned state legislative districts could seriously undervalue — or dilute — the voting strength of the residents of overpopulated districts while overvaluing the voting strength of residents of underpopulated districts. The Supreme Court found that such malapportionment could be challenged in federal court under the Equal Protection Clause of the 14th Amendment.</span></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="376" instrument_node="">In later cases including&nbsp;</span><em data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">Reynolds</span></em><span data-dcnode-id="373" instrument_node="">&nbsp;v.&nbsp;</span><em data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Sims</span></em><span data-dcnode-id="370" instrument_node="">, 377 U.S. 533 (1964), and&nbsp;</span><em data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Wesberry</span></em><span data-dcnode-id="367" instrument_node="">&nbsp;v.&nbsp;</span><em data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Sanders</span></em><span data-dcnode-id="364" instrument_node="">, 376 U.S. 1 (1964), the Supreme Court established the one-person, one-vote principle. Because in many states malapportioned legislative districts had resulted in sparsely-populated rural counties having a much greater share of their state’s political power than their state’s population, correcting this imbalance led to dramatic realignments of political power in several states. In&nbsp;</span><em data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Fortson</span></em><span data-dcnode-id="361" instrument_node="">&nbsp;v.&nbsp;</span><em data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Dorsey</span></em><span data-dcnode-id="358" instrument_node="">, 379 U.S. 433 (1965), the Supreme Court suggested, but did not hold, that certain types of apportionment might unconstitutionally dilute the voting strength of racial minorities.</span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">&nbsp;</span></p><span data-dcnode-id="353" instrument_node="">
</span><h4 data-dcnode-id="348" style="text-align: left;"><a data-dcnode-id="349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//socialwelfare.library.vcu.edu/eras/the-voting-rights-act-of-1965/" rel="noopener" target="_blank"><strong data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">The Voting Rights Act of 1965</span></strong><span data-dcnode-id="350" instrument_node="">&nbsp;</span></a></h4><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">By 1965 concerted efforts to break the grip of state disfranchisement had been under way for some time, but had achieved only modest success overall and in some areas had proved almost entirely ineffectual. The murder of voting-rights activists in Philadelphia, Mississippi, gained national attention, along with numerous other acts of violence and terrorism. Finally, the unprovoked attack on March 7, 1965, by state troopers on peaceful marchers crossing the Edmund Pettus Bridge in Selma, Alabama, en route to the state capitol in Montgomery, persuaded the President and Congress to overcome Southern legislators’ resistance to effective voting rights legislation. President Johnson issued a call for a strong voting rights law and hearings began soon thereafter on the bill that would become the Voting Rights Act.</span></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Congress determined that the existing federal anti-discrimination laws were not sufficient to overcome the resistance by state officials to enforcement of the 15th Amendment. The legislative hearings showed that the Department of Justice’s efforts to eliminate discriminatory election practices by litigation on a case-by-case basis had been unsuccessful in opening up the registration process; as soon as one discriminatory practice or procedure was proven to be unconstitutional and enjoined, a new one would be substituted in its place and litigation would have to commence anew.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">President Johnson signed the resulting legislation into law on August 6, 1965. Section 2&nbsp;of the Act, which closely followed the language of the 15th amendment, applied a nationwide prohibition against the denial or abridgment of the right to vote on the literacy tests on a nationwide basis. Among its other provisions, the Act contained special enforcement provisions targeted at those areas of the country where Congress believed the potential for discrimination to be the greatest. Under Section 5, jurisdictions covered by these special provisions could not implement any change affecting voting until the Attorney General or the United States District Court for the District of Columbia determined that the change did not have a discriminatory purpose and would not have a discriminatory effect. In addition, the Attorney General could designate a county covered by these special provisions for the appointment of a federal examiner a&nbsp;to review the qualifications of persons who wanted to register to vote. Further, in those counties where a federal examiner was serving, the Attorney General could request that federal observers&nbsp;monitor activities within the county’s polling place.</span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="337" instrument_node="">The Voting Rights Act had not included a provision prohibiting poll taxes, but had directed the Attorney General to challenge its use. In&nbsp;</span><em data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Harper</span></em><span data-dcnode-id="334" instrument_node="">&nbsp;v.&nbsp;</span><em data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Virginia State Board of Elections</span></em><span data-dcnode-id="331" instrument_node="">, 383 U.S. 663 (1966), the Supreme Court held Virginia’s poll tax to be unconstitutional under the 14th Amendment. Between 1965 and 1969 the Supreme Court also issued several key decisions upholding the constitutionality of Section 5 and affirming the broad range of voting practices that required Section 5 review. As the Supreme Court put it in its 1966 decision upholding the constitutionality of the Act:</span></p><span data-dcnode-id="329" instrument_node="">
</span><blockquote data-dcnode-id="326"><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Congress had found that case-by-case litigation was inadequate to combat wide-spread and persistent discrimination in voting, because of the inordinate amount of time and energy required to overcome the obstructionist tactics invariably encountered in these lawsuits. After enduring nearly a century of systematic resistance to the Fifteenth Amendment, Congress might well decide to shift the advantage of time and inertia from the perpetrators of the evil to its victims.</span></p></blockquote><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="318"><em data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">South Carolina</span></em><span data-dcnode-id="322" instrument_node="">&nbsp;v.&nbsp;</span><em data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Katzenbach</span></em><span data-dcnode-id="319" instrument_node="">, 383 U.S. 301, 327-28 (1966).</span></p><span data-dcnode-id="317" instrument_node="">
</span><h5 data-dcnode-id="314" style="text-align: left;"><strong data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">The 1970 and 1975 Amendments</span></strong></h5><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Congress extended Section 5 for five years in 1970 and for seven years in 1975. With these extensions Congress validated the Supreme Court’s broad interpretation of the scope of Section 5. During the hearings on these extensions Congress heard extensive testimony concerning the ways in which voting electorates were manipulated through gerrymandering, annexations, adoption of at-large elections, and other structural changes to prevent newly-registered black voters from effectively using the ballot. Congress also heard extensive testimony about voting discrimination that had been suffered by Hispanic, Asian and Native American citizens, and the 1975 amendments added protections from voting discrimination for language minority citizens.</span></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="296"><span data-dcnode-id="309" instrument_node="">In 1973, the Supreme Court held certain legislative multi-member districts unconstitutional under the 14th Amendment on the ground that they systematically diluted the voting strength of minority citizens in Bexar County, Texas. This decision in&nbsp;</span><em data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">White</span></em><span data-dcnode-id="306" instrument_node="">&nbsp;v.&nbsp;</span><em data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Regester</span></em><span data-dcnode-id="303" instrument_node="">, 412 U.S. 755 (1973), strongly shaped litigation through the 1970s against at-large systems and gerrymandered redistricting plans. In&nbsp;</span><em data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Mobile</span></em><span data-dcnode-id="300" instrument_node="">&nbsp;v.&nbsp;</span><em data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Bolden</span></em><span data-dcnode-id="297" instrument_node="">, 446 U.S. 55 (1980), however, the Supreme Court required that any constitutional claim of minority vote dilution must include proof of a racially discriminatory purpose, a requirement that was widely seen as making such claims far more difficult to prove.</span></p><span data-dcnode-id="295" instrument_node="">
</span><h5 data-dcnode-id="292"><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">The 1982 Amendments</span></strong></h5><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Congress renewed in 1982 the special provisions of the Act, triggered by coverage under Section 4 for twenty-five years. Congress also adopted a new standard, which went into effect in 1985, providing how jurisdictions could terminate (or “bail out” from) coverage under the provisions of Section 4. Furthermore, after extensive hearings, Congress amended Section 2 to provide that a plaintiff could establish a violation of the Section without having to prove discriminatory purpose.</span></p><span data-dcnode-id="288" instrument_node="">
</span><h5 data-dcnode-id="285"><strong data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">The 2006 Amendments</span></strong></h5><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Congress renewed the special provisions of the Act in 2006 as part of the Fannie Lou Hamer, Rosa Parks, Coretta Scott King, Cesar E. Chavez, Barbara Jordan, William Velazquez and Dr. Hector Garcia Voting Rights Act Reauthorization and Amendments Act. The 2006 legislation eliminated the provision for voting examiners.</span></p><span data-dcnode-id="281" instrument_node="">
