</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id2&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id3&quot;><p id=&quot;sp0005&quot;>Youth participation strengthens personal and social development, provides expertise for children and youth programs and services, and promotes a more democratic society, but questions arise about its most fundamental phenomena. Lacking agreement on its basic content, however, youth participation as a field of practice and subject of study will be limited. This paper examines what we know about youth participation, general propositions which are substantiated by research or practice, and unanswered questions or unresolved issues which remain for future work. It draws upon various academic disciplines and professional fields, in order to contribute to knowledge development and advance the field.</p></div></div></div>" data-dcnode-id="4886" lang="en" name="citation_abstract"><span data-dcnode-id="4885" instrument_node="">

span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="4432" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="4435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.childyouth.2010.09.017" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="4436" instrument_node="">https://doi.org/10.1016/j.childyouth.2010.09.017</span></a><a class="rights-and-content" data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0190740910003270%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4434" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="4431"></section><section class="ReferencedArticles" data-dcnode-id="4430"></section><div class="PageDivider" data-dcnode-id="4429"></div><div class="Abstracts u-font-serif" data-dcnode-id="4416" id="abstracts"><div class="abstract author" data-dcnode-id="4423" id="aep-abstract-id2"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4427"><span data-dcnode-id="4428" instrument_node="">Abstract</span></h2><div data-dcnode-id="4424" id="aep-abstract-sec-id3"><p data-dcnode-id="4425" id="sp0005"><span data-dcnode-id="4426" instrument_node="">Youth participation strengthens personal and social development, provides expertise for children and youth programs and services, and promotes a more democratic society, but questions arise about its most fundamental phenomena. Lacking agreement on its basic content, however, youth participation as a field of practice and subject of study will be limited. This paper examines what we know about youth participation, general propositions which are substantiated by research or practice, and unanswered questions or unresolved issues which remain for future work. It draws upon various academic disciplines and professional fields, in order to contribute to knowledge development and advance the field.</span></p></div></div><div class="abstract graphical" data-dcnode-id="4417" id="aep-abstract-id4"><div data-dcnode-id="4418" id="aep-abstract-sec-id5"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4421"><span data-dcnode-id="4422" instrument_node="">Research Highlights</span></h3><p data-dcnode-id="4419" id="sp0010"><span data-dcnode-id="4420" instrument_node="">► Youth participation contributes to social development, program decisions, and democratic society. ► We examine general propositions substantiated by research or practice, and unanswered questions remaining for future work. ► Literature is reviewed from various academic disciplines and professional fields.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="4393" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="4405"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0190740910003257"><svg class="icon icon-navigate-left" data-dcnode-id="4414" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="4415"></path></svg><span class="button-alternative-text" data-dcnode-id="4407"><strong data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="4410"><span data-dcnode-id="4411" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4408"><span data-dcnode-id="4409" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="4394"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0190740910003282"><span class="button-alternative-text" data-dcnode-id="4398"><strong data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4399"><span data-dcnode-id="4400" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="4396" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="4397"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="4377"><div class="keywords-section" data-dcnode-id="4378" id="aep-keywords-id6"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4391"><span data-dcnode-id="4392" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="4388"><span data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">Youth participation</span></span></div><div class="keyword" data-dcnode-id="4385"><span data-dcnode-id="4386"><span data-dcnode-id="4387" instrument_node="">Civic engagement</span></span></div><div class="keyword" data-dcnode-id="4382"><span data-dcnode-id="4383"><span data-dcnode-id="4384" instrument_node="">Community involvement</span></span></div><div class="keyword" data-dcnode-id="4379"><span data-dcnode-id="4380"><span data-dcnode-id="4381" instrument_node="">Adults as allies</span></span></div></div></div><span data-dcnode-id="4376" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3859" id="body"><div data-dcnode-id="3860"><section data-dcnode-id="4358" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4370"><span data-dcnode-id="4375" instrument_node="">1</span><span data-dcnode-id="4373" instrument_node="">. </span><span data-dcnode-id="4371" instrument_node="">Introduction</span></h2><p data-dcnode-id="4368" id="p0005"><span data-dcnode-id="4369" instrument_node="">What do we know about youth participation? What are some general propositions which are substantiated by research or practice? What are some unanswered questions or unresolved issues which remain for future work?</span></p><p data-dcnode-id="4366" id="p0010"><span data-dcnode-id="4367" instrument_node="">Youth participation is important, because when young people participate, it draws upon their expertise, enables them to exercise their rights as citizens, and contributes to a more democratic society. It also promotes their personal development, and provides them with substantive knowledge and practical skills.</span></p><p data-dcnode-id="4364" id="p0015"><span data-dcnode-id="4365" instrument_node="">Youth participation is important, but questions arise about its most fundamental phenomena. What is participation, who are the participants, what do they do, and with what outcomes? When we say that someone participates, is it about “community service,” or “social action,” or “civic engagement”? Lacking agreement on its basic content, a field of practice or subject of study will be limited. The question is not whether there is consensus or conflict, but rather whether there is a measure of mutual understanding about what to discuss.</span></p><p data-dcnode-id="4359" id="p0020"><span data-dcnode-id="4363" instrument_node="">The purpose of this paper is to address questions like these by pulling together information from disparate sources, making sense of general propositions, and identifying unanswered questions about youth participation. It represents an exercise in the “scholarship of integration,” an approach which draws upon various academic disciplines and professional fields in order to contribute to knowledge development and advance the field (</span><a class="workspace-trigger" data-dcnode-id="4361" href="#bb0020" name="bbb0020"><span data-dcnode-id="4362" instrument_node="">Boyer, 1997</span></a><span data-dcnode-id="4360" instrument_node="">).</span></p></section><section data-dcnode-id="3982" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4352"><span data-dcnode-id="4357" instrument_node="">2</span><span data-dcnode-id="4355" instrument_node="">. </span><span data-dcnode-id="4353" instrument_node="">General propositions</span></h2><p data-dcnode-id="4350" id="p0025"><span data-dcnode-id="4351" instrument_node="">Following are some general propositions about youth participation which are substantiated by research or practice. They are not the only propositions, but among the important ones.</span></p><section data-dcnode-id="4335" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4344"><span data-dcnode-id="4349" instrument_node="">2.1</span><span data-dcnode-id="4347" instrument_node="">. </span><span data-dcnode-id="4345" instrument_node="">Youth participation is a right protected by the Convention on the Rights of the Child</span></h3><p data-dcnode-id="4342" id="p0030"><span data-dcnode-id="4343" instrument_node="">The first declaration of rights was adopted by the International Save the Children Union in Geneva in1923, and endorsed by the League of Nations General Assembly in 1924, as the World Child Welfare Charter. The Declaration of the Rights of the Child was proclaimed by the United Nations in 1959, and was the basis for the Convention of the Rights of the Child adopted by the United Nations General Assembly in 1989.</span></p><p data-dcnode-id="4340" id="p0035"><span data-dcnode-id="4341" instrument_node="">Article 12 states that children have the right to participate in decision-making processes relevant to their lives and to influence decisions taken in their regard, especially in schools or communities. It affirms that children are full-fledged persons who have the right to express their views in all matters affecting them and requires that those views be heard and given due weight. It recognizes the potential of children to share perspectives and to participate as citizens and actors of change.</span></p><p data-dcnode-id="4338" id="p0040"><span data-dcnode-id="4339" instrument_node="">This right is related to the right that children should have the necessary information about options that exist and the consequences of such options so that they can make informed and free decisions. Providing information enables children to gain skills, confidence and maturity in expressing views and influencing decisions.</span></p><p data-dcnode-id="4336" id="p0045"><span data-dcnode-id="4337" instrument_node="">In addition, Article 15 states that children have the right to create and join associations and to assemble peacefully. Both imply opportunities to express political opinions, engage in political processes and participate in decision-making. Both are critical to the development of a democratic society and to the participation of children in the realization of their rights.</span></p></section><section data-dcnode-id="4297" id="s0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4329"><span data-dcnode-id="4334" instrument_node="">2.2</span><span data-dcnode-id="4332" instrument_node="">. </span><span data-dcnode-id="4330" instrument_node="">Youth participation is a process of involving young people in the institutions and decisions that affect their lives</span></h3><p data-dcnode-id="4315" id="p0050"><span data-dcnode-id="4328" instrument_node="">Participation is a field of practice and subject of study which includes initiatives involving young people according to their race, ethnicity, class, gender, or other social identity; in education, environment, housing, or other issues; and in rural areas, small towns, suburbs, or neighborhoods of cities in nations worldwide. As any approach to social practice, youth participation presumably differs from group to group, a proposition whose evidence is growing (</span><a class="workspace-trigger" data-dcnode-id="4326" href="#bb0175" name="bbb0175"><span data-dcnode-id="4327" instrument_node="">Ginwright &amp; Cammarota, 2009</span></a><span data-dcnode-id="4325" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4323" href="#bb0235" name="bbb0235"><span data-dcnode-id="4324" instrument_node="">Levine, 2008</span></a><span data-dcnode-id="4322" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4320" href="#bb0325" name="bbb0325"><span data-dcnode-id="4321" instrument_node="">Su, 2009</span></a><span data-dcnode-id="4319" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4317" href="#bb0340" name="bbb0340"><span data-dcnode-id="4318" instrument_node="">Wray-Lake et al., 2008</span></a><span data-dcnode-id="4316" instrument_node="">).</span></p><p data-dcnode-id="4298" id="p0055"><span data-dcnode-id="4314" instrument_node="">It includes efforts by young people to organize around issues of their choice, by adults to involve young people in community agencies, and by youth and adults to join together in intergenerational partnerships. It varies in its expression from one area to another, but as long as people are involved in the institutions and decisions that affect them, it is participation (</span><a class="workspace-trigger" data-dcnode-id="4312" href="#bb0055" name="bbb0055"><span data-dcnode-id="4313" instrument_node="">Checkoway, 1995</span></a><span data-dcnode-id="4311" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4309" href="#bb0285" name="bbb0285"><span data-dcnode-id="4310" instrument_node="">Rajani, 2001</span></a><span data-dcnode-id="4308" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4306" href="#bb0280" name="bbb0280"><span data-dcnode-id="4307" instrument_node="">Rajani, 2000a</span></a><span data-dcnode-id="4305" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4303" href="#bb0290" name="bbb0290"><span data-dcnode-id="4304" instrument_node="">Rajani, 2000b</span></a><span data-dcnode-id="4302" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4300" href="#bb0320" name="bbb0320"><span data-dcnode-id="4301" instrument_node="">Sherrod et al., 2010</span></a><span data-dcnode-id="4299" instrument_node="">).</span></p></section><section data-dcnode-id="4266" id="s0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4291"><span data-dcnode-id="4296" instrument_node="">2.3</span><span data-dcnode-id="4294" instrument_node="">. </span><span data-dcnode-id="4292" instrument_node="">Youth participation refers to the active engagement and real influence of young people, not to their passive presence or token roles in adult agencies</span></h3><p data-dcnode-id="4286" id="p0060"><span data-dcnode-id="4290" instrument_node="">The quality of participation is measured not only by its scope, such as the number of people who attend a number of activities, but also by its quality, such as when people have real effect on the process, influence a particular decision, or produce a favorable outcome. The issue is not necessarily whether the effort is youth-led, adult-led, or intergenerational, but rather whether people have some effect (</span><a class="workspace-trigger" data-dcnode-id="4288" href="#bb0065" name="bbb0065"><span data-dcnode-id="4289" instrument_node="">Checkoway, 1998</span></a><span data-dcnode-id="4287" instrument_node="">).</span></p><p data-dcnode-id="4275" id="p0065"><span data-dcnode-id="4285" instrument_node="">Defined this way, participation is about the power of young people as a group that is usually underrepresented in the political process. It is the strategy by which they are involved in goal setting, resource allocation, and program implementation. It is the means by which they influence the opportunities and outcomes of the larger society. This definition paraphrases </span><a class="workspace-trigger" data-dcnode-id="4283" href="#bb0005" name="bbb0005"><span data-dcnode-id="4284" instrument_node="">Arnstein (1969)</span></a><span data-dcnode-id="4282" instrument_node="">, who constructs a ladder of participation in which each rung corresponds to peoples' power, and who contrasts empowerment with information, consultation, and other constructions, and also </span><a class="workspace-trigger" data-dcnode-id="4280" href="#bb0210" name="bbb0210"><span data-dcnode-id="4281" instrument_node="">Hart, 1992</span></a><span data-dcnode-id="4279" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4277" href="#bb0205" name="bbb0205"><span data-dcnode-id="4278" instrument_node="">Hart, 1997</span></a><span data-dcnode-id="4276" instrument_node="">.</span></p><p data-dcnode-id="4267" id="p0070"><span data-dcnode-id="4274" instrument_node="">Community organization is a vehicle for people seeking to participate. Organizing brings people together and enables them to generate power to accomplish their purpose. It is a process that builds their own sense of power, their perceived or actual power with others, and their ability to affect power relationships in the community. Adult political organizations learned this lesson years ago (</span><a class="workspace-trigger" data-dcnode-id="4272" href="#bb0060" name="bbb0060"><span data-dcnode-id="4273" instrument_node="">Checkoway, 1997</span></a><span data-dcnode-id="4271" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4269" href="#bb0100" name="bbb0100"><span data-dcnode-id="4270" instrument_node="">Delgado &amp; Staples, 2008</span></a><span data-dcnode-id="4268" instrument_node="">).</span></p></section><section data-dcnode-id="4243" id="s0030"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4260"><span data-dcnode-id="4265" instrument_node="">2.4</span><span data-dcnode-id="4263" instrument_node="">. </span><span data-dcnode-id="4261" instrument_node="">Youth participation assumes that young people are competent citizens, rather than passive recipients of services</span></h3><p data-dcnode-id="4249" id="p0075"><span data-dcnode-id="4259" instrument_node="">This assumption is consistent with the view of “youth as resources,” which contrasts with news media portrayals of youth as “victims of poverty” and “problems in society;” social science studies of youth as “alienated from community” and “withdrawn from participation;” and professionals’ focus on youth deficiencies and services. When adults view young people as “troubled and troubling,” and youth accept these adult conceptions, this weakens rather than strengthens the roles of young people (</span><a class="workspace-trigger" data-dcnode-id="4257" href="#bb0150" name="bbb0150"><span data-dcnode-id="4258" instrument_node="">Finn et al., 2009</span></a><span data-dcnode-id="4256" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4254" href="#bb0145" name="bbb0145"><span data-dcnode-id="4255" instrument_node="">Finn &amp; Checkoway, 1998</span></a><span data-dcnode-id="4253" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4251" href="#bb0220" name="bbb0220"><span data-dcnode-id="4252" instrument_node="">Kurth-Schai, 1988</span></a><span data-dcnode-id="4250" instrument_node="">). When adults allocate resources to policies that focus on deficits rather than assets of young people, it further institutionalizes this view into programs that perpetuate the phenomena that young people have potential to change.</span></p><p data-dcnode-id="4244" id="p0080"><span data-dcnode-id="4248" instrument_node="">Because “youth as resources” challenges the “youth pathology industry” of adult authorities, it is not surprising that adults question such views, that young people accept adults’ conceptions of them as deficits, and that they do not view themselves as a group that can create change (</span><a class="workspace-trigger" data-dcnode-id="4246" href="#bb0140" name="bbb0140"><span data-dcnode-id="4247" instrument_node="">Finn, 2001</span></a><span data-dcnode-id="4245" instrument_node="">). However, young people are experts on being young people, regardless of what others think.</span></p></section><section data-dcnode-id="4187" id="s0035"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4237"><span data-dcnode-id="4242" instrument_node="">2.5</span><span data-dcnode-id="4240" instrument_node="">. </span><span data-dcnode-id="4238" instrument_node="">Participation has various objectives, outcomes, and assessment criteria</span></h3><p data-dcnode-id="4211" id="p0085"><span data-dcnode-id="4236" instrument_node="">Participation studies evaluate the effects of participation on the personal and social development of the participants themselves, such as their knowledge and skills; or their academic achievement or performance in school; or their sense of direction, self-confidence, social connectedness, and psychosocial well-being; or their critical thinking, public speaking, and civic competencies (</span><a class="workspace-trigger" data-dcnode-id="4234" href="#bb0045" name="bbb0045"><span data-dcnode-id="4235" instrument_node="">Cheadle et al., 2001</span></a><span data-dcnode-id="4233" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4231" href="#bb0105" name="bbb0105"><span data-dcnode-id="4232" instrument_node="">Dessel &amp; Rogge, 2009</span></a><span data-dcnode-id="4230" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4228" href="#bb0155" name="bbb0155"><span data-dcnode-id="4229" instrument_node="">Flanagan &amp; Levine, 2010</span></a><span data-dcnode-id="4227" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4225" href="#bb0160" name="bbb0160"><span data-dcnode-id="4226" instrument_node="">Flanagan et al., 2007</span></a><span data-dcnode-id="4224" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4222" href="#bb0315" name="bbb0315"><span data-dcnode-id="4223" instrument_node="">Sherrod &amp; Spiewak, 2008</span></a><span data-dcnode-id="4221" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4219" href="#bb0335" name="bbb0335"><span data-dcnode-id="4220" instrument_node="">Watts &amp; Flanagan, 2007</span></a><span data-dcnode-id="4218" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4216" href="#bb0310" name="bbb0310"><span data-dcnode-id="4217" instrument_node="">Sherrod &amp; Lauckhardt, 2008</span></a><span data-dcnode-id="4215" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4213" href="#bb0345" name="bbb0345"><span data-dcnode-id="4214" instrument_node="">Youniss et al., 2002</span></a><span data-dcnode-id="4212" instrument_node="">).</span></p><p data-dcnode-id="4206" id="p0090"><span data-dcnode-id="4210" instrument_node="">Studies also evaluate the effects of participation on organizational development, such as their relationship to administrative structure and resource allocation; leadership, management, and institutional sustainability; and external collaborations and coalitions with other organizations. (</span><a class="workspace-trigger" data-dcnode-id="4208" href="#bb0130" name="bbb0130"><span data-dcnode-id="4209" instrument_node="">Evans &amp; Prilleltensky, 2007</span></a><span data-dcnode-id="4207" instrument_node="">).</span></p><p data-dcnode-id="4201" id="p0095"><span data-dcnode-id="4205" instrument_node="">Other studies evaluate the effects of participation on society. These outcomes are often difficult to document, but changes in personal, social, and organizational development are themselves societal outcomes, and individual and institutional participation are always instrumental to changes in education, environment, housing, urban development, and civil society (</span><a class="workspace-trigger" data-dcnode-id="4203" href="#bb0250" name="bbb0250"><span data-dcnode-id="4204" instrument_node="">Morrissey, 2000</span></a><span data-dcnode-id="4202" instrument_node="">).</span></p><p data-dcnode-id="4190" id="p0100"><span data-dcnode-id="4200" instrument_node="">Yet other studies evaluate the simultaneous effects of participation at multiple levels, from initial consciousness-raising to gaining in confidence to building organizational capacity to taking action to creating change. These phenomena are observable, although scientific studies of them are scarce (</span><a class="workspace-trigger" data-dcnode-id="4198" href="#bb0085" name="bbb0085"><span data-dcnode-id="4199" instrument_node="">Checkoway et al., 2005</span></a><span data-dcnode-id="4197" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4195" href="#bb0080" name="bbb0080"><span data-dcnode-id="4196" instrument_node="">Checkoway et al., 2008</span></a><span data-dcnode-id="4194" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4192" href="#bb0130" name="bbb0130"><span data-dcnode-id="4193" instrument_node="">Evans &amp; Prilleltensky, 2007</span></a><span data-dcnode-id="4191" instrument_node="">).</span></p><p data-dcnode-id="4188" id="p0105"><span data-dcnode-id="4189" instrument_node="">Finally, studies show that some community agencies use participation for administrative purposes without transfer of power to the participants. These agencies use participation to provide public relations, or legitimate decisions that already have been made, or build support for program implementation. They favor participation that serves administrative ends and oppose participation that results in control by people over key aspects of programs.</span></p></section><section data-dcnode-id="4143" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4181"><span data-dcnode-id="4186" instrument_node="">2.6</span><span data-dcnode-id="4184" instrument_node="">. </span><span data-dcnode-id="4182" instrument_node="">Participation has several strategies</span></h3><p data-dcnode-id="4158" id="p0110"><span data-dcnode-id="4180" instrument_node="">There are young people who mobilize around issues, organize for social and political action, plan local program, advocate in school boards and city councils, and develop services of their own. They serve on municipal agency boards, pack public hearings, or demonstrate outside meetings. They conduct community-based research, evaluate agency programs, make policy presentations, and hold public officials accountable for their actions (</span><a class="workspace-trigger" data-dcnode-id="4178" href="#bb0030" name="bbb0030"><span data-dcnode-id="4179" instrument_node="">Camino &amp; Zeldin, 2002</span></a><span data-dcnode-id="4177" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4175" href="#bb0165" name="bbb0165"><span data-dcnode-id="4176" instrument_node="">Frank, 2006</span></a><span data-dcnode-id="4174" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4172" href="#bb0055" name="bbb0055"><span data-dcnode-id="4173" instrument_node="">Checkoway, 1995</span></a><span data-dcnode-id="4171" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4169" href="#bb0255" name="bbb0255"><span data-dcnode-id="4170" instrument_node="">Mullahey et al., 2000</span></a><span data-dcnode-id="4168" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4166" href="#bb0295" name="bbb0295"><span data-dcnode-id="4167" instrument_node="">Richards-Schuster &amp; Checkoway, 2009</span></a><span data-dcnode-id="4165" instrument_node="">). There also are studies of their involvement in student council, volunteering, basketball, marching band, and debate clubs which are beneficial, but not necessarily related to quality participation as defined here (</span><a class="workspace-trigger" data-dcnode-id="4163" href="#bb0125" name="bbb0125"><span data-dcnode-id="4164" instrument_node="">Eccles &amp; Barber, 1999</span></a><span data-dcnode-id="4162" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4160" href="#bb0195" name="bbb0195"><span data-dcnode-id="4161" instrument_node="">Hall, 2008</span></a><span data-dcnode-id="4159" instrument_node="">).</span></p><p data-dcnode-id="4144" id="p0115"><span data-dcnode-id="4157" instrument_node="">There is no lack of information on participation activities. There are publications that identify stages, steps, and specific activities, and provide empirical examples of youth action, youth development, or neighborhood-based youth initiatives. There also are workbooks with tools and techniques for observations, interviews, drawings, photographs, surveys, workshops, policy summits, community conversations, town meetings, protest demonstrations, and others too numerous to mention (</span><a class="workspace-trigger" data-dcnode-id="4155" href="#bb0110" name="bbb0110"><span data-dcnode-id="4156" instrument_node="">Driskell, 2001</span></a><span data-dcnode-id="4154" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4152" href="#bb0260" name="bbb0260"><span data-dcnode-id="4153" instrument_node="">Oakes and Rogers, 2006</span></a><span data-dcnode-id="4151" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4149" href="#bb0245" name="bbb0245"><span data-dcnode-id="4150" instrument_node="">Midratta, 2009</span></a><span data-dcnode-id="4148" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4146" href="#bb0325" name="bbb0325"><span data-dcnode-id="4147" instrument_node="">Su, 2009</span></a><span data-dcnode-id="4145" instrument_node="">).</span></p></section><section data-dcnode-id="4127" id="s0045"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4137"><span data-dcnode-id="4142" instrument_node="">2.7</span><span data-dcnode-id="4140" instrument_node="">. </span><span data-dcnode-id="4138" instrument_node="">Young people have limitless issues, including schools and education</span></h3><p data-dcnode-id="4135" id="p0120"><span data-dcnode-id="4136" instrument_node="">Young people care about war, poverty, racism, health care, housing, homelessness, violence, sex and pregnancy, adultism and ephebiphobia, diversity, discrimination, drugs, clean water, nutritious food, employment, and money. They care about gentrification of neighborhoods, unsafe living conditions, drugs and safety in the streets, paint poisoning on the walls, and the right to freely assemble in public places.</span></p><p data-dcnode-id="4130" id="p0125"><span data-dcnode-id="4134" instrument_node="">Young people especially care about schools and education. This is not surprising, because schools are places in which they spend substantial time and have a strong stake. Our studies show that young people are concerned about academic and curricular issues, such as when they question teachers about inaccurate or unrepresentative curricula; school facilities such as unsafe buildings and unsanitary bathrooms; and school practices, such as unjust attendance policies or dress codes. They are aware that their schools are segregated, express concern about diversity, and see that teachers are not prepared to handle racial issues in the classroom (</span><a class="workspace-trigger" data-dcnode-id="4132" href="#bb0050" name="bbb0050"><span data-dcnode-id="4133" instrument_node="">Checkoway &amp; Richards-Schuster, 2006</span></a><span data-dcnode-id="4131" instrument_node="">).</span></p><p data-dcnode-id="4128" id="p0130"><span data-dcnode-id="4129" instrument_node="">Too often the issues expressed by youth are the ones given to them by adult authorities who care about them, such as parents and teachers. Adult caring is a precious resource worldwide, but it does not necessarily translate into youth participation. When young people identify their own issues, however, it can awaken their spirit and move them into action.</span></p></section><section data-dcnode-id="4102" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4121"><span data-dcnode-id="4126" instrument_node="">2.8</span><span data-dcnode-id="4124" instrument_node="">. </span><span data-dcnode-id="4122" instrument_node="">Many young people are uninvolved or minimally involved in public affairs, and small groups of people are extremely active</span></h3><p data-dcnode-id="4119" id="p0135"><span data-dcnode-id="4120" instrument_node="">Studies show that the most active participants are not representative of the general population. Income, education, and socioeconomic status all correlate with individual participation and contribute to personal characteristics and social attitudes that support further activity. Thus differential levels of participation are “normal” in society.</span></p><p data-dcnode-id="4108" id="p0140"><span data-dcnode-id="4118" instrument_node="">Such studies tend to assess “formal” activities, such as voting in elections, rather than other activities such as organizing grassroots groups. They ignore that some lower-income people have better things to do with their time, and do not believe that their participation will matter (</span><a class="workspace-trigger" data-dcnode-id="4116" href="#bb0230" name="bbb0230"><span data-dcnode-id="4117" instrument_node="">Levine, 2007</span></a><span data-dcnode-id="4115" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4113" href="#bb0265" name="bbb0265"><span data-dcnode-id="4114" instrument_node="">Obradovic &amp; Masten, 2007</span></a><span data-dcnode-id="4112" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4110" href="#bb0360" name="bbb0360"><span data-dcnode-id="4111" instrument_node="">Zukin et al., 2006</span></a><span data-dcnode-id="4109" instrument_node="">).</span></p><p data-dcnode-id="4103" id="p0145"><span data-dcnode-id="4107" instrument_node="">Recent studies document patterns of nonparticipation by middle- and upper-income young people, which they attribute to technology, telecommunications, and decline in social capital. “Withdrawal from participation” and “disengagement from democracy” are common images of these youth today (</span><a class="workspace-trigger" data-dcnode-id="4105" href="#bb0360" name="bbb0360"><span data-dcnode-id="4106" instrument_node="">Zukin et al., 2006</span></a><span data-dcnode-id="4104" instrument_node="">).</span></p></section><section data-dcnode-id="4070" id="s0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4096"><span data-dcnode-id="4101" instrument_node="">2.9</span><span data-dcnode-id="4099" instrument_node="">. </span><span data-dcnode-id="4097" instrument_node="">Lower income people participate less than higher income people in formal politics, but instead participate in ways that are appropriate to their present situation</span></h3><p data-dcnode-id="4088" id="p0150"><span data-dcnode-id="4095" instrument_node="">Our studies document increasing involvement by low-income youth of color in educational reform, including initiatives by low-income youth of color to document inequities in school suspension policies and prevent cuts in youth services, conduct campaigns for new school curricula responsive to racial diversity, and work to reduce class sizes and increase after-school programs. These efforts address broad structural issues of discrimination and poverty, and also everyday experiences in schools and communities (</span><a class="workspace-trigger" data-dcnode-id="4093" href="#bb0050" name="bbb0050"><span data-dcnode-id="4094" instrument_node="">Checkoway &amp; Richards-Schuster, 2006</span></a><span data-dcnode-id="4092" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4090" href="#bb0175" name="bbb0175"><span data-dcnode-id="4091" instrument_node="">Ginwright &amp; Cammarota, 2009</span></a><span data-dcnode-id="4089" instrument_node="">).</span></p><p data-dcnode-id="4071" id="p0155"><span data-dcnode-id="4087" instrument_node="">Differential participation by low-income youth does not mean that they are disengaged from democracy. On the contrary, they do participate in public affairs, but rather in activities which are more appropriate to their situation, and which mainstream social scientists find difficult to document (</span><a class="workspace-trigger" data-dcnode-id="4085" href="#bb0035" name="bbb0035"><span data-dcnode-id="4086" instrument_node="">Cammarota &amp; Ginwright, 2007</span></a><span data-dcnode-id="4084" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4082" href="#bb0040" name="bbb0040"><span data-dcnode-id="4083" instrument_node="">Chawla, 2002</span></a><span data-dcnode-id="4081" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4079" href="#bb0080" name="bbb0080"><span data-dcnode-id="4080" instrument_node="">Checkoway et al., 2008</span></a><span data-dcnode-id="4078" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4076" href="#bb0170" name="bbb0170"><span data-dcnode-id="4077" instrument_node="">Ginwright et al., 2006</span></a><span data-dcnode-id="4075" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4073" href="#bb0215" name="bbb0215"><span data-dcnode-id="4074" instrument_node="">Johnson et al., 1998</span></a><span data-dcnode-id="4072" instrument_node="">).</span></p></section><section data-dcnode-id="4021" id="s0060"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4064"><span data-dcnode-id="4069" instrument_node="">2.10</span><span data-dcnode-id="4067" instrument_node="">. </span><span data-dcnode-id="4065" instrument_node="">Youth participation is facilitated by youth leaders and adult allies</span></h3><p data-dcnode-id="4056" id="p0160"><span data-dcnode-id="4063" instrument_node="">Participation is affected by race, gender, age, income, education, national origin, family and community context, rural or urban residence, residential segregation, religious tradition, cultural beliefs, mass media, television watching, social science, professional practice, civic knowledge, extracurricular activities, community service, public policies, legal constraints, institutional barriers, school disparities, parental and teacher encouragement, adult attitudes, and other factors (</span><a class="workspace-trigger" data-dcnode-id="4061" href="#bb0120" name="bbb0120"><span data-dcnode-id="4062" instrument_node="">Duke et al., 2009</span></a><span data-dcnode-id="4060" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4058" href="#bb0200" name="bbb0200"><span data-dcnode-id="4059" instrument_node="">Hart and Donnelly, 2007</span></a><span data-dcnode-id="4057" instrument_node="">).</span></p><p data-dcnode-id="4051" id="p0165"><span data-dcnode-id="4055" instrument_node="">Our own studies show that youth leaders and adult allies are instrumental to participation. Our observation is that in high quality initiatives, there are youth leaders who arise in their schools and communities, where they participate in youth-led, adult-led, or intergenerational activities, in which they serve as bridging persons across generational boundaries. They might be motivated on a personal level, such as when they experience discrimination. Or they are drawn to opportunities for personal achievement which prepare them for higher education or employment (</span><a class="workspace-trigger" data-dcnode-id="4053" href="#bb0270" name="bbb0270"><span data-dcnode-id="4054" instrument_node="">Pancer, Pratt, Hunsberger &amp; Alisat, 2007</span></a><span data-dcnode-id="4052" instrument_node="">).</span></p><p data-dcnode-id="4046" id="p0170"><span data-dcnode-id="4050" instrument_node="">We also observe that some youth leaders pass through discernible developmental stages in which they become aware, gain experience, receive encouragement, grow in confidence, develop practical skills, emerge as leaders, and move on to adulthood. Each successive stage enables them to grow in their abilities, before moving on (</span><a class="workspace-trigger" data-dcnode-id="4048" href="#bb0050" name="bbb0050"><span data-dcnode-id="4049" instrument_node="">Checkoway &amp; Richards-Schuster, 2006</span></a><span data-dcnode-id="4047" instrument_node="">).</span></p><p data-dcnode-id="4035" id="p0175"><span data-dcnode-id="4045" instrument_node="">Youth leaders do not operate in isolation. On the contrary, adults play various roles in the process, from reaching out to young people, nurturing their ideas, and building support for their work (</span><a class="workspace-trigger" data-dcnode-id="4043" href="#bb0240" name="bbb0240"><span data-dcnode-id="4044" instrument_node="">McLaughlin et al., 2002</span></a><span data-dcnode-id="4042" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4040" href="#bb0350" name="bbb0350"><span data-dcnode-id="4041" instrument_node="">Zeldin, 2004</span></a><span data-dcnode-id="4039" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4037" href="#bb0355" name="bbb0355"><span data-dcnode-id="4038" instrument_node="">Zeldin et al., 2005</span></a><span data-dcnode-id="4036" instrument_node="">).</span></p><p data-dcnode-id="4030" id="p0180"><span data-dcnode-id="4034" instrument_node="">In Lifting New Voices, for example, adult allies included “personal allies” like parents and neighbors, and “community allies” like teachers, coaches, or youth workers, and “institutional allies” from public life or mass media. Together these adults were a presence in their everyday lives, take them aside for personal conversations, and serve as mentors who encourage them. They also are bridging persons between youth and the adult world (</span><a class="workspace-trigger" data-dcnode-id="4032" href="#bb0090" name="bbb0090"><span data-dcnode-id="4033" instrument_node="">Checkoway et al., 2003</span></a><span data-dcnode-id="4031" instrument_node="">).</span></p><p data-dcnode-id="4022" id="p0185"><span data-dcnode-id="4029" instrument_node="">These findings lead to the conclusion that youth leadership development, as an educational effort to prepare young people for community participation, can be expected to benefit from a concurrent form of leadership development for adults whom young people take as their allies (</span><a class="workspace-trigger" data-dcnode-id="4027" href="#bb0115" name="bbb0115"><span data-dcnode-id="4028" instrument_node="">Dudley &amp; Gitelson, 2003</span></a><span data-dcnode-id="4026" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4024" href="#bb0310" name="bbb0310"><span data-dcnode-id="4025" instrument_node="">Sherrod &amp; Lauckhardt, 2008</span></a><span data-dcnode-id="4023" instrument_node="">).</span></p></section><section data-dcnode-id="3983" id="s0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4015"><span data-dcnode-id="4020" instrument_node="">2.11</span><span data-dcnode-id="4018" instrument_node="">. </span><span data-dcnode-id="4016" instrument_node="">There are obstacles to youth participation, and also opportunities for strengthening their involvement in the future</span></h3><p data-dcnode-id="4013" id="p0190"><span data-dcnode-id="4014" instrument_node="">It is difficult to involve young people when they do not view themselves as a group that can create change, or when they have ideas but are unsure how to proceed, or when they take action but lack resources for implementation.</span></p><p data-dcnode-id="4011" id="p0195"><span data-dcnode-id="4012" instrument_node="">It is difficult when adults view young people as deficits rather than resources, or show “adultism” which flows from the assumption that adults are better than young people, and entitled to act upon them without their agreement because of their age. Adultism can cause young people to question their own legitimacy or “internalize the oppression” of adults and the limitations that they place upon them.</span></p><p data-dcnode-id="3997" id="p0200"><span data-dcnode-id="4010" instrument_node="">Adultism is a mild form of ephebiphobia, a condition described as an abnormal or persistent fear or loathing of teenagers or adolescence. This condition is attributable to media, politicians, social scientists, and professional practitioners who perpetuate its tenets with reinforcement by marketing of safety, such as home security systems, metal detectors and closed-circuit television increasingly sold to schools on the premise that young people are not to be trusted. The fear of youth by adult authorities can undermine public participation and affect the health of democracy, in the absence of intervention to the contrary </span><a class="workspace-trigger" data-dcnode-id="4008" href="#bb0010" name="bbb0010"><span data-dcnode-id="4009" instrument_node="">Astroth, 1994</span></a><span data-dcnode-id="4007" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4005" href="#bb0180" name="bbb0180"><span data-dcnode-id="4006" instrument_node="">Giroux, 2003</span></a><span data-dcnode-id="4004" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4002" href="#bb0185" name="bbb0185"><span data-dcnode-id="4003" instrument_node="">Giroux, 2004</span></a><span data-dcnode-id="4001" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3999" href="#bb0190" name="bbb0190"><span data-dcnode-id="4000" instrument_node="">Grossberg, 2005</span></a><span data-dcnode-id="3998" instrument_node="">).</span></p><p data-dcnode-id="3995" id="p0205"><span data-dcnode-id="3996" instrument_node="">Despite the obstacles, institutional resources for youth initiatives are available from private foundations, and government agencies which fund participation at the local and national levels. Institutional resources make possible part-time or full-time opportunities for people with career commitment to youth participation, such as full-time agency administrators who promote participation as part of their professional roles, and part-time youth workers who are employed by agencies. Foundation officials, university professors, and school teachers who themselves were once youth leaders continue commitment through the next generation.</span></p><p data-dcnode-id="3984" id="p0210"><span data-dcnode-id="3994" instrument_node="">Educational opportunities for youth participation abound. Civic education is part of secondary school curricula, governmental and non-governmental institutions care about civic education, as do for-profit and non-profit institutions. There are secondary schools which center on social justice, although these are exceptional, such as the Coalition School for Social Change or Community High School for Social Justice. There also are apprenticeship programs which have internships, community-based groups which prepare youth to become organizers, and youth organizing projects which train youth to facilitate campaigns (</span><a class="workspace-trigger" data-dcnode-id="3992" href="#bb0095" name="bbb0095"><span data-dcnode-id="3993" instrument_node="">Colby et al., 2007</span></a><span data-dcnode-id="3991" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3989" href="#bb0115" name="bbb0115"><span data-dcnode-id="3990" instrument_node="">Dudley &amp; Gitelson, 2003</span></a><span data-dcnode-id="3988" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3986" href="#bb0230" name="bbb0230"><span data-dcnode-id="3987" instrument_node="">Levine, 2007</span></a><span data-dcnode-id="3985" instrument_node="">).</span></p></section></section><section data-dcnode-id="3880" id="s0070"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3976"><span data-dcnode-id="3981" instrument_node="">3</span><span data-dcnode-id="3979" instrument_node="">. </span><span data-dcnode-id="3977" instrument_node="">Unanswered questions</span></h2><p data-dcnode-id="3974" id="p0215"><span data-dcnode-id="3975" instrument_node="">I conclude this review of youth participation by asking a few questions that cannot be answered from examination of available work.</span></p><section data-dcnode-id="3960" id="s0075"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3968"><span data-dcnode-id="3973" instrument_node="">3.1</span><span data-dcnode-id="3971" instrument_node="">. </span><span data-dcnode-id="3969" instrument_node="">What is age appropriate youth participation?</span></h3><p data-dcnode-id="3963" id="p0220"><span data-dcnode-id="3967" instrument_node="">Social practice should be culturally competent and age appropriate, in which a group's distinct characteristics affect their participation practices and the roles of allies who work with them. It should show knowledge of particular popular groups, demonstrate understanding of their distinct characteristics, and function in accordance with their situation. The notion is that there are no single best forms of participation; instead, the rules should be adapted to the group (</span><a class="workspace-trigger" data-dcnode-id="3965" href="#bb0300" name="bbb0300"><span data-dcnode-id="3966" instrument_node="">Rivera &amp; Erlich, 1998</span></a><span data-dcnode-id="3964" instrument_node="">).</span></p><p data-dcnode-id="3961" id="p0225"><span data-dcnode-id="3962" instrument_node="">What are the characteristics of young people, and how should practice be fitted to them? For example, what sets them apart? What are their beliefs and behaviors? What are their preferred ways of participation, orientation to power, styles of conflict, and forms of communication? How do they meet together, make decisions, and formulate program plans? If practice were age appropriate, what would it be?</span></p></section><section data-dcnode-id="3946" id="s0080"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3954"><span data-dcnode-id="3959" instrument_node="">3.2</span><span data-dcnode-id="3957" instrument_node="">. </span><span data-dcnode-id="3955" instrument_node="">Which strategies of youth participation have the most potential to empower young people?</span></h3><p data-dcnode-id="3949" id="p0230"><span data-dcnode-id="3953" instrument_node="">Empowerment is a multilevel process which operates at the individual, organizational, and community levels. Individuals participate, organizations develop, and communities change. Empowerment is when people participate at all three levels (</span><a class="workspace-trigger" data-dcnode-id="3951" href="#bb0305" name="bbb0305"><span data-dcnode-id="3952" instrument_node="">Schulz, Israel, Zimmerman &amp; Checkoway, 1995</span></a><span data-dcnode-id="3950" instrument_node="">).</span></p><p data-dcnode-id="3947" id="p0235"><span data-dcnode-id="3948" instrument_node="">Strategy is a resource for participation, but should people organize, advocate, or develop services? Does it make a difference if young people are of African, Asian, European, Middle Eastern, or Latin American descent; male or female; low or high income; conflictual or consensual; or concerned with social services, social action, or social policy? If strategy is a resource for practice, which one has the most potential for empowerment?</span></p></section><section data-dcnode-id="3933" id="s0085"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3940"><span data-dcnode-id="3945" instrument_node="">3.3</span><span data-dcnode-id="3943" instrument_node="">. </span><span data-dcnode-id="3941" instrument_node="">What competencies will prepare young people for active participation in a democratic society?</span></h3><p data-dcnode-id="3938" id="p0240"><span data-dcnode-id="3939" instrument_node="">Who has responsibility to prepare people for democracy? Is it the family, school, government, business, media, or community? If everyone shares responsibility, then who has primary responsibility? What competencies does democracy require, and what pedagogy will take them there? These questions often lead adult advocates to conclude that everyone has responsibility, without thinking that when everyone has responsibility, then no one has responsibility, thus no one.</span></p><p data-dcnode-id="3936" id="p0245"><span data-dcnode-id="3937" instrument_node="">What about preparation for diverse democracy? If democracy is about the participation of the people, and the people are diverse, then will their preparation look different in a more diverse democracy and, if so, what will it be?</span></p><p data-dcnode-id="3934" id="p0250"><span data-dcnode-id="3935" instrument_node="">Education for pluralist practice can be expected to emphasize information about the social characteristics, cultural heritage, and common customs of particular groups. This might include the perceptions of the group and its place in the community, how group members perceive themselves, how they perceive other groups, and how they perceive they are perceived by others. Education for democracy is a responsibility of society which changes over time and which raises questions that normally have no single answer.</span></p></section><section data-dcnode-id="3881" id="s0090"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3927"><span data-dcnode-id="3932" instrument_node="">3.4</span><span data-dcnode-id="3930" instrument_node="">. </span><span data-dcnode-id="3928" instrument_node="">What difference does it make if youth participation is multicultural rather than pluralist or monocultural?</span></h3><p data-dcnode-id="3916" id="p0255"><span data-dcnode-id="3926" instrument_node="">Youth participation operates at the community level, but what happens when participation is constructed as multicultural. What activities are appropriate for a multicultural community? In a multicultural community, how should meetings and decisions be facilitated? What roles will participants play, and how will they be prepared? (</span><a class="workspace-trigger" data-dcnode-id="3924" href="#bb0075" name="bbb0075"><span data-dcnode-id="3925" instrument_node="">Checkoway, 2009</span></a><span data-dcnode-id="3923" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3921" href="#bb0275" name="bbb0275"><span data-dcnode-id="3922" instrument_node="">Quiroz-Martinez et al., 2004</span></a><span data-dcnode-id="3920" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3918" href="#bb0365" name="bbb0365"><span data-dcnode-id="3919" instrument_node="">Zuniga et al., 2007</span></a><span data-dcnode-id="3917" instrument_node="">).</span></p><p data-dcnode-id="3902" id="p0260"><span data-dcnode-id="3915" instrument_node="">Multicultural participation is important in democratic societies whose populations are becoming more socially and culturally diverse, and whose changes challenge communities to develop their capacities. Indeed, the future of these societies will depend in part on their ability to recognize differences and build bridges across group boundaries (</span><a class="workspace-trigger" data-dcnode-id="3913" href="#bb0015" name="bbb0015"><span data-dcnode-id="3914" instrument_node="">Boulden, 2007</span></a><span data-dcnode-id="3912" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3910" href="#bb0135" name="bbb0135"><span data-dcnode-id="3911" instrument_node="">Farmer, 2006</span></a><span data-dcnode-id="3909" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3907" href="#bb0225" name="bbb0225"><span data-dcnode-id="3908" instrument_node="">Lepischak, 2004</span></a><span data-dcnode-id="3906" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3904" href="#bb0275" name="bbb0275"><span data-dcnode-id="3905" instrument_node="">Quiroz-Martinez et al., 2004</span></a><span data-dcnode-id="3903" instrument_node="">).</span></p><p data-dcnode-id="3882" id="p0265"><span data-dcnode-id="3901" instrument_node="">“Multicultural participation” differs from “monocultural participation” in communities whose people are relatively similar in their social characteristics and who share commitment to a common purpose, and from “pluralist participation” in communities whose people form distinct groups which compete – but which also might coalesce – with other groups. Assuming that diversity will characterize democracy in the future, how will youth participation look different from a more multicultural perspective? (</span><a class="workspace-trigger" data-dcnode-id="3899" href="#bb0025" name="bbb0025"><span data-dcnode-id="3900" instrument_node="">Butler, 2000</span></a><span data-dcnode-id="3898" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3896" href="#bb0070" name="bbb0070"><span data-dcnode-id="3897" instrument_node="">Checkoway, 2007</span></a><span data-dcnode-id="3895" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3893" href="#bb0135" name="bbb0135"><span data-dcnode-id="3894" instrument_node="">Farmer, 2006</span></a><span data-dcnode-id="3892" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3890" href="#bb0235" name="bbb0235"><span data-dcnode-id="3891" instrument_node="">Levine, 2008</span></a><span data-dcnode-id="3889" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3887" href="#bb0330" name="bbb0330"><span data-dcnode-id="3888" instrument_node="">Torney-Purta et al., 2007</span></a><span data-dcnode-id="3886" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3884" href="#bb0340" name="bbb0340"><span data-dcnode-id="3885" instrument_node="">Wray-Lake et al., 2008</span></a><span data-dcnode-id="3883" instrument_node="">)</span></p></section></section><section data-dcnode-id="3861" id="s0095"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3874"><span data-dcnode-id="3879" instrument_node="">4</span><span data-dcnode-id="3877" instrument_node="">. </span><span data-dcnode-id="3875" instrument_node="">Conclusion</span></h2><p data-dcnode-id="3872" id="p0270"><span data-dcnode-id="3873" instrument_node="">Young people participate in institutions at the community level. Their participation has various forms, strategies, and activities for initiatives that affect young people and their communities. There are obstacles to participation, and also opportunities for development in the future.</span></p><p data-dcnode-id="3870" id="p0275"><span data-dcnode-id="3871" instrument_node="">Young people participate, but their participation is uneven. Some youth participate with fervor in formal politics, others might or might not depending upon the situation, and yet others are uninvolved or minimally involved. The most active participants in formal activities are usually higher in income, education, and socioeconomic status, than the general population.</span></p><p data-dcnode-id="3868" id="p0280"><span data-dcnode-id="3869" instrument_node="">Lower income young people participate less actively in formal politics that those from higher income groups, but there are explanations for this, and also evidence of their organizing around issues important to them — in disinvested and segregated areas. They might not vote at the same rate as other groups, but they do take action on unsafe schools and dangerous neighborhoods.</span></p><p data-dcnode-id="3866" id="p0285"><span data-dcnode-id="3867" instrument_node="">Youth participation can always receive more study, but which conceptual framework or epistemological structure will provide direction for thought and action? If field development were to result from strategy, then what should it be?</span></p><p data-dcnode-id="3864" id="p0290"><span data-dcnode-id="3865" instrument_node="">Will it be “youth services” that respond to problems, “youth development” that promotes problem prevention, “positive youth development” that creates supportive communities, or “youth leadership” that enables them to take leadership? Or will it be “community service” through which they help the homeless, or “social action” that enables them to organize action groups against homelessness, or “civic engagement” that involves them in housing policy, or “neighborhood development” that develops housing programs at the local level? Which paradigm will prevail?</span></p><p data-dcnode-id="3862" id="p0295"><span data-dcnode-id="3863" instrument_node="">The present paper draws together evidence from various disciplines and fields, in the hope that by identifying their general propositions and unanswered questions, people will have more clarity for moving forward.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="3855"><button class="button button-anchor" data-dcnode-id="3856" type="button"><span class="button-text" data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="3854"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="362" id="bi0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3852"><span data-dcnode-id="3853" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="363" id="bs0005"><dl class="references" data-dcnode-id="364" id="reference-links-bs0005"><dt class="label" data-dcnod de-id="368" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="242" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="243"><div class="PageDivider" data-dcnode-id="361"></div><header data-dcnode-id="358" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Cited by (173)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="244"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="245"><ul data-dcnode-id="251"><li class="ListArticleItem" data-dcnode-id="340"><div class="sub-heading" data-dcnode-id="352"><a data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S019074092200113X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="356" id="citing-articles-article0-title"><span data-dcnode-id="357" instrument_node="">Support, develop, empower: The co-development of a youth leadership framework</span></h3></a><div class="article-source ellipsis" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">2022, Children and Youth Services Review</span></div></div><div class="buttons" data-dcnode-id="346"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="347" type="button"><span class="button-link-text" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="348" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="349"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="341"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="342" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="343"><p data-dcnode-id="344" id="sp0010"><span data-dcnode-id="345" instrument_node="">Engaging young people in organisational leadership offers opportunities for them to contribute and make a positive difference to their communities, benefitting both the young people and the organisations with which they are involved. However, best practices for engaging and supporting young leaders in cancer support organisations remain unclear. This article reports on the co-design and implementation of a Youth Leadership Framework within a national not-for-profit youth cancer organisation. Staff and young people worked together to develop a Framework which includes a model of youth leadership, defined roles and pathways, a resource toolkit and a suite of age-appropriate leadership development programs. This Framework better enables the organisation to fulfil its long-held goals of supporting, developing and empowering young leaders. This account of the Framework’s development and the insights gained in the implementation process serves as an exemplar to other community organisations and health services seeking to engage and support young leaders, expanding the evidence base on best practices in youth leadership in the cancer context.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="303"><div class="sub-heading" data-dcnode-id="334"><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0145213420304488" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="338" id="citing-articles-article1-title"><span data-dcnode-id="339" instrument_node="">Understanding youth participation to volunteer for child rights</span></h3></a><div class="article-source ellipsis" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">2021, Child Abuse and Neglect</span></div></div><div class="buttons" data-dcnode-id="328"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="329" type="button"><span class="button-link-text" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="330" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="331"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="304"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="305" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="306"><p data-dcnode-id="326" id="spar0030"><span data-dcnode-id="327" instrument_node="">Today, Pakistan has the highest percentage of young people in its history, who can become champions of child rights through channelizing their energy. Voices for Children’s Aspirations and Needs (VCAN) student society at the University of Lahore is one such student body, working to promote child rights and eliminate violence against children.</span></p><p data-dcnode-id="324" id="spar0035"><span data-dcnode-id="325" instrument_node="">The study identifies factors contributing to young people’s motivation to join VCAN student society working for children's rights and influence their participation in activities, along with attitudinal shift. The current study also attempts to find out effective mediums to engage youth in volunteering activities for the prevention of violence against children.</span></p><p data-dcnode-id="319" id="spar0040"><span data-dcnode-id="323" instrument_node="">Sample (</span><em data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">N</span></em><span data-dcnode-id="320" instrument_node=""> = 40) was selected through purposive sampling from the VCAN Student Society at the University of Lahore.</span></p><p data-dcnode-id="317" id="spar0045"><span data-dcnode-id="318" instrument_node="">The data were collected through a questionnaire developed by the researchers (α = 0.86). Collected data were analyzed by finding descriptive statistics (mean, percentage and frequency) and paired samplet-test using statistics software, SPSS, version 21.0.</span></p><p data-dcnode-id="309" id="spar0050"><span data-dcnode-id="316" instrument_node="">Motivation for joining student society included wanting to work for the betterment of children (57.5 %) and to volunteer for the prevention of violence against children (47.5 %). There was a statistically significant difference (</span><em data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">t</span></em><span data-dcnode-id="313" instrument_node="">=−4.16, </span><em data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">p</span></em><span data-dcnode-id="310" instrument_node=""> &lt; .001) in the perception of participants about child rights before and after joining the society. Factors such as lack of required knowledge, unclear roles, and contrast between expected role and skillset (45.0 %, 42.5 %, and 40.0 % respectively) discouraged youth participation. 37.5 % of the participants considered WhatsApp as an extremely effective way to engage youth whereas 32.5 % reported Facebook as an extremely effective medium for the same purpose.</span></p><p data-dcnode-id="307" id="spar0055"><span data-dcnode-id="308" instrument_node="">Student societies provide a great platform for students to be active for a social cause. Educational institutions should encourage and facilitate youth participation for such causes.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="285"><div class="sub-heading" data-dcnode-id="297"><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0190740920321381" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="301" id="citing-articles-article2-title"><span data-dcnode-id="302" instrument_node="">Engaging youth voices to address racial disproportionality in schools: Exploring the practice and potential of youth participatory research in an urban district</span></h3></a><div class="article-source ellipsis" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">2021, Children and Youth Services Review</span></div></div><div class="buttons" data-dcnode-id="291"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="292" type="button"><span class="button-link-text" data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="293" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="294"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="286"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="287" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="288"><p data-dcnode-id="289" id="sp0010"><span data-dcnode-id="290" instrument_node="">Drawing upon a large district-wide initiative to systematically use youth participatory research in all middle and high schools as a way to address the racial disproportionality in school experience and disciplinary actions, this paper conceptualizes youth participatory research as a tool to bring youth voices to inform school climate and school policies. The program, which began in 2015, has involved teams from 31 middle and high schools from across the district to use youth participatory evaluation to examine school climate, racial disproportionality, discipline issues, and student and teacher relationships, among other issues. This paper is a result of a multi-year, ongoing research-practitioner partnership focused on continuous program improvement and reflection. In the paper, we draw upon learning from the first five years to conceptualize a multi-level, iterative change model that highlights navigating tensions and challenges such as power, racial injustice, and authentic youth voice within a school district. We reflect on the learning to date and explore the implications for engaging youth participatory research practices within school districts. These critical reflections include the: 1) importance of engaging the most impacted youth, 2) need to prepare stakeholders for research, 3) critical nature of centering race and racial injustice within youth participatory research, 4) requirement of adapting to the realities of students’ lives, school priorities and time; 5) attention focused on the role of adults as advisors within youth participatory research efforts; and the 6) need for adult stakeholders to listen to youth’s findings. We close with practical lessons and future directions for youth participatory research to impact systemic change within large school districts.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="274"><div class="sub-heading" data-dcnode-id="279"><a data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/S1463423621000815" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="283" id="citing-articles-article3-title"><span data-dcnode-id="284" instrument_node="">Strengthening primary health care: contributions of young professional-led communities of practice</span></h3></a><div class="article-source ellipsis" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">2022, Primary Health Care Research and Development</span></div></div><div class="buttons" data-dcnode-id="278"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="275"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="276" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="277"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="263"><div class="sub-heading" data-dcnode-id="268"><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.12973/eu-jer.11.2.697" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="272" id="citing-articles-article4-title"><span data-dcnode-id="273" instrument_node="">Exploring the Role of Digital and Socio-civic Skills for Promoting Youth Participation and Digital Citizenship</span></h3></a><div class="article-source ellipsis" data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">2022, European Journal of Educational Research</span></div></div><div class="buttons" data-dcnode-id="267"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="264"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="265" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="266"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="252"><div class="sub-heading" data-dcnode-id="257"><a data-dcnode-id="260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1111/hex.13409" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="261" id="citing-a
