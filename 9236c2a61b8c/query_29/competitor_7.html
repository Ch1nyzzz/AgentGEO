 present sample that climate mitigation is a positive (or, at least, not outwardly negative) cause links strongly with the underlying finding that participants exhibited a </span><em data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">concern for their future</span></em><span data-dcnode-id="1375" instrument_node=""> as a reason to participate in a </span><em data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Strike</span></em><span data-dcnode-id="1372" instrument_node="">. This echoes the </span><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="1371" instrument_node="">Harris et al. (2010)</span></a><span data-dcnode-id="1369" instrument_node=""> study mentioned previous, where “Environmental issues” (p. 18) were also a top concern for youth futures, as well as more recent studies of School </span><em data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Strike</span></em><span data-dcnode-id="1366" instrument_node=""> participants (such as </span><a data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="1365" instrument_node="">Collin et al., 2020</span></a><span data-dcnode-id="1363" instrument_node="">). On the theme of environmental efficacy—the ability to influence climate change in the future (see </span><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="1362" instrument_node="">Ojala, 2012</span></a><span data-dcnode-id="1360" instrument_node="">)—there was a notable absence of low environmental efficacy across responses. No respondents that mentioned climate change, whether participants at a </span><em data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Strike</span></em><span data-dcnode-id="1357" instrument_node=""> or not, were doubtful about whether they could influence the future of climate change in and of itself. This presents a hopeful view of youth climate futures, and research has found that hope can have a direct influence on young people’s engagement with the environment (</span><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="1356" instrument_node="">Ojala, 2012</span></a><span data-dcnode-id="1354" instrument_node="">). However, some studies have found ambivalence toward ‘negative’ future scenarios, as efforts made to stave off climate change may be met with ridicule, or ignored completely (</span><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B72"><span data-dcnode-id="1353" instrument_node="">Threadgold, 2012</span></a><span data-dcnode-id="1351" instrument_node="">). The present research highlights another piece of this complex interplay between hope and pessimism that youth activists will influence decision makers on climate change policy.</span></p><p class="mb15" data-dcnode-id="1327"><span data-dcnode-id="1349" instrument_node="">In this study, a range of differing themes emerged between the surveyed sample and those in focus groups, especially when investigating reasons why participants did not attend a protest. This may be due to the subtle shift in wording between the two scenarios, as the use of Most People Projective Questions (</span><a data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="1348" instrument_node="">Ostapczuk and Musch, 2011</span></a><span data-dcnode-id="1346" instrument_node="">) is expected to elicit different responses to direct questioning. Alternatively, the setting of peer discussion (school, or online) may be encouraging a focus on a shared social identity between students. All participants in focus groups indicated in some way support for the </span><em data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">School Strike</span></em><span data-dcnode-id="1343" instrument_node=""> movement overall, such as alignment with the </span><em data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">School Strike</span></em><span data-dcnode-id="1340" instrument_node=""> values, belief that the climate is at risk, and to some level personal support will enhance climate outcomes (for more on public support for environmental movements, see </span><a data-dcnode-id="1338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="1339" instrument_node="">Stern et al., 1999</span></a><span data-dcnode-id="1337" instrument_node="">). Participants may hence be demonstrating a set of subjective norms (</span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="1336" instrument_node="">Ajzen, 2011</span></a><span data-dcnode-id="1334" instrument_node="">), and given that social norms can influence decision making with regards to climate change (</span><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B61"><span data-dcnode-id="1333" instrument_node="">Busch et al., 2019</span></a><span data-dcnode-id="1331" instrument_node="">), this may explain why the focus of the group discussions was more skewed to social factors influencing </span><em data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Strike</span></em><span data-dcnode-id="1328" instrument_node=""> non-participation.</span></p><p class="mb15" data-dcnode-id="1319"><span data-dcnode-id="1326" instrument_node="">Though not the objective or intent, this study is perhaps limited by the inability to generalize more broadly to Australian students outside of this sample, as it is firmly exploratory and qualitative in nature. However, it does give an important introductory perspective on how young Australians may be engaging with environmental activism, especially in the area of non-participation. A second limitation is similar to the work of </span><a data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="1325" instrument_node="">Collin et al. (2020)</span></a><span data-dcnode-id="1323" instrument_node=""> who state that securing appropriate surveys and consent for minors contributes to unrepresentative samples, excluding hard-to-reach groups. With the present research, sampling limitations online and in schools proved to be a major challenge in recruiting participants. In addition, the sample this study engaged may have been disproportionately environmentally motivated. Future studies may wish to further utilize Most People Projection Questioning (</span><a data-dcnode-id="1321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="1322" instrument_node="">Ostapczuk and Musch, 2011</span></a><span data-dcnode-id="1320" instrument_node="">) to explore broader social norms around barriers to protest engagement, and employ random population sampling in order to widen the research on youth activism beyond this bias. Finally, further analysis is required to ascertain the representation of regional and remote students as part of the sample. As an especially challenging group for recruitment, future research should aim to ensure a broad representation from these non-urban students.</span></p><p class="mb15" data-dcnode-id="1314"><span data-dcnode-id="1318" instrument_node="">This study forms a foundational basis to continue investigating how young people engage with, or don’t engage with, environmental activism in Australia. Results here strengthen the notion that non-participation is a distinct action in and of itself, as opposed to a simple mirroring of motivators to participate in activism. Further research should continue to highlight non-participants as an integral part of understanding youth, politics, and environmental action, especially in the </span><em data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">School Strike 4 Climate</span></em><span data-dcnode-id="1315" instrument_node=""> case.</span></p><a class="reset-hash-position" data-dcnode-id="1313" id="h6" name="h6"></a><h2 data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Data Availability Statement</span></h2><p class="mb15" data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">The raw data supporting the conclusions of this article will be made available by the authors, without undue reservation.</span></p><a class="reset-hash-position" data-dcnode-id="1308" id="h7" name="h7"></a><h2 data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Ethics Statement</span></h2><p class="mb0" data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">The studies involving human participants were reviewed and approved by Australian National University Human Research Ethics Committee. Written informed consent from the participants’ legal guardian/next of kin was required and obtained for under age focus group participants, and not required to participate in the survey portion of this study. This is in accordance with the national legislation and the institutional requir
