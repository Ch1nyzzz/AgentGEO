udents. Similarly, the pilot study respondents were not asked if they had previously participated in an electoral voting process, and are all counted as ‘unknown’ in this case. Focus group participants were also not asked about their participation in voting, though as the age of voting in Australia is 18 and the focus groups took place more than 12&nbsp;months after the most recent election, any participants aged 18 and under were assumed not to have voted in an election, and were coded as such.</span></p><h3 class="pt0" data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Analysis Method</span></h3><p class="mb0" data-dcnode-id="2080"><span data-dcnode-id="2093" instrument_node="">Following methods outlined by </span><a data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="2092" instrument_node="">Chun et al. (2019)</span></a><span data-dcnode-id="2090" instrument_node="">, this research used a grounded theory approach, where after purposive sampling and early thematic exploration during the pilot study phase, key themes were coded and categorized. Initial coding followed an ‘open code’ approach, generating multiple provisional themes as they emerged from the data (</span><a data-dcnode-id="2088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="2089" instrument_node="">Charmaz, 2006</span></a><span data-dcnode-id="2087" instrument_node="">), and grouping them under key themes, which were generated in relation to key literature surrounding protest motivation including social themes, efficacy, or practical barriers to attendance at a </span><em data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Strike</span></em><span data-dcnode-id="2084" instrument_node="">. Sub-categories were generated under these themes and remained unchanged once saturation in codes became apparent (no new codes introduced to explain data) (</span><a data-dcnode-id="2082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B60"><span data-dcnode-id="2083" instrument_node="">Birks and Mills, 2015</span></a><span data-dcnode-id="2081" instrument_node="">). This method was applied to all short answer responses from collected surveys as well as focus group transcripts, and codes remained unchanged between data types.</span></p><p class="mb0" data-dcnode-id="2075"><span data-dcnode-id="2079" instrument_node="">Some statements were co-coded to two or more themes. Two examples of code co-occurrences can be seen in </span><a data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T4"><span data-dcnode-id="2078" instrument_node="">Table 4</span></a><span data-dcnode-id="2076" instrument_node="">, where a survey response and focus group passage (each discussing protest non-attendance) are coded to several themes each.</span></p><div class="DottedLine" data-dcnode-id="2074"></div><div class="Imageheaders" data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">TABLE 4</span></div><div class="FigureDesc" data-dcnode-id="2065"><a data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/662687/fpos-03-662687-HTML-r1/image_m/fpos-03-662687-t004.jpg" name="Table4" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="2071" id="T4" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/662687/fpos-03-662687-HTML-r1/image_t/fpos-03-662687-t004.gif&amp;raw"></a><p data-dcnode-id="2066"><strong data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">TABLE 4</span></strong><span data-dcnode-id="2067" instrument_node="">. Examples of two responses that were co-coded to multiple themes.</span></p></div><div class="clear" data-dcnode-id="2064"></div><div class="DottedLine" data-dcnode-id="2063"></div><a class="reset-hash-position" data-dcnode-id="2062" id="h4" name="h4"></a><h2 data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Results</span></h2><h3 class="pt0" data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">Introduction</span></h3><p class="mb0" data-dcnode-id="2047"><span data-dcnode-id="2057" instrument_node="">Overall, 41 respondents were analyzed from the pilot survey, 131 from the full distribution of the survey, and 21 participants from four focus groups (</span><a data-dcnode-id="2055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="2056" instrument_node="">Table 3</span></a><span data-dcnode-id="2054" instrument_node="">). Across the samples, there was an overrepresentation of female respondents, totaling close to 70% of the full sample. Around equal numbers of respondents were in high school or early year university, and most common age as 18&nbsp;years old. All respondents were either known to have not voted in an election (which is compulsory in Australia over the age of 18), or their electoral participation was unknown. Approximately half of the sample had attended at least one </span><em data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">School Strike</span></em><span data-dcnode-id="2051" instrument_node=""> event (49.2%), while the remainder had not (46.1%) or had not heard of the </span><em data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">School Strike</span></em><span data-dcnode-id="2048" instrument_node=""> movement (4.7%).</span></p><h3 class="pt0" data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">Motivation to Attend</span></h3><p class="mb0" data-dcnode-id="2037"><span data-dcnode-id="2044" instrument_node="">In survey responses, the most common reason for attending a protest event was related to climate change, and nearly half of all respondents mentioned climate in some form. Key themes that emerged under the </span><em data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">climate change</span></em><span data-dcnode-id="2041" instrument_node=""> code included references to global responsibility, climate justice, concern for the environment, and other general mentions of climate change. The frequency of these responses, along with all other recorded motivators to attend a protest, can be seen in </span><a data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T5"><span data-dcnode-id="2040" instrument_node="">Table 5</span></a><span data-dcnode-id="2038" instrument_node="">.</span></p><div class="DottedLine" data-dcnode-id="2036"></div><div class="Imageheaders" data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">TABLE 5</span></div><div class="FigureDesc" data-dcnode-id="2027"><a data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/662687/fpos-03-662687-HTML-r1/image_m/fpos-03-662687-t005.jpg" name="Table5" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="2033" id="T5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/662687/fpos-03-662687-HTML-r1/image_t/fpos-03-662687-t005.gif&amp;raw"></a><p data-dcnode-id="2028"><strong data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">TABLE 5</span></strong><span data-dcnode-id="2029" instrument_node="">. Key themes that emerged as motivators to attend a protest, by code and data type.</span></p></div><div class="clear" data-dcnode-id="2026"></div><div class="DottedLine" data-dcnode-id="2025"></div><p class="mb0" data-dcnode-id="2014"><span data-dcnode-id="2024" instrument_node="">Mentions of climate change took many forms, from generic responses of “</span><em data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">promote climate change action</span></em><span data-dcnode-id="2021" instrument_node="">” (anon, 18, university first year), “</span><em data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">climate matters!</span></em><span data-dcnode-id="2018" instrument_node="">” (anon, over 19, university second year) and “</span><em data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">passion for the environment</span></em><span data-dcnode-id="2015" instrument_node="">” (anon, 17, year 11) to the more in-depth:</span></p><p data-dcnode-id="2009" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="2013" instrument_node="">• </span><em data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">“Improve awareness of the importance of climate action amongst young people”</span></em><span data-dcnode-id="2010" instrument_node=""> (anon, 17, year 11)</span></p><p data-dcnode-id="2004" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="2008" instrument_node="">• </span><em data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">“Belief that Australia needs to do drastically more to tackle climate change and that it is the biggest threat to our planet and our lives at the moment and into the future.”</span></em><span data-dcnode-id="2005" instrument_node=""> (anon, 17, university first year)</span></p><p data-dcnode-id="1999" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="2003" instrument_node="">• </span><em data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">“Show my support for action on climate change in a tangible way and be a role model for younger students at school through my environment group.”</span></em><span data-dcnode-id="2000" instrument_node=""> (anon, 19, university first year)</span></p><p class="mb0" data-dcnode-id="1982"><span data-dcnode-id="1998" instrument_node="">Young people are generally knowledgeable about climate change (</span><a data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="1997" instrument_node="">Lee et al., 2020</span></a><span data-dcnode-id="1995" instrument_node="">), and given the high level of engagement with pro-environmental behavior of this age group (</span><a data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="1994" instrument_node="">Bentley et al., 2004</span></a><span data-dcnode-id="1992" instrument_node="">), this is an unsurprising result (for more on protesting as a form of pro-environmental behaviour, see </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="1991" instrument_node="">Dono et al., 2010</span></a><span data-dcnode-id="1989" instrument_node="">). These responses had considerable overlap with </span><em data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">concerns for futures</span></em><span data-dcnode-id="1986" instrument_node=""> theme code</span><em data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">,</span></em><span data-dcnode-id="1983" instrument_node=""> with participants expressing concern for both their own futures and the futures of others.</span></p><p class="mb0" data-dcnode-id="1977"><span data-dcnode-id="1981" instrument_node="">This echoes long-standing research showing emotional associations with and concerns for climate futures of young people (for example, see </span><a data-dcnode-id="1979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="1980" instrument_node="">Connell et al., 1999</span></a><span data-dcnode-id="1978" instrument_node="">), and some respondents had strongly emotional engagements with the conception of fighting for their futures. Some were a simple “I was anxious about the climate” (anon, 18, year 12), others were more in-depth:</span></p><p data-dcnode-id="1972" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1976" instrument_node="">• “</span><em data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">I am sick of the govt not listening to what we want, we are Australian citizens too and their decisions impact my life, the lives of those around me and the future of Australia.</span></em><span data-dcnode-id="1973" instrument_node="">” (anon, 17)</span></p><p data-dcnode-id="1967" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1971" instrument_node="">• “</span><em data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">I am scared I won’t have a future.</span></em><span data-dcnode-id="1968" instrument_node="">” (anon, 17, year 11)</span></p><p data-dcnode-id="1962" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1966" instrument_node="">• “</span><em data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">Catastrophic future effects climate change will have on the human race, will be much worse if it’s ignored. Which is what is happening with the Liberal [conservative Australian] government.</span></em><span data-dcnode-id="1963" instrument_node="">” (anon, 18, university first year)</span></p><p class="mb0" data-dcnode-id="1942"><span data-dcnode-id="1961" instrument_node="">Emotional responses also often had clear targets of frustrations, in the form of adult power structures. As in </span><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B67"><span data-dcnode-id="1960" instrument_node="">Holmberg and Alvinius (2019)</span></a><span data-dcnode-id="1958" instrument_node="">, the global youth </span><em data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Climate Strikes</span></em><span data-dcnode-id="1955" instrument_node=""> have shifted youth rebellion from distinct actors (such as parents or teachers, people in their local area) to abstract actors (such as against “the establishment, against (in)decisions, against companies”, p. 88). Note the abstract actors in these two responses from school focus groups in the present study, such as the ambiguous “</span><em data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">you</span></em><span data-dcnode-id="1952" instrument_node="">” or “</span><em data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">they</span></em><span data-dcnode-id="1949" instrument_node="">”, “</span><em data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">federal government</span></em><span data-dcnode-id="1946" instrument_node="">”, and “</span><em data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">Sky News</span></em><span data-dcnode-id="1943" instrument_node="">”:</span></p><p data-dcnode-id="1937" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1939"><span class="underline" data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Jess (18, year 12)</span></span></strong><span data-dcnode-id="1938" instrument_node="">: I feel like... I don’t know... We were so highly educated about environmental issues from a young age and then it kind of just ... I don’t know, gets filtered out of us a bit. But it’s good to just be like “you taught us all this stuff, and it’s so clear that if we keep treating the environment the way we are it’s going to die” essentially, so like... Why? Why is nothing being done? Why are we being so heavily educated but then it seems like nothing is actually being done beyond that?</span></p><p data-dcnode-id="1932" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><span data-dcnode-id="1936" instrument_node="">(then, </span><em data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">later in the discussion</span></em><span data-dcnode-id="1933" instrument_node="">)</span></p><p data-dcnode-id="1927" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1929"><span class="underline" data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">Michael (18, year 12):</span></span></strong><span data-dcnode-id="1928" instrument_node=""> To add to that, like, the government is saying that all kids should stay in school but in school we’re learning about all the environmental problems and we’re taught to do something, create change, but when we actually try, we’re pushed back and (they’re saying) “no, go back to school”. So what’s the point in telling us that we need to fix these environmental problems but then tell us “no, you can’t do it”</span></p><p data-dcnode-id="1921" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1923"><span class="underline" data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Jess (18, year 12)</span></span><span data-dcnode-id="1924" instrument_node="">:</span></strong><span data-dcnode-id="1922" instrument_node=""> Yeah, it’s like they teach you to try to change the world but then when you try to, they limit you. Like it’s a very paradoxical type situation.</span></p><p data-dcnode-id="1915" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1917"><span class="underline" data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">Moderator</span></span><span data-dcnode-id="1918" instrument_node="">:</span></strong><span data-dcnode-id="1916" instrument_node=""> When you’re both are talking about “they”—who are you thinking about? Who is “them”?</span></p><p data-dcnode-id="1909" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1911"><span class="underline" data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Dani (18, year 12)</span></span><span data-dcnode-id="1912" instrument_node="">:</span></strong><span data-dcnode-id="1910" instrument_node=""> Everyone else.</span></p><p data-dcnode-id="1907" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><span data-dcnode-id="1908" instrument_node="">(all laugh)</span></p><p data-dcnode-id="1901" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1903"><span class="underline" data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Jess (18, year 12)</span></span><span data-dcnode-id="1904" instrument_node="">:</span></strong><span data-dcnode-id="1902" instrument_node=""> Teachers, politics, even every-</span></p><p data-dcnode-id="1896" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1898"><span class="underline" data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Dani (18, year 12):</span></span></strong><span data-dcnode-id="1897" instrument_node=""> Adults.</span></p><p data-dcnode-id="1894" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><span data-dcnode-id="1895" instrument_node="">(all agree)</span></p><p data-dcnode-id="1888" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1890"><span class="underline" data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Dani</span></span><span data-dcnode-id="1891" instrument_node="">:</span></strong><span data-dcnode-id="1889" instrument_node=""> People in power.</span></p><p data-dcnode-id="1886" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><span data-dcnode-id="1887" instrument_node="">…</span></p><p data-dcnode-id="1881" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1883"><span class="underline" data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">Adam (17, year 12)</span></span></strong><span data-dcnode-id="1882" instrument_node="">: I think there’s a lot of people today, especially young people who do want to make a difference, like Greta Thunberg, but a lot of young people feel like they're not being listened to. Especially by the federal government at the moment. You know, if you turn on Sky News, when Greta Thunberg was really big, there was a lot of attacks on her and I think young people are deeply frustrated at the moment of the lack of-of inaction on climate change perceived threat. And if people could stand up and wave arms about it, you get a bit of publicity. And it gets the word going about in, you know, people’s living rooms. And I think that’s really powerful. Like I think that’s why people want to go down to the protest. Not just to meet people but actually, you know, promote a conversation and promote change, I think.</span></p><p class="mb0" data-dcnode-id="1870"><span data-dcnode-id="1880" instrument_node="">Despite these heavy emphases on environmental engagement and futures, the </span><em data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Strikes</span></em><span data-dcnode-id="1877" instrument_node=""> are also a political act in Generation Z’s civic repertoire. Political pressure was a key motivator mentioned across both survey groups, and this mirrors results seen from </span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="1876" instrument_node="">Collin et al. (2020)</span></a><span data-dcnode-id="1874" instrument_node="">, who also surveyed Australian </span><em data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Strike</span></em><span data-dcnode-id="1871" instrument_node=""> participants. Examples included:</span></p><p data-dcnode-id="1865" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1869" instrument_node="">• “</span><em data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Protesting against the government’s inaction on climate change and urging them to do better</span></em><span data-dcnode-id="1866" instrument_node="">” (anon, 17, year 12)</span></p><p data-dcnode-id="1860" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1864" instrument_node="">• “</span><em data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">I want government action on climate change and this was the main way I saw as making that happen.</span></em><span data-dcnode-id="1861" instrument_node="">” (anon, 18, university first year)</span></p><p data-dcnode-id="1855" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1859" instrument_node="">• “</span><em data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">I disagree with the current climate policy and want to contribute to a political change to stop the climate crisis</span></em><span data-dcnode-id="1856" instrument_node="">” (anon, over 19)</span></p><p class="mb0" data-dcnode-id="1844"><span data-dcnode-id="1854" instrument_node="">Finally, as movement support is a key predictor of mobilization potential (</span><a data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="1853" instrument_node="">Klandermans and Oegema, 1987</span></a><span data-dcnode-id="1851" instrument_node="">; </span><a data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="1850" instrument_node="">van Stekelenburg and Klandermans, 2013</span></a><span data-dcnode-id="1848" instrument_node="">), there was also a notable number of generic and specific statements of movement support, such as “</span><em data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">To raise awareness and hopefully help to gain momentum in the movement to create a legislative change!</span></em><span data-dcnode-id="1845" instrument_node="">” (anon, 16, year 11).</span></p><p class="mb0" data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">In focus groups, key themes emerged in parallel and similar forms to those of surveys. However, the most striking emergent theme was around pathways for providing a youth voice through the protest movement, indicating strong political efficacy for those that attended protests. Hermione, 18-year-old university first year student in Canberra, said this of the power of the movement:</span></p><p data-dcnode-id="1837" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1839"><span class="underline" data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Hermione</span></span></strong><span data-dcnode-id="1838" instrument_node="">: I just thought, for me, I had always been taught about climate change and I have always cared a lot about it but it was just so much more than just the science and facts of climate change. It’s also about me as a youth, I felt like I had no say in anything. Not just climate change, but anything. And I-you know, adults are always saying ‘youth are so apathetic and they don’t care’ and it’s like it’s because you don’t listen to us! You don’t care! And so yeah, for me it was not just about climate change but actually about you know, regaining my democratic rights and actually being able to like make my voice heard for literally the first time in my life. Like, obviously I was 16 at that point, never voted, so yeah was ... It was so much more than climate change for me, it was like democracy as a whole and all of the social justice and environmental stuff that comes with that.</span></p><p class="mb0" data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Other participants shared similar political frustrations, and using the protest movement as a tool to express themselves as young democratic citizens was a common theme. Lauren, 17-year-old, year 11 Canberra student:</span></p><p data-dcnode-id="1830" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1832"><span class="underline" data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Lauren</span></span></strong><span data-dcnode-id="1831" instrument_node="">: I guess, going with a bit of a cliché. I’m only 17, like I can’t vote. And yet it’s like... I’m going to inherit the problem. And I feel like that’s where a lot of the frustration stems from. That’s what a lot of the arguments are based off, is that idea that we can’t do anything. Well ... except for protest, there isn’t very much that we can do as young people, and yet we’re going to be the ones who have to deal with it.</span></p><p class="mb0" data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Some students reflected on how the protest has enabled them to make change, citing then-Prime Minister of Australia, Scott Morrison’s acknowledgement of the protest as a sign that political figures were paying attention to youth voices. Michael, 18, year 12, Canberra:</span></p><p data-dcnode-id="1823" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1825"><span class="underline" data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">Michael</span></span></strong><span data-dcnode-id="1824" instrument_node="">: We’re giving them their jobs. ... If we didn’t vote for them, they wouldn’t have a job in the government, so... It’s a democracy. Our country is a democracy. It’s based on people’s voices. If they’re not heard, then it’s not a democracy anymore.</span></p><p data-dcnode-id="1818" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1820"><span class="underline" data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Moderator</span></span></strong><span data-dcnode-id="1819" instrument_node="">: Did it give you a voice?</span></p><p data-dcnode-id="1813" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1815"><span class="underline" data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Michael</span></span></strong><span data-dcnode-id="1814" instrument_node="">: Well yeah. Because (Scott Morrison) said ‘go back to school’ to all the kids.</span></p><p class="mb0" data-dcnode-id="1808"><span data-dcnode-id="1812" instrument_node="">In general, these findings are consistent with previous studies that have explored an environmentally and politically engaged youth, and contributes nuance around how young people view protest movements such as the </span><em data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">School Strike 4 Climate</span></em><span data-dcnode-id="1809" instrument_node=""> as a tool in their arsenal for expressing their views on climate change.</span></p><h3 class="pt0" data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Motivation to Abstain</span></h3><p class="mb0" data-dcnode-id="1801"><span data-dcnode-id="1805" instrument_node="">Overall, participants that had not attended a protest event were most likely to have been unavailable, in disagreement with the protest events, or influenced in some way by social factors such as school administrators, parents, or peers. In general, there was far more variation between sample groups in reasons for non-attendance than reasons for attendance and all occurrences and codes for non-attendance are outlined in </span><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T6"><span data-dcnode-id="1804" instrument_node="">Table 6</span></a><span data-dcnode-id="1802" instrument_node="">.</span></p><div class="DottedLine" data-dcnode-id="1800"></div><div class="Imageheaders" data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">TABLE 6</span></div><div class="FigureDesc" data-dcnode-id="1791"><a data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/662687/fpos-03-662687-HTML-r1/image_m/fpos-03-662687-t006.jpg" name="Table6" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="1797" id="T6" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/662687/fpos-03-662687-HTML-r1/image_t/fpos-03-662687-t006.gif&amp;raw"></a><p data-dcnode-id="1792"><strong data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">TABLE 6</span></strong><span data-dcnode-id="1793" instrument_node="">. Key themes that emerged for non-attendees of a protest event, by code and data type.</span></p></div><div class="clear" data-dcnode-id="1790"></div><div class="DottedLine" data-dcnode-id="1789"></div><p class="mb0" data-dcnode-id="1775"><span data-dcnode-id="1788" instrument_node="">The most commonly reported reason for students not attending a protest was that they were unavailable, either with school, work, or another unspecified reason. Unspecified reasons reported in the surveys included general statements such as “</span><em data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">I was busy</span></em><span data-dcnode-id="1785" instrument_node="">”, “</span><em data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">I didn</span></em><span data-dcnode-id="1782" instrument_node="">’</span><em data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">t have time</span></em><span data-dcnode-id="1779" instrument_node="">” or “</span><em data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">it clashed with other commitments</span></em><span data-dcnode-id="1776" instrument_node="">”. Overwhelmingly, however, most respondents indicated that they were prioritizing schoolwork over attendance at a protest event. In fact, some respondents in focus groups indicated that school is not only preferable, but that the personal consequences of leaving outweighs desire to attend a protest:</span></p><p data-dcnode-id="1770" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1772"><span class="underline" data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Dani (18, year 12)</span></span></strong><span data-dcnode-id="1771" instrument_node="">: I just didn’t go because I wanted to do my schoolwork. I do want to learn. Like I do come to school because I do want to learn and like I mean, a lot of times they’re like “they just want a day off school”. But to be honest, I think a lot of my friends that I talked to you just didn’t go because they were like I have work to do today. I need to be in class. I don’t understand this concept like... I would love to go, but I do actually want to be at school.</span></p><p data-dcnode-id="1765" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1767"><span class="underline" data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Jess (18, year 12)</span></span></strong><span data-dcnode-id="1766" instrument_node="">: It punishes you by going because you then have to catch up on this maths class, this maths class, this chem class, this chem class, this chem class. It obviously depends if you’re, like, academically motivated, I guess. But like a lot of kids are, and so by going, it’s kind of like being inconvenient to yourself.</span></p><p data-dcnode-id="1760" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1762"><span class="underline" data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Sophie (16, year 11)</span></span></strong><span data-dcnode-id="1761" instrument_node="">: September is like one of the busiest school months. And that’s when the national one is, so by going you’re kind of digging yourself a hole. So you kinda want to be there but... There’s going to be not just actual punishment consequences, but you just falling behind. Yeah, if you’re going, you want to be there.</span></p><p class="mb0" data-dcnode-id="1755"><span data-dcnode-id="1759" instrument_node="">This theme was consistent across survey and focus group responses. In contrast, a visible difference between groups was the way in which participants spoke about </span><em data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">social factors</span></em><span data-dcnode-id="1756" instrument_node=""> influencing non-attendance. From this theme emerged several subthemes, and while no pilot study respondents mentioned these at all, nearly 20% of all full survey respondents mentioned at least one. These subthemes (plus examples) were:</span></p><p data-dcnode-id="1750" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1754" instrument_node="">• School administration: “</span><em data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">very strict high school attendance policies</span></em><span data-dcnode-id="1751" instrument_node="">” (anon, 18, university first year)</span></p><p data-dcnode-id="1745" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1749" instrument_node="">• Parents: “</span><em data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">because my parents aren’t comfortable with me attending strikes that have the possibility that it would get out of hand</span></em><span data-dcnode-id="1746" instrument_node="">” (anon, 17, year 12)</span></p><p data-dcnode-id="1737" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1744" instrument_node="">• Peers (pressure to not attend or lack or support to attend): “</span><em data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Nobody to go with</span></em><span data-dcnode-id="1741" instrument_node="">” (anon, 18, not in school), and “</span><em data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">no one from my school really did it</span></em><span data-dcnode-id="1738" instrument_node="">” (anon, 17, university first year)</span></p><p class="mb0" data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Focus groups had in depth discussions about the extent to which each of these factors influenced participation. School community in particular was spoken of with suspicion, where students implied that school administrators had deliberately made attempts to circumvent protest attendance by either scheduling events on the same day, threatening consequences, or blocking information getting to students:</span></p><p data-dcnode-id="1730" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1732"><span class="underline" data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Asha (16, year 11)</span></span></strong><span data-dcnode-id="1731" instrument_node="">: they scheduled a practice [exam] on that day, I’m not sure if that was intentional or not. I kind of get the feeling that it was.</span></p><p data-dcnode-id="1725" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1727"><span class="underline" data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Lara (16, year 11)</span></span></strong><span data-dcnode-id="1726" instrument_node="">: [A neighboring school] scheduled their [school dance] nearby and they said if they go [to the protest] they can’t go to the [school dance]. This is last year, I think.... So, I think not many girls went.</span></p><p data-dcnode-id="1723" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><span data-dcnode-id="1724" instrument_node="">...</span></p><p data-dcnode-id="1718" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1720"><span class="underline" data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Lara</span></span></strong><span data-dcnode-id="1719" instrument_node="">: I think that unless you go looking for the information, you’re rarely gonna find it, like you might see a poster in [the CBD]. And that’s kind of it. I think that information is just not communicated to everybody consistently.</span></p><p data-dcnode-id="1716" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><span data-dcnode-id="1717" instrument_node="">(all agree)</span></p><p data-dcnode-id="1711" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1713"><span class="underline" data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Jill (17, year 11)</span></span></strong><span data-dcnode-id="1712" instrument_node="">: It’s not very advertised.</span></p><p data-dcnode-id="1706" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1708"><span class="underline" data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Asha</span></span></strong><span data-dcnode-id="1707" instrument_node="">: Yeah. And if it is, like we were saying, the posters get taken down [at school, by the administration].</span></p><p data-dcnode-id="1700" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><span data-dcnode-id="1705" instrument_node="">(</span><strong data-dcnode-id="1702"><span class="underline" data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">others</span></span></strong><span data-dcnode-id="1701" instrument_node=""> agree)</span></p><p data-dcnode-id="1695" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1697"><span class="underline" data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Asha</span></span></strong><span data-dcnode-id="1696" instrument_node="">: Yeah. Like, people are trying to get rid of it. Stop the information from getting to people.</span></p><p class="mb0" data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">In another example of focus group discussion on social factors, students spoke of parental influence, though rarely did students mention an opposition to climate action as reasoning for parental hesitation:</span></p><p data-dcnode-id="1688" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1690"><span class="underline" data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Maya (16, year 11)</span></span></strong><span data-dcnode-id="1689" instrument_node="">: I did want to go. My parents-my mom, specifically, wasn’t too impressed about me skipping a day of school, I guess. Just like more that idea. And especially I guess for people our age, because I couldn’t drive, and I live a fair way (away from the protest) as well. So like just trying to organize my way (to the protest) would be a bit difficult. That's probably the main factor.</span></p><p data-dcnode-id="1683" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1685"><span class="underline" data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Jenny (17, year 11)</span></span></strong><span data-dcnode-id="1684" instrument_node="">: Oh, yeah. My mom would not-. Honestly, I wanted to go but I just knew it wasn’t a thing. I just couldn’t really ask because I already knew the answer. It was like just an assumption. Like, well, that’s just not something I would be allowed to go to. And especially since we had a test on. I would just not be, you know, it would not really be an option for me. But definitely in the future. Definitely.</span></p><p class="mb0" data-dcnode-id="1678"><span data-dcnode-id="1682" instrument_node="">Many of these responses speak directly to adult structures of governance in young people’s lives. Research has shown that communities of support or opposition of protest participation can influence non-participation (see, for example, </span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B66"><span data-dcnode-id="1681" instrument_node="">Hensby, 2017</span></a><span data-dcnode-id="1679" instrument_node="">), and it is possible that this extends to adult structures in which young people are deciding to participate or not.</span></p><p class="mb0" data-dcnode-id="1664"><span data-dcnode-id="1677" instrument_node="">Some participants directly addressed a feeling of low political power when it came to </span><em data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">School Strike</span></em><span data-dcnode-id="1674" instrument_node=""> demonstrations, which may contribute to non-attendance. This was particularly evident when focus groups were asked to reflect on the popular notion that some attendees may be simply participating to skip school. Predominantly, discussion of this idea garnered two major responses: that it was </span><em data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">patronizing</span></em><span data-dcnode-id="1671" instrument_node=""> to insinuate students had no other reasons to attend the protests, and that if there are students that use the </span><em data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Strike</span></em><span data-dcnode-id="1668" instrument_node=""> as an excuse to leave school, these students </span><em data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">do not attend a Strike event</span></em><span data-dcnode-id="1665" instrument_node="">. Adam (17, year 12, Canberra) highlighted that political power was low among teenagers, and that this was being weaponized against protestors in a patronizing way:</span></p><p data-dcnode-id="1659" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1661"><span class="underline" data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Adam</span></span></strong><span data-dcnode-id="1660" instrument_node="">: I found (the response) from the government, particularly the Prime Minister going ‘Oooh you know those kids should go back to school because that’s where they belong’, you know... I found that a bit disingenuous. And kind of a bit arrogant. Coming from the Prime Minister going ‘Oooh they can’t vote (yet) so’, you know, ‘we don't have to listen to them'”</span></p><p class="mb0" data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">This lack of political efficacy relates to many efficacious reasons why respondents had not participated in a protest event. Efficacy in this instance was split into two broad categories:</span></p><p data-dcnode-id="1655" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1656" instrument_node="">1. Protest efficacy: the belief that as a group, protests can achieve their desired outcomes;</span></p><p data-dcnode-id="1650" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1654" instrument_node="">2. Participative efficacy: that one’s individual contributions will make a difference to the group or collective of activists (</span><a data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="1653" instrument_node="">van Zomeren et al., 2013</span></a><span data-dcnode-id="1651" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1642"><span data-dcnode-id="1649" instrument_node="">A lack of protest efficacy was evident across both survey and focus group responses, from general statements such as “</span><em data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">I feel like it wouldn’t do much for actually changing policy</span></em><span data-dcnode-id="1646" instrument_node="">” and “</span><em data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Don’t think they work</span></em><span data-dcnode-id="1643" instrument_node="">” through to more in depth examples:</span></p><p data-dcnode-id="1637" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1641" instrument_node="">• “</span><em data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">The net payoff for me attending the strike will be significantly lower than anything else I could be doing with my time, in large because I don’t believe it will effect (sic) government policy or the rate of climate change</span></em><span data-dcnode-id="1638" instrument_node="">” (anon, 19, university second year)</span></p><p data-dcnode-id="1632" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1636" instrument_node="">• “</span><em data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">They were for sure, aware of (climate change) and concerned about it. But the strike format, they were just like, well, politicians are just not going to pay any attention. It’s not a vote. They’re not gonna win voters by supporting it. Most likely. They’re conservative politicians. They’re just gonna keep being conservative.</span></em><span data-dcnode-id="1633" instrument_node="">” (Tad, 18, year 12)</span></p><p class="mb0" data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Participative efficacy, on the other hand, was slightly less prevalent in surveys, as compared to focus groups. For example, Grace, 17-year-old year 12 student in Canberra, said this of her reasoning to not attend:</span></p><p data-dcnode-id="1625" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1627"><span class="underline" data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Grace</span></span></strong><span data-dcnode-id="1626" instrument_node="">: Personally, I didn’t go because like, I feel like it wouldn’t make a difference if I went or not. And I could make more difference, like working hard in school and trying to like get a job where I can influence them more directly. Yeah, like. I felt like I wouldn’t be heard if I went.</span></p><p class="mb0" data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Finally, while a lack of efficacy seemed an issue for many respondents, 16-year-old year 11 student Maya, remained hopeful about the impacts that protests can have, despite not having been to one herself:</span></p><p data-dcnode-id="1618" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1620"><span class="underline" data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Maya</span></span></strong><span data-dcnode-id="1619" instrument_node="">: I think specifically, if you look at like other issues in the past, I think protests are really powerful way to show the government-Specifically for school kids who I feel like a lot of the time, we feel like we’re controlled with every single part of our lives. So to show that we have this, like, passion, and we will go out of our way to prove that we want to fight for what’s right, it shows that maybe they should actually start to take into account our views on the system.</span></p><p class="mb0" data-dcnode-id="1613"><span data-dcnode-id="1617" instrument_node="">This small example highlights that a lack of political efficacy is not necessarily an underlying factor in all respondents that chose not to participate in a </span><em data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Strike</span></em><span data-dcnode-id="1614" instrument_node="">.</span></p><p class="mb0" data-dcnode-id="1587"><span data-dcnode-id="1612" instrument_node="">Finally, </span><em data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">event disagreement</span></em><span data-dcnode-id="1609" instrument_node=""> was also a prominent motivator for non-participation. While efficacy refers to the outcomes of engagement with collective action, this code is distinct in that it refers more broadly to “sympathizers” (</span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B68"><span data-dcnode-id="1608" instrument_node="">Oegema and Klandermans, 1994</span></a><span data-dcnode-id="1606" instrument_node="">, p. 703) who agree with a cause and its merits, but not with the avenue through which it has been pursued. Categories that emerged under this code mirror two of three described by </span><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1605" instrument_node="">Stuart et al. (2018)</span></a><span data-dcnode-id="1603" instrument_node="">: </span><em data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">disagreement on methods</span></em><span data-dcnode-id="1600" instrument_node="">, and </span><em data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">reluctance</span></em><span data-dcnode-id="1597" instrument_node=""> to associate with the protesting group. It’s worth noting here that the third of </span><a data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1596" instrument_node="">Stuart et al. (2018)</span></a><span data-dcnode-id="1594" instrument_node=""> factors of non-participation is a </span><em data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">loss of autonomy</span></em><span data-dcnode-id="1591" instrument_node=""> in a group/crowd setting. In the present study, this has instead been captured by the </span><em data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">participative efficacy</span></em><span data-dcnode-id="1588" instrument_node=""> code.</span></p><p class="mb0" data-dcnode-id="1582"><span data-dcnode-id="1586" instrument_node="">On </span><em data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">disagreement of methods</span></em><span data-dcnode-id="1583" instrument_node="">, the pilot sample (predominantly early university students from a Canberra university) frequently mention centering education over protesting:</span></p><p data-dcnode-id="1577" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1581" instrument_node="">• “</span><em data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Don’t see the point, I study environmental science but think all our problems are better solved practically with actual science. Of course it’s important to speak out about such issues but I don’t think it makes a huge difference apart from landing on (sic) the media as policies don’t really change as a result and even the people striking are just as ignorant to their immediate impacts on the environment</span></em><span data-dcnode-id="1578" instrument_node="">” (anon, 18, university first year)</span></p><p data-dcnode-id="1572" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1576" instrument_node="">• “</span><em data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">I prefer to educate myself so that I can be more useful when stopping climate change—if I continue well with uni I can be more effective than just another face in the crowd. So I won’t skip classes just to protest</span></em><span data-dcnode-id="1573" instrument_node="">” * (anon, 19, university first year)</span></p><p data-dcnode-id="1567" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1571" instrument_node="">• “</span><em data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Busy day and large strikes aren’t my thing, I research in renewables so I don’t have the ‘I’m not doing enough for climate change’ guilt</span></em><span data-dcnode-id="1568" instrument_node="">” (anon, 19, university second year)</span></p><p class="mb0" data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">*Did not attend a protest, but did not give a reason why. This statement was made in open response at the end of the survey asking for any further comments.</span></p><p class="mb0" data-dcnode-id="1560"><span data-dcnode-id="1564" instrument_node="">For those that were </span><em data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">reluctant</span></em><span data-dcnode-id="1561" instrument_node=""> to associate with other protestors, the focus was instead on the risks of using protest as a form of expression:</span></p><p data-dcnode-id="1555" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1559" instrument_node="">• “</span><em data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Concern about how the strike could make too significant a proportion of voters turn away from caring about climate action.</span></em><span data-dcnode-id="1556" instrument_node="">” (anon, 18, university first year)</span></p><p data-dcnode-id="1550" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="1554" instrument_node="">• “</span><em data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">Don’t believe in the form of activism it promotes and the groups that are associated with it</span></em><span data-dcnode-id="1551" instrument_node="">” (anon, 18, university first year)</span></p><p class="mb0" data-dcnode-id="1545"><span data-dcnode-id="1549" instrument_node="">Again, these responses are distinct from those exhibiting low efficacy, as they don’t comment directly on the effectiveness of protesting on a group or individual level. Instead these responses speak to being outside a mobilization potential that agrees with both social movement goals and format (</span><a data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="1548" instrument_node="">Klandermans and Oegema, 1987</span></a><span data-dcnode-id="1546" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="1537"><span data-dcnode-id="1544" instrument_node="">Respondents that disagreed with protest methods, listed above, were also three of four responses (across non-attendees) that specifically mentioned the environment, and each statement was co-coded as such. The final mention of environment was one 19-year-old student in first year university who stated “</span><em data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Ineffective, climate change is overhyped</span></em><span data-dcnode-id="1541" instrument_node="">” as their reason for non-attendance. While youth ‘belief’ in climate change is beyond the scope of the present study, this has been explored extensively elsewhere (for example, see </span><a data-dcnode-id="1539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1540" instrument_node="">Stevenson et al., 2014</span></a><span data-dcnode-id="1538" instrument_node="">). It is interesting to note that while political efficacy may be low among respondents, low climate efficacy (the ability to influence climate change) was not an evident theme.</span></p><p class="mb0" data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Broadly speaking, reasons for non-attendance were complex and multi-layered. One student, Dani, an 18-year-old year 12 student in Canberra, summed up this complexity, stating this of her reasons for not going to a protest:</span></p><p data-dcnode-id="1530" style="margin-left: 2em;text-indent:0em;margin-top: 0.5em;margin-bottom: 0.5em;"><strong data-dcnode-id="1532"><span class="underline" data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Dani</span></span></strong><span data-dcnode-id="1531" instrument_node="">: My thought process was just like, oh, I don’t really know if it’s allowed, like, are we allowed to go? Am I going to have to have an absence (recorded)? Or can I, like explain it? Because, you know, you can only have a certain number of (unexplained) absences in (senior high school). So it’s like, am I going to have an absence, how many do I already have? And then I was like, well, I have schoolwork, anyway, you know, and then I’m like, one person not going isn’t going to impact it. It all just stacks up.</span></p><a class="reset-hash-position" data-dcnode-id="1529" id="h5" name="h5"></a><h2 data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Discussion</span></h2><p class="mb15" data-dcnode-id="1510"><span data-dcnode-id="1526" instrument_node="">This research explored motivators of teenagers to either attend or not attend a </span><em data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">School Strike</span></em><span data-dcnode-id="1523" instrument_node=""> protest event, finding non-participation is motivated by a distinct set of factors separate to those that motivate participation. In general, young people attending </span><em data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Strikes</span></em><span data-dcnode-id="1520" instrument_node=""> are motivated by a concern for the climate, and see protesting as a key part of their political repertoire. Non-participants were not necessarily found to be the ‘opposite’ of attendees: predominantly, non-attendees were simply unavailable or prioritizing studies in favor of attending a </span><em data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Strike</span></em><span data-dcnode-id="1517" instrument_node="">. Various levels and types of low efficacy (participative and protest) were also found to be key motivators to </span><em data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">not</span></em><span data-dcnode-id="1514" instrument_node=""> attend a </span><em data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Strike</span></em><span data-dcnode-id="1511" instrument_node="">, as were social factors such as pressure from adults or peers, though the latter were more prominent in school-based focus groups than in surveys.</span></p><p class="mb15" data-dcnode-id="1496"><span data-dcnode-id="1509" instrument_node="">For many respondents, there was not a singular clear-cut reason for attendance or non-attendance, and the way in which young people explore issues of environmental activism can be complex, intertwining many different competing priorities. We see this especially when students speak of government action and their desire for stronger action on climate change: pro-environmental positions are closely linked to political acts. While this is to be expected from the </span><em data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">School Strike</span></em><span data-dcnode-id="1506" instrument_node=""> movement, it highlights how young people’s political engagement is strongly tied to issues rather than political structures (</span><a data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="1505" instrument_node="">Norris, 2003</span></a><span data-dcnode-id="1503" instrument_node="">; </span><a data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="1502" instrument_node="">Pickard, 2019</span></a><span data-dcnode-id="1500" instrument_node="">), and enacted through new opportunities of participation through “issues-based networks” (</span><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1499" instrument_node="">Collin and Mccormack, 2019</span></a><span data-dcnode-id="1497" instrument_node="">, p. 497). In the case of many respondents here, participation is not an ‘either-or’ proposition between an environmental or political motivator.</span></p><p class="mb15" data-dcnode-id="1479"><span data-dcnode-id="1495" instrument_node="">This research found that non-participants did not mirror participants with a direct lack of political or environmental engagement, despite non-participation often being inferred directly from participant studies. Non-participants in this study very rarely exhibited active hostility toward the movement, climate change, or engagement with politics more broadly. In opposition to the popular idea that young people use the </span><em data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Strike</span></em><span data-dcnode-id="1492" instrument_node=""> as an excuse to leave school (</span><a data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="1491" instrument_node="">Barraclough, 2019</span></a><span data-dcnode-id="1489" instrument_node="">; </span><a data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="1488" instrument_node="">RNZ, 2021</span></a><span data-dcnode-id="1486" instrument_node="">), respondents in this study highlight that staying at school or prioritizing school work is a key factor in not attending a </span><em data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Strike</span></em><span data-dcnode-id="1483" instrument_node="">. This is consistent with work of </span><a data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="1482" instrument_node="">Harris et al. (2010)</span></a><span data-dcnode-id="1480" instrument_node="">, who’s study on Australian youth political engagement showed students top personal concerns were “getting a good job” (p. 17) and “doing well in studies” (p. 17).</span></p><p class="mb15" data-dcnode-id="1462"><span data-dcnode-id="1478" instrument_node="">Placing a high importance on schoolwork may also be indicative of structural constraints that exist for young people, as imposed by adults. Especially in focus groups, respondents were cognizant of the influence that school administrators and parents had over their ability to go to a protest. Namely, there was a concern that students would face consequences by attending a </span><em data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Strike</span></em><span data-dcnode-id="1475" instrument_node="">, from both school administrators and family. Parents can play an important role in a young person’s engagement with climate change, as they are seen as a trusted source of information (</span><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="1474" instrument_node="">Corner et al., 2015</span></a><span data-dcnode-id="1472" instrument_node="">), contributor of social norms around pro-environmental behavior (</span><a data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B61"><span data-dcnode-id="1471" instrument_node="">Busch et al., 2019</span></a><span data-dcnode-id="1469" instrument_node="">), and can influence a young person’s climate change risk perception level (</span><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="1468" instrument_node="">Mead et al., 2012</span></a><span data-dcnode-id="1466" instrument_node="">). While the specific contributions of parents on participants willingness to engage are beyond the scope of the present study, what we see here is a much more practical demonstration of parental influence. Parents may have a direct influence on the mobilization potential (</span><a data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="1465" instrument_node="">Klandermans and Oegema, 1987</span></a><span data-dcnode-id="1463" instrument_node="">) of young people seeking to engage in environmental activism by removing student ability to attend an event despite intention and motivation to do so.</span></p><p class="mb15" data-dcnode-id="1451"><span data-dcnode-id="1461" instrument_node="">Participants of a </span><em data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">Strike</span></em><span data-dcnode-id="1458" instrument_node=""> also referred to adult influences in several instances, especially as targets of the resistance movement. These included abstract actors such as governments, news providers and more broadly ‘adults’. It is clear from the framing of these comments that adults are seen as a blanket “out group” (</span><a data-dcnode-id="1456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="1457" instrument_node="">Fielding and Hornsey, 2016</span></a><span data-dcnode-id="1455" instrument_node="">, p. 2), and the results presented here support research showing a shift in youth resistance from distinct individuals to broad and complex abstract groups (</span><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B67"><span data-dcnode-id="1454" instrument_node="">Holmberg and Alvinius, 2019</span></a><span data-dcnode-id="1452" instrument_node="">).</span></p><p class="mb15" data-dcnode-id="1428"><span data-dcnode-id="1450" instrument_node="">Respondents also frequently highlighted a lack of agency in political process, which, while not an overwhelmingly prominent response, did arise as a reason for non-attendance. For those wishing to engage, lack of youth voice to parliament may lead to disengagement from the system (</span><a data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="1449" instrument_node="">Manning and Edwards, 2014</span></a><span data-dcnode-id="1447" instrument_node="">). However, rhetorically speaking, political figures use dismissive language in order to belittle the agency of young people attending the </span><em data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Strikes</span></em><span data-dcnode-id="1444" instrument_node=""> (</span><a data-dcnode-id="1442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="1443" instrument_node="">Feldman, 2020</span></a><span data-dcnode-id="1441" instrument_node="">), such as implying young people are only attending a </span><em data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Strike</span></em><span data-dcnode-id="1438" instrument_node=""> to skip school. But this rhetorical engagement can also be seen as a positive, as reflected in comments from 18-year-old Michael, who used political acknowledgement of the </span><em data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Strike</span></em><span data-dcnode-id="1435" instrument_node=""> as a sign of movement impact. Conversely, there may be adverse consequences for young people constantly exposed to negative stereotyping from adults, incorrect or otherwise. Several focus group respondents noted that they had heard young people were attending </span><em data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Strikes</span></em><span data-dcnode-id="1432" instrument_node=""> to ‘skip school’ and assumed this motivation to be true of their peers. The risk here is that repeatedly being stereotyped may have a backfire effect and begin to influence young people of this age group, resulting in a self-belief of the negative stereotype (</span><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1431" instrument_node="">Bessant, 2020</span></a><span data-dcnode-id="1429" instrument_node="">). Noting how young people speak of their agency, and respond to broader rhetoric, in adult government structures is important to consider in the broader conversation on youth political engagement.</span></p><p class="mb15" data-dcnode-id="1411"><span data-dcnode-id="1427" instrument_node="">However, structural barriers are not the only mechanisms for disengagement, and psychological processes can also play a role in a decision to step back from political acts such as protest (</span><a data-dcnode-id="1425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1426" instrument_node="">Stuart et al., 2018</span></a><span data-dcnode-id="1424" instrument_node="">). In some cases, non-participants in this study showed a rejection of the methods or people engaged with the </span><em data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">School Strike</span></em><span data-dcnode-id="1421" instrument_node=""> movement. There was a concern among rejecters of the movement that association with activists can turn other voters away from the cause, or that activists were a group to be in opposition with. However, there was no rejection of climate change action, other than one response out of all samples. This tension between being a sympathizer of a cause (</span><a data-dcnode-id="1419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="1420" instrument_node="">Klandermans and Oegema, 1987</span></a><span data-dcnode-id="1418" instrument_node="">) and not wanting to participate in the collective action due to the methods or identities of the activists strongly supports previous research in this area (see </span><a data-dcnode-id="1416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1417" instrument_node="">Stuart et al., 2018</span></a><span data-dcnode-id="1415" instrument_node="">). Interestingly, this rejection of methods or other protest actors was evident in the survey sample, but not in the focus groups. This may point to a certain level of desirability bias (</span><a data-dcnode-id="1413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="1414" instrument_node="">Krumpal, 2013</span></a><span data-dcnode-id="1412" instrument_node="">) in the focus groups, where participants could be influenced by normative attitudes in the group that would suggest that, overall, the protest movement is a positive form of collective action.</span></p><p class="mb15" data-dcnode-id="1379"><span data-dcnode-id="1410" instrument_node="">Distinct from event agreement or disagreement, efficacious people tend to be drawn to normative actions such as protesting (</span><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B71"><span data-dcnode-id="1409" instrument_node="">Tausch et al., 2011</span></a><span data-dcnode-id="1407" instrument_node="">). This may be why efficacy was an implicit underlying factor in many responses from participants who had attended </span><em data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Strike</span></em><span data-dcnode-id="1404" instrument_node=""> events. In the </span><a data-dcnode-id="1402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B71"><span data-dcnode-id="1403" instrument_node="">Tausch et al. (2011)</span></a><span data-dcnode-id="1401" instrument_node=""> study, however, non-efficacious people were associated with non-normative or extreme forms of activism. By contrast, a lack of efficacy in the present study was more visibly explicit in those that had decided not to attend a protest. Though we cannot know whether these respondents are engaging in other forms of extreme activism, we can investigate their levels of efficacy in both an individual and group sense. Efficacy was coded specifically in non-attendee responses via protest efficacy—whether these specific actions have an effect on policy—and participative efficacy—whether individual contributions will make a difference to the group action. These two codes in combination highlighted a notable absence of low political efficacy, or the sense that one’s individual actions can’t influence political process (</span><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="1400" instrument_node="">Campbell et al., 1954</span></a><span data-dcnode-id="1398" instrument_node="">; as cited in </span><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="1397" instrument_node="">van Stekelenburg and Klandermans, 2013</span></a><span data-dcnode-id="1395" instrument_node="">). Overall, the combination of event rejection and efficacy codes almost directly mirrored the work of </span><a data-dcnode-id="1393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1394" instrument_node="">Stuart et al. (2018)</span></a><span data-dcnode-id="1392" instrument_node="">, who found that </span><em data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">disagreement on methods</span></em><span data-dcnode-id="1389" instrument_node="">, </span><em data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">reluctance</span></em><span data-dcnode-id="1386" instrument_node=""> to associate with the protesting group and a </span><em data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">loss of autonomy</span></em><span data-dcnode-id="1383" instrument_node=""> in a group/crowd setting were key reasons where people decided not to participate in collective action. The present study takes this theory specifically into the realm of youth activism, finding it applicable to sympathizers much younger than those who participated in the original </span><a data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1382" instrument_node="">Stuart et al. (2018)</span></a><span data-dcnode-id="1380" instrument_node=""> study, which had a mean age of 32.5 years (SD = 13).</span></p><p class="mb15" data-dcnode-id="1350"><span data-dcnode-id="1378" instrument_node="">The general consensus in the
