</span><meta content="This paper is an exploratory study investigating motivators of teenagers to both attend and not attend a climate change related protest event. Using open-ended surveys and focus groups, 16–19-year-old Australian students were asked about their motivators to attend and abstain from School Strike 4 Climate events. Through qualitative analysis and thematic coding, results show key motivators to attend a Strike include climate change and acts of political participation that provide youth with a public voice. Protest is positioned as a key part of teen political repertoires. Reasons for non-attendance included prioritizing schoolwork and low efficacy in protest or participatory action. However, low efficacy in climate change mitigation, or an outright rejection of climate science, was not evident in this sample. Overall, reasons for attendance and non-attendance at a Strike event were not direct mirror images of the other, and implications for inclusion of non-participants in further studies is discussed in this light." data-dcnode-id="3666" name="Description" property="og:description"><span data-dcnode-id="3665" instrument_node="">

</span><a addthis:description="This paper is an exploratory study investigating motivators of teenagers to both attend and not attend a climate change related protest event. Using open-ended surveys and focus groups, 16–19-year-old Australian students were asked about their motivators to attend and abstain from School Strike 4 Climate events. Through qualitative analysis and thematic coding, results show key motivators to attend a Strike include climate change and acts of political participation that provide youth with a public voice. Protest is positioned as a key part of teen political repertoires. Reasons for non-attendance included prioritizing schoolwork and low efficacy in protest or participatory action. However, low efficacy in climate change mitigation, or an outright rejection of climate science, was not evident in this sample. Overall, reasons for attendance and non-attendance at a Strike event were not direct mirror images of the other, and implications for inclusion of non-participants in further studies is discussed in this light." addthis:title="Motivators of Participation and Non-Participation in Youth Environmental Protests" addthis:url="https://www.frontiersin.org/article/10.3389/fpos.2021.662687" class="addthis_button_facebook at300b" data-dcnode-id="2862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html" title="Facebook"><span class="at-icon-wrapper" data-dcnode-id="2863" style="background-color: rgb(59, 89, 152); line-height: 16px; height: 16px; width: 16px;"><svg alt="Facebook" aria-labelledby="at-svg-facebook-1" class="at-icon at-icon-facebook" data-dcnode-id="2864" role="img" style="width: 16px; height: 16px;" title="Facebook" version="1.1" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><title data-dcnode-id="2867" id="at-svg-facebook-1">Facebook</title><g data-dcnode-id="2865"><path d="M22 5.16c-.406-.054-1.806 </span><div class="JournalAbstract" data-dcnode-id="2729"><a class="reset-hash-position" data-dcnode-id="2752" id="h1" name="h1"></a><h1 data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Motivators of Participation and Non-Participation in Youth Environmental Protests</span></h1><div class="authors" data-dcnode-id="2745"><a class="user-id-987635" data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/987635"><img alt="www.frontiersin.org" class="pr5" data-dcnode-id="2749" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg&amp;raw"><span data-dcnode-id="2748" instrument_node="">Hannah R. Feldman</span></a><span data-dcnode-id="2746" instrument_node="">*</span></div><ul class="notes" data-dcnode-id="2742"><li data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Australian National Centre for the Public Awareness of Science, Australian National University, Canberra, ACT, Australia</span></li></ul><p class="mb15" data-dcnode-id="2731"><span data-dcnode-id="2741" instrument_node="">This paper is an exploratory study investigating motivators of teenagers to both attend and not attend a climate change related protest event. Using open-ended surveys and focus groups, 16–19-year-old Australian students were asked about their motivators to attend and abstain from </span><em data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">School Strike 4 Climate</span></em><span data-dcnode-id="2738" instrument_node=""> events. Through qualitative analysis and thematic coding, results show key motivators to attend a </span><em data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Strike</span></em><span data-dcnode-id="2735" instrument_node=""> include climate change and acts of political participation that provide youth with a public voice. Protest is positioned as a key part of teen political repertoires. Reasons for non-attendance included prioritizing schoolwork and low efficacy in protest or participatory action. However, low efficacy in climate change mitigation, or an outright rejection of climate science, was not evident in this sample. Overall, reasons for attendance and non-attendance at a </span><em data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Strike</span></em><span data-dcnode-id="2732" instrument_node=""> event were not direct mirror images of the other, and implications for inclusion of non-participants in further studies is discussed in this light.</span></p><div class="clear" data-dcnode-id="2730"></div></div><div class="JournalFullText" data-dcnode-id="391"><a class="reset-hash-position" data-dcnode-id="2728" id="h2" name="h2"></a><h2 data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">Introduction and Literature</span></h2><h3 class="pt0" data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">Introduction and Contribution</span></h3><p class="mb0" data-dcnode-id="2710"><span data-dcnode-id="2723" instrument_node="">This paper explores young people’s motivations to attend or not attend an environmental activism event. Through surveys and focus groups with 15–19-year-old Australian students, this research provides an exploratory introduction to how teenagers discuss their decisions to not participate in a School </span><em data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Strike four Climate</span></em><span data-dcnode-id="2720" instrument_node=""> event, as well as contributing further examples on their motivations to participate. This research engages with teenagers directly, qualitatively analyzing open ended questions where young people report reasons for both attending and not attending a </span><em data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">Strike</span></em><span data-dcnode-id="2717" instrument_node="">. The findings form the basis for exploratory work into the motivators of </span><em data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">Strike</span></em><span data-dcnode-id="2714" instrument_node=""> participation and abstention in late-teens, a chronically under-researched age group in political studies, and contribute to the broader picture of youth environmental activism with students who both attend or not attend </span><em data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">School Strike</span></em><span data-dcnode-id="2711" instrument_node=""> events.</span></p><h3 class="pt0" data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">Social Movements and the School Strike</span></h3><p class="mb0" data-dcnode-id="2691"><span data-dcnode-id="2707" instrument_node="">The </span><em data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">School Strike 4 Climate</span></em><span data-dcnode-id="2704" instrument_node=""> (otherwise known as </span><em data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">Fridays for Future</span></em><span data-dcnode-id="2701" instrument_node="">, </span><em data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">Climate Strike</span></em><span data-dcnode-id="2698" instrument_node=""> or </span><em data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">Skolstrejk för Klimatet</span></em><span data-dcnode-id="2695" instrument_node="">) is a growing movement of young people leaving school—going on strike—to protest government inaction on climate change. Started by then-16-year-old Greta Thunberg, the movement has swelled to millions of participants across 125 countries, and continues to operate even under crippling COVID-19 pandemic conditions. But research on the motivations of these young people to participate in a </span><em data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">Strike</span></em><span data-dcnode-id="2692" instrument_node=""> is scarce.</span></p><p class="mb0" data-dcnode-id="2680"><span data-dcnode-id="2690" instrument_node="">To begin our exploration of these </span><em data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">Strikes</span></em><span data-dcnode-id="2687" instrument_node="">, we look first to extensive literature on factors that motivate people to attend collective action events. </span><a data-dcnode-id="2685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="2686" instrument_node="">Klandermans and Oegema (1987)</span></a><span data-dcnode-id="2684" instrument_node=""> contribute the model of “Mobilization Potential” (p. 519), exploring elements that must align for protest participation: people must hear about the event, sympathize with both the aims and format of the event, be motivated to attend, and also be enabled to attend (</span><a data-dcnode-id="2682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="2683" instrument_node="">van Stekelenburg and Klandermans, 2013</span></a><span data-dcnode-id="2681" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="2657"><span data-dcnode-id="2679" instrument_node="">Further, </span><a data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="2678" instrument_node="">van Zomeren et al. (2008)</span></a><span data-dcnode-id="2676" instrument_node=""> contribute a comprehensive model for exploring the effects of social identity in collective action. The Social Identity Model of Collective Action (SIMCA) is an integrated model of three key socio-psychological predictors for collective action: injustice, efficacy and identity (</span><a data-dcnode-id="2674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="2675" instrument_node="">van Zomeren et al., 2008</span></a><span data-dcnode-id="2673" instrument_node="">). This model has been used by scholars to delve deeper into motivators of young </span><em data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">School Strike</span></em><span data-dcnode-id="2670" instrument_node=""> attendees. For example, </span><a data-dcnode-id="2668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="2669" instrument_node="">Brügger et al. (2020)</span></a><span data-dcnode-id="2667" instrument_node=""> integrate the SIMCA to explore </span><em data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">Strike</span></em><span data-dcnode-id="2664" instrument_node=""> motivations of over 4,000 Swiss youth aged 14–25. Their study found that social identity (the extent to which participants associate with other </span><em data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Strikers</span></em><span data-dcnode-id="2661" instrument_node="">) as well as students risk perception of climate change were key factors in predicting engagement with the </span><em data-dcnode-id="2659"><span data-dcnode-id="2660" instrument_node="">School Strike</span></em><span data-dcnode-id="2658" instrument_node=""> movement.</span></p><p class="mb0" data-dcnode-id="2649"><span data-dcnode-id="2656" instrument_node="">In exploration of the </span><em data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">School Strike</span></em><span data-dcnode-id="2653" instrument_node="">, a range of these factors from mobilization potential to social identity may be useful in not only investigating how young people come to attend or discuss protest events, but also how they may fall </span><em data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">out</span></em><span data-dcnode-id="2650" instrument_node=""> of the participation pool, highlighting factors that could contribute to their non-attendance.</span></p><h3 class="pt0" data-dcnode-id="2644"><span data-dcnode-id="2648" instrument_node="">Youth Attendance at a </span><em data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Strike</span></em><span data-dcnode-id="2645" instrument_node=""> Event</span></h3><p class="mb0" data-dcnode-id="2621"><span data-dcnode-id="2643" instrument_node="">While it may be difficult to assess young people’s level of climate change engagement (</span><a data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="2642" instrument_node="">Partridge, 2008</span></a><span data-dcnode-id="2640" instrument_node="">), they have been found on numerous occasions to be knowledgeable about climate (</span><a data-dcnode-id="2638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="2639" instrument_node="">Lee et al., 2020</span></a><span data-dcnode-id="2637" instrument_node="">), concerned (</span><a data-dcnode-id="2635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="2636" instrument_node="">Bentley et al., 2004</span></a><span data-dcnode-id="2634" instrument_node="">), and emotional about (</span><a data-dcnode-id="2632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="2633" instrument_node="">Ojala, 2012</span></a><span data-dcnode-id="2631" instrument_node="">) the realities of climate change. The </span><em data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Strikes</span></em><span data-dcnode-id="2628" instrument_node=""> have been shown to connect deeply with young people’s climate anxieties (</span><a data-dcnode-id="2626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="2627" instrument_node="">McKnight, 2020</span></a><span data-dcnode-id="2625" instrument_node="">), reflecting young people’s negative and pessimistic experiences with climate change (</span><a data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="2624" instrument_node="">Han and Ahn, 2020</span></a><span data-dcnode-id="2622" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="2604"><span data-dcnode-id="2620" instrument_node="">However, it has become a common trope that young people are ‘politically disengaged’ from civic life (</span><a data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="2619" instrument_node="">Harris, et al., 2010</span></a><span data-dcnode-id="2617" instrument_node="">). Despite this misconception, young people are instead well known to be politically active in ways that deviate from classical views of ‘political engagement’ (</span><a data-dcnode-id="2615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="2616" instrument_node="">Norris, 2003</span></a><span data-dcnode-id="2614" instrument_node="">; </span><a data-dcnode-id="2612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="2613" instrument_node="">Pickard, 2019</span></a><span data-dcnode-id="2611" instrument_node="">). While ‘political behaviors’ in the past have been centered around engagement with formal structures of government such as knowledge of polity processes, or participating in political campaigning (</span><a data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="2610" instrument_node="">Delli and Michael, 2000</span></a><span data-dcnode-id="2608" instrument_node="">), young people today are much more likely to be issues-focused in their political engagement (</span><a data-dcnode-id="2606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="2607" instrument_node="">Pickard and Bessant, 2018</span></a><span data-dcnode-id="2605" instrument_node="">). This means that political behaviors to young people may instead constitute a repertoire of signing petitions, consumer politics such as boycotting brands, and protesting.</span></p><p class="mb0" data-dcnode-id="2572"><span data-dcnode-id="2603" instrument_node="">Via the </span><em data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">School Strike</span></em><span data-dcnode-id="2600" instrument_node=""> movement, young people are using political action to voice their concern for their futures and the environment (</span><a data-dcnode-id="2598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="2599" instrument_node="">McKnight, 2020</span></a><span data-dcnode-id="2597" instrument_node="">), which pushes back against the picture of a passive youth citizen, despite politics often being ‘done to’ young people rather than actively including them (</span><a data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="2596" instrument_node="">Fyfe, 2009</span></a><span data-dcnode-id="2594" instrument_node="">; </span><a data-dcnode-id="2592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="2593" instrument_node="">Andersson, 2015</span></a><span data-dcnode-id="2591" instrument_node="">). These </span><em data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Strikes</span></em><span data-dcnode-id="2588" instrument_node=""> distinctly focus on governmental entities or the “State” (</span><a data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="2587" instrument_node="">de Moor et al., 2020a</span></a><span data-dcnode-id="2585" instrument_node="">, p. 4) as important actors in mitigation of climate change, which appears at odds with prior research investigating youth locus of control in environmental care. As an example, </span><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="2584" instrument_node="">Fielding and Head (2012)</span></a><span data-dcnode-id="2582" instrument_node=""> found that, among Australians aged 18–24&nbsp;years, a view that ‘governments are responsible for protecting the environment’ related significantly to lower levels of pro-environmental behavior. A similar (but not significant) relationship was apparent for 12–17-year-old’s (</span><a data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="2581" instrument_node="">Fielding and Head, 2012</span></a><span data-dcnode-id="2579" instrument_node="">). This poses an interesting contrast for researchers of the </span><em data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">School Strike.</span></em><span data-dcnode-id="2576" instrument_node=""> While the refocus to the state does not equate to faith in political institutions to solve the climate crisis (</span><a data-dcnode-id="2574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="2575" instrument_node="">de Moor et al., 2020a</span></a><span data-dcnode-id="2573" instrument_node="">) there exists an opportunity here to build on existing findings where youth are imploring governments to take greater responsibility for environmental management.</span></p><p class="mb0" data-dcnode-id="2552"><span data-dcnode-id="2571" instrument_node="">Research with participants of this fast growing movement, however, can be challenging, and few studies have been able to engage directly with young people to explore how and why the </span><em data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">School Strike</span></em><span data-dcnode-id="2568" instrument_node=""> movement has become what we see today. Sources such as editorials, speeches, interviews and other public domain material from youth </span><em data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Strike</span></em><span data-dcnode-id="2565" instrument_node=""> participants have been used to explore narratives in </span><em data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">School Strike</span></em><span data-dcnode-id="2562" instrument_node=""> discourse, particularly that of influential Greta Thunberg (</span><a data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="2561" instrument_node="">Han and Ahn, 2020</span></a><span data-dcnode-id="2559" instrument_node="">). Similarly, for example, letters written by United States students to the office of the President demanding climate action have also been used to explore the movement (</span><a data-dcnode-id="2557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="2558" instrument_node="">Zummo et al., 2020</span></a><span data-dcnode-id="2556" instrument_node="">). Broadly, three key themes emerged from the writings: solution-oriented discourse, which included positive affirmations of community and government level climate mitigations; climate politics discourse, including advocacy for policy-based solutions and anti-capitalist themes; and discourse of doom, and the impacts of climate change on humans and animals (</span><a data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="2555" instrument_node="">Zummo et al., 2020</span></a><span data-dcnode-id="2553" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="2520"><span data-dcnode-id="2551" instrument_node="">Large scale surveys of climate strike participants (</span><a data-dcnode-id="2549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="2550" instrument_node="">Wahlström et al., 2019</span></a><span data-dcnode-id="2548" instrument_node="">; </span><a data-dcnode-id="2546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="2547" instrument_node="">de Moor et al., 2020b</span></a><span data-dcnode-id="2545" instrument_node="">) provide the most comprehensive investigations to date on young </span><em data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">Strike</span></em><span data-dcnode-id="2542" instrument_node=""> participants and their protest motivations. Specifically relevant to this study, </span><a data-dcnode-id="2540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="2541" instrument_node="">Collin et al. (2020)</span></a><span data-dcnode-id="2539" instrument_node=""> contribute to </span><a data-dcnode-id="2537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="2538" instrument_node="">de Moor et al. (2020b)</span></a><span data-dcnode-id="2536" instrument_node=""> by surveying participants at the Sydney, Australia, </span><em data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">School Strike</span></em><span data-dcnode-id="2533" instrument_node=""> in September 2019. Participants were invited to select (from a number of pre-set responses) what their motivations for participation were, where the most likely reported reason to attend was to pressure political institutions on climate change action (</span><a data-dcnode-id="2531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="2532" instrument_node="">Collin et al., 2020</span></a><span data-dcnode-id="2530" instrument_node="">). This was followed by expressions of solidarity with the movement, and social factors such as someone asking them to join were reported least likely. 10–15-year-old attendees in this study were asked to describe in their own words their reasons for attending (</span><a data-dcnode-id="2528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="2529" instrument_node="">Collin et al., 2020</span></a><span data-dcnode-id="2527" instrument_node="">): In addition to reporting sentiments of pressuring governments, they also worry about their futures, and this is consistent with other research in this area that has examined narratives of anxiety in the way young people discuss the </span><em data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">Climate Strike</span></em><span data-dcnode-id="2524" instrument_node=""> (</span><a data-dcnode-id="2522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="2523" instrument_node="">McKnight, 2020</span></a><span data-dcnode-id="2521" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="2515"><span data-dcnode-id="2519" instrument_node="">Further exploring young citizens motivations of </span><em data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">School Strike</span></em><span data-dcnode-id="2516" instrument_node=""> participation can help us to better understand how these intersections of climate change and political action converge for young citizens.</span></p><h3 class="pt0" data-dcnode-id="2510"><span data-dcnode-id="2514" instrument_node="">Youth Non-Attendance at a </span><em data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Strike</span></em><span data-dcnode-id="2511" instrument_node=""> Event</span></h3><p class="mb0" data-dcnode-id="2499"><span data-dcnode-id="2509" instrument_node="">Much </span><em data-dcnode-id="2507"><span data-dcnode-id="2508" instrument_node="">School Strike</span></em><span data-dcnode-id="2506" instrument_node=""> research to date has understandably centered on the motivators for student participation. However, non-participation at an event does not necessarily signify a non-engaged or apathetic student. Active non-participation in political activity (such as abstaining, or boycotting an event) is a distinct response from apathy or forced non-participation (</span><a data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="2505" instrument_node="">Harris et al., 2010</span></a><span data-dcnode-id="2503" instrument_node="">), and understanding this behavior is key to understanding the broader socio-cultural context surrounding the </span><em data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">School Strike</span></em><span data-dcnode-id="2500" instrument_node=""> movement.</span></p><p class="mb0" data-dcnode-id="2491"><span data-dcnode-id="2498" instrument_node="">Reasons for non-participation can in some cases be directly linked to reasons for participation. For example, </span><a data-dcnode-id="2496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="2497" instrument_node="">Klandermans and Van Stekelenburg, (2014)</span></a><span data-dcnode-id="2495" instrument_node=""> posit that non-participation can be the result of falling out of a protest mobilization potential pool. That is, despite sympathizing with a movement, some people may simply not be motivated to engage further, may not hear about an event, or simply be unable to attend (</span><a data-dcnode-id="2493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="2494" instrument_node="">Klandermans and Van Stekelenburg, 2014</span></a><span data-dcnode-id="2492" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="2480"><span data-dcnode-id="2490" instrument_node="">Efficacy (or a lack thereof) can also be key to non-participation (</span><a data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="2489" instrument_node="">van Stekelenburg and Klandermans, 2013</span></a><span data-dcnode-id="2487" instrument_node="">), and this can include the perceived effectiveness of the protest event itself. Perceived effectiveness here refers to a wide range of outcomes, from capacity to influence political process through to achievement of specific demands or goals of a protest group (</span><a data-dcnode-id="2485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="2486" instrument_node="">Hornsey et al., 2006</span></a><span data-dcnode-id="2484" instrument_node="">). </span><a data-dcnode-id="2482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="2483" instrument_node="">Hornsey at al. (2006)</span></a><span data-dcnode-id="2481" instrument_node=""> further propose that perceived effectiveness of a movement may also incorporate broader societal or individual goals, including recruitment of more participants to a cause, influencing third parties (outside of the protestors and their oppositional group), and also to use the collective action as an avenue for expressing one’s personal values and feelings on an issue.</span></p><p class="mb0" data-dcnode-id="2463"><span data-dcnode-id="2479" instrument_node="">Often, understanding of non-participation is inferred via research of protest attendees and their motivations to participate, rather than direct exploration of non-participation as an active choice. </span><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="2478" instrument_node="">Stuart et al. (2018)</span></a><span data-dcnode-id="2476" instrument_node=""> present an exception to this participant-focused bias, surveying 112 Australians (mean age 32) that were sympathetic to a cause, but did not participate in collective action. In this study, the authors looked into “negative protester stereotypes, social incentives, identity performances, and autonomy needs, and the ways in which they inform social identity development and participative efficacy” (</span><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="2475" instrument_node="">Stuart et al., 2018</span></a><span data-dcnode-id="2473" instrument_node="">, p. 260). They found that “motivated inaction” (</span><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="2472" instrument_node="">Stuart et al., 2018</span></a><span data-dcnode-id="2470" instrument_node="">, p. 245) stemmed most commonly from: a misalignment between support for a cause but little support for methods of activism (such as protesting); rejection of being socially associated with extreme activists; concern about loss of autonomy and individual impact on individual efforts when becoming part of a larger group. These active reasons highlight that non-participation is not necessarily as simple as being the ‘opposite’ of participation (</span><a data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="2469" instrument_node="">Klandermans and Van Stekelenburg, 2014</span></a><span data-dcnode-id="2467" instrument_node="">), and other factors such as engagement with social norms (how likely your social environment is to enable or discourage participation) can also play a role in decisions to not participate in collective action (</span><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="2466" instrument_node="">Klandermans and Van Stekelenburg, 2014</span></a><span data-dcnode-id="2464" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="2446"><span data-dcnode-id="2462" instrument_node="">Aside from internal drivers of non-participation, barriers or reluctance to engage with activism such as the </span><em data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">School Strike</span></em><span data-dcnode-id="2459" instrument_node=""> may be reflective of the adult power in young people’s lives, including the political, educational and familial structures within which young people operate. Youth are often dismissed as inexperienced in adult-driven political systems, therefore unable to reliably engage with its structures (</span><a data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="2458" instrument_node="">Bessant, 2020</span></a><span data-dcnode-id="2456" instrument_node="">). Young people participating in the </span><em data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">School Strike</span></em><span data-dcnode-id="2453" instrument_node=""> movement are no different, heavily criticized on their inexperience with climate policy (</span><a data-dcnode-id="2451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="2452" instrument_node="">Feldman, 2020</span></a><span data-dcnode-id="2450" instrument_node="">) and therefore their ability to engage with issues brought about by the movement. It is no wonder, therefore, that young people are often pessimistic about their ability to make change in political systems, and can have low confidence in specific political repertoires such as protest events (</span><a data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="2449" instrument_node="">Manning and Ryan, 2004</span></a><span data-dcnode-id="2447" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="2417"><span data-dcnode-id="2445" instrument_node="">In general, Australian students see themselves as politically engaged, but have repeatedly reported low political self-efficacy (</span><a data-dcnode-id="2443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="2444" instrument_node="">Collin, 2008</span></a><span data-dcnode-id="2442" instrument_node="">). Since political efficacy can act as a strong predictor of civic action (</span><a data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="2441" instrument_node="">Solhaug, 2006</span></a><span data-dcnode-id="2439" instrument_node="">), exclusion from adult-dominated spaces may be contributing to their disengagement from movements such as the </span><em data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">School Strike</span></em><span data-dcnode-id="2436" instrument_node="">. One example of this exclusion is a lack of youth representation in government, which may lead to distrust and ultimately disengagement from the system (</span><a data-dcnode-id="2434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="2435" instrument_node="">Manning and Edwards, 2014</span></a><span data-dcnode-id="2433" instrument_node="">). </span><a data-dcnode-id="2431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="2432" instrument_node="">Manning and Ryan (2004)</span></a><span data-dcnode-id="2430" instrument_node=""> conducted an Australian study of 13–25-year-olds, through 755 surveys and a number of focus groups, reporting low efficacy in certain forms of political participation, including protesting. When asked what may increase this efficacy, young people reported that meaningful consultation with adults (through youth advisory councils and similar) would be a promising pathway to more meaningful and impactful engagement with polity (</span><a data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="2429" instrument_node="">Manning and Ryan, 2004</span></a><span data-dcnode-id="2427" instrument_node="">), suggesting that current access points for young people are lacking in impact. Given that political engagement and experience is still seen as a top-down transfer of knowledge from adults to youth (</span><a data-dcnode-id="2425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="2426" instrument_node="">Andersson, 2015</span></a><span data-dcnode-id="2424" instrument_node="">; </span><a data-dcnode-id="2422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="2423" instrument_node="">Feldman, 2020</span></a><span data-dcnode-id="2421" instrument_node="">), this exclusion from climate politics may be pushing young people away from engaging with the </span><em data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">School Strike</span></em><span data-dcnode-id="2418" instrument_node="">.</span></p><p class="mb0" data-dcnode-id="2406"><span data-dcnode-id="2416" instrument_node="">Other adult influences may include those of parents and families, as parents play a considerable role in the socialization of young people (</span><a data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="2415" instrument_node="">Dalton, 1982</span></a><span data-dcnode-id="2413" instrument_node="">). Practical barriers such as transport to an event or not hearing of an event may also play into non-participation (</span><a data-dcnode-id="2411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="2412" instrument_node="">van Stekelenburg and Klandermans, 2013</span></a><span data-dcnode-id="2410" instrument_node="">) and this may especially be the case where teenagers rely strongly on parents to help them with transportation. Finally, school communities are also administered by adults in positions of power. Young people may also be disengaging in favor of other priorities, such as work or school life (</span><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="2409" instrument_node="">Harris et al., 2010</span></a><span data-dcnode-id="2407" instrument_node="">), and these too may be a reflection of other structural pressures on their lives.</span></p><p class="mb0" data-dcnode-id="2392"><span data-dcnode-id="2405" instrument_node="">While large numbers of global students have been turning out for </span><em data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">School Strike</span></em><span data-dcnode-id="2402" instrument_node=""> events, studies focusing on participants may miss the critical barriers or decision making that results in non-participation, an equally crucial part of the </span><em data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">School Strike</span></em><span data-dcnode-id="2399" instrument_node=""> or broader youth activism narrative. As outlined by this literature, while there are similarities in reasons for both attendance and non-attendance, one is not a direct reflection of the other (see also </span><a data-dcnode-id="2397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="2398" instrument_node="">Klandermans and Van Stekelenburg, 2014</span></a><span data-dcnode-id="2396" instrument_node="">). This research contributes the first exploratory research into why young Australians may deliberately not be participating in a </span><em data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">School Strike</span></em><span data-dcnode-id="2393" instrument_node=""> event.</span></p><a class="reset-hash-position" data-dcnode-id="2391" id="h3" name="h3"></a><h2 data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">Methods</span></h2><h3 class="pt0" data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">Study Context and Theoretical Approach</span></h3><p class="mb0" data-dcnode-id="2373"><span data-dcnode-id="2386" instrument_node="">The data presented here is part of a broader, exploratory mixed methods study comprising a fully-online survey, and series of online and offline focus groups, to explore motivators that determine participation and abstention from </span><em data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">School Strike</span></em><span data-dcnode-id="2383" instrument_node=""> events. As a theoretical basis, the study used an explanatory sequential design method (</span><a data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="2382" instrument_node="">Ivankova et al., 2006</span></a><span data-dcnode-id="2380" instrument_node="">) by first deploying a quantitative survey and then delving deeper into emerging themes via a series of focus groups. Here, we qualitatively explore a sub-section of each of these methods, specifically open-ended questions from the survey and focus groups to the effect of </span><em data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">“Why did you participate (or not participate) in a School Strike event?”</span></em><span data-dcnode-id="2377" instrument_node=""> (</span><a data-dcnode-id="2375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="2376" instrument_node="">Table 1</span></a><span data-dcnode-id="2374" instrument_node="">).</span></p><div class="DottedLine" data-dcnode-id="2372"></div><div class="Imageheaders" data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">TABLE 1</span></div><div class="FigureDesc" data-dcnode-id="2363"><a data-dcnode-id="2368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/662687/fpos-03-662687-HTML-r1/image_m/fpos-03-662687-t001.jpg" name="Table1" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="2369" id="T1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/662687/fpos-03-662687-HTML-r1/image_t/fpos-03-662687-t001.gif&amp;raw"></a><p data-dcnode-id="2364"><strong data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">TABLE 1</span></strong><span data-dcnode-id="2365" instrument_node="">. Prompts given in each stage of data collection.</span></p></div><div class="clear" data-dcnode-id="2362"></div><div class="DottedLine" data-dcnode-id="2361"></div><p class="mb0" data-dcnode-id="2335"><span data-dcnode-id="2360" instrument_node="">The primary target group for this study was Australian pre-voters. Young people have been described in literature in a variety of ways, but categories such as ‘young adult’ or ‘child’ are not “natural objects or categories” (</span><a data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="2359" instrument_node="">Bessant, 2020</span></a><span data-dcnode-id="2357" instrument_node="">, p. 225). These various descriptions have included: pragmatic approaches, related to the organisation of a persons’ schooling or welfare (</span><a data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B74"><span data-dcnode-id="2356" instrument_node="">Mizen, 2004</span></a><span data-dcnode-id="2354" instrument_node="">; as cited in </span><a data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="2353" instrument_node="">Collin, 2015</span></a><span data-dcnode-id="2351" instrument_node="">); developmental stages (</span><a data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="2350" instrument_node="">Nilan et al., 2007</span></a><span data-dcnode-id="2348" instrument_node="">); or simply an age group, such as between age 14 and 25 (see, for example, </span><a data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="2347" instrument_node="">Collin, 2008</span></a><span data-dcnode-id="2345" instrument_node="">). </span><a data-dcnode-id="2343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="2344" instrument_node="">Manning and Edwards (2014)</span></a><span data-dcnode-id="2342" instrument_node=""> note that young people occupy a grey area between child and adult, and the attendees of the </span><em data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">School Strike</span></em><span data-dcnode-id="2339" instrument_node=""> movement certainly fall into this area. Therefore, this study focuses on the ‘pre-voting citizen’, ‘pre-voter’ or “pre-citizen” (</span><a data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="2338" instrument_node="">Harris et al., 2007</span></a><span data-dcnode-id="2336" instrument_node="">, p. 19) as a way of capturing late-teens that are approaching the age in which they become democratic citizens in the country of the study, Australia. This narrows the pool of participants to roughly 16–19-year-old’s, without linking them directly to a developmental or education level boundaries that can be exclusionary in studies concerning youth political participation.</span></p><h3 class="pt0" data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Survey Methods</span></h3><p class="mb0" data-dcnode-id="2322"><span data-dcnode-id="2332" instrument_node="">As the responses explored here are part of a broader study exploring factors that influence participation in the </span><em data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">School Strike</span></em><span data-dcnode-id="2329" instrument_node=""> movement, the survey was first run as a pilot with undergraduate university students in February of 2020. The primary purpose of the pilot study was to ensure clarity in the survey instrument, as this stage can help to refine both content and procedures of the broader study (</span><a data-dcnode-id="2327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="2328" instrument_node="">Yin, 2003</span></a><span data-dcnode-id="2326" instrument_node="">). Target participants at this stage were undergraduate students of the author’s university, Australian National University, as geographic proximity and access can play a large role in selection of the pilot case (</span><a data-dcnode-id="2324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="2325" instrument_node="">Yin, 2003</span></a><span data-dcnode-id="2323" instrument_node="">). For ethical considerations, all pilot participants were over the age of 18 (the age of consent in Australia), with the majority in either their first or second year of university studies. Participants were recruited via first year lectures, as well as online calls-for-participants on an unofficial student Facebook group.</span></p><p class="mb0" data-dcnode-id="2314"><span data-dcnode-id="2321" instrument_node="">Following the pilot, larger studies in this area have had success engaging participants via schools (see, for example, </span><a data-dcnode-id="2319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="2320" instrument_node="">Brügger et al., 2020</span></a><span data-dcnode-id="2318" instrument_node="">; </span><a data-dcnode-id="2316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="2317" instrument_node="">Harker-Schuch et al., 2020</span></a><span data-dcnode-id="2315" instrument_node="">). For this study, several jurisdictions were approached to access public schools for survey and focus group participation, with application processes spanning from mid-2019 to early-2020. However, by early-2020, the COVID-19 pandemic saw schools across the world either closing or under excessive outside pressures. It was then deemed ethically inappropriate to continue engaging schools and Education Departments to participate in the study, and recruitment was shifted fully online.</span></p><p class="mb0" data-dcnode-id="2294"><span data-dcnode-id="2313" instrument_node="">Calls for participants were placed on Twitter and Facebook, targeting demographics specific to the study through purposive sampling (see </span><a data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="2312" instrument_node="">Flick, 2018</span></a><span data-dcnode-id="2310" instrument_node="">). As purposive sampling targets groups or individuals with sufficient knowledge of the topic (</span><a data-dcnode-id="2308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2309" instrument_node="">Etikan et al., 2016</span></a><span data-dcnode-id="2307" instrument_node="">), it was deemed appropriate to target teenagers and non-voters through a number Facebook groups and pages where knowledge of the </span><em data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">School Strike</span></em><span data-dcnode-id="2304" instrument_node=""> movement was likely. These targeted groups and pages included: undergraduate university student groups; climate change and </span><em data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">School Strike</span></em><span data-dcnode-id="2301" instrument_node=""> groups; a range of political groups, such as those aligned with left/progressive, centrist, and right wing political stances; and parenting or home schooling groups, with a request for parents to pass on the survey to their high-school aged teenagers. These demographics were chosen as having the closest alignment with young people who have heard of the </span><em data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">School Strike</span></em><span data-dcnode-id="2298" instrument_node=""> movement, and made decisions to attend or not attend an event. Due to the purposeful nature of this sampling, the data presented is likely to exclude those that are not politically or environmentally engaged in some manner. This reflects a similar approach to other studies that have focused on participation and non-participation among sympathizers of a cause, rather than a random general population sample (see </span><a data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="2297" instrument_node="">Stuart et al., 2018</span></a><span data-dcnode-id="2295" instrument_node="">).</span></p><p class="mb0" data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">The survey opened with the following questions:</span></p><p data-dcnode-id="2287" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="2291" instrument_node=""> 1. Have you heard about the </span><em data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">School Strike 4 Climate</span></em><span data-dcnode-id="2288" instrument_node="">?</span></p><p data-dcnode-id="2282" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="2286" instrument_node=""> 2. Have you attended a </span><em data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">School Strike 4 Climate</span></em><span data-dcnode-id="2283" instrument_node=""> event? (If yes, how many)</span></p><p data-dcnode-id="2277" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="2281" instrument_node=""> 3. What was your main reason for attending/not attending a </span><em data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">School Strike 4 Climate</span></em><span data-dcnode-id="2278" instrument_node=""> event?</span></p><p class="mb0" data-dcnode-id="2269"><span data-dcnode-id="2276" instrument_node="">The key to these questions is the deliberately open nature of question three (3). Open questions have a number of benefits over closed responses, such as avoiding closed question alternatives influencing the respondent’s description of their thoughts (</span><a data-dcnode-id="2274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B69"><span data-dcnode-id="2275" instrument_node="">Schuman and Presser, 1979</span></a><span data-dcnode-id="2273" instrument_node="">). They can also form a basis for further targeted lines of questioning by capturing a full range of possible responses (</span><a data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B70"><span data-dcnode-id="2272" instrument_node="">Singer and Couper, 2017</span></a><span data-dcnode-id="2270" instrument_node="">). Given this research is exploratory, these results may in future serve to form the basis for more closed survey responses, but in this instance the open format was more appropriate than closed.</span></p><p class="mb0" data-dcnode-id="2264"><span data-dcnode-id="2268" instrument_node="">These questions remained unchanged between the pilot study and full scale survey, and hence data from pilot responses to these questions are also included in the analysis here. </span><a data-dcnode-id="2266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="2267" instrument_node="">Table 2</span></a><span data-dcnode-id="2265" instrument_node=""> shows the only differences between the data sets used here, where the full-scale study included a broader range of demographics information.</span></p><div class="DottedLine" data-dcnode-id="2263"></div><div class="Imageheaders" data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">TABLE 2</span></div><div class="FigureDesc" data-dcnode-id="2254"><a data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/662687/fpos-03-662687-HTML-r1/image_m/fpos-03-662687-t002.jpg" name="Table2" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="2260" id="T2" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/662687/fpos-03-662687-HTML-r1/image_t/fpos-03-662687-t002.gif&amp;raw"></a><p data-dcnode-id="2255"><strong data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">TABLE 2</span></strong><span data-dcnode-id="2256" instrument_node="">. Difference in demographics information collected at pilot and full-scale stages of survey deployment.</span></p></div><div class="clear" data-dcnode-id="2253"></div><div class="DottedLine" data-dcnode-id="2252"></div><h3 class="pt0" data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">Focus Group Methods</span></h3><p class="mb0" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Six focus groups took place in total for this research, two as part of the pilot study, plus two online and two in person (at a senior high school) as part of the full-scale study. Significant changes were made to the overall instrument after the pilot. Hence, the data here is only from full deployment of the instrument, and the pilot data has been excluded.</span></p><p class="mb0" data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Distribution of the non-pilot survey included an option for respondents to indicate interest in participating in a follow up focus group. All respondents that left a contact email address were contacted with sign up information for focus groups, however none attended a focus group. Despite this, two focus group participants disclosed that they also participated in the survey portion of this research, though they were not recruited to focus groups through the survey itself.</span></p><p class="mb0" data-dcnode-id="2241"><span data-dcnode-id="2245" instrument_node="">All participants that attended an online focus group were recruited directly through social media or were referred by someone in their network. This study also used purposive sampling (</span><a data-dcnode-id="2243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="2244" instrument_node="">Flick, 2018</span></a><span data-dcnode-id="2242" instrument_node="">) to recruit participants. Similar to the survey, teenagers of school age were specifically targeted to participate in the study.</span></p><p class="mb0" data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">To this end, schools were approached to participate in the study, as this stage of the research occurred after schools had returned to on-campus teaching in the Australian Capital Territory, Australia. Hence, two focus groups took place at a non-government secondary school in Canberra, Australia. The school was one of several cold-called institutions, and the author had no prior affiliation with the school. Students from across multiple year levels indicated that they knew one another, but were not in the one social circle.</span></p><p class="mb0" data-dcnode-id="2225"><span data-dcnode-id="2238" instrument_node="">Across all focus groups, participants were categorized as part of a “primary selection” (</span><a data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B73"><span data-dcnode-id="2237" instrument_node="">Morse, 1998</span></a><span data-dcnode-id="2235" instrument_node="">, p. 73, as cited in </span><a data-dcnode-id="2233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="2234" instrument_node="">Flick, 2018</span></a><span data-dcnode-id="2232" instrument_node="">) process. That is, each participant was knowledgeable about the topics, able to articulate their thoughts and reflections, and had time and willingness to participate in the study (</span><a data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B73"><span data-dcnode-id="2231" instrument_node="">Morse, 1998</span></a><span data-dcnode-id="2229" instrument_node="">, as cited in </span><a data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="2228" instrument_node="">Flick, 2018</span></a><span data-dcnode-id="2226" instrument_node="">). Therefore all participants were integrated into the final analysis.</span></p><p class="mb0" data-dcnode-id="2217"><span data-dcnode-id="2224" instrument_node="">Overall, focus groups ran for between 60 and 90&nbsp;min, and were audio and video recorded. Transcriptions of focus groups were created by a combination of manual transcription and through use of Otter.AI, an artificial intelligence and machine learning software for automatically transcribing audio (</span><a data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="2223" instrument_node="">About Otter, 2021</span></a><span data-dcnode-id="2221" instrument_node="">). Participants were able to choose their own pseudonyms for the discussions, and these are reflected in the transcripts. Questions examined here are sub-sections of the full focus group discussions, focusing only on conversation generated by the specific prompts in </span><a data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="2220" instrument_node="">Table 1</span></a><span data-dcnode-id="2218" instrument_node="">.</span></p><p class="mb0" data-dcnode-id="2197"><span data-dcnode-id="2216" instrument_node="">In addition to asking participants to reflect on their own motivators for attending a </span><em data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Strike</span></em><span data-dcnode-id="2213" instrument_node=""> event, participants were also asked to reflect on why others may be attending. This style of projective questioning, or “Most People Projective Questions” (</span><a data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="2212" instrument_node="">Ostapczuk and Musch, 2011</span></a><span data-dcnode-id="2210" instrument_node="">, p. 399), is used in cases where participants may be hesitant to share their own feelings on a topic, where those feelings might be perceived as undesirable by others (</span><a data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="2209" instrument_node="">Ostapczuk and Musch, 2011</span></a><span data-dcnode-id="2207" instrument_node="">). Given that the target age group of 16–19-year-old’s can be influenced by peers in their behaviors and beliefs (see, for example, </span><a data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B65"><span data-dcnode-id="2206" instrument_node="">Gaviria and Raphael, 2001</span></a><span data-dcnode-id="2204" instrument_node="">) and environmental behaviors (</span><a data-dcnode-id="2202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="2203" instrument_node="">Duarte et al., 2017</span></a><span data-dcnode-id="2201" instrument_node="">), this style of questioning allows participants the freedom to explore responses to questions without the vulnerability of sharing their own inner feelings. This style of projection questioning also ensured that those who had not attended a </span><em data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Strike</span></em><span data-dcnode-id="2198" instrument_node=""> (or vice versa) were given a place to contribute their context without having personal experience.</span></p><p class="mb0" data-dcnode-id="2186"><span data-dcnode-id="2196" instrument_node="">Despite these measures, students participating in on-campus focus groups were nominated by teaching staff to participate, and these students were largely associated with the campus environment collective. Therefore, there may be present an element of social desirability bias (see </span><a data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="2195" instrument_node="">Krumpal, 2013</span></a><span data-dcnode-id="2193" instrument_node="">) in the way in which students responded to focus group questions, particularly with respect to reasons for non-participation. The full range of on-campus perspectives on </span><em data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">School Strike</span></em><span data-dcnode-id="2190" instrument_node=""> participation and non-participation may also be limited by the selected students, as environment collective members are likely to be already engaged in pro-environmental behaviors and may be over representing this viewpoint. Similarly, five of the online focus group participants disclosed some measure of close involvement with </span><em data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">School Strike 4 Climate</span></em><span data-dcnode-id="2187" instrument_node=""> events, also suggesting an over representation of environmentally engaged participants in online focus groups.</span></p><h3 class="pt0" data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Data Refinement</span></h3><p class="mb0" data-dcnode-id="2152"><span data-dcnode-id="2183" instrument_node="">In total, 107 responses were recorded for the pilot survey. Of these, 66 responses were excluded from the analysis, resulting in an analyzed pilot sample of 41 responses. These exclusions included any respondents that: were incomplete (</span><em data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">n</span></em><span data-dcnode-id="2180" instrument_node=""> = 28); did not specify an age or university level (</span><em data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">n</span></em><span data-dcnode-id="2177" instrument_node=""> = 8); specified an age over 19 years, but did not specify first or second year of university (</span><em data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">n</span></em><span data-dcnode-id="2174" instrument_node=""> = 29); were under the age of 18 (</span><em data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">n</span></em><span data-dcnode-id="2171" instrument_node=""> = 1). Respondents that specified they were over 19 years of age but still in first (</span><em data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">n</span></em><span data-dcnode-id="2168" instrument_node=""> = 2) or second year of university (</span><em data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">n</span></em><span data-dcnode-id="2165" instrument_node=""> = 9) were included in the analysis, as was one respondent that specified second year university but no age (</span><em data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">n</span></em><span data-dcnode-id="2162" instrument_node=""> = 1). These inclusions were on the basis that both teenagers at school and young adults at university are both within the category of “emerging adult” (</span><a data-dcnode-id="2160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="2161" instrument_node="">Furlong, 2017</span></a><span data-dcnode-id="2159" instrument_node="">, p.36), and the common experience of early university years situates them at the same point in social development and career trajectory (for more on milestones in emerging adulthood, see </span><a data-dcnode-id="2157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="2158" instrument_node="">Furlong, 2017</span></a><span data-dcnode-id="2156" instrument_node="">). All other respondents that specified age 18 or 19 were included (</span><em data-dcnode-id="2154"><span data-dcnode-id="2155" instrument_node="">n</span></em><span data-dcnode-id="2153" instrument_node=""> = 29).</span></p><p class="mb0" data-dcnode-id="2132"><span data-dcnode-id="2151" instrument_node="">In the full survey deployment, 248 survey responses were gathered. Of these, any surveys with less than 10% completion were immediately excluded (</span><em data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">n</span></em><span data-dcnode-id="2148" instrument_node=""> = 77), as not enough information was gathered from these respondents to determine their demographics. Any respondents that did not agree to the conditions and terms of the study were also excluded (</span><em data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">n</span></em><span data-dcnode-id="2145" instrument_node=""> = 2). Voting in Australia is compulsory for those 18&nbsp;years and over at the time of an election. Therefore, respondents that declared they had voted in a federal Australian election were also excluded (</span><em data-dcnode-id="2143"><span data-dcnode-id="2144" instrument_node="">n</span></em><span data-dcnode-id="2142" instrument_node=""> = 32), as the study focused primarily on the category of pre-voting teenagers, or those that had not formally engaged with civic activity such as compulsory voting. Any respondents that were under the age of 16 (</span><em data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">n</span></em><span data-dcnode-id="2139" instrument_node=""> = 4) were also excluded from the analysis due to ethical considerations of consent, as were those that did not specify an age </span><em data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">and</span></em><span data-dcnode-id="2136" instrument_node=""> indicated they had not yet voted (</span><em data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">n</span></em><span data-dcnode-id="2133" instrument_node=""> = 2), given that there is no way of knowing if these respondents were over 16-years-old.</span></p><p class="mb0" data-dcnode-id="2124"><span data-dcnode-id="2131" instrument_node="">Overall, analysis was done with 16–19 + year olds that had not voted in an Australian federal election, with the exception of some pilot respondents (</span><em data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">n</span></em><span data-dcnode-id="2128" instrument_node=""> = 11) whom specified early university education level, but who’s voting history is unknown, as previously mentioned. Of the total 354 recorded responses, 172 were included for analysis, and the full description of these responses can be found in </span><a data-dcnode-id="2126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="2127" instrument_node="">Table 3</span></a><span data-dcnode-id="2125" instrument_node="">.</span></p><div class="DottedLine" data-dcnode-id="2123"></div><div class="Imageheaders" data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">TABLE 3</span></div><div class="FigureDesc" data-dcnode-id="2114"><a data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/662687/fpos-03-662687-HTML-r1/image_m/fpos-03-662687-t003.jpg" name="Table3" target="_blank"><img alt="www.frontiersin.org" data-dcnode-id="2120" id="T3" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/662687/fpos-03-662687-HTML-r1/image_t/fpos-03-662687-t003.gif&amp;raw"></a><p data-dcnode-id="2115"><strong data-dcnode-id="2117"><span data-dcnode-id="2118" instrument_node="">TABLE 3</span></strong><span data-dcnode-id="2116" instrument_node="">. Full overview of study respondents by demographic information, voting status, and whether they have attended a School Strike.</span></p></div><div class="clear" data-dcnode-id="2113"></div><div class="DottedLine" data-dcnode-id="2112"></div><p class="mb0" data-dcnode-id="2110"><span data-dcnode-id="2111" instrument_node="">Focus group data were limited to sections of transcripts specifically focusing on responses to the following prompts:</span></p><p data-dcnode-id="2106" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="2109" instrument_node="">• </span><em data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">Why do you think that people go to a School Strike for Climate event?</span></em></p><p data-dcnode-id="2102" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="2105" instrument_node="">• </span><em data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Why do you think people do not go to a School Strike for Climate event?</span></em></p><p data-dcnode-id="2098" style="margin-left: 2em;text-indent:-0.7em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="2101" instrument_node="">• </span><em data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">It has been reported via various media that students only attend in order to get a day off school. Could you reflect on that comment? What do you think of this?</span></em></p><p class="mb0" data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Students in the pilot study were predominantly from the Australian National University in Canberra, thus despite their geographic information not being collected, they have been coded as Australian Capital Territory (where the campus is located) st
