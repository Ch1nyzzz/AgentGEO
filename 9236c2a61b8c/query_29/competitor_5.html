</span><h2 data-dcnode-id="5441"><a data-dcnode-id="5443" id="a1"></a><span data-dcnode-id="5442" instrument_node="">Overview of the study</span></h2><span data-dcnode-id="5440" instrument_node="">
</span><p data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">This  study provides new information on the political participation of youth aged 15 to  24&nbsp;years. It examines the likelihood of voting in the next federal election  (as reported in 2013) and participation in the previous election, as well as participation  in non-electoral political activities, such as signing petitions or  participating in demonstrations or public meetings. The study also provides information  on the degree of civic engagement of youth, which is often perceived as a key  indicator of social capital.</span></p><span data-dcnode-id="5437" instrument_node="">
</span><ul data-dcnode-id="5420"><span data-dcnode-id="5436" instrument_node=""> </span><li data-dcnode-id="5434"><span data-dcnode-id="5435" instrument_node=""> In       2013, 47% of youth aged 15 to 19 and 61% of youth aged 20 to 24 indicated that       they were very likely to vote in the next federal election. This compared with       84% of seniors aged 65 to 74.</span></li><span data-dcnode-id="5433" instrument_node=""> </span><li data-dcnode-id="5431"><span data-dcnode-id="5432" instrument_node=""> In       2013, just over one-half of youth aged 15 to 19 and 20 to 24 indicated that       they were at least somewhat interested in politics, compared with       three-quarters of seniors aged 65 to 74.</span></li><span data-dcnode-id="5430" instrument_node=""> </span><li data-dcnode-id="5428"><span data-dcnode-id="5429" instrument_node=""> Among       youth aged 15 to 19 who reported that they were not very or not at all       interested in politics, 25% were very likely to vote in the next election,       compared with 63% of seniors aged 65 to 74 who had the same level of interest       in politics.</span></li><span data-dcnode-id="5427" instrument_node=""> </span><li data-dcnode-id="5425"><span data-dcnode-id="5426" instrument_node=""> Younger       people were more likely than older people to participate in non-electoral civic       and political activities. For example, 26% of youth aged 15 to 19 and 35% of       youth aged 20 to 24 signed a petition in the 12&nbsp;months prior to the survey,       compared with 22% of seniors aged 65 to 74.</span></li><span data-dcnode-id="5424" instrument_node=""> </span><li data-dcnode-id="5422"><span data-dcnode-id="5423" instrument_node=""> The       proportion of “politically inactive” persons, defined as those who did not participate       in non-electoral political activities and who were not very likely to vote in       the next election, was 32% among youth aged 15 to 19 and 26% among youth       aged 20 to 24, compared with 12% among seniors aged 65 to 74.</span></li><span data-dcnode-id="5421" instrument_node=""> </span></ul><span data-dcnode-id="5419" instrument_node="">
</span><p class="wb-invisible" data-dcnode-id="5417"><span data-dcnode-id="5418" instrument_node="">End of text box</span></p><span data-dcnode-id="5416" instrument_node="">
</span></div><span data-dcnode-id="5414" instrument_node="">
</span><h2 data-dcnode-id="5411"><a data-dcnode-id="5413" id="a2"></a><span data-dcnode-id="5412" instrument_node="">Introduction</span></h2><span data-dcnode-id="5410" instrument_node="">
</span><p data-dcnode-id="5397"><span data-dcnode-id="5409" instrument_node="">The decline in voter turnout among youth in
  Canada and other parts of the world has received considerable attention in
  recent years.</span><sup data-dcnode-id="5404" id="n1-refa"><a class="footnote-link" data-dcnode-id="5405" href="#n1"><span class="wb-invisible" data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="5406" instrument_node="">1</span></a></sup><span data-dcnode-id="5403" instrument_node=""> It has been shown
  that the general decline in voter turnout is largely the result of a decrease
  in the voter turnout of youth.</span><sup data-dcnode-id="5398" id="n2-refa"><a class="footnote-link" data-dcnode-id="5399" href="#n2"><span class="wb-invisible" data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="5400" instrument_node="">2</span></a></sup></p><span data-dcnode-id="5396" instrument_node="">
</span><p data-dcnode-id="5388"><span data-dcnode-id="5395" instrument_node="">Exercising the right to vote, although very
  important in a democracy, is not the only form of political participation or
  civic engagement. Some authors have pointed out that low voter turnout among
  Canadian youth should not necessarily be considered a sign of voter apathy.</span><sup data-dcnode-id="5390" id="n3-refa"><a class="footnote-link" data-dcnode-id="5391" href="#n3"><span class="wb-invisible" data-dcnode-id="5393"><span data-dcnode-id="5394" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="5392" instrument_node="">3</span></a></sup><span data-dcnode-id="5389" instrument_node=""> In fact, the
  relatively low turnout may be masking many other types of engagement—both
  political and civic.</span></p><span data-dcnode-id="5387" instrument_node="">
</span><p data-dcnode-id="5385"><span data-dcnode-id="5386" instrument_node="">This article explores the various forms of
  political and civic engagement of Canadian youth aged 15 to 24.</span></p><span data-dcnode-id="5384" instrument_node="">
</span><p data-dcnode-id="5377"><span data-dcnode-id="5383" instrument_node="">First, the article examines voter turnout
  among youth in the last federal election (in 2011) and whether they intended to
  vote in the next federal election (as  of 2013). Voter turnout among youth remains a
  concern as democracy depends on the principles of universality and equality of
  votes. Furthermore, according to some political scientists, the interests of
  population groups whose voter turnout is lower, such as youth and persons with
  a lower socioeconomic status, may not be as well-represented or taken into
  account by elected governments.</span><sup data-dcnode-id="5378" id="n4-refa"><a class="footnote-link" data-dcnode-id="5379" href="#n4"><span class="wb-invisible" data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="5380" instrument_node="">4</span></a></sup></p><span data-dcnode-id="5376" instrument_node="">
</span><p data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">Second, the article provides information on
  various political activities other than voting, such as expressing views on the
  Internet, signing petitions, and participating in marches and demonstrations.</span></p><span data-dcnode-id="5373" instrument_node="">
</span><p data-dcnode-id="5366"><span data-dcnode-id="5372" instrument_node="">Lastly, information about the civic
  engagement of youth is presented, namely participation in groups, organizations
  or associations. These forms of social engagement are often motivated by
  reasons that are not political or social, such as interest in a sport or
  artistic endeavour. Nevertheless, civic engagement can have a social impact, for
  example, when direct assistance is provided to certain populations. As well, public
  participation in groups or organizations is known to have a positive impact on
  communities, in particular from a social capital development perspective.</span><sup data-dcnode-id="5367" id="n5-refa"><a class="footnote-link" data-dcnode-id="5368" href="#n5"><span class="wb-invisible" data-dcnode-id="5370"><span data-dcnode-id="5371" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="5369" instrument_node="">5</span></a></sup></p><span data-dcnode-id="5365" instrument_node="">
</span><p data-dcnode-id="5359"><span data-dcnode-id="5364" instrument_node="">The data originate from the 2013 General
  Social Survey (GSS) on Social Identity and the 2003 and 2008 GSS (see </span><em data-dcnode-id="5361"><a data-dcnode-id="5362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/source-eng.htm"><span data-dcnode-id="5363" instrument_node="">Data sources, methods and definitions</span></a></em><span data-dcnode-id="5360" instrument_node="">).</span></p><span data-dcnode-id="5358" instrument_node="">
</span><h2 data-dcnode-id="5355"><a data-dcnode-id="5357" id="a3"></a><span data-dcnode-id="5356" instrument_node="">Youth were the least likely to have voted in the last federal election in 2011</span></h2><span data-dcnode-id="5354" instrument_node="">
</span><p data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node="">In the 2013&nbsp;GSS, respondents were asked
  whether they had voted in the last federal election. Since that election was
  held in 2011, results can be presented for those who were aged 20 and over in 2013
  (and eligible to vote at the time of the election).</span></p><span data-dcnode-id="5351" instrument_node="">
</span><p data-dcnode-id="5337"><span data-dcnode-id="5350" instrument_node="">It has been shown that voter turnout, as
  measured in surveys, tends to be overestimated compared with the official
  rates.</span><sup data-dcnode-id="5345" id="n6-refa"><a class="footnote-link" data-dcnode-id="5346" href="#n6"><span class="wb-invisible" data-dcnode-id="5348"><span data-dcnode-id="5349" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="5347" instrument_node="">6</span></a></sup><span data-dcnode-id="5344" instrument_node=""> This was also true for
  the 2013&nbsp;GSS: among those who were eligible to vote in the last federal
  election, 81% reported having voted, compared with an official rate of 61%.</span><sup data-dcnode-id="5339" id="n7-refa"><a class="footnote-link" data-dcnode-id="5340" href="#n7"><span class="wb-invisible" data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="5341" instrument_node="">7</span></a></sup><span data-dcnode-id="5338" instrument_node=""> The GSS data,
  however, shows large differences in voting turnout by age group (Chart&nbsp;1), like other data sources. Specifically,
  60% of youth aged 20 to 24 who were eligible to vote reported having voted in
  the last federal election, while that number was over 92% among individuals
  aged 75 and over.</span></p><span data-dcnode-id="5336" instrument_node="">
</span><p data-dcnode-id="5334"><img alt="Chart 1 Participation in the last federal election and likelihood of voting in the next election, by age group, 2013" aria-describedby="desc01" data-dcnode-id="5335" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/c-g01-eng.gif&amp;raw"></p><span data-dcnode-id="5333" instrument_node="">
</span><p data-dcnode-id="5330" id="desc01"><a data-dcnode-id="5331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/desc/desc01-eng.htm"><span data-dcnode-id="5332" instrument_node="">Description for chart 1</span></a></p><span data-dcnode-id="5329" instrument_node="">
</span><p data-dcnode-id="5327"><span data-dcnode-id="5328" instrument_node="">Respondents were also asked in 2013 whether they
  intended to vote in the next federal election. Youth who were not eligible
  to vote in the 2011&nbsp;election but who are eligible in the October&nbsp;2015
  election were included in this analysis.</span></p><span data-dcnode-id="5326" instrument_node="">
</span><p data-dcnode-id="5324"><span data-dcnode-id="5325" instrument_node="">The prospect of being eligible to vote for
  the first time, however, did not seem to be associated with a higher intention
  to participate in the electoral process. Specifically, less than one-half of
  youth aged 15 to 19 (47%) indicated that they were very likely to vote in the
  next federal election. This proportion increased gradually among older age
  groups, peaking at 84% among seniors aged 65 to 74 (Chart&nbsp;1). The intention to vote in the next election
  then decreased slightly among older individuals, for whom health may sometimes
  represent a barrier to voting.</span></p><span data-dcnode-id="5323" instrument_node="">
</span><h2 data-dcnode-id="5320"><a data-dcnode-id="5322" id="a4"></a><span data-dcnode-id="5321" instrument_node="">Factors associated with voter turnout</span></h2><span data-dcnode-id="5319" instrument_node="">
</span><p data-dcnode-id="5312"><span data-dcnode-id="5318" instrument_node="">Various characteristics other than age are
  associated with voter turnout. Individuals who are more interested in politics,
  those who follow news and current affairs regularly and feel a strong sense of
  belonging to Canada are among the most likely to vote in federal elections.</span><sup data-dcnode-id="5313" id="n8-refa"><a class="footnote-link" data-dcnode-id="5314" href="#n8"><span class="wb-invisible" data-dcnode-id="5316"><span data-dcnode-id="5317" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="5315" instrument_node="">8</span></a></sup></p><span data-dcnode-id="5311" instrument_node="">
</span><p data-dcnode-id="5304"><span data-dcnode-id="5310" instrument_node="">Such characteristics, however, are less
  prevalent among youth. For example, 51% of youth aged 15 to 19 and 53% of youth
  aged 20 to 24 in 2013 reported being somewhat or very interested in politics, compared
  with 61% among those aged 35 to 44 and 75% of seniors aged 65 to 74 (Chart&nbsp;2).</span><sup data-dcnode-id="5305" id="n9-refa"><a class="footnote-link" data-dcnode-id="5306" href="#n9"><span class="wb-invisible" data-dcnode-id="5308"><span data-dcnode-id="5309" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="5307" instrument_node="">9</span></a></sup></p><span data-dcnode-id="5303" instrument_node="">
</span><p data-dcnode-id="5301"><img alt="Chart 2 Interest in politics, frequency of following news and current affairs, and sense of belonging to Canada, by age group, 2013" aria-describedby="desc02" data-dcnode-id="5302" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/c-g02-eng.gif&amp;raw"></p><span data-dcnode-id="5300" instrument_node="">
</span><p data-dcnode-id="5297" id="desc02"><a data-dcnode-id="5298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/desc/desc02-eng.htm"><span data-dcnode-id="5299" instrument_node="">Description for chart 2</span></a></p><span data-dcnode-id="5296" instrument_node="">
</span><p data-dcnode-id="5290"><span data-dcnode-id="5295" instrument_node="">The extent to which individuals follow the news
  and current affairs also varies by age. In 2013, 22% of youth aged 15 to 19
  said that they followed news or current affairs on a daily basis, a proportion that
  increased to 55% among individuals aged 35 to 44 and to 87% among those aged 75
  and over. Note that youth use information sources that are largely different
  from those used by older Canadians (see </span><em data-dcnode-id="5292"><a data-dcnode-id="5293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/you-jeu-eng.htm"><span data-dcnode-id="5294" instrument_node="">How do
    youth stay informed?</span></a></em><span data-dcnode-id="5291" instrument_node="">).</span></p><span data-dcnode-id="5289" instrument_node="">
</span><p data-dcnode-id="5287"><span data-dcnode-id="5288" instrument_node="">Older Canadians were also more likely than
  younger ones to express a very strong sense of belonging to Canada.</span></p><span data-dcnode-id="5286" instrument_node="">
</span><p data-dcnode-id="5278"><span data-dcnode-id="5285" instrument_node="">The differences between age groups for each
  of these factors may help to understand, in part, why youth were less likely to
  say that they intended to vote in the next election. When the three factors discussed
  above were taken into account in a multivariate model (along with other
  characteristics),</span><sup data-dcnode-id="5280" id="n10-refa"><a class="footnote-link" data-dcnode-id="5281" href="#n10"><span class="wb-invisible" data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="5282" instrument_node="">10</span></a></sup><span data-dcnode-id="5279" instrument_node=""> the differences
  between younger and older voters decreased.</span></p><span data-dcnode-id="5277" instrument_node="">
</span><p data-dcnode-id="5270"><span data-dcnode-id="5276" instrument_node="">For example, without control variables, the
  difference between youth aged 20 to 24 and individuals aged 65 to 74 was
  23&nbsp;percentage points (61% and 84%, respectively). When the other factors were taken into account, the
  difference decreased to 15&nbsp;percentage points (Table&nbsp;1).</span><sup data-dcnode-id="5271" id="n11-refa"><a class="footnote-link" data-dcnode-id="5272" href="#n11"><span class="wb-invisible" data-dcnode-id="5274"><span data-dcnode-id="5275" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="5273" instrument_node="">11</span></a></sup></p><span data-dcnode-id="5269" instrument_node="">

</span><p class="footnote-return" data-dcnode-id="3239"><a data-dcnode-id="3240" href="#T1n_1-refa"><span class="wb-invisible" data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Return to note&nbsp;</span></span><span data-dcnode-id="3243" instrument_node="">1</span><span class="wb-invisible" data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node=""> referrer</span></span></a></p><span data-dcnode-id="3238" instrument_node="">

</span><dd data-dcnode-id="3218" id="T1n_2"><span data-dcnode-id="3230" instrument_node="">
</span><p data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">The 25-to-34 age group is the reference category for analyzing the population aged 25&nbsp;and over.</span></p><span data-dcnode-id="3227" instrument_node="">
</span><p class="footnote-return" data-dcnode-id="3220"><a data-dcnode-id="3221" href="#T1n_2-refa"><span class="wb-invisible" data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">Return to note&nbsp;</span></span><span data-dcnode-id="3224" instrument_node="">2</span><span class="wb-invisible" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node=""> referrer</span></span></a></p><span data-dcnode-id="3219" instrument_node="">

</span></div><span data-dcnode-id="3213" instrument_node="">
</span><strong data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">Note:</span></strong><span data-dcnode-id="3210" instrument_node=""> The question on likelihood of voting in the next federal election was asked only of persons who will be 18&nbsp;or over in October&nbsp;2015.</span><br data-dcnode-id="3209"><span data-dcnode-id="3208" instrument_node="">
</span><strong data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">Source:</span></strong><span data-dcnode-id="3205" instrument_node=""> Statistics Canada, General Social Survey, 2013.
     </span></td></tr></tbody></table><span data-dcnode-id="3198" instrument_node="">
</span><p data-dcnode-id="3191"><span data-dcnode-id="3197" instrument_node="">The remaining difference means, however, that
  much of the gap between youth and other adults is the result of factors not
  measured by the survey. One of these factors may be the fact that youth are
  less likely than older adults to consider electoral participation as a civic
  duty. Civic values have been shown, in other studies, to be strongly linked to
  the probability of voting in elections.</span><sup data-dcnode-id="3192" id="n12-refa"><a class="footnote-link" data-dcnode-id="3193" href="#n12"><span class="wb-invisible" data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="3194" instrument_node="">12</span></a></sup></p><span data-dcnode-id="3190" instrument_node="">
</span><p data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">To a large extent, the various associations found
  between background factors and voting participation applied to younger
  individuals aged 15 to 24 and to those aged 25 and over (Table 1). For example,
  in both population groups (15 to 24 and 25 and older), a lower proportion of
  immigrants said that they were very likely to vote in the next election. </span></p><span data-dcnode-id="3187" instrument_node="">
</span><p data-dcnode-id="3180"><span data-dcnode-id="3186" instrument_node="">For other population groups, the story
  differed between younger and older voters. Among those aged 25 and over, Aboriginal
  people (65%) were less likely than non-Aboriginals (76%) to report that they were
  very likely to vote in the next election. Aboriginal youth aged 15 to 24,
  however, were as likely as non-Aboriginals of the same age to report that they were
  very likely to vote in the next election (55% in both cases). In 2011, the Aboriginal
  population represented approximately 6% of the total population of youth aged 15
  to 24, a proportion greater than for the overall population.</span><sup data-dcnode-id="3181" id="n13-refa"><a class="footnote-link" data-dcnode-id="3182" href="#n13"><span class="wb-invisible" data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="3183" instrument_node="">13</span></a></sup></p><span data-dcnode-id="3179" instrument_node="">
</span><p data-dcnode-id="3172"><span data-dcnode-id="3178" instrument_node="">Some factors, such as region of residence, were
  more likely to be associated with voter turnout among youth, but less so among individuals
  aged 25 and over. Among those aged 15 to 24, 64% of citizens living in Quebec were
  very likely to vote in the next election, compared with 54% in Ontario, 48%
  in Alberta and 34% in New&nbsp;Brunswick. Regional variations were smaller among
  those aged 25 and over.</span><sup data-dcnode-id="3173" id="n14-refa"><a class="footnote-link" data-dcnode-id="3174" href="#n14"><span class="wb-invisible" data-dcnode-id="3176"><span data-dcnode-id="3177" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="3175" instrument_node="">14</span></a></sup></p><span data-dcnode-id="3171" instrument_node="">
</span><p data-dcnode-id="3169"><span data-dcnode-id="3170" instrument_node="">The relationship between interest in politics
  and voting participation also varied between the two age groups. This is
  because the difference in voter turnout between those who were not very interested
  or not at all interested in politics and those who were very interested in
  politics was significantly larger among those aged 15 to 24.</span></p><span data-dcnode-id="3168" instrument_node="">
</span><p data-dcnode-id="3166"><span data-dcnode-id="3167" instrument_node="">Regardless of age, those who were the most
  interested in politics reported that they were very likely to vote in the next
  election, with percentages varying between 84% and 96% (Chart&nbsp;3). </span></p><span data-dcnode-id="3165" instrument_node="">
</span><p data-dcnode-id="3163"><img alt="Chart 3 Persons who reported that they were very likely to vote in the next federal election, by level of interest in politics and age group, 2013" aria-describedby="desc03" data-dcnode-id="3164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/c-g03-eng.gif&amp;raw"></p><span data-dcnode-id="3162" instrument_node="">
</span><p data-dcnode-id="3159" id="desc03"><a data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/desc/desc03-eng.htm"><span data-dcnode-id="3161" instrument_node="">Description for chart 3</span></a></p><span data-dcnode-id="3158" instrument_node="">
</span><p data-dcnode-id="3151"><span data-dcnode-id="3157" instrument_node="">The results, however, were quite different
  among those who were not very interested in politics. Specifically, among
  Canadians aged 15 to 19 who reported that they were not very or not at all
  interested, 25% were very likely to vote in the next election, while the corresponding
  proportion was 63% among Canadians aged 65 to 74. Such results were also
  confirmed by the multivariate models.</span><sup data-dcnode-id="3152" id="n15-refa"><a class="footnote-link" data-dcnode-id="3153" href="#n15"><span class="wb-invisible" data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="3154" instrument_node="">15</span></a></sup></p><span data-dcnode-id="3150" instrument_node="">
</span><h2 data-dcnode-id="3147"><a data-dcnode-id="3149" id="a5"></a><span data-dcnode-id="3148" instrument_node="">Reasons for not voting in the previous federal election</span></h2><span data-dcnode-id="3146" instrument_node="">
</span><p data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">Another way to understand voter turnout (or
  lack thereof) is to directly ask non-voters to provide a reason for not voting.
  Only persons aged 20 and over are included in this analysis in order to focus
  on those who were eligible to vote in 2011 but who did not exercise that right.</span></p><span data-dcnode-id="3143" instrument_node="">
</span><p data-dcnode-id="3135"><span data-dcnode-id="3142" instrument_node="">Among youth aged 20 to 24 who did not vote in
  the last federal election, 1&nbsp;in&nbsp;6 reported that it was because they
  were not informed on issues (17%). In comparison, this reason was given by 10% of
  non-voters aged 25 to 54 and only 3% of those aged 55 and over.</span><sup data-dcnode-id="3137" id="n16-refa"><a class="footnote-link" data-dcnode-id="3138" href="#n16"><span class="wb-invisible" data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="3139" instrument_node="">16</span></a></sup><span data-dcnode-id="3136" instrument_node=""> This result mirrors the
  lower level of interest of youth in politics, as well as their lower propensity
  to follow news and current affairs on a regular basis.</span></p><span data-dcnode-id="3134" instrument_node="">
</span><p data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">A second reason, which was given more
  commonly by non-voters aged 20 to 24, was that they were too busy (12%, compared
  with approximately 11% of non-voters aged 25 to 54 and 5% of those aged 55 and
  over). Younger non-voters were also relatively more likely to report work or
  school-schedule conflicts as a reason for not voting (8%) in comparison with
  those aged 55 and over (2%).</span></p><span data-dcnode-id="3131" instrument_node="">
</span><p data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">A relatively small portion of 20- to 24-year-olds
  said that they had not voted because they did not think their vote would affect
  the outcome (3%), at least in comparison with the 7% of non-voters aged 25 to 54
  and the 10% of those aged 55 and over who provided that reason. Lastly, the proportion
  of youth aged 20 to 24 who said that they did not like the candidates or
  campaign issues was almost two times lower than the proportion for persons aged
  55 and over who provided that reason (6% versus 11%, respectively).</span></p><span data-dcnode-id="3128" instrument_node="">
</span><h2 data-dcnode-id="3125"><a data-dcnode-id="3127" id="a6"></a><span data-dcnode-id="3126" instrument_node="">Non-electoral political activities</span></h2><span data-dcnode-id="3124" instrument_node="">
</span><p data-dcnode-id="3116"><span data-dcnode-id="3123" instrument_node="">The trends described
  above do not mean that youth are not interested in social and political issues.
  For example, an earlier Statistics Canada study based on data from the 2003&nbsp;GSS
  showed that Canadians aged 15 to 24 were as likely as their older counterparts─if
  not more likely─to take part in certain political activities, such as marches
  or demonstrations.</span><sup data-dcnode-id="3118" id="n17-refa"><a class="footnote-link" data-dcnode-id="3119" href="#n17"><span class="wb-invisible" data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="3120" instrument_node="">17</span></a></sup><span data-dcnode-id="3117" instrument_node=""> Did young people aged
  15 to 24 participate in such activities in 2013? And if so, how does this
  compare with 2003?</span></p><span data-dcnode-id="3115" instrument_node="">
</span><p data-dcnode-id="3108"><span data-dcnode-id="3114" instrument_node="">Between 2003 and 2013,
  the participation of youth aged 15 to 24 in non-electoral political activities
  remained relatively stable or, in some cases, decreased. For example, the proportion
  of youth who attended a public meeting declined by 5 percentage points, from 16%
  in 2003 to 11% in 2013 (Chart&nbsp;4). There
  was also a decline in the proportion of youth who took part in a
  demonstration or a march, and in the proportion of youth who expressed
  their views by contacting a newspaper or a politician. That said, the general
  population’s participation rate in these political activities also declined.</span><sup data-dcnode-id="3109" id="n18-refa"><a class="footnote-link" data-dcnode-id="3110" href="#n18"><span class="wb-invisible" data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="3111" instrument_node="">18</span></a></sup></p><span data-dcnode-id="3107" instrument_node="">
</span><p data-dcnode-id="3105"><img alt="Chart 4 Participation of youth aged 15 to 24 in non-electoral political activities, 2003, 2008 and 2013" aria-describedby="desc04" data-dcnode-id="3106" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/c-g04-eng.gif&amp;raw"></p><span data-dcnode-id="3104" instrument_node="">
</span><p data-dcnode-id="3101" id="desc04"><a data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/desc/desc04-eng.htm"><span data-dcnode-id="3103" instrument_node="">Description for chart 4</span></a></p><span data-dcnode-id="3100" instrument_node="">
</span><p data-dcnode-id="3093"><span data-dcnode-id="3099" instrument_node="">Younger Canadians,
  however, remained generally more inclined than their older counterparts to
  participate in a number of  non-electoral political activities in 2013.
  Some studies indicate that the forms of political participation popular among
  youth are characterized by (1)&nbsp;an emphasis on specific causes and issues (for
  example, the environment, access to education or gender equality) as opposed to
  the more general political issues discussed in an election; and (2)&nbsp;participation
  in social groups or movements that are less hierarchical and less officially organized
  (for example, interest groups) as opposed to involvement in traditional
  political organizations, such as political parties or unions.</span><sup data-dcnode-id="3094" id="n19-refa"><a class="footnote-link" data-dcnode-id="3095" href="#n19"><span class="wb-invisible" data-dcnode-id="3097"><span data-dcnode-id="3098" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="3096" instrument_node="">19</span></a></sup></p><span data-dcnode-id="3092" instrument_node="">
</span><p data-dcnode-id="3090"><span data-dcnode-id="3091" instrument_node="">Signing a petition is
  one such activity. In the 12 months preceding the survey, 26% of youth aged 15 to
  19 and 35% of youth aged 20 to 24 signed a petition, compared with 22% of those
  aged 65 to 74 and 14% of those aged 75 and over (Table&nbsp;2).</span></p><span data-dcnode-id="3089" instrument_node="">

     </span></td></tr></tbody></table><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Youth were
  approximately twice as likely as older population groups to have worn a badge
  or T-shirt, or to have held up a sign in support of or in opposition to a
  political or social cause in the past 12&nbsp;months. In addition, 7% of youth
  aged 15 to 19 and 10% of youth aged 20 to 24 took part in a demonstration or a march
  in 2013, compared with 2% of seniors aged 65 to 74.</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Additionally, 21% of
  young adults aged 20 to 24 reported having expressed their views on a political
  or social issue through an Internet forum or news website, more than twice the proportion
  for individuals aged 45 to 54 (10%) or seniors aged 65 to 74 (8%).</span></p><span data-dcnode-id="1612" instrument_node="">
</span><p data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">One way to measure
  the degree of activity among youth is to calculate the proportion who
  participated in multiple political activities in a given year. Youth aged 20 to
  24, in particular, were more likely to be active, as 20% of them had participated
  in three or more non-electoral political activities in 2013─the highest proportion
  of all age groups (Chart&nbsp;5). The
  intensity of political activity, however, was lower among those aged 15 to 19, with
  11% participating in at least three activities.</span></p><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><img alt="Chart 5 Number of political activities in which persons participated in the past 12&nbsp;months, by age group, 2013" aria-describedby="desc05" data-dcnode-id="1608" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/c-g05-eng.gif&amp;raw"></p><span data-dcnode-id="1606" instrument_node="">
</span><p data-dcnode-id="1603" id="desc05"><a data-dcnode-id="1604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/desc/desc05-eng.htm"><span data-dcnode-id="1605" instrument_node="">Description for chart 5</span></a></p><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">In addition, 47% of
  youth aged 20 to 24 did not participate in any activity in the past
  12&nbsp;months, the lowest percentage of all age groups. This proportion
  increased in subsequent age groups, reaching 56% for seniors aged 65 to 74 and
  69% for those aged 75 and over.</span></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Among those
  who did not participate to non-electoral political activities, however, older Canadians
  were significantly more likely than their younger counterparts to say that they
  intended to vote in the next federal election. Among those who did not
  participate in any non-electoral political activity in the past 12&nbsp;months,
  79% of persons aged 65 to 74 were very likely to vote in the next election,
  compared with 38% of their counterparts aged 15 to 19 and 45% of those aged 20 to
  24.</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1595" instrument_node="">Consequently, the proportion
  of “politically inactive” persons─that is, persons who did not participate in
  any political activity in the past 12&nbsp;months and who were not very likely
  to vote in the next federal election─was larger among the youth.</span><sup data-dcnode-id="1590" id="n20-refa"><a class="footnote-link" data-dcnode-id="1591" href="#n20"><span class="wb-invisible" data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="1592" instrument_node="">20</span></a></sup></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">According to this
  definition, the share of persons who could be considered politically inactive
  was 32% for those aged 15 to 19 and 26% for those aged 20 to 24. In comparison,
  the corresponding proportions were 17% for individuals aged 45 to 54 and 12% for
  those aged 65 to 74.</span></p><span data-dcnode-id="1585" instrument_node="">
</span><h2 data-dcnode-id="1582"><a data-dcnode-id="1584" id="a7"></a><span data-dcnode-id="1583" instrument_node="">Education and political participation</span></h2><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1580" instrument_node="">Education is a significant
  factor in political participation.</span><sup data-dcnode-id="1575" id="n21-refa"><a class="footnote-link" data-dcnode-id="1576" href="#n21"><span class="wb-invisible" data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="1577" instrument_node="">21</span></a></sup><span data-dcnode-id="1574" instrument_node=""> Regardless of age
  group, a higher level of education is associated with increased participation in
  all types of political activities covered by the GSS.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">The link between
  educational attainment and voter turnout is more difficult to study among youth
  aged 15 to 24 because most of them are still going to school. Nevertheless, there
  was an association between level of schooling and the intensity and nature of
  political participation. Younger Canadians who attend university, in
  particular, are more likely to be interested in social issues and are more
  politically involved.</span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Specifically, youth
  who attended university were the most likely to (1)&nbsp;express their views on
  a social or political issue through an Internet forum or news website; (2)&nbsp;sign
  a petition; (3)&nbsp;participate in a demonstration; and (4)&nbsp;wear a badge
  or T-shirt, or hold up a sign in support of or in opposition to a political or
  social cause (Table&nbsp;2). Despite these
  results, the proportion of young university students who intended to vote in
  the next federal election remained lower than for  the population
  as a whole (66% vs. 72%).</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">In contrast, youth
  aged 15 to 24 who were in high school were among the least likely to take part
  in various political activities, likely because of their young age.</span></p><span data-dcnode-id="1563" instrument_node="">
</span><h2 data-dcnode-id="1560"><a data-dcnode-id="1562" id="a8"></a><span data-dcnode-id="1561" instrument_node="">Civic engagement of youth</span></h2><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1552"><span data-dcnode-id="1558" instrument_node="">The ties between
  citizens and society or members of their community are clearly not limited to
  political activities. Civic engagement, although not necessarily political, may
  also affect the well-being of communities and society. Various studies have
  shown that participation in volunteer associations can foster the political participation
  of individuals.</span><sup data-dcnode-id="1553" id="n22-refa"><a class="footnote-link" data-dcnode-id="1554" href="#n22"><span class="wb-invisible" data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="1555" instrument_node="">22</span></a></sup></p><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">The GSS collected information
  different groups, organizations and associations to which Canadians belong. A
  group may be officially organized or informal, that is, a group of people who
  meet regularly to do an activity or discuss various topics.</span></p><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">According to the data
  on civic engagement, youth are among the most socially engaged. In 2013, 74% of
  youth aged 15 to 19 and 64% of youth aged 20 to 24 were part of a group,
  organization or association (Table&nbsp;3).
  This compared with 65% of individuals aged 45 to 54 and 62% of individuals aged
  65 to 74.</span></p><span data-dcnode-id="1545" instrument_node="">

</span><p data-dcnode-id="887"><span data-dcnode-id="893" instrument_node="">Furthermore, the rate
  of civic engagement of youth increased over the decade (contrary to some
  non-electoral political activities). Between 2003 and 2013, the proportion of
  youth aged 15 to 24 who were members of or participants in a group, organization
  or association rose by 5&nbsp;percentage points, from 64% to 69%. The increase
  was even larger among those aged 15 to 19—74% were part of a group in 2013, compared
  with 68% a decade earlier.</span><sup data-dcnode-id="888" id="n23-refa"><a class="footnote-link" data-dcnode-id="889" href="#n23"><span class="wb-invisible" data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="890" instrument_node="">23</span></a></sup></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">The types of groups
  to which youth belong differ in a number of ways from those preferred by their older
  counterparts. In 2013, youth were particularly inclined to participate in
  sports or recreational organizations; cultural, educational or hobby
  organizations; and school groups or neighbourhood, civic or community
  associations.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">For example, 43% of
  youth aged 15 to 24 were members of a sports or recreational organization, compared
  with 29% of those aged 25 and over (Chart&nbsp;6).
  Among youth aged 15 to 19, more than one-half (51%) were members of or participants
  in sports or recreational organizations.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><img alt="Chart 6 Persons who are members of or participants in a group, organization or association, by type of group or organization and age group, 2013" aria-describedby="desc06" data-dcnode-id="879" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/c-g06-eng.gif&amp;raw"></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="874" id="desc06"><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/desc/desc06-eng.htm"><span data-dcnode-id="876" instrument_node="">Description for chart 6</span></a></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="872" instrument_node="">However, youth were
  generally less likely than older people to belong to a union or professional association
  (which is to be expected, since many youth are still full-time students), service
  club, group with religious affiliations, or political organization.</span><sup data-dcnode-id="867" id="n24-refa"><a class="footnote-link" data-dcnode-id="868" href="#n24"><span class="wb-invisible" data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="869" instrument_node="">24</span></a></sup><span data-dcnode-id="866" instrument_node=""> As a corollary,
  members of political organizations are aging quickly in Canada. Between 2003 and
  2013, the proportion of members of political organizations aged 65 and over
  increased from 18% to 29%.</span></p><span data-dcnode-id="864" instrument_node="">
</span><h2 data-dcnode-id="861"><a data-dcnode-id="863" id="a9"></a><span data-dcnode-id="862" instrument_node="">Participation in group activities or meetings and volunteering</span></h2><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Youth, in addition to
  being more likely to belong to groups, also participated in them more regularly.
  In 2013, 45% of youth aged 15 to 19 and 30% of youth aged 20 to 24 took part in
  group activities or meetings at least once a week, in comparison with 20% of individuals
  aged 45 to 54 and 25% among those aged 65 to 74 (Chart&nbsp;7).</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><img alt="Chart 7 Frequency of participation in group activities or meetings, by age group, 2013" aria-describedby="desc07" data-dcnode-id="856" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/c-g07-eng.gif&amp;raw"></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="851" id="desc07"><a data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www150.statcan.gc.ca/n1/pub/75-006-x/2015001/article/14232/c-g/desc/desc07-eng.htm"><span data-dcnode-id="853" instrument_node="">Description for chart 7</span></a></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="849" instrument_node="">These differences in frequency
  of participation may have consequences for the development of social capital. For
  example, in 2013, 76% of persons aged 15 to 24 who participated monthly in
  group activities had met, in the past month, at least one new person with whom
  they intended to stay in contact. In comparison, that proportion was 68% for
  those who participated less frequently in group activities, and 59% for those
  who were not members of or participants in a group.</span><sup data-dcnode-id="844" id="n25-refa"><a class="footnote-link" data-dcnode-id="845" href="#n25"><span class="wb-invisible" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="846" instrument_node="">25</span></a></sup></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="841" instrument_node="">Lastly, volunteering
  is known to have a positive impact not only on organizations and their
  beneficiaries, but also on the volunteers themselves. As was the case with participation
  in groups or organizations, younger individuals had the highest volunteering participation
  rates. In 2013, according to the GSS data on giving, volunteering and
  participating, 66% of youth aged 15 to 19 volunteered.</span><sup data-dcnode-id="836" id="n26-refa"><a class="footnote-link" data-dcnode-id="837" href="#n26"><span class="wb-invisible" data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Note&nbsp;</span></span><span data-dcnode-id="838" instrument_node="">26</span></a></sup><span data-dcnode-id="835" instrument_node=""> This compared with
  48% for individuals aged 35 to 44, who had the second-highest rate of
  volunteering. Young volunteers, however, tend to contribute fewer hours than
  their older counterparts.</span></p><span data-dcnode-id="833" instrument_node="">
</span><h2 data-dcnode-id="830"><a data-dcnode-id="832" id="a10"></a><span data-dcnode-id="831" instrument_node="">Conclusion</span></h2><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">This study, which was
  based on data from the 2013&nbsp;GSS, has shown that younger people are less
  likely to vote than older individuals and are also less likely to report  that they intend to vote in the next
  election. Younger people also tend to be less interested in politics than their
  older counterparts. These trends, however, conceal a relatively high degree of
  engagement in other activities. For example, many young Canadians are
  politically and civically engaged, but in different ways. The youngest of them —those
  aged 15 to 19—were the most likely of all age groups to be members of or
  participants in groups, organizations or associations. They were also the most
  likely to participate at least once a week in group activities or meetings.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Youth aged 20 to 24 are
  among the most engaged of all in political activities such as signing petitions
  and participating in demonstrations or marches. Young university students stood
  out in particular, as they had the highest participation rates for almost all
  these types of activities. In short, when alternative ways of participating in
  political and civic activities are considered, it is clear that a significant
  portion of young individuals are interested in public affairs.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">However, the proportion
  of politically inactive individuals—those who did not participate in any
  political activity in the past 12&nbsp;months and who were not highly likely to
  vote in the next election—was larger among youth. The lower voter turnout
  among younger individuals promises to be a topic of interest and concern in the
  coming years.</span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="814"><strong data-dcnode-id="817"><em data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Martin Turcotte</span></em></strong><em data-dcnode-id="815"><span data-dcnode-id="816" instrument_node=""> is a senior analyst
  in the Social and Aboriginal Statistics Division at Statistics Canada.</span></em></p><span data-dcnode-id="813" instrument_node="">

</span><dd data-dcnode-id="635" id="n10"><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node=""> The predicted
        probabilities were calculated using logistic regression coefficients. For each
        respondent included in the model, the coefficients obtained in the regression
        were used to calculate the probability that he or she would vote in the
        next election by setting the variable of interest to an identical value for
        all respondents. For example, the predicted probability for men is the average
        of the predicted probabilities of voting obtained by processing all individuals
        in the model as being male (but retaining the original values for the other
        characteristics of the respondents). The difference between the predicted
        probability for men and that for women is the average marginal effect.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p class="footnote-return" data-dcnode-id="637"><a data-dcnode-id="638" href="#n10-refa"><span class="wb-invisible" data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Return to note&nbsp;</span></span><span data-dcnode-id="641" instrument_node="">10</span><span class="wb-invisible" data-dcnode-id="639"><span data-dcnode-id="640" instrument_node=""> referrer</span></span></a></p><span data-dcnode-id="636" instrument_node="">

</span><dd data-dcnode-id="618" id="n11"><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node=""> An additional
        analysis using the Oaxaca–Blinder decomposition was performed. The analysis
        showed that the low level of interest in politics among youth contributed more
        than any other variable to the difference between the likelihood of voting for
        youth and seniors. The other two most influential factors in the difference in
        voter turnout were the frequency at which individuals kept up with news and
        current affairs, and the sense of belonging to Canada.</span></p><span data-dcnode-id="627" instrument_node="">

</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node=""> According to the
        regression model, youth aged 15 to 24 who were very interested in politics were
        2.3&nbsp;times more likely than their counterparts who were not very interested
        or not at all interested (predicted probabilities of 0.87 and 0.38,
        respectively) to say that they would very likely vote in the next federal
        election. In comparison, the ratio was 1.5 for the population aged 25 and over
        (predicted probabilities of 0.89 and 0.59).</span></p><span data-dcnode-id="559" instrument_node="">
</span><p class="footnote-return" data-dcnode-id="552"><a data-dcnode-id="553" href="#n15-refa"><span class="wb-invisible" data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Return to note&nbsp;</span></span><span data-dcnode-id="556" instrument_node="">15</span><span class="wb-invisible" data-dcnode-id="554"><span data-dcnode-id="555" instrument_node=""> referrer</span></span></a></p><span data-dcnode-id="551" instrument_node="">

</span><p class="footnote-return" data-dcnode-id="535"><a data-dcnode-id="536" href="#n16-refa"><span class="wb-invisible" data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Return to note&nbsp;</span></span><span data-dcnode-id="539" instrument_node="">16</span><span class="wb-invisible" data-dcnode-id="537"><span data-dcnode-id="538" instrument_node=""> referrer</span></span></a></p><span data-dcnode-id="534" instrument_node="">

</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node=""> Similar results
        were found for the population aged 15 and over: 57% of those who participated
        monthly had met a new person, compared with 43% of those who participated less

</span><dt data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Note 26.</span></dt><span data-dcnode-id="376" instrument_node="">
</span><dd data-dcnode-id="363" id="n26"><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node=""> The upward trend in
        the participation rate of youth aged 15 to 19 was also noted in 2004, 2007 and 2010.
        Note that the rate may be influenced by mandatory community work. Numerous
        students must do mandatory community work to fulfill the requirements for a high
        school diploma. In total, 20% of volunteers aged 15 to 19 reported being
        required to volunteer, compared with 7% of persons aged 20 and over.</span></p><span data-dcnode-id="372" instrument_node="">
