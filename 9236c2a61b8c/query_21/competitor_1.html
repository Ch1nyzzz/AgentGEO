</span><h1 data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">

          Bill introduced in U.S. House to lower the voting age to sixteen
      </span></h1><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1845"></p><span data-dcnode-id="1844" instrument_node="">
</span></div><span data-dcnode-id="1842" instrument_node="">
</span></div><span data-dcnode-id="1840" instrument_node="">
</span><div class="subpagebg1" data-dcnode-id="1838"></div><span data-dcnode-id="1837" instrument_node="">
</span></div><span data-dcnode-id="1835" instrument_node="">
</span><div class="clr" data-dcnode-id="1834"></div><span data-dcnode-id="1833" instrument_node="">
</span><section class="section blogdetails_sec" data-dcnode-id="1506"><span data-dcnode-id="1832" instrument_node="">
</span><div class="container" data-dcnode-id="1508"><span data-dcnode-id="1831" instrument_node="">
</span><article class="articlepart" data-dcnode-id="1744"><span data-dcnode-id="1830" instrument_node="">
</span><div class="blog_details_part_cont" data-dcnode-id="1746"><span data-dcnode-id="1829" instrument_node="">
</span><div class="blogby" data-dcnode-id="1819"><span data-dcnode-id="1828" instrument_node="">
</span><span class="writtenby" data-dcnode-id="1824"><span data-dcnode-id="1827" instrument_node="">Written by </span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youthrights.org/blog/author/admin/"><span data-dcnode-id="1826" instrument_node="">NYRA</span></a></span><span data-dcnode-id="1823" instrument_node="">
</span><span class="date" data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Aug 14, 2018</span></span><span data-dcnode-id="1820" instrument_node="">
</span></div><span data-dcnode-id="1818" instrument_node="">
</span><div class="taggg" data-dcnode-id="1807"><span data-dcnode-id="1817" instrument_node="">
</span><span data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">TAGS:</span></span><a data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youthrights.org/blog/tag/campaign-updates/" rel="tag"><span data-dcnode-id="1814" instrument_node="">Campaign Updates</span></a><span data-dcnode-id="1812" instrument_node=""> </span><a data-dcnode-id="1810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youthrights.org/blog/tag/voting-age/" rel="tag"><span data-dcnode-id="1811" instrument_node="">Voting Age</span></a><br data-dcnode-id="1809"><span data-dcnode-id="1808" instrument_node="">
</span></div><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1805" instrument_node="">Last week, U.S. Representative Grace Meng (D-NY) introduced a resolution proposing an amendment to the U.S. Constitution that would lower the voting age to sixteen throughout the country. This resolution (</span><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/115th-congress/house-joint-resolution/138/text"><span data-dcnode-id="1804" instrument_node="">H.J.Res.138</span></a><span data-dcnode-id="1802" instrument_node="">) would replace the Twenty-sixth Amendment, which prevents states from having a voting age higher than 18, with the following language:&nbsp; “The right of citizens of the United States, who are sixteen years of age or older, to vote shall not be denied or abridged by the United States or by any State on account of age.” As a Constitutional amendment, the proposal would need to be approved by two-thirds of the U.S. House and Senate and three-fourths of the states. If passed, this would effectively result in allowing individuals aged sixteen and seventeen to register and vote in all federal, state and local primaries and elections.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1799" instrument_node="">While Meng’s resolution has no co-sponsors yet, there have been several current U.S. Representatives that have expressed support for lowering the voting age in the past. This list includes </span><a data-dcnode-id="1797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//editions.lib.umn.edu/smartpolitics/2015/09/02/keith-ellison-lower-the-voting-age-to-16/"><span data-dcnode-id="1798" instrument_node="">Keith Ellison</span></a><span data-dcnode-id="1796" instrument_node=""> (D-MN),&nbsp; </span><a data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theintercept.com/2018/03/13/lower-voting-age-to-16-youth-activism/"><span data-dcnode-id="1795" instrument_node="">Luis Gutiérrez</span></a><span data-dcnode-id="1793" instrument_node=""> (D-IL), </span><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theintercept.com/2018/03/13/lower-voting-age-to-16-youth-activism/"><span data-dcnode-id="1792" instrument_node="">Carolyn Maloney</span></a><span data-dcnode-id="1790" instrument_node=""> (D-NY), and </span><a data-dcnode-id="1788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//genprogress.org/voices/2015/08/06/38617/nancy-pelosi-proposes-lowering-the-voting-age-to-16-or-17/"><span data-dcnode-id="1789" instrument_node="">Nancy Pelosi</span></a><span data-dcnode-id="1787" instrument_node=""> (D-CA).</span></p><span data-dcnode-id="1785" instrument_node="">
</span><figure aria-describedby="caption-attachment-14431" class="wp-caption alignright" data-dcnode-id="1781" id="attachment_14431" style="width: 513px"><img alt="" class="wp-image-14431" data-dcnode-id="1784" height="342" sizes="(max-width: 513px) 100vw, 513px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youthrights.org/wp-content/uploads/rep-grace-meng.jpg&amp;raw" srcset="https://www.youthrights.org/wp-content/uploads/rep-grace-meng.jpg 710w, https://www.youthrights.org/wp-content/uploads/rep-grace-meng-24x16.jpg 24w, https://www.youthrights.org/wp-content/uploads/rep-grace-meng-36x24.jpg 36w, https://www.youthrights.org/wp-content/uploads/rep-grace-meng-48x32.jpg 48w, https://www.youthrights.org/wp-content/uploads/rep-grace-meng-209x139.jpg 209w" width="513"><figcaption class="wp-caption-text" data-dcnode-id="1782" id="caption-attachment-14431"><span data-dcnode-id="1783" instrument_node="">U.S. Rep Grace Meng (D-NY)</span></figcaption></figure><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1777"><b data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Local and state campaigns to lower the voting age</span></b></p><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1775" instrument_node="">Some states, notably Maryland, make it easy for towns to change the voting requirements for local elections, and the Maryland cities of </span><a data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youthrights.org/issues/voting-age/voting-age-status-report/"><span data-dcnode-id="1774" instrument_node="">Takoma Park, Hyattsville, Greenbelt, and Riverdale Park</span></a><span data-dcnode-id="1772" instrument_node=""> have already lowered their voting age to 16. Berkeley, CA has a voting age of 16 for school board elections. However, in other states is is more difficult. In the last twenty years, NYRA chapters have had supported local and statewide campaigns nearly two dozen states. As a result of many of those campaigns, </span><a data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youthrights.org/issues/voting-age/history-of-the-movement/"><span data-dcnode-id="1771" instrument_node="">approximately 50 separate bills and resolutions have been introduced</span></a><span data-dcnode-id="1769" instrument_node="">.</span></p><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Currently, there are several NYRA chapters working on lowering the voting age at the state and local levels. Brentley Sandlin, 16, from the Memphis Youth Union – a NYRA chapter – has been working for the past two and a half years to extend voting rights to sixteen- and seventeen-year-olds. In response Rep. Meng’s resolution she said,</span></p><span data-dcnode-id="1764" instrument_node="">
</span><blockquote data-dcnode-id="1761"><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">“This bill helps to show that our work is not part of a radical notion, but rather a piece of a much larger national and international movement taking place to end the ongoing disenfranchisement of youth.”</span></p></blockquote><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Mahsiah Imes, 17, NYRA Board Member has also been working on lowering the voting age for two years was happy that lowering the voting age has entered into the national conversation this year.</span></p><span data-dcnode-id="1757" instrument_node="">
</span><blockquote data-dcnode-id="1754"><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">“Decisions made on the national level where foreign policy, healthcare and criminal justice reform are very important to young people who will be around to see the outcome of how those policies in the future.”</span></p></blockquote><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1752" instrument_node="">There are </span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youthrights.org/issues/voting-age/voting-age-status-report/"><span data-dcnode-id="1751" instrument_node="">current bills</span></a><span data-dcnode-id="1749" instrument_node=""> in legislatures in Massachusetts, New York, and Washington D.C. California and Virginia also saw legislation to lower the voting age proposed at the state level last year and campaigns are continuing in those states as well.</span></p><span data-dcnode-id="1747" instrument_node="">
</span></div><span data-dcnode-id="1745" instrument_node="">
</span></article><span data-dcnode-id="1743" instrument_node="">
</span><aside class="asidepart" data-dcnode-id="1510"><span data-dcnode-id="1742" instrument_node="">
</span><div class="aside_section" data-dcnode-id="1512"><span data-dcnode-id="1741" instrument_node="">

</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">I am opposed to H.J. Res 23. I find that 18 is still a reasonable starting point of the franchise. I sincerely believe/find that I as well as most people and most members of Congress find that 18 while not perfect, is still a reasonably fair/ideal age to start the franchise. I believe that even if this proposal did attract some (handful)cosponsors, while not impossible, it would not become law any time in the near future because it would get the approval of 2/3 of the members of Congress and 3/4 of the number of state legislatures. That is a very tough uphill battle. I hope this proposal/bill does not come to pass any time soon. Believe me when I say that I do not say these things lightly in regards to my opposition to this proposal.</span></p><span data-dcnode-id="1398" instrument_node="">
