</span><p data-dcnode-id="7738"><a data-dcnode-id="7761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="7762" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="7760" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="7759" instrument_node=""> On November 19, 2015, the </span><a data-dcnode-id="7757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="7758" instrument_node="">House</span></a><span data-dcnode-id="7756" instrument_node=""> passed </span><a class="external text" data-dcnode-id="7754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/4038%3Fq%3D%257B%2522search%2522%253A%255B%2522%255C%2522hr4038%255C%2522%2522%255D%257D%26resultIndex%3D1" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7755" instrument_node="">HR 4038—the American SAFE Act of 2015</span></a><span data-dcnode-id="7753" instrument_node="">—by a vote of 289-137.</span><sup class="reference" data-dcnode-id="7750" id="cite_ref-87"><a data-dcnode-id="7751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-87"><span data-dcnode-id="7752" instrument_node="">[87]</span></a></sup><span data-dcnode-id="7749" instrument_node=""> The bill proposed instituting additional screening processes for refugees from Iraq and Syria who applied for admission to the U.S. Meng voted with 134 </span><a class="mw-redirect" data-dcnode-id="7747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="7748" instrument_node="">Democrats</span></a><span data-dcnode-id="7746" instrument_node=""> and two </span><a class="mw-redirect" data-dcnode-id="7744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Republicans" title="Republicans"><span data-dcnode-id="7745" instrument_node="">Republicans</span></a><span data-dcnode-id="7743" instrument_node=""> against the bill.</span><sup class="reference" data-dcnode-id="7740" id="cite_ref-88"><a data-dcnode-id="7741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-88"><span data-dcnode-id="7742" instrument_node="">[88]</span></a></sup><span data-dcnode-id="7739" instrument_node="">
</span></p><span data-dcnode-id="7737" instrument_node="">
</span><h3 data-dcnode-id="7734"><span class="mw-headline" data-dcnode-id="7735" id="113th_Congress"><span data-dcnode-id="7736" instrument_node="">113th Congress</span></span></h3><span data-dcnode-id="7733" instrument_node="">
</span><p data-dcnode-id="7717"><span data-dcnode-id="7732" instrument_node="">The second session of the </span><a class="mw-redirect" data-dcnode-id="7730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/113th_Congress" title="113th Congress"><span data-dcnode-id="7731" instrument_node="">113th Congress</span></a><span data-dcnode-id="7729" instrument_node=""> enacted into law 224 out of the 3215 introduced bills (7 percent). Comparatively, the </span><a class="mw-redirect" data-dcnode-id="7727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/112th_Congress" title="112th Congress"><span data-dcnode-id="7728" instrument_node="">112th Congress</span></a><span data-dcnode-id="7726" instrument_node=""> had 4.2 percent of introduced bills enacted into law in the second session.</span><sup class="reference" data-dcnode-id="7723" id="cite_ref-89"><a data-dcnode-id="7724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-89"><span data-dcnode-id="7725" instrument_node="">[89]</span></a></sup><span data-dcnode-id="7722" instrument_node="">  For more information pertaining to Meng's voting record in the 113th Congress, please see the below sections.</span><sup class="reference" data-dcnode-id="7719" id="cite_ref-90"><a data-dcnode-id="7720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-90"><span data-dcnode-id="7721" instrument_node="">[90]</span></a></sup><span data-dcnode-id="7718" instrument_node="">
</span></p><span data-dcnode-id="7716" instrument_node="">
</span><h3 data-dcnode-id="7713"><span class="mw-headline" data-dcnode-id="7714" id="National_security"><span data-dcnode-id="7715" instrument_node="">National security</span></span></h3><span data-dcnode-id="7712" instrument_node="">
</span><h4 data-dcnode-id="7709"><span class="mw-headline" data-dcnode-id="7710" id="NDAA"><span data-dcnode-id="7711" instrument_node="">NDAA</span></span></h4><span data-dcnode-id="7708" instrument_node="">
</span><p data-dcnode-id="7699"><a data-dcnode-id="7706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="7707" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="7705" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="7704" instrument_node=""> Meng voted in opposition of HR 1960 - the National Defense Authorization Act for Fiscal Year 2014. The bill passed the House on June 14, 2013, with a vote of 315 - 108. Both parties were somewhat divided on the vote.</span><sup class="reference" data-dcnode-id="7701" id="cite_ref-ns_91-0"><a data-dcnode-id="7702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-ns-91"><span data-dcnode-id="7703" instrument_node="">[91]</span></a></sup><span data-dcnode-id="7700" instrument_node="">
</span></p><span data-dcnode-id="7698" instrument_node="">
</span><h4 data-dcnode-id="7695"><span class="mw-headline" data-dcnode-id="7696" id="DHS_Appropriations"><span data-dcnode-id="7697" instrument_node="">DHS Appropriations</span></span></h4><span data-dcnode-id="7694" instrument_node="">
</span><p data-dcnode-id="7685"><a data-dcnode-id="7692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="7693" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="7691" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="7690" instrument_node=""> Meng voted in opposition of HR 2217 - the DHS Appropriations Act of 2014. The bill passed the House on June 6, 2013, with a vote of 245 - 182 and was largely along party lines.</span><sup class="reference" data-dcnode-id="7687" id="cite_ref-ns_91-1"><a data-dcnode-id="7688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-ns-91"><span data-dcnode-id="7689" instrument_node="">[91]</span></a></sup><span data-dcnode-id="7686" instrument_node="">
</span></p><span data-dcnode-id="7684" instrument_node="">
</span><h4 data-dcnode-id="7681"><span class="mw-headline" data-dcnode-id="7682" id="Keystone_Pipeline_Amendment"><span data-dcnode-id="7683" instrument_node="">Keystone Pipeline Amendment</span></span></h4><span data-dcnode-id="7680" instrument_node="">
</span><p data-dcnode-id="7672"><a data-dcnode-id="7678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Yea3.png" data-dcnode-id="7679" data-file-height="107" data-file-width="193" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/50px-Yea3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/75px-Yea3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/100px-Yea3.png 2x" width="50"></a><span data-dcnode-id="7677" instrument_node=""> Meng voted in favor of House Amendment 69, which would have amended HR 3 to "require that the Pipeline and Hazardous Materials Safety Administration, in consultation with the Department of Homeland Security, conduct a study of the vulnerabilities of the Keystone XL pipeline to a terrorist attack and certify that necessary protections have been put in place." The amendment failed on May 22, 2013, with a vote of 176 - 239 and was largely along party lines.</span><sup class="reference" data-dcnode-id="7674" id="cite_ref-ns_91-2"><a data-dcnode-id="7675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-ns-91"><span data-dcnode-id="7676" instrument_node="">[91]</span></a></sup><span data-dcnode-id="7673" instrument_node="">
</span></p><span data-dcnode-id="7671" instrument_node="">
</span><h4 data-dcnode-id="7667"><span data-dcnode-id="7670" id="CISPA_(2013)"></span><span class="mw-headline" data-dcnode-id="7668" id="CISPA_.282013.29"><span data-dcnode-id="7669" instrument_node="">CISPA (2013)</span></span></h4><span data-dcnode-id="7666" instrument_node="">
</span><p data-dcnode-id="7654"><a data-dcnode-id="7664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Yea3.png" data-dcnode-id="7665" data-file-height="107" data-file-width="193" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/50px-Yea3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/75px-Yea3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/100px-Yea3.png 2x" width="50"></a><span data-dcnode-id="7663" instrument_node=""> Meng voted in support of HR 624 - the CISPA (2013). The bill passed the House on April 18, 2013, with a vote of 288 - 127. The bill permitted federal intelligence agencies to share cybersecurity intelligence and information with private entities and utilities.</span><sup class="reference" data-dcnode-id="7660" id="cite_ref-92"><a data-dcnode-id="7661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-92"><span data-dcnode-id="7662" instrument_node="">[92]</span></a></sup><span data-dcnode-id="7659" instrument_node=""> The bill was largely supported by Republicans, but divided the Democratic Party.</span><sup class="reference" data-dcnode-id="7656" id="cite_ref-ns_91-3"><a data-dcnode-id="7657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-ns-91"><span data-dcnode-id="7658" instrument_node="">[91]</span></a></sup><span data-dcnode-id="7655" instrument_node="">
</span></p><span data-dcnode-id="7653" instrument_node="">
</span><h3 data-dcnode-id="7650"><span class="mw-headline" data-dcnode-id="7651" id="Economy"><span data-dcnode-id="7652" instrument_node="">Economy</span></span></h3><span data-dcnode-id="7649" instrument_node="">
</span><h4 data-dcnode-id="7646"><span class="mw-headline" data-dcnode-id="7647" id="Farm_Bill"><span data-dcnode-id="7648" instrument_node="">Farm Bill</span></span></h4><span data-dcnode-id="7645" instrument_node="">
</span><dl data-dcnode-id="7639"><dd data-dcnode-id="7640"><i data-dcnode-id="7641"><span data-dcnode-id="7644" instrument_node="">See also: </span><a data-dcnode-id="7642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_Farm_Bill_2013" title="United States Farm Bill 2013"><span data-dcnode-id="7643" instrument_node="">United States Farm Bill 2013</span></a></i></dd></dl><span data-dcnode-id="7638" instrument_node="">
</span><p data-dcnode-id="7625"><a data-dcnode-id="7636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="7637" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="7635" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="7634" instrument_node="">
Meng voted against the Farm Bill on July 11, 2013.  The bill passed in a 216-208 vote.</span><sup class="reference" data-dcnode-id="7631" id="cite_ref-93"><a data-dcnode-id="7632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-93"><span data-dcnode-id="7633" instrument_node="">[93]</span></a></sup><span data-dcnode-id="7630" instrument_node="">  The bill passed included farm policy, but did not include food stamps.</span><sup class="reference" data-dcnode-id="7627" id="cite_ref-94"><a data-dcnode-id="7628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-94"><span data-dcnode-id="7629" instrument_node="">[94]</span></a></sup><span data-dcnode-id="7626" instrument_node="">
</span></p><span data-dcnode-id="7624" instrument_node="">
</span><h4 data-dcnode-id="7621"><span class="mw-headline" data-dcnode-id="7622" id="King_Amendment"><span data-dcnode-id="7623" instrument_node="">King Amendment</span></span></h4><span data-dcnode-id="7620" instrument_node="">
</span><p data-dcnode-id="7604"><span data-dcnode-id="7619" instrument_node="">Meng signed a letter sent to </span><a data-dcnode-id="7617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Collin_Peterson" title="Collin Peterson"><span data-dcnode-id="7618" instrument_node="">Collin Peterson</span></a><span data-dcnode-id="7616" instrument_node=""> in August 2013, asking him to keep </span><a data-dcnode-id="7614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Steve_King_%28Iowa%29" title="Steve King (Iowa)"><span data-dcnode-id="7615" instrument_node="">Steve King</span></a><span data-dcnode-id="7613" instrument_node="">'s amendment out of the final Farm Bill.</span><sup class="reference" data-dcnode-id="7610" id="cite_ref-95"><a data-dcnode-id="7611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-95"><span data-dcnode-id="7612" instrument_node="">[95]</span></a></sup><span data-dcnode-id="7609" instrument_node="">  The "Protect Interstate Commerce Act" amendment prevents states from applying their own laws on agricultural products to agricultural products from another state.</span><sup class="reference" data-dcnode-id="7606" id="cite_ref-96"><a data-dcnode-id="7607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-96"><span data-dcnode-id="7608" instrument_node="">[96]</span></a></sup><span data-dcnode-id="7605" instrument_node="">  King introduced the amendment in response to a law in California, requiring a larger size cage for  egg-producing chickens.  King represents Iowa, which is a large egg producer.
</span></p><span data-dcnode-id="7603" instrument_node="">
</span><h4 data-dcnode-id="7600"><span class="mw-headline" data-dcnode-id="7601" id="Government_shutdown"><span data-dcnode-id="7602" instrument_node="">Government shutdown</span></span></h4><span data-dcnode-id="7599" instrument_node="">
</span><dl data-dcnode-id="7591"><dd data-dcnode-id="7592"><dl data-dcnode-id="7593"><dd data-dcnode-id="7594"><i data-dcnode-id="7595"><span data-dcnode-id="7598" instrument_node="">See also: </span><a data-dcnode-id="7596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_budget_debate%2C_2013" title="United States budget debate, 2013"><span data-dcnode-id="7597" instrument_node="">United States budget debate, 2013</span></a></i></dd></dl></dd></dl><span data-dcnode-id="7590" instrument_node="">
</span><p data-dcnode-id="7570"><a data-dcnode-id="7588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="7589" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="7587" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="7586" instrument_node=""> On September 30, 2013, the House passed a final stopgap spending bill before the shutdown went into effect. The bill included a one-year delay of the Affordable Care Act's individual mandate and would have also stripped the bill of federal subsidies for congressional members and staff. It passed through the House with a vote of 228-201.</span><sup class="reference" data-dcnode-id="7583" id="cite_ref-clerk_97-0"><a data-dcnode-id="7584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-clerk-97"><span data-dcnode-id="7585" instrument_node="">[97]</span></a></sup><span data-dcnode-id="7582" instrument_node=""> At 1 a.m. on October 1, 2013, one hour after the shutdown officially began, the House voted to move forward with going to a conference. In short order, Sen. </span><a data-dcnode-id="7580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Harry_Reid" title="Harry Reid"><span data-dcnode-id="7581" instrument_node="">Harry Reid</span></a><span data-dcnode-id="7579" instrument_node=""> rejected the call to conference.</span><sup class="reference" data-dcnode-id="7576" id="cite_ref-98"><a data-dcnode-id="7577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-98"><span data-dcnode-id="7578" instrument_node="">[98]</span></a></sup><span data-dcnode-id="7575" instrument_node=""> Meng voted against the stopgap spending bill that would have delayed the individual mandate.</span><sup class="reference" data-dcnode-id="7572" id="cite_ref-clerk_97-1"><a data-dcnode-id="7573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-clerk-97"><span data-dcnode-id="7574" instrument_node="">[97]</span></a></sup><span data-dcnode-id="7571" instrument_node="">
</span></p><p data-dcnode-id="7546"><a data-dcnode-id="7568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Yea3.png" data-dcnode-id="7569" data-file-height="107" data-file-width="193" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/50px-Yea3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/75px-Yea3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/100px-Yea3.png 2x" width="50"></a><span data-dcnode-id="7567" instrument_node=""> The shutdown ended on October 16, 2013, when the House took a vote on HR 2775 after it was approved by the </span><a data-dcnode-id="7565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_Senate" title="United States Senate"><span data-dcnode-id="7566" instrument_node="">Senate</span></a><span data-dcnode-id="7564" instrument_node="">. The bill to reopen the government lifted the $16.7 trillion debt limit and funded the government through January 15, 2014. Federal employees also received retroactive pay for the shutdown period. The only concession made by </span><a data-dcnode-id="7562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_Senate" title="United States Senate"><span data-dcnode-id="7563" instrument_node="">Senate Democrats</span></a><span data-dcnode-id="7561" instrument_node=""> was to require income verification for </span><a class="mw-redirect" data-dcnode-id="7559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Obamacare" title="Obamacare"><span data-dcnode-id="7560" instrument_node="">Obamacare</span></a><span data-dcnode-id="7558" instrument_node=""> subsidies.</span><sup class="reference" data-dcnode-id="7555" id="cite_ref-99"><a data-dcnode-id="7556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-99"><span data-dcnode-id="7557" instrument_node="">[99]</span></a></sup><span data-dcnode-id="7554" instrument_node=""> The House passed the legislation shortly after the Senate, by a vote of 285-144, with all 144 votes against the legislation coming from </span><a class="mw-redirect" data-dcnode-id="7552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Republican" title="Republican"><span data-dcnode-id="7553" instrument_node="">Republican</span></a><span data-dcnode-id="7551" instrument_node=""> members. Meng voted for HR 2775.</span><sup class="reference" data-dcnode-id="7548" id="cite_ref-100"><a data-dcnode-id="7549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-100"><span data-dcnode-id="7550" instrument_node="">[100]</span></a></sup><span data-dcnode-id="7547" instrument_node="">
</span></p><span data-dcnode-id="7545" instrument_node="">
</span><h3 data-dcnode-id="7542"><span class="mw-headline" data-dcnode-id="7543" id="Immigration_2"><span data-dcnode-id="7544" instrument_node="">Immigration</span></span></h3><span data-dcnode-id="7541" instrument_node="">
</span><h4 data-dcnode-id="7538"><span class="mw-headline" data-dcnode-id="7539" id="Morton_Memos_Prohibition"><span data-dcnode-id="7540" instrument_node="">Morton Memos Prohibition</span></span></h4><span data-dcnode-id="7537" instrument_node="">
</span><p data-dcnode-id="7524"><a data-dcnode-id="7535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="7536" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="7534" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="7533" instrument_node=""> Meng voted against House Amendment 136 - Prohibits the Enforcement of the Immigration Executive Order. The amendment was adopted by the House on June 6, 2013, with a vote of 224 - 201. The purpose of the amendment as stated on the official text is to "prohibit the use of funds to finalize, implement, administer, or enforce the Morton Memos." These memos would have granted administrative amnesty to certain individuals residing in the United States without legal status.</span><sup class="reference" data-dcnode-id="7530" id="cite_ref-101"><a data-dcnode-id="7531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-101"><span data-dcnode-id="7532" instrument_node="">[101]</span></a></sup><span data-dcnode-id="7529" instrument_node=""> The vote largely followed party lines.</span><sup class="reference" data-dcnode-id="7526" id="cite_ref-102"><a data-dcnode-id="7527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-102"><span data-dcnode-id="7528" instrument_node="">[102]</span></a></sup><span data-dcnode-id="7525" instrument_node="">
</span></p><span data-dcnode-id="7523" instrument_node="">

</span><p data-dcnode-id="7488"><a data-dcnode-id="7495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="7496" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="7494" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="7493" instrument_node=""> Meng voted against HR 1797 - Pain-Capable Unborn Child Protection Act. The resolution passed the House on June 18, 2013, with a vote of 228 - 196. The purpose of the bill was to ban abortions that would take place 20 or more weeks after fertilization.</span><sup class="reference" data-dcnode-id="7490" id="cite_ref-104"><a data-dcnode-id="7491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-104"><span data-dcnode-id="7492" instrument_node="">[104]</span></a></sup><span data-dcnode-id="7489" instrument_node="">

</span><p data-dcnode-id="7455"><span data-dcnode-id="7466" instrument_node="">Meng was the first Democratic member of the </span><a class="mw-redirect" data-dcnode-id="7464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/U.S._House" title="U.S. House"><span data-dcnode-id="7465" instrument_node="">U.S. House</span></a><span data-dcnode-id="7463" instrument_node=""> to speak in opposition of the finished </span><a class="mw-redirect" data-dcnode-id="7461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Iran_nuclear_agreement%2C_2015" title="Iran nuclear agreement, 2015"><span data-dcnode-id="7462" instrument_node="">Iran nuclear deal</span></a><span data-dcnode-id="7460" instrument_node="">. She said, "I strongly believe the world could and should have a better deal than that set forth in the Joint Comprehensive Plan of Action, which I will therefore oppose. I believe the inspections procedures set forth are flawed."</span><sup class="reference" data-dcnode-id="7457" id="cite_ref-105"><a data-dcnode-id="7458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-105"><span data-dcnode-id="7459" instrument_node="">[105]</span></a></sup><span data-dcnode-id="7456" instrument_node="">
</span></p><span data-dcnode-id="7454" instrument_node="">
</span><h3 data-dcnode-id="7451"><span class="mw-headline" data-dcnode-id="7452" id="Robbery"><span data-dcnode-id="7453" instrument_node="">Robbery</span></span></h3><span data-dcnode-id="7450" instrument_node="">
</span><p data-dcnode-id="7444"><span data-dcnode-id="7449" instrument_node="">Meng was attacked and robbed in November 2013 in Washington, D.C. on her way home from dinner with a friend.  She suffered bruising and swelling to the back of her head, along with injuries to her knee, hand and face.  Meng returned to the Hill the following day.</span><sup class="reference" data-dcnode-id="7446" id="cite_ref-106"><a data-dcnode-id="7447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-106"><span data-dcnode-id="7448" instrument_node="">[106]</span></a></sup><span data-dcnode-id="7445" instrument_node="">

</span><h3 data-dcnode-id="6217"><span class="mw-headline" data-dcnode-id="6218" id="2012"><span data-dcnode-id="6219" instrument_node="">2012</span></span></h3><span data-dcnode-id="6216" instrument_node="">
</span><dl data-dcnode-id="6208"><dd data-dcnode-id="6209"><dl data-dcnode-id="6210"><dd data-dcnode-id="6211"><i data-dcnode-id="6212"><span data-dcnode-id="6215" instrument_node="">See also: </span><a data-dcnode-id="6213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/New_York%2527s_6th_Congressional_District_elections%2C_2012" title="New York's 6th Congressional District elections, 2012"><span data-dcnode-id="6214" instrument_node="">New York's 6th Congressional District elections, 2012</span></a></i></dd></dl></dd></dl><span data-dcnode-id="6207" instrument_node="">
</span><p data-dcnode-id="6170"><span data-dcnode-id="6206" instrument_node="">Meng was elected to the </span><a class="mw-redirect" data-dcnode-id="6204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/U.S._House" title="U.S. House"><span data-dcnode-id="6205" instrument_node="">U.S. House</span></a><span data-dcnode-id="6203" instrument_node=""> from </span><a data-dcnode-id="6201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/New_York%2527s_6th_Congressional_District" title="New York's 6th Congressional District"><span data-dcnode-id="6202" instrument_node="">New York's 6th Congressional District</span></a><span data-dcnode-id="6200" instrument_node=""> in 2012.</span><sup class="reference" data-dcnode-id="6197" id="cite_ref-110"><a data-dcnode-id="6198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-110"><span data-dcnode-id="6199" instrument_node="">[110]</span></a></sup><sup class="reference" data-dcnode-id="6194" id="cite_ref-nyt_111-0"><a data-dcnode-id="6195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-nyt-111"><span data-dcnode-id="6196" instrument_node="">[111]</span></a></sup><span data-dcnode-id="6193" instrument_node=""> She defeated fellow </span><a class="mw-redirect" data-dcnode-id="6191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/New_York_Assembly" title="New York Assembly"><span data-dcnode-id="6192" instrument_node="">New York Assembly</span></a><span data-dcnode-id="6190" instrument_node=""> member </span><a data-dcnode-id="6188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Rory_Lancman" title="Rory Lancman"><span data-dcnode-id="6189" instrument_node="">Rory Lancman</span></a><span data-dcnode-id="6187" instrument_node="">, city councilwoman </span><a data-dcnode-id="6185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Elizabeth_Crowley" title="Elizabeth Crowley"><span data-dcnode-id="6186" instrument_node="">Elizabeth Crowley</span></a><span data-dcnode-id="6184" instrument_node=""> and physician </span><a data-dcnode-id="6182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Robert_Mittman" title="Robert Mittman"><span data-dcnode-id="6183" instrument_node="">Robert Mittman</span></a><span data-dcnode-id="6181" instrument_node=""> in the June 26 Democratic primary.</span><sup class="reference" data-dcnode-id="6178" id="cite_ref-112"><a data-dcnode-id="6179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-112"><span data-dcnode-id="6180" instrument_node="">[112]</span></a></sup><span data-dcnode-id="6177" instrument_node=""> Meng defeated Lancman (Working Families), </span><a data-dcnode-id="6175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Daniel_Halloran" title="Daniel Halloran"><span data-dcnode-id="6176" instrument_node="">Daniel Halloran</span></a><span data-dcnode-id="6174" instrument_node=""> (R) and </span><a data-dcnode-id="6172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Evergreen_Chou" title="Evergreen Chou"><span data-dcnode-id="6173" instrument_node="">Evergreen Chou</span></a><span data-dcnode-id="6171" instrument_node=""> (G) in the November 6, 2012, general election.
</span></p><p data-dcnode-id="6158"><span data-dcnode-id="6169" instrument_node="">Elizabeth Crowley's cousin, U.S. Representative and Queens Democratic Party Chairman </span><a data-dcnode-id="6167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Joseph_Crowley" title="Joseph Crowley"><span data-dcnode-id="6168" instrument_node="">Joseph Crowley</span></a><span data-dcnode-id="6166" instrument_node="">, endorsed Meng over his relative. As a local Democratic leader, the congressman was heavily invested in the race; analysts suggested he would benefit from backing a winner after he endorsed a candidate in 2010 who went on to lose to Republican </span><a data-dcnode-id="6164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Bob_Turner" title="Bob Turner"><span data-dcnode-id="6165" instrument_node="">Bob Turner</span></a><span data-dcnode-id="6163" instrument_node=""> in an upset.</span><sup class="reference" data-dcnode-id="6160" id="cite_ref-rc_113-0"><a data-dcnode-id="6161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-rc-113"><span data-dcnode-id="6162" instrument_node="">[113]</span></a></sup><span data-dcnode-id="6159" instrument_node="">
</span></p><p data-dcnode-id="6138"><span data-dcnode-id="6157" instrument_node="">Regardless, the party was not expected to lose the seat. Joe Crowley's interest in supporting Meng was more about bolstering the "perceived strengths" of the local Democratic organization, analysts said.</span><sup class="reference" data-dcnode-id="6154" id="cite_ref-rc_113-1"><a data-dcnode-id="6155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-rc-113"><span data-dcnode-id="6156" instrument_node="">[113]</span></a></sup><span data-dcnode-id="6153" instrument_node=""> Meng had the cash advantage, as well as the race advantage in a 40-percent Asian district. She was endorsed by </span><i data-dcnode-id="6151"><span data-dcnode-id="6152" instrument_node="">The New York Times</span></i><span data-dcnode-id="6150" instrument_node=""> and </span><a data-dcnode-id="6148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/EMILY%2527s_List" title="EMILY's List"><span data-dcnode-id="6149" instrument_node="">EMILY's List</span></a><span data-dcnode-id="6147" instrument_node="">,</span><sup class="reference" data-dcnode-id="6144" id="cite_ref-rc_113-2"><a data-dcnode-id="6145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-rc-113"><span data-dcnode-id="6146" instrument_node="">[113]</span></a></sup><span data-dcnode-id="6143" instrument_node=""> among others.</span><sup class="reference" data-dcnode-id="6140" id="cite_ref-log_114-0"><a data-dcnode-id="6141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-log-114"><span data-dcnode-id="6142" instrument_node="">[114]</span></a></sup><span data-dcnode-id="6139" instrument_node="">
</span></p><p data-dcnode-id="6115"><span data-dcnode-id="6137" instrument_node="">Lancman made a race of it, however. He was endorsed by the </span><i data-dcnode-id="6135"><span data-dcnode-id="6136" instrument_node="">New York Daily News</span></i><span data-dcnode-id="6134" instrument_node=""> and the </span><i data-dcnode-id="6132"><span data-dcnode-id="6133" instrument_node="">Queens Chronicle</span></i><span data-dcnode-id="6131" instrument_node="">, and strongly pursued the Jewish vote.</span><sup class="reference" data-dcnode-id="6128" id="cite_ref-rc_113-3"><a data-dcnode-id="6129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-rc-113"><span data-dcnode-id="6130" instrument_node="">[113]</span></a></sup><span data-dcnode-id="6127" instrument_node=""> He and Meng were involved in intense campaigning, each sharply criticizing the other.</span><sup class="reference" data-dcnode-id="6124" id="cite_ref-duke_115-0"><a data-dcnode-id="6125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-duke-115"><span data-dcnode-id="6126" instrument_node="">[115]</span></a></sup><sup class="reference" data-dcnode-id="6121" id="cite_ref-cap_116-0"><a data-dcnode-id="6122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-cap-116"><span data-dcnode-id="6123" instrument_node="">[116]</span></a></sup><span data-dcnode-id="6120" instrument_node=""> Lancman sent out a mass mailing decrying Meng's and Crowley's stances on Israel and national defense.</span><sup class="reference" data-dcnode-id="6117" id="cite_ref-cap_116-1"><a data-dcnode-id="6118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-cap-116"><span data-dcnode-id="6119" instrument_node="">[116]</span></a></sup><span data-dcnode-id="6116" instrument_node="">
</span></p><p data-dcnode-id="6106"><span data-dcnode-id="6114" instrument_node="">Lancman also accused Meng of not supporting </span><a class="mw-redirect" data-dcnode-id="6112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/New_York_Assembly" title="New York Assembly"><span data-dcnode-id="6113" instrument_node="">New York Assembly</span></a><span data-dcnode-id="6111" instrument_node=""> legislation to increase the tax on millionaires. Meng said she was instrumental in passing the measure, and some members of the Assembly leadership claimed that both Lancman and Meng played a significant roll in the tax bill.</span><sup class="reference" data-dcnode-id="6108" id="cite_ref-duke_115-1"><a data-dcnode-id="6109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-duke-115"><span data-dcnode-id="6110" instrument_node="">[115]</span></a></sup><span data-dcnode-id="6107" instrument_node="">
</span></p><span data-dcnode-id="6105" instrument_node="">

</span><h4 data-dcnode-id="5873"><span class="mw-headline" data-dcnode-id="5874" id="Campaign_themes"><a data-dcnode-id="5875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Campaign_themes" title="Campaign themes"><span data-dcnode-id="5876" instrument_node="">Campaign themes</span></a></span></h4><span data-dcnode-id="5872" instrument_node="">
</span><p data-dcnode-id="5866"><span data-dcnode-id="5871" instrument_node="">Meng listed some of her campaign themes on her website:</span><sup class="reference" data-dcnode-id="5868" id="cite_ref-117"><a data-dcnode-id="5869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-117"><span data-dcnode-id="5870" instrument_node="">[117]</span></a></sup><span data-dcnode-id="5867" instrument_node="">
</span></p><span data-dcnode-id="5865" instrument_node="">
</span><ul data-dcnode-id="5862"><li data-dcnode-id="5863"><span data-dcnode-id="5864" instrument_node="">"Creating jobs for hardworking families in Queens will be my top priority when I get to Congress.  While we avoided plunging into a second Great Depression following the 2008 financial crisis, economic growth is still too slow and our unemployment rate is still too high. I have a clear vision and 4-point plan for bringing jobs back to Queens:</span></li></ul><span data-dcnode-id="5861" instrument_node="">
</span><dl data-dcnode-id="5854"><dd data-dcnode-id="5855"><dl data-dcnode-id="5856"><dd data-dcnode-id="5857"><ul data-dcnode-id="5858"><li data-dcnode-id="5859"><span data-dcnode-id="5860" instrument_node="">Immediate federal aid to local and state governments to hire more teachers, police officers and firefighters.</span></li></ul></dd></dl></dd></dl><span data-dcnode-id="5853" instrument_node="">
</span><dl data-dcnode-id="5846"><dd data-dcnode-id="5847"><dl data-dcnode-id="5848"><dd data-dcnode-id="5849"><ul data-dcnode-id="5850"><li data-dcnode-id="5851"><span data-dcnode-id="5852" instrument_node="">Federal transportation dollars – and transportation-related jobs – to Queens. I will seek appointment to the Committee on Transportation and Infrastructure in order to achieve this objective.</span></li></ul></dd></dl></dd></dl><span data-dcnode-id="5845" instrument_node="">
</span><dl data-dcnode-id="5838"><dd data-dcnode-id="5839"><dl data-dcnode-id="5840"><dd data-dcnode-id="5841"><ul data-dcnode-id="5842"><li data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">Tax credits for small businesses that hire new workers.</span></li></ul></dd></dl></dd></dl><span data-dcnode-id="5837" instrument_node="">
</span><dl data-dcnode-id="5830"><dd data-dcnode-id="5831"><dl data-dcnode-id="5832"><dd data-dcnode-id="5833"><ul data-dcnode-id="5834"><li data-dcnode-id="5835"><span data-dcnode-id="5836" instrument_node="">Investment in technological advancement and initiatives that will help Queens thrive as a technology corridor.</span></li></ul></dd></dl></dd></dl><span data-dcnode-id="5829" instrument_node="">
</span><ul data-dcnode-id="5826"><li data-dcnode-id="5827"><span data-dcnode-id="5828" instrument_node="">As a Member of Congress, I will oppose the right-wing assault on the health care and senior citizen programs that are so crucial to the fabric of our society.  I believe that every citizen should have access to quality, affordable health care; that individuals with pre-existing conditions should not be denied coverage; and that young people should continue to be able to stay on their parents’ insurance until they are 26.</span></li></ul><span data-dcnode-id="5825" instrument_node="">
</span><ul data-dcnode-id="5822"><li data-dcnode-id="5823"><span data-dcnode-id="5824" instrument_node="">We must also pass sensible, pro law enforcement gun legislation. In Congress I will fight for legislation:</span></li></ul><span data-dcnode-id="5821" instrument_node="">
</span><dl data-dcnode-id="5814"><dd data-dcnode-id="5815"><dl data-dcnode-id="5816"><dd data-dcnode-id="5817"><ul data-dcnode-id="5818"><li data-dcnode-id="5819"><span data-dcnode-id="5820" instrument_node="">Requiring all new semiautomatic pistols be capable of microstamping ammunition so that investigators can use bullet shell casings to identify perpetrators of gun violence;</span></li></ul></dd></dl></dd></dl><span data-dcnode-id="5813" instrument_node="">
</span><dl data-dcnode-id="5806"><dd data-dcnode-id="5807"><dl data-dcnode-id="5808"><dd data-dcnode-id="5809"><ul data-dcnode-id="5810"><li data-dcnode-id="5811"><span data-dcnode-id="5812" instrument_node="">Ensuring that all individuals prohibited from buying a firearm are uploaded to the national instant criminal background check system;</span></li></ul></dd></dl></dd></dl><span data-dcnode-id="5805" instrument_node="">
</span><dl data-dcnode-id="5798"><dd data-dcnode-id="5799"><dl data-dcnode-id="5800"><dd data-dcnode-id="5801"><ul data-dcnode-id="5802"><li data-dcnode-id="5803"><span data-dcnode-id="5804" instrument_node="">Requiring a background check for every firearm sale; and</span></li></ul></dd></dl></dd></dl><span data-dcnode-id="5797" instrument_node="">
</span><dl data-dcnode-id="5790"><dd data-dcnode-id="5791"><dl data-dcnode-id="5792"><dd data-dcnode-id="5793"><ul data-dcnode-id="5794"><li data-dcnode-id="5795"><span data-dcnode-id="5796" instrument_node="">Requiring employees of dealers in firearms submit to criminal background checks."</span></li></ul></dd></dl></dd></dl><span data-dcnode-id="5789" instrument_node="">
</span><p data-dcnode-id="5783"><span data-dcnode-id="5788" instrument_node="">Her priorities in Congress involved building up the transportation system and tourism in Queens, as well as raising taxes on the wealthy to allow for hiring more firefighters and police officers in the borough.</span><sup class="reference" data-dcnode-id="5785" id="cite_ref-118"><a data-dcnode-id="5786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-118"><span data-dcnode-id="5787" instrument_node="">[118]</span></a></sup><span data-dcnode-id="5784" instrument_node="">
</span></p><span data-dcnode-id="5782" instrument_node="">
</span></td></tr></tbody></table></td></tr></tbody></table></div><p data-dcnode-id="5770"><br data-dcnode-id="5772"><span data-dcnode-id="5771" instrument_node="">
</span></p><h3 data-dcnode-id="5767"><span class="mw-headline" data-dcnode-id="5768" id="2010"><span data-dcnode-id="5769" instrument_node="">2010</span></span></h3><span data-dcnode-id="5766" instrument_node="">

</span></td><td data-dcnode-id="5567" style="border: none; padding: 4px 10px;" valign="top"><span data-dcnode-id="5601" instrument_node="">
</span><ul data-dcnode-id="5596"><li data-dcnode-id="5597"><b data-dcnode-id="5599"><span data-dcnode-id="5600" instrument_node="">Jobs for Queens</span></b><span data-dcnode-id="5598" instrument_node="">: Creating jobs for hardworking families in Queens will be my top priority when I get to Congress.  While we avoided plunging into a second Great Depression following the 2008 financial crisis, economic growth is still too slow and our unemployment rate is still too high.</span></li></ul><span data-dcnode-id="5595" instrument_node="">
</span><ul data-dcnode-id="5590"><li data-dcnode-id="5591"><b data-dcnode-id="5593"><span data-dcnode-id="5594" instrument_node="">Health Care and Social Security</span></b><span data-dcnode-id="5592" instrument_node="">: As a Member of Congress, I will oppose the right-wing assault on the health care and senior citizen programs that are so crucial to the fabric of our society.  I believe that every citizen should have access to quality, affordable health care; that individuals with pre-existing conditions should not be denied coverage; and that young people should continue to be able to stay on their parents’ insurance until they are 26.</span></li></ul><span data-dcnode-id="5589" instrument_node="">
</span><ul data-dcnode-id="5584"><li data-dcnode-id="5585"><b data-dcnode-id="5587"><span data-dcnode-id="5588" instrument_node="">Tax Fairness</span></b><span data-dcnode-id="5586" instrument_node="">: Republicans in Washington insist on cutting spending for vital programs that provide relief to society’s most vulnerable citizens, while refusing to budge an inch on increasing revenue by requiring wealthy individuals and corporations to pay their fair share of taxes.  We must recapture lost revenue by ending subsidies to oil companies and corporations that ship jobs overseas, and implement tax reforms like the Buffet Rule so that those who have benefited most from society do their part to help improve it.</span></li></ul><span data-dcnode-id="5583" instrument_node="">
</span><ul data-dcnode-id="5578"><li data-dcnode-id="5579"><b data-dcnode-id="5581"><span data-dcnode-id="5582" instrument_node="">Civil Rights</span></b><span data-dcnode-id="5580" instrument_node="">: The continuous right-wing assault on women’s rights in Congress should be cause for alarm for all American families.  Providing women with access to reproductive health care, passing legislation like the Paycheck Fairness Act to make sure that women are compensated at the same rate as their male counterparts in the workplace, and protecting women from sexual violence and domestic abuse are not Democratic or Republican priorities – they are American priorities.</span></li></ul><span data-dcnode-id="5577" instrument_node="">
</span><ul data-dcnode-id="5569"><li data-dcnode-id="5570"><b data-dcnode-id="5575"><span data-dcnode-id="5576" instrument_node="">National Security and Foreign Policy</span></b><span data-dcnode-id="5574" instrument_node="">: In conducting our foreign policy, we must robustly defend our national security. In order to achieve this goal, we must stay on the offensive against Al Qaeda, prevent Iran from developing a nuclear weapon, protect long-term allies such as Israel, and remain committed to global human rights. We cannot sacrifice any of these objectives for the sake of political expediency or short-term economic gain.</span><sup class="reference" data-dcnode-id="5571" id="cite_ref-quotedisclaimer_121-0"><a data-dcnode-id="5572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-quotedisclaimer-121"><span data-dcnode-id="5573" instrument_node="">[121]</span></a></sup></li></ul><span data-dcnode-id="5568" instrument_node="">
</span></td><td data-dcnode-id="5564" style="border: none; color: #B2B7F2; font-size: 35px; font-family: 'Times New Roman', serif; font-weight: bold; text-align: right; padding: 10px 1px;" valign="bottom" width="20"><span data-dcnode-id="5565" instrument_node="">”

</span><dl data-dcnode-id="4098"><dd data-dcnode-id="4099"><dl data-dcnode-id="4100"><dd data-dcnode-id="4101"><i data-dcnode-id="4102"><span data-dcnode-id="4108" instrument_node="">See also: </span><a data-dcnode-id="4106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Changes_in_Net_Worth_of_U.S._Senators_and_Representatives_%28Personal_Gain_Index%29" title="Changes in Net Worth of U.S. Senators and Representatives (Personal Gain Index)"><span data-dcnode-id="4107" instrument_node="">Changes in Net Worth of U.S. Senators and Representatives (Personal Gain Index)</span></a><span data-dcnode-id="4105" instrument_node=""> and </span><a data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Net_worth_of_United_States_Senators_and_Representatives" title="Net worth of United States Senators and Representatives"><span data-dcnode-id="4104" instrument_node="">Net worth of United States Senators and Representatives</span></a></i></dd></dl></dd></dl><span data-dcnode-id="4097" instrument_node="">
</span><div class="floatleft" data-dcnode-id="4094"><a class="image" data-dcnode-id="4095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/File%3ANet_Worth_Metric_graphic.png"><img alt="Net Worth Metric graphic.png" data-dcnode-id="4096" data-file-height="600" data-file-width="600" decoding="async" height="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ballotpedia.s3.amazonaws.com/images/thumb/1/1f/Net_Worth_Metric_graphic.png/170px-Net_Worth_Metric_graphic.png&amp;raw" srcset="https://ballotpedia.s3.amazonaws.com/images/thumb/1/1f/Net_Worth_Metric_graphic.png/255px-Net_Worth_Metric_graphic.png 1.5x, https://ballotpedia.s3.amazonaws.com/images/thumb/1/1f/Net_Worth_Metric_graphic.png/340px-Net_Worth_Metric_graphic.png 2x" width="170"></a></div><span data-dcnode-id="4093" instrument_node="">
</span><p data-dcnode-id="4070"><span data-dcnode-id="4092" instrument_node="">Based on </span><a data-dcnode-id="4090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Household_net_worth_%28Member_of_Congress%29" title="Household net worth (Member of Congress)"><span data-dcnode-id="4091" instrument_node="">congressional financial disclosure forms</span></a><span data-dcnode-id="4089" instrument_node=""> and calculations made available by </span><i data-dcnode-id="4087"><span data-dcnode-id="4088" instrument_node="">OpenSecrets.org</span></i><span data-dcnode-id="4086" instrument_node="">, Mengs' net worth as of 2012 was estimated between $981,046 and $3,247,998. That averages to </span><b data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">$2,114,522</span></b><span data-dcnode-id="4083" instrument_node="">, which is lower than the average net worth of Democratic representatives in 2012 of $5,700,168.36. Meng ranked as the 143rd most wealthy representative in 2012.</span><sup class="reference" data-dcnode-id="4080" id="cite_ref-139"><a data-dcnode-id="4081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-139"><span data-dcnode-id="4082" instrument_node="">[139]</span></a></sup><span data-dcnode-id="4079" instrument_node=""> Between 2011 and 2012, Meng's calculated net worth</span><sup class="reference" data-dcnode-id="4076" id="cite_ref-140"><a data-dcnode-id="4077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-140"><span data-dcnode-id="4078" instrument_node="">[140]</span></a></sup><span data-dcnode-id="4075" instrument_node=""> decreased by an average of 8 percent per year. Between 2004 and 2012, the average annual percentage increase for a member of Congress was 15.4 percent.</span><sup class="reference" data-dcnode-id="4072" id="cite_ref-141"><a data-dcnode-id="4073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-141"><span data-dcnode-id="4074" instrument_node="">[141]</span></a></sup><span data-dcnode-id="4071" instrument_node="">
</span></p><span data-dcnode-id="4069" instrument_node="">

instrument_node="">-8%</span></b></td></tr><tr data-dcnode-id="4029"><td data-dcnode-id="4036" style="color:white;background-color:#444;text-align:center"><b data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">Average annual growth:</span></b></td><td data-dcnode-id="4030" style="text-align:center"><b data-dcnode-id="4031"><span data-dcnode-id="4035" instrument_node="">-8%</span><sup class="reference" data-dcnode-id="4032" id="cite_ref-142"><a data-dcnode-id="4033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-142"><span data-dcnode-id="4034" instrument_node="">[142]</span></a></sup></b></td></tr><tr data-dcnode-id="4013"><td colspan="2" data-dcnode-id="4014" style="color:black;background-color:#98FB98;text-align:center"><span data-dcnode-id="4028" instrument_node="">Comparatively, the </span><b data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">American citizen</span></b><span data-dcnode-id="4025" instrument_node=""> experienced a median yearly </span><i data-dcnode-id="4023"><span data-dcnode-id="4024" instrument_node="">decline</span></i><span data-dcnode-id="4022" instrument_node=""> in net worth of </span><b data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">-0.94%</span></b><span data-dcnode-id="4019" instrument_node="">.</span><sup class="reference" data-dcnode-id="4016" id="cite_ref-143"><a data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-143"><span data-dcnode-id="4018" instrument_node="">[143]</span></a></sup><b data-dcnode-id="4015"></b></td></tr></tbody></table><p data-dcnode-id="4006"><small data-dcnode-id="4008"><i data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">The data used to calculate changes in net worth may include changes resulting from assets gained through marriage, inheritance, changes in family estates and/or trusts, changes in family business ownership, and many other variables unrelated to a member's behavior in Congress.</span></i></small><span data-dcnode-id="4007" instrument_node="">
</span></p><h3 data-dcnode-id="4003"><span class="mw-headline" data-dcnode-id="4004" id="PGI:_Donation_Concentration_Metric"><span data-dcnode-id="4005" instrument_node="">PGI: Donation Concentration Metric</span></span></h3><span data-dcnode-id="4002" instrument_node="">

</span><p data-dcnode-id="3982"><span data-dcnode-id="3992" instrument_node="">Filings required by the </span><a data-dcnode-id="3990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Federal_Election_Commission" title="Federal Election Commission"><span data-dcnode-id="3991" instrument_node="">Federal Election Commission</span></a><span data-dcnode-id="3989" instrument_node=""> report on the industries that give to each candidate. Using campaign filings and information calculated by </span><i data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">OpenSecrets.org</span></i><span data-dcnode-id="3986" instrument_node="">, Ballotpedia calculated the percentage of donations by industry received by each incumbent over the course of his or her career (or 1989 and later, if elected prior to 1988). Meng received the most donations from individuals and PACs employed by the </span><i data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">Real Estate</span></i><span data-dcnode-id="3983" instrument_node=""> industry.
</span></p><p data-dcnode-id="3974"><span data-dcnode-id="3981" instrument_node="">From 2011-2014, </span><b data-dcnode-id="3979"><span data-dcnode-id="3980" instrument_node="">17.9 percent of Meng's career contributions came from the top five industries as listed below.</span></b><sup class="reference" data-dcnode-id="3976" id="cite_ref-144"><a data-dcnode-id="3977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-144"><span data-dcnode-id="3978" instrument_node="">[144]</span></a></sup><span data-dcnode-id="3975" instrument_node="">

</span><h3 data-dcnode-id="3855"><span class="mw-headline" data-dcnode-id="3856" id="Ideology_and_leadership"><span data-dcnode-id="3857" instrument_node="">Ideology and leadership</span></span></h3><span data-dcnode-id="3854" instrument_node="">
</span><dl data-dcnode-id="3846"><dd data-dcnode-id="3847"><dl data-dcnode-id="3848"><dd data-dcnode-id="3849"><i data-dcnode-id="3850"><span data-dcnode-id="3853" instrument_node="">See also: </span><a data-dcnode-id="3851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/GovTrack%2527s_Political_Spectrum_%2526_Legislative_Leadership_ranking" title="GovTrack's Political Spectrum &amp; Legislative Leadership ranking"><span data-dcnode-id="3852" instrument_node="">GovTrack's Political Spectrum &amp; Legislative Leadership ranking</span></a></i></dd></dl></dd></dl><span data-dcnode-id="3845" instrument_node="">
</span><p data-dcnode-id="3833"><span data-dcnode-id="3844" instrument_node="">Based on an analysis of bill sponsorship by </span><i data-dcnode-id="3842"><span data-dcnode-id="3843" instrument_node="">GovTrack</span></i><span data-dcnode-id="3841" instrument_node="">, Meng was a </span><a data-dcnode-id="3839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/GovTrack%2527s_Political_Spectrum_%2526_Legislative_Leadership_ranking" title="GovTrack's Political Spectrum &amp; Legislative Leadership ranking"><span data-dcnode-id="3840" instrument_node="">rank-and-file Democrat</span></a><span data-dcnode-id="3838" instrument_node=""> as of August 2014.</span><sup class="reference" data-dcnode-id="3835" id="cite_ref-govtrack_145-0"><a data-dcnode-id="3836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-govtrack-145"><span data-dcnode-id="3837" instrument_node="">[145]</span></a></sup><span data-dcnode-id="3834" instrument_node="">
</span></p><span data-dcnode-id="3832" instrument_node="">

</span><p data-dcnode-id="3819"><span data-dcnode-id="3827" instrument_node="">The website </span><i data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">OpenCongress</span></i><span data-dcnode-id="3824" instrument_node=""> tracks the voting records of each member to determine with whom he or she votes most and least often. The results include a member from each party.</span><sup class="reference" data-dcnode-id="3821" id="cite_ref-146"><a data-dcnode-id="3822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-146"><span data-dcnode-id="3823" instrument_node="">[146]</span></a></sup><span data-dcnode-id="3820" instrument_node="">
