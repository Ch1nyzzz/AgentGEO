</span><div data-dcnode-id="11072" style="display: none;"></div><span data-dcnode-id="11071" instrument_node="">
</span><p data-dcnode-id="11058"><b data-dcnode-id="11069"><span data-dcnode-id="11070" instrument_node="">Grace Meng</span></b><span data-dcnode-id="11068" instrument_node=""> (</span><a data-dcnode-id="11066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ballotpedia.org/Democratic_Party"><span data-dcnode-id="11067" instrument_node="">Democratic Party</span></a><span data-dcnode-id="11065" instrument_node="">) is a member of the </span><a data-dcnode-id="11063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ballotpedia.org/United_States_House_of_Representatives"><span data-dcnode-id="11064" instrument_node="">U.S. House</span></a><span data-dcnode-id="11062" instrument_node="">, representing </span><a data-dcnode-id="11060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ballotpedia.org/New_York%2527s_6th_Congressional_District"><span data-dcnode-id="11061" instrument_node="">New York's 6th Congressional District</span></a><span data-dcnode-id="11059" instrument_node="">. She assumed office on January 3, 2013. Her current term ends on January 3, 2023.</span></p><p data-dcnode-id="11044"><span data-dcnode-id="11057" instrument_node="">Meng (Democratic Party, Working Families Party)  ran for re-election to the </span><a data-dcnode-id="11055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ballotpedia.org/United_States_House_of_Representatives"><span data-dcnode-id="11056" instrument_node="">U.S. House</span></a><span data-dcnode-id="11054" instrument_node=""> to represent </span><a data-dcnode-id="11052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ballotpedia.org/New_York%2527s_6th_Congressional_District"><span data-dcnode-id="11053" instrument_node="">New York's 6th Congressional District</span></a><span data-dcnode-id="11051" instrument_node="">. She won  in the general election on </span><a data-dcnode-id="11049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ballotpedia.org/New_York%2527s_6th_Congressional_District_election%2C_2020"><span data-dcnode-id="11050" instrument_node="">November 3, 2020</span></a><span data-dcnode-id="11048" instrument_node="">. She advanced  from the Democratic  primary on </span><a data-dcnode-id="11046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ballotpedia.org/New_York%2527s_6th_Congressional_District_election%2C_2020"><span data-dcnode-id="11047" instrument_node="">June 23, 2020</span></a><span data-dcnode-id="11045" instrument_node="">. </span></p><span data-dcnode-id="11043" instrument_node="">
</span><p data-dcnode-id="11028"><span data-dcnode-id="11042" instrument_node="">Meng is the first Asian American member of </span><a class="mw-redirect" data-dcnode-id="11040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/Congress" title="Congress"><span data-dcnode-id="11041" instrument_node="">Congress</span></a><span data-dcnode-id="11039" instrument_node=""> from </span><a data-dcnode-id="11037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/New_York" title="New York"><span data-dcnode-id="11038" instrument_node="">New York</span></a><span data-dcnode-id="11036" instrument_node="">.</span><sup class="reference" data-dcnode-id="11033" id="cite_ref-1"><a data-dcnode-id="11034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23cite_note-1"><span data-dcnode-id="11035" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="11030" id="cite_ref-2"><a data-dcnode-id="11031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23cite_note-2"><span data-dcnode-id="11032" instrument_node="">[2]</span></a></sup><span data-dcnode-id="11029" instrument_node="">
</span></p><p data-dcnode-id="11016"><span data-dcnode-id="11027" instrument_node="">Meng was elected unanimously as vice chair of the Democratic National Committee in 2016.</span><sup class="reference" data-dcnode-id="11024" id="cite_ref-3"><a data-dcnode-id="11025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23cite_note-3"><span data-dcnode-id="11026" instrument_node="">[3]</span></a></sup><span data-dcnode-id="11023" instrument_node="">  Before her successful bid for </span><a data-dcnode-id="11021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/United_States_Congress" title="United States Congress"><span data-dcnode-id="11022" instrument_node="">Congress</span></a><span data-dcnode-id="11020" instrument_node=""> in 2012, Meng was a member of the </span><a data-dcnode-id="11018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/New_York_State_Assembly" title="New York State Assembly"><span data-dcnode-id="11019" instrument_node="">New York State Assembly</span></a><span data-dcnode-id="11017" instrument_node="">.
</span></p><p data-dcnode-id="11011"><span data-dcnode-id="11015" instrument_node="">Based on analysis of </span><a data-dcnode-id="11013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/Grace_Meng%23Analysis" title="Grace Meng"><span data-dcnode-id="11014" instrument_node="">multiple outside rankings</span></a><span data-dcnode-id="11012" instrument_node="">, Meng is an average Democratic member of Congress, meaning she will vote with the Democratic Party on the majority of bills.
</span></p><span data-dcnode-id="11010" instrument_node="">

</span><div class="five-bill-desc" data-dcnode-id="9774"><span data-dcnode-id="9775" instrument_node="">To expand federal regulations and restrictions on online political communications, mandate that social media companies keep detailed records on individuals and organizations sponsoring political ads, require political campaigns to report offers of foreign assistance, prohibit foreign nationals from contributing to ballot initiative and referendum campaigns, increase restrictions on U.S. political campaigns soliciting support from foreign entities, and make it a federal crime to mislead voters about the time and place for voting and qualifications to vote.</span></div><span data-dcnode-id="9773" instrument_node="">

</span><div class="five-bill-desc" data-dcnode-id="9734"><span data-dcnode-id="9735" instrument_node="">To mandate that states or local governments must get approval of the federal government before they make changes to voting practices in certain circumstances. This mandate for federal "pre-clearance" would apply to any state that has had 15 or more voting rights act violations in the past 25 years. The mandate would apply to local governments that have had at least 3 voting rights act violations in the past 25 years.</span></div><span data-dcnode-id="9733" instrument_node="">

</span><div class="five-bill-desc" data-dcnode-id="9694"><span data-dcnode-id="9695" instrument_node="">To impeach President Donald Trump for abusing his power in calling for the announcement of a Ukrainian investigation of a political rival (Joe Biden) in exchange for a meeting with the president and the release of previously-approved foreign aid. Upon passage of these articles of impeachment, the Senate will now hold a trial on removing the president from office, which would require approval by a two-thirds majority of senators present for the vote.</span></div><span data-dcnode-id="9693" instrument_node="">

</span><div class="floatleft" data-dcnode-id="8378"><a data-dcnode-id="8379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="CongressLogo.png" data-dcnode-id="8380" data-file-height="1282" data-file-width="1266" decoding="async" height="101" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ballotpedia.s3.amazonaws.com/images/thumb/2/23/CongressLogo.png/100px-CongressLogo.png&amp;raw" srcset="https://ballotpedia.s3.amazonaws.com/images/thumb/2/23/CongressLogo.png/150px-CongressLogo.png 1.5x, https://ballotpedia.s3.amazonaws.com/images/thumb/2/23/CongressLogo.png/200px-CongressLogo.png 2x" width="100"></a></div><span data-dcnode-id="8377" instrument_node="">
</span><p data-dcnode-id="8352"><span data-dcnode-id="8376" instrument_node="">The first session of the </span><a class="mw-redirect" data-dcnode-id="8374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/114th_Congress" title="114th Congress"><span data-dcnode-id="8375" instrument_node="">114th Congress</span></a><span data-dcnode-id="8373" instrument_node=""> enacted into law six out of the 2,616 introduced bills (0.2 percent). Comparatively, the </span><a class="mw-redirect" data-dcnode-id="8371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/113th_Congress" title="113th Congress"><span data-dcnode-id="8372" instrument_node="">113th Congress</span></a><span data-dcnode-id="8370" instrument_node=""> had 1.3 percent of introduced bills enacted into law in the first session. In the second session, the </span><a class="mw-redirect" data-dcnode-id="8368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/114th_Congress" title="114th Congress"><span data-dcnode-id="8369" instrument_node="">114th Congress</span></a><span data-dcnode-id="8367" instrument_node=""> enacted 133 out of 3,159 introduced bills (4.2 percent). Comparatively, the </span><a class="mw-redirect" data-dcnode-id="8365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/113th_Congress" title="113th Congress"><span data-dcnode-id="8366" instrument_node="">113th Congress</span></a><span data-dcnode-id="8364" instrument_node=""> had 7.0 percent of introduced bills enacted into law in the second session.</span><sup class="reference" data-dcnode-id="8361" id="cite_ref-46"><a data-dcnode-id="8362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-46"><span data-dcnode-id="8363" instrument_node="">[46]</span></a></sup><sup class="reference" data-dcnode-id="8358" id="cite_ref-47"><a data-dcnode-id="8359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-47"><span data-dcnode-id="8360" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8357" instrument_node="">  For more information pertaining to Meng's voting record in the 114th Congress, please see the below sections.</span><sup class="reference" data-dcnode-id="8354" id="cite_ref-48"><a data-dcnode-id="8355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-48"><span data-dcnode-id="8356" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8353" instrument_node="">
</span></p><span data-dcnode-id="8351" instrument_node="">
</span><h4 data-dcnode-id="8348"><span class="mw-headline" data-dcnode-id="8349" id="Economic_and_fiscal"><span data-dcnode-id="8350" instrument_node="">Economic and fiscal</span></span></h4><span data-dcnode-id="8347" instrument_node="">
</span><h5 data-dcnode-id="8344"><span class="mw-headline" data-dcnode-id="8345" id="Trade_Act_of_2015"><span data-dcnode-id="8346" instrument_node="">Trade Act of 2015</span></span></h5><span data-dcnode-id="8343" instrument_node="">
</span><dl data-dcnode-id="8334"><dd data-dcnode-id="8335"><dl data-dcnode-id="8336"><dd data-dcnode-id="8337"><i data-dcnode-id="8339"><span data-dcnode-id="8342" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="8340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/The_Trans-Pacific_Partnership_trade_deal%2C_2015" title="The Trans-Pacific Partnership trade deal, 2015"><span data-dcnode-id="8341" instrument_node="">The Trans-Pacific Partnership trade deal, 2015</span></a></i><br data-dcnode-id="8338"></dd></dl></dd></dl><span data-dcnode-id="8333" instrument_node="">
</span><p data-dcnode-id="8189"><b data-dcnode-id="8331"><span data-dcnode-id="8332" instrument_node="">Trade adjustment assistance</span></b><br data-dcnode-id="8330"><span data-dcnode-id="8329" instrument_node="">
</span><a data-dcnode-id="8327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="8328" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="8326" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="8325" instrument_node=""> On June 12, 2015, the </span><a class="mw-redirect" data-dcnode-id="8323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/U.S._House_of_Representatives" title="U.S. House of Representatives"><span data-dcnode-id="8324" instrument_node="">House</span></a><span data-dcnode-id="8322" instrument_node=""> rejected the </span><a class="mw-redirect" data-dcnode-id="8320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Trade_adjustment_assistance" title="Trade adjustment assistance"><span data-dcnode-id="8321" instrument_node="">trade adjustment assistance (TAA)</span></a><span data-dcnode-id="8319" instrument_node=""> measure in </span><a class="external text" data-dcnode-id="8317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/1314" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8318" instrument_node="">HR 1314—the Trade Act of 2015</span></a><span data-dcnode-id="8316" instrument_node="">—by a vote of 126-302. </span><a class="mw-redirect" data-dcnode-id="8314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Trade_adjustment_assistance" title="Trade adjustment assistance"><span data-dcnode-id="8315" instrument_node="">Trade adjustment assistance (TAA)</span></a><span data-dcnode-id="8313" instrument_node=""> is a federal program providing American workers displaced by foreign trade agreements with job training and services. The measure was packaged with </span><a data-dcnode-id="8311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Trade_promotion_authority_%28TPA%29" title="Trade promotion authority (TPA)"><span data-dcnode-id="8312" instrument_node="">trade promotion authority (TPA)</span></a><span data-dcnode-id="8310" instrument_node="">, also known as fast-track authority. TPA is a legislative procedure that allows Congress to define "U.S. negotiating objectives and spells out a detailed oversight and consultation process for during trade negotiations. Under TPA, Congress retains the authority to review and decide whether any proposed U.S. trade agreement will be implemented," according to the Office of the United States Trade Representative. Meng was one of 144 Democrats to vote against the bill.</span><sup class="reference" data-dcnode-id="8307" id="cite_ref-49"><a data-dcnode-id="8308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-49"><span data-dcnode-id="8309" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="8304" id="cite_ref-50"><a data-dcnode-id="8305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-50"><span data-dcnode-id="8306" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8303" instrument_node="">
</span><br data-dcnode-id="8302"><b data-dcnode-id="8300"><span data-dcnode-id="8301" instrument_node="">Trade promotion authority</span></b><br data-dcnode-id="8299"><span data-dcnode-id="8298" instrument_node="">
</span><a data-dcnode-id="8296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="8297" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="8295" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="8294" instrument_node=""> On June 12, 2015, the </span><a class="mw-redirect" data-dcnode-id="8292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/U.S._House_of_Representatives" title="U.S. House of Representatives"><span data-dcnode-id="8293" instrument_node="">House</span></a><span data-dcnode-id="8291" instrument_node=""> passed the </span><a data-dcnode-id="8289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Trade_promotion_authority_%28TPA%29" title="Trade promotion authority (TPA)"><span data-dcnode-id="8290" instrument_node="">trade promotion authority (TPA)</span></a><span data-dcnode-id="8288" instrument_node=""> measure in </span><a class="external text" data-dcnode-id="8286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/1314" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8287" instrument_node="">HR 1314—the Trade Act of 2015</span></a><span data-dcnode-id="8285" instrument_node=""> —by a vote of 219-211. TPA gives the </span><a data-dcnode-id="8283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/President_of_the_United_States" title="President of the United States"><span data-dcnode-id="8284" instrument_node="">president</span></a><span data-dcnode-id="8282" instrument_node=""> fast-track authority to negotiate trade agreements sent to </span><a class="mw-redirect" data-dcnode-id="8280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/U.S._Congress" title="U.S. Congress"><span data-dcnode-id="8281" instrument_node="">Congress</span></a><span data-dcnode-id="8279" instrument_node=""> without the opportunity for amendment or filibuster. Although the House approved TPA, it was a largely symbolic vote given the measure was part of a package trade bill including </span><a class="mw-redirect" data-dcnode-id="8277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Trade_adjustment_assistance" title="Trade adjustment assistance"><span data-dcnode-id="8278" instrument_node="">trade adjustment assistance (TAA)</span></a><span data-dcnode-id="8276" instrument_node="">, which was rejected earlier the same day. Meng was one of 157 </span><a class="mw-redirect" data-dcnode-id="8274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="8275" instrument_node="">Democrats</span></a><span data-dcnode-id="8273" instrument_node=""> to vote against the measure.</span><sup class="reference" data-dcnode-id="8270" id="cite_ref-51"><a data-dcnode-id="8271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-51"><span data-dcnode-id="8272" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="8267" id="cite_ref-52"><a data-dcnode-id="8268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-52"><span data-dcnode-id="8269" instrument_node="">[52]</span></a></sup><span data-dcnode-id="8266" instrument_node="">
</span><br data-dcnode-id="8265"><b data-dcnode-id="8263"><span data-dcnode-id="8264" instrument_node="">Trade promotion authority second vote</span></b><br data-dcnode-id="8262"><span data-dcnode-id="8261" instrument_node="">
</span><a data-dcnode-id="8259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="8260" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="8258" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="8257" instrument_node=""> After the </span><a class="mw-redirect" data-dcnode-id="8255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Trade_adjustment_assistance" title="Trade adjustment assistance"><span data-dcnode-id="8256" instrument_node="">trade adjustment assistance (TAA)</span></a><span data-dcnode-id="8254" instrument_node=""> and </span><a data-dcnode-id="8252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Trade_promotion_authority_%28TPA%29" title="Trade promotion authority (TPA)"><span data-dcnode-id="8253" instrument_node="">trade promotion authority (TPA)</span></a><span data-dcnode-id="8251" instrument_node=""> did not pass the </span><a class="mw-redirect" data-dcnode-id="8249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/U.S._House_of_Representatives" title="U.S. House of Representatives"><span data-dcnode-id="8250" instrument_node="">House</span></a><span data-dcnode-id="8248" instrument_node=""> together on June 12, 2015, representatives voted to authorize TPA alone as an amendment to </span><a class="external text" data-dcnode-id="8246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/2146/text/eah" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8247" instrument_node="">HR 2146—the Defending Public Safety Employees' Retirement Act</span></a><span data-dcnode-id="8245" instrument_node="">—on June 18, 2015. The amendment passed by a vote of 218-208, with all voting members of the House maintaining his or her original position on TPA except for </span><a data-dcnode-id="8243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Ted_Yoho" title="Ted Yoho"><span data-dcnode-id="8244" instrument_node="">Ted Yoho</span></a><span data-dcnode-id="8242" instrument_node=""> (R-Fla.). Meng was one of 158 </span><a class="mw-redirect" data-dcnode-id="8240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="8241" instrument_node="">Democrats</span></a><span data-dcnode-id="8239" instrument_node=""> to vote against the amendment.</span><sup class="reference" data-dcnode-id="8236" id="cite_ref-53"><a data-dcnode-id="8237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-53"><span data-dcnode-id="8238" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="8233" id="cite_ref-54"><a data-dcnode-id="8234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-54"><span data-dcnode-id="8235" instrument_node="">[54]</span></a></sup><span data-dcnode-id="8232" instrument_node="">
</span><br data-dcnode-id="8231"><b data-dcnode-id="8229"><span data-dcnode-id="8230" instrument_node="">Trade adjustment assistance second vote</span></b><br data-dcnode-id="8228"><span data-dcnode-id="8227" instrument_node="">
</span><a data-dcnode-id="8225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Yea3.png" data-dcnode-id="8226" data-file-height="107" data-file-width="193" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/50px-Yea3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/75px-Yea3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/100px-Yea3.png 2x" width="50"></a><span data-dcnode-id="8224" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="8222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/U.S._House_of_Representatives" title="U.S. House of Representatives"><span data-dcnode-id="8223" instrument_node="">House</span></a><span data-dcnode-id="8221" instrument_node=""> passed </span><a class="external text" data-dcnode-id="8219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/1295" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8220" instrument_node="">HR 1295—the Trade Preferences Extension Act of 2015</span></a><span data-dcnode-id="8218" instrument_node="">—on June 25, 2015, by a vote of 286-138. The </span><a class="mw-redirect" data-dcnode-id="8216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/U.S._Senate" title="U.S. Senate"><span data-dcnode-id="8217" instrument_node="">Senate</span></a><span data-dcnode-id="8215" instrument_node=""> packaged </span><a class="mw-redirect" data-dcnode-id="8213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Trade_adjustment_assistance" title="Trade adjustment assistance"><span data-dcnode-id="8214" instrument_node="">trade adjustment assistance (TAA)</span></a><span data-dcnode-id="8212" instrument_node=""> in this bill after the House rejected the TAA measure in </span><a class="external text" data-dcnode-id="8210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/1314/text" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8211" instrument_node="">HR 1314—the Trade Act of 2015</span></a><span data-dcnode-id="8209" instrument_node="">. Along with </span><a data-dcnode-id="8207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Trade_promotion_authority_%28TPA%29" title="Trade promotion authority (TPA)"><span data-dcnode-id="8208" instrument_node="">trade promotion authority (TPA)</span></a><span data-dcnode-id="8206" instrument_node="">, which </span><a class="mw-redirect" data-dcnode-id="8204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/U.S._Congress" title="U.S. Congress"><span data-dcnode-id="8205" instrument_node="">Congress</span></a><span data-dcnode-id="8203" instrument_node=""> passed as part of </span><a class="external text" data-dcnode-id="8201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/2146" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8202" instrument_node="">HR 2146—the Defending Public Safety Employees' Retirement Act</span></a><span data-dcnode-id="8200" instrument_node="">—TAA became law on June 29, 2015. Meng was one of 175 </span><a class="mw-redirect" data-dcnode-id="8198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="8199" instrument_node="">Democrats</span></a><span data-dcnode-id="8197" instrument_node=""> to vote in favor of HR 1295.</span><sup class="reference" data-dcnode-id="8194" id="cite_ref-55"><a data-dcnode-id="8195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-55"><span data-dcnode-id="8196" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="8191" id="cite_ref-56"><a data-dcnode-id="8192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-56"><span data-dcnode-id="8193" instrument_node="">[56]</span></a></sup><span data-dcnode-id="8190" instrument_node="">
</span></p><span data-dcnode-id="8188" instrument_node="">
</span><h5 data-dcnode-id="8185"><span class="mw-headline" data-dcnode-id="8186" id="Defense_spending_authorization"><span data-dcnode-id="8187" instrument_node="">Defense spending authorization</span></span></h5><span data-dcnode-id="8184" instrument_node="">
</span><p data-dcnode-id="8153"><a data-dcnode-id="8182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="8183" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="8181" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="8180" instrument_node=""> On May 15, 2015, the </span><a data-dcnode-id="8178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="8179" instrument_node="">House</span></a><span data-dcnode-id="8177" instrument_node=""> passed </span><a class="external text" data-dcnode-id="8175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/1735%3Fq%3D%257B%2522search%2522%253A%255B%2522hr%2B1735%2522%255D%257D" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8176" instrument_node="">HR 1735—the National Defense Authorization Act for Fiscal Year 2016</span></a><span data-dcnode-id="8174" instrument_node="">—by a vote of 269-151. The bill "authorizes FY2016 appropriations and sets forth policies for Department of Defense (DOD) programs and activities, including military personnel strengths. It does not provide budget authority, which is provided in subsequent appropriations legislation." Meng voted with 142 other </span><a class="mw-redirect" data-dcnode-id="8172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="8173" instrument_node="">Democrats</span></a><span data-dcnode-id="8171" instrument_node=""> and eight </span><a class="mw-redirect" data-dcnode-id="8169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Republicans" title="Republicans"><span data-dcnode-id="8170" instrument_node="">Republicans</span></a><span data-dcnode-id="8168" instrument_node=""> against the bill.</span><sup class="reference" data-dcnode-id="8165" id="cite_ref-57"><a data-dcnode-id="8166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-57"><span data-dcnode-id="8167" instrument_node="">[57]</span></a></sup><span data-dcnode-id="8164" instrument_node=""> The Senate passed the bill on June 18, 2015, by a vote of 71-25. President </span><a data-dcnode-id="8162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Barack_Obama" title="Barack Obama"><span data-dcnode-id="8163" instrument_node="">Barack Obama</span></a><span data-dcnode-id="8161" instrument_node=""> </span><a data-dcnode-id="8159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Barack_Obama%3A_Vetoed_legislation" title="Barack Obama: Vetoed legislation"><span data-dcnode-id="8160" instrument_node="">vetoed the bill</span></a><span data-dcnode-id="8158" instrument_node=""> on October 22, 2015.</span><sup class="reference" data-dcnode-id="8155" id="cite_ref-58"><a data-dcnode-id="8156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-58"><span data-dcnode-id="8157" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8154" instrument_node="">
</span></p><p data-dcnode-id="8116"><a data-dcnode-id="8151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Yea3.png" data-dcnode-id="8152" data-file-height="107" data-file-width="193" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/50px-Yea3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/75px-Yea3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/100px-Yea3.png 2x" width="50"></a><span data-dcnode-id="8150" instrument_node=""> On November 5, 2015, the </span><a data-dcnode-id="8148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="8149" instrument_node="">House</span></a><span data-dcnode-id="8147" instrument_node=""> passed </span><a class="external text" data-dcnode-id="8145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/senate-bill/1356%3Fq%3D%257B%2522search%2522%253A%255B%2522%255C%2522s1356%255C%2522%2522%255D%257D%26resultIndex%3D1" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8146" instrument_node="">S 1356—the National Defense Authorization Act for Fiscal Year 2016</span></a><span data-dcnode-id="8144" instrument_node="">—by a vote of 370-58. The second version of the $607 billion national defense bill included $5 billion in cuts to match what was approved in the budget and language preventing the closure of the Guantanamo Bay military prison.</span><sup class="reference" data-dcnode-id="8141" id="cite_ref-59"><a data-dcnode-id="8142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-59"><span data-dcnode-id="8143" instrument_node="">[59]</span></a></sup><sup class="reference" data-dcnode-id="8138" id="cite_ref-60"><a data-dcnode-id="8139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-60"><span data-dcnode-id="8140" instrument_node="">[60]</span></a></sup><span data-dcnode-id="8137" instrument_node=""> Meng voted with 134 other </span><a class="mw-redirect" data-dcnode-id="8135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="8136" instrument_node="">Democrats</span></a><span data-dcnode-id="8134" instrument_node=""> and 235 </span><a class="mw-redirect" data-dcnode-id="8132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Republicans" title="Republicans"><span data-dcnode-id="8133" instrument_node="">Republicans</span></a><span data-dcnode-id="8131" instrument_node=""> to approve the bill.</span><sup class="reference" data-dcnode-id="8128" id="cite_ref-61"><a data-dcnode-id="8129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-61"><span data-dcnode-id="8130" instrument_node="">[61]</span></a></sup><span data-dcnode-id="8127" instrument_node=""> On November 10, 2015, the </span><a data-dcnode-id="8125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_Senate" title="United States Senate"><span data-dcnode-id="8126" instrument_node="">Senate</span></a><span data-dcnode-id="8124" instrument_node=""> passed the bill by a vote of 91-3, and President </span><a data-dcnode-id="8122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Barack_Obama" title="Barack Obama"><span data-dcnode-id="8123" instrument_node="">Barack Obama</span></a><span data-dcnode-id="8121" instrument_node=""> signed it into law on November 25, 2015.</span><sup class="reference" data-dcnode-id="8118" id="cite_ref-62"><a data-dcnode-id="8119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-62"><span data-dcnode-id="8120" instrument_node="">[62]</span></a></sup><span data-dcnode-id="8117" instrument_node="">
</span></p><span data-dcnode-id="8115" instrument_node="">
</span><h5 data-dcnode-id="8112"><span class="mw-headline" data-dcnode-id="8113" id="2016_Budget_proposal"><span data-dcnode-id="8114" instrument_node="">2016 Budget proposal</span></span></h5><span data-dcnode-id="8111" instrument_node="">
</span><p data-dcnode-id="8087"><a data-dcnode-id="8109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="8110" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="8108" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="8107" instrument_node=""> On April 30, 2015, the </span><a data-dcnode-id="8105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="8106" instrument_node="">House</span></a><span data-dcnode-id="8104" instrument_node=""> voted to approve </span><a class="external text" data-dcnode-id="8102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/senate-concurrent-resolution/11" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8103" instrument_node="">SConRes11</span></a><span data-dcnode-id="8101" instrument_node="">, a congressional budget proposal for fiscal year 2016, by a vote of 226-197. The non-binding resolution was designed to create 12 appropriations bills to fund the government. All 183 </span><a class="mw-redirect" data-dcnode-id="8099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="8100" instrument_node="">Democrats</span></a><span data-dcnode-id="8098" instrument_node=""> who voted, including Meng, voted against the resolution.</span><sup class="reference" data-dcnode-id="8095" id="cite_ref-63"><a data-dcnode-id="8096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-63"><span data-dcnode-id="8097" instrument_node="">[63]</span></a></sup><sup class="reference" data-dcnode-id="8092" id="cite_ref-64"><a data-dcnode-id="8093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-64"><span data-dcnode-id="8094" instrument_node="">[64]</span></a></sup><sup class="reference" data-dcnode-id="8089" id="cite_ref-65"><a data-dcnode-id="8090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-65"><span data-dcnode-id="8091" instrument_node="">[65]</span></a></sup><span data-dcnode-id="8088" instrument_node="">
</span></p><span data-dcnode-id="8086" instrument_node="">
</span><h5 data-dcnode-id="8083"><span class="mw-headline" data-dcnode-id="8084" id="2015_budget"><span data-dcnode-id="8085" instrument_node="">2015 budget</span></span></h5><span data-dcnode-id="8082" instrument_node="">
</span><p data-dcnode-id="8048"><a data-dcnode-id="8080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Yea3.png" data-dcnode-id="8081" data-file-height="107" data-file-width="193" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/50px-Yea3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/75px-Yea3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/100px-Yea3.png 2x" width="50"></a><span data-dcnode-id="8079" instrument_node=""> On October 28, 2015, the </span><a data-dcnode-id="8077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="8078" instrument_node="">House</span></a><span data-dcnode-id="8076" instrument_node=""> passed </span><a class="external text" data-dcnode-id="8074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/1314/text%3Fq%3D%257B%2522search%2522%253A%255B%2522%255C%2522hr1314%255C%2522%2522%255D%257D%26resultIndex%3D1" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8075" instrument_node="">HR 1314—the Bipartisan Budget Act of 2015</span></a><span data-dcnode-id="8073" instrument_node="">—by a vote of 266-167. The bill increased military and domestic spending levels and suspended the debt ceiling until March 2017.</span><sup class="reference" data-dcnode-id="8070" id="cite_ref-66"><a data-dcnode-id="8071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-66"><span data-dcnode-id="8072" instrument_node="">[66]</span></a></sup><span data-dcnode-id="8069" instrument_node=""> Meng voted with 186 </span><a class="mw-redirect" data-dcnode-id="8067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="8068" instrument_node="">Democrats</span></a><span data-dcnode-id="8066" instrument_node=""> and 79 </span><a class="mw-redirect" data-dcnode-id="8064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Republicans" title="Republicans"><span data-dcnode-id="8065" instrument_node="">Republicans</span></a><span data-dcnode-id="8063" instrument_node=""> in favor of the bill.</span><sup class="reference" data-dcnode-id="8060" id="cite_ref-67"><a data-dcnode-id="8061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-67"><span data-dcnode-id="8062" instrument_node="">[67]</span></a></sup><span data-dcnode-id="8059" instrument_node=""> It passed the </span><a data-dcnode-id="8057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_Senate" title="United States Senate"><span data-dcnode-id="8058" instrument_node="">Senate</span></a><span data-dcnode-id="8056" instrument_node=""> on October 30, 2015.</span><sup class="reference" data-dcnode-id="8053" id="cite_ref-68"><a data-dcnode-id="8054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-68"><span data-dcnode-id="8055" instrument_node="">[68]</span></a></sup><span data-dcnode-id="8052" instrument_node=""> President </span><a data-dcnode-id="8050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Barack_Obama" title="Barack Obama"><span data-dcnode-id="8051" instrument_node="">Barack Obama</span></a><span data-dcnode-id="8049" instrument_node=""> signed it into law on November 2, 2015. 
</span></p><span data-dcnode-id="8047" instrument_node="">
</span><h4 data-dcnode-id="8044"><span class="mw-headline" data-dcnode-id="8045" id="Foreign_Affairs"><span data-dcnode-id="8046" instrument_node="">Foreign Affairs</span></span></h4><span data-dcnode-id="8043" instrument_node="">
</span><h5 data-dcnode-id="8040"><span class="mw-headline" data-dcnode-id="8041" id="Iran_nuclear_deal"><span data-dcnode-id="8042" instrument_node="">Iran nuclear deal</span></span></h5><span data-dcnode-id="8039" instrument_node="">
</span><dl data-dcnode-id="8031"><dd data-dcnode-id="8032"><dl data-dcnode-id="8033"><dd data-dcnode-id="8034"><i data-dcnode-id="8035"><span data-dcnode-id="8038" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="8036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Iran_nuclear_agreement%2C_2015" title="Iran nuclear agreement, 2015"><span data-dcnode-id="8037" instrument_node="">Iran nuclear agreement, 2015</span></a></i></dd></dl></dd></dl><span data-dcnode-id="8030" instrument_node="">
</span><p data-dcnode-id="8004"><a data-dcnode-id="8028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Yea3.png" data-dcnode-id="8029" data-file-height="107" data-file-width="193" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/50px-Yea3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/75px-Yea3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/100px-Yea3.png 2x" width="50"></a><span data-dcnode-id="8027" instrument_node=""> On May 14, 2015, the </span><a data-dcnode-id="8025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="8026" instrument_node="">House</span></a><span data-dcnode-id="8024" instrument_node=""> approved </span><a class="external text" data-dcnode-id="8022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/1191/actions" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="8023" instrument_node="">HR 1191—the Iran Nuclear Agreement Review Act of 2015</span></a><span data-dcnode-id="8021" instrument_node="">—by a vote of 400-25. The bill required President </span><a data-dcnode-id="8019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Barack_Obama" title="Barack Obama"><span data-dcnode-id="8020" instrument_node="">Barack Obama</span></a><span data-dcnode-id="8018" instrument_node=""> to submit the details of the nuclear deal with Iran for congressional review. </span><a data-dcnode-id="8016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_Congress" title="United States Congress"><span data-dcnode-id="8017" instrument_node="">Congress</span></a><span data-dcnode-id="8015" instrument_node=""> had 60 days to review the deal and vote to approve, disapprove, or take no action on the deal. During the review period, sanctions on Iran could not be lifted. Meng voted with 176 </span><a class="mw-redirect" data-dcnode-id="8013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="8014" instrument_node="">Democrats</span></a><span data-dcnode-id="8012" instrument_node=""> to approve the bill.</span><sup class="reference" data-dcnode-id="8009" id="cite_ref-69"><a data-dcnode-id="8010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-69"><span data-dcnode-id="8011" instrument_node="">[69]</span></a></sup><sup class="reference" data-dcnode-id="8006" id="cite_ref-70"><a data-dcnode-id="8007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-70"><span data-dcnode-id="8008" instrument_node="">[70]</span></a></sup><span data-dcnode-id="8005" instrument_node="">
</span></p><p data-dcnode-id="7972"><br data-dcnode-id="8003"><b data-dcnode-id="8001"><span data-dcnode-id="8002" instrument_node="">Approval of Joint Comprehensive Plan of Action</span></b><br data-dcnode-id="8000"><span data-dcnode-id="7999" instrument_node="">
</span><a data-dcnode-id="7997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="7998" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="7996" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="7995" instrument_node=""> On September 11, 2015, the </span><a data-dcnode-id="7993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="7994" instrument_node="">House</span></a><span data-dcnode-id="7992" instrument_node=""> rejected </span><a class="external text" data-dcnode-id="7990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/3461" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7991" instrument_node="">HR 3461—To approve the Joint Comprehensive Plan of Action, signed at Vienna on July 14, 2015, relating to the nuclear program of Iran</span></a><span data-dcnode-id="7989" instrument_node="">—by a vote of 162-269. The legislation proposed approving </span><a class="mw-redirect" data-dcnode-id="7987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Iran_nuclear_agreement%2C_2015" title="Iran nuclear agreement, 2015"><span data-dcnode-id="7988" instrument_node="">the nuclear agreement with Iran</span></a><span data-dcnode-id="7986" instrument_node="">. Meng voted with 24 </span><a class="mw-redirect" data-dcnode-id="7984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="7985" instrument_node="">Democrats</span></a><span data-dcnode-id="7983" instrument_node=""> and 244 </span><a class="mw-redirect" data-dcnode-id="7981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Republicans" title="Republicans"><span data-dcnode-id="7982" instrument_node="">Republicans</span></a><span data-dcnode-id="7980" instrument_node=""> against the bill.</span><sup class="reference" data-dcnode-id="7977" id="cite_ref-71"><a data-dcnode-id="7978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-71"><span data-dcnode-id="7979" instrument_node="">[71]</span></a></sup><sup class="reference" data-dcnode-id="7974" id="cite_ref-72"><a data-dcnode-id="7975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-72"><span data-dcnode-id="7976" instrument_node="">[72]</span></a></sup><span data-dcnode-id="7973" instrument_node="">
</span></p><p data-dcnode-id="7946"><br data-dcnode-id="7971"><b data-dcnode-id="7969"><span data-dcnode-id="7970" instrument_node="">Suspension of Iran sanctions relief</span></b><br data-dcnode-id="7968"><span data-dcnode-id="7967" instrument_node="">
</span><a data-dcnode-id="7965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="7966" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="7964" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="7963" instrument_node=""> On September 11, 2015, the </span><a data-dcnode-id="7961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="7962" instrument_node="">House</span></a><span data-dcnode-id="7960" instrument_node=""> approved </span><a class="external text" data-dcnode-id="7958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/3460%3Fq%3D%257B%2522search%2522%253A%255B%2522Peter%2BRoskram%2522%255D%257D" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7959" instrument_node="">HR 3460—To suspend until January 21, 2017, the authority of the President to waive, suspend, reduce, provide relief from, or otherwise limit the application of sanctions pursuant to an agreement related to the nuclear program of Iran</span></a><span data-dcnode-id="7957" instrument_node="">—by a vote of 247-186. HR 3460 prohibited "the President, prior to January 21, 2017, from: limiting the application of specified sanctions on Iran or refraining from applying any such sanctions; or removing a foreign person (including entities) listed in Attachments 3 or 4 to Annex II of the Joint Comprehensive Plan of Action (JCPA) from the list of designated nationals and blocked persons maintained by the Office of Foreign Asset Control of the Department of the Treasury." Meng voted with 185 </span><a class="mw-redirect" data-dcnode-id="7955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="7956" instrument_node="">Democrats</span></a><span data-dcnode-id="7954" instrument_node=""> against the bill.</span><sup class="reference" data-dcnode-id="7951" id="cite_ref-73"><a data-dcnode-id="7952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-73"><span data-dcnode-id="7953" instrument_node="">[73]</span></a></sup><sup class="reference" data-dcnode-id="7948" id="cite_ref-74"><a data-dcnode-id="7949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-74"><span data-dcnode-id="7950" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7947" instrument_node="">
</span></p><p data-dcnode-id="7914"><br data-dcnode-id="7945"><b data-dcnode-id="7943"><span data-dcnode-id="7944" instrument_node="">Presidential non-compliance of section 2</span></b><br data-dcnode-id="7942"><span data-dcnode-id="7941" instrument_node="">
</span><a data-dcnode-id="7939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="7940" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="7938" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="7937" instrument_node=""> On September 10, 2015, the </span><a data-dcnode-id="7935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="7936" instrument_node="">House</span></a><span data-dcnode-id="7934" instrument_node=""> passed </span><a class="external text" data-dcnode-id="7932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-resolution/411" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7933" instrument_node="">H Res 411—Finding that the President has not complied with section 2 of the Iran Nuclear Agreement Review Act of 2015</span></a><span data-dcnode-id="7931" instrument_node="">—by a vote of 245-186. Section 2 of the </span><a class="external text" data-dcnode-id="7929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/1191" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7930" instrument_node="">Iran Nuclear Agreement Review Act of 2015</span></a><span data-dcnode-id="7928" instrument_node=""> required the president to submit all materials related to the nuclear agreement for congressional review. House </span><a class="mw-redirect" data-dcnode-id="7926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Republicans" title="Republicans"><span data-dcnode-id="7927" instrument_node="">Republicans</span></a><span data-dcnode-id="7925" instrument_node=""> introduced the resolution because two agreements between the International Atomic Energy Agency and Iran were not submitted to Congress. Meng voted with 185 </span><a class="mw-redirect" data-dcnode-id="7923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="7924" instrument_node="">Democrats</span></a><span data-dcnode-id="7922" instrument_node=""> against the resolution.</span><sup class="reference" data-dcnode-id="7919" id="cite_ref-75"><a data-dcnode-id="7920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-75"><span data-dcnode-id="7921" instrument_node="">[75]</span></a></sup><sup class="reference" data-dcnode-id="7916" id="cite_ref-rc492_76-0"><a data-dcnode-id="7917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-rc492-76"><span data-dcnode-id="7918" instrument_node="">[76]</span></a></sup><span data-dcnode-id="7915" instrument_node="">
</span></p><span data-dcnode-id="7913" instrument_node="">
</span><h5 data-dcnode-id="7910"><span class="mw-headline" data-dcnode-id="7911" id="Export-Import_Bank"><span data-dcnode-id="7912" instrument_node="">Export-Import Bank</span></span></h5><span data-dcnode-id="7909" instrument_node="">
</span><p data-dcnode-id="7885"><a data-dcnode-id="7907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Yea3.png" data-dcnode-id="7908" data-file-height="107" data-file-width="193" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/50px-Yea3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/75px-Yea3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/100px-Yea3.png 2x" width="50"></a><span data-dcnode-id="7906" instrument_node=""> On October 27, 2015, the </span><a data-dcnode-id="7904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="7905" instrument_node="">House</span></a><span data-dcnode-id="7903" instrument_node=""> passed </span><a class="external text" data-dcnode-id="7901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/597%3Fq%3D%257B%2522search%2522%253A%255B%2522%255C%2522hr597%255C%2522%2522%255D%257D%26resultIndex%3D1" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7902" instrument_node="">HR 597—the Export-Import Bank Reform and Reauthorization Act of 2015</span></a><span data-dcnode-id="7900" instrument_node="">—by a vote of  313-118. The bill proposed reauthorizing the Export-Import Bank and allowing it to resume offering assistance in the form of loans and insurance to foreign companies that wanted to buy U.S. goods.</span><sup class="reference" data-dcnode-id="7897" id="cite_ref-77"><a data-dcnode-id="7898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-77"><span data-dcnode-id="7899" instrument_node="">[77]</span></a></sup><span data-dcnode-id="7896" instrument_node=""> Meng voted with 185 </span><a class="mw-redirect" data-dcnode-id="7894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="7895" instrument_node="">Democrats</span></a><span data-dcnode-id="7893" instrument_node=""> and 127 </span><a class="mw-redirect" data-dcnode-id="7891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Republicans" title="Republicans"><span data-dcnode-id="7892" instrument_node="">Republicans</span></a><span data-dcnode-id="7890" instrument_node=""> in favor of the bill.</span><sup class="reference" data-dcnode-id="7887" id="cite_ref-78"><a data-dcnode-id="7888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-78"><span data-dcnode-id="7889" instrument_node="">[78]</span></a></sup><span data-dcnode-id="7886" instrument_node="">
</span></p><span data-dcnode-id="7884" instrument_node="">
</span><h4 data-dcnode-id="7881"><span class="mw-headline" data-dcnode-id="7882" id="Domestic"><span data-dcnode-id="7883" instrument_node="">Domestic</span></span></h4><span data-dcnode-id="7880" instrument_node="">
</span><h5 data-dcnode-id="7877"><span class="mw-headline" data-dcnode-id="7878" id="USA_FREEDOM_Act_of_2015"><span data-dcnode-id="7879" instrument_node="">USA FREEDOM Act of 2015</span></span></h5><span data-dcnode-id="7876" instrument_node="">
</span><p data-dcnode-id="7847"><a data-dcnode-id="7874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Yea3.png" data-dcnode-id="7875" data-file-height="107" data-file-width="193" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/50px-Yea3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/75px-Yea3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/100px-Yea3.png 2x" width="50"></a><span data-dcnode-id="7873" instrument_node=""> On May 13, 2015, the </span><a data-dcnode-id="7871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="7872" instrument_node="">House</span></a><span data-dcnode-id="7870" instrument_node=""> passed </span><a class="external text" data-dcnode-id="7868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/2048%3Fq%3D%257B%2522search%2522%253A%255B%2522USA%2BFREEDOM%2BAct%2522%255D%257D" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7869" instrument_node="">HR 2048—the Uniting and Strengthening America by Fulfilling Rights and Ensuring Effective Discipline Over Monitoring Act of 2015 or the USA FREEDOM Act of 2015</span></a><span data-dcnode-id="7867" instrument_node="">—by a vote of 338-88. The legislation revised </span><a class="external text" data-dcnode-id="7865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/109th-congress/house-bill/3199%3Fq%3D%257B%2522search%2522%253A%255B%2522Patriot%2BAct%2522%255D%257D" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7866" instrument_node="">HR 3199—the USA PATRIOT Improvement and Reauthorization Act of 2005</span></a><span data-dcnode-id="7864" instrument_node="">—by ending the bulk collection of metadata under Sec. 215 of the act, requiring increased reporting from the </span><a data-dcnode-id="7862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_Foreign_Intelligence_Surveillance_Court" title="United States Foreign Intelligence Surveillance Court"><span data-dcnode-id="7863" instrument_node="">Foreign Intelligence Surveillance Court</span></a><span data-dcnode-id="7861" instrument_node="">, and requiring the use of "a specific selection term as the basis for national security letters that request information from wire or electronic communication service providers, financial institutions, or consumer reporting agencies." Meng voted with 141 </span><a class="mw-redirect" data-dcnode-id="7859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="7860" instrument_node="">Democrats</span></a><span data-dcnode-id="7858" instrument_node=""> and 196 </span><a class="mw-redirect" data-dcnode-id="7856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Republicans" title="Republicans"><span data-dcnode-id="7857" instrument_node="">Republicans</span></a><span data-dcnode-id="7855" instrument_node=""> to approve the legislation. It became law on June 2, 2015.</span><sup class="reference" data-dcnode-id="7852" id="cite_ref-79"><a data-dcnode-id="7853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-79"><span data-dcnode-id="7854" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="7849" id="cite_ref-80"><a data-dcnode-id="7850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-80"><span data-dcnode-id="7851" instrument_node="">[80]</span></a></sup><span data-dcnode-id="7848" instrument_node="">
</span></p><span data-dcnode-id="7846" instrument_node="">
</span><h5 data-dcnode-id="7843"><span class="mw-headline" data-dcnode-id="7844" id="Pain-Capable_Unborn_Child_Protection_Act"><span data-dcnode-id="7845" instrument_node="">Pain-Capable Unborn Child Protection Act</span></span></h5><span data-dcnode-id="7842" instrument_node="">
</span><p data-dcnode-id="7821"><a data-dcnode-id="7840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Nay3.png" data-dcnode-id="7841" data-file-height="106" data-file-width="197" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/55px-Nay3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/83px-Nay3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/e/ea/Nay3.png/110px-Nay3.png 2x" width="55"></a><span data-dcnode-id="7839" style="display:inline-block; filter:alpha(opacity=0); -moz-opacity:0.0; -khtml-opacity: 0.0; opacity: 0.0;"></span><span data-dcnode-id="7838" instrument_node=""> On May 13, 2015, the </span><a data-dcnode-id="7836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="7837" instrument_node="">House</span></a><span data-dcnode-id="7835" instrument_node=""> passed </span><a class="external text" data-dcnode-id="7833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/36%3Fq%3D%257B%2522search%2522%253A%255B%2522hr%2B36%2522%255D%257D" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7834" instrument_node="">HR 36—the Pain-Capable Unborn Child Protection Act</span></a><span data-dcnode-id="7832" instrument_node="">—by a vote of 242-184. The bill proposed prohibiting abortions from being performed after a fetus was determined to be 20 weeks or older. The bill proposed exceptions in cases of rape, incest, or to save the life of the mother. Meng voted with 179 </span><a class="mw-redirect" data-dcnode-id="7830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="7831" instrument_node="">Democrats</span></a><span data-dcnode-id="7829" instrument_node=""> against the bill.</span><sup class="reference" data-dcnode-id="7826" id="cite_ref-81"><a data-dcnode-id="7827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-81"><span data-dcnode-id="7828" instrument_node="">[81]</span></a></sup><sup class="reference" data-dcnode-id="7823" id="cite_ref-82"><a data-dcnode-id="7824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-82"><span data-dcnode-id="7825" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7822" instrument_node="">
</span></p><span data-dcnode-id="7820" instrument_node="">
</span><h5 data-dcnode-id="7817"><span class="mw-headline" data-dcnode-id="7818" id="Cyber_security"><span data-dcnode-id="7819" instrument_node="">Cyber security</span></span></h5><span data-dcnode-id="7816" instrument_node="">
</span><p data-dcnode-id="7792"><a data-dcnode-id="7814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Yea3.png" data-dcnode-id="7815" data-file-height="107" data-file-width="193" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/50px-Yea3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/75px-Yea3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/100px-Yea3.png 2x" width="50"></a><span data-dcnode-id="7813" instrument_node=""> On April 23, 2015, the </span><a data-dcnode-id="7811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="7812" instrument_node="">House</span></a><span data-dcnode-id="7810" instrument_node=""> passed </span><a class="external text" data-dcnode-id="7808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/1731%3Fq%3D%257B%2522search%2522%253A%255B%25221731%2Bthe%2BNational%2BCybersecurity%2BProtection%2BAdvancement%2BAct%2B2015%2522%255D%257D%26resultIndex%3D2" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7809" instrument_node="">HR 1731—the National Cybersecurity Protection Advancement Act of 2015</span></a><span data-dcnode-id="7807" instrument_node="">—by a vote of 355-63. The bill proposed creating an information sharing program that would allow federal agencies and private entities to share information about cyber threats. It also proposed including liability protections for companies.</span><sup class="reference" data-dcnode-id="7804" id="cite_ref-83"><a data-dcnode-id="7805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-83"><span data-dcnode-id="7806" instrument_node="">[83]</span></a></sup><span data-dcnode-id="7803" instrument_node=""> Meng voted with 134 </span><a class="mw-redirect" data-dcnode-id="7801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="7802" instrument_node="">Democrats</span></a><span data-dcnode-id="7800" instrument_node=""> and 220 </span><a class="mw-redirect" data-dcnode-id="7798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Republicans" title="Republicans"><span data-dcnode-id="7799" instrument_node="">Republicans</span></a><span data-dcnode-id="7797" instrument_node=""> to approve the bill.</span><sup class="reference" data-dcnode-id="7794" id="cite_ref-84"><a data-dcnode-id="7795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-84"><span data-dcnode-id="7796" instrument_node="">[84]</span></a></sup><span data-dcnode-id="7793" instrument_node="">
</span></p><p data-dcnode-id="7768"><a data-dcnode-id="7790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Portal%3ALegislative_Branch" title="Portal:Legislative Branch"><img alt="Yea3.png" data-dcnode-id="7791" data-file-height="107" data-file-width="193" height="28" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/50px-Yea3.png&amp;raw" srcset="https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/75px-Yea3.png 1.5x, https://cdn.ballotpedia.org/images/thumb/c/cd/Yea3.png/100px-Yea3.png 2x" width="50"></a><span data-dcnode-id="7789" instrument_node=""> On April 22, 2015, the </span><a data-dcnode-id="7787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/United_States_House_of_Representatives" title="United States House of Representatives"><span data-dcnode-id="7788" instrument_node="">House</span></a><span data-dcnode-id="7786" instrument_node=""> passed </span><a class="external text" data-dcnode-id="7784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/114th-congress/house-bill/1560" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7785" instrument_node="">HR 1560—the Protecting Cyber Networks Act</span></a><span data-dcnode-id="7783" instrument_node="">—by a vote of 307-116.</span><sup class="reference" data-dcnode-id="7780" id="cite_ref-85"><a data-dcnode-id="7781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-85"><span data-dcnode-id="7782" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7779" instrument_node=""> The bill proposed procedures that would allow federal agencies and private entities to share information about cyber threats. Meng voted with 104 </span><a class="mw-redirect" data-dcnode-id="7777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Democrats" title="Democrats"><span data-dcnode-id="7778" instrument_node="">Democrats</span></a><span data-dcnode-id="7776" instrument_node=""> and 202 </span><a class="mw-redirect" data-dcnode-id="7774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/Republicans" title="Republicans"><span data-dcnode-id="7775" instrument_node="">Republicans</span></a><span data-dcnode-id="7773" instrument_node=""> in favor of the bill.</span><sup class="reference" data-dcnode-id="7770" id="cite_ref-86"><a data-dcnode-id="7771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//widgets.votespotter.com/bp/key-votes/141749.html%23cite_note-86"><span data-dcnode-id="7772" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7769" instrument_node="">
</span></p><span data-dcnode-id="7767" instrument_node="">
</span><h4 data-dcnode-id="7764"><span class="mw-headline" data-dcnode-id="7765" id="Immigration"><span data-dcnode-id="7766" instrument_node="">Immigration</span></span></h4><span data-dcnode-id="7763" instrument_node="">
